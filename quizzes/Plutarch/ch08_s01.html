    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why does the section call the pair of Chapter 8 Plutarch's most famous and most demanding?", "options": [{"text": "Because Alexander and Caesar are the two most famous men in Western history, both were conquerors who shattered the political form they inherited, and the closing synkrisis is lost.", "isCorrect": true, "rationale": "The text opens with exactly this claim — two world-changers, two broken political forms, and a lost comparison that the reader must supply."}, {"text": "Because the two Lives are the longest Plutarch wrote.", "isCorrect": false, "rationale": "The section does not measure the Lives by length; the demand is about fame, political weight, and the missing synkrisis."}, {"text": "Because Plutarch's verdict survives but is unusually severe on both men.", "isCorrect": false, "rationale": "The verdict does not survive at all — the synkrisis is lost, and that loss is part of what makes the chapter demanding."}, {"text": "Because the chapter has no Second Witnesses and therefore relies on Plutarch alone.", "isCorrect": false, "rationale": "The chapter does omit Second Witnesses, but the section's stated reason for the demand is the fame of the subjects and the loss of the synkrisis, not the editorial omission."}], "id": "q01"}, {"question": "How does the section characterize each conqueror's relation to the political form he inherited?", "options": [{"text": "Alexander preserved Greek polis freedom while Caesar reformed the Roman Republic into a more efficient version of itself.", "isCorrect": false, "rationale": "The section says the opposite: Alexander destroyed Greek polis freedom in the same campaign that ended Persian rule, and Caesar destroyed the Republic."}, {"text": "Each broke the political institutions of his society to make himself supreme — Alexander destroyed Persian rule and Greek polis freedom; Caesar destroyed the Roman Republic.", "isCorrect": true, "rationale": "This is the section's central thesis on the theme of conquest and monarchy."}, {"text": "Both refused supreme power and tried to return their cities to traditional government.", "isCorrect": false, "rationale": "Neither did so — Alexander made himself king of an empire and Caesar became dictator for life."}, {"text": "Alexander preserved Persian institutions; Caesar abolished the Senate entirely.", "isCorrect": false, "rationale": "Alexander conquered and replaced Persian rule; Caesar dominated the Senate but did not abolish it. The section's framing is about each man ending the inherited political form."}], "id": "q02"}, {"question": "What does the section identify as the second pair in this book whose synkrisis is lost, and how does it propose to handle the loss?", "options": [{"text": "Themistocles and Camillus is the second; the loss is filled by quoting a later Roman commentator.", "isCorrect": false, "rationale": "Themistocles and Camillus is the first lost synkrisis pair in the book, not the second. Alexander and Caesar is the second."}, {"text": "Alexander and Caesar is the second; the chapter frames the lost comparison and asks the student to write it.", "isCorrect": true, "rationale": "The text says exactly this — Chapter 5 was the first lost synkrisis in the book and Chapter 8 is the second, with the student writing what Plutarch did not leave."}, {"text": "Phocion and Cato the Younger is the second; the loss is restored from Renaissance manuscripts.", "isCorrect": false, "rationale": "Phocion-Cato is one of the four lost synkriseis in the full Lives but is not the pair handled in this book; restoration from Renaissance manuscripts is not the section's claim."}, {"text": "Pyrrhus and Marius is the second; the synkrisis is reconstructed by the editor.", "isCorrect": false, "rationale": "Pyrrhus-Marius is another of the four lost synkriseis but is not the pair this chapter treats."}], "id": "q03"}, {"question": "How does the section describe the painfulness of the Alexander-Caesar synkrisis loss specifically?", "options": [{"text": "It is the most painful of the lost synkriseis because these are two of the most famous men in Western history, both soldiers and conquerors, both broke their cities' political institutions, and both died young.", "isCorrect": true, "rationale": "The lostsynkrisis box gives exactly this list of reasons — fame, soldiering, broken institutions, early deaths."}, {"text": "It is painful only because the Lives themselves are damaged and incomplete.", "isCorrect": false, "rationale": "The Lives survive; it is only the closing synkrisis that does not. The section explicitly says the manuscript tradition preserves the pair without the comparison."}, {"text": "Its loss is not painful at all — Plutarch wrote it but later disclaimed it.", "isCorrect": false, "rationale": "There is no such disclaimer story; the section calls the loss painful precisely because Plutarch's verdict on the two most famous men in Western history is gone."}, {"text": "It is painful because the two men were contemporaries who knew each other.", "isCorrect": false, "rationale": "Alexander died in 323 BC and Caesar was born in 100 BC; they were separated by more than two centuries."}], "id": "q04"}, {"question": "What does the section say to watch for at the opening of the Life of Alexander?", "options": [{"text": "Plutarch's most famous methodological statement — that he is writing biography, not history, and prefers the revealing small detail to the great public event.", "isCorrect": true, "rationale": "The section says exactly this — the methodological manifesto opens the Life of Alexander and applies to both halves of the chapter."}, {"text": "A defense of Macedonian monarchy as the rightful Greek constitution.", "isCorrect": false, "rationale": "The opening defends a biographical method, not a political constitution; Plutarch does not endorse Macedonian monarchy in the preface."}, {"text": "A summary of Alexander's death and a refusal to take sides in the lost synkrisis.", "isCorrect": false, "rationale": "The opening sets out the method and warns the reader that the great deeds will be epitomized, not summarized in advance."}, {"text": "An apology for omitting Caesar from the chapter.", "isCorrect": false, "rationale": "Caesar is the other half of the chapter; the opening mentions both men by name."}], "id": "q05"}, {"question": "Which pair of crossings does the section flag as decisive geographic moments to watch?", "options": [{"text": "Alexander's crossings (the Hellespont, the Granicus, Issus, the Egyptian deserts, the deep East) and Caesar's crossing of the Rubicon.", "isCorrect": true, "rationale": "The section gives exactly this list and says each crossing is a moral as well as a strategic moment."}, {"text": "Alexander's crossing of the Tiber and Caesar's crossing of the Indus.", "isCorrect": false, "rationale": "Alexander did not cross the Tiber; Caesar did not cross the Indus. The section names the Hellespont through the deep East for Alexander and the Rubicon for Caesar."}, {"text": "Both men's crossings of the Alps.", "isCorrect": false, "rationale": "Neither Alexander nor Caesar is famous in the section for crossing the Alps; Hannibal made the famous Alpine crossing."}, {"text": "Their crossings of the Atlantic and Pacific oceans.", "isCorrect": false, "rationale": "Neither man approached either ocean in his campaigns; both crossings the section names are continental and riverine."}], "id": "q06"}, {"question": "How does the section compare Alexander's and Caesar's use of clemency as a political tool?", "options": [{"text": "Alexander married Roxane (a Sogdian princess) to weld together his new empire; Caesar pardoned many civil-war enemies and readmitted them to the Senate. Each is a different style of using clemency politically.", "isCorrect": true, "rationale": "The section gives exactly these two examples as the comparison to mark for the synkrisis exercise."}, {"text": "Both men refused to pardon any defeated enemy and razed every city they took.", "isCorrect": false, "rationale": "Both did mass killing in some cases (Tyre, the Gauls), but the section explicitly points to clemency examples in each Life."}, {"text": "Alexander only forgave his Macedonian generals; Caesar only forgave Romans.", "isCorrect": false, "rationale": "Alexander's chivalry famously extended to Darius's family (Persians); Caesar's clementia extended even to former enemies like Brutus."}, {"text": "Neither used clemency politically; both relied solely on terror.", "isCorrect": false, "rationale": "Both used clemency strategically and famously — the synkrisis exercise depends on comparing the styles."}], "id": "q07"}, {"question": "How does the section describe the two death scenes the reader should watch?", "options": [{"text": "Alexander died of fever at Babylon at thirty-two; Caesar was struck twenty-three times at the foot of Pompey's statue.", "isCorrect": true, "rationale": "These are exactly the two scenes the section names. Alexander's death is described as fever in Babylon at thirty-two; Caesar's as twenty-three wounds at the foot of Pompey's statue, by men who included his political proteges."}, {"text": "Alexander died on the battlefield at Gaugamela; Caesar died at Pharsalus.", "isCorrect": false, "rationale": "Alexander died of fever at Babylon after the campaign; Caesar won at Pharsalus and was assassinated in Rome in 44 BC."}, {"text": "Alexander was poisoned by Aristotle; Caesar was struck by lightning.", "isCorrect": false, "rationale": "The section gives no such account; the historical scenes are fever and assassination."}, {"text": "Both men died peacefully in old age.", "isCorrect": false, "rationale": "Both died short of fifty — Alexander at thirty-two and Caesar at fifty-six — and neither died peacefully."}], "id": "q08"}, {"question": "How does the section describe the Christian moral imagination's reception of Alexander and Caesar?", "options": [{"text": "Alexander was used as a model of princely virtue in medieval and Renaissance schools (the Alexander Romance); Caesar's reception was more ambivalent — Augustine treated the Rubicon as the type case of overweening ambition, and Dante placed Brutus and Cassius in the lowest circle of hell.", "isCorrect": true, "rationale": "The section frames the contrast in exactly these terms — Alexander a romance hero, Caesar a more troubled figure, with Dante and Augustine named as evidence of the ambivalence."}, {"text": "Both were rejected unanimously by Christian writers.", "isCorrect": false, "rationale": "The reception was complicated for each — the Alexander Romance celebrated Alexander; the Caesar tradition was ambivalent but not uniformly hostile."}, {"text": "Both were canonized as saints by the medieval church.", "isCorrect": false, "rationale": "Neither was canonized; the section says nothing of the sort."}, {"text": "The Christian tradition treated the two as morally identical.", "isCorrect": false, "rationale": "The section emphasizes that the two receptions differ — Alexander as princely model, Caesar as cautionary type case."}], "id": "q09"}, {"question": "How were the American Founders divided on Caesar, according to the section?", "options": [{"text": "Adams admired Cicero and thought Caesar contemptible; Hamilton found in Caesar a model of executive greatness.", "isCorrect": true, "rationale": "The section gives this divide explicitly to show that the Christian reading was not univocal even by the Founders' time."}, {"text": "All the Founders treated Caesar as a tyrant and refused to read him.", "isCorrect": false, "rationale": "The Hamilton example contradicts uniform rejection; the Founders were divided, not united, on Caesar."}, {"text": "All the Founders admired Caesar without reservation.", "isCorrect": false, "rationale": "The Adams example shows reservation was widespread; Caesar was a contested figure."}, {"text": "The Founders avoided commenting on Caesar at all.", "isCorrect": false, "rationale": "The section explicitly names Adams and Hamilton as commenting on Caesar in opposite ways."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
