    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "What is the historical status of the Alexander-Caesar synkrisis, and how does the section describe its loss?", "options": [{"text": "The pair appears together in the manuscripts but the closing comparison did not survive transmission; the loss is irreparable and, by common consent, the most painful single loss in the manuscript tradition of the Parallel Lives.", "isCorrect": true, "rationale": "The section's lostsynkrisis box gives exactly this status — pair preserved, comparison lost, loss irreparable and the most painful in the tradition."}, {"text": "Plutarch never wrote one for this pair; the section invents one.", "isCorrect": false, "rationale": "The section is clear that Plutarch wrote a comparison and that it did not survive — the loss is the issue, not non-existence."}, {"text": "It survives complete and is included in this section.", "isCorrect": false, "rationale": "The defining feature of the section is precisely that the synkrisis does not survive — the chapter's exercise depends on the loss."}, {"text": "It was deliberately suppressed by Christian copyists.", "isCorrect": false, "rationale": "The section gives no such story; the comparison is described as lost in transmission, not suppressed."}], "id": "q01"}, {"question": "On the axis of origin and inherited situation, where does the section say Plutarch's verdict would lean?", "options": [{"text": "Toward Caesar — Alexander inherited a kingdom and a planned expedition; Caesar started as a politically and financially modest patrician and made his own way through Roman political competition.", "isCorrect": true, "rationale": "The section says exactly this — Plutarch on most such comparisons gives credit to the man who started lower, and on this axis the verdict would lean Caesar."}, {"text": "Toward Alexander, because inheriting a kingdom is more impressive than rising from obscurity.", "isCorrect": false, "rationale": "Plutarch's habit is the opposite — the harder start is more impressive — and the section names Caesar as the man who started lower."}, {"text": "Even — both inherited identical situations.", "isCorrect": false, "rationale": "The section is explicit that the starting points differed and that the rise from a lower one is more impressive."}, {"text": "Toward neither — origin is not a Plutarchan axis.", "isCorrect": false, "rationale": "Origin is the first axis the surviving synkriseis use, and the section gives it explicitly as the first axis for this pair."}], "id": "q02"}, {"question": "On the axis of military genius, how would Plutarch most likely have rendered the comparison?", "options": [{"text": "A draw — both are in the very small set of unquestioned military geniuses of antiquity; Alexander's campaigns had greater geographic scope, Caesar's more strategic difficulty.", "isCorrect": true, "rationale": "The section says exactly this — Alexander's scope (Greece to the Indus); Caesar's diverse terrain and competent enemies; Plutarch would probably have called this a draw."}, {"text": "Sharply toward Alexander, because Caesar lost most of his battles.", "isCorrect": false, "rationale": "Caesar did not lose most of his battles; the section places both men in the very small set of unquestioned military geniuses."}, {"text": "Sharply toward Caesar, because Alexander never faced a competent enemy.", "isCorrect": false, "rationale": "Darius, Memnon, and the Persian satraps were competent enemies; the section credits Caesar with more strategic difficulty but explicitly calls the axis a draw."}, {"text": "Plutarch would have refused to compare them at all.", "isCorrect": false, "rationale": "Plutarch's whole method is comparison; the section sketches the axis Plutarch would have used."}], "id": "q03"}, {"question": "How does the section assess the axis of treatment of defeated enemies?", "options": [{"text": "Plutarch would probably have given the political edge to Caesar (his pardons brought enemies into the new political order) and the moral weight to neither — both used clemency politically and both committed mass slaughter (Tyre and Thebes for Alexander; perhaps a million Gauls for Caesar).", "isCorrect": true, "rationale": "The section gives exactly this nuanced verdict — political edge to Caesar via clementia, but no moral weight to either, given the mass killings on each side."}, {"text": "Sharply toward Alexander, because his chivalry to Darius's family was unmatched.", "isCorrect": false, "rationale": "The chivalry is real, but the Tyre massacre is named on the other side of the ledger; the section does not give Alexander a clean victory on this axis."}, {"text": "Sharply toward Caesar, because Alexander killed all his enemies.", "isCorrect": false, "rationale": "Alexander did not kill all his enemies — he married Roxane, treated Darius's family with chivalry — and the section gives only the political edge, not the moral weight, to Caesar."}, {"text": "Even, because both killed exactly the same number of enemies.", "isCorrect": false, "rationale": "Both committed mass slaughter, but the section does not measure the comparison by a tally of casualties; it weighs use and forms of clemency."}], "id": "q04"}, {"question": "On the axis of restraint in personal life, where does the verdict tilt?", "options": [{"text": "Toward Caesar — Alexander grew increasingly imperious, adopted Persian dress, demanded proskynesis, killed Clitus in a drunken rage, gave way to extravagant grief at Hephaestion's death; Caesar drank moderately, wrote disciplined Latin prose, and kept political composure under personal pressure.", "isCorrect": true, "rationale": "The section gives exactly this list of disqualifying details for Alexander and disciplines for Caesar, and concludes the verdict tilts toward Caesar."}, {"text": "Toward Alexander, because he had the better education.", "isCorrect": false, "rationale": "The educational formation is a separate axis; on personal restraint, the section tilts toward Caesar."}, {"text": "Even — both kept perfect discipline at all times.", "isCorrect": false, "rationale": "The section explicitly catalogs Alexander's lapses (Clitus, proskynesis, grief) and credits Caesar with better personal discipline."}, {"text": "Toward neither — restraint is not a Plutarchan axis.", "isCorrect": false, "rationale": "Restraint is a core Plutarchan axis, and the section gives it explicitly as one of the four axes that probably tilted the synkrisis."}], "id": "q05"}, {"question": "On the axis of educational formation, how does the section frame the comparison?", "options": [{"text": "It favors Alexander — he had Aristotle; Caesar had Greek tutors of his youth and a lifelong reading habit but no comparable single teacher; the Aristotelian formation made Alexander a soldier of unique learning.", "isCorrect": true, "rationale": "The section names Aristotle, names the asymmetry of Caesar's more eclectic formation, and explicitly says the verdict favors Alexander on this axis."}, {"text": "It favors Caesar — Aristotle's teaching was discredited by Alexander's later excesses.", "isCorrect": false, "rationale": "The section does not discredit Aristotle's teaching; it says the Aristotelian formation made Alexander a soldier of unique learning. The axis favors Alexander."}, {"text": "Even — both had identical educations.", "isCorrect": false, "rationale": "The section explicitly contrasts the single celebrated tutor of Alexander with Caesar's more eclectic Greek tutors and reading habit."}, {"text": "Plutarch could not have known about either education.", "isCorrect": false, "rationale": "Both educations are well documented in Plutarch's own Lives; the section assumes Plutarch knew the relevant facts."}], "id": "q06"}, {"question": "On the axis of the political form each broke, where does the section say the slight edge would go?", "options": [{"text": "Slight edge to Alexander — the Hellenistic Greek world was, in many ways, more cosmopolitan than the small-polis world it replaced, so Alexander's destruction yielded some positive returns; the Roman political collapse Caesar caused was less clearly improving.", "isCorrect": true, "rationale": "The section makes exactly this argument — Hellenistic cosmopolitanism as a positive return on the destruction of polis freedom; the Roman collapse as less obviously improving — and gives the slight edge to Alexander."}, {"text": "Slight edge to Caesar, because the Roman Empire lasted longer than the Hellenistic kingdoms.", "isCorrect": false, "rationale": "Longevity of the empire is named as something Plutarch could see (Augustus's success), but the axis here is whether the destruction yielded positive returns — and the section gives Alexander the edge."}, {"text": "Even — both destroyed identical political forms.", "isCorrect": false, "rationale": "Polis freedom and Roman Republic are distinct political forms with different replacement histories; the section names the asymmetry."}, {"text": "Toward neither — the political destruction is morally neutral.", "isCorrect": false, "rationale": "The section does evaluate, and the slight edge goes to Alexander on this axis."}], "id": "q07"}, {"question": "On the axis of 'the end,' where does the section say the verdict would land?", "options": [{"text": "Probably even — Alexander died of fever at thirty-two, incompletely; Caesar was assassinated at fifty-six, mid-program, with reforms half-implemented; the deaths are different but both unfinished.", "isCorrect": true, "rationale": "The section gives exactly this analysis — incomplete in different ways, but both unfinished, so probably even."}, {"text": "Sharply toward Alexander, because dying young is the more glorious end.", "isCorrect": false, "rationale": "Plutarch does not equate dying young with glory; the section finds the deaths different but both unfinished."}, {"text": "Sharply toward Caesar, because he made it to fifty-six.", "isCorrect": false, "rationale": "Living longer is not weighed as an advantage in the section; both ends are unfinished."}, {"text": "Plutarch could not have evaluated either end.", "isCorrect": false, "rationale": "Both deaths were available to Plutarch, who wrote in the high empire; the section explicitly weighs them as an axis."}], "id": "q08"}, {"question": "Which two aspects does the section say Plutarch could NOT have weighed?", "options": [{"text": "The long political afterlife (Augustus's institutional system lasted four centuries; Alexander's empire fell apart within twenty years) and the Christian reception (Dante placing Brutus and Cassius in the lowest circle of Hell; the Christian moral imagination using Caesar as the type case of overweening ambition).", "isCorrect": true, "rationale": "The section names exactly these two aspects — Augustus's institutional success against Alexander's institutional dispersion, and the Christian reception (Dante and the Caesar-as-ambition trope) — as matters for the modern reader to weigh."}, {"text": "Their military tactics and their personal restraint.", "isCorrect": false, "rationale": "These are axes Plutarch could and would have weighed; the section explicitly sketches both as parts of the likely synkrisis."}, {"text": "Their educational formation and their relations with women.", "isCorrect": false, "rationale": "Educational formation is named explicitly as an axis Plutarch could have weighed; their personal lives are within his frame."}, {"text": "Their relationship to philosophy and their religious practices.", "isCorrect": false, "rationale": "Plutarch could weigh both; the section names long political afterlife and Christian reception as the matters outside his frame."}], "id": "q09"}, {"question": "What are the four explicit requirements of the writesynkrisis essay for this chapter?", "options": [{"text": "(a) State the axis in the first sentence; (b) cite two specific incidents from each Life and name them; (c) render judgment — the lost synkrisis freed Plutarch of the obligation but does not free the student; (d) stay under 1,000 words.", "isCorrect": true, "rationale": "The section's writesynkrisis box gives exactly this enumeration."}, {"text": "(a) Compare three figures, (b) include Shakespeare and Dante by name, (c) match Plutarch's lost verdict, (d) write 2,000 words.", "isCorrect": false, "rationale": "Each item misstates the section's requirements — the comparison is two-figure, the reception material is optional, the verdict is the student's own, and the cap is under 1,000 words."}, {"text": "(a) Write in Greek, (b) cite only Arrian and Suetonius, (c) refuse to render judgment, (d) submit by hand.", "isCorrect": false, "rationale": "None of these is in the section's list — the essay is in English, the evidence base is Plutarch, judgment is required, and submission method is irrelevant."}, {"text": "(a) State the axis last, (b) cite no incidents, (c) match the section's likely verdict, (d) exceed 1,500 words.", "isCorrect": false, "rationale": "Each element is the opposite of what the section's requirements state."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
