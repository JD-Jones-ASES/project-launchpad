<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Greek and Roman Worlds</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Roughly how much chronological reach do Plutarch's Lives cover?", "options": [{"text": "Roughly one century — the lifetime of Plutarch himself.", "isCorrect": false, "rationale": "Plutarch's own lifetime is the vantage point, but his subjects span much earlier centuries."}, {"text": "About 1,000 years of Greek and Roman history.", "isCorrect": true, "rationale": "The text states the Lives 'cover almost a thousand years of Greek and Roman history' — a survey course in ancient biography."}, {"text": "About 250 years — the late Republic and early Empire only.", "isCorrect": false, "rationale": "The reach is much greater; the legendary founders are placed in the dim past, many centuries before the late Republic."}, {"text": "Exactly five hundred years.", "isCorrect": false, "rationale": "The text gives 'almost a thousand years' as the approximate span — significantly more than five hundred."}], "id": "q01"}, {"question": "Which of the following best defines the Greek term 'polis'?", "options": [{"text": "A single building used for political assembly.", "isCorrect": false, "rationale": "The polis is not a single building; it is a community with an urban center and surrounding farmland."}, {"text": "The chief executive magistrate of a Greek city.", "isCorrect": false, "rationale": "That role belongs to the archon (in Athens). Polis refers to the political community itself."}, {"text": "A city-state — an urban center plus its surrounding farmland.", "isCorrect": true, "rationale": "The text defines polis as the basic unit of Greek political life: 'an urban center plus its surrounding farmland.'"}, {"text": "A standing army of citizen-warriors.", "isCorrect": false, "rationale": "Standing forces (e.g., the Spartan citizen army) are a feature of some poleis, not a definition of the term itself."}], "id": "q02"}, {"question": "In Athenian democracy, what were the ekklesia and the boule, respectively?", "options": [{"text": "The voting assembly and the administrative council.", "isCorrect": true, "rationale": "The text defines ekklesia as 'the voting assembly of all male citizens' and boule as 'the administrative council' (400 under Solon, 500 under Cleisthenes)."}, {"text": "The chief magistrate and his deputy.", "isCorrect": false, "rationale": "The chief magistrate is the archon; the ekklesia and boule are assemblies, not single officials."}, {"text": "Two of the five Spartan ephors.", "isCorrect": false, "rationale": "Ekklesia and boule are Athenian institutions; the ephors are Spartan magistrates."}, {"text": "Two annual religious festivals.", "isCorrect": false, "rationale": "Both are political bodies, not festivals."}], "id": "q03"}, {"question": "What did the Greek word 'tyrannos' originally mean, and which Plutarchan subject did NOT live under one of the bad kind?", "options": [{"text": "It meant 'cruel ruler,' and Pericles lived under one.", "isCorrect": false, "rationale": "The Greek term did not imply cruelty inherently, and Pericles was a democratic leader of Athens, not a subject of tyranny."}, {"text": "It meant any king, and Solon overthrew one in Athens.", "isCorrect": false, "rationale": "Tyrannos meant specifically a man who seized power outside the legal constitution, not any king."}, {"text": "It meant a man who seized power outside the legal constitution. Plutarch's Dion lived under a bad tyrant (Dionysius II of Syracuse).", "isCorrect": true, "rationale": "The text states the Greek term did not necessarily mean a cruel ruler — 'a man who seized power outside the legal constitution' — and identifies Dion as living under the bad sort, Dionysius II."}, {"text": "It meant 'first citizen,' a title later borrowed by Roman emperors.", "isCorrect": false, "rationale": "'First citizen' (princeps) is a Roman title, not the meaning of tyrannos."}], "id": "q04"}, {"question": "What does 'res publica' literally mean, and what English word derives from it?", "options": [{"text": "'The public matter,' source of the English word 'republic.'", "isCorrect": true, "rationale": "The text gives the literal Latin sense and identifies it as 'the source of the English word republic.'"}, {"text": "'The Senate's affair,' source of the English word 'senate.'", "isCorrect": false, "rationale": "The Senate is one institution of the res publica, but the phrase means the state as the common affair of all citizens."}, {"text": "'Public servant,' source of the English word 'public.'", "isCorrect": false, "rationale": "The Latin phrase describes the state, not a single official; 'republic' is the derived English word."}, {"text": "'The popular vote,' source of the English word 'plebiscite.'", "isCorrect": false, "rationale": "Plebiscite has a different Latin origin (plebs + scitum); res publica gives us 'republic.'"}], "id": "q05"}, {"question": "What was the office of 'consul' under the Roman Republic?", "options": [{"text": "A lifetime appointment in the Senate.", "isCorrect": false, "rationale": "The Senate was a standing council of ex-magistrates; the consulship was an annual elected office."}, {"text": "An emergency magistrate appointed for six months at a time.", "isCorrect": false, "rationale": "That describes the dictator. Consuls were the regular chief executives, elected annually, two at a time."}, {"text": "Chief executive magistrate — two elected annually, each able to check the other.", "isCorrect": true, "rationale": "The text defines the consul as 'chief executive magistrate of the Republic. Two consuls elected annually, each holding power to check the other.'"}, {"text": "A military rank below the rank of praetor.", "isCorrect": false, "rationale": "Consuls outranked praetors; both held imperium, but the consulship was the senior office."}], "id": "q06"}, {"question": "What were the powers and limits of a Roman tribune of the plebs?", "options": [{"text": "They commanded legions and led wars overseas.", "isCorrect": false, "rationale": "Tribunes did NOT hold imperium — they had no military command. Consuls, praetors, and dictators held imperium."}, {"text": "Elected to protect plebeian interests; could veto any other magistrate's act; did not hold imperium.", "isCorrect": true, "rationale": "The text describes the tribune as 'a magistrate elected to protect plebeian interests; could veto any other magistrate's act,' and explicitly notes tribunes 'did not' hold imperium."}, {"text": "Senior priests of the Roman state cult.", "isCorrect": false, "rationale": "Tribunes were civil magistrates, not priests; their role was political protection of the plebs."}, {"text": "An advisory office with no formal powers.", "isCorrect": false, "rationale": "Tribunes had a powerful veto over other magistrates' acts; they were anything but powerless."}], "id": "q07"}, {"question": "What was a Roman dictator, and how did Caesar's behavior in 44 BC differ from the legal form?", "options": [{"text": "An emergency magistrate with supreme authority for six months; Caesar's perpetual dictatorship violated this and led to his assassination.", "isCorrect": true, "rationale": "The text defines the dictatorship as 'an emergency magistrate with supreme authority for six months' and identifies Caesar's 'perpetual dictatorship in 44 BC' as the violation that 'led to his assassination.'"}, {"text": "A lifelong tyrant ruling outside the constitution — the same as a Greek tyrannos.", "isCorrect": false, "rationale": "The Roman dictatorship was a legal office; the Greek tyrannos was, by definition, extra-constitutional."}, {"text": "Camillus was the only Roman ever to hold the office.", "isCorrect": false, "rationale": "The text notes Camillus held the office five times, but he was not the only dictator; many Romans served."}, {"text": "An office reserved for plebeians.", "isCorrect": false, "rationale": "The dictatorship was open to high-ranking magistrates of either order; it was not a plebeian-only office."}], "id": "q08"}, {"question": "Plutarch warns readers that 'the early material is unreliable' in some Lives. What discipline does this train, according to the text?", "options": [{"text": "Memorizing the chronology of Greek and Roman events.", "isCorrect": false, "rationale": "The text says the chronology is 'a frame to refer back to,' not something to memorize. The trained skill is critical weighing of sources."}, {"text": "Accepting Plutarch's account as the single truth.", "isCorrect": false, "rationale": "The text praises Plutarch precisely for offering alternative versions; the trained habit is comparison, not deference."}, {"text": "Weighing different versions of the same story — treating the reader as a fellow inquirer.", "isCorrect": true, "rationale": "The text says 'the skill of weighing different versions of the same story is one of the skills the book asks you to develop,' and that Plutarch 'treats you as a fellow inquirer.'"}, {"text": "Reading only the historically verifiable Lives and skipping the legendary ones.", "isCorrect": false, "rationale": "The text says the legendary material 'is the place where reading him trains you to think' — it should be engaged, not skipped."}], "id": "q09"}, {"question": "The text notes a sharp asymmetry between the Greek and Roman literary traditions. What is the asymmetry?", "options": [{"text": "Latin literature is older than Greek by several centuries.", "isCorrect": false, "rationale": "The text says the opposite: Homer was a millennium old before Plutarch's first Greek subject, and surviving Latin literature postdates Plutarch's first Roman subject by half a millennium."}, {"text": "Greek literature already had a long history when Romans began to write; the legendary layers are thicker on the Greek side than on the Roman.", "isCorrect": true, "rationale": "The text states Greek literature 'already had a long history when Romans began to write' and that the early Roman material (founders) is similarly shadowy."}, {"text": "There is no asymmetry — both cultures preserved the same volume of early text.", "isCorrect": false, "rationale": "The text explicitly contrasts them — the literary cultures were 'not the same shape.'"}, {"text": "Roman texts survive in greater number than Greek ones.", "isCorrect": false, "rationale": "Both traditions show heavy loss; the section emphasizes age, not volume of survival."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
