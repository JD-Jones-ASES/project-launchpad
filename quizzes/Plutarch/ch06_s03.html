    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Fabius Maximus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Plutarch records two early nicknames for Fabius. What were they, and what did each refer to?", "options": [{"text": "Verrucosus ('warty') for a mole on his upper lip, and Ovicula ('little sheep') for his mild, slow temperament.", "isCorrect": true, "rationale": "The Life opens by giving exactly these two nicknames: Verrucosus for the small mole on his upper lip and Ovicula, 'little sheep,' for his mild, slow, seemingly dull temperament."}, {"text": "Maximus ('greatest') for his height, and Cunctator ('delayer') from childhood.", "isCorrect": false, "rationale": "Cunctator was an adult political nickname, and Maximus is a family cognomen, not an early personal nickname like the two Plutarch highlights."}, {"text": "Quintus ('the fifth') for his birth order, and Africanus for his early victories.", "isCorrect": false, "rationale": "Africanus is the nickname of Scipio, not Fabius."}, {"text": "Brutus ('the dull') and Lentulus ('slow'), both from his schoolmates.", "isCorrect": false, "rationale": "These are unrelated Roman cognomina; Plutarch's text names Verrucosus and Ovicula specifically."}]}, {"question": "In the quoted passage on Fabius's childhood, what does Plutarch say the few perceptive observers saw beneath the seeming dullness?", "options": [{"text": "A future tyrant disguising his ambitions.", "isCorrect": false, "rationale": "Nothing in the passage suggests hidden tyrannical ambition; quite the opposite — they saw stability."}, {"text": "Stability and greatness of mind producing his tranquility of temper.", "isCorrect": true, "rationale": "Plutarch writes: 'only a few saw that this tranquility of temper proceeded from stability and greatness of mind.'"}, {"text": "A secretly violent temper concealed beneath calm appearance.", "isCorrect": false, "rationale": "The passage emphasizes genuine slowness and calm, not concealed violence."}, {"text": "A scheming political opportunist waiting for his chance.", "isCorrect": false, "rationale": "The portrait is the exact opposite — Fabius is presented as stable, patient, and free of opportunism."}]}, {"question": "What does Plutarch identify as the central virtue of Fabius's career?", "options": [{"text": "His brilliant tactical innovation on the battlefield.", "isCorrect": false, "rationale": "Fabius's career is not defined by tactical innovation — he avoided pitched battles."}, {"text": "Stability — the man who does not move quickly cannot be panicked, and the man who is not panicked can think when others cannot.", "isCorrect": true, "rationale": "Plutarch writes that 'the quality Plutarch most admires' is 'stability. The man who does not move quickly cannot be panicked. The man who is not panicked can think when others cannot.'"}, {"text": "His personal piety toward the household gods.", "isCorrect": false, "rationale": "His religious seriousness is real but is a complementary trait, not the central virtue."}, {"text": "His ability to deliver decisive oratory in the Senate.", "isCorrect": false, "rationale": "Fabius persuaded by example, not by eloquence; the central virtue is stability."}]}, {"question": "Why did the Romans, terrified by Trasimene, turn specifically to Fabius and appoint him dictator?", "options": [{"text": "He was the only Roman who had previously defeated Hannibal in battle.", "isCorrect": false, "rationale": "Fabius had not previously defeated Hannibal; the disasters had just begun."}, {"text": "His religious seriousness was beyond question; the defeat had been interpreted as evidence of religious neglect.", "isCorrect": true, "rationale": "The text says: 'the Romans interpreted the defeat as evidence of religious neglect. They turned, in their crisis, to a man whose religious seriousness was beyond question. They appointed Fabius dictator.'"}, {"text": "He volunteered for the role and forced the Senate to accept him.", "isCorrect": false, "rationale": "The Senate and people elevated him; he did not seize the dictatorship."}, {"text": "His youth and energy promised aggressive prosecution of the war.", "isCorrect": false, "rationale": "Fabius was sixty years old, and the text says his strategy was specifically not aggressive."}]}, {"question": "What was Fabius's strategy after being appointed dictator, and what was the Roman public's reaction?", "options": [{"text": "He marched directly on Hannibal's army and engaged him at Gerunium.", "isCorrect": false, "rationale": "Fabius refused the open battle Hannibal was hoping for."}, {"text": "He shadowed Hannibal everywhere, occupying the heights and harassing supplies but always declining decisive engagement — the public called him Cunctator, the Delayer, as an insult.", "isCorrect": true, "rationale": "The Life states exactly: 'he shadowed Hannibal everywhere through Italy, occupying the heights, threatening Hannibal's supply lines, harassing his foragers, but always declining the decisive engagement Hannibal was hoping for. The Roman public was disgusted... They began to call him Cunctator.'"}, {"text": "He retreated all the way to Sicily to fortify and wait.", "isCorrect": false, "rationale": "Fabius stayed in Italy shadowing Hannibal; he did not retreat to Sicily."}, {"text": "He challenged Hannibal to single combat to spare Roman lives.", "isCorrect": false, "rationale": "There is no single combat; this is not Plutarch's account."}]}, {"question": "What political maneuver elevated Minucius to equal command with Fabius?", "options": [{"text": "Fabius voluntarily resigned half his powers as a peace offering.", "isCorrect": false, "rationale": "Fabius did not voluntarily resign; the people forced the split."}, {"text": "Minucius agitated openly for engagement, and the people elevated him to equal command — splitting the army in two.", "isCorrect": true, "rationale": "Plutarch records: 'his cavalry commander Minucius, ambitious and impatient, agitated openly for engagement; the people elevated Minucius to equal command with Fabius, splitting the army in two.'"}, {"text": "Minucius bribed the augurs to declare a religious necessity.", "isCorrect": false, "rationale": "There is no bribery of augurs in the passage."}, {"text": "The Senate appointed Minucius after Fabius was wounded.", "isCorrect": false, "rationale": "Fabius was not wounded; the elevation was political pressure from the people."}]}, {"question": "Plutarch's view of Fabius's strategy is described as 'unambiguous.' What is it?", "options": [{"text": "It was the wrong strategy, but politically necessary.", "isCorrect": false, "rationale": "Plutarch's view is that it was the right strategy, not wrong."}, {"text": "It was the right strategy: Hannibal could not be defeated in a single battle, but he could be defeated by time.", "isCorrect": true, "rationale": "The text states: 'Plutarch's view of Fabius's strategy is unambiguous. It was the right strategy. Hannibal could not be defeated in a single battle... What Hannibal could be defeated by was time.'"}, {"text": "It was successful only because of unrelated political luck.", "isCorrect": false, "rationale": "Plutarch credits Fabius's strategy directly with wearing Hannibal down."}, {"text": "It was a moral compromise that Plutarch criticizes.", "isCorrect": false, "rationale": "Plutarch admires the strategy and the man; there is no moral criticism here."}]}, {"question": "In Plutarch's account, what was the most famous moment of Fabius's career?", "options": [{"text": "His triumph over the Ligurians as consul.", "isCorrect": false, "rationale": "The Ligurian triumph is mentioned but is not the moral high point of the Life."}, {"text": "The rescue of Minucius from Hannibal's trap, when he could have stood by and watched a rival's army be destroyed.", "isCorrect": true, "rationale": "Plutarch calls this the central moral moment: Fabius marched at once to relieve Minucius and rescued his army, combining 'the highest valor, wisdom, and humanity.' After the rescue Minucius saluted Fabius publicly as Father and confessed Fabius's stability and prudence had saved them all."}, {"text": "His final speech in the Senate against Scipio's African strategy.", "isCorrect": false, "rationale": "Plutarch presents the Scipio dispute as Fabius's one major error, not as the moral high point."}, {"text": "His personal duel with Hannibal under truce.", "isCorrect": false, "rationale": "No such duel occurs in the Life."}]}, {"question": "How does Plutarch characterize Fabius's opposition to Scipio's invasion of Africa?", "options": [{"text": "A wise and decisive intervention that delayed the African campaign to its benefit.", "isCorrect": false, "rationale": "Plutarch records that Scipio's strategy worked and that Fabius was wrong to oppose it."}, {"text": "The one major error of his career — Scipio's strategy worked, and Fabius had opposed it from principled caution.", "isCorrect": true, "rationale": "The text says: 'This was the great disagreement of Fabius's career. He was wrong. Scipio's strategy worked, and he had opposed it. Plutarch handles this delicately: a man who has been right for two decades is allowed one major error of judgment, especially if his opposition was based on principled caution rather than personal jealousy.'"}, {"text": "A purely envious attempt to keep a younger general from glory.", "isCorrect": false, "rationale": "Plutarch is careful to attribute the opposition to principled caution, not personal jealousy."}, {"text": "A successful blocking action that delayed but never prevented the campaign.", "isCorrect": false, "rationale": "The Senate sided with Scipio and the invasion proceeded; Fabius lost the political fight."}]}, {"question": "What contrast does Plutarch draw between Pericles and Fabius at the end of the Life?", "options": [{"text": "Pericles built brilliance; Fabius prevented disaster — different virtues, both great.", "isCorrect": true, "rationale": "The Life closes: 'Plutarch's Fabius is the model of slow, patient Roman virtue. Where Pericles was elevated, Fabius is steady. Where Pericles persuaded by eloquence, Fabius persuaded by example. Where Pericles built up Athens to a peak of brilliance, Fabius kept Rome from disaster. Both were great men; their greatness lay in opposite virtues.'"}, {"text": "Pericles was a better leader in war; Fabius was a better leader in peace.", "isCorrect": false, "rationale": "Both led in war; the contrast Plutarch draws is between brilliance and steadiness, not war and peace."}, {"text": "Pericles was loved by the people; Fabius was hated to the end.", "isCorrect": false, "rationale": "Fabius was eventually honored by every order of Roman society, with private contributions for his funeral."}, {"text": "Pericles was rich and Fabius was poor.", "isCorrect": false, "rationale": "Plutarch does not draw a wealth contrast in this Life."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
