    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Constitutions, Religion, and the Engineered Order</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the principal distinction Plutarch draws between a founder (such as Theseus or Romulus) and a lawgiver (such as Lycurgus or Numa)?", "options": [{"text": "The founder calls the city into being; the lawgiver comes after and tells the new community what kind of community it is going to be.", "isCorrect": true, "rationale": "Plutarch's framing in the chapter introduction explicitly identifies the founders as bringing cities into existence while the lawgivers make their cities stand."}, {"text": "The founder rules with divine sanction, while the lawgiver rules by force of arms.", "isCorrect": false, "rationale": "Both figures may claim divine sanction (Lycurgus at Delphi, Numa via Egeria) and both surrendered personal power; the distinction is temporal, not religious."}, {"text": "The founder writes down statutes; the lawgiver imposes oral tradition.", "isCorrect": false, "rationale": "Plutarch makes no such distinction; Lycurgus in fact refused to write his laws, while Numa's institutions were embedded in priesthoods and calendars."}, {"text": "The founder governs in war; the lawgiver governs only in peace.", "isCorrect": false, "rationale": "Lycurgus created the most warlike state in Greek history; the war-peace contrast applies to the engineered orders, not the founder/lawgiver distinction."}], "id": "q01"}, {"question": "Which Greek and Latin terms does the text give for 'lawgiver' as a particular kind of political figure?", "options": [{"text": "Nomothetes (Greek) and legum lator (Latin).", "isCorrect": true, "rationale": "These are the technical terms identified in the section: a single mind imposing a constitutional shape on a people living unsystematically."}, {"text": "Basileus (Greek) and rex sacrorum (Latin).", "isCorrect": false, "rationale": "Basileus means king and rex sacrorum is a Roman priestly office; neither names the lawgiver as such."}, {"text": "Archon (Greek) and dictator (Latin).", "isCorrect": false, "rationale": "These name magistracies of ordinary governance, not the constitutional designer."}, {"text": "Demiurgos (Greek) and pontifex (Latin).", "isCorrect": false, "rationale": "Demiurgos means craftsman or magistrate; pontifex is a priestly title. Neither is the lawgiver-term Plutarch uses."}], "id": "q02"}, {"question": "What characterizes the 'pathos' of the lawgiver's situation, according to the chapter introduction?", "options": [{"text": "He must persuade a free people to accept restraints he himself will not live to enforce.", "isCorrect": true, "rationale": "The text says a lawgiver succeeds by binding the future and that the discipline he creates must hold once he is gone."}, {"text": "He must conquer his own people in battle before he can impose laws on them.", "isCorrect": false, "rationale": "Lycurgus and Numa both surrendered personal power; neither is described as conquering his people militarily."}, {"text": "He must be of foreign birth and refuse citizenship in the city he reforms.", "isCorrect": false, "rationale": "Lycurgus was Spartan royalty; only Numa was an outsider. Foreign birth is not the defining pathos."}, {"text": "He must outlive every member of his original assembly so no opposition remains.", "isCorrect": false, "rationale": "The opposite is the case: the lawgiver dies and his work must hold afterward."}], "id": "q03"}, {"question": "According to the section, what did Lycurgus engineer, and what was Numa's parallel engineering project?", "options": [{"text": "Lycurgus engineered a society of equals; Numa engineered a society of pious citizens.", "isCorrect": true, "rationale": "These are the formulas the introduction uses to summarize the two engineered orders that the chapter will compare."}, {"text": "Lycurgus engineered an empire of conquest; Numa engineered a confederation of allies.", "isCorrect": false, "rationale": "Neither lawgiver pursued empire; both worked inward on their cities' internal shape."}, {"text": "Lycurgus engineered a society of philosophers; Numa engineered a society of merchants.", "isCorrect": false, "rationale": "Sparta was not a society of philosophers, and Numa's Rome was deliberately turned away from commerce toward worship."}, {"text": "Lycurgus engineered a society of farmers; Numa engineered a society of priests.", "isCorrect": false, "rationale": "Spartan citizens were soldiers supported by helot labor, not farmers; Numa created priesthoods but most Romans were not priests."}], "id": "q04"}, {"question": "Which three contrasts does the chapter introduction tell the reader to watch for between Lycurgus and Numa?", "options": [{"text": "Coercion vs. persuasion; war vs. peace; education vs. religion.", "isCorrect": true, "rationale": "These are the three contrasts explicitly enumerated in the section's framing of the chapter's theme."}, {"text": "Wealth vs. poverty; nobility vs. commons; Greek vs. Roman.", "isCorrect": false, "rationale": "These contrasts are not the framing axes the introduction sets up."}, {"text": "Force vs. cunning; democracy vs. monarchy; oracle vs. nymph.", "isCorrect": false, "rationale": "While both lawgivers used divine claims, these are not the three axes the introduction lists."}, {"text": "Sea vs. land; trade vs. tribute; foreign vs. native.", "isCorrect": false, "rationale": "These categories appear nowhere in the introduction's enumeration."}], "id": "q05"}, {"question": "What is unusual about the temple of Janus during Numa's reign, and what does it symbolize?", "options": [{"text": "Its gates remained shut for his entire forty-three-year reign — the Roman symbol of universal peace — and were shut only twice more in the next seven centuries.", "isCorrect": true, "rationale": "The introduction notes both the duration of the peace and the rarity of the closure in subsequent Roman history."}, {"text": "Its gates were thrown open for the first time, symbolizing Rome's new readiness for permanent war.", "isCorrect": false, "rationale": "Open gates of Janus meant war; Numa's reign was the unprecedented period of shut gates, signifying peace."}, {"text": "Numa demolished the temple as a sign that Rome had outgrown its old gods.", "isCorrect": false, "rationale": "Numa expanded Roman religion; he did not demolish temples."}, {"text": "The temple was rededicated to Vesta to mark Numa's preference for hearth over warfare.", "isCorrect": false, "rationale": "Numa established the Vestal Virgins, but Janus and Vesta were distinct cults; he did not rededicate one to the other."}], "id": "q06"}, {"question": "What does the introduction identify as the 'cement' of Lycurgus's constitution, and what was the corresponding cement of Numa's?", "options": [{"text": "Education (the agoge) bound Lycurgus's laws into the next generation; religion (piety) bound Numa's.", "isCorrect": true, "rationale": "The introduction signals that Plutarch's synkrisis will turn on which of these two cements lasted longer."}, {"text": "Iron money bound Lycurgus's laws; the Vestal fire bound Numa's.", "isCorrect": false, "rationale": "These are specific institutions but the introduction names education and religion as the broader binding forces."}, {"text": "Oaths of citizenship bound Lycurgus's laws; tribute to the gods bound Numa's.", "isCorrect": false, "rationale": "Spartans did swear oaths, but the cement Plutarch will weigh is the education-religion axis."}, {"text": "Foreign wars bound Lycurgus's laws; foreign treaties bound Numa's.", "isCorrect": false, "rationale": "Lycurgus's discipline was internal habit, not external war; Numa avoided wars rather than relying on them."}], "id": "q07"}, {"question": "How does the introduction characterize the historical certainty of Lycurgus and Numa as figures?", "options": [{"text": "Both stand at the edge of legend; Lycurgus's date cannot be fixed and Numa, while on slightly firmer ground, has little verifiable biography, though the institutions attributed to him are genuinely archaic.", "isCorrect": true, "rationale": "The text describes the chronological problem in exactly these terms, citing Plutarch's own opening confession of uncertainty."}, {"text": "Both are securely dated to the fifth century BC through epigraphic evidence.", "isCorrect": false, "rationale": "Lycurgus is usually placed in the eighth or seventh century BC, and Numa's reign is dated 715–673 BC."}, {"text": "Only Lycurgus is historical; Numa is universally regarded as a fiction.", "isCorrect": false, "rationale": "The introduction in fact says Numa is on slightly firmer ground than Lycurgus."}, {"text": "Both are confirmed by surviving statutes signed in their own hands.", "isCorrect": false, "rationale": "No such documents survive; Plutarch notes that scarcely anything about Lycurgus goes uncontested by some historian."}], "id": "q08"}, {"question": "Why does the chapter say the city's legend of its lawgiver is, in effect, the city's self-portrait?", "options": [{"text": "Because the Spartans believed they were the city Lycurgus made them and the Romans believed they were the city Numa made them, so what the cities became through that belief matters more than whether the men strictly existed.", "isCorrect": true, "rationale": "The introduction explicitly draws this conclusion, paralleling the lesson taken from Theseus and Romulus."}, {"text": "Because every city in the ancient world painted murals of its lawgiver in its central temple.", "isCorrect": false, "rationale": "The introduction makes a literary, not a visual, claim about civic self-portraiture."}, {"text": "Because the lawgivers personally commissioned biographies of themselves while alive.", "isCorrect": false, "rationale": "Lycurgus refused to write his laws and Numa's books were buried with him; neither commissioned a biography."}, {"text": "Because the names 'Lycurgus' and 'Numa' literally translate as 'self-portrait' in Greek and Latin.", "isCorrect": false, "rationale": "Neither name has that meaning; the claim is metaphorical, about civic self-understanding."}], "id": "q09"}, {"question": "Who serves as the Second Witness for this chapter, and why is no comparable witness available for the Greek side?", "options": [{"text": "Livy serves as the Second Witness for Numa; no ancient narrative of Lycurgus survives at the length and detail of Livy's account, though shorter discussions exist in Xenophon and Aristotle.", "isCorrect": true, "rationale": "The introduction names Livy explicitly and notes that for Lycurgus, Plutarch's narrative biography is essentially on its own."}, {"text": "Tacitus serves as the Second Witness for both lives, replacing Livy in the Plutarchan tradition.", "isCorrect": false, "rationale": "Tacitus wrote about imperial Rome, not the legendary kings, and is not the Second Witness here."}, {"text": "Herodotus serves as the Second Witness for Lycurgus, and no one is named for Numa.", "isCorrect": false, "rationale": "The reverse is closer to the truth: Livy is the witness on the Roman side and the Greek side has no comparable narrative."}, {"text": "Pausanias serves as the Second Witness for Lycurgus and Suetonius for Numa.", "isCorrect": false, "rationale": "Neither author is named in the introduction's discussion of Second Witnesses."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
