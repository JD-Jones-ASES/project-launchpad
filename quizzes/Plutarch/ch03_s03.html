        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Numa Pompilius</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Roman tradition, what role did Numa Pompilius play alongside Romulus in shaping the Roman people?", "options": [{"text": "Romulus founded the city with his sword; Numa taught the city how to live with his piety. Without Numa, the Romans believed, they would have remained a band of soldiers.", "isCorrect": true, "rationale": "The opening of the section formulates Roman self-understanding in exactly these terms — a people made by two men, sword and piety."}, {"text": "Romulus drafted the laws and Numa enforced them as the first praetor.", "isCorrect": false, "rationale": "Numa is portrayed not as Romulus's enforcer but as his religious complement, softening the warrior-city Romulus had built."}, {"text": "Both men ruled jointly as co-kings of the early city.", "isCorrect": false, "rationale": "Romulus's only co-king was the Sabine Tatius; Numa was elected after Romulus's disappearance."}, {"text": "Romulus and Numa were brothers who divided the kingship between war and peace.", "isCorrect": false, "rationale": "Numa was a Sabine of Cures, unrelated to Romulus; he was elected by acclamation across both Roman and Sabine factions."}]}, {"question": "What was the political situation in Rome when Numa was chosen to be king?", "options": [{"text": "Romulus had disappeared; the city was divided between Romulus's Romans and Tatius's Sabines, who had fused but not melted into one. To avoid civil war the senators ruled by rotation (the interregnum) while they searched for someone acceptable to both factions.", "isCorrect": true, "rationale": "Plutarch describes the interregnum and the inter-factional search exactly this way."}, {"text": "Romulus had been overthrown by a senatorial conspiracy and the senate elected Numa as its puppet.", "isCorrect": false, "rationale": "Plutarch alludes to the senatorial suspicion but Numa is not portrayed as a puppet; he was sought as an acceptable compromise."}, {"text": "The city was at war with the Sabines and Numa was offered the throne as a peace settlement.", "isCorrect": false, "rationale": "Numa was a Sabine from Cures, but the situation was an internal interregnum after Romulus's disappearance, not a peace treaty."}, {"text": "Rome was leaderless after a plague had killed the senate.", "isCorrect": false, "rationale": "No plague is mentioned; the interregnum followed Romulus's disappearance."}]}, {"question": "How did Numa initially respond to the offer of the kingdom?", "options": [{"text": "He refused. He said every alteration of a man's life is dangerous, that his love of retirement, study, and peace marked him as unfit for a city whose needs are 'rather for a captain than for a king', and that he would be a laughing-stock teaching worship and justice to such a people.", "isCorrect": true, "rationale": "Plutarch presents this refusal as a small masterpiece of self-knowledge; Numa understood that Rome wanted a war-king and that what he had to offer might not be what the city needed."}, {"text": "He accepted immediately and led an army of Sabines into Rome to consolidate his throne.", "isCorrect": false, "rationale": "Plutarch is at pains to emphasize Numa's reluctance and his pacific instincts."}, {"text": "He demanded a co-regency with one of his brothers before he would consent.", "isCorrect": false, "rationale": "No such demand appears in Plutarch's account."}, {"text": "He said he would consult the oracle at Delphi before making any reply.", "isCorrect": false, "rationale": "Numa's divine authority is the local goddess Egeria, not Delphi; the auguries confirming his kingship were Roman."}]}, {"question": "What was Numa's first political act after being crowned king?", "options": [{"text": "He dismissed Romulus's three-hundred-man bodyguard, the Celeres, saying he would not distrust those who had trusted him with the throne.", "isCorrect": true, "rationale": "Plutarch presents this gesture as setting the tone for the reign: a king who would rule by trust rather than by force."}, {"text": "He minted a new gold coin bearing his profile.", "isCorrect": false, "rationale": "Numa is not associated with coinage reform; the iron money is Lycurgus's project."}, {"text": "He executed three of Romulus's senators on charges of conspiracy.", "isCorrect": false, "rationale": "Numa is uniformly portrayed as gentle and bloodless; no such executions occur in the Life."}, {"text": "He marched the army out to the field to lay down arms ceremonially.", "isCorrect": false, "rationale": "Plutarch's first act is the dismissal of the Celeres, a domestic gesture, not a military ceremony."}]}, {"question": "What was Numa's central political insight about the men of early Rome?", "options": [{"text": "That they were 'hard and iron', shaped by perpetual war, and that mere statute would not bend them — but the persistent presence of the gods in daily life, the sense of being always observed and required to behave, might.", "isCorrect": true, "rationale": "Plutarch describes Numa's strategy as religious reform pursued with a steady political purpose: to soften Rome's iron temper by giving every day a sacred shape."}, {"text": "That they were ungovernable except by terror.", "isCorrect": false, "rationale": "Numa avoided force entirely; terror is not part of his program."}, {"text": "That they needed material wealth before they could be civilized.", "isCorrect": false, "rationale": "Numa worked on Roman habits through religion, not through commerce or wealth."}, {"text": "That they should be conscripted into priesthoods to keep them out of war.", "isCorrect": false, "rationale": "Numa founded priesthoods but did not conscript the citizen body into them; the religious reform reshaped public worship, not citizen occupations."}]}, {"question": "What does Plutarch claim about Numa's religion that aligns it with the doctrine of Pythagoras?", "options": [{"text": "Numa forbade representing God in the form of man or beast — Rome had no painted or graven image of a deity for its first 170 years — and his sacrifices were bloodless, consisting of flour, wine, and the least costly offerings.", "isCorrect": true, "rationale": "Plutarch is at pains to align Numa with Greek philosophy, presenting him as intelligible to a Greek reader as a kind of philosopher-king. Pythagoras conceived the first principle as transcending sense and passion, invisible and incorrupt."}, {"text": "Numa required citizens to abstain from beans and to keep silence for five years.", "isCorrect": false, "rationale": "These are Pythagorean ascetic practices but Plutarch does not impose them on Rome through Numa."}, {"text": "Numa taught the transmigration of souls and the music of the spheres.", "isCorrect": false, "rationale": "Plutarch's parallel is narrower: aniconic worship and bloodless sacrifice, plus the abstract conception of the divine."}, {"text": "Numa modeled the senate on Pythagoras's school in Croton.", "isCorrect": false, "rationale": "No such structural parallel is drawn; the affinity is in religious style, not political form."}]}, {"question": "What were the Vestal Virgins, and what was their service term?", "options": [{"text": "Six priestesses dedicated to Vesta, goddess of the hearth, charged with maintaining the sacred fire that symbolized the perpetual life of the city. They served thirty years under a vow of chastity — ten learning, ten doing, ten teaching — and held real public privileges, including the power to pardon a condemned man met by accident in the street.", "isCorrect": true, "rationale": "Plutarch describes both the structure and the privileges, including the somber penalty of being buried alive for a broken vow."}, {"text": "A college of married women who supervised the festivals of Vesta during the planting season.", "isCorrect": false, "rationale": "The Vestals were under a strict vow of chastity, not married."}, {"text": "Twelve priestesses of Diana who served for life as personal attendants of the king.", "isCorrect": false, "rationale": "Wrong number, wrong goddess, wrong term — the Vestals served Vesta for thirty years."}, {"text": "An auxiliary military order of women who guarded the city's walls.", "isCorrect": false, "rationale": "The Vestal Virgins were religious, not military, and were dedicated to the hearth-fire rather than walls."}]}, {"question": "What were the Fecials, and what religious-political function did they serve?", "options": [{"text": "A college of priestly heralds who alone had authority to declare war. They negotiated with the foreign power first; only after they ritually pronounced negotiation finished and stained the spear could Rome lawfully take up arms — an attempt to bind Roman aggression to a religious procedure.", "isCorrect": true, "rationale": "Plutarch describes the institution exactly this way, and notes sadly that later Romans found ways around the procedure."}, {"text": "Twelve dancers who carried sacred shields through the city in March.", "isCorrect": false, "rationale": "These are the Salii, not the Fecials."}, {"text": "The college that supervised the temple of Janus and decided when to open or close its gates.", "isCorrect": false, "rationale": "The Fecials were heralds, not custodians of Janus; the gates opened or shut according to whether Rome was at war or peace."}, {"text": "Priests responsible for interpreting the flight of birds as omens.", "isCorrect": false, "rationale": "That function belonged to the augurs; the Fecials negotiated and ritually declared war."}]}, {"question": "What does Livy add to Plutarch's portrait of Numa that the section flags as worth comparing?", "options": [{"text": "Livy is more openly cynical about Numa's religious claims, saying plainly that Numa 'pretends' to nightly meetings with the goddess Egeria so that his innovations might gain credibility 'without some fiction of a miracle' — and he emphasizes the political success of the program more directly than Plutarch.", "isCorrect": true, "rationale": "The section explicitly contrasts the two authors: the Roman is the more skeptical, the Greek the gentler — Plutarch allows that perhaps the gods do feel affection toward men 'in the form of care and solicitude for their virtue'."}, {"text": "Livy denies that Numa ever existed and treats him as a pure invention of the Sabines.", "isCorrect": false, "rationale": "Livy treats Numa as historical and recounts his reign at length; he is skeptical of the Egeria story but not of the man."}, {"text": "Livy claims Numa was secretly a Greek philosopher trained at the Pythagorean school.", "isCorrect": false, "rationale": "Livy actually rejects the Pythagorean connection on chronological grounds; Plutarch is the one who develops the affinity."}, {"text": "Livy presents Numa as a warlike king who only later turned to peace.", "isCorrect": false, "rationale": "Both authors agree Numa's reign was peaceful from the beginning; the closed gates of Janus are common to both."}]}, {"question": "How does Plutarch describe Numa's death and what happened to the sacred books buried with him?", "options": [{"text": "He ruled forty-three years, died around 673 BC in old age, was mourned by Romans and Sabines who had become indistinguishable under him, and was buried (by his own wish, without cremation) in a stone tomb on the Janiculum with his sacred books. The tomb was discovered in 181 BC; the senate judged the books dangerous to public religion and burned them.", "isCorrect": true, "rationale": "Plutarch reports this without comment; the section observes that the lawgiver's words, like his body, were returned to the earth."}, {"text": "He was assassinated by Romulus's surviving partisans and his books were lost in the chaos.", "isCorrect": false, "rationale": "Plutarch's account is uniformly gentle; no assassination occurs."}, {"text": "He abdicated and retired to Cures, where his books were preserved as Roman scripture.", "isCorrect": false, "rationale": "Numa died in office and his books were burned, not preserved."}, {"text": "The books survived intact and are quoted at length in Plutarch's Life.", "isCorrect": false, "rationale": "Plutarch reports that the books were burned by the senate; he does not quote them."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
