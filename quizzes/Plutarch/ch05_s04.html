    };

        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Lost Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the historical status of Plutarch's synkrisis of Themistocles and Camillus?", "options": [{"text": "Plutarch never wrote one for this pair.", "isCorrect": false, "rationale": "The manuscripts are clear that a comparison originally followed the pair; the issue is loss, not non-existence."}, {"text": "It was deliberately destroyed by Christian copyists in the Middle Ages.", "isCorrect": false, "rationale": "The text gives no such deliberate-destruction story; it describes the comparison as 'lost in the early Middle Ages,' along with three others, not as suppressed."}, {"text": "Plutarch wrote one — the manuscripts confirm a closing comparison followed the pair — but the text was lost in the early Middle Ages, along with three other lost synkriseis (Pyrrhus-Marius, Alexander-Caesar, and Phocion-Cato the Younger).", "isCorrect": true, "rationale": "The text states exactly this: we know he wrote one (manuscripts are clear), but the text was lost in the early Middle Ages, and names the three other lost-synkrisis pairings alongside it."}, {"text": "It survives complete and is included in this section.", "isCorrect": false, "rationale": "The defining feature of this section is precisely that the synkrisis does not survive."}]}, {"question": "On which Plutarchan axis would the verdict likely have tilted toward Themistocles?", "options": [{"text": "On the treatment of defeated enemies.", "isCorrect": false, "rationale": "On treatment of defeated enemies, the text says, the round goes to Camillus (the prayer at Veii, the Falerian schoolmaster)."}, {"text": "On the methods used.", "isCorrect": false, "rationale": "On methods (bribery, deception, false oracles vs. the schoolmaster scene), the verdict tilts toward Camillus."}, {"text": "On origin and education — both rose by their own merits, but Themistocles started lower from a more obscure birth, so the rise is more impressive.", "isCorrect": true, "rationale": "The text says that on this axis, since both rose by their own merits but Themistocles started lower, 'the verdict would have tilted toward Themistocles.'"}, {"text": "On the manner of the ending.", "isCorrect": false, "rationale": "On the shape of the end, the text says the difference 'favors Camillus' — he died at home, the second founder; Themistocles ended in Persian service."}]}, {"question": "What does the text identify as the single greatest action of each man's life?", "options": [{"text": "Themistocles's tutoring of Pericles; Camillus's founding of Veii.", "isCorrect": false, "rationale": "Neither of these is the decisive act in the Lives; Themistocles did not tutor Pericles in this sense, and Camillus did not found Veii — he captured it."}, {"text": "Themistocles's interpretation of the 'walls of wood' oracle; Camillus's victory over the Volscians.", "isCorrect": false, "rationale": "The oracle interpretation and the Volscian victories are important moments, but the text names a different pair as the single greatest acts."}, {"text": "Themistocles's victory at Salamis; Camillus's recovery of Rome from the Gauls — both saved their cities from existential threat, though Salamis was the immediate deliverance of all Greece, not just Athens.", "isCorrect": true, "rationale": "The text identifies Salamis and the recovery of Rome from the Gauls as the single decisive acts and notes that Salamis was the wider deliverance — of all Greece, not Athens alone."}, {"text": "Themistocles's death; Camillus's exile.", "isCorrect": false, "rationale": "Endings and exiles are separate axes; the 'single decisive act' axis is about each man's salvific public action."}]}, {"question": "Where does the text say the verdict on 'treatment of defeated enemies' would land, and why?", "options": [{"text": "Even, because both showed equal restraint.", "isCorrect": false, "rationale": "The text says the round goes to Camillus; it does not call it even."}, {"text": "Toward Themistocles, who pioneered humane treatment of Persians.", "isCorrect": false, "rationale": "The text gives the opposite verdict: Themistocles left 'no comparable scenes of restraint in victory.'"}, {"text": "Toward Camillus, because of his weeping at the fall of Veii, his return of the Falerian schoolchildren, and his punishment of the treacherous schoolmaster; Themistocles left no comparable scenes of restraint.", "isCorrect": true, "rationale": "The text awards this round to Camillus on exactly these grounds — the prayer and tears at Veii, the schoolmaster scene, and Themistocles's lack of comparable scenes."}, {"text": "Toward Brennus, because neither Greek nor Roman treated enemies well.", "isCorrect": false, "rationale": "Brennus is not a party to the synkrisis."}]}, {"question": "What does the text say about the contrast in their exiles?", "options": [{"text": "Both betrayed their cities and never returned.", "isCorrect": false, "rationale": "Both 'refused, in exile, to betray their cities,' which is precisely what makes the comparison interesting."}, {"text": "Themistocles was assassinated in Argos; Camillus died in Etruria.", "isCorrect": false, "rationale": "Themistocles fled past Argos to Persia; Camillus eventually returned and died in Rome."}, {"text": "Both were exiled by ungrateful cities and both refused to betray their cities, but Themistocles ended in service to Persia (the power he had defeated) while Camillus mobilized a force from Ardea against the Gauls and was recalled; the difference favors Camillus.", "isCorrect": true, "rationale": "The text describes exactly this asymmetric pattern and says 'the difference, on most readings, favors Camillus.'"}, {"text": "Camillus served the Gauls and was therefore the more compromised.", "isCorrect": false, "rationale": "The text gives the opposite: Camillus attacked the Gauls from Ardea; it was Themistocles who ended in foreign service."}]}, {"question": "What is the text's best guess about the overall verdict Plutarch's lost synkrisis would have rendered?", "options": [{"text": "Even — Plutarch would have declared it impossible to decide.", "isCorrect": false, "rationale": "The text says Plutarch's surviving synkriseis generally do render a verdict; it offers a probable tilt, not an admission of impossibility."}, {"text": "Strongly toward Themistocles, on the strength of Salamis.", "isCorrect": false, "rationale": "The text concedes Themistocles was perhaps the more brilliant strategist but says the overall tilt is toward Camillus."}, {"text": "Probably toward Camillus, given Plutarch's known preferences for clean methods, restraint in victory, and a later life that matches the earlier promise — Themistocles was perhaps the more brilliant strategist, but Camillus was the more admirable man.", "isCorrect": true, "rationale": "The text states exactly this — 'the balance would probably have tilted toward Camillus,' and articulates Plutarch's three known preferences (clean methods, restraint, consistent later years)."}, {"text": "Plutarch would have refused to compare them at all because they belonged to different eras.", "isCorrect": false, "rationale": "Plutarch's whole method is to compare across eras; the chronological gap is a feature, not an obstacle."}]}, {"question": "What does the text say a student should NOT do when writing the synkrisis?", "options": [{"text": "Cite incidents from each Life.", "isCorrect": false, "rationale": "Citing two specific incidents from each Life is one of the explicit requirements, not a prohibition."}, {"text": "Simply rehearse the likely Plutarchan verdict — the point is to do the work Plutarch did not leave behind, with your own axis, evidence, and verdict.", "isCorrect": true, "rationale": "The text explicitly says: 'You should not simply rehearse the likely Plutarchan verdict.... that requires you to bring your own axis, your own evidence, your own verdict to the page.'"}, {"text": "State the axis in the first sentence.", "isCorrect": false, "rationale": "Stating the axis in the first sentence is one of the four explicit requirements."}, {"text": "Render a clear judgment.", "isCorrect": false, "rationale": "Rendering judgment is one of the four explicit requirements; refusing to do so would fail the assignment."}]}, {"question": "What are the four explicit requirements of the writesynkrisis essay?", "options": [{"text": "(a) Compare three figures, (b) avoid all evidence, (c) match Plutarch's verdict, (d) be over 1,500 words.", "isCorrect": false, "rationale": "None of these matches the text — the comparison is two-figure, evidence is required, the Plutarchan verdict is precisely not the target, and the cap is under 1,000 words."}, {"text": "(a) State the axis in the first sentence, (b) cite two specific incidents from each Life and name them, (c) render judgment with the verdict tipped and supported, (d) stay under 1,000 words.", "isCorrect": true, "rationale": "The text gives exactly this enumeration as the essay's must-do list."}, {"text": "(a) Read Herodotus first, (b) include Livy in the bibliography, (c) write in Greek, (d) submit by hand.", "isCorrect": false, "rationale": "None of these are requirements of the essay; the text's list is about argumentative structure and length."}, {"text": "(a) Disagree with Plutarch, (b) reach a tied verdict, (c) cite no incidents, (d) write 2,000 words.", "isCorrect": false, "rationale": "Disagreement is not required, a tie is not required, citations are required, and the word cap is well under 2,000."}]}, {"question": "Which of these is one of the four possible axes the text proposes for the essay?", "options": [{"text": "The military innovation of trireme tactics versus mining tunnel siege.", "isCorrect": false, "rationale": "This is a real technological contrast, but it is not one of the four axes the text proposes; the prompt focuses on character and statesmanship."}, {"text": "The brilliance of the strategist versus the integrity of the methods — Themistocles's strategic genius is perhaps unmatched, but his methods were sometimes unscrupulous; Camillus was less inventive but more honorable.", "isCorrect": true, "rationale": "The text gives this as the first of the four possible axes, framing it exactly as the question states."}, {"text": "Athens versus Rome as forms of government.", "isCorrect": false, "rationale": "Constitutional comparison is the topic of Chapter 9 in the book, not one of the proposed axes for this essay."}, {"text": "Foreign policy with Egypt versus foreign policy with Carthage.", "isCorrect": false, "rationale": "Neither Egypt nor Carthage is at issue in these Lives; the proposed axes concern the men themselves."}]}, {"question": "How is the writesynkrisis exercise in Chapter 5 deliberately different in difficulty from those in Chapters 2-4?", "options": [{"text": "It is shorter, because there is no Plutarchan text to engage.", "isCorrect": false, "rationale": "The exercise is more demanding, not less; the absence of a Plutarchan model is what raises the demand."}, {"text": "It is collaborative rather than individual.", "isCorrect": false, "rationale": "The text frames the exercise as individual: 'the synkrisis is yours alone, with Plutarch as the absent senior partner.'"}, {"text": "It is the first synkrisis the student writes without Plutarch's verdict as a model — by Chapter 5 the student has written three synkriseis with Plutarch as a model, and this is the moment to write one without him; 'Plutarch's silence is your opportunity.'", "isCorrect": true, "rationale": "The text says this exactly: 'By Chapter 5 you have written three synkriseis with Plutarch as a model. The fourth is the moment to write one without him,' and frames the silence as opportunity."}, {"text": "It must be written in Greek instead of English.", "isCorrect": false, "rationale": "The text imposes no such language requirement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
