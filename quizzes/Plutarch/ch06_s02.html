    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Pericles</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who were Pericles's parents, and why does Plutarch bother to mention them?", "options": [{"text": "His father was a poor farmer and his mother a foreigner — Pericles overcame disadvantage.", "isCorrect": false, "rationale": "The text says exactly the opposite: Pericles was born into the highest Athenian aristocracy."}, {"text": "His father Xanthippus was the general who won at Mycale in 479 BC, and his mother Agariste was the granddaughter of Cleisthenes.", "isCorrect": true, "rationale": "The Life states that Xanthippus won the naval victory at Mycale against the Persians in 479 BC and that Agariste was 'the granddaughter of Cleisthenes' — the late sixth-century reformer who established the democratic constitution Pericles would later expand."}, {"text": "His father was the philosopher Anaxagoras and his mother an Athenian priestess.", "isCorrect": false, "rationale": "Anaxagoras was Pericles's teacher, not his father."}, {"text": "His father was a Spartan envoy and his mother an Athenian queen.", "isCorrect": false, "rationale": "There were no Athenian queens, and Pericles's father was Athenian."}]}, {"question": "In the passage on Anaxagoras, Plutarch reports that the men of Pericles's time gave Anaxagoras a special nickname. What was it, and what did it signify?", "options": [{"text": "Nous — 'mind' or 'intelligence' — the ordering principle Anaxagoras introduced into Greek thought.", "isCorrect": true, "rationale": "The primary source passage reads: 'the men of those times called [him] by the name of Nous, that is, mind, or intelligence.' Anaxagoras was the philosopher who put Nous at the center of cosmology."}, {"text": "Logos — 'word' or 'reason' — the principle he taught to Pericles.", "isCorrect": false, "rationale": "Logos belongs to other philosophical traditions; the text specifically names Nous."}, {"text": "Sophos — 'wise man' — a title for any Athenian intellectual.", "isCorrect": false, "rationale": "Sophos is not the term in the passage. Plutarch is specific: Anaxagoras was called Nous."}, {"text": "Daimon — 'divine spirit' — a religious epithet.", "isCorrect": false, "rationale": "Plutarch's wording is exactly Nous, an intellectual nickname, not a religious one."}]}, {"question": "In the marketplace anecdote, what does Pericles do at the end of the day after being abused by 'some vile and abandoned fellow'?", "options": [{"text": "He orders the man arrested and prosecuted in court the next day.", "isCorrect": false, "rationale": "Pericles's whole reputation is built on not retaliating in this kind of incident."}, {"text": "He orders one of his servants to take a light and see the man safely home, since it has grown dark.", "isCorrect": true, "rationale": "The primary source says Pericles 'stepping into his house, it being by this time dark, he ordered one of his servants to take a light, and to go along with the man and see him safe home.'"}, {"text": "He delivers a public oration shaming the man before the assembly.", "isCorrect": false, "rationale": "The whole point of the story is silence and a small humane gesture, not a public reply."}, {"text": "He hires the man as a personal retainer to keep him quiet.", "isCorrect": false, "rationale": "There is no payment or hiring in the passage — only a servant with a light."}]}, {"question": "Why was Pericles initially afraid to enter public life, according to Plutarch?", "options": [{"text": "He had a stammer and could not deliver public speeches.", "isCorrect": false, "rationale": "Pericles's eloquence is what made him 'the Olympian'; speech impediment is not the reason given."}, {"text": "He looked, in face and figure, somewhat like the deposed tyrant Pisistratus, and Athenians literally checked the faces of public men against memories of him.", "isCorrect": true, "rationale": "The text says 'he looked, in face and figure, somewhat like the deposed tyrant Pisistratus, and the Athenians were sensitive to such resemblances.'"}, {"text": "He had been convicted of impiety as a young man.", "isCorrect": false, "rationale": "The text does not mention any conviction; Pericles served honorably in the military before entering politics."}, {"text": "His father had been ostracized and barred him from politics.", "isCorrect": false, "rationale": "Xanthippus had been a celebrated victor at Mycale; there is no such bar mentioned."}]}, {"question": "When Pericles entered politics he allied himself with the popular party (the demos). Plutarch suggests one motive was self-protective. What was it?", "options": [{"text": "The demos could legally protect him from prosecution as their leader.", "isCorrect": false, "rationale": "No such legal immunity is mentioned; the motive Plutarch gives is financial."}, {"text": "He could not match the personal wealth of his aristocratic rival Cimon, so he made the city itself the source of public benefits.", "isCorrect": true, "rationale": "The text says Pericles 'could not match the wealth of his aristocratic rival Cimon (who maintained popularity by personal generosity) and so chose instead to make the city itself the source of public benefits.'"}, {"text": "The aristocrats had attempted to assassinate him.", "isCorrect": false, "rationale": "There is no assassination plot in the passage."}, {"text": "His family had a hereditary religious claim on leading the demos.", "isCorrect": false, "rationale": "Hereditary religious claim is not the reason given; the text frames it as a strategic political choice."}]}, {"question": "Plutarch quotes Pericles as appearing in the Assembly 'at intervals only.' What metaphor does Plutarch use for this restraint?", "options": [{"text": "He held himself back like a tame falcon, returning only to his master's call.", "isCorrect": false, "rationale": "The metaphor in the text is the Salaminian galley, not a falcon."}, {"text": "He reserved himself 'like the Salaminian galley, for great occasions.'", "isCorrect": true, "rationale": "Plutarch writes that Pericles presented himself 'at intervals only,' not speaking to every business, 'reserving himself, like the Salaminian galley, for great occasions.'"}, {"text": "He acted like the sacred fire at Delphi, lit only on holy days.", "isCorrect": false, "rationale": "Delphi is not the metaphor used; the Salaminian galley is."}, {"text": "He guarded his speeches like a miser guards gold.", "isCorrect": false, "rationale": "Plutarch is more dignified than that — the comparison is to the ceremonial ship of state."}]}, {"question": "Pericles's rival Thucydides son of Melesias accused him of 'adorning his city like a vain woman with precious stones and statues and temples worth a thousand talents,' using money that belonged to the allies. What was Pericles's defense?", "options": [{"text": "He admitted the charge and apologized to the allies in a public letter.", "isCorrect": false, "rationale": "Pericles did not apologize; he won the political fight and the buildings went up."}, {"text": "If Athens was protecting the allies with her fleet, she had the right to use the contribution for whatever purpose seemed good — including buildings that would endure 'forever.'", "isCorrect": true, "rationale": "Plutarch records this as Pericles's characteristic defense: protection earned the right to use league funds as the city saw fit, including architectural projects meant to endure 'forever.'"}, {"text": "He claimed the buildings were paid for entirely out of his personal fortune.", "isCorrect": false, "rationale": "The whole controversy is about league money, not personal money; that is also why this matters."}, {"text": "He claimed the oracle of Delphi had commanded the construction.", "isCorrect": false, "rationale": "The defense is about the protection-tribute relationship, not divine command."}]}, {"question": "Pericles's strategy for the Peloponnesian War rested on a particular geographic feature of Athens. What was it?", "options": [{"text": "The high cliffs of the Acropolis were unconquerable by ladder.", "isCorrect": false, "rationale": "The Acropolis is fortified but Pericles's strategy was not a citadel defense."}, {"text": "The Long Walls connecting Athens to its port at Piraeus, allowing the city to withdraw from land battle and rely on the navy.", "isCorrect": true, "rationale": "The Life describes the strategy: 'withdraw the Athenian population behind the Long Walls connecting Athens to its port at Piraeus; let the Spartan invasions of Attica burn out year after year; rely on the navy to harass Spartan allies.'"}, {"text": "The natural moat formed by the Cephissus river.", "isCorrect": false, "rationale": "The Cephissus is not a defensive moat in the Life of Pericles."}, {"text": "The mountain range north of the city.", "isCorrect": false, "rationale": "Mountains are not the strategic feature; the Long Walls and the port are."}]}, {"question": "In Thucydides's Funeral Oration, Pericles makes the case for democracy as a way of life. Which of the following best captures one of its central political moves?", "options": [{"text": "Office is open to merit, not to birth or wealth.", "isCorrect": true, "rationale": "The text summarizes the Funeral Oration: 'The constitution is democratic — \"it is called a democracy.\" Office is open to merit, not birth or wealth. Private freedom and public obligation co-exist.'"}, {"text": "Office must rotate every year by lot, without exception.", "isCorrect": false, "rationale": "The text emphasizes merit-based office, not strict yearly rotation by lot."}, {"text": "All public business must be decided by unanimous consensus.", "isCorrect": false, "rationale": "Pericles celebrates open debate and majority decision, not unanimity."}, {"text": "Athens is governed by a council of philosopher-kings.", "isCorrect": false, "rationale": "That is Plato's Republic, not Pericles's democracy."}]}, {"question": "What were Pericles's reported last words, and what did he intend them to mean?", "options": [{"text": "'I have built Athens with my own hands' — a boast about his architecture.", "isCorrect": false, "rationale": "The actual last words were about restraint, not about building."}, {"text": "'In all my time no Athenian ever put on mourning because of me' — that his authority had never required killing a citizen by political prosecution.", "isCorrect": true, "rationale": "The text gives exactly this line, noting that 'in three decades of leadership' Pericles had not sent any citizen to his death by political prosecution. He wanted this to be the moral attached to his name."}, {"text": "'Beware Alcibiades' — a warning about his ambitious ward.", "isCorrect": false, "rationale": "The death scene in this Life closes on his self-evaluation, not a warning about a successor."}, {"text": "'Athens, you are immortal' — a final tribute to the city.", "isCorrect": false, "rationale": "The actual line is much more personal and moral, focused on his own record toward fellow citizens."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
