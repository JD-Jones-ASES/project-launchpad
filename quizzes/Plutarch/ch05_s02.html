    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Themistocles</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Plutarch say about Themistocles's birth, and how does the youth's character emerge despite it?", "options": [{"text": "He was born to a noble family of unbroken Athenian lineage, and his pedigree carried his early career.", "isCorrect": false, "rationale": "Plutarch describes his birth as 'somewhat too obscure to do him honor' — the opposite of a noble pedigree."}, {"text": "His father was respectable but undistinguished, his mother (in some accounts) a foreigner; Plutarch immediately turns from the obscure birth to a personality that made the obscurity irrelevant.", "isCorrect": true, "rationale": "The text says the father was respectable but undistinguished and the mother of irregular status, and that Plutarch proceeds directly from the obscure birth to the vehement, impetuous personality of the boy."}, {"text": "He was a slave who earned his freedom by saving his master at Marathon.", "isCorrect": false, "rationale": "Themistocles was a free Athenian citizen; the question of his status was about social obscurity, not slavery."}, {"text": "He was the orphan son of a Persian merchant adopted by an Athenian family.", "isCorrect": false, "rationale": "There is no such tradition; Plutarch describes him as Athenian-born to a citizen father."}], "id": "q01"}, {"question": "What did Themistocles's schoolmaster predict about him as a boy, and what did Plutarch make of the prediction?", "options": [{"text": "That he would be a great philosopher in the tradition of Anaxagoras.", "isCorrect": false, "rationale": "Themistocles in fact ignored what was said to improve him in sagacity; he was a man of practical political intelligence, not philosophical reflection."}, {"text": "That he was destined for the priesthood.", "isCorrect": false, "rationale": "Nothing in the Life concerns a priestly career; the schoolmaster's diagnosis is moral and political."}, {"text": "That he 'will be nothing small, but great one way or other, for good or else for bad' — and Plutarch endorses the diagnosis through the rest of the Life.", "isCorrect": true, "rationale": "The text quotes the schoolmaster's line directly and says Plutarch endorses the diagnosis: Themistocles would be great; the only question was for which."}, {"text": "That he was unsuited to politics and should pursue trade.", "isCorrect": false, "rationale": "The prediction is the opposite — that he would inevitably be a political figure of consequence."}], "id": "q02"}, {"question": "What did 'the trophy of Miltiades would not let him sleep' mean, and what does it reveal about Themistocles?", "options": [{"text": "That Themistocles resented Miltiades personally and plotted against him.", "isCorrect": false, "rationale": "The reaction is competitive ambition, not personal animosity; Themistocles wanted to do something greater, not to undo Miltiades."}, {"text": "That after the Athenian victory at Marathon (490 BC), Themistocles was haunted by Miltiades's victory monument — his ambition was triggered by other people's greatness and would demand a greater action of his own.", "isCorrect": true, "rationale": "The text quotes the line, names Marathon, and says the image captures Themistocles: his ambition was triggered by other people's greatness, and he would do something more extraordinary later."}, {"text": "That he was haunted by guilt for having missed the battle.", "isCorrect": false, "rationale": "Themistocles was present at Marathon but as a young man not yet in high office; the guilt reading is not the text's reading."}, {"text": "That he had dreams of being defeated, and the trophy was a nightmare.", "isCorrect": false, "rationale": "The trophy is a real monument; the loss of sleep is the public manifestation of ambition, not a dream sequence."}], "id": "q03"}, {"question": "How did Themistocles persuade the Athenians to spend the Laurium silver on a fleet?", "options": [{"text": "He warned them of an imminent Persian invasion and used the danger as the rationale.", "isCorrect": false, "rationale": "The Persian threat was not yet obvious. Plutarch says Themistocles 'could not yet propose alarm about a distant Persian invasion' — he framed the proposal differently."}, {"text": "He proposed building ships against the Aeginetans — a nearer-term rival — and got a hundred ships out of the silver, the fleet that would later fight Xerxes.", "isCorrect": true, "rationale": "The text quotes Plutarch directly: Themistocles proposed that the silver be spent on ships to make war against the Aeginetans, and a hundred ships were built; those same ships fought against Xerxes ten years later."}, {"text": "He gave half his personal fortune to convince the assembly.", "isCorrect": false, "rationale": "There is no such tradition; the persuasion was political, not financial."}, {"text": "He bribed the assembly with Persian gold.", "isCorrect": false, "rationale": "Themistocles had no Persian gold at this stage; the proposal was an Athenian-revenue decision, not a bribed one."}], "id": "q04"}, {"question": "What did Themistocles persuade the Athenians to do when Xerxes's army approached?", "options": [{"text": "To defend the Acropolis to the last man.", "isCorrect": false, "rationale": "Themistocles persuaded them to do the opposite — to abandon the city rather than defend it."}, {"text": "To request terms from Xerxes and become Persian subjects.", "isCorrect": false, "rationale": "Themistocles refused to medize. The strategy was abandonment plus naval battle, not surrender."}, {"text": "To abandon Athens — committing the city to Minerva, sending women, children, and slaves to Troezen and Salamis, and putting all fighting men on the ships.", "isCorrect": true, "rationale": "The text quotes Plutarch directly: Themistocles 'obtained a decree that the city should be committed to the protection of Minerva,' that fighting-age men should embark, and that families be sent away."}, {"text": "To attack the Persian army in central Greece before it could reach Athens.", "isCorrect": false, "rationale": "The text gives no such land-attack plan; the strategy depended on the navy at Salamis."}], "id": "q05"}, {"question": "What is the 'walls of wood' oracle, and how did Themistocles interpret it?", "options": [{"text": "A Delphic oracle warning Athens to build wooden palisades on its borders.", "isCorrect": false, "rationale": "The oracle was ambiguous; Themistocles argued precisely that the wooden-palisade reading would not save the city."}, {"text": "A Delphic oracle that spoke of 'walls of wood'; Themistocles argued, against the rival reading of a wooden palisade around the Acropolis, that the wall of wood was the fleet — providing religious sanction for evacuation.", "isCorrect": true, "rationale": "The text describes the oracle as 'genuinely ambiguous,' the rival reading as a palisade, and Themistocles's politically decisive interpretation as the fleet, providing religious cover for abandonment."}, {"text": "A line in Homer used by Athenian generals before every battle.", "isCorrect": false, "rationale": "It is a Delphic oracle, not a Homeric tag."}, {"text": "A prophecy of Cassandra that the city walls would burn.", "isCorrect": false, "rationale": "Cassandra is a Trojan figure, not a Delphic source for Athens."}], "id": "q06"}, {"question": "What was Sicinnus's role at Salamis?", "options": [{"text": "He was the Spartan admiral who agreed to fight.", "isCorrect": false, "rationale": "Sicinnus was Themistocles's slave, not a Spartan admiral; the Spartan in command was Eurybiades."}, {"text": "He was a personal slave of Themistocles, sent to Xerxes with a false message that the Greeks were about to break and run; Xerxes sealed off the strait, trapping his own fleet in the narrows where the Greeks won.", "isCorrect": true, "rationale": "The text identifies Sicinnus as Themistocles's personal slave, names the false message, and explains that Xerxes sealed the strait in response, leaving the Greek fleet no choice but to fight."}, {"text": "He was the Persian commander defeated at Salamis.", "isCorrect": false, "rationale": "Sicinnus was a Greek slave, not a Persian commander."}, {"text": "He was the priest who read the 'walls of wood' oracle.", "isCorrect": false, "rationale": "The oracle was issued at Delphi; Sicinnus's role is the false-message stratagem at Salamis."}], "id": "q07"}, {"question": "What happened to Themistocles in the years after Salamis?", "options": [{"text": "He retired to private life and never again held public office.", "isCorrect": false, "rationale": "He remained politically active and grew rich, which contributed to the resentment that produced his ostracism."}, {"text": "He was made king of Athens.", "isCorrect": false, "rationale": "Athens had no kings in the classical period; he held office as a leading politician, not as a monarch."}, {"text": "He rebuilt the city walls (against Spartan objections, by going to Sparta in person and delaying negotiations), fortified Piraeus, grew rich, became overbearing, and was ostracized in the late 470s.", "isCorrect": true, "rationale": "The text describes the wall rebuilding (with the Spartan delay tactic), the fortification of Piraeus, the wealth, the overbearing style, and the ostracism into ten-year exile."}, {"text": "He led an Athenian invasion of Persia that failed.", "isCorrect": false, "rationale": "There was no such Athenian invasion of Persia; Themistocles ended his career as a Persian governor, not as the leader of an Athenian invasion."}], "id": "q08"}, {"question": "Where did Themistocles end his life, and under whose rule?", "options": [{"text": "In Sparta as a guest of the Eurypontid kings.", "isCorrect": false, "rationale": "Themistocles fled across the Mediterranean, not to Sparta — which in fact pursued the medism charges."}, {"text": "In Argos as a private citizen.", "isCorrect": false, "rationale": "He went first to Argos but did not end there; charges of medism drove him further east."}, {"text": "In Persia under King Artaxerxes (the son of Xerxes, the very man Themistocles had defeated), where he was made governor of three small Greek-speaking cities in Asia Minor.", "isCorrect": true, "rationale": "The text says he ended in Persia, names Artaxerxes as Xerxes's son, and identifies him as governor of three small Greek-speaking cities in Asia Minor."}, {"text": "In Egypt, in the service of the Pharaoh.", "isCorrect": false, "rationale": "No such tradition; the foreign destination was Persia, not Egypt."}], "id": "q09"}, {"question": "What is the dramatic tradition about Themistocles's death, and what is Plutarch's posture toward it?", "options": [{"text": "He died on the battlefield leading Persian forces against Athens; Plutarch endorses the story.", "isCorrect": false, "rationale": "The dramatic tradition is precisely that he refused to lead such forces — and the death is by suicide, not in battle."}, {"text": "Tradition says he killed himself by drinking bull's blood rather than lead Persian forces against Greece when Artaxerxes ordered it; Plutarch tells the story seriously while noting its uncertainty.", "isCorrect": true, "rationale": "The text describes the bull's-blood suicide as the dramatic version, says Plutarch tells it seriously, and notes that he flags its uncertainty (some accounts say old age)."}, {"text": "He died of plague while traveling.", "isCorrect": false, "rationale": "The text mentions only old age and suicide as the two traditions."}, {"text": "He was poisoned by an Athenian assassin.", "isCorrect": false, "rationale": "There is no Athenian-assassin tradition in the text; the alternatives are old age and self-administered bull's blood."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
