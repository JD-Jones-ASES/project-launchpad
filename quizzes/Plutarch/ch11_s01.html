    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: the Tyrannicide</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What single project does Plutarch identify as shared by Dion of Syracuse and Marcus Brutus of Rome in this final pairing?", "options": [{"text": "Each killed a tyrant — the deliberate, justified killing of a sovereign on the grounds that the sovereign had betrayed the office.", "isCorrect": true, "rationale": "Plutarch frames the chapter as a study in tyrannicide: a sovereign's betrayal of office is the moral premise that licenses the deed."}, {"text": "Each founded a new constitutional order to replace an exhausted oligarchy.", "isCorrect": false, "rationale": "Neither man founded a new constitutional order; both intended to restore an existing one, and both projects failed."}, {"text": "Each wrote philosophical treatises defending the rule of philosopher-kings.", "isCorrect": false, "rationale": "Dion never wrote such a treatise; Brutus's lost philosophical works do not form the basis of the pairing."}, {"text": "Each commanded armies that defeated the Persian invaders of his homeland.", "isCorrect": false, "rationale": "Persian invasion is the theme of much earlier pairs; tyrannicide, not foreign defense, is the chapter's subject."}]}, {"question": "What is the genealogical link Plutarch emphasizes between Marcus Brutus and the Lucius Junius Brutus of Chapter 4?", "options": [{"text": "Marcus Brutus was a descendant of the founder of the Roman Republic who had expelled the Tarquins, and he took the inherited identity seriously.", "isCorrect": true, "rationale": "Plutarch stresses that the Marcus of Chapter 11 treated his descent from the Tarquin-expelling founder as a moral and political inheritance."}, {"text": "Marcus Brutus was an unrelated Roman who happened to share the name by adoption.", "isCorrect": false, "rationale": "Plutarch presents the family connection as genuine, not nominal — the inherited name carried the inherited obligation."}, {"text": "Marcus Brutus repudiated his ancestor's republican stance as outdated under the empire.", "isCorrect": false, "rationale": "Brutus did the opposite — he consciously imitated the first Brutus rather than disowning him."}, {"text": "The two Brutuses were contemporaries who collaborated on the founding of the Republic.", "isCorrect": false, "rationale": "They were separated by nearly five centuries — Lucius in 509 BC, Marcus dying in 42 BC."}]}, {"question": "How does Plutarch contrast Dion's and Brutus's personal relationship to the tyrants they killed?", "options": [{"text": "Dion had personal grievances (banishment, forced remarriage of his wife, confiscation of his estate); Brutus had been pardoned and elevated by Caesar and had no personal grievance.", "isCorrect": true, "rationale": "Plutarch carefully weighs this difference — Dion's act mixed principle with revenge; Brutus's was pure political principle."}, {"text": "Both men had been imprisoned by the tyrants they killed.", "isCorrect": false, "rationale": "Neither was imprisoned — Dion was banished and Brutus was pardoned and given offices."}, {"text": "Both men were political nobodies whom the tyrants had never noticed.", "isCorrect": false, "rationale": "Both were prominent — Dion was Dionysius's brother-in-law and Brutus was a leading senator close to Caesar."}, {"text": "Brutus had been exiled and Dion had been honored — the reverse of the actual record.", "isCorrect": false, "rationale": "This inverts the historical facts; Plutarch's synkrisis depends on getting the asymmetry right."}]}, {"question": "Where does Dante's Inferno place Brutus and Cassius, and what is the political theology behind that placement?", "options": [{"text": "In the lowest circle of Hell, chewed in Satan's mouths alongside Judas — on the reading that Caesar was Rome's providentially appointed ruler and the killing was a betrayal of the political order.", "isCorrect": true, "rationale": "Dante treats Caesarian imperium as providentially established, so the killing is impious rebellion comparable to the betrayal of Christ."}, {"text": "In Purgatory among the penitent rebels, awaiting eventual salvation.", "isCorrect": false, "rationale": "Dante does not place them in Purgatory; he reserves the lowest hell for them as the worst betrayers of authority."}, {"text": "In Limbo with the virtuous pagans who lacked Christian baptism.", "isCorrect": false, "rationale": "Limbo holds figures like Virgil; Brutus and Cassius receive a far harsher sentence."}, {"text": "Dante explicitly absolves them as republican heroes whose deed Providence sanctioned.", "isCorrect": false, "rationale": "This is the opposite of Dante's verdict — the Inferno reading condemns the tyrannicides."}]}, {"question": "How did the Renaissance and early-modern humanist tradition read Brutus, and what is the most famous literary expression?", "options": [{"text": "As 'the noblest Roman of them all' in Shakespeare's Julius Caesar — a model republican drawn directly from Plutarch's account.", "isCorrect": true, "rationale": "Shakespeare's Brutus is the humanist reversal of Dante's Brutus; Plutarch (via North's translation) is the direct source."}, {"text": "As a tragic monarchist undone by his own monarchical sympathies.", "isCorrect": false, "rationale": "The humanist Brutus is a republican model, not a monarchist."}, {"text": "As a marginal figure in the Caesar narrative whose motives Shakespeare ignored.", "isCorrect": false, "rationale": "Shakespeare made Brutus a central moral figure of the play; the line on him is among the most famous in the canon."}, {"text": "As a comic foil whose pretensions to virtue Shakespeare ridiculed.", "isCorrect": false, "rationale": "Shakespeare's portrayal is grave, not comic; Brutus is the play's moral conscience."}]}, {"question": "How did the American Founders read Brutus, according to the chapter?", "options": [{"text": "Enthusiastically — as a model republican; Patrick Henry's 'Give me liberty or give me death' is identified as a Brutus citation.", "isCorrect": true, "rationale": "The Plutarchan reading was the founding-era American reading; Brutus was the man who would kill a king for his country."}, {"text": "With suspicion — as a dangerous example of senatorial overreach against legitimate authority.", "isCorrect": false, "rationale": "This is closer to the Dantean reading; the Founders embraced the humanist Brutus."}, {"text": "As a Stoic philosopher whose political acts they ignored in favor of his lost philosophical works.", "isCorrect": false, "rationale": "The Founders' interest was political — the deed of tyrannicide, not the lost treatises."}, {"text": "Through Roman Catholic mediation, sharing Dante's hostile verdict.", "isCorrect": false, "rationale": "The Founders were predominantly Protestant and explicitly republican; their reading reversed Dante's."}]}, {"question": "Plutarch is sympathetic to both tyrannicides but presses a hard question in the synkrisis. What is that question?", "options": [{"text": "Whether the act of killing a tyrant is justified even when the tyranny is not actually ended by the killing.", "isCorrect": true, "rationale": "Both killings failed in their stated political objective; Plutarch makes the gap between moral justification and political outcome the central question."}, {"text": "Whether tyrannicide was permitted by the religious law of the assassin's city.", "isCorrect": false, "rationale": "Plutarch's question is moral and political, not religious; he is not asking after a legal ruling."}, {"text": "Whether the tyrants in question had family lineages noble enough to merit assassination.", "isCorrect": false, "rationale": "Nobility of lineage is not Plutarch's frame; the betrayal of office is."}, {"text": "Whether the assassins should have been executed for treason.", "isCorrect": false, "rationale": "Plutarch is interested in moral justification, not in the conspirators' subsequent legal fate."}]}, {"question": "Which philosopher's ambitions are framed by Plutarch's Life of Dion as a sustained engagement with Syracusan politics?", "options": [{"text": "Plato — whose three visits to Syracuse and hope of converting tyrants into philosopher-kings make the Life partly a biography of his political ambitions.", "isCorrect": true, "rationale": "The chapter explicitly frames the Life of Dion as in part a biography of Plato's political ambitions and disappointments."}, {"text": "Aristotle — whose tutoring of Alexander parallels the Syracusan project.", "isCorrect": false, "rationale": "Aristotle's pupil was Alexander of Macedon, not the Dionysii of Syracuse."}, {"text": "Socrates — who is said to have visited Syracuse before his trial.", "isCorrect": false, "rationale": "Socrates did not travel to Syracuse; Plato did."}, {"text": "Zeno of Citium — whose Stoa influenced Dion's political style.", "isCorrect": false, "rationale": "Dion was a Platonic student, not a Stoic; Zeno belongs to a later school."}]}, {"question": "What are the contrasting deaths of Dion and Brutus, as the chapter previews them?", "options": [{"text": "Dion was murdered in his own house in Syracuse by a former friend, Callippus; Brutus killed himself at Philippi after defeat.", "isCorrect": true, "rationale": "The two endings differ in form — murder versus suicide — but each closes a project that did not finally succeed."}, {"text": "Dion died of natural causes after a long retirement; Brutus was executed publicly in Rome.", "isCorrect": false, "rationale": "Dion was murdered, not retired; Brutus died by his own hand on the battlefield, not in Rome."}, {"text": "Both men were poisoned by political rivals while in office.", "isCorrect": false, "rationale": "Neither was poisoned; the historical record gives each a distinct mode of death."}, {"text": "Both men died in exile, unable to return to their cities.", "isCorrect": false, "rationale": "Dion died in Syracuse, where he ruled; Brutus died in Greece after raising armies there."}]}, {"question": "What does the chapter say about a separate Second Witness for this pairing, and what ancient sources are flagged as primary alternatives?", "options": [{"text": "There is no separate Second Witness; for Dion the chief alternative is Plato's Seventh Letter, and for Brutus the chief sources are Suetonius, Cassius Dio, Appian, and Cicero's correspondence.", "isCorrect": true, "rationale": "The chapter explicitly omits a Second Witness and lists these as the primary additional sources for each man."}, {"text": "The Second Witness for both is the Gospel of Mark, read as political theology.", "isCorrect": false, "rationale": "No biblical text serves as the Second Witness; the chapter cites Plato's Seventh Letter for Dion."}, {"text": "Plutarch supplies a Second Witness from Tacitus for both lives.", "isCorrect": false, "rationale": "Tacitus is not flagged as the Second Witness here; the chapter lists different sources."}, {"text": "Shakespeare's Julius Caesar replaces all ancient witnesses for the pairing.", "isCorrect": false, "rationale": "Shakespeare is mentioned as a substantial modern witness drawing on Plutarch, not as a replacement for ancient sources."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
