        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Publicola</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What incident specifically triggered the deposition of the Tarquins and the founding of the Roman Republic?", "options": [{"text": "A famine that turned the people against the king", "isCorrect": false, "rationale": "The trigger was a public outrage, not an economic crisis."}, {"text": "The rape of the noblewoman Lucretia by Tarquin the Proud's son Sextus, followed by her suicide", "isCorrect": true, "rationale": "Lucretia summoned her husband and father, made them swear vengeance, and stabbed herself with a hidden knife. Brutus drew the knife from her body and swore by her blood to abolish the monarchy."}, {"text": "The assassination of Brutus by the king", "isCorrect": false, "rationale": "Brutus led the revolt; he was not assassinated by the king."}, {"text": "A failed Roman war against the Etruscans", "isCorrect": false, "rationale": "Etruscan war came after the expulsion, as Tarquin's allies tried to restore him."}], "id": "q01"}, {"question": "What was the role of Vindicius in the discovery of the royalist conspiracy?", "options": [{"text": "He was a senator who voted against the conspirators", "isCorrect": false, "rationale": "Vindicius was a slave, not a senator."}, {"text": "He was a slave who overheard the plotters and brought the information to Publicola", "isCorrect": true, "rationale": "Vindicius disclosed the plot — including the involvement of Brutus's own two sons. Publicola handled the arrest and seized incriminating letters."}, {"text": "He led the conspiracy on behalf of the exiled Tarquins", "isCorrect": false, "rationale": "Vindicius exposed the conspiracy, he did not lead it."}, {"text": "He was the lictor who carried out the executions", "isCorrect": false, "rationale": "The lictors performed the executions, but Vindicius was the informant, not an attendant."}], "id": "q02"}, {"question": "How does Plutarch characterize Brutus's act of ordering the execution of his own two sons?", "options": [{"text": "Unambiguously heroic and the founding moment of Roman virtue", "isCorrect": false, "rationale": "Plutarch is more reserved than the Roman tradition; he refuses to settle the verdict."}, {"text": "A clear failure of human feeling that disqualifies Brutus as a founder", "isCorrect": false, "rationale": "Plutarch does not denounce the act; his verdict is suspended, not negative."}, {"text": "An action 'either divine or brutish' — too extreme to be common humanity, and Plutarch refuses to decide which", "isCorrect": true, "rationale": "Plutarch's careful refusal to settle on praise or condemnation is the philosophical heart of the passage. The Roman tradition celebrated the act as gravitas; Plutarch lets it stand and asks whether something can be too austere."}, {"text": "A political mistake that nearly destroyed the new Republic", "isCorrect": false, "rationale": "The act, however hard, did not destroy the Republic; the Republic survived because it was carried out."}], "id": "q03"}, {"question": "What was Publicola's specific contribution to the handling of the royalist conspirators?", "options": [{"text": "He demanded immediate executions on the spot without trial", "isCorrect": false, "rationale": "The conspirators were brought to the forum and convicted on documentary evidence — not summarily executed."}, {"text": "He raided the conspirators' house, seized incriminating letters, and publicly opposed Collatinus when Collatinus tried to release Vindicius and treat the nobles leniently", "isCorrect": true, "rationale": "Plutarch credits Publicola with saving the Republic from death by mercy in its first year — by preventing the escape of the Aquillian nobles and securing Vindicius's testimony."}, {"text": "He recused himself from the entire matter because of family connections", "isCorrect": false, "rationale": "Publicola was actively engaged in the prosecution, not recused."}, {"text": "He personally executed the conspirators with his own sword", "isCorrect": false, "rationale": "Lictors carried out the execution; Publicola did not personally wield the axe."}], "id": "q04"}, {"question": "Why did Publicola become consul in place of Collatinus in 509 BC?", "options": [{"text": "Collatinus died during the first year", "isCorrect": false, "rationale": "Collatinus did not die; he resigned the office."}, {"text": "Collatinus's relation to the Tarquins made him politically impossible, and he resigned", "isCorrect": true, "rationale": "Collatinus was Tarquin's nephew. After his lenient handling of the Aquillian conspirators raised suspicion, his resignation cleared the way for Publicola — who had been the original plausible candidate — to join Brutus."}, {"text": "Publicola raised a private army and forced him out", "isCorrect": false, "rationale": "The change was political, not military."}, {"text": "Brutus appointed Publicola unilaterally", "isCorrect": false, "rationale": "Publicola was elected, not appointed."}], "id": "q05"}, {"question": "What is provocatio, and why does Plutarch call it perhaps Publicola's most important law?", "options": [{"text": "The right of a consul to declare war without senate approval", "isCorrect": false, "rationale": "Provocatio is a popular right, not a consular power."}, {"text": "The right of every Roman citizen to appeal a consul's death sentence to the assembly, removing the consul's power to execute on his own authority", "isCorrect": true, "rationale": "Plutarch identifies this as the foundational Roman liberty. By it, no consul could slide back toward kingship; the people retained ultimate jurisdiction over their own lives."}, {"text": "A religious ritual of declaring war", "isCorrect": false, "rationale": "Provocatio is a civil legal right, not a religious rite."}, {"text": "The right of veto between two consuls", "isCorrect": false, "rationale": "Veto between consuls existed but is a separate institution from provocatio."}], "id": "q06"}, {"question": "What was the lowering of the lictors' fasces, and what did it symbolize?", "options": [{"text": "A military signal to advance into battle", "isCorrect": false, "rationale": "Lowering the fasces was a civic, not military, gesture."}, {"text": "When a consul appeared before the people in assembly, his lictors lowered the bundles of rods — a visible sign that in the assembly the consul was beneath the people, not above them", "isCorrect": true, "rationale": "The custom continued for the rest of Roman history. Like provocatio, it was a deliberate humiliation of consular authority before the sovereign people."}, {"text": "A ceremony marking the consul's birthday", "isCorrect": false, "rationale": "It was tied to the consul's appearance before the assembly, not to personal events."}, {"text": "A funeral rite for fallen consuls", "isCorrect": false, "rationale": "Fasces-lowering belonged to the living consul before the people."}], "id": "q07"}, {"question": "Why did Publicola demolish his own house overnight?", "options": [{"text": "It had been damaged by an Etruscan attack", "isCorrect": false, "rationale": "The demolition was political, not the result of damage."}, {"text": "Some Romans had begun to say his hilltop residence on the Velia made him look too much like Tarquin — a king's house overlooking the forum — and he tore it down rather than continue the appearance of monarchic ambition", "isCorrect": true, "rationale": "The gesture earned him the cognomen Publicola — 'friend of the people.' Plutarch celebrates it as an example of leaders who 'have ears that give admittance to truth before flattery.'"}, {"text": "He was preparing to leave Rome permanently", "isCorrect": false, "rationale": "He continued to serve as consul; he did not leave."}, {"text": "He needed the materials for a new public temple", "isCorrect": false, "rationale": "Plutarch links the demolition to the appearance of kingship, not to materials for another project."}], "id": "q08"}, {"question": "Which of these correctly summarizes Livy's emphasis in the Second Witness reading on the founding?", "options": [{"text": "Livy makes Publicola the protagonist; Plutarch makes Brutus", "isCorrect": false, "rationale": "The emphases are reversed: Livy makes Brutus the protagonist; Plutarch credits Publicola with the institutional engineering."}, {"text": "Livy makes Brutus the central figure of the founding — the institution of annual consular government and the binding oath against monarchy are presented as Brutus's work — while Plutarch credits Publicola with the durable legal scaffolding", "isCorrect": true, "rationale": "The two emphases are not contradictory but show different historiographical instincts: Brutus did the founding act, Publicola did the institutional engineering."}, {"text": "Livy denies that the Republic was founded in 509 BC", "isCorrect": false, "rationale": "Livy dates the Republic to 509 BC; the dispute is about whose contribution mattered most."}, {"text": "Livy and Plutarch agree on every detail of the founding", "isCorrect": false, "rationale": "The contrast in their emphases is precisely what the chapter draws our attention to."}], "id": "q09"}, {"question": "Why was Publicola's funeral unusual, and what does Plutarch say about how Rome mourned him?", "options": [{"text": "He was given a private family burial of standard kind", "isCorrect": false, "rationale": "Plutarch records an unprecedented public mourning."}, {"text": "He was mourned 'as that of a son, brother, or common father,' the matrons of Rome went into mourning as for a kinsman, and the funeral was paid from the public treasury — one of the first public funerals in Roman history — because he had died comparatively poor, his fortune spent in service of the city", "isCorrect": true, "rationale": "The detail of public expense is critical: Publicola died honest and poor, and the city paid for him. Compare this with Solon's quieter departure into exile — the chapter explicitly wants us to weigh the two endings."}, {"text": "He was denied funeral rites because of the demolition of his house", "isCorrect": false, "rationale": "The demolition of the house earned him the cognomen of honor, not dishonor."}, {"text": "He was buried in Etruria with Lars Porsenna", "isCorrect": false, "rationale": "He died in Rome in 503 BC and was buried at public expense in Rome."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
