        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>

        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is a synkrisis, as Plutarch uses the form?", "options": [{"text": "A brief, dense, evaluative essay weighing two paired lives against one another along multiple axes — closing the pair, not retelling it.", "isCorrect": true, "rationale": "Plutarch's synkrisis is short (about a tenth the length of the two Lives), names rather than retells incidents, weighs multiple axes, and renders judgments on each. It does not summarize."}, {"text": "A long historical retelling of both lives in chronological order.", "isCorrect": false, "rationale": "Plutarch deliberately does not retell the lives in his synkrisis; the form is taut, not bloated."}, {"text": "A single-axis comparison resolved in a clean verdict.", "isCorrect": false, "rationale": "Plutarch uses multiple axes and frequently leaves the final verdict open or close; single-axis comparisons would be too narrow."}, {"text": "A philosophical dialogue between the two subjects.", "isCorrect": false, "rationale": "Synkrisis is an evaluative essay, not a dialogue."}], "id": "q01"}, {"question": "On Plutarch's first axis (origin and the moral weight of action), who comes out ahead, and why?", "options": [{"text": "Theseus — because he acted out of free will, having no necessity to leave peaceful Troezen, while Romulus acted 'to escape present servitude' and, in Plato's words quoted by Plutarch, 'grew valiant purely out of fear.'", "isCorrect": true, "rationale": "Plutarch judges that the man who acts from choice is more admirable than the man who acts from necessity. Round one to Theseus."}, {"text": "Romulus — because he acted from necessity, which Plutarch admires.", "isCorrect": false, "rationale": "Plutarch values the free choice over the action compelled by necessity, so Romulus loses this axis."}, {"text": "Both equally — they are presented as morally identical.", "isCorrect": false, "rationale": "Plutarch's verdicts on individual axes are sharp; he assigns this round to Theseus."}, {"text": "Neither — Plutarch refuses to consider the question.", "isCorrect": false, "rationale": "Plutarch always renders a judgment on each axis, even when the overall verdict is mixed."}], "id": "q02"}, {"question": "Plutarch's second axis weighs the scope of the founders' early deeds. What does Plutarch say, and which founder wins?", "options": [{"text": "Theseus wins — Romulus's first great act was killing one king (Amulius), while Theseus killed the four bandits (Sciron, Sinis, Procrustes, Periphetes), deeds done for the benefit of others even when they would never know who freed the road.", "isCorrect": true, "rationale": "Plutarch contrasts Romulus's single act with Theseus's quartet of public-spirited killings, and gives Theseus the round."}, {"text": "Romulus wins — killing Amulius required more skill than killing the bandits.", "isCorrect": false, "rationale": "Plutarch's metric is scope and public benefit, not difficulty; he gives this axis to Theseus."}, {"text": "They tie — both killed roughly equal numbers of opponents.", "isCorrect": false, "rationale": "Plutarch's contrast is qualitative (scope, beneficiaries), not just numerical, and he does render a clear judgment."}, {"text": "Plutarch declines to evaluate this axis.", "isCorrect": false, "rationale": "Plutarch evaluates every axis."}], "id": "q03"}, {"question": "On Axis 3 (the killing of the relative), Plutarch compares the death of Hippolytus with the killing of Remus. Who comes out ahead, and on what reasoning?", "options": [{"text": "Theseus — driven by passion in response to the false complaints of his wife Phaedra, his fault has the better excuse than Romulus's killing of Remus in cold political calculation.", "isCorrect": true, "rationale": "Plutarch weighs the provocations: Theseus acted out of mistaken passion, Romulus out of political disagreement; passion mitigates more than calculation."}, {"text": "Romulus — because political disagreement is a more honorable motive than wifely jealousy.", "isCorrect": false, "rationale": "Plutarch's view is the opposite: passion under deception is the better excuse than cold political killing."}, {"text": "Both equally — Plutarch refuses to choose.", "isCorrect": false, "rationale": "Plutarch does choose: Theseus has the better excuse."}, {"text": "Neither — Plutarch dismisses both episodes as legendary embellishment.", "isCorrect": false, "rationale": "Plutarch treats both episodes as morally weighty, not as legendary embellishment to be dismissed."}], "id": "q04"}, {"question": "On Axis 4 (the political founding), Plutarch reverses direction. Whom does he favor, and why?", "options": [{"text": "Romulus — because he started from genuinely tiny beginnings (the twins were thought to be the sons of swineherds), freed the Latin people from their oppressors, and built a city from the ground up. Theseus's founding was the rearrangement of existing villages, not the building of a new thing.", "isCorrect": true, "rationale": "Plutarch judges Romulus the greater founder by this measure — the building of something new from nothing is more impressive than the unification of existing settlements. Round four to Romulus."}, {"text": "Theseus — because the synoecism was harder than founding a new city.", "isCorrect": false, "rationale": "Plutarch judges the building of a new city the greater achievement; he gives this axis to Romulus."}, {"text": "Both equally — Plutarch finds the achievements symmetrical.", "isCorrect": false, "rationale": "Plutarch presents this axis as a clear win for Romulus."}, {"text": "Romulus — because his city was the more peaceful.", "isCorrect": false, "rationale": "Plutarch does not call Romulus's founding peaceful; he calls it bigger. The metric is scope, not peace."}], "id": "q05"}, {"question": "Read this assertion from Plutarch's synkrisis: \"It is to be suspected that these things were done [by Theseus] out of wantonness and lust,\" whereas Romulus's seizure of the Sabine women \"was a commendable and politic exploit to establish a society.\" What is Plutarch arguing on Axis 5?", "options": [{"text": "That Theseus's repeated seductions (Ariadne, Antiope, Anaxo, Helen) were personal lust, while Romulus's single act of seizure had a political purpose that paid off in the union of two peoples.", "isCorrect": true, "rationale": "Plutarch is severe with Theseus on this axis. Theseus took many women over a lifetime for personal reasons; Romulus kept only Hersilia for himself and orchestrated a political seizure that became a political marriage. Round five, decisively, to Romulus."}, {"text": "That Romulus's seizure was unjustifiable; Theseus is exonerated.", "isCorrect": false, "rationale": "Plutarch's verdict is the opposite — Romulus's act has a political defense, Theseus's seductions do not."}, {"text": "That neither founder's treatment of women rises to moral weight.", "isCorrect": false, "rationale": "Plutarch treats both as morally weighty and judges between them."}, {"text": "That Theseus never abducted any women.", "isCorrect": false, "rationale": "Plutarch lists Theseus's seductions explicitly: Ariadne, Antiope, Anaxo, Helen."}], "id": "q06"}, {"question": "On Axis 6, the signs of divine favor, what is Plutarch's verdict, and how does he reach it?", "options": [{"text": "Romulus narrowly — Plutarch observes that Romulus was preserved by 'the special favor of the gods' from the beginning, while the oracle given to Aegeus before Theseus's conception 'seems to demonstrate that the birth of Theseus was not agreeable to the will of the gods.'", "isCorrect": true, "rationale": "This is the sixth axis, less decisive than some others but tipped toward Romulus by the divine readings of each life's beginning."}, {"text": "Theseus — because he was descended from Poseidon in some accounts.", "isCorrect": false, "rationale": "Plutarch reads the omens at the beginning of each life, not later genealogies, and rules in Romulus's favor."}, {"text": "Neither — Plutarch dismisses divine signs as unreliable.", "isCorrect": false, "rationale": "Plutarch treats the divine reception of each life as morally significant on this axis."}, {"text": "They tie — neither received unambiguous divine endorsement.", "isCorrect": false, "rationale": "Plutarch concludes that the gods preferred Romulus, even if less decisively than on some other axes."}], "id": "q07"}, {"question": "What is the overall verdict Plutarch reaches at the end of the synkrisis, and what is striking about it?", "options": [{"text": "There is no clean verdict. Theseus wins on origin, scope of early deeds, and the killing of the relative; Romulus wins on the political founding, the treatment of women, and the signs of divine favor. The judgment slightly tips toward Romulus, but it is genuinely close.", "isCorrect": true, "rationale": "This is exactly Plutarch's pattern: sharp judgments on each axis, but no single overall winner. He slightly tips toward Romulus by the end because the political founding looms large and Theseus's personal failings accumulate."}, {"text": "Plutarch declares Theseus the unambiguous winner on every axis.", "isCorrect": false, "rationale": "Plutarch splits the axes; neither founder wins them all."}, {"text": "Plutarch refuses to render judgment on any axis.", "isCorrect": false, "rationale": "Plutarch does judge each axis; what he refuses is a single overall verdict."}, {"text": "Plutarch declares Romulus the unambiguous winner on every axis.", "isCorrect": false, "rationale": "Plutarch credits Theseus on several axes; Romulus does not sweep."}], "id": "q08"}, {"question": "Plutarch's synkrisis follows four compositional rules. Which of the following is NOT one of them?", "options": [{"text": "He does not retell the lives — he names incidents, not paraphrases them.", "isCorrect": false, "rationale": "This is the first rule Plutarch's synkrisis follows — a synkrisis that summarizes is bloated; one that names and weighs is taut."}, {"text": "He uses multiple axes rather than a single one.", "isCorrect": false, "rationale": "Plutarch deliberately uses multiple axes; a single-axis comparison would be too narrow."}, {"text": "He renders a verdict on each axis, even when the overall judgment is ambiguous.", "isCorrect": false, "rationale": "On each axis Plutarch judges sharply; only the overall verdict is sometimes left close."}, {"text": "He uses the synkrisis as the longest section of the pair, more than the two Lives combined.", "isCorrect": true, "rationale": "Plutarch keeps the synkrisis short — roughly a tenth the length of the two Lives. Brevity is one of its compositional rules."}], "id": "q09"}, {"question": "The writing exercise at the end of the chapter asks you to write your own synkrisis of Theseus and Romulus. Which set of constraints is closest to the assignment as stated?", "options": [{"text": "Choose one axis (or propose your own); state the axis in your first sentence; bring forward two specific incidents from each life that bear on it; render a judgment; stay under 1,000 words.", "isCorrect": true, "rationale": "The textbook lists these exact requirements: axis in the first sentence, two incidents per life, name don't retell, a judgment (possibly qualified), and a 1,000-word ceiling."}, {"text": "Write a 5,000-word retelling of both lives in chronological order, then add a one-paragraph verdict at the end.", "isCorrect": false, "rationale": "The assignment is bounded at 1,000 words and explicitly forbids retelling — name the incidents, do not retell them."}, {"text": "Write a dialogue between Theseus and Romulus, with no axis required.", "isCorrect": false, "rationale": "The assignment requires an axis and a judgment; a dialogue would not satisfy the form."}, {"text": "Score each founder out of ten on twenty separate axes.", "isCorrect": false, "rationale": "The assignment uses a single chosen axis (or proposed one), not twenty."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
