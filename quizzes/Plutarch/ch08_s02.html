        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Alexander</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What political inheritance did Alexander receive at twenty in 336 BC?", "options": [{"text": "A weak Macedonian kingdom with no Greek hegemony and no plan to invade Persia.", "isCorrect": false, "rationale": "His father Philip had defeated Athens and Thebes at Chaeronea in 338 BC and forced the Greek city-states into a federated league under Macedonian leadership; the expedition against Persia was already being planned."}, {"text": "The throne of Macedon, the leadership of a federated Greek league after Philip's victory at Chaeronea, and a Persian expedition his father had been planning before his assassination.", "isCorrect": true, "rationale": "The section names exactly this inheritance — Philip's hegemony over the Greek cities after Chaeronea in 338 BC and the planned league expedition against Persia, which fell to Alexander when Philip was assassinated in 336 BC."}, {"text": "Co-rule of Macedon with his half-brothers and no military command.", "isCorrect": false, "rationale": "Alexander succeeded his father as sole king and assumed command of the planned expedition; the section says he succeeded Philip at twenty."}, {"text": "An empty treasury and a Persian alliance against Athens.", "isCorrect": false, "rationale": "Philip's hegemony was over the Greek cities, and the planned campaign was against Persia, not with it."}]}, {"question": "What is the methodological manifesto Plutarch places at the opening of the Life of Alexander?", "options": [{"text": "He will write only the great public events of Alexander's and Caesar's careers in chronological order.", "isCorrect": false, "rationale": "The manifesto says the opposite — Plutarch is writing biography, not history, and prefers the revealing small detail to the great public event."}, {"text": "His design is not to write histories but lives, and a small expression or jest can reveal character better than the most famous siege or bloodiest battle — so he gives particular attention to the marks and indications of the soul.", "isCorrect": true, "rationale": "The primary source passage gives exactly this statement. Plutarch likens himself to portrait-painters who attend to the lines of the face where character is seen rather than to the rest of the body, and applies that discipline to both Alexander and Caesar."}, {"text": "He must include every battle in full detail because the deeds are so enormous.", "isCorrect": false, "rationale": "Plutarch warns the reader he will epitomize the most celebrated parts of the story rather than insist at large on every particular circumstance — the opposite of completeness."}, {"text": "He has chosen Alexander only because Caesar's papers were lost.", "isCorrect": false, "rationale": "No such claim appears; Plutarch announces the pairing of Alexander with Caesar and applies one method to both."}]}, {"question": "What did Alexander see in Bucephalas that no one else in Philip's court had seen, and what did Philip say after the boy mounted the horse?", "options": [{"text": "He saw that the horse was bolting at his own shadow; he turned the horse toward the sun so the shadow fell behind. Philip wept and told his son to look out a kingdom worthy of himself, for Macedonia was too little for him.", "isCorrect": true, "rationale": "The section gives the episode in exactly this form. Alexander was perhaps twelve; Philip, watching, said Macedonia was too little for his son's kingdom."}, {"text": "He saw a snake under the horse's belly and killed it before mounting.", "isCorrect": false, "rationale": "There is no snake in the account; the trick was turning the horse toward the sun so the shadow fell behind him."}, {"text": "He saw a brand mark proving the horse was stolen, and refused to mount.", "isCorrect": false, "rationale": "Alexander did mount the horse, and the issue was not theft but the horse bolting at its own shadow."}, {"text": "Philip refused to acknowledge the feat and sent Alexander to bed without supper.", "isCorrect": false, "rationale": "Philip wept (so Plutarch says) and told his son to seek a kingdom worthy of himself; he did not punish the boy."}]}, {"question": "Who tutored Alexander, when, and what did he give him?", "options": [{"text": "Aristotle, for several years from perhaps 343-340 BC, gave him the full philosophical and literary curriculum of fourth-century Greece — ethics, politics, biology, literature, medicine.", "isCorrect": true, "rationale": "The section gives exactly these dates and this scope. The Aristotelian formation is described as decisive — Alexander conquered Persia not as a barbarian but as the most thoroughly educated soldier of his age."}, {"text": "Plato, in Athens, after Plato returned from Sicily.", "isCorrect": false, "rationale": "Plato died in 348/347 BC, before Alexander began formal philosophical study; the tutor named in the section is Aristotle."}, {"text": "Demosthenes, who taught him to oppose Macedonian power.", "isCorrect": false, "rationale": "Demosthenes was an Athenian orator opposed to Macedon; he was not Alexander's tutor. The tutor was Aristotle."}, {"text": "Diogenes, in Corinth, after the sunbathing exchange.", "isCorrect": false, "rationale": "The Diogenes exchange is the celebrated 'stand out of my sun' anecdote; Diogenes was a Cynic Alexander met later, not his tutor."}]}, {"question": "What habit does the section name as evidence that Alexander never stopped being a reader?", "options": [{"text": "He slept with a copy of Homer's Iliad — Aristotle's so-called 'casket edition' — under his pillow throughout the Asian campaign.", "isCorrect": true, "rationale": "The section names this habit exactly. He also requested books to be sent to him in upper Asia and prescribed medical treatments for his friends."}, {"text": "He wrote his own Commentaries on the Persian war in masterful Attic Greek.", "isCorrect": false, "rationale": "Commentaries are Caesar's contribution in this chapter, not Alexander's. The section gives no claim of personal authorship for Alexander."}, {"text": "He memorized the entire Republic of Plato.", "isCorrect": false, "rationale": "The text named under the pillow is Homer's Iliad, not Plato's Republic, and the section says nothing about memorizing the whole."}, {"text": "He refused all books on campaign because he disdained reading.", "isCorrect": false, "rationale": "The opposite — he carried Homer with him and requested more books in upper Asia."}]}, {"question": "Which sequence describes the major battles of the Persian campaign in order, and what was decisive about the last of them?", "options": [{"text": "Tyre (334), Granicus (333), Issus (332), Gaugamela (331); Gaugamela decided the throne of Persia.", "isCorrect": false, "rationale": "The order is wrong — Granicus came first (334), then Issus (333), then Tyre (332), then Gaugamela (331). The dates are reversed in this option."}, {"text": "Granicus (334), Issus (333), Tyre (332), Gaugamela (331); Gaugamela was the decisive battle for the Persian throne — Darius's last army was larger, but Alexander outmaneuvered him on terrain Darius himself had chosen, and Darius fled and was later assassinated by his satraps.", "isCorrect": true, "rationale": "The section names this sequence and dates and identifies Gaugamela as the decisive battle and Darius's fate."}, {"text": "Pharsalus, Munda, Thapsus, Zama — all decided by Roman legions.", "isCorrect": false, "rationale": "These are Caesar's and Republican-era battles, not Alexander's; the Persian campaign is fought against Darius III, not against Roman or Carthaginian armies."}, {"text": "Marathon, Plataea, Salamis, Thermopylae — the battles of the Persian Wars.", "isCorrect": false, "rationale": "These are Themistocles-era battles (Chapter 5), not Alexander's campaign."}]}, {"question": "What does the section say about Alexander's chivalry to Darius's family after Issus, and how does it illustrate his character?", "options": [{"text": "Alexander treated Darius's mother and wife with conspicuous chivalry, refusing to enter Darius's wife's tent; when Darius's mother bowed before Hephaestion thinking he was Alexander, Alexander said, 'It is no matter, Mother, for he too is Alexander.'", "isCorrect": true, "rationale": "The section gives exactly this episode, both the conspicuous chivalry and the famous line about Hephaestion."}, {"text": "Alexander imprisoned them and demanded ransom.", "isCorrect": false, "rationale": "The text says the opposite — he refused even to enter the wife's tent and treated the family with extraordinary respect."}, {"text": "He executed them as enemies of Macedon.", "isCorrect": false, "rationale": "He did not. The chivalry to the captured family is one of the section's set pieces."}, {"text": "He returned them to Persia in exchange for tribute.", "isCorrect": false, "rationale": "No such transaction is described; the family remained under Alexander's protection."}]}, {"question": "What did Diogenes the philosopher say to Alexander in Corinth, and what was Alexander's reply to his courtiers?", "options": [{"text": "Diogenes asked Alexander for a kingdom; Alexander gave him Athens.", "isCorrect": false, "rationale": "Diogenes asked for nothing of the sort; he asked only that Alexander stand out of his sun."}, {"text": "Diogenes said, 'Yes; stand out of my sun.' Alexander said to his courtiers, 'If I were not Alexander, I would be Diogenes.'", "isCorrect": true, "rationale": "The section preserves both lines exactly. Diogenes was sunbathing in Corinth when Alexander offered to do anything for him."}, {"text": "Diogenes asked Alexander to spare the city of Corinth; Alexander refused.", "isCorrect": false, "rationale": "Corinth is not under siege in this anecdote; Diogenes is sunbathing and Alexander is offering favors."}, {"text": "Diogenes asked for a book of philosophy; Alexander gave him his copy of the Iliad.", "isCorrect": false, "rationale": "The exchange is about sunlight, not books; the Iliad belongs to a different vignette in the Life."}]}, {"question": "What is the killing of Clitus, and where does the section place it in the Life's moral arc?", "options": [{"text": "Alexander killed his old friend Clitus, who had saved his life at the Granicus, in a drunken rage in Samarkand in an argument about whether Alexander was now too Persian; he spent three days in mourning afterward. The section calls this the moral nadir.", "isCorrect": true, "rationale": "The section gives exactly this account — the place (Samarkand), the cause (drunken argument about Persianization), the prior debt (Granicus rescue), and the three-day mourning. It identifies the killing as the nadir of the moral arc."}, {"text": "Clitus was killed by Persian rebels; Alexander avenged him at Gaugamela.", "isCorrect": false, "rationale": "Clitus was killed by Alexander himself in a drunken rage at Samarkand, not by Persians."}, {"text": "Alexander spared Clitus after the argument; the section names no nadir.", "isCorrect": false, "rationale": "Alexander did not spare him — he killed him — and the section explicitly names that act as the moral nadir."}, {"text": "Clitus was Alexander's tutor before Aristotle.", "isCorrect": false, "rationale": "Clitus was an old friend and Macedonian soldier, not a tutor; the tutor in this Life is Aristotle."}]}, {"question": "How did Alexander die, and what did he say to his generals about the succession?", "options": [{"text": "He died of fever in Babylon at thirty-two, eleven days after developing fever following a long drinking party; when his generals asked to whom he would leave his empire, he was said to have replied, 'To the strongest.'", "isCorrect": true, "rationale": "The section gives exactly this account — June 323 BC, fever, the drinking party, eleven days, the line about the strongest."}, {"text": "He was poisoned by Aristotle and named Hephaestion his heir.", "isCorrect": false, "rationale": "Hephaestion died before Alexander, and the section does not credit the Aristotle-poisoning rumor."}, {"text": "He died on the battlefield at Gaugamela.", "isCorrect": false, "rationale": "He won at Gaugamela in 331 BC and lived another eight years; he died at Babylon in 323 BC."}, {"text": "He retired to Macedon at fifty and died of old age.", "isCorrect": false, "rationale": "He died at thirty-two, never having returned to Macedon."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
