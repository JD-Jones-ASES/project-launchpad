    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Two Temperaments</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the pairing of Pericles and Fabius Maximus differ from the earlier pairs in the Lives that you have read?", "options": [{"text": "Both men rose to power suddenly in moments of crisis and then retired.", "isCorrect": false, "rationale": "The text says explicitly that earlier pairs were leaders 'in moments of crisis' — the Pericles–Fabius pair is presented as different from that pattern."}, {"text": "Both men exercised sustained political authority over decades rather than in a single emergency.", "isCorrect": true, "rationale": "The text opens by noting both men 'acquired sustained political authority over decades, not in moments of emergency,' and both became proverbial for a distinctive temperament."}, {"text": "Neither man held formal political office; they led through private influence.", "isCorrect": false, "rationale": "Both held the highest formal offices of their states — Pericles as repeated strategos, Fabius as consul and dictator."}, {"text": "Both men were soldiers only and had no political role at all.", "isCorrect": false, "rationale": "The chapter is precisely about each man as a statesman — character itself as a political fact."}]}, {"question": "Plutarch says this chapter is about character itself as a political fact. What question does the chapter put before the reader?", "options": [{"text": "Whether monarchy is a better form of government than democracy.", "isCorrect": false, "rationale": "Plutarch is not weighing forms of government here; he is weighing temperaments within their respective constitutions."}, {"text": "Whether the visionary leader or the patient delayer is better suited to public office.", "isCorrect": true, "rationale": "The text frames the central question as 'which kind of leader is better suited to public office — the visionary, who sees what could be, or the delayer, who insists on what must not be lost?'"}, {"text": "Whether ancient leaders can be compared to modern ones at all.", "isCorrect": false, "rationale": "Plutarch's comparison is Greek to Roman, not ancient to modern."}, {"text": "Whether Greek leaders were uniformly superior to Roman ones.", "isCorrect": false, "rationale": "Plutarch's whole synkrisis method assumes the two cultures are roughly commensurable; he does not declare Greek superiority."}]}, {"question": "According to the chapter introduction, what political reality complicates any admiration of Pericles?", "options": [{"text": "Pericles was secretly a monarchist who plotted to overthrow the democracy.", "isCorrect": false, "rationale": "The text says he expanded the democracy, not that he plotted against it."}, {"text": "The Athenian democracy under Pericles had become an imperial power that taxed and policed subordinate cities.", "isCorrect": true, "rationale": "The introduction notes that the Delian League 'had become, in practice, an Athenian empire,' and Pericles moved its treasury to Athens, used league funds for the Parthenon, and put down revolts at Samos and Euboea with significant violence."}, {"text": "Pericles personally enriched himself with allied tribute funds.", "isCorrect": false, "rationale": "Plutarch consistently presents Pericles as incorruptible — the discomfort is collective imperial policy, not personal corruption."}, {"text": "Pericles failed to build the Parthenon despite promising to do so.", "isCorrect": false, "rationale": "The chapter says Pericles did build the Parthenon, financed from the moved Delian treasury."}]}, {"question": "The text says the nickname 'Cunctator' was originally an insult. What was being implied by the slander?", "options": [{"text": "That Fabius was cowardly because he refused open battle with Hannibal.", "isCorrect": true, "rationale": "The text says Fabius's avoidance of battle 'was widely perceived as cowardice' and that the nickname 'Cunctator, the Delayer, was originally a slander.'"}, {"text": "That Fabius was too aggressive and bloodthirsty in pursuing Hannibal.", "isCorrect": false, "rationale": "The complaint against Fabius was exactly the opposite — that he refused to give Hannibal the decisive engagement."}, {"text": "That Fabius was too old to hold political office.", "isCorrect": false, "rationale": "The slander was about strategy, not age."}, {"text": "That Fabius failed to perform the religious duties of a Roman magistrate.", "isCorrect": false, "rationale": "Plutarch presents Fabius as scrupulously religious — that was one of his strengths, not a charge against him."}]}, {"question": "What does Plutarch identify as the central political cost of patience under Fabius?", "options": [{"text": "Patience cost Rome unnecessary territorial losses to Carthage's allies.", "isCorrect": false, "rationale": "Plutarch frames patience as the strategy that saved Rome; the cost was political, not territorial."}, {"text": "Holding a course of action when the people you serve are demanding the opposite.", "isCorrect": true, "rationale": "The text concludes that Fabius's Life 'is a study in how to hold a course of action when the people you serve are demanding the opposite.'"}, {"text": "Patience meant Fabius could not perform the required religious omens.", "isCorrect": false, "rationale": "The text emphasizes Fabius's careful observance of omens; this was not in conflict with patience."}, {"text": "Patience cost Fabius his personal fortune and impoverished his family.", "isCorrect": false, "rationale": "Plutarch does not present Fabius's strategy as a financial sacrifice — he does say Fabius gave money to ransom Roman captives, but the political cost is what is named here."}]}, {"question": "Why does the chapter present Thucydides's Funeral Oration as the Second Witness for the Greek side?", "options": [{"text": "Because Thucydides was Pericles's most ferocious political opponent.", "isCorrect": false, "rationale": "The Thucydides who wrote the History was a historian; he is not the rival Pericles ostracized — that was a different Thucydides, son of Melesias."}, {"text": "Because it is the most sustained ancient statement of the case for democracy as a way of life and a piece of Athenian war rhetoric.", "isCorrect": true, "rationale": "The text describes the speech as 'one of the founding documents of Western political thought,' 'the most sustained ancient statement of the case for democracy as a way of life,' and also 'a piece of Athenian war rhetoric. Both readings are correct.'"}, {"text": "Because Pericles wrote it himself in his old age as a private will and testament.", "isCorrect": false, "rationale": "Thucydides reconstructed the speech in his History — it is the historian's representation of the eulogy Pericles delivered."}, {"text": "Because it gives Plutarch's own moral evaluation of Pericles.", "isCorrect": false, "rationale": "The Funeral Oration is by Thucydides, not Plutarch; Plutarch's evaluation comes in the synkrisis."}]}, {"question": "Why does the Roman side of this chapter have no comparable Second Witness equivalent to the Funeral Oration?", "options": [{"text": "Because no Roman ever wrote about Fabius Maximus.", "isCorrect": false, "rationale": "The text names Livy and Polybius as major Roman/Greek sources on the period."}, {"text": "Because Livy's account spans Books XXI–XXX of his history and is too extensive to excerpt as a single witness.", "isCorrect": true, "rationale": "The text says Livy's account 'is too extensive to excerpt here' and that Polybius's treatment is referred to in Further Reading."}, {"text": "Because Fabius's actions were considered too shameful for any Roman to record.", "isCorrect": false, "rationale": "Roman sources eventually honored Fabius highly; the absence is editorial — too much material to excerpt."}, {"text": "Because the Carthaginians destroyed all the Roman records of the Second Punic War.", "isCorrect": false, "rationale": "There is no such claim — Polybius and Livy preserved extensive accounts."}]}, {"question": "Plutarch is described as 'unusually attentive' to which aspect of Pericles's biography?", "options": [{"text": "Pericles's military innovations on the battlefield.", "isCorrect": false, "rationale": "Plutarch attends to his strategy but is not unusually focused on military tactics."}, {"text": "Pericles's education — the philosopher Anaxagoras as tutor, the politician Damon as political teacher.", "isCorrect": true, "rationale": "The 'What to watch for' section says Plutarch is 'unusually attentive to Pericles's education' and that 'Pericles is a man whose intellect was deliberately formed by philosophy.'"}, {"text": "Pericles's family wealth and inheritance.", "isCorrect": false, "rationale": "The text mentions his lineage briefly but the focus is on intellectual formation, not finances."}, {"text": "Pericles's youthful religious devotions.", "isCorrect": false, "rationale": "If anything Anaxagoras taught him a 'disinterest in superstition' — religion is not the focus of his portrait."}]}, {"question": "What is the 'Olympian style' attributed to Pericles, and how does the chapter introduction frame it?", "options": [{"text": "An athletic regimen Pericles followed to prepare for the Olympic games.", "isCorrect": false, "rationale": "The 'Olympian' nickname refers to his godlike public manner, not to athletic training."}, {"text": "His godlike public manner — elevated speech, composed demeanor, refusal of casual conversation — and a deliberate political method.", "isCorrect": true, "rationale": "The introduction says Pericles was nicknamed 'the Olympian' for 'his godlike public manner — his elevated speech, his composed demeanor, his refusal to be drawn into private conversation' and notes the style 'was deliberate; it was part of his political method.'"}, {"text": "His policy of always staying in Athens rather than traveling abroad.", "isCorrect": false, "rationale": "The 'Olympian' refers to manner, not geography."}, {"text": "A religious title given to him by the priests of Zeus Olympios.", "isCorrect": false, "rationale": "It is a popular nickname for his demeanor, not a priesthood."}]}, {"question": "How do the deaths of the two leaders contrast at the end of this introductory section?", "options": [{"text": "Pericles died of old age in retirement; Fabius died in battle.", "isCorrect": false, "rationale": "This reverses the actual situation."}, {"text": "Pericles died of the plague in 429 BC in the second year of the Peloponnesian War he had helped start; Fabius died of old age in 203 BC, having lived to see Rome's victory over Carthage.", "isCorrect": true, "rationale": "The text gives exactly these dates: Pericles died of plague in 429 BC, Fabius of old age in 203 BC, and adds that 'the endings are different and Plutarch's synkrisis will weigh them.'"}, {"text": "Both leaders were executed by their own citizens.", "isCorrect": false, "rationale": "Neither was executed; Pericles was deposed but later restored, Fabius was a senior counselor at his death."}, {"text": "Both leaders died while serving as ambassadors abroad.", "isCorrect": false, "rationale": "Both died at home."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
