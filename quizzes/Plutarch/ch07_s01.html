        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Brilliance and Betrayal</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What single shape unites the careers of Alcibiades and Coriolanus, even though their personal styles differ?", "options": [{"text": "Both were ordinary citizens who reluctantly took up arms in defense of their cities.", "isCorrect": false, "rationale": "The chapter stresses that both men were exceptional, not ordinary — each was a leading figure of his city."}, {"text": "Both were gifted men who served their cities, were cast out, and led foreign armies against the home they once defended.", "isCorrect": true, "rationale": "The text describes the careers as 'different in texture but identical in shape: gifted, prominent, exiled, traitor.'"}, {"text": "Both refused political office and stuck to purely private life.", "isCorrect": false, "rationale": "Both held conspicuous public office — Alcibiades led Athens, Coriolanus rose to be a leading patrician general and a candidate for consul."}, {"text": "Both died in old age at home, honored by their cities.", "isCorrect": false, "rationale": "Alcibiades died in Phrygian exile; Coriolanus was killed by the Volscians. Neither died honored at home."}]}, {"question": "Plutarch's central question about both men is described in the chapter introduction. Which formulation best captures it?", "options": [{"text": "Whether a brilliant man should ever enter politics in the first place.", "isCorrect": false, "rationale": "Plutarch does not advise withdrawal from politics; both Lives assume political engagement is the natural arena for gifted men."}, {"text": "How a brilliant man goes wrong, and whether the city's mistreatment ever justifies his betrayal of the city.", "isCorrect": true, "rationale": "The text frames the chapter's question as 'how does a brilliant man go wrong? And, as a closely related question: when does the city's mistreatment of the brilliant man justify his betrayal of the city?'"}, {"text": "Whether Greek or Roman political institutions were superior.", "isCorrect": false, "rationale": "Plutarch is comparing temperaments inside two political communities, not ranking the two constitutional systems."}, {"text": "Whether monarchy would have prevented these tragedies.", "isCorrect": false, "rationale": "Plutarch does not propose a monarchical alternative. He keeps the inquiry inside each man's actual constitutional setting."}]}, {"question": "What do the chapter's two childhood images — Alcibiades's wrestling-bite and his lying down before the loaded cart — reveal in the Plutarchan sense?", "options": [{"text": "That Alcibiades was a frail child whose later courage was a surprise.", "isCorrect": false, "rationale": "Both incidents show fearlessness verging on recklessness, not frailty."}, {"text": "That childhood incidents are random and reveal little about the adult.", "isCorrect": false, "rationale": "Plutarch's method is the opposite: small early incidents are character-revealing windows onto the man."}, {"text": "That Alcibiades was a man who would not be made to lose and would stake his life on a refusal.", "isCorrect": true, "rationale": "The text says the two stories show the same temperament: 'Alcibiades will not be made to lose; he will not give way; he will, if necessary, stake his life on a refusal.'"}, {"text": "That Alcibiades feared physical pain more than other boys.", "isCorrect": false, "rationale": "Both stories show indifference to physical danger, not fear of pain."}]}, {"question": "How does the chapter contrast the two men's relationships with their respective moral counterweights?", "options": [{"text": "Both were morally guided by political mentors and lacked any personal influence.", "isCorrect": false, "rationale": "The moral counterweights described are personal, not political: Socrates for Alcibiades and his mother Volumnia for Coriolanus."}, {"text": "Alcibiades had Socrates as a friend who saved his life at Potidaea; Coriolanus had his mother Volumnia, who would stop his army at the gates of Rome.", "isCorrect": true, "rationale": "The text identifies Socrates and Volumnia as the moral anchors of each Life and links them to specific decisive moments (Potidaea, the matrons' embassy)."}, {"text": "Both men were guided by Stoic philosophers in their youth.", "isCorrect": false, "rationale": "Stoicism is not invoked in this chapter. The relationships described are Socratic friendship and filial bond, not Stoic instruction."}, {"text": "Neither man had any moral relationship of consequence.", "isCorrect": false, "rationale": "The chapter is explicit that each man had a single, formative moral relationship that shapes the architecture of his Life."}]}, {"question": "Plutarch describes two distinct styles of contempt for the multitude in this pair. How does the chapter define them?", "options": [{"text": "Alcibiades despised the people in private but flattered them in public; Coriolanus despised them openly and refused to flatter.", "isCorrect": true, "rationale": "The text says 'Alcibiades flatters the people, manipulates them, despises them privately, plays games with them. Coriolanus despises them openly, refuses to flatter them, would not lower himself to canvass the people.'"}, {"text": "Both men flattered the people insincerely.", "isCorrect": false, "rationale": "The two styles are presented as opposed. Coriolanus refuses on principle to flatter."}, {"text": "Both men despised the people openly.", "isCorrect": false, "rationale": "Only Coriolanus despised them openly. Alcibiades flattered."}, {"text": "Alcibiades had no contempt at all; Coriolanus had all the contempt for both.", "isCorrect": false, "rationale": "Plutarch presents both men as contemptuous of the multitude — only the style differs."}]}, {"question": "Why does the chapter raise the Shakespeare connection?", "options": [{"text": "Because Shakespeare invented details that contradict Plutarch's account.", "isCorrect": false, "rationale": "The chapter says Shakespeare follows Plutarch 'almost verbatim' through North's translation, not that he contradicts him."}, {"text": "Because Shakespeare's Coriolanus is drawn almost verbatim from Plutarch (via North's 1579 translation) and has shaped the modern reading of the figure.", "isCorrect": true, "rationale": "The text notes that Shakespeare drew Volumnia's great speech and the refusal-to-show-wounds scene from Plutarch, and that the Shakespearean reading has shaped modern English understanding."}, {"text": "Because Plutarch borrowed material from Shakespeare's play.", "isCorrect": false, "rationale": "The chronology runs the other way: Plutarch wrote in the late first century AD; Shakespeare's Coriolanus is from 1607."}, {"text": "Because Shakespeare wrote a play about Alcibiades that the chapter recommends.", "isCorrect": false, "rationale": "The chapter references Shakespeare's Coriolanus, not any Alcibiades play."}]}, {"question": "What was the strategic content of Alcibiades's advice to the Spartans after his defection?", "options": [{"text": "He recommended a single decisive sea battle near Athens.", "isCorrect": false, "rationale": "His advice was not a single battle but a three-part program against Athens."}, {"text": "He told them to negotiate a quick peace with Athens.", "isCorrect": false, "rationale": "His advice was hostile, designed to destroy Athenian power, not to bring peace."}, {"text": "He advised sending Spartan generals to Syracuse, fortifying Decelea inside Attica, and revolting Athens's allies in Asia.", "isCorrect": true, "rationale": "The text lists exactly these three strategies: 'send Spartan generals to advise Syracuse; fortify Decelea in Attica permanently…; revolt the Athenian allies in Asia. All three strategies worked.'"}, {"text": "He told them to focus only on naval rebuilding and ignore the land war.", "isCorrect": false, "rationale": "His advice was specifically multi-front (Sicily, Attica, Asia), not naval-only."}]}, {"question": "What did Coriolanus argue should be done with the grain that arrived during the Roman famine?", "options": [{"text": "Distributed freely to all citizens to relieve the crisis.", "isCorrect": false, "rationale": "Coriolanus opposed concessions to the plebs and would not have distributed freely."}, {"text": "Sold only at the old high price, and only to plebs who would renounce the office of tribune of the people.", "isCorrect": true, "rationale": "The chapter states: 'the grain should be sold only at the old (high) price, and only to plebs who would renounce the recently-won office of tribune of the people.'"}, {"text": "Stored entirely in the temples as an offering of thanks.", "isCorrect": false, "rationale": "No religious offering is mentioned in the chapter; Coriolanus's proposal was political."}, {"text": "Exported back to Sicily as a gesture of goodwill.", "isCorrect": false, "rationale": "The grain came from Sicily to Rome to relieve famine; exporting it back was not on the table."}]}, {"question": "The chapter says Plutarch's biography of Alcibiades 'handles the betrayal with a level of cool that is itself a moral comment.' What is the implication of that observation?", "options": [{"text": "That Plutarch refuses to take any view of the betrayal.", "isCorrect": false, "rationale": "The chapter's whole framing is that Plutarch's cool tone is itself a deliberate moral signal, not a refusal of judgment."}, {"text": "That Plutarch found the betrayal less serious than later readers have.", "isCorrect": false, "rationale": "The 'cool' is a stylistic restraint that registers moral seriousness without melodrama, not a downgrade of the offense."}, {"text": "That Plutarch's restraint signals the gravity of the act more powerfully than indignation would.", "isCorrect": true, "rationale": "The introduction notes that the deliberate calm with which Plutarch records the catastrophic strategic gift to Sparta is itself a moral judgment — the matter speaks for itself."}, {"text": "That Plutarch was personally indifferent to Athens.", "isCorrect": false, "rationale": "Plutarch's investment in Athens is evident throughout the chapter, both here and in his treatment of Pericles in Chapter 6."}]}, {"question": "Why does the chapter say Coriolanus's story is 'partly legend,' and how does Plutarch handle that?", "options": [{"text": "Because Plutarch invented it himself with no historical basis.", "isCorrect": false, "rationale": "Plutarch did not invent the story; Livy and Dionysius of Halicarnassus also tell it."}, {"text": "Because the dates do not quite fit the historical Volscian campaigns, but Plutarch still tells it as historical biography.", "isCorrect": true, "rationale": "The text states: 'The Coriolanus story is partly legend (the dates do not quite fit the historical Volscian campaigns), but Plutarch tells it as historical biography, and we will follow him.'"}, {"text": "Because the manuscript tradition is too corrupted to recover the facts.", "isCorrect": false, "rationale": "The chapter does not mention manuscript corruption; the problem is chronological fit with the Volscian campaigns."}, {"text": "Because Plutarch lacked sources entirely and openly admitted to making it up.", "isCorrect": false, "rationale": "Plutarch did not admit any such thing; Livy Bk II and Dionysius of Halicarnassus are referred to as parallel narratives in the Further Reading."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
