        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the surprising overall verdict of the synkrisis of Alcibiades and Coriolanus?", "options": [{"text": "Plutarch tilts decisively toward Coriolanus on grounds of personal virtue.", "isCorrect": false, "rationale": "Coriolanus's personal virtue is conceded (incorruptibility, temperance) but the verdict on the political question goes the other way."}, {"text": "Plutarch declares both men equally guilty on every axis.", "isCorrect": false, "rationale": "Plutarch awards rounds — most of them to Alcibiades, two to Coriolanus — rather than declaring an even split."}, {"text": "By the count of axes, Plutarch tilts toward Alcibiades — even though Coriolanus is, on most readings of personal character, the more admirable man.", "isCorrect": true, "rationale": "The text states explicitly: 'The verdict, by the count, tilts toward Alcibiades. This is the genuine surprise of the synkrisis, because on most readings of personal character Coriolanus is the more admirable man.'"}, {"text": "Plutarch declares Alcibiades guilty of more sins but the better man overall.", "isCorrect": false, "rationale": "Plutarch does not claim Alcibiades is the better man overall; the synkrisis's verdict is about political damage, not overall personal goodness."}], "id": "q01"}, {"question": "On Axis 2 (style of seeking power), what is Plutarch's striking judgment?", "options": [{"text": "Flattery and open haughtiness are equally bad.", "isCorrect": false, "rationale": "Plutarch is explicit that they are unequal: flattery is less bad than contemptuous refusal to flatter."}, {"text": "Flattery is more contemptible than pride.", "isCorrect": false, "rationale": "Plutarch's argument is the opposite: pride is more politically destructive than flattery."}, {"text": "A man who ingratiates himself by indulgence and flattery is hardly so censurable as one who, to avoid the appearance of flattering, insults.", "isCorrect": true, "rationale": "This is a direct quotation of Plutarch's verdict on Axis 2 as the chapter reproduces it. Flattery 'seeks power by lowering oneself; pride seeks power by lowering others.'"}, {"text": "Both men were equally guilty of the same insult to the people.", "isCorrect": false, "rationale": "The whole axis turns on a moral asymmetry between the two styles, not a moral parity."}], "id": "q02"}, {"question": "On Axis 3 (provoking war), Plutarch compares Alcibiades's role in breaking the Athens–Sparta peace with Coriolanus's stirring up of the Volscian war. What is his judgment?", "options": [{"text": "Both men provoked their wars for honorable reasons.", "isCorrect": false, "rationale": "Plutarch finds Coriolanus's motive — to gratify anger — worse than Alcibiades's; he does not call either honorable."}, {"text": "Alcibiades's breach of the peace at least gained Athens the alliance of Argos and Mantinea; Coriolanus stirred up the war simply to gratify anger. The second is worse.", "isCorrect": true, "rationale": "The text records Plutarch's reasoning exactly: Alcibiades's act produced a real strategic asset, while Coriolanus's was 'simply to gratify anger'; round three to Alcibiades."}, {"text": "Coriolanus's war was justified on Volscian patriotism.", "isCorrect": false, "rationale": "Plutarch does not credit Coriolanus with Volscian patriotism; he treats the provocation as personal anger."}, {"text": "Alcibiades was the worse offender on this axis.", "isCorrect": false, "rationale": "On Axis 3, Plutarch awards the round to Alcibiades because his provocation at least produced a real strategic asset."}], "id": "q03"}, {"question": "On Axis 4 (behavior in exile), what distinguishes Alcibiades from Coriolanus?", "options": [{"text": "Neither man led foreign armies against his city.", "isCorrect": false, "rationale": "Both did so — that is the shared shape of the pairing."}, {"text": "Alcibiades relented when recalled and served Athens again; Coriolanus refused all embassies until his mother stopped him, and he sought to destroy and overthrow.", "isCorrect": true, "rationale": "The text says Alcibiades 'relented when Athens recalled him' and 'served,' while Coriolanus 'refused all embassies, all entreaties, all priests' and acted 'to destroy and overthrow' rather than to reconcile."}, {"text": "Coriolanus accepted recall earlier than Alcibiades did.", "isCorrect": false, "rationale": "Coriolanus never accepted recall — he was moved only by his mother, and even then only after refusing all formal embassies."}, {"text": "Alcibiades was uniquely unwilling to serve his city again.", "isCorrect": false, "rationale": "Alcibiades did serve Athens again after his recall — that is one of the reasons Plutarch awards him the round."}], "id": "q04"}, {"question": "What is the contradiction Plutarch identifies as Coriolanus's 'special problem' on Axis 5?", "options": [{"text": "He flattered the patricians while pretending to be a friend of the people.", "isCorrect": false, "rationale": "Coriolanus did not flatter the patricians or pretend to be a friend of the people; he was unmistakably patrician."}, {"text": "He refused to court favor with the people because he despised them, and yet he resented the people for not honoring him.", "isCorrect": true, "rationale": "Plutarch's epigram on this point is reproduced in the chapter: 'He who least likes courting favor, ought also least to think of resenting neglect.' The contradiction was in him, not in Rome."}, {"text": "He refused his mother's appeal in public but obeyed her in private.", "isCorrect": false, "rationale": "The opposite: he obeyed Volumnia's appeal in the most public moment of his life."}, {"text": "He pretended to be a Volscian but secretly remained loyal to Rome.", "isCorrect": false, "rationale": "Plutarch makes no such claim; once Coriolanus joined the Volscians he led them earnestly against Rome until his mother intervened."}], "id": "q05"}, {"question": "What is Plutarch's epigram about courting favor and resenting neglect?", "options": [{"text": "'He who most loves courting favor must most accept neglect.'", "isCorrect": false, "rationale": "This inverts Plutarch's actual epigram; he does not address the man who loves courting favor."}, {"text": "'He who least likes courting favor, ought also least to think of resenting neglect.'", "isCorrect": true, "rationale": "This is the exact line the chapter quotes as Plutarch's central political claim about Coriolanus."}, {"text": "'A leader's neglect is the people's praise.'", "isCorrect": false, "rationale": "Not in the text."}, {"text": "'The people will neglect any leader who tries to court them.'", "isCorrect": false, "rationale": "This is the opposite of Plutarch's claim."}], "id": "q06"}, {"question": "On which two axes does Coriolanus decisively win the round, and why?", "options": [{"text": "Axes 1 and 4 — military ability and conduct in exile.", "isCorrect": false, "rationale": "Plutarch awards the military axis (Axis 1) only slightly to Alcibiades; Coriolanus loses the exile axis decisively."}, {"text": "Axes 6 and 7 — money and temperance / personal life — because Coriolanus declined money even when pressed upon him and was chaste, austere, and devoted to his mother, while Alcibiades was famously corrupt and a famous debauch.", "isCorrect": true, "rationale": "The chapter reports exactly these as Coriolanus's wins: 'Personal incorruptibility favors Coriolanus, decisively' and 'Personal moral conduct favors Coriolanus, decisively.'"}, {"text": "Axes 2 and 5 — style and the special problem of resentment.", "isCorrect": false, "rationale": "Coriolanus loses both — flattery is judged less bad than insult, and the contradiction of refusing favor while resenting neglect counts against him."}, {"text": "Axes 4 and 7 — exile and chastity.", "isCorrect": false, "rationale": "Coriolanus loses the exile axis decisively; only the chastity / temperance side of Axis 7 falls to him."}], "id": "q07"}, {"question": "What is the central political claim that drives Plutarch's verdict, and which lesson does the chapter say it cuts against?", "options": [{"text": "That political life requires suppleness, and even Alcibiades's bad suppleness is less destructive than Coriolanus's principled rigidity — a lesson that cuts against the Western admiration for the proud, austere hero who refuses to compromise.", "isCorrect": true, "rationale": "The chapter says this directly: 'political life requires suppleness, and… even bad suppleness (Alcibiades's) is politically less destructive than principled rigidity (Coriolanus's)' — and that this 'cuts against the romantic Western admiration for the proud, austere, principled hero who refuses to compromise.'"}, {"text": "That principled rigidity is always politically preferable to suppleness.", "isCorrect": false, "rationale": "The chapter's claim is the reverse: rigidity is more destructive."}, {"text": "That all political failure is the city's fault, never the leader's.", "isCorrect": false, "rationale": "Plutarch's analysis locates the contradiction in Coriolanus, not in Rome."}, {"text": "That military ability is what decides between Alcibiades and Coriolanus.", "isCorrect": false, "rationale": "Plutarch calls the military comparison roughly even; the verdict turns on the political axes, not on military ability."}], "id": "q08"}, {"question": "What complication does the chapter note about the actual political damage each man inflicted on his city?", "options": [{"text": "Alcibiades cost Athens nothing in the end, while Coriolanus destroyed Rome.", "isCorrect": false, "rationale": "The chapter says the opposite: Alcibiades cost Athens her empire; Coriolanus cost Rome nothing because his mother turned him aside."}, {"text": "Alcibiades cost Athens her empire, while Coriolanus cost Rome nothing in the end because his mother turned him aside — a real fact the synkrisis does not weigh as heavily as it might.", "isCorrect": true, "rationale": "The chapter records the asymmetry exactly: 'Alcibiades cost Athens her empire. Coriolanus cost Rome nothing in the end, because his mother turned him aside. The political damage was much less on the Roman side; this is a real fact that the synkrisis does not weigh as heavily as it might.'"}, {"text": "Both men inflicted equal political damage on their cities.", "isCorrect": false, "rationale": "The chapter explicitly stresses the inequality of the damage."}, {"text": "Plutarch weights the real damage equally with the moral character of each man.", "isCorrect": false, "rationale": "The chapter critiques exactly this: it argues that Plutarch underweights the actual damage."}], "id": "q09"}, {"question": "How does the chapter describe the Christian–Shakespearean reception of Coriolanus, and how does Plutarch differ?", "options": [{"text": "The Christian tradition has read Coriolanus less sympathetically than Plutarch and stressed the harm he did.", "isCorrect": false, "rationale": "The chapter says exactly the opposite — the Christian–Shakespearean reading is the more sympathetic one."}, {"text": "The Christian tradition has read Coriolanus more sympathetically than Plutarch did — as a tragic figure whose virtues became, in the wrong political environment, his destruction — while Plutarch is more attentive to the political cost.", "isCorrect": true, "rationale": "The chapter describes the Christian reception in exactly these terms and notes that 'Plutarch is less sentimental' — he sees the same virtues but is more attentive to their political cost."}, {"text": "The Christian tradition has rejected Coriolanus as evil; Plutarch admired him.", "isCorrect": false, "rationale": "Neither claim is in the text."}, {"text": "T. S. Eliot was the first to read Coriolanus as a Christian saint.", "isCorrect": false, "rationale": "The chapter notes Eliot ranked the play among Shakespeare's greatest, not that he canonized Coriolanus."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
