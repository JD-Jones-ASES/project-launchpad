<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Where to Go Next</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How many of Plutarch's twenty-three pairings has the reader completed by the end of this book?", "options": [{"text": "Five", "isCorrect": false, "rationale": "The book covers more than five pairings."}, {"text": "Ten", "isCorrect": true, "rationale": "You have read ten of Plutarch's twenty-three pairings. The book tried to give the most famous pairs and the ones that best teach the synkrisis method."}, {"text": "Thirteen", "isCorrect": false, "rationale": "Thirteen is the number of pairings remaining, not the number read."}, {"text": "Twenty-three", "isCorrect": false, "rationale": "Twenty-three is the total number of pairs Plutarch wrote, not the number covered in this book."}]}, {"question": "Which translation has the book used and is recommended as the most accessible way to continue reading?", "options": [{"text": "The Penguin Robin Waterfield edition", "isCorrect": false, "rationale": "Waterfield's edition is recommended for selections from the Moralia, not the Lives."}, {"text": "The Modern Library two-volume Dryden-Clough translation", "isCorrect": true, "rationale": "The book recommends picking up the Modern Library Dryden-Clough translation and working through the remaining pairs in order."}, {"text": "Loeb Classical Library Greek-English edition", "isCorrect": false, "rationale": "The Loeb is mentioned for the Moralia's fifteen volumes, not as the main reading recommendation."}, {"text": "Sir Thomas North's 1579 translation", "isCorrect": false, "rationale": "North's translation is historically important but not the modern recommendation."}]}, {"question": "Which pairing is described as \"the men of austere republican virtue\" and a natural complement to Solon & Publicola (Ch. 4) and Brutus (Ch. 11)?", "options": [{"text": "Lysander and Sulla", "isCorrect": false, "rationale": "Lysander and Sulla are the destroyers, not the men of austere republican virtue."}, {"text": "Aristides and Cato the Elder", "isCorrect": true, "rationale": "Aristides and Cato the Elder are the men of austere republican virtue, a moral counterweight to the brilliant unstable men of Chs. 7-8. Plutarch's synkrisis surprises some readers."}, {"text": "Demetrius and Antony", "isCorrect": false, "rationale": "Demetrius and Antony are the brilliant ruined men, not the austere ones."}, {"text": "Phocion and Cato the Younger", "isCorrect": false, "rationale": "Phocion and Cato the Younger are the principled losers, a different pair."}]}, {"question": "Which pair is identified as \"the destroyers,\" two men whose political success unmade the institutions that produced them?", "options": [{"text": "Pericles and Fabius Maximus", "isCorrect": false, "rationale": "Pericles and Fabius are paired in Plutarch but are not the destroyers."}, {"text": "Lysander and Sulla", "isCorrect": true, "rationale": "Lysander and Sulla are the destroyers. The synkrisis explicitly compares them with the Spartan reformers of Ch. 10, making the connection between conquest and constitutional collapse."}, {"text": "Caesar and Alexander", "isCorrect": false, "rationale": "Caesar and Alexander are paired but are not described as \"the destroyers\" in this taxonomy."}, {"text": "Aristides and Cato the Elder", "isCorrect": false, "rationale": "These are the austere republican virtuous, not the destroyers."}]}, {"question": "Phocion and Cato the Younger are described as \"the principled losers.\" What is unusual about their pair in Plutarch's corpus?", "options": [{"text": "Plutarch wrote two synkrises for them", "isCorrect": false, "rationale": "Plutarch did not write two; he wrote one which is now lost."}, {"text": "Their synkrisis is lost — one of the lost comparisons in the corpus", "isCorrect": true, "rationale": "Plutarch's synkrisis for Phocion and Cato the Younger is lost — a fourth of the lost comparisons in the corpus."}, {"text": "They are the only Greek-Greek pair", "isCorrect": false, "rationale": "Plutarch's pairings are always Greek-Roman; the lost synkrisis is the unusual fact, not the matchup type."}, {"text": "They are the longest Lives in the corpus", "isCorrect": false, "rationale": "Length is not the unusual feature noted."}]}, {"question": "Which pair is described as \"the brilliant ruined men,\" with the Antony half serving as the source for Shakespeare's Antony and Cleopatra?", "options": [{"text": "Caesar and Pompey", "isCorrect": false, "rationale": "Caesar is in this book's Ch. 8 but is not paired with Pompey for the Antony-Cleopatra connection."}, {"text": "Demetrius and Antony", "isCorrect": true, "rationale": "Demetrius and Antony are Plutarch's most direct sermon on how greatness can wreck a life. The Antony half is the source of Shakespeare's Antony and Cleopatra."}, {"text": "Alcibiades and Coriolanus", "isCorrect": false, "rationale": "These are the brilliant unstable men of Chs. 7-8 already covered in the book."}, {"text": "Phocion and Cato the Younger", "isCorrect": false, "rationale": "These are the principled losers, not the brilliant ruined men."}]}, {"question": "Which Moralia essay is described as \"a founding text of the humanist tradition\" on pedagogy?", "options": [{"text": "On the E at Delphi", "isCorrect": false, "rationale": "This is a philosophical dialogue set at the Delphic sanctuary, not the pedagogy essay."}, {"text": "On the Education of Children", "isCorrect": true, "rationale": "On the Education of Children is Plutarch on pedagogy, a founding text of the humanist tradition."}, {"text": "On the Malice of Herodotus", "isCorrect": false, "rationale": "This is the polemical essay accusing Herodotus of unfair treatment, not the pedagogy text."}, {"text": "How to Tell a Flatterer from a Friend", "isCorrect": false, "rationale": "This is one of the deepest ancient analyses of self-knowledge, not a pedagogy essay."}]}, {"question": "Which Penguin edition is recommended as a good starting selection from the Moralia?", "options": [{"text": "Edited by Donald Russell", "isCorrect": false, "rationale": "Russell is a major Plutarch scholar, but the Penguin Essays edition named here is by Waterfield."}, {"text": "Edited by Robin Waterfield", "isCorrect": true, "rationale": "The Penguin Essays, edited by Robin Waterfield, is recommended as a good starting selection from the Moralia (the Loeb runs to fifteen volumes)."}, {"text": "Edited by Bernadotte Perrin", "isCorrect": false, "rationale": "Perrin is the Loeb translator; the Penguin Essays editor named is Waterfield."}, {"text": "Edited by Tom Holland", "isCorrect": false, "rationale": "Tom Holland is a popular Roman historian but is not the named editor."}]}, {"question": "Which historical source does the chapter recommend for deepening the reading of Plutarch's Caesar?", "options": [{"text": "Herodotus, Books VII-VIII", "isCorrect": false, "rationale": "Herodotus VII-VIII is recommended for Themistocles, not for Caesar."}, {"text": "Caesar's own Commentaries (Gallic War and Civil War), plus Suetonius's Life of Caesar and Appian's Civil Wars", "isCorrect": true, "rationale": "The chapter recommends Caesar's own Commentaries together with Suetonius and Appian for deepening the reading of Plutarch's Caesar."}, {"text": "Polybius on the Hannibalic War", "isCorrect": false, "rationale": "Polybius is recommended for Fabius Maximus."}, {"text": "Arrian's Anabasis", "isCorrect": false, "rationale": "Arrian's Anabasis is recommended for Alexander, not Caesar."}]}, {"question": "Which pair of American presidents is offered as the natural further synkrisis exercise for the American student?", "options": [{"text": "Lincoln and Theodore Roosevelt", "isCorrect": false, "rationale": "TR is not the figure named for this pairing."}, {"text": "Lincoln and Washington", "isCorrect": true, "rationale": "Lincoln and Washington are offered as the two greatest American presidents — different temperaments, different political moments, both consciously Plutarchan. A synkrisis of these two is one of the natural exercises for the American student."}, {"text": "Adams and Jefferson", "isCorrect": false, "rationale": "Adams and Jefferson are mentioned earlier as Plutarchan readers but not as this final synkrisis pair."}, {"text": "Hamilton and Burr", "isCorrect": false, "rationale": "This pair is implied by the chapter on Founders' worries but not named as the synkrisis exercise."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
