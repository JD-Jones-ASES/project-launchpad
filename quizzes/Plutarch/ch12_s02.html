    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Plutarch and the American Founders</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was Plutarch's place in the eighteenth-century Latin-school curriculum?", "options": [{"text": "He was banned as a pagan author by colonial authorities", "isCorrect": false, "rationale": "Plutarch was not banned; he was a standard schoolbook for boys learning Cicero and Tacitus."}, {"text": "He was a fixed item of the educated reading list, read alongside Cicero and Tacitus", "isCorrect": true, "rationale": "Boys read Plutarch in translation — usually North's or the Langhornes' (1770) — as part of the standard Latin-school program, alongside Cicero and Tacitus."}, {"text": "He was studied only in seminaries", "isCorrect": false, "rationale": "Plutarch was a general schoolbook, not a specialized seminary text."}, {"text": "He was unknown to American schoolboys before the Revolution", "isCorrect": false, "rationale": "Adams wrote in 1781 that Plutarch was \"in the hands of every American boy of sense.\""}], "id": "q01"}, {"question": "Which Founder filled his diary with paired comparisons in the Plutarchan mode?", "options": [{"text": "Thomas Jefferson", "isCorrect": false, "rationale": "Jefferson worried about Hamilton in Plutarchan terms but is not the figure named for diary comparisons."}, {"text": "John Adams", "isCorrect": true, "rationale": "Adams's diary entries are full of paired comparisons: Washington with Caesar; Hamilton with Alcibiades; Adams himself, repeatedly, with Cicero."}, {"text": "James Madison", "isCorrect": false, "rationale": "Madison wrote Federalist 10 in a Plutarchan spirit but is not the named diarist."}, {"text": "Benjamin Franklin", "isCorrect": false, "rationale": "Franklin is not the figure identified in the chapter for this practice."}], "id": "q02"}, {"question": "Whom did John Adams repeatedly compare himself with in Plutarchan fashion?", "options": [{"text": "Pericles", "isCorrect": false, "rationale": "Pericles is in Plutarch but not the figure Adams used for self-comparison."}, {"text": "Cicero", "isCorrect": true, "rationale": "Adams repeatedly compared himself with Cicero in his diary entries; he compared Washington with Caesar and Hamilton with Alcibiades."}, {"text": "Cato the Younger", "isCorrect": false, "rationale": "Cato the Younger is the moral type behind Patrick Henry's line, not Adams's self-comparison."}, {"text": "Brutus", "isCorrect": false, "rationale": "Brutus was the precedent the Founders invoked for revolutionary action, not Adams's self-figure."}], "id": "q03"}, {"question": "Whom did Alexander Hamilton prefer as his Plutarchan favorite, attracted to \"the brilliant outsider rising to executive power\"?", "options": [{"text": "Brutus", "isCorrect": false, "rationale": "Brutus was the Founders' precedent for tyrannicide, not Hamilton's executive favorite."}, {"text": "Caesar", "isCorrect": true, "rationale": "Hamilton's youthful favorite was Caesar — the brilliant outsider rising to executive power. His enemies (especially Jefferson) accused him of wanting to be Caesar; Hamilton thought the comparison flattering."}, {"text": "Cato the Elder", "isCorrect": false, "rationale": "Cato the Elder is the austere Roman virtue type, not the figure Hamilton imitated."}, {"text": "Camillus", "isCorrect": false, "rationale": "Camillus is one of the citizen-statesman models Washington imitated, not Hamilton's favorite."}], "id": "q04"}, {"question": "Patrick Henry's \"Give me liberty or give me death\" (1775) is identified as which kind of citation?", "options": [{"text": "A Stoic citation from Marcus Aurelius", "isCorrect": false, "rationale": "Marcus Aurelius is not the moral type behind this line."}, {"text": "A Brutus citation, with Cato the Younger at Utica or Brutus at Philippi as the moral type", "isCorrect": true, "rationale": "The chapter identifies Henry's line as a Brutus citation; the Plutarchan moral type behind it is Cato the Younger at Utica or Brutus at Philippi."}, {"text": "A purely biblical citation from the Maccabees", "isCorrect": false, "rationale": "The line's reference is Plutarchan, not biblical."}, {"text": "A direct quotation from the Federalist Papers", "isCorrect": false, "rationale": "The Federalist Papers came later and are described as Plutarchan in spirit but not as the source of Henry's line."}], "id": "q05"}, {"question": "Nathan Hale's \"I only regret that I have but one life to lose for my country\" paraphrases a line from which work?", "options": [{"text": "Cicero's Catilinarians", "isCorrect": false, "rationale": "Cicero's Catilinarians is a Plutarchan source but not the source of Hale's line."}, {"text": "Addison's Cato", "isCorrect": true, "rationale": "Hale's famous line paraphrases Addison's Cato, a play whose central character is the Plutarchan hero Cato the Younger."}, {"text": "Shakespeare's Julius Caesar", "isCorrect": false, "rationale": "Hale's line is not from Julius Caesar; Addison's Cato is the immediate source."}, {"text": "Demosthenes's Philippics", "isCorrect": false, "rationale": "Demosthenes is in Plutarch but not the source of Hale's line."}], "id": "q06"}, {"question": "Which of the following is identified as the citizen-statesman ideal Washington consciously imitated?", "options": [{"text": "The professional politician of modern democracy", "isCorrect": false, "rationale": "The chapter explicitly distinguishes the Plutarchan ideal from the professional politician of modern democracy."}, {"text": "The man of private virtue who takes public office reluctantly, performs it honorably, and retires when his term is done", "isCorrect": true, "rationale": "This is the figure of the citizen-statesman — Camillus, Publicola, Cato, Brutus. Washington's refusal of a third term, his return to Mount Vernon, his refusal to be made king were all Plutarchan moves recognized as such by his contemporaries."}, {"text": "The hereditary monarch", "isCorrect": false, "rationale": "The Plutarchan ideal is the opposite of monarchy."}, {"text": "The military dictator", "isCorrect": false, "rationale": "The Plutarchan citizen-statesman is the warning against the military dictator, not the model of one."}], "id": "q07"}, {"question": "Which paper of Madison's is described as Plutarchan in spirit, weighing ancient Sparta, ancient Rome, and modern Britain?", "options": [{"text": "Federalist 1", "isCorrect": false, "rationale": "Federalist 1 introduces the series but is not the specific paper identified for republican comparison."}, {"text": "Federalist 10", "isCorrect": true, "rationale": "Madison's Federalist 10 (on factions) is partly an exercise in republican comparison: ancient Sparta, ancient Rome, modern Britain — a Plutarchan synkrisis in spirit."}, {"text": "Federalist 51", "isCorrect": false, "rationale": "Federalist 51 is famous but is not the paper named for this republican comparison."}, {"text": "Federalist 78", "isCorrect": false, "rationale": "Federalist 78 is on the judiciary and is not the paper identified."}], "id": "q08"}, {"question": "Which Plutarchan precedent was used to legitimate revolutionary action against the British monarch?", "options": [{"text": "Pericles defending Athenian democracy", "isCorrect": false, "rationale": "Pericles is praised in Plutarch but is not the precedent for tyrannicide."}, {"text": "Brutus killing the tyrant Caesar", "isCorrect": true, "rationale": "The Plutarchan Brutus killing Caesar was, for the founding generation, a clear precedent. Brutus's right to depose his former benefactor for the city's sake was the type case for the colonies' right to depose their former monarch."}, {"text": "Cato's restoration of the Senate", "isCorrect": false, "rationale": "Cato is a moral type for resistance but not the specific revolutionary precedent named."}, {"text": "Solon's flight from Athens", "isCorrect": false, "rationale": "Solon's lawgiving is a different model entirely; his flight is not the precedent for revolution."}], "id": "q09"}, {"question": "Which later figure read \"the Bible, Shakespeare, and Plutarch — the same three books, in roughly the same order of importance, that Adams and Jefferson had read\"?", "options": [{"text": "Ralph Waldo Emerson", "isCorrect": false, "rationale": "Emerson did read Plutarch and wrote on him in Representative Men (1850), but he is not the figure described with this trio."}, {"text": "Henry David Thoreau", "isCorrect": false, "rationale": "Thoreau quoted Plutarch but is not the figure named for the three-book canon."}, {"text": "Abraham Lincoln", "isCorrect": true, "rationale": "Lincoln read the Bible, Shakespeare, and Plutarch; his understanding of the citizen-statesman in the Gettysburg Address and Second Inaugural is described as Plutarchan."}, {"text": "Frederick Douglass", "isCorrect": false, "rationale": "Douglass read widely but is not the figure named for this canon."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
