    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Demosthenes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What were the circumstances of Demosthenes's first public action?", "options": [{"text": "Defending Athens at the battle of Marathon as a young hoplite.", "isCorrect": false, "rationale": "Marathon was much earlier than Demosthenes's lifetime (384–322 BC); his first action was in court, not on a battlefield."}, {"text": "At age twenty, suing his guardians for embezzling the inheritance left by his weapons-maker father.", "isCorrect": true, "rationale": "His father died when he was seven; the guardians embezzled the estate; at twenty he sued them, won, recovered only a fraction, and in the process taught himself to be a speaker."}, {"text": "Volunteering to lead an embassy to Persia at age fifteen.", "isCorrect": false, "rationale": "There is no such mission in the Life; his entry into public life was through the lawsuit."}, {"text": "Writing a panegyric for Philip of Macedon's coronation.", "isCorrect": false, "rationale": "Demosthenes spent his career opposing Philip, not praising him."}], "id": "q01"}, {"question": "What does Plutarch say Demosthenes did to form his style?", "options": [{"text": "Studied with Aristotle at the Lyceum for ten years.", "isCorrect": false, "rationale": "Aristotle's Lyceum is not named as Demosthenes's school in the Life."}, {"text": "Transcribed Thucydides's history eight times in his own hand.", "isCorrect": true, "rationale": "Plutarch records that Demosthenes copied Thucydides's history eight times in his own hand to shape his style."}, {"text": "Memorized every play of Aeschylus, Sophocles, and Euripides.", "isCorrect": false, "rationale": "Tragedy is not named as his stylistic model; Thucydides is."}, {"text": "Spent a year as Isocrates's private secretary.", "isCorrect": false, "rationale": "Plutarch does not record an apprenticeship under Isocrates; the formative practice is the self-imposed Thucydides exercise."}], "id": "q02"}, {"question": "Why did Demosthenes shave one half of his head in his underground study?", "options": [{"text": "As a religious vow to Apollo before delivering a speech.", "isCorrect": false, "rationale": "Plutarch gives the reason as practical, not religious."}, {"text": "To mark himself as a slave so that his enemies would not recognize him.", "isCorrect": false, "rationale": "No such disguise motive is given; the head-shaving is about self-discipline."}, {"text": "So that he would not be able, however he might desire it, to leave the place — locking himself in to study for two or three months at a time.", "isCorrect": true, "rationale": "Plutarch explicitly explains the half-shaved head was a self-imposed restraint against the temptation to go out in public."}, {"text": "To imitate the Spartans, who routinely shaved before battle.", "isCorrect": false, "rationale": "No imitation of Spartan custom is given as the reason."}], "id": "q03"}, {"question": "What three physical exercises did Demosthenes use to overcome his natural weaknesses as a speaker?", "options": [{"text": "Holding a torch underwater, walking on stilts, and singing the Iliad each morning.", "isCorrect": false, "rationale": "None of these are in Plutarch's account."}, {"text": "Speaking with pebbles in his mouth (for the stutter), running or climbing steep places while reciting (for the lungs), and practicing before a mirror (to avoid flinching at distraction).", "isCorrect": true, "rationale": "Plutarch records all three: pebbles for the stutter, uphill exertion for the breath, and the mirror for composure."}, {"text": "Reading aloud against the noise of the harbor, fasting on speech days, and reciting in a whisper.", "isCorrect": false, "rationale": "These are not Plutarch's three methods."}, {"text": "Memorizing Homer in reverse, dictating from horseback, and writing with his left hand.", "isCorrect": false, "rationale": "None of these methods appears in the Life."}], "id": "q04"}, {"question": "In what year and against whom was the First Philippic delivered?", "options": [{"text": "In 480 BC, against Xerxes of Persia.", "isCorrect": false, "rationale": "That date is the second Persian invasion, well before Demosthenes was born."}, {"text": "In 351 BC, against Philip of Macedon.", "isCorrect": true, "rationale": "The Life dates the First Philippic to 351 BC, calling Athens to action against Philip's growing power."}, {"text": "In 359 BC, against Alexander the Great.", "isCorrect": false, "rationale": "359 BC is Philip's accession year; Alexander did not yet rule."}, {"text": "In 322 BC, against Antipater.", "isCorrect": false, "rationale": "322 BC is the year of the Lamian War and Demosthenes's death, not of the First Philippic."}], "id": "q05"}, {"question": "What happened at the battle of Chaeronea (338 BC)?", "options": [{"text": "Athens and Thebes, finally combined against Philip, were defeated; Alexander led the cavalry charge that broke the Theban Sacred Band; Demosthenes was in the line and fled the field.", "isCorrect": true, "rationale": "The Life records the combined Greek defeat, Alexander's cavalry charge against the Sacred Band, and Demosthenes fleeing the field — for which his enemies mocked him."}, {"text": "Demosthenes personally killed Philip in single combat.", "isCorrect": false, "rationale": "Philip was not killed at Chaeronea; he was assassinated in 336 BC, two years later."}, {"text": "Athens won decisively and Philip retreated to Macedon.", "isCorrect": false, "rationale": "The Greek alliance was defeated; the political independence of the Greek city-states was effectively over."}, {"text": "The battle was called off at the last minute and ended in a treaty without bloodshed.", "isCorrect": false, "rationale": "The battle was fought and decisive; there was no negotiated cancellation."}], "id": "q06"}, {"question": "How did Demosthenes react to the news that Philip had been assassinated in 336 BC?", "options": [{"text": "He immediately offered terms of submission to Alexander.", "isCorrect": false, "rationale": "His reaction was defiance, not submission; Alexander later demanded he be handed over."}, {"text": "He withdrew into private mourning, fearing reprisal.", "isCorrect": false, "rationale": "The Life records the opposite: he celebrated openly."}, {"text": "He celebrated openly, wearing a garland in the streets.", "isCorrect": true, "rationale": "Plutarch records the open celebration and the garland."}, {"text": "He fled to Calauria immediately, fearing the new king.", "isCorrect": false, "rationale": "The flight to Calauria happens fifteen years later, after the Lamian War."}], "id": "q07"}, {"question": "What was the Harpalus affair, and how does Plutarch judge it?", "options": [{"text": "Harpalus was a Persian king who paid Demosthenes a salary; Plutarch finds it admirable.", "isCorrect": false, "rationale": "Harpalus was a friend of Alexander's, not a Persian king, and Plutarch judges the affair severely."}, {"text": "Harpalus, a friend of Alexander's, fled to Athens with embezzled royal treasure; Demosthenes was accused of accepting a bribe, tried, convicted, and banished. Plutarch concludes the conviction was probably partly deserved and partly political.", "isCorrect": true, "rationale": "The Life identifies Harpalus as Alexander's friend who fled with royal money, notes Demosthenes's defense (\"cannot fight money with words\"), and gives Plutarch's qualified verdict."}, {"text": "Harpalus was a Macedonian general Demosthenes assassinated.", "isCorrect": false, "rationale": "No assassination is involved; the affair is a bribery accusation."}, {"text": "Plutarch entirely clears Demosthenes and dismisses the affair as fabrication.", "isCorrect": false, "rationale": "Plutarch notes some sources clear him entirely but does not adopt that view as his own."}], "id": "q08"}, {"question": "What happened during and after the Lamian War (323 BC)?", "options": [{"text": "Alexander died; Greek cities rose against Macedonian rule; Demosthenes was recalled to Athens by acclamation; the Greeks lost; Antipater's settlement called for the death of the anti-Macedonian leaders, and Demosthenes fled.", "isCorrect": true, "rationale": "The Life records all four stages: Alexander's death, the Greek rising, the acclaimed recall, the defeat, the demanded executions, and the flight."}, {"text": "Athens won the Lamian War and restored its political independence.", "isCorrect": false, "rationale": "The Greeks lost the Lamian War; Antipater imposed terms."}, {"text": "Demosthenes refused recall and stayed in exile until his death.", "isCorrect": false, "rationale": "He was recalled by acclamation and spoke again in the assembly."}, {"text": "Antipater pardoned all anti-Macedonian leaders, including Demosthenes.", "isCorrect": false, "rationale": "Antipater's settlement specifically required the death of the anti-Macedonian leaders."}], "id": "q09"}, {"question": "How does Demosthenes die in Plutarch's account?", "options": [{"text": "Killed in battle defending Athens against Antipater.", "isCorrect": false, "rationale": "He did not die in battle; he took refuge in a temple."}, {"text": "Stabbed by Archias's soldiers inside the temple of Poseidon.", "isCorrect": false, "rationale": "He took his own life with poison; he was not killed by the soldiers."}, {"text": "Refuged in the temple of Poseidon at Calauria, sucked poison hidden in a quill while pretending to write a letter to his family, then walked to the temple door, addressed Archias, and collapsed at the foot of the altar at age sixty-two.", "isCorrect": true, "rationale": "Plutarch's account gives all these details: Calauria, the quill, the letter pretext, the parting words to Archias and Poseidon, and the death at the altar."}, {"text": "Died of natural causes in Athens, having outlived Alexander by twenty years.", "isCorrect": false, "rationale": "He outlived Alexander by less than a year, and his death was a suicide by poison."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
