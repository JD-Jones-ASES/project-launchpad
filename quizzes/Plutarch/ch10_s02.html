<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Spartan Kings: Agis and Cleomenes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why does Plutarch treat the Lives of Agis and Cleomenes as a continuous narrative?", "options": [{"text": "Because they ruled jointly as co-kings during the same years.", "isCorrect": false, "rationale": "They reigned in different periods, not jointly; Agis was strangled before Cleomenes took the throne."}, {"text": "Because their projects were the same and Cleomenes consciously completed what Agis began.", "isCorrect": true, "rationale": "The text gives exactly this reason: shared project plus Cleomenes's deliberate completion of Agis's program."}, {"text": "Because both men shared a single ephoric council during their reigns.", "isCorrect": false, "rationale": "The ephors opposed Agis and were murdered by Cleomenes; they did not unite the two reigns."}, {"text": "Because Plutarch had run out of Greek subjects to pair with Romans.", "isCorrect": false, "rationale": "Plutarch's stated reason is thematic, not a shortage of material."}]}, {"question": "What three reforms did Agis IV propose for Sparta?", "options": [{"text": "Cancellation of debts, redistribution of land, and restoration of the agoge.", "isCorrect": true, "rationale": "The chapter lists these three together as the Lycurgan package Agis proposed: debt cancellation, land redistribution into Spartan and perioikic plots, and the agoge."}, {"text": "Expansion of the helot class, naval rebuilding, and tax reform.", "isCorrect": false, "rationale": "None of these is part of Agis's program as the text presents it."}, {"text": "Abolition of the ephorate, exile of the perioikoi, and an alliance with Macedon.", "isCorrect": false, "rationale": "Abolition of the ephorate was Cleomenes's later move; Agis would have included the perioikoi, not exiled them; the Macedon alliance was hostile, not allied."}, {"text": "Construction of a new fleet, codification of laws, and reduction of the king's authority.", "isCorrect": false, "rationale": "No fleet construction is in the program, and Agis sought to strengthen, not weaken, kingly authority over reform."}]}, {"question": "What was the “festival of fire” in Agis's reform?", "options": [{"text": "A military victory celebration after a campaign.", "isCorrect": false, "rationale": "It was not a military celebration; it marked a political act, the burning of debt records."}, {"text": "A religious festival to Apollo at Amyclae.", "isCorrect": false, "rationale": "The chapter assigns the name to a political event, not a religious one."}, {"text": "The public burning of the debt records after the debts were cancelled.", "isCorrect": true, "rationale": "The text says the cancellation of debts passed and the debt records were burned in the public square, the day called “the festival of fire.”"}, {"text": "The burning of the ephors' chairs after their deposition.", "isCorrect": false, "rationale": "The deposition of the ephors is described separately and not under this name."}]}, {"question": "Which part of Agis's program actually went through, and which did not?", "options": [{"text": "Both debt cancellation and land redistribution went through immediately.", "isCorrect": false, "rationale": "Only one went through; the redistribution stalled before it was implemented."}, {"text": "Debt cancellation passed; the land redistribution was indefinitely postponed.", "isCorrect": true, "rationale": "The text says the debts were cancelled but the land redistribution was held up by Leonidas's faction and never implemented under Agis."}, {"text": "Land redistribution succeeded; debts were left untouched.", "isCorrect": false, "rationale": "The order is reversed; debts were cancelled, redistribution held back."}, {"text": "Neither reform succeeded; both were defeated in the assembly.", "isCorrect": false, "rationale": "The debt cancellation did succeed, and the records were publicly burned."}]}, {"question": "Who shared Agis's prison death, and how does the chapter describe it?", "options": [{"text": "His co-king Leonidas was killed beside him.", "isCorrect": false, "rationale": "Leonidas was Agis's opponent who orchestrated his death, not a fellow victim."}, {"text": "His mother Agesistrata and grandmother Archidamia, who refused to abandon him.", "isCorrect": true, "rationale": "The text says both his mother and his grandmother were brought into the prison and strangled beside him after refusing to leave him."}, {"text": "His brother and a personal servant.", "isCorrect": false, "rationale": "No brother is in the account; the chapter names his mother and grandmother."}, {"text": "His widow, who later married Cleomenes.", "isCorrect": false, "rationale": "Agis's widow later married Cleomenes, but she did not die with him; his mother and grandmother did."}]}, {"question": "What is Plutarch's specific moral judgment about Agis's failure?", "options": [{"text": "That Agis was politically corrupt and personally greedy.", "isCorrect": false, "rationale": "Plutarch judges Agis sympathetically; the criticism is not corruption or greed."}, {"text": "That Agis showed a lack of determination and let himself be baffled by Agesilaus's craft.", "isCorrect": true, "rationale": "The text quotes Plutarch's verdict directly: Agis had moral vision but not the political toughness the program needed."}, {"text": "That Agis was too ruthless and alienated his own allies.", "isCorrect": false, "rationale": "The charge is the opposite of ruthlessness — not enough toughness, not too much."}, {"text": "That Agis betrayed the Lycurgan cause for personal advantage.", "isCorrect": false, "rationale": "Plutarch grants Agis the moral vision; no betrayal of the cause is alleged."}]}, {"question": "How did Cleomenes III change the method of reform after Agis?", "options": [{"text": "He used purely legal and persuasive means to avoid violence.", "isCorrect": false, "rationale": "His method was the opposite — a military coup that killed the ephors at dinner."}, {"text": "He used a military coup, returning to Sparta with picked troops and having the ephors killed.", "isCorrect": true, "rationale": "The text describes this exact method: military success first, then a violent coup against the ephors over dinner."}, {"text": "He called in Macedonian forces to enforce his reforms.", "isCorrect": false, "rationale": "Macedon eventually marched against him; he did not call them in."}, {"text": "He delegated the program to a council of perioikoi.", "isCorrect": false, "rationale": "He expanded the citizen body with loyal perioikoi but did not delegate reform to a perioikic council."}]}, {"question": "Which of these institutional changes did Cleomenes carry through that went beyond Agis's plan?", "options": [{"text": "He abolished the ephorate entirely and replaced it with a smaller council of patronomoi.", "isCorrect": true, "rationale": "The text says Cleomenes abolished the ephorate and substituted patronomoi, becoming sole effective ruler."}, {"text": "He reinstated the Lycurgan ephorate exactly as Lycurgus had designed it.", "isCorrect": false, "rationale": "He did the opposite: he killed the ephors and abolished the office."}, {"text": "He installed a democratic assembly with annual elections of magistrates.", "isCorrect": false, "rationale": "No democratic assembly was installed; effective rule moved into Cleomenes's hands."}, {"text": "He expanded the kingship to include three co-kings.", "isCorrect": false, "rationale": "He became sole effective ruler, not one of three."}]}, {"question": "What was the decisive military outcome of Cleomenes's resurgent Sparta?", "options": [{"text": "He was defeated by the Achaean League alone at Mantinea.", "isCorrect": false, "rationale": "The Achaean League could not defeat him alone; they called in Macedon."}, {"text": "He was defeated by Antigonus Doson of Macedon at Sellasia in 222 BC.", "isCorrect": true, "rationale": "The text specifies this defeat by the Macedonian king Antigonus Doson at Sellasia in 222 BC."}, {"text": "He destroyed the Achaean League and held Greece for a generation.", "isCorrect": false, "rationale": "His resurgence was brief and ended in defeat; no generation-long hegemony."}, {"text": "He triumphed at Plataea and was crowned hegemon of Greece.", "isCorrect": false, "rationale": "No such triumph occurred in his career; his peak was followed by Sellasia."}]}, {"question": "What is Plutarch's overall judgment on the contrast between the two Spartan kings?", "options": [{"text": "Cleomenes was both more capable and more virtuous than Agis.", "isCorrect": false, "rationale": "Plutarch reserves the moral high ground for Agis; Cleomenes is more capable but more morally compromised."}, {"text": "Agis achieved more politically than Cleomenes ever did.", "isCorrect": false, "rationale": "The opposite — Agis was killed without changing Sparta, while Cleomenes had real if brief effect."}, {"text": "Cleomenes was more politically capable but more morally compromised; Agis was the more honorable but ineffective reformer.", "isCorrect": true, "rationale": "The text concludes that Cleomenes achieved what Agis could not but at a moral cost, while Agis paid in his life what Cleomenes paid in moral standing."}, {"text": "Both kings were equally successful in restoring the Lycurgan order permanently.", "isCorrect": false, "rationale": "Neither achieved permanent restoration; both projects collapsed, by different routes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
