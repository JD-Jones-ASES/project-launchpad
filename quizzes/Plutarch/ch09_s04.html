<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "On Axis 1 (oratorical method), how does Plutarch contrast the two men?", "options": [{"text": "Demosthenes was the more rounded; Cicero the more focused.", "isCorrect": false, "rationale": "The synkrisis reverses these labels — Demosthenes is the more focused, Cicero the more rounded."}, {"text": "Demosthenes \"applied all the faculties he had, natural or acquired, wholly that way,\" making himself an orator by dedicated effort; Cicero was already \"highly educated\" before becoming an orator, and his speeches betray that wider learning. Plutarch finds the focus the greater discipline.", "isCorrect": true, "rationale": "The synkrisis is explicit about both descriptions and gives the round to Demosthenes for focus."}, {"text": "Both men were equally focused, and Plutarch declares Axis 1 a draw.", "isCorrect": false, "rationale": "Plutarch awards Axis 1 to Demosthenes, not as a draw."}, {"text": "Cicero spent his youth on dedicated voice exercises; Demosthenes inherited fluency.", "isCorrect": false, "rationale": "The Demosthenes Life pictures him as the one who built fluency through exercise; Cicero is the educated generalist."}]}, {"question": "On Axis 2 (tone), what is the verdict and why?", "options": [{"text": "Round to Cicero — his wit made his speeches more persuasive than Demosthenes's austerity.", "isCorrect": false, "rationale": "Plutarch finds the wit politically hazardous, not advantageous; the round goes to Demosthenes."}, {"text": "Round to Demosthenes — his oratory was without embellishment or jesting, \"wholly composed for real effect and seriousness,\" while Cicero's love of mockery sometimes \"ran him into scurrility\" and made him enemies he did not need to make.", "isCorrect": true, "rationale": "The synkrisis names exactly these two phrases and awards Axis 2 to Demosthenes."}, {"text": "Plutarch refuses to judge the tone, saying it is a matter of personal taste.", "isCorrect": false, "rationale": "The synkrisis is explicitly judgmental, calling tone a matter on which character can be weighed."}, {"text": "Plutarch finds both men too austere and prefers Pericles.", "isCorrect": false, "rationale": "Pericles is not introduced in the synkrisis; the comparison stays between the two named orators."}]}, {"question": "On Axis 3 (boasting), how does Plutarch judge the two?", "options": [{"text": "Cicero's \"immeasurable boasting of himself in his orations\" reveals an \"uncontrollable appetite for distinction\"; Demosthenes praised himself sparingly and only when necessary. Round to Demosthenes.", "isCorrect": true, "rationale": "The synkrisis names both qualities exactly and awards Axis 3 to Demosthenes."}, {"text": "Demosthenes boasted constantly; Cicero was modest. Round to Cicero.", "isCorrect": false, "rationale": "The synkrisis reverses these roles."}, {"text": "Plutarch is indifferent to the question of self-praise.", "isCorrect": false, "rationale": "Plutarch finds Cicero's self-praise \"genuinely unattractive,\" not indifferent."}, {"text": "Both men boasted equally and Plutarch declares Axis 3 a draw.", "isCorrect": false, "rationale": "The synkrisis is explicit: round to Demosthenes."}]}, {"question": "On Axis 4 (political office and integrity in office), what is the verdict?", "options": [{"text": "Round to Demosthenes — he served as Athenian general and won three campaigns.", "isCorrect": false, "rationale": "Demosthenes never held a major office and never commanded armies; the round goes to Cicero."}, {"text": "Round to Cicero — Demosthenes never held a major office; Cicero served as quaestor in Sicily and proconsul in Cilicia and Cappadocia, proved unusually honest at a time when governors routinely enriched themselves, and handled the Catiline crisis as consul with skill and courage.", "isCorrect": true, "rationale": "The synkrisis explicitly compares office-holding integrity and awards Axis 4 to Cicero."}, {"text": "Plutarch declines to judge Axis 4 because Athens and Rome are incomparable.", "isCorrect": false, "rationale": "Plutarch does judge it — explicitly in Cicero's favor."}, {"text": "Round to Cicero, but only because of his retirement writings.", "isCorrect": false, "rationale": "The round is given for office-holding integrity, not for retirement writings."}]}, {"question": "On Axis 5 (money), how does Plutarch rule?", "options": [{"text": "Round to Demosthenes — Cicero was the one accused of bribery.", "isCorrect": false, "rationale": "The synkrisis reverses this: the bribery accusations are against Demosthenes."}, {"text": "Plutarch finds the question of money trivial and dismisses it.", "isCorrect": false, "rationale": "Plutarch treats Axis 5 as a distinct moral axis, not a trivial one."}, {"text": "Round to Cicero — Demosthenes was accused (and Plutarch \"half-believes\") of accepting bribes from the king of Persia and from Harpalus; Cicero refused presents from the Sicilians, from the king of Cappadocia, and from his friends at Rome when he was in exile.", "isCorrect": true, "rationale": "The synkrisis names both sets of facts and awards Axis 5 to Cicero."}, {"text": "Both men took bribes and Plutarch condemns them equally.", "isCorrect": false, "rationale": "Cicero is given as the man who refused; only Demosthenes is half-believed to have taken."}]}, {"question": "On Axis 6 (character of the exile), how does Plutarch decide — and why?", "options": [{"text": "Round, narrowly, to Demosthenes — although Cicero's exile had the more honorable cause (the Senate went into mourning), Demosthenes used his exile productively (traveling Greek cities, working against Macedonia) while Cicero \"passed his exile idly in Macedonia.\"", "isCorrect": true, "rationale": "The synkrisis acknowledges Cicero's better cause for exile but rewards Demosthenes's better use of misfortune."}, {"text": "Round to Cicero — his exile had the more honorable cause and the Senate honored him with mourning.", "isCorrect": false, "rationale": "Although Plutarch acknowledges this, he weighs the use of exile more heavily and awards Axis 6 narrowly to Demosthenes."}, {"text": "Round to Demosthenes — Plutarch judges Cicero's exile entirely deserved and Demosthenes's entirely innocent.", "isCorrect": false, "rationale": "The synkrisis grants that Cicero's cause for exile was better; the judgment turns on use, not on whose exile was just."}, {"text": "Plutarch declares Axis 6 a tie because both were eventually recalled.", "isCorrect": false, "rationale": "Plutarch awards Axis 6 to Demosthenes, narrowly, on the use of exile."}]}, {"question": "On Axis 7 (the death), what does Plutarch admire most in Demosthenes?", "options": [{"text": "That he died in battle defending Athens.", "isCorrect": false, "rationale": "Demosthenes did not die in battle; he took poison in the temple of Poseidon."}, {"text": "That Cicero's death is more pitiful and Demosthenes died fighting.", "isCorrect": false, "rationale": "Plutarch finds Cicero pitiful and Demosthenes composed — but the praise is for composure, not combat."}, {"text": "That \"Demosthenes demands our admiration; and still more admirable was his using [the poison], freeing himself from arms and soldiers, and laughing to scorn the cruelty of Antipater.\"", "isCorrect": true, "rationale": "The synkrisis explicitly quotes this praise for the composed and defiant manner of the death."}, {"text": "That Demosthenes outlived all his enemies.", "isCorrect": false, "rationale": "Demosthenes did not outlive his enemies; Antipater outlived him."}]}, {"question": "How does Plutarch summarize the overall result of the synkrisis?", "options": [{"text": "A clean sweep for Demosthenes on every axis.", "isCorrect": false, "rationale": "Cicero wins Axes 4 and 5, so it is not a sweep."}, {"text": "A tilt toward Demosthenes but with significant qualifications: Demosthenes is the more focused orator and more composed character; Cicero is the more capable public official and the more morally clean man in office. The combination produces two distinct paths to public greatness rather than a clear winner.", "isCorrect": true, "rationale": "Plutarch's overall judgment exactly tilts Greek with qualifications and praises Cicero's office-holding while preferring Demosthenes's focus."}, {"text": "Plutarch refuses to render any verdict and ends the synkrisis with a question.", "isCorrect": false, "rationale": "Plutarch renders a verdict; he simply qualifies it."}, {"text": "A clean sweep for Cicero because of his philosophical breadth.", "isCorrect": false, "rationale": "Plutarch awards five of the seven axes to Demosthenes; no clean sweep for Cicero."}]}, {"question": "What does Plutarch identify as the singular virtue he most admires in Demosthenes?", "options": [{"text": "His political success in saving Athens.", "isCorrect": false, "rationale": "Demosthenes did not save Athens; that political success is not what Plutarch admires."}, {"text": "The singleness of purpose — the orator who dedicated himself wholly to one art and used it for one cause (the freedom of Greece), which Plutarch finds something more morally weighty than the brilliant generalist Cicero.", "isCorrect": true, "rationale": "The synkrisis explicitly names the singleness of purpose as the higher virtue."}, {"text": "His philosophical breadth in retirement.", "isCorrect": false, "rationale": "Demosthenes did not produce philosophical writing; that is Cicero's distinction."}, {"text": "His military prowess.", "isCorrect": false, "rationale": "Demosthenes was not a military commander; he fled the field at Chaeronea."}]}, {"question": "What complication does the synkrisis itself barely acknowledge, which weighs on Cicero's side for the modern reader?", "options": [{"text": "That Cicero's speeches against Antony actually succeeded in driving him from Rome.", "isCorrect": false, "rationale": "Plutarch is clear the Philippics did not back down Antony; they enraged him."}, {"text": "That Cicero secretly accepted bribes the synkrisis overlooked.", "isCorrect": false, "rationale": "Plutarch records Cicero refusing bribes; that is Axis 5 in Cicero's favor."}, {"text": "That Cicero's philosophical writings (which Demosthenes did not produce) became the foundation of the medieval Western tradition — a long influence Plutarch could not yet see, but which has to weigh heavily on Cicero's side in the modern reader's calculation.", "isCorrect": true, "rationale": "The synkrisis explicitly raises this complication: Plutarch saw only Cicero the orator, not the schoolbook of fifteen centuries of European thought."}, {"text": "That Demosthenes invented the genre of philosophical dialogue.", "isCorrect": false, "rationale": "Demosthenes is not credited with the philosophical dialogue."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
