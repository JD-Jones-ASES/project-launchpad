    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Alcibiades</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What three features dominate Plutarch's opening description of Alcibiades?", "options": [{"text": "Quiet manner, modest dress, and indifference to fame.", "isCorrect": false, "rationale": "All three are the opposite of what Plutarch describes; Alcibiades was famous, flamboyant, and consumed by ambition."}, {"text": "Almost unbelievable beauty, a slight lisp that became fashionable, and limitless energy.", "isCorrect": true, "rationale": "Plutarch's opening dwells on his Mediterranean-wide beauty, his slight lisp 'that became a fashionable affectation,' and 'limitless energy, a brilliant tongue, and an impulse for the theatrical.'"}, {"text": "Battlefield scars from boyhood, a fierce temper, and abstinence from wine.", "isCorrect": false, "rationale": "Alcibiades was a famous drinker and debauch; the opening is about beauty and charisma, not asceticism."}, {"text": "A withdrawn temperament, religious piety, and a love of solitude.", "isCorrect": false, "rationale": "Plutarch's Alcibiades is the very opposite of withdrawn — he is theatrical, social, and politically ambitious."}]}, {"question": "What do the two famous boyhood incidents — the wrestling-bite and the loaded cart — share, according to Plutarch?", "options": [{"text": "Each shows Alcibiades's calm acceptance of defeat.", "isCorrect": false, "rationale": "Both stories show the refusal to accept defeat, not the calm acceptance of it."}, {"text": "Each shows that Alcibiades will not be made to lose and will, if necessary, stake his life on a refusal.", "isCorrect": true, "rationale": "Plutarch's reading is explicit: 'Alcibiades will not be made to lose; he will not give way; he will, if necessary, stake his life on a refusal.'"}, {"text": "Each shows a tender concern for animals and weaker boys.", "isCorrect": false, "rationale": "The lion-bite and the cart-incident are about aggression and theatrical defiance, not tenderness."}, {"text": "Each shows the boy's habit of obeying his elders.", "isCorrect": false, "rationale": "Both stories show defiance — biting an opponent and lying down in a cart's path despite the driver's command."}]}, {"question": "What was the nature of the friendship between Alcibiades and Socrates as Plutarch describes it?", "options": [{"text": "Socrates was a passing acquaintance who had no lasting influence on Alcibiades.", "isCorrect": false, "rationale": "Plutarch presents Socrates as the brightest light in the Life and the one man Alcibiades genuinely respected."}, {"text": "Socrates and Alcibiades were strangers until Alcibiades's exile.", "isCorrect": false, "rationale": "They met when Alcibiades was a young man, well before his political life and exile."}, {"text": "A mutual relationship in which Socrates saved Alcibiades at Potidaea and Alcibiades later protected Socrates at Delium.", "isCorrect": true, "rationale": "Plutarch records both episodes: Socrates stepped over the wounded Alcibiades at Potidaea and defended him; at Delium Alcibiades, on horseback, protected Socrates as the Athenians fled."}, {"text": "Alcibiades flattered Socrates publicly but mocked him in private.", "isCorrect": false, "rationale": "Plutarch presents this as one of the few unfeigned relationships in Alcibiades's life — 'alone of his many admirers, [he] found Socrates genuinely worth his attention.'"}]}, {"question": "Plutarch records that Alcibiades cut off the tail of his own famously beautiful dog (worth seventy minae) and gave a deliberate explanation. What was it?", "options": [{"text": "He wished the Athenians to talk about this, so that they might not say something worse of him.", "isCorrect": true, "rationale": "The text gives Alcibiades's own words: he wanted the Athenians to talk about the dog so they might not say something worse of him — a deliberate manipulation of the public conversation."}, {"text": "He believed the dog was suffering and acted to relieve it.", "isCorrect": false, "rationale": "The motive Plutarch records is theatrical manipulation of public attention, not animal welfare."}, {"text": "He had lost a bet to a friend and was forced to do it.", "isCorrect": false, "rationale": "No bet is mentioned; Plutarch describes the act as Alcibiades's own initiative."}, {"text": "He thought the dog's tail was a religious offering owed to Hermes.", "isCorrect": false, "rationale": "No religious motive is given; this would conflate the incident with the Herms scandal that comes later."}]}, {"question": "What was the Herms scandal and how did it precipitate Alcibiades's defection?", "options": [{"text": "Alcibiades publicly destroyed Spartan religious statues and fled to Persia.", "isCorrect": false, "rationale": "The Herms were Athenian statues of Hermes, not Spartan; the scandal was Athenian and was used against Alcibiades by his political enemies."}, {"text": "The Eleusinian Mysteries were performed at the wrong time, and Alcibiades was credited with the disorder.", "isCorrect": false, "rationale": "The profanation of the Mysteries was a separate, related charge; the principal scandal in the chapter is the mutilation of the Hermes statues."}, {"text": "Someone mutilated the Hermes statues; Alcibiades's enemies used the charge to obtain a death sentence in absentia while the fleet was at sea, and he defected to Sparta.", "isCorrect": true, "rationale": "The text describes the night-time mutilation of the Herms, the political delay that prevented an immediate trial, the recall summons sent after the fleet, Alcibiades's disappearance, the in-absentia death sentence, and his appearance in Sparta."}, {"text": "Alcibiades was caught stealing temple funds and surrendered the fleet to the Spartans.", "isCorrect": false, "rationale": "Theft is not the charge; the charges were religious sacrilege and profanation."}]}, {"question": "How does Plutarch portray Alcibiades's adaptation to Spartan life?", "options": [{"text": "He refused all Spartan customs and demanded Athenian luxuries.", "isCorrect": false, "rationale": "Plutarch presents Alcibiades as the consummate chameleon, adopting Spartan habits flawlessly."}, {"text": "He exercised in the gymnasium, ate the black broth, and wore the rough cloak.", "isCorrect": true, "rationale": "Plutarch lists these three Spartan habits exactly to illustrate Alcibiades's adaptability: he 'exercised in the gymnasium, ate the black broth, wore the rough cloak.'"}, {"text": "He stayed in his quarters and refused to socialize at all.", "isCorrect": false, "rationale": "Plutarch shows the opposite — Alcibiades thoroughly socialized and impressed the Spartans before scandal forced him to flee."}, {"text": "He insisted on Athenian-style banquets at the Spartan court.", "isCorrect": false, "rationale": "He suppressed his Athenian habits to charm the Spartans, then later did the same trick in Persian dress at the court of Tisaphernes."}]}, {"question": "Why was Alcibiades recalled to command the Athenian fleet at Samos in 411 BC?", "options": [{"text": "The oligarchic revolution at Athens had failed, and the new democratic government recalled him from exile.", "isCorrect": true, "rationale": "Plutarch records that 'when the Athenian oligarchic revolution of 411 BC failed, the new democratic government recalled Alcibiades from exile to command the Athenian fleet at Samos.'"}, {"text": "The Spartans expelled him after he gave them poor advice.", "isCorrect": false, "rationale": "His Spartan advice succeeded; what forced his flight from Sparta was the seduction of King Agis's wife, not bad strategy."}, {"text": "The Persians demanded his return to Athens as a condition for peace.", "isCorrect": false, "rationale": "No Persian demand for his return is mentioned; Persia was actually using him as an adviser against Sparta."}, {"text": "Pericles personally invited him back to lead the city.", "isCorrect": false, "rationale": "Pericles had been dead for some twenty years by 411 BC."}]}, {"question": "What happened at the battle of Notium that led to Alcibiades's second fall?", "options": [{"text": "Alcibiades himself was defeated in a major engagement.", "isCorrect": false, "rationale": "Plutarch says the loss was inflicted on a subordinate, not on Alcibiades in person."}, {"text": "One of Alcibiades's subordinates lost a sea battle while Alcibiades was absent, and the Athenians removed him from command.", "isCorrect": true, "rationale": "The text says 'one of his subordinates lost a sea battle near Notium while Alcibiades was absent. The Athenians, in their fickle way, removed him from command.'"}, {"text": "Alcibiades was killed by Spartan agents in the battle.", "isCorrect": false, "rationale": "He survived Notium and retired to a private estate in Thrace; his death came later, in Phrygia."}, {"text": "He defected back to Sparta during the engagement.", "isCorrect": false, "rationale": "He did not defect at Notium; he retired to Thrace as a private citizen."}]}, {"question": "Plutarch's verdict on Alcibiades is described as 'tempered.' What does that tempering rest on?", "options": [{"text": "The fact that Alcibiades was secretly always loyal to Athens.", "isCorrect": false, "rationale": "Plutarch does not pretend the betrayals were illusory; the loyalty to Socrates is the one personal loyalty he records."}, {"text": "The fact that Alcibiades was incorruptible in financial matters.", "isCorrect": false, "rationale": "The synkrisis (Topic 7.4) actually concedes Alcibiades was famously corrupt in money; Coriolanus, not Alcibiades, wins on incorruptibility."}, {"text": "Recognition that Athens needed what Alcibiades alone could do, and that Athens was not innocent in its treatment of him.", "isCorrect": true, "rationale": "The closing reads: 'Athens, at moments, did genuinely need what Alcibiades alone could do; and Athens, in its treatment of him, was not innocent either.' That mutual implication is the tempering."}, {"text": "Sympathy because Alcibiades died young.", "isCorrect": false, "rationale": "He died at about 46 — not in old age but not a youth. Plutarch's sympathy rests on a political analysis, not a biographical one."}]}, {"question": "How does Plutarch present the entanglement of Alcibiades's death with the end of Athens?", "options": [{"text": "Alcibiades's death had no relation to Athens's defeat.", "isCorrect": false, "rationale": "Plutarch underlines the symbolic and chronological link between the two events."}, {"text": "Alcibiades and Athens both ended in the same year, 404 BC — the city that had once given him every opportunity ended at almost the same moment as the man who had been her most brilliant and ruinous son.", "isCorrect": true, "rationale": "The text says exactly this: he died in 404 BC, the same year Athens surrendered, and 'the two endings are entangled.'"}, {"text": "Alcibiades's death was the immediate cause of Athens's surrender.", "isCorrect": false, "rationale": "His death and Athens's surrender are entangled in time, but the surrender followed defeat at Aegospotami (405 BC), not his death."}, {"text": "Alcibiades died years before Athens fell and is unrelated to the surrender.", "isCorrect": false, "rationale": "He died in 404 BC, the same year as the surrender, not years before."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
