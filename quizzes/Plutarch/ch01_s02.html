<div class="quiz-container">

        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Parallel Lives: Method and Purpose</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the chief structural innovation of Plutarch's Parallel Lives compared with other ancient collections like Suetonius's Lives of the Twelve Caesars?", "options": [{"text": "Plutarch wrote his Lives in verse rather than prose.", "isCorrect": false, "rationale": "All of Plutarch's biographical work is in prose; the innovation lies in the comparative method, not the medium."}, {"text": "Plutarch paired one famous Greek with one famous Roman in matched sets.", "isCorrect": true, "rationale": "The text identifies the pairing of Greeks with Romans as the move that distinguished Plutarch from every other ancient biographer."}, {"text": "Plutarch limited his subjects to philosophers, unlike Suetonius.", "isCorrect": false, "rationale": "Plutarch's subjects include founders, lawgivers, generals, orators, and statesmen — not just philosophers."}, {"text": "Plutarch arranged his biographies in strict chronological order.", "isCorrect": false, "rationale": "The text says the order 'roughly tracks the chronological order of the Greek figure,' but pairing is by theme, not chronology."}]}, {"question": "How many surviving pairings make up the Parallel Lives as we have them today?", "options": [{"text": "Twenty-three pairings, comprising forty-six biographies.", "isCorrect": true, "rationale": "The text states the work 'consists of twenty-three such units — forty-six biographies plus the original nineteen synkriseis that survive.'"}, {"text": "Fifty pairings, including the four single Lives.", "isCorrect": false, "rationale": "Fifty is the total Lives, but the four singles are not part of the paired project; there are twenty-three pairs."}, {"text": "Twelve pairings, one for each chapter of this book.", "isCorrect": false, "rationale": "This book treats ten of the pairs in detail, but Plutarch wrote twenty-three pairings, not twelve."}, {"text": "Forty-eight pairings, one for every Roman emperor.", "isCorrect": false, "rationale": "Plutarch did not organize the work around emperors; the original work contained roughly forty-eight biographies in twenty-four pairs, of which twenty-three pairs survive."}]}, {"question": "On what basis does Plutarch pair his Greeks and Romans?", "options": [{"text": "On the date of birth — he pairs contemporaries from the two cultures.", "isCorrect": false, "rationale": "The text explicitly says pairs are 'across eras' — Pericles and Fabius, for instance, lived two centuries apart."}, {"text": "On theme — men whose careers raise similar moral or political questions.", "isCorrect": true, "rationale": "The text says Plutarch 'pairs by theme: men whose careers can be set side by side because they faced similar problems or showed similar virtues and vices.'"}, {"text": "On battlefield encounters — pairs are always former enemies.", "isCorrect": false, "rationale": "Most of Plutarch's pairs never met one another; some lived in entirely different centuries."}, {"text": "On the languages they wrote in — orators with orators only.", "isCorrect": false, "rationale": "Some pairs are orators (Demosthenes and Cicero), but Plutarch pairs founders, lawgivers, and generals as well."}]}, {"question": "What kind of essay is the synkrisis that closes each pairing?", "options": [{"text": "A bare summary of similarities and differences, without judgment.", "isCorrect": false, "rationale": "The text emphasizes the synkrisis is 'not just a summary' — it is 'an evaluative essay.'"}, {"text": "An evaluative essay that asks which of the two men was the greater and by what standard.", "isCorrect": true, "rationale": "The text says Plutarch 'asks: which of these two men was the greater? On which axis? By what standard?'"}, {"text": "A dialogue between Plutarch and his patron.", "isCorrect": false, "rationale": "The synkrisis is Plutarch's own evaluative essay, not a staged conversation."}, {"text": "A devotional prayer offered to Apollo.", "isCorrect": false, "rationale": "The synkrisis is a comparative-moral essay, not a religious composition."}]}, {"question": "According to the text, how long is a typical synkrisis compared to the two Lives it closes?", "options": [{"text": "About the same length as each Life.", "isCorrect": false, "rationale": "The synkrisis is far shorter — about a tenth of the length of the Lives it concludes."}, {"text": "Roughly four to six pages in modern editions — less than a tenth of the two Lives.", "isCorrect": true, "rationale": "The text says the synkrisis is 'usually four to six pages in modern editions, less than a tenth of the length of the two Lives it concludes.'"}, {"text": "Longer than both Lives put together.", "isCorrect": false, "rationale": "The synkrisis is brief; its compression is part of its power."}, {"text": "A single paragraph at the very end of the second Life.", "isCorrect": false, "rationale": "A synkrisis is a discrete essay of several pages, not a closing paragraph."}]}, {"question": "Which axes typically appear in a synkrisis as Plutarch composes it?", "options": [{"text": "The political party each man belonged to.", "isCorrect": false, "rationale": "Modern party allegiance is anachronistic for Plutarch; he weighs character and conduct, not partisanship."}, {"text": "Their physical health and longevity.", "isCorrect": false, "rationale": "Plutarch sometimes notes the manner of death, but the major axes are moral and biographical, not medical."}, {"text": "Origin and ability, virtues, failings, the end of the life, and a summative judgment.", "isCorrect": true, "rationale": "The text lists exactly these five typical axes in Plutarch's standard form of synkrisis."}, {"text": "Their popularity among Roman readers in Plutarch's day.", "isCorrect": false, "rationale": "Plutarch evaluates the men themselves against shared standards, not by their later reception."}]}, {"question": "Which four pairings have lost their synkriseis?", "options": [{"text": "Theseus and Romulus, Lycurgus and Numa, Solon and Publicola, Themistocles and Camillus.", "isCorrect": false, "rationale": "Theseus and Romulus and the others on this list still have their synkriseis; only some pairs are missing them."}, {"text": "Themistocles and Camillus; Pyrrhus and Marius; Alexander and Caesar; Phocion and Cato the Younger.", "isCorrect": true, "rationale": "The text identifies these four pairings as the ones whose synkriseis are lost."}, {"text": "Demosthenes and Cicero; Pericles and Fabius; Brutus and Dion; Cato and Phocion.", "isCorrect": false, "rationale": "Demosthenes-Cicero, Pericles-Fabius, and Brutus-Dion still have their synkriseis; only Phocion-Cato is in the lost group."}, {"text": "Every pairing has its synkrisis intact.", "isCorrect": false, "rationale": "The text explicitly says four pairs lost theirs."}]}, {"question": "How does this book handle the two great lost synkriseis (Themistocles-Camillus and Alexander-Caesar)?", "options": [{"text": "It invents a synkrisis in Plutarch's voice and prints it as primary text.", "isCorrect": false, "rationale": "The book does not forge Plutarchan text; it asks the student to write the comparison."}, {"text": "It skips those chapters entirely.", "isCorrect": false, "rationale": "Chapters 5 and 8 are both included; the absence becomes the writing assignment."}, {"text": "It frames the absence and asks the student to write the synkrisis themselves.", "isCorrect": true, "rationale": "The text says these chapters' major writing assignment is the student's own synkrisis on the unmodeled pairing."}, {"text": "It reprints Suetonius's account of the same figures as a substitute.", "isCorrect": false, "rationale": "Suetonius is not used as a stand-in for the lost synkriseis; the missing essay becomes a writing exercise."}]}, {"question": "How many Lives in total can a student read across Plutarch's surviving biographical corpus?", "options": [{"text": "Fifty Lives — twenty-three pairs (forty-six Lives) plus four singles.", "isCorrect": true, "rationale": "The text counts twenty-three pairs (forty-six Lives) plus Aratus, Artaxerxes II, Galba, and Otho — fifty in all."}, {"text": "Forty-six Lives — only the paired biographies survive.", "isCorrect": false, "rationale": "The four single Lives also survive; the total is fifty."}, {"text": "Seventy Lives — the same count as Plutarch's surviving works overall.", "isCorrect": false, "rationale": "More than seventy of Plutarch's works survive, but most are essays in the Moralia, not biographies."}, {"text": "Twelve Lives — the chapter count of this book.", "isCorrect": false, "rationale": "The book treats ten pairs in detail (twenty Lives), but Plutarch's surviving total is fifty."}]}, {"question": "What does the text suggest is the chief intellectual value of the synkrisis form for the modern reader and writer?", "options": [{"text": "It is a literary curiosity with no transferable use.", "isCorrect": false, "rationale": "The text calls the synkrisis 'one of the master techniques the humanities ever produced' — a tool with broad application."}, {"text": "It is a way of writing only; the underlying thinking is not portable.", "isCorrect": false, "rationale": "The text says 'the underlying mental operation is genuinely useful' — a way of thinking, not just writing."}, {"text": "Holding two lives side by side on a chosen axis is a way of thinking, not just writing.", "isCorrect": true, "rationale": "The text states the synkrisis 'is a way of thinking, not just a way of writing' and names learning to do it well as the chief purpose of the book."}, {"text": "It is best appreciated by reading Plutarch in the original Greek.", "isCorrect": false, "rationale": "The text does not require Greek; the comparative move works in any translation and indeed in any pair of lives."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
