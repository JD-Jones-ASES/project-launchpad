<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Dion</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Into what political position did Dion's sister's marriage place him?", "options": [{"text": "Brother-in-law to the tyrant Dionysius I — giving him access to political life but also implicating him in the regime's corruption.", "isCorrect": true, "rationale": "Plutarch is careful that the brother-in-law relationship is the source of both Dion's access and his moral compromise."}, {"text": "Adopted son of the Athenian general Alcibiades.", "isCorrect": false, "rationale": "Alcibiades is not part of Dion's biography; the family link is to the Syracusan tyranny."}, {"text": "Hereditary archon of Athens.", "isCorrect": false, "rationale": "Dion was Syracusan, not Athenian, and Athens had no hereditary archonship."}, {"text": "Roman client-king of Sicily.", "isCorrect": false, "rationale": "Sicily was not yet under Roman rule in Dion's lifetime; the political authority there was the Syracusan tyranny."}], "id": "q01"}, {"question": "What was the decisive event of Dion's early life, and at what ages?", "options": [{"text": "Plato's first visit to Syracuse in 387 BC — Plato was 39, Dion was 20.", "isCorrect": true, "rationale": "Plutarch dates the meeting precisely: Plato at the height of his reputation, Dion politically alert, the two struck by each other."}, {"text": "Dion's election as eponymous archon at age 25.", "isCorrect": false, "rationale": "Dion held no Athenian magistracy; the formative event was meeting Plato."}, {"text": "Dionysius I's grant of personal command of the Sicilian fleet.", "isCorrect": false, "rationale": "The formative event was philosophical, not naval."}, {"text": "His marriage to a daughter of the Spartan king.", "isCorrect": false, "rationale": "Dion's wife was Dionysius II's sister; he did not marry into Spartan royalty."}], "id": "q02"}, {"question": "How did Plato's first stay in Syracuse end?", "options": [{"text": "Dionysius I had Plato sold into slavery; Plato was ransomed by friends in mainland Greece and returned to Athens.", "isCorrect": true, "rationale": "Plutarch records the slavery and ransom as the dramatic conclusion of the first visit; the philosopher-king hope was deferred."}, {"text": "Plato was named regent of Syracuse upon Dionysius I's death.", "isCorrect": false, "rationale": "Plato held no political office in Syracuse; the relationship soured rather than producing such an honor."}, {"text": "Plato died of fever in Syracuse and was buried at state expense.", "isCorrect": false, "rationale": "Plato survived the visit, returned to Athens, and continued his work for decades."}, {"text": "Plato converted Dionysius I to philosophical reform and stayed as court philosopher.", "isCorrect": false, "rationale": "The opposite occurred — Dionysius was not amenable, and Plato left under duress."}], "id": "q03"}, {"question": "Why did Plato return to Syracuse for the second visit (367–365 BC), and how did the philosophical project go with Dionysius II?", "options": [{"text": "Dion urged him to come and educate the young Dionysius II; Plato came against his better judgment; the young tyrant preferred flattery and entertainment to philosophical work.", "isCorrect": true, "rationale": "Plutarch makes the second visit one of the most famous episodes in the history of philosophy — and a failure."}, {"text": "Dionysius II summoned Plato by force to lecture against Pythagoreanism.", "isCorrect": false, "rationale": "The invitation came through Dion, not by force; the subject was philosophical formation, not anti-Pythagorean polemic."}, {"text": "Plato came to negotiate a peace treaty between Syracuse and Carthage.", "isCorrect": false, "rationale": "Plato's mission was educational, not diplomatic; no peace negotiation is recorded."}, {"text": "Plato came on his own initiative and converted Dionysius II to lifelong philosophical practice.", "isCorrect": false, "rationale": "Plato came reluctantly and the experiment failed — Dionysius II reverted to his father's habits."}], "id": "q04"}, {"question": "Who opposed Dion at the Syracusan court, and what were the consequences for Dion personally?", "options": [{"text": "Philistus, an old loyalist of Dionysius I; Dion was accused (probably falsely) of plotting, banished, his wife forced to remarry, and his estate confiscated.", "isCorrect": true, "rationale": "These are the three specific grievances the source enumerates, with Philistus named as the political opponent."}, {"text": "Aristotle, who had come to Syracuse as Plato's emissary.", "isCorrect": false, "rationale": "Aristotle was not at the Syracusan court in this period; the opposing figure was Philistus."}, {"text": "Callippus — the same man who later murdered Dion.", "isCorrect": false, "rationale": "Callippus arrives later in the story, after the exile; the court opponent was Philistus."}, {"text": "Dion's own sister, who had Dionysius II disinherit him.", "isCorrect": false, "rationale": "Dion's sister had married Dionysius I; she does not appear in this role at the court."}], "id": "q05"}, {"question": "In 357 BC, with what force did Dion return to Sicily?", "options": [{"text": "About a thousand mercenaries — landing while Dionysius II was away from Syracuse, after ten years of preparation in Greek exile.", "isCorrect": true, "rationale": "Plutarch is specific: roughly a thousand men, the Syracusan population weary of the tyranny rose with him, and the city was his within weeks."}, {"text": "A combined fleet of Athens and Sparta lent for the operation.", "isCorrect": false, "rationale": "No such joint fleet appears in the record; Dion's expedition was small-scale."}, {"text": "Five hundred Persian heavy cavalry hired through Plato.", "isCorrect": false, "rationale": "There was no Persian cavalry; the force was Greek mercenaries."}, {"text": "He came alone, expecting Syracuse to rise without external force.", "isCorrect": false, "rationale": "Dion brought roughly a thousand mercenaries — not alone, but with a small core force."}], "id": "q06"}, {"question": "What tactical error did Dion make after entering Syracuse, and what was its consequence?", "options": [{"text": "He failed to demolish the fortifications of the citadel — giving the tyrant's holdouts time to consolidate.", "isCorrect": true, "rationale": "Plutarch identifies this specifically as a tactical error in the three years of inconclusive fighting that followed the liberation."}, {"text": "He marched on Carthage without waiting for reinforcements.", "isCorrect": false, "rationale": "Dion did not march on Carthage; the action remained in and around Syracuse."}, {"text": "He executed all surviving members of Dionysius II's family.", "isCorrect": false, "rationale": "Plutarch does not record such mass executions; Dion's failure was more characteristically a failure of severity."}, {"text": "He immediately ceded power to a popular assembly and retired.", "isCorrect": false, "rationale": "Dion did not retire; he remained ruler, caught between rival factions."}], "id": "q07"}, {"question": "Who murdered Dion, and what is the most painful detail of the killing?", "options": [{"text": "Callippus — an Athenian Dion had trusted and brought from Athens; the assassins struggled to kill the strong Dion until one was thrown through a window and brought a short sword from outside.", "isCorrect": true, "rationale": "Plutarch's account is one of the most moving in the Life — the strong man, the failed strangling, the sword fetched from outside."}, {"text": "Dionysius II personally, in a public execution in the agora.", "isCorrect": false, "rationale": "Dionysius II was no longer in Syracuse; the killing was by trusted insiders, not by the former tyrant."}, {"text": "Philistus, in a duel after a public assembly.", "isCorrect": false, "rationale": "Philistus had been Dion's earlier opponent; the murderer was Callippus."}, {"text": "A Carthaginian assassin sent by an enemy general.", "isCorrect": false, "rationale": "There is no Carthaginian assassin in the record; the killer was an Athenian Dion had himself trusted."}], "id": "q08"}, {"question": "What is Plato's verdict on Dion's death in the Seventh Letter?", "options": [{"text": "Characteristically harsh — Dion had trusted bad men, and good men should know better.", "isCorrect": true, "rationale": "Plutarch quotes Plato's verdict as severe: a moral failing of judgment in trust, not merely bad luck."}, {"text": "Warm and unequivocal — Dion died as the perfect Platonic philosopher-king.", "isCorrect": false, "rationale": "Plato's verdict is harsh, not unequivocal praise."}, {"text": "Silent — Plato never wrote about Dion's death.", "isCorrect": false, "rationale": "Plato wrote about it directly in the Seventh Letter, which is the primary additional source for the Life."}, {"text": "Resigned — that fortune simply turned against the just man.", "isCorrect": false, "rationale": "Plato's reading is moralized, not fatalistic; he assigns Dion specific responsibility for his choice of associates."}], "id": "q09"}, {"question": "What is the character that Plutarch's Dion ultimately presents to the reader?", "options": [{"text": "A serious, philosophically formed, austere nobleman uncomfortable with popular politics — making enemies easily, trusting the wrong men, and paying for those misjudgments with his life.", "isCorrect": true, "rationale": "Plutarch's summary is precise — Dion's philosophical formation made him an awkward democratic politician, and the awkwardness cost him."}, {"text": "A charismatic populist whose easy manner made him beloved of the Syracusan crowd.", "isCorrect": false, "rationale": "Many Syracusans found Dion cold — his austere Platonic style alienated rather than charmed."}, {"text": "A military tactician who failed only because of inferior numbers.", "isCorrect": false, "rationale": "Dion's failures were political and personal, not primarily a matter of inferior numbers."}, {"text": "A worldly opportunist with no philosophical commitments.", "isCorrect": false, "rationale": "The opposite — Dion's commitments were deeply Platonic, and that was part of his political difficulty."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
