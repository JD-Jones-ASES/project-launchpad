    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Caesar</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is Caesar's family background, and how does the section characterize it?", "options": [{"text": "An ancient patrician family that claimed descent from the Trojan Aeneas (and through him from Venus), but in the late Republic neither wealthy nor powerful.", "isCorrect": true, "rationale": "The section names exactly this background — ancient pedigree, mythical Trojan and divine descent, but modest political and financial standing in the late Republic. Caesar's career would change that."}, {"text": "A plebeian family of new money that bought senatorial status under Sulla.", "isCorrect": false, "rationale": "Caesar was a patrician, not a plebeian; the family was ancient, not new money."}, {"text": "A non-Roman family from Gaul, naturalized late in the Republic.", "isCorrect": false, "rationale": "Caesar's family was a Roman patrician house, not Gallic; his Gallic connection was as conqueror, not as descendant."}, {"text": "A family of Greek philosophers who had emigrated to Rome.", "isCorrect": false, "rationale": "The Julii were a Roman patrician family with a mythical Trojan pedigree, not a Greek philosophical lineage."}], "id": "q01"}, {"question": "How does Plutarch's pirate story end, and what does the section say it reveals about Caesar at twenty-five?", "options": [{"text": "Caesar laughed at the twenty-talent ransom and told the pirates they should have asked for fifty; he lived among them as a guest, telling them with cheerful familiarity that he would have them all crucified — when free, he raised a small fleet, captured them, and crucified them (cutting their throats first so the crucifixion would be painless).", "isCorrect": true, "rationale": "The section gives exactly this account and says Caesar at twenty-five was already the man who would say a thing with a smile and then do it."}, {"text": "Caesar paid the original twenty talents in silence and ransomed his retinue.", "isCorrect": false, "rationale": "He demanded the ransom be raised to fifty and predicted the crucifixion."}, {"text": "The pirates released Caesar after he wrote a poem in their favor.", "isCorrect": false, "rationale": "He did read them his poems and orations, but the release came after payment of the ransom, and he then crucified the pirates."}, {"text": "Caesar was killed by the pirates and only his speeches survived.", "isCorrect": false, "rationale": "Caesar lived and acted — the episode is set in his early career, and the section uses it to characterize his style."}], "id": "q02"}, {"question": "What was the First Triumvirate, and what did it accomplish politically for Caesar?", "options": [{"text": "A private and informal arrangement in 60 BC among Caesar, Pompey, and Crassus whose combined clout could carry any vote in the assembly; it secured Caesar the consulship for 59 BC, land for Pompey's veterans, confirmation of Crassus's tax-farming contracts, and a five-year proconsular command in Gaul.", "isCorrect": true, "rationale": "The section gives exactly these features — the date, the participants, the informality, and the four legislative payoffs."}, {"text": "A formal magistracy created by Sulla to rule alongside the Senate.", "isCorrect": false, "rationale": "The Triumvirate was private and informal, not a formal magistracy; nor was it Sulla's creation."}, {"text": "An alliance of Caesar, Cicero, and Cato against Pompey.", "isCorrect": false, "rationale": "The three named in the section are Caesar, Pompey, and Crassus; Cicero and Cato were not parties to the arrangement."}, {"text": "A treaty with the Parthian Empire to share Roman power.", "isCorrect": false, "rationale": "No foreign empire was involved; the Triumvirate was a Roman political arrangement."}], "id": "q03"}, {"question": "How does the section summarize the scale and political result of the Gallic War (58-50 BC)?", "options": [{"text": "Caesar killed perhaps a million people and enslaved as many more, added a vast new province that would remain Roman for five hundred years, paid off his debts, built up a private fortune, and acquired an army of veterans personally loyal to him.", "isCorrect": true, "rationale": "The section names exactly these figures and effects. The campaign was waged with four legions (perhaps twenty thousand men) over eight years against the Celtic tribes north of the Roman frontier."}, {"text": "Caesar killed a few thousand and added a small province that Rome lost within a century.", "isCorrect": false, "rationale": "The section names the figures Plutarch gives — a million dead, a million enslaved — and a province lasting five centuries."}, {"text": "Caesar lost the war and was recalled in disgrace.", "isCorrect": false, "rationale": "Caesar won; the war was the campaign that made him politically and financially."}, {"text": "The Gallic War never happened; the section says Caesar invented it in his Commentaries.", "isCorrect": false, "rationale": "The section treats the war as real, names its dates, and counts its consequences. The Commentaries are Caesar's record of an actual campaign."}], "id": "q04"}, {"question": "What was the Rubicon, and what did Caesar say as he crossed?", "options": [{"text": "A small stream marking the boundary between Caesar's province and Italy proper; bringing an army across it was an act of civil war. He said, 'The die is cast,' and hurried to the passage.", "isCorrect": true, "rationale": "The section gives exactly this geography and quotation. Plutarch's account preserves the moment of hesitation — Caesar weighed the greatness of the enterprise before he spoke and crossed."}, {"text": "A mountain pass in the Alps; Caesar's army crossed in winter.", "isCorrect": false, "rationale": "The Rubicon was a small river, not a mountain pass; Caesar's crossing was symbolic and legal, not Alpine."}, {"text": "A bridge in Rome that Caesar burned to prevent senatorial escape.", "isCorrect": false, "rationale": "The Rubicon was a river outside Rome, marking a provincial boundary; no bridge in Rome is implicated."}, {"text": "A Greek oracle Caesar consulted before the civil war.", "isCorrect": false, "rationale": "The Rubicon is a river, not an oracle; the section treats it as a geographic and legal boundary."}], "id": "q05"}, {"question": "How and where did Pompey die, and what role did Cleopatra play after the civil war's decisive battle?", "options": [{"text": "Caesar defeated Pompey at Pharsalus in Greece in 48 BC; Pompey fled to Egypt and was murdered there by Egyptian courtiers; Caesar pursued, established Cleopatra on the Egyptian throne, and then defeated Pompey's remaining supporters in Africa and Spain.", "isCorrect": true, "rationale": "The section gives this sequence exactly — Pharsalus, Pompey's flight to Egypt, the murder by Egyptian courtiers, Cleopatra's enthronement, and the cleanup campaigns in Africa and Spain."}, {"text": "Pompey died in battle at Pharsalus; Cleopatra fled to Persia.", "isCorrect": false, "rationale": "Pompey fled Pharsalus alive and was murdered in Egypt; Cleopatra was established on the Egyptian throne, not in Persia."}, {"text": "Pompey defeated Caesar at Pharsalus and Caesar fled to Egypt.", "isCorrect": false, "rationale": "The result was the opposite — Caesar defeated Pompey at Pharsalus, and it was Pompey who fled to Egypt."}, {"text": "Pompey and Caesar reconciled at Pharsalus and shared power.", "isCorrect": false, "rationale": "There was no reconciliation; Pompey was killed in Egypt shortly after his defeat."}], "id": "q06"}, {"question": "What does dictator perpetuo mean, and what was politically intolerable about it?", "options": [{"text": "'Dictator for life' — under the old Roman constitution it made Caesar essentially a king without the title, and that was politically intolerable to the Roman senatorial class.", "isCorrect": true, "rationale": "The section uses exactly this gloss. The office combined permanent supreme power with the absence of the hated regal name, and its intolerability triggered the conspiracy."}, {"text": "'Permanent senator' — a procedural office of no constitutional weight.", "isCorrect": false, "rationale": "The section says the opposite — the office made Caesar essentially a king."}, {"text": "'Dictator with consul' — a power-sharing arrangement.", "isCorrect": false, "rationale": "Caesar's perpetuo title was singular and supreme; there was no co-magistrate sharing the office."}, {"text": "'Religious office' — confined to the duties of the priesthood.", "isCorrect": false, "rationale": "Dictator was a political and military office, not a priesthood; the perpetual form was the political offense."}], "id": "q07"}, {"question": "Name three of the reforms Caesar enacted while in supreme power, according to the section.", "options": [{"text": "The Julian calendar, the reorganization of the courts, and the extension of Roman citizenship to provincials.", "isCorrect": true, "rationale": "The section names exactly these among his reforms — plus veterans' land grants and the reduction of the grain dole."}, {"text": "The abolition of the Senate, the founding of a state religion, and the conquest of Britain.", "isCorrect": false, "rationale": "He did not abolish the Senate or found a state religion; his British invasions were earlier and partial, and were not reforms of Roman government."}, {"text": "The introduction of Greek philosophy in the curriculum, the writing of his Commentaries, and a treaty with Parthia.", "isCorrect": false, "rationale": "Writing the Commentaries was a literary act, not a reform; the section names governance changes — calendar, courts, citizenship, dole, land grants."}, {"text": "The construction of the Colosseum, the founding of Constantinople, and the codification of Roman law.", "isCorrect": false, "rationale": "These are later imperial projects of Vespasian/Titus, Constantine, and Justinian respectively; none is named as Caesar's."}], "id": "q08"}, {"question": "Who was Marcus Brutus, and why does the section call his role in the conspiracy particularly weighted?", "options": [{"text": "The chief plotter, a man Caesar had pardoned during the civil war, and a descendant of the Brutus who expelled the Tarquins — a man who took his ancestral mythology seriously.", "isCorrect": true, "rationale": "The section gives all three weights — chief plotter, pardoned by Caesar, descendant of the founding-tyrannicide Brutus of Chapter 4 — and notes that he took the mythology seriously."}, {"text": "A Greek general who joined the conspiracy out of loyalty to Pompey's family.", "isCorrect": false, "rationale": "Brutus was a Roman senator, not a Greek general, and his role rests on Roman ancestral and political grounds."}, {"text": "Caesar's own son.", "isCorrect": false, "rationale": "Caesar called him 'teknon' (child) in the famous Greek line, but Brutus was not Caesar's biological son; the line expresses moral and patronage closeness, not paternity."}, {"text": "An Egyptian priest who poisoned Caesar's drink.", "isCorrect": false, "rationale": "The section names Brutus as a Roman senator and chief plotter; no Egyptian priest figures in the conspiracy."}], "id": "q09"}, {"question": "Where did the assassination take place, what were Caesar's last words according to Plutarch, and how does the section relate them to Shakespeare?", "options": [{"text": "At a Senate meeting in the Theater of Pompey on March 15, 44 BC, struck twenty-three times; he fell at the foot of Pompey's statue; his last words (according to Plutarch) were Greek, addressed to Brutus — 'kai su, teknon?' — 'You too, my son?'; Shakespeare's 'Et tu, Brute?' is the Latin version of the Greek.", "isCorrect": true, "rationale": "The section gives the location (Theater of Pompey), the date (Ides of March, 44 BC), the count (twenty-three wounds), Caesar's fall at Pompey's statue, the Greek line, its sense, and Shakespeare's Latin rendering."}, {"text": "In the Roman Forum on January 1, 44 BC, struck once; his last words were 'Roma, vale.'", "isCorrect": false, "rationale": "The date (March 15), location (Theater of Pompey), count (twenty-three wounds), and language (Greek) all differ from this option."}, {"text": "On the steps of the Capitol on the Ides of March; he died without speaking.", "isCorrect": false, "rationale": "The location was the Theater of Pompey, not the Capitol, and Plutarch records the Greek line."}, {"text": "At Pharsalus, after defeating Pompey, struck by his own veterans.", "isCorrect": false, "rationale": "Caesar's victory at Pharsalus was in 48 BC; the assassination was four years later in Rome by a senatorial conspiracy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
