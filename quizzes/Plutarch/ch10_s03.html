<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Roman Tribunes: Tiberius and Gaius Gracchus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who was the mother of the Gracchi, and why does Plutarch present her as central to both Lives?", "options": [{"text": "Aurelia, sister of Pompey, who tutored them in rhetoric.", "isCorrect": false, "rationale": "Aurelia was the mother of Julius Caesar; she has no role in the Gracchan Lives."}, {"text": "Cornelia, daughter of Scipio Africanus, who raised them with extraordinary care and refused remarriage even to a king of Egypt.", "isCorrect": true, "rationale": "The text identifies Cornelia as the moral center of both Lives, daughter of Scipio Africanus, who preferred the title “mother of the Gracchi”."}, {"text": "Sempronia, sister of Cato the Younger, who organized their political coalitions.", "isCorrect": false, "rationale": "No such Sempronia appears in the Lives; Cornelia is the mother named throughout."}, {"text": "Octavia, wife of Mark Antony, who funded their reforms from her dowry.", "isCorrect": false, "rationale": "Octavia belongs to a later generation entirely and has no role here."}]}, {"question": "What did Tiberius reportedly observe on a journey through Etruria that shaped his reform program?", "options": [{"text": "That the legions were under-equipped and undertrained.", "isCorrect": false, "rationale": "The Etruscan observation was about land and labor, not legionary equipment."}, {"text": "That the small Italian peasantry had disappeared and all the farm work was being done by slaves.", "isCorrect": true, "rationale": "The text says Tiberius noticed exactly this on his journey through Etruria — slaves on the great estates, no small farmers."}, {"text": "That Etruscan temples were being looted by Roman senators.", "isCorrect": false, "rationale": "No temple looting is mentioned in this account."}, {"text": "That the roads were so poor the army could not march to Spain.", "isCorrect": false, "rationale": "Road quality is not the issue; agricultural depopulation is."}]}, {"question": "What did Tiberius's lex Sempronia agraria actually demand?", "options": [{"text": "Confiscation of all senatorial estates, public and private alike.", "isCorrect": false, "rationale": "It targeted public land specifically; private holdings were untouched, and the law was in fact moderate."}, {"text": "Enforcement of the existing 500-iugera limit on private occupation of public land, with redistribution in 30-iugerum plots.", "isCorrect": true, "rationale": "The text describes the law exactly this way — enforce the existing limit, redistribute excess in 30-iugerum lots."}, {"text": "A grant of Roman citizenship to all Italian allies.", "isCorrect": false, "rationale": "That was Gaius's later proposal, not Tiberius's agrarian law."}, {"text": "Cancellation of all debts owed by Roman small farmers.", "isCorrect": false, "rationale": "Debt cancellation was the Spartan move under Agis; the Gracchan law was about land, not debts."}]}, {"question": "How did Tiberius break the procedural deadlock when Marcus Octavius vetoed the agrarian bill?", "options": [{"text": "He withdrew the bill and waited for the next year.", "isCorrect": false, "rationale": "He did the opposite; he forced the issue through a deposition."}, {"text": "He pushed through a vote to depose Octavius from the tribunate.", "isCorrect": true, "rationale": "The text describes exactly this procedurally revolutionary step, after which the law passed."}, {"text": "He persuaded the Senate to override Octavius by extraordinary decree.", "isCorrect": false, "rationale": "The Senate opposed Tiberius; the breakthrough came in the popular assembly, not the Senate."}, {"text": "He paid Octavius a large bribe to withdraw the veto.", "isCorrect": false, "rationale": "No bribe is reported; the chapter highlights deposition by vote."}]}, {"question": "Who led the senatorial mob that killed Tiberius on the Capitol in 133 BC?", "options": [{"text": "Lucius Opimius, the consul.", "isCorrect": false, "rationale": "Opimius was the consul who killed Gaius ten years later, not Tiberius."}, {"text": "The pontifex maximus Publius Scipio Nasica, leading senators armed with the broken legs of their own benches.", "isCorrect": true, "rationale": "The text names Scipio Nasica as the leader of the mob, and describes the senators tearing off bench legs to use as clubs."}, {"text": "Marcus Octavius, the deposed fellow tribune.", "isCorrect": false, "rationale": "Octavius had been deposed but is not named as the leader of the killing party."}, {"text": "Marcus Livius Drusus, a rival popular tribune.", "isCorrect": false, "rationale": "Drusus appears later, as the senatorial counter-tribune against Gaius."}]}, {"question": "Why does the chapter call the killing of Tiberius politically momentous?", "options": [{"text": "Because it was the first time a tribune had been re-elected.", "isCorrect": false, "rationale": "The novelty was not re-election but the political killing of a sitting magistrate."}, {"text": "Because it was the first political killing in Rome in three centuries, carried out by senators against a sitting magistrate.", "isCorrect": true, "rationale": "The text emphasizes both the three-century gap and the role of senators against a sitting magistrate."}, {"text": "Because it caused the immediate fall of the Republic.", "isCorrect": false, "rationale": "The Republic fell over the next century; this killing opened the long breakdown rather than ending the Republic in 133."}, {"text": "Because it triggered a foreign invasion of Italy.", "isCorrect": false, "rationale": "No foreign invasion followed; the consequences were internal."}]}, {"question": "Which of these reforms was part of Gaius Gracchus's broader program?", "options": [{"text": "The abolition of the Roman Senate.", "isCorrect": false, "rationale": "He did not abolish the Senate; he reformed several institutions and challenged senatorial dominance."}, {"text": "A state-subsidized monthly grain distribution for the urban Roman poor.", "isCorrect": true, "rationale": "The text lists the grain distribution among the sequence of Gaius's reforms."}, {"text": "Compulsory military service for Italian peasants.", "isCorrect": false, "rationale": "No compulsory military service appears among the reforms; Gaius worked to expand citizenship instead."}, {"text": "The closure of all gladiatorial games until further notice.", "isCorrect": false, "rationale": "No such measure appears in the Gracchan program."}]}, {"question": "Which proposal does the text identify as the largest single political reform of Gaius's program?", "options": [{"text": "The colony at Carthage.", "isCorrect": false, "rationale": "The Carthage colony was controversial, but the text singles out a different proposal as the largest political reform."}, {"text": "The reform of the criminal courts adding equestrians to senatorial juries.", "isCorrect": false, "rationale": "Important, but the text labels another proposal as the largest political reform."}, {"text": "Extending Roman citizenship to the Italian allies.", "isCorrect": true, "rationale": "The chapter explicitly says the Italian citizenship proposal was the largest single political reform of Gaius's program."}, {"text": "The state-subsidized grain distribution.", "isCorrect": false, "rationale": "Important to the urban poor, but not labeled the largest political reform."}]}, {"question": "What was the senatus consultum ultimum of 121 BC, in the form it took against Gaius?", "options": [{"text": "A treaty with the Italian allies guaranteeing partial citizenship.", "isCorrect": false, "rationale": "The decree was a military authorization, not a citizenship treaty."}, {"text": "The first “final decree” authorizing the consuls to do whatever was necessary to preserve the Republic.", "isCorrect": true, "rationale": "The text identifies the senatus consultum ultimum of 121 BC by this name and function."}, {"text": "A formal declaration of war on Carthage's reconstituted colony.", "isCorrect": false, "rationale": "No war on the Carthage colony was declared; the decree authorized force domestically."}, {"text": "A ban on extending the tribunate to a third consecutive year.", "isCorrect": false, "rationale": "The decree was not a procedural ban on a third tribunate."}]}, {"question": "How did Gaius Gracchus die, according to the chapter?", "options": [{"text": "He was beaten to death on the Capitol by senators wielding bench legs.", "isCorrect": false, "rationale": "That description fits Tiberius, not Gaius."}, {"text": "He was killed by his own loyal slave at his own instructions in the grove of Furrina, after which the slave killed himself.", "isCorrect": true, "rationale": "The text gives this account exactly — escape across the Tiber, death by his slave's hand at his own order."}, {"text": "He was poisoned at a senatorial banquet hosted by Opimius.", "isCorrect": false, "rationale": "No banquet poisoning is reported; the death occurred in the grove of Furrina."}, {"text": "He died in battle defending the Aventine.", "isCorrect": false, "rationale": "His supporters fell in the Aventine fighting, but Gaius himself escaped to the grove and died by his slave's hand."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
