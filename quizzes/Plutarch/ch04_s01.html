    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Reform From Within</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What distinguishes the reformers of Chapter 4 (Solon and Publicola) from the lawgivers of Chapter 3 (Lycurgus and Numa)?", "options": [{"text": "They were foreigners imported to reform their cities", "isCorrect": false, "rationale": "Both Solon and Publicola were native aristocrats already prominent within their own cities."}, {"text": "They worked from within the existing aristocracy, reforming by persuading their peers rather than displacing them", "isCorrect": true, "rationale": "The chapter explicitly contrasts the 'reform from within' pattern with Lycurgus overthrowing Spartan oligarchy and Numa entering Rome between kings."}, {"text": "They ruled as absolute monarchs before reforming", "isCorrect": false, "rationale": "Both men refused one-man rule — that refusal is the moral centerpiece of each Life."}, {"text": "They wrote down laws but held no formal office", "isCorrect": false, "rationale": "Solon was made archon with extraordinary powers; Publicola was elected consul four times."}], "id": "q01"}, {"question": "What is the central political move that Plutarch describes as the heart of republicanism?", "options": [{"text": "The expansion of citizenship to slaves and foreigners", "isCorrect": false, "rationale": "Neither Athens nor early Rome extended citizenship that broadly; the reform did not target slavery as such."}, {"text": "The institution of mandatory military service", "isCorrect": false, "rationale": "Military service was assumed in both cultures; the chapter does not name it as the republican move."}, {"text": "The relocation of sovereignty from one person to a set of laws and offices any qualified citizen can hold", "isCorrect": true, "rationale": "This is Plutarch's (and the chapter's) explicit definition: governments-of-laws rather than governments-of-rulers."}, {"text": "The abolition of private property among the ruling class", "isCorrect": false, "rationale": "That was Lycurgus's Spartan model, which Solon explicitly rejected when the poor pressed for it."}], "id": "q02"}, {"question": "In what years did Solon and Publicola, respectively, undertake their reforms?", "options": [{"text": "508 BC and 449 BC", "isCorrect": false, "rationale": "508 BC is Cleisthenes's democratic reform; 449 BC is the Twelve Tables — neither matches our two reformers."}, {"text": "594 BC (Athens) and 509 BC (Rome)", "isCorrect": true, "rationale": "Solon was archon in 594 BC; the Roman monarchy fell in 509 BC and Publicola served his consulships beginning that year."}, {"text": "490 BC and 390 BC", "isCorrect": false, "rationale": "490 BC is the year of Marathon, well after Solon's reforms."}, {"text": "650 BC and 600 BC", "isCorrect": false, "rationale": "Solon was only born around 638 BC; he could not have legislated in 650 BC."}], "id": "q03"}, {"question": "Why were Athenians prepared to trust Solon specifically as their reformer in 594 BC?", "options": [{"text": "He was the wealthiest man in Athens", "isCorrect": false, "rationale": "Solon was a middle-wealthy merchant, comfortable but not rich."}, {"text": "He held the office of archon by hereditary right", "isCorrect": false, "rationale": "The archonship was elective, not hereditary; Solon was given the office because the city trusted him."}, {"text": "He was a middle-wealthy merchant who had not taken sides in the debt crisis", "isCorrect": true, "rationale": "The poor knew he had not profited from the existing system; the rich knew he had not joined the popular agitation. His neutrality was the key political fact."}, {"text": "He had military victories that put him beyond political dispute", "isCorrect": false, "rationale": "The Salamis stratagem made him respected, but the chapter highlights his neutrality between rich and poor as the trust-building factor."}], "id": "q04"}, {"question": "Why is it important not to confuse Lucius Junius Brutus with Marcus Brutus?", "options": [{"text": "They are the same person, but Plutarch uses two names", "isCorrect": false, "rationale": "They are two different historical figures separated by roughly four centuries."}, {"text": "They share a gens but lived in different centuries — the first founded the Republic in 509 BC; the second assassinated Caesar in 44 BC (Chapter 11)", "isCorrect": true, "rationale": "The chapter explicitly warns against the confusion: both Brutuses are members of the same gens, and the second consciously imitated the first."}, {"text": "Marcus Brutus is fictional; only Lucius Junius is historical", "isCorrect": false, "rationale": "Both are historical; Marcus Brutus has extensive contemporary documentation."}, {"text": "Lucius Junius led the assassination of Caesar; Marcus founded the Republic", "isCorrect": false, "rationale": "The roles are reversed in this option — Lucius Junius founded the Republic; Marcus assassinated Caesar."}], "id": "q05"}, {"question": "What does Solon's metaphor that 'tyranny is a fair spot, but it has no way down from it' imply about absolute power?", "options": [{"text": "Tyranny is morally evil and must be destroyed by force", "isCorrect": false, "rationale": "Solon's image is more practical: once you ascend, you cannot return; it is not a moral denunciation but a warning about reversibility."}, {"text": "Tyranny is beautiful and should be embraced", "isCorrect": false, "rationale": "The metaphor warns against tyranny; the 'fair spot' is the lure, not the recommendation."}, {"text": "Tyranny is appealing but irreversible — you cannot descend back to ordinary citizenship", "isCorrect": true, "rationale": "Solon preferred to remain a citizen; the metaphor captures why he refused absolute power even when offered it."}, {"text": "Tyranny offers easy power but yields no real authority", "isCorrect": false, "rationale": "Solon does not deny that tyranny holds real power; he warns that it traps the holder."}], "id": "q06"}, {"question": "What four major points does the chapter tell the reader to watch for across the two Lives?", "options": [{"text": "Military genius, religious piety, oratory, and lineage", "isCorrect": false, "rationale": "These are common themes in the Lives but not the four named centerpieces of this chapter."}, {"text": "The refusal of one-man rule, the legal scaffolding, the discipline of leaving, and the figure of Brutus the Liberator", "isCorrect": true, "rationale": "The chapter names exactly these four watchpoints as the structural spine of Solon's and Publicola's parallel Lives."}, {"text": "Wealth, beauty, philosophy, and exile", "isCorrect": false, "rationale": "Wealth and exile appear in the Lives, but they are not the named four watchpoints."}, {"text": "Children, marriage, friendship, and old age", "isCorrect": false, "rationale": "These are domestic themes; the chapter focuses on political and constitutional matters."}], "id": "q07"}, {"question": "Who serves as the Second Witness for the Roman side of this chapter, and what is his emphasis?", "options": [{"text": "Aristotle, who emphasizes the four property classes", "isCorrect": false, "rationale": "Aristotle's Athenian Constitution supports the Greek side, not the Roman side."}, {"text": "Cicero, who emphasizes the consular speech tradition", "isCorrect": false, "rationale": "Cicero is not the Second Witness for this chapter."}, {"text": "Livy, who treats Brutus the Liberator as Rome's central political founder", "isCorrect": true, "rationale": "Livy emphasizes Brutus over Publicola: 'the consular authority was made annual,' he writes, 'and the origin of liberty you may date from this period.'"}, {"text": "Tacitus, who emphasizes the early empire", "isCorrect": false, "rationale": "Tacitus writes about the early empire centuries later, not the founding of the Republic."}], "id": "q08"}, {"question": "Within the framework of 'reform from within,' how does Plutarch want us to read the moment when established aristocrats had the chance to close ranks?", "options": [{"text": "As an inevitable outcome — aristocrats always reform when forced", "isCorrect": false, "rationale": "Plutarch treats the move as moral choice, not historical inevitability."}, {"text": "As a moral choice in which the established men 'opened the door' rather than defending their class", "isCorrect": true, "rationale": "The chapter presents reform-from-within as a deliberate decision: both Solon and Publicola had the option to make their cities less popular and chose the opposite."}, {"text": "As a failure of nerve, since they did not seize tyranny when offered", "isCorrect": false, "rationale": "Plutarch's tone is approving, not regretful, and Solon's refusal is celebrated."}, {"text": "As a sign of weakness in both societies' aristocracies", "isCorrect": false, "rationale": "The chapter treats the aristocrats' willingness to enlarge the polity as a strength, not a weakness."}], "id": "q09"}, {"question": "How does the Greek side of this chapter compare to the Roman side in terms of surviving witnesses?", "options": [{"text": "Both sides have an equally rich set of contemporary witnesses", "isCorrect": false, "rationale": "The chapter explicitly notes the asymmetry — the Greek side has no comparable witness to Livy."}, {"text": "The Greek side is unaccompanied by a major surviving witness; we rely on Plutarch, on Aristotle's Athenian Constitution (rediscovered 1890), and on Solon's own poems", "isCorrect": true, "rationale": "The chapter names exactly these three sources for the Greek side and contrasts the relative thinness with Livy's full Roman narrative."}, {"text": "Both sides survive only through epigraphy", "isCorrect": false, "rationale": "Both sides survive through literary texts, not primarily through inscriptions."}, {"text": "The Greek side is fuller than the Roman", "isCorrect": false, "rationale": "The reverse is true: Livy provides a full Roman witness; the Greek side is thinner."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
