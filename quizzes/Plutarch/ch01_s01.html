    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Who Was Plutarch?</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Plutarch lived from roughly 46 to 120 AD. Which of the following best describes the political condition of Greece during his lifetime?", "options": [{"text": "Greece was an independent confederation of city-states.", "isCorrect": false, "rationale": "Greek political independence had ended roughly two centuries before Plutarch's birth — Athens, Sparta, and the other poleis no longer ran their own foreign affairs."}, {"text": "Greece had been a Roman province for almost two hundred years.", "isCorrect": true, "rationale": "The text states that when Plutarch was born, 'Greece had been a Roman province for almost two hundred years,' and the great questions of war and peace were decided in Rome."}, {"text": "Greece was at war with Rome and seeking to recover its autonomy.", "isCorrect": false, "rationale": "By Plutarch's day the wars of Greek independence were long over; Greeks were Roman subjects who handled local affairs only."}, {"text": "Greece had just been conquered by Rome under the emperor Hadrian.", "isCorrect": false, "rationale": "Hadrian reigned only at the very end of Plutarch's life, and Roman control over Greece long predated him."}], "id": "q01"}, {"question": "Where did Plutarch spend the last thirty years of his life as a senior priest?", "options": [{"text": "At the Academy in Athens.", "isCorrect": false, "rationale": "The Academy was where Plutarch studied under Ammonius as a young man, not where he later served as a priest."}, {"text": "In Rome under the patronage of Lucius Mestrius Florus.", "isCorrect": false, "rationale": "Florus was Plutarch's Roman patron, but Plutarch's priesthood was in central Greece, not Rome."}, {"text": "At Delphi, the sanctuary of Apollo.", "isCorrect": true, "rationale": "The text says Delphi 'was the center of his life' and that he served for roughly thirty years as one of the two senior priests of Apollo's oracle."}, {"text": "In Chaeronea, the town of his birth.", "isCorrect": false, "rationale": "Chaeronea was Plutarch's home base, but his priestly office was specifically at Delphi, not his hometown."}], "id": "q02"}, {"question": "What philosophical school did Plutarch align himself with?", "options": [{"text": "The Stoics.", "isCorrect": false, "rationale": "The text notes that Plutarch 'sometimes quarreled with' the Stoics rather than counting himself among them."}, {"text": "The Aristotelians (Peripatetics).", "isCorrect": false, "rationale": "Plutarch respected Aristotle but identified as a Platonist, not an Aristotelian."}, {"text": "The Epicureans.", "isCorrect": false, "rationale": "The Epicureans are not mentioned among his affiliations; he was loyal to the Platonic tradition."}, {"text": "The Platonists — he regarded himself as a follower of Plato.", "isCorrect": true, "rationale": "The text says he 'attached himself to' the Platonic school and regarded himself as a follower of Plato 'over against Aristotle and the Stoics.'"}], "id": "q03"}, {"question": "How does Plutarch describe his own motive for writing the Lives in the preface to the Life of Aemilius Paulus?", "options": [{"text": "He writes to flatter his Roman patrons and senatorial friends.", "isCorrect": false, "rationale": "The preface gives a moral rationale, not a political one; flattery of patrons is not the motive he confesses."}, {"text": "He writes biographies as a mirror in which to see and improve his own life.", "isCorrect": true, "rationale": "Plutarch says the virtues of great men serve him 'as a sort of looking glass, in which I may see how to adjust and adorn my own life.'"}, {"text": "He writes to provide military and political training for future generals.", "isCorrect": false, "rationale": "Plutarch deliberately distances biography from military history; he hands battles and treaties off to other writers."}, {"text": "He writes because his publisher demanded a long series of biographies.", "isCorrect": false, "rationale": "Ancient authors did not work under publisher contracts; Plutarch's stated motive is moral self-formation."}], "id": "q04"}, {"question": "In the Life of Alexander, Plutarch makes the famous claim 'I am writing biography, not history.' What methodological point is he making?", "options": [{"text": "That biographies are easier to write than histories.", "isCorrect": false, "rationale": "Plutarch is not contrasting effort but evidence — he is making a claim about what reveals character."}, {"text": "That a small remark or jest can reveal character better than great battles.", "isCorrect": true, "rationale": "Plutarch says 'sometimes a matter of less moment, an expression or a jest, informs us better of their characters and inclinations than the most famous sieges.'"}, {"text": "That the truth about events can never really be known.", "isCorrect": false, "rationale": "Plutarch is not a skeptic about facts; he is choosing one kind of fact (revealing of soul) over another (military spectacle)."}, {"text": "That biography should ignore famous people and focus on common ones.", "isCorrect": false, "rationale": "Plutarch's subjects are nearly all famous; his innovation is in what he watches for, not in whom he chooses."}], "id": "q05"}, {"question": "Plutarch distinguishes his project from two great predecessors. According to the text, what is the contrast?", "options": [{"text": "Thucydides wanted the truth about character; Plutarch wanted the truth about events.", "isCorrect": false, "rationale": "The text reverses this — Thucydides pursued truth about events, while Plutarch pursued truth about character."}, {"text": "Plutarch and Thucydides shared the same purpose and method.", "isCorrect": false, "rationale": "The text explicitly says Plutarch's moral conviction is what 'distinguishes him' from Thucydides and Tacitus."}, {"text": "Thucydides and Tacitus wanted the truth about events; Plutarch wants the truth about character.", "isCorrect": true, "rationale": "The text states this contrast directly: 'Thucydides wanted the truth about events. Plutarch wants the truth about character.'"}, {"text": "Plutarch wanted only entertaining anecdotes; Thucydides wanted moral lessons.", "isCorrect": false, "rationale": "Plutarch wants moral knowledge, not entertainment; the anecdotes serve a serious purpose."}], "id": "q06"}, {"question": "What is the synkrisis that closes each pairing of Lives?", "options": [{"text": "A brief comparison Plutarch wrote at the end of each pair.", "isCorrect": true, "rationale": "The text defines the synkrisis as 'a brief comparison Plutarch called a synkrisis' that closes each pairing in the Parallel Lives."}, {"text": "A footnote citing Plutarch's primary sources.", "isCorrect": false, "rationale": "Plutarch's source citations are scattered through the Lives themselves; the synkrisis is a discrete comparative essay."}, {"text": "A dialogue between the two subjects of the pair.", "isCorrect": false, "rationale": "The synkrisis is Plutarch's own evaluative essay, not an imagined dialogue between his subjects."}, {"text": "A formal funeral oration for the deceased subject.", "isCorrect": false, "rationale": "Plutarch's subjects long preceded him; the synkrisis is a comparative judgment, not a eulogy."}], "id": "q07"}, {"question": "Plutarch's two great works are the Parallel Lives and the Moralia. What does 'Moralia' literally mean?", "options": [{"text": "Lives of moral men.", "isCorrect": false, "rationale": "That would describe the Lives more than the Moralia, which is essays and dialogues, not biography."}, {"text": "Things relating to morals, or ethical works.", "isCorrect": true, "rationale": "The text glosses 'Moralia' as 'things relating to morals' or 'ethical works' — a vast collection of essays and dialogues."}, {"text": "Moral judgments on famous Greeks.", "isCorrect": false, "rationale": "The Moralia is broader than judgments on Greeks; topics range 'from how to read poetry to whether the moon is inhabited.'"}, {"text": "A treatise on lawgiving.", "isCorrect": false, "rationale": "The Moralia is a collection covering many topics, not a single treatise on law."}], "id": "q08"}, {"question": "The text identifies a 'Christian footnote' in its account of Plutarch. What is the relationship described between Plutarch and the Christian biographical tradition?", "options": [{"text": "Plutarch was a Christian convert in his later years.", "isCorrect": false, "rationale": "The text is explicit: Plutarch 'was a pagan ... almost certainly never read a Christian text or met a Christian.'"}, {"text": "Plutarch's method had deep affinities with the later Christian Lives of the saints, even though he was a pagan.", "isCorrect": true, "rationale": "The text says Plutarch's moral seriousness and attention to small revealing moments 'are deep affinities with the Christian biographical tradition.' Eusebius read him to learn how to write biography of holy men."}, {"text": "Plutarch opposed Christianity in the few essays where he addresses it.", "isCorrect": false, "rationale": "Plutarch never engaged with Christianity at all; in his day it was 'a small Jewish sect on the eastern fringes of the empire.'"}, {"text": "Plutarch's writings were ignored by all Christian authors.", "isCorrect": false, "rationale": "The text names Eusebius of Caesarea as a Christian historian who 'read Plutarch closely and learned from him.'"}], "id": "q09"}, {"question": "Consider Plutarch's claim that 'sometimes a matter of less moment, an expression or a jest, informs us better of their characters.' What reading discipline does this imply for the student of the Lives?", "options": [{"text": "Read for the famous battles and treaties; skip the anecdotes.", "isCorrect": false, "rationale": "This inverts Plutarch's method — the small revealing moments are precisely what he wants the reader to notice."}, {"text": "Read for the small revealing moments — a jest, an aside, the way a man treats his mother.", "isCorrect": true, "rationale": "The text says to 'read for the moment Plutarch inserts a small observation ... Those moments are why Plutarch is still read.'"}, {"text": "Read only the synkriseis and skip the body of each Life.", "isCorrect": false, "rationale": "Synkriseis weigh evidence drawn from the Lives; you cannot follow them without reading the Lives in full."}, {"text": "Read each Life as a military history of the subject's campaigns.", "isCorrect": false, "rationale": "Plutarch explicitly hands campaign histories to other writers; he watches for what battles cannot show."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
