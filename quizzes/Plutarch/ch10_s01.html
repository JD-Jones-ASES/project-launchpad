    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Reform Politics in Sparta and Rome</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Plutarch's only “double pair” joins four Lives under a single closing comparison. Which four men are paired?", "options": [{"text": "Lycurgus and Numa with Solon and Publicola.", "isCorrect": false, "rationale": "Those are two separate Greek-Roman pairs of founders, not the double pair on reform politics."}, {"text": "Agis and Cleomenes with Tiberius and Gaius Gracchus.", "isCorrect": true, "rationale": "The text identifies these two Spartan kings and two Roman tribunes as Plutarch's only four-Life unit joined by a single synkrisis."}, {"text": "Alexander and Caesar with Pompey and Demetrius.", "isCorrect": false, "rationale": "Those Lives are not the double pair; they belong to separate two-Life pairings."}, {"text": "Agesilaus and Pompey with Marius and Sulla.", "isCorrect": false, "rationale": "Marius and Sulla are not part of any Plutarchan pair, and this combination is not the double-pair of reformers."}], "id": "q01"}, {"question": "According to the chapter, what is the single political project that ties all four reformers together across two centuries and two cultures?", "options": [{"text": "Recovering territory lost to foreign conquest.", "isCorrect": false, "rationale": "Foreign conquest is not the issue; the reformers fought internal economic concentration, not loss of external lands."}, {"text": "Redistributing land and political power from a small wealthy class to a larger exploited one.", "isCorrect": true, "rationale": "The opening paragraph names this as the “same essential political project” that links the four Lives across Sparta and Rome."}, {"text": "Establishing a monarchy strong enough to overrule the assemblies.", "isCorrect": false, "rationale": "Only the Spartans were kings; the Gracchi were tribunes, and none aimed at monarchical absolutism."}, {"text": "Imposing imperial expansion on neighboring peoples.", "isCorrect": false, "rationale": "Imperial expansion was no part of the redistributive project Plutarch tracks."}], "id": "q02"}, {"question": "By Agis IV's day, what had become of the original Lycurgan division of 9,000 equal Spartan plots?", "options": [{"text": "It had expanded to roughly 30,000 plots through population growth.", "isCorrect": false, "rationale": "The trend was the opposite — the land had concentrated, not subdivided further."}, {"text": "It had been confiscated by Macedon as tribute.", "isCorrect": false, "rationale": "The collapse was internal; no foreign confiscation is mentioned."}, {"text": "It had collapsed into the hands of perhaps a hundred wealthy families, with the citizen class shrunk to a few hundred men.", "isCorrect": true, "rationale": "The text says the equal plots had concentrated in a small number of wealthy families and the qualified citizen body had shrunk dramatically."}, {"text": "It had been re-divided by the ephors into 700 large estates.", "isCorrect": false, "rationale": "The 700 figure refers to the few remaining qualified families, not to a deliberate re-division by the ephors."}], "id": "q03"}, {"question": "What was the legal status of the Roman ager publicus that the Gracchi sought to recover?", "options": [{"text": "It was private property that the Senate proposed to nationalize.", "isCorrect": false, "rationale": "The land was public in law; the issue was that it had been occupied as if private."}, {"text": "It was conquered land that in theory belonged to the Roman state but had been effectively expropriated by wealthy private holders.", "isCorrect": true, "rationale": "The text defines the ager publicus this way: public in theory, occupied by aristocratic holders paying little rent and treating it as their own."}, {"text": "It was farmland the Republic had purchased from the Italian allies.", "isCorrect": false, "rationale": "It was conquered land, not purchased land; the allies were a separate question that Gaius would later raise."}, {"text": "It was sacred land set aside for the temples of the gods.", "isCorrect": false, "rationale": "Sacred groves and temple lands are not the same as the ager publicus, which was civic conquered land."}], "id": "q04"}, {"question": "On the Spartan side, what was the conceptual frame Agis and Cleomenes used for their program?", "options": [{"text": "They were innovators introducing a wholly new constitution.", "isCorrect": false, "rationale": "The text stresses the opposite — they presented themselves as restorers, not innovators."}, {"text": "They were restorers recalling Sparta to the constitution of Lycurgus.", "isCorrect": true, "rationale": "The chapter says “they were not innovators in their own minds; they were restorers,” trying to bring back the Lycurgan order of Chapter 3."}, {"text": "They were appealing to a recent treaty with Macedon.", "isCorrect": false, "rationale": "No such treaty supplied their legitimacy; Macedon eventually opposed Cleomenes by force."}, {"text": "They were following an Athenian model from Solon's archonship.", "isCorrect": false, "rationale": "The Spartans framed themselves around Lycurgus, not the Athenian Solon."}], "id": "q05"}, {"question": "How did the legal framing of the Gracchan project differ from the Spartan reformers' framing?", "options": [{"text": "The Gracchi proposed a new constitution; the Spartans appealed to existing law.", "isCorrect": false, "rationale": "This reverses the case; the Gracchi were enforcers of existing law, while the Spartans appealed to a long-abandoned Lycurgan order."}, {"text": "The Gracchi sought to enforce a long-ignored statute on public land; the Spartans sought to restore a foundational legal order.", "isCorrect": true, "rationale": "The text contrasts the Gracchi as enforcers of existing law with the Spartans as restorers of a founder's constitution."}, {"text": "Both groups proposed wholly new redistributive laws with no legal precedent.", "isCorrect": false, "rationale": "Both worked within or around prior legal frames; neither proposed a wholly new redistribution from scratch."}, {"text": "The Spartans cited Plato, while the Gracchi cited Aristotle.", "isCorrect": false, "rationale": "No such philosophical citations are mentioned; the legal framings were drawn from Lycurgus and from Roman statute."}], "id": "q06"}, {"question": "Plutarch is careful about Agis's opening political gesture. What did Agis do that made his program rhetorically difficult to oppose?", "options": [{"text": "He bribed the ephors with money from the temple treasury.", "isCorrect": false, "rationale": "He did not bribe; he deposed opposing ephors and put up his own fortune to fund redistribution."}, {"text": "He surrendered his own enormous private fortune — six hundred talents plus his lands — into the redistribution pool.", "isCorrect": true, "rationale": "The text highlights this as the gesture that made any wealthy Spartan's resistance look hypocritical."}, {"text": "He proclaimed a religious oracle from Delphi.", "isCorrect": false, "rationale": "No oracle is invoked in the chapter's account of his opening gesture."}, {"text": "He married the daughter of the wealthiest opposing aristocrat.", "isCorrect": false, "rationale": "No such political marriage by Agis is reported in this section."}], "id": "q07"}, {"question": "What was the unprecedented procedural step Tiberius Gracchus took against his fellow tribune Marcus Octavius?", "options": [{"text": "He had Octavius exiled by the Senate.", "isCorrect": false, "rationale": "Tiberius did not pursue exile; he pushed through a deposition by popular vote."}, {"text": "He called for a vote to depose Octavius from the tribunate.", "isCorrect": true, "rationale": "The chapter identifies this as the procedurally revolutionary move that broke the deadlock over the agrarian law."}, {"text": "He bought Octavius's silence with a senatorial bribe.", "isCorrect": false, "rationale": "No bribery is reported; Octavius was removed from office by vote."}, {"text": "He proposed adding three new tribunes to dilute Octavius's veto.", "isCorrect": false, "rationale": "No expansion of the tribunate is described; Tiberius targeted Octavius personally."}], "id": "q08"}, {"question": "What downstream political consequence does the chapter assign to the killings of the Gracchi within Roman history?", "options": [{"text": "An immediate constitutional reform that strengthened the tribunate.", "isCorrect": false, "rationale": "The opposite — the killings opened a long breakdown rather than a reform."}, {"text": "A period of senatorial dominance lasting only a single generation.", "isCorrect": false, "rationale": "The text describes not a brief senatorial dominance but a century of escalating violence."}, {"text": "Roughly a hundred years of escalating civil violence that ended only with the Augustan settlement.", "isCorrect": true, "rationale": "The chapter says the killings opened a hundred years of escalating civil violence ending with the Augustan settlement."}, {"text": "A peaceful transition to the Empire under Julius Caesar.", "isCorrect": false, "rationale": "The transition was not peaceful and Caesar's role came at the end, not as a peaceful settlement."}], "id": "q09"}, {"question": "What does the chapter say is the kind of question Plutarch puts to the reader through these four Lives?", "options": [{"text": "Whether Sparta or Rome had the wiser foreign policy.", "isCorrect": false, "rationale": "The chapter's central question is not about foreign policy but about whether redistribution can be carried through peacefully."}, {"text": "Whether redistributive reform can be carried out without violence, and what becomes of those who try.", "isCorrect": true, "rationale": "The chapter explicitly poses these two questions as the moral and political stakes of the four Lives."}, {"text": "Whether kings or tribunes are more effective at war-making.", "isCorrect": false, "rationale": "The comparison is about reform, not military command."}, {"text": "Whether moralism in politics is preferable to skepticism.", "isCorrect": false, "rationale": "The question is concrete and political — about redistribution and violence — not abstractly meta-ethical."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
