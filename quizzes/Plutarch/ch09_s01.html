<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plutarch: Lives in Parallel &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Words as Political Action</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the political situation in Chapter 9 differ from that of Chapter 8?", "options": [{"text": "Chapter 9 features two men who, with political forms collapsing around them, tried to save those forms with the spoken word.", "isCorrect": true, "rationale": "The chapter opens by contrasting Chapter 8's men who broke free systems by the sword with Chapter 9's orators trying to save them through speech."}, {"text": "Chapter 9 covers military reformers who broke their political systems by the sword.", "isCorrect": false, "rationale": "That description fits Chapter 8; Chapter 9's pair are orators, not commanders."}, {"text": "Chapter 9 examines men who founded new political constitutions during peacetime.", "isCorrect": false, "rationale": "Demosthenes and Cicero did not found constitutions — they tried to defend existing ones already under threat."}, {"text": "Chapter 9 turns from public political life to private philosophical retirement.", "isCorrect": false, "rationale": "Although Cicero produced philosophical writing in retirement, the chapter's announced theme is political action through oratory."}], "id": "q01"}, {"question": "Who is described as \"the greatest orator in the Greek tradition\"?", "options": [{"text": "Cicero, the late-Republican Roman orator.", "isCorrect": false, "rationale": "Cicero is identified as the greatest Roman orator, not the greatest in the Greek tradition."}, {"text": "Demosthenes (384–322 BC), who warned Athens about Philip of Macedon.", "isCorrect": true, "rationale": "The chapter introduction names Demosthenes the greatest Greek orator and dates him to 384–322 BC."}, {"text": "Philip of Macedon, father of Alexander.", "isCorrect": false, "rationale": "Philip is the man-with-the-army opponent, not the orator."}, {"text": "Antipater, the Macedonian general who imposed terms on Athens.", "isCorrect": false, "rationale": "Antipater is the general who pursued Demosthenes; he is not described as an orator."}], "id": "q02"}, {"question": "What name was given both to Demosthenes's speeches against Philip and to Cicero's speeches against Antony?", "options": [{"text": "Olynthiacs.", "isCorrect": false, "rationale": "The Olynthiacs are a separate group of Demosthenes's speeches, not the shared name."}, {"text": "Catilinarians.", "isCorrect": false, "rationale": "The Catilinarians are Cicero's speeches against Catiline, a different opponent."}, {"text": "Synkriseis.", "isCorrect": false, "rationale": "Synkrisis is the term for Plutarch's formal comparisons, not for the orators' political speeches."}, {"text": "Philippics.", "isCorrect": true, "rationale": "Cicero explicitly modeled his speeches against Antony on Demosthenes's Philippics and used the same name."}], "id": "q03"}, {"question": "How does the chapter introduction define the central theme of \"the orator against tyranny\"?", "options": [{"text": "A philosopher who advises kings on how to govern justly.", "isCorrect": false, "rationale": "The orator is not pictured as a court advisor but as a public speaker resisting power."}, {"text": "A man whose only weapon is his voice, facing a political opponent with armies and treasure.", "isCorrect": true, "rationale": "The text explicitly defines the theme as the speaker who must use speech alone to save his city against an opponent with armies and treasure."}, {"text": "A general who turns to writing in retirement.", "isCorrect": false, "rationale": "The orator is described as active in assembly and court, not as a retired general."}, {"text": "A magistrate who relies on legal procedure rather than persuasion.", "isCorrect": false, "rationale": "The orator's distinctive instrument is persuasion, not procedural authority."}], "id": "q04"}, {"question": "Why does the chapter call the orator \"structurally a critic of power\"?", "options": [{"text": "Because orators were legally forbidden to hold office and therefore had to attack officeholders.", "isCorrect": false, "rationale": "The chapter does not claim a legal bar; Cicero, in fact, held the consulship."}, {"text": "Because the orator's natural enemy is the man with the army — Demosthenes attacks Philip, Cicero attacks Catiline, then Caesar, then Antony.", "isCorrect": true, "rationale": "The text sets up the orator as the principal civic voice resisting personal rule by armed men."}, {"text": "Because orators in the ancient world were always foreigners.", "isCorrect": false, "rationale": "Both Demosthenes (Athenian) and Cicero (from Arpinum, then Rome) are citizens of the cities they defend."}, {"text": "Because Plutarch limits the genre to people who lost their political battles.", "isCorrect": false, "rationale": "Plutarch's framing is about the orator's structural role facing armed power, not a literary criterion of failure."}], "id": "q05"}, {"question": "According to the chapter, what \"shared political shape\" makes Demosthenes and Cicero fit so well as a paired Life?", "options": [{"text": "Both began as generals before turning to oratory in old age.", "isCorrect": false, "rationale": "Neither is described as a general turned orator; Demosthenes notoriously fled the field at Chaeronea."}, {"text": "Both became dictators of their respective cities for a brief period.", "isCorrect": false, "rationale": "Neither man ever held dictatorial power; that is closer to the Chapter 8 figures."}, {"text": "A free city (Athens, then Rome) is being threatened by a great-man political-military figure (Philip, then Antony) who would end its constitutional freedom, and the orator is the principal civic voice resisting that rise.", "isCorrect": true, "rationale": "The chapter explicitly states the parallel: free city, rising authoritarian, orator as the civic resistance."}, {"text": "Both successfully preserved their constitutions and died honored old men.", "isCorrect": false, "rationale": "Both men lost in immediate political terms; both died at the hands of their political opponents."}], "id": "q06"}, {"question": "How does the chapter describe the relationship between immediate political failure and long-term cultural success in these two Lives?", "options": [{"text": "Both men succeeded politically, so the question of long-term success does not arise.", "isCorrect": false, "rationale": "Both men lost in immediate political terms — that is the entire premise."}, {"text": "Plutarch dismisses long-term cultural influence as irrelevant to evaluating a political life.", "isCorrect": false, "rationale": "Plutarch treats long-term influence as one of his recurring concerns across the Lives."}, {"text": "Both men lost in immediate political terms but left behind speeches read continuously since — a tension Plutarch returns to throughout the Lives.", "isCorrect": true, "rationale": "The chapter calls this tension between immediate failure and long-term success a recurring Plutarchan concern."}, {"text": "Only Cicero's speeches survived; Demosthenes was lost until the nineteenth century.", "isCorrect": false, "rationale": "Demosthenes survived in the Greek manuscript tradition and was restored to the West by Renaissance humanists."}], "id": "q07"}, {"question": "What does the introduction note about Demosthenes as a natural speaker?", "options": [{"text": "He was the most naturally gifted speaker of his age, requiring no training.", "isCorrect": false, "rationale": "The chapter emphasizes the opposite: he was famously not a natural speaker."}, {"text": "He had a stutter and was weak-chested, and made himself an orator by methodical exercise.", "isCorrect": true, "rationale": "The introduction lists pebbles in the mouth, running uphill while speaking, and practicing before a mirror as part of his self-construction."}, {"text": "He never spoke in public, working only as a speechwriter for others.", "isCorrect": false, "rationale": "Though he began as a speechwriter, he became Athens's leading public speaker against Philip."}, {"text": "He learned to speak only after being exiled to Persia.", "isCorrect": false, "rationale": "His training happened in Athens, including an underground study with a half-shaved head."}], "id": "q08"}, {"question": "How does the chapter compare the two deaths it previews?", "options": [{"text": "Demosthenes's death is described as sober and prepared; Cicero's is described as more pathetic.", "isCorrect": true, "rationale": "The introduction explicitly contrasts the sober prepared poison in the temple with Cicero stretching out his neck from a litter."}, {"text": "Both men died peacefully of old age, surrounded by their students.", "isCorrect": false, "rationale": "Both die violently at the hands of their political opponents."}, {"text": "Cicero's death was sober and prepared; Demosthenes's was a pitiable accident.", "isCorrect": false, "rationale": "The chapter reverses these descriptions — the prepared death is Demosthenes's."}, {"text": "Both deaths happened on the same day, by Plutarch's own account.", "isCorrect": false, "rationale": "The lives are separated by centuries; no such coincidence is claimed."}], "id": "q09"}, {"question": "How does the chapter introduction describe the long Christian reception of Cicero?", "options": [{"text": "Cicero was forgotten in the Middle Ages and restored only in the nineteenth century.", "isCorrect": false, "rationale": "Cicero was, more than any other pagan author, read continuously through the Middle Ages and Renaissance."}, {"text": "His moral philosophy (the De Officiis) was a standard schoolbook from the eighth century to the nineteenth, and figures like Erasmus and Petrarch celebrated him.", "isCorrect": true, "rationale": "The introduction names De Officiis as a long-standing schoolbook and lists Erasmus, the Reformers, and Petrarch as transmitters of his style."}, {"text": "The Christian tradition treated Cicero as a heretic and suppressed his writings.", "isCorrect": false, "rationale": "The chapter calls the Christian intellectual tradition inconceivable without Cicero."}, {"text": "Cicero was read only in the original Greek, never translated into Latin.", "isCorrect": false, "rationale": "Cicero wrote in Latin; the medieval Latin tradition learned its style from him."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
