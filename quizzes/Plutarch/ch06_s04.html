    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "On Plutarch's first axis, the difficulty of the inherited situation, which leader does the synkrisis judge as having worked with the harder material?", "options": [{"text": "Pericles, because Athens had recently emerged from the Persian Wars.", "isCorrect": false, "rationale": "Plutarch awards this round to Fabius. Pericles inherited Athens 'in its most flourishing and opulent condition, great and growing in power.'"}, {"text": "Fabius, because he took over a Rome facing catastrophic invasion, with Roman armies destroyed and Roman blood in the rivers.", "isCorrect": true, "rationale": "Plutarch awards round one to Fabius: he 'took over a city facing catastrophic invasion, with Roman armies destroyed and Roman blood in the rivers. The two situations are not comparable in difficulty.'"}, {"text": "Neither — Plutarch declines to judge this axis.", "isCorrect": false, "rationale": "Plutarch is explicit on this axis: round one to Fabius."}, {"text": "Both equally, because each city faced the threat of foreign invasion.", "isCorrect": false, "rationale": "Athens under Pericles was 'flourishing and opulent'; Rome under Fabius faced catastrophe. The situations are not comparable in difficulty."}]}, {"question": "On the second axis — the number of victories — Plutarch records what specific count for Pericles?", "options": [{"text": "Three trophies, all on land.", "isCorrect": false, "rationale": "Plutarch says nine, not three."}, {"text": "Nine trophies for as many victories obtained by land and by sea.", "isCorrect": true, "rationale": "The synkrisis quotes Plutarch precisely: Pericles 'erected nine trophies for as many victories obtained by land and by sea.'"}, {"text": "Twenty-three trophies, one for each major campaign.", "isCorrect": false, "rationale": "Plutarch's figure is nine."}, {"text": "None — Pericles avoided military glory.", "isCorrect": false, "rationale": "Pericles did seek victories; on this narrow military measure he is clearly the more decorated commander."}]}, {"question": "How does Plutarch use the rescue of Minucius in the synkrisis?", "options": [{"text": "He cites it as a moment of weakness in which Fabius let his rival escape just punishment.", "isCorrect": false, "rationale": "Plutarch celebrates the rescue; it is not framed as weakness."}, {"text": "He calls it 'a noble act, combining the highest valor, wisdom, and humanity' and says 'no action of Pericles can be compared' to it.", "isCorrect": true, "rationale": "Plutarch's exact words in the synkrisis are 'a noble act, combining the highest valor, wisdom, and humanity,' and he says 'no action of Pericles can be compared' to it. Round three to Fabius."}, {"text": "He treats it as evidence that Fabius lacked political toughness.", "isCorrect": false, "rationale": "Plutarch's reading is the opposite — the rescue shows greatness of character."}, {"text": "He says it was overrated by partisan Roman sources.", "isCorrect": false, "rationale": "There is no such qualification in Plutarch's verdict."}]}, {"question": "Plutarch frames the contrast in foresight with one of his sharpest epigrams. What is it?", "options": [{"text": "'Pericles built; Fabius preserved.'", "isCorrect": false, "rationale": "This captures the general contrast but is not Plutarch's epigram in this synkrisis."}, {"text": "'Pericles was a good prophet of bad success, and Fabius was a bad prophet of success that was good.'", "isCorrect": true, "rationale": "Plutarch's exact formulation in the synkrisis is: 'Pericles was a good prophet of bad success, and Fabius was a bad prophet of success that was good.'"}, {"text": "'Greek wisdom looks forward; Roman wisdom looks back.'", "isCorrect": false, "rationale": "Plutarch's epigram is more specific and is about prophecy, not retrospection."}, {"text": "'Patience is the better part of virtue.'", "isCorrect": false, "rationale": "This generic adage is not Plutarch's wording."}]}, {"question": "What is the substance of Plutarch's foresight contrast?", "options": [{"text": "Both men accurately predicted the outcomes of the wars they led.", "isCorrect": false, "rationale": "Plutarch awards this round to Pericles precisely because their predictions differed in accuracy."}, {"text": "Pericles correctly warned the Athenians that grasping more than they could manage would ruin them; Fabius wrongly predicted that Scipio's African strategy would be the destruction of the commonwealth.", "isCorrect": true, "rationale": "The synkrisis says Pericles 'admonished the Athenians, and told them beforehand the ruin the war would bring upon them, by their grasping more than they were able to manage' — and Fabius 'was not so good a prophet, when he denounced to the Romans that the undertaking of Scipio would be the destruction of the commonwealth.' Round four to Pericles."}, {"text": "Neither man made any predictions of consequence.", "isCorrect": false, "rationale": "Both made predictions about decisive political questions."}, {"text": "Pericles wrongly predicted Athens's quick victory; Fabius correctly predicted Roman recovery.", "isCorrect": false, "rationale": "This inverts Plutarch's epigram."}]}, {"question": "On Axis 5 — mildness toward colleagues — what specific incidents does Plutarch contrast?", "options": [{"text": "Fabius's gentleness in rescuing Minucius vs. Pericles's ostracisms of Cimon and Thucydides son of Melesias.", "isCorrect": true, "rationale": "The synkrisis says: 'Plutarch contrasts Fabius's gentleness with Minucius (he saved his rival's army) against Pericles's ostracism of Cimon and Thucydides son of Melesias. Round five to Fabius.'"}, {"text": "Fabius's friendship with Scipio vs. Pericles's quarrel with Alcibiades.", "isCorrect": false, "rationale": "Fabius opposed Scipio, not befriended him, and Alcibiades belongs to a different Life."}, {"text": "Fabius's role in the trial of Cato vs. Pericles's defense of Anaxagoras.", "isCorrect": false, "rationale": "Cato belongs to a different chapter; the Cato trial is not in this synkrisis."}, {"text": "Fabius's pardon of Hannibal vs. Pericles's exile of Themistocles.", "isCorrect": false, "rationale": "Hannibal was not pardoned by Fabius, and Themistocles's ostracism predates Pericles's political career."}]}, {"question": "On Axis 6 — influence and reach — Plutarch judges that Pericles had greater authority in Athens than Fabius did in Rome. What complication does Plutarch add?", "options": [{"text": "That Pericles abused his greater authority in ways that hurt his city.", "isCorrect": false, "rationale": "Plutarch does not phrase the complication that way in the synkrisis itself."}, {"text": "That it would have been better for Rome if Fabius's authority had been greater — Rome suffered Cannae partly because his hand was not strong enough.", "isCorrect": true, "rationale": "The synkrisis ends Axis 6: 'Round six to Pericles — but with a complication: it would have been better for Rome if Fabius's authority had been greater.'"}, {"text": "That Pericles's authority was inherited, not earned.", "isCorrect": false, "rationale": "Plutarch does not frame Pericles's authority as inherited in this passage."}, {"text": "That Fabius's authority was secretly greater than it appeared.", "isCorrect": false, "rationale": "The complication runs the other way — Plutarch wishes Fabius's authority had in fact been greater."}]}, {"question": "On Axis 8 — the building program — what extraordinary acknowledgment does Plutarch make?", "options": [{"text": "That Pericles's Athenian buildings were exceeded only by the Persian palaces at Persepolis.", "isCorrect": false, "rationale": "Persepolis is not the comparison Plutarch makes."}, {"text": "That Pericles's Athenian program was unequaled by anything in Rome 'to the time of the Caesars.'", "isCorrect": true, "rationale": "The synkrisis describes the building program as 'unequaled even by anything in Rome to the time of the Caesars' — and notes this as 'an astonishing acknowledgment from a writer working under the Roman imperial peace.'"}, {"text": "That the Parthenon was built with stones from Carthage as war reparations.", "isCorrect": false, "rationale": "There is no such claim in the synkrisis."}, {"text": "That Fabius secretly admired Greek architecture more than Roman.", "isCorrect": false, "rationale": "Plutarch does not attribute this view to Fabius."}]}, {"question": "How does Plutarch resolve the synkrisis overall?", "options": [{"text": "He declares Pericles the greater leader on every axis.", "isCorrect": false, "rationale": "Pericles wins some rounds; Fabius wins others. There is no clean victory."}, {"text": "He declares Fabius the greater leader because of the rescue of Minucius alone.", "isCorrect": false, "rationale": "Plutarch does not let any single round decide the whole verdict."}, {"text": "He declines to declare a winner — the two represent kinds of greatness that cannot be ranked on a single scale.", "isCorrect": true, "rationale": "The synkrisis closes: 'The verdict, characteristically, does not resolve. Plutarch declines to declare a winner... these two men represent two kinds of political greatness that cannot be ranked on a single scale.'"}, {"text": "He awards a draw and stops there without further reflection.", "isCorrect": false, "rationale": "Plutarch does more than declare a draw — he articulates the principle that different moments call for different types of leader."}]}, {"question": "What practical habit of judgment does Plutarch suggest the reader take from the synkrisis?", "options": [{"text": "Always prefer the visionary leader, since vision shapes the future.", "isCorrect": false, "rationale": "Plutarch explicitly resists this single-axis ranking."}, {"text": "Always prefer the patient leader, since recklessness ruins more cities than caution.", "isCorrect": false, "rationale": "Plutarch resists ranking on a single virtue."}, {"text": "Ask, of any political moment, what kind of leader does it need — emergency may call for a Fabius, opportunity for a Pericles.", "isCorrect": true, "rationale": "The synkrisis closes: 'What you should take from the chapter is the habit of asking, of any political moment, what kind of leader does it need? A moment of national emergency may need a Fabius; a moment of opportunity may need a Pericles.'"}, {"text": "Ignore temperament and judge leaders only by their results.", "isCorrect": false, "rationale": "The chapter is built on the claim that temperament is itself a political fact, not something to be ignored."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
