    };

        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Lycurgus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Plutarch open the Life of Lycurgus?", "options": [{"text": "With one of his most candid admissions of doubt — saying he cannot fix when Lycurgus lived, his family, his travels, or how he died, but proceeds 'adhering to those statements which are least contradicted'.", "isCorrect": true, "rationale": "The section emphasizes that the Life is essentially a biography of the constitution as much as of the man, given how little of the man is certain."}, {"text": "With a confident genealogy tracing Lycurgus to Heracles through ten attested generations.", "isCorrect": false, "rationale": "Plutarch instead begins by confessing that scarcely anything about Lycurgus is asserted by one historian without contradiction by another."}, {"text": "With a quotation from Aristotle's Politics defending Lycurgan Sparta.", "isCorrect": false, "rationale": "Aristotle is cited elsewhere in the tradition but the opening of the Life is an admission of doubt, not a citation of Aristotle."}, {"text": "With an oracle from Delphi predicting the birth of the lawgiver.", "isCorrect": false, "rationale": "Delphi appears later in the narrative, after Lycurgus has designed his laws — not at the biography's opening."}], "id": "q01"}, {"question": "Why did Lycurgus decline the throne when his brother King Polydectes died?", "options": [{"text": "The queen was pregnant; when she proposed to abort the child if Lycurgus would marry her, he played along to save the baby and then presented the child publicly as the new king of Sparta, naming him Charilaus — 'the joy of the people'.", "isCorrect": true, "rationale": "Plutarch tells this as a defining moment of Lycurgus's character flashing in a small act: he could have had the throne by silence and chose instead to have a baby."}, {"text": "He had a vow of celibacy that legally barred him from kingship.", "isCorrect": false, "rationale": "No such vow is described; the story turns on the unborn child and the queen's proposal."}, {"text": "He was disqualified for having travelled abroad without senatorial permission.", "isCorrect": false, "rationale": "The travels came later, after he had handed the throne to Charilaus."}, {"text": "He preferred a military command and refused civilian rule.", "isCorrect": false, "rationale": "Lycurgus is not characterized as a military man; Plutarch explicitly says he was not a great war-maker."}], "id": "q02"}, {"question": "What were the three foundational reforms Lycurgus introduced as a single converging program?", "options": [{"text": "The Senate (gerousia) of twenty-eight elders, the redistribution of land into equal plots, and the replacement of gold and silver coin with iron money.", "isCorrect": true, "rationale": "Plutarch presents these as separate reforms that converged on a single result: the production of a society with no private inequality."}, {"text": "Universal military service, a state navy, and a tribute system over the helots.", "isCorrect": false, "rationale": "Sparta lacked a state navy in Lycurgus's design and the krypteia/helot relationship was a moral horror Plutarch criticizes — not one of the three foundational reforms."}, {"text": "A written constitution, an elected assembly, and a system of public courts.", "isCorrect": false, "rationale": "Lycurgus refused to write his laws; his three core reforms were the Senate, the land redistribution, and the iron money."}, {"text": "A royal monopoly on grain, a tax on metals, and a state-run school for girls.", "isCorrect": false, "rationale": "None of these correspond to the three reforms Plutarch identifies."}], "id": "q03"}, {"question": "What was the Spartan gerousia (Senate), and what political function did Plutarch say it served?", "options": [{"text": "A body of twenty-eight elder citizens who, together with the two kings, made thirty members. Plutarch called it 'a central weight, like ballast in a ship', balancing the hot temper of the kings against the unsteady passions of the assembly.", "isCorrect": true, "rationale": "Sparta thus had three political centers — kings, Senate, assembly — each checking the others."}, {"text": "A council of priests who consulted the Delphic oracle on each new law.", "isCorrect": false, "rationale": "The gerousia was a civic council, not a priestly one, and consultation of Delphi was an event in Lycurgus's career, not a function of the Senate."}, {"text": "A college of young warriors (the iren) who voted in war assemblies.", "isCorrect": false, "rationale": "The iren was the older boy supervising the agoge company; the gerousia was a body of twenty-eight elders."}, {"text": "A guild of merchants regulating the iron money.", "isCorrect": false, "rationale": "Spartan merchants were essentially eliminated by the iron currency; the gerousia had no commercial function."}], "id": "q04"}, {"question": "Why did the iron money succeed in banishing 'a number of vices' from Lacedaemon, according to Plutarch's argument?", "options": [{"text": "Because the iron coin was so heavy and useless that it could not easily be hidden, was no credit to possess, was useless cut up, and would not be accepted by merchants — so robbery, bribery, and luxury trade all starved.", "isCorrect": true, "rationale": "Plutarch's image is of luxury 'wasting to nothing' once its food was removed: foreign merchants would no longer sail in, jewelers and engravers stopped coming, and Spartans had nothing to amass."}, {"text": "Because the coins were stamped with the heads of fierce gods that frightened thieves.", "isCorrect": false, "rationale": "Plutarch makes no reference to fearsome images; the deterrent was sheer physical weight and worthlessness."}, {"text": "Because possession of iron money was punishable by death.", "isCorrect": false, "rationale": "Iron money was the only legal currency; possessing it was not a crime."}, {"text": "Because the iron rusted within a year and was constantly replaced.", "isCorrect": false, "rationale": "No such mechanism appears in Plutarch; the iron money worked through inconvenience, not decay."}], "id": "q05"}, {"question": "What were the syssitia (common tables), and why did the wealthier Spartans resist them?", "options": [{"text": "Public messes of fifteen men each in which every Spartan ate his daily meal, abolishing the private dinner; the rich resisted because they could no longer enjoy or display their abundance, sparking a riot in which Lycurgus was struck and lost an eye.", "isCorrect": true, "rationale": "Plutarch calls this Lycurgus's 'third and most masterly stroke' against luxury and shows that the wealthier men, exasperated, came to throwing stones."}, {"text": "Royal banquets to which only the gerousia was invited, leaving the assembly to dine privately.", "isCorrect": false, "rationale": "The point of the syssitia was universal participation by Spartan citizens, not exclusion."}, {"text": "An annual festival of communal eating before religious processions.", "isCorrect": false, "rationale": "The syssitia were daily, not annual."}, {"text": "Open-air feasts paid for by the helots as a form of tribute.", "isCorrect": false, "rationale": "Helot labor supported the citizen economy generally, but the syssitia were funded by each citizen's monthly contribution of meal, wine, cheese, figs, and money for meat."}], "id": "q06"}, {"question": "Why is the Alcander story called 'the moral center of the Life of Lycurgus'?", "options": [{"text": "Because Lycurgus, given legal license to punish the young man who had blinded one of his eyes, instead took Alcander into his house, treated him kindly, set him to wait at table, and made him a devoted disciple — showing that the lawgiver's private virtue recommended his public laws.", "isCorrect": true, "rationale": "Plutarch explicitly draws the lesson: 'The man who put out his eye became his student' — the Spartan constitution required the Spartan lawgiver."}, {"text": "Because Alcander led the army that finally enforced the constitution by force of arms.", "isCorrect": false, "rationale": "Alcander never appears as a military figure; the story is one of moral transformation."}, {"text": "Because Alcander was the first foreigner to be granted Spartan citizenship.", "isCorrect": false, "rationale": "Alcander was Spartan; no citizenship grant is involved in the story."}, {"text": "Because Alcander wrote down the laws after Lycurgus refused to.", "isCorrect": false, "rationale": "Lycurgus's laws were notably not written down; no scribal role for Alcander is mentioned."}], "id": "q07"}, {"question": "What was the agoge, and what was its principal pedagogical purpose?", "options": [{"text": "The Spartan public education from age seven, in which boys were taken from their families and enrolled in companies under common discipline — close-cropped, barefoot, sleeping on rushes — to form character, making obedience, endurance, and laconic speech instinctive before they were old enough to question them.", "isCorrect": true, "rationale": "Plutarch emphasizes that reading and writing were taught 'just enough to serve their turn'; the real work was endurance, obedience, and skill at arms."}, {"text": "An elite officer school admitting only the sons of the two royal houses.", "isCorrect": false, "rationale": "The agoge was mandatory for all male citizens, not just royals."}, {"text": "A philosophical academy modelled on Pythagorean schools in southern Italy.", "isCorrect": false, "rationale": "The agoge was a physical and moral training, not a philosophical academy."}, {"text": "A literacy program preparing boys for civil-service exams.", "isCorrect": false, "rationale": "Plutarch is explicit that literacy was minimal; civil-service examination is not a Spartan institution."}], "id": "q08"}, {"question": "What does the story of the Spartan boy and the stolen fox illustrate about the agoge?", "options": [{"text": "The boy let the fox tear out his bowels rather than admit to a theft — he was celebrated not for the theft but for his silence under agony, the agoge's signature achievement.", "isCorrect": true, "rationale": "Plutarch uses the image to show that the purpose of the agoge was not to teach skills but to form a character that could not imagine a different way of life."}, {"text": "Spartan boys were taught to hunt foxes as a survival skill for service in the wilderness.", "isCorrect": false, "rationale": "The lesson of the story is about endurance and silence, not hunting skill."}, {"text": "The fox was a Spartan religious symbol, and the boy died honoring the god.", "isCorrect": false, "rationale": "No Spartan religious significance attaches to the fox in Plutarch's telling; the point is moral conditioning."}, {"text": "The story is told as a warning against theft and the harsh punishments it brought.", "isCorrect": false, "rationale": "Plutarch says explicitly that the boy was not celebrated for the theft; he was celebrated for the silence."}], "id": "q09"}, {"question": "How did Lycurgus arrange his own final exit from Sparta, and why?", "options": [{"text": "He extracted an oath from the Spartans to observe his laws until he returned, went to Delphi to confirm them with the oracle, and then never came back — starving himself to death in exile so the city, bound by oath, could not legally amend his constitution.", "isCorrect": true, "rationale": "Plutarch records the extraordinary self-sacrifice — a lawgiver who killed himself in exile to ensure his city could not undo his work."}, {"text": "He retired publicly to a country estate where he lived to extreme old age.", "isCorrect": false, "rationale": "Plutarch describes a permanent exile and death by self-starvation, not a quiet retirement."}, {"text": "He was assassinated by the wealthier Spartans whose property he had redistributed.", "isCorrect": false, "rationale": "While the rich rioted earlier, no assassination is described; the death is by self-starvation in exile."}, {"text": "He left for Athens and died in a chariot accident on the road.", "isCorrect": false, "rationale": "Plutarch names Crete or Cirrha as possible places of death, by self-starvation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
