<script>
var QUESTIONS = [{"question": "How does the pairing of Themistocles and Camillus differ from the founder-pairings of Chapters 2 through 4?", "options": [{"text": "These men founded cities, where the earlier pairings reformed them.", "isCorrect": false, "rationale": "The Chapters 2-4 pairings are themselves the founders and lawgivers; Chapter 5 turns to a different kind of statesman."}, {"text": "These men saved cities that were on the brink of destruction, while the earlier pairings built up the institutions of cities not yet under existential threat.", "isCorrect": true, "rationale": "The text opens by contrasting the city-builders of Chs. 2-4 with the city-savers of Ch. 5 — men whose vision and energy kept Athens and Rome from being wiped out at the moment of their greatest danger."}, {"text": "These men were both foreign-born outsiders, where the earlier pairings were native sons.", "isCorrect": false, "rationale": "Themistocles was a native Athenian (with a possibly foreign mother) and Camillus a Roman of the Furii; the contrast in the chapter is about the function of the statesman, not his origin."}, {"text": "These pairings include no synkrisis, where the Chapters 2-4 pairings do.", "isCorrect": false, "rationale": "Plutarch did write a synkrisis for Themistocles and Camillus; it has simply been lost. The structural difference the chapter introduces is the type of statesman, not the absence of a comparison."}]}, {"question": "What event in 480 BC threatened the existence of Athens, and what was the outcome before Salamis?", "options": [{"text": "A Spartan invasion that besieged the Acropolis for two years.", "isCorrect": false, "rationale": "Sparta and Athens were allied against Persia in 480 BC; the threat came from the east, not the Peloponnese."}, {"text": "Xerxes, son of Darius, marched on Greece with a force of perhaps 200,000-250,000 men supported by 600-800 ships, and burned Athens to the ground by September.", "isCorrect": true, "rationale": "The text states that Xerxes invaded with an army modern scholarship estimates at 200,000-250,000, that by September the Persians had burned Athens, and that the Athenians were refugees on Salamis and at Troezen."}, {"text": "A plague that wiped out two-thirds of the Athenian population.", "isCorrect": false, "rationale": "A plague did strike Athens, but in 430 BC, fifty years after the events of this chapter."}, {"text": "An Egyptian fleet that blockaded Piraeus and starved the city into surrender.", "isCorrect": false, "rationale": "Piraeus was not yet a major port in 480 BC, and the invader was Persian, not Egyptian."}]}, {"question": "What was the Gallic Sack of Rome, and roughly when did it occur?", "options": [{"text": "A Celtic warband under Brennus crossed the Alps, defeated a Roman army at the Allia river, sacked and burned most of Rome, and was paid an enormous ransom in gold to leave; the traditional date is 390 BC.", "isCorrect": true, "rationale": "The text describes Brennus's Gauls crossing the Alps, the Roman defeat at the Allia, the burning of Rome, the gold ransom, and the traditional date of 390 BC."}, {"text": "A Carthaginian raid on Latium during the First Punic War, dated to 264 BC.", "isCorrect": false, "rationale": "The Gallic Sack was a Celtic, not Punic, event, and the date is more than a century earlier than the Punic Wars."}, {"text": "An Etruscan-led uprising that briefly restored the kings after the founding of the Republic.", "isCorrect": false, "rationale": "The text identifies the attackers as Gauls under Brennus, not Etruscans."}, {"text": "A Greek expedition from Sicily that destroyed the wooden city walls in 350 BC.", "isCorrect": false, "rationale": "The sackers were Celtic warriors from across the Alps; no such Greek expedition occurred."}]}, {"question": "How did Themistocles transform the Athenian relationship to the sea?", "options": [{"text": "He banned overseas trade so that all Athenian effort could go into hoplite warfare.", "isCorrect": false, "rationale": "Themistocles did the opposite: he pulled Athens toward the sea, converting silver revenue into a navy."}, {"text": "He converted the silver revenues of Athens into a fleet, persuaded the Athenians to evacuate rather than defend the city, and engineered the decisive naval victory at Salamis.", "isCorrect": true, "rationale": "The text describes Themistocles as the man whose two-decade campaign to build an Athenian navy made the salvation of Athens possible, and who engineered the Salamis victory."}, {"text": "He moved the city of Athens itself to the harbor of Piraeus, abandoning the inland Acropolis.", "isCorrect": false, "rationale": "Themistocles fortified Piraeus as a port but did not relocate the city; the Acropolis remained the religious heart of Athens."}, {"text": "He persuaded Sparta to share its fleet with Athens during the Persian crisis.", "isCorrect": false, "rationale": "Sparta had no major fleet, and Themistocles's whole point was that Athens had to build its own navy."}]}, {"question": "Why does Roman tradition call Camillus 'the second founder of Rome'?", "options": [{"text": "Because he expanded the city to twice its original size after defeating the Etruscans.", "isCorrect": false, "rationale": "The second-founder title is about restoration after the Sack, not about size."}, {"text": "Because he ruled as the second king of Rome after Romulus.", "isCorrect": false, "rationale": "Camillus lived in the early Republic, long after the monarchy ended; he served as dictator, not king."}, {"text": "Because, after the Gallic Sack, he led the recovery of Rome and kept the Romans from abandoning their ruined city for the empty city of Veii — Romulus built it, Camillus built it back.", "isCorrect": true, "rationale": "The text says Roman tradition called him the second founder of Rome: Romulus had built it, Camillus had built it back, by leading the recovery and refusing to allow relocation to Veii."}, {"text": "Because he founded a colony on the site of Falerii after its surrender.", "isCorrect": false, "rationale": "Falerii surrendered after the schoolmaster incident, but the second-founder title refers specifically to the post-Gallic recovery of Rome itself."}]}, {"question": "What pattern do Themistocles and Camillus share in their relationship to the cities they saved?", "options": [{"text": "Both were crowned kings by their grateful citizens after their decisive victories.", "isCorrect": false, "rationale": "Neither man was made king; both were driven into exile by the cities they had saved."}, {"text": "Both refused all political office and retired to private life after their victories.", "isCorrect": false, "rationale": "Both remained politically active after their victories, and the trouble began when their continued prominence created enemies."}, {"text": "After saving their cities, both were driven into exile by those same cities — Themistocles by ostracism, Camillus by a trial for misappropriation of war spoils.", "isCorrect": true, "rationale": "The text emphasizes that both Themistocles and Camillus, after their decisive services, were exiled by ungrateful cities — Themistocles ostracized, Camillus tried for misappropriation."}, {"text": "Both were assassinated by political rivals within a year of their victories.", "isCorrect": false, "rationale": "Themistocles died in Persia (by old age or suicide, traditions differ) and Camillus died at home in his eighties of plague — neither by assassination."}]}, {"question": "The text identifies the lost synkrisis of Themistocles and Camillus as which of four such losses?", "options": [{"text": "It is the only synkrisis lost from the surviving Parallel Lives.", "isCorrect": false, "rationale": "The text specifies that four pairings lack their original comparison."}, {"text": "It is one of four pairings whose synkrisis did not survive; the second such pair encountered in this book is Alexander and Caesar in Chapter 8.", "isCorrect": true, "rationale": "The text states four of the twenty-three surviving pairings lack their comparison, and that Themistocles-Camillus is the first of two we will encounter in this book, with Alexander-Caesar (Ch. 8) being the second."}, {"text": "All four lost synkriseis appear in this book.", "isCorrect": false, "rationale": "Only two of the four lost synkriseis appear in this book — the others are not included."}, {"text": "Plutarch deliberately omitted writing this synkrisis because he could not decide.", "isCorrect": false, "rationale": "The text is clear that Plutarch did write a synkrisis for this pair; the manuscripts show it once existed but the text was lost in transmission."}]}, {"question": "How does the Section 5.4 writing exercise differ from the synkrisis exercises in Chapters 2 through 4?", "options": [{"text": "It is optional rather than required.", "isCorrect": false, "rationale": "The exercise remains required; what changes is its character, not its weight."}, {"text": "It is shorter — only 200-300 words.", "isCorrect": false, "rationale": "The exercise is in fact more demanding, not shorter, than the earlier synkriseis."}, {"text": "Because Plutarch's verdict has been lost, the student writes a synkrisis without a Plutarchan model to imitate — the verdict is genuinely the student's own.", "isCorrect": true, "rationale": "The text says the Writing Your Own Synkrisis exercise is no longer a chance to imitate Plutarch's verdict; it is a chance to supply what Plutarch did not leave behind, and is deliberately more demanding."}, {"text": "It is written collectively by the class rather than by individual students.", "isCorrect": false, "rationale": "Nothing in the text changes the individual character of the writing exercise."}]}, {"question": "Which patterns does the chapter introduction tell readers to watch for in both Lives?", "options": [{"text": "The discovery of new lands, the founding of colonies, and the building of monuments.", "isCorrect": false, "rationale": "These themes belong to other chapters; the city-saver themes are different in kind."}, {"text": "The vision the rest of the city does not yet have, the strategic risk taken, the ambiguous methods used, the patience under exile, and the schoolmaster of Falerii.", "isCorrect": true, "rationale": "The 'What to watch for' list at the end of the section names exactly these five patterns — foresight, strategic gamble, ambiguous methods, patient exile, and the Falerian schoolmaster as the centerpiece of Camillus's character."}, {"text": "The use of mercenaries, the destruction of temples, and the betrayal of allies.", "isCorrect": false, "rationale": "The chapter actually emphasizes the opposite — both men refuse to betray their cities even in exile."}, {"text": "Naval engineering, mountain warfare, and the use of elephants.", "isCorrect": false, "rationale": "These are practical military topics not used as the organizing categories of the chapter's introduction."}]}, {"question": "Which Second Witness does the chapter pair with Plutarch's Life of Camillus, and why is no Greek Second Witness included for Themistocles?", "options": [{"text": "Tacitus is used for Camillus; no Greek witness is included because no Greek sources for Themistocles survive.", "isCorrect": false, "rationale": "The Second Witness is Livy, not Tacitus, and Greek sources for Themistocles do survive (notably Herodotus)."}, {"text": "Livy's Book V provides the parallel Roman account of the Gallic Sack; Thucydides treats Themistocles only in awkward flashback and Herodotus is omitted for brevity (though recommended).", "isCorrect": true, "rationale": "The text identifies Livy's Book V as the great set-piece read alongside Plutarch, notes that Thucydides treats Themistocles in flashback that is awkward to excerpt, and recommends Herodotus books VII-VIII as outside-reading."}, {"text": "Polybius is used for both men.", "isCorrect": false, "rationale": "Polybius is not the Second Witness for this chapter; Livy is."}, {"text": "There is no Second Witness in this chapter because the synkrisis is lost.", "isCorrect": false, "rationale": "Livy is the Second Witness on the Roman side; the loss of the synkrisis is independent of the witness selection."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
