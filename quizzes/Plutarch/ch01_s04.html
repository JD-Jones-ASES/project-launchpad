        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; How to Read This Book</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introduction, what four-section structure does every content chapter (Chapters 2 through 11) follow?", "options": [{"text": "Preface, Greek Life, Roman Life, and Bibliography.", "isCorrect": false, "rationale": "The four sections are Background and Context, the Greek Life, the Roman Life, and the Comparison — not a preface and bibliography."}, {"text": "Background and Context, the Greek Life, the Roman Life, and the Comparison.", "isCorrect": true, "rationale": "The text states explicitly that every content chapter follows this four-section order: X.1 Background, X.2 Greek Life, X.3 Roman Life, X.4 Comparison."}, {"text": "Introduction, Synkrisis, Questions, and Answer Key.", "isCorrect": false, "rationale": "Questions and the answer key follow Section X.4, but they are not themselves the four-section structure of the chapter body."}, {"text": "Greek Life, Roman Life, Second Witness, and Footnotes.", "isCorrect": false, "rationale": "Second Witness boxes and footnotes appear inside the Greek and Roman Life sections — they are not standalone sections of the chapter structure."}], "id": "q01"}, {"question": "What is presented in the terracotta-colored (rust-orange) boxes?", "options": [{"text": "Definitions and person-box biographical sketches.", "isCorrect": false, "rationale": "Definitions and person-boxes are in aegean blue boxes, not terracotta."}, {"text": "Plutarch's surviving synkriseis.", "isCorrect": false, "rationale": "The synkriseis appear in bronze-colored boxes, not terracotta."}, {"text": "Plutarch's own words in the Dryden-Clough translation — the primary text.", "isCorrect": true, "rationale": "The text identifies terracotta boxes as 'Primary text. Plutarch's own words, in the Dryden-Clough translation.' The surrounding prose is commentary."}, {"text": "End-of-chapter questions.", "isCorrect": false, "rationale": "End-of-chapter questions appear in amber boxes, not terracotta."}], "id": "q02"}, {"question": "What color box marks the synkrisis sections — both Plutarch's surviving comparisons and the student's writing prompts?", "options": [{"text": "Sage green.", "isCorrect": false, "rationale": "Sage green is reserved for 'Second Witness' boxes — excerpts from Livy and Thucydides."}, {"text": "Bronze.", "isCorrect": true, "rationale": "The text says bronze boxes hold 'the synkrisis sections. Plutarch's surviving comparisons (in Section X.4 of most chapters) and your own writing prompts ... These are the heart of the book.'"}, {"text": "Amber.", "isCorrect": false, "rationale": "Amber boxes contain the questions at the end of each chapter, not the synkriseis."}, {"text": "Olive green.", "isCorrect": false, "rationale": "Olive green boxes contain teacher's-edition answer keys and teaching notes, not synkrisis material."}], "id": "q03"}, {"question": "What is the purpose of the 'Second Witness' boxes (the sage green boxes)?", "options": [{"text": "To give modern scholarly commentary on each Life.", "isCorrect": false, "rationale": "Modern commentary appears as the textbook's own surrounding prose, not in Second Witness boxes."}, {"text": "To present Plutarch's ethical sayings collected from the Moralia.", "isCorrect": false, "rationale": "The Moralia is not the source of the Second Witness material; the boxes pair Plutarch with other ancient historians."}, {"text": "To excerpt Livy or Thucydides on the same events Plutarch describes, so the reader can compare two ancient accounts.", "isCorrect": true, "rationale": "The text says Second Witness boxes 'let you compare two ancient accounts of one moment' — Livy in Chapters 2-5, Thucydides in Chapters 6-7."}, {"text": "To answer the student's synkrisis prompts.", "isCorrect": false, "rationale": "Second Witness boxes contain ancient texts, not answers; the synkrisis writing exercise is the student's own task."}], "id": "q04"}, {"question": "Which two ancient historians are named as the principal 'Second Witnesses' the book draws on?", "options": [{"text": "Herodotus and Tacitus.", "isCorrect": false, "rationale": "Herodotus and Tacitus are mentioned elsewhere in the book, but the Second Witness boxes specifically draw on Livy and Thucydides."}, {"text": "Livy (for early Rome) and Thucydides (for fifth-century Athens).", "isCorrect": true, "rationale": "The text names Livy as the second witness for Chapters 2-5 and Thucydides for Chapters 6 and 7. Other witnesses like Suetonius and Sallust appear only in Further Reading."}, {"text": "Suetonius and Sallust.", "isCorrect": false, "rationale": "The text relegates Suetonius and Sallust to Further Reading; they are not the principal Second Witnesses inside the book."}, {"text": "Eusebius and Arrian.", "isCorrect": false, "rationale": "Neither Eusebius nor Arrian appears in the Second Witness boxes; the book uses Livy and Thucydides for that role."}], "id": "q05"}, {"question": "According to the writing guide, what should a good student synkrisis open with?", "options": [{"text": "A summary of both Lives in two paragraphs.", "isCorrect": false, "rationale": "The text warns against retelling; the synkrisis is not a summary of the Lives. It is a comparative essay."}, {"text": "The axis of comparison — the specific question on which the two lives can be weighed.", "isCorrect": true, "rationale": "Step one of the guide says: 'Open with the axis. The axis of comparison is the specific question on which the two lives can be weighed.'"}, {"text": "A quotation from Plutarch's preface.", "isCorrect": false, "rationale": "Plutarch's preface is useful context, but the synkrisis is to open with its own axis of comparison."}, {"text": "A list of all the incidents to be cited.", "isCorrect": false, "rationale": "Incidents are adduced in the body, not enumerated as an opening list; the opening states the axis."}], "id": "q06"}, {"question": "According to the writing guide, how should the student handle specific incidents in a synkrisis?", "options": [{"text": "Quote each incident at length, in block quotation, from Plutarch's text.", "isCorrect": false, "rationale": "The text specifies 'Brief paraphrase, not block quotation.' Long quotation defeats the brevity that gives the synkrisis its power."}, {"text": "Adduce two or three specific moments from each life that bear on the axis, in brief paraphrase.", "isCorrect": true, "rationale": "The guide says 'Adduce two or three specific moments from each life that bear on the axis. Brief paraphrase, not block quotation.'"}, {"text": "Mention as many incidents as possible, to show comprehensive coverage.", "isCorrect": false, "rationale": "Two or three per life is the target; broad coverage is the opposite of synkrisis discipline."}, {"text": "Avoid naming specific incidents and stay at the level of generalization.", "isCorrect": false, "rationale": "The guide insists: 'Where you can name the moment ... name it.' Naming is exactly the point."}], "id": "q07"}, {"question": "What rule does the guide give about brevity? How long should a student synkrisis be?", "options": [{"text": "About 200-400 words — a paragraph or two.", "isCorrect": false, "rationale": "That is too short to carry an axis, incidents from both lives, and a judgment."}, {"text": "Roughly 600-1000 words — about three to four pages, double-spaced.", "isCorrect": true, "rationale": "The text says 'Your synkrisis should be 600-1000 words — about three to four pages, double-spaced. Brevity forces selection; selection sharpens judgment.'"}, {"text": "At least 2000 words to allow comprehensive treatment.", "isCorrect": false, "rationale": "The text specifically argues against length: even Plutarch's own synkriseis are typically only 4-6 pages and follow biographies of 70 pages."}, {"text": "There is no length requirement; the writing should be as long as needed.", "isCorrect": false, "rationale": "The guide gives an explicit 600-1000 word target, on the principle that compression sharpens judgment."}], "id": "q08"}, {"question": "Which of the following does the text say a student CAN skim or skip?", "options": [{"text": "The Second Witness boxes when present.", "isCorrect": false, "rationale": "The text says 'You cannot skip the Second Witness boxes' — the chapter questions and synkrisis exercise may require comparing accounts."}, {"text": "Footnotes on a first read, if you already know the term.", "isCorrect": true, "rationale": "The text says footnotes are 'vocabulary or context. If you know the term, skip; if you don't, look down. Do not let footnotes break the flow of a paragraph.'"}, {"text": "The small revealing moments — a jest, the way a man treats his mother.", "isCorrect": false, "rationale": "The text says these are exactly what you 'cannot skip'; they are where Plutarch's art lives and what the synkrisis exercises require you to notice."}, {"text": "Chapter 12 entirely.", "isCorrect": false, "rationale": "Chapter 12 can be skipped 'until last' — read last, not omitted. It traces Plutarch's reception in Shakespeare and the American Founders."}], "id": "q09"}, {"question": "What does the text explicitly say a student CANNOT skip?", "options": [{"text": "The list of further reading at the end.", "isCorrect": false, "rationale": "Further Reading is named only as the place where Suetonius and Sallust are described, not as required reading."}, {"text": "The small revealing moments — the moments when a character flashes out.", "isCorrect": true, "rationale": "The text says: 'You cannot skip the small revealing moments. Plutarch's art lives in the moment when a man's character flashes out ... they are also what the synkrisis exercises require you to notice. Read for them.'"}, {"text": "The legendary material in the earliest Lives (Theseus, Romulus, Lycurgus, Numa).", "isCorrect": false, "rationale": "The text says the legendary material CAN be skimmed — 'Read them once; do not labor over every detail.'"}, {"text": "Every footnote, on every read.", "isCorrect": false, "rationale": "Footnotes on a first read can be skipped if you already know the term; the text discourages letting footnotes break the flow."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
