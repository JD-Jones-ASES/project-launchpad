<div class="quiz-container">

        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Why does Plutarch say his synkrisis of Lycurgus and Numa is more interpretive than the comparison of the founders?", "options": [{"text": "Because the two lawgivers are not separated by personal flaws — both lived austerely and ruled justly — so the comparison must be between their philosophies of government, not their characters.", "isCorrect": true, "rationale": "Plutarch frames the question as not which man was better but which kind of city is better, which is a deeper interpretive task than weighing personal virtues."}, {"text": "Because no narrative survives for Lycurgus, so Plutarch must invent the comparison entirely.", "isCorrect": false, "rationale": "Plutarch's Life of Lycurgus is detailed; the issue is that the two lawgivers are both virtuous, not that one lacks evidence."}, {"text": "Because the founders fought wars and the lawgivers did not, so comparing their politics is simpler.", "isCorrect": false, "rationale": "The reverse — comparing the founders was easier on personal vice; comparing lawgivers requires interpretation of regimes."}, {"text": "Because the founders were Greek and Roman of similar dates while the lawgivers lived centuries apart.", "isCorrect": false, "rationale": "Lycurgus and Numa both stand at the edge of legend; the chronological gap is not the source of the interpretive difficulty."}], "id": "q01"}, {"question": "On Axis 1 (how each came to power), what does Plutarch say to give Lycurgus a narrow win?", "options": [{"text": "'It was glorious to acquire a throne by justice, yet more glorious to prefer justice before a throne.' Numa accepted a kingdom he did not desire; Lycurgus resigned one he could have had.", "isCorrect": true, "rationale": "Plutarch states the comparison in exactly this aphoristic form and awards round one narrowly to Lycurgus."}, {"text": "Because Lycurgus founded a longer-lived dynasty than Numa.", "isCorrect": false, "rationale": "Neither lawgiver founded a dynasty; both were childless rulers."}, {"text": "Because Numa accepted the throne only under threat of force from the senate.", "isCorrect": false, "rationale": "Numa was begged by ambassadors and his father, not threatened; the comparison turns on the fact that he accepted a kingship he did not want."}, {"text": "Because Lycurgus was royal and Numa a commoner.", "isCorrect": false, "rationale": "Numa came from Cures and Lycurgus was royal, but Plutarch's point is about choice rather than birth."}], "id": "q02"}, {"question": "On Axis 2 (the character of the work each had to do), why does Plutarch say Lycurgus's task was harder?", "options": [{"text": "Because asking a rich man to give up his gold is harder than asking a warrior to give up his sword. 'It was not so much his business to persuade his citizens to put off their armor or ungird their swords, as to cast away their gold or silver, and abandon costly furniture and rich tables.'", "isCorrect": true, "rationale": "On Plutarch's reading the wealthy Spartan oligarchy was harder to reform than the martial Roman people, even though both reforms are great achievements. Round two to Lycurgus."}, {"text": "Because Lycurgus had to pacify three royal houses while Numa only had to satisfy one faction.", "isCorrect": false, "rationale": "Sparta had two royal houses, not three, and the issue Plutarch raises is wealth vs. arms, not royal politics."}, {"text": "Because the Spartans had no religious tradition while Numa could draw on existing piety.", "isCorrect": false, "rationale": "Plutarch's argument concerns the difficulty of asking wealth-bearers to give up wealth, not religious tradition."}, {"text": "Because Lycurgus reformed an entire kingdom while Numa only restructured one city.", "isCorrect": false, "rationale": "Both lawgivers worked on a single city; the difficulty is in the kind of habit being changed, not territorial scope."}], "id": "q03"}, {"question": "On Axis 3 (the use of force), which lawgiver wins, and how does Plutarch put it?", "options": [{"text": "Numa wins. 'While the one effected all by persuasions and his people's love for him, the other, with danger and hazard of his person, scarcely in the end succeeded.' Numa never struck a man; Lycurgus lost an eye.", "isCorrect": true, "rationale": "Plutarch awards round three to Numa for accomplishing without force what Lycurgus could only accomplish at personal physical cost."}, {"text": "Lycurgus wins, because his willingness to be wounded showed greater commitment.", "isCorrect": false, "rationale": "Plutarch's argument is that the bloodless path is the higher one when the result can be achieved without force."}, {"text": "The round is a draw, since both used divine claims to back their laws.", "isCorrect": false, "rationale": "Plutarch draws Axis 5 (the virtue each aimed at), not Axis 3."}, {"text": "Numa wins, but only because his enemies were already weakened by plague.", "isCorrect": false, "rationale": "No plague figures in the comparison; the point is purely the contrast between persuasion and force."}], "id": "q04"}, {"question": "On Axis 4 (the humaneness of the institutions), what specific Spartan practice does Plutarch call 'cruel and iniquitous', and what counter-image does Numa provide?", "options": [{"text": "The krypteia — Sparta's annual sending out of young citizens to kill any helot they could find — is the cruelty. Numa, by contrast, 'granted even to actual slaves a license to sit at meat with their masters at the feast of Saturn' (the Saturnalia).", "isCorrect": true, "rationale": "Plutarch awards round four to Numa for the humaneness of the Saturnalia inclusion against the Spartan terror of the krypteia."}, {"text": "The agoge's mandatory enrollment of seven-year-olds is the cruelty; Numa, by contrast, founded the first Roman schools.", "isCorrect": false, "rationale": "Plutarch's specific charge is against helot-killing, not the agoge — and Numa is not credited with founding schools."}, {"text": "The execution of Vestal Virgins for unchastity is the cruelty; Numa, by contrast, ended the death penalty for women.", "isCorrect": false, "rationale": "Burial alive of unchaste Vestals is part of Numa's own institutions; the section's charge is on the Spartan side."}, {"text": "The iron money is the cruelty, because it impoverished Sparta; Numa, by contrast, allowed free trade.", "isCorrect": false, "rationale": "Plutarch admires the iron money's effect on luxury; the humaneness axis turns on the helots and the Saturnalia."}], "id": "q05"}, {"question": "On Axis 5 (the virtue each aimed at), how does Plutarch resolve the comparison, and in what generous formulation?", "options": [{"text": "Lycurgus aimed at fortitude (courage, endurance) and Numa at justice. 'Numa did not out of cowardice or fear affect peace, but because he would not be guilty of injustice; nor did Lycurgus promote a spirit of war in his people that they might do injustice to others, but that they might protect themselves by it.' Round five is properly a draw.", "isCorrect": true, "rationale": "Plutarch is at his most generous here: neither lawgiver, properly understood, was vicious; they aimed at different virtues."}, {"text": "Lycurgus aimed at glory and Numa at obedience; round five to Lycurgus.", "isCorrect": false, "rationale": "Plutarch identifies the virtues as fortitude and justice, and treats the round as a draw."}, {"text": "Lycurgus aimed at piety and Numa at power; round five to Numa.", "isCorrect": false, "rationale": "The virtues are reversed and the result is wrong; Plutarch draws this round."}, {"text": "Both aimed at wisdom; round five is undecidable.", "isCorrect": false, "rationale": "Plutarch's formulation distinguishes the virtues clearly — fortitude vs. justice — but treats the round as a draw."}], "id": "q06"}, {"question": "On Axis 6 (the treatment of women), which lawgiver wins and why?", "options": [{"text": "Numa wins. Plutarch finds Numa's arrangements 'better adapted to the female sex and to propriety' — Spartan girls' exercises and public processions struck most Greek readers as scandalous, while Numa's Roman matrons preserved modesty (wine forbidden, restrained public appearance, divorce essentially unknown for two and a half centuries).", "isCorrect": true, "rationale": "Plutarch awards round six to Numa, quoting the comic poets to drive the point home."}, {"text": "Lycurgus wins, because Spartan women had legal property rights Roman women lacked.", "isCorrect": false, "rationale": "Plutarch's verdict in the synkrisis is the opposite — he judges Numa's policy more decent."}, {"text": "Numa wins, because he abolished the practice of buried Vestals.", "isCorrect": false, "rationale": "Numa established the Vestals; Plutarch's reason for the verdict is propriety and modesty, not the abolition of any Vestal practice."}, {"text": "The round is a draw because both lawgivers preserved patrilineal inheritance.", "isCorrect": false, "rationale": "Inheritance is not the issue; the round is awarded to Numa for propriety."}], "id": "q07"}, {"question": "What is Axis 7, the decisive axis of the synkrisis, and how is it resolved?", "options": [{"text": "The endurance of the work. Lycurgus's institutions lasted more than five hundred years 'like some deep and thoroughly ingrained tincture'; Numa's peace died the day he died, 'no sooner did he expire his last breath than the gates of Janus's temple flew wide open'. The decisive axis goes to Lycurgus.", "isCorrect": true, "rationale": "Plutarch's whole verdict tips on this axis — Lycurgus did the durable thing, and the difference, Plutarch says, was education."}, {"text": "The treatment of foreigners. Lycurgus excluded all foreigners while Numa welcomed them, so the round goes to Numa.", "isCorrect": false, "rationale": "Foreigners are not the decisive axis; the durability of the constitution is."}, {"text": "The use of divine authority. Lycurgus had Delphi and Numa had Egeria, so the round is a draw.", "isCorrect": false, "rationale": "Divine authority is not the decisive axis; Plutarch raises eyebrows at both claims but does not weigh them as the hinge of his judgment."}, {"text": "Military prowess. Sparta won wars and Rome under Numa fought none, so the round goes to Lycurgus.", "isCorrect": false, "rationale": "Plutarch's hinge is endurance, not military prowess — and Lycurgus himself was not a war-maker."}], "id": "q08"}, {"question": "What does Plutarch identify as the reason Lycurgus's constitution endured and Numa's evaporated?", "options": [{"text": "Education. Lycurgus bound his constitution into the children through the agoge; Numa bound nothing into the children, and when he died there was no institutional discipline to keep the peace going. 'Numa's whole design and aim, the continuance of peace and good-will, on his death vanished with him.'", "isCorrect": true, "rationale": "Plutarch's central claim is that education is the cement of any constitution and that Numa's blind spot was the future."}, {"text": "Geography. Sparta's mountainous isolation preserved her laws; Rome's central position in Italy exposed her to constant change.", "isCorrect": false, "rationale": "Plutarch's argument is institutional and pedagogical, not geographical."}, {"text": "Race. The Dorian Spartans were naturally disciplined while the Latin-Sabines were not.", "isCorrect": false, "rationale": "Plutarch makes no such racial argument; the difference is in the design of the institutions."}, {"text": "Climate. The cold Laconian climate kept Spartans austere while the warm Italian climate softened the Romans.", "isCorrect": false, "rationale": "Climate has no role in Plutarch's analysis here."}], "id": "q09"}, {"question": "What two further observations does Plutarch slip into the end of the synkrisis?", "options": [{"text": "First, after the Romans deserted Numa's discipline their empire grew while Spartan power collapsed when they abandoned Lycurgus — raising the question whether civic peace and political greatness can be the same thing. Second, Numa, 'an alien', produced harmony 'through mere force of wisdom and justice' without arms or violence — exceedingly rare in the ancient world.", "isCorrect": true, "rationale": "These two closing notes complicate Plutarch's overall judgment by acknowledging both the Roman paradox (greatness paid for by abandoning piety) and Numa's unique pacific accomplishment."}, {"text": "First, that Lycurgus would have failed without Numa's example. Second, that Numa was actually a Spartan in disguise.", "isCorrect": false, "rationale": "Neither observation is in Plutarch; the second is invented and the first reverses the lives' chronology."}, {"text": "First, that women under Lycurgus secretly worshipped Roman goddesses. Second, that Numa's books are still in the Roman senate's archive.", "isCorrect": false, "rationale": "Neither claim is made; the books were burned in 181 BC."}, {"text": "First, that Athens combined the best of both lawgivers. Second, that Plato recommended Lycurgus in the Republic.", "isCorrect": false, "rationale": "Athens and Plato are not the closing notes Plutarch makes in the synkrisis."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
