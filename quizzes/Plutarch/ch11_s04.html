    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "On Axis 1 (personal motivation), how does Plutarch rule between Dion and Brutus?", "options": [{"text": "Decisively to Brutus — 'The chief glory of both was their hatred of tyranny, and abhorrence of wickedness. This was unmixed and sincere in Brutus.'", "isCorrect": true, "rationale": "Plutarch awards round one to Brutus on the unmixed motive: Dion had been wronged, Brutus had been pardoned and elevated."}, {"text": "Decisively to Dion — because his personal grievance grounded the deed in lived experience.", "isCorrect": false, "rationale": "Plutarch goes the opposite direction; the unmixed motive is Brutus's, and the round is his."}, {"text": "Draw — the two motivations are equivalent in moral weight.", "isCorrect": false, "rationale": "Plutarch explicitly rules for Brutus on this axis; it is not a draw."}, {"text": "Declines to rule, treating motive as unknowable.", "isCorrect": false, "rationale": "Plutarch does rule, and rules clearly for Brutus."}]}, {"question": "What is Plutarch's controversial claim about Caesar on Axis 2 (the character of the tyranny)?", "options": [{"text": "Caesar's supremacy 'had indeed the name and appearance, but fact that was cruel or tyrannical there was none' — Caesar was not actually a tyrant in substance, only in form.", "isCorrect": true, "rationale": "Plutarch's claim is that Caesar's rule had the form of tyranny without the cruelty; the killing answered a constitutional form, not current cruelty."}, {"text": "That Caesar was the cruelest tyrant in Roman history and deserved much worse.", "isCorrect": false, "rationale": "Plutarch's claim is the opposite — Caesar was not tyrannical in substance."}, {"text": "That Caesar's rule was indistinguishable from Dionysius II's.", "isCorrect": false, "rationale": "Plutarch separates the two carefully — Dionysius II 'vexed Sicily with a thousand oppressions'; Caesar's rule did not."}, {"text": "That Caesar's rule was lawful and that the conspirators were criminals.", "isCorrect": false, "rationale": "Plutarch admires the conspirators; he does not flatly condemn the killing. The point is more nuanced — Caesar was not cruel in fact."}]}, {"question": "Who wins Axis 2 (character of the tyranny) and why?", "options": [{"text": "Dion — Dionysius II was 'a tyrant' who 'vexed Sicily with a thousand oppressions'; Caesar after victory was not cruel or tyrannical in fact.", "isCorrect": true, "rationale": "Dion's target was the substantively worse man; the round goes to Dion."}, {"text": "Brutus — because Caesar's lifetime dictatorship was the worse legal offense.", "isCorrect": false, "rationale": "Plutarch awards this round to Dion on the substantive cruelty of Dionysius II, not the constitutional form of Caesar's title."}, {"text": "Draw — both tyrants were equally cruel.", "isCorrect": false, "rationale": "Plutarch makes them unequal — Dionysius II was the worse oppressor."}, {"text": "Plutarch refuses to compare the two regimes.", "isCorrect": false, "rationale": "Plutarch does compare them and rules for Dion on Axis 2."}]}, {"question": "On Axis 3 (resources for the project), how does Plutarch rule?", "options": [{"text": "To Dion — he 'provided not only arms, ships, and soldiers, but likewise friends and partners for the enterprise,' laid out of his own substance; Brutus took up arms partly to save himself.", "isCorrect": true, "rationale": "Dion's project was a deeper personal commitment; the round goes to him."}, {"text": "To Brutus — Cassius supplied most of the resources.", "isCorrect": false, "rationale": "The point is that Brutus and Cassius were under sentence of death and took up arms partly for self-preservation; Dion's expedition was self-funded conviction."}, {"text": "Draw — both projects were equally resourced.", "isCorrect": false, "rationale": "Plutarch differentiates them; Dion's personal commitment was greater."}, {"text": "Plutarch does not consider resources as an axis.", "isCorrect": false, "rationale": "Axis 3 is explicitly about the resources for the project."}]}, {"question": "What does Plutarch say about Brutus's conduct at the final battle (Axis 4)?", "options": [{"text": "He showed 'little wisdom in engaging in the final battle' and 'when he failed, not to have done his business in seeking a remedy; he gave all up.' Round 4 to Dion.", "isCorrect": true, "rationale": "Dion is the more capable commander on Plutarch's reading; Brutus's strategic decision at Philippi was a clear error."}, {"text": "He chose the field with masterful judgment and lost only to numerical superiority.", "isCorrect": false, "rationale": "Plutarch's reading is critical of Brutus's choice; Cicero had urged a longer strategy."}, {"text": "He never engaged at the final battle, withdrawing strategically.", "isCorrect": false, "rationale": "Brutus did engage at the second Philippi and lost decisively."}, {"text": "He won the battle but lost the political peace.", "isCorrect": false, "rationale": "He lost both the second battle and the political peace; the round goes to Dion."}]}, {"question": "Who wins Axis 5 (the choice of allies), and what supplies the contrast?", "options": [{"text": "Brutus — Dion 'trusted himself with ill men' (Callippus killed him); Brutus's conspiracy included 'a great many men, not one of whom deceived him.'", "isCorrect": true, "rationale": "The conspiracy held together; Brutus chose his partners more wisely. The round goes to Brutus."}, {"text": "Dion — Callippus had been loyal at the start, so the trust was justified.", "isCorrect": false, "rationale": "Plato's Seventh Letter and Plutarch agree that Dion trusted bad men; Brutus chose better."}, {"text": "Draw — both projects suffered betrayal at critical moments.", "isCorrect": false, "rationale": "Brutus's conspirators did not betray him; the contrast is real."}, {"text": "Plutarch refuses to compare the choices.", "isCorrect": false, "rationale": "Plutarch makes this contrast explicit; the round is decided."}]}, {"question": "What incident on Axis 6 (the aftermath) does Plutarch close with?", "options": [{"text": "Caesar Augustus, encountering Brutus's bronze statue in Cisalpine Gaul, stopped before it and praised the Gauls for not having moved it; Dion, when killed, had no avenger.", "isCorrect": true, "rationale": "Plutarch ends the synkrisis with the Augustus-statue incident; Brutus had a longer afterlife. The round goes to Brutus."}, {"text": "Augustus's destruction of Brutus's image throughout Italy.", "isCorrect": false, "rationale": "Augustus preserved Brutus's statue rather than destroying it — the point of the incident."}, {"text": "Dion's elevation to divine status by the Syracusan assembly.", "isCorrect": false, "rationale": "Dion had no such elevation; he had no avenger and no afterlife of public honor."}, {"text": "The decree of the Roman Senate condemning all conspirators posthumously.", "isCorrect": false, "rationale": "Plutarch closes with Augustus's quiet acknowledgment, not with a senatorial condemnation."}]}, {"question": "What is Plutarch's overall judgment between the two men?", "options": [{"text": "The two men are not separated by a clear single verdict — Dion excels on some axes (commander, generosity, commitment), Brutus on others (motive, allies, afterlife).", "isCorrect": true, "rationale": "Plutarch refuses a single verdict; this is the synkrisis's characteristic refusal of sentimentality."}, {"text": "Brutus wins overwhelmingly on every axis.", "isCorrect": false, "rationale": "Brutus wins some rounds, but Dion wins others; the verdict is mixed."}, {"text": "Dion wins overwhelmingly on every axis.", "isCorrect": false, "rationale": "Dion wins some rounds, but Brutus wins others; the verdict is mixed."}, {"text": "Plutarch ranks neither and forbids the reader to attempt the question.", "isCorrect": false, "rationale": "Plutarch invites the reader to attempt the question — but offers no clean single verdict himself."}]}, {"question": "What deeper question does Plutarch raise about the act of tyrannicide itself?", "options": [{"text": "Whether tyrannicide can be morally justified but politically futile — Caesar's death did not restore the Republic, and the Romans 'instantly regretted Caesar.'", "isCorrect": true, "rationale": "The gap between moral case and political outcome is the chapter's hardest question; Plutarch leaves it to the reader."}, {"text": "Whether tyrannicide requires divine sanction before it can be undertaken.", "isCorrect": false, "rationale": "Plutarch's question is moral and political, not theological in that direct sense."}, {"text": "Whether tyrannicide is permissible only in kingdoms, not republics.", "isCorrect": false, "rationale": "Plutarch's category distinction is not between kingdoms and republics; both his cases involve sovereigns who had betrayed an office."}, {"text": "Whether a tyrant's family may be killed alongside him.", "isCorrect": false, "rationale": "Plutarch's question is about the principal act, not collateral killings."}]}, {"question": "What is the writing prompt that closes Chapter 11, and what is its place in the book?", "options": [{"text": "Write a synkrisis of Dion and Brutus, 600–1,000 words, choose one axis, cite two specific incidents from each Life, render judgment — the tenth and last synkrisis exercise of the book, to be placed beside the Theseus–Romulus essay from Chapter 2.", "isCorrect": true, "rationale": "The chapter closes with this exercise as the curricular point of the entire spine, contrasting it with the Chapter 2 first attempt."}, {"text": "Memorize Plutarch's epigrams from this synkrisis and recite them in class.", "isCorrect": false, "rationale": "The exercise is the composition of a synkrisis, not memorization."}, {"text": "Translate the full Greek of Plutarch's synkrisis into idiomatic English.", "isCorrect": false, "rationale": "The exercise is original composition in the synkrisis form, not translation."}, {"text": "Argue that Brutus was the noblest Roman, citing Shakespeare for support.", "isCorrect": false, "rationale": "The exercise is an open synkrisis with multiple axes available; it is not a partisan brief for Brutus."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
