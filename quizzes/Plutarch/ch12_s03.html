        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Plutarch and the Christian Moral Tradition</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was Plutarch's actual religious identity?", "options": [{"text": "A converted Christian who never advertised it", "isCorrect": false, "rationale": "The chapter notes Plutarch almost certainly never read a Christian text and possibly never met a Christian."}, {"text": "A pagan priest of Apollo at Delphi", "isCorrect": true, "rationale": "Plutarch died around 120 AD; he was a Greek priest of Apollo at Delphi, and his religion was the Olympian polytheism of educated late-antique paganism."}, {"text": "A Stoic philosopher with no priestly duties", "isCorrect": false, "rationale": "Plutarch was a priest of Apollo at Delphi; Stoicism is not the named identity."}, {"text": "A Roman augur", "isCorrect": false, "rationale": "Plutarch was Greek and served Apollo at Delphi, not as a Roman augur."}], "id": "q01"}, {"question": "Who wrote the Life of Constantine, identified as the first sustained Christian biography of an emperor and a Plutarchan biography in form?", "options": [{"text": "Augustine of Hippo", "isCorrect": false, "rationale": "Augustine wrote the City of God and the Confessions, not the Life of Constantine."}, {"text": "Eusebius of Caesarea (c. 263-339)", "isCorrect": true, "rationale": "Eusebius wrote the Life of Constantine. He had read Plutarch carefully and consciously imitates the form: moral focus on character, attention to revealing small acts, willing weighing of virtues and vices."}, {"text": "Jerome", "isCorrect": false, "rationale": "Jerome translated the Bible into Latin but is not the named biographer of Constantine."}, {"text": "Origen", "isCorrect": false, "rationale": "Origen was a major Christian theologian but did not write the Life of Constantine."}], "id": "q02"}, {"question": "What is the meaning of Eusebius's most consequential concept, the praeparatio evangelica?", "options": [{"text": "A liturgy preparing communicants for the Gospel reading", "isCorrect": false, "rationale": "The phrase is not a liturgical term but a theological framework."}, {"text": "\"Preparation for the Gospel\" — pagan philosophers and moralists were preparing the ancient world for the fuller revelation in Christ", "isCorrect": true, "rationale": "The idea is that Plato, Aristotle, the Stoics, Plutarch were not outside the divine economy; their insights into virtue, justice, and the soul were partial truths that Christian revelation would complete."}, {"text": "A monastic rule for preparing Greek texts for transcription", "isCorrect": false, "rationale": "The praeparatio evangelica is not a monastic rule."}, {"text": "An early creed of the Council of Nicaea", "isCorrect": false, "rationale": "The phrase is not a creedal formula."}], "id": "q03"}, {"question": "Why was direct access to Plutarch lost in the early medieval Latin West?", "options": [{"text": "His works were condemned as heretical", "isCorrect": false, "rationale": "Plutarch's works were not condemned; the chapter notes the medieval tradition continued to read him indirectly."}, {"text": "Greek was rarely read west of Italy between roughly 600 and 1300 AD", "isCorrect": true, "rationale": "Direct access was lost because Greek was rarely read in the Latin West during those centuries. The Plutarchan habit was preserved indirectly through Cicero, Boethius, and saints' lives."}, {"text": "The manuscripts were physically destroyed", "isCorrect": false, "rationale": "Manuscripts survived in the Greek East; the issue was linguistic access in the Latin West."}, {"text": "Plutarch was placed on the medieval Index", "isCorrect": false, "rationale": "There was no medieval Index banning Plutarch."}], "id": "q04"}, {"question": "Which three medieval channels preserved the Plutarchan habit indirectly when Greek was unread?", "options": [{"text": "The Talmud, the Quran, and the Vedas", "isCorrect": false, "rationale": "These are not the channels named for medieval Latin transmission."}, {"text": "Cicero, Boethius, and the lives of the saints", "isCorrect": true, "rationale": "Cicero absorbed Greek philosophical biography; Boethius's Consolation echoes Plutarchan moralism; the lives of the saints adapted ancient biographical form to Christian subject matter."}, {"text": "Aristotle, Pliny, and the Latin Vulgate", "isCorrect": false, "rationale": "Aristotle returned through Arabic transmission; the Vulgate is the Bible. The trio named is Cicero, Boethius, and saints' lives."}, {"text": "Tacitus, Suetonius, and Augustine", "isCorrect": false, "rationale": "Tacitus and Suetonius are Latin historians; Augustine is a Father. The chapter names a different trio."}], "id": "q05"}, {"question": "Who is described as the Italian humanist who \"almost single-handedly invented the Renaissance project of recovering ancient texts\" and read what Plutarch he could find?", "options": [{"text": "Dante Alighieri", "isCorrect": false, "rationale": "Dante is the great medieval Italian poet but is not the figure named for the Renaissance recovery."}, {"text": "Petrarch", "isCorrect": true, "rationale": "Petrarch almost single-handedly invented the Renaissance project of recovering ancient texts and read what Plutarch he could find. The Lives were available in Greek manuscripts by the late fifteenth century, printed by 1517."}, {"text": "Boccaccio", "isCorrect": false, "rationale": "Boccaccio was a humanist contemporary of Petrarch but is not the figure named here."}, {"text": "Lorenzo Valla", "isCorrect": false, "rationale": "Valla was an important humanist philologist but is not the named figure for the text recovery."}], "id": "q06"}, {"question": "Which Dutch humanist incorporated Plutarch into the new Christian humanist curriculum, drawing his Apophthegmata heavily on Plutarch's Sayings of Kings and Commanders?", "options": [{"text": "Hugo Grotius", "isCorrect": false, "rationale": "Grotius was a later Dutch jurist; not the figure named for this work."}, {"text": "Desiderius Erasmus (1466-1536)", "isCorrect": true, "rationale": "Erasmus read Plutarch constantly and incorporated him into the new Christian humanist curriculum. His Apophthegmata drew heavily on Plutarch's Sayings of Kings and Commanders, a work in the Moralia."}, {"text": "Spinoza", "isCorrect": false, "rationale": "Spinoza was a seventeenth-century philosopher; not the figure named."}, {"text": "Christiaan Huygens", "isCorrect": false, "rationale": "Huygens was a Dutch scientist; not the figure named."}], "id": "q07"}, {"question": "Whom does the chapter describe as making Plutarch and Stoic Seneca the \"two pillars\" of his writing, quoting Plutarch on nearly every page?", "options": [{"text": "Blaise Pascal", "isCorrect": false, "rationale": "Pascal quoted Montaigne but is not the figure described as building on Plutarch and Seneca."}, {"text": "Michel de Montaigne (1533-1592)", "isCorrect": true, "rationale": "Montaigne, the French essayist, makes Plutarch one of the two pillars of his writing (with Seneca). Several essays (\"Of Cato the Younger,\" \"Of Glory\") are extended meditations on Plutarchan themes."}, {"text": "La Rochefoucauld", "isCorrect": false, "rationale": "La Rochefoucauld was a French moralist of maxims but is not the figure named here."}, {"text": "Rabelais", "isCorrect": false, "rationale": "Rabelais quoted Plutarch but is not the figure described as building his work on him."}], "id": "q08"}, {"question": "Which 1791 biography is identified as \"the closest modern English equivalent of a Plutarchan biography\"?", "options": [{"text": "Newman's Lives of the English Saints", "isCorrect": false, "rationale": "Newman's Lives appeared in 1844-45 and brought Plutarchan attention to medieval English saints; it is not the 1791 work."}, {"text": "Boswell's Life of Samuel Johnson (1791)", "isCorrect": true, "rationale": "Boswell's Life of Johnson is the closest modern English equivalent of a Plutarchan biography: attentive to the small revealing detail, organized around character, sustained over many years of intimate observation."}, {"text": "Metaxas's Bonhoeffer", "isCorrect": false, "rationale": "Metaxas's biography appeared in 2010, not 1791."}, {"text": "Carlyle's Heroes and Hero-Worship", "isCorrect": false, "rationale": "Carlyle's lectures are not the named work."}], "id": "q09"}, {"question": "What is the chapter's final claim about why Christians have read Plutarch for two thousand years?", "options": [{"text": "Because Plutarch's pagan polytheism conveniently aligned with the Trinity", "isCorrect": false, "rationale": "Plutarch's polytheism is not aligned with Trinitarian doctrine; that is not the chapter's claim."}, {"text": "Because Plutarch was actually a closet Christian", "isCorrect": false, "rationale": "Plutarch was a pagan priest of Apollo; the chapter is explicit about this."}, {"text": "Not anything peculiar to Christianity, but because the close moral attention Plutarch practiced is what the human soul wants", "isCorrect": true, "rationale": "The deeper reason is something about the human soul. Whether you read Plutarch with Christian doctrine in mind or simply with human curiosity, he teaches you to look more carefully at the people around you."}, {"text": "Because Plutarch's biographies provide proof texts for Christian doctrine", "isCorrect": false, "rationale": "The chapter explicitly denies that Plutarch's appeal is doctrinal — it is about close moral attention."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
