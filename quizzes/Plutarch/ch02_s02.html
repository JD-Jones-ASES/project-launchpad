        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Theseus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Who was Theseus's father, and how was his conception arranged?", "options": [{"text": "Aegeus, king of Athens, who slept with Aethra at the arrangement of her father Pittheus after consulting the oracle at Delphi.", "isCorrect": true, "rationale": "Aegeus consulted Delphi about his childlessness, received a gnomic answer, stopped at Troezen, and was arranged by Pittheus to sleep with Aethra — who then conceived Theseus."}, {"text": "Minos, king of Crete, who fathered him before his marriage to Pasiphae.", "isCorrect": false, "rationale": "Minos is the Cretan king whose Minotaur Theseus later kills — not his father."}, {"text": "Lycomedes, king of Skyros.", "isCorrect": false, "rationale": "Lycomedes is the king who eventually kills Theseus by pushing him off a cliff."}, {"text": "Menestheus the demagogue.", "isCorrect": false, "rationale": "Menestheus is the political rival who later stirs up resentment against Theseus in Athens."}], "id": "q01"}, {"question": "What were the tokens Aegeus hid under a stone outside Troezen, and what was Theseus expected to do with them?", "options": [{"text": "A sword and sandals; Theseus was to bring them to Athens once he was strong enough to lift the stone, as proof of his identity.", "isCorrect": true, "rationale": "Aegeus hid a sword and a pair of sandals under a massive stone and told Aethra to send her son with them once he could lift it."}, {"text": "A scepter and crown, to be claimed publicly at the next Athenian festival.", "isCorrect": false, "rationale": "No scepter or crown is part of this tradition; the tokens are deliberately modest and personal."}, {"text": "A map of Attica and a letter of introduction.", "isCorrect": false, "rationale": "There is no map or letter in the tradition; Aegeus communicates by hidden tokens, not by writing."}, {"text": "A bow and quiver, the symbols of royal Athenian hunters.", "isCorrect": false, "rationale": "Not part of Plutarch's account; the tokens are a sword and sandals."}], "id": "q02"}, {"question": "Theseus could have traveled to Athens safely by sea. Why did he choose the dangerous overland route?", "options": [{"text": "He sought the road in order to confront and kill the bandits who had been preying on travelers.", "isCorrect": true, "rationale": "Theseus chose the overland route to challenge famous bandits — Sciron, Sinis, Procrustes, Periphetes — and freed the roads by killing each one by his own method. By the time he reached Athens he was already famous."}, {"text": "He was afraid of seafaring.", "isCorrect": false, "rationale": "Nothing in Plutarch suggests fear; the choice is presented as bold, not anxious."}, {"text": "He could not afford passage by ship.", "isCorrect": false, "rationale": "Theseus is the grandson of a king; passage is not the issue. The motive is glory and the clearing of the road."}, {"text": "He needed to deliver tribute to towns along the way.", "isCorrect": false, "rationale": "No such tribute mission is recorded; Theseus is traveling toward a tribute (Minos's) he will later confront, not bringing one."}], "id": "q03"}, {"question": "Read this passage carefully: \"He summoned the inhabitants of all the country to assemble together… to the more powerful he promised a state without monarchy, a democracy, or people's government, in which he should only be continued as their commander in war, and the protector of their laws… and by way of example, voluntarily laid down his regal power.\" What does this passage most clearly establish about Theseus's political founding?", "options": [{"text": "That Theseus founded Athens as a generous, voluntary republic — surrendering royal power, persuading rather than compelling, and opening the city to strangers.", "isCorrect": true, "rationale": "Plutarch's portrait of the synoecism emphasizes persuasion (\"exhorted them\"), voluntary surrender of monarchy (\"voluntarily laid down his regal power\"), and inclusion of strangers — a generous founding."}, {"text": "That Theseus established a hereditary monarchy with himself as absolute king.", "isCorrect": false, "rationale": "Plutarch says the opposite: Theseus voluntarily laid down regal power and accepted only a wartime command and the role of protector of the laws."}, {"text": "That Theseus expelled the powerful nobles and admitted only farmers.", "isCorrect": false, "rationale": "Plutarch records that Theseus promised the powerful a stake in the new order; the founding was inclusive, not partisan."}, {"text": "That Theseus built Athens by military conquest of neighboring villages.", "isCorrect": false, "rationale": "Plutarch explicitly says Theseus did this without war, by persuasion."}], "id": "q04"}, {"question": "Procrustes was one of the bandits Theseus killed on the road to Athens. How did Procrustes treat his victims?", "options": [{"text": "He fitted them to the same bed by stretching the short ones and chopping the limbs off the tall ones.", "isCorrect": true, "rationale": "Plutarch records Procrustes's distinctive cruelty: he stretched short travelers and amputated tall ones to fit a single bed."}, {"text": "He challenged them to a wrestling match and threw them off a cliff.", "isCorrect": false, "rationale": "This is closer to Sciron's method, not Procrustes's."}, {"text": "He buried them alive in the sand.", "isCorrect": false, "rationale": "Not the method Plutarch records for Procrustes."}, {"text": "He tied them between two pine trees that he had bent down.", "isCorrect": false, "rationale": "This is closer to the method of Sinis, the \"pine-bender,\" not Procrustes."}], "id": "q05"}, {"question": "Which sequence correctly traces Theseus's Cretan adventure from beginning to end?", "options": [{"text": "He volunteers to go to Crete as part of the tribute, kills the Minotaur with Ariadne's help, abandons Ariadne, and forgets to change his sail from black to white — causing Aegeus to throw himself into the sea.", "isCorrect": true, "rationale": "Plutarch records Theseus's voluntary inclusion in the tribute, his killing of the Minotaur with Ariadne's help in the Labyrinth, his abandonment of Ariadne, and his fatal forgetting of the sail color that led Aegeus to throw himself off a cliff."}, {"text": "He is dragged unwillingly to Crete, refuses to kill the Minotaur, and is later rescued by Aegeus.", "isCorrect": false, "rationale": "Theseus went voluntarily and did kill the Minotaur; Aegeus died grieving, not rescuing."}, {"text": "He kills Minos in single combat and marries Ariadne in Athens.", "isCorrect": false, "rationale": "Theseus does not kill Minos, and he abandons Ariadne rather than marrying her in Athens."}, {"text": "He sails to Crete with Aegeus, kills the Minotaur jointly with him, and returns triumphant.", "isCorrect": false, "rationale": "Aegeus stays in Athens watching for the sail; he does not travel to Crete."}], "id": "q06"}, {"question": "What does \"the synoecism of Attica\" refer to, and why does Plutarch present it as Theseus's exemplary political act?", "options": [{"text": "The unification of scattered Attic villages into the single polis of Athens, achieved by argument and political skill rather than war — and accompanied by Theseus's voluntary surrender of royal power.", "isCorrect": true, "rationale": "Plutarch praises the synoecism precisely because it was peaceful, persuasive, and generous: Theseus persuaded, did not conquer, and laid down regal power as an example."}, {"text": "Theseus's killing of the Minotaur, which freed Athens from foreign tribute.", "isCorrect": false, "rationale": "The Minotaur episode is a foreign exploit, not a domestic political act; the synoecism is a separate achievement."}, {"text": "Theseus's war with the Amazons, which absorbed them into Attic society.", "isCorrect": false, "rationale": "The Amazonomachy is an exploit, not the founding of the polis."}, {"text": "His descent into the underworld with Pirithous.", "isCorrect": false, "rationale": "This is a separate mythological adventure, not the synoecism."}], "id": "q07"}, {"question": "How does Theseus die in Plutarch's account, and what happens to his bones centuries later?", "options": [{"text": "He is exiled, retires to the island of Skyros, and is pushed off a cliff by King Lycomedes. Centuries later, Cimon recovers the bones and brings them home to Athens for a public shrine.", "isCorrect": true, "rationale": "Plutarch's account: Theseus, weakened politically by the demagogue Menestheus, retires to Skyros where Lycomedes kills him. After the Persian Wars, Cimon recovers his bones and entombs them in Athens."}, {"text": "He dies of old age in Athens during the reign of his son Hippolytus.", "isCorrect": false, "rationale": "Hippolytus dies young by Phaedra's machinations; Theseus dies in exile, not in Athens."}, {"text": "He is killed in battle by the Amazons during their invasion of Attica.", "isCorrect": false, "rationale": "He survives the Amazon war; his death comes years later, on Skyros."}, {"text": "He vanishes in a thunderstorm and is transformed into a god.", "isCorrect": false, "rationale": "That is Romulus's traditional death, not Theseus's."}], "id": "q08"}, {"question": "Plutarch's portrait of Theseus's character is mixed — he praises some traits and faults others. Which combination most accurately captures Plutarch's verdict?", "options": [{"text": "Generous, brave, restless, and impulsive — exemplary in political founding, troubled in his personal life and rash with women.", "isCorrect": true, "rationale": "Plutarch describes Theseus as generous and energetic in founding, but reckless in his domestic life — and openly faulted in the synkrisis for his treatment of women."}, {"text": "Reserved, cautious, and politically conservative — a model of careful governance.", "isCorrect": false, "rationale": "These traits oppose what Plutarch records; Theseus is restless and impulsive, not reserved."}, {"text": "Cruel and bloodthirsty — a tyrant whose city eventually deposed him.", "isCorrect": false, "rationale": "Plutarch records political rejection and exile but does not call him a tyrant; the founding is praised."}, {"text": "Coldly rational and indifferent to honor.", "isCorrect": false, "rationale": "Theseus is rash and honor-driven, not coldly rational."}], "id": "q09"}, {"question": "Plutarch records that the Athenians of Theseus's own day eventually grew weary of him and that a demagogue named Menestheus stirred up resentment, driving Theseus into exile. What does this detail reveal about Plutarch's portrait of the city's relation to its founder?", "options": [{"text": "The Athenians never celebrated Theseus.", "isCorrect": false, "rationale": "Plutarch records ongoing Athenian festivals for Theseus and the centuries-later restoration of his memory."}, {"text": "The Athenian self-portrait is not simple: even the founder was, in his own city, eventually rejected — and only centuries later was his memory rehabilitated.", "isCorrect": true, "rationale": "Plutarch deliberately includes both the rejection and the later restoration, showing the city's complicated relationship with its founding figure."}, {"text": "Theseus was a fictional figure invented by Menestheus.", "isCorrect": false, "rationale": "Plutarch makes no such claim; Menestheus is presented as a later political opponent within the tradition."}, {"text": "The Athenians intended to bury Theseus at sea.", "isCorrect": false, "rationale": "Theseus was buried on Skyros until Cimon brought his bones home to Athens centuries later."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
