<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Brutus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What single biographical fact about Brutus's father was a permanent burden on him?", "options": [{"text": "His father, also Marcus Brutus, had been killed by Pompey in 77 BC — a fact Brutus never forgot.", "isCorrect": true, "rationale": "Plutarch presents the killing as the founding political grievance of Brutus's life; it shapes his impossible choice in the 49 BC civil war."}, {"text": "His father had been Caesar's commander in Gaul.", "isCorrect": false, "rationale": "The father had no command under Caesar; he was killed by Pompey decades before the Caesarian wars."}, {"text": "His father had been a Stoic philosopher who taught Cato.", "isCorrect": false, "rationale": "Cato was Brutus's uncle and teacher, not his father's pupil."}, {"text": "His father had been a slave manumitted by Sulla.", "isCorrect": false, "rationale": "The father was a Roman aristocrat killed in the civil disturbances of the 70s BC."}]}, {"question": "What was the role of the bronze statue of the first Brutus in the Brutus family home?", "options": [{"text": "It was kept in the family home; Brutus lived under it; the image and the name were the moral framework of his political career.", "isCorrect": true, "rationale": "Plutarch explicitly makes the statue and the inherited name the moral framework of Marcus Brutus's political life."}, {"text": "It was sold by Brutus's father to pay civil war debts.", "isCorrect": false, "rationale": "The statue remained in the family and shaped Brutus's identity throughout his life."}, {"text": "It was a votive offering at the Temple of Concord, not a private object.", "isCorrect": false, "rationale": "The statue was a family object kept in the home, not a public votive."}, {"text": "It depicted the second Brutus, not the first.", "isCorrect": false, "rationale": "It depicted the Lucius Junius Brutus of Chapter 4 — the founder of the Republic."}]}, {"question": "What was the philosophical-political character of Brutus's education?", "options": [{"text": "Stoic and Academic — the combination of moral rigor and philosophical breadth that defined late-republican intellectual life; studied under his uncle Cato the Younger.", "isCorrect": true, "rationale": "Plutarch specifies the dual Stoic-Academic formation and the tutorship under Cato, the great Stoic moralist of the late Republic."}, {"text": "Epicurean — under the tutorship of the Roman Epicurean poet Lucretius.", "isCorrect": false, "rationale": "Brutus's formation was Stoic and Academic, not Epicurean."}, {"text": "Pythagorean — under Greek tutors hired by his mother.", "isCorrect": false, "rationale": "Pythagoreanism is not flagged in Brutus's education; his framework was Stoic-Academic."}, {"text": "Strictly rhetorical, with no philosophical content.", "isCorrect": false, "rationale": "Brutus's intellectual seriousness was philosophical, not merely rhetorical — even his opponents acknowledged it."}]}, {"question": "What complication does Cicero's correspondence reveal about Brutus's character?", "options": [{"text": "He was honest in his provincial administration but pressed unreasonable interest rates on Cypriot debtors — morally serious in public posture, financially hard in private dealings.", "isCorrect": true, "rationale": "Plutarch (via Cicero's complaints) records the Cypriot loans as the moral complication of Brutus's record."}, {"text": "He took bribes openly throughout his governorship of Cisalpine Gaul.", "isCorrect": false, "rationale": "Brutus was honest in provincial administration; the moral complication is narrower — the interest rates on Cypriot loans."}, {"text": "He fled his quaestorship to avoid prosecution.", "isCorrect": false, "rationale": "He held the usual magistracies and was not prosecuted."}, {"text": "He defended his father's killer Pompey out of political opportunism.", "isCorrect": false, "rationale": "Plutarch presents Brutus's eventual choice of Pompey as principled — not opportunistic — and Pompey had killed his father."}]}, {"question": "Why was Brutus's choice between Pompey and Caesar in 49 BC genuinely impossible?", "options": [{"text": "Pompey had killed his father; Caesar was his mother's lover and possibly his own biological father — yet he chose Pompey on political grounds as defender of the senatorial order.", "isCorrect": true, "rationale": "Plutarch is explicit about the personal pull of both sides and the political calculation that overrode it."}, {"text": "Both Pompey and Caesar offered him the same senior command.", "isCorrect": false, "rationale": "The choice was about loyalty and political principle, not about competing offices."}, {"text": "He was bound by oath to neutrality and could not act either way.", "isCorrect": false, "rationale": "No such oath is recorded; Brutus made an active choice for Pompey."}, {"text": "He had no personal connection to either man.", "isCorrect": false, "rationale": "The opposite — he had deep personal connections to both, which made the choice excruciating."}]}, {"question": "What did Caesar do for Brutus after Pharsalus in 48 BC?", "options": [{"text": "Pardoned him, praetorized him, gave him provincial commands, and promised him the consulship for 44 BC.", "isCorrect": true, "rationale": "Plutarch lists these specific signs of Caesar's friendship; Brutus accepted them while remaining a Stoic republican."}, {"text": "Stripped him of citizenship and confiscated his property.", "isCorrect": false, "rationale": "The opposite — Caesar treated Brutus with marked friendship after the defeat of Pompey."}, {"text": "Demanded his suicide as a condition of peace.", "isCorrect": false, "rationale": "No such demand was made; Caesar pardoned him."}, {"text": "Exiled him to Cisalpine Gaul indefinitely.", "isCorrect": false, "rationale": "Brutus did serve as governor of Cisalpine Gaul, but as an honor and promotion, not as exile."}]}, {"question": "Where, when, and at whose feet did Caesar fall, in Plutarch's reconstruction of the assassination?", "options": [{"text": "In the Theater of Pompey on the Ides of March (15 March 44 BC); when he saw Brutus's drawn sword he pulled his gown over his head and fell at the foot of the statue of Pompey.", "isCorrect": true, "rationale": "Plutarch gives all three details precisely; the foot of Pompey's statue is the dramatic image he composes."}, {"text": "In the Roman Forum during a public address in mid-April 44 BC.", "isCorrect": false, "rationale": "The location was the Theater of Pompey (where the Senate met that day), and the date was 15 March, not April."}, {"text": "On the steps of the Temple of Jupiter on the Capitoline.", "isCorrect": false, "rationale": "The killing was not at Jupiter's temple; the conspirators fled there afterward."}, {"text": "In Caesar's own home, at a private dinner.", "isCorrect": false, "rationale": "The killing was public, at a Senate session, not at a private dinner."}]}, {"question": "What is the Greek line Plutarch attributes to Caesar in the Life of Caesar, and how does it relate to Shakespeare's famous Latin?", "options": [{"text": "'kai su, teknon?' — 'You too, my child?' Shakespeare's 'Et tu, Brute?' is the dramatic Latin version of this Greek line.", "isCorrect": true, "rationale": "Plutarch records the Greek; Shakespeare turned it into Latin and English-stage drama through North's translation."}, {"text": "'Memento mori' — Latin for 'Remember you must die.'", "isCorrect": false, "rationale": "That is a later Latin maxim, not Caesar's reported dying words in Plutarch."}, {"text": "'Veni vidi vici' — 'I came, I saw, I conquered.'", "isCorrect": false, "rationale": "That was Caesar's earlier boast after the campaign against Pharnaces, not a dying word."}, {"text": "'Alea iacta est' — 'The die is cast.'", "isCorrect": false, "rationale": "That was Caesar's line at the Rubicon, in 49 BC, not at his death."}]}, {"question": "What turned the Roman people decisively against the conspirators after the killing?", "options": [{"text": "Antony's funeral oration the next day; the Senate had already fled, and the people drove the conspirators from the city.", "isCorrect": true, "rationale": "Plutarch identifies Antony's funeral oration as the decisive instrument of public reversal."}, {"text": "Brutus's own speech defending the killing in the Senate.", "isCorrect": false, "rationale": "Brutus's defense did not save the conspirators; Antony's oration was the turning point."}, {"text": "A miracle reported at Caesar's funeral pyre.", "isCorrect": false, "rationale": "Plutarch does not assign the political reversal to a miracle but to Antony's rhetoric."}, {"text": "A military proclamation by Octavian from the East.", "isCorrect": false, "rationale": "Octavian's role developed afterward; the immediate reversal was domestic and rhetorical."}]}, {"question": "How did Brutus die at the end of the second battle of Philippi?", "options": [{"text": "He withdrew to a secluded spot, asked Strato to hold his sword, and fell on it with both hands; he was forty-three.", "isCorrect": true, "rationale": "Plutarch's set-piece account names Strato specifically and gives the precise manner of the death."}, {"text": "He was killed in the rout by Octavian's cavalry.", "isCorrect": false, "rationale": "Brutus killed himself; he was not run down in the rout."}, {"text": "He drank poison provided by Cassius's slave.", "isCorrect": false, "rationale": "He fell on his sword, with Strato holding it, not by poison; Cassius had died after the first battle."}, {"text": "He surrendered and was executed publicly in Rome.", "isCorrect": false, "rationale": "He did not surrender; he chose suicide in the hills after the second battle."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
