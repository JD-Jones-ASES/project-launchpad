    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Joint Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is structurally distinctive about Plutarch's synkrisis of the four reformers?", "options": [{"text": "It is the only synkrisis Plutarch wrote in dialogue form.", "isCorrect": false, "rationale": "No dialogue form is used; the distinctive feature is the number of Lives being compared, not the genre."}, {"text": "It is the only joint comparison in the Lives, weighing four men in a single synkrisis.", "isCorrect": true, "rationale": "The text opens by identifying the four-way synkrisis as the only one of its kind across the whole work."}, {"text": "It is the only synkrisis that ranks the Greek pair above the Roman pair on every axis.", "isCorrect": false, "rationale": "Plutarch's verdict is mixed across axes; no single side wins on every count."}, {"text": "It is the only synkrisis that refuses to render a verdict.", "isCorrect": false, "rationale": "The opposite — this synkrisis renders an unusually specific four-way ranking."}], "id": "q01"}, {"question": "On Axis 1, natural endowment and education, why does Plutarch find the Spartan achievement slightly more impressive?", "options": [{"text": "Because the Spartans had access to better tutors than the Gracchi did.", "isCorrect": false, "rationale": "The Romans had “a generous education” — the Spartans excelled despite worse circumstances, not better."}, {"text": "Because the Spartans were exemplary despite being raised amid the corruption of late-classical Sparta — they swam against a stronger cultural current.", "isCorrect": true, "rationale": "The text says exactly this; the Romans had better material in better circumstances, the Spartans similar material in worse."}, {"text": "Because the Romans had Greek tutors and the Spartans had no foreign learning at all.", "isCorrect": false, "rationale": "The contrast is between corrupt versus generous cultural settings, not between tutors."}, {"text": "Because the Spartans had been to the Academy in Athens.", "isCorrect": false, "rationale": "No Academy training is part of the Spartan kings' biography in this synkrisis."}], "id": "q02"}, {"question": "On Axis 2, personal integrity in money, where does Plutarch land?", "options": [{"text": "Round two to Agis decisively, because he distributed his own private fortune; the Gracchi pass the test as well.", "isCorrect": true, "rationale": "The text awards this axis to Agis, while granting that the Gracchi kept clean hands in office."}, {"text": "Round two to the Gracchi, who paid the entire grain dole from their own estates.", "isCorrect": false, "rationale": "The grain dole was a state subsidy, not paid from the Gracchi's own funds; Plutarch awards this round to Agis."}, {"text": "Round two to Cleomenes, who refused to take a salary from Ptolemy.", "isCorrect": false, "rationale": "No salary refusal is at issue; Agis's six-hundred-talent gesture wins the round."}, {"text": "Round two to neither side, since all four took bribes at various points.", "isCorrect": false, "rationale": "The text explicitly says they all kept clean hands; bribery is not the verdict."}], "id": "q03"}, {"question": "How does Plutarch characterize the difference in scale between the Roman and Spartan projects?", "options": [{"text": "The Roman project was more ambitious; the Spartan was largely cosmetic.", "isCorrect": false, "rationale": "The opposite — Plutarch calls the Spartan project deeper and the Roman more surgical."}, {"text": "The Spartan project was deeper — a “thorough reformation” — while the Roman was more surgical.", "isCorrect": true, "rationale": "The text quotes Plutarch's contrast: the Spartans attempted “a thorough reformation”; the Gracchi worked on “the settlement of cities” and surgical fixes."}, {"text": "Both projects had identical scale and scope, and Plutarch refuses to distinguish them.", "isCorrect": false, "rationale": "Plutarch does distinguish: the Spartans were deeper, the Romans more surgical."}, {"text": "The Roman project was theoretical; the Spartan was wholly practical.", "isCorrect": false, "rationale": "Both were practical; the difference is scale, not theory versus practice."}], "id": "q04"}, {"question": "On Axis 4, opposition faced, who does Plutarch say had the harder political fight?", "options": [{"text": "The Spartans, because Macedon was a superpower.", "isCorrect": false, "rationale": "The axis is about political opposition, not military superpowers; Macedon enters only at Sellasia."}, {"text": "The Gracchi, because they fought “men of the greatest influence” while the Spartans had the precedent of Lycurgus on their side.", "isCorrect": true, "rationale": "The text awards this round to the Gracchi on exactly this basis: tougher opposition without a foundational precedent."}, {"text": "Cleomenes, because the ephors were impossible to defeat politically.", "isCorrect": false, "rationale": "Cleomenes simply killed the ephors; that is a violence point, not a political-opposition difficulty point."}, {"text": "Agis, because his co-king Leonidas had unlimited support.", "isCorrect": false, "rationale": "Leonidas's faction is a real opposition, but the text awards this round to the Gracchi as a pair, not to Agis alone."}], "id": "q05"}, {"question": "Which death does Plutarch consider the noblest of the four?", "options": [{"text": "Tiberius's, beaten down on the Capitol.", "isCorrect": false, "rationale": "Plutarch defends Tiberius's death as an “honorable retreat” but does not call it the noblest."}, {"text": "Cleomenes's, by his own hand in Egypt.", "isCorrect": false, "rationale": "Plutarch describes Cleomenes's suicide as a generous response to unjust treatment, but Agis's is ranked higher."}, {"text": "Agis's, who “willingly submitted to his fate, rather than any citizen should be in danger of his life.”", "isCorrect": true, "rationale": "The text awards this verdict to Agis, quoting Plutarch's own praise of his death's noble character."}, {"text": "Gaius's, by his own slave's hand in the grove of Furrina.", "isCorrect": false, "rationale": "Gaius's death is defended in the round as honorable retreat but is not ranked noblest of the four."}], "id": "q06"}, {"question": "What is Plutarch's verdict on civil violence in the four cases?", "options": [{"text": "He absolves the Gracchi of first blood and condemns Cleomenes for unjustly killing the ephors.", "isCorrect": true, "rationale": "The text says “neither the one nor the other was the first to shed the blood of his fellow-citizens” for the Gracchi, and condemns Cleomenes for killing the ephors when he could have won them by superior arms."}, {"text": "He condemns both pairs equally for shedding civic blood.", "isCorrect": false, "rationale": "Plutarch differentiates: Gracchi did not shed first blood, Cleomenes did."}, {"text": "He treats violence as morally indifferent so long as it produces good outcomes.", "isCorrect": false, "rationale": "The text quotes Plutarch's surgical metaphor — violence is bad surgery and bad policy except in extremest necessity."}, {"text": "He blames Tiberius for first blood and clears Cleomenes.", "isCorrect": false, "rationale": "Reversed: Plutarch's first-blood charge is against Cleomenes, not Tiberius."}], "id": "q07"}, {"question": "What is the famous “knife” metaphor Plutarch uses about reform?", "options": [{"text": "“A sharp knife cuts before it is felt; so too must reform precede grievance.”", "isCorrect": false, "rationale": "Not the text's metaphor; the actual line warns against the knife rather than praising sharpness."}, {"text": "“The knife of justice should be sheathed in the constitution.”", "isCorrect": false, "rationale": "Not a Plutarchan line in this synkrisis."}, {"text": "“To use the knife, unless in the extremest necessity, is neither good surgery nor wise policy.”", "isCorrect": true, "rationale": "The text quotes exactly this line as Plutarch's verdict against unnecessary political violence."}, {"text": "“When the patient is dying, the knife is the last hope of the surgeon.”", "isCorrect": false, "rationale": "Not Plutarch's image; the actual line argues the knife is mere unskillfulness except in extremest necessity."}], "id": "q08"}, {"question": "Which procedural innovation does Plutarch call “the greatest crime that can be laid to Tiberius's charge”?", "options": [{"text": "His attempt to stand for re-election.", "isCorrect": false, "rationale": "Re-election is mentioned as constitutionally irregular but is not called the greatest crime."}, {"text": "His acceptance of foreign gold from Pergamum.", "isCorrect": false, "rationale": "No charge of foreign gold appears in the synkrisis as the greatest crime."}, {"text": "His deposition of his fellow tribune Marcus Octavius.", "isCorrect": true, "rationale": "The text identifies the deposition of Octavius as the greatest charge against Tiberius in the procedural-innovation axis."}, {"text": "His use of armed retainers on the Capitol.", "isCorrect": false, "rationale": "Tiberius was beaten by the senators' retainers, not the reverse."}], "id": "q09"}, {"question": "What is Plutarch's final four-way ranking at the close of the synkrisis?", "options": [{"text": "Cleomenes the most virtuous, Tiberius the least guilty, Agis the most effective, Gaius the least effective.", "isCorrect": false, "rationale": "Plutarch's order is different; Tiberius is the most virtuous and Agis the least guilty, not the reverse."}, {"text": "Tiberius the most virtuous, Agis the least guilty, Cleomenes the most effective, Gaius the least effective.", "isCorrect": true, "rationale": "The text quotes Plutarch's closing ranking exactly: Tiberius virtuous, Agis least guilty, Cleomenes most effective, Gaius least effective."}, {"text": "All four are ranked equal; Plutarch refuses to differentiate.", "isCorrect": false, "rationale": "The closing sentences explicitly do differentiate — a rare moment for Plutarch."}, {"text": "Gaius the most virtuous, Cleomenes the least guilty, Agis the most effective, Tiberius the least effective.", "isCorrect": false, "rationale": "This reverses every term of the actual ranking."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
