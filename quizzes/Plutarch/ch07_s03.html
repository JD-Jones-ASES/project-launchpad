    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Coriolanus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Plutarch identify as the deepest fact about Coriolanus's character?", "options": [{"text": "His unrivaled physical strength.", "isCorrect": false, "rationale": "Plutarch admires his courage and force of soul, but treats them as expressions of a deeper orientation toward his mother."}, {"text": "His whole moral life was oriented toward his mother Volumnia's approval; he could not flatter the plebs because he sought no approval but hers.", "isCorrect": true, "rationale": "The text says explicitly: 'He could not flatter the Roman plebs because he could not bring himself to seek any approval except his mother's.' Glory's end, in Coriolanus's case, was 'his mother's gladness.'"}, {"text": "His sincere devotion to the Roman constitution.", "isCorrect": false, "rationale": "Coriolanus sought to roll back the constitutional gains of the plebs; his loyalty was to the patrician order, not to the post-tribunate constitution as such."}, {"text": "His openness to compromise with the plebs.", "isCorrect": false, "rationale": "Plutarch presents him as constitutionally incapable of compromise — the rigidity that made him fearless in battle made him a political liability."}]}, {"question": "What general moral principle does Plutarch draw from the contrast between Coriolanus's good natural endowment and his lack of paternal discipline?", "options": [{"text": "A father's absence guarantees moral collapse.", "isCorrect": false, "rationale": "Plutarch does not say collapse is guaranteed; he says good endowment without proper discipline tends to produce both good and bad fruits."}, {"text": "A generous and worthy nature without proper discipline, like a rich soil without culture, is apt to produce much that is bad and faulty alongside its better fruits.", "isCorrect": true, "rationale": "The quoted passage uses exactly this agricultural simile, and applies it to Coriolanus's combination of vigor with obstinate refusal to accommodate himself to others."}, {"text": "Natural talent matters more than discipline.", "isCorrect": false, "rationale": "Plutarch's argument is precisely the opposite: discipline shapes raw endowment, and its absence leaves rich soil to weeds."}, {"text": "Discipline matters more than natural talent.", "isCorrect": false, "rationale": "Plutarch does not rank them; he treats them as complementary, and laments their separation in Coriolanus."}]}, {"question": "How did Caius Marcius earn the surname Coriolanus?", "options": [{"text": "By winning a series of duels at the Roman games.", "isCorrect": false, "rationale": "The surname comes from a single military exploit, not from games."}, {"text": "By his single-handed seizure of the Volscian city of Corioli — he pursued the enemy back through the gates and fought alone among them until reinforcements arrived.", "isCorrect": true, "rationale": "The text says exactly this: 'during a sortie, Marcius pursued the enemy back through the gates into the city itself, fighting alone among them until reinforcements arrived. The city fell. Marcius was given the surname Coriolanus as a permanent reward.'"}, {"text": "By marrying into a noble Volscian family.", "isCorrect": false, "rationale": "There is no Volscian marriage in the text; the surname is a military epithet."}, {"text": "By a victorious naval battle off the coast of Corioli.", "isCorrect": false, "rationale": "The action was on land — a city assault, not a sea battle."}]}, {"question": "After the storming of Corioli, when the consul Cominius offered Coriolanus a tenth of the spoils, what did Coriolanus ask for instead?", "options": [{"text": "An estate in Corioli for his retirement.", "isCorrect": false, "rationale": "He asked for the release of a man, not for land."}, {"text": "The release of a Volscian friend who had been taken prisoner.", "isCorrect": true, "rationale": "Plutarch records: 'Coriolanus refused the wealth and asked instead for the release of a Volscian friend who had been taken prisoner. The request was granted; the army praised him for it.'"}, {"text": "Command of the Roman cavalry.", "isCorrect": false, "rationale": "The request was personal and modest in scale — a friend's release — not a command."}, {"text": "Sole credit for the victory in the official dispatch.", "isCorrect": false, "rationale": "Public credit was not the request; Plutarch says he refused advantage."}]}, {"question": "When wounded and exhausted during the Volscian campaign, Coriolanus refused to go to the rear. What did he say?", "options": [{"text": "'A consul does not retreat.'", "isCorrect": false, "rationale": "Plutarch's recorded line is specifically about weariness, not retreat as such."}, {"text": "'Weariness was not for conquerors.'", "isCorrect": true, "rationale": "The text gives this line exactly: when the consul Cominius wanted to send him to the rear, he refused with the line 'weariness was not for conquerors.'"}, {"text": "'Rome's wounds are her honors.'", "isCorrect": false, "rationale": "Not in the text. The exact line Plutarch records is about conquerors and weariness."}, {"text": "'My mother will not have a son who flinches.'", "isCorrect": false, "rationale": "Although Volumnia is central to his moral life, the line he speaks here is about conquerors and weariness, not directly about her."}]}, {"question": "What did Coriolanus propose in his speech during the Roman bread crisis?", "options": [{"text": "That the grain be distributed freely to all citizens.", "isCorrect": false, "rationale": "He opposed concessions to the plebs and was not in favor of free distribution."}, {"text": "That the grain be sold only at the old high price, and only to plebs who would renounce the tribunate.", "isCorrect": true, "rationale": "Plutarch records the proposal in exactly these terms: he 'argued… that the grain should not be sold to the plebs except at the old high price and except on condition that the tribunate be abolished.'"}, {"text": "That the grain be stored against future emergencies and the famine endured.", "isCorrect": false, "rationale": "He did not propose storage; his proposal was an attempt to use the relief as political leverage."}, {"text": "That the grain be sent back to Sicily.", "isCorrect": false, "rationale": "No such return is in the text; the grain stayed in Rome."}]}, {"question": "Three embassies came to Coriolanus's Volscian camp outside Rome. Which one finally moved him?", "options": [{"text": "An embassy of senators.", "isCorrect": false, "rationale": "The Roman embassies of state were rejected."}, {"text": "A procession of priests in their sacred garments.", "isCorrect": false, "rationale": "The priestly procession was also rejected."}, {"text": "The matrons of Rome led by his mother Volumnia, his wife Virgilia, and his small son.", "isCorrect": true, "rationale": "Plutarch describes the matrons' procession — led by Volumnia, Virgilia, and the child — as the appeal that finally moved him."}, {"text": "An embassy of plebeian tribunes.", "isCorrect": false, "rationale": "The tribunes had condemned him; they were not sent to plead with him outside Rome."}]}, {"question": "In Volumnia's appeal she identifies a contradiction the Roman matrons face. What is it?", "options": [{"text": "They cannot rejoice in victory because the conqueror is their son.", "isCorrect": true, "rationale": "Volumnia says they have come 'to whom fortune hath made it a most pitiable thing to behold, and a sight even of all sights the most uncomfortable, when we ought to have rejoiced' — they ought to rejoice in his coming, but he comes as their enemy."}, {"text": "They cannot weep because the gods will hear them.", "isCorrect": false, "rationale": "The contradiction is not religious but maternal-political: rejoicing turned to mourning by the identity of the conqueror."}, {"text": "They cannot speak because the city has fallen.", "isCorrect": false, "rationale": "Rome has not fallen at the moment of the speech; Volumnia explicitly says even silence would inform him of their misery."}, {"text": "They cannot return home unless he wins.", "isCorrect": false, "rationale": "Volumnia frames the dilemma as whether she will live to see Rome saved or die at her son's hands — not as a question of returning home."}]}, {"question": "How did Coriolanus respond to his mother's appeal, and what was the consequence with the Volscians?", "options": [{"text": "He sacked Rome anyway and was honored by the Volscians.", "isCorrect": false, "rationale": "He did not sack Rome; he turned the army around."}, {"text": "He listened in silence, embraced his mother, withdrew from Roman territory — and the Volscians, robbed of their war, turned on him.", "isCorrect": true, "rationale": "Plutarch records the silent embrace and withdrawal as the last and best moment of his life; the Volscians killed him because his rival Tullus Aufidius accused him of betrayal at a public assembly."}, {"text": "He left the army and returned to Rome as a private citizen.", "isCorrect": false, "rationale": "He withdrew the Volscian army but did not himself return to Rome; he was killed by the Volscians on the spot."}, {"text": "He executed the matrons for their interference.", "isCorrect": false, "rationale": "The text describes the matrons being received back into Rome in honor and a temple being built at the spot of the intervention."}]}, {"question": "Plutarch says Coriolanus and Alcibiades share an essential feature despite their opposite styles. What is it?", "options": [{"text": "Both were financially corrupt.", "isCorrect": false, "rationale": "The synkrisis later says only Alcibiades was corrupt; Coriolanus declined money even from his commanders."}, {"text": "Both were tutored by Socrates.", "isCorrect": false, "rationale": "Socrates was Alcibiades's teacher. Coriolanus's formation was by his mother Volumnia and Roman military life."}, {"text": "Each was unable to accommodate himself to the political community he served, in opposite styles — one by charm, the other by refusal.", "isCorrect": true, "rationale": "Plutarch's framing reads: 'each was unable to accommodate himself to the political community… Alcibiades did not need to; he could charm any community into accepting him. Coriolanus could not; he refused on principle to court the people he served.'"}, {"text": "Both retired peacefully after their exiles.", "isCorrect": false, "rationale": "Neither retired peacefully — Alcibiades died by arrows in Phrygia; Coriolanus was killed by the Volscians."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
