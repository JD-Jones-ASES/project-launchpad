        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Background: Founding Legends and the Problem of Legendary Evidence</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What metaphor does Plutarch use at the opening of the Life of Theseus to describe his approach to writing about legendary figures?", "options": [{"text": "A geographer drawing a map, where the known world is detailed and the unknown edges carry warnings.", "isCorrect": true, "rationale": "Plutarch compares himself to a geographer who crowds the edges of the map with notes that beyond this line lies nothing but prodigies, signaling that legendary evidence is the unstable far edge of the map."}, {"text": "A physician diagnosing a patient by visible symptoms alone.", "isCorrect": false, "rationale": "The medical metaphor is not the one Plutarch uses for the methodological opening of the Lives."}, {"text": "A judge weighing competing testimonies in a court of law.", "isCorrect": false, "rationale": "Plutarch does weigh competing traditions, but the specific opening image is the geographer's map, not the courtroom."}, {"text": "A sculptor working from a damaged original.", "isCorrect": false, "rationale": "This is not the image Plutarch invokes at the opening of the Theseus."}], "id": "q01"}, {"question": "Read this passage from Plutarch's opening: \"Beyond this there is nothing but prodigies and fictions, the only inhabitants are the poets and inventors of fables; there is no credit, or certainty any farther.\" What is Plutarch most directly signaling to his reader?", "options": [{"text": "That he intends to dismiss the legendary founders as unworthy of biography.", "isCorrect": false, "rationale": "Plutarch does not dismiss the founders; he proceeds to write their lives. The warning is about the evidence, not the project."}, {"text": "That the legendary material lies beyond reliable historical proof, and the reader should adjust expectations accordingly.", "isCorrect": true, "rationale": "The geographer's warning marks the legendary period as territory outside reliable history; Plutarch asks for indulgence rather than abandoning the project."}, {"text": "That the poets and mythographers are the most trustworthy sources he will use.", "isCorrect": false, "rationale": "The passage names poets and inventors of fables precisely as the inhabitants of unreliable territory."}, {"text": "That his account of Theseus will be drawn from eyewitnesses rather than tradition.", "isCorrect": false, "rationale": "Plutarch is writing centuries after Theseus and explicitly invokes \"the stories of antiquity,\" not eyewitnesses."}], "id": "q02"}, {"question": "Why did Plutarch choose Theseus to pair with Romulus rather than another Greek figure?", "options": [{"text": "Theseus is the only Greek hero Plutarch found morally admirable.", "isCorrect": false, "rationale": "Plutarch writes many lives of admirable Greeks; the pairing criterion is structural, not moral exclusivity."}, {"text": "Theseus was the founder of Athens, set against Romulus, the founder of Rome — the pairing matches founder to founder and city to city.", "isCorrect": true, "rationale": "Plutarch explicitly chooses Theseus as the namegiver of \"the beautiful and far-famed city of Athens\" to pair with the founder of \"the invincible and renowned city of Rome.\""}, {"text": "Both men were historical figures whose dates could be verified.", "isCorrect": false, "rationale": "Neither figure is historically verifiable; Plutarch explicitly warns of the legendary nature of both."}, {"text": "Theseus's biography had already been written by Livy, providing a Second Witness.", "isCorrect": false, "rationale": "Livy wrote about Romulus, not Theseus; the Greek side has no comparable Second Witness."}], "id": "q03"}, {"question": "Plutarch lists several deep parallels between Theseus and Romulus. Which of the following is NOT one of them?", "options": [{"text": "Both were born out of wedlock and raised away from the city they would later found or refound.", "isCorrect": false, "rationale": "Plutarch lists this parallel explicitly as one of the structural similarities between the two founders."}, {"text": "Both came to political power through the killing of a wrongdoer.", "isCorrect": false, "rationale": "This is one of Plutarch's listed parallels — Theseus killed bandits and a wronging stepmother's plot, Romulus killed the usurper Amulius."}, {"text": "Both ended their lives in mysterious circumstances and were honored as gods after death.", "isCorrect": false, "rationale": "Theseus died on Skyros and Romulus disappeared in a storm; both received divine honors. This is a listed parallel."}, {"text": "Both produced sons who succeeded them peacefully as kings of their cities.", "isCorrect": true, "rationale": "Plutarch lists no such parallel — Theseus's son Hippolytus died young by Phaedra's machinations, and Romulus did not leave a peaceful succession."}], "id": "q04"}, {"question": "What does Plutarch mean by the phrase \"some say, others say,\" and why does it matter?", "options": [{"text": "It is a rhetorical flourish without methodological significance.", "isCorrect": false, "rationale": "The phrase is methodologically loaded — it marks Plutarch's transparency about a divided tradition."}, {"text": "It signals a moment where the tradition is genuinely divided, and Plutarch is showing his readers the disagreement instead of hiding it.", "isCorrect": true, "rationale": "This signature move marks Plutarch's intellectual integrity — he weighs competing accounts rather than pretending to a certainty he does not have."}, {"text": "It indicates Plutarch is paraphrasing a single agreed-upon source.", "isCorrect": false, "rationale": "If the source were single and agreed, there would be no \"others\" to cite."}, {"text": "It marks moments when Plutarch personally disagrees with both versions.", "isCorrect": false, "rationale": "Sometimes Plutarch disagrees, but the phrase primarily marks the existence of multiple traditions, not his own dissent."}], "id": "q05"}, {"question": "In what sense does Plutarch think legendary biography has value, even when its historical facts cannot be verified?", "options": [{"text": "It provides moral examples and shows a people's image of their best self — what they wanted their founder to have been.", "isCorrect": true, "rationale": "Plutarch treats legendary lives as moral self-portraits of the cities that preserved them — the character of Theseus the Athenians believed in shaped what generations of Athenians took themselves to be."}, {"text": "It enables modern scholars to date events with archaeological precision.", "isCorrect": false, "rationale": "Plutarch explicitly admits that dates for figures like Theseus cannot be verified."}, {"text": "It substitutes for documentary history when records have been lost.", "isCorrect": false, "rationale": "Plutarch warns the reader the legends are not strict history; he does not present them as a substitute for documents."}, {"text": "It preserves an unbroken eyewitness chain back to the founding.", "isCorrect": false, "rationale": "Plutarch makes no such claim; he is writing from a position centuries removed from the events."}], "id": "q06"}, {"question": "Why is there a Second Witness for the Roman side (Livy) but not for the Greek side (Theseus)?", "options": [{"text": "Livy wrote earlier than Plutarch and on the same Roman tradition, whereas the Greek tradition for Theseus survives mainly through Plutarch himself and Apollodorus, without a comparable parallel narrative.", "isCorrect": true, "rationale": "The asymmetry is itself instructive: Greek legendary biography depends on Plutarch in a way Roman legendary biography does not."}, {"text": "Livy refused to write about Greek heroes on principle.", "isCorrect": false, "rationale": "Livy wrote a history of Rome; the absence of a Greek parallel narrative is not a personal choice."}, {"text": "Plutarch chose not to consult Greek sources for the Theseus.", "isCorrect": false, "rationale": "Plutarch did consult Greek sources, but no surviving Greek narrative is comparable to Livy's in length and detail."}, {"text": "The Athenians never preserved their founder-stories in writing.", "isCorrect": false, "rationale": "Athenian tradition was preserved in many forms (mythography, drama, ritual), but no single parallel narrative comparable to Livy's exists."}], "id": "q07"}, {"question": "Plutarch lists five axes to watch for in the Lives that follow. Which one is NOT one of them?", "options": [{"text": "How the founder comes to power.", "isCorrect": false, "rationale": "This is the first axis Plutarch flags — both founders accede through violence done to a wrongdoer."}, {"text": "How the founder treats his own people.", "isCorrect": false, "rationale": "This is the second axis — Theseus's persuasion of the Attic villages vs. Romulus's settlement of refugees."}, {"text": "How the founder treats women.", "isCorrect": false, "rationale": "This is the third axis, and a charge Plutarch returns to in the synkrisis."}, {"text": "How the founder funds the construction of his city's walls.", "isCorrect": true, "rationale": "Plutarch does not list financing as one of the axes; the listed five are: coming to power, treatment of people, treatment of women, relationship with brother or relative, and the manner of dying."}], "id": "q08"}, {"question": "What is the traditional Athenian dating for Theseus, and how does it compare with the traditional Roman dating for Romulus?", "options": [{"text": "Theseus is placed in the second millennium BC, around the time of the Trojan War; Romulus founds Rome in 753 BC. Theseus is the older legend.", "isCorrect": true, "rationale": "The Athenians dated Theseus to the second millennium BC, near the Trojan War; the Romans dated their city's founding by Romulus to 753 BC."}, {"text": "Both founders are placed in 753 BC.", "isCorrect": false, "rationale": "Only Rome's founding is dated to 753 BC; Theseus is much older in the Athenian tradition."}, {"text": "Theseus is dated to the 5th century BC during Cimon's lifetime.", "isCorrect": false, "rationale": "Cimon is the 5th-century Athenian general who recovered Theseus's bones, not Theseus himself."}, {"text": "Both are dated to the time of Lycurgus's Spartan reforms.", "isCorrect": false, "rationale": "Lycurgus's traditional date is different again, and neither founder is dated to that period."}], "id": "q09"}, {"question": "What does Plutarch mean when he says the legendary founder-life is the city's \"moral self-portrait\"?", "options": [{"text": "The legend records exactly what the founder did and looked like.", "isCorrect": false, "rationale": "Plutarch's whole methodological warning is that the legend does not necessarily record what the founder did."}, {"text": "The legend captures what the city's citizens, over generations, took their best self to be — a portrait of the people's values, projected onto the founder.", "isCorrect": true, "rationale": "Plutarch reads legendary biography as the record of what a people thought their best self looked like — a self-portrait by way of the founder."}, {"text": "The legend describes the founder's physical appearance using oral tradition.", "isCorrect": false, "rationale": "Plutarch is making a point about moral identity, not physical description."}, {"text": "The legend was painted on the walls of the founder's tomb.", "isCorrect": false, "rationale": "Plutarch is speaking metaphorically about moral character, not about painted portraits."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
