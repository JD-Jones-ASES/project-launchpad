        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Romulus</div>

        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Who was Amulius, and what was his role in the origin story of Romulus?", "options": [{"text": "He was the usurper of the throne of Alba Longa who exiled his brother Numitor, killed Numitor's son, and made Numitor's daughter Rhea Silvia a Vestal virgin to prevent any rival heir.", "isCorrect": true, "rationale": "Plutarch records that Amulius usurped his brother Numitor's throne, killed Numitor's son, and forced Rhea Silvia into perpetual celibacy as a Vestal. The twins are born despite this."}, {"text": "He was the shepherd who raised the twins after the wolf.", "isCorrect": false, "rationale": "That role belongs to Faustulus, not Amulius."}, {"text": "He was the god Mars's earthly priest.", "isCorrect": false, "rationale": "Plutarch records no such role for Amulius."}, {"text": "He was the king of the neighboring Sabines.", "isCorrect": false, "rationale": "The Sabine king (Titus Tatius in the wider tradition) is unrelated to Amulius."}], "id": "q01"}, {"question": "Read this passage from Plutarch carefully: \"Romulus marked out the walls of the new town on the Palatine hill; Remus took up his station on the Aventine. They had agreed to leave the choice between them to the gods, through a sign of birds. Remus, watching, first saw six vultures; Romulus, somewhat later, saw twelve.\" Why does this dispute matter for Plutarch's larger argument?", "options": [{"text": "It establishes that Rome was founded with divine unanimity.", "isCorrect": false, "rationale": "Plutarch's whole point is that the omen was disputed — there was no unanimity, divine or otherwise."}, {"text": "It marks the founding of Rome as beginning with an unresolved fraternal quarrel that issues in the killing of Remus, and Plutarch will not let the reader forget it.", "isCorrect": true, "rationale": "Plutarch lets the contrast stand: Theseus founds Athens by talking the villages into unity; Romulus founds Rome by killing his brother. The killing shadows the whole portrait."}, {"text": "It shows that Remus was the rightful founder all along.", "isCorrect": false, "rationale": "Plutarch leaves the bird-omen ambiguous; he does not declare Remus the rightful founder."}, {"text": "It demonstrates that Romulus respected divination scrupulously.", "isCorrect": false, "rationale": "The dispute is precisely over how to interpret the signs, and Plutarch's account ends in violence rather than scrupulous interpretation."}], "id": "q02"}, {"question": "How does Livy's treatment of the wolf-suckling differ from Plutarch's?", "options": [{"text": "Livy treats the wolf almost as a fact, while noting a rationalist alternative without insisting on it; Plutarch attributes the wolf-suckling more cautiously as 'tradition.'", "isCorrect": true, "rationale": "Livy is happier to let a great story stand; Plutarch is more methodologically guarded — the textbook expressly contrasts the two authors' temperaments at this point."}, {"text": "Livy denies the wolf-suckling outright.", "isCorrect": false, "rationale": "Livy reports the wolf-suckling and only mentions the rationalist alternative as a possibility, not as a debunking."}, {"text": "Plutarch and Livy agree word for word.", "isCorrect": false, "rationale": "The textbook explicitly catalogues several differences in handling between the two authors."}, {"text": "Livy invents the rationalist alternative; it is absent in Plutarch.", "isCorrect": false, "rationale": "The rationalist alternative (Lupa as a prostitute's nickname) is a tradition Livy reports but does not adopt."}], "id": "q03"}, {"question": "Plutarch reports that Romulus's founding population was unusual. What was it composed of, and how did Romulus get women for it?", "options": [{"text": "An open settlement of fugitives, outcasts, runaway slaves, and exiles from neighboring states; Romulus invited the neighboring Sabines to a festival and then, on a prearranged signal, seized the Sabine women as wives.", "isCorrect": true, "rationale": "This is Plutarch's account of both the open settlement and the famous seizure that became known as the rape of the Sabine women."}, {"text": "He admitted only freeborn Latins and arranged dowried marriages with neighboring tribes.", "isCorrect": false, "rationale": "Plutarch records an open settlement of the dispossessed, not a freeborn-only policy."}, {"text": "He populated the city with veterans of the Trojan War and married their daughters.", "isCorrect": false, "rationale": "This is not Plutarch's account; the founding population is described as fugitives and outcasts."}, {"text": "He purchased slaves at neighboring markets to populate Rome.", "isCorrect": false, "rationale": "No purchase of slaves; the seizure of the Sabine women is the famous solution."}], "id": "q04"}, {"question": "Read this passage from Plutarch: \"When the time was come to fight, the Sabine women, with their hair flying and their garments torn, ran into the very midst of the swords and the slaughter… separating husbands and fathers… The Sabine men, when they saw their daughters and sisters and wives, were so moved that they laid down their arms.\" What is Plutarch doing in this passage?", "options": [{"text": "Acknowledging the original violence, recording the women's moral agency, and reading the eventual merger of the two peoples as a genuine good emerging from a deeply ambiguous beginning.", "isCorrect": true, "rationale": "Plutarch holds three things together: the violence (\"swords and slaughter\"), the women's intervention, and the eventual union of peoples — without erasing any of them."}, {"text": "Denying that the seizure was violent.", "isCorrect": false, "rationale": "Plutarch explicitly preserves the language of swords and slaughter; he does not deny the violence."}, {"text": "Praising Romulus's military skill in defeating the Sabines.", "isCorrect": false, "rationale": "Plutarch's emphasis here is on the women, not on Romulus's military prowess; the fighting ends because the women intervene."}, {"text": "Suggesting that the women never wanted reconciliation.", "isCorrect": false, "rationale": "Plutarch records that the women themselves brokered the peace — the opposite of unwilling intervention."}], "id": "q05"}, {"question": "What are the two traditions about the death of Romulus that Plutarch records?", "options": [{"text": "He was caught up in a thunderstorm at the Capraean Marsh and transformed into the god Quirinus; or he was assassinated by the senators in a private chamber and his body cut to pieces and concealed.", "isCorrect": true, "rationale": "Plutarch preserves both: the apotheosis story (which the Roman tradition settled on) and the colder political assassination story (which Plutarch does not let drop from the page)."}, {"text": "He died in battle against the Sabines and was buried on the Palatine hill.", "isCorrect": false, "rationale": "This is not one of the two traditions Plutarch records."}, {"text": "He retired peacefully and died of old age in Alba Longa.", "isCorrect": false, "rationale": "Neither tradition Plutarch records includes a peaceful retirement."}, {"text": "He was poisoned by his wife Hersilia.", "isCorrect": false, "rationale": "No such tradition appears in Plutarch's account."}], "id": "q06"}, {"question": "Why does Plutarch preserve the assassination story alongside the apotheosis story, when the Roman cult had settled on the latter?", "options": [{"text": "Because legends about disappearances tend to multiply, the cult is often more useful than the inconvenient story of how the founder actually died, and Plutarch's method is to let the reader see both possibilities.", "isCorrect": true, "rationale": "Plutarch makes this exact methodological aside: legends multiply because the cult of the founder is more useful than the inconvenient truth, and he refuses to decide between the two versions."}, {"text": "Because the assassination story is the one Livy preferred.", "isCorrect": false, "rationale": "Livy is not the deciding voice for Plutarch's editorial choice; the choice is methodological."}, {"text": "Because the assassination story was favored by the Athenians.", "isCorrect": false, "rationale": "Plutarch's reasoning is methodological, not based on Athenian preferences."}, {"text": "Because the cult of Quirinus had ceased by Plutarch's day.", "isCorrect": false, "rationale": "Plutarch notes that the Quirinus cult persisted for centuries; the alternative is preserved anyway."}], "id": "q07"}, {"question": "In what specific way does Livy's account of the founding quarrel differ from Plutarch's?", "options": [{"text": "Livy is more direct: he reports that Remus leaped over Romulus's new wall in derision and that Romulus killed him in a rage. Plutarch is more guarded about who actually did the killing.", "isCorrect": true, "rationale": "Livy presents the killing plainly with motive and act; Plutarch records that the tradition is divided about the killer but that the more common account names Romulus."}, {"text": "Livy denies that Remus was killed at all.", "isCorrect": false, "rationale": "Livy reports Remus's death directly; he does not deny it."}, {"text": "Plutarch attributes the killing to a third party Livy never mentions.", "isCorrect": false, "rationale": "Plutarch notes the more common account makes Romulus the killer; he records uncertainty, not a third party."}, {"text": "Plutarch claims Remus killed Romulus and was later impersonated.", "isCorrect": false, "rationale": "No such reversal appears in Plutarch."}], "id": "q08"}, {"question": "Plutarch implicitly invites a comparison between Romulus's seizure of the Sabine women and a parallel episode in Theseus's life. What is that parallel?", "options": [{"text": "Theseus's abduction of Antiope the Amazon, who likewise became his wife and the mother of Hippolytus.", "isCorrect": true, "rationale": "Plutarch points out that Theseus too founded by abducting women — Antiope above all — but his abductions, unlike Romulus's, did not turn into political unions."}, {"text": "Theseus's killing of the Minotaur.", "isCorrect": false, "rationale": "The Minotaur episode is not parallel to the seizure of women."}, {"text": "Theseus's descent into the underworld with Pirithous.", "isCorrect": false, "rationale": "The descent is a separate adventure; it is not the abduction parallel."}, {"text": "Theseus's friendship with the demagogue Menestheus.", "isCorrect": false, "rationale": "Menestheus is the political opponent of Theseus, not an abduction parallel."}], "id": "q09"}, {"question": "What overall judgment does Plutarch leave about Romulus's character at the end of the section?", "options": [{"text": "Romulus is harder than Theseus — more guarded, more commanding, more solitary in power. The killing of Remus shadows the whole portrait; the seizure of the Sabine women is followed by genuine union, but the original act remains an act.", "isCorrect": true, "rationale": "Plutarch's character summary: where Theseus persuades, Romulus commands; where Theseus shares power, Romulus reigns alone. The founding violence is acknowledged even when its outcomes were good."}, {"text": "Romulus was a peaceful king who avoided violence whenever possible.", "isCorrect": false, "rationale": "Plutarch's portrait is the opposite — violence shadows the entire founding."}, {"text": "Romulus was a weak ruler who was easily manipulated by the senate.", "isCorrect": false, "rationale": "Plutarch describes him as a strong, commanding figure; the senate story comes only at the end."}, {"text": "Romulus failed entirely as a founder, and Rome rose only after his death.", "isCorrect": false, "rationale": "Plutarch acknowledges Rome's greatness flowed from Romulus's founding; he just leaves open whether the city's success was due to the man or in spite of him."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
