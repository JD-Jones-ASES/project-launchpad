    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Cicero</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does \"novus homo\" mean in Cicero's case?", "options": [{"text": "A patrician who had renounced his rank to enter equestrian commerce.", "isCorrect": false, "rationale": "The term denotes someone outside the senatorial aristocracy, not a renouncer of patrician rank."}, {"text": "A \"new man\" — Cicero was an eques from Arpinum, wealthy but not noble, who would have to make his political career on his own merits.", "isCorrect": true, "rationale": "The Life identifies Cicero's family as wealthy equestrian but not senatorial, making him in Roman terminology a novus homo."}, {"text": "A foreigner naturalized as a Roman citizen.", "isCorrect": false, "rationale": "Cicero was born a Roman citizen at Arpinum, an Italian town; the term refers to family rank, not foreign birth."}, {"text": "A man who held no office before becoming consul.", "isCorrect": false, "rationale": "Cicero served as quaestor and praetor before reaching the consulship; the term is about ancestry, not office-holding."}], "id": "q01"}, {"question": "Where did the young Cicero study, and with what effect on his later writing?", "options": [{"text": "In Athens and Rhodes for further philosophical training, with the Stoics, Academics, and Epicureans — giving him a philosophical breadth Demosthenes did not have.", "isCorrect": true, "rationale": "The Life records Cicero's training in Athens and Rhodes across multiple philosophical schools, producing a philosophical breadth Demosthenes lacked."}, {"text": "Exclusively in Rome under Quintus Mucius Scaevola, learning only Roman law.", "isCorrect": false, "rationale": "While he did study under Scaevola in Rome, the Life adds his further training in Greece across philosophical schools."}, {"text": "Privately, with no formal teachers, by reading Demosthenes alone.", "isCorrect": false, "rationale": "Cicero studied under named teachers in Rome, Athens, and Rhodes."}, {"text": "At the court of King Philo of Macedon.", "isCorrect": false, "rationale": "Philo of Larissa was a philosopher (Academic), not the Macedonian king."}], "id": "q02"}, {"question": "What was Cicero's first major case (80 BC), and what did it require of him politically?", "options": [{"text": "The prosecution of Verres for extortion in Sicily — a routine quaestor's case.", "isCorrect": false, "rationale": "The Verres case was later; the first major case was the defense of Sextus Roscius."}, {"text": "The defense of Sextus Roscius of Ameria on a charge of parricide, a case implicating the dictator Sulla's freedman Chrysogonus; the defense was so courageous that Cicero went briefly to Greece in a kind of voluntary exile until political conditions cooled.", "isCorrect": true, "rationale": "The Life gives all these details: parricide accusation, involvement of Sulla's freedman, and Cicero's voluntary travel to Greece afterwards."}, {"text": "His own prosecution of his guardians, in imitation of Demosthenes.", "isCorrect": false, "rationale": "The guardians-lawsuit was Demosthenes's first action, not Cicero's."}, {"text": "A successful prosecution of Catiline for an early conspiracy.", "isCorrect": false, "rationale": "The Catiline crisis came much later, during Cicero's consulship in 63 BC."}], "id": "q03"}, {"question": "What was the Catiline conspiracy, and how did Cicero handle it?", "options": [{"text": "Catiline tried to ban Cicero's books; Cicero answered with the De Oratore.", "isCorrect": false, "rationale": "The Catiline crisis was a violent plot to overthrow the Republic, not a literary dispute."}, {"text": "Catiline, a frustrated aristocrat who had twice failed to win the consulship, organized a plan to assassinate the consuls, seize the city, and arm slaves and rural debtors; Cicero exposed the plot through informants, delivered four Catilinarian speeches, drove Catiline from Rome, and oversaw the executions of the remaining conspirators on Cato the Younger's motion.", "isCorrect": true, "rationale": "The Life details every element: Catiline's two failed consular runs, the violent plot, the four Catilinarians, Catiline's departure to Etruria, the Senate vote on Cato's motion, and the executions."}, {"text": "Catiline was a foreign prince Cicero defeated in single combat.", "isCorrect": false, "rationale": "Catiline was a Roman senatorial aspirant, not a foreign prince, and there is no single combat in the Life."}, {"text": "Cicero ignored the conspiracy and was nearly assassinated.", "isCorrect": false, "rationale": "The Life records Cicero acting with extraordinary energy, not passivity."}], "id": "q04"}, {"question": "What is the famous opening of the First Catilinarian?", "options": [{"text": "\"Cui bono?\"", "isCorrect": false, "rationale": "\"Cui bono?\" is a different Ciceronian phrase, not the opening of the First Catilinarian."}, {"text": "\"Quousque tandem abutere, Catilina, patientia nostra? — How long, Catiline, will you abuse our patience? How long will your madness still mock us?\"", "isCorrect": true, "rationale": "The Life quotes this as one of the most famous beginnings in Latin literature."}, {"text": "\"O tempora, o mores!\" delivered before any name was named.", "isCorrect": false, "rationale": "\"O tempora, o mores!\" comes later in the speech, not at its opening."}, {"text": "\"Veni, vidi, vici.\"", "isCorrect": false, "rationale": "That is Caesar's line, not Cicero's; it appears in Chapter 8."}], "id": "q05"}, {"question": "Why did the suppression of Catiline later open Cicero to prosecution and exile?", "options": [{"text": "Because he had ordered executions without the provocatio (the right of appeal) that Publicola had established in Chapter 4, giving Clodius grounds for a retrospective bill against him.", "isCorrect": true, "rationale": "The Life explicitly notes the executions bypassed Publicola's provocatio, and that five years later (58 BC) Clodius pushed through a bill making Cicero's actions retrospectively illegal."}, {"text": "Because Catiline turned out to be innocent and Cicero had to atone.", "isCorrect": false, "rationale": "The Life never disputes Catiline's guilt; the issue was procedure."}, {"text": "Because Cato the Younger reversed his earlier vote.", "isCorrect": false, "rationale": "Cato's motion is presented as definitive; he did not reverse it."}, {"text": "Because Cicero had taken a bribe from Catiline.", "isCorrect": false, "rationale": "No bribery accusation against Cicero is recorded here."}], "id": "q06"}, {"question": "How does Plutarch characterize Cicero's behavior during the eighteen-month exile?", "options": [{"text": "He used the time to travel the provinces and organize resistance, in the manner of Demosthenes after the Harpalus affair.", "isCorrect": false, "rationale": "The Life contrasts Cicero with Demosthenes here: Cicero \"passed his exile idly,\" while Demosthenes used his productively."}, {"text": "He took it hard, wrote letters of self-pity to his friends, and \"passed his exile idly\" in Macedonia.", "isCorrect": true, "rationale": "The Life records exactly these details and Plutarch's mild rebuke about idle exile."}, {"text": "He concealed himself among the Stoics on Rhodes and wrote the De Officiis there.", "isCorrect": false, "rationale": "No such Rhodian retreat or composition is given as the exile activity."}, {"text": "He fought as a mercenary commander against Pompey.", "isCorrect": false, "rationale": "Cicero is consistently presented as a non-military figure in the Life."}], "id": "q07"}, {"question": "What were the Philippics in Cicero's career, and what was their political effect?", "options": [{"text": "Speeches praising Octavian for restoring the Republic.", "isCorrect": false, "rationale": "The Philippics attack Antony, not praise Octavian."}, {"text": "A series of fourteen speeches against Mark Antony after Caesar's assassination, explicitly modeled on Demosthenes's Philippics and called by the same name; politically brilliant and personally suicidal — they enraged Antony, who proscribed Cicero after forming the Second Triumvirate with Octavian and Lepidus.", "isCorrect": true, "rationale": "The Life records the number, the deliberate modeling on Demosthenes, the political brilliance, and the suicidal personal cost — Antony's proscription."}, {"text": "Plays staged at a festival in Greece during Cicero's retirement.", "isCorrect": false, "rationale": "The Philippics are political speeches, not plays."}, {"text": "A single speech against Catiline renamed in homage to Demosthenes.", "isCorrect": false, "rationale": "The Catilinarians and the Philippics are separate sets of speeches against different opponents."}], "id": "q08"}, {"question": "How does Cicero die in Plutarch's account?", "options": [{"text": "Stabbed by Antony in the Senate while delivering a speech.", "isCorrect": false, "rationale": "Antony did not personally kill Cicero; the assassins were sent by him."}, {"text": "Drowned at sea while fleeing to Greece.", "isCorrect": false, "rationale": "Adverse winds drove him back to Italy; he was killed on land, not at sea."}, {"text": "When the murderers approached, he gave orders to set down the litter, stretched out his neck from the litter, and asked the soldiers to make their blow clean. He was sixty-three. They cut off his head, and by Antony's order his hands also, which had written the Philippics.", "isCorrect": true, "rationale": "The Life records all these details: the litter, the deliberate exposure of the neck, the request for a clean blow, the age, and the severing of the head and writing hands."}, {"text": "Took poison at the temple of Jupiter Capitolinus.", "isCorrect": false, "rationale": "That detail (poison, temple) is Demosthenes's death, not Cicero's."}], "id": "q09"}, {"question": "What did Antony do with Cicero's severed head and hands, and what did Fulvia do?", "options": [{"text": "Returned them to Cicero's family for private burial.", "isCorrect": false, "rationale": "Antony did the opposite of return them; he displayed them publicly."}, {"text": "Exposed them on the Rostra — the public speaker's platform from which Cicero had spoken so often — and Fulvia, Antony's wife, drew out the tongue with a hairpin and stabbed it.", "isCorrect": true, "rationale": "The Life records both the deliberate display on the Rostra (a denial of speech and writing) and Fulvia's act with the hairpin."}, {"text": "Buried them with state honors at Antony's expense.", "isCorrect": false, "rationale": "There were no state honors; the display was a humiliation."}, {"text": "Sent them to Octavian as a peace offering.", "isCorrect": false, "rationale": "No such gift to Octavian is recorded; Octavian had declined to save Cicero but is not given the head."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
