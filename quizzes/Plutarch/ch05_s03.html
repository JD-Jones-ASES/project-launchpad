    };

<div class="quiz-container">

        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Camillus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the strange and singular feature of Camillus's career that Plutarch flags at the opening of the Life?", "options": [{"text": "He never lost a battle.", "isCorrect": false, "rationale": "Plutarch does not make the unbroken record the framing observation; the structural anomaly is in his offices."}, {"text": "He was chosen dictator five times, triumphed four times, and was styled second founder of Rome — yet was never once consul.", "isCorrect": true, "rationale": "Plutarch quotes this exact pattern as singular and strange above all: 'five times chosen dictator, triumphed four times, and was styled a second founder of Rome, yet never was so much as once consul.'"}, {"text": "He lived to be one hundred years old.", "isCorrect": false, "rationale": "Camillus died around age 81 in the plague of 365 BC; the career anomaly is the office pattern, not extreme longevity."}, {"text": "He held the consulship continuously for ten years.", "isCorrect": false, "rationale": "He held no consulship at all, which is precisely the singular point."}], "id": "q01"}, {"question": "Why did Camillus serve repeatedly as dictator but never as consul?", "options": [{"text": "Because consuls had to be patrician and he was a plebeian.", "isCorrect": false, "rationale": "Camillus belonged to a respectable Roman family; the issue was state-level, not personal status."}, {"text": "Because he refused the consulship out of religious scruple.", "isCorrect": false, "rationale": "No such refusal is described; the explanation in the text is institutional, not personal."}, {"text": "The plebs were at dissension with the senate and refused to return consuls in those years, electing military tribunes with consular power instead; the senate kept turning to Camillus as dictator for emergencies.", "isCorrect": true, "rationale": "Plutarch attributes the pattern to 'the state and temper of the commonwealth at that time' — the plebeian-senate quarrel meant military tribunes were elected instead of consuls; the dictatorship remained available for emergencies and Camillus held it five times."}, {"text": "Because the Etruscan kings still controlled the consulships.", "isCorrect": false, "rationale": "The kings had been expelled more than a century earlier; the political condition the text names is the plebeian-senate quarrel of the fourth century."}], "id": "q02"}, {"question": "How long was the siege of Veii, and how did Camillus take the city?", "options": [{"text": "Three months, by direct assault on the gates.", "isCorrect": false, "rationale": "The siege lasted ten years, the longest war Rome had ever fought; it was not ended by direct assault on the gates."}, {"text": "Ten years, by a combination of a mining tunnel under the walls and a favorable prodigy (the strange rising of the Alban lake).", "isCorrect": true, "rationale": "Plutarch describes the ten-year siege, says Camillus's troops dug a mining tunnel under the Veian walls, and identifies the Alban lake prodigy as providing the Romans religious confidence."}, {"text": "One year, by bribing the Etruscan king.", "isCorrect": false, "rationale": "There was no Etruscan king at Veii to bribe; the city was taken by tunnel and storm, not by bribe."}, {"text": "Twenty years, by starvation alone.", "isCorrect": false, "rationale": "The siege lasted ten, not twenty, years; starvation alone is not how Plutarch describes the end."}], "id": "q03"}, {"question": "What did Camillus do when the city of Veii fell, and what immediately followed?", "options": [{"text": "He celebrated openly and demanded a triumph.", "isCorrect": false, "rationale": "He did receive triumphs in his career, but the moment Plutarch foregrounds at Veii's fall is the opposite — restraint and prayer."}, {"text": "He wept from the high tower at the pillaging, raised his hands to heaven, and prayed that any necessary misfortune fall on his own head rather than on Rome; he then stumbled and fell — which he accepted as the small misfortune he had requested.", "isCorrect": true, "rationale": "Plutarch quotes the prayer at length and immediately reports the small symbolic answer of the stumble, presenting it as evidence that Camillus's piety was registered by the gods."}, {"text": "He ordered the killing of every man, woman, and child.", "isCorrect": false, "rationale": "The text describes pillage, not extermination, and emphasizes Camillus's religious self-doubt rather than vengeance."}, {"text": "He commanded that no spoils be taken at all.", "isCorrect": false, "rationale": "Spoils were taken at Veii; the issue with the spoils came later, when Camillus enforced Apollo's tenth share even after soldiers had already pocketed their share."}], "id": "q04"}, {"question": "The schoolmaster of Falerii is the moral high water mark of the Life. What happened?", "options": [{"text": "A Falerian schoolmaster led the noble children outside the walls and delivered them to the Roman camp; Camillus refused the bargain, stripped and bound the schoolmaster, gave the boys rods, and had them whip their master back to the city — the Falerians then surrendered voluntarily.", "isCorrect": true, "rationale": "Plutarch describes the entire episode: the schoolmaster's treachery, Camillus's reaction, the boys whipping their master back, and the Falerian ambassadors' speech that the Romans had outclassed them in virtue."}, {"text": "Camillus accepted the noble children as hostages and used them to negotiate a favorable surrender.", "isCorrect": false, "rationale": "He refused exactly this option; the centerpiece of the scene is the refusal."}, {"text": "The schoolmaster killed the children rather than let them be taken.", "isCorrect": false, "rationale": "No such killing happens; the children are returned alive."}, {"text": "Camillus executed the schoolmaster on the spot.", "isCorrect": false, "rationale": "He did not execute him — he had him stripped, bound, and whipped back to the city by the children themselves."}], "id": "q05"}, {"question": "What line of Camillus did Plutarch put at the heart of the Falerian incident?", "options": [{"text": "'I came, I saw, I conquered.'", "isCorrect": false, "rationale": "This is Caesar's line, much later, and would be incongruous for Camillus's character."}, {"text": "'Romans recover their country with steel, not gold.'", "isCorrect": false, "rationale": "This line is also Camillus's, but it belongs to the later moment of confronting Brennus, not to the Falerian episode."}, {"text": "'A great general should rely on his own virtue, and not on other men's vices.'", "isCorrect": true, "rationale": "This is precisely the line Plutarch reports at the Falerian scene, and it functions as the moral key to his Camillus."}, {"text": "'War is the father of all things.'", "isCorrect": false, "rationale": "This is a fragment of Heraclitus and is not in Plutarch's Camillus."}], "id": "q06"}, {"question": "What caused Camillus's exile from Rome?", "options": [{"text": "He was overthrown in a popular revolution led by the tribunes.", "isCorrect": false, "rationale": "There was no such revolution; what happened was a specific accusation and Camillus's decision to leave rather than stand trial."}, {"text": "He insisted that Apollo's tenth share of the Veian booty be paid even after the soldiers had pocketed it, and opposed the tribunes' popular proposal to relocate half of Rome to the empty Veii; an accusation that he had appropriated Etruscan bronze gates then triggered his choice of exile over trial.", "isCorrect": true, "rationale": "The text names exactly these three causes: the Apollo-share enforcement, the opposition to the Veii relocation, and the trumped-up bronze-gates accusation that he chose not to contest by standing trial."}, {"text": "He surrendered Rome to the Gauls without resistance.", "isCorrect": false, "rationale": "The Gauls came after Camillus had already been exiled, and the Roman defeat at the Allia was under different commanders."}, {"text": "He attempted to make himself king.", "isCorrect": false, "rationale": "No such attempt is in the record; the political conflict was over Veii's spoils, the relocation plan, and the alleged graft."}], "id": "q07"}, {"question": "What did Camillus do during his exile in Ardea, and how was he recalled?", "options": [{"text": "He waited in private retirement and made no military move.", "isCorrect": false, "rationale": "He acted before any formal recall — leading the Ardeans on a night attack against the Gauls' camp."}, {"text": "He betrayed Rome by joining the Gauls.", "isCorrect": false, "rationale": "He did the opposite — he organized a night attack on the Gauls from his Latin-city exile."}, {"text": "He led the Ardeans on a night attack against the Gauls' camp, killing many; the news reached the Romans hiding on the Capitol, who sent secretly to ask him to take command of the relief force.", "isCorrect": true, "rationale": "Plutarch describes Camillus's Ardean night attack, the news reaching the Capitoline defenders, and the secret embassy from Rome asking him to take command."}, {"text": "He bought back Rome with his own personal fortune.", "isCorrect": false, "rationale": "The ransom moment belongs later in the narrative; Camillus's Ardean action is military, not financial."}], "id": "q08"}, {"question": "What does the Second Witness Livy add to Plutarch's account of the Gallic Sack?", "options": [{"text": "He denies the sack ever occurred and treats it as later Roman myth.", "isCorrect": false, "rationale": "Livy treats the sack as one of the great historical episodes; he does not deny it."}, {"text": "He gives Brennus the famous line 'Vae victis' (Woe to the conquered) when Brennus throws his sword onto the rigged scale weighing the ransom gold, and renders the great speech of Camillus against relocation to Veii in extended direct quotation.", "isCorrect": true, "rationale": "The text identifies both Livy specialties: the Vae victis line at the gold-weighing scene and the long direct-quotation oration against the move to Veii that Plutarch only summarizes."}, {"text": "He attributes the recovery of Rome to a Spartan rescue.", "isCorrect": false, "rationale": "Livy attributes the recovery to Camillus, in agreement with Plutarch."}, {"text": "He omits the geese of the Capitol from his account.", "isCorrect": false, "rationale": "The geese-of-the-Capitol episode is in Livy's set-piece and is among the famous moments the text recommends watching for."}], "id": "q09"}, {"question": "How did Camillus prevent the abandonment of Rome after the Gallic Sack?", "options": [{"text": "By delivering a great speech (extensively quoted in Livy, summarized by Plutarch) on the holy ground of Rome, after which a centurion's casual remark 'standard-bearer, fix your standard here' was overheard, taken as an omen, and the assembly resolved to stay; the rebuilding earned him the title second founder of Rome.", "isCorrect": true, "rationale": "Plutarch describes the long speech (which Livy quotes at length), the centurion's overheard remark taken as an omen, the resolution to stay, the hasty rebuilding, and the title of second founder."}, {"text": "By burning the gates of Veii so that no Roman could relocate there.", "isCorrect": false, "rationale": "No gate burning is in the text; the prevention is rhetorical and ritual, not destructive."}, {"text": "By executing the tribunes who proposed the relocation.", "isCorrect": false, "rationale": "There is no execution of tribunes; the issue was settled by speech, omen, and assembly vote."}, {"text": "By moving the entire city to a new site on the Tiber.", "isCorrect": false, "rationale": "The entire point is that Rome stayed on its original site; the second founder built it back where it was."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
