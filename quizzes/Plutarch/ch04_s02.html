    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Life of Solon</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Solon evade the Athenian death-penalty law against proposing renewed war for Salamis?", "options": [{"text": "He bribed the herald to read his proposal anonymously", "isCorrect": false, "rationale": "Solon used a public performance, not bribery; the gesture was deliberately visible."}, {"text": "He pretended to have lost his wits, wore a madman's cap, and recited a hundred-line elegiac poem in the marketplace", "isCorrect": true, "rationale": "Madmen were exempt from the law's reach. The poem 'I am a herald come from Salamis the fair' inflamed Athenian sentiment and prompted them to revoke the law."}, {"text": "He persuaded the assembly to repeal the law through a long prose speech", "isCorrect": false, "rationale": "His act was a poem performed under feigned madness, not a prose speech."}, {"text": "He waited until the law's sponsors had died, then proposed openly", "isCorrect": false, "rationale": "The political moment required immediate action; Solon's stratagem worked on the living assembly."}], "id": "q01"}, {"question": "What was the seisachtheia, and what did it accomplish?", "options": [{"text": "An equal redistribution of all Athenian land, in the Spartan manner", "isCorrect": false, "rationale": "Solon explicitly refused this; the poor wanted it, but Solon would not redistribute property."}, {"text": "A cancellation of all existing debts of the poor and the abolition of debt-bondage going forward", "isCorrect": true, "rationale": "Plutarch's gloss: 'the shaking-off-of-burdens.' No Athenian could ever again be enslaved for failing to pay what he owed."}, {"text": "A new tax on the wealthy to fund public works", "isCorrect": false, "rationale": "The seisachtheia worked at the level of debt and bondage, not taxation."}, {"text": "An expansion of the Athenian military by drafting the indebted poor", "isCorrect": false, "rationale": "The reform freed the debtors, it did not conscript them."}], "id": "q02"}, {"question": "What did three of Solon's friends — Conon, Clinias, and Hipponicus — do that nearly destroyed his reputation?", "options": [{"text": "They opposed the seisachtheia publicly in the assembly", "isCorrect": false, "rationale": "Their betrayal was private exploitation of inside information, not public opposition."}, {"text": "They used inside knowledge of the coming debt cancellation to borrow large sums, buy farms, and keep both the land and the money", "isCorrect": true, "rationale": "The scandal nearly undid Solon's standing. He cleared his name by proving he had himself been a victim of his own law — forgiving five talents of personal debts owed to him."}, {"text": "They voted to make Solon tyrant against his wishes", "isCorrect": false, "rationale": "Solon was offered tyranny, but not by these specific friends in this incident."}, {"text": "They invited Pisistratus to seize the citadel", "isCorrect": false, "rationale": "Pisistratus's coup came decades later, after Solon had returned from exile."}], "id": "q03"}, {"question": "How did Solon clear himself of the suspicion raised by his friends' speculation?", "options": [{"text": "He had the three friends executed", "isCorrect": false, "rationale": "Solon did not execute them; he demonstrated his own honesty by personal sacrifice."}, {"text": "He released his own debtors of five talents, proving he had not played the same angle his friends had", "isCorrect": true, "rationale": "The five-talent forgiveness showed Solon had been a victim, not a beneficiary, of inside knowledge. The chapter calls this the lesson: 'when you legislate against private gain, you must be the first to forgo it yourself.'"}, {"text": "He left Athens immediately", "isCorrect": false, "rationale": "The ten-year departure came later, after the laws were complete."}, {"text": "He returned the friends' purchased land to its former owners by force", "isCorrect": false, "rationale": "Plutarch records that the friends 'kept the possessions, and would not return the money'; Solon could not force return."}], "id": "q04"}, {"question": "How did Solon's four property classes (Pentacosiomedimni, Hippeis, Zeugitae, Thetes) organize Athenian political rights?", "options": [{"text": "Citizens were sorted by birth into hereditary classes with fixed political roles", "isCorrect": false, "rationale": "The sorting was by annual yield of land, not by birth — citizens could move classes as their income changed."}, {"text": "Only the top class voted; the lowest three were excluded from politics entirely", "isCorrect": false, "rationale": "The thetes could vote in the assembly and sit as jurors; they were not excluded."}, {"text": "Citizens were graded by annual income; civic offices were graded by class, but even the thetes voted in the assembly and sat as jurors", "isCorrect": true, "rationale": "The point was to grade political power by stake in the city without excluding anyone entirely. The right of thetes to sit on juries became the engine of later Athenian democracy."}, {"text": "All four classes had identical political rights from the start", "isCorrect": false, "rationale": "Rights were graded by class — only the top classes could hold higher offices."}], "id": "q05"}, {"question": "Why did Solon depart Athens for ten years after his laws were enacted?", "options": [{"text": "He was exiled by the assembly for the seisachtheia", "isCorrect": false, "rationale": "The departure was voluntary, requested by Solon himself; the assembly agreed."}, {"text": "He left to wage further war against Megara", "isCorrect": false, "rationale": "There is no record of a renewed Megara campaign; the travel was civilian."}, {"text": "He understood that as long as he was the visible authority behind his laws, they could not develop their own authority — the city had to own them", "isCorrect": true, "rationale": "Plutarch shows Solon being constantly petitioned for clarifications. He withdrew so the laws could stand on their own, not on his interpretation."}, {"text": "He sought wealth abroad to recover his family estate", "isCorrect": false, "rationale": "Solon's travel was already merchant in nature, but his stated reason for the ten-year departure was the laws' independence."}], "id": "q06"}, {"question": "What was Solon's famous reply to Croesus when the Lydian king asked who was the happiest man?", "options": [{"text": "That Croesus himself was, because of his wealth", "isCorrect": false, "rationale": "Solon explicitly refused to flatter Croesus; this is the point of the encounter."}, {"text": "That no one's life could be called happy until it had ended", "isCorrect": true, "rationale": "Plutarch treats this as one of the great sentences of Greek wisdom — and the synkrisis uses it as a measure against Solon himself in Section 4."}, {"text": "That happiness was wealth combined with power", "isCorrect": false, "rationale": "This is closer to Croesus's own view, which Solon disputed."}, {"text": "That only philosophers could be truly happy", "isCorrect": false, "rationale": "Solon's maxim is about the unfinished character of any life still being lived, not about philosophers specifically."}], "id": "q07"}, {"question": "What did Solon find on his return to Athens at the end of his life?", "options": [{"text": "His laws being faithfully enforced by a grateful citizenry", "isCorrect": false, "rationale": "He returned to find his cousin Pisistratus maneuvering toward tyranny."}, {"text": "His cousin Pisistratus seizing power as tyrant; Solon's warnings to the assembly went unheeded", "isCorrect": true, "rationale": "Pisistratus seized the citadel in 561 BC. Solon laid down his arms, saying he had been more constant than the rest of the city, and died shortly after."}, {"text": "Athens at peace under a restored monarchy", "isCorrect": false, "rationale": "Athens did not restore a monarchy; the tyranny of Pisistratus operated within the Solonian constitution."}, {"text": "His city overrun by Megara", "isCorrect": false, "rationale": "The Megara war was settled long before; Solon's return crisis was internal."}], "id": "q08"}, {"question": "Plutarch says Solon disappointed both extremes of his city. What did each extreme want that he refused?", "options": [{"text": "The poor wanted full debt cancellation; the rich wanted full debt enforcement", "isCorrect": false, "rationale": "Solon did cancel debts; this option misstates what each side wanted."}, {"text": "The poor wanted full redistribution of the land (Spartan-style equality); the rich wanted preservation of their debt claims and full property", "isCorrect": true, "rationale": "Solon refused both maxima: he abolished debt-slavery but did not redistribute property. Plutarch's verdict: he gave Athens not the best possible laws but 'the best they could receive.'"}, {"text": "The poor wanted Lycurgus as their lawgiver; the rich wanted Numa", "isCorrect": false, "rationale": "Neither side wanted a different lawgiver — Solon was the only acceptable choice to both."}, {"text": "The poor wanted democracy; the rich wanted oligarchy", "isCorrect": false, "rationale": "Those terms come later; the specific demand was redistribution versus debt preservation."}], "id": "q09"}, {"question": "Which Solonian law about civic engagement was especially unusual, and what did it require?", "options": [{"text": "A law forbidding any Athenian from holding office twice", "isCorrect": false, "rationale": "Solon did not generally restrict repeated officeholding in this way."}, {"text": "A law disenfranchising any citizen who remained neutral during a political crisis", "isCorrect": true, "rationale": "Solon thought the city had no right to ask its citizens for ordinary loyalty if they were going to sit out the moment of greatest need. This is one of his most distinctive and provocative laws."}, {"text": "A law requiring every Athenian to serve as a juror at least once per year", "isCorrect": false, "rationale": "Jury service became central later, but this is not the unusual law named in the chapter."}, {"text": "A law banning marriage between the four property classes", "isCorrect": false, "rationale": "Solon did not impose inter-class marriage bans; in fact he abolished dowries to promote marriages of affection."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
