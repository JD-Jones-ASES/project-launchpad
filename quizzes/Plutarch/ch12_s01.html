    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; Plutarch in Shakespeare</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which 1579 publication first made the complete Parallel Lives available to English readers?", "options": [{"text": "Jacques Amyot's French Vies des hommes illustres", "isCorrect": false, "rationale": "Amyot's French translation appeared in 1559 and served as North's source, but it was not in English."}, {"text": "Sir Thomas North's The Lives of the Noble Grecians and Romans Compared Together", "isCorrect": true, "rationale": "North published the first complete English Parallel Lives in 1579, translating from Amyot's French rather than the Greek."}, {"text": "The Langhorne brothers' translation", "isCorrect": false, "rationale": "The Langhornes' version appeared in 1770, almost two centuries later, and was used by American Founders rather than Elizabethans."}, {"text": "Erasmus's Apophthegmata", "isCorrect": false, "rationale": "Erasmus's Apophthegmata drew on Plutarch's Moralia, not the Parallel Lives, and was a Latin work for Christian humanists."}], "id": "q01"}, {"question": "From which language did Sir Thomas North actually translate Plutarch?", "options": [{"text": "Greek, working directly from manuscripts", "isCorrect": false, "rationale": "North did not work from the Greek; the text notes this explicitly."}, {"text": "Latin, from a Renaissance humanist edition", "isCorrect": false, "rationale": "Latin translations existed by mid-sixteenth century, but North used a different intermediary."}, {"text": "French, from Jacques Amyot's 1559 version", "isCorrect": true, "rationale": "North translated from Amyot's 1559 French Plutarch, producing his vigorous English from a French intermediary."}, {"text": "Italian, from a Florentine humanist", "isCorrect": false, "rationale": "Italian humanists like Petrarch began the recovery of Plutarch, but North's direct source was Amyot's French."}], "id": "q02"}, {"question": "Which three Shakespeare plays are drawn almost line-for-line from Plutarch?", "options": [{"text": "Hamlet, Macbeth, and Othello", "isCorrect": false, "rationale": "These are the great tragedies but their sources are Saxo Grammaticus, Holinshed, and Cinthio, not Plutarch."}, {"text": "Julius Caesar, Antony and Cleopatra, and Coriolanus", "isCorrect": true, "rationale": "These three Roman plays draw their events, scenes, and moral architecture from Plutarch; Shakespeare contributed the poetry."}, {"text": "Henry V, Richard III, and King John", "isCorrect": false, "rationale": "Shakespeare's English history plays draw chiefly from Holinshed's Chronicles."}, {"text": "The Tempest, A Midsummer Night's Dream, and Timon of Athens", "isCorrect": false, "rationale": "Theseus appears in Midsummer and Timon draws on a brief notice in Plutarch's Antony, but these are not the line-for-line Plutarchan plays."}], "id": "q03"}, {"question": "Which famous Shakespearean speech is identified as one of the most striking single instances of borrowing from Plutarch?", "options": [{"text": "Hamlet's \"To be or not to be\"", "isCorrect": false, "rationale": "Hamlet's soliloquies have no Plutarchan source; Hamlet itself shows Plutarchan habit only in its structural pairing with Fortinbras."}, {"text": "Mark Antony's funeral oration in Julius Caesar III.ii.74-251", "isCorrect": true, "rationale": "Shakespeare expanded the brief notice Plutarch gives the speech into a sustained masterpiece of political rhetoric — the expansion is one of the great moments of literary creation, but the seed is Plutarch's."}, {"text": "Macbeth's \"Tomorrow and tomorrow\"", "isCorrect": false, "rationale": "Macbeth derives from Holinshed, not Plutarch."}, {"text": "Polonius's advice to Laertes", "isCorrect": false, "rationale": "Polonius's speech is Shakespeare's invention and has no Plutarchan parallel."}], "id": "q04"}, {"question": "Whose set-piece description of Cleopatra does Enobarbus's \"The barge she sat in\" speech transpose into iambic pentameter?", "options": [{"text": "Virgil's, from the Aeneid", "isCorrect": false, "rationale": "Virgil's Dido is a distant cousin in literary memory, but the source for the barge passage is Plutarch."}, {"text": "Plutarch's, from the Life of Antony", "isCorrect": true, "rationale": "The famous description (II.ii.196-225) is Plutarch's set piece transposed into iambic pentameter with hardly an alteration of fact."}, {"text": "Suetonius's, from the Life of Caesar", "isCorrect": false, "rationale": "Suetonius wrote a Life of Caesar but not the celebrated description of Cleopatra's barge."}, {"text": "Cassius Dio's, from the Roman History", "isCorrect": false, "rationale": "Cassius Dio is a source for the late Republic but not for Enobarbus's barge speech."}], "id": "q05"}, {"question": "In Coriolanus, which Plutarchan scene from Chapter 7 does Shakespeare translate almost literally?", "options": [{"text": "The duel with Aufidius", "isCorrect": false, "rationale": "The Coriolanus-Aufidius duel is dramatized differently and is not the close-translation scene noted."}, {"text": "Volumnia kneeling before her son at the gates of Rome", "isCorrect": true, "rationale": "The scene read in section 7.3 — Volumnia's plea at the gates — is rendered as a Shakespearean translation of Plutarch in something close to the literal sense."}, {"text": "Coriolanus's exile from Rome", "isCorrect": false, "rationale": "The exile is dramatized but is not the scene the text highlights as a literal translation."}, {"text": "The vote of the tribunes against Coriolanus", "isCorrect": false, "rationale": "The tribunes' scene is in the play but is not the scene that the chapter identifies as a near-literal translation."}], "id": "q06"}, {"question": "What kind of literary additions does Shakespeare contribute to Julius Caesar that are NOT in Plutarch?", "options": [{"text": "The conspiracy and the assassination scene", "isCorrect": false, "rationale": "The conspiracy, Senate scene, and assassination all come from Plutarch."}, {"text": "Brutus's hesitation and refusal to silence Antony", "isCorrect": false, "rationale": "The core moral arguments, including Brutus's hesitations, are Plutarch's."}, {"text": "Calpurnia's dream, the supernatural storm omens, and Caesar's ghost", "isCorrect": true, "rationale": "Shakespeare's most famous additions are theatrical: Calpurnia's dream, the supernatural omens in the storm, and the appearance of Caesar's ghost to Brutus before Philippi."}, {"text": "Brutus's death at Philippi", "isCorrect": false, "rationale": "Brutus's self-killing at Philippi comes directly from Plutarch's framework."}], "id": "q07"}, {"question": "How does the chapter contrast Plutarch's Antony with Shakespeare's Antony?", "options": [{"text": "Plutarch idealizes Antony as a Roman hero, while Shakespeare condemns him", "isCorrect": false, "rationale": "Neither writer simply idealizes or condemns; the contrast is more subtle."}, {"text": "Plutarch's Antony is brought down by his weakness for a woman; Shakespeare's brings his world down with him", "isCorrect": true, "rationale": "The text notes the two readings are compatible but not identical: Plutarch shows a man undone by a passion; Shakespeare adds tragic interiority that drags a world down."}, {"text": "Plutarch describes Antony's military victories; Shakespeare describes only his defeats", "isCorrect": false, "rationale": "Both narrate the full arc; the difference is interpretive, not selective."}, {"text": "Plutarch makes Antony purely comic; Shakespeare makes him tragic", "isCorrect": false, "rationale": "Plutarch's Antony is not comic; he is the brilliant ruined man, treated seriously."}], "id": "q08"}, {"question": "What does the chapter identify as a \"Plutarchan habit\" structuring even Shakespeare's non-Roman plays?", "options": [{"text": "Use of soliloquies to reveal character", "isCorrect": false, "rationale": "Soliloquies are Shakespeare's own theatrical invention, not particularly Plutarchan."}, {"text": "The five-act structure", "isCorrect": false, "rationale": "Five-act structure derives from Roman comedy and Renaissance dramatic theory, not from Plutarch."}, {"text": "Comparing two historical figures across an entire play", "isCorrect": true, "rationale": "The structural method — Hamlet vs. Fortinbras, Henry V vs. the French king — is, at its root, a Plutarchan habit of paired comparison."}, {"text": "Setting plays in ancient Rome", "isCorrect": false, "rationale": "Setting alone is not a Plutarchan habit; the habit is comparison."}], "id": "q09"}, {"question": "According to the section, what does a student gain by reading Plutarch alongside the corresponding Shakespeare play?", "options": [{"text": "A complete factual contradiction between the two writers", "isCorrect": false, "rationale": "The two writers do not contradict each other — they complete each other."}, {"text": "A sense that Plutarch tells what people did and Shakespeare what they felt", "isCorrect": true, "rationale": "The chapter states this directly: \"Plutarch will tell you what people did; Shakespeare will give you what people felt. Each completes the other.\""}, {"text": "Modern political commentary on Elizabethan England", "isCorrect": false, "rationale": "The paired reading is a literary and moral exercise, not a political commentary."}, {"text": "An understanding of Elizabethan stagecraft", "isCorrect": false, "rationale": "Stagecraft can be learned elsewhere; the value of paired reading is in moral and historical insight."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
