    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Plutarch: Lives in Parallel &mdash; The Comparison</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Plutarch's overall verdict in the Solon-Publicola synkrisis?", "options": [{"text": "Plutarch ranks Solon decisively above Publicola", "isCorrect": false, "rationale": "The reverse is true: this is one of Plutarch's most one-sided verdicts, and it tilts toward Publicola."}, {"text": "Plutarch ranks Publicola above Solon on almost every measure, calling this 'the most one-sided' verdict in the book", "isCorrect": true, "rationale": "The chapter explicitly notes the unusual decisiveness of the judgment. Publicola wins more rounds than Solon, though Solon retains credit for original political invention."}, {"text": "Plutarch declares the two men equal", "isCorrect": false, "rationale": "Plutarch arrives at a clear preference, not a tie."}, {"text": "Plutarch declines to render any verdict", "isCorrect": false, "rationale": "Plutarch's synkrisis is a sustained piece of comparative judgment, not a refusal to decide."}], "id": "q01"}, {"question": "How does Plutarch use Solon's own saying about Croesus as a measure of the two men?", "options": [{"text": "He uses it to praise Solon's modesty and Publicola's pride", "isCorrect": false, "rationale": "Plutarch turns the saying against Solon, not in his favor."}, {"text": "He measures both men by whether their lives ended well — Publicola died in office, mourned by all Rome; Solon died in exile, having watched his constitution overturned. Round one to Publicola", "isCorrect": true, "rationale": "The reflexive move is striking: Plutarch applies Solon's own maxim ('no one happy until life ends well') to Solon himself, and finds him outscored by Publicola."}, {"text": "He concludes neither man can be judged by Solon's saying", "isCorrect": false, "rationale": "Plutarch explicitly uses the saying as a measure and renders a verdict."}, {"text": "He uses it only as a transition to other matters", "isCorrect": false, "rationale": "The saying does real work — it generates Plutarch's first axis of comparison."}], "id": "q02"}, {"question": "Which axis of comparison does Solon decisively win, in Plutarch's view?", "options": [{"text": "Military and political effectiveness", "isCorrect": false, "rationale": "Plutarch awards this round to Publicola, who won major battles and 'utterly subverted and dissolved a potent monarchy.'"}, {"text": "The cancellation of debts (seisachtheia) — an original act of civic legislation without parallel in the early Mediterranean", "isCorrect": true, "rationale": "Plutarch writes: 'A mere law to give all men equal rights is but useless if the poor must sacrifice those rights to their debts.' Solon understood property as a political reality; Publicola did not face the same problem and did not enact a comparable reform."}, {"text": "Wealth honestly used", "isCorrect": false, "rationale": "Plutarch gives this round to Publicola, whose wealth was 'not only justly his, but he spent it nobly in doing good to the distressed.'"}, {"text": "Happiness in death", "isCorrect": false, "rationale": "Publicola wins on the measure of death and city's gratitude."}], "id": "q03"}, {"question": "Why does Plutarch grant Solon the round on 'originality and dependence'?", "options": [{"text": "Solon was the older man chronologically", "isCorrect": false, "rationale": "Age alone is not the basis; the point is that Solon invented the constitution from nothing."}, {"text": "Solon 'was entirely original, and followed no man's example,' while Publicola consciously imitated Solon's elective offices, the right of appeal, and the institution of treasurers", "isCorrect": true, "rationale": "This is one of the few places in the Parallel Lives where the pair are linked by actual historical influence — the Roman of the late sixth century was reading the Greek of the early sixth and copying him deliberately."}, {"text": "Solon wrote his own laws in poetry, which Publicola could not match", "isCorrect": false, "rationale": "Plutarch quotes Solon's poems but does not award originality on the basis of literary form."}, {"text": "Publicola refused to acknowledge any model", "isCorrect": false, "rationale": "The opposite is true — Publicola's imitation of Solon is explicit, and Plutarch makes Publicola's debt clear."}], "id": "q04"}, {"question": "On the axis of 'the endurance of the work,' which man wins, and why?", "options": [{"text": "Solon wins because his laws lasted through the classical period", "isCorrect": false, "rationale": "Solon's constitution ran under a tyrant's permission within a generation; Plutarch is critical on this measure."}, {"text": "Publicola wins: he stayed in Rome and saw his constitution survive every challenge in his lifetime, and Plutarch can say 'maintained the state in good order down to the civil wars'", "isCorrect": true, "rationale": "Solon left Athens after his laws were complete; within a generation Pisistratus had seized the citadel. Publicola stayed — Plutarch can speak with three centuries of hindsight about the durability of his work."}, {"text": "Neither man's work endured into the next century", "isCorrect": false, "rationale": "Publicola's work endured for centuries; Plutarch explicitly says so."}, {"text": "Plutarch refuses to judge the endurance question", "isCorrect": false, "rationale": "Plutarch judges it decisively in favor of Publicola."}], "id": "q05"}, {"question": "Plutarch defends Publicola's peace with Lars Porsenna — ceding some territory — by what principle?", "options": [{"text": "That all peace is preferable to all war", "isCorrect": false, "rationale": "The principle is more specific: judgment relative to circumstances, not pacifism in general."}, {"text": "'Judgment is to be made of actions according to the times' — by foregoing a part, Publicola saved the whole", "isCorrect": true, "rationale": "Plutarch sympathizes with political compromise as a virtue when the times require it. The peace saved Rome at the cost of some territory; the trade was prudent, not humiliating."}, {"text": "That Porsenna deserved the territory by right", "isCorrect": false, "rationale": "Plutarch does not endorse Porsenna's claim; he defends Publicola's prudence."}, {"text": "That Romans had no further interest in the ceded land", "isCorrect": false, "rationale": "The land was previously Roman possession; the point is that yielding it saved more important things."}], "id": "q06"}, {"question": "How does Plutarch frame the difference between Solon's refusal of tyranny and Publicola's conversion of consular power?", "options": [{"text": "Solon refused power; Publicola accepted limited power and made it more limited", "isCorrect": true, "rationale": "The chapter explicitly distinguishes: Solon's refusal was great, but Publicola did even more — taking what Plutarch calls a 'despotic command' (the consulship before its powers were constrained) and converting it to a popular office. Round to Publicola."}, {"text": "Both men accepted absolute power and then renounced it", "isCorrect": false, "rationale": "Solon refused absolute power outright; he did not first accept and then renounce."}, {"text": "Solon accepted limited power; Publicola refused all power", "isCorrect": false, "rationale": "The roles are reversed in this option."}, {"text": "Both men refused all power and worked privately", "isCorrect": false, "rationale": "Publicola was four-time consul; he did not refuse to hold office."}], "id": "q07"}, {"question": "What does Plutarch mean when he says the Solon-Publicola synkrisis is uniquely 'reflexive'?", "options": [{"text": "Both men wrote poems about themselves", "isCorrect": false, "rationale": "Solon wrote about himself, but Plutarch's reflexivity claim is about influence, not literary self-reference."}, {"text": "Publicola was conscious that he was working in Solon's tradition; his constitution was a deliberate Roman adaptation of the Solonian Athenian model — one of the few cases where the pair are linked by historical influence and not just Plutarchan juxtaposition", "isCorrect": true, "rationale": "Plutarch's opening sentence of the synkrisis: 'There is something singular in the present parallel, which has not occurred in any other of the lives; that the one should be the imitator of the other, and the other his best evidence.'"}, {"text": "Plutarch comments on his own method in this synkrisis more than usual", "isCorrect": false, "rationale": "Plutarch's reflexivity is about the historical relation between the two men, not about his own method."}, {"text": "Both men's lives ended in 503 BC", "isCorrect": false, "rationale": "Solon died about 559 BC; only Publicola died in 503 BC."}], "id": "q08"}, {"question": "Plutarch's final summary distinction between Solon and Publicola can best be paraphrased as which of the following?", "options": [{"text": "Solon was the better military commander; Publicola the better legislator", "isCorrect": false, "rationale": "On military matters Plutarch favors Publicola, not Solon."}, {"text": "Solon was the greater inventor; Publicola the greater executor — Solon designed the form, Publicola made it work in practice", "isCorrect": true, "rationale": "This is the chapter's own paraphrase of Plutarch's overall judgment: 'The verdict is something like — Solon was the greater inventor; Publicola the greater executor.' Together they constitute the beginnings of republican government in the Western tradition."}, {"text": "Solon was the harsher man; Publicola the more merciful", "isCorrect": false, "rationale": "Plutarch's distinction is about invention versus execution, not severity versus mercy."}, {"text": "Solon was the older man; Publicola the wealthier", "isCorrect": false, "rationale": "These are biographical incidentals, not the chapter's central comparison."}], "id": "q09"}, {"question": "What does the chapter say about three themes that will recur in later Lives?", "options": [{"text": "Only the figure of Brutus the Liberator returns later, in Chapter 11", "isCorrect": false, "rationale": "Three themes are named explicitly, not just one."}, {"text": "The republican refusal of one-man rule (tested by Themistocles, Pericles, and Caesar), the figure of Brutus the Liberator (returning in Marcus Brutus, Chapter 11), and the Solonian distinction between property classes as the foundation of later Athenian reform", "isCorrect": true, "rationale": "The chapter names exactly these three forward-looking threads as the framework for reading the next several Lives."}, {"text": "Only the property-class distinction recurs", "isCorrect": false, "rationale": "All three themes are named, including the recurring tests of one-man rule."}, {"text": "None of the themes recur — the chapter is self-contained", "isCorrect": false, "rationale": "The chapter is deliberately forward-pointing and identifies the themes that recur."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
