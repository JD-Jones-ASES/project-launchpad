<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A school implements a new policy requiring all students to wear a uniform. Breaking this policy might result in a detention. Based on the provided text, what is this uniform policy an example of?", "options": [{"text": "A custom, because it is a tradition followed by many schools.", "isCorrect": false, "rationale": "A custom is a tradition or habit not enforced by the government. A school uniform policy is a stated expectation with consequences, making it a rule, not a custom."}, {"text": "A rule, because it is a stated expectation in a particular setting with consequences that are not legal punishments.", "isCorrect": true, "rationale": "The text defines a rule as 'a stated expectation in a particular setting' with non-legal consequences like detention, which perfectly describes a school uniform policy."}, {"text": "A law, because all students in the school territory must follow it.", "isCorrect": false, "rationale": "A law is made by a government with the authority to enforce it using courts, fines, and police. A school is not a government in this context, and detention is not a legal punishment."}, {"text": "An ordinance, because it is a regulation made by a local authority.", "isCorrect": false, "rationale": "An ordinance is a law made by a local government (city or county), not a school administration."}], "id": "q01"}, {"question": "Which of the following scenarios is most clearly an example of breaking a 'law' rather than just a 'rule' or 'custom'?", "options": [{"text": "Walking past someone in line without acknowledging them.", "isCorrect": false, "rationale": "This is an example of rude behavior, which relates to a custom (good manners), not a law, as noted in the text's examples."}, {"text": "Being benched from a game for arguing with the referee.", "isCorrect": false, "rationale": "Being benched is a consequence for breaking a 'game rule,' which falls under the definition of a rule, not a law."}, {"text": "Receiving a fine for exceeding the posted speed limit on a state highway.", "isCorrect": true, "rationale": "Speed limits on state highways are examples of 'state laws' mentioned in the text. Receiving a fine is a legal punishment for breaking a law."}, {"text": "Receiving detention for using a cell phone in class during a lecture.", "isCorrect": false, "rationale": "This is a consequence for breaking a 'classroom rule,' which falls under the definition of a rule, not a law."}], "id": "q02"}, {"question": "If the U.S. Congress passes legislation establishing new requirements for product safety nationwide, this would be an example of a:", "options": [{"text": "Local ordinance", "isCorrect": false, "rationale": "Local ordinances are made by city or county governments and apply only locally, not nationwide."}, {"text": "State statute", "isCorrect": false, "rationale": "State statutes are passed by state legislatures and apply only within one state, not nationwide."}, {"text": "Federal statute", "isCorrect": true, "rationale": "The text states that 'Federal laws (statutes) apply everywhere in the United States. Congress passes them and the President signs them.' Product safety is a common federal regulatory area."}, {"text": "Constitutional amendment", "isCorrect": false, "rationale": "A constitutional amendment is a change to the U.S. Constitution itself, not a regular law passed by Congress, although laws must comply with it."}], "id": "q03"}, {"question": "A city council in San Antonio votes to implement a new noise ordinance, specifying quiet hours for residential areas. This type of law applies only within San Antonio and is created by the local government. What is the specific term for this kind of law?", "options": [{"text": "Federal statute", "isCorrect": false, "rationale": "Federal statutes are passed by Congress and apply nationwide."}, {"text": "State statute", "isCorrect": false, "rationale": "State statutes are passed by state legislatures and apply throughout the state."}, {"text": "Ordinance", "isCorrect": true, "rationale": "The text defines an 'ordinance' as 'a law made by a local government (city or county),' and provides 'noise ordinances' as an example."}, {"text": "Custom", "isCorrect": false, "rationale": "A custom is a tradition or habit not enforced by the government. An ordinance is a formal, enforced law."}], "id": "q04"}, {"question": "According to the 'Hierarchy of Law' principle, what happens if a state statute conflicts with a local ordinance on the same matter?", "options": [{"text": "The local ordinance takes precedence because it is more specific to the community.", "isCorrect": false, "rationale": "The hierarchy states that if a lower law conflicts with a higher one, the higher one wins. Local ordinances are the lowest in the hierarchy."}, {"text": "The state statute takes precedence because it is higher in the order of authority.", "isCorrect": true, "rationale": "The text explicitly states: 'If a lower law conflicts with a higher one, the higher one wins.' State statutes are higher than local ordinances in the enumerated hierarchy."}, {"text": "Neither law takes precedence; the matter must be decided by a federal court.", "isCorrect": false, "rationale": "The hierarchy of law provides a clear resolution mechanism without automatically requiring federal court intervention for every conflict between state and local laws."}, {"text": "The U.S. Constitution takes precedence over both, rendering them both invalid.", "isCorrect": false, "rationale": "While the Constitution is the highest law, it doesn't automatically invalidate all conflicting lower laws. The specific conflict between a state statute and local ordinance is resolved by their respective positions in the hierarchy."}], "id": "q05"}, {"question": "A new law is passed that allows police to enforce a curfew only against teenagers wearing certain types of clothing. This law would most likely be considered unjust because it violates which standard for a good law?", "options": [{"text": "Serve the common good", "isCorrect": false, "rationale": "While such a law might not serve the common good, its most direct violation is unequal application based on arbitrary characteristics."}, {"text": "Be publicly known", "isCorrect": false, "rationale": "The issue is not whether the law is known, but how it is applied based on its content."}, {"text": "Apply equally to everyone", "isCorrect": true, "rationale": "The text states a good law must 'Apply equally to everyone (not just to some people).' Enforcing a curfew based on clothing types directly violates this principle by not applying universally."}, {"text": "Be enforced consistently", "isCorrect": false, "rationale": "Consistent enforcement means the same action gets the same response. This law's problem is in its unequal *application* to different groups from the outset, rather than inconsistent enforcement of a universally applicable rule."}], "id": "q06"}, {"question": "The Founders believed that a good law should 'Serve the common good.' This means the law should primarily:", "options": [{"text": "Benefit the government that created it.", "isCorrect": false, "rationale": "Serving the common good implies benefiting the community, not just the government."}, {"text": "Be easy for citizens to understand and follow.", "isCorrect": false, "rationale": "While clarity is important for a law to be 'publicly known,' 'serving the common good' specifically refers to the law's beneficial impact on the community."}, {"text": "Help the entire community, not just a select few individuals or groups.", "isCorrect": true, "rationale": "The text defines 'Serve the common good' as meaning 'help the community, not just a few people.'"}, {"text": "Generate significant revenue through fines or taxes.", "isCorrect": false, "rationale": "Generating revenue is not the primary measure of a law serving the common good; the benefit to the community is."}], "id": "q07"}, {"question": "What is the highest law in the land, according to the hierarchy presented in the text?", "options": [{"text": "Federal statutes and treaties", "isCorrect": false, "rationale": "Federal statutes and treaties are high in the hierarchy but are subordinate to the U.S. Constitution."}, {"text": "State constitutions", "isCorrect": false, "rationale": "State constitutions are below federal statutes and treaties, and ultimately below the U.S. Constitution."}, {"text": "The U.S. Constitution", "isCorrect": true, "rationale": "The text explicitly lists the 'U.S. Constitution (highest law in the land)' as the top item in the Hierarchy of Law."}, {"text": "Local ordinances", "isCorrect": false, "rationale": "Local ordinances are listed as the lowest in the hierarchy of law."}], "id": "q08"}, {"question": "If citizens believe a law is unjust because it is not being enforced consistently, what actions are suggested in the text for them to take?", "options": [{"text": "Ignore the law until it is enforced uniformly.", "isCorrect": false, "rationale": "Ignoring a law is not a suggested method for change and could lead to legal consequences."}, {"text": "Speak out, vote for change, and work peacefully to reform unjust laws.", "isCorrect": true, "rationale": "The text states that 'When laws fail to meet these standards, citizens have the right to speak out, vote for change, and... work peacefully to reform unjust laws.'"}, {"text": "Immediately engage in civil disobedience to protest the inconsistency.", "isCorrect": false, "rationale": "While civil disobedience can be a form of protest, the text specifically suggests speaking out, voting, and peaceful reform, without immediately advocating for civil disobedience."}, {"text": "Demand that the President or Governor personally intervene to ensure consistent enforcement.", "isCorrect": false, "rationale": "While citizens can petition leaders, the text provides broader, more direct civic actions like speaking out and voting for change, which directly address the legislative or electoral process."}], "id": "q09"}, {"question": "According to the 'Word Origins' section, the word 'justice' comes from a Latin root meaning 'righteous' or 'fair.' This connection implies that the fundamental goal of laws should be to:", "options": [{"text": "Establish complex legal procedures for all disputes.", "isCorrect": false, "rationale": "While legal procedures are part of justice, the root meaning emphasizes the outcome of righteousness and fairness, not merely the procedural complexity."}, {"text": "Ensure that rules are always 'laid down' as permanent.", "isCorrect": false, "rationale": "This relates to the origin of 'law' ('laid down'), not 'justice.' The permanence of a law doesn't inherently guarantee its fairness."}, {"text": "Achieve outcomes that are righteous and fair for all within society.", "isCorrect": true, "rationale": "The text links 'justice' directly to its Latin root 'justus' meaning 'righteous' or 'fair,' suggesting that the ultimate aim of laws should be to achieve these qualities."}, {"text": "Expand the authority of judges and juries in the legal system.", "isCorrect": false, "rationale": "While 'judge' and 'jury' share the same Latin root, the meaning of 'justice' itself refers to the principles of righteousness and fairness, not just the expansion of judicial power."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
