    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the Founders' belief described in the text, what is the ultimate source of individual rights?", "options": [{"text": "Laws passed by the government", "isCorrect": false, "rationale": "The text explicitly states that rights come 'above the government' and that government's job is to protect them, not grant them. Therefore, laws passed by the government are not the ultimate source."}, {"text": "God and nature", "isCorrect": true, "rationale": "The text clearly states, 'The Founders believed that rights come from God and nature — not from government.' This aligns with the Declaration of Independence's mention of rights given by their Creator."}, {"text": "The Bill of Rights", "isCorrect": false, "rationale": "The text clarifies that 'The Bill of Rights does not give Americans rights — it lists rights the government must not violate,' indicating it's a protector, not the origin."}, {"text": "Society's consensus", "isCorrect": false, "rationale": "While societal values may influence how rights are upheld, the text attributes the origin of rights to a higher source (God and nature) rather than a collective agreement."}]}, {"question": "The text states, 'The Bill of Rights does not give Americans rights — it lists rights the government must not violate.' What is the main implication of this statement?", "options": [{"text": "Rights are granted by the government through amendments.", "isCorrect": false, "rationale": "This contradicts the statement, which emphasizes that the Bill of Rights does *not* give rights, but rather acknowledges existing ones."}, {"text": "The government has the authority to remove any right not explicitly listed.", "isCorrect": false, "rationale": "The statement implies the opposite: that rights exist independently and government cannot simply remove them, especially those listed or derived from the higher source."}, {"text": "Rights exist independently of government, which is obligated to protect them.", "isCorrect": true, "rationale": "This aligns perfectly with the text's assertion that rights come from 'God and nature — not from government' and that 'Government's job is to protect rights, not grant or remove them.'"}, {"text": "The Bill of Rights is merely a suggestion for governmental conduct.", "isCorrect": false, "rationale": "The Bill of Rights lists rights the government 'must not violate,' indicating a strong mandate, not merely a suggestion."}]}, {"question": "A local government decides to seize a private property owner's land for a new highway. Before doing so, it holds multiple public hearings, offers a fair market price, and allows the owner to challenge the decision in court. Which core principle is the government primarily upholding in this scenario?", "options": [{"text": "Freedom of assembly", "isCorrect": false, "rationale": "Freedom of assembly relates to people gathering peacefully, which is not the primary principle being demonstrated by the government's procedural steps for seizing property."}, {"text": "Due process", "isCorrect": true, "rationale": "The scenario describes the government following 'fair procedures before taking away a person's... property,' which is the exact definition of due process provided in the text."}, {"text": "Right to bear arms", "isCorrect": false, "rationale": "The right to bear arms is about owning weapons for protection and is unrelated to the government's procedure for acquiring private property."}, {"text": "Freedom of the press", "isCorrect": false, "rationale": "Freedom of the press relates to media publishing information without censorship, which is not relevant to the government's land acquisition process."}]}, {"question": "The text explains that students have rights in school, but these rights can be applied differently than for adults. What is the fundamental reason cited for this distinction?", "options": [{"text": "Students are not considered full citizens until adulthood.", "isCorrect": false, "rationale": "The text does not state that students are not full citizens; it focuses on the unique environment of schools."}, {"text": "Schools need to maintain a safe and productive learning environment.", "isCorrect": true, "rationale": "The text explicitly states: 'This is because schools have a responsibility to maintain a safe and productive learning environment,' which is the key principle for differential application of rights."}, {"text": "The government grants fewer rights to minors.", "isCorrect": false, "rationale": "The text emphasizes that students 'keep them [rights] in school,' but they are subject to reasonable rules due to the specific setting, not a general reduction in granted rights for minors."}, {"text": "Educational institutions are exempt from most constitutional protections.", "isCorrect": false, "rationale": "The text states 'your rights are real, and you keep them in school,' indicating that constitutional protections do apply, albeit with some adjustments for the school environment."}]}, {"question": "A group of concerned parents gathers in front of the school board office, holding signs and speaking out against a proposed policy change, and later submits a formal written request to reconsider. Which combination of First Amendment rights are they primarily exercising?", "options": [{"text": "Freedom of religion and freedom of the press", "isCorrect": false, "rationale": "Freedom of religion and freedom of the press are not explicitly demonstrated in this scenario, which focuses on public expression and appeals to government."}, {"text": "Freedom of speech, assembly, and petition", "isCorrect": true, "rationale": "Holding signs and speaking out demonstrates freedom of speech; gathering in a group is freedom of assembly; and submitting a formal written request is freedom of petition. All are First Amendment rights covered in the text."}, {"text": "Right to bear arms and freedom of speech", "isCorrect": false, "rationale": "The right to bear arms (Second Amendment) is not relevant to this scenario of peaceful protest and formal appeal."}, {"text": "Protection against unreasonable search and freedom of assembly", "isCorrect": false, "rationale": "Protection against unreasonable search (Fourth Amendment) is unrelated to this scenario. While freedom of assembly is correct, the option misses other key rights being exercised."}]}, {"question": "The text uses the metaphor 'rights and responsibilities go together like two sides of a coin.' What does this statement best convey about the relationship between rights and responsibilities in a republic?", "options": [{"text": "One is more valuable than the other, depending on the situation.", "isCorrect": false, "rationale": "The metaphor suggests they are inseparable and equally fundamental, not that one holds more value than the other."}, {"text": "They are distinct and unrelated concepts, but both are important.", "isCorrect": false, "rationale": "The metaphor 'two sides of a coin' emphasizes their interconnectedness and mutual dependence, not their distinctness or unrelatedness."}, {"text": "The exercise of rights implies certain duties or expectations from citizens.", "isCorrect": true, "rationale": "The text states, 'Rights are not free gifts with no strings attached. In a healthy republic, rights and responsibilities go together,' implying that having rights necessitates certain duties or actions in return ('things citizens are expected to do')."}, {"text": "Responsibilities are limitations that diminish the scope of individual rights.", "isCorrect": false, "rationale": "The text presents responsibilities as complementary duties that come *along with* rights, not as limitations that diminish them. They are reciprocal."}]}, {"question": "Which of the following situations best illustrates a violation of 'civil rights' as defined in the text?", "options": [{"text": "A person is denied a loan because of their race.", "isCorrect": true, "rationale": "The definition of civil rights is 'rights that protect citizens from unfair treatment by the government or other people.' Being denied a loan due to race by a private entity (a bank, 'other people') fits this definition perfectly as unfair treatment."}, {"text": "A homeowner's property is searched without a warrant.", "isCorrect": false, "rationale": "This is a violation of the Fourth Amendment (protection against unreasonable search), which is a specific constitutional right, but 'civil rights' in the broader sense often refers to protection against discrimination by government or individuals."}, {"text": "A journalist is prevented from publishing a story by a government censor.", "isCorrect": false, "rationale": "This is a violation of freedom of the press (First Amendment), a specific constitutional right. While it relates to rights, the definition of 'civil rights' emphasizes protection from unfair treatment based on personal characteristics rather than specific government censorship."}, {"text": "A convicted criminal receives a disproportionately harsh sentence.", "isCorrect": false, "rationale": "This relates to the Eighth Amendment (protection against cruel punishment) and due process. While an injustice, the definition of civil rights in the text specifically highlights protection from 'unfair treatment by the government or other people' often implying discrimination."}]}, {"question": "A police officer suspects illegal activity in a house but does not have a warrant from a judge. Under most circumstances, which right would prevent the officer from legally searching the home?", "options": [{"text": "Right to a jury trial", "isCorrect": false, "rationale": "The right to a jury trial (Sixth Amendment) applies to criminal cases once charges are brought, not to the legality of a search."}, {"text": "Protection against cruel punishment", "isCorrect": false, "rationale": "Protection against cruel punishment (Eighth Amendment) relates to sentencing and is unrelated to the act of searching a home."}, {"text": "Protection against unreasonable search", "isCorrect": true, "rationale": "The text explicitly states this right (Fourth Amendment) means 'Police need a legal warrant (permission from a judge) before they can search your home or belongings in most cases,' directly addressing this scenario."}, {"text": "Due process", "isCorrect": false, "rationale": "Due process ensures fair procedures before taking life, liberty, or property. While related to searches, the Fourth Amendment is the more specific and direct protection against warrantless searches."}]}, {"question": "Based on the text's explanation of where rights come from, what is the fundamental role of government concerning these rights?", "options": [{"text": "To grant rights to its citizens as it sees fit.", "isCorrect": false, "rationale": "The text explicitly states that rights do not come from the government and that the government's job is 'not grant or remove them.'"}, {"text": "To protect existing rights from violation.", "isCorrect": true, "rationale": "The text clearly states, 'Government's job is to protect rights, not grant or remove them,' and that the Bill of Rights lists rights the government 'must not violate.'"}, {"text": "To define and limit rights based on public opinion.", "isCorrect": false, "rationale": "The text emphasizes that rights come from a source above government and cannot simply be taken away, meaning government's role is not primarily to limit them based on opinion."}, {"text": "To remove rights when they conflict with national security.", "isCorrect": false, "rationale": "The text states that rights cannot simply be taken away and that government's role is to protect, not remove, suggesting removal is not a fundamental role, even in the absence of specific caveats."}]}, {"question": "The 'teachernote' at the end of the section prompts discussion about whether the United States has 'always provided liberty and justice for all.' What does this prompt implicitly suggest about the concept of rights?", "options": [{"text": "That rights are static and universally applied without historical variation.", "isCorrect": false, "rationale": "The prompt asks if rights have *always* been provided 'for all,' implying that their application has not always been static or universal throughout history."}, {"text": "That the ideal of universal rights is not always perfectly realized in practice.", "isCorrect": true, "rationale": "By asking 'has the United States always provided liberty and justice for all? If not, what happened? What did people do about it?', the prompt implicitly acknowledges that the *ideal* of rights for everyone may not have been fully achieved in practice, leading to struggles and historical events."}, {"text": "That the government can grant or remove rights as needed.", "isCorrect": false, "rationale": "This contradicts the core message of the section that rights come from above the government and it is government's job to protect them, not grant or remove them."}, {"text": "That only certain groups are truly entitled to liberty and justice.", "isCorrect": false, "rationale": "The phrase 'for all' and the subsequent questions about historical events suggest a striving for universal application, not an inherent limitation to certain groups."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
