<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The section begins by stating that for much of American history, the country did not live up to the words of the Declaration of Independence. Which of the following best exemplifies this initial contradiction?", "options": [{"text": "The fact that the Constitution did not originally include a Bill of Rights.", "isCorrect": false, "rationale": "While true that the Bill of Rights was added later, the primary contradiction highlighted by the Declaration's claim that 'all men are created equal' was the systemic denial of basic rights based on identity, not the absence of a Bill of Rights itself at the founding."}, {"text": "The existence of slavery, which treated people as property rather than individuals with rights.", "isCorrect": true, "rationale": "The text explicitly calls slavery a 'massive, violent contradiction of everything the Declaration of Independence claimed to stand for,' as enslaved people were denied citizenship and legal rights, treated as property."}, {"text": "The process of amending the Constitution was too difficult for early reforms.", "isCorrect": false, "rationale": "The section focuses on the *denial of rights* and the *failures* to uphold ideals, not primarily on the difficulty of the amendment process itself during the early period."}, {"text": "The original colonies had varying laws regarding land ownership.", "isCorrect": false, "rationale": "Differences in land ownership laws are irrelevant to the core contradiction discussed, which concerns fundamental human rights and equality as proclaimed in the Declaration of Independence."}]}, {"question": "The Thirteenth Amendment was a monumental change in American history. What primary issue did it address?", "options": [{"text": "It granted formerly enslaved people full citizenship rights.", "isCorrect": false, "rationale": "While an important step, full citizenship rights were primarily addressed by the Fourteenth Amendment, which came later."}, {"text": "It abolished slavery and involuntary servitude across the United States.", "isCorrect": true, "rationale": "The text states, 'The Thirteenth Amendment abolished slavery everywhere in the United States,' making this its direct and primary impact."}, {"text": "It guaranteed the right to vote for all men regardless of race.", "isCorrect": false, "rationale": "The right to vote for Black men was guaranteed by the Fifteenth Amendment, which followed the Thirteenth."}, {"text": "It outlawed segregation in public places.", "isCorrect": false, "rationale": "Outlawing segregation in public places was a goal of the later Civil Rights Movement and the Civil Rights Act of 1964, not the Thirteenth Amendment."}]}, {"question": "Despite the passage of the 14th and 15th Amendments, many states, particularly in the South, implemented Jim Crow laws. What was the primary purpose and effect of these laws?", "options": [{"text": "To create economic opportunities for Black citizens after slavery.", "isCorrect": false, "rationale": "Jim Crow laws were designed to subjugate and discriminate against Black citizens, not to create economic opportunities for them."}, {"text": "To enforce racial segregation and deny Black citizens their newly granted rights.", "isCorrect": true, "rationale": "The text states that Jim Crow laws were used to 'block Black citizens from voting and keep them separated from white citizens through laws called Jim Crow laws,' ensuring legal segregation and undermining their rights."}, {"text": "To establish national standards for education and public services.", "isCorrect": false, "rationale": "Jim Crow laws were state-level statutes focused on maintaining racial hierarchy and segregation, not on establishing national standards for services."}, {"text": "To ensure equal protection under the law for all citizens, as per the 14th Amendment.", "isCorrect": false, "rationale": "Jim Crow laws actively violated the principle of 'equal protection of the laws' enshrined in the 14th Amendment, rather than ensuring it."}]}, {"question": "The Fourteenth Amendment significantly expanded the concept of citizenship and rights. Which of the following principles was a central outcome of this amendment?", "options": [{"text": "It established the right of women to vote in all elections.", "isCorrect": false, "rationale": "The right for women to vote was secured by the Nineteenth Amendment, not the Fourteenth."}, {"text": "It guaranteed that states could not deny any person 'equal protection of the laws.'", "isCorrect": true, "rationale": "The text explicitly states the Fourteenth Amendment 'declared that all people born or naturalized in the United States are citizens, and that no state can deny any person “equal protection of the laws.”'"}, {"text": "It prohibited the federal government from interfering with state election procedures.", "isCorrect": false, "rationale": "The 14th Amendment actually strengthened the federal government's ability to enforce rights against states, not limit its interference in election procedures."}, {"text": "It mandated that all public schools must be integrated immediately.", "isCorrect": false, "rationale": "While *Brown v. Board of Education* later used the 14th Amendment to desegregate schools, the amendment itself did not explicitly mandate immediate integration upon its ratification."}]}, {"question": "Which of the following scenarios would have been directly addressed and legally prohibited by the Fifteenth Amendment upon its ratification?", "options": [{"text": "A state passes a law preventing women from voting in state elections.", "isCorrect": false, "rationale": "The Fifteenth Amendment addressed voting rights based on race, color, or previous servitude, not sex. The Nineteenth Amendment later addressed women's suffrage."}, {"text": "A state denies a formerly enslaved man the right to cast his ballot in a presidential election.", "isCorrect": true, "rationale": "The Fifteenth Amendment 'Said that the right to vote could not be denied based on “race, color, or previous condition of servitude.” This gave Black men the right to vote,' directly prohibiting such a denial."}, {"text": "A state establishes separate public restrooms for people of different races.", "isCorrect": false, "rationale": "This describes segregation, which was later addressed by civil rights legislation and court rulings interpreting the 14th Amendment, but not directly by the 15th Amendment, which focuses solely on voting rights."}, {"text": "A state refuses to grant citizenship to individuals born within its borders.", "isCorrect": false, "rationale": "The question of citizenship for those born in the U.S. was primarily settled by the Citizenship Clause of the Fourteenth Amendment."}]}, {"question": "The women's suffrage movement ultimately led to the passage of the Nineteenth Amendment. What was the primary impact of this amendment?", "options": [{"text": "It outlawed discrimination in employment based on sex.", "isCorrect": false, "rationale": "Discrimination in employment based on sex was later addressed by the Civil Rights Act of 1964."}, {"text": "It guaranteed women the right to vote in all public elections.", "isCorrect": true, "rationale": "The text clearly states the Nineteenth Amendment was added to the Constitution, 'saying that the right to vote could not be denied based on sex.'"}, {"text": "It ensured equal pay for women in the workplace.", "isCorrect": false, "rationale": "While related to broader gender equality, ensuring equal pay was not the primary focus or direct outcome of the Nineteenth Amendment."}, {"text": "It required schools to offer equal educational opportunities for girls and boys.", "isCorrect": false, "rationale": "Equal educational opportunities were addressed by later legislation like Title IX, not the Nineteenth Amendment."}]}, {"question": "The story of Ruby Bridges illustrates how individual actions and legal rulings converged to enforce civil rights. Which landmark Supreme Court decision directly enabled Ruby Bridges to attend William Frantz Elementary School in 1960?", "options": [{"text": "*Plessy v. Ferguson* (1896)", "isCorrect": false, "rationale": "*Plessy v. Ferguson* established the 'separate but equal' doctrine, which actually upheld segregation and was the legal basis for schools like William Frantz Elementary to be segregated prior to desegregation efforts."}, {"text": "*Brown v. Board of Education* (1954)", "isCorrect": true, "rationale": "The text explicitly states that *Brown v. Board of Education* 'ruled that segregated schools were unconstitutional, overturning the earlier ruling that “separate but equal” was acceptable.' This ruling legally paved the way for Ruby Bridges to attend a previously all-white school."}, {"text": "*Dred Scott v. Sandford* (1857)", "isCorrect": false, "rationale": "*Dred Scott v. Sandford* denied citizenship to Black people and affirmed the legality of slavery, a ruling that predates and is contrary to the spirit of desegregation."}, {"text": "*Miranda v. Arizona* (1966)", "isCorrect": false, "rationale": "*Miranda v. Arizona* dealt with the rights of criminal suspects (right to remain silent, right to an attorney) and is unrelated to school desegregation."}]}, {"question": "The Civil Rights Act of 1964 and the Voting Rights Act of 1965 were crucial pieces of legislation. How did their primary focuses differ?", "options": [{"text": "The Civil Rights Act focused on ending segregation in schools, while the Voting Rights Act focused on ending segregation in public places.", "isCorrect": false, "rationale": "School segregation was primarily addressed by *Brown v. Board of Education*, though the Civil Rights Act reinforced educational desegregation. The Civil Rights Act also covered public places more broadly, while the Voting Rights Act had a specific focus."}, {"text": "The Civil Rights Act prohibited discrimination in public places, employment, and education, while the Voting Rights Act specifically targeted discriminatory voting practices.", "isCorrect": true, "rationale": "The text clearly distinguishes them: the Civil Rights Act 'made it illegal to discriminate against people in public places, employment, or education,' and the Voting Rights Act 'Outlawed discriminatory voting practices.'"}, {"text": "The Civil Rights Act granted citizenship to all born in the U.S., while the Voting Rights Act guaranteed equal protection under the law.", "isCorrect": false, "rationale": "Citizenship and equal protection were primarily established by the Fourteenth Amendment, not these later acts."}, {"text": "The Civil Rights Act established a national minimum wage, and the Voting Rights Act created the Equal Employment Opportunity Commission.", "isCorrect": false, "rationale": "These statements are factually incorrect regarding the specific provisions of both acts."}]}, {"question": "The 'Arc of Justice' concept describes how the U.S. corrects its mistakes. According to the text, which of the following is NOT presented as a primary tool for achieving justice and bringing law in line with constitutional promises?", "options": [{"text": "Ordinary citizens working peacefully to change unjust laws.", "isCorrect": false, "rationale": "The text explicitly states, 'Ordinary citizens can work peacefully to change unjust laws' as one of the ways the country corrects its mistakes."}, {"text": "The Constitution being amended to correct past wrongs.", "isCorrect": false, "rationale": "The text explicitly states, 'The Constitution can be amended to correct past wrongs' as a tool for justice."}, {"text": "Courts ruling that existing laws violate constitutional rights.", "isCorrect": false, "rationale": "The text explicitly states, 'Courts can rule that existing laws violate constitutional rights' as a key mechanism."}, {"text": "States unilaterally declaring federal laws unconstitutional.", "isCorrect": true, "rationale": "The text does not mention states unilaterally declaring federal laws unconstitutional as a legitimate or effective tool for correcting mistakes in the context of the 'Arc of Justice.' The emphasis is on federal legislative, judicial, and amendment processes, alongside citizen action."}]}, {"question": "What is the most significant overarching message conveyed by the section 'When Rights Were Denied'?", "options": [{"text": "The U.S. Constitution was perfectly designed from the start to ensure equality for all citizens.", "isCorrect": false, "rationale": "The section directly contradicts this, detailing how the country failed to live up to its ideals for centuries and required significant amendments and movements to address these shortcomings."}, {"text": "Achieving full equality and living up to American ideals is an ongoing process that requires active citizen engagement and the use of constitutional tools.", "isCorrect": true, "rationale": "This summarizes the core theme, as highlighted in 'The Work Continues' and 'The Arc of Justice,' emphasizing that citizens, courts, and legislation are continuously needed to align the country's laws with its promise of equality."}, {"text": "Historical injustices like slavery and segregation were quickly and easily resolved once the issues were identified.", "isCorrect": false, "rationale": "The text describes decades of struggle, a Civil War, and sustained movements, indicating a difficult and lengthy process, not a quick or easy resolution."}, {"text": "The power to deny rights primarily rests with the federal government, not individual states.", "isCorrect": false, "rationale": "The section provides numerous examples of states (e.g., Jim Crow laws, denial of voting rights) being the primary actors in denying rights, even after federal amendments were passed, necessitating federal intervention later."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
