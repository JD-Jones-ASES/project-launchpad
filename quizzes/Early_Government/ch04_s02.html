<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided definitions, what is the fundamental meaning of 'independence'?", "options": [{"text": "The right to form alliances with other nations.", "isCorrect": false, "rationale": "While a nation might form alliances after gaining independence, the definition provided focuses on internal governance, not external relations."}, {"text": "Freedom from control by another government and the ability to govern oneself.", "isCorrect": true, "rationale": "The text explicitly defines independence as 'Freedom from control by another government. To be independent means to govern yourself.'"}, {"text": "The establishment of a democratic republic.", "isCorrect": false, "rationale": "Independence means governing oneself, but it doesn't strictly define the *form* of government, although a democratic republic was the eventual outcome."}, {"text": "The right to engage in international trade without tariffs.", "isCorrect": false, "rationale": "This is an economic freedom, not the core political definition of independence as provided in the text."}], "id": "q01"}, {"question": "Thomas Jefferson adapted John Locke's concept of natural rights for the Declaration of Independence. Which of Locke's original rights did Jefferson change, and what did he replace it with?", "options": [{"text": "He replaced 'life' with 'security of person'.", "isCorrect": false, "rationale": "The text states that Locke identified 'life, liberty, and property,' and Jefferson kept 'life' and 'liberty' while changing 'property'."}, {"text": "He replaced 'liberty' with 'freedom of speech'.", "isCorrect": false, "rationale": "The text explicitly states that 'property' was the right that Jefferson replaced, not 'liberty'."}, {"text": "He replaced 'property' with 'the pursuit of Happiness'.", "isCorrect": true, "rationale": "The text directly states, 'The Declaration replaces “property” with the “pursuit of Happiness” but keeps the same foundation: rights come from our humanity, not from the government.'"}, {"text": "He added 'the right to revolution' to the list.", "isCorrect": false, "rationale": "While the Declaration justifies revolution, it is a consequence of violated rights and the lack of consent, not one of the foundational 'natural rights' identified by Locke or Jefferson."}], "id": "q02"}, {"question": "The concept of 'consent of the governed' is central to the Declaration's philosophy. According to the text, what is the ultimate right of the people if a government loses their consent?", "options": [{"text": "To appeal to an international court for justice.", "isCorrect": false, "rationale": "The text implies that the people themselves hold the power to act, not an external court."}, {"text": "To request reforms from the existing government.", "isCorrect": false, "rationale": "While reforms might be a first step, the text states a more decisive right if consent is lost: 'the people have the right to change it.'"}, {"text": "To change that government.", "isCorrect": true, "rationale": "The text explicitly states: 'If a government loses that consent, the people have the right to change it.'"}, {"text": "To elect new representatives at the next scheduled election.", "isCorrect": false, "rationale": "This describes a normal democratic process, but the concept of 'consent of the governed' implies a more fundamental right to alter or abolish a government that fundamentally fails its purpose, beyond just waiting for an election cycle."}], "id": "q03"}, {"question": "Thomas Paine's pamphlet *Common Sense* had a profound impact on colonial sentiment in early 1776. What was its primary effect?", "options": [{"text": "It provided a detailed military strategy for defeating the British.", "isCorrect": false, "rationale": "The text describes Paine's arguments as political and philosophical, not military strategy."}, {"text": "It solidified public opinion in favor of monarchy by highlighting its benefits.", "isCorrect": false, "rationale": "The text states Paine argued 'monarchy was absurd,' which is the opposite of this option."}, {"text": "It directly led to the Battles of Lexington and Concord.", "isCorrect": false, "rationale": "The Battles of Lexington and Concord occurred in 1775, before *Common Sense* was published in January 1776."}, {"text": "It used plain language to convince hundreds of thousands of colonists that monarchy was absurd and independence was necessary.", "isCorrect": true, "rationale": "The text states Paine 'argued in plain, direct language that monarchy was absurd and that America should be fully independent. Hundreds of thousands of copies circulated through the colonies.'"}], "id": "q04"}, {"question": "Signing the Declaration of Independence was an extremely risky act for the delegates. What was the most severe consequence they faced under British law for their actions?", "options": [{"text": "Loss of their colonial land and property.", "isCorrect": false, "rationale": "While property loss was a possibility, the text highlights a more direct and severe personal risk."}, {"text": "Exile to a distant British colony.", "isCorrect": false, "rationale": "Exile was not the primary punishment for this specific act as described in the text."}, {"text": "Imprisonment without trial.", "isCorrect": false, "rationale": "The punishment for treason was more severe than mere imprisonment, according to the text."}, {"text": "Execution for treason.", "isCorrect": true, "rationale": "The text clearly states: 'Under British law, signing it was treason. The punishment for treason was death.'"}], "id": "q05"}, {"question": "The text describes Thomas Jefferson as a 'complicated figure.' What specific aspect of his life, as mentioned, creates a debate about the gap between his ideals and actions?", "options": [{"text": "His decision to serve as ambassador to France instead of staying in America.", "isCorrect": false, "rationale": "His diplomatic service was a political role, not a source of ideological contradiction mentioned in the text."}, {"text": "His extensive personal library and interest in diverse subjects.", "isCorrect": false, "rationale": "His intellect and wide reading are presented as reasons he was chosen to write, not a source of complexity in his character."}, {"text": "His authorship of a document proclaiming 'all men are created equal' while he enslaved more than 600 people.", "isCorrect": true, "rationale": "The text explicitly states: 'He was a complicated figure: he wrote that all men are created equal while he enslaved more than 600 people over his lifetime. The gap between his ideals and his actions has been debated by Americans ever since.'"}, {"text": "His role as the third President of the United States.", "isCorrect": false, "rationale": "His presidency was a later political achievement, not the specific source of the 'complicated figure' description related to his ideals."}], "id": "q06"}, {"question": "Benjamin Franklin was the oldest delegate to sign the Declaration. Beyond his age and scientific fame, what crucial role did he play that was essential for American victory?", "options": [{"text": "He served as the commander-in-chief of the Continental Army.", "isCorrect": false, "rationale": "George Washington was the commander-in-chief, not Benjamin Franklin."}, {"text": "He personally funded the entire Revolutionary War effort.", "isCorrect": false, "rationale": "While wealthy, the text does not state he personally funded the war, which was an immense undertaking."}, {"text": "He helped secure French military support for the Revolution as an ambassador.", "isCorrect": true, "rationale": "The text states: 'He served as ambassador to France and helped secure French military support for the Revolution — without which America might have lost.'"}, {"text": "He authored the first draft of the Declaration of Independence.", "isCorrect": false, "rationale": "Thomas Jefferson was the main author of the Declaration."}], "id": "q07"}, {"question": "Place the following events in the correct chronological order as they occurred in the lead-up to the final signing of the Declaration of Independence:", "options": [{"text": "1. Common Sense published; 2. Committee formed to draft Declaration; 3. Lee's resolution approved; 4. Congress approves Jefferson's final text; 5. Delegates sign parchment copy.", "isCorrect": true, "rationale": "The text establishes this order: Jan 1776 (Common Sense), June 1776 (Committee/Jefferson drafts), July 2 1776 (Lee's resolution), July 4 1776 (Congress approves text), August 2 1776 (Delegates sign)."}, {"text": "1. Battles of Lexington and Concord; 2. Jefferson drafts Declaration; 3. Common Sense published; 4. Lee's resolution approved; 5. Delegates sign parchment copy.", "isCorrect": false, "rationale": "Common Sense was published before Jefferson drafted the Declaration, and the Battles of Lexington and Concord occurred earlier in 1775."}, {"text": "1. Lee's resolution approved; 2. Congress approves Jefferson's final text; 3. Common Sense published; 4. Committee formed to draft Declaration; 5. Delegates sign parchment copy.", "isCorrect": false, "rationale": "Common Sense and the drafting committee came before the approval of Lee's resolution and Jefferson's text."}, {"text": "1. Jefferson drafts Declaration; 2. Common Sense published; 3. Lee's resolution approved; 4. Delegates sign parchment copy; 5. Congress approves Jefferson's final text.", "isCorrect": false, "rationale": "Common Sense was published before Jefferson drafted, and Congress approved the text before the official parchment was signed."}], "id": "q08"}, {"question": "The Declaration of Independence is described as more than 'just a list of complaints about the King.' What deeper, fundamental purpose did its 'most powerful section' near the beginning serve?", "options": [{"text": "To establish an immediate plan for a new system of taxation.", "isCorrect": false, "rationale": "The Declaration was a statement of principles and grievances, not a detailed economic plan."}, {"text": "To outline the philosophical basis for a government founded on natural rights and the consent of the governed.", "isCorrect": true, "rationale": "The text states this section 'states truths that Jefferson called “self-evident”' and explains the ideas from John Locke and 'consent of the governed,' which form the philosophical foundation."}, {"text": "To formally declare war against Great Britain.", "isCorrect": false, "rationale": "The Revolutionary War had already begun in 1775; the Declaration declared independence, not solely war."}, {"text": "To request mediation from other European powers.", "isCorrect": false, "rationale": "The Declaration was a direct assertion of rights and independence, not a request for mediation."}], "id": "q09"}, {"question": "The Declaration of Independence refers to certain rights as 'unalienable.' Based on the definition provided, what does this term signify about these rights?", "options": [{"text": "They are granted by the government and can be revoked under specific conditions.", "isCorrect": false, "rationale": "The definition states these rights 'exist before governments do' and 'cannot be taken away,' contradicting this option."}, {"text": "They are temporary rights that must be renewed periodically.", "isCorrect": false, "rationale": "The term 'unalienable' implies permanence, not temporary status."}, {"text": "They belong to all people by virtue of their humanity and cannot be taken away or given away, even by governments.", "isCorrect": true, "rationale": "The text defines 'unalienable' as 'Cannot be taken away or given away. The Declaration calls certain rights “unalienable” — even governments cannot remove them.'"}, {"text": "They are privileges that individuals earn through their contributions to society.", "isCorrect": false, "rationale": "The text indicates natural rights 'belong to all people simply because they are human,' not because they are earned."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
