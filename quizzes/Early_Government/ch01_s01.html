<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the main reason rules exist in homes and schools?", "options": [{"text": "To make daily life more challenging and exciting.", "isCorrect": false, "rationale": "The text states rules help keep things safe and fair, which is the opposite of making life more challenging in a negative sense."}, {"text": "To ensure safety, fairness, and order within a community.", "isCorrect": true, "rationale": "The text explicitly defines rules as statements that help keep things safe and fair, and create order where people know what to do."}, {"text": "To allow the strongest or loudest individuals to dominate.", "isCorrect": false, "rationale": "The text explains that *without* rules, the strongest person wins, implying rules prevent this outcome."}, {"text": "To limit individual freedom completely without purpose.", "isCorrect": false, "rationale": "While rules set boundaries, the text emphasizes their purpose is to protect and teach, not to arbitrarily limit freedom."}]}, {"question": "A student consistently cuts in line for lunch, causing delays and frustration for others. Which of the following principles described in the text is primarily being undermined by this action?", "options": [{"text": "The importance of chores at home.", "isCorrect": false, "rationale": "Chores are a rule at home, but irrelevant to the cafeteria scenario."}, {"text": "Order and fairness, because expected procedures are ignored and some receive special treatment.", "isCorrect": true, "rationale": "Cutting in line directly violates the 'calm, expected way' of order and 'treating everyone by the same rules' inherent in fairness, as highlighted by the cafeteria example."}, {"text": "The ability of the strongest to win, which is not the issue here.", "isCorrect": false, "rationale": "The problem is the lack of adherence to rules, not preventing the strongest from winning. In fact, cutting in line could be seen as one person acting 'stronger' than others."}, {"text": "The development of individual creativity.", "isCorrect": false, "rationale": "The text does not link rules or their absence to creativity in this context."}]}, {"question": "Which of the following is NOT given as a reason for having rules at home?", "options": [{"text": "To ensure family members get enough rest.", "isCorrect": false, "rationale": "The text uses bedtime as an example, stating it 'helps you get enough sleep'."}, {"text": "To encourage communication among family members.", "isCorrect": false, "rationale": "The text uses a 'no-phone rule' as an example to 'help your family talk to each other'."}, {"text": "To prepare individuals for complete independence without any need for community support.", "isCorrect": true, "rationale": "The text states chores 'teach you to help the people around you,' implying living *with* others, not entirely independently without support. Complete independence is not listed as a purpose."}, {"text": "To teach children how to contribute to the household.", "isCorrect": false, "rationale": "The text states chores 'teach you to help the people around you,' which includes contributing to the household."}]}, {"question": "The school rule 'Raise your hand before speaking' primarily helps achieve which of the following?", "options": [{"text": "Faster completion of class assignments.", "isCorrect": false, "rationale": "While related to classroom management, the rule's primary purpose described is not assignment completion."}, {"text": "Equal opportunity for all students to participate in discussions.", "isCorrect": true, "rationale": "The text explicitly states: 'When students raise their hands, everyone gets a turn to talk,' directly linking it to equal participation."}, {"text": "Developing physical coordination skills.", "isCorrect": false, "rationale": "Raising a hand is a simple action and not intended for physical coordination development."}, {"text": "Identifying the most intelligent students in the class.", "isCorrect": false, "rationale": "The rule is about managing discussion, not assessing intelligence."}]}, {"question": "Imagine a classroom where the teacher suddenly announces that all school rules are suspended for the day. Based on the text, what is the most probable immediate consequence?", "options": [{"text": "Students would quickly establish their own fair system, leading to harmony.", "isCorrect": false, "rationale": "The text's cafeteria example suggests chaos and unfairness in the absence of rules, not spontaneous harmony."}, {"text": "Only the most powerful or loudest students would likely benefit, while others might feel unsafe or unheard.", "isCorrect": true, "rationale": "The text explicitly states that without rules, 'the strongest students might take food from smaller ones. The loudest voices would drown out everyone else. Nobody would feel safe.'"}, {"text": "Learning would accelerate as students feel completely free from constraints.", "isCorrect": false, "rationale": "The text implies chaos without rules, which would hinder learning rather than accelerate it."}, {"text": "Everyone would experience a calm and orderly environment due to increased autonomy.", "isCorrect": false, "rationale": "The text's cafeteria example directly contradicts this, describing a noisy, chaotic environment without rules."}]}, {"question": "According to the 'keyconcept' box, what is the ultimate outcome if a community operates without rules?", "options": [{"text": "It fosters stronger individual leadership and self-reliance among all members.", "isCorrect": false, "rationale": "The key concept states 'the strongest person wins — and everyone else loses,' which is not about fostering leadership for all."}, {"text": "It leads to a scenario where the most powerful members thrive at the expense of others.", "isCorrect": true, "rationale": "The key concept directly states: 'Without rules, the strongest person wins — and everyone else loses.'"}, {"text": "It ensures complete freedom and equal opportunity for all members.", "isCorrect": false, "rationale": "The key concept implies the opposite; freedom might be present but not equally, and opportunities are skewed to the powerful."}, {"text": "It promotes creativity and unconventional problem-solving.", "isCorrect": false, "rationale": "The text focuses on safety, order, and fairness, not creativity, as the outcome of rules or lack thereof."}]}, {"question": "How does the concept of 'fairness' directly contribute to creating 'order' within a community?", "options": [{"text": "Fairness makes things complicated, leading to more discussion and less order.", "isCorrect": false, "rationale": "The text describes fairness as contributing positively to a calm, expected environment, not complicating it."}, {"text": "When rules are applied equally, people know what to expect and feel secure, leading to a calm and predictable environment.", "isCorrect": true, "rationale": "Fairness means 'treating everyone by the same rules,' which ensures 'people know what to do and when to do it,' thus creating order, a 'calm, expected way'."}, {"text": "Fairness allows individuals to break rules when they feel it's necessary, thus disrupting order.", "isCorrect": false, "rationale": "Fairness is about equal application of rules, not allowing individuals to break them."}, {"text": "Order is achieved only when some individuals are given special treatment, which contradicts fairness.", "isCorrect": false, "rationale": "This statement contradicts both the definitions of fairness ('no one gets special treatment') and how order is achieved through fair rules."}]}, {"question": "The 'Robinson Crusoe' storybox primarily illustrates which crucial point about rules?", "options": [{"text": "That individuals living alone on an island do not need rules.", "isCorrect": false, "rationale": "Crusoe made his own rules even when alone, indicating a need for personal structure."}, {"text": "The complexities of establishing economic systems on a deserted island.", "isCorrect": false, "rationale": "While implied, the story's main point as described in the text focuses on the social need for rules."}, {"text": "The inherent human desire for a strong leader to make all decisions.", "isCorrect": false, "rationale": "The story highlights the need for *rules they both accept*, not just a leader making all decisions."}, {"text": "The fundamental need for mutually accepted guidelines when people interact, even in small groups.", "isCorrect": true, "rationale": "The text concludes: 'Crusoe learns that even two people living together need rules they both accept,' directly supporting this option."}]}, {"question": "The word origin of 'rule' from the Latin 'regula' (meaning a straight stick used for measuring) suggests that rules are primarily intended to provide:", "options": [{"text": "Strict adherence to historical traditions without questioning.", "isCorrect": false, "rationale": "While traditions can involve rules, the origin emphasizes 'straight' and 'orderly' rather than purely historical adherence."}, {"text": "A flexible framework that encourages spontaneous and unstructured behavior.", "isCorrect": false, "rationale": "A 'straight stick' used for 'measuring' implies structure and consistency, not spontaneity or unstructured behavior."}, {"text": "Clear standards and consistent guidance for behavior, helping to keep things 'straight and orderly'.", "isCorrect": true, "rationale": "The text explains 'Both help keep things straight and orderly,' directly connecting the measuring tool to clear standards and consistent guidance."}, {"text": "An opportunity for individuals to define their own personal conduct entirely.", "isCorrect": false, "rationale": "Rules are typically external guidelines for a community, not solely for individual self-definition."}]}, {"question": "A class is introducing a new, complex board game that no one has played before. To ensure a positive experience for all students, what is the *most crucial* step to take first, based on the principles discussed in the section?", "options": [{"text": "Have the strongest or most experienced students demonstrate the game first, then let others figure it out.", "isCorrect": false, "rationale": "This might lead to some students feeling left out or confused, violating principles of fairness and order, similar to the 'strongest wins' scenario."}, {"text": "Allow everyone to start playing immediately and figure out the rules as they go, to promote discovery.", "isCorrect": false, "rationale": "This would likely lead to confusion, arguments, and a lack of order, much like the cafeteria without rules."}, {"text": "Clearly establish and explain the rules of the game to ensure fairness and understanding before playing.", "isCorrect": true, "rationale": "The text emphasizes that rules create order and fairness, ensuring 'people know what to do.' Establishing rules first would make the game understandable and fair for everyone."}, {"text": "Assign a leader to make all decisions during the game, to streamline gameplay.", "isCorrect": false, "rationale": "While a leader might help, rules are more fundamental. Without established rules, a leader's decisions might seem arbitrary or unfair, potentially causing conflict."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
