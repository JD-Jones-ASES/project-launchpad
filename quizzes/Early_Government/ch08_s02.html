    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental difference in governmental power in a constitutional monarchy compared to an absolute monarchy?", "options": [{"text": "The monarch in a constitutional monarchy personally writes all new legislation.", "isCorrect": false, "rationale": "In a constitutional monarchy, elected officials, not the monarch, set the rules and make decisions, including writing legislation."}, {"text": "Real governing power in a constitutional monarchy is held by elected officials, not the monarch.", "isCorrect": true, "rationale": "The text explicitly states that in constitutional monarchies, 'real governing power belongs to elected officials' and 'elected officials — set the rules and make the decisions,' with the monarch's role often ceremonial."}, {"text": "Constitutional monarchs claim divine right, while absolute monarchs do not.", "isCorrect": false, "rationale": "The concept of 'divine right' is an old idea associated with absolute monarchs, not modern constitutional monarchs. Constitutional monarchies operate under legal limits."}, {"text": "Absolute monarchies always have a Prime Minister, while constitutional monarchies do not.", "isCorrect": false, "rationale": "The United Kingdom is a constitutional monarchy with a Prime Minister. Absolute monarchies like Saudi Arabia do not have an elected legislature or a Prime Minister in the same sense as a constitutional system."}], "id": "q01"}, {"question": "The Magna Carta is considered a pivotal document in English history primarily because it:", "options": [{"text": "Established England as a global naval power.", "isCorrect": false, "rationale": "The Magna Carta dealt with limitations on royal power and legal rights, not England's naval strength."}, {"text": "Instituted the first democratic elections for common citizens.", "isCorrect": false, "rationale": "The Magna Carta involved nobles limiting the king's power; it did not establish widespread democratic elections for common citizens."}, {"text": "For the first time, legally limited the king's power and asserted that he was subject to law.", "isCorrect": true, "rationale": "The text states the Magna Carta 'limited the king's power for the first time in English history: the king had to follow the law, could not imprison people without a fair trial, and had to consult nobles before raising taxes.'"}, {"text": "Granted the king absolute power to raise taxes without consulting anyone.", "isCorrect": false, "rationale": "This is the opposite of what the Magna Carta did; it required the king to consult nobles before raising taxes."}], "id": "q02"}, {"question": "In countries like the United Kingdom or Japan, the monarch primarily serves what role?", "options": [{"text": "Directly commanding the military and making foreign policy decisions.", "isCorrect": false, "rationale": "In constitutional monarchies, these powers typically rest with the elected government (e.g., Parliament and Prime Minister)."}, {"text": "Acting as a ceremonial head of state and a symbol of national continuity.", "isCorrect": true, "rationale": "The text clearly states, 'The monarch's role is often ceremonial: representing the country, attending official events, and serving as a symbol of national continuity' in constitutional monarchies like the UK and Japan."}, {"text": "Writing and passing all new laws for the country.", "isCorrect": false, "rationale": "Laws are written and passed by elected legislatures in constitutional monarchies."}, {"text": "Serving as the head of government, responsible for daily administration.", "isCorrect": false, "rationale": "The head of government (e.g., Prime Minister) handles daily administration in constitutional monarchies, not the monarch."}], "id": "q03"}, {"question": "What is the defining characteristic of an absolute monarchy, as exemplified by Saudi Arabia?", "options": [{"text": "The ruler's power is primarily limited by a strong elected parliament.", "isCorrect": false, "rationale": "The text states that Saudi Arabia 'does not have an elected legislature that can check the King's power in the same way as a constitutional monarchy.'"}, {"text": "The monarch holds total or near-total power with few legal limits on authority.", "isCorrect": true, "rationale": "The definition of an absolute monarchy is 'a monarchy where the ruler holds total or near-total power, with few legal limits on authority,' which is exemplified by Saudi Arabia."}, {"text": "The monarch's role is purely ceremonial, representing national identity.", "isCorrect": false, "rationale": "This describes a constitutional monarchy, not an absolute monarchy. In Saudi Arabia, the King serves as both head of state and head of government."}, {"text": "Laws are always based on a secular, rather than religious, legal system.", "isCorrect": false, "rationale": "The text notes that Saudi Arabia's 'laws are based on Islamic religious law (Sharia),'' which is not secular."}], "id": "q04"}, {"question": "The 'divine right' theory, once used by monarchs, implies that:", "options": [{"text": "A monarch's power is derived from the people's consent.", "isCorrect": false, "rationale": "Divine right asserts authority comes from God, not from the consent of the people."}, {"text": "Rulers are chosen by an assembly of nobles.", "isCorrect": false, "rationale": "Divine right claims a direct mandate from God, not selection by nobles."}, {"text": "The monarch's authority comes directly from God and cannot be questioned.", "isCorrect": true, "rationale": "The definition provided states, 'divine right — the old idea that a monarch's authority came directly from God and could not be questioned.'"}, {"text": "All monarchs must be religious leaders as well as political ones.", "isCorrect": false, "rationale": "While the authority is divine, the theory doesn't necessarily mean the monarch is also a religious leader in a spiritual sense, but rather that their political authority is divinely ordained."}], "id": "q05"}, {"question": "Based on the text, which statement accurately reflects the status of citizens in different types of monarchies?", "options": [{"text": "Citizens in absolute monarchies generally have more opportunities to challenge their government than those in constitutional monarchies.", "isCorrect": false, "rationale": "The text states the opposite: 'Citizens in absolute monarchies generally have fewer legal protections and fewer opportunities to choose or challenge their government.'"}, {"text": "Citizens in both absolute and constitutional monarchies enjoy similar legal protections and opportunities for political participation.", "isCorrect": false, "rationale": "The text highlights significant differences, stating citizens in absolute monarchies have 'fewer legal protections and fewer opportunities to choose or challenge their government.'"}, {"text": "Citizens in constitutional monarchies tend to have more legal protections and ways to influence government than those in absolute monarchies.", "isCorrect": true, "rationale": "The text implies this directly by stating that citizens in absolute monarchies have 'fewer legal protections and fewer opportunities to choose or challenge their government than citizens in constitutional monarchies or democracies.'"}, {"text": "Only citizens in ancient monarchies, like Egyptian pharaohs, had no legal protections.", "isCorrect": false, "rationale": "The text indicates that citizens in modern absolute monarchies also have fewer legal protections and opportunities to challenge their government."}], "id": "q06"}, {"question": "The story of Emperor Yao and Shun serves to illustrate which central idea about leadership?", "options": [{"text": "Hereditary succession is the most stable form of government.", "isCorrect": false, "rationale": "Emperor Yao chose Shun, a simple farmer, over his own son, contradicting the idea that hereditary succession is paramount."}, {"text": "A ruler's character and commitment to the common good are crucial, regardless of government structure.", "isCorrect": true, "rationale": "The storybox concludes with the lesson: 'the character of a ruler matters as much as the structure of the government. Good laws help, but they cannot replace leaders who genuinely care about the common good.'"}, {"text": "Absolute power always corrupts even the most virtuous leaders.", "isCorrect": false, "rationale": "Emperor Yao governed 'with such fairness' and Shun 'ruled wisely,' demonstrating that rulers can be virtuous despite holding significant power."}, {"text": "Democratic elections are essential for choosing truly wise leaders.", "isCorrect": false, "rationale": "Yao chose his successor through observation and training, not through a democratic election process."}], "id": "q07"}, {"question": "How do modern constitutional monarchies fundamentally differ from ancient monarchies like those of the pharaohs, as described in the text?", "options": [{"text": "Modern monarchs claim divine right, while ancient pharaohs did not.", "isCorrect": false, "rationale": "Ancient pharaohs ruled as 'living gods' with absolute power, embodying a similar concept to divine right. Modern constitutional monarchs do not typically claim divine right."}, {"text": "Ancient monarchs had limited power, whereas modern monarchs possess absolute authority.", "isCorrect": false, "rationale": "This statement is the opposite of what the text describes. Ancient monarchs had absolute power, while modern constitutional monarchs have limited power."}, {"text": "Modern constitutional monarchs have limited power, with real governance by elected officials, unlike ancient rulers who held absolute power.", "isCorrect": true, "rationale": "The text contrasts ancient pharaohs who 'ruled as living gods with absolute power' with modern constitutional monarchies where the monarch 'has little real political power' and 'real governing power belongs to elected officials.'"}, {"text": "Ancient monarchies had written constitutions, while modern ones do not.", "isCorrect": false, "rationale": "Modern constitutional monarchies *do* have constitutions that limit the monarch's power, while ancient monarchies generally did not operate under such written legal constraints."}], "id": "q08"}, {"question": "Which of the following countries is explicitly mentioned as an example of a constitutional monarchy where the British monarch remains the formal head of state?", "options": [{"text": "Spain", "isCorrect": false, "rationale": "Spain is a constitutional monarchy, but it has its own monarch, not the British monarch as its formal head of state."}, {"text": "Saudi Arabia", "isCorrect": false, "rationale": "Saudi Arabia is an absolute monarchy and is not associated with the British monarch as its head of state."}, {"text": "Canada", "isCorrect": true, "rationale": "The text lists Canada among 'constitutional monarchies where the British monarch remains the formal head of state,' along with the Netherlands, Belgium, and Australia."}, {"text": "Japan", "isCorrect": false, "rationale": "Japan is a constitutional monarchy with its own Emperor as a ceremonial head of state, not the British monarch."}], "id": "q09"}, {"question": "The text suggests that the Magna Carta 'planted the seed of the idea that no one is above the law.' This concept eventually grew into which modern governmental principle?", "options": [{"text": "The divine right of kings to rule absolutely.", "isCorrect": false, "rationale": "The divine right of kings is the opposite of the idea that no one, including the king, is above the law."}, {"text": "The principle of a constitutional democracy where laws limit power.", "isCorrect": true, "rationale": "The text explicitly states that the idea 'grew over centuries into the constitutional democracy the United Kingdom has today' and 'deeply influenced the American Founders,' who established a constitutional system based on the rule of law."}, {"text": "The establishment of a purely ceremonial monarchy with no political influence.", "isCorrect": false, "rationale": "While a ceremonial monarchy is an outcome of limited power, the fundamental principle refers to the broader concept of rule of law and limited government, which underpins constitutional democracy."}, {"text": "The right of monarchs to choose their successors based on virtue alone.", "isCorrect": false, "rationale": "This concept, while commendable (as seen in the Yao story), is not directly related to the Magna Carta's contribution to the idea that 'no one is above the law.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
