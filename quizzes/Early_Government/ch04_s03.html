<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "America's first constitution, ratified in 1781, was known as:", "options": [{"text": "The U.S. Constitution", "isCorrect": false, "rationale": "The U.S. Constitution was adopted later, replacing America's first constitution."}, {"text": "The Articles of Confederation", "isCorrect": true, "rationale": "The text states, 'In 1781, the states ratified the Articles of Confederation, America's first constitution.'"}, {"text": "The Virginia Plan", "isCorrect": false, "rationale": "The Virginia Plan was one of two proposals debated at the Constitutional Convention, not the first constitution."}, {"text": "The Federalist Papers", "isCorrect": false, "rationale": "The Federalist Papers were essays written to advocate for the ratification of the U.S. Constitution, not the first constitution itself."}]}, {"question": "Which of the following was a direct consequence of the central government's weakness under the Articles of Confederation?", "options": [{"text": "The establishment of a strong national court system to settle disputes between states.", "isCorrect": false, "rationale": "Under the Articles, there was no national court system, leading to unresolved disputes."}, {"text": "Congress's ability to efficiently collect taxes to pay war debts.", "isCorrect": false, "rationale": "The text explicitly states that 'Congress could not collect taxes' under the Articles, leading to financial instability."}, {"text": "The national government's inability to effectively put down Shays' Rebellion.", "isCorrect": true, "rationale": "Shays' Rebellion demonstrated the central government's weakness, as 'Congress could do nothing because it had no army' to help the state put down the revolt."}, {"text": "A swift and unified response to trade disputes between states.", "isCorrect": false, "rationale": "The text notes that 'When states argued over trade, Congress had no power to settle disputes.'"}]}, {"question": "The Constitutional Convention of 1787 was initially called to revise the Articles of Confederation, but ultimately decided to:", "options": [{"text": "Strengthen state governments while weakening the central authority.", "isCorrect": false, "rationale": "The convention sought to create a stronger central government, reversing the trend of the Articles."}, {"text": "Create a stronger national army and naval force without changing the government structure.", "isCorrect": false, "rationale": "While a stronger army was a need, the convention focused on a complete overhaul of the government's structure."}, {"text": "Replace the Articles entirely with a new, stronger Constitution.", "isCorrect": true, "rationale": "The text states that the delegates 'had gathered to revise the Articles. They ended up replacing them entirely.'"}, {"text": "Establish an monarchy similar to the British system they had just overthrown.", "isCorrect": false, "rationale": "The Founders were wary of strong central power, especially monarchical rule, having just fought for independence from a king."}]}, {"question": "The Great Compromise, reached at the Constitutional Convention, addressed the debate over legislative representation by creating:", "options": [{"text": "A single-chamber Congress where all states had equal votes, favoring smaller states.", "isCorrect": false, "rationale": "This describes the New Jersey Plan, but not the compromise itself, which incorporated both ideas."}, {"text": "A national executive with the power to veto all state laws, favoring larger states.", "isCorrect": false, "rationale": "The Great Compromise specifically dealt with legislative representation, not executive veto power over state laws."}, {"text": "A two-chamber Congress: the House of Representatives with population-based seats and the Senate with two seats per state.", "isCorrect": true, "rationale": "The text explains, 'The solution was the Great Compromise: a two-chamber Congress. In the House of Representatives, states get seats based on population. In the Senate, every state gets exactly two seats.'"}, {"text": "A system where all laws required unanimous consent from all thirteen states to pass.", "isCorrect": false, "rationale": "This would be even more restrictive than the Articles, which required 9 of 13 states, and was not part of the Great Compromise."}]}, {"question": "The principle of 'Separation of Powers' in the new Constitution was intended to:", "options": [{"text": "Streamline governmental decision-making for greater efficiency.", "isCorrect": false, "rationale": "While efficiency is a goal, the primary aim of separation of powers is to prevent concentration of power, not necessarily to make decision-making quicker."}, {"text": "Consolidate all governmental authority into a single, powerful central body.", "isCorrect": false, "rationale": "This is the opposite of separation of powers, which aims to divide authority."}, {"text": "Ensure that no one person or group could hold all government power.", "isCorrect": true, "rationale": "The text states, 'The new Constitution divided government power among three branches so that no one person or group could hold all of it. This was the core lesson the Founders had drawn from history.'"}, {"text": "Give individual states supreme authority over all national laws.", "isCorrect": false, "rationale": "The Constitution sought to create a stronger national government, balancing state and federal powers, not making states supreme over national laws."}]}, {"question": "Under the Separation of Powers, if a dispute arises regarding the legality or interpretation of a law, which branch of government is responsible for addressing it?", "options": [{"text": "The Legislative branch (Congress)", "isCorrect": false, "rationale": "The Legislative branch is responsible for making laws, not interpreting them in disputes."}, {"text": "The Executive branch (the President)", "isCorrect": false, "rationale": "The Executive branch is responsible for enforcing laws, not interpreting their legality."}, {"text": "The Judicial branch (the courts)", "isCorrect": true, "rationale": "The text defines the Judicial branch's role as interpreting laws, which includes addressing disputes over legality and meaning."}, {"text": "The individual state governments", "isCorrect": false, "rationale": "While state courts exist, the question implies a national dispute or interpretation within the federal system, which falls to the national Judicial branch."}]}, {"question": "To 'ratify' something, as defined in the text, means to:", "options": [{"text": "Propose a new law or amendment.", "isCorrect": false, "rationale": "Proposing is the initial step; ratification is the official approval and enactment."}, {"text": "Officially approve and put into effect.", "isCorrect": true, "rationale": "The definition provided is 'To officially approve and put into effect.'"}, {"text": "Debate the pros and cons of a proposed agreement.", "isCorrect": false, "rationale": "Debating precedes ratification; it is not the act of ratification itself."}, {"text": "Rewrite a document to correct its flaws.", "isCorrect": false, "rationale": "Rewriting is an act of revision, while ratification is an act of approval."}]}, {"question": "What was a primary concern of the Anti-Federalists regarding the new Constitution?", "options": [{"text": "That it would grant too much power to individual state governments.", "isCorrect": false, "rationale": "Anti-Federalists worried the *central* government would become too powerful, not state governments."}, {"text": "That it would lead to a weak national defense and vulnerability to foreign attack.", "isCorrect": false, "rationale": "The Articles of Confederation caused this concern; the Constitution aimed to strengthen national defense."}, {"text": "That it gave too much power to the central government and lacked protection for individual rights.", "isCorrect": true, "rationale": "The text states, 'Anti-Federalists worried it gave too much power to the central government and provided no protection for individual rights.'"}, {"text": "That it failed to include an Executive branch to enforce laws.", "isCorrect": false, "rationale": "The Constitution clearly established an Executive branch; this was a weakness of the Articles, not the Constitution."}]}, {"question": "James Madison is often called the 'Father of the Constitution' due to his extensive contributions. Which of the following roles is NOT attributed to him in the text?", "options": [{"text": "Presiding over the Constitutional Convention.", "isCorrect": true, "rationale": "The text states that 'George Washington presided over the convention,' not James Madison."}, {"text": "Co-authoring The Federalist Papers.", "isCorrect": false, "rationale": "The text explicitly states he 'co-authored The Federalist Papers.'"}, {"text": "Taking meticulous notes of the convention's proceedings.", "isCorrect": false, "rationale": "The text mentions he 'took meticulous notes of the entire convention's proceedings.'"}, {"text": "Drafting most of what became the Bill of Rights.", "isCorrect": false, "rationale": "The text notes he 'drafted most of what became the Bill of Rights.'"}]}, {"question": "Based on the problems faced under the Articles of Confederation, which situation would most clearly demonstrate the need for a stronger national government as envisioned by the new Constitution?", "options": [{"text": "A state passing its own tariffs on goods from a neighboring state, leading to economic conflict.", "isCorrect": true, "rationale": "The text mentions 'When states argued over trade, Congress had no power to settle disputes' under the Articles, indicating a need for national authority to regulate interstate commerce."}, {"text": "Individual citizens freely expressing their opinions without fear of government reprisal.", "isCorrect": false, "rationale": "This scenario represents a protection of individual rights, a concern of the Anti-Federalists but not a primary problem caused by the *weakness* of the Articles' central government."}, {"text": "A state deciding to fund its own local infrastructure projects without federal aid.", "isCorrect": false, "rationale": "States funding local projects does not inherently demonstrate a failure of the national government under the Articles; the issue was the national government's inability to raise funds for its *own* needs."}, {"text": "A president vetoing a law passed by Congress that he deems unconstitutional.", "isCorrect": false, "rationale": "This describes the functioning of the new Constitution's checks and balances, not a problem under the Articles, which had no president."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
