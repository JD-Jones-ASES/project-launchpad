<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of \"diplomacy\" as defined in the text?", "options": [{"text": "To declare war on countries that refuse to cooperate.", "isCorrect": false, "rationale": "Diplomacy is explicitly defined as handling relations through peaceful communication, 'rather than war,' making this option incorrect."}, {"text": "To manage relations between countries through peaceful discussion and agreements.", "isCorrect": true, "rationale": "The text defines diplomacy as 'the practice of handling relations between countries through peaceful communication, negotiation, and agreements rather than war.'"}, {"text": "To enforce international laws through military action.", "isCorrect": false, "rationale": "This is antithetical to the definition of diplomacy, which emphasizes peaceful means. Military action is not a diplomatic tool."}, {"text": "To establish a single global government for all nations.", "isCorrect": false, "rationale": "The text does not suggest diplomacy's purpose is global governance, but rather managing relations between sovereign countries."}]}, {"question": "A global pandemic spreads rapidly across continents. Which of the following reasons for international cooperation described in the text best explains why countries would need to work together to address this crisis?", "options": [{"text": "To negotiate new trade agreements.", "isCorrect": false, "rationale": "While trade might be affected, the primary and most direct reason for cooperation during a pandemic, as listed in the text, is health, not trade agreements."}, {"text": "To provide financial aid after natural disasters.", "isCorrect": false, "rationale": "A pandemic is a health crisis, not strictly a natural disaster, and the text lists 'Health: To control disease outbreaks' specifically."}, {"text": "To prevent or stop wars.", "isCorrect": false, "rationale": "A pandemic is a public health crisis, not a military conflict, so preventing wars is not the best explanation."}, {"text": "To control disease outbreaks that cross borders.", "isCorrect": true, "rationale": "The text explicitly lists 'Health: To control disease outbreaks that spread across borders' as a key reason for countries to cooperate, directly matching the scenario."}]}, {"question": "The United Nations was founded in 1945 primarily to address what specific historical challenge?", "options": [{"text": "The need for a global economic regulatory body.", "isCorrect": false, "rationale": "While the UN has economic agencies, its foundational purpose after World War II was focused on peace and security, not primarily economic regulation."}, {"text": "The desire to prevent future devastating world wars.", "isCorrect": true, "rationale": "The text states, 'The nations of the world were exhausted by two devastating world wars in thirty years and wanted to create an organization to help prevent future wars.'"}, {"text": "The expansion of human rights violations globally.", "isCorrect": false, "rationale": "Human rights became a significant focus for the UN, but the *primary* founding motivation was preventing another world war."}, {"text": "The spread of regional conflicts across continents.", "isCorrect": false, "rationale": "The main concern at the time of the UN's founding was large-scale 'world wars,' not just regional conflicts."}]}, {"question": "If two member nations of the UN have a legal disagreement over a shared border, which UN body would be responsible for settling their dispute?", "options": [{"text": "The General Assembly.", "isCorrect": false, "rationale": "The General Assembly is where countries debate world issues and vote, but it does not settle legal disputes between nations."}, {"text": "The Security Council.", "isCorrect": false, "rationale": "The Security Council authorizes peacekeeping missions and actions in conflicts, but the specific body for *legal disputes* is different."}, {"text": "The International Court of Justice.", "isCorrect": true, "rationale": "The text states, 'The International Court of Justice: Settles legal disputes between nations,' making it the correct body for border disagreements."}, {"text": "UNICEF.", "isCorrect": false, "rationale": "UNICEF is a specialized agency focused on children's welfare, not legal disputes between nations."}]}, {"question": "The text states that the UN \"cannot force countries to obey its decisions.\" What does this imply about the primary source of the UN's influence and ability to achieve its goals?", "options": [{"text": "Its vast international army.", "isCorrect": false, "rationale": "The text explicitly states the UN 'has no army of its own that can compel nations,' making this option incorrect."}, {"text": "The compulsory adherence of all member states to its resolutions.", "isCorrect": false, "rationale": "The statement 'cannot force countries to obey' directly contradicts the idea of compulsory adherence."}, {"text": "The willingness of member nations to cooperate and the power of diplomacy and economic pressure.", "isCorrect": true, "rationale": "The text explains its power 'comes from diplomacy, economic pressure, and the willingness of member nations to cooperate,' highlighting the importance of voluntary action and non-military tools."}, {"text": "Its exclusive control over global trade routes.", "isCorrect": false, "rationale": "While economic pressure is mentioned, the UN does not have 'exclusive control over global trade routes,' making this an overstatement."}]}, {"question": "Which international organization mentioned in the text is primarily a military alliance focused on collective defense?", "options": [{"text": "The World Trade Organization (WTO).", "isCorrect": false, "rationale": "The WTO sets rules for international trade, not military defense."}, {"text": "The United Nations (UN).", "isCorrect": false, "rationale": "The UN aims for peace and security but is not primarily a military alliance for collective defense, and has no army of its own."}, {"text": "The North Atlantic Treaty Organization (NATO).", "isCorrect": true, "rationale": "The text defines NATO as 'a military alliance of mostly European and North American democracies that agree to defend each other if attacked.'"}, {"text": "The European Union (EU).", "isCorrect": false, "rationale": "The EU is a regional organization for broad cooperation, not primarily a military alliance."}]}, {"question": "A country is struggling with a severe economic downturn and needs financial assistance to stabilize its economy. Which two international organizations would be most relevant for this country to approach for help, according to the text?", "options": [{"text": "NATO and UNESCO.", "isCorrect": false, "rationale": "NATO is a military alliance, and UNESCO focuses on education and culture; neither provides financial assistance for economic downturns."}, {"text": "The World Bank and International Monetary Fund.", "isCorrect": true, "rationale": "The text explicitly states these organizations 'provide loans and financial help to countries in need,' directly addressing the scenario."}, {"text": "The World Trade Organization and UNICEF.", "isCorrect": false, "rationale": "The WTO handles trade rules, and UNICEF focuses on children; neither provides general financial assistance for economic stabilization."}, {"text": "The African Union and the European Union.", "isCorrect": false, "rationale": "These are regional organizations, and while they might offer some aid to members, the text specifically identifies the World Bank and IMF for general financial help to 'countries in need.'"}]}, {"question": "An ambassador from Country A lives and works in Country B. A new trade dispute arises between their two nations. What is the ambassador's primary role in resolving this situation, according      to the text?", "options": [{"text": "To declare economic sanctions against Country B immediately.", "isCorrect": false, "rationale": "Ambassadors represent their country and facilitate communication; they do not unilaterally impose sanctions."}, {"text": "To communicate between the governments of Country A and Country B to find solutions.", "isCorrect": true, "rationale": "The text states ambassadors are 'official representatives who live there and communicate between governments' to find solutions to disagreements, which aligns with resolving a trade dispute."}, {"text": "To lead military forces in Country B to protect Country A's interests.", "isCorrect": false, "rationale": "Ambassadors are diplomats, not military leaders, and their role is peaceful communication."}, {"text": "To unilaterally decide on new trade rules for both countries.", "isCorrect": false, "rationale": "Ambassadors negotiate and facilitate, but do not unilaterally decide rules; agreements typically require negotiation and ratification by their respective governments."}]}, {"question": "The text concludes that diplomacy \"has prevented countless wars and helped the world become more connected and, on balance, more peaceful.\" What core idea does this statement convey about the long-term impact of diplomatic efforts?", "options": [{"text": "Diplomacy is a foolproof method that always resolves conflicts without struggle.", "isCorrect": false, "rationale": "The text notes diplomacy 'is not always easy, and it does not always succeed,' contradicting the idea of it being foolproof."}, {"text": "Despite its challenges, diplomacy is an essential tool for fostering global stability and cooperation.", "isCorrect": true, "rationale": "This option best synthesizes the text's acknowledgment of diplomacy's difficulties ('not always easy') with its overall positive impact ('prevented countless wars,' 'more peaceful')."}, {"text": "Diplomacy is primarily useful for minor disagreements and ineffective for major international crises.", "isCorrect": false, "rationale": "The text implies diplomacy's impact on 'countless wars' suggests its effectiveness in major issues, not just minor ones."}, {"text": "The only true measure of diplomacy's success is the complete absence of any conflict.", "isCorrect": false, "rationale": "This sets an impossibly high bar; the text implies success in the reduction and management of conflict, not its complete elimination."}]}, {"question": "Which statement accurately describes the overall structure of how countries work together, as presented in the text?", "options": [{"text": "All international cooperation happens exclusively through the United Nations.", "isCorrect": false, "rationale": "The text has a separate section 'Other International Organizations' which lists many groups outside the UN, making 'exclusively' incorrect."}, {"text": "Countries only cooperate on issues related to trade and economic development.", "isCorrect": false, "rationale": "The text lists multiple reasons for cooperation, including peace, health, human rights, and aid, not just trade and economy."}, {"text": "Cooperation occurs through a variety of international organizations, both broad and specialized, using tools like diplomacy and treaties.", "isCorrect": true, "rationale": "This option accurately captures the breadth (UN, specialized, regional), the methods (diplomacy, treaties), and the variety of organizations described in the text."}, {"text": "International cooperation is primarily enforced by a global military power that compels adherence to agreements.", "isCorrect": false, "rationale": "The text explicitly states the UN 'has no army of its own that can compel nations' and emphasizes peaceful means like diplomacy, not military enforcement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
