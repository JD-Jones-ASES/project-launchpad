    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the phrase “Six Flags Over Texas” primarily signify?", "options": [{"text": "The number of different amusement parks built in Texas throughout its history.", "isCorrect": false, "rationale": "The phrase refers to historical governments, not a commercial enterprise or specific number of parks."}, {"text": "The six distinct governments or nations that have ruled Texas at different times.", "isCorrect": true, "rationale": "The text explicitly states: 'When you hear the phrase “Six Flags Over Texas,” those six flags stand for six chapters in Texas history' referring to different governments."}, {"text": "The six major battles fought for Texas independence.", "isCorrect": false, "rationale": "While battles are part of Texas history, the 'six flags' specifically represent the ruling governments, not military conflicts."}, {"text": "The six distinct cultural regions within Texas today.", "isCorrect": false, "rationale": "The phrase refers to political control over time, not geographical or cultural divisions of the modern state."}], "id": "q01"}, {"question": "How did Spain's three-century rule most significantly shape the cultural landscape of early Texas?", "options": [{"text": "By establishing a strong democratic tradition through elected officials and local assemblies.", "isCorrect": false, "rationale": "Spain was a monarchy, and its rule did not emphasize democratic traditions but rather colonial administration."}, {"text": "By introducing the Spanish language, the Catholic faith, and Spanish law.", "isCorrect": true, "rationale": "The text states: 'The Spanish language, the Catholic faith, and Spanish law all shaped Texas deeply' during its time as New Spain."}, {"text": "By promoting a policy of complete religious freedom and tolerance for all native peoples.", "isCorrect": false, "rationale": "Spanish missionaries built missions 'to teach the Catholic faith to native peoples,' indicating an intent to convert rather than promote complete religious freedom."}, {"text": "By developing a widespread network of public schools and universities across the territory.", "isCorrect": false, "rationale": "While Spain did establish some institutions, the text highlights the spread of language, religion, and law as the most significant cultural impacts, not a widespread public education system."}], "id": "q02"}, {"question": "Compared to Spain's influence, the French claim over Texas (Flag 2) was characterized by what?", "options": [{"text": "A long-lasting and widespread colonial presence across the region, similar to Spanish rule.", "isCorrect": false, "rationale": "The text states France's 'hold on Texas lasted only five years,' indicating a very short duration, unlike Spain's three centuries."}, {"text": "A brief, unsuccessful attempt at colonization that ended with Spanish expulsion.", "isCorrect": true, "rationale": "The text explains the French colony 'failed within a few years' and 'Spain drove the French out,' accurately describing a short-lived and unsuccessful endeavor."}, {"text": "A peaceful coexistence with Spanish settlements and native populations, focusing on trade.", "isCorrect": false, "rationale": "The fact that 'Spain drove the French out' indicates conflict, not peaceful coexistence."}, {"text": "A focus on establishing extensive cattle ranches and agricultural settlements.", "isCorrect": false, "rationale": "The text mentions La Salle built 'a small fort called Fort Saint Louis,' not extensive agricultural settlements or ranches."}], "id": "q03"}, {"question": "The primary reason for growing tensions between American settlers in Texas and the Mexican government in the 1820s and 1830s involved what key issues?", "options": [{"text": "Disputes over the exact border between Texas and the United States, leading to land claims.", "isCorrect": false, "rationale": "While border issues emerged later, the immediate tensions were internal to Mexico's governance of Texas, not external border disputes with the U.S."}, {"text": "Disagreements concerning taxes, the institution of slavery, and settlers' desires for more local autonomy.", "isCorrect": true, "rationale": "The text explicitly states: 'But tensions grew between the settlers and the Mexican government over taxes, slavery, and local rights.'"}, {"text": "Religious conflicts between Catholic missionaries and a growing number of Protestant settlers.", "isCorrect": false, "rationale": "Although religious differences existed, the text specifically identifies 'taxes, slavery, and local rights' as the primary sources of tension."}, {"text": "Mexico's refusal to allow any American immigration into Texas after 1820.", "isCorrect": false, "rationale": "Mexico actively 'wanted settlers to move into Texas and offered large grants of land,' hiring empresarios like Stephen F. Austin, which contradicts a refusal to allow immigration."}], "id": "q04"}, {"question": "If a group of people from a distant country settles in a new land but continues to follow the rules of their original country, what term best describes this new settlement?", "options": [{"text": "A territory", "isCorrect": false, "rationale": "A territory is land controlled by a government, but the definition doesn't specify people from a distant country following old rules."}, {"text": "A republic", "isCorrect": false, "rationale": "A republic is a form of government where people choose leaders, not a type of settlement defined by its origin and continued allegiance."}, {"text": "A colony", "isCorrect": true, "rationale": "The text defines 'colony' as 'a territory settled by people from a distant country, who still follow that country's rules,' which perfectly matches the scenario."}, {"text": "Sovereignty", "isCorrect": false, "rationale": "Sovereignty is the power of a government to rule its own land, not a type of settlement itself."}], "id": "q05"}, {"question": "Stephen F. Austin earned the title 'Father of Texas' due to his role in what pivotal historical contribution?", "options": [{"text": "Leading the Texas army to victory at the Battle of San Jacinto.", "isCorrect": false, "rationale": "Sam Houston led the Texas army to victory at San Jacinto."}, {"text": "Negotiating the peace treaty that officially ended Spanish rule in Mexico.", "isCorrect": false, "rationale": "Mexico won its independence from Spain in 1821; Austin's primary role began after this."}, {"text": "Organizing and leading the first large-scale American settlement of Texas under Mexican rule.", "isCorrect": true, "rationale": "The 'personbox' states: 'Stephen F. Austin is called the “Father of Texas” because he led the first large group of American settlers into the region.'"}, {"text": "Serving as the Republic of Texas's first president.", "isCorrect": false, "rationale": "Sam Houston was the Republic of Texas's first president."}], "id": "q06"}, {"question": "Despite achieving independence, the Republic of Texas eventually sought to join the United States primarily because of what ongoing challenges?", "options": [{"text": "A desire to expand its own territory westward beyond its established borders.", "isCorrect": false, "rationale": "The text indicates internal struggles and external threats were the reasons, not a primary goal of expansion."}, {"text": "Financial instability and persistent threats from Mexico and Native American nations.", "isCorrect": true, "rationale": "The text states: 'But the young republic struggled financially and faced threats from Mexico and from Native American nations on the frontier. Many Texans wanted to join the United States.'"}, {"text": "A sudden and drastic population decline that necessitated federal assistance for recovery.", "isCorrect": false, "rationale": "The text mentions settlers coming into Texas, not a sudden population decline during the Republic era."}, {"text": "Internal political conflicts over which European monarch should provide protection.", "isCorrect": false, "rationale": "Texas was a republic with its own elected president, not seeking a European monarch."}], "id": "q07"}, {"question": "Which government ruled Texas immediately *before* it became an independent republic?", "options": [{"text": "Spain", "isCorrect": false, "rationale": "Spain ruled before Mexico. Mexico gained independence from Spain in 1821."}, {"text": "France", "isCorrect": false, "rationale": "France's brief claim was much earlier (1685-1690)."}, {"text": "Mexico", "isCorrect": true, "rationale": "The text states: 'In 1821, Mexico won its independence from Spain. Texas became part of the new nation of Mexico... In 1836, Texas declared independence from Mexico,' indicating Mexican rule immediately preceded the Republic."}, {"text": "The United States of America", "isCorrect": false, "rationale": "Texas became an independent republic before joining the United States."}], "id": "q08"}, {"question": "When did Texas first join the United States, and when did it later leave to join the Confederate States of America?", "options": [{"text": "Joined in 1821, left in 1836.", "isCorrect": false, "rationale": "1821 was when Mexico gained independence, and 1836 was when Texas declared independence from Mexico. Neither represents joining or leaving the U.S."}, {"text": "Joined in 1836, left in 1845.", "isCorrect": false, "rationale": "1836 was when Texas became an independent republic, and 1845 was when it joined the U.S."}, {"text": "Joined in 1845, left in 1861.", "isCorrect": true, "rationale": "The text states: 'Texas joined the United States in 1845 as the twenty-eighth state. But in 1861, Texas voted to leave the Union and join the Confederate States of America.'"}, {"text": "Joined in 1870, left in 1900.", "isCorrect": false, "rationale": "1870 was when Texas rejoined the Union after the Civil War; it did not leave again in 1900."}], "id": "q09"}, {"question": "According to the 'Did You Know' section, what was the original meaning of the word 'Texas' (or 'Tejas') as used by the Caddo people?", "options": [{"text": "A vast, fertile land suitable for farming.", "isCorrect": false, "rationale": "The text does not mention this as the origin of the word 'Texas.'"}, {"text": "A specific type of native longhorn cattle.", "isCorrect": false, "rationale": "The text does not mention this as the origin of the word 'Texas.'"}, {"text": "The direction 'north' or 'northern people'.", "isCorrect": false, "rationale": "The text does not mention this as the origin of the word 'Texas.'"}, {"text": "Meaning 'friends' or 'allies' among neighboring peoples.", "isCorrect": true, "rationale": "The 'didyouknow' box explicitly states: 'The word Texas (also spelled Tejas) comes from a Caddo word meaning “friends” or “allies.”'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
