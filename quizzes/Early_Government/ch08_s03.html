<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines an authoritarian government?", "options": [{"text": "A government where power is decentralized and shared among many regional bodies.", "isCorrect": false, "rationale": "This describes a decentralized system, which is the opposite of an authoritarian government where power is concentrated."}, {"text": "A system that concentrates power in a single leader or party and restricts citizens' rights and freedoms.", "isCorrect": true, "rationale": "The text defines authoritarian governments as those that 'concentrate power in one leader or party and limits citizens' rights and freedoms.'"}, {"text": "A government primarily focused on economic development and lifting people out of poverty.", "isCorrect": false, "rationale": "While some authoritarian governments, like China, have achieved economic development, this is a potential outcome, not the defining characteristic of an authoritarian system itself."}, {"text": "A state where leaders are chosen through free and fair elections, but their power is absolute.", "isCorrect": false, "rationale": "Authoritarian governments typically feature 'limited elections' that are not free or fair, and their power being 'absolute' negates the concept of checks and balances found in democratic systems."}]}, {"question": "A key characteristic that *distinguishes* an authoritarian government from a democratic one is:", "options": [{"text": "Its ability to achieve rapid economic growth.", "isCorrect": false, "rationale": "Both democratic and authoritarian governments can experience periods of rapid economic growth; this is not a distinguishing feature of the governmental system itself."}, {"text": "The presence of a national legislature.", "isCorrect": false, "rationale": "The text mentions that China, a one-party state, has a legislature (the National People's Congress), indicating that legislatures can exist in authoritarian systems, making it not a distinguishing factor from democracies."}, {"text": "The deliberate suppression of free speech and open political dissent.", "isCorrect": true, "rationale": "The text explicitly lists 'Restricted rights' including freedom of speech and 'Censorship' as common features of authoritarian governments, which directly contrasts with the protections typically found in democracies."}, {"text": "The existence of a single, powerful leader.", "isCorrect": false, "rationale": "While many authoritarian governments have a single powerful leader, the defining distinction lies more in the *extent* of power concentration and the *suppression* of rights, rather than just the presence of a leader, as even democracies can have powerful executive figures."}]}, {"question": "In a country where the government actively monitors and filters internet content, blocking access to international news sites and social media platforms, this practice is best described as:", "options": [{"text": "Due process.", "isCorrect": false, "rationale": "Due process refers to fair treatment through the normal judicial system, which is unrelated to government control over information."}, {"text": "Freedom of assembly.", "isCorrect": false, "rationale": "Freedom of assembly refers to the right to gather peacefully, which is not directly related to controlling internet content."}, {"text": "Censorship.", "isCorrect": true, "rationale": "The text defines censorship as 'the practice of a government controlling what information people can read, hear, or say,' and states that in China, 'The internet is monitored and filtered,' which perfectly matches the description."}, {"text": "Separation of powers.", "isCorrect": false, "rationale": "Separation of powers refers to dividing governmental authority among different branches, which is unrelated to controlling media content."}]}, {"question": "Which of the following is *not* explicitly listed as a common form of authoritarian government in the text?", "options": [{"text": "Military dictatorship.", "isCorrect": false, "rationale": "The text lists 'military dictatorships' as a form of authoritarian government."}, {"text": "One-party state.", "isCorrect": false, "rationale": "The text lists 'one-party states' as a form of authoritarian government, with China given as an example."}, {"text": "Constitutional republic.", "isCorrect": true, "rationale": "A constitutional republic is a form of democratic government, not an authoritarian one, and is not listed among the authoritarian forms."}, {"text": "Absolute monarchy.", "isCorrect": false, "rationale": "The text lists 'absolute monarchies' as a form of authoritarian government."}]}, {"question": "The U.S. Founders implemented separation of powers and checks and balances primarily to:", "options": [{"text": "Ensure rapid and efficient government decision-making during crises.", "isCorrect": false, "rationale": "The text states that authoritarian governments allow for 'fast, coordinated decision-making,' implying that checks and balances might slow decision-making, but their purpose was to prevent tyranny, not maximize speed."}, {"text": "Protect against the concentration of power in any single person or group, thereby preventing tyranny.", "isCorrect": true, "rationale": "The text explicitly states the Founders 'built in separation of powers, checks and balances, and guaranteed rights — so that no crisis could give any one person or group the excuse to seize total control,' which directly aligns with preventing tyranny."}, {"text": "Promote economic growth by allowing the government to make swift policy changes.", "isCorrect": false, "rationale": "While economic stability can be a goal, the primary constitutional purpose of these structures was to prevent the abuse of power, not solely to promote economic growth through swift policy changes."}, {"text": "Facilitate a smooth transition of power between political parties.", "isCorrect": false, "rationale": "While these mechanisms contribute to stable transitions, the fundamental concern for the Founders was preventing any single entity from seizing total control, which is broader than just party transitions."}]}, {"question": "Based on the descriptions in the text, a key difference between China and North Korea's authoritarian systems is that North Korea:", "options": [{"text": "Has a legislature that generally follows the party's direction.", "isCorrect": false, "rationale": "This description applies to China, which has the National People's Congress following the CCP's direction, not North Korea."}, {"text": "Is governed by a single ruling political party.", "isCorrect": false, "rationale": "This describes China, which is a one-party state under the CCP. North Korea is ruled by a dynastic family."}, {"text": "Features a dynastic rule where power has been held by the same family for decades.", "isCorrect": true, "rationale": "The text explicitly states North Korea 'is ruled by the Kim family — a dynasty that has held power since 1948,' which distinguishes it from China's one-party rule."}, {"text": "Has lifted hundreds of millions of people out of poverty.", "isCorrect": false, "rationale": "The text attributes this economic success to China's government, not North Korea's."}]}, {"question": "If a citizen living under an authoritarian regime is arbitrarily arrested and imprisoned for publishing a critical essay about the government, which fundamental democratic right is being directly violated?", "options": [{"text": "Freedom of assembly.", "isCorrect": false, "rationale": "Freedom of assembly refers to the right to gather peacefully, which is not directly violated by publishing an essay."}, {"text": "Due process.", "isCorrect": false, "rationale": "While an 'arbitrary arrest' likely violates due process, the primary democratic right violated by the *act of publishing* a critical essay is freedom of speech/press, as listed under 'Why Freedom Matters.'"}, {"text": "Freedom of the press/speech.", "isCorrect": true, "rationale": "Publishing a critical essay falls directly under the 'right to speak and publish freely,' which the text identifies as 'free speech and press' and protected by democracy."}, {"text": "The right to choose leaders.", "isCorrect": false, "rationale": "The right to choose leaders relates to elections, not the act of publishing an essay."}]}, {"question": "Why might citizens in a country experiencing severe economic collapse or political instability be inclined to accept an authoritarian government, according to the text?", "options": [{"text": "Authoritarian governments guarantee free and fair elections, ensuring accountability.", "isCorrect": false, "rationale": "The text explicitly states authoritarian governments have 'limited elections' that are 'not free or fair,' and critics argue citizens have 'no way to hold their leaders accountable.'"}, {"text": "They prioritize individual freedoms over collective security.", "isCorrect": false, "rationale": "The text states people 'sometimes accept the loss of freedoms in exchange for stability,' indicating a sacrifice of individual freedoms, not a prioritization of them."}, {"text": "A strong leader promises to restore order and provide stability.", "isCorrect": true, "rationale": "The text explains that 'Authoritarian governments often come to power during times of crisis... A strong leader promises order and security. People who are frightened or desperate sometimes accept the loss of freedoms in exchange for stability.'"}, {"text": "Authoritarian regimes always result in rapid economic prosperity for all citizens.", "isCorrect": false, "rationale": "The text mentions China's economic success as an argument by supporters, but it does not claim this is an 'always' outcome or the universal reason for initial acceptance of authoritarian rule during a crisis."}]}, {"question": "While authoritarian governments like China might be praised by some for 'fast, coordinated decision-making,' critics often highlight a significant drawback. What is this drawback?", "options": [{"text": "They always lead to economic stagnation and poverty.", "isCorrect": false, "rationale": "The text explicitly states that China 'has developed into a major economic power' and 'has lifted hundreds of millions of people out of poverty,' contradicting this statement."}, {"text": "They are inherently unstable and prone to frequent leadership changes.", "isCorrect": false, "rationale": "The example of North Korea's dynastic rule since 1948 shows that authoritarian governments can exhibit long-term leadership stability, even if it's not through democratic means."}, {"text": "Citizens lack meaningful mechanisms to hold their leaders accountable.", "isCorrect": true, "rationale": "The text states, 'Critics argue that without free elections and free speech, ordinary citizens have no way to hold their leaders accountable,' identifying this as a key drawback."}, {"text": "They foster widespread international cooperation and diplomatic relations.", "isCorrect": false, "rationale": "The text describes North Korea as 'one of the most isolated and tightly controlled countries in the world,' suggesting that international cooperation is not a guaranteed feature."}]}, {"question": "A teacher uses the examples of authoritarian governments to explain the importance of the U.S. Bill of Rights. Which of the following is the *most* accurate reason for this pedagogical approach?", "options": [{"text": "To show that democratic governments never face crises, unlike authoritarian ones.", "isCorrect": false, "rationale": "The text explicitly states the Founders 'knew that democracies could collapse into tyranny,' indicating that democracies *can* face crises."}, {"text": "To demonstrate that a government with unlimited power is always more efficient.", "isCorrect": false, "rationale": "While the text mentions 'fast, coordinated decision-making' as an argument by supporters, the goal of discussing the Bill of Rights is not to endorse the efficiency of unlimited power, but to highlight the value of rights when power is limited."}, {"text": "To highlight the fundamental freedoms and protections citizens *lose* under authoritarian rule, emphasizing their value in a democracy.", "isCorrect": true, "rationale": "The 'Why Freedom Matters' key concept states, 'Authoritarian governments show, by contrast, what democracy is trying to protect,' and concludes, 'When you understand what life is like without these rights, you understand why the Bill of Rights matters.' This directly supports the pedagogical approach."}, {"text": "To promote nationalism by contrasting the U.S. system with all other forms of government.", "isCorrect": false, "rationale": "The 'teachernote' explicitly advises against language that 'demonizes entire nations or peoples' and states the goal is 'to deepen their appreciation of democratic institutions,' not to promote nationalism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
