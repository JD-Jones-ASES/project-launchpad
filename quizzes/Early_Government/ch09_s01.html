<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'civic virtue' according to the provided text?", "options": [{"text": "Love of and loyalty to one's country, expressed through pride and commitment to making it better.", "isCorrect": false, "rationale": "This is the definition of 'patriotism,' not 'civic virtue'."}, {"text": "Work done for the benefit of the community, whether paid or unpaid.", "isCorrect": false, "rationale": "This is the definition of 'public service,' not 'civic virtue'."}, {"text": "The qualities of character that help a citizen contribute to the common good.", "isCorrect": true, "rationale": "The text explicitly defines 'civic virtue' as 'the qualities of character that help a citizen contribute to the common good; examples include honesty, courage, responsibility, and justice.'"}, {"text": "What is best for the whole community, not just for one person or group.", "isCorrect": false, "rationale": "This is the definition of 'common good,' not 'civic virtue.'"}], "id": "q01"}, {"question": "The story of Lucius Quinctius Cincinnatus, who resigned his dictatorship and returned to his farm, primarily illustrates which aspect of civic virtue?", "options": [{"text": "The importance of military skill in overcoming national crises.", "isCorrect": false, "rationale": "While Cincinnatus showed military skill, the text emphasizes his voluntary relinquishing of power as the key act of civic virtue, not the military action itself."}, {"text": "The necessity of temporary dictatorships for the survival of a republic.", "isCorrect": false, "rationale": "The text highlights his resignation from the dictatorship, not the necessity of the dictatorship itself, as the virtuous act."}, {"text": "The willingness to prioritize the common good by voluntarily relinquishing power.", "isCorrect": true, "rationale": "The text states, 'He believed that a good man does not hold onto power beyond what is needed. He served his country and went home. This is civic virtue.' This directly links his resignation to prioritizing the common good."}, {"text": "The value of modest living and humble origins for effective leadership.", "isCorrect": false, "rationale": "While Cincinnatus lived modestly, the text focuses on his actions in giving up power, not his lifestyle, as the primary example of civic virtue."}], "id": "q02"}, {"question": "According to the text, what is the ultimate consequence for a self-governing people who consistently lack civic virtue?", "options": [{"text": "They will become overly patriotic and nationalistic, leading to isolation.", "isCorrect": false, "rationale": "The text does not suggest this outcome; it focuses on the loss of self-governance."}, {"text": "Their society will become stagnant and resistant to necessary change.", "isCorrect": false, "rationale": "While possibly a side effect, the text specifies a more fundamental loss of freedom."}, {"text": "They will eventually give up their freedom, and their republic will become a dictatorship.", "isCorrect": true, "rationale": "The text explicitly states: 'A people who are selfish, dishonest, or ignorant cannot govern themselves for long. They will eventually give up their freedom to whoever promises to solve their problems — and republics become dictatorships.'"}, {"text": "They will struggle to elect qualified leaders but maintain their core democratic institutions.", "isCorrect": false, "rationale": "The text suggests a complete breakdown of self-governance, not merely a struggle with leadership."}], "id": "q03"}, {"question": "A student notices a classmate being bullied and, despite fearing social repercussions, stands up for them. This action best exemplifies which key civic virtue listed in the text?", "options": [{"text": "Respect for law", "isCorrect": false, "rationale": "Respect for law involves following rules and working legally to change them, which is not the primary virtue demonstrated in this scenario."}, {"text": "Responsibility", "isCorrect": false, "rationale": "Responsibility is doing one's duty; while it could be argued as responsible, 'courage' is a more direct fit for 'standing up for what is right, even when it costs something.'"}, {"text": "Courage", "isCorrect": true, "rationale": "The text defines 'Courage' as 'Standing up for what is right, even when it costs something.' The scenario perfectly matches this definition, as the student faces potential social cost."}, {"text": "Fairness", "isCorrect": false, "rationale": "Fairness is treating others as you would want to be treated. While the action is fair, the emphasis on overcoming fear to act makes 'courage' a stronger descriptor."}], "id": "q04"}, {"question": "George Washington's decision to voluntarily give up power after commanding the Continental Army and later after serving two terms as President was particularly remarkable because it:", "options": [{"text": "Demonstrated his personal wealth and comfort in returning to his farm.", "isCorrect": false, "rationale": "While he returned to his farm, the text emphasizes the act of relinquishing power, not his personal comfort or wealth."}, {"text": "Established a precedent for the peaceful transfer of power, essential for a republic.", "isCorrect": true, "rationale": "The text explicitly states: 'Washington's resignation became a model for every president since. The peaceful transfer of power... is one of America's most important traditions. It only works because people like Washington choose to follow the rules rather than grab for power.'"}, {"text": "Proved that military leaders are naturally more virtuous than civilian politicians.", "isCorrect": false, "rationale": "The text does not make this general claim; it highlights Washington's specific actions as virtuous regardless of his military background."}, {"text": "Illustrated his lack of ambition for long-term political influence.", "isCorrect": false, "rationale": "It was not a lack of ambition but a principled choice to adhere to rules and serve the common good by not clinging to power, which requires a strong character, not a lack of ambition."}], "id": "q05"}, {"question": "The text states that a republic is built 'from the top down by its laws and institutions — and from the bottom up by the daily choices of millions of ordinary citizens.' This statement primarily emphasizes that:", "options": [{"text": "Civic virtue is primarily developed through formal education and government programs.", "isCorrect": false, "rationale": "The statement highlights individual 'daily choices,' suggesting that civic virtue is fostered through everyday actions, not solely formal programs."}, {"text": "The most impactful acts of civic virtue are performed by leaders like presidents and generals.", "isCorrect": false, "rationale": "While leaders' actions are important, the 'bottom up' aspect specifically highlights the impact of 'ordinary citizens.'"}, {"text": "Small, consistent acts of civic virtue by individuals are fundamental to sustaining self-government.", "isCorrect": true, "rationale": "The phrase 'bottom up by the daily choices of millions of ordinary citizens' directly supports the idea that everyday acts by individuals are crucial for a republic's foundation."}, {"text": "Laws and institutions are ultimately less important than individual character in maintaining a republic.", "isCorrect": false, "rationale": "The text states it's built 'from the top down by its laws and institutions' *and* 'from the bottom up,' indicating both are essential and equally important, not one less so than the other."}], "id": "q06"}, {"question": "Which of the following is NOT explicitly listed as a key civic virtue in the provided text?", "options": [{"text": "Honesty", "isCorrect": false, "rationale": "Honesty is explicitly listed as a key civic virtue: 'Telling the truth, even when it is hard.'"}, {"text": "Industriousness", "isCorrect": true, "rationale": "While a valuable quality, 'industriousness' (diligence or hard work) is not mentioned in the list of key civic virtues: Honesty, Responsibility, Courage, Respect for law, Concern for the common good, Fairness."}, {"text": "Responsibility", "isCorrect": false, "rationale": "Responsibility is explicitly listed as a key civic virtue: 'Doing your duty — to your family, your community, your country — without waiting to be forced.'"}, {"text": "Fairness", "isCorrect": false, "rationale": "Fairness is explicitly listed as a key civic virtue: 'Treating others as you would want to be treated, regardless of who they are.'"}], "id": "q07"}, {"question": "When the text discusses 'concern for the common good,' it primarily refers to citizens:", "options": [{"text": "Prioritizing their personal economic success to benefit the overall economy.", "isCorrect": false, "rationale": "The definition of common good is 'what is best for the whole community, not just for one person or group,' which contradicts prioritizing personal gain."}, {"text": "Focusing on what benefits their immediate family and close friends.", "isCorrect": false, "rationale": "The definition clarifies 'not just for one person or group,' meaning it extends beyond immediate family or friends."}, {"text": "Thinking about what is beneficial for the entire community and country, not just themselves.", "isCorrect": true, "rationale": "The text defines 'common good' as 'what is best for the whole community, not just for one person or group,' and further explains 'Concern for the common good' as 'Thinking not just about what is good for you but about what is good for your community and country.'"}, {"text": "Lobbying for specific group interests that align with their personal values.", "isCorrect": false, "rationale": "This represents favoring a particular group, not necessarily the entire community's best interest."}], "id": "q08"}, {"question": "A group of citizens strongly disagrees with a newly passed local ordinance. They decide to organize peaceful protests, contact their elected officials, and encourage voter registration to support candidates who promise to repeal the law. This approach best demonstrates which civic virtue?", "options": [{"text": "Courage", "isCorrect": false, "rationale": "While it may require courage, the primary virtue highlighted by 'working through legal means to change' is 'Respect for law.'"}, {"text": "Respect for law", "isCorrect": true, "rationale": "The text states 'Respect for law' includes 'Following the laws, even ones you don't like, and working through legal means to change the ones you think are wrong.' The citizens' actions (protests, contacting officials, voter registration) are all legal means to effect change."}, {"text": "Patriotism", "isCorrect": false, "rationale": "Patriotism is love and loyalty to one's country; while these actions might stem from patriotism, 'Respect for law' is a more specific virtue for the *method* of dissent and change described."}, {"text": "Honesty", "isCorrect": false, "rationale": "Honesty involves telling the truth; while implied, it's not the primary virtue demonstrated by the organized efforts to change a law."}], "id": "q09"}, {"question": "Based on the text's examples and discussions, what is the central overarching message about the foundation and survival of a republic?", "options": [{"text": "Powerful leaders are inherently more virtuous than average citizens, making their actions the sole determinant of a republic's fate.", "isCorrect": false, "rationale": "The text emphasizes both leaders (Cincinnatus, Washington) and 'daily choices of millions of ordinary citizens' as crucial, not solely powerful leaders."}, {"text": "Military strength and readiness are the ultimate safeguards against the collapse of a republic into dictatorship.", "isCorrect": false, "rationale": "While military defense is important, the text primarily focuses on civic virtue and the voluntary transfer of power as the safeguards for a republic's internal health."}, {"text": "The long-term health and freedom of a republic depend on both citizens and leaders prioritizing the common good and upholding civic virtues, including the voluntary transfer of power.", "isCorrect": true, "rationale": "This option synthesizes the key themes: the importance of civic virtue (qualities like prioritizing common good) for *both* citizens and leaders (seen in Cincinnatus and Washington), and the necessity of voluntary power transfer for maintaining a republic's freedom."}, {"text": "Economic stability and prosperity are the most important indicators of a virtuous society and ensure the perpetuation of a republic.", "isCorrect": false, "rationale": "The text focuses on character and actions related to governance and community well-being, not economic factors, as the primary drivers of a republic's survival."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
