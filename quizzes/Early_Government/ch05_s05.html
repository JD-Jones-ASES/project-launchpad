<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 5, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental purpose of the system of checks and balances in the U.S. government?", "options": [{"text": "To allow the President to act unilaterally in times of national crisis.", "isCorrect": false, "rationale": "Checks and balances are designed to prevent unilateral action by any single branch, even in a crisis, by ensuring shared power and accountability."}, {"text": "To ensure that no single branch of government can dominate the others.", "isCorrect": true, "rationale": "The text explicitly states that 'Checks and balances ensure that no single branch can dominate the others' and 'This system is the key to preventing tyranny.'"}, {"text": "To centralize power within the Legislative Branch, as it is closest to the people.", "isCorrect": false, "rationale": "The system aims to distribute power among all three branches, not to centralize it within any one, including the Legislative Branch."}, {"text": "To expedite the legislative process by avoiding disagreements between branches.", "isCorrect": false, "rationale": "While ensuring good governance, checks and balances can sometimes slow down the legislative process by requiring deliberation and consensus, rather than expediting it through the avoidance of disagreement."}], "id": "q01"}, {"question": "If the President vetoes a bill passed by Congress, what specific action can Congress take to still make the bill a law?", "options": [{"text": "Demand the Supreme Court declare the veto unconstitutional.", "isCorrect": false, "rationale": "The Supreme Court does not have the power to declare a presidential veto unconstitutional in the context of overriding legislation; its role is judicial review of laws."}, {"text": "Re-pass the bill with a simple majority vote in both chambers.", "isCorrect": false, "rationale": "A simple majority is sufficient for initially passing a bill, but a presidential veto requires a supermajority to be overridden."}, {"text": "Override the veto with a two-thirds vote in both the House and the Senate.", "isCorrect": true, "rationale": "The definition of 'override' states: 'Congress can override a veto with a two-thirds vote of both chambers.'"}, {"text": "Refer the bill to the states for ratification as a constitutional amendment.", "isCorrect": false, "rationale": "Proposing a constitutional amendment is a separate and much more complex process used to change the Constitution itself, not to directly pass a vetoed bill into law."}], "id": "q02"}, {"question": "How does the President primarily exert a check on the power of the Judicial Branch?", "options": [{"text": "By declaring Supreme Court decisions unconstitutional.", "isCorrect": false, "rationale": "Declaring laws or actions unconstitutional is the power of judicial review, which belongs to the Judicial Branch itself, not the President."}, {"text": "By impeaching federal judges for misconduct.", "isCorrect": false, "rationale": "The power to impeach federal officials, including judges, belongs to the Legislative Branch (the House impeaches, the Senate tries)."}, {"text": "By nominating all federal judges, including Supreme Court justices.", "isCorrect": true, "rationale": "The text states under 'Executive Branch (President) checks' that the 'President nominates all federal judges, including Supreme Court justices (with Senate approval).'"}, {"text": "By proposing constitutional amendments to overturn court rulings.", "isCorrect": false, "rationale": "The power to propose constitutional amendments to override court decisions belongs to the Legislative Branch (Congress)."}], "id": "q03"}, {"question": "The Supreme Court rules that a recently enacted law violates the First Amendment. What power is the Court exercising in this scenario?", "options": [{"text": "Impeachment", "isCorrect": false, "rationale": "Impeachment is the process of formally charging an official with misconduct, not ruling on the constitutionality of a law."}, {"text": "Veto override", "isCorrect": false, "rationale": "Veto override is a legislative power used by Congress to pass a bill despite a presidential veto."}, {"text": "Judicial review", "isCorrect": true, "rationale": "The text defines judicial review as the power by which 'courts can declare laws passed by Congress or actions taken by the President to be unconstitutional,' which directly applies to this scenario."}, {"text": "Legislative proposal", "isCorrect": false, "rationale": "Legislative proposal refers to the act of recommending or introducing laws, which is a function of the Executive and Legislative branches, not the Judicial Branch in this context."}], "id": "q04"}, {"question": "The President wishes to appoint a new Secretary of State and a new federal judge. Which branch of government must formally approve these appointments before they can take office?", "options": [{"text": "The House of Representatives only.", "isCorrect": false, "rationale": "The House of Representatives does not have the power to confirm Cabinet appointments or federal judge nominations; this power belongs exclusively to the Senate."}, {"text": "The Senate only.", "isCorrect": true, "rationale": "Under 'Legislative Branch (Congress) checks' on the Executive, the text states: 'The Senate must confirm Cabinet appointments and federal judge nominations.'"}, {"text": "Both the House and the Senate.", "isCorrect": false, "rationale": "While both chambers of Congress have roles in legislation and impeachment, only the Senate has the power to confirm presidential appointments."}, {"text": "The Supreme Court.", "isCorrect": false, "rationale": "The Supreme Court's role is to interpret laws and the Constitution, not to confirm appointments to the Executive or Judicial branches."}], "id": "q05"}, {"question": "The War Powers Resolution of 1973 is cited as a 'real example' of Congress limiting the President's ability to commit troops to war. This demonstrates which general principle of checks and balances?", "options": [{"text": "The Executive's power to recommend legislation.", "isCorrect": false, "rationale": "The War Powers Resolution was Congress's action to limit the Executive, not an example of the Executive recommending legislation."}, {"text": "The Legislative Branch's power to declare war.", "isCorrect": true, "rationale": "The text states 'Only Congress can declare war' as a legislative check on the Executive. The War Powers Resolution is an application of this power to limit presidential authority in committing troops."}, {"text": "The Judicial Branch's use of judicial review.", "isCorrect": false, "rationale": "Judicial review involves courts declaring laws or actions unconstitutional, which is distinct from Congress enacting a law to regulate war powers."}, {"text": "The President's role as Commander-in-Chief.", "isCorrect": false, "rationale": "While the President is Commander-in-Chief, the War Powers Resolution is an example of Congress checking that power, not demonstrating the power itself."}], "id": "q06"}, {"question": "James Madison, referencing Polybius, argued that giving each branch its own powers and ways to defend itself was 'the key to preventing tyranny.' This statement emphasizes which aspect of checks and balances?", "options": [{"text": "The efficiency of governmental operations.", "isCorrect": false, "rationale": "While a well-functioning government can be efficient, the primary focus of checks and balances, especially in preventing tyranny, is not efficiency but the prevention of concentrated power."}, {"text": "The ability of one branch to completely abolish another.", "isCorrect": false, "rationale": "Checks and balances are about limiting and balancing power, not about the ability of one branch to abolish another."}, {"text": "The creation of a unified, centralized authority.", "isCorrect": false, "rationale": "The system of checks and balances inherently opposes a unified, centralized authority by distributing power."}, {"text": "The distribution of power to prevent any single entity from gaining absolute control.", "isCorrect": true, "rationale": "Madison's statement directly supports the idea that distributing power among independent branches, each with the ability to resist the others, is crucial for preventing tyranny and absolute control."}], "id": "q07"}, {"question": "Polybius's concept of a 'mixed constitution' in ancient Rome, combining monarchy, aristocracy, and democracy, directly informed the American Founders' design by illustrating what?", "options": [{"text": "How to centralize power effectively for national defense.", "isCorrect": false, "rationale": "Polybius's analysis of Rome, as explained in the text, focused on preventing centralized control, not achieving it."}, {"text": "The benefits of a single, all-powerful executive leader.", "isCorrect": false, "rationale": "A 'mixed constitution' explicitly describes a system with multiple components, indicating a distribution of power rather than a single all-powerful leader."}, {"text": "The importance of different parts of government checking each other to prevent total control.", "isCorrect": true, "rationale": "The text states, 'Because each part checked the others, he said, no single group could seize total control.' This directly mirrors the American Founders' intent."}, {"text": "The necessity of a permanent military to maintain order.", "isCorrect": false, "rationale": "While Rome had a military, Polybius's constitutional analysis, as presented here, focused on the balance of governmental powers, not military structure."}], "id": "q08"}, {"question": "A federal judge is accused of accepting bribes. Which sequence of actions correctly describes the most likely process for addressing this misconduct within the system of checks and balances?", "options": [{"text": "The President removes the judge, and Congress confirms the removal.", "isCorrect": false, "rationale": "The President does not have the power to remove federal judges; that power resides with Congress through the impeachment process."}, {"text": "The Supreme Court declares the judge's actions unconstitutional, leading to their dismissal.", "isCorrect": false, "rationale": "The Supreme Court rules on laws and actions, but it does not have the power to dismiss a federal judge for misconduct; that is a legislative function."}, {"text": "The House impeaches the judge, and the Senate holds a trial.", "isCorrect": true, "rationale": "The definition of 'impeach' states: 'To formally charge a president, vice president, or federal judge with misconduct while in office. The House impeaches; the Senate holds the trial.'"}, {"text": "Congress proposes a constitutional amendment to override the judge's past decisions.", "isCorrect": false, "rationale": "Proposing an amendment is a mechanism to override court *decisions* or change the Constitution, not to address the misconduct of an individual judge."}], "id": "q09"}, {"question": "The definition states that 'Congress can propose constitutional amendments to override court decisions.' This power demonstrates Congress's ability to limit which other branch?", "options": [{"text": "The Executive Branch, by preventing presidential overreach.", "isCorrect": false, "rationale": "This specific power targets court decisions, not actions taken by the President or the Executive Branch."}, {"text": "The Judicial Branch, by providing a mechanism to counter its rulings.", "isCorrect": true, "rationale": "The text explicitly states this power as a way the Legislative Branch checks 'The Judicial' by proposing amendments 'to override court decisions.'"}, {"text": "The Legislative Branch itself, by requiring a supermajority for amendments.", "isCorrect": false, "rationale": "While passing an amendment requires a supermajority, this power is a check *on* another branch (Judicial), not a self-check of the Legislative Branch."}, {"text": "State governments, by ensuring federal law supremacy.", "isCorrect": false, "rationale": "While constitutional amendments can affect states, the immediate purpose of this specific check is to limit the power of federal court rulings, not state governments directly."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
