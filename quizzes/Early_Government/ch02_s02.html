    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What did Samuel primarily warn the elders about when they requested a human king 'like all the other nations'?", "options": [{"text": "The king would demand excessive religious offerings and forsake the covenant with God.", "isCorrect": false, "rationale": "While kings might have religious duties, Samuel's specific warnings in the text focused on the king's demands for human resources and taxes, not solely on religious offerings or forsaking the covenant."}, {"text": "The king would conscript their sons for his army, take their daughters for service, tax their lands, and ultimately cause them distress.", "isCorrect": true, "rationale": "The text explicitly states Samuel's warning: 'a king would take their sons for his army. He would take their daughters to cook and bake. He would tax their fields and vineyards. In the end, they would cry out because of the king they had chosen.'"}, {"text": "The king would lead them into constant, unwinnable wars with neighboring powerful empires.", "isCorrect": false, "rationale": "Samuel mentioned the king taking sons for the army, implying warfare, but did not specifically warn about 'constant, unwinnable wars' as the primary distress, rather the general burdens of monarchy."}, {"text": "The king would abandon their traditional laws from the Torah in favor of foreign legal systems.", "isCorrect": false, "rationale": "The text does not mention Samuel warning about the king abandoning the Torah or introducing foreign legal systems. His warnings were about the personal cost and demands of a monarch."}], "id": "q01"}, {"question": "In ancient Israel, what was the defining characteristic of a 'judge' during the period before the kings?", "options": [{"text": "A permanent, hereditary ruler who oversaw the daily administration of the entire nation.", "isCorrect": false, "rationale": "The definition states that judges were 'not permanent rulers' and 'they served, and they stepped back,' indicating they were not hereditary or permanent."}, {"text": "A leader raised up in times of danger, serving temporarily to defend the people according to God's will.", "isCorrect": true, "rationale": "The text defines a judge as 'A leader raised up in times of danger. Judges were not permanent rulers. They led when their people needed them' and 'carried out God's will rather than their own.'"}, {"text": "A chief priest responsible for interpreting the law and performing religious rituals in Jerusalem.", "isCorrect": false, "rationale": "While judges operated under religious law, their primary role described was leadership and defense during crises, not solely priestly duties or a permanent role in Jerusalem (which wasn't capital until David)."}, {"text": "A tribal elder who mediated disputes and maintained peace within his own family and clan.", "isCorrect": false, "rationale": "While tribal elders had roles, judges were specific leaders 'raised up' for broader national defense in times of crisis, not merely internal family mediation."}], "id": "q02"}, {"question": "Which of the following best describes the system of governance in ancient Israel during 'the Period of the Judges'?", "options": [{"text": "An absolute monarchy, where judges acted as proxies for an absent divine king.", "isCorrect": false, "rationale": "The period of judges explicitly lacked a human king and was not an absolute monarchy. While God was the ruler, judges were not proxies for an 'absent divine king' but direct instruments of God's will."}, {"text": "A democratic republic, where major decisions were made through elected representatives from each tribe.", "isCorrect": false, "rationale": "The text describes governance by tribes and families in quiet times and judges raised by God, not an elected democratic republic."}, {"text": "A theocracy, where God was considered the true ruler, and laws were derived from divine command.", "isCorrect": true, "rationale": "The text explicitly states, 'Israel during the period of the judges was a kind of theocracy: a government where God was understood as the true ruler, and the laws came from divine command rather than from a human king.'"}, {"text": "An oligarchy, controlled by a council of the wealthiest landowning families.", "isCorrect": false, "rationale": "The text does not describe an oligarchy based on wealth, but rather a system where God was the ultimate authority, and judges were raised up to serve."}], "id": "q03"}, {"question": "According to the text, how did the role of a 'king' fundamentally differ from that of a 'judge' in ancient Israel?", "options": [{"text": "Kings focused solely on military defense, while judges were primarily religious leaders.", "isCorrect": false, "rationale": "Judges were also military defenders (e.g., Deborah, Gideon), and kings had significant religious roles (e.g., Solomon building the Temple). The distinction is not solely based on military vs. religious focus."}, {"text": "Kings were permanent, hereditary rulers who held power for life, whereas judges were temporary leaders raised in times of specific need.", "isCorrect": true, "rationale": "The definitions clearly state: 'king — A hereditary ruler who holds power for life and passes it to an heir' and 'judge... were not permanent rulers. They led when their people needed them.'"}, {"text": "Kings governed only the northern tribes, while judges governed only the southern tribes.", "isCorrect": false, "rationale": "This geographical division occurred *after* Solomon's reign, long after the general period of judges and the initial establishment of the monarchy for all tribes."}, {"text": "Kings were chosen by popular vote, while judges were appointed by Samuel and other prophets.", "isCorrect": false, "rationale": "Kingship was hereditary, not by popular vote. Judges were 'raised up by God,' not appointed by Samuel in a formal, ongoing process."}], "id": "q04"}, {"question": "Which of the following individuals is explicitly mentioned in the text as a famous judge in ancient Israel?", "options": [{"text": "Saul", "isCorrect": false, "rationale": "Saul was the first king of Israel, not a judge."}, {"text": "Solomon", "isCorrect": false, "rationale": "Solomon was David's son and a king, known for building the Temple."}, {"text": "Gideon", "isCorrect": true, "rationale": "The text specifically lists Gideon as one of the 'famous judges' known for defeating a larger army with 300 warriors."}, {"text": "Goliath", "isCorrect": false, "rationale": "Goliath was the giant warrior defeated by David, not an Israelite judge."}], "id": "q05"}, {"question": "The text states that the shift from judges to kings 'would cost something.' Based on Samuel's warnings and the subsequent descriptions, what was a significant 'cost' of this transition for the Israelite people?", "options": [{"text": "The immediate loss of the capital city, Jerusalem, to a foreign power.", "isCorrect": false, "rationale": "Jerusalem became the capital *under* King David, indicating it was conquered and established by the monarchy, not lost as a cost of the transition."}, {"text": "A reduction in their direct relationship with God, as kings became intermediaries.", "isCorrect": false, "rationale": "While the nature of governance changed, the text does not directly state that the transition itself caused a reduction in their relationship with God, but rather highlighted the king's secular demands."}, {"text": "The imposition of burdens like military conscription, taxation, and personal service, leading to their eventual distress.", "isCorrect": true, "rationale": "Samuel's warning explicitly detailed these burdens: taking sons for the army, daughters for service, and taxing fields and vineyards, leading to the people crying out because of the king they had chosen."}, {"text": "The permanent division of the united kingdom into northern Israel and southern Judah.", "isCorrect": false, "rationale": "The kingdom split 'After Solomon,' which was a later consequence of specific kings' reigns, not an immediate or direct cost of the initial transition to monarchy."}], "id": "q06"}, {"question": "Which of the following sequences correctly orders the kings of Israel mentioned in the text and their primary contributions?", "options": [{"text": "David (first king) → Saul (built Temple) → Solomon (defeated Goliath).", "isCorrect": false, "rationale": "This sequence is incorrect in order and attributed actions. Saul was the first king, David united tribes and fought Goliath, and Solomon built the Temple."}, {"text": "Saul (first king) → David (united tribes, made Jerusalem capital) → Solomon (built Temple, developed trade).", "isCorrect": true, "rationale": "This sequence aligns perfectly with the text: Saul was anointed as the first king, David united the tribes and made Jerusalem capital, and Solomon built the Temple and developed trade."}, {"text": "Solomon (unified Israel) → David (first king) → Saul (split the kingdom).", "isCorrect": false, "rationale": "This sequence is completely incorrect. Saul was first, David unified, and the kingdom split after Solomon."}, {"text": "Samuel (anointed kings) → Saul (made Jerusalem capital) → David (golden age).", "isCorrect": false, "rationale": "Samuel was a prophet/judge, not a king. David made Jerusalem capital, and Solomon's reign was the 'golden age.'"}], "id": "q07"}, {"question": "According to the 'King David' personbox, what makes David a particularly compelling and historically significant figure?", "options": [{"text": "He was the first Israelite king to outlaw all foreign religious practices, ensuring religious purity.", "isCorrect": false, "rationale": "The text does not mention David outlawing foreign religious practices. His significance is described differently."}, {"text": "His reign was marked by perfect adherence to divine law, without any personal or political failures.", "isCorrect": false, "rationale": "The personbox explicitly states that the scriptures record 'both his great achievements and his serious failures,' making him a 'fully human figure.'"}, {"text": "He is depicted as a complex, 'fully human' figure whose achievements and failures are recorded, and whose traditions continue to shape faith and culture globally.", "isCorrect": true, "rationale": "The personbox highlights him as one of the 'most fully human figures in ancient history' due to his recorded achievements and failures, and notes that 'Many people around the world today trace their faith or culture back to the traditions he helped shape.'"}, {"text": "He was the sole architect of the theocratic government, establishing God as the true ruler.", "isCorrect": false, "rationale": "Theocracy existed *before* kings, during the period of the judges, where God was already understood as the true ruler."}], "id": "q08"}, {"question": "The 'keyconcept' box highlights the transition of Ancient Israel from a theocracy under judges to a monarchy under kings. What broader lesson does this transition illustrate about governments?", "options": [{"text": "That religious leadership is inherently unsustainable for complex nations.", "isCorrect": false, "rationale": "The text presents the shift as a response to people's desires, not a general condemnation of religious leadership as unsustainable."}, {"text": "That governments are static entities, resistant to change over long periods.", "isCorrect": false, "rationale": "The key concept explicitly states that 'governments change over time,' directly contradicting this option."}, {"text": "That changes in governmental structures often occur in response to the desires and pressures of the people.", "isCorrect": true, "rationale": "The keyconcept states, 'This transition shows something important: governments change over time, often in response to the desires and pressures of the people.'"}, {"text": "That monarchies are universally the most effective form of government for unity and prosperity.", "isCorrect": false, "rationale": "The text does not make a universal claim about the superiority of monarchies; it details the specific transition in Israel and its consequences."}], "id": "q09"}, {"question": "Which of the following accomplishments is primarily attributed to King Solomon, David's son?", "options": [{"text": "Defeating the giant warrior Goliath with a sling and a stone.", "isCorrect": false, "rationale": "This achievement is attributed to David before he became king, as mentioned in the King David personbox."}, {"text": "Uniting the Israelite tribes into one nation and establishing Jerusalem as the capital.", "isCorrect": false, "rationale": "These accomplishments are attributed to King David, Solomon's father."}, {"text": "Building the great Temple in Jerusalem and developing extensive trade with distant lands.", "isCorrect": true, "rationale": "The text explicitly states: 'David's son Solomon built the great Temple in Jerusalem and developed trade with distant lands.'"}, {"text": "Leading the people during a military crisis to a victory against a much larger army with only 300 warriors.", "isCorrect": false, "rationale": "This feat is attributed to Gideon, one of the judges, not King Solomon."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
