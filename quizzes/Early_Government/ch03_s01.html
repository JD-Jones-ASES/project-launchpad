<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What were the two fundamental questions Aristotle used to classify governments?", "options": [{"text": "How large is the territory governed, and how wealthy are its citizens?", "isCorrect": false, "rationale": "Aristotle's classification system focused on the nature of rule, not economic or geographic factors."}, {"text": "How many people hold power, and for whose benefit do they rule?", "isCorrect": true, "rationale": "The text explicitly states these are 'The Two Big Questions' Aristotle used: 'How many people hold power? One person? A few people? Many people?' and 'For whose benefit do they rule? For the common good? Or for themselves?'"}, {"text": "Is the government elected by the people, and does it enforce laws fairly?", "isCorrect": false, "rationale": "While these are aspects of government, they are not Aristotle's primary classification questions. His framework precedes modern concepts of elections in the same way."}, {"text": "Does the government have a strong military, and does it promote trade?", "isCorrect": false, "rationale": "These are practical aspects of state function, not the foundational questions Aristotle used to categorize the form of government."}]}, {"question": "According to Aristotle's classification, what is the primary distinction between a monarchy and a tyranny?", "options": [{"text": "A monarchy is ruled by a king, while a tyranny is ruled by an emperor.", "isCorrect": false, "rationale": "Both monarchy and tyranny involve rule by one person; the title of the ruler is not the defining difference according to Aristotle."}, {"text": "A monarchy governs for the common good, while a tyranny governs for the ruler's self-interest.", "isCorrect": true, "rationale": "The text states, 'A king who cares about his people is a good monarch. A king who cares only about his own wealth and power is a tyrant.' This highlights the ruler's intent as the key differentiator."}, {"text": "A monarchy's power is inherited, while a tyranny's power is seized by force.", "isCorrect": false, "rationale": "While tyrants often seize power, Aristotle's primary distinction between good and corrupt forms, including monarchy and tyranny, rests on *for whose benefit* the ruler governs, not the method of acquiring power."}, {"text": "A monarchy has a written constitution, while a tyranny does not.", "isCorrect": false, "rationale": "The presence or absence of a written constitution is not mentioned as Aristotle's primary distinction between these forms."}]}, {"question": "How did Polybius expand upon Aristotle's classification of governments?", "options": [{"text": "He introduced the concept of a written constitution.", "isCorrect": false, "rationale": "While Polybius studied governments with constitutions, introducing the *concept* of a written constitution was not his primary expansion on Aristotle's work."}, {"text": "He identified the specific economic conditions that lead to each government type.", "isCorrect": false, "rationale": "Polybius focused on the *political* cycle of decay and transformation, not primarily economic conditions."}, {"text": "He proposed a theory that governments naturally cycle through different forms over time.", "isCorrect": true, "rationale": "Polybius's theory of anacyclosis ('rotating cycle') explains how governments move 'from one form to the next, generation after generation,' building on Aristotle's static classification."}, {"text": "He argued that only a pure democracy could ever truly serve the common good.", "isCorrect": false, "rationale": "Polybius actually warned against pure democracy decaying into mob rule and advocated for a mixed constitution as the solution."}]}, {"question": "Which of the following terms describes a government where a small group of wealthy or powerful people rule primarily for their own benefit?", "options": [{"text": "Aristocracy", "isCorrect": false, "rationale": "Aristocracy is 'Government by the best and most qualified,' ruling for the common good."}, {"text": "Monarchy", "isCorrect": false, "rationale": "Monarchy is rule by one person for the common good."}, {"text": "Oligarchy", "isCorrect": true, "rationale": "The definition provided states, 'oligarchy...Government by a small group of wealthy or powerful people, for their own benefit.'"}, {"text": "Democracy", "isCorrect": false, "rationale": "Democracy is typically understood as rule by the many, ideally for the common good, not by a small group for their own benefit."}]}, {"question": "Aristotle warned that if the majority uses its power to crush the minority, it leads to 'mob rule.' Which term from Polybius's theory describes this same corrupt form of many-person rule?", "options": [{"text": "Anacyclosis", "isCorrect": false, "rationale": "Anacyclosis is Polybius's term for the entire cycle of governmental change, not a specific form of government."}, {"text": "Ochlocracy", "isCorrect": true, "rationale": "The text explicitly states: 'Democracy decays into ochlocracy (ok-LOK-ruh-see) — mob rule,' directly linking it to Aristotle's concept."}, {"text": "Aristocracy", "isCorrect": false, "rationale": "Aristocracy is rule by the best for the common good, a good form of government by a few, not corrupt rule by the many."}, {"text": "Tyranny", "isCorrect": false, "rationale": "Tyranny is corrupt rule by one person for their own benefit."}]}, {"question": "What was Polybius's proposed solution to break the 'rotating cycle' of governments (anacyclosis)?", "options": [{"text": "Establishing a hereditary monarchy with absolute power.", "isCorrect": false, "rationale": "Polybius saw monarchy as a starting point that inevitably decayed into tyranny, not a stable solution."}, {"text": "Implementing a pure democracy where all citizens vote on every law.", "isCorrect": false, "rationale": "Polybius recognized that pure democracy could decay into ochlocracy or mob rule."}, {"text": "Creating a mixed constitution that combines elements of monarchy, aristocracy, and democracy.", "isCorrect": true, "rationale": "The text states, 'Polybius believed he had found the answer in Rome... a government that blended all three forms together.' This 'mixed constitution' was designed to break the cycle."}, {"text": "Developing a strong military to prevent internal rebellions.", "isCorrect": false, "rationale": "While a strong military might maintain order temporarily, it doesn't address the fundamental political decay Polybius described as the 'cycle of corruption.'"}]}, {"question": "The Roman Republic, as described by Polybius, exemplified a mixed constitution. Which component represented the 'monarchical' element in its structure?", "options": [{"text": "The popular assemblies, where citizens voted on laws.", "isCorrect": false, "rationale": "The popular assemblies represented the democratic element, allowing citizens to vote."}, {"text": "The Senate, composed of experienced leaders.", "isCorrect": false, "rationale": "The Senate represented the aristocratic element, providing long-term policy guidance."}, {"text": "The two consuls, serving for one year at a time.", "isCorrect": true, "rationale": "The text states, 'The two consuls served like kings — but only for one year at a time, and always two of them.' This dual, limited executive power functioned as the monarchical component."}, {"text": "The praetors, who served as judges.", "isCorrect": false, "rationale": "Praetors are not explicitly mentioned as the monarchical component in the provided text's description of the mixed constitution."}]}, {"question": "According to Polybius, why was a mixed constitution, like that of the Roman Republic, effective in preventing the decay of governments?", "options": [{"text": "It ensured that the same family would rule for generations, providing stability.", "isCorrect": false, "rationale": "A mixed constitution, especially with limited terms for consuls, explicitly worked against long-term rule by a single family or person, which could lead to tyranny."}, {"text": "It eliminated the need for citizen participation, streamlining decision-making.", "isCorrect": false, "rationale": "The Roman Republic included popular assemblies, indicating citizen participation was still a part of the mixed government."}, {"text": "It allowed each governmental part to check the others, preventing any single group from seizing total power.", "isCorrect": true, "rationale": "The text explains, 'Because each part could check the others, no single group could seize total power. The cycle of corruption was slowed down, perhaps even broken.'"}, {"text": "It promoted rapid changes in leadership, keeping the government responsive to public opinion.", "isCorrect": false, "rationale": "While the consuls had limited terms, the Senate provided a long-term, stable aristocratic element. The primary purpose was balance, not just rapid change."}]}, {"question": "The ideas of Polybius, particularly his concept of a mixed constitution, significantly influenced the American Founders. Which principle of the U.S. government directly reflects this influence?", "options": [{"text": "The electoral college system for presidential elections.", "isCorrect": false, "rationale": "While the electoral college is a unique feature, the text specifically highlights the 'mixed constitution' concept as influencing the American system of 'separation of powers' and 'checks and balances,' not the electoral college directly."}, {"text": "The system of checks and balances among the three branches of government.", "isCorrect": true, "rationale": "The text explicitly states: 'This idea [mixed constitution] influenced the American Founders when they designed three branches of government... His idea of a mixed constitution is one of the roots of the American system of separation of powers.' The teacher note further reinforces 'checks and balances' as the Founders' solution."}, {"text": "The establishment of a federal system with states and a national government.", "isCorrect": false, "rationale": "Federalism is a distinct concept from the internal structure of government branches, although also important to the Founders' design."}, {"text": "The Bill of Rights protecting individual liberties.", "isCorrect": false, "rationale": "The Bill of Rights focuses on individual rights, which is different from the structural design of government power distribution addressed by the mixed constitution concept."}]}, {"question": "In Polybius's theory of anacyclosis, which sequence correctly depicts the *decay* from a good form to its corrupt counterpart?", "options": [{"text": "Monarchy -> Aristocracy -> Democracy", "isCorrect": false, "rationale": "This sequence lists good forms of government in succession, not the decay from good to corrupt within each type."}, {"text": "Tyranny -> Oligarchy -> Ochlocracy", "isCorrect": false, "rationale": "This sequence lists only corrupt forms, not the transition from a good form into its corrupt version."}, {"text": "Monarchy -> Tyranny; Aristocracy -> Oligarchy; Democracy -> Ochlocracy", "isCorrect": true, "rationale": "The text clearly outlines the cycle of decay: 'Monarchy decays into tyranny,' 'Aristocracy decays into oligarchy,' and 'Democracy decays into ochlocracy (mob rule).'"}, {"text": "Democracy -> Monarchy -> Aristocracy", "isCorrect": false, "rationale": "This sequence is an incorrect order and doesn't represent the decay from good to corrupt forms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
