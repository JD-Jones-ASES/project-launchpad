    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary definition and purpose of the Bill of Rights as described in the text?", "options": [{"text": "A list of all powers granted to the federal government by the states.", "isCorrect": false, "rationale": "The Bill of Rights lists what the government *cannot* do and protects individual rights, not the powers granted to the federal government. The Constitution itself outlines federal powers."}, {"text": "The first ten amendments to the U.S. Constitution, ratified in 1791, designed to protect individual rights from government interference.", "isCorrect": true, "rationale": "The text explicitly defines the Bill of Rights as 'The first ten amendments to the U.S. Constitution, ratified in 1791. They protect individual rights from government interference.'"}, {"text": "A formal agreement among states outlining their responsibilities to each other.", "isCorrect": false, "rationale": "This describes aspects of the Articles of Confederation or principles of federalism, not the Bill of Rights, which focuses on individual liberties against government overreach."}, {"text": "A document listing all the rights and responsibilities of U.S. citizens.", "isCorrect": false, "rationale": "The text states the Bill of Rights 'does not list everything citizens can do' but rather 'lists things the government cannot do.' It primarily focuses on protections from government interference, not an exhaustive list of citizen responsibilities."}], "id": "q01"}, {"question": "Following the ratification of the Constitution, why were many Americans still nervous, leading to calls for a Bill of Rights?", "options": [{"text": "They feared the Constitution was too vague on the powers granted to individual states.", "isCorrect": false, "rationale": "The concern was about the *federal* government's power and potential overreach, not the vagueness regarding state powers. The Anti-Federalists specifically worried about a strong central government."}, {"text": "They believed the Constitution did not adequately define what the government was *forbidden* to do regarding individual liberties.", "isCorrect": true, "rationale": "The text states, 'The Constitution said what the government could do. But where did it say what the government could not do?' It specifically mentions concerns about silencing newspapers, forced church attendance, and quartering soldiers, highlighting the need for limits on government power over individuals."}, {"text": "They were unsure if the new government would have enough power to effectively govern the nation.", "isCorrect": false, "rationale": "This concern was held by Federalists *before* ratification, arguing for a stronger central government. The nervousness after ratification stemmed from the opposite fear: that the new government would be *too* powerful without specific limitations on its authority over citizens."}, {"text": "They wanted a comprehensive list of all citizen responsibilities before the government began operating.", "isCorrect": false, "rationale": "The primary concern was about government limitations and individual rights, not a detailed list of citizen responsibilities. The text emphasizes what the government 'could not do' to its citizens."}], "id": "q02"}, {"question": "What was James Madison's significant role in the creation of the Bill of Rights, according to the text?", "options": [{"text": "He initially supported the Bill of Rights but then argued against it in Congress.", "isCorrect": false, "rationale": "Madison's stance was the opposite: he initially argued against the need for a Bill of Rights during ratification but later changed his mind and proposed amendments."}, {"text": "He was a leading Anti-Federalist who strongly demanded a Bill of Rights from the outset.", "isCorrect": false, "rationale": "Madison was a Federalist and initially argued against the need for a Bill of Rights. The Anti-Federalists were the ones who strongly demanded it."}, {"text": "He drafted the series of amendments that eventually became the Bill of Rights after initially opposing its necessity.", "isCorrect": true, "rationale": "The text states, 'James Madison, who had argued against the need for a Bill of Rights during ratification, changed his mind. He proposed a series of amendments to the First Congress.'"}, {"text": "He ratified the amendments as the President of the United States in 1791.", "isCorrect": false, "rationale": "Madison was not President in 1791; George Washington was. Madison's role was drafting the amendments and proposing them to Congress, not ratifying them as president."}], "id": "q03"}, {"question": "According to the 'keyconcept' box, what crucial role did the promise of a Bill of Rights play in the ratification process of the Constitution?", "options": [{"text": "It convinced foreign powers to recognize the new American government.", "isCorrect": false, "rationale": "The text does not mention foreign relations in this context. The key concept focuses on domestic concerns regarding the Constitution's ratification by states."}, {"text": "It ensured that the federal government would have more power than individual states.", "isCorrect": false, "rationale": "The Bill of Rights was designed to *limit* federal power, specifically in relation to individual rights, not to increase it relative to states."}, {"text": "It was essential for securing the ratification of the Constitution by several states.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states, 'Without the promise of a Bill of Rights, several states would not have ratified the Constitution.'"}, {"text": "It clarified the process for electing the President and Vice President.", "isCorrect": false, "rationale": "The Bill of Rights addresses individual rights and government limitations, not the presidential election process, which is outlined in the original Constitution."}], "id": "q04"}, {"question": "A local government passes a law requiring all citizens to attend a specific religious service every Sunday. Based on the protections outlined in the Bill of Rights, which freedom is most clearly being violated?", "options": [{"text": "Freedom of speech", "isCorrect": false, "rationale": "While related to expressing beliefs, the core violation here is not about speaking out, but about the right to practice—or not practice—a religion."}, {"text": "Freedom of petition", "isCorrect": false, "rationale": "Freedom of petition is the right to formally request action from the government, which is not directly violated by a mandatory religious service."}, {"text": "Freedom of religion", "isCorrect": true, "rationale": "The text defines 'freedom of religion' as 'The right to practice your faith — or no faith — without the government telling you what to believe.' Forcing attendance at a specific religious service directly violates this protection."}, {"text": "Protection against unreasonable searches", "isCorrect": false, "rationale": "This protection relates to privacy in one's home and property, not the freedom to choose one's religious practices."}], "id": "q05"}, {"question": "The text emphasizes that the Bill of Rights 'does not list everything citizens can do.' What does it primarily focus on instead?", "options": [{"text": "A detailed outline of the responsibilities expected of every citizen.", "isCorrect": false, "rationale": "The text explicitly states it 'does not list everything citizens can do' and implicitly does not focus on an exhaustive list of responsibilities. Its focus is on government limitations."}, {"text": "A comprehensive guide for states on how to interact with the federal government.", "isCorrect": false, "rationale": "While it impacts federal-state relations by limiting federal power, its primary focus is on protecting individual rights from the *federal government*, not a guide for state interaction."}, {"text": "A list of things the federal government is forbidden to do.", "isCorrect": true, "rationale": "The text states, 'It does not list everything citizens can do. Instead, it lists things the government cannot do.' This clearly defines its primary focus."}, {"text": "The powers reserved exclusively for the President and the Supreme Court.", "isCorrect": false, "rationale": "The Bill of Rights limits the entire federal government, including the executive and judicial branches, but its primary focus is not to enumerate their powers. Those are in the main body of the Constitution."}], "id": "q06"}, {"question": "Which of the following scenarios best illustrates the 'radical' nature of the Bill of Rights in 1791, as described in the text?", "options": [{"text": "A monarch in Europe enacting similar protections for their subjects years prior to the U.S. Bill of Rights.", "isCorrect": false, "rationale": "The text states, 'Most governments in the world at that time had no such limits,' implying that the protections were unique and *not* widely adopted elsewhere."}, {"text": "A U.S. citizen successfully challenging a government action that sought to censor their newspaper.", "isCorrect": true, "rationale": "The text points out that questions like 'Where did it say the government could not silence newspapers?' were central to the need for the Bill of Rights. Such a challenge, based on fundamental government limitations, would have been considered radical given the prevailing governmental norms worldwide at the time."}, {"text": "A state government establishing its own state-mandated religion, separate from federal interference.", "isCorrect": false, "rationale": "While the Bill of Rights limits the federal government, the text highlights the 'radical' aspect as government limitations in general, contrasting with 'most governments in the world' which had no such limits, not specifically state vs. federal religious establishment."}, {"text": "The unanimous agreement among all states on the specific content of the first ten amendments.", "isCorrect": false, "rationale": "The text mentions debate and ratification by states, but not 'unanimous agreement.' The radical nature refers to the *substance* of the protections, not the process of their adoption."}], "id": "q07"}, {"question": "According to the text, what is an 'amendment'?", "options": [{"text": "A formal written request to the government asking it to take action.", "isCorrect": false, "rationale": "This describes a 'petition,' not an 'amendment,' as defined in the text."}, {"text": "A formal change or addition to a constitution, like the 27 changes to the U.S. Constitution.", "isCorrect": true, "rationale": "The text provides the definition: 'amendment (uh-MEND-ment) — A formal change or addition to a constitution. The U.S. Constitution has 27 amendments.'"}, {"text": "The act of ratifying a new constitution or government document.", "isCorrect": false, "rationale": "Ratification is the *process* of approving, while an amendment is the *change or addition* itself."}, {"text": "A legal ruling by the Supreme Court interpreting constitutional principles.", "isCorrect": false, "rationale": "Supreme Court rulings are interpretations; amendments are actual changes or additions to the constitutional text itself."}], "id": "q08"}, {"question": "Consider the following statement from the text: 'The government cannot keep for itself powers the Constitution did not give it.' This statement reflects which broader principle of the Bill of Rights?", "options": [{"text": "The principle of popular sovereignty, where the people hold ultimate power.", "isCorrect": false, "rationale": "While popular sovereignty is a foundational principle of the U.S. government, this specific statement more directly addresses the limits of government power, rather than the source of that power in the people."}, {"text": "The reserved powers principle, ensuring that powers not delegated to the federal government are retained by the states or the people.", "isCorrect": true, "rationale": "This statement directly reflects the principle (commonly associated with the Tenth Amendment, though not explicitly named in the text) that the federal government's powers are limited to those granted by the Constitution, with remaining powers reserved to states or the people."}, {"text": "The supremacy clause, establishing federal law as supreme over state law.", "isCorrect": false, "rationale": "The supremacy clause addresses conflicts between federal and state law, not the general limitation of federal power itself to only those delegated."}, {"text": "The principle of judicial review, allowing courts to determine the constitutionality of laws.", "isCorrect": false, "rationale": "Judicial review is about the power of courts to check laws, not about the initial distribution or limitation of government powers."}], "id": "q09"}, {"question": "Which specific protection listed in the 'itemize' section prevents the government from arbitrarily entering and searching a citizen's residence?", "options": [{"text": "The government cannot tell you what to believe.", "isCorrect": false, "rationale": "This refers to freedom of thought, conscience, and religion, not protection against searches."}, {"text": "The government cannot silence your voice.", "isCorrect": false, "rationale": "This refers to freedom of speech and expression, not protection against searches."}, {"text": "The government cannot search your home without good reason.", "isCorrect": true, "rationale": "The text explicitly states this as one of the protections: 'The government cannot search your home without good reason.' This refers to the Fourth Amendment's protection against unreasonable searches and seizures."}, {"text": "The government cannot keep for itself powers the Constitution did not give it.", "isCorrect": false, "rationale": "This refers to reserved powers (Tenth Amendment), which is a broader limitation on federal authority, not a specific protection against arbitrary searches of homes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
