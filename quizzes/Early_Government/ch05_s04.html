<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary power of courts known as judicial review?", "options": [{"text": "The power to veto presidential appointments.", "isCorrect": false, "rationale": "Veto power belongs to the President, not the judicial branch. Judicial review concerns the constitutionality of laws and actions, not appointments directly."}, {"text": "The power to examine laws and government actions and declare them unconstitutional.", "isCorrect": true, "rationale": "The text defines judicial review as 'The power of courts to examine laws and government actions and declare them unconstitutional if they violate the Constitution.'"}, {"text": "The power to propose new laws to Congress.", "isCorrect": false, "rationale": "Proposing laws is a function of the legislative branch (Congress), not the judicial branch."}, {"text": "The power to enforce laws passed by Congress.", "isCorrect": false, "rationale": "Enforcing laws is primarily the role of the executive branch, not the judicial branch, which interprets and applies them."}]}, {"question": "If the Supreme Court declares a newly passed federal law 'unconstitutional,' what is the immediate consequence?", "options": [{"text": "The law is sent back to Congress for revisions.", "isCorrect": false, "rationale": "While Congress might choose to revise and resubmit a new law, the immediate consequence of being declared unconstitutional is that the current law is invalid."}, {"text": "The law is invalid and cannot be enforced.", "isCorrect": true, "rationale": "The text states that 'An unconstitutional law is invalid and cannot be enforced,' making its decisions final on federal law and the Constitution."}, {"text": "The law is temporarily suspended but can be re-enacted by the President.", "isCorrect": false, "rationale": "The President cannot re-enact a law declared unconstitutional by the Supreme Court; it is invalid."}, {"text": "The law takes effect only in certain states.", "isCorrect": false, "rationale": "A federal law, if valid, applies nationwide. If declared unconstitutional, it is invalid nationwide."}]}, {"question": "Which statement accurately describes the composition and tenure of the U.S. Supreme Court?", "options": [{"text": "It consists of 13 justices who serve for 10-year terms.", "isCorrect": false, "rationale": "The Supreme Court has nine members, and they serve for life, not 10-year terms."}, {"text": "It consists of 9 justices who are nominated by the President and confirmed by the Senate, serving for life.", "isCorrect": true, "rationale": "The text explicitly states: 'The Supreme Court has nine members: one Chief Justice and eight Associate Justices. The President nominates them; the Senate must confirm them. They serve for life (or until they retire or are removed).'"}, {"text": "It consists of 9 justices who are elected by popular vote every four years.", "isCorrect": false, "rationale": "Supreme Court justices are appointed, not elected, and serve for life, not four-year terms."}, {"text": "It consists of 5 justices, with the Chief Justice being appointed by Congress.", "isCorrect": false, "rationale": "The Supreme Court has nine justices, and the President nominates them, not Congress."}]}, {"question": "The lifetime tenure for Supreme Court justices is primarily designed to achieve which of the following?", "options": [{"text": "To ensure that justices gain extensive experience in the law.", "isCorrect": false, "rationale": "While experience is a benefit, the text specifically states the purpose of life tenure is 'meant to protect them from political pressure.'"}, {"text": "To allow justices to serve without being influenced by political pressure.", "isCorrect": true, "rationale": "The text states that justices 'serve for life... which is meant to protect them from political pressure.' This ensures impartiality in their rulings."}, {"text": "To provide a stable career path for legal professionals.", "isCorrect": false, "rationale": "This is a secondary outcome, not the primary constitutional design purpose of life tenure for Supreme Court justices."}, {"text": "To prevent the President from appointing too many new justices.", "isCorrect": false, "rationale": "The number of justices is set by law, and lifetime tenure does not directly limit the number of presidential appointments over time, only how frequently a specific seat opens."}]}, {"question": "The landmark case of Marbury v. Madison (1803) is significant because it:", "options": [{"text": "Established the Supreme Court's jurisdiction over state laws.", "isCorrect": false, "rationale": "While the Supreme Court does have jurisdiction over some state laws, Marbury v. Madison specifically concerned the power of the Court to declare an act of Congress unconstitutional."}, {"text": "Granted the President the power to nominate Supreme Court justices.", "isCorrect": false, "rationale": "The President's power to nominate justices predates this case and is outlined in the Constitution."}, {"text": "Explicitly wrote the power of judicial review into the Constitution.", "isCorrect": false, "rationale": "The text explicitly states: 'This was not explicitly written in the Constitution. Marshall argued it was implied.' The case established the power, but did not write it into the Constitution."}, {"text": "Affirmed the Supreme Court's power to declare acts of Congress unconstitutional.", "isCorrect": true, "rationale": "The text clearly states: 'In the case of Marbury v. Madison (1803), Chief Justice John Marshall ruled that the Supreme Court has the power to declare an act of Congress unconstitutional.'"}]}, {"question": "Chief Justice John Marshall argued that judicial review, though not explicitly written in the Constitution, was implied. Which reasoning best supports this argument?", "options": [{"text": "The legislative branch requires a judicial check to prevent tyranny.", "isCorrect": false, "rationale": "While judicial review acts as a check, Marshall's specific argument for its *implication* was based on the Constitution's supremacy, not just a general need for checks."}, {"text": "Without judicial review, the Constitution would not be the supreme law of the land, as contradictory laws could exist.", "isCorrect": true, "rationale": "The text explains Marshall's argument: 'if the Constitution is the supreme law of the land, then any law that contradicts it must be invalid — and someone must decide when that happens. That someone is the courts.'"}, {"text": "All government powers are implicitly granted unless explicitly denied.", "isCorrect": false, "rationale": "This is a broad legal principle but not the specific, detailed argument Marshall used for judicial review in Marbury v. Madison as described in the text."}, {"text": "Previous court decisions had already informally exercised this power.", "isCorrect": false, "rationale": "The text indicates Marbury v. Madison *established* this power, suggesting it wasn't a previously informal, widespread practice."}]}, {"question": "A scenario: Congress passes a law that restricts freedom of speech beyond what is allowed by the First Amendment. How would the judicial branch most likely exercise its power in this situation?", "options": [{"text": "The Supreme Court could veto the law before it takes effect.", "isCorrect": false, "rationale": "The President has veto power, not the Supreme Court. The Supreme Court's role is to interpret laws, not to prevent them from becoming law initially."}, {"text": "A District Court could declare the law unconstitutional, stopping its enforcement nationwide.", "isCorrect": false, "rationale": "While a District Court could initially rule, its decision is not final and does not necessarily stop enforcement nationwide until higher courts, particularly the Supreme Court, make a final ruling."}, {"text": "The Supreme Court could strike down the law using its power of judicial review.", "isCorrect": true, "rationale": "The text states: 'If Congress passes a law that violates the First Amendment, the Supreme Court can strike it down' using its power of judicial review. This is an application of its role as a check."}, {"text": "The Courts of Appeals would rewrite the law to comply with the Constitution.", "isCorrect": false, "rationale": "Courts interpret and strike down laws; they do not rewrite them. That is a legislative function."}]}, {"question": "In the federal court system, which court layer primarily serves as trial courts where most federal cases begin, and which layer reviews whether the law was applied correctly without holding new trials?", "options": [{"text": "District Courts are trial courts; the Supreme Court reviews law application.", "isCorrect": false, "rationale": "While District Courts are trial courts, the Courts of Appeals, not the Supreme Court, are specifically described as reviewing law application without new trials. The Supreme Court hears final appeals."}, {"text": "Courts of Appeals are trial courts; District Courts review law application.", "isCorrect": false, "rationale": "The roles are reversed here. District Courts are trial courts, and Courts of Appeals review law application."}, {"text": "District Courts are trial courts; Courts of Appeals review law application.", "isCorrect": true, "rationale": "The text states: 'District Courts — Trial courts where most federal cases begin.' And 'Courts of Appeals — Hear appeals from district courts... They do not hold new trials; they review whether the law was applied correctly.'"}, {"text": "The Supreme Court is the trial court; Courts of Appeals hear all initial appeals.", "isCorrect": false, "rationale": "The Supreme Court does not try crimes. Initial appeals from District Courts go to the Courts of Appeals."}]}, {"question": "John Marshall is considered the most influential figure in the history of American law primarily because he:", "options": [{"text": "Successfully ran for President after his tenure as Chief Justice.", "isCorrect": false, "rationale": "The text does not mention Marshall running for President, nor is that why he is considered influential in American law."}, {"text": "Served the longest tenure of any Chief Justice, authored many landmark decisions, and established judicial review.", "isCorrect": true, "rationale": "The 'personbox' highlights Marshall's '34 years — the longest tenure,' his role in establishing 'judicial review,' and how he 'shape[d] the Constitution's meaning through dozens of landmark decisions,' leading scholars to consider him 'the most influential figure.'"}, {"text": "Wrote the initial draft of the Constitution and the Bill of Rights.", "isCorrect": false, "rationale": "Marshall was a soldier and lawyer during the Revolution and served later. He did not write the initial drafts of the Constitution or the Bill of Rights."}, {"text": "Oversaw the expansion of the number of federal courts across the nation.", "isCorrect": false, "rationale": "While the federal court system grew, Marshall's influence was primarily through his legal interpretations and establishment of judicial power, not necessarily the administrative expansion of courts."}]}, {"question": "A citizen believes a new regulation issued by a federal agency is unconstitutional. Which is the correct path for this challenge to potentially reach a final decision?", "options": [{"text": "Direct appeal to the Supreme Court, bypassing lower courts.", "isCorrect": false, "rationale": "The Supreme Court hears only a very small number of cases, typically on appeal from lower courts, and does not usually serve as the court of first instance for such challenges."}, {"text": "File a case in a District Court, which may then be appealed to a Court of Appeals, and potentially to the Supreme Court.", "isCorrect": true, "rationale": "This path correctly reflects the three layers of the federal court system described: 'District Courts — Trial courts where most federal cases begin,' followed by 'Courts of Appeals — Hear appeals from district courts,' and finally 'The Supreme Court — The highest court. Their decisions are final.'"}, {"text": "Challenge the regulation by refusing to follow it, leading to direct intervention by the Chief Justice.", "isCorrect": false, "rationale": "Refusing to follow a regulation could lead to legal action against the citizen, but it is not the process for challenging its constitutionality through the courts. The Chief Justice does not intervene directly in this manner."}, {"text": "Petition Congress to repeal the regulation, as courts cannot address agency actions.", "isCorrect": false, "rationale": "While petitioning Congress is a valid political action, the courts, through judicial review, absolutely can address government actions, including agency regulations, that are believed to violate the Constitution."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
