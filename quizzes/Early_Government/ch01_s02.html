<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following accurately defines 'family' as presented in the textbook section?", "options": [{"text": "A group of families who share a common ancestry, language, or homeland.", "isCorrect": false, "rationale": "This describes a 'tribe', not a 'family', according to the provided definitions."}, {"text": "The people who raise and care for a child.", "isCorrect": true, "rationale": "The text explicitly defines 'family' as 'The people who raise and care for a child.'"}, {"text": "What is best for everyone in a community, not just one person.", "isCorrect": false, "rationale": "This is the definition of the 'common good', not 'family'."}, {"text": "To work together toward a shared goal.", "isCorrect": false, "rationale": "This is the definition of 'cooperate', not 'family'."}]}, {"question": "According to the text, what is the primary benefit of families joining together to form a tribe or village?", "options": [{"text": "To ensure that every individual's first choice in decisions is always met.", "isCorrect": false, "rationale": "The text implies compromise in decision-making, and the primary benefit is not individual preference but collective good."}, {"text": "To make it easier to survive and achieve things no single person could do alone.", "isCorrect": true, "rationale": "The text states, 'It is easier to survive together than alone' and 'Communities cooperate to do things no single person could do alone,' highlighting shared work and mutual benefit."}, {"text": "To establish a system where one person holds absolute power over others.", "isCorrect": false, "rationale": "While leaders are mentioned, the text emphasizes leaders serving the 'common good,' not absolute individual power."}, {"text": "To eliminate the need for any form of rules or decision-making processes.", "isCorrect": false, "rationale": "The text explicitly states that a village 'needs rules' and 'ways to decide together'."}]}, {"question": "The textbook section describes a scenario where a family decides on dinner, with different members having different preferences. What does this example primarily illustrate about communities?", "options": [{"text": "That individual desires are always prioritized over group consensus.", "isCorrect": false, "rationale": "The example suggests finding a compromise or making a collective decision, not always prioritizing individual desires."}, {"text": "The inherent difficulty in making decisions when people have different wishes, requiring ways to decide together.", "isCorrect": true, "rationale": "The text concludes from the dinner example: 'This is how communities work. People have different wishes. They must find ways to decide together.'"}, {"text": "That communities only function effectively when everyone agrees unanimously on every issue.", "isCorrect": false, "rationale": "The text mentions solutions like parents deciding or agreeing on a place that 'is not anyone's first choice,' indicating unanimous agreement isn't always required or feasible."}, {"text": "The unimportance of cooperation in achieving shared goals.", "isCorrect": false, "rationale": "The section heavily emphasizes the importance of cooperation for community success."}]}, {"question": "A village needs rules concerning 'Who owns which land? How is food shared when the harvest is poor? What happens when two people disagree?' These questions highlight the fundamental need for communities to:", "options": [{"text": "Prevent any form of individual ownership or property rights.", "isCorrect": false, "rationale": "The question 'Who owns which land?' implies the need to define ownership, not prevent it."}, {"text": "Establish systems for managing resources, resolving conflicts, and maintaining social order.", "isCorrect": true, "rationale": "These questions directly relate to resource allocation ('Who owns which land? How is food shared?'), conflict resolution ('What happens when two people disagree?'), and overall community organization."}, {"text": "Ensure that the community always remains small and easy to manage.", "isCorrect": false, "rationale": "Rules are needed regardless of size, and the text later discusses how larger communities need faster ways to decide."}, {"text": "Allow each individual to act entirely independently without oversight.", "isCorrect": false, "rationale": "Rules are designed to guide collective behavior and prevent chaos, not promote total individual independence."}]}, {"question": "Which of the following scenarios best exemplifies a community decision made to serve the 'common good'?", "options": [{"text": "A wealthy merchant hires guards to protect only his personal store.", "isCorrect": false, "rationale": "This decision primarily benefits one individual and their property, not the entire community."}, {"text": "A village collectively agrees to build and maintain a shared well for water access for all residents.", "isCorrect": true, "rationale": "A shared well provides a vital resource that benefits every member of the community, fitting the definition of 'what is best for everyone.'"}, {"text": "A family decides to build a larger home for themselves without consulting anyone else.", "isCorrect": false, "rationale": "This is a private decision benefiting only one family, not the broader community."}, {"text": "An individual leader implements a policy that exclusively favors his own family and friends.", "isCorrect": false, "rationale": "The text explicitly states that 'Leaders who served only themselves caused trouble for everyone' and do not serve the common good."}]}, {"question": "The text states, 'Every community needs ways to make decisions, share resources, and settle disagreements. This need is the beginning of government.' Based on this, what is the fundamental origin or purpose of government in a community?", "options": [{"text": "To establish a dominant class that controls all resources.", "isCorrect": false, "rationale": "While power structures can emerge, the text emphasizes the functional needs of 'sharing resources' and 'settling disagreements' as the basis for government, ideally serving the common good."}, {"text": "The practical necessity of organizing collective life and resolving shared challenges within a group.", "isCorrect": true, "rationale": "This directly aligns with the key concept presented, linking government's origin to the needs for decision-making, resource sharing, and conflict resolution."}, {"text": "To prevent any form of cooperation among individual members.", "isCorrect": false, "rationale": "Government, by facilitating rules and decisions, often enables cooperation rather than preventing it."}, {"text": "The desire to eliminate all forms of leadership and authority.", "isCorrect": false, "rationale": "The text discusses the emergence of leaders and councils as communities grow, indicating authority is part of government."}]}, {"question": "As communities grow larger, what change in decision-making methods does the text suggest typically occurs?", "options": [{"text": "Communities cease to make collective decisions, leaving it up to individuals.", "isCorrect": false, "rationale": "The need for collective decisions actually increases with community size, making the process more complex."}, {"text": "They increasingly rely on talking until everyone agrees, regardless of size.", "isCorrect": false, "rationale": "The text states, 'Small communities can sometimes make decisions by talking until everyone agrees. As communities grow larger, they need faster ways to decide,' implying this method becomes less feasible."}, {"text": "They often choose leaders or councils to make decisions more efficiently on behalf of the group.", "isCorrect": true, "rationale": "The text states, 'As communities grow larger, they need faster ways to decide. Many early communities chose a leader — an elder, a chief, or a council of wise people.'"}, {"text": "Individual members gain more autonomy and decision-making power over community matters.", "isCorrect": false, "rationale": "Larger communities typically require more structured, centralized decision-making, reducing individual autonomy on community-wide issues."}]}, {"question": "What was considered the primary responsibility of a good leader in early communities, according to the text?", "options": [{"text": "To acquire as much personal wealth and property as possible.", "isCorrect": false, "rationale": "The text contrasts good leaders with those who 'served only themselves,' implying personal gain was not the primary responsibility."}, {"text": "To protect the community and serve its common good.", "isCorrect": true, "rationale": "The text explicitly states, 'The leader's job was to protect the community and serve its common good.'"}, {"text": "To entertain the community with stories and performances.", "isCorrect": false, "rationale": "While entertainment might be part of community life, it is not described as the primary job of a leader."}, {"text": "To ensure that all community members engaged in constant competition.", "isCorrect": false, "rationale": "The text highlights cooperation as key to community success, not competition facilitated by leaders."}]}, {"question": "The story of Cincinnatus from ancient Rome serves as an example of which crucial aspect of good leadership?", "options": [{"text": "The importance of maintaining power indefinitely once it has been acquired.", "isCorrect": false, "rationale": "Cincinnatus 'gave up his power and went home to his farm,' directly contradicting this idea."}, {"text": "That leaders should only come from the wealthiest and most influential families.", "isCorrect": false, "rationale": "Cincinnatus was a farmer, and his story emphasizes his character, not his social standing prior to leadership."}, {"text": "Serving the common good and then willingly relinquishing power once the duty is done.", "isCorrect": true, "rationale": "Cincinnatus led the army to victory (serving the common good) and then 'gave up his power and went home to his farm,' making him a model for stepping aside."}, {"text": "The necessity of military conquest for a leader to gain respect.", "isCorrect": false, "rationale": "While Cincinnatus led an army to victory, the emphasis of his story is on his relinquishing power, not just the military aspect itself."}]}, {"question": "Considering the overall message of the section, what is the most fundamental reason humans have consistently formed families, tribes, and communities throughout history?", "options": [{"text": "To minimize personal responsibilities and rely solely on others for survival.", "isCorrect": false, "rationale": "Communities involve shared work and responsibilities, not the minimization of personal responsibility."}, {"text": "To satisfy a natural human desire for constant conflict and competition.", "isCorrect": false, "rationale": "The text emphasizes cooperation and shared goals, and the need for rules to settle disagreements, not conflict as a primary driver."}, {"text": "To enhance collective survival, achieve shared goals through cooperation, and provide mutual protection.", "isCorrect": true, "rationale": "The text repeatedly emphasizes 'easier to survive together,' 'people share work,' 'everyone benefits more,' and 'protect one another' as key drivers for forming groups."}, {"text": "To establish a uniform system of beliefs and eliminate all cultural diversity.", "isCorrect": false, "rationale": "The text does not discuss cultural uniformity; it focuses on practical organizational and survival benefits."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
