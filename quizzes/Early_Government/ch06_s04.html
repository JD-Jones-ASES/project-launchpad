<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines an 'ordinance' as described in the text?", "options": [{"text": "A law passed by the state legislature.", "isCorrect": false, "rationale": "An ordinance is specifically defined as a law made by a city or county government, not the state or federal government."}, {"text": "A law created by a city or county government.", "isCorrect": true, "rationale": "The text defines an 'ordinance' as 'a law made by a city or county government (not the state or federal government).'"}, {"text": "A rule enforced by a federal agency.", "isCorrect": false, "rationale": "An ordinance is specifically defined as a law made by a city or county government, not the state or federal government."}, {"text": "A regulation set by a school board for curriculum.", "isCorrect": false, "rationale": "While a school board sets policies, the term 'ordinance' specifically refers to laws made by city or county governments."}], "id": "q01"}, {"question": "In Texas, which body is responsible for governing a county and is chaired by a county judge?", "options": [{"text": "The City Council", "isCorrect": false, "rationale": "A City Council governs a city, not a county, and is led by a mayor or manager, not a county judge."}, {"text": "The Commissioners Court", "isCorrect": true, "rationale": "The text states that 'Each county is governed by a Commissioners Court, which is made up of: A county judge (who chairs the court) and Four county commissioners.'"}, {"text": "The School Board", "isCorrect": false, "rationale": "A School Board governs a public school district, not a county."}, {"text": "The District Attorney's Office", "isCorrect": false, "rationale": "The District Attorney's Office prosecutes crimes within a county but is not the governing body of the county itself."}], "id": "q02"}, {"question": "If a resident in a rural part of Texas needs to record the birth of their child or register a new property deed, which local government entity would they most likely interact with?", "options": [{"text": "Their city's Mayor and Council", "isCorrect": false, "rationale": "City governments provide services within city limits and generally do not handle vital records or property ownership for rural areas."}, {"text": "Their county government", "isCorrect": true, "rationale": "The text lists 'Recording births, deaths, and property ownership' as a key responsibility of counties, which provide services to both city and rural residents."}, {"text": "Their local School Board", "isCorrect": false, "rationale": "School boards manage school districts and do not handle vital records or property deeds."}, {"text": "The Federal Register", "isCorrect": false, "rationale": "The Federal Register is a federal publication, and vital records and property deeds are managed at the local (county) level."}], "id": "q03"}, {"question": "A mid-sized Texas city decides to hire a professional administrator to oversee its daily operations, rather than having the elected mayor directly manage these tasks. This city most likely operates under which system of city government?", "options": [{"text": "Mayor-council system", "isCorrect": false, "rationale": "In a mayor-council system, the mayor leads the city and shares power with the council, directly involved in leadership."}, {"text": "Council-manager system", "isCorrect": true, "rationale": "The text describes the council-manager system as one where 'Voters elect a city council, which then hires a professional city manager to run daily operations.' This matches the scenario."}, {"text": "Commissioners Court system", "isCorrect": false, "rationale": "The Commissioners Court system governs counties, not cities."}, {"text": "Independent School District system", "isCorrect": false, "rationale": "The Independent School District system governs public schools, not general city operations."}], "id": "q04"}, {"question": "According to the text, what is the primary source of funding for public schools in Texas?", "options": [{"text": "State-level income taxes", "isCorrect": false, "rationale": "The text does not mention state-level income taxes as the primary source; it specifies local property taxes."}, {"text": "Property taxes collected locally", "isCorrect": true, "rationale": "The text explicitly states: 'Most school funding in Texas comes from property taxes collected in the local area.'"}, {"text": "Federal education grants", "isCorrect": false, "rationale": "The text mentions the federal government provides 'some education grants,' but not that it's the 'most' or primary source of funding for Texas public schools."}, {"text": "Sales taxes from local businesses", "isCorrect": false, "rationale": "The text identifies property taxes, not sales taxes, as the primary funding source for schools."}], "id": "q05"}, {"question": "The text explains that school quality can differ from one district to another depending on local property values. This is an example of how:", "options": [{"text": "State government prioritizes urban schools over rural ones.", "isCorrect": false, "rationale": "The text attributes the difference to local property values affecting funding, not state government prioritization of urban schools."}, {"text": "The local funding model ties school resources to the wealth of the community.", "isCorrect": true, "rationale": "The text explains, 'Homeowners and businesses pay a percentage of their property's value each year to fund schools. This is why school quality can differ from one district to another depending on local property values,' directly linking local wealth (property values) to school funding and quality."}, {"text": "Federal grants are unequally distributed among districts.", "isCorrect": false, "rationale": "While federal grants exist, the text specifically attributes the variance in school quality to local property taxes, not federal grant distribution."}, {"text": "School boards make arbitrary decisions about budget allocation.", "isCorrect": false, "rationale": "The text implies a systemic issue with funding based on property values, not arbitrary decisions by school boards."}], "id": "q06"}, {"question": "Imagine you are riding a bus to school. The decision about what time school starts and what subjects are taught primarily falls under the purview of which level of government?", "options": [{"text": "The county government, through its Commissioners Court.", "isCorrect": false, "rationale": "County governments are responsible for roads, jails, records, and elections, not specific school operational details like start times or curriculum."}, {"text": "The local school district, governed by its school board.", "isCorrect": true, "rationale": "The text states that school boards make decisions about 'Setting policies for curriculum, school hours, and conduct,' directly covering school start times and subjects."}, {"text": "The city government, through its council.", "isCorrect": false, "rationale": "City governments handle police, fire, water, zoning, and local roads, but not school operational policies."}, {"text": "The state government, setting minimum standards.", "isCorrect": false, "rationale": "While the state sets *minimum* education standards, the specific decisions about 'when school starts and what you study' are made by the local school district as mentioned in the 'How Local Government Affects You Every Day' section."}], "id": "q07"}, {"question": "The story of 'Old Yeller' is used in the text to illustrate what key idea about local government?", "options": [{"text": "The importance of strong federal oversight in frontier areas.", "isCorrect": false, "rationale": "The story highlights the *absence* of local services, not the role of federal oversight."}, {"text": "How communities eventually established shared services and rules due to self-reliance challenges.", "isCorrect": true, "rationale": "The storybox concludes by stating it 'shows what life was like before local governments were established across Texas — and why communities eventually came together to create shared services and rules.'"}, {"text": "The historical evolution of state governments in Texas.", "isCorrect": false, "rationale": "The story focuses on the *local* absence of government services, not the evolution of state government."}, {"text": "The challenges of maintaining law and order without a sheriff.", "isCorrect": false, "rationale": "While a sheriff is mentioned as absent, the broader point is about the lack of *all* shared local services (fire, school principal, etc.), leading to the establishment of local governments."}], "id": "q08"}, {"question": "The text highlights that local government is the one you can most easily reach. Which of the following activities best exemplifies this accessibility?", "options": [{"text": "Contacting your state senator about a new state law.", "isCorrect": false, "rationale": "While possible, contacting a state senator is at the state level, and the text emphasizes the *local* government as 'the one you can most easily reach.'"}, {"text": "Attending a city council meeting to voice an opinion on a local park.", "isCorrect": true, "rationale": "The text explicitly states: 'local government is the one you can most easily reach: you can attend a city council meeting, run for school board someday, or talk to your county commissioner at the grocery store.'"}, {"text": "Lobbying a federal representative for national policy change.", "isCorrect": false, "rationale": "Lobbying a federal representative is at the national level and generally less directly accessible for everyday citizens compared to local interactions."}, {"text": "Voting in a national presidential election every four years.", "isCorrect": false, "rationale": "Voting is a form of participation, but the text focuses on direct interaction and proximity for accessibility, not just the act of voting at the federal level."}], "id": "q09"}, {"question": "Which statement accurately describes the primary distinction between counties, cities, and school districts in Texas, based on the text?", "options": [{"text": "Counties are primarily responsible for urban infrastructure, while cities manage rural services.", "isCorrect": false, "rationale": "The text states counties provide services to both city and rural residents, and cities manage urban services like water, sewer, and local roads within their limits."}, {"text": "School districts are independent entities focused solely on public education, distinct from general county or city services.", "isCorrect": true, "rationale": "The text describes 'Public schools in Texas are run by independent school districts (ISDs)' and lists their responsibilities entirely related to education, highlighting their distinct, focused role separate from broader county or city services."}, {"text": "Cities focus on law enforcement and vital records, while counties handle utilities and zoning.", "isCorrect": false, "rationale": "This statement incorrectly swaps many key responsibilities. Counties handle vital records, while cities provide police, water, and zoning services."}, {"text": "All three levels of government provide identical services but in different geographic areas.", "isCorrect": false, "rationale": "The text clearly outlines distinct responsibilities for each type of local government (e.g., counties for roads/records, cities for police/water, school districts for education), indicating they do not provide identical services."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
