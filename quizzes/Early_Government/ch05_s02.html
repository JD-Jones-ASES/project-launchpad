<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the structure of the U.S. Congress?", "options": [{"text": "It is a unicameral body with 535 members.", "isCorrect": false, "rationale": "The U.S. Congress is described as bicameral, meaning it has two chambers, not one (unicameral)."}, {"text": "It is a bicameral legislature consisting of the House of Representatives and the Senate.", "isCorrect": true, "rationale": "The text explicitly states, 'The word bicameral means “two chambers.” Congress has two: the House of Representatives and the Senate.'"}, {"text": "It is a single chamber responsible for confirming presidential appointments.", "isCorrect": false, "rationale": "Congress is bicameral, and only the Senate (one chamber) confirms presidential appointments, not a single overarching chamber."}, {"text": "It is composed solely of state-appointed representatives.", "isCorrect": false, "rationale": "Members of both the House and Senate are elected by the people, not appointed by state governments."}], "id": "q01"}, {"question": "The bicameral structure of Congress, with the House and Senate, was primarily a result of which historical agreement?", "options": [{"text": "The Emancipation Proclamation", "isCorrect": false, "rationale": "The Emancipation Proclamation addressed slavery during the Civil War, unrelated to the structure of Congress."}, {"text": "The Declaration of Independence", "isCorrect": false, "rationale": "The Declaration of Independence announced separation from Great Britain but did not establish the structure of the U.S. government."}, {"text": "The Great Compromise", "isCorrect": true, "rationale": "The text states, 'Why two? Because of the Great Compromise you learned about in Unit 4.' This compromise resolved disputes between large and small states over representation."}, {"text": "The Bill of Rights", "isCorrect": false, "rationale": "The Bill of Rights consists of the first ten amendments to the Constitution, guaranteeing individual liberties, not establishing the bicameral structure."}], "id": "q02"}, {"question": "A representative concerned primarily with the immediate desires of their local district's voters would most likely serve in which chamber and for what reason?", "options": [{"text": "The Senate, because senators serve six-year terms allowing long-term planning.", "isCorrect": false, "rationale": "Senators' longer terms give them more independence and a long-term perspective, not primarily focused on immediate local desires."}, {"text": "The House of Representatives, because representatives serve two-year terms and must stay closely connected to constituents.", "isCorrect": true, "rationale": "The text explains, 'Because they face voters every two years, representatives must stay closely connected to what their constituents want,' which aligns with immediate local desires."}, {"text": "The Senate, because each state has equal representation regardless of population.", "isCorrect": false, "rationale": "While true about Senate representation, this doesn't explain the focus on immediate local desires; their longer terms point to a broader, more independent view."}, {"text": "The House of Representatives, because they are confirmed by the President for their appointments.", "isCorrect": false, "rationale": "House members are elected by voters, not confirmed by the President for appointments."}], "id": "q03"}, {"question": "A bill proposing a new federal holiday has just passed a vote in the House of Representatives. What is the *next* required step for this bill to potentially become a law?", "options": [{"text": "It must be signed into law by the President.", "isCorrect": false, "rationale": "The bill must pass both the House and the Senate before it can be sent to the President for signature."}, {"text": "It must be debated and passed by the Senate.", "isCorrect": true, "rationale": "The text states, 'A bill must pass both the House and the Senate, then be signed by the President, to become a law.' Having passed the House, the next step is the Senate."}, {"text": "It needs to be reviewed by the Supreme Court for constitutionality.", "isCorrect": false, "rationale": "The Supreme Court reviews laws only after they have been enacted and typically only if their constitutionality is challenged in a legal case."}, {"text": "It is sent to the relevant committee for final approval.", "isCorrect": false, "rationale": "Committee work usually happens before a bill is voted on by the full chamber. Having passed the House, it would then move to the other chamber, the Senate, where it would likely go through committees again."}], "id": "q04"}, {"question": "Which statement accurately compares the representation in the House of Representatives and the Senate?", "options": [{"text": "Both chambers have an equal number of members from each state.", "isCorrect": false, "rationale": "Only the Senate has an equal number (two) of members from each state. House representation is based on population."}, {"text": "The House has 100 members based on state population, while the Senate has 435 members with two per state.", "isCorrect": false, "rationale": "The numbers and representation methods are reversed here. The Senate has 100 members (two per state), and the House has 435 members (based on population)."}, {"text": "The House's membership is based on state population, giving larger states more representatives, while the Senate has two members per state regardless of size.", "isCorrect": true, "rationale": "The text states: 'The House of Representatives has 435 members. Each state's number of representatives depends on its population.' and 'The Senate has 100 members — exactly two per state, no matter how large or small the state is.'"}, {"text": "Representatives serve six-year terms, and senators serve two-year terms.", "isCorrect": false, "rationale": "The term lengths are reversed. Representatives serve two-year terms, and senators serve six-year terms."}], "id": "q05"}, {"question": "Which of the following is an exclusive power granted to the U.S. Congress, as opposed to the President or the Supreme Court?", "options": [{"text": "Negotiating treaties with foreign nations.", "isCorrect": false, "rationale": "The President is primarily responsible for negotiating treaties, although the Senate must ratify them."}, {"text": "Declaring war.", "isCorrect": true, "rationale": "The text explicitly states: 'Declares war: only Congress can formally declare war.'"}, {"text": "Appointing federal judges.", "isCorrect": false, "rationale": "The President appoints federal judges, with the Senate's confirmation."}, {"text": "Interpreting the Constitution.", "isCorrect": false, "rationale": "Interpreting the Constitution is primarily the role of the judicial branch, particularly the Supreme Court."}], "id": "q06"}, {"question": "The text states that 'roughly one-third of the Senate faces election every two years.' What is the most likely implication of this system?", "options": [{"text": "It ensures that the entire Senate can be replaced in a single election cycle, allowing for rapid political shifts.", "isCorrect": false, "rationale": "Only one-third faces election at a time, preventing a complete overhaul in a single cycle."}, {"text": "It makes senators less accountable to voters because they serve longer terms.", "isCorrect": false, "rationale": "While terms are longer, senators are still accountable to voters; the staggered system adds stability, not necessarily less accountability in the long run."}, {"text": "It provides for continuity and stability in the Senate, preventing drastic changes in its composition with each election.", "isCorrect": true, "rationale": "With only a third of senators up for election every two years, the majority of the Senate maintains their seats, ensuring institutional memory and preventing abrupt shifts in policy direction."}, {"text": "It allows for more states to have their elections simultaneously, simplifying the voting process.", "isCorrect": false, "rationale": "The staggered election system relates to the timing of individual senators' terms, not to simplifying simultaneous state elections."}], "id": "q07"}, {"question": "If a federal official is to be impeached, which body is responsible for formally charging the official, and which body holds the trial?", "options": [{"text": "The Senate charges, and the House holds the trial.", "isCorrect": false, "rationale": "The roles of the House and Senate in the impeachment process are reversed in this option."}, {"text": "The President charges, and the Supreme Court holds the trial.", "isCorrect": false, "rationale": "The President and Supreme Court are not involved in charging or trying impeached officials; these are Congressional powers."}, {"text": "The House charges, and the Senate holds the trial.", "isCorrect": true, "rationale": "The text states: 'Impeaches officials: the House can impeach (charge) federal officials; the Senate holds the trial.'"}, {"text": "The Supreme Court charges, and the President holds the trial.", "isCorrect": false, "rationale": "Neither the Supreme Court nor the President has a role in the impeachment process as described."}], "id": "q08"}, {"question": "A new government agency requires funding to operate next year. Based on the powers of Congress, what action is *essential* for this agency to receive its requested funds?", "options": [{"text": "The President must issue an executive order to allocate the funds.", "isCorrect": false, "rationale": "While the President can propose a budget, they cannot unilaterally spend federal money. Executive orders generally manage executive branch operations, not appropriate funds."}, {"text": "The Supreme Court must approve the agency's budget.", "isCorrect": false, "rationale": "The Supreme Court is the judicial branch and does not approve government budgets; that is a legislative power."}, {"text": "Congress must approve the federal budget that includes funding for the agency.", "isCorrect": true, "rationale": "The text states: 'Controls spending: Congress approves the federal budget. No money can be spent without Congressional approval.'"}, {"text": "State legislatures must each contribute their share to the agency's budget.", "isCorrect": false, "rationale": "Federal government agencies are funded by the federal budget, not directly by individual state legislatures."}], "id": "q09"}, {"question": "The text notes that House representatives serve two-year terms, making them 'closely connected to what their constituents want,' while senators serve six-year terms, giving them 'more independence to think long-term.' How do these different term lengths contribute to the overall function of Congress?", "options": [{"text": "They ensure that both chambers are equally susceptible to public opinion swings, leading to quick policy changes.", "isCorrect": false, "rationale": "The differing term lengths (2 years vs. 6 years) mean the chambers are not equally susceptible; the Senate is designed to be less reactive to short-term public opinion."}, {"text": "They create a system where the House prioritizes long-term strategic goals, while the Senate focuses on immediate constituent needs.", "isCorrect": false, "rationale": "The description of priorities is reversed. The House (2-year terms) focuses on immediate constituent needs, and the Senate (6-year terms) on long-term goals."}, {"text": "They balance immediate responsiveness to public will (House) with a more deliberative, long-term perspective (Senate), enabling comprehensive governance.", "isCorrect": true, "rationale": "This option correctly synthesizes the functions described: the House is more responsive due to short terms, and the Senate is more independent and long-term oriented due to longer, staggered terms. This balance allows Congress to address both immediate and future needs."}, {"text": "They allow the President to exert more influence over the Senate due to their longer terms.", "isCorrect": false, "rationale": "Longer terms for senators are described as providing 'more independence,' which would suggest less direct influence from the President, not more."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
