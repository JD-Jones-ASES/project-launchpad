    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary distinction between \"review\" and \"reflection\"?", "options": [{"text": "Review is about memorization, while reflection is about debate.", "isCorrect": false, "rationale": "While memorization can be part of review, reflection is defined as thinking carefully and honestly, not necessarily debating."}, {"text": "Review involves going over learned material to remember and understand, while reflection means thinking carefully about its meaning and importance.", "isCorrect": true, "rationale": "This option directly uses the definitions provided in the text: 'review — going back over what you have learned to make sure you remember and understand it' and 'reflection — thinking carefully and honestly about what something means and why it matters'."}, {"text": "Review is a quick glance, while reflection requires extensive research.", "isCorrect": false, "rationale": "Review is described as 'going back over,' implying more than a quick glance. Reflection is thinking, not necessarily extensive research."}, {"text": "Review is an individual activity, whereas reflection is always a group discussion.", "isCorrect": false, "rationale": "The definitions do not specify whether these activities are individual or group; both can be either."}]}, {"question": "The \"Whole Story\" presented in the text aims to connect various units into a coherent narrative. What is the fundamental journey or question that frames this entire course?", "options": [{"text": "Tracing the development of military strategies from ancient times to modern warfare.", "isCorrect": false, "rationale": "The text focuses on government, civics, and citizenship, not military history."}, {"text": "Exploring the economic systems that have shaped civilizations across history.", "isCorrect": false, "rationale": "While economic factors can influence government, the primary focus of the course, as summarized, is not economics."}, {"text": "Understanding why people need government, how different systems have evolved, and what kind of citizen is required to sustain a republic.", "isCorrect": true, "rationale": "The introduction states, 'You started by asking a simple question in Unit 1: 'Why do people need government?'' and ends with 'What kind of citizen will you be?' The unit summaries trace the evolution of governments."}, {"text": "Documenting the specific legislative processes of the American federal and state governments.", "isCorrect": false, "rationale": "This is too narrow; while these topics are covered, they are part of a larger story that encompasses ancient history, global governments, and the role of citizens."}]}, {"question": "Unit 3 discusses Aristotle's vocabulary and Polybius's theory of governmental cycles. How did Polybius's observations, specifically regarding the Roman Republic, inform the American Founders' approach to designing the U.S. government?", "options": [{"text": "Polybius advocated for pure democracy, which the Founders adopted for direct citizen rule.", "isCorrect": false, "rationale": "The Founders established a republic, not a pure democracy, due to concerns about mob rule and the instability of pure democracies."}, {"text": "Polybius's idea that governments cycle from good to corrupt unless wisely mixed led the Founders to create a three-part design with checks and limits.", "isCorrect": true, "rationale": "The text states, 'Polybius showed us that governments cycle from good to corrupt unless they are wisely mixed — and that the Roman Republic's three-part design was the answer. The American Founders agreed.'"}, {"text": "Polybius argued for a powerful single monarch, a concept the Founders initially considered for the presidency.", "isCorrect": false, "rationale": "The Founders explicitly rejected monarchy, having just fought a war of independence against one."}, {"text": "Polybius believed that an aristocracy was the most stable form, inspiring the Founders to establish a permanent noble class.", "isCorrect": false, "rationale": "The Founders did not establish a permanent noble class; they created a system based on elected representation."}]}, {"question": "The text highlights the \"separation of powers\" in the federal government. If the President vetoes a bill passed by Congress, what core principle of the American government is being demonstrated?", "options": [{"text": "Judicial Review, as the Supreme Court has the final say.", "isCorrect": false, "rationale": "Judicial review is the power of the courts to determine the constitutionality of laws, not the President's veto power."}, {"text": "Federalism, emphasizing the power balance between national and state governments.", "isCorrect": false, "rationale": "Federalism concerns the division of power between federal and state governments, not between branches of the federal government."}, {"text": "Checks and Balances, ensuring no single branch becomes too powerful.", "isCorrect": true, "rationale": "The President's ability to veto a bill passed by Congress is a classic example of one branch (Executive) checking the power of another (Legislative), which is fundamental to the system of checks and balances mentioned in Unit 5."}, {"text": "Popular Sovereignty, reflecting the will of the people.", "isCorrect": false, "rationale": "Popular sovereignty refers to the idea that the government's authority comes from the consent of the governed, which is a broader principle, not the specific act of a presidential veto."}]}, {"question": "Unit 7 states that \"Rights are not gifts from government; they belong to every person.\" What is the implication of this statement for understanding the role of government in relation to individual rights?", "options": [{"text": "Governments have the ultimate authority to grant or revoke any right at their discretion.", "isCorrect": false, "rationale": "This contradicts the statement that rights 'belong to every person' and are not 'gifts from government'."}, {"text": "Governments are primarily responsible for recognizing, protecting, and upholding pre-existing individual rights.", "isCorrect": true, "rationale": "If rights are inherent and not given by government, then the government's role is to ensure these existing rights are respected and protected, as reinforced by the mention of amendments correcting wrongs."}, {"text": "Individual rights are theoretical concepts with no practical bearing on governmental actions.", "isCorrect": false, "rationale": "The emphasis on amendments to correct wrongs demonstrates that rights have a very practical and significant bearing on governmental action and the pursuit of a 'more perfect Union'."}, {"text": "Citizens do not need to participate in governance, as their rights are automatically secured.", "isCorrect": false, "rationale": "The text, especially Unit 9 and Franklin's quote, heavily emphasizes citizen participation as crucial for maintaining the republic and its protections."}]}, {"question": "How does the text describe the relationship between the federal government (Unit 5) and state governments like Texas (Unit 6)?", "options": [{"text": "State governments are merely smaller, subservient versions of the federal government, implementing federal directives.", "isCorrect": false, "rationale": "The text explicitly states: 'States are not small versions of the federal government; they are separate governments'."}, {"text": "Both federal and state governments are entirely independent with no overlapping powers or shared responsibilities.", "isCorrect": false, "rationale": "While separate, federalism inherently involves some shared and overlapping responsibilities, though the text emphasizes their distinctness. 'Entirely independent' is too strong."}, {"text": "States are separate governments with their own constitutions, courts, and ways of organizing power, distinct from the federal structure.", "isCorrect": true, "rationale": "Unit 6 directly states: 'States are not small versions of the federal government; they are separate governments with their own constitutions, their own courts, and their own ways of organizing power.'"}, {"text": "The federal government has absolute authority over all aspects of state governance.", "isCorrect": false, "rationale": "This contradicts the concept of states being 'separate governments' with their own distinct structures and powers."}]}, {"question": "Benjamin Franklin's response, \"A republic—if you can keep it,\" combined with the message of Unit 9 (\"The Good Citizen\"), implies what about the future of the American republic?", "options": [{"text": "The Constitution is a self-sustaining document that guarantees the republic's permanence without further effort.", "isCorrect": false, "rationale": "The text explicitly states: 'But none of that continues automatically. It continues because citizens — ordinary people, generation after generation — choose to participate...'"}, {"text": "The republic's survival depends entirely on the active participation, informed decisions, and civic virtue of its ordinary citizens, generation after generation.", "isCorrect": true, "rationale": "Franklin's quote highlights the conditional nature of the republic's survival, and Unit 9 states, 'All of it depends on you. A republic is only as strong as its citizens. Civic virtue... is the foundation beneath everything else.'"}, {"text": "A republic is inherently fragile and destined to fail, regardless of citizen involvement.", "isCorrect": false, "rationale": "While 'if you can keep it' suggests fragility, it also implies that it *can* be kept through citizen action, not that it is destined to fail."}, {"text": "Only elected officials and powerful leaders are responsible for maintaining the republic; ordinary citizens have a minimal role.", "isCorrect": false, "rationale": "The text strongly emphasizes the role of 'ordinary people' and concludes Unit 9 with 'It starts with you.'"}]}, {"question": "The text suggests that ancient governments \"taught the world something about how to — and how not to — govern.\" Which American founding principle is a direct application of lessons learned from ancient experiments like those in Rome or Greece, particularly regarding concentrated power?", "options": [{"text": "The belief in a single, all-powerful ruler to ensure stability and efficiency.", "isCorrect": false, "rationale": "The Founders rejected this model, learning from the dangers of concentrated power seen in monarchies and tyrannies."}, {"text": "The establishment of a mixed government with checks and limits on every hand to prevent the cycle from good to corrupt.", "isCorrect": true, "rationale": "Unit 3 explicitly mentions Polybius's idea of mixed government and the Roman Republic's three-part design as influencing the Founders, stating that the Founders 'agreed.' Unit 4 reinforces this with 'checks and limits on every hand,' and Unit 5 with 'Separation of powers is the answer to the age-old problem of concentrated power'."}, {"text": "The idea that government should derive its authority solely from divine right, not popular consent.", "isCorrect": false, "rationale": "The American Founding was based on natural rights and the consent of the governed, directly opposing divine right."}, {"text": "The principle that only military leaders should hold political office.", "isCorrect": false, "rationale": "There is no mention of this in the text, and it's contrary to the principles of civilian government."}]}, {"question": "The \"Final Writing Project\" asks students to choose a civic virtue and explain how they will practice it. If a student chooses \"concern for the common good\" and gives an example of organizing a neighborhood clean-up, which of the following criteria for a strong civic understanding does this example best demonstrate?", "options": [{"text": "Clarity, because the virtue is clearly stated.", "isCorrect": false, "rationale": "While the virtue might be clearly stated, the *example itself* primarily speaks to a different criterion from the rubric."}, {"text": "Specificity, as it provides a concrete and realistic action.", "isCorrect": true, "rationale": "The rubric criterion 'Specificity: Is the example concrete and realistic?' directly applies here. Organizing a clean-up is a specific and actionable example."}, {"text": "Connection, because it references course content.", "isCorrect": false, "rationale": "The example of a clean-up, by itself, doesn't inherently reference course content. That would be a separate part of the student's writing."}, {"text": "Civic Reasoning, because it explains why the virtue matters to the community.", "isCorrect": false, "rationale": "The example demonstrates *how* to practice the virtue, but the 'explanation of why this matters' is a separate part of the writing requirement for 'Civic Reasoning'."}]}, {"question": "Unit 8 emphasizes comparing America's democracy with \"Governments around the world.\" According to the text, what is the primary value of this comparative study?", "options": [{"text": "To identify potential new territories for American expansion and influence.", "isCorrect": false, "rationale": "This is not mentioned as a reason for comparative study and is outside the scope of civic education presented."}, {"text": "To help us see what we have, why it matters, and what could be lost.", "isCorrect": true, "rationale": "The text explicitly states: 'Comparing them helps us see what we have, why it matters, and what could be lost.'"}, {"text": "To prove that America's system is inherently superior to all others in every aspect.", "isCorrect": false, "rationale": "The text presents America as 'one democracy among many,' implying a learning and appreciation perspective rather than just asserting superiority."}, {"text": "To prepare citizens for careers in international diplomacy and foreign policy.", "isCorrect": false, "rationale": "While it might indirectly contribute, the primary stated value is understanding one's own system better, not career preparation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
