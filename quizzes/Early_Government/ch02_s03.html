<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the system of \"direct democracy\" as practiced in ancient Athens?", "options": [{"text": "Citizens elected representatives to make laws on their behalf.", "isCorrect": false, "rationale": "This describes a representative democracy, not the direct democracy practiced in Athens where citizens voted themselves."}, {"text": "Male citizens gathered to directly debate and vote on laws and public policies.", "isCorrect": true, "rationale": "The text explicitly defines direct democracy as 'citizens vote on laws and decisions themselves' and describes the assembly where male citizens debated and voted on issues like war, peace, and new laws."}, {"text": "Only aristocrats were permitted to vote on public matters.", "isCorrect": false, "rationale": "Rule by aristocrats predated Athenian democracy, which aimed to give all male citizens a voice, regardless of wealth."}, {"text": "All residents of Athens, including women and foreigners, directly voted on laws and decisions.", "isCorrect": false, "rationale": "Athenian democracy explicitly excluded women, enslaved people, and foreigners from citizenship and political participation."}], "id": "q01"}, {"question": "Before the reforms that led to democracy, what was a significant characteristic of Athenian governance and social structure?", "options": [{"text": "The assembly was open to all citizens, including the poor.", "isCorrect": false, "rationale": "This describes the democratic era, not the period before reforms."}, {"text": "Aristocrats inherited power, and poor farmers could be enslaved for debt.", "isCorrect": true, "rationale": "The text states, 'Early Athens was ruled by aristocrats — noble families who inherited power. Most citizens had little say in government. Debts were crushing. Poor farmers could be sold into slavery for unpaid debts.'"}, {"text": "A council of 500 men prepared laws for public vote.", "isCorrect": false, "rationale": "The council of 500 was a reform introduced by Cleisthenes, a significant step towards democracy, not a characteristic of the period *before* reforms."}, {"text": "Women and foreigners had limited political rights but could own land.", "isCorrect": false, "rationale": "Women and foreigners had no political rights in Athens, either before or during its democratic phase."}], "id": "q02"}, {"question": "Solon's reforms in 594 BC are considered foundational to Athenian democracy primarily because they:", "options": [{"text": "Established a council of 500 chosen by lot, effectively creating true democracy.", "isCorrect": false, "rationale": "The council of 500 was established by Cleisthenes about a century later, not Solon."}, {"text": "Abolished debt slavery and opened courts to all citizens, laying groundwork for broader participation.", "isCorrect": true, "rationale": "The text states Solon 'canceled many debts, freed enslaved debtors, and opened the courts to all citizens. He did not create full democracy, but he laid the groundwork.'"}, {"text": "Granted citizenship and political rights to women and enslaved people.", "isCorrect": false, "rationale": "Women and enslaved people remained excluded from citizenship and political rights even after Solon's reforms."}, {"text": "Expanded the treasury to pay citizens for jury service, ensuring even the poor could participate fully.", "isCorrect": false, "rationale": "This reform was implemented by Pericles much later, not Solon."}], "id": "q03"}, {"question": "Why is Cleisthenes often called the \"father of Athenian democracy\"?", "options": [{"text": "He was the first to implement a system where citizens elected representatives to govern.", "isCorrect": false, "rationale": "Athenian democracy was direct, not representative; citizens voted themselves rather than electing representatives."}, {"text": "His reforms reorganized society into tribes, mixing social classes and giving every male citizen a voice, regardless of wealth.", "isCorrect": true, "rationale": "The text states Cleisthenes 'divided citizens into ten new tribes, mixing rich and poor, city and countryside. He created a council of 500... His reforms meant that every male citizen, regardless of wealth, had a voice in the government.'"}, {"text": "He established the Pnyx as the meeting place for the assembly and set its meeting schedule.", "isCorrect": false, "rationale": "While the Pnyx was the assembly's meeting place, Cleisthenes' main contribution was the fundamental restructuring of society and government, not just the logistics of assembly meetings."}, {"text": "He led Athens during its \"golden age\" and oversaw the building of the Parthenon.", "isCorrect": false, "rationale": "These accomplishments are attributed to Pericles, who lived about a century after Cleisthenes."}], "id": "q04"}, {"question": "An Athenian assembly meeting debated whether to construct a new port or allocate funds to a cultural festival. After speakers presented arguments for both, all eligible citizens present raised their hands to vote on the matter. This scenario best illustrates:", "options": [{"text": "The aristocratic rule before democratic reforms.", "isCorrect": false, "rationale": "This scenario clearly depicts a democratic process, not aristocratic rule where most citizens had little say."}, {"text": "The limits of Athenian democracy, as only a small percentage of the population participated.", "isCorrect": false, "rationale": "While the limits are a fact of Athenian democracy, the scenario itself describes the *mechanism* of voting by citizens, not its exclusions."}, {"text": "The principle of direct democracy in action.", "isCorrect": true, "rationale": "This scenario perfectly matches the definition of direct democracy, where 'citizens vote on laws and decisions themselves, rather than electing representatives to decide for them.'"}, {"text": "The role of elected representatives in making governmental decisions.", "isCorrect": false, "rationale": "The scenario describes citizens voting directly, not electing representatives to make decisions on their behalf."}], "id": "q05"}, {"question": "According to the text, what types of decisions were typically made by the Athenian assembly (ekklesia)?", "options": [{"text": "Only minor administrative tasks and appointing city officials.", "isCorrect": false, "rationale": "The assembly's decisions were far-reaching and significant, not just minor tasks."}, {"text": "Electing representatives to then vote on major laws and policies.", "isCorrect": false, "rationale": "The Athenian assembly was a direct democracy; citizens voted on laws themselves, they did not elect representatives to do so."}, {"text": "Questions of war and peace, treaties, and new laws.", "isCorrect": true, "rationale": "The text explicitly states: 'The assembly decided questions of war and peace, treaties with other cities, and new laws.'"}, {"text": "Deciding on the eligibility of women and enslaved people for citizenship.", "isCorrect": false, "rationale": "Women and enslaved people were systematically excluded from citizenship and political rights; their eligibility was not a matter for debate or vote by the assembly."}], "id": "q06"}, {"question": "The text states, \"When we call Athens a democracy, we must remember what kind of democracy it was — and who it left out.\" This statement primarily emphasizes that:", "options": [{"text": "Athenian democracy was a universal system that included everyone living within its borders.", "isCorrect": false, "rationale": "This directly contradicts the text, which highlights that 'Only about 10–15% of Athens's population could participate' due to exclusions."}, {"text": "While revolutionary, Athenian democracy had significant exclusions based on gender, status, and origin.", "isCorrect": true, "rationale": "This option accurately captures the nuance presented in the text, acknowledging both the innovation ('revolutionary idea') and the critical limitations ('excluded women, enslaved people, and foreigners')."}, {"text": "The Athenian system was a model for modern representative democracies, focusing on elected officials.", "isCorrect": false, "rationale": "Athenian democracy was direct, not representative, and its model differs significantly from modern representative democracies."}, {"text": "The term \"democracy\" has changed meaning completely over time, making ancient Athens irrelevant to modern understanding.", "isCorrect": false, "rationale": "The text implies a continuity of the *idea* of democracy while highlighting the differences in its application, not complete irrelevance."}], "id": "q07"}, {"question": "Which combination of groups was explicitly excluded from participating in Athenian democracy?", "options": [{"text": "Only non-Athenian males and poor citizens.", "isCorrect": false, "rationale": "After Cleisthenes' reforms and especially under Pericles, poor male citizens *could* participate, making this option incorrect."}, {"text": "Women, enslaved people, and foreigners.", "isCorrect": true, "rationale": "The text explicitly states: 'Women had no political rights. Enslaved people... had no rights at all. Foreigners who lived in Athens all their lives could not become citizens.'"}, {"text": "Aristocrats and individuals who owed debts.", "isCorrect": false, "rationale": "Aristocrats were male citizens and could participate. Debt slavery was abolished by Solon, and those freed could become citizens."}, {"text": "Only men under the age of 30 and those who did not own land.", "isCorrect": false, "rationale": "The text does not specify an age restriction for adult male citizens beyond 'adult male.' While land ownership might have been relevant in earlier periods, Cleisthenes' reforms aimed to include all male citizens regardless of wealth."}], "id": "q08"}, {"question": "Pericles' leadership further strengthened Athenian democracy by:", "options": [{"text": "Reorganizing society into ten tribes to mix rich and poor citizens.", "isCorrect": false, "rationale": "This reform was implemented by Cleisthenes, not Pericles."}, {"text": "Canceling debts and freeing enslaved debtors to expand the citizen base.", "isCorrect": false, "rationale": "These were reforms made by Solon, not Pericles."}, {"text": "Expanding citizenship rules and paying citizens for jury service, enabling poorer men to participate.", "isCorrect": true, "rationale": "The text states Pericles 'expanded citizenship rules and paid citizens a small fee to serve on juries, so that even poor men could participate.'"}, {"text": "Inventing the concept of citizens directly voting on laws without representatives.", "isCorrect": false, "rationale": "The concept of direct democracy was established before Pericles, particularly with Cleisthenes' reforms. Pericles expanded participation within this existing framework."}], "id": "q09"}, {"question": "Which statement best summarizes the lasting legacy and key characteristic of Athenian democracy as presented in the text?", "options": [{"text": "Athens pioneered a universal system of governance where all inhabitants, regardless of status or origin, held equal power and rights.", "isCorrect": false, "rationale": "This statement is inaccurate as Athens famously excluded a significant portion of its population based on gender, status, and origin."}, {"text": "Athens invented direct democracy, a revolutionary idea where citizens voted on laws themselves, though it was limited to a specific segment of the population.", "isCorrect": true, "rationale": "This option accurately captures both the groundbreaking nature of Athenian direct democracy ('revolutionary idea where citizens voted on laws themselves') and its fundamental limitation ('limited to a specific segment of the population'), as emphasized in the 'keyconcept' box and 'Who Was Left Out' section."}, {"text": "Athenian democracy was primarily an aristocratic system where noble families maintained most of the political control, despite minor reforms.", "isCorrect": false, "rationale": "This describes the period *before* democracy, not its legacy or key characteristic during its democratic phase, which aimed to give all male citizens a voice."}, {"text": "The Athenian system was an early form of representative democracy, where citizens elected officials to deliberate and pass laws on their behalf.", "isCorrect": false, "rationale": "Athenian democracy was direct, meaning citizens voted on laws themselves, rather than electing representatives."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
