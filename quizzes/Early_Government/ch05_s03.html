<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When the President hosts a dinner for a visiting head of state and participates in a wreath-laying ceremony, which of the following roles is he primarily fulfilling?", "options": [{"text": "Commander-in-Chief", "isCorrect": false, "rationale": "The Commander-in-Chief role involves commanding the U.S. military, not ceremonial duties or hosting foreign leaders."}, {"text": "Head of State", "isCorrect": true, "rationale": "The Head of State role involves representing the United States in foreign affairs and on ceremonial occasions, which includes hosting dignitaries and participating in national ceremonies."}, {"text": "Chief Diplomat", "isCorrect": false, "rationale": "The Chief Diplomat role focuses on negotiating treaties and foreign policy, not primarily on ceremonial representation."}, {"text": "Chief Executive", "isCorrect": false, "rationale": "The Chief Executive role is about running the federal government's day-to-day operations and enforcing laws, not ceremonial duties."}]}, {"question": "A presidential nominee for Secretary of Education must undergo which of the following processes before officially joining the Cabinet?", "options": [{"text": "A nationwide popular vote.", "isCorrect": false, "rationale": "Cabinet secretaries are not elected by popular vote; this method is used for presidential elections via the Electoral College."}, {"text": "Unanimous approval from the Supreme Court.", "isCorrect": false, "rationale": "The Supreme Court is the judicial branch and does not confirm presidential nominations for the Cabinet."}, {"text": "Confirmation by the Senate.", "isCorrect": true, "rationale": "The text states that heads of departments (Secretaries) are 'nominated by the President and confirmed by the Senate' to form the Cabinet."}, {"text": "Direct appointment by the President without further action.", "isCorrect": false, "rationale": "While the President nominates, the text clearly specifies that Senate confirmation is required for these appointments."}]}, {"question": "If Congress passes a bill that the President believes is harmful to the nation, what is the President's primary constitutional power to prevent it from becoming law?", "options": [{"text": "Issue an executive order to nullify the bill.", "isCorrect": false, "rationale": "Executive orders direct federal agencies on how to carry out laws within limits; they cannot nullify a bill passed by Congress."}, {"text": "Refer the bill directly to the Supreme Court for judicial review.", "isCorrect": false, "rationale": "The Supreme Court reviews laws already in effect or in specific legal disputes, it does not typically prevent a bill from becoming law before it is enacted."}, {"text": "Veto the bill.", "isCorrect": true, "rationale": "The text explicitly lists 'Veto bills' as a key power of the President, defined as the power to 'reject a bill passed by Congress'."}, {"text": "Remove the members of Congress who voted for the bill.", "isCorrect": false, "rationale": "The President does not have the power to remove members of Congress."}]}, {"question": "Which of the following statements accurately describes the limits on presidential terms as established in the U.S.?", "options": [{"text": "Presidents can serve an unlimited number of four-year terms.", "isCorrect": false, "rationale": "The text clearly states that presidents are limited to two terms, not an unlimited number."}, {"text": "Presidents are limited to two four-year terms due to the 22nd Amendment.", "isCorrect": true, "rationale": "The text explicitly states, 'Since 1951 (the 22nd Amendment), presidents are limited to two terms — a total of eight years in office.'"}, {"text": "Presidents are limited to a single eight-year term.", "isCorrect": false, "rationale": "The limit is two four-year terms, not a single continuous eight-year term, although the total duration is eight years."}, {"text": "The term limit was set by George Washington's precedent, not by law.", "isCorrect": false, "rationale": "While Washington set a precedent, the legal limit was established by the 22nd Amendment in 1951, as noted in the text."}]}, {"question": "According to the text, how is a President typically elected in the United States?", "options": [{"text": "By direct popular vote across the entire nation.", "isCorrect": false, "rationale": "The text states presidents are elected through the Electoral College, not by a direct national popular vote."}, {"text": "By a simple majority vote in Congress.", "isCorrect": false, "rationale": "Congress has specific roles in the electoral process, but the President is primarily elected via the Electoral College, not a direct congressional vote."}, {"text": "Through the Electoral College, where states award votes based on their citizens' votes, requiring 270 electoral votes to win.", "isCorrect": true, "rationale": "The text explicitly describes this process: 'Presidents are elected through the Electoral College: citizens vote in each state, and states award their electoral votes based on the results. A candidate needs 270 electoral votes to win.'"}, {"text": "By appointment from the Supreme Court.", "isCorrect": false, "rationale": "The Supreme Court, as the judicial branch, does not appoint the President."}]}, {"question": "George Washington's decision to voluntarily step down after two terms was significant because:", "options": [{"text": "It demonstrated that presidents could easily return to private life.", "isCorrect": false, "rationale": "While true, the primary significance was not just the ease of return but the principle it established regarding power."}, {"text": "It immediately established the legal two-term limit for future presidents.", "isCorrect": false, "rationale": "The legal two-term limit was established much later by the 22nd Amendment, not by Washington's act directly."}, {"text": "It set a crucial precedent that no president should serve for life, reinforcing the democratic principle of peaceful transfer of power.", "isCorrect": true, "rationale": "The 'personbox' section explicitly states, 'He chose to. That choice — that power could be given back — was one of the most important acts in American history. It set the expectation that no president would serve for life.'"}, {"text": "It proved that the executive branch was not as powerful as the legislative branch.", "isCorrect": false, "rationale": "Washington's action was about the nature of presidential power and term limits, not a comparison of power between branches."}]}, {"question": "When the President orders military forces to respond to a natural disaster overseas and then, upon their return, decorates a soldier for bravery, which two presidential roles are primarily being exemplified?", "options": [{"text": "Chief Executive and Chief Diplomat", "isCorrect": false, "rationale": "While disaster response might involve executive oversight, ordering military forces is a Commander-in-Chief role, and decoration is a Head of State role, not Chief Diplomat."}, {"text": "Commander-in-Chief and Head of State", "isCorrect": true, "rationale": "Ordering military forces falls under the Commander-in-Chief role ('commands all U.S. military forces'), and decorating a soldier for bravery is a ceremonial duty, fitting the Head of State role ('represents the United States ... on ceremonial occasions')."}, {"text": "Head of State and Chief Diplomat", "isCorrect": false, "rationale": "The scenario describes military action and ceremonial decoration, not treaty negotiation, which is the primary function of the Chief Diplomat."}, {"text": "Chief Diplomat and Commander-in-Chief", "isCorrect": false, "rationale": "While Commander-in-Chief is correct for the military action, the decoration is a Head of State function, not Chief Diplomat."}]}, {"question": "The President issues an executive order directing the Environmental Protection Agency (EPA) to implement new, stricter emissions standards for vehicles. Which of the following best describes the scope and limits of this power?", "options": [{"text": "The executive order instantly becomes a federal law, overriding any conflicting laws passed by Congress.", "isCorrect": false, "rationale": "Executive orders direct agencies on how to carry out *existing* laws and must operate 'within limits,' meaning they cannot override laws passed by Congress or create new laws outside of existing statutory authority."}, {"text": "The President is directing a federal agency on how to carry out existing laws, but the order must operate within those laws.", "isCorrect": true, "rationale": "The text defines executive orders as directing 'federal agencies on how to carry out laws (within limits),' accurately reflecting that they implement, rather than create or override, laws."}, {"text": "This action requires immediate approval by the Supreme Court to take effect.", "isCorrect": false, "rationale": "Executive orders do not require immediate Supreme Court approval to take effect, though they can be challenged in court later."}, {"text": "Executive orders are purely advisory and have no real legal force.", "isCorrect": false, "rationale": "Executive orders have significant legal force, directing federal agencies and impacting policy within the bounds of existing law."}]}, {"question": "The President nominates a candidate to fill a vacancy on the Supreme Court. What is the next crucial step in this process, as outlined in the text?", "options": [{"text": "The House of Representatives must hold a public vote to confirm the nominee.", "isCorrect": false, "rationale": "The House of Representatives is not involved in confirming judicial nominations; this power belongs to the Senate."}, {"text": "The nominee must receive a majority of the popular vote in a national election.", "isCorrect": false, "rationale": "Judicial nominees are not confirmed by popular election."}, {"text": "The Senate must approve the nomination.", "isCorrect": true, "rationale": "The text states that the President's power to 'Nominate judges' includes Supreme Court Justices, but specifies this is 'with Senate approval'."}, {"text": "The President's decision is final and requires no further approval.", "isCorrect": false, "rationale": "The text clearly indicates that Senate approval is required for judicial nominations, acting as a check on presidential power."}]}, {"question": "According to the text, which presidential role involves 'the most serious power — it affects life and death'?", "options": [{"text": "Chief Diplomat", "isCorrect": false, "rationale": "The Chief Diplomat negotiates treaties, which does not directly involve the 'life and death' power described."}, {"text": "Head of State", "isCorrect": false, "rationale": "The Head of State performs ceremonial duties and represents the nation, which does not inherently involve the 'life and death' power."}, {"text": "Commander-in-Chief", "isCorrect": true, "rationale": "The text explicitly states: 'Commander-in-Chief: The President commands all U.S. military forces. This is the most serious power — it affects life and death.'"}, {"text": "Chief Executive", "isCorrect": false, "rationale": "The Chief Executive runs day-to-day government operations and enforces laws, which, while important, is not described as involving 'life and death' power in the same direct way as commanding the military."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
