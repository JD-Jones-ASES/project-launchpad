<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which statement best describes citizenship for someone who is nine, ten, or eleven years old?", "options": [{"text": "It is a legal status granted only upon turning eighteen.", "isCorrect": false, "rationale": "The text explicitly states, 'Citizenship is not a status you put on when you turn eighteen.'"}, {"text": "It is a daily practice of rights and responsibilities that begins immediately.", "isCorrect": true, "rationale": "The text defines citizenship as 'a practice — something you do every day, starting right now,' emphasizing that 'Every skill and habit that makes a good adult citizen begins with the choices you make today.'"}, {"text": "It is primarily about paying taxes and running for office, which are future activities.", "isCorrect": false, "rationale": "While these are aspects of adult citizenship, the text clarifies that students 'cannot vote yet. You cannot run for Congress. You probably don't pay income taxes' but are still citizens through practice."}, {"text": "It is a temporary role that changes based on your location and specific school rules.", "isCorrect": false, "rationale": "The text does not suggest citizenship is temporary or solely dependent on location or school rules; it emphasizes consistent practice."}], "id": "q01"}, {"question": "When students elect representatives to a student council, how does this activity relate to the concept of school as a 'first republic'?", "options": [{"text": "It demonstrates that students have unlimited power to change any school rule they dislike.", "isCorrect": false, "rationale": "Student council representatives 'present student concerns' but do not necessarily have unlimited power to change all rules, especially if students are also expected to 'follow class rules even when you disagree with them'."}, {"text": "It models the democratic process of choosing leaders to represent concerns, similar to a larger government.", "isCorrect": true, "rationale": "The text states, 'Student council or student government representatives are elected by students and present student concerns to teachers and administration,' drawing a direct parallel to democratic governance."}, {"text": "It is mainly for students to learn about public speaking and debate tactics.", "isCorrect": false, "rationale": "While public speaking may be a component, the primary purpose described is representation and democratic action, not just skill development in speaking."}, {"text": "It ensures that teachers and administration must always agree with student demands.", "isCorrect": false, "rationale": "The text states representatives 'present student concerns,' which implies influence, not an automatic mandate for agreement from administration."}], "id": "q02"}, {"question": "The text emphasizes 'respectful disagreement' as a crucial civic skill. Which of the following actions best exemplifies this skill?", "options": [{"text": "Interrupting someone to firmly state why their opinion is incorrect.", "isCorrect": false, "rationale": "This action is neither polite nor constructive, and it does not involve listening to understand, which is key to respectful disagreement."}, {"text": "Avoiding discussions about differing opinions to prevent any conflict.", "isCorrect": false, "rationale": "This avoids disagreement altogether rather than practicing it respectfully, which the text encourages as a skill."}, {"text": "Listening carefully to a classmate's opposing viewpoint before explaining your own thoughts calmly.", "isCorrect": true, "rationale": "The text advises, 'When someone has a different opinion, try to understand their point of view before responding. Respectful disagreement is a civic skill.' This option directly aligns with that advice."}, {"text": "Posting anonymous criticisms online about a school policy you don't like.", "isCorrect": false, "rationale": "Anonymous criticisms are not typically polite, constructive, or conducive to direct, respectful engagement, nor do they involve listening to understand."}], "id": "q03"}, {"question": "Which of the following is an example of practicing the civic virtue of 'standing up for fairness'?", "options": [{"text": "Ignoring a classmate who is being teased, assuming they will handle it themselves.", "isCorrect": false, "rationale": "Ignoring the situation does not constitute 'saying something' or actively standing up for fairness."}, {"text": "Secretly telling a teacher about an unfair situation, hoping they will address it without your involvement.", "isCorrect": false, "rationale": "While it addresses the unfairness, the text implies a more direct, courageous action ('say something'), rather than solely relying on a secret report."}, {"text": "Politely and clearly speaking up to defend a peer who is being unfairly blamed for something.", "isCorrect": true, "rationale": "The text states, 'If you see someone being treated unfairly, say something. Civic courage starts small,' which this action directly demonstrates."}, {"text": "Joining a group that makes fun of another student because you don't want to be targeted.", "isCorrect": false, "rationale": "This action is contrary to standing up for fairness; it participates in unfair treatment."}], "id": "q04"}, {"question": "The text states that 'wisdom and virtue don't just appear automatically — they are built through education, practice, and example.' How does learning about government, the Preamble, and historical figures like John Marshall contribute to a student's future citizenship?", "options": [{"text": "This knowledge helps students pass tests to eventually qualify for adult citizenship.", "isCorrect": false, "rationale": "The text explicitly states, 'This knowledge is not just for tests,' indicating a broader purpose beyond examination scores."}, {"text": "It ensures students will automatically become wise and virtuous leaders when they grow up.", "isCorrect": false, "rationale": "The text clarifies that wisdom and virtue 'don't just appear automatically,' requiring building through education and practice, not just information absorption."}, {"text": "It provides the foundational knowledge necessary for making good decisions and governing themselves as active citizens.", "isCorrect": true, "rationale": "The text concludes, 'This knowledge is the foundation of your future citizenship,' implying it equips individuals to make informed choices and participate effectively in self-governance."}, {"text": "This information primarily serves to fulfill curriculum requirements set by the state.", "isCorrect": false, "rationale": "While it fulfills curriculum, the text emphasizes the *purpose* of this knowledge for citizenship, not merely its role as a requirement."}], "id": "q05"}, {"question": "What profound lesson about civic virtue does the story of General George Washington's farewell to his army convey?", "options": [{"text": "That powerful leaders should always be emotional when saying goodbye to their subordinates.", "isCorrect": false, "rationale": "The story highlights his dignity and the unusual nature of his embrace, suggesting his emotion was part of a deeper character display, not the main lesson itself."}, {"text": "That true civic virtue involves prioritizing personal power and dignity above the needs of the people.", "isCorrect": false, "rationale": "Washington's act of resigning his commission and returning power to Congress directly contradicts the idea of prioritizing personal power."}, {"text": "That exceptional leaders can command loyalty through fear and strict discipline.", "isCorrect": false, "rationale": "The story emphasizes his character and connection with his officers, not an authoritarian style based on fear."}, {"text": "That civic virtue is about a leader's character, selflessness, and willingness to return power to the people.", "isCorrect": true, "rationale": "The text states, 'Power returned to the people,' and concludes, 'Washington's farewell showed that civic virtue is not just about rules — it is about character. It is about what kind of person you choose to be.'"}], "id": "q06"}, {"question": "According to the provided definitions, what distinguishes 'civic engagement' from merely learning about government?", "options": [{"text": "Civic engagement is primarily about understanding the history of political systems.", "isCorrect": false, "rationale": "While history is part of learning, 'civic engagement' is defined as 'active participation in the life of a community, school, or government,' emphasizing doing over just knowing."}, {"text": "Civic engagement involves passive observation and analysis of community issues.", "isCorrect": false, "rationale": "The definition uses 'active participation,' which contrasts with passive observation."}, {"text": "Civic engagement means actively participating in the life of a community, school, or government.", "isCorrect": true, "rationale": "This is the direct definition provided in the text for 'civic engagement.'"}, {"text": "Civic engagement is solely about voting in elections once you are old enough.", "isCorrect": false, "rationale": "Voting is one form of civic engagement, but the definition is broader, encompassing participation in community and school life, and applies to those not yet old enough to vote."}], "id": "q07"}, {"question": "The text advises citizens to 'Read and think.' Why is this particular practice highlighted as crucial for citizenship?", "options": [{"text": "Because reading and thinking are required skills for passing school exams and earning good grades.", "isCorrect": false, "rationale": "While true, the text's focus is on the civic purpose: 'This knowledge is not just for tests.'"}, {"text": "Because informed and thoughtful citizens are better equipped to make sound decisions for their community and government.", "isCorrect": true, "rationale": "The text directly states, 'A citizen who does not read and think carefully cannot make good decisions,' linking this practice to effective decision-making."}, {"text": "Because it helps citizens stay updated on celebrity news and popular culture.", "isCorrect": false, "rationale": "This is irrelevant to the civic purpose of making good decisions for the community."}, {"text": "Because it is a passive way to engage with the world without needing to take direct action.", "isCorrect": false, "rationale": "Reading and thinking are presented as foundations for making good decisions, which then inform and enable active participation and civic engagement, not an alternative to action."}], "id": "q08"}, {"question": "A 'citizen' is defined as 'a member of a country or community who has both rights and responsibilities.' Given this definition and the section's overall message, what is the most important implication for young citizens?", "options": [{"text": "That their rights are absolute and come before any responsibilities they might have.", "isCorrect": false, "rationale": "The definition specifies 'both rights and responsibilities,' implying a balance, not a priority of one over the other. The text emphasizes practicing responsibilities now."}, {"text": "That their responsibilities are limited until they reach the age of adulthood.", "isCorrect": false, "rationale": "The core message is that citizenship is a practice 'starting right now,' meaning responsibilities begin in childhood, not only as an adult."}, {"text": "That understanding and actively practicing their responsibilities is as vital as knowing their rights, starting today.", "isCorrect": true, "rationale": "This option combines the definition's balance of rights and responsibilities with the section's central theme of citizenship as an active practice that begins immediately."}, {"text": "That they should focus solely on what the government can do for them as individuals.", "isCorrect": false, "rationale": "This ignores the 'responsibilities' aspect of citizenship and the emphasis on active participation for the common good."}], "id": "q09"}, {"question": "How does the concept of 'your school is your first republic' encourage students to think about their role in the school community?", "options": [{"text": "It suggests that the school is a place where students can freely break rules without consequence, similar to a new country.", "isCorrect": false, "rationale": "The text explicitly mentions 'Classroom rules protect everyone's right to learn and be safe,' indicating the importance of following rules."}, {"text": "It encourages students to view their participation in school life as a practice ground for adult citizenship.", "isCorrect": true, "rationale": "The text uses the analogy to show how activities like voting on rules, having student government, and following rules are 'democracy in action' and 'practicing citizenship' for the future."}, {"text": "It means students should treat their teachers like elected officials who must always comply with student requests.", "isCorrect": false, "rationale": "The text compares the teacher to a 'governor' who 'has authority,' implying respect for their role and not just automatic compliance with student requests."}, {"text": "It implies that the school system is entirely run by students, independent of adult authority.", "isCorrect": false, "rationale": "The text mentions student council representatives presenting concerns to 'teachers and administration,' and teachers having authority, showing it's not run solely by students."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
