<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a direct democracy?", "options": [{"text": "Citizens elect representatives to make laws on their behalf.", "isCorrect": false, "rationale": "This describes a representative democracy, also known as an indirect democracy, not a direct democracy where citizens participate directly."}, {"text": "Citizens vote on every law themselves, with everyone participating directly.", "isCorrect": true, "rationale": "The text defines direct democracy as a system where 'Citizens vote on every law themselves. Everyone participates directly.'"}, {"text": "A government led by a hereditary king or queen.", "isCorrect": false, "rationale": "This describes a monarchy, which is explicitly contrasted with a republic and is not a form of direct democracy."}, {"text": "A system where a specialized legislature makes all laws without public input.", "isCorrect": false, "rationale": "This describes an autocratic or non-democratic system, not a direct democracy where public input is central and direct."}], "id": "q01"}, {"question": "In the political sense, what is the defining characteristic of a republic as described in the text?", "options": [{"text": "It is a government led by a hereditary monarch.", "isCorrect": false, "rationale": "The text explicitly states that in a republic, 'There is no hereditary king.' The public, not a royal family, owns the government."}, {"text": "Citizens vote directly on every law, bypassing elected representatives.", "isCorrect": false, "rationale": "This describes a direct democracy, not a republic. The text clarifies that in a republic, citizens govern through elected representatives."}, {"text": "Citizens hold ultimate power through their elected representatives, with no hereditary ruler.", "isCorrect": true, "rationale": "The text defines a republic as 'A government in which citizens hold ultimate power through their elected representatives. There is no hereditary king.'"}, {"text": "A system where the military holds ultimate power to enforce all laws.", "isCorrect": false, "rationale": "This describes a military junta or dictatorship, which is not a republic where citizens hold ultimate power through elected officials."}], "id": "q02"}, {"question": "Why did the Founders of the United States choose a republic instead of a direct democracy?", "options": [{"text": "They believed direct democracy was too efficient for complex decisions.", "isCorrect": false, "rationale": "The text implies direct democracy struggles with complex decisions due to lack of expert knowledge among citizens and the time commitment, making it less efficient for complex, large-scale governance, not 'too efficient'."}, {"text": "The vast size and population of the United States made direct citizen participation in every law impractical.", "isCorrect": true, "rationale": "The text states, 'The United States has more than 330 million people... Could everyone come to Washington, D.C. to vote on every law? Of course not. And that is exactly why the Founders of the United States chose a republic rather than a direct democracy.'"}, {"text": "They feared that elected representatives would become tyrants if given too much power.", "isCorrect": false, "rationale": "While the Founders were wary of concentrated power, they chose *elected* representatives (with limited terms and a constitution) as a 'middle path' to avoid the tyranny of a king and the chaos of direct democracy, not because elected representatives *are* inherently tyrannical."}, {"text": "Direct democracies typically lead to the establishment of hereditary kings.", "isCorrect": false, "rationale": "Direct democracies do not typically lead to hereditary kings. A republic specifically avoids hereditary kings, but direct democracy involves no kings at all."}], "id": "q03"}, {"question": "According to the text, what is the primary role of the legislature in a republic?", "options": [{"text": "To enforce laws passed by the executive branch.", "isCorrect": false, "rationale": "Enforcing laws is typically the role of the executive branch, not the legislature."}, {"text": "To interpret laws and ensure their constitutionality.", "isCorrect": false, "rationale": "Interpreting laws and ensuring constitutionality is the role of the judicial branch, not the legislature."}, {"text": "To make laws, with its members elected by citizens.", "isCorrect": true, "rationale": "The text defines a legislature as 'The branch of government that makes laws. In a republic, the legislature is elected by citizens.'"}, {"text": "To represent the interests of a royal family and advise the king.", "isCorrect": false, "rationale": "A republic has 'no hereditary king' and thus no royal family for the legislature to represent."}], "id": "q04"}, {"question": "Which of the following is identified as a potential problem of direct democracy, even in small communities?", "options": [{"text": "Representatives often fail to serve the wishes of the people.", "isCorrect": false, "rationale": "This is a potential problem in a representative democracy, where representatives exist. In a direct democracy, there are no 'go-betweens'."}, {"text": "It works too slowly, leading to legislative gridlock.", "isCorrect": false, "rationale": "The text states that in a small direct democracy, 'The vote is fast. The result is immediate,' contradicting the idea of it working too slowly."}, {"text": "Majority votes can sometimes infringe upon the rights of minority groups.", "isCorrect": true, "rationale": "The text lists as a problem of direct democracy: 'Majority votes can sometimes trample the rights of minorities.'"}, {"text": "Citizens tend to lose interest in political participation over time.", "isCorrect": false, "rationale": "While possible, the text doesn't list this as one of the specific 'problems even in small communities'; it focuses on time commitment, lack of expertise, and minority rights."}], "id": "q05"}, {"question": "In a representative democracy, what is the primary expectation of elected representatives?", "options": [{"text": "To vote exactly as they personally believe, regardless of constituent wishes.", "isCorrect": false, "rationale": "The text states representatives 'are supposed to serve the wishes and interests of those who chose them,' which contrasts with voting purely on personal beliefs."}, {"text": "To serve the wishes and interests of the citizens who elected them.", "isCorrect": true, "rationale": "The text states: 'These elected representatives are supposed to serve the wishes and interests of those who chose them.'"}, {"text": "To implement laws without seeking any public input or feedback.", "isCorrect": false, "rationale": "While representatives make decisions, they are still expected to serve their constituents' interests, implying a degree of responsiveness and accountability."}, {"text": "To inherit their positions from their predecessors through family lineage.", "isCorrect": false, "rationale": "Representatives are 'elected' by citizens, not inherited, distinguishing a republic from a monarchy."}], "id": "q06"}, {"question": "How does citizen participation in the United States, as a republic, primarily differ from participation in a direct democracy?", "options": [{"text": "U.S. citizens vote directly on all federal laws, while in a direct democracy, only a select few vote.", "isCorrect": false, "rationale": "The text explicitly states U.S. citizens 'cannot vote directly on federal laws' and in a direct democracy, 'every citizen votes on every question'."}, {"text": "U.S. citizens elect officials to make laws and can vote out those who make bad laws, whereas direct democracy involves voting on every law personally.", "isCorrect": true, "rationale": "The text explains, 'The United States is a republic: citizens vote for senators, representatives, and the president. Those elected officials then make and enforce laws. Citizens cannot vote directly on federal laws — but they can vote out elected officials who make bad laws.' This is directly contrasted with direct democracy where 'every citizen votes on every question'."}, {"text": "U.S. citizens have no say in lawmaking, whereas direct democracy ensures every citizen's voice is heard.", "isCorrect": false, "rationale": "U.S. citizens have an indirect say through their elected representatives and the ability to vote them out, contradicting the claim of 'no say'."}, {"text": "U.S. citizens are required to attend every legislative meeting, unlike in a direct democracy.", "isCorrect": false, "rationale": "The text indicates that attending every meeting is a requirement for citizens in a direct democracy ('Every citizen must have time to attend every meeting'), not in a republic like the U.S."}], "id": "q07"}, {"question": "James Madison's statement that a republic can “refine and enlarge the public views” suggests which advantage of representative government?", "options": [{"text": "Representatives can make decisions more quickly than a large group of citizens.", "isCorrect": false, "rationale": "While efficiency can be a benefit, 'refine and enlarge' points more towards the quality of deliberation and outcome rather than mere speed."}, {"text": "Representatives are generally wealthier and thus better suited to govern.", "isCorrect": false, "rationale": "The text does not mention wealth as a factor or advantage for representatives. Madison's point is about their deliberation and informed decision-making, not their economic status."}, {"text": "Elected representatives, being more deliberate and informed, can improve the quality of public decision-making.", "isCorrect": true, "rationale": "Madison argues, 'Representatives can be more deliberate and informed than a mob of thousands all voting at once,' indicating that representatives can improve or 'refine' the public's initial views through considered judgment."}, {"text": "Public views are best implemented when they are simplified and reduced by a small body.", "isCorrect": false, "rationale": "The phrase 'enlarge the public views' suggests development and improvement, not simplification or reduction in a diminishing sense."}], "id": "q08"}, {"question": "Which ancient civilization is given as an example of a direct democracy in the text?", "options": [{"text": "The Roman Empire.", "isCorrect": false, "rationale": "The Roman Empire is not mentioned as an example of a direct democracy in this text."}, {"text": "Ancient Athens.", "isCorrect": true, "rationale": "The text explicitly uses Athens as an example: 'Athens had about 40,000 male citizens. Every citizen could walk to the Pnyx hillside and vote.'"}, {"text": "The United States.", "isCorrect": false, "rationale": "The text clearly states, 'The United States is a republic' and specifically contrasts it with direct democracy."}, {"text": "Great Britain.", "isCorrect": false, "rationale": "Great Britain is not mentioned in the text as an example of direct democracy."}], "id": "q09"}, {"question": "The text states that in a republic, citizens hold 'ultimate power.' How do citizens primarily exercise this ultimate power in the United States?", "options": [{"text": "By personally attending Washington D.C. to vote on every federal law.", "isCorrect": false, "rationale": "The text explains this is impractical for a large country like the U.S. and is characteristic of direct democracy, not a republic."}, {"text": "By directly enforcing laws at the local level through community patrols.", "isCorrect": false, "rationale": "Law enforcement is typically handled by specific government agencies (executive branch), not by citizens directly exercising ultimate power in this manner."}, {"text": "By electing representatives and holding them accountable through subsequent elections.", "isCorrect": true, "rationale": "The text states, 'citizens hold ultimate power through their elected representatives' and 'they can vote out elected officials who make bad laws,' illustrating how this power is exercised."}, {"text": "By petitioning a hereditary king to address their grievances and concerns.", "isCorrect": false, "rationale": "A republic, by definition, has 'no hereditary king,' making this option entirely inconsistent with the concept of a republic."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
