<script>
var QUESTIONS = [{"question": "What is the fundamental difference between an absolute monarchy and a constitutional monarchy?", "options": [{"text": "An absolute monarchy is found only in ancient civilizations, while a constitutional monarchy is modern.", "isCorrect": false, "rationale": "While many ancient civilizations had absolute monarchies and modern ones are constitutional, the core difference is not their age but the limits on power. The text mentions modern constitutional monarchies and discusses the historical prevalence of absolute monarchies without limiting them to ancient times."}, {"text": "In an absolute monarchy, the ruler has unlimited power; in a constitutional monarchy, the monarch's power is limited by law and a constitution.", "isCorrect": true, "rationale": "The text explicitly states that an absolute monarch has 'complete power with no legal limits,' while a constitutional monarch 'is the head of state but must follow the country's laws and constitution.' This is the defining distinction between the two systems."}, {"text": "An absolute monarchy features a king, while a constitutional monarchy always features a queen.", "isCorrect": false, "rationale": "The gender of the monarch is irrelevant to the type of monarchy. Both absolute and constitutional monarchies can have kings or queens, as seen in the examples of the UK (king/queen) and ancient Egypt (pharaohs, who could be male or female)."}, {"text": "Constitutional monarchies always have larger armies than absolute monarchies.", "isCorrect": false, "rationale": "Military size is not a defining characteristic that differentiates absolute from constitutional monarchies according to the text. In an absolute monarchy, the ruler often commands the army, but this doesn't imply a larger army size than in a constitutional monarchy."}], "id": "q01"}, {"question": "In a country called Xylos, the monarch makes all the laws, controls the military without oversight, and appoints all government officials. Citizens are taught that the monarch's authority comes directly from a divine entity. Which type of government is Xylos most likely operating under?", "options": [{"text": "A constitutional monarchy, because the monarch is the head of state.", "isCorrect": false, "rationale": "While a constitutional monarch is head of state, the scenario describes unlimited power (making all laws, no oversight, divine right), which directly contradicts the definition of a constitutional monarchy where power is limited by law and a constitution."}, {"text": "An absolute monarchy, due to the monarch's unlimited power and claim of divine right.", "isCorrect": true, "rationale": "The description aligns perfectly with an absolute monarchy: the ruler has no legal limits, makes all major decisions, commands the army, and claims divine right as a source of power, as stated in the text's definition and description of absolute monarchy."}, {"text": "A parliament, because there is a ruler in charge.", "isCorrect": false, "rationale": "A parliament is a legislature, not a type of monarchy. In a parliament, laws are debated and made by elected representatives, not solely by a monarch with unlimited power. The described scenario shows no evidence of a powerful parliament."}, {"text": "A democracy, as the monarch has complete control.", "isCorrect": false, "rationale": "A democracy is a system where citizens have a say in their government, often through elected representatives. Complete, unchecked control by one ruler, especially through divine right, is the antithesis of a democratic system."}], "id": "q02"}, {"question": "Which historical event is identified as the key moment when a king's power was first limited in writing in England, significantly contributing to the evolution towards a constitutional monarchy?", "options": [{"text": "The signing of the Declaration of Independence in 1776.", "isCorrect": false, "rationale": "The Declaration of Independence was a pivotal event in American history, leading to independence from the British monarchy, not an event that limited a king's power within England itself."}, {"text": "The Norman Conquest of 1066.", "isCorrect": false, "rationale": "The Norman Conquest established a new monarchy in England and consolidated royal power, but it did not, according to the text, involve limiting the king's power in writing."}, {"text": "The signing of the Magna Carta in 1215.", "isCorrect": true, "rationale": "The text explicitly states: 'The key moment came in 1215, when English nobles forced King John to sign the Magna Carta (“Great Charter”). For the first time, a king's power was limited in writing. Even kings had to follow the law.'"}, {"text": "The establishment of the United Nations after World War II.", "isCorrect": false, "rationale": "The United Nations is an international organization formed much later in the 20th century and is unrelated to the historical limitation of a king's power in medieval England."}], "id": "q03"}, {"question": "In a constitutional monarchy like the United Kingdom, the text states that the monarch 'reigns — but Parliament rules.' What does this distinction primarily imply about the monarch's role?", "options": [{"text": "The monarch actively governs the country on a daily basis, but Parliament advises them.", "isCorrect": false, "rationale": "This statement is incorrect. The text clearly states that 'Real governing power belongs to an elected parliament and a prime minister,' and the monarch 'cannot make laws, raise taxes, or deploy the army without Parliament's approval.' The monarch does not actively govern."}, {"text": "The monarch holds ceremonial power and symbolizes national unity, while Parliament exercises actual political authority.", "isCorrect": true, "rationale": "This accurately reflects the text: the monarch is the 'ceremonial head of state' and 'serves as a symbol of national unity,' while 'Real governing power belongs to an elected parliament and a prime minister.' The phrase 'reigns — but Parliament rules' perfectly encapsulates this division of power."}, {"text": "The monarch is responsible for declaring war, and Parliament is responsible for funding it.", "isCorrect": false, "rationale": "The text states the monarch 'cannot... deploy the army without Parliament's approval,' indicating that even the decision to use military force is not solely the monarch's. Actual political authority, including military deployment, rests with Parliament."}, {"text": "The monarch has the final say on all laws, but Parliament drafts them.", "isCorrect": false, "rationale": "The text explicitly states the monarch 'cannot make laws,' and that 'Elected members of Parliament do that.' While the monarch signs bills into law, this is largely a ceremonial act in a constitutional monarchy, not a 'final say' that overrules Parliament."}], "id": "q04"}, {"question": "If a modern nation wants to establish a government where a monarch serves as the symbolic head of state but cannot independently impose taxes or deploy the military, what essential element must be in place to ensure this structure, according to the principles of a constitutional monarchy?", "options": [{"text": "A large, powerful army loyal only to the monarch.", "isCorrect": false, "rationale": "A powerful army loyal only to the monarch would enable independent action and potentially absolute rule, directly contradicting the goal of limiting the monarch's power and requiring parliamentary approval for military deployment."}, {"text": "A strong tradition of divine right supporting the monarch's authority.", "isCorrect": false, "rationale": "Divine right is a source of *absolute* power and would undermine any legal limits placed on the monarch. It would justify independent rule, not ceremonial headship under legal constraints."}, {"text": "A constitution and laws that legally bind the monarch and empower an elected legislature.", "isCorrect": true, "rationale": "The text defines a constitutional monarchy as one where the monarch 'is the head of state but must follow the country's laws and constitution. A parliament or legislature makes the actual laws.' This legal framework, with an empowered elected legislature, is essential for limiting the monarch's power and enabling parliamentary rule."}, {"text": "A requirement that all citizens vote directly on every law.", "isCorrect": false, "rationale": "While direct citizen voting on laws is a feature of some democratic systems, it is not the specific mechanism described in the text for establishing a constitutional monarchy, which relies on an elected parliament/legislature rather than direct votes on every law."}], "id": "q05"}, {"question": "According to the text, what are the two primary sources from which an absolute monarch's power usually stems?", "options": [{"text": "Popular elections and inherited wealth.", "isCorrect": false, "rationale": "Popular elections are a feature of democratic or republican systems, not absolute monarchies, where power is typically inherited. Inherited wealth, while often associated with royalty, is not described as the *source* of the monarch's absolute political power."}, {"text": "Military force and a claim of divine right.", "isCorrect": true, "rationale": "The text explicitly states: 'An absolute monarch's power usually comes from one of two sources: military force or a claim of divine right (the idea that God chose the ruler and therefore obedience is a religious duty).'"}, {"text": "International treaties and economic dominance.", "isCorrect": false, "rationale": "These factors might influence a nation's standing but are not presented as the primary internal sources of an absolute monarch's power within their own country according to the text."}, {"text": "Religious prophecies and technological advancement.", "isCorrect": false, "rationale": "While religion can play a role (divine right), 'religious prophecies' are not listed as a primary source of power. Technological advancement can enhance a ruler's capabilities but is not a source of their inherent power to rule."}], "id": "q06"}, {"question": "The word 'parliament' comes from the French 'parler' meaning 'to speak.' How does this etymology reflect the function of Parliament in a constitutional monarchy?", "options": [{"text": "It implies that the monarch grants Parliament permission to speak on their behalf.", "isCorrect": false, "rationale": "The word origin emphasizes open discussion and debate. In a constitutional monarchy, Parliament is an independent legislative body that makes laws, not merely a body that speaks on behalf of the monarch."}, {"text": "It highlights Parliament's role as a place for discussion and debate among elected representatives to make laws.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states: 'The idea that government should involve discussion and argument, not just commands, is built right into the word.' This directly describes the function of a legislature where members speak and debate to form laws."}, {"text": "It means Parliament only serves to announce the monarch's decrees to the public.", "isCorrect": false, "rationale": "This would be more indicative of a body subservient to an absolute monarch, merely communicating commands. In a constitutional monarchy, Parliament makes the laws itself, it doesn't just announce them."}, {"text": "It refers to the monarch's right to speak freely without interruption.", "isCorrect": false, "rationale": "The word origin refers to the institution of Parliament as a place for *people* (specifically, representatives) to speak and debate, not the monarch's individual right to speech."}], "id": "q07"}, {"question": "The text states, 'The same word — “monarchy” — can describe two very different systems.' What is the most significant differentiating factor between these 'two very different systems' (absolute vs. constitutional monarchy)?", "options": [{"text": "The number of palaces owned by the monarch.", "isCorrect": false, "rationale": "The number of palaces is a superficial detail and irrelevant to the fundamental structure of government or the legal limits of a ruler's power."}, {"text": "Whether the ruler is bound by law and if governing power resides with an elected body.", "isCorrect": true, "rationale": "The 'keyconcept' box directly summarizes: 'Absolute monarchy gives one person total, unlimited power. Constitutional monarchy limits the ruler by law and gives real governing power to an elected legislature.' This is the core distinction emphasized throughout the text."}, {"text": "The popularity of the monarch among their citizens.", "isCorrect": false, "rationale": "Popularity can fluctuate and does not define the *system* of government or the legal limits on power. An absolute monarch might be popular or unpopular, as might a constitutional one, without changing the nature of their rule."}, {"text": "The country's geographical size and population.", "isCorrect": false, "rationale": "The size or population of a country does not determine whether its monarchy is absolute or constitutional. Both types of monarchies have existed in countries of varying sizes."}], "id": "q08"}, {"question": "Imagine a country where the ruler issues decrees that immediately become law, dismisses judges who disagree with them, and uses the military to suppress dissent. This ruler's authority is unchecked by any legal document or elected body. What term best describes this ruler?", "options": [{"text": "A constitutional monarch, because they are the head of state.", "isCorrect": false, "rationale": "A constitutional monarch is bound by laws and a constitution, and does not have unchecked power to dismiss judges or independently make laws. This description contradicts the nature of a constitutional monarch's limited power."}, {"text": "A parliamentary leader, as they are making laws.", "isCorrect": false, "rationale": "A parliamentary leader operates within a system where laws are made by an elected parliament through debate and voting, not solely by a single ruler issuing decrees without check. The described ruler's power is absolute, not parliamentary."}, {"text": "An absolute monarch, possessing complete and unlimited power.", "isCorrect": true, "rationale": "The description perfectly matches the definition of an absolute monarch: 'A government in which one ruler has complete power with no legal limits. The ruler's word is the law.' The actions described—issuing decrees as law, dismissing judges, using military to suppress dissent—are all hallmarks of unchecked power."}, {"text": "An heir, as they are next in line to the throne.", "isCorrect": false, "rationale": "An heir is simply the person next in line to inherit a throne; this term does not describe the *type* of power or governance they might exercise once on the throne. The question asks to describe the *ruler* in power, not their succession status."}], "id": "q09"}, {"question": "The transformation of the United Kingdom from a system where kings had significant power to its current constitutional monarchy demonstrates a historical trend where:", "options": [{"text": "Monarchical power always increases over time, eventually leading to absolute rule.", "isCorrect": false, "rationale": "The UK's history contradicts this; the text explicitly details how the king's power was limited by the Magna Carta and how Parliament grew stronger, leading to a reduction in monarchical power."}, {"text": "The power of monarchs can be progressively limited by legal documents and the rise of elected legislatures.", "isCorrect": true, "rationale": "The text details how the Magna Carta 'limited a king's power in writing' and how 'Parliament grew stronger' over centuries, leading to a system where the monarch 'reigns but Parliament rules.' This exemplifies the progressive limitation of monarchical power through legal and legislative means."}, {"text": "All monarchies are destined to eventually become republics.", "isCorrect": false, "rationale": "While some monarchies do become republics, the text focuses on the transition within a monarchy from absolute to constitutional, not a guaranteed shift away from monarchy altogether. Many constitutional monarchies exist today."}, {"text": "Military force is the only way to limit a monarch's power effectively.", "isCorrect": false, "rationale": "While military force can be a *source* of absolute power, the text primarily describes legal documents like the Magna Carta and the growth of parliamentary power as the key mechanisms for limiting the monarch's power in the UK, not solely military force as the *only* way."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
