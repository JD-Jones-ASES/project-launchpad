<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best encapsulates the core ideal of the Roman Republic as described in the text?", "options": [{"text": "A system where the most powerful general controlled all territories through military force.", "isCorrect": false, "rationale": "This describes an empire, where power is often seized by force and concentrated, contrasting with the Republic's ideals."}, {"text": "A government designed to ensure power was temporary, shared, and used for the common good through elected representatives and checks and balances.", "isCorrect": true, "rationale": "The text explicitly states the Republic was about 'power that is temporary, shared, and used for the common good' and mentions elected consuls with veto power as an early form of checks and balances."}, {"text": "A system led by a single, all-powerful emperor who advised the Senate.", "isCorrect": false, "rationale": "This describes the Roman Empire, which superseded the Republic, and an emperor holds power, not advises the Senate."}, {"text": "A state where only wealthy patrician families held governing power indefinitely without accountability.", "isCorrect": false, "rationale": "While patricians held significant power, the Republic also included elected tribunes for plebeians and aimed for shared, temporary power, not indefinite rule by one class."}], "id": "q01"}, {"question": "The story of Cincinnatus was revered by Romans for centuries primarily because it illustrated:", "options": [{"text": "The importance of continuous military leadership for Rome's expansion.", "isCorrect": false, "rationale": "The story highlights giving up power, not holding onto it for continuous military endeavors, though military success was valued."}, {"text": "The ideal of a citizen leader who voluntarily relinquished power for the common good after achieving victory.", "isCorrect": true, "rationale": "The text states Romans told the story because 'it captured what the Roman Republic was supposed to be about: power that is temporary, shared, and used for the common good' through Cincinnatus's example."}, {"text": "The necessity of appointing a permanent dictator during times of national crisis.", "isCorrect": false, "rationale": "Cincinnatus returned his power, directly contradicting the idea of a permanent dictator."}, {"text": "The exclusive right of patricians to lead the Roman army during any conflict.", "isCorrect": false, "rationale": "The story's emphasis is on his character and actions, not his social class's exclusive rights."}], "id": "q02"}, {"question": "What was the primary purpose of having two consuls in the Roman Republic, and how did they exercise their authority?", "options": [{"text": "They were co-emperors who ruled jointly over the Roman Empire.", "isCorrect": false, "rationale": "Consuls were part of the Republic, not emperors of the Empire."}, {"text": "They were military commanders who served as dictators in times of prolonged war.", "isCorrect": false, "rationale": "While consuls often led armies, their primary role was chief executive, and dictatorships were temporary, specific appointments, not the consuls' standard function."}, {"text": "They were chief executives elected annually, each with the power to veto the other's decisions, preventing concentrated power.", "isCorrect": true, "rationale": "The text explicitly states that 'Having two consuls prevented any one person from having too much power' and that 'Each consul could veto...This was an early form of checks and balances.'"}, {"text": "They were advisors to the Senate, ensuring that patrician interests were always upheld.", "isCorrect": false, "rationale": "Consuls were chief executives, not merely advisors, and their role involved more than just patrician interests."}], "id": "q03"}, {"question": "The establishment of the Twelve Tables in Rome represented a significant advancement for which of the following reasons?", "options": [{"text": "It solidified the patricians' exclusive right to interpret the law, strengthening their power over common citizens.", "isCorrect": false, "rationale": "The text states it did the opposite: 'Before that, patricians could interpret the unwritten law however they wanted,' implying the Twelve Tables curtailed this power."}, {"text": "It ensured that all citizens, including plebeians, had access to and protection under a codified legal system.", "isCorrect": true, "rationale": "The text clearly states, 'For the first time, ordinary citizens could read the law...Written law was a protection for the powerless,' marking a major step forward."}, {"text": "It introduced a system of divine law, superseding human-made legislation.", "isCorrect": false, "rationale": "The text makes no mention of divine law; it refers to written laws created by the Roman government."}, {"text": "It mandated that all government positions, including consuls and senators, be held exclusively by military generals.", "isCorrect": false, "rationale": "The Twelve Tables dealt with codifying existing laws, not with who could hold specific government positions."}], "id": "q04"}, {"question": "Julius Caesar's decision to cross the Rubicon River with his army fundamentally challenged the Roman Republic by:", "options": [{"text": "Initiating a peaceful transition of power from the Senate to the consuls, avoiding conflict.", "isCorrect": false, "rationale": "Crossing the Rubicon was 'an act of war against Rome's Senate,' directly leading to conflict, not a peaceful transition."}, {"text": "Directly defying the Senate's authority and triggering a civil war that ultimately led to his permanent dictatorship.", "isCorrect": true, "rationale": "The text explicitly states it was 'an act of war against Rome's Senate' and that 'After winning a civil war, he was declared dictator perpetuo.'"}, {"text": "Establishing a new military alliance with Gaul, thereby strengthening Rome's northern borders.", "isCorrect": false, "rationale": "Caesar had already conquered Gaul; crossing the Rubicon was an internal act against Rome, not an alliance with Gaul."}, {"text": "Restoring the principle of shared governance after years of internal political struggles.", "isCorrect": false, "rationale": "Caesar's actions led to his dictatorship, moving away from shared governance, not restoring it."}], "id": "q05"}, {"question": "The transition from the Roman Republic to the Roman Empire was formally marked by:", "options": [{"text": "The assassination of Julius Caesar by a group of senators.", "isCorrect": false, "rationale": "Caesar's assassination triggered another civil war, but it was Octavian's subsequent rise to power that marked the formal beginning of the Empire."}, {"text": "The creation of the Twelve Tables, establishing a system of written law for all citizens.", "isCorrect": false, "rationale": "The Twelve Tables were created centuries before the Empire and were a hallmark of the Republic."}, {"text": "Octavian receiving the title of Augustus and consolidating all real power to himself, despite retaining republican offices.", "isCorrect": true, "rationale": "The text states, 'In 27 BC, the Senate gave him the title Augustus...He became the first Roman Emperor...real power belonged to him alone. The Roman empire had begun.'"}, {"text": "The election of two consuls with veto power, creating an early system of checks and balances.", "isCorrect": false, "rationale": "The system of two consuls was a foundational element of the Republic, not the transition to the Empire."}], "id": "q06"}, {"question": "Which of the following best describes the fundamental shift in governmental ideology that occurred with the rise of the Roman Empire from the Republic?", "options": [{"text": "A shift from a system of written laws to unwritten customs and traditions.", "isCorrect": false, "rationale": "Augustus reformed laws and established a professional civil service, not abandoned written law."}, {"text": "A transition from military rule to a purely civilian leadership.", "isCorrect": false, "rationale": "Emperors like Augustus often maintained strong military control, and the transition was more about the nature of the ruler than purely civilian versus military leadership."}, {"text": "The replacement of shared, temporary power among elected representatives with the concentrated, singular rule of an emperor.", "isCorrect": true, "rationale": "The text explicitly states, 'The Republic's ideal of shared power had been replaced by the rule of one man,' referring to the emperor."}, {"text": "The expansion of voting rights to all citizens across the vast Roman territories.", "isCorrect": false, "rationale": "The text does not mention an expansion of voting rights; rather, it highlights the consolidation of power in one person."}], "id": "q07"}, {"question": "Based on the 'keyconcept' box, what specific lesson did the American Founders likely derive from the fall of the Roman Republic and the rise of the Empire?", "options": [{"text": "The importance of establishing a strong, centralized military to deter foreign invaders and maintain order.", "isCorrect": false, "rationale": "While true that a strong military is important, the text highlights a lesson about power consolidation, not military strength in general."}, {"text": "The necessity of a single, powerful leader to ensure stability and efficiency in government.", "isCorrect": false, "rationale": "This contradicts the stated lesson, which warns against 'one person gain[ing] too much power'."}, {"text": "The dangers of allowing too much power to accumulate in the hands of one individual or branch of government.", "isCorrect": true, "rationale": "The text explicitly states the fall of the Republic 'showed what can happen when one person gains too much power — a lesson the American Founders remembered carefully.'"}, {"text": "The advantage of a hereditary monarchy over an elected system for long-term governance and succession.", "isCorrect": false, "rationale": "The Founders were establishing a republic, making this statement antithetical to their goals and the lesson learned."}], "id": "q08"}, {"question": "Beyond establishing the Empire, Augustus's reign was characterized by several significant achievements. Which of these was NOT one of his key contributions?", "options": [{"text": "Initiating the Pax Romana, a period of widespread peace and stability throughout the Roman world.", "isCorrect": false, "rationale": "The text explicitly states Augustus 'began a period of peace called the Pax Romana'."}, {"text": "Rebuilding Rome in marble and implementing significant urban development projects.", "isCorrect": false, "rationale": "The text mentions Augustus 'rebuilt Rome in marble'."}, {"text": "Expanding the voting rights of plebeians and increasing the Senate's real power in governmental decisions.", "isCorrect": true, "rationale": "Augustus consolidated power to himself ('real power belonged to him alone'), rather than expanding voting rights or increasing the Senate's real power, despite keeping the offices."}, {"text": "Reforming the Roman army and creating a professional civil service.", "isCorrect": false, "rationale": "The text states Augustus 'reformed the army, and created a professional civil service'."}], "id": "q09"}, {"question": "The word 'republic' originates from the Latin 'res publica,' meaning 'the public thing.' This etymology directly reflects which foundational principle of the Roman Republic?", "options": [{"text": "The belief that all political power should be inherited through noble families to ensure continuity.", "isCorrect": false, "rationale": "The etymology 'public thing' suggests shared ownership, not inherited power by noble families."}, {"text": "The idea that government and its affairs belong to the citizens and are for the common good, not private rule.", "isCorrect": true, "rationale": "The meaning 'the public thing' or 'the people's affair' directly aligns with the Republic's ideal of 'power that is temporary, shared, and used for the common good' by its citizens."}, {"text": "The practice of having a single, supreme ruler who controls all aspects of governance.", "isCorrect": false, "rationale": "This describes an empire or monarchy, which is antithetical to the concept of 'the public thing' belonging to everyone."}, {"text": "The necessity of maintaining a large, professional army to protect state interests and expand territories.", "isCorrect": false, "rationale": "While Rome had a strong army, the etymology of 'republic' relates to governance and public ownership, not specifically military matters."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
