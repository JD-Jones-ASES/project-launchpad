<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary role of a jury in a criminal trial, according to the text?", "options": [{"text": "To ensure fair procedures are followed by the attorneys.", "isCorrect": false, "rationale": "This is primarily the role of the judge, who presides over the court and ensures rules are followed."}, {"text": "To listen to evidence and decide if the defendant is guilty or not guilty.", "isCorrect": true, "rationale": "The text defines a jury as 'a group of citizens called to listen to evidence and decide whether someone is guilty or not guilty.'"}, {"text": "To decide whether a law was broken and impose a sentence.", "isCorrect": false, "rationale": "While the jury decides if a law was broken (through a guilty verdict), imposing a sentence is typically the judge's role, not the jury's."}, {"text": "To present the case against the defendant.", "isCorrect": false, "rationale": "Presenting the case against the defendant is the role of the prosecution or plaintiff's attorney."}]}, {"question": "Which statement best describes a key difference between criminal and civil cases?", "options": [{"text": "Criminal cases involve disputes over money, while civil cases involve breaking a law.", "isCorrect": false, "rationale": "This statement reverses the definitions. Civil cases usually involve disputes over money, property, or rights, while criminal cases involve breaking a law."}, {"text": "In criminal cases, the government brings charges, and the defendant can face jail time, whereas in civil cases, disputes are between private parties, and no one goes to jail.", "isCorrect": true, "rationale": "The text clearly states that 'Criminal cases involve someone accused of breaking a law. The government (represented by a prosecutor) brings charges... If found guilty, the defendant may be fined or sent to jail.' For civil cases, it states, 'Civil cases involve disputes between people or organizations... No one goes to jail in a civil case.'"}, {"text": "Civil cases require a jury of twelve people, while criminal cases are always decided by a judge.", "isCorrect": false, "rationale": "The text mentions a jury of twelve people for criminal trials, and juries can also be used in civil cases. Criminal cases are not always decided by a judge; juries often decide the verdict."}, {"text": "The plaintiff brings charges in a criminal case, and the prosecutor brings charges in a civil case.", "isCorrect": false, "rationale": "The prosecutor brings charges in a criminal case (representing the government), and the plaintiff brings the case in a civil case."}]}, {"question": "Beyond presiding over the court, what specific responsibility does the judge have regarding evidence in a trial?", "options": [{"text": "To present the evidence against the defendant.", "isCorrect": false, "rationale": "Presenting evidence is the role of the attorneys for both the prosecution/plaintiff and the defense."}, {"text": "To decide which evidence can be used.", "isCorrect": true, "rationale": "The text states the judge 'rules on what evidence can be used' in a trial, ensuring proper procedure and admissibility."}, {"text": "To gather evidence for the defense.", "isCorrect": false, "rationale": "Gathering evidence for the defense is the responsibility of the defense attorney."}, {"text": "To determine the facts of the case based on the evidence.", "isCorrect": false, "rationale": "Determining the facts and making a decision based on the evidence presented is the primary role of the jury, or the judge if there is no jury."}]}, {"question": "The principle 'innocent until proven guilty' fundamentally means that:", "options": [{"text": "The accused person must provide evidence to prove their innocence.", "isCorrect": false, "rationale": "The text explicitly states, 'The accused person does not have to prove they are innocent.'"}, {"text": "The government has the burden to prove guilt 'beyond a reasonable doubt.'", "isCorrect": true, "rationale": "The text explains this principle means 'The government must prove that someone broke the law' and 'The standard for conviction in a criminal case is “beyond a reasonable doubt”'."}, {"text": "All trials must have a jury to declare someone innocent.", "isCorrect": false, "rationale": "While juries often decide guilt or innocence, some cases are decided by a judge, and the principle applies regardless of who makes the final decision."}, {"text": "A person can only be accused of a crime if solid proof already exists.", "isCorrect": false, "rationale": "A person can be accused (charged) before solid proof is presented in court. The principle dictates that this proof must be established in court to secure a conviction."}]}, {"question": "If a society did not have a court system, which of the 'essential functions' described in the text would most likely be undermined, leading to widespread chaos?", "options": [{"text": "The ability of the government to collect taxes efficiently.", "isCorrect": false, "rationale": "While courts might indirectly support this, it's not one of the three essential functions directly mentioned in the 'Purpose of Courts' section."}, {"text": "The fair resolution of disputes without individuals resorting to violence or vigilantism.", "isCorrect": true, "rationale": "The text states courts 'resolve disputes fairly without requiring people to fight or take the law into their own hands.' Without courts, people would likely resort to these methods, leading to chaos."}, {"text": "The quick distribution of public services like education and infrastructure.", "isCorrect": false, "rationale": "These are government functions, but not direct essential functions of courts as outlined in the text."}, {"text": "The development of new laws by legislative bodies.", "isCorrect": false, "rationale": "Law development is the role of the legislative branch, not a primary function of the courts, although courts interpret laws."}]}, {"question": "If a defendant believes their rights were violated during a trial in a State District Court, what is the most appropriate next step based on the court levels described?", "options": [{"text": "Appeal directly to the U.S. Supreme Court.", "isCorrect": false, "rationale": "The U.S. Supreme Court is the highest court and typically hears cases after they have exhausted state-level appeals and involve federal or constitutional law."}, {"text": "Ask a State Court of Appeals to review the decision.", "isCorrect": true, "rationale": "The text states, 'If someone believes a lower court made a mistake, they can appeal — ask a higher court to review the decision.' The State Courts of Appeals review whether lower courts (like State District Courts) followed the law correctly."}, {"text": "File a new case in a Local/County court.", "isCorrect": false, "rationale": "This would not be an appeal and would likely be a lower-level court not suitable for reviewing a State District Court decision."}, {"text": "Request a jury retrial in the same State District Court.", "isCorrect": false, "rationale": "An appeal involves asking a *higher* court to review the decision, not retrying the case in the same court after a verdict."}]}, {"question": "Sarah's small business is suing a supplier for failing to deliver goods as per their contract, causing Sarah to lose money. Which type of case is this, and what is Sarah's role?", "options": [{"text": "Criminal case; Sarah is the defendant.", "isCorrect": false, "rationale": "This is a dispute over a contract and money, not someone accused of breaking a criminal law, so it's not a criminal case. Sarah initiated the suit, so she's not the defendant."}, {"text": "Civil case; Sarah is the defendant.", "isCorrect": false, "rationale": "This is a civil case, but Sarah is the one bringing the case, making her the plaintiff, not the defendant."}, {"text": "Civil case; Sarah is the plaintiff.", "isCorrect": true, "rationale": "The text states, 'Civil cases involve disputes between people or organizations — usually over money, property, or rights.' It also specifies, 'The person who brings the case is called the plaintiff.' Sarah is bringing the case over a contract dispute and money."}, {"text": "Criminal case; Sarah is the prosecutor.", "isCorrect": false, "rationale": "This is not a criminal case, and the prosecutor represents the government in criminal cases, not a private business owner."}]}, {"question": "A local news report states, 'The suspect was arrested today, but the police still need to gather enough evidence to prove guilt in court, as the law presumes innocence.' This statement best illustrates which principle?", "options": [{"text": "The purpose of courts to punish wrongdoing predictably.", "isCorrect": false, "rationale": "While related to courts, the statement's focus is on the burden of proof and presumption of innocence, not directly on the predictability of punishment."}, {"text": "The judge's role in ruling on evidence.", "isCorrect": false, "rationale": "The statement describes the general legal standard, not the specific role of the judge in evidence admissibility."}, {"text": "The government's burden to prove guilt 'beyond a reasonable doubt.'", "isCorrect": true, "rationale": "The statement directly reflects the principle of 'innocent until proven guilty,' which means 'The government must prove that someone broke the law' and the standard is 'beyond a reasonable doubt.'"}, {"text": "The importance of a unanimous jury verdict.", "isCorrect": false, "rationale": "This is a specific requirement for conviction in some criminal trials but is a consequence of the 'innocent until proven guilty' principle, not the principle itself."}]}, {"question": "The text emphasizes that courts resolve disputes 'without requiring people to fight or take the law into their own hands.' This highlights which essential function of courts?", "options": [{"text": "To ensure government accountability.", "isCorrect": false, "rationale": "While courts protect rights and hold government accountable, the phrase 'without requiring people to fight' points to a different specific function."}, {"text": "To protect individual rights.", "isCorrect": false, "rationale": "Protecting rights is an essential function, but the quoted phrase specifically addresses preventing self-help justice."}, {"text": "To maintain social order and peaceful conflict resolution.", "isCorrect": true, "rationale": "This function directly corresponds to 'resolve disputes fairly without requiring people to fight or take the law into their own hands,' ensuring stability and order in society."}, {"text": "To provide employment for judges and attorneys.", "isCorrect": false, "rationale": "This is a consequence of having a court system, not an essential societal function or purpose of the courts."}]}, {"question": "In a criminal trial, what is a specific requirement for a jury of twelve people to convict a defendant?", "options": [{"text": "A simple majority vote is sufficient for a conviction.", "isCorrect": false, "rationale": "The text explicitly states that for criminal trials, a jury 'must agree — unanimously — that the defendant is guilty'."}, {"text": "All twelve jurors must unanimously agree on guilt.", "isCorrect": true, "rationale": "The text clearly states, 'In criminal trials, a jury of twelve people must agree — unanimously — that the defendant is guilty before that person can be convicted.'"}, {"text": "The judge decides the verdict if the jury cannot agree.", "isCorrect": false, "rationale": "If a jury cannot agree unanimously, it typically results in a hung jury, not a decision by the judge."}, {"text": "Only the foreman of the jury needs to agree on guilt.", "isCorrect": false, "rationale": "The foreman is a leader but does not hold sole decision-making power; all jurors must agree unanimously."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
