<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following scenarios best exemplifies a dictatorship according to the provided text?", "options": [{"text": "A country where citizens elect a president every four years, and the president then appoints their cabinet.", "isCorrect": false, "rationale": "This describes a democratic or republican system where power is derived from the consent of the governed through elections, which is the opposite of a dictatorship."}, {"text": "A military general seizes control of the government after a sudden overthrow, cancels all upcoming elections, and rules by decree, silencing opposition media.", "isCorrect": true, "rationale": "This scenario aligns perfectly with the definition and characteristics of a dictatorship: one person seizing complete power, usually by force (military general after a coup), without consent, controlling elections (cancelling them), and suppressing dissent (silencing opposition media)."}, {"text": "A state where laws are directly based on the sacred texts of the predominant religion, and religious scholars serve as key political advisors.", "isCorrect": false, "rationale": "This describes a theocracy, where religious leaders and divine commands form the basis of law and governance, not a dictatorship where a single individual seizes secular power."}, {"text": "A society where there are no formal laws, police, or recognized leaders, leading to various groups fending for themselves.", "isCorrect": false, "rationale": "This describes anarchy, the absence of government and order, rather than a dictatorship which is a specific form of centralized, albeit oppressive, government."}]}, {"question": "In a theocracy, what is the primary source of legal authority?", "options": [{"text": "A constitution drafted and approved by elected representatives.", "isCorrect": false, "rationale": "A constitution created by elected representatives is characteristic of a republic or democracy, not a theocracy where divine law is paramount."}, {"text": "The personal will and decrees of a single, all-powerful leader.", "isCorrect": false, "rationale": "This describes a dictatorship or tyranny, where a single leader's will is law, often for personal gain, rather than laws derived from religious texts."}, {"text": "Religious texts and divine commands interpreted by religious leaders.", "isCorrect": true, "rationale": "The text explicitly states that in a theocracy, 'law comes from religious texts and divine command rather than from elected officials' and that 'religious leaders rule.'"}, {"text": "International treaties and agreements signed with neighboring countries.", "isCorrect": false, "rationale": "While international law can influence any government, it is not the primary source of domestic legal authority in a theocracy; religious law is."}]}, {"question": "According to the text, what is a common characteristic of a society experiencing anarchy?", "options": [{"text": "A strong, centralized military force maintaining order.", "isCorrect": false, "rationale": "Anarchy is the 'absence of government,' meaning no recognized authority, including a centralized military force for order. A strong military would likely establish a new government."}, {"text": "A stable system of elected local councils managing community affairs.", "isCorrect": false, "rationale": "Elected local councils imply a form of government and order, which is directly contrary to the definition of anarchy as the absence of government."}, {"text": "The absence of laws, recognized authority, and overall order.", "isCorrect": true, "rationale": "The text defines anarchy as 'The absence of government. No laws, no authority, no order.' This option accurately reflects that definition."}, {"text": "Universal consent among citizens regarding the distribution of power.", "isCorrect": false, "rationale": "Universal consent for power distribution would indicate a highly organized, consensual form of government, not anarchy, which is characterized by the lack of any organized authority."}]}, {"question": "Aristotle's term 'tyranny' is applied to which form of government discussed in the section, and for what reason?", "options": [{"text": "Theocracy, because religious leaders often rule for personal spiritual gain.", "isCorrect": false, "rationale": "Aristotle's definition of tyranny (one person ruling for personal gain) is specifically linked to dictatorship in the text, not theocracy, which is defined by rule based on religious law."}, {"text": "Anarchy, because the absence of government invariably leads to chaos and self-interest.", "isCorrect": false, "rationale": "Anarchy is the absence of government, while tyranny is a specific, corrupt form of government. Aristotle applied tyranny to a corrupt form of single-person rule, not the complete lack of it."}, {"text": "Dictatorship, because the ruler governs for personal gain rather than the common good.", "isCorrect": true, "rationale": "The text explicitly states: 'Note: Aristotle called this form of government tyranny — one person ruling for personal gain rather than the common good,' directly referring to dictatorship."}, {"text": "A coup, because it involves a sudden seizure of power by a self-interested group.", "isCorrect": false, "rationale": "A coup is the *act* of seizing power, which can lead to a dictatorship (tyranny), but it is not the form of government itself that Aristotle labeled tyranny. Tyranny describes the nature of the rule that follows."}]}, {"question": "Why is propaganda often a crucial tool for a dictator to maintain power?", "options": [{"text": "It encourages independent thought and open public debate, strengthening civic engagement.", "isCorrect": false, "rationale": "Propaganda is 'information designed to control what people think' and is used to suppress independent thought, not encourage it, as dictators rely on controlling public opinion."}, {"text": "It ensures transparent communication between the government and its citizens regarding policy decisions.", "isCorrect": false, "rationale": "Propaganda is designed to manipulate, not to be transparent. Dictatorships often lack transparency and use propaganda to obscure facts rather than openly communicate."}, {"text": "It helps to control what people think and fosters fear, preventing dissent against the government.", "isCorrect": true, "rationale": "The text states, 'Dictators often use propaganda (information designed to control what people think) and fear to stay in power.' This directly supports the idea that propaganda controls thought and prevents dissent."}, {"text": "It promotes a diverse range of political ideologies, allowing citizens to choose their preferred system.", "isCorrect": false, "rationale": "Dictatorships suppress diverse ideologies and independent thought to maintain a single narrative and control, precisely the opposite of promoting choice."}]}, {"question": "Based on the text, what is the most likely outcome for a society that experiences a prolonged period of anarchy?", "options": [{"text": "The establishment of a stable, long-term direct democracy.", "isCorrect": false, "rationale": "Anarchy is unstable and typically leads to the strong taking over by force, not the spontaneous emergence of a stable democracy, which requires order and consensus."}, {"text": "The weakest members of society gaining significant political power.", "isCorrect": false, "rationale": "The text states, 'without it [government], the weakest people suffer most.' In anarchy, the strongest tend to take over, not the weakest gaining power."}, {"text": "The eventual emergence of a new form of government, likely a dictatorship, as a stronger group takes control.", "isCorrect": true, "rationale": "The text explains, 'Without any government, the strongest person or group tends to take over by force, which usually leads very quickly to a new government (usually a dictatorship).' This makes it the most likely outcome."}, {"text": "A complete and permanent cessation of all forms of political organization.", "isCorrect": false, "rationale": "The text notes that anarchy 'almost never lasts long' and is 'more of a brief in-between state than a stable form of government,' implying it's not a permanent cessation of organization."}]}, {"question": "The text mentions 'ancient Israel during the period of the judges was a kind of theocracy.' This example illustrates which core characteristic of a theocratic government?", "options": [{"text": "The reliance on a hereditary monarchy for leadership.", "isCorrect": false, "rationale": "Ancient Israel during the judges was not a hereditary monarchy; the judges were 'raised up by divine calling.' Hereditary monarchy is a different form of government."}, {"text": "The separation of religious doctrine from civil law.", "isCorrect": false, "rationale": "The text explicitly states, 'In a strict theocracy, there is no separation between religious law and civil law. The two are the same thing.' The ancient Israel example reinforces this unity, not separation."}, {"text": "Leaders being chosen through popular vote by the citizenry.", "isCorrect": false, "rationale": "The text states leaders were 'raised up by divine calling,' which is not a popular vote but a spiritual appointment, typical of a theocracy."}, {"text": "The source of law being divine command rather than human legislation.", "isCorrect": true, "rationale": "The text specifically notes, 'The law came from God, and leaders were raised up by divine calling,' which is the essence of a theocracy where divine command is the source of law."}]}, {"question": "What is the primary distinction between a government established through 'the consent of the people' and a 'dictatorship'?", "options": [{"text": "Governments with consent are always led by multiple individuals, while dictatorships are always single-person rule.", "isCorrect": false, "rationale": "While dictatorships are single-person rule, governments with consent can also have a single leader (e.g., a president). The distinction lies in the source of power, not solely the number of rulers."}, {"text": "Governments with consent prioritize economic growth, while dictatorships focus on social stability.", "isCorrect": false, "rationale": "The text does not discuss economic or social priorities as the primary distinction. The core difference is how power is obtained and maintained."}, {"text": "Governments with consent derive their authority from citizen choice, whereas dictatorships seize power by force or intimidation.", "isCorrect": true, "rationale": "The definition of dictatorship states 'one person seizes and holds complete power, usually by force, without the consent of the people,' directly contrasting with governments founded on consent."}, {"text": "Governments with consent have strong military forces, while dictatorships rely on civilian militias.", "isCorrect": false, "rationale": "Military strength or type of militia is not the defining difference. Dictatorships often rely heavily on military force to maintain power."}]}, {"question": "Polybius's solution to the cycle of governments (anacyclosis) was to:", "options": [{"text": "Repeatedly overthrow corrupt governments to restart the cycle from monarchy.", "isCorrect": false, "rationale": "Polybius recognized the cycle but sought a way to break or stabilize it, not merely restart it through repeated overthrow."}, {"text": "Establish a strong monarchy that could resist all challenges indefinitely.", "isCorrect": false, "rationale": "The cycle shows monarchy inevitably degenerating into tyranny, so a strong monarchy alone would not be a permanent solution for Polybius."}, {"text": "Mix all three good forms of government (monarchy, aristocracy, democracy) together so each limits the others.", "isCorrect": true, "rationale": "The 'Memory Work' section explicitly states: 'Polybius's solution: mix all three good forms together so that each limits the others.'"}, {"text": "Implement a pure form of democracy to prevent the rise of mob rule.", "isCorrect": false, "rationale": "Polybius's cycle shows democracy eventually leading to mob rule, so pure democracy would not be his solution to break the cycle."}]}, {"question": "A sudden seizure of power, typically by a military leader or small group, that overthrows the existing government is defined as a:", "options": [{"text": "Theocracy", "isCorrect": false, "rationale": "A theocracy is rule by religious leaders or divine law, not the act of seizing power by a military or small group."}, {"text": "Referendum", "isCorrect": false, "rationale": "A referendum is a direct vote by the electorate on a particular proposal, not a seizure of power."}, {"text": "Coup", "isCorrect": true, "rationale": "The text provides the definition: 'coup (KOO) — A sudden seizure of power, usually by a military leader or small group who overthrows the existing government.'"}, {"text": "Election", "isCorrect": false, "rationale": "An election is a formal and organized choice by vote of a person for a political office, directly opposite to a sudden, often violent, seizure of power."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
