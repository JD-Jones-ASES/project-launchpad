<body>

        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, the overall design of the Texas government primarily mirrors which other governmental structure?", "options": [{"text": "A parliamentary system where the executive is chosen by the legislature.", "isCorrect": false, "rationale": "The text states Texas uses the 'exact same design' as the federal government, which is not a parliamentary system."}, {"text": "The federal government, with three branches having separate powers and checks on each other.", "isCorrect": true, "rationale": "The text explicitly states, 'Remember the three branches of the federal government? Texas uses the exact same design — three branches with separate powers and checks on each other.'"}, {"text": "A unitary system where all power is centralized in the state capital.", "isCorrect": false, "rationale": "The text describes distinct branches with separate powers, which contradicts a unitary system."}, {"text": "A confederation where local governments hold the majority of the power.", "isCorrect": false, "rationale": "The text focuses on the state government's structure, not a confederation model."}]}, {"question": "Which of the following responsibilities is *not* listed as a power of the Texas Governor in the provided text?", "options": [{"text": "Signing bills into law or vetoing them.", "isCorrect": false, "rationale": "The text lists 'Signing bills into law — or vetoing them' as a governor's power."}, {"text": "Presiding over the Texas Senate and controlling which bills get debated.", "isCorrect": true, "rationale": "This power is explicitly attributed to the Lieutenant Governor, not the Governor, with the text highlighting its unusual strength."}, {"text": "Appointing judges, agency heads, and board members.", "isCorrect": false, "rationale": "The text lists 'Appointing judges, agency heads, and board members' as a governor's power."}, {"text": "Commanding the Texas National Guard.", "isCorrect": false, "rationale": "The text lists 'Commanding the Texas National Guard' as a governor's power."}]}, {"question": "The text highlights a significant difference in power between the Texas Lieutenant Governor and the U.S. Vice President. What is this key distinction?", "options": [{"text": "The Texas Lieutenant Governor manages the state's budget, a role not held by the U.S. Vice President.", "isCorrect": false, "rationale": "The Comptroller manages the state's money in Texas, not the Lieutenant Governor. The Lieutenant Governor's power lies elsewhere."}, {"text": "The Texas Lieutenant Governor's primary duty is to represent Texas to other states and the federal government, unlike the U.S. Vice President.", "isCorrect": false, "rationale": "Representing Texas to other states and the federal government is a power of the Governor."}, {"text": "The Texas Lieutenant Governor presides over the Senate and controls which bills get debated, a level of legislative influence rarely exercised by the U.S. Vice President.", "isCorrect": true, "rationale": "The text states, 'Unlike the U.S. Vice President, who rarely uses Senate powers, the Texas Lieutenant Governor presides over the Senate and controls which bills get debated. Many experts call the Lieutenant Governor the most powerful single official in Texas state government.'"}, {"text": "The Texas Lieutenant Governor serves as the state's top lawyer, whereas the U.S. Vice President has no legal responsibilities.", "isCorrect": false, "rationale": "The Attorney General is the state's top lawyer, not the Lieutenant Governor."}]}, {"question": "The Texas Legislature operates on a 'biennial session.' What does this term mean in practice for Texas lawmakers?", "options": [{"text": "They meet annually for a continuous period of 140 days.", "isCorrect": false, "rationale": "Biennial means 'every two years,' not annually."}, {"text": "They meet only once every four years to propose amendments to the Texas Constitution.", "isCorrect": false, "rationale": "They meet every two years, and their duties include more than just proposing amendments."}, {"text": "They meet every two years, specifically in odd-numbered years, for approximately 140 days.", "isCorrect": true, "rationale": "The text states, 'the Texas Legislature meets in a biennial session — only once every two years — for about 140 days. In odd-numbered years..., lawmakers travel to Austin...'"}, {"text": "They meet only when the Governor calls a special session due to urgent issues.", "isCorrect": false, "rationale": "While the Governor can call special sessions, the biennial session is a regularly scheduled meeting, not dependent solely on the Governor's call."}]}, {"question": "A business is suing another company over a breach of contract, and separately, a person is being tried for aggravated assault. To which top Texas courts would these cases primarily be directed, according to the text?", "options": [{"text": "Both cases would be heard by the Texas Court of Criminal Appeals.", "isCorrect": false, "rationale": "The Texas Court of Criminal Appeals only handles criminal cases, not civil disputes."}, {"text": "The contract dispute would go to the Texas Court of Criminal Appeals, and the assault case to the Texas Supreme Court.", "isCorrect": false, "rationale": "This option reverses the correct roles of the two top courts."}, {"text": "The contract dispute would go to the Texas Supreme Court, and the assault case to the Texas Court of Criminal Appeals.", "isCorrect": true, "rationale": "The text states the 'Texas Supreme Court — nine justices; handles civil cases' and the 'Texas Court of Criminal Appeals — nine judges; handles criminal cases'."}, {"text": "Both cases would initially go to the Courts of Appeals, as the top courts only handle constitutional interpretations.", "isCorrect": false, "rationale": "The text clearly states the two top courts handle civil and criminal cases respectively, and are not solely for constitutional interpretation at the initial appellate level for these types of cases."}]}, {"question": "Which of the following accurately describes a role or responsibility of the Texas Legislature, as detailed in the text?", "options": [{"text": "Appointing the Attorney General and Comptroller.", "isCorrect": false, "rationale": "The text states that Texas's top executive officials, including the Attorney General and Comptroller, are elected directly by voters, not appointed by the Legislature."}, {"text": "Interpreting state laws and settling legal disputes.", "isCorrect": false, "rationale": "Interpreting laws and settling disputes is the primary role of the Judicial Branch, the court system."}, {"text": "Approving the state budget and overriding the governor's veto with a 2/3 vote.", "isCorrect": true, "rationale": "The text lists 'Approving the state budget (how Texas spends its money)' and 'Overriding the governor's veto (with a 2/3 vote)' as jobs of the Texas Legislature."}, {"text": "Commanding the Texas National Guard during emergencies.", "isCorrect": false, "rationale": "Commanding the Texas National Guard is a power of the Governor."}]}, {"question": "A key difference highlighted in the text between the Texas executive branch and the federal executive branch concerns how many top officials achieve their positions. What is this difference?", "options": [{"text": "In Texas, the Governor appoints all top executive officials, whereas the U.S. President has no appointment powers.", "isCorrect": false, "rationale": "The U.S. President appoints a Cabinet, and in Texas, many top officials are elected, not all appointed by the Governor."}, {"text": "In Texas, most top executive officials are elected directly by voters, unlike the federal system where the President appoints a Cabinet.", "isCorrect": true, "rationale": "The text states, 'Unlike the federal government, where the President appoints a Cabinet, most of Texas's top executive officials are elected directly by voters.'"}, {"text": "Texas's executive branch has no Lieutenant Governor, while the federal government has a Vice President.", "isCorrect": false, "rationale": "Texas explicitly has a Lieutenant Governor, as defined and discussed in the text."}, {"text": "Federal executive officials serve fixed four-year terms, while Texas executive officials serve indefinite terms.", "isCorrect": false, "rationale": "The text mentions the Governor serves four-year terms, implying fixed terms, and does not suggest indefinite terms for other officials."}]}, {"question": "Sam Houston was forced from office in 1861 because he refused to take an oath of loyalty to the Confederacy. According to the text, what did his actions symbolize?", "options": [{"text": "His support for states' rights and the principle of secession.", "isCorrect": false, "rationale": "His refusal to swear loyalty to the Confederacy directly opposed states' rights and secession in that context."}, {"text": "His desire to maintain neutrality during the American Civil War.", "isCorrect": false, "rationale": "Refusing an oath of loyalty is an active stance, not neutrality."}, {"text": "His unwavering commitment to courage and principle, even when it meant personal cost.", "isCorrect": true, "rationale": "The text concludes his biography by stating, 'He remains a symbol of courage and principle.'"}, {"text": "His belief in a strong, centralized federal government over state autonomy.", "isCorrect": false, "rationale": "While his actions supported the Union, the text frames it as a matter of courage and principle, not specifically a political ideology."}]}, {"question": "According to the 'teachernote' section, what is a possible reason why Texas uses biennial legislative sessions instead of meeting every year?", "options": [{"text": "To give legislators more time to connect with their constituents back home.", "isCorrect": false, "rationale": "While this might be a secondary effect, it's not the reason suggested in the teacher note."}, {"text": "To allow for more extensive campaigning during election years, ensuring higher voter turnout.", "isCorrect": false, "rationale": "This is not the reason provided in the teacher note."}, {"text": "To reduce government spending by minimizing the operational costs of the legislative body.", "isCorrect": false, "rationale": "While cost reduction might be a factor, it is not the reason specifically highlighted in the teacher note."}, {"text": "To reflect a distrust of government and promote the idea of legislators as citizen-lawmakers rather than full-time politicians.", "isCorrect": true, "rationale": "The 'teachernote' explicitly suggests, 'Possible answer: distrust of government; keep legislators as citizen-lawmakers, not full-time politicians.'"}]}, {"question": "A significant difference between the Texas judicial system and the federal judicial system, as stated in the text, is:", "options": [{"text": "Texas judges serve lifetime appointments, while federal judges serve fixed terms.", "isCorrect": false, "rationale": "This statement is incorrect; federal judges generally serve lifetime appointments, and Texas judges are elected for terms."}, {"text": "Texas judges are elected by voters, unlike federal judges who are appointed by the President.", "isCorrect": true, "rationale": "The text states, 'Texas judges are elected by voters — another difference from federal judges, who are appointed by the President.'"}, {"text": "The Texas court system has only one top court, whereas the federal system has two.", "isCorrect": false, "rationale": "The text explicitly states Texas has 'two top courts instead of one' (Texas Supreme Court and Texas Court of Criminal Appeals)."}, {"text": "Texas courts exclusively handle civil cases, and federal courts handle criminal cases.", "isCorrect": false, "rationale": "Texas courts handle both civil and criminal cases, differentiated by their two top courts. Federal courts also handle both."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
