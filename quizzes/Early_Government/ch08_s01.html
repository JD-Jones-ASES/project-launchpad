<script>
var QUESTIONS = [{"question": "Which of the following best describes a 'presidential system' of government?", "options": [{"text": "Voters elect a legislature, which then chooses the head of government.", "isCorrect": false, "rationale": "This describes a parliamentary system, where the legislature selects the head of government, not a presidential system."}, {"text": "The head of state is a monarch with largely ceremonial powers.", "isCorrect": false, "rationale": "This describes a constitutional monarchy, like the United Kingdom, which can operate with either a presidential or parliamentary system, but isn't the defining characteristic of a presidential system itself."}, {"text": "Voters directly elect the president as the head of the executive branch, separate from the legislature.", "isCorrect": true, "rationale": "The text defines a presidential system as 'a form of government where voters directly elect a separate president as head of the executive branch.'"}, {"text": "The prime minister serves a fixed term and cannot be removed by the legislature.", "isCorrect": false, "rationale": "In a presidential system, it is the President who serves a fixed term, not a Prime Minister. Prime Ministers are typically found in parliamentary systems and do not always have fixed terms."}]}, {"question": "In the United Kingdom's parliamentary monarchy, what is the primary distinction between the monarch and the Prime Minister?", "options": [{"text": "The monarch handles foreign policy, while the Prime Minister manages domestic policy.", "isCorrect": false, "rationale": "This division of policy responsibilities (foreign by President, domestic by Prime Minister) is characteristic of France's hybrid system, not the UK."}, {"text": "The Prime Minister is the head of state with ceremonial duties, while the monarch is the head of government.", "isCorrect": false, "rationale": "This reverses the roles. In the UK, the monarch is the head of state and the Prime Minister is the head of government."}, {"text": "The monarch is the head of state and a symbol of national unity, while the Prime Minister is the head of government with real governing power.", "isCorrect": true, "rationale": "The text states the monarch 'is the head of state — a symbol of national unity — but has little real governing power,' and 'The Prime Minister is the head of government.'"}, {"text": "Both the monarch and the Prime Minister are directly elected by voters for fixed terms.", "isCorrect": false, "rationale": "Neither the monarch nor the Prime Minister are directly elected by voters for fixed terms. The monarch's role is hereditary, and the Prime Minister is chosen by Parliament."}]}, {"question": "A significant difference in how the head of government is chosen between the United States and the United Kingdom is that:", "options": [{"text": "In the U.S., voters elect legislative members who then choose the President, whereas in the U.K., voters directly elect the Prime Minister.", "isCorrect": false, "rationale": "This statement is incorrect for both countries. In the U.S., voters directly elect the President, and in the U.K., voters elect members of Parliament, who then choose the Prime Minister."}, {"text": "In the U.S., the President is chosen by an electoral college, while in the U.K., the Prime Minister is appointed by the monarch.", "isCorrect": false, "rationale": "While the electoral college is part of the U.S. presidential election, the U.K.'s Prime Minister is chosen by Parliament (specifically, the leader of the party with the most seats in the House of Commons), not directly appointed by the monarch with real power."}, {"text": "In the U.S., voters directly elect the President separately from Congress, while in the U.K., voters elect members of Parliament who then choose the Prime Minister.", "isCorrect": true, "rationale": "The text clearly states that in the U.S., 'voters elect the President separately from Congress,' and in the U.K., 'Voters do not elect the Prime Minister directly — they elect members of Parliament, and those members choose the Prime Minister.'"}, {"text": "In both countries, the head of government is chosen through a nationwide popular vote for a fixed term.", "isCorrect": false, "rationale": "This is incorrect for the U.K., where the Prime Minister is not directly elected by popular vote and does not serve a fixed term. The U.S. President is elected through a combination of popular and electoral college votes for a fixed term."}]}, {"question": "France's 'Presidential-Parliamentary Mix' is characterized by which of the following?", "options": [{"text": "A ceremonial President and a Prime Minister who holds all executive power, both chosen by the legislature.", "isCorrect": false, "rationale": "This describes India's or the UK's parliamentary system with a ceremonial head of state, not France's hybrid system where the President has significant executive power."}, {"text": "A President directly elected by voters who handles foreign policy, and a Prime Minister appointed by the President who manages domestic policy.", "isCorrect": true, "rationale": "The text states that in France, 'French voters directly elect a President (for a five-year term), who appoints a Prime Minister from the legislature. The President handles foreign policy and national security, while the Prime Minister manages domestic policy.'"}, {"text": "A monarch as head of state and a Prime Minister as head of government, both answerable to a bicameral parliament.", "isCorrect": false, "rationale": "This describes the United Kingdom's system, which is a constitutional monarchy, not France's republic."}, {"text": "A President who can dissolve the legislature and remove the Prime Minister at will, without democratic checks.", "isCorrect": false, "rationale": "While the French President has significant powers, the text implies checks by stating 'Both answer to the legislature (the National Assembly) to some degree,' making the 'without democratic checks' part incorrect."}]}, {"question": "Which of the following statements accurately describes the governmental structure of India?", "options": [{"text": "India is a presidential system with a strong, directly elected President and a unitary government.", "isCorrect": false, "rationale": "India is a parliamentary system with a ceremonial President and a federal government, not a strong presidential system or a unitary government."}, {"text": "India is a parliamentary system with a ceremonial President, a Prime Minister as head of government, and a federal division of power.", "isCorrect": true, "rationale": "The text explicitly states: 'India uses a parliamentary system... India also has a President, but the role is mostly ceremonial... India's government is also federal.'"}, {"text": "India is a constitutional monarchy where the monarch shares power equally with the Prime Minister, both chosen by Parliament.", "isCorrect": false, "rationale": "India is a republic, not a monarchy, and its President is ceremonial, not a power-sharing monarch."}, {"text": "India is a hybrid system where the President handles domestic policy and the Prime Minister manages foreign affairs, both directly elected.", "isCorrect": false, "rationale": "This describes the French system, not India's. In India, the President is ceremonial and the Prime Minister manages government."}]}, {"question": "How does the method for removing a head of government in the United States differ fundamentally from that in the United Kingdom?", "options": [{"text": "The U.S. President can be removed by a simple legislative vote, while the U.K. Prime Minister serves a fixed term regardless of Parliament's confidence.", "isCorrect": false, "rationale": "This is incorrect for both. The U.S. President's removal is a difficult impeachment process, and the U.K. Prime Minister does not serve a fixed term and can be removed by a vote of no confidence."}, {"text": "The U.S. Congress can only remove the President through impeachment and trial, whereas the U.K. Parliament can vote to remove the Prime Minister if it loses confidence.", "isCorrect": true, "rationale": "The text explains for the U.S. that 'Congress cannot remove the President except through the difficult process of impeachment and trial.' For the U.K., it states, 'if Parliament loses confidence in the Prime Minister, it can vote to remove them from power. There is no fixed four-year term.'"}, {"text": "In the U.S., the President can be removed by a popular vote referendum, while in the U.K., the monarch can dismiss the Prime Minister.", "isCorrect": false, "rationale": "Neither of these statements is accurate according to the provided text. The U.S. President is removed by impeachment, and the U.K. Prime Minister by a vote of no confidence from Parliament, not directly by the monarch."}, {"text": "Both systems allow for removal by the legislature, but the U.S. requires a supermajority, while the U.K. requires a simple majority.", "isCorrect": false, "rationale": "While both involve the legislature, the *processes* are fundamentally different (impeachment vs. vote of no confidence), and the text emphasizes the nature of these processes rather than just the majority required, making this an incomplete and potentially misleading comparison of the 'method' of removal."}]}, {"question": "Which of the following is a defining characteristic of a parliamentary system, as described in the text?", "options": [{"text": "Voters directly elect the head of government for a fixed term.", "isCorrect": false, "rationale": "Direct election of the head of government for a fixed term is a characteristic of a presidential system (like the U.S. President), not a parliamentary system."}, {"text": "The head of government is chosen by the legislature and the executive and legislative branches work closely together.", "isCorrect": true, "rationale": "The definition of a parliamentary system states it is 'a form of government where the legislature (parliament) chooses the head of government; the executive and legislative branches work together.'"}, {"text": "Power is divided strictly between a national government and several state governments.", "isCorrect": false, "rationale": "This describes a federal system, which can exist in either parliamentary (e.g., India) or presidential (e.g., U.S.) democracies, but is not the defining characteristic of a parliamentary system itself."}, {"text": "The head of state has significant real governing power, often sharing it with a Prime Minister.", "isCorrect": false, "rationale": "In many parliamentary systems (like the U.K. and India), the head of state (monarch or president) is largely ceremonial and holds little real governing power, with power concentrated in the head of government (Prime Minister)."}]}, {"question": "A country's 'constitution' plays what crucial role in its governmental structure?", "options": [{"text": "It outlines the process for electing the Prime Minister or President by popular vote.", "isCorrect": false, "rationale": "While constitutions often include election processes, this is only one aspect. The crucial role is broader than just election mechanics."}, {"text": "It serves as a symbolic document without direct legal authority over daily governance.", "isCorrect": false, "rationale": "This is incorrect. The text defines a constitution as 'the written plan of government that all other laws must follow,' indicating its direct legal authority and foundational role."}, {"text": "It is the written plan of government that all other laws must follow, establishing the framework for the nation's legal and political system.", "isCorrect": true, "rationale": "The text directly defines a constitution as 'the written plan of government that all other laws must follow,' highlighting its supreme legal authority and role in structuring governance."}, {"text": "It dictates the specific policies that the current administration must implement in foreign and domestic affairs.", "isCorrect": false, "rationale": "Constitutions establish the framework and limits of government power, but generally do not dictate specific, day-to-day policies, which are left to the legislative and executive branches within that framework."}]}, {"question": "Imagine a country where citizens vote for representatives in a national assembly. The leader of the party that wins the most seats in this assembly becomes the head of government, and this person can be removed by a vote of no confidence from the assembly. This system most closely resembles the democracy of:", "options": [{"text": "The United States", "isCorrect": false, "rationale": "The U.S. has a presidential system where citizens directly elect the President, and the President cannot be removed by a simple vote of no confidence from the legislature."}, {"text": "France", "isCorrect": false, "rationale": "France has a hybrid system with a directly elected President who shares executive power and distinct roles, not solely a head of government chosen by and removable by the legislature in this manner."}, {"text": "The United Kingdom", "isCorrect": true, "rationale": "This description perfectly matches the U.K.'s parliamentary system: 'Voters do not elect the Prime Minister directly — they elect members of Parliament, and those members choose the Prime Minister,' and 'if Parliament loses confidence in the Prime Minister, it can vote to remove them from power.'"}, {"text": "A direct democracy", "isCorrect": false, "rationale": "A direct democracy involves citizens voting directly on laws and decisions, rather than electing representatives who then choose a head of government."}]}, {"question": "Which of the following governmental aspects is shared by both India's and the United Kingdom's systems?", "options": [{"text": "Both have a monarch as the head of state.", "isCorrect": false, "rationale": "Only the United Kingdom has a monarch as its head of state; India has a ceremonial President."}, {"text": "Both operate under a presidential system with a directly elected executive.", "isCorrect": false, "rationale": "Both India and the United Kingdom operate under parliamentary systems, not presidential systems."}, {"text": "Both are federal systems, dividing power between national and state/regional governments.", "isCorrect": false, "rationale": "While India is explicitly stated as federal, the United Kingdom is a constitutional monarchy with a unitary government, even with devolved powers, it is not considered federal in the same way as India or the U.S."}, {"text": "Both utilize a parliamentary system where the head of government is chosen by the legislature, and have a largely ceremonial head of state.", "isCorrect": true, "rationale": "The text notes India's 'parliamentary system modeled on the British system' and that both countries have a Prime Minister as head of government. It also states India's President is 'mostly ceremonial, similar to Britain's monarch,' indicating a shared characteristic of a ceremonial head of state."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
