<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was the primary motivation behind the Founders' decision to establish a system of separation of powers?", "options": [{"text": "To create a more efficient government administration.", "isCorrect": false, "rationale": "While efficiency can be a goal, the text primarily emphasizes preventing concentrated power rather than merely streamlining administration."}, {"text": "To prevent any single person or group from accumulating unlimited power and thereby becoming tyrannical.", "isCorrect": true, "rationale": "The text explicitly states the Founders 'had just escaped a king' and were 'determined not to let that happen again,' highlighting the prevention of unlimited power and tyranny as the core motivation."}, {"text": "To allow for easier amendment of the Constitution.", "isCorrect": false, "rationale": "The process of amending the Constitution is separate from the establishment of the three branches and separation of powers."}, {"text": "To ensure all states had equal representation in government.", "isCorrect": false, "rationale": "Equal representation for states relates to the structure of Congress (e.g., the Senate), which is part of federalism and bicameralism, not the fundamental reason for separating powers among branches."}], "id": "q01"}, {"question": "Which of the following best describes the function of the judicial branch, based on its definition and role outlined in the text?", "options": [{"text": "Creating new statutes and bills for the nation.", "isCorrect": false, "rationale": "The creation of laws is the primary function of the Legislative Branch (Congress)."}, {"text": "Carrying out daily governmental operations and enforcing laws.", "isCorrect": false, "rationale": "This describes the primary function of the Executive Branch (the President)."}, {"text": "Interpreting existing laws and determining if they comply with the Constitution.", "isCorrect": true, "rationale": "The text defines 'judicial' as 'Having to do with courts, judges, and interpreting the law' and states the Judicial Branch 'interprets the laws and decides if they follow the Constitution.'"}, {"text": "Negotiating treaties with foreign powers.", "isCorrect": false, "rationale": "Negotiating treaties is a responsibility of the Executive Branch, often with legislative approval."}], "id": "q02"}, {"question": "If a new federal law is proposed to regulate carbon emissions, which branch of the U.S. government is primarily responsible for debating, modifying, and ultimately passing that law?", "options": [{"text": "The Executive Branch (the President)", "isCorrect": false, "rationale": "The Executive Branch enforces laws; it does not primarily make them, although the President can propose legislation."}, {"text": "The Legislative Branch (Congress)", "isCorrect": true, "rationale": "The text clearly states, 'The Legislative Branch (Congress) — makes the laws,' making it responsible for the legislative process of passing new laws."}, {"text": "The Judicial Branch (the courts)", "isCorrect": false, "rationale": "The Judicial Branch interprets laws; it does not debate or pass them."}, {"text": "The Department of Energy", "isCorrect": false, "rationale": "The Department of Energy is an executive agency and carries out policy; it does not have the constitutional authority to pass federal laws."}], "id": "q03"}, {"question": "The Founders' 'elegant solution' involved splitting power into three parts, making each strong enough to do its job but weak enough not to crush the others. What fundamental principle does this design achieve?", "options": [{"text": "To streamline government operations and decision-making.", "isCorrect": false, "rationale": "While a balanced government aims for effective governance, the primary 'elegant solution' isn't about streamlining, but about preventing the concentration of power, which can sometimes make decision-making more deliberate, not necessarily faster."}, {"text": "To ensure a balance of power, preventing any single branch from becoming too dominant or tyrannical.", "isCorrect": true, "rationale": "The text explains this mechanism as the essence of separation of powers: 'Make each part strong enough to do its job. But make each one weak enough that it cannot crush the others. This prevents tyranny by design.'"}, {"text": "To foster competition and rivalry between the branches.", "isCorrect": false, "rationale": "While a degree of tension exists, the goal is not to foster rivalry but to establish a system of checks and balances that ensures cooperation and prevents overreach, rather than continuous competition."}, {"text": "To centralize authority under a powerful federal government.", "isCorrect": false, "rationale": "This is contrary to the stated purpose. The separation of powers is designed to decentralize authority within the federal government, preventing a single, powerful entity."}], "id": "q04"}, {"question": "The text states, 'No branch can do another branch's job.' Which of the following actions would *most directly violate* this core principle of separation of powers?", "options": [{"text": "The President signing a bill into law that has been passed by both houses of Congress.", "isCorrect": false, "rationale": "This is a legitimate function of the Executive Branch in the law-making process, enforcing laws created by the Legislative Branch."}, {"text": "A Supreme Court ruling that a newly enacted federal law is unconstitutional.", "isCorrect": false, "rationale": "This is a key function of the Judicial Branch: interpreting laws and deciding their constitutionality, as explicitly stated in the text."}, {"text": "Congress establishing new federal agencies under the Executive Branch to implement a new policy.", "isCorrect": false, "rationale": "Congress has the power to create laws and establish the framework for executive agencies to carry them out, which aligns with its legislative function."}, {"text": "The President unilaterally declaring a new national income tax without any legislative approval from Congress.", "isCorrect": true, "rationale": "The text states, 'The President cannot make laws.' Creating a new tax is a legislative function, and for the President to do so without Congressional approval would be a direct violation of the Legislative Branch's exclusive power to make laws."}], "id": "q05"}, {"question": "The word 'judicial' comes from the Latin 'judex.' Based on its etymology as provided, what does 'judex' literally mean, highlighting the core function of the Judicial Branch?", "options": [{"text": "'One who proposes laws.'", "isCorrect": false, "rationale": "This relates more to 'latio' in 'legislative,' which means 'a bringing or proposing' of laws."}, {"text": "'One who carries out.'", "isCorrect": false, "rationale": "This relates to 'exsequi' in 'executive,' meaning 'to carry out' or 'to follow through.'"}, {"text": "'One who speaks the law.'", "isCorrect": true, "rationale": "The 'Did You Know' section explicitly states, 'judex ('judge,' literally 'one who speaks the law')' which directly connects to the judicial function of interpreting the law."}, {"text": "'One who forbids.'", "isCorrect": false, "rationale": "This is the meaning of 'veto,' which is a presidential power, not the root of 'judicial.'"}], "id": "q06"}, {"question": "If you wanted to find the constitutional framework detailing the powers and responsibilities of the President, which Article of the U.S. Constitution would you consult, according to the provided text?", "options": [{"text": "Article I", "isCorrect": false, "rationale": "Article I establishes Congress, the Legislative Branch."}, {"text": "Article II", "isCorrect": true, "rationale": "The text states, 'The Executive Branch (the President) — enforces the laws and runs the day-to-day government. Article II.'"}, {"text": "Article III", "isCorrect": false, "rationale": "Article III establishes the Judicial Branch (the courts)."}, {"text": "Article IV", "isCorrect": false, "rationale": "Article IV deals with the relationship between states and the federal government, not the specific powers of the President."}], "id": "q07"}, {"question": "A new federal environmental protection agency is created by Congress. Which branch of government is primarily responsible for *carrying out and enforcing* the laws implemented by this agency, and running its day-to-day operations?", "options": [{"text": "The Legislative Branch", "isCorrect": false, "rationale": "The Legislative Branch creates laws and agencies, but does not typically run their day-to-day operations or enforce the laws directly."}, {"text": "The Executive Branch", "isCorrect": true, "rationale": "The text states the Executive Branch 'enforces the laws and runs the day-to-day government,' which includes the operations of federal agencies."}, {"text": "The Judicial Branch", "isCorrect": false, "rationale": "The Judicial Branch interprets laws and resolves disputes, but does not manage executive agencies or enforce laws."}, {"text": "A specialized non-governmental organization", "isCorrect": false, "rationale": "While non-governmental organizations exist, the primary responsibility for carrying out and enforcing federal laws and running federal agencies rests with a branch of the government itself."}], "id": "q08"}, {"question": "The text states that separation of powers 'prevents tyranny by design.' Which of the following characteristics is most crucial for achieving this prevention?", "options": [{"text": "Their ability to collaborate on all policy decisions.", "isCorrect": false, "rationale": "While collaboration is important, the prevention of tyranny stems more from the *division* of power than from the *collaboration* itself, as collaboration without division could still lead to concentrated power."}, {"text": "The requirement for each branch to have a distinct and separate set of powers and responsibilities.", "isCorrect": true, "rationale": "The essence of separation of powers is to divide governmental authority so 'no single person or group holds all of the power,' ensuring that no one branch can become all-powerful and tyrannical."}, {"text": "The system of electing members to each branch by popular vote.", "isCorrect": false, "rationale": "The method of election is a democratic principle, but the *design* that prevents tyranny in 'separation of powers' specifically refers to the distinct roles and limitations of the branches, not their electoral process."}, {"text": "Their shared goal of promoting national unity.", "isCorrect": false, "rationale": "A shared goal, while desirable, does not inherently prevent tyranny. The structural division of power is the direct mechanism for this prevention."}], "id": "q09"}, {"question": "Which specific governmental body is identified in the text as constituting the Legislative Branch of the U.S. government?", "options": [{"text": "The Supreme Court", "isCorrect": false, "rationale": "The Supreme Court is part of the Judicial Branch."}, {"text": "The President's Cabinet", "isCorrect": false, "rationale": "The President's Cabinet consists of advisors to the President and is part of the Executive Branch."}, {"text": "Congress", "isCorrect": true, "rationale": "The text explicitly states, 'The Legislative Branch (Congress) — makes the laws.'"}, {"text": "The Department of Justice", "isCorrect": false, "rationale": "The Department of Justice is an executive department responsible for law enforcement, not the legislative body."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
