<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which of the following best defines 'government'?", "options": [{"text": "A group of powerful individuals who control a country's resources.", "isCorrect": false, "rationale": "This option is too narrow and incomplete. While individuals are involved, the definition emphasizes a 'system of people, laws, and offices' rather than just powerful individuals, and focuses on making and enforcing rules, not just resource control."}, {"text": "The system of people, laws, and offices that makes and enforces rules for a community or country.", "isCorrect": true, "rationale": "This option is the direct and complete definition of 'government' provided in the text, covering all key components: system, people, laws, offices, rule-making, rule-enforcement, and scope (community/country)."}, {"text": "An organization primarily responsible for providing public services like roads and schools.", "isCorrect": false, "rationale": "Providing public services is indeed a function of government, but it is only one of several and does not encompass the full definition, which also includes making and enforcing laws, and settling disagreements."}, {"text": "A voluntary association of citizens working together for mutual protection.", "isCorrect": false, "rationale": "While mutual protection is a reason people accept government, this definition misses the formal 'system of people, laws, and offices' that characterizes a government, implying a less structured arrangement."}]}, {"question": "Which of the following is NOT listed as a core function of government in the provided text?", "options": [{"text": "Making and enforcing laws.", "isCorrect": false, "rationale": "The text explicitly states that a government 'makes laws' and 'enforces those laws' as core functions."}, {"text": "Providing community services such as roads and schools.", "isCorrect": false, "rationale": "The text clearly lists 'provides services the whole community needs — roads, schools, public safety, courts' as a core function."}, {"text": "Promoting specific religious beliefs among its citizens.", "isCorrect": true, "rationale": "The provided text lists several core functions of government (making/enforcing laws, providing services, settling disagreements, protection from threats), but promoting specific religious beliefs is not among them."}, {"text": "Settling disagreements fairly between people.", "isCorrect": false, "rationale": "The text states that a government 'settles disagreements between people fairly' as one of its important functions."}]}, {"question": "In the analogy of a school without a principal, the chaos described (teachers unpaid, unsafe building, lunch program issues) primarily highlights the absence of what key governmental concept?", "options": [{"text": "Citizenship.", "isCorrect": false, "rationale": "Citizenship refers to the status of being a member of a community with rights and responsibilities. While important, the immediate cause of the described chaos is not the absence of citizens themselves, but the lack of someone in charge."}, {"text": "Justice.", "isCorrect": false, "rationale": "Justice is about treating people fairly. While the absence of a principal might lead to unfairness, the primary issue highlighted by the scenario is the lack of decision-making and enforcement power."}, {"text": "Authority.", "isCorrect": true, "rationale": "The text defines 'authority' as 'The right or power to make decisions and enforce rules.' The school analogy explicitly describes the absence of someone 'in charge of making sure,' 'makes the important decisions,' and 'makes sure the rules are followed,' directly pointing to a lack of authority."}, {"text": "The common good.", "isCorrect": false, "rationale": "The common good is the benefit or interests of all. While the school's common good is certainly suffering, the direct cause identified in the text for that suffering is the absence of someone with the power to act, which is authority."}]}, {"question": "According to John Locke, why do people primarily agree to form governments?", "options": [{"text": "To ensure everyone has equal wealth and resources.", "isCorrect": false, "rationale": "The text does not mention economic equality as Locke's primary reason for the formation of governments."}, {"text": "To protect their safety and freedom from the dangers of a lawless society.", "isCorrect": true, "rationale": "Locke's argument, as presented, is that 'life without government is dangerous and unfair,' and people form governments 'to protect their safety and their freedom' from such conditions."}, {"text": "To establish a powerful leader who can make all decisions for them.", "isCorrect": false, "rationale": "Locke's focus is on protection and order gained through government, not specifically on establishing a single, all-powerful leader, nor is that the primary reason given for accepting government."}, {"text": "To provide a platform for philosophical debates and intellectual growth.", "isCorrect": false, "rationale": "While these activities might occur in a society with government, they are not the fundamental reasons Locke gives for people agreeing to form governments."}]}, {"question": "John Locke argued that accepting government involves a trade-off. What is this trade-off?", "options": [{"text": "Giving up some personal property in exchange for public services.", "isCorrect": false, "rationale": "The text does not describe this specific trade-off as part of Locke's argument for accepting government. While taxes fund services, it's not the core 'freedom' trade-off Locke discussed here."}, {"text": "Giving up some freedom to do whatever one wants in exchange for safety and order.", "isCorrect": true, "rationale": "The text explicitly states Locke's idea: 'Giving up some freedom (the freedom to do whatever you want) is worth it to gain protection and order.'"}, {"text": "Giving up the right to vote in exchange for a stable economy.", "isCorrect": false, "rationale": "This specific trade-off is not mentioned in the text regarding Locke's philosophy on accepting government."}, {"text": "Giving up one's identity to become a citizen of a larger community.", "isCorrect": false, "rationale": "While joining a community involves certain changes, this is not the specific 'freedom' trade-off Locke highlights in the text."}]}, {"question": "The text states that 'A just government protects everyone equally under the law.' Based on this, which situation best exemplifies a government acting justly?", "options": [{"text": "A government that only provides public services to citizens who pay higher taxes.", "isCorrect": false, "rationale": "This scenario demonstrates unequal treatment based on economic status, which contradicts the definition of a just government that 'treats people fairly' and 'protects everyone equally under the law.'"}, {"text": "A government that punishes a wealthy individual more leniently than a poor individual for the same crime.", "isCorrect": false, "rationale": "This situation is an example of unequal application of the law and unfair treatment, directly opposite to the principle of justice outlined in the text."}, {"text": "A government that ensures all citizens, regardless of background, have access to legal representation.", "isCorrect": true, "rationale": "Ensuring equal access to legal representation for all citizens, irrespective of their background, directly aligns with the definition of a just government that 'protects everyone equally under the law' and 'treats people fairly.'"}, {"text": "A government that prioritizes the needs of the majority over the rights of minority groups.", "isCorrect": false, "rationale": "Prioritizing the majority at the expense of minority rights violates the principle that a just government 'protects everyone equally under the law,' as it implies some groups are not equally protected."}]}, {"question": "According to the text, what is a fundamental aspect of being a citizen?", "options": [{"text": "Solely enjoying the benefits and protections provided by the government.", "isCorrect": false, "rationale": "This option only covers rights and benefits. The text explicitly states that a citizen 'is both protected by and responsible to the government,' indicating that responsibilities are also fundamental."}, {"text": "Having the right to make all government decisions for the community.", "isCorrect": false, "rationale": "While citizens participate in governance, they typically do not have the power to make *all* government decisions. The text focuses on rights and responsibilities, not absolute decision-making power."}, {"text": "Being protected by the government while also having responsibilities to the community.", "isCorrect": true, "rationale": "The text directly defines a citizen as 'a member of a community who is both protected by and responsible to the government,' highlighting both rights (protection) and duties (responsibilities)."}, {"text": "Only being responsible for following laws, without any corresponding rights.", "isCorrect": false, "rationale": "This option ignores the crucial aspect of rights that citizens possess, which the text explicitly mentions ('Citizens have rights — things the government must protect for them')."}]}, {"question": "The text describes a classroom as having a form of government because the teacher makes and enforces rules. Applying this idea, what is the most critical difference between a family household and a formal government of a country?", "options": [{"text": "A family typically does not provide public services like roads.", "isCorrect": false, "rationale": "While true, the provision of public services is one function, not the most critical defining characteristic that differentiates a family from the formal 'system of people, laws, and offices' for a 'community or country.'"}, {"text": "A family's rules are not usually considered 'laws' enforced by a broad public system of justice.", "isCorrect": true, "rationale": "The definition of government in the text emphasizes 'laws' and 'offices' that enforce rules for a 'community or country.' Family rules are typically informal and enforced within the household, lacking the formal, systemic, and broad public scope of 'laws' and justice systems characteristic of a government."}, {"text": "A family does not face outside threats from other countries.", "isCorrect": false, "rationale": "Protection from outside threats is a function of national governments, but it doesn't represent the fundamental difference in the *structure* and *scope* of governance compared to a family, especially when considering smaller-scale governments like classrooms or cities."}, {"text": "A family often lacks the concept of 'authority' as defined in the text.", "isCorrect": false, "rationale": "Parents or guardians in a family certainly exercise authority. The key difference lies in the *scope*, *formalization*, and *institutional backing* of that authority compared to a government, rather than its complete absence."}]}, {"question": "A local government establishes a new park with playgrounds and picnic areas for residents, funded by public taxes. Which essential function of government does this action primarily demonstrate?", "options": [{"text": "Making and enforcing laws.", "isCorrect": false, "rationale": "While laws might govern the use of the park, the primary action of creating the park itself is not about making or enforcing a general rule for behavior, but providing a facility."}, {"text": "Settling disagreements between people.", "isCorrect": false, "rationale": "This function relates to judicial or conflict resolution processes, which are not directly demonstrated by establishing a park."}, {"text": "Providing services the whole community needs.", "isCorrect": true, "rationale": "The text explicitly lists 'provides services the whole community needs — roads, schools, public safety, courts.' A public park falls under the category of providing beneficial services to the community."}, {"text": "Protecting the community from outside threats.", "isCorrect": false, "rationale": "Protecting from outside threats refers to defense and security, which is unrelated to the creation of a local park."}]}, {"question": "Considering the various roles and reasons for government discussed, what is the overarching purpose that connects all governmental actions, from making laws to providing services?", "options": [{"text": "To accumulate power and wealth for those in charge.", "isCorrect": false, "rationale": "While this might unfortunately happen in some governments, the text presents the *purpose* of government as serving the community, not the self-interest of those in power."}, {"text": "To ensure individual citizens have absolute freedom to do whatever they desire.", "isCorrect": false, "rationale": "John Locke's ideas, as presented, explicitly state that people give up 'some freedom (the freedom to do whatever you want)' to gain protection and order, directly contradicting absolute freedom."}, {"text": "To promote and maintain the common good, including safety, order, and fair resolution of conflicts.", "isCorrect": true, "rationale": "The 'key concept' box synthesizes this, stating that government 'protects their safety, settles disagreements fairly, and provides for the common good,' encompassing all listed functions and Locke's reasons for its acceptance."}, {"text": "To strictly control every aspect of citizens' lives.", "isCorrect": false, "rationale": "The text emphasizes protection, order, and fairness, which implies a structured environment, but does not suggest the overarching purpose is total control over every aspect of citizens' lives."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
