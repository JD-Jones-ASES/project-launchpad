<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a 'state constitution' according to the provided text?", "options": [{"text": "A legal document that outlines international trade agreements for a specific state.", "isCorrect": false, "rationale": "The text defines a state constitution as a 'written plan that describes the structure, powers, and limits of a state government,' not international trade agreements."}, {"text": "A written plan detailing the structure, powers, and limits of a state government.", "isCorrect": true, "rationale": "This option directly matches the definition provided in the text: 'a written plan that describes the structure, powers, and limits of a state government.'"}, {"text": "A set of rules for local city councils within a state.", "isCorrect": false, "rationale": "While related to governance, a state constitution governs the entire state, not just local city councils. Its scope is broader."}, {"text": "A document that only lists the rights of citizens without defining government structure.", "isCorrect": false, "rationale": "The text states a state constitution does three main things: creates government, lists rights, and limits power. It's not limited to just listing rights."}]}, {"question": "The analogy 'the U.S. Constitution is like the rulebook for the whole school, and a state constitution is like the rules for one specific classroom' primarily illustrates what aspect of federalism?", "options": [{"text": "That state constitutions are entirely separate and independent from the U.S. Constitution.", "isCorrect": false, "rationale": "The text clarifies that 'neither one can take away the rights protected by the other,' indicating a relationship, not complete independence."}, {"text": "That state constitutions have absolute power over federal laws within their borders.", "isCorrect": false, "rationale": "The text states 'neither one can take away the rights protected by the other,' which contradicts the idea of absolute state power over federal rights."}, {"text": "The complementary roles of federal and state governance, where both sets of rules are important and protect rights.", "isCorrect": true, "rationale": "The analogy emphasizes that 'both rulebooks matter' and that 'neither one can take away the rights protected by the other,' highlighting their complementary, yet distinct, roles in a federal system."}, {"text": "That the U.S. Constitution is superior and state constitutions are largely irrelevant.", "isCorrect": false, "rationale": "The text explicitly states 'Both rulebooks matter,' refuting the idea that state constitutions are irrelevant."}]}, {"question": "Which of the following is NOT one of the three main things a state constitution does, according to the text?", "options": [{"text": "It creates the state government, establishing its three branches.", "isCorrect": false, "rationale": "The text explicitly lists this as one of the three main functions of a state constitution."}, {"text": "It lists the rights of citizens, often including a bill of rights.", "isCorrect": false, "rationale": "The text explicitly lists this as one of the three main functions of a state constitution."}, {"text": "It limits government power by defining what it cannot do.", "isCorrect": false, "rationale": "The text explicitly lists this as one of the three main functions of a state constitution."}, {"text": "It establishes international treaties and foreign policy for the state.", "isCorrect": true, "rationale": "The text does not mention establishing international treaties or foreign policy as a function of a state constitution; these are typically federal responsibilities."}]}, {"question": "The writers of the current Texas Constitution in 1876 were primarily motivated by a desire to:", "options": [{"text": "Expand the power of the state government to strengthen its role in national affairs.", "isCorrect": false, "rationale": "The text states they 'had seen Texas governments grow very powerful during and after the Civil War' and 'were determined to limit that power.'"}, {"text": "Ensure Texas could secede from the United States again if necessary.", "isCorrect": false, "rationale": "While related to the Civil War, the text focuses on limiting internal government power, not on secession."}, {"text": "Limit the power of the state government, having witnessed its expansion during and after the Civil War.", "isCorrect": true, "rationale": "The text explicitly states that the writers 'had seen Texas governments grow very powerful during and after the Civil War' and 'were determined to limit that power.'"}, {"text": "Streamline governmental processes to make them more efficient and responsive.", "isCorrect": false, "rationale": "The focus was on limiting power, which often results in a more detailed, rather than streamlined, constitution, as implied by its length."}]}, {"question": "What is the correct two-step process for amending the Texas Constitution?", "options": [{"text": "Approval by the Texas Supreme Court, followed by a two-thirds vote in both chambers of the Legislature.", "isCorrect": false, "rationale": "The text states the process involves the Legislature and Texas voters, not the Supreme Court."}, {"text": "A two-thirds vote in both chambers of the Texas Legislature, followed by approval from Texas voters in a special election.", "isCorrect": true, "rationale": "This accurately describes the two-step process outlined: 'An amendment must first pass in the Texas Legislature (two-thirds vote of both chambers), and then Texas voters must approve it in a special election.'"}, {"text": "A simple majority vote by Texas voters in a general election, followed by the Governor's signature.", "isCorrect": false, "rationale": "The text specifies a two-thirds legislative vote and a special election, not a general election or the Governor's signature as the final step."}, {"text": "Approval by the U.S. Congress, then ratification by the Texas Legislature.", "isCorrect": false, "rationale": "Amending a state constitution is an internal state process and does not require approval from the U.S. Congress."}]}, {"question": "Which of the following rights is specifically guaranteed by Article I, the Texas Bill of Rights, according to the text?", "options": [{"text": "The right to universal healthcare for all citizens.", "isCorrect": false, "rationale": "Universal healthcare is not listed among the specific rights guaranteed in the provided bullet points for the Texas Bill of Rights."}, {"text": "The right to a jury trial.", "isCorrect": true, "rationale": "The text explicitly lists 'The right to a jury trial' as one of the rights guaranteed by the Texas Bill of Rights."}, {"text": "The right to a minimum wage.", "isCorrect": false, "rationale": "A minimum wage is not listed among the specific rights guaranteed in the provided bullet points for the Texas Bill of Rights."}, {"text": "The right to privacy from all forms of government surveillance.", "isCorrect": false, "rationale": "While 'Protection against unreasonable searches' is listed, it is not as broad as 'privacy from all forms of government surveillance' and may not encompass all aspects."}]}, {"question": "Why is the Texas Constitution of 1876 considered one of the longest and most detailed state constitutions in the country?", "options": [{"text": "It was designed to be difficult to amend, so every possible detail had to be included initially.", "isCorrect": false, "rationale": "The text states it's 'not easy' to change but then notes 'more than 500 amendments' have been approved, which is the primary reason for its length, not an initial design to prevent change."}, {"text": "The original document contained extensive clauses regulating interstate commerce, making it lengthy.", "isCorrect": false, "rationale": "The text points to the desire to limit government power and the numerous amendments as reasons for its length, not extensive interstate commerce clauses."}, {"text": "Texas voters have approved more than 500 specific amendments, continually adding to its content.", "isCorrect": true, "rationale": "The text directly states, 'Texas voters have approved more than 500 amendments to the 1876 constitution — which is one reason it is so long!'"}, {"text": "It incorporates the entire text of the U.S. Constitution within its articles.", "isCorrect": false, "rationale": "A state constitution defines state government and rights, it does not typically incorporate the full federal constitution."}]}, {"question": "According to the text, what does it mean 'to ratify' a law or constitution?", "options": [{"text": "To suggest changes or additions to a document.", "isCorrect": false, "rationale": "This describes 'amend,' not 'ratify.'"}, {"text": "To officially approve it so it takes effect.", "isCorrect": true, "rationale": "The definition provided is 'to officially approve a law or constitution so it takes effect.'"}, {"text": "To translate it into multiple languages for broader understanding.", "isCorrect": false, "rationale": "The definition is about approval, not translation."}, {"text": "To challenge its legality in court.", "isCorrect": false, "rationale": "This describes a legal dispute, not the act of ratification."}]}, {"question": "When did Texas adopt its first constitution written in English?", "options": [{"text": "1827, under Mexican rule.", "isCorrect": false, "rationale": "The 1827 constitution was 'Under Mexican rule (in Spanish).'"}, {"text": "1836, for the Republic of Texas.", "isCorrect": true, "rationale": "The text lists '1836 — Republic of Texas (first Texas constitution in English).'"}, {"text": "1845, upon joining the United States.", "isCorrect": false, "rationale": "While a new constitution was adopted in 1845, it was not the *first* in English; that was in 1836."}, {"text": "1876, the current Texas Constitution.", "isCorrect": false, "rationale": "The 1876 constitution is the *current* one, not the first in English."}]}, {"question": "The 'teachernote' suggests asking students to write three rules and protected rights for their classroom constitution. This activity primarily aims to help students:", "options": [{"text": "Memorize the specific articles of the Texas Constitution.", "isCorrect": false, "rationale": "The activity is about creating a *classroom* constitution, not memorizing specific articles of the Texas Constitution."}, {"text": "Understand the abstract concept of a constitution by applying it to a concrete, familiar setting.", "isCorrect": true, "rationale": "The note states, 'This connects the abstract idea of a constitution to a familiar, concrete setting,' which aligns with this option."}, {"text": "Debate the historical evolution of constitutional law.", "isCorrect": false, "rationale": "While relevant to the topic, the specific activity is focused on the practical application of constitutional principles, not historical debate."}, {"text": "Identify which branch of government holds the most power.", "isCorrect": false, "rationale": "The activity is about setting rules and rights, not analyzing the distribution of power among governmental branches."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
