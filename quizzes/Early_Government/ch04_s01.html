<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'taxation without representation' as described in the text?", "options": [{"text": "A system where a colony pays taxes to a local government it does not elect.", "isCorrect": false, "rationale": "This option describes local governance, but 'taxation without representation' specifically refers to paying taxes to an *outside* power where no elected voice exists."}, {"text": "Being forced to pay taxes to a government in which the taxpayer has no elected voice or representative.", "isCorrect": true, "rationale": "The text defines 'taxation without representation' as 'Being required to pay taxes to a government in which you have no elected voice.' This accurately reflects the core grievance of the colonists."}, {"text": "A situation where colonists refuse to pay taxes levied by their own colonial assemblies.", "isCorrect": false, "rationale": "The grievance was not against taxes from their *own* assemblies (where they had representatives), but against taxes from the British Parliament where they lacked representation."}, {"text": "The act of a monarch levying taxes without the consent of any legislative body.", "isCorrect": false, "rationale": "While monarchical taxation can be problematic, the specific issue described was Parliament (a legislative body) imposing taxes on colonists who lacked representation *within Parliament*."}]}, {"question": "How did the geographic distance between England and the American colonies primarily influence the development of colonial governance?", "options": [{"text": "It led to constant military intervention from England to maintain control.", "isCorrect": false, "rationale": "The text states that Britain initially left the colonies 'largely alone' (salutary neglect), rather than constantly intervening due to distance."}, {"text": "It encouraged the colonists to develop independent habits of self-government.", "isCorrect": true, "rationale": "The text explicitly states that 'Far from the watchful eyes of the English king, the colonists developed habits of self-government' and that 'their distance from England led them to make many decisions on their own.'"}, {"text": "It resulted in England providing significant financial aid for colonial infrastructure.", "isCorrect": false, "rationale": "The text does not mention significant financial aid from England; instead, it focuses on the colonies developing independently and later being seen as a source of revenue."}, {"text": "It necessitated the establishment of a powerful English governor in each colony.", "isCorrect": false, "rationale": "While governors existed, the distance fostered self-governance through elected legislatures and town meetings, rather than purely strengthening the power of English-appointed governors."}]}, {"question": "The establishment of the Virginia House of Burgesses in 1619 was significant because it represented:", "options": [{"text": "The first instance of direct democracy in the American colonies.", "isCorrect": false, "rationale": "New England town meetings are cited as examples of direct democracy. The House of Burgesses was an elected legislative body, representing a form of representative democracy."}, {"text": "The first time colonists successfully rebelled against British rule.", "isCorrect": false, "rationale": "The House of Burgesses was an early form of colonial self-government within the British system, not an act of rebellion."}, {"text": "The earliest example of an elected legislative body in the Americas.", "isCorrect": true, "rationale": "The text states, 'Virginia had established the House of Burgesses: the first elected legislative body in the Americas,' with colonists electing representatives."}, {"text": "Britain's first direct attempt to tax the colonies.", "isCorrect": false, "rationale": "The House of Burgesses was a colonial initiative for self-governance, predating British attempts to directly tax the colonies by over a century."}]}, {"question": "What major event led Britain to abandon its policy of 'salutary neglect' and begin imposing new taxes on the American colonies?", "options": [{"text": "The Boston Tea Party, which demonstrated colonial defiance.", "isCorrect": false, "rationale": "The Boston Tea Party occurred in 1773, *after* Britain had already begun imposing new taxes following the French and Indian War."}, {"text": "The conclusion of the expensive French and Indian War.", "isCorrect": true, "rationale": "The text states, 'That changed in 1763. Britain had just finished the expensive French and Indian War. The British government needed money.'"}, {"text": "Growing economic competition from other European powers.", "isCorrect": false, "rationale": "While European politics were mentioned, the primary trigger for the tax policy change was the cost of the French and Indian War, not general economic competition."}, {"text": "A desire to expand direct parliamentary control over all aspects of colonial life.", "isCorrect": false, "rationale": "The immediate reason given was Britain's need for money to pay for its defense, not a broad desire for increased control, though that became an outcome."}]}, {"question": "Which of the following acts specifically targeted various paper products, leading to significant colonial protest?", "options": [{"text": "The Townshend Acts", "isCorrect": false, "rationale": "The Townshend Acts taxed imported goods like glass, lead, paint, paper, and tea, but the Stamp Act specifically targeted a wider range of paper products produced *within* the colonies."}, {"text": "The Intolerable Acts", "isCorrect": false, "rationale": "The Intolerable Acts were punitive measures that closed Boston Harbor and curtailed Massachusetts's self-government, not a tax on paper products."}, {"text": "The Stamp Act of 1765", "isCorrect": true, "rationale": "The text states, 'The Stamp Act of 1765 required colonists to pay a tax on paper — newspapers, legal documents, even playing cards.'"}, {"text": "The Tea Act", "isCorrect": false, "rationale": "The Tea Act imposed a tax on tea and granted the East India Company a monopoly, leading to the Boston Tea Party, but it was not a general tax on paper products."}]}, {"question": "Why did colonists find Parliament's new taxes, such as the Stamp Act, particularly egregious despite having paid taxes before?", "options": [{"text": "The taxes were universally higher than any previous taxes levied by Britain.", "isCorrect": false, "rationale": "While the taxes were a burden, the core grievance wasn't solely about the amount, but the principle of who levied them and without representation."}, {"text": "They believed only their colonial legislatures, in which they had representatives, had the authority to tax them.", "isCorrect": true, "rationale": "The text explains, 'Colonists were furious. They had their own legislatures. They were used to taxing themselves. Now a Parliament in which they had no elected representatives was taxing them.'"}, {"text": "They objected to paying taxes for their own defense, believing Britain should bear the full cost.", "isCorrect": false, "rationale": "While they might have preferred not to pay, their primary objection was *how* the tax was levied (without representation), not simply *that* they had to contribute to defense costs."}, {"text": "They had a legal document from the King exempting them from all taxes.", "isCorrect": false, "rationale": "The text does not mention such a document. Their claim was based on their rights as English citizens to representation in any body that taxed them."}]}, {"question": "In the context of the growing crisis, what was the primary purpose of the First Continental Congress in 1774?", "options": [{"text": "To declare independence from Great Britain and form a new nation.", "isCorrect": false, "rationale": "The First Continental Congress met to 'coordinate their response' to British actions. The Declaration of Independence came later, after the crisis had further escalated."}, {"text": "To draft a new constitution for the unified American colonies.", "isCorrect": false, "rationale": "While future governance was a concern, the immediate goal was to address the escalating crisis with Britain, not to establish a new constitutional framework."}, {"text": "To coordinate the colonial response to Britain's punitive actions, particularly the Intolerable Acts.", "isCorrect": true, "rationale": "The text states, 'By 1774, colonial leaders were meeting as the First Continental Congress to coordinate their response,' specifically in the wake of the Intolerable Acts."}, {"text": "To formally request military aid from France against Great Britain.", "isCorrect": false, "rationale": "The First Continental Congress focused on internal colonial coordination and petitions to Britain, not immediate foreign military alliances."}]}, {"question": "New England town meetings are presented as an example of what form of governance?", "options": [{"text": "Representative democracy", "isCorrect": false, "rationale": "Representative democracy involves electing individuals to speak on behalf of others, like the House of Burgesses. Town meetings involve direct participation."}, {"text": "Monarchical rule", "isCorrect": false, "rationale": "Monarchical rule involves a single ruler (king/queen), which is contrary to the self-governing nature of town meetings."}, {"text": "Direct democracy", "isCorrect": true, "rationale": "The text explicitly states, 'In New England, town meetings let colonists gather to debate and vote on local matters. These were small-scale direct democracies in action.'"}, {"text": "Oligarchy", "isCorrect": false, "rationale": "Oligarchy is rule by a small group of people. Town meetings, where colonists gather to debate and vote, suggest broader participation."}]}, {"question": "According to the 'keyconcept' at the end of the section, why did colonists view British taxation without representation as 'tyranny'?", "options": [{"text": "Because they believed paying any taxes at all was an infringement on their personal liberty.", "isCorrect": false, "rationale": "The core issue was not paying taxes in general, but paying taxes to a government where they had no voice, which they considered a violation of their rights as English citizens."}, {"text": "Because it directly violated their established rights as English citizens, who expected representation in any body that taxed them.", "isCorrect": true, "rationale": "The 'keyconcept' states that colonists saw it as 'tyranny — a direct violation of their rights as English citizens' because they were taxed without representation."}, {"text": "Because Britain had promised never to tax the colonies after the French and Indian War.", "isCorrect": false, "rationale": "The text mentions no such promise. Britain needed money after the war and saw the colonies as a source."}, {"text": "Because the taxes were solely designed to enrich the King personally.", "isCorrect": false, "rationale": "The text states Parliament looked to the colonies to 'help pay for their own defense' after the war, not specifically to enrich the King."}]}, {"question": "Which sequence of events accurately reflects the escalation of tensions between Britain and the colonies as described in the text?", "options": [{"text": "Stamp Act → Boston Tea Party → Intolerable Acts → Boston Massacre", "isCorrect": false, "rationale": "The Boston Massacre (1770) occurred before the Boston Tea Party (1773). Also, the Intolerable Acts followed the Boston Tea Party."}, {"text": "Townshend Acts → First Continental Congress → Boston Massacre → Stamp Act", "isCorrect": false, "rationale": "The Stamp Act (1765) preceded the Townshend Acts. The First Continental Congress (1774) was a response to escalating events like the Boston Massacre (1770) and Intolerable Acts."}, {"text": "Stamp Act → Boston Massacre → Boston Tea Party → Intolerable Acts", "isCorrect": true, "rationale": "This sequence matches the chronology in the text: Stamp Act (1765), Boston Massacre (1770), Boston Tea Party (1773), and then Britain's response with the Intolerable Acts (after 1773)."}, {"text": "Intolerable Acts → Stamp Act → Boston Tea Party → First Continental Congress", "isCorrect": false, "rationale": "The Stamp Act (1765) came much earlier, and the Intolerable Acts were Britain's *response* to the Boston Tea Party, not preceding it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
