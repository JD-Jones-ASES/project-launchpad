<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What did Benjamin Franklin mean when he stated, “A republic — if you can keep it,” in the context of citizen participation?", "options": [{"text": "That republics are inherently fragile and always on the verge of collapse.", "isCorrect": false, "rationale": "While a republic can be fragile, Franklin's statement, as explained in the text, emphasizes the *condition* of its survival, which is active citizen involvement, rather than an inherent, unavoidable fragility."}, {"text": "That the strength and survival of a self-governing republic depend entirely on the active involvement of its citizens.", "isCorrect": true, "rationale": "The text directly interprets Franklin's quote, stating, 'He meant that a self-governing republic is only as strong as the citizens who support it,' highlighting the critical role of active participation."}, {"text": "That a republic requires constant military vigilance to prevent foreign invasion.", "isCorrect": false, "rationale": "Franklin's quote, in this context, refers to internal civic engagement and the citizens' role in sustaining self-governance, not primarily external military defense."}, {"text": "That only highly educated citizens are capable of maintaining a republic.", "isCorrect": false, "rationale": "The text emphasizes 'citizens who show up, pay attention, and do their part,' which points to active involvement from all eligible citizens, not just an educated elite."}], "id": "q01"}, {"question": "Sarah consistently reads local news, researches candidates before elections, and attends city council meetings. Which term best describes Sarah's civic engagement?", "options": [{"text": "A volunteer", "isCorrect": false, "rationale": "While Sarah might volunteer, her described actions primarily relate to staying informed about government and issues, which is distinct from the definition of a 'volunteer' as someone who gives time and energy to help others without being paid."}, {"text": "An informed citizen", "isCorrect": true, "rationale": "The text defines an 'informed citizen' as 'a citizen who stays up to date on what government is doing and what issues the community faces,' which perfectly matches Sarah's actions."}, {"text": "A jury member", "isCorrect": false, "rationale": "Serving on a jury is a specific civic duty, not a general description of someone who stays informed about current events and candidates."}, {"text": "An elected official", "isCorrect": false, "rationale": "Sarah's actions describe citizen participation and engagement, not necessarily holding a public office."}], "id": "q02"}, {"question": "The text notes that voter turnout in the U.S. is often lower than in other democracies. What is a direct consequence of this trend, according to the passage?", "options": [{"text": "The Constitution's protection of voting rights is invalidated.", "isCorrect": false, "rationale": "Voting rights remain protected by the Constitution even with low turnout; the issue is that citizens choose not to exercise these rights."}, {"text": "A minority of eligible voters often decide many elections.", "isCorrect": true, "rationale": "The text explicitly states that low voter turnout 'means that many elections are decided by a minority of eligible voters.'"}, {"text": "Citizens are no longer required to be informed to vote wisely.", "isCorrect": false, "rationale": "The text emphasizes that 'To vote wisely, a citizen must also be informed,' regardless of overall turnout levels."}, {"text": "Leaders are chosen by popular vote rather than electoral college.", "isCorrect": false, "rationale": "The method of choosing leaders (popular vote vs. electoral college) is a separate structural issue of the electoral system and not a direct consequence of low voter turnout itself."}], "id": "q03"}, {"question": "Why is serving on a jury considered one of the most direct forms of civic service?", "options": [{"text": "It directly funds government services through taxes.", "isCorrect": false, "rationale": "Jury duty is not related to paying taxes; taxes fund government services."}, {"text": "It involves deciding whether a law was broken and ensuring justice.", "isCorrect": true, "rationale": "The text states that 'When you are called for jury duty, you are doing one of the most direct forms of civic service possible: helping decide whether a law was broken and ensuring that justice is done.'"}, {"text": "It allows citizens to directly contact elected officials.", "isCorrect": false, "rationale": "Contacting elected officials is another form of participation, separate from serving on a jury."}, {"text": "It primarily involves watching from the sidelines.", "isCorrect": false, "rationale": "Jury duty is an active role, directly contrary to 'watching from the sidelines,' which the text defines as the opposite of participation."}], "id": "q04"}, {"question": "The text states that citizens can work to change laws they think are wrong. Which action aligns with the Founders' view on changing laws?", "options": [{"text": "Refusing to obey any law they disagree with.", "isCorrect": false, "rationale": "The text explicitly states the Founders were clear that citizens should not 'simply ignor[e] laws they disagree with.'"}, {"text": "Working through legal, peaceful means like voting and petitioning.", "isCorrect": true, "rationale": "The text highlights that 'the Founders were clear that citizens should work to change laws through legal, peaceful means, not by simply ignoring laws they disagree with.'"}, {"text": "Organizing public protests that disrupt daily life and government functions.", "isCorrect": false, "rationale": "While protest can be a means of change, the text specifically emphasizes 'legal, peaceful means' as the Founders' preferred approach for changing laws."}, {"text": "Expecting elected officials to automatically know which laws need changing.", "isCorrect": false, "rationale": "This implies a passive role, whereas the text encourages active engagement ('through voting, petitioning, and supporting candidates')."}], "id": "q05"}, {"question": "According to the text, what is the primary purpose of paying taxes honestly as a duty of citizenship?", "options": [{"text": "To provide direct financial support to individual politicians.", "isCorrect": false, "rationale": "Taxes fund public services and government operations, not direct personal support for individual politicians."}, {"text": "To allow the community to pool resources for services like schools and roads.", "isCorrect": true, "rationale": "The text states, 'Taxes pay for the services everyone depends on: schools, roads, fire departments, national defense, and much more... they are the way a community pools its resources to pay for things no individual could afford alone.'"}, {"text": "To demonstrate financial literacy and economic responsibility.", "isCorrect": false, "rationale": "While paying taxes demonstrates responsibility, its primary purpose, as described, is to fund collective community needs."}, {"text": "To fund national defense initiatives exclusively.", "isCorrect": false, "rationale": "National defense is listed as one item, but the text explicitly mentions 'schools, roads, fire departments, national defense, and much more,' indicating a broader purpose."}], "id": "q06"}, {"question": "How does volunteering and community service, such as coaching youth sports or cleaning up parks, contribute to civic participation?", "options": [{"text": "It primarily allows individuals to avoid paying taxes.", "isCorrect": false, "rationale": "The text does not link volunteering to tax avoidance; it is presented as a way to build community directly."}, {"text": "It represents a form of civic participation that does not directly involve government.", "isCorrect": true, "rationale": "The text explicitly states, 'Not all civic participation involves government. Citizens who volunteer at food banks, coach youth sports, clean up parks, or visit elderly neighbors are building the community from the ground up.'"}, {"text": "It is only considered civic participation if organized by a government agency.", "isCorrect": false, "rationale": "This contradicts the passage's point that 'Not all civic participation involves government.'"}, {"text": "It serves as a substitute for voting in elections.", "isCorrect": false, "rationale": "Volunteering is a complementary form of participation, not a replacement for fundamental duties like voting."}], "id": "q07"}, {"question": "A newly proposed state law could significantly increase local property taxes to fund a new infrastructure project. An informed citizen would likely take which of the following actions?", "options": [{"text": "Wait until the law passes to see its effects before forming an opinion.", "isCorrect": false, "rationale": "An informed citizen actively learns and understands issues *before* decisions are made, not passively waits."}, {"text": "Assume the law is beneficial because it's proposed by the government.", "isCorrect": false, "rationale": "Staying informed involves critically evaluating proposals, not making blind assumptions based on who proposed them."}, {"text": "Research the specifics of the proposed law, its potential impact, and the arguments for and against it.", "isCorrect": true, "rationale": "This action directly aligns with the 'Staying Informed' section, which advises 'Paying attention to local issues' and 'Understanding how government decisions affect daily life.'"}, {"text": "Only discuss the law with friends who share similar political views.", "isCorrect": false, "rationale": "To be truly informed, a citizen should seek out diverse perspectives and reliable sources, not limit themselves to echo chambers."}], "id": "q08"}, {"question": "The example of Clara Barton best illustrates which key concept of citizen participation?", "options": [{"text": "The necessity of holding elected office to make a national impact.", "isCorrect": false, "rationale": "The text explicitly states Clara Barton 'never held elected office,' yet she significantly changed the nation."}, {"text": "The power of a single citizen's determination and civic courage to bring about national change.", "isCorrect": true, "rationale": "The 'personbox' concludes by saying Clara Barton 'showed that a single citizen, with determination and civic courage, can change an entire nation.'"}, {"text": "That only women can effectively lead humanitarian efforts.", "isCorrect": false, "rationale": "While Clara Barton was a woman, the text highlights her individual impact and determination, not a gender-specific leadership quality."}, {"text": "The primary role of the military in civic service during wartime.", "isCorrect": false, "rationale": "Clara Barton's role was humanitarian support for soldiers, not direct military command or service, demonstrating a different form of civic engagement during wartime."}], "id": "q09"}, {"question": "Considering all the ways citizens participate in self-government described in the text, which statement best summarizes the overarching message about maintaining a republic?", "options": [{"text": "The government is responsible for ensuring citizens fulfill their duties, even if it requires force.", "isCorrect": false, "rationale": "The text emphasizes the voluntary nature and responsibility of citizens to participate, rather than the government forcing participation."}, {"text": "Active and knowledgeable participation by citizens is fundamental to the strength and proper functioning of a republic.", "isCorrect": true, "rationale": "This statement synthesizes the core message from Franklin's quote, the importance of being an 'informed citizen,' voting, jury duty, obeying laws, paying taxes, and volunteering, all of which contribute to a strong republic."}, {"text": "Financial contributions through taxes are the only essential form of citizen participation.", "isCorrect": false, "rationale": "While paying taxes is essential, the text lists numerous other crucial forms of participation, such as voting, serving on juries, and volunteering."}, {"text": "Citizens should primarily focus on watching government actions from the sidelines and only intervene if major problems arise.", "isCorrect": false, "rationale": "The text directly contradicts this by defining 'participation' as 'taking an active role in the community or government, not just watching from the sidelines.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
