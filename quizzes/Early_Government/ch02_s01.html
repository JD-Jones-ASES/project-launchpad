<div class="quiz-container">

        <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">We the People &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary role of the pharaoh in ancient Egypt, beyond being a political leader?", "options": [{"text": "Chief tax collector", "isCorrect": false, "rationale": "While tax collection was part of the government's function, the pharaoh's roles extended far beyond this specific administrative task, which was often delegated to officials like tax collectors."}, {"text": "Chief priest and chief judge", "isCorrect": true, "rationale": "The text explicitly states, 'He was also the chief priest and the chief judge.' This highlights his critical non-political, yet equally authoritative, roles in Egyptian society."}, {"text": "Head of the military only", "isCorrect": false, "rationale": "The pharaoh was indeed the head of the military, but the question asks for roles *beyond* political leadership, and 'only' makes this option too restrictive, as he held other significant positions."}, {"text": "Organizer of trade routes", "isCorrect": false, "rationale": "While trade would fall under the pharaoh's domain, the text does not identify organizing trade routes as one of his primary non-political roles comparable to being chief priest or judge."}]}, {"question": "How did the annual flooding of the Nile River primarily contribute to the development of a strong central government in ancient Egypt?", "options": [{"text": "It created natural borders, preventing invasions and allowing rulers to focus solely on internal affairs.", "isCorrect": false, "rationale": "While geography impacts borders, the text focuses on the *management* of the Nile's resources for internal sustenance, not primarily its role in defense against external threats."}, {"text": "It necessitated organized management of resources like canals and grain storage, tasks best handled by a unified authority.", "isCorrect": true, "rationale": "The text states, 'But the floods had to be managed. Canals had to be dug. Grain had to be stored for dry years. Someone had to organize the farmers and workers. That someone was the pharaoh.' This directly links the Nile's management to the need for a strong central ruler."}, {"text": "It provided abundant fishing opportunities, leading to a complex economy managed by various independent city-states.", "isCorrect": false, "rationale": "The text does not mention fishing as the primary driver for central government, nor does it suggest independent city-states; it emphasizes a unified central authority."}, {"text": "It made travel difficult, encouraging each village to become self-sufficient without central oversight.", "isCorrect": false, "rationale": "This contradicts the text's emphasis on the need for central organization and the unified management of resources across the land, and rivers generally facilitate travel."}]}, {"question": "A modern leader holds power without any checks or balances from a legislature or judiciary, and their commands are considered final and unquestionable. This scenario best exemplifies which concept from ancient Egypt?", "options": [{"text": "Monarchy", "isCorrect": false, "rationale": "A monarchy is rule by one person who inherits power, but it doesn't *necessarily* imply absolute, unchecked power. Some monarchies have limitations on power."}, {"text": "Dynasty", "isCorrect": false, "rationale": "A dynasty describes how power is transferred (within a family) across generations, not the nature or limits of that power itself."}, {"text": "Absolute rule", "isCorrect": true, "rationale": "The definition provided for 'absolute rule' is 'When one ruler has complete control with no limits on their power,' which perfectly matches the described scenario."}, {"text": "Vizier system", "isCorrect": false, "rationale": "The vizier system refers to the administrative officials who helped the pharaoh run the government, not the nature of the pharaoh's supreme power itself."}]}, {"question": "Which of the following best describes the system of 'dynasty' in ancient Egypt?", "options": [{"text": "A council of elders who advised the pharaoh on all matters.", "isCorrect": false, "rationale": "The text mentions viziers and other officials, but 'dynasty' specifically refers to the succession of rulers, not an advisory council."}, {"text": "A series of rulers who came from the same family, passing power down through generations.", "isCorrect": true, "rationale": "The text explicitly defines dynasty as 'A series of rulers from the same family. When a pharaoh died, power passed to a son or other relative.'"}, {"text": "A temporary military government established during times of war.", "isCorrect": false, "rationale": "This contradicts the long-term, generational nature of dynastic rule as described in the text, which could last for hundreds of years."}, {"text": "A system where rulers were elected by popular vote for a fixed term.", "isCorrect": false, "rationale": "Ancient Egyptian rule was based on inherited power within families, not popular elections."}]}, {"question": "The text states that 'To disobey the pharaoh was to disobey the gods.' This belief was crucial because it:", "options": [{"text": "Ensured that the pharaoh had to regularly consult with priests before making major decisions.", "isCorrect": false, "rationale": "The text implies the pharaoh *was* the chief priest and a living god, meaning his authority was inherent and didn't necessarily require external consultation to be legitimate."}, {"text": "Limited the pharaoh's personal power by subjecting him to divine law.", "isCorrect": false, "rationale": "This belief actually expanded the pharaoh's power, making his commands divine and therefore unquestionable, rather than limiting them."}, {"text": "Provided an unquestionable divine justification for the pharaoh's absolute authority.", "isCorrect": true, "rationale": "By being considered the son of the sun god Ra and a living god, the pharaoh's commands were divine orders, making disobedience an act against the gods themselves. This solidified his absolute and unchallenged authority."}, {"text": "Encouraged citizens to challenge the pharaoh if they believed his commands contradicted divine will.", "isCorrect": false, "rationale": "The text explicitly states that questioning the pharaoh's decisions was 'almost unthinkable,' indicating that challenges based on divine will were not encouraged."}]}, {"question": "While the pharaoh held absolute power, he did not manage everything alone. Which group of officials was primarily responsible for running the daily operations of the government, according to the text?", "options": [{"text": "Foreign ambassadors and trade representatives.", "isCorrect": false, "rationale": "These specific roles are not mentioned as the primary administrators for internal governance."}, {"text": "Viziers, scribes, tax collectors, and priests.", "isCorrect": true, "rationale": "The text states, 'He had officials called viziers who helped run the government. Scribes kept records. Tax collectors gathered grain and goods. Priests managed temples and rituals.' This group formed the administrative backbone."}, {"text": "Military generals and war council members.", "isCorrect": false, "rationale": "While important, military leaders were focused on defense and expansion, not the daily civil administration of the land."}, {"text": "Independent village chiefs and local elders.", "isCorrect": false, "rationale": "The text emphasizes a 'large network of officials carried out the pharaoh's orders throughout the land,' indicating a centralized, not independent, system of administration."}]}, {"question": "Ramesses II, known for his long reign and monumental constructions like the temple at Abu Simbel, serves as a powerful example of absolute rule because he:", "options": [{"text": "Shared power equally with his viziers, demonstrating collaborative leadership.", "isCorrect": false, "rationale": "Ramesses II exemplified *absolute* rule, which means he held complete control, not shared leadership."}, {"text": "Built structures primarily to honor the gods, showing his humility.", "isCorrect": false, "rationale": "While temples honored gods, the text notes his temples were 'covered with carvings of his own face' and had 'four enormous statues of Ramesses guarding the entrance,' emphasizing his self-aggrandizement as a display of personal power."}, {"text": "Led armies and constructed massive projects reflecting his unparalleled personal power and command.", "isCorrect": true, "rationale": "The text describes him leading armies, signing treaties, and building more temples and statues of *himself* than almost any other pharaoh, explicitly concluding that he is 'a powerful example of what absolute rule looks like in stone.'"}, {"text": "Negotiated peace treaties, which indicates a limited need for military might.", "isCorrect": false, "rationale": "While he signed a peace treaty, he also 'led armies,' demonstrating military strength. The treaty itself was an act of a powerful ruler, not an indication of limited power."}]}, {"question": "The 'keyconcept' section summarizes that Ancient Egypt was a monarchy under absolute rule, with the pharaoh holding all political, religious, and legal power due to the belief he was a god. What is the most significant *implication* of this system?", "options": [{"text": "It fostered a dynamic political environment with frequent changes in leadership.", "isCorrect": false, "rationale": "Absolute rule, especially with divine justification, typically leads to stability and continuity in leadership, not frequent changes."}, {"text": "It ensured a separation of powers, preventing any single entity from becoming too powerful.", "isCorrect": false, "rationale": "The text explicitly states the pharaoh held 'all political, religious, and legal power,' which is the opposite of a separation of powers."}, {"text": "It made challenging the pharaoh's decisions almost unthinkable, solidifying his unchallenged authority.", "isCorrect": true, "rationale": "The 'keyconcept' directly states this: 'His authority came from the belief that he was a god. This made questioning his decisions almost unthinkable.'"}, {"text": "It led to a largely decentralized government where local officials had significant autonomy.", "isCorrect": false, "rationale": "The text describes a 'large network of officials carried out the pharaoh's orders throughout the land,' indicating a highly centralized system where local officials implemented the pharaoh's will, not acted autonomously."}]}, {"question": "According to the definition provided, what is the defining characteristic of a monarchy?", "options": [{"text": "A government where citizens directly vote on all laws and leaders.", "isCorrect": false, "rationale": "This describes a direct democracy, not a monarchy, which is characterized by inherited rule."}, {"text": "A government ruled by a single person who inherits power, typically a king or queen.", "isCorrect": true, "rationale": "The text defines 'monarchy' as 'A government ruled by one person, usually a king or queen, who inherits power.'"}, {"text": "A system where power is distributed among multiple elected officials.", "isCorrect": false, "rationale": "This describes a republic or parliamentary democracy, not a monarchy, which is ruled by a single, unelected individual who inherited power."}, {"text": "A form of government based on religious laws interpreted by priests.", "isCorrect": false, "rationale": "While religion was central to ancient Egypt, the definition of 'monarchy' specifically pertains to the *inheritance* of power by a single ruler, not the source of law."}]}, {"question": "Considering the combined information about the Nile's floods and the pharaoh's roles, which statement best explains *why* a strong central ruler like the pharaoh was considered essential for ancient Egypt's survival and prosperity?", "options": [{"text": "Only a divine king could command the Nile to flood annually, ensuring fertile land.", "isCorrect": false, "rationale": "The text states the Nile floods annually, and the pharaoh's role was to *manage* these floods and their aftermath, not to command the natural phenomenon itself."}, {"text": "A central ruler was needed to negotiate trade agreements with neighboring civilizations for essential resources.", "isCorrect": false, "rationale": "While trade may have occurred, the text primarily emphasizes the internal management of resources related to the Nile for survival, not external trade as the main driver for central rule."}, {"text": "The complex management of the Nile's floods and subsequent agricultural organization required a unified authority to prevent famine and maintain order.", "isCorrect": true, "rationale": "The text states: 'But the floods had to be managed. Canals had to be dug. Grain had to be stored for dry years. Someone had to organize the farmers and workers. That someone was the pharaoh.' This directly connects the Nile's challenges to the necessity of a strong central ruler for survival."}, {"text": "A pharaoh was primarily a military leader, crucial for defending Egypt's borders against constant invasions.", "isCorrect": false, "rationale": "While the pharaoh was a military leader, the text highlights his role in managing the Nile and feeding the people as the primary reason for a strong central government, which directly relates to the question of survival and prosperity linked to the Nile."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
