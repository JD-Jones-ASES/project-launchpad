        <div class="subtitle">AP Computer Science Principles &mdash; Project Ideation: Purpose vs Function</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>

        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "A student writes the following as their response to the Create PT prompt about program purpose: \"My program runs a loop that counts how many days in a row a student studied.\" Why does the College Board reader award zero points on the \"Program Purpose and Function\" row for this response?", "options": [{"text": "The response describes function (what the code computes) instead of purpose (why the program exists and who it serves), so the rubric requirement for an intended-purpose statement is not met.", "isCorrect": true, "rationale": "The Chief Reader Report flags this as the single most common source of lost points: students answer the wrong question. The rubric awards a point only when the response identifies an audience and a real-world need, not when it summarizes loop behavior."}, {"text": "The response is too short — purpose statements must be at least one paragraph long.", "isCorrect": false, "rationale": "Length is not the criterion. Two to four well-crafted sentences are typically sufficient for full credit; brevity that names audience and benefit can score full marks."}, {"text": "The response uses the word \"program\" instead of \"application,\" which does not match rubric vocabulary.", "isCorrect": false, "rationale": "Rubric language emphasizes purpose, audience, and the problem addressed — not the choice between \"program\" and \"application.\" The substitute words are not what the rubric mines for."}, {"text": "Loops cannot be described in a Written Response under any circumstances.", "isCorrect": false, "rationale": "Loops can absolutely be described — but in the Algorithm Development category. The Program Purpose and Function row is a separate scoring row that asks who benefits, not what control structures the code uses."}]}, {"question": "A high school senior writes: \"My program helps high school students manage their weekly study time by showing which subjects they are neglecting, so they can adjust habits before a deadline.\" Which structural elements make this response likely to earn the purpose point?", "options": [{"text": "It names a specific human audience (high school students), identifies a concrete problem (neglected subjects), and articulates a tangible benefit (adjust habits before a deadline).", "isCorrect": true, "rationale": "Rubric-mining requires all three: audience + problem + benefit. The response also mirrors phrasing the rubric uses — \"intended purpose,\" \"who it serves\" — making the point hard for a reader to deny."}, {"text": "It uses computer-science vocabulary like \"weekly,\" \"deadline,\" and \"manage\" that maps directly to algorithmic constructs.", "isCorrect": false, "rationale": "These words are domain vocabulary, not rubric vocabulary. The rubric rewards phrases like \"intended purpose,\" \"target audience,\" and \"problem addressed,\" not the everyday meaning of \"weekly\" or \"manage.\""}, {"text": "It claims the program will run efficiently, which the rubric requires for full purpose credit.", "isCorrect": false, "rationale": "Efficiency is not part of the Program Purpose and Function row. The rubric for that row scores audience and problem identification, not runtime characteristics."}, {"text": "It includes the phrase \"My program is the purpose,\" which mirrors the rubric exactly.", "isCorrect": false, "rationale": "Mirroring the rubric is good, but echoing \"the purpose is\" without naming an audience or benefit is the exact pattern the Chief Reader Report flags as a function statement disguised by purpose-shaped wording."}]}, {"question": "Section 9.1 introduces \"the rubric-mining tactic.\" Which workflow best describes this tactic?", "options": [{"text": "Print the rubric, highlight every noun that describes what the response must address, and write one sentence per highlighted noun before polishing the response into prose.", "isCorrect": true, "rationale": "This is the mechanical first pass the section recommends: it ensures no required rubric element is accidentally omitted. The text identifies it as the most reliable defense against the function-vs-purpose mistake."}, {"text": "Read the rubric once, then write the response from memory without referring back to the rubric language.", "isCorrect": false, "rationale": "Writing from memory is exactly what the section warns against — it leads to using everyday vocabulary that does not match rubric language."}, {"text": "Submit the program first, then check whether the rubric criteria happen to be met.", "isCorrect": false, "rationale": "Rubric-mining is preventive, not retrospective. The point is to ensure the Written Response addresses each rubric noun before submission, when revision is still possible."}, {"text": "Copy and paste the rubric language directly into the Written Response without modification.", "isCorrect": false, "rationale": "Mirroring rubric vocabulary is encouraged, but copying verbatim does not address the substance the rubric requires. The response must still describe the actual program's audience and benefit."}]}, {"question": "Classify each of the following as a function statement (F) or purpose statement (P): (i) \"My program outputs the top three scorers from a tournament bracket.\" (ii) \"My program helps tournament organizers quickly identify which participants advance so the bracket can be posted before players leave the venue.\"", "options": [{"text": "(i) F, (ii) P — Statement (i) describes what the code outputs; statement (ii) names an audience (tournament organizers), a real-world friction (timing pressure to post before players leave), and a benefit (quick identification of advancing players).", "isCorrect": true, "rationale": "This pairing follows the section's pattern exactly: function statements describe code behavior, purpose statements name a human audience, identify a problem, and state a tangible benefit."}, {"text": "(i) P, (ii) F — Statement (i) is purpose because outputs serve users; statement (ii) is function because it describes what the program does.", "isCorrect": false, "rationale": "This inverts the definitions. \"Outputs the top three scorers\" is mechanical code behavior; the elaborated description of organizers and venue logistics is the purpose statement."}, {"text": "Both are function statements; neither names a target audience.", "isCorrect": false, "rationale": "Statement (ii) explicitly names tournament organizers as the audience and identifies a real-world need (posting brackets before players leave) — this is the textbook structure of a purpose statement."}, {"text": "Both are purpose statements because both mention \"tournament,\" which is a real-world setting.", "isCorrect": false, "rationale": "Mentioning a setting is not enough. Statement (i) names no audience and no friction; it merely lists code output, making it a function statement regardless of the topic."}]}, {"question": "Which of the following responses would most likely fail to earn the purpose point under the College Board's binary scoring rule for Program Purpose, even though the writer used the word \"purpose\"?", "options": [{"text": "\"The purpose of my program is to display a streak count.\"", "isCorrect": true, "rationale": "The text gives this exact example as a common rubric-reader rejection: the response uses the word \"purpose\" but then provides a function description (\"display a streak count\") with no audience and no benefit. Word presence does not satisfy the rubric — substance does."}, {"text": "\"My program helps beginner athletes track their first month of training so they can identify which exercises they tend to skip.\"", "isCorrect": false, "rationale": "This response names an audience (beginner athletes), a problem (skipping exercises), and a benefit (identification of patterns). It follows the textbook purpose-statement structure and would earn the point."}, {"text": "\"My program supports home cooks who are managing leftover ingredients by suggesting recipes that use them up before spoilage.\"", "isCorrect": false, "rationale": "This response names a specific audience, a real-world problem (ingredient spoilage), and a benefit (waste reduction). It is precisely the kind of high-scoring response the section recommends."}, {"text": "\"This program serves club officers who need to share contact lists with new members but currently rely on manual emails that are error-prone.\"", "isCorrect": false, "rationale": "Audience (club officers), problem (manual error-prone emails), and benefit (sharing reliably) — all rubric requirements are satisfied. This earns the purpose point."}]}, {"question": "According to the section, what specific characteristic distinguishes a high-scoring purpose response from a low-scoring one in the eyes of the rubric reader?", "options": [{"text": "The high-scoring response is specific enough that a reader who has never seen the program understands why a human being would want to run it.", "isCorrect": true, "rationale": "Specificity is the explicit criterion: the response must name the audience, the problem, and the benefit in enough detail that the reader grasps the program's value without seeing the code."}, {"text": "The high-scoring response uses programming terminology like \"loop,\" \"variable,\" and \"function\" precisely.", "isCorrect": false, "rationale": "Those terms describe function, not purpose. Using them in a purpose response indicates the writer has confused the two rubric categories — the exact mistake Section 9.1 warns against."}, {"text": "The high-scoring response is at least 500 words long.", "isCorrect": false, "rationale": "Length is not the criterion. The text says two to four well-crafted sentences are typically sufficient. Brevity with the right elements outscores verbosity that misses the audience-problem-benefit triad."}, {"text": "The high-scoring response includes line numbers from the source code.", "isCorrect": false, "rationale": "Line-number citation is a feature of high-scoring Algorithm Development and Abstraction responses. The Program Purpose row asks who benefits and why — line numbers are not relevant there."}]}, {"question": "Why does the section emphasize that \"My program helps people be more organized\" — even though it sounds purpose-flavored — fails to earn the purpose point?", "options": [{"text": "It is accurate but abstract — it names no specific audience and no specific problem, so a reader cannot identify the intended user or the real-world friction the program addresses.", "isCorrect": true, "rationale": "The text lists this exact response as a common rubric-reader rejection. Vague generality without a specific audience or problem fails even when the helping verb suggests purpose."}, {"text": "The phrase \"more organized\" is a subjective claim that cannot be verified by the reader.", "isCorrect": false, "rationale": "Verification is not the rubric standard. The actual problem is the response's lack of specificity about who and what — not whether the claim is provable."}, {"text": "The word \"helps\" is reserved for nonprofit programs only under College Board rules.", "isCorrect": false, "rationale": "There is no such restriction. The verb \"helps\" appears in many high-scoring example responses; the issue is what follows it (or fails to)."}, {"text": "The response is too long and would exceed the word limit for the Program Purpose row.", "isCorrect": false, "rationale": "There is no word ceiling on this response. The given example is in fact too short on substance, not too long."}]}, {"question": "Suppose you are given the function statement: \"My program reads a city name and displays the current temperature in Celsius and Fahrenheit.\" Which rewrite would best convert this into a rubric-aligned purpose statement?", "options": [{"text": "\"My program helps travelers planning multi-country trips quickly compare weather across destinations in their native temperature scale, so they can pack appropriately without manually converting units.\"", "isCorrect": true, "rationale": "This rewrite supplies the three rubric pieces: audience (travelers planning multi-country trips), problem (manual unit conversion), and benefit (appropriate packing). It mirrors the purpose-statement pattern from the section's worked examples."}, {"text": "\"My program uses an API to fetch temperature data and converts it using a multiplication formula.\"", "isCorrect": false, "rationale": "This describes implementation (API + formula) — pure function. It is more detailed than the original but still names no audience or benefit."}, {"text": "\"My program is for everyone who wants to know temperatures.\"", "isCorrect": false, "rationale": "\"Everyone who wants to know temperatures\" is not a specific audience, and the rewrite identifies no real-world friction. The rubric flags this kind of abstract response as a zero-point pattern."}, {"text": "\"My program runs three loops and prints two numbers.\"", "isCorrect": false, "rationale": "This is a function statement and an even less helpful one than the original — fewer details about either function or purpose."}]}, {"question": "The rubric language for the Program Purpose and Function row includes the phrase \"the problem, purpose, or need the program addresses.\" Why does the section instruct students to mirror this language back to the reader?", "options": [{"text": "Because a response that uses the same vocabulary the rubric uses (e.g., \"the problem my program addresses is...\") is harder for a reader to deny the point — the matching phrasing maps the response directly onto the scoring criterion.", "isCorrect": true, "rationale": "This is the explicit reasoning given in the section. Mirroring rubric vocabulary makes the alignment between response and scoring criterion mechanical, reducing reader subjectivity."}, {"text": "Because the College Board uses an automated grader that searches for exact phrase matches.", "isCorrect": false, "rationale": "The Create PT Written Response is human-graded, not auto-scored. The reasoning for mirroring is to align with what the human reader is checking, not to game an algorithm."}, {"text": "Because the rubric language counts as protected legal text and must be quoted to avoid plagiarism violations.", "isCorrect": false, "rationale": "There is no plagiarism rule in play here. The recommendation to mirror language is strategic for scoring, not legal."}, {"text": "Because using rubric language doubles the points awarded for the Purpose row.", "isCorrect": false, "rationale": "The Purpose sub-item is binary (1 point or 0). There is no doubling mechanism — mirroring language only helps you reach the threshold, not exceed it."}]}, {"question": "Stimulus: A student writes the following Written Response and submits it: \"This program helps users who feel stuck. It has a list and uses a procedure.\" Predict the rubric outcome and explain.", "options": [{"text": "Zero on the purpose sub-item — the audience phrase \"users who feel stuck\" is too abstract to identify a specific population, and the second sentence describes implementation rather than the real-world problem or benefit.", "isCorrect": true, "rationale": "The section gives \"users who feel stuck\" as an example of an audience phrase but warns that bare phrases without concrete problem and benefit detail still fail. Adding \"has a list and uses a procedure\" reverts to function description."}, {"text": "Full credit because the response uses the verb \"helps\" and mentions a list and a procedure.", "isCorrect": false, "rationale": "The verb \"helps\" alone does not earn purpose credit. The response must specify a concrete audience, problem, and benefit — and the second sentence here is implementation, which belongs in different rubric rows."}, {"text": "Partial credit because mentioning a list always earns the data-abstraction sub-item by association.", "isCorrect": false, "rationale": "Data Abstraction is a separate rubric row scored on its own evidence. Mentioning a list in the Purpose response does not transfer credit between rows."}, {"text": "Full credit on the purpose sub-item if the Written Response is at least 50 words.", "isCorrect": false, "rationale": "Word count is not a rubric criterion. The section explicitly says brevity that names audience and benefit can score full marks; padding without those elements does not."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
