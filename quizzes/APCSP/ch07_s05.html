        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Sequential, Parallel, and Distributed Computing</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A program is 80% parallelizable and 20% inherently sequential. According to Amdahl's Law (no formula required), what is the maximum speedup achievable with any number of processors?", "options": [{"text": "Effectively unlimited — adding processors continues to improve speed indefinitely.", "isCorrect": false, "rationale": "Adding processors only helps the parallelizable portion. The 20% sequential part remains a bottleneck, capping the total speedup regardless of processor count."}, {"text": "At most 5x — even with infinitely many processors working on the parallel portion, the 20% sequential portion still takes its full original time. The runtime cannot drop below that 20%, so total speedup is bounded by 1/0.2 = 5.", "isCorrect": true, "rationale": "This is the textbook Amdahl statement (no formula required to reason it out). The sequential portion is the bottleneck. A program 20% sequential cannot exceed 5x speedup; 50% sequential cannot exceed 2x; 90% sequential cannot exceed about 10x."}, {"text": "At most 2x — because parallel execution adds overhead.", "isCorrect": false, "rationale": "2x is the limit for a 50%-sequential program, not a 20%-sequential one. With 80% parallelizable, the limit is 5x."}, {"text": "At most 1.25x — the parallel portion shrinks to nearly zero, but the sequential portion stays the same.", "isCorrect": false, "rationale": "If the parallel portion shrinks to zero, the program runtime drops from 1.0 to 0.2 (the sequential portion alone). The speedup is 1/0.2 = 5x, not 1.25x."}], "id": "q01"}, {"question": "Which of the following BEST describes a workload that is naturally parallel — that is, decomposable into independent sub-tasks that can truly run simultaneously?", "options": [{"text": "Computing the running total of a list, where each new total depends on the previous one.", "isCorrect": false, "rationale": "Running totals are inherently sequential: each step depends on the previous result. No amount of parallelism can speed up a chain of dependencies."}, {"text": "Matrix multiplication, where each output element is the dot product of one row and one column. The dot products are independent of each other, so a GPU with thousands of cores can compute many of them simultaneously.", "isCorrect": true, "rationale": "The section gives matrix multiplication as the canonical example of natural parallelism. Each element of the output matrix is independent, so the work distributes cleanly across many cores. This is why GPUs became the workhorse of machine learning — neural network training is essentially continuous matrix multiplication."}, {"text": "Reading a single file character by character to count vowels.", "isCorrect": false, "rationale": "Single-pass character counting on one file is naturally sequential. While the work could be split across chunks of the file, this is more nuanced than the textbook 'naturally parallel' example. The matrix-multiplication answer is the section's clearer example."}, {"text": "Compiling a program in which each function depends on the next.", "isCorrect": false, "rationale": "Dependencies between compilation units force sequential ordering. Independent sub-tasks are required for true parallelism."}], "id": "q02"}, {"question": "A researcher wants to analyze a 100-terabyte astronomical dataset for signs of unusual stellar behavior. Which computing model is most appropriate, and why?", "options": [{"text": "Sequential — a single processor will work given enough patience.", "isCorrect": false, "rationale": "100 TB is far too large for sequential analysis. Even a fast single processor would take an impractical time, and a single machine probably cannot hold the data in memory or storage."}, {"text": "Parallel computing on a single multi-core machine — split the data across the machine's cores.", "isCorrect": false, "rationale": "100 TB exceeds the storage and memory of any single machine that could realistically be available to a research team. The dataset itself does not fit on one machine."}, {"text": "Distributed computing — the dataset and the workload are too large for any single machine, so many machines (with their own storage, memory, and CPUs) cooperate over a network. This is the regime cloud and large-cluster systems are built for.", "isCorrect": true, "rationale": "The section is explicit that distributed computing is the right choice when the problem or data is too large for one machine. 100 TB datasets routinely live in distributed storage systems (Google File System, HDFS) and are processed by distributed frameworks (MapReduce-style)."}, {"text": "Sequential, with the dataset compressed first.", "isCorrect": false, "rationale": "Compression cannot reduce 100 TB to a sequentially processable size in any practical sense. Even compressed by 10x, 10 TB still exceeds single-machine constraints for active processing."}], "id": "q03"}, {"question": "Which of the following BEST distinguishes parallel computing from distributed computing?", "options": [{"text": "They are two names for the same thing.", "isCorrect": false, "rationale": "They are distinct. Parallel computing uses multiple processors on the same machine; distributed computing uses multiple machines cooperating over a network."}, {"text": "Parallel computing uses multiple processors (or cores) on the same machine, sharing memory; distributed computing uses many independent machines (each with its own CPU, memory, and storage) cooperating over a network. Distributed computing brings new challenges: network latency, partial failures, and coordination overhead.", "isCorrect": true, "rationale": "This is the section's exact distinction. Parallel computing keeps everything in one machine and benefits from shared memory; distributed computing spans many machines, gaining scale at the cost of coordination complexity and network costs."}, {"text": "Parallel computing is slower than distributed computing.", "isCorrect": false, "rationale": "Speed comparison depends on the problem. For a small problem that fits in one machine, parallel is faster (no network overhead). For a problem too large for one machine, distributed is the only feasible option."}, {"text": "Parallel computing requires a network; distributed computing does not.", "isCorrect": false, "rationale": "It is the reverse. Distributed computing requires a network because machines must communicate; parallel computing on a single machine does not."}], "id": "q04"}, {"question": "The section identifies SETI@home as a famous example of distributed computing. What was its key architectural insight?", "options": [{"text": "Volunteers donated idle CPU cycles on home computers worldwide; SETI@home distributed radio-telescope data analysis to those machines, then collected the results centrally. At its peak, the system was one of the most powerful computing platforms on Earth — built entirely from donated idle time.", "isCorrect": true, "rationale": "The section makes exactly this point. SETI@home (1999-2020) showed that distributed computing could harness millions of low-cost, geographically dispersed machines to attack a problem too large for any single supercomputer."}, {"text": "It used a single supercomputer in California to do all the analysis.", "isCorrect": false, "rationale": "The opposite. The point of SETI@home was to bypass the cost of a central supercomputer by distributing work across volunteers' personal computers."}, {"text": "It analyzed digital photographs of stars submitted by amateur astronomers.", "isCorrect": false, "rationale": "SETI@home processed radio-telescope data, not photographs. The data came from existing radio observatories."}, {"text": "It was a closed-source project run only by university researchers.", "isCorrect": false, "rationale": "The whole model required public participation; volunteers ran client software on their own machines. It was open to anyone with an Internet connection."}], "id": "q05"}, {"question": "Why are GPUs (graphics processing units) the preferred hardware for training modern neural networks, despite originally being designed for video game graphics?", "options": [{"text": "GPUs have higher clock speeds than CPUs.", "isCorrect": false, "rationale": "CPUs typically have higher clock speeds. GPUs win on parallelism (thousands of cores), not on per-core speed."}, {"text": "GPUs have thousands of cores designed to compute many independent operations simultaneously, which matches neural network training's workload — continuous matrix multiplication, where each output element is an independent dot product.", "isCorrect": true, "rationale": "The section makes exactly this connection. Matrix multiplication parallelism, originally exploited for rendering 3D graphics in games, turns out to be exactly the structure of neural-network training."}, {"text": "GPUs are cheaper than CPUs per dollar.", "isCorrect": false, "rationale": "GPUs are not categorically cheaper. The advantage is structural — match between hardware parallelism and workload parallelism — not price."}, {"text": "GPUs have larger memory than CPUs.", "isCorrect": false, "rationale": "GPU memory is typically smaller than system RAM. The advantage is parallel cores, not memory size."}], "id": "q06"}, {"question": "If a sequential program takes 100 seconds and is split such that 50% can be perfectly parallelized but 50% cannot, what is the maximum possible runtime when running on infinitely many processors? What does this illustrate?", "options": [{"text": "The runtime falls to 50 seconds, illustrating that the inherently sequential portion sets a hard floor on speed regardless of processor count. This is Amdahl's Law in action.", "isCorrect": true, "rationale": "The 50% parallel portion shrinks to nearly zero with infinite processors, but the 50% sequential portion still takes 50 seconds. Maximum speedup is therefore 2x. The section emphasizes this hard ceiling: the sequential portion is the bottleneck."}, {"text": "The runtime falls to nearly zero, because infinite processors can solve any problem instantly.", "isCorrect": false, "rationale": "Infinite processors cannot accelerate inherently sequential code. The sequential half remains a constant cost, no matter how many processors are added."}, {"text": "The runtime falls to 1 second, because the parallel portion completes in 1 second on infinite processors.", "isCorrect": false, "rationale": "Even if the parallel portion completes instantly, the 50-second sequential portion still has to run. Total runtime is bounded below by the sequential portion's runtime."}, {"text": "The runtime increases because infinite processors create coordination overhead that exceeds any benefit.", "isCorrect": false, "rationale": "While coordination overhead is real in practice, the question asks for the theoretical limit, where adding processors never makes the program slower than the sequential portion's runtime alone."}], "id": "q07"}, {"question": "Cloud computing — services like Google Cloud, Amazon Web Services, and Microsoft Azure — is described in the section as a form of distributed computing. What does this imply about where the user's computation actually runs?", "options": [{"text": "It runs on a single dedicated machine that the user owns and physically controls.", "isCorrect": false, "rationale": "Cloud computing's defining feature is that the user does not own or control the physical machine. The 'cloud' is an abstraction over a global pool of resources."}, {"text": "The user typically does not know which physical machine runs their computation. The cloud provider operates hundreds of thousands of servers in many data centers worldwide; the user submits work, and the provider's distributed systems schedule it onto whichever machines are available.", "isCorrect": true, "rationale": "This is exactly how the section describes cloud computing. Distributed computing is the architectural foundation; the user gets on-demand computing, storage, and databases without seeing or managing the underlying machines."}, {"text": "It runs on the user's home computer, but the data is stored remotely.", "isCorrect": false, "rationale": "Cloud computing means the computation itself runs in the provider's data centers, not on the user's home computer. Storage is also remote, but computation is the key part."}, {"text": "It runs on a single supercomputer that all cloud users share.", "isCorrect": false, "rationale": "There is no single shared supercomputer. Cloud computing runs across hundreds of thousands of independent servers across many data centers."}], "id": "q08"}, {"question": "A 1-million-element list is summed by a single sequential loop on a fast CPU; the result is computed in milliseconds. The section notes that the same approach 'does not improve if we have 1 billion elements.' Why is this a fundamental limit of sequential computing?", "options": [{"text": "Because sequential program execution time scales linearly with workload — 1 billion elements is 1,000x more work than 1 million, and a single processor cannot exceed its own speed regardless of problem size.", "isCorrect": true, "rationale": "This is the section's exact framing. Sequential runtime grows linearly with the number of items processed; throughput is bounded by single-processor speed. To exceed it you must either parallelize (multiple processors on one machine) or distribute (multiple machines)."}, {"text": "Because Python is too slow to handle 1 billion items.", "isCorrect": false, "rationale": "The limit is structural, not language-specific. Even the fastest possible language would face the same linear scaling ceiling on a single processor."}, {"text": "Because 1 billion elements exceeds the maximum integer in standard programming languages.", "isCorrect": false, "rationale": "Modern languages handle 1 billion-element collections fine in terms of indexing. The limit is execution time, not numeric range."}, {"text": "Because sequential computing cannot perform additions.", "isCorrect": false, "rationale": "Sequential computing performs additions perfectly well. The limit is just throughput at scale, not the operation itself."}], "id": "q09"}, {"question": "Which statement BEST captures how sequential, parallel, and distributed computing form a spectrum of trade-offs?", "options": [{"text": "Sequential is simplest to reason about but slowest at scale; parallel adds processors on the same machine for naturally parallel workloads; distributed adds many machines for problems too large for one machine. Each model trades simplicity for scale, and Amdahl's Law constrains the gains from parallelism — the sequential portion is the ultimate bottleneck.", "isCorrect": true, "rationale": "This is the section's closing key concept verbatim in spirit. The three models form a spectrum, and the choice depends on the problem's size, decomposability, and the engineer's tolerance for coordination complexity."}, {"text": "Distributed computing is always best.", "isCorrect": false, "rationale": "Distributed computing is the most complex model and adds network latency, partial failures, and coordination overhead. For small interdependent tasks, sequential or parallel computing is the better fit."}, {"text": "Sequential computing is obsolete and should never be used.", "isCorrect": false, "rationale": "Sequential computing is still the right choice for small problems, interdependent tasks, or when simplicity matters more than scale. Most everyday programs run sequentially."}, {"text": "Parallel and distributed computing always run identical algorithms with no extra concerns.", "isCorrect": false, "rationale": "Distributed computing introduces concerns parallel computing does not face — network latency, partial machine failures, coordination over slow links. Algorithms are often redesigned to handle them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
