    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Capstone: Building the Study Streak Tracker</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which set of items lists the four Create PT code requirements that the Study Streak Tracker is designed to satisfy?", "options": [{"text": "Recursion, classes, exception handling, and unit tests.", "isCorrect": false, "rationale": "The Create PT does not require recursion, classes, or exception handling. It evaluates a different four-item list focused on input, list, parameterized procedure, and output."}, {"text": "Input from the user, a list used to manage complexity, a student-developed parameterized procedure with sequencing/selection/iteration, and output to the user.", "isCorrect": true, "rationale": "These are the exact four code requirements graded on the rubric. Tracker v2 satisfies each: append-style data input, study_records as the list, compute_streak as the parameterized procedure with all three constructs, and print statements as the output."}, {"text": "GUI, mobile build, server hosting, and database.", "isCorrect": false, "rationale": "These are not Create PT requirements. The PT is graded on the four code requirements above, plus written-response items."}, {"text": "Big-O notation, design patterns, version control, and unit tests.", "isCorrect": false, "rationale": "While good practice, none of these are explicit code requirements on the Create PT rubric."}]}, {"question": "A classmate says: 'My procedure is rubric-compliant because it calls a for loop.' What follow-up question BEST checks rubric compliance?", "options": [{"text": "What is the time complexity of your loop?", "isCorrect": false, "rationale": "Big-O is not on the Create PT rubric. The rubric checks structural code requirements, not efficiency."}, {"text": "Is the for loop, an if statement, AND a sequence of statements all INSIDE the procedure body, and does the procedure have at least one parameter?", "isCorrect": true, "rationale": "The rubric requires sequencing, selection, AND iteration to live INSIDE the procedure body, and the procedure must have at least one parameter. Calling a for loop somewhere in the program is not enough."}, {"text": "Does your loop run at least 100 times?", "isCorrect": false, "rationale": "Loop count is not on the rubric. A loop that runs once still satisfies the iteration requirement."}, {"text": "Did you write the loop in Python or AP Pseudocode?", "isCorrect": false, "rationale": "The rubric is language-agnostic at this level (you write in the language of your course). The structural requirements are the same in either."}]}, {"question": "Trace this procedure with the sample data in the capstone:\n\nstudy_records contains math entries on 2025-09-01 (45 min), 09-02 (60), 09-03 (35), 09-04 (50), 09-06 (30) — and other subjects.\n\nWhat is compute_streak(study_records, 'math')?", "options": [{"text": "1", "isCorrect": false, "rationale": "Math has multiple consecutive qualifying days. The streak is longer than 1."}, {"text": "4", "isCorrect": true, "rationale": "Math days >= 30 minutes: 09-01, 09-02, 09-03, 09-04, 09-06. The first four are consecutive (streak of 4). 09-05 has no math, then 09-06 starts a new run of length 1. The longest streak is 4."}, {"text": "5", "isCorrect": false, "rationale": "There is a one-day gap between 09-04 and 09-06 (no math on 09-05). The streak does not span gaps."}, {"text": "0", "isCorrect": false, "rationale": "Math has plenty of qualifying days. compute_streak only returns 0 when there are no qualifying records."}]}, {"question": "On the same sample data, what is compute_streak(study_records, 'spanish')?", "options": [{"text": "0", "isCorrect": true, "rationale": "There are no spanish records in the data. compute_streak returns 0 immediately when the qualifying-dates list is empty."}, {"text": "1", "isCorrect": false, "rationale": "compute_streak returns 0, not 1, when there are no qualifying records."}, {"text": "8", "isCorrect": false, "rationale": "8 is the total record count across all subjects. Spanish has zero entries on its own."}, {"text": "Error: subject not found.", "isCorrect": false, "rationale": "The procedure does not raise an error for unknown subjects. It simply produces an empty qualifying-dates list and returns 0."}]}, {"question": "On the AP free response, the Function & Purpose rubric row asks two related questions. Which choice BEST states the function of compute_streak?", "options": [{"text": "It helps students identify which subjects they are studying consistently.", "isCorrect": false, "rationale": "That is the PURPOSE — why a user wants the procedure. The function is what the code DOES."}, {"text": "It iterates over a list of study records, filters for the target subject with at least 30 minutes, and returns the length of the longest consecutive-day streak.", "isCorrect": true, "rationale": "The function is a description of the computation: input (records, target_subject), processing (filter, sort, walk consecutively), output (the longest streak length). Pure computation, no user-benefit language."}, {"text": "It runs in O(n log n) time.", "isCorrect": false, "rationale": "Big-O analysis is not what the function row asks for. The function is a description of behavior, not efficiency."}, {"text": "It is a parameterized procedure with sequencing, selection, and iteration.", "isCorrect": false, "rationale": "That states the rubric structure, not what the procedure DOES. The function row asks what the code computes."}]}, {"question": "Which choice BEST states the purpose of compute_streak?", "options": [{"text": "It iterates over study_records and returns the streak.", "isCorrect": false, "rationale": "That is the FUNCTION — what the code does. Purpose is the user benefit."}, {"text": "It helps students identify which subjects they are studying consistently, so they can detect gaps before an exam and adjust their schedule.", "isCorrect": true, "rationale": "Purpose names a real user need (study consistency, spotting gaps) and how the procedure helps them act on it. Chief Reader Reports note that students who only describe function lose this rubric row."}, {"text": "It satisfies the parameterized procedure rubric requirement.", "isCorrect": false, "rationale": "That is a structural fact, not a user benefit. Purpose must explain WHY a user would want the procedure."}, {"text": "It is the most efficient way to count a streak.", "isCorrect": false, "rationale": "Efficiency claims are not the purpose row. Purpose is the user-facing rationale for the procedure's existence."}]}, {"question": "Translate the Python header def compute_streak(records, target_subject): into AP Pseudocode.", "options": [{"text": "FUNCTION compute_streak(records, target_subject):", "isCorrect": false, "rationale": "AP Pseudocode uses PROCEDURE, not FUNCTION, and does not use a colon after the header."}, {"text": "PROCEDURE compute_streak(records, target_subject)", "isCorrect": true, "rationale": "Replace def with PROCEDURE, drop the trailing colon, and the parameter list inside the parentheses stays the same. Curly braces will surround the body that follows."}, {"text": "def compute_streak[records, target_subject]", "isCorrect": false, "rationale": "AP Pseudocode parameters use parentheses, just like Python; square brackets are for indexing. AP Pseudocode also uses PROCEDURE, not def."}, {"text": "PROCEDURE compute_streak {records, target_subject}", "isCorrect": false, "rationale": "Curly braces wrap the BODY, not the parameter list. The parameter list goes inside parentheses."}]}, {"question": "Which Python call is the AP Pseudocode equivalent of compute_streak(study_records, 'math')?", "options": [{"text": "result = compute_streak(study_records, 'math')", "isCorrect": false, "rationale": "That is the Python form (uses = for assignment). The AP Pseudocode equivalent uses <- for assignment."}, {"text": "result <- compute_streak(study_records, 'math')", "isCorrect": true, "rationale": "AP Pseudocode replaces Python's = with <-. The procedure name and arguments inside parentheses stay the same. (Whether you assign the result depends on the call site; the question is about the call form.)"}, {"text": "compute_streak('math', study_records)", "isCorrect": false, "rationale": "Argument order matters. The procedure expects records first, target_subject second. Reversing them binds 'math' to records and study_records to target_subject — wrong data."}, {"text": "PROCEDURE compute_streak(study_records, 'math')", "isCorrect": false, "rationale": "PROCEDURE is the keyword for DEFINING a procedure, not calling one. A call site does not include the keyword."}]}, {"question": "Look at the rubric-checklist version of Tracker v2:\n\ndef compute_streak(records, target_subject):\n    qualifying_dates = []\n    for record in records:\n        rd, subject, minutes = record\n        if subject == target_subject and minutes >= 30:\n            qualifying_dates.append(rd)\n    if len(qualifying_dates) == 0:\n        return 0\n    unique_dates = sorted(set(qualifying_dates))\n    longest = 1\n    current = 1\n    for i in range(1, len(unique_dates)):\n        prev = date.fromisoformat(unique_dates[i-1])\n        cur = date.fromisoformat(unique_dates[i])\n        if (cur - prev).days == 1:\n            current += 1\n            if current > longest:\n                longest = current\n        else:\n            current = 1\n    return longest\n\nWhich rubric-required constructs appear INSIDE the procedure body?", "options": [{"text": "Sequencing only.", "isCorrect": false, "rationale": "There are also if statements (selection) and for loops (iteration) inside the body."}, {"text": "Selection and iteration, but no sequencing.", "isCorrect": false, "rationale": "Statements like qualifying_dates.append(rd), unique_dates = sorted(...), longest = 1 — those are sequencing."}, {"text": "Sequencing (statement-after-statement), selection (the if checks), and iteration (the two for loops) — all three.", "isCorrect": true, "rationale": "All three Create PT constructs live inside the procedure body. Plus the procedure has a parameter (records, target_subject), satisfying the parameterized requirement."}, {"text": "Only iteration; the if statements are part of the for loop, not separate constructs.", "isCorrect": false, "rationale": "An if inside a for loop still counts as both selection AND iteration. The rubric grades the presence of each construct, not their nesting."}]}, {"question": "Which Create PT code requirement does the line study_records.append(('2025-09-01', 'math', 45)) satisfy in Tracker v2?", "options": [{"text": "The student-developed parameterized procedure requirement.", "isCorrect": false, "rationale": "The procedure requirement is satisfied by compute_streak, not by the data-population lines."}, {"text": "The input requirement (data entering the program) AND the list-used-to-manage-complexity requirement (study_records is a list).", "isCorrect": true, "rationale": "Each append call adds one piece of input data to the program. study_records is the list that manages all the data instead of separate variables per day. Both rubric requirements are visible in this single line."}, {"text": "The output requirement.", "isCorrect": false, "rationale": "Output is satisfied by print statements at the end of the program, not by the data-population lines."}, {"text": "The selection requirement.", "isCorrect": false, "rationale": "Selection means an if/elif/else statement, which appears inside compute_streak. Append is sequencing, not selection."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
