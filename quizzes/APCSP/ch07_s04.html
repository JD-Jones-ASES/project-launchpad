<body>
<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Fault Tolerance and Network Design</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which BEST distinguishes redundancy from fault tolerance, and how do they jointly contribute to the Internet's resilience?", "options": [{"text": "They are synonyms — both mean the absence of failure.", "isCorrect": false, "rationale": "They are not synonyms. Redundancy is a structural property (multiple paths or components); fault tolerance is a behavioral property (continuing service during failure). Each contributes differently."}, {"text": "Redundancy is the inclusion of extra components or paths so that if one fails another can take over; fault tolerance is the property of continuing to operate correctly even when some components fail. Redundancy provides the raw material; fault tolerance is the system-level outcome.", "isCorrect": true, "rationale": "This matches the section's definitions exactly. Redundancy is the design feature (multiple submarine cables, multiple BGP peers, multi-region data centers). Fault tolerance is the resulting capability — service continues during failures because redundancy plus dynamic routing routes around the failure."}, {"text": "Fault tolerance prevents failures from happening; redundancy means duplicating data inside a single server.", "isCorrect": false, "rationale": "Fault tolerance does not prevent failures — it allows the system to continue functioning when failures do happen. Redundancy refers to multiple components or paths, not internal data duplication."}, {"text": "Redundancy increases the speed of the network; fault tolerance increases the bandwidth.", "isCorrect": false, "rationale": "Neither redundancy nor fault tolerance is primarily about speed or bandwidth. Both concern resilience under failure."}], "id": "q01"}, {"question": "The Internet has grown from 4 nodes (ARPANET, 1969) to roughly 15 billion connected devices today, without a fundamental architectural redesign. Which property of the Internet makes this possible?", "options": [{"text": "A central registry that grants permission to every new device.", "isCorrect": false, "rationale": "There is no central permission-granting authority. New devices and networks join by implementing the existing protocols — that is precisely the property the section emphasizes."}, {"text": "Scalability — the property that lets the Internet absorb more users, devices, and networks by adding capacity at the edges, requiring only that new participants implement the existing protocols. Distributed, hierarchical architecture means no architectural change is needed in existing hardware.", "isCorrect": true, "rationale": "The section defines scalability and credits the Internet's distributed, hierarchical architecture as the source. New autonomous systems can be added at the edges without affecting the core. IPv6 was designed specifically to extend scalability."}, {"text": "A monolithic backbone replaced every five years.", "isCorrect": false, "rationale": "The backbone is incrementally upgraded, not replaced wholesale. Scalability comes from the protocol-and-edge design, not from periodic rebuilds."}, {"text": "Federal regulation that prohibits architectural change.", "isCorrect": false, "rationale": "There is no such regulation. Scalability is an architectural property, not a regulatory one."}], "id": "q02"}, {"question": "Explain the end-to-end principle in the words of the section. Which of the following is the BEST one-line summary?", "options": [{"text": "Application-specific functions should be implemented at the communicating endpoints (clients and servers) rather than in the network's interior. Routers should focus on forwarding packets; reliability, ordering, encryption, and application semantics belong at the edges.", "isCorrect": true, "rationale": "This matches the section's articulation of the principle, traced to the 1984 Saltzer/Reed/Clark paper. The slogan: smarts at the edges, dumb pipes in the middle. The consequences include innovation at the edges, simplicity in the core, and generality across applications."}, {"text": "All Internet routers must implement TLS encryption for every packet.", "isCorrect": false, "rationale": "The end-to-end principle says exactly the opposite: the network core should remain simple. Encryption is an end-to-end concern provided by TLS at the endpoints."}, {"text": "Every Internet application must be approved by a central authority before deployment.", "isCorrect": false, "rationale": "The end-to-end principle makes such approval unnecessary. Anyone can invent a new application protocol because the network does not need to know about it."}, {"text": "Functionality should be packed into the routers wherever possible to maximize their utility.", "isCorrect": false, "rationale": "This is the opposite of the principle. Putting application functionality into routers would limit innovation, complicate the core, and harm scalability."}], "id": "q03"}, {"question": "Paul Baran's 1964 RAND report 'On Distributed Communications' contrasted two network architectures. Which architecture survived enemy attack on a substantial fraction of nodes, and what trait gave it that survivability?", "options": [{"text": "The centralized architecture, because all traffic routes through a single hardened hub.", "isCorrect": false, "rationale": "A single hub is the worst case for survivability. Destroying the hub destroys the network. Baran's analysis pointed against centralization."}, {"text": "The distributed architecture, in which many nodes each have multiple connections to neighbors. Destroying any subset of nodes leaves remaining nodes interconnected through alternative paths.", "isCorrect": true, "rationale": "This is exactly the conclusion of Baran's analysis as the section presents it. ARPANET was built on the distributed model, and every Internet architecture since has inherited the property."}, {"text": "Both architectures failed equally; survivability is a myth.", "isCorrect": false, "rationale": "The section explicitly states that distributed networks could survive substantial losses while centralized networks could not."}, {"text": "The distributed architecture, because every node was reinforced with concrete.", "isCorrect": false, "rationale": "Survivability comes from topology (multiple paths), not from physical hardening of individual nodes."}], "id": "q04"}, {"question": "In late January and early February 2008, multiple submarine cables in the Mediterranean and Middle East were severed. Internet traffic in the affected regions dropped 60-80% at the moment of each cut, but within hours to days traffic was rerouted through surviving cables. What does this real-world event illustrate?", "options": [{"text": "That the Internet has no fault tolerance whatsoever — it failed completely.", "isCorrect": false, "rationale": "The Internet did not fail completely. Service was reduced but service continued; that is graceful degradation, the hallmark of fault-tolerant systems."}, {"text": "Both the Internet's fault tolerance (traffic found alternative paths) and its limits (concentrated infrastructure creates real bottlenecks that rerouting cannot fully compensate for in the short term).", "isCorrect": true, "rationale": "The section is explicit on both points. Rerouting works; but if much of a region's capacity passes through a small number of cables, rerouting capacity may fall short of demand until repairs are made or alternate routes provisioned."}, {"text": "That the Internet permanently failed in the affected regions.", "isCorrect": false, "rationale": "Service was restored as traffic rerouted; no permanent regional failure occurred. The case study explicitly contrasts degraded performance with complete failure."}, {"text": "That submarine cables are not actually used to carry Internet traffic.", "isCorrect": false, "rationale": "Submarine cables are the physical backbone for international Internet traffic. The cuts caused real disruption because so much capacity is genuinely fiber-based."}], "id": "q05"}, {"question": "A fault-tolerant system must satisfy two properties: failure detection and graceful degradation. What does graceful degradation mean in the Internet context?", "options": [{"text": "The network must detect every failure with 100% accuracy before any user experiences degradation.", "isCorrect": false, "rationale": "Detection is the first property; graceful degradation is the second, and it is about behavior under failure, not detection accuracy."}, {"text": "The system continues to provide service at reduced capacity rather than simply stopping. A network with ten paths between two cities can still route traffic if seven paths fail; it may be slower, but it does not 'go down.'", "isCorrect": true, "rationale": "The section gives precisely this definition and example. Graceful degradation produces a proportional, partial reduction in capacity — the hallmark of a well-designed fault-tolerant system."}, {"text": "It means the network rejects all packets during a failure to prevent overload.", "isCorrect": false, "rationale": "Rejecting all packets is failure, not graceful degradation. The point is to keep providing service during failure."}, {"text": "It refers to old hardware that runs slowly because of degradation over time.", "isCorrect": false, "rationale": "Graceful degradation is a system-design property under failure, unrelated to hardware aging."}], "id": "q06"}, {"question": "Which of the following is an example of physical redundancy in the Internet's infrastructure?", "options": [{"text": "Every router runs the same operating system.", "isCorrect": false, "rationale": "Operating system uniformity is not redundancy. Redundancy is having multiple components or paths so failure of one does not destroy service."}, {"text": "Critical ocean routes (such as the North Atlantic) are served by multiple independent submarine cables, so a cut in one is rerouted through others within seconds.", "isCorrect": true, "rationale": "The section lists submarine-cable redundancy explicitly. Other examples include Internet Exchange Points, multi-region data centers, and BGP peering with multiple upstream ISPs."}, {"text": "Every domain name has only one authoritative DNS server.", "isCorrect": false, "rationale": "Operators run multiple authoritative DNS servers per domain — that is itself a redundancy practice. Having only one would defeat the purpose."}, {"text": "All Tier 1 ISPs share a single fiber strand.", "isCorrect": false, "rationale": "The opposite is true. Tier 1 ISPs run independent backbones with many strands; this multiplicity is a key form of redundancy."}], "id": "q07"}, {"question": "BGP 'fat finger' incidents — such as the 2010 China Telecom and 2019 Pittsburgh ISP route leaks — illustrate which limitation of fault tolerance?", "options": [{"text": "That the Internet's fault tolerance fails completely under any logical error.", "isCorrect": false, "rationale": "Fault tolerance does not fail completely; the same BGP that propagates errors also propagates corrections. The lesson is more nuanced: infrastructure-level fault tolerance does not perfectly cover logical-level errors."}, {"text": "That fault tolerance operates well at the infrastructure level (a cut cable can be rerouted) but not necessarily at the logical level (a misconfigured routing protocol can redirect traffic globally within minutes before being detected and corrected).", "isCorrect": true, "rationale": "This is the lesson the section draws explicitly. Physical redundancy handles physical failures; logical correctness of routing announcements is a separate concern that BGP's update cycle handles slowly compared to physical rerouting."}, {"text": "That BGP is not used by the Internet anymore.", "isCorrect": false, "rationale": "BGP remains the inter-AS routing protocol of the Internet. The fat-finger events did not retire it; they prompted ongoing work on route-origin authentication."}, {"text": "That all packet routing must be approved by a central agency.", "isCorrect": false, "rationale": "There is no central approval authority for routing. Distributed BGP propagation is the norm; protections against route leaks are added through additional mechanisms (RPKI), not central control."}], "id": "q08"}, {"question": "A direct consequence of the end-to-end principle is that anyone can invent a new application protocol — Zoom, BitTorrent, Spotify — without asking permission from network operators. Why is this so?", "options": [{"text": "Because the network's interior is a 'dumb pipe' that does not need to know about specific application protocols. New applications run at the endpoints; routers only need to forward IP packets, regardless of what application data they carry.", "isCorrect": true, "rationale": "This is exactly the consequence the section names. Innovation lives at the edges precisely because the core has no application-specific logic. The same network that carried email in 1973 carries video streaming today, without any change to the core."}, {"text": "Because every new application is reviewed by the IETF before deployment.", "isCorrect": false, "rationale": "The IETF develops standards through open processes but does not gate-keep deployments. The end-to-end principle is exactly what makes permissionless innovation possible."}, {"text": "Because routers are upgraded automatically to recognize new protocols.", "isCorrect": false, "rationale": "Routers do not need to recognize new application protocols. They forward packets based on IP headers; payloads are opaque to them."}, {"text": "Because Tier 1 ISPs maintain a registry of all approved applications.", "isCorrect": false, "rationale": "No such registry exists. The whole point of the end-to-end principle is to make such registries unnecessary."}], "id": "q09"}, {"question": "Which set of architectural properties together explain why the Internet has scaled from 4 nodes to billions of devices and survived physical failures at every level?", "options": [{"text": "Distributed topology (no single point of failure), dynamic routing (automatic rerouting around failures), and the end-to-end principle (keep the network core simple and the intelligence at the edges).", "isCorrect": true, "rationale": "The section's closing key concept names exactly this trio. They are not accidents; they are intentional architectural choices baked in from the earliest days, traceable to ARPANET's military-survivability brief and to the 1984 end-to-end paper."}, {"text": "Centralized control, mandatory router certification, and a frequently rebuilt monolithic backbone.", "isCorrect": false, "rationale": "The Internet's success depends on the opposite of every property listed here. Centralization, mandatory certification, and frequent rebuilding would have prevented its scaling."}, {"text": "A single global registry, frequent backbone rewrites, and proprietary routing protocols.", "isCorrect": false, "rationale": "None of these properties are present in the Internet's architecture. Decentralization, incremental upgrades, and open protocols are the actual ingredients."}, {"text": "Mandatory IPv6 adoption, government-controlled DNS, and single-path routing.", "isCorrect": false, "rationale": "IPv6 adoption is voluntary and gradual, DNS is operated by many parties, and single-path routing would defeat fault tolerance. None of these underlie the Internet's resilience."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
