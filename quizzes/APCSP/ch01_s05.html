    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Data Compression: Lossless vs. Lossy and Metadata</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A graphic designer re-saves the same JPEG image 10 times in a row using JPEG compression each time. What happens to image quality, and why?", "options": [{"text": "Image quality is preserved exactly because JPEG is lossless.", "isCorrect": false, "rationale": "JPEG is lossy, not lossless. Each save discards perceptual detail; quality cannot be preserved exactly across re-encodings."}, {"text": "Image quality progressively degrades because each JPEG re-encoding discards additional perceptual information that cannot be recovered. The 'rule' is to edit in PNG or another lossless format and export to JPEG only as a final step.", "isCorrect": true, "rationale": "JPEG is lossy; each re-encoding loses additional detail permanently. The text states: 'Edit in PNG or a lossless format; export to JPEG only for the final delivery copy. Re-encoding a JPEG as a JPEG is a common and avoidable source of image degradation.'"}, {"text": "Image quality improves because each save further optimizes the encoding.", "isCorrect": false, "rationale": "JPEG encoding does not 'optimize' an existing JPEG; it discards more high-frequency information at each pass. Quality cannot improve through repeated lossy compression."}, {"text": "Quality stays the same after the second save and beyond, because all redundancy is removed in the first pass.", "isCorrect": false, "rationale": "Each pass discards additional information based on the new (already-degraded) input. Artifacts compound across passes; quality continues to degrade."}], "id": "q01"}, {"question": "A ZIP archive containing text files achieves a 5:1 compression ratio. If the original files total 50 MB, how large is the ZIP file?", "options": [{"text": "10 MB. A 5:1 ratio means original / compressed = 5, so compressed = 50 / 5 = 10 MB.", "isCorrect": true, "rationale": "Compression ratio = original_size / compressed_size. With ratio 5 and original 50 MB: compressed = 50 / 5 = 10 MB."}, {"text": "5 MB. The ZIP is one-tenth of the original.", "isCorrect": false, "rationale": "5 MB would be a 10:1 compression ratio, not 5:1. With 5:1 the compressed file is one-fifth of the original = 10 MB."}, {"text": "250 MB. The ratio multiplies the size.", "isCorrect": false, "rationale": "Compression REDUCES size. Multiplying by the ratio would expand the file, which is the opposite of compression."}, {"text": "55 MB. Original plus 5%.", "isCorrect": false, "rationale": "5:1 ratio is not 'plus 5%'. It means the original is 5x the compressed size, so compressed = original / 5."}], "id": "q02"}, {"question": "Lossless compression of run-length encoding (RLE) is illustrated in the section on a row of pixels: 'white, white, white, white, white, black, black, white, white' (9 values). After RLE, the row reads '5 white, 2 black, 2 white' (3 groups). What is the RLE compression ratio for this row?", "options": [{"text": "1:1, because the data is unchanged.", "isCorrect": false, "rationale": "RLE replaces 9 individual values with 3 group descriptors, so the data IS reduced in size."}, {"text": "3:1, because 9 original values become 3 RLE groups.", "isCorrect": true, "rationale": "9 original values are replaced by 3 groups, giving compression_ratio = original / compressed = 9 / 3 = 3:1. The text explicitly cites this ratio."}, {"text": "9:1, the original value count.", "isCorrect": false, "rationale": "9:1 would mean compressing 9 values into 1, which is not what RLE produces here. The result is 3 groups."}, {"text": "1:3, since the result is one-third the size.", "isCorrect": false, "rationale": "Compression ratios are written original:compressed. The original is 3x the compressed, so the ratio is 3:1, not 1:3."}], "id": "q03"}, {"question": "Why is lossless compression's compression ratio bounded — that is, why can't lossless techniques achieve arbitrarily high compression?", "options": [{"text": "Because Shannon entropy provides a theoretical lower bound: a message cannot be compressed below its entropy content without losing information. Above that floor, redundancy can be removed; below it, information itself must be removed.", "isCorrect": true, "rationale": "Section 1.5 states Shannon's entropy is the theoretical lower bound for lossless compression. To go below entropy you must discard real information, which means lossy compression."}, {"text": "Because lossless algorithms run too slowly to achieve high ratios.", "isCorrect": false, "rationale": "Speed is not the limit. Even with infinite computation, you cannot exceed Shannon's entropy floor without losing information."}, {"text": "Because hard drives have a 1 KB minimum file size.", "isCorrect": false, "rationale": "File system block size is not the theoretical limit on compression. The bound is Shannon's entropy, which is independent of storage."}, {"text": "Because lossless compression is just lossy compression with rounding.", "isCorrect": false, "rationale": "Lossless compression preserves every bit exactly; lossy throws away information. They are categorically different, not the same with rounding."}], "id": "q04"}, {"question": "JPEG image compression uses the discrete cosine transform (DCT) to convert each 8x8 pixel block from the spatial domain to the frequency domain. Why is this transform useful for compression?", "options": [{"text": "Because DCT magically reduces the bit count without loss.", "isCorrect": false, "rationale": "DCT itself does not compress; it just rearranges information. Compression happens when high-frequency coefficients are quantized aggressively."}, {"text": "Because the human visual system is relatively insensitive to high-frequency (fine-detail) content, so high-frequency DCT coefficients can be aggressively quantized or discarded with minimal perceived quality loss.", "isCorrect": true, "rationale": "JPEG exploits the perceptual asymmetry: humans notice low-frequency information (broad shapes) more than high-frequency content. DCT separates these, allowing aggressive quantization of high frequencies while preserving low frequencies."}, {"text": "Because the spatial domain has too much data and the frequency domain has less.", "isCorrect": false, "rationale": "DCT is information-preserving (mathematically invertible); both representations have the same information. Compression requires the additional step of quantization."}, {"text": "Because frequency-domain pixels are smaller than spatial-domain pixels.", "isCorrect": false, "rationale": "Pixels themselves do not change size between domains. The DCT outputs coefficients, which then get quantized and entropy-coded."}], "id": "q05"}, {"question": "What is the BEST description of how MP4/H.264 video compression saves space?", "options": [{"text": "By storing every frame as a complete image, then zipping the result.", "isCorrect": false, "rationale": "Storing every frame independently misses the key insight: adjacent video frames share most content. MP4 exploits inter-frame correlation."}, {"text": "By storing reference frames at intervals and storing only the differences (motion-compensated changes) between consecutive frames, exploiting the fact that adjacent frames usually differ only in small regions.", "isCorrect": true, "rationale": "The text explicitly describes MP4/H.264 as extending lossy compression to time: 'instead of storing each frame independently, the codec stores a reference frame and then only the differences between consecutive frames.' Most pixels in a video do not change frame-to-frame."}, {"text": "By converting video to text using OCR.", "isCorrect": false, "rationale": "OCR is a text-extraction process, not a video compression technique. MP4 stores pixel data, not text."}, {"text": "By increasing each pixel's bit depth so fewer pixels are needed.", "isCorrect": false, "rationale": "Increasing bit depth would INCREASE file size, not reduce it. Compression reduces bits, not adds them."}], "id": "q06"}, {"question": "Which of the following describes the role of metadata in a digital file?", "options": [{"text": "Metadata is structured information about a file (creation date, author, location) stored separately from or in the header of the primary content. It does not affect playback or display, but enables search, indexing, and contextual processing.", "isCorrect": true, "rationale": "The section's definition: 'Structured information that describes, contextualizes, or provides administrative detail about a primary data file, without forming part of the primary content itself.'"}, {"text": "Metadata is the same thing as the file's content; the two cannot be separated.", "isCorrect": false, "rationale": "Metadata and content are explicitly distinguished in the text. Stripping metadata removes contextual information without changing the primary content."}, {"text": "Metadata is a backup copy of the file kept on a separate disk.", "isCorrect": false, "rationale": "Metadata is descriptive information, not a backup. It travels with the file but does not duplicate the content."}, {"text": "Metadata is encryption keys for accessing the file.", "isCorrect": false, "rationale": "Metadata may include digital signatures or rights data, but its general purpose is description and indexing, not encryption keys."}], "id": "q07"}, {"question": "Give one specific reason why sharing a smartphone photo of your home on a public website without stripping metadata could be a privacy risk.", "options": [{"text": "EXIF metadata in a JPEG includes GPS coordinates of where the photo was taken; sharing the photo without stripping EXIF reveals the exact location of your home to anyone who downloads it.", "isCorrect": true, "rationale": "The text explicitly cites this risk: 'GPS metadata in particular has privacy implications: sharing a photo without stripping its EXIF data reveals the exact location where it was taken.' Most social networks strip EXIF on upload, but raw files retain it."}, {"text": "Metadata can secretly transmit data over the network.", "isCorrect": false, "rationale": "Metadata is passive information stored in the file header; it does not initiate network transmissions. The risk is that downstream readers can view it."}, {"text": "Metadata makes images larger and uses more bandwidth.", "isCorrect": false, "rationale": "Metadata is small (a few KB at most). The privacy risk is not about bandwidth; it is about exposed personal information."}, {"text": "There is no privacy risk because all metadata is encrypted by default.", "isCorrect": false, "rationale": "EXIF and most other metadata is plaintext, not encrypted. Anyone with access to the file can read it."}], "id": "q08"}, {"question": "A professional photographer's typical workflow is described in the section: RAW capture, editing in Lightroom, and two exports. Which describes the role of the .xmp sidecar file?", "options": [{"text": "The .xmp file is a backup copy of the RAW image.", "isCorrect": false, "rationale": "An .xmp sidecar is a small text file storing edits and metadata, not a copy of the RAW. It is much smaller than the RAW it accompanies."}, {"text": "The .xmp file stores Lightroom's non-destructive editing adjustments as metadata, leaving the original RAW unchanged. The 'edits' are recorded as instructions that Lightroom re-applies on export.", "isCorrect": true, "rationale": "The text describes Lightroom as making 'non-destructive adjustments' that are 'stored as separate metadata (an .xmp sidecar file)' rather than altering the original RAW."}, {"text": "The .xmp file contains the RAW image converted to JPEG.", "isCorrect": false, "rationale": "An .xmp file is a metadata sidecar, not an image. JPEG export is a separate output of the workflow."}, {"text": "The .xmp file is a Lightroom proprietary format that cannot be opened by other software.", "isCorrect": false, "rationale": "XMP (Extensible Metadata Platform) is an Adobe-proposed open standard, not strictly proprietary. Many tools read and write XMP."}], "id": "q09"}, {"question": "A medical imaging center stores diagnostic X-rays. Which compression strategy is appropriate, and why?", "options": [{"text": "Lossy compression (JPEG), because file size matters more than diagnostic accuracy.", "isCorrect": false, "rationale": "Medical imaging cannot tolerate any loss of diagnostic detail. Lossy compression discards information that may be diagnostically relevant; the section explicitly cites medical imaging as a lossless-required domain."}, {"text": "Lossless compression (PNG, DICOM with lossless encoding), because diagnostic accuracy requires preserving every bit of the original sensor data; any pixel-level change could be misread as an artifact or miss a tumor.", "isCorrect": true, "rationale": "The text identifies medical imaging as a lossless-required application: 'medical images and archival masters require lossless fidelity.' Diagnostic safety outweighs storage cost in this domain."}, {"text": "No compression at all, because compression always adds noise.", "isCorrect": false, "rationale": "Lossless compression does NOT add noise; it preserves every bit exactly. Compression is appropriate, but it must be lossless."}, {"text": "Either lossy or lossless — both produce equally diagnostic images.", "isCorrect": false, "rationale": "Lossy compression discards information. Even a small loss could obscure a subtle diagnostic feature, so the choice between lossy and lossless is consequential in medical imaging."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
