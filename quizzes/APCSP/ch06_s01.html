    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Defining Procedures</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In Python, which line correctly begins the definition of a procedure named greet that accepts one input variable called name?", "options": [{"text": "PROCEDURE greet(name)", "isCorrect": false, "rationale": "PROCEDURE with no colon is the AP Pseudocode header, not Python syntax. Python uses lowercase def and a colon."}, {"text": "def greet(name):", "isCorrect": true, "rationale": "Python introduces a procedure with the keyword def, followed by the name, parentheses listing parameters, and a closing colon. The body then sits on indented lines."}, {"text": "function greet(name) {", "isCorrect": false, "rationale": "function and curly braces are JavaScript-style syntax. Python uses def and indentation."}, {"text": "def greet name:", "isCorrect": false, "rationale": "Parentheses around the parameter list are required. Without them, the line is a syntax error."}], "id": "q01"}, {"question": "Translate the Python header def square(n): into AP Pseudocode notation.", "options": [{"text": "def square(n) {", "isCorrect": false, "rationale": "This mixes Python's def with pseudocode braces. AP Pseudocode replaces def with PROCEDURE."}, {"text": "FUNCTION square(n):", "isCorrect": false, "rationale": "AP Pseudocode does not use the keyword FUNCTION; it uses PROCEDURE. It also does not use a colon after the header."}, {"text": "PROCEDURE square(n)", "isCorrect": true, "rationale": "AP Pseudocode replaces Python's def with the uppercase keyword PROCEDURE, drops the colon, and uses curly braces around the body. The parameter list inside the parentheses stays the same."}, {"text": "PROCEDURE square[n]", "isCorrect": false, "rationale": "AP Pseudocode parameters are listed inside parentheses, just as in Python. Square brackets are used for list indexing, not parameter lists."}], "id": "q02"}, {"question": "Consider this code:\n\ndef double(x):\n    return x * 2\n\nresult = double(7)\n\nWhich statement BEST describes what happened when the line result = double(7) executed?", "options": [{"text": "The parameter x is the value 7, and the argument result is set to 14.", "isCorrect": false, "rationale": "This swaps the AP terminology. The argument is the value passed in (7), and the parameter is the placeholder name in the def line (x)."}, {"text": "The argument 7 was passed in, the parameter x was bound to 7 inside the call, and the returned value 14 was stored in result.", "isCorrect": true, "rationale": "The call site supplies the argument 7. Inside the procedure the parameter x temporarily holds 7. The expression x * 2 evaluates to 14, and return sends that value back to be stored in result."}, {"text": "double is a void procedure because the line does not contain a print statement.", "isCorrect": false, "rationale": "double has a return statement, which makes it a value-returning procedure. Whether output is printed has nothing to do with whether a procedure is void."}, {"text": "The variable x continues to hold 7 in the main script after the procedure returns.", "isCorrect": false, "rationale": "Local variables (including parameters) are destroyed when the procedure returns; x does not exist outside double."}], "id": "q03"}, {"question": "What is the output of the following Python program?\n\ndef print_greeting(name):\n    print('Hello, ' + name + '!')\n\nresult = print_greeting('Sam')\nprint(result)", "options": [{"text": "Hello, Sam!\nHello, Sam!", "isCorrect": false, "rationale": "print_greeting has no return statement, so it implicitly returns None. The second print displays None, not the greeting again."}, {"text": "Hello, Sam!\nNone", "isCorrect": true, "rationale": "print_greeting prints the greeting (line 1 of output). With no explicit return, Python implicitly returns None, which is bound to result and then printed as the literal text None on line 2."}, {"text": "Hello, Sam!", "isCorrect": false, "rationale": "Two print statements run: one inside the procedure and one in the main script. Both produce output."}, {"text": "Error: print_greeting does not return a value.", "isCorrect": false, "rationale": "A void procedure does not raise an error. Python implicitly returns None when no return statement is present."}], "id": "q04"}, {"question": "Which of the following BEST distinguishes a void procedure from a value-returning procedure?", "options": [{"text": "A void procedure has no parameters; a value-returning procedure has at least one.", "isCorrect": false, "rationale": "Both void and value-returning procedures may have any number of parameters. The distinction is the return value, not the parameter count."}, {"text": "A void procedure performs an action but does not hand a computed value back to the caller; a value-returning procedure ends with a return statement that sends a result back.", "isCorrect": true, "rationale": "Void procedures do work like printing or list updates and implicitly return None. Value-returning procedures send a computed result back via return so the caller can store, pass, or use it."}, {"text": "A void procedure runs only once; a value-returning procedure can be called many times.", "isCorrect": false, "rationale": "Both kinds of procedures can be called any number of times. Reusability is unrelated to return semantics."}, {"text": "A void procedure cannot include if statements; a value-returning procedure must.", "isCorrect": false, "rationale": "Either type may contain selection. The rubric distinction is about the return value, not the constructs inside."}], "id": "q05"}, {"question": "The Create PT rubric requires a student-developed parameterized procedure whose body contains sequencing, selection, and iteration. Which procedure below FAILS this requirement?", "options": [{"text": "def compute_streak(records, target_subject):\n    qualifying = []\n    for r in records:\n        if r[1] == target_subject:\n            qualifying.append(r[0])\n    return len(qualifying)", "isCorrect": false, "rationale": "This procedure has at least one parameter, an iteration (for loop), a selection (if), and sequencing (the append). It satisfies the rubric."}, {"text": "def total(numbers):\n    s = 0\n    for n in numbers:\n        s = s + n\n    return s\n\nThe loop and if statement are above the def line in the main script.", "isCorrect": true, "rationale": "The rubric requires sequencing, selection, AND iteration inside the procedure body. If the if statement lives outside the procedure, the rubric point is lost. This is the classic Create PT mistake."}, {"text": "def grade_letter(score):\n    if score >= 90:\n        letter = 'A'\n    else:\n        letter = 'B'\n    for i in range(1):\n        pass\n    return letter", "isCorrect": false, "rationale": "Even though the loop is trivial, this procedure technically contains all three constructs inside its body. (Stronger procedures use real loops, but this still meets the rubric requirement on paper.)"}, {"text": "def safe_divide(a, b):\n    result = 0\n    if b != 0:\n        for i in range(1):\n            result = a / b\n    return result", "isCorrect": false, "rationale": "All three constructs (sequencing, selection, iteration) live inside the procedure body, and there is one parameter. The rubric is satisfied."}], "id": "q06"}, {"question": "Why does the Tracker v2 design package the streak logic into compute_streak(records, target_subject) instead of leaving the loop in the main script as in Tracker v1?", "options": [{"text": "Procedures run faster than equivalent inline code at the same indentation level.", "isCorrect": false, "rationale": "Wrapping code in a procedure does not measurably speed it up. The motivation is reuse and abstraction, not performance."}, {"text": "Python requires every if statement to live inside a def block.", "isCorrect": false, "rationale": "Python places no such requirement on if statements; they may appear at the top level of a script."}, {"text": "The hardcoded subject string forces the inline version to be copy-pasted and edited for every new subject; a parameterized procedure runs unchanged for any subject by changing only the argument.", "isCorrect": true, "rationale": "Tracker v1 hardcoded the subject 'math' inside the loop, so adding history meant duplicating the block. Tracker v2 makes the subject a parameter, so one definition handles every subject the caller passes in."}, {"text": "Procedures are required by Python's interpreter for any program that uses lists.", "isCorrect": false, "rationale": "Python imposes no such requirement; lists work fine outside any procedure. The reason for the refactor is rubric and reuse."}], "id": "q07"}, {"question": "Examine this AP Pseudocode procedure:\n\nPROCEDURE add(a, b)\n{\n    RETURN a + b\n}\n\nWhich Python translation is correct?", "options": [{"text": "PROCEDURE add(a, b):\n    return a + b", "isCorrect": false, "rationale": "Python uses lowercase def and lowercase return, not the AP keyword PROCEDURE."}, {"text": "def add(a, b):\n    return a + b", "isCorrect": true, "rationale": "PROCEDURE becomes def, the curly braces become a colon plus indentation, and AP RETURN becomes Python return. Parameter names a and b stay the same."}, {"text": "def add(a, b)\n{\n    return a + b\n}", "isCorrect": false, "rationale": "Python uses indentation, not curly braces. The def header also requires a trailing colon."}, {"text": "function add(a, b):\n    RETURN a + b", "isCorrect": false, "rationale": "Python keywords are def for definition and return for the result. This option mixes JavaScript and AP Pseudocode."}], "id": "q08"}, {"question": "Which statement about the AP Pseudocode assignment arrow <- is correct when translating between notations?", "options": [{"text": "<- represents a comparison and corresponds to Python's == operator.", "isCorrect": false, "rationale": "<- is assignment, not comparison. Comparison in AP Pseudocode is written with = inside conditions."}, {"text": "<- is purely cosmetic and is removed entirely when translating to Python.", "isCorrect": false, "rationale": "<- has a real meaning (assignment); it is replaced by Python's = sign, not deleted."}, {"text": "<- represents assignment in AP Pseudocode and corresponds to Python's = sign.", "isCorrect": true, "rationale": "AP Pseudocode writes assignments as left-arrow (msg <- 'Hello'), while Python uses the equals sign (msg = 'Hello'). The two are equivalent in meaning."}, {"text": "<- is a return statement and corresponds to Python's return keyword.", "isCorrect": false, "rationale": "AP Pseudocode uses RETURN for the return statement; <- is the assignment operator."}], "id": "q09"}, {"question": "After Tracker v2 defines compute_streak(records, target_subject), the main script contains:\n\nprint('Math streak: ' + str(compute_streak(study_records, 'math')))\nprint('History streak: ' + str(compute_streak(study_records, 'history')))\n\nWhich statement is TRUE about this design?", "options": [{"text": "Two different procedures are defined and each is called once.", "isCorrect": false, "rationale": "Only one procedure (compute_streak) is defined. It is called twice with different argument values."}, {"text": "One procedure is defined and is called twice with different arguments, demonstrating that procedural abstraction enables reuse without code duplication.", "isCorrect": true, "rationale": "The whole point of Tracker v2 is to define compute_streak once and reuse it for any subject. Two calls with different arguments produce two different streak counts from one procedure body."}, {"text": "compute_streak is a void procedure because no variable assignment appears in the print statements.", "isCorrect": false, "rationale": "compute_streak returns an integer that str() converts and concatenates. A void procedure could not be embedded inside str() and produce meaningful output."}, {"text": "The two calls require Python to redefine compute_streak each time.", "isCorrect": false, "rationale": "A procedure is defined exactly once. Each call simply executes the existing body with new argument values."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
