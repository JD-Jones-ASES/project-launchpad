    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Indefinite Loops</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which scenario is BEST handled by an indefinite loop rather than a definite loop?", "options": [{"text": "Printing the integers from 1 to 100.", "isCorrect": false, "rationale": "The number of iterations (100) is known in advance, making this a perfect fit for a definite loop with for and range — not an indefinite loop."}, {"text": "Reading user input until the user types 'quit'.", "isCorrect": true, "rationale": "The number of inputs is unknown — it depends on runtime behavior. A while loop or sentinel-controlled pattern is the right tool because the loop must keep running until a condition becomes true."}, {"text": "Computing the sum 1 + 2 + ... + N for a fixed N supplied by the program.", "isCorrect": false, "rationale": "The iteration count is exactly N — known before the loop starts. A definite loop (for i in range(1, N+1)) is the natural fit."}, {"text": "Doubling each element of a 10-element list.", "isCorrect": false, "rationale": "The list size is known (10), so a definite loop iterating over the list is appropriate. An indefinite loop would be overkill."}]}, {"question": "What does the following Python code print?\n\nx = 0\nwhile x < 4:\n    print(x, end=' ')\n    x = x + 1", "options": [{"text": "0 1 2 3 4", "isCorrect": false, "rationale": "When x reaches 4, the test x < 4 is False (4 < 4 is false), so the loop exits before printing 4. The condition is strict inequality."}, {"text": "0 1 2 3", "isCorrect": true, "rationale": "The body runs while x < 4 is True. With x starting at 0 and incrementing, the loop prints 0, 1, 2, 3. When x becomes 4, the test fails and the loop exits."}, {"text": "1 2 3 4", "isCorrect": false, "rationale": "The first print runs before the first increment, so the first value printed is the initial value of x (0), not 1."}, {"text": "An infinite loop, because x never reaches 4.", "isCorrect": false, "rationale": "x is incremented inside the body (x = x + 1), so it does reach 4 and the loop terminates correctly."}]}, {"question": "Translate the Python loop\n\nwhile x < 10:\n    DISPLAY(x)\n    x = x + 1\n\nto AP Pseudocode using REPEAT UNTIL.", "options": [{"text": "REPEAT UNTIL (x < 10) { DISPLAY(x); x <- x + 1 }", "isCorrect": false, "rationale": "This keeps the same direction. REPEAT UNTIL (x < 10) would exit when x < 10 becomes true (i.e., immediately, since x starts at 0). The condition must be inverted."}, {"text": "REPEAT UNTIL (x >= 10) { DISPLAY(x); x <- x + 1 }", "isCorrect": true, "rationale": "Python's while continues WHILE the condition is true; AP Pseudocode REPEAT UNTIL continues UNTIL the condition becomes true. So x < 10 must be inverted to x >= 10. The negation of < is >=."}, {"text": "REPEAT UNTIL (x > 10) { DISPLAY(x); x <- x + 1 }", "isCorrect": false, "rationale": "Negation of x < 10 is x >= 10, not x > 10. With x > 10 the loop would run one extra iteration when x = 10, since x > 10 is still false at that point."}, {"text": "REPEAT UNTIL (x = 10) { DISPLAY(x); x <- x + 1 }", "isCorrect": false, "rationale": "Equality only catches the exact value x = 10, not all values 10 or greater. If x ever overshoots 10 (e.g., x <- x + 2), this loop would never terminate. Use the inverted relational operator (>=)."}]}, {"question": "What is wrong with the following Python code?\n\nx = 0\nwhile x < 5:\n    print(x)", "options": [{"text": "The < should be <=. The loop misses the value 5.", "isCorrect": false, "rationale": "The relational operator is correct for printing 0 through 4. The actual problem is structural: x never changes inside the body."}, {"text": "The body never mutates x, so x < 5 stays true forever — an infinite loop.", "isCorrect": true, "rationale": "Every while loop must update at least one variable in its condition. Without x = x + 1 (or similar) inside the body, x stays 0 forever and the program never terminates."}, {"text": "Python does not allow while loops to use < as a comparison.", "isCorrect": false, "rationale": "< is a valid Python operator for both for-loop ranges and while-loop conditions. The bug is the missing mutation, not the operator."}, {"text": "The variable x is not initialized before the loop.", "isCorrect": false, "rationale": "x is initialized to 0 on the first line. The bug is the missing increment inside the body."}]}, {"question": "What value of total does this code print?\n\ntotal = 0\nx = 1\nwhile x <= 5:\n    total = total + x\n    x = x + 1\nprint(total)", "options": [{"text": "10", "isCorrect": false, "rationale": "10 = 1+2+3+4. This would be the result if the condition were x < 5 (excluding 5). The condition x <= 5 includes 5."}, {"text": "15", "isCorrect": true, "rationale": "x takes 1, 2, 3, 4, 5 — five iterations because <= is inclusive. total = 1+2+3+4+5 = 15. When x becomes 6, the test 6 <= 5 is false and the loop exits."}, {"text": "21", "isCorrect": false, "rationale": "21 = 1+2+3+4+5+6 — running one too many iterations. After x becomes 6, the condition x <= 5 is false, so 6 is never added."}, {"text": "0", "isCorrect": false, "rationale": "total is updated inside the body. After the loop exits, total holds the sum, not its initial value."}]}, {"question": "What is the correct AP Pseudocode translation of while count != 0:?", "options": [{"text": "REPEAT UNTIL (count != 0)", "isCorrect": false, "rationale": "This keeps the same condition without inversion. REPEAT UNTIL would exit immediately whenever count != 0 — the opposite of the desired behavior."}, {"text": "REPEAT UNTIL (count = 0)", "isCorrect": true, "rationale": "The negation of != is =. Python continues while count != 0; pseudocode continues until count = 0. Both express 'keep going as long as count is nonzero.'"}, {"text": "REPEAT UNTIL (count > 0)", "isCorrect": false, "rationale": "Negation of != is =, not >. The condition count > 0 would exit when count becomes 1, 2, 3, etc., misbehaving for negative starting values."}, {"text": "REPEAT UNTIL (count == 0)", "isCorrect": false, "rationale": "AP Pseudocode uses single = for equality comparison in conditions, not == (which is Python syntax). The correct pseudocode form is count = 0."}]}, {"question": "In a sentinel-controlled loop using while True: ... if value == sentinel: break, why is the if/break placed BEFORE the accumulation step?", "options": [{"text": "To ensure the sentinel value itself is not added to the running total.", "isCorrect": true, "rationale": "If accumulation came first, the sentinel (e.g., -1) would be added to total before the loop exited, corrupting the result. Putting if/break first guarantees the sentinel is detected and the loop exits before any work is done with it."}, {"text": "Because Python requires break statements at the start of every loop body.", "isCorrect": false, "rationale": "Python imposes no such structural requirement. break can appear anywhere in a loop body. The reason is logical, not syntactic."}, {"text": "To make the loop terminate exactly N times.", "isCorrect": false, "rationale": "Sentinel-controlled loops are not bounded by a known count. They run as long as the user supplies non-sentinel values."}, {"text": "Because Python evaluates conditions only after the body executes.", "isCorrect": false, "rationale": "Python evaluates while conditions at the top of each iteration. The if/break is a separate decision inside the body, and its placement matters for correctness, not for evaluation order."}]}, {"question": "Which of the following best describes the difference between Python's while X: and AP Pseudocode's REPEAT UNTIL X?", "options": [{"text": "They are identical — both continue while X is true.", "isCorrect": false, "rationale": "They are logical inverses. Python continues while X is true; AP Pseudocode continues until X becomes true (i.e., while X is still false). Treating them as identical is the most-tested AP loop error."}, {"text": "while X: continues while X is true; REPEAT UNTIL X continues while X is false.", "isCorrect": true, "rationale": "This captures the inversion exactly. The body of REPEAT UNTIL X runs as long as X is false, exiting when X first becomes true. To translate cleanly, negate the condition (< becomes >=, != becomes =, etc.)."}, {"text": "while X: requires a counter; REPEAT UNTIL X does not.", "isCorrect": false, "rationale": "Counters are not a defining feature of either. Both can be counter-controlled or condition-controlled. The distinction is the inversion of the condition."}, {"text": "while X: tests at the bottom; REPEAT UNTIL X tests at the top.", "isCorrect": false, "rationale": "Python's while tests at the top, before each iteration. AP Pseudocode REPEAT UNTIL also tests as part of each cycle. The distinction is condition direction, not test placement."}]}, {"question": "A program reads scores until the user enters -1, then prints the average. Which of these patterns correctly implements that requirement in Python?", "options": [{"text": "total = 0\ncount = 0\nwhile True:\n    s = int(input())\n    total = total + s\n    if s == -1:\n        break\n    count = count + 1", "isCorrect": false, "rationale": "Accumulation comes BEFORE the sentinel test, so -1 is added to total. The average will be wrong by exactly -1/(count). The if/break must run before total is updated."}, {"text": "total = 0\ncount = 0\nwhile True:\n    s = int(input())\n    if s == -1:\n        break\n    total = total + s\n    count = count + 1", "isCorrect": true, "rationale": "The if/break runs first, so -1 triggers an immediate exit before total or count is updated. Only valid scores contribute to the average."}, {"text": "for s in range(-1):\n    total = total + s", "isCorrect": false, "rationale": "range(-1) produces no values. for ... range cannot represent unknown-count iteration; the question requires a sentinel-controlled while loop."}, {"text": "while s != -1:\n    s = int(input())\n    total = total + s\n    count = count + 1", "isCorrect": false, "rationale": "Two bugs: s is referenced in the condition before it is initialized (NameError on first iteration), and -1 is still added to total because the test runs at the top, not after input."}]}, {"question": "An infinite loop occurs when:", "options": [{"text": "The loop variable starts at a value greater than the stopping condition.", "isCorrect": false, "rationale": "If the variable already fails the condition, the body simply never executes — the loop exits immediately, not infinitely."}, {"text": "The condition in the loop never becomes false (in Python while), or never becomes true (in AP Pseudocode REPEAT UNTIL).", "isCorrect": true, "rationale": "An infinite loop happens when the loop's exit condition can never be reached — typically because the body forgets to mutate the relevant variable, or the mutation moves it the wrong direction."}, {"text": "The loop body contains a print statement.", "isCorrect": false, "rationale": "Print statements have nothing to do with termination. Loops terminate based on their condition and body mutations."}, {"text": "The program is run on a computer with insufficient memory.", "isCorrect": false, "rationale": "Memory is irrelevant. Infinite loops are a logical bug — the program runs forever (or until the OS kills it) because the condition cannot become false."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
