    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Tracing Complex Logic</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Trace the AP Pseudocode below. What is the third value displayed?\n\na <- 1\nREPEAT 2 TIMES\n  b <- 1\n  REPEAT 2 TIMES\n    c <- 1\n    REPEAT 2 TIMES\n      DISPLAY(a * 100 + b * 10 + c)\n      c <- c + 1\n    b <- b + 1\n  a <- a + 1", "options": [{"text": "111", "isCorrect": false, "rationale": "111 is the FIRST value displayed (a=1, b=1, c=1). The question asks for the third."}, {"text": "112", "isCorrect": false, "rationale": "112 is the SECOND value displayed (a=1, b=1, c=2). After this, c is incremented to 3, the inner loop ends, and b is incremented to 2."}, {"text": "121", "isCorrect": true, "rationale": "Trace: iteration 1 displays 111 (a=1,b=1,c=1), iteration 2 displays 112 (a=1,b=1,c=2), iteration 3 displays 121 (a=1,b=2,c=1). Inner exhausts (c=1,2), then b increments to 2 and c resets to 1 — that is the third value."}, {"text": "211", "isCorrect": false, "rationale": "211 is the FIFTH value displayed. The full sequence is 111, 112, 121, 122, 211, 212, 221, 222."}], "id": "q01"}, {"question": "How many times does the innermost DISPLAY statement execute in a triple-nested loop where each level repeats 4 times?", "options": [{"text": "12", "isCorrect": false, "rationale": "12 = 4 + 4 + 4 (additive). For nested loops, body executions multiply: outer × middle × inner."}, {"text": "16", "isCorrect": false, "rationale": "16 = 4 × 4 (only two levels). With three levels each running 4 times, the inner runs 4 × 4 × 4 = 64 times."}, {"text": "64", "isCorrect": true, "rationale": "For three nested loops each with iteration count m, n, p, the innermost body runs m × n × p times. Here 4 × 4 × 4 = 64. The inner loop runs to completion (4 iterations) for every combination of outer × middle (16 combinations)."}, {"text": "256", "isCorrect": false, "rationale": "256 = 4^4 (four levels). The question describes only three nested loops."}], "id": "q02"}, {"question": "Evaluate this Boolean expression for a = 3, b = 7, c = 2, d = 5, e = 1:\n\nIF ((a > b) OR ((c < d) AND (NOT (e > a))))\n\nWhich result is correct?", "options": [{"text": "TRUE — because (a > b) is true", "isCorrect": false, "rationale": "(a > b) is 3 > 7, which is FALSE, not true. The OR is satisfied by the right operand, not the left."}, {"text": "TRUE — because the AND clause is true", "isCorrect": true, "rationale": "Step by step: a > b is 3 > 7 = false. c < d is 2 < 5 = true. e > a is 1 > 3 = false; NOT(false) = true. Inner AND: true AND true = true. Outer OR: false OR true = TRUE. The AND clause makes the whole expression true."}, {"text": "FALSE — because (NOT (e > a)) negates the AND", "isCorrect": false, "rationale": "NOT(e > a) is NOT(false) = true, which keeps the AND clause true. NOT does not 'negate the AND'; it negates only its immediate operand."}, {"text": "FALSE — because all sub-expressions are false", "isCorrect": false, "rationale": "Two sub-expressions evaluate to true: (c < d) and NOT(e > a). The compound expression is therefore TRUE."}], "id": "q03"}, {"question": "When tracing a nested loop, which discipline is most important to avoid output errors?", "options": [{"text": "Always trace the outer loop first to completion before starting the inner.", "isCorrect": false, "rationale": "Backwards. The INNER loop runs to completion for every iteration of the outer — outer cannot 'finish first'."}, {"text": "Exhaust the inner counter completely before incrementing the outer counter.", "isCorrect": true, "rationale": "Inner before outer is the canonical nested-loop trace rule. The inner loop's counter must reach its terminal value for every single iteration of the outer loop. Jumping the outer counter prematurely is the most common nested-loop trace error."}, {"text": "Trace one iteration of each level, then estimate the rest.", "isCorrect": false, "rationale": "Estimation defeats the purpose of tracing. The whole point of a trace table is full enumeration — write every row."}, {"text": "Only track the outermost variable; the inner ones do not affect output.", "isCorrect": false, "rationale": "Inner variables routinely appear in DISPLAY statements (as the example shows: a*100 + b*10 + c). Skipping inner variables guarantees wrong output."}], "id": "q04"}, {"question": "A trace table is most useful for which kind of question?", "options": [{"text": "Questions about Big Idea 5 (impact of computing).", "isCorrect": false, "rationale": "Trace tables are an algorithmic tool (Big Idea 3). BI 5 questions are about societal impact, not loop execution."}, {"text": "Questions where you must predict the output of a loop with multiple variables.", "isCorrect": true, "rationale": "Trace tables transform the mental work of tracking variable state into a written record. Their primary use is exactly this: predicting output by enumerating each iteration with one row per innermost-loop pass and one column per variable in scope."}, {"text": "Questions asking what the algorithm is for (its purpose).", "isCorrect": false, "rationale": "Trace tables show what an algorithm DOES on a specific input, not what it is for. Identifying purpose is a different exam skill."}, {"text": "Questions about hardware specifications.", "isCorrect": false, "rationale": "Trace tables track variable state in algorithms — they have nothing to do with hardware."}], "id": "q05"}, {"question": "Examine the buggy AP Pseudocode binary search below. Which line contains an EQUALITY-VS-ASSIGNMENT error?\n\n  low <- 1\n  high <- LENGTH(data)\n  REPEAT UNTIL (low > high)\n    mid <- (low + high) / 2\n    IF (data[mid] = target)\n      RETURN(mid)\n    IF (data[mid] > target)\n      high = mid - 1\n    ELSE\n      low <- mid", "options": [{"text": "low <- 1", "isCorrect": false, "rationale": "This is a correct AP Pseudocode assignment using <-. No error."}, {"text": "IF (data[mid] = target)", "isCorrect": false, "rationale": "= here is correct AP Pseudocode equality. No error."}, {"text": "high = mid - 1", "isCorrect": true, "rationale": "Inside the IF body, this line should ASSIGN mid - 1 to high. In AP Pseudocode, = is an EQUALITY test, not assignment. The line is silently a no-op comparison; high is never updated. The fix is high <- mid - 1."}, {"text": "low <- mid", "isCorrect": false, "rationale": "low <- mid uses <- correctly for assignment. (It IS a logic bug — the line should be low <- mid + 1 — but that is a separate error class, not the equality/assignment trap.)"}], "id": "q06"}, {"question": "Trace this AP Pseudocode and identify the displayed value:\n\nx <- 1\ny <- 100\nREPEAT UNTIL (x >= y)\n  x <- x * 2\n  y <- y - 10\nDISPLAY(x)\nDISPLAY(y)", "options": [{"text": "x = 64, y = 40", "isCorrect": true, "rationale": "Iteration 1: x=2, y=90. Iter 2: x=4, y=80. Iter 3: x=8, y=70. Iter 4: x=16, y=60. Iter 5: x=32, y=50. Iter 6: x=64, y=40. Now x >= y (64 >= 40), so loop exits. Final values: x=64, y=40."}, {"text": "x = 32, y = 50", "isCorrect": false, "rationale": "After 5 iterations, x=32 and y=50; x is not yet >= y (32 < 50), so the loop continues for one more iteration. The displayed values come from after iteration 6."}, {"text": "x = 128, y = 30", "isCorrect": false, "rationale": "The loop exits the moment x >= y becomes true. After x=64 (iteration 6), x >= y is satisfied (64 >= 40), so iteration 7 (which would produce x=128) never runs."}, {"text": "x = 100, y = 0", "isCorrect": false, "rationale": "x doubles each iteration; 100 is not a power of 2 and is not produced. y decreases by 10 from 100, but never reaches 0 because the loop terminates earlier."}], "id": "q07"}, {"question": "A robot is at the bottom-left of a 3×3 grid, facing North. It executes the algorithm below twice (REPEAT 2 TIMES):\n\nIF (CAN_MOVE(forward))\n  MOVE_FORWARD()\nELSE\n  ROTATE_RIGHT()\n  MOVE_FORWARD()\n\nWhat strategy gives the most reliable trace of the robot's final position?", "options": [{"text": "Calculate the final position from the iteration count (2 forward moves = 2 cells north).", "isCorrect": false, "rationale": "This skips the conditional. If CAN_MOVE(forward) is false at any iteration, the robot rotates instead — calculating from iteration count alone misses that branch."}, {"text": "For each iteration, sketch the grid, mark the robot's facing direction, and check CAN_MOVE before deciding which branch executes.", "isCorrect": true, "rationale": "Robot grid problems require state tracking on paper: (1) current facing direction, (2) whether CAN_MOVE(forward) is true at the current cell, (3) which branch executes. A quick grid sketch with the position re-marked after each iteration is faster and more accurate than tracking state mentally."}, {"text": "Trace only the IF branch — the ELSE branch rarely executes on the AP exam.", "isCorrect": false, "rationale": "AP exam robot questions deliberately set up scenarios where the ELSE branch executes (boundary collision). Skipping it guarantees wrong answers on the harder questions."}, {"text": "Assume the robot stays at the start position; track only which way it faces.", "isCorrect": false, "rationale": "MOVE_FORWARD changes position. Ignoring position makes any 'where is the robot now' question impossible to answer."}], "id": "q08"}, {"question": "Three rules govern systematic tracing under exam conditions. Which is NOT one of them?", "options": [{"text": "Write it down — never trace a loop of more than two iterations in your head.", "isCorrect": false, "rationale": "This IS one of the three rules from the section. The discipline of writing forces accuracy."}, {"text": "One row per iteration — draw the trace table before you look at the answer choices.", "isCorrect": false, "rationale": "This IS one of the three rules. Drawing first prevents confirmation bias toward whichever choice 'looks right.'"}, {"text": "Trace only one path — once you find a value matching an answer choice, stop.", "isCorrect": true, "rationale": "This is the OPPOSITE of the recommended discipline. Stopping mid-trace at the first match is how students fall for distractors that share an early value with the correct output. Always finish the full trace."}, {"text": "Inner before outer — exhaust the inner loop's counter completely before incrementing the outer counter.", "isCorrect": false, "rationale": "This IS one of the three rules. It prevents the most common nested-loop trace error."}], "id": "q09"}, {"question": "When checking for bugs in an algorithm, the recommended order is:", "options": [{"text": "Logic first, then runtime, then syntax.", "isCorrect": false, "rationale": "Reversed. Logic bugs are the hardest to find (require a full trace) and should be checked LAST, not first."}, {"text": "Syntax first, runtime second, logic last.", "isCorrect": true, "rationale": "Per the section's three-class rule: syntax errors are easiest to spot (wrong symbol, wrong keyword), runtime errors second (infinite loops, out-of-bounds), and logic errors last because they require a full trace to expose. Checking in order saves time on the exam."}, {"text": "All three classes simultaneously, in any order.", "isCorrect": false, "rationale": "Simultaneous checking is unfocused and slower. Working in classes lets you cross out clean categories and concentrate on the remaining ones."}, {"text": "Runtime first, then logic, then syntax.", "isCorrect": false, "rationale": "Runtime errors require running or tracing the code, which is slower than syntax inspection. Syntax should always be checked first as the cheapest pass."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
