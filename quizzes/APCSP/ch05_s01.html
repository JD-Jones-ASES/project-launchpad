        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Introduction to Lists</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Consider the following Python code:\n\nstudy_records = []\nstudy_records.append((\"2025-09-01\", \"math\", 45))\nstudy_records.append((\"2025-09-01\", \"history\", 30))\nstudy_records.append((\"2025-09-02\", \"math\", 60))\n\nWhat does study_records[1] evaluate to immediately after this code runs?", "options": [{"text": "(\"2025-09-01\", \"math\", 45)", "isCorrect": false, "rationale": "That tuple was the first element appended, so it lives at index 0 in Python, not index 1. Python is zero-indexed: the FIRST element has index 0."}, {"text": "(\"2025-09-01\", \"history\", 30)", "isCorrect": true, "rationale": "Successive appends fill index 0, then 1, then 2. The history record was the second appended call, so it occupies index 1 under Python's zero-based indexing."}, {"text": "(\"2025-09-02\", \"math\", 60)", "isCorrect": false, "rationale": "That record was the third appended call, so it occupies index 2 in Python, not index 1."}, {"text": "An IndexError, because Python lists do not allow integer indices.", "isCorrect": false, "rationale": "Python lists are accessed precisely by integer indices. Index 1 is valid here because the list has three elements (valid indices 0, 1, 2)."}]}, {"question": "A student writes:\n\ntemps = []\ntemps.append(72)\nprint(temps[0])\n\nWhat is printed, and why?", "options": [{"text": "[]; the list is still empty because append returns None.", "isCorrect": false, "rationale": "The .append() method modifies the list in place. Even though it returns None, the side effect adds 72 to the list, so temps[0] is 72, not [] ."}, {"text": "72; .append() adds 72 to the end of the list, where it occupies index 0 because the list was previously empty.", "isCorrect": true, "rationale": "After append, the list contains a single element. The first element of any non-empty Python list is at index 0, so temps[0] is 72."}, {"text": "1; the list now has length 1.", "isCorrect": false, "rationale": "len(temps) is 1, but temps[0] returns the first element's value (72), not the length of the list."}, {"text": "An IndexError, because the list is too short.", "isCorrect": false, "rationale": "After the append, the list has one element at index 0, so temps[0] is a valid access."}]}, {"question": "Given subjects = [\"math\", \"history\", \"science\", \"art\"], what does subjects[-1] evaluate to in Python, and what is the equivalent expression in AP Pseudocode?", "options": [{"text": "\"math\"; in Pseudocode it is subjects[1].", "isCorrect": false, "rationale": "subjects[-1] is the LAST element, not the first. Negative indexing in Python counts from the end."}, {"text": "\"art\"; in Pseudocode it is subjects[LENGTH(subjects)].", "isCorrect": true, "rationale": "Python's -1 means the last element, which is \"art\". AP Pseudocode has no negative indexing, so the last element is accessed using the positive index LENGTH(lst)."}, {"text": "\"art\"; in Pseudocode it is also subjects[-1].", "isCorrect": false, "rationale": "AP Pseudocode does not support negative indices. Writing subjects[-1] in Pseudocode is invalid."}, {"text": "An IndexError; Python rejects negative indices.", "isCorrect": false, "rationale": "Python explicitly supports negative indexing as a convenience. lst[-1] returns the last element."}]}, {"question": "Why is using a list (such as study_records) better than using three separate variables record1, record2, record3 to store three study sessions?", "options": [{"text": "Because lists run faster than individual variables in Python.", "isCorrect": false, "rationale": "Speed is not the central reason. Indexing one variable is essentially as fast as indexing a list element. The main reason is structural: a list scales without rewriting code."}, {"text": "Because three separate variables cannot store tuples, only lists can.", "isCorrect": false, "rationale": "Any variable can hold a tuple. The argument for lists is not about what you can store, but about how easily you can process many items together."}, {"text": "Because a single list lets you process any number of records with one loop, while separate variables would require new code for every additional record.", "isCorrect": true, "rationale": "This is the data-abstraction argument. With a list, the same for loop works for 3 or 300 records. Separate variables force you to rewrite code as N grows."}, {"text": "Because lists automatically sort their elements alphabetically.", "isCorrect": false, "rationale": "Python lists preserve insertion order; they do not auto-sort. Order is exactly the order of your appends."}]}, {"question": "Which statement BEST distinguishes a tuple from a list in Python?", "options": [{"text": "Tuples are ordered; lists are unordered.", "isCorrect": false, "rationale": "Both lists and tuples are ordered sequences in Python. The distinction is about mutability, not ordering."}, {"text": "Tuples are immutable (cannot be changed after creation), while lists are mutable (elements can be reassigned).", "isCorrect": true, "rationale": "This is the defining difference. A tuple's contents are fixed; assigning session[2] = 50 raises a TypeError. Lists support item assignment such as subjects[0] = \"physics\"."}, {"text": "Tuples can hold only numbers; lists can hold any type.", "isCorrect": false, "rationale": "Both tuples and lists can hold values of any type, including mixed types."}, {"text": "Tuples use square brackets; lists use parentheses.", "isCorrect": false, "rationale": "Reverse: tuples use parentheses, lists use square brackets."}]}, {"question": "After the Python code\n\nstudy_records = []\nstudy_records.append((\"2025-09-01\", \"math\", 45))\nstudy_records.append((\"2025-09-02\", \"math\", 60))\n\nwhat does len(study_records) return?", "options": [{"text": "0, because the list was originally empty.", "isCorrect": false, "rationale": "len() reports the current length, not the original length. After two appends the list contains two elements."}, {"text": "2, because two append calls added two tuple elements.", "isCorrect": true, "rationale": "Each .append() adds exactly one element to the list. After two appends, the list has two tuple elements, so len(study_records) is 2."}, {"text": "6, because each tuple has three fields and 2 + 4 fields total.", "isCorrect": false, "rationale": "len() of a list of tuples returns the number of tuples, not the total number of fields inside them. The list has 2 elements regardless of internal tuple width."}, {"text": "3, because each appended tuple has three values.", "isCorrect": false, "rationale": "len() counts list elements (the tuples themselves), not the values inside each tuple."}]}, {"question": "Which line of code produces a TypeError?", "options": [{"text": "subjects = [\"math\", \"history\"]; subjects[0] = \"physics\"", "isCorrect": false, "rationale": "subjects is a list, which is mutable. Reassigning subjects[0] is a legal operation."}, {"text": "study_records = []; study_records.append((\"2025-09-03\", \"math\", 35))", "isCorrect": false, "rationale": "Appending to a list, even appending a tuple, is fully supported. No error here."}, {"text": "session = (\"2025-09-01\", \"math\", 45); session[2] = 50", "isCorrect": true, "rationale": "session is a tuple. Tuples are immutable, so assigning session[2] = 50 raises a TypeError because tuples do not support item assignment."}, {"text": "subjects = [\"math\", \"history\", \"science\"]; print(subjects[-2])", "isCorrect": false, "rationale": "Negative indexing is supported in Python. subjects[-2] is \"history\" and prints without error."}]}, {"question": "A list in Python is described as 'an array of references.' What practical consequence does this have?", "options": [{"text": "Indexing slows down as the list grows because Python must scan to find the requested slot.", "isCorrect": false, "rationale": "The opposite is true. Because a list stores references in fixed-size slots, lst[i] jumps directly to the i-th slot in constant time, regardless of list length."}, {"text": "Lists can hold elements of mixed types because each slot stores only an address, not a typed value.", "isCorrect": true, "rationale": "Since the list stores pointers to objects (not the objects themselves), the slot is the same size regardless of what type the referenced object is. That is how [1, \"hello\", 3.14, True] is a legal Python list."}, {"text": "Every append must copy the entire list to a larger buffer.", "isCorrect": false, "rationale": "Python pre-allocates extra capacity, so most appends are constant time. Reallocation only happens occasionally, which is why average append cost is constant (amortized)."}, {"text": "Once a list is created, its elements cannot be reassigned by index.", "isCorrect": false, "rationale": "Lists are mutable and fully support item reassignment (subjects[0] = \"physics\"). Storing references does not freeze the slots."}]}, {"question": "In the Study Streak Tracker, each record is represented as a tuple inside a list, like (\"2025-09-01\", \"math\", 45). Why is the tuple a deliberate design choice rather than another list?", "options": [{"text": "Tuples save memory by removing the indices.", "isCorrect": false, "rationale": "Tuples and lists both use indices. The reason for choosing a tuple is semantic, not memory-related."}, {"text": "Tuples enforce that the three fields of a single session (date, subject, minutes) cannot be modified once recorded, while the outer list of sessions can still grow.", "isCorrect": true, "rationale": "The Study Streak Tracker uses tuples for individual sessions because once a session is logged, its date, subject, and minutes should not change. The outer list remains mutable so new sessions can be appended."}, {"text": "A list of lists would refuse to compile in Python.", "isCorrect": false, "rationale": "Python fully allows lists of lists. The choice of tuple is about expressing intent (immutability), not avoiding a syntax error."}, {"text": "Tuples can only be appended, never indexed.", "isCorrect": false, "rationale": "Tuples support indexing exactly like lists (record[1] retrieves the second field). What they do not support is reassignment of those fields."}]}, {"question": "Trace this code carefully:\n\nrecords = []\nrecords.append((\"a\", 1))\nrecords.append((\"b\", 2))\nrecords.append((\"c\", 3))\nfor r in records:\n    label, value = r\n    print(label, value)\n\nWhat does this code print?", "options": [{"text": "Nothing; tuple unpacking inside a for loop is not allowed.", "isCorrect": false, "rationale": "Tuple unpacking in a for loop body is fully supported. The line label, value = r unpacks the two fields of each tuple."}, {"text": "a 1\\nb 2\\nc 3 (each pair on its own line, in append order)", "isCorrect": true, "rationale": "The loop visits each tuple in insertion order. Unpacking binds label to the first field and value to the second. The output is exactly the three records in the order they were appended."}, {"text": "c 3\\nb 2\\na 1 (in reverse order)", "isCorrect": false, "rationale": "Python lists preserve insertion order. The for loop visits elements from index 0 onward, not in reverse."}, {"text": "(a, 1) (b, 2) (c, 3) printed on a single line.", "isCorrect": false, "rationale": "print() is called once per loop iteration and prints on a separate line by default. Each iteration also prints unpacked values, not the raw tuple."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
