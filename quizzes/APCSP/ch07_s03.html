    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Communication Protocols</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "You are designing a real-time voice-over-IP (VoIP) call application. The call quality should remain smooth even if a small number of packets are lost. Should you build the application on TCP or UDP, and why?", "options": [{"text": "TCP, because TCP retransmits lost packets and guarantees ordered delivery — both essential for voice.", "isCorrect": false, "rationale": "Retransmitting a voice packet 200 ms late is worse than useless because the conversation has moved on. TCP's retransmission and ordering are exactly what makes it the wrong fit for real-time voice."}, {"text": "UDP, because real-time voice prioritizes low latency over completeness; a packet retransmitted 200 ms late is no longer useful, and a tiny gap is more tolerable than a stalled stream.", "isCorrect": true, "rationale": "This is the textbook protocol-choice argument. UDP's lack of handshake, retransmission, and flow control is a feature for latency-sensitive workloads. Voice and video conferencing tolerate small dropouts but not delay."}, {"text": "TCP, because TCP is faster than UDP for all applications.", "isCorrect": false, "rationale": "TCP is not faster than UDP for any application. TCP adds reliability machinery; UDP omits it for speed and simplicity."}, {"text": "Neither — VoIP must be sent only over IP without any transport-layer protocol.", "isCorrect": false, "rationale": "All Internet applications use a transport-layer protocol (TCP, UDP, or QUIC). Raw IP without a transport layer is not a deployment option for application traffic."}]}, {"question": "How many messages are exchanged in the TCP three-way handshake before any application data can flow, and what does each message accomplish?", "options": [{"text": "One message: a SYN packet from the client. The connection is established as soon as the server receives it.", "isCorrect": false, "rationale": "One message is insufficient. TCP requires three messages so both parties confirm the other's initial sequence number."}, {"text": "Three messages: SYN from the client (proposes initial sequence number x), SYN-ACK from the server (acknowledges x+1 and proposes its own y), and ACK from the client (acknowledges y+1). After ACK, data can flow.", "isCorrect": true, "rationale": "The text describes exactly this sequence. Three messages are needed because each side must announce and acknowledge the other's initial sequence number before reliable byte-stream transfer can begin."}, {"text": "Two messages: SYN from the client and ACK from the server.", "isCorrect": false, "rationale": "Two-way handshake is insufficient. The third message (client's ACK of the server's sequence number) closes the handshake symmetrically."}, {"text": "Four messages: SYN, ACK, FIN, RST.", "isCorrect": false, "rationale": "The handshake to open a TCP connection is three messages. FIN and RST are used for connection teardown and abnormal termination, not connection establishment."}]}, {"question": "An IPv4 address is 32 bits long, allowing approximately 4.3 billion unique addresses. Why is this no longer enough, and what protocol was designed to replace it?", "options": [{"text": "The Internet now has more than 4.3 billion connected devices, and IANA allocated the last block of unassigned IPv4 addresses in February 2011. IPv6, with 128-bit addresses, provides far more addresses than will ever be needed.", "isCorrect": true, "rationale": "The text is explicit: IPv4 exhaustion happened around 2011, and IPv6 was designed for it. 128-bit addresses give 2^128 ≈ 3.4 × 10^38 unique values — enough for vast over-provisioning."}, {"text": "IPv4 is still sufficient; the Internet has fewer than 1 billion devices.", "isCorrect": false, "rationale": "The text states there are roughly 15 billion connected devices today, well above 4.3 billion. Address exhaustion is real."}, {"text": "IPv6 reduces the address size from 32 bits to 16 bits to save bandwidth.", "isCorrect": false, "rationale": "IPv6 increases address size from 32 to 128 bits to expand the address space. Reducing the address would worsen the problem."}, {"text": "IPv6 was designed in 1981 to replace IPv4 before IPv4 was deployed.", "isCorrect": false, "rationale": "IPv4 was specified in RFC 791 in 1981; IPv6 was designed later to address exhaustion. Their development is sequential, not simultaneous."}]}, {"question": "DNS is described as 'the phonebook of the Internet.' Briefly, what does DNS do, and what would happen if it stopped working?", "options": [{"text": "DNS encrypts all web traffic; without it, browsers could not establish HTTPS connections.", "isCorrect": false, "rationale": "Encryption is provided by TLS, not DNS. DNS's job is name-to-address resolution, not encryption."}, {"text": "DNS translates human-readable domain names like www.example.com into numeric IP addresses like 93.184.216.34. If DNS stopped, users could only reach servers by typing IP addresses directly, and almost every web request — which depends on name resolution — would fail.", "isCorrect": true, "rationale": "The text describes DNS as a hierarchical, distributed database that maps names to IPs, and emphasizes that nearly every web request depends on it. The Internet would still function at the IP layer, but the user-facing Web would break."}, {"text": "DNS is the protocol used to send email between mail servers.", "isCorrect": false, "rationale": "Email between servers uses SMTP; DNS is consulted to find the address of the mail server, but DNS itself does not transport email."}, {"text": "DNS routes packets between Tier 1 ISPs.", "isCorrect": false, "rationale": "Routing between ISPs is BGP's job. DNS resolves names; it does not forward packets."}]}, {"question": "Which BEST describes the contrast between TCP and UDP at the level of guarantees and overhead?", "options": [{"text": "TCP provides reliable, ordered, connection-oriented delivery (with handshake, ACKs, retransmission, flow control), while UDP provides unreliable, connectionless, best-effort delivery with an 8-byte header and no retransmission. TCP is the right tool when every byte matters; UDP is the right tool when latency matters more than completeness.", "isCorrect": true, "rationale": "This captures the symmetry the section emphasizes. TCP and UDP are not competitors but complementary tools. TCP's machinery costs latency and overhead; UDP's leanness costs reliability — and these are the right trade-offs for different workloads."}, {"text": "TCP and UDP provide the same guarantees, but UDP is older.", "isCorrect": false, "rationale": "They have very different guarantees. TCP is reliable and ordered; UDP is neither."}, {"text": "UDP provides reliability through retransmission; TCP does not.", "isCorrect": false, "rationale": "It is the reverse. TCP provides retransmission; UDP does not. Applications using UDP must implement their own error handling if needed."}, {"text": "UDP is always slower than TCP because of its handshake.", "isCorrect": false, "rationale": "UDP has no handshake at all. UDP is faster than TCP because it omits the handshake, ACKs, and flow control."}]}, {"question": "An RFC 791 excerpt describes IP as providing 'transmitting blocks of data called datagrams from sources to destinations, where sources and destinations are hosts identified by fixed length addresses.' What does the RFC tell you about IP's responsibilities?", "options": [{"text": "IP provides addressing, datagram forwarding, and fragmentation when packets must cross networks with smaller maximum sizes — but it does not guarantee delivery or ordering. Reliable, ordered delivery is the job of TCP, layered on top of IP.", "isCorrect": true, "rationale": "The RFC excerpt emphasizes addressing and datagram forwarding. The text makes the layering explicit: IP is best-effort; TCP adds reliability and ordering on top."}, {"text": "IP is responsible for retransmitting any datagrams that are lost in transit.", "isCorrect": false, "rationale": "Retransmission is TCP's job, not IP's. IP provides best-effort delivery only."}, {"text": "IP encrypts all datagrams as they leave the source.", "isCorrect": false, "rationale": "IP does not encrypt by default. Encryption is provided by TLS at higher layers, or by IPsec at the network layer when explicitly enabled."}, {"text": "IP guarantees that datagrams arrive in the order they were sent.", "isCorrect": false, "rationale": "IP does not guarantee order. TCP provides ordering using sequence numbers."}]}, {"question": "A browser fetches a page from https://www.example.com. List the order in which DNS, TCP, TLS, and HTTP are involved in that fetch.", "options": [{"text": "HTTP first, then TCP, then DNS, then TLS.", "isCorrect": false, "rationale": "HTTP cannot run before the TCP connection exists, and the TCP connection cannot be opened before DNS resolves the hostname to an IP."}, {"text": "DNS first (resolve hostname to IP), then TCP three-way handshake (open connection), then TLS handshake (establish encrypted channel), then HTTP request and response over the encrypted channel.", "isCorrect": true, "rationale": "This is the section's exact stack-in-action sequence. Each layer prepares the next: name resolution, then transport, then encryption, then application."}, {"text": "TCP first, then DNS, then HTTP, then TLS.", "isCorrect": false, "rationale": "TCP cannot run before DNS resolves the hostname. And TLS must be established before HTTP can travel encrypted on HTTPS."}, {"text": "TLS first, then DNS, then TCP, then HTTP.", "isCorrect": false, "rationale": "TLS runs over an existing TCP connection. TCP must be open first, and DNS must run before TCP can target an IP."}]}, {"question": "A streaming video service needs to deliver a live broadcast to millions of viewers. Each viewer should receive the latest frames as quickly as possible; missing one frame is acceptable, but stalling for retransmission is not. Which transport choice is most appropriate, and why?", "options": [{"text": "TCP, because TCP guarantees frame-by-frame delivery.", "isCorrect": false, "rationale": "TCP guarantees delivery but at the cost of stalling when packets are lost — exactly what live streaming cannot tolerate."}, {"text": "UDP (often via QUIC, which is built on UDP), because live streaming favors low latency. A missing packet is a brief artifact; a TCP retransmit pause is a stutter that ruins the experience.", "isCorrect": true, "rationale": "The section's logic for VoIP applies: live media tolerate small loss but not delay. UDP (and HTTP/3 over QUIC, which is UDP-based) is the right transport for latency-sensitive content."}, {"text": "DNS, because DNS is the only protocol designed for streaming.", "isCorrect": false, "rationale": "DNS resolves names; it does not transport media streams."}, {"text": "HTTP/1.0, because it has no encryption overhead.", "isCorrect": false, "rationale": "HTTP/1.0 still runs over TCP and inherits TCP's retransmission stalls. The transport-layer choice (TCP vs UDP) is the relevant one for streaming."}]}, {"question": "A user types www.example.com and the browser resolves the name. Place the DNS lookup steps in order, starting from the resolver having no cached answer.", "options": [{"text": "Authoritative server → TLD server → root server.", "isCorrect": false, "rationale": "This is exactly backwards. The hierarchy starts at the root, descends to the TLD server, and ends at the authoritative server."}, {"text": "Resolver asks a root name server which servers handle .com → root replies with the .com TLD server's address → resolver asks the .com TLD server which servers handle example.com → TLD replies with Example's authoritative name server → resolver asks Example's authoritative server for the IP of www.example.com → answer returned.", "isCorrect": true, "rationale": "The section walks through this exact three-step descent: root → TLD → authoritative. Each layer narrows the scope until the resolver reaches the server holding the actual hostname-to-IP mapping."}, {"text": "Resolver caches a random IP and asks the user to confirm it.", "isCorrect": false, "rationale": "DNS does not guess. Caching speeds repeat lookups but is keyed on prior answers, not random fabrication."}, {"text": "Resolver broadcasts the lookup to every router on the Internet.", "isCorrect": false, "rationale": "DNS is hierarchical, not broadcast. Broadcasting every lookup globally would be infeasible."}]}, {"question": "Which statement BEST describes why HTTP is called a 'stateless' protocol, and what consequence this has for web applications?", "options": [{"text": "HTTP is stateless because each request-response pair is independent — the server does not remember earlier requests by default. To maintain login sessions or shopping carts, applications must layer state on top using cookies or tokens.", "isCorrect": true, "rationale": "The section makes this point exactly. Statelessness is a deliberate simplification at the protocol layer; persistent state (login, cart) is implemented above HTTP using cookies, sessions, or token-based authentication."}, {"text": "HTTP is stateless because it never sends data — only headers.", "isCorrect": false, "rationale": "HTTP sends bodies (HTML, JSON, images). Statelessness refers to memory between requests, not absence of data."}, {"text": "Stateless means HTTP traffic is encrypted by default.", "isCorrect": false, "rationale": "Encryption is provided by TLS in HTTPS; statelessness is unrelated to encryption."}, {"text": "Stateless means HTTP requests cannot include any user data.", "isCorrect": false, "rationale": "HTTP requests can carry arbitrary user data in headers and bodies. Statelessness only means the protocol does not retain memory across requests."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
