<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Pseudocode Boot Camp</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student translates the following Python loop to AP Pseudocode:\n\nfor i in range(5):\n    print(i)\n\nWhich AP Pseudocode segment is the correct translation?", "options": [{"text": "i <- 0\nREPEAT 5 TIMES\n  DISPLAY(i)\n  i <- i + 1", "isCorrect": true, "rationale": "Python's range(5) yields 0, 1, 2, 3, 4 (five iterations starting at 0). Translating requires an explicit counter initialized to 0 before REPEAT 5 TIMES, with the counter incremented inside the loop so each value is displayed before increment."}, {"text": "i <- 1\nREPEAT 5 TIMES\n  DISPLAY(i)\n  i <- i + 1", "isCorrect": false, "rationale": "Off-by-one from 0/1 indexing. Python's range(5) starts at 0, not 1. Initializing i to 1 displays 1, 2, 3, 4, 5 instead of 0, 1, 2, 3, 4."}, {"text": "i <- 0\nREPEAT UNTIL (i = 5)\n  i <- i + 1\n  DISPLAY(i)", "isCorrect": false, "rationale": "Two errors. Incrementing before DISPLAY skips 0 and includes 5 in the output. Even fixing the order, REPEAT UNTIL (i = 5) is structurally fine but the body order is wrong."}, {"text": "REPEAT 5 TIMES\n  DISPLAY(i)", "isCorrect": false, "rationale": "i is never initialized or updated. Without an explicit counter declared and incremented, REPEAT n TIMES has no variable to display."}], "id": "q01"}, {"question": "Consider the AP Pseudocode below.\n\ntotal <- 0\ni <- 1\nREPEAT UNTIL (i > 10)\n  total <- total + i\n  i <- i + 1\nDISPLAY(total)\n\nA student translates the REPEAT UNTIL line as while i > 10: in Python. What is the result?", "options": [{"text": "The Python loop produces the same total (55) because the conditions are equivalent.", "isCorrect": false, "rationale": "REPEAT UNTIL and while loops use opposite condition semantics. They are not equivalent under the same condition."}, {"text": "The Python loop body never executes, so total stays 0.", "isCorrect": true, "rationale": "REPEAT UNTIL inverted condition — error vector #2. REPEAT UNTIL (i > 10) runs WHILE i is NOT > 10 (i.e., while i <= 10). The Python equivalent is while i <= 10, not while i > 10. Since i starts at 1 (which is not > 10), while i > 10 is immediately false and the body never runs."}, {"text": "The Python loop runs forever because i is never updated outside the body.", "isCorrect": false, "rationale": "i is updated inside the loop. The reason for the bug is the inverted condition, not infinite looping."}, {"text": "The Python loop produces 11 (one extra iteration).", "isCorrect": false, "rationale": "The loop body never runs, so total stays at its initial value of 0 — not 11."}], "id": "q02"}, {"question": "Which Python expression is a correct equality test, and which AP Pseudocode statement is a correct assignment?", "options": [{"text": "Python: x = 5; AP Pseudocode: x = 5", "isCorrect": false, "rationale": "Both are wrong. In Python, x = 5 is assignment, not equality (use ==). In AP Pseudocode, x = 5 is an equality test, not assignment (use <-)."}, {"text": "Python: x == 5; AP Pseudocode: x <- 5", "isCorrect": true, "rationale": "Equality vs. assignment — error vector #3. Python uses == for equality and = for assignment; AP Pseudocode uses = for equality and <- for assignment. Mixing these up is among the most common translation errors."}, {"text": "Python: x <- 5; AP Pseudocode: x = 5", "isCorrect": false, "rationale": "Reversed. Python does not use <- as an operator at all. The arrow notation belongs to AP Pseudocode."}, {"text": "Python: x == 5; AP Pseudocode: x = 5", "isCorrect": false, "rationale": "The Python side is right, but x = 5 in AP Pseudocode is an equality comparison, not an assignment. Assignment in AP Pseudocode requires <-."}], "id": "q03"}, {"question": "What does the following Python loop output?\n\nfor i in range(2, 10, 2):\n    print(i, end=' ')", "options": [{"text": "2 4 6 8 10", "isCorrect": false, "rationale": "Range start/stop/step semantics — error vector #6. range(2, 10, 2) excludes the stop value of 10. The next term after 8 would be 10, but 10 meets the stop boundary, so the loop halts and never prints 10."}, {"text": "2 4 6 8", "isCorrect": true, "rationale": "range(start, stop, step) is exclusive at stop. range(2, 10, 2) yields 2, 4, 6, 8 — the next value would be 10, but 10 is not less than the stop value 10, so iteration ends. Always subtract 1 mentally from the stop value to find the last produced element."}, {"text": "0 2 4 6 8", "isCorrect": false, "rationale": "Three-argument range uses the explicit start, which here is 2, not 0. The 0 default applies only when start is omitted."}, {"text": "2 4 6 8 10 12", "isCorrect": false, "rationale": "Both endpoint errors at once. 10 is excluded (stop), and 12 is past stop entirely. The loop produces only four values."}], "id": "q04"}, {"question": "Which Python translation correctly preserves the semantics of\n\nREPEAT UNTIL (count >= 5)\n  count <- count + 1?", "options": [{"text": "while count < 5:\n    count = count + 1", "isCorrect": true, "rationale": "REPEAT UNTIL (cond) means \"loop while cond is FALSE.\" REPEAT UNTIL (count >= 5) runs while count < 5. Python while uses the opposite of the UNTIL condition, so count < 5 is the correct translation."}, {"text": "while count >= 5:\n    count = count + 1", "isCorrect": false, "rationale": "REPEAT UNTIL inverted condition — error vector #2. Python while loops while the condition is TRUE; REPEAT UNTIL loops until it becomes true. They use OPPOSITE conditions, so the direct copy is wrong."}, {"text": "while count <= 5:\n    count = count + 1", "isCorrect": false, "rationale": "Off-by-one. The pseudocode condition is >=, not >, so the Python negation is < (not <=). count <= 5 lets count reach 5 and run one extra iteration."}, {"text": "while count == 5:\n    count = count + 1", "isCorrect": false, "rationale": "This loops only when count is exactly 5, not while count is below 5. It does not preserve the original's semantics."}], "id": "q05"}, {"question": "Consider the AP Pseudocode\n\nscores <- [85, 90, 78, 92, 88]\ni <- 1\nREPEAT UNTIL (i > LENGTH(scores))\n  DISPLAY(scores[i])\n  i <- i + 1\n\nA student translates this directly to Python as\n\nfor i in range(1, len(scores) + 1):\n    print(scores[i])\n\nWhat happens when the Python code runs?", "options": [{"text": "Python prints all five scores correctly.", "isCorrect": false, "rationale": "Python lists are 0-indexed; AP Pseudocode lists are 1-indexed. Using 1..LENGTH directly in Python skips index 0 and crashes on the upper end."}, {"text": "Python prints scores[1] through scores[4] and then raises IndexError on scores[5].", "isCorrect": true, "rationale": "Off-by-one from 0/1 indexing — error vector #1. AP Pseudocode indexes from 1, Python from 0. The translation should be range(len(scores)) (0..4), not range(1, len(scores) + 1) (1..5). Index 5 is out of bounds for a 5-element list."}, {"text": "Python prints nothing because the loop body never runs.", "isCorrect": false, "rationale": "The loop range(1, 6) yields 1, 2, 3, 4, 5 — it does run. The crash happens after printing four scores."}, {"text": "Python loops infinitely because i is never reset.", "isCorrect": false, "rationale": "for loops over a fixed range never loop infinitely. The bug is an out-of-bounds index, not non-termination."}], "id": "q06"}, {"question": "A student translates\n\nfor i in range(1, 6):\n    print(i)\n\nto AP Pseudocode as REPEAT 6 TIMES with no counter. Which translation error is this?", "options": [{"text": "Off-by-one from 0/1 indexing.", "isCorrect": false, "rationale": "0/1 indexing applies to list element access, not to loop iteration counts."}, {"text": "Loop boundary inclusivity.", "isCorrect": true, "rationale": "Loop boundary inclusivity — error vector #4. range(1, 6) produces five iterations (1, 2, 3, 4, 5), not six. range(a, b) excludes b; the iteration count is b - a = 5. REPEAT 6 TIMES would run one extra iteration."}, {"text": "REPEAT UNTIL inverted condition.", "isCorrect": false, "rationale": "There is no REPEAT UNTIL in this translation. The error is in the iteration count, not the condition direction."}, {"text": "Equality vs. assignment.", "isCorrect": false, "rationale": "Neither version uses an equality test or assignment in the way that triggers this error vector."}], "id": "q07"}, {"question": "What does the following AP Pseudocode display?\n\nPROCEDURE classify(score)\n  IF (score >= 90)\n    RETURN(\"A\")\n  IF (score >= 80)\n    RETURN(\"B\")\n  RETURN(\"F\")\nDISPLAY(classify(85))", "options": [{"text": "A", "isCorrect": false, "rationale": "85 is not >= 90, so the first IF body does not execute."}, {"text": "B", "isCorrect": true, "rationale": "85 fails the first test (>= 90 is false) and passes the second (>= 80 is true), returning \"B\". Once a procedure RETURNs, execution exits — the third RETURN is never reached for this input."}, {"text": "F", "isCorrect": false, "rationale": "RETURN exits the procedure immediately. After RETURN(\"B\"), the third RETURN(\"F\") is unreachable for this input."}, {"text": "B then F", "isCorrect": false, "rationale": "RETURN exits the procedure; only one value can be returned. The second IF returns \"B\" and the third RETURN never executes for score = 85."}], "id": "q08"}, {"question": "Trace the AP Pseudocode below and select the displayed output.\n\nevens <- []\ni <- 2\nREPEAT 5 TIMES\n  APPEND(evens, i)\n  i <- i + 2\nDISPLAY(evens)", "options": [{"text": "[2, 4, 6, 8, 10]", "isCorrect": true, "rationale": "REPEAT 5 TIMES runs the body exactly five times. i takes the values 2, 4, 6, 8, 10 (incremented by 2 each iteration after append). The list grows by one element per iteration."}, {"text": "[2, 4, 6, 8]", "isCorrect": false, "rationale": "Loop boundary error. REPEAT 5 TIMES means 5 iterations, not 4. The list contains 5 elements, ending at 10."}, {"text": "[0, 2, 4, 6, 8]", "isCorrect": false, "rationale": "The counter i starts at 2, not 0. The first APPEND adds 2."}, {"text": "[2, 4, 6, 8, 10, 12]", "isCorrect": false, "rationale": "REPEAT 5 TIMES runs only 5 times. The 6th increment to 12 happens after the last append, so 12 is never appended."}], "id": "q09"}, {"question": "A student is asked to translate the procedure-with-loop pattern\n\ndef count_above(data, threshold):\n    count = 0\n    for val in data:\n        if val > threshold:\n            count = count + 1\n    return count\n\nto AP Pseudocode. Which is the correct translation?", "options": [{"text": "PROCEDURE count_above(data, threshold)\n  count <- 0\n  i <- 0\n  REPEAT UNTIL (i > LENGTH(data))\n    IF (data[i] > threshold)\n      count <- count + 1\n    i <- i + 1\n  RETURN(count)", "isCorrect": false, "rationale": "Two errors. AP Pseudocode lists are 1-indexed (i should start at 1), and the loop condition should be i > LENGTH(data) only after i exceeds the last valid index, which here would mean using i starts at 1 and runs until i > LENGTH."}, {"text": "PROCEDURE count_above(data, threshold)\n  count <- 0\n  i <- 1\n  REPEAT UNTIL (i > LENGTH(data))\n    IF (data[i] > threshold)\n      count <- count + 1\n    i <- i + 1\n  RETURN(count)", "isCorrect": true, "rationale": "Correct on all four key points: (1) PROCEDURE definition with parameters, (2) i initialized to 1 (AP 1-indexed lists), (3) REPEAT UNTIL with proper inverted condition (i > LENGTH means stop when past end), (4) RETURN exits with the count value."}, {"text": "PROCEDURE count_above(data, threshold)\n  count = 0\n  i = 1\n  REPEAT UNTIL (i > LENGTH(data))\n    IF (data[i] > threshold)\n      count = count + 1\n    i = i + 1\n  RETURN(count)", "isCorrect": false, "rationale": "Equality vs. assignment — error vector #3. AP Pseudocode uses <- for assignment, not =. With = used as shown, every line that should assign is actually an equality test, breaking the algorithm."}, {"text": "PROCEDURE count_above(data, threshold)\n  count <- 0\n  REPEAT LENGTH(data) TIMES\n    IF (data > threshold)\n      count <- count + 1\n  RETURN(count)", "isCorrect": false, "rationale": "data > threshold compares the entire list to a number — not the same as accessing each element. Without an explicit counter and indexed access, the loop never visits individual elements."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
