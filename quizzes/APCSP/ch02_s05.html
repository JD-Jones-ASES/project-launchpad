    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Errors and Documentation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Classify each error and identify what determines its category:\n\n(A) print(\"Hello (missing closing quote)\n(B) x = 5 / 0\n(C) A program that computes sales tax at 8% but uses 0.008 instead of 0.08.", "options": [{"text": "A is syntax (the parser cannot complete the string), B is runtime (ZeroDivisionError raised when the line executes), C is logic (the program runs to completion but produces a plausible wrong answer with no error message).", "isCorrect": true, "rationale": "This matches the section's three-category framework. Syntax errors are caught before execution; runtime errors crash a running program; logic errors are silent and produce wrong output."}, {"text": "All three are runtime errors because they all involve programming mistakes.", "isCorrect": false, "rationale": "The three categories are distinct. A is a parsing failure (syntax); B is a crash at runtime; C is a silent logic error with no Python message."}, {"text": "A is logic, B is syntax, C is runtime.", "isCorrect": false, "rationale": "These are inverted. A's missing quote is detected by the parser before execution (syntax). B's division by zero crashes during execution (runtime). C produces a wrong answer with no Python error message (logic)."}, {"text": "All three are syntax errors because each violates a programming rule.", "isCorrect": false, "rationale": "Only A is a syntax error. B and C are not detected by the parser; they are runtime and logic, respectively."}], "id": "q01"}, {"question": "Which type of error does the section identify as the MOST DANGEROUS in real-world software, and why?", "options": [{"text": "Syntax errors, because they prevent the program from running at all.", "isCorrect": false, "rationale": "Syntax errors are easy to find and fix because Python prevents the program from running and points at the exact line. The section calls them Python's most helpful error messages."}, {"text": "Runtime errors, because they always crash the program.", "isCorrect": false, "rationale": "Runtime errors are visible (Python prints a traceback) and obviously broken. The section explicitly says a program that crashes is obviously broken, while one that returns a plausible-but-incorrect answer is more dangerous."}, {"text": "Logic errors, because the program runs to completion without any error message and may produce plausible-looking wrong answers that go undetected for a long time.", "isCorrect": true, "rationale": "The section explicitly labels logic errors the most dangerous. They are silent, produce no traceback, and require careful testing with known-correct outputs to detect."}, {"text": "Syntax errors, because they corrupt the source file.", "isCorrect": false, "rationale": "Syntax errors do not corrupt the source file. Python simply refuses to run it until the syntax is fixed."}], "id": "q02"}, {"question": "What error does the following code produce, and what is the correct way to read its traceback?\n\n# calc.py\ntotal = 100\ncount = 0\nresult = total / count", "options": [{"text": "TypeError, because total and count are different types.", "isCorrect": false, "rationale": "Both total and count are integers; / on two ints is permitted. The error is division by zero, not a type mismatch."}, {"text": "ZeroDivisionError: division by zero. The traceback shows the file and line that triggered the error. Read from bottom up: the last line names the error type, and the middle line shows where in your code the error originated.", "isCorrect": true, "rationale": "The section gives this exact pattern. Division by zero raises ZeroDivisionError. Read the bottom line first (error type), then walk back to find the offending line of your code."}, {"text": "SyntaxError, because Python forbids dividing by zero.", "isCorrect": false, "rationale": "Python does not catch division by zero at parse time; the line is syntactically valid. The error happens at runtime when Python tries to evaluate the operation."}, {"text": "It runs successfully and prints \"infinity\".", "isCorrect": false, "rationale": "Python raises ZeroDivisionError and stops execution. It does not print anything before the crash."}], "id": "q03"}, {"question": "Which of the following is the BEST distinction between a SyntaxError and a runtime error in Python?", "options": [{"text": "SyntaxError: Python's parser detects a violation of the grammar BEFORE any code runs; the program does not start. Runtime error: the program starts running successfully, then attempts an impossible operation; Python prints a traceback at the offending line and stops.", "isCorrect": true, "rationale": "This is the section's exact distinction. Syntax errors prevent execution; runtime errors interrupt execution. Both produce error messages, but at different stages."}, {"text": "SyntaxError occurs during execution; runtime error occurs before execution.", "isCorrect": false, "rationale": "These are inverted. Syntax errors happen at parse time, before execution; runtime errors happen during execution."}, {"text": "SyntaxError is silent; runtime error always crashes.", "isCorrect": false, "rationale": "SyntaxError is not silent — Python prints an explicit error message identifying the line and often the column. Logic errors are the silent category, not syntax errors."}, {"text": "Both are interchangeable terms for the same category of error.", "isCorrect": false, "rationale": "They are distinct categories with different timing and detection mechanisms. Confusing them is a frequent point-loss source."}], "id": "q04"}, {"question": "An AP CSP team computes the average of three quiz scores with `average = score1 + score2 + score3 / 3`. The program runs without crashing, but the printed average is wrong. Which error category, and how should the line be fixed?", "options": [{"text": "Logic error: the operator-precedence bug means / 3 binds only to score3, so the actual computation is score1 + score2 + (score3 / 3). The program runs to completion but produces plausible-looking wrong output. Fix: `average = (score1 + score2 + score3) / 3`.", "isCorrect": true, "rationale": "The section presents this exact example as a logic error. There is no error message because the line is syntactically valid and arithmetically defined; only the result is wrong. The fix is parentheses to enforce the intended order."}, {"text": "Syntax error: Python rejects the line because the parentheses are missing.", "isCorrect": false, "rationale": "Parentheses are not required for an expression to be syntactically valid; the line parses fine. The error is logic, not syntax."}, {"text": "Runtime error: division by zero somewhere in the average.", "isCorrect": false, "rationale": "There is no division by zero. The line runs to completion and produces a wrong number, which is the defining property of a logic error."}, {"text": "Type error: average is computed in a way that mixes int and float.", "isCorrect": false, "rationale": "Mixing int and float is allowed for + and /. The actual error is purely an order-of-operations bug, which puts it in the logic category."}], "id": "q05"}, {"question": "Which of the following lines, if executed, would raise a ValueError? Explain the rule for ValueError.", "options": [{"text": "print(undefined_variable)", "isCorrect": false, "rationale": "Using an unassigned name raises NameError, not ValueError."}, {"text": "10 / 0", "isCorrect": false, "rationale": "Division by zero raises ZeroDivisionError, not ValueError."}, {"text": "int(\"twenty\")", "isCorrect": true, "rationale": "ValueError signals a value of the right type but the wrong content. \"twenty\" is a string (right type for int's input), but the content is not parseable as a numeric literal. The section explicitly cites int(\"twenty\") as the canonical ValueError example."}, {"text": "\"hello\" + 5", "isCorrect": false, "rationale": "Mixing string and int with + raises TypeError, not ValueError. TypeError is wrong type; ValueError is right type but wrong content."}], "id": "q06"}, {"question": "The section distinguishes between effective and ineffective comments. Which of the following is the BEST illustration of an effective comment?", "options": [{"text": "x = 10  # set x to 10", "isCorrect": false, "rationale": "This restates what the code already says. Per the section, a good comment explains WHY, not WHAT — and this comment adds no information beyond the assignment itself."}, {"text": "y = x * 2  # multiply x by 2 and store in y", "isCorrect": false, "rationale": "This also restates the obvious mechanics. Per the section, this is the canonical example of a poor comment."}, {"text": "row_index = row_index + 1  # skip the header row (row 0 is the title)", "isCorrect": true, "rationale": "This explains the WHY behind the increment — a decision that would otherwise be mysterious. The code shows the increment; the comment supplies the reason."}, {"text": "print(y)  # print y", "isCorrect": false, "rationale": "This restates exactly what the line does and adds no information. The section's rule: explain why, not what."}], "id": "q07"}, {"question": "Why does the College Board specifically warn that NO comments should appear in the Personalized Project Reference (PPR) screenshots for the Create Performance Task?", "options": [{"text": "Comments slow down the grader's reading.", "isCorrect": false, "rationale": "The section gives a more specific reason: comments in PPR screenshots disqualify those abstractions from earning points."}, {"text": "If the PPR screenshots include comments, the submission is automatically disqualified from earning the data abstraction or procedural abstraction points. The lesson is to write helpful comments throughout your code but use comment-free code regions when capturing the PPR screenshots.", "isCorrect": true, "rationale": "This is the section's exact warning. Helpful comments throughout the code are good; PPR screenshots specifically must be comment-free or they cost the abstraction points."}, {"text": "Comments make screenshots illegible.", "isCorrect": false, "rationale": "The section does not give legibility as the reason. The actual reason is point disqualification on the rubric."}, {"text": "PPR rules require code in a single line; comments break that constraint.", "isCorrect": false, "rationale": "PPR does not require single-line code. The actual constraint is that comments themselves are forbidden in the screenshot regions for abstraction points."}], "id": "q08"}, {"question": "A student writes `print(\"Hello (missing closing quote)`. What does Python do, and which error category does this fit?", "options": [{"text": "Python finishes the program but warns about the unclosed string.", "isCorrect": false, "rationale": "Python's parser fails to complete parsing the string and aborts before any line runs. There is no \"warning\" mode in this case; the program does not run."}, {"text": "Python raises a SyntaxError because the parser cannot find a matching closing quote. Syntax errors are detected before any code executes; the program does not start until the error is fixed.", "isCorrect": true, "rationale": "An unmatched quotation mark is a classic syntax error. The parser cannot complete the string literal, so the program is rejected before execution."}, {"text": "Python raises a ValueError because \"Hello (missing closing quote)\" is the wrong type of value.", "isCorrect": false, "rationale": "ValueError is a runtime error for valid syntax with bad value content. Unclosed quotes are detected at parse time, before any value evaluation."}, {"text": "Python prints \"Hello\" and then crashes silently.", "isCorrect": false, "rationale": "Python does not run the line. It rejects the file at parse time."}], "id": "q09"}, {"question": "Which of the following BEST captures the section's recommended practice for reading a Python traceback?", "options": [{"text": "Read only the first line — that's where Python identifies the bug.", "isCorrect": false, "rationale": "The section explicitly says most beginners ignore everything except the last line; skilled programmers read the entire traceback. The first line of a traceback is just a header."}, {"text": "Read the last line first to identify the error type and message, then walk back to find the line in your code that triggered it. Skilled programmers read the entire traceback because the crash often originates in code they wrote, not in Python's libraries.", "isCorrect": true, "rationale": "This matches the section's exact advice. The error type and message are at the bottom; the file and line in your code are above; deeper library frames are higher still."}, {"text": "Ignore the traceback — it's only useful for advanced programmers.", "isCorrect": false, "rationale": "Tracebacks are explicitly the diagnostic tool for runtime errors. The section says beginners who ignore them miss the most important diagnostic information."}, {"text": "The traceback always shows the wrong line; trust the line number in your editor instead.", "isCorrect": false, "rationale": "The traceback shows the actual line that triggered the error. Trusting the editor cursor over the traceback is exactly the wrong move."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
