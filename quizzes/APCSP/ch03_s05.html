        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Nested Conditionals</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a nested conditional?", "options": [{"text": "Two if statements that run in parallel.", "isCorrect": false, "rationale": "Python is single-threaded by default; if statements run sequentially. 'Nested' refers to placement (one inside another), not parallel execution."}, {"text": "An if statement placed inside the body (true or false branch) of another if statement, creating a multi-tier decision tree.", "isCorrect": true, "rationale": "The text defines a nested conditional precisely as a conditional inside another conditional. The inner condition is evaluated only when the outer condition reaches its branch. Layers form a decision tree."}, {"text": "A while loop containing a single if.", "isCorrect": false, "rationale": "That is an if-in-a-loop, a different construct. Nesting refers specifically to one if inside another's body."}, {"text": "Two unrelated if statements at the same indentation level.", "isCorrect": false, "rationale": "Same-level (sibling) ifs are independent, not nested. Nesting requires the inner if to live inside the outer if's body."}], "id": "q01"}, {"question": "Trace this nested conditional with x = 4, y = -1:\n\n```\nif x > 0:\n    if y > 0:\n        print(\"both positive\")\n    else:\n        print(\"x positive, y non-positive\")\nelse:\n    print(\"x non-positive\")\n```\n\nWhat does it print?", "options": [{"text": "both positive", "isCorrect": false, "rationale": "y = -1 fails y > 0 (-1 is not greater than 0), so the inner if branch does not fire. The inner else does."}, {"text": "x positive, y non-positive", "isCorrect": true, "rationale": "Step 1 (outer): x = 4 > 0 is True; enter outer if. Step 2 (inner): y = -1 > 0 is False; enter inner else. Step 3: print(\"x positive, y non-positive\"). The outer else is skipped because the outer if was True."}, {"text": "x non-positive", "isCorrect": false, "rationale": "x = 4 > 0 is True, so the outer else (which would say 'x non-positive') is skipped."}, {"text": "Nothing prints; the conditions don't match.", "isCorrect": false, "rationale": "Every if/else with a top-level else prints something. With outer True and inner False, the inner else fires."}], "id": "q02"}, {"question": "What is the 'pyramid of doom' anti-pattern?", "options": [{"text": "Code that uses too many global variables.", "isCorrect": false, "rationale": "Global-variable abuse is a different anti-pattern. The pyramid of doom specifically refers to deeply nested conditionals, where indentation marches progressively rightward."}, {"text": "Code with deeply nested conditionals that march progressively rightward, forming an arrowhead-shaped indentation.", "isCorrect": true, "rationale": "Each nesting level adds one indentation step, so 4-5 levels deep produces a visual triangle. The pattern is technically correct but cognitively expensive: reviewers must track which else belongs to which if. Refactoring with compound Booleans or early returns flattens the pyramid."}, {"text": "A loop nested 100 times.", "isCorrect": false, "rationale": "Loop nesting causes O(n^k) performance issues, but 'pyramid of doom' specifically refers to conditional nesting and the visual indentation pattern."}, {"text": "A function with too many arguments.", "isCorrect": false, "rationale": "Long argument lists are a separate concern (sometimes called 'parameter creep'). Pyramid of doom is about indentation depth from nested conditionals."}], "id": "q03"}, {"question": "Refactor this nested conditional into a single if/else using a compound Boolean expression:\n\n```\nif temp >= 20:\n    if temp <= 30:\n        print(\"Comfortable\")\n```", "options": [{"text": "if temp >= 20 or temp <= 30: print(\"Comfortable\")", "isCorrect": false, "rationale": "or is wrong here — almost every temperature satisfies temp >= 20 OR temp <= 30 (any temp >= 20 satisfies the first clause; any temp <= 30 satisfies the second). The intent is 'BOTH at least 20 AND at most 30,' which requires and."}, {"text": "if temp >= 20 and temp <= 30: print(\"Comfortable\")", "isCorrect": true, "rationale": "Both inner conditions must hold simultaneously: temp must be at least 20 AND at most 30. The compound expression with `and` captures this cleanly. Mathematically the same as the chained form 20 <= temp <= 30."}, {"text": "if temp >= 20: if temp <= 30: print(\"Comfortable\")", "isCorrect": false, "rationale": "The question asks for a SINGLE if; this is the original nested form, not a refactor. The compound version uses one if with `and`."}, {"text": "if temp == 25: print(\"Comfortable\")", "isCorrect": false, "rationale": "This restricts to one specific temperature. The original spec is a range (20-30 inclusive), not a single value."}], "id": "q04"}, {"question": "What is the 'early return' (guard clause) pattern?", "options": [{"text": "Returning the largest value early in a loop.", "isCorrect": false, "rationale": "That sounds like an unrelated optimization. The early return pattern handles edge cases at the top of a function, not loop optimization."}, {"text": "Checking edge cases at the top of a function and returning immediately, so the main logic runs without nesting.", "isCorrect": true, "rationale": "Guard clauses at the top of a function (e.g., `if price < 0: return 0`) handle invalid or trivial inputs and exit immediately. The main logic afterwards runs at one level of indentation, flattening what would otherwise be a deeply nested conditional."}, {"text": "Using a `return` statement inside an else clause.", "isCorrect": false, "rationale": "The early return PATTERN is broader: it intentionally avoids else clauses by handling edge cases first and returning immediately."}, {"text": "Wrapping every return statement in a try-except block.", "isCorrect": false, "rationale": "That is an exception-handling concern, not an early return pattern."}], "id": "q05"}, {"question": "Which scenario BEST justifies using a nested conditional INSTEAD of a compound Boolean expression?", "options": [{"text": "When two conditions must be checked simultaneously and the program's happy path is most important to read.", "isCorrect": false, "rationale": "That scenario favors compound expressions, not nesting. Compound Booleans flatten 'are all these true?' checks."}, {"text": "When the inner condition would be meaningless or harmful if the outer condition were false (the 'guard' pattern).", "isCorrect": true, "rationale": "Example: `if divisor != 0: if numerator / divisor > threshold: ...`. Without the outer guard, the division would crash. While short-circuit `and` could replace this, the nested form makes guard intent explicit and easier to read."}, {"text": "When you want all branches to print something, regardless of condition.", "isCorrect": false, "rationale": "That defeats the purpose of conditionals. Nested or flat, conditionals choose one branch."}, {"text": "When the conditions are independent and unrelated.", "isCorrect": false, "rationale": "Independent conditions are best left as separate ifs or compound expressions. Nesting implies a hierarchical relationship, not independence."}], "id": "q06"}, {"question": "In the 'dangling else' Python example below, with x = 5 and y = 10, what does the code print?\n\n```\nif x > 3:\n    if y > 20:\n        print(\"x big, y big\")\nelse:\n    print(\"x not big\")\n```", "options": [{"text": "x big, y big", "isCorrect": false, "rationale": "y = 10 fails y > 20, so the inner print never fires."}, {"text": "x not big", "isCorrect": false, "rationale": "x = 5 > 3 is True, so the outer if branch is entered; the outer else is skipped."}, {"text": "Nothing prints — the inner if is False (y not > 20) and the outer else is skipped because x > 3 was True.", "isCorrect": true, "rationale": "Step 1: x > 3 is True; enter outer if body. Step 2 (inner): y > 20 is False; the inner if has no else, so nothing executes. Step 3: outer else is skipped because outer if was True. No print fires. This illustrates the dangling-else trap: indentation makes the else attach to the OUTER if, but the inner if has no fallback."}, {"text": "The code raises a SyntaxError.", "isCorrect": false, "rationale": "The code is syntactically valid Python. The bug is logical (no inner else), not syntactic."}], "id": "q07"}, {"question": "Trace this nested conditional with n = 0:\n\n```\nif n > 0:\n    if n % 2 == 0:\n        label = \"positive even\"\n    else:\n        label = \"positive odd\"\nelif n < 0:\n    label = \"negative\"\nelse:\n    label = \"zero\"\n```\n\nWhat is the value of `label`?", "options": [{"text": "positive even", "isCorrect": false, "rationale": "n = 0 fails n > 0 (0 is not greater than 0), so the outer if branch is not entered. We never reach the inner conditions."}, {"text": "negative", "isCorrect": false, "rationale": "0 is not less than 0; n < 0 is False. So the elif branch is not entered."}, {"text": "zero", "isCorrect": true, "rationale": "Step 1 (outer if): n > 0 is False (0 is not strictly greater than 0). Step 2 (elif): n < 0 is False (0 is not strictly less than 0). Step 3 (else): both conditions failed; this branch fires. label = \"zero\"."}, {"text": "positive odd", "isCorrect": false, "rationale": "We do not even enter the outer if branch (n > 0 is False), so 'positive odd' / 'positive even' are unreachable for n = 0."}], "id": "q08"}, {"question": "How does Python resolve the dangling-else ambiguity that plagues languages with brace-based blocks?", "options": [{"text": "Python uses indentation to unambiguously associate each else with a specific if.", "isCorrect": true, "rationale": "Because Python relies on indentation rather than braces for block structure, every else MUST be at the same indentation level as the if it pairs with. There is no ambiguity at the syntax level — though logic errors can still arise from wrong indentation."}, {"text": "Python forbids nested conditionals with else clauses.", "isCorrect": false, "rationale": "Python permits arbitrary nesting with else clauses; the section's examples include them. The pairing is unambiguous via indentation."}, {"text": "Python attaches each else to the outermost if by default.", "isCorrect": false, "rationale": "There is no 'default outermost' rule. Indentation determines pairing, so an else at the inner level binds to the inner if."}, {"text": "Python raises a warning when nested conditionals contain else clauses.", "isCorrect": false, "rationale": "No such warning exists. Nested conditionals with else are perfectly normal Python."}], "id": "q09"}, {"question": "When refactoring nested conditionals, which of the following is a common drawback of switching to a compound Boolean expression?", "options": [{"text": "Compound expressions cannot be tested.", "isCorrect": false, "rationale": "The opposite is true: compound expressions can often be ASSIGNED to a named Boolean (`can_post = ...`) and tested in isolation. This is one of their advantages."}, {"text": "Error messages become separated from the conditions that cause them, requiring an elif chain to dispatch each error case.", "isCorrect": true, "rationale": "In the nested form, each branch's error message is co-located with its condition. In the compound form, you compute one Boolean (e.g., can_post) and then need a separate elif chain to determine WHICH condition failed (banned? not verified? not logged in?). This indirection is a real cost."}, {"text": "Compound expressions are always slower at runtime.", "isCorrect": false, "rationale": "Compound expressions evaluate via short-circuit; nested ifs evaluate sequentially. Performance is essentially identical for the same logic."}, {"text": "Compound expressions require more lines of code.", "isCorrect": false, "rationale": "Compound expressions typically require FEWER lines than nested forms. Their drawback is loss of error-message locality, not line count."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
