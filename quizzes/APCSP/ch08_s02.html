<body>
<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Digital Divide — Infrastructure and Economics</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An ISP refuses to extend fiber to a rural county where households are spread across 20 square kilometers, even though urban deployments using identical equipment are profitable. Which mechanism best explains the asymmetry?", "options": [{"text": "The last-mile problem: cost per connection is far higher in low-density areas because each connection requires more cable for fewer customers, while monthly revenue per customer is similar or lower.", "isCorrect": true, "rationale": "The last-mile problem is exactly this asymmetry. In a dense urban neighborhood, hundreds of premises share a small distribution footprint; in a rural area, the same number of premises spans many square kilometers, raising per-connection cost without raising per-connection revenue."}, {"text": "Quantum tunneling, because rural fiber suffers more electron leakage.", "isCorrect": false, "rationale": "Quantum tunneling is a chip-fabrication phenomenon, not a fiber-deployment issue. Fiber transmits photons, not electrons through transistor gates."}, {"text": "Computing bias, because ISP algorithms underestimate rural demand.", "isCorrect": false, "rationale": "The deployment decision is driven by infrastructure economics, not by an algorithmic bias. Rural per-connection cost is genuinely higher; this is a cost-revenue arithmetic issue, not a model-error issue."}, {"text": "Moore's Law, because fiber speeds double every two years and outpace rural use.", "isCorrect": false, "rationale": "Moore's Law concerns transistor density, not fiber-deployment economics. It does not explain why a deployment is profitable in dense areas but not in sparse ones."}], "id": "q01"}, {"question": "The U.S. FCC defined broadband as 25 Mbps download / 3 Mbps upload prior to 2024 and updated the threshold in 2024 to 100 Mbps download / 20 Mbps upload. Why is the 2024 update significant for measuring the digital divide?", "options": [{"text": "Because the new threshold reclassifies many connections that were considered \"broadband\" under the older definition as below-threshold, expanding the population counted as underserved.", "isCorrect": true, "rationale": "Raising the threshold relabels connections that previously cleared the bar as inadequate, expanding the formal definition of the digital divide. Households at 25 Mbps download were broadband under the old rule and below the bar under the new one."}, {"text": "Because the new threshold matches the speed of the original ARPANET.", "isCorrect": false, "rationale": "ARPANET speeds (kilobits per second) are far below either FCC threshold. The thresholds are set to reflect contemporary applications like video conferencing and HD streaming, not historical networks."}, {"text": "Because the new threshold applies only to satellite broadband providers.", "isCorrect": false, "rationale": "The FCC threshold applies generally to fixed broadband, not specifically to satellite. The technology-neutral definition affects all access technologies."}, {"text": "Because the new threshold removes upload speed from the broadband definition.", "isCorrect": false, "rationale": "The 2024 update raised the upload requirement (3 to 20 Mbps), not removed it. Upload speed is more central to the new definition, not less."}], "id": "q02"}, {"question": "A geostationary satellite broadband service offers 100 Mbps download but has 600-700 ms latency. For which application is this combination clearly inadequate, and why?", "options": [{"text": "Real-time video calls, because round-trip latency over 600 ms produces audible delay and disrupts turn-taking; 600-700 ms exceeds the 20-40 ms range typically required.", "isCorrect": true, "rationale": "Geostationary altitude (35,786 km) imposes a physics-of-light minimum round-trip time of ~480 ms before any processing. The textbook notes that this is acceptable for file downloads but problematic for real-time interaction."}, {"text": "Bulk software updates, because high latency slows large file transfers more than bandwidth does.", "isCorrect": false, "rationale": "Bulk transfers depend primarily on bandwidth, not latency. The textbook explicitly notes that high-latency satellite is acceptable for file downloads."}, {"text": "Email retrieval, because IMAP requires sub-50 ms latency.", "isCorrect": false, "rationale": "Email is highly latency-tolerant; users do not notice 600 ms delays in mail retrieval. The high-latency problem is real-time interaction, not message protocols."}, {"text": "Streaming video, because high-bandwidth video cannot be buffered.", "isCorrect": false, "rationale": "Streaming video tolerates high latency through buffering; bandwidth is the binding constraint. The textbook lists video calls (real-time interaction) as the latency-sensitive case."}], "id": "q03"}, {"question": "DSL signal quality degrades with distance from the telephone exchange. A premise 1 km from the exchange may receive 25 Mbps; a premise 4 km away may receive 5-10 Mbps. Which broader pattern does this exemplify?", "options": [{"text": "Different access technologies have different geographic profiles, so technology choice interacts with location to determine effective broadband availability.", "isCorrect": true, "rationale": "DSL's distance-dependent attenuation is one example of how technology-specific physical limits create geographic patterns of access. Fiber deployment cost, cellular tower coverage, and satellite line-of-sight requirements produce other patterns."}, {"text": "Moore's Law, because DSL chips double in speed every two years.", "isCorrect": false, "rationale": "DSL speed depends on copper-wire physics and signal distance, not on transistor density. Moore's Law does not extend the reach of DSL signals."}, {"text": "Computing bias, because DSL providers prefer urban customers algorithmically.", "isCorrect": false, "rationale": "DSL signal degradation with distance is a physical phenomenon arising from copper-wire attenuation, not a feature of any algorithm."}, {"text": "The dual-use principle, because DSL serves both home and business connections.", "isCorrect": false, "rationale": "Dual-use describes a single capability supporting multiple applications. DSL distance-attenuation is a propagation property, not a dual-use case."}], "id": "q04"}, {"question": "A LEO satellite system places satellites at 550-1,200 km altitude rather than at geostationary altitude (35,786 km). Which performance characteristic does this most directly improve, and why?", "options": [{"text": "Latency, because the round-trip distance is dramatically shorter; LEO latency is 20-40 ms versus 600-700 ms for geostationary.", "isCorrect": true, "rationale": "Latency is dominated by signal travel time over the round trip. LEO altitude is roughly two orders of magnitude lower than geostationary, so latency drops accordingly. This makes real-time interactive applications viable on satellite for the first time."}, {"text": "Maximum download speed, because LEO satellites use a different frequency band that doubles throughput.", "isCorrect": false, "rationale": "LEO and geostationary services use overlapping frequency bands. LEO's primary advantage is latency from the shorter orbital distance, not raw bandwidth."}, {"text": "Cost per subscription, because lower-orbit satellites are cheaper to manufacture.", "isCorrect": false, "rationale": "LEO constellations actually require many more satellites than geostationary networks to provide continuous coverage. The economic gain is from new use cases enabled by low latency, not lower per-satellite cost."}, {"text": "Lithography economics, because LEO chips are produced on smaller process nodes.", "isCorrect": false, "rationale": "Lithography economics concerns chip-fabrication costs, not satellite altitude. The orbital choice is unrelated to semiconductor manufacturing."}], "id": "q05"}, {"question": "The Broadband Equity, Access, and Deployment (BEAD) program allocates $42.45 billion to fund deployment in unserved and underserved locations. The textbook describes BEAD as which type of intervention?", "options": [{"text": "A federal infrastructure grant that allocates funding by formula, requiring recipients to deploy networks meeting minimum speed thresholds and to offer low-income subscription plans.", "isCorrect": true, "rationale": "BEAD is the textbook's example of a federal infrastructure grant. It allocates by formula based on the percentage of unserved locations in each state and is administered through state grants to ISPs and municipalities."}, {"text": "A municipal broadband program operated directly by the federal government.", "isCorrect": false, "rationale": "BEAD funds state-administered grants to ISPs and municipalities; the federal government does not operate networks directly. Municipal broadband (e.g., Chattanooga) is a separate category of intervention."}, {"text": "A subsidy paid directly to LEO satellite subscribers regardless of location.", "isCorrect": false, "rationale": "BEAD funds infrastructure deployment in unserved/underserved locations. LEO subscriber subsidies are a different policy mechanism not described in this section."}, {"text": "A copyleft licensing requirement on broadband router firmware.", "isCorrect": false, "rationale": "Copyleft licensing concerns software derivative works. It is unrelated to broadband infrastructure deployment policy."}], "id": "q06"}, {"question": "Chattanooga, Tennessee, deployed a city-owned gigabit fiber network in 2010 that now serves roughly 105,000 premises with speeds up to 10 Gbps. Which mitigation category does this exemplify?", "options": [{"text": "Municipal broadband, in which a city or county finances the network's capital cost and either serves customers directly or leases infrastructure to competing private providers.", "isCorrect": true, "rationale": "Chattanooga is the textbook's canonical example of municipal broadband. Viability depends on financing rate, expected take-rate, and competitive response from incumbents."}, {"text": "LEO satellite expansion, because Chattanooga's network uses Starlink.", "isCorrect": false, "rationale": "Chattanooga's network is terrestrial fiber, not satellite. LEO satellite is a separate technology category."}, {"text": "Copyleft licensing of the router firmware.", "isCorrect": false, "rationale": "Copyleft is a software-licensing mechanism, not a broadband-deployment intervention."}, {"text": "Computing bias mitigation through dataset rebalancing.", "isCorrect": false, "rationale": "Dataset rebalancing is a machine-learning bias mitigation. It is unrelated to broadband infrastructure."}], "id": "q07"}, {"question": "A household with five students and 5 Mbps DSL cannot support simultaneous video calls for each student during remote learning. The textbook frames this scenario as:", "options": [{"text": "A description of a technical constraint in which available bandwidth is insufficient for the simultaneous applications, separate from any normative claim about how to remedy it.", "isCorrect": true, "rationale": "The textbook explicitly frames this as a description of the technical constraint and notes that whether and how to remedy it is a separate question. The framing avoids policy advocacy and stays at the level of bandwidth arithmetic."}, {"text": "Evidence that DSL should be banned in rural areas.", "isCorrect": false, "rationale": "The textbook avoids advocacy framing and treats this strictly as a description of constraints. No policy conclusion is offered."}, {"text": "A failure of Moore's Law in rural infrastructure.", "isCorrect": false, "rationale": "Moore's Law concerns transistor density, not bandwidth allocation among home users. The constraint here is that 5 Mbps cannot host five simultaneous HD video calls (each requiring ~5-8 Mbps)."}, {"text": "A proxy variable in machine learning.", "isCorrect": false, "rationale": "Proxy variables are a feature-selection bias concept in machine learning. They are unrelated to the bandwidth-arithmetic scenario described here."}], "id": "q08"}, {"question": "Which list correctly orders the access technologies described in this section from typically highest to typically lowest download speed in well-deployed scenarios?", "options": [{"text": "Fiber (FTTH) > Cable (HFC) > Fixed wireless / LEO satellite > DSL.", "isCorrect": true, "rationale": "Fiber commonly delivers symmetrical 1 Gbps or more; cable typically reaches 100 Mbps to 1 Gbps download (asymmetric upload); FWA and LEO satellite typically range 25-300 Mbps and 50-250 Mbps respectively; DSL is speed-limited and falls sharply with distance."}, {"text": "DSL > Fiber > Cable > LEO satellite.", "isCorrect": false, "rationale": "DSL is the slowest of the technologies discussed, not the fastest. Fiber is the fastest."}, {"text": "LEO satellite > Fiber > DSL > Cable.", "isCorrect": false, "rationale": "Fiber typically delivers higher speeds than LEO satellite, and cable typically exceeds DSL. This ordering reverses several actual relationships."}, {"text": "All four technologies deliver identical speeds in all locations.", "isCorrect": false, "rationale": "Each technology has a distinct speed and latency profile. The textbook's purpose in describing them is precisely to highlight these differences."}], "id": "q09"}, {"question": "The textbook lists four metrics of connectivity: download speed, upload speed, latency, and monthly cost as a percentage of median household income. Why is the cost metric included alongside the technical metrics?", "options": [{"text": "Because a connection may be technically available but economically inaccessible if the monthly subscription represents a large fraction of household income; affordability is a separate axis from physical availability.", "isCorrect": true, "rationale": "The textbook explicitly adds this metric to capture affordability separately from physical availability. A household where service is offered but unaffordable is still on the underserved side of the digital divide."}, {"text": "Because cost determines latency.", "isCorrect": false, "rationale": "Cost and latency are independent dimensions. Latency is determined by physical network architecture and propagation delay, not by subscription price."}, {"text": "Because the FCC redefined broadband to include cost in 2024.", "isCorrect": false, "rationale": "The 2024 FCC redefinition raised the speed thresholds; it did not redefine broadband to include household-income cost ratios. The cost metric in the textbook is an analytical tool, not part of the FCC definition."}, {"text": "Because cost reductions follow Moore's Law for fiber-optic transceivers.", "isCorrect": false, "rationale": "While transceiver costs do benefit from semiconductor scaling, that does not explain why the textbook lists subscription cost as a connectivity metric. The reason is to distinguish technical availability from affordability."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
