        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Personalized Project Reference (PPR)</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student's compute_streak() function is 55 lines long. Their PPR Screenshot 2 shows lines 1-40, but the return statement is on line 55 and is not visible. What is the consequence on the rubric?", "options": [{"text": "Screenshot 2 is non-compliant — the rubric requires the complete procedure body from def line to final return statement be visible. Missing the return makes the artifact incomplete, which costs points on the procedural-abstraction rubric row.", "isCorrect": true, "rationale": "Section 9.4 explicitly states the screenshot must show the entire def block from header to final return (or last line). The fix is to scroll so the complete body fits, possibly using a smaller font (but not smaller than 10 pt) so all lines are visible at once."}, {"text": "No problem — the reader will infer the return from the rest of the function.", "isCorrect": false, "rationale": "PPR scoring is based on what is visible in the screenshot, not on what a reader could infer. Inference is not allowed; the rubric requires the complete procedure body to be visually present."}, {"text": "Full credit — the first 40 lines are sufficient.", "isCorrect": false, "rationale": "Forty lines out of fifty-five is incomplete. The rubric criterion is complete procedure visibility, not a percentage threshold."}, {"text": "The student should add a comment marking where the return is.", "isCorrect": false, "rationale": "Adding comments to the PPR is explicitly prohibited (the No-Comments Rule). The fix is to reframe the screenshot to include the actual return line, not to annotate the missing region."}]}, {"question": "A student's PPR Screenshot 2 shows the procedure definition with three # comment lines visible. The student argues the comments help clarify the algorithm. Will the reader award the procedural-abstraction point?", "options": [{"text": "No — the No-Comments Rule is absolute. PPR screenshots containing any inline comment lines are flagged as non-compliant, regardless of how helpful the comments are. The artifact cannot earn rubric points on rows that depend on it.", "isCorrect": true, "rationale": "Section 9.4 emphasizes this rule is absolute and non-negotiable. The College Board prohibits comments because they could be used to narrate code in a way that circumvents the Written Response. The student's intent does not affect the binary check."}, {"text": "Yes — comments are allowed if they are short.", "isCorrect": false, "rationale": "There is no length exception. Even one comment line disqualifies the screenshot. The fix is to remove or hide comments before taking the screenshot."}, {"text": "Yes — comments help the reader and the rubric rewards clarity.", "isCorrect": false, "rationale": "Reader convenience does not override the rule. The Create PT explicitly prohibits comments in PPR screenshots regardless of perceived clarity benefit."}, {"text": "Yes — but only if the comments use docstring format (\"\"\"...\"\"\") instead of #.", "isCorrect": false, "rationale": "Docstrings are technically not Python comments, but Section 9.4 advises removing them too because their permitted status has varied across administrations. The safest course is to omit all comment-like content."}]}, {"question": "Which TWO content elements must appear in PPR Screenshot 1 (the list-creation-and-use screenshot)?", "options": [{"text": "(a) The line where the list is initialized or assigned values, AND (b) a separate code segment where the list is used (read, iterated, indexed, or passed as an argument). The two segments may be from different parts of the source file.", "isCorrect": true, "rationale": "Section 9.4 specifies these two elements precisely. Capturing only the initialization without the use, or only the use without the initialization, makes the screenshot incomplete and the rubric row un-scoreable."}, {"text": "Only the line where the list is initialized.", "isCorrect": false, "rationale": "Initialization alone does not demonstrate that the list is used to manage complexity. Both creation and use must be visible."}, {"text": "Only the line where the list is iterated.", "isCorrect": false, "rationale": "Iteration alone does not show how the list was created and populated. The rubric needs both halves of the create-and-use story."}, {"text": "All lines of the program in chronological order.", "isCorrect": false, "rationale": "Screenshot 1 is targeted at list creation and use specifically. Whole-program chronology is not required and would typically exceed the screenshot's purpose."}]}, {"question": "What is required content for PPR Screenshot 2?", "options": [{"text": "The complete definition of the student-developed procedure, including the procedure header (def line with parameter(s)) and the entire procedure body from start to final return (or last line). Every line must be visible and readable.", "isCorrect": true, "rationale": "Section 9.4 states this explicitly. The screenshot must capture every line of the procedure body so the reader can verify the algorithm structure (sequencing, selection, iteration) and parameter usage."}, {"text": "Only the def header line with parameters.", "isCorrect": false, "rationale": "The header alone does not demonstrate the body's structure. The rubric needs to see the full procedure to score procedural abstraction."}, {"text": "The procedure plus all of main() that calls it.", "isCorrect": false, "rationale": "main() and call sites belong elsewhere. Screenshot 2 is specifically the procedure definition; call sites are demonstrated in the video and elsewhere."}, {"text": "A flowchart of the procedure logic.", "isCorrect": false, "rationale": "PPR screenshots are of source code, not of diagrams. The rubric scores the actual code lines, not visualizations of them."}]}, {"question": "Why does the College Board explicitly prohibit comments in PPR screenshots, according to Section 9.4?", "options": [{"text": "Because comments could be used to narrate the code in a way that circumvents the Written Response requirement — the Written Response is the place to explain code behavior, and the PPR is the place to display the code itself.", "isCorrect": true, "rationale": "Section 9.4 gives this exact reasoning. Comments inserted strategically into the PPR could explain algorithm logic and effectively expand the Written Response, undermining the rubric's distinction between the two artifacts."}, {"text": "Because comments are bad coding style.", "isCorrect": false, "rationale": "Comments are not bad style — well-written code typically uses them. Section 9.4 explicitly says students should keep comments in their submitted code; they must only be removed from the PPR screenshots."}, {"text": "Because comments cannot be parsed by the OCR system the College Board uses.", "isCorrect": false, "rationale": "There is no OCR consideration mentioned. The rule is about narrative content, not about machine-parsability."}, {"text": "Because comments add to the file size of the PPR PDF.", "isCorrect": false, "rationale": "File size is not the constraint. The constraint is on what content the screenshot may contain."}]}, {"question": "Section 9.4 describes two practical approaches to removing comments before taking PPR screenshots. Which option correctly describes one of them?", "options": [{"text": "Comment-stripping preprocessing: open a temporary copy of the .py file, run a search-and-replace to remove all lines starting with #, and take the screenshot from this stripped copy. Submit the original file (with comments) as the program code.", "isCorrect": true, "rationale": "Section 9.4 names this exact approach. The submitted .py file should have comments (good practice); only the PPR screenshot is taken from a comment-stripped temporary copy."}, {"text": "Permanently delete all comments from the original code file before submitting.", "isCorrect": false, "rationale": "The approach the section recommends preserves comments in the submitted code. Permanent deletion is not necessary and is poor coding practice — comments aid readability for the reader who reviews the code."}, {"text": "Submit a separate text file describing what each comment said.", "isCorrect": false, "rationale": "There is no \"comment description file\" submission. The PPR screenshots themselves must be comment-free; descriptions go in the Written Response."}, {"text": "Replace each # with a special character that the reader will not recognize.", "isCorrect": false, "rationale": "Disguising comments does not remove them. The screenshot must visually show no comment lines, period — not visually show altered comment lines."}]}, {"question": "Why are formatting standards (font size 12 pt minimum, line numbers visible) important for the PPR — beyond just helping the reader during scoring?", "options": [{"text": "The PPR is the only reference material the student may consult during the in-exam Written Response. A readable PPR with line numbers lets the student locate and cite specific lines under exam-day time pressure.", "isCorrect": true, "rationale": "Section 9.4 emphasizes the dual role of the PPR: it earns rubric points during scoring AND functions as a reference card during the Written Response. High-scoring Written Responses cite line numbers from the PPR — readability matters at exam time."}, {"text": "Larger font ensures the file size is bigger, which the College Board prefers.", "isCorrect": false, "rationale": "There is no preference for larger files. The PPR is judged on content readability, not on file properties."}, {"text": "12 pt font is required by accessibility regulations for all College Board materials.", "isCorrect": false, "rationale": "Section 9.4 frames the size standard as practical for exam-day usability and rubric readability, not as a regulatory requirement."}, {"text": "Line numbers are required for the PPR to count as student-developed.", "isCorrect": false, "rationale": "\"Student-developed\" is a separate qualifier on the procedure (Section 9.2). Line numbers are about navigability and citation, not authorship attribution."}]}, {"question": "Stimulus: A student's high-scoring Written Response says \"As shown in Screenshot 2 of my PPR, lines 28-73 define compute_streak(records, target_subject). The procedure uses target_subject in the selection condition at line 49.\" Why is this style of citation strategically valuable?", "options": [{"text": "It is precise, falsifiable (the reader can check line 49 in the PPR), and directly addresses rubric language about parameter use. It converts a vague claim into specific evidence the reader can verify, which makes the point harder to deny.", "isCorrect": true, "rationale": "Section 9.4 makes this explicit: high-scoring Written Responses cite the PPR by screenshot number and line number, transforming claims into falsifiable evidence. Vague claims (\"my procedure uses the parameter\") are far less compelling and far more likely to receive a partial or zero score."}, {"text": "It pads the Written Response with words, increasing the chance of meeting any minimum word count.", "isCorrect": false, "rationale": "There is no word-count minimum that line citations help meet. The value of citation is precision and falsifiability, not length."}, {"text": "It allows the reader to skip reading the rest of the response.", "isCorrect": false, "rationale": "The reader still scores the full response. Citation helps the reader confirm specific claims, not dismiss other content."}, {"text": "It guarantees points on every rubric row regardless of content.", "isCorrect": false, "rationale": "Citation helps but does not guarantee anything. The cited claim must still address the rubric criterion accurately. A precise citation of an irrelevant line still misses the point."}]}, {"question": "Section 9.4 mentions docstrings (triple-quoted string literals at the top of a function). What does the section recommend for handling docstrings in PPR screenshots?", "options": [{"text": "The safest approach is to remove or fold them as well, even though docstrings are technically string expressions and not # comments. Their permitted status has varied across administrations.", "isCorrect": true, "rationale": "Section 9.4 acknowledges that docstrings are not technically comments in Python's grammar, but rule application has varied. To minimize risk, treat them like comments and remove or fold them when preparing the PPR screenshot."}, {"text": "Always include docstrings — they are required for procedure abstraction credit.", "isCorrect": false, "rationale": "Docstrings are not required by the rubric. Including them risks the comment-rule interpretation; the conservative choice is to remove."}, {"text": "Replace docstrings with # comments because comments are clearer.", "isCorrect": false, "rationale": "Replacing one prohibited element with a definitely-prohibited element makes the problem worse. # comments are explicitly prohibited; the recommendation is to remove docstrings, not convert them."}, {"text": "Move docstrings to a separate documentation file.", "isCorrect": false, "rationale": "The PPR is two specific screenshots from the program code; documentation file submission is not part of the PPR or the broader Create PT artifact set."}]}, {"question": "Stimulus: A student's PPR Screenshot 1 captures study_records = [] in main() and a separate vertical crop of the for record in records: loop inside compute_streak. The screenshot has no comments. Predict the rubric outcome on the artifact-content side.", "options": [{"text": "Compliant — Screenshot 1 shows both the list creation (study_records = []) and a use (iteration in the procedure). The two segments may come from different parts of the source file, which is explicitly allowed. No comments are present, satisfying the No-Comments Rule.", "isCorrect": true, "rationale": "Section 9.4 specifies that Screenshot 1 may include two sub-images from different code locations, and that the use does not have to be adjacent to the creation. study_records = [] plus iteration inside the procedure satisfies create-AND-use. The absence of comments satisfies the No-Comments Rule."}, {"text": "Non-compliant — the two segments must be adjacent in the source file.", "isCorrect": false, "rationale": "Section 9.4 explicitly says the two segments may be from different parts of the source file. Adjacency is not required."}, {"text": "Non-compliant — Screenshot 1 must show the entire main() function.", "isCorrect": false, "rationale": "Screenshot 1's required content is list creation and use, not the entirety of main(). Capturing relevant segments is correct."}, {"text": "Non-compliant — the procedure's iteration belongs only in Screenshot 2.", "isCorrect": false, "rationale": "Screenshot 2 is the procedure definition. Iteration may be referenced in Screenshot 1 if it is the use of the list — that is in fact the canonical pattern for the create-AND-use evidence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
