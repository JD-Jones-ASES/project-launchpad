    };

<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Beneficial and Harmful Effects; Moore&#x27;s Law</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A smartphone GPS module enables both turn-by-turn navigation and a background process that builds a precise daily movement record without active user input. Which concept does this scenario most directly illustrate?", "options": [{"text": "Moore's Law, because the same hardware supports more applications over time.", "isCorrect": false, "rationale": "Moore's Law is the empirical observation that transistor count doubles approximately every two years. It does not describe how a single capability can be applied to different ends."}, {"text": "A dual-use computing innovation, because the same technical mechanism (continuous timestamped location sampling) supports both beneficial and harmful applications.", "isCorrect": true, "rationale": "Dual-use refers to a capability whose underlying mechanism can serve both beneficial and harmful purposes depending on deployment. The mechanism is identical; only the use case differs."}, {"text": "An intended effect of GPS, because navigation was the original design goal.", "isCorrect": false, "rationale": "The scenario describes both the intended use (navigation) and a likely unintended use (background tracking). Intended effect alone does not capture the full pattern."}, {"text": "Lithography economics, because GPS hardware has become cheaper to manufacture.", "isCorrect": false, "rationale": "Lithography economics concerns the capital cost of new chip-fabrication processes. It is unrelated to how a GPS capability can support multiple use cases."}]}, {"question": "Moore's original 1965 prediction stated transistor count would double every year. In 1975 he revised it to every two years. Why does the AP exam consistently test the two-year version?", "options": [{"text": "Because the 1965 paper was retracted from Electronics magazine in 1975.", "isCorrect": false, "rationale": "The 1965 paper was not retracted. Moore revised the doubling period after observing the actual industry trend over the intervening decade."}, {"text": "Because the 1975 revision became the canonical engineering form, more accurately matching the long-run rate of transistor doubling on commercial integrated circuits.", "isCorrect": true, "rationale": "Moore revised the period from one year to two years after observing how the industry's pace had evolved. The two-year form is the version cited in textbooks and tested on the AP exam."}, {"text": "Because David House predicted the doubling would slow to 18 months in 1975.", "isCorrect": false, "rationale": "David House's 18-month observation referred to chip performance (combining transistor count and clock-speed improvements), not the transistor-count doubling itself. The AP exam tests the two-year transistor-count form, not the 18-month conflation."}, {"text": "Because the 1965 prediction applied only to memory chips and the 1975 version applied to all integrated circuits.", "isCorrect": false, "rationale": "Both versions referred to integrated circuits in general. The change was the doubling period, not the chip class."}]}, {"question": "An electronic spreadsheet (VisiCalc, 1979) was designed to speed financial modeling. Years later, formula errors in widely shared spreadsheet files were found to silently propagate through supply-chain calculations. The error-propagation pattern is best classified as:", "options": [{"text": "An intended beneficial effect, because spreadsheets were designed for financial work.", "isCorrect": false, "rationale": "Intended effects are outcomes the designers explicitly planned for. Silent error propagation through shared files was not a designed feature; it emerged from how spreadsheets were used in practice."}, {"text": "An unintended harmful effect, because the propagation pattern arose from interactions between widespread spreadsheet use and shared file formats that designers did not fully model.", "isCorrect": true, "rationale": "Unintended effects arise from interactions between a technology and its actual use context that designers did not foresee. The 1979 designers did not anticipate the file-sharing patterns that turned formula errors into a systemic risk."}, {"text": "A dual-use intended effect, because spreadsheets can be used for both budgeting and engineering calculations.", "isCorrect": false, "rationale": "Dual-use describes mechanisms supporting both beneficial and harmful applications by design intent. Error propagation is an unintended consequence, not a deliberate dual-use property."}, {"text": "A consequence of Moore's Law slowing, because slower chips cause more errors.", "isCorrect": false, "rationale": "Spreadsheet formula errors are software/usage phenomena, not hardware errors. Moore's Law slowdown does not produce formula propagation bugs."}]}, {"question": "By the early 2020s, leading-edge transistor gate widths reached 5-7 nanometers. A silicon atom is approximately 0.22 nm in diameter. Which physical constraint does this proximity to atomic scale most directly create?", "options": [{"text": "Quantum tunneling, in which electrons cross gate insulators that are only a few atoms thick, producing leakage current and logic errors.", "isCorrect": true, "rationale": "When gate insulators reach a few atoms in thickness, classical-barrier tunneling becomes significant. Electrons cross without classical permission, wasting power and introducing logic errors."}, {"text": "Lithography economics, because the chip becomes lighter than a single silicon wafer.", "isCorrect": false, "rationale": "Lithography economics concerns the capital cost of fabrication equipment, not chip mass. Atomic-scale gates do not change wafer weight in any operationally relevant way."}, {"text": "The last-mile problem, because data must travel further across the smaller die.", "isCorrect": false, "rationale": "The last-mile problem is a broadband infrastructure concept, not a chip-fabrication issue. It does not apply at the transistor scale."}, {"text": "The end of dual-use innovation, because tiny chips have only one application.", "isCorrect": false, "rationale": "Smaller transistors do not eliminate dual-use potential. Dual-use describes the mechanism-versus-use distinction, not the physical size of the chip."}]}, {"question": "The Cray-1 supercomputer (1976) performed about 160 megaflops at $8 million; a contemporary smartphone processor performs tens of billions of floating-point operations per second for a few dollars of material cost. Which consequence of Moore's Law does this comparison most directly illustrate?", "options": [{"text": "An exponential reduction in cost-per-computation over multi-decade timescales, enabling tasks once requiring institutional budgets to become feasible for individuals.", "isCorrect": true, "rationale": "The five-to-six order-of-magnitude gap between Cray-1 and a smartphone reflects the compounding effect of doubling transistor count every two years. Compute that required a million-dollar mainframe in 1970 became routine on consumer hardware by 2010."}, {"text": "Quantum tunneling, because smaller transistors leak more current.", "isCorrect": false, "rationale": "Quantum tunneling is one reason Moore's Law is slowing. It does not directly explain the historical cost-per-compute reduction this comparison highlights."}, {"text": "The dual-use principle, because supercomputers and smartphones serve different users.", "isCorrect": false, "rationale": "Dual-use refers to a single capability supporting both beneficial and harmful applications. The comparison here is about the cost trajectory of compute, not how it is used."}, {"text": "Thermal density, because supercomputers required active cooling and smartphones do not.", "isCorrect": false, "rationale": "Thermal density is a constraint that increasingly limits Moore's Law as transistor counts grow. The Cray-1-to-smartphone comparison illustrates the cost-per-compute reduction, not the thermal constraint."}]}, {"question": "Genome sequencing cost approximately $100 million per human genome in 2001 and fell below $1,000 by 2014. The textbook attributes much of this drop to cheaper computation for base-pair alignment algorithms. This is best described as:", "options": [{"text": "An indirect economic consequence of Moore's Law, because cheaper compute reduced the cost of a downstream application that depended on it.", "isCorrect": true, "rationale": "Moore's Law-driven cost-per-compute reductions reshaped every information-processing industry. Genome sequencing depends heavily on alignment algorithms, so cheaper computation translated directly into cheaper sequencing."}, {"text": "A direct demonstration of fair use, because sequencing data became freely shareable.", "isCorrect": false, "rationale": "Fair use is a copyright-law concept. It is unrelated to the cost trajectory of biological sequencing."}, {"text": "A consequence of the digital divide, because urban labs got faster sequencers first.", "isCorrect": false, "rationale": "The digital divide concerns broadband access disparities, not the price of compute. Sequencing cost reductions follow the cost-per-compute trend, which is global."}, {"text": "A failure of Moore's Law, because the cost dropped faster than transistor doubling alone could explain.", "isCorrect": false, "rationale": "The cost drop was driven by both algorithmic improvements and Moore's-Law-driven hardware. The textbook treats this as a consequence of, not a failure of, the trend."}]}, {"question": "Which statement about Moore's Law is most accurate as the AP exam treats it?", "options": [{"text": "Moore's Law is a physical law of nature, similar to the laws of thermodynamics, and cannot be violated.", "isCorrect": false, "rationale": "Moore's Law is explicitly an empirical observation about industry trends, not a physical law. The textbook emphasizes this distinction."}, {"text": "Moore's Law is an empirical observation about transistor count on commercial integrated circuits, not a physical law, and its rate is now slowing.", "isCorrect": true, "rationale": "Moore's Law describes an industry trend that held steady from the 1960s through the 2000s. It is empirical, not mandated by physics, and has been slowing as transistors approach atomic scale."}, {"text": "Moore's Law states that chip clock speed doubles every 18 months.", "isCorrect": false, "rationale": "The 18-month figure refers to chip performance (a combination of transistor count and clock speed) per David House, not Moore's transistor-count observation. The AP exam tests the two-year transistor-count form."}, {"text": "Moore's Law is a copyright doctrine governing semiconductor patents.", "isCorrect": false, "rationale": "Moore's Law is not a legal doctrine of any kind. It is an empirical observation about transistor density."}]}, {"question": "As classical Moore's Law transistor shrinkage has slowed, the semiconductor industry has shifted to alternative architectural strategies. Which list correctly identifies the primary strategies described in the section?", "options": [{"text": "Multi-core processors, chiplet packaging, and domain-specific accelerators (such as GPUs and ML inference chips).", "isCorrect": true, "rationale": "The textbook explicitly identifies these three strategies as the industry response to slowed transistor shrinkage. Each improves real compute-per-dollar through different mechanisms than classical scaling."}, {"text": "Quantum tunneling, thermal compression, and lithography unification.", "isCorrect": false, "rationale": "Quantum tunneling and thermal density are constraints driving the slowdown, not industry responses. \"Lithography unification\" is not a real concept; lithography costs are a constraint, not a strategy."}, {"text": "Crowdsourcing, peer review, and reputation weighting.", "isCorrect": false, "rationale": "These are crowdsourcing infrastructure mechanisms, not chip-design strategies."}, {"text": "Copyright extension, fair-use expansion, and copyleft licensing.", "isCorrect": false, "rationale": "These are intellectual-property mechanisms unrelated to chip architecture."}]}, {"question": "A satellite-based GPS system locates lost hikers in the wilderness. The same orbital infrastructure and signal geometry can guide a precision munition. The textbook frames this pairing as:", "options": [{"text": "Evidence that some computing innovations should not be deployed.", "isCorrect": false, "rationale": "The textbook explicitly avoids policy advocacy. It frames dual-use as an analytical pattern about mechanisms versus use cases, not as a normative judgment about whether to deploy."}, {"text": "An illustration that tools amplify capability without specifying purpose, so a single mechanism can support both beneficial and harmful applications depending on deployment.", "isCorrect": true, "rationale": "This is the textbook's framing of dual-use innovation: the mechanism is identical; the difference lies in who deploys it and toward what end. Analyzing impact requires separating mechanism from use case."}, {"text": "A failure of Moore's Law, because GPS chips have become too efficient.", "isCorrect": false, "rationale": "GPS dual-use is a question of how a capability can be applied, not a consequence of transistor scaling."}, {"text": "An example of an unintended effect, because military targeting was not part of the original GPS design.", "isCorrect": false, "rationale": "GPS was originally a U.S. Department of Defense system; military uses including targeting were intended. The dual-use concept does not require any application to be unintended."}]}, {"question": "An EUV (extreme ultraviolet) lithography machine costs over $100 million per unit, and a leading-edge fabrication facility now exceeds $10 billion to build. Which Moore's-Law slowdown driver does this most directly support?", "options": [{"text": "Quantum tunneling, because EUV light tunnels through atomic gates.", "isCorrect": false, "rationale": "Quantum tunneling concerns electron behavior in gate insulators, not lithography light. The economic figures here describe equipment cost, a separate constraint."}, {"text": "Thermal density, because EUV machines generate excessive heat in the fab.", "isCorrect": false, "rationale": "Thermal density refers to heat dissipation per unit area on the chip itself, not equipment thermals in the fabrication facility. The cited figures are capital costs."}, {"text": "Lithography economics, because the capital cost of producing the next process node may exceed the commercial value of achieving the next transistor doubling.", "isCorrect": true, "rationale": "Lithography economics is one of the three slowdown drivers explicitly named. When equipment and fab construction costs grow faster than the revenue gains from the next node, the trend slows for purely economic reasons."}, {"text": "Last-mile cost, because EUV machines must be shipped over long distances.", "isCorrect": false, "rationale": "The last-mile problem is a broadband-infrastructure concept. It is unrelated to chip fabrication."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
