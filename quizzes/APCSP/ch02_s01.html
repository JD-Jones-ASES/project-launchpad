    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Development Environment and Iterative Development</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student opens the Python REPL by running py -3 with no filename, types 7 + 5, presses Enter, and sees 12 displayed on the next line. Which property of Python's design BEST explains why the result appears immediately, and how does this differ from a compiled language?", "options": [{"text": "Python is interpreted: the interpreter reads each statement and executes it directly without a separate compile step, so the REPL can read, evaluate, print, and loop in real time.", "isCorrect": true, "rationale": "The section defines Python as an interpreted language whose interpreter reads statements one at a time and executes them immediately. The REPL (Read-Eval-Print Loop) is the direct user-facing consequence of that design."}, {"text": "Python compiles the entire program to an executable file first, then loads that file into memory, which is faster than interpretation.", "isCorrect": false, "rationale": "This describes a compiled workflow, not Python's. Python's REPL responsiveness comes precisely from skipping the separate compile-to-machine-code step."}, {"text": "The REPL pre-loads every possible expression into a lookup table, so 7 + 5 is found instantly rather than computed.", "isCorrect": false, "rationale": "There is no lookup table. The interpreter actually evaluates the expression each time."}, {"text": "The REPL uses an IDE debugger to pre-compute results before the user presses Enter.", "isCorrect": false, "rationale": "Debuggers pause execution to inspect state; they do not pre-compute REPL output. The IDE choice does not change how Python evaluates expressions."}]}, {"question": "A student writes: \"My program's purpose is to read two numbers and display their sum.\" The Create PT rubric awards a point for correctly distinguishing function from purpose. Why does this sentence fail, and which rewrite would earn the point?", "options": [{"text": "It fails because it begins with a verb of computation (\"read,\" \"display\"). A correct purpose statement is: \"My program helps elementary students practice mental addition by giving them a quick check on their work.\"", "isCorrect": true, "rationale": "The section explicitly contrasts function verbs (\"accepts,\" \"reads,\" \"generates\") with purpose verbs (\"helps\"). Purpose names the audience, the goal, and the mechanism — not the computation."}, {"text": "It fails because it does not name a programming language. A correct purpose statement must specify Python.", "isCorrect": false, "rationale": "Purpose statements are about audience and goal, not implementation language."}, {"text": "It fails because it does not include the algorithm. A correct purpose statement must describe each step the program performs.", "isCorrect": false, "rationale": "Listing algorithmic steps describes function, not purpose. Purpose is intentionally non-technical."}, {"text": "It fails because it does not include input validation. A correct purpose statement must mention error handling.", "isCorrect": false, "rationale": "Input validation has nothing to do with the function/purpose distinction."}]}, {"question": "Which of the following is the MOST accurate description of the iterative software development cycle as presented in this section, and why is it relevant to the Create PT rubric?", "options": [{"text": "Plan everything fully, code it once, ship it. The Create PT rubric rewards a clean first draft.", "isCorrect": false, "rationale": "This is the opposite of iterative development. The section explicitly states programs are almost never written end-to-end in one sitting."}, {"text": "Design, implement, test, refine — repeated multiple times, with each pass producing a slightly better version. The Create PT rubric awards a point for documenting that you tested and revised your program.", "isCorrect": true, "rationale": "This is the four-stage cycle named in the section. The College Board rubric explicitly awards a point for evidence of iterative testing and revision."}, {"text": "Test, design, refine, implement — testing first ensures the design is correct.", "isCorrect": false, "rationale": "The cycle order in the section is design, implement, test, refine. Test-first is a different methodology not described here."}, {"text": "Implement, test, ship, then design version 2 only if customers complain.", "isCorrect": false, "rationale": "This skips design and treats refinement as optional. The section presents refinement as part of every iteration."}]}, {"question": "A student is choosing among IDLE, Thonny, VS Code, and Replit. Their school issues Chromebooks that do not allow third-party software installation. Which IDE BEST fits this constraint, and why?", "options": [{"text": "IDLE, because it is bundled with Python and provides a minimal interface.", "isCorrect": false, "rationale": "IDLE installs alongside Python from python.org. A Chromebook with installation restricted cannot install Python at all, so IDLE is unavailable."}, {"text": "Thonny, because it includes a step-by-step debugger that highlights the current line.", "isCorrect": false, "rationale": "Thonny is excellent for beginners but is desktop software requiring installation, which the constraint forbids."}, {"text": "VS Code, because it is the tool most students migrate to.", "isCorrect": false, "rationale": "VS Code is desktop software requiring installation; the constraint forbids it."}, {"text": "Replit, because it runs entirely in the browser and requires no local installation, supporting Chromebooks and shared workstations.", "isCorrect": true, "rationale": "The section explicitly identifies Replit as the browser-based option ideal for Chromebooks or any device where installing software is restricted."}]}, {"question": "A student in pair programming is the navigator. Their partner, the driver, has just typed: if x = 10:. What is the navigator's correct action, and why does this exemplify the value of pair programming?", "options": [{"text": "Stay quiet — the driver should make their own mistakes; learning happens through failure.", "isCorrect": false, "rationale": "This contradicts the navigator's defined role of watching for errors and suggesting next steps. The section says pair programming reduces defects precisely because a second set of eyes catches mistakes."}, {"text": "Take over the keyboard immediately to fix the line.", "isCorrect": false, "rationale": "Driver and navigator switch roles only periodically. The navigator's tool is verbal correction, not seizing the keyboard."}, {"text": "Point out that = is assignment in Python; the equality test is ==. The driver fixes the line, illustrating why a second set of eyes catches mistakes the driver's brain has overlooked.", "isCorrect": true, "rationale": "This is the navigator's defined job: read the code aloud, catch errors, suggest fixes. The = vs == confusion is exactly the kind of slip pair programming defends against."}, {"text": "Wait until the program crashes and then explain the error in detail.", "isCorrect": false, "rationale": "Pair programming aims to catch errors before they propagate, not after. Letting a known bug execute wastes the navigator's role."}]}, {"question": "Read the following Python REPL session:\n\n>>> 2 + 3\n5\n>>> name = \"Ada\"\n>>> print(name)\nAda\n\nWhat does the >>> prompt indicate, and what is the role of the line that does NOT print a result?", "options": [{"text": "The >>> is a syntax error indicator. Lines without printed results have failed silently.", "isCorrect": false, "rationale": "The >>> is the REPL's input prompt, not an error indicator. Lines without printed output have not failed; they have produced no expression value to display."}, {"text": "The >>> is the REPL prompt waiting for input. The assignment statement name = \"Ada\" produces no expression value to display, so the REPL prints nothing and returns to the prompt.", "isCorrect": true, "rationale": "The section identifies >>> as the REPL prompt. Assignment is a statement that performs an action (binding a name) but evaluates to no displayable value, which is why the REPL prints nothing for that line."}, {"text": "The >>> means the program has compiled successfully. Lines without output were skipped by the optimizer.", "isCorrect": false, "rationale": "Python's REPL does not compile or optimize; it interprets each line directly. Nothing is skipped."}, {"text": "The >>> means a debugger breakpoint. Assignment lines do not run inside the debugger.", "isCorrect": false, "rationale": "The REPL is not a debugger. Assignment lines do execute; they just do not produce a value to print."}]}, {"question": "Which statement BEST captures the difference between using the REPL and writing a saved .py script file, as described in the section?", "options": [{"text": "The REPL is for testing single statements with instant feedback; a .py script saves a complete program that can be re-run, shared, or extended over time.", "isCorrect": true, "rationale": "The section frames the REPL as ideal for small experiments and the editor/.py file as the home for longer programs that persist on disk."}, {"text": "The REPL is faster than .py files because it skips the interpreter.", "isCorrect": false, "rationale": "Both use the same interpreter. The REPL just exposes it interactively rather than batch-running a file."}, {"text": "The .py script supports more operators than the REPL.", "isCorrect": false, "rationale": "The same Python language and operators are available in both. The difference is workflow, not feature set."}, {"text": "The REPL supports debugging while .py files do not.", "isCorrect": false, "rationale": "Debugging is an IDE/tool feature, not a REPL-vs-script feature. .py files in IDLE, Thonny, or VS Code can be debugged."}]}, {"question": "A team is on the third pass through the iterative development cycle for a tip calculator. They have just finished testing and discovered that for very small bills (under $1.00), the tip rounds to $0.00 due to a precision issue. Which iterative-cycle stage are they entering next, and what is the typical activity?", "options": [{"text": "Design — they should redesign the program from scratch.", "isCorrect": false, "rationale": "Iterative cycles do not require restarting from scratch. After test, the next stage is refine/debug, focused on fixing the specific defect found."}, {"text": "Implement — they should add a new feature first and fix the bug later.", "isCorrect": false, "rationale": "The discovered defect must be addressed in the refine stage; adding features without fixing known bugs violates the cycle."}, {"text": "Refine/debug — they should fix the rounding behavior, then return to the test stage to confirm the fix and re-check other inputs.", "isCorrect": true, "rationale": "The section's cycle is design, implement, test, refine. After test reveals an error, the next stage is refine, after which testing resumes. This is exactly what produces \"a slightly better version\" each pass."}, {"text": "Test again with the same inputs without changing anything.", "isCorrect": false, "rationale": "Re-testing the same inputs without any change cannot reveal anything new. The cycle requires action — refining the program — between test passes."}]}, {"question": "Augusta Ada Lovelace is recognized as the author of the first algorithm intended for a machine. Which conceptual leap, beyond writing the algorithm itself, makes her contribution historically significant according to the section?", "options": [{"text": "She invented the first physical computer.", "isCorrect": false, "rationale": "Babbage designed the Analytical Engine; Lovelace did not build a computer. The Analytical Engine was never even completed in her lifetime."}, {"text": "She recognized that the Analytical Engine could manipulate any symbolic quantity, not just numbers — an insight that anticipates the stored-program concept by over a century.", "isCorrect": true, "rationale": "The section identifies this generalization (operations on symbols, not only numbers) as Lovelace's signature conceptual leap and the reason the Department of Defense named the Ada language in her honor."}, {"text": "She invented Bernoulli numbers.", "isCorrect": false, "rationale": "Bernoulli numbers existed long before Lovelace. Her contribution was an algorithm to compute them on a proposed machine, not the numbers themselves."}, {"text": "She designed the first modern compiler.", "isCorrect": false, "rationale": "Compilers are associated with Grace Hopper (1952), not Lovelace. The section presents Hopper in a separate biographical note."}]}, {"question": "Which of the following is the BEST one-sentence description of \"program function\" using the section's framing, and how does it contrast with \"program purpose\"?", "options": [{"text": "Function answers \"what does the code do?\" in technical, operational terms (e.g., \"accepts a name and birth year, computes age, prints a greeting\"), while purpose answers \"why does this program matter to someone?\" in audience-centered terms (e.g., \"helps elderly community center members confirm senior-discount eligibility\").", "isCorrect": true, "rationale": "These are the section's exact framings. Function is what; purpose is why. Function uses computation verbs; purpose uses benefit verbs. The Create PT rubric explicitly tests this distinction."}, {"text": "Function and purpose are synonyms; they are different words for the same idea.", "isCorrect": false, "rationale": "The section explicitly states they sound similar but are not the same, and the Create PT rubric awards a point for distinguishing them. Treating them as synonyms is the #1 source of point loss."}, {"text": "Function is the program's title; purpose is the file name.", "isCorrect": false, "rationale": "Neither maps to titles or file names. Both refer to descriptions of the program's behavior or motivation."}, {"text": "Function describes the user; purpose describes the algorithm.", "isCorrect": false, "rationale": "This inverts the definitions. Function is technical/algorithmic; purpose is audience/goal-oriented."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
