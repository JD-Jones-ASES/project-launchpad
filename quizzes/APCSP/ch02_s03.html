    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Mathematical Expressions</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Predict the output of the following Python statement, and identify the operator-precedence rule that produces it:\n\nprint(2 + 3 * 4)", "options": [{"text": "20, because Python evaluates left to right.", "isCorrect": false, "rationale": "Python applies precedence first; left-to-right ordering only matters for operators of equal precedence. Multiplication outranks addition."}, {"text": "14, because multiplication has higher precedence than addition. Python evaluates 3 * 4 = 12 first, then 2 + 12 = 14.", "isCorrect": true, "rationale": "This matches the section's worked PEMDAS trace exactly. * outranks +, so 3 * 4 evaluates first."}, {"text": "9, because the expression is treated as 2 + 3 + 4.", "isCorrect": false, "rationale": "There is no rule that converts * to +. The * binds 3 to 4 producing 12; the answer is 14."}, {"text": "24, because Python multiplies all operands together.", "isCorrect": false, "rationale": "Python does not multiply all operands. Each operator binds only its two operands at the appropriate precedence level."}]}, {"question": "Predict the output of `print(10 / 2)` in Python 3, and identify the rule about division behavior:", "options": [{"text": "5, an integer, because 10 divides evenly by 2.", "isCorrect": false, "rationale": "In Python 3, the `/` operator always returns a float, even when the result is mathematically whole. The output is 5.0, not 5."}, {"text": "5.0, a float. In Python 3, the `/` operator always returns a float, even when both operands are integers and the result is mathematically whole.", "isCorrect": true, "rationale": "This is the section's exact rule. Python 3's `/` produces a float regardless of operand types or remainder; for integer division that returns an int, use `//`."}, {"text": "TypeError, because integers cannot be divided in Python 3.", "isCorrect": false, "rationale": "Python 3 happily divides integers; the only quirk is that the result is a float."}, {"text": "5.5, because Python rounds to the nearest half.", "isCorrect": false, "rationale": "Python performs exact division (within float precision); 10 / 2 is exactly 5.0, not 5.5."}]}, {"question": "Predict the output of `print(-7 // 2)` in Python, and explain why the answer is not -3:", "options": [{"text": "-3, because Python truncates toward zero.", "isCorrect": false, "rationale": "Python's floor division does NOT truncate toward zero; it rounds toward negative infinity. The section calls this the multiple-choice trap."}, {"text": "-4, because floor division always rounds toward negative infinity. -7 / 2 is mathematically -3.5, and the floor of -3.5 (rounded toward negative infinity) is -4, not -3.", "isCorrect": true, "rationale": "This is exactly what the section warns about. Floor division (`//`) and modulo (`%`) follow floor convention, which differs from truncation toward zero on negative values."}, {"text": "-3.5, because Python returns the exact decimal.", "isCorrect": false, "rationale": "The `//` operator is integer-result floor division, not exact division. Use `/` for the exact value -3.5."}, {"text": "3.5, because the negative sign is dropped.", "isCorrect": false, "rationale": "Python does not drop signs. The output is signed and rounded toward negative infinity."}]}, {"question": "In AP Pseudocode, `13 MOD 4` evaluates to which value, and what is the Python equivalent?", "options": [{"text": "13 MOD 4 = 1; Python equivalent is 13 % 4.", "isCorrect": true, "rationale": "13 divided by 4 is 3 with remainder 1. The section explicitly states the AP MOD keyword maps to Python's `%` operator. Both produce 1 for positive operands."}, {"text": "13 MOD 4 = 3; Python equivalent is 13 // 4.", "isCorrect": false, "rationale": "MOD returns the remainder, not the quotient. `//` is the quotient. 13 // 4 is 3, but 13 MOD 4 is 1."}, {"text": "13 MOD 4 = 4; Python equivalent is 13 + 4.", "isCorrect": false, "rationale": "MOD does not produce 4 here, and `+` is not equivalent to MOD."}, {"text": "13 MOD 4 = 0; Python equivalent is 13 == 4.", "isCorrect": false, "rationale": "13 MOD 4 is the remainder of 13/4 (which is 1), not zero. `==` tests equality, not modulo."}]}, {"question": "A student wants to know whether an integer `n` is even. Which idiom does the section recommend, and why does it work?", "options": [{"text": "`n // 2 == 0`, because an even number divided by 2 has no remainder.", "isCorrect": false, "rationale": "`//` is floor division, which gives the quotient, not the remainder. `n // 2 == 0` only checks whether n is 0 or 1, not whether it is even."}, {"text": "`n % 2 == 0`, because the modulo operator returns the remainder after integer division. An even integer divided by 2 leaves remainder 0; an odd integer leaves remainder 1.", "isCorrect": true, "rationale": "This is the canonical even-check idiom and the section explicitly identifies it as a common use of modulo."}, {"text": "`n / 2 == 0`, because dividing an even number by 2 always gives 0.", "isCorrect": false, "rationale": "Dividing 6 by 2 gives 3.0, not 0. This idiom does not test for evenness."}, {"text": "`n ** 2 == 0`, because squaring even numbers makes them zero.", "isCorrect": false, "rationale": "Squaring 6 gives 36, not 0. This idiom is unrelated to even/odd testing."}]}, {"question": "Trace this Python expression step by step:\n\nprint(10 - 2 ** 2 + 8 // 3)\n\nWhich option correctly identifies the evaluation order and the final output?", "options": [{"text": "Output 8. Step 1: 2 ** 2 = 4 (exponent first). Step 2: 8 // 3 = 2 (floor division, same level as *, left-to-right). Step 3: 10 - 4 = 6 (subtraction). Step 4: 6 + 2 = 8.", "isCorrect": true, "rationale": "This is the section's worked trace. Exponentiation outranks multiplication-level operators; multiplication-level operators outrank addition/subtraction; same-level operators evaluate left-to-right."}, {"text": "Output 0. Python evaluates strictly left to right: ((((10 - 2) ** 2) + 8) // 3).", "isCorrect": false, "rationale": "Strict left-to-right ignores precedence. Python applies PEMDAS first, so ** binds before subtraction."}, {"text": "Output 14. Python evaluates strictly right to left.", "isCorrect": false, "rationale": "Python is not right-to-left for these operators. Among +, -, *, /, //, %, evaluation is left-to-right; only ** is right-to-left."}, {"text": "Output 4. Subtraction and addition cancel out.", "isCorrect": false, "rationale": "There is no cancellation rule. The trace gives 8."}]}, {"question": "In the Python expression `2 ** 3 ** 2`, what is the output, and what associativity rule applies?", "options": [{"text": "64, because exponentiation is left-to-right: 2 ** 3 = 8, then 8 ** 2 = 64.", "isCorrect": false, "rationale": "Exponentiation in Python is right-to-left, the opposite of left-to-right. The section calls this out explicitly."}, {"text": "512, because exponentiation is right-to-left: 3 ** 2 = 9 first, then 2 ** 9 = 512.", "isCorrect": true, "rationale": "The section explicitly notes ** is right-associative, so 2 ** 3 ** 2 evaluates as 2 ** (3 ** 2) = 2 ** 9 = 512, not (2 ** 3) ** 2 = 64."}, {"text": "12, because Python adds the operands.", "isCorrect": false, "rationale": "** is exponentiation, not addition. There is no operand-summing rule."}, {"text": "TypeError, because chained ** is not allowed.", "isCorrect": false, "rationale": "Chained ** is allowed in Python; the rule is just that it associates right-to-left."}]}, {"question": "A student computes a discount with the buggy line `discount = 100 - 10 / 100 * 200`. They expected 180.0 but got 80.0. What went wrong, and what is the fix?", "options": [{"text": "Operator precedence: 10 / 100 evaluates first as 0.1, then 0.1 * 200 = 20, then 100 - 20 = 80.0. The fix is `(100 - 10) / 100 * 200`, which forces subtraction first and produces 180.0.", "isCorrect": true, "rationale": "This is the section's worked Mistake 2 example. The intended grouping is `(100-10)/100*200`, but without parentheses Python applies / and * before -, producing the wrong number."}, {"text": "Python's / operator is broken on integers larger than 100.", "isCorrect": false, "rationale": "/ works the same on all numeric values. The error is precedence, not a numeric bug."}, {"text": "100 - 10 always evaluates to 80 in Python 3.", "isCorrect": false, "rationale": "100 - 10 is 90 in any Python version. The result 80.0 comes from the order of operations, not from the subtraction itself."}, {"text": "The student should multiply by 200 before dividing by 100.", "isCorrect": false, "rationale": "Multiplication and division are at the same precedence level and evaluate left-to-right; the order of those two does not matter for this case. The real fix is the parentheses around the subtraction."}]}, {"question": "Which statement BEST captures the difference between `/` and `//` in Python 3, with an example for each?", "options": [{"text": "`/` is true division and always returns a float (`7 / 2` is 3.5; `4 / 2` is 2.0). `//` is floor division and returns the integer floor for int operands (`7 // 2` is 3; `-7 // 2` is -4). Use `//` when you specifically want the integer quotient.", "isCorrect": true, "rationale": "These match the section's exact rules. `/` is float division (always); `//` is floor division (rounds toward negative infinity, not toward zero)."}, {"text": "`/` is integer division; `//` is float division.", "isCorrect": false, "rationale": "These are inverted. `/` is float division (always returns a float); `//` is floor division (returns an integer for int operands)."}, {"text": "`/` and `//` are interchangeable in Python 3.", "isCorrect": false, "rationale": "They are emphatically not interchangeable. `7 / 2` is 3.5; `7 // 2` is 3."}, {"text": "`//` is a comment, not a division operator.", "isCorrect": false, "rationale": "Python's comment marker is `#`, not `//`. `//` is a real arithmetic operator (floor division)."}]}, {"question": "On the AP exam, the keyword MOD appears in algorithm-tracing problems. Which of the following correctly explains why exam MOD problems rarely surface the negative-number floor-division subtlety described in this section?", "options": [{"text": "MOD only works on prime numbers, so negatives are excluded.", "isCorrect": false, "rationale": "MOD has no prime-number restriction. The section gives no such rule."}, {"text": "Exam MOD traces almost always use positive integers, so the floor-toward-negative-infinity behavior of Python's `%` on negatives is primarily a Python detail rather than an AP exam concern.", "isCorrect": true, "rationale": "The section says exactly this. AP exam MOD problems use positive operands; Python's `-7 % 2 = 1` quirk does not show up on exam traces."}, {"text": "The AP exam disallows the keyword MOD entirely.", "isCorrect": false, "rationale": "MOD is part of the AP Pseudocode and appears frequently on the exam, especially in algorithm-tracing items."}, {"text": "Python's `%` is unrelated to MOD.", "isCorrect": false, "rationale": "The section maps MOD directly to Python's `%` for positive operands. They are the same operation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
