<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>

        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Variables, Assignment, and Memory</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Trace the following Python code and predict its final state. Which option correctly describes what happens, step by step?\n\nscore = 42\nscore = 100\nprint(score)", "options": [{"text": "Python prints 42 because the first assignment cannot be overwritten.", "isCorrect": false, "rationale": "The section explicitly states that re-assignment replaces the old value. The name stays the same; the value changes."}, {"text": "Python prints 142, because the second assignment is added to the first.", "isCorrect": false, "rationale": "Assignment is replacement, not addition. There is no implicit accumulation."}, {"text": "Python prints 100. The first assignment binds score to 42, the second assignment replaces 42 with 100, and print(score) retrieves the current value.", "isCorrect": true, "rationale": "This matches the section's three-step model: evaluate the right-hand side, allocate or update memory, bind the name. After the second assignment, only 100 is associated with score."}, {"text": "Python prints both 42 and 100 on separate lines because two assignments produce two outputs.", "isCorrect": false, "rationale": "Assignments themselves do not print anything. Only the explicit print(score) call produces output, and it prints the current value."}]}, {"question": "On the AP exam, the same operation that Python writes as `total = 0` is written in AP Pseudocode using a different symbol. Which translation is correct, and what is the symbolic difference designed to prevent?", "options": [{"text": "Python `total = 0` is AP Pseudocode `total <- 0`. The arrow visually distinguishes assignment from equality testing, which AP Pseudocode writes with a single `=` inside conditions like `IF (x = 10)`.", "isCorrect": true, "rationale": "This is the section's exact mapping. In AP Pseudocode, `<-` is assignment and `=` is equality testing; in Python, `=` is assignment and `==` is equality testing. The two notations differ; the underlying concepts are the same."}, {"text": "Python `total = 0` is AP Pseudocode `total == 0`. The double-equals avoids overloading the assignment symbol.", "isCorrect": false, "rationale": "AP Pseudocode does not use `==`. Equality in pseudocode is a single `=`, used inside conditions. Assignment is `<-`."}, {"text": "Python `total = 0` is AP Pseudocode `0 -> total`. The arrow points from value to variable.", "isCorrect": false, "rationale": "AP Pseudocode uses a left-pointing arrow `<-`, with the variable on the left and the value on the right, paralleling Python's left-side variable, right-side value."}, {"text": "There is no pseudocode equivalent — assignment exists only in real programming languages.", "isCorrect": false, "rationale": "The section dedicates an entire pseudocode comparison block to assignment in both notations."}]}, {"question": "Predict the output of the following Python code, and identify which language behavior produces it:\n\nx = \"5\"\ny = 3\nprint(x * y)", "options": [{"text": "15, because Python multiplies the integer 5 by 3.", "isCorrect": false, "rationale": "x is a string \"5\", not the integer 5. The single quotes (or double quotes) make it a string. The * operator on a string and an integer is repetition, not arithmetic."}, {"text": "555, because the * operator repeats a string a given number of times when one operand is a string and the other is an integer.", "isCorrect": true, "rationale": "The section states explicitly that * applied to a string and integer is string repetition. \"5\" * 3 produces \"555\". This is also the basis for one of the end-of-section prompts."}, {"text": "TypeError, because you cannot multiply a string by a number.", "isCorrect": false, "rationale": "String repetition is a defined Python operation. There is no TypeError when multiplying a string by an integer."}, {"text": "5 5 5, with spaces between, because Python prints the string three times.", "isCorrect": false, "rationale": "Repetition concatenates the string end-to-end with no separator. Spaces only appear when print is called with multiple arguments."}]}, {"question": "Which of the following describes Python's `a, b = b, a` swap idiom most accurately, and why does the naive `a = b; b = a` fail?", "options": [{"text": "The naive version fails because the first line overwrites a's old value before the second line can use it. Python's tuple assignment evaluates both right-hand-side values FIRST, then performs both assignments, so neither original value is lost.", "isCorrect": true, "rationale": "This matches the section's explanation: Python evaluates all right-hand expressions before any assignments occur, packs them into a tuple, then unpacks. The naive sequential approach destroys a before b can read it."}, {"text": "The naive version works fine; the tuple version is just a stylistic preference.", "isCorrect": false, "rationale": "The section explicitly states the naive approach does not work because the first assignment destroys a's original value."}, {"text": "Python uses a hidden temp variable inside the operating system to perform the swap, which is why a, b = b, a works.", "isCorrect": false, "rationale": "Python uses tuple packing/unpacking, not a hidden OS variable. The intermediate is a Python tuple, not anything OS-related."}, {"text": "Both versions fail because Python cannot swap variables.", "isCorrect": false, "rationale": "Both the temp-variable and the tuple-assignment versions are correct ways to swap. The section presents both as working solutions."}]}, {"question": "A student writes `list = 5` in their Python program and then later tries `numbers = list(range(10))`. The second line crashes with a TypeError saying 'int' object is not callable. What happened, and what does the section advise?", "options": [{"text": "Python keywords cannot be used as variable names, so `list = 5` should have raised a SyntaxError.", "isCorrect": false, "rationale": "`list` is a built-in function name, not a Python keyword. Assigning to it is permitted by Python's grammar (no SyntaxError) but is precisely the trap the section warns against."}, {"text": "The variable name `list` shadowed Python's built-in `list` constructor. The first line assigned the integer 5 to the name `list`, so the second line tries to call the integer 5 as if it were a function. The section's rule is to avoid built-in function names as variable names.", "isCorrect": true, "rationale": "This is the section's exact warning. Python permits the assignment, but the resulting shadowing produces confusing errors later. The fix is to rename the variable."}, {"text": "Python automatically restores built-ins at the end of every line.", "isCorrect": false, "rationale": "Python does not auto-restore built-ins. Once shadowed by an assignment, a built-in stays shadowed for the rest of the scope."}, {"text": "The crash means the program needs `import list` at the top.", "isCorrect": false, "rationale": "`list` is built into Python and does not require importing. The crash is a shadowing issue, not a missing import."}]}, {"question": "Which of the following pairs of variable names BEST follows the section's recommended Python conventions for naming?", "options": [{"text": "`StudentName` and `MaxScore` (PascalCase).", "isCorrect": false, "rationale": "PascalCase is a different convention used for class names, not variables. Python variables follow snake_case."}, {"text": "`student_name` and `max_score` (snake_case).", "isCorrect": true, "rationale": "snake_case (all lowercase, underscores between words) is the section's stated Python convention for variable names. Both names are also descriptive, satisfying the readability criterion."}, {"text": "`x` and `y` (single letters).", "isCorrect": false, "rationale": "The section calls single-letter names poor unless they represent a mathematical convention. They force the reader to trace the entire program to understand what the variable holds."}, {"text": "`tmp` and `val` (vague abbreviations).", "isCorrect": false, "rationale": "The section explicitly cites `tmp`, `val`, and `stuff` as poor names because they convey no information about the variable's purpose."}]}, {"question": "A common AP CSP confusion arises between the meanings of `=` and `==` in Python. Which statement correctly distinguishes them, and what does the section identify as a frequent point-loss error?", "options": [{"text": "`=` is assignment (stores a value into a name); `==` tests equality (returns True or False). Students often write `=` when they mean `==` inside a condition, which is a frequent point-loss error and a common syntax error.", "isCorrect": true, "rationale": "This is the section's exact framing of the trap. Inside an `if` condition, `=` (assignment) is a syntax error in Python; `==` is the equality test."}, {"text": "`=` and `==` are interchangeable in Python.", "isCorrect": false, "rationale": "They are emphatically not interchangeable. Confusing them is one of the most common beginner errors in Unit 2."}, {"text": "`=` tests equality; `==` performs assignment.", "isCorrect": false, "rationale": "This inverts the meanings. `=` is assignment; `==` is equality."}, {"text": "Python uses `:=` for assignment; `=` is reserved for math papers.", "isCorrect": false, "rationale": "Python's standard assignment is `=`. The walrus operator `:=` is a special-purpose form used inside expressions and is not introduced in this section."}]}, {"question": "Predict the output of this Python code, and explain which type-related concept it illustrates:\n\nage_int = 17\nage_str = \"17\"\nprint(age_int + 3)\nprint(age_str + \"3\")", "options": [{"text": "Both lines print 20 because Python automatically converts strings to integers when a number appears.", "isCorrect": false, "rationale": "Python does not auto-convert types. The two operations are interpreted differently based on type."}, {"text": "Line 3 prints 20 (integer addition); Line 4 prints 173 (string concatenation joining \"17\" and \"3\" end-to-end). The + operator behaves differently for integers (arithmetic) vs strings (concatenation), and the type() function reveals which Python sees.", "isCorrect": true, "rationale": "This is the section's exact code example. + performs arithmetic on integers and concatenation on strings. \"17\" + \"3\" is the two-character string \"17\" followed by the one-character string \"3\", giving \"173\"."}, {"text": "Both lines crash with TypeError because Python cannot add 17 to anything.", "isCorrect": false, "rationale": "Python does add integers fine, and string + string is also valid (concatenation). Neither operation triggers a TypeError."}, {"text": "Line 3 prints 17.3; Line 4 prints \"17 + 3\".", "isCorrect": false, "rationale": "These outputs do not correspond to any Python behavior. Integer + integer produces an integer sum; string + string produces a concatenated string."}]}, {"question": "Which of the following is the BEST reason that Python is often called \"dynamically typed,\" based on the section's description of how variables work?", "options": [{"text": "Python variables have no fixed type; the same name can hold an integer at one moment and a string at the next, though mixing types carelessly is a common source of runtime errors.", "isCorrect": true, "rationale": "This is the section's exact framing. The variable is just a name bound to a value; the value's type can change across assignments."}, {"text": "Python variables are checked for type at compile time before the program runs.", "isCorrect": false, "rationale": "This is static typing, the opposite of what Python does. Python is interpreted, and type checking happens at runtime."}, {"text": "All Python variables are integers unless explicitly declared as strings.", "isCorrect": false, "rationale": "Python variables have no declarations at all. The type comes from the value assigned, not from a declaration."}, {"text": "Python requires every variable to be declared with a fixed type before use.", "isCorrect": false, "rationale": "This describes statically typed languages like Java or C++. Python has no such requirement."}]}, {"question": "Grace Hopper is credited with two contributions described in the section. Which pair correctly identifies them and explains their lasting significance?", "options": [{"text": "She invented the transistor and the integrated circuit, enabling modern hardware.", "isCorrect": false, "rationale": "Hopper's contributions described in the section are software-focused (compilers, debugging vocabulary), not hardware. Transistors and ICs are unrelated to Hopper."}, {"text": "She championed and helped create the first compilers (1952), demonstrating that machines could translate high-level commands; and she popularized the term \"debugging\" after her team taped a moth from the Mark II's relays into the logbook in 1947.", "isCorrect": true, "rationale": "These are the section's two named contributions. The compiler work led directly to COBOL (1959), and the moth incident fixed the term \"debugging\" in computing culture."}, {"text": "She wrote the first algorithm for the Analytical Engine.", "isCorrect": false, "rationale": "The first algorithm for the Analytical Engine was Lovelace's, not Hopper's. Lovelace and Hopper are presented in different sections."}, {"text": "She designed the Python language.", "isCorrect": false, "rationale": "Python was created by Guido van Rossum, not Hopper. Hopper's compiler work pre-dates Python by decades."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
