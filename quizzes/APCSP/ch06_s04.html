        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Theoretical Computing Limits: Undecidable Problems</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which definition BEST captures what AP CSP means by an undecidable problem?", "options": [{"text": "A problem whose exact algorithm runs in exponential time.", "isCorrect": false, "rationale": "That describes an INTRACTABLE problem (Section 6.3). Intractable problems can still be solved correctly given enough time. Undecidable problems cannot be solved correctly at all by any algorithm."}, {"text": "A problem for which no algorithm can correctly answer YES or NO for every possible input in finite time.", "isCorrect": true, "rationale": "Undecidable means provably impossible to solve in general — any proposed algorithm either gives a wrong answer on some input or fails to halt. This is a mathematical limit, not a hardware limit."}, {"text": "A problem that researchers have not yet figured out how to solve.", "isCorrect": false, "rationale": "Undecidability is not a 'we haven't found it yet' situation. It is a proven mathematical impossibility."}, {"text": "A problem that can only be solved on a quantum computer.", "isCorrect": false, "rationale": "Undecidability applies to every model of computation. Quantum computers cannot solve undecidable problems either."}], "id": "q01"}, {"question": "Which problem is the canonical example of an undecidable problem?", "options": [{"text": "The Traveling Salesman Problem.", "isCorrect": false, "rationale": "TSP is intractable, not undecidable. An exact solution exists (try all permutations) but takes exponential time. Heuristics can produce good approximate answers."}, {"text": "The Halting Problem: deciding whether an arbitrary program halts on a given input.", "isCorrect": true, "rationale": "Turing's 1936 paper proved the Halting Problem is undecidable using a diagonalization argument. No algorithm can correctly decide halting for every program-input pair."}, {"text": "Sorting an unsorted list.", "isCorrect": false, "rationale": "Sorting is decidable (and tractable) — merge sort, heap sort, etc. all run in polynomial time."}, {"text": "Searching for an element in a sorted list.", "isCorrect": false, "rationale": "Binary search solves this in O(log n). It is decidable and tractable."}], "id": "q02"}, {"question": "In ONE sentence, what is the key difference between an intractable problem (Section 6.3) and an undecidable problem (this section)?", "options": [{"text": "Intractable problems are unsolvable; undecidable problems are merely slow.", "isCorrect": false, "rationale": "The labels are reversed. Undecidable problems are unsolvable in general; intractable problems can be solved given enough time."}, {"text": "Intractable problems can be solved given enough time, while undecidable problems cannot be solved correctly for every input by any algorithm — even with infinite time.", "isCorrect": true, "rationale": "Intractability is about practical runtime; undecidability is about mathematical possibility. TSP is solvable in (n-1)! time. The Halting Problem cannot be solved by any algorithm at all."}, {"text": "Intractable means the problem requires more memory; undecidable means the problem requires more CPU.", "isCorrect": false, "rationale": "Neither concept is about a specific resource. Both are about the existence and runtime of correct algorithms."}, {"text": "There is no difference; the AP exam treats them as synonyms.", "isCorrect": false, "rationale": "The AP exam draws the line precisely. Intractable and undecidable are distinct ideas tested separately."}], "id": "q03"}, {"question": "Turing's proof that the Halting Problem is undecidable uses diagonalization. What is the role of the diagonal procedure in that argument?", "options": [{"text": "It runs in polynomial time, proving that every halting question is tractable.", "isCorrect": false, "rationale": "The proof has nothing to do with runtime. It assumes halts works correctly and constructs a counterexample."}, {"text": "It is fed itself as input, then DOES THE OPPOSITE of whatever halts(P, P) returns — producing a logical contradiction either way.", "isCorrect": true, "rationale": "Diagonal calls halts(P, P). If halts says 'halts,' diagonal loops forever. If halts says 'loops,' diagonal halts immediately. Calling diagonal(diagonal) forces halts to be wrong about its own behavior, contradicting the assumption that halts is correct."}, {"text": "It iterates over every possible program in alphabetical order.", "isCorrect": false, "rationale": "There is no enumeration. Diagonalization here is a self-reference trick: feed the procedure to itself, not iterate over a list."}, {"text": "It proves that programs can call themselves, which causes errors.", "isCorrect": false, "rationale": "Self-reference is not the issue. Plenty of valid programs call themselves. The contradiction is specifically between halts's claim and diagonal's behavior."}], "id": "q04"}, {"question": "Suppose halts(P, P) is assumed to exist and works correctly. By construction, when halts(P, P) returns True, what does diagonal do? When it returns False?", "options": [{"text": "When True: diagonal returns immediately. When False: diagonal loops forever.", "isCorrect": false, "rationale": "The construction is the OPPOSITE — that is the trick. When halts says 'halts,' diagonal loops forever; when halts says 'loops,' diagonal halts."}, {"text": "When True: diagonal enters an infinite loop. When False: diagonal halts immediately.", "isCorrect": true, "rationale": "Exactly. Diagonal contradicts halts's prediction. If halts(P, P) = True (P halts on P), diagonal loops forever; if halts(P, P) = False (P loops on P), diagonal halts."}, {"text": "Both cases: diagonal halts.", "isCorrect": false, "rationale": "Diagonal's behavior depends on what halts returned. Both cases would not produce the contradiction needed."}, {"text": "Both cases: diagonal raises an exception.", "isCorrect": false, "rationale": "The construction does not raise exceptions. It either loops forever or halts, depending on halts's answer."}], "id": "q05"}, {"question": "Does the undecidability of the Halting Problem mean programmers can NEVER detect any infinite loops?", "options": [{"text": "Yes — no programmer can ever spot any infinite loop.", "isCorrect": false, "rationale": "Programmers and tools detect MANY specific infinite loops. The proof only rules out a single GENERAL-PURPOSE algorithm that works for every program-input pair."}, {"text": "No — specific patterns (while True with no break, for-else with empty range) can be detected. The proof only forbids a single general-purpose algorithm that works for every program-input pair.", "isCorrect": true, "rationale": "Linters, debuggers, and humans regularly catch obvious infinite loops. The undecidability result says you cannot build a tool that catches them ALL. Pattern-specific tools remain useful."}, {"text": "No — modern AI fully solves the Halting Problem.", "isCorrect": false, "rationale": "AI systems and program analyzers handle many cases but cannot solve the general problem. The mathematical impossibility holds for any algorithm, including AI."}, {"text": "Yes — but only for programs written in C.", "isCorrect": false, "rationale": "Undecidability applies to every Turing-complete language. No language sidesteps the proof."}], "id": "q06"}, {"question": "Which practical claim is a CONSEQUENCE of the Halting Problem being undecidable?", "options": [{"text": "No general-purpose program verifier can exist that proves any program meets any spec.", "isCorrect": true, "rationale": "Verifying arbitrary correctness reduces to deciding halting. Linters and verifiers handle specific cases but cannot be complete. This is one of Turing's lasting practical implications."}, {"text": "Programs cannot be tested at all.", "isCorrect": false, "rationale": "Testing specific programs against specific cases is fully practical. The result only forbids a general algorithm that works for every program-input pair."}, {"text": "Programmers should stop writing programs that might loop.", "isCorrect": false, "rationale": "Programs with loops are written every day; specific termination is reasoned about case by case. The result is mathematical, not behavioral advice."}, {"text": "Compilers cannot be built.", "isCorrect": false, "rationale": "Compilers exist and work fine. They do not need to solve halting in general."}], "id": "q07"}, {"question": "Which statement is TRUE about the proof's structure?", "options": [{"text": "Turing built diagonal first, then assumed halts.", "isCorrect": false, "rationale": "The order matters: he assumed halts works correctly (Step 1), then constructed diagonal (Step 2), then ran diagonal(diagonal) (Step 3) to derive a contradiction."}, {"text": "It is a proof by contradiction: assume halts works correctly, build diagonal, run diagonal(diagonal), reach a contradiction either way, conclude halts cannot exist.", "isCorrect": true, "rationale": "Classic reductio ad absurdum. The contradiction in both Case A and Case B forces the original assumption to be false."}, {"text": "It is an empirical proof: Turing tested halts on millions of programs.", "isCorrect": false, "rationale": "It is a logical proof, not an empirical one. No actual halts procedure was tested; the contradiction is derived purely from the assumption of correctness."}, {"text": "It only applies to programs longer than 100 lines.", "isCorrect": false, "rationale": "The proof applies to all programs, regardless of size. Diagonal itself is short."}], "id": "q08"}, {"question": "Why does the existence of a universal Turing machine make undecidability relevant in practice?", "options": [{"text": "Because every general-purpose computer is essentially a universal Turing machine, the Halting Problem's impossibility transfers to every real-world computer ever built.", "isCorrect": true, "rationale": "Turing showed a universal machine can simulate any other machine — but cannot decide whether arbitrary computations halt. Modern computers are universal in the same sense, so the bound applies to them all."}, {"text": "Because universal Turing machines can solve any problem, including the Halting Problem.", "isCorrect": false, "rationale": "Universality is exactly what creates the problem: by simulating any computation, the universal machine inherits the impossibility of deciding halting in general."}, {"text": "Because real computers operate differently from Turing machines, undecidability does not apply.", "isCorrect": false, "rationale": "Real computers are computationally equivalent to Turing machines. The same bound applies."}, {"text": "Because universal Turing machines are slower than dedicated machines.", "isCorrect": false, "rationale": "Speed is not the issue. The result is about computability, not runtime."}], "id": "q09"}, {"question": "Which historical claim about Alan Turing is TRUE?", "options": [{"text": "Turing published the proof of Halting Problem undecidability in 1936, before any electronic computer existed.", "isCorrect": true, "rationale": "His paper 'On Computable Numbers' (1936) introduced the Turing machine and proved several undecidability results, including the unsolvability of the Entscheidungsproblem. Electronic computers came later."}, {"text": "Turing built the first electronic computer in 1936 to demonstrate his proof.", "isCorrect": false, "rationale": "Electronic computers came later (Colossus, ENIAC). Turing's 1936 paper was a mathematical proof using the abstract Turing machine model."}, {"text": "Turing's WW2 work involved building the first quantum computer.", "isCorrect": false, "rationale": "He led the team that broke the German Enigma cipher at Bletchley Park — work that historians believe shortened the war by several years."}, {"text": "Turing's portrait appears on the U.S. dollar bill.", "isCorrect": false, "rationale": "Turing's portrait was placed on the British 50 banknote in 2021, not the U.S. dollar."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
