<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Crowdsourcing and Citizen Science</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Crowdsourcing distributes a problem across many contributors, each solving a portion. According to the textbook, which two properties must the problem possess for this approach to work?", "options": [{"text": "Decomposability (the problem can be divided into independent sub-tasks that don't require tight coordination during execution) and aggregation (the sub-task results can be combined into a complete solution).", "isCorrect": true, "rationale": "These are the two necessary components named in the textbook. Without decomposability, contributors cannot work in parallel; without aggregation, individual contributions cannot become a coherent result."}, {"text": "Encryption and authentication, so contributions can be signed.", "isCorrect": false, "rationale": "Cryptography is sometimes used in specific platforms (Folding@home uses hashing for integrity) but is not the textbook's general definition of what makes a problem suitable for crowdsourcing."}, {"text": "Quantum tunneling and lithography economics.", "isCorrect": false, "rationale": "These are chip-fabrication concepts unrelated to crowdsourcing problem decomposition."}, {"text": "Copyright and fair use.", "isCorrect": false, "rationale": "These are intellectual-property concepts unrelated to whether a problem can be crowdsourced."}], "id": "q01"}, {"question": "OpenStreetMap uses a version-control system similar to git so every edit is recorded and reversible. Which of the three infrastructure problems beyond the task itself does this primarily address?", "options": [{"text": "Coordination and consensus, by providing a protocol for tracking who made which changes and reverting disputed edits.", "isCorrect": true, "rationale": "Version control gives the platform an auditable history and the ability to undo bad edits — the textbook's example of how OSM resolves disputes between contributors."}, {"text": "Task decomposition, by deciding what to map.", "isCorrect": false, "rationale": "Version control records edits; it does not divide the underlying problem into sub-tasks. Task decomposition is the upstream step of partitioning the world map into editable features."}, {"text": "Sampling bias mitigation, by rebalancing the dataset.", "isCorrect": false, "rationale": "Version control is unrelated to ML training-set composition. The OSM mechanism is about edit history, not dataset rebalancing."}, {"text": "Lithography economics, by reducing fab cost.", "isCorrect": false, "rationale": "Lithography concerns chip fabrication and is unrelated to map version control."}], "id": "q02"}, {"question": "Galaxy Zoo assigned each volunteer one galaxy image to classify (spiral vs elliptical, etc.) and required multiple independent classifiers per galaxy with a threshold-fraction agreement before accepting a result. Which infrastructure mechanism does this exemplify?", "options": [{"text": "Redundancy as a contribution-validation mechanism: assigning the same task to multiple contributors and requiring agreement before accepting a result.", "isCorrect": true, "rationale": "The textbook explicitly cites redundancy as one of three contribution-validation mechanisms (alongside expert review and reputation weighting). Galaxy Zoo's multi-classifier-with-threshold-agreement is the canonical example."}, {"text": "Task decomposition into individual galaxy images.", "isCorrect": false, "rationale": "Decomposition is the upstream step (each image is one task). Validation handles the question of whether a given task's submitted result is correct, which is what redundancy addresses."}, {"text": "An evaluation gap in machine learning.", "isCorrect": false, "rationale": "Evaluation gap is an ML-bias concept, not a crowdsourcing validation mechanism."}, {"text": "Last-mile broadband deployment to volunteer astronomers.", "isCorrect": false, "rationale": "Broadband infrastructure is unrelated to the per-task validation mechanism Galaxy Zoo uses."}], "id": "q03"}, {"question": "Folding@home reached approximately 1.5 exaflops at peak in 2020, exceeding the combined performance of the world's top 500 supercomputers. Which property of protein folding makes it well suited to volunteer-distributed computing?", "options": [{"text": "It decomposes naturally into independent work units (small portions of a simulation) that volunteer machines can run without communicating with each other and return for central aggregation.", "isCorrect": true, "rationale": "The textbook describes the mechanism: a Folding@home client downloads a work unit, runs it, and returns the result. The simulation's structure makes it embarrassingly parallel — volunteer machines do not need to communicate during their work."}, {"text": "It requires every machine to share live memory with every other machine.", "isCorrect": false, "rationale": "Tight memory sharing across many remote volunteer machines would be infeasible over the public Internet. The textbook emphasizes that Folding@home succeeds because the simulation does not require this."}, {"text": "It requires Moore's-Law-rate transistor doubling on volunteer hardware.", "isCorrect": false, "rationale": "Moore's Law concerns transistor density; it does not determine whether a computation suits distributed volunteer machines."}, {"text": "It uses GPS coordinates to synchronize global compute.", "isCorrect": false, "rationale": "GPS is not part of Folding@home's coordination mechanism. The work-unit-and-aggregation pattern does not depend on synchronized timing across machines."}], "id": "q04"}, {"question": "Folding@home uses cryptographic hashing to verify computational results. Which infrastructure problem does this address?", "options": [{"text": "Contribution validation, specifically detecting whether a submitted result was actually computed honestly rather than fabricated.", "isCorrect": true, "rationale": "The textbook lists this in its discussion of how platforms detect and correct errors. Hashing lets the central server verify that a returned work-unit result is the genuine output of running the simulation, not random or malicious output."}, {"text": "Task decomposition, by hashing the input.", "isCorrect": false, "rationale": "Hashing in this context verifies output correctness, not how the problem is broken into sub-tasks."}, {"text": "An evaluation gap in machine learning.", "isCorrect": false, "rationale": "Evaluation gap is an ML-bias concept; cryptographic hashing of work-unit results is unrelated."}, {"text": "Lithography economics.", "isCorrect": false, "rationale": "Chip-fabrication economics is unrelated to crowdsourced computation verification."}], "id": "q05"}, {"question": "Wikipedia's quality-control infrastructure includes community-policy enforcement (the \"Five Pillars\" including neutral point of view, verifiability, and no-original-research), automated bots that revert vandalism, and a tiered reputation system in which experienced editors can protect high-traffic pages. The combination of these mechanisms is best described as:", "options": [{"text": "A multi-layer contribution-validation system combining redundancy, expert review, and reputation weighting.", "isCorrect": true, "rationale": "The textbook lists these three validation mechanisms and notes that Wikipedia uses a layered combination. Vandalism reversion is a form of redundancy; community policies and elected administrators provide expert review; the tiered editor system is reputation weighting."}, {"text": "A copyright-licensing scheme.", "isCorrect": false, "rationale": "Wikipedia's content uses Creative Commons licensing, but the quality-control mechanisms described here are about contribution validation, not licensing."}, {"text": "A LEO satellite distribution system.", "isCorrect": false, "rationale": "Wikipedia's quality control is platform infrastructure, not network infrastructure."}, {"text": "A machine-learning bias mitigation.", "isCorrect": false, "rationale": "ML bias mitigation is a separate topic. Wikipedia's quality control predates and operates independently of any ML pipeline."}], "id": "q06"}, {"question": "A reputation system in a crowdsourcing platform:", "options": [{"text": "Tracks a contributor's history of accurate, helpful, or reliable behavior and uses that track record to modulate the contributor's influence or access level.", "isCorrect": true, "rationale": "This is the textbook's definition. Reputation systems create incentives for quality contributions by making past behavior visible and consequential."}, {"text": "Determines a contributor's salary.", "isCorrect": false, "rationale": "Most crowdsourcing platforms in the textbook are volunteer-based. Reputation systems modulate influence and access, not pay."}, {"text": "Encrypts contributions for confidentiality.", "isCorrect": false, "rationale": "Reputation tracking is about behavior history, not data confidentiality."}, {"text": "Replaces task decomposition.", "isCorrect": false, "rationale": "Reputation systems address contribution quality after decomposition has happened. They do not replace the decomposition step."}], "id": "q07"}, {"question": "When contributors disagree about the correct output for a task, the platform uses a procedure to resolve the dispute. The textbook calls this a:", "options": [{"text": "Consensus protocol — a procedure for producing a single agreed-upon result from potentially conflicting inputs while filtering out low-quality or erroneous contributions.", "isCorrect": true, "rationale": "Consensus protocols range from simple majority vote to multi-round deliberation with escalating expert review. The goal is to converge on a single accepted result."}, {"text": "A copyright assignment.", "isCorrect": false, "rationale": "Copyright assignment is an intellectual-property mechanism, not a dispute-resolution protocol."}, {"text": "A proxy variable.", "isCorrect": false, "rationale": "Proxy variables are an ML feature-selection concept unrelated to crowdsourcing dispute resolution."}, {"text": "A geostationary handoff.", "isCorrect": false, "rationale": "Geostationary refers to satellite orbit; not relevant to crowdsourcing protocols."}], "id": "q08"}, {"question": "The textbook says the last commercial print edition of Encyclopaedia Britannica was published in 2012, less than a decade after Wikipedia reached critical mass. Which economic effect of crowdsourcing does this most directly illustrate?", "options": [{"text": "Volunteer-coordinated platforms can produce a public good that displaces a previously commercial market when the marginal cost of additional contributions falls below what professional producers can match.", "isCorrect": true, "rationale": "The textbook frames this as the economic effect of crowdsourcing extending beyond direct production. Wikipedia displaced the commercial encyclopedia market because the volunteer-plus-platform cost structure undercut professional production."}, {"text": "A failure of fair use, because Britannica's content was copied.", "isCorrect": false, "rationale": "Wikipedia did not copy Britannica's content; it generated independent encyclopedia content under its own license. The displacement was economic, not via copying."}, {"text": "Moore's Law slowing in the publishing industry.", "isCorrect": false, "rationale": "Moore's Law concerns transistor density, not encyclopedia economics."}, {"text": "A LEO satellite delivery model.", "isCorrect": false, "rationale": "LEO satellites are unrelated to encyclopedia publishing economics."}], "id": "q09"}, {"question": "Galaxy Zoo's launch (2007) and subsequent classification of approximately 930,000 Sloan Digital Sky Survey images by over 150,000 volunteers is characterized as citizen science. Which property of the underlying classification task made it well suited to citizen scientists rather than to fully automated algorithms at the time?", "options": [{"text": "Human visual judgment had higher accuracy than automated algorithms for ambiguous cases, so volunteer classifications added value the algorithms alone could not provide.", "isCorrect": true, "rationale": "The textbook explicitly notes that automated classifiers existed but had lower accuracy on ambiguous galaxies. Human classification — coordinated and aggregated through Galaxy Zoo — produced higher-quality data than the algorithms alone could."}, {"text": "Galaxy classification requires Moore's-Law-rate transistor scaling.", "isCorrect": false, "rationale": "Moore's Law is unrelated to whether a task suits human or algorithmic classification."}, {"text": "All galaxies look identical, so only humans can tell them apart.", "isCorrect": false, "rationale": "Galaxies have distinct morphological types; the point is that on ambiguous cases, human visual judgment exceeded automated accuracy at the time."}, {"text": "The Sloan Digital Sky Survey was open-source under the GPL.", "isCorrect": false, "rationale": "Open-source licensing is a separate concept; SDSS data licensing did not determine whether human classification was superior to automated classification."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
