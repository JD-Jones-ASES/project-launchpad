        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Language of Computers: Bits, Bytes, and Sampling</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A computer's circuitry is built from switches that have only two stable states. Why is the bit chosen as the fundamental unit of digital information?", "options": [{"text": "Because the bit's two values (0 and 1) map directly onto the two physical states of an electronic switch (off/on, charged/uncharged), and Shannon proved that any information can be encoded as a sequence of such binary choices.", "isCorrect": true, "rationale": "The section opens by linking the physical reality of two-state switches to Shannon's 1948 proof that all information can be expressed as binary choices. This is exactly why the bit, not some other unit, is the atom of digital information."}, {"text": "Because computers are faster at processing two values than ten, even though either could be implemented in hardware.", "isCorrect": false, "rationale": "The choice of binary is dictated by the hardware itself: switches have only two stable states. It is not primarily a speed optimization."}, {"text": "Because the bit is the smallest unit that can store a decimal digit (0-9) with no waste.", "isCorrect": false, "rationale": "A single bit cannot store a decimal digit at all; it has only 2 values, while a decimal digit needs 10. The bit holds a single binary choice, not a decimal digit."}, {"text": "Because the byte (8 bits) is the universal unit of information; the bit is just a convenient subdivision.", "isCorrect": false, "rationale": "The relationship is the reverse: a byte is 8 bits grouped together because early machines processed data in 8-bit chunks. The bit is the fundamental unit; the byte is a convenient grouping."}], "id": "q01"}, {"question": "How many distinct values can be encoded by n bits, and how many distinct values can a single byte (8 bits) represent?", "options": [{"text": "n bits encode 2*n values; a byte encodes 16 values.", "isCorrect": false, "rationale": "Each additional bit doubles the number of distinct values, so the relationship is exponential (2^n), not linear (2*n)."}, {"text": "n bits encode n^2 values; a byte encodes 64 values.", "isCorrect": false, "rationale": "n^2 is the wrong formula. The number of distinct values grows as 2^n, not n^2; n^2 would assign the same number to multiple bit patterns."}, {"text": "n bits encode 2^n values; a byte encodes 2^8 = 256 values.", "isCorrect": true, "rationale": "The section explicitly states n bits can encode 2^n distinct values and that 8 bits encode 2^8 = 256 distinct values - enough to cover the original 128-character ASCII set with room to spare."}, {"text": "n bits encode 10^n values; a byte encodes 10^8 = 100 million values.", "isCorrect": false, "rationale": "Decimal scaling (10^n) does not apply because each bit holds 2 values, not 10. This option confuses base-10 place value with base-2 representation."}], "id": "q02"}, {"question": "An audio engineer is recording a podcast. The Nyquist-Shannon sampling theorem says that to faithfully reproduce a signal containing frequencies up to f Hz, the sampling rate must be at least 2f Hz. Human hearing extends to roughly 20 kHz. Why does the CD audio standard sample at 44.1 kHz rather than exactly 40 kHz?", "options": [{"text": "Sampling at exactly 2f Hz would still introduce roundoff error in the bit depth, which 44.1 kHz avoids.", "isCorrect": false, "rationale": "Bit depth and sampling rate are independent dimensions of digitization. Choosing 44.1 kHz over 40 kHz does not affect roundoff error in amplitude quantization."}, {"text": "44.1 kHz is the smallest sampling rate that produces a CD's storage capacity exactly.", "isCorrect": false, "rationale": "The 44.1 kHz number was chosen to give comfortable headroom above the Nyquist minimum, not to fit a particular storage target. CD capacity is a separate engineering constraint."}, {"text": "44.1 kHz sits comfortably above the Nyquist minimum of 40 kHz, providing engineering headroom over the upper limit of human hearing.", "isCorrect": true, "rationale": "The text says CD audio uses 44.1 kHz - 'comfortably above the Nyquist minimum.' Sitting just above 2f gives margin for filtering and frequency content slightly above 20 kHz."}, {"text": "Because 44.1 kHz is the only frequency that human hearing can actually detect.", "isCorrect": false, "rationale": "Human hearing extends to roughly 20 kHz, not 44.1 kHz. The sampling rate is twice the maximum signal frequency, by Nyquist; it is not the audible frequency itself."}], "id": "q03"}, {"question": "A recording engineer captures one second of stereo CD audio at 44,100 samples/sec, 16 bits/sample, 2 channels. Approximately how many bits are stored, and what is that in megabits per second (Mb/s)?", "options": [{"text": "About 88,200 bits/s, roughly 0.09 Mb/s.", "isCorrect": false, "rationale": "This is the rate for 1 channel at 1 bit per sample. The full calculation must include both bit depth (16) and the number of channels (2)."}, {"text": "About 705,600 bits/s, roughly 0.7 Mb/s.", "isCorrect": false, "rationale": "This number drops the stereo factor of 2. The full stereo product is 44,100 x 16 x 2 = 1,411,200, not 705,600."}, {"text": "About 1,411,200 bits/s, roughly 1.4 Mb/s.", "isCorrect": true, "rationale": "The text computes 44,100 samples/s x 16 bits/sample x 2 channels = 1,411,200 bits/s, approximately 1.4 Mb/s. This is the canonical CD-quality bandwidth."}, {"text": "About 1,411,200 bits/s, roughly 1.4 GB/s.", "isCorrect": false, "rationale": "The bit count is correct, but the unit is wrong: 1.4 Mb/s is megabits per second, not gigabytes. A factor of 8000 error."}], "id": "q04"}, {"question": "Consider the following Python code segment. What does it output, and which information-theoretic concept does the calculation illustrate?\n\nbit_depth = 16\nlevels = 2 ** bit_depth\nprint(levels)", "options": [{"text": "Outputs 32; illustrates that bit depth doubles linearly with the bit count.", "isCorrect": false, "rationale": "2 raised to the 16th power is not 32 (2 * 16). Each additional bit doubles the number of levels; growth is exponential."}, {"text": "Outputs 65536; illustrates that bit depth determines how many distinct amplitude levels can be recorded per sample.", "isCorrect": true, "rationale": "2^16 = 65,536. The text states CD audio's 16-bit depth yields 2^16 = 65,536 possible amplitude levels per sample. Higher bit depth reduces quantization error."}, {"text": "Outputs 65536; illustrates the maximum sampling rate that human hearing can detect.", "isCorrect": false, "rationale": "Bit depth (amplitude levels) and sampling rate (samples per second) are different dimensions of digitization. 65,536 is the level count, not a frequency."}, {"text": "Outputs 16; illustrates that a single byte stores 16 amplitude levels.", "isCorrect": false, "rationale": "The print statement outputs 2 ** 16, which is 65536, not 16. Also, a byte has 256 amplitude levels, not 16."}], "id": "q05"}, {"question": "A 24-megapixel camera stores each pixel as 24 bits (8 bits each for red, green, and blue). What is the approximate raw (uncompressed) file size of one photograph, before any compression?", "options": [{"text": "About 24 MB.", "isCorrect": false, "rationale": "24 MB conflates megapixels with megabytes. Each pixel is 24 bits = 3 bytes, so 24 million pixels x 3 bytes = 72 MB, not 24."}, {"text": "About 72 MB.", "isCorrect": true, "rationale": "The text computes 24,000,000 pixels x 24 bits/pixel = 576,000,000 bits, approximately 72 MB. Lossy JPEG then reduces this to 5-12 MB."}, {"text": "About 576 MB.", "isCorrect": false, "rationale": "576 million is the bit count, not the byte count. Dividing by 8 (8 bits per byte) gives 72 million bytes = 72 MB."}, {"text": "About 5-12 MB.", "isCorrect": false, "rationale": "5-12 MB is the post-compression JPEG size. The question asks about the raw, uncompressed size, which is much larger."}], "id": "q06"}, {"question": "Claude Shannon's 1948 paper 'A Mathematical Theory of Communication' is widely regarded as the founding document of information theory. Which of Shannon's central insights BEST captures why the bit is the natural unit of information?", "options": [{"text": "The amount of information in a message is determined by its emotional or semantic content, so the bit measures meaning per message.", "isCorrect": false, "rationale": "Shannon explicitly excluded semantic meaning from his theory. He wrote that 'these semantic aspects of communication are irrelevant to the engineering problem.'"}, {"text": "Shannon proved that no message can be compressed below 1 bit, so the bit is the universal storage minimum.", "isCorrect": false, "rationale": "Shannon's compression bound is the entropy of the source - which can be much greater than 1 bit per message. The 1-bit-minimum claim misstates the result."}, {"text": "The information content of a message is precisely the number of binary choices required to specify it uniquely; every selection from a set of possible messages reduces uncertainty by some number of bits.", "isCorrect": true, "rationale": "Shannon's key insight, quoted in the section, is that information equals uncertainty resolved, measured by the number of binary choices to specify a message. Selecting from 2^n alternatives requires n bits."}, {"text": "Shannon proved that analog signals carry more information than digital signals, justifying the choice of bits as a lower bound.", "isCorrect": false, "rationale": "Shannon's framework treats both analog and digital signals as conveying information; he did not claim analog carries 'more' information. The bit is the universal unit, not an analog-vs-digital comparison."}], "id": "q07"}, {"question": "An engineer doubles the sampling rate of a recording from 44.1 kHz to 88.2 kHz, keeping bit depth and channel count unchanged. Which statement BEST describes the perceptual and storage consequences for human listeners?", "options": [{"text": "Both perceived quality and file size double, because sampling rate is the dominant factor in audio fidelity.", "isCorrect": false, "rationale": "While file size approximately doubles, perceived quality does not. Human hearing tops out around 20 kHz, so 44.1 kHz already captures all audible frequencies (Nyquist).  Doubling adds inaudible content."}, {"text": "File size doubles, but perceived quality is essentially unchanged because 44.1 kHz already exceeds the Nyquist requirement for human hearing.", "isCorrect": true, "rationale": "The CD's 44.1 kHz already comfortably exceeds the Nyquist minimum of 40 kHz for 20 kHz upper hearing. Sampling above the Nyquist limit captures inaudible frequencies; perceived quality is roughly the same while storage doubles."}, {"text": "File size halves and perceived quality halves, because higher sampling rates reduce signal density.", "isCorrect": false, "rationale": "Higher sampling rate means more samples per second, so file size grows, not shrinks. Quality also does not 'halve' in any direct sense."}, {"text": "File size doubles, and perceived quality doubles only for listeners under age 20.", "isCorrect": false, "rationale": "While young listeners hear slightly higher frequencies than older listeners, neither group can perceive the additional content above 20 kHz that a 88.2 kHz rate would capture. Quality does not 'double.'"}], "id": "q08"}, {"question": "The section distinguishes between SI prefixes and binary-aligned prefixes. Which of the following correctly characterizes the difference?", "options": [{"text": "SI prefixes (kilo = 10^3, mega = 10^6) and binary prefixes (kibi = 2^10 = 1024, mebi = 2^20) differ slightly; context determines which is used, and 1 KB by SI is 1000 bytes while 1 KiB is 1024 bytes.", "isCorrect": true, "rationale": "The section explicitly notes computer scientists often use SI prefixes (10^3, 10^6) while hardware engineers use binary-aligned prefixes (1024, 2^20). The two systems give slightly different byte counts."}, {"text": "SI prefixes are always used for storage, and binary prefixes are always used for memory.", "isCorrect": false, "rationale": "The text states that 'context determines which convention applies'; there is no rigid storage-vs-memory rule. Both can use either convention depending on the manufacturer or document."}, {"text": "SI prefixes use base 16, while binary prefixes use base 2.", "isCorrect": false, "rationale": "SI prefixes use base 10 (kilo = 10^3), not base 16. Binary-aligned prefixes use powers of 2."}, {"text": "Binary prefixes are larger than SI prefixes by a factor of exactly 100.", "isCorrect": false, "rationale": "The factor is approximately 1.024 for kilo (1024 vs 1000), not 100. Higher prefixes diverge more, but never by a factor of 100."}], "id": "q09"}, {"question": "A graphic designer asks: 'I have a 1-second uncompressed audio clip at 8 kHz, 8 bits/sample, mono. How does its data rate compare to a 1-second uncompressed CD-quality clip at 44.1 kHz, 16 bits/sample, stereo?'", "options": [{"text": "Both clips have the same data rate because both last 1 second.", "isCorrect": false, "rationale": "Data rate (bits/sec) does not depend on duration; it depends on the samples-per-second, bit depth, and channel count. The two clips have very different rates."}, {"text": "The 8 kHz mono clip is roughly 22 times smaller. CD: 44,100 x 16 x 2 = 1,411,200 bits/s. Low-quality: 8,000 x 8 x 1 = 64,000 bits/s. The ratio is approximately 22:1.", "isCorrect": true, "rationale": "Apply the formula sampling_rate x bit_depth x channels in both cases. CD = 1.41 Mb/s, low-quality = 64 kb/s; the ratio 1411200 / 64000 is approximately 22."}, {"text": "The CD clip is 44.1/8 = 5.5 times smaller, since CD has the higher sampling rate.", "isCorrect": false, "rationale": "Higher sampling rate means more bits, so the CD clip is larger, not smaller. Also, comparing sampling rates alone ignores bit depth and channel count."}, {"text": "The low-quality clip is the same size as the CD clip; sampling rate and bit depth cancel.", "isCorrect": false, "rationale": "The two factors do not cancel. They multiply: a higher sampling rate AND higher bit depth AND more channels all increase the data rate."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
