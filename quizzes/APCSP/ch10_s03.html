        <div class="subtitle">AP Computer Science Principles &mdash; The Innovation Reading Passage</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the recommended approach for the first 15 seconds of an Innovation Reading Passage?", "options": [{"text": "Read the entire passage word-by-word at full speed.", "isCorrect": false, "rationale": "This is exactly what the section warns against. Word-by-word reading at full speed is too slow to complete the five questions within the time budget."}, {"text": "Skim for the named innovation — read the title and the first and last sentences only.", "isCorrect": true, "rationale": "Per the five-step strategy, the first 15 seconds is for skimming: identify the innovation's name and one-sentence purpose. Detailed reading happens only after this orientation."}, {"text": "Skip the passage entirely and answer all five questions from general knowledge.", "isCorrect": false, "rationale": "Innovation Reading Passages explicitly require traceable evidence to a specific sentence. General-knowledge answers about the innovation are penalized when they contradict the passage."}, {"text": "Read each question first, then look for keywords in the passage.", "isCorrect": false, "rationale": "This is a reverse-search strategy that works for some passage formats but fails on AP CSP because the questions often paraphrase the passage rather than quote it. Skim-first lets you map the passage's structure before searching."}]}, {"question": "An AP exam Innovation Reading Passage describes Near Field Communication. A question asks: \"Which of the following is NOT supported by the passage?\" with these choices:\n\n(A) NFC operates at a frequency of 13.56 MHz\n(B) Contactless payment can use a credit card, smartphone, or smartwatch\n(C) The token generated by the NFC chip is specific to one transaction\n(D) Contactless payment requires the consumer to enter a PIN for every transaction\n\nThe passage states all of (A), (B), and (C). Which option is the correct answer, and why?", "options": [{"text": "(A) — because frequency is a technical detail, not a fact about contactless payment.", "isCorrect": false, "rationale": "(A) IS supported — the passage explicitly states 13.56 MHz. The question asks for the option NOT supported."}, {"text": "(D) — because the passage does not mention PIN entry for every transaction.", "isCorrect": true, "rationale": "(D) is the correct answer. The passage describes tokenization but is silent on PIN requirements. \"NOT supported\" means the passage does not say it — even if the statement happens to be true in some real-world contexts. A statement can be true in the real world but wrong as an answer if the passage does not say it."}, {"text": "(D) — because PINs are only used for credit card transactions, not contactless.", "isCorrect": false, "rationale": "The reasoning is wrong. The correct reasoning for (D) is that the passage is silent on PINs, not that the statement is false in the real world."}, {"text": "(B) — because smartwatches do not use NFC.", "isCorrect": false, "rationale": "Smartwatches DO use NFC, and the passage explicitly mentions them. (B) is supported."}]}, {"question": "An AP exam passage about Neural Machine Translation explains how the system works. A mechanism question asks: \"Which best describes the mechanism by which NMT translates text?\" Which question type is this?", "options": [{"text": "An impact question — what NMT enables.", "isCorrect": false, "rationale": "Impact questions ask about what the innovation enables (positive impact) or threatens (negative impact). This question asks HOW the system works, not what it enables."}, {"text": "A mechanism question — HOW the innovation works.", "isCorrect": true, "rationale": "Mechanism questions are the most common Innovation Reading Passage question type. They ask HOW the innovation works — which sentence in the passage answers \"by what means does this happen?\" The correct answer is always traceable to a specific mechanism sentence."}, {"text": "An EXCEPT question — which option is NOT supported.", "isCorrect": false, "rationale": "EXCEPT questions explicitly use \"all of the following EXCEPT\" or \"NOT supported by the passage.\" This question asks for the best description, not for the unsupported option."}, {"text": "A passage-verification question — does the claim match the text?", "isCorrect": false, "rationale": "Verification questions often start with \"according to the passage.\" While related, this question is more specifically about the mechanism, which is its own category."}]}, {"question": "Per the section's five-step strategy, what should you do once you have read the passage and reached question 1?", "options": [{"text": "Re-read the passage from the beginning.", "isCorrect": false, "rationale": "Re-reading wastes time. The skim-first step has already given you orientation; you should now use the marked mechanism and impact sentences as anchors."}, {"text": "Use the marked mechanism and impact sentences as anchors and verify each answer choice against them.", "isCorrect": true, "rationale": "Steps 2 and 3 of the strategy mark the mechanism sentence and the positive/negative impact sentences. These anchors let you trace each answer choice to a specific sentence in well under three minutes per passage."}, {"text": "Answer from general knowledge of the innovation, regardless of the passage.", "isCorrect": false, "rationale": "Section 10.3 explicitly warns: a statement can be true in the real world but wrong as an answer if the passage does not say it. General knowledge does not count for \"according to the passage\" questions."}, {"text": "Skip questions you find difficult and return to them at the end.", "isCorrect": false, "rationale": "While time-discipline is part of the strategy, the section recommends working through the passage's questions in order using the anchors, since the questions often build on each other's reading."}]}, {"question": "A passage claims that GPS receivers compute distance to a satellite by multiplying signal travel time by the speed of light. A question asks: \"According to the passage, what does a GPS receiver use to compute its distance to a satellite?\" Which option is correct?", "options": [{"text": "The satellite's orbital altitude and the receiver's stored maps.", "isCorrect": false, "rationale": "The passage does not say receivers use orbital altitude to compute distance. While altitude is mentioned (20,200 km), it is descriptive, not part of the distance calculation."}, {"text": "The number of satellites currently visible above the horizon.", "isCorrect": false, "rationale": "The passage mentions \"at least four satellites\" for trilateration, but the count is not how distance to a single satellite is computed."}, {"text": "The signal's travel time multiplied by the speed of light.", "isCorrect": true, "rationale": "Direct quote anchor. The passage explicitly states that the receiver \"computes the distance to that satellite by multiplying the signal's travel time by the speed of light.\" Mechanism question, traceable to a single sentence."}, {"text": "The receiver's last known position from a previous calculation.", "isCorrect": false, "rationale": "The passage does not mention previous-position dependence. This is a plausible distractor invoking general knowledge of dead-reckoning systems, but it is not in the passage."}]}, {"question": "What is the key distinguishing feature of an EXCEPT-style or NOT-supported question on an Innovation Reading Passage?", "options": [{"text": "The correct answer is the option that contradicts general scientific knowledge.", "isCorrect": false, "rationale": "Wrong rule. The correct answer is the one the PASSAGE does not support, regardless of whether it is true in the real world."}, {"text": "The correct answer is the option the passage does not support — even if it happens to be true in the real world.", "isCorrect": true, "rationale": "EXCEPT and NOT-supported questions test passage-fidelity, not real-world truth. Three of the four options ARE supported by the passage; the correct answer is the one for which the passage is silent. A real-world-true statement that the passage does not state is still the right pick."}, {"text": "The correct answer is the option that the passage explicitly states.", "isCorrect": false, "rationale": "Backwards. EXCEPT/NOT questions ask which option is NOT in the passage; the correct answer is the one the passage does NOT state."}, {"text": "The correct answer is whichever option appears longest.", "isCorrect": false, "rationale": "Length is not a reliable signal. AP exam writers vary option lengths deliberately to defeat length-based guessing strategies."}]}, {"question": "How long, total, should it take to complete the five questions of an Innovation Reading Passage with the strategy automated?", "options": [{"text": "Approximately five minutes per passage.", "isCorrect": false, "rationale": "Five minutes is too long. The exam's overall time budget would not accommodate five-minute passage blocks given the other question types."}, {"text": "Well under three minutes per passage.", "isCorrect": true, "rationale": "Per the section: with the strategy automated, the full five-question passage block should be completed in well under three minutes. The 15-second skim and the marked anchors keep each question under 30 seconds."}, {"text": "One minute per passage.", "isCorrect": false, "rationale": "One minute is too short for the skim, mark, and five-question pass. Three minutes total is the target."}, {"text": "Ten minutes per passage.", "isCorrect": false, "rationale": "Ten minutes is more than three times the recommended budget and would consume nearly all of Section I time on a single passage."}]}, {"question": "The three impact dimensions to identify in an Innovation Reading Passage are:", "options": [{"text": "Cost, performance, and aesthetics.", "isCorrect": false, "rationale": "Cost and performance are too narrow; aesthetics is not a typical AP exam concern."}, {"text": "Mechanism, benefit, and limitation/risk.", "isCorrect": true, "rationale": "Per the passage's typical structure: the mechanism (HOW it works), the primary benefit or new capability (positive impact), and the potential harms, risks, or limitations (negative impact). Each is usually answered by a specific sentence in the passage."}, {"text": "Past, present, and future use cases.", "isCorrect": false, "rationale": "Innovation Reading Passages may include some history, but the structured questions focus on mechanism + benefit + risk, not temporal use cases."}, {"text": "Inventor, year, and country of origin.", "isCorrect": false, "rationale": "These are background facts that may appear in the passage but are rarely the subject of the five questions."}]}, {"question": "A question reads: \"According to the passage, GPS satellites broadcast signals containing their precise location and transmission time.\" The student remembers that GPS uses some kind of timing system, but did not check the passage. Why is this risky?", "options": [{"text": "Because GPS satellites do not actually broadcast signals.", "isCorrect": false, "rationale": "GPS satellites DO broadcast signals — the statement is real-world true."}, {"text": "Because the question requires a verification against the specific passage text, not memory.", "isCorrect": true, "rationale": "Step 5 of the strategy: verify specific claims against the passage. \"According to the passage\" means every correct answer must be traceable to a specific sentence. Memory or general knowledge is not enough — students lose points by trusting memory of a real-world fact when the passage uses different wording or omits the claim."}, {"text": "Because the passage cannot be re-read once a question is reached.", "isCorrect": false, "rationale": "The passage is available throughout — students can re-read any sentence at any time. The risk is failing to verify, not inability."}, {"text": "Because GPS facts are not on the AP exam.", "isCorrect": false, "rationale": "GPS appears as an example passage in the section. Innovation Reading Passages cover real innovations including GPS."}]}, {"question": "Which of the following best describes the structure of an AP CSP Innovation Reading Passage?", "options": [{"text": "A 100–200 word passage about a computing innovation, followed by five single-select multiple-choice questions, appearing once in Section I.", "isCorrect": true, "rationale": "Direct from the section's definition. The passage is approximately 100–200 words, the questions are five in number, all single-select MC, and the format appears once in Section I of the exam."}, {"text": "A 500-word essay followed by ten free-response questions.", "isCorrect": false, "rationale": "Innovation Reading Passages are short (~100–200 words) and accompanied by multiple-choice, not free-response, questions."}, {"text": "A short paragraph followed by two multi-select questions.", "isCorrect": false, "rationale": "The questions on Innovation passages are single-select, not multi-select. Multi-select is a separate question type covered in Section 10.4."}, {"text": "A diagram with no accompanying text, followed by five fill-in-the-blank questions.", "isCorrect": false, "rationale": "The format is text-based prose, not diagrams, and the questions are multiple-choice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
