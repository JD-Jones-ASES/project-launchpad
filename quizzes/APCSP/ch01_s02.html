<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Number Systems and Conversions</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Convert the binary number 1011 to decimal. Show how positional weights produce the result.", "options": [{"text": "1011_2 = 1*2^3 + 0*2^2 + 1*2^1 + 1*2^0 = 8 + 0 + 2 + 1 = 11_10.", "isCorrect": true, "rationale": "This is the worked example from the section. Each binary position corresponds to a power of 2, weighted right-to-left, and summed."}, {"text": "1011_2 = 1*4 + 0*3 + 1*2 + 1*1 = 7_10.", "isCorrect": false, "rationale": "Place values in binary are powers of 2 (1, 2, 4, 8), not consecutive integers (1, 2, 3, 4). The leftmost 1 is worth 8, not 4."}, {"text": "1011_2 = 1011_10, since binary digits are decimal digits.", "isCorrect": false, "rationale": "Binary and decimal share the symbols 0 and 1, but their values come from different bases. 1011_2 = 11_10, not 1011_10."}, {"text": "1011_2 = 1*16 + 0*8 + 1*4 + 1*1 = 21_10.", "isCorrect": false, "rationale": "Powers of 2 in a 4-bit number are 8, 4, 2, 1 (right-to-left). Using 16, 8, 4, 1 inserts a wrong place value."}], "id": "q01"}, {"question": "Convert decimal 200 to binary using repeated division by 2.", "options": [{"text": "11001000_2 (200 = 128 + 64 + 8 = 2^7 + 2^6 + 2^3).", "isCorrect": true, "rationale": "200 = 128 + 64 + 8 = 2^7 + 2^6 + 2^3, giving the bit pattern 1100 1000. Verify: 128 + 64 + 8 = 200."}, {"text": "11001100_2.", "isCorrect": false, "rationale": "11001100 = 128 + 64 + 8 + 4 = 204, which is not 200. Place value error."}, {"text": "10011000_2.", "isCorrect": false, "rationale": "10011000 = 128 + 16 + 8 = 152, which is not 200. Wrong bit positions set."}, {"text": "10101010_2.", "isCorrect": false, "rationale": "10101010 = 128 + 32 + 8 + 2 = 170, not 200. Different number entirely."}], "id": "q02"}, {"question": "Convert binary 1110 1010 1111 0000 to hexadecimal by grouping into 4-bit nibbles.", "options": [{"text": "EAF0_16 (1110 -> E, 1010 -> A, 1111 -> F, 0000 -> 0).", "isCorrect": true, "rationale": "Each 4-bit nibble maps to one hex digit: 1110 = 14 = E, 1010 = 10 = A, 1111 = 15 = F, 0000 = 0. Concatenating gives EAF0."}, {"text": "AEF0_16.", "isCorrect": false, "rationale": "1110 = E, not A. The order of nibble-to-hex mapping is wrong; 1110 (=14) is E, while A (=10) is 1010."}, {"text": "F0AE_16.", "isCorrect": false, "rationale": "Reverses the order of the hex digits. The leftmost nibble (1110) yields the leftmost hex digit (E), not the rightmost."}, {"text": "EA F0_16 has 4 distinct hex digits but is wrong because 4 bits cannot encode 16 hex digits.", "isCorrect": false, "rationale": "4 bits CAN encode exactly 16 hex digits (2^4 = 16). This option misstates the relationship between binary nibbles and hex digits."}], "id": "q03"}, {"question": "What does the following Python code segment output, and why?\n\nn = 42\nprint(bin(n))\nprint(hex(n))", "options": [{"text": "42 and 42, because Python's bin() and hex() return the integer value, not a string representation.", "isCorrect": false, "rationale": "Python's bin() and hex() return strings with prefixes (0b for binary, 0x for hex), not integers. bin(42) is the string '0b101010'."}, {"text": "0b101010 and 0x2a; bin() returns binary with the 0b prefix and hex() returns hexadecimal with the 0x prefix.", "isCorrect": true, "rationale": "From the section's code example: bin(42) outputs the string '0b101010' and hex(42) outputs '0x2a'. Both prefixes are part of Python's literal syntax for these number bases."}, {"text": "0b1010 and 0x2A; bin() and hex() always uppercase letters.", "isCorrect": false, "rationale": "First, 42 in binary is 101010 (six bits), not 1010 (four bits, which is 10). Second, Python's hex() returns lowercase letters."}, {"text": "0b00101010 and 0x000000002a; both functions pad to 64 bits.", "isCorrect": false, "rationale": "Python's bin() and hex() do not zero-pad. They return the minimum-width representation prefixed with 0b or 0x."}], "id": "q04"}, {"question": "The CSS color code for orange is #FF6600 (24-bit RGB hex). What are the decimal values of the red, green, and blue channels?", "options": [{"text": "Red = 255, Green = 102, Blue = 0. Each pair of hex digits is 8 bits = 1 byte; FF=255, 66=102, 00=0.", "isCorrect": true, "rationale": "FF in hex = 15*16 + 15 = 255; 66 = 6*16 + 6 = 102; 00 = 0. Each channel is one byte (two hex digits)."}, {"text": "Red = 255, Green = 66, Blue = 0; the hex values are already in decimal-readable form.", "isCorrect": false, "rationale": "66 in hex is not 66 in decimal; 66 hex = 6*16 + 6 = 102 decimal. Hex digits cannot be read as decimal directly."}, {"text": "Red = 16, Green = 6, Blue = 0; each hex digit encodes one decimal digit.", "isCorrect": false, "rationale": "Each pair of hex digits encodes one byte (0-255), not one decimal digit. FF is 255, not 16."}, {"text": "Red = 12, Green = 9, Blue = 0; hex digits are remapped to consecutive integers.", "isCorrect": false, "rationale": "Hex digits map directly to integer values 0-15, then combine via place value. 'FF' is 15*16 + 15 = 255, not 12."}], "id": "q05"}, {"question": "Why is hexadecimal especially useful as a shorthand for binary?", "options": [{"text": "Because 16 is 2^4, so each hex digit encodes exactly four bits (one nibble), making conversion a lookup operation rather than arithmetic.", "isCorrect": true, "rationale": "The text emphasizes that each hex digit maps to exactly four bits (1 nibble = 4 bits, since 2^4 = 16). This makes binary-to-hex a simple grouping and table lookup."}, {"text": "Because hexadecimal can represent decimal numbers more compactly than decimal can.", "isCorrect": false, "rationale": "Hexadecimal is more compact than binary for the same VALUE, but compared to decimal the difference is small. Hex's main usefulness is its 1:1 mapping with binary nibbles."}, {"text": "Because hexadecimal uses only 8 distinct symbols, fewer than decimal's 10.", "isCorrect": false, "rationale": "Hexadecimal uses 16 distinct symbols (0-9 and A-F), more than decimal's 10. The advantage is the 4-bit grouping, not the symbol count."}, {"text": "Because hexadecimal arithmetic is easier than binary arithmetic for hardware.", "isCorrect": false, "rationale": "Hardware does NOT do hexadecimal arithmetic - it does binary. Hex is a human-readable shorthand; arithmetic happens in binary."}], "id": "q06"}, {"question": "What is the range of values representable by an 8-bit unsigned integer and an 8-bit signed (two's complement) integer?", "options": [{"text": "Unsigned: 0 to 255. Signed: -128 to +127.", "isCorrect": true, "rationale": "The text states an 8-bit unsigned integer has range 0 to 2^8 - 1 = 255, and an 8-bit signed two's complement has range -2^7 to 2^7 - 1 = -128 to +127."}, {"text": "Unsigned: 1 to 256. Signed: -127 to +128.", "isCorrect": false, "rationale": "Off by one. Unsigned starts at 0 (not 1) and tops at 255 (not 256). Signed in two's complement is asymmetric: -128 to +127, not -127 to +128."}, {"text": "Unsigned: 0 to 127. Signed: -128 to +128.", "isCorrect": false, "rationale": "8 bits unsigned reach 255 (not 127). Signed two's complement is asymmetric: -128 to +127, never +128."}, {"text": "Unsigned: -255 to +255. Signed: -255 to +255.", "isCorrect": false, "rationale": "Unsigned by definition has no negative values. Both ranges are wrong; 8 bits give 256 distinct states, not 511."}], "id": "q07"}, {"question": "In an 8-bit two's complement system, the bit pattern 1111 1111 represents which decimal value, and how is it computed?", "options": [{"text": "+255, because all eight bits are 1.", "isCorrect": false, "rationale": "+255 is the unsigned interpretation. Two's complement uses the leftmost bit as the sign indicator with weight -2^(n-1)."}, {"text": "-1, because the MSB contributes -128 and the remaining seven bits sum to 127, giving -128 + 127 = -1.", "isCorrect": true, "rationale": "Per the text: in 8-bit two's complement, the leftmost bit has weight -2^7 = -128. 1111 1111 = -128 + 64 + 32 + 16 + 8 + 4 + 2 + 1 = -128 + 127 = -1."}, {"text": "-128, because the MSB has weight -128.", "isCorrect": false, "rationale": "The MSB does have weight -128, but the lower 7 bits also contribute. Their values sum to 127, giving an overall total of -1, not -128."}, {"text": "0, because positive and negative bits cancel.", "isCorrect": false, "rationale": "Two's complement does not work by cancellation of positive and negative bits. Each position has a specific weight and the total is the sum."}], "id": "q08"}, {"question": "The AP Pseudocode reference does not define a syntax for binary or hex literals. According to the section, what does the AP exam typically do when a problem requires a binary number?", "options": [{"text": "It writes the binary number as a plain bit string with an explicit label (e.g., 'the binary string 1010') and may also give the decimal equivalent.", "isCorrect": true, "rationale": "The text explicitly states the AP exam writes binary numbers as labeled bit strings (e.g., 'the binary string 1010'). The exam will not require you to write Python conversion code."}, {"text": "It uses Python's 0b syntax in pseudocode, since the exam permits Python.", "isCorrect": false, "rationale": "The pseudocode reference deliberately omits 0b and 0x. Pseudocode is a separate notation from Python, even though both languages may appear on the exam."}, {"text": "It always converts the binary to hexadecimal first.", "isCorrect": false, "rationale": "The AP exam does not standardize on hexadecimal. Binary is shown as a labeled bit string, and decimal equivalents may be supplied directly."}, {"text": "It reuses the special # symbol from CSS color codes.", "isCorrect": false, "rationale": "The # prefix is a CSS convention, not an AP Pseudocode notation. AP Pseudocode has no built-in literal syntax for binary or hex."}], "id": "q09"}, {"question": "A student writes Python: int('1A', 16). What value does this expression produce, and why?", "options": [{"text": "26. The function int(s, base) interprets the string s as a number in the given base, so '1A' in base 16 = 1*16 + 10 = 26.", "isCorrect": true, "rationale": "int('1A', 16) tells Python to parse '1A' as a hexadecimal string. 1A_16 = 1*16 + 10*1 = 26, since A is 10 in hex."}, {"text": "1, because Python ignores letters in numeric strings.", "isCorrect": false, "rationale": "Python does NOT ignore letters; in hex, A-F are valid digits with values 10-15. int('1A', 16) parses both characters."}, {"text": "16, because '1A' in any base equals 16.", "isCorrect": false, "rationale": "The numeric value depends on the base. '1A' in base 16 is 26; in base 10 it would not parse (A is not a decimal digit)."}, {"text": "Raises a ValueError, because A is not a valid digit.", "isCorrect": false, "rationale": "A IS a valid hexadecimal digit. int('1A', 16) parses successfully. Without specifying base 16, Python would raise an error."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
