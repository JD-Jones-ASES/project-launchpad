    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Algorithm Tracing</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a trace table?", "options": [{"text": "A table of all the tests a program must pass before being shipped.", "isCorrect": false, "rationale": "That is a test plan or test suite. A trace table is a hand-drawn record used during analysis, not a list of tests."}, {"text": "A tabular record of an algorithm's execution, with one row per step or iteration and columns for each variable plus output.", "isCorrect": true, "rationale": "Trace tables make algorithm behavior fully visible. They expose off-by-one errors, logic bugs, and verify expected output by simulating the computer's execution by hand."}, {"text": "A table of standard library functions provided by Python.", "isCorrect": false, "rationale": "That would be the Python documentation or a function reference, not a tool for analyzing a specific algorithm."}, {"text": "A list of files included by an import statement.", "isCorrect": false, "rationale": "That is a module manifest or dependency graph. A trace table is specific to analyzing how variables change during execution."}]}, {"question": "Trace this loop and determine the final value of total.\n\nN = 4\ntotal = 0\nfor i in range(1, N + 1):\n    total = total + i\nprint(total)", "options": [{"text": "6", "isCorrect": false, "rationale": "6 = 1+2+3 — that would be range(1, 4). Here range(1, N+1) = range(1, 5), so i takes values 1, 2, 3, 4."}, {"text": "10", "isCorrect": true, "rationale": "i takes 1, 2, 3, 4 (four iterations). After each iteration total becomes 1, 3, 6, 10. Final value: 10 (= 1+2+3+4). The +1 in N+1 ensures N itself is included."}, {"text": "15", "isCorrect": false, "rationale": "15 = 1+2+3+4+5 — that would require N = 5, not 4. With N = 4, the loop stops at i = 4."}, {"text": "0", "isCorrect": false, "rationale": "total starts at 0 but is updated inside the loop body. After four iterations it holds 10."}]}, {"question": "What is the off-by-one bug in the following code, and what value does it print instead of the intended sum 1+2+3+4+5?\n\nN = 5\ntotal = 0\nfor i in range(N):\n    total = total + i\nprint(total)", "options": [{"text": "There is no bug — it prints 15.", "isCorrect": false, "rationale": "range(N) starts at 0, not at 1. The loop sums 0+1+2+3+4 = 10, missing the value 5 entirely."}, {"text": "range(N) yields 0, 1, 2, 3, 4 — the loop sums those, printing 10 instead of 15. Fix: use range(1, N+1).", "isCorrect": true, "rationale": "range(N) starts at 0 and stops at N-1, so it never includes N. The intended sum 1+2+3+4+5 = 15 becomes 0+1+2+3+4 = 10. The fix range(1, N+1) starts at 1 and includes N."}, {"text": "The loop runs an extra time and prints 21.", "isCorrect": false, "rationale": "21 = 1+2+3+4+5+6 (six terms). range(N) = range(5) yields five values starting at 0; the loop runs five times, not six."}, {"text": "The loop produces an infinite loop.", "isCorrect": false, "rationale": "for ... range loops always terminate after the predetermined count. There is no infinite loop here — only a wrong start value."}]}, {"question": "Trace this code carefully and determine the final values of x and y, plus what is printed.\n\nx = 10\ny = 0\nwhile x > 0:\n    y = y + x\n    x = x - 3\nprint(y)", "options": [{"text": "x = 0, y = 22, prints 22", "isCorrect": true, "rationale": "Iter 1: y = 0+10 = 10, x = 10-3 = 7. Iter 2: y = 10+7 = 17, x = 7-3 = 4. Iter 3: y = 17+4 = 21, x = 4-3 = 1. Iter 4: y = 21+1 = 22, x = 1-3 = -2. Test -2 > 0 is false; loop exits. y = 22 is printed."}, {"text": "x = 0, y = 31, prints 31", "isCorrect": false, "rationale": "31 would require summing 10+7+4+1-2, but the loop exits before x = -2 enters the body. After the body finishes with x = -2, the test fails before another iteration runs."}, {"text": "x = 1, y = 21, prints 21", "isCorrect": false, "rationale": "21 = 10+7+4 (three iterations). The fourth iteration with x = 1 still satisfies x > 0, so the body runs once more and adds 1, giving y = 22."}, {"text": "Infinite loop — x never reaches 0 exactly.", "isCorrect": false, "rationale": "The condition x > 0 fails as soon as x becomes 0 or negative. After the fourth iteration x = -2, which fails the test cleanly. The loop terminates."}]}, {"question": "A logic error in a loop is best characterized by which of the following?", "options": [{"text": "The program crashes with a syntax error.", "isCorrect": false, "rationale": "Syntax errors prevent the program from running at all. Logic errors let the program run successfully but produce incorrect output."}, {"text": "The program runs forever and never produces output.", "isCorrect": false, "rationale": "That is an infinite loop. A logic error is more subtle — the program does terminate and produces output, but the output is wrong."}, {"text": "The loop completes without crashing and produces a plausible-looking but incorrect result.", "isCorrect": true, "rationale": "Logic errors are dangerous precisely because the output looks reasonable. The loop runs the right number of times but performs the wrong operation (e.g., * instead of +) or initializes a variable to the wrong value (1 instead of 0 for a sum)."}, {"text": "The loop produces a TypeError.", "isCorrect": false, "rationale": "A TypeError is a runtime error, not a logic error. Logic errors execute cleanly but compute the wrong thing."}]}, {"question": "Identify the logic error in this code, which is intended to compute the sum 1+2+3+4 = 10.\n\nN = 4\ntotal = 1\nfor i in range(1, N + 1):\n    total = total * i\nprint(total)", "options": [{"text": "There is no error — it prints 10.", "isCorrect": false, "rationale": "It prints 24 (the factorial 4!), not 10. Two bugs: total is initialized to 1 (multiplicative identity) instead of 0, and the body multiplies instead of adding."}, {"text": "Two errors: total = 1 should be total = 0, and total = total * i should be total = total + i. The loop currently computes 4! = 24.", "isCorrect": true, "rationale": "Trace: total starts at 1. Iter 1: 1*1 = 1. Iter 2: 1*2 = 2. Iter 3: 2*3 = 6. Iter 4: 6*4 = 24. The output 24 = 4! is plausible (a counting number), which is exactly why logic errors are dangerous — they look reasonable."}, {"text": "The range is off — it should be range(1, N).", "isCorrect": false, "rationale": "range(1, N+1) is correct for processing i = 1 through N. The bug is the initialization (1 vs 0) and the operator (* vs +), not the range."}, {"text": "The loop creates an infinite loop.", "isCorrect": false, "rationale": "range(1, N+1) is a definite loop that always terminates after N iterations. There is no infinite loop."}]}, {"question": "Why is tracing the BEST tool for distinguishing a correct algorithm from one with a logic error?", "options": [{"text": "Tracing makes the program run faster.", "isCorrect": false, "rationale": "Tracing is a manual analysis technique; it does not affect runtime. It helps the programmer (or student) verify correctness, not the program itself."}, {"text": "Tracing reveals the value of every variable at every iteration, so a logic error shows up as a mismatch between expected and actual values in the table.", "isCorrect": true, "rationale": "Logic errors hide because the output is plausible. A trace table makes the actual sequence of values visible, and the moment expected and actual diverge, you have located the bug."}, {"text": "Tracing automatically corrects the bug.", "isCorrect": false, "rationale": "Tracing is a diagnostic, not a fix. It reveals where the algorithm departs from the intended behavior; the programmer must then correct the code."}, {"text": "Tracing is required by Python before any program can run.", "isCorrect": false, "rationale": "Python imposes no such requirement. Tracing is a hand technique used by programmers (and AP exam students) to verify correctness."}]}, {"question": "Trace this while loop and determine the final value of result.\n\nx = 1\nresult = 0\nwhile x <= 4:\n    result = result + x\n    x = x + 1\nprint(result)", "options": [{"text": "10", "isCorrect": true, "rationale": "Iter 1: result = 0+1 = 1, x = 2. Iter 2: result = 1+2 = 3, x = 3. Iter 3: result = 3+3 = 6, x = 4. Iter 4: result = 6+4 = 10, x = 5. Test 5 <= 4 is false; loop exits. Final result = 10."}, {"text": "6", "isCorrect": false, "rationale": "6 = 1+2+3 — running three iterations instead of four. The condition x <= 4 includes the value 4, so x takes 1, 2, 3, 4 — four iterations."}, {"text": "15", "isCorrect": false, "rationale": "15 = 1+2+3+4+5 — running one extra iteration. When x = 5, the test 5 <= 4 is false, so the loop exits before adding 5."}, {"text": "11", "isCorrect": false, "rationale": "11 has no simple expression in this trace. The correct sequence of result values is 1, 3, 6, 10."}]}, {"question": "An off-by-one error that runs the loop ONE TOO MANY TIMES is typically caused by:", "options": [{"text": "Using <= when you wanted < in a while condition, or using range(1, N+1) when you wanted range(1, N).", "isCorrect": true, "rationale": "Inclusive endpoints (<=, range with N+1) include the boundary value. If you wanted to stop one short, you have run one too many iterations."}, {"text": "Initializing a variable to 0 instead of 1.", "isCorrect": false, "rationale": "That is an initialization error, not an off-by-one error. Off-by-one specifically refers to running the loop one too few or one too many iterations."}, {"text": "Using a for loop instead of a while loop.", "isCorrect": false, "rationale": "Both for and while loops are vulnerable to off-by-one errors. The construct does not determine whether the bug exists."}, {"text": "Forgetting to import a module.", "isCorrect": false, "rationale": "An import error prevents the program from running. Off-by-one errors are silent: the program runs fine but processes one extra (or one too few) iteration."}]}, {"question": "When you build a trace table for a loop, what should each row record, and how do you know when the loop has exited?", "options": [{"text": "Each row records only the loop variable; you know to stop when you have written N rows.", "isCorrect": false, "rationale": "Trace tables track every variable in the algorithm (loop counter, accumulators, output), not just the loop variable. The exit condition depends on the loop's actual condition, not on a fixed count."}, {"text": "Each row records the values of every variable AFTER one iteration of the loop body, plus any output produced; you stop when the loop's condition first becomes false (Python while) or when the for ... range produces no more values.", "isCorrect": true, "rationale": "A trace table records every variable per row and any output. The stopping rule depends on the loop construct: while exits when the condition is false; for ... range exits when the range is exhausted. Recording the condition's truth value at the start of each iteration confirms why the loop exits when it does."}, {"text": "Each row records only the program output; the loop is finished when the program prints the final value.", "isCorrect": false, "rationale": "Recording only output hides the variable updates that determine when the loop exits. A useful trace table tracks all relevant variables, not just output."}, {"text": "Each row records only what changed in this iteration; you stop after exactly 10 iterations.", "isCorrect": false, "rationale": "While trace tables can highlight changes, they typically record full state for clarity. And there is no fixed iteration count — different loops exit at different times."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
