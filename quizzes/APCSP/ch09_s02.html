    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Code Requirements Checklist</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student's Create PT submission contains a procedure defined as def find_max(data): which initializes best = 0 and returns it without ever referencing the data parameter. Which auto-disqualifying mistake does this trigger?", "options": [{"text": "Auto-disqualifier C — \"no-op parameter\": the parameter exists in the header but is never used inside the procedure body, so a different argument value would not change the result.", "isCorrect": true, "rationale": "The rubric requires that the parameter affect the procedure's output. A parameter received but never referenced fails the \"different argument produces different result\" test. The procedure superficially looks compliant but earns zero on Procedural Abstraction."}, {"text": "Auto-disqualifier A — no parameter — because data is not actually used.", "isCorrect": false, "rationale": "Auto-disqualifier A is for procedures whose header has no parameter at all. This procedure does have a parameter in the header — the issue is that it is unused, which is a distinct failure (Auto-disqualifier C)."}, {"text": "Auto-disqualifier D — collection is not actually a list.", "isCorrect": false, "rationale": "Auto-disqualifier D applies when the program stores data in separate scalar variables instead of a list. This question is about parameter use, not list structure."}, {"text": "No auto-disqualifier triggers because the procedure compiles and returns a value.", "isCorrect": false, "rationale": "Compilation is not the rubric criterion. The College Board reads code for meaningful parameter use; a parameter that does nothing is one of the five named auto-disqualifying patterns."}], "id": "q01"}, {"question": "A student's program stores three grocery items as item1 = \"apples\", item2 = \"bread\", item3 = \"cheese\" and the Written Response calls this \"a list of grocery items.\" Will the College Board reader award the data-abstraction point?", "options": [{"text": "No — the reader scores the submitted code, not the Written Response description. Three separate scalar variables do not constitute a list, so Auto-disqualifier D applies and the Data Abstraction row earns zero.", "isCorrect": true, "rationale": "Section 9.2 explicitly addresses this case: language in the Written Response cannot retroactively turn three variables into a list. The code must contain an actual list (or equivalent collection) for the row to score."}, {"text": "Yes — calling them a list in the Written Response satisfies the data-abstraction requirement.", "isCorrect": false, "rationale": "The rubric scores what the code does, not what the writer claims about it. Words like \"list\" in the Written Response do not change the underlying data structure."}, {"text": "Yes — three or more related variables count as a collection.", "isCorrect": false, "rationale": "A collection in the Create PT rubric means a list, dictionary, set, or equivalent — a single data structure that holds multiple items together. Separate scalar variables share no structural relationship at the language level."}, {"text": "Yes — but only if the variables have similar names like item1, item2, item3.", "isCorrect": false, "rationale": "Naming convention does not create a collection. A real list (study_records = [...]) is one variable holding many items; three separately named scalars are three independent variables."}], "id": "q02"}, {"question": "Which combination of code constructs is required INSIDE the body of the student-developed procedure to satisfy the rubric, not merely somewhere in the program?", "options": [{"text": "Sequencing, selection, and iteration — all three must appear within the procedure body, not scattered elsewhere in main() or other helper functions.", "isCorrect": true, "rationale": "The rubric explicitly requires sequencing + selection + iteration inside the student-developed procedure. Auto-disqualifier B applies when one of the three lives in main() instead of inside the procedure."}, {"text": "Sequencing and recursion — iteration is optional if recursion is present.", "isCorrect": false, "rationale": "The rubric names sequencing, selection, and iteration specifically. Recursion is not a required substitute, and iteration is not optional."}, {"text": "At least one print() call — output is the only required construct inside the procedure.", "isCorrect": false, "rationale": "Output is required somewhere in the program but not inside the procedure body. The procedure-body requirement is for control structures (sequencing, selection, iteration), not output."}, {"text": "A try/except block plus a list comprehension.", "isCorrect": false, "rationale": "Neither try/except nor list comprehensions are required by the rubric. The named requirements are sequencing, selection, and iteration — control structures, not specific Python features."}], "id": "q03"}, {"question": "The Study Streak Tracker capstone passes all nine boxes of the checklist. Which reasoning best explains why the procedure's parameter target_subject satisfies the \"parameter used meaningfully\" requirement?", "options": [{"text": "target_subject is referenced in the selection condition (if subject == target_subject and minutes >= 30), so changing the argument value (e.g., \"math\" vs \"spanish\") produces a different filtered set of qualifying dates and a different streak count.", "isCorrect": true, "rationale": "The rubric tests whether the parameter affects observable output. target_subject directly drives the filter condition, so calling compute_streak with different arguments yields different results — the textbook definition of meaningful parameter use."}, {"text": "Because target_subject appears in the procedure header.", "isCorrect": false, "rationale": "Header presence is necessary but not sufficient. The parameter must also be used in a way that affects the result; otherwise, it is a no-op parameter (Auto-disqualifier C)."}, {"text": "Because it has a descriptive variable name with an underscore.", "isCorrect": false, "rationale": "Variable naming style is irrelevant to the rubric. The criterion is whether the parameter changes the output when called with a different argument."}, {"text": "Because target_subject is reassigned inside the procedure.", "isCorrect": false, "rationale": "Reassignment is not the test. The procedure does not need to modify the parameter; it needs to use the parameter's value to alter behavior. Read-and-compare is sufficient."}], "id": "q04"}, {"question": "Stimulus: A student writes a program where main() contains a for loop that prints values, and the student-developed procedure tally(records, threshold) contains only an if statement. Identify the auto-disqualifier and the fix.", "options": [{"text": "Auto-disqualifier B applies — sequencing and selection are inside the procedure but iteration is not. Fix: move the for loop into the procedure body so all three constructs (sequencing, selection, iteration) appear inside tally().", "isCorrect": true, "rationale": "Auto-disqualifier B targets exactly this pattern: the rubric requires sequencing + selection + iteration to live inside the student-developed procedure. A loop in main() that does the iteration cannot earn the rubric row even though the loop technically exists in the program."}, {"text": "No fix needed — having any loop in main() is enough because the procedure still has selection.", "isCorrect": false, "rationale": "The rubric is explicit: all three constructs inside the procedure body. The split here makes the algorithm row un-scoreable until the loop is moved."}, {"text": "Auto-disqualifier A — no parameter. Fix: rename the procedure.", "isCorrect": false, "rationale": "The procedure does have parameters (records, threshold). The mistake is structural placement of the iteration construct, not a missing parameter."}, {"text": "Auto-disqualifier E — no observable output. Fix: add a print() in main().", "isCorrect": false, "rationale": "The question's stimulus does not say the procedure produces no output. The visible structural problem is iteration outside the procedure body."}], "id": "q05"}, {"question": "Which of the following procedures most clearly satisfies the rubric's \"observable output\" requirement (Auto-disqualifier E avoidance)?", "options": [{"text": "def compute_streak(records, target_subject) returns longest, and the calling code captures and prints the return value: print(compute_streak(study_records, \"math\")).", "isCorrect": true, "rationale": "The procedure returns a value; the calling code uses that return value to produce visible output. This pattern satisfies the rubric — every call either captures the return value (used in further computation or displayed) or directly prints output."}, {"text": "def compute_streak() sets a local variable longest = 5 and returns nothing; the calling code ignores any return.", "isCorrect": false, "rationale": "This is precisely Auto-disqualifier E: the procedure neither affects the program's output nor produces a return value the caller uses. Local variables that vanish at function exit do not count as observable output."}, {"text": "def compute_streak() prints to a log file but never to standard output, and the calling code does not check the file.", "isCorrect": false, "rationale": "Printing to a file the program never reads back is not observable in the demo or to the reader. The video must show output and the calling code typically should display it."}, {"text": "def compute_streak() modifies a global variable and the caller does not reference it.", "isCorrect": false, "rationale": "Side-effect on an unread global is functionally identical to no observable output. The rubric expects a clear data path from procedure result to user-visible output."}], "id": "q06"}, {"question": "Why does the rubric use the phrase \"student-developed\" when describing the required parameterized procedure?", "options": [{"text": "To exclude library-imported procedures and procedures generated by AI tools without student understanding — the procedure must be authored by the student to count as evidence of their algorithmic reasoning.", "isCorrect": true, "rationale": "Section 9.2 explicitly says the rubric uses \"student-developed\" to disqualify imported library functions and AI-generated code the student does not understand. The procedure must demonstrate the student's own algorithmic work."}, {"text": "To require the student to write the procedure in a specific language like Python.", "isCorrect": false, "rationale": "The rubric is language-agnostic. Any language with a procedure construct (def, function, method) satisfies the structural requirement. The \"student-developed\" qualifier is about authorship, not language."}, {"text": "To require the student to be enrolled in AP CSP.", "isCorrect": false, "rationale": "Course enrollment is administrative, not part of the rubric criteria. The qualifier targets which lines of code the student authored, not the student's transcript."}, {"text": "To prevent the student from copying their own previous procedures.", "isCorrect": false, "rationale": "Reusing your own past work is not what the qualifier addresses. The concern is about external sources (libraries, AI generators) producing the procedure."}], "id": "q07"}, {"question": "Stimulus: A student's submitted program has the line study_records = [] in main(), several .append(...) calls populating it, and a for record in records: loop inside the procedure compute_streak(records, target_subject). Which rubric requirement does this code structure satisfy?", "options": [{"text": "It satisfies the \"List used to store multiple related items\" requirement — the list is initialized and assigned values (via append), and it is used (iterated) in the procedure. Both the create-and-assign step and the use step are present.", "isCorrect": true, "rationale": "The rubric for the List requirement asks for a list that is created and used, not just declared empty. study_records = [] plus .append(...) plus iteration inside the procedure satisfies all three actions."}, {"text": "It satisfies the input requirement because append accepts a value.", "isCorrect": false, "rationale": "Input means the program accepts a value from the user (input(), file read, button click). append moves values within the program; it is not user input."}, {"text": "It satisfies the procedure-with-parameter requirement automatically.", "isCorrect": false, "rationale": "That is a separate row scored on its own evidence: header has a parameter, body uses the parameter meaningfully. The list structure shown does not by itself prove parameter use."}, {"text": "It satisfies nothing because empty-bracket initialization does not count.", "isCorrect": false, "rationale": "study_records = [] followed by populating .append(...) calls is precisely the standard pattern. The rubric prohibits unused empty declarations, not empty initialization followed by population."}], "id": "q08"}, {"question": "Which checklist row is most directly tied to the requirement that the procedure be called with at least two different argument values during the video demonstration?", "options": [{"text": "Procedural Abstraction — the rubric requires demonstrating that the same procedure produces different results when called with different arguments, which is what compute_streak(records, \"math\") and compute_streak(records, \"spanish\") prove.", "isCorrect": true, "rationale": "Procedural Abstraction is scored on evidence that the procedure abstracts over its parameters. Two calls with different arguments and different observable outputs is the canonical evidence pattern."}, {"text": "Data Abstraction — because the records list is passed twice.", "isCorrect": false, "rationale": "Data Abstraction concerns the use of a list to manage complexity, scored on how the list structure scales rather than on call-site argument variation."}, {"text": "Sequencing — calls happen in sequence.", "isCorrect": false, "rationale": "Sequencing inside the procedure body is what the rubric wants — distinct ordered steps within a single procedure call. Multiple separate calls are not sequencing."}, {"text": "Errors and Testing — multiple calls test the procedure.", "isCorrect": false, "rationale": "Errors and Testing is a separate Written Response category about debugging real errors. Multiple calls in the demo are evidence of abstraction, not of error testing."}], "id": "q09"}, {"question": "Stimulus: A student looks at their submission and finds that everything passes the checklist EXCEPT that .append() is called inside main() but never called inside the procedure. Will this affect any rubric row?", "options": [{"text": "No — the rubric does not require append to be called inside the procedure. The list must be created and used; main() can populate the list and the procedure can iterate over it. The checklist treats this as compliant.", "isCorrect": true, "rationale": "The List requirement says the list must be created and used. \"Used\" in the procedure means iteration or indexing — not necessarily appending. The Study Streak Tracker uses exactly this pattern: append in main() (and inside log_session) and iterate inside the procedure."}, {"text": "Yes — append must occur inside the procedure or Auto-disqualifier D applies.", "isCorrect": false, "rationale": "Auto-disqualifier D is about not having an actual list — the disqualifier does not require append calls to be inside the procedure specifically."}, {"text": "Yes — sequencing requires modify operations to live inside the procedure.", "isCorrect": false, "rationale": "Sequencing means distinct ordered steps. It is not a requirement that append (or any specific operation) live inside the procedure; the procedure's own internal sequencing is what matters."}, {"text": "Yes — without append in the procedure, the procedure has no observable output.", "isCorrect": false, "rationale": "Observable output means return value or visible print, not append calls. The procedure can satisfy E by returning a value (like longest) that the caller displays."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
