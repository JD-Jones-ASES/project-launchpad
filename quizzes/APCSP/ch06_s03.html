    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Algorithmic Efficiency and Heuristics</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An algorithm checks every pair of elements in a list of n items. Approximately how does its number of operations grow as n grows, and how is that growth class named?", "options": [{"text": "Linearly — O(n).", "isCorrect": false, "rationale": "Linear growth (O(n)) corresponds to looking at each element once. Comparing every pair touches each element about n times."}, {"text": "Logarithmically — O(log n).", "isCorrect": false, "rationale": "Logarithmic growth corresponds to halving the search space each step (e.g., binary search). Pairwise comparison does not halve anything."}, {"text": "Quadratically — O(n^2).", "isCorrect": true, "rationale": "n elements times roughly n possible partners per element = roughly n*n comparisons, which is O(n^2). Doubling n quadruples the work."}, {"text": "Exponentially — O(2^n).", "isCorrect": false, "rationale": "Exponential growth doubles the work for each ADDITIONAL element. Pairwise comparison does not double; it grows polynomially."}]}, {"question": "A task requires 2^40 operations. A computer executes 10^9 operations per second. Approximately how many hours does the task take?", "options": [{"text": "About 0.3 hours (under 20 minutes).", "isCorrect": true, "rationale": "2^40 is approximately 1.1 * 10^12. Divide by 10^9 ops/sec = about 1100 seconds. 1100 / 3600 is about 0.3 hours."}, {"text": "About 36 years.", "isCorrect": false, "rationale": "36 years is the figure for 2^60 operations, not 2^40. Each additional power of 2 doubles the time, so 2^60 is about a million times longer than 2^40."}, {"text": "About 1100 hours.", "isCorrect": false, "rationale": "1100 is the count in seconds, not hours. Convert seconds to hours by dividing by 3600."}, {"text": "About 10 hours.", "isCorrect": false, "rationale": "10 hours = 36000 seconds, much larger than the actual ~1100 seconds for 2^40 operations at 10^9 ops/sec."}]}, {"question": "Which growth rate scales WORST as the input size n grows large?", "options": [{"text": "O(log n)", "isCorrect": false, "rationale": "Logarithmic growth is the second-slowest class. Its curve barely rises even when n is very large."}, {"text": "O(n)", "isCorrect": false, "rationale": "Linear growth is moderate. Doubling n only doubles the work."}, {"text": "O(n^2)", "isCorrect": false, "rationale": "Quadratic growth is bad — doubling n quadruples the work — but it is still polynomial and much better than exponential."}, {"text": "O(2^n)", "isCorrect": true, "rationale": "Exponential growth doubles the work for EACH additional element. By n=60 the runtime is about 36 years on a billion-ops-per-second machine. Polynomial classes remain practical at sizes where exponential is hopeless."}]}, {"question": "Why does the College Board call exponential-time algorithms 'unreasonable time' even when the algorithm itself is correct?", "options": [{"text": "Because exponential-time algorithms always produce wrong answers for large inputs.", "isCorrect": false, "rationale": "A correct exponential algorithm produces correct answers — it just takes too long to finish. Correctness is not the issue; tractability is."}, {"text": "Because adding even one element to the input doubles the work, so the runtime grows out of practical reach long before the input is realistic — no hardware speedup can compensate.", "isCorrect": true, "rationale": "Exponential growth means each new element doubles total work. By n=60 a correct algorithm needs ~36 years on a 10^9 ops/sec machine. Faster hardware just shifts the cliff slightly; the curve still defeats it."}, {"text": "Because exponential algorithms cannot be implemented in Python.", "isCorrect": false, "rationale": "Exponential algorithms can be implemented in any language. The issue is runtime, not language support."}, {"text": "Because exponential growth is illegal under the AP exam standards.", "isCorrect": false, "rationale": "There is no legality issue. The terminology simply marks the practical/impractical boundary."}]}, {"question": "Which set of growth classes are all considered 'reasonable time' under AP CSP terminology?", "options": [{"text": "O(2^n), O(n!), O(n^n)", "isCorrect": false, "rationale": "These are all in the exponential-or-worse family — unreasonable time. Polynomial growth is what counts as reasonable."}, {"text": "O(1), O(log n), O(n), O(n^2)", "isCorrect": true, "rationale": "These are all polynomial growth rates (constant, logarithmic, linear, quadratic). Polynomial-time algorithms are tractable, even at large input sizes."}, {"text": "Only O(1) and O(log n).", "isCorrect": false, "rationale": "O(n) and O(n^2) are also polynomial and considered tractable. Reasonable time covers all polynomial classes."}, {"text": "O(n!), O(n^2), O(n)", "isCorrect": false, "rationale": "O(n!) (factorial) grows faster than exponential and is unreasonable. The other two are reasonable, so this set is mixed."}]}, {"question": "A logistics company can either run an exact Traveling Salesman algorithm (guaranteed shortest route, but exponential time and 6 months on 100 cities) or a nearest-neighbor heuristic (O(n^2), seconds, route is typically within 20-25% of optimal). Which choice BEST matches the AP CSP definition of a heuristic?", "options": [{"text": "The exact algorithm, because optimal answers are always preferable.", "isCorrect": false, "rationale": "Optimality is irrelevant if you cannot compute it in time. The definition of a heuristic accepts a 'good enough' answer in exchange for tractable runtime."}, {"text": "The nearest-neighbor heuristic, because it sacrifices guaranteed optimality in exchange for a practical solution computed in reasonable time.", "isCorrect": true, "rationale": "This is the textbook definition: a heuristic gives up the best-possible guarantee in order to obtain a 'good enough' answer in polynomial time. Logistics companies routinely make this trade for daily routing."}, {"text": "Neither, because the AP exam forbids heuristics.", "isCorrect": false, "rationale": "Heuristics are explicitly named in the AP CED as one of the strategies for problems with no known efficient exact algorithm."}, {"text": "The exact algorithm — heuristics are only used in research, not industry.", "isCorrect": false, "rationale": "GPS navigation (A*), circuit-board layout (simulated annealing), and delivery routing all rely on heuristics in industry every day."}]}, {"question": "In one sentence, why is the nearest-neighbor TSP heuristic useful even though it does not always find the shortest route?", "options": [{"text": "It is only used for inputs smaller than n=10, where optimality is guaranteed.", "isCorrect": false, "rationale": "Heuristics are most valuable for LARGE inputs where exact algorithms are intractable. They do not guarantee optimality at any size."}, {"text": "It runs in polynomial time and produces a route that is typically within 20-25% of optimal — a trade-off that beats waiting months for the exact answer.", "isCorrect": true, "rationale": "The heuristic delivers a good-enough answer in O(n^2) time; the exact algorithm would deliver a perfect answer too late to be useful. For practical decision-making, the heuristic wins."}, {"text": "It guarantees the same answer as the exact algorithm.", "isCorrect": false, "rationale": "By definition, a heuristic does not guarantee optimality. If it did, it would be an exact algorithm."}, {"text": "It uses exponential time but on faster hardware.", "isCorrect": false, "rationale": "The whole point of the heuristic is that it runs in polynomial (O(n^2)) time. Hardware speed has nothing to do with it."}]}, {"question": "Which problem is an example of an INTRACTABLE problem (no known efficient exact algorithm)?", "options": [{"text": "Sorting a list of n integers.", "isCorrect": false, "rationale": "Sorting algorithms (merge sort, etc.) run in O(n log n) — well within polynomial time. Sorting is tractable."}, {"text": "The Traveling Salesman Problem on n cities.", "isCorrect": true, "rationale": "TSP has no known polynomial-time exact algorithm; the only guaranteed-optimal approach is to try all (n-1)! orderings, which is super-exponential. Real systems use heuristics like nearest-neighbor for TSP."}, {"text": "Searching a sorted list with binary search.", "isCorrect": false, "rationale": "Binary search is O(log n), one of the fastest growth rates. It is fully tractable."}, {"text": "Finding the minimum value in an unsorted list.", "isCorrect": false, "rationale": "A single linear pass solves this in O(n). It is tractable."}]}, {"question": "Examine this conceptual procedure:\n\ndef nearest_neighbor_tsp(cities, distances):\n    unvisited = list(cities)\n    route = [unvisited.pop(0)]\n    while len(unvisited) > 0:\n        current = route[-1]\n        nearest = None\n        shortest = float('inf')\n        for city in unvisited:\n            if distances[current][city] < shortest:\n                shortest = distances[current][city]\n                nearest = city\n        route.append(nearest)\n        unvisited.remove(nearest)\n    return route\n\nWhich statement is BEST supported by the code?", "options": [{"text": "It runs in O(2^n) time because it loops through unvisited cities.", "isCorrect": false, "rationale": "Two nested loops over up to n cities yield O(n^2), not exponential. Each step removes a city, so the work shrinks as the loop progresses."}, {"text": "It is a parameterized procedure whose body contains sequencing, selection, and iteration, and it runs in O(n^2) — making it a heuristic that delivers reasonable-time TSP routes.", "isCorrect": true, "rationale": "The procedure has two parameters, contains a while loop and for loop (iteration), an if (selection), and statements (sequencing) inside its body. Its outer-while-times-inner-for is roughly n*n = O(n^2), which is reasonable time."}, {"text": "It guarantees the optimal TSP route.", "isCorrect": false, "rationale": "Greedy nearest-neighbor is a heuristic, not an exact algorithm. It usually produces a near-optimal route, not a guaranteed-optimal one."}, {"text": "It must always start at the city named 'home'.", "isCorrect": false, "rationale": "It starts at unvisited.pop(0) — whatever the first element of cities is, not a specific 'home' string."}]}, {"question": "Which statement about hardware improvements and exponential algorithms is TRUE?", "options": [{"text": "Doubling CPU speed makes an O(2^n) algorithm tractable for any n.", "isCorrect": false, "rationale": "Doubling speed buys you exactly ONE additional element of input before the runtime returns to the previous level. Exponential growth defeats hardware improvements."}, {"text": "Hardware speedups roughly add constant additional headroom (e.g., one or two more elements) to an exponential algorithm — they cannot turn intractable problems tractable.", "isCorrect": true, "rationale": "Exponential growth means each new element doubles the work. Doubling hardware just absorbs one element of growth. The shape of the curve (exponential vs polynomial) is what matters, not the constant factor."}, {"text": "Exponential algorithms become polynomial when run on a quantum computer.", "isCorrect": false, "rationale": "Some specific problems benefit from quantum approaches, but exponential growth in general is not erased by hardware. The AP CED treats exponential as fundamentally unreasonable."}, {"text": "Polynomial algorithms become exponential when scaled.", "isCorrect": false, "rationale": "Growth class is a property of the algorithm, not the input size. Polynomial stays polynomial; exponential stays exponential."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
