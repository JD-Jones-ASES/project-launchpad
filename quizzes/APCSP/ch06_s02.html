<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Parameters, Arguments, Return Values, Scope</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement BEST captures the AP-precise distinction between parameters and arguments?", "options": [{"text": "Parameters and arguments mean the same thing; the AP exam treats them as synonyms.", "isCorrect": false, "rationale": "The AP exam explicitly does not treat them as synonyms. Imprecise vocabulary loses points on free-response questions."}, {"text": "Parameters are listed inside the def header as placeholders; arguments are the actual values supplied at the call site that get bound to those placeholders.", "isCorrect": true, "rationale": "Parameters appear in the procedure header (e.g., records, target_subject in compute_streak's def line). Arguments are the values passed in when the procedure is called (e.g., study_records and 'math')."}, {"text": "Parameters are values; arguments are variable names.", "isCorrect": false, "rationale": "The relationship is reversed. Parameters are the named placeholders in the header; arguments are the values passed at the call site."}, {"text": "Parameters appear only in AP Pseudocode; arguments appear only in Python.", "isCorrect": false, "rationale": "Both notations use both terms. They are distinct concepts inside any programming language."}]}, {"question": "Consider this Python procedure:\n\ndef classify_grade(score):\n    if score >= 90:\n        return 'A'\n    elif score >= 80:\n        return 'B'\n    elif score >= 70:\n        return 'C'\n    else:\n        return 'F'\n\nWhat does classify_grade(85) return?", "options": [{"text": "'A'", "isCorrect": false, "rationale": "85 is not >= 90, so the first branch does not return. Execution falls through to elif score >= 80."}, {"text": "'B'", "isCorrect": true, "rationale": "85 fails the first check (>= 90) but succeeds at elif score >= 80, which returns 'B' immediately. The remaining branches never run."}, {"text": "'C'", "isCorrect": false, "rationale": "Once a branch's return executes, the procedure exits. The elif >= 80 branch fires before reaching >= 70."}, {"text": "'F'", "isCorrect": false, "rationale": "The else branch only runs if every preceding condition is false. 85 satisfies score >= 80, so the else branch never executes."}]}, {"question": "What is the output of this program?\n\ndef double(x):\n    result = x * 2\n    return result\n\noutput = double(7)\nprint(output)\nprint(result)", "options": [{"text": "14\n14", "isCorrect": false, "rationale": "result is local to double. The second print does not see the local variable; it raises a NameError."}, {"text": "14\n7", "isCorrect": false, "rationale": "result was assigned x * 2 = 14 inside the procedure, but it does not exist in the main script. The second print raises an error before printing anything."}, {"text": "14, then a NameError on the second print because result is local to double and does not exist outside it.", "isCorrect": true, "rationale": "double's parameter x and local variable result are both destroyed when the procedure returns. The first print succeeds (output = 14). The second print references result, which is not defined in the main scope, raising NameError."}, {"text": "Two NameErrors, because output is also undefined.", "isCorrect": false, "rationale": "output IS defined in the main script (it received the return value 14). Only result is missing from the main scope."}]}, {"question": "A procedure is defined:\n\ndef total(a, b, c):\n    return a + b + c\n\nWhich call stores 15 in a variable named answer?", "options": [{"text": "answer <- total(4, 5, 6)", "isCorrect": false, "rationale": "<- is AP Pseudocode assignment, not Python. In Python use the equals sign: answer = total(4, 5, 6)."}, {"text": "answer = total(4, 5, 6)", "isCorrect": true, "rationale": "4 + 5 + 6 = 15. The arguments map positionally: a=4, b=5, c=6. The return value is stored in answer."}, {"text": "total(4, 5, 6) = answer", "isCorrect": false, "rationale": "Assignment in Python is target = value, not value = target. This line is a syntax error."}, {"text": "answer = total[4, 5, 6]", "isCorrect": false, "rationale": "Square brackets denote indexing or list literals, not procedure calls. Procedure calls use parentheses."}]}, {"question": "Which property must hold for a procedure to be called pure?", "options": [{"text": "It must contain at least one if statement.", "isCorrect": false, "rationale": "Purity is unrelated to selection. A procedure with no if statements can still be pure."}, {"text": "It must always print to the screen so the result is visible.", "isCorrect": false, "rationale": "Printing is a side effect, which is exactly what pure procedures avoid. A pure procedure has no side effects."}, {"text": "Same inputs always produce the same output, AND it has no side effects (no modifying outside variables, files, or output).", "isCorrect": true, "rationale": "These are the two textbook conditions for purity. compute_streak meets both: it does not modify records, and it always returns the same int for the same inputs."}, {"text": "It must use a global variable to share data with the main script.", "isCorrect": false, "rationale": "Reading or writing globals breaks purity by introducing hidden dependencies and side effects."}]}, {"question": "In AP Pseudocode, which keyword corresponds to Python's return statement?", "options": [{"text": "RESULT", "isCorrect": false, "rationale": "AP Pseudocode does not use RESULT. The keyword is RETURN, in uppercase."}, {"text": "OUTPUT", "isCorrect": false, "rationale": "OUTPUT in AP Pseudocode displays a value to the user (like Python's print). It does not send a value back to the caller."}, {"text": "RETURN", "isCorrect": true, "rationale": "AP Pseudocode writes RETURN in uppercase. Python writes lowercase return. Both perform the same role: send a value back to the caller and exit the procedure."}, {"text": "EXIT", "isCorrect": false, "rationale": "AP Pseudocode has no EXIT keyword. The standard return is RETURN."}]}, {"question": "Predict the output:\n\ndef bump(x):\n    x = x + 1\n    return x\n\nn = 5\nbump(n)\nprint(n)", "options": [{"text": "6", "isCorrect": false, "rationale": "Reassigning the parameter x inside bump only changes the local copy. The argument n in the main script is not modified by the parameter rebinding."}, {"text": "5", "isCorrect": true, "rationale": "When bump(n) is called, the value 5 is bound to the local parameter x. Inside bump, x = x + 1 changes the LOCAL parameter, not the main-script variable n. The returned 6 is discarded because no one captures it. n stays at 5."}, {"text": "Error — n is undefined after the call to bump.", "isCorrect": false, "rationale": "n was assigned 5 in the main scope and remains there. Local scope does not erase main-scope variables."}, {"text": "None", "isCorrect": false, "rationale": "n is still bound to 5 in the main scope. None would only print if n were somehow set to None."}]}, {"question": "Why does the AP exam emphasize that argument-to-parameter mapping is positional?", "options": [{"text": "Because Python rejects programs whose argument names differ from parameter names.", "isCorrect": false, "rationale": "Argument names need not match parameter names; positional mapping is the actual rule."}, {"text": "Because the first argument always binds to the first parameter, the second to the second, and so on; passing arguments in the wrong order silently produces wrong results.", "isCorrect": true, "rationale": "compute_streak(records, target_subject) called as compute_streak('math', study_records) would bind the string 'math' to records and the list to target_subject. Python cannot detect this; it is a logic error you must avoid by checking argument order."}, {"text": "Because AP Pseudocode requires arguments to be passed in alphabetical order.", "isCorrect": false, "rationale": "There is no alphabetical-order rule. The mapping is purely positional in both notations."}, {"text": "Because parameter names override argument names at runtime.", "isCorrect": false, "rationale": "Parameters and arguments live in different scopes; neither overrides the other. The point is that the order at the call site determines which value reaches which parameter."}]}, {"question": "Consider this code:\n\ndef apply_discount(price, percent):\n    return price * (1 - percent)\n\nfinal = apply_discount(100, 0.15)\n\nWhich claim about apply_discount is TRUE?", "options": [{"text": "It is a void procedure because it does not call print.", "isCorrect": false, "rationale": "It returns a numeric result via return, which makes it a value-returning procedure. Whether it prints is irrelevant to that classification."}, {"text": "It is pure: the same arguments always produce the same return value, and it has no side effects.", "isCorrect": true, "rationale": "apply_discount(100, 0.15) always returns 85.0. It does not modify any outside variable, file, or output, so it satisfies both conditions for purity."}, {"text": "After the call, percent equals 0.15 in the main scope.", "isCorrect": false, "rationale": "percent is local to apply_discount and is destroyed when the procedure returns."}, {"text": "Multiple parameters are not allowed in AP Pseudocode.", "isCorrect": false, "rationale": "AP Pseudocode procedures can have any number of parameters listed in the parentheses, just like Python."}]}, {"question": "Refactor the inline assignment\n\ntax_amount = income * 0.18\n\ninto a call to a new procedure calculate_tax(subtotal, rate). Which of the following is a correct extraction?", "options": [{"text": "def calculate_tax(subtotal, rate):\n    print(subtotal * rate)\n\ntax_amount = calculate_tax(income, 0.18)", "isCorrect": false, "rationale": "Calling print returns None. Storing None in tax_amount breaks the rest of the program. The procedure should return, not print."}, {"text": "def calculate_tax(subtotal, rate):\n    return subtotal * rate\n\ntax_amount = calculate_tax(income, 0.18)", "isCorrect": true, "rationale": "The procedure abstracts over the formula by returning subtotal * rate. The call site supplies income and 0.18; the returned value goes into tax_amount, matching the original behavior."}, {"text": "def calculate_tax():\n    return income * 0.18\n\ntax_amount = calculate_tax()", "isCorrect": false, "rationale": "This procedure has no parameters and reaches outside its scope to read income (a global). It does not abstract over subtotal and rate as required."}, {"text": "def calculate_tax(subtotal, rate):\n    return subtotal * rate\n\ntax_amount <- calculate_tax(income, 0.18)", "isCorrect": false, "rationale": "<- is AP Pseudocode assignment. In Python the call site uses the equals sign: tax_amount = calculate_tax(...)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
