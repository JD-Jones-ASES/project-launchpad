    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Iterating Over Lists</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "STIMULUS: scores = [82, 95, 78, 65, 90, 88, 71, 100, 55, 92]. A student writes:\n\nfailing_count = 0\nfor score in scores:\n    if score < 70:\n        failing_count = failing_count + 1\nprint(failing_count)\n\nWhat does this code print, and what aggregate pattern does it implement?", "options": [{"text": "8; the count pattern.", "isCorrect": false, "rationale": "8 is the count of PASSING scores (>= 70), not failing. Recount: 65 and 55 are below 70, so failing_count is 2."}, {"text": "2; the count pattern.", "isCorrect": true, "rationale": "Two values (65 and 55) are below 70. The pattern is the count aggregate: initialize a counter to 0, increment for each element passing the filter, read the final value after the loop."}, {"text": "162; the sum pattern.", "isCorrect": false, "rationale": "The body increments failing_count by 1 each time, not by the score's value. Sum would require failing_count = failing_count + score. The result is 2, not 162."}, {"text": "100; the maximum pattern.", "isCorrect": false, "rationale": "The maximum pattern would track the highest value, not count. The variable failing_count is incremented by 1, so the result is the count of failing scores (2)."}]}, {"question": "When should you choose for i in range(len(lst)): over for item in lst:?", "options": [{"text": "Always; the index form is more efficient.", "isCorrect": false, "rationale": "The two forms have similar performance in Python. The choice is about whether the loop body needs the index, not about speed."}, {"text": "When the loop body needs to know the position of the current element — for example, comparing adjacent elements or distinguishing first vs. last.", "isCorrect": true, "rationale": "Use the index form when position matters (e.g., printing 'First score:' for i == 0, 'Last score:' for i == len(scores) - 1, or comparing scores[i] with scores[i-1]). Otherwise use the cleaner by-element form."}, {"text": "When the list contains tuples; you cannot iterate tuples by element.", "isCorrect": false, "rationale": "The by-element form (for record in records) works fine for lists of tuples. The loop variable receives each tuple in turn, and you can unpack it inside."}, {"text": "Never; for item in lst: is always preferred.", "isCorrect": false, "rationale": "The by-element form should be the default, but there are clear cases (positional awareness) where the index form is necessary."}]}, {"question": "STIMULUS: vals = [14, 7, 22, 3, 19]. Which of the following loops correctly finds and prints the minimum value?", "options": [{"text": "smallest = 0\nfor v in vals:\n    if v < smallest:\n        smallest = v\nprint(smallest)", "isCorrect": false, "rationale": "Initializing smallest to 0 is wrong: every element of vals is positive (>= 3), so v < 0 is never true and smallest stays 0. Initialize to vals[0] (or to a very large value) instead."}, {"text": "smallest = vals[0]\nfor v in vals:\n    if v < smallest:\n        smallest = v\nprint(smallest)", "isCorrect": true, "rationale": "Initialize the running minimum to the first element, then check every element. After the loop, smallest holds the minimum value (3). This is the standard min/max pattern, with the right initial value."}, {"text": "for v in vals:\n    smallest = v\nprint(smallest)", "isCorrect": false, "rationale": "This unconditionally overwrites smallest each iteration, so after the loop smallest is the LAST element (19), not the minimum (3)."}, {"text": "smallest = vals[-1]\nfor v in vals:\n    if v > smallest:\n        smallest = v\nprint(smallest)", "isCorrect": false, "rationale": "This finds the MAXIMUM (22), not the minimum, because the comparison is v > smallest. Correct minimum logic uses v < smallest."}]}, {"question": "Translate this Python loop to AP Pseudocode, with explicit index annotations:\n\nfor i in range(len(scores)):\n    total = total + scores[i]\n\nWhich is correct?", "options": [{"text": "FOR EACH i IN [0, LENGTH(scores) - 1]\n    total <- total + scores[i]", "isCorrect": false, "rationale": "Pseudocode is one-indexed, so the loop should run from 1 to LENGTH(scores), not 0 to LENGTH(scores) - 1."}, {"text": "FOR EACH i IN [1, LENGTH(scores)]\n    total <- total + scores[i]", "isCorrect": true, "rationale": "Pseudocode iterates 1 through LENGTH(scores) inclusive; under one-based indexing, scores[1] is the first element. The translation is otherwise identical to the Python version."}, {"text": "FOR EACH score IN scores\n    total <- total + scores[score]", "isCorrect": false, "rationale": "FOR EACH score IN scores binds score to a value, not an index. Indexing scores[score] would attempt to access by value (e.g., scores[82]), which is invalid."}, {"text": "WHILE (i < LENGTH(scores))\n    total <- total + scores[i]", "isCorrect": false, "rationale": "Pseudocode's primary while-style loop is REPEAT UNTIL, not WHILE. The condition should also be REPEAT UNTIL (i > LENGTH(scores)), and i must be initialized and incremented explicitly."}]}, {"question": "STIMULUS: study_records contains a list of (date, subject, minutes) tuples. The Study Streak Tracker uses this loop to print only math sessions:\n\nfor record in study_records:\n    if record[1] == \"math\":\n        print(record[0], record[2])\n\nWhich statement BEST describes what this loop does?", "options": [{"text": "It prints the subject and minutes of every record, math or not.", "isCorrect": false, "rationale": "The if record[1] == \"math\" condition is a filter — only records whose second field equals \"math\" pass. Non-math records are skipped."}, {"text": "It iterates every tuple in the list, accesses the second field (subject), and if it equals \"math\", prints the date (record[0]) and minutes (record[2]).", "isCorrect": true, "rationale": "This is the filter-and-display pattern: visit every record, test the filter condition on one of its fields, and act only on records that pass. record[1] is the subject because tuples are zero-indexed in Python."}, {"text": "It modifies record[1] to be \"math\" for every element.", "isCorrect": false, "rationale": "The == operator tests equality; it does not assign. Also, tuples are immutable so even attempted assignment would raise TypeError."}, {"text": "It removes non-math records from study_records.", "isCorrect": false, "rationale": "The loop only reads records and prints; it does not call any list-modifying method (.remove, .pop, etc.)."}]}, {"question": "STIMULUS: scores = [82, 95, 78, 65, 90, 88, 71, 100, 55, 92]. A student writes:\n\npassing = [score for score in scores if score >= 70]\nprint(passing)\n\nWhich statement is true?", "options": [{"text": "This is a list comprehension, equivalent to a longer for loop with an if filter and .append() call. Output: [82, 95, 78, 90, 88, 71, 100, 92].", "isCorrect": true, "rationale": "List comprehensions are a Python convenience that compactly express filter-and-collect patterns. The expanded equivalent is: passing = []; for score in scores: if score >= 70: passing.append(score). Both produce the same eight-element list."}, {"text": "This is a tuple comprehension, equivalent to constructing a tuple of passing scores.", "isCorrect": false, "rationale": "Square brackets denote a list comprehension. A tuple comprehension would use parentheses (and would actually be a generator expression in Python). The result here is a list."}, {"text": "This is invalid Python because for cannot appear inside square brackets.", "isCorrect": false, "rationale": "List comprehension syntax explicitly puts a for clause (and optional if filter) inside square brackets. It is fully valid Python."}, {"text": "This is AP Pseudocode and will appear on AP exam stimuli.", "isCorrect": false, "rationale": "List comprehensions are Python-only. AP Pseudocode does not have an equivalent construct, and AP exam stimuli use explicit loops only."}]}, {"question": "What aggregate pattern does this Python code implement, and what does it print?\n\nscores = [82, 95, 78, 65, 90, 88, 71, 100, 55, 92]\nbest = scores[0]\nfor score in scores:\n    if score > best:\n        best = score\nprint(best)", "options": [{"text": "Count pattern; output 4.", "isCorrect": false, "rationale": "best is reassigned to the larger value, not incremented. This is the maximum pattern, not count."}, {"text": "Sum pattern; output 816.", "isCorrect": false, "rationale": "best is replaced when a larger value is found, not accumulated. The sum pattern would add scores together, producing 816."}, {"text": "Maximum pattern; output 100.", "isCorrect": true, "rationale": "Initialize best to the first element, then replace it whenever a larger element is found. After the loop, best holds the largest value in the list, which is 100."}, {"text": "Contains-check pattern; output True.", "isCorrect": false, "rationale": "The contains-check pattern uses a Boolean flag (e.g., found = True). best holds the running maximum value, not a Boolean."}]}, {"question": "When iterating over a list of tuples like records = [(\"a\", 1), (\"b\", 2), (\"c\", 3)], why is tuple unpacking inside the loop preferred over indexing?", "options": [{"text": "Tuple unpacking is faster at runtime in CPython.", "isCorrect": false, "rationale": "Performance is similar. The argument is about readability, not speed."}, {"text": "Indexing inside the loop (record[0], record[1]) is invalid Python.", "isCorrect": false, "rationale": "Indexing tuples is fully valid. The argument for unpacking is clarity, not correctness."}, {"text": "Unpacking gives meaningful names to each field (label, value = record), making the loop body more readable than record[0], record[1].", "isCorrect": true, "rationale": "Naming each field is a form of documentation. for record in records: label, value = record makes the body's intent obvious without forcing the reader to remember which index is which field."}, {"text": "Tuple unpacking automatically sorts the tuple's fields.", "isCorrect": false, "rationale": "Unpacking preserves order; it does not sort. label gets the first field, value gets the second."}]}, {"question": "What is the disadvantage of writing a list comprehension in your AP Create PT submission?", "options": [{"text": "List comprehensions are illegal Python and will not run.", "isCorrect": false, "rationale": "List comprehensions are valid Python and run correctly. The concern is about explanation, not execution."}, {"text": "There is no AP Pseudocode equivalent, so you must be able to explain the comprehension in plain English in your written response, and any algorithm-tracing question on the exam will use the explicit loop form instead.", "isCorrect": true, "rationale": "List comprehensions are Python-only. They are fine in your code as long as you can explain them, but the exam's algorithm-tracing items will only use explicit for-with-if loops. Learn to translate the two forms."}, {"text": "The Create PT scorers automatically deduct points for every comprehension.", "isCorrect": false, "rationale": "There is no automatic deduction. You can use comprehensions freely; you simply must be able to articulate what they do in plain English when discussing your code."}, {"text": "List comprehensions cannot include if filters.", "isCorrect": false, "rationale": "List comprehensions explicitly support an optional if clause: [x for x in lst if condition]. The form is fundamental to the construct."}]}, {"question": "STIMULUS: A student wants to compute the mean of scores = [82, 95, 78, 65, 90, 88, 71, 100, 55, 92]. They write:\n\ntotal = 0\nfor score in scores:\n    total = total + score\nmean = total / 10\nprint(round(mean, 1))\n\nThe verification questions ask: 'Why should you use len(scores) instead of hardcoding 10?' What is the BEST answer?", "options": [{"text": "len(scores) runs faster than the literal 10.", "isCorrect": false, "rationale": "len() and a literal 10 have similar performance. The argument for len() is correctness under change, not speed."}, {"text": "len(scores) automatically updates if the list grows or shrinks, so the mean stays correct without rewriting code; hardcoded 10 silently produces wrong results when the list size changes.", "isCorrect": true, "rationale": "This is the data-abstraction argument applied to aggregation. With len(scores), one general formula works for any list size. With a hardcoded 10, adding an 11th score makes the mean computation wrong."}, {"text": "Python forbids dividing by integer literals.", "isCorrect": false, "rationale": "Integer literal division (total / 10) is fully valid Python and produces a float in Python 3."}, {"text": "len() returns a string and 10 is an integer; types must match.", "isCorrect": false, "rationale": "len() returns an integer. Both 10 and len(scores) are integers; the issue is correctness as the list size changes, not type compatibility."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
