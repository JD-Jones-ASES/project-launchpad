    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Intellectual Property and Open-Source Licensing</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student writes an original song and posts it online. Two days later, someone copies the song to their own website without permission. The student never registered the work with the U.S. Copyright Office. According to the textbook, does the student's copyright apply?", "options": [{"text": "Yes — under U.S. law copyright arises automatically the moment an original work is fixed in a tangible medium of expression; registration is required only to bring a lawsuit for statutory damages, not for the copyright itself to exist.", "isCorrect": true, "rationale": "The textbook is explicit: copyright arises automatically on fixation. No registration, notice, or publication is required for protection to exist. Registration unlocks specific remedies but is not a precondition for the right."}, {"text": "No — copyright in the U.S. requires explicit registration with the Copyright Office before it applies.", "isCorrect": false, "rationale": "This contradicts the U.S. statute and the textbook. Registration is required for statutory damages in litigation, not for copyright to exist."}, {"text": "Yes, but only if the song was published in print form.", "isCorrect": false, "rationale": "Fixation in any tangible medium — including a digital audio file — qualifies. Print publication is not required."}, {"text": "No — songs are not eligible for copyright in the U.S.", "isCorrect": false, "rationale": "Songs are explicitly eligible for copyright as both musical works and (when recorded) sound recordings."}], "id": "q01"}, {"question": "A software company wants to incorporate an open-source library into a commercial product they will not release as open source. Which license type permits this use?", "options": [{"text": "A permissive license such as MIT or BSD, which requires only that the original copyright notice and license text be retained; users may incorporate the code into proprietary products and distribute compiled binaries without releasing the source.", "isCorrect": true, "rationale": "The textbook describes permissive licenses as imposing minimal conditions. They allow incorporation into proprietary products, modification without release, and binary distribution without source disclosure."}, {"text": "A copyleft license such as the GNU GPL, because copyleft is more flexible than permissive licenses.", "isCorrect": false, "rationale": "This reverses the actual relationship. Copyleft licenses (GPL) require derivative works distributed to others to be released under the same copyleft license — so a GPL-licensed library could not be embedded in a closed-source commercial product."}, {"text": "Creative Commons CC BY-SA, because ShareAlike automatically permits proprietary embedding.", "isCorrect": false, "rationale": "CC BY-SA's ShareAlike condition propagates the same license to derivative works. The closed-source proprietary scenario is the case ShareAlike specifically prevents."}, {"text": "No license permits this use; commercial software is automatically illegal.", "isCorrect": false, "rationale": "Commercial software is normal and permitted. Permissive licenses specifically allow proprietary commercial use of open-source components."}], "id": "q02"}, {"question": "The fair-use four-factor test asks courts to weigh four factors when judging whether a particular use of copyrighted material is permissible without permission. Which list correctly names the four factors?", "options": [{"text": "(1) Purpose and character of the use; (2) nature of the original work; (3) amount and substantiality taken; (4) effect on the market for the original.", "isCorrect": true, "rationale": "These are the four factors codified at 17 U.S.C. 107 and described in the textbook. Courts weigh all four together; no single factor is determinative."}, {"text": "(1) Whether the user is a student; (2) whether the use is online; (3) whether attribution is given; (4) whether the original creator is alive.", "isCorrect": false, "rationale": "These are not the statutory factors. Educational status, online medium, attribution, and authorial status are not the legal test, although some factors (like transformation for education) may bear on factor 1."}, {"text": "(1) Author's nationality; (2) registration date; (3) cost of the original; (4) whether profits exceed $1,000.", "isCorrect": false, "rationale": "These are not the four-factor test. The actual factors concern purpose, nature, amount, and market effect."}, {"text": "(1) Whether the original is in the public domain; (2) whether the new work is encrypted; (3) whether the use is in the United States; (4) whether the user has insurance.", "isCorrect": false, "rationale": "These are not the statutory factors. Public-domain status, encryption, geography, and insurance are unrelated to the fair-use test."}], "id": "q03"}, {"question": "Under U.S. law, what is the standard duration of copyright protection for a work created by an individual author in or after 1978?", "options": [{"text": "The life of the author plus 70 years, after which the work enters the public domain.", "isCorrect": true, "rationale": "The textbook states this duration explicitly. Works made for hire have a different rule (95 years from publication or 120 years from creation, whichever is shorter)."}, {"text": "Exactly 50 years from publication.", "isCorrect": false, "rationale": "U.S. copyright duration is life of the author plus 70 years for individual works post-1978, not a flat 50 years."}, {"text": "Forever, until the rights are transferred.", "isCorrect": false, "rationale": "Copyright is term-limited. Even with renewals or transfers, U.S. works eventually enter the public domain."}, {"text": "Until the work is registered with the FCC.", "isCorrect": false, "rationale": "Copyright is administered by the U.S. Copyright Office (a unit of the Library of Congress), not the FCC. Registration is voluntary."}], "id": "q04"}, {"question": "A copyleft license such as the GNU GPL imposes which condition on derivative works?", "options": [{"text": "Any derivative work distributed to others must also be released under the same copyleft license, with the source code made available.", "isCorrect": true, "rationale": "Copyleft propagates: a downstream user may modify GPL code, but if they distribute the modified version, the source of the modification must be released under the GPL. The textbook describes this as a mechanism for enforcing perpetual openness through copyright law."}, {"text": "Derivative works must be sold for profit.", "isCorrect": false, "rationale": "Copyleft licenses do not require commercialization; they require that derivative-work source be available under the same license."}, {"text": "Derivative works must be encrypted.", "isCorrect": false, "rationale": "Encryption is unrelated to copyleft. Copyleft is a licensing condition about source-code availability and licensing of derivatives."}, {"text": "Derivative works are forbidden entirely.", "isCorrect": false, "rationale": "Copyleft permits derivatives; it conditions their distribution on releasing the modified source under the same license."}], "id": "q05"}, {"question": "A creator wants to allow others to share and adapt their work freely, even commercially, but only if those derivatives are also released under the same license. Which Creative Commons license type matches?", "options": [{"text": "CC BY-SA (Attribution-ShareAlike) — users must credit the creator and apply the same license (or a compatible one) to any adaptations they distribute.", "isCorrect": true, "rationale": "BY-SA combines Attribution (credit required) with ShareAlike (derivatives must carry the same license). It does not include NonCommercial, so commercial use is permitted."}, {"text": "CC BY-NC-ND (Attribution-NonCommercial-NoDerivatives), because NC-ND is the most permissive option.", "isCorrect": false, "rationale": "BY-NC-ND is the most restrictive standard CC license: no commercial use and no derivatives. The scenario explicitly permits commercial use and derivatives."}, {"text": "Public-domain dedication (CC0), because CC0 requires ShareAlike.", "isCorrect": false, "rationale": "CC0 places the work in the public domain with no conditions at all, including no ShareAlike requirement. It is the opposite of what the scenario describes."}, {"text": "No CC license permits both commercial use and ShareAlike.", "isCorrect": false, "rationale": "BY-SA permits both. The scenario describes BY-SA precisely."}], "id": "q06"}, {"question": "The textbook describes \"fair use\" as a legal defense evaluated case-by-case rather than a category of automatically permitted uses. Why does this distinction matter?", "options": [{"text": "Because no use is automatically protected as fair use; courts must weigh the four factors against the specific facts of each case, and a use that looks similar to a prior fair-use case can still be ruled infringing.", "isCorrect": true, "rationale": "The textbook explicitly notes that fair use is a defense, not a category. No single factor is determinative, and courts apply the test to the specific facts. This is what the AP exam tests."}, {"text": "Because fair use applies only to printed books.", "isCorrect": false, "rationale": "Fair use applies broadly to copyrightable works including software, video, audio, and text. There is no print-only restriction."}, {"text": "Because fair use is the same as public domain.", "isCorrect": false, "rationale": "Fair use is a defense for using a still-copyrighted work. Public domain works are not subject to copyright at all and require no fair-use analysis."}, {"text": "Because fair use is a Creative Commons condition.", "isCorrect": false, "rationale": "Fair use is a U.S. statutory limitation on copyright, separate from Creative Commons licenses. CC licenses operate within copyright by granting standing permissions."}], "id": "q07"}, {"question": "Linus Torvalds released the Linux kernel under the GNU GPL. The Apache HTTP Server is released under the Apache License 2.0 (a permissive license). A company wants to ship a modified version of each as part of a closed-source product distributed to customers. Which is permitted, and why?", "options": [{"text": "Modifying and shipping a closed-source variant of the Apache HTTP Server is permitted (permissive); doing the same with a Linux kernel modification distributed to customers is not, because the GPL requires the modification's source to be released under the GPL.", "isCorrect": true, "rationale": "Permissive licenses (Apache, MIT, BSD) impose minimal conditions and allow proprietary derivative distribution. Copyleft licenses (GPL) require any distributed derivative to be released as open source under the GPL."}, {"text": "Both are permitted, since open-source licenses always allow proprietary distribution.", "isCorrect": false, "rationale": "Copyleft licenses specifically prevent proprietary derivative distribution. Not all open-source licenses permit it."}, {"text": "Neither is permitted, because all open-source licenses prohibit any commercial use.", "isCorrect": false, "rationale": "Most open-source licenses (permissive and copyleft alike) explicitly permit commercial use. The constraint is on source-code disclosure for derivatives, not commercial use itself."}, {"text": "Both are permitted only if Moore's Law is still active.", "isCorrect": false, "rationale": "Moore's Law is a transistor-density observation unrelated to software licensing."}], "id": "q08"}, {"question": "Which works are unambiguously in the U.S. public domain regardless of the life-plus-70 rule?", "options": [{"text": "Works published before 1928 are in the U.S. public domain regardless of authorial life span; works created by the U.S. federal government also cannot hold copyright.", "isCorrect": true, "rationale": "The textbook states both: pre-1928 published works fall outside the life-plus-70 protection in the U.S., and U.S. federal-government works cannot be copyrighted by the federal government itself. Creators may also voluntarily dedicate works to the public domain."}, {"text": "Only works that have been registered with the Library of Congress.", "isCorrect": false, "rationale": "Registration does not place works in the public domain — it documents copyright ownership for litigation purposes."}, {"text": "All works created before 1980.", "isCorrect": false, "rationale": "1980 is not a public-domain cutoff year. The textbook cites 1928 as the pre-rule cutoff."}, {"text": "All works released under the GPL.", "isCorrect": false, "rationale": "GPL-licensed works are still copyrighted; the GPL is a license under which the copyright holder grants specific permissions. Public domain means no copyright at all."}], "id": "q09"}, {"question": "The textbook says open-source licensing has measurable economic effects on the software industry. Which contrast best summarizes the difference between permissive and copyleft economic equilibria?", "options": [{"text": "Permissive licensing lets companies build proprietary products on open foundations without source-disclosure obligations (used widely in commercial cloud services); copyleft licensing requires modifications to be released back to the community, producing a contribution dynamic distinct from permissive.", "isCorrect": true, "rationale": "The textbook explicitly contrasts the two equilibria. Permissive licensing supports proprietary derivatives; copyleft creates a feedback in which improvements return to the community. Neither is universally superior — each produces a different distribution of economic value."}, {"text": "Permissive licensing is illegal in most countries; copyleft is mandatory.", "isCorrect": false, "rationale": "Both license families are legal and widely used. The textbook describes them as different choices producing different economic outcomes, not as illegal-vs-mandatory."}, {"text": "Permissive and copyleft licenses produce identical economic effects.", "isCorrect": false, "rationale": "The textbook explicitly contrasts the two equilibria. They produce different distributions of economic value among original contributors, commercial users, and the broader user community."}, {"text": "Only copyleft licenses permit commercial use.", "isCorrect": false, "rationale": "Both license families generally permit commercial use. The contrast is over derivative-work source disclosure, not commercial use itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
