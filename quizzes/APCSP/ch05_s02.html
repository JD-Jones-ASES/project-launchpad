<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Indexing Dilemma</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An AP Pseudocode algorithm begins:\n\nlst <- [5, 10, 15, 20]\n\nWhat is the value of lst[1], and what is the value of lst[LENGTH(lst)]?", "options": [{"text": "lst[1] = 10 and lst[LENGTH(lst)] = 20.", "isCorrect": false, "rationale": "lst[1] in Pseudocode refers to the FIRST element (one-based indexing), which is 5, not 10. The 10 lives at index 2 in Pseudocode."}, {"text": "lst[1] = 5 and lst[LENGTH(lst)] = 20.", "isCorrect": true, "rationale": "AP Pseudocode is one-indexed, so lst[1] is the first element (5). LENGTH(lst) is 4, and lst[4] is the last element (20). This is the inverse of Python."}, {"text": "lst[1] = 5 and lst[LENGTH(lst)] = 5.", "isCorrect": false, "rationale": "LENGTH(lst) returns the size of the list (4), not 1. lst[4] is the last element (20), not the first."}, {"text": "lst[1] = 10 and lst[LENGTH(lst)] = 15.", "isCorrect": false, "rationale": "Both halves are wrong. In Pseudocode lst[1] is the first element (5), and lst[LENGTH(lst)] is the last element (20)."}], "id": "q01"}, {"question": "Consider this Python loop:\n\nscores = [85, 92, 78, 95]\nfor i in range(len(scores)):\n    print(scores[i])\n\nWhat is the correct AP Pseudocode translation, with proper index annotations?", "options": [{"text": "FOR EACH i IN [0, LENGTH(scores) - 1]\n    DISPLAY(scores[i])", "isCorrect": false, "rationale": "Pseudocode is one-indexed, so the loop must run from 1 to LENGTH(scores). Starting at 0 is using Python's bound, not Pseudocode's."}, {"text": "FOR EACH i IN [1, LENGTH(scores)]\n    DISPLAY(scores[i])", "isCorrect": true, "rationale": "Pseudocode iterates indices 1 through LENGTH(scores) inclusive. i = 1 retrieves the first element, i = LENGTH(scores) retrieves the last. Notice every index is shifted by one compared to the Python loop."}, {"text": "FOR EACH i IN [1, LENGTH(scores) - 1]\n    DISPLAY(scores[i])", "isCorrect": false, "rationale": "This stops one element early. Pseudocode's bound is inclusive on both ends, so the upper bound is LENGTH(scores), not LENGTH(scores) - 1."}, {"text": "FOR EACH score IN scores\n    DISPLAY(scores[score])", "isCorrect": false, "rationale": "FOR EACH score IN scores binds score to a value, not an index. Indexing scores[score] with a value (e.g., 85) would attempt to access scores[85], which is invalid."}], "id": "q02"}, {"question": "A student translates the Python expression lst[-1] to AP Pseudocode and writes lst[-1] verbatim. Why is this incorrect?", "options": [{"text": "AP Pseudocode does not support negative indices; the equivalent is lst[LENGTH(lst)].", "isCorrect": true, "rationale": "Negative indexing is a Python-only convenience. To access the last element in Pseudocode, you must compute the positive index using LENGTH."}, {"text": "Pseudocode interprets lst[-1] as the second-to-last element, not the last.", "isCorrect": false, "rationale": "Pseudocode does not interpret negative indices at all; the expression is invalid, not redefined."}, {"text": "Python and Pseudocode both forbid negative indexing.", "isCorrect": false, "rationale": "Python explicitly supports negative indexing as a convenience. Pseudocode does not. The error is in Pseudocode only."}, {"text": "lst[-1] is correct in Pseudocode if LENGTH(lst) is also -1.", "isCorrect": false, "rationale": "List length is always non-negative. Negative indices have no meaning in Pseudocode."}], "id": "q03"}, {"question": "A Python loop reads:\n\nlst = [10, 20, 30, 40]\nn = len(lst)\ni = 0\nwhile i < n:\n    print(lst[i])\n    i = i + 1\n\nWhich AP Pseudocode loop produces the same printed output?", "options": [{"text": "i <- 0\nREPEAT UNTIL (i = n)\n    DISPLAY(lst[i])\n    i <- i + 1", "isCorrect": false, "rationale": "Pseudocode is one-based, so starting at i <- 0 attempts to access lst[0], which is invalid in Pseudocode. The loop must start at 1."}, {"text": "i <- 1\nREPEAT UNTIL (i > n)\n    DISPLAY(lst[i])\n    i <- i + 1", "isCorrect": true, "rationale": "Start at 1 to access the first element under one-based indexing. Pseudocode's REPEAT UNTIL stops when the condition becomes true, so 'until i > n' is the inverse of Python's while i < n. Both loops display 10, 20, 30, 40."}, {"text": "i <- 1\nREPEAT UNTIL (i < n)\n    DISPLAY(lst[i])\n    i <- i + 1", "isCorrect": false, "rationale": "REPEAT UNTIL with i < n stops as soon as the condition is true. Since i = 1 already satisfies i < n at the start, the loop body would never run (or run incorrectly under different starting values). The correct condition is the inverse of Python's: i > n."}, {"text": "i <- 0\nREPEAT UNTIL (i >= n)\n    DISPLAY(lst[i])\n    i <- i + 1", "isCorrect": false, "rationale": "This uses Python-style indexing inside a Pseudocode loop. lst[0] is invalid in Pseudocode."}], "id": "q04"}, {"question": "STIMULUS: A multiple-choice item shows the AP Pseudocode\n\nFOR EACH i IN [1, LENGTH(L)]\n    DISPLAY(L[i])\n\nA student tries to trace by mentally translating to Python's range(len(L)) and writes 'starts at 0.' Which best explains the error?", "options": [{"text": "The student forgot that LENGTH() returns a string in Pseudocode.", "isCorrect": false, "rationale": "LENGTH() returns the integer count of list elements in Pseudocode, just like len() in Python. The error has nothing to do with return types."}, {"text": "The student silently switched index conventions; the Pseudocode bound starts at 1, not 0, so beginning at 0 produces a shifted answer.", "isCorrect": true, "rationale": "Pseudocode and Python use different index conventions. Mentally substituting range(len(L)) for [1, LENGTH(L)] without shifting indices by one is exactly the off-by-one trap the section warns against."}, {"text": "The Pseudocode loop is itself zero-indexed.", "isCorrect": false, "rationale": "The Pseudocode bound [1, LENGTH(L)] is one-indexed by design. The error is on the student's side, not the loop's."}, {"text": "Python's range() also starts at 1 by default.", "isCorrect": false, "rationale": "range(len(L)) generates integers starting at 0 by default. Python is zero-indexed."}], "id": "q05"}, {"question": "Identify the FIRST and LAST valid index of a Python list of length 6, and the FIRST and LAST valid index of an AP Pseudocode list of length 6.", "options": [{"text": "Python: 0 to 5; Pseudocode: 1 to 6.", "isCorrect": true, "rationale": "Python lists run 0 to len(lst) - 1 (inclusive). Pseudocode lists run 1 to LENGTH(lst) (inclusive). For length 6 these are 0..5 and 1..6 respectively."}, {"text": "Python: 1 to 6; Pseudocode: 0 to 5.", "isCorrect": false, "rationale": "Reversed. Python is zero-based and Pseudocode is one-based, not the other way around."}, {"text": "Both languages: 0 to 6.", "isCorrect": false, "rationale": "Index 6 is out of range for both length-6 lists. Python ends at 5; Pseudocode ends at 6 (the maximum index, not 6 valid plus one beyond)."}, {"text": "Python: 1 to 5; Pseudocode: 1 to 6.", "isCorrect": false, "rationale": "Python's first valid index is 0, not 1. Index 0 is the first element."}], "id": "q06"}, {"question": "STIMULUS: Two algorithms operate on the same list scores = [85, 92, 78, 95]:\n\nVersion A (Python):\nfor i in range(len(scores)):\n    total = total + scores[i]\n\nVersion B (Pseudocode):\nFOR EACH i IN [1, LENGTH(scores)]\n    total <- total + scores[i]\n\nWhich statement is true?", "options": [{"text": "Both versions sum the same four numbers but use different index labels: Python touches scores[0..3] while Pseudocode touches scores[1..4].", "isCorrect": true, "rationale": "The algorithm is identical (accumulate the sum) but the index labels are completely different because the languages disagree on where indexing starts. Both produce 350."}, {"text": "Version A skips the first element because it begins at index 0.", "isCorrect": false, "rationale": "Index 0 IS the first element in Python. Version A processes all four elements."}, {"text": "Version B includes one extra element compared to Version A.", "isCorrect": false, "rationale": "Both versions visit exactly four indices. The labels differ; the count does not."}, {"text": "Version B references an index that does not exist in Pseudocode.", "isCorrect": false, "rationale": "Index LENGTH(scores) = 4 is the last valid index in Pseudocode (one-indexed). The bound is correct."}], "id": "q07"}, {"question": "Which strategy does Section 5.2 recommend for avoiding off-by-one errors when hand-tracing a list-indexing problem on the AP exam?", "options": [{"text": "Always assume Python conventions because most programming languages are zero-indexed.", "isCorrect": false, "rationale": "Half the AP exam stimuli use Pseudocode, which is one-indexed. Defaulting to Python conventions is exactly how the off-by-one error happens."}, {"text": "Annotate the index convention at the top of every trace and label every index access explicitly with the language being used.", "isCorrect": true, "rationale": "The section emphasizes systematic annotation: write the source language at the top of your work and mark each index. This prevents the brain from silently switching systems mid-problem."}, {"text": "Convert every Pseudocode trace to Python before solving.", "isCorrect": false, "rationale": "Conversion is itself the source of off-by-one errors. The recommended technique is to trace in the source language with explicit index labels."}, {"text": "Skip indexing-heavy questions and rely on partial credit elsewhere.", "isCorrect": false, "rationale": "The Chief Reader reports indexing as the largest source of point loss. The fix is the annotation habit, not avoidance."}], "id": "q08"}, {"question": "The Python loop while i < n stops before reaching index n. The Pseudocode loop REPEAT UNTIL (i > n) stops AFTER processing index n. Why are the conditions inverted?", "options": [{"text": "Pseudocode while-loops run forever unless terminated manually.", "isCorrect": false, "rationale": "REPEAT UNTIL is a structured loop with a clear exit condition. It is not a runaway loop."}, {"text": "Python conditions express 'continue while true,' while REPEAT UNTIL conditions express 'stop when this becomes true' — they describe opposite Boolean states for the same loop.", "isCorrect": true, "rationale": "Python's while keeps going while the condition is true. Pseudocode's REPEAT UNTIL exits when the condition becomes true. Translating between them requires negating the Boolean. This is the inverted-condition rule from Section 4.2 reapplied here."}, {"text": "REPEAT UNTIL is one-indexed and while is zero-indexed.", "isCorrect": false, "rationale": "Indexing and loop semantics are separate concerns. The condition inversion exists regardless of how the language indexes lists."}, {"text": "Pseudocode has no while loop, so the condition order reverses.", "isCorrect": false, "rationale": "Pseudocode also has REPEAT UNTIL as its primary while-style loop. The inversion is in the truth-value direction, not in whether the construct exists."}], "id": "q09"}, {"question": "STIMULUS: An AP exam item shows a Python program that prints the last element of a list using lst[-1]. The student is asked to translate this to AP Pseudocode. Which translation earns full credit?", "options": [{"text": "DISPLAY(lst[-1])", "isCorrect": false, "rationale": "Pseudocode does not support negative indices. lst[-1] is invalid Pseudocode and would not earn credit."}, {"text": "DISPLAY(lst[0])", "isCorrect": false, "rationale": "lst[0] is invalid in Pseudocode (Pseudocode is one-indexed). Even in Python, lst[0] is the FIRST element, not the last."}, {"text": "DISPLAY(lst[LENGTH(lst)])", "isCorrect": true, "rationale": "AP Pseudocode is one-indexed, so the last element is at index LENGTH(lst). This is the only valid translation of Python's lst[-1] when the goal is to access the last element."}, {"text": "DISPLAY(lst[LENGTH(lst) - 1])", "isCorrect": false, "rationale": "That would be the SECOND-TO-LAST element in Pseudocode (one-indexed). The last element is at index LENGTH(lst), not LENGTH(lst) - 1. (LENGTH(lst) - 1 would correspond to lst[-2] in Python.)"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
