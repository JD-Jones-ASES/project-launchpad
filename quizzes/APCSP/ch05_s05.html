<body>
<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>

        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Search Algorithms</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A sorted list contains 256 elements. What is the maximum number of comparisons binary search will make to locate a target?", "options": [{"text": "8, because log_2(256) = 8.", "isCorrect": true, "rationale": "Binary search halves the search space with each comparison: 256 -> 128 -> 64 -> 32 -> 16 -> 8 -> 4 -> 2 -> 1, which is exactly log_2(256) = 8 comparisons in the worst case."}, {"text": "256, because every element might need to be checked.", "isCorrect": false, "rationale": "256 is the worst-case for LINEAR search, not binary. Binary search uses the sorted order to discard half the candidates per comparison."}, {"text": "16, because the square root of 256 is 16.", "isCorrect": false, "rationale": "Binary search runs in O(log n), not O(sqrt(n)). The exponent base is 2, giving log_2(256) = 8."}, {"text": "128, because half the list might need to be searched.", "isCorrect": false, "rationale": "Binary search discards half the REMAINING elements with each step, not just once. After the first comparison only 128 candidates remain; the second comparison narrows to 64, and so on."}]}, {"question": "What MUST be true about a list before binary search can correctly find a target in it?", "options": [{"text": "The list must contain only positive integers.", "isCorrect": false, "rationale": "Binary search has no requirement on element type or sign. It works on sorted lists of any comparable values (integers, floats, strings, etc.)."}, {"text": "The list must be sorted in ascending order (or in some consistent order the algorithm knows about).", "isCorrect": true, "rationale": "Binary search depends on the invariant 'if midpoint > target, target is in the left half; else in the right half.' This invariant only holds when the list is sorted. On an unsorted list, binary search may discard the half that actually contains the target."}, {"text": "The list must have an even number of elements.", "isCorrect": false, "rationale": "Binary search works on lists of any length. The midpoint calculation (low + high) // 2 handles odd-length and even-length lists identically."}, {"text": "The list must contain at least one duplicate of the target.", "isCorrect": false, "rationale": "Binary search returns -1 if the target is not present and a valid index if it is — it does not require any duplicates. The requirement is sortedness, not target presence."}]}, {"question": "Name ONE situation where linear search is the BETTER choice over binary search, even for a large list.", "options": [{"text": "When the data is unsorted and will be searched only a few times — sorting first would cost more than the savings binary search provides.", "isCorrect": true, "rationale": "Sorting itself costs O(n log n). If the list is unsorted and you only need to search once or twice, paying for the sort exceeds the linear-search cost. Binary search only pays off when many searches amortize the sort cost."}, {"text": "When the list is already sorted and you need to find an element quickly.", "isCorrect": false, "rationale": "On a sorted list, binary search is the better choice: O(log n) vs. O(n). Linear search is wasteful when the data is already sorted."}, {"text": "When you need to find the maximum value in the list.", "isCorrect": false, "rationale": "For finding a maximum (not a target), neither algorithm is appropriate; you would scan the list with the max-pattern loop. Among search algorithms specifically, sortedness vs. unsortedness drives the choice."}, {"text": "When the list has fewer than 4 elements.", "isCorrect": false, "rationale": "While linear search is comparable to binary search at very small sizes, the canonical 'when linear wins' answer is unsortedness (or single-search use). Tiny size is a weaker argument."}]}, {"question": "STIMULUS: Consider this Python implementation:\n\ndef binary_search(lst, target):\n    low = 0\n    high = len(lst) - 1\n    while low <= high:\n        mid = (low + high) // 2\n        if lst[mid] == target:\n            return mid\n        elif lst[mid] < target:\n            low = mid + 1\n        else:\n            high = mid - 1\n    return -1\n\nIn AP Pseudocode, what is the FIRST index binary search should set as low? What is the FIRST index it should set as high?", "options": [{"text": "low <- 0, high <- LENGTH(lst) - 1", "isCorrect": false, "rationale": "Pseudocode is one-indexed. Starting low at 0 references an invalid index, and high at LENGTH(lst) - 1 is one less than the actual last index in Pseudocode."}, {"text": "low <- 1, high <- LENGTH(lst)", "isCorrect": true, "rationale": "Under one-based indexing, the first valid index is 1 and the last is LENGTH(lst). Both ends shift by one compared to the Python implementation."}, {"text": "low <- 1, high <- LENGTH(lst) - 1", "isCorrect": false, "rationale": "high should be LENGTH(lst), the last valid Pseudocode index. LENGTH(lst) - 1 is the second-to-last index in Pseudocode."}, {"text": "low <- -1, high <- LENGTH(lst)", "isCorrect": false, "rationale": "Negative indices are invalid in Pseudocode. The first valid Pseudocode index is 1."}]}, {"question": "STIMULUS: data = [1, 2, 3, 5, 7, 10, 12, 14, 17, 19, 22, 25, 28, 31, 36, 40] (16 elements, sorted). Binary search is applied with target = 22. What is the maximum number of comparisons needed, and why?", "options": [{"text": "16, because the worst case examines every element.", "isCorrect": false, "rationale": "16 is the worst case for LINEAR search. Binary search halves the search space per comparison."}, {"text": "4, because log_2(16) = 4.", "isCorrect": true, "rationale": "Binary search on n = 16 takes at most log_2(16) = 4 comparisons. The search space halves: 16 -> 8 -> 4 -> 2 -> 1 in four steps."}, {"text": "8, because half of 16 is 8.", "isCorrect": false, "rationale": "8 would be a single halving. Binary search halves repeatedly; 16 elements take log_2(16) = 4 comparisons in the worst case."}, {"text": "1, because 22 is in the middle of the list.", "isCorrect": false, "rationale": "Even if 22 happens to be at the midpoint on the first comparison, the WORST case (target at the edges or absent) is what big-O bounds describe — and that is 4 for n = 16."}]}, {"question": "What goes wrong if you run binary search on an UNSORTED list?", "options": [{"text": "Python automatically sorts the list before running binary search.", "isCorrect": false, "rationale": "Python does no such auto-sort. The function operates on whatever list you pass it. Running binary search on an unsorted list is a programmer error and produces incorrect results silently."}, {"text": "The algorithm raises a SortError exception.", "isCorrect": false, "rationale": "There is no SortError. The algorithm runs to completion on unsorted data; it just returns wrong answers."}, {"text": "The algorithm may discard the half of the list that actually contains the target, returning -1 even when the target is present.", "isCorrect": true, "rationale": "Binary search relies on the invariant that elements smaller than the midpoint are in the left half and larger are in the right half. Without sortedness, that invariant is broken; the algorithm may eliminate the half that contains the target. The return value is unreliable."}, {"text": "The algorithm always returns 0.", "isCorrect": false, "rationale": "The return value depends on the unsorted list's contents. It may return a valid index, an incorrect index, or -1. There is no constant return value for unsorted input."}]}, {"question": "STIMULUS: Linear search on a list of 1,000,000 unsorted elements; binary search on a SORTED list of 1,000,000 elements. What are the worst-case comparison counts?", "options": [{"text": "Linear: 1,000,000 comparisons; Binary: at most 20 comparisons.", "isCorrect": true, "rationale": "Linear search examines every element in the worst case (target last or absent). Binary search makes at most log_2(1,000,000) which is approximately 20 comparisons. The dramatic asymmetry is why binary search is chosen for large sorted datasets."}, {"text": "Linear: 500,000 comparisons; Binary: 10 comparisons.", "isCorrect": false, "rationale": "500,000 is the AVERAGE for linear search (target equally likely anywhere). The WORST case is 1,000,000. Binary search worst case is log_2(10^6), about 20."}, {"text": "Linear: 1,000,000; Binary: 1,000,000.", "isCorrect": false, "rationale": "Binary search does not need 1,000,000 comparisons. With sorted data it halves the search space each step, yielding about 20."}, {"text": "Linear: 100; Binary: 10.", "isCorrect": false, "rationale": "Linear search worst case is the list size (1,000,000), not 100. Binary search worst case is log_2(n), about 20."}]}, {"question": "What is the cost analysis of the SORTING step that binary search depends on, and what does it imply about when binary search is worth using?", "options": [{"text": "Sorting is free (O(1)), so binary search is always worth using.", "isCorrect": false, "rationale": "Sorting is not free; it costs O(n log n) for efficient algorithms. Whether binary search is worth using depends on whether the sort cost is amortized over many searches."}, {"text": "Sorting costs roughly O(n log n) for the most efficient algorithms. Binary search is worth the sort cost only when the same sorted data will be searched many times — the sort cost amortizes over multiple searches.", "isCorrect": true, "rationale": "If you sort once (O(n log n)) and then perform k searches at O(log n) each, total cost is O(n log n + k log n). For large k this is far better than k linear searches at O(n) each. For small k, sorting first is worse than just running linear search."}, {"text": "Sorting costs O(n^2), so binary search is rarely worth it.", "isCorrect": false, "rationale": "While simple sorts (e.g., bubble sort) are O(n^2), efficient general-purpose sorts (mergesort, quicksort) run in O(n log n). The amortization argument is the reason binary search is widely used."}, {"text": "Sorting costs O(log n), so binary search is always faster overall.", "isCorrect": false, "rationale": "Sorting is at least O(n log n), not O(log n). The argument for binary search depends on amortizing this cost across many searches."}]}, {"question": "Linear search is described as having O(n) worst-case time complexity. What does this mean in practical terms for a list of 1,000 elements?", "options": [{"text": "The search will take at most about 1,000 comparisons in the worst case (target last or absent).", "isCorrect": true, "rationale": "O(n) worst case means the comparison count grows linearly with list size. For n = 1,000 the worst case is about 1,000 comparisons, when the target is at the end or not present."}, {"text": "The search will take exactly 1,000 microseconds.", "isCorrect": false, "rationale": "Big-O bounds the COUNT of operations, not absolute time. Wall-clock time depends on hardware, not on the asymptotic class."}, {"text": "The search will take 10 comparisons because log_2(1000) is approximately 10.", "isCorrect": false, "rationale": "log_2(1000) approximately 10 is the binary-search bound. Linear search runs in O(n), giving about 1,000 comparisons in the worst case."}, {"text": "The search will take 1,000^2 comparisons.", "isCorrect": false, "rationale": "O(n^2) describes a different class (e.g., naive sorting). Linear search is O(n), proportional to the list size."}]}, {"question": "Tony Hoare invented quicksort in 1959-1960. Which other contribution of Hoare's, mentioned in the section, did he later call 'my billion-dollar mistake'?", "options": [{"text": "The for loop construct.", "isCorrect": false, "rationale": "Hoare did not invent the for loop. The 'billion-dollar mistake' he named was the null reference."}, {"text": "Quicksort itself.", "isCorrect": false, "rationale": "Hoare was proud of quicksort. The remark 'my billion-dollar mistake' refers to a different contribution: the null reference."}, {"text": "The null reference, because null-pointer errors became one of the most common sources of software bugs.", "isCorrect": true, "rationale": "Hoare introduced the null reference as a design choice and decades later publicly called it his 'billion-dollar mistake' because of the enormous accumulated cost of null-pointer errors in production software."}, {"text": "The CSP process calculus.", "isCorrect": false, "rationale": "CSP (communicating sequential processes) is one of Hoare's celebrated contributions, influencing Go, Erlang, and Rust. It is not what he called a mistake."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
