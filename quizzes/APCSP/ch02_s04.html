<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Strings and System I/O</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Predict the output and identify the bug in this program:\n\ncount = input(\"How many apples? \")\n# user types: 5\ntotal = count + 3", "options": [{"text": "total is the integer 8 because Python automatically converts the input to a number.", "isCorrect": false, "rationale": "Python does not auto-convert. input() always returns a string regardless of what the user types."}, {"text": "total is the string \"8\" because + concatenates a string and a number.", "isCorrect": false, "rationale": "Mixing a string and an integer with + raises a TypeError; it does not silently produce \"8\"."}, {"text": "TypeError: can only concatenate str (not \"int\") to str. The bug is that input() returns a string, so count is \"5\" (a two-character string \"5\"). The fix is `count = int(input(\"How many apples? \"))`.", "isCorrect": true, "rationale": "This matches the section's exact buggy/fix walkthrough. input() always returns a string; arithmetic requires explicit int() or float() conversion."}, {"text": "total is the string \"53\" because Python concatenates the user's input to the literal 3.", "isCorrect": false, "rationale": "Python raises TypeError before any concatenation can happen — \"5\" + 3 is not legal because the integer 3 is not a string."}], "id": "q01"}, {"question": "A student writes one line of Python that reads the user's age as an integer and stores it in a variable called `age`. Which line is correct?", "options": [{"text": "`age = input(\"Enter age: \")` — input always returns a string, but Python will convert it when used in arithmetic.", "isCorrect": false, "rationale": "Python does NOT auto-convert. age remains a string until explicit int() or float() wrapping."}, {"text": "`age = int(input(\"Enter age: \"))` — wrap input() in int() so the returned string is converted before assignment.", "isCorrect": true, "rationale": "The section's exact rule: wrap input() in int() (or float()) whenever you need to do arithmetic on the user's response."}, {"text": "`age = str(input(\"Enter age: \"))` — wrap input() in str() to ensure it's a string.", "isCorrect": false, "rationale": "input() already returns a string; wrapping in str() is redundant and does not produce an integer."}, {"text": "`int(age) = input(\"Enter age: \")` — Python permits assignment to function calls.", "isCorrect": false, "rationale": "Python does not permit assigning to a function call; this line is a SyntaxError. Assignment targets must be names or container indices."}], "id": "q02"}, {"question": "Predict the output of this code, assuming the user types `3`:\n\nx = input(\"Enter a number: \")\nprint(x + x)", "options": [{"text": "6, because Python adds the two integers.", "isCorrect": false, "rationale": "input() returns a string, not an integer. + on two strings concatenates."}, {"text": "33, because input() returns the string \"3\", and \"3\" + \"3\" concatenates to \"33\".", "isCorrect": true, "rationale": "This matches the section's exact end-of-section prompt. + on two strings is concatenation, not addition."}, {"text": "TypeError, because + cannot operate on input results.", "isCorrect": false, "rationale": "+ on two strings is perfectly legal; it concatenates them. There is no TypeError."}, {"text": "9, because Python multiplies x by itself.", "isCorrect": false, "rationale": "Python does not multiply when the operator is +. + concatenates strings."}], "id": "q03"}, {"question": "Which of the following correctly identifies what `int(\"hello\")` does in Python, and how it relates to the three error categories?", "options": [{"text": "It returns 0 because empty content defaults to zero.", "isCorrect": false, "rationale": "int() does not return 0 for unparseable strings; it raises an exception."}, {"text": "It silently returns None.", "isCorrect": false, "rationale": "int() raises an error rather than returning None on bad input."}, {"text": "It raises a ValueError because the string contains non-numeric characters that cannot be converted to an integer. ValueError is a runtime error category.", "isCorrect": true, "rationale": "The section explicitly states that int(\"hello\") raises ValueError. ValueError signals a value of the right type but the wrong content. Runtime errors are the second of three error categories covered in 2.5."}, {"text": "It compiles successfully and prints \"hello\".", "isCorrect": false, "rationale": "Python is interpreted, not compiled, and int(\"hello\") raises an exception rather than printing anything."}], "id": "q04"}, {"question": "Which of the following is the f-string equivalent of: `\"Score: \" + str(score) + \" out of \" + str(total)` when score = 95 and total = 100?", "options": [{"text": "f\"Score: {score} out of {total}\" — embed expressions in curly braces; Python automatically converts each value to a string.", "isCorrect": true, "rationale": "The section explicitly states f-strings convert embedded values automatically, so explicit str() calls are unnecessary. Both produce \"Score: 95 out of 100\"."}, {"text": "f\"Score: score out of total\" — f-strings expand any word inside the string.", "isCorrect": false, "rationale": "f-strings only expand expressions inside curly braces. Without braces, score and total are taken as literal text."}, {"text": "f\"Score: + score + out of + total\" — use + to concatenate inside f-strings.", "isCorrect": false, "rationale": "Inside f-strings, embed expressions in {}; do not use + as in old-style concatenation."}, {"text": "\"Score: + score + out of + total\" — f-strings are written with double quotes only.", "isCorrect": false, "rationale": "Without the f prefix and without {}, this is a literal string that prints \"Score: + score + out of + total\" verbatim."}], "id": "q05"}, {"question": "What does `print(\"a\", \"b\", \"c\", sep=\"-\")` produce, and what role does the sep keyword argument play?", "options": [{"text": "a-b-c. The sep keyword argument changes the string Python inserts between print's multiple arguments. Default is a single space; sep=\"-\" replaces spaces with dashes.", "isCorrect": true, "rationale": "This matches the section's print() walkthrough. sep customizes the separator between multiple arguments. The default is a single space; supplying sep=\"-\" prints dashes."}, {"text": "abc, because Python ignores commas in print.", "isCorrect": false, "rationale": "Python honors commas as argument separators; the default sep is a single space, not the empty string."}, {"text": "a b c (with spaces), because print always uses spaces.", "isCorrect": false, "rationale": "The default separator is a space, but sep=\"-\" overrides it. The whole point of sep is that the default can be replaced."}, {"text": "a, b, c (with commas), because Python preserves the commas in the source code.", "isCorrect": false, "rationale": "Commas in the source code are argument separators, not output. They are not literally printed."}], "id": "q06"}, {"question": "What does `print(\"=\" * 20)` produce, and which Python feature does it demonstrate?", "options": [{"text": "20 = signs in a row (====================), demonstrating string repetition: when one operand of * is a string and the other is an integer, * repeats the string that many times.", "isCorrect": true, "rationale": "This is the section's exact example. * on a string and an integer is repetition. Twenty `=` characters end-to-end is a common formatting trick."}, {"text": "20.0, the float result of multiplying 20 by =.", "isCorrect": false, "rationale": "= is a string, not an arithmetic operator. * does not perform arithmetic when an operand is a string."}, {"text": "TypeError, because * cannot operate on strings.", "isCorrect": false, "rationale": "Strings can be multiplied by integers (repetition). The error would arise only with two strings."}, {"text": "= * 20, printed verbatim.", "isCorrect": false, "rationale": "Python evaluates the expression \"=\" * 20 before printing. The result is repetition."}], "id": "q07"}, {"question": "Translate this Python pair into AP Pseudocode:\n\nname = input(\"Enter name: \")\nprint(\"Hello,\", name)", "options": [{"text": "name <- INPUT()\\nDISPLAY(\"Hello, \" + name)\\nAP Pseudocode INPUT() takes no prompt argument; the exam describes typed input in surrounding narrative.", "isCorrect": true, "rationale": "The section explicitly notes AP INPUT() does not accept a prompt; DISPLAY() prints its argument with concatenation as needed. This is the exact pseudocode equivalent."}, {"text": "name = input()\\nprint(\"Hello, \" + name)\\nAP Pseudocode is identical to Python.", "isCorrect": false, "rationale": "AP Pseudocode is not identical to Python. Assignment is `<-`, input is INPUT(), output is DISPLAY()."}, {"text": "READ name\\nWRITE \"Hello, \", name\\nThese are the AP Pseudocode keywords.", "isCorrect": false, "rationale": "The AP Pseudocode keywords are INPUT and DISPLAY, not READ and WRITE."}, {"text": "INPUT name\\nDISPLAY name\\nINPUT and DISPLAY take variables directly.", "isCorrect": false, "rationale": "AP Pseudocode uses function-call syntax: name <- INPUT() and DISPLAY(\"Hello, \" + name). It does not use the bare-statement form shown here."}], "id": "q08"}, {"question": "A student writes the buggy line `print(\"Score: \" + 95)` expecting to print `Score: 95`. What error does Python raise, and what is the correct fix?", "options": [{"text": "TypeError: can only concatenate str (not \"int\") to str. Fix with str() conversion: `print(\"Score: \" + str(95))`. Or use an f-string: `print(f\"Score: {95}\")`.", "isCorrect": true, "rationale": "The section explicitly notes that mixing string and int with + raises a TypeError. Two correct fixes are str() conversion or f-strings. The f-string is preferred in modern Python."}, {"text": "SyntaxError, because + cannot have a string and number on either side.", "isCorrect": false, "rationale": "It is a TypeError, not a SyntaxError. Python's parser accepts the expression; the error happens at runtime when + tries to combine incompatible types."}, {"text": "ValueError, because the value 95 is wrong.", "isCorrect": false, "rationale": "The value 95 is a valid integer. The problem is type compatibility with +, not the value."}, {"text": "It runs successfully and prints \"Score: 95\".", "isCorrect": false, "rationale": "It does not run successfully. Python raises TypeError before printing."}], "id": "q09"}, {"question": "What does `len(\"Hello, World!\")` return, and which characters are counted?", "options": [{"text": "13. len() counts every character in the string, including spaces and punctuation.", "isCorrect": true, "rationale": "Hello, World! is 5 (Hello) + 1 (,) + 1 (space) + 5 (World) + 1 (!) = 13. The section explicitly states spaces and punctuation count."}, {"text": "10. len() counts only the letters.", "isCorrect": false, "rationale": "len() counts every character, not only letters. Spaces and punctuation count."}, {"text": "2. len() counts the number of words.", "isCorrect": false, "rationale": "len() does not count words. It counts characters."}, {"text": "12. len() ignores trailing punctuation.", "isCorrect": false, "rationale": "len() does not ignore any character. The exclamation mark is counted along with everything else."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
