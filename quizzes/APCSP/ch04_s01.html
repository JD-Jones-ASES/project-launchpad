<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Definite Loops</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A definite loop is best described as a control structure that:", "options": [{"text": "Repeats a block of code as long as a Boolean condition remains true.", "isCorrect": false, "rationale": "That description fits an indefinite (while) loop, where the number of iterations depends on a condition evaluated at runtime."}, {"text": "Repeats a block of code a fixed, predetermined number of times.", "isCorrect": true, "rationale": "A definite loop has its iteration count specified up front. In Python, for i in range(n) and in AP Pseudocode REPEAT n TIMES both run the body exactly n times."}, {"text": "Executes its body once and then optionally repeats based on user input.", "isCorrect": false, "rationale": "That describes a do-while or sentinel-controlled pattern, not a definite loop. Definite loops have their count fixed before they start."}, {"text": "Runs forever unless the program is forcibly terminated.", "isCorrect": false, "rationale": "An unbounded loop is an infinite loop, which is a bug in indefinite loops. Definite loops always terminate after their predetermined count."}]}, {"question": "What does the following Python code print?\n\nfor i in range(3, 8):\n    print(i, end=' ')", "options": [{"text": "3 4 5 6 7 8", "isCorrect": false, "rationale": "This includes the upper bound. Python's range(a, b) excludes b — the value 8 is never assigned to i."}, {"text": "3 4 5 6 7", "isCorrect": true, "rationale": "range(3, 8) produces 3, 4, 5, 6, 7 — the upper bound 8 is excluded. Five values total, ending one before 8."}, {"text": "0 1 2 3 4 5 6 7", "isCorrect": false, "rationale": "range(3, 8) starts at 3, not at 0. Only one argument (range(n)) starts at 0."}, {"text": "4 5 6 7 8", "isCorrect": false, "rationale": "range starts at the first argument (3), not at first+1, and excludes the upper bound (8)."}]}, {"question": "You want a Python loop that prints every integer from 1 to 10 inclusive. Which call to range() is correct?", "options": [{"text": "range(1, 10)", "isCorrect": false, "rationale": "This produces 1, 2, ..., 9 — it stops one short because range excludes the upper bound. This is the classic off-by-one trap."}, {"text": "range(0, 11)", "isCorrect": false, "rationale": "This produces 0 through 10 — it includes 0, which the question did not ask for."}, {"text": "range(1, 11)", "isCorrect": true, "rationale": "range(1, 11) produces 1, 2, ..., 10. To include the value 10 you must pass 11 as the upper bound, since range excludes the upper end."}, {"text": "range(10)", "isCorrect": false, "rationale": "range(10) starts at 0 and stops at 9 — it neither starts at 1 nor includes 10."}]}, {"question": "Translate the Python loop\n\nfor i in range(7):\n    print('hi')\n\nto AP Pseudocode.", "options": [{"text": "REPEAT 7 TIMES { DISPLAY('hi') }", "isCorrect": true, "rationale": "range(7) iterates 7 times. REPEAT 7 TIMES executes the body exactly 7 times. Note that AP Pseudocode REPEAT does not expose a loop variable, but here the body never uses i, so the translation is direct."}, {"text": "REPEAT 6 TIMES { DISPLAY('hi') }", "isCorrect": false, "rationale": "range(7) produces 7 values (0 through 6), so the body executes 7 times, not 6. This is the off-by-one trap going the wrong direction."}, {"text": "REPEAT UNTIL (i = 7) { DISPLAY('hi') }", "isCorrect": false, "rationale": "REPEAT UNTIL is the pseudocode form of an indefinite (while-style) loop. A definite loop with a known count translates to REPEAT n TIMES."}, {"text": "FOR EACH i IN [0, 1, 2, 3, 4, 5, 6] { DISPLAY('hi') }", "isCorrect": false, "rationale": "FOR EACH iterates over a list — it is the pseudocode counterpart of for i in some_list, not for i in range(n). REPEAT n TIMES is the simpler and standard match for range(n)."}]}, {"question": "Trace the following code and determine the final value of total.\n\ntotal = 0\nfor i in range(1, 5):\n    total = total + i", "options": [{"text": "10", "isCorrect": true, "rationale": "range(1, 5) yields i = 1, 2, 3, 4. After each iteration total becomes 1, 3, 6, 10. The final value is 10 (1+2+3+4)."}, {"text": "15", "isCorrect": false, "rationale": "15 = 1+2+3+4+5, but range(1, 5) stops at 4 — it excludes the upper bound. This is the classic off-by-one error: assuming range(1, 5) includes 5."}, {"text": "6", "isCorrect": false, "rationale": "6 = 1+2+3, which would be the result of range(1, 4) — running one iteration too few. range(1, 5) does run for i = 4."}, {"text": "0", "isCorrect": false, "rationale": "total starts at 0 but is updated inside the loop body. After four iterations it becomes 10."}]}, {"question": "Which statement most accurately compares Python's for i in range(n) loop with AP Pseudocode's REPEAT n TIMES?", "options": [{"text": "They iterate the same number of times, but REPEAT n TIMES exposes no loop variable; you cannot reference i inside it.", "isCorrect": true, "rationale": "Both run the body exactly n times. The distinction is that AP Pseudocode REPEAT counts silently — if your algorithm needs the iteration index, you must maintain a counter manually."}, {"text": "REPEAT n TIMES runs n+1 times because the count is inclusive of n.", "isCorrect": false, "rationale": "REPEAT n TIMES runs the body exactly n times — not n+1. The off-by-one trap concerns range, not REPEAT."}, {"text": "Python's loop uses indentation; REPEAT n TIMES requires a separate END FOR keyword.", "isCorrect": false, "rationale": "AP Pseudocode marks the loop body with brace notation, not END FOR. Indentation vs. braces is a syntactic difference but not the most important conceptual distinction."}, {"text": "REPEAT n TIMES iterates only when n > 0; range(n) iterates even when n = 0.", "isCorrect": false, "rationale": "Both behave identically for n = 0 — they execute the body zero times. There is no asymmetry here."}]}, {"question": "How many times does the inner print() execute in this nested loop?\n\nfor row in range(1, 4):\n    for col in range(1, 5):\n        print(row * col)", "options": [{"text": "7 times — the outer loop runs 3 times plus the inner loop runs 4 times.", "isCorrect": false, "rationale": "Nested loops multiply, they do not add. Each outer iteration triggers all inner iterations from scratch."}, {"text": "12 times — the outer loop runs 3 times and the inner loop runs 4 times for each.", "isCorrect": true, "rationale": "range(1, 4) has 3 values (1, 2, 3); range(1, 5) has 4 values (1, 2, 3, 4). The inner body runs 3 x 4 = 12 times — the canonical pattern for traversing rows-by-columns of a grid."}, {"text": "20 times — both ranges include their upper bounds.", "isCorrect": false, "rationale": "range excludes the upper bound. range(1, 4) = 3 values, not 4; range(1, 5) = 4 values, not 5. So 3 x 4 = 12, not 4 x 5 = 20."}, {"text": "6 times — only when row * col is unique.", "isCorrect": false, "rationale": "The print statement runs once per inner-loop iteration regardless of whether the product is unique. Total = 3 x 4 = 12."}]}, {"question": "Which Python loop prints the even numbers 2, 4, 6, 8, 10 in order, using the step argument of range()?", "options": [{"text": "for i in range(2, 10, 2): print(i)", "isCorrect": false, "rationale": "range(2, 10, 2) produces 2, 4, 6, 8 — it stops before 10 because the upper bound is excluded. Missing the value 10 is an off-by-one error."}, {"text": "for i in range(2, 11, 2): print(i)", "isCorrect": true, "rationale": "range(2, 11, 2) starts at 2, increments by 2, and stops before 11. It produces 2, 4, 6, 8, 10 — all five even numbers requested."}, {"text": "for i in range(0, 10, 2): print(i)", "isCorrect": false, "rationale": "range(0, 10, 2) produces 0, 2, 4, 6, 8 — it includes 0 and excludes 10. Two errors compounded."}, {"text": "for i in range(1, 11): if i % 2 == 0: print(i)", "isCorrect": false, "rationale": "This works but does not use the step argument as the question requested. The question targets understanding of range's third parameter."}]}, {"question": "Why does AP Pseudocode require you to maintain an explicit counter variable when you need the iteration index, even though Python does not?", "options": [{"text": "Because AP Pseudocode does not support arithmetic.", "isCorrect": false, "rationale": "AP Pseudocode supports arithmetic and assignment freely (with the <- operator). The reason for an explicit counter is structural, not arithmetic."}, {"text": "Because the REPEAT n TIMES construct counts iterations silently and exposes no loop variable, so you cannot reference i inside the body.", "isCorrect": true, "rationale": "REPEAT n TIMES is intentionally minimal — it just repeats. To track which iteration is current, you must explicitly write count <- 0 before the loop and count <- count + 1 inside."}, {"text": "Because Python uses 0-based indexing and Pseudocode uses 1-based indexing.", "isCorrect": false, "rationale": "Indexing convention is a separate issue. The relevant point is that REPEAT exposes no loop variable at all, regardless of indexing."}, {"text": "Because AP Pseudocode loops are limited to a maximum of 100 iterations.", "isCorrect": false, "rationale": "There is no such cap in AP Pseudocode. The constraint is purely structural: REPEAT n TIMES does not expose a counter."}]}, {"question": "A student writes for i in range(1, N): expecting it to process N items, but their program is missing the final item every time. What is the bug, and how should they fix it?", "options": [{"text": "The bug is using range with two arguments. The student should write range(N) instead.", "isCorrect": false, "rationale": "range(N) produces 0 through N-1 — it still excludes N, and now starts at 0 rather than 1. This does not solve the problem and changes the start value."}, {"text": "The bug is the off-by-one error: range(1, N) produces 1 through N-1, missing N. The fix is range(1, N+1).", "isCorrect": true, "rationale": "Python's range excludes its upper bound. To include N, the upper bound must be N+1. This is the most common AP-exam loop bug."}, {"text": "The bug is that Python loops cannot start at 1; they must start at 0.", "isCorrect": false, "rationale": "Python loops can start at any integer, including 1, with range(start, stop). The bug is the upper bound, not the start value."}, {"text": "The bug is that the loop runs N times, but the condition should run forever.", "isCorrect": false, "rationale": "The student wants exactly N iterations — a definite loop. The diagnosis is the off-by-one error on the upper bound, not the loop construct itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
