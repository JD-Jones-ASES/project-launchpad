    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; The Video Demonstration</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student finishes recording and the file is 62 seconds long. Which strategy is the LEAST effective way to bring the video under the 60-second limit without re-recording from scratch?", "options": [{"text": "Add a longer title-card pause at the start to give the reader more time to read context.", "isCorrect": true, "rationale": "Adding any content lengthens the video — the opposite of what's needed. Effective strategies trim existing content: cut the title card, speed up dead time, remove pauses between input and output."}, {"text": "Trim the title card or splash screen at the beginning of the video.", "isCorrect": false, "rationale": "Title cards are commonly added as a 5-second buffer that the rubric does not require. Cutting them is one of the fastest ways to recover the over-budget seconds without losing required demo content."}, {"text": "Speed up dead-time pauses (typing pauses, scroll pauses) in the editor.", "isCorrect": false, "rationale": "Editing software can compress idle moments without removing required demonstration steps. This is a standard fix for borderline-length recordings."}, {"text": "Remove the second redundant input demonstration if both calls produce the same output type.", "isCorrect": false, "rationale": "The video must show two different argument values producing different outputs — but if a student over-recorded and showed three or four examples, trimming back to the minimum two is a legitimate way to shorten."}]}, {"question": "Why is calling compute_streak() twice with different arguments during the video (once with \"math\", once with \"spanish\") strategically important — beyond just demonstration clarity?", "options": [{"text": "The Procedural Abstraction rubric row requires evidence that the same procedure produces different results when called with different arguments. Two visible calls with two visible outputs convert this from a Written Response claim to direct video evidence.", "isCorrect": true, "rationale": "Section 9.3 explicitly notes the rubric demands procedure-with-different-arguments evidence. The video provides this without requiring the reader to trust the Written Response — the difference in outputs is observable to the reader."}, {"text": "Two calls double the runtime, helping fill the 60 seconds.", "isCorrect": false, "rationale": "The 60 seconds is a ceiling, not a target. Padding for runtime is counterproductive — it risks exceeding the limit and adds no rubric-relevant content."}, {"text": "Two calls prove the procedure has no bugs.", "isCorrect": false, "rationale": "Bug-free demonstration is not what the rubric scores in the video. The rubric scores procedural abstraction (different arguments → different outputs), not test-coverage."}, {"text": "Two calls satisfy the input requirement twice.", "isCorrect": false, "rationale": "The input requirement is satisfied with one user input event. Procedure calls are not the same as user input events."}]}, {"question": "Which constraint on the Create PT video is described as a binary pass/fail in Section 9.3, with no partial credit for being close?", "options": [{"text": "Length — a 61-second video earns automatic zero on the video-related rubric rows.", "isCorrect": true, "rationale": "Section 9.3 explicitly states \"there is no partial credit for being close.\" The 60-second ceiling is enforced by the upload system and by readers; one second over disqualifies the artifact."}, {"text": "Pixel resolution — videos under 720p lose points proportionally.", "isCorrect": false, "rationale": "Resolution is not specified in the rubric as a pass/fail criterion. Legibility of the output matters, but specific resolution thresholds are not listed."}, {"text": "Frame rate — videos must be exactly 30 frames per second.", "isCorrect": false, "rationale": "The Task Guidelines do not impose a specific frame rate. Common screen-recording defaults (24, 30, or 60 fps) are all acceptable."}, {"text": "Encoding format — only H.264 codec is permitted.", "isCorrect": false, "rationale": "MP4, MOV, and WMV are the listed accepted containers; specific codec is not constrained the same way duration is."}]}, {"question": "Stimulus: A student records a clean demo and adds voice-over commentary to \"explain\" what the program is doing, believing this will help the reader. What is the consequence on the rubric?", "options": [{"text": "The video is automatically disqualified — voice narration is explicitly prohibited in the Task Guidelines, and the prohibition applies regardless of how helpful the narration is intended to be.", "isCorrect": true, "rationale": "Section 9.3 lists voice narration among the four common pitfalls: \"Voice-over commentary automatically disqualifies the video.\" The reasoning is that the Written Response is the place for explanation, not the video."}, {"text": "The narration earns extra credit if the explanation is technically accurate.", "isCorrect": false, "rationale": "There is no extra-credit mechanism. Narration is prohibited, and accuracy of the explanation does not exempt the artifact from disqualification."}, {"text": "The narration is allowed if it does not contain identifying information.", "isCorrect": false, "rationale": "Identifying information is a separate prohibition. Narration is independently prohibited regardless of its content."}, {"text": "Narration is allowed for the first 30 seconds only.", "isCorrect": false, "rationale": "There is no time-window exception. Voice-over for any portion of the video disqualifies the artifact."}]}, {"question": "Which of the following accidentally identifying-information violations is MOST commonly missed by students preparing the Create PT video?", "options": [{"text": "A username visible in the file path at the top of the IDE window (e.g., C:\\Users\\jane.smith\\Documents\\study_tracker.py).", "isCorrect": true, "rationale": "Section 9.3 cites this as one of the most-missed violations. The student is focused on the program output and forgets that the IDE chrome shows the operating-system username, which can identify the submitter."}, {"text": "Variables named common dictionary words like score or count.", "isCorrect": false, "rationale": "Common variable names are not identifying. The prohibition covers personal names, school names, usernames, email addresses, and similar — not generic English words."}, {"text": "The use of comments inside the program (which appear briefly during scrolling).", "isCorrect": false, "rationale": "Comments in the source code are not identifying information. The PPR-screenshot prohibition on comments is a separate rule (Section 9.4) — and the video rule is about preventing identification, not about comment style."}, {"text": "A clock visible in the operating system task bar.", "isCorrect": false, "rationale": "A clock is not identifying information. The list of prohibited items is specific: name, school, teacher, username, anything that could identify the submitter."}]}, {"question": "Section 9.3's pre-recording recipe for legible output recommends which combination of settings?", "options": [{"text": "Enlarge the terminal font to at least 16-18 pt, use a high-contrast color scheme (white on black or black on white), and frame the recording area to include the full terminal from prompt to last output line.", "isCorrect": true, "rationale": "Section 9.3 states all three of these specifically. Pitfall 2 (output not visible) is the most common content-related fatal error, and these settings prevent it: large legible font, high contrast, complete recording frame."}, {"text": "Use the IDE's default theme at default font size to match what the reader's monitor will show.", "isCorrect": false, "rationale": "Default IDE fonts are typically 10-12 pt, which become unreadable when the video is rendered for submission. The recommendation is explicit: enlarge before recording."}, {"text": "Record at 4K resolution to ensure crispness.", "isCorrect": false, "rationale": "4K is not required and would inflate file size beyond the 30 MB limit. Legibility comes from font size and contrast, not from raw resolution."}, {"text": "Use a low-contrast color scheme like dark gray on light gray to match modern flat design.", "isCorrect": false, "rationale": "Low contrast reduces legibility — the opposite of the recommendation. High contrast (black/white either way) is what makes output readable on submission."}]}, {"question": "Stimulus: A student's video is 58 seconds, has no narration, and shows a clean run with input and output visible. The recording happens to capture the desktop wallpaper which displays the school's logo. Predict the rubric outcome.", "options": [{"text": "Disqualification — a school logo is identifying information, and the prohibition is absolute regardless of incidental capture or how good the rest of the video is.", "isCorrect": true, "rationale": "Section 9.3 lists \"school name\" among prohibited identifying information, and a school logo functions identically. The other compliance criteria do not cancel an identification violation; one binary fail is sufficient."}, {"text": "Full credit — incidental background imagery is exempt from the identification rule.", "isCorrect": false, "rationale": "There is no incidental-imagery exception. The rule applies to anything in the frame that could identify the submitter."}, {"text": "Partial credit — the duration and narration compliance carries weight against the wallpaper violation.", "isCorrect": false, "rationale": "The video rubric is structured as binary checks. A failed identification check disqualifies the artifact; pass on other criteria does not compensate."}, {"text": "The reader is required to ignore background elements outside the terminal window.", "isCorrect": false, "rationale": "There is no \"focus only on terminal\" rule. Anything in the recorded frame is in scope for the identification check."}]}, {"question": "Which combination of segments would best fit a 60-second budget for the Study Streak Tracker video?", "options": [{"text": "Brief program launch (~5 sec), enter a study session input and view confirmation (~10 sec), call compute_streak with first subject and view output (~10 sec), call compute_streak with second subject and view output (~10 sec), display the populated study_records list (~10 sec), buffer (~15 sec).", "isCorrect": true, "rationale": "This allocation matches Section 9.3's time-allocation guidance: brief launch, at least one input-output exchange, two procedure calls with different arguments, and a visible list. Total fits comfortably under 60 with buffer."}, {"text": "30-second narrated intro explaining the algorithm, 20 seconds of code scrolling, 10 seconds of input.", "isCorrect": false, "rationale": "Narration is prohibited. Code-scrolling is not the rubric requirement — input-and-output exchange is. This allocation fails on multiple criteria."}, {"text": "60 seconds showing the source code in the IDE without running the program.", "isCorrect": false, "rationale": "The video must show input being entered and output being produced. Showing code without running it does not satisfy the input/output content requirement."}, {"text": "5 minutes of a thorough demo, then trim to 60 seconds with hard cuts.", "isCorrect": false, "rationale": "Hard cuts that drop required content (input, both procedure calls, both outputs) violate the content requirements. The plan must fit within 60 seconds while preserving all rubric-required demonstrations."}]}, {"question": "Why is the file-size limit of 30 MB important to plan for, even when a screen recording at default settings is much smaller?", "options": [{"text": "Long recordings, high frame rates, or high-resolution recordings can easily exceed 30 MB, especially if multiple takes are concatenated. A file over 30 MB is rejected at upload regardless of duration, so re-encoding with a tool like HandBrake is sometimes needed.", "isCorrect": true, "rationale": "Section 9.3 specifically calls out file size as a binary pass/fail and recommends HandBrake for re-encoding. Students with a 60-second recording at 4K or 60fps can hit 30 MB; the limit is real and pre-submission verification is essential."}, {"text": "The 30 MB limit is enforced only for slower internet connections and is waived for fast uploads.", "isCorrect": false, "rationale": "There is no connection-speed exception. The limit is on the artifact itself, enforced at the upload-time validation."}, {"text": "The limit is an aspirational guideline; submissions up to 100 MB are accepted in practice.", "isCorrect": false, "rationale": "Section 9.3 is explicit: 30 MB or fewer is required, and a video exceeding it is rejected."}, {"text": "File size only matters if the video is over 60 seconds long.", "isCorrect": false, "rationale": "Length and file size are independent constraints. Both must be satisfied; either failure rejects the artifact."}]}, {"question": "Stimulus: A student plans the demo for the Study Streak Tracker. Their video script allocates 7-16 seconds for compute_streak(study_records, \"math\") and 33-46 seconds for compute_streak(study_records, \"spanish\"). What rubric requirement does this allocation satisfy that one call alone would not?", "options": [{"text": "It satisfies the procedural-abstraction requirement to call the procedure with different arguments and produce different observable outputs — the rubric scores this as evidence that the same code abstracts over its parameter.", "isCorrect": true, "rationale": "Section 9.3 directly says: \"the procedure compute_streak() is called twice — once for 'math' and once for 'spanish' — satisfying the rubric's requirement to demonstrate the procedure working with different arguments. Both calls produce output visible on screen.\""}, {"text": "It satisfies the iteration requirement.", "isCorrect": false, "rationale": "Iteration is satisfied by a for or while loop inside the procedure body, not by the number of times the procedure is called from outside. Multiple calls are not iteration in the rubric's sense."}, {"text": "It satisfies the input requirement.", "isCorrect": false, "rationale": "Input is satisfied by the user entering at least one value via input() or equivalent. Procedure calls within the program are not the same as user input."}, {"text": "It satisfies the no-narration requirement.", "isCorrect": false, "rationale": "No-narration is a separate constraint about audio. Multiple procedure calls do not relate to audio content."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
