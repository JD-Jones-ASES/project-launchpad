        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<div class="quiz-container">

        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Multi-Select Strategies</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the partial-credit rule for AP CSP multi-select questions?", "options": [{"text": "Selecting one correct answer earns half credit.", "isCorrect": false, "rationale": "There is no half-credit rule. The scoring is binary: get both correct, earn the point; get fewer than both correct OR include any wrong answer, earn zero."}, {"text": "Selecting one correct and one incorrect answer earns the same as selecting both wrong answers — zero points.", "isCorrect": true, "rationale": "Multi-select scoring is binary. A student who gets one right and one wrong scores exactly the same as a student who got both wrong. Both correct answers must be selected — no more, no fewer — for the question to count."}, {"text": "Selecting all four answers earns half credit since two are right.", "isCorrect": false, "rationale": "Selecting more than two answers is automatically incorrect (the question requires exactly two). All-four selections score zero."}, {"text": "Selecting only one correct answer earns full credit.", "isCorrect": false, "rationale": "Both correct answers must be selected. Picking just one — even the right one — scores zero."}], "id": "q01"}, {"question": "Which best describes the \"Plausible-but-Irrelevant\" distractor pattern?", "options": [{"text": "A statement that is technically true and that directly answers the question.", "isCorrect": false, "rationale": "This describes the CORRECT answer, not a distractor. Plausible-but-irrelevant distractors do NOT answer the question."}, {"text": "A statement that sounds true and may even be true in general, but does not directly address what the question asks.", "isCorrect": true, "rationale": "Plausible-but-Irrelevant: the statement sounds plausible and might be true in general, but it does not address the question's specific scope. Most dangerous when the question is narrowly scoped (about a specific algorithm) but the distractor makes a general claim."}, {"text": "A statement that uses correct technical terms but is actually false.", "isCorrect": false, "rationale": "This describes Trick-Vocabulary, the fourth distractor pattern. Plausible-but-Irrelevant distractors are usually true, just not relevant."}, {"text": "A statement that is true for one input but not for general behavior.", "isCorrect": false, "rationale": "This describes Over-Narrow, the third distractor pattern. Plausible-but-Irrelevant operates at a different level of relevance."}], "id": "q02"}, {"question": "An Over-Broad distractor often uses which kinds of words?", "options": [{"text": "Words like \"sometimes,\" \"may,\" \"often,\" or \"in some cases.\"", "isCorrect": false, "rationale": "These are HEDGE words. Over-broad distractors use the OPPOSITE — universal quantifiers that overstate the claim."}, {"text": "Universal quantifiers like \"always,\" \"never,\" \"all,\" or \"every.\"", "isCorrect": true, "rationale": "Over-Broad distractors use universal quantifiers that the specific scenario in the question does not support. The general claim might be true elsewhere, but the specific case described (e.g., an unsorted list) breaks the universal claim."}, {"text": "Numerical specifics like \"38%\" or \"approximately 4 cm.\"", "isCorrect": false, "rationale": "Numerical specifics are not a distractor signal in themselves. Over-broad is about quantifier scope, not numerical precision."}, {"text": "Names of specific algorithms like \"binary search\" or \"merge sort.\"", "isCorrect": false, "rationale": "Algorithm names appear in correct and incorrect options alike. The signal is universal quantifier overuse, not algorithm-name presence."}], "id": "q03"}, {"question": "A multi-select question asks about a specific algorithm's behavior for ALL integer inputs. A distractor states: \"The function returns a positive value.\" If positive is true only for small positive inputs, this distractor is which pattern?", "options": [{"text": "Plausible-but-Irrelevant.", "isCorrect": false, "rationale": "The distractor IS relevant to the question (it claims a property of the function). The error is scope, not relevance."}, {"text": "Over-Broad.", "isCorrect": false, "rationale": "Over-broad uses universal quantifiers (always, never). This distractor does not claim universality — it claims a property that happens to hold for one case only."}, {"text": "Over-Narrow.", "isCorrect": true, "rationale": "Over-Narrow: the statement is true for one specific case (small positive inputs) but the question asks about general behavior (all integer inputs). Students who test only one example and conclude the statement is correct fall into this trap."}, {"text": "Trick-Vocabulary.", "isCorrect": false, "rationale": "Trick-vocabulary uses correct technical terms in a false sentence. This distractor's flaw is scope, not vocabulary."}], "id": "q04"}, {"question": "A multi-select question about encryption includes the distractor: \"Symmetric encryption uses two different keys for encryption and decryption.\" Which pattern is this?", "options": [{"text": "Plausible-but-Irrelevant.", "isCorrect": false, "rationale": "The distractor is highly relevant (it makes a claim about encryption). The error is that the claim itself is false."}, {"text": "Over-Broad.", "isCorrect": false, "rationale": "The distractor does not use universal quantifiers. It states a specific (false) fact."}, {"text": "Over-Narrow.", "isCorrect": false, "rationale": "Over-narrow describes statements true for one case but not all. This statement is wrong in every case."}, {"text": "Trick-Vocabulary.", "isCorrect": true, "rationale": "Trick-Vocabulary: the word \"symmetric\" is correct AP vocabulary, but symmetric encryption uses the SAME key for both — asymmetric uses two different keys. The statement uses correct technical terms in a sentence that is actually false. Most dangerous because it requires precise knowledge of what each term means."}], "id": "q05"}, {"question": "What is the recommended FIRST action when reading a multi-select question?", "options": [{"text": "Eliminate the most obviously wrong answer.", "isCorrect": false, "rationale": "Elimination is a single-select strategy. Multi-select rewards selecting two correct answers — pure elimination from one wrong does not narrow the search."}, {"text": "Read all four answer choices before evaluating any of them.", "isCorrect": true, "rationale": "Read-All-Four-First is the canonical multi-select strategy. Reading all four first lets you categorize each option (which distractor pattern?) before deciding. Evaluating one at a time often produces premature commitment to the first plausible option."}, {"text": "Pick the longest answer, since correct answers tend to be more detailed.", "isCorrect": false, "rationale": "Length is not a reliable signal. AP exam writers vary answer lengths to defeat length-based heuristics."}, {"text": "Skip the question and return at the end.", "isCorrect": false, "rationale": "Time-discipline allows skipping if you cannot solve in 90 seconds, but the FIRST action should always be to attempt the question with the strategy."}], "id": "q06"}, {"question": "How many multi-select questions appear on the AP CSP exam, and what is their location?", "options": [{"text": "Five questions, in Section II.", "isCorrect": false, "rationale": "Multi-select appears in Section I, not Section II. Section II is the Create Performance Task."}, {"text": "Eight questions, in Section I.", "isCorrect": true, "rationale": "Per the section's definition: eight multi-select questions appear in Section I of the AP CSP exam. They are interleaved with single-select questions but flagged with the \"select TWO\" instruction."}, {"text": "Ten questions, mixed across both sections.", "isCorrect": false, "rationale": "Multi-select is exclusive to Section I, and the count is eight, not ten."}, {"text": "Three questions, all in the Innovation Reading block.", "isCorrect": false, "rationale": "The Innovation Reading Passage uses single-select questions. Multi-select is its own question type, separate from passages."}], "id": "q07"}, {"question": "Per the section's exam discipline, what should you ask after identifying one likely correct answer in a multi-select question?", "options": [{"text": "\"Can I move on now without checking the second option?\"", "isCorrect": false, "rationale": "Moving on with only one correct answer scores zero. You must select two — finishing prematurely guarantees failure."}, {"text": "\"What would the second correct answer look like?\"", "isCorrect": true, "rationale": "The recommended discipline: when you identify one correct answer, immediately ask what the second one should look like. AP multi-select pairs typically address the same topic from two different angles (mechanism + impact, or benefit + limitation). This framing helps you find the second answer quickly."}, {"text": "\"Does the question really need two correct answers?\"", "isCorrect": false, "rationale": "Multi-select questions ALWAYS require exactly two correct answers — this is fixed. Doubting the count wastes time."}, {"text": "\"Are the two correct answers always identical in meaning?\"", "isCorrect": false, "rationale": "The two correct answers usually address the topic from DIFFERENT angles (mechanism vs. impact, etc.) — they are NOT identical. If two candidate answers seem to repeat the same idea, one is likely a distractor."}], "id": "q08"}, {"question": "If your two candidate answers in a multi-select question seem to contradict each other, what should you suspect?", "options": [{"text": "Both candidates are correct, since the question may include a deliberate contradiction.", "isCorrect": false, "rationale": "AP multi-select questions never have correct answers that contradict each other. Contradicting candidates are a red flag."}, {"text": "One of them is likely an over-broad or trick-vocabulary distractor.", "isCorrect": true, "rationale": "Per the section: if your two candidates contradict, one is likely over-broad or trick-vocabulary. Re-evaluate using the four distractor patterns and identify which one is the trap."}, {"text": "The question itself is flawed and should be skipped.", "isCorrect": false, "rationale": "AP exam questions are validated extensively. The cause of contradiction is almost always a distractor, not a flawed question."}, {"text": "The contradiction means both should be deselected and the other two chosen.", "isCorrect": false, "rationale": "Deselecting both abandons the work you did to identify them. Re-evaluate to find which of the contradicting candidates is the distractor; keep the other if it survives the four-pattern check."}], "id": "q09"}, {"question": "What is the time-discipline cap for a single multi-select question on the exam?", "options": [{"text": "30 seconds — anything more is too slow.", "isCorrect": false, "rationale": "30 seconds is too short for a multi-select question. Reading the stem, four options, and applying the four-pattern analysis takes longer than that."}, {"text": "90 seconds — mark and move on if you cannot identify both answers in this window.", "isCorrect": true, "rationale": "Per the section: if you cannot identify both correct answers within 90 seconds, mark the question and move on. Letting one multi-select consume four minutes while three other questions go unanswered is a worse trade than skipping and returning at the end if time permits."}, {"text": "Four minutes — multi-select is the hardest type and deserves extra time.", "isCorrect": false, "rationale": "Section explicitly warns AGAINST four-minute multi-select work. Four minutes spent on one question while three others go unanswered is the wrong trade."}, {"text": "No cap — work on each question until you are sure of the answer.", "isCorrect": false, "rationale": "On the AP exam, no cap means you risk leaving easy questions unanswered while obsessing over hard ones. The 90-second cap is a forcing function for time-budget discipline."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
