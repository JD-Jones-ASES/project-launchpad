<script>
var QUESTIONS = [{"question": "STIMULUS: In study_tracker_v1.py, the variable study_records is built with these appends:\n\nstudy_records.append((\"2025-09-01\", \"math\", 45))\nstudy_records.append((\"2025-09-01\", \"history\", 30))\nstudy_records.append((\"2025-09-02\", \"math\", 60))\n\nWhat does study_records[2][1] evaluate to?", "options": [{"text": "\"math\"; the second field of the third record.", "isCorrect": true, "rationale": "study_records[2] is the THIRD record (zero-indexed), the (\"2025-09-02\", \"math\", 60) tuple. The [1] then indexes into that tuple's second field, which is \"math\"."}, {"text": "\"history\"; the second field of the second record.", "isCorrect": false, "rationale": "Both indices are zero-based, but study_records[2] is the THIRD record, not the second. The third record's subject is \"math\", not \"history\"."}, {"text": "\"2025-09-02\"; the first field of the third record.", "isCorrect": false, "rationale": "[1] retrieves the SECOND field, not the first. The first field (date) would be study_records[2][0]."}, {"text": "60; the third field of the third record.", "isCorrect": false, "rationale": "[1] is the second field (subject), not the third. The minutes (60) would be at index [2], not [1]."}]}, {"question": "On the Create Performance Task, what TWO things must a student include in the written response to earn the Data Abstraction rubric point?", "options": [{"text": "Identify the list and explain what each element represents; explain how the list manages complexity by describing what the program would look like without the list.", "isCorrect": true, "rationale": "The Create PT rubric explicitly requires both (1) naming a list and what each element represents, and (2) articulating concretely what the program would have to do without the list and why that alternative is unworkable."}, {"text": "Provide the runtime in Big-O notation and the average-case memory usage in bytes.", "isCorrect": false, "rationale": "Big-O analysis is not required by the Create PT data-abstraction rubric. The required elements are descriptive — what the list represents and how it manages complexity."}, {"text": "Show two screenshots of the program running and recite the algorithm aloud in the video.", "isCorrect": false, "rationale": "Screenshots and audio narration are not part of the Data Abstraction rubric. The rubric is text-based and asks for two specific points."}, {"text": "Cite the Python documentation page for lists and provide a working URL.", "isCorrect": false, "rationale": "Citation of language documentation is not required for the rubric. The student must explain what their list represents and how it manages complexity."}]}, {"question": "STIMULUS: A student writes a study tracker WITHOUT a list, using nine separate variables (date_1, subject_1, minutes_1, date_2, subject_2, minutes_2, date_3, subject_3, minutes_3). To filter math sessions they write three separate if statements, one per session. Why does this design fail to scale?", "options": [{"text": "Python forbids more than three variables.", "isCorrect": false, "rationale": "Python has no such limit. The argument against this design is structural: code grows linearly with data, not that the language refuses to compile."}, {"text": "For 30 sessions the program needs 90 variables and 30 if statements; for an entire semester (~200 sessions), the code becomes impossible to write, debug, and maintain.", "isCorrect": true, "rationale": "Without a list, every additional session adds three variables and one filter clause to the source code. Three sessions need 9 variables + 3 filters; 200 sessions need 600 variables + 200 filters. The code does not scale with the data."}, {"text": "Variables date_1 through date_3 are reserved keywords in Python.", "isCorrect": false, "rationale": "These are perfectly legal variable names. The problem is structural — too many of them — not a naming-clash issue."}, {"text": "Without a list the if statements run in the wrong order.", "isCorrect": false, "rationale": "Order-of-evaluation is not the issue. The if statements would run in source-code order, which is fine. The argument is about scale, not correctness for three records."}]}, {"question": "What are the TWO levels of data abstraction at work in the study_records list of tuples?", "options": [{"text": "The tuple groups three fields of a single session into one unit; the list groups all sessions into one named collection.", "isCorrect": true, "rationale": "Each tuple abstracts (date, subject, minutes) into one record. The list then abstracts an arbitrary number of records into one variable. Two stacked layers of grouping."}, {"text": "The tuple sorts the records chronologically; the list filters by subject.", "isCorrect": false, "rationale": "Neither tuples nor lists perform automatic sorting or filtering. Those are operations performed by code that uses the structure, not properties of the structure itself."}, {"text": "The list compresses the records into binary; the tuple decompresses them.", "isCorrect": false, "rationale": "There is no compression or decompression involved. Lists and tuples are storage abstractions, not data-encoding schemes."}, {"text": "The list provides the date; the tuple provides the subject and minutes.", "isCorrect": false, "rationale": "Each tuple already contains all three fields (date, subject, minutes); the list does not separately store the date. The two levels are 'fields per record' and 'records per collection'."}]}, {"question": "The study_records list manages complexity. Compared to what alternative is this complexity reduction measured?", "options": [{"text": "Compared to using a separate variable for every value (e.g., date_1, subject_1, minutes_1, date_2, subject_2, minutes_2, ...) — without the list, the program would need a new variable for every field of every session and a new line of filter/print code for each session.", "isCorrect": true, "rationale": "The data-abstraction argument always compares the list to its absence. The Create PT response must specifically describe the no-list alternative and explain why it is unworkable."}, {"text": "Compared to using a relational database with SQL queries.", "isCorrect": false, "rationale": "The Create PT comparison is internal: list vs. no-list. Comparing to a database is outside the rubric's expected response."}, {"text": "Compared to writing the program in C instead of Python.", "isCorrect": false, "rationale": "Language choice is unrelated to data abstraction. The rubric asks about the structural alternative within the same language."}, {"text": "Compared to running the program on faster hardware.", "isCorrect": false, "rationale": "Hardware speed is irrelevant to data abstraction. The argument is about source-code structure and how it scales with data size."}]}, {"question": "STIMULUS: A student writes the Create PT response: 'I used a list called study_records.' What is missing from this response, and what would you need to add to earn the Data Abstraction rubric point?", "options": [{"text": "The student must (a) explain what each element of study_records represents, and (b) describe how the list manages complexity by stating what the program would look like without it and why that version would fail.", "isCorrect": true, "rationale": "Naming the list is necessary but not sufficient. The two required additions correspond to the two halves of the rubric. Missing either part costs the point."}, {"text": "The response is complete; mentioning the list by name is enough.", "isCorrect": false, "rationale": "The rubric explicitly demands two elements: identification AND complexity argument. Naming the variable alone does not earn the point."}, {"text": "The student must include a UML diagram of the list.", "isCorrect": false, "rationale": "UML diagrams are not part of the Create PT requirements. The response is a written paragraph."}, {"text": "The student must port the program to AP Pseudocode in the response.", "isCorrect": false, "rationale": "The student writes in their chosen programming language. No Pseudocode translation is required for the data-abstraction rubric row."}]}, {"question": "Which statement about lists and the principle of data abstraction is MOST accurate?", "options": [{"text": "Data abstraction is exclusively a property of object-oriented languages and does not apply to plain Python lists.", "isCorrect": false, "rationale": "Lists are the simplest form of data abstraction available to a Python program. The principle applies broadly, not just to OO classes."}, {"text": "A list is a form of data abstraction because it groups related values under a single name, letting the rest of the program operate on 'all the data' as a unit.", "isCorrect": true, "rationale": "This is precisely the section's framing. A list lets the programmer say 'scores' once and have a loop work on every element. The number of elements becomes irrelevant to the loop's structure."}, {"text": "Data abstraction means hiding the values of variables from the programmer.", "isCorrect": false, "rationale": "Data abstraction is about grouping, not concealment. The values remain accessible; what is abstracted is the count and individual handling of each item."}, {"text": "Lists provide data abstraction only when their elements are tuples.", "isCorrect": false, "rationale": "Any list is a form of data abstraction by virtue of grouping multiple values under one name. The list-of-tuples design adds a second layer; it is not required for the first."}]}, {"question": "The 'with-a-list' Study Streak Tracker uses the same loop body whether it has 3 records or 300. Why?", "options": [{"text": "Because the loop body uses the list variable name (study_records) and tuple unpacking, neither of which depends on the number of records — the structure is invariant under list size.", "isCorrect": true, "rationale": "for record in study_records: walks every element regardless of how many there are. The loop body never names a specific record number. This is the scaling property a list provides."}, {"text": "Because Python automatically optimizes lists with more than 3 elements.", "isCorrect": false, "rationale": "Python applies no such automatic optimization. The reason the body is invariant is structural, not optimization-based."}, {"text": "Because the loop body is rewritten on the fly for each new record.", "isCorrect": false, "rationale": "The loop body is fixed source code; it does not change. The runtime simply executes the same code once per element."}, {"text": "Because lists internally store all data as a single string.", "isCorrect": false, "rationale": "Lists store an array of references, not a string. Internal representation is irrelevant to why the loop body scales — the reason is that the body refers to records via the loop variable, not by index number."}]}, {"question": "Which rewriting of the Study Streak Tracker code BEST illustrates the data-abstraction argument?", "options": [{"text": "The list version: study_records is a list of tuples. for record in study_records: print(record). One name, one loop, regardless of record count.", "isCorrect": true, "rationale": "The data-abstraction argument shows how a list reduces 9 variables and 3 conditionals (for 3 records) to one named list and one loop body that scales to any size. This is the canonical 'with-list' demonstration."}, {"text": "Naming each session with a single-character variable like a, b, c.", "isCorrect": false, "rationale": "Renaming variables does not introduce a list. You still have separate variables, just shorter names. This does not manage complexity."}, {"text": "Storing all session data inside one long string and parsing it manually with split().", "isCorrect": false, "rationale": "A string with manual parsing is more complex than a list, not less. It hides the structure and adds parsing code rather than removing it."}, {"text": "Writing the same nine variables as comments to remind yourself which session is which.", "isCorrect": false, "rationale": "Comments do not change code structure. The data-abstraction argument compares actual code, not annotations."}]}, {"question": "Why does the Study Streak Tracker use a list of tuples rather than a list of three parallel lists (one for dates, one for subjects, one for minutes)?", "options": [{"text": "Because tuples enforce immutability per record — once a session is logged, its three fields stay locked together — while parallel lists invite drift if one is updated and the others are not.", "isCorrect": true, "rationale": "A tuple keeps a record's fields bound together. With three separate lists you would have to coordinate index alignment manually; if you append to one and forget the other, your data desynchronizes silently. Tuples remove that risk."}, {"text": "Because Python forbids storing different types in the same list.", "isCorrect": false, "rationale": "Python lists are heterogeneous; they can hold mixed types. The argument for tuples is about correctness and design intent, not type restrictions."}, {"text": "Because parallel lists run more slowly than a list of tuples.", "isCorrect": false, "rationale": "Performance is not the central concern. Both designs have similar runtime. The argument is about correctness under modification: tuple-grouping prevents desync between fields."}, {"text": "Because tuples display in nicer fonts when printed.", "isCorrect": false, "rationale": "Printing format is not a design driver. The semantic argument is about keeping related fields bound together as one immutable unit."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
