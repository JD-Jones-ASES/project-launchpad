        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Mastering the In-Exam Written Response — Study Streak Tracker Capstone</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The four prompt categories of the in-exam Written Response are scored independently. Which of the following BEST describes the consequence of this design?", "options": [{"text": "A weak response in one category does not affect scoring in another. A student can earn full credit in Algorithm Development even if their Errors and Testing response is weak — but they cannot recover lost points across category boundaries.", "isCorrect": true, "rationale": "Section 9.5 explicitly states each category is scored independently. The implication: time investment must cover all four; skipping or short-changing one category costs those points without any partial recovery from strong work elsewhere."}, {"text": "Strong responses in three categories automatically award full credit in the fourth.", "isCorrect": false, "rationale": "Independence means there is no transfer of credit between categories. Each is scored on its own evidence."}, {"text": "The total score is the average of the four category scores rounded up.", "isCorrect": false, "rationale": "The categories sum, they do not average. Each category contributes its own sub-item points to the rubric total."}, {"text": "Only the strongest category counts toward the final grade.", "isCorrect": false, "rationale": "All four categories contribute. The independence rule means each is graded fairly without bias from the others, not that only one matters."}]}, {"question": "Stimulus: A student's Category 1 (Program Design, Function, and Purpose) response says: \"My program tracks study sessions. It takes subject and minutes as input and prints a number as output.\" Identify the rubric outcome and the most important missing element.", "options": [{"text": "Zero points on the purpose sub-item — the response describes function (\"tracks study sessions,\" \"prints a number\") instead of purpose. No audience is named, no real-world problem is identified, and no benefit is articulated. The single most important missing element is the audience-and-benefit content.", "isCorrect": true, "rationale": "Section 9.5 walks through this exact 0-point response. Purpose requires audience + problem + benefit; the given response lists function and generic input/output without any of those three elements."}, {"text": "Full credit — the response identifies inputs and outputs.", "isCorrect": false, "rationale": "Inputs and outputs are described too generically (\"a number\") and the purpose sub-item itself is not addressed. The response cannot earn the purpose point."}, {"text": "Partial credit — \"tracks study sessions\" counts as audience.", "isCorrect": false, "rationale": "\"Tracks study sessions\" is a function statement, not an audience. No human user is named."}, {"text": "The response earns Algorithm Development credit because it mentions inputs and outputs.", "isCorrect": false, "rationale": "Algorithm Development is a separate category about sequencing, selection, iteration, and parameter use. It does not award credit for input/output identification."}]}, {"question": "Section 9.5 lists three characteristics of high-scoring Written Responses across all four categories. Which characteristic is described as most reliable for converting vague claims into falsifiable evidence?", "options": [{"text": "Citing the PPR by screenshot number and line range — for example, \"as shown in Screenshot 2 of my PPR, lines 28-73 define compute_streak.\"", "isCorrect": true, "rationale": "Section 9.5 names this as a defining trait of high-scoring responses. The citation lets the reader verify the claim in seconds, transforming an assertion into specific evidence."}, {"text": "Using long paragraphs with extensive transitional phrases.", "isCorrect": false, "rationale": "Length and transitions do not convert vagueness into falsifiability. Specific citation does."}, {"text": "Repeating the prompt verbatim before answering.", "isCorrect": false, "rationale": "Echoing the prompt does not provide evidence. The Written Response is judged on substantive content, not on prompt restatement."}, {"text": "Avoiding all technical terms to make the response accessible.", "isCorrect": false, "rationale": "Section 9.5 says high-scoring responses use precise algorithmic vocabulary — sequencing, selection, iteration — rather than synonyms. Avoiding terminology reduces precision."}]}, {"question": "Stimulus: A student writes for Category 3 (Errors and Testing): \"I got a syntax error because I forgot a colon at the end of a line. I added the colon and it worked.\" Predict the rubric outcome and explain.", "options": [{"text": "Zero points — a syntax error caught and fixed in a single keystroke does not demonstrate meaningful testing or debugging. The rubric expects a non-trivial problem requiring investigation, such as a logic error with non-obvious root cause.", "isCorrect": true, "rationale": "Section 9.5 gives this as the example 0-point response for Category 3. Trivial syntax fixes do not show debugging skill; the rubric specifically rewards evidence of root-cause investigation and verification."}, {"text": "Full credit — the response identifies an error and a fix.", "isCorrect": false, "rationale": "Surface description of error+fix is insufficient. The rubric requires non-trivial complexity and traceable testing."}, {"text": "Partial credit because syntax errors count as bugs.", "isCorrect": false, "rationale": "All bugs count technically, but the rubric expects depth: what investigation revealed the cause, what test confirmed the fix. A trivial typo does not provide that depth."}, {"text": "Credit only on Category 4 because syntax errors relate to abstraction.", "isCorrect": false, "rationale": "Categories 3 and 4 are independent. A trivial syntax error neither earns Category 3 nor transfers credit to Category 4."}]}, {"question": "A full-credit Category 3 (Errors and Testing) response describes a logic error in date comparison: writing if cur - prev == 1: instead of if (cur - prev).days == 1:. The response explains the root cause (Python returns timedelta from date subtraction, not int) and the debugging technique (print() statement showing timedelta(days=1) instead of 1). Why does this earn 2/2 points?", "options": [{"text": "It satisfies both rubric sub-items: (1) Error identified — specific logic error named with the incorrect and correct code shown, and (2) Steps taken — print-debugging technique described with concrete observations.", "isCorrect": true, "rationale": "Section 9.5 explicitly walks through this scoring breakdown. The two sub-items are met with precise content: a real, non-trivial bug with a verifiable cause, and a real debugging technique applied to find and confirm the fix."}, {"text": "Because the error involved dates and the rubric specifically rewards date manipulation.", "isCorrect": false, "rationale": "The rubric is content-agnostic. Any non-trivial logic error with a clear root cause and described debugging earns the points; dates are not specially rewarded."}, {"text": "Because the response is over 200 words long.", "isCorrect": false, "rationale": "Word count is not the criterion. Substance is — the response could be shorter and still earn full marks if both sub-items are met clearly."}, {"text": "Because Category 3 awards 2 points by default to any response.", "isCorrect": false, "rationale": "Category 3 awards 2 sub-item points only when the response addresses the rubric criteria; default credit does not exist."}]}, {"question": "Section 9.5 emphasizes that the four Written Response categories \"are not independent\" in another sense — the content of each should match the others. Which scenario illustrates this content cohesion best?", "options": [{"text": "The audience identified in Category 1 (high school students) matches the algorithm in Category 2 (selection condition for subject and minutes). The bug in Category 3 was discovered while testing with study session data. Category 4 explains that compute_streak abstracts over the same target_subject parameter discussed in Category 2.", "isCorrect": true, "rationale": "Section 9.5 emphasizes that the categories build on each other: purpose, algorithm, testing, and abstraction should reference the same audience, the same data structures, and the same procedure. Cohesion across categories is a hallmark of high-scoring responses."}, {"text": "Each category should describe a completely different program to demonstrate breadth.", "isCorrect": false, "rationale": "All four categories describe the same submitted program. Switching programs across categories would be disqualifying."}, {"text": "Categories 1 and 2 should be identical text to ensure consistency.", "isCorrect": false, "rationale": "Each category has a distinct rubric requirement. Identical text would fail to address each set of sub-items."}, {"text": "The categories must contradict each other to show critical thinking.", "isCorrect": false, "rationale": "Contradictions undermine the response. Cohesion (same audience, same data structures, same procedure) is what high-scoring responses share."}]}, {"question": "What is the most strategically valuable preparation activity Section 9.5 recommends students do before the in-exam Written Response?", "options": [{"text": "Draft responses to all four categories before the submission date, then read them aloud while looking at the PPR. If line numbers cited cannot be found in the PPR, or if a Written Response refers to a variable not visible in the PPR, that is a fixable gap.", "isCorrect": true, "rationale": "Section 9.5 explicitly identifies this as the single most effective preparation strategy. Drafting + cross-checking against the PPR catches gaps while revision is still possible — both in the written content and in the PPR itself."}, {"text": "Memorize the rubric word for word and reproduce it on exam day.", "isCorrect": false, "rationale": "Memorization without practiced application does not protect against the function-vs-purpose mistake or against vague algorithm explanations. Drafting + cross-checking does."}, {"text": "Watch other students' Create PT submissions on YouTube.", "isCorrect": false, "rationale": "Section 9.5 does not recommend this. Drafting your own responses in advance of the deadline is the recommended preparation."}, {"text": "Submit the program early so the College Board can return feedback.", "isCorrect": false, "rationale": "The College Board does not provide pre-submission feedback. The student is responsible for self-checking before the deadline."}]}, {"question": "Stimulus: A student's Category 4 response says: \"My list study_records stores all the study sessions. Without it, I would need separate variables. My procedure compute_streak() computes the streak and uses the list.\" Identify the strengths and weaknesses.", "options": [{"text": "Weak — \"without it I would need separate variables\" is the right form of claim but lacks scale specifics; \"computes the streak\" is a function statement rather than a procedural-abstraction explanation; no parameter role is mentioned, no claim about reusability across subjects. Likely scores 0 on Data Abstraction and 0-1 on Procedural Abstraction.", "isCorrect": true, "rationale": "Section 9.5 walks through this 0-point response analysis. Both sub-items lack the substance the rubric requires: data abstraction needs specific scale reasoning (e.g., 100 sessions = 100 variables), procedural abstraction needs explanation of parameter and reusability."}, {"text": "Full credit — both abstractions are clearly named.", "isCorrect": false, "rationale": "Naming alone does not earn rubric points. The rubric requires specific reasoning about scale (data) and reusability with different arguments (procedural)."}, {"text": "Partial credit because \"separate variables\" is the correct claim format.", "isCorrect": false, "rationale": "The claim format is right but lacks the substance to be scored. Section 9.5 frames this exact response as 0-point."}, {"text": "Earns credit on Category 1 because it mentions a procedure.", "isCorrect": false, "rationale": "Categories are scored independently. Mentioning a procedure in Category 4 does not transfer credit to Category 1."}]}, {"question": "A partial-credit Category 4 response says: \"Without this list, the program would need a separate variable for every session the user logs — if a student logs 100 sessions, that would require 100 variables. The list allows the program to store an arbitrary number of sessions under a single name.\" Why does this earn the data abstraction point?", "options": [{"text": "The response makes the manage-complexity claim specific by naming a concrete scale problem (100 sessions = 100 variables) that the list solves. Specificity converts an abstract claim into rubric-aligned evidence.", "isCorrect": true, "rationale": "Section 9.5 awards this response 1 point on data abstraction explicitly because of the scale specificity. Vague \"manages complexity\" claims fail; concrete numerical or structural reasoning succeeds."}, {"text": "The response uses the word \"abstraction\" twice.", "isCorrect": false, "rationale": "Word presence does not earn points. Specific reasoning about scale does."}, {"text": "The response cites a line number from the PPR.", "isCorrect": false, "rationale": "This particular response does not cite a line number — it earns the point through scale specificity. Citation would be additionally valuable but is not the cited reason for credit."}, {"text": "The response is over 100 words long.", "isCorrect": false, "rationale": "Word count is not the criterion. Specificity of the manage-complexity claim is."}]}, {"question": "Stimulus: A student plans to write the Category 2 (Algorithm Development) response. The prompt asks how the procedure uses sequencing, selection, and iteration. Which response template would be MOST aligned with the rubric?", "options": [{"text": "\"My procedure compute_streak(records, target_subject) uses iteration to walk through every record (line N1). For each record, it uses selection (if subject == target_subject and minutes >= 30 at line N2) to decide whether the date counts. Sequencing appears in four phases: filter, dedupe-and-sort, walk for longest run, return — each must complete before the next can run. If I call the procedure with target_subject = 'spanish' instead of 'math', the selection condition filters differently and the returned streak count changes.\"", "isCorrect": true, "rationale": "This template names sequencing, selection, and iteration explicitly using rubric vocabulary, ties each to a specific PPR line number, and traces the different-argument consequence. It addresses every sub-item the rubric scores."}, {"text": "\"My procedure compute_streak() works by iterating and checking conditions. It returns the streak count. Different inputs give different outputs.\"", "isCorrect": false, "rationale": "This is the partial-credit-or-zero template Section 9.5 warns against. Sequencing is missing; selection and iteration are not tied to specific lines or conditions; the different-argument claim is asserted without trace."}, {"text": "\"My procedure is well-written. It is short, clean, and follows good Python style.\"", "isCorrect": false, "rationale": "Style commentary does not address the rubric criteria. The rubric scores algorithmic structure (sequencing, selection, iteration) and parameter behavior, not aesthetics."}, {"text": "\"The procedure goes through the records and produces a streak. The user can call it with any subject they want.\"", "isCorrect": false, "rationale": "Vague claims with no specific construct names, no line-number citations, and no traced different-argument consequence. Section 9.5 frames responses like this as 0-point."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
