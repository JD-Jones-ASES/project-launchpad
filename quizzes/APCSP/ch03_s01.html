<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Computer Science Principles &mdash; Boolean Expressions and Relational Operators</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A Boolean expression is defined as any expression that evaluates to one of exactly two values. Which of the following best describes the role of Boolean expressions in a program?", "options": [{"text": "They are used only to assign values to variables.", "isCorrect": false, "rationale": "Assignment uses the = operator (Python) or <- (Pseudocode); Boolean expressions test claims and return True or False, not assign values."}, {"text": "They are the foundation of every conditional, loop condition, and access-control check, ultimately reducing to True or False.", "isCorrect": true, "rationale": "The text explicitly states that every if statement, loop condition, and access-control check rests on one or more Boolean expressions, all of which produce exactly True or False."}, {"text": "They can return any of three values: True, False, or Undefined.", "isCorrect": false, "rationale": "A Boolean is binary: exactly two values (True or False). There is no third 'Undefined' Boolean value in Python or AP Pseudocode."}, {"text": "They convert non-Boolean data types into integers automatically.", "isCorrect": false, "rationale": "Boolean expressions test relationships, not perform type conversions. Type coercion is a separate language concern outside the AP scope here."}]}, {"question": "Given temperature = 72, evaluate each of the following Python expressions and choose the answer where ALL four results are correct in order: temperature > 70, temperature == 100, temperature <= 72, temperature != 72.", "options": [{"text": "True, True, False, False", "isCorrect": false, "rationale": "temperature == 100 is False because 72 is not 100, and temperature <= 72 is True because 72 equals 72."}, {"text": "True, False, True, False", "isCorrect": true, "rationale": "72 > 70 is True; 72 == 100 is False; 72 <= 72 is True (boundary case, equality counts); 72 != 72 is False because they are equal."}, {"text": "False, False, True, True", "isCorrect": false, "rationale": "72 > 70 is True (72 is greater than 70), and 72 != 72 is False because the values are equal."}, {"text": "True, False, False, True", "isCorrect": false, "rationale": "72 <= 72 is True (the operator includes equality), and 72 != 72 is False because the values are equal."}]}, {"question": "A student writes the following code: `if x = 5: print(\"equal\")`. What happens when this is run in Python?", "options": [{"text": "It prints \"equal\" because Python treats = as equality inside an if statement.", "isCorrect": false, "rationale": "Python never treats = as equality. = is strictly the assignment operator; equality requires ==."}, {"text": "It silently assigns 5 to x and skips the print.", "isCorrect": false, "rationale": "Python does not allow assignment inside an if condition; this is a SyntaxError, not a silent operation."}, {"text": "It raises a SyntaxError because Python cannot assign inside an if condition.", "isCorrect": true, "rationale": "The single = is the assignment operator. Putting an assignment inside an if condition triggers a SyntaxError because Python's grammar forbids it."}, {"text": "It raises a TypeError because = is not a valid Boolean operator.", "isCorrect": false, "rationale": "The error is a SyntaxError (parsing fails), not a TypeError. TypeErrors arise from type mismatches at runtime, not from grammatical violations."}]}, {"question": "Translate the AP Pseudocode condition IF (count = 10) into the equivalent Python condition.", "options": [{"text": "if count = 10:", "isCorrect": false, "rationale": "Python uses == for equality comparison; a single = inside an if condition is a SyntaxError in Python."}, {"text": "if count == 10:", "isCorrect": true, "rationale": "AP Pseudocode uses a single = for equality comparison; Python uses ==. Both ask the same question: 'is count equal to 10?'"}, {"text": "if count <- 10:", "isCorrect": false, "rationale": "<- is the AP Pseudocode assignment arrow, used to store a value. It is not Python syntax and does not test equality."}, {"text": "if count != 10:", "isCorrect": false, "rationale": "!= tests for inequality (not equal to). The original Pseudocode uses = (equality), so the Python translation must be ==."}]}, {"question": "Why do AP graders and the textbook recommend writing `score >= 90` rather than `score > 89` for the boundary 'must be at least 90 for an A'?", "options": [{"text": "score > 89 is faster to evaluate at runtime.", "isCorrect": false, "rationale": "Both expressions execute in essentially the same time. Performance is not the issue; clarity and intent are."}, {"text": "score > 89 fails for non-integer scores like 89.5; score >= 90 expresses the boundary directly and is clearer.", "isCorrect": true, "rationale": "The text notes that 'mathematically equivalent for integers, the >= version is clearer and less error-prone.' Off-by-one errors and float boundaries are common pitfalls; >= 90 expresses 'at least 90' directly."}, {"text": "score >= 90 always returns True, so it cannot fail.", "isCorrect": false, "rationale": "score >= 90 returns True only when score is at least 90; it is False otherwise. It is not always True."}, {"text": "score > 89 is reserved syntax in Python and cannot be used.", "isCorrect": false, "rationale": "score > 89 is perfectly valid Python; the recommendation is about clarity and avoiding off-by-one errors, not syntax restrictions."}]}, {"question": "What does the Python expression \"apple\" < \"banana\" evaluate to, and why?", "options": [{"text": "True, because Python compares string lengths and \"apple\" is shorter.", "isCorrect": false, "rationale": "Python does not use length for < comparisons on strings. It uses lexicographic (dictionary) order, character by character."}, {"text": "True, because lexicographic order places 'a' before 'b' in ASCII.", "isCorrect": true, "rationale": "Python compares strings character by character using ASCII codes. Since 'a' (97) is less than 'b' (98), \"apple\" is treated as less than \"banana\" in lexicographic order."}, {"text": "False, because comparing strings with < is invalid in Python.", "isCorrect": false, "rationale": "Comparing two strings with < is valid in Python; it uses lexicographic order. (Comparing a string to an integer would raise a TypeError.)"}, {"text": "TypeError, because strings cannot be compared.", "isCorrect": false, "rationale": "Two strings can be compared using < and >. Only mixing incompatible types — for instance string vs integer — raises a TypeError in Python 3."}]}, {"question": "Which of the following Python lines is a Boolean expression (returns True or False), as opposed to an assignment statement?", "options": [{"text": "x = 5", "isCorrect": false, "rationale": "This is an assignment statement: it stores 5 into x and produces no Boolean value at the statement level."}, {"text": "name = \"Alex\"", "isCorrect": false, "rationale": "This is an assignment: it stores the string \"Alex\" into name. No Boolean is produced."}, {"text": "age >= 18", "isCorrect": true, "rationale": "This is a Boolean expression: it applies the relational operator >= to two values and returns True or False — the defining feature of a predicate."}, {"text": "score = score + 1", "isCorrect": false, "rationale": "This is an assignment that updates score by adding 1. The single = is the assignment operator; no Boolean is returned."}]}, {"question": "George Boole is significant to computer science because he:", "options": [{"text": "Built the first electronic computer in 1937.", "isCorrect": false, "rationale": "Boole died in 1864, decades before any electronic computer existed. The link between his algebra and circuits was made by Claude Shannon in 1937."}, {"text": "Invented the transistor in the 1880s, enabling logic gates.", "isCorrect": false, "rationale": "Transistors were invented in 1947 at Bell Labs, more than 80 years after Boole's death. Boole worked on abstract logic, not electronics."}, {"text": "Developed an algebraic system for logic that became the theoretical foundation of all modern digital circuits.", "isCorrect": true, "rationale": "Boole's 1854 treatise An Investigation of the Laws of Thought showed that logical propositions could be manipulated algebraically with 1 = true, 0 = false. Claude Shannon connected this algebra to circuits in his 1937 master's thesis."}, {"text": "Wrote the first AP Computer Science Principles curriculum in 1854.", "isCorrect": false, "rationale": "There is no AP curriculum in 1854; AP Computer Science Principles launched in 2016. Boole produced abstract mathematics, not curriculum."}]}, {"question": "A predicate is best defined as:", "options": [{"text": "Any Python statement that ends with a colon.", "isCorrect": false, "rationale": "Many constructs end with a colon (def, if, for, while), but not all are predicates. A predicate is a Boolean-valued claim, not a syntactic feature."}, {"text": "A Boolean expression that functions as a testable claim, returning True when the claim holds and False when it does not.", "isCorrect": true, "rationale": "The text defines a predicate as a Boolean expression representing a testable claim. age >= 18 asserts 'the value of age is at least 18' and returns True or False accordingly."}, {"text": "A function that performs assignment.", "isCorrect": false, "rationale": "Assignment is a separate operation that stores values. Predicates evaluate claims and return Booleans; they do not assign."}, {"text": "The Python keyword used to define an else branch.", "isCorrect": false, "rationale": "Python has no 'predicate' keyword. The term comes from formal logic and refers to any Boolean-valued claim."}]}, {"question": "A program needs to test whether a variable temp is strictly between 60 and 80 (exclusive on both ends). Without using `and`, the textbook asks you to write the two separate Python comparisons. Which pair of expressions, when both True, captures this condition?", "options": [{"text": "temp >= 60 and temp <= 80", "isCorrect": false, "rationale": "These are inclusive on both ends (>= and <=). 'Strictly between' requires exclusive endpoints: > 60 and < 80."}, {"text": "temp > 60 and temp < 80, evaluated as the two separate predicates: temp > 60 and temp < 80.", "isCorrect": true, "rationale": "'Strictly between 60 and 80' means the endpoints are excluded: the value must be greater than 60 AND less than 80. The two predicates temp > 60 and temp < 80, both evaluating to True, capture this exact condition."}, {"text": "temp != 60 and temp != 80", "isCorrect": false, "rationale": "These predicates only exclude the exact endpoint values; they do not require temp to be inside the 60-80 range. A temp of 200 would satisfy both."}, {"text": "temp == 70", "isCorrect": false, "rationale": "This tests only the single value 70, not the range strictly between 60 and 80."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
