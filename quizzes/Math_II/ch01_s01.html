<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the exponent 'n' represent in the expression $a^n$?", "options": [{"text": "The sum of 'a' added to itself 'n' times.", "isCorrect": false, "rationale": "This describes multiplication ($a \\times n$), not exponentiation. Exponents represent repeated multiplication."}, {"text": "The number 'a' multiplied by 'n'.", "isCorrect": false, "rationale": "This is a multiplication operation ($a \\times n$), whereas an exponent represents 'a' multiplied by itself 'n' times."}, {"text": "The number of times 'a' is used as a factor.", "isCorrect": true, "rationale": "According to the definition, the exponent tells how many times a base ('a') is used as a factor in repeated multiplication ($a \\times a \\times ... \\times a$, n times)."}, {"text": "The result of multiplying 'a' by itself.", "isCorrect": false, "rationale": "This describes the entire value of $a^n$, not specifically what the exponent 'n' represents."}]}, {"question": "In the expression $7^4$, what are the base and the exponent, respectively?", "options": [{"text": "Base: 4, Exponent: 7", "isCorrect": false, "rationale": "The base is the number being multiplied, and the exponent is the number that indicates how many times the base is used as a factor. These are reversed."}, {"text": "Base: 7, Exponent: 4", "isCorrect": true, "rationale": "In $a^n$, 'a' is the base and 'n' is the exponent. Here, 7 is the base and 4 is the exponent."}, {"text": "Base: $7 \\times 4$, Exponent: Not applicable", "isCorrect": false, "rationale": "The base is simply the number being raised to a power (7), not the product of the base and exponent."}, {"text": "Base: $7^4$, Exponent: 1", "isCorrect": false, "rationale": "This misinterprets the structure of exponent notation. The base is 7, and the exponent is 4, not 1."}]}, {"question": "Which of the following numbers is a perfect square?", "options": [{"text": "2", "isCorrect": false, "rationale": "2 cannot be written as $n^2$ for some whole number $n$. $1^2=1$, $2^2=4$."}, {"text": "12", "isCorrect": false, "rationale": "12 cannot be written as $n^2$ for some whole number $n$. $3^2=9$, $4^2=16$."}, {"text": "81", "isCorrect": true, "rationale": "81 is a perfect square because it can be written as $9^2$ ($9 \\times 9 = 81$). The text lists 81 as one of the first twelve perfect squares."}, {"text": "128", "isCorrect": false, "rationale": "128 cannot be written as $n^2$ for some whole number $n$. $11^2=121$, $12^2=144$."}]}, {"question": "According to the definition provided, which number is a perfect cube?", "options": [{"text": "9", "isCorrect": false, "rationale": "9 is a perfect square ($3^2$) but not a perfect cube. The first positive perfect cubes are 1, 8, 27, 64, 125, 216."}, {"text": "16", "isCorrect": false, "rationale": "16 is a perfect square ($4^2$) but not a perfect cube. The first positive perfect cubes are 1, 8, 27, 64, 125, 216."}, {"text": "64", "isCorrect": true, "rationale": "64 is a perfect cube because it can be written as $4^3$ ($4 \\times 4 \\times 4 = 64$). It is also listed as one of the first six positive perfect cubes."}, {"text": "210", "isCorrect": false, "rationale": "210 is not a perfect cube. The closest perfect cubes are $5^3=125$ and $6^3=216$."}]}, {"question": "Evaluate the expression $(-3)^3 + (-3)^2$.", "options": [{"text": "0", "isCorrect": false, "rationale": "$(-3)^3 = (-3)(-3)(-3) = -27$. $(-3)^2 = (-3)(-3) = 9$. So, $-27 + 9 = -18$."}, {"text": "-18", "isCorrect": true, "rationale": "First, evaluate $(-3)^3 = (-3)(-3)(-3) = 9(-3) = -27$. Then, evaluate $(-3)^2 = (-3)(-3) = 9$. Finally, add the results: $-27 + 9 = -18$."}, {"text": "36", "isCorrect": false, "rationale": "This would result if both terms were positive and added, or if there were sign errors. $(-3)^3$ is negative, and $(-3)^2$ is positive."}, {"text": "-36", "isCorrect": false, "rationale": "This would imply adding magnitudes and then making it negative, or sign errors. The correct calculation is $-27 + 9 = -18$."}]}, {"question": "Consider the expressions $X = -2^4$ and $Y = (-2)^4$. Which statement accurately describes their values?", "options": [{"text": "Both X and Y are equal to -16.", "isCorrect": false, "rationale": "For $Y = (-2)^4$, the base is -2, and since the exponent is even, the result is positive."}, {"text": "X = -16 and Y = 16.", "isCorrect": true, "rationale": "For $X = -2^4$, the negative sign is not part of the base; only 2 is raised to the power. So, $-(2^4) = -(16) = -16$. For $Y = (-2)^4$, the base is -2, and it's raised to an even power, so $(-2)(-2)(-2)(-2) = 16$. This matches the property for negative bases."}, {"text": "X = 16 and Y = -16.", "isCorrect": false, "rationale": "This statement incorrectly assigns the values. $X$ is negative because the sign is outside the power, and $Y$ is positive because a negative base raised to an even power is positive."}, {"text": "Both X and Y are equal to 16.", "isCorrect": false, "rationale": "For $X = -2^4$, the negative sign is applied after $2^4$ is evaluated, resulting in a negative value."}]}, {"question": "A scientist is calculating the volume of a cubic cell with a side length of $(1/2)$ micrometer. Which expression represents the volume, and what is its value?", "options": [{"text": "$(1/2)^3 = 1/6$ cubic micrometers.", "isCorrect": false, "rationale": "While $(1/2)^3$ is the correct expression for volume, $1^3/2^3 = 1/8$, not $1/6$. This option incorrectly evaluates the power."}, {"text": "$(1/2)^3 = 1/8$ cubic micrometers.", "isCorrect": true, "rationale": "The volume of a cube is side length cubed ($s^3$). For a side length of $(1/2)$, the volume is $(1/2)^3 = (1^3)/(2^3) = 1/8$ cubic micrometers. The example in the text shows how to evaluate powers of fractions."}, {"text": "$1/2 \\times 3 = 3/2$ cubic micrometers.", "isCorrect": false, "rationale": "This confuses cubing with multiplying by 3. Volume is calculated by cubing the side length, not multiplying it by 3."}, {"text": "$1^3/2 = 1/2$ cubic micrometers.", "isCorrect": false, "rationale": "This only cubes the numerator. When a fraction is raised to a power, both the numerator and the denominator are raised to that power."}]}, {"question": "Evaluate the expression $10 - 2 \\cdot 3^2 + 5$.", "options": [{"text": "23", "isCorrect": false, "rationale": "This would result from performing operations from left to right without respecting the order of operations. $10 - 2 \\cdot 3^2 + 5 = 10 - 2 \\cdot 9 + 5 = 10 - 18 + 5 = -8 + 5 = -3$."}, {"text": "-3", "isCorrect": true, "rationale": "Following the order of operations (PEMDAS/BEDMAS): first, evaluate the exponent ($3^2 = 9$). Then, perform multiplication ($2 \\cdot 9 = 18$). Finally, perform subtraction and addition from left to right ($10 - 18 = -8$, then $-8 + 5 = -3$). The example 'Exponents in Multi-Step Expressions' demonstrates this."}, {"text": "104", "isCorrect": false, "rationale": "This result suggests an error in the order of operations, possibly by performing subtraction or addition before multiplication and exponents."}, {"text": "87", "isCorrect": false, "rationale": "This result indicates multiple errors in applying the order of operations, leading to an incorrect large positive number."}]}, {"question": "A landscaper is designing a square garden with side lengths of 8 feet. If a smaller square section with side lengths of 3 feet is designated for a special plant, what is the area of the remaining garden space?", "options": [{"text": "5 square feet", "isCorrect": false, "rationale": "This is the difference in side lengths ($8-3=5$), not the difference in areas. Area is calculated by squaring the side length."}, {"text": "55 square feet", "isCorrect": true, "rationale": "The area of the large garden is $8^2 = 64$ square feet. The area of the smaller section is $3^2 = 9$ square feet. The remaining area is $64 - 9 = 55$ square feet. This is an application of exponents in a word problem, similar to the 'Word Problem with Exponents' example."}, {"text": "73 square feet", "isCorrect": false, "rationale": "This would be the sum of the areas ($64+9$), not the difference, which is required for 'remaining space'."}, {"text": "24 square feet", "isCorrect": false, "rationale": "This is the product of the two side lengths ($8 \\times 3$), which is not the correct way to find the difference in square areas."}]}, {"question": "Based on the 'Negative Bases and Parentheses' property, which statement is true about the expression $-a^n$?", "options": [{"text": "The entire term $(-a)$ is raised to the power of $n$.", "isCorrect": false, "rationale": "This describes the expression $(-a)^n$, where the negative sign is inside the parentheses and is part of the base."}, {"text": "The negative sign is considered part of the base.", "isCorrect": false, "rationale": "This is incorrect. The property explicitly states that for $-a^n$, the negative sign is *not* part of the base; only 'a' is raised to the power."}, {"text": "Only 'a' is raised to the power of 'n', and the result is then negated.", "isCorrect": true, "rationale": "This statement directly reflects the definition provided: '$-a^n$ means $-(a^n)$. The negative sign is not part of the base; only 'a' is raised to the power, and the result is then negated.'"}, {"text": "The expression is always positive, regardless of whether 'n' is even or odd.", "isCorrect": false, "rationale": "Since the result of $a^n$ is negated, the expression $-a^n$ will always be negative (assuming $a$ is positive), regardless of $n$ being even or odd."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
