<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In geometry, what is the defining characteristic of two figures being 'similar'?", "options": [{"text": "They must have the same size and the same shape.", "isCorrect": false, "rationale": "This describes congruent figures, which are a specific type of similar figure where the scale factor is 1. Similar figures do not necessarily have the same size."}, {"text": "They must have the same shape but not necessarily the same size.", "isCorrect": true, "rationale": "This is the precise definition of similar figures as stated in the textbook: 'figures that have the same shape but not necessarily the same size are called similar.'"}, {"text": "They must have different sizes but identical angles.", "isCorrect": false, "rationale": "While similar figures can have different sizes and identical angles, this option implies they *must* have different sizes, which isn't true (they can be the same size, i.e., congruent)."}, {"text": "Their corresponding sides must be equal in length.", "isCorrect": false, "rationale": "If corresponding sides are equal in length, the figures are congruent, not just similar. For similar figures, corresponding sides are proportional, not necessarily equal."}], "id": "q01"}, {"question": "If two triangles are named as $ ABC DEF$, which angle in $\\triangle DEF$ corresponds to angle $B$ in $\\triangle ABC$?", "options": [{"text": "Angle D", "isCorrect": false, "rationale": "Angle A corresponds to Angle D based on the order of letters in the similarity statement."}, {"text": "Angle E", "isCorrect": true, "rationale": "In the similarity statement $ ABC DEF$, the order of the letters indicates corresponding parts. The second letter in the first triangle, B, corresponds to the second letter in the second triangle, E."}, {"text": "Angle F", "isCorrect": false, "rationale": "Angle C corresponds to Angle F based on the order of letters in the similarity statement."}, {"text": "Any angle, as long as the sides are proportional.", "isCorrect": false, "rationale": "Correspondence is specific and determined by the naming convention. Random assignment of angles is incorrect."}], "id": "q02"}, {"question": "According to the definition, which of the following is NOT a necessary condition for two triangles to be similar?", "options": [{"text": "Their corresponding angles are congruent.", "isCorrect": false, "rationale": "This is a necessary condition for similar figures as stated in the definition."}, {"text": "Their corresponding sides are proportional.", "isCorrect": false, "rationale": "This is a necessary condition for similar figures as stated in the definition."}, {"text": "They have at least two pairs of congruent corresponding angles.", "isCorrect": false, "rationale": "This is the AA Similarity property, which is a sufficient condition to *prove* similarity, and it implies all corresponding angles are congruent, making it effectively a necessary condition for the angles."}, {"text": "All of their sides are equal in length.", "isCorrect": true, "rationale": "Similar triangles only require corresponding sides to be *proportional*, not necessarily equal in length. Equal side lengths would mean the triangles are congruent, which is a stricter condition than just similar."}], "id": "q03"}, {"question": "Triangle $GHI$ has angles $35^\\circ$, $90^\\circ$, and $55^\\circ$. Triangle $JKL$ has angles $55^\\circ$, $90^\\circ$, and $35^\\circ$. Are they similar?", "options": [{"text": "No, because the order of the angles is different.", "isCorrect": false, "rationale": "The order of angles in a list does not prevent similarity. What matters is if the two triangles have the same set of angle measures."}, {"text": "Yes, by AA similarity because both triangles contain $35^\\circ$ and $90^\\circ$ angles.", "isCorrect": true, "rationale": "Both triangles share angle measures of $35^\\circ$ and $90^\\circ$ (and consequently $55^\\circ$). Since two pairs of corresponding angles are congruent, the triangles are similar by the AA Similarity property."}, {"text": "Cannot be determined without knowing the side lengths.", "isCorrect": false, "rationale": "The AA Similarity property allows us to determine similarity based solely on angle measures, without needing side lengths."}, {"text": "Only if they are also congruent.", "isCorrect": false, "rationale": "Similarity does not require congruence. Two triangles can be similar without being congruent (i.e., having different sizes)."}], "id": "q04"}, {"question": "Triangle $ABC$ has $m A = 50^\\circ$ and $m B = 60^\\circ$. Triangle $DEF$ has $m D = 50^\\circ$ and $m F = 70^\\circ$. Are the triangles similar?", "options": [{"text": "No, because not all given angles are congruent.", "isCorrect": false, "rationale": "We need to calculate the missing angles before comparing. We cannot conclude non-similarity without fully knowing all angles."}, {"text": "Yes, because the third angle of $\\triangle ABC$ is $70^\\circ$ and the third angle of $\\triangle DEF$ is $60^\\circ$, satisfying AA similarity.", "isCorrect": true, "rationale": "For $\\triangle ABC$, $m C = 180^\\circ - 50^\\circ - 60^\\circ = 70^\\circ$. For $\\triangle DEF$, $m E = 180^\\circ - 50^\\circ - 70^\\circ = 60^\\circ$. Now we have $m A = m D = 50^\\circ$ and $m B = m E = 60^\\circ$. Since two pairs of corresponding angles are congruent, the triangles are similar by AA similarity."}, {"text": "Yes, but only if their sides are proportional.", "isCorrect": false, "rationale": "AA similarity is a criterion that *guarantees* proportionality of sides, so we don't need to check sides if AA is met."}, {"text": "Cannot be determined because we only have two angles for each triangle initially.", "isCorrect": false, "rationale": "We can always find the third angle of a triangle if two angles are known, as the sum of angles in a triangle is $180^\\circ$."}], "id": "q05"}, {"question": "The Angle-Angle (AA) Similarity property states that two triangles are similar if:", "options": [{"text": "All three pairs of corresponding angles are congruent.", "isCorrect": false, "rationale": "While this is true for similar triangles, the AA property states that *two* pairs are sufficient because the third pair will automatically be congruent."}, {"text": "Exactly two pairs of corresponding angles are congruent.", "isCorrect": true, "rationale": "This is the precise statement of the AA Similarity property, as the third pair of angles will necessarily be congruent if the first two are."}, {"text": "All three pairs of corresponding sides are proportional.", "isCorrect": false, "rationale": "This is part of the definition of similar figures, but it is not the AA Similarity *criterion*, which focuses on angles."}, {"text": "At least one pair of corresponding angles is congruent.", "isCorrect": false, "rationale": "One pair of congruent angles is not sufficient to guarantee similarity; the AA property requires two pairs."}], "id": "q06"}, {"question": "The textbook notes that 'Once two pairs of angles match, the third pair must also match'. Why is this true for triangles?", "options": [{"text": "Because all triangles are assumed to be equilateral.", "isCorrect": false, "rationale": "This statement is not specific to equilateral triangles; it applies to all triangles. Not all triangles are equilateral."}, {"text": "Because the sum of the interior angles in any triangle is always $180^\\circ$.", "isCorrect": true, "rationale": "If two angles of one triangle are congruent to two angles of another, then their sums are equal. Since both sums are subtracted from $180^\\circ$ to find the third angle, the third angles must also be equal."}, {"text": "Because it only applies to right triangles.", "isCorrect": false, "rationale": "This principle applies to all triangles, not just right triangles."}, {"text": "Because corresponding sides become proportional, forcing angle congruence.", "isCorrect": false, "rationale": "While proportional sides are a consequence of similar triangles, the reason the third angle matches is due to the constant sum of angles in a triangle, not the side proportionality."}], "id": "q07"}, {"question": "A surveyor stands at point A and sights the top of a flag pole at point F. She notes that $\\angle FAB = 40^\\circ$, where B is the base of the flag pole. Her assistant at point D measures $\\angle FDB = 40^\\circ$. Both are on level ground, and the flag pole is vertical, meaning $\\angle ABF = \\angle DBF = 90^\\circ$. Are triangles $\\triangle FAB$ and $\\triangle FDB$ similar?", "options": [{"text": "No, because points A and D are different, so the triangles cannot be similar.", "isCorrect": false, "rationale": "Having different vertices (A and D) does not prevent triangles from being similar; similarity depends on angle congruence and side proportionality."}, {"text": "Yes, by AA similarity, as both triangles contain a $90^\\circ$ angle (at B) and a $40^\\circ$ angle (at A and D respectively).", "isCorrect": true, "rationale": "Both triangles share a $90^\\circ$ angle at the base of the flag pole ($\\angle ABF = \\angle DBF = 90^\\circ$). Additionally, it is given that $\\angle FAB = 40^\\circ$ and $\\angle FDB = 40^\\circ$. Since two pairs of corresponding angles are congruent, the triangles are similar by AA similarity."}, {"text": "Cannot be determined without knowing the height of the flag pole.", "isCorrect": false, "rationale": "AA similarity is a criterion based on angles alone; side lengths or specific heights are not needed to determine if triangles are similar by this property."}, {"text": "Only if $\\triangle FAB$ and $\\triangle FDB$ are congruent.", "isCorrect": false, "rationale": "Similarity is a broader concept than congruence. Triangles can be similar without being congruent."}], "id": "q08"}, {"question": "The textbook includes a 'caution' not to assume triangles are similar just because they 'look alike'. What is the primary reason for this caution?", "options": [{"text": "Only congruent triangles can truly 'look alike'.", "isCorrect": false, "rationale": "Similar triangles also 'look alike' but may differ in size. Congruent triangles are a special case of similar triangles."}, {"text": "Visual appearance can be deceptive; mathematical verification using criteria like AA similarity is required.", "isCorrect": true, "rationale": "The caution emphasizes that visual estimation is unreliable. To prove similarity, one must verify the conditions, such as two pairs of congruent corresponding angles (AA criterion)."}, {"text": "Side lengths are always more important than angles for determining similarity.", "isCorrect": false, "rationale": "The AA Similarity property demonstrates that angles alone (two pairs) are sufficient to determine similarity, without needing side lengths directly."}, {"text": "Similarity is an abstract concept that rarely applies to real-world objects.", "isCorrect": false, "rationale": "The text explicitly provides real-world examples (enlarging photos, surveyor measurements) where similarity applies, disproving this statement."}], "id": "q09"}, {"question": "Which of the following pairs of triangles is NOT similar?", "options": [{"text": "Triangle 1: Angles $60^\\circ, 60^\\circ, 60^\\circ$; Triangle 2: Angles $60^\\circ, 60^\\circ, 60^\\circ$", "isCorrect": false, "rationale": "Both are equilateral triangles, meaning all their angles are $60^\\circ$. Thus, all corresponding angles are congruent, and they are similar."}, {"text": "Triangle 1: Angles $40^\\circ, 90^\\circ, 50^\\circ$; Triangle 2: Angles $50^\\circ, 90^\\circ, 40^\\circ$", "isCorrect": false, "rationale": "Both triangles have angle measures of $40^\\circ, 50^\\circ,$ and $90^\\circ$. Since all angle measures match, they are similar by AA similarity."}, {"text": "Triangle 1: Angles $70^\\circ, 40^\\circ, 70^\\circ$; Triangle 2: Angles $70^\\circ, 50^\\circ, 60^\\circ$", "isCorrect": true, "rationale": "For Triangle 1, the angles are $70^\\circ, 40^\\circ$, and $180^\\circ - 70^\\circ - 40^\\circ = 70^\\circ$. For Triangle 2, the angles are $70^\\circ, 50^\\circ$, and $180^\\circ - 70^\\circ - 50^\\circ = 60^\\circ$. Comparing the sets of angles ($70^\\circ, 40^\\circ, 70^\\circ$ vs. $70^\\circ, 50^\\circ, 60^\\circ$), only one angle ($70^\\circ$) matches between them. Therefore, they are not similar."}, {"text": "Triangle 1: Angles $30^\\circ, 100^\\circ, 50^\\circ$; Triangle 2: Angles $50^\\circ, 100^\\circ, 30^\\circ$", "isCorrect": false, "rationale": "Both triangles have angle measures of $30^\\circ, 50^\\circ,$ and $100^\\circ$. Since all angle measures match, they are similar by AA similarity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
