    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental property of the absolute value of any real number?", "options": [{"text": "It is always negative.", "isCorrect": false, "rationale": "The absolute value of a number is its distance from zero, which cannot be negative. For example, $|-5| = 5$."}, {"text": "It represents its position on the number line.", "isCorrect": false, "rationale": "While related to position, the absolute value specifically represents distance from zero, not the position itself (which can be negative)."}, {"text": "It is its distance from zero, always non-negative.", "isCorrect": true, "rationale": "The definition states that absolute value is the distance from zero on the number line, and distance is always positive or zero (non-negative)."}, {"text": "It is its opposite value.", "isCorrect": false, "rationale": "This is only true if the number is positive (e.g., $|5| = 5$, and its opposite is -5, which is not the absolute value). If the number is negative, its absolute value is its opposite (e.g., $|-5|=5$, and its opposite is 5)."}]}, {"question": "Evaluate the expression: $|-10 - 3|$.", "options": [{"text": "-13", "isCorrect": false, "rationale": "The absolute value of a number is always non-negative. After evaluating the expression inside the bars, we get $|-13|$, which is 13, not -13."}, {"text": "-7", "isCorrect": false, "rationale": "This results from an incorrect calculation of the expression inside the absolute value or an incorrect understanding of absolute value's non-negative property."}, {"text": "7", "isCorrect": false, "rationale": "This results from an incorrect calculation of the expression inside the absolute value. The correct value inside is -13."}, {"text": "13", "isCorrect": true, "rationale": "First, simplify the expression inside the absolute value bars: $-10 - 3 = -13$. Then, take the absolute value of $-13$, which is $13$ because it is $13$ units from zero."}]}, {"question": "According to the formal definition, if $a < 0$, then $|a|$ is equivalent to:", "options": [{"text": "$a$", "isCorrect": false, "rationale": "The definition states $|a| = a$ only if $a \\ge 0$. If $a < 0$, then $a$ itself is negative, but absolute value must be non-negative."}, {"text": "$0$", "isCorrect": false, "rationale": "The absolute value is $0$ only if $a=0$. If $a < 0$, $a$ is not $0$."}, {"text": "$-a$", "isCorrect": true, "rationale": "When $a < 0$, $-a$ represents the opposite of $a$. Since $a$ is negative, its opposite $-a$ will be positive, satisfying the condition that absolute value is non-negative. For example, if $a = -5$, then $|-5| = 5$, and $-a = -(-5) = 5$."}, {"text": "$|-a|$", "isCorrect": false, "rationale": "While this will yield a positive result (e.g., for $a=-5$, $|-(-5)|=|5|=5$), the question asks for the equivalent expression based on the formal definition, which is $-a$ directly."}]}, {"question": "Which statement correctly differentiates between $-|6|$ and $|-6|$?", "options": [{"text": "Both expressions evaluate to 6.", "isCorrect": false, "rationale": "The expression $-|6|$ evaluates to $-6$, not $6$."}, {"text": "$-|6|$ evaluates to -6, while $|-6|$ evaluates to 6.", "isCorrect": true, "rationale": "The absolute value of $6$ is $6$, so $-|6|$ means $-(6) = -6$. The absolute value of $-6$ is $6$, as it is $6$ units from zero. This is a crucial distinction highlighted in the text's caution note."}, {"text": "Both expressions evaluate to -6.", "isCorrect": false, "rationale": "The expression $|-6|$ evaluates to $6$, not $-6$."}, {"text": "$-|6|$ evaluates to 6, while $|-6|$ evaluates to -6.", "isCorrect": false, "rationale": "This swaps the correct evaluations. $-|6|$ is $-6$, and $|-6|$ is $6$."}]}, {"question": "Evaluate $5 - |2 - 8| + 3^2$.", "options": [{"text": "11", "isCorrect": false, "rationale": "A common error might be $5 - |-6| + 9 = 5 - (-6) + 9 = 5 + 6 + 9 = 20$, or $5 - 6 - 9 = -10$. Careful application of order of operations is needed."}, {"text": "8", "isCorrect": true, "rationale": "Following the order of operations, absolute value bars act as grouping symbols: \\n1. $2 - 8 = -6$, so $|2 - 8| = |-6| = 6$. \\n2. $3^2 = 9$. \\n3. The expression becomes $5 - 6 + 9$. \\n4. $5 - 6 = -1$. \\n5. $-1 + 9 = 8$."}, {"text": "-10", "isCorrect": false, "rationale": "This might result from calculation errors, such as incorrectly treating the absolute value or misapplying the order of operations, possibly $5 - 6 - 9 = -10$."}, {"text": "17", "isCorrect": false, "rationale": "This could occur if the operations were performed out of order, perhaps $5 - 2 - 8 + 9 = 4$, or if $|-6|$ was somehow treated as $-6$ in subtraction $5 - (-6) + 9 = 20$, or a general miscalculation."}]}, {"question": "Find all values of $x$ that satisfy $|x| = 9$.", "options": [{"text": "$x = 9$ only", "isCorrect": false, "rationale": "This answer misses the possibility that a negative number can also have an absolute value of 9."}, {"text": "$x = -9$ only", "isCorrect": false, "rationale": "This answer misses the possibility that a positive number can also have an absolute value of 9."}, {"text": "$x = 9$ or $x = -9$", "isCorrect": true, "rationale": "The definition of absolute value states that it is the distance from zero. Both $9$ and $-9$ are $9$ units away from zero on the number line, so both values satisfy the equation."}, {"text": "No solution", "isCorrect": false, "rationale": "There are clearly two solutions to this equation."}]}, {"question": "If the temperature dropped from $12^\\circ F$ to $-5^\\circ F$, what is the absolute change in temperature?", "options": [{"text": "$7^\\circ F$", "isCorrect": false, "rationale": "This is the result of $12 - 5$, incorrectly ignoring the negative sign of the final temperature."}, {"text": "$17^\\circ F$", "isCorrect": true, "rationale": "The change in temperature is found by calculating the difference between the two temperatures and taking its absolute value. This is $|12 - (-5)| = |12 + 5| = |17| = 17$, or $|-5 - 12| = |-17| = 17$."}, {"text": "$-17^\\circ F$", "isCorrect": false, "rationale": "Absolute change or distance is always a non-negative value. The sign indicates direction, but absolute change quantifies magnitude."}, {"text": "$0^\\circ F$", "isCorrect": false, "rationale": "A change in temperature clearly occurred, so the absolute change cannot be zero."}]}, {"question": "Which expression represents the distance between $-15$ and $8$ on the number line?", "options": [{"text": "$|-15 + 8|$", "isCorrect": false, "rationale": "This expression evaluates to $|-7|=7$, which is not the distance between $-15$ and $8$. Distance is found by subtraction, not addition."}, {"text": "$|-15 - 8|$", "isCorrect": true, "rationale": "The distance between two numbers $a$ and $b$ is given by $|a - b|$. Here, $a=-15$ and $b=8$, so $|-15 - 8| = |-23| = 23$. Alternatively, $|8 - (-15)| = |8 + 15| = |23| = 23$."}, {"text": "$8 - 15$", "isCorrect": false, "rationale": "This evaluates to $-7$. Distance must be a non-negative value."}, {"text": "$15 - 8$", "isCorrect": false, "rationale": "This evaluates to $7$, which is not the correct distance between $-15$ and $8$. This calculation is for the distance between $15$ and $8$."}]}, {"question": "A student's calculation resulted in $4.85$, but the correct value was $5.00$. What is the absolute error?", "options": [{"text": "$0.15$", "isCorrect": true, "rationale": "Absolute error is the absolute value of the difference between the actual measurement and the target measurement. Here, $|5.00 - 4.85| = |0.15| = 0.15$."}, {"text": "$-0.15$", "isCorrect": false, "rationale": "Absolute error, like any distance or difference without regard to direction, must be non-negative."}, {"text": "$9.85$", "isCorrect": false, "rationale": "This is the sum of the two values, not the absolute error."}, {"text": "$0.00$", "isCorrect": false, "rationale": "There is a difference between the calculated and correct values, so the error is not zero."}]}, {"question": "Evaluate $-|1 - (2 \\times 3^2)|$.", "options": [{"text": "17", "isCorrect": false, "rationale": "This result likely comes from correctly calculating the absolute value inside, $|-17|=17$, but then ignoring the leading negative sign outside the absolute value bars."}, {"text": "-17", "isCorrect": true, "rationale": "Follow the order of operations: \\n1. Evaluate the exponent: $3^2 = 9$. \\n2. Perform multiplication inside the parentheses: $2 \\times 9 = 18$. \\n3. Perform subtraction inside the absolute value: $1 - 18 = -17$. \\n4. Take the absolute value: $|-17| = 17$. \\n5. Apply the leading negative sign: $-(17) = -17$."}, {"text": "-11", "isCorrect": false, "rationale": "This suggests an arithmetic error within the absolute value, such as $1 - 2 \\times 3^2 = 1 - 6^2 = 1 - 36 = -35$, or $1 - (2 \\times 3)^2 = 1 - 6^2 = 1 - 36 = -35$. Or a different miscalculation like $1-(2 \\times 3)^2 = 1-6^2 = 1-36=-35$, or even $1-(2 \\times 3) \\times 2 = 1-12=-11$."}, {"text": "11", "isCorrect": false, "rationale": "This is likely from an error similar to the -11 option, but then ignoring the leading negative sign outside the absolute value bars."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
