<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the result of $5/6 - 3/8$?", "options": [{"text": "$2/2$", "isCorrect": false, "rationale": "This option incorrectly subtracts the numerators and denominators directly, which is not how fraction subtraction works."}, {"text": "$11/24$", "isCorrect": true, "rationale": "To subtract fractions, find the Least Common Denominator (LCD) for 6 and 8, which is 24. Convert the fractions: $5/6 = 20/24$ and $3/8 = 9/24$. Then subtract: $20/24 - 9/24 = 11/24$."}, {"text": "$7/48$", "isCorrect": false, "rationale": "This option might result from an incorrect LCD calculation or a calculation error after finding the LCD."}, {"text": "$1/24$", "isCorrect": false, "rationale": "This option indicates a calculation error after correctly finding the LCD or a misunderstanding of how to subtract numerators."}], "id": "q01"}, {"question": "Compute the expression $5/6 \\div 15/8$.", "options": [{"text": "$25/32$", "isCorrect": false, "rationale": "This option incorrectly multiplies the fractions instead of dividing."}, {"text": "$4/9$", "isCorrect": true, "rationale": "To divide fractions, multiply the first fraction by the reciprocal of the second fraction: $5/6 \\times 8/15$. This results in $(5 \\times 8) / (6 \\times 15) = 40/90$. Simplifying $40/90$ by dividing both numerator and denominator by 10 gives $4/9$."}, {"text": "$15/16$", "isCorrect": false, "rationale": "This option suggests an incorrect inversion of one of the fractions or an arithmetic error during multiplication."}, {"text": "$75/48$", "isCorrect": false, "rationale": "This option multiplies the numerators and denominators directly, indicating a misunderstanding of fraction division."}], "id": "q02"}, {"question": "Calculate $5\\frac{1}{3} - 2\\frac{3}{4}$.", "options": [{"text": "$3\\frac{2}{3}$", "isCorrect": false, "rationale": "This option incorrectly subtracts the whole numbers and then attempts to subtract the fractions without proper borrowing or conversion, leading to an incorrect fractional part."}, {"text": "$2\\frac{7}{12}$", "isCorrect": true, "rationale": "First, convert the mixed numbers to improper fractions: $5\\frac{1}{3} = (5 \\times 3 + 1)/3 = 16/3$ and $2\\frac{3}{4} = (2 \\times 4 + 3)/4 = 11/4$. The LCD of 3 and 4 is 12. Convert to equivalent fractions: $16/3 = 64/12$ and $11/4 = 33/12$. Subtract: $64/12 - 33/12 = 31/12$. Convert back to a mixed number: $31 \\div 12 = 2$ with a remainder of $7$, so $2\\frac{7}{12}$."}, {"text": "$3\\frac{1}{12}$", "isCorrect": false, "rationale": "This option likely results from an error in finding the common denominator, converting fractions, or making a calculation mistake during subtraction."}, {"text": "$2\\frac{1}{4}$", "isCorrect": false, "rationale": "This option indicates a significant calculation error, possibly from incorrect conversion or misapplication of subtraction rules for mixed numbers."}], "id": "q03"}, {"question": "Evaluate $3.6 \\times 0.25 + 1.8 \\div 0.4$.", "options": [{"text": "$1.62$", "isCorrect": false, "rationale": "This option would be correct if the second operation was $1.8 \\times 0.4$ instead of $1.8 \\div 0.4$. Following the order of operations, multiplication and division are performed from left to right before addition."}, {"text": "$5.4$", "isCorrect": true, "rationale": "Following the order of operations (PEMDAS/BODMAS), perform multiplication and division first. $3.6 \\times 0.25 = 0.9$. Then, $1.8 \\div 0.4 = 4.5$. Finally, add the results: $0.9 + 4.5 = 5.4$."}, {"text": "$0.36$", "isCorrect": false, "rationale": "This option suggests incorrect calculations for both multiplication and division, or an incorrect application of the order of operations."}, {"text": "$7.2$", "isCorrect": false, "rationale": "This option indicates a significant calculation error in one or both of the initial operations or in the final addition."}], "id": "q04"}, {"question": "Compute $3/4 + 0.6 - 1/5$.", "options": [{"text": "$0.85$", "isCorrect": false, "rationale": "This option suggests a calculation error, possibly from incorrect decimal conversion or arithmetic. The correct decimal value is 1.15."}, {"text": "$1\\frac{3}{20}$", "isCorrect": true, "rationale": "To combine fractions and decimals, convert all numbers to the same form. Converting to fractions is usually more precise. $0.6 = 6/10 = 3/5$. The expression becomes $3/4 + 3/5 - 1/5$. The LCD for 4 and 5 is 20. Convert: $3/4 = 15/20$, $3/5 = 12/20$, $1/5 = 4/20$. Compute: $15/20 + 12/20 - 4/20 = 23/20$. As a mixed number, $23/20 = 1\\frac{3}{20}$."}, {"text": "$23/100$", "isCorrect": false, "rationale": "This option suggests an incorrect calculation of the numerator or an error in simplifying to the lowest terms."}, {"text": "$0.95$", "isCorrect": false, "rationale": "This option indicates a calculation error, perhaps from misinterpreting the operations or values."}], "id": "q05"}, {"question": "A baker has a recipe that requires $3\\frac{1}{2}$ cups of sugar. If they want to make $2/3$ of the recipe, how much sugar do they need?", "options": [{"text": "$2\\frac{1}{3}$ cups", "isCorrect": true, "rationale": "To find out how much sugar is needed for $2/3$ of the recipe, multiply the total amount of sugar by $2/3$. First, convert the mixed number to an improper fraction: $3\\frac{1}{2} = (3 \\times 2 + 1)/2 = 7/2$. Then multiply: $7/2 \\times 2/3 = (7 \\times 2) / (2 \\times 3) = 14/6$. Simplify the fraction: $14/6 = 7/3$. Convert back to a mixed number: $7 \\div 3 = 2$ with a remainder of $1$, so $2\\frac{1}{3}$ cups."}, {"text": "$2\\frac{1}{2}$ cups", "isCorrect": false, "rationale": "This option results from an incorrect multiplication or a misinterpretation of the fractional part."}, {"text": "$1\\frac{3}{4}$ cups", "isCorrect": false, "rationale": "This option indicates an arithmetic error or incorrect setup of the problem."}, {"text": "$2\\frac{1}{6}$ cups", "isCorrect": false, "rationale": "This option suggests a calculation mistake, possibly with the common denominator or numerator."}], "id": "q06"}, {"question": "According to the text, what is a primary advantage of converting mixed numbers to improper fractions before performing subtraction?", "options": [{"text": "It always results in a smaller numerator, making calculations easier.", "isCorrect": false, "rationale": "Converting to improper fractions usually results in larger numerators, not smaller ones, and the primary benefit is not about the size of the numerator."}, {"text": "It eliminates the need to find a common denominator.", "isCorrect": false, "rationale": "Converting to improper fractions does not eliminate the need for a common denominator; you still need to find one to add or subtract fractions."}, {"text": "It avoids the complication of 'borrowing' from the whole number part.", "isCorrect": true, "rationale": "The text explicitly states in the 'caution' box that 'Converting to improper fractions avoids this complication [of borrowing from the whole number].' This is the direct advantage highlighted."}, {"text": "It makes the final answer a proper fraction, which is preferred.", "isCorrect": false, "rationale": "The final answer may still be an improper fraction (which is then converted back to a mixed number), so this is not a benefit of converting to improper fractions for the operation itself."}], "id": "q07"}, {"question": "When combining fractions and decimals in a calculation, which statement accurately reflects the advice given in the text?", "options": [{"text": "Converting to decimals is always preferred for speed and precision.", "isCorrect": false, "rationale": "The text states that converting to fractions is 'usually more precise,' directly contradicting the claim that decimals are always preferred for precision."}, {"text": "Converting to fractions is usually more precise, while converting to decimals can be faster.", "isCorrect": true, "rationale": "The text explicitly states: 'Converting to fractions is usually more precise; converting to decimals is sometimes faster.' This option accurately summarizes this advice."}, {"text": "It is generally best to work with fractions for additions and decimals for multiplications.", "isCorrect": false, "rationale": "The text does not provide specific guidance to use fractions for additions and decimals for multiplications; it advises converting everything to the same form."}, {"text": "The choice of conversion method depends solely on the magnitude of the numbers involved.", "isCorrect": false, "rationale": "The text indicates that the choice depends on factors like precision (favoring fractions) and speed (favoring decimals), not solely the magnitude of the numbers."}], "id": "q08"}, {"question": "Evaluate $(2/3 + 1/6) \\times 4/5$.", "options": [{"text": "$4/5$", "isCorrect": false, "rationale": "This option would be correct if the sum in the parentheses simplified to 1. However, $2/3 + 1/6 = 5/6$, not 1."}, {"text": "$2/3$", "isCorrect": true, "rationale": "First, perform the operation inside the parentheses: $2/3 + 1/6$. The LCD is 6. Convert $2/3$ to $4/6$. So, $4/6 + 1/6 = 5/6$. Then multiply this result by $4/5$: $5/6 \\times 4/5 = (5 \\times 4) / (6 \\times 5) = 20/30$. Simplify the fraction: $20/30 = 2/3$."}, {"text": "$1/2$", "isCorrect": false, "rationale": "This option results from an incorrect calculation of the sum or the product."}, {"text": "$8/15$", "isCorrect": false, "rationale": "This option suggests a calculation error during the multiplication step after addition, or ignoring the $1/6$ in the sum."}], "id": "q09"}, {"question": "A recipe calls for $1/2$ cup of milk. You have $0.75$ cups. If you use the required amount for the recipe and then add another $1/4$ cup for a different purpose, how much milk do you have left?", "options": [{"text": "$0.25$ cups", "isCorrect": false, "rationale": "This option indicates a calculation error, such as only subtracting one of the used amounts or making an arithmetic mistake."}, {"text": "$0$ cups", "isCorrect": true, "rationale": "Start with $0.75$ cups. Convert all quantities to decimals for easier calculation: $1/2$ cup = $0.5$ cups, and $1/4$ cup = $0.25$ cups. First, subtract the amount used for the recipe: $0.75 - 0.5 = 0.25$ cups. Then, subtract the amount used for a different purpose: $0.25 - 0.25 = 0$ cups. So, you have $0$ cups of milk left."}, {"text": "$1/8$ cup", "isCorrect": false, "rationale": "This option results from a calculation error, such as incorrect subtraction or conversion."}, {"text": "$1/4$ cup", "isCorrect": false, "rationale": "This option results from a calculation error, such as only subtracting the first amount used ($0.75 - 0.5 = 0.25$) and not the second."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
