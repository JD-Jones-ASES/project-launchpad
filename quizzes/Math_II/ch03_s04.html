    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental difference between simple interest and compound interest?", "options": [{"text": "Simple interest rates are always lower than compound interest rates.", "isCorrect": false, "rationale": "The interest rate itself is independent of whether the interest is simple or compound. The difference lies in how that rate is applied to the principal over time."}, {"text": "Simple interest is only calculated once, while compound interest is calculated multiple times.", "isCorrect": false, "rationale": "Simple interest is calculated over the entire period, and while the calculation is done once, it represents the interest for the whole term. Compound interest is also calculated once per period (e.g., annually) but added to the principal for subsequent periods."}, {"text": "Simple interest is calculated solely on the original principal, whereas compound interest is calculated on the principal plus any accumulated interest.", "isCorrect": true, "rationale": "This accurately reflects the definitions given in the text. Simple interest's principal 'stays the same each year,' while compound interest 'is added to the principal, so you earn interest on your interest.'"}, {"text": "Compound interest is used for savings accounts, and simple interest is used for loans.", "isCorrect": false, "rationale": "Both types of interest can apply to savings accounts and loans, depending on the terms offered by the financial institution."}], "id": "q01"}, {"question": "A bank offers an account that pays 3.5% simple interest annually. If you deposit $2,500, how much interest would you earn after 4 years?", "options": [{"text": "$2,850.00", "isCorrect": false, "rationale": "This amount represents the principal plus an incorrect interest calculation, or a misunderstanding of what the question is asking (total amount vs. interest earned)."}, {"text": "$350.00", "isCorrect": true, "rationale": "Using the simple interest formula I = Prt: I = $2,500 * 0.035 * 4 = $350.00."}, {"text": "$3,500.00", "isCorrect": false, "rationale": "This would be an error in calculation, potentially multiplying by 3.5 instead of 0.035, or misunderstanding the principal's role."}, {"text": "$87.50", "isCorrect": false, "rationale": "This would be the interest for one year only ($2,500 * 0.035), not for four years."}], "id": "q02"}, {"question": "You deposit $1,500 into an account that earns 5% interest compounded annually. What will be the total amount in the account after 2 years?", "options": [{"text": "$1,575.00", "isCorrect": false, "rationale": "This is the total amount after one year of simple or compound interest ($1,500 * 1.05)."}, {"text": "$1,650.00", "isCorrect": false, "rationale": "This would be the total amount if simple interest were applied ($1,500 + ($1,500 * 0.05 * 2))."}, {"text": "$1,653.75", "isCorrect": true, "rationale": "Using the compound interest formula A = P(1 + r)^t: A = $1,500 * (1 + 0.05)^2 = $1,500 * (1.05)^2 = $1,500 * 1.1025 = $1,653.75."}, {"text": "$1,507.50", "isCorrect": false, "rationale": "This indicates an error in calculation, possibly using r as 0.005 or making a mistake in squaring the (1+r) term."}], "id": "q03"}, {"question": "In the simple interest formula, I = Prt, what does the variable 'r' specifically represent?", "options": [{"text": "The total amount repaid.", "isCorrect": false, "rationale": "'r' represents the annual interest rate, not the total amount repaid, which would be P + I."}, {"text": "The total number of payments.", "isCorrect": false, "rationale": "'t' represents the time in years, which is related to the number of periods, but 'r' is not the number of payments."}, {"text": "The annual interest rate expressed as a decimal.", "isCorrect": true, "rationale": "According to the text, 'r' is 'the annual interest rate (as a decimal)'."}, {"text": "The total interest earned over the loan term.", "isCorrect": false, "rationale": "'I' represents the total interest earned, not 'r'."}], "id": "q04"}, {"question": "When calculating compound interest with the formula A = P(1 + r)^t, what does 'A' signify?", "options": [{"text": "The accumulated interest earned.", "isCorrect": false, "rationale": "'A' is the final amount, which includes both the principal and the accumulated interest. The interest earned alone would be A - P."}, {"text": "The original principal amount.", "isCorrect": false, "rationale": "'P' represents the original principal amount."}, {"text": "The annual interest rate.", "isCorrect": false, "rationale": "'r' represents the annual interest rate."}, {"text": "The total amount in the account after 't' years, including principal and interest.", "isCorrect": true, "rationale": "As defined in the text, 'A is the final amount,' which means the principal plus all earned interest."}], "id": "q05"}, {"question": "You have $1,000 to invest for 3 years at an annual interest rate of 6%. Which method of interest calculation would yield a higher total amount, and by how much?", "options": [{"text": "Simple interest, by $180.00.", "isCorrect": false, "rationale": "This is the simple interest earned (1000 * 0.06 * 3 = 180), not the total amount or the difference between the two methods."}, {"text": "Compound interest, by approximately $11.02.", "isCorrect": true, "rationale": "Simple interest total: $1,000 + ($1,000 * 0.06 * 3) = $1,180.00. Compound interest total: $1,000 * (1 + 0.06)^3 = $1,000 * 1.191016 = $1,191.02. The difference is $1,191.02 - $1,180.00 = $11.02. Compound interest yields more, as shown in the text's side-by-side comparison."}, {"text": "Compound interest, by approximately $191.02.", "isCorrect": false, "rationale": "This value is the interest earned with compound interest ($1,191.02 - $1,000), not the difference between the two methods."}, {"text": "Both simple and compound interest would yield the same total amount.", "isCorrect": false, "rationale": "The text clearly states and demonstrates that compound interest generally earns more than simple interest over the same period due to earning interest on interest."}], "id": "q06"}, {"question": "Why does compound interest typically result in a greater final amount compared to simple interest over the same period, principal, and rate?", "options": [{"text": "Compound interest always has a higher interest rate.", "isCorrect": false, "rationale": "The comparison assumes the *same* interest rate for both methods. The difference is in how the rate is applied, not the rate itself."}, {"text": "Simple interest calculations are generally more complex.", "isCorrect": false, "rationale": "Simple interest calculations (I=Prt) are generally less complex than compound interest (A=P(1+r)^t)."}, {"text": "Compound interest continuously recalculates interest on the increasing balance, including previously earned interest.", "isCorrect": true, "rationale": "This is the core concept of compound interest as stated: 'the interest earned is added to the principal, so you earn interest on your interest.' This leads to exponential growth."}, {"text": "Simple interest only applies to short-term investments.", "isCorrect": false, "rationale": "Simple interest can be applied to investments or loans of any duration, though its effects are less dramatic over longer periods compared to compound interest."}], "id": "q07"}, {"question": "A small business takes out a loan of $10,000 at 7% simple interest for 5 years. What is the total amount the business must repay to the lender?", "options": [{"text": "$3,500.00", "isCorrect": false, "rationale": "This is only the interest earned ($10,000 * 0.07 * 5). The question asks for the *total* repayment."}, {"text": "$10,000.00", "isCorrect": false, "rationale": "This is only the principal amount. The business must also repay the interest."}, {"text": "$13,500.00", "isCorrect": true, "rationale": "First, calculate the simple interest: I = Prt = $10,000 * 0.07 * 5 = $3,500. Then, add the interest to the principal for the total repayment: Total = Principal + Interest = $10,000 + $3,500 = $13,500."}, {"text": "$10,700.00", "isCorrect": false, "rationale": "This would be the total if the loan was for only one year ($10,000 + $10,000 * 0.07)."}], "id": "q08"}, {"question": "If you invest $500 in an account earning 3% interest compounded annually for 2 years, what is the *total interest earned*?", "options": [{"text": "$15.00", "isCorrect": false, "rationale": "This is the interest earned in the first year only ($500 * 0.03)."}, {"text": "$30.00", "isCorrect": false, "rationale": "This would be the interest earned if it were simple interest ($500 * 0.03 * 2)."}, {"text": "$30.45", "isCorrect": true, "rationale": "First, calculate the final amount: A = P(1 + r)^t = $500 * (1 + 0.03)^2 = $500 * (1.03)^2 = $500 * 1.0609 = $530.45. Then, subtract the principal to find the interest earned: Interest = A - P = $530.45 - $500 = $30.45."}, {"text": "$530.45", "isCorrect": false, "rationale": "This is the total amount in the account, including the principal. The question asks for the *total interest earned*."}], "id": "q09"}, {"question": "You are calculating simple interest for an annual rate of 4.5% over a period of 18 months. What value should you use for 't' in the formula I = Prt?", "options": [{"text": "18", "isCorrect": false, "rationale": "The caution note explicitly states that 'time must be in years,' not months. Using '18' would drastically overstate the interest."}, {"text": "0.18", "isCorrect": false, "rationale": "This would be an incorrect conversion of months to years, likely dividing 18 by 100 instead of 12."}, {"text": "1.5", "isCorrect": true, "rationale": "As per the caution note, if the rate is annual, time must be in years. 18 months divided by 12 months/year equals 1.5 years."}, {"text": "0.45", "isCorrect": false, "rationale": "This value represents the interest rate as a decimal (4.5%), not the time period 't'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
