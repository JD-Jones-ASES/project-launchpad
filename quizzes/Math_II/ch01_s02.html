    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental condition required to apply the Product Rule for Exponents?", "options": [{"text": "The exponents must be the same.", "isCorrect": false, "rationale": "The Product Rule ($a^m a^n = a^{m+n}$) requires the bases to be the same, not the exponents."}, {"text": "The bases must be the same.", "isCorrect": true, "rationale": "According to the text, 'The product rule requires the same base.' This is the primary condition for its application."}, {"text": "The bases must be positive integers.", "isCorrect": false, "rationale": "While the rule is stated for nonzero bases, the critical condition for applying it is having the same base, not just that the base is a positive integer. The exponents (m and n) are required to be positive integers."}, {"text": "The exponents must be positive integers.", "isCorrect": false, "rationale": "The text states 'positive integers m and n' for exponents, but this is a characteristic of the exponents, not the primary condition for applying the rule itself. The critical condition is identical bases."}]}, {"question": "Simplify the expression $x^4 \\cdot x \\cdot x^6$.", "options": [{"text": "$x^{10}$", "isCorrect": false, "rationale": "This would be true if the expression was $x^4 \\cdot x^6$ or $x^4 \\cdot x^5$. However, it misses the exponent of 1 on the middle 'x' term."}, {"text": "$x^{11}$", "isCorrect": true, "rationale": "Using the Product Rule, we keep the base and add the exponents: $4 + 1 + 6 = 11$. So, $x^4 \\cdot x^1 \\cdot x^6 = x^{4+1+6} = x^{11}$."}, {"text": "$x^{24}$", "isCorrect": false, "rationale": "This results from multiplying the exponents, which is incorrect. The Product Rule requires adding exponents when bases are multiplied, not multiplying them."}, {"text": "$3x^{11}$", "isCorrect": false, "rationale": "The coefficient of '3' is incorrectly introduced. When multiplying powers with the same base, the base itself is kept, not multiplied by the number of terms."}]}, {"question": "Which of the following expressions *cannot* be directly simplified using the Product Rule for Exponents as presented in this section?", "options": [{"text": "$y^3 \\cdot y^8$", "isCorrect": false, "rationale": "This expression can be simplified using the Product Rule ($y^{3+8} = y^{11}$) because the bases are the same."}, {"text": "$2^5 \\cdot 2^2$", "isCorrect": false, "rationale": "This expression can be simplified using the Product Rule ($2^{5+2} = 2^7$) because the bases are the same."}, {"text": "$a^2 \\cdot b^7$", "isCorrect": true, "rationale": "The text explicitly states: 'The product rule requires the same base. You cannot simplify $2^3 3^4$ using the product rule because the bases are different.' In this option, the bases 'a' and 'b' are different, so the Product Rule does not apply directly."}, {"text": "$3x^4 \\cdot x^5$", "isCorrect": false, "rationale": "This can be simplified by treating '3' as a coefficient and applying the Product Rule to $x^4 \\cdot x^5$, resulting in $3x^{4+5} = 3x^9$. The Product Rule applies to the variables with the same base."}]}, {"question": "A student is simplifying $(m^6)^4$. Which rule should they apply, and what is the simplified result?", "options": [{"text": "Product Rule; $m^{10}$", "isCorrect": false, "rationale": "The Product Rule is for multiplying powers with the same base ($a^m a^n = a^{m+n}$), not raising a power to a power. Adding the exponents here is incorrect for $(m^6)^4$."}, {"text": "Quotient Rule; $m^2$", "isCorrect": false, "rationale": "The Quotient Rule is for dividing powers with the same base ($a^m/a^n = a^{m-n}$), not raising a power to a power. Subtracting exponents here is incorrect."}, {"text": "Power Rule; $m^{24}$", "isCorrect": true, "rationale": "This is an application of the Power Rule for Exponents ($ (a^m)^n = a^{mn} $). We keep the base 'm' and multiply the exponents: $6 \\times 4 = 24$. The result is $m^{24}$."}, {"text": "Power of a Product Rule; $m^6 m^4$", "isCorrect": false, "rationale": "The Power of a Product Rule is for $(ab)^n = a^n b^n$. While it involves distributing an exponent, it's not the correct rule for a single base raised to two powers, and the suggested result is not simplified correctly according to any rule for this form."}]}, {"question": "Simplify the expression $(5x^2)^3$.", "options": [{"text": "$5x^6$", "isCorrect": false, "rationale": "This incorrectly applies the exponent only to 'x' and not to the coefficient '5'. Also, it implies only multiplying the inner exponent, not applying the outer exponent to the entire term $x^2$ correctly (which would be $(x^2)^3 = x^6$)."}, {"text": "$125x^5$", "isCorrect": false, "rationale": "This correctly applies $5^3 = 125$ but incorrectly adds the exponents for $x$, giving $x^{2+3}$ instead of multiplying them."}, {"text": "$125x^6$", "isCorrect": true, "rationale": "Using the Power of a Product Rule, $(ab)^n = a^n b^n$, we distribute the exponent '3' to both '5' and $x^2$. So, $5^3 (x^2)^3$. Then, using the Power Rule for $(x^2)^3$, we multiply the exponents: $2 \\times 3 = 6$. Thus, $5^3 x^6 = 125x^6$."}, {"text": "$15x^6$", "isCorrect": false, "rationale": "This incorrectly multiplies the coefficient '5' by the exponent '3' instead of raising it to the power of '3'. It correctly applies the power rule to $x^2$ for the exponent '6'."}]}, {"question": "Simplify $(a^3 b^5)^2$.", "options": [{"text": "$a^5 b^7$", "isCorrect": false, "rationale": "This incorrectly adds the exponents, which is a common mistake confusing the Power Rule with the Product Rule."}, {"text": "$a^6 b^{10}$", "isCorrect": true, "rationale": "Using the Power of a Product Rule, $(ab)^n = a^n b^n$, we distribute the exponent '2' to both $a^3$ and $b^5$. This results in $(a^3)^2 (b^5)^2$. Then, using the Power Rule, $(a^m)^n = a^{mn}$, we multiply the exponents: $3 \\times 2 = 6$ for 'a' and $5 \\times 2 = 10$ for 'b'. The simplified expression is $a^6 b^{10}$."}, {"text": "$a^9 b^{25}$", "isCorrect": false, "rationale": "This incorrectly raises the inner exponents to the power of the outer exponent (e.g., $3^2=9$) instead of multiplying them."}, {"text": "$2a^3 2b^5$", "isCorrect": false, "rationale": "This incorrectly multiplies the terms by '2' instead of raising them to the power of '2', and it doesn't simplify the exponents."}]}, {"question": "Simplify the expression $36z^9 / (4z^3)$.", "options": [{"text": "$9z^3$", "isCorrect": false, "rationale": "This correctly divides the coefficients but incorrectly divides the exponents instead of subtracting them."}, {"text": "$32z^6$", "isCorrect": false, "rationale": "This incorrectly subtracts the coefficients (36-4=32) instead of dividing them, although it correctly subtracts the exponents."}, {"text": "$9z^6$", "isCorrect": true, "rationale": "Using the Quotient Rule for Exponents, $a^m/a^n = a^{m-n}$, we subtract the exponents of the same base: $9 - 3 = 6$. For the coefficients, we simply divide: $36/4 = 9$. The result is $9z^6$."}, {"text": "$9z^{12}$", "isCorrect": false, "rationale": "This correctly divides the coefficients but incorrectly adds the exponents instead of subtracting them."}]}, {"question": "Which exponent rule would be applied *first* when simplifying $(2x^5)^3 \\cdot x^2$?", "options": [{"text": "Product Rule", "isCorrect": false, "rationale": "The Product Rule ($a^m a^n = a^{m+n}$) would be applied *after* simplifying the term in parentheses using the Power of a Product rule."}, {"text": "Power Rule (specifically Power of a Product)", "isCorrect": true, "rationale": "The order of operations (PEMDAS/BODMAS) dictates that parentheses should be simplified first. In this case, $(2x^5)^3$ requires the Power of a Product rule ($(ab)^n = a^n b^n$) to distribute the exponent '3' to both '2' and $x^5$, which in turn uses the Power Rule ($(a^m)^n = a^{mn}$) for $x^5$. Therefore, the Power of a Product rule is the first to be applied to the expression as a whole."}, {"text": "Quotient Rule", "isCorrect": false, "rationale": "The Quotient Rule ($a^m/a^n = a^{m-n}$) is for division, and there is no division in this expression."}, {"text": "Addition of exponents", "isCorrect": false, "rationale": "Addition of exponents happens with the Product Rule, which is not the first rule to apply here because the parenthesized term needs to be simplified first."}]}, {"question": "Simplify the expression $y^3(y^2)^4$.", "options": [{"text": "$y^9$", "isCorrect": false, "rationale": "This incorrectly adds the exponents or makes another calculation error. The correct steps are $(y^2)^4 = y^{2 \\times 4} = y^8$, then $y^3 \\cdot y^8 = y^{3+8} = y^{11}$."}, {"text": "$y^{14}$", "isCorrect": false, "rationale": "This correctly applies the power rule to get $y^8$ but incorrectly adds the exponents for the final product, perhaps as $3+2+4=9$ or similar. The correct approach would be $3 + (2 \\times 4) = 11$."}, {"text": "$y^{11}$", "isCorrect": true, "rationale": "First, apply the Power Rule to $(y^2)^4$, which gives $y^{2 \\times 4} = y^8$. Then, apply the Product Rule to $y^3 \\cdot y^8$, which means adding the exponents: $3 + 8 = 11$. The simplified expression is $y^{11}$."}, {"text": "$y^{24}$", "isCorrect": false, "rationale": "This incorrectly multiplies all exponents together ($3 \\times 2 \\times 4 = 24$), confusing the application of the Product Rule with the Power Rule."}]}, {"question": "Simplify the expression $(k^5)^3 \\cdot k^4 / k^2$.", "options": [{"text": "$k^{15}$", "isCorrect": false, "rationale": "This only accounts for $(k^5)^3 = k^{15}$ and ignores the subsequent multiplication and division by $k^4$ and $k^2$."}, {"text": "$k^{17}$", "isCorrect": true, "rationale": "First, apply the Power Rule to $(k^5)^3$, which gives $k^{5 \\times 3} = k^{15}$. The expression becomes $k^{15} \\cdot k^4 / k^2$. Next, apply the Product Rule to $k^{15} \\cdot k^4$, which means adding exponents: $15 + 4 = 19$. The expression is now $k^{19} / k^2$. Finally, apply the Quotient Rule, which means subtracting exponents: $19 - 2 = 17$. The simplified expression is $k^{17}$."}, {"text": "$k^{13}$", "isCorrect": false, "rationale": "This might result from an incorrect calculation, such as $15 - (4-2) = 13$ or $15 - 4 + 2 = 13$, misapplying the order of operations for exponents. The correct order is power, then product, then quotient (or from left to right for multiplication/division)."}, {"text": "$k^{30}$", "isCorrect": false, "rationale": "This would result from incorrectly multiplying or dividing all exponents (e.g., $5 \\times 3 \\times 4 / 2 = 30$), which is an incorrect application of the rules. Division of powers is subtraction of exponents, not division of the numbers themselves."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
