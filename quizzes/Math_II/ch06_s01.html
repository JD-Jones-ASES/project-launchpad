<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the 'Review of Perimeter and Area' section?", "options": [{"text": "To introduce entirely new geometric formulas not covered in previous courses.", "isCorrect": false, "rationale": "The section explicitly states it 'reviews those formulas' learned in Mathematics I, indicating it's not primarily about entirely new formulas."}, {"text": "To solely focus on calculating the area of L-shaped composite figures.", "isCorrect": false, "rationale": "While composite figures are a key topic, the section also reviews basic shapes like triangles, trapezoids, and circles, and extends to fractional/decimal measurements, so it's not the sole focus."}, {"text": "To review basic perimeter and area calculations and extend skills to fractional/decimal measurements and composite shapes.", "isCorrect": true, "rationale": "The text states, 'This section reviews those formulas and extends your skills to problems with fractional and decimal measurements and to composite (L-shaped) regions,' which perfectly aligns with this option."}, {"text": "To only refresh knowledge of integer-based perimeter and area problems from Mathematics I.", "isCorrect": false, "rationale": "The section specifically mentions 'extends your skills to problems with fractional and decimal measurements,' indicating it goes beyond just integer-based problems."}]}, {"question": "A triangular garden plot has a base of $9.5$ meters and a height of $6.2$ meters. What is the area of the garden?", "options": [{"text": "$58.9$ m$^2$", "isCorrect": false, "rationale": "This result comes from multiplying base and height ($9.5 \\times 6.2 = 58.9$), forgetting to divide by 2 for a triangle's area formula."}, {"text": "$29.45$ m$^2$", "isCorrect": true, "rationale": "The area of a triangle is $A = \\frac{1}{2}bh$. So, $A = \\frac{1}{2}(9.5)(6.2) = \\frac{1}{2}(58.9) = 29.45$ m$^2$."}, {"text": "$15.7$ m$^2$", "isCorrect": false, "rationale": "This value would be incorrect and does not result from the correct application of the triangle area formula."}, {"text": "$31.4$ m$^2$", "isCorrect": false, "rationale": "This result might come from an incorrect calculation or a misapplication of a different formula."}]}, {"question": "A section of a property is shaped like a trapezoid with parallel bases measuring $\\frac{1}{4}$ mile and $\\frac{3}{4}$ mile, and a height of $2$ miles. What is the area of this property section?", "options": [{"text": "$1$ mile$^2$", "isCorrect": true, "rationale": "The area of a trapezoid is $A = \\frac{1}{2}(b_1 + b_2)h$. Substituting the values: $A = \\frac{1}{2}(\\frac{1}{4} + \\frac{3}{4})(2) = \\frac{1}{2}(1)(2) = 1$ mile$^2$."}, {"text": "$2$ miles$^2$", "isCorrect": false, "rationale": "This would be the result if you multiplied the sum of bases by the height and did not divide by 2, or made a calculation error."}, {"text": "$\\frac{1}{2}$ mile$^2$", "isCorrect": false, "rationale": "This result implies a calculation error, possibly multiplying the height by only one base or an incorrect sum of bases."}, {"text": "$\\frac{3}{8}$ mile$^2$", "isCorrect": false, "rationale": "This would be the result of multiplying the bases and then by 1/2 or another calculation error."}]}, {"question": "A circular pond has a radius of $8$ feet. What is the area of the pond, expressed in terms of $\\pi$?", "options": [{"text": "$16\\pi$ ft$^2$", "isCorrect": false, "rationale": "This is incorrect. It appears to have multiplied the radius by 2 rather than squaring it in the area formula."}, {"text": "$64\\pi$ ft$^2$", "isCorrect": true, "rationale": "The area of a circle is $A = \\pi r^2$. With a radius of $8$ ft, $A = \\pi (8)^2 = 64\\pi$ ft$^2$."}, {"text": "$8\\pi$ ft$^2$", "isCorrect": false, "rationale": "This would be the result if the radius was simply multiplied by $\\pi$, which is incorrect for area."}, {"text": "$128\\pi$ ft$^2$", "isCorrect": false, "rationale": "This is incorrect. It seems to have squared the radius and then multiplied by 2 again, or another error."}]}, {"question": "Using $\\pi \\approx 3.14$, calculate the area of a circular patio with a radius of $5$ meters.", "options": [{"text": "$78.5$ m$^2$", "isCorrect": true, "rationale": "The area of a circle is $A = \\pi r^2$. Substituting $r=5$ and $\\pi \\approx 3.14$, we get $A = 3.14 \\times (5)^2 = 3.14 \\times 25 = 78.5$ m$^2$."}, {"text": "$15.7$ m$^2$", "isCorrect": false, "rationale": "This would be the result if the radius was multiplied by $\\pi$ instead of squaring the radius ($5 \\times 3.14 = 15.7$), which is incorrect for area."}, {"text": "$31.4$ m$^2$", "isCorrect": false, "rationale": "This is the circumference if $r=5$ and $\\pi \\approx 3.14$ ($2 \\times 3.14 \\times 5 = 31.4$), not the area."}, {"text": "$50$ m$^2$", "isCorrect": false, "rationale": "This is incorrect. It might result from approximating $\\pi$ as 2 or an incorrect calculation."}]}, {"question": "A circular fountain has a diameter of $10$ meters. Using $\\pi \\approx 3.14$, what is its circumference?", "options": [{"text": "$31.4$ m", "isCorrect": true, "rationale": "The circumference of a circle is $C = \\pi d$ or $C = 2\\pi r$. Given diameter $d=10$ m, $C = 3.14 \\times 10 = 31.4$ m."}, {"text": "$78.5$ m", "isCorrect": false, "rationale": "This is the area of the circle with diameter 10 m (radius 5 m), not its circumference."}, {"text": "$15.7$ m", "isCorrect": false, "rationale": "This would be the circumference of a circle with a radius of 2.5 m (diameter 5 m), or if the formula was $C = \\pi r$ (incorrect)."}, {"text": "$62.8$ m", "isCorrect": false, "rationale": "This would be the circumference if the diameter was 20 m, or if the formula was incorrectly applied as $2 \\times \\pi \\times d$."}]}, {"question": "An L-shaped room has an outer dimension of $15$ ft by $12$ ft. A rectangular section measuring $6$ ft by $5$ ft is 'missing' from one corner. What is the total floor area of the room?", "options": [{"text": "$180$ ft$^2$", "isCorrect": false, "rationale": "This is the area of the large rectangle without subtracting the missing piece ($15 \\times 12 = 180$). This is incorrect for an L-shaped room with a missing section."}, {"text": "$30$ ft$^2$", "isCorrect": false, "rationale": "This is the area of the missing section ($6 \\times 5 = 30$), not the area of the room."}, {"text": "$150$ ft$^2$", "isCorrect": true, "rationale": "The area can be found by subtracting the area of the missing rectangle from the area of the larger enclosing rectangle: $A = (15 \\times 12) - (6 \\times 5) = 180 - 30 = 150$ ft$^2$."}, {"text": "$210$ ft$^2$", "isCorrect": false, "rationale": "This result comes from adding the areas ($180 + 30$), which is an incorrect approach for finding the area of a shape with a 'missing' part."}]}, {"question": "What is the general strategy for finding the area of a composite (irregular) 2-D figure like an L-shaped region?", "options": [{"text": "Estimate the area visually without any calculations.", "isCorrect": false, "rationale": "Estimation is not a precise mathematical method for finding exact area, which is the goal."}, {"text": "Measure its perimeter and divide by four.", "isCorrect": false, "rationale": "Perimeter is a measure of length around a shape, not its area, and dividing by four is not a general area formula for irregular shapes."}, {"text": "Split the figure into simpler, basic shapes (e.g., rectangles, triangles), find the area of each piece, and then add or subtract them as needed.", "isCorrect": true, "rationale": "The section explicitly states: 'An L-shaped region or other irregular shape can often be split into rectangles, triangles, or other basic shapes. Find the area of each piece and add (or subtract) to get the total.'"}, {"text": "Use a complex integral calculus formula that is beyond this course level.", "isCorrect": false, "rationale": "While calculus can find areas, the method described in the text is decomposition into basic geometric shapes, which is appropriate for this level."}]}, {"question": "A homeowner wants to install a decorative border around a rectangular flower bed that is $10.5$ feet long and $4.5$ feet wide. What length of border material is needed?", "options": [{"text": "$47.25$ ft", "isCorrect": false, "rationale": "This value represents the area of the flower bed ($10.5 \\times 4.5 = 47.25$), not the perimeter (length of border)."}, {"text": "$15$ ft", "isCorrect": false, "rationale": "This is the sum of the length and width only ($10.5 + 4.5 = 15$), not the total perimeter."}, {"text": "$21$ ft", "isCorrect": false, "rationale": "This is twice the length ($2 \\times 10.5 = 21$) or twice the width ($2 \\times 4.5 = 9$) plus some other incorrect value, but not the correct perimeter."}, {"text": "$30$ ft", "isCorrect": true, "rationale": "The length of border needed is the perimeter of the rectangle. $P = 2(l + w) = 2(10.5 + 4.5) = 2(15) = 30$ ft."}]}, {"question": "Which of the following problems requires an 'extended skill' as introduced in this section, compared to basic problems from Mathematics I?", "options": [{"text": "Finding the area of a square with side length $5$ cm.", "isCorrect": false, "rationale": "This is a basic integer-based area calculation, typically covered in Mathematics I."}, {"text": "Calculating the perimeter of a rectangle with length $12$ in. and width $8$ in.", "isCorrect": false, "rationale": "This is a basic integer-based perimeter calculation, typically covered in Mathematics I."}, {"text": "Determining the area of a pool shaped as a combination of a rectangle and a semicircle.", "isCorrect": true, "rationale": "This problem involves a 'composite figure' (combination of shapes), which the section identifies as an extension of skills."}, {"text": "Computing the circumference of a circle with a radius of $7$ m using $\\pi = 3.14$.", "isCorrect": false, "rationale": "While using $3.14$ for $\\pi$ is part of the review, calculating circumference of a simple circle is fundamental and typically covered in basic geometry, not specifically an 'extension' like composite figures or fractional measurements."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
