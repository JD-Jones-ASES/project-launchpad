<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The derivation of the Distance Formula is fundamentally based on which geometric principle?", "options": [{"text": "The properties of similar triangles", "isCorrect": false, "rationale": "While triangles are involved, the Distance Formula's direct derivation uses specific properties of right triangles, not general similar triangles."}, {"text": "The Pythagorean Theorem", "isCorrect": true, "rationale": "The text explicitly states that a right triangle is formed with horizontal and vertical legs, and the Pythagorean Theorem is applied to find the hypotenuse, which is the distance."}, {"text": "The Law of Sines", "isCorrect": false, "rationale": "The Law of Sines is used for non-right triangles and is not part of the Distance Formula's derivation."}, {"text": "The properties of parallel lines", "isCorrect": false, "rationale": "Parallel lines are related to the horizontal and vertical segments but are not the fundamental principle for finding the distance itself."}]}, {"question": "When forming a right triangle to derive the Distance Formula for points $P_1(x_1, y_1)$ and $P_2(x_2, y_2)$, what do the expressions $|x_2 - x_1|$ and $|y_2 - y_1|$ represent?", "options": [{"text": "The coordinates of the third vertex of the triangle", "isCorrect": false, "rationale": "These expressions represent lengths, not coordinates of a point."}, {"text": "The lengths of the horizontal and vertical legs of the right triangle", "isCorrect": true, "rationale": "The text states 'Horizontal leg $= |x_2 - x_1|$' and 'Vertical leg $= |y_2 - y_1|$', which are the absolute differences in the x and y coordinates, respectively."}, {"text": "The slope of the line segment connecting $P_1$ and $P_2$", "isCorrect": false, "rationale": "The slope is defined as $(y_2 - y_1) / (x_2 - x_1)$, not the individual differences."}, {"text": "The areas of two squares formed by the points", "isCorrect": false, "rationale": "These expressions represent lengths of sides, not areas of squares."}]}, {"question": "Find the distance between points $(2, 3)$ and $(8, 11)$.", "options": [{"text": "8 units", "isCorrect": false, "rationale": "This would be an incorrect calculation, possibly by just summing differences or other errors."}, {"text": "10 units", "isCorrect": true, "rationale": "Using the formula: $d = \\sqrt{(8 - 2)^2 + (11 - 3)^2} = \\sqrt{6^2 + 8^2} = \\sqrt{36 + 64} = \\sqrt{100} = 10$."}, {"text": "$\\sqrt{10}$ units", "isCorrect": false, "rationale": "This results from an error such as forgetting to square the differences before adding, or taking the square root too early."}, {"text": "14 units", "isCorrect": false, "rationale": "This value could result from adding the squared differences without taking the square root, or other miscalculations."}]}, {"question": "What is the distance between $C(-3, 4)$ and $D(5, -2)$?", "options": [{"text": "$\\sqrt{20}$ units", "isCorrect": false, "rationale": "This is an incorrect calculation; for example, $5-3=2$ and $-2-4=-6$, then $2^2+(-6)^2 = 4+36 = 40$, not 20."}, {"text": "$\\sqrt{68}$ units", "isCorrect": false, "rationale": "This would result from an error such as $(5-3)^2 + (-2-4)^2 = 2^2 + (-6)^2 = 4 + 36 = 40$, or other errors."}, {"text": "10 units", "isCorrect": true, "rationale": "Using the formula: $d = \\sqrt{(5 - (-3))^2 + (-2 - 4)^2} = \\sqrt{(5 + 3)^2 + (-6)^2} = \\sqrt{8^2 + (-6)^2} = \\sqrt{64 + 36} = \\sqrt{100} = 10$."}, {"text": "$\\sqrt{76}$ units", "isCorrect": false, "rationale": "This would result from miscalculating the differences or squares, e.g., $8^2 + (-4)^2 = 64+16=80$, not 76."}]}, {"question": "The text states that 'It does not matter which point you call $(x_1, y_1)$ and which you call $(x_2, y_2)$'. Why is this true for the Distance Formula?", "options": [{"text": "Because distance is always positive, so subtraction order doesn't impact the final sign.", "isCorrect": false, "rationale": "While distance is positive, the reason the order doesn't matter is specifically because of the squaring operation, not just the inherent positive nature of distance."}, {"text": "Because the formula is only valid for points in the first quadrant.", "isCorrect": false, "rationale": "The Distance Formula is valid for points in any quadrant, as demonstrated by examples with negative coordinates."}, {"text": "Because squaring the differences removes the sign of the difference.", "isCorrect": true, "rationale": "The rationale provided in the text explicitly states: 'because squaring removes the sign of the difference.' This means $(x_2 - x_1)^2$ is the same as $(x_1 - x_2)^2$."}, {"text": "Because the x and y coordinates are independent of each other.", "isCorrect": false, "rationale": "While x and y components are treated separately in the formula, this isn't the reason why the *order* of the points themselves doesn't matter."}]}, {"question": "Find the distance between $(1, 3)$ and $(4, 8)$. Write your answer in simplified radical form.", "options": [{"text": "$\\sqrt{34}$", "isCorrect": true, "rationale": "Using the formula: $d = \\sqrt{(4 - 1)^2 + (8 - 3)^2} = \\sqrt{3^2 + 5^2} = \\sqrt{9 + 25} = \\sqrt{34}$. Since 34 has no perfect-square factors other than 1, it is already simplified."}, {"text": "$5\\sqrt{2}$", "isCorrect": false, "rationale": "This would imply $\\sqrt{50}$, which is not the result of the calculation for these points."}, {"text": "$\\sqrt{13}$", "isCorrect": false, "rationale": "This would imply an incorrect calculation, such as $(4-1)^2 + (3-8)^2 = 3^2 + (-5)^2 = 9+25 = 34$, but then an error in the final step of simplifying $\\sqrt{34}$."}, {"text": "$\\sqrt{10}$", "isCorrect": false, "rationale": "This would result from an incorrect calculation, e.g., summing $3+5$ then squaring and taking the square root, or other errors."}]}, {"question": "A common mistake when using the Distance Formula is to compute $(x_2 - x_1) + (y_2 - y_1)$. What critical step is missed in this incorrect calculation?", "options": [{"text": "Subtracting the y-coordinates from the x-coordinates", "isCorrect": false, "rationale": "The mistake is not in the subtraction order between x and y components, but within how the differences are handled."}, {"text": "Taking the square root of the sum", "isCorrect": false, "rationale": "While taking the square root is the final step, the noted mistake happens *before* that step; it's about what is being summed."}, {"text": "Squaring the differences before adding them", "isCorrect": true, "rationale": "The 'caution' note explicitly states: 'Do not forget to square the differences before adding. A common mistake is to compute $(x_2 - x_1) + (y_2 - y_1)$ instead of $(x_2 - x_1)^2 + (y_2 - y_1)^2$'."}, {"text": "Using absolute values for the differences", "isCorrect": false, "rationale": "The squaring process itself handles the sign, so explicit absolute values are not strictly necessary if squaring is performed correctly, but the core mistake is skipping the squaring."}]}, {"question": "On a coordinate map, a library is at $(1, 4)$ and a park is at $(7, 12)$. If each unit on the map represents $0.5$ miles, what is the actual straight-line distance between the library and the park?", "options": [{"text": "8 miles", "isCorrect": false, "rationale": "This would be the result if each unit represented 1 mile, not 0.5 miles, or if the calculation of map units was incorrect."}, {"text": "5 miles", "isCorrect": true, "rationale": "First, find the distance in map units: $d = \\sqrt{(7 - 1)^2 + (12 - 4)^2} = \\sqrt{6^2 + 8^2} = \\sqrt{36 + 64} = \\sqrt{100} = 10$ units. Then, multiply by the scale factor: $10 \\times 0.5 = 5$ miles."}, {"text": "10 miles", "isCorrect": false, "rationale": "This is the distance in map units, but not the actual distance in miles, as it fails to apply the scale factor."}, {"text": "$\\sqrt{20}$ miles", "isCorrect": false, "rationale": "This is an incorrect calculation of the map units distance and then an incorrect application of the scale factor."}]}, {"question": "If two points, $P_1(x_1, y_1)$ and $P_2(x_2, y_2)$, have a calculated distance $d=0$, what can be concluded about their relationship?", "options": [{"text": "They are located on the x-axis.", "isCorrect": false, "rationale": "A distance of zero does not specify their location relative to an axis; they could be anywhere if they are the same point."}, {"text": "They are located on the y-axis.", "isCorrect": false, "rationale": "Similar to the x-axis, a distance of zero does not specify their location relative to the y-axis."}, {"text": "They are collinear with the origin.", "isCorrect": false, "rationale": "While they might be, a distance of zero only implies they are the same point, not necessarily collinear with the origin."}, {"text": "They are the exact same point.", "isCorrect": true, "rationale": "For the distance between two points to be zero, both $(x_2 - x_1)^2$ and $(y_2 - y_1)^2$ must be zero, which means $x_1 = x_2$ and $y_1 = y_2$. Therefore, the two points must coincide."}]}, {"question": "Which of the following scenarios best demonstrates an application of the Distance Formula where the coordinates involve only horizontal or vertical movement?", "options": [{"text": "Calculating the length of a diagonal path across a rectangular field.", "isCorrect": false, "rationale": "A diagonal path involves both horizontal and vertical change, making it a general application, not specifically only horizontal or vertical movement."}, {"text": "Finding the length of a segment connecting $(a, b)$ and $(a, c)$.", "isCorrect": true, "rationale": "In this case, the x-coordinates are the same ($a$), so $(a-a)^2 = 0$. The distance simplifies to $\\sqrt{(c-b)^2} = |c-b|$, representing a purely vertical distance."}, {"text": "Determining if three points are collinear.", "isCorrect": false, "rationale": "Checking for collinearity often involves comparing slopes or using the Distance Formula to see if the sum of two smaller segments equals the largest, which is a more complex application than purely horizontal/vertical movement."}, {"text": "Measuring the perimeter of a complex polygon.", "isCorrect": false, "rationale": "The perimeter involves summing multiple segment lengths, which are generally not purely horizontal or vertical segments for a complex polygon."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
