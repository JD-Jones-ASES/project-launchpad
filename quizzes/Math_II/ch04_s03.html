<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the 'Strategy for Two-Step Equations' presented in the text, what is the *first* inverse operation to perform when solving an equation of the form ax + b = c?", "options": [{"text": "Undo multiplication or division.", "isCorrect": false, "rationale": "The strategy explicitly states to 'Undo addition or subtraction' first, then 'Undo multiplication or division' as the second step."}, {"text": "Undo addition or subtraction.", "isCorrect": true, "rationale": "The text's 'Strategy for Two-Step Equations' clearly instructs to 'Undo addition or subtraction: subtract b from both sides (or add, if b is negative)' as the first step."}, {"text": "Check the solution by substituting into the original equation.", "isCorrect": false, "rationale": "Checking the solution is the final step in the process, performed after the equation has been solved."}, {"text": "Isolate the constant term.", "isCorrect": false, "rationale": "While isolating the constant term is part of the process, it's not the inverse operation itself. The inverse operation is addition or subtraction."}]}, {"question": "Solve the equation: 3x + 5 = 17.", "options": [{"text": "x = 3", "isCorrect": false, "rationale": "Subtracting 5 from both sides gives 3x = 12, not 9. Dividing 12 by 3 yields 4."}, {"text": "x = 4", "isCorrect": true, "rationale": "First, subtract 5 from both sides: 3x + 5 - 5 = 17 - 5, which simplifies to 3x = 12. Then, divide both sides by 3: 3x / 3 = 12 / 3, which gives x = 4. Check: 3(4) + 5 = 12 + 5 = 17."}, {"text": "x = 7", "isCorrect": false, "rationale": "Subtracting 5 from both sides gives 3x = 12, not 21. Dividing 12 by 3 yields 4."}, {"text": "x = 12", "isCorrect": false, "rationale": "Subtracting 5 from both sides gives 3x = 12, but then you must divide by 3 to solve for x, not simply state 3x's value."}]}, {"question": "Solve the equation: x/5 - 8 = 2.", "options": [{"text": "x = 2", "isCorrect": false, "rationale": "Adding 8 to both sides gives x/5 = 10, not 2. Then multiply by 5 to get x = 50."}, {"text": "x = 10", "isCorrect": false, "rationale": "Adding 8 to both sides gives x/5 = 10, but then you must multiply by 5 to solve for x, not simply state x/5's value."}, {"text": "x = 50", "isCorrect": true, "rationale": "First, add 8 to both sides: x/5 - 8 + 8 = 2 + 8, which simplifies to x/5 = 10. Then, multiply both sides by 5: (x/5) * 5 = 10 * 5, which gives x = 50. Check: 50/5 - 8 = 10 - 8 = 2."}, {"text": "x = -30", "isCorrect": false, "rationale": "Adding 8 to both sides gives x/5 = 10, not -6. Then multiply by 5 to get x = 50."}]}, {"question": "The text states, 'Always perform the same operation on both sides of the equation.' What is the primary reason for this rule?", "options": [{"text": "To make the numbers in the equation larger and easier to work with.", "isCorrect": false, "rationale": "The effect on number size is not the primary reason; operations can make numbers larger or smaller. The core principle is maintaining equality."}, {"text": "To keep the equation balanced and maintain the equality between both sides.", "isCorrect": true, "rationale": "Performing the same operation on both sides ensures that the fundamental equality of the equation is preserved, meaning the solution set remains unchanged. This is essential for solving correctly."}, {"text": "To confuse the variable so it is harder to find the solution.", "isCorrect": false, "rationale": "The purpose of solving equations is to find the solution, not to obscure it."}, {"text": "To speed up the calculation process.", "isCorrect": false, "rationale": "While efficient methods are desirable, the primary reason is mathematical correctness, not just speed."}]}, {"question": "Solve the equation: -4x + 9 = -11.", "options": [{"text": "x = 5", "isCorrect": true, "rationale": "First, subtract 9 from both sides: -4x + 9 - 9 = -11 - 9, which simplifies to -4x = -20. Then, divide both sides by -4: -4x / -4 = -20 / -4, which gives x = 5. Check: -4(5) + 9 = -20 + 9 = -11."}, {"text": "x = -5", "isCorrect": false, "rationale": "Subtracting 9 from both sides gives -4x = -20. Dividing by -4 results in a positive 5, not a negative 5."}, {"text": "x = 2", "isCorrect": false, "rationale": "Subtracting 9 from both sides gives -4x = -20, not -8. Dividing -20 by -4 yields 5."}, {"text": "x = -2", "isCorrect": false, "rationale": "Subtracting 9 from both sides gives -4x = -20, not -8. Dividing -20 by -4 yields 5."}]}, {"question": "A gym membership costs $25 per month, plus $3 for each personal training session. If a member's bill for one month was $49, how many personal training sessions did they attend?", "options": [{"text": "6 sessions", "isCorrect": false, "rationale": "If 6 sessions, $3 * 6 = $18. $25 + $18 = $43, which is not $49."}, {"text": "8 sessions", "isCorrect": true, "rationale": "Let 's' be the number of training sessions. The equation is 25 + 3s = 49. Subtract 25 from both sides: 3s = 24. Divide by 3: s = 8. So, they attended 8 sessions. Check: 25 + 3(8) = 25 + 24 = 49."}, {"text": "10 sessions", "isCorrect": false, "rationale": "If 10 sessions, $3 * 10 = $30. $25 + $30 = $55, which is not $49."}, {"text": "12 sessions", "isCorrect": false, "rationale": "If 12 sessions, $3 * 12 = $36. $25 + $36 = $61, which is not $49."}]}, {"question": "Which of the following equations demonstrates a variable term with a fraction coefficient, as described in one of the examples?", "options": [{"text": "2x + 7 = 15", "isCorrect": false, "rationale": "This equation has an integer coefficient (2) for x."}, {"text": "-3x + 1 = 10", "isCorrect": false, "rationale": "This equation has a negative integer coefficient (-3) for x."}, {"text": "x/4 - 5 = 3", "isCorrect": true, "rationale": "This equation has a variable term, x, which is divided by 4, meaning it has a fraction coefficient of 1/4 (i.e., (1/4)x). This matches the example 'x/4 - 5 = 3'."}, {"text": "5 + 2x = 11", "isCorrect": false, "rationale": "This equation has an integer coefficient (2) for x."}]}, {"question": "A student attempts to solve $6x + 12 = 30$ by first dividing all terms by 6, resulting in $x + 2 = 5$. While this yields the correct answer, how does this initial step compare to the primary strategy taught in the text for solving two-step equations?", "options": [{"text": "It is exactly the same as the strategy taught.", "isCorrect": false, "rationale": "The strategy taught explicitly states to 'Undo addition or subtraction' first, which would mean subtracting 12 first in this case."}, {"text": "It is an alternative valid method but deviates from the recommended first step of undoing addition/subtraction.", "isCorrect": true, "rationale": "While mathematically valid when applied correctly to all terms, the section's 'Strategy for Two-Step Equations' emphasizes undoing addition or subtraction first, then multiplication or division. The student's approach reverses the order of the inverse operations from the recommended strategy."}, {"text": "It is an incorrect first step that will always lead to an incorrect solution.", "isCorrect": false, "rationale": "In this specific case, dividing all terms by 6 is mathematically valid and leads to the correct solution. However, it's not the primary strategy outlined."}, {"text": "It is only acceptable if the equation has no constant term.", "isCorrect": false, "rationale": "This method can be used with a constant term, as demonstrated, as long as all terms are divided."}]}, {"question": "In the example for solving $2x + 3 = 11$, the solution is checked by substituting $x = 4$ back into the original equation. Why is this 'Check' step important?", "options": [{"text": "It's a requirement only for equations involving addition and multiplication.", "isCorrect": false, "rationale": "The 'Check' step is a general practice recommended for all types of equations to ensure accuracy, not just specific operations."}, {"text": "It helps to confirm that the value found for x makes the original equation a true statement.", "isCorrect": true, "rationale": "The purpose of checking the solution is to verify its correctness. If substituting the value of x back into the original equation results in a true statement (e.g., 11 = 11), then the solution is correct."}, {"text": "It changes the original equation into a simpler form for future calculations.", "isCorrect": false, "rationale": "Checking does not alter the original equation; it only uses it for verification."}, {"text": "It provides an opportunity to practice arithmetic without solving the equation.", "isCorrect": false, "rationale": "While it involves arithmetic, the primary purpose is validation of the solution, not just practice."}]}, {"question": "Consider the equation $2x - 7 = -1$. What is the *first* inverse operation you should perform, and what does the equation become after this step?", "options": [{"text": "Divide by 2; the equation becomes x - 7 = -0.5.", "isCorrect": false, "rationale": "The strategy dictates undoing addition or subtraction first. Dividing by 2 is the second step."}, {"text": "Subtract 7; the equation becomes 2x = -8.", "isCorrect": false, "rationale": "The first step is to undo subtraction by *adding* 7, not subtracting 7. If you subtract 7, it makes the left side 2x - 14."}, {"text": "Add 7; the equation becomes 2x = 6.", "isCorrect": true, "rationale": "Following the strategy to 'Undo addition or subtraction' first, we add 7 to both sides of $2x - 7 = -1$. This results in $2x - 7 + 7 = -1 + 7$, simplifying to $2x = 6$."}, {"text": "Multiply by -1; the equation becomes -2x + 7 = 1.", "isCorrect": false, "rationale": "Multiplying by -1 is not the designated first step to undo subtraction, and it doesn't isolate the variable term."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
