<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental purpose of the coordinate plane as described in the text?", "options": [{"text": "To identify the angles of geometric shapes.", "isCorrect": false, "rationale": "While the coordinate plane can be used in geometry, its fundamental purpose as stated in the text is not to identify angles, but to describe positions."}, {"text": "To describe the exact position of any point using two numbers.", "isCorrect": true, "rationale": "The text explicitly states: 'The coordinate plane lets you describe the exact position of any point using two numbers.'"}, {"text": "To measure the distance between two parallel lines.", "isCorrect": false, "rationale": "Measuring distances is a function of coordinate geometry, but not the primary, overarching purpose of the coordinate plane itself as defined here."}, {"text": "To visually represent data in bar graphs.", "isCorrect": false, "rationale": "Graphs use a coordinate system, but the coordinate plane's fundamental purpose is broader than just bar graphs; it's about defining any point's location."}]}, {"question": "In an ordered pair $(x, y)$, what does the value $x$ specifically indicate?", "options": [{"text": "How far to move up or down from the origin.", "isCorrect": false, "rationale": "The 'y' value indicates movement up or down from the origin, not the 'x' value."}, {"text": "How far to move left or right from the origin.", "isCorrect": true, "rationale": "The text states: 'The first number $x$ tells how far to move left or right from the origin'."}, {"text": "The distance from the y-axis.", "isCorrect": false, "rationale": "While the x-coordinate does represent a horizontal distance, its primary meaning in an ordered pair is the instruction to move left/right from the origin."}, {"text": "The quadrant the point is located in.", "isCorrect": false, "rationale": "The x-value alone does not determine the quadrant; both x and y values together determine the quadrant."}]}, {"question": "A point $P$ has coordinates $(x, y)$ such that $x < 0$ and $y < 0$. In which quadrant would point $P$ lie?", "options": [{"text": "Quadrant I", "isCorrect": false, "rationale": "Quadrant I contains points where both x and y are positive ($x > 0, y > 0$). This point has both negative coordinates."}, {"text": "Quadrant II", "isCorrect": false, "rationale": "Quadrant II contains points where x is negative and y is positive ($x < 0, y > 0$). This point has a negative y-coordinate."}, {"text": "Quadrant III", "isCorrect": true, "rationale": "The text's illustration and examples show that Quadrant III is where both the x-coordinate and the y-coordinate are negative (left and down from the origin)."}, {"text": "Quadrant IV", "isCorrect": false, "rationale": "Quadrant IV contains points where x is positive and y is negative ($x > 0, y < 0$). This point has a negative x-coordinate."}]}, {"question": "Which of the following points does NOT belong to any of the four quadrants?", "options": [{"text": "$(-5, 3)$", "isCorrect": false, "rationale": "This point has a negative x and positive y, placing it in Quadrant II."}, {"text": "$(2, -7)$", "isCorrect": false, "rationale": "This point has a positive x and negative y, placing it in Quadrant IV."}, {"text": "$(0, 4)$", "isCorrect": true, "rationale": "The text states, 'Points on an axis do not belong to any quadrant.' This point lies on the y-axis because its x-coordinate is 0."}, {"text": "$(-1, -1)$", "isCorrect": false, "rationale": "This point has both negative x and y, placing it in Quadrant III."}]}, {"question": "Consider the points $M(-2, 5)$ and $N(6, -1)$. Which statement correctly identifies their respective quadrants?", "options": [{"text": "M is in Quadrant I, N is in Quadrant II.", "isCorrect": false, "rationale": "Quadrant I is (positive, positive); Quadrant II is (negative, positive). M is in QII, not QI. N is in QIV, not QII."}, {"text": "M is in Quadrant II, N is in Quadrant IV.", "isCorrect": true, "rationale": "For M(-2, 5), x is negative and y is positive, which is Quadrant II. For N(6, -1), x is positive and y is negative, which is Quadrant IV. This matches the definitions in the text."}, {"text": "M is in Quadrant III, N is in Quadrant I.", "isCorrect": false, "rationale": "Quadrant III is (negative, negative); Quadrant I is (positive, positive). Neither M nor N match these quadrants."}, {"text": "M is in Quadrant IV, N is in Quadrant III.", "isCorrect": false, "rationale": "Quadrant IV is (positive, negative); Quadrant III is (negative, negative). Neither M nor N match these quadrants."}]}, {"question": "If point $Q$ is located at $(-4, 7)$, what are its coordinates after being reflected over the $x$-axis?", "options": [{"text": "$(4, 7)$", "isCorrect": false, "rationale": "Reflecting over the x-axis changes the sign of the y-coordinate, not the x-coordinate."}, {"text": "$(-4, -7)$", "isCorrect": true, "rationale": "The property states: 'Reflecting $(a, b)$ over the $x$-axis gives $(a, -b)$'. Applying this to $(-4, 7)$ gives $(-4, -7)$."}, {"text": "$(4, -7)$", "isCorrect": false, "rationale": "This would be a reflection over both the y-axis and the x-axis, or over the origin if the signs were reversed, but not just the x-axis."}, {"text": "$(-7, 4)$", "isCorrect": false, "rationale": "This swaps the coordinates and changes a sign, which is not the rule for reflection over the x-axis."}]}, {"question": "The point $(3, -5)$ is reflected over the $y$-axis. What are the new coordinates?", "options": [{"text": "$(3, 5)$", "isCorrect": false, "rationale": "This point would be the result of reflecting $(3, -5)$ over the x-axis, not the y-axis."}, {"text": "$(-3, 5)$", "isCorrect": false, "rationale": "This would be a reflection over the origin from the original point $(3, -5)$."}, {"text": "$(-3, -5)$", "isCorrect": true, "rationale": "The property states: 'Reflecting $(a, b)$ over the $y$-axis gives $(-a, b)$'. Applying this to $(3, -5)$ gives $(-3, -5)$."}, {"text": "$(5, -3)$", "isCorrect": false, "rationale": "This involves swapping coordinates and changing a sign, which is not the rule for reflection over the y-axis."}]}, {"question": "A point $R$ is at $(5, -2)$. What are the coordinates of $R$ when reflected over the origin?", "options": [{"text": "$(-5, 2)$", "isCorrect": true, "rationale": "The property states: 'Reflecting $(a, b)$ over the origin gives $(-a, -b)$'. Applying this to $(5, -2)$ gives $(-5, -(-2))$, which simplifies to $(-5, 2)$."}, {"text": "$(-5, -2)$", "isCorrect": false, "rationale": "This would be reflecting over the y-axis only."}, {"text": "$(5, 2)$", "isCorrect": false, "rationale": "This would be reflecting over the x-axis only."}, {"text": "$(2, -5)$", "isCorrect": false, "rationale": "This involves swapping coordinates and changing a sign, which is not the rule for reflection over the origin."}]}, {"question": "A student starts at a library located at $(2, 4)$ and travels to a park at $(-3, 1)$. How many blocks east/west and north/south did the student travel?", "options": [{"text": "5 blocks east and 3 blocks north.", "isCorrect": false, "rationale": "Horizontal change: $-3 - 2 = -5$ (west, not east). Vertical change: $1 - 4 = -3$ (south, not north)."}, {"text": "5 blocks west and 3 blocks south.", "isCorrect": true, "rationale": "Horizontal change: $-3 - 2 = -5$. A negative change in x means moving left or west, so 5 blocks west. Vertical change: $1 - 4 = -3$. A negative change in y means moving down or south, so 3 blocks south. This matches the example application in the text."}, {"text": "1 block west and 5 blocks north.", "isCorrect": false, "rationale": "The calculations for horizontal and vertical change are incorrect for this option."}, {"text": "1 block east and 5 blocks south.", "isCorrect": false, "rationale": "The calculations for horizontal and vertical change are incorrect for this option."}]}, {"question": "Point $P$ is at $(2, -6)$. If $P$ is first reflected over the $y$-axis, and then the resulting point is reflected over the $x$-axis, what are the final coordinates?", "options": [{"text": "$(-2, 6)$", "isCorrect": true, "rationale": "Step 1: Reflect $(2, -6)$ over the $y$-axis. The rule is $(-a, b)$, so the new point is $(-2, -6)$. Step 2: Reflect $(-2, -6)$ over the $x$-axis. The rule is $(a, -b)$, so the final point is $(-2, -(-6))$, which simplifies to $(-2, 6)$. This is equivalent to reflecting over the origin."}, {"text": "$(2, 6)$", "isCorrect": false, "rationale": "This would be reflecting over the x-axis first, then the y-axis, or reflecting over the origin from the coordinates $(2, -6)$ and then incorrectly flipping the sign of the x-coordinate."}, {"text": "$(-2, -6)$", "isCorrect": false, "rationale": "This is only the result after the first reflection (over the y-axis) and does not include the second reflection over the x-axis."}, {"text": "$(6, -2)$", "isCorrect": false, "rationale": "This option involves swapping coordinates and changing signs, which does not follow the reflection rules for the axes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
