<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How are exponents and roots fundamentally related in mathematics?", "options": [{"text": "They are unrelated operations, each serving distinct purposes.", "isCorrect": false, "rationale": "The text explicitly states that exponents and roots are inverse operations, just as multiplication and division are inverses, indicating a strong relationship."}, {"text": "They are inverse operations, meaning one undoes the other.", "isCorrect": true, "rationale": "The section opens by stating, 'Exponents and roots are inverse operations, just as multiplication and division are inverses.' This is the core relationship."}, {"text": "Exponents are a specific type of root operation, just with a different notation.", "isCorrect": false, "rationale": "Exponents and roots are distinct operations. Squaring a number (an exponent operation) is multiplying it by itself, while finding a square root asks what number multiplied by itself gives a result."}, {"text": "Roots exclusively deal with positive numbers, while exponents can operate on any real number.", "isCorrect": false, "rationale": "While square roots of negative numbers are not real, cube roots of negative numbers are. Exponents can operate on any real number, but this statement does not accurately describe the fundamental relationship between the two operations."}], "id": "q01"}, {"question": "According to the definition provided, what does the symbol 'a' represent for a positive number 'a'?", "options": [{"text": "Both the positive and negative square roots of 'a'.", "isCorrect": false, "rationale": "The text clarifies that the symbol 'a' always denotes the principal (nonnegative) square root. To indicate the negative root, one must write '-a'."}, {"text": "The principal (nonnegative) square root of 'a'.", "isCorrect": true, "rationale": "The keyterm 'Principal Square Root' explicitly states: 'The symbol 'a' always denotes the principal (nonnegative) square root.'"}, {"text": "Only the negative square root of 'a'.", "isCorrect": false, "rationale": "This is incorrect. The symbol 'a' specifically denotes the nonnegative root. The negative root is indicated by '-a'."}, {"text": "Any real number 'b' such that b^2 = a.", "isCorrect": false, "rationale": "While it's true that if b^2 = a, then b is a square root of a, the symbol 'a' itself has a more specific meaning, denoting only the principal (nonnegative) root."}], "id": "q02"}, {"question": "What is the value of the expression -81?", "options": [{"text": "9", "isCorrect": false, "rationale": "This is the value of 81, not -81. The negative sign is outside the radical."}, {"text": "-9", "isCorrect": true, "rationale": "The expression -81 means the negative of the principal square root of 81. Since 81 = 9, then -81 = -9."}, {"text": "It has no real value.", "isCorrect": false, "rationale": "This would be true if the negative sign were inside the radical (e.g., -81), but here the radicand (81) is positive, so the square root is well-defined."}, {"text": "+/- 9", "isCorrect": false, "rationale": "The negative sign explicitly indicates that only the negative principal square root is being requested, not both."}], "id": "q03"}, {"question": "Which statement best explains why -4 has no real value?", "options": [{"text": "The number 4 is not a perfect square, so its root cannot be easily found.", "isCorrect": false, "rationale": "The number 4 is a perfect square (2^2 = 4), but the issue is with the negative sign inside the radical."}, {"text": "The radical sign requires the number inside (radicand) to be positive for the root to be real.", "isCorrect": false, "rationale": "The radicand can be zero (0 = 0). The restriction is that it must be nonnegative."}, {"text": "There is no real number that, when multiplied by itself, results in a negative number.", "isCorrect": true, "rationale": "The 'caution' box explicitly states, 'a is defined only when a 0. There is no real number whose square is negative, so -4 has no real value.'"}, {"text": "The expression should be written as --4 to indicate a positive root.", "isCorrect": false, "rationale": "This statement is grammatically and mathematically incorrect; changing the expression would fundamentally alter its meaning and still wouldn't solve the problem of taking the square root of a negative number."}], "id": "q04"}, {"question": "What is the value of the expression [3]-64?", "options": [{"text": "4", "isCorrect": false, "rationale": "4 cubed is 64, not -64."}, {"text": "-4", "isCorrect": true, "rationale": "The definition of a cube root states that if b^3 = a, then [3]a = b. Here, (-4)^3 = (-4) * (-4) * (-4) = 16 * (-4) = -64."}, {"text": "It has no real value.", "isCorrect": false, "rationale": "Unlike square roots, cube roots are defined for negative numbers, as stated in the 'Cube Root' keyterm and shown in the example [3]-8 = -2."}, {"text": "+/- 4", "isCorrect": false, "rationale": "Cube roots of real numbers have a unique real value, not both positive and negative."}], "id": "q05"}, {"question": "A key distinction between square roots and cube roots, as discussed in the text, is:", "options": [{"text": "Square roots can be positive or negative, while cube roots are always positive.", "isCorrect": false, "rationale": "This is incorrect. The principal square root is nonnegative, and cube roots can be negative (e.g., [3]-8 = -2)."}, {"text": "Cube roots are only defined for non-negative numbers, whereas square roots can be taken of any real number.", "isCorrect": false, "rationale": "This is the opposite of what the text states. Square roots are defined only for nonnegative numbers, while cube roots are defined for negative numbers as well."}, {"text": "Square roots of negative numbers do not yield real values, but cube roots of negative numbers do.", "isCorrect": true, "rationale": "The text explicitly states: 'a is defined only when a 0' (for square roots) and 'Unlike square roots, cube roots are defined for negative numbers as well: [3]-8 = -2'."}, {"text": "Both square roots and cube roots always result in irrational numbers if the radicand is not zero.", "isCorrect": false, "rationale": "This is incorrect. For example, 4 = 2 and [3]8 = 2, which are rational numbers."}], "id": "q06"}, {"question": "Between which two consecutive whole numbers does 70 lie?", "options": [{"text": "7 and 8", "isCorrect": false, "rationale": "7^2 = 49 and 8^2 = 64. Since 64 < 70, 70 is greater than 8."}, {"text": "8 and 9", "isCorrect": true, "rationale": "We know that 8^2 = 64 and 9^2 = 81. Since 64 < 70 < 81, it follows that 8 < 70 < 9."}, {"text": "9 and 10", "isCorrect": false, "rationale": "9^2 = 81. Since 70 < 81, 70 is less than 9."}, {"text": "10 and 11", "isCorrect": false, "rationale": "10^2 = 100. 70 is much smaller than 100."}], "id": "q07"}, {"question": "Simplify the expression 98.", "options": [{"text": "27", "isCorrect": false, "rationale": "This would imply 98 = 2 * 49, but the 2 would remain under the radical, and 7 is the root of 49."}, {"text": "72", "isCorrect": true, "rationale": "To simplify, find the largest perfect square factor of the radicand. 98 can be factored as 49 * 2. Using the product property, 98 = 492 = 72."}, {"text": "492", "isCorrect": false, "rationale": "While 49 is a factor, 49 is a perfect square, so its square root (7) can be taken out of the radical."}, {"text": "147", "isCorrect": false, "rationale": "This is incorrect. (147)^2 = 196*7 = 1372, not 98."}], "id": "q08"}, {"question": "When simplifying a square root like 108, which of the following represents the most efficient application of the product property for simplification, as described in the text?", "options": [{"text": "Factoring 108 into 4 * 27, resulting in 427.", "isCorrect": false, "rationale": "While 4 is a perfect square, 27 still contains a perfect square factor (9), meaning this is not the most complete or efficient first step for full simplification."}, {"text": "Factoring 108 into 9 * 12, resulting in 912.", "isCorrect": false, "rationale": "Similar to the option with 4, 9 is a perfect square, but 12 still contains a perfect square factor (4). This is not the largest perfect square factor of 108."}, {"text": "Factoring 108 into 36 * 3, resulting in 363.", "isCorrect": true, "rationale": "The text advises to 'find the largest perfect square factor of n.' For 108, the largest perfect square factor is 36 (since 6^2 = 36 and 108 = 36 * 3). Applying the product property, 363 = 63, which is the fully simplified form."}, {"text": "Factoring 108 into 2 * 54, resulting in 254.", "isCorrect": false, "rationale": "Neither 2 nor 54 are perfect squares. This step does not facilitate simplification directly using the product property for perfect squares."}], "id": "q09"}, {"question": "A square garden has an area of 75 square feet. What is the exact length of one side of the garden in simplified radical form?", "options": [{"text": "53 feet", "isCorrect": true, "rationale": "The area of a square is s^2, so s = 75. To simplify 75, find the largest perfect square factor, which is 25 (since 5^2 = 25). So, 75 = 253 = 253 = 53 feet."}, {"text": "253 feet", "isCorrect": false, "rationale": "While 25 is a factor of 75, it is a perfect square, and its square root should be taken out of the radical to simplify the expression further (25 = 5)."}, {"text": "75 feet", "isCorrect": false, "rationale": "This is the area, not the side length. The square root needs to be taken, and then simplified."}, {"text": "8.66 feet", "isCorrect": false, "rationale": "This is an approximation of 75, but the question asks for the 'exact length... in simplified radical form.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
