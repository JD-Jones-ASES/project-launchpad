        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the term \"surface area\" represent for a three-dimensional figure?", "options": [{"text": "The total volume enclosed by the figure.", "isCorrect": false, "rationale": "Volume measures the space inside a solid, not the area of its outer covering."}, {"text": "The total length of all its edges.", "isCorrect": false, "rationale": "Edge length is a linear measurement, not an area measurement."}, {"text": "The total area of all the faces or curved surfaces of a solid.", "isCorrect": true, "rationale": "The text defines surface area as 'the total area of all the faces (or curved surfaces) of a solid'."}, {"text": "The area of its base multiplied by its height.", "isCorrect": false, "rationale": "While related to volume for some shapes, this formula doesn't generally represent the total surface area for all solids mentioned."}]}, {"question": "According to the definition provided, which statement is *always* true about a prism?", "options": [{"text": "It has exactly three rectangular lateral faces.", "isCorrect": false, "rationale": "This is true for a triangular prism, but not for all prisms (e.g., a rectangular prism has four lateral faces)."}, {"text": "Its bases are always triangles.", "isCorrect": false, "rationale": "The text states a prism is named by the shape of its bases, implying they can be any polygon, not just triangles."}, {"text": "It has two parallel, congruent polygonal bases.", "isCorrect": true, "rationale": "The text defines a prism as 'a solid with two parallel, congruent polygonal bases and rectangular lateral faces'."}, {"text": "Its lateral faces are always triangles.", "isCorrect": false, "rationale": "The text explicitly states that a prism has 'rectangular lateral faces'."}]}, {"question": "How does a \"net\" primarily assist in calculating or visualizing the surface area of a three-dimensional solid?", "options": [{"text": "It helps determine the volume of the solid by unfolding it.", "isCorrect": false, "rationale": "Nets are for surface area, not volume. Volume is a measure of internal space, while a net visualizes the external faces."}, {"text": "It forms a three-dimensional model that is easier to measure.", "isCorrect": false, "rationale": "A net is a *two-dimensional* pattern that *can be folded* into a 3D solid, not a 3D model itself."}, {"text": "It provides a two-dimensional pattern that can be folded to form the solid, making all its faces visible.", "isCorrect": true, "rationale": "The text states a net is 'a two-dimensional pattern that can be folded to form a three-dimensional solid. Nets are helpful for visualizing surface area'."}, {"text": "It simplifies the calculation of the solid's perimeter.", "isCorrect": false, "rationale": "Perimeter is a 2D measurement of a boundary, not applicable to the surface of a 3D solid in this context."}]}, {"question": "A packaging company needs to determine the amount of material to cover a rectangular box with a length of 10 cm, a width of 6 cm, and a height of 4 cm. What is the surface area of this box?", "options": [{"text": "240 cm²", "isCorrect": false, "rationale": "This would be the volume (10 * 6 * 4), not the surface area."}, {"text": "148 cm²", "isCorrect": false, "rationale": "This calculation is incorrect. For example, 2(10)(6) + 2(10)(4) + 2(6)(4) = 120 + 80 + 48 = 248 cm²."}, {"text": "248 cm²", "isCorrect": true, "rationale": "Using the formula SA = 2lw + 2lh + 2wh: SA = 2(10)(6) + 2(10)(4) + 2(6)(4) = 120 + 80 + 48 = 248 cm²."}, {"text": "208 cm²", "isCorrect": false, "rationale": "This calculation is incorrect. For example, 2(10)(6) + 2(10)(4) + 2(6)(4) = 120 + 80 + 48 = 248 cm²."}]}, {"question": "When calculating the total surface area of a triangular prism, which set of faces must always be included in the sum?", "options": [{"text": "Three triangular faces and two rectangular faces.", "isCorrect": false, "rationale": "A triangular prism has two triangular bases and three rectangular lateral faces, not three triangular faces."}, {"text": "Two triangular bases and three rectangular lateral faces.", "isCorrect": true, "rationale": "The text states, 'A triangular prism has two triangular bases and three rectangular lateral faces. Its surface area is the sum of the areas of all five faces.'"}, {"text": "Two circular bases and one curved lateral surface.", "isCorrect": false, "rationale": "This describes a cylinder, not a triangular prism."}, {"text": "One triangular base and four rectangular lateral faces.", "isCorrect": false, "rationale": "A prism must have two congruent parallel bases, and a triangular prism has only three lateral faces."}]}, {"question": "A tent is shaped like a triangular prism. Its triangular base has a base of 8 ft and a height of 3 ft, with the other two sides measuring 5 ft each. If the tent's length (prism height) is 10 ft, what is the total surface area of the tent material?", "options": [{"text": "134 ft²", "isCorrect": false, "rationale": "Incorrect calculation. The two triangular bases are 2 * (1/2 * 8 * 3) = 24 ft². The three rectangular faces are (8*10) + (5*10) + (5*10) = 80 + 50 + 50 = 180 ft². Total SA = 24 + 180 = 204 ft²."}, {"text": "160 ft²", "isCorrect": false, "rationale": "Incorrect calculation. The two triangular bases are 2 * (1/2 * 8 * 3) = 24 ft². The three rectangular faces are (8*10) + (5*10) + (5*10) = 80 + 50 + 50 = 180 ft². Total SA = 24 + 180 = 204 ft²."}, {"text": "204 ft²", "isCorrect": true, "rationale": "Area of two triangular bases = 2 * (1/2 * base * height) = 2 * (1/2 * 8 ft * 3 ft) = 24 ft². Area of three rectangular faces = (side1 * length) + (side2 * length) + (side3 * length) = (8 ft * 10 ft) + (5 ft * 10 ft) + (5 ft * 10 ft) = 80 ft² + 50 ft² + 50 ft² = 180 ft². Total SA = 24 ft² + 180 ft² = 204 ft²."}, {"text": "240 ft²", "isCorrect": false, "rationale": "Incorrect calculation. The two triangular bases are 2 * (1/2 * 8 * 3) = 24 ft². The three rectangular faces are (8*10) + (5*10) + (5*10) = 80 + 50 + 50 = 180 ft². Total SA = 24 + 180 = 204 ft²."}]}, {"question": "If you were to 'unroll' the curved lateral surface of a cylinder to form a flat shape, what would be the resulting shape and its relevant dimensions?", "options": [{"text": "A circle with a radius equal to the cylinder's height.", "isCorrect": false, "rationale": "The unrolled lateral surface forms a rectangle, not a circle, and its dimensions relate to height and circumference, not radius directly."}, {"text": "A rectangle whose length is the cylinder's height and whose width is the circumference of its base.", "isCorrect": true, "rationale": "The text states: 'If you “unroll” the lateral surface, it forms a rectangle whose width is the circumference of the base.' The length of this rectangle would be the height of the cylinder."}, {"text": "A square with sides equal to the cylinder's diameter.", "isCorrect": false, "rationale": "The unrolled surface is a rectangle, not necessarily a square, and its dimensions are height and circumference, not just diameter."}, {"text": "A triangle with a base equal to the cylinder's circumference.", "isCorrect": false, "rationale": "The unrolled lateral surface forms a rectangle, not a triangle."}]}, {"question": "A company is designing a label for a new product packaged in a cylindrical container. The container has a radius of 2 cm and a height of 7 cm. Using $\\pi \\approx 3.14$, what is the total surface area of the container that would need to be covered if the label fully encased it, including the top and bottom?", "options": [{"text": "87.92 cm²", "isCorrect": false, "rationale": "This calculation is incorrect. SA = 2(3.14)(2)^2 + 2(3.14)(2)(7) = 2(3.14)(4) + 2(3.14)(14) = 25.12 + 87.92 = 113.04 cm²."}, {"text": "113.04 cm²", "isCorrect": true, "rationale": "Using the formula SA = 2πr² + 2πrh: SA = 2(3.14)(2 cm)² + 2(3.14)(2 cm)(7 cm) = 2(3.14)(4) + 2(3.14)(14) = 25.12 + 87.92 = 113.04 cm²."}, {"text": "100.48 cm²", "isCorrect": false, "rationale": "This calculation is incorrect. SA = 2(3.14)(2)^2 + 2(3.14)(2)(7) = 2(3.14)(4) + 2(3.14)(14) = 25.12 + 87.92 = 113.04 cm²."}, {"text": "50.24 cm²", "isCorrect": false, "rationale": "This would only be the area of the two bases (2 * π * r²). The lateral surface area is missing."}]}, {"question": "You are wrapping a gift box that is a rectangular prism and want to estimate the amount of wrapping paper needed. If you decide to only cover the lateral faces of the box, ignoring the top and bottom, which part of the surface area formula for a rectangular prism would you primarily use?", "options": [{"text": "$2lw$", "isCorrect": false, "rationale": "$2lw$ represents the area of the top and bottom bases, which are explicitly being ignored."}, {"text": "$2lh + 2wh$", "isCorrect": true, "rationale": "The formula for a rectangular prism's surface area is $2lw + 2lh + 2wh$. If you exclude the top ($lw$) and bottom ($lw$) faces, you are left with the area of the four lateral faces, which is $2lh + 2wh$."}, {"text": "$lwh$", "isCorrect": false, "rationale": "$lwh$ is the formula for the volume of a rectangular prism, not its surface area."}, {"text": "$2lw + 2lh + 2wh$", "isCorrect": false, "rationale": "This is the formula for the *total* surface area, but the question specifies only covering the *lateral faces*, excluding top and bottom."}]}, {"question": "A student is asked to identify the defining characteristic used to name different types of prisms, such as a \"rectangular prism\" versus a \"triangular prism.\" Based on the text, what is this characteristic?", "options": [{"text": "The number of rectangular lateral faces.", "isCorrect": false, "rationale": "While related, the number of lateral faces is a consequence of the base shape, not the primary naming convention. For example, a rectangular prism has 4 lateral faces, a triangular prism has 3."}, {"text": "The specific dimensions (length, width, height) of the prism.", "isCorrect": false, "rationale": "Dimensions describe a specific prism, but don't define its *type* (e.g., both rectangular and triangular prisms have dimensions)."}, {"text": "The shape of its two parallel and congruent bases.", "isCorrect": true, "rationale": "The text explicitly states: 'A prism is named by the shape of its bases.'"}, {"text": "The material it is made from.", "isCorrect": false, "rationale": "The material is irrelevant to the geometric classification and naming of a prism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
