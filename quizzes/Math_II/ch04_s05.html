<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 4, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of multiplying every term in an equation by a specific number when it contains fractions or decimals?", "options": [{"text": "To change the solution of the equation to a simpler value.", "isCorrect": false, "rationale": "Multiplying all terms by a non-zero number does not change the solution of the equation; it only changes its form."}, {"text": "To transform the equation into one with integer coefficients, which is easier to solve.", "isCorrect": true, "rationale": "The text explicitly states that this 'transforms the equation into one with integer coefficients, which is easier to solve'."}, {"text": "To eliminate all constant terms from the equation.", "isCorrect": false, "rationale": "Constants typically remain in the equation, though their values will change after multiplication."}, {"text": "To reduce the total number of terms on each side of the equation.", "isCorrect": false, "rationale": "While terms might combine later, the initial multiplication does not inherently reduce the number of terms; it just changes their coefficients."}], "id": "q01"}, {"question": "To clear the fractions in the equation x/6 - x/9 = 5/18, what is the least common denominator (LCD) you should multiply every term by?", "options": [{"text": "6", "isCorrect": false, "rationale": "6 is not a multiple of 9 or 18, so it would not clear all denominators."}, {"text": "9", "isCorrect": false, "rationale": "9 is not a multiple of 6 or 18, so it would not clear all denominators."}, {"text": "18", "isCorrect": true, "rationale": "18 is the smallest number that is a multiple of 6, 9, and 18. Multiplying by 18 will clear all fractions."}, {"text": "54", "isCorrect": false, "rationale": "54 is a common multiple, but it is not the *least* common denominator. While it would clear the fractions, it would lead to larger coefficients than necessary."}], "id": "q02"}, {"question": "Given the equation x/3 + x/4 = 7, and knowing the LCD is 12, which of the following represents the correct step after multiplying every term by the LCD?", "options": [{"text": "12x/3 + x/4 = 7", "isCorrect": false, "rationale": "Only the first term was multiplied by 12. Every term on both sides must be multiplied by the LCD."}, {"text": "4x + 3x = 7", "isCorrect": false, "rationale": "The fractions were cleared correctly, but the right-hand side (the constant 7) was not multiplied by the LCD."}, {"text": "4x + 3x = 84", "isCorrect": true, "rationale": "Multiplying each term by 12 yields (12 * x/3) + (12 * x/4) = (12 * 7), which simplifies to 4x + 3x = 84."}, {"text": "x + x = 84", "isCorrect": false, "rationale": "While the denominators were removed, the numerators were not correctly multiplied by the corresponding factors from the LCD (e.g., 12/3 = 4, so x/3 becomes 4x, not x)."}], "id": "q03"}, {"question": "Solve the equation x/2 + x/5 = 14.", "options": [{"text": "x = 10", "isCorrect": false, "rationale": "If x=10, 10/2 + 10/5 = 5 + 2 = 7, which is not 14."}, {"text": "x = 20", "isCorrect": true, "rationale": "The LCD of 2 and 5 is 10. Multiply every term by 10: 10(x/2) + 10(x/5) = 10(14) which simplifies to 5x + 2x = 140. Combining like terms gives 7x = 140. Dividing by 7 yields x = 20."}, {"text": "x = 28", "isCorrect": false, "rationale": "A common error might lead to incorrect calculations after combining terms, such as 7x = 196 (if 14 * 14 was mistakenly used, or other arithmetic error)."}, {"text": "x = 140", "isCorrect": false, "rationale": "This would be the result if 5x + 2x was not combined, and 140 was incorrectly isolated as x."}], "id": "q04"}, {"question": "When solving the equation (2x - 1)/3 = (x + 4)/6, after correctly identifying the LCD as 6 and multiplying every term by it, what is the simplified equation *before* distributing any terms?", "options": [{"text": "2(2x - 1) = x + 4", "isCorrect": true, "rationale": "Multiplying the left side by 6 gives 6 * (2x - 1)/3 = 2(2x - 1). Multiplying the right side by 6 gives 6 * (x + 4)/6 = x + 4. Thus, the equation becomes 2(2x - 1) = x + 4."}, {"text": "2(2x) - 1 = x + 4", "isCorrect": false, "rationale": "This incorrectly applies the multiplication only to the 2x term within the parenthesis, leaving the -1 untouched when it should also be multiplied by the factor of 2 from the denominator."}, {"text": "4x - 1 = x + 4", "isCorrect": false, "rationale": "This option shows incorrect distribution (4x is correct, but -1 is not) and is already partially distributed, not the step *before* distribution."}, {"text": "12x - 6 = 6x + 24", "isCorrect": false, "rationale": "This would be the result if each numerator was multiplied by the LCD (6) directly, rather than simplifying with the denominator first. For example, 6 * (2x-1)/3 simplifies to 2(2x-1), not 6(2x-1)."}], "id": "q05"}, {"question": "To clear decimals from the equation 1.5x - 0.02 = 0.38x + 1.2, what is the smallest power of 10 you should multiply every term by?", "options": [{"text": "10", "isCorrect": false, "rationale": "Multiplying by 10 would clear 1.5 and 1.2, but not 0.02 or 0.38, which have two decimal places."}, {"text": "100", "isCorrect": true, "rationale": "The greatest number of decimal places in any term is two (from 0.02 and 0.38). Multiplying by 100 (10^2) will shift the decimal two places to the right, making all coefficients integers."}, {"text": "1000", "isCorrect": false, "rationale": "While multiplying by 1000 would clear the decimals, it is not the *smallest* power of 10 required, leading to unnecessarily larger coefficients."}, {"text": "1", "isCorrect": false, "rationale": "Multiplying by 1 would not change the equation or clear any decimals."}], "id": "q06"}, {"question": "Solve the equation 0.3x + 1.2 = 4.5.", "options": [{"text": "x = 1.1", "isCorrect": false, "rationale": "If x=1.1, then 0.3(1.1) + 1.2 = 0.33 + 1.2 = 1.53, which is not 4.5."}, {"text": "x = 3.3", "isCorrect": false, "rationale": "This value would be obtained if you incorrectly only subtracted 1.2 from 4.5 but didn't divide by 0.3, or if you made a division error."}, {"text": "x = 11", "isCorrect": true, "rationale": "Multiply every term by 10 to clear decimals: 10(0.3x) + 10(1.2) = 10(4.5), which simplifies to 3x + 12 = 45. Subtract 12 from both sides: 3x = 33. Divide by 3: x = 11."}, {"text": "x = 15", "isCorrect": false, "rationale": "If x=15, then 0.3(15) + 1.2 = 4.5 + 1.2 = 5.7, which is not 4.5."}], "id": "q07"}, {"question": "Consider the equation 0.05x - 1.2 = 3.45. After multiplying by the appropriate power of 10 to clear decimals, what is the resulting equation?", "options": [{"text": "5x - 12 = 345", "isCorrect": false, "rationale": "The term -1.2, when multiplied by 100, should become -120, not -12."}, {"text": "5x - 120 = 345", "isCorrect": true, "rationale": "The greatest number of decimal places is two (in 0.05 and 3.45), so multiply by 100. 100 * 0.05x = 5x. 100 * -1.2 = -120. 100 * 3.45 = 345. So, the equation becomes 5x - 120 = 345."}, {"text": "5x - 12 = 34.5", "isCorrect": false, "rationale": "Both -1.2 and 3.45 are incorrectly converted. 3.45 should become 345, and -1.2 should become -120."}, {"text": "50x - 120 = 345", "isCorrect": false, "rationale": "The term 0.05x, when multiplied by 100, becomes 5x, not 50x."}], "id": "q08"}, {"question": "Admission to a fair is $4.50 for adults and $2.50 for children. A group of 20 people pays a total of $70. If 'a' represents the number of adults, which equation correctly represents this scenario *before* clearing any decimals?", "options": [{"text": "4.50a + 2.50(20) = 70", "isCorrect": false, "rationale": "This equation assumes all 20 people are children if 'a' were ignored or applied incorrectly. It does not correctly represent the number of children in relation to the number of adults."}, {"text": "4.50a + 2.50(a - 20) = 70", "isCorrect": false, "rationale": "If 'a' is the number of adults, then the number of children would be (total people - adults), so (20 - a), not (a - 20)."}, {"text": "4.50a + 2.50(20 - a) = 70", "isCorrect": true, "rationale": "The cost for adults is 4.50 multiplied by the number of adults (a). The number of children is the total people (20) minus the number of adults (a). The cost for children is 2.50 multiplied by (20 - a). The sum of these costs equals the total payment (70)."}, {"text": "(4.50 + 2.50)a = 70", "isCorrect": false, "rationale": "This equation incorrectly sums the prices per adult and child and assumes that 'a' represents both adults and children, which is not how the variables are defined."}], "id": "q09"}, {"question": "The textbook notes that you can solve equations with fractions or decimals without clearing them first. Given this, what is the primary benefit of choosing to clear fractions or decimals as taught in this section?", "options": [{"text": "It is the only way to arrive at the correct solution for such equations.", "isCorrect": false, "rationale": "The note explicitly states that you 'can always solve an equation with fractions or decimals without clearing them first,' meaning it's not the only way to get the correct solution."}, {"text": "It makes the arithmetic easier by converting coefficients to integers.", "isCorrect": true, "rationale": "The text states, 'Clearing just makes the arithmetic easier' and that it 'transforms the equation into one with integer coefficients, which is easier to solve.'"}, {"text": "It eliminates the need for checking the solution, as the method guarantees accuracy.", "isCorrect": false, "rationale": "Checking solutions is always a good practice, regardless of the method used, to ensure accuracy and catch potential errors."}, {"text": "It always results in a simpler algebraic expression before any calculations.", "isCorrect": false, "rationale": "While it simplifies the *type* of numbers (integers), the algebraic expression itself might initially involve more multiplication before simplification, it doesn't necessarily make it 'simpler' in terms of fewer terms or simpler appearance before calculation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
