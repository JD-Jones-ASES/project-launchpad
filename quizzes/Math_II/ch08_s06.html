<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 8, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following correctly identifies the slope and y-intercept of the equation $y = -5x + 3$?", "options": [{"text": "Slope = 5, y-intercept = (0, 3)", "isCorrect": false, "rationale": "The slope is the coefficient of $x$, which is -5, not 5. The y-intercept is $b$, which is 3, making the point (0, 3)."}, {"text": "Slope = -5, y-intercept = (0, -3)", "isCorrect": false, "rationale": "The slope is indeed -5, but the y-intercept is positive 3, not negative 3. The equation is $y = mx + b$, so $b = 3$."}, {"text": "Slope = -5, y-intercept = (0, 3)", "isCorrect": true, "rationale": "In the slope-intercept form $y = mx + b$, $m$ is the slope and $b$ is the y-intercept. Here, $m = -5$ and $b = 3$, so the y-intercept point is $(0, 3)$."}, {"text": "Slope = 3, y-intercept = (0, -5)", "isCorrect": false, "rationale": "The slope is the coefficient of $x$, which is -5, not 3. The y-intercept is the constant term, which is 3, not -5."}], "id": "q01"}, {"question": "For the equation $y = x$, what are the slope and y-intercept?", "options": [{"text": "Slope = 0, y-intercept = (0, 0)", "isCorrect": false, "rationale": "The slope of $y = x$ is 1 (the coefficient of $x$), not 0. A slope of 0 would mean a horizontal line ($y=c$)."}, {"text": "Slope = 1, y-intercept = (0, 1)", "isCorrect": false, "rationale": "The slope is 1, but the y-intercept is 0 because there is no constant term added or subtracted. The equation can be written as $y = 1x + 0$."}, {"text": "Slope = 1, y-intercept = (0, 0)", "isCorrect": true, "rationale": "The equation $y = x$ can be written as $y = 1x + 0$. In slope-intercept form $y = mx + b$, the slope $m$ is $1$ and the y-intercept $b$ is $0$. The y-intercept point is $(0, 0)$."}, {"text": "Slope = undefined, y-intercept = (0, 0)", "isCorrect": false, "rationale": "An undefined slope indicates a vertical line (e.g., $x=c$), which is not the case for $y=x$. The slope of $y=x$ is 1."}], "id": "q02"}, {"question": "What is the very first step when graphing the line $y = \\frac{2}{5}x - 3$ using the slope-intercept form?", "options": [{"text": "Calculate the x-intercept.", "isCorrect": false, "rationale": "While finding the x-intercept can be part of graphing, it is not the *first* step when using the slope-intercept method. The text specifies plotting the y-intercept first."}, {"text": "Plot the y-intercept at $(0, -3)$.", "isCorrect": true, "rationale": "The slope-intercept method begins by identifying and plotting the y-intercept, which is $b = -3$ in this equation. The y-intercept is always at the point $(0, b)$."}, {"text": "Determine the slope by moving right 5 units and up 2 units.", "isCorrect": false, "rationale": "This describes how to use the slope, but it comes *after* plotting the y-intercept. You need a starting point to apply the 'rise over run'."}, {"text": "Draw the line through the origin.", "isCorrect": false, "rationale": "The line only passes through the origin if the y-intercept is 0. In this case, the y-intercept is -3, so it does not pass through the origin."}], "id": "q03"}, {"question": "When graphing $y = -\\frac{3}{4}x + 2$, after plotting the y-intercept at $(0, 2)$, which movement correctly uses the slope to find a second point?", "options": [{"text": "Move right 4 units and up 3 units.", "isCorrect": false, "rationale": "A positive slope would involve moving 'up' for a positive 'run'. This slope is negative, meaning the movements should result in a downward trend from left to right."}, {"text": "Move left 4 units and down 3 units.", "isCorrect": false, "rationale": "Moving left (negative run) and down (negative rise) effectively results in a positive slope (negative/negative = positive). The given slope is -3/4, which is negative."}, {"text": "Move right 4 units and down 3 units.", "isCorrect": true, "rationale": "The slope is $m = -\\frac{3}{4}$. This means a 'rise' of -3 (down 3 units) and a 'run' of 4 (right 4 units). From the y-intercept, you move right 4 and down 3 to find a second point."}, {"text": "Move up 3 units and right 4 units.", "isCorrect": false, "rationale": "This movement represents a slope of $+3/4$, but the given slope is $-3/4$."}], "id": "q04"}, {"question": "A line crosses the y-axis at $(0, -4)$ and also passes through $(2, 6)$. What is its equation in slope-intercept form?", "options": [{"text": "$y = 5x - 4$", "isCorrect": true, "rationale": "The y-intercept is given as $(0, -4)$, so $b = -4$. The slope $m = \\frac{6 - (-4)}{2 - 0} = \\frac{10}{2} = 5$. Plugging these into $y = mx + b$ gives $y = 5x - 4$."}, {"text": "$y = -5x - 4$", "isCorrect": false, "rationale": "While the y-intercept is correct, the slope calculation leads to $m=5$, not $m=-5$. The line goes up from left to right, indicating a positive slope."}, {"text": "$y = 2x + 6$", "isCorrect": false, "rationale": "This incorrectly uses the second point's y-coordinate as the y-intercept and an unrelated slope. The y-intercept is explicitly given as $(0, -4)$."}, {"text": "$y = -4x + 2$", "isCorrect": false, "rationale": "This misidentifies the slope and y-intercept. The slope is calculated from the two points, not taken directly from coordinates, and the y-intercept is given as -4."}], "id": "q05"}, {"question": "What is the equation of the line that passes through the points $(-1, 5)$ and $(3, 1)$ in slope-intercept form?", "options": [{"text": "$y = -x + 4$", "isCorrect": true, "rationale": "First, calculate the slope: $m = \\frac{1 - 5}{3 - (-1)} = \\frac{-4}{4} = -1$. Then, use one point and the slope to find $b$: Using $(-1, 5)$, substitute into $y = mx + b$: $5 = -1(-1) + b \\Rightarrow 5 = 1 + b \\Rightarrow b = 4$. So, the equation is $y = -x + 4$."}, {"text": "$y = x + 6$", "isCorrect": false, "rationale": "This slope is positive, but the calculated slope from the given points is negative. Also, if $m=1$, then using $(-1,5)$, $5 = 1(-1) + b \\Rightarrow b=6$, but the slope is incorrect."}, {"text": "$y = -\\frac{1}{2}x + \\frac{9}{2}$", "isCorrect": false, "rationale": "The calculated slope is -1, not -1/2. Recalculate slope: $m = \\frac{1 - 5}{3 - (-1)} = \\frac{-4}{4} = -1$. Using this slope, $b=4$."}, {"text": "$y = 2x + 7$", "isCorrect": false, "rationale": "The calculated slope from the given points is -1, not 2. This equation does not pass through either given point."}], "id": "q06"}, {"question": "A premium car wash charges a $15 base fee plus $3 per added service. Which equation correctly represents the total cost $C$ for $s$ added services?", "options": [{"text": "$C = 15s + 3$", "isCorrect": false, "rationale": "The $15 is the base fee (fixed cost), which corresponds to the y-intercept. The $3 is the per-service charge (rate), which corresponds to the slope. This equation has them swapped."}, {"text": "$C = 3s + 15$", "isCorrect": true, "rationale": "The $3 per added service is the rate of change, so it's the slope ($m=3$). The $15 base fee is the initial cost (when $s=0$), so it's the y-intercept ($b=15$). Thus, $C = 3s + 15$ is the correct equation."}, {"text": "$C = 18s$", "isCorrect": false, "rationale": "This combines the base fee and per-service charge incorrectly into a single rate. The base fee is a fixed cost, not dependent on the number of services."}, {"text": "$C = 15s - 3$", "isCorrect": false, "rationale": "This incorrectly assigns the base fee as the slope and subtracts the per-service charge, which is nonsensical in this context."}], "id": "q07"}, {"question": "In the cost equation $C = 3s + 15$ (where $C$ is total cost and $s$ is the number of added services for a car wash), what does the value '3' represent?", "options": [{"text": "The total cost if no services are added.", "isCorrect": false, "rationale": "The total cost if no services are added ($s=0$) is the y-intercept, which is 15. The '3' is the slope."}, {"text": "The base fee of the car wash.", "isCorrect": false, "rationale": "The base fee is the fixed cost, represented by the y-intercept (15), not the slope (3)."}, {"text": "The increase in cost for each additional service.", "isCorrect": true, "rationale": "The value '3' is the slope ($m$), which represents the rate of change. In this context, it's the cost per added service, or how much the total cost increases for each additional service, just like '2 per movie' in the textbook example."}, {"text": "The maximum number of services allowed.", "isCorrect": false, "rationale": "The equation does not define a maximum number of services. The slope represents a rate, not a limit."}], "id": "q08"}, {"question": "A line passes through the points $(1, 4)$ and $(5, 12)$. What is its equation in slope-intercept form?", "options": [{"text": "$y = 2x + 2$", "isCorrect": true, "rationale": "First find the slope: $m = \\frac{12 - 4}{5 - 1} = \\frac{8}{4} = 2$. Then use the point $(1, 4)$: $4 = 2(1) + b$, so $b = 2$. The equation is $y = 2x + 2$."}, {"text": "$y = 4x + 1$", "isCorrect": false, "rationale": "This reverses the slope calculation and incorrectly identifies the y-intercept. The correct slope is 2, not 4."}, {"text": "$y = 2x + 4$", "isCorrect": false, "rationale": "While the slope is correct ($m = 2$), the y-intercept is wrong. Using point $(1, 4)$: $4 = 2(1) + b$ gives $b = 2$, not $b = 4$."}, {"text": "$y = 8x - 4$", "isCorrect": false, "rationale": "This uses the rise (8) as the slope without dividing by the run (4). The correct slope is $\\frac{8}{4} = 2$."}], "id": "q09"}, {"question": "Which statement about the slope-intercept form, $y = mx + b$, is always true?", "options": [{"text": "The slope $m$ must be a positive value.", "isCorrect": false, "rationale": "The text explicitly states that slope can be positive, negative, zero, or undefined, so it is not always positive."}, {"text": "The $y$-intercept $b$ must be a non-zero value.", "isCorrect": false, "rationale": "The example $y=x$ shows that $b$ can be 0 (y-intercept at $(0,0)$), meaning the line passes through the origin. There is no requirement for $b$ to be non-zero."}, {"text": "The variable $x$ represents the run, and $y$ represents the rise.", "isCorrect": false, "rationale": "Slope is defined as $rise/run$, where rise is the change in $y$ and run is the change in $x$. The variables $x$ and $y$ themselves are coordinates, not direct representations of 'rise' and 'run'; they change along the line."}, {"text": "The equation makes it easy to quickly graph a line by plotting the $y$-intercept and using the slope.", "isCorrect": true, "rationale": "The introductory paragraph states, 'The slope-intercept form makes it easy to graph a line quickly and to write an equation from a graph,' highlighting this key benefit."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
