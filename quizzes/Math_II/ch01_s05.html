<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 1, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions is equivalent to $125^{1/3}$?", "options": [{"text": "The square root of 125", "isCorrect": false, "rationale": "The exponent $1/3$ indicates the cube root, not the square root. The square root would be $125^{1/2}$."}, {"text": "5", "isCorrect": true, "rationale": "According to the property $a^{1/n} = \\sqrt[n]{a}$, $125^{1/3}$ means the cube root of 125. Since $5 \\times 5 \\times 5 = 125$, the cube root of 125 is 5."}, {"text": "25", "isCorrect": false, "rationale": "25 is the result of $125^{2/3}$ (taking the cube root first, then squaring) or 125 divided by 5, not the cube root."}, {"text": "The reciprocal of 125 cubed", "isCorrect": false, "rationale": "The reciprocal of 125 cubed would be $(125^3)^{-1}$ or $1/125^3$. A fractional exponent means a root, not a reciprocal power."}], "id": "q01"}, {"question": "Evaluate the expression $64^{2/3}$.", "options": [{"text": "16", "isCorrect": true, "rationale": "To evaluate $64^{2/3}$, first take the cube root of 64, which is 4 (since $4^3 = 64$). Then, square the result: $4^2 = 16$. This follows the property $a^{m/n} = (\\sqrt[n]{a})^m$."}, {"text": "4", "isCorrect": false, "rationale": "4 is the cube root of 64, but the expression requires squaring the root as well ($m=2$). So, $4^2$ is needed."}, {"text": "8", "isCorrect": false, "rationale": "8 is the square root of 64, not the cube root. The denominator of the exponent ($n=3$) indicates the cube root."}, {"text": "128", "isCorrect": false, "rationale": "128 would result from $64^{3/2}$ if calculated as $(\\sqrt{64})^3 = 8^3$, but the exponent is $2/3$."}], "id": "q02"}, {"question": "Which of the following is the correct rational exponent form for $\\sqrt[7]{y^3}$?", "options": [{"text": "$y^{7/3}$", "isCorrect": false, "rationale": "The index of the root (7) becomes the denominator, and the power of the base (3) becomes the numerator. This option reverses them."}, {"text": "$y^{3/7}$", "isCorrect": true, "rationale": "According to the conversion rule $ \\sqrt[n]{a^m} = a^{m/n}$, the power (3) is the numerator and the root index (7) is the denominator. So, $\\sqrt[7]{y^3} = y^{3/7}$."}, {"text": "$y^{3 \\cdot 7}$", "isCorrect": false, "rationale": "This expression means $y^{21}$, which is not equivalent to the given radical form. The operations are not multiplication."}, {"text": "$y^{1/3}$", "isCorrect": false, "rationale": "This represents the cube root of $y$, not the seventh root of $y^3$. It only uses the power from the original expression, ignoring the root index."}], "id": "q03"}, {"question": "Rewrite $k^{5/4}$ in radical form.", "options": [{"text": "$\\sqrt[5]{k^4}$", "isCorrect": false, "rationale": "In $k^{m/n}$, $m$ is the power and $n$ is the root index. This option incorrectly places the 5 as the root index and 4 as the power."}, {"text": "$4k^5$", "isCorrect": false, "rationale": "This is a multiplication of 4 and $k^5$, which is not equivalent to a rational exponent expression."}, {"text": "$\\sqrt[4]{k^5}$", "isCorrect": true, "rationale": "For $k^{5/4}$, the denominator 4 indicates the 4th root, and the numerator 5 indicates the power to which $k$ is raised. So, it is $\\sqrt[4]{k^5}$."}, {"text": "$k \\cdot \\sqrt[4]{5}$", "isCorrect": false, "rationale": "This expression means $k$ multiplied by the 4th root of 5, which is not equivalent to $k^{5/4}$."}], "id": "q04"}, {"question": "Simplify the expression $a^{1/4} \\cdot a^{3/4}$.", "options": [{"text": "$a^{3/16}$", "isCorrect": false, "rationale": "When multiplying exponents with the same base, you add the exponents, not multiply them. So, $1/4 + 3/4$ is the correct operation."}, {"text": "$a$", "isCorrect": true, "rationale": "Using the product rule for exponents, when multiplying terms with the same base, we add their exponents: $a^{1/4} \\cdot a^{3/4} = a^{(1/4 + 3/4)} = a^{4/4} = a^1 = a$."}, {"text": "$a^{1/2}$", "isCorrect": false, "rationale": "Adding the exponents $1/4 + 3/4$ results in $4/4 = 1$, not $1/2$."}, {"text": "$a^{3/4}$", "isCorrect": false, "rationale": "This would be the result if the first term was $a^0$ or if the first exponent was ignored. The exponents must be added."}], "id": "q05"}, {"question": "Simplify the expression $\\frac{x^{7/5}}{x^{2/5}}$.", "options": [{"text": "$x^{9/5}$", "isCorrect": false, "rationale": "When dividing exponents with the same base, you subtract the exponents, not add them."}, {"text": "$x^1$", "isCorrect": true, "rationale": "Using the quotient rule for exponents, when dividing terms with the same base, we subtract their exponents: $x^{7/5} / x^{2/5} = x^{(7/5 - 2/5)} = x^{5/5} = x^1 = x$."}, {"text": "$x^{14/25}$", "isCorrect": false, "rationale": "This would be the result if the exponents were multiplied, which is incorrect for division. Exponents are subtracted."}, {"text": "$x^{5/10}$", "isCorrect": false, "rationale": "Subtracting $7/5 - 2/5$ yields $5/5$, not $5/10$ (which simplifies to $1/2$). The denominators remain the same during subtraction."}], "id": "q06"}, {"question": "Simplify $(y^{3/2})^6$.", "options": [{"text": "$y^9$", "isCorrect": true, "rationale": "Using the power rule for exponents, $(a^m)^n = a^{m \\cdot n}$. So, $(y^{3/2})^6 = y^{(3/2) \\cdot 6} = y^{18/2} = y^9$."}, {"text": "$y^{18}$", "isCorrect": false, "rationale": "This would be the result if the exponent was $y^{3 \\cdot 6}$, ignoring the denominator of 2 in the fractional exponent."}, {"text": "$y^{3/12}$", "isCorrect": false, "rationale": "This would be the result if 6 was used as a denominator in the multiplication, which is incorrect. The 6 multiplies the numerator."}, {"text": "$y^{12}$", "isCorrect": false, "rationale": "This would be the result if the original exponent was $y^{2/3}$ and multiplied by 6, or some other miscalculation."}], "id": "q07"}, {"question": "When evaluating an expression like $216^{4/3}$, which strategy is generally recommended according to the text, and why?", "options": [{"text": "Raise 216 to the power of 4 first, then take the cube root, because it's always easier to work with larger numbers.", "isCorrect": false, "rationale": "Raising to the power first often results in very large numbers that are difficult to work with manually. The text recommends the opposite."}, {"text": "Multiply 216 by $4/3$, as this is the definition of a rational exponent.", "isCorrect": false, "rationale": "Multiplying the base by the exponent is incorrect. A rational exponent signifies both a root and a power, not multiplication."}, {"text": "Take the cube root of 216 first, then raise the result to the power of 4, because it keeps the intermediate numbers smaller.", "isCorrect": true, "rationale": "The text explicitly states: 'Taking the root first usually keeps the numbers smaller.' For $216^{4/3}$, $\\sqrt[3]{216} = 6$, and then $6^4 = 1296$, which is much easier than $216^4$ first."}, {"text": "It doesn't matter which order you perform the operations, as both approaches are equally efficient for all numbers.", "isCorrect": false, "rationale": "While both orders yield the same result, the text advises that 'taking the root first usually keeps the numbers smaller,' implying one method is often more efficient than the other, especially with large numbers."}], "id": "q08"}, {"question": "The concept of rational exponents extends integer exponents by defining $a^{1/n}$ as the $n$-th root of $a$. This definition is fundamentally supported by which of the following exponent rules?", "options": [{"text": "The product rule, $a^m \\cdot a^n = a^{m+n}$.", "isCorrect": false, "rationale": "While the product rule works with rational exponents, it's not the primary rule that *defines* $a^{1/n}$ as a root. The definition stems from the power rule."}, {"text": "The quotient rule, $a^m / a^n = a^{m-n}$.", "isCorrect": false, "rationale": "The quotient rule applies to rational exponents but does not fundamentally define the relationship between $a^{1/n}$ and roots."}, {"text": "The power rule, $(a^m)^n = a^{m \\cdot n}$.", "isCorrect": true, "rationale": "The text explains: 'If we apply the power rule, $(a^{1/2})^2 = a^{(1/2) \\cdot 2} = a^1 = a$.' This demonstrates that $a^{1/n}$ is the number that, when raised to the power of $n$, equals $a$, which is the definition of the $n$-th root."}, {"text": "The zero exponent rule, $a^0 = 1$.", "isCorrect": false, "rationale": "The zero exponent rule defines how zero as an exponent behaves, but it does not establish the fundamental connection between fractional exponents and roots."}], "id": "q09"}, {"question": "Simplify the expression $(\\frac{m^{3/4}}{m^{1/2}})^4$.", "options": [{"text": "$m^{1/4}$", "isCorrect": false, "rationale": "This would be the result of simplifying inside the parenthesis to $m^{1/4}$ but without applying the outer power of 4."}, {"text": "$m$", "isCorrect": true, "rationale": "First, simplify inside the parentheses using the quotient rule: $m^{3/4} / m^{1/2} = m^{(3/4 - 2/4)} = m^{1/4}$. Then, apply the outer power using the power rule: $(m^{1/4})^4 = m^{(1/4) \\cdot 4} = m^1 = m$."}, {"text": "$m^{1/16}$", "isCorrect": false, "rationale": "This error might come from multiplying the denominators incorrectly or some other miscalculation of the exponents."}, {"text": "$m^{4}$", "isCorrect": false, "rationale": "This would be the result if the fraction in the exponent was 1, or if both exponents in the fraction were 1 and then raised to the power of 4."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
