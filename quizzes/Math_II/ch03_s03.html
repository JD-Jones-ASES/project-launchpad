<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the term 'markup' fundamentally represent in a business transaction?", "options": [{"text": "The amount a customer saves when an item is on sale.", "isCorrect": false, "rationale": "This describes a discount, which is a reduction from the original price, not a markup."}, {"text": "The amount added to the cost of an item to determine its selling price.", "isCorrect": true, "rationale": "As defined in the text, markup is the amount a business adds to the cost of an item to obtain the selling price."}, {"text": "The percentage of total sales earned by a sales employee.", "isCorrect": false, "rationale": "This describes a commission, which is an amount earned based on sales, separate from the pricing of an item relative to its cost."}, {"text": "The tax applied to an item's price after any discounts.", "isCorrect": false, "rationale": "This describes sales tax, which is a separate calculation applied at the point of sale, usually after discounts, and is not the markup itself."}], "id": "q01"}, {"question": "A boutique buys a handbag for $80 and applies a 60% markup. What is the dollar amount of the markup?", "options": [{"text": "$48", "isCorrect": true, "rationale": "The markup amount is calculated as 'markup rate × cost'. Here, 0.60 × $80 = $48."}, {"text": "$128", "isCorrect": false, "rationale": "This is the selling price ($80 cost + $48 markup), not just the markup amount."}, {"text": "$32", "isCorrect": false, "rationale": "This would be the markup amount for a 40% markup on $80, which is not the given rate."}, {"text": "$80", "isCorrect": false, "rationale": "This is the original cost of the handbag, not the markup amount."}], "id": "q02"}, {"question": "Using the information from the previous question, what is the selling price of the handbag after the 60% markup?", "options": [{"text": "$48", "isCorrect": false, "rationale": "This is the markup amount, not the selling price. The selling price includes the original cost plus the markup."}, {"text": "$80", "isCorrect": false, "rationale": "This is the original cost of the handbag, not the selling price after markup."}, {"text": "$128", "isCorrect": true, "rationale": "The selling price is the cost plus the markup. Cost = $80, Markup = 0.60 × $80 = $48. So, $80 + $48 = $128."}, {"text": "$140", "isCorrect": false, "rationale": "This value is not derived from an $80 cost with a 60% markup."}], "id": "q03"}, {"question": "A digital camera originally priced at $300 is on sale for 25% off. What is the dollar amount of the discount?", "options": [{"text": "$225", "isCorrect": false, "rationale": "This is the sale price ($300 - $75 discount), not the discount amount itself."}, {"text": "$75", "isCorrect": true, "rationale": "The discount amount is calculated as 'discount rate × original price'. Here, 0.25 × $300 = $75."}, {"text": "$300", "isCorrect": false, "rationale": "This is the original price, not the discount amount."}, {"text": "$25", "isCorrect": false, "rationale": "This would be a discount of approximately 8.33%, not 25%."}], "id": "q04"}, {"question": "A laptop with an original price of $800 is offered with a 15% discount. What is the sale price of the laptop?", "options": [{"text": "$120", "isCorrect": false, "rationale": "This is the discount amount (0.15 × $800 = $120), not the sale price."}, {"text": "$680", "isCorrect": true, "rationale": "First, find the discount: 0.15 × $800 = $120. Then subtract from the original price: $800 - $120 = $680. Alternatively, using the multiplier: $800 × (1 - 0.15) = $800 × 0.85 = $680."}, {"text": "$800", "isCorrect": false, "rationale": "This is the original price, not the sale price after a discount."}, {"text": "$920", "isCorrect": false, "rationale": "This would be an increase in price, not a discount."}], "id": "q05"}, {"question": "A car salesperson earns a 2% commission on their total sales. If they sell a car for $35,000, how much commission do they earn?", "options": [{"text": "$70", "isCorrect": false, "rationale": "This calculation suggests a commission of 0.2% or an error in decimal placement. The correct commission is 2% of $35,000."}, {"text": "$700", "isCorrect": true, "rationale": "Commission is calculated as 'commission rate × total sales'. Here, 0.02 × $35,000 = $700."}, {"text": "$3,500", "isCorrect": false, "rationale": "This would be a 10% commission, not 2%."}, {"text": "$7,000", "isCorrect": false, "rationale": "This would be a 20% commission, which is much higher than 2%."}], "id": "q06"}, {"question": "A dress has a regular price of $150. It is 20% off, and the sales tax rate is 8%. What is the total cost of the dress to the customer?", "options": [{"text": "$129.60", "isCorrect": true, "rationale": "Step 1: Find the sale price: $150 × (1 - 0.20) = $150 × 0.80 = $120. Step 2: Calculate tax on the sale price: $120 × 0.08 = $9.60. Step 3: Add tax to the sale price: $120 + $9.60 = $129.60."}, {"text": "$162.00", "isCorrect": false, "rationale": "This would be the result if tax was incorrectly calculated on the original price after a markup or without considering the discount."}, {"text": "$150.00", "isCorrect": false, "rationale": "This is the original price, not the total cost after discount and tax."}, {"text": "$120.00", "isCorrect": false, "rationale": "This is the sale price before tax is added. The total cost must include tax."}], "id": "q07"}, {"question": "According to the section, why is sales tax calculated on the sale price rather than the original price when an item is discounted?", "options": [{"text": "To maximize the amount of tax collected by the government.", "isCorrect": false, "rationale": "While tax collection is the goal, the rationale given in the text is about the actual amount paid by the customer, not maximizing collection through incorrect application."}, {"text": "Because the tax only applies to the amount the customer actually pays.", "isCorrect": true, "rationale": "The text explicitly states: 'The tax applies to the amount the customer actually pays.' This means tax is on the discounted price, which is what the customer truly pays."}, {"text": "To simplify calculations for the sales associate.", "isCorrect": false, "rationale": "While it might simplify some calculations, the primary reason is a principle of taxation based on the transaction value, not mere convenience."}, {"text": "Discounts are not legally binding until tax is applied.", "isCorrect": false, "rationale": "This statement is incorrect and not supported by the text. Discounts are part of the transaction terms, and tax is applied based on the final, agreed-upon price."}], "id": "q08"}, {"question": "A furniture store buys a dining set for $400 and wants to apply an 80% markup. Which expression correctly calculates the selling price using a single multiplier?", "options": [{"text": "$400 * 0.80", "isCorrect": false, "rationale": "This calculates only the markup amount, not the final selling price."}, {"text": "$400 * (1 - 0.80)", "isCorrect": false, "rationale": "This multiplier is used for calculating a sale price after a discount, not a selling price with a markup."}, {"text": "$400 + 0.80", "isCorrect": false, "rationale": "This incorrectly adds a decimal representing a percentage to a dollar amount, not performing a percentage calculation for markup."}, {"text": "$400 * (1 + 0.80)", "isCorrect": true, "rationale": "As per the key concept, 'Selling price = cost (1 + markup rate)'. Here, cost = $400 and markup rate = 0.80, so $400 × (1 + 0.80) is the correct expression."}], "id": "q09"}, {"question": "An outdoor grill originally priced at $500 is subject to a 10% discount. Which expression correctly calculates the sale price using a single multiplier?", "options": [{"text": "$500 * (1 + 0.10)", "isCorrect": false, "rationale": "This multiplier would be used to calculate a selling price with a markup, not a sale price with a discount."}, {"text": "$500 - 0.10", "isCorrect": false, "rationale": "This incorrectly subtracts a decimal representing a percentage from a dollar amount, not performing a percentage calculation for discount."}, {"text": "$500 * 0.10", "isCorrect": false, "rationale": "This calculates only the discount amount, not the final sale price."}, {"text": "$500 * (1 - 0.10)", "isCorrect": true, "rationale": "As per the key concept, 'Sale price = original price (1 - discount rate)'. Here, original price = $500 and discount rate = 0.10, so $500 × (1 - 0.10) is the correct expression."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
