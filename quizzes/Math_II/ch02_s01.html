<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 2, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the definition provided, what are the essential conditions for a number to be classified as a rational number?", "options": [{"text": "It can be written as a fraction $a/b$ where $a$ and $b$ are any numbers, and $b \ne 0$.", "isCorrect": false, "rationale": "The definition specifically states that both $a$ and $b$ must be integers, not just 'any numbers'."}, {"text": "It can be written as a fraction $a/b$ where $a$ and $b$ are integers, and $b \ne 0$.", "isCorrect": true, "rationale": "This accurately reflects the keyterm definition of a rational number: the numerator and denominator must be integers, and the denominator cannot be zero."}, {"text": "It must be a number whose decimal expansion terminates or repeats, regardless of its fractional form.", "isCorrect": false, "rationale": "While this is a property of rational numbers, it is the decimal form characteristic, not the primary definition based on the $a/b$ form itself. The definition relies on the integer nature of the numerator and denominator."}, {"text": "It is any number that can be plotted on a number line.", "isCorrect": false, "rationale": "Many types of numbers, including irrational numbers, can be plotted on a number line. This statement is too broad to define rational numbers specifically."}], "id": "q01"}, {"question": "Why is every integer, such as $-5$, considered a rational number?", "options": [{"text": "Because integers are always positive or zero.", "isCorrect": false, "rationale": "Integers can be negative (e.g., -5), so this statement is incorrect. The sign of an integer does not determine its rationality."}, {"text": "Because integers are the simplest form of numbers.", "isCorrect": false, "rationale": "While integers are fundamental, their 'simplicity' is not the mathematical reason they are classified as rational."}, {"text": "Because any integer $n$ can be expressed as $n/1$, fulfilling the criteria for a rational number where $a$ and $b$ are integers and $b \ne 0$.", "isCorrect": true, "rationale": "This aligns directly with the 'Integers Are Rational' property mentioned in the text. For example, $-5$ can be written as $-5/1$, where $-5$ and $1$ are integers and $1 \ne 0$."}, {"text": "Because integers have no decimal places.", "isCorrect": false, "rationale": "While true that integers typically have no decimal places displayed, this is not the definitional reason for their rationality. The definition hinges on their expressibility as a fraction of two integers."}], "id": "q02"}, {"question": "Which of the following numbers represents a terminating decimal?", "options": [{"text": "$1/3$", "isCorrect": false, "rationale": "When $1/3$ is converted to a decimal, it is $0.333...$, which is a repeating decimal, not a terminating one."}, {"text": "$5/6$", "isCorrect": false, "rationale": "When $5/6$ is converted to a decimal, it is $0.8333...$, which is a repeating decimal, not a terminating one."}, {"text": "$7/20$", "isCorrect": true, "rationale": "When $7/20$ is converted to a decimal, it is $0.35$. This decimal has a finite number of decimal places and eventually ends, making it a terminating decimal."}, {"text": "$2/11$", "isCorrect": false, "rationale": "When $2/11$ is converted to a decimal, it is $0.181818...$, which is a repeating decimal, not a terminating one."}], "id": "q03"}, {"question": "Consider the number $0.142857142857...$. Which category does it fall into, and what does this imply about its rationality?", "options": [{"text": "It is a terminating decimal, therefore rational.", "isCorrect": false, "rationale": "The '...' indicates that the decimal does not terminate. It continues indefinitely, so it cannot be a terminating decimal."}, {"text": "It is a repeating decimal, therefore rational.", "isCorrect": true, "rationale": "The block of digits '142857' repeats forever. The text states that a number is rational if its decimal expansion either terminates or repeats."}, {"text": "It is neither a terminating nor a repeating decimal, therefore not rational.", "isCorrect": false, "rationale": "While it doesn't terminate, it clearly exhibits a repeating block of digits, making it a repeating decimal and thus rational."}, {"text": "It is an integer, therefore rational.", "isCorrect": false, "rationale": "This number is not an integer. Integers are whole numbers (positive, negative, or zero) without fractional or decimal parts."}], "id": "q04"}, {"question": "A number's decimal expansion is $0.010010001...$ where the number of zeros increases each time (one zero, then two, then three, etc.). Based on this pattern, what can be concluded about its rationality?", "options": [{"text": "It is a terminating decimal and therefore rational.", "isCorrect": false, "rationale": "The ellipsis (...) indicates that the decimal continues indefinitely; it does not terminate."}, {"text": "It is a repeating decimal and therefore rational.", "isCorrect": false, "rationale": "Although there is a pattern in the increasing number of zeros, a repeating decimal requires a *block* of one or more digits to repeat *exactly* forever. In this case, the block of digits '01', '001', '0001' changes, so it is not strictly repeating."}, {"text": "It is neither a terminating nor a repeating decimal, and therefore not rational.", "isCorrect": true, "rationale": "The decimal does not end (non-terminating) and the pattern of digits does not repeat in a fixed block (non-repeating). According to the 'Decimals and Rational Numbers' property, such a number is not rational."}, {"text": "It is rational because it follows a discernible pattern.", "isCorrect": false, "rationale": "Following a pattern is not sufficient for a number to be rational if that pattern does not result in termination or exact repetition. The pattern must be a consistent, repeating block of digits."}], "id": "q05"}, {"question": "Which of the following numbers is NOT a rational number?", "options": [{"text": "$0.6$", "isCorrect": false, "rationale": "$0.6$ is a terminating decimal, which can be written as $6/10$ or $3/5$. Therefore, it is a rational number."}, {"text": "$-3/2$", "isCorrect": false, "rationale": "$-3/2$ is already in the form $a/b$ where $a=-3$ and $b=2$ are integers and $b \ne 0$. Therefore, it is a rational number."}, {"text": "$0.101101110...$ (where the number of 1s increases each time)", "isCorrect": true, "rationale": "This decimal neither terminates nor repeats with a fixed block. The pattern of increasing '1's means there is no repeating block, making it an irrational number."}, {"text": "$0$", "isCorrect": false, "rationale": "Zero can be written as $0/1$, which fits the definition of a rational number. Therefore, it is a rational number."}], "id": "q06"}, {"question": "When plotting $1.75$ on a number line, a student should place the point:", "options": [{"text": "Between $0$ and $1$, exactly halfway.", "isCorrect": false, "rationale": "$1.75$ is greater than $1$. $0.5$ would be halfway between $0$ and $1$."}, {"text": "Between $1$ and $2$, exactly halfway.", "isCorrect": false, "rationale": "$1.75$ is not halfway between $1$ and $2$; $1.5$ is. $1.75$ is three-quarters of the way."}, {"text": "Between $1$ and $2$, three-fourths of the way from $1$ to $2$.", "isCorrect": true, "rationale": "As $1.75 = 1 + 0.75 = 1 + 3/4$, it means the point is three-fourths of the distance from $1$ towards $2$."}, {"text": "Between $2$ and $3$, one-fourth of the way from $2$ to $3$.", "isCorrect": false, "rationale": "$1.75$ is less than $2$, so it cannot be between $2$ and $3$."}], "id": "q07"}, {"question": "The Density Property of Rational Numbers states that 'Between any two distinct rational numbers, there is always another rational number. In fact, there are infinitely many rational numbers between any two rational numbers.' What is the primary implication of this property for the number line?", "options": [{"text": "Rational numbers are equally spaced across the number line.", "isCorrect": false, "rationale": "The density property means they are 'packed tightly,' but not necessarily equally spaced. For example, there are infinitely many rationals between 0 and 1, and also infinitely many between 1 and 2, but this doesn't imply equal spacing."}, {"text": "The number line contains only rational numbers.", "isCorrect": false, "rationale": "This is incorrect. The number line also contains irrational numbers, which are numbers whose decimal expansions neither terminate nor repeat. The density property describes rational numbers, not the entire number line."}, {"text": "Rational numbers are 'packed tightly' on the number line, meaning one can always find more rational numbers no matter how close two existing ones are.", "isCorrect": true, "rationale": "This statement directly reflects the 'note' provided in the text regarding the density property: 'No matter how close two rational numbers are, you can always squeeze another one between them.'"}, {"text": "Every point on the number line can be precisely labeled with a rational number.", "isCorrect": false, "rationale": "This is incorrect. There are points on the number line that correspond to irrational numbers (e.g., $\\sqrt{2}$, $\\pi$) which cannot be labeled with rational numbers. The density property highlights their closeness, not their omnipresence over all points."}], "id": "q08"}, {"question": "To find a rational number between $1/3$ and $1/2$ using the averaging method, what is the correct result?", "options": [{"text": "$1/4$", "isCorrect": false, "rationale": "$1/4$ is $0.25$, which is less than $1/3$ ($0.333...$). It is not between the two given numbers."}, {"text": "$5/12$", "isCorrect": true, "rationale": "The average is $(1/3 + 1/2) / 2$. First, find a common denominator: $(2/6 + 3/6) / 2 = (5/6) / 2 = 5/12$. This is indeed between $1/3$ ($4/12$) and $1/2$ ($6/12$)."}, {"text": "$2/5$", "isCorrect": false, "rationale": "This result ($0.4$) is between $1/3$ ($0.333...$) and $1/2$ ($0.5$), but it is obtained by $(1+1)/(3+2)$, which is not the averaging method mentioned in the text."}, {"text": "$1/6$", "isCorrect": false, "rationale": "$1/6$ is $0.166...$, which is less than $1/3$ ($0.333...$). It is not between the two given numbers."}], "id": "q09"}, {"question": "A student claims that $0.83$ is a rational number because it is a repeating decimal. Which part of their statement or reasoning is incorrect, if any?", "options": [{"text": "The statement is entirely correct; $0.83$ is a repeating decimal and therefore rational.", "isCorrect": false, "rationale": "While it is true that $0.83$ (meaning $0.8333...$) is a repeating decimal and therefore rational, the bar notation is missing. The text uses $0.83$ to denote $0.8333...$, but standard mathematical notation for a repeating decimal would include a bar over the repeating digit(s), i.e., $0.8\\overline{3}$."}, {"text": "The decimal $0.83$ is actually a terminating decimal, not a repeating one, so the reasoning is flawed.", "isCorrect": false, "rationale": "The text uses $0.83$ as an example for $5/6$, which is $0.8333...$. Assuming this context, it is a repeating decimal."}, {"text": "While $0.83$ is rational, it's because it can be written as $83/100$, making it a terminating decimal, not a repeating one.", "isCorrect": false, "rationale": "If interpreted as $0.83$ exactly, it is $83/100$ and terminating. However, the example $5/6 = 0.83$ in the text implies $0.8333...$ (with the bar over the 3). If the question is using the notation $0.83$ without a bar, it would be terminating, but based on the text's example, the intent is likely repeating."}, {"text": "The student's notation is ambiguous; to clearly indicate a repeating decimal, a bar should be placed over the repeating digit(s), such as $0.8\\overline{3}$.", "isCorrect": true, "rationale": "The text explicitly states 'We place a bar over the repeating block' for repeating decimals (e.g., $0.3$, $0.18$, $0.83$). Without the bar, $0.83$ typically denotes a terminating decimal $83/100$. The student's claim that $0.83$ 'is a repeating decimal' is correct only if the bar is implied, but the notation itself is incomplete/ambiguous as per the standard definitions given in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
