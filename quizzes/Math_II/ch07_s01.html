<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A builder is designing a triangular support structure where no two sides will have the same length. How would this triangle be classified by its sides?", "options": [{"text": "Equilateral", "isCorrect": false, "rationale": "An equilateral triangle has three congruent sides, which contradicts the condition that no two sides will have the same length."}, {"text": "Isosceles", "isCorrect": false, "rationale": "An isosceles triangle has at least two congruent sides, which contradicts the condition that no two sides will have the same length."}, {"text": "Scalene", "isCorrect": true, "rationale": "A scalene triangle has no congruent sides, which matches the description that no two sides will have the same length."}, {"text": "Right", "isCorrect": false, "rationale": "Right is a classification by angles, not by sides, and doesn't directly relate to side lengths in this context."}]}, {"question": "A triangular piece of land has angles measuring $30^, 70^,$ and $80^$. How would this triangle be classified by its angles?", "options": [{"text": "Acute", "isCorrect": true, "rationale": "An acute triangle has three angles each less than $90^$. All angles ($30^, 70^, 80^$) are less than $90^$, making it an acute triangle."}, {"text": "Right", "isCorrect": false, "rationale": "A right triangle has exactly one $90^$ angle. This triangle does not have a $90^$ angle."}, {"text": "Obtuse", "isCorrect": false, "rationale": "An obtuse triangle has exactly one angle greater than $90^$. This triangle does not have any angle greater than $90^$."}, {"text": "Equilateral", "isCorrect": false, "rationale": "Equilateral is a classification by sides, where all angles would also be $60^$. This triangle's angles are not all $60^$."}]}, {"question": "In a triangular sail, two of the interior angles measure $47^$ and $68^$. What is the measure of the third interior angle?", "options": [{"text": "$47^$", "isCorrect": false, "rationale": "If the third angle were $47^$, the sum would be $47^ + 68^ + 47^ = 162^$, which is not $180^$."}, {"text": "$65^$", "isCorrect": true, "rationale": "The Triangle Angle-Sum Property states that the sum of the interior angles is $180^$. So, $180^ - (47^ + 68^) = 180^ - 115^ = 65^$."}, {"text": "$115^$", "isCorrect": false, "rationale": "This is the sum of the two given angles, not the third angle. The sum of all three angles must be $180^$."}, {"text": "$133^$", "isCorrect": false, "rationale": "This value would result in a sum greater than $180^$ when added to the other two angles ($47^ + 68^ + 133^ = 248^$)."}]}, {"question": "An architect designs an isosceles triangular window frame where the vertex angle at the top measures $110^$. What is the measure of each of the two base angles?", "options": [{"text": "$35^$", "isCorrect": true, "rationale": "In an isosceles triangle, the two base angles are equal. Let each base angle be $x$. According to the Triangle Angle-Sum Property, $x + x + 110^ = 180^$. So, $2x = 180^ - 110^ = 70^$, which means $x = 35^$."}, {"text": "$55^$", "isCorrect": false, "rationale": "If each base angle were $55^$, the sum would be $55^ + 55^ + 110^ = 220^$, which is not $180^$."}, {"text": "$70^$", "isCorrect": false, "rationale": "This would be the sum of the two base angles ($180^ - 110^ = 70^$), not the measure of each individual base angle."}, {"text": "$110^$", "isCorrect": false, "rationale": "The base angles are equal to each other, but not necessarily equal to the vertex angle, especially when the vertex angle is not $60^$."}]}, {"question": "A triangular garden plot has interior angles measuring $60^$, $60^$, and $60^$. How should this triangle be classified based on both its sides and angles?", "options": [{"text": "Acute isosceles", "isCorrect": false, "rationale": "While it is acute (all angles less than $90^$) and isosceles (at least two sides congruent), it is more specifically equilateral."}, {"text": "Right scalene", "isCorrect": false, "rationale": "This is incorrect because it has no right angle and all sides are congruent (not scalene)."}, {"text": "Obtuse equilateral", "isCorrect": false, "rationale": "This is incorrect because it has no obtuse angle and all angles are $60^$, not greater than $90^$."}, {"text": "Acute equilateral", "isCorrect": true, "rationale": "Since all angles are $60^$, it is an acute triangle (all angles less than $90^$). Also, having all angles equal implies all sides are congruent, making it an equilateral triangle. Thus, 'acute equilateral' is the most precise classification."}]}, {"question": "Consider triangle DEF. If side EF is extended through F to point G, forming an exterior angle DFG. Which angles are the remote interior angles relative to angle DFG?", "options": [{"text": "Angle DFE and Angle EFD", "isCorrect": false, "rationale": "Angle DFE is the same as Angle EFD, and this is the interior angle adjacent to the exterior angle DFG, not a remote interior angle."}, {"text": "Angle EDF and Angle DEF", "isCorrect": true, "rationale": "The remote interior angles are the two interior angles that are not adjacent to the exterior angle. In this case, Angle EDF (or D) and Angle DEF (or E) are the remote interior angles for exterior angle DFG."}, {"text": "Angle DFG and Angle DFE", "isCorrect": false, "rationale": "Angle DFG is the exterior angle itself, and Angle DFE is the adjacent interior angle. Neither is a remote interior angle."}, {"text": "Angle EDF and Angle EFG", "isCorrect": false, "rationale": "Angle EFG is part of the straight line forming the exterior angle, not an interior angle of the triangle."}]}, {"question": "In triangle XYZ, side YZ is extended to point W. If angle X measures $70^$ and angle Y measures $60^$, what is the measure of the exterior angle XZW?", "options": [{"text": "$50^$", "isCorrect": false, "rationale": "This would be the measure of the interior angle XZY ($180^ - 70^ - 60^ = 50^$), not the exterior angle."}, {"text": "$110^$", "isCorrect": false, "rationale": "This would be the measure of angle XZY's adjacent exterior angle if angle XZY was $70^$, but it is $50^$."}, {"text": "$130^$", "isCorrect": true, "rationale": "According to the Exterior Angle Theorem, the measure of an exterior angle equals the sum of its two remote interior angles. So, $m XZW = m X + m Y = 70^ + 60^ = 130^$."}, {"text": "$150^$", "isCorrect": false, "rationale": "This value is incorrect. The sum of the remote interior angles is $130^$, not $150^$."}]}, {"question": "An exterior angle of a triangle measures $125^$. If one of its remote interior angles measures $80^$, what is the measure of the other remote interior angle?", "options": [{"text": "$35^$", "isCorrect": false, "rationale": "If the other remote interior angle was $35^$, their sum would be $80^ + 35^ = 115^$, not $125^$."}, {"text": "$45^$", "isCorrect": true, "rationale": "By the Exterior Angle Theorem, the exterior angle equals the sum of the two remote interior angles. So, $125^ = 80^ + x$. Therefore, $x = 125^ - 80^ = 45^$."}, {"text": "$100^$", "isCorrect": false, "rationale": "If the other remote interior angle was $100^$, their sum would be $80^ + 100^ = 180^$, which is too large for the given exterior angle."}, {"text": "$180^$", "isCorrect": false, "rationale": "The sum of the two remote interior angles is equal to the exterior angle, not $180^$."}]}, {"question": "If an interior angle of a triangle measures $55^$, what is the measure of its adjacent exterior angle?", "options": [{"text": "$35^$", "isCorrect": false, "rationale": "This would be $90^ - 55^$, which is not the relationship between an interior and its adjacent exterior angle."}, {"text": "$55^$", "isCorrect": false, "rationale": "The exterior angle is not the same measure as its adjacent interior angle unless both are $90^$ (which is not applicable here as $55^ \neq 90^$)."}, {"text": "$125^$", "isCorrect": true, "rationale": "An exterior angle and its adjacent interior angle form a linear pair, meaning their sum is $180^$. So, $180^ - 55^ = 125^$."}, {"text": "Cannot be determined", "isCorrect": false, "rationale": "The relationship between an interior angle and its adjacent exterior angle is a known property (they form a linear pair), so it can be determined."}]}, {"question": "A student is asked to identify the type of triangle given an exterior angle of $100^$ and one of its remote interior angles as $30^$. What classification *best* describes this triangle?", "options": [{"text": "Acute triangle", "isCorrect": false, "rationale": "The interior angles are $30^$, $70^$ (calculated as $100^ - 30^$), and $80^$ (calculated as $180^ - 100^$). Since all angles are less than $90^$, it is an acute triangle, but 'scalene' is a more specific classification by sides."}, {"text": "Right triangle", "isCorrect": false, "rationale": "A right triangle has a $90^$ angle. The interior angles are $30^$, $70^$, and $80^$, none of which are $90^$."}, {"text": "Obtuse triangle", "isCorrect": false, "rationale": "An obtuse triangle has one angle greater than $90^$. The interior angles are $30^$, $70^$, and $80^$, none of which are greater than $90^$."}, {"text": "Scalene triangle", "isCorrect": true, "rationale": "First, find the interior angles: One remote interior angle is $30^$. The other remote interior angle is $100^ - 30^ = 70^$. The adjacent interior angle to the exterior angle is $180^ - 100^ = 80^$. So, the three interior angles are $30^, 70^,$ and $80^$. Since all three angles are different, all three sides must also be different, making it a scalene triangle. It is also an acute triangle, but 'scalene' describes its sides given the distinct angles."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
