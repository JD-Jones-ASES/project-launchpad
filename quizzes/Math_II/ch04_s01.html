<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the algebraic expression $9y^3 - 4y + 11$, what are the coefficients?", "options": [{"text": "$9, 4, 11$", "isCorrect": false, "rationale": "This option incorrectly omits the negative sign associated with the coefficient of $y$. Coefficients include their signs."}, {"text": "$9, -4, 11$", "isCorrect": true, "rationale": "The coefficients are the numerical parts of the terms. In $9y^3$, the coefficient is $9$. In $-4y$, the coefficient is $-4$. The constant term $11$ is also considered a coefficient."}, {"text": "$y^3, y$", "isCorrect": false, "rationale": "This option identifies the variable parts of the terms, not their coefficients."}, {"text": "$9y^3, -4y, 11$", "isCorrect": false, "rationale": "This option identifies the complete terms, not just their numerical coefficients."}], "id": "q01"}, {"question": "Which of the following pairs represents like terms?", "options": [{"text": "$7x$ and $7x^2$", "isCorrect": false, "rationale": "These are not like terms because their variable parts have different exponents ($x^1$ versus $x^2$). The text explicitly states this difference."}, {"text": "$5ab$ and $5a$", "isCorrect": false, "rationale": "These are not like terms because their variable parts are different ($ab$ versus $a$). One contains a 'b' variable that the other does not."}, {"text": "$-2y^3$ and $8y^3$", "isCorrect": true, "rationale": "Like terms must have exactly the same variable parts (same variables raised to the same powers). Both terms have $y^3$ as their variable part, making them like terms."}, {"text": "$6m^2n$ and $6mn^2$", "isCorrect": false, "rationale": "These are not like terms because the exponents on the variables are different ($m^2$ versus $m$ and $n$ versus $n^2$)."}], "id": "q02"}, {"question": "According to the definition of like terms, why are $4xy$ and $4x$ considered *not* to be like terms?", "options": [{"text": "Their coefficients are the same.", "isCorrect": false, "rationale": "Having the same coefficient does not determine if terms are like or unlike. It is the variable part that matters."}, {"text": "One term has a variable $y$ and the other does not.", "isCorrect": true, "rationale": "The text explicitly states, 'Similarly, $4xy$ and $4x$ are not like terms because one has variable $y$ and the other does not.' Like terms must have identical variable parts."}, {"text": "Their exponents on $x$ are different.", "isCorrect": false, "rationale": "The exponents on $x$ are actually the same (both are $x^1$). The difference lies in the presence of the $y$ variable in one term."}, {"text": "One term has two variables while the other has only one.", "isCorrect": false, "rationale": "While true, the most precise reason given in the text for these specific terms is the presence of the variable $y$ in one and its absence in the other, making their variable parts different."}], "id": "q03"}, {"question": "Simplify the expression $5y - 3 + 2y + 8$.", "options": [{"text": "$7y - 5$", "isCorrect": false, "rationale": "This option incorrectly calculates the sum of the constant terms, treating $(-3 + 8)$ as $-5$ instead of $5$."}, {"text": "$7y + 5$", "isCorrect": true, "rationale": "To simplify, group like terms: $(5y + 2y) + (-3 + 8)$. Combining the $y$ terms gives $7y$, and combining the constants gives $5$. The simplified expression is $7y + 5$."}, {"text": "$3y + 5$", "isCorrect": false, "rationale": "This option incorrectly subtracts the $y$ terms ($5y - 2y$) instead of adding them."}, {"text": "$7y + 11$", "isCorrect": false, "rationale": "This option incorrectly calculates the sum of the constant terms, treating $(-3 + 8)$ as $11$ instead of $5$."}], "id": "q04"}, {"question": "Simplify the expression $6p + 9q - 2p - 3q + 1$.", "options": [{"text": "$4p + 6q + 1$", "isCorrect": true, "rationale": "Group like terms: $(6p - 2p) + (9q - 3q) + 1$. Combining $p$ terms yields $4p$. Combining $q$ terms yields $6q$. The constant is $1$. So, the simplified expression is $4p + 6q + 1$."}, {"text": "$8p + 12q + 1$", "isCorrect": false, "rationale": "This option incorrectly adds the $p$ terms ($6p + 2p$) and the $q$ terms ($9q + 3q$). When simplifying, pay attention to the signs."}, {"text": "$4p + 12q + 1$", "isCorrect": false, "rationale": "This option correctly combines the $p$ terms but incorrectly adds the $q$ terms ($9q + 3q$) instead of subtracting."}, {"text": "$8p + 6q + 1$", "isCorrect": false, "rationale": "This option incorrectly adds the $p$ terms ($6p + 2p$) but correctly combines the $q$ terms."}], "id": "q05"}, {"question": "Simplify the expression $7m^2 + 2m - 3m^2 + 5m - 10$.", "options": [{"text": "$4m^2 + 7m - 10$", "isCorrect": true, "rationale": "Group like terms: $(7m^2 - 3m^2) + (2m + 5m) - 10$. Combining $m^2$ terms gives $4m^2$. Combining $m$ terms gives $7m$. The constant is $-10$. So, the simplified expression is $4m^2 + 7m - 10$."}, {"text": "$10m^2 + 7m - 10$", "isCorrect": false, "rationale": "This option incorrectly adds the $m^2$ terms ($7m^2 + 3m^2$) instead of subtracting them."}, {"text": "$4m^2 + 3m - 10$", "isCorrect": false, "rationale": "This option correctly combines the $m^2$ terms but incorrectly subtracts the $m$ terms ($5m - 2m$) instead of adding them."}, {"text": "$10m^2 + 3m - 10$", "isCorrect": false, "rationale": "This option incorrectly adds the $m^2$ terms and incorrectly subtracts the $m$ terms."}], "id": "q06"}, {"question": "Simplify the expression $\\frac{1}{4}x + \\frac{1}{2}x - 5$.", "options": [{"text": "$\\frac{2}{3}x - 5$", "isCorrect": false, "rationale": "This option incorrectly adds the fractional coefficients. To add fractions, a common denominator is needed."}, {"text": "$\\frac{3}{4}x - 5$", "isCorrect": true, "rationale": "To combine the $x$ terms, find a common denominator for the coefficients: $\\frac{1}{4}x + \\frac{2}{4}x = \\frac{3}{4}x$. The constant term $-5$ remains unchanged. The simplified expression is $\\frac{3}{4}x - 5$."}, {"text": "$\\frac{1}{6}x - 5$", "isCorrect": false, "rationale": "This option incorrectly multiplies the denominators or finds an incorrect common denominator for adding fractions."}, {"text": "$\\frac{3}{4}x + 5$", "isCorrect": false, "rationale": "This option correctly combines the $x$ terms but incorrectly changes the sign of the constant term from $-5$ to $+5$."}], "id": "q07"}, {"question": "A student attempts to simplify the expression $5xy + 3x - 2xy + 7$. Which step, if any, demonstrates a misunderstanding of combining like terms?", "options": [{"text": "Grouping terms: $(5xy - 2xy) + 3x + 7$", "isCorrect": false, "rationale": "This is a correct initial step in simplifying the expression by identifying and grouping like terms together."}, {"text": "Combining $xy$ terms: $3xy + 3x + 7$", "isCorrect": false, "rationale": "This is a correct step where the like terms $5xy$ and $-2xy$ are accurately combined to $3xy$."}, {"text": "Combining $x$ terms with $xy$ terms: $6xy + 7$", "isCorrect": true, "rationale": "The terms $3xy$ and $3x$ are not like terms because their variable parts ($xy$ versus $x$) are different. They cannot be combined by adding their coefficients."}, {"text": "The expression is already simplified as $3xy + 3x + 7$.", "isCorrect": false, "rationale": "While this is the correct simplified form, the question asks to identify an incorrect *step* in the process, not the final result. The error described in option C is a misunderstanding."}], "id": "q08"}, {"question": "Why is it that only like terms can be combined in an algebraic expression?", "options": [{"text": "Combining unlike terms would change the value of the variables involved.", "isCorrect": false, "rationale": "Combining terms does not change the inherent value of the variables themselves, but rather how quantities are grouped or represented."}, {"text": "The operation of addition or subtraction is defined only for terms with identical variable parts.", "isCorrect": false, "rationale": "While true, this is more of a restatement of the rule. The deeper reason lies in what these terms represent."}, {"text": "Coefficients can only be added or subtracted when their associated variables have the same exponent.", "isCorrect": false, "rationale": "This is a partial reason but doesn't fully capture why different variables (like $x$ and $y$) cannot be combined even if their exponents are the same."}, {"text": "Terms with different variable parts represent fundamentally different quantities and cannot be merged into a single type.", "isCorrect": true, "rationale": "Like terms represent quantities of the same 'type' or 'unit'. For example, you can combine 3 apples and 2 apples to get 5 apples, but you cannot combine 3 apples and 2 bananas into a single 'apple-banana' type. Similarly, $3x$ and $2x^2$ are distinct types of quantities and cannot be combined into a single term while preserving their meaning."}], "id": "q09"}, {"question": "Simplify the expression $8st - 5s + 2s - 3st + 9$.", "options": [{"text": "$5st - 3s + 9$", "isCorrect": true, "rationale": "Group like terms: $(8st - 3st) + (-5s + 2s) + 9$. Combining the $st$ terms gives $5st$. Combining the $s$ terms gives $-3s$. The constant term is $9$. The simplified expression is $5st - 3s + 9$."}, {"text": "$11st - 7s + 9$", "isCorrect": false, "rationale": "This option incorrectly adds $st$ terms ($8st + 3st$) and incorrectly subtracts $s$ terms ($ -5s - 2s$). Remember to pay attention to the signs for each term."}, {"text": "$5st - 7s + 9$", "isCorrect": false, "rationale": "This option correctly combines the $st$ terms but incorrectly subtracts the $s$ terms ($ -5s - 2s$) instead of performing $(-5s + 2s)$. "}, {"text": "$11st - 3s + 9$", "isCorrect": false, "rationale": "This option incorrectly adds $st$ terms ($8st + 3st$) but correctly combines the $s$ terms."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
