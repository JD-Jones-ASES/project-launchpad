<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 3, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of dimensional analysis?", "options": [{"text": "To perform calculations using only metric units.", "isCorrect": false, "rationale": "Dimensional analysis can be applied to any unit system, including customary units and conversions between different systems, not just metric."}, {"text": "To convert between different units by cancelling unwanted units.", "isCorrect": true, "rationale": "The text defines dimensional analysis as a strategy where you 'multiply by conversion factors written as fractions so that unwanted units cancel and the desired units remain'."}, {"text": "To simplify complex mathematical equations.", "isCorrect": false, "rationale": "While it is a problem-solving strategy, its specific primary purpose is unit conversion, not general mathematical equation simplification."}, {"text": "To determine the density of a substance.", "isCorrect": false, "rationale": "Density can be used as a conversion factor within dimensional analysis, but the method itself is not for determining density; rather, it uses density for mass-volume conversions."}], "id": "q01"}, {"question": "Which of the following expressions correctly represents a conversion factor for changing 5 miles to kilometers?", "options": [{"text": "1 mi / 1.609 km", "isCorrect": false, "rationale": "This conversion factor would be used to convert kilometers to miles, as 'km' is in the denominator to cancel 'km' from a given quantity."}, {"text": "1.609 km / 1 mi", "isCorrect": true, "rationale": "To convert miles to kilometers, the 'mi' unit from the given quantity needs to be cancelled. Placing '1 mi' in the denominator ensures 'mi' cancels, leaving 'km' in the numerator."}, {"text": "1 mi * 1.609 km", "isCorrect": false, "rationale": "Conversion factors in dimensional analysis are always written as fractions that equal 1, not as products."}, {"text": "1.609 km + 1 mi", "isCorrect": false, "rationale": "Conversion factors are expressed as a ratio (fraction) of equivalent quantities, not as a sum."}], "id": "q02"}, {"question": "A recipe calls for 4.5 liters of liquid. How many quarts is this equivalent to, using the provided conversion factor (1 L = 1.057 qt)?", "options": [{"text": "4.7565 qt", "isCorrect": true, "rationale": "To convert 4.5 L to quarts, you multiply by the conversion factor (1.057 qt / 1 L): 4.5 L * (1.057 qt / 1 L) = 4.7565 qt."}, {"text": "4.2575 qt", "isCorrect": false, "rationale": "This result would be obtained by incorrectly dividing 4.5 by 1.057."}, {"text": "0.2349 qt", "isCorrect": false, "rationale": "This results from using the inverted conversion factor and dividing by the given quantity, leading to an incorrect calculation."}, {"text": "4.5 qt", "isCorrect": false, "rationale": "This implies no conversion has taken place, which is incorrect as liters and quarts are different units."}], "id": "q03"}, {"question": "A track is 100 yards long. Given that 1 yard = 3 feet and 1 foot = 12 inches, how long is the track in centimeters? (Use 1 in = 2.54 cm)", "options": [{"text": "9144 cm", "isCorrect": true, "rationale": "The calculation involves chaining conversions: 100 yd * (3 ft / 1 yd) * (12 in / 1 ft) * (2.54 cm / 1 in) = 100 * 3 * 12 * 2.54 cm = 9144 cm."}, {"text": "304.8 cm", "isCorrect": false, "rationale": "This would be the length of 10 feet in centimeters, not 100 yards."}, {"text": "25400 cm", "isCorrect": false, "rationale": "This would be the length of 100 inches converted to centimeters, multiplied by 100 (100 in * 2.54 cm/in = 254 cm, not 25400)."}, {"text": "91.44 cm", "isCorrect": false, "rationale": "This is the length of 1 yard in centimeters, not 100 yards."}], "id": "q04"}, {"question": "A car is traveling at a speed of 60 miles per hour. Convert this speed to kilometers per hour (km/h). (Use 1 mi = 1.609 km)", "options": [{"text": "96.54 km/h", "isCorrect": true, "rationale": "To convert miles to kilometers, multiply 60 mi/h by the conversion factor (1.609 km / 1 mi): 60 * 1.609 km/h = 96.54 km/h. The 'mi' unit cancels, leaving 'km/h'."}, {"text": "37.29 km/h", "isCorrect": false, "rationale": "This would be the result of dividing 60 by 1.609, which is incorrect for converting miles to kilometers."}, {"text": "60 km/h", "isCorrect": false, "rationale": "This implies no conversion occurred, which is incorrect as miles and kilometers are different units of distance."}, {"text": "1.609 km/h", "isCorrect": false, "rationale": "This value is simply the conversion factor itself, not the converted speed."}], "id": "q05"}, {"question": "If the density of a certain oil is 0.88 g/mL, what is the mass of 300 mL of this oil?", "options": [{"text": "264 g", "isCorrect": true, "rationale": "Using density as a conversion factor, multiply the volume by the density: 300 mL * (0.88 g / 1 mL) = 264 g. The 'mL' unit cancels, leaving 'g'."}, {"text": "340.9 g", "isCorrect": false, "rationale": "This would be the result of incorrectly dividing the volume by the density (300 / 0.88 g/mL)."}, {"text": "0.0029 g", "isCorrect": false, "rationale": "This extremely small value suggests multiple incorrect operations, likely involving inversion and division."}, {"text": "300 g", "isCorrect": false, "rationale": "This implies that the mass is numerically equal to the volume, disregarding the density of the oil."}], "id": "q06"}, {"question": "Using the density of olive oil (0.92 g/mL), what volume of olive oil would have a mass of 184 grams?", "options": [{"text": "169.28 mL", "isCorrect": false, "rationale": "This result would be obtained by multiplying mass by density (184 g * 0.92 g/mL), which would result in g²/mL, an incorrect unit for volume."}, {"text": "200 mL", "isCorrect": true, "rationale": "To find volume from mass, the density conversion factor needs to be inverted so that grams cancel and milliliters remain: 184 g * (1 mL / 0.92 g) = 200 mL."}, {"text": "0.005 mL", "isCorrect": false, "rationale": "This very small value indicates an incorrect calculation, likely an inverse of the correct operation."}, {"text": "184 mL", "isCorrect": false, "rationale": "This implies the volume is numerically equal to the mass, ignoring the density of the olive oil."}], "id": "q07"}, {"question": "To convert 5 kilometers to inches, which sequence of conversion factors would be correct based on the provided key conversions and standard metric relationships?", "options": [{"text": "km -> mi -> in", "isCorrect": false, "rationale": "While technically possible, this path requires converting miles to feet and feet to inches, which are common customary conversions but not explicitly listed as 'Key Cross-System Conversions' like cm to in."}, {"text": "km -> cm -> in", "isCorrect": false, "rationale": "This path skips the intermediate conversion from kilometers to meters, which is a standard step in metric unit conversions before reaching centimeters."}, {"text": "km -> m -> cm -> in", "isCorrect": true, "rationale": "This is the most complete and correct chain: kilometers to meters (1 km = 1000 m), meters to centimeters (1 m = 100 cm), and then centimeters to inches (using the provided 1 in = 2.54 cm conversion factor)."}, {"text": "km -> m -> in", "isCorrect": false, "rationale": "This path is missing the crucial conversion from meters to centimeters before the final conversion to inches, as the provided cross-system factor links cm to in, not m to in directly."}], "id": "q08"}, {"question": "In dimensional analysis, why is a conversion factor written as a fraction, such as '1000 m / 1 km'?", "options": [{"text": "Because it represents a ratio that simplifies unit cancellation by ensuring the fraction equals 1.", "isCorrect": true, "rationale": "When the numerator and denominator of a fraction are equivalent quantities (e.g., 1000 m and 1 km), the fraction's value is 1. Multiplying by 1 changes the units without changing the actual value of the quantity, and the fractional form facilitates unit cancellation."}, {"text": "To make the calculation easier by always placing larger units in the numerator.", "isCorrect": false, "rationale": "The placement of units (numerator or denominator) is determined by which unit needs to be cancelled, not by the size of the unit."}, {"text": "To avoid decimals in the final answer.", "isCorrect": false, "rationale": "The presence of decimals in the final answer depends on the numerical values of the conversion factors and the initial quantity, not on the fractional format of the factor itself."}, {"text": "Because all conversion factors are inherently fractions.", "isCorrect": false, "rationale": "Conversion factors are ratios of equivalent quantities, which are expressed as fractions for the purpose of dimensional analysis, but their essence is the equivalence, not necessarily being a fraction in all contexts."}], "id": "q09"}, {"question": "A student is trying to convert 10 kilograms to pounds. They set up the calculation as: '10 kg * (1 kg / 2.205 lb)'. Based on the principles of dimensional analysis, what is wrong with this setup?", "options": [{"text": "The numerical values in the conversion factor are incorrect.", "isCorrect": false, "rationale": "The numerical relationship (1 kg = 2.205 lb) is correctly stated in the problem and in the provided key conversions."}, {"text": "The unit 'kg' will not cancel, resulting in an incorrect final unit.", "isCorrect": true, "rationale": "For 'kg' to cancel from the initial quantity (10 kg), 'kg' must be in the denominator of the conversion factor. In the student's setup, 'kg' is in the numerator of both, leading to an answer with units of kg²/lb instead of just lb."}, {"text": "The student should have used addition instead of multiplication.", "isCorrect": false, "rationale": "Dimensional analysis explicitly involves multiplying by conversion factors, not adding them."}, {"text": "The problem requires a multi-step conversion, not a single step.", "isCorrect": false, "rationale": "A direct conversion factor between kilograms and pounds is provided, making this a single-step conversion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
