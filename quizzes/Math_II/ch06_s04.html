    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the textbook, which characteristic uniquely defines a pyramid among \"pointed\" solids?", "options": [{"text": "It has a circular base.", "isCorrect": false, "rationale": "A circular base is characteristic of a cone, not a pyramid. Pyramids have polygonal bases."}, {"text": "Its lateral faces are always quadrilaterals.", "isCorrect": false, "rationale": "The text states that a pyramid has triangular lateral faces, not necessarily quadrilaterals. The shape of the base determines the number of triangular faces."}, {"text": "It has one polygonal base and triangular lateral faces that meet at a common vertex.", "isCorrect": true, "rationale": "This is the precise definition of a pyramid provided in the 'keyterm' section of the text, distinguishing it by its polygonal base and triangular lateral faces meeting at an apex."}, {"text": "Its volume is exactly one-third the volume of a corresponding prism.", "isCorrect": false, "rationale": "While this is a true statement about the volume of a pyramid, it describes a relationship to another shape rather than defining its structural characteristics as a solid."}], "id": "q01"}, {"question": "The textbook states that the volume of a pyramid is 'one-third the volume of the corresponding prism.' What does 'corresponding prism' specifically imply in this context?", "options": [{"text": "A prism with the same material composition as the pyramid.", "isCorrect": false, "rationale": "The material composition is irrelevant to the geometric volume relationship between a pyramid and a prism."}, {"text": "A prism with the same total surface area as the pyramid.", "isCorrect": false, "rationale": "The text does not mention surface area as a condition for the 'corresponding' relationship. The relationship is based on fundamental dimensions."}, {"text": "A prism with the same base area and height as the pyramid.", "isCorrect": true, "rationale": "The text explicitly describes the '1/3 Factor' by imagining filling a pyramid and pouring it into a prism that 'has the same base and height.' This establishes the criteria for a 'corresponding prism.'"}, {"text": "A prism that can be physically placed inside the pyramid.", "isCorrect": false, "rationale": "The 'corresponding' relationship is a mathematical comparison of volumes based on shared dimensions, not a physical nesting capability."}], "id": "q02"}, {"question": "A square pyramid has a base with a side length of 7 cm and a height of 15 cm. What is its volume?", "options": [{"text": "735 cm^3", "isCorrect": false, "rationale": "This calculation (7 * 7 * 15) represents the volume of a prism with the same base and height, incorrectly omitting the 1/3 factor for a pyramid."}, {"text": "245 cm^3", "isCorrect": true, "rationale": "First, calculate the base area (B): 7 cm * 7 cm = 49 cm^2. Then apply the pyramid volume formula V = (1/3)Bh = (1/3) * 49 cm^2 * 15 cm = 49 * 5 = 245 cm^3."}, {"text": "175 cm^3", "isCorrect": false, "rationale": "This calculation (1/3 * 7 * 15) incorrectly uses the side length directly instead of the base area (side length squared)."}, {"text": "105 cm^3", "isCorrect": false, "rationale": "This calculation (1/3 * 7 * 7 * (15/3)) or similar indicates a misapplication of the formula or a calculation error."}], "id": "q03"}, {"question": "A rectangular pyramid has a base measuring 8 inches by 5 inches and a height of 12 inches. Calculate its volume.", "options": [{"text": "480 in.^3", "isCorrect": false, "rationale": "This calculation (8 * 5 * 12) would be the volume of a rectangular prism, not a pyramid. It misses the 1/3 factor."}, {"text": "160 in.^3", "isCorrect": true, "rationale": "First, calculate the base area (B): 8 inches * 5 inches = 40 in.^2. Then apply the pyramid volume formula V = (1/3)Bh = (1/3) * 40 in.^2 * 12 in. = 40 * 4 = 160 in.^3."}, {"text": "240 in.^3", "isCorrect": false, "rationale": "This calculation (1/2 * 8 * 5 * 12) incorrectly uses a 1/2 factor, which is not applicable to pyramid volume."}, {"text": "80 in.^3", "isCorrect": false, "rationale": "This calculation (1/3 * 40 * 6) would result from using half the height or another calculation error."}], "id": "q04"}, {"question": "Which statement best describes a cone as defined in the provided text?", "options": [{"text": "A solid with a polygonal base and a curved lateral surface.", "isCorrect": false, "rationale": "A polygonal base is a characteristic of a pyramid. A cone has a circular base."}, {"text": "A solid with one circular base and a curved lateral surface that tapers to a point (the apex).", "isCorrect": true, "rationale": "This is the exact definition of a cone provided in the 'keyterm' section of the text, highlighting its circular base and curved lateral surface tapering to an apex."}, {"text": "A solid whose volume is proportional to its radius squared and height, multiplied by pi.", "isCorrect": false, "rationale": "While true, this describes the volume formula for a cone, not its geometric definition as a physical solid."}, {"text": "A solid with a single circular face and multiple triangular faces.", "isCorrect": false, "rationale": "Cones do not have triangular faces; they have a single curved lateral surface."}], "id": "q05"}, {"question": "Find the exact volume of a cone with a radius of 6 meters and a height of 10 meters. Give your answer in terms of π.", "options": [{"text": "120π m^3", "isCorrect": true, "rationale": "Apply the cone volume formula V = (1/3)πr^2h. V = (1/3) * π * (6 m)^2 * 10 m = (1/3) * π * 36 m^2 * 10 m = 12π * 10 m^3 = 120π m^3."}, {"text": "360π m^3", "isCorrect": false, "rationale": "This calculation (π * 6^2 * 10) represents the volume of a cylinder, incorrectly omitting the 1/3 factor for a cone."}, {"text": "60π m^3", "isCorrect": false, "rationale": "This calculation (1/3 * π * 6 * 10) incorrectly uses the radius directly instead of the radius squared (r^2)."}, {"text": "300π m^3", "isCorrect": false, "rationale": "This calculation (1/3 * π * 10^2 * 9) likely results from swapping the radius and height values or other formula misapplication."}], "id": "q06"}, {"question": "An oil funnel is shaped like a cone. It has a diameter of 8 cm and a height of 9 cm. Using π ≈ 3.14, what is the approximate volume of the funnel?", "options": [{"text": "150.72 cm^3", "isCorrect": true, "rationale": "First, determine the radius from the diameter: r = 8 cm / 2 = 4 cm. Then apply the cone volume formula V = (1/3)πr^2h. V = (1/3) * 3.14 * (4 cm)^2 * 9 cm = (1/3) * 3.14 * 16 cm^2 * 9 cm = 3.14 * 16 * 3 cm^3 = 3.14 * 48 cm^3 = 150.72 cm^3."}, {"text": "602.88 cm^3", "isCorrect": false, "rationale": "This calculation (1/3 * 3.14 * 8^2 * 9) incorrectly uses the diameter (8 cm) as the radius instead of halving it."}, {"text": "75.36 cm^3", "isCorrect": false, "rationale": "This calculation involves an incorrect height or another significant calculation error (e.g., using half the height of 9 cm)."}, {"text": "452.16 cm^3", "isCorrect": false, "rationale": "This calculation (3.14 * 4^2 * 9) represents the volume of a cylinder, incorrectly omitting the 1/3 factor for a cone."}], "id": "q07"}, {"question": "A triangular pyramid has a base that is a triangle with a base length of 12 cm and a height of 5 cm. The pyramid's height is 10 cm. What is the volume of the pyramid?", "options": [{"text": "60 cm^3", "isCorrect": false, "rationale": "This calculation (1/3 * 12 * 5 * 10) fails to correctly calculate the area of the triangular base (B = 1/2 * base_triangle * height_triangle)."}, {"text": "100 cm^3", "isCorrect": true, "rationale": "First, calculate the base area (B) of the triangular base: B = (1/2) * 12 cm * 5 cm = 30 cm^2. Then apply the pyramid volume formula V = (1/3)Bh = (1/3) * 30 cm^2 * 10 cm = 10 * 10 = 100 cm^3."}, {"text": "200 cm^3", "isCorrect": false, "rationale": "This calculation (1/2 * 12 * 5 * 10) correctly finds the triangular base area but incorrectly uses it in a volume formula that omits the 1/3 factor for a pyramid."}, {"text": "300 cm^3", "isCorrect": false, "rationale": "This calculation (12 * 5 * 10) incorrectly treats the figure as a prism with a rectangular base of 12x5 or makes multiple errors by omitting both the 1/2 for the triangular base and the 1/3 for the pyramid volume."}], "id": "q08"}, {"question": "If a prism and a pyramid both have the same base area and the same height, and the prism's volume is 'X', what is the pyramid's volume?", "options": [{"text": "X", "isCorrect": false, "rationale": "A pyramid's volume is not equal to a prism's volume, even with the same base and height; the pyramid's volume is significantly less."}, {"text": "2X", "isCorrect": false, "rationale": "This is incorrect; the pyramid's volume is a fraction of the prism's volume, not a multiple."}, {"text": "X/3", "isCorrect": true, "rationale": "The text explicitly states, 'It takes exactly three pyramid-loads to fill the prism. This means the volume of a pyramid is one-third the volume of the corresponding prism.' Therefore, if the prism's volume is X, the pyramid's volume is X/3."}, {"text": "3X", "isCorrect": false, "rationale": "This is the inverse of the correct relationship. A prism's volume is three times a pyramid's volume, not the other way around."}], "id": "q09"}, {"question": "A student calculates the volume of a cone with radius 'r' and height 'h' as V = πr^2h. What common error has the student made?", "options": [{"text": "The student used the formula for a pyramid instead of a cone.", "isCorrect": false, "rationale": "The formula for a pyramid is V = (1/3)Bh, where B is the base area, which is not directly πr^2h."}, {"text": "The student used the formula for a cylinder instead of a cone.", "isCorrect": true, "rationale": "The formula V = πr^2h is the correct formula for the volume of a cylinder. A cone's volume is one-third of a cylinder's volume with the same radius and height, so it should be V = (1/3)πr^2h."}, {"text": "The student used the diameter instead of the radius.", "isCorrect": false, "rationale": "The formula shown (πr^2h) correctly uses 'r' for radius. The error is not in the variable's meaning but in the missing multiplicative factor."}, {"text": "The student forgot to square the radius.", "isCorrect": false, "rationale": "The formula shown (πr^2h) correctly includes 'r^2', indicating the radius was squared."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
