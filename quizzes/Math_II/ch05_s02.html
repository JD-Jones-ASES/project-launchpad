<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary difference when solving an inequality compared to solving an equation?", "options": [{"text": "Inequalities always have infinite solutions, while equations have finite solutions.", "isCorrect": false, "rationale": "While many inequalities do have infinite solutions, this is not the fundamental difference in the *process* of solving them as highlighted in the text. Equations can also have no solutions or infinite solutions."}, {"text": "You must reverse the inequality symbol when multiplying or dividing by a negative number.", "isCorrect": true, "rationale": "The text explicitly states this as the 'one critical difference' and the 'most common mistake' students make."}, {"text": "You always isolate the variable on the left side of the inequality.", "isCorrect": false, "rationale": "While often done for consistency, isolating the variable on the left is a convention, not a mathematical rule, and does not constitute a primary difference in solving methodology."}, {"text": "Addition and subtraction operations behave differently for inequalities.", "isCorrect": false, "rationale": "The text states that adding or subtracting the same number on both sides 'does not change the direction of the inequality symbol,' meaning these operations behave the same as with equations regarding the variable isolation process."}]}, {"question": "If $x + 5 < 12$, what is the correct solution for $x$?", "options": [{"text": "$x > 7$", "isCorrect": false, "rationale": "Subtracting a number from both sides of an inequality does not reverse the inequality sign. The sign was incorrectly flipped."}, {"text": "$x < 7$", "isCorrect": true, "rationale": "To solve $x + 5 < 12$, subtract 5 from both sides: $x + 5 - 5 < 12 - 5$, which simplifies to $x < 7$. Addition and subtraction do not reverse the inequality sign."}, {"text": "$x < 17$", "isCorrect": false, "rationale": "This results from incorrectly adding 5 to 12 instead of subtracting 5."}, {"text": "$x > 17$", "isCorrect": false, "rationale": "This results from both an arithmetic error (adding instead of subtracting) and an incorrect reversal of the inequality sign."}]}, {"question": "Solve the inequality $4y \\ge 24$.", "options": [{"text": "$y \\le 6$", "isCorrect": false, "rationale": "Dividing by a positive number (4) does not reverse the inequality sign. The sign was incorrectly flipped."}, {"text": "$y \\ge 6$", "isCorrect": true, "rationale": "To solve $4y \\ge 24$, divide both sides by 4. Since 4 is a positive number, the inequality sign remains the same: $4y/4 \\ge 24/4$, which simplifies to $y \\ge 6$."}, {"text": "$y \\ge 96$", "isCorrect": false, "rationale": "This results from incorrectly multiplying 24 by 4 instead of dividing."}, {"text": "$y \\le 96$", "isCorrect": false, "rationale": "This results from both an arithmetic error (multiplying instead of dividing) and an incorrect reversal of the inequality sign."}]}, {"question": "Which of the following is the correct solution for $-2p < 10$?", "options": [{"text": "$p < -5$", "isCorrect": false, "rationale": "When dividing both sides of an inequality by a negative number, the inequality sign must be reversed. This option failed to reverse the sign."}, {"text": "$p > -5$", "isCorrect": true, "rationale": "To solve $-2p < 10$, divide both sides by -2. Because you are dividing by a negative number, you must reverse the inequality sign: $-2p/-2 > 10/-2$, which simplifies to $p > -5$."}, {"text": "$p > 5$", "isCorrect": false, "rationale": "This option correctly reversed the sign but made an error in the arithmetic or the sign of the constant term."}, {"text": "$p < 5$", "isCorrect": false, "rationale": "This option failed to reverse the inequality sign and made an error in the arithmetic or the sign of the constant term."}]}, {"question": "Under what specific condition *must* the direction of an inequality symbol be reversed?", "options": [{"text": "When adding a negative number to both sides.", "isCorrect": false, "rationale": "Addition and subtraction operations, regardless of the sign of the number, do not change the direction of the inequality symbol."}, {"text": "When subtracting a negative number from both sides.", "isCorrect": false, "rationale": "Addition and subtraction operations, regardless of the sign of the number, do not change the direction of the inequality symbol."}, {"text": "When multiplying or dividing both sides by any number.", "isCorrect": false, "rationale": "The sign is only reversed when multiplying or dividing by a *negative* number. Multiplying or dividing by a positive number does not change the direction."}, {"text": "When multiplying or dividing both sides by a negative number.", "isCorrect": true, "rationale": "The text explicitly states that 'multiplying or dividing both sides by a negative number reverses the direction of the inequality' and identifies forgetting this as the most common mistake."}]}, {"question": "Solve the two-step inequality $3z - 7 \\le 8$.", "options": [{"text": "$z \\le 1/3$", "isCorrect": false, "rationale": "This option contains arithmetic errors in the solving process."}, {"text": "$z \\le 5$", "isCorrect": true, "rationale": "First, add 7 to both sides: $3z - 7 + 7 \\le 8 + 7 \\implies 3z \\le 15$. Then, divide both sides by 3. Since 3 is positive, the sign does not flip: $3z/3 \\le 15/3 \\implies z \\le 5$."}, {"text": "$z \\le -5$", "isCorrect": false, "rationale": "This option contains an arithmetic error (e.g., $8-7=1$ then $1/3$ or sign error)."}, {"text": "$z \\ge 5$", "isCorrect": false, "rationale": "The inequality sign was incorrectly reversed. No operation in this problem (adding 7, dividing by 3) requires a sign flip."}]}, {"question": "Solve $-5m + 2 > 17$.", "options": [{"text": "$m > -3$", "isCorrect": false, "rationale": "The first step (subtracting 2) is correct. However, when dividing by -5, the inequality sign must be reversed, which was not done here."}, {"text": "$m < -3$", "isCorrect": true, "rationale": "First, subtract 2 from both sides: $-5m + 2 - 2 > 17 - 2 \\implies -5m > 15$. Next, divide both sides by -5. Since you are dividing by a negative number, you must reverse the inequality sign: $-5m/-5 < 15/-5 \\implies m < -3$."}, {"text": "$m < 3$", "isCorrect": false, "rationale": "This option shows a sign reversal but has an error in the arithmetic for the constant term (e.g., $15/5$ instead of $15/-5$). Or perhaps $17-2$ was computed incorrectly."}, {"text": "$m > 3$", "isCorrect": false, "rationale": "This option contains an arithmetic error and failed to reverse the inequality sign correctly."}]}, {"question": "A student solves an inequality and gets $x < 5$. To check their work, they pick $x = 4$ (a value in their proposed solution set) and substitute it into the original inequality. The original inequality *is not* true for $x=4$. What should the student conclude?", "options": [{"text": "Their solution $x<5$ is definitely correct, and they should re-check their arithmetic for the test value.", "isCorrect": false, "rationale": "If a value within the proposed solution set does not satisfy the original inequality, it indicates an error in the solution."}, {"text": "They made an error in solving the inequality.", "isCorrect": true, "rationale": "According to the text, 'pick any value in the shaded region and verify that it makes the original inequality true. If it does not, look for an error in your work.' If $x=4$ is in the proposed solution $x<5$ but doesn't make the original inequality true, then the solution $x<5$ is incorrect."}, {"text": "They should try a value like $x=6$ instead to see if it's also false.", "isCorrect": false, "rationale": "While checking values outside the solution set can also be helpful, the immediate implication of a value *within* the solution set failing the original inequality is that the solution itself is wrong. The text specifies checking values *in* the shaded region."}, {"text": "The original inequality might be unsolvable.", "isCorrect": false, "rationale": "There's no information to suggest the inequality is unsolvable; rather, the checking process indicates a mistake in the solving steps."}]}, {"question": "A car rental company charges a flat fee of $30 plus $0.15 per mile driven. If a customer wants to spend at most $60, how many miles ($m$) can they drive?", "options": [{"text": "$m \\ge 200$", "isCorrect": false, "rationale": "This option incorrectly uses the 'greater than or equal to' symbol. The customer wants to spend 'at most' $60, meaning less than or equal to."}, {"text": "$m \\le 200$", "isCorrect": true, "rationale": "The inequality is $30 + 0.15m \\le 60$. First, subtract 30 from both sides: $0.15m \\le 30$. Then, divide by 0.15 (a positive number, so no sign flip): $m \\le 30 / 0.15 \\implies m \\le 200$. Therefore, the customer can drive at most 200 miles."}, {"text": "$m \\le 300$", "isCorrect": false, "rationale": "This option contains an arithmetic error in the final division ($30 / 0.15$ is not 300)."}, {"text": "$m \\ge 300$", "isCorrect": false, "rationale": "This option contains both an arithmetic error and an incorrect inequality direction."}]}, {"question": "A student solved $-3x + 1 > 10$ as follows:\n1.  $-3x > 9$ (Subtracted 1 from both sides)\n2.  $x > -3$ (Divided by -3)\nWhich error did the student make?", "options": [{"text": "They should have added 1 to both sides in step 1.", "isCorrect": false, "rationale": "Subtracting 1 from both sides to isolate the term with $x$ is the correct inverse operation for $+1$."}, {"text": "They made an arithmetic error in step 1 ($10-1$ is not 9).", "isCorrect": false, "rationale": "The arithmetic in step 1 is correct: $10 - 1 = 9$."}, {"text": "They failed to reverse the inequality sign when dividing by a negative number in step 2.", "isCorrect": true, "rationale": "In step 2, the student divided both sides by -3. The text explicitly states that 'multiplying or dividing both sides by a negative number reverses the direction of the inequality.' The student incorrectly kept the '>' sign instead of reversing it to '<'."}, {"text": "They should have divided by 3, not -3, in step 2.", "isCorrect": false, "rationale": "The coefficient of $x$ is -3, so dividing by -3 is the correct operation to isolate $x$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
