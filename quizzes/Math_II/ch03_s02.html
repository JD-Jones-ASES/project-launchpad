<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which formula correctly calculates the percent change from an original amount to a new amount?", "options": [{"text": "percent change = (Original - New) / New * 100%", "isCorrect": false, "rationale": "This formula incorrectly uses the new amount as the denominator and subtracts in the wrong order, which would not yield the correct percent change relative to the original."}, {"text": "percent change = (New - Original) / Original * 100%", "isCorrect": true, "rationale": "This is the correct definition for percent change, as stated in the text. It calculates the difference relative to the original amount."}, {"text": "percent change = (New + Original) / Original * 100%", "isCorrect": false, "rationale": "This formula adds the new and original amounts in the numerator, which does not represent a change and is not consistent with the definition provided."}, {"text": "percent change = (Original - New) / Original * 100%", "isCorrect": false, "rationale": "While it uses the original amount as the denominator, the subtraction in the numerator is reversed, which would result in an incorrect sign for increases and decreases."}]}, {"question": "A bicycle costs $350 and its price increases by 8%. What is the new price of the bicycle?", "options": [{"text": "$358.00", "isCorrect": false, "rationale": "This answer incorrectly adds the percentage value (8) directly to the original price, rather than calculating 8% of the price and adding it."}, {"text": "$378.00", "isCorrect": true, "rationale": "To find the new price after an 8% increase, you use the multiplier (1 + 0.08) = 1.08. So, $350 * 1.08 = $378.00. This matches the checkpoint example."}, {"text": "$364.00", "isCorrect": false, "rationale": "This answer incorrectly calculates an increase of 4% ($350 * 1.04 = $364), not 8%."}, {"text": "$342.00", "isCorrect": false, "rationale": "This answer suggests a decrease in price, or an incorrect calculation of an increase."}]}, {"question": "A town's population was 12,000 residents. Over a decade, it experienced a 5% decrease. What is the current population?", "options": [{"text": "11,400 residents", "isCorrect": true, "rationale": "To find the new population after a 5% decrease, you use the multiplier (1 - 0.05) = 0.95. So, 12,000 * 0.95 = 11,400 residents."}, {"text": "11,500 residents", "isCorrect": false, "rationale": "This answer would result from incorrectly subtracting 500 (instead of 5% of 12,000, which is 600) from the original population."}, {"text": "12,600 residents", "isCorrect": false, "rationale": "This answer calculates a 5% increase, not a decrease (12,000 * 1.05 = 12,600)."}, {"text": "10,800 residents", "isCorrect": false, "rationale": "This answer would be the result of a 10% decrease (12,000 * 0.90 = 10,800), not a 5% decrease."}]}, {"question": "In the context of percent change, what is the 'multiplier' factor (1 + r) or (1 - r) primarily used for?", "options": [{"text": "To determine if the change is an increase or a decrease.", "isCorrect": false, "rationale": "While 'r' indicates increase/decrease, the multiplier itself is used to calculate the new amount, not just identify the type of change. The sign of the overall percent change indicates this."}, {"text": "To directly calculate the new amount from the original amount after a percent change.", "isCorrect": true, "rationale": "The text explicitly defines the multiplier as the factor (1 + r) or (1 - r) which, when multiplied by the original amount, directly yields the new amount."}, {"text": "To find the absolute difference between the new and original amounts.", "isCorrect": false, "rationale": "The multiplier calculates the new amount, not just the absolute difference. The difference would be (new amount - original amount)."}, {"text": "To express the percent change as a whole number.", "isCorrect": false, "rationale": "The 'r' in the multiplier is the rate as a decimal, not a whole number. The multiplier itself is typically a decimal, not a whole number representation of the percent change."}]}, {"question": "A product with an original price of $150 is first given a 10% discount, and then an additional 5% discount is applied to the sale price. What is the final price of the product?", "options": [{"text": "$127.50", "isCorrect": false, "rationale": "This would be the result if the discounts were simply added (10% + 5% = 15% off) and applied to the original price ($150 * 0.85 = $127.50), which is a common mistake according to the text."}, {"text": "$128.25", "isCorrect": true, "rationale": "First discount: $150 * (1 - 0.10) = $150 * 0.90 = $135. Then, apply the second discount to the new price: $135 * (1 - 0.05) = $135 * 0.95 = $128.25."}, {"text": "$135.00", "isCorrect": false, "rationale": "This is the price after only the first 10% discount, without applying the additional 5% discount."}, {"text": "$142.50", "isCorrect": false, "rationale": "This would be the price if only a 5% discount was applied ($150 * 0.95 = $142.50), or an incorrect combination of discounts."}]}, {"question": "A company's revenue was $1,000,000 last year. This year, it increased by 20%, but due to unforeseen circumstances, it is projected to decrease by 20% next year from the current year's revenue. What will be the projected revenue after these two changes?", "options": [{"text": "$1,000,000", "isCorrect": false, "rationale": "This is a common misconception that an equal percent increase and decrease will return the amount to its original value. The text's caution box explicitly states this is incorrect."}, {"text": "$960,000", "isCorrect": true, "rationale": "Initial revenue: $1,000,000. After 20% increase: $1,000,000 * 1.20 = $1,200,000. After 20% decrease from the new amount: $1,200,000 * 0.80 = $960,000."}, {"text": "$1,040,000", "isCorrect": false, "rationale": "This answer is incorrect and doesn't reflect the calculation of successive percentage changes."}, {"text": "$800,000", "isCorrect": false, "rationale": "This would be the result of a net 20% decrease from the original, which is incorrect for successive changes."}]}, {"question": "Following the example of the jacket (original price $80, first 20% off, then additional 10% off), what is the overall percent decrease from the original price?", "options": [{"text": "28%", "isCorrect": true, "rationale": "From the example, the final price is $57.60. The overall percent decrease is (Original - Final) / Original * 100% = ($80 - $57.60) / $80 * 100% = $22.40 / $80 * 100% = 28%."}, {"text": "30%", "isCorrect": false, "rationale": "This is the incorrect result of simply adding the successive percent changes (20% + 10% = 30%), which the text explicitly warns against."}, {"text": "20%", "isCorrect": false, "rationale": "This only accounts for the first discount and does not consider the additional 10% off."}, {"text": "18%", "isCorrect": false, "rationale": "This answer is too low and does not reflect the correct calculation of successive discounts."}]}, {"question": "After a 25% increase, the new price of an item is $200. What was the original price of the item?", "options": [{"text": "$150", "isCorrect": false, "rationale": "This would be the result if $50 (25% of $200) was subtracted from $200, but the 25% increase applies to the original price, not the new price."}, {"text": "$160", "isCorrect": true, "rationale": "Let 'original' be the original price. original * (1 + 0.25) = $200. So, original * 1.25 = $200. Dividing both sides by 1.25, original = $200 / 1.25 = $160. This applies the concept of working backward with multipliers, as shown in the 'note' section."}, {"text": "$250", "isCorrect": false, "rationale": "This would be the result of increasing $200 by 25% ($200 * 1.25 = $250), which is incorrect as $200 is already the new price after the increase."}, {"text": "$175", "isCorrect": false, "rationale": "This answer is too high for the original price given a 25% increase resulting in $200."}]}, {"question": "The textbook states that 'a common mistake is to add successive percent changes.' What is the primary reason this approach is incorrect?", "options": [{"text": "Percent changes are only valid for single transactions.", "isCorrect": false, "rationale": "This is incorrect; percent changes can certainly occur in multiple steps, but the method of combining them is critical."}, {"text": "Each successive percent change applies to the original amount, not the modified amount.", "isCorrect": false, "rationale": "This is incorrect. As stated and demonstrated in the text, each subsequent percent change applies to the *new* or *current* amount, not the original amount, which is precisely why they don't simply add."}, {"text": "Each successive percent change applies to a different, newly calculated amount.", "isCorrect": true, "rationale": "The text explains that 'Each discount applies to a different amount' for successive changes. Therefore, the base for the percentage calculation shifts, preventing simple addition."}, {"text": "Percent changes are fundamentally multiplicative, not additive, by definition.", "isCorrect": false, "rationale": "While true that multipliers are used, the core reason they don't add is because the *base* amount for each successive change is different, not just because they are multiplicative. Multiplicative is the correct way to combine them."}]}, {"question": "A student's test score increased from 75 to 90. What is the percent change in the student's score?", "options": [{"text": "15% increase", "isCorrect": false, "rationale": "This is the absolute difference in points (90-75=15), not the percent change."}, {"text": "20% increase", "isCorrect": true, "rationale": "Using the percent change formula: (New - Original) / Original * 100% = (90 - 75) / 75 * 100% = 15 / 75 * 100% = 0.20 * 100% = 20%. Since the new score is greater, it's an increase."}, {"text": "12.5% increase", "isCorrect": false, "rationale": "This calculation is incorrect for the given numbers."}, {"text": "25% increase", "isCorrect": false, "rationale": "This would be the result of (90-75)/60, which is using a different original score."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
