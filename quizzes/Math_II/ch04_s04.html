    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided strategy, what is the *first* step when solving an equation that contains parentheses?", "options": [{"text": "Combine like terms on each side of the equation.", "isCorrect": false, "rationale": "Combining like terms is the second step, performed after distributing to remove parentheses."}, {"text": "Use inverse operations to isolate the variable.", "isCorrect": false, "rationale": "Using inverse operations is the third step, performed after distributing and combining like terms."}, {"text": "Distribute to remove parentheses.", "isCorrect": true, "rationale": "The strategy clearly states that the first step is to 'Distribute to remove parentheses'."}, {"text": "Check the solution in the original equation.", "isCorrect": false, "rationale": "Checking the solution is the final step, performed after the variable has been isolated."}], "id": "q01"}, {"question": "Solve the equation $5(y - 3) = 25$.", "options": [{"text": "$y = 5$", "isCorrect": false, "rationale": "Distributing 5 gives $5y - 15 = 25$. Adding 15 to both sides gives $5y = 40$, so $y = 8$."}, {"text": "$y = 8$", "isCorrect": true, "rationale": "First, distribute the 5: $5y - 15 = 25$. Next, add 15 to both sides: $5y = 40$. Finally, divide by 5: $y = 8$. Checking: $5(8-3) = 5(5) = 25$."}, {"text": "$y = 10$", "isCorrect": false, "rationale": "If $y=10$, then $5(10-3) = 5(7) = 35 \\neq 25$. This indicates an error in solving, likely from incorrect distribution or inverse operations."}, {"text": "$y = 2$", "isCorrect": false, "rationale": "If $y=2$, then $5(2-3) = 5(-1) = -5 \\neq 25$. This indicates an error in solving, likely from incorrect distribution or inverse operations."}], "id": "q02"}, {"question": "Solve the equation $3(2x + 1) - 5x = 12$.", "options": [{"text": "$x = 9$", "isCorrect": true, "rationale": "First, distribute the 3: $6x + 3 - 5x = 12$. Next, combine like terms ($6x - 5x$): $x + 3 = 12$. Finally, subtract 3 from both sides: $x = 9$. Checking: $3(2(9)+1) - 5(9) = 3(19) - 45 = 57 - 45 = 12$."}, {"text": "$x = 3$", "isCorrect": false, "rationale": "If $x=3$, then $3(2(3)+1) - 5(3) = 3(7) - 15 = 21 - 15 = 6 \\neq 12$. An error occurred, possibly in combining like terms or isolating x."}, {"text": "$x = 15$", "isCorrect": false, "rationale": "If $x=15$, then $3(2(15)+1) - 5(15) = 3(31) - 75 = 93 - 75 = 18 \\neq 12$. An error occurred, possibly in combining like terms or isolating x."}, {"text": "$x = -9$", "isCorrect": false, "rationale": "If $x=-9$, then $3(2(-9)+1) - 5(-9) = 3(-17) + 45 = -51 + 45 = -6 \\neq 12$. An error occurred, possibly in combining like terms or isolating x."}], "id": "q03"}, {"question": "Which of the following expressions correctly represents $-4(x - 7)$ after distribution?", "options": [{"text": "$-4x - 7$", "isCorrect": false, "rationale": "This option incorrectly distributes the negative sign only to the first term and fails to change the sign of the second term inside the parentheses."}, {"text": "$4x - 28$", "isCorrect": false, "rationale": "This option incorrectly distributes a positive 4 instead of -4, leading to incorrect signs for both terms."}, {"text": "$-4x + 28$", "isCorrect": true, "rationale": "When distributing a negative number, multiply $-4$ by $x$ to get $-4x$, and multiply $-4$ by $-7$ to get $+28$. As the caution states, 'When distributing a negative, change the sign of every term inside the parentheses'."}, {"text": "$-4x - 28$", "isCorrect": false, "rationale": "This option correctly distributes -4 to x, but incorrectly maintains the negative sign for the 7, failing to change its sign as required when distributing a negative."}], "id": "q04"}, {"question": "The sum of three consecutive integers is $111$. What is the smallest of these integers?", "options": [{"text": "36", "isCorrect": true, "rationale": "Let the integers be $n$, $n+1$, and $n+2$. Their sum is $n + (n+1) + (n+2) = 3n + 3$. Setting this equal to 111 gives $3n + 3 = 111$. Subtracting 3 gives $3n = 108$. Dividing by 3 gives $n = 36$. The integers are 36, 37, 38. Checking: $36+37+38 = 111$."}, {"text": "37", "isCorrect": false, "rationale": "If 37 were the smallest, the sum would be $37+38+39 = 114$, not 111. This answer represents the middle integer if 111 were divisible by 3."}, {"text": "35", "isCorrect": false, "rationale": "If 35 were the smallest, the sum would be $35+36+37 = 108$, not 111. This indicates an error in solving the equation $3n+3=111$."}, {"text": "38", "isCorrect": false, "rationale": "If 38 were the smallest, the sum would be $38+39+40 = 117$, not 111. This answer would be the largest integer if 36 were the smallest."}], "id": "q05"}, {"question": "The width of a rectangle is $w$ cm, and its length is $4$ more than twice the width. If the perimeter of the rectangle is $70$ cm, which equation correctly represents this situation?", "options": [{"text": "$2w + 2(w + 4) = 70$", "isCorrect": false, "rationale": "This equation incorrectly represents the length as 'w + 4' instead of '4 more than twice the width' which is $2w + 4$."}, {"text": "$2w + 2(2w + 4) = 70$", "isCorrect": true, "rationale": "The length is '4 more than twice the width', so length $= 2w + 4$. The perimeter formula is $2(\\text{width}) + 2(\\text{length})$. Substituting gives $2w + 2(2w + 4) = 70$. This correctly sets up the equation for the given problem."}, {"text": "$w + (2w + 4) = 70$", "isCorrect": false, "rationale": "This equation represents only half the perimeter (width + length) instead of the full perimeter, and does not multiply each dimension by 2."}, {"text": "$w(2w + 4) = 70$", "isCorrect": false, "rationale": "This equation represents the area of the rectangle, not its perimeter."}], "id": "q06"}, {"question": "A student is solving the equation $4(x - 2) + 3x = 30$. They write their first step as $4x - 2 + 3x = 30$. What error, if any, did the student make?", "options": [{"text": "The student correctly distributed the 4.", "isCorrect": false, "rationale": "The student did not correctly distribute the 4. They multiplied $4 \\times x$ but did not multiply $4 \\times -2$, which should result in $-8$, not $-2$."}, {"text": "The student did not distribute the 4 to all terms inside the parentheses.", "isCorrect": true, "rationale": "The student correctly multiplied $4 \\times x$ to get $4x$, but failed to multiply $4 \\times -2$. The correct distribution should be $4x - 8 + 3x = 30$."}, {"text": "The student incorrectly combined like terms.", "isCorrect": false, "rationale": "Combining like terms ($4x + 3x$) comes after distribution. The error occurred during the distribution step, not yet at the combining step."}, {"text": "The student should have subtracted $3x$ first.", "isCorrect": false, "rationale": "The first step for equations with parentheses is to distribute. Using inverse operations like subtracting $3x$ is done after distribution and combining like terms, and generally to move terms across the equals sign."}], "id": "q07"}, {"question": "Solve the equation $7(n - 1) + 2n = 47$.", "options": [{"text": "$n = 5$", "isCorrect": false, "rationale": "If $n=5$, then $7(5-1) + 2(5) = 7(4) + 10 = 28 + 10 = 38 \\neq 47$. An error occurred, likely in solving after distribution and combining."}, {"text": "$n = 6$", "isCorrect": true, "rationale": "First, distribute the 7: $7n - 7 + 2n = 47$. Next, combine like terms ($7n + 2n$): $9n - 7 = 47$. Then, add 7 to both sides: $9n = 54$. Finally, divide by 9: $n = 6$. Checking: $7(6-1) + 2(6) = 7(5) + 12 = 35 + 12 = 47$."}, {"text": "$n = 4$", "isCorrect": false, "rationale": "If $n=4$, then $7(4-1) + 2(4) = 7(3) + 8 = 21 + 8 = 29 \\neq 47$. An error occurred, likely in solving after distribution and combining."}, {"text": "$n = 7$", "isCorrect": false, "rationale": "If $n=7$, then $7(7-1) + 2(7) = 7(6) + 14 = 42 + 14 = 56 \\neq 47$. An error occurred, likely in solving after distribution and combining."}], "id": "q08"}, {"question": "A number is increased by 4, and the result is multiplied by 3. If the final product is 63, what is the original number?", "options": [{"text": "17", "isCorrect": true, "rationale": "Let the number be $x$. 'A number is increased by 4' is $x+4$. 'The result is multiplied by 3' is $3(x+4)$. 'The final product is 63' means $3(x+4) = 63$. Distribute: $3x + 12 = 63$. Subtract 12: $3x = 51$. Divide by 3: $x = 17$. Checking: $3(17+4) = 3(21) = 63$."}, {"text": "19", "isCorrect": false, "rationale": "If the number is 19, then $3(19+4) = 3(23) = 69 \\neq 63$. This suggests an error in setting up or solving the equation."}, {"text": "21", "isCorrect": false, "rationale": "If the number is 21, then $3(21+4) = 3(25) = 75 \\neq 63$. This suggests an error in setting up or solving the equation."}, {"text": "15", "isCorrect": false, "rationale": "If the number is 15, then $3(15+4) = 3(19) = 57 \\neq 63$. This suggests an error in setting up or solving the equation."}], "id": "q09"}, {"question": "To check if $x = 4$ is the correct solution for the equation $2(x + 6) = 28$, what is the appropriate next step after substituting $x=4$ into the equation?", "options": [{"text": "Subtract 6 from both sides of the equation.", "isCorrect": false, "rationale": "Subtracting 6 from both sides would be part of solving the equation, not checking a proposed solution."}, {"text": "Distribute the 2 to simplify the left side.", "isCorrect": false, "rationale": "While distribution is a valid step in solving, when checking a solution, the most direct approach is to simplify the expression inside the parentheses first."}, {"text": "Simplify the expression inside the parentheses.", "isCorrect": true, "rationale": "When checking a solution, you substitute the value into the original equation and evaluate both sides. After substituting, the next logical step is to simplify the expression inside the parentheses (e.g., $4+6=10$) before multiplying by 2, to see if the left side equals the right side (28)."}, {"text": "Divide both sides of the equation by 2.", "isCorrect": false, "rationale": "Dividing both sides by 2 would be part of solving the equation, not checking a proposed solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
