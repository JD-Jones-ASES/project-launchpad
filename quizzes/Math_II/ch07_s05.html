<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 7, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The introduction states that the Pythagorean Theorem is widely used. Which of the following professions is *least likely* to use the Pythagorean Theorem in its daily operations, based on the applications discussed in this section?", "options": [{"text": "Carpenter", "isCorrect": false, "rationale": "Carpenters are explicitly mentioned as daily users for tasks like checking square corners or calculating diagonals."}, {"text": "Accountant", "isCorrect": true, "rationale": "Accountants primarily deal with financial records and calculations, which typically do not involve finding distances or verifying right angles using geometric theorems like the Pythagorean Theorem. The text lists builders, carpenters, and navigators as daily users."}, {"text": "Builder", "isCorrect": false, "rationale": "Builders are explicitly mentioned as daily users for tasks like checking square corners or calculating diagonals."}, {"text": "Navigator", "isCorrect": false, "rationale": "Navigators are explicitly mentioned as daily users, likely for calculating distances or positions."}], "id": "q01"}, {"question": "A rectangular window frame has a width of 24 inches and a height of 10 inches. What is the length of the diagonal brace needed to support the frame?", "options": [{"text": "34 inches", "isCorrect": false, "rationale": "This is the sum of the width and height, not the diagonal. The diagonal is the hypotenuse of the right triangle formed by the sides."}, {"text": "26 inches", "isCorrect": true, "rationale": "Using the Pythagorean Theorem, the diagonal (d) is the hypotenuse: d^2 = 24^2 + 10^2 = 576 + 100 = 676. Therefore, d = sqrt(676) = 26 inches. This is a common 5-12-13 Pythagorean triple scaled by 2 (10-24-26)."}, {"text": "14 inches", "isCorrect": false, "rationale": "This is the difference between the width and height, which is not relevant to finding the diagonal."}, {"text": "25 inches", "isCorrect": false, "rationale": "While 25 is part of a common Pythagorean triple (7-24-25), it does not apply to a triangle with legs of 10 and 24."}], "id": "q02"}, {"question": "A 25-foot ladder is leaning against a vertical wall. If the base of the ladder is 7 feet away from the wall, approximately how high up the wall does the ladder reach? Round to the nearest tenth of a foot.", "options": [{"text": "26.0 feet", "isCorrect": false, "rationale": "This would be the result if the ladder were a leg and one of the other lengths was the hypotenuse, which is incorrect. The ladder is the hypotenuse."}, {"text": "24.0 feet", "isCorrect": true, "rationale": "Let h be the height up the wall. Using the Pythagorean Theorem: 7^2 + h^2 = 25^2. So, 49 + h^2 = 625. h^2 = 625 - 49 = 576. h = sqrt(576) = 24 feet. This is an 7-24-25 Pythagorean triple."}, {"text": "18.0 feet", "isCorrect": false, "rationale": "This is the difference between the ladder length and the base distance (25 - 7), which is not the height."}, {"text": "576.0 feet", "isCorrect": false, "rationale": "This is h^2, not h. The square root needs to be taken."}], "id": "q03"}, {"question": "Using the coordinate grid concept, what is the distance between point P(2, 3) and point Q(7, 15)?", "options": [{"text": "12 units", "isCorrect": false, "rationale": "This represents only the vertical leg of the right triangle (15 - 3 = 12), not the total distance."}, {"text": "13 units", "isCorrect": true, "rationale": "The horizontal leg is |7 - 2| = 5 units. The vertical leg is |15 - 3| = 12 units. Using the Pythagorean Theorem, d^2 = 5^2 + 12^2 = 25 + 144 = 169. So, d = sqrt(169) = 13 units. This is a common 5-12-13 Pythagorean triple."}, {"text": "17 units", "isCorrect": false, "rationale": "This is a common Pythagorean triple (8-15-17), but does not fit the legs calculated (5 and 12)."}, {"text": "10 units", "isCorrect": false, "rationale": "This would be the distance between (2,3) and (8,3), or (2,3) and (2,13), not between P and Q."}], "id": "q04"}, {"question": "A carpenter is building a deck and wants to ensure a corner is perfectly square. She marks 6 feet along one edge and 8 feet along the perpendicular edge. What should the diagonal measurement between these two marks be for the corner to be a true right angle?", "options": [{"text": "14 feet", "isCorrect": false, "rationale": "This is the sum of the two leg measurements, not the diagonal."}, {"text": "10 feet", "isCorrect": true, "rationale": "For a true right angle, the diagonal must satisfy the Pythagorean Theorem. d^2 = 6^2 + 8^2 = 36 + 64 = 100. Therefore, d = sqrt(100) = 10 feet. This is a common 6-8-10 Pythagorean triple, which is a multiple of the 3-4-5 rule."}, {"text": "100 feet", "isCorrect": false, "rationale": "This is the square of the hypotenuse (d^2), not the hypotenuse itself."}, {"text": "Slightly less than 10 feet", "isCorrect": false, "rationale": "If the diagonal were slightly less than 10 feet, the corner would be 'too sharp' or acute, not a true right angle."}], "id": "q05"}, {"question": "A right triangle has legs of length 3/4 cm and 1 cm. What is the length of its hypotenuse in decimal form?", "options": [{"text": "0.75 cm", "isCorrect": false, "rationale": "This is the length of one of the legs (3/4 cm), not the hypotenuse."}, {"text": "1.75 cm", "isCorrect": false, "rationale": "This is the sum of the two legs (3/4 + 1 = 1.75), not the hypotenuse."}, {"text": "1.25 cm", "isCorrect": true, "rationale": "Using the Pythagorean Theorem, c^2 = (3/4)^2 + 1^2 = 9/16 + 1 = 9/16 + 16/16 = 25/16. Therefore, c = sqrt(25/16) = 5/4 = 1.25 cm."}, {"text": "1.0 cm", "isCorrect": false, "rationale": "This is the length of the other leg (1 cm), not the hypotenuse."}], "id": "q06"}, {"question": "A rectangular storage unit has a base that measures 6.0 meters by 8.0 meters. What is the length of the diagonal of the base? Round to the nearest tenth.", "options": [{"text": "14.0 meters", "isCorrect": false, "rationale": "This is the sum of the two side lengths, not the diagonal."}, {"text": "10.0 meters", "isCorrect": true, "rationale": "Using the Pythagorean Theorem, d^2 = 6.0^2 + 8.0^2 = 36 + 64 = 100. Therefore, d = sqrt(100) = 10.0 meters. This is a common 6-8-10 Pythagorean triple."}, {"text": "7.0 meters", "isCorrect": false, "rationale": "This value does not result from the Pythagorean theorem with legs of 6 and 8."}, {"text": "100.0 meters", "isCorrect": false, "rationale": "This is the square of the hypotenuse (d^2), not the hypotenuse itself."}], "id": "q07"}, {"question": "Which of the following sets of numbers represents a common Pythagorean triple as listed in the Chapter 7 Summary?", "options": [{"text": "(6, 8, 9)", "isCorrect": false, "rationale": "For this to be a Pythagorean triple, 6^2 + 8^2 should equal 9^2. 36 + 64 = 100, but 9^2 = 81. So, it's not a triple."}, {"text": "(5, 12, 13)", "isCorrect": true, "rationale": "The Chapter 7 Summary explicitly lists (5, 12, 13) as a common Pythagorean triple. (5^2 + 12^2 = 25 + 144 = 169 = 13^2)."}, {"text": "(7, 24, 25)", "isCorrect": false, "rationale": "While (7, 24, 25) is indeed a Pythagorean triple, it is not listed as one of the 'Common Pythagorean triples' in the provided Chapter 7 Summary."}, {"text": "(8, 10, 12)", "isCorrect": false, "rationale": "For this to be a Pythagorean triple, 8^2 + 10^2 should equal 12^2. 64 + 100 = 164, but 12^2 = 144. So, it's not a triple."}], "id": "q08"}, {"question": "A cellular tower is supported by a guy wire anchored to the ground 15 feet from the base of the tower. If the wire is attached to the tower at a height of 8 feet, what is the minimum length of the guy wire needed?", "options": [{"text": "23 feet", "isCorrect": false, "rationale": "This is the sum of the height and the ground distance, not the length of the hypotenuse (guy wire)."}, {"text": "17 feet", "isCorrect": true, "rationale": "The tower, the ground, and the guy wire form a right triangle. The height (8 feet) and the ground distance (15 feet) are the legs, and the guy wire is the hypotenuse. So, d^2 = 8^2 + 15^2 = 64 + 225 = 289. d = sqrt(289) = 17 feet. This is a common 8-15-17 Pythagorean triple."}, {"text": "7 feet", "isCorrect": false, "rationale": "This is the difference between the ground distance and the height, not the length of the guy wire."}, {"text": "18.5 feet", "isCorrect": false, "rationale": "This value does not result from the Pythagorean theorem with legs of 8 and 15."}], "id": "q09"}, {"question": "The note at the end of the section states that the Pythagorean Theorem will appear again in Chapter 8 for the distance formula and connects to radical expressions. What fundamental concept does the Pythagorean Theorem rely on for its broad applicability in these and other contexts?", "options": [{"text": "The principle that all triangles are similar to each other.", "isCorrect": false, "rationale": "While similar triangles are a geometric concept, the Pythagorean Theorem specifically applies to right triangles and defines a relationship between their sides, not a general similarity among all triangles."}, {"text": "The existence of square roots for all positive numbers.", "isCorrect": false, "rationale": "While square roots are used in the calculation, the theorem's applicability stems from the geometric relationship itself, not just the mathematical operation needed to solve it."}, {"text": "The property that the sum of angles in any triangle is 180 degrees.", "isCorrect": false, "rationale": "This is a fundamental property of all triangles, but it does not specifically describe the relationship between side lengths of a *right* triangle that the Pythagorean Theorem provides."}, {"text": "The inherent relationship between the side lengths of a right triangle.", "isCorrect": true, "rationale": "The Pythagorean Theorem fundamentally establishes that in any right triangle, the square of the hypotenuse (the side opposite the right angle) is equal to the sum of the squares of the other two sides (legs). This specific geometric relationship is what makes it applicable for finding unknown distances or verifying right angles in various real-world scenarios."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
