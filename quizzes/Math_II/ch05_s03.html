<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the crucial additional rule when solving multi-step inequalities compared to solving multi-step equations?", "options": [{"text": "You must combine like terms before distributing.", "isCorrect": false, "rationale": "While combining like terms and distributing are common steps in both, the order might vary depending on the inequality, and this is not a unique rule for inequalities over equations."}, {"text": "You must reverse the inequality sign whenever you multiply or divide by a negative number.", "isCorrect": true, "rationale": "This is the specific and critical rule highlighted in the text that differentiates solving inequalities from solving equations, as operations with negative numbers flip the direction of the inequality."}, {"text": "You should always clear fractions by dividing by the least common denominator (LCD).", "isCorrect": false, "rationale": "Fractions are cleared by multiplying, not dividing, by the LCD. Also, this is a technique used in both equations and inequalities, not an 'additional rule' unique to inequalities' core behavior."}, {"text": "The variable must always be isolated on the left side of the inequality.", "isCorrect": false, "rationale": "The variable can be isolated on either side; the direction of the inequality sign is what matters, not the side the variable ends up on."}]}, {"question": "Solve the inequality: $4(x - 5) \\le 12$.", "options": [{"text": "$x \\le 8$", "isCorrect": true, "rationale": "Distribute the 4: $4x - 20 \\le 12$. Add 20 to both sides: $4x \\le 32$. Divide by 4: $x \\le 8$. Since we divided by a positive number, the inequality sign does not reverse."}, {"text": "$x \\ge 8$", "isCorrect": false, "rationale": "This result would occur if the inequality sign was incorrectly reversed or if the original inequality was $\\ge$ instead of $\\le$."}, {"text": "$x \\le -2$", "isCorrect": false, "rationale": "This would result from an error in arithmetic, such as subtracting 20 from 12 instead of adding, or other calculation mistakes."}, {"text": "$x \\ge -2$", "isCorrect": false, "rationale": "This option contains errors in both arithmetic and the direction of the inequality sign."}]}, {"question": "Solve the inequality: $-3(y + 2) > 15$.", "options": [{"text": "$y > -7$", "isCorrect": false, "rationale": "This answer is incorrect because the inequality sign was not reversed when dividing by a negative number."}, {"text": "$y < -7$", "isCorrect": true, "rationale": "First, distribute -3: $-3y - 6 > 15$. Add 6 to both sides: $-3y > 21$. Finally, divide by -3. Since you are dividing by a negative number, you must reverse the inequality sign: $y < -7$."}, {"text": "$y > 3$", "isCorrect": false, "rationale": "This indicates errors in both the arithmetic and the handling of the inequality sign reversal."}, {"text": "$y < 3$", "isCorrect": false, "rationale": "This shows an arithmetic error, specifically in dividing 21 by -3."}]}, {"question": "Solve the inequality: $7m - 3m + 8 \\le 20$.", "options": [{"text": "$m \\le 3$", "isCorrect": true, "rationale": "First, combine like terms: $4m + 8 \\le 20$. Subtract 8 from both sides: $4m \\le 12$. Divide by 4: $m \\le 3$. No sign reversal is needed as we divided by a positive number."}, {"text": "$m \\ge 3$", "isCorrect": false, "rationale": "This implies an incorrect reversal of the inequality sign, which is not warranted as no multiplication or division by a negative number occurred."}, {"text": "$m \\le 7$", "isCorrect": false, "rationale": "This suggests an arithmetic error in solving, such as combining 7m and -3m incorrectly or dividing 12 by the wrong number."}, {"text": "$m \\ge 7$", "isCorrect": false, "rationale": "This answer contains errors in both arithmetic and the direction of the inequality sign."}]}, {"question": "When clearing fractions from an inequality, why does multiplying every term by the least common denominator (LCD) not change the direction of the inequality sign?", "options": [{"text": "Because the LCD is always an even number.", "isCorrect": false, "rationale": "The parity (even or odd) of the LCD is irrelevant to the inequality direction. An LCD can be odd or even."}, {"text": "Because the LCD is always a positive number.", "isCorrect": true, "rationale": "The text states that 'Because the LCD is positive, the inequality direction does not change.' This is the key reason: multiplying by a positive number does not reverse the inequality sign."}, {"text": "Because clearing fractions is only done at the beginning of the solving process.", "isCorrect": false, "rationale": "While often done early, the timing of clearing fractions does not dictate the rule for sign reversal. The crucial factor is the sign of the multiplier."}, {"text": "Because fractions always result in smaller numbers, thus maintaining the inequality.", "isCorrect": false, "rationale": "This statement is incorrect. Fractions themselves don't inherently 'result in smaller numbers' in a way that affects inequality rules. The rule specifically pertains to the sign of the number used for multiplication or division."}]}, {"question": "Solve the inequality: $0.7x + 2.1 < 6.3$.", "options": [{"text": "$x < 6$", "isCorrect": true, "rationale": "Subtract 2.1 from both sides: $0.7x < 4.2$. Divide by 0.7 (which is positive): $x < 4.2 / 0.7 = 6$. No sign reversal is needed."}, {"text": "$x > 6$", "isCorrect": false, "rationale": "This implies an incorrect reversal of the inequality sign, which is not necessary when dividing by a positive number."}, {"text": "$x < 12$", "isCorrect": false, "rationale": "This would be the result of an arithmetic error, such as $4.2 / 0.7$ being incorrectly calculated as 12."}, {"text": "$x > 12$", "isCorrect": false, "rationale": "This option combines both an arithmetic error and an incorrect reversal of the inequality sign."}]}, {"question": "A cell phone plan charges $25 per month plus $0.05 per text message. Another plan charges $35 per month with unlimited texts. For how many text messages $t$ is the first plan cheaper than the second plan?", "options": [{"text": "$t < 200$", "isCorrect": true, "rationale": "Set up the inequality: $25 + 0.05t < 35$. Subtract 25 from both sides: $0.05t < 10$. Divide by 0.05: $t < 10 / 0.05 \\implies t < 200$. The first plan is cheaper for fewer than 200 text messages."}, {"text": "$t > 200$", "isCorrect": false, "rationale": "This implies an incorrect inequality direction (when the first plan is more expensive) or an incorrect reversal of the inequality sign during calculation."}, {"text": "$t < 500$", "isCorrect": false, "rationale": "This implies an arithmetic error in the calculation, such as dividing 10 by 0.02 or 25 by 0.05, instead of 10 by 0.05."}, {"text": "$t > 500$", "isCorrect": false, "rationale": "This option contains both an arithmetic error and an incorrect inequality direction."}]}, {"question": "Consider the following steps taken to solve $-2(x - 3) \\ge 10$:<br>1. $-2x + 6 \\ge 10$ (Distribution)<br>2. $-2x \\ge 4$ (Subtract 6 from both sides)<br>3. $x \\ge -2$ (Divide by -2)<br>Which step contains an error in the process?", "options": [{"text": "Step 1", "isCorrect": false, "rationale": "Step 1 is correct. Distributing -2 to both x and -3 yields $-2x + 6$."}, {"text": "Step 2", "isCorrect": false, "rationale": "Step 2 is correct. Subtracting 6 from both sides ($10 - 6 = 4$) maintains the inequality direction."}, {"text": "Step 3", "isCorrect": true, "rationale": "Step 3 is incorrect. When dividing by a negative number (-2), the inequality sign must be reversed. The correct step should be $x \\le -2$."}, {"text": "There is no error.", "isCorrect": false, "rationale": "There is an error in Step 3 concerning the reversal of the inequality sign."}]}, {"question": "Which of the following operations might be necessary steps when solving a complex multi-step inequality?<br>I. Distributing terms<br>II. Combining like terms<br>III. Clearing fractions<br>IV. Reversing the inequality sign", "options": [{"text": "I, II, and III only", "isCorrect": false, "rationale": "This option omits a crucial step unique to inequalities: reversing the sign when multiplying or dividing by a negative number."}, {"text": "II, III, and IV only", "isCorrect": false, "rationale": "This option omits distributing terms, which is often a necessary first step in multi-step inequalities."}, {"text": "I, III, and IV only", "isCorrect": false, "rationale": "This option omits combining like terms, which is a fundamental step in simplifying expressions on either side of the inequality."}, {"text": "All of the above (I, II, III, and IV)", "isCorrect": true, "rationale": "The text explicitly mentions that you 'may need to distribute, combine like terms, or clear fractions' and highlights the 'added rule that you must reverse the inequality whenever you multiply or divide by a negative number.' Therefore, all listed operations are potential and necessary steps."}]}, {"question": "After solving an inequality and obtaining the solution $x < -5$, which of the following values would be a suitable choice to check if the solution is correct?", "options": [{"text": "$x = -4$", "isCorrect": false, "rationale": "If the solution is $x < -5$, then $x = -4$ is not in the solution set. Choosing a value outside the proposed solution set is not effective for checking its validity."}, {"text": "$x = 0$", "isCorrect": false, "rationale": "If the solution is $x < -5$, then $x = 0$ is not in the solution set. This value is too far from the boundary and not useful for verifying the specific solution range."}, {"text": "$x = -6$", "isCorrect": true, "rationale": "The text demonstrates checking solutions by picking a value 'within' the proposed solution set. For $x < -5$, a value like $x = -6$ (or $x = -8$ in one example) is less than -5 and therefore belongs to the solution set, making it suitable for checking."}, {"text": "$x = -5$", "isCorrect": false, "rationale": "For a strict inequality ($<$ or $>$), the boundary value itself ($x = -5$) is not included in the solution set. While checking the boundary is useful, the text's examples suggest picking a value strictly within the solution set."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
