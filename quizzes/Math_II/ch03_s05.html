<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 3, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which two measurement systems are primarily used in the United States?", "options": [{"text": "International and Imperial", "isCorrect": false, "rationale": "While related, these are not the specific terms used in the text to describe the two primary systems in the U.S."}, {"text": "Standard and Metric", "isCorrect": false, "rationale": "The text refers to the 'customary system' rather than 'standard system'."}, {"text": "Customary and Metric", "isCorrect": true, "rationale": "The introductory paragraph explicitly states that 'The United States uses two measurement systems: the customary system and the metric system.'"}, {"text": "English and SI", "isCorrect": false, "rationale": "SI refers to the International System of Units, which is the modern form of the metric system, and 'English' is a colloquial term for the customary system, but these are not the exact terms used in the text."}], "id": "q01"}, {"question": "A local track is 0.5 miles long. If you complete 3 laps around the track, how many feet have you run in total?", "options": [{"text": "5,280 ft", "isCorrect": false, "rationale": "This is the length of one mile, not 1.5 miles."}, {"text": "7,920 ft", "isCorrect": true, "rationale": "First, calculate the total distance in miles: 0.5 miles/lap * 3 laps = 1.5 miles. Then, convert miles to feet: 1.5 miles * 5,280 ft/mile = 7,920 ft."}, {"text": "2,640 ft", "isCorrect": false, "rationale": "This would be the length of half a mile (0.5 miles * 5,280 ft/mile), which is only one lap."}, {"text": "15,840 ft", "isCorrect": false, "rationale": "This calculation is incorrect and overestimates the total distance."}], "id": "q02"}, {"question": "A chef needs to add 3 quarts of water to a soup. How many cups of water is this equivalent to?", "options": [{"text": "6 cups", "isCorrect": false, "rationale": "This would be 3 quarts converted to pints (3 qt * 2 pt/qt = 6 pt), not cups."}, {"text": "8 cups", "isCorrect": false, "rationale": "This would be the equivalent of 1 gallon (8 pt) or 2 quarts if 1 quart were 4 cups, which is incorrect."}, {"text": "12 cups", "isCorrect": true, "rationale": "First, convert quarts to pints: 3 qt * 2 pt/qt = 6 pt. Then, convert pints to cups: 6 pt * 2 cups/pt = 12 cups."}, {"text": "24 cups", "isCorrect": false, "rationale": "This calculation significantly overestimates the amount of water needed."}], "id": "q03"}, {"question": "What is the primary characteristic of the metric system that the text highlights as making conversions straightforward?", "options": [{"text": "It uses unique prefixes for each unit.", "isCorrect": false, "rationale": "While true that it uses prefixes, the ease of conversion comes from the base relationship, not just the existence of prefixes."}, {"text": "It is based on powers of 10.", "isCorrect": true, "rationale": "The text explicitly states: 'The metric system is built on powers of 10, which makes conversions straightforward.'"}, {"text": "It has fewer units than the customary system.", "isCorrect": false, "rationale": "The text does not state or imply that the metric system has fewer units, rather that its units relate by powers of 10."}, {"text": "It is only used for scientific measurements.", "isCorrect": false, "rationale": "While commonly used in science, the text notes it's one of two systems used in the U.S. and doesn't state it's exclusively for science."}], "id": "q04"}, {"question": "A pharmacist needs to measure 2.5 kilograms of a chemical. How many grams is this?", "options": [{"text": "0.0025 g", "isCorrect": false, "rationale": "This would be the result of dividing 2.5 by 1,000, which is incorrect when converting from a larger unit (kg) to a smaller unit (g)."}, {"text": "250 g", "isCorrect": false, "rationale": "This would be the result of multiplying by 100, an incorrect conversion factor for kilograms to grams."}, {"text": "2,500 g", "isCorrect": true, "rationale": "Since 1 kg = 1,000 g, you multiply the number of kilograms by 1,000: 2.5 kg * 1,000 g/kg = 2,500 g."}, {"text": "25,000 g", "isCorrect": false, "rationale": "This is an incorrect multiplication, likely by 10,000 instead of 1,000."}], "id": "q05"}, {"question": "If you are converting a measurement from meters (m) to kilometers (km), which statement correctly describes the operation and the change in the numerical value?", "options": [{"text": "Multiply, and the number gets larger.", "isCorrect": false, "rationale": "Converting to a larger unit means the numerical value should get smaller, and it requires division, not multiplication."}, {"text": "Divide, and the number gets larger.", "isCorrect": false, "rationale": "While division is correct, dividing makes the numerical value smaller, not larger."}, {"text": "Multiply, and the number gets smaller.", "isCorrect": false, "rationale": "Multiplication generally makes a number larger, and converting to a larger unit requires division."}, {"text": "Divide, and the number gets smaller.", "isCorrect": true, "rationale": "As per the 'Metric Prefixes' key concept, 'Moving to a larger unit means dividing (the number gets smaller)'. Kilometers are a larger unit than meters (1 km = 1,000 m), so you would divide the meter value by 1,000, resulting in a smaller number."}], "id": "q06"}, {"question": "A bottle contains 1.5 liters of juice. If you pour out 350 milliliters for a drink, how many milliliters of juice remain in the bottle?", "options": [{"text": "1,150 mL", "isCorrect": true, "rationale": "First, convert liters to milliliters: 1.5 L * 1,000 mL/L = 1,500 mL. Then subtract the amount poured out: 1,500 mL - 350 mL = 1,150 mL."}, {"text": "1,150 L", "isCorrect": false, "rationale": "The calculation result is in milliliters, not liters, and the subtraction was performed on an inconsistent unit initially."}, {"text": "1,650 mL", "isCorrect": false, "rationale": "This indicates an incorrect addition or subtraction, rather than the correct subtraction."}, {"text": "15,350 mL", "isCorrect": false, "rationale": "This result suggests an incorrect conversion of liters to milliliters or an error in subtraction."}], "id": "q07"}, {"question": "A recipe calls for 20 ounces of flour. How would you express this amount in pounds and ounces using customary units?", "options": [{"text": "1 lb 4 oz", "isCorrect": true, "rationale": "Since 1 lb = 16 oz, divide 20 oz by 16 oz/lb: 20 / 16 = 1 with a remainder of 4. So, 20 oz is 1 pound and 4 ounces."}, {"text": "1 lb 6 oz", "isCorrect": false, "rationale": "This indicates an incorrect calculation of the remainder (20 - 16 = 4, not 6)."}, {"text": "2 lb 4 oz", "isCorrect": false, "rationale": "This implies an incorrect conversion where 20 oz is assumed to be more than 1.5 lbs, which is false."}, {"text": "1 lb 10 oz", "isCorrect": false, "rationale": "This is an incorrect calculation of the remainder after converting to pounds."}], "id": "q08"}, {"question": "Based on the description in the text, what is the primary advantage of the metric system compared to the customary system for conversions?", "options": [{"text": "It uses fewer unit names.", "isCorrect": false, "rationale": "While the metric system is structured, the text emphasizes the 'powers of 10' as the key to straightforward conversions, not simply fewer unit names."}, {"text": "Its conversions are built on simple factors of 10, making calculations easier.", "isCorrect": true, "rationale": "The text states, 'The metric system is built on powers of 10, which makes conversions straightforward.' This highlights the ease of calculation due to the base-10 nature."}, {"text": "It has different units for length, mass, and capacity.", "isCorrect": false, "rationale": "Both systems have different units for these properties; this is not a unique advantage of the metric system for conversions."}, {"text": "It is globally accepted by all countries.", "isCorrect": false, "rationale": "While globally prevalent, the text focuses on its internal mechanism for ease of conversion in the context of the U.S. using both systems, not its international acceptance."}], "id": "q09"}, {"question": "You have a water cooler that holds 2.5 gallons. How many pints of water can it hold?", "options": [{"text": "10 pints", "isCorrect": false, "rationale": "This is the number of quarts (2.5 gal * 4 qt/gal = 10 qt), not pints."}, {"text": "20 pints", "isCorrect": true, "rationale": "First, convert gallons to quarts: 2.5 gal * 4 qt/gal = 10 qt. Then, convert quarts to pints: 10 qt * 2 pt/qt = 20 pints."}, {"text": "40 pints", "isCorrect": false, "rationale": "This calculation incorrectly doubles the number of pints or uses an incorrect conversion factor."}, {"text": "50 pints", "isCorrect": false, "rationale": "This calculation significantly overestimates the capacity in pints."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
