<script>
var QUESTIONS = [{"question": "In a right triangle, which side is always the longest and is located opposite the right angle?", "options": [{"text": "Leg", "isCorrect": false, "rationale": "A leg is one of the two shorter sides that form the right angle, not the longest side opposite the right angle."}, {"text": "Hypotenuse", "isCorrect": true, "rationale": "The text defines the hypotenuse as the side opposite the right angle, and it is always the longest side in a right triangle."}, {"text": "Adjacent side", "isCorrect": false, "rationale": "While a leg can be adjacent to an acute angle, 'adjacent side' is not the specific term used for the longest side opposite the right angle in a right triangle."}, {"text": "Shortest side", "isCorrect": false, "rationale": "The hypotenuse is explicitly stated to be the longest side, not the shortest."}]}, {"question": "A carpenter is building a triangular brace for a deck. If the two legs of the right triangle are 9 inches and 12 inches, what is the length of the hypotenuse?", "options": [{"text": "13 inches", "isCorrect": false, "rationale": "This would be the hypotenuse for legs of 5 and 12, but not 9 and 12. Calculation: $9^2 + 12^2 = 81 + 144 = 225$. $\\sqrt{225} = 15$."}, {"text": "15 inches", "isCorrect": true, "rationale": "Using the Pythagorean Theorem $a^2 + b^2 = c^2$: $9^2 + 12^2 = c^2 \\implies 81 + 144 = c^2 \\implies 225 = c^2 \\implies c = \\sqrt{225} = 15$. This is also a multiple of the (3,4,5) Pythagorean triple."}, {"text": "21 inches", "isCorrect": false, "rationale": "This is the sum of the legs ($9+12=21$), not the hypotenuse. The hypotenuse must be shorter than the sum of the legs."}, {"text": "225 inches", "isCorrect": false, "rationale": "225 is $c^2$, not $c$. The length of the hypotenuse is the square root of 225."}]}, {"question": "A ladder 13 feet long is leaning against a wall, forming a right triangle with the ground and the wall. If the base of the ladder is 5 feet away from the wall, what is the height on the wall where the ladder touches?", "options": [{"text": "8 feet", "isCorrect": false, "rationale": "This is $13-5$, which is incorrect. This problem requires finding a leg, not simply subtracting the known leg from the hypotenuse."}, {"text": "12 feet", "isCorrect": true, "rationale": "The ladder is the hypotenuse ($c=13$), and the distance from the wall is one leg ($a=5$). We need to find the other leg ($b$). Using $a^2 + b^2 = c^2$: $5^2 + b^2 = 13^2 \\implies 25 + b^2 = 169 \\implies b^2 = 144 \\implies b = \\sqrt{144} = 12$ feet."}, {"text": "144 feet", "isCorrect": false, "rationale": "144 is $b^2$, not $b$. The height is the square root of 144."}, {"text": "18 feet", "isCorrect": false, "rationale": "This is the sum of the hypotenuse and the leg ($13+5$), which is incorrect. The hypotenuse is always the longest side, so the leg must be shorter than the hypotenuse."}]}, {"question": "When applying the Pythagorean Theorem ($a^2 + b^2 = c^2$), why is it crucial to correctly identify 'c' as the hypotenuse?", "options": [{"text": "Because 'c' is always the smallest side.", "isCorrect": false, "rationale": "The text explicitly states that the hypotenuse 'c' is always the longest side, not the smallest."}, {"text": "Because 'c' represents one of the legs.", "isCorrect": false, "rationale": "The variables 'a' and 'b' represent the legs, while 'c' specifically represents the hypotenuse."}, {"text": "Because 'c' is the side opposite the right angle and ensures the equation holds true for a right triangle.", "isCorrect": true, "rationale": "The text warns that 'c' must represent the hypotenuse, the side opposite the right angle and always the longest side. Incorrectly placing a leg in the 'c' position will lead to a wrong answer, as the theorem is specifically formulated with 'c' as the hypotenuse."}, {"text": "Because 'c' is a constant value in all right triangles.", "isCorrect": false, "rationale": "'c' is a variable that represents the length of the hypotenuse, which varies depending on the specific right triangle, it is not a constant value."}]}, {"question": "A landscaper is designing a triangular garden bed. If the two legs of a right triangle are 2 meters and 6 meters, what is the length of the hypotenuse in simplified radical form?", "options": [{"text": "$ \\sqrt{40} $ meters", "isCorrect": false, "rationale": "While $ \\sqrt{40} $ is the correct numerical value for the hypotenuse, it is not in simplified radical form because 40 has a perfect-square factor (4)."}, {"text": "$ 4\\sqrt{10} $ meters", "isCorrect": false, "rationale": "This simplifies $ \\sqrt{160} $, not $ \\sqrt{40} $. The square root of 4 is 2, not 4."}, {"text": "$ 2\\sqrt{10} $ meters", "isCorrect": true, "rationale": "Using the Pythagorean Theorem: $c^2 = 2^2 + 6^2 = 4 + 36 = 40$. So, $c = \\sqrt{40}$. To simplify, find the largest perfect square factor of 40, which is 4. $c = \\sqrt{4 \\times 10} = \\sqrt{4} \\times \\sqrt{10} = 2\\sqrt{10}$ meters."}, {"text": "$ 10\\sqrt{2} $ meters", "isCorrect": false, "rationale": "This would simplify $ \\sqrt{200} $, not $ \\sqrt{40} $."}]}, {"question": "Which of the following sets of side lengths forms a Pythagorean triple?", "options": [{"text": "(4, 5, 6)", "isCorrect": false, "rationale": "Check: $4^2 + 5^2 = 16 + 25 = 41 \\ne 6^2 (36)$. Therefore, this is not a Pythagorean triple."}, {"text": "(7, 24, 25)", "isCorrect": true, "rationale": "Check using the Pythagorean Theorem: $7^2 + 24^2 = 49 + 576 = 625$. And $25^2 = 625$. Since $a^2 + b^2 = c^2$ holds true for these positive integers, (7, 24, 25) is a Pythagorean triple, as shown in the text's checkpoint example."}, {"text": "(6, 9, 12)", "isCorrect": false, "rationale": "Check: $6^2 + 9^2 = 36 + 81 = 117 \\ne 12^2 (144)$. Therefore, this is not a Pythagorean triple."}, {"text": "(2, 3, 4)", "isCorrect": false, "rationale": "Check: $2^2 + 3^2 = 4 + 9 = 13 \\ne 4^2 (16)$. Therefore, this is not a Pythagorean triple."}]}, {"question": "A triangle has sides measuring 8 cm, 15 cm, and 17 cm. Based on the Converse of the Pythagorean Theorem, what can be concluded about this triangle?", "options": [{"text": "It is an acute triangle.", "isCorrect": false, "rationale": "An acute triangle would have $a^2 + b^2 > c^2$. This is not the case here."}, {"text": "It is an obtuse triangle.", "isCorrect": false, "rationale": "An obtuse triangle would have $a^2 + b^2 < c^2$. This is not the case here."}, {"text": "It is a right triangle.", "isCorrect": true, "rationale": "The Converse of the Pythagorean Theorem states that if $a^2 + b^2 = c^2$ for the three sides of a triangle (where 'c' is the longest side), then the triangle is a right triangle. Here, $8^2 + 15^2 = 64 + 225 = 289$, and $17^2 = 289$. Since $8^2 + 15^2 = 17^2$, the triangle is a right triangle. (8, 15, 17) is also listed as a common Pythagorean triple."}, {"text": "It is not a triangle.", "isCorrect": false, "rationale": "The side lengths satisfy the triangle inequality theorem (the sum of any two sides is greater than the third side), so it is a valid triangle. The question is about its type."}]}, {"question": "What specifically defines a Pythagorean triple $(a, b, c)$?", "options": [{"text": "Any three side lengths of a triangle where $a^2 + b^2 = c^2$.", "isCorrect": false, "rationale": "While the equation is correct for a right triangle, a Pythagorean triple specifically requires the side lengths to be positive integers, not just any side lengths."}, {"text": "Three positive integers where $a^2 + b^2 = c^2$.", "isCorrect": true, "rationale": "The text defines a Pythagorean triple as 'a set of three positive integers $a, b, c$ with $a^2 + b^2 = c^2$'. This definition specifies both the integer requirement and the relationship."}, {"text": "Three sides of a right triangle, regardless of whether they are integers.", "isCorrect": false, "rationale": "The definition explicitly states that they must be 'positive integers', distinguishing Pythagorean triples from all possible right triangles (e.g., those with decimal or radical side lengths)."}, {"text": "Any set of three integers that can form a triangle.", "isCorrect": false, "rationale": "For a set of integers to be a Pythagorean triple, they must not only form a triangle but also satisfy the specific condition $a^2 + b^2 = c^2$."}]}, {"question": "A right triangle has legs of length 6 units and 8 units. Without directly calculating $6^2 + 8^2$, what can you infer about the hypotenuse based on Pythagorean triples?", "options": [{"text": "The hypotenuse must be a non-integer value.", "isCorrect": false, "rationale": "Since (3,4,5) is a Pythagorean triple and (6,8) are multiples of (3,4), the hypotenuse will also be an integer multiple, making it an integer."}, {"text": "The hypotenuse is 10 units because (6, 8, 10) is a multiple of the (3, 4, 5) triple.", "isCorrect": true, "rationale": "The text states that 'Multiples of these [Pythagorean triples] are also triples. For instance, $(6, 8, 10) = 2 (3, 4, 5)$.' Thus, recognizing the legs as multiples of a known triple allows for direct inference of the hypotenuse."}, {"text": "The hypotenuse is 14 units because $6+8=14$.", "isCorrect": false, "rationale": "The hypotenuse is found by the sum of squares, not the sum of the legs. The sum of the two legs must be greater than the hypotenuse."}, {"text": "The hypotenuse cannot be determined without calculation.", "isCorrect": false, "rationale": "While direct calculation always works, recognizing Pythagorean triples and their multiples provides a shortcut for determination without explicit calculation, as highlighted in the text."}]}, {"question": "A builder needs to cut a diagonal brace for a rectangular frame. If the two sides forming the right angle measure 1.5 meters and 2 meters, what is the length of the brace (hypotenuse)?", "options": [{"text": "2.25 meters", "isCorrect": false, "rationale": "2.25 is $1.5^2$, which is only the square of one leg, not the hypotenuse. The hypotenuse must be longer than either leg."}, {"text": "2.5 meters", "isCorrect": true, "rationale": "Using the Pythagorean Theorem: $c^2 = 1.5^2 + 2^2 \\implies c^2 = 2.25 + 4 \\implies c^2 = 6.25$. Taking the square root, $c = \\sqrt{6.25} = 2.5$ meters. This is demonstrated in the text's example for decimal leg lengths."}, {"text": "4 meters", "isCorrect": false, "rationale": "This is $2^2$, the square of one leg. The hypotenuse is the square root of the sum of the squares of the legs."}, {"text": "6.25 meters", "isCorrect": false, "rationale": "6.25 is $c^2$, not $c$. The length of the hypotenuse is the square root of 6.25."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
