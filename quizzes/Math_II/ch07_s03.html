<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "If triangle GHI is similar to triangle JKL, and side GH is 10 units long while corresponding side JK is 15 units long, what is the scale factor from triangle JKL to triangle GHI?", "options": [{"text": "2/3", "isCorrect": false, "rationale": "This ratio (10/15) represents the scale factor from triangle GHI to triangle JKL, not from JKL to GHI."}, {"text": "3/2", "isCorrect": true, "rationale": "The scale factor from JKL to GHI means the ratio of a side from JKL to its corresponding side in GHI. Thus, JK/GH = 15/10, which simplifies to 3/2."}, {"text": "1/2", "isCorrect": false, "rationale": "This ratio is incorrect and does not reflect the given side lengths."}, {"text": "5/10", "isCorrect": false, "rationale": "This ratio is incorrect and does not reflect the given side lengths. It also simplifies to 1/2."}]}, {"question": "Triangles MNO and PQR are similar. If MN = 7, NO = 14, and PQ = 10, what is the length of QR?", "options": [{"text": "17", "isCorrect": false, "rationale": "This answer is obtained by incorrect addition (e.g., 7 + 10 = 17) rather than setting up a proportion."}, {"text": "20", "isCorrect": true, "rationale": "Set up the proportion MN/PQ = NO/QR. So, 7/10 = 14/QR. Cross-multiplying gives 7 * QR = 10 * 14, which means 7 * QR = 140. Dividing by 7, QR = 20."}, {"text": "21", "isCorrect": false, "rationale": "This answer suggests an incorrect calculation from the proportion."}, {"text": "24", "isCorrect": false, "rationale": "This answer suggests an incorrect calculation from the proportion."}]}, {"question": "A 6-foot-tall person casts a 4-foot shadow. At the same time, a nearby building casts a 28-foot shadow. How tall is the building?", "options": [{"text": "18 feet", "isCorrect": false, "rationale": "This answer results from an incorrect proportion or calculation."}, {"text": "32 feet", "isCorrect": false, "rationale": "This answer results from an incorrect calculation, possibly by adding the shadow lengths."}, {"text": "42 feet", "isCorrect": true, "rationale": "The objects and their shadows form similar triangles. Set up the proportion: (person's height)/(person's shadow) = (building's height)/(building's shadow). So, 6/4 = h/28. Cross-multiplying gives 4h = 6 * 28, which means 4h = 168. Dividing by 4, h = 42 feet."}, {"text": "56 feet", "isCorrect": false, "rationale": "This answer results from an incorrect proportion, possibly by inverting one of the ratios."}]}, {"question": "A map has a scale of 1 inch : 50 miles. If two cities are 4.5 inches apart on the map, what is the actual distance between them?", "options": [{"text": "11.1 miles", "isCorrect": false, "rationale": "This answer suggests an incorrect division or calculation."}, {"text": "225 miles", "isCorrect": true, "rationale": "Set up the proportion: (map distance)/(actual distance) = (map scale inch)/(actual scale miles). So, 1/50 = 4.5/d. Cross-multiplying gives 1 * d = 50 * 4.5, which means d = 225 miles."}, {"text": "450 miles", "isCorrect": false, "rationale": "This answer might result from multiplying by 100 instead of 50, or another calculation error."}, {"text": "500 miles", "isCorrect": false, "rationale": "This answer is incorrect and doesn't use the map distance provided."}]}, {"question": "Given similar triangles ABC and DEF, where AB corresponds to DE, BC to EF, and AC to DF. Which of the following proportions correctly relates their corresponding sides?", "options": [{"text": "AB/BC = DE/EF", "isCorrect": true, "rationale": "This proportion correctly relates corresponding sides by maintaining the ratio of sides within each triangle (e.g., side 1 / side 2 = corresponding side 1 / corresponding side 2)."}, {"text": "AB/DE = BC/DF", "isCorrect": false, "rationale": "This proportion is incorrect because BC corresponds to EF, not DF. Mixing up corresponding parts leads to an incorrect relationship."}, {"text": "AB/EF = DE/BC", "isCorrect": false, "rationale": "This proportion incorrectly mixes sides across figures and positions. AB corresponds to DE, and BC corresponds to EF, so they should be paired consistently."}, {"text": "BC/DE = AB/EF", "isCorrect": false, "rationale": "This proportion incorrectly mixes sides across figures and positions. BC corresponds to EF, and AB corresponds to DE, so they should be paired consistently."}]}, {"question": "Triangles LMN and PQR are similar. The scale factor from LMN to PQR is 3/5. Which statement about their corresponding sides is true?", "options": [{"text": "Side LM is 3/5 the length of side PQ.", "isCorrect": true, "rationale": "A scale factor from LMN to PQR means the ratio of a side from LMN to its corresponding side in PQR. So, LM/PQ = 3/5, which implies LM = (3/5) * PQ."}, {"text": "Side PQ is 3/5 the length of side LM.", "isCorrect": false, "rationale": "This statement would be true if the scale factor was from PQR to LMN, meaning PQ/LM = 3/5, or LM/PQ = 5/3."}, {"text": "Side LM is 5/3 the length of side PQ.", "isCorrect": false, "rationale": "This statement describes the scale factor from PQR to LMN, not from LMN to PQR."}, {"text": "The ratio of side LM to side QR is 3/5.", "isCorrect": false, "rationale": "LM and QR are not necessarily corresponding sides. The scale factor applies to pairs of corresponding sides."}]}, {"question": "Triangles RST and UVW are similar. If RS = 5.4, ST = 8.1, and UV = 9, what is the length of VW?", "options": [{"text": "12.5", "isCorrect": false, "rationale": "This answer results from an incorrect calculation during cross-multiplication or division."}, {"text": "13.5", "isCorrect": true, "rationale": "Set up the proportion RS/UV = ST/VW. So, 5.4/9 = 8.1/VW. Cross-multiplying gives 5.4 * VW = 9 * 8.1, which simplifies to 5.4 * VW = 72.9. Dividing by 5.4, VW = 13.5."}, {"text": "14.2", "isCorrect": false, "rationale": "This answer results from an incorrect calculation during cross-multiplication or division."}, {"text": "15.0", "isCorrect": false, "rationale": "This answer results from an incorrect calculation during cross-multiplication or division."}]}, {"question": "What is the primary purpose of learning to use proportions in similar figures, as described in this section?", "options": [{"text": "To calculate the area of complex geometric shapes.", "isCorrect": false, "rationale": "While related to geometry, calculating area is not the primary focus of this section, which emphasizes side lengths and indirect measurement."}, {"text": "To determine if two figures are congruent.", "isCorrect": false, "rationale": "Proportions are used for similar figures, which are not necessarily congruent (same size and shape)."}, {"text": "To find unknown side lengths of figures, especially through indirect measurement.", "isCorrect": true, "rationale": "The section explicitly states its purpose is to 'set up and solve those proportions to find unknown side lengths' and highlights 'practical applications in indirect measurement—finding distances that are difficult or impossible to measure directly'."}, {"text": "To convert measurements between different units of length.", "isCorrect": false, "rationale": "While ratios are used in unit conversions, this is not the specific application described for proportions in similar figures."}]}, {"question": "A large photograph is 10 inches wide and 15 inches tall. It needs to be proportionally resized to fit a frame that is 6 inches wide. What will be the height of the resized photograph?", "options": [{"text": "4 inches", "isCorrect": false, "rationale": "This answer results from an incorrect proportion or calculation."}, {"text": "7.5 inches", "isCorrect": false, "rationale": "This answer suggests an incorrect calculation, possibly if the ratio was inverted or misapplied."}, {"text": "9 inches", "isCorrect": true, "rationale": "Set up the proportion: (original width)/(new width) = (original height)/(new height). So, 10/6 = 15/h. Cross-multiplying gives 10h = 6 * 15, which means 10h = 90. Dividing by 10, h = 9 inches."}, {"text": "12 inches", "isCorrect": false, "rationale": "This answer results from an incorrect proportion or calculation."}]}, {"question": "A student is trying to find the height (h) of a tree that casts a 20-foot shadow. They know a 5-foot post nearby casts an 8-foot shadow. The student sets up the proportion: 20/h = 5/8. What is the error in the student's setup?", "options": [{"text": "The student incorrectly assumed the triangles are similar.", "isCorrect": false, "rationale": "In indirect measurement problems involving shadows at the same time, the triangles formed by objects and their shadows are indeed similar due to parallel sun's rays."}, {"text": "The student should have cross-multiplied before setting up the proportion.", "isCorrect": false, "rationale": "Cross-multiplication is a technique to solve a proportion, not a step to be performed before setting it up."}, {"text": "The student did not keep corresponding parts in the same position; they compared shadow to height for the tree, but height to shadow for the post.", "isCorrect": true, "rationale": "The proportion 20/h = 5/8 compares (tree shadow)/(tree height) on the left, but (post height)/(post shadow) on the right. To be correct, both ratios must compare the same attributes in the same order, e.g., (tree shadow)/(tree height) = (post shadow)/(post height), or 20/h = 8/5."}, {"text": "The student should have used the scale factor instead of a proportion.", "isCorrect": false, "rationale": "Using a scale factor is essentially using a proportion. For instance, the scale factor of heights could be used in a proportion with shadow lengths."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
