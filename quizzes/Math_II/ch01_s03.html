<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the value of $18^0$?", "options": [{"text": "0", "isCorrect": false, "rationale": "Any nonzero quantity raised to the power of zero is 1, not 0. This is a common misconception."}, {"text": "1", "isCorrect": true, "rationale": "According to the Zero Exponent property, for any nonzero number 'a', $a^0 = 1$. Here, the base is 18, which is nonzero."}, {"text": "18", "isCorrect": false, "rationale": "The value 18 would be for $18^1$, not $18^0$."}, {"text": "Undefined", "isCorrect": false, "rationale": "The expression $0^0$ is undefined, but $18^0$ is clearly defined as 1 because its base is nonzero."}], "id": "q01"}, {"question": "Evaluate the expression $-7^0$.", "options": [{"text": "1", "isCorrect": false, "rationale": "The negative sign is outside the exponentiation. Only the 7 is raised to the power of 0, so $7^0 = 1$. The expression then becomes $-(1)$, which is -1."}, {"text": "-1", "isCorrect": true, "rationale": "In $-7^0$, only the base 7 is raised to the power of 0, resulting in $7^0 = 1$. The negative sign then applies to this result, making the entire expression $-(1) = -1$. This is different from $(-7)^0$, which would be 1."}, {"text": "0", "isCorrect": false, "rationale": "The zero exponent rule states $a^0 = 1$ for nonzero 'a', not 0. Only $0^n = 0$ for $n>0$."}, {"text": "Undefined", "isCorrect": false, "rationale": "The base for the exponent is 7, which is nonzero, so $7^0$ is defined. The negative sign is a separate operation."}], "id": "q02"}, {"question": "The expression $(4y-8)^0$ is undefined under which condition, according to the provided text?", "options": [{"text": "When $y=0$", "isCorrect": false, "rationale": "If $y=0$, the base becomes $(4(0)-8) = -8$. Then $(-8)^0 = 1$, which is defined."}, {"text": "When $y=2$", "isCorrect": true, "rationale": "If $y=2$, the base of the exponent becomes $4(2)-8 = 8-8 = 0$. The expression then simplifies to $0^0$, which the text explicitly states is undefined."}, {"text": "When $y=4$", "isCorrect": false, "rationale": "If $y=4$, the base becomes $(4(4)-8) = 16-8 = 8$. Then $8^0 = 1$, which is defined."}, {"text": "The expression is always defined for any real value of $y$", "isCorrect": false, "rationale": "The text explicitly cautions that $0^0$ is undefined, meaning there are cases where the expression would be undefined if the base can become zero."}], "id": "q03"}, {"question": "Which of the following expressions is equivalent to $13^{-3}$?", "options": [{"text": "$-13^3$", "isCorrect": false, "rationale": "A negative exponent indicates a reciprocal, not a negative value of the base or the result."}, {"text": "$1/13^3$", "isCorrect": true, "rationale": "According to the Negative Exponent property, $a^{-n} = 1/a^n$. So, $13^{-3}$ means the reciprocal of $13^3$."}, {"text": "$13/3$", "isCorrect": false, "rationale": "This confuses exponents with division. The exponent means repeated multiplication or its reciprocal."}, {"text": "$-(1/13)^3$", "isCorrect": false, "rationale": "The negative exponent does not introduce a negative sign to the expression itself, only indicates a reciprocal."}], "id": "q04"}, {"question": "Rewrite the expression $5w^{-4}$ using only positive exponents. Assume $w \\ne 0$.", "options": [{"text": "$1/(5w^4)$", "isCorrect": false, "rationale": "Only the variable $w$ is raised to the negative exponent, not the coefficient 5. The coefficient remains in the numerator."}, {"text": "$5/w^4$", "isCorrect": true, "rationale": "The negative exponent rule applies only to the base it is directly attached to, which is $w$. So, $w^{-4}$ becomes $1/w^4$. The coefficient 5 remains in the numerator, yielding $5 \\times (1/w^4) = 5/w^4$."}, {"text": "$(5w)^4$", "isCorrect": false, "rationale": "This would be the equivalent for $1/(5w)^{-4}$, which is not the original expression."}, {"text": "$1/(5w^{-4})$", "isCorrect": false, "rationale": "This is the original expression, not rewritten with positive exponents."}], "id": "q05"}, {"question": "Simplify the expression $1/x^{-6}$ using only positive exponents. Assume $x \\ne 0$.", "options": [{"text": "$-x^6$", "isCorrect": false, "rationale": "A negative exponent indicates taking the reciprocal, not negating the base or the result of exponentiation."}, {"text": "$x^6$", "isCorrect": true, "rationale": "According to the Negative Exponent property, $1/a^{-n} = a^n$. Therefore, $1/x^{-6}$ simplifies to $x^6$."}, {"text": "$1/x^6$", "isCorrect": false, "rationale": "This would be the equivalent of $x^{-6}$, not $1/x^{-6}$."}, {"text": "$x^{-6}$", "isCorrect": false, "rationale": "This is the original expression, not simplified with positive exponents."}], "id": "q06"}, {"question": "Simplify $(c/d)^5$ using positive exponents only. Assume $c, d \\ne 0$.", "options": [{"text": "$c^5/d^5$", "isCorrect": true, "rationale": "The Power of a Quotient property states that $(a/b)^n = a^n/b^n$. The exponent applies to both the numerator and the denominator."}, {"text": "$c^5d^5$", "isCorrect": false, "rationale": "This would be for $(cd)^5$, not $(c/d)^5$."}, {"text": "$c^5/d$", "isCorrect": false, "rationale": "The exponent must apply to both the numerator and the denominator, not just the numerator."}, {"text": "$c/d^5$", "isCorrect": false, "rationale": "The exponent must apply to both the numerator and the denominator, not just the denominator."}], "id": "q07"}, {"question": "Which expression is equivalent to $(p/q)^{-4}$? Assume $p, q \\ne 0$.", "options": [{"text": "$(q/p)^4$", "isCorrect": true, "rationale": "The note states that a negative exponent on a fraction 'flips' it: $(a/b)^{-n} = (b/a)^n$. So, $(p/q)^{-4}$ becomes $(q/p)^4$."}, {"text": "$-(p/q)^4$", "isCorrect": false, "rationale": "A negative exponent signifies a reciprocal, not a negative value of the expression."}, {"text": "$p^{-4}/q^{-4}$", "isCorrect": false, "rationale": "While this is a step in the simplification, it still contains negative exponents and is not the fully simplified form requested by being 'equivalent' in a simplified sense (i.e., with positive exponents if possible)."}, {"text": "$p^4/q^4$", "isCorrect": false, "rationale": "This would be for $(p/q)^4$, not $(p/q)^{-4}$."}], "id": "q08"}, {"question": "Simplify the expression $10a^7 b^{-4} / (5a^3 b^2)$. Write the answer with positive exponents only. Assume $a, b \\ne 0$.", "options": [{"text": "$2a^4 b^{-6}$", "isCorrect": false, "rationale": "This expression still contains a negative exponent and is not fully simplified with positive exponents only."}, {"text": "$2a^4/b^6$", "isCorrect": true, "rationale": "First, divide coefficients: $10/5 = 2$. For 'a', use the quotient rule: $a^{7-3} = a^4$. For 'b', use the quotient rule: $b^{-4-2} = b^{-6}$. Finally, rewrite $b^{-6}$ as $1/b^6$ to get positive exponents: $2a^4/b^6$."}, {"text": "$2a^{10}/b^6$", "isCorrect": false, "rationale": "The quotient rule for 'a' requires subtraction of exponents, not addition."}, {"text": "$2b^6/a^4$", "isCorrect": false, "rationale": "The variables 'a' and 'b' are incorrectly placed; the terms with positive exponents should remain in the numerator, and only terms with negative exponents move to the denominator."}], "id": "q09"}, {"question": "Which of the following statements is **false**? Assume all variables are nonzero.", "options": [{"text": "$a^0 = 1$", "isCorrect": false, "rationale": "This statement is true, as it is the definition of the zero exponent property for any nonzero base 'a'."}, {"text": "$a^{-n} = 1/a^n$", "isCorrect": false, "rationale": "This statement is true, as it is the definition of the negative exponent property for any nonzero base 'a' and positive integer 'n'."}, {"text": "$(x/y)^{-n} = (y/x)^n$", "isCorrect": false, "rationale": "This statement is true. The text explicitly notes that a negative exponent on a fraction 'flips' it and makes the exponent positive."}, {"text": "$0^0 = 1$", "isCorrect": true, "rationale": "This statement is false. The 'caution' box explicitly states that 'The expression $0^0$ is not defined in this course.' Therefore, claiming it equals 1 is incorrect."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
