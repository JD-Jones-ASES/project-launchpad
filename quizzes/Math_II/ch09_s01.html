<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following relations is a function?", "options": [{"text": "(2, 4), (3, 6), (2, 5)", "isCorrect": false, "rationale": "This is not a function because the input x=2 is paired with two different outputs (4 and 5)."}, {"text": "(0, 1), (1, 1), (2, 2)", "isCorrect": true, "rationale": "This is a function because every input (x-value) is paired with exactly one output (y-value). No x-value appears more than once with a different y-value (or any y-value for that matter)."}, {"text": "(-1, 0), (-1, 1), (-2, 0)", "isCorrect": false, "rationale": "This is not a function because the input x=-1 is paired with two different outputs (0 and 1)."}, {"text": "(4, 8), (4, 9), (5, 10)", "isCorrect": false, "rationale": "This is not a function because the input x=4 is paired with two different outputs (8 and 9)."}]}, {"question": "For the relation R = {(1, 3), (2, 5), (3, 7), (4, 9)}, what are its domain and range?", "options": [{"text": "Domain: {3, 5, 7, 9}; Range: {1, 2, 3, 4}", "isCorrect": false, "rationale": "This option incorrectly swaps the domain and range values. The domain consists of the x-values, and the range consists of the y-values."}, {"text": "Domain: {1, 2, 3, 4}; Range: {3, 5, 7, 9}", "isCorrect": true, "rationale": "The domain is the set of all x-values in the ordered pairs, which is {1, 2, 3, 4}. The range is the set of all y-values, which is {3, 5, 7, 9}."}, {"text": "Domain: {1, 2, 3, 4, 5, 7, 9}; Range: {1, 2, 3, 4, 5, 7, 9}", "isCorrect": false, "rationale": "This option incorrectly combines all x and y values into both the domain and range, which is not how these sets are defined."}, {"text": "Domain: {1, 3, 5, 7, 9}; Range: {1, 2, 3, 4, 5, 7, 9}", "isCorrect": false, "rationale": "This option incorrectly mixes x and y values in the domain and includes extra values in the range."}]}, {"question": "The Vertical Line Test is used to determine if a graph represents a function. What does it specifically identify?", "options": [{"text": "Whether the graph is continuous or discrete.", "isCorrect": false, "rationale": "The Vertical Line Test does not provide information about the continuity or discreteness of a graph."}, {"text": "Whether every input (x-value) is paired with exactly one output (y-value).", "isCorrect": true, "rationale": "The Vertical Line Test graphically checks the definition of a function: if any vertical line intersects the graph at more than one point, it means a single x-value is associated with multiple y-values, thus failing the function condition."}, {"text": "Whether the graph has a positive or negative slope.", "isCorrect": false, "rationale": "The Vertical Line Test is unrelated to the slope of a graph."}, {"text": "Whether the range values are unique for each domain value.", "isCorrect": false, "rationale": "The VLT specifically checks that *each domain value* (x-value) maps to only one range value (y-value). It's permissible for different x-values to map to the same y-value, which the VLT allows."}]}, {"question": "A vending machine dispenses a specific snack (output) based on the button pressed (input). If pressing button 'A1' always dispenses 'Chips', and pressing button 'B2' always dispenses 'Soda', but pressing button 'C3' could sometimes dispense 'Candy' and other times 'Gum', which statement is true about this scenario?", "options": [{"text": "The relationship between button pressed and dispensed item is always a function.", "isCorrect": false, "rationale": "The case of button 'C3' mapping to both 'Candy' and 'Gum' violates the definition of a function."}, {"text": "The relationship between button pressed and dispensed item is not a function because button 'C3' maps to multiple outputs.", "isCorrect": true, "rationale": "A function requires that every input (button pressed) is paired with exactly one output (dispensed item). Since 'C3' can lead to 'Candy' or 'Gum', it violates this rule, making the relation not a function."}, {"text": "The relationship is a function because 'Chips' and 'Soda' each come from only one button.", "isCorrect": false, "rationale": "While parts of the relation might behave like a function, the existence of even one input ('C3') that maps to multiple outputs makes the entire relation not a function."}, {"text": "The domain is the set of snacks, and the range is the set of buttons.", "isCorrect": false, "rationale": "The domain consists of the inputs (buttons pressed), and the range consists of the outputs (dispensed snacks)."}]}, {"question": "A graph displays a horizontal line segment from (-4, 2) to (6, 2). What are the domain and range of this relation?", "options": [{"text": "Domain: [-4, 6]; Range: {2}", "isCorrect": true, "rationale": "The domain includes all possible x-values the segment covers, from -4 to 6, represented by the interval [-4, 6]. The range includes all possible y-values, which for a horizontal line segment is a single value, 2, represented by the set {2}."}, {"text": "Domain: {2}; Range: [-4, 6]", "isCorrect": false, "rationale": "This option incorrectly swaps the domain and range and represents the range as an interval rather than a single value."}, {"text": "Domain: (-4, 6); Range: (2, 2)", "isCorrect": false, "rationale": "This option uses open intervals, implying the endpoints are not included, and incorrectly represents the range as an interval from 2 to 2 instead of a single value."}, {"text": "Domain: {-4, 6}; Range: {2}", "isCorrect": false, "rationale": "This option implies that the domain only consists of the two endpoints, -4 and 6, rather than the continuous segment between them."}]}, {"question": "Which of the following relations is NOT a function?", "options": [{"text": "{(apple, red), (banana, yellow), (grape, purple)}", "isCorrect": false, "rationale": "This is a function because each type of fruit (input) is paired with exactly one color (output)."}, {"text": "{(cat, meow), (dog, bark), (cat, purr)}", "isCorrect": true, "rationale": "This is NOT a function because the input 'cat' is paired with two different outputs ('meow' and 'purr'), violating the definition of a function."}, {"text": "{(pen, ink), (pencil, graphite)}", "isCorrect": false, "rationale": "This is a function because each writing tool (input) is paired with exactly one writing substance (output)."}, {"text": "{(student A, math), (student B, science), (student C, history)}", "isCorrect": false, "rationale": "This is a function because each student (input) is paired with exactly one subject (output)."}]}, {"question": "Based on the Vertical Line Test, which of the following geometric shapes, when graphed, would *always* represent a relation that is NOT a function?", "options": [{"text": "A straight line with a non-zero slope.", "isCorrect": false, "rationale": "A straight line with a non-zero slope will always pass the Vertical Line Test, intersecting any vertical line at most once."}, {"text": "A horizontal line.", "isCorrect": false, "rationale": "A horizontal line will always pass the Vertical Line Test, intersecting any vertical line at most once."}, {"text": "A vertical line.", "isCorrect": true, "rationale": "A vertical line itself is an example of a graph that fails the Vertical Line Test catastrophically; any vertical line that coincides with it will intersect it at infinitely many points, meaning a single x-value maps to multiple (in fact, all) y-values."}, {"text": "A parabola opening upwards.", "isCorrect": false, "rationale": "A parabola opening upwards or downwards will always pass the Vertical Line Test, intersecting any vertical line at most once."}]}, {"question": "The text states that \"Every equation y = mx + b from Chapter 8 is a function.\" What characteristic of these equations makes them functions?", "options": [{"text": "They always pass through the origin (0, 0).", "isCorrect": false, "rationale": "Linear equations only pass through the origin if b=0. This is not a universal characteristic that defines them as functions."}, {"text": "For every unique input x, there is exactly one unique output y.", "isCorrect": true, "rationale": "This statement accurately describes why linear equations are functions. For any given x-value, substituting it into y = mx + b will yield precisely one corresponding y-value, satisfying the definition of a function."}, {"text": "The domain and range are always all real numbers.", "isCorrect": false, "rationale": "While typically true for continuous lines, this is not the fundamental characteristic that makes them functions (e.g., a line segment would be a function but have a restricted domain/range)."}, {"text": "They only involve two variables, x and y.", "isCorrect": false, "rationale": "Many relations involve only two variables but are not functions (e.g., a circle's equation x^2 + y^2 = r^2)."}]}, {"question": "Consider the definition of a function: \"a relation in which every input (x-value) is paired with exactly one output (y-value).\" What is the most critical implication of this statement regarding the domain?", "options": [{"text": "Every x-value must be unique within the domain.", "isCorrect": false, "rationale": "The x-values themselves might not be unique if considered just as a set of numbers, but each *pairing* must be unique for an x-value to its y-value. The key is that a *specific x-value* cannot appear with *different y-values*."}, {"text": "No single x-value can be associated with more than one y-value.", "isCorrect": true, "rationale": "This is the direct and most critical implication of the function definition. If an x-value were associated with two or more different y-values, it would violate the 'exactly one output' condition."}, {"text": "All x-values must be greater than zero.", "isCorrect": false, "rationale": "This is an arbitrary restriction not found in the definition of a function. Functions can have any real number as their x-values."}, {"text": "The domain must consist of an infinite number of values.", "isCorrect": false, "rationale": "The domain of a function can be finite, as seen in many of the examples provided in the text (e.g., a set of ordered pairs)."}]}, {"question": "A teacher tracks student progress by recording (student ID, grade_percentage) for each assignment. If a student re-takes an assignment, their new grade is recorded as a *separate* ordered pair. For example: (101, 75) for Assignment 1, then (101, 80) for Assignment 1 retake. Is the overall set of (student ID, grade_percentage) pairs for a *single assignment* a function if a retake is recorded this way?", "options": [{"text": "Yes, because each student ID represents a unique individual.", "isCorrect": false, "rationale": "While the student ID is unique to the individual, the issue arises when that single student ID (input) is associated with multiple different grade percentages (outputs) for the same assignment."}, {"text": "Yes, because it's possible for different students to have the same grade.", "isCorrect": false, "rationale": "It is permissible for different x-values (student IDs) to map to the same y-value (grade percentage) in a function. However, this does not address the core problem of one x-value having multiple y-values."}, {"text": "No, because a single student ID (input) is paired with multiple grade percentages (outputs) for the same assignment.", "isCorrect": true, "rationale": "This scenario violates the definition of a function. The input (student ID 101) is associated with two different outputs (75 and 80) for the same 'assignment,' meaning the x-value (student ID) does not map to exactly one y-value (grade percentage)."}, {"text": "No, because the grade percentages are not unique.", "isCorrect": false, "rationale": "The uniqueness of y-values is not a requirement for a relation to be a function. What matters is that each x-value maps to only one y-value."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
