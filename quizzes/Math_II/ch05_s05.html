<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 5, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the property for solving absolute value equations, if $k > 0$, the equation $x = k$ has what characteristic?", "options": [{"text": "Exactly one solution", "isCorrect": false, "rationale": "This occurs when $k=0$, not when $k>0$."}, {"text": "Exactly two solutions", "isCorrect": true, "rationale": "As stated in the 'Solving $x = k$' property, if $k > 0$, then $x = k$ has two solutions: $x = k$ or $x = -k$."}, {"text": "No solution", "isCorrect": false, "rationale": "This occurs when $k<0$, not when $k>0$."}, {"text": "Infinitely many solutions", "isCorrect": false, "rationale": "Absolute value equations typically have 0, 1, or 2 solutions, not infinitely many."}], "id": "q01"}, {"question": "Solve the equation $x - 8 = 5$.", "options": [{"text": "$x = 13$ only", "isCorrect": false, "rationale": "This is one of the two solutions, but the absolute value equation implies both a positive and negative case for the expression inside the bars."}, {"text": "$x = -3$ only", "isCorrect": false, "rationale": "This is one of the two solutions, but the absolute value equation implies both a positive and negative case for the expression inside the bars."}, {"text": "$x = 13$ or $x = -3$", "isCorrect": false, "rationale": "While $x = 13$ is correct (from $x - 8 = 5$), the second solution is wrong. Solving $x - 8 = -5$ gives $x = -5 + 8 = 3$, not $x = -3$. A sign error produces the incorrect second value."}, {"text": "$x = 13$ or $x = 3$", "isCorrect": true, "rationale": "The equation $x - 8 = 5$ splits into two cases: $x - 8 = 5$ or $x - 8 = -5$. Solving the first gives $x = 5 + 8 = 13$. Solving the second gives $x = -5 + 8 = 3$. Both are valid solutions."}, {"text": "No solution", "isCorrect": false, "rationale": "The right-hand side is a positive number (5), so there will be two solutions, not no solution."}, {"text": "$x = 8$ or $x = -5$", "isCorrect": false, "rationale": "This incorrectly combines numbers from the equation and does not follow the correct solving steps for absolute value."}], "id": "q02"}, {"question": "What is the solution to the equation $4x + 12 = 0$?", "options": [{"text": "$x = -3$ only", "isCorrect": true, "rationale": "Since the absolute value is equal to 0, the expression inside the bars must be 0. So, $4x + 12 = 0$, which simplifies to $4x = -12$, and therefore $x = -3$. This is the only solution."}, {"text": "$x = 3$ or $x = -3$", "isCorrect": false, "rationale": "This would be the case if the right-hand side was a positive number. When the right-hand side is 0, there is only one solution."}, {"text": "No solution", "isCorrect": false, "rationale": "An equation equal to 0 always has one solution, as absolute value can be 0."}, {"text": "$x = 0$", "isCorrect": false, "rationale": "While 0 is the value for the expression inside the absolute value, solving $4x + 12 = 0$ does not result in $x=0$."}], "id": "q03"}, {"question": "Solve the equation $2x + 1 = -3$.", "options": [{"text": "$x = -2$ or $x = 1$", "isCorrect": false, "rationale": "This implies a solution exists, but absolute value can never equal a negative number."}, {"text": "$x = 1$ only", "isCorrect": false, "rationale": "This is an incorrect calculation and ignores the fundamental property that absolute value cannot be negative."}, {"text": "$x = -2$ only", "isCorrect": false, "rationale": "This is an incorrect calculation and ignores the fundamental property that absolute value cannot be negative."}, {"text": "No solution", "isCorrect": true, "rationale": "The absolute value of any real number is always non-negative (zero or positive). Since $-3$ is a negative number, there is no real value of $x$ for which $2x + 1$ could equal $-3$. Thus, the equation has no solution."}], "id": "q04"}, {"question": "Which of the following absolute value equations will have exactly one solution?", "options": [{"text": "$x - 5 = 10$", "isCorrect": false, "rationale": "Since $10 > 0$, this equation will have two solutions ($x-5=10$ and $x-5=-10$)."}, {"text": "$x + 2 = -7$", "isCorrect": false, "rationale": "Since $-7 < 0$, this equation will have no solution."}, {"text": "$2x = 0$", "isCorrect": true, "rationale": "When an absolute value expression is equal to 0, there is exactly one solution ($2x = 0$, which gives $x = 0$). This aligns with the property that $x = 0$ has one solution."}, {"text": "$3x - 1 = 8$", "isCorrect": false, "rationale": "Since $8 > 0$, this equation will have two solutions ($3x-1=8$ and $3x-1=-8$)."}], "id": "q05"}, {"question": "What is the first step you should take to solve the equation $x + 2 - 5 = 1$?", "options": [{"text": "Set $x + 2 - 5 = 1$", "isCorrect": false, "rationale": "This step is part of solving, but only applies after the absolute value expression is isolated. Before splitting, the equation must be simplified."}, {"text": "Set $x + 2 - 5 = -1$", "isCorrect": false, "rationale": "This step is part of solving, but only applies after the absolute value expression is isolated and the positive case is also set up."}, {"text": "Add 5 to both sides of the equation", "isCorrect": true, "rationale": "The text states, 'Isolate the absolute value expression first.' To isolate $x + 2$, you must add 5 to both sides, resulting in $x + 2 = 6$."}, {"text": "Subtract 2 from both sides of the equation", "isCorrect": false, "rationale": "Subtracting 2 from both sides would incorrectly move a term from inside the absolute value bars to the outside, before the absolute value is isolated."}], "id": "q06"}, {"question": "Solve the equation $2x - 4 + 7 = 11$.", "options": [{"text": "$x = 8$ or $x = 0$", "isCorrect": false, "rationale": "This calculation is incorrect. After isolating the absolute value, the solutions are different."}, {"text": "$x = 4$ or $x = 0$", "isCorrect": true, "rationale": "First, isolate the absolute value: $2x - 4 = 11 - 7$, which simplifies to $2x - 4 = 4$. Then split into two cases: $2x - 4 = 4$ or $2x - 4 = -4$. Solving $2x - 4 = 4$ gives $2x = 8$, so $x = 4$. Solving $2x - 4 = -4$ gives $2x = 0$, so $x = 0$."}, {"text": "$x = 8$ only", "isCorrect": false, "rationale": "This result does not correctly isolate the absolute value first, nor does it account for both possible cases."}, {"text": "No solution", "isCorrect": false, "rationale": "After isolating the absolute value, the right-hand side is positive, indicating two solutions will exist."}], "id": "q07"}, {"question": "A student attempts to solve the equation $2x - 1 + 3 = 1$. After performing the first step, they write $2x - 1 = -2$. What is the consequence of this step?", "options": [{"text": "It correctly sets up two equations for the next step.", "isCorrect": false, "rationale": "This is incorrect. An absolute value cannot equal a negative number, so setting up two equations from this point would lead to erroneous solutions."}, {"text": "It leads to a single solution, $x = -1/2$.", "isCorrect": false, "rationale": "This is incorrect. Absolute value cannot be negative, so solving for $x$ from this equation is not valid."}, {"text": "It immediately indicates there is no solution to the original equation.", "isCorrect": true, "rationale": "The 'caution' box states that if you arrive at an equation like $expression = -4$, you should stop immediately because absolute value can never equal a negative number. Here, the student arrived at $2x - 1 = -2$, which is an absolute value expression equaling a negative number (-2), meaning there is no solution."}, {"text": "It is an incorrect first step in isolating the absolute value.", "isCorrect": false, "rationale": "The first step, subtracting 3 from both sides, is actually the correct way to isolate the absolute value. The problem lies in the result of that isolation, not the process itself."}], "id": "q08"}, {"question": "The ideal weight for a package is 16 ounces. The package is acceptable if its weight, $w$, differs from the ideal by no more than 0.5 ounces. Which equation could be used to find the maximum and minimum acceptable weights?", "options": [{"text": "$w - 16 = 0.5$", "isCorrect": true, "rationale": "The difference between $w$ and the ideal weight (16) is represented by $w - 16$. Since this difference can be positive or negative but its magnitude (absolute value) is 0.5, the equation $w - 16 = 0.5$ correctly models the situation to find the exact boundary weights."}, {"text": "$w + 16 = 0.5$", "isCorrect": false, "rationale": "This equation represents the sum of the weight and the ideal weight, which is not what 'differs from' implies."}, {"text": "$w - 0.5 = 16$", "isCorrect": false, "rationale": "This equation incorrectly places the ideal weight and the allowed difference. It doesn't represent the difference of $w$ from 16."}, {"text": "$w - 16 = -0.5$", "isCorrect": false, "rationale": "This equation would imply no solution, as an absolute value cannot equal a negative number. The absolute value itself must be equal to a positive value (0.5) to find the boundary conditions."}], "id": "q09"}, {"question": "Consider the equation $3x - 6 - 9 = -3$. How many solutions does this equation have?", "options": [{"text": "Zero solutions", "isCorrect": false, "rationale": "If, after isolating the absolute value, the expression equaled a negative number, there would be zero solutions. However, in this case, it equals a positive number."}, {"text": "One solution", "isCorrect": false, "rationale": "One solution occurs only when the absolute value expression equals 0."}, {"text": "Two solutions", "isCorrect": true, "rationale": "First, isolate the absolute value expression: Add 9 to both sides, which gives $3x - 6 = -3 + 9$, simplifying to $3x - 6 = 6$. Since $6 > 0$, the equation $3x - 6 = 6$ will have two distinct solutions (from $3x-6=6$ and $3x-6=-6$)."}, {"text": "Infinitely many solutions", "isCorrect": false, "rationale": "Absolute value equations do not result in infinitely many solutions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
