<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "If all outcomes are equally likely, which of the following accurately defines the probability of an event E?", "options": [{"text": "The sum of the number of favorable outcomes and the total number of outcomes.", "isCorrect": false, "rationale": "Probability is a ratio, not a sum. Adding favorable and total outcomes does not yield a probability."}, {"text": "The difference between 1 and the total number of outcomes.", "isCorrect": false, "rationale": "This formula is related to complementary events, but not the general definition of an event's probability. It also does not involve favorable outcomes directly."}, {"text": "The ratio of the number of favorable outcomes to the total number of outcomes.", "isCorrect": true, "rationale": "As defined in the 'Probability of an Event' keyterm, P(E) = (number of favorable outcomes) / (total number of outcomes)."}, {"text": "The product of the number of favorable outcomes and the total number of outcomes.", "isCorrect": false, "rationale": "Probability is a ratio, not a product. Multiplying these values would result in a number much larger than 1, which is not a valid probability."}]}, {"question": "A weather forecaster states that the probability of rain tomorrow is 0. Which interpretation of this statement is correct based on the definition of probability?", "options": [{"text": "Rain is highly unlikely but still possible.", "isCorrect": false, "rationale": "A probability of 0 does not mean highly unlikely; it means absolutely impossible. A highly unlikely event would have a very small, but non-zero, probability (e.g., 0.01)."}, {"text": "Rain is certain to occur.", "isCorrect": false, "rationale": "A probability of 1 means an event is certain, not a probability of 0."}, {"text": "Rain is impossible tomorrow.", "isCorrect": true, "rationale": "The text states, 'A probability of 0 means the event is impossible.'"}, {"text": "Rain is as likely as not to occur.", "isCorrect": false, "rationale": "An event that is as likely as not to occur has a probability of 0.5."}]}, {"question": "A bag contains 4 red, 6 blue, and 2 green marbles. What is the probability of drawing a red marble?", "options": [{"text": "4/12", "isCorrect": true, "rationale": "There are 4 red marbles (favorable outcomes) and a total of 4 + 6 + 2 = 12 marbles (total outcomes). P(red) = 4/12 = 1/3."}, {"text": "6/12", "isCorrect": false, "rationale": "This represents the probability of drawing a blue marble, not a red one."}, {"text": "2/12", "isCorrect": false, "rationale": "This represents the probability of drawing a green marble, not a red one."}, {"text": "1/2", "isCorrect": false, "rationale": "This would be the probability if there were 6 red marbles out of 12, or if blue marbles were chosen (6/12)."}]}, {"question": "The probability of a student guessing the correct answer to a multiple-choice question is 0.25. What is the probability that the student does NOT guess the correct answer?", "options": [{"text": "0.25", "isCorrect": false, "rationale": "This is the probability of guessing the correct answer, not the probability of not guessing correctly."}, {"text": "0.5", "isCorrect": false, "rationale": "This would be the probability if there were only two equally likely outcomes, one correct and one incorrect (e.g., true/false question with 0.5 chance of correct)."}, {"text": "0.75", "isCorrect": true, "rationale": "Using the Complement Rule, P(not E) = 1 - P(E). So, P(not correct) = 1 - 0.25 = 0.75."}, {"text": "1", "isCorrect": false, "rationale": "A probability of 1 means it is certain the student will not guess correctly, which is not true if there's a 0.25 chance of guessing correctly."}]}, {"question": "Which of the following scenarios describes independent events?", "options": [{"text": "Drawing a card from a deck, not replacing it, and then drawing a second card.", "isCorrect": false, "rationale": "The outcome of the first draw affects the probabilities for the second draw because the deck composition changes. These are dependent events."}, {"text": "Flipping a coin and then rolling a standard die.", "isCorrect": true, "rationale": "The outcome of the coin flip does not affect the outcome of the die roll, and vice versa. As stated in the 'Independent Events' keyterm, these are independent."}, {"text": "Selecting a student to be class president, and then selecting a different student from the remaining class to be vice president.", "isCorrect": false, "rationale": "The pool of available students changes after the first selection, affecting the probabilities for the second selection. These are dependent events."}, {"text": "The probability that it rains today and the probability of a traffic jam occurring because of the rain.", "isCorrect": false, "rationale": "The occurrence of rain directly influences the probability of a traffic jam, making them dependent events."}]}, {"question": "A spinner has 5 equally likely sections: Red, Blue, Green, Yellow, Purple. A fair coin is flipped. What is the probability of spinning a Blue and flipping a Heads?", "options": [{"text": "1/5", "isCorrect": false, "rationale": "This is the probability of spinning Blue, but it does not account for the coin flip."}, {"text": "1/2", "isCorrect": false, "rationale": "This is the probability of flipping Heads, but it does not account for the spinner."}, {"text": "1/10", "isCorrect": true, "rationale": "P(Blue) = 1/5 and P(Heads) = 1/2. Since these are independent events, P(Blue and Heads) = P(Blue) * P(Heads) = (1/5) * (1/2) = 1/10."}, {"text": "7/10", "isCorrect": false, "rationale": "This value would result from adding probabilities (1/5 + 1/2) rather than multiplying them for independent events, and is incorrect for 'and' events."}]}, {"question": "You roll a standard six-sided die twice. What is the probability of rolling a 1 on the first roll AND a 6 on the second roll?", "options": [{"text": "1/6", "isCorrect": false, "rationale": "This is the probability of rolling a 1 or a 6 on a single roll, or just P(1) or P(6)."}, {"text": "1/12", "isCorrect": false, "rationale": "This would be the probability if one of the rolls had a 1/2 chance (e.g., P(1) * P(even number))."}, {"text": "1/3", "isCorrect": false, "rationale": "This is incorrect. It might be confused with P(odd) or P(even) on one die."}, {"text": "1/36", "isCorrect": true, "rationale": "The two rolls are independent events. P(1 on first roll) = 1/6. P(6 on second roll) = 1/6. Using the Multiplication Rule for Independent Events, P(1 and 6) = (1/6) * (1/6) = 1/36."}]}, {"question": "A spinner has 4 equal sections: A, B, C, D. A coin is flipped. What is the probability of spinning a vowel (A) and getting Tails?", "options": [{"text": "1/8", "isCorrect": true, "rationale": "The probability of spinning a vowel (A) is 1/4 (1 favorable outcome out of 4 total). The probability of getting Tails is 1/2. Since these are independent events, P(vowel and Tails) = P(vowel) * P(Tails) = (1/4) * (1/2) = 1/8."}, {"text": "1/4", "isCorrect": false, "rationale": "This is the probability of spinning a vowel (A) only, or perhaps flipping tails twice, not both combined."}, {"text": "1/2", "isCorrect": false, "rationale": "This is the probability of flipping Tails only, or spinning 'A or B' only, not both combined."}, {"text": "3/8", "isCorrect": false, "rationale": "This calculation is incorrect for the given events."}]}, {"question": "A class has 12 students who like math and 8 students who like science. If a student is chosen randomly, what is the probability that the student does NOT like math?", "options": [{"text": "12/20", "isCorrect": false, "rationale": "This is the probability that the student *does* like math (12 favorable out of 20 total)."}, {"text": "8/20", "isCorrect": true, "rationale": "There are 12 + 8 = 20 total students. P(likes math) = 12/20. Using the Complement Rule, P(does NOT like math) = 1 - P(likes math) = 1 - 12/20 = 8/20. Alternatively, the 8 students who like science are the ones who do not like math, so P(does not like math) = 8/20."}, {"text": "1/2", "isCorrect": false, "rationale": "This would be the probability if exactly half the students did not like math (10/20)."}, {"text": "1/3", "isCorrect": false, "rationale": "This would be the probability if there were 20 students and 6-7 did not like math. (8/20 simplifies to 2/5, not 1/3)."}]}, {"question": "A restaurant offers 3 appetizer choices (Soup, Salad, Breadsticks) and 2 main course choices (Pasta, Steak). If a customer chooses one appetizer and one main course randomly, what is the probability that they choose Soup AND Pasta?", "options": [{"text": "1/3", "isCorrect": false, "rationale": "This is the probability of choosing Soup, not both Soup and Pasta."}, {"text": "1/2", "isCorrect": false, "rationale": "This is the probability of choosing Pasta, not both Soup and Pasta."}, {"text": "1/6", "isCorrect": true, "rationale": "The choices are independent. P(Soup) = 1/3 (1 favorable out of 3 total appetizers). P(Pasta) = 1/2 (1 favorable out of 2 total main courses). Using the Multiplication Rule, P(Soup and Pasta) = P(Soup) * P(Pasta) = (1/3) * (1/2) = 1/6. This can also be seen from a tree diagram: there are 3 * 2 = 6 total outcomes (S-P, S-S, Sa-P, Sa-S, B-P, B-S), and only 1 is (Soup, Pasta)."}, {"text": "5/6", "isCorrect": false, "rationale": "This might be the result of adding probabilities (1/3 + 1/2 = 5/6), but the multiplication rule applies for 'and' events."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
