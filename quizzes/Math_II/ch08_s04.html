<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following equations is a linear equation in two variables according to the definition provided?", "options": [{"text": "y = x^2 + 3", "isCorrect": false, "rationale": "This equation contains a variable raised to the power of 2, making it a quadratic equation, not a linear one. Linear equations have variables raised only to the power of 1."}, {"text": "y = -4x + 9", "isCorrect": true, "rationale": "This equation is in the form y = mx + b, where m = -4 and b = 9. This is the defining characteristic of a linear equation in two variables, whose graph is always a straight line."}, {"text": "xy = 10", "isCorrect": false, "rationale": "This equation involves the product of two variables (x and y), which means it cannot be rewritten in the standard y = mx + b form and is therefore not a linear equation."}, {"text": "y = sqrt(x) - 2", "isCorrect": false, "rationale": "This equation involves a square root of x, which means the variable x is not raised to the power of 1. Thus, it is not a linear equation."}]}, {"question": "If you are creating a table of values to graph the linear equation y = -2x + 5, what would be the corresponding y-value when x = 3?", "options": [{"text": "11", "isCorrect": false, "rationale": "Substituting x=3 would be y = -2(3) + 5 = -6 + 5 = -1, not 11. This answer might result from an addition error or incorrect sign usage."}, {"text": "-1", "isCorrect": true, "rationale": "To find the y-value, substitute x = 3 into the equation: y = -2(3) + 5 = -6 + 5 = -1."}, {"text": "7", "isCorrect": false, "rationale": "This answer might result from calculating 2(3) + 5, ignoring the negative sign."}, {"text": "-7", "isCorrect": false, "rationale": "This answer might result from a calculation error such as -2(3) - 5."}]}, {"question": "What is the y-intercept of the equation y = 7 - 3x?", "options": [{"text": "(7, 0)", "isCorrect": false, "rationale": "The y-intercept occurs when x=0. This point (7,0) would be an x-intercept if the line crossed the x-axis at 7."}, {"text": "(0, 7)", "isCorrect": true, "rationale": "The equation can be rewritten as y = -3x + 7. In the form y = mx + b, the y-intercept is (0, b). Here, b = 7, so the y-intercept is (0, 7)."}, {"text": "(0, -3)", "isCorrect": false, "rationale": "The value -3 is the slope (m), not the y-coordinate of the y-intercept (b)."}, {"text": "(-3, 0)", "isCorrect": false, "rationale": "This point has a y-coordinate of 0, which means it is an x-intercept, not a y-intercept. Also, the x-coordinate of the y-intercept must be 0."}]}, {"question": "A student is graphing the equation y = x - 2. They have correctly plotted the point (0, -2). Which of the following points would also lie on this line?", "options": [{"text": "(1, 1)", "isCorrect": false, "rationale": "If x=1, y = 1 - 2 = -1, not 1."}, {"text": "(2, 0)", "isCorrect": true, "rationale": "Substitute x = 2 into the equation: y = 2 - 2 = 0. So, the point (2, 0) lies on the line."}, {"text": "(-1, -1)", "isCorrect": false, "rationale": "If x=-1, y = -1 - 2 = -3, not -1."}, {"text": "(3, 2)", "isCorrect": false, "rationale": "If x=3, y = 3 - 2 = 1, not 2."}]}, {"question": "The equation y = 6 is graphed on a coordinate plane. Which statement accurately describes its graph?", "options": [{"text": "It is a vertical line passing through (6, 0).", "isCorrect": false, "rationale": "An equation of the form y = c represents a horizontal line, not a vertical line. A vertical line would be of the form x = c."}, {"text": "It is a horizontal line passing through (0, 6).", "isCorrect": true, "rationale": "As per the properties of horizontal and vertical lines, y = c (where c is a constant) graphs as a horizontal line through (0, c). In this case, c = 6, so it passes through (0, 6)."}, {"text": "It is a line with a positive slope passing through the origin.", "isCorrect": false, "rationale": "A horizontal line has a slope of 0, not a positive slope. It does not pass through the origin unless c=0 (i.e., y=0)."}, {"text": "It is a line with a negative slope passing through (0, 6).", "isCorrect": false, "rationale": "A horizontal line has a slope of 0, not a negative slope."}]}, {"question": "Consider the equation x = -3. Which statement below correctly describes its graph and function status?", "options": [{"text": "It is a horizontal line and represents a function.", "isCorrect": false, "rationale": "An equation of the form x = c represents a vertical line, not a horizontal line."}, {"text": "It is a vertical line and represents a function.", "isCorrect": false, "rationale": "While it is a vertical line, the text explicitly states that equations like x = c are not functions because they fail the vertical line test."}, {"text": "It is a horizontal line and does not represent a function.", "isCorrect": false, "rationale": "An equation of the form x = c represents a vertical line, not a horizontal line."}, {"text": "It is a vertical line and does not represent a function.", "isCorrect": true, "rationale": "As per the properties, x = c graphs as a vertical line through (c, 0). The caution note explicitly mentions that such an equation (like x = -2) is not a function because it fails the vertical line test."}]}, {"question": "A weather balloon maintains a constant altitude of 5 kilometers. If we plot the balloon's position on a coordinate plane where the x-axis represents horizontal distance and the y-axis represents altitude, what type of line would represent the balloon's altitude?", "options": [{"text": "A vertical line at x=5.", "isCorrect": false, "rationale": "A vertical line would mean the horizontal distance is constant, but the altitude is changing. The problem states constant altitude."}, {"text": "A horizontal line at y=5.", "isCorrect": true, "rationale": "Since the altitude (y-coordinate) is constant at 5 kilometers, regardless of the horizontal distance (x-coordinate), the path would be represented by a horizontal line with the equation y = 5."}, {"text": "A line with a positive slope.", "isCorrect": false, "rationale": "A line with a positive slope would indicate both horizontal distance and altitude are increasing, which contradicts the constant altitude."}, {"text": "A line passing through the origin.", "isCorrect": false, "rationale": "A line passing through the origin (0,0) would mean the altitude is 0 at a horizontal distance of 0, which is not the case for an altitude of 5 km."}]}, {"question": "A gym membership costs an initial sign-up fee of $25 plus a monthly fee of $15. If C represents the total cost and M represents the number of months, which equation correctly models this situation?", "options": [{"text": "C = 25M + 15", "isCorrect": false, "rationale": "This equation incorrectly assigns the monthly fee as the y-intercept and the sign-up fee as the slope. The monthly fee is charged 'per month', indicating it's the slope."}, {"text": "M = 15C + 25", "isCorrect": false, "rationale": "This equation incorrectly expresses months (M) as a function of cost (C), and also swaps the roles of the initial fee and monthly fee."}, {"text": "C = 15M + 25", "isCorrect": true, "rationale": "The initial sign-up fee of $25 is a one-time cost, acting as the y-intercept (the cost when M=0). The $15 monthly fee is the rate of change, or the slope (m), multiplied by the number of months (M). This fits the y = mx + b form."}, {"text": "C = 25(M + 15)", "isCorrect": false, "rationale": "This equation incorrectly multiplies the initial fee by the sum of months and monthly fee, which does not represent the given cost structure."}]}, {"question": "Referring to the Application: Cost Table example where C = 1.50m + 3 (C = cost, m = miles), what does the C-intercept represent in the context of the taxi fare?", "options": [{"text": "The cost per mile driven.", "isCorrect": false, "rationale": "The cost per mile is represented by the slope (1.50 in this case), not the C-intercept."}, {"text": "The total cost for traveling 1.50 miles.", "isCorrect": false, "rationale": "The C-intercept occurs when m=0, not m=1.50. This option describes a specific point on the line, but not the intercept."}, {"text": "The flat fee charged before any miles are traveled.", "isCorrect": true, "rationale": "The C-intercept occurs when the number of miles (m) is 0. In the equation C = 1.50m + 3, when m=0, C=3. This means a base fare of $3.00 is charged even if the taxi hasn't moved."}, {"text": "The number of miles one can travel for $3.00.", "isCorrect": false, "rationale": "This would mean C=3, and solving for m (3 = 1.50m + 3 gives m=0). While true that for $3.00 you travel 0 miles, the C-intercept specifically identifies the cost when m=0, representing the initial charge."}]}, {"question": "When graphing a linear equation using a table of values, why is it sufficient to plot just a few points (typically 2-5) and then connect them with a straight line?", "options": [{"text": "Because all linear equations must pass through the origin (0,0).", "isCorrect": false, "rationale": "Linear equations only pass through the origin if their y-intercept is (0,0) (i.e., b=0), which is not always the case (e.g., y=2x+1 does not)."}, {"text": "Because the graph of a linear equation is by definition a straight line, and any two distinct points uniquely determine a straight line.", "isCorrect": true, "rationale": "The text states that a linear equation's graph is 'always a straight line.' Mathematically, a straight line is uniquely defined by any two distinct points. Plotting additional points serves to confirm calculations and ensure accuracy, but two points are theoretically sufficient to draw the line."}, {"text": "Because plotting more than 5 points makes the graph too crowded and difficult to read.", "isCorrect": false, "rationale": "While practical considerations like graph clarity exist, this option describes a practical limitation rather than the fundamental mathematical reason for using a few points."}, {"text": "Because the y-intercept is always one of the plotted points, which provides a fixed reference.", "isCorrect": false, "rationale": "While including the y-intercept is good practice, it's not strictly necessary for defining the line. Any two points will define it. The fundamental reason lies in the nature of a straight line."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
