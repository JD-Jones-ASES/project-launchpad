<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary advantage of using function notation, such as $f(x) = 3x - 2$, compared to writing $y = 3x - 2$?", "options": [{"text": "It implies that $f$ is multiplied by $x$, making algebraic manipulation easier.", "isCorrect": false, "rationale": "The text explicitly states that $f(x)$ does not mean 'f times x.' It is notation for the output of the function."}, {"text": "It names the function and explicitly indicates the input variable, which simplifies evaluation.", "isCorrect": true, "rationale": "The text explains that function notation 'names the function (f) and makes the input variable (x) explicit,' also noting it 'makes it easy to evaluate the function at specific values.'"}, {"text": "It limits the domain of the function to only positive values of $x$.", "isCorrect": false, "rationale": "Function notation itself does not inherently restrict the domain; domain restrictions are determined by the function's rule (e.g., division by zero, square roots of negatives)."}, {"text": "It signifies that the function always represents a linear relationship.", "isCorrect": false, "rationale": "Function notation can be used for any type of function (linear, quadratic, etc.), not just linear ones, as shown by the quadratic function example $g(x) = x^2 + 4x - 1$."}]}, {"question": "Given the function $h(x) = -2x + 7$, what is the value of $h(4)$?", "options": [{"text": "15", "isCorrect": false, "rationale": "Substituting 4 into the function gives $-2(4) + 7 = -8 + 7 = -1$, not 15."}, {"text": "-1", "isCorrect": true, "rationale": "To evaluate $h(4)$, replace $x$ with 4: $h(4) = -2(4) + 7 = -8 + 7 = -1$."}, {"text": "8", "isCorrect": false, "rationale": "Substituting 4 into the function gives $-2(4) + 7 = -8 + 7 = -1$, not 8. This might result from calculating $2x$ and then adding 7."}, {"text": "-8", "isCorrect": false, "rationale": "Substituting 4 into the function gives $-2(4) + 7 = -8 + 7 = -1$, not -8. This might result from only calculating $-2x$ without adding 7."}]}, {"question": "If $g(x) = x^2 + 4x - 1$, what is the result of evaluating $g(-2)$?", "options": [{"text": "11", "isCorrect": false, "rationale": "Substituting $x = -2$ yields $(-2)^2 + 4(-2) - 1 = 4 - 8 - 1 = -5$, not 11. An error in squaring or sign might lead to this."}, {"text": "-1", "isCorrect": false, "rationale": "Substituting $x = -2$ yields $(-2)^2 + 4(-2) - 1 = 4 - 8 - 1 = -5$, not -1. This might result from incorrect calculation of terms."}, {"text": "-5", "isCorrect": true, "rationale": "To evaluate $g(-2)$, replace $x$ with -2: $g(-2) = (-2)^2 + 4(-2) - 1 = 4 - 8 - 1 = -5$."}, {"text": "3", "isCorrect": false, "rationale": "Substituting $x = -2$ yields $(-2)^2 + 4(-2) - 1 = 4 - 8 - 1 = -5$, not 3. This indicates an error in the calculation, possibly with the signs."}]}, {"question": "For the function $f(x) = 2x + 5$, evaluate $f(a + 3)$.", "options": [{"text": "$2a + 5$", "isCorrect": false, "rationale": "This would be the result if the input was 'a', not 'a + 3'. The '3' needs to be distributed."}, {"text": "$2a + 8$", "isCorrect": false, "rationale": "This results from $2(a) + 5 + 3$, which incorrectly adds the 3 outside the multiplication. The '3' is part of the input, not an external term."}, {"text": "$2a + 11$", "isCorrect": true, "rationale": "To evaluate $f(a+3)$, substitute $(a+3)$ for $x$: $f(a+3) = 2(a+3) + 5 = 2a + 6 + 5 = 2a + 11$."}, {"text": "$2a + 6$", "isCorrect": false, "rationale": "This results from $2(a+3)$, but omits the constant term '+ 5' from the original function definition."}]}, {"question": "Let $f(x) = x + 3$ and $g(x) = 2x^2$. What is the combined value of $f(5) + g(1)$?", "options": [{"text": "13", "isCorrect": false, "rationale": "Calculating $f(5) = 5+3 = 8$ and $g(1) = 2(1)^2 = 2$. Their sum is $8+2=10$, not 13."}, {"text": "10", "isCorrect": true, "rationale": "First, evaluate $f(5)$: $f(5) = 5 + 3 = 8$. Next, evaluate $g(1)$: $g(1) = 2(1)^2 = 2(1) = 2$. Finally, add the results: $8 + 2 = 10$."}, {"text": "15", "isCorrect": false, "rationale": "Calculating $f(5) = 5+3 = 8$ and $g(1) = 2(1)^2 = 2$. Their sum is $8+2=10$, not 15. This might come from an error in calculating $g(1)$ or a simple arithmetic mistake."}, {"text": "18", "isCorrect": false, "rationale": "Calculating $f(5) = 5+3 = 8$ and $g(1) = 2(1)^2 = 2$. Their sum is $8+2=10$, not 18. This likely involves an error in evaluating $g(1)$ (e.g., $2 \times 1^2 = (2 \times 1)^2 = 4$, so $8+8=16$, still incorrect)."}]}, {"question": "Which mathematical operation, if it results in zero in a specific part of a function, directly leads to a domain restriction because the operation becomes undefined?", "options": [{"text": "Addition in the numerator of a fraction.", "isCorrect": false, "rationale": "Addition in the numerator does not typically lead to an undefined operation; the numerator can be zero or any real number."}, {"text": "Subtraction inside a polynomial.", "isCorrect": false, "rationale": "Subtraction is always defined for real numbers and does not create domain restrictions in this context."}, {"text": "Multiplication with a negative number.", "isCorrect": false, "rationale": "Multiplication with a negative number is a well-defined operation for all real numbers and does not cause domain restrictions."}, {"text": "Division, where the denominator becomes zero.", "isCorrect": true, "rationale": "The text explicitly lists 'Division by zero' as a common domain restriction, as division by zero is an undefined operation."}]}, {"question": "To ensure a function involving a square root is defined for real numbers, what condition must be met by the radicand (the expression under the square root symbol)?", "options": [{"text": "It must be strictly positive (greater than zero).", "isCorrect": false, "rationale": "While a positive radicand is allowed, zero is also permitted (e.g., $\\sqrt{0}=0$), so 'strictly positive' is too restrictive."}, {"text": "It must be a negative number.", "isCorrect": false, "rationale": "The text states 'Square root of a negative' as a domain restriction, meaning a negative radicand leads to an undefined real number."}, {"text": "It must be a non-negative number (greater than or equal to zero).", "isCorrect": true, "rationale": "The text states 'if $f(x) = \\sqrt{x}$, then $x \\ge 0$', meaning the radicand must be non-negative to avoid undefined operations (imaginary numbers)."}, {"text": "It can be any real number.", "isCorrect": false, "rationale": "This is incorrect because square roots of negative numbers are not real numbers, as explained by the domain restriction 'Square root of a negative'."}]}, {"question": "What is the domain of the function $k(x) = \\frac{10}{x - 7}$?", "options": [{"text": "All real numbers.", "isCorrect": false, "rationale": "This is incorrect because the function involves division, and division by zero is undefined. There is a restriction on $x$."}, {"text": "$x \\ne 0$", "isCorrect": false, "rationale": "This restriction would apply if the denominator was simply $x$. Here, the denominator is $x - 7$, so the value that makes it zero is different."}, {"text": "$x \\ne 7$", "isCorrect": true, "rationale": "For the function to be defined, the denominator cannot be zero. Setting $x - 7 = 0$ gives $x = 7$. Therefore, $x$ cannot be 7."}, {"text": "$x \\ge 7$", "isCorrect": false, "rationale": "This restriction applies to square root functions, not division. The issue for division is inequality to zero, not non-negativity."}]}, {"question": "Determine the domain of the function $m(x) = \\sqrt{x + 9}$.", "options": [{"text": "$x > -9$", "isCorrect": false, "rationale": "While values greater than -9 are allowed, the radicand can also be equal to zero (e.g., $\\sqrt{0}$ is defined), so this option is too restrictive."}, {"text": "$x \\ge -9$", "isCorrect": true, "rationale": "For the square root to be a real number, the radicand must be non-negative. So, $x + 9 \\ge 0$, which implies $x \\ge -9$."}, {"text": "$x \\ne -9$", "isCorrect": false, "rationale": "This restriction is for functions with division by zero. For square roots, values less than -9 are also excluded, not just -9 itself."}, {"text": "All real numbers.", "isCorrect": false, "rationale": "This is incorrect because square roots of negative numbers are undefined in the real number system. Thus, there is a restriction on $x$."}]}, {"question": "A student attempts to evaluate the function $f(x) = \\frac{x^2}{x-4}$ at $x=4$. Based on the principles discussed in the section, what is the most appropriate conclusion regarding this evaluation?", "options": [{"text": "The function evaluates to 4.", "isCorrect": false, "rationale": "Substituting $x=4$ would result in $4^2 / (4-4) = 16/0$, which is undefined, not 4."}, {"text": "The function evaluates to 16.", "isCorrect": false, "rationale": "Substituting $x=4$ would result in $4^2 / (4-4) = 16/0$, which is undefined, not 16."}, {"text": "The function is undefined at $x=4$ due to a domain restriction involving division by zero.", "isCorrect": true, "rationale": "The denominator $x-4$ becomes $4-4=0$ when $x=4$. Division by zero is an undefined operation, creating a domain restriction at $x=4$ for this function."}, {"text": "The problem requires a different type of function notation for valid evaluation.", "isCorrect": false, "rationale": "The function notation used is standard. The issue is with the input value causing an undefined operation, not the notation itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
