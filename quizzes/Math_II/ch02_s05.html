<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 2, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of an irrational number, according to the text?", "options": [{"text": "It can be written as a fraction $a/b$ where $a$ and $b$ are integers and $b \neq 0$.", "isCorrect": false, "rationale": "This definition describes a rational number, not an irrational one."}, {"text": "Its decimal expansion terminates or repeats.", "isCorrect": false, "rationale": "This definition describes a rational number. Irrational numbers have decimal expansions that neither terminate nor repeat."}, {"text": "Its decimal expansion neither terminates nor repeats.", "isCorrect": true, "rationale": "The text explicitly defines an irrational number as one whose decimal expansion neither terminates nor repeats."}, {"text": "It is always a negative number.", "isCorrect": false, "rationale": "The sign of a number (positive or negative) does not determine whether it is rational or irrational. For example, $-\\sqrt{2}$ is irrational, but $\\sqrt{4}$ is rational."}]}, {"question": "Which of the following numbers is classified as rational?", "options": [{"text": "$7$", "isCorrect": false, "rationale": "$7$ is the square root of a non-perfect square, making it an irrational number."}, {"text": "$25$", "isCorrect": true, "rationale": "$25 = 5$. Since $5$ can be written as $5/1$, it is a rational number."}, {"text": "$3$", "isCorrect": false, "rationale": "$3$ is the square root of a non-perfect square, making it an irrational number."}, {"text": "$\\pi$", "isCorrect": false, "rationale": "$\\pi$ (pi) is explicitly given as a common irrational number whose decimal digits continue forever without a repeating pattern."}]}, {"question": "Consider a number whose decimal expansion is $0.1010010001...$, where the number of zeros between the ones increases with each occurrence. How would you classify this number?", "options": [{"text": "Rational, because it has a discernible pattern.", "isCorrect": false, "rationale": "While there is a pattern in the digits, it is not a repeating block of digits. A repeating decimal must have a fixed block of digits that repeats infinitely."}, {"text": "Irrational, because its decimal expansion neither terminates nor repeats.", "isCorrect": true, "rationale": "The decimal $0.1010010001...$ neither ends nor repeats a specific block of digits, fitting the definition of an irrational number."}, {"text": "Rational, because it is a positive number.", "isCorrect": false, "rationale": "The positivity of a number does not determine whether it is rational or irrational."}, {"text": "It cannot be classified as rational or irrational based on this information.", "isCorrect": false, "rationale": "The given decimal expansion provides sufficient information to classify the number as irrational."}]}, {"question": "According to the text, what is the precise relationship between the set of real numbers and points on the number line?", "options": [{"text": "Every point on the number line corresponds to exactly one rational number.", "isCorrect": false, "rationale": "This statement is incorrect because irrational numbers also correspond to points on the number line, and they are not rational."}, {"text": "Every real number corresponds to exactly one point on the number line, but not every point on the line is a real number.", "isCorrect": false, "rationale": "The text states that 'Every point on the number line corresponds to exactly one real number,' making the second part of this statement false."}, {"text": "The real numbers are a proper subset of the numbers that correspond to points on the number line.", "isCorrect": false, "rationale": "The text states that the real numbers *consist* of all rational and irrational numbers and that 'Every point on the number line corresponds to exactly one real number', implying they are equivalent, not a proper subset."}, {"text": "Every point on the number line corresponds to exactly one real number, and every real number corresponds to exactly one point on the number line.", "isCorrect": true, "rationale": "The text explicitly states: 'Every point on the number line corresponds to exactly one real number, and every real number corresponds to exactly one point on the number line.'"}]}, {"question": "To which sets does the number $16$ belong, according to the hierarchy described in the text?", "options": [{"text": "Rational numbers only.", "isCorrect": false, "rationale": "$16 = 4$. While rational, it also belongs to natural, whole, and integer sets."}, {"text": "Integers, Rational numbers, and Real numbers only.", "isCorrect": false, "rationale": "$16 = 4$, which is also a natural number and a whole number. This option omits those sets."}, {"text": "Natural numbers, Whole numbers, Integers, Rational numbers, and Real numbers.", "isCorrect": true, "rationale": "$16 = 4$. Four is a natural number (N), a whole number (W), an integer (Z), a rational number (Q), and a real number (R). All these sets contain $4$."}, {"text": "Irrational numbers and Real numbers.", "isCorrect": false, "rationale": "$16 = 4$ is a rational number, not irrational."}]}, {"question": "In the informal proof that $2$ is irrational, a contradiction is reached because assuming $2 = a/b$ in simplest form leads to the conclusion that both $a$ and $b$ must share a common factor. What is that common factor?", "options": [{"text": "They are both odd.", "isCorrect": false, "rationale": "The proof shows that $a^2$ is even, implying $a$ is even. Similarly, $b^2$ is even, implying $b$ is even. Not odd."}, {"text": "They are both prime.", "isCorrect": false, "rationale": "The proof does not conclude that $a$ and $b$ must be prime; it specifically concludes they are both even."}, {"text": "They are both even.", "isCorrect": true, "rationale": "The proof demonstrates that if $a^2 = 2b^2$ and $b^2 = 2k^2$, then both $a$ and $b$ must be even. This contradicts the initial assumption that $a/b$ was in simplest form (meaning $a$ and $b$ share no common factors)."}, {"text": "They are both negative.", "isCorrect": false, "rationale": "The sign of $a$ and $b$ is not relevant to the contradiction in this proof."}]}, {"question": "To approximate $7$ to the nearest hundredth, the text shows that $2.64^2 = 6.9696$ and $2.65^2 = 7.0225$. Based on this information, what is $7$ approximated to the nearest hundredth?", "options": [{"text": "$2.64$", "isCorrect": false, "rationale": "The difference between $7$ and $6.9696$ is $0.0304$. The difference between $7$ and $7.0225$ is $0.0225$. Since $0.0225 < 0.0304$, $2.65$ is closer."}, {"text": "$2.65$", "isCorrect": true, "rationale": "Comparing the distances, $7 - 6.9696 = 0.0304$ and $7.0225 - 7 = 0.0225$. Since $0.0225$ is smaller, $2.65$ is the closer approximation to the nearest hundredth."}, {"text": "$2.6$", "isCorrect": false, "rationale": "This is an approximation to the nearest tenth, not hundredth, and is less precise than required."}, {"text": "$3.0$", "isCorrect": false, "rationale": "$3.0$ is $3^2=9$, which is too far from $7$. This is an approximation to the nearest whole number, and $2.0$ would be closer."}]}, {"question": "Which of the following numbers would be classified as an irrational number?", "options": [{"text": "$0.333...$ (repeating)", "isCorrect": false, "rationale": "A repeating decimal like $0.333...$ can be written as a fraction ($1/3$), making it a rational number."}, {"text": "$-7/3$", "isCorrect": false, "rationale": "This number is already in the form $a/b$ where $a$ and $b$ are integers and $b \\neq 0$, making it a rational number."}, {"text": "$10$", "isCorrect": true, "rationale": "$10$ is the square root of a non-perfect square. Its decimal expansion neither terminates nor repeats, classifying it as irrational."}, {"text": "$9$", "isCorrect": false, "rationale": "$9 = 3$. Since $3$ can be written as $3/1$, it is a rational number."}]}, {"question": "The set of Real Numbers ($R$) is defined as the combination of which two fundamental sets of numbers?", "options": [{"text": "Natural Numbers and Integers.", "isCorrect": false, "rationale": "Natural numbers and integers are subsets of rational numbers; they do not encompass all real numbers."}, {"text": "Rational Numbers and Whole Numbers.", "isCorrect": false, "rationale": "Whole numbers are a subset of rational numbers. This combination would exclude irrational numbers, which are part of the real numbers."}, {"text": "Rational Numbers and Irrational Numbers.", "isCorrect": true, "rationale": "The text explicitly states: 'The real numbers ($R$) consist of all rational and irrational numbers together.'"}, {"text": "Integers and Irrational Numbers.", "isCorrect": false, "rationale": "This combination omits non-integer rational numbers (e.g., $1/2$), which are part of the real number system."}]}, {"question": "The text states, 'This proof works specifically for $2$. Similar arguments apply to $3$, $5$, and other square roots of non-perfect-square integers, but each requires its own careful reasoning.' What does this caution imply about proving the irrationality of numbers?", "options": [{"text": "A single, general proof method can be used for all irrational numbers, but it is extremely complex.", "isCorrect": false, "rationale": "The caution indicates that 'each requires its own careful reasoning,' suggesting that a single, universally applicable method without adaptation is not sufficient."}, {"text": "The method of proof by contradiction is only effective for square roots of prime numbers.", "isCorrect": false, "rationale": "The caution mentions 'other square roots of non-perfect-square integers,' not just prime numbers."}, {"text": "While the underlying logical principle (proof by contradiction) is similar, proving the irrationality of different non-perfect square roots requires specific adaptations or distinct steps in the argument.", "isCorrect": true, "rationale": "The phrase 'each requires its own careful reasoning' implies that while the general approach is similar, the specifics of the argument must be tailored to the particular number being proven irrational."}, {"text": "Only numbers like $2, 3, 5$ can be proven irrational; other numbers do not follow the same logical principles.", "isCorrect": false, "rationale": "The text explicitly mentions 'other square roots of non-perfect-square integers,' indicating that the concept applies beyond just $2, 3,$ and $5$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
