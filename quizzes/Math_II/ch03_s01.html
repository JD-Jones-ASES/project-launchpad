<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary distinguishing characteristic between a ratio and a rate, as defined in the textbook?", "options": [{"text": "A ratio always expresses a part-to-whole relationship, while a rate expresses a part-to-part relationship.", "isCorrect": false, "rationale": "Both ratios and rates can express various relationships (part-to-part, part-to-whole), but this is not the primary distinction given in the text."}, {"text": "A ratio compares quantities using addition, while a rate compares them using division.", "isCorrect": false, "rationale": "Both ratios and rates are comparisons by division."}, {"text": "A ratio can compare quantities with the same or different units, but a rate specifically compares quantities measured in different units.", "isCorrect": true, "rationale": "The textbook states, 'When the units differ, the ratio is called a rate.' This means a ratio is a general comparison, and a rate is a specific type of ratio where units differ."}, {"text": "A ratio is an equation that states two comparisons are equal, while a rate is a single comparison.", "isCorrect": false, "rationale": "A proportion is an equation that states two ratios are equal, not a ratio itself."}], "id": "q01"}, {"question": "Which of the following scenarios best exemplifies a unit rate?", "options": [{"text": "Comparing 3 wins to 2 losses for a sports team.", "isCorrect": false, "rationale": "This is a ratio comparing quantities with the same units (wins and losses are both types of game outcomes), not a rate with different units, nor does it have a denominator of 1."}, {"text": "The relationship between 12 inches and 1 foot.", "isCorrect": false, "rationale": "This is a conversion factor, which is a type of ratio, but it's not typically referred to as a 'unit rate' in the context of comparing two quantities measured in different fundamental units of change or consumption (like miles per hour)."}, {"text": "A car traveling 75 miles per 1 hour.", "isCorrect": true, "rationale": "This is a rate because it compares two different units (miles and hours), and it is a unit rate because the denominator is 1 (per 1 hour)."}, {"text": "A recipe requiring 2 cups of flour for every 3 cups of sugar.", "isCorrect": false, "rationale": "This is a ratio comparing quantities with the same units (cups of flour to cups of sugar), not a rate with different units."}], "id": "q02"}, {"question": "Based on the definition provided, what is a proportion?", "options": [{"text": "A comparison of two quantities using division, where the units are always the same.", "isCorrect": false, "rationale": "This describes a ratio, specifically one where units might be the same, but not a proportion."}, {"text": "An equation that states two ratios are equal.", "isCorrect": true, "rationale": "The textbook explicitly defines a proportion as 'an equation that states two ratios are equal.'"}, {"text": "A ratio whose second quantity is 100.", "isCorrect": false, "rationale": "This is the definition of a percent, not a proportion."}, {"text": "A mathematical statement involving only one variable.", "isCorrect": false, "rationale": "While proportions often involve solving for one variable, the definition of a proportion itself is about the equality of two ratios, regardless of the number of variables."}], "id": "q03"}, {"question": "If you have the proportion $a/b = c/d$, where $b \ne 0$ and $d \ne 0$, which of the following equations correctly demonstrates the Cross Products property?", "options": [{"text": "$a + d = b + c$", "isCorrect": false, "rationale": "The Cross Products property involves multiplication, not addition."}, {"text": "$ad = bc$", "isCorrect": true, "rationale": "The textbook states, 'If $a/b = c/d$ (with $b \ne 0$ and $d \ne 0$), then $ad = bc$. This property is called cross multiplication.'"}, {"text": "$a/c = b/d$", "isCorrect": false, "rationale": "While this is a valid rearrangement of the proportion (if $c \ne 0$), it is not the Cross Products property as defined, which results in an equation without fractions."}, {"text": "$a = c$ and $b = d$", "isCorrect": false, "rationale": "This is only true if the ratios are of identical numbers, not generally true for all equal ratios (e.g., $1/2 = 2/4$). The cross-products property provides a more general relationship."}], "id": "q04"}, {"question": "Solve the proportion: $x/7 = 9/14$.", "options": [{"text": "$x = 4.5$", "isCorrect": true, "rationale": "Cross-multiply: $14x = 7 \times 9$. So, $14x = 63$. Divide by 14: $x = 63/14 = 9/2 = 4.5$."}, {"text": "$x = 2$", "isCorrect": false, "rationale": "Incorrect. If $x=2$, then $2/7 \ne 9/14$ ($4/14 \ne 9/14$)."}, {"text": "$x = 9$", "isCorrect": false, "rationale": "Incorrect. If $x=9$, then $9/7 \ne 9/14$."}, {"text": "$x = 18$", "isCorrect": false, "rationale": "Incorrect. If $x=18$, then $18/7 \ne 9/14$ ($36/14 \ne 9/14$)."}], "id": "q05"}, {"question": "Solve for $z$ in the multi-step proportion: $(3z + 1)/2 = 8/3$.", "options": [{"text": "$z = 1$", "isCorrect": false, "rationale": "If $z=1$, then $(3(1)+1)/2 = 4/2 = 2$, but $8/3 \ne 2$."}, {"text": "$z = 13/9$", "isCorrect": true, "rationale": "Cross-multiply: $3(3z + 1) = 2 \times 8$. Distribute: $9z + 3 = 16$. Subtract 3: $9z = 13$. Divide by 9: $z = 13/9$."}, {"text": "$z = 5$", "isCorrect": false, "rationale": "If $z=5$, then $(3(5)+1)/2 = 16/2 = 8$, but $8/3 \ne 8$."}, {"text": "$z = 17/9$", "isCorrect": false, "rationale": "This would result from an error in arithmetic, such as adding 3 to 16 instead of subtracting."}], "id": "q06"}, {"question": "The statement '25% of the apples are green' can be correctly written as which proportion?", "options": [{"text": "$100/25 = \\text{total apples}/\\text{green apples}$", "isCorrect": false, "rationale": "This proportion inverts both the percent ratio and the part/whole ratio relative to the standard setup $part/whole = p/100$."}, {"text": "$25/\\text{total apples} = \\text{green apples}/100$", "isCorrect": false, "rationale": "This mixes the part/whole relationship incorrectly; the 'part' (25) of the percent should be in the numerator of the percent ratio."}, {"text": "$25/100 = \\text{green apples}/\\text{total apples}$", "isCorrect": true, "rationale": "This correctly sets up the proportion as $p/100 = part/whole$, where $p=25$, 'green apples' is the 'part', and 'total apples' is the 'whole'."}, {"text": "$1/4 = \\text{total apples}/\\text{green apples}$", "isCorrect": false, "rationale": "While $1/4$ is equivalent to $25/100$, this proportion incorrectly places 'total apples' as the numerator and 'green apples' as the denominator."}], "id": "q07"}, {"question": "Using a proportion, determine what number is 45% of 120.", "options": [{"text": "27", "isCorrect": false, "rationale": "Incorrect. This would be 22.5% of 120."}, {"text": "54", "isCorrect": true, "rationale": "Set up the proportion: $x/120 = 45/100$. Cross-multiply: $100x = 120 \times 45 = 5400$. Divide by 100: $x = 54$."}, {"text": "60", "isCorrect": false, "rationale": "Incorrect. This would be 50% of 120."}, {"text": "266.67", "isCorrect": false, "rationale": "Incorrect. This would be if 120 was 45% of some number ($120/x = 45/100$)."}], "id": "q08"}, {"question": "A painter uses 2.5 gallons of paint to cover 750 square feet. At the same rate, how many gallons are needed to cover 1800 square feet?", "options": [{"text": "5 gallons", "isCorrect": false, "rationale": "Incorrect. This would only cover 1500 sq ft (2.5 gallons for 750 sq ft means 5 gallons for 1500 sq ft)."}, {"text": "6 gallons", "isCorrect": true, "rationale": "Set up the proportion: $2.5/750 = x/1800$. Cross-multiply: $750x = 2.5 \times 1800$. $750x = 4500$. Divide by 750: $x = 4500/750 = 6$ gallons."}, {"text": "7.5 gallons", "isCorrect": false, "rationale": "Incorrect. This would cover 2250 sq ft (7.5 gallons for 2250 sq ft)."}, {"text": "8 gallons", "isCorrect": false, "rationale": "Incorrect. This would imply a rate of 225 sq ft/gallon, not 300 sq ft/gallon."}], "id": "q09"}, {"question": "A map has a scale of 1 inch = 15 miles. If two cities are 4.5 inches apart on the map, what is the actual distance between them?", "options": [{"text": "3 miles", "isCorrect": false, "rationale": "This would imply a scale where 15 miles is represented by 4.5 inches, which is incorrect."}, {"text": "33.75 miles", "isCorrect": false, "rationale": "This would be if the scale was approximately 1 inch = 7.5 miles."}, {"text": "45 miles", "isCorrect": false, "rationale": "This would be if the distance was 3 inches on the map (3 * 15 = 45)."}, {"text": "67.5 miles", "isCorrect": true, "rationale": "Set up the proportion: $1 \\text{ inch}/15 \\text{ miles} = 4.5 \\text{ inches}/x \\text{ miles}$. Cross-multiply: $1x = 15 \times 4.5$. So, $x = 67.5$ miles."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
