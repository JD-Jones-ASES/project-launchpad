    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what are the two primary strategies for comparing and ordering rational numbers?", "options": [{"text": "Using a number line and converting to percentages.", "isCorrect": false, "rationale": "While a number line is a helpful visual aid mentioned in the key concepts, converting to percentages is not identified as a primary strategy in the text."}, {"text": "Converting to common denominators and converting to decimals.", "isCorrect": true, "rationale": "The text explicitly states in the introduction, 'In this section you will practice two strategies: converting to common denominators and converting to decimals.' These are also summarized in the 'Strategies for Comparing Rational Numbers' key concept."}, {"text": "Converting to scientific notation and finding the greatest common factor.", "isCorrect": false, "rationale": "Scientific notation and greatest common factors are not discussed as strategies for comparing and ordering rational numbers in this section."}, {"text": "Using absolute values and cross-multiplication.", "isCorrect": false, "rationale": "The text mentions absolute values in the context of negative numbers, but cross-multiplication is not presented as a method, nor are these the two primary strategies."}]}, {"question": "Using the common denominator method, compare 4/7 and 5/9.", "options": [{"text": "4/7 < 5/9", "isCorrect": false, "rationale": "To compare, convert both fractions to a common denominator. The LCD of 7 and 9 is 63. 4/7 becomes 36/63 and 5/9 becomes 35/63. Since 36 > 35, 4/7 is greater than 5/9."}, {"text": "4/7 > 5/9", "isCorrect": true, "rationale": "The least common denominator (LCD) for 7 and 9 is 63. Converting 4/7 gives (4*9)/(7*9) = 36/63. Converting 5/9 gives (5*7)/(9*7) = 35/63. Since 36 > 35, it follows that 4/7 > 5/9."}, {"text": "4/7 = 5/9", "isCorrect": false, "rationale": "After converting to a common denominator, 4/7 is 36/63 and 5/9 is 35/63. These are not equal."}, {"text": "Cannot be determined without decimals.", "isCorrect": false, "rationale": "The common denominator method is a reliable way to compare fractions without converting to decimals."}]}, {"question": "When comparing two fractions with the same positive denominator, such as a/d and b/d where d > 0, what determines which fraction is greater?", "options": [{"text": "The fraction with the smaller numerator is greater.", "isCorrect": false, "rationale": "The property 'Comparing Fractions with a Common Denominator' states that if d > 0, then a/d < b/d if and only if a < b. This means the larger numerator corresponds to the larger fraction."}, {"text": "The fraction with the larger numerator is greater.", "isCorrect": true, "rationale": "According to the 'Comparing Fractions with a Common Denominator' property, 'If two fractions have the same positive denominator, the fraction with the larger numerator is greater.'"}, {"text": "The fractions are always equal regardless of the numerator.", "isCorrect": false, "rationale": "Fractions with the same positive denominator are only equal if their numerators are also equal."}, {"text": "The absolute value of the numerator determines the comparison.", "isCorrect": false, "rationale": "While absolute value is important for negative numbers, for positive fractions with a common positive denominator, it's the actual value of the numerator that determines the comparison, not its absolute value."}]}, {"question": "Order the following rational numbers from least to greatest using the decimal conversion method: 0.75, 2/3, 0.7.", "options": [{"text": "0.7, 0.75, 2/3", "isCorrect": false, "rationale": "Converting 2/3 to a decimal gives approximately 0.667. So the correct order should start with 2/3, not 0.7."}, {"text": "2/3, 0.7, 0.75", "isCorrect": true, "rationale": "Convert each number to a decimal: 0.75 remains 0.75; 2/3 converts to approximately 0.667; 0.7 remains 0.7. Comparing the decimals: 0.667 < 0.7 < 0.75. Therefore, the order from least to greatest is 2/3, 0.7, 0.75."}, {"text": "0.75, 0.7, 2/3", "isCorrect": false, "rationale": "This order places 0.75 as the least, which is incorrect. Also, 2/3 (0.667) should be the least of the three."}, {"text": "2/3, 0.75, 0.7", "isCorrect": false, "rationale": "While 2/3 is correctly identified as the least, 0.75 (0.75) is greater than 0.7 (0.70), so the order of the last two is incorrect."}]}, {"question": "Order the following mixed set of rational numbers from least to greatest: -1/2, -0.6, 1/3, 0.4.", "options": [{"text": "-0.6, -1/2, 0.4, 1/3", "isCorrect": false, "rationale": "While -0.6 and -1/2 are in the correct order, 0.4 is greater than 1/3 (approximately 0.333), so their order is swapped."}, {"text": "-1/2, -0.6, 1/3, 0.4", "isCorrect": false, "rationale": "Converting to decimals: -1/2 = -0.5, -0.6 = -0.6, 1/3 ≈ 0.333, 0.4 = 0.4. Comparing -0.5 and -0.6, -0.6 is smaller than -0.5, so the initial order is incorrect."}, {"text": "-0.6, -1/2, 1/3, 0.4", "isCorrect": true, "rationale": "Convert all numbers to decimals: -1/2 = -0.5; -0.6 remains -0.6; 1/3 ≈ 0.333; 0.4 remains 0.4. Comparing the decimals from least to greatest: -0.6 < -0.5 < 0.333 < 0.4. Thus, the correct order is -0.6, -1/2, 1/3, 0.4."}, {"text": "1/3, 0.4, -1/2, -0.6", "isCorrect": false, "rationale": "This order incorrectly places positive numbers before negative numbers, which are always greater than negative numbers."}]}, {"question": "When comparing two negative rational numbers, such as -5 and -2, which statement is true?", "options": [{"text": "The number with the larger absolute value is the greater number.", "isCorrect": false, "rationale": "As stated in the 'caution' box, 'When comparing negative numbers, the one with the larger absolute value is actually the smaller number.' For example, |-5| = 5 and |-2| = 2, but -5 < -2."}, {"text": "The number with the smaller absolute value is the greater number.", "isCorrect": true, "rationale": "The 'caution' box explains this: 'When comparing negative numbers, the one with the larger absolute value is actually the smaller number. For example, -5 < -2 even though 5 > 2.' This means the number closer to zero (with the smaller absolute value) is greater."}, {"text": "Negative numbers cannot be compared unless converted to positive numbers.", "isCorrect": false, "rationale": "Negative numbers can be directly compared, for example, by their position on a number line or by considering their absolute values in reverse order."}, {"text": "Both numbers are always considered equal if their positive counterparts are different.", "isCorrect": false, "rationale": "This statement is incorrect. Two numbers are equal only if they represent the same value. Different positive counterparts imply different absolute values, leading to different negative numbers."}]}, {"question": "A carpenter has three pieces of wood with lengths: 3/4 meters, 0.7 meters, and 0.78 meters. Order these lengths from shortest to longest.", "options": [{"text": "0.7, 3/4, 0.78", "isCorrect": true, "rationale": "Convert 3/4 to a decimal: 3/4 = 0.75. Now compare the decimals: 0.7, 0.75, 0.78. Ordering from shortest to longest (least to greatest) gives 0.7, 0.75 (which is 3/4), 0.78."}, {"text": "3/4, 0.7, 0.78", "isCorrect": false, "rationale": "3/4 converts to 0.75. This is greater than 0.7, so 0.7 should come before 3/4."}, {"text": "0.78, 3/4, 0.7", "isCorrect": false, "rationale": "This order incorrectly places the longest length first and the shortest length last."}, {"text": "0.7, 0.78, 3/4", "isCorrect": false, "rationale": "This order incorrectly places 0.78 (0.78) before 3/4 (0.75), when 0.78 is greater."}]}, {"question": "According to the text, under what circumstances might converting rational numbers to decimals be a faster method for comparison than using common denominators?", "options": [{"text": "When the denominators are very small prime numbers.", "isCorrect": false, "rationale": "When denominators are small, finding the LCD is often straightforward, making the common denominator method efficient."}, {"text": "When one or both numbers are already given as decimals.", "isCorrect": true, "rationale": "The text states: 'Sometimes converting to decimals is faster, especially when one or both numbers are already given as decimals.' This minimizes the conversion steps required."}, {"text": "When the fractions have very large numerators.", "isCorrect": false, "rationale": "The size of the numerator does not inherently make decimal conversion faster than common denominators; the presence of existing decimals or ease of decimal conversion is key."}, {"text": "When trying to compare more than two fractions at once.", "isCorrect": false, "rationale": "While converting to decimals is useful for ordering multiple numbers, the primary reason for speed isn't just the quantity but the format of the numbers (already being decimals)."}]}, {"question": "Which of the following rational numbers is greater: -0.8 or -7/9?", "options": [{"text": "-0.8", "isCorrect": false, "rationale": "Convert -7/9 to a decimal: -7/9 ≈ -0.777... Comparing -0.800 and -0.777..., -0.777 is closer to zero on the number line, making it the greater number. Therefore, -0.8 is smaller."}, {"text": "-7/9", "isCorrect": true, "rationale": "To compare, convert -7/9 to its decimal form, which is approximately -0.777.... Now compare -0.8 and -0.777.... On a number line, numbers to the right are greater. Since -0.777 is to the right of -0.8, -7/9 is the greater number."}, {"text": "They are equal.", "isCorrect": false, "rationale": "Converting to decimals shows -0.8 and -0.777... are clearly not equal."}, {"text": "It depends on whether they are positive or negative.", "isCorrect": false, "rationale": "The numbers are given as negative, so the comparison can be definitively made using the rules for negative numbers."}]}, {"question": "When ordering a mixed set of rational numbers (e.g., fractions, decimals, and integers), what does the text suggest is the most reliable approach?", "options": [{"text": "Convert all numbers to their fractional form and find a common numerator.", "isCorrect": false, "rationale": "The text recommends converting to a common denominator for fractions, not a common numerator, and generally suggests decimals for mixed sets."}, {"text": "Convert all numbers to decimals and compare them.", "isCorrect": true, "rationale": "The section 'Ordering Mixed Sets of Rational Numbers' states, 'The most reliable approach is to convert everything to the same form—usually decimals—before ordering.'"}, {"text": "Plot all numbers on a number line without conversion.", "isCorrect": false, "rationale": "While a number line is a useful visual, accurately plotting and comparing mixed forms (especially fractions and decimals) without prior conversion can be difficult and prone to error, making it less reliable for precise ordering."}, {"text": "Round all numbers to the nearest integer and then compare.", "isCorrect": false, "rationale": "Rounding to the nearest integer would often lead to loss of precision and incorrect ordering, as it changes the value of the rational number."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
