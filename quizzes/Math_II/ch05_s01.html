<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between an equation and an inequality, as described in the textbook section?", "options": [{"text": "Equations use variables, while inequalities do not.", "isCorrect": false, "rationale": "Both equations and inequalities use variables to represent unknown quantities, as seen in examples like 'x > -3'."}, {"text": "Equations compare two expressions using an equality sign, while inequalities use comparison symbols to show quantities are not necessarily equal.", "isCorrect": true, "rationale": "The text states equations are 'statements that two expressions are equal,' while inequalities compare expressions using symbols like '<', '>', '≤', or '≥' to describe situations where quantities are 'not equal'."}, {"text": "Equations can be graphed on a number line, but inequalities cannot.", "isCorrect": false, "rationale": "The section explicitly demonstrates how to graph inequalities in one variable on a number line."}, {"text": "Equations always have one solution, while inequalities always have multiple solutions.", "isCorrect": false, "rationale": "While inequalities often have multiple solutions, the defining characteristic is the comparison of expressions, not the number of solutions. Also, not all equations have exactly one solution (e.g., identities)."}], "id": "q01"}, {"question": "A recipe calls for 'at most 2 cups of flour.' If 'f' represents the amount of flour, which inequality correctly expresses this statement?", "options": [{"text": "f < 2", "isCorrect": false, "rationale": "The phrase 'at most' implies that the amount can be 2 cups or less, so strictly less than (<) is incorrect as it excludes 2."}, {"text": "f > 2", "isCorrect": false, "rationale": "'At most' means the quantity cannot exceed 2, so 'greater than' is the opposite of the correct interpretation."}, {"text": "f ≤ 2", "isCorrect": true, "rationale": "According to the 'Common Inequality Phrases' concept, 'at most' translates to 'less than or equal to,' including the boundary value."}, {"text": "f = 2", "isCorrect": false, "rationale": "This is an equation, implying the amount must be exactly 2 cups, which contradicts 'at most 2 cups' as it doesn't allow for less than 2."}], "id": "q02"}, {"question": "The minimum height requirement for a roller coaster is 54 inches. If 'h' represents a rider's height, which inequality correctly expresses this requirement?", "options": [{"text": "h > 54", "isCorrect": false, "rationale": "'Minimum' means 'at least,' which includes the boundary value of 54 inches. This option excludes 54."}, {"text": "h < 54", "isCorrect": false, "rationale": "This implies the height must be less than 54 inches, which is the opposite of a minimum height requirement."}, {"text": "h ≥ 54", "isCorrect": true, "rationale": "The phrase 'at least' (or 'minimum') translates to 'greater than or equal to,' meaning the height must be 54 inches or more to be eligible."}, {"text": "h = 54", "isCorrect": false, "rationale": "This is an equation, stating the height must be exactly 54 inches, which does not account for heights greater than 54 that would also be eligible."}], "id": "q03"}, {"question": "Which statement accurately describes the meaning of the inequality a > b?", "options": [{"text": "“a is less than b”", "isCorrect": false, "rationale": "This describes 'a < b'."}, {"text": "“a is less than or equal to b”", "isCorrect": false, "rationale": "This describes 'a ≤ b'."}, {"text": "“a is greater than b”", "isCorrect": true, "rationale": "As defined in the 'keyterm[Inequality]' section, 'a > b' means 'a is greater than b'."}, {"text": "“a is greater than or equal to b”", "isCorrect": false, "rationale": "This describes 'a ≥ b'."}], "id": "q04"}, {"question": "When graphing an inequality on a number line, an open circle is used for which of the following symbols?", "options": [{"text": "≤", "isCorrect": false, "rationale": "The 'Open and Closed Circles' property states that a closed circle is used for '≤'."}, {"text": "≥", "isCorrect": false, "rationale": "The 'Open and Closed Circles' property states that a closed circle is used for '≥'."}, {"text": "< or >", "isCorrect": true, "rationale": "The 'Open and Closed Circles' property clearly states, 'Use an open circle ( ) for < or >. The boundary value is not part of the solution.'"}, {"text": "=", "isCorrect": false, "rationale": "The equals sign is used for equations, not inequalities, and its representation on a number line is typically a single point, not an open or closed circle indicating a range."}], "id": "q05"}, {"question": "How would the inequality x ≤ -3 be correctly graphed on a number line?", "options": [{"text": "An open circle at -3, with shading to the right.", "isCorrect": false, "rationale": "The symbol '≤' requires a closed circle, and 'less than' requires shading to the left."}, {"text": "A closed circle at -3, with shading to the left.", "isCorrect": true, "rationale": "According to the 'Open and Closed Circles' property, '≤' requires a closed circle, and 'less than' requires shading to the left, as exemplified by 'x ≤ 100'."}, {"text": "An open circle at -3, with shading to the left.", "isCorrect": false, "rationale": "The symbol '≤' requires a closed circle, not an open one."}, {"text": "A closed circle at -3, with shading to the right.", "isCorrect": false, "rationale": "While '≤' requires a closed circle, 'less than' requires shading to the left, not the right."}], "id": "q06"}, {"question": "Which description accurately represents the graph of x > 0 on a number line?", "options": [{"text": "A closed circle at 0, shaded to the right.", "isCorrect": false, "rationale": "The symbol '>' indicates that the boundary value is not included, so an open circle is required, not a closed one."}, {"text": "An open circle at 0, shaded to the left.", "isCorrect": false, "rationale": "While an open circle is correct, 'greater than' requires shading to the right, not the left."}, {"text": "An open circle at 0, shaded to the right.", "isCorrect": true, "rationale": "As per the 'checkpoint' example and 'Open and Closed Circles' property, '>' requires an open circle at the boundary and shading to the right for 'greater than'."}, {"text": "A closed circle at 0, shaded to the left.", "isCorrect": false, "rationale": "Both the circle type (should be open) and shading direction (should be right) are incorrect for 'x > 0'."}], "id": "q07"}, {"question": "A graph shows an open circle at 5 and is shaded to the left. Which inequality does this graph represent?", "options": [{"text": "x ≤ 5", "isCorrect": false, "rationale": "A closed circle would be used for '≤', not an open circle."}, {"text": "x > 5", "isCorrect": false, "rationale": "Shading to the left indicates 'less than', and shading to the right would be used for '>'. Also, '>' implies an open circle, which is correct, but the shading is wrong."}, {"text": "x < 5", "isCorrect": true, "rationale": "An open circle signifies that the boundary value is not included, and shading to the left indicates 'less than', consistent with 'x < 5'."}, {"text": "x ≥ 5", "isCorrect": false, "rationale": "Both a closed circle would be used for '≥', and shading to the right would be used, making this option incorrect."}], "id": "q08"}, {"question": "A graph displays a closed circle at -2 and is shaded to the right. Which inequality matches this graph?", "options": [{"text": "x < -2", "isCorrect": false, "rationale": "This would use an open circle and shade to the left."}, {"text": "x > -2", "isCorrect": false, "rationale": "This would use an open circle, even though shading to the right is correct. The circle type is wrong."}, {"text": "x ≤ -2", "isCorrect": false, "rationale": "This would shade to the left, not the right."}, {"text": "x ≥ -2", "isCorrect": true, "rationale": "As shown in the 'Graphing an Inequality' example, a closed circle at -2 and shading to the right correctly represents 'x ≥ -2', meaning 'x is greater than or equal to -2'."}], "id": "q09"}, {"question": "A store advertises that items are 'up to 50% off.' If 'd' represents the discount percentage, which inequality and graph description accurately reflect this statement?", "options": [{"text": "d < 50; open circle at 50, shaded left.", "isCorrect": false, "rationale": "'Up to' includes the boundary value, so a closed circle is needed, and 'less than' is correct but should include 50."}, {"text": "d ≥ 50; closed circle at 50, shaded right.", "isCorrect": false, "rationale": "'Up to' means the discount cannot exceed 50%, so 'greater than or equal to' is incorrect."}, {"text": "d ≤ 50; closed circle at 50, shaded left.", "isCorrect": true, "rationale": "'Up to' is synonymous with 'at most,' which translates to 'less than or equal to.' This requires a closed circle at 50 and shading to the left, indicating discounts from 0% to 50% (inclusive)."}, {"text": "d > 50; open circle at 50, shaded right.", "isCorrect": false, "rationale": "This would mean the discount is strictly more than 50%, which contradicts 'up to 50% off.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
