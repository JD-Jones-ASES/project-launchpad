<head>
    <meta charset="UTF-8">

    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of an arithmetic sequence?", "options": [{"text": "Each term is found by multiplying the previous term by a constant ratio.", "isCorrect": false, "rationale": "This describes a geometric sequence, not an arithmetic sequence, which is characterized by addition or subtraction."}, {"text": "The difference between consecutive terms is constant.", "isCorrect": true, "rationale": "According to the definition, an arithmetic sequence is one where the difference between any term and its preceding term is always the same constant, known as the common difference."}, {"text": "Each term is the sum of the two preceding terms.", "isCorrect": false, "rationale": "This describes a Fibonacci-like sequence, which is not necessarily arithmetic."}, {"text": "The terms alternate between positive and negative values.", "isCorrect": false, "rationale": "An alternating sequence does not inherently define an arithmetic sequence; the common difference must be constant regardless of the sign pattern."}], "id": "q01"}, {"question": "Which of the following sequences is an arithmetic sequence, and what is its common difference?", "options": [{"text": "1, 3, 6, 10, ...; d=2", "isCorrect": false, "rationale": "The differences are 3-1=2, 6-3=3, 10-6=4, which are not constant. Therefore, it is not an arithmetic sequence."}, {"text": "5, 10, 15, 20, ...; d=5", "isCorrect": true, "rationale": "The differences are 10-5=5, 15-10=5, 20-15=5. Since the difference is consistently 5, this is an arithmetic sequence with a common difference d=5."}, {"text": "2, 4, 8, 16, ...; d=2", "isCorrect": false, "rationale": "The differences are 4-2=2, 8-4=4, 16-8=8, which are not constant. This is a geometric sequence where each term is multiplied by 2."}, {"text": "10, 7, 3, 0, ...; d=-3", "isCorrect": false, "rationale": "The differences are 7-10=-3, 3-7=-4, 0-3=-3. The differences are not constant (-3, -4, -3), so it is not an arithmetic sequence."}], "id": "q02"}, {"question": "Given the arithmetic sequence 18, 13, 8, 3, ..., what are the next two terms?", "options": [{"text": "-2, -7", "isCorrect": true, "rationale": "First, find the common difference: 13 - 18 = -5. Then, subtract 5 from the last given term (3 - 5 = -2) and from that result (-2 - 5 = -7). So the next two terms are -2 and -7."}, {"text": "0, -3", "isCorrect": false, "rationale": "This assumes an incorrect common difference or calculation. The common difference is -5, not -3."}, {"text": "-1, -5", "isCorrect": false, "rationale": "This does not follow the consistent common difference of -5. The first term is correct but the second is not."}, {"text": "2, -1", "isCorrect": false, "rationale": "This assumes an incorrect common difference or calculation. The common difference is -5, not -1."}], "id": "q03"}, {"question": "In the explicit formula for an arithmetic sequence, $a_n = a_1 + (n - 1)d$, what does the variable 'n' represent?", "options": [{"text": "The value of the first term in the sequence.", "isCorrect": false, "rationale": "The variable $a_1$ represents the value of the first term."}, {"text": "The common difference between consecutive terms.", "isCorrect": false, "rationale": "The variable $d$ represents the common difference."}, {"text": "The term number or position of the term in the sequence.", "isCorrect": true, "rationale": "The variable 'n' signifies which term in the sequence is being referred to (e.g., the 1st, 2nd, 3rd, ..., nth term)."}, {"text": "The sum of all terms up to $a_n$.", "isCorrect": false, "rationale": "The explicit formula calculates the value of a specific term, not the sum of terms."}], "id": "q04"}, {"question": "An arithmetic sequence has a first term $a_1 = -4$ and a common difference $d = 6$. What is the value of the 15th term ($a_{15}$)?", "options": [{"text": "76", "isCorrect": false, "rationale": "This would be the result if $a_1$ was -8 or if there was a calculation error in applying the formula."}, {"text": "80", "isCorrect": true, "rationale": "Using the explicit formula $a_n = a_1 + (n - 1)d$, we have $a_{15} = -4 + (15 - 1)(6) = -4 + (14)(6) = -4 + 84 = 80$."}, {"text": "90", "isCorrect": false, "rationale": "This would be the result if the formula was incorrectly applied as $a_1 + nd$ (e.g., $-4 + 15 \times 6 = 86$, or other miscalculation)."}, {"text": "84", "isCorrect": false, "rationale": "This is the product of (n-1) and d (14 * 6) but does not include the addition of $a_1$."}], "id": "q05"}, {"question": "For the arithmetic sequence 25, 21, 17, 13, ..., what is its explicit formula?", "options": [{"text": "$a_n = 25 - 4n$", "isCorrect": false, "rationale": "While the common difference is -4, this formula incorrectly sets the constant term. The (n-1) part of the formula is not properly distributed and combined."}, {"text": "$a_n = 29 - 4n$", "isCorrect": true, "rationale": "The first term $a_1 = 25$. The common difference $d = 21 - 25 = -4$. Using the formula $a_n = a_1 + (n - 1)d$, we get $a_n = 25 + (n - 1)(-4) = 25 - 4n + 4 = 29 - 4n$."}, {"text": "$a_n = 4n + 21$", "isCorrect": false, "rationale": "This formula uses an incorrect common difference (positive 4 instead of negative 4) and an incorrect starting value."}, {"text": "$a_n = 25 + (n+1)4$", "isCorrect": false, "rationale": "This formula incorrectly uses (n+1) instead of (n-1) and an incorrect sign for the common difference."}], "id": "q06"}, {"question": "How does the common difference $d$ of an arithmetic sequence relate to its representation as a linear function $f(n)$?", "options": [{"text": "The common difference $d$ represents the y-intercept of the linear function.", "isCorrect": false, "rationale": "The y-intercept (or the 'zeroth term') is represented by $a_1 - d$, not $d$ itself."}, {"text": "The common difference $d$ represents the x-intercept of the linear function.", "isCorrect": false, "rationale": "The common difference does not directly represent the x-intercept."}, {"text": "The common difference $d$ represents the slope of the linear function.", "isCorrect": true, "rationale": "As stated in the text, 'The common difference $d$ plays the role of the slope,' indicating how the function's value changes with each increment of n."}, {"text": "The common difference $d$ determines if the function is increasing or decreasing, but not its slope.", "isCorrect": false, "rationale": "While $d$ does determine if the function is increasing (if $d>0$) or decreasing (if $d<0$), it is precisely the slope, representing the rate of change."}], "id": "q07"}, {"question": "Express the arithmetic sequence 7, 10, 13, 16, ... as a linear function $f(n)$ and find $f(25)$.", "options": [{"text": "$f(n) = 3n + 7$; $f(25) = 82$", "isCorrect": false, "rationale": "This formula mistakenly uses the first term as the y-intercept, which is incorrect for a linear function derived from $a_n = a_1 + (n-1)d$."}, {"text": "$f(n) = 3n + 4$; $f(25) = 79$", "isCorrect": true, "rationale": "The first term $a_1 = 7$ and the common difference $d = 10 - 7 = 3$. Using $f(n) = a_1 + (n - 1)d$, we get $f(n) = 7 + (n - 1)(3) = 7 + 3n - 3 = 3n + 4$. Then, $f(25) = 3(25) + 4 = 75 + 4 = 79$."}, {"text": "$f(n) = 4n + 3$; $f(25) = 103$", "isCorrect": false, "rationale": "This formula uses an incorrect common difference ($d=4$) and an incorrect starting value relative to the sequence."}, {"text": "$f(n) = 7n + 3$; $f(25) = 178$", "isCorrect": false, "rationale": "This formula incorrectly assigns the common difference and the first term to the wrong parts of the linear function."}], "id": "q08"}, {"question": "A small business starts with $1500 in its petty cash fund and adds $75 to the fund at the end of each week. Which formula represents the amount $A$ in the fund after $n$ weeks, and what is the amount after 10 weeks?", "options": [{"text": "$A = 1500 + 75n$; $A(10) = 2250$", "isCorrect": true, "rationale": "The initial amount is $1500, which serves as the starting value (A_0). Since $75 is added each week, this is the common difference, or the rate of increase. So, $A = 1500 + 75n$. After 10 weeks, $A(10) = 1500 + 75(10) = 1500 + 750 = 2250$."}, {"text": "$A = 1500 + (n-1)75$; $A(10) = 2175$", "isCorrect": false, "rationale": "This formula would be correct if $1500 was the amount *after* the first week, and n=1 meant the first week. However, 'starts with $1500' implies $A_0 = 1500$ (at week 0), not $a_1$. If $A_0$ is used, the formula $A_n = A_0 + nd$ is more appropriate for direct application."}, {"text": "$A = 75n + 1500$; $A(10) = 2025$", "isCorrect": false, "rationale": "While the formula $A = 75n + 1500$ is correct, the calculation for $A(10)$ is incorrect. $75(10) + 1500 = 750 + 1500 = 2250$."}, {"text": "$A = 1500n + 75$; $A(10) = 15075$", "isCorrect": false, "rationale": "This formula incorrectly implies that $1500 is added each week multiplied by the number of weeks, and $75 is a constant, which is the opposite of the problem description."}], "id": "q09"}, {"question": "A library displays books on shelves. The first shelf has 30 books, and each subsequent shelf has 4 more books than the shelf below it. How many books are on the 8th shelf?", "options": [{"text": "54", "isCorrect": false, "rationale": "This result would occur if the formula was $a_1 + (n-2)d$, or if there was a miscalculation where 6 times the common difference was added."}, {"text": "58", "isCorrect": true, "rationale": "This is an arithmetic sequence with $a_1 = 30$ and common difference $d = 4$. To find the number of books on the 8th shelf ($a_8$), use the formula $a_n = a_1 + (n - 1)d$: $a_8 = 30 + (8 - 1)(4) = 30 + (7)(4) = 30 + 28 = 58$."}, {"text": "62", "isCorrect": false, "rationale": "This result would occur if the formula was $a_1 + nd$, or if there was a miscalculation where 8 times the common difference was added."}, {"text": "66", "isCorrect": false, "rationale": "This result would occur if the formula was $a_1 + (n+1)d$, or if there was a miscalculation where 9 times the common difference was added."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
