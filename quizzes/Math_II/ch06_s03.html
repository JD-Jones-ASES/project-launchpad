        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes what volume measures and its standard units?", "options": [{"text": "Volume measures the total surface area of a three-dimensional figure, expressed in square units.", "isCorrect": false, "rationale": "Surface area measures the exterior area, not the space inside, and is measured in square units."}, {"text": "Volume measures the amount of space inside a three-dimensional figure, expressed in cubic units.", "isCorrect": true, "rationale": "The definition states, 'Volume measures the amount of space inside a three-dimensional figure' and 'Volume is measured in cubic units such as cm³, in.³, or ft³.'"}, {"text": "Volume measures the perimeter of the base of a three-dimensional figure, expressed in linear units.", "isCorrect": false, "rationale": "Perimeter measures the distance around a two-dimensional shape, not the space inside a 3D figure."}, {"text": "Volume measures the weight of a three-dimensional figure, expressed in grams or kilograms.", "isCorrect": false, "rationale": "Weight measures mass under gravity, which is distinct from the spatial extent of an object."}]}, {"question": "A gift box is shaped like a rectangular prism with a length of 15 cm, a width of 8 cm, and a height of 5 cm. What is the volume of the gift box?", "options": [{"text": "120 cm³", "isCorrect": false, "rationale": "This calculation (15 * 8 = 120) only accounts for the base area, neglecting the height."}, {"text": "23 cm³", "isCorrect": false, "rationale": "This calculation (15 + 8 + 5 = 28, or some other incorrect sum) is not the correct way to find volume."}, {"text": "600 cm³", "isCorrect": true, "rationale": "For a rectangular prism, V = lwh. So, V = (15 cm)(8 cm)(5 cm) = 600 cm³."}, {"text": "115 cm³", "isCorrect": false, "rationale": "This calculation (15 * 5 + 8 * 5 = 75 + 40 = 115) incorrectly combines dimensions or represents a partial area calculation."}]}, {"question": "What is the universal formula for the volume of any prism, regardless of the shape of its base?", "options": [{"text": "V = lwh", "isCorrect": false, "rationale": "This formula is specific to rectangular prisms, where 'B' (base area) is replaced by 'lw'."}, {"text": "V = Bh", "isCorrect": true, "rationale": "The text states, 'For any prism with base area B and height h: V = Bh'. This is the general formula."}, {"text": "V = πr²h", "isCorrect": false, "rationale": "This is the formula for the volume of a cylinder, not a general prism."}, {"text": "V = (1/3)Bh", "isCorrect": false, "rationale": "This is the formula for the volume of a pyramid, not a prism."}]}, {"question": "A ramp is shaped like a triangular prism. Its triangular base has a base length of 4 feet and a height of 1.5 feet. The length of the ramp (height of the prism) is 10 feet. What is the volume of the ramp?", "options": [{"text": "60 cubic feet", "isCorrect": false, "rationale": "This calculation (4 * 1.5 * 10 = 60) incorrectly assumes the base is a rectangle, not a triangle, failing to divide by 2 for the base area."}, {"text": "30 cubic feet", "isCorrect": true, "rationale": "First, calculate the base area (B) of the triangle: B = (1/2) * base * height = (1/2) * 4 ft * 1.5 ft = 3 ft². Then, use the prism volume formula V = Bh = 3 ft² * 10 ft = 30 ft³."}, {"text": "15 cubic feet", "isCorrect": false, "rationale": "This calculation (1/2 * 1.5 * 10 * 2?) is a misapplication of the formula or a calculation error."}, {"text": "12 cubic feet", "isCorrect": false, "rationale": "This calculation (4 * 1.5 * 2 = 12) might be a calculation error or a misapplication of the area formula."}]}, {"question": "A cylindrical storage tank has a radius of 5 meters and a height of 12 meters. What is the exact volume of the tank in cubic meters?", "options": [{"text": "60π m³", "isCorrect": false, "rationale": "This calculation (π * 5 * 12 = 60π) incorrectly uses 'r' instead of 'r²' in the formula."}, {"text": "300π m³", "isCorrect": true, "rationale": "The volume of a cylinder is V = πr²h. So, V = π * (5 m)² * 12 m = π * 25 m² * 12 m = 300π m³."}, {"text": "120π m³", "isCorrect": false, "rationale": "This calculation (π * 5 * 12 * 2?) represents an incorrect application of the formula."}, {"text": "180π m³", "isCorrect": false, "rationale": "This calculation represents a miscalculation or incorrect application of the formula."}]}, {"question": "A homeowner is planning to fill a cylindrical planter with soil. The planter has a diameter of 10 inches and a depth of 12 inches. Approximately how many cubic inches of soil will it hold? (Use π ≈ 3.14)", "options": [{"text": "376.8 cubic inches", "isCorrect": false, "rationale": "This calculation (3.14 * 10 * 12 = 376.8) incorrectly uses the diameter as the radius in the formula and misses squaring the radius."}, {"text": "942 cubic inches", "isCorrect": true, "rationale": "First, find the radius: r = diameter / 2 = 10 inches / 2 = 5 inches. Then, V = πr²h ≈ 3.14 * (5 inches)² * 12 inches = 3.14 * 25 inches² * 12 inches = 3.14 * 300 inches³ = 942 cubic inches."}, {"text": "471 cubic inches", "isCorrect": false, "rationale": "This calculation (3.14 * 5 * 12 * 2 / 2? or 3.14 * 5 * 10 * 3?) represents an error in squaring the radius or a general miscalculation."}, {"text": "1884 cubic inches", "isCorrect": false, "rationale": "This calculation (3.14 * 10² * 12 = 3.14 * 100 * 12 = 3768. Or 3.14 * 10 * 12 * 5?) suggests using the diameter squared or another error."}]}, {"question": "A laboratory flask has a volume of 750 cm³. Based on the 'Science Connection' note, what is its capacity in milliliters?", "options": [{"text": "75 mL", "isCorrect": false, "rationale": "This implies a division by 10, which is incorrect for this conversion."}, {"text": "750 mL", "isCorrect": true, "rationale": "The text states, 'In science, 1 cm³ = 1 mL'. Therefore, 750 cm³ is equivalent to 750 mL."}, {"text": "7500 mL", "isCorrect": false, "rationale": "This implies a multiplication by 10, which is incorrect for this conversion."}, {"text": "0.75 mL", "isCorrect": false, "rationale": "This implies a division by 1000, which is incorrect for this specific conversion (though 750 mL = 0.75 L)."}]}, {"question": "A cylindrical measuring cup has a radius of 4 cm and a height of 15 cm. Approximately what is its maximum capacity in milliliters? (Use π ≈ 3.14)", "options": [{"text": "188.4 mL", "isCorrect": false, "rationale": "This calculation (3.14 * 4 * 15 = 188.4) incorrectly uses 'r' instead of 'r²' in the volume formula."}, {"text": "753.6 mL", "isCorrect": true, "rationale": "First, find the volume in cm³: V = πr²h ≈ 3.14 * (4 cm)² * 15 cm = 3.14 * 16 cm² * 15 cm = 3.14 * 240 cm³ = 753.6 cm³. Since 1 cm³ = 1 mL, the capacity is approximately 753.6 mL."}, {"text": "376.8 mL", "isCorrect": false, "rationale": "This calculation (3.14 * 2² * 15 = 188.4, which is half of 376.8 or other calculation error) suggests using half the radius or a different calculation mistake."}, {"text": "240 mL", "isCorrect": false, "rationale": "This calculation (4² * 15 = 240) forgets to multiply by π, which is essential for cylinder volume."}]}, {"question": "Which statement accurately describes the relationship between the volume formula for a prism and a cylinder, as implied by the text's examples?", "options": [{"text": "Both use the general formula V = Bh, where B is the area of the base. For a prism, B is calculated by multiplying length and width (or 1/2 base x height for a triangular base), and for a cylinder, B is πr².", "isCorrect": true, "rationale": "The text states V=Bh for any prism. It shows lwh for rectangular (B=lw) and (1/2 base x height) for triangular. For cylinders, while the property box has a typo, the examples explicitly use πr² for the base area (implied by calculations like (4)^2(1.5) = 24π which then is multiplied by 3.14 for a decimal result)."}, {"text": "The formula V = Bh is only for prisms, while cylinders exclusively use V = r²h, without any pi (π) factor.", "isCorrect": false, "rationale": "While the text's property box for a cylinder shows V = r²h (likely a typo), the accompanying examples consistently use π in their calculations (e.g., 24π multiplied by 3.14), indicating that π is part of the cylinder's base area calculation. Therefore, B for a cylinder is πr²."}, {"text": "A cylinder is a type of prism with a circular base, so their volume calculations are identical without any distinctions.", "isCorrect": false, "rationale": "A cylinder is not strictly a prism; prisms have polygonal bases. While both use a 'Base Area × Height' concept, the method for calculating the base area 'B' differs significantly due to the circular versus polygonal base."}, {"text": "Prisms and cylinders use entirely different formulas that have no common elements or principles.", "isCorrect": false, "rationale": "Both share the fundamental principle of 'Base Area × Height', making this statement incorrect."}]}, {"question": "A manufacturer wants to create a new product container. They consider two designs with the same height (h): a square-based prism with side length 's' and a cylinder with radius 'r'. If they want both containers to hold approximately the same volume, what relationship between 's' and 'r' should they aim for?", "options": [{"text": "s = r", "isCorrect": false, "rationale": "If s = r, then the square base area is s² = r², while the circular base area is πr². Since π ≈ 3.14, the cylinder would have a significantly larger volume."}, {"text": "s = πr", "isCorrect": false, "rationale": "If s = πr, the square base area would be (πr)² = π²r², which is much larger than the cylinder's base area of πr²."}, {"text": "s = r√π", "isCorrect": true, "rationale": "For the volumes to be equal (V_prism = V_cylinder), their base areas must be equal (B_prism = B_cylinder) since their heights are the same. So, s² = πr². Taking the square root of both sides gives s = √(πr²) = r√π."}, {"text": "s = r/π", "isCorrect": false, "rationale": "If s = r/π, the square base area would be (r/π)² = r²/π², which is significantly smaller than the cylinder's base area of πr²."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
