<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is the fraction in simplest form for the terminating decimal 0.35?", "options": [{"text": "3/5", "isCorrect": false, "rationale": "Incorrect. 3/5 is equivalent to 0.6. The denominator for 0.35 should reflect the hundredths place."}, {"text": "7/20", "isCorrect": true, "rationale": "Correct. The decimal 0.35 can be written as 35/100. When simplified by dividing both the numerator and denominator by their greatest common factor, 5, the fraction becomes 7/20."}, {"text": "35/10", "isCorrect": false, "rationale": "Incorrect. The denominator is determined by the last decimal place, which is hundredths, so it should be 100, not 10."}, {"text": "1/3", "isCorrect": false, "rationale": "Incorrect. 1/3 is equivalent to the repeating decimal 0.333..., not 0.35."}], "id": "q01"}, {"question": "Convert the decimal 2.6 into a fraction in its simplest form.", "options": [{"text": "26/10", "isCorrect": false, "rationale": "Incorrect. While 26/10 is equivalent to 2.6, it is not in its simplest form, as both numerator and denominator can be divided by 2."}, {"text": "13/5", "isCorrect": true, "rationale": "Correct. The decimal 2.6 can be written as 26/10. Dividing both the numerator and the denominator by their greatest common divisor, 2, results in the simplest form 13/5."}, {"text": "2 and 3/5", "isCorrect": false, "rationale": "Incorrect. This is a mixed number, not an improper fraction in simplest form, which is typically expected for such conversions unless specified otherwise, consistent with the example in the text."}, {"text": "5/13", "isCorrect": false, "rationale": "Incorrect. This is the reciprocal of the correct fraction."}], "id": "q02"}, {"question": "To convert the repeating decimal $0.5$ ($0.555...$) to a fraction using the algebraic method, which equation should be subtracted from $10x = 5.555...$ to eliminate the repeating part?", "options": [{"text": "$100x = 55.555...$", "isCorrect": false, "rationale": "Incorrect. Multiplying by 100 is for two-digit repeating blocks. Also, this is not the original equation for x."}, {"text": "$x = 0.555...$", "isCorrect": true, "rationale": "Correct. According to the algebraic method, you let $x$ equal the repeating decimal, then multiply $x$ by a power of 10. Subtracting the original equation ($x = 0.555...$) from the multiplied equation ($10x = 5.555...$) precisely eliminates the repeating decimal part."}, {"text": "$x = 5/10$", "isCorrect": false, "rationale": "Incorrect. This is the target fraction, not an equation used in the subtraction step of the algebraic method."}, {"text": "$10x = 0.555...$", "isCorrect": false, "rationale": "Incorrect. If $x = 0.555...$, then $10x$ would be $5.555...$, not $0.555...$."}], "id": "q03"}, {"question": "What is the correct fraction in simplest form for the repeating decimal $0.45$ ($0.4545...$)?", "options": [{"text": "45/100", "isCorrect": false, "rationale": "Incorrect. This fraction represents the terminating decimal 0.45, not the repeating decimal 0.45."}, {"text": "9/20", "isCorrect": false, "rationale": "Incorrect. This is the simplified fraction for the terminating decimal 0.45."}, {"text": "5/11", "isCorrect": true, "rationale": "Correct. Let $x = 0.4545...$. Since the repeating block has two digits, multiply by $10^2 = 100$: $100x = 45.4545...$. Subtracting the original equation from this gives $100x - x = 45.4545... - 0.4545...$, which simplifies to $99x = 45$. Solving for $x$ yields $x = 45/99$. Dividing both numerator and denominator by 9 gives the simplest form, 5/11."}, {"text": "45/99", "isCorrect": false, "rationale": "Incorrect. While this fraction is equivalent to the decimal, it is not in simplest form, as both numerator and denominator can be divided by 9."}], "id": "q04"}, {"question": "Consider the decimal $0.16$ ($0.1666...$). When converting it to a fraction using the algebraic method, which subtraction is crucial for eliminating the repeating part?", "options": [{"text": "$100x - x = 16.666 - 0.166$", "isCorrect": false, "rationale": "Incorrect. This subtraction would be for a purely repeating decimal like $0.16$, and the values on the right side are not correctly aligned or calculated for $x = 0.1666...$"}, {"text": "$10x - x = 1.666 - 0.166$", "isCorrect": false, "rationale": "Incorrect. This subtraction would not eliminate the repeating part correctly. It would result in $9x = 1.5$, which is not part of the standard method for mixed non-repeating and repeating decimals."}, {"text": "$100x - 10x = 16.666 - 1.666$", "isCorrect": true, "rationale": "Correct. For $x = 0.1666...$, first multiply by $10$ to get $10x = 1.666...$ (shifting the non-repeating digit past the decimal). Then multiply by $100$ to get $100x = 16.666...$ (shifting one full repeating block past the decimal). Subtracting $10x$ from $100x$ ($100x - 10x = 16.666... - 1.666...$) correctly aligns the repeating parts ($0.666...$) for cancellation, resulting in $90x = 15$."}, {"text": "$100x - 10x = 16.666 - 0.166$", "isCorrect": false, "rationale": "Incorrect. The value subtracted on the right side ($0.166$) does not correspond to $10x = 1.666...$"}], "id": "q05"}, {"question": "When converting $0.123$ ($0.123123...$) to a fraction using the algebraic method, why is $x$ subtracted from $1000x$?", "options": [{"text": "Because 1000 is the smallest power of 10 that makes the decimal terminate.", "isCorrect": false, "rationale": "Incorrect. Repeating decimals do not terminate. The purpose of the algebraic method is to convert them to fractions, not to make them terminate."}, {"text": "Because multiplying by $10^3$ (1000) shifts one full repeating block to the left of the decimal point, allowing direct subtraction of $x$ to cancel the repeating part.", "isCorrect": true, "rationale": "Correct. For a purely repeating decimal like $0.123$, where the repeating block has 3 digits, multiplying by $10^3=1000$ shifts one full repeating block to the left. This allows the repeating decimal part ($0.123123...$) to align perfectly with that of the original $x$, so subtracting $x$ from $1000x$ cancels out the repeating portion, leaving an integer."}, {"text": "To isolate the integer part of the number.", "isCorrect": false, "rationale": "Incorrect. While an integer part is obtained, the primary goal of this specific subtraction is to eliminate the repeating decimal portion, not merely to isolate an integer."}, {"text": "To account for the non-repeating part before the repeating block.", "isCorrect": false, "rationale": "Incorrect. The decimal $0.123$ is a pure repeating decimal and does not have a non-repeating part before its repeating block. This step is specific to decimals like $0.16$."}], "id": "q06"}, {"question": "Which fraction is equivalent to the repeating decimal $0.123$ ($0.123123...$) in simplest form?", "options": [{"text": "123/1000", "isCorrect": false, "rationale": "Incorrect. This fraction represents the terminating decimal 0.123, not the repeating decimal 0.123."}, {"text": "41/333", "isCorrect": true, "rationale": "Correct. Let $x = 0.123123...$. Multiply by $1000$ (since there are 3 repeating digits): $1000x = 123.123123...$. Subtracting $x$ gives $999x = 123$. So $x = 123/999$. Simplifying by dividing both numerator and denominator by 3 yields $41/333$."}, {"text": "1/8", "isCorrect": false, "rationale": "Incorrect. 1/8 is equivalent to 0.125."}, {"text": "12/99", "isCorrect": false, "rationale": "Incorrect. This fraction would be for a two-digit repeating decimal like $0.12$ ($0.1212...$), not a three-digit one."}], "id": "q07"}, {"question": "A student is given three decimals: $0.75$, $0.3$ ($0.333...$), and $0.16$ ($0.1666...$). Which statement correctly describes the most efficient method for converting each to a fraction?", "options": [{"text": "All three can be converted using the place value method directly.", "isCorrect": false, "rationale": "Incorrect. Only $0.75$ is a terminating decimal. $0.3$ and $0.16$ are repeating decimals and require the algebraic method."}, {"text": "$0.75$ uses place value, while $0.3$ and $0.16$ require the algebraic method with one multiplication step.", "isCorrect": false, "rationale": "Incorrect. $0.3$ requires one multiplication (10x), but $0.16$ has a non-repeating part before the repeat, requiring two multiplications (10x and 100x)."}, {"text": "$0.75$ uses place value, $0.3$ uses the algebraic method with one multiplication, and $0.16$ uses the algebraic method with two multiplications.", "isCorrect": true, "rationale": "Correct. $0.75$ is a terminating decimal (place value method). $0.3$ is a single-digit pure repeating decimal (algebraic method, one multiplication by 10). $0.16$ is a mixed repeating decimal (algebraic method, two multiplications by powers of 10 to align repeating parts after shifting the non-repeating part)."}, {"text": "All three require the algebraic method, but with different powers of 10.", "isCorrect": false, "rationale": "Incorrect. $0.75$ is a terminating decimal and is most efficiently converted using the place value method, not the algebraic method."}], "id": "q08"}, {"question": "The note in the text states that 'A useful pattern: $0.9 = 9/9 = 1$. This is not a mistake! The repeating decimal $0.999...$ is mathematically equal to $1$.' What does this imply about rational numbers and their decimal representations?", "options": [{"text": "Some rational numbers have infinitely many decimal representations.", "isCorrect": false, "rationale": "Incorrect. Rational numbers have either a terminating or a repeating decimal representation. The note shows that some numbers have two specific forms (one terminating, one repeating), not infinitely many."}, {"text": "A terminating decimal can also be represented as an equivalent repeating decimal.", "isCorrect": true, "rationale": "Correct. The example explicitly demonstrates that the terminating decimal '1' is precisely equal to the repeating decimal '0.999...'. This highlights that some rational numbers have two distinct decimal representations: one terminating and one repeating."}, {"text": "All repeating decimals can be rounded up to the next whole number.", "isCorrect": false, "rationale": "Incorrect. This specific phenomenon applies to $0.999...$ and similar patterns (e.g., $0.4999... = 0.5$), but not to all repeating decimals (e.g., $0.333... = 1/3$, not 1)."}, {"text": "The algebraic method is only an approximation for some repeating decimals.", "isCorrect": false, "rationale": "Incorrect. The note emphasizes that $0.999...$ is *mathematically equal* to 1, confirming that the algebraic method provides an exact, not approximate, conversion for repeating decimals."}], "id": "q09"}, {"question": "Convert the repeating decimal $0.83$ ($0.8333...$) to a fraction in simplest form.", "options": [{"text": "83/100", "isCorrect": false, "rationale": "Incorrect. This is the fraction for the terminating decimal 0.83, not the repeating decimal $0.8333...$."}, {"text": "83/99", "isCorrect": false, "rationale": "Incorrect. This fraction would represent the repeating decimal $0.83$ ($0.8383...$), where both digits repeat."}, {"text": "5/6", "isCorrect": true, "rationale": "Correct. Let $x = 0.8333...$. Multiply by $10$ to get $10x = 8.333...$. Multiply by $100$ to get $100x = 83.333...$. Subtract $10x$ from $100x$: $100x - 10x = 83.333... - 8.333...$, which simplifies to $90x = 75$. Solving for $x$, $x = 75/90$. Simplifying by dividing both numerator and denominator by 15 results in $5/6$."}, {"text": "3/4", "isCorrect": false, "rationale": "Incorrect. 3/4 is equivalent to 0.75."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
