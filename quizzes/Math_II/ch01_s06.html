<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 1, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of scientific notation as described in the text?", "options": [{"text": "To make numbers easier to add and subtract.", "isCorrect": false, "rationale": "While scientific notation simplifies multiplication and division, its primary purpose is not to simplify addition and subtraction. It is for expressing numbers compactly and reducing errors when dealing with many zeros."}, {"text": "To provide a compact and error-resistant way to express very large or very small numbers.", "isCorrect": true, "rationale": "The text explicitly states, 'Writing out all those zeros is tedious and error-prone. Scientific notation gives us a compact way to express such numbers using powers of 10.' This directly supports its primary purpose."}, {"text": "To ensure all numbers have exactly one digit before the decimal point in standard form.", "isCorrect": false, "rationale": "Having exactly one non-zero digit before the decimal point is a rule for the 'a' component in scientific notation, not the primary purpose of the notation itself for numbers in general standard form."}, {"text": "To simplify the process of rounding numbers to the nearest power of 10.", "isCorrect": false, "rationale": "Scientific notation is related to orders of magnitude, which involves powers of 10, but its main purpose is not rounding. It provides an exact representation rather than an approximation."}], "id": "q01"}, {"question": "The distance from Earth to the Sun is approximately 150,000,000 km. Which of the following correctly expresses this distance in scientific notation?", "options": [{"text": "15 x 10^7 km", "isCorrect": false, "rationale": "In scientific notation, the 'a' value must be between 1 and 10 (1 <= a < 10). Here, 15 is not within that range."}, {"text": "1.5 x 10^8 km", "isCorrect": true, "rationale": "To get 1.5, the decimal point from 150,000,000 must be moved 8 places to the left. Since the original number is greater than 10, the exponent 'n' is positive 8."}, {"text": "0.15 x 10^9 km", "isCorrect": false, "rationale": "In scientific notation, the 'a' value must be between 1 and 10 (1 <= a < 10). Here, 0.15 is not within that range."}, {"text": "1.5 x 10^-8 km", "isCorrect": false, "rationale": "The exponent should be positive for a large number (greater than 10). A negative exponent indicates a very small number (between 0 and 1)."}], "id": "q02"}, {"question": "A hydrogen atom's diameter is about 0.000000000106 m. How is this number written in scientific notation?", "options": [{"text": "1.06 x 10^-10 m", "isCorrect": true, "rationale": "To get 1.06, the decimal point from 0.000000000106 must be moved 10 places to the right. Since the original number is between 0 and 1, the exponent 'n' is negative 10."}, {"text": "10.6 x 10^-11 m", "isCorrect": false, "rationale": "In scientific notation, the 'a' value must be between 1 and 10 (1 <= a < 10). Here, 10.6 is not within that range."}, {"text": "1.06 x 10^10 m", "isCorrect": false, "rationale": "The exponent should be negative for a small number (between 0 and 1). A positive exponent indicates a very large number (greater than 10)."}, {"text": "1.06 x 10^-9 m", "isCorrect": false, "rationale": "The decimal point was moved 10 places to the right to place it after the first non-zero digit, not 9 places."}], "id": "q03"}, {"question": "A galaxy is estimated to be 2.5 x 10^6 light-years away. What is this distance in standard form?", "options": [{"text": "250,000 light-years", "isCorrect": false, "rationale": "An exponent of 6 means the decimal point should be moved 6 places to the right. Moving it 5 places would result in 250,000."}, {"text": "2,500,000 light-years", "isCorrect": true, "rationale": "Since the exponent 'n' is positive 6, move the decimal point 6 places to the right from its position in 2.5. This results in 2,500,000."}, {"text": "0.0000025 light-years", "isCorrect": false, "rationale": "A positive exponent means the number is large, so the decimal moves to the right. Moving it to the left would be for a negative exponent."}, {"text": "25,000,000 light-years", "isCorrect": false, "rationale": "An exponent of 6 means the decimal point should be moved 6 places to the right. Moving it 7 places would result in 25,000,000."}], "id": "q04"}, {"question": "The wavelength of a certain X-ray is 1.2 x 10^-9 meters. Express this value in standard form.", "options": [{"text": "12,000,000,000 meters", "isCorrect": false, "rationale": "A negative exponent means the number is small, so the decimal moves to the left. Moving it to the right would be for a positive exponent."}, {"text": "0.0000000012 meters", "isCorrect": true, "rationale": "Since the exponent 'n' is negative 9, move the decimal point 9 places to the left from its position in 1.2. This results in 0.0000000012."}, {"text": "0.000000012 meters", "isCorrect": false, "rationale": "An exponent of -9 means the decimal point should be moved 9 places to the left. Moving it 8 places would result in 0.000000012."}, {"text": "0.00000012 meters", "isCorrect": false, "rationale": "An exponent of -9 means the decimal point should be moved 9 places to the left. Moving it 7 places would result in 0.00000012."}], "id": "q05"}, {"question": "Calculate the product: (4.0 x 10^3) * (2.0 x 10^5). Write the answer in scientific notation.", "options": [{"text": "8.0 x 10^15", "isCorrect": false, "rationale": "When multiplying numbers in scientific notation, you multiply the decimal parts and add the exponents of 10, not multiply them."}, {"text": "8.0 x 10^8", "isCorrect": true, "rationale": "To multiply, multiply the decimal parts (4.0 * 2.0 = 8.0) and add the exponents (3 + 5 = 8). The result is 8.0 x 10^8."}, {"text": "6.0 x 10^8", "isCorrect": false, "rationale": "When multiplying numbers in scientific notation, you multiply the decimal parts (4.0 * 2.0 = 8.0), not add them."}, {"text": "8.0 x 10^2", "isCorrect": false, "rationale": "When multiplying numbers in scientific notation, you add the exponents (3 + 5 = 8), not subtract them."}], "id": "q06"}, {"question": "Compute the quotient: (9.6 x 10^7) / (3.2 x 10^4). Write the answer in scientific notation.", "options": [{"text": "3.0 x 10^11", "isCorrect": false, "rationale": "When dividing numbers in scientific notation, you subtract the exponents (7 - 4 = 3), not add them."}, {"text": "3.0 x 10^3", "isCorrect": true, "rationale": "To divide, divide the decimal parts (9.6 / 3.2 = 3.0) and subtract the exponents (7 - 4 = 3). The result is 3.0 x 10^3."}, {"text": "3.0 x 10^7/4", "isCorrect": false, "rationale": "When dividing numbers in scientific notation, you subtract the exponents, not divide them."}, {"text": "30 x 10^3", "isCorrect": false, "rationale": "The 'a' value (decimal part) must be between 1 and 10 (1 <= a < 10). Here, 30 is not within that range; it would need further adjustment to 3.0 x 10^4."}], "id": "q07"}, {"question": "A scientist calculated the product of two numbers as (5.0 x 10^-3) * (6.0 x 10^-5). What is the correct result in scientific notation?", "options": [{"text": "30 x 10^-8", "isCorrect": false, "rationale": "While the product of the decimal parts and sum of exponents gives 30 x 10^-8, this is not in correct scientific notation because the decimal part 'a' (30) is not between 1 and 10."}, {"text": "3.0 x 10^-7", "isCorrect": true, "rationale": "First, multiply the decimal parts (5.0 * 6.0 = 30) and add the exponents (-3 + -5 = -8), resulting in 30 x 10^-8. To convert this to proper scientific notation, adjust 30 to 3.0 (by moving the decimal one place left, which implies multiplying by 10^1). So, 30 x 10^-8 becomes (3.0 x 10^1) x 10^-8 = 3.0 x 10^(1 + -8) = 3.0 x 10^-7."}, {"text": "3.0 x 10^-8", "isCorrect": false, "rationale": "This option correctly adjusts the decimal part to 3.0 but fails to adjust the exponent accordingly. Moving the decimal in 30 to 3.0 effectively divides by 10, so you must compensate by multiplying 10^-8 by 10^1, changing it to 10^-7."}, {"text": "3.0 x 10^-15", "isCorrect": false, "rationale": "This option incorrectly multiplies the exponents (-3 * -5 = 15) instead of adding them, and the resulting exponent's sign is also incorrect."}], "id": "q08"}, {"question": "The diameter of a red blood cell is approximately 7.5 x 10^-6 meters. The diameter of a typical bacterium is about 7.5 x 10^-7 meters. By what factor do these two quantities differ, and are they of the same order of magnitude?", "options": [{"text": "They differ by a factor of 10; they are of the same order of magnitude.", "isCorrect": false, "rationale": "If two quantities differ by a factor of 10, they are considered to be of different orders of magnitude, not the same."}, {"text": "They differ by a factor of 0.1; they are of the same order of magnitude.", "isCorrect": false, "rationale": "The factor of difference is 10 (red blood cell is larger), not 0.1. Also, a difference by a factor of 10 implies different orders of magnitude."}, {"text": "They differ by a factor of 10; they are of different orders of magnitude.", "isCorrect": true, "rationale": "To find the factor of difference, divide the larger by the smaller: (7.5 x 10^-6) / (7.5 x 10^-7) = (7.5/7.5) x 10^(-6 - (-7)) = 1 x 10^1 = 10. Since the ratio is 10, they differ by one order of magnitude, meaning they are of different orders of magnitude."}, {"text": "They differ by a factor of 1; they are of the same order of magnitude.", "isCorrect": false, "rationale": "The factor of difference is 10, not 1. They are of different orders of magnitude because one is 10 times larger than the other."}], "id": "q09"}, {"question": "Consider a number written as $b \\times 10^k$, where $b$ is a number such that $0.01 \\le b < 1$. To convert this number into proper scientific notation ($a \\times 10^n$, where $1 \\le a < 10$), which of the following adjustments would be necessary?", "options": [{"text": "Move the decimal point in $b$ to the right, and subtract from $k$ for each place moved.", "isCorrect": true, "rationale": "If $b$ is between 0.01 and 1 (e.g., 0.5), to make it 'a' (between 1 and 10, e.g., 5), the decimal point must be moved to the right. Moving the decimal point in $b$ to the right means you are effectively multiplying $b$ by a power of 10 (e.g., 0.5 * 10^1 = 5). To keep the overall value of the number the same, the exponent $k$ must be adjusted by subtracting the corresponding power (e.g., $0.5 \\times 10^k = (5 \\times 10^{-1}) \\times 10^k = 5 \\times 10^{k-1}$). Each place moved right results in subtracting 1 from $k$."}, {"text": "Move the decimal point in $b$ to the right, and add to $k$ for each place moved.", "isCorrect": false, "rationale": "Moving the decimal to the right to increase the value of 'b' means you are effectively multiplying by powers of 10. To maintain the original value, the exponent $k$ must be decreased, not increased."}, {"text": "Move the decimal point in $b$ to the left, and subtract from $k$ for each place moved.", "isCorrect": false, "rationale": "Moving the decimal point in $b$ to the left would make $b$ even smaller (e.g., 0.5 to 0.05), moving it further away from the required range of 1 to 10 for 'a'."}, {"text": "Move the decimal point in $b$ to the left, and add to $k$ for each place moved.", "isCorrect": false, "rationale": "Moving the decimal point in $b$ to the left would make $b$ even smaller, moving it further away from the required range for 'a'. The rule for adjusting 'k' would also be incorrect in this scenario."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
