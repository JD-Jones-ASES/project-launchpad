    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the 'Problem-Solving Strategy' outlined in the text, what is the final crucial step before presenting the answer to a word problem?", "options": [{"text": "Define a variable for the unknown quantity.", "isCorrect": false, "rationale": "Defining a variable is an early step in the problem-solving strategy, occurring after reading the problem but before writing the equation."}, {"text": "Solve the equation using appropriate algebraic techniques.", "isCorrect": false, "rationale": "Solving the equation is a preceding step. While crucial, it's not the final step before presenting the answer, as checking comes after."}, {"text": "Read the problem carefully and identify what is known and what needs to be found.", "isCorrect": false, "rationale": "Reading the problem carefully is the very first step in the strategy, setting the foundation for all subsequent steps."}, {"text": "Check the solution against the original problem and include appropriate units in your answer.", "isCorrect": true, "rationale": "The text explicitly states this as the final step in the problem-solving strategy, emphasizing the importance of verifying the answer in context and with correct units."}]}, {"question": "Which equation correctly represents the statement: 'Seven more than four times a number is 35'?", "options": [{"text": "7n + 4 = 35", "isCorrect": false, "rationale": "This translates to 'seven times a number plus four', which incorrectly places the 'seven' as a multiplier rather than an added quantity."}, {"text": "4n + 7 = 35", "isCorrect": true, "rationale": "Let 'n' be the number. 'Four times a number' is 4n. 'Seven more than' means to add 7 to that quantity, resulting in 4n + 7. This sum 'is 35', so 4n + 7 = 35."}, {"text": "4(n + 7) = 35", "isCorrect": false, "rationale": "This translates to 'four times the sum of a number and seven', which implies the sum of the number and seven is multiplied by four, not that seven is added to four times the number."}, {"text": "7 - 4n = 35", "isCorrect": false, "rationale": "This translates to 'seven minus four times a number', which uses subtraction instead of addition and reverses the order of the terms based on the phrase 'more than'."}]}, {"question": "Emily is 4 years younger than twice David's age. The sum of their ages is 26. What is Emily's age?", "options": [{"text": "7 years old", "isCorrect": false, "rationale": "If Emily were 7, then 2D - 4 = 7 implies 2D = 11, so D = 5.5. Then 5.5 + 7 = 12.5, which is not 26. This option is incorrect."}, {"text": "12 years old", "isCorrect": false, "rationale": "If Emily were 12, then 2D - 4 = 12 implies 2D = 16, so D = 8. Then 8 + 12 = 20, which is not 26. This option is incorrect."}, {"text": "16 years old", "isCorrect": true, "rationale": "Let D be David's age. Emily's age is 2D - 4. The sum of their ages is D + (2D - 4) = 26. This simplifies to 3D - 4 = 26, so 3D = 30, and D = 10. Emily's age is 2(10) - 4 = 20 - 4 = 16. Checking: 10 + 16 = 26."}, {"text": "20 years old", "isCorrect": false, "rationale": "If Emily were 20, then 2D - 4 = 20 implies 2D = 24, so D = 12. Then 12 + 20 = 32, which is not 26. This option is incorrect."}]}, {"question": "A rectangular garden has a length that is 5 feet less than twice its width. If the perimeter of the garden is 50 feet, what is the length of the garden?", "options": [{"text": "10 feet", "isCorrect": false, "rationale": "This is the calculated width, not the length. If the width were 10 feet, the length would be 2(10) - 5 = 15 feet."}, {"text": "15 feet", "isCorrect": true, "rationale": "Let W be the width. The length L = 2W - 5. The perimeter P = 2L + 2W. So, 2(2W - 5) + 2W = 50. This simplifies to 4W - 10 + 2W = 50, which is 6W - 10 = 50. Adding 10 to both sides gives 6W = 60, so W = 10 feet. The length is L = 2(10) - 5 = 20 - 5 = 15 feet."}, {"text": "20 feet", "isCorrect": false, "rationale": "This would be twice the width, not the length itself (which is '5 feet less than twice the width'). If the length were 20 feet, the perimeter would be much larger."}, {"text": "25 feet", "isCorrect": false, "rationale": "This value does not fit the problem's conditions. If the length were 25 feet, then 2W - 5 = 25 implies 2W = 30, so W = 15. The perimeter would then be 2(25) + 2(15) = 50 + 30 = 80 feet, not 50."}]}, {"question": "Two friends start cycling towards each other from towns 80 miles apart. Friend A cycles at 10 mph, and Friend B cycles at 15 mph. Which equation can be used to find the time, t, it takes for them to meet?", "options": [{"text": "10t - 15t = 80", "isCorrect": false, "rationale": "This equation implies a difference in distances, which would be relevant if they were traveling in the same direction or if the problem asked for something like how far apart they are after a certain time, but not for when they meet from opposite directions."}, {"text": "10t + 15t = 80", "isCorrect": true, "rationale": "Let 't' be the time in hours. Friend A travels 10t miles and Friend B travels 15t miles. Since they are traveling towards each other, the sum of their distances must equal the total distance between the towns for them to meet."}, {"text": "10 + 15 + t = 80", "isCorrect": false, "rationale": "This equation incorrectly adds the speeds directly to the time 't' without using the distance = rate × time formula, making the units inconsistent and the setup incorrect."}, {"text": "10t + 80 = 15t", "isCorrect": false, "rationale": "This equation implies that Friend A's distance plus 80 miles equals Friend B's distance, which does not represent the scenario of them starting 80 miles apart and traveling towards each other."}]}, {"question": "A train leaves a station traveling east at 60 mph. An hour later, another train leaves the same station traveling east at 75 mph. How many hours after the *first* train left will the second train catch up to the first?", "options": [{"text": "3 hours", "isCorrect": false, "rationale": "If the first train traveled for 3 hours, it would cover 180 miles. The second train would travel for 2 hours (3-1) covering 75*2 = 150 miles. They would not have caught up."}, {"text": "4 hours", "isCorrect": false, "rationale": "This represents the time the second train traveled, but the question asks for the time after the *first* train left. If the first train traveled for 4 hours (240 miles), the second train traveled for 3 hours (225 miles) and would not have caught up."}, {"text": "5 hours", "isCorrect": true, "rationale": "Let 't' be the time in hours after the first train left. The distance of the first train is 60t. The second train leaves 1 hour later, so its travel time is (t - 1) hours, and its distance is 75(t - 1). For them to catch up, their distances must be equal: 60t = 75(t - 1). Solving this, 60t = 75t - 75, which leads to 15t = 75, so t = 5 hours."}, {"text": "6 hours", "isCorrect": false, "rationale": "If the first train traveled for 6 hours, it would cover 360 miles. The second train would travel for 5 hours (6-1) covering 75*5 = 375 miles, meaning the second train would have already passed the first, not just caught up."}]}, {"question": "A chemical reaction needs to be performed at a temperature of 30°C. What is this temperature in Fahrenheit?", "options": [{"text": "22°F", "isCorrect": false, "rationale": "This value is obtained from an incorrect calculation, possibly subtracting 32 from the Celsius temperature or using the Fahrenheit to Celsius conversion incorrectly."}, {"text": "68°F", "isCorrect": false, "rationale": "68°F is equivalent to 20°C, as shown in the textbook example, not 30°C."}, {"text": "86°F", "isCorrect": true, "rationale": "Using the formula F = (9/5)C + 32, substitute C = 30: F = (9/5)(30) + 32 = 9*6 + 32 = 54 + 32 = 86°F."}, {"text": "104°F", "isCorrect": false, "rationale": "This value would result from a calculation error, such as mistakenly using 9/5(30+32) or a similar arithmetic mistake."}]}, {"question": "Translate 'The difference between eight times a number and twelve is equal to three times the sum of the number and five' into an algebraic equation.", "options": [{"text": "8x - 12 = 3x + 5", "isCorrect": false, "rationale": "This equation correctly translates 'eight times a number and twelve' and 'three times a number', but it fails to multiply the 'three' by the *sum* of the number and five, only by the number itself."}, {"text": "8x - 12 = 3(x + 5)", "isCorrect": true, "rationale": "Let 'x' be the number. 'Eight times a number' is 8x. 'The difference between 8x and twelve' is 8x - 12. 'The sum of the number and five' is x + 5. 'Three times the sum' is 3(x + 5). Setting them equal gives 8x - 12 = 3(x + 5)."}, {"text": "12 - 8x = 3(x + 5)", "isCorrect": false, "rationale": "This equation reverses the order of the terms in the 'difference between' phrase. 'The difference between A and B' is A - B, not B - A."}, {"text": "8(x - 12) = 3(x + 5)", "isCorrect": false, "rationale": "This incorrectly interprets 'eight times a number and twelve' as 'eight times the difference between the number and twelve', rather than the difference between eight times the number and twelve."}]}, {"question": "According to the 'note' provided, why is checking your answer in the context of the original problem just as important as the algebra itself?", "options": [{"text": "To verify that your algebraic steps were performed without any calculation errors.", "isCorrect": false, "rationale": "While checking can help identify calculation errors, the primary emphasis of 'checking in context' is on the reasonableness of the result, not just the correctness of the algebra itself. You could have correct algebra but an invalid real-world answer due to a setup error."}, {"text": "To ensure that your initial definition of the variable was the most efficient choice.", "isCorrect": false, "rationale": "The efficiency of variable definition is part of the setup, not the 'checking the solution against the original problem' step. This step focuses on the output's validity."}, {"text": "To catch errors that result in unrealistic or impossible answers, such as a negative age or a negative distance.", "isCorrect": true, "rationale": "The note explicitly states that 'A negative age or a negative distance tells you something went wrong.' This highlights that checking in context ensures the solution makes practical sense within the real-world constraints of the problem, even if the algebra was executed correctly."}, {"text": "To simplify the algebraic expression used in the original equation before solving.", "isCorrect": false, "rationale": "Simplifying the expression occurs *before* solving and is part of the algebraic manipulation, not the final check against the original problem's context."}]}, {"question": "A carpenter is building a bookshelf with three shelves. The middle shelf is twice as long as the top shelf. The bottom shelf is 10 inches shorter than three times the length of the top shelf. If the total length of wood used for all three shelves is 110 inches, what is the length of the top shelf?", "options": [{"text": "15 inches", "isCorrect": false, "rationale": "If the top shelf were 15 inches, then the middle would be 30 inches, and the bottom would be 3(15) - 10 = 45 - 10 = 35 inches. The total length would be 15 + 30 + 35 = 80 inches, which is not 110."}, {"text": "20 inches", "isCorrect": true, "rationale": "Let T be the length of the top shelf. The middle shelf M = 2T. The bottom shelf B = 3T - 10. The total length is T + M + B = 110. Substituting the expressions for M and B: T + 2T + (3T - 10) = 110. Combining like terms: 6T - 10 = 110. Adding 10 to both sides: 6T = 120. Dividing by 6: T = 20 inches. (Middle: 40 inches, Bottom: 50 inches. Check: 20 + 40 + 50 = 110)."}, {"text": "25 inches", "isCorrect": false, "rationale": "If the top shelf were 25 inches, then the middle would be 50 inches, and the bottom would be 3(25) - 10 = 75 - 10 = 65 inches. The total length would be 25 + 50 + 65 = 140 inches, which is not 110."}, {"text": "30 inches", "isCorrect": false, "rationale": "This value does not satisfy the given conditions. A calculation error or misunderstanding of the 'shorter than' phrase could lead to this incorrect answer."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
