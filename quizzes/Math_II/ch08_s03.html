<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the Midpoint Formula?", "options": [{"text": "To calculate the total length of a segment.", "isCorrect": false, "rationale": "The Midpoint Formula determines the center of a segment, not its total length. The distance formula is used for length."}, {"text": "To find the point located exactly halfway between two endpoints of a segment.", "isCorrect": true, "rationale": "The definition of the midpoint is the point exactly halfway between its two endpoints, which is precisely what the Midpoint Formula calculates."}, {"text": "To determine the slope or steepness of a segment.", "isCorrect": false, "rationale": "The Midpoint Formula does not relate to the slope of a segment. The slope formula is used for that purpose."}, {"text": "To identify if a segment passes through the origin (0,0).", "isCorrect": false, "rationale": "The Midpoint Formula provides the coordinates of the midpoint, not whether the segment itself intersects specific points like the origin."}], "id": "q01"}, {"question": "Find the midpoint of the segment from P(5, 12) to Q(11, 4).", "options": [{"text": "(16, 16)", "isCorrect": false, "rationale": "This option results from adding the x-coordinates and y-coordinates but failing to divide them by 2, which is essential for averaging."}, {"text": "(8, 8)", "isCorrect": true, "rationale": "Using the Midpoint Formula M = ((x1 + x2)/2, (y1 + y2)/2): M = ((5 + 11)/2, (12 + 4)/2) = (16/2, 16/2) = (8, 8)."}, {"text": "(6, 8)", "isCorrect": false, "rationale": "This option incorrectly calculates the x-coordinate (e.g., subtracting or miscalculating the sum) or miscalculates both."}, {"text": "(10, 6)", "isCorrect": false, "rationale": "This option incorrectly calculates the y-coordinate (e.g., subtracting or miscalculating the sum) or miscalculates both."}], "id": "q02"}, {"question": "Calculate the midpoint of the segment with endpoints (-7, 2) and (3, -10).", "options": [{"text": "(10, -12)", "isCorrect": false, "rationale": "This option results from summing the coordinates but not dividing by 2, and incorrectly handles the signs for the y-coordinate sum."}, {"text": "(-2, -4)", "isCorrect": true, "rationale": "Using the Midpoint Formula M = ((x1 + x2)/2, (y1 + y2)/2): M = ((-7 + 3)/2, (2 + (-10))/2) = (-4/2, -8/2) = (-2, -4)."}, {"text": "(-5, -6)", "isCorrect": false, "rationale": "This option miscalculates the x-coordinate average or makes a sign error in the y-coordinate average."}, {"text": "(4, -8)", "isCorrect": false, "rationale": "This option has significant errors in both x and y coordinate calculations, possibly by subtracting instead of adding, or incorrect sign handling."}], "id": "q03"}, {"question": "A segment has endpoints at (1.5, 6) and (4.5, -2). What are the coordinates of its midpoint?", "options": [{"text": "(3, 2)", "isCorrect": true, "rationale": "Using the Midpoint Formula M = ((x1 + x2)/2, (y1 + y2)/2): M = ((1.5 + 4.5)/2, (6 + (-2))/2) = (6/2, 4/2) = (3, 2)."}, {"text": "(6, 4)", "isCorrect": false, "rationale": "This option results from correctly summing the coordinates but incorrectly dividing by 2, or not dividing at all."}, {"text": "(2.5, 4)", "isCorrect": false, "rationale": "This option incorrectly averages the x-coordinates (e.g., by finding the difference or error in summation) but correctly averages the y-coordinates."}, {"text": "(1, -4)", "isCorrect": false, "rationale": "This option results from significant calculation errors for both coordinates, possibly by subtracting or misinterpreting the formula."}], "id": "q04"}, {"question": "The midpoint of segment JK is M(8, -3). If J = (2, 5), find the coordinates of K.", "options": [{"text": "(14, -11)", "isCorrect": true, "rationale": "Let K = (x, y). Using the 'midpoint formula in reverse': (2+x)/2 = 8 => 2+x = 16 => x = 14. (5+y)/2 = -3 => 5+y = -6 => y = -11. So, K = (14, -11)."}, {"text": "(5, 1)", "isCorrect": false, "rationale": "This option incorrectly averages the coordinates of J and M, rather than using M to find K."}, {"text": "(10, 2)", "isCorrect": false, "rationale": "This option results from adding the coordinates of J and M, which is not the correct 'reverse' operation."}, {"text": "(-6, 8)", "isCorrect": false, "rationale": "This option results from subtracting J from M and doubling, but with sign errors or incorrect reversal logic."}], "id": "q05"}, {"question": "A municipal project requires placing a streetlamp exactly in the middle of a new sidewalk. The sidewalk starts at point A(-5, -8) and ends at point B(1, 10) on a coordinate map. What are the coordinates for the streetlamp's location?", "options": [{"text": "(-2, 1)", "isCorrect": true, "rationale": "This is a direct application of the midpoint formula: M = ((-5 + 1)/2, (-8 + 10)/2) = (-4/2, 2/2) = (-2, 1). This represents the exact center for the streetlamp."}, {"text": "(-4, 2)", "isCorrect": false, "rationale": "This option shows correct summation for x and y but fails to divide by 2, or has other calculation errors."}, {"text": "(-3, 9)", "isCorrect": false, "rationale": "This option results from incorrect averaging or calculation errors, particularly for the y-coordinate."}, {"text": "(3, 18)", "isCorrect": false, "rationale": "This option results from incorrect summation and omission of the division by 2, possibly with sign errors."}], "id": "q06"}, {"question": "If the midpoint of segment UV is M(0, 0) and one endpoint U is (4, -6), what are the coordinates of the other endpoint V?", "options": [{"text": "(4, -6)", "isCorrect": false, "rationale": "If V were (4, -6), then U and V would be the same point, which cannot have a midpoint (0,0) unless that point is (4,-6) itself. This shows a misunderstanding of the midpoint concept."}, {"text": "(-4, 6)", "isCorrect": true, "rationale": "Let V = (x, y). Using the 'midpoint formula in reverse': (4+x)/2 = 0 => 4+x = 0 => x = -4. (-6+y)/2 = 0 => -6+y = 0 => y = 6. So, V = (-4, 6). This demonstrates that if the midpoint is the origin, the endpoints are additive inverses of each other."}, {"text": "(2, -3)", "isCorrect": false, "rationale": "This option results from averaging U and M, which is not the correct method to find the missing endpoint."}, {"text": "(-2, 3)", "isCorrect": false, "rationale": "This option results from an incorrect application of the 'reverse' midpoint formula, possibly sign errors or incorrect division."}], "id": "q07"}, {"question": "The Midpoint Formula is described as a 'two-dimensional version of the average you already know.' If you find the midpoint of 10 and 20 on a number line, what is the result, and what concept does this illustrate?", "options": [{"text": "15; it illustrates that the midpoint is simply the larger number minus the smaller number divided by two.", "isCorrect": false, "rationale": "While 15 is the correct midpoint, the explanation for how it's calculated is incorrect. It's the sum divided by two, not the difference divided by two."}, {"text": "30; it illustrates that the midpoint is the sum of the numbers.", "isCorrect": false, "rationale": "30 is the sum, not the average or midpoint. The midpoint formula requires division by 2 to find the average."}, {"text": "15; it illustrates that the midpoint is the arithmetic average of the two numbers, just as the Midpoint Formula averages x and y coordinates separately.", "isCorrect": true, "rationale": "The midpoint on a number line is (10+20)/2 = 15. This correctly illustrates the concept of averaging, which is extended to two dimensions by averaging each coordinate independently."}, {"text": "10; it illustrates that the midpoint is always the smaller of the two numbers.", "isCorrect": false, "rationale": "This is incorrect. The midpoint is the exact center, not one of the endpoints, unless the endpoints are identical."}], "id": "q08"}, {"question": "Which of the following scenarios would most appropriately use the Midpoint Formula?", "options": [{"text": "Determining the total perimeter of a rectangular garden given its four corner coordinates.", "isCorrect": false, "rationale": "Calculating perimeter involves finding the lengths of all sides and summing them. This uses the distance formula, not the midpoint formula."}, {"text": "Finding the exact center point for a pivot on a seesaw that spans between two fixed posts.", "isCorrect": true, "rationale": "The exact center point of a span is a direct application of the midpoint formula, as highlighted by examples like the 'center of a bridge span'."}, {"text": "Calculating the steepness of a road segment between two towns.", "isCorrect": false, "rationale": "The steepness of a road is represented by its slope, which is calculated using the slope formula, not the midpoint formula."}, {"text": "Estimating the total area of a triangular plot of land given its vertices.", "isCorrect": false, "rationale": "Estimating the area of a triangle involves specific area formulas (like the determinant method or base times height), not the midpoint formula."}], "id": "q09"}, {"question": "A student incorrectly states the Midpoint Formula as M = (x1 + y1)/2, (x2 + y2)/2. What is the fundamental error in this formula?", "options": [{"text": "It incorrectly divides by 2; the formula should only sum the coordinates.", "isCorrect": false, "rationale": "Dividing by 2 is correct for averaging. The error lies elsewhere."}, {"text": "It reverses the x and y coordinates for each point, leading to an incorrect average for both components.", "isCorrect": false, "rationale": "While the coordinates are mixed, they are not reversed in that sense. The core error is mixing coordinate types within the average."}, {"text": "It averages an x-coordinate with a y-coordinate for each component, instead of averaging x-coordinates with x-coordinates and y-coordinates with y-coordinates.", "isCorrect": true, "rationale": "The Midpoint Formula averages the x-coordinates together and the y-coordinates together separately. The given incorrect formula mixes x and y within each component, which does not produce a meaningful midpoint."}, {"text": "It uses addition instead of subtraction, which is required for finding midpoints.", "isCorrect": false, "rationale": "Addition is correctly used in the Midpoint Formula for averaging. Subtraction is used in other formulas like distance or slope."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
