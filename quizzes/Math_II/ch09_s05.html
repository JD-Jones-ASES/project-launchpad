    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 9, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Given the data set $10, 12, 12, 15, 18, 20$, which of the following statements is true?", "options": [{"text": "The mean is 14, and the range is 12.", "isCorrect": false, "rationale": "The mean is (10+12+12+15+18+20)/6 = 87/6 = 14.5, not 14. The range is 20 - 10 = 10, not 12."}, {"text": "The median is 12, and the mode is 15.", "isCorrect": false, "rationale": "The data ordered is $10, 12, 12, 15, 18, 20$. Since there are an even number of data points (6), the median is the average of the two middle values (12 and 15), which is (12+15)/2 = 13.5, not 12. The mode is 12, as it appears most frequently, not 15."}, {"text": "The mean is 14.5, and the median is 13.5.", "isCorrect": true, "rationale": "The mean is (10+12+12+15+18+20)/6 = 87/6 = 14.5. The data ordered is $10, 12, 12, 15, 18, 20$. The median is the average of the two middle values (12 and 15), which is (12+15)/2 = 13.5. Both statements are correct."}, {"text": "The mode is 15, and the range is 10.", "isCorrect": false, "rationale": "The mode is 12, as it appears most frequently, not 15. The range is 20 - 10 = 10, which is correct, but the mode is incorrect."}], "id": "q01"}, {"question": "A histogram shows the number of minutes students spent on homework with the following frequencies for each bin:\n0-29 mins: 5 students\n30-59 mins: 12 students\n60-89 mins: 18 students\n90-119 mins: 7 students\nBased on this data, which statement provides the most accurate insight into the study habits of the majority of students?", "options": [{"text": "The majority of students spend less than 30 minutes on homework.", "isCorrect": false, "rationale": "Only 5 out of 42 total students (5+12+18+7) spend less than 30 minutes, which is a small minority, not the majority."}, {"text": "More than half of the students spend 60 minutes or more on homework.", "isCorrect": true, "rationale": "The total number of students is 5 + 12 + 18 + 7 = 42. Students spending 60 minutes or more are 18 + 7 = 25 students. Since 25 is greater than half of 42 (which is 21), this statement is correct."}, {"text": "The interval with the highest frequency represents 18% of the total students.", "isCorrect": false, "rationale": "The highest frequency is 18 students (in the 60-89 mins interval). 18 out of 42 students is approximately 42.8%, not 18%."}, {"text": "No student spent more than 90 minutes on homework.", "isCorrect": false, "rationale": "The 90-119 mins bin has 7 students, indicating that 7 students spent 90 minutes or more on homework."}], "id": "q02"}, {"question": "What is a defining characteristic of a histogram that differentiates it from a standard bar graph?", "options": [{"text": "Histograms always display categorical data.", "isCorrect": false, "rationale": "Histograms display quantitative data grouped into continuous intervals, not categorical data."}, {"text": "The bars in a histogram are separated by gaps to show distinct categories.", "isCorrect": false, "rationale": "In a histogram, the bars touch because the intervals (bins) are consecutive, representing continuous data."}, {"text": "The height of each bar in a histogram represents the frequency of data within a specific interval.", "isCorrect": true, "rationale": "This is the core definition of a histogram; it shows how data is distributed across intervals, with bar height indicating frequency."}, {"text": "Histograms are primarily used to display measures of center like mean and median.", "isCorrect": false, "rationale": "Histograms primarily show the frequency distribution and shape of the data, which can help infer measures of center or spread, but they don't directly display them like a single point or line."}], "id": "q03"}, {"question": "For the data set $5, 10, 12, 15, 18, 20, 22, 25$, what are the values for $Q_1$ (first quartile) and $Q_3$ (third quartile)?", "options": [{"text": "$Q_1 = 10$, $Q_3 = 22$", "isCorrect": false, "rationale": "These are values within the data set, but not the correct medians of the lower and upper halves."}, {"text": "$Q_1 = 11$, $Q_3 = 21$", "isCorrect": true, "rationale": "The ordered data set is $5, 10, 12, 15, 18, 20, 22, 25$. The median (Q2) is (15+18)/2 = 16.5. The lower half is $5, 10, 12, 15$, so $Q_1$ is the median of this half: (10+12)/2 = 11. The upper half is $18, 20, 22, 25$, so $Q_3$ is the median of this half: (20+22)/2 = 21."}, {"text": "$Q_1 = 12$, $Q_3 = 20$", "isCorrect": false, "rationale": "These would be the single middle values if the lower and upper halves had an odd number of data points, but here they are averages."}, {"text": "$Q_1 = 5$, $Q_3 = 25$", "isCorrect": false, "rationale": "These are the minimum and maximum values of the data set, not the first and third quartiles."}], "id": "q04"}, {"question": "The Interquartile Range (IQR) is a measure of spread that is particularly useful for which of the following reasons?", "options": [{"text": "It provides the exact average value of the data set.", "isCorrect": false, "rationale": "The IQR measures spread, not the average (mean)."}, {"text": "It represents the range of the middle 50% of the data, making it less affected by extreme values.", "isCorrect": true, "rationale": "The IQR is calculated as $Q_3 - Q_1$, which covers the middle 50% of the data. This makes it a robust measure of spread, as it is not influenced by outliers or extreme values in the tails of the distribution."}, {"text": "It indicates the most frequently occurring value in the data set.", "isCorrect": false, "rationale": "The most frequently occurring value is the mode, not the IQR."}, {"text": "It always equals the difference between the maximum and minimum values.", "isCorrect": false, "rationale": "The difference between the maximum and minimum values is the range, not the IQR."}], "id": "q05"}, {"question": "Consider the five-number summaries for two classes' test scores:\nClass X: Min=50, $Q_1$=60, Med=70, $Q_3$=80, Max=90\nClass Y: Min=55, $Q_1$=65, Med=75, $Q_3$=78, Max=85\nBased on this information, which conclusion is best supported?", "options": [{"text": "Class X has a higher typical score because its maximum score is higher.", "isCorrect": false, "rationale": "The median is the best measure for a 'typical' score. Class Y's median (75) is higher than Class X's median (70), indicating Class Y has a higher typical score."}, {"text": "Class Y's scores are more spread out than Class X's scores.", "isCorrect": false, "rationale": "Class X's IQR is $80 - 60 = 20$. Class Y's IQR is $78 - 65 = 13$. Class X has a larger IQR, meaning its middle 50% of scores are more spread out. Additionally, Class X's overall range (90-50=40) is larger than Class Y's (85-55=30)."}, {"text": "Class X demonstrates a wider range of scores overall compared to Class Y.", "isCorrect": true, "rationale": "The range for Class X is Max - Min = $90 - 50 = 40$. The range for Class Y is Max - Min = $85 - 55 = 30$. Class X has a wider overall range of scores."}, {"text": "The median for Class X is exactly the same as its mean.", "isCorrect": false, "rationale": "While the median is given, the mean cannot be determined from the five-number summary alone, and there's no information to suggest they are the same."}], "id": "q06"}, {"question": "A data set has a first quartile ($Q_1$) of 30 and a third quartile ($Q_3$) of 50. Which of the following values would be considered an outlier based on the informal rule?", "options": [{"text": "5", "isCorrect": false, "rationale": "The IQR is $Q_3 - Q_1 = 50 - 30 = 20$. The lower fence is $Q_1 - 1.5 \times IQR = 30 - 1.5 \times 20 = 30 - 30 = 0$. Since 5 is greater than 0, it is not an outlier."}, {"text": "75", "isCorrect": false, "rationale": "The IQR is $Q_3 - Q_1 = 50 - 30 = 20$. The upper fence is $Q_3 + 1.5 \times IQR = 50 + 1.5 \times 20 = 50 + 30 = 80$. Since 75 is less than 80, it is not an outlier."}, {"text": "10", "isCorrect": false, "rationale": "The IQR is $Q_3 - Q_1 = 50 - 30 = 20$. The lower fence is $Q_1 - 1.5 \times IQR = 30 - 1.5 \times 20 = 30 - 30 = 0$. Since 10 is greater than 0, it is not an outlier."}, {"text": "85", "isCorrect": true, "rationale": "The IQR is $Q_3 - Q_1 = 50 - 30 = 20$. The upper fence is $Q_3 + 1.5 \times IQR = 50 + 1.5 \times 20 = 50 + 30 = 80$. Since 85 is greater than 80, it is considered an outlier."}], "id": "q07"}, {"question": "Which of the following statements accurately describes a component of a box plot?", "options": [{"text": "The length of the whiskers indicates the mode of the data set.", "isCorrect": false, "rationale": "The whiskers extend to the minimum and maximum values (or the fence values if outliers are present), not the mode."}, {"text": "The box itself represents the middle 75% of the data.", "isCorrect": false, "rationale": "The box spans from $Q_1$ to $Q_3$, which represents the middle 50% of the data."}, {"text": "A line inside the box clearly marks the data's median.", "isCorrect": true, "rationale": "This is a key feature of a box plot, where the line inside the box indicates the median ($Q_2$) of the data set."}, {"text": "The entire box plot, from one end of a whisker to the other, represents the interquartile range.", "isCorrect": false, "rationale": "The entire length from whisker to whisker represents the overall range (Max - Min). The interquartile range (IQR) is the length of the box ($Q_3 - Q_1$)."}], "id": "q08"}, {"question": "When a data set contains a few extremely high or low values (outliers), which measure of center and measure of spread would generally be most appropriate to describe the typical value and variability of the majority of the data?", "options": [{"text": "Mean and Range", "isCorrect": false, "rationale": "The mean is highly sensitive to outliers, and the range is also heavily influenced by extreme values, making them less representative of the majority of the data when outliers are present."}, {"text": "Median and Interquartile Range", "isCorrect": true, "rationale": "The median is robust to outliers because it is the middle value and not affected by extreme values. The Interquartile Range (IQR) focuses on the spread of the middle 50% of the data, making it also robust to outliers and a good measure of variability for the majority of the data."}, {"text": "Mode and Range", "isCorrect": false, "rationale": "While the mode is not affected by outliers, it is not always a good measure of the 'typical' value for quantitative data. The range is highly sensitive to outliers."}, {"text": "Mean and Interquartile Range", "isCorrect": false, "rationale": "While the IQR is appropriate, the mean is sensitive to outliers, making it an inappropriate choice for the measure of center in this context."}], "id": "q09"}, {"question": "Consider the data set $10, 15, 20, 25, 30, 35, 40$. Which of the following statements is FALSE?", "options": [{"text": "The median and the mean of this data set are the same.", "isCorrect": false, "rationale": "The ordered data set is $10, 15, 20, 25, 30, 35, 40$. The median is the middle value, 25. The mean is $(10+15+20+25+30+35+40)/7 = 175/7 = 25$. So, this statement is TRUE."}, {"text": "The interquartile range (IQR) is 20.", "isCorrect": false, "rationale": "The lower half of the data is $10, 15, 20$, so $Q_1 = 15$. The upper half of the data is $30, 35, 40$, so $Q_3 = 35$. The IQR is $Q_3 - Q_1 = 35 - 15 = 20$. So, this statement is TRUE."}, {"text": "A value of 5 would be considered an outlier for this data set.", "isCorrect": true, "rationale": "The IQR is 20. The informal outlier rule calculates $1.5 \times IQR = 1.5 \times 20 = 30$. The lower fence is $Q_1 - 30 = 15 - 30 = -15$. Since 5 is greater than -15, it is NOT an outlier. Therefore, the statement that 5 would be considered an outlier is FALSE."}, {"text": "The range of the data set is 30.", "isCorrect": false, "rationale": "The maximum value is 40 and the minimum value is 10. The range is $40 - 10 = 30$. So, this statement is TRUE."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
