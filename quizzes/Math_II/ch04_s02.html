<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Simplify the expression: 5(3x - 7).", "options": [{"text": "15x - 7", "isCorrect": false, "rationale": "This option incorrectly distributed the 5 only to the first term (3x) but not to the second term (-7)."}, {"text": "15x + 35", "isCorrect": false, "rationale": "This option correctly distributed the 5 to both terms, but made a sign error: 5 * (-7) should be -35, not +35."}, {"text": "15x - 35", "isCorrect": true, "rationale": "Applying the distributive property, 5 is multiplied by 3x (yielding 15x) and 5 is multiplied by -7 (yielding -35). So, 5(3x - 7) = 15x - 35."}, {"text": "3x - 35", "isCorrect": false, "rationale": "This option incorrectly distributed the 5 only to the second term (-7) and did not multiply 5 by 3x."}], "id": "q01"}, {"question": "Which expression correctly simplifies -(7x - 2)?", "options": [{"text": "-7x - 2", "isCorrect": false, "rationale": "This option represents a common mistake where the negative sign (which is effectively -1) is only distributed to the first term (7x) but not to the second term (-2). The expression should be -7x + 2."}, {"text": "7x + 2", "isCorrect": false, "rationale": "This option incorrectly changed the sign of the first term and incorrectly kept the sign of the second term after distribution."}, {"text": "-7x + 2", "isCorrect": true, "rationale": "Distributing the negative sign (equivalent to multiplying by -1) to each term inside the parentheses yields (-1) * (7x) = -7x and (-1) * (-2) = +2. Therefore, -(7x - 2) = -7x + 2."}, {"text": "7x - 2", "isCorrect": false, "rationale": "This option shows no distribution of the negative sign at all, simply removing the parentheses."}], "id": "q02"}, {"question": "Simplify the expression: 4(x + 3) + 2(x - 5).", "options": [{"text": "6x + 2", "isCorrect": true, "rationale": "First, distribute: 4(x + 3) = 4x + 12, and 2(x - 5) = 2x - 10. Then combine like terms: (4x + 2x) + (12 - 10) = 6x + 2."}, {"text": "6x + 7", "isCorrect": false, "rationale": "This option correctly distributed and combined the x-terms, but made an arithmetic error when combining the constant terms (12 - 10 = 2, not 7)."}, {"text": "4x + 12 + 2x - 5", "isCorrect": false, "rationale": "This option correctly distributed the factors but failed to combine the like terms as the final step in simplifying the expression."}, {"text": "6x - 2", "isCorrect": false, "rationale": "This option correctly combined the x-terms, but made a sign error or arithmetic mistake when combining the constant terms (12 - 10 should be +2, not -2)."}], "id": "q03"}, {"question": "The width of a rectangular poster is (y - 4) inches and its length is (3y + 2) inches. Which expression correctly represents and simplifies the perimeter of the poster?", "options": [{"text": "(4y - 2) inches", "isCorrect": false, "rationale": "This expression only adds one length and one width, not the full perimeter which requires summing two lengths and two widths."}, {"text": "2(y - 4) + 2(3y + 2) = 8y - 4 inches", "isCorrect": true, "rationale": "The perimeter of a rectangle is 2(length) + 2(width). Substituting the given expressions: 2(y - 4) + 2(3y + 2). Distributing yields 2y - 8 + 6y + 4. Combining like terms gives (2y + 6y) + (-8 + 4) = 8y - 4."}, {"text": "2(y - 4) + 2(3y + 2) = 8y + 12 inches", "isCorrect": false, "rationale": "This option correctly set up the perimeter expression and distributed, but made an arithmetic error when combining the constant terms (-8 + 4 should be -4, not +12)."}, {"text": "(y - 4)(3y + 2) inches", "isCorrect": false, "rationale": "This expression calculates the area of the poster, not its perimeter."}], "id": "q04"}, {"question": "According to the \"Strategy: Distribute, Then Combine\" key concept, what is the *first* step when simplifying an expression containing parentheses with a factor in front?", "options": [{"text": "Combine like terms outside the parentheses.", "isCorrect": false, "rationale": "Combining like terms is the second step, performed after distribution."}, {"text": "Distribute each factor to every term inside the parentheses.", "isCorrect": true, "rationale": "The stated strategy explicitly lists 'Distribute each factor to every term inside the parentheses' as the first step."}, {"text": "Evaluate any exponents within the parentheses.", "isCorrect": false, "rationale": "While order of operations (PEMDAS/BODMAS) suggests exponents first, this specific strategy for 'expressions with a factor in front' focuses on distribution as the primary initial action for simplification in this context."}, {"text": "Isolate the variable.", "isCorrect": false, "rationale": "Isolating the variable is a step in solving equations, not simplifying expressions."}], "id": "q05"}, {"question": "Simplify the expression: 1/3(9x - 12).", "options": [{"text": "3x - 12", "isCorrect": false, "rationale": "This option incorrectly distributed the fraction to only the first term (9x) but not to the second term (-12)."}, {"text": "3x - 4", "isCorrect": true, "rationale": "Distributing 1/3 to each term: (1/3) * (9x) = 3x, and (1/3) * (-12) = -4. So, the simplified expression is 3x - 4."}, {"text": "9x - 4", "isCorrect": false, "rationale": "This option incorrectly multiplied the first term by 3 instead of 1/3, while correctly distributing to the second term."}, {"text": "3x + 4", "isCorrect": false, "rationale": "This option correctly distributed the fraction but made a sign error when multiplying 1/3 by -12, resulting in +4 instead of -4."}], "id": "q06"}, {"question": "Simplify the expression: 5(2x - 1) - 3(x + 4).", "options": [{"text": "7x - 17", "isCorrect": true, "rationale": "First, distribute: 5(2x - 1) = 10x - 5. Then, distribute -3(x + 4) = -3x - 12. Finally, combine like terms: (10x - 3x) + (-5 - 12) = 7x - 17."}, {"text": "7x - 13", "isCorrect": false, "rationale": "This option correctly distributed and combined the x-terms, but made an arithmetic error when combining the constant terms (-5 - 12 should be -17, not -13)."}, {"text": "7x + 7", "isCorrect": false, "rationale": "This option made a sign error during the second distribution, treating -3(x + 4) as -3x + 12 instead of -3x - 12, leading to incorrect combining of constants."}, {"text": "10x - 5 - 3x + 12", "isCorrect": false, "rationale": "This option shows the correct distribution but fails to combine the like terms, which is the final step in simplifying the expression."}], "id": "q07"}, {"question": "A student simplifies the expression -(5a - 8) as -5a - 8. What specific mistake did the student make?", "options": [{"text": "They incorrectly distributed a positive 1 instead of a negative 1.", "isCorrect": false, "rationale": "The distribution to the first term (-5a) indicates they did distribute a negative value to it."}, {"text": "They failed to distribute the negative sign to the second term inside the parentheses.", "isCorrect": true, "rationale": "The negative sign (representing -1) must be distributed to *every* term. -1 * (5a) = -5a is correct, but -1 * (-8) should be +8, not -8. The student failed to apply the negative to the second term's sign."}, {"text": "They should have combined like terms before distributing.", "isCorrect": false, "rationale": "Terms inside parentheses cannot be combined if they are not like terms. Distribution is generally performed before combining."}, {"text": "They only distributed the negative to the first term, but forgot the factor of 5.", "isCorrect": false, "rationale": "The factor of 5 is part of the term 5a; the error is specifically with the sign of the second term, not ignoring the 5."}], "id": "q08"}, {"question": "Simplify the expression: -(2y + 6) + 3(y - 1).", "options": [{"text": "y - 9", "isCorrect": true, "rationale": "First, distribute the negative sign: -(2y + 6) = -2y - 6. Then, distribute the 3: 3(y - 1) = 3y - 3. Combine like terms: (-2y + 3y) + (-6 - 3) = y - 9."}, {"text": "y + 3", "isCorrect": false, "rationale": "This option correctly distributed and combined the y-terms but made an arithmetic error when combining the constant terms (-6 - 3 should be -9, not +3)."}, {"text": "-2y - 6 + 3y - 1", "isCorrect": false, "rationale": "This option correctly distributed the factors but failed to combine the like terms as the final step in simplifying the expression."}, {"text": "-5y - 7", "isCorrect": false, "rationale": "This option made errors in both distribution steps, particularly combining the y terms as -5y instead of y, and making a sign/arithmetic error on the constants."}], "id": "q09"}, {"question": "The distributive property is given as a(b + c) = ab + ac. What is the fundamental role of 'a' in this property?", "options": [{"text": "'a' represents any integer that can be added to 'b' and 'c'.", "isCorrect": false, "rationale": "The property involves multiplication of 'a' by the terms in the sum, not addition of 'a' to 'b' and 'c'."}, {"text": "'a' is a common factor that is multiplied by each term within the sum or difference.", "isCorrect": true, "rationale": "This correctly describes 'a' as the factor outside the parentheses that gets distributed (multiplied) to every term inside the parentheses."}, {"text": "'a' must always be a positive whole number for the property to apply.", "isCorrect": false, "rationale": "The text states the property is for 'all real numbers a, b, and c', meaning 'a' can be negative, a fraction, or any real number, not just a positive whole number."}, {"text": "'a' signifies that 'b' and 'c' are variables, not specific numbers.", "isCorrect": false, "rationale": "While 'b' and 'c' can be variables, the property applies to 'all real numbers', meaning they can also be constants. 'a' itself can also be a variable or a constant."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
