    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 6, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the \"Strategy for Composite Figures\" key concept, what is the *first* step when finding the area, perimeter, surface area, or volume of a composite figure?", "options": [{"text": "Calculate each part separately.", "isCorrect": false, "rationale": "Calculating each part separately is the third step in the strategy, occurring after identifying shapes and deciding on the operation."}, {"text": "Identify the basic shapes that make up the figure.", "isCorrect": true, "rationale": "The first step listed in the 'Strategy for Composite Figures' is to 'Identify the basic shapes that make up the figure.'"}, {"text": "Decide whether to add or subtract areas/volumes.", "isCorrect": false, "rationale": "Deciding whether to add or subtract is the second step in the strategy, occurring after identifying the basic shapes."}, {"text": "Combine the results.", "isCorrect": false, "rationale": "Combining the results is the final step in the strategy, performed after all individual parts have been calculated."}]}, {"question": "A window is shaped like a rectangle topped with a semicircle. The rectangle is 4 ft wide and 6 ft tall. Using $\\pi = 3.14$, what is the total area of the window?", "options": [{"text": "24.00 ft²", "isCorrect": false, "rationale": "This is only the area of the rectangular part (4 ft * 6 ft = 24 ft²). The semicircle's area must also be added."}, {"text": "30.28 ft²", "isCorrect": true, "rationale": "The area of the rectangle is 4 * 6 = 24 ft². The semicircle has a diameter of 4 ft, so its radius is 2 ft. Its area is (1/2) * $\\pi$ * r² = (1/2) * 3.14 * (2²) = (1/2) * 3.14 * 4 = 6.28 ft². The total area is 24 + 6.28 = 30.28 ft²."}, {"text": "36.56 ft²", "isCorrect": false, "rationale": "This value would result from calculation errors, such as using the diameter as the radius for the semicircle or incorrect multiplication."}, {"text": "40.48 ft²", "isCorrect": false, "rationale": "This value suggests a significant calculation error, possibly treating the semicircle as a full circle or using an incorrect radius or formula."}]}, {"question": "A square piece of sheet metal has sides of 10 in. A circle with a diameter of 6 in. is cut from its center. Using $\\pi = 3.14$, what is the area of the remaining metal?", "options": [{"text": "100.00 in.²", "isCorrect": false, "rationale": "This is only the area of the original square (10 in. * 10 in. = 100 in.²). The area of the cut-out circle must be subtracted."}, {"text": "71.74 in.²", "isCorrect": true, "rationale": "The area of the square is 10² = 100 in.². The circle has a diameter of 6 in., so its radius is 3 in. Its area is $\\pi$ * r² = 3.14 * (3²) = 3.14 * 9 = 28.26 in.². The remaining area is 100 - 28.26 = 71.74 in.²."}, {"text": "28.26 in.²", "isCorrect": false, "rationale": "This is only the area of the circular piece that was cut out. The question asks for the area of the *remaining* metal."}, {"text": "81.28 in.²", "isCorrect": false, "rationale": "This value could result from an incorrect calculation, such as using an incorrect radius or performing the subtraction incorrectly."}]}, {"question": "A grain silo consists of a cylinder with a radius of 5 m and a height of 12 m, topped with a hemisphere of the same radius. What is the total volume of the silo in terms of $\\pi$?", "options": [{"text": "300$\\pi$ m³", "isCorrect": false, "rationale": "This is only the volume of the cylindrical portion ($\\pi$ * r² * h = $\\pi$ * 5² * 12 = 300$\\pi$ m³). The volume of the hemisphere must also be added."}, {"text": "300$\\pi$ + (250/3)$\\pi$ m³", "isCorrect": true, "rationale": "The volume of the cylinder is $\\pi$ * r² * h = $\\pi$ * 5² * 12 = 300$\\pi$ m³. The volume of a hemisphere is (1/2) * (4/3) * $\\pi$ * r³ = (2/3) * $\\pi$ * 5³ = (2/3) * $\\pi$ * 125 = (250/3)$\\pi$ m³. The total volume is the sum: 300$\\pi$ + (250/3)$\\pi$ m³."}, {"text": "300$\\pi$ + (500/3)$\\pi$ m³", "isCorrect": false, "rationale": "This option incorrectly adds the volume of a *full* sphere instead of a hemisphere, or represents a calculation error in the hemispheric volume."}, {"text": "(250/3)$\\pi$ m³", "isCorrect": false, "rationale": "This is only the volume of the hemispherical portion. The volume of the cylinder must also be added."}]}, {"question": "A garden has the shape of a rectangle (20 ft by 10 ft) with a semicircular extension on *one short end*. Using $\\pi = 3.14$, what is the perimeter of the garden?", "options": [{"text": "65.70 ft", "isCorrect": true, "rationale": "The perimeter includes two long sides (20 ft + 20 ft = 40 ft), one remaining short side (10 ft), and the arc length of the semicircle. The semicircle replaces one 10 ft short side, so its diameter is 10 ft, and its radius is 5 ft. The arc length is (1/2) * (2$\\pi$r) = $\\pi$r = 3.14 * 5 = 15.70 ft. Total perimeter = 40 + 10 + 15.70 = 65.70 ft."}, {"text": "50.00 ft", "isCorrect": false, "rationale": "This value (20+20+10) only includes the three straight sides of the rectangle that form part of the perimeter, neglecting the semicircular arc."}, {"text": "55.70 ft", "isCorrect": false, "rationale": "This value results from adding two long sides (20+20) and the semicircle's arc (15.70), but incorrectly omitting one of the rectangle's short sides (10 ft)."}, {"text": "81.40 ft", "isCorrect": false, "rationale": "This value suggests an error like adding the circumference of a full circle or miscalculating the arc length."}]}, {"question": "Using the same garden described in Question 5 (rectangle 20 ft by 10 ft with a semicircular extension on one short end), what is its total area? Use $\\pi = 3.14$.", "options": [{"text": "200.00 ft²", "isCorrect": false, "rationale": "This is only the area of the rectangular portion (20 ft * 10 ft = 200 ft²). The area of the semicircular extension must also be added."}, {"text": "239.25 ft²", "isCorrect": true, "rationale": "The area of the rectangle is 20 * 10 = 200 ft². The semicircle has a diameter of 10 ft, so its radius is 5 ft. Its area is (1/2) * $\\pi$ * r² = (1/2) * 3.14 * (5²) = (1/2) * 3.14 * 25 = 39.25 ft². The total area is 200 + 39.25 = 239.25 ft²."}, {"text": "261.25 ft²", "isCorrect": false, "rationale": "This value would result from a calculation error for the semicircle, perhaps using a full circle's area or an incorrect radius."}, {"text": "215.70 ft²", "isCorrect": false, "rationale": "This value seems to mix area and perimeter calculations or represents a significant error in the semicircle's area."}]}, {"question": "A solid is made by placing a cone (radius 4 cm, height 6 cm) on top of a cylinder (radius 4 cm, height 10 cm). Using $\\pi = 3.14$, what is the total volume of the solid?", "options": [{"text": "502.4 cm³", "isCorrect": false, "rationale": "This is only the volume of the cylindrical part ($\\pi$ * r² * h = 3.14 * 4² * 10 = 502.4 cm³). The volume of the cone must also be added."}, {"text": "100.48 cm³", "isCorrect": false, "rationale": "This is only the volume of the conical part ((1/3) * $\\pi$ * r² * h = (1/3) * 3.14 * 4² * 6 = 100.48 cm³). The volume of the cylinder must also be added."}, {"text": "602.88 cm³", "isCorrect": true, "rationale": "The volume of the cylinder is $\\pi$ * r² * h = 3.14 * 4² * 10 = 502.4 cm³. The volume of the cone is (1/3) * $\\pi$ * r² * h = (1/3) * 3.14 * 4² * 6 = 100.48 cm³. The total volume is 502.4 + 100.48 = 602.88 cm³."}, {"text": "703.36 cm³", "isCorrect": false, "rationale": "This value would result from calculation errors, such as using incorrect formulas or multiplying by an extra factor."}]}, {"question": "When finding the *surface area* of a composite solid, what crucial step must be remembered regarding the faces where two pieces are joined?", "options": [{"text": "These faces should be included in the total surface area.", "isCorrect": false, "rationale": "The textbook explicitly states: 'When finding the surface area of a composite solid, be careful not to count the faces where two pieces are joined. Those interior faces are hidden and should not be included.'"}, {"text": "These faces should be counted twice, once for each piece.", "isCorrect": false, "rationale": "Counting these faces twice would lead to a significant overestimation of the external surface area, as they are internal and hidden."}, {"text": "These faces are hidden and should not be included in the total surface area.", "isCorrect": true, "rationale": "The textbook notes that 'When finding the surface area of a composite solid, be careful not to count the faces where two pieces are joined. Those interior faces are hidden and should not be included.'"}, {"text": "The area of these faces should be subtracted from the total volume.", "isCorrect": false, "rationale": "This option confuses surface area with volume and applies an incorrect operation. Surface area and volume are distinct measurements."}]}, {"question": "A designer wants to create a new shelf design. The shelf is a rectangular prism, but a semicircular notch is carved out from the front edge. To find the *volume* of the shelf, what operation would be primarily used?", "options": [{"text": "Addition of volumes, as it's a composite figure.", "isCorrect": false, "rationale": "While it's a composite figure, the description 'carved out' or 'removed' specifically indicates that a portion is missing, requiring subtraction rather than addition."}, {"text": "Subtraction of volumes, as a part is removed from the whole.", "isCorrect": true, "rationale": "The phrase 'carved out' implies that a section is removed from a larger basic shape. Therefore, to find the volume of the remaining object, one would subtract the volume of the removed part from the volume of the original part."}, {"text": "Multiplication of volumes, combining different dimensions.", "isCorrect": false, "rationale": "Multiplication is used within the formulas for calculating individual volumes, but not for combining or modifying the volumes of distinct parts in this context."}, {"text": "Division of volumes, to find the average volume.", "isCorrect": false, "rationale": "Division is not the standard operation for finding the volume of a composite figure where a part is removed; it would yield a ratio or an average, not the net volume."}]}, {"question": "Which of the following real-world objects is *most likely* to require the methods for composite figures to accurately calculate its volume?", "options": [{"text": "A standard brick (rectangular prism).", "isCorrect": false, "rationale": "A standard brick is a simple rectangular prism, for which volume can be calculated directly using a single formula."}, {"text": "A cylindrical drinking glass.", "isCorrect": false, "rationale": "A cylindrical drinking glass (assuming uniform thickness) is primarily a simple cylinder, whose volume can be calculated with a single formula (or two if considering the hollow space)."}, {"text": "A spherical exercise ball.", "isCorrect": false, "rationale": "An exercise ball is a simple sphere, for which volume can be calculated directly using a single formula."}, {"text": "A rocket composed of a main cylindrical body with a conical nose cone.", "isCorrect": true, "rationale": "A rocket with a cylindrical body and a conical nose cone is a classic example of a 3-D composite figure, as it combines two distinct basic geometric shapes (cylinder and cone) to form its total volume."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
