<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math II &mdash; Chapter 6, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the definition provided, which characteristic uniquely identifies a sphere?", "options": [{"text": "It is a three-dimensional object with exactly six flat faces.", "isCorrect": false, "rationale": "This describes a cube or rectangular prism, not a sphere, which has no flat faces."}, {"text": "It is the set of all points in space that are a fixed distance from a central point.", "isCorrect": true, "rationale": "This is the exact definition of a sphere provided in the key term section, emphasizing the fixed distance (radius) from a central point (center)."}, {"text": "It is a two-dimensional shape with all points equidistant from a center point.", "isCorrect": false, "rationale": "This describes a circle, which is a 2D shape, not a 3D sphere."}, {"text": "It has a circular base and a single vertex, forming a curved surface.", "isCorrect": false, "rationale": "This describes a cone, not a sphere."}], "id": "q01"}, {"question": "Which formula should be used to calculate the amount of material needed to cover the entire exterior of a spherical object, such as a basketball?", "options": [{"text": "$V = \\frac{4}{3}\\pi r^3$", "isCorrect": false, "rationale": "This formula calculates the volume of a sphere, which measures the space it occupies, not its exterior surface."}, {"text": "$SA = 2\\pi r h$", "isCorrect": false, "rationale": "This formula calculates the lateral surface area of a cylinder, which is not applicable to a sphere."}, {"text": "$SA = 4\\pi r^2$", "isCorrect": true, "rationale": "This is the correct formula for the surface area of a sphere, which measures the total area of its outer surface."}, {"text": "$A = \\pi r^2$", "isCorrect": false, "rationale": "This formula calculates the area of a flat circle, not the surface area of a three-dimensional sphere."}], "id": "q02"}, {"question": "A spherical marble has a radius of 2 cm. What is its surface area in terms of $\\pi$?", "options": [{"text": "$8\\pi \\text{ cm}^2$", "isCorrect": false, "rationale": "This would be $2 \\times 4\\pi r^2$ if r was 1, or $4\\pi r$ if r was 2. The formula for surface area is $4\\pi r^2$, so $4\\pi (2)^2 = 16\\pi$."}, {"text": "$16\\pi \\text{ cm}^2$", "isCorrect": true, "rationale": "Using the surface area formula $SA = 4\\pi r^2$ with $r=2$ cm, we get $SA = 4\\pi (2)^2 = 4\\pi (4) = 16\\pi \\text{ cm}^2$."}, {"text": "$32\\pi \\text{ cm}^3$", "isCorrect": false, "rationale": "This answer uses incorrect units (volume instead of area) and an incorrect calculation for surface area."}, {"text": "$4\\pi \\text{ cm}^2$", "isCorrect": false, "rationale": "This would be the surface area of a sphere with radius 1 cm, not 2 cm."}], "id": "q03"}, {"question": "A sphere has a diameter of 10 meters. What is its volume in terms of $\\pi$?", "options": [{"text": "$500/3\\pi \\text{ m}^3$", "isCorrect": true, "rationale": "First, find the radius: $r = d/2 = 10/2 = 5$ meters. Then, use the volume formula $V = \\frac{4}{3}\\pi r^3 = \\frac{4}{3}\\pi (5)^3 = \\frac{4}{3}\\pi (125) = \\frac{500}{3}\\pi \\text{ m}^3$."}, {"text": "$100\\pi \\text{ m}^2$", "isCorrect": false, "rationale": "This represents the surface area of a sphere with radius 5m, not the volume, and has incorrect units for volume."}, {"text": "$125\\pi \\text{ m}^3$", "isCorrect": false, "rationale": "This would be the volume of a cube with side length 5m, or $\\pi r^3$ if pi was removed, not the volume of a sphere."}, {"text": "$250/3\\pi \\text{ m}^3$", "isCorrect": false, "rationale": "This calculation would result if the radius was incorrectly taken as $\\sqrt[3]{62.5}$ or some other error in calculation."}], "id": "q04"}, {"question": "A spherical balloon has a diameter of 18 cm. Using $\\pi \\approx 3.14$, what is its approximate surface area?", "options": [{"text": "$254.34 \\text{ cm}^2$", "isCorrect": false, "rationale": "This would be the surface area if the radius was 4.5 cm ($4\\pi (4.5)^2$). The radius is 9 cm."}, {"text": "$1017.36 \\text{ cm}^2$", "isCorrect": true, "rationale": "First, find the radius: $r = d/2 = 18/2 = 9$ cm. Using the surface area formula $SA = 4\\pi r^2$, we get $SA = 4(3.14)(9)^2 = 4(3.14)(81) = 12.56(81) = 1017.36 \\text{ cm}^2$."}, {"text": "$508.68 \\text{ cm}^2$", "isCorrect": false, "rationale": "This would be $2\\pi r^2$ or $4\\pi (r/\\sqrt{2})^2$, not the correct surface area."}, {"text": "$2289.06 \\text{ cm}^2$", "isCorrect": false, "rationale": "This results from incorrectly using the diameter as the radius in the formula ($4\\pi (18)^2$)."}], "id": "q05"}, {"question": "If the radius of a sphere is given in feet (ft), what unit should its volume be expressed in?", "options": [{"text": "feet (ft)", "isCorrect": false, "rationale": "Feet is a unit of length (1D), not volume (3D)."}, {"text": "square feet (ft$^2$)", "isCorrect": false, "rationale": "Square feet is a unit of area (2D), not volume."}, {"text": "cubic feet (ft$^3$)", "isCorrect": true, "rationale": "Volume measures three-dimensional space, so it should be expressed in cubic units, such as cubic feet."}, {"text": "It depends on the value of $\\pi$.", "isCorrect": false, "rationale": "The unit of measurement for volume is independent of the value of $\\pi$ used in calculations; it's determined by the unit of the radius."}], "id": "q06"}, {"question": "A spherical object has a radius of 'r'. If a second spherical object has a radius of '3r', how does the volume of the second object compare to the first?", "options": [{"text": "The volume of the second object is 3 times the first.", "isCorrect": false, "rationale": "Volume scales with the cube of the radius, not linearly."}, {"text": "The volume of the second object is 9 times the first.", "isCorrect": false, "rationale": "This would be true for surface area scaling ($3^2=9$), but not for volume."}, {"text": "The volume of the second object is 27 times the first.", "isCorrect": true, "rationale": "The volume formula is $V = \\frac{4}{3}\\pi r^3$. If the radius becomes $3r$, the new volume is $V' = \\frac{4}{3}\\pi (3r)^3 = \\frac{4}{3}\\pi (27r^3) = 27 (\\frac{4}{3}\\pi r^3)$. So, the volume is 27 times greater."}, {"text": "The volume of the second object is 81 times the first.", "isCorrect": false, "rationale": "This would be $3^4$ times, which is incorrect for volume scaling."}], "id": "q07"}, {"question": "The diameter of a basketball is approximately 9.4 inches. To calculate its surface area, what value should be used for the radius 'r' in the formula $SA = 4\\pi r^2$?", "options": [{"text": "9.4 inches", "isCorrect": false, "rationale": "9.4 inches is the diameter, not the radius. The radius is half the diameter."}, {"text": "18.8 inches", "isCorrect": false, "rationale": "18.8 inches is double the diameter, which is incorrect for the radius."}, {"text": "4.7 inches", "isCorrect": true, "rationale": "The radius is half the diameter, so $r = 9.4 \\div 2 = 4.7$ inches. This is explicitly stated in the basketball example in the text."}, {"text": "$9.4\\pi$ inches", "isCorrect": false, "rationale": "Multiplying the diameter by $\\pi$ is not a step in finding the radius for these formulas."}], "id": "q08"}, {"question": "A student calculates the volume of a sphere with radius 3 ft as $36\\pi \\text{ ft}^3$. Which of the following statements is true about this calculation?", "options": [{"text": "The calculation is incorrect; the volume should be $4\\pi (3)^2 = 36\\pi \\text{ ft}^2$.", "isCorrect": false, "rationale": "The provided answer is for volume, not surface area, and the units are also incorrect for area. The stated calculation is actually correct for volume."}, {"text": "The calculation is correct, as $V = \\frac{4}{3}\\pi (3)^3 = \\frac{4}{3}\\pi (27) = 36\\pi \\text{ ft}^3$.", "isCorrect": true, "rationale": "This statement is true. The checkpoint example confirms this calculation for a sphere with radius 3 ft."}, {"text": "The calculation is incorrect; the volume should be $4\\pi (3)^3 = 108\\pi \\text{ ft}^3$.", "isCorrect": false, "rationale": "This calculation omits the division by 3 in the volume formula, making it incorrect."}, {"text": "The calculation is incorrect; the volume should be $4\\pi (3) = 12\\pi \\text{ ft}^3$.", "isCorrect": false, "rationale": "This calculation incorrectly uses the radius as a linear factor instead of cubing it, and also misapplies the constant."}], "id": "q09"}, {"question": "Mars has a radius of approximately $3,390$ km. Its volume is given as roughly $5.19 \\times 10^{10} \\text{ km}^3$. If we were to calculate its surface area, which order of magnitude would the result likely fall into?", "options": [{"text": "Approximately $10^{6} \\text{ km}^2$", "isCorrect": false, "rationale": "This order of magnitude is too small. $r^2$ is $(3.39 \\times 10^3)^2 \\approx 10^7$ or $10^8$, and $4\\pi$ multiplies that."}, {"text": "Approximately $10^{8} \\text{ km}^2$", "isCorrect": true, "rationale": "The radius is $r \\approx 3.39 \\times 10^3$ km. The surface area is $SA = 4\\pi r^2 \\approx 4\\pi (3.39 \\times 10^3)^2 \\approx 4\\pi (11.49 \\times 10^6) \\approx 144 \\times 10^6 = 1.44 \\times 10^8 \\text{ km}^2$. Thus, the order of magnitude is $10^8$."}, {"text": "Approximately $10^{10} \\text{ km}^2$", "isCorrect": false, "rationale": "This order of magnitude matches the volume, not the surface area. Surface area scales with $r^2$, while volume scales with $r^3$."}, {"text": "Approximately $10^{12} \\text{ km}^2$", "isCorrect": false, "rationale": "This order of magnitude is too large for the surface area given the radius."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
