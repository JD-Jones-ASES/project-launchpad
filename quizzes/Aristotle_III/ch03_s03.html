<script>
var QUESTIONS = [{"question": "Which statement best summarizes Averroes' primary contribution to Western philosophy as described in the text?", "options": [{"text": "He founded a new philosophical school distinct from Aristotelianism.", "isCorrect": false, "rationale": "The text states Averroes was the 'supreme commentator on Aristotle's works' and 'reintroduced Aristotelian philosophy,' indicating he propagated, rather than replaced, Aristotelian thought."}, {"text": "He served as the primary conduit for reintroducing Aristotle's Metaphysics to Christian thinkers in medieval Europe.", "isCorrect": true, "rationale": "The text explicitly states that 'Without Averroes, Thomas Aquinas might never have encountered the Metaphysics in its full depth' and that his commentaries 'reintroduced Aristotelian philosophy to Christian thinkers'."}, {"text": "He developed the Principle of Non-Contradiction, which Aristotle then adopted.", "isCorrect": false, "rationale": "The text attributes the formulation and defense of the Principle of Non-Contradiction directly to Aristotle in the Metaphysics, not Averroes."}, {"text": "He argued that philosophy and religion were fundamentally irreconcilable.", "isCorrect": false, "rationale": "The text states Averroes 'believed that philosophy and religion could be reconciled,' which contradicts this option."}], "id": "q01"}, {"question": "According to Aristotle, what distinguishes 'first philosophy' from all other sciences?", "options": [{"text": "It focuses exclusively on the study of living organisms and their origins.", "isCorrect": false, "rationale": "The study of living organisms is the domain of biology, a special science, not first philosophy, which is universal."}, {"text": "It investigates specific regions of reality, such as mathematical quantities or physical motion.", "isCorrect": false, "rationale": "This describes special sciences like mathematics or physics. First philosophy is characterized by having 'no such restriction' and investigating 'being simply as being'."}, {"text": "It seeks to understand being universally, asking what belongs to everything simply because it exists, and identifying the highest beings.", "isCorrect": true, "rationale": "The text defines first philosophy as the science that 'investigates being simply as being' and 'asks about being itself' as well as 'the highest beings,' emphasizing its universal scope."}, {"text": "It is a preliminary investigation into the four causes before deeper philosophical inquiry can begin.", "isCorrect": false, "rationale": "The text indicates that the four causes were 'preliminary investigations' that *raised* the need for first philosophy, which goes beyond explaining the causes themselves."}], "id": "q02"}, {"question": "Aristotle's statement, 'Being is said in many ways' (to on legetai pollachos), primarily means that:", "options": [{"text": "The concept of 'being' is inherently ambiguous and therefore cannot be the subject of a unified science.", "isCorrect": false, "rationale": "While 'being' is not simple, Aristotle's insight leads to a *subtle response* that unifies the science, rather than shattering it, through the concept of substance."}, {"text": "Different languages have multiple words to express the concept of existence.", "isCorrect": false, "rationale": "The text is discussing the philosophical concept within a single linguistic framework (Ancient Greek 'to on'), not a cross-linguistic comparison of terms."}, {"text": "Existence is attributed to various things (like qualities, quantities, or relations) but always primarily in relation to substance.", "isCorrect": true, "rationale": "This option accurately reflects Aristotle's resolution: 'Though being is said in many ways, all of those ways are related to a single primary sense: the sense in which a substance (ousia) exists.'"}, {"text": "Only physical objects truly 'are'; abstract concepts like courage or height do not truly exist.", "isCorrect": false, "rationale": "Aristotle uses courage and height as examples of things that 'are,' but in a secondary sense, not as non-existent. The issue is the *way* they are said to be."}], "id": "q03"}, {"question": "Why is 'substance' (ousia) crucial for Aristotle's project of a science of being as being?", "options": [{"text": "Substance is the only true form of being, rendering other forms like qualities or relations as illusory.", "isCorrect": false, "rationale": "The text states that qualities, relations, and quantities are 'real only by belonging to a substance,' implying they exist, but dependently, not illusorily."}, {"text": "It serves as the singular, primary sense of being to which all other ways of being are ultimately related and dependent.", "isCorrect": true, "rationale": "The text explicitly states: 'Substance, then, is not merely one kind of being among others — it is the primary kind of being, on which all other kinds depend. This makes the science of being as being, fundamentally, the science of substance.'"}, {"text": "It is a special kind of being that only physicists and mathematicians can investigate.", "isCorrect": false, "rationale": "The investigation of substance belongs to the philosopher, as it is the 'primary kind of being' and thus central to the universal science of being as being, not a specialized field."}, {"text": "Substance is merely one of many equally valid categories of being, each requiring its own separate science.", "isCorrect": false, "rationale": "This contradicts Aristotle's resolution that all ways of being are *related* to a *single primary sense*, thereby enabling a unified science."}], "id": "q04"}, {"question": "Which of the following analogies from the text best illustrates how different senses of 'being' can be unified under a single science?", "options": [{"text": "The hierarchy of knowledge from sensation to wisdom.", "isCorrect": false, "rationale": "This analogy explains different levels of knowledge, not how various meanings of a single concept like 'being' relate to a central point."}, {"text": "The four causes explaining everything in the natural world.", "isCorrect": false, "rationale": "The four causes explain *how things are*, but the text states they raised a *deeper question* about the universal framework of being itself, which the 'many ways of being' complication addresses."}, {"text": "Different species of being being investigated by specific parts of a generically one science.", "isCorrect": false, "rationale": "While true, this refers to sub-disciplines within the science of being, not the *unification* of the different *senses* of 'being' to a primary sense, which is what the question asks about."}, {"text": "Things being called 'healthy' because they preserve health, produce health, or are a symptom of health.", "isCorrect": true, "rationale": "The text explicitly uses this analogy from 'Metaphysics, Book IV, Part 2' to explain how 'all that is 'is' is related to one central point, one definite kind of thing,' which is substance."}], "id": "q05"}, {"question": "Why does Aristotle consider the Principle of Non-Contradiction (PNC) to be 'the most certain of all principles'?", "options": [{"text": "It is easily demonstrable through empirical observation in the natural world.", "isCorrect": false, "rationale": "The text states it 'cannot be proved' directly, and it's a foundational logical principle, not one primarily derived from empirical observation."}, {"text": "It is a hypothesis that everyone must accept before engaging in philosophical inquiry.", "isCorrect": false, "rationale": "The text specifies that 'a principle which every one must have who understands anything that is, is not a hypothesis.' The PNC is non-hypothetical."}, {"text": "It is intrinsically known and impossible for anyone to believe the opposite, serving as a non-hypothetical starting point for all other axioms.", "isCorrect": true, "rationale": "The text explains it's 'impossible for any one to believe the same thing to be and not to be,' and it's 'the most certain of all principles' and 'the starting-point for all the other axioms' because it is 'non-hypothetical' and 'best known'."}, {"text": "It is a principle derived from the specific investigations of mathematicians and geometers.", "isCorrect": false, "rationale": "The text states that specific sciences like mathematics don't inquire into its truth or falsity; it belongs to the philosopher because it applies to 'being qua being' universally."}], "id": "q06"}, {"question": "An individual claims that a specific apple is both entirely red and entirely green at the exact same time and in the exact same respect. Based on Aristotle's teachings in the text, what would be the most appropriate philosophical response?", "options": [{"text": "Acknowledge that such a statement is a valid perspective according to certain subjective truths.", "isCorrect": false, "rationale": "Aristotle’s Principle of Non-Contradiction posits an objective truth that an attribute cannot both belong and not belong simultaneously and in the same respect, making such a statement inherently impossible to believe and logically unsound."}, {"text": "Question whether the individual truly believes their statement, as it violates the most certain principle of all.", "isCorrect": true, "rationale": "Aristotle addresses those who 'think Heraclitus says' it's possible to believe contradictions, stating, 'For what a man says, he does not necessarily believe; and if it is impossible that contrary attributes should belong at the same time to the same subject...' This directly applies to someone claiming such a belief."}, {"text": "Suggest that the individual is demonstrating a sophisticated understanding of dialectical reasoning.", "isCorrect": false, "rationale": "Aristotle introduces 'further qualifications which might be added' to the PNC 'to guard against dialectical objections,' implying that denying it is an error to be guarded against, not a sign of sophistication."}, {"text": "Advise them to consult a physicist, as the nature of color is a scientific inquiry.", "isCorrect": false, "rationale": "While color is a physical property, the contradiction itself ('both red and not red') is a matter for the philosopher and the Principle of Non-Contradiction, which transcends special sciences."}], "id": "q07"}, {"question": "The text implies that 'first philosophy' (or 'theology') is concerned with the highest beings because:", "options": [{"text": "The study of specific deities is essential for understanding the natural world.", "isCorrect": false, "rationale": "While it is called 'theology,' the text frames it as 'a science of the divine' at its apex, linked to the question of 'highest beings' that 'ground the entire order of reality,' not necessarily the study of specific deities in a theological sense."}, {"text": "These beings are the most complex and therefore require the most specialized scientific inquiry.", "isCorrect": false, "rationale": "First philosophy is universal, not specialized. The 'highest beings' are important because they 'ground the entire order of reality,' not just due to complexity."}, {"text": "The questions of 'what is being?' and 'what is the highest being?' are fundamentally inseparable within this universal inquiry.", "isCorrect": true, "rationale": "The text states: 'The science of being as being (on he on) is therefore also, at its apex, a science of the divine. The two questions — what is being? and what is the highest being? — turn out to be inseparable.'"}, {"text": "Highest beings are the primary subject matter of physics, which is a kind of wisdom.", "isCorrect": false, "rationale": "The text states that 'Physics also is a kind of Wisdom, but it is not the first kind' and that the philosopher's inquiry 'is above even the natural philosopher' when discussing universal truths."}], "id": "q08"}, {"question": "Based on the excerpt from Metaphysics, Book IV, Part 3, why does the inquiry into universal truths like axioms (e.g., PNC) belong to 'the philosopher' rather than a specialist like a geometer?", "options": [{"text": "Geometers and arithmeticians are not concerned with truth or falsity in their fields.", "isCorrect": false, "rationale": "While specialists may not inquire into the *truth of axioms themselves*, they certainly deal with truth and falsity within their domain. The text says they 'do not try to say anything about their truth or falsity' of the axioms, not of their own discipline's propositions."}, {"text": "These truths hold good for everything that is, qua being, making their investigation universal, which is the philosopher's domain.", "isCorrect": true, "rationale": "The text states, 'for these truths hold good for everything that is, and not for some special genus apart from others... to him who studies being qua being belongs the inquiry into these as well.'"}, {"text": "Specialized sciences like geometry are a lower form of wisdom and are irrelevant to fundamental principles.", "isCorrect": false, "rationale": "The text mentions 'Physics also is a kind of Wisdom,' implying that specialized sciences have their own wisdom, but first philosophy is 'the first kind' and deals with *universal* principles, not that they are irrelevant."}, {"text": "Philosophers are the only ones capable of understanding complex logical structures.", "isCorrect": false, "rationale": "The text argues that everyone uses these principles to some extent and must know them for special studies, not that only philosophers can understand them. The philosopher's role is to *inquire into them* due to their universal scope."}], "id": "q09"}, {"question": "If a student were struggling to understand the fundamental unity underlying all existing things, despite their diverse appearances, which Aristotelian concept would be most helpful in clarifying this problem?", "options": [{"text": "The four causes, which provide a complete explanation for change.", "isCorrect": false, "rationale": "The text states the four causes raised a *deeper question* about the universal framework of being, implying they don't fully address the unity of 'being itself'."}, {"text": "The distinction between sensation and wisdom in the hierarchy of knowledge.", "isCorrect": false, "rationale": "This concept explains different levels of understanding, not the inherent unity of what is understood."}, {"text": "The primary status of substance (ousia) as the central point to which all other modes of being relate.", "isCorrect": true, "rationale": "The text explains that 'all that 'is' is related to one central point, one definite kind of thing,' which is substance, and this 'unlocks the unity of being' by explaining how 'being is said in many ways' but unified."}, {"text": "The Principle of Non-Contradiction, which establishes the most certain logical axiom.", "isCorrect": false, "rationale": "While foundational, the PNC is about the impossibility of contradictory attributes; it doesn't primarily explain how diverse *types* of existence are unified into a single concept of 'being'."}], "id": "q10"}, {"question": "How does Descartes' 'clear and distinct' criterion differ fundamentally from Aristotle's Principle of Non-Contradiction as a foundation for knowledge?", "options": [{"text": "Descartes grounds certainty in the clarity of thought alone, while Aristotle grounds certainty in a principle about how being itself is structured.", "isCorrect": true, "rationale": "The text states: 'Aristotle's non-contradiction is a principle about both being and thought... Descartes' clear-and-distinct criterion is a principle about thought alone.' Aristotle starts from the world; Descartes starts from the mind."}, {"text": "Descartes requires empirical confirmation from the senses, whereas Aristotle requires only introspective clarity.", "isCorrect": false, "rationale": "It is Descartes who doubts the senses and retreats to the mind, not Aristotle. Aristotle trusts the structure of the world that the senses present."}, {"text": "Both criteria are about thought, but Descartes restricts his to mathematics while Aristotle applies his to all of being.", "isCorrect": false, "rationale": "Descartes' clear-and-distinct criterion is meant as a universal criterion for truth, not restricted to mathematics. His discussion of arithmetic is an illustration of a difficulty, not a boundary."}, {"text": "Aristotle's criterion requires divine guarantee, whereas Descartes' criterion is self-sufficient without invoking God.", "isCorrect": false, "rationale": "It is Descartes, not Aristotle, who needs to prove God's existence and benevolence to guarantee that clear and distinct ideas correspond to external reality."}], "id": "q11"}, {"question": "Why does Aquinas describe God using the phrase $ipsum esse subsistens rather than simply calling God 'a substance'?", "options": [{"text": "Because God is composed of a unique combination of form, matter, and accidents that transcend ordinary substances.", "isCorrect": false, "rationale": "Aquinas's doctrine of divine simplicity holds that God has no composition of form and matter, substance and accidents, or essence and existence — the opposite of this answer."}, {"text": "To indicate that God, unlike creatures, does not merely 'have' being within the limits of a nature — God's essence and existence are identical.", "isCorrect": true, "rationale": "The text explains: 'While every creature has a particular kind of being... God's being is not limited by any nature distinct from that being. In God, essence and existence are identical.' $ipsum esse subsistens captures this unique identity."}, {"text": "Because Scripture refers to God as a Spirit and spirits are a distinct metaphysical category above substances.", "isCorrect": false, "rationale": "While Aquinas cites Scripture ('God is a spirit'), the phrase $ipsum esse subsistens is a philosophical argument about the identity of essence and existence, not a category derived from Scripture."}, {"text": "To distinguish God from Platonic Forms, which are pure essences that also exist independently of matter.", "isCorrect": false, "rationale": "Aquinas's argument is framed within the Aristotelian distinction between essence and existence in creatures. The contrast is with created substances, not with Platonic Forms."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
