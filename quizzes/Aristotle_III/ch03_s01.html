<script>
var QUESTIONS = [{"question": "Which of the following best describes Aristotle's 'first philosophy' or 'being as being' (on he on)?", "options": [{"text": "It is a specialized science that studies only the highest, most perfect beings, similar to theology.", "isCorrect": false, "rationale": "While 'first philosophy' is sometimes called 'theology' because it *culminates* in the study of highest beings, its *subject* is not restricted to them. It studies what belongs to everything that exists, simply because it exists."}, {"text": "It is the study of living organisms, focusing on their inherent properties and structures.", "isCorrect": false, "rationale": "The study of living organisms is biology, a specialized science. First philosophy explicitly contrasts with such domain-restricted inquiries."}, {"text": "It is a universal science that investigates what is true of all things merely by virtue of their existence, without domain restriction.", "isCorrect": true, "rationale": "This accurately reflects the text's definition: 'first philosophy, or metaphysics, is the science of being as being — of what belongs to everything that exists, simply because it exists. ...Its subject is being itself.'"}, {"text": "It is a logical inquiry into the concept of 'existence' as an abstract idea, distinct from concrete reality.", "isCorrect": false, "rationale": "The text explicitly states: 'Nor is it a study of “existence” as a concept in logic. Aristotle is investigating reality — what the world is actually like at the most fundamental level.'"}], "id": "q01"}, {"question": "Aristotle addresses the potential criticism that 'first philosophy' is hopelessly vague due to its broad scope. How does he respond to this challenge?", "options": [{"text": "He concedes that it is vague but argues that vagueness is necessary for truly universal truths.", "isCorrect": false, "rationale": "Aristotle explicitly denies vagueness, stating that 'some truths apply universally — and those truths are not vague but absolutely fundamental.'"}, {"text": "He explains that the science narrows its focus over time as more specific truths are discovered, becoming precise.", "isCorrect": false, "rationale": "The text states that first philosophy 'widens its focus to include everything' and that 'narrowing is what makes progress possible' in *other* sciences, not this one. Its precision comes from the universality of its principles, not a later narrowing."}, {"text": "He argues that its truths, like the four causes and non-contradiction, are fundamental and precise, applying universally without being vague generalities.", "isCorrect": true, "rationale": "This aligns with Aristotle's defense: 'Aristotle's response is that some truths apply universally — and those truths are not vague but absolutely fundamental. The four causes explain all things; the principle of non-contradiction governs all thought and all reality... These are not vague generalities but the most precise and certain truths of all.'"}, {"text": "He suggests that its primary goal is to identify and categorize all types of beings, which inherently makes it comprehensive rather than vague.", "isCorrect": false, "rationale": "While it deals with all types of beings, its goal is not just categorization but to find what belongs to them 'simply because they exist.' The precision comes from the fundamental nature of these truths, not mere comprehensive categorization."}], "id": "q02"}, {"question": "According to Aristotle, why is 'substance' (ousia) considered the primary sense of 'being'?", "options": [{"text": "Substance is the only category of being that humans can directly perceive through their senses.", "isCorrect": false, "rationale": "The text does not discuss the perceptibility of substance as a reason for its primacy. Its definition emphasizes independent existence."}, {"text": "Substance is a Platonic Form of Being, representing the ideal and perfect form of existence.", "isCorrect": false, "rationale": "The 'caution' box explicitly states: '“Being as being” does not mean some special super-being that exists above all others, like a Platonic Form of Being.' Substance is a primary category of being, not a Platonic Form."}, {"text": "All other categories of being, such as qualities, quantities, and relations, depend on substance for their existence.", "isCorrect": true, "rationale": "The text states: 'Substance, therefore, is not just one kind of being among others: it is the kind of being that all other kinds depend on.' Qualities, quantities, and relations are real 'only by belonging to a substance.'"}, {"text": "Substance is the most complex form of being, encompassing the most attributes and properties.", "isCorrect": false, "rationale": "The text defines substance as 'what exists in itself, not in another,' and highlights its independent nature, not its complexity or number of attributes, as the reason for its primacy."}], "id": "q03"}, {"question": "Aristotle's concept of 'focal meaning' or 'pros hen equivocity' is crucial for understanding how 'being' can be a unified subject of study. How does this concept apply to the term 'being'?", "options": [{"text": "It means 'being' is a mere synonymy, where the word is used for completely different, unrelated things.", "isCorrect": false, "rationale": "The text explicitly contrasts 'focal meaning' with 'mere synonymy,' using the example of 'bat' to illustrate synonymy."}, {"text": "It implies that 'being' is a pure univocity, always referring to exactly the same thing in every instance.", "isCorrect": false, "rationale": "The text explicitly states 'being' is not 'pure univocity,' using 'mammal' as an example of univocity. Aristotle acknowledges 'being is said in many ways.'"}, {"text": "It posits that all different senses of 'being' are related to a single primary sense, which is substance.", "isCorrect": true, "rationale": "This is the core of focal meaning as applied to 'being': ''Being' is indeed said in many ways — but all of those ways are related to one primary sense. This is... pros hen equivocity: everything called 'being' is called so with reference to a single focal point, namely substance.'"}, {"text": "It suggests that 'being' is a vague term whose meaning can only be understood through context-specific interpretations.", "isCorrect": false, "rationale": "Aristotle is explicitly fighting against the idea that 'being' is vague or chaotic. Focal meaning provides an ordered, non-vague unity."}], "id": "q04"}, {"question": "Which scenario would Aristotle consider a violation of the Principle of Non-Contradiction, as stated in the text?", "options": [{"text": "A man who is pale-skinned but also has dark hair.", "isCorrect": false, "rationale": "This is not a contradiction because 'pale' and 'dark' apply to different parts ('respects') of the man (skin vs. hair). The principle's qualifications ('in the same respect') are crucial."}, {"text": "A lake that is warm in the summer and cold in the winter.", "isCorrect": false, "rationale": "This is not a contradiction because the attributes ('warm' and 'cold') apply at different times ('at the same time'). The principle's qualifications ('at the same time') are crucial."}, {"text": "A wooden table that is simultaneously brown and not brown at the exact same time and in the exact same part of its surface.", "isCorrect": true, "rationale": "This scenario directly violates the principle's qualifications: 'the same attribute cannot at the same time both belong and not belong to the same subject in the same respect.' Being 'brown' and 'not brown' for the same part, at the same time, in the same respect, is a contradiction."}, {"text": "A length of rope that is short relative to a mountain but long relative to a finger.", "isCorrect": false, "rationale": "This is not a contradiction because the descriptions ('short' and 'long') apply in different respects (relative to a mountain vs. relative to a finger). The principle's qualifications ('in the same respect') are crucial."}], "id": "q05"}, {"question": "Why does Aristotle claim that the Principle of Non-Contradiction cannot be proved?", "options": [{"text": "It is an empirical truth that can only be observed, not logically derived.", "isCorrect": false, "rationale": "The text describes it as a 'most certain principle' about being itself, which governs thought and reality, not merely an empirical observation."}, {"text": "Its truth is self-evident and requires no external validation, making proof unnecessary.", "isCorrect": false, "rationale": "While it is 'most certain,' the reason for its unprovability is more profound than mere self-evidence; it's about the conditions of proof itself."}, {"text": "Any attempt at proof would logically presuppose the principle itself, leading to circular reasoning.", "isCorrect": true, "rationale": "The text states: 'Any proof must start from premises that are taken to be true. But if non-contradiction is false, there is no guarantee that any premise is true rather than false, and the entire enterprise of proof collapses. Non-contradiction is the presupposition of all proof, not a conclusion of any proof.'"}, {"text": "It is a subjective belief that varies from person to person, precluding objective proof.", "isCorrect": false, "rationale": "Aristotle considers it the 'most certain of all principles' and a truth about 'being itself,' implying its objective and universal nature, not subjective variability."}], "id": "q06"}, {"question": "Aristotle's 'defense by retorsion' against someone denying the Principle of Non-Contradiction relies on what core idea?", "options": [{"text": "Demonstrating that the denier's denial is internally inconsistent, proving non-contradiction by showing the impossibility of its opposite.", "isCorrect": false, "rationale": "While related to showing inconsistency, retorsion specifically turns the denier's *own speech act* against them, rather than an abstract demonstration of impossibility."}, {"text": "Appealing to universal human intuition that certain things cannot both be and not be.", "isCorrect": false, "rationale": "Retorsion is a philosophical technique, not an appeal to intuition. It's an active demonstration using the opponent's actions."}, {"text": "Showing that any meaningful statement or thought, including the denier's own, necessarily presupposes the principle of non-contradiction.", "isCorrect": true, "rationale": "The text explains: 'The moment he opens his mouth to say a word that means something, he has committed himself to non-contradiction. A word that means something definite means this and not that; to mean something is already to exclude its opposite.' This highlights the presupposition of meaning itself."}, {"text": "Forcing the denier into silence, as silence is the only consistent position for someone who truly denies the principle.", "isCorrect": false, "rationale": "Aristotle asks the denier to 'say something — anything at all, so long as it means something definite.' The denier 'cannot refuse without falling silent, and silence is not denial.' The defense isn't about forcing silence, but about showing that even an *attempt* to speak commits one to the principle."}], "id": "q07"}, {"question": "How might Aristotle's Principle of Non-Contradiction (PNC) respond to modern scientific observations, such as light being described as both a wave and a particle, or a quantum particle being in 'two places at once'?", "options": [{"text": "Aristotle would argue that such descriptions invalidate PNC, demonstrating its limitations in modern physics.", "isCorrect": false, "rationale": "The 'thinkdeeper' box suggests Aristotle's qualifications 'at the same time' and 'in the same respect' would allow the principle to survive such challenges, implying it's not invalidated."}, {"text": "Aristotle would assert that these are only apparent contradictions that would be resolved by clearer definitions of 'wave,' 'particle,' and 'place' in the quantum context.", "isCorrect": true, "rationale": "The 'thinkdeeper' box notes that 'Aristotle's qualifications matter here: “at the same time” and “in the same respect.”' He would likely argue that 'wave' and 'particle' or 'two places' are not simultaneously true in the *same respect* or at the *same time* in the way a contradiction requires, suggesting a need for more precise definitions of how these properties manifest."}, {"text": "Aristotle would conclude that 'being' in the quantum world operates under different rules, requiring a separate 'first philosophy' for physics.", "isCorrect": false, "rationale": "PNC is presented as the 'most certain of all principles' about 'being itself,' implying its universal applicability across all domains of reality, not just classical physics."}, {"text": "Aristotle would accept these as true contradictions, suggesting that some aspects of reality are inherently indeterminate.", "isCorrect": false, "rationale": "The Principle of Excluded Middle, a companion to PNC, explicitly argues that 'reality is determinate — things do not hover in an indeterminate zone between being and non-being,' making 'true contradictions' in reality impossible from Aristotle's perspective."}], "id": "q08"}, {"question": "What is the primary implication of the Principle of Excluded Middle, particularly when combined with the Principle of Non-Contradiction to form the 'law of bivalence'?", "options": [{"text": "It means that all statements are inherently either true or false, leaving no room for subjective interpretation.", "isCorrect": false, "rationale": "While it states statements are true or false, the 'caution' box clarifies it's 'not a claim about knowledge,' meaning subjective interpretation can still occur, but the underlying reality is determinate."}, {"text": "It establishes that human knowledge is limited, as there are truths that cannot be known.", "isCorrect": false, "rationale": "The 'caution' box explicitly states: 'The principle of excluded middle is not a claim about knowledge.' It concerns the determinacy of reality, not the limits of human knowledge."}, {"text": "It asserts that reality itself is determinate; things either possess a property or they do not, with no indeterminate middle ground.", "isCorrect": true, "rationale": "The text states: 'It means that reality is determinate — things do not hover in an indeterminate zone between being and non-being, between having and not having a given property. The world has a definite character; our statements about it are therefore either correct or incorrect.'"}, {"text": "It proves that for any given statement, we can always definitively determine whether it is true or false.", "isCorrect": false, "rationale": "The 'caution' box clarifies: 'it does not say we always know whether S is P or not.' It's about what is true, not what is known."}], "id": "q09"}, {"question": "Considering the content of the section, which philosophical method best characterizes Aristotle's approach in establishing 'first philosophy' and its core principles?", "options": [{"text": "Deductive reasoning, deriving specific truths from universally accepted axioms.", "isCorrect": false, "rationale": "While Aristotle uses deduction, his establishment of first philosophy is not purely deductive, especially given that PNC cannot be 'proved' from more certain premises. It involves identifying a science, clarifying its subject, and defending fundamental principles."}, {"text": "Empirical observation, relying solely on sensory data to build philosophical theories.", "isCorrect": false, "rationale": "While Aristotle values observation, 'first philosophy' goes beyond mere empirical data to fundamental truths about 'being as being' and principles like non-contradiction that are not derived empirically."}, {"text": "Transcendental argumentation, demonstrating that certain principles are necessary presuppositions for any coherent thought or experience.", "isCorrect": true, "rationale": "This aligns well with Aristotle's method, particularly the defense of non-contradiction by 'retorsion,' which shows that any meaningful speech or thought 'presupposes' the principle. The 'teacher note' also highlights the argument structure: identifying a science, explaining its unity, and locating substance/principles."}, {"text": "Skepticism, questioning all assumptions and principles until certainty is achieved through doubt.", "isCorrect": false, "rationale": "Aristotle is establishing the 'most certain of all principles' and defending the possibility of knowledge about being, which is the opposite of skepticism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
