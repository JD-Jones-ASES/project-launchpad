<script>
var QUESTIONS = [{"question": "What is the fundamental difference in the starting point of Descartes' and Aristotle's arguments for the existence of God, as described in the text?", "options": [{"text": "Aristotle begins with the concept of a perfect being, while Descartes begins with observable motion.", "isCorrect": false, "rationale": "This option reverses the actual starting points. Aristotle begins with observable motion and change, while Descartes begins with the idea of a perfect being found within his own mind."}, {"text": "Aristotle begins with sensory experience of the external world, while Descartes begins with the internal certainty of his own mind.", "isCorrect": true, "rationale": "The text states Aristotle begins 'from the outside: from the observable fact of motion and change in the world,' while Descartes begins 'from the inside: from the one indubitable certainty — that he, as a thinking thing, exists.'"}, {"text": "Both begin with the idea of God but use different logical methods.", "isCorrect": false, "rationale": "Only Descartes begins with the idea of God within his mind. Aristotle begins from the external world's phenomena."}, {"text": "Both begin with the unreliability of sensory experience, but reach different conclusions.", "isCorrect": false, "rationale": "Aristotle's argument relies on the reliability of sensory experience to observe motion. While Descartes questions sensory experience, his argument for God doesn't start from its unreliability, but from the certainty of his own existence."}], "id": "q01"}, {"question": "According to Descartes' \"trademark argument\" (Third Meditation), why must the idea of a supremely perfect being in his mind originate from God?", "options": [{"text": "The idea of perfection is innate and therefore must be true.", "isCorrect": false, "rationale": "While the idea might be considered innate, the core of the argument is not simply its innateness but the causal principle that an effect cannot exceed its cause in reality."}, {"text": "An imperfect being cannot possess an idea of infinite perfection without it being caused by a being of at least equal reality.", "isCorrect": true, "rationale": "The text explains, 'every idea must have a cause, and the cause must have at least as much reality as the effect. An imperfect being like himself could not have produced an idea of infinite perfection from his own resources. Therefore the idea of a supremely perfect being must have been placed in his mind by a supremely perfect being.'"}, {"text": "All ideas about God are necessarily true by definition.", "isCorrect": false, "rationale": "This concept relates more to Descartes' ontological argument (Meditation V), where existence is part of God's essence, rather than the trademark argument which focuses on the origin of the idea of God."}, {"text": "Sensory experience reveals the perfection of the world, leading to the idea of a perfect creator.", "isCorrect": false, "rationale": "Descartes' arguments for God begin internally, from the contents of his own mind, not from observations of the external world's perfection, which he still doubts at this stage."}], "id": "q02"}, {"question": "Descartes' ontological argument claims that denying God's existence is contradictory. Which of the following analogies best illustrates this claim according to the text?", "options": [{"text": "Denying that a fire causes heat.", "isCorrect": false, "rationale": "This is an example of cause and effect, not a contradiction in terms or a definitional impossibility, as described for the ontological argument."}, {"text": "Denying that a triangle has three angles.", "isCorrect": true, "rationale": "The text directly states, 'His claim is that the existence of God follows necessarily from the very idea of God, in the same way that having three angles follows necessarily from the very idea of a triangle. ... To deny God's existence, on this account, is to contradict oneself — as contradictory as saying 'there is a triangle without three angles.''"}, {"text": "Denying that a staff moves without a hand.", "isCorrect": false, "rationale": "This analogy is used by Aquinas in his First Way (from motion) to illustrate the impossibility of an infinite regress of movers, not a definitional contradiction within a concept itself."}, {"text": "Denying that the square of the hypotenuse equals the sum of the squares of the other two sides in a right triangle.", "isCorrect": false, "rationale": "The text mentions this as a truth that is 'not so manifestly appear' but is 'just as certain' once apprehended. While a necessary truth, it's presented as less immediately obvious than the definitional aspect of a triangle having three angles, which is the direct analogy used for God's existence."}], "id": "q03"}, {"question": "The \"turn inward\" characteristic of modern philosophy, as exemplified by Descartes, fundamentally shifts the primary subject of philosophical inquiry. What becomes the central focus?", "options": [{"text": "The observable phenomena of the natural world and their physical causes.", "isCorrect": false, "rationale": "This describes the focus of Aristotelian and ancient thought, which begins from the external world, not the 'turn inward' of modern philosophy."}, {"text": "The structure, capacities, and limits of the human mind.", "isCorrect": true, "rationale": "The text states, 'If God is reached through the inner structure of thought, then the primary subject of philosophy becomes the human mind — its capacities, its limits, its structures of representation. This is what Kant will develop into the 'Copernican Revolution' in philosophy.'"}, {"text": "The nature of divine revelation and its relationship to faith.", "isCorrect": false, "rationale": "While relevant to Aquinas's discussion of natural theology, Descartes' 'turn inward' is about the foundational role of the mind itself for all knowledge, not specifically revelation."}, {"text": "The ethical implications of human action in society.", "isCorrect": false, "rationale": "Ethics is a branch of philosophy, but the 'turn inward' described here is about epistemology (the theory of knowledge) and metaphysics (the nature of reality), not primarily social ethics."}], "id": "q04"}, {"question": "According to Aquinas, what was a key limitation of Aristotle's conception of the First Mover, despite its correctness in establishing a prime cause?", "options": [{"text": "Aristotle's God was not eternal or immaterial.", "isCorrect": false, "rationale": "Aquinas accepted that Aristotle's First Mover was eternal and immaterial ('eternal, immaterial, pure actuality'). These were points of agreement, not limitation."}, {"text": "Aristotle's God was not the cause of cosmic motion.", "isCorrect": false, "rationale": "Aquinas accepted that Aristotle's God was 'the cause of all cosmic motion.' This was a strength of Aristotle's argument in Aquinas's view."}, {"text": "Aristotle's God did not create the universe or possess knowledge of the world, nor did it love.", "isCorrect": true, "rationale": "The text explicitly states: 'Aristotle's first mover is eternal, immaterial, pure actuality, and the cause of all cosmic motion. This much is right. But Aristotle's God does not know the world; it thinks only itself. It does not create; the universe is eternal. It does not love; it is moved by nothing, including the needs and prayers of human beings.'"}, {"text": "Aristotle's God was subject to change and potentiality.", "isCorrect": false, "rationale": "Aristotle's First Mover is characterized as 'pure actuality' and 'unmoved,' meaning it is not subject to change or potentiality."}], "id": "q05"}, {"question": "Which of the following aspects of God's nature would Aquinas argue *cannot* be established through natural theology alone, but requires divine revelation?", "options": [{"text": "That God is eternal and omnipotent.", "isCorrect": false, "rationale": "The text states Aquinas holds that 'natural reason can establish that God exists, that God is one, eternal, immaterial, omnipotent, and the first cause of all things.'"}, {"text": "That God is the first cause of all things.", "isCorrect": false, "rationale": "The text confirms that 'natural reason can establish... that God is... the first cause of all things.'"}, {"text": "That God creates freely from nothing and loves individual human beings.", "isCorrect": true, "rationale": "The text explicitly lists: 'But reason cannot establish that God creates freely from nothing, that God is triune, that God became incarnate, or that God loves individual human beings with providential care. These require revelation.'"}, {"text": "That God exists and is one.", "isCorrect": false, "rationale": "The text states that 'natural reason can establish that God exists, that God is one...'"}], "id": "q06"}, {"question": "In Aquinas's First Way (argument from motion), what is the core reason an infinite regress of movers is deemed impossible?", "options": [{"text": "If there were no first mover, there would be no subsequent movers, as subsequent movers depend on the first.", "isCorrect": true, "rationale": "Aquinas argues, 'But this cannot go on to infinity, because then there would be no first mover, and, consequently, no other mover; seeing that subsequent movers move only inasmuch as they are put in motion by the first mover; as the staff moves only because it is put in motion by the hand.'"}, {"text": "Motion is inherently limited and cannot continue indefinitely.", "isCorrect": false, "rationale": "The argument isn't about the limited duration of motion itself, but about the causal dependency of movers, which requires a non-dependent 'first' cause in a hierarchical series."}, {"text": "The universe must have a beginning in time, thus implying a first mover.", "isCorrect": false, "rationale": "Aquinas's cosmological arguments are about a hierarchical series of causes (sustaining causes here and now), not necessarily a temporal beginning of the universe. The text does not make this temporal claim for the impossibility of regress in the First Way."}, {"text": "It contradicts the observed fact that everything capable of motion eventually ceases to move.", "isCorrect": false, "rationale": "This is not the reason given in the text for the impossibility of an infinite regress. The argument focuses on the immediate causal dependency of a moved mover on a prior mover."}], "id": "q07"}, {"question": "Aquinas's Second Way, the argument from efficient causation, states that \"no case is known (neither is it, indeed, possible) in which a thing is found to be the efficient cause of itself.\" What is the fundamental logical impossibility implied by a thing being its own efficient cause?", "options": [{"text": "It would necessitate an infinite chain of causes.", "isCorrect": false, "rationale": "The impossibility of self-causation is a premise *before* addressing the infinite regress. Infinite regress is a problem when things *don't* cause themselves and instead are caused by others in an endless chain."}, {"text": "It would have to be both in potentiality and actuality simultaneously in the same respect.", "isCorrect": false, "rationale": "This reasoning belongs to Aquinas's First Way (from motion), explaining why nothing can move itself."}, {"text": "It would have to be prior to itself.", "isCorrect": true, "rationale": "The text states, 'There is no case known (neither is it, indeed, possible) in which a thing is found to be the efficient cause of itself; for so it would be prior to itself, which is impossible.'"}, {"text": "It would imply that causes can exist without effects.", "isCorrect": false, "rationale": "This is not the logical impossibility Aquinas cites for a thing being its own efficient cause. The issue is the temporal or ontological precedence required for causation."}], "id": "q08"}, {"question": "How does Kant's critique, mentioned in the teacher's note, challenge Descartes' ontological argument for God's existence?", "options": [{"text": "Kant argues that existence is an observable phenomenon, not a concept derived from pure reason.", "isCorrect": false, "rationale": "Kant's critique, as stated in the text, focuses on the nature of existence itself, not on its empirical or rational origin, in relation to the ontological argument."}, {"text": "Kant suggests that the idea of God itself is incoherent, thereby undermining the premise.", "isCorrect": false, "rationale": "The text does not state that Kant found the idea of God incoherent, but rather challenged a specific premise within the ontological argument."}, {"text": "Kant contends that existence is not a perfection or a real property that can be added to a concept.", "isCorrect": true, "rationale": "The teacher's note explicitly states: 'Kant will later argue that existence is not a predicate (a real property of things) and therefore not a 'perfection' — which would refute Descartes' version.'"}, {"text": "Kant asserts that all arguments for God must begin from sensory experience, not from internal ideas.", "isCorrect": false, "rationale": "While Kant did emphasize the role of experience in knowledge, his specific critique of the ontological argument, as mentioned, is about existence not being a predicate, not about the starting point of the argument in general."}], "id": "q09"}, {"question": "According to the teacher's note, which argument for God's existence (Aristotle's cosmological or Descartes' trademark/ontological) might be initially more persuasive to a skeptic, and why?", "options": [{"text": "Descartes' arguments, because they start from the undeniable certainty of one's own thought.", "isCorrect": false, "rationale": "The teacher's note states that Descartes' argument 'requires accepting that ideas have causes proportionate to their content — a premise that is far from obvious' to a skeptic, making it less initially persuasive despite its internal starting point."}, {"text": "Aristotle's argument, because it begins from the universally accepted observation of motion in the world.", "isCorrect": true, "rationale": "The teacher's note asks, 'which argument would be more persuasive to a skeptic?' and answers, 'Aristotle's argument starts from something everyone agrees exists (motion)...'"}, {"text": "Both are equally persuasive, as they both rely on logical deduction.", "isCorrect": false, "rationale": "The teacher's note clearly contrasts their persuasive power, highlighting different premises that a skeptic might find more or less acceptable."}, {"text": "Neither, because both arguments rely on premises that a skeptic would immediately reject.", "isCorrect": false, "rationale": "While both arguments have been attacked, the note specifically points out Aristotle's starting point ('motion') as something 'everyone agrees exists,' suggesting it has initial persuasive power for a skeptic, even with its own challenges."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
