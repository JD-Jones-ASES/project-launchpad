<div class="quiz-container">

<script>
var QUESTIONS = [{"question": "According to Aristotle, why does the investigation of 'being as being' converge on the investigation of substance?", "options": [{"text": "Because substances are the easiest category to list and categorize.", "isCorrect": false, "rationale": "The text explicitly states that asking 'what is substance?' is not a request for a list of things that are substances."}, {"text": "Because all other categories of being depend on substance for their existence, making it the primary sense of being.", "isCorrect": true, "rationale": "The text states: 'Substances are beings in the primary sense; everything else is a being only because it belongs to or depends on a substance. The investigation of being as being, therefore, converges on the investigation of substance.'"}, {"text": "Because substance is the only category that truly exists independently of human thought.", "isCorrect": false, "rationale": "Other categories (qualities, quantities) exist, but they exist dependently on substance, not independently. The text does not claim they don't exist, just that they are not primary."}, {"text": "Because substance is a universal concept shared by all individual beings, making it the most inclusive category.", "isCorrect": false, "rationale": "Aristotle rejects universals as primary substances, arguing they are properties of many things rather than individual substances themselves."}], "id": "q01"}, {"question": "When Aristotle asks 'what is substance?', what kind of answer is he primarily seeking?", "options": [{"text": "A comprehensive list of all individual substances, such as horses, trees, and human beings.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not a request for a list of the things that are substances (horses, trees, rocks, human beings).'"}, {"text": "The ultimate principle or cause that makes something a substance, or what it is in virtue of which something *is* a substance.", "isCorrect": true, "rationale": "The text clarifies: 'It is a request for the principle or cause of substance — what it is in virtue of which something is a substance at all.'"}, {"text": "The definition of substance as a universal concept that applies to many different things.", "isCorrect": false, "rationale": "Aristotle rejects universals as primary substances because they don't exist in themselves as individual substances do."}, {"text": "An explanation of how substances change over time while retaining their identity.", "isCorrect": false, "rationale": "While change is a related metaphysical topic for Aristotle, the central question of 'what is substance?' in this context is about its fundamental nature or principle, not primarily the process of change."}], "id": "q02"}, {"question": "Aristotle identifies four candidates for what substance might ultimately be. Which two candidates does he reject as primary substances, and why?", "options": [{"text": "Substratum and essence, because they are too abstract to be considered primary.", "isCorrect": false, "rationale": "The debate for Aristotle narrows to substratum (matter) vs. form, implying these are serious contenders, not immediately rejected for being too abstract."}, {"text": "Universal and genus, because they are properties of many things and do not exist as individual, particular substances.", "isCorrect": true, "rationale": "The text states: 'Aristotle's investigation rules out the latter two as primary substances. Universals and genera are properties of many things; they do not exist in themselves as individual, particular substances do.'"}, {"text": "Form and matter, because they are always found together as a composite.", "isCorrect": false, "rationale": "Form and matter are the final two candidates, and form is ultimately identified as the primary sense of substance, even though they form a composite."}, {"text": "Qualities and quantities, because they are categories dependent on substances, not substances themselves.", "isCorrect": false, "rationale": "Qualities and quantities are categories of being that depend on substance, but they are not listed as the four *candidates for what substance itself ultimately is*."}], "id": "q03"}, {"question": "Consider a bronze statue. According to Aristotle's definitions, which statement correctly differentiates its form (eidos) and matter (hyle)?", "options": [{"text": "The bronze is its form, and the shape of the human figure is its matter.", "isCorrect": false, "rationale": "This statement incorrectly reverses the definitions: bronze is the matter, and the shape is the form."}, {"text": "The bronze is its matter, and the human figure shape is its form; the form makes it definable and knowable as a statue.", "isCorrect": true, "rationale": "The text defines matter (hyle) as the 'physical stuff a thing is made of' (bronze) and form (eidos) as 'the defining structure or pattern that makes a thing what it is' (human figure). It also states form 'makes it knowable and definable'."}, {"text": "Both the bronze and the human figure shape are aspects of its form, as they both contribute to its identity.", "isCorrect": false, "rationale": "Aristotle explicitly distinguishes form and matter as distinct components, even though they together make up the composite. Matter is what it's made of, form is what it is."}, {"text": "The form is the individual statue itself, while the matter is the universal concept of 'statue'.", "isCorrect": false, "rationale": "This misrepresents both concepts. The form is the *structure* within the individual, and matter is the *stuff*. The universal concept is not considered the matter."}], "id": "q04"}, {"question": "What is the fundamental difference between Aristotle's and Plato's understanding of 'Form,' as highlighted in the text?", "options": [{"text": "Plato believed Forms are sensory experiences, while Aristotle believed they are abstract ideas.", "isCorrect": false, "rationale": "Neither philosopher considered Forms to be mere sensory experiences; both saw them as intellectual or intelligible. The core difference lies in their location and mode of existence."}, {"text": "Aristotle argued that Forms are separate, eternal realities, while Plato believed they exist within particular things.", "isCorrect": false, "rationale": "This statement reverses the positions of Aristotle and Plato regarding the separation and location of Forms."}, {"text": "Plato believed Forms exist in a separate realm, while Aristotle maintained that forms are in particular things and constitute their defining structure.", "isCorrect": true, "rationale": "The text explicitly states: 'For Plato, Forms are separate, eternal, transcendent realities... For Aristotle, forms are in things — they are the defining structures of particular substances, not a separate realm of their own.'"}, {"text": "Aristotle thought Forms were unimportant for knowledge, whereas Plato saw them as the ultimate objects of knowledge.", "isCorrect": false, "rationale": "Aristotle, too, considers forms crucial for knowledge ('knowledge is the possession of form without the matter'), just not as separately existing entities."}], "id": "q05"}, {"question": "The doctrine of hylomorphism posits that every natural and physical thing is a 'composite' (synolon). What does this composite primarily consist of?", "options": [{"text": "A collection of accidental properties that a substance might possess.", "isCorrect": false, "rationale": "Accidental properties are characteristics that a thing can gain or lose without ceasing to be that thing, and are not the primary constituents of the composite substance itself."}, {"text": "The interplay of universal concepts and specific instances of those concepts.", "isCorrect": false, "rationale": "While related to understanding, this isn't the direct definition of a hylomorphic composite. Aristotle rejected universals as primary substances."}, {"text": "A combination of substratum and its defining essence.", "isCorrect": false, "rationale": "While essence is close to form, hylomorphism specifically uses the terms 'form (eidos)' and 'matter (hyle)' for the components of the composite."}, {"text": "The union of form (eidos) and matter (hyle).", "isCorrect": true, "rationale": "The text explicitly defines hylomorphism as 'from hyle, matter, and morphe, shape or form' and states that 'every natural thing... is a composite (synolon) of form and matter.'"}], "id": "q06"}, {"question": "A carpenter has wood (matter) and a design (form) for a chair. If the carpenter uses the same wood to build a table instead of a chair, what does this scenario illustrate about Aristotle's concept of substance?", "options": [{"text": "Matter is more fundamental than form, as it persists regardless of the object's identity.", "isCorrect": false, "rationale": "The text argues the opposite: 'This priority of form over matter is what Aristotle means when he says that form is the primary sense of substance... The matter tells us what it is made of; the form tells us what it is.'"}, {"text": "The form is prior to matter in determining *what* the object is, even though matter is necessary for its existence.", "isCorrect": true, "rationale": "This scenario directly aligns with the text's explanation: 'A house is what it is because of its form... The same bricks could be arranged into a wall... What makes them a house is their form.' Changing the form (from chair to table) changes what the object *is*, even if the matter remains the same, showing form's priority in defining identity."}, {"text": "The composite (synolon) is the only true substance, making the distinction between form and matter irrelevant.", "isCorrect": false, "rationale": "While the composite is the actual existing thing, the distinction between form and matter is crucial for understanding its nature, and the text emphasizes the priority of form within that composite."}, {"text": "Both form and matter are equally fundamental, as neither can exist without the other.", "isCorrect": false, "rationale": "The text clearly states that form is 'prior to matter in an important sense' for determining what a thing is, even while acknowledging their co-existence in a composite."}], "id": "q07"}, {"question": "How does Aristotle's hylomorphism extend to his understanding of the soul in living beings, as mentioned in the text?", "options": [{"text": "The soul is the matter of the body, providing its physical substance.", "isCorrect": false, "rationale": "The text explicitly states: 'Aristotle defined the soul as the “form of the body”—the organizing principle that makes a living body alive and active.'"}, {"text": "The soul is a separate entity that merely inhabits the body but does not define it.", "isCorrect": false, "rationale": "This view is closer to Plato's, which Aristotle rejects regarding forms. For Aristotle, the soul *is* the body's form, defining its living character."}, {"text": "The soul is the form of the body, acting as the organizing principle that makes the body alive and active.", "isCorrect": true, "rationale": "The text directly states: 'There, in the Ethics, Aristotle defined the soul as the “form of the body” — the organizing principle that makes a living body alive and active.'"}, {"text": "The soul is an accidental quality of the body, not essential to its being.", "isCorrect": false, "rationale": "The soul as the form of the body is presented as essential and foundational to life, not as an accidental quality."}], "id": "q08"}, {"question": "Aristotle's epistemology claims that 'knowledge is the reception of form without the matter.' What does this statement imply about the nature of knowing?", "options": [{"text": "True knowledge can only be obtained by physically interacting with the object and its material components.", "isCorrect": false, "rationale": "The phrase 'without the matter' contradicts the idea of physically interacting with material components for knowledge."}, {"text": "Our minds grasp the universal material properties of things, allowing us to categorize them.", "isCorrect": false, "rationale": "Knowledge is primarily about grasping *form*, which is the defining structure, not universal *material* properties. Universals themselves are rejected as primary substance."}, {"text": "Knowledge involves abstracting the defining structure or pattern of a thing from its particular physical embodiment.", "isCorrect": true, "rationale": "The text clarifies: 'When we perceive a bronze statue, the eye receives the form of the statue without the bronze. When we understand a triangle, the mind grasps the form of triangularity without any particular piece of matter.' This is the process of abstraction, focusing on the defining structure (form)."}, {"text": "Knowledge is ultimately impossible, as we can never fully separate form from matter in reality.", "isCorrect": false, "rationale": "The text uses this claim to explain 'why knowledge is possible: form is shareable in a way that matter is not,' not to suggest its impossibility."}], "id": "q09"}, {"question": "The text describes hylomorphism as the 'backbone of Aristotle's entire philosophical enterprise.' This is primarily because it:", "options": [{"text": "Provides a simple list of all substances that exist in the world, which is crucial for philosophical categorization.", "isCorrect": false, "rationale": "Hylomorphism is a metaphysical framework for understanding the nature of things, not a mere list of existing substances."}, {"text": "Offers a consistent framework for analyzing the nature and identity of all things across various disciplines like physics, biology, and ethics.", "isCorrect": true, "rationale": "The text states: 'The same basic framework — matter as what a thing is made of, form as what the thing is — runs through his physics, biology, psychology, ethics, and theology. Understanding it well is the key to understanding Aristotle.'"}, {"text": "Proves that only physical matter is truly real, making all other concepts secondary and dependent.", "isCorrect": false, "rationale": "Aristotle argues for the priority of form over matter in defining a thing's identity, indicating matter alone is not the sole reality or primary component."}, {"text": "Establishes the independence of form from matter, similar to Plato's Forms, thus validating a separate realm of ideas.", "isCorrect": false, "rationale": "This contradicts Aristotle's central departure from Plato, as Aristotle insists forms are *in* things, not separate, and are found in composite with matter."}], "id": "q10"}, {"question": "In Metaphysics Book VII Part 1, Aristotle argues that substance is 'first' in three distinct senses. Which option correctly identifies all three?", "options": [{"text": "First in number, first in size, and first in time.", "isCorrect": false, "rationale": "Aristotle's three senses of priority for substance are not quantitative. He is concerned with logical, epistemic, and temporal priority, not numerical or physical magnitude."}, {"text": "First in definition, first in order of knowledge, and first in time.", "isCorrect": true, "rationale": "The text from Book VII, Part 1 states explicitly: 'substance is first in every sense — (1) in definition, (2) in order of knowledge, (3) in time.' Other categories cannot exist independently and must reference substance in their definitions."}, {"text": "First among forms, first among matters, and first among composites.", "isCorrect": false, "rationale": "These are distinctions within Aristotle's analysis of substance itself, not the three senses in which substance is first as a category of being."}, {"text": "First in causation, first in perfection, and first in simplicity.", "isCorrect": false, "rationale": "These may be attributes Aquinas associates with God as the first being, but Aristotle's three senses of substance's primacy in Book VII are definition, knowledge, and time."}], "id": "q11"}, {"question": "In Book VII Part 17, Aristotle uses the analogy of a syllable versus its letters to make a point about substance and form. What is his central argument?", "options": [{"text": "A syllable can always be reconstructed from its letters, proving that matter is the primary constituent of composite things.", "isCorrect": false, "rationale": "Aristotle's argument points in the opposite direction: when a syllable is broken into its letters, the syllable no longer exists, showing that the unifying 'something else' — the form — is what makes it the thing it is."}, {"text": "A syllable is identical to the sum of its letters, showing that substance reduces to its elemental parts.", "isCorrect": false, "rationale": "Aristotle explicitly denies this: 'the syllable is not its elements; ba is not the same as b and a.' He uses this example to argue that substance is not reducible to its material parts."}, {"text": "A composite like a syllable is more than the sum of its elements — there is 'something else' (the form) that unifies the parts into a single thing.", "isCorrect": true, "rationale": "The text states: 'the syllable, then, is something — not only its elements (the vowel and the consonant) but also something else... it is the cause which makes this thing flesh and that a syllable. And this is the substance of each.' Form is that unifying cause."}, {"text": "Letters are substances while syllables are mere accidents, showing that elements are always more real than composites.", "isCorrect": false, "rationale": "Aristotle's argument shows the syllable is a genuine unity that ceases to exist when broken into letters, which demonstrates the reality of the composite and the causal role of form — not that elements are more real."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
