        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Before Aristotle, Greek philosophers Parmenides and Heraclitus presented opposing views on change. How did Aristotle's concept of potentiality resolve their paradox?", "options": [{"text": "He argued that change is an illusion, siding with Parmenides.", "isCorrect": false, "rationale": "Aristotle did not side with Parmenides; he sought to explain how change is real, which Parmenides denied. His solution allowed for change without it being an illusion."}, {"text": "He introduced potentiality as a real mode of being between pure being and non-being, allowing for transition.", "isCorrect": true, "rationale": "Aristotle's key insight was to introduce 'potentiality' (dynamis) as a third category, which is not pure being (actuality) nor non-being, thus providing a coherent explanation for the transition of things from one state to another. This dissolved the paradox of being coming from non-being."}, {"text": "He asserted that everything is in constant flux, siding with Heraclitus.", "isCorrect": false, "rationale": "While acknowledging change, Aristotle did not fully side with Heraclitus's extreme view that nothing is stable. His system allowed for both persistence and change."}, {"text": "He claimed that change only occurs in the realm of ideas, not in the physical world.", "isCorrect": false, "rationale": "The text does not mention Aristotle making such a claim. His philosophy of potentiality and actuality explicitly addresses change in the observable physical world."}]}, {"question": "According to Aristotle, which of the following best describes potentiality (dynamis)?", "options": [{"text": "It is merely the absence of being, or non-existence.", "isCorrect": false, "rationale": "The text explicitly states that 'Potentiality is not nothing' and 'it is a real mode of being,' contradicting the idea that it is mere non-existence."}, {"text": "It is the capacity or power to be or do something, a real but incomplete mode of being.", "isCorrect": true, "rationale": "The text defines potentiality (dynamis) as 'the capacity or power to be or do something' and describes it as 'a real but incomplete mode of being,' such as an acorn being potentially an oak."}, {"text": "It is the complete realization of a capacity, such as a fully grown oak.", "isCorrect": false, "rationale": "This describes actuality (energeia), not potentiality. Potentiality is the capacity to reach that complete realization."}, {"text": "It is a fixed, unchanging essence that cannot transition into anything else.", "isCorrect": false, "rationale": "This definition contradicts the very purpose of potentiality, which is to explain how things change and become something else."}]}, {"question": "A sculptor looks at a block of marble and envisions a magnificent statue. According to Aristotle's framework, which of the following statements is most accurate?", "options": [{"text": "The marble is already actually a statue, but its form is not yet perceived.", "isCorrect": false, "rationale": "The marble is not actually a statue until it is sculpted. Before that, it holds the potential, not the actuality, of a statue."}, {"text": "The sculptor's vision represents the marble's potentiality, while the finished statue represents its actuality.", "isCorrect": true, "rationale": "The marble 'is potentially a statue' (dynamis), and the 'finished statue' is the 'realization' (energeia) of that capacity. The sculptor's vision recognizes this inherent potential."}, {"text": "The marble has no potentiality for a statue; it is simply a block of stone.", "isCorrect": false, "rationale": "The text uses 'the marble is potentially a statue' as a direct example of potentiality, indicating it genuinely possesses this capacity."}, {"text": "The act of sculpting is the actuality, but the statue itself is still a potentiality.", "isCorrect": false, "rationale": "The act of sculpting is part of the process of actualization (energeia as ongoing activity), but the completed statue is the full actuality (entelecheia), not a potentiality."}]}, {"question": "The text describes rational and irrational potentialities. Which of the following differentiates a rational power from an irrational power?", "options": [{"text": "Rational powers are always exercised in the same way when conditions are right, while irrational powers are not.", "isCorrect": false, "rationale": "This statement describes irrational powers, which are 'one-directional' and 'always exercised in the same way when the conditions are right.'"}, {"text": "Irrational powers are two-directional, allowing for opposing outcomes, while rational powers are one-directional.", "isCorrect": false, "rationale": "This statement inverts the definitions. Irrational powers are one-directional, and rational powers are two-directional."}, {"text": "Rational powers require proairesis (deliberate choice) to determine their direction, whereas irrational powers are one-directional.", "isCorrect": true, "rationale": "The text clearly states that 'Rational potentialities... are two-directional' and 'something additional is required to determine which direction a rational capacity goes: proairesis, rational choice.' Irrational powers, in contrast, are 'one-directional' and involve 'no deliberation, no choice, no alternative.'"}, {"text": "Both rational and irrational powers require deliberation, but rational powers are more complex.", "isCorrect": false, "rationale": "Irrational powers do not involve deliberation or choice, as specified in the text."}]}, {"question": "In the context of Aristotle's analysis of human powers, what is the significance of proairesis?", "options": [{"text": "It is the natural inclination for fire to heat or heavy objects to fall.", "isCorrect": false, "rationale": "This describes the behavior of irrational potentialities, which do not involve choice or deliberation."}, {"text": "It represents the complete fulfillment of one's inherent potential, also known as entelecheia.", "isCorrect": false, "rationale": "`Entelecheia` is the full realization, but `proairesis` is the deliberate choice made along the way to actualize rational powers, not the fulfillment itself."}, {"text": "It is the deliberate decision required to direct a rational capacity towards one outcome over another, forming the basis of ethical action.", "isCorrect": true, "rationale": "The text defines `proairesis` as 'Rational choice or deliberate decision' and states it is 'the distinguishing mark of virtuous action' in ethics, as it determines which direction a two-directional rational capacity goes."}, {"text": "It is Aristotle's method of defining fundamental concepts through analogy rather than direct explanation.", "isCorrect": false, "rationale": "The method of analogy is used to define actuality, not `proairesis`."}]}, {"question": "Aristotle uses energeia and entelecheia to describe different aspects of actuality. Which statement accurately distinguishes these terms?", "options": [{"text": "Energeia refers to potentiality, while entelecheia refers to its full realization.", "isCorrect": false, "rationale": "Both `energeia` and `entelecheia` are terms for actuality, not potentiality."}, {"text": "Energeia denotes ongoing activity or the exercise of a capacity, whereas entelecheia signifies the complete fulfillment of that capacity.", "isCorrect": true, "rationale": "The text states that 'Energeia ('being at work') suggests ongoing activity, the exercise of a capacity' and 'Entelecheia ('having its end within itself') suggests the complete fulfillment of a capacity, the state in which a thing has fully realized what it was always ordered toward.'"}, {"text": "Entelecheia is the initial capacity, and energeia is the final state of perfection.", "isCorrect": false, "rationale": "`Entelecheia` is the final state of fulfillment, but `energeia` is the ongoing activity, and initial capacity is potentiality."}, {"text": "Both terms are interchangeable and refer solely to the capacity to become something.", "isCorrect": false, "rationale": "The text explains that 'Both terms are needed' because they represent distinct aspects of actuality (ongoing activity vs. complete fulfillment), and they do not refer to capacity (potentiality)."}]}, {"question": "Aristotle defines actuality through analogy rather than direct definition. What is the philosophical significance of this approach?", "options": [{"text": "It indicates a weakness in Aristotle's theory, as he could not find a precise definition.", "isCorrect": false, "rationale": "The text states that Aristotle 'is not just admitting a gap in his theory; he is making a claim about the structure of reality.'"}, {"text": "It suggests that actuality is too fundamental to be defined by reference to anything simpler, being directly perceived in experience.", "isCorrect": true, "rationale": "The text explains that 'actuality cannot be defined directly' because 'it is what potentiality is for, and it is prior to potentiality in the order of being.' This means 'The most fundamental features of being are not deducible from anything more fundamental—they are simply the most basic features of our experience, which we must come to see directly.'"}, {"text": "It proves that actuality is merely an illusion, as it lacks a concrete definition.", "isCorrect": false, "rationale": "Aristotle's entire framework is built on the reality and priority of actuality; this approach does not diminish its reality."}, {"text": "It allows for a more poetic and less rigorous understanding of philosophical concepts.", "isCorrect": false, "rationale": "While using examples, the method of analogy is presented as a profound philosophical claim about direct intellectual perception, not a less rigorous approach."}]}, {"question": "One sense in which actuality is prior to potentiality is 'priority in definition.' What does this mean?", "options": [{"text": "Potentiality physically precedes actuality in the order of generation (e.g., seed before plant).", "isCorrect": false, "rationale": "This relates to 'priority in time' for individual cases, not 'priority in definition,' which is conceptual."}, {"text": "The concept of an acorn can only be understood by referring to the oak tree it can become.", "isCorrect": true, "rationale": "The text explains, 'You can only define a potentiality by specifying the actuality it is a potentiality for.' An acorn's potentiality is defined by the oak, which is its actuality."}, {"text": "Actuality is a more tangible and concrete substance than potentiality.", "isCorrect": false, "rationale": "This relates more closely to 'priority in substance,' which focuses on the end or telos, not specifically the conceptual definition."}, {"text": "Philosophers debated actuality before they debated potentiality.", "isCorrect": false, "rationale": "This refers to a historical or chronological priority in philosophical discussion, not Aristotle's conceptual 'priority in definition.'"}]}, {"question": "Aristotle claims that actuality is prior to potentiality 'in substance.' What is the deepest implication of this claim?", "options": [{"text": "Individual actual beings existed before any potential beings emerged.", "isCorrect": false, "rationale": "This would contradict the individual 'priority in time' where potentiality comes before actuality (e.g., child before adult)."}, {"text": "The material composition of an actual thing is superior to that of a potential thing.", "isCorrect": false, "rationale": "'Priority in substance' refers to the telos or purpose, not the material composition of a thing."}, {"text": "Actuality is the ultimate end (telos) and purpose towards which every potentiality is ordered, giving potentiality its meaning and direction.", "isCorrect": true, "rationale": "The text states, 'Actuality is prior because it is the end—the telos—toward which every potentiality is ordered,' and 'the end is always more real, more complete, and more fundamental than the means.' This gives the acorn (potentiality) its whole meaning and direction from the oak (actuality)."}, {"text": "Potentiality is unreal and has no true substance of its own.", "isCorrect": false, "rationale": "The 'caution' box explicitly states, 'Potentiality is not nothing' and 'it has a genuine capacity' and is 'a real but incomplete mode of being.'"}]}, {"question": "Considering all three senses of the 'priority of actuality,' what is the overarching implication about the nature of reality according to Aristotle?", "options": [{"text": "Reality is fundamentally static and unchanging, with actualization being an illusion.", "isCorrect": false, "rationale": "This contradicts Aristotle's solution to Parmenides, which affirms the reality of change through actualization."}, {"text": "The universe is purely passive, consisting of inert matter waiting to be acted upon by external forces.", "isCorrect": false, "rationale": "The text concludes that 'Reality is not passive stuff waiting to be actualized; it is ongoing activity directed toward fulfillment.'"}, {"text": "Reality is fundamentally active, characterized by ongoing activity directed toward fulfillment and complete being.", "isCorrect": true, "rationale": "The key concept box on the Priority of Actuality states: 'This means: being is fundamentally active. Reality is not passive stuff waiting to be actualized; it is ongoing activity directed toward fulfillment. The universe has direction, and that direction is from potentiality toward actuality, from incomplete being toward complete being.'"}, {"text": "Potentiality is superior to actuality because it represents the infinite possibilities of what could be.", "isCorrect": false, "rationale": "Aristotle argues for the *priority* of actuality, meaning actuality is higher, more complete, and the end toward which potentiality is ordered, not that potentiality is superior."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
