    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_III.html">&larr; Back to The Life of Being (Aristotle III)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the source material, what distinguishes Aristotle's Principle of Non-Contradiction from a purely logical rule?", "options": [{"text": "It is simultaneously a metaphysical principle that describes the fundamental structure of reality.", "isCorrect": true, "rationale": "Aristotle views the principle as both a law of thought and a law of being, meaning the world itself is structured such that contradictions cannot exist."}, {"text": "It relies on the 'clear and distinct' perception of the mind to validate the external world.", "isCorrect": false, "rationale": "The 'clear and distinct' criterion is specific to Descartes' epistemological framework, not Aristotle's."}, {"text": "It is a principle derived from the observation that the senses are systematically deceptive.", "isCorrect": false, "rationale": "Aristotle starts with a trust in the world's structure, whereas the systematic doubt of the senses is the starting point for Descartes."}, {"text": "It functions only within the sphere of mathematics and geometry rather than physical substances.", "isCorrect": false, "rationale": "Aristotle applies this principle to all of being, including physical substances, as it is the bedrock of his entire metaphysical system."}], "id": "q01"}, {"question": "In his *Third Meditation*, why does Descartes establish the 'general rule' that all things perceived very clearly and distinctly are true?", "options": [{"text": "To extend certainty beyond his own existence as a thinking thing.", "isCorrect": true, "rationale": "Descartes uses the clarity and distinctness of the cogito as a template to find a criterion for other truths beyond his own existence."}, {"text": "To prove that the physical world is entirely similar to his sensory ideas.", "isCorrect": false, "rationale": "Descartes actually admits that his previous belief in the similarity between ideas and external objects was an error of judgment."}, {"text": "To demonstrate that mathematical truths are immune to the deception of a 'malicious demon.'", "isCorrect": false, "rationale": "Descartes notes that even simple arithmetic can be doubted if a God allows him to be deceived, requiring a deeper inquiry into God's nature."}, {"text": "To align his philosophical system with Aristotle's focus on the structure of being.", "isCorrect": false, "rationale": "Descartes' focus on the clarity of thought marks a radical departure from, rather than an alignment with, Aristotle's metaphysics."}], "id": "q02"}, {"question": "How does the 'turn to the subject' in modern philosophy characterize the difference between Descartes and Aristotle?", "options": [{"text": "It moves the starting point of inquiry from the external world to the internal structures of the human mind.", "isCorrect": true, "rationale": "This turn signifies that the mind and its perceptions become the primary object of study, while the external world becomes something that must be proved."}, {"text": "It prioritizes the study of biological organisms over the study of metaphysical substances.", "isCorrect": false, "rationale": "While 'subject' can refer to a biological entity, in this context, it refers to the thinking self as the center of epistemology."}, {"text": "It assumes the world is a manifest structure that reason can grasp without prior proof.", "isCorrect": false, "rationale": "This description fits Aristotle's approach, whereas the 'turn to the subject' questions that very assumption."}, {"text": "It focuses on the moral development of the individual rather than the logic of non-contradiction.", "isCorrect": false, "rationale": "The 'turn to the subject' is primarily an epistemological shift regarding the foundation of knowledge, not a shift to ethics."}], "id": "q03"}, {"question": "What is the significance of Aquinas's term $ipsum \\space esse \\space subsistens$ regarding the nature of God?", "options": [{"text": "It signifies that God's essence and existence are identical, meaning God is 'Being itself.'", "isCorrect": true, "rationale": "Aquinas argues that unlike creatures, God does not just 'have' being; God's very nature is to exist."}, {"text": "It suggests that God is the most complex substance, composed of all possible forms and matters.", "isCorrect": false, "rationale": "Aquinas argues for divine simplicity, which means God has no composition of any kind, including form and matter."}, {"text": "It defines God as a specific kind of body that occupies the highest point in the universe.", "isCorrect": false, "rationale": "Aquinas explicitly refutes the idea that God is a body, as bodies are in potentiality and God is pure act."}, {"text": "It implies that God's existence is a property added to His essence by a prior cause.", "isCorrect": false, "rationale": "Aquinas maintains that God has no cause and that His existence is not an accident or addition to His essence."}], "id": "q04"}, {"question": "Why does Aquinas argue that God cannot be a body based on the concept of 'potentiality'?", "options": [{"text": "Every body is in potentiality because it is continuous and divisible, whereas the First Being must be in act.", "isCorrect": true, "rationale": "Because bodies are divisible to infinity, they contain potentiality; however, the First Being must be pure actuality to avoid an infinite regress of movers."}, {"text": "Bodies are only moved by internal forces, whereas God is moved by external spiritual forces.", "isCorrect": false, "rationale": "Aquinas identifies God as the Unmoved Mover who is not put in motion by anything else."}, {"text": "Scripture describes God as a 'Spirit,' which by definition means He lacks the potential to be seen.", "isCorrect": false, "rationale": "While he cites Scripture, his philosophical argument centers on the metaphysical transition from potentiality to act."}, {"text": "Only animate bodies are noble, and God is an inanimate substance with no potential for life.", "isCorrect": false, "rationale": "Aquinas argues that God is the most noble being, and an animate body is nobler than an inanimate one, but God transcends the body-soul composition."}], "id": "q05"}, {"question": "According to Aquinas's extension of Aristotle, where does truth primarily reside?", "options": [{"text": "Primarily in the intellect, and secondarily in things as they relate to an intellect.", "isCorrect": true, "rationale": "Aquinas follows Aristotle in placing truth in the intellect but adds that things are 'true' because they conform to the divine intellect."}, {"text": "Primarily in physical objects, regardless of whether any intellect perceives them.", "isCorrect": false, "rationale": "Aquinas argues against the idea that truth resides in things independently of an intellect, as truth is a matter of conformity."}, {"text": "Exclusively in the human mind, which creates the truth of things through perception.", "isCorrect": false, "rationale": "Aquinas believes things have an essential truth based on their relation to the divine mind, not just the human mind."}, {"text": "In the 'clear and distinct' ideas that the mind discovers within itself.", "isCorrect": false, "rationale": "This is the Cartesian view of truth, which prioritizes the clarity of the idea over the 'adequation' to an external thing."}], "id": "q06"}, {"question": "How does Aquinas explain the Scriptural attribution of 'corporeal parts' (like an arm or eyes) to God?", "options": [{"text": "They are metaphors for His actions and powers, such as His intellectual power of seeing.", "isCorrect": true, "rationale": "Aquinas argues that these descriptions are parallels to God's spiritual actions, such as 'eyes' representing the power of intellectual sight."}, {"text": "They represent the actual physical form God takes when appearing to human beings.", "isCorrect": false, "rationale": "Aquinas maintains God is incorporeal and does not possess a physical body or parts."}, {"text": "They refer to the 'virtual quantity' of God's body, which is higher than the heavens.", "isCorrect": false, "rationale": "Virtual quantity refers to God's power and duration (transcendence), not a literal physical body."}, {"text": "They indicate that man’s body is a perfect physical replica of God's substance.", "isCorrect": false, "rationale": "Aquinas clarifies that man is made in God's image according to reason and intelligence, which are incorporeal."}], "id": "q07"}, {"question": "What does Aquinas mean by saying natural things are 'true' essentially?", "options": [{"text": "They express the likeness of the species that exist as preconceptions in the divine mind.", "isCorrect": true, "rationale": "The essential truth of a thing is its conformity to the intellect upon which it depends for its existence—the divine intellect."}, {"text": "They are perceived clearly and distinctly by any human observer who is willing to know.", "isCorrect": false, "rationale": "Aquinas rejects the idea that truth is defined by whether it appears to a human knower."}, {"text": "They exist as substances in the world and are thus true regardless of any relationship to an intellect.", "isCorrect": false, "rationale": "Aquinas argues that truth always implies a relation to an intellect; 'absolute' truth in a thing relates it to its principle (God)."}, {"text": "They are produced by chance and only become 'true' when a human mind categorizes them.", "isCorrect": false, "rationale": "Aquinas specifically refutes the ancient philosophers who believed things were produced by chance and derived truth only from the human mind."}], "id": "q08"}, {"question": "In the contrast provided by the teacher's note, what is the 'risk' of Descartes' approach to certainty?", "options": [{"text": "By doubting the senses, one might cut oneself off from the world and struggle to return to it.", "isCorrect": true, "rationale": "The teacher's note suggests that once you doubt the senses, you have severed the link to the world, making the external world something that must be 'proved' back into existence."}, {"text": "By starting with being, one might ignore the logical principle of non-contradiction.", "isCorrect": false, "rationale": "This describes a risk more associated with ignoring Aristotle's principles, not Descartes' 'turn to the subject'."}, {"text": "It assumes the mind is structured by the world, which could lead to sensory deception.", "isCorrect": false, "rationale": "This is actually the opposite of Descartes' view; he assumes the mind provides the standard for truth independently of the world's structure."}, {"text": "It relies too heavily on divine revelation rather than the clarity of human reason.", "isCorrect": false, "rationale": "Descartes actually seeks to ground certainty in human thought (*cogito*) first, using reason as the primary tool."}], "id": "q09"}, {"question": "Which of the following best describes the 'divine simplicity' advocated by Aquinas?", "options": [{"text": "God has no composition of form and matter, substance and accidents, or essence and existence.", "isCorrect": true, "rationale": "Divine simplicity is the claim that God is completely non-composite, meaning there is no division or 'parts' in God's nature."}, {"text": "God is a single, uncomplicated substance that exists alongside other substances in the physical world.", "isCorrect": false, "rationale": "Aquinas views God not as one being among many, but as 'Being itself' ($ipsum \\space esse$), transcending the physical world."}, {"text": "God's existence is a simple 'accident' that follows from His divine nature.", "isCorrect": false, "rationale": "Aquinas explicitly denies that God has accidents distinct from His substance."}, {"text": "God's simplicity means He is only capable of performing one single action at a time.", "isCorrect": false, "rationale": "Simplicity refers to God's ontological structure (being), not a limitation on His power or actions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
