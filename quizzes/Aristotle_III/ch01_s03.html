<script>
var QUESTIONS = [{"question": "How do Thomas Aquinas and René Descartes fundamentally differ in their approach to Aristotle's metaphysics?", "options": [{"text": "Aquinas rejected Aristotle's work entirely, while Descartes sought to integrate it with Christian theology.", "isCorrect": false, "rationale": "This statement is incorrect. Aquinas built on Aristotle's work and integrated it with Christian theology, while Descartes systematically challenged it."}, {"text": "Aquinas aimed to correct and extend Aristotle's philosophy within a Christian framework, whereas Descartes systematically challenged and rebuilt philosophy from a new foundation.", "isCorrect": true, "rationale": "The text states that 'Aquinas built on Aristotle. Descartes tore down and rebuilt,' defining them as 'inheritors' who responded in opposite directions."}, {"text": "Both Aquinas and Descartes sought to dismantle Aristotle's system, but for different reasons.", "isCorrect": false, "rationale": "This statement is incorrect. Aquinas did not dismantle Aristotle's system; he deepened and extended it, whereas Descartes was the one who sought to tear down and rebuild."}, {"text": "Both thinkers primarily focused on reinterpreting Aristotle's ethical works rather than his metaphysics.", "isCorrect": false, "rationale": "This statement is incorrect. The text explicitly states that both thinkers took 'Aristotle's metaphysics most seriously' and Descartes' work was 'de prima philosophia'—on first philosophy, a term for metaphysics."}], "id": "q01"}, {"question": "The text describes Aquinas and Descartes as defining 'the fork in the road at which modern thought stands.' What fundamental choice does this fork represent?", "options": [{"text": "The choice between accepting medieval scholasticism or embracing the Renaissance humanism.", "isCorrect": false, "rationale": "While historically related, the text specifies a philosophical distinction, not merely a historical period or movement."}, {"text": "The choice between a world understood through purpose, form, and the hierarchy of being, and a world understood through mathematics, mechanism, and the sovereign thinking self.", "isCorrect": true, "rationale": "This directly quotes and accurately summarizes the text's description of the 'fork in the road' that Aquinas and Descartes define."}, {"text": "The choice between religious faith and scientific inquiry as sources of truth.", "isCorrect": false, "rationale": "This oversimplifies the issue. Aquinas integrated faith and reason, seeing them in a hierarchical relationship, while Descartes sought certainty through reason."}, {"text": "The choice between political philosophy and metaphysics as the primary domain of philosophical inquiry.", "isCorrect": false, "rationale": "The text focuses on their responses to Aristotle's metaphysics, not a shift in focus to political philosophy."}], "id": "q02"}, {"question": "Upon the recovery of Aristotle's works, medieval Christendom faced a crisis regarding its compatibility with Christian faith. What was Aquinas's unequivocal response to this challenge?", "options": [{"text": "To reject Aristotle's philosophy outright due to its pagan origins.", "isCorrect": false, "rationale": "Aquinas's answer was 'unequivocal: embrace it,' not to reject it."}, {"text": "To embrace Aristotle's philosophy, correct it where necessary, and build upon it to synthesize with Christian theology.", "isCorrect": true, "rationale": "The text states Aquinas's answer was to 'embrace it, correct it where necessary, and build on it,' culminating in his Summa Theologica, a synthesis of Christian theology and Aristotelian philosophy."}, {"text": "To embrace Aristotle's philosophy fully, without any corrections, as it was perfectly aligned with Christian doctrine.", "isCorrect": false, "rationale": "Aquinas did embrace Aristotle but also aimed to 'correct it where necessary' to align it with Christian revelation, especially regarding the nature of God."}, {"text": "To primarily use Aristotle's logical works but ignore his metaphysical and ethical treatises.", "isCorrect": false, "rationale": "The text mentions that Aristotle's logical works had survived, but the recovery of his full corpus created the crisis, and Aquinas engaged with the full range of his philosophy."}], "id": "q03"}, {"question": "The recovery of Aristotle's full corpus in the twelfth and thirteenth centuries is described as 'one of the most dramatic intellectual events of the Middle Ages.' What contributed most significantly to its profound impact?", "options": [{"text": "It introduced entirely new ethical systems that directly contradicted existing Christian moral teachings.", "isCorrect": false, "rationale": "While it posed challenges, its impact was broader than just ethics; it was about the comprehensive nature of the philosophy."}, {"text": "It presented a comprehensive, reason-based account of the world, human nature, and the divine from a pagan philosopher, prompting questions of its compatibility with Christian faith.", "isCorrect": true, "rationale": "The text highlights that Aristotle, 'a pagan philosopher of staggering genius who had constructed, on the basis of reason alone, a complete account' of reality, created a 'crisis' for medieval Christendom."}, {"text": "It provided the first systematic scientific method, immediately replacing older empirical approaches.", "isCorrect": false, "rationale": "The text emphasizes his philosophical system rather than solely a new scientific method, and it created a 'crisis' rather than an immediate replacement."}, {"text": "It led to the immediate rejection of all previous philosophical thought in Western Europe.", "isCorrect": false, "rationale": "The impact was a 'crisis' and a challenge to be addressed, not an immediate or total rejection of all prior thought."}], "id": "q04"}, {"question": "Aquinas's principle '$gratia non tollit naturam, sed perficit' ('grace does not destroy nature, but perfects it') is central to his synthesis. How does this principle manifest in his philosophical project?", "options": [{"text": "It asserts that faith completely replaces reason, as divine grace makes natural reason obsolete.", "isCorrect": false, "rationale": "This contradicts the principle, which states grace 'perfects' nature (including reason), not destroys or replaces it."}, {"text": "It implies that reason and philosophy are entirely separate from faith and theology, operating in distinct, non-overlapping domains.", "isCorrect": false, "rationale": "The principle describes a 'hierarchical relationship' where they are intertwined and mutually informing, not entirely separate."}, {"text": "It means that truths derived from reason are affirmed by faith, and revelation elevates reason's conclusions to a higher fulfillment.", "isCorrect": true, "rationale": "The text explains this principle means 'faith and reason, theology and philosophy... are not in conflict but in a hierarchical relationship: reason arrives at truths that faith confirms and elevates,' with revelation carrying reason's conclusions to 'a higher fulfillment.'"}, {"text": "It suggests that natural human faculties are inherently corrupt and must be completely overcome by divine grace.", "isCorrect": false, "rationale": "The principle emphasizes the perfection of nature by grace, not its inherent corruption, affirming that 'everything Aristotle got right... remains true.'"}], "id": "q05"}, {"question": "Descartes was 'deeply dissatisfied' with Aristotelian philosophy. What was his primary criticism of it?", "options": [{"text": "It was too focused on mathematical precision and not enough on human experience.", "isCorrect": false, "rationale": "This is incorrect. Descartes desired mathematical rigor and found Aristotelian philosophy lacking in it."}, {"text": "It built too much on unreliable sense perception and employed vague, unverifiable concepts, thus lacking the certainty required for genuine knowledge.", "isCorrect": true, "rationale": "The text states Descartes believed Aristotelian philosophy 'built too much on sense perception—and senses can deceive. It was full of vague, unverifiable concepts like substantial forms and final causes.'"}, {"text": "It prioritized individual subjective experience over objective, universal truths.", "isCorrect": false, "rationale": "Aristotle focused on objective reality and universal forms. Descartes initially prioritized the subjective certainty of the 'thinking self' as a foundation."}, {"text": "It failed to incorporate theological insights into its metaphysical framework.", "isCorrect": false, "rationale": "Descartes' dissatisfaction was with the philosophical method and concepts of Aristotle itself, not its integration with theology."}], "id": "q06"}, {"question": "Descartes' solution to the perceived flaws of Aristotelian philosophy was 'radical: begin again, from nothing.' What was the purpose of his method of systematic doubt?", "options": [{"text": "To prove that all existing knowledge was fundamentally false and irredeemable.", "isCorrect": false, "rationale": "The purpose was to find what survived the doubt, not to prove everything false. He aimed to rebuild knowledge, not abandon it."}, {"text": "To identify a single, indubitable truth from which all other knowledge could be reliably rebuilt.", "isCorrect": true, "rationale": "The text explains his method: 'Doubt everything that can possibly be doubted... Then see what survives.' What survived was 'one certainty: I am thinking. Therefore I exist'—the foundation for new philosophy."}, {"text": "To demonstrate the inherent limitations of human reason and the impossibility of true knowledge.", "isCorrect": false, "rationale": "Descartes was seeking genuine knowledge and certainty, not demonstrating its impossibility."}, {"text": "To encourage philosophical skepticism and the rejection of all dogmas.", "isCorrect": false, "rationale": "While it involved skepticism, the ultimate goal was constructive: to establish a firm foundation for knowledge."}], "id": "q07"}, {"question": "After his systematic doubt, what did Descartes identify as the single, certain foundation for all knowledge?", "options": [{"text": "The external world, as perceived clearly and distinctly through the senses.", "isCorrect": false, "rationale": "Descartes explicitly doubted the reliability of sense perception ('senses can deceive') during his systematic doubt."}, {"text": "The existence of God, proven through empirical observation of the natural world.", "isCorrect": false, "rationale": "Descartes later argued for God's existence, but his initial foundational certainty was the cogito, not an empirically proven God."}, {"text": "The certainty of the thinking self: 'I think, therefore I am.'", "isCorrect": true, "rationale": "The text states, 'What survives Descartes' systematic doubt is... one certainty: I am thinking. Therefore I exist. The famous cogito—$cogito, ergo sum... becomes the foundation of a new philosophy.'"}, {"text": "Aristotle's concept of substantial form as the essence of all beings.", "isCorrect": false, "rationale": "Descartes specifically criticized and rejected vague concepts like 'substantial forms' from Aristotelian philosophy."}], "id": "q08"}, {"question": "How does Descartes' reconstructed world, built from his foundational certainty, primarily differ from Aristotle's understanding of reality?", "options": [{"text": "Descartes saw reality as a hierarchy of forms pursuing ends, much like Aristotle, but with the addition of divine intervention.", "isCorrect": false, "rationale": "This is incorrect. Descartes explicitly rejected Aristotle's concepts of 'substances, forms, final causes, and potentialities.'"}, {"text": "Descartes populated reality with two distinct substances—$res cogitans (thinking mind) and $res extensa (extended matter)—contrasting Aristotle's world of substances, forms, and final causes.", "isCorrect": true, "rationale": "The text explains, 'Where Aristotle populated reality with substances, forms, final causes, and potentialities, Descartes populates it with two and only two kinds of substance: res cogitans... and res extensa.'"}, {"text": "Descartes believed reality was ultimately unknowable, whereas Aristotle believed it was fully comprehensible through reason.", "isCorrect": false, "rationale": "Descartes' project was precisely to establish a certain and knowable foundation for understanding reality, albeit a different one from Aristotle's."}, {"text": "Descartes emphasized the role of divine revelation as the sole source of truth, while Aristotle relied entirely on empirical observation.", "isCorrect": false, "rationale": "Descartes' philosophy was founded on rational certainty (the cogito); he did not assert revelation as the sole source of truth."}], "id": "q09"}, {"question": "The text describes 'The Drama of Each Chapter' in the book. What is the consistent pattern that will unfold in each content chapter?", "options": [{"text": "Each chapter will introduce a new philosopher who critiques Aristotle, followed by a historical overview of their reception.", "isCorrect": false, "rationale": "The text specifies that the chapters will consistently feature Aristotle, Aquinas, and Descartes, not just any new philosopher."}, {"text": "Aristotle will present an argument, followed by Aquinas building on it, and then Descartes challenging it from a new starting point.", "isCorrect": true, "rationale": "The text states: 'Aristotle will make an argument... Then Aquinas will come forward and build on that argument... Then Descartes will come forward and challenge that argument...'"}, {"text": "The book will exclusively focus on medieval interpretations of Aristotle, without engaging with modern critiques.", "isCorrect": false, "rationale": "This is incorrect. Descartes represents a significant modern critique of Aristotle."}, {"text": "Each chapter will begin with a contemporary philosophical problem and then trace its origins back to Aristotle, Aquinas, and Descartes.", "isCorrect": false, "rationale": "The structure described starts with Aristotle's argument, then brings in Aquinas and Descartes, not with a contemporary problem."}], "id": "q10"}, {"question": "The text describes Aristotle's God—the Unmoved Mover—as falling short of the God of Scripture in one crucial respect. What is that difference, and how did Aquinas address it?", "options": [{"text": "Aristotle's God lacks omnipotence; Aquinas argued for God's unlimited power through the doctrine of creation ex nihilo.", "isCorrect": false, "rationale": "While creation ex nihilo is a Thomistic doctrine, the specific contrast the text highlights concerns knowledge and love, not omnipotence."}, {"text": "Aristotle's God is self-thinking thought that does not know or love the world; Aquinas extended the framework using revelation to reach the God who creates, knows, loves, and redeems.", "isCorrect": true, "rationale": "The text states that Aristotle's Unmoved Mover 'does not know or love the world in return,' and that Aquinas showed how the same metaphysical framework 'could be extended, with corrections drawn from revelation, to the God who creates, knows, loves, and redeems.'"}, {"text": "Aristotle's God is mortal; Aquinas demonstrated God's eternal existence using the Five Ways.", "isCorrect": false, "rationale": "Aristotle's Unmoved Mover is already described as eternal; the gap is relational (knowing and loving the world), not temporal."}, {"text": "Aristotle's God is purely material; Aquinas argued for God's pure spirituality and immateriality.", "isCorrect": false, "rationale": "Aristotle's Unmoved Mover is already presented as immaterial and eternal; the shortfall is its lack of a personal relationship with the world."}], "id": "q11"}, {"question": "Descartes titled his masterwork the 'Meditations on First Philosophy'—deliberately echoing Aristotle's term. What does this choice of title signal about his project?", "options": [{"text": "It shows humility: Descartes considered himself a commentator on Aristotle's tradition, not a radical innovator.", "isCorrect": false, "rationale": "The text calls the title 'a deliberate provocation,' not an act of humility; Descartes was announcing a challenge to Aristotle."}, {"text": "It was a deliberate provocation, announcing that Descartes was taking on Aristotle directly, on Aristotle's own ground—replacing his metaphysics with a new one.", "isCorrect": true, "rationale": "The text states: 'The title was a deliberate provocation: de prima philosophia in Latin... the same phrase Aristotle had used for the Metaphysics. Descartes was announcing that he was taking on Aristotle directly, on Aristotle's own ground.'"}, {"text": "It shows that Descartes admired Aristotle's method and sought to refine it within the same conceptual framework.", "isCorrect": false, "rationale": "Descartes was 'deeply dissatisfied' with Aristotelianism and wanted to rebuild entirely, not refine the existing framework."}, {"text": "It was simply a conventional title in seventeenth-century academic Latin with no polemical significance.", "isCorrect": false, "rationale": "The text explicitly calls it 'a deliberate provocation,' not a conventional or neutral choice."}], "id": "q12"}, {"question": "The text names Averroes and Avicenna as key figures in transmitting Aristotle to the Latin West. What role did they play in this transmission?", "options": [{"text": "They were Latin scholars who recovered Aristotle's original manuscripts from Greek monasteries.", "isCorrect": false, "rationale": "Averroes and Avicenna were Arabic-speaking philosophers; the text distinguishes their Arabic translations from later direct Latin translations of Greek manuscripts."}, {"text": "They wrote Arabic commentaries and translations of Aristotle that were then rendered into Latin, making Aristotle accessible to medieval European thinkers.", "isCorrect": true, "rationale": "The text states that Arabic translations were made into Latin 'first from Arabic scholars like Averroes and Avicenna,' who played 'a crucial role in transmitting Aristotle's philosophy to medieval Europe.'"}, {"text": "They were Aquinas's personal teachers who instructed him in Aristotelian philosophy at the University of Paris.", "isCorrect": false, "rationale": "Aquinas studied under Albert the Great; Averroes and Avicenna were earlier figures whose works arrived as texts, not as teachers."}, {"text": "They produced original metaphysical systems that replaced Aristotle's, which Aquinas then synthesized with Christianity.", "isCorrect": false, "rationale": "While they had their own interpretations, their role in this context is as transmitters and commentators, not as original system-builders who replaced Aristotle."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
