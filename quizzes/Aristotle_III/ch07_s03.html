<script>
var QUESTIONS = [{"question": "Which statement best encapsulates the core idea of Kant's 'Copernican Revolution' in philosophy?", "options": [{"text": "The human mind passively receives the world as it is, much like a camera recording an image.", "isCorrect": false, "rationale": "Kant explicitly rejected the idea that the mind passively receives the world. Instead, he argued for an active role of the mind in structuring experience."}, {"text": "Objects of experience conform to the mind's way of experiencing them, rather than the mind conforming to objects.", "isCorrect": true, "rationale": "This statement accurately describes Kant's Copernican Revolution. He reversed the traditional understanding of knowledge, proposing that the mind's inherent structures (like space, time, and categories) shape how we perceive and understand the world."}, {"text": "Philosophers before Kant had correctly understood knowledge as a matter of the mind conforming to objects.", "isCorrect": false, "rationale": "While this was the prevailing view before Kant, his 'Copernican Revolution' was precisely a challenge to this assumption, arguing that the opposite is true."}, {"text": "The motion of the sun and stars is an illusion, similar to how our perception of reality is entirely subjective and lacks any objective basis.", "isCorrect": false, "rationale": "The comparison to Copernicus relates to the shift in perspective regarding the observer's role, not to the idea that all reality is an illusion or completely subjective. Kant sought to establish the objective validity of experience, but grounded in the mind's structuring activity."}]}, {"question": "What was the primary purpose of Descartes' method of radical doubt in his Meditations on First Philosophy?", "options": [{"text": "To prove that all sensory experience is inherently unreliable and should be disregarded in scientific inquiry.", "isCorrect": false, "rationale": "While Descartes acknowledges sensory deception, the ultimate goal of radical doubt wasn't simply to dismiss the senses entirely, but to find a foundation that even radical doubt could not shake, eventually rebuilding knowledge including the reliability of senses under certain conditions."}, {"text": "To establish the existence of a malicious evil genius as the ultimate cause of all human error.", "isCorrect": false, "rationale": "The evil genius was a hypothetical thought experiment designed to push doubt to its maximum extent, not a being whose existence Descartes aimed to prove or a definitive cause of error."}, {"text": "To strip away every belief that could possibly be doubted and identify a foundational certainty upon which true knowledge could be built.", "isCorrect": true, "rationale": "Descartes' method of radical doubt, including the evil genius hypothesis, was a systematic process to eliminate all dubitable beliefs and arrive at an indubitable truth, which he found in the 'cogito'."}, {"text": "To demonstrate that mathematics and geometry are inherently uncertain due to the possibility of deception.", "isCorrect": false, "rationale": "The doubt extended even to mathematics, but this was to show the extremity of doubt, not to conclude that mathematics is inherently uncertain. The goal was to find a certainty beyond even mathematical doubt."}]}, {"question": "According to Descartes' 'cogito' argument in Meditation II, what is the essential nature of the meditator?", "options": [{"text": "A physical body capable of movement and sensation, whose existence is proven through interaction with the external world.", "isCorrect": false, "rationale": "The 'cogito' establishes the existence of the 'I' independent of the body or external world. The wax argument further separates knowledge of the body from sensory input."}, {"text": "A 'res extensa,' or an extended thing, whose primary attribute is its spatial dimension.", "isCorrect": false, "rationale": "'Res extensa' refers to physical matter, which Descartes distinguishes from the thinking self ('res cogitans')."}, {"text": "A 'res cogitans,' or a thinking thing, whose existence is undeniable even in the face of universal doubt.", "isCorrect": true, "rationale": "The 'cogito ergo sum' directly leads Descartes to conclude that he is, most essentially, a 'res cogitans'—a thinking thing, whose essence is thought itself, distinct from the body."}, {"text": "A 'bundle of perceptions,' as later argued by empiricist philosophers like David Hume.", "isCorrect": false, "rationale": "This concept is associated with David Hume and is a stark contrast to Descartes' view of a substantive, thinking self ('res cogitans')."}]}, {"question": "How did Immanuel Kant address David Hume's skepticism regarding causation?", "options": [{"text": "Kant argued that Hume was entirely wrong and that causation is directly observable in sense experience.", "isCorrect": false, "rationale": "Kant accepted Hume's premise that causation cannot be derived from sense experience. His disagreement was with Hume's conclusion that it therefore couldn't be known."}, {"text": "Kant concluded that Hume was correct and that belief in causation is fundamentally irrational and unjustifiable.", "isCorrect": false, "rationale": "Hume's conclusions 'awakened' Kant from his 'dogmatic slumber,' motivating him to construct a response that preserved the possibility of knowledge, including causation, but on a new basis."}, {"text": "Kant proposed that causation is not derived from experience but is a fundamental category of understanding contributed by the mind to structure experience.", "isCorrect": true, "rationale": "Kant's revolutionary insight was to agree with Hume that causation isn't empirically derived, but to argue that it's an a priori structure of the mind—a 'category of understanding'—that the mind imposes on raw sensory data to create coherent experience."}, {"text": "Kant asserted that causation is an attribute of God and can only be known through divine revelation, not human reason.", "isCorrect": false, "rationale": "Kant's philosophy focused on the capabilities and limitations of human reason, not on divine revelation, as the source of understanding categories like causation."}]}, {"question": "Which of the following best describes the difference between Descartes' arguments for God's existence and Aristotle's approach?", "options": [{"text": "Descartes relied on empirical observation of the natural world, while Aristotle used purely rational, deductive arguments.", "isCorrect": false, "rationale": "This reverses their approaches. Aristotle's arguments for God (e.g., Prime Mover) often started from observations of the moving world, while Descartes' arguments were rational but derived from the contents of the thinking mind."}, {"text": "Descartes' arguments for God were fundamentally Aristotelian in their logical structure, differing only in conclusion.", "isCorrect": false, "rationale": "The text explicitly states that Descartes' arguments 'are formally independent of anything Aristotle had argued' and 'are not Aristotelian in form.'"}, {"text": "Descartes attempted to reach God from the contents of the thinking mind, whereas Aristotle's arguments were grounded in the structure of the moving world.", "isCorrect": true, "rationale": "Descartes' arguments (e.g., from the idea of a perfect being, or existence as a perfection) start from the thinking self and its innate ideas. Aristotle's cosmological argument, in contrast, begins with observations about motion and causation in the external world."}, {"text": "Both Descartes and Aristotle derived God's existence from the problem of human error and the need for a perfectly good creator.", "isCorrect": false, "rationale": "While Descartes addressed the problem of error in Meditation IV, his arguments for God in Meditations III and V do not primarily stem from this problem in the same way Aristotle's do not."}]}, {"question": "Which set of philosophers is explicitly identified as forming the 'rationalist tradition' that followed Descartes?", "options": [{"text": "David Hume, John Locke, and George Berkeley", "isCorrect": false, "rationale": "These philosophers are known as British Empiricists, who emphasized sense experience as the primary source of knowledge, in contrast to the Rationalists."}, {"text": "Baruch Spinoza, Gottfried Wilhelm Leibniz, and Immanuel Kant", "isCorrect": false, "rationale": "While Spinoza and Leibniz are key Rationalists, Kant 'challenged and reshaped' the rationalist tradition; he is not typically considered part of the original post-Descartes rationalist trio mentioned in the text."}, {"text": "Descartes, Baruch Spinoza, and Gottfried Wilhelm Leibniz", "isCorrect": true, "rationale": "The text clearly states, 'Together, these three—Descartes, Spinoza, Leibniz—form the rationalist tradition, which would be challenged and reshaped by Kant.'"}, {"text": "Aristotle, Plato, and Socrates", "isCorrect": false, "rationale": "These are ancient Greek philosophers, predating Descartes and the rationalist tradition by many centuries."}]}, {"question": "According to Kant, what are space and time in relation to our experience of the world?", "options": [{"text": "They are features of reality as it is in itself, independent of the human mind.", "isCorrect": false, "rationale": "Kant argued precisely the opposite: space and time are not properties of 'things as they are in themselves' but are contributed by the mind."}, {"text": "They are concepts derived entirely from empirical observation and sensory data.", "isCorrect": false, "rationale": "Kant disagreed with empiricists like Hume on this point, arguing that space and time are not derived from experience but are prior to it."}, {"text": "They are the forms of intuition, inherent frameworks through which the mind receives and orders sensory data.", "isCorrect": true, "rationale": "For Kant, space and time are subjective, a priori 'forms of intuition.' They are the necessary structure of our receptivity, meaning we can only experience things as spatially and temporally ordered, because that's how our minds process input."}, {"text": "They are illusions created by the evil genius to deceive us about the true nature of reality.", "isCorrect": false, "rationale": "The concept of an 'evil genius' is specific to Descartes' method of doubt, not Kant's theory of space and time."}]}, {"question": "What key insight does Descartes' famous 'wax argument' from Meditation II primarily aim to demonstrate?", "options": [{"text": "That the senses are the ultimate source of all knowledge about physical objects, as they provide us with direct experience.", "isCorrect": false, "rationale": "The wax argument shows that sensory properties change, but our intellectual understanding of the wax's essence (extension) remains, thus emphasizing the intellect over the senses."}, {"text": "That physical objects, like wax, possess an unchanging essence (extension) grasped by the intellect, even as their sensible properties change.", "isCorrect": true, "rationale": "The wax argument illustrates that while a piece of wax undergoes changes in sensory properties (smell, color, shape, hardness) when melted, the mind grasps its essential nature—that it is extended, flexible, movable—through intellectual judgment, not through the unreliable senses."}, {"text": "That it is impossible to know the true nature of any physical object, as all its properties are subject to change.", "isCorrect": false, "rationale": "On the contrary, the argument demonstrates that certain essential properties can be known, but through the intellect rather than the senses."}, {"text": "That the existence of an external world can be proven through observing the distinct properties of substances like wax.", "isCorrect": false, "rationale": "The wax argument focuses on the nature of knowledge about objects, specifically the role of the intellect. The existence of the external world is addressed later in Meditation VI."}]}, {"question": "In Meditation IV, how does Descartes explain the problem of human error if God, as a perfect being, is the creator of humans?", "options": [{"text": "Error is a consequence of God intentionally implanting false ideas in human minds to test their faith.", "isCorrect": false, "rationale": "Descartes argues God is perfectly good and not a deceiver; therefore, God would not intentionally mislead humans."}, {"text": "Error arises from the misuse of the human will, which extends beyond the intellect's clear and distinct perceptions.", "isCorrect": true, "rationale": "Descartes' solution is that error occurs when the will affirms or denies something that the intellect does not clearly and distinctly perceive, thus overreaching the intellect's proper scope."}, {"text": "Error is an inherent flaw in human reason that cannot be overcome by any philosophical method.", "isCorrect": false, "rationale": "Descartes' entire project is to find a method to overcome doubt and error, based on clear and distinct perceptions, implying error can be overcome."}, {"text": "Error is primarily caused by external sensory deceptions that are beyond human control or understanding.", "isCorrect": false, "rationale": "While sensory deceptions are part of Meditation I's doubt, Meditation IV's explanation for why error occurs (given a good God) focuses on the internal faculties of will and intellect, not just external deceptions."}]}, {"question": "Which of the following describes the broad impact of Kant's 'Copernican Revolution' on subsequent philosophical thought?", "options": [{"text": "It largely confirmed the possibility of traditional metaphysics as understood by Aristotle and his followers.", "isCorrect": false, "rationale": "Kant's revolution 'challenged the possibility of traditional metaphysics,' even while preserving its questions, by redefining the terms of knowledge."}, {"text": "It led to a complete abandonment of inquiry into metaphysics, ethics, and aesthetics, deeming them unknowable.", "isCorrect": false, "rationale": "Kant aimed to save metaphysics, ethics, and other fields by placing them on a new foundation, not abandon them. His critiques transformed, rather than destroyed, these areas of inquiry."}, {"text": "It transformed the way all subsequent thinkers approached metaphysics, ethics, aesthetics, and the philosophy of science.", "isCorrect": true, "rationale": "The text explicitly states that Kant's revolution 'transformed the way all subsequent thinkers approached metaphysics, ethics, aesthetics, and the philosophy of science,' demonstrating its wide-ranging and profound influence."}, {"text": "Its influence was primarily limited to the field of natural science, having little bearing on other branches of philosophy.", "isCorrect": false, "rationale": "The impact was much broader, explicitly stated to include metaphysics, ethics, aesthetics, and the philosophy of science, not just natural science."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
