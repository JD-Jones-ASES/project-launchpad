<script>
var QUESTIONS = [{"question": "According to Aristotle, what fundamentally characterizes the natural world?", "options": [{"text": "It is primarily composed of static, unchanging forms that exist independently of matter.", "isCorrect": false, "rationale": "While forms are crucial for Aristotle, he saw them as dynamic principles inherent in substances, not static and separate from matter. His universe is dynamic, not static."}, {"text": "It is fundamentally teleological, with every natural substance possessing an inherent directedness toward its own fulfillment.", "isCorrect": true, "rationale": "The text explicitly states that for Aristotle, the world is 'ordered toward ends—it is fundamentally teleological,' with substances like an acorn aiming at an oak."}, {"text": "It operates solely through random, unguided atomic interactions, lacking any intrinsic order.", "isCorrect": false, "rationale": "This describes a more mechanistic, possibly Epicurean view, which is contrary to Aristotle's teleological understanding of nature."}, {"text": "It is a collection of accidental occurrences without any underlying purpose or structure.", "isCorrect": false, "rationale": "Aristotle believed in a deep, inherent purpose and structure (telos) within nature, rejecting the idea of purely accidental occurrences."}], "id": "q01"}, {"question": "How would Descartes explain the development of an acorn into an oak, in contrast to Aristotle's view?", "options": [{"text": "Descartes would agree with Aristotle that the acorn possesses an inherent, metaphysically laden potentiality towards becoming an oak.", "isCorrect": false, "rationale": "Descartes explicitly 'dismantles this vision' and rejects the idea of 'potentially' an oak in a 'metaphysically laden sense.'"}, {"text": "Descartes would assert that the oak's form is an eternal essence guiding the acorn's growth from a divine blueprint.", "isCorrect": false, "rationale": "While Descartes believed in eternal essences, he did not see them as dynamic guiding principles for natural growth in the Aristotelian sense. Growth was mechanistic."}, {"text": "Descartes would explain it as a result of mechanical laws governing the configuration and motion of particles, without any inherent inner purpose.", "isCorrect": true, "rationale": "The text states Descartes replaces Aristotelian ideas with 'a universe of matter in motion governed by mathematical laws' and that the acorn develops because 'the mechanical laws governing its particles produce that outcome.'"}, {"text": "Descartes would attribute it to a divine will actively intervening at each stage of the acorn's transformation into an oak.", "isCorrect": false, "rationale": "While God initiated the laws of motion, Descartes's system emphasizes the mechanical operation of these laws, not continuous divine intervention in every natural process."}], "id": "q02"}, {"question": "Descartes's radical dualism posits two fundamentally distinct substances. What are they, and how are they primarily defined?", "options": [{"text": "Hyle (matter) defined by potentiality and Eidos (form) defined by actuality.", "isCorrect": false, "rationale": "These are Aristotelian terms (matter and form), not Descartes's distinct substances."}, {"text": "Res cogitans (mind) defined entirely by thought and Res extensa (body) defined entirely by spatial extension.", "isCorrect": true, "rationale": "The text clearly defines Descartes's two substances: 'res cogitans (the thinking thing, the mind, defined entirely by thought) and res extensa (the extended thing, the body, defined entirely by spatial extension).'"}, {"text": "Actus purus (God) defined by pure actuality and Creatura (creature) defined by potentiality.", "isCorrect": false, "rationale": "These are concepts from Aquinas and refer to God and creatures, not the fundamental substances of Descartes's dualism."}, {"text": "Logos (reason) defined by purpose and Physis (nature) defined by growth.", "isCorrect": false, "rationale": "These terms relate to philosophical concepts but do not represent Descartes's fundamental dualistic substances."}], "id": "q03"}, {"question": "Based on Descartes's treatment of the triangle in Meditation V, what does he consider the essence of a thing to be?", "options": [{"text": "The dynamic principle that a thing is actively realizing through its growth and activity.", "isCorrect": false, "rationale": "This is Aristotle's view of essence, not Descartes's. Descartes rejected dynamic essences."}, {"text": "A static, immutable, and eternal conceptual object, independent of its actual existence or any mind's perception.", "isCorrect": true, "rationale": "Descartes uses the triangle example to illustrate that its essence ('a certain determinate nature, form, or essence') is 'immutable and eternal,' 'not invented,' and 'in no wise depends on my mind,' existing independently of whether the triangle exists or is thought about."}, {"text": "The sum of its observable physical properties and behaviors, as determined by empirical investigation.", "isCorrect": false, "rationale": "Descartes's essences are known through clear and distinct intellectual conception, not purely through empirical observation of physical properties, especially since they are independent of existence."}, {"text": "A property that depends entirely on sensory experience and the imagination, varying from person to person.", "isCorrect": false, "rationale": "Descartes explicitly argues against this, stating that he can demonstrate properties of figures 'regarding which we cannot have the least conception of their ever having been objects of sense.'"}], "id": "q04"}, {"question": "What major consequence did Descartes's philosophical program have for the scientific understanding of the natural world?", "options": [{"text": "It reaffirmed the importance of teleological explanations in physics and biology, leading to a resurgence of Aristotelian natural philosophy.", "isCorrect": false, "rationale": "The text states the opposite: Descartes's program led to 'the death of the teleological universe' and replaced it with a mechanical one."}, {"text": "It led to the abandonment of mathematics as a primary tool for scientific inquiry, favoring purely qualitative observation.", "isCorrect": false, "rationale": "Descartes's vision was 'a universe of matter in motion governed by mathematical laws,' which solidified the role of mathematics in science."}, {"text": "It established the intellectual foundation for modern science by focusing on mechanical laws and efficient causation, asking 'how' things work rather than 'what for.'", "isCorrect": true, "rationale": "The text states, 'This is the intellectual foundation of the scientific revolution: Galileo, Newton, and Boyle all worked within the framework that Descartes articulated philosophically,' leading science to ask 'how they work—what are the mechanical laws governing their behavior?'"}, {"text": "It reconciled the Aristotelian concept of potentiality with empirical observation, creating a unified theory of change.", "isCorrect": false, "rationale": "Descartes explicitly 'dismantles this vision' of potentiality and replaces it with efficient causation, thereby not reconciling it."}], "id": "q05"}, {"question": "In Descartes's mechanistic universe, which of Aristotle's four causes does he retain as scientifically meaningful, and how is it characterized?", "options": [{"text": "Final causation, redefined as the ultimate purpose of God's creation, guiding all natural processes.", "isCorrect": false, "rationale": "Descartes 'discards the formal and final causes as scientifically meaningless.'"}, {"text": "Formal causation, redefined as the mathematical structure of objects, providing their essential definition.", "isCorrect": false, "rationale": "Descartes 'discards the formal and final causes as scientifically meaningless.' While mathematical structures are important, they are not a retained 'formal cause' in Aristotle's sense."}, {"text": "Efficient causation, understood as particles in motion acting on other particles according to fixed mechanical laws.", "isCorrect": true, "rationale": "The text states, 'Descartes's mechanistic physics retains only efficient causation (particles in motion acting on other particles) and discards the formal and final causes as scientifically meaningless.'"}, {"text": "Material causation, but retaining its Aristotelian sense of a purposively directed substrate.", "isCorrect": false, "rationale": "The material cause 'survives, but transformed: matter for Descartes is pure extension, not the purposively directed substrate of Aristotelian hyle.'"}], "id": "q06"}, {"question": "How does Aristotle's conception of the soul differ fundamentally from Descartes's *res cogitans*?", "options": [{"text": "For Aristotle, the soul is a separate, non-physical substance that temporarily inhabits the body, whereas Descartes sees it as inseparable.", "isCorrect": false, "rationale": "This reverses their positions. Aristotle saw soul and body as inseparable, while Descartes saw them as separate substances."}, {"text": "For Aristotle, the soul is the organizing principle (form) of the body, directing its matter, while Descartes sees *res cogitans* as a distinct thinking substance completely separate from the body.", "isCorrect": true, "rationale": "The text explains: 'In Aristotle's framework, the soul is the form of the body...Soul and body are not two separate things...Descartes rejects this entirely. His radical dualism divides reality into two completely distinct substances: res cogitans... and res extensa...'"}, {"text": "Aristotle views the soul as divisible into parts related to faculties, whereas Descartes considers *res cogitans* entirely indivisible.", "isCorrect": false, "rationale": "Descartes's Meditations excerpt explicitly argues that the mind (*res cogitans*) is 'entirely indivisible,' contrasting with the body. Aristotle's soul, as a form, isn't typically divided into 'parts' in the same way."}, {"text": "Aristotle believes the soul is an empirical phenomenon observable through the senses, while Descartes defines *res cogitans* purely through metaphysical speculation.", "isCorrect": false, "rationale": "Neither philosopher restricts their understanding of the soul/mind to purely empirical observation in this way, and Descartes's method relies heavily on intellectual apprehension."}], "id": "q07"}, {"question": "The 'mind-body problem' becomes particularly acute in Descartes's framework. What is the core challenge it poses?", "options": [{"text": "Determining whether the mind or body is ultimately more real or substantial.", "isCorrect": false, "rationale": "While related, the core problem is not about which is 'more real,' but how they relate given their distinctness."}, {"text": "Explaining how two completely distinct substances like the non-spatial mind and the extended body can possibly interact.", "isCorrect": true, "rationale": "The text defines it as 'The question of how mind and body relate and interact, which becomes acute in Descartes's dualistic framework. If res cogitans... and res extensa... are completely distinct and have nothing in common, how does the mind cause the body to move...?'"}, {"text": "Proving the existence of the mind independently of the body, which Descartes failed to do.", "isCorrect": false, "rationale": "Descartes believed he had proven the mind's existence independently (e.g., 'I think, therefore I am'), but the problem is about *interaction*, not initial proof of existence."}, {"text": "Reconciling the scientific study of the brain with religious beliefs about the soul, which was not Descartes's primary concern.", "isCorrect": false, "rationale": "While a modern concern, the mind-body problem in Descartes's context is a philosophical dilemma about substance interaction, not primarily about science vs. religion."}], "id": "q08"}, {"question": "According to Aquinas, what does *actus purus* signify about the nature of God?", "options": [{"text": "God is pure potentiality, capable of becoming anything and constantly undergoing transformation.", "isCorrect": false, "rationale": "This is the opposite of *actus purus*. God, as pure act, has no potentiality for change."}, {"text": "God is a being of mixed actuality and potentiality, constantly evolving and developing towards greater perfection.", "isCorrect": false, "rationale": "*Actus purus* means 'no potentiality at all.' God is already perfectly actual, with nothing more to achieve or develop."}, {"text": "God is pure actuality, possessing no unrealized capacity or potentiality whatsoever, being perfectly and fully what God is eternally.", "isCorrect": true, "rationale": "The text states: 'God is actus purus—pure actuality—no potentiality at all. God cannot change, grow, develop, or become more or less than God already is, because there is no unrealized capacity in God.'"}, {"text": "God is a static, inert being, incapable of any action or influence on the created world.", "isCorrect": false, "rationale": "The text clarifies, 'This does not mean God is static or inert—quite the opposite. God is the infinite, perfectly active source of all being.'"}], "id": "q09"}, {"question": "The shift from Aristotle's philosophy to Descartes's represents a fundamental change in humanity's understanding of the cosmos. Which of the following best describes this overarching transformation?", "options": [{"text": "From a universe understood primarily through qualitative observation and subjective experience to one based solely on intuition.", "isCorrect": false, "rationale": "Both philosophers valued reason, but Descartes moved away from qualitative observation towards mathematical principles. The shift wasn't to 'solely on intuition'."}, {"text": "From a cosmos imbued with inherent purpose, inner directedness, and striving (teleological) to a purely mechanical system of matter in motion governed by fixed laws.", "isCorrect": true, "rationale": "This accurately summarizes the core transformation: 'Descartes dismantles this vision [Aristotle's teleological universe]... to replace the Aristotelian universe of forms, ends, and potentialities with a universe of matter in motion governed by mathematical laws.'"}, {"text": "From a focus on the soul's immortality and divine intervention to a strict materialist denial of anything non-physical.", "isCorrect": false, "rationale": "While Descartes rejected some divine interventions, he maintained the existence of a non-physical soul (*res cogitans*), so it wasn't a strict materialist denial."}, {"text": "From a rejection of divine influence in nature to an acceptance of continuous miraculous occurrences.", "isCorrect": false, "rationale": "Descartes's system emphasized mechanical laws established by God, not continuous miraculous intervention, which would contradict the regularity of mechanical laws."}], "id": "q10"}, {"question": "The text explains that Aristotle cannot define actuality directly and instead proceeds by analogy. What philosophical point does this limitation actually demonstrate?", "options": [{"text": "That actuality is an uncertain or poorly developed concept in Aristotle's metaphysics.", "isCorrect": false, "rationale": "The text explicitly states that 'Aristotle is not just admitting a gap in his theory.' The use of analogy is a deliberate philosophical strategy, not evidence of weakness."}, {"text": "That the most fundamental features of reality cannot be derived from anything more basic — they must be recognized directly through experience.", "isCorrect": true, "rationale": "The text states: 'Aristotle is making a claim about the structure of reality. The most fundamental features of being are not deducible from anything more fundamental — they are simply the most basic features of our experience, which we must come to see directly.'"}, {"text": "That language is fundamentally inadequate for philosophical inquiry and all definitions are ultimately circular.", "isCorrect": false, "rationale": "Aristotle's point is not a general skepticism about language or definition, but a specific claim about actuality's foundational status. He can define potentiality directly; only actuality requires the analogical approach."}, {"text": "That actuality is a subjective experience that varies between individuals and cannot be universally described.", "isCorrect": false, "rationale": "Aristotle uses the analogical method to point toward a universal feature of experience that all rational beings can recognize. It is a universal, objective feature of being — not a subjective, individual one."}], "id": "q11"}, {"question": "Why does Aquinas describe God as $actus purus (pure actuality) rather than as a being with both actuality and potentiality?", "options": [{"text": "Because God is the highest being in the hierarchy of creatures and therefore has more actuality than others.", "isCorrect": false, "rationale": "Aquinas's point is not that God is the highest along a scale of creatures. $Actus purus means no potentiality at all — God is not more actualized than other things, but perfectly and completely actual with nothing yet to realize."}, {"text": "Because potentiality implies the capacity for change, and a being that could change or be improved would not be the perfect, self-sufficient source of all being.", "isCorrect": true, "rationale": "The text states: 'God is actus purus — pure actuality — no potentiality at all. God cannot change, grow, develop, or become more or less than God already is, because there is no unrealized capacity in God.' Any potentiality would imply incompleteness."}, {"text": "Because potentiality is a feature of matter alone, and God is immaterial, so he naturally has no potentiality.", "isCorrect": false, "rationale": "While God is not material, the reason Aquinas gives for $actus purus is not simply immateriality. Aquinas's argument connects to the Unmoved Mover: anything that moves or changes requires a cause, and the First Being must itself be unmoved — pure act."}, {"text": "Because Aristotle had already established that God is pure actuality, and Aquinas simply follows him on this point.", "isCorrect": false, "rationale": "The text presents this as Aquinas building on and extending Aristotle. Aristotle's Unmoved Mover is pure actuality, but it is Aquinas who explicitly develops the theological implications of $actus purus for Christian theology."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
