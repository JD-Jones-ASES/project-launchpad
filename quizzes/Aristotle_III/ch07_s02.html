<script>
var QUESTIONS = [{"question": "According to the text, what is the primary measure of a philosopher's greatness, particularly exemplified by Aristotle?", "options": [{"text": "The sheer volume of original works they produced during their lifetime.", "isCorrect": false, "rationale": "While Aristotle produced many works, the text explicitly states his greatness is measured 'not only by what he himself achieved but by what others have built on his foundations,' emphasizing influence over quantity of original output."}, {"text": "The extent to which later thinkers built upon and developed their foundational ideas.", "isCorrect": true, "rationale": "The text states, 'A philosopher's greatness is measured not only by what he himself achieved but by what others have built on his foundations.' This option directly reflects that criterion for greatness."}, {"text": "Their ability to synthesize diverse philosophical traditions into a single coherent system.", "isCorrect": false, "rationale": "While Aristotle did create a comprehensive system, the text emphasizes his enduring influence on others as the primary measure of his greatness, rather than the act of synthesis itself, which was more characteristic of figures like Al-Fārābī and Aquinas."}, {"text": "Their successful challenge to established religious doctrines of their time.", "isCorrect": false, "rationale": "The text notes tensions between Aristotle and Christian theology, but it does not present challenging religious doctrines as the measure of a philosopher's greatness; rather, it's about the lasting impact on intellectual history."}]}, {"question": "When the Western Roman Empire collapsed, which of Aristotle's major philosophical works were largely lost to Latin-speaking Europe for centuries?", "options": [{"text": "The Categories and On Interpretation.", "isCorrect": false, "rationale": "The text states that 'Aristotle's logical works survived—the Categories, the On Interpretation, and parts of the Prior Analytics,' indicating these were not among the lost works."}, {"text": "The Metaphysics, the Physics, and the Nicomachean Ethics.", "isCorrect": true, "rationale": "The text explicitly lists these works, along with The Politics, as those that 'for centuries, the Latin West did not know,' having been lost after the collapse of the Western Roman Empire."}, {"text": "The Prior Analytics and Posterior Analytics.", "isCorrect": false, "rationale": "The text mentions 'parts of the Prior Analytics' survived, and while the Posterior Analytics isn't explicitly mentioned as surviving, the listed lost works are clearly distinguished from the logical works that did survive."}, {"text": "His writings on rhetoric and poetics.", "isCorrect": false, "rationale": "The text does not specify the loss of works on rhetoric or poetics in the initial period of Western Roman Empire collapse; it clearly names the major philosophical and scientific treatises as those lost."}]}, {"question": "Which figure in the Arabic-speaking world was most instrumental in the direct transmission of Aristotle's detailed commentaries to the Latin West, earning the title 'the Commentator'?", "options": [{"text": "Al-Fārābī (Alpharabius)", "isCorrect": false, "rationale": "Al-Fārābī synthesized Aristotle and Plato and deeply influenced later thinkers, but he is not identified as 'the Commentator' nor as the primary figure for direct transmission of detailed commentaries in the way Averroes was."}, {"text": "Ibn Sīnā (Avicenna)", "isCorrect": false, "rationale": "Avicenna built a great philosophical system on Aristotelian foundations and influenced both Islamic and Christian scholasticism, but he is not referred to as 'the Commentator' and his role was not primarily focused on detailed textual commentaries for transmission to the Latin West in the same manner as Averroes."}, {"text": "Ibn Rushd (Averroes)", "isCorrect": true, "rationale": "The text states that Averroes (Ibn Rushd) 'earned him the title “the Commentator” in the Latin medieval tradition' due to his 'extraordinarily detailed commentaries on virtually all of Aristotle's works,' making him the most important figure for transmission."}, {"text": "Thomas Aquinas", "isCorrect": false, "rationale": "Thomas Aquinas was a Christian philosopher who synthesized Aristotle with Christian theology in the Latin West, receiving Aristotle's works, not transmitting them from the Arabic world."}]}, {"question": "Upon the reintroduction of Aristotle's complete philosophical system to the Latin West in the twelfth century, what was its 'seismic' effect on European intellectual life?", "options": [{"text": "It led to a complete rejection of pagan philosophy in favor of purely theological studies.", "isCorrect": false, "rationale": "The text states the opposite: Aristotle was embraced and integrated, forming the 'framework' of the medieval university, rather than being rejected."}, {"text": "It caused widespread abandonment of Christian doctrine due to contradictions with reason-based philosophy.", "isCorrect": false, "rationale": "While there was 'friction' and 'crisis' due to tensions with Christian doctrine, this was ultimately resolved by Aquinas, not by an abandonment of faith. The impact was integration, not rejection."}, {"text": "It established a comprehensive, reason-based framework that structured medieval universities and intellectual disciplines.", "isCorrect": true, "rationale": "The text explains that 'the medieval university took Aristotle as its framework,' with his logic structuring teaching, physics becoming the standard account of the natural world, and metaphysics forming the basis of philosophical theology, leading him to be simply 'the Philosopher'."}, {"text": "It initiated a new focus on empirical observation, completely replacing traditional scholastic methods.", "isCorrect": false, "rationale": "While Aristotle emphasized observation, his reintroduction integrated with and shaped scholastic methods, rather than completely replacing them. The medieval university adopted his framework for teaching and disputation."}]}, {"question": "Aristotle's reintroduction into the Latin West created several tensions with Christian theology. Which of the following best represents one such tension mentioned in the text?", "options": [{"text": "His emphasis on democratic governance directly conflicted with the monarchical structures of medieval Europe.", "isCorrect": false, "rationale": "The text does not mention political conflict as a primary tension with Christian theology. The tensions discussed are specifically theological and metaphysical."}, {"text": "His argument for the eternity of the universe contradicted the Christian doctrine of creation 'ex nihilo' (from nothing), as found in Genesis.", "isCorrect": true, "rationale": "The text explicitly states, 'Aristotle's insistence on the eternity of the universe contradicted Genesis,' highlighting a direct theological conflict regarding the origin of the world."}, {"text": "His belief in a multitude of gods challenged Christian monotheism.", "isCorrect": false, "rationale": "Aristotle's 'noesis noeseos' (a God who thinks only himself) was a point of tension regarding God's nature and relationship to humanity, but it was not a belief in multiple gods that conflicted with Christian monotheism."}, {"text": "His rejection of all forms of revelation clashed with the authority of the Bible.", "isCorrect": false, "rationale": "Aristotle's philosophy was 'without any recourse to Scripture or revelation,' which made it a unique system based on reason, but the tension arose from specific philosophical claims (like eternity of the universe), not a general rejection of revelation itself as a point of conflict."}]}, {"question": "Thomas Aquinas resolved the philosophical and theological tensions arising from Aristotle's reintroduction by proposing the principle 'gratia non tollit naturam sed perficit.' What is the core meaning of this principle in the context of Aquinas's synthesis?", "options": [{"text": "Divine grace completely replaces natural reason as the sole path to truth.", "isCorrect": false, "rationale": "This contradicts Aquinas's principle, which suggests a harmonious, perfecting relationship, not one of replacement. Grace enhances nature, it doesn't destroy it."}, {"text": "Faith and reason are fundamentally distinct and separate domains of knowledge, with no interaction.", "isCorrect": false, "rationale": "Aquinas's synthesis aimed to show how faith and reason could complement each other, not remain separate. His principle implies an interaction where grace elevates nature."}, {"text": "Divine grace elevates and completes natural human reason and understanding, rather than destroying or contradicting it.", "isCorrect": true, "rationale": "The text defines this principle as meaning 'faith and reason, theology and philosophy, the natural and the supernatural, are not in conflict but in a hierarchical relationship in which the higher order completes what the lower order begins.' Grace 'perfects' nature, meaning it completes and elevates it."}, {"text": "Human nature is inherently flawed and cannot achieve any truth without direct divine intervention.", "isCorrect": false, "rationale": "While acknowledging human limitations, Aquinas's principle emphasizes that nature (including reason) is good and can be perfected by grace, implying it has intrinsic value and capacity for truth, rather than being inherently flawed and useless without intervention."}]}, {"question": "Dante Alighieri's placement of Aristotle in Limbo within *The Divine Comedy* and his description of him as 'il maestro di color che sanno' ('the master of those who know') signifies what about Aristotle's standing in medieval thought?", "options": [{"text": "A critique of Aristotle's paganism and his ultimate failure to grasp divine truth.", "isCorrect": false, "rationale": "While Limbo is not Heaven, it's described as a place 'not of suffering but of longing,' and Aristotle holds 'the highest place' among virtuous pagans. Dante's phrase is the 'highest honor' for a non-Christian, not a critique of failure."}, {"text": "A recognition of his unparalleled intellectual authority based purely on natural reason, despite his lack of Christian revelation.", "isCorrect": true, "rationale": "The text explains that this 'is the highest honor Dante could bestow on any non-Christian: the acknowledgment that within the limits of natural reason alone, Aristotle had seen everything that could be seen.'"}, {"text": "A humorous nod to the academic obsession with Aristotle in medieval universities.", "isCorrect": false, "rationale": "While Aristotle was central to universities, Dante's tribute is presented as a profound honor and a serious acknowledgment of intellectual achievement, not a humorous one."}, {"text": "An argument for the necessity of combining Aristotelian philosophy with Christian theology for salvation.", "isCorrect": false, "rationale": "Dante placed Aristotle in Limbo precisely because he lived 'before Christ and so could not enter Heaven,' indicating that natural reason alone, however great, was not sufficient for salvation in the Christian scheme, rather than arguing for a combination to achieve salvation."}]}, {"question": "In Raphael's *School of Athens*, Plato points upward while Aristotle gestures downward and outward. What fundamental philosophical contrast does this visual representation aim to capture?", "options": [{"text": "Plato's focus on divine intervention versus Aristotle's emphasis on human free will.", "isCorrect": false, "rationale": "The text describes the gestures as symbolizing the difference between 'a philosophy that sees ultimate reality above and beyond the world' (Plato's Forms) and 'a philosophy that insists on finding ultimate reality in the world' (Aristotle's empiricism), not primarily about divine intervention vs. free will."}, {"text": "Plato's belief in transcendent Forms as ultimate reality versus Aristotle's focus on empirical observation of the visible world.", "isCorrect": true, "rationale": "The text explicitly states: 'Plato points upward with one finger, toward the transcendent realm of the Forms; Aristotle extends his hand outward and downward... toward the visible world of things,' capturing 'the contrast between a philosophy that sees ultimate reality above and beyond the world and a philosophy that insists on finding ultimate reality in the world.'"}, {"text": "Plato's advocacy for theoretical knowledge versus Aristotle's preference for practical ethics.", "isCorrect": false, "rationale": "While both philosophers had different emphases, the artwork's specific gestures are described as representing their metaphysical views on the nature and location of ultimate reality, not primarily their preference for theoretical vs. practical knowledge."}, {"text": "Plato's rejection of the senses versus Aristotle's endorsement of skepticism.", "isCorrect": false, "rationale": "Neither Plato's rejection of senses nor Aristotle's endorsement of skepticism is the primary contrast depicted by the gestures. Aristotle's gesture signifies engagement with the visible world through observation, not skepticism."}]}, {"question": "How did the mechanical philosophy of the seventeenth century specifically attempt to replace or transcend Aristotle's influence in natural science?", "options": [{"text": "By emphasizing the role of final causes in explaining natural phenomena, contrary to Aristotle.", "isCorrect": false, "rationale": "The text states the opposite: 'The mechanical philosophy of the seventeenth century eliminated final causes from natural science.' Aristotle, by contrast, heavily relied on final causes in his explanations."}, {"text": "By shifting the primary object of inquiry from the structure of the known world to the structure of the knowing mind.", "isCorrect": false, "rationale": "This describes the 'epistemological turn' associated with Descartes, Locke, Hume, and Kant, which was a broader challenge to Aristotle, but not the specific way mechanical philosophy challenged his *natural science* according to the text."}, {"text": "By rejecting the concept of substance in favor of mere observable properties.", "isCorrect": false, "rationale": "This was a challenge from the empiricist tradition, as mentioned in the text, but not the specific way mechanical philosophy challenged Aristotle's *natural science*."}, {"text": "By eliminating final causes from the explanation of natural phenomena.", "isCorrect": true, "rationale": "The text directly states: 'The mechanical philosophy of the seventeenth century eliminated final causes from natural science.' This was a direct challenge to Aristotle's teleological explanations of nature."}]}, {"question": "G. E. M. Anscombe's essay 'Modern Moral Philosophy' (1958) is cited as a key moment in the modern Aristotelian revival. What did Anscombe argue was missing from dominant 20th-century ethical frameworks (Kantian and utilitarian) without an Aristotelian concept?", "options": [{"text": "A theological foundation for moral laws and duties.", "isCorrect": false, "rationale": "Anscombe argued that modern ethics *used* normative vocabulary derived from a theological framework but *rejected* that framework. She sought an Aristotelian concept (telos) to give sense to 'ought' and 'virtue' *without* necessarily reintroducing a theological foundation, but rather a natural one."}, {"text": "An empirical method for observing and quantifying moral behavior.", "isCorrect": false, "rationale": "Anscombe was concerned with the coherence of normative concepts, not primarily with the empirical observation or quantification of behavior, which aligns more with certain aspects of utilitarianism she critiqued."}, {"text": "The concept of a human *telos* (natural end or purpose) to give meaning to normative concepts like 'ought' and 'virtue'.", "isCorrect": true, "rationale": "The text states Anscombe 'argued that the Kantian and utilitarian frameworks that dominated twentieth-century ethics were incoherent without the Aristotelian concept of a human telos—a natural end or purpose that gives normative concepts like “ought” and “virtue” their sense.'"}, {"text": "A clear distinction between moral actions and non-moral actions.", "isCorrect": false, "rationale": "While clarity is always sought in philosophy, Anscombe's specific argument, as described, was about the *meaning* and *coherence* of normative moral terms, which she linked to the human telos, rather than simply distinguishing moral from non-moral actions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
