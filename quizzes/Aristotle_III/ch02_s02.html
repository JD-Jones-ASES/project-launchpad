        <a href="../../courses/Aristotle_III.html">&larr; Back to The Life of Being (Aristotle III)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What were the two central claims made by Aristotle in the opening chapters of the Metaphysics that stood at the center of Western intellectual life for nearly two thousand years?", "options": [{"text": "That experience is the sole source of knowledge and that mathematics is the purest form of wisdom.", "isCorrect": false, "rationale": "While Aristotle valued experience, his core claims in the Metaphysics, as stated in the text, were about wisdom as knowledge of first causes and the completeness of the four causes for explanation, not primarily about mathematics or experience as the *sole* source of knowledge."}, {"text": "That wisdom is the knowledge of first causes, and that the four causes provide a complete framework for explaining everything in the universe.", "isCorrect": true, "rationale": "The text explicitly states: 'Aristotle's opening chapters of the Metaphysics make two large claims: that wisdom is the knowledge of first causes, and that the four causes provide the complete framework for explaining everything in the universe.'"}, {"text": "That human beings are inherently rational and that the natural world is an illusion.", "isCorrect": false, "rationale": "Aristotle did express confidence in human cognitive capacities and the senses, not that the natural world is an illusion; this idea is more contrary to his philosophy, which starts with the sensory world."}, {"text": "That all knowledge is derived from divine revelation and that skepticism is the highest intellectual virtue.", "isCorrect": false, "rationale": "This statement contradicts Aristotle's confidence in natural reason and sensory experience as sources of knowledge; skepticism and divine revelation are more closely associated with Descartes and Aquinas, respectively, in their starting points for certainty."}], "id": "q01"}, {"question": "Descartes, despite having mastered Aristotelian philosophy, was thoroughly dissatisfied with it primarily because:", "options": [{"text": "He believed Aristotle's claims were demonstrably false.", "isCorrect": false, "rationale": "The text states, 'The problem was not that Aristotle said false things—some of what he said was probably true.' Descartes' dissatisfaction was not about falsity but lack of certainty."}, {"text": "Aristotle's method failed to provide genuinely certain knowledge that could not possibly be doubted.", "isCorrect": true, "rationale": "The text explains Descartes' dissatisfaction: 'The problem was that Aristotle could not certify what was true... without arriving at any claims that could be called genuinely certain. If knowledge is to deserve the name... it must be grounded in something that cannot possibly be doubted.'"}, {"text": "Aristotle advocated for an all-powerful evil deceiver that systematically misled humanity.", "isCorrect": false, "rationale": "The concept of an evil genius was introduced by Descartes as a hypothetical extreme form of doubt to test the certainty of beliefs, not by Aristotle."}, {"text": "He preferred to start with divine revelation rather than common experience as the basis of knowledge.", "isCorrect": false, "rationale": "Descartes' starting point was radical doubt, leading to the certainty of the thinking self, not divine revelation. Divine revelation is a key component of Aquinas's higher wisdom."}], "id": "q02"}, {"question": "Descartes' 'method of doubt' is best characterized as:", "options": [{"text": "A permanent state of skepticism, aiming to prove that nothing can be known with certainty.", "isCorrect": false, "rationale": "The definition of the method of doubt explicitly states, 'The goal is not permanent skepticism but a secure starting point for knowledge.'"}, {"text": "A procedure of ascending from common experience to find universal truths, similar to Aristotle's approach.", "isCorrect": false, "rationale": "This describes Aristotle's method. Descartes' method is presented as the opposite: 'Descartes finds his first principle by descending into doubt until he hits bedrock.'"}, {"text": "A systematic rejection of all beliefs that can possibly be doubted, in order to find a foundation of certainty that survives even the most radical skepticism.", "isCorrect": true, "rationale": "The definition provided in the text for 'method of doubt' precisely describes this: 'Descartes' procedure of systematically rejecting all beliefs that can possibly be doubted, in order to find a foundation of certainty that survives even the most radical skepticism.'"}, {"text": "An exercise designed to confirm the reliability of sensory experience and memory by testing them against reason.", "isCorrect": false, "rationale": "Descartes' method involved doubting the reliability of senses and memory, not confirming them, as he imagined they might 'systematically deceive him' or that he 'might be dreaming.'"}], "id": "q03"}, {"question": "If Descartes' hypothetical 'evil genius' were indeed controlling all his perceptions and thoughts, which of the following beliefs would still be undeniably true for Descartes, according to the text?", "options": [{"text": "That the physical world outside of him genuinely exists.", "isCorrect": false, "rationale": "The evil genius hypothesis is designed to make the existence of the physical world, among other things, dubitable ('beliefs fall away like dominoes: the existence of the physical world')."}, {"text": "That mathematical truths, like 2+3=5, are absolutely certain.", "isCorrect": false, "rationale": "The text explicitly states that under the pressure of the evil genius, 'the certainty of mathematics—all of them become dubitable.'"}, {"text": "That he, as a thinking being, must exist to be deceived.", "isCorrect": true, "rationale": "The text from Meditation II states, 'But there is some deceiver or other... who ever employs his ingenuity in deceiving me. Then without doubt I exist also if he deceives me, and let him deceive me as much as he will, he can never cause me to be nothing so long as I think that I am something.' This is the essence of the cogito."}, {"text": "That his memory of past events is perfectly reliable.", "isCorrect": false, "rationale": "The evil genius hypothesis casts doubt on the reliability of memory, stating, 'I persuade myself that nothing has ever existed of all that my fallacious memory represents to me.'"}], "id": "q04"}, {"question": "Descartes' first indubitable truth, 'cogito, ergo sum,' means:", "options": [{"text": "I experience, therefore I know.", "isCorrect": false, "rationale": "Descartes doubted the reliability of sensory experience, so this could not be his first certainty."}, {"text": "I perceive, therefore I am.", "isCorrect": false, "rationale": "Perception is closely linked to sensory input, which Descartes subjected to doubt."}, {"text": "I think, therefore I am.", "isCorrect": true, "rationale": "The text explicitly defines 'cogito, ergo sum' as 'I think, therefore I am.' This is the bedrock certainty Descartes finds in Meditation II."}, {"text": "I doubt, therefore I am certain.", "isCorrect": false, "rationale": "While doubt is the method that leads to this certainty, the 'cogito' itself is the statement of the certainty, linking thinking directly to existence, not doubt to certainty."}], "id": "q05"}, {"question": "The fundamental difference in the direction of knowledge acquisition between Aristotle and Descartes, as described in the text, is:", "options": [{"text": "Aristotle moves from the self outward, while Descartes moves from the world inward.", "isCorrect": false, "rationale": "This statement reverses the actual positions. Aristotle starts from the world, Descartes from the self."}, {"text": "Aristotle begins with divine revelation, while Descartes begins with sensory data.", "isCorrect": false, "rationale": "Aristotle began with common experience and senses, and divine revelation is associated with Aquinas, not Aristotle or Descartes' starting points."}, {"text": "Aristotle ascends from sensation through experience to wisdom, while Descartes descends from doubt to a foundational certainty of the thinking self.", "isCorrect": true, "rationale": "The text clearly contrasts them: 'For Aristotle, knowledge ascends from the world inward—from sensation through experience to wisdom... For Descartes, knowledge descends from the self outward—starting from the certainty of the thinking self.'"}, {"text": "Aristotle emphasizes empirical observation, while Descartes emphasizes the four causes.", "isCorrect": false, "rationale": "While Aristotle used empirical observation, Descartes' philosophy led to the *rejection* of the four causes, replacing them with different concepts of causation."}], "id": "q06"}, {"question": "A significant consequence of Descartes' philosophical shift, particularly his starting point of the mind, was:", "options": [{"text": "The reinforcement of Aristotle's four causes as universally applicable principles.", "isCorrect": false, "rationale": "The text states the opposite: 'the four causes look like an unjustified assumption. Descartes eventually replaces them... The formal and final causes vanish.'"}, {"text": "The emergence of a strong consensus on the nature of 'virtue' in modern moral philosophy.", "isCorrect": false, "rationale": "The text argues that the loss of final causation due to Descartes' shift led to a *crisis* in modern moral philosophy, making 'virtue' an 'incoherent concept.'"}, {"text": "The replacement of Aristotle's formal and final causes with mind and matter as substances, and efficient causation as the primary form of causality.", "isCorrect": true, "rationale": "The text explicitly states: 'Descartes eventually replaces them with two substances (mind and matter) and one kind of causation (efficient, mechanical). The formal and final causes vanish.'"}, {"text": "A renewed confidence in the absolute reliability of sensory experience for scientific inquiry.", "isCorrect": false, "rationale": "Descartes' method of doubt initially casts severe doubt on sensory experience, seeking certainty beyond it, rather than reaffirming its absolute reliability."}], "id": "q07"}, {"question": "Thomas Aquinas, while sharing Aristotle's confidence in natural knowledge, argued that natural philosophy alone:", "options": [{"text": "Was sufficient for achieving the highest possible human wisdom.", "isCorrect": false, "rationale": "Aquinas's answer, in the opening question of the Summa Theologica, is 'no' to whether natural reason alone is the highest wisdom. He posits 'sacra doctrina' as a higher wisdom."}, {"text": "Was inherently flawed and could not lead to any true knowledge of God.", "isCorrect": false, "rationale": "The text indicates Aquinas was 'deeply Aristotelian in his confidence in reason's power' and believed natural reason *could* discover truths about God, just not all necessary ones or easily by everyone."}, {"text": "Was incomplete, requiring a 'higher wisdom' from divine revelation (sacra doctrina) for essential truths about God.", "isCorrect": true, "rationale": "The text states: 'Is the knowledge of first causes through natural reason alone the highest wisdom available to human beings? Aquinas’s answer... is no. There is a higher wisdom than natural philosophy: sacra doctrina, the divinely revealed teaching.'"}, {"text": "Should be entirely replaced by theology, as philosophy is superfluous.", "isCorrect": false, "rationale": "Aquinas considered *sacra doctrina* necessary and supplementary, not a complete replacement for philosophy, which he still valued as capable of arriving at many truths."}], "id": "q08"}, {"question": "According to Aquinas, *sacra doctrina* (sacred doctrine) is necessary not because natural reason fails, but because:", "options": [{"text": "Natural reason is fundamentally incapable of understanding any truths about God.", "isCorrect": false, "rationale": "Aquinas explicitly states 'natural reason fails' is not the reason; he had confidence in reason's power to discover truths about God, but it was insufficient for *all* necessary truths."}, {"text": "Certain truths about God, necessary for human beings, would either take too long for unaided reason to discover or would be reliably reached only by a few experts.", "isCorrect": true, "rationale": "The text directly states this: 'This is not because natural reason fails... but because certain truths about God, truths that are genuinely necessary for human beings to know, would either take too long for unaided reason to discover, or would be reliably reached only by a few experts after a long career of study.'"}, {"text": "Divine revelation directly contradicts philosophical findings about God, making philosophy unreliable.", "isCorrect": false, "rationale": "Aquinas sought to integrate reason and revelation, seeing them as complementary paths to truth, not contradictory forces."}, {"text": "God explicitly forbade humans from seeking knowledge through natural reason, demanding revelation instead.", "isCorrect": false, "rationale": "The text provides no evidence for this claim; in fact, Aquinas's work shows great respect for natural reason."}], "id": "q09"}, {"question": "Imagine a student is attempting to establish the fundamental truth of their own existence, seeking a starting point for all knowledge that cannot possibly be doubted. Which philosopher's approach, as described in the text, would most directly lead them to the conclusion, 'I am, I exist,' as their first certainty?", "options": [{"text": "Aristotle, by observing the natural world and ascending through the four causes to universal principles.", "isCorrect": false, "rationale": "Aristotle's method starts with external observation and sensory experience, which Descartes explicitly doubted as a reliable foundation for individual existence."}, {"text": "Descartes, by systematically doubting all external and internal perceptions until an undeniable truth, even in the face of an evil deceiver, is found.", "isCorrect": true, "rationale": "Descartes' method of doubt leads precisely to this conclusion ('I am, I exist' / cogito) as the first and most certain truth, surviving even the most radical skepticism, as explained in Meditation II."}, {"text": "Aquinas, by consulting sacred doctrine and divine revelation as the highest wisdom to learn truths about God and humanity.", "isCorrect": false, "rationale": "Aquinas's focus on *sacra doctrina* is about truths necessary for salvation and supplementing natural reason, not about establishing the certainty of one's own existence through a process of individual doubt."}, {"text": "None of the above; all three philosophers would consider such an inquiry frivolous, as existence is self-evident.", "isCorrect": false, "rationale": "Descartes' entire project in the Meditations is centered on this very inquiry into fundamental certainty, demonstrating its profound importance to him."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
