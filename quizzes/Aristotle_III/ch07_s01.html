<script>
var QUESTIONS = [{"question": "According to the text, what is the primary characteristic of *eudaimonia*, the flourishing life, as described in Aristotle's *Nicomachean Ethics*?", "options": [{"text": "It is a subjective feeling of contentment and pleasure pursued throughout life.", "isCorrect": false, "rationale": "The text explicitly states that *eudaimonia* 'is not a feeling to be pursued' but an activity. This option contradicts that definition."}, {"text": "It is an activity to be performed and sustained over a complete human life, lived in accordance with our deepest nature.", "isCorrect": true, "rationale": "The text defines *eudaimonia* as 'not a feeling to be pursued but an activity to be performed and sustained over a complete human life' and 'the life lived in accordance with our deepest nature'."}, {"text": "It is a list of accomplishments and external goods accumulated through virtuous actions.", "isCorrect": false, "rationale": "While virtues and accomplishments contribute to a good life, the text states Aristotle's answer 'was not a list of pleasures or accomplishments' but a vision of a certain kind of human being and an activity."}, {"text": "It is the intellectual contemplation (*theoria*) achieved only by those who abandon worldly affairs.", "isCorrect": false, "rationale": "*Theoria* is described as the *summit* of the good life, but *eudaimonia* itself encompasses a broader 'flourishing life' that includes virtues, friendships, and is an activity sustained over a complete life, not solely the abandonment of worldly affairs."}], "id": "q01"}, {"question": "How does Aristotle's *Politics*, as presented in the text, relate to and complete the vision of the good life put forth in the *Nicomachean Ethics*?", "options": [{"text": "The *Politics* establishes the logical foundations for the ethical principles discussed in the *Ethics*.", "isCorrect": false, "rationale": "The text identifies the *Metaphysics* as the logical foundation for the *Ethics*, not the *Politics*. The *Politics* focuses on the communal conditions for the good life."}, {"text": "The *Politics* explains that the virtuous life described in the *Ethics* cannot be achieved in isolation, requiring a well-ordered community.", "isCorrect": true, "rationale": "The text states, 'The Politics then showed that such a life cannot be lived in isolation... the purpose of the city is to provide the conditions in which citizens can live virtuously and well. All of it serves the same end as the Ethics—the good life for human beings together.'"}, {"text": "The *Politics* describes various constitutional structures without directly linking them to individual virtue.", "isCorrect": false, "rationale": "The text explicitly states that the *Politics*' analysis of constitutions and education 'serves the same end as the Ethics—the good life for human beings together,' directly linking them to individual virtue."}, {"text": "The *Politics* critiques the individualistic focus of the *Ethics*, advocating for collective happiness over personal virtue.", "isCorrect": false, "rationale": "The *Politics* extends the *Ethics*' focus on virtue to the community, showing how the community *enables* individual virtuous living, rather than critiquing it or advocating for collective happiness *over* personal virtue."}], "id": "q02"}, {"question": "Which of the following accurately lists Aristotle's three modes of persuasion as discussed in the *Rhetoric*?", "options": [{"text": "Reason, emotion, and evidence", "isCorrect": false, "rationale": "While related, 'evidence' is not one of the three direct modes. The modes are speaker's character, audience's emotions, and force of reason."}, {"text": "Ethos (speaker's character), Pathos (audience's emotions), Logos (force of reason)", "isCorrect": true, "rationale": "The text explicitly states: 'The Rhetoric completed the picture by asking how words persuade: through the speaker's character (ethos), the audience's emotions (pathos), and the force of reason (logos).'"}, {"text": "Argument, logic, and conviction", "isCorrect": false, "rationale": "These terms are related to rhetoric but are not Aristotle's specific three modes of persuasion as defined in the text."}, {"text": "Truth, beauty, and goodness", "isCorrect": false, "rationale": "These are philosophical ideals but not Aristotle's specified modes of persuasion in the *Rhetoric*."}], "id": "q03"}, {"question": "The text argues that the *Metaphysics* is the 'foundation of the series.' If a philosopher were to fundamentally challenge Aristotle's metaphysical claim about 'substance (ousia) as the primary kind of being,' how might this challenge most directly impact the core arguments of the *Nicomachean Ethics*?", "options": [{"text": "It would undermine the *Ethics*' discussion of plot and character in tragedy.", "isCorrect": false, "rationale": "The discussion of plot and character in tragedy belongs to the *Poetics*, not the *Ethics*. A challenge to substance would affect the *Ethics* through its view of human nature, not art."}, {"text": "It would challenge the very notion of a stable human nature upon which virtues and the good life are founded.", "isCorrect": true, "rationale": "The text states: 'The Ethics presupposes a definite account of human nature—which is a metaphysical claim.' If the *Metaphysics*' claim about substance (what 'is' primarily) is challenged, the stability and definition of 'human nature' itself could be undermined, thereby affecting the foundation for the *Ethics*' arguments about virtue and the good life."}, {"text": "It would render the political structures proposed in the *Politics* irrelevant.", "isCorrect": false, "rationale": "While the *Politics* also relies on metaphysical claims (e.g., real human goods), challenging 'substance' would more directly impact the *Ethics'* premise of a defined human nature before affecting political structures."}, {"text": "It would invalidate the modes of persuasion outlined in the *Rhetoric*.", "isCorrect": false, "rationale": "The *Rhetoric* presupposes that rational argument can grasp truth, but a challenge to 'substance' wouldn't directly invalidate the mechanics of *ethos*, *pathos*, and *logos* themselves, although it could affect the *truth* they aim to convey."}], "id": "q04"}, {"question": "What does Aristotle's *Metaphysics* primarily investigate, using his own terminology of 'first philosophy'?", "options": [{"text": "The principles of effective communication and persuasion.", "isCorrect": false, "rationale": "This describes the subject of the *Rhetoric*, not the *Metaphysics*."}, {"text": "The nature of the good life for human beings and the virtues required to achieve it.", "isCorrect": false, "rationale": "This describes the subject of the *Nicomachean Ethics*, not the *Metaphysics*."}, {"text": "The first causes and principles of everything that exists, asking 'what is being as being.'", "isCorrect": true, "rationale": "The text states that the *Metaphysics* 'asks what is ultimately real. What are the first causes and principles of everything that exists? What is being as being (on he on)?'"}, {"text": "The proper organization of the state to foster virtuous citizens.", "isCorrect": false, "rationale": "This describes the subject of the *Politics*, not the *Metaphysics*."}], "id": "q05"}, {"question": "The text highlights that while modern science largely abandons 'final causes' in physical processes, biology 'keeps rediscovering them.' What does this suggest about the enduring relevance of Aristotle's framework of the four causes?", "options": [{"text": "It proves that modern science is fundamentally flawed in its approach to causality.", "isCorrect": false, "rationale": "The text states 'modern science has largely abandoned final causes' but then notes biology 'keeps rediscovering them,' suggesting an ongoing debate rather than a fundamental flaw in all modern science."}, {"text": "It indicates that the concept of purpose and function remains a persistent and unresolved question in certain scientific inquiries.", "isCorrect": true, "rationale": "The text says, 'the question of whether explanations in terms of function and purpose are genuinely illuminating or merely metaphorical has never been fully resolved.' This directly supports the idea that the concept of final cause (purpose/function) remains relevant and debated, especially in biology."}, {"text": "It demonstrates that Aristotle's four causes are universally applicable and fully accepted across all scientific disciplines.", "isCorrect": false, "rationale": "The text explicitly states 'Modern science has largely abandoned final causes in its accounts of physical processes,' indicating they are not universally accepted across all disciplines."}, {"text": "It means that final causes are only relevant to biological systems and not to any other domain of inquiry.", "isCorrect": false, "rationale": "The text implies the debate is ongoing, and also says the framework 'applies not only to Aristotle's preferred domain of biology... but to almost any domain of inquiry,' suggesting broader applicability even if debated."}], "id": "q06"}, {"question": "A young musician practices diligently, aspiring to become a concert violinist. According to Aristotle's enduring insight on the 'priority of actuality over potentiality,' what enables the musician's potential to be realized?", "options": [{"text": "The musician's inherent talent, which is a latent capability independent of any external factors.", "isCorrect": false, "rationale": "While inherent talent is relevant, Aristotle's point is that potential (what the musician *can be*) is defined by *actual* existence. The text states: 'Something can be potentially an oak only because there is, somewhere and at some time, an actual oak for it to be.'"}, {"text": "The existence of actual concert violinists, providing a concrete model and a standard for what the musician can become.", "isCorrect": true, "rationale": "The text explains: 'Something can be potentially an oak only because there is, somewhere and at some time, an actual oak for it to be. The possible is defined by reference to the actual, not the other way around.' Similarly, the potential to be a concert violinist exists because actual concert violinists exist."}, {"text": "The musician's raw potential, which is more fundamental than any achieved state.", "isCorrect": false, "rationale": "This reverses Aristotle's insight. The text explicitly states, 'The possible is defined by reference to the actual, not the other way around,' meaning actuality is prior to potentiality."}, {"text": "The passive nature of reality, allowing for endless possibilities without reference to existing forms.", "isCorrect": false, "rationale": "The text says this insight means 'reality is fundamentally active rather than passive' and that being is 'not an inert substrate,' directly contradicting this option."}], "id": "q07"}, {"question": "How does the concept of the 'eternal self-thinking intellect' (the Unmoved Mover) from the *Metaphysics* connect to the highest form of human activity described in the *Nicomachean Ethics*?", "options": [{"text": "It provides a divine command for how humans should organize their political communities.", "isCorrect": false, "rationale": "The Unmoved Mover moves by being supremely worth knowing, not through divine command. Political organization is covered in the *Politics*, not directly linked to the Unmoved Mover in this context."}, {"text": "It serves as the ultimate source of emotional catharsis that humans experience through art.", "isCorrect": false, "rationale": "Emotional catharsis is related to the *Poetics*. The Unmoved Mover's connection is with intellectual contemplation."}, {"text": "It illuminates why the contemplative life (*theoria*) is considered the highest human life, as it most closely resembles the divine activity.", "isCorrect": true, "rationale": "The text explicitly states: 'And the answer [the eternal self-thinking intellect] illuminates why the contemplative life of the Ethics is the highest life: because the life of theoria most closely resembles the life of the divine.'"}, {"text": "It offers the ultimate proof for the principle of non-contradiction, essential for all rational thought.", "isCorrect": false, "rationale": "The Unmoved Mover is a first cause, but it's not described as the 'proof' for the principle of non-contradiction, which Aristotle argues cannot be proved but can be defended."}], "id": "q08"}, {"question": "Why does the text state that Aristotle's Principle of Non-Contradiction cannot be *proved* in the traditional sense, yet it can be *defended*?", "options": [{"text": "It cannot be proved because it is a claim about human convention, not objective reality, but it can be defended through social agreement.", "isCorrect": false, "rationale": "The text states the principle 'is not merely a rule of logic; it is a claim about reality,' contradicting the idea that it's just human convention."}, {"text": "It cannot be proved because any proof would necessarily have to use the principle itself, but it can be defended because meaningful assertion presupposes it.", "isCorrect": true, "rationale": "The text states: 'Aristotle's insight that this principle cannot be proved (because any proof would have to use it) but can be defended against those who deny it—because the very act of asserting something meaningful presupposes it—remains the model for how to handle foundational principles.'"}, {"text": "It is an unprovable dogma, but it can be defended by faith and intuition alone.", "isCorrect": false, "rationale": "The text describes it as a foundational principle of reason and reality, not a dogma defended by faith or intuition."}, {"text": "It is beyond human comprehension to prove, but it can be defended through empirical observation of consistent phenomena.", "isCorrect": false, "rationale": "The defense is based on the necessity of the principle for meaningful assertion itself, not primarily through empirical observation."}], "id": "q09"}, {"question": "Which statement best summarizes the unifying theme that connects all five of Aristotle's works discussed across the three volumes?", "options": [{"text": "A comprehensive guide to practical wisdom and effective governance for city-states.", "isCorrect": false, "rationale": "While the *Ethics* and *Politics* cover this, it doesn't encompass the *Poetics*, *Rhetoric*, or *Metaphysics*, which deal with art, persuasion, and fundamental reality."}, {"text": "An exploration of human experience and the world, ultimately grounded in an inquiry into the nature of reality and the divine.", "isCorrect": true, "rationale": "The text states: 'All five of Aristotle's works in this series are parts of one great inquiry into human nature, the world, and the divine.' It further emphasizes the *Metaphysics* as the foundation that ties everything together by asking 'what IS' and answering 'what is the highest reality?'"}, {"text": "A systematic treatise on the formal logic required for scientific and philosophical inquiry.", "isCorrect": false, "rationale": "While logic is crucial to Aristotle, the text focuses on a broader 'inquiry into human nature, the world, and the divine,' which goes beyond just formal logic. The *Metaphysics* is described as 'metaphysical through and through,' not just formal logic."}, {"text": "A chronological development of Western thought from ethics to metaphysics.", "isCorrect": false, "rationale": "The text presents the volumes as an 'arc' of inquiry, not merely a chronological development of Western thought in general. It's about Aristotle's unified inquiry, with *Metaphysics* as the foundation, not just the last step in a timeline."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
