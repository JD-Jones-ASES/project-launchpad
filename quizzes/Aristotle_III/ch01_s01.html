        <div class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 1, Section 1</div>

        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Aristotle in the Nicomachean Ethics, what is eudaimonia, the highest human good?", "options": [{"text": "A fleeting feeling of intense pleasure or happiness.", "isCorrect": false, "rationale": "Aristotle explicitly states that eudaimonia is 'not a feeling of pleasure' but a kind of life."}, {"text": "The active, excellent exercise of rational activity over a complete life.", "isCorrect": true, "rationale": "The text defines eudaimonia as 'the active, excellent exercise of what is most distinctively human in us,' which is reason, leading to 'the excellent exercise of rational activity over a complete life—a life of virtue.'"}, {"text": "The accumulation of wealth and material possessions.", "isCorrect": false, "rationale": "While material well-being might contribute to a good life, Aristotle does not identify it as the highest good or eudaimonia itself."}, {"text": "The pursuit of personal desires without constraint.", "isCorrect": false, "rationale": "Aristotle's ethics emphasize virtue and reason, which inherently involve self-control and aiming for genuine good, not unconstrained desires."}], "id": "q01"}, {"question": "How does Aristotle explain the development of moral virtues (arete)?", "options": [{"text": "They are innate qualities, a gift of birth that some individuals possess naturally.", "isCorrect": false, "rationale": "The text states, 'Character is not a gift of birth but a trained capacity.'"}, {"text": "They are primarily developed through formal instruction and learning, similar to intellectual virtues.", "isCorrect": false, "rationale": "Intellectual virtues develop through instruction, but moral virtues develop through habit."}, {"text": "They are acquired through repeated practice and habituation of virtuous actions.", "isCorrect": true, "rationale": "The text clarifies that 'moral virtues...develop through habit. We become courageous by doing courageous things; we become just by making just choices, again and again, until the right response becomes second nature.'"}, {"text": "They are spontaneously manifested when individuals are faced with significant ethical dilemmas.", "isCorrect": false, "rationale": "Moral virtues are cultivated capacities, not spontaneous reactions."}], "id": "q02"}, {"question": "A military leader must decide whether to engage in a risky battle. According to Aristotle's doctrine of the mean and the role of phronesis, how should this leader make their decision?", "options": [{"text": "By always choosing the safest option to avoid unnecessary loss of life, prioritizing caution above all.", "isCorrect": false, "rationale": "This would represent a deficiency (cowardice) rather than the virtuous mean, which requires the 'right amount' of daring."}, {"text": "By engaging in battle immediately to demonstrate bravery and resolve, regardless of the odds.", "isCorrect": false, "rationale": "This would represent an excess (rashness) rather than the virtuous mean."}, {"text": "By consulting an arithmetic average of past battle risks and rewards to find a statistically optimal choice.", "isCorrect": false, "rationale": "The text explicitly states, 'the mean is not an arithmetic average fixed for everyone; it is the right amount for this person in this situation.'"}, {"text": "By discerning the appropriate amount of daring for the specific situation, guided by practical wisdom.", "isCorrect": true, "rationale": "The doctrine of the mean states that virtue is 'the right amount for this person in this situation, discerned by practical wisdom (phronesis).'"}], "id": "q03"}, {"question": "When Aristotle claims that 'man is by nature a politikon zōon—a political animal,' what is the primary implication for human society?", "options": [{"text": "Humans are inherently aggressive and competitive, leading to constant conflict that requires political structures to manage.", "isCorrect": false, "rationale": "While conflict can exist, Aristotle's primary point is about human nature's inclination towards communal life, not just managing aggression."}, {"text": "Humans are naturally inclined to form organized, self-governing communities as a fulfillment of their social nature.", "isCorrect": true, "rationale": "The text states, 'We are not merely social; we are fitted by nature for life in an organized, self-governing community. The polis is not an artificial convenience but the natural fulfillment of human social life.'"}, {"text": "Political structures are artificial constructs necessary to control humans' anarchic tendencies.", "isCorrect": false, "rationale": "Aristotle says the polis is 'not an artificial convenience' but a natural fulfillment."}, {"text": "The best human life is one lived in isolation, free from the constraints and obligations of political life.", "isCorrect": false, "rationale": "This directly contradicts the idea of humans being 'political animals' and the polis being a 'natural fulfillment.'"}], "id": "q04"}, {"question": "According to Aristotle's Politics, what distinguishes a 'correct' form of government (monarchy, aristocracy, polity) from a 'deviant' one (tyranny, oligarchy, democracy)?", "options": [{"text": "The number of rulers in power, with fewer rulers indicating a correct form.", "isCorrect": false, "rationale": "Both correct (monarchy, aristocracy) and deviant (tyranny, oligarchy) forms can involve few rulers; the distinction is not merely number."}, {"text": "Whether the government is oriented towards the common good of the community or the private interest of the rulers.", "isCorrect": true, "rationale": "The text clearly states, 'three correct...each oriented toward the common good, and three deviant...each corrupted toward the rulers' private interest.'"}, {"text": "The level of citizen participation allowed in decision-making, with greater participation being correct.", "isCorrect": false, "rationale": "Democracy allows participation but is listed as a deviant form when corrupted, so participation alone isn't the distinguishing factor."}, {"text": "The presence or absence of a written constitution and established laws.", "isCorrect": false, "rationale": "While important, the text does not identify this as the primary distinction between correct and deviant forms."}], "id": "q05"}, {"question": "How did Thomas Aquinas's view on the ultimate human end and happiness differ from Aristotle's eudaimonia?", "options": [{"text": "Aquinas believed eudaimonia was an entirely achievable earthly state, unlike Aristotle, who saw it as largely unattainable.", "isCorrect": false, "rationale": "Aristotle believed eudaimonia was achievable by natural human powers; Aquinas viewed it as 'imperfect happiness' compared to the divine."}, {"text": "Aquinas argued that perfect happiness required a supernatural vision of God, exceeding what natural human powers or an earthly city could provide.", "isCorrect": true, "rationale": "The text states, 'Aquinas argued that our ultimate end is supernatural: the direct vision of God. ...Aristotle's account of the good life describes imperfect happiness...but it points beyond itself toward a fulfillment that exceeds what any earthly city can provide.'"}, {"text": "Aquinas rejected the concept of virtue entirely, focusing solely on faith and divine grace.", "isCorrect": false, "rationale": "Aquinas famously insisted, 'Grace...does not destroy nature but perfects it,' meaning Aristotelian virtues were still valuable but insufficient alone."}, {"text": "Aquinas contended that political life and serving the state was the ultimate end, not individual flourishing or spiritual fulfillment.", "isCorrect": false, "rationale": "Aquinas elevated the ultimate end beyond the earthly polis to a supernatural vision of God."}], "id": "q06"}, {"question": "Aristotle states that poetry is 'more philosophical and higher' than history. What is the primary reason for this claim?", "options": [{"text": "Poetry presents factual accounts of past events with greater accuracy and detail.", "isCorrect": false, "rationale": "History tells us 'what happened,' while poetry focuses on 'what could happen,' indicating it's not about factual accuracy of past events."}, {"text": "Poetry uses more elaborate language and rhetorical devices, making it aesthetically superior to history.", "isCorrect": false, "rationale": "While style is a factor, the reason for being 'more philosophical' is deeper than mere aesthetics."}, {"text": "Poetry reveals universal truths about the human condition by representing human beings in action in a way that shows what *could* happen.", "isCorrect": true, "rationale": "The text explains, 'The poet does not merely record events; he represents human beings in action in a way that reveals something universal about the human condition. This is why Aristotle says poetry is 'more philosophical and higher' than history: history tells us what happened; poetry shows us what could happen.'"}, {"text": "Poetry evokes stronger emotions (like pity and fear) in the audience, making it more impactful than dry historical accounts.", "isCorrect": false, "rationale": "Emotional impact (katharsis) is an effect of tragedy, but the 'more philosophical' claim relates to revealing universal truths, not just emotion."}], "id": "q07"}, {"question": "In Aristotle's analysis of tragedy, what is the significance of 'hamartia' in relation to the tragic hero?", "options": [{"text": "It signifies the tragic hero's inherent moral wickedness that ultimately leads to their deserved downfall.", "isCorrect": false, "rationale": "The text states, 'The tragic hero is not a saint or a villain,' so it's not inherent wickedness."}, {"text": "It refers to a sudden, unexpected twist in the plot (reversal of fortune) that dramatically changes the hero's circumstances.", "isCorrect": false, "rationale": "A reversal of fortune is a separate element of plot; hamartia is an error of judgment by the hero."}, {"text": "It is an error of judgment or a mistake made by a character of high standing, which makes their fall plausible and elicits pity from the audience.", "isCorrect": true, "rationale": "The text states, 'The tragic hero is...a person of high character who falls through some error of judgment (hamartia), making the fall plausible and the audience's pity warranted.'"}, {"text": "It represents the divine intervention that dictates the hero's predetermined fate, regardless of their actions.", "isCorrect": false, "rationale": "Hamartia emphasizes the hero's agency and responsibility for their actions, not predetermined divine fate."}], "id": "q08"}, {"question": "A politician delivers a speech aiming to persuade voters. According to Aristotle's Rhetoric, which appeal is considered the most important for genuine persuasion and why?", "options": [{"text": "Pathos, because appealing to the audience's emotions is the quickest and most effective way to sway public opinion.", "isCorrect": false, "rationale": "While pathos is a means, Aristotle sees relying on it alone as manipulative, not genuine persuasion."}, {"text": "Ethos, because people are primarily persuaded by the speaker's reputation, character, and trustworthiness.", "isCorrect": false, "rationale": "Ethos is important, but like pathos, relying solely on it can be manipulative rather than genuinely persuasive."}, {"text": "Logos, because it relies on reason, argument, and evidence, serving truth rather than mere manipulation.", "isCorrect": true, "rationale": "The text states, 'Aristotle insists that logos is the most important of the three—not because emotion and character are irrelevant, but because a speaker who depends only on ethos or pathos is manipulating rather than genuinely persuading. True rhetoric, for Aristotle, serves truth.'"}, {"text": "A combination of all three in equal measure, as they are equally powerful and necessary in effective persuasion.", "isCorrect": false, "rationale": "While all three are used, Aristotle explicitly prioritizes logos as the most important for *genuine* persuasion."}], "id": "q09"}, {"question": "The section concludes by stating that Ethics, Politics, Poetics, and Rhetoric are 'four parts of a single inquiry.' What overarching question unifies these distinct areas of Aristotle's thought as presented?", "options": [{"text": "How can individuals achieve personal wealth and social status within their community?", "isCorrect": false, "rationale": "This is too narrow and does not capture the fundamental questions about human nature, good, and truth that span all four areas."}, {"text": "What is the fundamental nature of a human being, how does it live well in community, and how does it use language effectively to pursue genuine goods?", "isCorrect": true, "rationale": "The text explicitly connects these: 'what a human being fundamentally IS—a rational animal fitted for community. The good life turned out to be inseparable from a good community...And the good community turned out to depend, in part, on the good use of words—on art that reveals the truth about human nature and on rhetoric that moves citizens toward genuine goods.'"}, {"text": "How can the ideal state maintain power and control over its citizens through effective governance and propaganda?", "isCorrect": false, "rationale": "Aristotle's focus is on the good state for the sake of the good life, not merely power and control, and true rhetoric serves truth, not propaganda."}, {"text": "How can artists create works that purely entertain and allow audiences to escape from the realities of life?", "isCorrect": false, "rationale": "Poetics, for Aristotle, is about 'creative representation' that 'reveals something universal about the human condition,' not just escapism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
