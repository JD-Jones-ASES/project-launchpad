<script>
var QUESTIONS = [{"question": "The term \"metaphysics\" has an accidental origin. What was the primary reason ancient scholars labeled Aristotle's treatises \"ta meta ta physika\"?", "options": [{"text": "Aristotle himself coined it to signify the study of reality beyond the physical world.", "isCorrect": false, "rationale": "Aristotle did not use the word 'metaphysics'; he called his inquiry 'first philosophy' or 'theology'."}, {"text": "It was a librarian's organizational note, placing these treatises physically 'after the Physics' in their collection.", "isCorrect": true, "rationale": "The text explicitly states that the label 'ta meta ta physika' meant 'the things after the Physics' and was a 'purely organizational title' that became a philosophical term."}, {"text": "It was meant to distinguish his theoretical philosophy from his practical ethics and politics.", "isCorrect": false, "rationale": "While the works eventually became distinct philosophical branches, the initial label was based on physical placement relative to his natural science writings, not a philosophical distinction made by Aristotle or the original organizers."}, {"text": "It referred to the advanced and complex nature of the concepts, meaning 'beyond physics' in difficulty.", "isCorrect": false, "rationale": "While 'meta' can mean 'beyond' and the concepts are complex, the original intent of the label was 'after' in a physical, organizational sense. The 'beyond' interpretation came later."}]}, {"question": "Aristotle referred to his inquiry as 'prote philosophia' (first philosophy). Which of the following best explains his rationale for this designation?", "options": [{"text": "It was chronologically the first philosophical work he wrote, preceding all his other treatises.", "isCorrect": false, "rationale": "The text clarifies that 'first' is 'not in the sense of coming before other studies in time, but in the sense of being most fundamental'."}, {"text": "It investigates the most fundamental principles upon which all other sciences and inquiries depend.", "isCorrect": true, "rationale": "Aristotle called it 'first philosophy' because 'it investigates the most fundamental things, the principles on which all other sciences depend'."}, {"text": "It focuses on the 'first' or earliest historical philosophers and their ideas.", "isCorrect": false, "rationale": "While Book I surveys some prior philosophy, the core reason for the name 'first philosophy' is its foundational nature for *all* knowledge, not merely a historical focus."}, {"text": "It was primarily intended as an introductory text for novice philosophy students.", "isCorrect": false, "rationale": "The text notes that *The Metaphysics* was 'lecture notes for advanced students' and is 'compressed, dense, and technical'."}]}, {"question": "A student approaching *The Metaphysics* for the first time should understand its structure. What is a key characteristic that distinguishes Aristotle's *Metaphysics* from a modern, systematically organized textbook?", "options": [{"text": "It presents a single, continuous, and highly systematic argument developed over its fourteen books.", "isCorrect": false, "rationale": "The text states: 'The Metaphysics is not a single continuous argument like a modern book.' It's a collection, not a finished system."}, {"text": "It is a compilation of lecture notes and research treatises reflecting an ongoing inquiry rather than a finished, perfectly coherent system.", "isCorrect": true, "rationale": "The text explicitly describes it as 'a collection of fourteen books... apparently compiled from lecture notes and research treatises... The Metaphysics is the record of an ongoing inquiry, not a finished system.'"}, {"text": "It is an anthology of different philosophers' views on metaphysics, compiled by Aristotle.", "isCorrect": false, "rationale": "It is Aristotle's own inquiry, though Book I does survey other philosophers' views on first causes."}, {"text": "It serves primarily as a historical catalog of metaphysical theories from ancient Greece.", "isCorrect": false, "rationale": "While it touches on history, its primary purpose is Aristotle's own philosophical inquiry into fundamental questions of being and first causes."}]}, {"question": "The text highlights several recurring questions central to *The Metaphysics*. Which of the following is NOT explicitly listed as one of these core inquiries?", "options": [{"text": "What are the ethical implications of contemplation for political leadership?", "isCorrect": true, "rationale": "While contemplation connects to *The Ethics*, and political leadership to *The Politics*, this specific question is a synthesis of other works and not one of the explicit 'recurring questions' listed as central to *The Metaphysics* itself."}, {"text": "What is substance (ousia)—the primary kind of being?", "isCorrect": false, "rationale": "This is explicitly listed as a core recurring question in *The Metaphysics*."}, {"text": "What is being as such? What does it mean for something simply to BE?", "isCorrect": false, "rationale": "This is explicitly listed as a core recurring question in *The Metaphysics*."}, {"text": "Is there an eternal, unchanging, first principle of all motion and reality?", "isCorrect": false, "rationale": "This is explicitly listed as a core recurring question in *The Metaphysics*."}]}, {"question": "If a student wanted to understand Aristotle's argument for the 'Unmoved Mover'—the eternal, self-thinking intellect that is the first cause of all motion and being—which specific book of *The Metaphysics* would be most central to their study?", "options": [{"text": "Book I (Alpha): What is wisdom? A survey of the first causes through the history of philosophy.", "isCorrect": false, "rationale": "Book I provides a historical survey, but not the detailed argument for the Unmoved Mover itself."}, {"text": "Book IV (Gamma): What is being as being? The defense of the most certain of all principles.", "isCorrect": false, "rationale": "Book IV focuses on being as being and the principle of non-contradiction, not the Unmoved Mover."}, {"text": "Book VII (Zeta): What is substance? The heart of Aristotle's metaphysics.", "isCorrect": false, "rationale": "Book VII delves into the nature of substance (ousia), but not the climactic argument for the Unmoved Mover."}, {"text": "Book XII (Lambda): What is the first cause? The argument for the Unmoved Mover.", "isCorrect": true, "rationale": "The text explicitly states that Book XII (Lambda) is 'the theological climax of the whole work' and focuses on 'The argument for the Unmoved Mover'."}]}, {"question": "The text claims that *The Metaphysics* is the 'foundation' for *The Ethics*. How does *The Metaphysics* provide this foundation, particularly regarding human happiness and the soul?", "options": [{"text": "It directly prescribes the ethical rules for achieving happiness through metaphysical understanding.", "isCorrect": false, "rationale": "The Metaphysics provides foundational *concepts* for understanding the soul, but does not directly prescribe ethical rules as *The Ethics* does."}, {"text": "It defines the soul as the form of the body, providing a metaphysical understanding that underpins the ethical analysis of the soul's function and highest happiness.", "isCorrect": true, "rationale": "The text states: 'The Metaphysics provides the answer: the soul is the form of the body—the organizing principle that makes a living thing what it is. Without the metaphysical analysis of form and matter, the ethical analysis of the soul's function hangs in the air.'"}, {"text": "It identifies happiness as a purely immaterial state, independent of bodily existence.", "isCorrect": false, "rationale": "While *The Metaphysics* discusses immaterial entities like the Unmoved Mover, it defines the human soul as the form *of the body*, connecting it to material existence, which is crucial for the *Ethics*."}, {"text": "It argues that ethical virtues are a direct consequence of understanding the Unmoved Mover.", "isCorrect": false, "rationale": "While contemplation of the divine (Unmoved Mover) is the highest happiness, the *Metaphysics*'s foundational role for *The Ethics* is more broadly about the nature of the soul itself, which then allows for the ethical analysis of its functions."}]}, {"question": "In *The Poetics*, Aristotle famously describes the plot as the 'soul' of a tragedy. Drawing upon the metaphysical understanding detailed in the provided text, what does 'soul' signify in this context?", "options": [{"text": "It means the emotional impact and psychological depth that the plot evokes in the audience.", "isCorrect": false, "rationale": "This describes the *effect* of a good plot, not its metaphysical nature as the 'soul'."}, {"text": "It refers to the material elements, such as the characters, dialogue, and stage props, that constitute the play.", "isCorrect": false, "rationale": "The 'soul' (form) is distinct from the material elements. The text clarifies 'plot is the formal cause...the organizing principle'."}, {"text": "It signifies the formal cause, acting as the organizing principle that makes the tragedy what it is, similar to how the soul organizes a living body.", "isCorrect": true, "rationale": "The text explains: 'When Aristotle says that the plot is the “soul” of a tragedy, he means it in the technical metaphysical sense: the plot is the formal cause, the organizing principle that makes the tragedy what it is.'"}, {"text": "It represents the final cause, the ultimate purpose or end goal that the tragedy aims to achieve.", "isCorrect": false, "rationale": "While the plot contributes to the final cause (catharsis, etc.), 'soul' in this context is specifically equated to the 'formal cause' by the text."}]}, {"question": "The text explains that *The Metaphysics* provides the basis for *The Rhetoric* by making intelligible the correspondence between the structure of thought and the structure of being. Which specific metaphysical defense mentioned in the text underpins this correspondence, thereby validating rational discourse?", "options": [{"text": "The analysis of the relationship between potentiality and actuality in Book IX.", "isCorrect": false, "rationale": "While significant, the potentiality-actuality distinction is not explicitly cited as the specific defense for rational discourse's possibility."}, {"text": "The argument for the existence of the Unmoved Mover in Book XII.", "isCorrect": false, "rationale": "The Unmoved Mover is the theological climax, but it's not the direct metaphysical foundation for the possibility of rational discourse itself."}, {"text": "The defense of the principle of non-contradiction in Book IV.", "isCorrect": true, "rationale": "The text states: 'When Aristotle defends the principle of non-contradiction in Book IV, he is defending the condition of possibility for all rational discourse, all science, and all rhetoric.'"}, {"text": "The survey of first causes through the history of philosophy in Book I.", "isCorrect": false, "rationale": "Book I provides historical context, but it's not a direct philosophical defense of the possibility of rational thought."}]}, {"question": "Regarding the composition of *The Metaphysics*, what does the text imply about its relationship to Aristotle's intellectual development?", "options": [{"text": "Aristotle composed *The Metaphysics* as a single, unified philosophical system at the very end of his career.", "isCorrect": false, "rationale": "The text explicitly states it was 'composed across several decades of Aristotle's career' and is 'not a finished system', potentially reflecting 'different stages of his thinking'."}, {"text": "It represents his earliest philosophical thoughts, written during his youth at Plato's Academy.", "isCorrect": false, "rationale": "It was composed across the 'full span of Aristotle's mature career—from his years at the Academy through the Lyceum period' and represents the 'culmination of his philosophical work'."}, {"text": "*The Metaphysics* was compiled from writings composed over several decades, suggesting it might reflect different stages of his thinking, though ultimately coherent.", "isCorrect": true, "rationale": "The text states it was 'composed across several decades of Aristotle’s career' and that 'different books of the Metaphysics may reflect different stages of his thinking,' while also noting the core books 'cohere as a single vision of reality'."}, {"text": "It was primarily a collaborative effort with his students at the Lyceum, rather than solely his own work.", "isCorrect": false, "rationale": "It was compiled from his lecture notes and research treatises, implying it is primarily his own work, not a collaborative student project."}]}, {"question": "The text describes the style of *The Metaphysics* as often 'compressed, dense, and technical.' What reason is given for this particular style?", "options": [{"text": "Aristotle deliberately used obscure language to challenge only the most intellectually gifted students.", "isCorrect": false, "rationale": "The text attributes the difficulty to its nature as 'working texts' for 'advanced students' and the seriousness of the inquiry, not an intentional effort to obscure knowledge."}, {"text": "It reflects its origin as lecture notes for advanced students and research treatises, prioritizing serious inquiry over polished literary presentation.", "isCorrect": true, "rationale": "The text states: 'The Metaphysics was written, as Aristotle's other works were, in the form of lecture notes for advanced students... These are working texts, and they reward careful, patient reading. The difficulty is not a defect; it is a mark of how serious the inquiry is.'"}, {"text": "The inherent limitations of the Greek language made it difficult to express complex philosophical ideas more simply.", "isCorrect": false, "rationale": "The text compares the style to *The Ethics* or *The Politics*, implying it's Aristotle's specific writing style for these notes, not a general limitation of Greek."}, {"text": "The density is a result of the translation from Greek to English, which inevitably loses some clarity.", "isCorrect": false, "rationale": "The text praises the W.D. Ross translation for 'preserving the technical precision of Aristotle's Greek while remaining readable in English,' implying the density is inherent to the original."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
