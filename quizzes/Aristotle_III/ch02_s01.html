<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Being (Aristotle III) &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_III.html">&larr; Back to The Life of Being (Aristotle III)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Aristotle, why is the delight we take in our senses, particularly sight, significant evidence for his claim that all men desire to know?", "options": [{"text": "It demonstrates that humans prioritize practical utility over abstract thought.", "isCorrect": false, "rationale": "Aristotle actually argues the opposite: that we value sight even when it provides no immediate practical benefit."}, {"text": "It shows that the desire for understanding is innate and independent of any practical outcome.", "isCorrect": true, "rationale": "Aristotle uses the non-utilitarian love of seeing as evidence that the impulse toward knowledge is part of our natural constitution."}, {"text": "It proves that human cognition is entirely limited to sensory perception.", "isCorrect": false, "rationale": "Aristotle views sensation as only the first and most basic level of a much higher cognitive hierarchy."}, {"text": "It suggests that scientific observation is the only path to genuine wisdom.", "isCorrect": false, "rationale": "While observation is a starting point, wisdom involves grasping first causes, which transcends simple sensory delight."}]}, {"question": "In the hierarchy of cognition, what is the primary distinction between $\\text{empeiria}$ (experience) and $\\text{techn\\bar{e}}$ (art or craft)?", "options": [{"text": "$\\text{Empeiria}$ involves memory, while $\\text{techn\\bar{e}}$ relies solely on immediate sensation.", "isCorrect": false, "rationale": "Both levels require memory, but the distinction lies in the depth of causal understanding."}, {"text": "$\\text{Techn\\bar{e}}$ is more effective in practical application than $\\text{empeiria}$.", "isCorrect": false, "rationale": "Aristotle notes that the experienced person ($empeiria$) might actually outperform the theoretician in practice."}, {"text": "$\\text{Techn\\bar{e}}$ involves knowledge of general causes and is teachable, whereas $\\text{empeiria}$ is a familiarity with particulars.", "isCorrect": true, "rationale": "The artist knows 'why' something works and can transmit that knowledge, while the experienced person only knows 'that' it works."}, {"text": "$\\text{Empeiria}$ is restricted to humans, while $\\text{techn\\bar{e}}$ is shared by some higher animals.", "isCorrect": false, "rationale": "Aristotle claims that experience distinguishes humans from most animals, but art is a uniquely human achievement."}]}, {"question": "Aristotle describes wisdom ($\\text{sophia}$) as the 'highest form of theoretical knowledge.' What specifically does the wise person understand?", "options": [{"text": "The most efficient ways to solve complex mathematical equations.", "isCorrect": false, "rationale": "Wisdom is not defined by procedural efficiency in a specific domain like mathematics but by universal principles."}, {"text": "The first causes and principles that underlie all being.", "isCorrect": true, "rationale": "Wisdom is the 'master science' that looks at the deepest reasons for everything that exists."}, {"text": "The historical progression of human culture and laws.", "isCorrect": false, "rationale": "While important, historical or cultural facts are particulars rather than universal first principles."}, {"text": "How to maximize sensory pleasure through the study of aesthetics.", "isCorrect": false, "rationale": "Wisdom is pursued for its own sake, but it moves far beyond the level of sensory delight into theoretical causes."}]}, {"question": "How does Aristotle's concept of $\\text{aitia}$ differ from the standard modern scientific use of the word 'cause'?", "options": [{"text": "$\\text{Aitia}$ refers only to the purpose of a thing, while modern science ignores purpose.", "isCorrect": false, "rationale": "$\\text{Aitia}$ includes purpose (final cause), but it also includes matter, form, and the efficient cause."}, {"text": "$\\text{Aitia}$ is broader, representing a 'reason' or 'explanation' involving four distinct dimensions.", "isCorrect": true, "rationale": "Modern science typically focuses on efficient causation, whereas Aristotle's concept requires four types of explanation for a full account."}, {"text": "Modern science views 'cause' as subjective, while $\\text{aitia}$ is strictly physical.", "isCorrect": false, "rationale": "Aristotle's causes include non-physical aspects like form and purpose, and both systems generally aim at objective truth."}, {"text": "$\\text{Aitia}$ implies that one event must always precede another in time.", "isCorrect": false, "rationale": "This describes modern efficient causation, whereas Aristotle’s formal and material causes are often simultaneous with the object."}]}, {"question": "Which of the following correctly identifies the formal cause ($\\text{eidos}$) of a human being according to the text?", "options": [{"text": "Flesh and bone.", "isCorrect": false, "rationale": "Flesh and bone constitute the material cause ($hyle$), the 'stuff' the human is made of."}, {"text": "The parents who brought the child into existence.", "isCorrect": false, "rationale": "The parents are the efficient cause, the source of change or motion."}, {"text": "The soul, as the organizing principle of life.", "isCorrect": true, "rationale": "The formal cause is the structure or pattern that makes a thing what it is; for a living being, this is the soul."}, {"text": "$\\text{Eudaimonia}$, or flourishing through virtue.", "isCorrect": false, "rationale": "$\\text{Eudaimonia}$ is the final cause ($telos$), the ultimate end or purpose of human life."}]}, {"question": "In the context of the four causes, what does the final cause ($\\text{telos}$) represent?", "options": [{"text": "The physical process that terminates a thing's existence.", "isCorrect": false, "rationale": "Final cause refers to purpose and 'end' in the sense of a goal, not merely a chronological stopping point."}, {"text": "The blueprint or shape that an object takes.", "isCorrect": false, "rationale": "This describes the formal cause, the pattern that defines what a thing is."}, {"text": "The end or purpose for which a thing exists or is done.", "isCorrect": true, "rationale": "The $\\text{telos}$ answers the question 'What is it for?'"}, {"text": "The initial materials used to build an object.", "isCorrect": false, "rationale": "The initial materials are the material cause ($hyle$)."}]}, {"question": "How does Aristotle utilize his 'dialectical method' when engaging with predecessors like Thales or Plato?", "options": [{"text": "He dismisses their theories as primitive errors that have no place in modern science.", "isCorrect": false, "rationale": "Aristotle believes no thinker fails entirely and that past views contain genuine insights."}, {"text": "He uses them to show that truth is entirely relative to the era in which a philosopher lived.", "isCorrect": false, "rationale": "Aristotle is an objectivist seeking a synthesis of truth, not a relativist."}, {"text": "He identifies which of the four causes they were reaching toward to synthesize a more complete account.", "isCorrect": true, "rationale": "By seeing Thales as looking for the material cause and Plato for the formal, he shows how his own system completes their partial truths."}, {"text": "He proves that his predecessors were only interested in practical art rather than theoretical wisdom.", "isCorrect": false, "rationale": "Aristotle credits his predecessors with seeking first principles, even if they only identified them partially."}]}, {"question": "Aristotle uses an analogy involving bats and daylight to describe the difficulty of studying truth. What does this analogy imply?", "options": [{"text": "Truth is intentionally hidden from human inquiry by nature.", "isCorrect": false, "rationale": "Aristotle believes truth is manifest; the difficulty lies in the observer, not the object."}, {"text": "Our minds find it difficult to grasp the most evident principles because they are 'too bright' or clear for our limited intellect.", "isCorrect": true, "rationale": "Just as a bat's eyes are overwhelmed by the sun, our minds struggle with the most fundamental and clear aspects of being."}, {"text": "Philosophy should only be practiced at night when the mind is most alert.", "isCorrect": false, "rationale": "The analogy is about the capacity of the intellect relative to the clarity of first principles, not the time of day."}, {"text": "Only those with specialized 'vision' or genius can perceive the truth.", "isCorrect": false, "rationale": "While difficult, Aristotle emphasizes that everyone who has worked on these problems contributes something to the truth."}]}, {"question": "Why does Aristotle characterize the highest form of wisdom as 'useless'?", "options": [{"text": "Because it is based on faulty logic that cannot be applied to the real world.", "isCorrect": false, "rationale": "Aristotle considers wisdom the most certain and important knowledge, even if it isn't 'useful' for production."}, {"text": "Because it is pursued for its own sake as an end in itself, rather than as a tool for practical gain.", "isCorrect": true, "rationale": "Being 'useless' is actually a mark of freedom for Aristotle; it means the knowledge is not a servant to other needs."}, {"text": "Because first causes are constantly changing and therefore cannot be used to predict the future.", "isCorrect": false, "rationale": "First principles and causes are, for Aristotle, necessary and unchanging."}, {"text": "Because only the gods can possess it, making it irrelevant to human life.", "isCorrect": false, "rationale": "Though he calls it the most 'free' knowledge, he encourages humans to participate in this conversation of inquiry."}]}, {"question": "Which philosopher does Aristotle credit with reaching toward the final cause by positing Mind ($\\text{nous}$) as an ordering principle?", "options": [{"text": "Thales", "isCorrect": false, "rationale": "Thales focused on the material cause, specifically water."}, {"text": "Anaxagoras", "isCorrect": true, "rationale": "Aristotle identifies Anaxagoras's use of Mind as a precursor to understanding the purpose or ordering principle of the universe."}, {"text": "Plato", "isCorrect": false, "rationale": "Aristotle associates Plato with the formal cause, though he critiqued Plato for separating Forms from things."}, {"text": "Achilles", "isCorrect": false, "rationale": "Achilles is used as an example of a figure represented in a statue, not as a philosopher in this context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
