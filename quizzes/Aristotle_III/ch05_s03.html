<script>
var QUESTIONS = [{"question": "What fundamental philosophical problem did Aristotle's concepts of potentiality and actuality primarily aim to solve?", "options": [{"text": "The relationship between mind and body.", "isCorrect": false, "rationale": "While an important philosophical problem, the text explicitly states that potentiality and actuality 'solve the ancient problem of how change is possible,' not primarily the mind-body problem."}, {"text": "The ancient problem of how change is possible.", "isCorrect": true, "rationale": "The text clearly states that potentiality and actuality 'together solve the ancient problem of how change is possible,' distinguishing Aristotle's view from those of Parmenides and Heraclitus."}, {"text": "The existence and nature of God.", "isCorrect": false, "rationale": "The section focuses on metaphysics related to being and change, not explicitly on the existence of God."}, {"text": "The role of mathematical laws in the universe.", "isCorrect": false, "rationale": "This was a focus for Descartes, who contrasted his views with Aristotle's, but it was not Aristotle's primary aim with potentiality and actuality."}]}, {"question": "René Descartes rejected specific aspects of the Scholastic (Aristotelian) tradition he was taught. Which of the following best describes his primary objection?", "options": [{"text": "The use of Latin in philosophical texts, which he found antiquated.", "isCorrect": false, "rationale": "The text does not mention Latin as his objection; rather, it focuses on the content and terms."}, {"text": "The concept of 'cogito, ergo sum' as an indubitable truth.", "isCorrect": false, "rationale": "Descartes *proposed* 'cogito, ergo sum' as his starting point, he did not reject it as an Aristotelian concept. He developed it as an alternative to Scholastic methods."}, {"text": "Obscure terms like 'substantial form' and 'final cause,' which he found meaningless.", "isCorrect": true, "rationale": "The text explicitly states Descartes was 'dissatisfied with the Scholastic (Aristotelian) tradition he had been taught: it was full of obscure terms like “substantial form” and “final cause” that he found meaningless.'"}, {"text": "The idea that the universe is governed by mathematical laws.", "isCorrect": false, "rationale": "Descartes actually believed the universe *is* governed by mathematical laws, contrasting this with Aristotle's focus on form and purpose."}]}, {"question": "How does Aristotle's concept of potentiality (dynamis) serve as a 'middle category' that resolves the extreme views of Parmenides and Heraclitus?", "options": [{"text": "It asserts that all change is ultimately an illusion, aligning with Parmenides.", "isCorrect": false, "rationale": "Aristotle's solution explicitly aims to account for *genuine* change, directly contradicting Parmenides' view that change is an illusion."}, {"text": "It posits that everything is in constant, unceasing flux, supporting Heraclitus.", "isCorrect": false, "rationale": "Aristotle aimed to show that there is stable being *and* genuine change, thus rejecting Heraclitus's extreme view of constant flux without stable being."}, {"text": "It introduces a real but incomplete mode of being, allowing for both stable existence and genuine change.", "isCorrect": true, "rationale": "The text explains that potentiality is 'a real but incomplete mode of being,' which allows for something to genuinely exist (not non-being) while still being capable of becoming something else (change), thus charting a path between Parmenides' denial of change and Heraclitus's dissolution of stable being."}, {"text": "It argues that true being can only be found in non-being, a synthesis of both extremes.", "isCorrect": false, "rationale": "Aristotle introduces potentiality as a category *between* being and non-being, not as being found *in* non-being."}]}, {"question": "According to Aristotle in Book IX, what is the 'primary sense' of *dynamis* (potentiality)?", "options": [{"text": "The complete absence of a quality or characteristic.", "isCorrect": false, "rationale": "The text explicitly states that 'A potentiality is a genuine capacity—not mere absence—to be or do something.'"}, {"text": "The full realization or fulfillment of a capacity, also known as *entelecheia*.", "isCorrect": false, "rationale": "This describes actuality (*energeia* or *entelecheia*), not potentiality (*dynamis*)."}, {"text": "A principle of change, which is a capacity in something to produce a change either in itself or in something else.", "isCorrect": true, "rationale": "The text states, 'The primary sense of dynamis is a principle of change—the capacity in something to produce a change, either in itself or in something else.'"}, {"text": "A state of being acted upon passively, without any inherent internal capacity.", "isCorrect": false, "rationale": "Aristotle distinguishes between active and passive senses of potentiality, but even the passive sense (like marble being shaped) implies a 'genuine capacity' to receive the form, making it more than mere passive reception without inherent capacity."}]}, {"question": "A highly sophisticated artificial intelligence system is programmed to diagnose medical conditions. If presented with identical symptoms, it will always provide the same diagnosis. How would Aristotle likely classify this AI's diagnostic 'potentiality'?", "options": [{"text": "As a rational potentiality, because it involves complex data processing and decision-making.", "isCorrect": false, "rationale": "Rational potentialities, as defined by Aristotle, contain the capacity for opposites and are guided by *proairesis* (rational choice), which implies a human-like deliberation. An AI that always produces the same outcome from the same input lacks this capacity for opposites and true rational choice in Aristotle's sense."}, {"text": "As an irrational potentiality, because it consistently operates in only one direction for a given input.", "isCorrect": true, "rationale": "The text defines irrational potentialities as those that 'go in only one direction' (e.g., fire always heats, ice always cools). Since the AI consistently produces the same diagnosis for identical symptoms, its capacity operates uniformly, making it irrational in Aristotle's classification, regardless of its complexity."}, {"text": "As a passive potentiality, because it is merely 'acted upon' by the input data.", "isCorrect": false, "rationale": "While it processes input, the AI is actively 'producing a change' (a diagnosis). A passive potentiality is the capacity to *be acted upon*, like marble being shaped, not to consistently generate an outcome."}, {"text": "As an *entelecheia*, representing the full realization of its designed function.", "isCorrect": false, "rationale": "*Entelecheia* refers to the full realization or actuality. While the AI might be *actualizing* its potential, its *potentiality* itself, in terms of its operational mode, is the classification being asked."}]}, {"question": "Aristotle defines actuality (energeia) primarily through analogy, such as comparing it to waking vs. sleeping, or seeing vs. having eyes shut. What is the fundamental reason for this indirect definitional strategy?", "options": [{"text": "Actuality is an obscure concept that cannot be directly articulated in language.", "isCorrect": false, "rationale": "Actuality is not described as obscure, but rather as fundamental and self-evident in its examples, making direct definition difficult in a different way."}, {"text": "Actuality is less important than potentiality, thus requiring a less rigorous definition.", "isCorrect": false, "rationale": "The text states actuality 'is in some sense more fundamental than potentiality—it is the goal toward which potentiality is ordered,' indicating its high importance."}, {"text": "Actuality is more fundamental and serves as the goal of potentiality, making it harder to define directly without reference to its fulfillment.", "isCorrect": true, "rationale": "The text explains, 'Actuality is in some sense more fundamental than potentiality—it is the goal toward which potentiality is ordered... But precisely because it is more fundamental, it is harder to define directly. Aristotle's strategy is elegant: rather than attempting a direct definition, he proceeds by analogy.'"}, {"text": "Aristotle lacked the necessary vocabulary in ancient Greek to formulate a direct definition of actuality.", "isCorrect": false, "rationale": "The text indicates Aristotle coined the term *energeia*, suggesting he was active in developing new vocabulary rather than lacking it."}]}, {"question": "The text states that 'actuality is prior to potentiality in definition, in time, and in substance.' Which of the following examples best illustrates actuality's priority 'in definition'?", "options": [{"text": "A master craftsman must exist and have learned their trade before they can build a house.", "isCorrect": false, "rationale": "This example highlights priority in *time* (the craftsman exists before the specific act of building), but not primarily priority in definition."}, {"text": "An acorn must exist before it can grow into an oak tree.", "isCorrect": false, "rationale": "This again points to priority in *time* (the acorn precedes the oak tree's existence), but the capacity of the acorn is defined by the fully realized oak."}, {"text": "The capacity of a doctor to heal is understood by first understanding what healing itself is.", "isCorrect": true, "rationale": "The text states, 'To understand any potentiality, you must first understand the actuality it is a potentiality for. The sculptor's capacity is defined by the act of sculpting; the doctor's capacity is defined by the act of healing; the acorn's capacity is defined by the oak it can become.' This directly illustrates 'priority in definition'."}, {"text": "A fully mature oak tree is a more complete and perfect being than a mere acorn.", "isCorrect": false, "rationale": "This exemplifies actuality's priority 'in substance' or completeness, not specifically 'in definition'."}]}, {"question": "According to Aristotle, what determines the exercise of a 'rational potentiality' in humans?", "options": [{"text": "An unchangeable, inherent disposition that dictates a single outcome.", "isCorrect": false, "rationale": "Rational potentialities are distinct because they 'contain within themselves the capacity for opposites,' meaning they do not dictate a single outcome."}, {"text": "Spontaneous impulse or instinct, similar to how irrational powers operate.", "isCorrect": false, "rationale": "The text differentiates *proairesis* from 'impulse or instinct,' stating it is 'choosing not from impulse or instinct but from reasoned deliberation.'"}, {"text": "Proairesis, which is a rational choice or deliberate decision based on reasoned deliberation about what is good.", "isCorrect": true, "rationale": "The text explicitly states, 'What determines which way a rational power is exercised? Aristotle's answer is *proairesis*... choosing not from impulse or instinct but from reasoned deliberation about what is good.'"}, {"text": "External forces acting upon the individual, dictating their actions.", "isCorrect": false, "rationale": "While external factors can influence, *proairesis* emphasizes internal, reasoned choice rather than external determination for rational potentialities."}]}, {"question": "Book IX of Aristotle's Metaphysics, also known as Theta, is described as the culmination of earlier metaphysical analysis. What specific analytical progression does this book complete?", "options": [{"text": "From understanding the nature of universals to particular instances.", "isCorrect": false, "rationale": "While Aristotle dealt with universals and particulars, the text specifies a different progression for Book IX."}, {"text": "From understanding what being is, to what substance is, and then to how substance changes.", "isCorrect": true, "rationale": "The text states, 'once we know what being is (Book IV), and what substance is (Book VII), we are ready to ask how substance changes and what that implies about the structure of being itself.' Book IX addresses this change through potentiality and actuality."}, {"text": "From analyzing sensory experience to forming abstract concepts.", "isCorrect": false, "rationale": "This describes an epistemological progression, not the metaphysical one outlined for Book IX."}, {"text": "From examining the ethical virtues to defining the good life.", "isCorrect": false, "rationale": "This describes a progression in ethics, which Aristotle connects to metaphysics but is not the culmination *of the metaphysical analysis* of being and substance directly."}]}, {"question": "René Descartes' vision that the universe is 'matter in motion, governed by mathematical laws—not form and purpose' most directly conflicts with which fundamental Aristotelian concept?", "options": [{"text": "The idea that all knowledge begins with sensory experience.", "isCorrect": false, "rationale": "While Descartes famously doubted sensory experience, his conflict with Aristotle regarding the universe's nature goes deeper than epistemology."}, {"text": "The concept of *dynamis* (potentiality) as a genuine capacity.", "isCorrect": false, "rationale": "Descartes' view largely bypasses the need for potentiality by reducing change to mechanical motion, but the core conflict isn't just about 'capacity'."}, {"text": "The emphasis on teleology and the inherent purpose of things moving towards their actuality.", "isCorrect": true, "rationale": "Descartes explicitly rejected 'form and purpose' in favor of 'matter in motion, governed by mathematical laws,' which directly opposes Aristotle's teleological view where potentiality is always 'defined by reference to the actuality it aims at' and has an inherent 'end within itself' (*entelecheia*)."}, {"text": "The distinction between active and passive potentiality.", "isCorrect": false, "rationale": "Descartes' rejection is broader than just these distinctions; it concerns the very nature and explanation of change and being."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
