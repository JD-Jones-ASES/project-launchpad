    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Aristotle_III.html">&larr; Back to The Life of Being (Aristotle III)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Aristotle, which of the following best describes the nature of 'eternal moving substance'?", "options": [{"text": "It consists of perishable objects like plants and animals, whose existence is bounded in time.", "isCorrect": false, "rationale": "This describes 'perishable substance,' the first kind identified by Aristotle, not 'eternal moving substance.'"}, {"text": "It refers to the heavenly bodies (sun, moon, planets) that move in eternal, perfect circles, never coming into being or passing away.", "isCorrect": true, "rationale": "The text explicitly states that eternal moving substance refers to the heavenly bodies, which are eternal and in constant, regular motion, serving as an intermediate between perishable and unmoved substances."}, {"text": "It is the ultimate cause of all cosmic motion, itself being completely without motion.", "isCorrect": false, "rationale": "This describes the 'eternal unmoved substance' or the First Mover, which is distinct from the eternal *moving* substances."}, {"text": "It encompasses artifacts and human beings, whose existence is marked by creation and decay.", "isCorrect": false, "rationale": "This again refers to 'perishable substance,' which is subject to coming into being and passing away, unlike the eternal moving substances."}], "id": "q01"}, {"question": "Which of Aristotle's premises in his argument for an Unmoved Mover directly contradicts the theological affirmations of Judaism, Christianity, and Islam?", "options": [{"text": "Everything in motion is moved by something else.", "isCorrect": false, "rationale": "This premise is generally compatible with theological views that posit God as the ultimate mover or creator. The conflict arises elsewhere."}, {"text": "Motion is an empirical observation in the world.", "isCorrect": false, "rationale": "This is an uncontroversial empirical observation and not a point of conflict with any major theology."}, {"text": "There cannot be an infinite regress of movers.", "isCorrect": false, "rationale": "The cosmological argument, which includes the rejection of infinite regress, has been adopted and developed by theologians within these traditions (e.g., Aquinas)."}, {"text": "Motion is eternal, implying that time and the universe had no beginning.", "isCorrect": true, "rationale": "The text explicitly states this premise 'comes into sharpest conflict with Jewish, Christian, and Islamic theology, all of which affirm that the universe was created in time by God.'"}], "id": "q02"}, {"question": "Aristotle argues against an 'infinite regress of movers.' What is the primary reason he considers an infinite regress problematic for explaining motion?", "options": [{"text": "It would require the universe to be spatially infinite, which he believed was impossible.", "isCorrect": false, "rationale": "While Aristotle's cosmology has spatial limits, the core problem with infinite regress of movers is not spatial infinity but the lack of an ultimate explanatory ground for motion."}, {"text": "It would lead to a contradiction in the definition of 'motion' itself.", "isCorrect": false, "rationale": "The argument against infinite regress concerns the *cause* of motion, not its definition."}, {"text": "It would fail to provide any ultimate explanation for motion, being like 'a chain of causes hanging in midair, with no first link to hold it up.'", "isCorrect": true, "rationale": "The text uses this exact analogy, explaining that an infinite regress provides no fundamental explanation or first principle for the chain of causality in motion."}, {"text": "It suggests that motion could spontaneously generate itself without any external cause.", "isCorrect": false, "rationale": "An infinite regress implies a continuous chain of external causes, just without a *first* cause. Aristotle's second premise ('everything in motion is moved by something else') already rules out spontaneous generation."}], "id": "q03"}, {"question": "How does Aristotle explain that the Unmoved Mover causes motion without itself being moved, changed, or acting as an efficient cause?", "options": [{"text": "It uses its immense power to directly push objects through space.", "isCorrect": false, "rationale": "The text explicitly states the Unmoved Mover 'causes no such direct physical action' and does not act 'by pushing things as an efficient cause,' as this would imply it changes."}, {"text": "It causes motion by instilling specific instructions into each moving object at the moment of creation.", "isCorrect": false, "rationale": "Aristotle's God is not a creator, and its influence is not through instruction but through attraction."}, {"text": "It functions as a final cause, moving things 'as being loved,' by being the ultimate object of desire and aspiration for all things in the cosmos.", "isCorrect": true, "rationale": "The text clearly states the Unmoved Mover causes motion 'as a final cause — as an object of desire and thought,' using the phrase 'it moves as being loved' (kinei hos eromenon)."}, {"text": "It constantly monitors and corrects the paths of heavenly bodies through subtle nudges.", "isCorrect": false, "rationale": "This implies efficient causation and intervention, which contradicts the Unmoved Mover's nature of being perfectly unmoved and uninterested in lesser things."}], "id": "q04"}, {"question": "What is the primary activity of Aristotle's Unmoved Mover, described as *Noesis Noeseos*?", "options": [{"text": "The creation and continuous organization of the physical universe.", "isCorrect": false, "rationale": "Aristotle's God is not a creator and does not directly organize the universe; its activity is purely internal."}, {"text": "The contemplation of all potential forms and possibilities that could exist.", "isCorrect": false, "rationale": "The Unmoved Mover is 'pure actuality' and has 'no potentiality whatsoever,' so its thought is not directed towards potentiality."}, {"text": "Pure intellectual self-contemplation, where its thought has itself as its own perfect object, being the highest intelligible reality.", "isCorrect": true, "rationale": "The text defines *Noesis Noeseos* as 'thinking that has thinking as its own object,' explaining that the divine intellect thinks itself because it is the highest possible object of thought."}, {"text": "Engaging in providential guidance for human beings and responding to their prayers.", "isCorrect": false, "rationale": "The text explicitly states Aristotle's God 'does not know individual human beings, does not respond to prayer, and does not intervene in human affairs' and is 'not providential.'"}], "id": "q05"}, {"question": "A student suggests that the Unmoved Mover is actively involved in guiding human history towards a specific, divinely ordained purpose. Based on the text, why is this interpretation incorrect?", "options": [{"text": "The Unmoved Mover only guides the celestial spheres, not terrestrial events.", "isCorrect": false, "rationale": "While the Mover is the cause of cosmic motion, the reason it doesn't guide human history is more fundamental than a mere scope limitation; it's its nature."}, {"text": "The Unmoved Mover is described as 'not providential,' meaning it does not guide history or intervene in human affairs.", "isCorrect": true, "rationale": "The text clearly states, 'It is not providential: it does not guide history toward any particular end, does not punish the wicked or reward the righteous in this life or the next.'"}, {"text": "The Unmoved Mover delegates such tasks to lesser deities or spirits.", "isCorrect": false, "rationale": "The text does not mention lesser deities or delegation of divine tasks by the Unmoved Mover."}, {"text": "The Unmoved Mover is purely actual and thus cannot engage in any activity that involves 'potential' historical outcomes.", "isCorrect": false, "rationale": "While the Mover is pure actuality, the direct reason for its non-intervention is its lack of interest in 'lesser things' and its non-providential nature, not merely a theoretical incompatibility with 'potential outcomes' in this context."}], "id": "q06"}, {"question": "How does Aristotle's concept of 'pure actuality' (actus purus) apply to the Unmoved Mover's nature?", "options": [{"text": "It means the Mover is continually evolving and actualizing new potentials.", "isCorrect": false, "rationale": "Pure actuality implies the absence of potentiality. If it were actualizing new potentials, it would not be purely actual but would have had unactualized potential."}, {"text": "It signifies that the Mover is entirely composed of material elements that are always active.", "isCorrect": false, "rationale": "The Unmoved Mover is described as 'immaterial,' not composed of material elements."}, {"text": "It means the Mover has no matter, no potentiality, and no composition, being fully realized in its essence and activity.", "isCorrect": true, "rationale": "The text states the Unmoved Mover is 'pure actuality (actus purus)—no matter, no potentiality, no composition of any kind.' This describes its complete and perfect realization."}, {"text": "It implies that the Mover is actual only when actively moving something else.", "isCorrect": false, "rationale": "The Mover's actuality is inherent to its being, not contingent on external efficient causation. Its existence *is* pure activity."}], "id": "q07"}, {"question": "The text notes the 'connection to the Ethics' as profound and intentional. What is this connection regarding the highest human happiness?", "options": [{"text": "Human happiness is found in controlling the physical world, much like the Unmoved Mover controls cosmic motion.", "isCorrect": false, "rationale": "The Unmoved Mover does not 'control' in an efficient sense, and human happiness is not linked to such control."}, {"text": "The highest human happiness is achieved through religious devotion and prayer to the Unmoved Mover.", "isCorrect": false, "rationale": "Aristotle's God does not respond to prayer and is not a personal deity in the religious sense described. The text links happiness to contemplation, not devotion."}, {"text": "The contemplative life (theoria) is the highest human happiness because it allows a finite being to participate in the pure contemplation of the divine life.", "isCorrect": true, "rationale": "The text explicitly states, 'The contemplative life is the highest human happiness because it is the most self-sufficient, the most continuous, and the most like the divine life,' further clarifying that the philosopher 'is participating, to the extent that a finite human being can, in the highest form of existence.'"}, {"text": "Achieving human happiness requires mimicking the Unmoved Mover's disinterest in lesser things by isolating oneself from society.", "isCorrect": false, "rationale": "While the Mover is self-sufficient, the text emphasizes intellectual contemplation as the form of participation in divine life, not social isolation as an end in itself for human happiness."}], "id": "q08"}, {"question": "Consider a scenario where a scientist proposes that all motion in the universe began at a specific point in time from a singular event. Which of Aristotle's key premises for the Unmoved Mover would this proposal directly challenge?", "options": [{"text": "The idea that everything in motion is moved by something else.", "isCorrect": false, "rationale": "This premise could still hold; even a singular starting event would be a 'something else' moving things, just at the beginning. It doesn't inherently contradict the idea of an initial mover."}, {"text": "The empirical observation that there is motion in the world.", "isCorrect": false, "rationale": "The proposal still acknowledges motion exists, just specifies its origin, so it doesn't challenge the observation itself."}, {"text": "The rejection of an infinite regress of movers.", "isCorrect": false, "rationale": "A singular beginning to motion would actually support the rejection of an infinite regress, by providing a definite start."}, {"text": "The premise that motion is eternal and has no beginning in time.", "isCorrect": true, "rationale": "Aristotle's first premise is 'motion is eternal,' based on time having no beginning. A proposal of motion beginning at a 'specific point in time' directly challenges this core Aristotelian premise, aligning with the conflict noted with Abrahamic faiths."}], "id": "q09"}, {"question": "Which of the following describes a key distinction between the divine intellect's thought and human thought, according to Aristotle?", "options": [{"text": "Human thought can contemplate higher truths than the divine intellect.", "isCorrect": false, "rationale": "The text states the divine intellect 'must think the best possible object — and the best possible object is itself,' implying no higher truth exists for it to contemplate, and certainly not one higher than itself."}, {"text": "Divine thought requires an external object to be actualized, whereas human thought is self-sufficient.", "isCorrect": false, "rationale": "This is the opposite of Aristotle's view. Divine thought is self-sufficient and has itself as its object; human thought typically requires an external object ('I am not the triangle I am thinking about')."}, {"text": "For human beings, there is a fundamental distinction between the thinking mind and the thing thought, but for the divine intellect, the intellect *is* the intelligible object.", "isCorrect": true, "rationale": "The text explains this deeply: 'For human beings, the distinction between the thinking mind and the thing thought is fundamental... But for a perfect intellect, this gap collapses... the intellect is the intelligible.'"}, {"text": "Human thought is purely contemplative, while divine thought is engaged in practical actions.", "isCorrect": false, "rationale": "Again, this is reversed. Human happiness involves contemplation, but divine life *is* pure contemplation, while divine thought is not engaged in practical actions in the world."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
