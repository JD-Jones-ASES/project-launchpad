    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_III.html">&larr; Back to The Life of Being (Aristotle III)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Thomas Aquinas's primary philosophical project, as described in the text, focused on which of the following?", "options": [{"text": "Refuting Aristotle's ideas through the lens of Christian doctrine.", "isCorrect": false, "rationale": "Aquinas did not seek to refute Aristotle; rather, he devoted his life to reconciling and mutually illuminating Aristotle's philosophy and Christian theology."}, {"text": "Establishing a new system of ethics entirely independent of prior Greek thought.", "isCorrect": false, "rationale": "The text states Aquinas devoted his life to showing how Aristotle's philosophy and Christian theology could be reconciled, indicating a connection to prior thought, not independence."}, {"text": "Demonstrating the inherent superiority of faith over natural reason in all philosophical inquiry.", "isCorrect": false, "rationale": "Aquinas held that \"grace does not destroy nature, but perfects it,\" implying that natural reason (Aristotle's philosophy) is not an enemy of faith but its handmaid, not necessarily superior."}, {"text": "Reconciling Aristotle's philosophy with Christian theology to show their mutual illumination.", "isCorrect": true, "rationale": "The text explicitly states that Aquinas 'devoted his life to showing how Aristotle's philosophy and Christian theology could be reconciled and mutually illuminating.'"}], "id": "q01"}, {"question": "According to Aristotle, as conveyed in Book VII (Zeta) of the Metaphysics, the fundamental question 'What is being?' ultimately reduces to what more specific inquiry?", "options": [{"text": "What is knowledge?", "isCorrect": false, "rationale": "While related, the text specifies that Aristotle's question 'What is being?' comes down to 'What is substance?' not primarily knowledge."}, {"text": "What is happiness?", "isCorrect": false, "rationale": "Happiness (eudaimonia) is a central concept in Aristotle's ethics, but not the primary focus of his metaphysical inquiry into being in Book VII."}, {"text": "What is substance?", "isCorrect": true, "rationale": "The text clearly states that Aristotle opens Book VII by reminding us that 'the question “What is being?” really comes down to the question “What is substance?” (ousia).'"}, {"text": "What is change?", "isCorrect": false, "rationale": "Change is certainly a topic Aristotle addresses, but the primary question driving Book VII's investigation of being is specifically about substance."}], "id": "q02"}, {"question": "Aristotle considers four candidates for what constitutes 'substance' in Book VII. Which of the following did he conclude was *primarily* substance?", "options": [{"text": "The substratum, or the underlying matter of which a thing is made.", "isCorrect": false, "rationale": "Aristotle considers substratum as a candidate but ultimately argues against it being the primary substance, as matter is indeterminate until it receives form."}, {"text": "The universal, or the general concept shared by many individuals.", "isCorrect": false, "rationale": "Aristotle explores the universal but ultimately rejects it as primary substance because it does not exist independently but is predicated of particulars."}, {"text": "The genus, or the wider category to which a thing belongs.", "isCorrect": false, "rationale": "The genus is a broader classification, not the defining structure that makes an individual thing what it is; Aristotle would consider it too general to be primary substance."}, {"text": "The form (eidos), or the defining structure that makes a thing what it is.", "isCorrect": true, "rationale": "The text explicitly states: 'His conclusion, arrived at after sustained argument, is that substance is primarily form (eidos) — the defining structure that makes a thing what it is.'"}], "id": "q03"}, {"question": "Applying Aristotle's conclusion about substance to the example of a bronze statue, what does the text imply is the 'real' identity of the statue?", "options": [{"text": "It is primarily a lump of bronze that incidentally resembles a human figure.", "isCorrect": false, "rationale": "This view aligns with considering matter as primary, which Aristotle rejected. If substance is primarily form, the bronze is merely the vehicle."}, {"text": "Its identity is equally determined by both the bronze (matter) and the human figure (form).", "isCorrect": false, "rationale": "While both are present, Aristotle concludes substance is *primarily* form, not equally determined by both. The question is about the *primary* identity."}, {"text": "It is primarily the human figure, with the bronze serving as the vehicle for that figure's existence.", "isCorrect": true, "rationale": "The text states: 'If it is primarily its form, then what it IS is the human figure — and the bronze is merely the vehicle by which that figure exists.' This directly applies Aristotle's conclusion that substance is primarily form."}, {"text": "Its identity is a subjective interpretation, varying based on the observer's perspective.", "isCorrect": false, "rationale": "Aristotle's inquiry seeks an objective metaphysical truth about what a thing *is*, not a subjective interpretation."}], "id": "q04"}, {"question": "Which of the following best captures Aristotle's concept of 'ousia' as described in the text?", "options": [{"text": "A property or attribute that exists only in relation to something else.", "isCorrect": false, "rationale": "The text defines ousia as 'that which exists in itself, not as a property of something else,' directly contradicting this option."}, {"text": "The incidental characteristics that differentiate one individual from another.", "isCorrect": false, "rationale": "Ousia is about the primary kind of being, what makes a thing *what it is*, not its incidental characteristics."}, {"text": "The primary kind of being that exists in itself, not as a property of something else.", "isCorrect": true, "rationale": "The text defines ousia as 'Aristotle's technical term for the primary kind of being — that which exists in itself, not as a property of something else.'"}, {"text": "A general concept or universal shared by many different things.", "isCorrect": false, "rationale": "While a candidate, Aristotle rejects the universal as primary substance. Ousia refers to the individual substance itself, not just a shared concept."}], "id": "q05"}, {"question": "According to Aristotle, how do the 'other categories' of being (e.g., quality, quantity, place) relate to 'substance'?", "options": [{"text": "They can exist independently of substance, as primary forms of being in their own right.", "isCorrect": false, "rationale": "The text states, 'none can exist independently, but only substance.' Other categories exist only derivatively."}, {"text": "They are often mistaken for substance but are fundamentally distinct and unrelated.", "isCorrect": false, "rationale": "They are not unrelated; they *belong* to substance. 'All the other categories... belong to things only because those things are, first and foremost, substances.'"}, {"text": "They belong to things only because those things are, first and foremost, substances.", "isCorrect": true, "rationale": "The text explicitly states, 'All the other categories... belong to things only because those things are, first and foremost, substances.'"}, {"text": "They determine the substance of a thing, rather than being determined by it.", "isCorrect": false, "rationale": "Substance is the root; it is what *bears* these properties. A thing is red, large, etc., but 'there must be a thing — a substance — to bear these properties.'"}], "id": "q06"}, {"question": "Aristotle's concept of 'to ti en einai' (essence) in Book VII, Part 4, refers to which of the following?", "options": [{"text": "The accidental properties of a thing that can change without altering its fundamental nature.", "isCorrect": false, "rationale": "Essence is 'stripped of all incidental properties' and is 'what a thing truly and necessarily is,' not its accidental properties."}, {"text": "A description of a thing's surface properties or outward appearance.", "isCorrect": false, "rationale": "The text states essence 'is not a mere description of surface properties.'"}, {"text": "The formula that captures what a thing truly and necessarily is, stripped of all incidental properties.", "isCorrect": true, "rationale": "The text defines 'to ti en einai' as 'The formula that expresses what a thing is, stripped of all incidental properties' and 'what a thing truly and necessarily is.'"}, {"text": "The composite of form and matter that constitutes the physical object itself.", "isCorrect": false, "rationale": "The text clarifies that 'The essence is not the same as the thing itself (the composite of form and matter).'"}], "id": "q07"}, {"question": "Based on the excerpt from Metaphysics, Book VII, Part 4, which statement accurately reflects what can have an 'essence' according to Aristotle?", "options": [{"text": "Any combination of words or any predicate, such as 'being a white surface' or 'the Iliad'.", "isCorrect": false, "rationale": "The text states 'there is an essence only of those things whose formula is a definition... not where we have a word and a formula identical in meaning (for in that case all formulae or sets of words would be definitions; for there will be some name for any set of words whatever, so that even the Iliad will be a definition).'. Thus, 'being a white surface' (a compound) and 'the Iliad' are explicitly excluded from having an essence."}, {"text": "Only primary things which do not imply the predication of one element in them of another element, specifically species of a genus.", "isCorrect": true, "rationale": "The text concludes, 'Therefore there is an essence only of those things whose formula is a definition. But we have a definition... where there is a formula of something primary; and primary things are those which do not imply the predication of one element in them of another element. Nothing, then, which is not a species of a genus will have an essence-only species will have it.'"}, {"text": "Any attribute asserted of a subject, such as 'white' when describing a 'white man'.", "isCorrect": false, "rationale": "The text uses 'white man' as an example of something that does not have an essence in the primary sense, as 'thisness belongs only to substances' and 'white man is not precisely what some 'this' is.' 'White' itself is an attribute, not a substance whose essence is defined independently."}, {"text": "Both the composite object (like 'cloak' meaning 'white man') and its individual attributes (like 'white').", "isCorrect": false, "rationale": "The text states 'But is being-a-cloak an essence at all? Probably not,' and explicitly differentiates between a predicate true *propter se* and a compound. It excludes composite objects and individual attributes from having an essence in the strict sense."}], "id": "q08"}, {"question": "Aristotle argues that substance is 'first in every sense'. Which of the following is NOT one of the senses in which he claims substance is first?", "options": [{"text": "In definition, as the definition of its substance must be present in the definition of each term.", "isCorrect": false, "rationale": "The text explicitly states substance is first 'in definition' (1), supporting this claim."}, {"text": "In order of knowledge, as we know each thing most fully when we know what it is (its substance).", "isCorrect": false, "rationale": "The text explicitly states substance is first 'in order of knowledge' (2), supporting this claim."}, {"text": "In ethical value, as substance determines the moral worth of all other categories.", "isCorrect": true, "rationale": "The text lists 'definition,' 'order of knowledge,' and 'time' as the three senses in which substance is first. It does not mention ethical value or moral worth in this context."}, {"text": "In time, as none of the other categories can exist independently, but only substance.", "isCorrect": false, "rationale": "The text explicitly states substance is first 'in time' (3), supporting this claim, noting that 'of the other categories none can exist independently, but only substance.'"}], "id": "q09"}, {"question": "In Aristotle's analysis of 'coming-to-be' for natural and artificial things, what role does 'form' (eidos) play?", "options": [{"text": "Form is merely an accidental property that can change without affecting the identity of the thing.", "isCorrect": false, "rationale": "Aristotle argues form is primary substance and the defining structure, not an accidental property. Changes in form would alter identity."}, {"text": "Form is the 'out of which' something is made, referring to the raw material.", "isCorrect": false, "rationale": "The text states matter (hyle) is the 'out of which,' not form. Form is the 'into which.'"}, {"text": "Form is what the craftsman or nature is aiming at, the 'into which' a thing comes to be.", "isCorrect": true, "rationale": "The text states: 'His analysis of coming-to-be reveals that form is always what the craftsman or nature is aiming at: the matter is the “out of which,” the form is the “into which.”'"}, {"text": "Form is a subjective concept, varying based on cultural interpretations of an object.", "isCorrect": false, "rationale": "Aristotle's concept of form is an objective, inherent structure, not a subjective or culturally variable concept."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
