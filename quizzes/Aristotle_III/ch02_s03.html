<script>
var QUESTIONS = [{"question": "What does Aristotle primarily mean by the opening declaration of the Metaphysics, \"All men by nature desire to know\"?", "options": [{"text": "Humans naturally seek information that is useful for survival and daily activities.", "isCorrect": false, "rationale": "Aristotle clarifies that this desire does not stop at useful knowledge; it points toward the highest knowledge, indicating it's more fundamental than mere utility."}, {"text": "Human beings are fundamentally constituted to strive for understanding, regardless of immediate utility.", "isCorrect": true, "rationale": "Aristotle states he is 'making a claim about what human beings fundamentally ARE: beings that, by the very constitution of their nature, reach out toward understanding.' This desire is inherent and points beyond usefulness."}, {"text": "People are inherently curious about superficial facts and pleasant learning, which drives their desire to know.", "isCorrect": false, "rationale": "While curiosity can lead to pleasant learning, Aristotle emphasizes that the natural desire for knowledge goes beyond this, aiming for the 'highest knowledge of all—the knowledge of the first causes and principles.'"}, {"text": "Every individual human actively pursues complex philosophical inquiries from birth.", "isCorrect": false, "rationale": "Aristotle describes a natural, inherent drive, not necessarily an active pursuit of complex philosophy by every individual from birth. The development of knowledge is traced from primitive forms like sensation."}]}, {"question": "According to Aristotle, what is the crucial difference between 'experience' and 'art' (or *technē*) in the development of knowledge?", "options": [{"text": "Experience is gained through formal education, while art is an innate, untaught skill.", "isCorrect": false, "rationale": "Aristotle describes experience as produced from memory of individual cases, and art as arising from universal judgments gained through experience, not from formal education versus innate skill."}, {"text": "Experience is knowledge of individual cases without understanding the 'why,' while art provides universal knowledge of causes and principles.", "isCorrect": true, "rationale": "Aristotle clearly states: 'For men of experience know that the thing is so, but do not know why, while the others [those with art] know the 'why' and the cause.' Art involves 'one universal judgement about a class of objects'."}, {"text": "Art is limited to practical crafts, while experience applies to theoretical understanding.", "isCorrect": false, "rationale": "Aristotle considers art to be higher than mere experience because it grasps the universal and the cause, moving towards theoretical understanding, while experience is knowledge of particulars."}, {"text": "Experience is theoretical knowledge, and art is its practical application.", "isCorrect": false, "rationale": "This reverses Aristotle's hierarchy. Experience is rooted in individual observations and actions, while art involves a more generalized, theoretical understanding of causes that can then be applied."}]}, {"question": "Why does Aristotle state that the senses, despite providing authoritative knowledge of particulars, do not constitute wisdom?", "options": [{"text": "Sensory information is often unreliable and can be misleading, hindering true knowledge.", "isCorrect": false, "rationale": "Aristotle values the senses, especially sight, for the joy of seeing and making distinctions. He doesn't dismiss them as unreliable, but as limited in scope."}, {"text": "The senses only tell us *that* something is so, but not *why* it is so, lacking knowledge of causes.", "isCorrect": true, "rationale": "The text states, 'But they do not tell us the 'why' of anything-e.g. why fire is hot; they only say that it is hot.' Wisdom, by contrast, is knowledge of causes."}, {"text": "Only a select few individuals possess highly developed senses capable of discerning true particulars.", "isCorrect": false, "rationale": "Aristotle mentions that 'sense-perception is common to all, and therefore easy and no mark of Wisdom,' implying it's universally accessible, not exclusive."}, {"text": "Sensory perception is purely passive and requires no intellectual effort, making it inferior to wisdom.", "isCorrect": false, "rationale": "While wisdom involves intellectual effort, the primary reason senses are not wisdom is their inability to grasp causes, not just their perceived passivity."}]}, {"question": "Which of the following best defines wisdom (*sophia*) according to Aristotle in the provided text?", "options": [{"text": "The ability to recall and organize a vast amount of factual information about the world.", "isCorrect": false, "rationale": "While wisdom involves extensive knowledge, its defining characteristic is not merely accumulation of facts but understanding their underlying principles and causes."}, {"text": "Expertise in a specific craft or profession that yields practical and useful results.", "isCorrect": false, "rationale": "Aristotle explicitly contrasts wisdom with skill in a craft or practical expertise, noting that wisdom is pursued for its own sake, not for utility."}, {"text": "Knowledge of the first causes and first principles that explain everything else but are themselves unexplained.", "isCorrect": true, "rationale": "The text states: 'wisdom is... the knowledge of first causes and first principles—the knowledge that explains everything else but is itself explained by nothing further.'"}, {"text": "A comprehensive understanding of historical events and human societies across different eras.", "isCorrect": false, "rationale": "This is a specific domain of knowledge. Aristotle's definition of wisdom is broader, focusing on universal, foundational causes and principles of all existence, not just history or society."}]}, {"question": "Aristotle describes wisdom as the most 'useless' knowledge. What is the intended meaning of this statement?", "options": [{"text": "Wisdom has no practical application in daily life and cannot be used to improve human conditions.", "isCorrect": false, "rationale": "While wisdom isn't pursued for utility, its insights into fundamental causes ultimately inform all other knowledge and human understanding, making it profoundly important, not useless in a negative sense."}, {"text": "It is pursued for its own sake, satisfying the deepest human desire to understand, rather than for utility or practical results.", "isCorrect": true, "rationale": "The text explains: 'This kind of knowledge is pursued not because it is useful but because it satisfies the deepest human desire to understand. In this sense wisdom is the most “useless” knowledge of all, and precisely therefore the most important.'"}, {"text": "Only those with abundant leisure and resources can afford to pursue it, making it inaccessible to most.", "isCorrect": false, "rationale": "While Aristotle notes that theoretical sciences arose where leisure was available, the 'uselessness' refers to the nature of the knowledge itself (its intrinsic value), not its accessibility or social implications."}, {"text": "It primarily serves as a status symbol for the intellectual elite, demonstrating their superior intellect.", "isCorrect": false, "rationale": "Aristotle's focus is on the inherent human drive to know and the intrinsic value of understanding first principles, not on social status or elitism."}]}, {"question": "As knowledge progresses through Aristotle's hierarchy from sensation to wisdom, what is the characteristic trend observed at each higher stage?", "options": [{"text": "An increase in the number of individual facts and specific details gathered.", "isCorrect": false, "rationale": "Knowledge progresses from particulars (sensation, experience) to universals (art, science, wisdom), not simply by accumulating more individual facts."}, {"text": "A greater focus on immediate utility and practical outcomes for human endeavors.", "isCorrect": false, "rationale": "The progression moves *away* from immediate utility; wisdom is praised precisely because it is 'useless' in a utilitarian sense, pursued for its own sake."}, {"text": "A deeper grasp of universal causes and principles underlying phenomena, moving further from the senses.", "isCorrect": true, "rationale": "The text states: 'Each stage surpasses the one below it... by grasping something more universal about their causes.' It also notes that the most universal things 'are farthest from the senses'."}, {"text": "A specialization in increasingly narrow and defined fields of study and expertise.", "isCorrect": false, "rationale": "Wisdom is characterized by knowing 'all things, as far as possible,' dealing with 'first principles' and 'most universal,' indicating a broad, foundational understanding rather than narrow specialization."}]}, {"question": "A master chef meticulously follows a complex recipe to create a dish, knowing exactly what each ingredient and step contributes to the final flavor and texture. A novice cook, however, follows the same recipe precisely but doesn't understand *why* certain steps or ingredients are essential. Based on Aristotle's hierarchy of knowledge, how would he categorize the master chef's understanding compared to the novice cook's?", "options": [{"text": "Both are at the level of 'experience' as they are both following instructions for a specific outcome.", "isCorrect": false, "rationale": "The master chef's understanding of *why* steps and ingredients work moves beyond mere experience. Experience knows *that* it works, but not the cause."}, {"text": "The master chef exhibits 'art' because they know the causes and principles, while the novice has 'experience' as they only know *that* it works.", "isCorrect": true, "rationale": "The text differentiates: 'men of experience know that the thing is so, but do not know why, while the others [those with art] know the 'why' and the cause.' The master chef knows the universal principles of cooking (art), while the novice merely follows individual instances (experience)."}, {"text": "The master chef possesses 'wisdom,' while the novice has 'sensation.'", "isCorrect": false, "rationale": "Wisdom is knowledge of first causes of *all* things, higher than practical art. The novice is beyond mere sensation, capable of memory and following instructions based on experience."}, {"text": "The master chef has 'science,' and the novice has 'memory.'", "isCorrect": false, "rationale": "While 'art' and 'science' are closely related in Aristotle's thought, 'art' better fits the practical application of universal knowledge in a craft. The novice demonstrates more than just memory; they are applying remembered steps to produce a result, which is a form of experience."}]}, {"question": "Aristotle identifies the ability to teach as a distinguishing mark of higher forms of knowledge like 'art' or 'science.' Why is this capacity so significant?", "options": [{"text": "It demonstrates a mastery of rhetorical skills and public speaking, which is valuable in any field.", "isCorrect": false, "rationale": "While communication is involved, Aristotle's point is that teaching requires a foundational understanding of causes, not merely persuasive speaking or presentational skills."}, {"text": "Only those with knowledge of universal causes can explain and transmit *why* things are so, enabling others to understand beyond mere habit or individual observation.", "isCorrect": true, "rationale": "The text states: 'it is a sign of the man who knows... that the former can teach... for artists can teach, and men of mere experience cannot,' because artists know the causes, allowing them to explain the 'why' rather than just 'what' or 'how'."}, {"text": "Teaching is primarily a way to secure one's reputation and status in society as a wise individual.", "isCorrect": false, "rationale": "While teaching might confer status, Aristotle's discussion focuses on teaching as an *indicator* of the *nature* of the knowledge possessed, specifically the grasp of causes, rather than its social benefits."}, {"text": "It indicates an ability to memorize and recite complex theories and facts accurately for others.", "isCorrect": false, "rationale": "Teaching, in Aristotle's view, goes beyond mere memorization. It requires understanding the underlying causes and principles, which then allows for effective explanation and transmission of knowledge."}]}, {"question": "Which combination of characteristics does Aristotle NOT primarily associate with a wise man (*sophos*)?", "options": [{"text": "Knowledge of things that are difficult for man to know and the ability to teach causes.", "isCorrect": false, "rationale": "The text states the wise man 'can learn things that are difficult' and is 'more exact and more capable of teaching the causes.' These are key attributes of wisdom."}, {"text": "Knowledge that is desirable for its own sake and the ability to order rather than obey.", "isCorrect": false, "rationale": "Aristotle identifies wisdom as 'that which is desirable on its own account and for the sake of knowing it' and states 'the wise man must not be ordered but must order, and he must not obey another, but the less wise must obey him.'"}, {"text": "Knowing all things universally (not in detail) and dealing with first principles.", "isCorrect": false, "rationale": "The wise man 'knows all things, as far as possible, although he has not knowledge of each of them in detail' and 'the most exact of the sciences are those which deal most with first principles,' which is characteristic of wisdom."}, {"text": "Expertise in particular practical applications and a reliance on sensory data for explanation.", "isCorrect": true, "rationale": "Wisdom is explicitly contrasted with practical expertise in a craft ('wisdom is not skill in a craft or expertise in a trade') and transcends reliance on sensory data, which only provides 'that' something is so, not 'why'."}]}, {"question": "Aristotle links the discovery of sciences that do not aim at pleasure or necessity, such as mathematical arts in Egypt, to the availability of leisure. What does this connection imply about the pursuit of higher knowledge?", "options": [{"text": "Higher knowledge is a luxury only accessible to the wealthy or privileged classes in society.", "isCorrect": false, "rationale": "While the availability of leisure might correlate with privilege, the implication is about the conditions necessary for a *certain type* of intellectual pursuit, not primarily a social commentary on wealth."}, {"text": "Practical necessities must be met before theoretical inquiry can flourish, as such inquiry is pursued for its own sake rather than immediate utility.", "isCorrect": true, "rationale": "The text states that 'the sciences which do not aim at giving pleasure or at the necessities of life were discovered, and first in the places where men first began to have leisure.' This implies that freedom from immediate concerns is a prerequisite for pursuing knowledge for its intrinsic value."}, {"text": "Theoretical knowledge is inherently elitist and detached from common human concerns and well-being.", "isCorrect": false, "rationale": "The text emphasizes that theoretical knowledge satisfies a fundamental human desire to understand, making it deeply connected to human nature, even if its pursuit requires specific conditions."}, {"text": "All forms of knowledge, including theoretical sciences, originate directly from attempts to solve practical challenges.", "isCorrect": false, "rationale": "Aristotle distinguishes between arts for necessities/recreation and sciences not aiming at utility, suggesting that while some knowledge stems from practical challenges, higher theoretical knowledge can emerge independently when conditions allow."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
