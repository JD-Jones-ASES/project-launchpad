    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 2: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the Valley of Ashes, and where is it located?", "options": [{"text": "A suburban park between East and West Egg where the wealthy picnic on weekends.", "isCorrect": false, "rationale": "The Valley of Ashes is the opposite of a pleasant park. It is a desolate industrial wasteland filled with ash and gray dust, not a recreational space."}, {"text": "A desolate industrial wasteland about halfway between West Egg and New York, where ashes form into grotesque shapes and ash-gray men labor through the powdery air.", "isCorrect": true, "rationale": "Fitzgerald describes it as “a fantastic farm where ashes grow like wheat into ridges and hills and grotesque gardens” where “ash-gray men” move “dimly and already crumbling through the powdery air.” It lies between the Eggs and the city."}, {"text": "An abandoned cemetery on the outskirts of New York City.", "isCorrect": false, "rationale": "The Valley of Ashes is not a cemetery. It is an active industrial dumping ground where working-class people, including George Wilson, live and labor."}, {"text": "A slum neighborhood inside Manhattan where Tom keeps his apartment.", "isCorrect": false, "rationale": "Tom's apartment is on 158th Street in Manhattan. The Valley of Ashes is a distinct location on the way from Long Island to the city."}]}, {"question": "Who are Doctor T. J. Eckleburg's eyes, and what do they look like?", "options": [{"text": "A real doctor whose portrait hangs in the Wilson garage; he has small, kind eyes.", "isCorrect": false, "rationale": "Doctor T. J. Eckleburg is not a real character in the story. His eyes appear on a faded billboard advertisement, not a portrait, and they are described as enormous, not small and kind."}, {"text": "Enormous blue eyes—irises a yard high—looking out of gigantic yellow spectacles on a faded billboard set up by an oculist who apparently forgot them or moved away.", "isCorrect": true, "rationale": "Fitzgerald describes “the eyes of Doctor T. J. Eckleburg” as “blue and gigantic—their irises are one yard high” looking out from “a pair of enormous yellow spectacles which pass over a nonexistent nose,” a faded advertisement left to brood over the Valley of Ashes."}, {"text": "Small painted eyes on the side of a railroad car that passes through the Valley of Ashes.", "isCorrect": false, "rationale": "The eyes are on a billboard, not a railroad car. Their fixed, brooding quality is part of what makes them symbolically significant as a permanent, watching presence."}, {"text": "Gray and expressionless, meant to suggest the indifference of modern society to poverty.", "isCorrect": false, "rationale": "The eyes are described as blue, not gray. Their color and the yellow spectacles are specific visual details Fitzgerald gives them."}]}, {"question": "How does Tom force Nick to accompany him to meet Myrtle Wilson?", "options": [{"text": "Tom invites Nick politely and Nick agrees out of curiosity about Tom's mistress.", "isCorrect": false, "rationale": "Nick does not agree willingly. The text describes Tom as forcing Nick, and Nick reflects that Tom's assumption he had nothing better to do on a Sunday afternoon “bordered on violence.”"}, {"text": "Tom tricks Nick by telling him they are going to a business meeting in the city.", "isCorrect": false, "rationale": "There is no deception about a meeting. Tom simply takes hold of Nick's elbow and “literally forced” him from the train car when it stopped near the Valley of Ashes."}, {"text": "Tom grabs Nick's elbow and literally forces him off the train when it stops near the Valley of Ashes, barely acknowledging that Nick might have other plans.", "isCorrect": true, "rationale": "The text states Tom “took hold of my elbow and literally forced me from the car,” and Nick notes that “his determination to have my company bordered on violence” and that “the supercilious assumption was that on Sunday afternoon I had nothing better to do.”"}, {"text": "Tom asks Daisy to arrange the outing so Nick will not suspect where they are going.", "isCorrect": false, "rationale": "Daisy is not involved in arranging this trip. Tom acts unilaterally and impulsively, pulling Nick off the train."}]}, {"question": "How does George Wilson contrast with Myrtle Wilson when Nick first meets them at the garage?", "options": [{"text": "George is confident and cheerful; Myrtle is withdrawn and quiet.", "isCorrect": false, "rationale": "This is the opposite of the actual characterization. George is described as spiritless and submissive, while Myrtle is characterized by “immediately perceptible vitality.”"}, {"text": "George is blond, spiritless, and anemic, with a “damp gleam of hope” when he sees Tom; Myrtle walks through him “as if he were a ghost” and commands attention with her physical vitality.", "isCorrect": true, "rationale": "Fitzgerald describes George as “a blond, spiritless man, anaemic, and faintly handsome” with a “damp gleam of hope” appearing in his eyes at Tom's arrival, while Myrtle enters with “immediately perceptible vitality” and “walking through her husband as if he were a ghost.”"}, {"text": "George is large and menacing; Myrtle is fragile and timid.", "isCorrect": false, "rationale": "George is not menacing—he is powerless and easily dominated by Tom. Myrtle is not timid; she is vibrant and assertive, at least when away from the garage."}, {"text": "George and Myrtle are presented as nearly identical in their shared resignation and poverty.", "isCorrect": false, "rationale": "Fitzgerald deliberately contrasts them rather than presenting them as alike. Myrtle's vitality is what distinguishes her from her faded husband."}]}, {"question": "What transformation does Myrtle Wilson undergo when she changes into her cream-colored chiffon dress at the apartment?", "options": [{"text": "She becomes quieter and more refined, convincingly passing as a member of the upper class.", "isCorrect": false, "rationale": "Myrtle does not become convincingly upper-class. Her performance becomes “more violently affected moment by moment,” and her hauteur is clearly performed, not genuine."}, {"text": "Her intense vitality transforms into impressive hauteur; her gestures and laughter become more violently affected, and she begins performing the role of a wealthy hostess.", "isCorrect": true, "rationale": "Fitzgerald writes that “with the influence of the dress her personality had also undergone a change. The intense vitality that had been so remarkable in the garage was converted into impressive hauteur” and her “laughter, her gestures, her assertions became more violently affected moment by moment.”"}, {"text": "She becomes genuinely happy for the first time in the novel, suggesting the dress represents her authentic self.", "isCorrect": false, "rationale": "The dress does not reveal authenticity; it enables performance. Fitzgerald presents Myrtle's apartment persona as artifice, not her true self finally freed."}, {"text": "She becomes subdued and melancholy, suggesting the apartment reminds her of the limitations of her situation.", "isCorrect": false, "rationale": "The opposite occurs—Myrtle becomes energized and expansive, not subdued. The dress activates a performed identity of superiority."}]}, {"question": "What lie does Myrtle's sister Catherine tell about why Tom and Myrtle cannot marry?", "options": [{"text": "She says Tom already has children and cannot abandon them.", "isCorrect": false, "rationale": "The lie told is not about children. Catherine invents a religious obstacle as the reason Tom and Myrtle cannot marry."}, {"text": "She says Tom's family disapproves of Myrtle's social class.", "isCorrect": false, "rationale": "This is not the lie Catherine tells. The invented obstacle is religious, not social."}, {"text": "She says Daisy is a Catholic and does not believe in divorce, making it impossible for Tom to leave his wife.", "isCorrect": true, "rationale": "Catherine tells Nick, “It's really his wife that's keeping them apart. She's a Catholic, and they don't believe in divorce.” Nick is “a little shocked at the elaborateness of the lie” since Daisy is not Catholic."}, {"text": "She says Tom is in debt and cannot afford to support a second household.", "isCorrect": false, "rationale": "Tom's finances are not the stated obstacle. Catherine's lie specifically involves religious belief as the supposed barrier to divorce."}]}, {"question": "How does the chapter's party scene end?", "options": [{"text": "Gatsby arrives unexpectedly, revealing that he already knows Myrtle Wilson.", "isCorrect": false, "rationale": "Gatsby does not appear in Chapter 2. The chapter is confined to the Valley of Ashes and Tom's Manhattan apartment."}, {"text": "Nick leaves quietly before anything eventful happens, uncomfortable with the drinking.", "isCorrect": false, "rationale": "Nick does not leave before the dramatic climax. He is present when Tom breaks Myrtle's nose and departs only afterward in a drunken haze."}, {"text": "Tom breaks Myrtle's nose with his open hand when she repeatedly shouts Daisy's name; Nick departs in an alcoholic haze and ends the night at Pennsylvania Station.", "isCorrect": true, "rationale": "Fitzgerald writes that when Myrtle shouts “Daisy! Daisy! Daisy!” Tom “make[s] a short deft movement” and “break[s] her nose with his open hand.” Nick departs with Mr. McKee and is later shown half-asleep at Pennsylvania Station."}, {"text": "The police arrive and arrest Tom for hosting an illegal drinking party during Prohibition.", "isCorrect": false, "rationale": "No police arrive. The party dissolves into violence when Tom strikes Myrtle, not through law enforcement intervention."}]}, {"question": "Myrtle explains why she married George Wilson. What does her explanation reveal about her self-image?", "options": [{"text": "She says she loved George deeply; her explanation reveals genuine regret at the loss of that love.", "isCorrect": false, "rationale": "Myrtle emphatically denies ever being crazy about George: “Who said I was crazy about him? I never was any more crazy about him than I was about that man there,” pointing at Nick."}, {"text": "She says she thought he was a gentleman who knew about breeding, but he borrowed a suit for their wedding without telling her; her explanation reveals she believes she married beneath herself.", "isCorrect": true, "rationale": "Myrtle says, “I married him because I thought he was a gentleman” and “knew something about breeding, but he wasn't fit to lick my shoe.” She describes discovering he borrowed his wedding suit as the moment she knew she had made a mistake."}, {"text": "She says she married George for economic security and admits it was a practical decision she does not regret.", "isCorrect": false, "rationale": "Myrtle does not frame her marriage as a practical decision. She presents herself as someone who mistakenly thought she was marrying up but was deceived."}, {"text": "She refuses to discuss her marriage with anyone; her silence reveals the depth of her shame.", "isCorrect": false, "rationale": "Myrtle discusses her marriage at length and with evident feeling. Her explanation is detailed and passionate, not silent."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
