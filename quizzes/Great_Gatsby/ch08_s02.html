    };

<body>
<div class="quiz-container">

        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 7: Literary Analysis</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What literary function does the extreme summer heat serve throughout Chapter 7?", "options": [{"text": "It is a realistic weather detail with no symbolic significance.", "isCorrect": false, "rationale": "The analysis explicitly states that heat is used as “both atmospheric device and symbolic pressure,” not mere realism."}, {"text": "It signals that autumn and death are coming, preparing the reader for Gatsby’s end.", "isCorrect": false, "rationale": "While autumn does signal death later, the heat in Chapter 7 functions as immediate symbolic pressure—it makes the world feel like it is about to crack apart, not as a seasonal foreshadowing."}, {"text": "It serves as both atmospheric device and symbolic pressure, suggesting a world about to crack apart.", "isCorrect": true, "rationale": "The analysis states that Fitzgerald uses “the oppressive summer heat as both atmospheric device and symbolic pressure,” and that every detail contributes “to the sense of a world about to crack apart.”"}, {"text": "It represents Nick’s moral discomfort and his guilt about keeping Gatsby’s secrets.", "isCorrect": false, "rationale": "The heat is not specifically tied to Nick’s guilt. It functions as a broader environmental and symbolic force pressing on all the characters."}]}, {"question": "According to the literary analysis, what is the real nature of the contest between Gatsby and Tom in Chapter 7?", "options": [{"text": "It is fundamentally about Daisy’s affections and which man she truly loves.", "isCorrect": false, "rationale": "The analysis explicitly states that the contest “is not fundamentally about Daisy;” it is about class and the legitimacy that old money confers."}, {"text": "It is fundamentally about class—old money versus self-invented wealth.", "isCorrect": true, "rationale": "The analysis states: “the contest between Gatsby and Tom is not fundamentally about Daisy; it is about class.” Tom wins through “the sheer gravitational weight of his social position,” not superior love or virtue."}, {"text": "It is fundamentally a moral contest between honesty and deception.", "isCorrect": false, "rationale": "The analysis notes that “both are morally compromised.” The contest is about class and institutional legitimacy, not personal virtue."}, {"text": "It is fundamentally about legal power, since Tom can have Gatsby arrested for bootlegging.", "isCorrect": false, "rationale": "Tom’s weapon is social exposure, not legal prosecution. The analysis describes his victory as resting on “inherited legitimacy” and “institutional connections,” not legal authority."}]}, {"question": "How does Fitzgerald use Tom Buchanan as a foil to Gatsby in Chapter 7?", "options": [{"text": "Tom is kind and generous where Gatsby is cruel, showing contrasting personalities.", "isCorrect": false, "rationale": "Neither man is portrayed as kind. The foil relationship is about the legitimacy of their wealth, not their personalities."}, {"text": "Tom represents old money whose respectability is established, while Gatsby’s new wealth lacks institutional defense against exposure.", "isCorrect": true, "rationale": "The analysis states: “Fitzgerald uses Tom as a foil to Gatsby: both are morally compromised, but Tom’s wealth is old enough to be respectable, while Gatsby’s is not.”"}, {"text": "Tom is physically strong where Gatsby is intellectual, showing two American ideals in conflict.", "isCorrect": false, "rationale": "The foil is economic and social, not physical versus intellectual. Both men are morally compromised; the distinction is the age and legitimacy of their money."}, {"text": "Tom is a Westerner adapting to Eastern life, while Gatsby is a native Easterner at home in his world.", "isCorrect": false, "rationale": "This is reversed: Gatsby is from the Midwest (James Gatz from North Dakota), while Tom is from old Eastern money. But the foil is about wealth legitimacy, not regional origin."}]}, {"question": "What is the dramatic irony in the final scene of Chapter 7, where Gatsby stands outside the Buchanans’ house?", "options": [{"text": "The reader knows Myrtle survived the accident, but Gatsby believes she is dead.", "isCorrect": false, "rationale": "There is no such reversal. Myrtle is dead. The dramatic irony concerns Gatsby’s belief that he is protecting Daisy while she has already reconciled with Tom."}, {"text": "Gatsby believes he is protecting Daisy, but Nick can see through the window that Tom and Daisy are already conspiring together.", "isCorrect": true, "rationale": "The analysis describes this precisely: “Gatsby believes he is protecting Daisy, but Nick sees through the pantry window that Tom and Daisy are ‘conspiring together.’ Gatsby is… ‘watching over nothing.’”"}, {"text": "Gatsby knows Daisy is with Tom but pretends not to care, deceiving Nick.", "isCorrect": false, "rationale": "Gatsby does not know what is happening inside. The irony is that he genuinely believes he is keeping watch while Daisy has already returned to Tom."}, {"text": "Nick knows Gatsby will be killed the next day, but Gatsby plans a hopeful future with Daisy.", "isCorrect": false, "rationale": "Nick does not know this at the end of Chapter 7. The specific dramatic irony identified in the analysis is Gatsby’s vigil over an already-abandoned dream."}]}, {"question": "What does the analysis mean when it says Daisy’s “courage disintegrates” during the Plaza Hotel confrontation?", "options": [{"text": "Daisy physically collapses from the heat and cannot speak for herself.", "isCorrect": false, "rationale": "The collapse is emotional and moral, not physical. When Tom attacks Gatsby’s background and exposes his bootlegging, Daisy withdraws from her earlier declaration of love."}, {"text": "Daisy had been willing to tell Tom she never loved him, but when Tom exposes Gatsby’s criminal ties and background, she retreats.", "isCorrect": true, "rationale": "The analysis describes how Tom wins not through superior love but through exposure of Gatsby’s bootlegging. Against this, “Daisy’s courage disintegrates.” She cannot sustain her declaration once Gatsby’s invented identity is destroyed."}, {"text": "Daisy decides she loves Tom more than Gatsby and calmly chooses to stay with her husband.", "isCorrect": false, "rationale": "The analysis does not portray Daisy as making a calm decision. Her failure is a collapse under pressure, not a reasoned choice."}, {"text": "Daisy leaves the hotel room before the confrontation ends, refusing to hear any more.", "isCorrect": false, "rationale": "Daisy does not leave mid-confrontation. She is present for the full scene; her disintegration is her failure to maintain her earlier declaration of love for Gatsby."}]}, {"question": "The analysis describes Gatsby’s vigil at the end of Chapter 7 as “watching over nothing.” What does this phrase convey about the novel’s central theme?", "options": [{"text": "That Gatsby has given up on his dream and accepts that Daisy will not leave Tom.", "isCorrect": false, "rationale": "Gatsby has not given up—he still believes he is protecting Daisy. The phrase “watching over nothing” is Nick’s ironic observation that the dream has been abandoned by its object."}, {"text": "That the dream Gatsby guards has already been abandoned by the person for whom it was built, making his devotion tragically futile.", "isCorrect": true, "rationale": "The analysis states Gatsby is “guarding a dream that has already been abandoned by the person for whom it was built,” crystallizing the theme that the idealized past cannot be recovered."}, {"text": "That Gatsby is literally watching an empty house, since the Buchanans have already left for the night.", "isCorrect": false, "rationale": "The Buchanans have not left; Tom and Daisy are inside. The phrase is thematic, not literal—the “nothing” refers to the dream, not the physical house."}, {"text": "That Nick has lost all respect for Gatsby and dismisses his vigil as pointless obsession.", "isCorrect": false, "rationale": "Nick’s view is more complex—he disapproves of Gatsby but also pities him. The phrase is not a dismissal but a tragic observation about the fate of the dream."}]}, {"question": "How does the theme of “carelessness” operate in the catastrophic final movement of Chapter 7?", "options": [{"text": "Carelessness is shown through Gatsby’s reckless driving, which causes the accident.", "isCorrect": false, "rationale": "Gatsby is not driving. Daisy is. The carelessness belongs to the Buchanans, who cause destruction and then escape all consequences."}, {"text": "Daisy kills Myrtle and Tom directs Wilson’s suspicion to the yellow car; neither Buchanan bears any consequence while Gatsby is prepared to take the blame.", "isCorrect": true, "rationale": "The analysis identifies this as the theme of carelessness Nick will later make explicit: “Daisy kills Myrtle… then retreats into the safety of Tom’s house. Tom directs Wilson’s suspicion… Neither Buchanan bears any consequence."}, {"text": "Carelessness is Nick’s fault—he should have warned Myrtle to stay off the road.", "isCorrect": false, "rationale": "Nick bears no responsibility for Myrtle’s death. The carelessness is the Buchanans’—they cause harm and retreat into their wealth."}, {"text": "Carelessness refers only to Jordan Baker’s habit of driving dangerously, which foreshadows the accident.", "isCorrect": false, "rationale": "Jordan’s driving is mentioned as a character trait earlier in the novel, but the carelessness in Chapter 7 belongs specifically to the Buchanans’ pattern of causing harm without consequence."}]}, {"question": "What does the setting detail of “the Wedding March drifting up from the ballroom below” during the Plaza Hotel confrontation contribute to the chapter’s meaning?", "options": [{"text": "It reminds the characters of Tom and Daisy’s wedding, which Tom invokes to reassert his claim over Daisy.", "isCorrect": false, "rationale": "Tom does not invoke their wedding directly. The Wedding March is part of the scene’s atmospheric pressure, not a conscious symbol Tom employs."}, {"text": "It signals that Gatsby and Daisy are about to get married, ironically contrasting the scene’s destruction.", "isCorrect": false, "rationale": "There is no marriage about to occur. The irony is subtler: a wedding anthem plays while a marriage disintegrates and a dream collapses."}, {"text": "It contributes to the chapter’s atmosphere of a world about to crack apart, ironically underscoring the collapse of Gatsby’s dream with marital imagery.", "isCorrect": true, "rationale": "The analysis lists the Wedding March as one of the details Fitzgerald orchestrates to create “the sense of a world about to crack apart.” Wedding music scoring the destruction of Gatsby’s hope for Daisy is a deliberate ironic juxtaposition."}, {"text": "It is a realistic detail that anchors the scene in the Plaza Hotel and has no thematic weight.", "isCorrect": false, "rationale": "The analysis presents every such detail as purposeful. Fitzgerald’s narrative control ensures that even environmental details carry thematic meaning."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
