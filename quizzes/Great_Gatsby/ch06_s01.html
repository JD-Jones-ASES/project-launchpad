<body>

        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>

        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 5: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When Nick arrives home at two o’clock in the morning on the night before the tea, what unexpected sight greets him?", "options": [{"text": "Gatsby’s house is dark and completely silent, as if abandoned.", "isCorrect": false, "rationale": "The opposite is true. Nick sees Gatsby’s house “blazing with light” from tower to cellar, which at first makes him afraid his own house is on fire."}, {"text": "Gatsby’s house is blazing with light from tower to cellar, though completely silent.", "isCorrect": true, "rationale": "Nick narrates: “Two o’clock and the whole corner of the peninsula was blazing with light.” There is no party—“only wind in the trees”—and Gatsby himself walks toward Nick across the lawn."}, {"text": "Daisy’s car is parked in Gatsby’s driveway, suggesting she has come early.", "isCorrect": false, "rationale": "Daisy does not arrive until the following afternoon at tea time. The blazing house reflects Gatsby’s nervous anticipation, not Daisy’s early arrival."}, {"text": "A crowd of uninvited guests is still milling around Gatsby’s lawn after a party.", "isCorrect": false, "rationale": "There is no party and no crowd. The eerie detail is that the house blazes with light in total silence, suggesting Gatsby has been anxiously “glancing into rooms.”"}], "id": "q01"}, {"question": "On the day of the tea, what unusual thing does Gatsby send to Nick’s house in the morning?", "options": [{"text": "A crate of champagne and crystal glasses from his cellars.", "isCorrect": false, "rationale": "No champagne arrives in the morning. Gatsby sends a man with a lawn-mower to cut Nick’s grass, followed later by a greenhouse’s worth of flowers."}, {"text": "A man with a lawn-mower to cut Nick’s grass.", "isCorrect": true, "rationale": "At eleven o’clock a man arrives dragging a lawn-mower, sent by Gatsby. Nick realizes this refers to the “sharp line where my ragged lawn ended and the darker, well-kept expanse of his began,” which Gatsby had mentioned wanting cut."}, {"text": "A personal note apologizing for his nervous behavior the night before.", "isCorrect": false, "rationale": "No written note is sent. Gatsby’s preparations are physical and practical: lawn-mowing and a greenhouse delivery of flowers, showing his anxiety through action rather than words."}, {"text": "A tailor with a new suit for Nick to wear during the meeting.", "isCorrect": false, "rationale": "No tailor is sent. It is Gatsby himself who arrives wearing a white flannel suit, silver shirt, and gold-colored tie. Nick’s appearance is not part of Gatsby’s preparations."}], "id": "q02"}, {"question": "How does Gatsby first appear when he arrives at Nick’s house for the tea?", "options": [{"text": "Confident and polished, smiling broadly and making easy conversation.", "isCorrect": false, "rationale": "Gatsby is the opposite of confident. He arrives in a white flannel suit but is “pale,” with “dark signs of sleeplessness beneath his eyes,” and “hurried in” anxiously."}, {"text": "Pale and sleepless, hurrying in with visible anxiety.", "isCorrect": true, "rationale": "Nick describes Gatsby as arriving “pale” with “dark signs of sleeplessness beneath his eyes.” He asks immediately, “Is everything all right?” confirming his extreme nervousness."}, {"text": "Late and disheveled, having apparently overslept.", "isCorrect": false, "rationale": "Gatsby is not late—he arrives an hour before Daisy, at two o’clock. He is not disheveled but carefully dressed; his anxiety is emotional, not physical."}, {"text": "Formal and cold, maintaining a stiff professional manner throughout.", "isCorrect": false, "rationale": "Gatsby’s manner is anxious and unsteady, not formal and cold. He nearly leaves before Daisy arrives, claiming “nobody’s coming” and “it’s too late.”"}], "id": "q03"}, {"question": "What happens when Gatsby and Daisy first see each other in Nick’s living room?", "options": [{"text": "They embrace immediately and begin talking as if no time has passed.", "isCorrect": false, "rationale": "The reunion is not warm and immediate. Gatsby is “pale as death” and standing in a puddle of water; the initial atmosphere is one of agonizing awkwardness and stilted conversation."}, {"text": "The meeting is extremely awkward: Gatsby nearly knocks over the mantelpiece clock, conversation is stilted, and Daisy sits “frightened but graceful.”", "isCorrect": true, "rationale": "Nick describes Gatsby “reclining against the mantelpiece in a strained counterfeit of perfect ease,” the clock tilting dangerously, and the conversation reduced to “We’ve met before” and “Five years next November.”"}, {"text": "Daisy faints from shock upon seeing Gatsby, requiring Nick to revive her.", "isCorrect": false, "rationale": "Daisy does not faint. She sits “frightened but graceful on the edge of a stiff chair” while Gatsby stands rigidly at the mantelpiece. The moment is awkward, not dramatic in that way."}, {"text": "Gatsby bursts into tears and cannot speak, forcing Daisy to comfort him.", "isCorrect": false, "rationale": "It is Gatsby who remains stiffly controlled while later whispering to Nick in the kitchen that it is “a terrible, terrible mistake.” Daisy eventually cries, but not at the first moment."}], "id": "q04"}, {"question": "What does Nick observe has changed when he returns to the room after leaving Gatsby and Daisy alone for half an hour?", "options": [{"text": "Gatsby has left, and Daisy is alone and distressed.", "isCorrect": false, "rationale": "Gatsby has not left. When Nick returns he finds them sitting at either end of the couch: Daisy’s face is smeared with tears, but Gatsby “literally glowed” with radiant happiness."}, {"text": "The awkwardness has completely transformed: Gatsby glows with joy and Daisy’s tear-streaked face shows unexpected happiness.", "isCorrect": true, "rationale": "Nick narrates: “he literally glowed; without a word or a gesture of exultation a new well-being radiated from him.” Daisy’s face is smeared with tears but she is joyful, telling Gatsby, “I’m glad, Jay.”"}, {"text": "They are arguing heatedly about the years they have been apart.", "isCorrect": false, "rationale": "There is no argument. The text describes the opposite of conflict: a transformed, intimate atmosphere in which “every vestige of embarrassment was gone.”"}, {"text": "Daisy has called for her car and is preparing to leave.", "isCorrect": false, "rationale": "Daisy is not leaving. She stays to tour Gatsby’s mansion, and the afternoon continues with the famous shirt scene and the moment at the window pointing out the green light."}], "id": "q05"}, {"question": "What causes Daisy to burst into tears during the tour of Gatsby’s mansion?", "options": [{"text": "She sees a portrait of herself hanging in his bedroom.", "isCorrect": false, "rationale": "No portrait of Daisy hangs in his bedroom. The portrait there is of Dan Cody. The emotional climax occurs not from a portrait but from Gatsby throwing his shirts onto a table."}, {"text": "She is overwhelmed by the beauty of Gatsby’s shirts, piled in many-colored stacks.", "isCorrect": true, "rationale": "Gatsby throws pile after pile of shirts—“shirts of sheer linen and thick silk and fine flannel” in coral, apple-green, lavender, and faint orange—and Daisy buries her face in them, sobbing: “It makes me sad because I’ve never seen such—such beautiful shirts before.”"}, {"text": "She reads old love letters Gatsby has kept from their time together in Louisville.", "isCorrect": false, "rationale": "No love letters appear in this scene. Gatsby does show her newspaper clippings about herself, but it is the shirts—material objects of extraordinary abundance—that provoke her tears."}, {"text": "She realizes Gatsby has been watching her house for years from across the bay.", "isCorrect": false, "rationale": "Daisy learns about the green light at the window, not about Gatsby watching her. The shirt scene is an independent emotional moment that precedes the green light revelation."}], "id": "q06"}, {"question": "What does Gatsby point out from the window of his mansion, and what does he say about it?", "options": [{"text": "The valley of ashes, which he says reminds him of the emptiness beneath the American Dream.", "isCorrect": false, "rationale": "The valley of ashes is not visible from Gatsby’s window; it is seen from the road between West and East Egg. Gatsby points to Daisy’s dock across the bay."}, {"text": "The green light at the end of Daisy’s dock, which he says was visible all night.", "isCorrect": true, "rationale": "Gatsby tells Daisy: “You always have a green light that burns all night at the end of your dock.” Nick observes that “the colossal significance of that light had now vanished forever” now that Daisy stands beside him."}, {"text": "Tom Buchanan’s East Egg mansion, and declares he will someday surpass it.", "isCorrect": false, "rationale": "Gatsby does not point out Tom’s mansion or make any declaration of rivalry at this moment. His observation is intimate and directed at Daisy, about the green light."}, {"text": "His hydroplane docked on the Sound, offering to take Daisy for a ride.", "isCorrect": false, "rationale": "The hydroplane is mentioned as something they plan to see on the grounds tour, but rain prevents it. Gatsby’s window observation is specifically about the green light on her dock."}], "id": "q07"}, {"question": "As Nick departs at the end of Chapter 5, what expression does he see cross Gatsby’s face?", "options": [{"text": "Pure, unclouded happiness as he holds Daisy’s hand.", "isCorrect": false, "rationale": "While Gatsby holds Daisy’s hand and has known great joy, Nick observes something more complicated: “a faint doubt had occurred to him as to the quality of his present happiness.”"}, {"text": "A flicker of bewilderment, suggesting a faint doubt about the quality of his happiness.", "isCorrect": true, "rationale": "Nick describes: “I saw that the expression of bewilderment had come back into Gatsby’s face, as though a faint doubt had occurred to him as to the quality of his present happiness.” This hints that Daisy may have “tumbled short of his dreams.”"}, {"text": "Anger at being interrupted by Klipspringer’s out-of-practice piano playing.", "isCorrect": false, "rationale": "Gatsby is the one who summons Klipspringer to play; any irritation at the poor performance is minor. The expression Nick notes is bewilderment about his own happiness, not anger at the pianist."}, {"text": "Sadness that Nick is leaving and the afternoon is ending.", "isCorrect": false, "rationale": "The emotion Nick identifies is not sadness at Nick’s departure but a deeper, inward bewilderment—a hint that even in the moment of triumph Gatsby senses the gap between the real Daisy and his five-year dream."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
