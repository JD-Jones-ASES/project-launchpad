<script>
var QUESTIONS = [{"question": "What literary accomplishment does the analysis identify in the final pages of Chapter 9?", "options": [{"text": "Fitzgerald resolves all of the novel’s moral questions by having Nick deliver a clear judgment on each character.", "isCorrect": false, "rationale": "Nick delivers a judgment on Tom and Daisy, but the novel’s closing movement is not about resolving moral questions—it expands the story into a meditation on America itself."}, {"text": "Fitzgerald lifts a story about one man’s failed romance into a meditation on the meaning of America, connecting Gatsby’s dream to the original wonder of the Dutch sailors.", "isCorrect": true, "rationale": "The analysis calls this “one of the most remarkable feats of expansion in American fiction”—moving from individual tragedy to national myth by linking the green light to the “fresh, green breast of the new world” the Dutch sailors first saw."}, {"text": "Fitzgerald achieves a complete formal symmetry by ending the novel exactly where it began, with Nick arriving in West Egg.", "isCorrect": false, "rationale": "The novel does not end where it began in a simple circular structure. Nick departs for the Midwest, and the ending’s movement is expansive and philosophical, not symmetrical."}, {"text": "Fitzgerald provides a detailed social critique of the American class system through Nick’s confrontation with Tom on Fifth Avenue.", "isCorrect": false, "rationale": "The Tom confrontation is part of the denouement, but the “most remarkable feat” identified in the analysis is the final beach meditation that elevates the novel to national mythology."}]}, {"question": "According to the analysis, what connects the green light at the end of Daisy’s dock to the “fresh, green breast of the new world” seen by the Dutch sailors?", "options": [{"text": "Both are located in West Egg, so the geography links them.", "isCorrect": false, "rationale": "The connection is not geographic but thematic and imagistic. The color green unites them—both represent projected desires and the promise of an ideal that is already a fantasy."}, {"text": "The color green unites them, and both represent projected desire—Gatsby looks at Daisy and sees an ideal, just as the Dutch sailors looked at the land and projected their own desires onto it.", "isCorrect": true, "rationale": "The analysis states: “The green light, the green breast of the new world: the color unites them,” and both visions are fantasies—“the Dutch sailors’ vision was already a fantasy” just as Gatsby’s is."}, {"text": "Both are described as unreachable, showing that Fitzgerald believes in an unbridgeable gap between aspiration and achievement.", "isCorrect": false, "rationale": "While the green light does recede, the analysis focuses on the color connection and the shared nature of projected desire, not on unreachability as the linking concept."}, {"text": "Both represent the West—the sailors coming from the West, and the green light marking Gatsby’s Midwestern dream.", "isCorrect": false, "rationale": "The Dutch sailors came from the East (Europe), not the West. The analysis links them through the color green and the nature of projected desire, not through directional symbolism."}]}, {"question": "The analysis argues that Gatsby is both “great and doomed.” What constitutes his greatness, and what constitutes his doom?", "options": [{"text": "His greatness is his wealth; his doom is that it was obtained through crime.", "isCorrect": false, "rationale": "The analysis does not frame greatness as wealth. Gatsby’s greatness is his capacity to dream with purity and intensity; his doom is the nature of the dream itself."}, {"text": "His greatness is the purity and intensity of his capacity to dream; his doom is that the dream is located in a past moment that cannot be recovered.", "isCorrect": true, "rationale": "The analysis states: “His greatness lies in the purity and intensity of his capacity to dream; his doom lies in the nature of the dream itself.” He projects ideal onto real, present onto past, and wealth onto something money cannot buy."}, {"text": "His greatness is his loyalty to Daisy; his doom is that she was never worthy of his devotion.", "isCorrect": false, "rationale": "The analysis does not frame Daisy as unworthy. Gatsby’s doom is structural—the dream is located in the past and cannot be recovered—not a matter of Daisy’s unworthiness."}, {"text": "His greatness is his self-invention from poverty; his doom is that old money will always defeat new money in America.", "isCorrect": false, "rationale": "While self-invention and class are themes, the analysis identifies Gatsby’s greatness as his capacity for wonder and his doom as the nature of a dream anchored in the irretrievable past."}]}, {"question": "What does the analysis say Nick’s decision to return to the Midwest represents?", "options": [{"text": "A triumphant moral victory—Nick’s integrity is confirmed by his rejection of Eastern corruption.", "isCorrect": false, "rationale": "The analysis explicitly rejects this reading: Nick’s departure is “not a triumph but an admission.” His moral education is the knowledge of corruption and loss, not a personal vindication."}, {"text": "Not a triumph but an admission—Nick has learned that the dream corrupts, careless wealth destroys, and the past cannot be recovered.", "isCorrect": true, "rationale": "The analysis states: “His decision to return to the Midwest is not a triumph but an admission: the moral education the novel has given him is the knowledge that the dream corrupts, that careless wealth destroys, and that the past… cannot be recovered.”"}, {"text": "A practical decision driven by financial necessity, since Nick has failed in the bond business.", "isCorrect": false, "rationale": "The return is a moral and psychological choice, not a financial one. The analysis frames it as an admission about what Nick has learned from his time in the East."}, {"text": "An act of cowardice—Nick flees the consequences of his role in Gatsby’s death rather than staying to face them.", "isCorrect": false, "rationale": "The analysis does not frame Nick’s departure as cowardice. His role in Gatsby’s death is limited; his departure is a response to disillusionment, not flight from accountability."}]}, {"question": "How does the final word of the novel—“past”—function as both subject and verdict?", "options": [{"text": "As “subject” because the novel is about historical events, and as “verdict” because Nick judges Gatsby’s past to have been wasted.", "isCorrect": false, "rationale": "The analysis’ meaning of “past” is larger. It is the subject of the novel (the impossibility of recovering what is gone) and its verdict (the dream is always behind us, not ahead)."}, {"text": "As “subject” because the entire novel concerns the futile attempt to recover or repeat the past, and as “verdict” because the novel’s final judgment is that this pursuit is the condition of all human striving.", "isCorrect": true, "rationale": "The analysis states: “The novel’s final word, ‘past,’ is both its subject and its verdict.” The subject is the attempt to recover what is gone; the verdict is that we are all borne back into it."}, {"text": "As “subject” because Nick is remembering past events, and as “verdict” because the novel’s events confirm that memory is unreliable.", "isCorrect": false, "rationale": "Memory’s reliability is not the analysis’ focus here. The subject/verdict framework concerns the dream and time, not epistemological questions about memory."}, {"text": "As “subject” because Gatsby lives in the past, and as “verdict” because Fitzgerald condemns nostalgia as a moral failing.", "isCorrect": false, "rationale": "Fitzgerald does not reduce the novel to a condemnation of nostalgia. The verdict is more universal—all human beings are caught in the current of time, pulled back toward origins of their dreams."}]}, {"question": "What does the denouement of Chapter 9 systematically accomplish, according to the analysis?", "options": [{"text": "It redeems several characters by showing that they have learned from Gatsby’s example.", "isCorrect": false, "rationale": "No character is redeemed. The analysis says the denouement “systematically strips away any remaining illusion” rather than offering redemption."}, {"text": "It systematically strips away remaining illusion: Tom’s guilt-free confession, Jordan’s brittle farewell, the empty mansion, and the obscene word on the steps all confirm that the dream corrupts.", "isCorrect": true, "rationale": "The analysis states: “The denouement of the plot—Tom’s guilt-free confession, Jordan’s brittle farewell, the empty mansion, the obscene word scrawled on the steps—systematically strips away any remaining illusion.”"}, {"text": "It restores moral order by ensuring that Tom faces some public accountability for his role in Wilson’s actions.", "isCorrect": false, "rationale": "Tom faces no public accountability. His conversation with Nick is private, and he remains entirely unpunished. The denouement confirms the theme of careless wealth’s impunity."}, {"text": "It provides narrative closure by revealing what happened to every character after Gatsby’s death.", "isCorrect": false, "rationale": "The denouement does not account for all characters systematically. Its function identified in the analysis is to strip away illusion, not to provide a tidy accounting of fates."}]}, {"question": "Why does the analysis describe the East as “haunted” and “distorted” for Nick after Gatsby’s death?", "options": [{"text": "Because Nick literally sees Gatsby’s ghost in the East Egg mansions.", "isCorrect": false, "rationale": "There is no literal haunting. Nick does imagine hearing music from Gatsby’s garden, but the haunting and distortion are psychological and thematic—the gap between Eastern promise and Eastern reality."}, {"text": "Because the East has come to embody the gap between promise and reality—a world where the dream is shown to be founded on corruption and indifference.", "isCorrect": true, "rationale": "The analysis states Nick’s epiphany is “that the East… has been ‘haunted’ and ‘distorted’ by the gap between promise and reality.” The El Greco vision of West Egg—“conventional and grotesque” under a “sullen, overhanging sky”—embodies this distortion."}, {"text": "Because Nick is personally guilty about his role in Gatsby’s death and cannot face his friends in New York.", "isCorrect": false, "rationale": "The analysis does not frame the haunting as guilt. Nick’s distorted vision of the East is a moral and philosophical epiphany about promise versus reality, not personal guilt."}, {"text": "Because the legal investigation into Gatsby’s death makes Nick’s life in the East impossible.", "isCorrect": false, "rationale": "No legal investigation threatens Nick. His departure is driven by disillusionment, not legal pressure."}]}, {"question": "The analysis describes Gatsby as “great” in the sense that his dream was “not merely personal but American.” What does this mean?", "options": [{"text": "It means Gatsby achieved the American Dream through hard work and deserves recognition as a national hero.", "isCorrect": false, "rationale": "Gatsby’s wealth comes through crime, not hard work alone. The “American” quality of his dream is about its structure—projecting ideal onto the real, pursuing a future grounded in the past—not about legitimate achievement."}, {"text": "It means Gatsby’s dream expressed the same longing that brought European explorers to the New World—the capacity to project ideal onto reality and pursue a receding future.", "isCorrect": true, "rationale": "The analysis states that Gatsby’s dream “was not merely personal but American—a modern expression of the same longing that drew European explorers across the Atlantic.” The green light and the green breast of the new world share this structure."}, {"text": "It means Fitzgerald is arguing that American capitalism inevitably produces men like Gatsby, making him a sociological type.", "isCorrect": false, "rationale": "While class and capitalism are themes, the analysis’ point about Gatsby being “American” is mythological and philosophical—about the nature of dreaming and the structure of hope, not economic determinism."}, {"text": "It means Gatsby’s parties represent American culture at its most abundant and generous.", "isCorrect": false, "rationale": "The parties are a performance, not genuine generosity. The American quality of Gatsby’s dream concerns his capacity for wonder and the futile pursuit of an ideal rooted in the past."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
