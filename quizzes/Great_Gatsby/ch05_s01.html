<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 4: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "At the beginning of Chapter 4, Nick records the names of Gatsby's summer guests. How does he describe the source of this list?", "options": [{"text": "He copied names from newspaper society pages.", "isCorrect": false, "rationale": "Nick does not use newspaper sources. He writes the names on the empty spaces of a time-table dated July 5th, 1922, from memory."}, {"text": "He wrote the names on the empty spaces of a time-table dated July 5th, 1922.", "isCorrect": true, "rationale": "Nick explicitly states he wrote the names on “an old time-table” headed “This schedule in effect July 5th, 1922,” which he still has though it is disintegrating."}, {"text": "He received the guest list directly from Gatsby.", "isCorrect": false, "rationale": "Gatsby never provides Nick with a formal list. Nick compiles the names himself from memory during the parties."}, {"text": "He found a printed invitation list in Gatsby’s study.", "isCorrect": false, "rationale": "There is no printed invitation list in the text. The time-table is Nick’s personal record, not a document from Gatsby."}], "id": "q01"}, {"question": "When Gatsby picks Nick up in his car and begins telling his life story, what is Gatsby’s first claim about his origins?", "options": [{"text": "He says he grew up in poverty in North Dakota.", "isCorrect": false, "rationale": "Gatsby conceals his actual North Dakota origins, which are not revealed until Chapter 6. Here he claims wealthy Midwestern ancestry."}, {"text": "He says he is the son of wealthy people in the Middle West, all now dead.", "isCorrect": true, "rationale": "Gatsby tells Nick, “I am the son of some wealthy people in the Middle West—all dead now,” establishing a fictitious background of inherited wealth."}, {"text": "He says he inherited a fortune from a British aristocrat.", "isCorrect": false, "rationale": "Gatsby does not claim British aristocratic inheritance. He claims Midwestern family wealth and an Oxford education rooted in family tradition."}, {"text": "He says he earned his money through oil and pharmaceutical businesses.", "isCorrect": false, "rationale": "Gatsby only mentions drug stores and oil much later, in Chapter 5. In Chapter 4 his autobiography centers on family wealth and wartime service."}], "id": "q02"}, {"question": "What two pieces of physical evidence does Gatsby produce during the car ride to support his account of himself?", "options": [{"text": "A war medal from Montenegro and an Oxford photograph.", "isCorrect": true, "rationale": "Gatsby shows Nick the “Orderi di Danilo” medal from Montenegro inscribed “For Valour Extraordinary” and a photograph of himself with other young men in blazers in Trinity Quad at Oxford."}, {"text": "A Ruby necklace and a British passport.", "isCorrect": false, "rationale": "Gatsby mentions collecting rubies in his autobiography, but no ruby necklace appears. He shows a medal and a photograph, not a passport."}, {"text": "A letter from an Allied general and a Yale diploma.", "isCorrect": false, "rationale": "Neither a letter from a general nor a Yale diploma appears in the text. Gatsby’s evidence consists of the Montenegro medal and the Oxford photograph."}, {"text": "A newspaper clipping about the Argonne Forest battle and a signet ring.", "isCorrect": false, "rationale": "No newspaper clipping or signet ring is produced. The physical objects Gatsby shows Nick are the medal and the photograph from Oxford."}], "id": "q03"}, {"question": "Who is Meyer Wolfshiem, and what is he most notorious for?", "options": [{"text": "He is a Broadway actor famous for his sentimental performances.", "isCorrect": false, "rationale": "Nick asks if Wolfshiem is an actor, but Gatsby corrects him. Wolfshiem is a gambler, not an actor."}, {"text": "He is a gambler who fixed the 1919 World Series.", "isCorrect": true, "rationale": "Gatsby tells Nick directly that Wolfshiem “fixed the World’s Series back in 1919,” an act Nick finds staggering because it represents the manipulation of “the faith of fifty million people.”"}, {"text": "He is a bootlegger who supplies Gatsby’s parties with alcohol.", "isCorrect": false, "rationale": "Wolfshiem’s identified profession is gambling, not bootlegging. His fixing of the World Series is the specific crime Gatsby reveals to Nick."}, {"text": "He is a corrupt police commissioner who protects Gatsby from arrest.", "isCorrect": false, "rationale": "The police commissioner Gatsby mentions is a different figure, referenced only by the white card Gatsby shows when stopped by a motorcycle officer. Wolfshiem is a gambler."}], "id": "q04"}, {"question": "What detail about Wolfshiem’s cuff buttons particularly strikes Nick?", "options": [{"text": "They are shaped like tiny dice, hinting at his gambling profession.", "isCorrect": false, "rationale": "The cuff buttons are not dice-shaped. Wolfshiem himself describes them as “the finest specimens of human molars,” a grotesque detail that hints at his criminal world."}, {"text": "They are composed of human molars.", "isCorrect": true, "rationale": "Wolfshiem proudly tells Nick, “Finest specimens of human molars,” and Nick, who had been looking at the oddly familiar pieces of ivory, now understands what they are."}, {"text": "They are solid gold engraved with his initials.", "isCorrect": false, "rationale": "The cuff buttons are made of ivory-like material identified as human molars, not gold. Wolfshiem’s gold accessories are not described in detail."}, {"text": "They are rubies set in silver, matching the gems Gatsby collects.", "isCorrect": false, "rationale": "Gatsby mentions collecting rubies in his autobiography, but Wolfshiem’s cuff buttons are human molars, not rubies, making them a disturbing symbol of the underworld."}], "id": "q05"}, {"question": "When Tom Buchanan appears at the restaurant where Nick is having lunch with Gatsby, what does Gatsby do?", "options": [{"text": "He greets Tom warmly and invites him to join their table.", "isCorrect": false, "rationale": "Gatsby does not greet Tom warmly. In fact, the encounter produces “a strained, unfamiliar look of embarrassment” on Gatsby’s face, and he quickly disappears."}, {"text": "He slips away and is no longer there when Nick turns to introduce him properly.", "isCorrect": true, "rationale": "After Nick introduces the two men and they shake hands briefly, Nick turns toward Gatsby only to find “he was no longer there”—Gatsby has vanished from the restaurant."}, {"text": "He confronts Tom about Daisy and demands a private conversation.", "isCorrect": false, "rationale": "Gatsby does not confront Tom. The encounter is brief and awkward, and Gatsby disappears rather than engaging with Tom."}, {"text": "He leaves a note with Nick asking Tom to arrange a meeting.", "isCorrect": false, "rationale": "No note is left. Gatsby simply vanishes, leaving Nick with Tom, who asks where Nick has been and why Daisy is upset he hasn’t called."}], "id": "q06"}, {"question": "According to Jordan Baker, why did Daisy attempt to back out of her wedding to Tom Buchanan?", "options": [{"text": "She discovered that Tom had been in a car accident with a hotel chambermaid.", "isCorrect": false, "rationale": "Tom’s Ventura road accident with the chambermaid happened after the wedding, not before it. The pre-wedding crisis involves a letter Daisy receives while drunk."}, {"text": "She received a letter—presumably from Gatsby—that caused her to get drunk and try to return Tom’s pearls.", "isCorrect": true, "rationale": "Jordan finds Daisy drunk the night before the wedding, holding a bottle and a letter, trying to return the pearl necklace and saying “Daisy’s change’ her mine.” The letter is understood to be from Gatsby."}, {"text": "She learned that Tom had already been engaged to another woman in Chicago.", "isCorrect": false, "rationale": "No prior engagement of Tom’s is mentioned. Daisy’s breakdown is linked to the letter she holds, which connects to her feelings for Gatsby."}, {"text": "She was pressured by her family into a marriage she never wanted.", "isCorrect": false, "rationale": "While Daisy’s mother prevented her from saying goodbye to Gatsby overseas, the specific wedding-night crisis is about a letter and her emotional bond with Gatsby, not family pressure alone."}], "id": "q07"}, {"question": "What does Jordan Baker reveal to Nick as the true reason Gatsby bought his West Egg mansion?", "options": [{"text": "He needed a large estate to host the parties that would make him famous in New York society.", "isCorrect": false, "rationale": "The parties are a means, not an end. Jordan explains the real purpose: Gatsby wanted to be directly across the bay from Daisy’s home in East Egg."}, {"text": "He bought the mansion specifically so it would be just across the bay from Daisy’s home.", "isCorrect": true, "rationale": "Jordan tells Nick plainly: “Gatsby bought that house so that Daisy would be just across the bay.” Everything—the parties, the mansion, the spectacle—was designed to be visible to Daisy."}, {"text": "He chose it because the property was once owned by Dan Cody, his old mentor.", "isCorrect": false, "rationale": "The mansion’s history is traced to a brewer, not Dan Cody. Dan Cody’s connection to Gatsby is not revealed until Chapter 6."}, {"text": "He wanted to be near Nick Carraway, whom he hoped would help him in business.", "isCorrect": false, "rationale": "Nick’s proximity is useful to Gatsby only because Nick is Daisy’s cousin. The mansion was chosen for its view of Daisy’s dock, not for any business connection to Nick."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
