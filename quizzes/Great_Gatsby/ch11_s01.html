<body>
<div class="quiz-container">

        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>

        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; The Great Gatsby: Looking Back</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The novel's three-part structure—establishment, revelation, catastrophe—mirrors the form of which literary tradition?", "options": [{"text": "The Victorian three-volume novel", "isCorrect": false, "rationale": "The three-volume novel is a publishing format, not a dramatic structure. The source explicitly identifies classical tragedy as the model Fitzgerald built upon."}, {"text": "Classical tragedy", "isCorrect": true, "rationale": "The source states that the three-act pattern mirrors the structure of classical tragedy, and that Fitzgerald “steeped in the literary tradition, built his American novel on ancient foundations.”"}, {"text": "The picaresque novel", "isCorrect": false, "rationale": "A picaresque novel follows a rogue through episodic adventures. The source does not mention this form; it ties the structure to classical tragedy."}, {"text": "The epistolary novel", "isCorrect": false, "rationale": "An epistolary novel is told through letters. The source does not connect Gatsby’s structure to this form; it points to classical tragedy."}]}, {"question": "Nick Carraway’s narrative role is best described as which of the following?", "options": [{"text": "An omniscient narrator who knows all characters’ inner thoughts", "isCorrect": false, "rationale": "Nick is not omniscient. The source notes he is simultaneously participant, observer, and narrator—limited to what he witnesses and is told."}, {"text": "A detached journalist who never becomes emotionally involved", "isCorrect": false, "rationale": "The source says Nick claims to reserve all judgments but that “the novel he writes is an act of judgment from its first sentence to its last,” indicating emotional and moral involvement."}, {"text": "Simultaneously participant, observer, and narrator—inside the story yet perpetually on its margins", "isCorrect": true, "rationale": "The source uses exactly this language, explaining that this dual role gives the novel its distinctive tension between intimacy and distance."}, {"text": "A purely objective witness whose reliability is never in question", "isCorrect": false, "rationale": "The source directly cautions that “the reader must constantly weigh Nick’s perceptions against the possibility that he is deceived, self-deceiving, or simply wrong.”"}]}, {"question": "According to the conclusion chapter, what is the fatal contradiction at the heart of Gatsby’s pursuit of the American Dream?", "options": [{"text": "His wealth was too small to impress the East Egg aristocracy", "isCorrect": false, "rationale": "The source does not describe Gatsby’s wealth as small—his parties and mansion signal lavish spending. The contradiction lies in how the wealth was acquired and what it was meant to achieve."}, {"text": "He pursued not self-improvement but the recovery of a lost love through criminally acquired wealth, and the society he sought to enter would never truly accept him", "isCorrect": true, "rationale": "The source identifies three interlocking contradictions: the wealth comes from crime, not honest industry; the goal is recovering a lost love rather than genuine self-improvement; and East Egg old money will never accept him."}, {"text": "He lacked the education and social polish required for acceptance in New York society", "isCorrect": false, "rationale": "Gatsby fabricated an Oxford background and cultivated surface polish. The source traces the contradiction to criminal wealth and an irrecoverable past, not lack of polish."}, {"text": "He spent so lavishly on parties that he eventually ran out of money", "isCorrect": false, "rationale": "The source never attributes Gatsby’s downfall to bankruptcy. The contradictions involve the source of his wealth and the nature of his dream, not overspending."}]}, {"question": "How does the novel use geography to map the American class system?", "options": [{"text": "East Egg = new money; West Egg = old money; the valley of ashes = the middle class", "isCorrect": false, "rationale": "This reverses the novel’s geography. The source states East Egg represents old money and West Egg represents new money; the valley of ashes represents those left behind by the pursuit of wealth, not the middle class."}, {"text": "East Egg = old money; West Egg = new money; the valley of ashes = those left behind by the pursuit of wealth", "isCorrect": true, "rationale": "The source maps the geography precisely: East Egg is established wealth that needs no display; West Egg is wealth that announces itself; the valley of ashes is the world of the George Wilsons, left behind entirely."}, {"text": "New York City = the upper class; both Eggs = the middle class; the valley of ashes = the working class", "isCorrect": false, "rationale": "The source describes New York as the space where all classes mingle, not an upper-class preserve. The Eggs represent distinct wealth categories, not a unified middle class."}, {"text": "All locations represent equal opportunity; geography is symbolic rather than economic", "isCorrect": false, "rationale": "The source explicitly rejects the idea of equal opportunity: “Fitzgerald understood that the American class system is not a ladder one climbs but a set of walls one cannot breach.”"}]}, {"question": "What does the green light represent in the novel’s closing reflection, and why does it “diminish” once Daisy stands beside Gatsby?", "options": [{"text": "It represents Gatsby’s criminal wealth; it diminishes because Daisy discovers how he earned his money", "isCorrect": false, "rationale": "The source links the green light to the gap between dream and possession—not to Gatsby’s criminal enterprises being exposed."}, {"text": "It represents the promise of the future; it diminishes because actual possession cannot match the power of longing—the distance between dream and its object", "isCorrect": true, "rationale": "The source states the green light “so full of promise when first glimpsed, diminishes the moment Daisy stands beside Gatsby in his mansion,” because “the distance between dream and possession is the distance the novel measures most precisely.”"}, {"text": "It represents the Buchanans’ moral carelessness; it diminishes once Gatsby realizes Daisy will never leave Tom", "isCorrect": false, "rationale": "The source associates the green light with yearning and the American Dream, not specifically with the Buchanans’ carelessness."}, {"text": "It represents Gatsby’s boyhood in North Dakota; it diminishes once he achieves the wealth he dreamed of as a child", "isCorrect": false, "rationale": "The source connects the green light to Daisy and the future, not to Gatsby’s North Dakota boyhood. It diminishes because possession cannot match aspiration."}]}, {"question": "Nick’s verdict that Tom and Daisy are “careless people” is described in the conclusion as a moral judgment on more than just two individuals. What broader indictment does it represent?", "options": [{"text": "An indictment of the criminal underworld represented by Meyer Wolfsheim", "isCorrect": false, "rationale": "The source directs the moral verdict at a social class insulated by wealth, not at organized crime. Wolfsheim is mentioned as a criminal associate but is not the target of Nick’s carelessness verdict."}, {"text": "An indictment of an entire class insulated by wealth from the consequences of its actions, raising the question of whether a society organized around wealth accumulation can produce anything else", "isCorrect": true, "rationale": "The source states that Nick’s judgment is “the novel’s moral verdict not only on two characters but on an entire class,” and asks whether “a society organized around the accumulation of wealth can produce anything other than such carelessness.”"}, {"text": "An indictment of West Egg nouveau riche culture and its ostentatious display of wealth", "isCorrect": false, "rationale": "Tom and Daisy belong to East Egg old money, not West Egg new money. The carelessness verdict targets inherited privilege, not nouveau riche display."}, {"text": "An indictment of Prohibition-era lawlessness and the bootlegging economy", "isCorrect": false, "rationale": "The source frames the carelessness verdict around wealth-based insulation from consequences, not Prohibition or bootlegging specifically."}]}, {"question": "What accounts for the remarkable resurrection of The Great Gatsby after Fitzgerald’s death?", "options": [{"text": "A major Hollywood film adaptation in the 1940s drew mass audiences back to the novel", "isCorrect": false, "rationale": "The source credits the Armed Services Editions program during World War II—not a film adaptation—with giving the novel its vast new readership."}, {"text": "The Armed Services Editions program distributed the novel to American soldiers overseas during World War II, creating a vast new readership", "isCorrect": true, "rationale": "The source states directly that the Armed Services Editions program distributed inexpensive paperbacks to soldiers, and that “The Great Gatsby was among them,” leading to a vast new readership that carried it into the literary canon by the 1950s."}, {"text": "Fitzgerald’s widow campaigned tirelessly to restore the novel’s reputation through literary journals", "isCorrect": false, "rationale": "The source does not mention Fitzgerald’s widow or literary journals. The resurrection is attributed to wartime distribution to soldiers."}, {"text": "T. S. Eliot’s public praise for the novel convinced publishers to issue a new edition in the late 1940s", "isCorrect": false, "rationale": "While the source notes that T. S. Eliot praised the novel, it credits the Armed Services Editions—not Eliot’s advocacy—as the mechanism of resurrection."}]}, {"question": "The conclusion argues that no film adaptation has fully captured the novel’s power. What does it identify as the true source of that power?", "options": [{"text": "The complexity of the love triangle between Gatsby, Daisy, and Tom", "isCorrect": false, "rationale": "The source explicitly sets aside plot complexity, noting that the story “stripped of its language, is a fairly conventional story of love, crime, and death.” The power lies elsewhere."}, {"text": "Fitzgerald’s prose—sentences that, once encountered, become permanent fixtures of the reader’s mind", "isCorrect": true, "rationale": "The source states that “no adaptation has captured the novel’s full power, because that power resides not in the plot… but in Fitzgerald’s prose,” and that the novel endures because of sentences that become permanent fixtures of the reader’s mind."}, {"text": "The authenticity of its 1920s historical setting and period detail", "isCorrect": false, "rationale": "The source does not attribute the novel’s enduring power to historical authenticity. It points specifically to the quality of Fitzgerald’s prose."}, {"text": "The moral ambiguity of Nick Carraway as an unreliable narrator", "isCorrect": false, "rationale": "While the source discusses Nick’s reliability as a narrative issue, it attributes the novel’s untranslatable power to Fitzgerald’s prose style, not to narrative technique."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
