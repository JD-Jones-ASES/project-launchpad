<script>
var QUESTIONS = [{"question": "What literary technique does Fitzgerald use by having Nick open the novel by announcing that he “reserves all judgments,” and then immediately rendering sharp judgments about almost every character?", "options": [{"text": "Foreshadowing, because Nick's early judgments predict how the characters will behave.", "isCorrect": false, "rationale": "While Nick's observations may anticipate events, the primary technique at work is not foreshadowing but a deliberate contradiction built into Nick's self-presentation as narrator."}, {"text": "Dramatic irony, because the reader knows Nick is lying about being nonjudgmental.", "isCorrect": false, "rationale": "Dramatic irony requires the reader to possess information the character does not. Here, the contradiction is visible on the surface—Nick is not lying in the conventional sense but is unconsciously revealing his own bias."}, {"text": "The establishment of an unreliable narrator, because Nick's claim of objectivity is immediately undercut by his subjective judgments, teaching the reader to read through his perspective.", "isCorrect": true, "rationale": "The analysis section explains that Nick “announces his objectivity and then immediately demonstrates his subjectivity,” establishing him as an unreliable narrator—not one who lies, but one whose biases shape every scene the reader receives."}, {"text": "Stream of consciousness, because Nick's thoughts flow without logical order.", "isCorrect": false, "rationale": "Stream of consciousness is a narrative technique mimicking unfiltered thought. Nick's narration is controlled and retrospective, not unfiltered. The technique here is unreliable narration."}]}, {"question": "What does the symbolic geography of East Egg versus West Egg represent in the novel?", "options": [{"text": "East Egg represents the future; West Egg represents the past. The geography shows America's movement toward urban modernity.", "isCorrect": false, "rationale": "The analysis reverses this interpretation. East Egg’s old-money world is associated with the entrenched past, while Gatsby's West Egg represents the dream of reinvention—though not straightforwardly “the future.”"}, {"text": "East Egg represents inherited privilege and established social position; West Egg represents new money that lacks the pedigree to gain acceptance, raising the question of whether class in America is truly fluid.", "isCorrect": true, "rationale": "The analysis states that East Egg with its “white palaces” represents “established social position and inherited privilege,” while West Egg houses “the newly rich” who have money but lack social pedigree. The division asks whether wealth alone can purchase social acceptance."}, {"text": "East Egg represents moral corruption; West Egg represents innocence. The geography maps the novel's ethical allegory.", "isCorrect": false, "rationale": "Both Eggs contain morally compromised characters. The distinction is about class and pedigree, not moral status. Reducing it to corruption vs. innocence oversimplifies the novel's geography."}, {"text": "East Egg and West Egg are virtually identical; any difference is superficial and Fitzgerald does not intend the geography to carry symbolic weight.", "isCorrect": false, "rationale": "The analysis explicitly identifies the East/West Egg division as one of the book's “central tensions” and a key site of symbolic geography throughout the novel."}]}, {"question": "What is the significance of the green light Nick sees Gatsby reaching toward at the end of Chapter 1?", "options": [{"text": "The green light signals that a ship is approaching the dock; it is a literal detail without symbolic meaning.", "isCorrect": false, "rationale": "The green light is the novel's most iconic symbol. Its significance is established in Chapter 1 and developed throughout the book as a symbol of longing and unattainable desire."}, {"text": "The green light represents Gatsby's envy of Tom Buchanan's social position.", "isCorrect": false, "rationale": "The green light is at the end of Daisy's dock, and it symbolizes Gatsby's longing for Daisy (and all she represents), not specifically envy of Tom."}, {"text": "The green light is a beacon of desire that is always visible but never reachable, establishing the novel's central symbol of longing and unattainable aspiration.", "isCorrect": true, "rationale": "The analysis identifies the green light as “the novel's most iconic symbol—a beacon of desire that is always visible and never reachable,” first glimpsed as Gatsby stretches his arms across the bay toward Daisy's dock."}, {"text": "The green light symbolizes Nick's hope that his bond business will succeed in New York.", "isCorrect": false, "rationale": "The green light is associated with Gatsby, not Nick. Nick is merely an observer when he sees Gatsby reaching toward the light across the bay."}]}, {"question": "How does Fitzgerald use physical description to characterize Tom Buchanan as a figure of privilege and menace?", "options": [{"text": "Fitzgerald describes Tom as slender and handsome, using physical attractiveness to suggest his social appeal and charm.", "isCorrect": false, "rationale": "Tom is not described as slender or primarily handsome. Fitzgerald emphasizes bulk, force, and aggression—not conventional attractiveness."}, {"text": "Fitzgerald describes Tom as stout and awkward, using physical comedy to undercut his social pretensions.", "isCorrect": false, "rationale": "Tom is not presented comically. His physical description is menacing and powerful, not awkward."}, {"text": "Fitzgerald gives Tom a “cruEl body” with enormous leverage, arrogant eyes that establish dominance, and an aggressive forward lean, using these physical details to suggest that his social power rests on physical intimidation.", "isCorrect": false, "rationale": "The physical details described are accurate, but the spelling of “cruEl” is incorrect. The correct phrasing from the text is “a cruel body.”"}, {"text": "Fitzgerald gives Tom a “cruEl body,” arrogant eyes that establish dominance, and strained riding clothes that cannot hide his power—physical details that establish his authority as rooted in force rather than merit.", "isCorrect": true, "rationale": "Nick describes Tom’s “cruEl body” (text: “a cruel body”), his “two shining arrogant eyes” that gave “the appearance of always leaning aggressively forward,” and the “great pack of muscle” beneath his clothing. These details show Tom's dominance is physical and intimidating rather than earned through intelligence or virtue."}]}, {"question": "Nick says he detected “the basic insincerity” of Daisy's performance after she confided her cynicism. What does this observation reveal about Nick's role as narrator?", "options": [{"text": "It reveals that Nick is a completely reliable narrator who correctly identifies deception wherever he finds it.", "isCorrect": false, "rationale": "If Nick were fully reliable, the novel would not complicate his narration as it does. His ability to detect Daisy's insincerity exists alongside his own blind spots and attractions, making him a complex rather than fully reliable narrator."}, {"text": "It reveals that Nick is both participant and observer: he is moved by Daisy's voice and manner, yet he also steps back to judge her performance, showing the dual stance that will define his narration throughout.", "isCorrect": true, "rationale": "The analysis explains that Nick's “physical placement in scenes (always slightly to the side, observing) mirrors his moral position: involved enough to care, detached enough to judge.” His detection of Daisy's insincerity illustrates this dual role."}, {"text": "It reveals that Nick dislikes Daisy from the start and is biased against her throughout the novel.", "isCorrect": false, "rationale": "Nick is clearly attracted to and charmed by Daisy. His detection of her insincerity exists alongside genuine admiration for her voice and presence—the complexity is exactly the point."}, {"text": "It reveals that Fitzgerald wants the reader to distrust all female characters in the novel.", "isCorrect": false, "rationale": "This interpretation reduces a complex narratorial observation to a generalization about gender. Nick's detection of insincerity is about his role as observer, not a programmatic distrust of women."}]}, {"question": "What does Daisy's murmur—her characteristically soft, compelling voice—function as in Fitzgerald's characterization?", "options": [{"text": "A sign of shyness and social anxiety that Daisy uses to avoid unwanted attention.", "isCorrect": false, "rationale": "Nick explicitly questions whether Daisy's murmur is a social calculation rather than shyness, noting it makes people lean toward her. It is a form of social power, not vulnerability."}, {"text": "A realistic detail showing Daisy's physical weakness after illness.", "isCorrect": false, "rationale": "There is no indication in the text that Daisy is physically ill. Her murmur is a deliberate characterization tool, not a medical detail."}, {"text": "A kind of enchantment that compels people toward her and makes them feel uniquely chosen, functioning as a form of social power while concealing the insincerity beneath.", "isCorrect": true, "rationale": "Nick describes Daisy’s voice as one “that men who had cared for her found difficult to forget,” containing “a singing compulsion” and “a promise” of exciting things. Even an observer notes her murmur makes people lean toward her. It is charm as power, with insincerity beneath."}, {"text": "A literary allusion to the siren figures of Greek mythology, explicitly signaling to the reader that Daisy will cause destruction.", "isCorrect": false, "rationale": "While siren-like qualities are evoked, Fitzgerald does not make an explicit mythological allusion here. The murmur functions as a characterization of social power and performed charm."}]}, {"question": "The analysis describes Nick as an “unreliable narrator” who is unreliable not because he lies but because he “selects, interprets, and arranges.” What does this distinction mean for how a reader should approach the novel?", "options": [{"text": "The reader should ignore Nick's narration entirely and reconstruct events from dialogue alone.", "isCorrect": false, "rationale": "Nick's narration is not worthless—it is essential. The point is to read it critically, attending to what he reveals about himself through his choices, not to abandon it."}, {"text": "The reader should accept Nick's judgments at face value because he is the only source of information.", "isCorrect": false, "rationale": "This is exactly the trap the novel sets. Accepting Nick uncritically means missing the ways his sympathies, attractions, and class position shape his account."}, {"text": "The reader must attend not only to what Nick reports but to how and why he reports it, recognizing that his biases, sympathies, and placement shape every scene.", "isCorrect": true, "rationale": "The analysis explains that “the reader must learn to read through Nick, attending not only to what he reports but to how and why he reports it.” This double reading—content plus perspective—is essential to understanding the novel."}, {"text": "The reader should seek an outside narrator to correct Nick's errors before drawing conclusions.", "isCorrect": false, "rationale": "There is no outside narrator in The Great Gatsby. The entire novel is filtered through Nick. The reader must develop skill in reading his narration critically."}]}, {"question": "Tom quotes racist pseudoscience at dinner, promoting white supremacist ideas. What does Fitzgerald's inclusion of this scene accomplish for the novel's characterization of Tom?", "options": [{"text": "It establishes Tom as a thoughtful intellectual whose ideas, though extreme, reflect serious engagement with the era’s debates.", "isCorrect": false, "rationale": "Fitzgerald presents Tom's ideas as pathetic rather than serious. Nick notes “something pathetic in his concentration” and reflects that Tom’s “physical egotism no longer nourished his peremptory heart.”"}, {"text": "It establishes Tom as a man whose privilege and physical dominance mask an intellectual and moral emptiness—he clings to racist ideology because his “complAcency” is no longer sufficient to sustain him.", "isCorrect": true, "rationale": "Nick observes that Tom’s complacency was “not enough to him any more” and reflects that he was “nibbling at the edge of stale ideas.” The racist ideology fills a void left by the decline of his football glory—revealing the moral vacancy beneath his authority."}, {"text": "It establishes Tom as a villain whose racism is the novel’s central moral concern.", "isCorrect": false, "rationale": "While Tom's racism is a significant character flaw, the novel's central moral concerns involve the corruption of the American Dream and the illusions sustaining it. Tom's racism is one symptom of his broader moral hollowness."}, {"text": "It establishes Tom as a comic figure whose pretensions to intellectualism are meant to be laughed at by the reader.", "isCorrect": false, "rationale": "Tom's racism is presented with more horror than comedy. The effect is not primarily humorous but revealing of the cruelty and emptiness underlying his social power."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
