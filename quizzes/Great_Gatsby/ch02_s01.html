    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 1: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What advice does Nick Carraway's father give him that Nick has carried throughout his life?", "options": [{"text": "Always work hard and you will succeed.", "isCorrect": false, "rationale": "The father's advice is not about work ethic. Nick's father specifically advises him about judgment and privilege."}, {"text": "Remember that not everyone has had the advantages you have had.", "isCorrect": true, "rationale": "Nick's father tells him, “Whenever you feel like criticizing any one, just remember that all the people in this world haven't had the advantages that you've had.” This shapes Nick's self-described habit of reserving judgment."}, {"text": "A sense of honor is the most important thing a man can have.", "isCorrect": false, "rationale": "Honor is not mentioned in the father's advice. The advice is about tolerance and recognizing unequal advantage."}, {"text": "Trust only those who have proven themselves to you.", "isCorrect": false, "rationale": "The father's advice is the opposite of suspicion—it urges empathy toward others, not distrust."}], "id": "q01"}, {"question": "Where does Nick Carraway live at the start of the story, and what distinguishes his location from his neighbor's?", "options": [{"text": "He lives in East Egg in a mansion next to Tom Buchanan.", "isCorrect": false, "rationale": "Nick lives in West Egg, not East Egg. East Egg is where the Buchanans live, and it represents old money and social prestige."}, {"text": "He lives in a small house in West Egg, squeezed between two enormous mansions.", "isCorrect": true, "rationale": "Nick rents a “weather-beaten cardboard bungalow” at eighty dollars a month in West Egg, situated next to Gatsby's colossal mansion and another large estate renting for twelve to fifteen thousand a season."}, {"text": "He lives in a Manhattan apartment he shares with coworkers.", "isCorrect": false, "rationale": "Nick considered living in the city but chose a house in a commuting town instead, specifically in West Egg on Long Island."}, {"text": "He lives on a farm in the Midwest before moving east.", "isCorrect": false, "rationale": "Nick comes from the Midwest but the novel begins after he has already moved to West Egg, Long Island, to work in the bond business."}], "id": "q02"}, {"question": "What is Tom Buchanan's most notable past achievement, and how does Nick describe his physical presence?", "options": [{"text": "He was a celebrated war hero; Nick describes him as gentle and refined.", "isCorrect": false, "rationale": "Tom is described not as gentle but as physically domineering. His notable past achievement is athletic, not military."}, {"text": "He was one of the most powerful football ends at New Haven; Nick describes him as having a “cruEl body.”", "isCorrect": false, "rationale": "The football achievement is correct, but the spelling error aside, the key detail is that Nick calls it “a cruel body,” emphasizing menace rather than merely power."}, {"text": "He was one of the most powerful football ends at New Haven; Nick describes his body as capable of enormous leverage—“a cruel body.”", "isCorrect": true, "rationale": "The text states Tom “had been one of the most powerful ends that ever played football at New Haven” and that his body suggested “enormous leverage—a cruel body,” establishing his physical intimidation from the novel's opening scenes."}, {"text": "He was a champion polo player; Nick describes him as graceful and aristocratic.", "isCorrect": false, "rationale": "Tom does play polo and brings polo ponies from Lake Forest, but his defining athletic past is football at Yale, and Nick emphasizes his cruelty, not grace."}], "id": "q03"}, {"question": "What does Jordan Baker reveal to Nick during the dinner at the Buchanans' house?", "options": [{"text": "That Gatsby is Daisy's former lover and has moved next door to be near her.", "isCorrect": false, "rationale": "This information is not revealed in Chapter 1. Jordan mentions Gatsby only when Nick says he is Gatsby's neighbor; his history with Daisy is revealed later."}, {"text": "That Tom has a woman in New York.", "isCorrect": true, "rationale": "Jordan Baker tells Nick, “Tom's got some woman in New York,” when the telephone rings during dinner, introducing Tom's affair as an open secret among those who know him."}, {"text": "That Daisy is planning to leave Tom and return to Louisville.", "isCorrect": false, "rationale": "Daisy does not announce plans to leave Tom. She confides cynicism to Nick on the porch but says nothing about leaving."}, {"text": "That Nick is rumored to be engaged to a girl back West.", "isCorrect": false, "rationale": "The engagement rumor is mentioned by Daisy and Tom at the end of the evening, not by Jordan Baker, and it is not the significant revelation of the dinner scene."}], "id": "q04"}, {"question": "What does Daisy say she hoped for when her daughter was born, and what does this reveal about her worldview?", "options": [{"text": "She hoped her daughter would be strong and independent; it reveals her feminist convictions.", "isCorrect": false, "rationale": "Daisy's wish is the opposite of independence. She expresses a resigned, cynical acceptance of women's limited roles in her world."}, {"text": "She hoped her daughter would be beautiful and well-married; it reveals her social ambition.", "isCorrect": false, "rationale": "Daisy does not explicitly mention beauty or marriage for her daughter. Her wish is darker—that her daughter would be a “fool.”"}, {"text": "She hoped her daughter would be a beautiful little fool; it reveals her cynical view that ignorance is the safest condition for women.", "isCorrect": true, "rationale": "Daisy says, “I hope she'll be a fool—that's the best thing a girl can be in this world, a beautiful little fool,” suggesting she believes intelligence only leads to pain and that women are better off oblivious to reality."}, {"text": "She hoped her daughter would leave the East; it reveals her longing to escape her marriage.", "isCorrect": false, "rationale": "Daisy's wish for her daughter does not involve geography. Her comment is about intelligence and ignorance, not location."}], "id": "q05"}, {"question": "How does Nick first observe Jay Gatsby at the end of Chapter 1?", "options": [{"text": "Gatsby is hosting a loud party on his lawn and invites Nick to join.", "isCorrect": false, "rationale": "The chapter ends with a quiet, solitary image of Gatsby—not a party. The famous parties are described beginning in Chapter 3."}, {"text": "Gatsby emerges from Nick's house and introduces himself formally.", "isCorrect": false, "rationale": "Gatsby does not visit Nick or introduce himself in Chapter 1. Nick sees him at a distance and chooses not to call out to him."}, {"text": "Gatsby is standing alone on his lawn with arms stretched toward a single green light across the bay.", "isCorrect": true, "rationale": "Nick sees a figure—which he believes is Gatsby—who “stretched out his arms toward the dark water in a curious way,” trembling as he gazed at “a single green light, minute and far away, that might have been the end of a dock.”"}, {"text": "Gatsby drives past in a yellow car and waves at Nick from the road.", "isCorrect": false, "rationale": "The yellow car appears later in the novel. At the end of Chapter 1, Gatsby is seen standing silently on his lawn, not driving."}], "id": "q06"}, {"question": "What is the geographic distinction between East Egg and West Egg, and how does Nick characterize the difference?", "options": [{"text": "East Egg is larger; West Egg is smaller. Nick sees no meaningful social difference between them.", "isCorrect": false, "rationale": "Nick explicitly identifies a profound social difference between the two Eggs despite their near-identical physical shape. The contrast is central to the novel's theme."}, {"text": "East Egg is fashionable old-money society; West Egg is less fashionable and houses the newly rich. Nick calls the contrast “bizarre and not a little sinister.”", "isCorrect": true, "rationale": "Nick describes West Egg as “the less fashionable of the two” and calls the contrast between them “bizarre and not a little sinister,” establishing the social geography that will define the novel's conflicts."}, {"text": "East Egg is on the ocean; West Egg is inland. Nick prefers West Egg for its natural beauty.", "isCorrect": false, "rationale": "Both Eggs jut into Long Island Sound, not the ocean. Nick's choice of West Egg is economic, not aesthetic preference."}, {"text": "East Egg is where new money lives; West Egg is where old money lives. Nick admires East Egg's vitality.", "isCorrect": false, "rationale": "This reverses the novel's geography. East Egg houses old money and established social prestige; West Egg is where new money, including Gatsby, resides."}], "id": "q07"}, {"question": "What does Tom Buchanan say about race during dinner, and how do the other characters respond?", "options": [{"text": "Tom quotes a scientific study on immigration; Daisy and Miss Baker argue against his views.", "isCorrect": false, "rationale": "Daisy does not argue against Tom—she deflects him with mockery, and Miss Baker is cut off before she can respond. Tom's views are not seriously challenged."}, {"text": "Tom enthusiastically promotes white supremacist pseudoscience from a book called “The Rise of the Colored Empires”; Daisy mocks him gently while the others largely deflect.", "isCorrect": true, "rationale": "Tom declares “the white race will be utterly submerged” and cites a fictional but obviously racist book. Daisy calls him “profound” sarcastically and mocks his reading of “deep books.” Nick recognizes the pathetic nature of Tom's anxious complacency."}, {"text": "Tom warns that immigrants are taking American jobs; Nick agrees with him privately.", "isCorrect": false, "rationale": "Tom's speech is about race, not immigration specifically, and Nick does not agree with him. Nick later reflects that Tom's sturdy “physical egotism” no longer sustains his heart."}, {"text": "Tom refuses to discuss race at the dinner table; his views are only hinted at through his behavior.", "isCorrect": false, "rationale": "Tom does the opposite—he raises the subject himself and argues his racist views at length, unsolicited."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
