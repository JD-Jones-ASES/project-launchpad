    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 9: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the days after Gatsby’s death, who ultimately takes charge of the funeral arrangements?", "options": [{"text": "Meyer Wolfsheim, as Gatsby’s closest business associate.", "isCorrect": false, "rationale": "Wolfsheim refuses to get involved. His letter says he “cannot get mixed up in this thing now” and he declines to attend the funeral despite Nick’s personal visit."}, {"text": "Tom Buchanan, who feels guilty for having told Wilson about Gatsby’s car.", "isCorrect": false, "rationale": "Tom feels no guilt. He and Daisy leave without a forwarding address and play no part in the funeral arrangements."}, {"text": "Nick Carraway, who finds himself alone in his responsibility for Gatsby.", "isCorrect": true, "rationale": "The chapter states that Nick found himself “on Gatsby’s side, and alone”—every practical question about Gatsby was referred to him, and he alone manages the funeral while Daisy and Tom vanish, Wolfsheim refuses, and Klipspringer calls only about shoes."}, {"text": "Henry C. Gatz, Gatsby’s father, who arrives from Minnesota in time to take over.", "isCorrect": false, "rationale": "Mr. Gatz arrives and attends the funeral, but the arrangements are made by Nick before and during his arrival. Nick is the one who organizes everything."}]}, {"question": "What does Catherine, Myrtle’s sister, tell the coroner at the inquest?", "options": [{"text": "She tells the truth: that Myrtle was having an affair with Tom Buchanan and was trying to flee her husband.", "isCorrect": false, "rationale": "Catherine does the opposite. She protects her sister’s reputation, telling the coroner that Myrtle “had never seen Gatsby” and “was completely happy with her husband.”"}, {"text": "She tells the coroner that her sister never saw Gatsby, was completely happy with her husband, and had been into no mischief.", "isCorrect": true, "rationale": "Catherine “swore that her sister had never seen Gatsby, that her sister was completely happy with her husband, that her sister had been into no mischief whatever,” convinced herself of it, and cried."}, {"text": "She collapses from drinking before she can testify and is escorted out.", "isCorrect": false, "rationale": "Catherine does arrive drunk, but she recovers enough to give testimony—in fact, she shows “a surprising amount of character” in her composed, if false, account."}, {"text": "She accuses Tom Buchanan of causing her sister’s death by luring her into the road.", "isCorrect": false, "rationale": "Catherine protects everyone by simplifying the case. She says nothing to implicate Tom and reduces Wilson to a man “deranged by grief.”"}]}, {"question": "What two items does Henry C. Gatz show Nick to demonstrate his pride in his son?", "options": [{"text": "A newspaper article about Gatsby’s parties and a letter Gatsby wrote from Oxford.", "isCorrect": false, "rationale": "Mr. Gatz shows no newspaper article or Oxford letter. His two relics are personal and domestic, not public."}, {"text": "A cracked photograph of the mansion and a boyhood schedule of self-improvement written inside a copy of Hopalong Cassidy.", "isCorrect": true, "rationale": "Mr. Gatz shows Nick a photograph of the house “cracked in the corners and dirty with many hands,” then pulls out a “ragged old copy of a book called Hopalong Cassidy” with a boyhood schedule written inside the back cover dated September 12, 1906."}, {"text": "A childhood school report card and Gatsby’s military medals from the war.", "isCorrect": false, "rationale": "Neither a report card nor military medals are mentioned. Mr. Gatz’s relics are the cracked photo and the Hopalong Cassidy schedule."}, {"text": "A telegram from the President of the United States and a large sum of cash Gatsby sent home.", "isCorrect": false, "rationale": "These items do not appear in the text. Mr. Gatz’s pride is shown through simple, personal objects—a photo and a boyhood book."}]}, {"question": "Who is the only one among Gatsby’s many former guests who attends the funeral?", "options": [{"text": "Meyer Wolfsheim, who comes despite having refused to respond to Nick’s letter.", "isCorrect": false, "rationale": "Wolfsheim does not come. He personally refuses Nick’s request, saying he “cannot get mixed up in it.”"}, {"text": "Jordan Baker, who comes to pay her respects despite her broken relationship with Nick.", "isCorrect": false, "rationale": "Jordan does not attend. Nick sees her later to formally end their relationship, separate from the funeral."}, {"text": "The owl-eyed man who had marveled over Gatsby’s real books in the library.", "isCorrect": true, "rationale": "As the small funeral procession enters the cemetery, Nick hears someone splashing after them: “It was the man with owl-eyed glasses whom I had found marvelling over Gatsby’s books in the library one night three months before.” He is the only former guest to appear."}, {"text": "Klipspringer, who arrives just before the procession leaves for the cemetery.", "isCorrect": false, "rationale": "Klipspringer calls Nick not to offer condolences but to retrieve a pair of tennis shoes he left at the mansion, and he never comes."}]}, {"question": "What does Tom Buchanan admit to Nick when Nick encounters him on Fifth Avenue in October?", "options": [{"text": "He admits that Daisy was driving the car that killed Myrtle.", "isCorrect": false, "rationale": "Tom does not admit this directly. He defends his own actions but does not acknowledge Daisy’s role as driver."}, {"text": "He admits that he told Wilson that the yellow car belonged to Gatsby, directing Wilson’s lethal suspicion toward Gatsby.", "isCorrect": true, "rationale": "Tom tells Nick: “I told him the truth… He came to the door while we were getting ready to leave” with a revolver in his pocket, and Tom directed Wilson to the yellow car’s owner—Gatsby."}, {"text": "He admits he felt guilty about Gatsby’s death and had been trying to find a way to make it right.", "isCorrect": false, "rationale": "Tom shows no guilt. He tells Nick “That fellow had it coming to him” and believes his actions were entirely justified."}, {"text": "He admits that he and Daisy conspired to frame Gatsby for Myrtle’s death.", "isCorrect": false, "rationale": "Tom does not use the word “frame.” He tells Nick he told Wilson the truth about the yellow car’s owner, which he justifies as self-defense."}]}, {"question": "How does Nick characterize Tom and Daisy Buchanan near the end of Chapter 9?", "options": [{"text": "As tragic figures who are unable to escape the consequences of their privileged upbringing.", "isCorrect": false, "rationale": "Nick does not present them as tragic. They escape all consequences entirely. His characterization is one of moral condemnation, not sympathy."}, {"text": "As careless people who smashed up things and creatures and then retreated back into their money, letting other people clean up the mess.", "isCorrect": true, "rationale": "Nick’s famous assessment: “They were careless people, Tom and Daisy—they smashed up things and creatures and then retreated back into their money or their vast carelessness… and let other people clean up the mess they had made.”"}, {"text": "As genuinely in love with each other, which explains why they stay together despite everything.", "isCorrect": false, "rationale": "Nick is not sympathetic to their bond. His characterization is one of carelessness, not love, as the force keeping them together."}, {"text": "As fundamentally decent people who made a terrible mistake and are privately suffering.", "isCorrect": false, "rationale": "There is no private suffering depicted. Tom and Daisy leave without a word, and Tom’s conversation with Nick shows no remorse—he believes his actions were justified."}]}, {"question": "What does Nick imagine when he looks at the shore on his last night in West Egg?", "options": [{"text": "He imagines Gatsby’s green light across the water and wonders if Daisy ever truly loved Gatsby.", "isCorrect": false, "rationale": "Nick does meditate on the green light, but his primary vision is of the original Dutch sailors seeing the island, which he connects to Gatsby’s capacity for wonder."}, {"text": "He imagines the Dutch sailors who first saw the fresh, green breast of the new world, linking Gatsby’s dream to the original promise of the continent.", "isCorrect": true, "rationale": "Nick imagines “the old island here that flowered once for Dutch sailors’ eyes—a fresh, green breast of the new world,” then connects this to Gatsby’s wonder when he first saw the green light at Daisy’s dock."}, {"text": "He imagines his own childhood in the Midwest and decides he never truly belonged in the East.", "isCorrect": false, "rationale": "Nick does reflect on the Midwest earlier in the chapter, but his final meditation on the shore is about the Dutch sailors and Gatsby’s dream, not his personal childhood memories."}, {"text": "He imagines Gatsby rising from the pool and walking across the water toward Daisy’s green light.", "isCorrect": false, "rationale": "There is no such resurrection image. Nick’s final vision is historical and philosophical—the Dutch sailors and the nature of the American Dream—not a supernatural apparition of Gatsby."}]}, {"question": "What is the meaning of the novel’s famous closing metaphor: “So we beat on, boats against the current, borne back ceaselessly into the past”?", "options": [{"text": "It means that Americans are uniquely unable to escape their past, unlike people from other nations.", "isCorrect": false, "rationale": "The metaphor is not about American exceptionalism in failure. It is a universal statement about the human condition—the futile effort to move forward while time pulls us backward."}, {"text": "It means that Gatsby was foolish to try to repeat the past, and Nick resolves never to make the same mistake.", "isCorrect": false, "rationale": "The metaphor does not reduce to a personal lesson for Nick. It is universal: “we beat on”—all of us—caught between striving forward and being pulled back by time and the past."}, {"text": "It captures the central paradox of human striving: we move forward with effort and hope, yet are perpetually drawn backward into the past from which our dreams originate.", "isCorrect": true, "rationale": "The metaphor—“boats against the current, borne back ceaselessly into the past”—applies to Gatsby (whose dream is rooted in a past moment) and to all human beings who pursue futures shaped by hopes located in things already gone."}, {"text": "It is a nautical metaphor suggesting that life in the East is like sailing, while the Midwest is dry land where one can stand firm.", "isCorrect": false, "rationale": "The metaphor is not a regional comparison between East and Midwest. It is a universal statement about time, hope, and the impossibility of escaping the past."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
