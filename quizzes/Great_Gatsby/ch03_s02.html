<script>
var QUESTIONS = [{"question": "What does the Valley of Ashes symbolize in the moral geography of the novel?", "options": [{"text": "Industrial progress and America's growing economic power in the 1920s.", "isCorrect": false, "rationale": "The Valley of Ashes is presented as a site of desolation and exploitation, not progress. Fitzgerald uses it to expose what lies beneath the glittering surfaces of wealth."}, {"text": "The spiritual and economic wasteland produced by the excesses of the wealthy—the hidden human cost of the prosperity that funds the parties at East and West Egg.", "isCorrect": true, "rationale": "The analysis places the Valley of Ashes “between” the worlds of wealth and the city, suggesting it is what wealth creates and ignores. The ash-gray men labor in dehumanizing conditions so that others can prosper—making it a powerful symbol of the moral cost of the American Dream."}, {"text": "The past that Gatsby is trying to escape by building a new identity in West Egg.", "isCorrect": false, "rationale": "Gatsby's past is associated with poverty in the Midwest, not the Valley of Ashes specifically. The Valley is associated primarily with the Wilsons and the cost of Tom's world."}, {"text": "Death and the afterlife, foreshadowing the multiple deaths that will occur later in the novel.", "isCorrect": false, "rationale": "While the Valley of Ashes does become associated with death, its primary symbolic function is as a moral wasteland—the hidden consequence of wealth—not a direct foreshadowing device."}]}, {"question": "The eyes of Doctor T. J. Eckleburg “brood on over the solemn dumping ground.” What do they symbolize?", "options": [{"text": "The presence of God or a moral overseer who witnesses but does not intervene in the characters’ wrongdoing.", "isCorrect": true, "rationale": "The analysis describes the eyes as “brooding over the valley of ashes like a faded, indifferent deity.” They suggest a watching presence that has lost meaning—a God who has gone blind or moved away, leaving moral oversight absent from the novel's world."}, {"text": "The media and gossip culture of the 1920s, always watching celebrities but never understanding them.", "isCorrect": false, "rationale": "The eyes are not associated with media culture. Their symbolic weight relates to moral oversight and the absence of divine judgment, not celebrity gossip."}, {"text": "Tom Buchanan's surveillance of Myrtle, suggesting he controls everything she does.", "isCorrect": false, "rationale": "The eyes are not associated with Tom's surveillance of Myrtle. They watch everyone indifferently. George Wilson actually invokes the eyes later in the novel when thinking about moral judgment."}, {"text": "Commercial culture and the replacement of spiritual values with advertising in modern America.", "isCorrect": false, "rationale": "While the eyes are literally an advertisement, their symbolic function is primarily about the absence of moral oversight. Reducing them to a critique of advertising alone misses their deeper significance as a godlike but indifferent gaze."}]}, {"question": "The analysis describes Myrtle's change from the spotted dress to cream-colored chiffon as a key moment. What literary technique does Fitzgerald use here, and what does it reveal?", "options": [{"text": "Simile: Fitzgerald compares Myrtle to a butterfly emerging from a cocoon, suggesting genuine transformation.", "isCorrect": false, "rationale": "While the transformation motif is present, the analysis does not identify a butterfly simile. The key technique is indirect characterization through clothing, and the change is performance, not genuine transformation."}, {"text": "Indirect characterization through costume: the dress change reveals that identity, in this world, is a performance that can be put on and taken off, exposing both Myrtle's aspiration and its artificiality.", "isCorrect": true, "rationale": "The analysis states that “the dress does not merely change her appearance—it changes the self she projects, as if identity were a costume to be put on and taken off.” This use of clothing as indirect characterization reveals the performative nature of class identity."}, {"text": "Foreshadowing: the cream-colored dress predicts Myrtle's death and parallels Daisy's white wardrobe.", "isCorrect": false, "rationale": "While the color parallel is interesting, the primary function of the dress change in the analysis is to reveal class performance, not to foreshadow death."}, {"text": "Symbolism: the cream color symbolizes Myrtle's purity and moral superiority to the corrupt wealthy characters.", "isCorrect": false, "rationale": "The cream dress does not symbolize purity. It symbolizes Myrtle's performed aspirations toward a class she has not achieved and cannot reach through costume alone."}]}, {"question": "How does the motif of watching or surveillance function in Chapter 2?", "options": [{"text": "Only Nick watches others; the other characters are unaware of being observed.", "isCorrect": false, "rationale": "The analysis identifies multiple instances of watching: Eckleburg's eyes, George Wilson’s unknowing gaze, and Nick’s simultaneous inside/outside position. It is not limited to Nick."}, {"text": "Watching is associated only with moral judgment; every observer in the chapter correctly identifies wrong behavior.", "isCorrect": false, "rationale": "The watching in the chapter is often indifferent or oblivious. Eckleburg's eyes are “dimmed” and ineffectual; George Wilson does not see his wife's affair; Nick observes but does not act."}, {"text": "The chapter is pervaded by watching: Eckleburg's faded eyes brood over the valley, George Wilson unknowingly watches his wife betray him, and Nick is simultaneously “within and without, enchanted and repelled.”", "isCorrect": true, "rationale": "The analysis explicitly identifies “the motif of watching” as pervading the chapter, citing Eckleburg’s eyes, Tom and Myrtle’s affair under George’s unknowing gaze, and Nick positioning himself as “within and without, simultaneously enchanted and repelled.”"}, {"text": "Watching is presented positively as an act of care and accountability in the chapter.", "isCorrect": false, "rationale": "Watching in Chapter 2 is largely ineffective or indifferent—Eckleburg’s eyes are faded and powerless; George’s watching fails to protect him. Watching here signals absence of oversight, not accountability."}]}, {"question": "Tom breaks Myrtle’s nose “with a short deft movement.” How does Fitzgerald’s narration of this violence contribute to the scene’s effect?", "options": [{"text": "The long, dramatic buildup of the act emphasizes Tom's cruelty and allows the reader to feel Myrtle's fear.", "isCorrect": false, "rationale": "The violence is narrated with brevity, not a long buildup. The analysis specifically notes that Fitzgerald uses “brevity and matter-of-fact tone” to create the effect."}, {"text": "The violence is described in grotesque detail to shock the reader and establish Tom as a villain.", "isCorrect": false, "rationale": "Fitzgerald does not linger on grotesque detail. The act is narrated in a single sentence, which is precisely what gives it its cold, revelatory power."}, {"text": "The brevity and matter-of-fact tone strip away the evening’s pretensions in one swift gesture, revealing Tom’s power as ultimately physical and Myrtle’s aspirations as existing entirely at his sufferance.", "isCorrect": true, "rationale": "The analysis states that “Fitzgerald uses this moment of violence not for shock but for clarity, exposing the brutality that the novel’s glittering surfaces work so hard to conceal.” The brevity amplifies rather than diminishes the impact."}, {"text": "The understatement signals that Nick approves of Tom’s action, showing Nick’s own complicity in the violence.", "isCorrect": false, "rationale": "Nick does not approve of Tom’s violence—he departs the scene. The understatement reflects narrative detachment, not moral approval."}]}, {"question": "The analysis describes the apartment party as “rich with irony.” Identify the central irony of Myrtle’s behavior in the apartment.", "options": [{"text": "Myrtle condemns the wealthy even while trying to imitate them, showing genuine class consciousness.", "isCorrect": false, "rationale": "Myrtle does not condemn the wealthy. She imitates them uncritically and eagerly. The irony is in how her imitation reveals the hollowness of the class she aspires to, not in any critique she offers."}, {"text": "The more elaborately Myrtle performs upper-class gentility—dismissing her expensive dress as “just a crazy old thing,” complaining about servants, holding court in cramped rooms with oversized furniture—the more clearly her performance reveals its own artificiality.", "isCorrect": true, "rationale": "The analysis notes that “every detail of her performance reveals its own artificiality.” The tapestried furniture depicts Versailles gardens; she dismisses the dress she plainly values; she gives orders as if she commanded a household staff. The performance undermines itself."}, {"text": "Myrtle’s sincerity contrasts ironically with Tom’s coldness, showing that genuine feeling can exist even in corrupt circumstances.", "isCorrect": false, "rationale": "The irony the analysis identifies is not about Myrtle’s sincerity vs. Tom’s coldness but about how Myrtle’s imitation of upper-class identity exposes its hollowness."}, {"text": "The apartment is physically small but emotionally vast, creating an irony about how love transcends material conditions.", "isCorrect": false, "rationale": "The small apartment is used ironically to expose pretension, not to suggest that love transcends material conditions. The furniture being “entire too large” satirizes Myrtle’s aspirations."}]}, {"question": "Nick says he was “within and without, simultaneously enchanted and repelled by the inexhaustible variety of life.” What does this statement reveal about his narrative role?", "options": [{"text": "It reveals that Nick is morally confused and unable to make ethical judgments about what he observes.", "isCorrect": false, "rationale": "Nick’s statement is not about moral confusion. It is about his characteristic dual position as both participant and observer—engaged but detached, which is precisely what makes him a complex narrator."}, {"text": "It reveals that Nick is physically uncomfortable and wants to leave the party.", "isCorrect": false, "rationale": "While Nick does want to leave, the statement goes beyond physical discomfort to describe his fundamental relationship to the world he observes: attracted to and repelled by it simultaneously."}, {"text": "It reveals that Nick occupies a dual position as both participant and observer throughout the novel—drawn into events by attraction or obligation yet maintaining enough detachment to judge them, a tension that defines his narration.", "isCorrect": true, "rationale": "The analysis identifies this statement as expressing Nick’s “within and without” position—the same dual stance described throughout: “involved enough to care, detached enough to judge.” It is a key statement of his narrative self-understanding."}, {"text": "It reveals that Nick deeply respects Myrtle Wilson and feels sympathy for her working-class aspirations.", "isCorrect": false, "rationale": "While Nick may feel sympathy, his statement is not specifically about Myrtle. It describes his general relationship to all the life unfolding around him—a condition of simultaneous enchantment and repulsion."}]}, {"question": "How does Fitzgerald use the space of the apartment—its furniture, decorations, and physical crowding—to develop the chapter’s themes of class and pretension?", "options": [{"text": "The apartment’s spaciousness and elegance suggest that Myrtle has genuinely achieved a degree of upper-class living through Tom’s support.", "isCorrect": false, "rationale": "The apartment is explicitly described as small. Its pretensions—oversized furniture, Versailles tapestry—are cramped into inadequate space, which is precisely the ironic effect Fitzgerald creates."}, {"text": "The apartment is described as bare and minimal, reflecting Myrtle’s honest acknowledgment of her economic situation.", "isCorrect": false, "rationale": "The apartment is crowded with oversized furniture and imitation luxury. It is the opposite of honest minimalism—it is crammed with aspirational objects that do not fit."}, {"text": "The apartment’s oversized furniture, tapestried scenes of Versailles, and cramped rooms create an ironic portrait of aspiration—the trappings of aristocracy squeezed into a working-class space, exposing the gap between Myrtle’s performance and her reality.", "isCorrect": true, "rationale": "The analysis describes the “furniture entirely too large” for the room, the tapestry depicting Versailles, and Myrtle’s imitation of a wealthy hostess in cramped quarters as details that expose “the hollowness of the class markers she imitates.” The physical space reflects the gap between aspiration and reality."}, {"text": "The apartment’s details are realistic and unironic, providing authentic documentation of middle-class life in 1920s New York.", "isCorrect": false, "rationale": "The details are carefully selected for ironic effect, not documentary realism. Fitzgerald uses the apartment’s details to satirize class performance, not simply to record working-class interiors."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
