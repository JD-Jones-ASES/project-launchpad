<script>
var QUESTIONS = [{"question": "What was the initial commercial reception of The Great Gatsby when it was published in 1925?", "options": [{"text": "It was an immediate bestseller, selling over 100,000 copies in its first year.", "isCorrect": false, "rationale": "The source states that sales were modest—“roughly 20,000 copies in the first year, far fewer than This Side of Paradise.” It was not an immediate bestseller."}, {"text": "Sales were modest—roughly 20,000 copies in the first year—and Fitzgerald was disappointed by the reception.", "isCorrect": true, "rationale": "The source explicitly states: “sales were modest—roughly 20,000 copies in the first year, far fewer than This Side of Paradise. Fitzgerald was disappointed.”"}, {"text": "The novel sold well initially but was quickly forgotten when critical reviews turned negative.", "isCorrect": false, "rationale": "The source notes that “several reviewers praised the novel’s prose and construction,” so reviews were not uniformly negative. The problem was modest sales, not a critical backlash."}, {"text": "The novel was banned in several states, which paradoxically boosted its sales.", "isCorrect": false, "rationale": "The source makes no mention of banning. The novel’s modest sales were simply a commercial disappointment, not the result of any controversy."}], "id": "q01"}, {"question": "What event triggered the resurrection of The Great Gatsby’s reputation?", "options": [{"text": "A celebrated 1950s stage adaptation brought the story to a new generation of audiences.", "isCorrect": false, "rationale": "The source does not mention a stage adaptation. The revival is attributed to the novel’s inclusion in the Armed Services Editions during World War II."}, {"text": "The Council on Books in Wartime selected it for the Armed Services Editions, distributing roughly 155,000 copies to soldiers during World War II.", "isCorrect": true, "rationale": "The source states: “The novel’s resurrection began during World War II, when the Council on Books in Wartime selected it for the Armed Services Editions—small, lightweight paperbacks distributed free to American soldiers overseas. Roughly 155,000 copies reached servicemen.”"}, {"text": "Fitzgerald’s widow Zelda campaigned for the novel’s reissue after his death.", "isCorrect": false, "rationale": "The source does not credit Zelda with any campaign to revive the novel. The revival is traced to wartime distribution by the Council on Books in Wartime."}, {"text": "A prominent university professor assigned the novel in his literature courses, sparking widespread academic interest.", "isCorrect": false, "rationale": "The source does not identify a single professor as the catalyst. The revival began with the wartime Armed Services Editions distribution."}], "id": "q02"}, {"question": "According to the source, what are the two main reasons for the novel’s extraordinary afterlife and continued relevance?", "options": [{"text": "Its scandalous subject matter and its attack on wealthy Americans made it perpetually controversial.", "isCorrect": false, "rationale": "The source does not identify controversy or scandal as the basis for the novel’s lasting appeal. It points to formal perfection and the depth of its engagement with the American Dream."}, {"text": "Its formal perfection as a compressed, precisely structured work of fewer than 50,000 words, and its profound engagement with the American Dream.", "isCorrect": true, "rationale": "The source states: “Part of the answer lies in the novel’s formal perfection: at fewer than 50,000 words, it is compressed, precisely structured, and rich in symbolic meaning. Part of the answer lies in its subject—the American Dream.”"}, {"text": "Its historical accuracy about the 1920s and its vivid biographical portrait of Fitzgerald’s own life.", "isCorrect": false, "rationale": "While the novel does have historical grounding, the source attributes its lasting appeal to formal perfection and thematic depth about the American Dream—not historical accuracy or autobiography."}, {"text": "Its simple, accessible prose style and its uplifting ending that affirms the possibility of success.", "isCorrect": false, "rationale": "The source describes the novel as “precisely structured, and rich in symbolic meaning”—not as simple. The novel’s ending is tragic, not uplifting."}], "id": "q03"}, {"question": "What makes The Great Gatsby a work of modernist literature, according to the source?", "options": [{"text": "Its celebration of industrial progress, optimistic tone, and straightforward chronological storytelling.", "isCorrect": false, "rationale": "The source associates modernism with formal experimentation, fragmented narration, and disillusionment—the opposite of optimistic, straightforward chronological narratives."}, {"text": "Its use of an unreliable narrator, non-chronological presentation of Gatsby’s history, dense symbolic patterns, and profound skepticism about recovering an idealized past.", "isCorrect": true, "rationale": "The source identifies these four modernist features explicitly: “its use of an unreliable first-person narrator, its non-chronological presentation of Gatsby’s history, its dense symbolic patterns (the green light, the eyes of Doctor T. J. Eckleburg, the valley of ashes), and its profound skepticism about the possibility of recovering an idealized past.”"}, {"text": "Its focus on working-class characters and the harsh economic realities of industrial America.", "isCorrect": false, "rationale": "The source describes modernism in terms of formal experimentation and psychological focus, not working-class subject matter. The novel centers on wealthy characters in Long Island."}, {"text": "Its rejection of symbolic language in favor of direct, realistic description of social life.", "isCorrect": false, "rationale": "The source says the opposite: the novel’s modernist credentials include its “dense symbolic patterns.” Rejection of symbolism is not listed as a modernist trait."}], "id": "q04"}, {"question": "How does the source describe Gatsby’s tragic flaw in the classical sense?", "options": [{"text": "His fatal flaw is his greed—an insatiable hunger for money and status that blinds him to genuine human connection.", "isCorrect": false, "rationale": "The source identifies a more specific flaw than greed. It describes Gatsby’s flaw as his “inability to accept that the past is past” and his insistence that “time can be reversed.”"}, {"text": "His fatal flaw is his violent temper, which ultimately alienates Daisy and triggers the novel’s catastrophe.", "isCorrect": false, "rationale": "The source does not describe violence or a temper as Gatsby’s tragic flaw. His flaw is psychological—an inability to accept the irreversibility of the past."}, {"text": "His fatal flaw is his inability to accept that the past is past—his insistence that time can be reversed and that the ideal can be made real.", "isCorrect": true, "rationale": "The source states: “His flaw is not simply his love for Daisy but his larger inability to accept that the past is past—his insistence that time can be reversed and that the ideal can be made real.”"}, {"text": "His fatal flaw is his dishonesty about his origins, which prevents him from ever truly belonging to the world he inhabits.", "isCorrect": false, "rationale": "While Gatsby does conceal his origins, the source identifies his tragic flaw not as deception but as his psychological refusal to accept that the past cannot be recaptured."}], "id": "q05"}, {"question": "The source identifies the green light as functioning like what symbol within the romance tradition?", "options": [{"text": "A lantern that guides the hero safely home after his quest is complete.", "isCorrect": false, "rationale": "The source describes the green light as something “always beckoning, never truly possessed”—the opposite of a completed, safe return. It is compared to a grail symbol, not a guiding lantern."}, {"text": "A grail symbol—always beckoning, never truly possessed.", "isCorrect": true, "rationale": "The source states: “The green light functions as a kind of grail symbol—always beckoning, never truly possessed.” This places the novel in the romance tradition of the unreachable sacred object."}, {"text": "A torch passed from one generation to the next, symbolizing the continuity of the American Dream.", "isCorrect": false, "rationale": "The source does not describe the green light as intergenerational or as a symbol of continuity. It represents an ideal that remains permanently out of reach."}, {"text": "A warning signal that the hero ignores at his peril, functioning as the novel’s primary foreshadowing device.", "isCorrect": false, "rationale": "The source associates the green light with the romance tradition and the unattainable ideal, not with warning or foreshadowing. It is compared to a grail symbol."}], "id": "q06"}, {"question": "According to the source, how does Fitzgerald’s satire in the party scenes serve a purpose beyond comedy?", "options": [{"text": "The satire establishes Gatsby as a sympathetic underdog by making the wealthy guests appear ridiculous.", "isCorrect": false, "rationale": "The source does not describe the satire’s purpose as building sympathy for Gatsby. It says the satire “serves the novel’s moral vision by revealing the hollowness behind the glittering surfaces.”"}, {"text": "The satire reveals the hollowness behind the glittering surfaces, serving the novel’s moral vision.", "isCorrect": true, "rationale": "The source states: “The satire is not merely comic; it serves the novel’s moral vision by revealing the hollowness behind the glittering surfaces.”"}, {"text": "The satire provides comic relief that balances the novel’s otherwise unrelentingly tragic tone.", "isCorrect": false, "rationale": "The source explicitly says the satire is “not merely comic”—its purpose is moral, not tonal balance. It reveals hollowness rather than providing relief from tragedy."}, {"text": "The satire allows Fitzgerald to mock the new-money class while celebrating the superior refinement of old money.", "isCorrect": false, "rationale": "The source does not suggest Fitzgerald favors old money over new money in his satire. The satire targets the superficiality and moral vacancy of the wealthy broadly, not one class over another."}], "id": "q07"}, {"question": "Which of the following best describes how the source characterizes Fitzgerald’s treatment of the American Dream in The Great Gatsby?", "options": [{"text": "Fitzgerald straightforwardly celebrates the American Dream as a noble and achievable ideal.", "isCorrect": false, "rationale": "The source says Fitzgerald “both celebrates and interrogates this dream,” and that his “ambivalence gives the novel a complexity.” A straightforward celebration misses the critical dimension."}, {"text": "Fitzgerald rejects the American Dream entirely, using Gatsby’s failure to argue it was always a lie.", "isCorrect": false, "rationale": "The source describes Fitzgerald’s stance as ambivalent, not as outright rejection. The novel is “dazzled by the beauty of Gatsby’s dream even as it exposes the corruption.”"}, {"text": "Fitzgerald both celebrates and interrogates the American Dream, and his ambivalence gives the novel a complexity that rewards repeated reading.", "isCorrect": true, "rationale": "The source states: “Fitzgerald both celebrates and interrogates this dream, and his ambivalence gives the novel a complexity that rewards repeated reading.” The novel asks whether the Dream is a noble ideal or “always, at its core, a beautiful illusion.”"}, {"text": "Fitzgerald treats the American Dream as a uniquely 1920s phenomenon that has no relevance beyond its historical moment.", "isCorrect": false, "rationale": "The source attributes the novel’s enduring relevance to its engagement with the American Dream, suggesting it has lasting significance far beyond the 1920s. This is the opposite of a historically limited treatment."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
