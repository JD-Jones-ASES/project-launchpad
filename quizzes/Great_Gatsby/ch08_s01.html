<html lang="en">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 7: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why does Gatsby dismiss all of his servants and replace them with new ones at the start of Chapter 7?", "options": [{"text": "He suspects his old servants of stealing from him.", "isCorrect": false, "rationale": "There is no mention of theft. The real motive is concealment of Daisy’s visits."}, {"text": "He wants to conceal Daisy’s afternoon visits and prevent gossip from reaching Tom.", "isCorrect": true, "rationale": "Gatsby tells Nick that “Daisy comes over quite often—in the afternoons” and that he “wanted somebody who wouldn’t gossip.”"}, {"text": "Tom Buchanan orders Gatsby to replace his staff as a condition of their meeting.", "isCorrect": false, "rationale": "Tom issues no such condition. The decision is Gatsby’s alone, motivated by Daisy’s visits."}, {"text": "The old servants refuse to work during the summer heat.", "isCorrect": false, "rationale": "The text gives no such reason. Gatsby replaces the servants specifically to keep Daisy’s presence secret."}]}, {"question": "What does Nick observe about the weather on the day of the Buchanans’ luncheon?", "options": [{"text": "It is a cool, overcast day that threatens rain.", "isCorrect": false, "rationale": "The chapter describes the opposite: “the next day was broiling, almost the last, certainly the warmest, of the summer.”"}, {"text": "It is an unseasonably cold day for summer.", "isCorrect": false, "rationale": "The chapter makes no mention of cold. The heat is oppressive and nearly unbearable throughout."}, {"text": "It is an extremely hot day—the most intense heat of the summer.", "isCorrect": true, "rationale": "Fitzgerald describes the day as “broiling, almost the last, certainly the warmest, of the summer,” and the heat pervades every scene of the chapter."}, {"text": "It is a calm, pleasant day with a cool breeze off the Sound.", "isCorrect": false, "rationale": "There is no cool breeze. The heat is oppressive even in the Buchanans’ shadowed rooms."}]}, {"question": "When the group arrives at the Buchanans’ house, what is Tom doing on the telephone?", "options": [{"text": "He is calling Myrtle Wilson to warn her to stay home.", "isCorrect": false, "rationale": "Tom is not calling Myrtle. Jordan whispers to Nick that the call is from “Tom’s girl,” suggesting it is Myrtle, but Tom is the one receiving the call."}, {"text": "He is arranging the sale of his old car to Wilson.", "isCorrect": false, "rationale": "He discusses his car with Wilson later at the garage, not on this phone call. This call is with someone pressuring him about a car sale he refuses."}, {"text": "He is angrily refusing to sell his car to someone on the other end of the line.", "isCorrect": true, "rationale": "Nick hears Tom say “I won’t sell you the car at all” and “as for your bothering me about it at lunch time, I won’t stand that at all!” Jordan suggests it is Tom’s mistress on the phone."}, {"text": "He is making a business call to New York about his stock holdings.", "isCorrect": false, "rationale": "The phone call concerns a car, not stocks. Jordan tells Nick the caller is Tom’s girl."}]}, {"question": "What does Gatsby say about Daisy’s voice when Nick and he are standing on the drive before leaving for New York?", "options": [{"text": "He says her voice is “full of money.”", "isCorrect": true, "rationale": "After Nick hesitates describing Daisy’s voice, Gatsby completes the thought: “Her voice is full of money.” Nick recognizes this as the key to Daisy’s charm."}, {"text": "He says her voice is “full of dreams.”", "isCorrect": false, "rationale": "This is not the phrase used. Gatsby’s actual description—“full of money”—links Daisy’s allure directly to wealth."}, {"text": "He says her voice is “like music.”", "isCorrect": false, "rationale": "Gatsby does not use this phrase. The precise observation is that her voice is “full of money.”"}, {"text": "He says her voice is “indiscreet,” and he wishes she would be quieter.", "isCorrect": false, "rationale": "It is Nick who calls her voice “indiscreet.” Gatsby’s famous remark is that it is “full of money.”"}]}, {"question": "How does Tom assert dominance over Gatsby when the group prepares to drive to New York?", "options": [{"text": "He challenges Gatsby to a physical fight on the lawn.", "isCorrect": false, "rationale": "There is no physical confrontation on the drive. Tom’s dominance is performed through the car swap, not a fight."}, {"text": "He insists on driving Gatsby’s yellow car himself, forcing Gatsby into the smaller coupe.", "isCorrect": true, "rationale": "Tom proposes swapping cars—he drives Gatsby’s conspicuous yellow car while Gatsby takes Tom’s coupe—a calculated gesture of control over Gatsby’s most prized possession."}, {"text": "He announces that Gatsby is not welcome in New York and refuses to go.", "isCorrect": false, "rationale": "Tom does not bar Gatsby from New York. He agrees to go and uses the car swap to assert superiority."}, {"text": "He tells Daisy to ride with Nick and Jordan, separating her from Gatsby.", "isCorrect": false, "rationale": "In fact, Daisy moves close to Gatsby and ends up riding with him in Tom’s coupe, while Tom drives Gatsby’s car with Nick and Jordan."}]}, {"question": "What is the central demand Gatsby makes of Daisy during the confrontation at the Plaza Hotel?", "options": [{"text": "He demands that Daisy agree to leave Tom immediately and move in with him.", "isCorrect": false, "rationale": "Gatsby’s specific demand is not about living arrangements but about erasing the past entirely by having Daisy disavow her love for Tom."}, {"text": "He demands that Daisy tell Tom she has never loved him.", "isCorrect": true, "rationale": "The analysis section confirms that Gatsby demands Daisy declare she never loved Tom, hoping to erase the last five years and reconstruct reality."}, {"text": "He demands that Tom publicly apologize for spreading lies about his background.", "isCorrect": false, "rationale": "Gatsby does not demand an apology from Tom. His demand is directed at Daisy—that she renounce her love for Tom."}, {"text": "He demands that Daisy return the green light to him as a symbol of their reunion.", "isCorrect": false, "rationale": "The green light is a symbolic motif, not an actual object Gatsby requests. His demand is that Daisy tell Tom she never loved him."}]}, {"question": "Who is driving Gatsby’s car when it strikes and kills Myrtle Wilson?", "options": [{"text": "Gatsby is driving, having taken the wheel from Daisy.", "isCorrect": false, "rationale": "Nick learns that Daisy was driving. Gatsby did not take the wheel; he was in the passenger seat."}, {"text": "Tom Buchanan is driving, having borrowed the car earlier.", "isCorrect": false, "rationale": "Tom drives Gatsby’s car to New York, but Daisy and Gatsby return in it. Daisy is behind the wheel when Myrtle is struck."}, {"text": "Daisy Buchanan is driving.", "isCorrect": true, "rationale": "Nick learns that Daisy was driving Gatsby’s car when it hit Myrtle. Gatsby tells Nick this later, and Gatsby is prepared to take the blame for it."}, {"text": "Jordan Baker is driving, as she is the group’s most experienced driver.", "isCorrect": false, "rationale": "Jordan is not driving the yellow car at the time of the accident. Daisy and Gatsby are returning together in the yellow car when Myrtle is struck."}]}, {"question": "What is Gatsby doing at the end of Chapter 7 while Nick watches through the kitchen window?", "options": [{"text": "He is packing his belongings, preparing to flee as Nick advised.", "isCorrect": false, "rationale": "Gatsby refuses Nick’s advice to flee. He is standing vigil outside the Buchanans’ house, not packing."}, {"text": "He is standing vigil outside the Buchanans’ house, watching over Daisy.", "isCorrect": true, "rationale": "Gatsby stands outside in the moonlight to ensure Daisy is safe, while Nick looks through the pantry window and sees Tom and Daisy sitting together at the kitchen table in “unmistakable air of natural intimacy.”"}, {"text": "He is confronting Tom at the front door, demanding a final answer from Daisy.", "isCorrect": false, "rationale": "There is no additional confrontation at the front door. Gatsby positions himself outside, watching, not confronting."}, {"text": "He is swimming in his pool, trying to cool down after the day’s events.", "isCorrect": false, "rationale": "Gatsby does not swim. He stands outside the Buchanans’ house, described as “watching over nothing” in the analysis—guarding a dream already abandoned."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
