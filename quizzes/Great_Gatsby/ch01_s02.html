        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>

        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; The Jazz Age and the 1920s</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the source identify as the defining emotional legacy of World War I for the modernist literature of the 1920s?", "options": [{"text": "A surge of patriotic pride that inspired optimistic themes in literature.", "isCorrect": false, "rationale": "The source describes the opposite effect: soldiers returned with “deep skepticism” about wartime ideals, and “postwar disillusionment is a defining feature of modernist literature.”"}, {"text": "Postwar disillusionment—a deep skepticism about the ideals of honor, duty, and glory that had sent men to war.", "isCorrect": true, "rationale": "The source states that soldiers who returned from the trenches “brought home a deep skepticism about the ideals—honor, duty, glory—that had sent them to war,” and that “postwar disillusionment is a defining feature of modernist literature.”"}, {"text": "A renewed commitment to democratic ideals and international cooperation.", "isCorrect": false, "rationale": "The source describes a collapse of faith in ideals, not a renewal of them. The war shattered “the nineteenth century’s faith in inevitable progress.”"}, {"text": "Economic anxiety as veterans struggled to find work in a postwar economy.", "isCorrect": false, "rationale": "The source focuses on psychological and moral disillusionment, not economic hardship, as the defining literary legacy of World War I."}]}, {"question": "The Eighteenth Amendment, ratified in 1919, banned alcohol in the United States. What was its most significant unintended consequence according to the source?", "options": [{"text": "It caused a sharp rise in drug use as Americans sought legal alternatives to alcohol.", "isCorrect": false, "rationale": "The source does not mention drug use as a consequence of Prohibition. The unintended consequence described is the growth of organized crime and an underground economy."}, {"text": "It created a vast underground economy of bootleggers, speakeasies, and organized crime, and fostered widespread hypocrisy.", "isCorrect": true, "rationale": "The source states that Prohibition “created a vast underground economy of bootleggers, speakeasies, and organized crime” and also “a culture of hypocrisy” in which “respectable citizens routinely broke the law.”"}, {"text": "It strengthened public morality and reduced crime in most American cities.", "isCorrect": false, "rationale": "The source describes the opposite: Prohibition led to more lawlessness, not less, by creating criminal enterprises and widespread law-breaking by ordinary citizens."}, {"text": "It led to a constitutional crisis that undermined public trust in the federal government.", "isCorrect": false, "rationale": "The source does not describe a constitutional crisis as a result of Prohibition. The consequences it identifies are criminal and social in nature."}]}, {"question": "How does the novel’s geography encode the distinction between “old money” and “new money” in 1920s society?", "options": [{"text": "Manhattan represents old money while Long Island represents new money.", "isCorrect": false, "rationale": "The source does not use Manhattan vs. Long Island to draw this distinction. The contrast is specifically between East Egg and West Egg."}, {"text": "East Egg represents old, inherited wealth such as the Buchanans, while West Egg represents new, self-made wealth such as Gatsby.", "isCorrect": true, "rationale": "The source states directly: “East Egg represents old, inherited wealth (the Buchanans), while West Egg represents new, self-made wealth (Gatsby).”"}, {"text": "The valley of ashes represents old wealth in decline, while East Egg represents the rising new rich.", "isCorrect": false, "rationale": "The source describes the valley of ashes as a zone of poverty and industrial waste, not as a symbol of old wealth. The East/West Egg distinction carries the old/new money contrast."}, {"text": "West Egg represents European aristocracy, while East Egg represents American industrial wealth.", "isCorrect": false, "rationale": "The source makes no reference to European aristocracy. West Egg is associated with self-made American wealth, and East Egg with inherited American wealth."}]}, {"question": "In the context of The Great Gatsby, what does the source suggest about Jay Gatsby’s fortune?", "options": [{"text": "The novel implies Gatsby inherited his wealth from a wealthy mentor he met while young.", "isCorrect": false, "rationale": "While the novel does include a wealthy mentor figure, the source specifically says the novel “hints” that Gatsby’s fortune is “built on illegal alcohol distribution,” connecting him to the Prohibition underground economy."}, {"text": "The novel hints that Gatsby’s fortune is built on illegal alcohol distribution, reflecting the reality of Prohibition.", "isCorrect": true, "rationale": "The source states: “Gatsby’s mysterious fortune, which the novel hints is built on illegal alcohol distribution, reflects this reality” of Prohibition’s underground economy."}, {"text": "Gatsby openly admits to bootlegging, making him a symbol of proud working-class ambition.", "isCorrect": false, "rationale": "The source describes Gatsby’s fortune as “mysterious,” not openly admitted. There is nothing in the source about working-class pride; Gatsby aspires to upper-class status."}, {"text": "The novel presents Gatsby’s wealth as legitimately earned through savvy stock market investments.", "isCorrect": false, "rationale": "The source does not describe Gatsby’s wealth as legitimate or stock-market-based. It specifically suggests an illegal source tied to Prohibition."}]}, {"question": "What role did the automobile play in 1920s America according to the source?", "options": [{"text": "It was primarily a luxury item confined to the very wealthy and had little effect on ordinary life.", "isCorrect": false, "rationale": "The source describes the automobile as having broad transformative effects on American geography and social habits, not as a luxury confined to the wealthy."}, {"text": "It transformed American geography and social habits: making suburbs possible, enabling new leisure, and serving as both a symbol of freedom and an instrument of destruction.", "isCorrect": true, "rationale": "The source states that the automobile “changed American geography and social habits: it made suburbs possible, enabled new forms of leisure, and, as The Great Gatsby vividly illustrates, became both a symbol of freedom and an instrument of destruction.”"}, {"text": "It accelerated urbanization by making it easier for rural workers to move to cities.", "isCorrect": false, "rationale": "The source connects the automobile to suburban growth, not urban migration. It made suburbs possible rather than driving people into cities."}, {"text": "It was championed by the old-money class as a way to maintain their social distance from the new rich.", "isCorrect": false, "rationale": "The source does not associate the automobile with class preservation by the old-money elite. It describes it as a broadly transformative force."}]}, {"question": "Which character in The Great Gatsby does the source identify as an embodiment of the social changes brought by the 1920s, including women’s expanded roles?", "options": [{"text": "Daisy Buchanan, because her beauty and charm represented the new freedom of wealthy women.", "isCorrect": false, "rationale": "The source does not identify Daisy as an emblem of the new social freedoms. It associates Jordan Baker with these changes."}, {"text": "Myrtle Wilson, because her ambition to rise beyond her working-class origins mirrors the era’s social mobility.", "isCorrect": false, "rationale": "Myrtle Wilson is not identified in the source as an emblem of women’s new social roles. Jordan Baker is the character named in connection with the changes of the 1920s."}, {"text": "Jordan Baker, because her professional career and casual dishonesty embody the changes in expectations about women’s dress, behavior, and independence.", "isCorrect": true, "rationale": "The source states: “Jordan Baker, with her professional career and casual dishonesty, embodies some of these changes”—referring to the loosening of Victorian conventions and women’s expanded independence."}, {"text": "Nick Carraway, because his status as an outsider reflects the displacement felt by many Americans in the 1920s.", "isCorrect": false, "rationale": "Nick Carraway is not the character the source identifies in connection with women’s social changes. Jordan Baker is named specifically."}]}, {"question": "How does the source characterize Fitzgerald’s relationship to the Jazz Age he depicted?", "options": [{"text": "Fitzgerald was a detached outsider who observed the era with contempt and wrote to expose its moral failures.", "isCorrect": false, "rationale": "The source says Fitzgerald was a “participant in” the Jazz Age who “enjoyed its parties, its glamour, and its sense of limitless possibility.” He was not a detached outsider or simply contemptuous."}, {"text": "Fitzgerald was both a participant in and a critic of the Jazz Age, enjoying its glamour while also perceiving its moral emptiness.", "isCorrect": true, "rationale": "The source states: “Fitzgerald was both a participant in and a critic of the Jazz Age. He enjoyed its parties, its glamour, and its sense of limitless possibility, but he also perceived its moral emptiness.”"}, {"text": "Fitzgerald was an enthusiastic celebrant of the Jazz Age who only later, in retrospect, recognized its flaws.", "isCorrect": false, "rationale": "The source describes Fitzgerald’s dual perspective as simultaneous—both participant and critic at the same time—not as a later retrospective judgment."}, {"text": "Fitzgerald rejected the excesses of the Jazz Age and used The Great Gatsby to urge a return to traditional values.", "isCorrect": false, "rationale": "The source does not describe Fitzgerald as urging a return to tradition. His stance is described as a duality—dazzled by the beauty of the era while exposing its corruption."}]}, {"question": "What does the source identify as the Nineteenth Amendment’s connection to 1920s social change?", "options": [{"text": "It banned alcohol, creating the conditions that gave rise to Jazz Age lawlessness.", "isCorrect": false, "rationale": "The ban on alcohol was the Eighteenth Amendment, not the Nineteenth. The Nineteenth Amendment, ratified in 1920, gave women the right to vote."}, {"text": "It established Prohibition, which the novel links to Gatsby’s fortune.", "isCorrect": false, "rationale": "Prohibition was established by the Eighteenth Amendment, not the Nineteenth. The Nineteenth Amendment granted women’s suffrage in 1920."}, {"text": "It gave women the right to vote in 1920, contributing to a broader loosening of Victorian social conventions.", "isCorrect": true, "rationale": "The source states: “Women had won the right to vote with the Nineteenth Amendment (1920),” identifying this as part of the broader social changes of the decade, alongside the rise of “flappers” who challenged traditional expectations."}, {"text": "It guaranteed equal pay for women workers, fueling the economic boom of the 1920s.", "isCorrect": false, "rationale": "The Nineteenth Amendment granted voting rights to women, not equal pay guarantees. The source does not connect women’s economic participation to the amendment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
