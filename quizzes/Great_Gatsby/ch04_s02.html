<script>
var QUESTIONS = [{"question": "The analysis describes Gatsby’s party as a “theatrical production.” What specific detail does Fitzgerald include to establish this theatrical quality most directly?", "options": [{"text": "Gatsby wears a costume that changes throughout the evening, suggesting he is playing different roles.", "isCorrect": false, "rationale": "Gatsby wears the same formal attire throughout. The theatrical quality is established through the party’s preparation and staging, not Gatsby’s costume changes."}, {"text": "The drunk man in the library compares Gatsby to David Belasco—a Broadway producer famous for obsessively realistic stage sets—suggesting the party and library are elaborate, carefully designed performances.", "isCorrect": true, "rationale": "The analysis identifies Owl Eyes’ comparison of Gatsby to Belasco as crystallizing the theatrical theme: Gatsby’s library is “a set piece: the books are real but unread, authentic in appearance but serving no intellectual purpose.” The performance is impressive precisely because it achieves verisimilitude without substance."}, {"text": "Fitzgerald describes the party preparations in the language of a theater program, with detailed credits for catering, music, and lighting.", "isCorrect": false, "rationale": "While the preparations are described in precise detail, the analysis identifies the Belasco comparison—not a theater program format—as the direct crystallization of the theatrical theme."}, {"text": "Gatsby hires professional actors to mingle with his guests and play aristocratic roles.", "isCorrect": false, "rationale": "There is no mention of hired actors in the text. The theatrical quality comes from Gatsby’s own careful staging of his identity and environment."}]}, {"question": "The analysis says Nick notices Gatsby’s “elaborate formality of speech just missed being absurd” and that he seemed to be “picking his words with care.” What does this observation suggest about Gatsby’s character?", "options": [{"text": "It suggests Gatsby is simply well-educated and careful with language, as befits a man of his wealth.", "isCorrect": false, "rationale": "If Gatsby were naturally well-educated and comfortable, his speech would not “just miss being absurd.” The careful picking of words suggests constructed performance, not native ease."}, {"text": "It suggests Gatsby is constructing himself in real time—choosing each word and gesture deliberately, like an actor, rather than speaking from an authentic social identity he was raised in.", "isCorrect": true, "rationale": "The analysis states that “the characterization reveals a man constructing himself in real time, choosing each word and gesture as deliberately as he chose each book for his library.” His speech’s near-absurdity reveals the effort required to maintain the performance."}, {"text": "It suggests Gatsby has a speech impediment that he is managing through deliberate word choice.", "isCorrect": false, "rationale": "There is no suggestion of a speech impediment. The careful word choice reflects class performance and constructed identity, not a physical condition."}, {"text": "It suggests Gatsby is suspicious of Nick and is deliberately withholding information.", "isCorrect": false, "rationale": "While Gatsby does withhold information, the observation about his speech is not about suspicion toward Nick. It is about the performed quality of his entire self-presentation."}]}, {"question": "How does Jordan Baker’s dishonesty function as a parallel to Gatsby’s self-performance in Chapter 3?", "options": [{"text": "Jordan’s dishonesty parallels Gatsby’s in that both are motivated purely by financial gain.", "isCorrect": false, "rationale": "Jordan’s dishonesty is about maintaining a “cool, insolent smile turned to the world”—image and social standing, not financial gain. Gatsby’s self-performance is similarly about projecting an identity."}, {"text": "Jordan’s dishonesty parallels Gatsby’s because both involve maintaining a constructed surface image—she sustains a persona of careless superiority through lies just as Gatsby sustains a persona of old-money refinement through his party and library.", "isCorrect": true, "rationale": "The analysis explains that Jordan’s dishonesty is “another form of performance, maintaining an image of careless superiority.” Both characters use performance to project social identities they have not honestly earned—extending the chapter’s central theme of self-invention."}, {"text": "Jordan’s dishonesty is a minor character flaw, while Gatsby’s performance is fundamentally heroic and admirable.", "isCorrect": false, "rationale": "The analysis treats both as instances of the same theme: performance and self-invention as central concerns of the novel. Neither is minimized relative to the other."}, {"text": "Jordan’s dishonesty is revealed to Nick but hidden from other characters; Gatsby’s performance is visible to everyone.", "isCorrect": false, "rationale": "Gatsby’s performance is not transparently visible to everyone—many guests are genuinely mystified by him. And Jordan’s dishonesty is not entirely hidden—there was a near-scandal over the golf incident."}]}, {"question": "Nick ends Chapter 3 by declaring he is “one of the few honest people” he has ever known. What does the analysis suggest a careful reader should make of this claim?", "options": [{"text": "The reader should accept Nick’s claim as the novel’s moral anchor, since Fitzgerald clearly designed Nick as the ethical center of the story.", "isCorrect": false, "rationale": "The analysis explicitly raises the question of “whether Nick, too, is performing a role: the reliable, moral observer.” Accepting his claim at face value misses the irony Fitzgerald builds into the novel’s narration."}, {"text": "The reader should consider whether Nick’s claim to honesty is itself a performance—a constructed role he plays just as Gatsby plays the role of the mysterious millionaire—raising the question of whether authenticity is possible in this world.", "isCorrect": true, "rationale": "The analysis states that Nick’s “concluding claim that he is ‘one of the few honest people that I have ever known’ invites the reader to consider whether Nick, too, is performing a role.” The chapter “raises the question of whether authenticity is possible—or even desirable—in a world built on surfaces.”"}, {"text": "The reader should understand Nick’s claim as false modesty—he knows he is deeply dishonest and is testing whether the reader will catch his irony.", "isCorrect": false, "rationale": "Nick is not performing deliberate false modesty. The irony is more subtle: he genuinely believes his claim, but the novel’s structure invites the reader to question whether his self-assessment is accurate."}, {"text": "The reader should compare Nick’s claim to Jordan’s dishonesty and conclude that Nick is correct—he is clearly more honest than the other characters.", "isCorrect": false, "rationale": "A comparison favorable to Nick misses the novel’s deeper irony. Fitzgerald does not merely want the reader to rank characters by honesty but to question the reliability of Nick’s entire self-presentation."}]}, {"question": "Fitzgerald describes the party’s preparation with the precision of a “stage manager’s checklist” (to use the analysis’s phrase): crates of oranges, caterers, canvas, lights, the orchestra’s arrival. What effect does this precision produce?", "options": [{"text": "It creates sympathy for the working-class laborers who must clean up after the wealthy’s excess.", "isCorrect": false, "rationale": "While the laborers who clean up on Mondays are mentioned, the primary effect of the detailed checklist is not sympathy for workers but the revelation of the party as a constructed spectacle."}, {"text": "It emphasizes Gatsby’s generosity and desire to provide genuine pleasure for his guests.", "isCorrect": false, "rationale": "The detail reveals construction and staging more than generosity. Gatsby is assembling a spectacle, and the audience’s enjoyment serves his larger performance rather than being an end in itself."}, {"text": "It establishes the party as a deliberately staged spectacle—a production assembled piece by piece—reinforcing the chapter’s central theme that Gatsby’s world is performance rather than organic social life.", "isCorrect": true, "rationale": "The analysis notes that “the preparations are described with the precision of a stage manager’s checklist.” This precision reveals the party not as spontaneous hospitality but as theatrical production—carefully designed and assembled, not naturally occurring."}, {"text": "It provides historical documentation of 1920s party culture and serves primarily as a period detail.", "isCorrect": false, "rationale": "While the detail is historically grounded, Fitzgerald deploys it for thematic purposes. The precision serves the theme of performance, not mere period documentation."}]}, {"question": "Gatsby stands alone on the marble steps during his own party, “not drinking,” “growing more correct as the fraternal hilarity increased.” What does this image contribute to the novel’s characterization of him?", "options": [{"text": "It reveals that Gatsby is an introvert who hosts parties for business purposes but does not enjoy social interaction.", "isCorrect": false, "rationale": "Introversion is too simple an explanation. The analysis identifies something more complex: Gatsby hosts the parties as a performance aimed at reaching a specific person (Daisy), making his isolation the irony of a host who is not truly present at his own spectacle."}, {"text": "It suggests Gatsby is an alcoholic recovering from addiction and must abstain at his own parties.", "isCorrect": false, "rationale": "There is no suggestion in the text or analysis that Gatsby is a recovering alcoholic. His sobriety at the party is presented as deliberate self-management and distance, not addiction recovery."}, {"text": "It presents Gatsby as paradoxically alone at the center of his own spectacle—the host who is not part of the party—suggesting the party serves a purpose beyond enjoyment and that Gatsby is performing, not participating.", "isCorrect": true, "rationale": "The analysis notes that Gatsby “remains offstage, invisible to the very audience he has assembled,” and his growing formality as hilarity increases suggests that the party is a means to an end rather than a social world he inhabits. He is assembling an audience, not enjoying one."}, {"text": "It shows that Gatsby is uncomfortable with the nouveau riche guests who attend his parties and would prefer a more refined social circle.", "isCorrect": false, "rationale": "Gatsby watches his guests with “approving eyes,” not discomfort. His isolation is not about social preference but about his fundamental separateness from the world he has created."}]}, {"question": "The analysis asks whether “authenticity is possible—or even desirable—in a world built on surfaces.” What does the chapter’s portrayal of Gatsby’s library suggest about this question?", "options": [{"text": "The library suggests that authenticity is impossible but unimportant, since beautiful surfaces are a form of value in themselves.", "isCorrect": false, "rationale": "The analysis does not endorse beautiful surfaces as a substitute for authenticity. The library is described as impressive but ultimately hollow—it achieves “verisimilitude without substance.”"}, {"text": "The library suggests authenticity is entirely achievable: the books are real, and Gatsby’s self-made identity is therefore genuine and admirable.", "isCorrect": false, "rationale": "The fact that the books are real but unread undermines this reading. Gatsby has assembled the appearance of intellectual cultivation without the reality—which is precisely the point Owl Eyes and the analysis make."}, {"text": "The library suggests that the world of the novel rewards performance over substance: the books are real but unread, authentic in form but serving no intellectual function—a performance that achieves its effect precisely by being unexamined.", "isCorrect": true, "rationale": "The analysis states that the library is “a set piece: the books are real but unread, authentic in appearance but serving no intellectual purpose. The performance is impressive precisely because it achieves verisimilitude without substance.” This captures the novel’s suggestion that the world rewards surface over depth."}, {"text": "The library suggests Gatsby genuinely aspires to intellectual cultivation and will eventually become the educated gentleman he performs.", "isCorrect": false, "rationale": "The uncut pages undercut any reading of genuine intellectual aspiration. Gatsby has stopped where the performance ends, not where actual reading would begin—as Owl Eyes specifically notes."}]}, {"question": "Nick’s conversation with Jordan about driving establishes a metaphor for a broader theme. What does Jordan’s reasoning—“It takes two to make an accident” and her reliance on other people being careful—reveal about the novel’s moral world?", "options": [{"text": "It reveals that Jordan is a practical thinker who applies logical reasoning to everyday situations.", "isCorrect": false, "rationale": "Jordan’s reasoning is not presented as logical pragmatism but as moral evasion. Her argument that she relies on others’ carefulness reveals an abdication of personal responsibility."}, {"text": "It reveals a moral world in which the privileged feel entitled to be careless, relying on others—usually those with less power—to absorb the consequences, foreshadowing the novel’s later catastrophes involving reckless driving.", "isCorrect": true, "rationale": "Jordan argues that her recklessness is acceptable because “other people are” careful and “they’ll keep out of my way.” This logic of entitlement—carelessness protected by others’ caution—anticipates the novel’s treatment of the Buchanans’ moral carelessness and its fatal consequences."}, {"text": "It reveals that Jordan is a capable, confident driver whose self-assurance reflects her athletic background as a champion golfer.", "isCorrect": false, "rationale": "Jordan is identified as a rotten driver. The conversation is specifically about her carelessness, and her self-confidence in the exchange is part of her broader “cool, insolent smile”—a performance rather than competence."}, {"text": "It reveals Nick’s excessive caution and timidity, contrasting unfavorably with Jordan’s adventurous spirit.", "isCorrect": false, "rationale": "Nick’s objection to Jordan’s driving is reasonable, not timid. Fitzgerald presents Jordan’s recklessness critically, not as admirable adventurousness."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
