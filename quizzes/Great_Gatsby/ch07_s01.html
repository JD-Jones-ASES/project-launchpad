<script>
var QUESTIONS = [{"question": "What was Jay Gatsby’s real name, and at what age did he change it?", "options": [{"text": "His real name was James Gatz, and he changed it at age seventeen.", "isCorrect": true, "rationale": "Nick reveals: “James Gatz—that was really, or at least legally, his name. He had changed it at the age of seventeen” at the specific moment he saw Dan Cody’s yacht on Lake Superior."}, {"text": "His real name was John Gatsby, and he changed it at age twenty-one.", "isCorrect": false, "rationale": "The name given in the text is James Gatz, not John. He changed it at seventeen, not twenty-one—a critical detail because the transformation occurs in adolescence, before any real wealth or experience."}, {"text": "His real name was Jay Gates, and he changed it when he left for the war.", "isCorrect": false, "rationale": "The surname is Gatz, not Gates, and the name change happens at seventeen on Lake Superior, not at the time of the war. The renaming is tied to the encounter with Dan Cody’s yacht."}, {"text": "His real name was James Buchanan, and he changed it to avoid confusion with Tom Buchanan.", "isCorrect": false, "rationale": "There is no connection between Gatsby’s birth name and Tom Buchanan’s surname. His name was James Gatz, changed at seventeen out of a youthful desire for self-reinvention."}]}, {"question": "What was Gatsby doing when he first saw Dan Cody’s yacht, and what did he do next?", "options": [{"text": "He was working as a fisherman; he waved to Cody from his boat.", "isCorrect": false, "rationale": "Gatsby had been working as a clam-digger and salmon-fisher, but when he saw the yacht he was “loafing along the beach.” He then borrowed a rowboat and rowed out to warn Cody about a dangerous wind."}, {"text": "He was loafing along the beach; he borrowed a rowboat and rowed out to warn Cody of a dangerous wind.", "isCorrect": true, "rationale": "Nick narrates: “It was James Gatz who had been loafing along the beach that afternoon” but “it was already Jay Gatsby who borrowed a rowboat, pulled out to the TUOLOMEE, and informed Cody that a wind might catch him and break him up in half an hour.”"}, {"text": "He was working on Cody’s dock; Cody invited him aboard for an interview.", "isCorrect": false, "rationale": "Gatsby approaches Cody from shore by rowing out; he is not already working on the dock. The initiative is Gatsby’s—he reaches out to Cody unprompted, which impresses the older man."}, {"text": "He was swimming in Lake Superior; Cody rescued him from the current.", "isCorrect": false, "rationale": "There is no swimming rescue. Gatsby approaches Cody’s anchored yacht from the beach in a borrowed rowboat, motivated by his recognition of the yacht’s danger and his own ambition."}]}, {"question": "What role did Gatsby play aboard Dan Cody’s yacht during their five years together?", "options": [{"text": "He served only as Cody’s personal secretary and bookkeeper.", "isCorrect": false, "rationale": "Gatsby’s role was much broader. Nick lists: “steward, mate, skipper, secretary, and even jailor”—the variety reflecting Cody’s need for a trusted keeper when his drinking made him reckless."}, {"text": "He served in multiple capacities—steward, mate, skipper, secretary, and jailor—as Cody trusted him more with each year.", "isCorrect": true, "rationale": "Nick explains that “Dan Cody sober knew what lavish doings Dan Cody drunk might soon be about,” so he gave Gatsby increasing responsibility across all these roles during the five years and three trips around the Continent."}, {"text": "He worked exclusively as Cody’s bodyguard and protector against swindlers.", "isCorrect": false, "rationale": "While protecting Cody from his own drunken excess is part of Gatsby’s role, his duties spanned steward, mate, skipper, secretary, and jailor—far more than a bodyguard function."}, {"text": "He managed Cody’s financial investments in Nevada silver and Yukon gold.", "isCorrect": false, "rationale": "Cody’s mining wealth predates Gatsby’s employment. Gatsby’s role aboard the yacht is personal service and protection, not financial management of Cody’s business interests."}]}, {"question": "Why did Gatsby not inherit the $25,000 Dan Cody left him in his will?", "options": [{"text": "Gatsby refused the inheritance, not wanting to be seen as profiting from Cody’s death.", "isCorrect": false, "rationale": "Gatsby did not refuse the inheritance. He simply never received it: “He never understood the legal device that was used against him, but what remained of the millions went intact to Ella Kaye.”"}, {"text": "Ella Kaye used a legal maneuver to claim all of Cody’s estate, leaving Gatsby nothing.", "isCorrect": true, "rationale": "Nick explains that Gatsby “didn’t get it” because “the legal device that was used against him” transferred everything to Ella Kaye, the newspaper woman who had become Cody’s companion."}, {"text": "Cody’s children contested the will and the courts sided with the family.", "isCorrect": false, "rationale": "Cody’s children are not mentioned as challengers. The inheritance is taken by Ella Kaye through a “legal device” that Gatsby never fully understood, not by family members."}, {"text": "Cody died before he could update his will to include Gatsby’s share.", "isCorrect": false, "rationale": "The will apparently did include a legacy for Gatsby. The problem was not an un-updated will but the legal maneuver by which Ella Kaye redirected the entire estate to herself."}]}, {"question": "How does Tom Buchanan treat Gatsby when he arrives at Gatsby’s estate with Sloane and the woman on horseback?", "options": [{"text": "Tom is openly hostile and demands to know the source of Gatsby’s wealth.", "isCorrect": false, "rationale": "Tom does not openly confront Gatsby during this visit. He accepts Gatsby’s hospitality with “gruffly polite” superficiality, but the condescension is visible in Sloane’s behavior and Tom’s later remark: “Doesn’t he know she doesn’t want him?”"}, {"text": "Tom treats Gatsby with casual condescension, barely acknowledging him, and later remarks privately that Gatsby cannot read social cues.", "isCorrect": true, "rationale": "Tom is “gruffly polite,” Sloane lounges “haughtily,” and when Gatsby prepares to follow the riding party to dinner, Tom says to Nick: “My God, I believe the man’s coming. Doesn’t he know she doesn’t want him?”"}, {"text": "Tom is warm and friendly, inviting Gatsby to their East Egg dinner parties.", "isCorrect": false, "rationale": "Tom is not warm. The visit produces awkward silences, Sloane’s haughtiness, and the group’s deliberate departure before Gatsby can fetch his overcoat, exposing his social exclusion."}, {"text": "Tom pretends not to know Gatsby at all, denying they have ever met.", "isCorrect": false, "rationale": "Tom does “remember” when Gatsby mentions they met about two weeks ago. His condescension is not denial but a kind of dismissive politeness that treats Gatsby as beneath real attention."}]}, {"question": "What does Gatsby tell Nick he wants from Daisy after their reunion and her visit to his party?", "options": [{"text": "He wants Daisy to agree to meet him secretly in New York once a week.", "isCorrect": false, "rationale": "Gatsby’s demand is far more absolute than secret meetings. He wants Daisy to tell Tom “she never loved you” and to return to Louisville with him to be married as if the past five years had not happened."}, {"text": "He wants Daisy to tell Tom she never loved him, so they can return to Louisville and marry as if the past five years never occurred.", "isCorrect": true, "rationale": "Nick narrates: “He wanted nothing less of Daisy than that she should go to Tom and say: ‘I never loved you.’ After she had obliterated four years…they were to go back to Louisville and be married from her house—just as if it were five years ago.”"}, {"text": "He wants Daisy to divorce Tom and move immediately into his West Egg mansion.", "isCorrect": false, "rationale": "Gatsby’s vision is not about moving into his mansion but about recovering the past—specifically returning to Louisville to re-enact the beginning of their relationship, as if time had reversed."}, {"text": "He wants Daisy to acknowledge their love publicly by attending his next party without Tom.", "isCorrect": false, "rationale": "Public acknowledgment at a party is not Gatsby’s demand. His wish is for Daisy to deny her entire marriage and return to the moment before it began."}]}, {"question": "When Nick tells Gatsby “you can’t repeat the past,” what is Gatsby’s response?", "options": [{"text": "He agrees sadly and says he knows the past is gone forever.", "isCorrect": false, "rationale": "Gatsby does not agree. His response is incredulous defiance: “Can’t repeat the past?” he cried incredulously. “Why of course you can!” This is one of the novel’s most defining lines."}, {"text": "“Can’t repeat the past? Why of course you can!”—delivered incredulously, as he looks around wildly for the past.", "isCorrect": true, "rationale": "Gatsby cries out “Can’t repeat the past?” incredulously, and “looked around him wildly, as if the past were lurking here in the shadow of his house, just out of reach of his hand,” declaring he will “fix everything just the way it was before.”"}, {"text": "He changes the subject and refuses to discuss Daisy or the past with Nick.", "isCorrect": false, "rationale": "Gatsby does not change the subject. This conversation is the emotional climax of the chapter; Gatsby launches into an extended discussion of the past and even recounts his first kiss with Daisy in Louisville."}, {"text": "He acknowledges Nick’s point but argues that Daisy’s love for him proves the past can be recovered.", "isCorrect": false, "rationale": "Gatsby does not concede Nick’s point at all. His reply is flat disbelief: the idea that one cannot repeat the past is simply incomprehensible to him."}]}, {"question": "In the chapter’s closing lyrical passage, what happens when Gatsby kisses Daisy for the first time in Louisville?", "options": [{"text": "Gatsby realizes he does not love Daisy but loves the idea of her, and he is relieved.", "isCorrect": false, "rationale": "The kiss is described as a total commitment, not a revelation of hollow feeling. Gatsby “wed his unutterable visions to her perishable breath,” permanently binding his infinite aspirations to her mortal person."}, {"text": "Gatsby permanently weds his unutterable visions to Daisy’s perishable breath, and she blossoms for him like a flower.", "isCorrect": true, "rationale": "Nick narrates: “He knew that when he kissed this girl, and forever wed his unutterable visions to her perishable breath, his mind would never romp again like the mind of God.” At his lips’ touch “she blossomed for him like a flower and the incarnation was complete.”"}, {"text": "Daisy confesses she loves another man and Gatsby vows to win her at any cost.", "isCorrect": false, "rationale": "No such confession occurs. The passage is Gatsby’s interior experience of the kiss as a cosmic, defining moment—the incarnation of his dreams into physical reality."}, {"text": "Gatsby realizes that marrying Daisy would mean giving up his grander aspirations, and he hesitates.", "isCorrect": false, "rationale": "Gatsby does not hesitate out of ambition. He waits to prolong the moment before the kiss, listening “for a moment longer to the tuning-fork that had been struck upon a star,” then kisses her, completing the incarnation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
