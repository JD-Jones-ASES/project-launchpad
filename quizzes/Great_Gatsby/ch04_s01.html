<script>
var QUESTIONS = [{"question": "How did most guests arrive at Gatsby’s parties, according to Nick?", "options": [{"text": "They received engraved formal invitations delivered by Gatsby’s butler.", "isCorrect": false, "rationale": "Nick specifically notes he was one of the few guests who actually had been invited. Most guests simply arrived on their own, without invitation, as though the party were an amusement park with automatic admission."}, {"text": "They were personally escorted by Gatsby’s chauffeurs from the city.", "isCorrect": false, "rationale": "While Gatsby’s Rolls-Royce did ferry guests, the point Nick makes is that most guests were not invited at all—they simply appeared and conducted themselves according to amusement-park rules."}, {"text": "Most guests simply arrived uninvited, getting into automobiles and ending up at Gatsby’s door, admitted by the simplicity of their desire to be there.", "isCorrect": true, "rationale": "Nick explains that “people were not invited—they went there” and “came for the party with a simplicity of heart that was its own ticket of admission.” He received a rare formal invitation; most did not."}, {"text": "They came at the invitation of Tom Buchanan, who organized Gatsby’s parties as a social obligation.", "isCorrect": false, "rationale": "Tom Buchanan does not organize or manage Gatsby’s parties. The guests arrive independently, mostly without any invitation from anyone."}], "id": "q01"}, {"question": "What rumor do the two girls in yellow dresses and the group at the table spread about Gatsby?", "options": [{"text": "That Gatsby is a bootlegger who made his fortune selling illegal alcohol.", "isCorrect": false, "rationale": "The bootlegger rumor is suggested elsewhere in the novel but is not the rumor circulated at this particular table. At this gathering, guests speculate about more dramatic possibilities."}, {"text": "That Gatsby is either a man who killed someone or a German spy during the war.", "isCorrect": true, "rationale": "One girl says, “Somebody told me they thought he killed a man once.” Lucille counters that “he was a German spy during the war.” Another argues this is impossible because he served in the American army. Nick notes this “testimony to the romantic speculation he inspired.”"}, {"text": "That Gatsby is an Oxford graduate who inherited his fortune from a European noble family.", "isCorrect": false, "rationale": "Jordan Baker tells Nick that Gatsby claimed to be an Oxford man, but she doubts it. This is not the rumor the girls at the party spread."}, {"text": "That Gatsby is actually an alias and no one knows his real identity or nationality.", "isCorrect": false, "rationale": "While Gatsby’s identity is mysterious, the specific rumors at the party concern killing someone and being a German spy, not an assumed name."}], "id": "q02"}, {"question": "What surprises the drunk man with owl-eyed spectacles when he examines Gatsby’s books in the library?", "options": [{"text": "He discovers the books are hollow cardboard props with no actual pages inside.", "isCorrect": false, "rationale": "The discovery is the opposite: Owl Eyes is amazed to find the books are genuine—real printed matter with actual pages—not the cardboard props he expected."}, {"text": "He discovers the books are real—genuine printed matter with pages—though uncut, and he compares Gatsby to the theatrical producer Belasco for the thoroughness of the illusion.", "isCorrect": true, "rationale": "Owl Eyes declares “They’re real” and “Absolutely real—have pages and everything.” He calls Gatsby “a regular Belasco” for the “thoroughness” and “realism” of the performance, noting Gatsby “knew when to stop—didn’t cut the pages.”"}, {"text": "He discovers the books are filled with Gatsby’s personal journals and hidden documents.", "isCorrect": false, "rationale": "The books are standard library volumes, not personal journals. The key discovery is simply that they are real books, not the decorative fakes Owl Eyes expected."}, {"text": "He discovers that most of the books are in foreign languages, suggesting Gatsby studied abroad.", "isCorrect": false, "rationale": "The text does not mention foreign-language books. The significant discovery is their physical authenticity—they are real books with uncut pages."}], "id": "q03"}, {"question": "How does Nick finally meet Jay Gatsby, and what is his immediate impression of Gatsby’s smile?", "options": [{"text": "Gatsby introduces himself formally at the entrance to his mansion; Nick finds him pompous and artificial.", "isCorrect": false, "rationale": "Nick does not recognize Gatsby when they first speak. He is sitting with Gatsby without knowing who he is until Gatsby reveals himself—and Nick’s impression of the smile is overwhelmingly positive."}, {"text": "Nick finds Gatsby while searching the party and is struck by how ordinary and unremarkable he appears.", "isCorrect": false, "rationale": "Nick’s impression of Gatsby—especially his smile—is extraordinary, not ordinary. Gatsby’s smile is described as one of the most affecting Nick has ever encountered."}, {"text": "Gatsby reveals himself while sitting beside Nick at a table; his smile offers “a quality of eternal reassurance” that concentrates entirely on whoever it faces, making the recipient feel uniquely understood.", "isCorrect": true, "rationale": "Nick is talking with a man at a table who asks about the war, then says “I’m Gatsby.” Nick is astonished. The smile is described as one of those rare ones with “a quality of eternal reassurance,” that “understood you just so far as you wanted to be understood” and “believed in you as you would like to believe in yourself.”"}, {"text": "Gatsby greets Nick as he leaves the party, apologizing for not having spoken to him earlier; Nick thinks he seems nervous and ill at ease.", "isCorrect": false, "rationale": "The first proper introduction happens earlier at the table—Gatsby does say goodbye at the end, but the significant first meeting and the description of his smile occur mid-party."}], "id": "q04"}, {"question": "What is notable about Gatsby’s behavior during his own party, compared to his guests?", "options": [{"text": "Gatsby drinks heavily and dances with as many guests as possible, enjoying himself conspicuously.", "isCorrect": false, "rationale": "The text explicitly notes that Gatsby does not drink. He stands apart from the revelry, watching his guests with “approving eyes.” His sobriety distinguishes him from the increasingly intoxicated crowd."}, {"text": "Gatsby mingles freely and warmly, making all of his guests feel personally welcome.", "isCorrect": false, "rationale": "Gatsby is not a warm social host in the conventional sense. He stands alone, apart from the crowd, and Nick observes that no one swooned on Gatsby, no one sang with him—he remained isolated even at his own party."}, {"text": "Gatsby stands alone on the marble steps, not drinking, growing more formal and correct as the fraternal hilarity of his guests increases—isolated at the center of his own spectacle.", "isCorrect": true, "rationale": "Nick observes that Gatsby was “the fact that he was not drinking helped to set him off from his guests” and that “he grew more correct as the fraternal hilarity increased.” No one swooned on Gatsby; he was isolated at his own party."}, {"text": "Gatsby is absent from the party for most of the evening, conducting business by telephone.", "isCorrect": false, "rationale": "While Gatsby does receive calls from Chicago and Philadelphia, he is visibly present at the party—Nick describes watching him stand on the steps. The phone calls interrupt but do not absent him."}], "id": "q05"}, {"question": "What does Jordan Baker tell Nick she has just heard from Gatsby when she emerges from the library?", "options": [{"text": "That Gatsby is planning to leave the country and sell his mansion.", "isCorrect": false, "rationale": "Jordan does not reveal any plan for Gatsby to leave. The secret she has heard is described as “amazing” but she swears she won’t tell—and does not."}, {"text": "That Gatsby is actually from Louisville and knew Daisy long before coming to West Egg.", "isCorrect": false, "rationale": "While Gatsby’s connection to Daisy is eventually revealed, this is not what Jordan tells Nick at the party. She keeps the secret and only teases Nick with it."}, {"text": "She does not reveal the content, only that it was “simply amazing” and that she has sworn not to tell it.", "isCorrect": true, "rationale": "Jordan emerges saying “I’ve just heard the most amazing thing” but then says “I swore I wouldn’t tell it.” The secret is deliberately withheld from the reader at this point in the novel."}, {"text": "That Gatsby knows Tom Buchanan from their shared military service during the war.", "isCorrect": false, "rationale": "Jordan does not reveal anything about Gatsby and Tom knowing each other. The secret involves Gatsby and Daisy, as becomes clear in Chapter 4."}], "id": "q06"}, {"question": "What does Nick discover about Jordan Baker’s character after the party season begins?", "options": [{"text": "That she is deeply loyal and honest, which is why Nick begins to fall in love with her.", "isCorrect": false, "rationale": "Nick discovers the opposite: Jordan is “incurably dishonest.” This discovery complicates his developing feelings for her but does not stop them entirely."}, {"text": "That she is incurably dishonest—she moved her ball in a golf tournament and left a borrowed car in the rain while lying about it—and she avoids clever men because she feels safer where dishonesty is undetectable.", "isCorrect": true, "rationale": "Nick recalls a “critical, unpleasant story” about Jordan moving her ball in a golf tournament. He also witnesses her leave a borrowed car in the rain and lie about it. He concludes she is “Incurably dishonest” and “avoids clever, shrewd men” because she “felt safer on a plane where any divergence from a code would be thought impossible.”"}, {"text": "That she is secretly in love with Gatsby and has known him for years before the novel begins.", "isCorrect": false, "rationale": "There is no suggestion that Jordan is in love with Gatsby. Her relationship to Gatsby is that of a social acquaintance who carries messages for him, not a romantic one."}, {"text": "That she comes from a wealthy family in East Egg and has always looked down on people from West Egg.", "isCorrect": false, "rationale": "Jordan is from Louisville, not East Egg. The text says she grew up with Daisy in Louisville and has only a very old aunt as family."}], "id": "q07"}, {"question": "What accident occurs as Nick is leaving Gatsby’s party, and who is involved?", "options": [{"text": "Daisy Buchanan strikes a pedestrian in Gatsby’s driveway while trying to leave the party quickly.", "isCorrect": false, "rationale": "Daisy is not present at this party. The accident involves Owl Eyes—the drunk man from the library—whose car loses a wheel and goes into a ditch."}, {"text": "A new coupe loses one of its wheels and goes into a ditch outside Gatsby’s estate; Owl Eyes is revealed to be one of the occupants, cheerfully oblivious to the cause.", "isCorrect": true, "rationale": "Nick sees “a new coupe” in the ditch “violently shorn of one wheel.” The man who stepped out is recognized as Owl Eyes from the library. He claims not to have been driving and seems baffled by the wheel’s disappearance."}, {"text": "Tom Buchanan crashes his polo car into a fence after drinking too much at the party.", "isCorrect": false, "rationale": "Tom Buchanan does not appear at this Gatsby party. The accident involves Owl Eyes and another drunk guest who had been driving."}, {"text": "Nick narrowly avoids a collision on his way home and decides never to drink again.", "isCorrect": false, "rationale": "Nick observes the accident involving others; he is not involved in it. The accident involves Owl Eyes’ car, not Nick’s."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
