    };

</head>

<div class="quiz-container">

        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 8: The Novel</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What prevents Nick from sleeping the night after the accident in Chapter 8?", "options": [{"text": "He is kept awake by the sound of Gatsby’s party still going on next door.", "isCorrect": false, "rationale": "Gatsby has stopped throwing parties. Nick is kept awake by a fog-horn groaning on the Sound and by “grotesque reality and savage, frightening dreams.”"}, {"text": "A fog-horn groaning on the Sound and disturbing, frightening dreams keep him awake.", "isCorrect": true, "rationale": "The chapter opens with Nick unable to sleep: “a fog-horn was groaning incessantly on the Sound, and I tossed half-sick between grotesque reality and savage, frightening dreams.”"}, {"text": "He hears Myrtle’s sister Catherine crying at the Wilson garage all night.", "isCorrect": false, "rationale": "The chapter mentions Catherine arrives at the garage later, not that Nick hears her. His sleeplessness is caused by the fog-horn and his own mental state."}, {"text": "He is awakened by a phone call from Jordan Baker in the middle of the night.", "isCorrect": false, "rationale": "Jordan calls Nick later in the morning, not in the middle of the night. His insomnia is described at dawn, before any phone calls."}], "id": "q01"}, {"question": "What story does Gatsby tell Nick in the early hours of the morning in Chapter 8?", "options": [{"text": "He reveals his true identity as James Gatz and his plans to escape the country.", "isCorrect": false, "rationale": "Gatsby reveals his past but does not plan to escape. He “wouldn’t consider” going away, as he was waiting to know what Daisy would do."}, {"text": "He tells Nick the full story of his romance with Daisy in Louisville in 1917, including how he courted her under false pretenses.", "isCorrect": true, "rationale": "The chapter states it was this night that Gatsby told Nick “the strange story of his youth with Dan Cody” and then the story of his romance with Daisy—how he took her “because he had no real right to touch her hand.”"}, {"text": "He tells Nick about his bootlegging operations and his connection to Meyer Wolfsheim.", "isCorrect": false, "rationale": "Gatsby does not explain his criminal business in detail. The story he tells is the romance with Daisy in Louisville, not his later criminal enterprises."}, {"text": "He tells Nick that he plans to confront Tom Buchanan one more time to win Daisy back.", "isCorrect": false, "rationale": "Gatsby makes no such plan. He is waiting and hoping Daisy will call, not planning another confrontation with Tom."}], "id": "q02"}, {"question": "What does the dog leash Michaelis finds in Wilson’s desk drawer signify?", "options": [{"text": "That Wilson kept a dog he never told Myrtle about, suggesting he had his own secrets.", "isCorrect": false, "rationale": "The leash is not Wilson’s. Wilson says his wife had it wrapped in tissue paper on her bureau, and he found it “yesterday afternoon,” suggesting Myrtle bought it secretly."}, {"text": "That Myrtle had purchased the leash secretly, which Wilson interprets as evidence of her infidelity and deception.", "isCorrect": true, "rationale": "Wilson tells Michaelis he found the leash wrapped in tissue paper on Myrtle’s bureau and says “she tried to tell me about it, but I knew it was something funny.” It is a clue to her secret life with Tom, who bought her a dog earlier in the novel."}, {"text": "That Wilson planned to buy a dog to comfort himself after Myrtle’s death.", "isCorrect": false, "rationale": "Wilson found the leash before Myrtle’s death, and it is Myrtle’s possession, not something Wilson acquired."}, {"text": "That Michaelis gave Wilson a dog as a gift to distract him from his grief.", "isCorrect": false, "rationale": "Michaelis simply finds the leash in the desk drawer at Wilson’s request. He did not bring it; Wilson knew it was there."}], "id": "q03"}, {"question": "What does George Wilson do in the early morning hours after Myrtle’s death that reveals his state of mind?", "options": [{"text": "He calls the police and gives them a description of the yellow car’s driver.", "isCorrect": false, "rationale": "Wilson does not call the police. He talks to Michaelis and stares out the window at the Eckleburg billboard, building toward a private, deranged form of justice."}, {"text": "He stares at the Eckleburg billboard and declares “God sees everything,” conflating the advertisement with divine judgment.", "isCorrect": true, "rationale": "Wilson takes Myrtle to the window earlier and says “God knows what you’ve been doing.” Then Michaelis sees Wilson staring at the Eckleburg billboard and hears Wilson declare “God sees everything.”"}, {"text": "He drives to the Buchanan mansion to confront Tom about the accident.", "isCorrect": false, "rationale": "Wilson does not go to the Buchanans first. He sits in the garage through the night, then traces the yellow car to Gatsby’s estate, arriving by half past two the next day."}, {"text": "He packs his belongings and prepares to move West as he and Myrtle had planned.", "isCorrect": false, "rationale": "Wilson’s plan to go West died with Myrtle. His movements the next day are focused entirely on finding the driver of the yellow car."}], "id": "q04"}, {"question": "What does Nick say to Gatsby just before leaving him for the last time in Chapter 8?", "options": [{"text": "“I’ll get Daisy on the phone—she’ll call you by noon, I promise.”", "isCorrect": false, "rationale": "Nick makes no such promise about Daisy. He shouts something very different as he walks away across the lawn."}, {"text": "“You’re worth the whole damn bunch put together.”", "isCorrect": true, "rationale": "Nick calls across the lawn: “They’re a rotten crowd… You’re worth the whole damn bunch put together.” He later says he was always glad he said this, noting it was the only compliment he ever gave Gatsby."}, {"text": "“You should have left last night. It’s too late now.”", "isCorrect": false, "rationale": "Nick does not say this. He shouts the famous compliment, not a warning about flight."}, {"text": "“I enjoyed breakfast, Gatsby”—with no other final words.", "isCorrect": false, "rationale": "“I enjoyed breakfast, Gatsby” is Nick’s final call after the exchange, but the more significant parting words—the compliment—come first as Nick crosses the lawn."}], "id": "q05"}, {"question": "Why does Gatsby refuse to drain his swimming pool, even though the gardener warns him about the leaves and the pipes?", "options": [{"text": "He plans to use the pool that afternoon while waiting for Daisy’s call.", "isCorrect": true, "rationale": "Gatsby tells the gardener “Don’t do it to-day” and remarks to Nick that he has “never used that pool all summer.” He intends to use it that afternoon, floating on the pneumatic mattress while waiting for a call from Daisy that never comes."}, {"text": "He is too distraught from the previous night to deal with routine household decisions.", "isCorrect": false, "rationale": "Gatsby is alert enough to give specific instructions about the car and pool. His refusal is deliberate—he plans to use the pool, not avoid making decisions."}, {"text": "He wants to leave the pool as a memorial to Myrtle Wilson’s death.", "isCorrect": false, "rationale": "The pool has no connection to Myrtle. Gatsby’s refusal is personal: he intends to use it himself while waiting for Daisy."}, {"text": "He is waiting for Tom to arrive so they can discuss the situation calmly.", "isCorrect": false, "rationale": "Gatsby is not waiting for Tom. He is waiting for a call from Daisy, and the pool is where he plans to spend that wait."}], "id": "q06"}, {"question": "How does George Wilson trace the yellow car back to Gatsby?", "options": [{"text": "Tom Buchanan tells Wilson directly that the yellow car belongs to Gatsby.", "isCorrect": false, "rationale": "Tom reveals this information later—in Chapter 9, Nick confirms Tom told Wilson who owned the car. But Wilson’s movements in Chapter 8 are traced from garage to garage before Tom intervenes."}, {"text": "Wilson walks on foot to West Egg and asks someone there for directions to Gatsby’s house, having already learned Gatsby’s name.", "isCorrect": true, "rationale": "The chapter traces Wilson’s movements: he walks to Port Roosevelt, then Gad’s Hill, disappears for three hours (presumably inquiring about the yellow car), then reaches West Egg by half past two, where he asks someone for Gatsby’s address."}, {"text": "He finds Gatsby’s name on the car’s registration papers at the accident scene.", "isCorrect": false, "rationale": "No registration papers are mentioned. Wilson’s method is described as walking and asking, with the police supposing he went from garage to garage."}, {"text": "Michaelis telephones the police with Gatsby’s description, and they relay it to Wilson.", "isCorrect": false, "rationale": "Michaelis does not telephone Gatsby’s name to anyone. Wilson’s investigation is personal and obsessive, traced on foot."}], "id": "q07"}, {"question": "How does Fitzgerald narrate the deaths of Gatsby and Wilson at the end of Chapter 8?", "options": [{"text": "He narrates them in vivid, graphic detail as Nick witnesses both shootings from close range.", "isCorrect": false, "rationale": "Nick does not witness either shooting. Fitzgerald uses indirect narration: the chauffeur hears shots he doesn’t think much about, and Nick arrives afterward."}, {"text": "He narrates them indirectly and with restraint: the chauffeur hears shots without concern, Nick arrives after the fact, and Gatsby’s body is described through the mattress’s movement and a thin red circle in the water.", "isCorrect": true, "rationale": "The chapter withholds the violence: the chauffeur “Heard the shots” but “Hadn’t thought anything much about them.” Gatsby’s body is rendered through the “laden mattress” and “a thin red circle in the water.” Wilson’s body is found “a little way off in the grass.”"}, {"text": "He narrates the deaths through a long letter Wilson leaves behind, explaining his actions.", "isCorrect": false, "rationale": "Wilson leaves no letter. His death is discovered almost as an afterthought: “the gardener saw Wilson’s body a little way off in the grass.”"}, {"text": "He narrates them from Daisy’s point of view as she watches from across the bay.", "isCorrect": false, "rationale": "Daisy does not witness or narrate these events. The perspective remains Nick’s throughout, and Nick arrives after the deaths have occurred."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
