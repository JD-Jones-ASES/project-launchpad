<script>
var QUESTIONS = [{"question": "What is the term for the structural moment in Chapter 8 when Gatsby is shot and his destruction becomes irreversible?", "options": [{"text": "The climax, because it is the most emotionally intense moment of the novel.", "isCorrect": false, "rationale": "The climax occurs in Chapter 7 at the Plaza Hotel confrontation. Chapter 8 contains the catastrophe—the irreversible point of the protagonist’s destruction in classical tragic structure."}, {"text": "The denouement, because it resolves the novel’s main conflict.", "isCorrect": false, "rationale": "The denouement comes in Chapter 9 with the funeral and Nick’s final reflections. Chapter 8 is the catastrophe—the point of the protagonist’s destruction following the climax."}, {"text": "The catastrophe, which in classical tragic structure is the final event of the falling action—the protagonist’s destruction.", "isCorrect": true, "rationale": "The analysis explicitly identifies Chapter 8 as “the catastrophe of Fitzgerald’s tragedy”—the classical fifth-act equivalent when the protagonist’s destruction becomes irreversible, following the Chapter 7 climax."}, {"text": "The reversal of fortune (peripeteia), because Gatsby’s luck suddenly turns against him.", "isCorrect": false, "rationale": "The analysis identifies the peripeteia as occurring in Chapter 7, when “Gatsby’s dream becomes irretrievable.” Chapter 8 is the catastrophe that follows."}], "id": "q01"}, {"question": "The analysis discusses “narrative deflation” as a technique Fitzgerald uses in Chapter 8. What does this term mean in context?", "options": [{"text": "Fitzgerald removes dramatic details from the scene to make it feel realistic and unromanticized.", "isCorrect": false, "rationale": "Narrative deflation is not about realism per se, but about presenting violence through peripheral, underplayed details rather than direct dramatic confrontation, making the prose withhold emotional weight so the reader supplies it."}, {"text": "Fitzgerald presents catastrophic violence through peripheral details and delayed discovery, creating elegy rather than spectacle.", "isCorrect": true, "rationale": "The analysis defines this precisely: “presenting catastrophic violence through peripheral details and delayed discovery” is “itself a commentary on the world of the novel.” The technique “converts spectacle into elegy.”"}, {"text": "Fitzgerald reduces the importance of Gatsby’s death by focusing on minor characters instead.", "isCorrect": false, "rationale": "The deflation is not a reduction of importance but a rhetorical choice—withholding direct depiction forces the reader to supply emotional weight, making the tragedy more powerful."}, {"text": "Fitzgerald uses flat, economic prose to signal that Nick has lost all feeling for Gatsby.", "isCorrect": false, "rationale": "The restrained prose is a deliberate narrative technique, not a reflection of Nick’s emotional detachment. The analysis frames it as a choice that heightens tragedy."}], "id": "q02"}, {"question": "What does the exchange between Wilson and Michaelis at the garage window reveal about the novel’s spiritual vision?", "options": [{"text": "It shows that Wilson has genuine religious faith that sustains him through grief.", "isCorrect": false, "rationale": "Wilson’s “faith” is tragically misdirected—he mistakes a commercial billboard for God. The analysis reads this as exposing the absence of genuine divinity in the valley of ashes."}, {"text": "It suggests that Michaelis is more spiritually sensitive than Wilson, since he recognizes the billboard for what it is.", "isCorrect": false, "rationale": "Michaelis’s correction—“That’s an advertisement”—is practical, not spiritually superior. The point is not Michaelis’s insight but the spiritual vacuum the exchange exposes."}, {"text": "It compresses the novel’s spiritual vision into a single exchange: in the valley of ashes, the only deity watching over its inhabitants is a faded commercial image.", "isCorrect": true, "rationale": "The analysis states that Wilson’s declaration “God sees everything” and Michaelis’s flat correction “That’s an advertisement” “compress the novel’s spiritual vision into a single exchange.” The billboard is a false god—commercial, indifferent, faded."}, {"text": "It shows that religion is irrelevant to the novel’s concerns, which are purely social and economic.", "isCorrect": false, "rationale": "Religion is not dismissed as irrelevant; rather, its absence—the vacancy where God should be—is the point. The Eckleburg billboard is a god-shaped hole in the novel’s spiritual landscape."}], "id": "q03"}, {"question": "The analysis describes Wilson’s “righteous fury” as “misdirected.” Why?", "options": [{"text": "Wilson is angry at Myrtle for her infidelity, but he should direct his anger at himself for ignoring the signs.", "isCorrect": false, "rationale": "Wilson’s misdirection is not about self-blame. His fury is aimed at Gatsby, but Gatsby is not the one whose carelessness destroyed Wilson’s world—that was Tom and Daisy."}, {"text": "Wilson kills Gatsby, who was trying to recover something sacred, rather than the careless Buchanans who actually destroyed his wife.", "isCorrect": true, "rationale": "The analysis states Wilson’s “righteous fury… falls not on the careless rich who destroyed his wife, but on the one man who was trying, however deludedly, to recover something sacred from the past.”"}, {"text": "Wilson believes the yellow car belongs to Tom but kills Gatsby by accident in a case of mistaken identity.", "isCorrect": false, "rationale": "Wilson does come to know Gatsby’s name and tracks him specifically. But the analysis’s point about misdirection is moral: Tom and Daisy caused the harm; Gatsby bears the punishment."}, {"text": "Wilson should have surrendered to the police instead of taking justice into his own hands.", "isCorrect": false, "rationale": "The analysis does not frame Wilson’s misdirection as a legal issue. The point is that the wrong man dies—the Buchanans escape consequence while Gatsby pays the price."}], "id": "q04"}, {"question": "What parallel does Fitzgerald create by intercutting Gatsby’s vigil by the pool with Wilson’s overnight stay at the garage?", "options": [{"text": "Both men are shown to be physically strong, contrasting with the moral weakness of Tom and Daisy.", "isCorrect": false, "rationale": "Physical strength is not the parallel. Both men are psychologically broken by their fixation on a woman who has moved beyond their reach."}, {"text": "Both men are waiting—Gatsby for a phone call from Daisy, Wilson for dawn to enable his revenge—and both are destroyed by their fixation on a woman already beyond their reach.", "isCorrect": true, "rationale": "The analysis states: “Fitzgerald’s structural choice to intercut Gatsby’s final hours with Wilson’s overnight vigil creates a grim parallel between two men waiting.” Both are casualties of the Buchanans’ carelessness."}, {"text": "Both men are shown to have criminal pasts, suggesting that moral corruption is universal in the novel.", "isCorrect": false, "rationale": "Wilson has no criminal past. The parallel is about waiting and fixation, not criminal history."}, {"text": "Both men are offered escape—Gatsby by Nick, Wilson by Michaelis—and both refuse, showing fatal stubbornness.", "isCorrect": false, "rationale": "While Nick does urge Gatsby to flee and Michaelis tries to comfort Wilson, the analysis frames the parallel around waiting and fixation, not the refusal of escape."}], "id": "q05"}, {"question": "Why does Fitzgerald describe Gatsby’s death through images of “a thin red circle in the water” rather than depicting the shooting directly?", "options": [{"text": "Because Fitzgerald was writing for a family audience and needed to avoid graphic content.", "isCorrect": false, "rationale": "This is a craft choice, not a censorship choice. Fitzgerald’s restraint is deliberate and thematically purposeful, as the analysis makes clear."}, {"text": "Because Nick was not present and can only speculate about what happened from second-hand accounts.", "isCorrect": false, "rationale": "While Nick arrives after the fact, the reason for the indirect narration is rhetorical, not merely factual. Fitzgerald could have had someone witness and report the shooting; instead he chooses peripheral imagery."}, {"text": "To convert spectacle into elegy—the controlled restraint forces readers to supply the emotional weight themselves, making the tragedy more powerful.", "isCorrect": true, "rationale": "The analysis states this technique “converts spectacle into elegy—the reader mourns rather than witnesses.” Withholding direct depiction forces the reader to supply the emotional weight the prose omits."}, {"text": "To suggest that Gatsby’s death is so meaningless that it deserves no direct attention from the narrator.", "isCorrect": false, "rationale": "The restraint is not dismissal but heightened mourning. The analysis frames it as a technique that makes the tragedy more powerful, not less significant."}], "id": "q06"}, {"question": "How does the Dan Cody backstory that Gatsby shares with Nick in Chapter 8 function in the novel?", "options": [{"text": "It explains how Gatsby first made his money through legitimate business with a wealthy patron.", "isCorrect": false, "rationale": "The Cody story explains Gatsby’s formative experience with wealth, but it is not the source of his current fortune. The novel implies his wealth comes from bootlegging and other criminal enterprises with Wolfsheim."}, {"text": "It is shared because “Jay Gatsby” has broken apart against Tom’s hard malice, and the fictional persona no longer needs defending—only the truth remains.", "isCorrect": true, "rationale": "The chapter states that Gatsby tells Nick the story “because ‘Jay Gatsby’ had broken up like glass against Tom’s hard malice, and the long secret extravaganza was played out.” The collapse of the persona removes the need for concealment."}, {"text": "It reveals that Cody, not Wolfsheim, is the true criminal mastermind behind Gatsby’s operations.", "isCorrect": false, "rationale": "Cody is not a criminal mastermind. He is a wealthy patron who introduced young James Gatz to the world of wealth. Wolfsheim is the criminal associate."}, {"text": "It is a deliberate distraction Gatsby uses to avoid discussing Daisy and the previous night’s accident.", "isCorrect": false, "rationale": "The chapter says Gatsby “wanted to talk about Daisy” and that the Cody story came out because of the collapse of his persona. The story is not a deflection but a consequence of that collapse."}], "id": "q07"}, {"question": "The analysis introduces the term “anticlimax” as a deliberate device in Chapter 8. How does Fitzgerald employ it?", "options": [{"text": "The Plaza Hotel confrontation ends without resolution, creating an anticlimactic lack of decision that mirrors the characters’ inability to act.", "isCorrect": false, "rationale": "Anticlimax as defined in the analysis refers specifically to how Gatsby’s death is narrated—with unexpected flatness—not to the Plaza confrontation."}, {"text": "Gatsby’s death—the culmination of the novel’s plot—is rendered not through dramatic confrontation but through ripples in a pool and understatement, making the tragedy more powerful through restraint.", "isCorrect": true, "rationale": "The analysis defines anticlimax as “a moment of high drama resolv[ing] with unexpected flatness or understatement,” and states Fitzgerald employs it deliberately: Gatsby’s death comes through “ripples in a pool, a drifting mattress, and a brief notation that ‘the holocaust was complete.’”"}, {"text": "Nick’s phone call with Jordan Baker is anticlimactic because it ends without either of them saying what they really mean.", "isCorrect": false, "rationale": "While the Jordan call is inconclusive, the analysis specifically frames anticlimax as the technique used to narrate Gatsby’s death, not the phone call."}, {"text": "Tom Buchanan escapes all punishment, creating an anticlimactic resolution where the villain wins.", "isCorrect": false, "rationale": "Tom’s escape from consequence is part of the novel’s thematic portrait of careless wealth, but the analysis’ specific use of “anticlimax” refers to the narrative technique applied to Gatsby’s death scene."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
