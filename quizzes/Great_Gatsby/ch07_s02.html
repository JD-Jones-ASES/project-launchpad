<script>
var QUESTIONS = [{"question": "The analysis explains Gatsby’s “Platonic conception of himself” using the philosophy of Plato. What does this phrase mean in context?", "options": [{"text": "Gatsby values chaste, non-physical friendship over romantic passion.", "isCorrect": false, "rationale": "Platonic here does not mean platonic in the everyday sense of non-romantic. The analysis uses it in its original philosophical sense: Plato’s theory of ideal Forms—perfect, abstract conceptions more real than the material world."}, {"text": "Gatsby has created an ideal, perfect self-image in the manner of Plato’s Forms, and he has spent his life trying to make material reality conform to that vision.", "isCorrect": true, "rationale": "The analysis states: “Gatsby has created an ideal Form of himself, a perfect ‘Jay Gatsby’ existing in his imagination, and he has spent his life trying to make the material world conform to that vision.” His real origins can be discarded as mere appearances."}, {"text": "Gatsby’s self-image is idealized in the sense that he thinks too highly of himself and ignores his flaws.", "isCorrect": false, "rationale": "The analysis draws on Platonic philosophy, not simple vanity. The point is metaphysical: Gatsby believes the ideal Jay Gatsby is more real than the material James Gatz, inverting normal assumptions about reality."}, {"text": "Gatsby modeled himself on classical Greek heroes, whose virtues he attempted to imitate.", "isCorrect": false, "rationale": "Greek heroism is not the analysis’s point. The “Platonic” reference is specifically to Plato’s theory of ideal Forms—the philosophical claim that abstract ideals are more real than physical instances."}]}, {"question": "According to the analysis, why is Gatsby’s cry “Can’t repeat the past? Why of course you can!” not simply naïveté?", "options": [{"text": "Because Gatsby has scientific evidence that memory can reconstruct lost experiences with perfect accuracy.", "isCorrect": false, "rationale": "The analysis makes no appeal to science or memory research. Gatsby’s belief is philosophical: if the ideal is more real than the actual, the actual past five years of Daisy’s marriage are illusion and can be overridden."}, {"text": "Because it is the logical conclusion of his Platonic worldview: if the ideal is more real than the actual, then the actual—Daisy’s marriage and five intervening years—can be overridden.", "isCorrect": true, "rationale": "The analysis states: “His cry of ‘Can’t repeat the past? Why of course you can!’ is not simple naïveté; it is the logical conclusion of his Platonic worldview.” The ideal night in Louisville is true reality; everything since is illusion."}, {"text": "Because Gatsby has seen evidence that Daisy still loves him and believes practical obstacles can be cleared away.", "isCorrect": false, "rationale": "The analysis does not ground Gatsby’s belief in practical evidence or Daisy’s behavior. It roots it in his philosophical framework: the ideal past is real and the intervening years are not."}, {"text": "Because at age seventeen Gatsby genuinely had the power to reshape his identity, so he believes this power is permanent.", "isCorrect": false, "rationale": "While Gatsby’s self-reinvention at seventeen is part of his character, the analysis explains his belief in repeating the past through his Platonic philosophy, not through analogy to his adolescent transformation."}]}, {"question": "The analysis describes Tom Buchanan as a “foil” to Gatsby in Chapter 6. In what specific way does Tom function as a foil?", "options": [{"text": "Tom is morally corrupt while Gatsby is morally pure, creating a contrast of vice and virtue.", "isCorrect": false, "rationale": "The analysis does not frame the contrast as moral purity versus corruption. The specific foil relationship is between old money and new, inherited status versus self-made mythology."}, {"text": "Tom represents old money, inherited status, and brute social reality pushing back against Gatsby’s idealized self-conception.", "isCorrect": true, "rationale": "The analysis states: “Tom is everything Gatsby is not: old money rather than new, inherited status rather than self-made mythology, physical dominance rather than romantic aspiration. Tom’s contempt…represents the brute force of social reality pushing back against Gatsby’s idealized self.”"}, {"text": "Tom is intellectually sophisticated while Gatsby is intellectually unsophisticated, exposing the limits of Gatsby’s self-education.", "isCorrect": false, "rationale": "Intellectual contrast is not the basis of the foil the analysis describes. The contrast is social and economic: inherited versus self-made, old money versus new money."}, {"text": "Tom is content with the present while Gatsby is obsessed with the past, creating a dramatic opposition of worldviews.", "isCorrect": false, "rationale": "While this contrast exists in the novel broadly, the analysis specifically defines Tom’s foil function in terms of his social class—old money and inherited status—versus Gatsby’s self-made identity."}]}, {"question": "The analysis identifies “the fatal weakness” in Gatsby’s grand self-conception. What is it?", "options": [{"text": "His wealth is based on illegal activities that could be exposed at any moment.", "isCorrect": false, "rationale": "The analysis identifies a philosophical weakness, not a legal one. The fatal flaw is that Gatsby’s ideal depends on other people—especially Daisy—accepting his version of reality, and they are under no obligation to do so."}, {"text": "His ideal self-conception depends on other people—especially Daisy—accepting his version of reality, which they cannot be compelled to do.", "isCorrect": true, "rationale": "The analysis states: “The tragic flaw in Gatsby’s grand self-conception is that it depends entirely on other people—especially Daisy—accepting his version of reality, and they are under no obligation to do so.” Daisy sees West Egg through her own eyes, not his."}, {"text": "His conception of himself is childish and was formed at seventeen, before he had sufficient life experience.", "isCorrect": false, "rationale": "The analysis does not call Gatsby’s self-conception childish or immature. The fatal weakness is structural: the ideal requires external validation that cannot be guaranteed."}, {"text": "His obsession with Daisy prevents him from forming the political alliances he would need for genuine social acceptance.", "isCorrect": false, "rationale": "Political alliances are not part of the analysis’s argument. The fatal weakness is that Daisy and Tom and society at large observe reality on their own terms, not Gatsby’s."}]}, {"question": "The analysis says Daisy’s discomfort at Gatsby’s party “signals that reality is already winning.” What does this mean?", "options": [{"text": "Daisy prefers Tom’s company to Gatsby’s and uses the party to make her feelings clear.", "isCorrect": false, "rationale": "The analysis does not interpret Daisy’s discomfort as a preference for Tom. Rather, she sees West Egg “through her own eyes” rather than through Gatsby’s romantic vision, and “what she sees appalls her.”"}, {"text": "Daisy cannot see West Egg through Gatsby’s eyes; her disgust at its vulgarity demonstrates that she will not adopt his idealized version of reality.", "isCorrect": true, "rationale": "The analysis states: “She cannot see West Egg through Gatsby’s eyes; she sees it through her own, and what she sees appalls her.” Reality is “winning” because Daisy refuses to live inside Gatsby’s Platonic vision."}, {"text": "Tom’s investigation into Gatsby’s background is progressing and will soon expose him.", "isCorrect": false, "rationale": "Tom’s growing suspicion is a separate development. The analysis’s “reality is already winning” refers to Daisy’s independent perception—her inability to see the party the way Gatsby does."}, {"text": "Gatsby’s parties are becoming less glamorous as his criminal associates grow more dangerous.", "isCorrect": false, "rationale": "The parties are not described as declining in quality. The “reality winning” is Daisy’s own perception, which cannot be commanded to align with Gatsby’s ideal."}]}, {"question": "According to the analysis, why does Nick describe James Gatz’s parents as having been rejected by his imagination?", "options": [{"text": "Because Gatsby was traumatized by his parents’ poverty and deliberately erased them from his memory.", "isCorrect": false, "rationale": "The analysis does not frame this as psychological trauma or deliberate erasure. It frames it philosophically: Gatsby’s parents belong to the world of imperfect material appearances, while the true Gatsby—Jay Gatsby—is his ideal, Platonic self."}, {"text": "Because in his Platonic framework, his poor farm parents belong to the flawed world of appearances, while the ideal Jay Gatsby—son of his own imagination—is the true reality.", "isCorrect": true, "rationale": "The analysis explains: “His parents, his poverty, his name ‘James Gatz’—these belong to the flawed world of appearances and can be discarded. The true Gatsby, he believes, is the one he has conceived.” This is the direct application of Platonic Form theory."}, {"text": "Because his parents abandoned him at an early age and he had no emotional connection to them.", "isCorrect": false, "rationale": "The text calls his parents “shiftless and unsuccessful” but does not say they abandoned him. Gatsby’s rejection of them is intellectual and philosophical, not biographical."}, {"text": "Because his parents represented the Midwest, which Gatsby associated with failure and social limitation.", "isCorrect": false, "rationale": "Regional association is not the analysis’s explanation. The parents are rejected because they belong to the material, imperfect world that Gatsby’s Platonic self-conception transcends."}]}, {"question": "The analysis describes Dan Cody’s name as evoking “Buffalo Bill” Cody. What does this allusion suggest about Cody’s role in the novel?", "options": [{"text": "It suggests that Cody was a heroic figure, and his mentorship made Gatsby a heroic American success story.", "isCorrect": false, "rationale": "The Buffalo Bill allusion is not straightforwardly heroic. The source text describes Cody as “the pioneer debauchee, who…brought back to the Eastern seaboard the savage violence of the frontier brothel and saloon.”"}, {"text": "It associates Cody with the rough-hewn, self-made wealth of the American frontier—and with the corruption that accompanied it.", "isCorrect": true, "rationale": "The source text notes the name evokes “the rough-hewn, self-made wealth of the American frontier” and describes Cody as “the pioneer debauchee” who carried frontier vice to the Eastern seaboard—suggesting the dark underside of self-made American wealth."}, {"text": "It suggests that Gatsby modeled his public persona on the showmanship of frontier entertainers.", "isCorrect": false, "rationale": "While Gatsby’s persona involves performance, the Buffalo Bill allusion applies to Cody himself, not to any direct modeling by Gatsby. The allusion contextualizes Cody’s type of American wealth."}, {"text": "It implies that Cody’s fortune was honestly earned through ranching and land ownership in the American West.", "isCorrect": false, "rationale": "Cody’s fortune comes from Nevada silver fields and Montana copper transactions, and his character is marked by soft-mindedness and susceptibility to exploitation—hardly a picture of honest frontier virtue."}]}, {"question": "The analysis describes the lyrical passage about Gatsby kissing Daisy using the phrase “the incarnation was complete.” What does “incarnation” mean in this context, and why is the word choice significant?", "options": [{"text": "Incarnation means physical attraction, suggesting the kiss was a purely romantic rather than symbolic event.", "isCorrect": false, "rationale": "Incarnation means literally “giving flesh to” an abstract idea. The kiss is not merely romantic; it is the moment Gatsby’s abstract ideal becomes embodied in Daisy’s physical person—a near-religious transformation."}, {"text": "Incarnation refers to the giving of bodily form to an abstract idea: Gatsby’s infinite dream is incarnated in Daisy’s mortal flesh, permanently binding the ideal to the perishable.", "isCorrect": true, "rationale": "Nick writes that Gatsby “forever wed his unutterable visions to her perishable breath.” The word “incarnation” carries religious overtones—the divine made flesh—and signals that Gatsby has made his eternal ideal dependent on a mortal, fallible person."}, {"text": "Incarnation is a synonym for reincarnation, suggesting Gatsby and Daisy were connected in a previous life.", "isCorrect": false, "rationale": "There is no reincarnation theme in the novel. Incarnation here means giving bodily form to an abstract idea—specifically, Gatsby’s dreams taking on flesh in Daisy’s person."}, {"text": "Incarnation suggests that Gatsby performed a ritual at the kiss, symbolically making Daisy his wife under common law.", "isCorrect": false, "rationale": "No legal or ritual dimension is implied. The word is metaphysical: the abstract ideal of Jay Gatsby’s dream is given corporeal reality through the kiss, making the moment irreversible and Daisy’s mortality permanently attached to his infinite aspirations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
