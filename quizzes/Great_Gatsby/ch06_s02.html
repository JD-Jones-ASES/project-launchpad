<script>
var QUESTIONS = [{"question": "The analysis describes the mantelpiece clock that Gatsby nearly knocks over as a symbol. What does it symbolize?", "options": [{"text": "The fragility of Nick’s domestic life and his unsettled existence in West Egg.", "isCorrect": false, "rationale": "The clock belongs to Nick’s cottage, but the analysis focuses on what it represents for Gatsby: “stopped time” and “his desire to recapture a moment five years past,” not Nick’s circumstances."}, {"text": "Gatsby’s desire to stop time and reverse the five years since he last saw Daisy.", "isCorrect": true, "rationale": "The source text explicitly calls the clock “defunct” and notes it symbolizes “the stopped time Gatsby has been trying to reverse—his desire to recapture a moment five years past.” Gatsby nearly shatters it, then sets it back carefully."}, {"text": "The instability of the 1920s economic boom and the precariousness of new wealth.", "isCorrect": false, "rationale": "While economic themes run throughout the novel, the clock’s symbolic function in this scene is personal and temporal—Gatsby’s inability to accept the passage of five years."}, {"text": "Daisy’s marriage to Tom, which Gatsby cannot permanently overturn.", "isCorrect": false, "rationale": "The marriage is a broader theme, but the clock specifically represents stopped time and the past, not the institution of marriage itself. Gatsby’s reply “Five years next November” reinforces the temporal meaning."}], "id": "q01"}, {"question": "The analysis identifies the green light’s symbolic transformation in Chapter 5. How does its meaning change when Daisy stands beside Gatsby?", "options": [{"text": "The green light grows more powerful as a symbol of hope because Gatsby’s dream is now within reach.", "isCorrect": false, "rationale": "The opposite occurs. When Daisy is physically present, “the colossal significance of that light had now vanished forever.” What was charged with longing becomes merely “a green light on a dock.”"}, {"text": "The green light loses its symbolic power: once the dream is achieved, it becomes merely a green light on a dock.", "isCorrect": true, "rationale": "The analysis states: “what once seemed as close as ‘a star to the moon’ is now ‘again a green light on a dock.’ Gatsby’s ‘count of enchanted objects had diminished by one.’” Presence destroys the symbol."}, {"text": "The green light becomes a symbol of jealousy as Gatsby fears losing Daisy to Tom again.", "isCorrect": false, "rationale": "The green light does not transform into a symbol of jealousy. Its transformation is from longing and aspiration to mundane reality—a consequence of dream achieved rather than threatened."}, {"text": "The green light expands its meaning to represent all of Gatsby’s future hopes for life with Daisy.", "isCorrect": false, "rationale": "The analysis describes the opposite: a diminishment, not an expansion. Achieving the dream collapses the symbol rather than enlarging it."}], "id": "q02"}, {"question": "The analysis identifies “the novel’s deepest irony” in Chapter 5. What is that irony?", "options": [{"text": "That Gatsby, who built his fortune through crime, is morally superior to the old-money characters who inherited theirs.", "isCorrect": false, "rationale": "While the novel raises questions about old versus new money, the analysis identifies a different irony: not moral comparison but the paradox that achieving a dream diminishes it."}, {"text": "That achieving a dream diminishes the dream itself, because the real object cannot sustain the ideal built up over years of longing.", "isCorrect": true, "rationale": "The analysis states: “the achievement of a dream diminishes the dream itself.” Daisy is present, the goal is reached, yet Gatsby’s dream collapses because “no human being could sustain the ‘colossal vitality’ of Gatsby’s illusion.”"}, {"text": "That Daisy’s love for Gatsby is genuine, but social forces make it impossible to act on.", "isCorrect": false, "rationale": "The analysis does not claim Daisy’s love is genuine and thwarted. The irony is about the gap between any real person and a five-year-old idealized dream, not about social obstruction."}, {"text": "That Nick arranges the reunion for Gatsby but falls in love with Daisy himself during the process.", "isCorrect": false, "rationale": "Nick does not fall in love with Daisy. The irony the analysis identifies is specific: the achievement of the goal destroys the symbolic value that made the goal worth pursuing."}], "id": "q03"}, {"question": "The analysis describes Daisy’s tears over the shirts as “deliberately ambiguous.” What are the possible meanings it identifies?", "options": [{"text": "She is crying because she is allergic to the fabric dyes and is embarrassed to say so.", "isCorrect": false, "rationale": "The analysis offers no physical explanation for her tears. It identifies three possible emotional interpretations: mourning lost years, the life she chose not to live, or a response to material extravagance as a proxy for devotion."}, {"text": "She may be mourning the years she missed, the life she chose not to live, or responding to material extravagance as a proxy for Gatsby’s devotion.", "isCorrect": true, "rationale": "The analysis explicitly offers these readings and calls the moment “deliberately ambiguous.” The shirts are material objects standing in for emotion, and Fitzgerald leaves open which emotion is being expressed."}, {"text": "She is crying because she realizes the shirts prove Gatsby is a criminal bootlegger.", "isCorrect": false, "rationale": "The shirts do not signal criminality to Daisy in this moment. The analysis treats her tears as an emotional response to abundance and loss, not as a moment of moral recognition."}, {"text": "She is performing sadness to manipulate Gatsby into proposing marriage immediately.", "isCorrect": false, "rationale": "The analysis does not suggest Daisy is performing for strategic effect. The tears are described as a genuine but enigmatic response that Fitzgerald leaves open to multiple interpretations."}], "id": "q04"}, {"question": "The analysis argues that “material abundance serves as a proxy for emotional expression” in Chapter 5. Which textual examples best support this claim?", "options": [{"text": "Gatsby’s elaborate party preparations and his three-noted car horn.", "isCorrect": false, "rationale": "The analysis identifies objects within the reunion scene itself—shirts, the green light, the gold-bristled dresser set—not party preparations or the car horn."}, {"text": "The greenhouse of flowers sent to Nick’s house and Gatsby’s white flannel suit.", "isCorrect": false, "rationale": "While these show preparation, the analysis’s discussion of objects as emotional proxies centers on the shirt-throwing scene and the green light, where objects replace direct speech between Gatsby and Daisy."}, {"text": "The shirts Gatsby throws before Daisy and the green light he points to across the bay—both objects substituting for direct declarations of feeling.", "isCorrect": true, "rationale": "The analysis specifically states that “material abundance serves as a proxy for emotional expression—both Gatsby and Daisy communicate through objects rather than direct speech.” The shirts and the green light are the two central examples in the chapter."}, {"text": "Klipspringer’s piano playing and the pink and golden billow of clouds Daisy admires.", "isCorrect": false, "rationale": "While Klipspringer’s song is symbolically rich, the analysis’s argument about material objects as emotional proxies is anchored in the shirts and the green light, not in music or weather."}], "id": "q05"}, {"question": "The analysis states that the chapter “establishes the tragic trajectory of the novel.” What is that trajectory?", "options": [{"text": "Gatsby’s criminal past will eventually be exposed, leading to his arrest and imprisonment.", "isCorrect": false, "rationale": "The novel’s tragic trajectory as the analysis identifies it is not legal exposure but the impossibility of recovering the past: “Gatsby has won the prize only to discover that winning cannot restore the past.”"}, {"text": "Gatsby has won the prize only to discover that winning cannot restore the past, foreshadowed by the bewilderment on his face as Nick departs.", "isCorrect": true, "rationale": "The analysis concludes: “Gatsby has won the prize only to discover that winning cannot restore the past.” The “bewilderment” Nick sees, along with the hint that Daisy “tumbled short of his dreams,” establishes this tragic direction."}, {"text": "Daisy will choose Tom over Gatsby, and Gatsby will be destroyed by his inability to accept rejection.", "isCorrect": false, "rationale": "While Daisy’s ultimate choice is part of the novel’s later events, the analysis identifies the tragic trajectory as rooted in the dream/reality gap, not simply in romantic rejection."}, {"text": "Nick will grow disillusioned with New York society and return to the Midwest, signaling the failure of Eastern promise.", "isCorrect": false, "rationale": "Nick’s disillusionment is a subplot, not the central tragedy the analysis identifies. The tragic trajectory belongs to Gatsby’s fundamental inability to make reality match his dream."}], "id": "q06"}, {"question": "What does the analysis mean when it says Gatsby’s dream “had gone beyond her, beyond everything”?", "options": [{"text": "Gatsby’s dream was so excessive that it was always destined to outgrow any human relationship, leaving Daisy unable to fulfill it by definition.", "isCorrect": true, "rationale": "The analysis quotes: “the colossal vitality of his illusion…had gone beyond her, beyond everything.” Gatsby added to his dream “every bright feather that drifted his way,” making it superhuman in scale—no actual person could satisfy it."}, {"text": "Gatsby’s ambitions exceeded Daisy’s social class and she was therefore unworthy of his devotion.", "isCorrect": false, "rationale": "The analysis explicitly states: “Fitzgerald does not suggest that Daisy is unworthy of love.” The problem is the scale of Gatsby’s illusion, not any inadequacy in Daisy."}, {"text": "Gatsby loved Daisy so completely that no other woman could replace her, isolating him permanently.", "isCorrect": false, "rationale": "The analysis addresses the dream’s excess, not Gatsby’s fidelity. The point is that his dream surpassed what any human reality—including Daisy herself—could match."}, {"text": "Gatsby’s wealth had grown so large that Daisy no longer needed to rely on Tom for financial security.", "isCorrect": false, "rationale": "Financial comparison is not the analysis’s point here. The passage “had gone beyond her, beyond everything” refers to the psychological and emotional scale of Gatsby’s five-year illusion, not his bank account."}], "id": "q07"}, {"question": "The song “Ain’t We Got Fun” is played by Klipspringer near the end of the chapter. How does the analysis characterize its use?", "options": [{"text": "It is a straightforward celebration of Gatsby and Daisy’s reunion, affirming their shared happiness.", "isCorrect": false, "rationale": "The source text explicitly calls its use “deeply ironic”—a song celebrating happiness despite poverty, played “amid Gatsby’s extraordinary wealth while hinting at the emptiness beneath the glamour.”"}, {"text": "It is deeply ironic: a song celebrating happiness despite poverty, played amid Gatsby’s extraordinary wealth, hinting at emptiness beneath the glamour.", "isCorrect": true, "rationale": "The text’s annotation for the song identifies it as “deeply ironic”—its lyrics (“not much money, oh but honey / ain’t we got fun”) contrast with the setting, and the lines about the rich getting richer underscore the hollowness Gatsby is beginning to sense."}, {"text": "It is a nostalgic touch, reminding Gatsby and Daisy of the songs they heard together in Louisville.", "isCorrect": false, "rationale": "The song is described as a 1921 popular tune, but the analysis frames it as ironic contrast rather than nostalgia. The juxtaposition of its poverty-era lyrics with Gatsby’s opulence is the key literary point."}, {"text": "It is a signal from Fitzgerald that Klipspringer represents the artistic community exploiting Gatsby’s hospitality.", "isCorrect": false, "rationale": "Klipspringer as a social parasite is a separate characterization. The song’s function in the analysis is ironic commentary on the gap between the cheerful lyrics and the bewildered scene unfolding between Gatsby and Daisy."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
