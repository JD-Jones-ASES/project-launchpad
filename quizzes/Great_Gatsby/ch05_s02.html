<script>
var QUESTIONS = [{"question": "The source text describes Gatsby’s autobiography as sounding like a figure “leaking sawdust.” What does this metaphor convey about Gatsby’s self-presentation?", "options": [{"text": "It suggests Gatsby is physically frail and exhausted from telling his story.", "isCorrect": false, "rationale": "The sawdust metaphor is not about physical fatigue. It is a literary image conveying artificiality—a stuffed “character” whose conventional phrases expose him as a constructed, hollow figure rather than a genuine person."}, {"text": "It reveals that Gatsby’s carefully scripted story is artificial and constructed, like a stuffed figure falling apart.", "isCorrect": true, "rationale": "The analysis states the metaphor “exposes the constructed, artificial nature of Gatsby’s self-presentation.” His autobiography follows such worn conventions that it evokes not a real man but a theatrical “turbaned character” stuffed with sawdust."}, {"text": "It implies that Gatsby has been damaged by war trauma and cannot speak coherently.", "isCorrect": false, "rationale": "War trauma is not the point of the metaphor. Nick’s incredulous laughter is triggered by the threadbare phrases of the autobiography, not by any sign of trauma in Gatsby’s manner."}, {"text": "It indicates that Gatsby is deliberately lying in order to amuse Nick.", "isCorrect": false, "rationale": "Gatsby is not trying to be comic; he is deadly serious about establishing his identity. The sawdust image captures the involuntary effect of his performance, not an intentional joke."}]}, {"question": "The analysis argues that when Gatsby produces the medal and photograph, Nick’s “resistance collapses entirely.” What theme does this illustrate?", "options": [{"text": "That Nick is too gullible to evaluate evidence critically.", "isCorrect": false, "rationale": "The point is not Nick’s personal gullibility but a broader cultural observation: “in a culture obsessed with surfaces and possessions, physical objects carry more persuasive power than narrative coherence.”"}, {"text": "That in a culture fixated on surfaces and possessions, physical objects persuade more powerfully than narrative coherence.", "isCorrect": true, "rationale": "The analysis states this explicitly as a “central theme of the novel”: objects (the medal, the photograph) do what words cannot. Material evidence silences Nick’s doubts where Gatsby’s spoken autobiography had failed."}, {"text": "That Oxford education automatically confers social credibility in 1920s America.", "isCorrect": false, "rationale": "While Oxford lends some prestige, the analysis focuses on the persuasive power of physical objects generally, not on the specific prestige of any institution."}, {"text": "That veterans were automatically trusted because of their wartime sacrifice.", "isCorrect": false, "rationale": "The theme is about the power of material objects as proof, not about veteran status. Nick is convinced by the tangible medal and photograph, which transcend claims about military service alone."}]}, {"question": "How does Meyer Wolfshiem function thematically in Chapter 4, according to the analysis?", "options": [{"text": "He represents the immigrant experience and the promise of social mobility in America.", "isCorrect": false, "rationale": "While Wolfshiem’s ethnic identity is part of Fitzgerald’s characterization, the analysis emphasizes his function as a parallel to Gatsby: both perform gentility as a mask over criminal reality."}, {"text": "He reveals that Gatsby’s wealth comes from criminal enterprise, forcing the reader to reinterpret Gatsby’s entire autobiography.", "isCorrect": true, "rationale": "The analysis states that the revelation of Wolfshiem’s role in fixing the World Series “forces the reader to reconsider everything Gatsby has said about himself,” since his fortune appears to come from criminal rather than legitimate sources."}, {"text": "He serves as comic relief, lightening the chapter’s otherwise serious tone.", "isCorrect": false, "rationale": "Wolfshiem is not presented as comic relief. His sentimental nostalgia, human-molar cuff buttons, and attempt to recruit Nick as a “business gonnegtion” create unease, not comedy."}, {"text": "He exists primarily to contrast with the honest, hard-working characters of East Egg.", "isCorrect": false, "rationale": "Wolfshiem is contrasted with Gatsby’s polished persona, not with East Egg characters. The analysis uses him to illuminate the criminal underworld beneath Gatsby’s carefully constructed identity."}]}, {"question": "The analysis describes Wolfshiem’s gentility as “merely another performance.” What literary device does this parallel in Gatsby’s characterization?", "options": [{"text": "Dramatic irony, because the reader knows Wolfshiem is criminal before Nick does.", "isCorrect": false, "rationale": "While dramatic irony is present, the analysis specifically uses the word “performance” to build a thematic parallel between Wolfshiem and Gatsby, emphasizing that both men perform respectability as a mask."}, {"text": "Foil, because Wolfshiem’s performed respectability mirrors and deepens the reader’s understanding of Gatsby’s own performed identity.", "isCorrect": true, "rationale": "The analysis presents identity in the novel as “fundamentally performative,” and Wolfshiem’s false gentility directly parallels Gatsby’s false autobiography, functioning as a thematic foil that illuminates both characters."}, {"text": "Foreshadowing, because Wolfshiem’s criminality predicts Gatsby’s eventual death.", "isCorrect": false, "rationale": "Foreshadowing of Gatsby’s death is not what the analysis identifies. The parallel between their performances is a thematic, not a predictive, device."}, {"text": "Allegory, because Wolfshiem represents the corruption of the American political system.", "isCorrect": false, "rationale": "The analysis does not read Wolfshiem as a political allegory. He functions as a thematic parallel to Gatsby, showing that performed respectability is a shared strategy in their world."}]}, {"question": "Jordan Baker’s account of Daisy and Gatsby’s Louisville romance is described as a “third narrative layer.” What does this layering of narratives suggest about identity in the novel?", "options": [{"text": "That the truth about Gatsby can only be known through women, since men are unreliable narrators.", "isCorrect": false, "rationale": "The analysis does not privilege female narrators over male ones. The layering—Gatsby’s autobiography, Wolfshiem’s anecdotes, Jordan’s memory—suggests that identity is constructed through multiple, competing performances."}, {"text": "That identity in the novel is fundamentally performative, constructed through overlapping and sometimes contradictory accounts.", "isCorrect": true, "rationale": "The analysis concludes: “identity in the novel [is] fundamentally performative”—Gatsby performs the wealthy gentleman, Wolfshiem the respectable businessman, Daisy the dutiful bride. Jordan’s narration adds another layer, filtered through memory and retelling."}, {"text": "That Nick Carraway is an unreliable narrator whose account should be distrusted.", "isCorrect": false, "rationale": "While Nick’s reliability is a broader question in the novel, the analysis here focuses on the performative nature of all the characters’ identities, not specifically on Nick’s unreliability."}, {"text": "That Daisy is the most honest character because her story comes through a trusted friend.", "isCorrect": false, "rationale": "The analysis does not rank Daisy as most honest. Jordan’s account is itself filtered and partial, and Daisy’s performance of the dutiful bride is explicitly described as a performance."}]}, {"question": "What does the analysis identify as the emotional core that Gatsby’s autobiography “strategically omitted”?", "options": [{"text": "His criminal partnership with Wolfshiem and the sources of his wealth.", "isCorrect": false, "rationale": "While Gatsby’s criminal connections are a key revelation, the analysis specifically calls the Louisville love story “the emotional core” that his self-serving autobiography omits in favor of material achievements."}, {"text": "The Louisville love story—his relationship with Daisy, which explains the purpose of his entire material life.", "isCorrect": true, "rationale": "The analysis states Jordan’s narration “reveals that Gatsby’s entire material life—the mansion, the parties, the cream-colored car—is an elaborate construction designed to recover a single moment from the past.” This emotional origin is what Gatsby’s polished autobiography omits."}, {"text": "His years of poverty as a child in North Dakota and his family’s struggles.", "isCorrect": false, "rationale": "Gatsby’s actual origins in North Dakota are not revealed until Chapter 6. The “emotional core” the analysis identifies is the Daisy romance, not his childhood poverty."}, {"text": "His relationship with Dan Cody and the education in wealth he received aboard the yacht.", "isCorrect": false, "rationale": "The Dan Cody backstory also belongs to Chapter 6. Chapter 4’s analysis focuses on the Louisville love story as the hidden emotional explanation for all of Gatsby’s striving."}]}, {"question": "The analysis describes Daisy’s wedding-night behavior as a “performance.” In what sense is she “performing” even while drunk?", "options": [{"text": "She is acting out a rehearsed scene to manipulate Tom into feeling guilty.", "isCorrect": false, "rationale": "The analysis does not suggest Daisy is strategically manipulating Tom. Her drunken attempt to return the pearls is presented as a genuine emotional crisis, but she ultimately performs the role of dutiful bride by proceeding with the wedding."}, {"text": "Her drunken rejection of the wedding is genuine emotion, but by marrying Tom the next day she ultimately performs the role of dutiful bride—suppressing her feelings to conform to social expectations.", "isCorrect": true, "rationale": "The analysis notes that “even Daisy, on the eve of her wedding, performs the role of the dutiful bride—though not before a drunken attempt to reject that role entirely.” The performance is the conformity she enacts after her authentic revolt."}, {"text": "She is pretending to be drunk in order to avoid marrying Tom without directly refusing him.", "isCorrect": false, "rationale": "Jordan’s narration presents Daisy as genuinely drunk. The “performance” the analysis identifies is not the drunkenness but the subsequent act of proceeding with the wedding as though nothing happened."}, {"text": "She performs wealth and elegance as a signal to Gatsby that she has not forgotten him.", "isCorrect": false, "rationale": "There is no evidence Daisy’s behavior is a signal to Gatsby. The performance the analysis identifies is Daisy’s conformity to the social role of bride despite her private turmoil."}]}, {"question": "Gatsby routes his request to Daisy through Jordan Baker rather than asking Nick directly. What does this indirectness reveal about Gatsby’s character?", "options": [{"text": "It shows Gatsby distrusts Nick and prefers to work through intermediaries he has known longer.", "isCorrect": false, "rationale": "Gatsby’s use of Jordan is not about distrust of Nick. Jordan explains that Gatsby “is afraid, he’s waited so long,” and the indirectness reflects his anxiety and his need for everything to appear casual and non-presumptuous."}, {"text": "It reveals that beneath his grand spectacle, Gatsby is deeply anxious and so afraid of rejection that he cannot ask directly for what he most desires.", "isCorrect": true, "rationale": "Jordan tells Nick that Gatsby “is afraid, he’s waited so long,” and the text notes “the modesty of the demand shook me”—five years of effort and a purchased mansion, all so Gatsby could “come over” to a neighbor’s garden without appearing to presume."}, {"text": "It demonstrates Gatsby’s strategic intelligence, using social networks to accomplish goals without revealing himself.", "isCorrect": false, "rationale": "While Gatsby is strategically minded, the analysis and text both emphasize anxiety and fear of rejection as the emotional drivers of his indirectness, not cool strategic calculation."}, {"text": "It proves that Gatsby is not actually in love with Daisy but rather pursuing her as a social trophy.", "isCorrect": false, "rationale": "The analysis presents Gatsby’s love for Daisy as the organizing force of his entire life. His indirectness is born of fear and obsession, not social trophy-hunting."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
