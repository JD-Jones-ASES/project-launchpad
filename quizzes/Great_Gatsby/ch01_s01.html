<body>
<div class="quiz-container">

        <a href="../../courses/Great_Gatsby.html">&larr; Back to Reading a Modern Novel: The Great Gatsby</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; F. Scott Fitzgerald (1896-1940)</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Where was F. Scott Fitzgerald born, and in what year?", "options": [{"text": "New York City, 1892", "isCorrect": false, "rationale": "Fitzgerald was not born in New York. The source states he was born in St. Paul, Minnesota, in 1896."}, {"text": "St. Paul, Minnesota, 1896", "isCorrect": true, "rationale": "The source states directly that “Francis Scott Key Fitzgerald was born on September 24, 1896, in St. Paul, Minnesota.”"}, {"text": "Montgomery, Alabama, 1896", "isCorrect": false, "rationale": "Montgomery, Alabama is where Fitzgerald was stationed during World War I and where he met Zelda Sayre, not where he was born."}, {"text": "Princeton, New Jersey, 1894", "isCorrect": false, "rationale": "Princeton is the university Fitzgerald attended beginning in 1913, not his birthplace, and 1894 is an incorrect date."}], "id": "q01"}, {"question": "What was the source of the social tension Fitzgerald grew up with in his family?", "options": [{"text": "His parents disapproved of his literary ambitions.", "isCorrect": false, "rationale": "The source does not describe parental disapproval of Fitzgerald’s writing. The tension is described in economic and class terms."}, {"text": "His father’s genteel background clashed with his mother’s immigrant roots, and the family struggled between social aspiration and financial insecurity.", "isCorrect": true, "rationale": "The source explains that his father came from a “genteel Maryland family” but “Edward’s business ventures repeatedly failed,” while his mother was “the daughter of a prosperous Irish immigrant grocer.” This tension between aspiration and insecurity became central to Fitzgerald’s fiction."}, {"text": "Fitzgerald’s Catholic faith put him at odds with his Protestant community.", "isCorrect": false, "rationale": "While Fitzgerald did attend a Catholic preparatory school, the source frames the family tension as one of class and finances, not religious conflict."}, {"text": "His family moved frequently, leaving Fitzgerald without a stable community.", "isCorrect": false, "rationale": "The source does not describe frequent moves as a source of family tension. The tension is explicitly tied to social aspiration and financial insecurity."}], "id": "q02"}, {"question": "Why did Fitzgerald never graduate from Princeton University?", "options": [{"text": "He was expelled for poor academic performance.", "isCorrect": false, "rationale": "The source does not state he was expelled. It says he devoted himself to writing rather than studies, and then left when World War I began."}, {"text": "He left to pursue a full-time writing career after his early stories were accepted for publication.", "isCorrect": false, "rationale": "The source does not describe early publication success as the reason he left Princeton. He departed to serve in the military."}, {"text": "He received a commission as a second lieutenant in the infantry when the United States entered World War I.", "isCorrect": true, "rationale": "The source states: “When the United States entered World War I in 1917, Fitzgerald received a commission as a second lieutenant in the infantry,” which is why he never graduated."}, {"text": "He transferred to a different university to study theater.", "isCorrect": false, "rationale": "There is no mention of a transfer in the source. Fitzgerald left Princeton for military service in World War I."}], "id": "q03"}, {"question": "How did Fitzgerald’s relationship with Zelda Sayre directly influence the plot of The Great Gatsby?", "options": [{"text": "Zelda’s mental illness inspired the character of Daisy’s fragility and instability.", "isCorrect": false, "rationale": "While Zelda did suffer mental breakdowns, the source specifically identifies a different biographical detail as the inspiration for Gatsby’s backstory."}, {"text": "Zelda’s initial refusal to marry Fitzgerald for lack of money became the backstory of Jay Gatsby and Daisy Fay.", "isCorrect": true, "rationale": "The source states that “Zelda initially broke off their engagement, unwilling to marry a man without financial prospects—a detail that Fitzgerald would transform into the backstory of Jay Gatsby and Daisy Fay.”"}, {"text": "Zelda’s social connections on Long Island gave Fitzgerald access to the world he depicted in the novel.", "isCorrect": false, "rationale": "The source does not describe Zelda’s social connections as a source for the novel’s setting. The biographical link is specifically about the broken engagement due to lack of money."}, {"text": "Zelda’s father, a Supreme Court judge, was the model for Tom Buchanan’s authority and arrogance.", "isCorrect": false, "rationale": "The source identifies Zelda’s father as an Alabama Supreme Court judge but does not connect him to Tom Buchanan’s characterization."}], "id": "q04"}, {"question": "What caused Zelda and Scott Fitzgerald’s marriage to become “ultimately tragic” according to the source?", "options": [{"text": "Zelda left Fitzgerald for another man, and the divorce destroyed his career.", "isCorrect": false, "rationale": "The source does not describe divorce or infidelity as the cause of their tragedy. It points to Zelda’s mental illness and Fitzgerald’s alcoholism."}, {"text": "Zelda suffered a series of mental breakdowns beginning in 1930, and Fitzgerald struggled with alcoholism throughout the decade.", "isCorrect": true, "rationale": "The source states explicitly: “Zelda suffered a series of mental breakdowns beginning in 1930, and Fitzgerald struggled with alcoholism throughout the decade,” making their glamorous life “ultimately tragic.”"}, {"text": "The couple’s extravagant spending left them bankrupt and estranged.", "isCorrect": false, "rationale": "While the source notes they spent money as quickly as Fitzgerald earned it, it does not identify bankruptcy or estrangement as the primary tragedy. Mental illness and alcoholism are the stated causes."}, {"text": "World War I PTSD affected Fitzgerald so severely that he could no longer write or support the family.", "isCorrect": false, "rationale": "The source does not mention PTSD or wartime trauma as a cause of Fitzgerald’s personal decline. His struggle was with alcoholism."}], "id": "q05"}, {"question": "Which of the following best explains why reading The Great Gatsby as simple autobiography is misleading?", "options": [{"text": "Fitzgerald denied any connection between his life and the novel in letters and interviews.", "isCorrect": false, "rationale": "The source does not cite any interviews or denials from Fitzgerald. The argument against simple autobiography is based on the novel’s craft and thematic scope."}, {"text": "Fitzgerald’s experiences were fabricated, not lived, so autobiography is impossible.", "isCorrect": false, "rationale": "The source actually affirms that Fitzgerald’s life parallels do exist in the novel. The problem is over-simplifying those parallels, not denying them."}, {"text": "Fitzgerald used his experience as raw material, but the novel transcends personal history to become a meditation on American aspiration itself.", "isCorrect": true, "rationale": "The source states: “Fitzgerald used his experience as raw material, but the novel transcends personal history to become a meditation on American aspiration itself.” Simple autobiography misses this larger artistic achievement."}, {"text": "Nick Carraway’s perspective is so different from Fitzgerald’s that no biographical connection is possible.", "isCorrect": false, "rationale": "The source actually says “Fitzgerald was also Nick Carraway,” affirming the connection. The issue is not the absence of connection but over-reduction of the novel to biography."}], "id": "q06"}, {"question": "What was the state of Fitzgerald’s reputation at the time of his death in 1940?", "options": [{"text": "He was celebrated as one of America’s greatest living novelists.", "isCorrect": false, "rationale": "The source says the opposite: at his death, Fitzgerald “was widely regarded as a relic of the previous decade.”"}, {"text": "He was a respected Hollywood screenwriter whose film work had revived his reputation.", "isCorrect": false, "rationale": "While Fitzgerald did work in Hollywood, the source states his reputation had declined and The Great Gatsby was out of print—not that Hollywood had revived his standing."}, {"text": "He was widely regarded as a relic of the 1920s, and The Great Gatsby was out of print.", "isCorrect": true, "rationale": "The source states: “At the time of his death, The Great Gatsby was out of print, and Fitzgerald was widely regarded as a relic of the previous decade—a cautionary tale about talent squandered and promise unfulfilled.”"}, {"text": "He had just completed The Last Tycoon to wide critical acclaim.", "isCorrect": false, "rationale": "The source describes The Last Tycoon as his “final, unfinished novel.” It was not completed, and no acclaim for it is mentioned in the source."}], "id": "q07"}, {"question": "The source identifies Fitzgerald with two different characters from The Great Gatsby. Which pairing does it describe?", "options": [{"text": "Tom Buchanan and Gatsby, because Fitzgerald shared their ambition and wealth.", "isCorrect": false, "rationale": "The source does not identify Fitzgerald with Tom Buchanan. The parallels it draws are with Gatsby and Nick Carraway."}, {"text": "Gatsby and Nick Carraway, because Fitzgerald was both the dreaming outsider and the clear-eyed observer of corruption.", "isCorrect": true, "rationale": "The source states: “Like Gatsby, Fitzgerald was a Midwesterner who reinvented himself in the East” and pursued a “golden girl,” but “Fitzgerald was also Nick Carraway—the observer, the moralist, the man who could see the corruption beneath the glamour.”"}, {"text": "Gatsby and Daisy, because Fitzgerald embodied both the dream and its object.", "isCorrect": false, "rationale": "The source does not compare Fitzgerald to Daisy. It draws parallels with Gatsby and Nick, the male protagonists."}, {"text": "Nick Carraway and Jordan Baker, because both represent the disenchanted observer who tells the story.", "isCorrect": false, "rationale": "Jordan Baker is not mentioned in the biographical parallels the source draws. The pairing the source uses is Gatsby and Nick Carraway."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
