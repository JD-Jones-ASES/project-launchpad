<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CLIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who takes up Cupid's brand in Sonnet CLIV?", "options": [{"text": "A maid of Diana, as in Sonnet CLIII", "isCorrect": false, "rationale": "CLIII attributes the quenching to 'a maid of Dian's'; CLIV specifies 'the fairest votary' of the chaste band."}, {"text": "The fairest among many nymphs who vowed chaste life", "isCorrect": true, "rationale": "'The fairest votary took up that fire / Which many legions of true hearts had warm'd' — the most beautiful of the chaste votaries claims the torch."}, {"text": "Venus herself, reclaiming what was stolen from her son", "isCorrect": false, "rationale": "Venus does not appear in CLIV; the actor is a chaste nymph."}, {"text": "The speaker's mistress, acting as Love's general", "isCorrect": false, "rationale": "The mistress appears later in the poem as the source of Cupid's re-ignition, not as the one who quenches the brand."}], "id": "q01"}, {"question": "How is Cupid described in the opening of Sonnet CLIV?", "options": [{"text": "As a mighty warrior arming for battle", "isCorrect": false, "rationale": "Cupid is described in repose, not preparing for battle."}, {"text": "As the little Love-god lying asleep with his heart-inflaming brand beside him", "isCorrect": true, "rationale": "'The little Love-god lying once asleep, / Laid by his side his heart-inflaming brand' — he is diminutive, sleeping, and temporarily disarmed."}, {"text": "As a boy weeping over the loss of his torch", "isCorrect": false, "rationale": "Weeping is not the description; he is asleep and unaware of the theft."}, {"text": "As a general leading legions of lovers into battle", "isCorrect": false, "rationale": "He is called 'the general of hot desire' but in a passive/sleeping state, not commanding."}], "id": "q02"}, {"question": "What is Cupid called in line 9, and what irony does this title create?", "options": [{"text": "'Love's soldier' — ironic because he is asleep and not fighting", "isCorrect": false, "rationale": "'Soldier' is not the title used; 'general' is, and the irony is stronger."}, {"text": "'The general of hot desire' — ironic because this general is sleeping and being disarmed by a virgin", "isCorrect": true, "rationale": "Calling Cupid 'the general of hot desire' and then showing him 'sleeping, by a virgin hand disarm'd' creates comic bathos — the mighty commander defeated by chastity while asleep."}, {"text": "'The king of love' — ironic because he is shown as powerless", "isCorrect": false, "rationale": "'King' is not the title; 'general' is."}, {"text": "'The little Love-god' — ironic because he is actually immensely powerful", "isCorrect": false, "rationale": "While 'little' does have ironic potential, the specific irony of 'general' being 'disarmed' by a virgin is the more pointed contrast."}], "id": "q03"}, {"question": "In Sonnet CLIV, where is the brand quenched?", "options": [{"text": "A cold valley-fountain (as in Sonnet CLIII)", "isCorrect": false, "rationale": "CLIII names a 'cold valley-fountain'; CLIV names a 'cool well by' — a slightly different location."}, {"text": "A cool well nearby", "isCorrect": true, "rationale": "'This brand she quenched in a cool well by' — the site is a well rather than the valley-fountain of CLIII."}, {"text": "A seething bath already in existence", "isCorrect": false, "rationale": "The bath does not pre-exist; it is created by the quenching, as it was in CLIII."}, {"text": "The sea", "isCorrect": false, "rationale": "The sea is not the location; a specific well is named."}], "id": "q04"}, {"question": "The final couplet — 'Love's fire heats water, water cools not love' — expresses what truth?", "options": [{"text": "Physical fire is stronger than water in general", "isCorrect": false, "rationale": "A general natural law about fire and water is not the point; love's specific and irresistible nature is."}, {"text": "Love's fire can heat water (create the bath) but water (the bath) cannot cool love — love is incurable", "isCorrect": true, "rationale": "The epigram is the sequence's final statement: love's power goes one direction only — it transforms whatever it touches, but nothing can neutralize it in return."}, {"text": "The speaker has been successfully cured by the bath and love is extinguished", "isCorrect": false, "rationale": "The cure fails, as stated in CLIII; CLIV confirms by summarizing the paradox as a final epigram."}, {"text": "Water is inferior to fire in all moral and spiritual matters", "isCorrect": false, "rationale": "A hierarchy of elements is not the subject; the irreversibility of love's fire is."}], "id": "q05"}, {"question": "How does Sonnet CLIV differ structurally from its twin, Sonnet CLIII?", "options": [{"text": "CLIV is a Spenserian sonnet with a linked rhyme scheme", "isCorrect": false, "rationale": "Both CLIII and CLIV follow the standard Shakespearean rhyme scheme."}, {"text": "CLIV develops the myth more expansively in the octave (details of the nymphs and the disarming), while CLIII focuses more quickly on the speaker's personal situation", "isCorrect": true, "rationale": "CLIV spends more lines on the mythological action — the nymphs, 'legions of true hearts,' the 'general' being disarmed — before turning to the speaker; CLIII reaches the mistress by line 11."}, {"text": "CLIV omits the personal conclusion and ends purely as myth", "isCorrect": false, "rationale": "CLIV does include the speaker in the final quatrain and couplet; the personal application is not omitted."}, {"text": "CLIV is addressed to Cupid, while CLIII is addressed to the mistress", "isCorrect": false, "rationale": "Neither sonnet is directly addressed to a named figure; both are third-person mythological narratives with a first-person personal application."}], "id": "q06"}, {"question": "What is the thematic significance of ending the entire sonnet sequence with the couplet 'Love's fire heats water, water cools not love'?", "options": [{"text": "It suggests the speaker has found peace and resolved his torment", "isCorrect": false, "rationale": "Peace and resolution are the opposite of the couplet's implication; love remains incurable."}, {"text": "It provides a epigrammatic summary of the whole sequence's conclusion: love is an irresistible, incurable force that defeats all remedies", "isCorrect": true, "rationale": "As the last lines of the 1609 Quarto sequence, the couplet encapsulates the trajectory of the Dark Lady sonnets — desire that cannot be reasoned, medicated, or wished away."}, {"text": "It promises a future sequel in which the speaker finds a cure", "isCorrect": false, "rationale": "No sequel or hope of cure is implied; the statement is absolute and closing."}, {"text": "It reverts to Petrarchan idealization of love as a divine and ennobling force", "isCorrect": false, "rationale": "Petrarchan idealization is absent; love here is powerful but destructive and incurable, not ennobling."}], "id": "q07"}, {"question": "The myth in both CLIII and CLIV is classified as 'Anacreontic.' What does this classification imply about tone and form?", "options": [{"text": "The myth is tragic, derived from Athenian tragedy", "isCorrect": false, "rationale": "Anacreontic verse is not tragic; it belongs to the lighter lyric tradition."}, {"text": "The myth is in the tradition of elegant, playful erotic lyric — graceful, witty, and short rather than epic or tragic", "isCorrect": true, "rationale": "Anacreon and the Anacreontic tradition (Greek anthology poems) are known for light, clever, elegantly playful treatments of love and Eros — a tonal contrast with the anguish of the preceding Dark Lady sonnets."}, {"text": "The myth derives from Anacreon's lost epics about the Trojan War", "isCorrect": false, "rationale": "Anacreon was a lyric poet, not an epic poet; no Trojan War connection exists."}, {"text": "The classification implies the sonnets are meant to be sung to a specific meter", "isCorrect": false, "rationale": "While 'Anacreontic' has a metrical meaning in Greek (a specific quantitative pattern), here the term refers to the literary tradition and tone, not to Shakespeare's sonnet meter."}], "id": "q08"}, {"question": "Together, Sonnets CLIII and CLIV constitute what kind of ending for the entire sequence?", "options": [{"text": "A triumphant celebration of the speaker's enduring love", "isCorrect": false, "rationale": "Triumph is absent; the ending is bittersweet — love endures but only as incurable suffering."}, {"text": "A bittersweet mythological coda that universalizes the sequence's theme of love's incurability", "isCorrect": true, "rationale": "By encoding the speaker's condition in Anacreontic myth, the coda lifts the personal anguish of the sequence into a timeless truth: love's fire cannot be quenched by any remedy."}, {"text": "A sudden comic resolution that lightens all the preceding darkness", "isCorrect": false, "rationale": "Comic resolution is not achieved; the final line confirms incurability rather than resolving it."}, {"text": "A repudiation of all that came before, suggesting the sonnets were merely fictional exercises", "isCorrect": false, "rationale": "Repudiation as fiction is not the function; the coda extends and universalizes the sequence's emotional truth."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
