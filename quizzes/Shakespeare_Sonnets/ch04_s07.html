    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What artistic metaphor governs the opening of Sonnet XXIV?", "options": [{"text": "The speaker’s tongue has become a musical instrument", "isCorrect": false, "rationale": "No musical metaphor is used; the governing conceit is visual and painterly."}, {"text": "The speaker’s eye has acted as a painter, engraving the beloved’s image in his heart", "isCorrect": true, "rationale": "“Mine eye hath play’d the painter and hath stell’d / Thy beauty’s form in table of my heart”—the eye-as-painter conceit structures the entire sonnet."}, {"text": "The speaker’s hand has sculpted the beloved’s image in marble", "isCorrect": false, "rationale": "Sculpture is not the metaphor; the conceit is explicitly about painting and engraving."}, {"text": "The beloved’s smile is likened to the brushstroke of a master painter", "isCorrect": false, "rationale": "The beloved’s smile is not specifically mentioned; the conceit centers on the speaker’s eye as painter."}]}, {"question": "In the painter metaphor, what serves as the “table” (canvas)?", "options": [{"text": "An actual painting the speaker has created", "isCorrect": false, "rationale": "No literal painting exists; the entire scenario is metaphorical."}, {"text": "The speaker’s heart, on which the beloved’s beauty has been engraved", "isCorrect": true, "rationale": "“Table” in the Renaissance meant a flat painting surface or writing tablet; the speaker’s heart is the canvas on which his eye-as-painter has “stell’d” (fixed) the beloved’s image."}, {"text": "The beloved’s own eyes, which reflect the speaker’s image", "isCorrect": false, "rationale": "The beloved’s eyes serve as windows in the conceit, not as the canvas."}, {"text": "The speaker’s body, framing the portrait within", "isCorrect": false, "rationale": "The body is described as the “frame,” not the table/canvas; the heart is the canvas."}]}, {"question": "What does “my body is the frame wherein ’tis held” contribute to the extended metaphor?", "options": [{"text": "The speaker’s body is strong enough to carry the beloved", "isCorrect": false, "rationale": "Physical strength is not the metaphor’s point; the body is a picture frame, not a carrier."}, {"text": "The speaker’s body functions as the picture frame surrounding the heart-canvas where the beloved’s portrait hangs", "isCorrect": true, "rationale": "Completing the painting metaphor: eye = painter, heart = canvas/table, body = frame. The beloved’s image is a portrait displayed within the speaker’s body."}, {"text": "The speaker’s skeleton is a literal frame like a building’s structure", "isCorrect": false, "rationale": "While anatomically suggestive, the metaphor is pictorial—a picture frame, not a structural frame."}, {"text": "The speaker’s body is constraining him like a cage", "isCorrect": false, "rationale": "The frame metaphor is positive (a frame displays and honors a picture), not a symbol of constraint."}]}, {"question": "What role do the beloved’s eyes play in the conceit?", "options": [{"text": "They serve as a mirror reflecting the speaker’s own face back to him", "isCorrect": false, "rationale": "While mirrors are present elsewhere, here the beloved’s eyes are windows into the speaker’s heart, not mirrors."}, {"text": "They serve as the windows of the speaker’s heart, allowing light and the beloved’s image to enter", "isCorrect": true, "rationale": "“That hath his windows glazed with thine eyes”—the bosom’s shop (the heart) has its windows made from the beloved’s eyes, letting the beloved’s light shine through to illuminate the portrait within."}, {"text": "They paint additional portraits of the speaker in the beloved’s own heart", "isCorrect": false, "rationale": "While the conceit involves a reciprocal exchange of images, the specific role assigned to the beloved’s eyes is as windows, not as painters."}, {"text": "They are the only true judges of beauty in the poem", "isCorrect": false, "rationale": "The beloved’s eyes are not presented as judges; they function structurally as windows in the extended metaphor."}]}, {"question": "What “good turns” have the two sets of eyes done for each other?", "options": [{"text": "Each has kept the other awake through the night to guard their love", "isCorrect": false, "rationale": "Keeping watch is the theme of Sonnet XXVII; here the “good turns” are about mutual image-creation."}, {"text": "The speaker’s eyes have drawn the beloved’s shape in his heart; the beloved’s eyes serve as windows letting the sun gaze upon the portrait", "isCorrect": true, "rationale": "Lines 11–14: the speaker’s eyes drew the beloved’s shape inside him; the beloved’s eyes glazed the windows through which the sun peers to see the portrait—a reciprocal visual gift."}, {"text": "Both sets of eyes have cried the same tears in sympathy", "isCorrect": false, "rationale": "Tears and sympathy are not part of this conceit; the “good turns” are specifically about image-making and window-glazing."}, {"text": "Each has taught the other to see beauty more clearly", "isCorrect": false, "rationale": "Mutual teaching of perception is not the stated exchange; the specific good turns are pictorial and architectural."}]}, {"question": "What limitation does the couplet reveal about the eyes’ skill?", "options": [{"text": "The eyes can only see beauty in daylight and fail at night", "isCorrect": false, "rationale": "Daylight versus night is not the limitation discussed; the limitation is epistemological—what the eyes can and cannot know."}, {"text": "Eyes can draw what they see but cannot know the heart’s true nature", "isCorrect": true, "rationale": "The couplet: “Yet eyes this cunning want to grace their art, / They draw but what they see, know not the heart”—visual art captures appearance but not inner truth, pointing to the limits of physical perception."}, {"text": "Eyes grow tired and eventually stop seeing the beloved’s beauty", "isCorrect": false, "rationale": "Fatigue of the eyes is not the limitation; the limitation is inherent to vision—it sees surfaces, not depths."}, {"text": "Eyes are poor painters compared to the imagination’s power", "isCorrect": false, "rationale": "While the couplet does critique what eyes can do, the point is specifically about the heart (inner truth), not about imagination as superior."}]}, {"question": "The word “stell’d” (line 1) most likely means:", "options": [{"text": "Stolen or taken without permission", "isCorrect": false, "rationale": "“Stell’d” does not derive from “steal.”"}, {"text": "Fixed firmly or engraved, from an archaic term for “to place” or “to engrave”", "isCorrect": true, "rationale": "“Stell’d” is thought to derive from a word meaning to engrave or fix in place—appropriate to the image of the beloved’s beauty permanently inscribed on the heart."}, {"text": "Sold or traded as a commodity", "isCorrect": false, "rationale": "Commercial transactions are not part of this conceit; the engraving is an act of love, not commerce."}, {"text": "Illuminated like a star, from “stella”", "isCorrect": false, "rationale": "While a stellar reading is poetically appealing, the context of painting and engraving supports “fixed/engraved” as the primary meaning."}]}, {"question": "What is the tone of the couplet in Sonnet XXIV relative to the rest of the poem?", "options": [{"text": "Triumphant, as the speaker celebrates his perfect knowledge of the beloved", "isCorrect": false, "rationale": "The couplet introduces a limitation, not a triumph."}, {"text": "Wistful or melancholy, noting that despite the elaborate visual conceit, eyes cannot know the heart", "isCorrect": true, "rationale": "After an elaborate and playful conceit about eye-as-painter, the couplet deflates it with a sobering acknowledgment: visual knowledge is incomplete—the heart remains hidden."}, {"text": "Angry, as the speaker accuses the beloved of hiding inner feelings", "isCorrect": false, "rationale": "There is no accusation of deceit; the limitation is inherent to vision itself, not the beloved’s fault."}, {"text": "Comic, as the speaker laughs at the absurdity of his own metaphor", "isCorrect": false, "rationale": "The tone is serious and reflective, not comic."}]}, {"question": "Sonnet XXIV belongs to a group of poems that use extended conceits. An extended conceit is:", "options": [{"text": "A sonnet that insults the beloved to provoke a reaction", "isCorrect": false, "rationale": "An insult is not a conceit; this sonnet praises the beloved."}, {"text": "A sustained, elaborate metaphor that governs the entire poem and is developed through multiple related images", "isCorrect": true, "rationale": "An extended conceit (from the Italian “concetto”) is a controlling metaphor developed throughout a poem; here the painter conceit generates painter, table, frame, shop, windows—a fully developed visual metaphor."}, {"text": "A poem that consists entirely of rhetorical questions", "isCorrect": false, "rationale": "Rhetorical questions are a separate device; the extended conceit is about sustained metaphor."}, {"text": "A comparison that uses “like” or “as” throughout the poem", "isCorrect": false, "rationale": "A simile uses “like” or “as”; an extended conceit is an elaborate metaphor without those comparison words."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
