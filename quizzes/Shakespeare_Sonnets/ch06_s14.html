<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker urge “sweet love” to do at the opening of Sonnet LVI?", "options": [{"text": "To leave the beloved and find a more worthy object.", "isCorrect": false, "rationale": "No such abandonment is urged; the speaker wants love to remain strong."}, {"text": "To renew its force and not allow its edge to be blunted.", "isCorrect": true, "rationale": "Lines 1–2: “Sweet love, renew thy force; be it not said / Thy edge should blunter be than appetite.” Love is called to maintain its sharpness like hunger does."}, {"text": "To settle into a calm and permanent contentment.", "isCorrect": false, "rationale": "Settling into dulness is precisely what the speaker fears and argues against."}, {"text": "To write more poems to prove its devotion.", "isCorrect": false, "rationale": "No poetic production is urged; the appeal is to love’s renewal of energy."}]}, {"question": "What comparison is made between love and appetite (hunger)?", "options": [{"text": "Love is stronger than hunger and does not need to be renewed.", "isCorrect": false, "rationale": "The comparison implies love should be as self-renewing as hunger, not that it already surpasses it."}, {"text": "Appetite is allay’d (satisfied) today but sharpened again tomorrow; love should work the same way.", "isCorrect": true, "rationale": "Lines 3–4: appetite is satisfied today but returns sharpened tomorrow. Love should similarly renew its edge rather than remaining dulled by fulfillment."}, {"text": "Hunger is a base animal drive while love is a noble spiritual force.", "isCorrect": false, "rationale": "No hierarchy of hunger versus love is established; hunger is used as a positive model for love’s self-renewal."}, {"text": "Both love and appetite are equally destructive when not satisfied.", "isCorrect": false, "rationale": "The point is about renewal after satisfaction, not about the destructiveness of unsatisfied desire."}]}, {"question": "What does the speaker fear will happen if love is not renewed?", "options": [{"text": "The beloved will find a rival and leave the speaker.", "isCorrect": false, "rationale": "A rival is not the fear; the fear is internal — love itself becoming dull."}, {"text": "Love’s spirit will be killed by a perpetual dulness.", "isCorrect": true, "rationale": "Lines 9–10: “do not kill / The spirit of love, with a perpetual dulness.” Satiation without renewal would extinguish love’s animating spirit."}, {"text": "The speaker will forget the beloved entirely during the separation.", "isCorrect": false, "rationale": "Forgetting is not the fear; dulness and the death of love’s spirit is."}, {"text": "The poem will have no worthy subject and will fail to preserve the beloved.", "isCorrect": false, "rationale": "The poem’s adequacy is not the concern here."}]}, {"question": "The phrase “sad interim” (line 11) refers to:", "options": [{"text": "A period of mourning after a death.", "isCorrect": false, "rationale": "No bereavement is described; the ‘sad interim’ is the period of separation between the lovers."}, {"text": "The period of separation between the speaker and the beloved.", "isCorrect": true, "rationale": "“Let this sad interim like the ocean be” — the ‘sad interim’ is the interval of absence, which the speaker hopes to reframe as a productive waiting period."}, {"text": "The winter season when the beloved cannot travel.", "isCorrect": false, "rationale": "Winter appears as a metaphor in the couplet; the ‘sad interim’ is the separation itself."}, {"text": "The brief pause between one love affair and the next.", "isCorrect": false, "rationale": "No sequence of love affairs is implied; the sad interim is the single ongoing separation."}]}, {"question": "The ocean analogy (lines 11–14) compares the sad interim to:", "options": [{"text": "A barrier that the lovers have no hope of crossing.", "isCorrect": false, "rationale": "The ocean is not cast as an insurmountable barrier; it is reframed positively."}, {"text": "An ocean that separates shores where newly contracted lovers come daily to watch for each other’s return, making the reunion more blest.", "isCorrect": true, "rationale": "Lines 11–14: the ocean parts two shores where “two contracted new / Come daily to the banks” to watch for the return of love. The separation heightens the joy of reunion."}, {"text": "A vast expanse in which the speaker and beloved are lost and cannot find each other.", "isCorrect": false, "rationale": "The lovers know where each other is; the ocean is about expectant waiting, not being lost."}, {"text": "A reflection of the speaker’s tears during the period of separation.", "isCorrect": false, "rationale": "Tears are not the ocean’s meaning here; the ocean represents the productive distance between two yearning shores."}]}, {"question": "The couplet offers an alternative metaphor for the sad interim. What is it?", "options": [{"text": "A dark night that makes the day more welcome.", "isCorrect": false, "rationale": "Night and day imagery appears in Sonnet XLIII; here the alternative metaphor is winter."}, {"text": "Winter — whose hardship and care makes summer’s welcome more precious and rare.", "isCorrect": true, "rationale": "Lines 15–16: “Or call it winter, which being full of care, / Makes summer’s welcome, thrice more wish’d, more rare.” Winter is an alternative frame for the sad interim — hardship that intensifies the joy of reunion."}, {"text": "A desert that makes the oasis of reunion seem miraculous.", "isCorrect": false, "rationale": "No desert appears; the seasonal metaphor is winter versus summer."}, {"text": "A prison sentence whose completion earns the prisoner freedom.", "isCorrect": false, "rationale": "Prison imagery appears in Sonnets XLVIII and LII; here the metaphor is seasonal."}]}, {"question": "The word “contracted” in line 12 most likely means:", "options": [{"text": "Physically shrunk or compressed.", "isCorrect": false, "rationale": "Physical shrinking is not the sense; the word refers to a formal bond."}, {"text": "Newly betrothed or pledged — formally bound in love.", "isCorrect": true, "rationale": "“Two contracted new” means two people who have newly made a pledge of love — betrothed or bound by a love contract. Their fresh commitment makes them eager to watch for each other."}, {"text": "Exhausted and weakened by long separation.", "isCorrect": false, "rationale": "Exhaustion is not the sense; the word refers to a formal bond or pledge."}, {"text": "Infected with a disease that requires quarantine.", "isCorrect": false, "rationale": "No disease imagery is present; the word means pledged or betrothed."}]}, {"question": "The poem’s argument that absence can renew love shares a theme with which other sonnet in Chapter 6?", "options": [{"text": "Sonnet XLIII, which argues that dreams compensate for absence.", "isCorrect": false, "rationale": "XLIII compensates for absence through dreams; LVI argues that absence actively renews love."}, {"text": "Sonnet LII, which argues that rarity and scarcity enhance the value and pleasure of what we love.", "isCorrect": true, "rationale": "Both LII and LVI argue that the intervals of separation or rarity enhance the experience of reunion or possession. LII uses treasure, feasts, and jewels; LVI uses appetite, ocean, and winter."}, {"text": "Sonnet XLIX, which argues that the speaker has no cause to be loved.", "isCorrect": false, "rationale": "XLIX is about preemptive self-abnegation, not the value of rarity."}, {"text": "Sonnet LV, which argues that verse outlasts monuments.", "isCorrect": false, "rationale": "LV is about the immortality of verse; it does not address absence’s renewal of love."}]}, {"question": "The imperative mood (“renew thy force,” “be thou,” “see again,” “do not kill”) throughout the poem creates what effect?", "options": [{"text": "A gentle, meditative tone of philosophical acceptance.", "isCorrect": false, "rationale": "The imperatives create urgency and command, not meditative calm."}, {"text": "An urgent, pleading tone — the speaker is exhorting love itself to resist dulness.", "isCorrect": true, "rationale": "The series of imperatives creates the sense that love needs to be actively commanded and encouraged, as if it were in danger of lapsing. The tone is urgent and anxious."}, {"text": "A cold, authoritative tone in which the speaker issues legal demands.", "isCorrect": false, "rationale": "The legal register belongs to other sonnets; here the tone is passionate urgency."}, {"text": "A celebratory tone praising love for its existing strength.", "isCorrect": false, "rationale": "Praise is not the tone; the speaker fears love’s dulness and urges renewal."}]}, {"question": "What does the winter/summer couplet suggest about the nature of longing?", "options": [{"text": "Longing is destructive and should be ended as quickly as possible.", "isCorrect": false, "rationale": "The poem treats longing as productive; winter’s hardship makes summer’s welcome more precious."}, {"text": "Longing during separation is like winter — difficult but ultimately productive because it makes reunion ‘thrice more wish’d, more rare.’", "isCorrect": true, "rationale": "The couplet reframes longing as a season of preparation: as winter’s cold makes summer more desired and precious, so the sad interim makes reunion more intensely welcome."}, {"text": "Longing disappears entirely once the beloved returns.", "isCorrect": false, "rationale": "Longing does not disappear; it is transformed by reunion and will renew again."}, {"text": "Longing is only valuable if the beloved is aware of it.", "isCorrect": false, "rationale": "The beloved’s awareness is not the condition; the value of longing is internal and relational."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
