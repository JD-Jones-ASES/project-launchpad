<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In what sense is the mistress called 'tyrannous' at the opening of the sonnet?", "options": [{"text": "She rules a political kingdom", "isCorrect": false, "rationale": "The tyranny is erotic and psychological, not political."}, {"text": "She is as cruelly domineering over the speaker as conventionally beautiful women are over their admirers", "isCorrect": true, "rationale": "The speaker says she is tyrannous 'so as thou art' — her power over him matches that of beauties who use their looks to be cruel, even though others do not rate her beautiful."}, {"text": "She refuses to listen to his poetry", "isCorrect": false, "rationale": "Tyranny here refers to her power over his heart, not any specific refusal."}, {"text": "She is too wealthy and powerful for him to approach", "isCorrect": false, "rationale": "The power is emotional and erotic, not social or financial."}], "id": "q01"}, {"question": "What do 'some' observers say about the mistress's face?", "options": [{"text": "That it is divinely beautiful", "isCorrect": false, "rationale": "Others do not praise her; they deny her beauty's power over them."}, {"text": "That it does not have the power to make love groan", "isCorrect": true, "rationale": "The speaker reports that some who behold her say 'thy face hath not the power to make love groan' — she is not conventionally beautiful enough to compel passion in others."}, {"text": "That she is too proud to be loved", "isCorrect": false, "rationale": "Others comment on her lack of beauty's power, not her pride."}, {"text": "That her dark eyes are her only attractive feature", "isCorrect": false, "rationale": "No such partial compliment from others appears in this sonnet."}], "id": "q02"}, {"question": "How does the speaker respond to others' claim that the mistress is not beautiful?", "options": [{"text": "He argues loudly that they are wrong", "isCorrect": false, "rationale": "He dares not be so bold as to publicly contradict them."}, {"text": "He privately swears it to himself but does not dare openly contradict them", "isCorrect": true, "rationale": "'To say they err I dare not be so bold, / Although I swear it to myself alone' — he privately insists on her beauty but lacks the confidence to contradict public opinion openly."}, {"text": "He accepts their judgment and admits she is plain", "isCorrect": false, "rationale": "He does not fully accept their judgment; he privately dissents."}, {"text": "He challenges them to a debate", "isCorrect": false, "rationale": "His response is private and tentative, not confrontational."}], "id": "q03"}, {"question": "The 'thousand groans' the speaker emits while thinking of her face serve as what kind of evidence?", "options": [{"text": "Evidence of his suffering at her cruelty", "isCorrect": false, "rationale": "While groans can signal suffering, here they testify to his doting attraction, not pain from her mistreatment."}, {"text": "Evidence that he finds her black features the fairest in his personal judgment", "isCorrect": true, "rationale": "The thousand groans 'witness bear / Thy black is fairest in my judgement's place' — his involuntary sighing proves the depth of his private conviction of her beauty."}, {"text": "Evidence that she has rejected him repeatedly", "isCorrect": false, "rationale": "Groans here are signs of doting, not of rejection."}, {"text": "Evidence that others have noticed his infatuation", "isCorrect": false, "rationale": "The groans are private evidence for his own claim, not public spectacle."}], "id": "q04"}, {"question": "What word in the couplet introduces a sudden twist about the mistress's character?", "options": [{"text": "Fairest", "isCorrect": false, "rationale": "'Fairest' continues the beauty argument; the twist comes from a different word."}, {"text": "Deeds", "isCorrect": true, "rationale": "'In nothing art thou black save in thy deeds' — the couplet pivots from physical darkness (celebrated) to moral darkness (condemned), introducing the idea that her blackness is really in her behavior."}, {"text": "Judgement", "isCorrect": false, "rationale": "'Judgement' belongs to the preceding lines; the twist occurs in the couplet."}, {"text": "Slander", "isCorrect": false, "rationale": "'Slander' follows from 'deeds' and is part of the same twist, but 'deeds' introduces the moral turn."}], "id": "q05"}, {"question": "The couplet 'In nothing art thou black save in thy deeds, / And thence this slander, as I think, proceeds' introduces what idea?", "options": [{"text": "That her dark appearance causes others to slander her unfairly", "isCorrect": false, "rationale": "The slander the speaker mentions proceeds from her deeds, not from her dark appearance."}, {"text": "That her true darkness is moral, not physical, and her bad deeds produce the slander against her", "isCorrect": true, "rationale": "The couplet reverses direction: physically, she is black only in the favorable sense of dark coloring; morally, her deeds are genuinely dark, and this moral darkness is the real source of her ill reputation."}, {"text": "That she has been falsely accused of crimes she did not commit", "isCorrect": false, "rationale": "The speaker does not exonerate her deeds; he identifies them as the real source of slander."}, {"text": "That dark skin is associated with moral failings in Renaissance culture", "isCorrect": false, "rationale": "The speaker is defending her physical darkness while acknowledging moral darkness — distinguishing the two."}], "id": "q06"}, {"question": "How does Sonnet CXXXI relate to the broader Dark Lady sequence?", "options": [{"text": "It stands alone with no connection to the surrounding sonnets", "isCorrect": false, "rationale": "CXXXI shares the sequence's central themes of dark beauty, tyrannous power, and the speaker's conflicted love."}, {"text": "It continues the sequence's tension between celebrating the mistress's dark beauty and acknowledging her moral flaws", "isCorrect": true, "rationale": "Like other Dark Lady sonnets, CXXXI holds together two incompatible perceptions: the mistress is the fairest in his eyes, yet her deeds are dark. This tension drives the whole sequence."}, {"text": "It resolves the sequence's conflict by fully accepting the mistress as she is", "isCorrect": false, "rationale": "The couplet introduces moral criticism rather than resolution."}, {"text": "It rejects the mistress entirely and turns to self-condemnation", "isCorrect": false, "rationale": "The speaker continues to dote on her; the couplet's moral criticism does not lead to rejection."}], "id": "q07"}, {"question": "What is the function of the phrase 'my dear doting heart' in line 3?", "options": [{"text": "It is an address to an absent friend", "isCorrect": false, "rationale": "The speaker is addressing the mistress, and 'doting heart' is self-referential."}, {"text": "It concedes that his love is excessive and irrational — a dote rather than a considered passion", "isCorrect": true, "rationale": "'Doting' signals love that has become obsessive and unreasonable; by calling his own heart 'doting,' the speaker acknowledges the irrationality of his attachment."}, {"text": "It expresses pure romantic idealism without self-criticism", "isCorrect": false, "rationale": "'Doting' carries a slightly self-deprecating acknowledgment of excess, not pure idealism."}, {"text": "It is a term of endearment directed at the mistress", "isCorrect": false, "rationale": "The doting heart is the speaker's own heart, not the mistress."}], "id": "q08"}, {"question": "What is the dominant tone of Sonnet CXXXI?", "options": [{"text": "Joyful celebration of the mistress's beauty", "isCorrect": false, "rationale": "The tone is more conflicted — private devotion shadowed by public doubt and a couplet hinting at moral criticism."}, {"text": "Conflicted devotion: private conviction of her beauty alongside awareness of public doubt and moral darkness", "isCorrect": true, "rationale": "The speaker privately worships her while unable to defend her publicly, and the couplet adds a note of moral critique — all producing a characteristic Dark Lady tension."}, {"text": "Cold philosophical detachment", "isCorrect": false, "rationale": "The speaker's doting heart prevents detachment; the tone is emotionally engaged throughout."}, {"text": "Bitter anger at the mistress's cruelty", "isCorrect": false, "rationale": "Anger is present in later sonnets; here the prevailing note is helpless devotion."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
