    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What theme does the opening line “When I consider everything that grows / Holds in perfection but a little moment” introduce?", "options": [{"text": "The theme of carpe diem — seize the day before beauty fades.", "isCorrect": false, "rationale": "While related, the poem’s argument is not simply “seize the day” but a meditation on universal impermanence leading to the poet’s own response."}, {"text": "The universal law of impermanence: everything that grows holds its peak only briefly before declining.", "isCorrect": true, "rationale": "The opening lines establish a general philosophical law — all growth peaks and then declines — that will be applied specifically to the youth and then countered by the poet’s action."}, {"text": "A personal complaint that the poet has grown old while the youth remains young.", "isCorrect": false, "rationale": "No personal complaint about the poet’s own aging is made; the observation is universal."}, {"text": "A religious meditation on the transience of all earthly things and the permanence of heaven.", "isCorrect": false, "rationale": "While transience is the theme, no religious consolation or heaven is invoked; the solution is the poet’s verse, not the afterlife."}], "id": "q01"}, {"question": "What does “this huge stage presenteth nought but shows / Whereon the stars in secret influence comment” mean?", "options": [{"text": "Life is a stage performance (theater) on which the stars secretly exert their influence over human fate.", "isCorrect": true, "rationale": "The “stage” is the world-as-theater (a common Renaissance conceit); the “shows” are the appearances of things; and the stars — in Renaissance astrological belief — secretly govern what happens below."}, {"text": "Theater productions in London are influenced by the movements of stars on clear nights.", "isCorrect": false, "rationale": "No literal theatrical performance is described; the “stage” and “shows” are metaphors for life and its appearances."}, {"text": "The stars are actors performing on the night’s stage for human audiences.", "isCorrect": false, "rationale": "The stars are not performers; they are governing influences commenting on the human show from above."}, {"text": "The poet has been to the theater and found it a depressing reminder of mortality.", "isCorrect": false, "rationale": "No autobiographical event is described; the theater is a metaphor for the world and the performance of human life."}], "id": "q02"}, {"question": "What does the comparison of men to plants (“men as plants increase”) argue?", "options": [{"text": "Men are inferior to plants because plants reproduce without effort.", "isCorrect": false, "rationale": "No comparison of worth is made; the plant metaphor is about the shared pattern of growth, peak, and decline."}, {"text": "Like plants, men grow under the same governing sky, reach their peak, and then decline and are forgotten.", "isCorrect": true, "rationale": "The plant analogy illustrates the universal pattern: “Vaunt in their youthful sap, at height decrease, / And wear their brave state out of memory.” Men, like plants, follow this arc and end in oblivion."}, {"text": "Men should spend more time outdoors in nature to maintain their health.", "isCorrect": false, "rationale": "No health advice is offered; the plant comparison is about the universal arc of growth and decay."}, {"text": "The best men are the ones who grow the most quickly in youth.", "isCorrect": false, "rationale": "Speed of growth is not the point; the parallel is about the universal pattern of peaking and declining."}], "id": "q03"}, {"question": "What does “wear their brave state out of memory” mean?", "options": [{"text": "They forget their past glories as they age.", "isCorrect": false, "rationale": "The forgetting is not the men’s own; it is the world’s forgetting of them."}, {"text": "Their magnificent prime (brave state) is worn out, eroded from memory, until even its existence is forgotten.", "isCorrect": true, "rationale": "“Wear out” means to erode; “brave state” is their glorious prime; the memory of that prime is eventually worn down to nothing."}, {"text": "They grow too proud of their clothing and social position and eventually tire of it.", "isCorrect": false, "rationale": "“Brave state” can mean fine clothes, but here it refers to the glorious peak of vitality, not literal fashion."}, {"text": "They spend all their money on fine clothes until they are bankrupt.", "isCorrect": false, "rationale": "Financial ruin is not the subject; the wearing out is of memory, not wealth."}], "id": "q04"}, {"question": "What does “the conceit of this inconstant stay” mean?", "options": [{"text": "The idea (conceit) of this unstable, temporary existence — the awareness that nothing stays.", "isCorrect": true, "rationale": "“Conceit” means idea or mental image; “inconstant stay” means a temporary, unstable stopping point. The awareness of universal impermanence is the thought that brings the youth most richly into focus."}, {"text": "The youth’s own vanity (conceit) about his ability to remain beautiful forever.", "isCorrect": false, "rationale": "The conceit is the poet’s idea, not the youth’s vanity; it is the thought of impermanence, not pride."}, {"text": "A legal term for an inconstant tenancy agreement.", "isCorrect": false, "rationale": "While lease vocabulary appears in Sonnet XIII, here “conceit” is a rhetorical term for a mental idea or image."}, {"text": "The youth’s refusal to stay in one place or commit to one relationship.", "isCorrect": false, "rationale": "The youth’s movement is not described; “inconstant stay” refers to the temporary nature of all existence."}], "id": "q05"}, {"question": "What does “wasteful Time debateth with Decay / To change your day of youth to sullied night” mean?", "options": [{"text": "Time and Decay are personified as co-conspirators debating how to transform the youth’s bright day of vitality into the sullied night of age and death.", "isCorrect": true, "rationale": "Time and Decay are personified agents actively working against the youth: they “debate” (deliberate, plot) how to change his shining youth (“day”) into “sullied night” (soiled, corrupted age)."}, {"text": "Time and Decay are arguing about how long the youth’s beauty can last, with Time winning the debate.", "isCorrect": false, "rationale": "Time and Decay are not in disagreement; they are co-conspirators debating their method, not their outcome."}, {"text": "The youth has wasted time debating whether to marry, allowing decay to set in.", "isCorrect": false, "rationale": "The subject of “debateth” is Time, not the youth; Time and Decay are the active agents, not the youth."}, {"text": "Wasteful behavior and physical decay are two reasons why the youth’s beauty is fading.", "isCorrect": false, "rationale": "Wasteful and Decay are personified agents, not abstract causes; the line gives them active, conspiratorial intentionality."}], "id": "q06"}, {"question": "What decisive action does the poet take in the couplet: “And all in war with Time for love of you, / As he takes from you, I engraft you new”?", "options": [{"text": "The poet declares war on Time and promises to fight alongside the youth physically.", "isCorrect": false, "rationale": "The war is metaphorical; the weapon is verse, not physical combat."}, {"text": "The poet offers his own verse as a means of preservation — “engrafting” the youth into his poems to renew him as Time takes from him.", "isCorrect": true, "rationale": "This is the first time in the sequence that poetry (not children) is offered as a defense against Time. The poet declares himself at war with Time and uses “engraft” (grafting a living shoot onto a rootstock) as a metaphor for inserting the youth’s identity into verse."}, {"text": "The poet will have a child of his own who will carry the youth’s memory forward.", "isCorrect": false, "rationale": "The poet is not proposing to have his own child; “engraft you new” means preserving the youth through verse."}, {"text": "The poet will convince the youth’s family to force him to marry.", "isCorrect": false, "rationale": "No family pressure is described; the poet’s action is the writing of verse to preserve the youth."}], "id": "q07"}, {"question": "What does the horticultural metaphor “engraft” mean in the couplet?", "options": [{"text": "To plant a seed in the ground so that it grows into a new tree.", "isCorrect": false, "rationale": "Planting a seed is a different process; grafting involves inserting a living shoot (scion) into an established rootstock."}, {"text": "To insert a living cutting (scion) into another plant so that the cutting grows on the new stock — here, inserting the youth’s identity into the rootstock of the poem so he grows (lives) anew.", "isCorrect": true, "rationale": "Grafting is the horticultural technique of inserting a shoot from one plant into another; Shakespeare uses it to describe how verse takes a “cutting” of the youth’s beauty and “grafts” it into the poem, where it continues to grow and live."}, {"text": "To carve an inscription into wood or stone.", "isCorrect": false, "rationale": "Carving is a different technique; grafting is specifically about inserting living plant material into another living plant."}, {"text": "To borrow or steal another poet’s images and incorporate them into one’s own work.", "isCorrect": false, "rationale": "Plagiarism is not the meaning; the grafting is of the youth’s living self into verse."}], "id": "q08"}, {"question": "How does the couplet of Sonnet XV mark a turning point in the sequence?", "options": [{"text": "It abandons the procreation argument entirely and shifts to a new theme of sexual jealousy.", "isCorrect": false, "rationale": "Sexual jealousy does not appear here; the shift is from biological reproduction to poetic preservation as a means of immortality."}, {"text": "For the first time, the poet offers his own verse — not biological children — as a means of defeating Time and preserving the youth’s beauty.", "isCorrect": true, "rationale": "All previous sonnets in the sequence had argued for children as the only way to defeat Time; Sonnet XV introduces poetry as an alternative or supplementary defense, opening the theme that will dominate the later sonnets."}, {"text": "The poet admits defeat against Time and ceases to urge the youth to reproduce.", "isCorrect": false, "rationale": "No defeat is admitted; the poet takes action (“I engraft you new”), offering an active and powerful counter to Time."}, {"text": "The sonnet introduces the theme of dark love, marking the transition from the procreation sonnets to the Dark Lady sequence.", "isCorrect": false, "rationale": "The Dark Lady sequence is far later; Sonnet XV remains within the fair youth sequence and introduces verse as a preservation strategy."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
