<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What opening simile does Shakespeare use to describe the passage of time in Sonnet LX?", "options": [{"text": "Time is like a river rushing toward a waterfall", "isCorrect": false, "rationale": "The simile uses waves on a shore, not a river and waterfall."}, {"text": "Time is like waves advancing toward a pebbled shore", "isCorrect": true, "rationale": "Lines 1–2: “Like as the waves make towards the pebbled shore, / So do our minutes hasten to their end.”"}, {"text": "Time is like a soldier marching to battle", "isCorrect": false, "rationale": "The military metaphor does not appear in the opening lines of this sonnet."}, {"text": "Time is like a candle burning down to nothing", "isCorrect": false, "rationale": "The candle image belongs to other sonnets and Shakespeare’s plays, not the opening of Sonnet LX."}], "id": "q01"}, {"question": "What does “Nativity, once in the main of light” (line 7) describe?", "options": [{"text": "The birth of a star in the night sky", "isCorrect": false, "rationale": "Nativity here refers to a newborn human life entering the light of the world."}, {"text": "A newborn life emerging gloriously into full light", "isCorrect": true, "rationale": "“Nativity” is birth; “main of light” means the full expanse of light, suggesting a life’s bright beginning."}, {"text": "The sun rising at the start of a new day", "isCorrect": false, "rationale": "Though light imagery is used, “nativity” specifically means a birth."}, {"text": "The beloved’s entrance into the speaker’s life", "isCorrect": false, "rationale": "The line is a general meditation on all human life, not specifically about the beloved’s arrival."}], "id": "q02"}, {"question": "What do “Crooked eclipses” represent in line 9?", "options": [{"text": "The beloved’s occasional cold moods that darken the speaker’s happiness", "isCorrect": false, "rationale": "The eclipses are not about the beloved’s moods but about forces of decline that darken a life’s glory."}, {"text": "Malevolent forces or adversities that fight against a person’s glory", "isCorrect": true, "rationale": "Eclipses were seen as ill omens; here they represent the obstacles and misfortunes that assail a life at its height."}, {"text": "Literal astronomical eclipses the speaker has observed", "isCorrect": false, "rationale": "The eclipses are metaphorical, representing life’s adversities, not astronomical observations."}, {"text": "The dishonesty of those who flatter the beloved", "isCorrect": false, "rationale": "Flattery and dishonesty are not the subject of this image."}], "id": "q03"}, {"question": "What does Time do to “the flourish set on youth” (line 11)?", "options": [{"text": "Time preserves the flourishing of youth in verse", "isCorrect": false, "rationale": "It is the verse — not Time itself — that preserves; Time “transfixes,” meaning it destroys."}, {"text": "Time transfixes (destroys) youth’s bloom", "isCorrect": true, "rationale": "“Transfix” here means to pierce through and destroy; Time kills the decoration and beauty of youth."}, {"text": "Time celebrates and extends the flourishing of youth", "isCorrect": false, "rationale": "The sonnet presents Time as entirely destructive, not celebratory."}, {"text": "Time transforms youth’s beauty into wisdom", "isCorrect": false, "rationale": "The sonnet offers no consolation of wisdom replacing beauty; Time simply destroys."}], "id": "q04"}, {"question": "What does “delves the parallels in beauty’s brow” (line 12) mean?", "options": [{"text": "Time carves wrinkles (parallel lines) into the forehead of beauty", "isCorrect": true, "rationale": "“Delves” means digs; “parallels” are the parallel lines of wrinkles; “beauty’s brow” is the beautiful forehead."}, {"text": "Time draws lines of poetry across a beautiful page", "isCorrect": false, "rationale": "The image is physical: wrinkles on a face, not writing on a page."}, {"text": "Time creates roads that run parallel to the sea", "isCorrect": false, "rationale": "The image refers to facial wrinkles, not roads or geography."}, {"text": "Time teaches beauty to think in parallel ways", "isCorrect": false, "rationale": "There is no intellectual meaning here; the image is of physical aging."}], "id": "q05"}, {"question": "What is the repeated grammatical structure used in lines 1–14 of Sonnet LX?", "options": [{"text": "A series of rhetorical questions", "isCorrect": false, "rationale": "The sonnet uses declarative statements, not rhetorical questions, to catalog time’s actions."}, {"text": "Anaphora, with repeated emphasis on Time’s actions", "isCorrect": true, "rationale": "Words and phrases like “Like as,” “So do,” “Nativity,” “Time doth,” and “And” build through repetition, cataloging Time’s acts."}, {"text": "A single extended metaphor of the sea", "isCorrect": false, "rationale": "The sea metaphor opens the sonnet but does not extend through all 14 lines; the focus shifts to Time’s direct actions."}, {"text": "An alternating dialogue between the speaker and Time", "isCorrect": false, "rationale": "There is no dialogue; the speaker addresses the beloved and describes Time in third person."}], "id": "q06"}, {"question": "What does the couplet of Sonnet LX promise?", "options": [{"text": "That the speaker will write more sonnets to defeat Time", "isCorrect": false, "rationale": "The couplet makes a specific promise about existing verse, not a general commitment to future writing."}, {"text": "That the speaker’s verse will stand in future times and praise the beloved despite Time’s cruelty", "isCorrect": true, "rationale": "Lines 15–16: “And yet to times in hope, my verse shall stand, / Praising thy worth, despite his cruel hand.”"}, {"text": "That the beloved’s beauty will naturally outlast Time", "isCorrect": false, "rationale": "It is verse, not the beloved’s beauty, that is promised survival."}, {"text": "That love itself is stronger than Time’s power", "isCorrect": false, "rationale": "The couplet credits verse, not love abstractly, as the force that resists Time."}], "id": "q07"}, {"question": "The phrase “nothing stands but for his scythe to mow” uses what figure of speech?", "options": [{"text": "Simile, comparing Time to a farmer", "isCorrect": false, "rationale": "A simile uses “like” or “as”; this is a direct description using the scythe as a symbol."}, {"text": "Personification and metaphor, depicting Time as the Grim Reaper harvesting all things", "isCorrect": true, "rationale": "Time is given a scythe — the traditional tool of the Grim Reaper — and acts as a reaper who mows down all living things."}, {"text": "Irony, since a scythe is used to create, not destroy", "isCorrect": false, "rationale": "Scythes were associated with death and reaping; there is no irony in the image."}, {"text": "Apostrophe, addressing Time directly", "isCorrect": false, "rationale": "Time is referred to in third person (“his scythe”), not addressed directly."}], "id": "q08"}, {"question": "What theme does Sonnet LX share most strongly with others in the “Devouring Time” chapter?", "options": [{"text": "The inadequacy of parental love", "isCorrect": false, "rationale": "Parental love is not a theme of Sonnet LX or the surrounding sonnets."}, {"text": "Time’s relentless destruction of beauty and youth, countered only by verse", "isCorrect": true, "rationale": "The sonnet’s entire structure catalogs time’s destructive power, with the couplet offering verse as the sole counter."}, {"text": "The speaker’s guilt over his own moral failings", "isCorrect": false, "rationale": "Self-reproach is a theme of other sonnets, not Sonnet LX."}, {"text": "The beloved’s indifference to the speaker’s love", "isCorrect": false, "rationale": "The beloved’s indifference is not addressed in this sonnet."}], "id": "q09"}, {"question": "How does the wave simile in lines 1–4 mirror the structure of time?", "options": [{"text": "Waves are unpredictable, showing that time moves in random ways", "isCorrect": false, "rationale": "The simile emphasizes sequential, relentless progression, not randomness."}, {"text": "Each wave replaces the one before it, just as each moment replaces the last in an endless forward march", "isCorrect": true, "rationale": "Lines 3–4: “Each changing place with that which goes before, / In sequent toil all forwards do contend” — each wave/minute succeeds and displaces the previous one."}, {"text": "Waves eventually recede, showing that time can move backward", "isCorrect": false, "rationale": "The sonnet emphasizes time’s one-directional forward movement, not any retreat."}, {"text": "The shore resists the waves, showing that beauty can resist time", "isCorrect": false, "rationale": "The shore is not presented as a successful resister; the waves hasten toward their end relentlessly."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
