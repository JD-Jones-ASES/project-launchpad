<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker offer to do if the beloved decides to 'set him light' (regard him with contempt)?", "options": [{"text": "Flee and never be seen again", "isCorrect": false, "rationale": "The speaker does not plan to flee but rather to actively assist the beloved by testifying against himself."}, {"text": "Fight against himself on the beloved's side", "isCorrect": true, "rationale": "Lines 5-6 state he will fight 'upon thy side, against myself' — he will argue the beloved's case even at his own expense."}, {"text": "Write poems praising the beloved's virtue", "isCorrect": false, "rationale": "The speaker does not plan to write praise poetry but rather to confess his own faults."}, {"text": "Seek revenge through public accusation", "isCorrect": false, "rationale": "Revenge is entirely contrary to the sonnet's logic of self-sacrifice."}]}, {"question": "What does 'attainted' mean in line 9 ('Of faults conceal'd, wherein I am attainted')?", "options": [{"text": "Praised and celebrated", "isCorrect": false, "rationale": "Attainted is a legal term of disgrace, not praise."}, {"text": "Legally disgraced or tainted by crime", "isCorrect": true, "rationale": "In Elizabethan legal usage, 'attainted' means convicted or stained by dishonor; the speaker refers to hidden faults that incriminate him."}, {"text": "Made beautiful by art", "isCorrect": false, "rationale": "This meaning does not apply; 'attainted' always carries a negative, shaming connotation."}, {"text": "Wounded in battle", "isCorrect": false, "rationale": "Though 'attainted' has a martial-adjacent meaning, it functions here in a legal and moral sense."}]}, {"question": "According to lines 11-14, how does the speaker gain from injuring himself on the beloved's behalf?", "options": [{"text": "His suffering earns the beloved's gratitude and return", "isCorrect": false, "rationale": "The speaker does not claim the beloved will return; the 'gain' is described differently."}, {"text": "By focusing all his love on the beloved, even self-harm doubles as self-benefit", "isCorrect": true, "rationale": "Lines 12-14 argue that because all his loving thoughts are bent on the beloved, any act that advantages the beloved also advantages the speaker ('double-vantage me')."}, {"text": "He gains fame for his nobility of spirit", "isCorrect": false, "rationale": "Fame is not mentioned; the gain is framed in terms of love's logic, not public reputation."}, {"text": "He gains freedom from his own faults by confessing them", "isCorrect": false, "rationale": "Freedom from fault is not the gain described; the paradoxical benefit is specifically tied to love directed at the beloved."}]}, {"question": "What is the meaning of 'forsworn' in line 6 ('prove thee virtuous, though thou art forsworn')?", "options": [{"text": "Sworn to a new oath", "isCorrect": false, "rationale": "Forsworn means having broken a previous oath, not taken a new one."}, {"text": "Having broken a promise or oath", "isCorrect": true, "rationale": "'Forsworn' means perjured or oath-breaking; the speaker will argue the beloved is virtuous even though the beloved has broken faith."}, {"text": "Deeply in love", "isCorrect": false, "rationale": "The word has no positive romantic meaning; it is a term of moral failing."}, {"text": "Publicly slandered", "isCorrect": false, "rationale": "Forsworn refers to the beloved's own act of oath-breaking, not to slander by others."}]}, {"question": "The couplet 'Such is my love, to thee I so belong, / That for thy right, myself will bear all wrong' primarily expresses:", "options": [{"text": "The speaker's anger at being wronged", "isCorrect": false, "rationale": "The couplet expresses devotion, not anger; the speaker willingly accepts wrong, not resentfully."}, {"text": "The extreme self-abnegating nature of the speaker's love", "isCorrect": true, "rationale": "The couplet summarizes the sonnet's paradox: the depth of love is measured by the speaker's total willingness to bear all wrong for the beloved's sake."}, {"text": "A legal claim against the beloved", "isCorrect": false, "rationale": "The speaker explicitly surrenders all claims, making the opposite of a legal argument."}, {"text": "The speaker's belief that he deserves punishment", "isCorrect": false, "rationale": "While the speaker accepts wrong, the motivation is love and belonging, not a genuine belief in his own guilt."}]}, {"question": "What rhetorical device is most prominent in 'Upon thy side, against myself I'll fight'?", "options": [{"text": "Simile", "isCorrect": false, "rationale": "There is no comparison using 'like' or 'as' in this line."}, {"text": "Oxymoron", "isCorrect": true, "rationale": "Fighting on someone's side against oneself is a contradiction — a self-defeating battle — making this an oxymoronic image that captures the paradox of self-sacrificing love."}, {"text": "Alliteration", "isCorrect": false, "rationale": "Alliteration (repeated initial consonants) is not the dominant device in this particular line."}, {"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe addresses an absent person or abstraction; here the speaker addresses the beloved directly."}]}, {"question": "How does Sonnet LXXXVIII differ in tone from Sonnet LXXXVII?", "options": [{"text": "LXXXVIII is more resigned; LXXXVII is more active", "isCorrect": false, "rationale": "In fact, LXXXVIII is more actively engaged — the speaker offers to fight — while LXXXVII is more resigned to loss."}, {"text": "LXXXVIII is more actively self-sacrificial; LXXXVII is more quietly resigned", "isCorrect": true, "rationale": "Where LXXXVII accepts the separation passively, LXXXVIII is energetically self-sacrificial, offering to fight against himself."}, {"text": "LXXXVIII is angry; LXXXVII is hopeful", "isCorrect": false, "rationale": "Neither sonnet fits these characterizations accurately."}, {"text": "Both sonnets are identical in tone and strategy", "isCorrect": false, "rationale": "There is a meaningful shift from passive resignation to active self-sacrifice between the two."}]}, {"question": "What does 'vantage' mean in line 14 ('Doing thee vantage, double-vantage me')?", "options": [{"text": "Disadvantage or harm", "isCorrect": false, "rationale": "'Vantage' is a positive term meaning benefit or advantage, not harm."}, {"text": "Advantage or benefit", "isCorrect": true, "rationale": "'Vantage' means gain or benefit; the speaker argues that aiding the beloved also doubles back as benefit to himself."}, {"text": "A commanding viewpoint or position", "isCorrect": false, "rationale": "While 'vantage point' is a related meaning, in this context the word means profit or benefit."}, {"text": "Punishment", "isCorrect": false, "rationale": "Punishment is the opposite of the intended meaning here."}]}, {"question": "The speaker's willingness to confess hidden faults in this sonnet reflects which broader theme of Chapter 9?", "options": [{"text": "The power of poetry to confer immortality", "isCorrect": false, "rationale": "Immortality through verse is not a concern here."}, {"text": "The speaker's radical self-deprecation as a form of devotion during estrangement", "isCorrect": true, "rationale": "The speaker's offer to testify against himself demonstrates how completely he subordinates his own dignity to the beloved's interests, a key motif of the estrangement sequence."}, {"text": "The beloved's moral corruption", "isCorrect": false, "rationale": "The sonnet focuses on the speaker's faults, not a critique of the beloved's morality."}, {"text": "Rivalry between the speaker and other suitors", "isCorrect": false, "rationale": "No rival is mentioned; the tension is entirely internal to the speaker's self-image."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
