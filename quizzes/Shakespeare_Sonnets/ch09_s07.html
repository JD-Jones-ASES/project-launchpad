<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What simile does the speaker use to describe his own situation in the opening lines of Sonnet XCIII?", "options": [{"text": "Like a soldier who does not know the war has ended", "isCorrect": false, "rationale": "No soldier simile is used; the comparison is domestic and intimate."}, {"text": "Like a deceived husband who sees love in his wife's face while her heart is elsewhere", "isCorrect": true, "rationale": "Lines 1-4 compare the speaker to a deceived husband: he will live supposing the beloved is true, even though the beloved's looks may still seem loving while the heart is in another place."}, {"text": "Like a dreamer who cannot wake from a pleasant illusion", "isCorrect": false, "rationale": "The dream metaphor appears in LXXXVII; XCIII uses the deceived husband."}, {"text": "Like a blind man who cannot see the truth", "isCorrect": false, "rationale": "Blindness is not the metaphor; the deception is specifically about facial expression vs. internal feeling."}]}, {"question": "Why can the speaker not detect the beloved's change of heart through the beloved's eyes?", "options": [{"text": "Because the speaker never looks at the beloved's face", "isCorrect": false, "rationale": "The problem is precisely that he does look and finds no change — the beloved's face does not reveal internal change."}, {"text": "Because heaven decreed that only sweetness should dwell in the beloved's face, regardless of inner feeling", "isCorrect": true, "rationale": "Lines 11-13 explain: at the beloved's creation, heaven decreed that sweet love should always appear in the face. Therefore the beloved's looks cannot reveal a false heart."}, {"text": "Because the speaker is too much in love to see clearly", "isCorrect": false, "rationale": "The speaker is not blinded by love in the usual sense; the problem is the beloved's face, which is constitutionally incapable of showing inward change."}, {"text": "Because the speaker avoids all contact with the beloved", "isCorrect": false, "rationale": "Avoidance is described in LXXXIX; in XCIII the speaker is still observing the beloved's face."}]}, {"question": "What contrast does the speaker draw in lines 9-10 about 'many'?", "options": [{"text": "In many people, a false heart IS visible in their facial expressions", "isCorrect": true, "rationale": "Lines 9-10 note that in many people, 'the false heart's history / Is writ in moods, and frowns, and wrinkles strange' — their faces do betray their inner state, unlike the beloved's."}, {"text": "Many people can read the beloved's heart correctly", "isCorrect": false, "rationale": "The contrast is between common people whose faces reveal their hearts and the beloved whose face cannot."}, {"text": "Many people have already been deceived by the beloved", "isCorrect": false, "rationale": "The deceived many are not named; the contrast is with a general human pattern of legible faces."}, {"text": "Many people agree that the beloved is false", "isCorrect": false, "rationale": "No accusation from others is present; the speaker is reasoning from general human observation."}]}, {"question": "What is the allusion in the couplet ('How like Eve's apple doth thy beauty grow, / If thy sweet virtue answer not thy show!')?", "options": [{"text": "The apple of Eris, golden apple of discord from Greek mythology", "isCorrect": false, "rationale": "The apple of discord is from Greek mythology; this allusion is specifically to the Garden of Eden."}, {"text": "The forbidden fruit of Eden — beautiful but potentially dangerous and deceptive", "isCorrect": true, "rationale": "Eve's apple is the archetypal emblem of beauty that conceals danger and leads to corruption. The beloved's beauty, if not matched by virtue, is like the apple — pleasing in appearance but potentially catastrophic."}, {"text": "The apple in the fairy tale of Snow White", "isCorrect": false, "rationale": "Snow White post-dates Shakespeare; the allusion is to Genesis."}, {"text": "The apple Newton observed to discover gravity", "isCorrect": false, "rationale": "Newton's apple is a scientific anecdote, not a literary allusion present in this sonnet."}]}, {"question": "What warning is implied in the phrase 'If thy sweet virtue answer not thy show'?", "options": [{"text": "The beloved should learn to conceal virtue more carefully", "isCorrect": false, "rationale": "The warning is about the gap between appearance and virtue, not about concealment."}, {"text": "If the beloved's actual virtue does not match the beautiful appearance, the beauty becomes as dangerous as the forbidden fruit", "isCorrect": true, "rationale": "The couplet warns: beauty without virtue is a trap, like Eve's apple. The beloved's lovely face will be morally dangerous if inner virtue does not match the outward show."}, {"text": "The beloved should stop being beautiful to avoid temptation", "isCorrect": false, "rationale": "The advice is not to change appearance but to ensure virtue matches beauty."}, {"text": "The speaker is warning himself not to be deceived", "isCorrect": false, "rationale": "The warning is addressed to the beloved ('dear heart' in XCV; here the implication is about the beloved's moral responsibility)."}]}, {"question": "The phrase 'love's face / May still seem love to me' expresses:", "options": [{"text": "The speaker's certainty that the beloved still loves him", "isCorrect": false, "rationale": "The phrase expresses uncertainty masked by hope; the beloved's face seems loving but the heart may be elsewhere."}, {"text": "The tragic possibility that the beloved's loving appearance masks a changed heart", "isCorrect": true, "rationale": "'May still seem love' conveys doubt: the face still looks like love, but this semblance may be false, disconnected from the beloved's actual feeling."}, {"text": "The speaker's satisfaction with surface appearances", "isCorrect": false, "rationale": "The speaker is not satisfied; the possibility of deception is deeply troubling."}, {"text": "A declaration that appearances are always trustworthy", "isCorrect": false, "rationale": "The sonnet argues precisely the opposite — that the beloved's appearance is uniquely untrustworthy as an indicator of internal truth."}]}, {"question": "What theme does Sonnet XCIII introduce that extends beyond the earlier sonnets of this chapter?", "options": [{"text": "The speaker's desire to write better poetry", "isCorrect": false, "rationale": "Poetry composition is not the new theme introduced here."}, {"text": "The danger of unreadable beauty — the possibility that the beloved's face cannot reveal inner falseness", "isCorrect": true, "rationale": "Where earlier sonnets deal with the speaker's reaction to anticipated loss, XCIII introduces a new anxiety: the beloved's beauty may be constitutionally incapable of revealing inner corruption, making betrayal invisible."}, {"text": "The speaker's plans to find a new lover", "isCorrect": false, "rationale": "No replacement is contemplated; the sonnet deepens attachment and anxiety simultaneously."}, {"text": "A celebration of the beloved's loyalty", "isCorrect": false, "rationale": "The sonnet is not celebratory; it is an exploration of the difficulty of knowing whether the beloved is faithful."}]}, {"question": "What does 'alter'd new' mean in line 3 ('love's face / May still seem love to me, though alter'd new')?", "options": [{"text": "Newly decorated or adorned", "isCorrect": false, "rationale": "'Alter'd new' does not refer to decoration but to a recent inner change."}, {"text": "Changed anew — meaning the beloved's love has recently changed to something else", "isCorrect": true, "rationale": "'Alter'd new' suggests the love has been recently transformed or replaced; the speaker acknowledges that love's face may mask this new alteration."}, {"text": "Improved by time", "isCorrect": false, "rationale": "The alteration is not an improvement; it represents a possible turn away from love."}, {"text": "Made permanent and settled", "isCorrect": false, "rationale": "'New' suggests recent change, not permanence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
