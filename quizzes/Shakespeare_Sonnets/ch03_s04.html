    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet IV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary extended metaphor of Sonnet IV?", "options": [{"text": "Beauty as a garden that must be cultivated to avoid weeds.", "isCorrect": false, "rationale": "The garden metaphor is more central to Sonnets III and VI; Sonnet IV’s dominant metaphor is financial."}, {"text": "Beauty as a financial legacy or estate that must be properly spent (invested) rather than hoarded.", "isCorrect": true, "rationale": "The sonnet is saturated with financial language: “legacy,” “lend,” “spend,” “niggard,” “usurer,” “audit,” “executor.” Beauty is a bequest from Nature that must be put to use."}, {"text": "Beauty as a military fortress defending against the attack of time.", "isCorrect": false, "rationale": "Military imagery appears in Sonnet II; Sonnet IV’s metaphors are overwhelmingly financial."}, {"text": "Beauty as a candle that burns itself down without giving warmth to others.", "isCorrect": false, "rationale": "The candle/flame metaphor belongs to Sonnet I; Sonnet IV uses the financial ledger as its central image."}], "id": "q01"}, {"question": "What does “Nature’s bequest gives nothing, but doth lend” mean?", "options": [{"text": "Nature is stingy and refuses to give beauty to most people.", "isCorrect": false, "rationale": "Nature is described as “frank” (generous), but as a lender, not an outright giver; the point is about obligation, not stinginess."}, {"text": "Nature does not give beauty as an outright gift; she lends it, expecting it to be passed on rather than kept for oneself.", "isCorrect": true, "rationale": "The key insight of the sonnet: beauty is a loan, not a possession. Nature the lender expects the youth to pass the beauty along, just as a borrower is obligated to repay a loan with interest."}, {"text": "Nature gives gifts only to those who are humble and grateful.", "isCorrect": false, "rationale": "Moral virtue is not the criterion; the point is that Nature’s lending requires the beauty to be “free” (freely given onward)."}, {"text": "Nature will reclaim all beauty at death, so there is no point trying to preserve it.", "isCorrect": false, "rationale": "The poem argues the opposite: beauty can outlive the individual if it is invested in offspring rather than hoarded."}], "id": "q02"}, {"question": "What does “beauteous niggard” mean as applied to the youth?", "options": [{"text": "A beautiful person who is also a skilled negotiator.", "isCorrect": false, "rationale": "Negotiation is not implied; “niggard” means a miser."}, {"text": "A beautiful miser who hoards the beauty Nature lent him instead of spending it by producing children.", "isCorrect": true, "rationale": "Like “tender churl” in Sonnet I, “beauteous niggard” is an oxymoron praising (beauteous) and condemning (niggard) simultaneously, shaming the youth for hoarding a loan."}, {"text": "A person who is beautiful on the outside but ugly in character.", "isCorrect": false, "rationale": "While moral ugliness is implied, the specific charge is miserliness in the financial metaphor, not hypocrisy."}, {"text": "A young man who spends lavishly on himself but gives nothing to the poor.", "isCorrect": false, "rationale": "Charity to the poor is not the subject; the hoarding is of biological beauty, not money."}], "id": "q03"}, {"question": "What paradox does “profitless usurer” capture?", "options": [{"text": "A lender who charges interest but never collects payment.", "isCorrect": false, "rationale": "The paradox involves the youth, not an external lender; the youth lends to himself and profits nothing."}, {"text": "The youth is a usurer (one who charges interest on loans) who nevertheless makes no profit because he only deals with himself.", "isCorrect": true, "rationale": "A usurer lends out money at interest for gain; but if the youth lends only to himself (keeps his beauty for himself), there is no gain, no interest, no profit — the entire system collapses into sterility."}, {"text": "A wealthy person who pretends to be poor in order to avoid paying taxes.", "isCorrect": false, "rationale": "Tax avoidance is not the metaphor; the paradox is about the impossibility of profiting from self-dealing."}, {"text": "A poet who writes for love rather than money and therefore gains nothing financially.", "isCorrect": false, "rationale": "The poet is not the subject here; the youth is the usurer, and the paradox is about sterile self-investment."}], "id": "q04"}, {"question": "What does “acceptable audit” mean in line 12?", "options": [{"text": "A satisfactory inspection of the youth’s accounts by a tax official.", "isCorrect": false, "rationale": "The audit is metaphorical, not literal; it refers to the reckoning at death when the youth must account for how he used Nature’s gift."}, {"text": "A satisfactory account that the youth can present to Nature at death, showing that he put beauty to its proper use.", "isCorrect": true, "rationale": "The financial metaphor culminates here: at death, Nature calls in the loan. If the youth has produced children (invested beauty), the audit is “acceptable.” If he has hoarded it, he has nothing to show."}, {"text": "A poem or song that adequately celebrates the youth’s beauty.", "isCorrect": false, "rationale": "Poetry is not the answer to Nature’s reckoning in this sonnet; children are."}, {"text": "A final medical examination of the youth before he dies.", "isCorrect": false, "rationale": "This is a literal misreading; the audit is entirely within the financial metaphor."}], "id": "q05"}, {"question": "What does the couplet “Thy unused beauty must be tombed with thee, / Which, used, lives th’ executor to be” mean?", "options": [{"text": "If the youth uses his beauty (reproduces), it becomes the executor of his will, outliving him to carry out his legacy.", "isCorrect": true, "rationale": "An executor carries out a deceased person’s wishes and preserves their estate. Used beauty (a child) becomes the living executor, administering the beauty-estate beyond the parent’s death."}, {"text": "The youth’s unused beauty will be buried with him, and his executor will manage his financial affairs.", "isCorrect": false, "rationale": "The executor in the couplet is a metaphor for the child/beauty-heir, not a literal legal executor."}, {"text": "The grave will literally enclose the youth’s beauty and no one will remember it.", "isCorrect": false, "rationale": "While the threat of the grave is real, the couplet also offers the positive alternative: used beauty becomes its own executor."}, {"text": "The youth’s poems will execute his will and preserve his name after death.", "isCorrect": false, "rationale": "Poetry as executor is not the solution offered here; the executor is the beauty passed to a child."}], "id": "q06"}, {"question": "What does “having traffic with thyself alone” mean?", "options": [{"text": "The youth travels frequently but always returns home alone.", "isCorrect": false, "rationale": "Travel is not the meaning; “traffic” is a commercial term for trading or dealing."}, {"text": "The youth engages in commerce (dealing) only with himself — investing all his beauty-capital back into himself rather than putting it into the world.", "isCorrect": true, "rationale": "“Traffic” in Elizabethan English meant trade or commerce; “having traffic with thyself” means trading only internally, never exporting beauty into the world through a child."}, {"text": "The youth spends all his time alone without seeking companionship.", "isCorrect": false, "rationale": "While solitude is implied, the commercial metaphor makes self-dealing (not loneliness) the key charge."}, {"text": "The youth communicates only by letters to himself in a private journal.", "isCorrect": false, "rationale": "No reference to writing or journaling; the word belongs to the financial trading metaphor."}], "id": "q07"}, {"question": "How does Shakespeare characterize Nature in Sonnet IV?", "options": [{"text": "As a cruel force that randomly distributes beauty and then takes it back.", "isCorrect": false, "rationale": "Nature is not described as cruel; she is “frank” (generous) and operates according to a fair lending principle."}, {"text": "As a generous but expectant lender who gives beauty freely but requires it to be passed on, not hoarded.", "isCorrect": true, "rationale": "Nature is “frank” (freely generous) in her lending, but the terms of the loan demand that beauty be shared; hoarding it violates the agreement."}, {"text": "As a harsh judge who punishes those who fail to reproduce.", "isCorrect": false, "rationale": "Nature is presented as a creditor, not a judge; the punishment (beauty tombed) is the natural consequence, not a verdict pronounced."}, {"text": "As a mother figure who weeps for children who disappoint her.", "isCorrect": false, "rationale": "No grief is attributed to Nature; the relationship is contractual, not maternal in an emotional sense."}], "id": "q08"}, {"question": "What does the word “free” mean in line 4 (“she lends to those are free”)?", "options": [{"text": "Those who are politically free, not enslaved.", "isCorrect": false, "rationale": "Political freedom is not the context; “free” here has a moral and financial meaning."}, {"text": "Those who are generous and willing to pass the gift on, in contrast to the niggardly youth.", "isCorrect": true, "rationale": "In Elizabethan usage, “free” meant liberal or generous; Nature lends beauty to those who will be generous with it (pass it to children), not to misers."}, {"text": "Those who are free from commitments and can travel wherever they wish.", "isCorrect": false, "rationale": "Freedom from obligation is the opposite of the meaning; “free” here means freely generous."}, {"text": "Those who are free from disease and in perfect physical health.", "isCorrect": false, "rationale": "Health is not the criterion for Nature’s lending; generosity of spirit is."}], "id": "q09"}, {"question": "How does Sonnet IV’s financial language deepen the procreation argument?", "options": [{"text": "It reduces love to a commercial transaction, showing Shakespeare’s cynical view of human relationships.", "isCorrect": false, "rationale": "The financial metaphor is rhetorical, not cynical; it makes the duty to reproduce feel as concrete and urgent as paying a legal debt."}, {"text": "By framing beauty as a loan from Nature, it makes the failure to reproduce a moral and legal breach of contract, not just a personal failing.", "isCorrect": true, "rationale": "The financial frame transforms the argument from aesthetic preference to obligation: the youth is in debt to Nature and to the world, and failing to reproduce is defaulting on that debt."}, {"text": "It suggests that having children is primarily a financial investment for the parent’s old age.", "isCorrect": false, "rationale": "Old-age security is mentioned in Sonnet II but not in Sonnet IV; here the argument is about honoring Nature’s loan terms."}, {"text": "It argues that wealthy men have a greater duty to reproduce than poor ones.", "isCorrect": false, "rationale": "Wealth is not the criterion; the “bequest” is beauty, not money, and the obligation applies to any whom Nature has gifted beautifully."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
