    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker ask in the opening rhetorical question of Sonnet LXXXVI?", "options": [{"text": "Whether the youth has abandoned him for the rival deliberately", "isCorrect": false, "rationale": "The question is not about the youth's deliberate choice but about what specific force silenced the speaker's own creative power."}, {"text": "Whether it was the proud full sail of the rival's great verse that entombed his thoughts in the womb of his brain", "isCorrect": true, "rationale": "Lines 1-4 ask: 'Was it the proud full sail of his great verse... / That did my ripe thoughts in my brain inhearse, / Making their tomb the womb wherein they grew?' — asking what buried the speaker's ripened thoughts before they could be born."}, {"text": "Whether the rival was taught by supernatural spirits to surpass all mortal poets", "isCorrect": false, "rationale": "The question about spirits is the second rhetorical question in the sonnet; the first concerns the rival's verse as the possible cause of the speaker's silence."}, {"text": "Whether the youth chose the rival's verse over the speaker's out of mere vanity", "isCorrect": false, "rationale": "No question about the youth's motivations opens the sonnet; the first question is about what silenced the speaker's own voice."}], "id": "q01"}, {"question": "What does the word 'inhearse' (line 3) mean in the phrase 'did my ripe thoughts in my brain inhearse'?", "options": [{"text": "To imprison thoughts in a circular argument", "isCorrect": false, "rationale": "'Inhearse' derives from 'hearse' — the vehicle for carrying the dead to burial. The word means to entomb or enclose as in a coffin, not to trap in circular reasoning."}, {"text": "To entomb or enclose in a coffin, as if laying thoughts in a grave before they could live", "isCorrect": true, "rationale": "From 'hearse,' 'inhearse' means to lay in a hearse or coffin. The speaker's ripe thoughts were made a tomb in the womb of his brain — buried before birth by the rival's superior verse."}, {"text": "To rehearse repeatedly until thoughts are memorized", "isCorrect": false, "rationale": "'Inhearse' is distinct from 'rehearse'; it derives from 'hearse' (coffin/funeral carriage), not from 're-hearse' (to practice)."}, {"text": "To scatter thoughts randomly so they cannot be gathered into coherent verse", "isCorrect": false, "rationale": "The image is of enclosure and burial, not scattering; the thoughts are contained (tombed in the womb) rather than dispersed."}], "id": "q02"}, {"question": "What is the second possible cause the speaker considers for his silence?", "options": [{"text": "The youth's preference for the rival's verse over the speaker's", "isCorrect": false, "rationale": "The youth's preference is explored later as the true cause; the second hypothetical cause is the rival's supposed supernatural inspiration."}, {"text": "Whether the rival's spirit, taught by spirits to write above mortal pitch, struck the speaker dead", "isCorrect": true, "rationale": "Lines 5-6 ask: 'Was it his spirit, by spirits taught to write, / Above a mortal pitch, that struck me dead?' — raising the possibility that supernatural inspiration gave the rival an invincible advantage."}, {"text": "Whether the rival bribed other poets to praise him and crowd out the speaker", "isCorrect": false, "rationale": "No bribery or social manipulation is considered; the second cause is supernatural inspiration, not worldly intrigue."}, {"text": "Whether the speaker's own age and weakness caused his creative decline", "isCorrect": false, "rationale": "No personal aging or weakness is contemplated; the second cause is the rival's spiritual assistance from supernatural sources."}], "id": "q03"}, {"question": "After raising both possible causes, what answer does the speaker give?", "options": [{"text": "He admits that the rival's verse genuinely defeated him", "isCorrect": false, "rationale": "The speaker denies this; he says neither the rival's verse nor his supernatural helpers can boast as victors over his silence."}, {"text": "He denies both: neither the rival's verse nor his nightly compeers astonished the speaker's verse", "isCorrect": true, "rationale": "Lines 9-10 state: 'No, neither he, nor his compeers by night / Giving him aid, my verse astonished,' explicitly rejecting both hypothetical causes and redirecting toward the true reason."}, {"text": "He concedes that supernatural forces are beyond his ability to compete with", "isCorrect": false, "rationale": "The speaker denies that supernatural forces had any effect on him; he is not intimidated by the rival's claimed spiritual connections."}, {"text": "He acknowledges that he voluntarily chose silence to protest the youth's treatment of him", "isCorrect": false, "rationale": "No protest or voluntary choice is cited; the denial is genuine, and the true cause is the youth filling the rival's lines."}], "id": "q04"}, {"question": "Who or what is 'that affable familiar ghost / Which nightly gulls him with intelligence' (lines 11-12)?", "options": [{"text": "The rival's own imagination, which he mistakes for supernatural guidance", "isCorrect": false, "rationale": "While one reading suggests self-delusion, the 'familiar ghost' most likely refers to a supernatural spirit — possibly a familiar spirit in the occult sense — that deceives the rival with false intelligence."}, {"text": "A supernatural familiar spirit that nightly deceives the rival with (false) knowledge or inspiration", "isCorrect": true, "rationale": "'Familiar ghost' suggests an occult familiar spirit; 'gulls him with intelligence' means deceives him with information or inspiration. The speaker dismisses the rival's claimed supernatural source as something that tricks rather than truly enlightens."}, {"text": "A friendly human associate who feeds the rival gossip about the youth", "isCorrect": false, "rationale": "While 'affable' suggests friendliness, the word 'ghost' and the nightly visits indicate a supernatural referent rather than a human informant."}, {"text": "The speaker himself, who once gave the rival poetic guidance in secret", "isCorrect": false, "rationale": "No history of the speaker guiding the rival is suggested; the ghost is the rival's own supposed supernatural helper."}], "id": "q05"}, {"question": "What does the speaker say about his fear of the rival's supernatural helpers?", "options": [{"text": "He was initially afraid but overcame his fear through confidence in his love", "isCorrect": false, "rationale": "No initial fear is admitted; the speaker denies having been sick of any fear from the rival's supernatural connections at all."}, {"text": "He was not sick of any fear from them — neither the rival nor his ghost silenced him", "isCorrect": true, "rationale": "Line 14 states: 'I was not sick of any fear from thence,' explicitly denying that supernatural intimidation was the cause of the speaker's creative silence."}, {"text": "He feared the ghost but not the rival's verse itself", "isCorrect": false, "rationale": "The speaker denies fear of both — neither verse nor ghost caused his silence."}, {"text": "He respected the ghost's power even while denying that the rival's verse equaled his own", "isCorrect": false, "rationale": "No respect for the ghost is expressed; the speaker dismisses both as non-factors in his silence."}], "id": "q06"}, {"question": "What does the couplet reveal as the true cause of the speaker's silence?", "options": [{"text": "The youth's countenance filling up the rival's line, leaving the speaker with nothing to write about", "isCorrect": true, "rationale": "The couplet reads: 'But when your countenance fill'd up his line, / Then lacked I matter; that enfeebled mine,' identifying the youth's active presence in the rival's verse as what truly drained the speaker's material and enfeebled his own creative power."}, {"text": "The rival's superior supernatural inspiration that proved impossible to match", "isCorrect": false, "rationale": "The couplet explicitly rejects supernatural inspiration as the cause; the true cause is the youth's participation in the rival's verse."}, {"text": "The speaker's decision to retire from writing to preserve his dignity", "isCorrect": false, "rationale": "No dignified retirement is claimed; the cause is the youth's filling the rival's lines with the very subject-matter the speaker needed."}, {"text": "The youth's public declaration that the rival was a superior poet", "isCorrect": false, "rationale": "No public declaration is described; the cause is the intimate one of the youth's countenance — his very presence and approval — inhabiting the rival's verse."}], "id": "q07"}, {"question": "What is the significance of 'then lacked I matter' in the couplet?", "options": [{"text": "The speaker ran out of new compliments because everything had already been said by the rival", "isCorrect": false, "rationale": "The lack of matter is not about repetition but about something more poignant: the youth's filling the rival's lines takes away the very substance (matter) of what the speaker would write."}, {"text": "When the youth gave himself to the rival's verse, the speaker lost his subject — the very content he would have written about", "isCorrect": true, "rationale": "'Matter' means subject matter or material for verse. When the youth's countenance filled the rival's lines, the youth himself was no longer available as poetic subject to the speaker; the speaker was emptied of content because the youth had gone to inhabit another poet's work."}, {"text": "The speaker lacked the physical materials — paper and ink — to write during this period", "isCorrect": false, "rationale": "'Matter' is clearly used in the literary sense of subject matter or poetic content, not in the material sense of writing supplies."}, {"text": "The speaker's thoughts became too complex and philosophical to be captured in a sonnet's space", "isCorrect": false, "rationale": "No such philosophical overcrowding is suggested; the lack is of subject matter specifically, caused by the youth's diversion to the rival."}], "id": "q08"}, {"question": "How does Sonnet LXXXVI function as a conclusion to the Rival Poet sequence?", "options": [{"text": "It announces the speaker's permanent retirement from writing in favor of the rival", "isCorrect": false, "rationale": "No permanent retirement is announced; other sonnets continue after this. But LXXXVI is the final Rival Poet sonnet and provides a culminating explanation."}, {"text": "It resolves the sequence by identifying the youth's own complicity — his patronage of the rival — as the ultimate source of the speaker's silence", "isCorrect": true, "rationale": "After weighing the rival's verse and his supernatural helpers and dismissing both, the couplet redirects blame: it was the youth filling the rival's lines that enfeebled the speaker. The rival did not defeat the speaker; the youth did, by giving the rival his countenance — making the youth complicit in the speaker's displacement."}, {"text": "It proves the speaker is superior to the rival by demonstrating greater philosophical depth", "isCorrect": false, "rationale": "No claim of superiority closes the sequence; the tone is resigned and analytical, not triumphant."}, {"text": "It forgives both the youth and the rival, ending the competition in a spirit of generosity", "isCorrect": false, "rationale": "No forgiveness or reconciliation is expressed; the couplet is a quiet but devastating indictment of the youth's role in the speaker's displacement."}], "id": "q09"}, {"question": "The phrase 'proud full sail of his great verse' (line 1) continues what kind of imagery from an earlier sonnet in the sequence?", "options": [{"text": "The painting and cosmetic imagery from Sonnets LXXXII and LXXXIII", "isCorrect": false, "rationale": "The sailing imagery is distinct from the painting metaphors; it extends the nautical metaphor established earlier."}, {"text": "The nautical metaphor from Sonnet LXXX, where the rival was a tall ship and the speaker a saucy bark", "isCorrect": true, "rationale": "In Sonnet LXXX the rival was described as a ship 'of tall building and of goodly pride' sailing on the ocean of the youth's worth. LXXXVI's opening image of the rival's 'proud full sail' directly echoes and expands this earlier nautical characterization."}, {"text": "The flight and feather imagery from Sonnet LXXVIII", "isCorrect": false, "rationale": "While flight imagery opened the chapter, LXXXVI specifically uses nautical sailing rather than aerial flight."}, {"text": "The monument and tomb imagery from Sonnet LXXXI", "isCorrect": false, "rationale": "Tomb imagery recurs in 'inhearse' (line 3), but the 'proud full sail' is specifically nautical, echoing Sonnet LXXX's ship metaphor."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
