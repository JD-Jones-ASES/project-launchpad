<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker confess about his Muse in Sonnet CIII?", "options": [{"text": "That she has become too ambitious", "isCorrect": false, "rationale": "The complaint is poverty of output, not ambition."}, {"text": "That she brings forth only poor work", "isCorrect": true, "rationale": "'Alack! what poverty my Muse brings forth' opens the self-deprecating confession."}, {"text": "That she refuses to work at all", "isCorrect": false, "rationale": "In Sonnets C and CI the Muse was absent; here she works but produces inadequate results."}, {"text": "That she is writing about the wrong subjects", "isCorrect": false, "rationale": "The problem is quality, not subject matter."}]}, {"question": "According to the speaker, why is his praise less valuable than the beloved's own appearance?", "options": [{"text": "The beloved is too modest to accept compliments", "isCorrect": false, "rationale": "The speaker's argument is about the limits of language, not the beloved's modesty."}, {"text": "The unadorned beloved surpasses whatever the poet's skill can add", "isCorrect": true, "rationale": "'The argument, all bare, is of more worth / Than when it hath my added praise beside!' — the subject itself outshines any verbal embellishment."}, {"text": "Other poets have already said everything perfectly", "isCorrect": false, "rationale": "Rival poets are not mentioned in this sonnet."}, {"text": "The Muse is jealous of the beloved's beauty", "isCorrect": false, "rationale": "No jealousy is attributed to the Muse here."}]}, {"question": "What does the speaker suggest the beloved should do instead of reading his verse?", "options": [{"text": "Listen to music", "isCorrect": false, "rationale": "The suggestion is visual, not auditory."}, {"text": "Look in a mirror (glass)", "isCorrect": true, "rationale": "'Look in your glass, and there appears a face / That over-goes my blunt invention quite.'"}, {"text": "Read earlier, better poets", "isCorrect": false, "rationale": "No earlier poets are recommended; the mirror is the superior source."}, {"text": "Travel and see the world's beauty", "isCorrect": false, "rationale": "Travel is not suggested; the glass is the immediate, self-referential answer."}]}, {"question": "What does 'blunt invention' mean?", "options": [{"text": "A straightforward and honest creative idea", "isCorrect": false, "rationale": "In context, 'blunt' is self-deprecating — the speaker means dull or inadequate creativity."}, {"text": "Dull or inadequate creative power", "isCorrect": true, "rationale": "The speaker calls his own creative faculty 'blunt' — that is, dulled and ineffective compared to the beloved's actual beauty."}, {"text": "A sharp and cutting style of verse", "isCorrect": false, "rationale": "'Blunt' means the opposite of sharp here."}, {"text": "An invention that is plainly stated", "isCorrect": false, "rationale": "The word is self-critical, not merely descriptive."}]}, {"question": "The speaker warns against what potentially sinful act?", "options": [{"text": "Praising the beloved to strangers", "isCorrect": false, "rationale": "The warning is about artistic overreach, not social transgression."}, {"text": "Striving to improve the portrait and thereby marring a subject already perfect", "isCorrect": true, "rationale": "'Were it not sinful then, striving to mend, / To mar the subject that before was well?'"}, {"text": "Writing about rivals to make the beloved jealous", "isCorrect": false, "rationale": "Rivalry is not the concern; over-crafting a perfect subject is."}, {"text": "Publishing poems without the beloved's permission", "isCorrect": false, "rationale": "Permission is not discussed; the sin is aesthetic, not social."}]}, {"question": "What is the function of the couplet's reference to the mirror (glass)?", "options": [{"text": "To contrast the beloved's vanity with the poet's humility", "isCorrect": false, "rationale": "The mirror is not a symbol of vanity here; it is the truest possible portrait."}, {"text": "To argue that the beloved's reflection surpasses any verbal portrait the poet can create", "isCorrect": true, "rationale": "The couplet tells the beloved that his own glass shows more than any verse can: 'Your own glass shows you when you look in it.'"}, {"text": "To suggest the beloved should admire himself less", "isCorrect": false, "rationale": "There is no criticism of self-admiration; the mirror is offered as superior to verse."}, {"text": "To echo the opening warning about poetic poverty", "isCorrect": false, "rationale": "The couplet is a witty resolution, not a repetition of the opening complaint."}]}, {"question": "What rhetorical question does the speaker pose about improvement?", "options": [{"text": "Can the Muse ever truly match the beloved's face?", "isCorrect": false, "rationale": "The speaker does not ask the Muse; he reflects on the danger of over-revision."}, {"text": "Would it not be sinful to try to improve what is already perfect, and thereby ruin it?", "isCorrect": true, "rationale": "'Were it not sinful then, striving to mend, / To mar the subject that before was well?' poses this dilemma."}, {"text": "Is it better to write one perfect poem or many imperfect ones?", "isCorrect": false, "rationale": "That is not the question posed; the question is about the danger of 'improvement.'"}, {"text": "Can beauty exist without a poet to record it?", "isCorrect": false, "rationale": "The epistemological question of beauty's existence without poetry is not the focus here."}]}, {"question": "What primary theme does Sonnet CIII share with Sonnet CI?", "options": [{"text": "The Muse's truancy and need for scolding", "isCorrect": false, "rationale": "Sonnet CI scolds the Muse; Sonnet CIII shifts to the poet's own limitations."}, {"text": "The inadequacy of verse compared to the beloved's inherent worth", "isCorrect": true, "rationale": "Both sonnets argue that the beloved transcends what words can capture, making poetic praise seem insufficient."}, {"text": "The immortalizing power of poetry over marble and tombs", "isCorrect": false, "rationale": "That argument is Sonnet CI's; Sonnet CIII emphasizes the reverse — the limits of verse."}, {"text": "The passage of time and the fear of aging", "isCorrect": false, "rationale": "Time is not the central concern here; poetic inadequacy is."}]}, {"question": "What is the tone of Sonnet CIII?", "options": [{"text": "Angry and accusatory", "isCorrect": false, "rationale": "The speaker is self-deprecating and humble, not angry."}, {"text": "Playfully self-deprecating and complimentary to the beloved", "isCorrect": true, "rationale": "The speaker turns his apparent inadequacy into the highest possible compliment: the beloved surpasses all art."}, {"text": "Melancholy and resigned to failure", "isCorrect": false, "rationale": "The tone is affectionate and witty, not despairing."}, {"text": "Boastful about the power of his verse", "isCorrect": false, "rationale": "The poet explicitly calls his invention 'blunt' and praises the beloved above his verse."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
