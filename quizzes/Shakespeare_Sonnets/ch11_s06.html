<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the 'gift' and 'tables' referred to in the opening line of Sonnet CXXII?", "options": [{"text": "A formal deed of property gifted by the youth to the speaker", "isCorrect": false, "rationale": "The tables are writing tablets, not property deeds."}, {"text": "Writing tablets given by the youth as a gift, which the speaker has apparently given away", "isCorrect": true, "rationale": "Elizabethan 'tables' were portable writing tablets used as notebooks. The youth gave such tablets to the speaker, who has apparently disposed of them — prompting this sonnet's defense."}, {"text": "A portrait of the youth that the speaker keeps as a memento", "isCorrect": false, "rationale": "A portrait is not a 'table' in this sense; tables are writing tablets."}, {"text": "Banquet tables at a feast celebrating the youth's virtue", "isCorrect": false, "rationale": "'Tables' means writing tablets, not furniture."}]}, {"question": "The speaker argues that the youth's memory is stored 'within my brain / Full character'd with lasting memory.' What does 'character'd' mean?", "options": [{"text": "Morally defined and virtuous", "isCorrect": false, "rationale": "'Character'd' here is a verbal adjective from 'to character' meaning to inscribe or engrave."}, {"text": "Inscribed or engraved — the youth is written deeply into the speaker's mind", "isCorrect": true, "rationale": "'Character' as a verb means to inscribe; the brain is described as a text fully written with the youth's memory, surpassing any physical tablet."}, {"text": "Celebrated and praised in published verse", "isCorrect": false, "rationale": "Publication is not implied; the inscription is in the brain, not in print."}, {"text": "Imaginatively depicted in portrait form", "isCorrect": false, "rationale": "'Character'd' refers to writing/inscription, not visual portraiture."}]}, {"question": "What does 'above that idle rank remain' (line 3) mean regarding the physical tablets?", "options": [{"text": "The brain's memory ranks higher than the idle (empty or worthless) tablets", "isCorrect": true, "rationale": "The speaker's living memory of the youth transcends the 'idle rank' — the useless, inert series — of physical writing tablets."}, {"text": "The speaker has filed the tablets in a higher storage location for safekeeping", "isCorrect": false, "rationale": "No physical storage is described; the contrast is between brain and tablet."}, {"text": "The brain will preserve the memory above the rank of ordinary thoughts", "isCorrect": false, "rationale": "While close to the correct reading, 'idle rank' refers specifically to the physical tablets, not to ordinary thoughts."}, {"text": "The youth's social rank is too high to be captured in mere writing tablets", "isCorrect": false, "rationale": "The rank referred to is the tablets themselves, not the youth's social status."}]}, {"question": "The speaker says the brain's memory will last 'Beyond all date; even to eternity' (line 4). What is the significance of 'beyond all date'?", "options": [{"text": "The memory cannot be assigned a particular calendar date", "isCorrect": false, "rationale": "'Date' here means term, limit, or expiration — not a calendar date."}, {"text": "The mental inscription will outlast any fixed term or expiration — it is limitless in duration", "isCorrect": true, "rationale": "'Date' in Elizabethan usage means a fixed term or appointed end; 'beyond all date' means without expiration — the mental record is eternal while tablets are perishable."}, {"text": "The speaker cannot remember when the youth gave him the tablets", "isCorrect": false, "rationale": "The dating of the gift is not the concern; the speaker asserts the perpetuity of memory."}, {"text": "The poem itself will preserve the youth beyond the reach of Time's dates", "isCorrect": false, "rationale": "This is the claim of other sonnets (like 18); here the brain, not the poem, is the vehicle of preservation."}]}, {"question": "Lines 11-13 explain why the speaker gave the tablets away. What is his reasoning?", "options": [{"text": "He gave them to a friend who needed them more urgently", "isCorrect": false, "rationale": "No friend or urgent need is described; the reasoning is about the superiority of memory over physical objects."}, {"text": "The tablets were too poor a vessel for the youth's memory; the brain holds the youth far more fully, making external tallies unnecessary", "isCorrect": true, "rationale": "Lines 11-14: the tablets had 'poor retention' compared to the brain; giving them away was bold confidence that his mind holds the youth better than any 'tally.'"}, {"text": "He wanted to insult the youth by discarding his gift", "isCorrect": false, "rationale": "The speaker is defending the act, not confessing to intended insult."}, {"text": "The tablets were damaged and he replaced them with a better set", "isCorrect": false, "rationale": "No physical damage is mentioned; the reasoning is philosophical about memory vs. external record."}]}, {"question": "The couplet argues: 'To keep an adjunct to remember thee / Were to import forgetfulness in me.' What does 'adjunct' mean here?", "options": [{"text": "A legal assistant or deputy", "isCorrect": false, "rationale": "An adjunct is an accessory or supplementary aid, not a legal person."}, {"text": "A supplementary aid or accessory — using external memory aids would imply his own memory is deficient", "isCorrect": true, "rationale": "To rely on physical tablets ('adjuncts') as memory aids would suggest the brain cannot hold the youth alone — which would imply forgetfulness. The speaker refuses to signal such insufficiency."}, {"text": "A rival who has been added to the youth's circle of friends", "isCorrect": false, "rationale": "No rival is introduced; 'adjunct' refers to the physical tablets as external memory aids."}, {"text": "An addition to the poem itself that the youth requested", "isCorrect": false, "rationale": "The adjunct is the tablets, not a poetic addition."}]}, {"question": "What is the central paradox of Sonnet CXXII?", "options": [{"text": "The speaker loves the youth so deeply that he cannot write about him", "isCorrect": false, "rationale": "The inability to write is not the paradox; the sonnet is itself written."}, {"text": "The speaker proves his devotion by giving away the youth's gift — precisely because his memory of the youth is too strong to need external props", "isCorrect": true, "rationale": "What looks like disregard (giving away the gift) is reframed as the highest tribute: the speaker's love is inscribed so deeply in his mind that physical reminders are superfluous."}, {"text": "The youth's love is eternal but the speaker's life is finite", "isCorrect": false, "rationale": "The contrast of eternal memory and mortal life is present but not the main paradox the sonnet turns on."}, {"text": "Writing about love destroys the very emotion it attempts to preserve", "isCorrect": false, "rationale": "This is not the argument of CXXII; the sonnet argues the brain is a better writing surface than tablets."}]}, {"question": "The phrase 'nor need I tallies thy dear love to score' (line 12) uses an image from what domain?", "options": [{"text": "Music — counting beats and measures", "isCorrect": false, "rationale": "Tallies in Elizabethan usage were notched sticks used to record debts or counts, not musical notation."}, {"text": "Commerce and accounting — notched sticks used to keep score of debts or quantities", "isCorrect": true, "rationale": "Tallies were split sticks used in medieval and Elizabethan England to record financial transactions; the speaker says love needs no such ledger."}, {"text": "Archery — scoring points in a competition", "isCorrect": false, "rationale": "While 'score' can relate to archery, 'tallies' specifically refers to accounting sticks."}, {"text": "Astrology — charting the positions of stars", "isCorrect": false, "rationale": "No astrological imagery is present; the domain is commercial record-keeping."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
