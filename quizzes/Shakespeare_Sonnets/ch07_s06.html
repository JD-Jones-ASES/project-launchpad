    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What structural device organizes the first 12 lines of Sonnet LXIV?", "options": [{"text": "A series of similes comparing beauty to natural phenomena", "isCorrect": false, "rationale": "The lines are organized around the anaphoric “When I have seen,” not similes."}, {"text": "Anaphora, with “When I have seen” / “When sometime” introducing each observation", "isCorrect": true, "rationale": "Lines 1, 3, 5, and 11 all begin with “When,” listing observations of ruin that lead to the speaker’s meditative conclusion."}, {"text": "A series of questions addressed to the beloved", "isCorrect": false, "rationale": "The lines are declarative statements of what the speaker has witnessed, not questions."}, {"text": "A dialogue between Time and the speaker", "isCorrect": false, "rationale": "There is no dialogue; the speaker describes observations in the first person."}]}, {"question": "What does “The rich-proud cost of outworn buried age” (line 2) refer to?", "options": [{"text": "The financial cost of burying the dead", "isCorrect": false, "rationale": "The phrase refers to the grand monuments and expensive constructions of past ages, now ruined."}, {"text": "The elaborate, costly monuments and constructions of past civilizations, now worn out and buried", "isCorrect": true, "rationale": "“Rich-proud cost” means expensive, proud display; “outworn buried age” means an age that is worn out and gone, its works buried by time."}, {"text": "The emotional cost of burying a loved one", "isCorrect": false, "rationale": "The imagery is architectural and civilizational, not personal or emotional."}, {"text": "The pride of wealth that Time has buried underground", "isCorrect": false, "rationale": "While close, the phrase more specifically refers to the great buildings and constructions of past ages, not abstract wealth."}]}, {"question": "The image of the ocean gaining on the shore and the shore winning back from the sea illustrates what concept?", "options": [{"text": "The power of nature over human civilization", "isCorrect": false, "rationale": "While true, the image is more specifically used to illustrate the endless interchange of loss and gain."}, {"text": "The endless exchange and interchange of loss and gain by which nothing is permanently secure", "isCorrect": true, "rationale": "Lines 9–10: “Increasing store with loss, and loss with store” — neither sea nor shore permanently wins; this mirrors how nothing in life is stable."}, {"text": "The beauty of the natural world that outlasts human architecture", "isCorrect": false, "rationale": "The ocean and shore are used to show instability, not beauty or nature’s superiority."}, {"text": "The speaker’s experience of traveling by the sea", "isCorrect": false, "rationale": "The image is metaphorical; the speaker is using it to illustrate a philosophical point about impermanence."}]}, {"question": "What conclusion does the speaker draw from his observations of ruin in line 13?", "options": [{"text": "That he should build monuments to last longer than those of the past", "isCorrect": false, "rationale": "The speaker does not resolve to build; he is led to a frightening personal insight."}, {"text": "That contemplating ruin has taught him that Time will also take away his love", "isCorrect": true, "rationale": "Line 13–14: “Ruin hath taught me thus to ruminate: / That Time will come and take my love away.”"}, {"text": "That the natural world is more permanent than human civilization", "isCorrect": false, "rationale": "The sonnet does not resolve in favor of nature; Time destroys natural things as well."}, {"text": "That he should accept the beloved’s inevitable aging with equanimity", "isCorrect": false, "rationale": "The couplet reveals grief, not equanimity."}]}, {"question": "What does the couplet compare “This thought” to?", "options": [{"text": "A wound that heals over time", "isCorrect": false, "rationale": "The thought is compared to death, not a wound."}, {"text": "A death that cannot help but weep for what it fears to lose", "isCorrect": true, "rationale": "Lines 15–16: “This thought is as a death which cannot choose / But weep to have, that which it fears to lose.”"}, {"text": "A stone that cannot be moved by any force", "isCorrect": false, "rationale": "The stone image is in the octave, not the couplet."}, {"text": "A wave that must crash despite its power", "isCorrect": false, "rationale": "The wave image appears in other sonnets; the couplet here uses the simile of death."}]}, {"question": "What paradox does the couplet of Sonnet LXIV express?", "options": [{"text": "The speaker loves the beloved but also resents him", "isCorrect": false, "rationale": "There is no resentment; the paradox is about possessing what one must lose."}, {"text": "The speaker weeps to possess the beloved because possessing him makes the feared future loss more painful", "isCorrect": true, "rationale": "The thought of losing the beloved is “as a death”; the speaker weeps “to have, that which it fears to lose” — having means the loss will be devastating."}, {"text": "Writing about ruin causes the speaker to feel ruined himself", "isCorrect": false, "rationale": "While the speaker is deeply affected, the paradox is specifically about having and losing, not about writing causing ruin."}, {"text": "Beauty is most admired at the moment it is destroyed", "isCorrect": false, "rationale": "The couplet focuses on the speaker’s emotional state, not on beauty’s aesthetic peak."}]}, {"question": "What does “brass eternal slave to mortal rage” (line 4) mean?", "options": [{"text": "Even brass, supposedly everlasting, is enslaved to the violent destructive power of mortal forces", "isCorrect": true, "rationale": "Brass was considered an enduring metal; calling it “slave to mortal rage” means even the most durable materials are subject to time and human destructive force."}, {"text": "Soldiers made of brass armor serve mortal kings", "isCorrect": false, "rationale": "The image is metaphorical: brass as a symbol of durability, conquered by mortal destructive force."}, {"text": "The speaker is enslaved by his angry passions", "isCorrect": false, "rationale": "The brass refers to durable material, not the speaker’s own emotional state."}, {"text": "Eternal things become furious and destructive over time", "isCorrect": false, "rationale": "Brass is the slave of rage, not itself furious; the rage is mortal and destructive."}]}, {"question": "How does Sonnet LXIV differ from other sonnets in Chapter 7 that promise immortality through verse?", "options": [{"text": "It entirely denies that verse can preserve beauty", "isCorrect": false, "rationale": "Sonnet LXIV is silent on verse as a solution; it offers grief, not denial of verse’s power."}, {"text": "It offers no consolation of verse; it ends only in grief at the prospect of losing the beloved", "isCorrect": true, "rationale": "Unlike Sonnets LXIII or LX, Sonnet LXIV does not close with the promise of poetic immortality; it ends in sorrowful resignation."}, {"text": "It argues that prayer is a better defense than verse against time’s destruction", "isCorrect": false, "rationale": "Prayer is not mentioned; the sonnet ends in lament."}, {"text": "It claims love itself is the only immortal force", "isCorrect": false, "rationale": "No immortal force is identified; the couplet offers only grief."}]}, {"question": "What do “lofty towers” being “down-raz’d” and “brass eternal” enslaved to “mortal rage” have in common?", "options": [{"text": "Both are examples of human vanity", "isCorrect": false, "rationale": "Both are examples of apparently indestructible things being destroyed, not of vanity specifically."}, {"text": "Both represent things once considered indestructible that Time has nevertheless destroyed", "isCorrect": true, "rationale": "Tall towers and brass were symbols of permanence; their destruction proves that nothing is truly immune to time’s destructive power."}, {"text": "Both are associated with military conquest", "isCorrect": false, "rationale": "While there are military connotations, the thematic purpose is to illustrate universal ruin, not specifically military defeat."}, {"text": "Both are owned by the beloved", "isCorrect": false, "rationale": "These are general observations of worldly ruin, not descriptions of the beloved’s possessions."}]}, {"question": "What overall emotional effect does Sonnet LXIV create through its catalog of ruins?", "options": [{"text": "Detached intellectual satisfaction in understanding time’s patterns", "isCorrect": false, "rationale": "The couplet reveals deep personal grief, not detached intellectual satisfaction."}, {"text": "A building sense of dread as each image of ruin leads the speaker closer to the personal terror of losing the beloved", "isCorrect": true, "rationale": "The accumulation of ruins moves from the impersonal (towers, brass, ocean, kingdoms) to the personal conclusion: Time will take my love away."}, {"text": "Comfort in knowing all things eventually return to the earth", "isCorrect": false, "rationale": "The couplet offers no comfort; the speaker weeps at the thought."}, {"text": "Anger at the natural forces that destroy human achievement", "isCorrect": false, "rationale": "The tone is meditative and mournful, not angry."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
