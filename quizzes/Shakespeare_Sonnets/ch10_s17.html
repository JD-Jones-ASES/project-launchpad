<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker's opening declaration in Sonnet CXVI?", "options": [{"text": "That love is the most powerful force in the universe", "isCorrect": false, "rationale": "The opening is a legal and liturgical form — admitting no impediments to the marriage of true minds."}, {"text": "That he will not admit any impediment to the marriage of true minds", "isCorrect": true, "rationale": "'Let me not to the marriage of true minds / Admit impediments' — echoing the marriage service's call for objections."}, {"text": "That his love for the beloved is greater than any other love in history", "isCorrect": false, "rationale": "No comparison with other loves is made; the poem defines the nature of true love universally."}, {"text": "That love cannot exist without constancy", "isCorrect": false, "rationale": "While constancy is central, the opening is the specific declaration about impediments."}], "id": "q01"}, {"question": "How does the speaker define love that is not true love?", "options": [{"text": "Love that is born of physical attraction alone", "isCorrect": false, "rationale": "Physical attraction is not the definition of false love given here."}, {"text": "Love that alters when it finds alteration or bends with the remover to remove", "isCorrect": true, "rationale": "'Love is not love / Which alters when it alteration finds, / Or bends with the remover to remove.'"}, {"text": "Love that is declared loudly but felt shallowly", "isCorrect": false, "rationale": "Loudness vs. sincerity is Sonnet CII's concern; here the test is whether love changes when circumstances change."}, {"text": "Love that relies on the beloved's constant presence", "isCorrect": false, "rationale": "Presence vs. absence is not the definition of false love given here."}], "id": "q02"}, {"question": "What is an 'ever-fixed mark'?", "options": [{"text": "A gravestone with a permanent inscription", "isCorrect": false, "rationale": "A gravestone is fixed but the image refers to a navigational marker."}, {"text": "A fixed navigational point — like a lighthouse or seamark — that does not move despite storms", "isCorrect": true, "rationale": "'O, no! it is an ever-fixed mark, / That looks on tempests and is never shaken' — the 'mark' is a fixed point used in navigation, unmoved by any storm."}, {"text": "A permanent brand or tattoo marking ownership", "isCorrect": false, "rationale": "While 'mark' can mean brand, the nautical context ('tempests,' 'bark,' 'star') makes the navigational reading dominant."}, {"text": "A legal document that cannot be altered once signed", "isCorrect": false, "rationale": "Legal fixity is not the primary image; navigation is."}], "id": "q03"}, {"question": "What star metaphor does the speaker use?", "options": [{"text": "Love is the sun that lights every day with warmth", "isCorrect": false, "rationale": "The sun metaphor is not used; a star serving as guide to wandering ships is."}, {"text": "Love is the star to every wandering bark, whose worth is unknown though its height can be measured", "isCorrect": true, "rationale": "'It is the star to every wandering bark, / Whose worth's unknown, although his height be taken.'"}, {"text": "Love is a falling star — beautiful but brief", "isCorrect": false, "rationale": "The star of love is fixed and permanent, not falling or brief."}, {"text": "Love is the North Star that never moves from its place", "isCorrect": false, "rationale": "The North Star is the likely referent, but the sonnet's own wording describes 'the star to every wandering bark.'"}], "id": "q04"}, {"question": "What does 'whose worth's unknown, although his height be taken' mean about love?", "options": [{"text": "Love's true nature cannot be described even though its effects can be observed", "isCorrect": false, "rationale": "Close, but the specific contrast is between measurable height (altitude for navigation) and immeasurable intrinsic worth."}, {"text": "Love's value cannot be calculated even though its position can be observed and used", "isCorrect": true, "rationale": "A star's height (altitude) can be measured by instruments, but its intrinsic worth or nature remains unknown — so too love's value surpasses all measurement."}, {"text": "The beloved's appearance can be described but his goodness cannot be captured in words", "isCorrect": false, "rationale": "The star metaphor refers to love itself, not specifically to the beloved's qualities."}, {"text": "Love is as distant as the stars and equally difficult to reach", "isCorrect": false, "rationale": "Distance is not the point; the contrast between measurable height and immeasurable worth is."}], "id": "q05"}, {"question": "What does 'Love's not Time's fool' mean?", "options": [{"text": "Love is wiser than Time", "isCorrect": false, "rationale": "The statement is not about comparative wisdom but about love's immunity to Time's destructive power."}, {"text": "Love is not subject to Time's power, though beauty is", "isCorrect": true, "rationale": "'Love's not Time's fool, though rosy lips and cheeks / Within his bending sickle's compass come' — Time destroys beauty but cannot destroy true love."}, {"text": "Love is a jester who mocks Time", "isCorrect": false, "rationale": "Love is not a jester; 'fool' here means plaything or victim."}, {"text": "Time is foolish to think it can destroy love", "isCorrect": false, "rationale": "The poem does not personify Time as foolish; it declares love immune to Time's usual power."}], "id": "q06"}, {"question": "What does 'bears it out even to the edge of doom' mean?", "options": [{"text": "Love endures until the very moment of final Judgment", "isCorrect": true, "rationale": "'Doom' means the Last Judgment in early modern English; 'edge of doom' means the very end of time. Love persists until that ultimate boundary."}, {"text": "Love eventually reaches a point of collapse and destruction", "isCorrect": false, "rationale": "The phrase means the opposite: love holds out to the very end, it does not collapse."}, {"text": "Love carries its burden even when things look most hopeless", "isCorrect": false, "rationale": "While fortitude is implied, 'edge of doom' specifically refers to the eschatological end of all things, not merely a difficult moment."}, {"text": "Love bears the weight of sadness throughout life", "isCorrect": false, "rationale": "'Doom' is not general sadness but the final Judgment; the temporal scope is cosmic."}], "id": "q07"}, {"question": "What is the logical form of the poem's argument in the couplet?", "options": [{"text": "A conditional vow: if the poem's claims are wrong, the speaker has never written and no man has ever loved", "isCorrect": true, "rationale": "'If this be error and upon me prov'd, / I never writ, nor no man ever lov'd' — the speaker bets the truth of all poetry and all love on his definition.'"}, {"text": "A prayer asking love to remain constant", "isCorrect": false, "rationale": "The couplet is a logical wager or proof by contradiction, not a prayer."}, {"text": "A warning to the beloved not to alter", "isCorrect": false, "rationale": "The couplet addresses the reader-as-judge, not the beloved."}, {"text": "A confession that love has sometimes failed to be constant", "isCorrect": false, "rationale": "No confession of failure appears; the couplet is a confident logical challenge."}], "id": "q08"}, {"question": "Which of the following best describes the sonnet's overall rhetorical structure?", "options": [{"text": "Complaint, concession, resolution", "isCorrect": false, "rationale": "There is no complaint or concession; the poem is entirely affirmative and definitional."}, {"text": "Definition, elaboration through images, and logical proof by challenge", "isCorrect": true, "rationale": "The poem defines true love (quatrain 1), elaborates it through navigational/astronomical images (quatrains 2–3), and ends with a wager that defies anyone to prove it wrong."}, {"text": "Question, possible answers, and selected answer", "isCorrect": false, "rationale": "That is the structure of Sonnet CXIV; CXVI proceeds from confident assertion, not from a question."}, {"text": "Address to the Muse, commission, and fulfillment", "isCorrect": false, "rationale": "The Muse structure belongs to Sonnets C–CII; CXVI makes no address to a Muse."}], "id": "q09"}, {"question": "Why is Sonnet CXVI considered one of the most famous definitions of love in English literature?", "options": [{"text": "Because it uses more similes than any other Shakespeare sonnet", "isCorrect": false, "rationale": "CXVI is not distinguished by a particularly high count of similes; its fame comes from the clarity and authority of its argument."}, {"text": "Because it defines love not by what it is but by what it cannot be moved by, and challenges anyone to refute it", "isCorrect": true, "rationale": "The negative definition (love is NOT what alters, NOT Time's fool) combined with the bold logical wager in the couplet gives the poem its definitive, universal quality."}, {"text": "Because it describes the beloved more precisely than any other sonnet", "isCorrect": false, "rationale": "The beloved is barely individualized; CXVI is about the nature of love itself, not a specific person."}, {"text": "Because it was the first sonnet to use the marriage service as a structural model", "isCorrect": false, "rationale": "The marriage service echo is a notable feature, but the poem's fame rests on the power of its entire argument, not on this structural choice alone."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
