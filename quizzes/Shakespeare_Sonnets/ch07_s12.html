    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker’s opening argument in Sonnet LXX?", "options": [{"text": "That the beloved is genuinely guilty and deserves criticism", "isCorrect": false, "rationale": "The speaker defends the beloved, arguing that blame does not indicate true fault."}, {"text": "That being blamed or slandered is not a defect but rather a sign of the beloved’s worth", "isCorrect": true, "rationale": "Lines 1–2: “That thou art blam’d shall not be thy defect, / For slander’s mark was ever yet the fair.” The beautiful are always targets of slander."}, {"text": "That the speaker himself is to blame for the beloved’s poor reputation", "isCorrect": false, "rationale": "The speaker does not implicate himself; he defends the beloved."}, {"text": "That both praise and blame are worthless since neither reflects true character", "isCorrect": false, "rationale": "The speaker uses praise and blame to argue the beloved’s worth; both are treated as meaningful."}], "id": "q01"}, {"question": "What does “The ornament of beauty is suspect” (line 3) mean?", "options": [{"text": "Beautiful things are usually hidden and mysterious", "isCorrect": false, "rationale": "“Suspect” means under suspicion, not hidden."}, {"text": "Being beautiful naturally attracts suspicion and envy, making slander an expected ornament of the fair", "isCorrect": true, "rationale": "Slander (“suspect”) is the natural accompanying ornament of beauty, just as jewels accompany a crown."}, {"text": "Beauty should be distrusted because it often conceals wickedness", "isCorrect": false, "rationale": "The speaker’s point is about beauty attracting undeserved suspicion, not that beauty genuinely conceals wickedness."}, {"text": "The beloved’s ornamental clothing is suspicious in its lavishness", "isCorrect": false, "rationale": "The line is about beauty attracting slander, not about the beloved’s clothing."}], "id": "q02"}, {"question": "What does the simile “A crow that flies in heaven’s sweetest air” (line 4) suggest?", "options": [{"text": "Even the beloved, like a crow, can be ugly when seen in the right light", "isCorrect": false, "rationale": "The crow represents slander/suspicion that flies alongside beauty, not the beloved himself being ugly."}, {"text": "Slander (the crow) is a dark presence that accompanies genuine beauty (heaven’s sweetest air)", "isCorrect": true, "rationale": "The crow is a dark, inauspicious bird; even amid the pure sweetest air, it is present. Slander accompanies beauty the same way."}, {"text": "The beloved soars above criticism like a bird in clear skies", "isCorrect": false, "rationale": "The crow is the negative element (slander/suspicion), not the beloved rising above it."}, {"text": "The speaker is comparing the beloved’s voice to a crow’s harsh cry", "isCorrect": false, "rationale": "No voice comparison is made; the crow represents slander, not sound."}], "id": "q03"}, {"question": "What does “canker vice the sweetest buds doth love” (line 9) mean?", "options": [{"text": "Sin is drawn to the innocent and pure, just as canker worms attack the sweetest buds", "isCorrect": true, "rationale": "A canker worm attacks the best flowers; vice (moral corruption) similarly targets the purest and most beautiful, which is why the beloved is especially targeted."}, {"text": "Sweet flowers attract vice because they are morally weak", "isCorrect": false, "rationale": "The sweetness/purity of the bud is not a moral weakness; it is precisely what attracts the canker."}, {"text": "The beloved loves sinful companions", "isCorrect": false, "rationale": "The canker is vice attacking the beloved (the sweet bud), not the beloved seeking out vice."}, {"text": "Corruption develops naturally from within beautiful things", "isCorrect": false, "rationale": "The canker is external — vice attacking from outside, not corruption growing from within."}], "id": "q04"}, {"question": "What does the speaker claim about the beloved’s past behavior in lines 11–12?", "options": [{"text": "The beloved has sinned greatly but has been forgiven", "isCorrect": false, "rationale": "The speaker claims the beloved has been attacked but has either avoided or defeated temptation."}, {"text": "The beloved has passed through the ambushes of youth either unassailed or having conquered the assault", "isCorrect": true, "rationale": "Lines 11–12: “Thou hast passed by the ambush of young days / Either not assail’d, or victor being charg’d.”"}, {"text": "The beloved was assailed by slander in youth and never recovered his reputation", "isCorrect": false, "rationale": "The speaker’s point is that the beloved emerged from youth with his virtue intact."}, {"text": "The beloved chose to remain isolated from temptation rather than overcome it", "isCorrect": false, "rationale": "The alternatives given are “not assailed” or “victor” — both honorable; the speaker does not characterize the beloved as merely avoiding life."}], "id": "q05"}, {"question": "What does the couplet suggest is the remaining problem despite the beloved’s virtue?", "options": [{"text": "The speaker cannot protect the beloved from future slander", "isCorrect": false, "rationale": "The couplet’s concern is structural: the beloved’s praise is not enough to permanently silence envy."}, {"text": "If some suspicion did not shroud the beloved, he would command universal love — but envy is inevitable and cannot be fully silenced", "isCorrect": true, "rationale": "Lines 15–16: “If some suspect of ill mask’d not thy show, / Then thou alone kingdoms of hearts shouldst owe.” Envy is the price of supreme beauty."}, {"text": "The beloved will never achieve political power because of his enemies", "isCorrect": false, "rationale": "“Kingdoms of hearts” is metaphorical: universal love and devotion, not literal political power."}, {"text": "The speaker’s praise will only make the beloved more of a target", "isCorrect": false, "rationale": "The couplet focuses on the beloved’s structural situation (envy of the beautiful), not on the speaker’s role."}], "id": "q06"}, {"question": "How does Sonnet LXX respond to the criticism of the beloved in Sonnet LXIX?", "options": [{"text": "It ignores the criticism and changes the subject entirely", "isCorrect": false, "rationale": "LXX directly addresses and defends against the kind of criticism voiced in LXIX."}, {"text": "It defends the beloved by arguing that slander of the beautiful is inevitable and proves worth, not fault", "isCorrect": true, "rationale": "Where LXIX said the beloved’s odour matches not his show, LXX reframes slander as a mark of beauty’s greatness."}, {"text": "It admits the beloved’s faults and asks for the world’s forgiveness", "isCorrect": false, "rationale": "LXX does not admit fault; it reframes what appears to be fault as inevitably attendant upon beauty."}, {"text": "It argues that the criticism in LXIX was false and cowardly", "isCorrect": false, "rationale": "LXX reframes rather than simply labeling LXIX’s concern as false."}], "id": "q07"}, {"question": "What does “being woo’d of time” (line 8) mean?", "options": [{"text": "The beloved has aged and time has worn him down", "isCorrect": false, "rationale": "The phrase means courted or tempted by the times — by the fashions and temptations of the age."}, {"text": "The beloved has been tempted or courted by the corruptions of the age and emerged with greater worth", "isCorrect": true, "rationale": "“Woo’d of time” means courted or tempted by the age’s vices; slander approves the beloved’s greater worth because he has been tempted and resisted."}, {"text": "The beloved’s beauty grows greater with time", "isCorrect": false, "rationale": "The phrase refers to being courted by temporal corruptions, not to beauty increasing with age."}, {"text": "Time has approved the beloved through long acquaintance", "isCorrect": false, "rationale": "The “woo’ing” is Time’s temptation of the beloved, not Time’s approval."}], "id": "q08"}, {"question": "The phrase “unstained prime” (line 10) refers to:", "options": [{"text": "The beloved’s political innocence in the court", "isCorrect": false, "rationale": "“Prime” means the prime of life/youth; the context is moral purity, not political innocence."}, {"text": "The beloved’s youthful prime that remains morally pure and unstained by vice", "isCorrect": true, "rationale": "“Pure unstained prime” — the beloved’s youthful vitality is unstained by the canker vice that targets such purity."}, {"text": "An unstained white garment the beloved wears", "isCorrect": false, "rationale": "“Prime” means the peak of youth, not clothing."}, {"text": "A first (prime) draft of the poem without corrections", "isCorrect": false, "rationale": "The word is used in the sense of youthful prime, not a first draft."}], "id": "q09"}, {"question": "What is the overall argumentative structure of Sonnet LXX?", "options": [{"text": "Praise, then sudden criticism, then withdrawal of the criticism", "isCorrect": false, "rationale": "The sonnet maintains a consistent defensive argument without sudden criticism."}, {"text": "A sustained defense using three strategies: slander proves beauty, vice attacks the best, and the beloved’s past virtue is on record", "isCorrect": true, "rationale": "The sonnet defends the beloved by: (1) arguing slander marks the beautiful, (2) canker vice attacks the sweetest, (3) the beloved has emerged from youth’s ambushes victorious. The couplet concedes the persistence of envy."}, {"text": "A lament followed by consolation, ending in uncertainty", "isCorrect": false, "rationale": "The structure is argumentative (defense), not elegiac (lament and consolation)."}, {"text": "A meditation on time that ends with the promise of verse", "isCorrect": false, "rationale": "Time’s destructive power is not the subject; the beloved’s reputation is. Verse is not the couplet’s answer."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
