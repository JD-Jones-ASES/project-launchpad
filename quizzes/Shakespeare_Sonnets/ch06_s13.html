<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What claim does the speaker make in the opening lines of Sonnet LV?", "options": [{"text": "The beloved’s own virtue will protect him from the passage of time.", "isCorrect": false, "rationale": "Inner virtue is the concern of Sonnet LIV; here the preserving agent is the verse itself."}, {"text": "This poem will outlast marble monuments and the gilded tombs of princes.", "isCorrect": true, "rationale": "Lines 1–2: “Not marble, nor the gilded monuments / Of princes, shall outlive this powerful rhyme.” The speaker makes a sweeping claim for the permanence of verse over physical structures."}, {"text": "The beloved’s beauty surpasses even the finest monuments of ancient civilization.", "isCorrect": false, "rationale": "The beloved’s beauty is not the comparison; the verse is compared to monuments."}, {"text": "Great statues and monuments have preserved the memory of the beloved already.", "isCorrect": false, "rationale": "The monuments are explicitly contrasted with the poem; they cannot outlast it."}]}, {"question": "The phrase “sluttish time” (line 4) describes time as:", "options": [{"text": "Time moving at an indecently fast pace.", "isCorrect": false, "rationale": "Speed is not the attribute; ‘sluttish’ here means slovenly or dirty."}, {"text": "A slovenly, dirty force that smears filth across stone monuments, obscuring inscriptions.", "isCorrect": true, "rationale": "“Unswept stone, besmear’d with sluttish time” — time is a slovenly housekeeper who lets grime accumulate on stones, eventually obscuring the names and memories inscribed on them."}, {"text": "A morally corrupt force that corrupts the beloved’s virtue.", "isCorrect": false, "rationale": "The beloved’s virtue is not threatened by sluttish time in this poem."}, {"text": "Time that passes slowly and wastes the speaker’s days of separation.", "isCorrect": false, "rationale": "Slowness is not the attribute; the image is of accumulated dirt and neglect."}]}, {"question": "What specific destructive forces does the poem list in lines 5–10?", "options": [{"text": "Flood, plague, and earthquake.", "isCorrect": false, "rationale": "These are not the forces listed; the poem focuses on war and human violence."}, {"text": "Wasteful war, broils (conflicts), Mars’s sword, and war’s quick fire.", "isCorrect": true, "rationale": "Lines 5–10 catalogue war’s destruction: statues overturned, masonry rooted out, Mars’s sword and war’s fire — all forces capable of destroying physical monuments but unable to destroy the poem."}, {"text": "Tides, erosion, frost, and drought.", "isCorrect": false, "rationale": "Natural erosion forces are not listed; the destroyers are all military and martial."}, {"text": "Jealousy, envy, hatred, and time.", "isCorrect": false, "rationale": "Emotional forces are not the list; the destroyers are physical and martial."}]}, {"question": "In line 9, “all-oblivious enmity” means:", "options": [{"text": "Hostility that is not aware of its own existence.", "isCorrect": false, "rationale": "The enmity is not unconscious of itself but actively causes forgetfulness in others."}, {"text": "Enmity that causes all-encompassing oblivion — the force that makes everything forgotten.", "isCorrect": true, "rationale": "“All-oblivious” means causing total oblivion or forgetfulness. Death and its associated forces reduce everything to forgetfulness — but not the beloved preserved in verse."}, {"text": "The enmity felt by all people toward the beloved.", "isCorrect": false, "rationale": "No enmity toward the beloved is described; ‘all-oblivious enmity’ is a cosmic force of forgetting."}, {"text": "The speaker’s forgetfulness of his own grievances against the beloved.", "isCorrect": false, "rationale": "The speaker’s grievances are not the subject; the phrase describes time’s erasure."}]}, {"question": "Where does the volta of Sonnet LV occur?", "options": [{"text": "At line 9, when the speaker shifts from describing what will destroy monuments to how the beloved will survive despite these forces.", "isCorrect": true, "rationale": "After cataloguing war’s destruction (lines 5–8), lines 9–14 pivot to assert that ‘gainst death and oblivion, the beloved will ‘pace forth.’ The turn moves from threat to triumph."}, {"text": "At the couplet, when the speaker addresses the beloved directly.", "isCorrect": false, "rationale": "The beloved is addressed throughout; the most decisive turn comes at line 9, not the couplet."}, {"text": "At line 5, when war is first introduced as a destructive force.", "isCorrect": false, "rationale": "Line 5 introduces new destructive forces but continues the enumeration of threats; the turn is when the beloved’s survival is asserted."}, {"text": "At line 3, when the speaker introduces ‘these contents’ as the preserving agent.", "isCorrect": false, "rationale": "Line 3 elaborates the opening claim rather than marking a turn."}]}, {"question": "The phrase “pace forth” (line 12) conveys:", "options": [{"text": "A desperate sprint to escape destruction.", "isCorrect": false, "rationale": "The movement is dignified and unhurried, not desperate."}, {"text": "A dignified, unhurried forward movement — the beloved stepping through time with authority.", "isCorrect": true, "rationale": "“Pace forth” suggests stately, purposeful movement. The beloved moves through the ages not fleeing but proceeding with calm dignity, outlasting all opposition."}, {"text": "The beloved physically leaving the speaker’s side.", "isCorrect": false, "rationale": "Physical departure is not the meaning; the phrase is about outlasting time and death."}, {"text": "The poem’s own verses marching across the page.", "isCorrect": false, "rationale": "The subject is the beloved, not the poem itself."}]}, {"question": "The phrase “in lovers’ eyes” in the couplet suggests the beloved lives on:", "options": [{"text": "Only in the speaker’s own eyes, since no one else reads the poem.", "isCorrect": false, "rationale": "The phrase anticipates future readers, not just the speaker."}, {"text": "In the eyes of all future readers who, as lovers of beauty and poetry, will encounter the beloved through the verse.", "isCorrect": true, "rationale": "The couplet: “You live in this, and dwell in lovers’ eyes.” The beloved lives in the poem (‘this’) and dwells in the eyes of all future readers who love truly — his survival is both textual and intimate."}, {"text": "In the eyes of art historians who study Renaissance paintings.", "isCorrect": false, "rationale": "No art historians are invoked; ‘lovers’ refers to those who love genuinely."}, {"text": "Only until the last reader of this poem has died.", "isCorrect": false, "rationale": "The poem projects survival ‘to the ending doom’ — final judgment — suggesting virtually permanent survival."}]}, {"question": "The phrase “that wear this world out to the ending doom” means:", "options": [{"text": "Future generations who are worn out by the difficulty of reading the poem.", "isCorrect": false, "rationale": "The difficulty of reading is not the sense; posterity wears out the world, not vice versa."}, {"text": "All future generations who will inhabit the world until the Last Judgment.", "isCorrect": true, "rationale": "“All posterity / That wear this world out to the ending doom” means all the generations that will live until the world’s final end. The beloved will be remembered by all of them."}, {"text": "The enemies who will eventually destroy the poem along with everything else.", "isCorrect": false, "rationale": "The posterity mentioned is the audience that will remember, not the enemy that will destroy."}, {"text": "The effects of weather and erosion on stone monuments.", "isCorrect": false, "rationale": "Erosion is mentioned earlier; this phrase refers to human posterity over time."}]}, {"question": "Sonnet LV belongs to a tradition known as the “exegi monumentum” topos. What does this mean?", "options": [{"text": "A tradition in which poets lament the shortness of life.", "isCorrect": false, "rationale": "The topos is about the poet’s triumph over time, not lamentation."}, {"text": "A classical literary tradition (from Horace) in which a poet claims that his verse will be a monument more lasting than bronze or stone.", "isCorrect": true, "rationale": "Horace’s “Exegi monumentum aere perennius” (“I have erected a monument more lasting than bronze”) is the classical source of this topos. Shakespeare invokes it to claim immortality for the beloved through verse."}, {"text": "A tradition in which poets list all the monuments they have visited.", "isCorrect": false, "rationale": "No sightseeing tradition is involved; the claim is about verse’s superiority to physical monuments."}, {"text": "A type of elegy mourning the death of a patron.", "isCorrect": false, "rationale": "The beloved is not dead; the poem argues for future preservation, not present mourning."}]}, {"question": "What is the tone of Sonnet LV?", "options": [{"text": "Anxious and uncertain, unsure whether the verse will truly last.", "isCorrect": false, "rationale": "The tone is boldly assertive; no uncertainty is expressed."}, {"text": "Triumphant and confident — the speaker makes an unqualified claim for verse’s power over time and death.", "isCorrect": true, "rationale": "There is no hedging in the poem’s claims. “Shall outlive,” “shall burn,” “shall you pace forth” — all are future tense assertions of certainty."}, {"text": "Melancholy, grieving over the destruction time will eventually bring.", "isCorrect": false, "rationale": "Destruction is catalogued only to be overcome; the emotional register is triumph."}, {"text": "Ironic, secretly doubting the claims it makes.", "isCorrect": false, "rationale": "No irony is detectable; the sonnet is one of the most straightforwardly confident in the sequence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
