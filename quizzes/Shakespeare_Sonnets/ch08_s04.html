    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What two possible futures does the speaker contemplate in the opening lines of Sonnet LXXXI?", "options": [{"text": "Either he will win the youth's favor or lose him to the rival forever", "isCorrect": false, "rationale": "The opening contemplates mortality and survival in verse, not competition with a rival for the youth's affection."}, {"text": "Either he will live to write the youth's epitaph, or the youth will outlive the speaker", "isCorrect": true, "rationale": "Lines 1-2 state: 'Or I shall live your epitaph to make, / Or you survive when I in earth am rotten,' presenting two scenarios both of which lead to the youth's immortality through verse."}, {"text": "Either his verse will survive to be read, or it will perish with him", "isCorrect": false, "rationale": "The focus is on the youth's survival and immortality, not primarily on the fate of the verse itself as an artifact."}, {"text": "Either he will be remembered as a great poet, or he will be completely forgotten", "isCorrect": false, "rationale": "The speaker explicitly accepts that he himself will be forgotten; the focus is on the youth's immortality, not the speaker's fame."}], "id": "q01"}, {"question": "What does the speaker say death cannot take from the youth?", "options": [{"text": "The youth's physical beauty", "isCorrect": false, "rationale": "Physical beauty is precisely what death can take; what death cannot remove is the memory preserved in verse."}, {"text": "The youth's memory, preserved from this point forward", "isCorrect": true, "rationale": "Line 3 states: 'From hence your memory death cannot take,' asserting that the verse already written guarantees the youth's memory will survive death."}, {"text": "The youth's reputation for virtue and goodness", "isCorrect": false, "rationale": "While virtue is part of the youth's character, the specific claim here is about memory — the preservation of identity through verse."}, {"text": "The youth's name, which is already carved in stone", "isCorrect": false, "rationale": "The youth's name is preserved through verse, not literal stone; the comparison with stone monuments appears in other sonnets."}], "id": "q02"}, {"question": "In contrast to the youth's immortality, what does the speaker say will happen to himself?", "options": [{"text": "He will be remembered as a minor poet but still celebrated", "isCorrect": false, "rationale": "The speaker makes no such modest claim to minor fame; he states that every part of him will be forgotten."}, {"text": "Each part of him will be forgotten when he is gone", "isCorrect": true, "rationale": "Line 4 states: 'Although in me each part will be forgotten,' accepting total personal oblivion in contrast to the youth's immortality."}, {"text": "His verse will outlive him even if his name does not", "isCorrect": false, "rationale": "The speaker attributes the verse's survival to the youth's immortality, not to his own creative legacy; his own fate is oblivion."}, {"text": "He will be buried with the youth in a shared monument", "isCorrect": false, "rationale": "No shared monument is suggested; the speaker will receive a common grave while the youth is entombed in men's eyes."}], "id": "q03"}, {"question": "What phrase describes the youth's future resting place, contrasting with a 'common grave'?", "options": [{"text": "Entombed in men's eyes", "isCorrect": true, "rationale": "Line 10 states the youth will be 'entombed in men's eyes,' meaning his memory will live in the minds and hearts of future readers, in contrast to the speaker's common grave."}, {"text": "Elevated to the stars above", "isCorrect": false, "rationale": "No stellar imagery appears in this sonnet; the immortality is literary, preserved in verse."}, {"text": "Enshrined in a golden monument", "isCorrect": false, "rationale": "No golden monument is mentioned; it is 'gentle verse' that serves as the youth's monument."}, {"text": "Preserved in the records of noble families", "isCorrect": false, "rationale": "No genealogical records are mentioned; the vehicle of preservation is poetry, specifically 'gentle verse.'"}], "id": "q04"}, {"question": "What does the speaker call his verse in line 11, and what role does it play?", "options": [{"text": "His 'proud verse,' which will establish his fame alongside the youth's", "isCorrect": false, "rationale": "The speaker calls his verse 'gentle,' not 'proud,' and it serves the youth's immortality, not his own."}, {"text": "His 'gentle verse,' which will be the youth's monument", "isCorrect": true, "rationale": "Lines 11-12 state: 'Your monument shall be my gentle verse, / Which eyes not yet created shall o'er-read,' positioning the poem itself as an eternal memorial to the youth."}, {"text": "His 'living verse,' which breathes life into future generations", "isCorrect": false, "rationale": "While the sonnet ends with the image of mouths and breath, the specific term for the verse as monument is 'gentle verse,' not 'living verse.'"}, {"text": "His 'silent verse,' which speaks without words across time", "isCorrect": false, "rationale": "The verse is explicitly vocal in the couplet — it lives in the mouths of men; 'silent' contradicts the poem's final image."}], "id": "q05"}, {"question": "Who will read the speaker's verse in the future, according to line 12?", "options": [{"text": "The youth's own descendants", "isCorrect": false, "rationale": "No mention of the youth having descendants appears; the readers are simply future people not yet born."}, {"text": "Eyes not yet created — future generations not yet born", "isCorrect": true, "rationale": "Line 12 states 'Which eyes not yet created shall o'er-read,' extending the verse's readership infinitely into a future whose inhabitants are not yet alive."}, {"text": "Scholars who will study the speaker's collected works", "isCorrect": false, "rationale": "No reference to scholarly study is made; the readership is simply all future eyes, not specialists."}, {"text": "The rival poet's admirers, who will eventually see the truth", "isCorrect": false, "rationale": "The rival is not mentioned in this sonnet; the focus is on posterity as the ultimate audience."}], "id": "q06"}, {"question": "What will 'tongues to be' do for the youth, according to line 13?", "options": [{"text": "They will translate the verse into foreign languages", "isCorrect": false, "rationale": "Translation is not mentioned; 'rehearse' means to repeat or recite aloud in the sense of continuous commemoration."}, {"text": "Future voices will rehearse (repeat and celebrate) the youth's being", "isCorrect": true, "rationale": "Line 13 reads: 'And tongues to be, your being shall rehearse,' meaning future people will speak the youth's memory aloud, making him perpetually present."}, {"text": "They will correct and improve the speaker's verse for later audiences", "isCorrect": false, "rationale": "No correction of the verse is implied; rehearsing means retelling or repeating the praise as written."}, {"text": "They will add new praises not contained in the original verse", "isCorrect": false, "rationale": "'Rehearse' implies repetition of what already exists in the verse, not addition."}], "id": "q07"}, {"question": "The couplet ends with the image of 'the mouths of men.' What does this emphasize about the youth's immortality?", "options": [{"text": "The youth's words will be quoted back to him by admirers", "isCorrect": false, "rationale": "It is the speaker's verse about the youth that will be spoken, not the youth's own words."}, {"text": "The youth will live most fully where human breath and speech exist — in the mouths of living people who speak the verse", "isCorrect": true, "rationale": "The couplet ends: 'Where breath most breathes, even in the mouths of men,' capturing the paradox that the dead youth will be most alive wherever living voices speak his name in verse."}, {"text": "The youth's fame will depend on gossip and rumor rather than written record", "isCorrect": false, "rationale": "'Mouths of men' here refers to the oral transmission of verse, which is more dignified and lasting than gossip."}, {"text": "The youth's physical breath will be mystically preserved after death", "isCorrect": false, "rationale": "The breath image is metaphorical, referring to speech and life, not to literally preserved exhalations."}], "id": "q08"}, {"question": "How does Sonnet LXXXI fit into the broader Rival Poet sequence?", "options": [{"text": "It directly attacks the rival's claim that his verse will immortalize the youth better", "isCorrect": false, "rationale": "The rival is not mentioned in this sonnet; it focuses entirely on the speaker's verse and the youth's immortality."}, {"text": "It reasserts the speaker's unique power to immortalize the youth, pivoting away from competitive anxiety toward confident poetic self-assertion", "isCorrect": true, "rationale": "After sonnets of self-doubt (LXXX) and deflation of the rival (LXXIX), LXXXI reasserts the speaker's supreme poetic gift: the ability to grant eternal life through verse, regardless of the rival's skill."}, {"text": "It concedes that the rival's verse will ultimately prove more lasting than the speaker's", "isCorrect": false, "rationale": "No such concession is made; the speaker speaks with complete confidence about the immortalizing power of his own verse."}, {"text": "It marks the moment the speaker gives up competing and accepts the youth's loss", "isCorrect": false, "rationale": "There is no resignation or acceptance of loss; the tone is confident and even triumphant about the power of verse."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
