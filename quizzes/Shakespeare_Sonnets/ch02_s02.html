<script>
var QUESTIONS = [{"question": "In which century and location was the sonnet first clearly identifiable as a distinct form?", "options": [{"text": "Fourteenth-century Florence under the Medici", "isCorrect": false, "rationale": "Florence became important to sonnet history through Petrarch and Dante, but the form originated earlier — in thirteenth-century Sicily, not fourteenth-century Florence."}, {"text": "Thirteenth-century Sicily in the court of Holy Roman Emperor Frederick II", "isCorrect": true, "rationale": "The sonnet was invented (or first clearly identifiable) around the 1230s in the court of Holy Roman Emperor Frederick II in Sicily — the earliest documented location of the form."}, {"text": "Sixteenth-century England at the court of Henry VIII", "isCorrect": false, "rationale": "The sonnet arrived in England in the sixteenth century, but it originated much earlier in thirteenth-century Sicily."}, {"text": "Twelfth-century France among the Provencal troubadours", "isCorrect": false, "rationale": "Provencal troubadour poetry influenced the sonnet's content and conventions, but the sonnet as a distinct form originated in Sicily, not France."}], "id": "q01"}, {"question": "Who is most often credited with inventing the sonnet?", "options": [{"text": "Francesco Petrarch", "isCorrect": false, "rationale": "Petrarch defined and popularized the sonnet for the next four centuries, but the text explicitly states he did not invent it — that credit goes to Giacomo da Lentini."}, {"text": "Dante Alighieri", "isCorrect": false, "rationale": "Dante was a famous sonneteer but is not credited with inventing the form; the text names Giacomo da Lentini as the inventor."}, {"text": "Giacomo da Lentini", "isCorrect": true, "rationale": "Giacomo da Lentini, a notary in Frederick II's Sicilian court, is most often credited with inventing the sonnet, assembling it from the Sicilian strambotto and Provencal troubadour conventions."}, {"text": "Sir Thomas Wyatt", "isCorrect": false, "rationale": "Wyatt introduced the sonnet to England in the sixteenth century; he did not invent it — the form is about three centuries older than Wyatt."}], "id": "q02"}, {"question": "What was Petrarch's Canzoniere, and what made it so influential?", "options": [{"text": "A prose treatise on the theory of love, influential for its philosophical arguments", "isCorrect": false, "rationale": "The Canzoniere is a collection of poems, not a prose treatise; its influence came from its emotional range and the conventions of the love sequence it established."}, {"text": "A collection of 366 poems, overwhelmingly sonnets, that established the conventions of the love sequence for two centuries", "isCorrect": true, "rationale": "Petrarch's Canzoniere (366 poems addressed to Laura) defined the themes, conventions, and emotional register — idealized beloved, suffering lover, blazon, oxymoron — that Renaissance poets across Europe would imitate and rebel against."}, {"text": "An epic poem in twelve books that adapted the classical tradition to Italian verse", "isCorrect": false, "rationale": "The Canzoniere is a lyric collection, not an epic; its genre and conventions are entirely different from classical epic poetry."}, {"text": "A dramatic monologue sequence celebrating a successful courtship and marriage", "isCorrect": false, "rationale": "The Canzoniere depicts frustrated, unrequited love for the unattainable Laura; a happy-marriage conclusion would describe Spenser's Amoretti, not Petrarch's work."}], "id": "q03"}, {"question": "Which 'Petrarchan convention' refers to a catalogue of the beloved's physical perfections?", "options": [{"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe is direct address to an absent person or abstract quality; it is a rhetorical device, not specifically the catalogue of physical description associated with Petrarchan convention."}, {"text": "Oxymoron", "isCorrect": false, "rationale": "Oxymoron captures the lover's contradictory emotional states (e.g., 'I freeze and burn'); it is not the term for cataloguing physical beauty."}, {"text": "Blazon", "isCorrect": true, "rationale": "The blazon is the Petrarchan convention of cataloguing the beloved's physical perfections — her golden hair, bright eyes, rosy cheeks — feature by feature. Shakespeare famously subverted this convention in Sonnet 130."}, {"text": "Volta", "isCorrect": false, "rationale": "The volta is the structural turn in a sonnet's argument; it is a formal device, not a thematic convention for describing the beloved."}], "id": "q04"}, {"question": "Which two English poets introduced the sonnet to England in the sixteenth century?", "options": [{"text": "Philip Sidney and Edmund Spenser", "isCorrect": false, "rationale": "Sidney and Spenser were major figures in the Elizabethan sonnet craze of the 1580s–1590s, but the form was introduced to England earlier by Wyatt and Surrey."}, {"text": "Sir Thomas Wyatt and Henry Howard, Earl of Surrey", "isCorrect": true, "rationale": "Wyatt and Surrey encountered the Italian sonnet during diplomatic visits to Italy, translated and adapted it for English, and their work was posthumously published in Tottel's Miscellany (1557), introducing the sonnet to a wide English readership."}, {"text": "Samuel Daniel and Michael Drayton", "isCorrect": false, "rationale": "Daniel and Drayton were Elizabethan sonneteers who participated in the 1590s craze; they came after the sonnet was already established in English by Wyatt and Surrey."}, {"text": "John Milton and William Wordsworth", "isCorrect": false, "rationale": "Milton and Wordsworth wrote important sonnets but in later centuries — the seventeenth and nineteenth respectively — long after the form arrived in England."}], "id": "q05"}, {"question": "What was the name of the anthology that published Wyatt and Surrey's work and sparked wide English interest in the sonnet?", "options": [{"text": "England's Helicon", "isCorrect": false, "rationale": "England's Helicon (1600) is a different Elizabethan anthology; the collection that introduced Wyatt and Surrey's sonnets to a broad readership was Tottel's Miscellany."}, {"text": "The Phoenix Nest", "isCorrect": false, "rationale": "The Phoenix Nest (1593) is another Elizabethan anthology; it postdates the Miscellany by more than three decades and did not introduce the sonnet to England."}, {"text": "Songes and Sonettes (Tottel's Miscellany)", "isCorrect": true, "rationale": "Richard Tottel's Songes and Sonettes (1557), commonly known as Tottel's Miscellany, published Wyatt and Surrey's work posthumously and introduced the sonnet to a wide English readership, sparking the vogue that followed."}, {"text": "The Passionate Pilgrim", "isCorrect": false, "rationale": "The Passionate Pilgrim (1599) is a later anthology that included some poems attributed (controversially) to Shakespeare; it did not introduce the sonnet to England."}], "id": "q06"}, {"question": "What event in 1591 triggered the Elizabethan sonnet craze of the 1590s?", "options": [{"text": "The publication of Edmund Spenser's The Faerie Queene", "isCorrect": false, "rationale": "The Faerie Queene (1590) was an epic poem, not a sonnet sequence; the sonnet craze was triggered by the posthumous publication of Sidney's sonnet sequence."}, {"text": "The posthumous publication of Sir Philip Sidney's sonnet sequence", "isCorrect": true, "rationale": "The posthumous publication in 1591 of Sidney's sequence (108 sonnets to 'Stella') electrified the literary world with its psychological realism and ironic self-awareness, launching a flood of imitative sequences."}, {"text": "Shakespeare's first performance at the Globe Theatre", "isCorrect": false, "rationale": "The Globe Theatre was not built until 1599; it played no role in triggering the 1591 sonnet craze."}, {"text": "Queen Elizabeth I's personal endorsement of the sonnet form", "isCorrect": false, "rationale": "No such royal endorsement is mentioned in the text; the craze was triggered by Sidney's publication, not a royal decree."}], "id": "q07"}, {"question": "How did Edmund Spenser's Amoretti break with Petrarchan convention?", "options": [{"text": "It addressed its sonnets to a man rather than a woman", "isCorrect": false, "rationale": "Addressing sonnets to a man was Shakespeare's innovation; Spenser's Amoretti is addressed to a woman."}, {"text": "It traced a courtship that ends in happy marriage rather than unrequited or frustrated love", "isCorrect": true, "rationale": "Spenser's Amoretti (1595) broke sharply from the Petrarchan convention by tracing a courtship that concludes in happy marriage — an unusually optimistic departure from the tradition of suffering, unrequited devotion."}, {"text": "It abandoned the sonnet form entirely in favor of longer lyric poems", "isCorrect": false, "rationale": "Amoretti is a sonnet sequence; it uses Spenser's own variation of the sonnet form and does not abandon the form."}, {"text": "It satirized Petrarchan conventions through comic anti-blazon descriptions", "isCorrect": false, "rationale": "Anti-blazon satire is associated with Shakespeare's Sonnet 130; Spenser's innovation was the happy-marriage conclusion, not comic deflation of the beloved's beauty."}], "id": "q08"}, {"question": "What were Shakespeare's two major innovations when he published his sonnet sequence in 1609?", "options": [{"text": "He used the Petrarchan structure and addressed his poems to an idealized, unattainable woman", "isCorrect": false, "rationale": "Shakespeare used the English (Shakespearean) structure, not Petrarchan; and his Dark Lady is explicitly the opposite of idealized and unattainable."}, {"text": "He addressed the first 126 sonnets to a young man, and used the closing couplet as a structural weapon rather than a grace note", "isCorrect": true, "rationale": "Shakespeare upended convention by addressing his first 126 sonnets to the Fair Youth (a young man) instead of a woman, and he transformed the couplet from a mere summary into a structural masterstroke — reversing, undercutting, or paradoxically intensifying the three quatrains."}, {"text": "He invented iambic pentameter and the three-quatrain structure", "isCorrect": false, "rationale": "Iambic pentameter was introduced to English verse by Surrey; the three-quatrain structure was already established before Shakespeare. These were not his innovations."}, {"text": "He was the first English poet to write a sonnet sequence and the first to be published", "isCorrect": false, "rationale": "Sidney, Spenser, Daniel, and Drayton all published sonnet sequences before Shakespeare; he came to the form later than most of his contemporaries."}], "id": "q09"}, {"question": "Who revived the sonnet for serious English poetry in the seventeenth century, expanding its subject matter beyond love lyric?", "options": [{"text": "Andrew Marvell", "isCorrect": false, "rationale": "Marvell wrote notable lyric poems but is not identified in the text as the figure who revived the serious sonnet after Shakespeare."}, {"text": "John Milton", "isCorrect": true, "rationale": "Milton revived the sonnet for serious English poetry, writing on civic and personal themes — his blindness, the death of a friend, the English Civil War — that expanded the form well beyond love lyric into public and devotional territory."}, {"text": "Ben Jonson", "isCorrect": false, "rationale": "Ben Jonson was a major Jacobean playwright and poet but is not identified in the text as the figure who revived the sonnet in the seventeenth century."}, {"text": "John Donne", "isCorrect": false, "rationale": "Donne wrote religious sonnets (the Holy Sonnets) but is not the figure the text credits with reviving the sonnet after Shakespeare's relative neglect in the seventeenth century."}], "id": "q10"}, {"question": "William Wordsworth wrote that 'with this key / Shakespeare unlocked his heart.' What did he mean, and what effect did this view have?", "options": [{"text": "He meant Shakespeare used the sonnet as a key to decode earlier Italian poetry; this sparked interest in Petrarch", "isCorrect": false, "rationale": "Wordsworth's phrase refers to personal self-revelation, not to decoding Italian poetry; the effect the text describes is biographical interpretation of Shakespeare, not renewed interest in Petrarch."}, {"text": "He meant the sonnets were autobiographical self-revelations; this influenced a century of biographical interpretation", "isCorrect": true, "rationale": "Wordsworth read the sonnets as Shakespeare's personal confessions — 'unlocking his heart' — a reading that drove a century of attempts to identify the real Fair Youth, Dark Lady, and Rival Poet behind the sequence."}, {"text": "He meant Shakespeare's formal innovations unlocked new possibilities for the sonnet; this inspired Romantic experimentation", "isCorrect": false, "rationale": "While the Romantics did experiment with the form, the specific phrase 'unlocked his heart' refers to personal revelation and biographical reading, not formal innovation."}, {"text": "He meant Shakespeare's sonnets were the key to understanding all of his plays; this launched a new approach to dramatic criticism", "isCorrect": false, "rationale": "Wordsworth's remark is about personal emotional confession in the sonnets, not about unlocking the plays; the influence described is on sonnet biography, not dramatic criticism."}], "id": "q11"}, {"question": "Which poet brought feminine subjectivity to the sonnet form in the Victorian era with the collection Sonnets from the Portuguese?", "options": [{"text": "Christina Rossetti", "isCorrect": false, "rationale": "Christina Rossetti wrote important Victorian religious and lyric poetry but is not the author of Sonnets from the Portuguese; that collection belongs to Elizabeth Barrett Browning."}, {"text": "Emily Dickinson", "isCorrect": false, "rationale": "Dickinson's distinctive slant-rhyme lyric form is entirely different from the sonnet; she did not write Sonnets from the Portuguese."}, {"text": "Elizabeth Barrett Browning", "isCorrect": true, "rationale": "Elizabeth Barrett Browning's Sonnets from the Portuguese (1850) — including 'How do I love thee? Let me count the ways' — brought a distinctly feminine subjectivity to the traditionally male-voiced sonnet sequence."}, {"text": "George Eliot", "isCorrect": false, "rationale": "George Eliot was primarily a novelist; she did not write Sonnets from the Portuguese."}], "id": "q12"}, {"question": "The text argues that the sonnet has survived for more than seven hundred years because it solves a 'perennial' human problem. What is that problem?", "options": [{"text": "How to translate emotional experience into visual imagery without losing precision", "isCorrect": false, "rationale": "While imagery is important to the sonnet, the text frames the perennial problem differently — as a challenge of thinking and feeling simultaneously within strict limits."}, {"text": "How to think carefully about something you feel deeply in a space too small for rambling", "isCorrect": true, "rationale": "The text states explicitly: 'the problem it was designed to solve — how to think carefully about something you feel deeply, in a space too small for rambling — is a perennial one.' The sonnet's constraint forces precision of both thought and feeling."}, {"text": "How to preserve the memory of a beloved person against the ravages of time", "isCorrect": false, "rationale": "Time and memory are major themes within the sonnet tradition, but the text describes the form's perennial value in broader terms — thinking carefully about deep feeling — not specifically as memorial preservation."}, {"text": "How to write in a language with too few rhymes for strict formal verse", "isCorrect": false, "rationale": "The scarcity of English rhymes was a practical challenge that led to the Shakespearean form, but the text does not identify this as the perennial human problem that explains the sonnet's survival."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
