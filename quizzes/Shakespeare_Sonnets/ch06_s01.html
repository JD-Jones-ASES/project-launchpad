<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradox opens Sonnet XLIII?", "options": [{"text": "The speaker sees best when his eyes are open in daylight.", "isCorrect": false, "rationale": "The sonnet argues the opposite — daylight brings nothing worth seeing."}, {"text": "The speaker sees best when he is asleep and his eyes are shut.", "isCorrect": true, "rationale": "The opening line, “When most I wink, then do mine eyes best see,” establishes the central paradox that closed eyes during sleep provide the clearest vision."}, {"text": "The speaker sees the beloved only in painted portraits.", "isCorrect": false, "rationale": "Portraits are a concern of later sonnets; here the vision is in dreams."}, {"text": "The speaker is blind and cannot see the beloved at all.", "isCorrect": false, "rationale": "The speaker is not blind; he simply finds daytime sight inferior to dream-sight."}]}, {"question": "What does the phrase “darkly bright” illustrate?", "options": [{"text": "The candle the speaker uses to read at night.", "isCorrect": false, "rationale": "No candle is mentioned; the phrase is about the paradox of bright vision in darkness."}, {"text": "The gloomy mood that overcomes the speaker each evening.", "isCorrect": false, "rationale": "Mood is not the subject; the phrase describes the quality of dream-vision."}, {"text": "An oxymoron showing that darkness becomes luminous when the beloved appears in dreams.", "isCorrect": true, "rationale": "“Darkly bright, are bright in dark directed” uses oxymoron to capture how the beloved’s image illuminates the darkness of sleep."}, {"text": "The sun’s appearance at dawn as the speaker wakes.", "isCorrect": false, "rationale": "Dawn would end the dream; the phrase refers to the dream state itself."}]}, {"question": "In line 7, what does “thy much clearer light” refer to?", "options": [{"text": "The brightness of the sun on a clear summer day.", "isCorrect": false, "rationale": "The sun is used as a comparison, not the referent; the clearer light belongs to the beloved."}, {"text": "The beloved’s actual physical radiance, imagined to surpass even the clear day.", "isCorrect": true, "rationale": "The speaker argues that if the beloved’s mere shadow illuminates sleep, his real presence would outshine the day itself."}, {"text": "The lamp the speaker carries while traveling.", "isCorrect": false, "rationale": "No lamp appears; the imagery is about inner radiance."}, {"text": "The brightness of the paper on which the poem is written.", "isCorrect": false, "rationale": "The poem does not refer to the act of writing here."}]}, {"question": "The word “unrespected” in line 4 most nearly means:", "options": [{"text": "Disrespected and insulted.", "isCorrect": false, "rationale": "“Unrespected” here carries the older sense of ‘not regarded’ or ‘not noticed,’ not of active disrespect."}, {"text": "Not noticed or regarded; passed over without attention.", "isCorrect": true, "rationale": "In Elizabethan usage “unrespected” means ‘unheeded’ or ‘unnoticed.’ The speaker looks at everything during the day but finds nothing worthy of attention."}, {"text": "Respected and honored by all observers.", "isCorrect": false, "rationale": "This is the opposite of the word’s meaning in context."}, {"text": "Hidden and locked away from sight.", "isCorrect": false, "rationale": "Concealment is not the sense; the objects are simply overlooked."}]}, {"question": "What literary device is “thy shadow's form form happy show” an example of?", "options": [{"text": "Alliteration — repetition of initial consonant sounds.", "isCorrect": false, "rationale": "While some alliteration exists in the poem, this line is noted for repeating the same word in different grammatical roles."}, {"text": "Antanaclasis — the same word repeated in different senses.", "isCorrect": true, "rationale": "The word “form” appears twice: first as a noun (the real form of the shadow) and second as a verb (to form or create a show). This wordplay on a single repeated word is antanaclasis."}, {"text": "Simile — a comparison using ‘like’ or ‘as.’", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ comparison is present in this line."}, {"text": "Personification — giving human traits to an abstract idea.", "isCorrect": false, "rationale": "Personification is not the primary device at work in this particular repetition."}]}, {"question": "The phrase “sightless eyes” in line 14 is best described as:", "options": [{"text": "A simile comparing the eyes to windows.", "isCorrect": false, "rationale": "No comparison with ‘like’ or ‘as’ is made; the phrase is a direct contradiction."}, {"text": "An oxymoron emphasizing that sleep renders eyes unable to see even as they receive the beloved’s image.", "isCorrect": true, "rationale": "“Sightless eyes” combines contradictory terms — eyes that cannot see — to stress the paradox that the beloved appears to eyes closed in sleep."}, {"text": "A metaphor for the speaker’s moral blindness.", "isCorrect": false, "rationale": "No moral failing is implied; the blindness is the literal closure of sleep."}, {"text": "Hyperbole for the intensity of the speaker’s grief.", "isCorrect": false, "rationale": "The phrase is an oxymoron tied to the dream paradox, not an exaggeration of grief."}]}, {"question": "Where does the volta of Sonnet XLIII occur?", "options": [{"text": "At line 5, when the speaker shifts to address the beloved directly.", "isCorrect": false, "rationale": "Line 5 continues the elaboration of the dream vision rather than signaling a decisive turn."}, {"text": "At line 9, where the speaker asks how much more blessed daylight sight of the beloved would be.", "isCorrect": false, "rationale": "Line 9 continues the hypothetical question begun in lines 7–8 and does not mark the sharpest turn."}, {"text": "At the couplet (lines 15–16), where the speaker reverses day and night entirely.", "isCorrect": true, "rationale": "The closing couplet delivers the logical reversal: days are as dark as nights without the beloved, while nights become bright days when dreams show him. This is the poem’s conclusive turn."}, {"text": "At line 3, where the speaker introduces the dream for the first time.", "isCorrect": false, "rationale": "Line 3 introduces the premise but does not mark a reversal or turn."}]}, {"question": "What is the primary theme of Sonnet XLIII?", "options": [{"text": "The passage of time and the aging of the beloved.", "isCorrect": false, "rationale": "Aging is a theme of other sonnets; XLIII focuses on vision and separation."}, {"text": "The power of imagination and dreams to compensate for the beloved’s physical absence.", "isCorrect": true, "rationale": "The sonnet argues that the mind’s eye during sleep offers a truer, brighter image of the beloved than waking sight offers of anything else, making absence partly bearable through dreams."}, {"text": "The inadequacy of poetry to capture the beloved’s beauty.", "isCorrect": false, "rationale": "The poem’s concern is sight and dreaming, not the limitations of verse."}, {"text": "Jealousy over the beloved’s interaction with others.", "isCorrect": false, "rationale": "Jealousy is not raised; the emotion is longing, not jealousy."}]}, {"question": "In the couplet, days are compared to nights because:", "options": [{"text": "The speaker works only at night and sleeps during the day.", "isCorrect": false, "rationale": "The schedule of work is irrelevant; the comparison is about value, not hours."}, {"text": "Without sight of the beloved, waking hours feel as dark and purposeless as night, while dream-filled nights feel bright.", "isCorrect": true, "rationale": "The couplet inverts the conventional association of day with light and night with darkness, anchoring both to the presence or absence of the beloved."}, {"text": "The beloved travels by night and hides during the day.", "isCorrect": false, "rationale": "No travel itinerary for the beloved is given; the reversal is about the speaker’s perception."}, {"text": "The speaker prefers nighttime activities such as feasting and dancing.", "isCorrect": false, "rationale": "No feasting or dancing appears; the inversion is entirely about longing."}]}, {"question": "The repeated use of “bright” and “dark” throughout the poem creates what overall effect?", "options": [{"text": "It establishes a gloomy, hopeless atmosphere of despair.", "isCorrect": false, "rationale": "The mood is one of wistful longing, not hopelessness; the brightness associated with the beloved is consistently positive."}, {"text": "It reinforces the central paradox that spiritual or imaginative vision transcends physical sight.", "isCorrect": true, "rationale": "The interplay of brightness and darkness throughout underscores that the beloved’s image brings light even into the literal darkness of sleep, elevating inner vision above outer sight."}, {"text": "It signals the approach of the beloved’s actual visit.", "isCorrect": false, "rationale": "The poem offers no indication that the beloved is returning; the brightness is imagined."}, {"text": "It is purely decorative wordplay with no thematic function.", "isCorrect": false, "rationale": "The light/dark imagery is structurally central to the paradox the sonnet builds."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
