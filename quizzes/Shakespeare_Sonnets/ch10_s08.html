<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker say cannot control the lease of his true love?", "options": [{"text": "The passage of three years", "isCorrect": false, "rationale": "Three years is Sonnet CIV's concern; here the focus is on prophecy and public events."}, {"text": "His own fears and the prophetic soul of the wide world", "isCorrect": true, "rationale": "'Not mine own fears, nor the prophetic soul / Of the wide world dreaming on things to come, / Can yet the lease of my true love control.'"}, {"text": "His Muse's negligence", "isCorrect": false, "rationale": "The Muse's neglect is Sonnets C–CI's concern; this poem addresses historical and cosmic forces."}, {"text": "The inconstancy of the beloved", "isCorrect": false, "rationale": "The beloved's constancy is not challenged here; external threats to the relationship are addressed."}], "id": "q01"}, {"question": "What event is most commonly associated with 'the mortal moon hath her eclipse endur'd'?", "options": [{"text": "A literal lunar eclipse visible from London", "isCorrect": false, "rationale": "The phrase is widely read as allegorical rather than purely astronomical."}, {"text": "Queen Elizabeth I's death or survival of a crisis (most scholars link it to her reign)", "isCorrect": true, "rationale": "The 'mortal moon' is often interpreted as Elizabeth I — either surviving a crisis or dying — with the 'eclipse' representing that defining moment."}, {"text": "The defeat of the Spanish Armada", "isCorrect": false, "rationale": "The Armada (1588) is one reading, but the broader scholarly debate centers on Elizabeth's reign and death in 1603."}, {"text": "A storm at sea that threatened the poet's ship", "isCorrect": false, "rationale": "There is no nautical personal danger in the poem; the reference is politically allegorical."}], "id": "q02"}, {"question": "What happens to the predictions of sad augurs after the eclipse?", "options": [{"text": "They are confirmed and celebrated", "isCorrect": false, "rationale": "The augurs' predictions are mocked — they got it wrong."}, {"text": "They are mocked by their own false prophecy", "isCorrect": true, "rationale": "'The sad augurs mock their own presage' — the doom-prophets' predictions did not come to pass."}, {"text": "They are replaced by new, hopeful prophecies", "isCorrect": false, "rationale": "The augurs are not replaced; they are simply shown to have been wrong."}, {"text": "They cause widespread panic in the city", "isCorrect": false, "rationale": "No panic is described; the poem celebrates the failure of the dire predictions."}], "id": "q03"}, {"question": "What symbol does the speaker use to represent the new era of peace?", "options": [{"text": "A golden crown", "isCorrect": false, "rationale": "A crown is not the peace symbol used here."}, {"text": "Olives of endless age", "isCorrect": true, "rationale": "'Peace proclaims olives of endless age' — the olive branch is the classical symbol of peace."}, {"text": "A white dove", "isCorrect": false, "rationale": "A dove is a peace symbol but it is not mentioned in the poem."}, {"text": "A rainbow after the storm", "isCorrect": false, "rationale": "No rainbow imagery appears; the olive is the classical peace emblem used."}], "id": "q04"}, {"question": "What does the speaker say will outlast tyrants' tombs?", "options": [{"text": "The beloved's beauty", "isCorrect": false, "rationale": "The beloved's beauty is not what the couplet specifically claims will outlast tombs."}, {"text": "This poem (rime), which will serve as the beloved's monument", "isCorrect": true, "rationale": "'And thou in this shalt find thy monument, / When tyrants' crests and tombs of brass are spent.'"}, {"text": "Their love, kept alive in memory", "isCorrect": false, "rationale": "It is specifically the poem ('this') that is called the monument, not love abstractly."}, {"text": "The peace proclaimed after the eclipse", "isCorrect": false, "rationale": "Peace is part of the historical context, not what the couplet identifies as the monument."}], "id": "q05"}, {"question": "What does 'subscribes' mean in 'Death to me subscribes'?", "options": [{"text": "Death writes the speaker's name in a death register", "isCorrect": false, "rationale": "While subscription involves writing, the meaning here is surrender or submission, not registration."}, {"text": "Death submits or yields to the speaker", "isCorrect": true, "rationale": "In early modern English, 'subscribes' can mean yields or surrenders; Death yields to the poet's defiance through verse."}, {"text": "Death agrees to a contract with the speaker", "isCorrect": false, "rationale": "A legal contract is not the implication; submission is."}, {"text": "Death signs a peace treaty with the beloved", "isCorrect": false, "rationale": "The relationship is between the speaker and Death, not the beloved and Death."}], "id": "q06"}, {"question": "How does the poem's opening move from private fear to public celebration?", "options": [{"text": "It begins with the speaker's individual love and ends with national politics", "isCorrect": false, "rationale": "The movement is the reverse: it begins with cosmic/political events and ends with personal poetic immortality."}, {"text": "It begins with cosmic prophecy and doubt, then confirms love's survival through a changed historical moment", "isCorrect": true, "rationale": "The poem opens with fears and prophecies, moves through a public historical turning point (the eclipse, peace), and concludes that love and verse survive all upheaval."}, {"text": "It moves from praise of the beloved to criticism of tyrants", "isCorrect": false, "rationale": "Tyrants are mentioned as a contrast to the monument of verse, not as subjects of extended criticism."}, {"text": "It begins with seasonal imagery and ends with political metaphor", "isCorrect": false, "rationale": "Seasons are not the opening imagery; prophetic doubt and cosmic events are."}], "id": "q07"}, {"question": "What is the tone of Sonnet CVII?", "options": [{"text": "Melancholy and resigned", "isCorrect": false, "rationale": "The tone shifts from anxious to triumphant as the poem progresses."}, {"text": "Confident and triumphant, celebrating love's survival of historical crisis", "isCorrect": true, "rationale": "After acknowledging fears and dark prophecies, the speaker celebrates their failure and the survival of love and verse."}, {"text": "Bitterly satirical toward political power", "isCorrect": false, "rationale": "Tyrants are briefly mentioned but satire is not the dominant mode."}, {"text": "Quietly elegiac for lost beauty", "isCorrect": false, "rationale": "No beauty is mourned; the poem celebrates persistence and survival."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
