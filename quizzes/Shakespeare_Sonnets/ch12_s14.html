<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXL</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker's main request at the opening of Sonnet CXL?", "options": [{"text": "That the mistress love him faithfully", "isCorrect": false, "rationale": "He asks not for faithfulness but for managed cruelty — she should be wise enough not to push him to despair."}, {"text": "That she be wise in her cruelty and not press his patience with too much disdain", "isCorrect": true, "rationale": "'Be wise as thou art cruel; do not press / My tongue-tied patience with too much disdain' — he asks for a limit on the disdain, not because he expects love, but because if pushed too far, he may speak out in a way that harms them both."}, {"text": "That she tell him the truth about her other lovers", "isCorrect": false, "rationale": "Truth-telling was the request of CXXXIX; CXL asks for strategic moderation."}, {"text": "That she stop using her eyes to wound him", "isCorrect": false, "rationale": "The eye vs. tongue motif appeared in CXXXIX; CXL focuses on the danger of his own eventual speech."}]}, {"question": "What does 'lest sorrow lend me words' mean?", "options": [{"text": "That grief makes him more poetically creative", "isCorrect": false, "rationale": "Sorrow lending words is presented as a dangerous outcome, not a creative one."}, {"text": "That if his patience is exhausted by her disdain, sorrow will force words out of him that express the true extent of his pain", "isCorrect": true, "rationale": "His patience is currently 'tongue-tied' — he has been silent. But if she pushes him too far, sorrow will overcome that silence and supply him with words that expose the full nature of his suffering, including things better left unsaid."}, {"text": "That he has been writing poetry about his pain without her knowledge", "isCorrect": false, "rationale": "The concern is about future speech, not current secret writing."}, {"text": "That he is asking her permission to speak freely about his pain", "isCorrect": false, "rationale": "He is warning her of what might happen if she continues, not requesting permission."}]}, {"question": "What does 'the manner of my pity-wanting pain' describe?", "options": [{"text": "A mild, easily-managed heartache", "isCorrect": false, "rationale": "'Pity-wanting' means lacking pity/compassion — the pain is specifically the suffering that gets no mercy from her."}, {"text": "The full nature of his compassionless suffering — pain that receives no pity from her", "isCorrect": true, "rationale": "'Pity-wanting pain' = pain that wants (lacks) pity. If he speaks, his words will reveal how thorough and unrelieved his suffering is — a revelation she might prefer to avoid."}, {"text": "A suffering that makes him feel pitiful and ashamed", "isCorrect": false, "rationale": "The pain wants pity from her, not self-pity in him."}, {"text": "Physical illness brought on by grief", "isCorrect": false, "rationale": "The pain is emotional, not physical illness."}]}, {"question": "What does the speaker suggest would be wiser than honest cruelty — though he does not actually want it?", "options": [{"text": "That she love him completely", "isCorrect": false, "rationale": "He is not expecting love; his suggestion is more pragmatic."}, {"text": "That she pretend to love him, even though she does not — as doctors give dying patients only good news", "isCorrect": true, "rationale": "'Though not to love, yet love to tell me so' — like a dying patient who cannot bear bad news from their physician, he suggests she maintain a fiction of love to preserve his sanity and their mutual safety."}, {"text": "That she be consistently kind in all things", "isCorrect": false, "rationale": "The suggestion is specifically about a strategic lie, not general kindness."}, {"text": "That she leave him entirely so he can recover", "isCorrect": false, "rationale": "Separation is not suggested; strategic pretense is."}]}, {"question": "What is the physician simile in lines 9-10?", "options": [{"text": "The speaker is like a physician diagnosing the mistress's cruelty", "isCorrect": false, "rationale": "The speaker is the patient in this analogy, not the physician."}, {"text": "As a testy dying patient wants only to hear good news from the physician, so the speaker wants a comforting lie rather than honest cruelty", "isCorrect": true, "rationale": "'As testy sick men, when their deaths be near, / No news but health from their physicians know' — a difficult (testy) dying patient is told only good news by the doctor. Similarly, the speaker (near spiritual death from her disdain) asks for the comforting fiction of love."}, {"text": "The mistress is like a physician who has the power to heal or kill", "isCorrect": false, "rationale": "The mistress is implicitly the physician who should prescribe comforting lies, but the simile identifies the patient explicitly as the ill person."}, {"text": "Love is like a doctor prescribing bitter medicine", "isCorrect": false, "rationale": "The simile is about the patient/doctor news dynamic, not medicine."}]}, {"question": "Why would the speaker's despair make him 'grow mad' and speak ill of her?", "options": [{"text": "Because he would become violent", "isCorrect": false, "rationale": "The madness is about uncontrolled speech, not violence."}, {"text": "Because in despair he would lose the tongue-tied patience he has maintained and publicly slander her", "isCorrect": true, "rationale": "'For if I should despair, I should grow mad, / And in my madness might speak ill of thee' — pushed to madness by despair, his controlled silence would break and he would say damaging things about her publicly."}, {"text": "Because madness would make him confuse her with his ideal of beauty", "isCorrect": false, "rationale": "The madness here is about speech control, not perceptual confusion."}, {"text": "Because he would write defamatory poetry about her", "isCorrect": false, "rationale": "While writing is implied, the concern is specifically about spoken words reaching 'mad ears' in the world."}]}, {"question": "What does 'mad slanderers by mad ears believed be' reveal about the world of the sonnet?", "options": [{"text": "That slander is always effective regardless of its source", "isCorrect": false, "rationale": "The line specifically qualifies the risk: 'this ill-wresting world' is in a bad state where mad slander finds believers."}, {"text": "That in a corrupt world where 'ill-wresting' is the norm, even mad slander is believed — making his potential outburst genuinely dangerous", "isCorrect": true, "rationale": "The world is 'grown so bad' and prone to 'ill-wresting' (misinterpreting everything badly) that even mad slander gets believed. So his potential mad speech would damage her reputation in a receptive environment."}, {"text": "That his own sanity would protect him from being believed", "isCorrect": false, "rationale": "The line says mad slanderers ARE believed, not that they are dismissed."}, {"text": "That she has already been slandered and he fears adding to it", "isCorrect": false, "rationale": "The concern is about future potential slander from himself, not pre-existing slander."}]}, {"question": "What does the couplet ask the mistress to do, and why?", "options": [{"text": "To leave him for his own good, since their relationship is destroying them both", "isCorrect": false, "rationale": "He does not ask for separation; he asks for strategic behavioral adjustment."}, {"text": "To keep her eyes aimed straight — even if her proud heart wanders — so that he is not driven to madness and slander", "isCorrect": true, "rationale": "'Bear thine eyes straight, though thy proud heart go wide' — he asks her to control her eyes (not let them stray in his presence) even if her heart does as it pleases, in order to preserve both their reputations from the consequences of his eventual madness."}, {"text": "To love him truly in her heart even if she pretends otherwise", "isCorrect": false, "rationale": "He accepts that her heart may 'go wide' (wander); the request is about the eyes, not the heart."}, {"text": "To admit publicly that she has treated him cruelly", "isCorrect": false, "rationale": "No public admission is requested; the ask is for behavioral restraint."}]}, {"question": "CXL can best be described as what kind of appeal?", "options": [{"text": "A love declaration disguised as a threat", "isCorrect": false, "rationale": "While there is threat, it is self-protective rather than directed at her; and the primary mode is negotiation, not declaration."}, {"text": "A pragmatic, self-interested plea for strategic management of cruelty — to avoid mutual damage", "isCorrect": true, "rationale": "The speaker is not asking for love or even kindness; he is negotiating the terms of her cruelty to keep them both from harm. It is practical, even cynical, in its acceptance of the relationship's dynamics."}, {"text": "A romantic idealization of suffering as a sign of true love", "isCorrect": false, "rationale": "The sonnet is pragmatic rather than idealistic; the speaker is trying to manage pain, not celebrate it."}, {"text": "A formal legal argument for his right to silence", "isCorrect": false, "rationale": "Legal metaphors appear elsewhere in the sequence; CXL's mode is practical negotiation, not legal argument."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
