    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the speaker excuse his horse’s slow pace in Sonnet LI?", "options": [{"text": "He blames the horse’s age and infirmity.", "isCorrect": false, "rationale": "No physical infirmity is mentioned; the excuse is emotional and logical."}, {"text": "He argues that since he is journeying away from the beloved, there is no reason to hurry, so the slow pace is forgivable.", "isCorrect": true, "rationale": "Lines 1–4: his love can excuse the horse because “From where thou art why should I haste me thence? / Till I return, of posting is no need.” Traveling away from joy needs no speed."}, {"text": "He says the horse is saving its strength for the dangerous road ahead.", "isCorrect": false, "rationale": "No danger on the road is mentioned; the logic is purely about the emotional direction of the journey."}, {"text": "He blames himself for giving the horse too little food.", "isCorrect": false, "rationale": "The horse’s feeding is not mentioned; the excuse is logical."}], "id": "q01"}, {"question": "In lines 7–11, the speaker imagines his return. Why can no horse keep pace with his desire?", "options": [{"text": "Because his horse will be exhausted from the outward journey.", "isCorrect": false, "rationale": "Physical exhaustion is not the reason; it is the nature of desire itself."}, {"text": "Because desire, being made of perfect love, moves with a speed beyond any horse — even one mounted on the wind.", "isCorrect": true, "rationale": "Lines 9–11: “Then should I spur, though mounted on the wind, / In winged speed no motion shall I know, / Then can no horse with my desire keep pace.” Desire transcends all physical speed."}, {"text": "Because the roads are too muddy for fast travel.", "isCorrect": false, "rationale": "Road conditions are not the subject; the speed of desire is purely emotional and immaterial."}, {"text": "Because he will stop frequently to write poems along the way.", "isCorrect": false, "rationale": "No such stops are mentioned; the argument is about the supersonic nature of desire."}], "id": "q02"}, {"question": "The phrase “mounted on the wind” (line 9) is an example of:", "options": [{"text": "Alliteration — repetition of the initial sound ‘w.’", "isCorrect": false, "rationale": "While alliteration occurs elsewhere, here the device is hyperbole combined with metaphor."}, {"text": "Hyperbole — an impossible exaggeration to convey the extraordinary speed desire would demand.", "isCorrect": true, "rationale": "To ride the wind is physically impossible; the hyperbole conveys that even the fastest conceivable speed would be insufficient for desire’s urgency."}, {"text": "Personification — giving the wind the ability to carry a rider.", "isCorrect": false, "rationale": "While the image involves the wind carrying a rider, the primary device is hyperbole — the impossibility is the point."}, {"text": "Metonymy — the wind standing for travel generally.", "isCorrect": false, "rationale": "Metonymy substitutes a related term; here the wind is an extreme comparison, not a conventional substitution."}], "id": "q03"}, {"question": "Line 13 states: “desire, of perfect’st love being made, / Shall neigh no dull flesh in his fiery race.” What does this mean?", "options": [{"text": "The speaker’s horse will neigh enthusiastically on the return journey.", "isCorrect": false, "rationale": "The subject is desire, not the horse; the horse is being left behind."}, {"text": "Desire, being made of perfect love and not dull flesh, will not need a horse at all — it will race ahead on its own.", "isCorrect": true, "rationale": "Desire is made of love, not flesh, so it has no use for a horse’s neighing or plodding. The horse (dull flesh) is left behind while desire races ahead like fire."}, {"text": "The speaker plans to sell his horse and buy a faster one.", "isCorrect": false, "rationale": "No horse purchase is planned; the point is that desire transcends horses entirely."}, {"text": "The horse will become excited by the return journey and run faster.", "isCorrect": false, "rationale": "The horse is being dismissed as irrelevant to desire’s speed, not praised for its enthusiasm."}], "id": "q04"}, {"question": "The couplet gives the horse a kind of ironic pardon. What does “give him leave to go” mean?", "options": [{"text": "The speaker orders the horse to run at full gallop.", "isCorrect": false, "rationale": "The opposite — the speaker releases the horse from any obligation to keep up."}, {"text": "The speaker dismisses the horse as irrelevant — desire will run ahead so fast the horse may as well walk.", "isCorrect": true, "rationale": "“Towards thee I’ll run, and give him leave to go” — once desire takes over on the return journey, the horse is superfluous. The speaker generously “releases” the horse because desire needs no animal."}, {"text": "The speaker decides to abandon the horse and travel on foot.", "isCorrect": false, "rationale": "Walking on foot is not the proposed mode; desire itself is the vehicle."}, {"text": "The speaker allows the horse to return home without him.", "isCorrect": false, "rationale": "While superficially plausible, the line is about desire’s speed making the horse unnecessary, not a practical decision to send the horse home."}], "id": "q05"}, {"question": "How does Sonnet LI reverse the emotional logic of Sonnet L?", "options": [{"text": "LI is set in winter while L is set in summer.", "isCorrect": false, "rationale": "Seasons are not used to differentiate the two sonnets."}, {"text": "In L, the speaker journeys away from the beloved so grief lies ahead; in LI, the speaker imagines journeying toward the beloved so desire makes even wind too slow.", "isCorrect": true, "rationale": "L’s journey is outward (grief ahead); LI’s journey is homeward (joy ahead). The horse’s slowness in L mirrors grief; in LI the horse is dismissed because desire outstrips all speed."}, {"text": "L uses legal metaphors while LI uses elemental imagery.", "isCorrect": false, "rationale": "Legal metaphors appear in other sonnets; L and LI are paired by the horse journey, not by contrasting metaphor systems."}, {"text": "L is addressed to the horse; LI is addressed to the beloved.", "isCorrect": false, "rationale": "Both address the beloved or reflect generally; neither is purely addressed to the horse."}], "id": "q06"}, {"question": "The word “jade” in line 14 refers to:", "options": [{"text": "The green gemstone prized by jewelers.", "isCorrect": false, "rationale": "In Elizabethan usage, ‘jade’ as applied to a horse means a worn-out or inferior horse, not the gemstone."}, {"text": "A worn-out or inferior horse, used here affectionately as the speaker finally excuses the beast.", "isCorrect": true, "rationale": "The speaker calls his horse a ‘jade’ — a tired, unremarkable horse — but love excuses it: since it was slow going away from the beloved, desire will make the return so swift that the horse need not hurry."}, {"text": "A type of bridle used to slow a horse.", "isCorrect": false, "rationale": "A jade is an animal, not a piece of tack."}, {"text": "The beloved, referred to with gentle mockery.", "isCorrect": false, "rationale": "The beloved is not called a jade; the word refers to the horse."}], "id": "q07"}, {"question": "The phrase “winged speed no motion shall I know” (line 10) is best understood as:", "options": [{"text": "The speaker wishes he had wings like a bird to fly to the beloved.", "isCorrect": false, "rationale": "Winged flight is not the explicit wish; the phrase describes how even winged speed would feel like stillness compared to desire."}, {"text": "A paradox — even at the highest possible speed, desire would feel stationary because it wants to arrive instantly.", "isCorrect": true, "rationale": "The desire to reach the beloved is so intense that even “winged speed” would feel like no motion at all — desire outstrips the fastest imaginable movement."}, {"text": "A statement that the speaker refuses to move until the beloved returns.", "isCorrect": false, "rationale": "The speaker is moving; the statement is about the quality of motion, not a refusal to move."}, {"text": "An admission that the horse refuses to move regardless of spurring.", "isCorrect": false, "rationale": "The horse’s refusal pertains to Sonnet L; here the speaker imagines his own desire’s impossibly fast return."}], "id": "q08"}, {"question": "What literary device is “desire, of perfect’st love being made” an example of?", "options": [{"text": "Simile — comparing desire to perfect love.", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ is used; desire is defined as being composed of love."}, {"text": "Personification and metaphor — desire is given a racing body made of the substance of love.", "isCorrect": true, "rationale": "Desire is personified (it races, it neighs, it has a body) and metaphorically described as constituted of pure love rather than flesh, setting it above the physical horse."}, {"text": "Apostrophe — addressing desire directly.", "isCorrect": false, "rationale": "Desire is described rather than directly addressed."}, {"text": "Onomatopoeia — using words that sound like the things they describe.", "isCorrect": false, "rationale": "Onomatopoeia involves sound-imitative words; this passage is metaphorical, not sonic."}], "id": "q09"}, {"question": "What overall argument does Sonnet LI make about love’s power?", "options": [{"text": "Love makes the traveler content to be slow because there is no rush.", "isCorrect": false, "rationale": "The first part of the poem (excusing the outward slowness) does make this argument, but the broader point is the explosive speed of love’s return."}, {"text": "Love not only forgives slowness on the journey away from the beloved, but generates a desire on the return that outstrips even the fastest physical speed.", "isCorrect": true, "rationale": "The poem argues both: love provides a rational excuse for slowness going away, and love creates desire so intense that returning would require a speed beyond the physical world to satisfy."}, {"text": "Love makes all journeys impossible because separation is unbearable.", "isCorrect": false, "rationale": "Separation is painful but not impossible; the poem is about relative speed and desire, not impossibility."}, {"text": "Love teaches patience, and the traveler learns to accept the pace of his horse.", "isCorrect": false, "rationale": "Patience is not the lesson; the poem is about desire’s transcendent urgency."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
