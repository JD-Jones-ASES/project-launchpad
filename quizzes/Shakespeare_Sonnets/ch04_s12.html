    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker’s emotional and social condition at the opening of Sonnet XXIX?", "options": [{"text": "He is celebrated and admired by society for his poetry", "isCorrect": false, "rationale": "The opening describes the opposite: disgrace, outcast status, and self-loathing."}, {"text": "He is in disgrace with fortune, isolated, and deeply despairing about his own situation", "isCorrect": true, "rationale": "Lines 1–4: “When in disgrace with fortune and men’s eyes / I all alone beweep my outcast state”—the speaker is socially disgraced and emotionally desolate."}, {"text": "He is content but lonely, missing only the beloved’s company", "isCorrect": false, "rationale": "The opening describes active misery—weeping, cursing his fate—not mere loneliness."}, {"text": "He is mourning the recent death of a close friend", "isCorrect": false, "rationale": "Death of friends is the subject of Sonnet XXX; in XXIX the speaker mourns his own outcast state and inadequacies."}]}, {"question": "What does “bootless cries” mean in line 3?", "options": [{"text": "Silent prayers that go unexpressed", "isCorrect": false, "rationale": "“Bootless” does not mean silent; the cries are expressed but go unheeded."}, {"text": "Useless, futile prayers that heaven ignores", "isCorrect": true, "rationale": "“Bootless” means without profit or avail; the speaker’s prayers are “bootless cries” because heaven is deaf to them—useless supplication."}, {"text": "Loud cries that disturb the peaceful night", "isCorrect": false, "rationale": "Volume is not the point; “bootless” refers to the futility, not the loudness, of the cries."}, {"text": "Prayers offered without proper shoes—a sign of humility", "isCorrect": false, "rationale": "The word “bootless” here is the adjective meaning unprofitable, not a reference to footwear."}]}, {"question": "What qualities does the speaker wish he possessed, like other men?", "options": [{"text": "Greater physical beauty, faithful friends, desired artistic skill, and wider opportunity", "isCorrect": true, "rationale": "Lines 5–9: the speaker wishes for more hope in fortune, better features, friends, “this man’s art, and that man’s scope”—articulating a full range of social, physical, and intellectual envy."}, {"text": "Wealth, political power, and a noble title", "isCorrect": false, "rationale": "While social standing is implied, the specific desires listed are friends, art, scope, and hope—not specifically wealth or political rank."}, {"text": "A longer life, better health, and freedom from labor", "isCorrect": false, "rationale": "Health and longevity are not among the specific qualities envied; the list focuses on social and artistic gifts."}, {"text": "More beautiful verse and a more receptive audience", "isCorrect": false, "rationale": "The envy is of other men’s general life circumstances, not specifically of poetic talent and readership."}]}, {"question": "What is the volta in Sonnet XXIX and where does it occur?", "options": [{"text": "At line 5, when the speaker begins wishing for other men’s qualities", "isCorrect": false, "rationale": "Line 5 deepens the despair rather than turning away from it; the volta comes later."}, {"text": "At lines 11–12, when the speaker thinks of the beloved and his mood transforms completely", "isCorrect": true, "rationale": "“Yet in these thoughts my self almost despising, / Haply I think on thee”—the “yet” signals the turn from despair to joy triggered by remembering the beloved."}, {"text": "At line 9, when the speaker moves from self-pity to self-acceptance", "isCorrect": false, "rationale": "Line 9 still catalogues what the speaker lacks; the turn toward the beloved occurs at lines 11–12."}, {"text": "At line 13, in the final couplet", "isCorrect": false, "rationale": "The couplet delivers the conclusion, but the turning point begins at line 11 with the thought of the beloved."}]}, {"question": "What simile describes the speaker’s sudden mood change?", "options": [{"text": "Like a ship leaving a dark harbor into open sunlit sea", "isCorrect": false, "rationale": "No nautical simile is used; the simile is of a bird rising from the earth."}, {"text": "Like the lark rising from the sullen earth at dawn to sing hymns at heaven’s gate", "isCorrect": true, "rationale": "Lines 11–14: his state, upon thinking of the beloved, is “like to the lark at break of day arising / From sullen earth, sings hymns at heaven’s gate”—from earthly gloom to heavenly singing."}, {"text": "Like a flower opening at sunrise after a long cold night", "isCorrect": false, "rationale": "A flower simile is not used here; the lark, rising and singing, is the image of his mood’s transformation."}, {"text": "Like a prisoner unexpectedly released from a dark dungeon", "isCorrect": false, "rationale": "No prison imagery is used; the lark rising from earth is the specific simile."}]}, {"question": "What does the closing couplet assert about the power of the beloved’s love?", "options": [{"text": "The beloved’s love is so rich that the speaker would trade everything he has for it", "isCorrect": false, "rationale": "The speaker would not trade; his love’s memory makes him “scorn to change” his state even for kings."}, {"text": "Remembering the beloved’s love brings such wealth that the speaker scorns to change his state with kings", "isCorrect": true, "rationale": "“For thy sweet love remember’d such wealth brings / That then I scorn to change my state with kings”—the thought of the beloved transforms poverty and disgrace into a wealth that outvalues royal power."}, {"text": "The speaker would accept any hardship so long as kings allow him to keep his love", "isCorrect": false, "rationale": "The relationship with kings is not one of petition; the speaker scorns to trade places with them."}, {"text": "Love is more powerful than fortune because it destroys ambition", "isCorrect": false, "rationale": "Love does not destroy ambition; it transcends the need for what ambition seeks by providing superior “wealth.”"}]}, {"question": "What does “sullen earth” suggest in the lark simile?", "options": [{"text": "A literal description of muddy fields in the rainy season", "isCorrect": false, "rationale": "While evocative of damp earth, “sullen” is primarily figurative, reflecting the speaker’s prior emotional state."}, {"text": "The gloomy, despairing condition the speaker is leaving behind as thought of the beloved lifts him", "isCorrect": true, "rationale": "“Sullen” means gloomy or dismal; the earth from which the lark rises represents the speaker’s despairing state, while the lark’s upward flight to heaven mirrors his emotional elevation."}, {"text": "The natural world’s indifference to the speaker’s suffering", "isCorrect": false, "rationale": "Nature’s indifference is not the specific meaning; “sullen earth” maps onto the speaker’s own emotional state."}, {"text": "A reference to death and burial, linking the sonnet to mortality", "isCorrect": false, "rationale": "While earth can connote death, in this context “sullen” carries the emotional register of gloom, not specifically death."}]}, {"question": "Sonnet XXIX is structured as a dramatic emotional reversal. What makes this reversal effective?", "options": [{"text": "The reversal is sudden and entirely unexplained, creating a mysterious effect", "isCorrect": false, "rationale": "The cause is clearly given—thinking of the beloved; the reversal is motivated, not mysterious."}, {"text": "The first eight lines build an intense catalogue of despair that makes the sudden thought of the beloved’s love all the more powerful by contrast", "isCorrect": true, "rationale": "The depth and detail of the despair in the octave makes the volta’s joy more dramatic; the higher the fall, the more striking the recovery."}, {"text": "The reversal is gradual, with each quatrain showing slight improvement", "isCorrect": false, "rationale": "The reversal is sudden, not gradual; it arrives with “Haply I think on thee” at line 12."}, {"text": "The reversal is ironic—the speaker does not really feel better but pretends to for the beloved’s sake", "isCorrect": false, "rationale": "There is no ironic distance; the transformation appears genuine and is celebrated in the triumphant couplet."}]}, {"question": "What does “Haply” mean in “Haply I think on thee”?", "options": [{"text": "Happily, joyfully, in a state of happiness", "isCorrect": false, "rationale": "Though the same sound, “haply” means by chance or perhaps, not the adjective “happily.”"}, {"text": "By chance or perhaps, suggesting the thought of the beloved arrives unexpectedly", "isCorrect": true, "rationale": "“Haply” is an archaic adverb meaning perhaps or by good fortune/chance; the thought of the beloved visits the speaker unexpectedly, making the transformation more remarkable."}, {"text": "Hopelessly, without expectation of relief", "isCorrect": false, "rationale": "“Haply” does not mean hopelessly; it signals an unexpected positive turn."}, {"text": "Always, suggesting the speaker habitually thinks of the beloved", "isCorrect": false, "rationale": "The word suggests chanciness, not habitual thought; the surprise of the thought is part of the poem’s effect."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
