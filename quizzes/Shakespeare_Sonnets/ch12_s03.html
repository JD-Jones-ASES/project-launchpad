<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'the expense of spirit in a waste of shame' describe?", "options": [{"text": "The exhaustion of writing love poetry", "isCorrect": false, "rationale": "The sonnet is not about poetic labor; 'spirit' here carries a physical-vital sense."}, {"text": "Lust in action — the expenditure of vital energy in shameful sexual act", "isCorrect": true, "rationale": "The opening phrase defines the subject: lust acted upon, conceived as a wasteful spending of the body's vital spirit in a place of shame."}, {"text": "The wasting of money on a mistress", "isCorrect": false, "rationale": "The waste is of inner vital spirit, not financial resources."}, {"text": "The sadness of unrequited love", "isCorrect": false, "rationale": "The sonnet specifically addresses lust that has been acted upon, not unrequited feeling."}], "id": "q01"}, {"question": "Which of the following is NOT one of the adjectives Shakespeare uses to describe lust before it is acted upon?", "options": [{"text": "Perjured", "isCorrect": false, "rationale": "Lust is described as 'perjured' before the act."}, {"text": "Murderous", "isCorrect": false, "rationale": "Lust is described as 'murderous' before the act."}, {"text": "Tender", "isCorrect": true, "rationale": "The sonnet's list of adjectives — perjured, murderous, bloody, savage, extreme, rude, cruel — never includes 'tender.'"}, {"text": "Savage", "isCorrect": false, "rationale": "Lust is described as 'savage' in the sonnet's violent catalog."}], "id": "q02"}, {"question": "What happens immediately after lust is satisfied, according to the speaker?", "options": [{"text": "It transforms into true love", "isCorrect": false, "rationale": "The sonnet offers no redemption; satisfaction leads immediately to contempt."}, {"text": "It is despised straight away", "isCorrect": true, "rationale": "'Enjoy'd no sooner but despised straight' — the moment of satisfaction is immediately followed by self-disgust and contempt."}, {"text": "It grows into obsession", "isCorrect": false, "rationale": "Obsession precedes satisfaction; what follows satisfaction is despising."}, {"text": "The lover feels peaceful contentment", "isCorrect": false, "rationale": "The poem describes the opposite: immediate revulsion after fulfillment."}], "id": "q03"}, {"question": "The simile 'as a swallow'd bait, / On purpose laid to make the taker mad' compares lust to what?", "options": [{"text": "A poisoned drink offered to an enemy", "isCorrect": false, "rationale": "The image is specifically a baited trap, not a poisoned cup."}, {"text": "A fish hook or trap that drives the one who takes it to madness", "isCorrect": true, "rationale": "Lust is like bait deliberately set: once swallowed, it drives the taker mad — first in frantic pursuit, then in bitter self-loathing after."}, {"text": "A hunting trap set in the forest", "isCorrect": false, "rationale": "The bait metaphor suggests fishing or trapping small animals, but the key idea is that it is deliberately placed to madden the taker."}, {"text": "A sweet fruit that turns bitter on the tongue", "isCorrect": false, "rationale": "The bait image emphasizes entrapment and madness, not bitter taste."}], "id": "q04"}, {"question": "What does 'Had, having, and in quest to have, extreme' convey?", "options": [{"text": "That moderate enjoyment of love is always possible", "isCorrect": false, "rationale": "The line argues the opposite — that lust is extreme in every phase with no middle ground."}, {"text": "That lust is extreme whether in pursuit, in possession, or in looking back", "isCorrect": true, "rationale": "The three phases — having had (past), having (present), and seeking to have (future) — are each described as 'extreme,' showing lust's total domination of the self."}, {"text": "That the speaker has experienced love in three different relationships", "isCorrect": false, "rationale": "The line is a compressed philosophical statement about lust's nature, not autobiographical narrative."}, {"text": "That extreme passion is the mark of genuine love", "isCorrect": false, "rationale": "The poem treats this extremity as destructive and irrational, not as a mark of genuine love."}], "id": "q05"}, {"question": "The phrase 'a bliss in proof, and proved, a very woe' describes what paradox?", "options": [{"text": "That love brings both pleasure and pain simultaneously at all times", "isCorrect": false, "rationale": "The paradox is temporal — bliss in the moment of experience, woe once it has been experienced and is over."}, {"text": "That lust feels like bliss during the act but becomes woe immediately afterward", "isCorrect": true, "rationale": "'In proof' means while being tested or experienced; 'proved' means once the experience is complete. The act is bliss in the moment, woe in retrospect."}, {"text": "That proof of love requires suffering", "isCorrect": false, "rationale": "The sonnet uses 'proof' in the sense of experience or trial, not proof of devotion."}, {"text": "That the speaker finds woe in anticipation and bliss in memory", "isCorrect": false, "rationale": "The sequence described is the reverse: a joy proposed before, bliss during, woe and dream after."}], "id": "q06"}, {"question": "What does the couplet 'All this the world well knows; yet none knows well / To shun the heaven that leads men to this hell' conclude?", "options": [{"text": "That the world is ignorant of lust's destructive nature", "isCorrect": false, "rationale": "The couplet says the opposite: the world knows well — but knowing does not prevent the behavior."}, {"text": "That universal knowledge of lust's trap does not enable anyone to escape it", "isCorrect": true, "rationale": "The couplet's bitter insight is that rational understanding of the cycle of lust is powerless to break it; knowledge and wisdom are severed."}, {"text": "That only the wise can avoid falling into lust", "isCorrect": false, "rationale": "'None knows well to shun' implies no one successfully avoids it, wise or otherwise."}, {"text": "That heaven and hell are equally desirable destinations", "isCorrect": false, "rationale": "Heaven here is ironic — the apparent bliss that leads to the real hell of self-disgust and enslavement."}], "id": "q07"}, {"question": "Which of these best describes the structure of the argument in Sonnet CXXIX?", "options": [{"text": "A personal complaint moving to universal statement", "isCorrect": false, "rationale": "The sonnet moves in the opposite direction: it opens with general truth about lust and closes with a universal moral observation."}, {"text": "An impersonal philosophical analysis of lust, from anticipation through fulfillment to the couplet's resigned conclusion", "isCorrect": true, "rationale": "Unusually for a love sonnet, CXXIX never uses 'I' until the couplet's implicit 'none.' It reads as impersonal moral philosophy, cataloging lust's cycle before the couplet delivers its despairing conclusion."}, {"text": "A praise of physical love followed by a warning to the beloved", "isCorrect": false, "rationale": "The sonnet praises nothing; it is an unrelenting critique of lust's destructive cycle."}, {"text": "A comparison between lust and romantic love", "isCorrect": false, "rationale": "Romantic love is not introduced as a counterpoint; the sonnet focuses entirely on lust."}], "id": "q08"}, {"question": "Which literary device is most prominent in lines 3-6 ('perjur'd, murderous, bloody, full of blame, / Savage, extreme, rude, cruel, not to trust')?", "options": [{"text": "Simile", "isCorrect": false, "rationale": "These lines use accumulation of adjectives, not comparison using 'like' or 'as.'"}, {"text": "Asyndeton and accumulation (cataloging)", "isCorrect": true, "rationale": "The rapid piling up of adjectives without conjunctions creates a breathless, overwhelming effect that mimics the uncontrollable force of lust itself."}, {"text": "Personification", "isCorrect": false, "rationale": "While lust is discussed as an agent, the primary device here is the accumulation of adjectives."}, {"text": "Chiasmus", "isCorrect": false, "rationale": "Chiasmus reverses grammatical structures; the technique here is accumulation, not reversal."}], "id": "q09"}, {"question": "The 'heaven that leads men to this hell' is a reference to what?", "options": [{"text": "Religious salvation that passes through earthly suffering", "isCorrect": false, "rationale": "The heaven is ironic — it is the apparent delight of lust, not genuine religious salvation."}, {"text": "The apparent pleasure of lust that traps men in a cycle of self-destruction", "isCorrect": true, "rationale": "The heaven is the deceptive bliss of sexual pleasure; the hell is the self-loathing, enslavement, and degradation that follow and surround it."}, {"text": "The mistress's beauty that draws men into ruinous relationships", "isCorrect": false, "rationale": "While the Dark Lady is the broader context, within the sonnet 'heaven' refers to the pleasurable moment of lust itself."}, {"text": "The speaker's idealized vision of courtly love", "isCorrect": false, "rationale": "Courtly love idealism is exactly what this sonnet strips away."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
