<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What extended simile opens Sonnet CXLIII?", "options": [{"text": "The Dark Lady compared to a queen on a throne", "isCorrect": false, "rationale": "The simile is domestic and humble, not regal."}, {"text": "The Dark Lady compared to a housewife chasing a runaway bird", "isCorrect": true, "rationale": "'Lo, as a careful housewife runs to catch / One of her feather'd creatures broke away' establishes the controlling simile."}, {"text": "The speaker compared to a hunter pursuing prey", "isCorrect": false, "rationale": "It is the Dark Lady, not the speaker, who is compared to the one chasing."}, {"text": "The Dark Lady compared to a shepherd seeking a lost sheep", "isCorrect": false, "rationale": "The creature is a 'feather'd' bird, not a sheep, and the pursuer is a housewife."}]}, {"question": "In the simile, what does the housewife do with her baby before chasing the bird?", "options": [{"text": "She hands the baby to a neighbor", "isCorrect": false, "rationale": "No neighbor appears; the baby is simply set down."}, {"text": "She sets the baby down", "isCorrect": true, "rationale": "'Sets down her babe' — she abandons the child momentarily to pursue the escaped creature."}, {"text": "She leaves the baby inside the house", "isCorrect": false, "rationale": "The text says she sets the babe down in the chase, not that she goes inside."}, {"text": "She carries the baby with her", "isCorrect": false, "rationale": "She sets the babe down rather than taking it along."}]}, {"question": "Who does the neglected baby represent in the poem's allegory?", "options": [{"text": "The Fair Youth", "isCorrect": false, "rationale": "The Fair Youth is not the subject of this sonnet; the allegory is between the speaker and the Dark Lady."}, {"text": "The speaker himself", "isCorrect": true, "rationale": "'So runn'st thou after that which flies from thee, / Whilst I thy babe chase thee afar behind' — the speaker is the neglected child."}, {"text": "The speaker's conscience", "isCorrect": false, "rationale": "Conscience is not personified as the baby here."}, {"text": "The Dark Lady's other lovers", "isCorrect": false, "rationale": "The other lover is the 'feather'd creature' being chased, not the baby."}]}, {"question": "What does 'that which flies before her face' represent allegorically?", "options": [{"text": "The speaker's love for her", "isCorrect": false, "rationale": "The fleeing thing is what she pursues — a rival lover who eludes her, not the speaker's love."}, {"text": "A rival lover who eludes the Dark Lady", "isCorrect": true, "rationale": "The bird that has 'broke away' represents the person (possibly Will) whom the Dark Lady chases but who does not return her pursuit."}, {"text": "Her own youth and beauty slipping away", "isCorrect": false, "rationale": "Aging or the loss of beauty is not the subject; the fleeing thing is a person she desires."}, {"text": "The speaker's hope for faithfulness from her", "isCorrect": false, "rationale": "The speaker is the baby, not the fleeing bird."}]}, {"question": "What condition does the speaker place on his prayer for her success?", "options": [{"text": "That she promise to be faithful afterward", "isCorrect": false, "rationale": "Faithfulness as a formal promise is not the stated condition."}, {"text": "That she turn back to him after catching what she pursues", "isCorrect": true, "rationale": "'But if thou catch thy hope, turn back to me' — his prayer is conditional on her return."}, {"text": "That she give up pursuing others entirely", "isCorrect": false, "rationale": "He does not demand she stop pursuing others; he only asks she return to him afterward."}, {"text": "That she confess her neglect of him", "isCorrect": false, "rationale": "Confession is not the stated condition; only her physical return is required."}]}, {"question": "What is the double meaning of the word 'Will' in the final couplet?", "options": [{"text": "Future intention and the name William (the speaker)", "isCorrect": true, "rationale": "'Will' puns on both the future tense of volition and the name Will Shakespeare — a signature pun common in the Dark Lady sonnets."}, {"text": "A legal will (testament) and desire", "isCorrect": false, "rationale": "A legal will is not the primary pun; the name Will and sexual desire are the intended double meanings."}, {"text": "Willpower and the will to survive", "isCorrect": false, "rationale": "Abstract willpower is not the relevant pun here."}, {"text": "A prayer and a command", "isCorrect": false, "rationale": "These grammatical senses are not the pun Shakespeare exploits in the couplet."}]}, {"question": "What does the speaker ask the Dark Lady to do in lines 13-14?", "options": [{"text": "Abandon her other pursuits permanently", "isCorrect": false, "rationale": "The speaker does not demand permanent abandonment of others; he asks for a return and a kiss."}, {"text": "Turn back, play the mother's part, kiss him, and be kind", "isCorrect": true, "rationale": "'Turn back to me, / And play the mother's part, kiss me, be kind' lists the four actions he desires."}, {"text": "Acknowledge publicly that he loves her", "isCorrect": false, "rationale": "Public acknowledgment is not requested here."}, {"text": "Pray with him for forgiveness of their sins", "isCorrect": false, "rationale": "Religious penance is not what the speaker asks for; he wants tenderness."}]}, {"question": "The tone of this sonnet toward the speaker's situation is best described as:", "options": [{"text": "Angry and accusatory", "isCorrect": false, "rationale": "While the speaker is neglected, his tone is more plaintive and rueful than angry."}, {"text": "Wryly self-deprecating — the speaker willingly casts himself as a neglected infant", "isCorrect": true, "rationale": "Comparing himself to a crying baby chasing after a preoccupied mother is a deliberately humbling, even comic, self-portrait."}, {"text": "Triumphant and confident of her eventual return", "isCorrect": false, "rationale": "Confidence is tempered by the conditional 'if thou catch thy hope' — success is uncertain."}, {"text": "Coldly philosophical about the nature of desire", "isCorrect": false, "rationale": "The tone is personal and emotionally vulnerable, not philosophical."}]}, {"question": "Which structural feature most clearly separates the octave from the sestet in this sonnet?", "options": [{"text": "A shift from Latin vocabulary to Anglo-Saxon diction", "isCorrect": false, "rationale": "This linguistic shift is not the primary structural marker."}, {"text": "A shift from the simile (housewife/bird) to the application (Dark Lady/rival/speaker)", "isCorrect": true, "rationale": "Lines 1-8 develop the domestic simile; lines 9-14 apply it directly: 'So runn'st thou after...'"}, {"text": "A change from third person to first person narration", "isCorrect": false, "rationale": "The first person appears throughout; the shift is in the frame of reference, not the grammatical person."}, {"text": "An introduction of religious imagery in the sestet", "isCorrect": false, "rationale": "Religious imagery does not appear in the sestet of this sonnet."}]}, {"question": "What does the final line 'So will I pray that thou mayst have thy Will' suggest about the speaker's attitude?", "options": [{"text": "He selflessly wants her to succeed in her pursuit even at his own expense", "isCorrect": false, "rationale": "The prayer is conditional and self-interested — he prays for her success only if she returns to him."}, {"text": "He will pray for her success in a bargain: her return earns his blessing", "isCorrect": true, "rationale": "The prayer is a quid pro quo — if she stills his crying by returning, he will pray she gets what she wants ('Will')."}, {"text": "He resigns himself to permanent neglect", "isCorrect": false, "rationale": "Resignation is not the mood; the conditional structure maintains hope of return."}, {"text": "He mocks her by pretending to pray for what she already has", "isCorrect": false, "rationale": "Mockery is not the primary register here; the speaker is sincere in his bargain."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
