</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What simile opens Sonnet XXXVII?", "options": [{"text": "The speaker compares himself to a king watching his heir", "isCorrect": false, "rationale": "While “kingly” qualities are implied in the beloved's attributes, the simile is not of a king but of a decrepit father."}, {"text": "The speaker compares himself to a decrepit father who delights in his active child's youthful deeds", "isCorrect": true, "rationale": "“As a decrepit father takes delight / To see his active child do deeds of youth” — the speaker, aged or diminished by fortune, vicariously finds joy in the beloved's vitality just as an old parent glories in a lively child."}, {"text": "The speaker compares the beloved to a bright star in a dark sky", "isCorrect": false, "rationale": "The star metaphor is not used here; the central simile is the father-child relationship."}, {"text": "The speaker compares himself to a soldier lamed in battle", "isCorrect": false, "rationale": "Though “lame” appears in line 3, the central simile is of a decrepit father, not a wounded soldier."}]}, {"question": "What does “made lame by Fortune's dearest spite” (line 3) tell us about the speaker's condition?", "options": [{"text": "The speaker has suffered a physical injury to his legs", "isCorrect": false, "rationale": "While “lame” could be literal, in context it is metaphorical: Fortune's cruelty has diminished or crippled the speaker's social standing, creative power, or youthful vitality."}, {"text": "Fortune has dealt the speaker its most painful blow, leaving him diminished or disadvantaged", "isCorrect": true, "rationale": "“Dearest” means most grievous; “lame” is metaphorical for impairment. The speaker presents himself as someone whom ill fortune has severely disadvantaged — in contrast to the beloved's abundant gifts."}, {"text": "The speaker is poor and cannot travel to see the beloved", "isCorrect": false, "rationale": "Poverty is mentioned later (“poor” in line 11) but “lame” here is a distinct metaphor for Fortune's injury, not a literal economic condition."}, {"text": "The speaker blames the beloved for his misfortune", "isCorrect": false, "rationale": "Fortune, not the beloved, is blamed for the speaker's diminished state; the beloved is the source of comfort, not the cause of harm."}]}, {"question": "The list in lines 7-8 (“beauty, birth, or wealth, or wit”) describes:", "options": [{"text": "Qualities the speaker once possessed but has now lost", "isCorrect": false, "rationale": "These are attributes of the beloved, not the speaker's lost qualities; the speaker contrasts the beloved's abundance with his own poverty."}, {"text": "The abundant gifts and qualities with which the beloved is endowed", "isCorrect": true, "rationale": "The beloved is “entitled” (having legal right) to beauty, noble birth, wealth, and intelligence — all the gifts that Fortune denied the speaker — and the speaker “engrafts” his love to this store of abundance."}, {"text": "The things the speaker wishes to give the beloved as presents", "isCorrect": false, "rationale": "The speaker cannot give these things; he draws on them by attaching himself to the beloved, not by giving."}, {"text": "Qualities that are ultimately worthless without true love", "isCorrect": false, "rationale": "The speaker does not disparage these qualities; he values them highly and takes pride in them vicariously through love."}]}, {"question": "What does “I make my love engrafted to this store” (line 10) mean?", "options": [{"text": "The speaker literally inscribes his name in the beloved's possessions", "isCorrect": false, "rationale": "Inscription of a name is not the image; “engrafted” is a horticultural metaphor."}, {"text": "The speaker attaches his love like a graft onto the beloved's abundance, so that he grows from that stock", "isCorrect": true, "rationale": "Grafting joins a cutting to a host plant so the cutting grows using the host's resources; the speaker's love is grafted onto the beloved's store of gifts, drawing life and glory from them."}, {"text": "The speaker vows to support the beloved's finances as a business investment", "isCorrect": false, "rationale": "“Store” here means abundance of qualities, not a financial account; the metaphor is horticultural, not commercial."}, {"text": "The speaker buries his love's memory in the beloved's abundance to keep it hidden", "isCorrect": false, "rationale": "Burial or concealment is not the horticultural metaphor of grafting; grafting promotes growth, not concealment."}]}, {"question": "How does the speaker reconcile being “lame, poor, despised” (line 11) with not being those things?", "options": [{"text": "He pretends his problems do not exist", "isCorrect": false, "rationale": "The speaker does not deny his condition; he resolves it through a logic of vicarious participation."}, {"text": "Through his love for the beloved, he vicariously shares in the beloved's abundance, making his deficiencies irrelevant", "isCorrect": true, "rationale": "“Whilst that this shadow doth such substance give / That I in thy abundance am suffic'd” — the beloved's shadow (reflection, presence) provides enough substance (real content) to fill the speaker's emptiness, so he is not lame, poor, or despised while the love holds."}, {"text": "He has been secretly wealthy all along and is being modest", "isCorrect": false, "rationale": "The speaker's diminishment is presented as genuine; the resolution comes from the beloved's abundance, not hidden personal resources."}, {"text": "He competes with the beloved to prove he is equally talented", "isCorrect": false, "rationale": "Competition is not the strategy; dependence and vicarious participation are."}]}, {"question": "The word “shadow” in line 12 (“this shadow doth such substance give”) is an example of paradox because:", "options": [{"text": "Shadows are dark but the beloved is described as bright", "isCorrect": false, "rationale": "The contrast of dark and bright is not the paradox; the paradox is in what a shadow can provide."}, {"text": "A shadow — typically insubstantial — is said to provide real substance and sufficiency", "isCorrect": true, "rationale": "Shadows are by definition without solid substance, yet the speaker claims this shadow (the beloved's image or reflected glory) gives him real “substance” — an apparent impossibility that is the paradox's power."}, {"text": "The beloved casts a literal shadow that physically harms the speaker", "isCorrect": false, "rationale": "No physical shadow causing harm is meant; the paradox is philosophical and emotional."}, {"text": "Shadows only appear at noon, when the sun is at its peak", "isCorrect": false, "rationale": "The time-of-day aspect of shadows is not relevant here; the paradox concerns substance versus insubstantiality."}]}, {"question": "The couplet (“Look what is best, that best I wish in thee: / This wish I have; then ten times happy me!”) expresses:", "options": [{"text": "The speaker's competitive desire to surpass the beloved", "isCorrect": false, "rationale": "The speaker wishes the beloved well, not to outcompete; the attitude is one of selfless wishing, not rivalry."}, {"text": "The speaker's total happiness derived from wishing the best for the beloved — a happiness multiplied by love", "isCorrect": true, "rationale": "The speaker wishes whatever is best for the beloved; having that wish granted (through love's logic of unity) makes him “ten times happy” — the arithmetic of love where the beloved's good is his good."}, {"text": "A curse disguised as a blessing — ten times happy is actually ten times burdened", "isCorrect": false, "rationale": "No ironic reversal is intended; the couplet is genuinely celebratory and content."}, {"text": "The speaker's relief that the separation of Sonnet XXXVI has been permanently resolved", "isCorrect": false, "rationale": "Sonnet XXXVII does not resolve the separation of XXXVI; its joy comes from vicarious participation in the beloved's gifts, not from reunion."}]}, {"question": "What classical or legal concept does the word “Entitled” (line 9) introduce?", "options": [{"text": "It suggests the beloved is being charged with a criminal offense", "isCorrect": false, "rationale": "Criminal charges are not associated with “entitled”; the word here indicates rightful ownership or legal claim."}, {"text": "It implies the beloved has a rightful claim to these gifts as if by legal title or noble rank", "isCorrect": true, "rationale": "“Entitled” means having a legal right or title to something, often by noble inheritance; the beloved's beauty, birth, wealth, and wit are portrayed as rightful possessions, not accidents, elevating them to the status of a lord's inheritance."}, {"text": "It refers to the title page of a book the speaker has dedicated to the beloved", "isCorrect": false, "rationale": "No book or dedication is referenced here; “entitled” is used in its legal/noble sense."}, {"text": "It means the beloved is overly proud and presumptuous", "isCorrect": false, "rationale": "The modern colloquial sense of “entitled” (meaning arrogantly expectant) is not the Elizabethan usage; here it means holding rightful title."}]}, {"question": "How does Sonnet XXXVII contribute to the chapter theme of “Shadows and Forgiveness”?", "options": [{"text": "It shows the speaker forgiving the beloved one final time and moving on", "isCorrect": false, "rationale": "Sonnet XXXVII does not primarily address forgiveness; it deals with vicarious joy and participation in the beloved's abundance."}, {"text": "The speaker himself is the shadow — diminished by fortune — who finds substance and light through the beloved's abundance", "isCorrect": true, "rationale": "Within the chapter's shadow-and-light framework, the speaker is explicitly the shadowed (lame, poor, despised) figure who draws real substance from the beloved's shining abundance — a personal enactment of shadows needing a source of light."}, {"text": "The beloved is punished for past wrongs by being given an old father figure to serve", "isCorrect": false, "rationale": "No punishment is described; the father-child simile illustrates vicarious delight, not retribution."}, {"text": "It introduces a new rival poet who will shadow the speaker in future sonnets", "isCorrect": false, "rationale": "The Rival Poet appears later in the sequence (Sonnets 78-86); Sonnet XXXVII does not introduce that figure."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
