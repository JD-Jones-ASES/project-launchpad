    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central wordplay in Sonnet CXXXV?", "options": [{"text": "The word 'black' meaning both dark and moral failing", "isCorrect": false, "rationale": "The central wordplay in CXXXV is not 'black' but 'Will.'"}, {"text": "The word 'Will,' which simultaneously means desire, the speaker's name, and sexual appetite", "isCorrect": true, "rationale": "Shakespeare exploits the triple meaning of 'Will': (1) William — his own name; (2) volition or wish; (3) sexual desire or appetite, especially as applied to the mistress's own willfulness. The word appears in multiple forms throughout the sonnet."}, {"text": "The word 'fair' meaning both beautiful and just", "isCorrect": false, "rationale": "'Fair' is not the pun at work here; the sonnet's pun is entirely on 'Will.'"}, {"text": "The word 'grace' meaning both beauty and divine favor", "isCorrect": false, "rationale": "The central wordplay is on 'Will,' not 'grace.'"}], "id": "q01"}, {"question": "The phrase 'whoever hath her wish, thou hast thy Will' implies what about the mistress?", "options": [{"text": "That she is the wisest woman alive", "isCorrect": false, "rationale": "The phrase refers to her having her will/Will in the sense of sexual fulfillment and the man named Will."}, {"text": "That she already possesses both her own desires and the man named Will — yet he asks for more room", "isCorrect": true, "rationale": "The speaker argues she has everything she wants ('her wish'), plus her Will (both desire and the man), and 'Will to boot, and Will in over-plus' — suggesting she has more than enough of Will, so one more (himself) should make no difference."}, {"text": "That she grants wishes to others generously", "isCorrect": false, "rationale": "The poem is about her receiving desires, not granting them to others."}, {"text": "That she deserves to have her wishes granted by the speaker", "isCorrect": false, "rationale": "The argument runs the other way: she already has so much that she should accommodate him."}], "id": "q02"}, {"question": "What is the logic of the sea simile in lines 11-12?", "options": [{"text": "That love grows like water filling a vessel", "isCorrect": false, "rationale": "The simile argues for accommodation of another unit through abundance, not growth in general."}, {"text": "The sea, already full of water, still receives more rain — so she, rich in Will, should add one more", "isCorrect": true, "rationale": "'The sea, all water, yet receives rain still, / And in abundance addeth to his store' — the argument is that abundance can always absorb more. Her plenty of Will should welcome one additional will (the speaker's)."}, {"text": "That his love for her is as vast and deep as the ocean", "isCorrect": false, "rationale": "The simile concerns capacity and addition, not the depth of his love."}, {"text": "That she is cold and vast and uncaring like the sea", "isCorrect": false, "rationale": "The sea is invoked positively as a model of generous abundance, not as a symbol of coldness."}], "id": "q03"}, {"question": "The speaker describes the mistress's will as 'large and spacious.' What does this suggest?", "options": [{"text": "That she is ambitious and politically powerful", "isCorrect": false, "rationale": "The spaciousness of her will is sexual in context, not political."}, {"text": "That her sexual appetite is generous and capacious — and therefore should have room for him", "isCorrect": true, "rationale": "The sexual pun: her 'will' (desire / sexual capacity) is 'large and spacious' enough to accommodate the speaker as one more among many. The argument is crudely logical within the double meaning."}, {"text": "That she has a generous heart toward all who seek her", "isCorrect": false, "rationale": "The poem's logic depends on the sexual meaning of 'will,' not her emotional generosity."}, {"text": "That her intellectual capacity is broad and accepting", "isCorrect": false, "rationale": "The wordplay is sexual, not intellectual."}], "id": "q04"}, {"question": "What does the speaker ask the mistress to do in the final couplet?", "options": [{"text": "To love him exclusively and forsake all others", "isCorrect": false, "rationale": "The speaker makes no claim to exclusivity; he asks only for inclusion."}, {"text": "Not to let unkind refusals kill fair suitors, and to think of all wills as one — with him as that one Will", "isCorrect": true, "rationale": "'Let no unkind No fair beseechers kill; / Think all but one, and me in that one Will' — he asks for inclusion, not exclusivity, and a kind 'yes' rather than a harsh 'no.'"}, {"text": "To remember his name is Will and therefore love him", "isCorrect": false, "rationale": "The name-pun is deployed elsewhere; the couplet asks for inclusion and acceptance."}, {"text": "To recognize that he alone loves her truly", "isCorrect": false, "rationale": "He does not claim superior love; he asks for admission among those already accepted."}], "id": "q05"}, {"question": "The argument 'in things of great receipt with ease we prove / among a number one is reckon'd none' suggests what?", "options": [{"text": "That the speaker's love is worthless and he knows it", "isCorrect": false, "rationale": "The argument is tactical: if he counts for nothing in a crowd, his presence costs her nothing and she should admit him."}, {"text": "In a large collection, one extra unit is negligible — so he costs her nothing to accept", "isCorrect": true, "rationale": "The speaker argues that in abundance, one more is counted as nothing. If she is already rich in Will, one more will is negligible — so she should accept him at no cost."}, {"text": "That numbers reduce individuals to insignificance, which is tragic", "isCorrect": false, "rationale": "The speaker uses this mathematical argument strategically, not tragically."}, {"text": "That he would rather be nothing to her than cause her any trouble", "isCorrect": false, "rationale": "The argument is that his smallness/negligibility makes it easier for her to accept him, not that he prefers nullity."}], "id": "q06"}, {"question": "What is the overall tone of Sonnet CXXXV?", "options": [{"text": "Deeply mournful and despairing", "isCorrect": false, "rationale": "The tone is persistent and witty, not mournful."}, {"text": "Persistently witty and sexually frank, pressing a logically constructed but crude plea for admission", "isCorrect": true, "rationale": "The sonnet is relentlessly clever, playing on multiple meanings of Will to construct a logical argument for why she should accommodate one more, all in a tone that is frank about sexual desire without being bitter."}, {"text": "Angry and accusatory", "isCorrect": false, "rationale": "The speaker does not accuse; he pleads with wit and argument."}, {"text": "Reverent and idealizing", "isCorrect": false, "rationale": "CXXXV is one of the sequence's least reverent sonnets — it is deliberately coarse and clever."}], "id": "q07"}, {"question": "In 'let no unkind No fair beseechers kill,' what does 'kill' mean?", "options": [{"text": "Literal death from unrequited love", "isCorrect": false, "rationale": "The language is hyperbolic love convention, but the primary meaning is crushing a hopeful suitor's spirits."}, {"text": "To crush or destroy the hope of fair (worthy) suitors by refusing them unkindly", "isCorrect": true, "rationale": "'Fair beseechers' are worthy suitors; an 'unkind No' — a harsh, cold refusal — 'kills' their spirit and hope. He pleads for gentleness toward those who deserve consideration."}, {"text": "She should never say no to anyone under any circumstances", "isCorrect": false, "rationale": "The plea is for mercy to worthy suitors, not an argument for unlimited promiscuity."}, {"text": "That rejection is literally dangerous to health", "isCorrect": false, "rationale": "The 'kill' is conventional hyperbole for crushing hope, not a medical claim."}], "id": "q08"}, {"question": "How does this sonnet differ from the more anguished Dark Lady sonnets like CXXIX and CXXXIII?", "options": [{"text": "It expresses complete indifference to the mistress", "isCorrect": false, "rationale": "Far from indifference, the speaker is pressing his suit energetically."}, {"text": "It deploys humor and wordplay to press desire, where the others express torment and loss", "isCorrect": true, "rationale": "CXXIX was a grim analysis of lust's destruction; CXXXIII was anguished over the loss of self and friend. CXXXV is playfully persistent, using wit and pun as tools of seduction rather than lamenting enslavement."}, {"text": "It focuses on the Fair Youth rather than the Dark Lady", "isCorrect": false, "rationale": "CXXXV is addressed entirely to the mistress."}, {"text": "It accepts defeat and withdraws the speaker's claims", "isCorrect": false, "rationale": "CXXXV is actively pressing claims, not withdrawing them."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
