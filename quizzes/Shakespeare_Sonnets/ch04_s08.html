<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What contrast does the opening of Sonnet XXV establish?", "options": [{"text": "The contrast between spring’s beauty and winter’s cold", "isCorrect": false, "rationale": "No seasonal contrast is drawn in Sonnet XXV; the contrast is social and emotional."}, {"text": "The contrast between those who enjoy public fame and the speaker, who finds private joy in love", "isCorrect": true, "rationale": "Lines 1–4: those favored by fortune boast of public honor and titles, while the speaker—barred from such triumph—finds joy in privately honoring what he most values (his love)."}, {"text": "The contrast between the beloved’s beauty and the beauty of princes’ courts", "isCorrect": false, "rationale": "The beloved’s beauty is not directly described; the contrast is between public ambition and private love."}, {"text": "The contrast between warriors’ victories and the speaker’s poetic achievements", "isCorrect": false, "rationale": "The warrior is a figure in the second quatrain, but the opening contrast is between fame-seeking and the speaker’s private joy."}]}, {"question": "What does the marigold simile in lines 7–8 illustrate about princes’ favorites?", "options": [{"text": "Their beauty is as golden and natural as a summer flower", "isCorrect": false, "rationale": "The comparison is not complimentary; the marigold illustrates the dangerous dependency of courtiers on royal favor."}, {"text": "Their fortunes depend entirely on the ruler’s approval and collapse at the least sign of displeasure", "isCorrect": true, "rationale": "Like a marigold that opens only in the sun’s gaze and dies at a frown, court favorites bloom only when the prince smiles and wither the moment he frowns."}, {"text": "Their beauty surpasses that of all other flowers in the garden", "isCorrect": false, "rationale": "The marigold is used to show fragility and dependency, not superior beauty."}, {"text": "They are colorful and cheerful but lack depth of character", "isCorrect": false, "rationale": "Character depth is not the issue; the simile focuses on the danger of depending on a fickle patron."}]}, {"question": "What fate befalls the warrior mentioned in the second quatrain?", "options": [{"text": "He dies heroically and is mourned by all his comrades", "isCorrect": false, "rationale": "The warrior is not mourned but forgotten; his fate is erasure from the book of honor."}, {"text": "After a thousand victories, one defeat causes him to be entirely erased from honor’s record and forgotten", "isCorrect": true, "rationale": "Lines 11–14: the warrior “famoused for fight” is “from the book of honour razed quite” after one failure—all his past victories forgotten because of a single defeat."}, {"text": "He retires from battle with great honor and lives in peace", "isCorrect": false, "rationale": "Retirement with honor is not the fate described; he is erased and forgotten after one defeat."}, {"text": "He loses his title but keeps his fortune", "isCorrect": false, "rationale": "Wealth is not mentioned; what he loses is his reputation and place in the record of honor."}]}, {"question": "How does the speaker use the examples of the courtier and the warrior?", "options": [{"text": "As models of excellence the speaker aspires to emulate", "isCorrect": false, "rationale": "The speaker does not aspire to their condition; both examples show the fragility of public fame."}, {"text": "As cautionary examples showing that public fame is fragile and conditional, making his private love more secure", "isCorrect": true, "rationale": "Both the courtier (dependent on a prince’s smile) and the warrior (erased by one defeat) demonstrate how public reputation is unstable—heightening the value of the speaker’s love, which cannot be removed."}, {"text": "As historical figures the beloved should admire and emulate", "isCorrect": false, "rationale": "The beloved is not urged to admire these figures; they are negative examples for the speaker’s argument."}, {"text": "As symbols of the passage of time and inevitable death", "isCorrect": false, "rationale": "While impermanence is implied, the specific point is about the precariousness of fame, not about mortality per se."}]}, {"question": "What does the couplet claim is the speaker’s great happiness?", "options": [{"text": "He has achieved greater fame than princes or warriors", "isCorrect": false, "rationale": "The speaker does not claim public fame; his happiness is specifically located in mutual love."}, {"text": "He loves and is beloved in return, a relationship that is permanent and cannot be removed", "isCorrect": true, "rationale": "“Then happy I, that love and am belov’d, / Where I may not remove nor be remov’d”—mutual love is his fortune, contrasted with the removable honors of court and battle."}, {"text": "His poetry will outlast the monuments of princes and warriors", "isCorrect": false, "rationale": "The immortality of verse is not the argument in this sonnet; the happiness is specifically about mutual, permanent love."}, {"text": "He is free from fortune’s influence because he does not desire worldly honors", "isCorrect": false, "rationale": "While the speaker is barred from public triumph, his happiness is not merely the absence of ambition but the positive presence of mutual love."}]}, {"question": "The phrase “in their glory die” about the court favorites means:", "options": [{"text": "They die bravely and gloriously in service of the prince", "isCorrect": false, "rationale": "The death is not heroic; it is the collapse of their reputation and position at the prince’s frown."}, {"text": "Their glory and reputation collapse instantly when the prince withdraws favor", "isCorrect": true, "rationale": "The death is metaphorical—their social glory “dies” when the ruler frowns, just as the marigold closes when the sun withdraws."}, {"text": "They sacrifice themselves in pursuit of worldly glory", "isCorrect": false, "rationale": "Self-sacrifice is not the meaning; the collapse of their status is involuntary and sudden."}, {"text": "They are literally executed when they fall out of royal favor", "isCorrect": false, "rationale": "While execution was historically possible for disgraced courtiers, the metaphor here is of natural death (flower dying), not execution."}]}, {"question": "What does “razed quite” (line 13) mean in reference to the warrior?", "options": [{"text": "The warrior goes mad with grief after his defeat", "isCorrect": false, "rationale": "“Razed” does not mean “raving” or going mad; the word comes from “raze” meaning to scrape or scratch out."}, {"text": "His name is completely erased or scratched out of the record of honor", "isCorrect": true, "rationale": "“Razed” meant to scrape, erase, or obliterate; “razed quite” means completely erased from the book of honor—his entire record obliterated."}, {"text": "He is ridiculed and mocked by his enemies", "isCorrect": false, "rationale": "Mockery is not described; the action is erasure from an official record."}, {"text": "He demolishes his own honor by boasting", "isCorrect": false, "rationale": "Self-destruction through boasting is not the meaning; “razed” is a passive act done to him by others or by public opinion."}]}, {"question": "Sonnet XXV contrasts public and private value. Which statement best describes the sonnet’s conclusion?", "options": [{"text": "Public honor is more reliable than private love", "isCorrect": false, "rationale": "The sonnet argues the opposite: public honor is fragile and conditional."}, {"text": "Private, mutual love is more stable and valuable than public fame because it cannot be arbitrarily withdrawn", "isCorrect": true, "rationale": "The examples of courtier and warrior show public honor’s fragility; the couplet’s “may not remove nor be remov’d” declares love’s permanence as the superior fortune."}, {"text": "Both public honor and private love are equally unstable", "isCorrect": false, "rationale": "The sonnet deliberately contrasts the instability of public honor with the stability of mutual love; they are not equivalent."}, {"text": "The speaker would prefer public fame if he could have it", "isCorrect": false, "rationale": "While the speaker acknowledges being barred from public honor, the poem’s logic presents his private love as genuinely superior, not merely a consolation prize."}]}, {"question": "The phrase “unlook’d for joy” (line 4) describes:", "options": [{"text": "Joy found unexpectedly in the beloved when the speaker least expected it", "isCorrect": false, "rationale": "While this is a possible reading, the more precise meaning is joy that is not performed publicly or “looked for” (sought) by others."}, {"text": "Joy that is private, unobserved, and not dependent on public recognition or display", "isCorrect": true, "rationale": "“Unlook’d for” means not observed or publicly witnessed; the speaker finds joy that does not require an audience—contrasted with those who “boast” their public honors."}, {"text": "Joy that is unexpected because the beloved has not yet declared love", "isCorrect": false, "rationale": "The couplet confirms mutual love is established; the “unlook’d for” quality is about privacy, not uncertainty."}, {"text": "Joy that comes from ignoring the world entirely", "isCorrect": false, "rationale": "The speaker does not ignore the world; he is aware of it and contrasts his private joy with its public displays."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
