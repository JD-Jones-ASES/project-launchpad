<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker find when he reads old chronicles and poems?", "options": [{"text": "Proof that beauty has been declining since ancient times", "isCorrect": false, "rationale": "The speaker finds not decline but ancient descriptions that prefigure the beloved's present beauty."}, {"text": "Descriptions of past beauty that he reads as prophecies of his beloved", "isCorrect": true, "rationale": "He sees ancient praise of 'ladies dead and lovely knights' as unwitting prophecies that were actually describing his beloved."}, {"text": "Evidence that past poets were better than himself", "isCorrect": false, "rationale": "Past poets are found to be inferior, lacking the skill to fully capture what they sensed."}, {"text": "Models for how he should write his own verse", "isCorrect": false, "rationale": "The past texts are treated as prophetic, not as models for imitation."}], "id": "q01"}, {"question": "What is a 'blazon' in the context of line 5?", "options": [{"text": "A heraldic shield bearing a family coat of arms", "isCorrect": false, "rationale": "While 'blazon' has heraldic origins, in poetic usage it means a catalogue of a person's physical beauties."}, {"text": "A poetic catalogue of a person's physical beauties", "isCorrect": true, "rationale": "In Renaissance poetry the blazon (or blason) was a conventional form listing the praises of individual body parts."}, {"text": "A type of manuscript illumination", "isCorrect": false, "rationale": "Manuscript illumination is a different art form; blazon is a literary convention."}, {"text": "An ancient form of prophecy", "isCorrect": false, "rationale": "The blazon is a praise catalogue, not a prophetic form."}], "id": "q02"}, {"question": "How does the speaker interpret the praises written by ancient poets?", "options": [{"text": "As accurate descriptions of their own contemporaries", "isCorrect": false, "rationale": "The speaker reinterprets them as prophecies about his beloved, not as accurate period portraits."}, {"text": "As prophetic prefigurings of his beloved's beauty", "isCorrect": true, "rationale": "'So all their praises are but prophecies / Of this our time, all you prefiguring.'"}, {"text": "As inferior work that should be forgotten", "isCorrect": false, "rationale": "The poet reads them with admiration as inadvertent prophecies, not as work to be dismissed."}, {"text": "As rival claims his beloved must surpass", "isCorrect": false, "rationale": "The ancient praises are recast as supportive prophecy, not competition."}], "id": "q03"}, {"question": "What limitation did ancient poets have that prevented them from fully praising the beloved?", "options": [{"text": "They wrote in languages too obscure to translate", "isCorrect": false, "rationale": "The limitation is described as insufficient skill, not linguistic difficulty."}, {"text": "They had only 'divining eyes' — foresight without the skill to express it fully", "isCorrect": true, "rationale": "'For they looked but with divining eyes, / They had not skill enough your worth to sing.'"}, {"text": "They had never seen true beauty and could only imagine it", "isCorrect": false, "rationale": "They had a kind of prophetic vision ('divining eyes'), but lacked the verbal skill to express what they sensed."}, {"text": "They wrote for audiences who could not appreciate beauty", "isCorrect": false, "rationale": "The problem is with the poets' skill, not their audiences' capacity."}], "id": "q04"}, {"question": "What paradox does the couplet introduce?", "options": [{"text": "Present eyes see more clearly than ancient eyes but feel less deeply", "isCorrect": false, "rationale": "Feeling is not the contrast; expression is."}, {"text": "Contemporary witnesses can see the beloved fully but cannot find adequate words to praise him", "isCorrect": true, "rationale": "'For we, which now behold these present days, / Have eyes to wonder, but lack tongues to praise.'"}, {"text": "Ancient poets praised beauty more eloquently than modern ones", "isCorrect": false, "rationale": "Ancient poets are shown as limited; the present ones also lack tongue — both fall short but in different ways."}, {"text": "The beloved is too humble to accept any praise at all", "isCorrect": false, "rationale": "The beloved's humility is not the issue; the inadequacy of language is."}], "id": "q05"}, {"question": "What is the effect of cataloguing body parts — 'hand, of foot, of lip, of eye, of brow' — in line 6?", "options": [{"text": "It shows the speaker memorized the beloved's appearance", "isCorrect": false, "rationale": "The list belongs to ancient texts, not to the speaker's own memory."}, {"text": "It illustrates the conventional blazon form that ancient poets used", "isCorrect": true, "rationale": "The list mimics the Renaissance blazon's typical inventory of physical beauties, showing what the ancient poets attempted."}, {"text": "It argues that the beloved's lower body is less beautiful than his face", "isCorrect": false, "rationale": "No hierarchy of body parts is suggested; the list is illustrative."}, {"text": "It replaces the triple refrain of 'fair, kind, and true' from the previous sonnet", "isCorrect": false, "rationale": "The catalogue is part of the blazon tradition being described, not a structural device replacing the previous sonnet's refrain."}], "id": "q06"}, {"question": "What does 'wasted time' mean in the opening line?", "options": [{"text": "Time squandered through laziness", "isCorrect": false, "rationale": "In Renaissance English 'wasted' often means 'past' or 'gone by,' not necessarily wasted through sloth."}, {"text": "Time that has passed away, the bygone past", "isCorrect": true, "rationale": "'Chronicle of wasted time' means the historical record of ages that have passed — time consumed and gone."}, {"text": "Time destroyed by war and conflict", "isCorrect": false, "rationale": "War is not the reference; 'wasted' means elapsed or consumed by the passage of years."}, {"text": "The poet's own wasted years of not writing", "isCorrect": false, "rationale": "The phrase refers to historical chronicles, not the poet's personal past."}], "id": "q07"}, {"question": "What is the primary theme of Sonnet CVI?", "options": [{"text": "The immortality of poetry over marble", "isCorrect": false, "rationale": "The immortality theme is more prominent in other sonnets; here the focus is on beauty transcending historical time."}, {"text": "The beloved's beauty as the fulfillment of all historical ideals of beauty", "isCorrect": true, "rationale": "The poem argues that all past descriptions of beauty were unknowingly prophesying the beloved's appearance, making him the culmination of history's aesthetic vision."}, {"text": "The failure of ancient poets to record beauty faithfully", "isCorrect": false, "rationale": "Ancient poets' failure is a means to the argument, not the theme itself."}, {"text": "The superiority of the speaker's own verse", "isCorrect": false, "rationale": "The speaker includes himself in the inadequacy — 'we... lack tongues to praise.'"}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
