<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker argue was NOT considered beautiful in the old age?", "options": [{"text": "Fair, light complexions", "isCorrect": false, "rationale": "Light complexions were traditionally prized as the standard of beauty."}, {"text": "Dark or black coloring", "isCorrect": true, "rationale": "The sonnet opens by stating that 'In the old age black was not counted fair' — darkness was excluded from the category of beauty."}, {"text": "Roses and coral", "isCorrect": false, "rationale": "Roses and coral are symbols of conventional beauty praised in other sonnets."}, {"text": "Golden hair", "isCorrect": false, "rationale": "Golden hair was a conventional Petrarchan beauty standard, not what the speaker addresses here."}], "id": "q01"}, {"question": "According to the speaker, why has beauty lost its good name?", "options": [{"text": "Because true beauty has grown rare in nature", "isCorrect": false, "rationale": "The speaker blames human artifice, not nature's scarcity."}, {"text": "Because art and cosmetics let anyone fake a fair appearance", "isCorrect": true, "rationale": "The speaker accuses 'Art's false borrowed face' of allowing people to 'fair the foul,' thereby cheapening authentic beauty."}, {"text": "Because poets have used too many clichés", "isCorrect": false, "rationale": "The blame falls on cosmetic art, not literary conventions."}, {"text": "Because society no longer admires women", "isCorrect": false, "rationale": "Society still admires beauty; the problem is that artificial beauty has displaced natural beauty."}], "id": "q02"}, {"question": "The phrase 'Art's false borrowed face' refers to which practice?", "options": [{"text": "Painting portraits with idealized features", "isCorrect": false, "rationale": "The phrase refers to personal cosmetic use, not portrait painting."}, {"text": "Using cosmetics to alter one's natural appearance", "isCorrect": true, "rationale": "'Art's false borrowed face' critiques the use of makeup and cosmetics to simulate a fairness one was not born with."}, {"text": "Writing flattering love poetry", "isCorrect": false, "rationale": "The criticism is directed at cosmetic practice, not literary praise."}, {"text": "Wearing elaborate fashionable clothing", "isCorrect": false, "rationale": "The sonnet focuses on facial beauty and cosmetics, not clothing."}], "id": "q03"}, {"question": "What color are the mistress's eyes described as?", "options": [{"text": "Sapphire blue", "isCorrect": false, "rationale": "Blue eyes were a Petrarchan ideal; the mistress's eyes are the opposite."}, {"text": "Raven black", "isCorrect": true, "rationale": "The speaker states 'my mistress' eyes are raven black,' establishing the Dark Lady's defining characteristic."}, {"text": "Golden brown", "isCorrect": false, "rationale": "The sonnet specifies raven black, not brown."}, {"text": "Sea grey", "isCorrect": false, "rationale": "Grey eyes appear in Sonnet CXXXII's morning sun image, not here as a description of the mistress."}], "id": "q04"}, {"question": "Why do the mistress's eyes 'seem like mourners'?", "options": [{"text": "Because she weeps for lost love", "isCorrect": false, "rationale": "The mourning is not personal grief but a symbolic commentary on false beauty."}, {"text": "Because their dark color matches the black mourning worn for beauty's corruption by false cosmetics", "isCorrect": true, "rationale": "Her black eyes suit the occasion of mourning for true beauty, which has been 'profaned' by artificial cosmetics."}, {"text": "Because she is grieving the death of a friend", "isCorrect": false, "rationale": "There is no literal mourning figure in this sonnet; the mourning is figurative."}, {"text": "Because she pities the speaker's suffering", "isCorrect": false, "rationale": "The mourning imagery here mourns beauty's loss to artifice, not the speaker's personal pain."}], "id": "q05"}, {"question": "What is the rhetorical effect of the couplet 'Yet so they mourn becoming of their woe, / That every tongue says beauty should look so'?", "options": [{"text": "It concedes that the mistress is truly ugly", "isCorrect": false, "rationale": "The couplet actually reverses the argument to claim her dark beauty is now the new standard."}, {"text": "It triumphantly redefines dark beauty as the new universal standard", "isCorrect": true, "rationale": "The couplet resolves the sonnet by asserting that her dark eyes mourn so beautifully that universal opinion declares this the true face of beauty."}, {"text": "It expresses the speaker's private delusion", "isCorrect": false, "rationale": "The speaker invokes 'every tongue,' appealing to universal consensus rather than private opinion."}, {"text": "It warns that beauty will soon fade", "isCorrect": false, "rationale": "The couplet is not about temporal decay but about redefining beauty's standard."}], "id": "q06"}, {"question": "What does 'bastard shame' mean in the context of this sonnet?", "options": [{"text": "The disgrace of illegitimacy", "isCorrect": false, "rationale": "While 'bastard' carries illegitimacy connotations, here it modifies 'shame' to describe the false reputation given to authentic beauty."}, {"text": "The illegitimate, undeserved disgrace suffered by true natural beauty", "isCorrect": true, "rationale": "Beauty has been 'slandered with a bastard shame' — its good name unjustly stolen by the proliferation of artificial cosmetic beauty."}, {"text": "The shame of being born with dark features", "isCorrect": false, "rationale": "The speaker does not view dark features as shameful; that is the false standard he is critiquing."}, {"text": "Immoral behavior in love affairs", "isCorrect": false, "rationale": "The phrase refers to reputation and beauty standards, not sexual morality."}], "id": "q07"}, {"question": "Which literary tradition does this sonnet primarily subvert?", "options": [{"text": "The pastoral tradition of rural simplicity", "isCorrect": false, "rationale": "Sonnets 127–154 engage with Petrarchan conventions, not pastoral conventions."}, {"text": "The Petrarchan convention praising fair, blonde beauty", "isCorrect": true, "rationale": "By valorizing dark coloring over the conventional fair complexion, Shakespeare subverts the Petrarchan ideal that dominated Renaissance love poetry."}, {"text": "The classical epic tradition of heroic beauty", "isCorrect": false, "rationale": "The sonnet targets Renaissance love-poetry conventions, not classical epic ideals."}, {"text": "The morality-play tradition linking beauty to virtue", "isCorrect": false, "rationale": "The sonnet debates beauty standards, not allegorical virtue."}], "id": "q08"}, {"question": "What double meaning does 'nature's power' carry in line 7?", "options": [{"text": "It refers only to the power of storms and seasons", "isCorrect": false, "rationale": "This reading ignores the cosmetic context."}, {"text": "It suggests that humans usurp nature's role as the bestower of beauty by using cosmetics", "isCorrect": true, "rationale": "'Each hand hath put on nature's power' means individuals have taken nature's prerogative into their own hands by altering their appearance with art."}, {"text": "It praises the power of natural dark beauty", "isCorrect": false, "rationale": "Nature's power is being critiqued as having been co-opted, not praised in itself."}, {"text": "It refers to poetic inspiration from nature", "isCorrect": false, "rationale": "The phrase is about cosmetic alteration of natural appearance, not poetic inspiration."}], "id": "q09"}, {"question": "The structure of Sonnet CXXVII follows which form?", "options": [{"text": "Petrarchan (Italian) sonnet: octave and sestet", "isCorrect": false, "rationale": "Shakespeare consistently uses his own English sonnet form, not the Italian form."}, {"text": "Shakespearean sonnet: three quatrains and a couplet", "isCorrect": true, "rationale": "Like all of Shakespeare's sonnets, this follows the ABAB CDCD EFEF GG rhyme scheme with three quatrains and a concluding couplet."}, {"text": "Spenserian sonnet with interlocking rhymes", "isCorrect": false, "rationale": "Spenserian sonnets use ABAB BCBC CDCD EE; Shakespeare's form does not use interlocking rhymes between quatrains."}, {"text": "Free verse with 14 lines", "isCorrect": false, "rationale": "The sonnet has a strict rhyme scheme and iambic pentameter — it is not free verse."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
