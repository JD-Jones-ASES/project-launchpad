<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the speaker describe his relationship to the beloved at the opening of Sonnet XXVI?", "options": [{"text": "As an equal partner in a mutual friendship", "isCorrect": false, "rationale": "The speaker explicitly uses feudal language of inferiority—“vassalage”—not equal partnership."}, {"text": "As a vassal or servant bound to a noble lord by duty and merit", "isCorrect": true, "rationale": "“Lord of my love, to whom in vassalage / Thy merit hath my duty strongly knit”—the speaker is a loyal vassal to the beloved’s lordship, a feudal relationship of service and devotion."}, {"text": "As a teacher instructing the beloved in the art of love", "isCorrect": false, "rationale": "No teaching relationship is described; the speaker is the inferior party, not an instructor."}, {"text": "As a rival competing with other poets for the beloved’s favor", "isCorrect": false, "rationale": "Rivalry is the concern of Sonnets XXI and other poems; Sonnet XXVI is about humble devotion."}]}, {"question": "What does the speaker send to the beloved in Sonnet XXVI?", "options": [{"text": "A gift of jewelry as a token of love", "isCorrect": false, "rationale": "No material gift is mentioned; the speaker sends a written message."}, {"text": "This written poem as an “embassage” (embassy or message) witnessing his duty", "isCorrect": true, "rationale": "“To thee I send this written embassage, / To witness duty, not to show my wit”—the poem itself is described as a diplomatic message or letter bearing witness to the speaker’s devotion."}, {"text": "A formal apology for having offended the beloved", "isCorrect": false, "rationale": "No specific offense is mentioned; the poem is a testimony of duty, not an apology."}, {"text": "A request for the beloved to come and visit the speaker", "isCorrect": false, "rationale": "The speaker does not issue an invitation; he sends a declaration of duty and deferred pride."}]}, {"question": "Why does the speaker say the poem may seem “bare”?", "options": [{"text": "The poem was written in haste and is poorly crafted", "isCorrect": false, "rationale": "The speaker does not admit to poor craftsmanship; the bareness comes from the humility of poor wit inadequate to the duty’s greatness."}, {"text": "His limited wit cannot find sufficient words to express the full greatness of his duty to the beloved", "isCorrect": true, "rationale": "Lines 5–8: the duty is so great that his poor wit “may make seem bare, in wanting words to show it”—his verbal resources are inadequate to the measure of his devotion."}, {"text": "The beloved is too busy to read long poems", "isCorrect": false, "rationale": "The beloved’s busyness is not the explanation; the speaker’s own perceived inadequacy is."}, {"text": "The speaker deliberately keeps the poem short to avoid boring the beloved", "isCorrect": false, "rationale": "Brevity as courtesy is not the speaker’s stated reason; he hopes the beloved’s soul will fill in what his words lack."}]}, {"question": "What does the speaker hope the beloved’s “good conceit” will do?", "options": [{"text": "Inspire the beloved to write an equally humble poem in reply", "isCorrect": false, "rationale": "The speaker does not request a reply poem; he hopes the beloved’s generous interpretation will supply what his words lack."}, {"text": "Fill in the gaps in the poem by reading it generously and seeing the full depth of duty it imperfectly expresses", "isCorrect": true, "rationale": "“I hope some good conceit of thine / In thy soul’s thought, all naked, will bestow it”—the beloved’s kind understanding will dress the bare poem in proper meaning."}, {"text": "Judge the poem by its sincerity rather than by its poetic skill", "isCorrect": false, "rationale": "While sincerity over skill is implied, the specific function of “good conceit” is to supply what the inadequate words cannot."}, {"text": "Share the poem with other lords who will admire its humility", "isCorrect": false, "rationale": "Sharing with others is not requested; the exchange is private between speaker and beloved."}]}, {"question": "What must happen before the speaker dares boast of his love openly?", "options": [{"text": "The beloved must write a poem confirming their mutual affection", "isCorrect": false, "rationale": "A reply poem is not the required event; the speaker awaits a favorable guiding star."}, {"text": "A guiding star must point on the speaker graciously and put “apparel” on his tattered love", "isCorrect": true, "rationale": "Lines 11–14: the speaker awaits the moment when “whatsoever star that guides my moving / Points on me graciously with fair aspect” and dresses his ragged suit in worthy clothing."}, {"text": "The speaker must win a public honor that makes him worthy of the beloved", "isCorrect": false, "rationale": "No specific public honor is required; the speaker’s readiness depends on celestial favor, not worldly achievement."}, {"text": "The beloved must publicly announce their love before witnesses", "isCorrect": false, "rationale": "Public announcement by the beloved is not the condition; it is the speaker’s own worthiness through celestial favor."}]}, {"question": "What does “puts apparel on my tatter’d loving” mean?", "options": [{"text": "The speaker needs to dress more formally when he visits the beloved", "isCorrect": false, "rationale": "No literal clothing is involved; the metaphor is about the speaker’s love being dressed in worthiness."}, {"text": "The guiding star will clothe the speaker’s poor, inadequate love in worthiness, making it presentable", "isCorrect": true, "rationale": "“Tatter’d loving” is the speaker’s love in its current ragged, insufficient state; the star’s favor will dress it in proper “apparel”—worthy garments—making it fit to present to the beloved."}, {"text": "Time has worn out the speaker’s love like an old garment", "isCorrect": false, "rationale": "Time is not the agent; the metaphor is about waiting for the right conditions to make his love appear worthy."}, {"text": "The beloved dresses the speaker in affection and care", "isCorrect": false, "rationale": "The beloved does not perform the dressing; it is the fortunate star that will provide the clothing metaphor."}]}, {"question": "The tone of Sonnet XXVI is best described as:", "options": [{"text": "Boastful and self-congratulatory", "isCorrect": false, "rationale": "The opposite is true; the speaker explicitly says he does not yet dare to boast and describes himself as inadequate."}, {"text": "Humbly deferential, with the speaker acknowledging his inadequacy and deferring public declaration of love", "isCorrect": true, "rationale": "The sonnet is pervaded by self-deprecation: poor wit, tattered love, bare words—the speaker positions himself as unworthy and waits for the right moment before claiming the right to declare his love."}, {"text": "Joyfully triumphant, celebrating the certainty of the beloved’s favor", "isCorrect": false, "rationale": "No triumph is claimed; the speaker is waiting for favorable conditions that have not yet arrived."}, {"text": "Bitter and resentful of the beloved’s superiority", "isCorrect": false, "rationale": "There is no resentment; the speaker accepts the hierarchy of vassal and lord as fitting given the beloved’s merit."}]}, {"question": "The feudal language (“vassalage,” “lord”) in Sonnet XXVI serves to:", "options": [{"text": "Suggest the speaker literally owes the beloved money or land", "isCorrect": false, "rationale": "The feudal language is entirely metaphorical; no literal property or financial obligation is described."}, {"text": "Express the depth and formality of the speaker’s devotion using the Petrarchan convention of the lover as humble servant", "isCorrect": true, "rationale": "The Petrarchan tradition often cast the lover as a vassal to the beloved’s superior virtue; Shakespeare deploys this language to articulate extreme humility and devoted service."}, {"text": "Criticize the social structure in which some people are lords and others are servants", "isCorrect": false, "rationale": "No social critique is intended; the feudal metaphor is a poetic convention for expressing the speaker’s deferential love."}, {"text": "Indicate that the beloved is a nobleman of higher social rank", "isCorrect": false, "rationale": "While this may reflect some biographical speculation, the language functions primarily as a Petrarchan metaphor rather than a literal claim about social rank."}]}, {"question": "What does “not show my head where thou mayst prove me” mean in the couplet?", "options": [{"text": "The speaker will physically hide from the beloved until the right time", "isCorrect": false, "rationale": "Physical hiding is not the point; the speaker is figuratively holding back from public declarations or confrontations."}, {"text": "The speaker will not present himself before the beloved for judgment until he is truly worthy", "isCorrect": true, "rationale": "“Prove me” means to test or judge; the speaker will not put himself in a position to be assessed by the beloved until the guiding star has made him worthy of the test."}, {"text": "The speaker is too ashamed to look the beloved in the eye", "isCorrect": false, "rationale": "Shame about past behavior is not the issue; the speaker is deferring a proud declaration until circumstances are right."}, {"text": "The speaker refuses to compete with other poets in the beloved’s presence", "isCorrect": false, "rationale": "Poetic competition is not the subject of this sonnet’s couplet; the concern is about proving worthy of the beloved’s judgment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
