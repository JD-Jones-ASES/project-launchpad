    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are 'Siren tears' (line 1) in the context of Sonnet CXIX?", "options": [{"text": "The speaker's own tears of regret after the affair", "isCorrect": false, "rationale": "The Siren tears are drunk by the speaker, not wept by him; they are the deceptive allurements of another."}, {"text": "Deceptive, alluring tears from a treacherous source that the speaker consumed", "isCorrect": true, "rationale": "Sirens in mythology lure sailors to destruction; 'Siren tears' are the seductive but poisonous emotional appeals of the person who led the speaker astray."}, {"text": "The youth's tears during the speaker's absence", "isCorrect": false, "rationale": "The tears belong to the treacherous other, not to the youth; they are 'drunk' as intoxicating potions."}, {"text": "Beautiful but futile poetic laments", "isCorrect": false, "rationale": "The tears are personal and deceptive, not poetic."}], "id": "q01"}, {"question": "What does 'limbecks foul as hell within' (line 2) describe?", "options": [{"text": "The furnaces of a blacksmith's forge", "isCorrect": false, "rationale": "A limbeck (alembic) is a distillation vessel, not a forge."}, {"text": "The distillation vessels — beautiful on the outside, corrupt within — from which the deceptive tears were drawn", "isCorrect": true, "rationale": "A limbeck distils liquids; the image combines the chemical purity of distillation with hellish inner corruption, suggesting the surface appeal concealing inner depravity."}, {"text": "The speaker's own conscience, tormented by guilt", "isCorrect": false, "rationale": "The limbecks are the source of the Siren tears, not the speaker's conscience."}, {"text": "Alchemical instruments used to create poison", "isCorrect": false, "rationale": "While the image is alchemical, the limbecks represent the treacherous source, not literal poison-making."}], "id": "q02"}, {"question": "The phrase 'applying fears to hopes, and hopes to fears' (line 3) describes:", "options": [{"text": "The speaker's rational calculation of risk and reward", "isCorrect": false, "rationale": "The phrase describes emotional confusion and instability, not rational calculation."}, {"text": "The constant emotional oscillation and confusion caused by the infatuation", "isCorrect": true, "rationale": "The speaker was perpetually switching between hope and fear, investing one where the other belonged — a portrait of emotional chaos during the affair."}, {"text": "The youth's alternating moods of love and coldness", "isCorrect": false, "rationale": "This line describes the speaker's internal state, not the youth's behavior."}, {"text": "A philosophical method of testing beliefs by their opposites", "isCorrect": false, "rationale": "No philosophical method is intended; the phrase conveys irrational emotional turmoil."}], "id": "q03"}, {"question": "What paradox is expressed in 'Still losing when I saw myself to win' (line 4)?", "options": [{"text": "The speaker won money at games but lost at love", "isCorrect": false, "rationale": "The paradox is emotional, not financial or literal."}, {"text": "Every apparent victory in the affair was actually a defeat, and the speaker only realized his loss at the moment of felt success", "isCorrect": true, "rationale": "The irony is that winning-in-the-moment was actually a form of losing — the speaker was deceived precisely when he felt most triumphant."}, {"text": "The youth won the argument whenever the speaker tried to end the relationship", "isCorrect": false, "rationale": "The line is about the speaker's relationship with the other party, not the youth."}, {"text": "Success in poetry came only during periods of personal failure", "isCorrect": false, "rationale": "Poetry is not the subject of this line."}], "id": "q04"}, {"question": "What does 'out of their spheres been fitted' (line 9) suggest about the speaker's eyes?", "options": [{"text": "He has been fitted with new spectacles to correct his vision", "isCorrect": false, "rationale": "The phrase is metaphorical, not about corrective lenses."}, {"text": "His eyes were knocked out of their natural orbits by the madness of the fever — he was blinded by passion", "isCorrect": true, "rationale": "Elizabethan astronomy imagined eyes as occupying spheres; 'fitted' out of them means violently displaced, suggesting the distortion of perception caused by mad passion."}, {"text": "He has been exiled from his proper place in society", "isCorrect": false, "rationale": "The eyes specifically are displaced; the image concerns perception, not social position."}, {"text": "His vision has been sharpened by suffering", "isCorrect": false, "rationale": "The displacement of eyes from spheres suggests distortion, not sharpening."}], "id": "q05"}, {"question": "The volta of Sonnet CXIX occurs at line 11 with 'O benefit of ill!' What reversal does this signal?", "options": [{"text": "The speaker decides the affair was not his fault after all", "isCorrect": false, "rationale": "No denial of blame follows; the reversal is about what good came from the bad experience."}, {"text": "The speaker discovers that the evil of the affair has produced a genuine benefit: a stronger, renewed love", "isCorrect": true, "rationale": "'O benefit of ill! now I find true / That better is, by evil still made better' — the ruined love, rebuilt, grows stronger than before."}, {"text": "The speaker turns away from the youth to pursue the affair further", "isCorrect": false, "rationale": "The volta moves toward return and renewal with the youth, not further straying."}, {"text": "The speaker concludes that all evil is ultimately good in disguise", "isCorrect": false, "rationale": "The claim is specifically about this love relationship, not a universal philosophical principle."}], "id": "q06"}, {"question": "Lines 13-14 claim that 'ruin'd love, when it is built anew, / Grows fairer than at first, more strong, far greater.' This is an example of:", "options": [{"text": "Understatement (litotes)", "isCorrect": false, "rationale": "The claim is emphatic and accumulative, not understated."}, {"text": "Climactic amplification — the rebuilt love surpasses the original in three qualities", "isCorrect": true, "rationale": "'Fairer than at first, more strong, far greater' adds three ascending qualities in sequence, building to a climax of strength and magnitude."}, {"text": "Irony — the speaker does not believe the love has truly improved", "isCorrect": false, "rationale": "In context the speaker sincerely claims the renewed love is better; no ironic undercutting follows."}, {"text": "Simile comparing love to architecture", "isCorrect": false, "rationale": "While building imagery is used ('built anew'), the statement is direct assertion, not a simile."}], "id": "q07"}, {"question": "The couplet says the speaker returns 'rebuk'd to my content' and 'gain by ill thrice more than I have spent.' What is meant by 'rebuk'd'?", "options": [{"text": "Formally condemned by the youth in a letter", "isCorrect": false, "rationale": "No letter of condemnation is described; 'rebuk'd' describes the speaker's chastened internal state."}, {"text": "Chastened and corrected by the experience of the affair's failure", "isCorrect": true, "rationale": "The speaker returns humbled and instructed — rebuked by events — which is the condition that allows genuine content (happiness) to be restored."}, {"text": "Publicly shamed before his peers", "isCorrect": false, "rationale": "The rebuke is personal and experiential, not a public shaming."}, {"text": "Strengthened and renewed, with no trace of shame", "isCorrect": false, "rationale": "'Rebuk'd' specifically carries the sense of having been corrected and chastened, not triumphant renewal."}], "id": "q08"}, {"question": "Sonnet CXIX differs from CXVII and CXVIII primarily in that it:", "options": [{"text": "Contains no self-criticism and blames the rival for the affair", "isCorrect": false, "rationale": "The speaker fully acknowledges his own errors; no blame is shifted."}, {"text": "Moves beyond apology to find a positive lesson in the straying: ruined love rebuilt grows greater", "isCorrect": true, "rationale": "CXVII apologizes; CXVIII explains the logic of straying; CXIX goes further and discovers that the ordeal has strengthened the love."}, {"text": "Addresses the Dark Lady rather than the Fair Youth", "isCorrect": false, "rationale": "The sonnet returns the speaker to 'my content' — the youth — not the Dark Lady."}, {"text": "Is written in the form of a dramatic monologue with the rival speaking", "isCorrect": false, "rationale": "The speaker throughout is the poet; no other voice intrudes."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
