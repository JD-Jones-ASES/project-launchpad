<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XL</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What has the beloved done that prompts the speaker's opening command “Take all my loves, my love, yea take them all”?", "options": [{"text": "The beloved has stolen the speaker's books and manuscripts", "isCorrect": false, "rationale": "No literal theft of property is described; the “lovs” taken are affections, and contextually the beloved has taken a mistress who was dear to the speaker."}, {"text": "The beloved has taken for himself the woman (or affections) the speaker also loved", "isCorrect": true, "rationale": "Reading Sonnet XL alongside XLI and XLII reveals the beloved has stolen the speaker's mistress; the speaker bitterly grants permission retroactively while acknowledging the beloved already had everything the speaker could give."}, {"text": "The beloved has ended the friendship and left the speaker alone", "isCorrect": false, "rationale": "The friendship is not simply ended; the specific betrayal is the beloved's involvement with someone the speaker also loved."}, {"text": "The beloved has published the speaker's private love letters", "isCorrect": false, "rationale": "No published letters are referenced; “loves” refers to affections and persons loved, not written communications."}], "id": "q01"}, {"question": "What is the logic behind “No love, my love, that thou mayst true love call” (line 3)?", "options": [{"text": "The speaker denies that any love between them exists", "isCorrect": false, "rationale": "The speaker does not deny love's existence; the line makes a philosophical point about the nature of what the beloved has gained."}, {"text": "The beloved gains nothing that can be called truly new, since everything the speaker had was already the beloved's", "isCorrect": true, "rationale": "The wordplay turns on: there is no love you have taken that qualifies as “true love” (genuine new acquisition) because “all mine was thine, before thou hadst this more” — it was already yours in spirit, so you steal nothing truly new."}, {"text": "True love can only exist between people who have never been separated", "isCorrect": false, "rationale": "Separation and reunification are not the logic here; the argument is about prior ownership of affections."}, {"text": "The beloved is incapable of experiencing genuine love", "isCorrect": false, "rationale": "The speaker does not claim the beloved is incapable of love; the point is that the beloved already owned what was taken."}], "id": "q02"}, {"question": "What double accusation does the speaker make in lines 7-10?", "options": [{"text": "The beloved is both a thief and a liar", "isCorrect": false, "rationale": "Lying is not the specific second accusation; the double charge is more precisely about hypocrisy and willful transgression."}, {"text": "The beloved is blameworthy for self-deception: using (taking) what the beloved's own moral sense refuses — knowingly doing wrong", "isCorrect": true, "rationale": "“But yet be blam'd, if thou thyself deceivest / By wilful taste of what thyself refusest” — the beloved, knowing it is wrong (“refusest” at the level of conscience), willfully indulges anyway, which is a form of deliberate self-deception that earns blame."}, {"text": "The beloved uses the speaker's money but refuses to spend it wisely", "isCorrect": false, "rationale": "Financial misuse is not described; the “taste” is of love/affection, not money."}, {"text": "The beloved steals from the speaker and also steals from others", "isCorrect": false, "rationale": "Theft from third parties is not the accusation; it is the beloved's hypocrisy — refusing at the conscience level what is willfully taken in practice."}], "id": "q03"}, {"question": "How does the speaker's declaration “I do forgive thy robbery, gentle thief” (line 11) function rhetorically?", "options": [{"text": "It ends all discussion and grants unconditional forgiveness without conditions", "isCorrect": false, "rationale": "The forgiveness is immediately qualified (“And yet, love knows it is a greater grief”); it is not unconditional."}, {"text": "It grants forgiveness while the oxymoron “gentle thief” simultaneously insists on the moral wrong — forgiveness does not erase culpability", "isCorrect": true, "rationale": "Calling the beloved a “gentlethief” joins grace (gentleness) and crime (theft) in a single phrase; forgiving does not cancel the fact of the wrong. Lines 13-14 further insist the pain remains despite the forgiveness."}, {"text": "It is sarcastic — the speaker does not actually forgive", "isCorrect": false, "rationale": "The forgiveness, while complex and pained, appears sincere; the speaker does not rescind it, though the pain continues."}, {"text": "It is a legal statement removing the possibility of any future complaint", "isCorrect": false, "rationale": "No legal finality is implied; lines 13-14 show the grief persists even after the declared forgiveness."}], "id": "q04"}, {"question": "What does “steal thee all my poverty” (line 12) mean?", "options": [{"text": "The beloved takes even the little that the speaker has — his poverty (meagerness) is all the beloved steals", "isCorrect": true, "rationale": "The speaker has so little (his emotional poverty) that even stealing everything is stealing almost nothing of worldly value; yet to the speaker it is everything, making the theft both pathetically small in the beloved's eyes and devastatingly total in the speaker's."}, {"text": "The beloved makes the speaker financially poor", "isCorrect": false, "rationale": "Financial poverty may be implied metaphorically but the primary sense is emotional and relational poverty — the speaker's meager store of affections."}, {"text": "The beloved steals from the poor as a form of charity", "isCorrect": false, "rationale": "No charitable motive is attributed; the speaker's point is about the totality of the beloved's taking."}, {"text": "The speaker boasts of being spiritually rich even while materially poor", "isCorrect": false, "rationale": "No spiritual boast is made here; the line emphasizes the pathos of a very small store being entirely taken."}], "id": "q05"}, {"question": "What distinction does the couplet draw between love's wrong and hate's injury?", "options": [{"text": "Hate's injury is more dangerous physically but love's wrong is more easily forgiven", "isCorrect": false, "rationale": "Ease of forgiveness is not the distinction; the distinction is about the relative depth of grief they cause."}, {"text": "Love's wrong causes greater grief than hate's known injury, because betrayal by a loved one cuts deeper than attack by an enemy", "isCorrect": true, "rationale": "“Love knows it is a greater grief / To bear love's wrong, than hate's known injury” — an enemy's harm is expected and known; a friend's or lover's betrayal wounds more deeply because it comes from where one trusted most."}, {"text": "Hate can be openly expressed while love must remain hidden", "isCorrect": false, "rationale": "Public versus private expression is not the distinction drawn; the comparison is between the degrees of grief each type of wrong produces."}, {"text": "Hate injures the body while love injures the soul", "isCorrect": false, "rationale": "The body-soul distinction does not appear; the comparison is about the magnitude of grief, not its location in body or soul."}], "id": "q06"}, {"question": "The final couplet (“Lascivious grace, in whom all ill well shows, / Kill me with spites yet we must not be foes”) contains an oxymoron. Identify it and explain its effect.", "options": [{"text": "“Kill me” is an oxymoron expressing the speaker's desire to die", "isCorrect": false, "rationale": "“Kill me” is hyperbolic but not oxymoronic; “lascivious grace” joins opposite moral qualities."}, {"text": "“Lascivious grace” — lust joined with grace — captures the beloved's paradoxical nature: moral wrongdoing made attractive by charm", "isCorrect": true, "rationale": "“Lascivious” (lewdly lustful) and “grace” (elegance, virtue) are opposites; joined in one phrase they embody the beloved's paradox — sins appear well-shown, even beautiful, in someone so graceful, making the beloved's wrongdoing simultaneously reprehensible and forgivable."}, {"text": "“All ill well shows” — evil appearing good — is the oxymoron and means the beloved is a hypocrite", "isCorrect": false, "rationale": "“All ill well shows” is a paradox within the couplet, but the oxymoron in the strict sense is “lascivious grace”, which directly joins two contradictory terms in one noun phrase."}, {"text": "“Must not be foes” is oxymoronic because they already are foes", "isCorrect": false, "rationale": "The speaker insists they are not and must not be foes; there is no actual enmity to make this oxymoronic."}], "id": "q07"}, {"question": "Sonnet XL initiates a three-sonnet cluster (XL-XLII) about the beloved's involvement with the speaker's mistress. What emotional stance does the speaker take in XL?", "options": [{"text": "Pure rage demanding the relationship end immediately", "isCorrect": false, "rationale": "The speaker explicitly says they must not be foes; rage demanding termination would contradict this stance."}, {"text": "Anguished, pained forgiveness that acknowledges the wrong while refusing to become enemies", "isCorrect": true, "rationale": "The speaker forgives (“I do forgive”), acknowledges the greater grief of love's wrong, employs the oxymoron “lascivious grace” to hold the contradiction, and ends by insisting on continuing friendship despite the hurt — a stance of painful but resolute forgiveness."}, {"text": "Indifference born of emotional exhaustion", "isCorrect": false, "rationale": "The speaker is clearly still emotionally engaged; the oxymoronic couplet and the articulation of grief show deep feeling, not indifference."}, {"text": "Sly satisfaction that the beloved has finally been caught in wrongdoing", "isCorrect": false, "rationale": "No satisfaction or vindication appears; the speaker is genuinely hurt and the tone is pained, not triumphant."}], "id": "q08"}, {"question": "The repeated play on the word “love” in lines 1-6 (“my loves,” “my love,” “No love, my love,” “my love,” “thy... love”) creates which effect?", "options": [{"text": "It clarifies the different types of love being discussed", "isCorrect": false, "rationale": "While the multiple senses of “love” do differentiate meanings, the primary rhetorical effect is more emotionally charged than merely classificatory."}, {"text": "It creates emotional and logical density — the word's multiple meanings (affection, beloved person, the concept of love) are all simultaneously in play, entangling the speaker in the very word he cannot escape", "isCorrect": true, "rationale": "By cycling “love” through different grammatical roles and senses in rapid succession, Shakespeare makes the word itself feel labyrinthine, trapping the speaker (and reader) in its contradictions — the speaker cannot talk about the beloved without talking about himself."}, {"text": "It is a metrical device to fill out the iambic pentameter lines", "isCorrect": false, "rationale": "While metrically convenient, the repetition is clearly a deliberate rhetorical and semantic strategy, not merely a filler."}, {"text": "It signals that the speaker has forgotten the beloved's name", "isCorrect": false, "rationale": "The Fair Youth sonnets consistently use “thou” and “thee” rather than a name; the repetition of “love” is rhetorical, not a sign of memory failure."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
