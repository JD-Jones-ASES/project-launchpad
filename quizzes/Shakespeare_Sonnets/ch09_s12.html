<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "During what season was the speaker absent from the beloved in Sonnet XCVIII?", "options": [{"text": "Winter, when the world was bare", "isCorrect": false, "rationale": "The absence was during spring, not winter — though the emotional effect was winter-like."}, {"text": "Spring, when proud-pied April was in its glory", "isCorrect": true, "rationale": "Line 1-2 specify the season: 'From you have I been absent in the spring, / When proud-pied April, dress'd in all his trim.' The natural world was at its most vivid, but the speaker could not participate."}, {"text": "Autumn, the season of harvest", "isCorrect": false, "rationale": "Autumn is the season of XCVII; XCVIII is specifically set in spring."}, {"text": "Summer, the hottest and most joyful time", "isCorrect": false, "rationale": "While summer is referenced, the governing season of XCVIII is spring (April)."}], "id": "q01"}, {"question": "What is meant by 'proud-pied April, dress'd in all his trim'?", "options": [{"text": "April is depicted as a proud, multi-colored figure decked in splendor", "isCorrect": true, "rationale": "'Proud-pied' means splendidly variegated in color; 'dress'd in all his trim' means attired in full finery. April is personified as a magnificently dressed figure — proud of his vivid, multi-colored display."}, {"text": "April is described as rainy and cold", "isCorrect": false, "rationale": "The description is of color and finery, not rain or cold."}, {"text": "April mourns the winter that has just passed", "isCorrect": false, "rationale": "April here is celebratory and brilliantly dressed, not mournful."}, {"text": "April is a modest and unassuming season", "isCorrect": false, "rationale": "'Proud-pied' explicitly signals splendor and pride, not modesty."}], "id": "q02"}, {"question": "What comic or surprising element appears in line 4 ('That heavy Saturn laugh'd and leap'd with him')?", "options": [{"text": "Saturn, the gloomy melancholy planet-god, was moved to laughter and leaping by spring's vitality", "isCorrect": true, "rationale": "Saturn in Renaissance psychology governs melancholy and heaviness. For even Saturn to laugh and leap indicates spring's extraordinary power to lift spirits — making the speaker's inability to share that joy all the more striking."}, {"text": "Saturn wept with envy at April's beauty", "isCorrect": false, "rationale": "Saturn is said to laugh and leap, not weep."}, {"text": "Saturn is the name of the speaker's horse", "isCorrect": false, "rationale": "Saturn is the classical deity associated with melancholy, not a horse's name."}, {"text": "Saturn and April are in conflict, and April wins", "isCorrect": false, "rationale": "Saturn joins April's joy rather than opposing it; the point is the universality of spring's power."}], "id": "q03"}, {"question": "Why could the speaker not enjoy the birds' songs or the flowers' scents?", "options": [{"text": "He was deaf and could not hear the birds", "isCorrect": false, "rationale": "No sensory impairment is described; the incapacity is emotional and relational."}, {"text": "Because nothing in nature could substitute for the beloved — all natural delights were mere 'figures of delight' compared to the beloved's pattern", "isCorrect": true, "rationale": "Lines 7-14 explain: the lays of birds and the sweet smells of flowers could not make a summer's story, because the flowers and their colors were only 'figures of delight, drawn after you, you pattern of all those.' The beloved is the original; nature is only a copy."}, {"text": "Because the absence made him ill and he could not go outdoors", "isCorrect": false, "rationale": "No illness is described; the incapacity is emotional and aesthetic."}, {"text": "Because the natural world was actually barren and ugly during his absence", "isCorrect": false, "rationale": "The opposite is true: the natural world was brilliantly beautiful, which makes the contrast with the speaker's inner winter all the more powerful."}], "id": "q04"}, {"question": "What does 'you pattern of all those' mean in line 14?", "options": [{"text": "The beloved is one example among many beautiful things", "isCorrect": false, "rationale": "'Pattern' here means the original model or archetype, not one example among many."}, {"text": "The beloved is the original archetype of which all beautiful natural things are merely copies", "isCorrect": true, "rationale": "'Pattern' in Elizabethan usage means the original model or template. All the flowers' beauty is drawn from the beloved — nature copies him, not the reverse."}, {"text": "The beloved follows the pattern of nature", "isCorrect": false, "rationale": "The direction of the relationship is reversed; nature follows the beloved's pattern."}, {"text": "The beloved is as beautiful as all the flowers combined", "isCorrect": false, "rationale": "While this captures part of the meaning, 'pattern' makes a stronger ontological claim: the beloved is the original from which nature derives its beauty."}], "id": "q05"}, {"question": "What does the couplet ('Yet seem'd it winter still, and you away, / As with your shadow I with these did play') mean?", "options": [{"text": "The speaker played happily with the flowers' shadows", "isCorrect": false, "rationale": "'Shadow' here means a copy or insubstantial image, not a literal shadow cast by the sun."}, {"text": "Despite all of spring's beauty, the season seemed like winter because the beloved was absent, and the speaker could only play with his shadow — a pale copy", "isCorrect": true, "rationale": "The couplet summarizes the sonnet: spring still felt like winter without the beloved. The flowers and songs were only shadows (copies) of the beloved — and playing with shadows is hollow compared to the real thing."}, {"text": "The speaker's shadow was his only companion during the absence", "isCorrect": false, "rationale": "The shadow is metaphorical; it refers to the flowers as copies of the beloved, not the speaker's literal shadow."}, {"text": "The winter was so long it outlasted spring", "isCorrect": false, "rationale": "The winter is emotional, not meteorological; spring was real but felt like winter due to absence."}], "id": "q06"}, {"question": "How does Sonnet XCVIII build on the themes of Sonnet XCVII?", "options": [{"text": "XCVII is about absence in winter; XCVIII is about presence in spring — completing the cycle", "isCorrect": false, "rationale": "Both sonnets are about absence; XCVII during summer/autumn, XCVIII during spring. Neither describes the beloved's presence."}, {"text": "Both sonnets use the inversion of emotional and physical seasons to express how absence transforms even natural abundance into subjective emptiness", "isCorrect": true, "rationale": "XCVII was absent during summer yet felt winter; XCVIII is absent during spring yet still feels winter. Both exploit the same paradox: the beloved's absence makes the richest natural seasons feel barren."}, {"text": "XCVIII introduces nature imagery for the first time in the chapter", "isCorrect": false, "rationale": "Nature imagery is already present in XCVII; XCVIII continues and extends it."}, {"text": "XCVIII is much less personal and more philosophical", "isCorrect": false, "rationale": "XCVIII is highly personal, directly addressing the beloved ('From you') and describing specific emotional responses."}], "id": "q07"}, {"question": "What does 'nor from their proud lap pluck them where they grew' mean?", "options": [{"text": "The speaker refused to pluck the flowers, showing restraint", "isCorrect": false, "rationale": "The point is not restraint but inability to engage with delight; he could not bring himself to pluck them because they were insufficient substitutes."}, {"text": "The speaker could not be moved to pick the flowers — even spring's finest offerings could not fully engage his attention or desire", "isCorrect": true, "rationale": "Not plucking flowers from their 'proud lap' means he could not even muster the engagement to gather them — spring's gifts were real but, in the beloved's absence, left him unmoved and uninterested."}, {"text": "The flowers grew in a protected royal garden and could not be removed", "isCorrect": false, "rationale": "No external prohibition is described; the inaction is the speaker's emotional failure to engage."}, {"text": "He was afraid of the flowers' thorns", "isCorrect": false, "rationale": "Fear of thorns is not the reason; the emotional incapacity is the point."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
