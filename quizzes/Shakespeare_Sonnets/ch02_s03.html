<script>
var QUESTIONS = [{"question": "According to the text, what is the 'first and most important' piece of advice for reading Shakespeare's sonnets?", "options": [{"text": "Memorize the rhyme scheme before reading any individual sonnet", "isCorrect": false, "rationale": "While identifying the rhyme scheme is recommended, the text names reading aloud — not memorizing the rhyme scheme — as the first and most important piece of advice."}, {"text": "Read the sonnets aloud", "isCorrect": true, "rationale": "The text states explicitly: 'The first and most important piece of advice is this: read the sonnets aloud.' Shakespeare wrote for performance; the sonnets want to be heard, not just seen."}, {"text": "Consult footnotes for every unfamiliar word before reading", "isCorrect": false, "rationale": "Using footnotes is recommended for archaic language, but it is a subsidiary strategy, not the first and most important piece of advice."}, {"text": "Read each sonnet at least ten times before attempting analysis", "isCorrect": false, "rationale": "The text recommends reading twice (once for sound, once for sense) but does not prescribe ten readings; the primary advice is to read aloud."}]}, {"question": "The text identifies three characteristic patterns of how Shakespeare uses his three quatrains. Which of the following is one of those patterns?", "options": [{"text": "Question — answer — refusal, where the third quatrain refuses to resolve what the first two established", "isCorrect": false, "rationale": "While some sonnets end without resolution, this is not listed among the three characteristic patterns; the text identifies statement-elaboration-complication, thesis-antithesis-synthesis, and three variations on a single theme."}, {"text": "Statement — elaboration — complication, where each quatrain advances the argument or shifts the angle of vision", "isCorrect": true, "rationale": "Statement-elaboration-complication is the first of the three characteristic patterns: the first quatrain states the idea, the second deepens it, and the third introduces a complication or counterexample — mirroring the structure of a good argument."}, {"text": "Introduction — climax — denouement, following a dramatic narrative arc", "isCorrect": false, "rationale": "Narrative dramatic structure is not among the three patterns the text identifies; Shakespeare's patterns are logical and argumentative rather than plot-driven."}, {"text": "Assertion — quotation — application, using external evidence to support the opening claim", "isCorrect": false, "rationale": "This describes an essay-writing strategy, not one of the three quatrain patterns identified in the text."}]}, {"question": "Sonnet 73 ('That time of year thou mayst in me behold') is cited as the classic example of which quatrain pattern?", "options": [{"text": "Thesis — antithesis — synthesis, where the three quatrains work through a logical tension", "isCorrect": false, "rationale": "Sonnet 73 is specifically cited as the example of the 'three variations on a single theme' pattern, not the thesis-antithesis-synthesis pattern."}, {"text": "Three variations on a single theme, where each quatrain offers a different metaphor for the same central feeling", "isCorrect": true, "rationale": "Sonnet 73 is the text's classic example: the first quatrain compares the speaker to late autumn, the second to fading dusk, the third to a dying fire — three distinct metaphors for the same theme of aging and approaching death."}, {"text": "Statement — elaboration — complication, where the argument grows progressively more complex", "isCorrect": false, "rationale": "Sonnet 73 does not use the statement-elaboration-complication pattern; its three metaphors are variations on a theme rather than an escalating argument."}, {"text": "Problem — counterexample — resolution, ending in a definitive solution", "isCorrect": false, "rationale": "This is not one of the three patterns identified in the text, nor is it an accurate description of how Sonnet 73 is structured."}]}, {"question": "What is anaphora, and which sonnet does the text use to illustrate it?", "options": [{"text": "The repetition of a word or phrase at the beginning of successive lines or clauses; illustrated by Sonnet 15", "isCorrect": true, "rationale": "Anaphora is defined as the repetition of a word or phrase at the start of successive lines or clauses. The text illustrates it with Sonnet 15's repeated 'When' ('When I consider everything that grows, / When I behold in fortune's gift decline')."}, {"text": "Direct address to an absent person or abstract quality; illustrated by Sonnet 19", "isCorrect": false, "rationale": "Direct address to an absent person or abstraction describes apostrophe, not anaphora. Sonnet 19 illustrates apostrophe in the text."}, {"text": "The placement of contrasting ideas in parallel grammatical structures; illustrated throughout the sonnets", "isCorrect": false, "rationale": "Parallel contrasting structures describes antithesis, not anaphora."}, {"text": "The use of a part to stand for the whole; illustrated by references to 'eyes' and 'pen'", "isCorrect": false, "rationale": "Using a part to stand for the whole describes synecdoche, not anaphora."}]}, {"question": "How does the text describe Time in Shakespeare's sonnets?", "options": [{"text": "As an ally of the poet, preserving beauty through verse", "isCorrect": false, "rationale": "Time is Shakespeare's great antagonist, not his ally; while poetry resists Time, Time itself is the destructive force the poet struggles against."}, {"text": "As a neutral background force that simply measures duration without destructive intent", "isCorrect": false, "rationale": "Time in the sonnets is anything but neutral; it is personified as actively destructive — with hands, a scythe, and a voice that whispers of decay."}, {"text": "As Shakespeare's great antagonist, personified obsessively with hands, a scythe, and a voice of decay", "isCorrect": true, "rationale": "The text states that Time is 'Shakespeare's great antagonist: he personifies it obsessively, giving it hands that carve wrinkles in a face, a scythe that harvests youth, a voice that whispers of decay.'"}, {"text": "As a philosophical abstraction discussed rationally rather than personified dramatically", "isCorrect": false, "rationale": "The text emphasizes Shakespeare's dramatic personification of Time — giving it physical attributes and agency — rather than rational philosophical discussion."}]}, {"question": "What is the difference between enjambment and end-stopping?", "options": [{"text": "Enjambment uses rhyme; end-stopping does not", "isCorrect": false, "rationale": "Rhyme and enjambment are separate features; enjambment refers to whether a sentence continues past a line ending, not to whether lines rhyme."}, {"text": "Enjambment has a sentence or phrase that continues past the line end; end-stopping has a line that concludes with a natural pause", "isCorrect": true, "rationale": "Enjambment carries sense across line endings without pause (creating momentum and urgency), while end-stopping concludes each line with a natural pause or punctuation mark (creating deliberateness and measured advance)."}, {"text": "Enjambment is used only in the quatrains; end-stopping is reserved for the couplet", "isCorrect": false, "rationale": "Both techniques appear throughout the sonnet; the text does not restrict them to specific positions. End-stopping is common in authoritative moments including the couplet, but enjambment can appear anywhere."}, {"text": "Enjambment slows the reader down; end-stopping creates speed and urgency", "isCorrect": false, "rationale": "The text describes the opposite: enjambment creates momentum and urgency by carrying the reader forward, while end-stopping creates deliberateness and measured steps."}]}, {"question": "Which imagery cluster in Shakespeare's sonnets is described as 'the most pervasive imagery system'?", "options": [{"text": "Accounting and law — debts, bonds, legacies, and trespass", "isCorrect": false, "rationale": "Legal and commercial imagery is one of the identified clusters, but the text identifies seasonal and natural imagery as the most pervasive system in the sonnets."}, {"text": "Warfare and siege — the lover's heart as a besieged city", "isCorrect": false, "rationale": "Military imagery is an identified cluster but is not described as the most pervasive; seasons and nature hold that distinction."}, {"text": "Seasons and nature — growth and decay modeling the human life cycle", "isCorrect": true, "rationale": "The text identifies seasons and nature as 'the most pervasive imagery system in the sonnets.' The natural cycle (spring/youth, summer/maturity, autumn/age, winter/death) models human life throughout the sequence."}, {"text": "Mirrors and reflection — eyes, glass, and water as images of self-knowledge", "isCorrect": false, "rationale": "Mirrors and reflection is an identified cluster, but the text reserves the 'most pervasive' designation for seasonal and natural imagery."}]}, {"question": "Why does the text recommend identifying the rhyme scheme before analyzing a sonnet's meaning?", "options": [{"text": "Because the rhyme scheme determines whether the sonnet is Petrarchan or Shakespearean, which changes how it should be interpreted", "isCorrect": false, "rationale": "While the rhyme scheme does identify the form, the text's reason for identifying it first is practical — it gives the reader an audible map that allows them to feel the poem's structure as they read."}, {"text": "Because the rhyme scheme is the poem's audible architecture, letting the reader feel when quatrains end and the couplet arrives", "isCorrect": true, "rationale": "The text explains: 'The rhyme scheme is the poem's audible architecture. Hearing it means you can feel when a quatrain ends and a new one begins — you are not just reading fourteen undifferentiated lines but three blocks plus a pair.'"}, {"text": "Because rhyming words always carry the poem's most important meanings and should be noted first", "isCorrect": false, "rationale": "The text does not claim that rhyming words are always most semantically important; the reason for identifying the scheme first is structural orientation, not lexical priority."}, {"text": "Because rhyme identification is required before Elizabethan vocabulary can be decoded", "isCorrect": false, "rationale": "Decoding archaic vocabulary is a separate task from identifying the rhyme scheme; the text does not link them in this way."}]}, {"question": "What signal words does the text suggest listening for when searching for the volta?", "options": [{"text": "'And,' 'also,' 'furthermore,' 'moreover' — additive connectors that build the argument", "isCorrect": false, "rationale": "Additive connectors indicate continuation, not turning; the volta is a shift in direction, so the text identifies contrastive or transitional words as signals."}, {"text": "'But,' 'yet,' 'however,' 'thus,' 'then,' 'and yet'", "isCorrect": true, "rationale": "The text lists these specific words as 'explicit markers of turning' that signal the volta: but, yet, however, thus, then, and yet."}, {"text": "'Because,' 'since,' 'therefore,' 'consequently' — causal connectors that explain the argument", "isCorrect": false, "rationale": "Causal connectors explain reasons but do not necessarily signal the directional turn of a volta; the text names contrastive and transitional words as the key signals."}, {"text": "'Lo,' 'hark,' 'behold,' 'see' — imperative words calling attention to the poem's key image", "isCorrect": false, "rationale": "These imperative attention-getters are not among the signal words the text identifies for locating the volta."}]}, {"question": "What common mistake does the text warn against when reading metered poetry?", "options": [{"text": "Reading too quickly to hear the rhyme scheme clearly", "isCorrect": false, "rationale": "Reading too quickly is not the specific mistake the text identifies; the warning is about pausing at the wrong places — at line ends rather than at punctuation."}, {"text": "Pausing at the end of every line as though each line were a complete unit of sense", "isCorrect": true, "rationale": "The text warns that pausing at every line end 'would produce awkward stutter rather than fluent verse.' Readers should follow the punctuation — pause at commas, stop at periods — not the line endings."}, {"text": "Counting syllables aloud while reading, which disrupts the natural flow", "isCorrect": false, "rationale": "The text specifically says 'you do not need to count syllables consciously while reading'; but this is advice, not a warning about a common mistake."}, {"text": "Spending too much time on the couplet and neglecting the three quatrains", "isCorrect": false, "rationale": "The text actually urges readers to re-read the couplet carefully; neglecting the couplet would be the opposite mistake."}]}, {"question": "In Elizabethan English, which pronoun form does 'thee' represent?", "options": [{"text": "The subject form of the second-person singular ('thou art')", "isCorrect": false, "rationale": "'Thou' is the subject form; 'thee' is the object form. The text distinguishes them: thou = subject, thee = object, thy/thine = possessive."}, {"text": "The object form of the second-person singular ('I see thee')", "isCorrect": true, "rationale": "The text explains the Elizabethan pronoun system: 'thou is the subject form, thee is the object form, and thy/thine are the possessive forms.' 'I see thee' is the text's own example."}, {"text": "The possessive form of the second-person singular ('thy beauty')", "isCorrect": false, "rationale": "The possessive form is 'thy' (before consonants) or 'thine' (before vowels); 'thee' is the object form, not the possessive."}, {"text": "The plural form of the second-person ('you all')", "isCorrect": false, "rationale": "In Elizabethan English, 'you/ye' was used for the plural or for formal singular address; 'thee' is the informal singular object form."}]}, {"question": "What does a trochee at the start of a line signal, according to the text's discussion of meter?", "options": [{"text": "That the line is irregular and likely contains a scribal error", "isCorrect": false, "rationale": "Metrical variations including trochees are deliberate expressive choices, not scribal errors; the text emphasizes that 'every significant departure from the norm carries interpretive weight.'"}, {"text": "Emphasis — the reversed stress draws attention to the opening word", "isCorrect": true, "rationale": "The text explains that a trochee (stress-unstress, the reverse of the iamb) at the start of a line signals emphasis; it cites Sonnet 66's opening ('Tired with all these') as an example where the trochee's heaviness enacts the exhaustion described."}, {"text": "That the poem is shifting from the Shakespearean to the Petrarchan form", "isCorrect": false, "rationale": "Metrical substitutions operate within a single poem's form; a trochee does not indicate a change from one sonnet type to another."}, {"text": "Speed — the reversed stress accelerates the reading tempo", "isCorrect": false, "rationale": "The text associates pyrrhic feet (two unstressed syllables) with speed and lightness, not trochees; trochees signal emphasis and weight."}]}, {"question": "What does the text say about how Shakespeare's use of enjambment compares to his contemporaries?", "options": [{"text": "He used enjambment less freely than his contemporaries, preferring the formal dignity of end-stopped lines", "isCorrect": false, "rationale": "The text states the opposite: Shakespeare 'uses enjambment more freely than many of his contemporaries,' giving his verse greater fluidity and urgency."}, {"text": "He used enjambment more freely than many contemporaries, making his verse more fluid and urgent than it appears on the page", "isCorrect": true, "rationale": "The text states: 'Shakespeare uses enjambment more freely than many of his contemporaries, and readers who follow the syntax across line breaks will find his verse more fluid and more urgent than it appears on the page.'"}, {"text": "He used enjambment exclusively in the quatrains and never in the couplet", "isCorrect": false, "rationale": "The text does not restrict enjambment to the quatrains; it discusses enjambment as a feature of his verse generally."}, {"text": "He was the first English poet to use enjambment deliberately as an expressive tool", "isCorrect": false, "rationale": "The text does not claim Shakespeare invented expressive enjambment; it notes that he used it more freely than many contemporaries, not that he introduced it."}]}, {"question": "The text describes the agricultural imagery cluster as appearing 'particularly' in which group of sonnets?", "options": [{"text": "The Dark Lady sonnets (127–154), where desire is compared to cultivation and harvest", "isCorrect": false, "rationale": "Agricultural imagery appears particularly in the procreation sonnets (1–17), not the Dark Lady group; the two clusters are distinct."}, {"text": "The procreation sonnets (1–17), where having children is the natural continuation of cultivation", "isCorrect": true, "rationale": "The text states that agricultural imagery 'appears particularly in the procreation sonnets (1–17), where having children is the natural continuation of the cycle of cultivation.'"}, {"text": "The rival poet sonnets, where literary competition is figured as competing harvests", "isCorrect": false, "rationale": "The rival poet sonnets are not specifically associated with agricultural imagery in the text; that cluster belongs primarily to the procreation group."}, {"text": "The time sonnets at the center of the sequence, where seasonal imagery frames mortality", "isCorrect": false, "rationale": "Seasonal imagery is the most pervasive system overall, but agricultural imagery specifically is associated with the procreation sonnets (1–17) in the text's discussion."}]}, {"question": "How does the text describe the experience of reading the 154 sonnets in sequence, as opposed to reading them individually?", "options": [{"text": "Sequential reading is discouraged because the sequence was not organized by Shakespeare himself", "isCorrect": false, "rationale": "The text encourages sequential reading; it explicitly says 'the sonnets were published as a sequence, and they reward sequential reading.'"}, {"text": "Sequential reading reveals that recurring images accumulate meaning and that the emotional narrative has a shape and development", "isCorrect": true, "rationale": "The text says reading sequentially allows 'recurring images [to] accumulate meaning; arguments begun in one sonnet are answered in another; the emotional narrative has a shape and a development.' The 154 sonnets form 'something closer to a single, vast, and carefully designed meditation.'"}, {"text": "Sequential reading is only recommended for scholars; casual readers should select individual poems", "isCorrect": false, "rationale": "The text makes no such distinction; it recommends sequential reading as a way to discover resonances and the larger architecture of the whole."}, {"text": "Sequential reading is most useful for identifying the autobiography behind the poems", "isCorrect": false, "rationale": "The text focuses on the aesthetic and structural rewards of sequential reading — accumulated imagery and emotional narrative shape — not on autobiographical reconstruction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
