    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker say about his eyes at the opening of Sonnet CXLI?", "options": [{"text": "That they find her beautiful despite all reason", "isCorrect": false, "rationale": "The eyes are among the senses that do NOT love her; the contrary senses make the heart's devotion more remarkable."}, {"text": "That they do not love her — they note a thousand errors in her", "isCorrect": true, "rationale": "'In faith I do not love thee with mine eyes, / For they in thee a thousand errors note' — unusually for a love sonnet, the eyes report flaws, not beauty."}, {"text": "That they see her as a goddess of perfect beauty", "isCorrect": false, "rationale": "The eyes note errors, not divine beauty."}, {"text": "That they are blind to her presence", "isCorrect": false, "rationale": "The eyes see her clearly — and see a thousand errors."}], "id": "q01"}, {"question": "What does the speaker say DOES love her, despite what the senses report?", "options": [{"text": "His reason and judgment", "isCorrect": false, "rationale": "Reason would be an ally of the senses here; it is the heart that loves despite both reason and sense."}, {"text": "His heart, which loves what his eyes despise", "isCorrect": true, "rationale": "'But 'tis my heart that loves what they despise, / Who, in despite of view, is pleased to dote' — the heart operates independently of both sight and reason, doting on what the eyes condemn."}, {"text": "His poetic imagination", "isCorrect": false, "rationale": "No distinction between imagination and judgment is drawn; the heart is the rogue faculty."}, {"text": "His memory of better days with her", "isCorrect": false, "rationale": "No retrospective argument is made; the heart loves presently, in spite of present evidence."}], "id": "q02"}, {"question": "Which five senses does the speaker specifically deny are engaged by the mistress?", "options": [{"text": "Sight, hearing, touch, taste, smell — all five are explicitly listed", "isCorrect": true, "rationale": "The second and third quatrains catalog all five senses: sight (eyes), hearing (ears / tongue's tune), touch (tender feeling), taste, and smell. None of them desires engagement with her."}, {"text": "Only sight and hearing are mentioned", "isCorrect": false, "rationale": "The sonnet is unusually comprehensive, listing all five senses."}, {"text": "Sight, touch, and taste only", "isCorrect": false, "rationale": "Hearing (ears) and smell are also explicitly mentioned."}, {"text": "The senses are not specified — only the heart and mind are contrasted", "isCorrect": false, "rationale": "The sonnet carefully names all five senses in opposition to the heart."}], "id": "q03"}, {"question": "What does 'nor tender feeling, to base touches prone' suggest about the speaker's physical relationship with her?", "options": [{"text": "That he finds her touch cold and unpleasant", "isCorrect": false, "rationale": "The line is about his own sense of touch, not her emotional temperature."}, {"text": "That even his sense of touch does not incline toward what he describes as base physical contact with her", "isCorrect": true, "rationale": "His touch faculty is not drawn to 'base touches' — physical contact with her. Even the sensory pleasure of touch does not endorse this relationship. 'Base' suggests degrading or lowly, reinforcing the self-condemning tone."}, {"text": "That his touch faculty is damaged or numb", "isCorrect": false, "rationale": "The touch sense works; it simply does not want to engage with her."}, {"text": "That he is embarrassed by his physical attraction to her", "isCorrect": false, "rationale": "The statement is that touch itself does not want engagement — not embarrassment."}], "id": "q04"}, {"question": "The phrase 'but my five wits nor my five senses can / dissuade one foolish heart from serving thee' expresses what idea?", "options": [{"text": "That love is a higher faculty than mere sense or intellect", "isCorrect": false, "rationale": "The sonnet does not frame the heart's love as higher; it frames it as foolish."}, {"text": "That even the combined testimony of all five wits and five senses cannot stop his heart's foolish devotion to her", "isCorrect": true, "rationale": "The five wits (inner faculties of reason) and five senses (outer faculties of perception) are marshaled in opposition to the heart, but the heart ignores them all. The heart is explicitly called 'foolish' — its love is not elevated but irrational."}, {"text": "That his mind and senses endorse his love but fear to act on it", "isCorrect": false, "rationale": "The wits and senses are against the love, not endorsing it; only the heart persists."}, {"text": "That true love transcends rational understanding", "isCorrect": false, "rationale": "While this is a possible romantic reading, the sonnet's tone is self-condemning rather than celebratory of irrationality."}], "id": "q05"}, {"question": "What does 'who leaves unsway'd the likeness of a man' mean?", "options": [{"text": "His heart has left behind the external appearance of humanity, becoming something bestial", "isCorrect": false, "rationale": "Close, but the image is specifically that the heart's defection leaves his outward human form standing uncontrolled — like a puppet without its operator."}, {"text": "His heart's departure to serve her leaves his outward body standing uncontrolled — merely the likeness of a man, not a functioning person", "isCorrect": true, "rationale": "His heart has gone over to serve her, leaving behind only 'the likeness of a man' — a shell, an appearance of a human being without the inner self that would govern it. He is reduced to a husk."}, {"text": "He resembles a man but feels himself to be nothing", "isCorrect": false, "rationale": "The image is more specific: his heart has literally defected to her service, leaving his body as an unsway'd (ungoverned) likeness."}, {"text": "He has become a statue — cold and unfeeling — through her neglect", "isCorrect": false, "rationale": "The likeness-of-a-man image is about the heart's defection, not emotional coldness."}], "id": "q06"}, {"question": "What does 'thy proud heart's slave and vassal wretch to be' add to the poem's description of his condition?", "options": [{"text": "It suggests mutual love between equals", "isCorrect": false, "rationale": "'Slave and vassal wretch' describes absolute subordination and degradation, not mutuality."}, {"text": "It names his condition in its full humiliation: slave, vassal, and wretch to her proud heart's service", "isCorrect": true, "rationale": "Three terms of increasing degradation: slave (property), vassal (feudal bondman), wretch (miserable creature). His heart serves her proud (indifferent, imperious) heart in the most abject manner imaginable."}, {"text": "It ironically praises her heart's nobility", "isCorrect": false, "rationale": "'Proud' in this context means cold and imperious, not noble in the positive sense."}, {"text": "It compares their relationship to feudal servitude approvingly", "isCorrect": false, "rationale": "The comparison to feudal servitude is self-condemning, not approving."}], "id": "q07"}, {"question": "What is the paradox in 'only my plague thus far I count my gain, / that she that makes me sin awards me pain'?", "options": [{"text": "That pain is secretly pleasurable to him", "isCorrect": false, "rationale": "The paradox is more theological: suffering as punishment is at least something — it makes him pay his debt."}, {"text": "That the only benefit his plague brings is that her causing him to sin also awards him pain — which is at least a fitting punishment", "isCorrect": true, "rationale": "The speaker finds a grim paradox: she causes him to sin (through lust/obsession), and she also awards him pain (her cruelty). The pain that is usually a loss becomes a kind of moral compensation — he sins and suffers for it, which is at least the right order of things."}, {"text": "That loving her is both his punishment and his reward", "isCorrect": false, "rationale": "This is close but imprecise; the specific gain identified is that her cruelty functions as appropriate punishment for his sin."}, {"text": "That he enjoys being mistreated as a form of masochism", "isCorrect": false, "rationale": "The couplet is theologically resigned, not masochistic."}], "id": "q08"}, {"question": "How does Sonnet CXLI function as a culminating statement of the Dark Lady sequence's central themes?", "options": [{"text": "It resolves the conflict by declaring his love pure and justified", "isCorrect": false, "rationale": "CXLI offers no resolution or justification; it deepens the portrait of irrational obsession."}, {"text": "It gathers the sequence's key themes — irrational obsession, self-knowledge without self-control, sin, and resigned suffering — into a comprehensive self-portrait of enslavement", "isCorrect": true, "rationale": "CXLI draws together the sequence's themes: his heart serves despite his own perception and reason (CXXXVII), the total catalog of the senses' rejection echoes the anti-blazon of CXXX, the heart as slave recalls CXXXIII-CXXXIV's language, and the final sin/pain couplet restates CXXIX's hell in explicitly moral terms."}, {"text": "It introduces new hope that the relationship will improve", "isCorrect": false, "rationale": "No hope is introduced; the tone is resigned."}, {"text": "It focuses only on physical desire, excluding the psychological themes of earlier sonnets", "isCorrect": false, "rationale": "CXLI is one of the sequence's most psychologically rich poems, gathering multiple threads."}], "id": "q09"}, {"question": "The poem's final turn from 'plague' to 'gain' represents what kind of resolution?", "options": [{"text": "A triumphant acceptance of love's power", "isCorrect": false, "rationale": "The acceptance is resigned and theologically colored, not triumphant."}, {"text": "A dark, resigned theological acceptance: sin produces suffering, which is at least appropriate — a bleak moral equilibrium", "isCorrect": true, "rationale": "The speaker cannot free himself, cannot stop sinning, and cannot escape pain. The only 'gain' is that his suffering is at least proportionate to his sin — a grim moral balance that is the sequence's closest approach to justice."}, {"text": "A rejection of the relationship and a turn toward repentance", "isCorrect": false, "rationale": "No rejection or turning away occurs; the speaker remains enslaved."}, {"text": "An ironic celebration of how good suffering feels", "isCorrect": false, "rationale": "The tone is earnest and resigned, not ironic celebration."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
