<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What philosophical premise does the speaker open with in Sonnet LIX?", "options": [{"text": "That beauty is eternal and unchanging", "isCorrect": false, "rationale": "The sonnet questions whether anything is truly new, not that beauty is eternal."}, {"text": "That there is nothing new under the sun — all things have existed before", "isCorrect": true, "rationale": "Lines 1–2 state: “If there be nothing new, but that which is / Hath been before.”"}, {"text": "That the beloved is more beautiful than anyone in history", "isCorrect": false, "rationale": "The speaker wonders how the ancients would have praised the beloved, not that the beloved surpasses all."}, {"text": "That writing poetry is a futile exercise", "isCorrect": false, "rationale": "The speaker laments the burden of repeating what has been said, but does not call poetry futile."}]}, {"question": "What does “The second burthen of a former child” mean in line 4?", "options": [{"text": "The speaker has written two poems about the same subject", "isCorrect": false, "rationale": "The line is metaphorical, not a literal reference to two specific poems."}, {"text": "The poet’s brain labors to produce what is really only a repetition of earlier work", "isCorrect": true, "rationale": "“Burthen” means burden or refrain; the brain “bears amiss” a second version of something already created."}, {"text": "Children carry the burdens of their parents’ generation", "isCorrect": false, "rationale": "The “child” here is a metaphor for a poem or idea, not a literal child."}, {"text": "The beloved is a reincarnation of someone from the past", "isCorrect": false, "rationale": "The sonnet entertains this possibility hypothetically but does not assert it."}]}, {"question": "How many years back does the speaker wish he could look to find the beloved’s image?", "options": [{"text": "One hundred years", "isCorrect": false, "rationale": "The speaker wishes to look back “even of five hundred courses of the sun.”"}, {"text": "One thousand years", "isCorrect": false, "rationale": "The text specifies five hundred, not one thousand."}, {"text": "Five hundred years", "isCorrect": true, "rationale": "Line 6 reads “Even of five hundred courses of the sun,” meaning five hundred years."}, {"text": "Fifty years", "isCorrect": false, "rationale": "Fifty years is not mentioned; the speaker seeks a much deeper historical record."}]}, {"question": "What does the speaker hope an “antique book” might reveal?", "options": [{"text": "Ancient wisdom about how to defeat time", "isCorrect": false, "rationale": "The speaker’s wish is more personal: to see the beloved’s likeness in an old text."}, {"text": "The beloved’s image as it appeared in an ancient record", "isCorrect": true, "rationale": "Lines 7–9 ask: “Show me your image in some antique book, / Since mind at first in character was done!”"}, {"text": "Proof that the speaker’s poetry is superior to that of the ancients", "isCorrect": false, "rationale": "The couplet suggests the opposite — that ancient poets praised worse subjects admiringly."}, {"text": "Evidence that humanity has morally improved over centuries", "isCorrect": false, "rationale": "The speaker wonders whether humanity is “mended” or not, but seeks visual proof about the beloved, not moral evidence."}]}, {"question": "The phrase “this composed wonder of your frame” (line 12) refers to what?", "options": [{"text": "A portrait painted of the beloved", "isCorrect": false, "rationale": "The speaker is referring to the beloved’s physical person, not an artwork."}, {"text": "The beloved’s physical beauty and being", "isCorrect": true, "rationale": "“Frame” means body; “composed wonder” praises the remarkable composition of the beloved’s form."}, {"text": "The structure of the sonnet itself", "isCorrect": false, "rationale": "While “frame” can relate to poetic form, context here makes clear it is the beloved’s body."}, {"text": "A wonder of the ancient world", "isCorrect": false, "rationale": "The speaker is addressing the beloved directly, not referencing an ancient monument."}]}, {"question": "What three alternatives does the speaker consider in lines 13–14?", "options": [{"text": "Whether the beloved is mortal, immortal, or something in between", "isCorrect": false, "rationale": "The alternatives concern humanity’s progress, not the beloved’s nature."}, {"text": "Whether we moderns are improved, whether the ancients were better, or whether change is cyclical", "isCorrect": true, "rationale": "Lines 13–14: “Wh’r we are mended, or wh’r better they, / Or whether revolution be the same.”"}, {"text": "Whether to write in English, Latin, or Greek", "isCorrect": false, "rationale": "The sonnet does not address language choice."}, {"text": "Whether to love, to write, or to remain silent", "isCorrect": false, "rationale": "These are not the alternatives posed in lines 13–14."}]}, {"question": "What is the function of the volta in Sonnet LIX?", "options": [{"text": "It introduces a new beloved who surpasses all ancient beauties", "isCorrect": false, "rationale": "No new beloved is introduced; the couplet draws a conclusion about ancient praise."}, {"text": "It shifts from philosophical speculation to a confident conclusion about ancient poets", "isCorrect": true, "rationale": "After questioning whether the past was better, the couplet asserts: “sure I am the wits of former days / To subjects worse have given admiring praise.”"}, {"text": "It abandons the time theme and turns to the speaker’s own grief", "isCorrect": false, "rationale": "The volta does not introduce personal grief; it resolves the historical comparison."}, {"text": "It questions whether poetry can outlast time", "isCorrect": false, "rationale": "The immortality-through-verse theme does not appear in this sonnet’s couplet."}]}, {"question": "What does the couplet ultimately claim about the beloved?", "options": [{"text": "That the beloved is less worthy than subjects praised in the past", "isCorrect": false, "rationale": "The couplet claims the opposite: ancient poets praised inferior subjects."}, {"text": "That ancient poets, praising worse subjects, would have praised the beloved even more", "isCorrect": true, "rationale": "The speaker is certain (“O! sure I am”) that former wits gave admiring praise to worse subjects, implying the beloved is superior."}, {"text": "That no poet, ancient or modern, can adequately praise the beloved", "isCorrect": false, "rationale": "The couplet focuses on comparing subjects, not on poetry’s inadequacy."}, {"text": "That the speaker’s verse will outlast the works of ancient poets", "isCorrect": false, "rationale": "The couplet says nothing about the durability of the speaker’s verse."}]}, {"question": "What literary device is used in “five hundred courses of the sun”?", "options": [{"text": "Personification", "isCorrect": false, "rationale": "The sun is not given human qualities here; it is used as a measure of time."}, {"text": "Periphrasis (circumlocution for “five hundred years”)", "isCorrect": true, "rationale": "Rather than saying “five hundred years,” the speaker uses the sun’s annual course as an elevated, indirect expression of time."}, {"text": "Oxymoron", "isCorrect": false, "rationale": "There is no contradiction in the phrase “five hundred courses of the sun.”"}, {"text": "Hyperbaton", "isCorrect": false, "rationale": "Hyperbaton is an inversion of normal word order, which is not the primary device in this phrase."}]}, {"question": "The overall tone of Sonnet LIX can best be described as:", "options": [{"text": "Despairing and resigned to time’s destruction", "isCorrect": false, "rationale": "The speaker is intellectually curious and ultimately flattering toward the beloved, not despairing."}, {"text": "Philosophically curious and ultimately complimentary toward the beloved", "isCorrect": true, "rationale": "The sonnet poses historical and philosophical questions before landing on a confident compliment in the couplet."}, {"text": "Bitter and resentful toward the beloved", "isCorrect": false, "rationale": "There is no bitterness; the speaker admires and praises the beloved throughout."}, {"text": "Joyful and celebratory", "isCorrect": false, "rationale": "The mood is reflective and questioning rather than joyful."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
