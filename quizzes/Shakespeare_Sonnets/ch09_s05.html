    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What items does the speaker list in the first quatrain as sources of pride for different people?", "options": [{"text": "Birth, skill, wealth, bodily strength, garments, hawks and hounds, and horses", "isCorrect": true, "rationale": "Lines 1-4 enumerate: birth, skill, wealth, body's force, garments, hawks and hounds, and horse — each representing a different class of worldly pride."}, {"text": "Birth, beauty, poetry, music, and dancing", "isCorrect": false, "rationale": "Poetry and music are not in this list; the speaker focuses on aristocratic and material pleasures."}, {"text": "Gold, silver, jewels, and lands", "isCorrect": false, "rationale": "These material items are not specifically listed; the categories are broader social and recreational markers."}, {"text": "Youth, age, wisdom, and folly", "isCorrect": false, "rationale": "These are not the items listed; the first quatrain catalogs social distinctions and pastimes."}], "id": "q01"}, {"question": "What does the speaker claim sets his own source of pride apart from all the others?", "options": [{"text": "His ability to write poetry", "isCorrect": false, "rationale": "Poetry is not mentioned as his source of superiority."}, {"text": "The beloved's love, which surpasses all the worldly pride listed", "isCorrect": true, "rationale": "Lines 9-12 argue that the beloved's love is better than birth, richer than wealth, more delightful than hawks and horses — therefore the speaker boasts 'of all men's pride.'"}, {"text": "His noble birth and ancestry", "isCorrect": false, "rationale": "The speaker explicitly values the beloved's love over high birth."}, {"text": "His philosophical wisdom", "isCorrect": false, "rationale": "Wisdom is not presented as the speaker's source of superiority over those who glory in material things."}], "id": "q02"}, {"question": "What does 'new-fangled ill' mean in line 3 ('some in their garments though new-fangled ill')?", "options": [{"text": "Fashionable though poorly made", "isCorrect": true, "rationale": "'New-fangled' means excessively fond of novelty or fashionable; 'ill' indicates the garments are poorly designed despite their fashionableness — a dismissive comment on those who take pride in trendy but badly made clothing."}, {"text": "Old-fashioned and worn out", "isCorrect": false, "rationale": "'New-fangled' means the opposite of old-fashioned; it refers to excessive novelty."}, {"text": "Newly purchased but well made", "isCorrect": false, "rationale": "The 'ill' qualifier negates any sense of good quality."}, {"text": "Dyed in new colors", "isCorrect": false, "rationale": "Color is not the meaning; the phrase refers to fashionable novelty combined with poor quality."}], "id": "q03"}, {"question": "The phrase 'every humour hath his adjunct pleasure' means:", "options": [{"text": "Every person's temperament or disposition has its own corresponding enjoyment", "isCorrect": true, "rationale": "'Humour' in Elizabethan usage refers to temperament or personality type; 'adjunct pleasure' is the pleasure that naturally accompanies it. Each personality type finds its own particular joy."}, {"text": "Every joke has its own punchline", "isCorrect": false, "rationale": "'Humour' here is not comedy but the Elizabethan concept of temperament or disposition."}, {"text": "All bodily fluids produce emotions", "isCorrect": false, "rationale": "While 'humour' derives from the theory of bodily fluids, the phrase here means personality type and its pleasures."}, {"text": "Every season has its own weather", "isCorrect": false, "rationale": "Seasons are not the subject; 'humour' refers to human temperament."}], "id": "q04"}, {"question": "What is the critical turn in the couplet of Sonnet XCI?", "options": [{"text": "The speaker suddenly praises the beloved's faults", "isCorrect": false, "rationale": "No faults are praised in the couplet; the turn introduces vulnerability, not fault."}, {"text": "The speaker acknowledges that his single source of pride — the beloved's love — can be taken away, leaving him 'most wretched'", "isCorrect": true, "rationale": "The couplet introduces the volta: having all pride concentrated in one source (the beloved) means total vulnerability. The beloved could take everything away, making the speaker most wretched."}, {"text": "The speaker rejects the beloved and seeks other joys", "isCorrect": false, "rationale": "The speaker does not reject the beloved; the couplet intensifies the attachment even as it names the danger."}, {"text": "The speaker reveals that all worldly pride is actually superior to love", "isCorrect": false, "rationale": "The argument does not reverse; the couplet shows the danger of concentrated dependence, not the superiority of worldly pride."}], "id": "q05"}, {"question": "How does the structure of Sonnet XCI (catalog followed by a single alternative, then a couplet reversal) function rhetorically?", "options": [{"text": "It shows the speaker is indecisive about what he values", "isCorrect": false, "rationale": "The speaker is decisive in choosing the beloved's love over all else; the structure reinforces this by listing alternatives only to dismiss them."}, {"text": "It builds a comprehensive worldly inventory to make the beloved's love seem more valuable, then reveals the vulnerability of investing in one source", "isCorrect": true, "rationale": "The catalog of twelve lines makes the beloved's love appear to surpass every conceivable human value, making the couplet's reversal more devastating: all that praise creates the ultimate vulnerability."}, {"text": "It argues that material wealth is more reliable than love", "isCorrect": false, "rationale": "Material wealth is used as the foil to love, not as its superior."}, {"text": "It demonstrates Shakespeare's knowledge of Elizabethan hobbies", "isCorrect": false, "rationale": "Though the catalog reflects Elizabethan culture, the rhetorical function is argumentative, not encyclopedic."}], "id": "q06"}, {"question": "What emotion does 'Wretched in this alone' convey?", "options": [{"text": "Confident self-pity used to manipulate the beloved", "isCorrect": false, "rationale": "While the couplet may function strategically, its stated emotion is genuine wretchedness, not calculated manipulation."}, {"text": "A single point of radical vulnerability amid otherwise complete joy", "isCorrect": true, "rationale": "The speaker has just declared himself superior to all other men in having the beloved's love; 'wretched in this alone' identifies the one crack in that joy — the beloved could remove it."}, {"text": "Contentment with partial happiness", "isCorrect": false, "rationale": "Wretchedness is not contentment; the word signals existential danger."}, {"text": "Anger at fortune", "isCorrect": false, "rationale": "The fear is directed at the beloved's potential choice, not at fortune as an abstraction."}], "id": "q07"}, {"question": "The phrase 'All these I better in one general best' means:", "options": [{"text": "He is better at all these activities than anyone else", "isCorrect": false, "rationale": "The claim is not about the speaker's skill at these activities but about having something that supersedes them all."}, {"text": "He surpasses all those particular sources of pride by having one supreme good — the beloved's love", "isCorrect": true, "rationale": "'Better' is used as a verb meaning to surpass or excel; 'one general best' is the beloved's love, which comprehends and outstrips all the particular goods listed."}, {"text": "All worldly goods are generally good", "isCorrect": false, "rationale": "This misreads the comparative structure; the speaker dismisses all particulars in favor of one supreme good."}, {"text": "He prefers general pleasures to specific ones", "isCorrect": false, "rationale": "The point is not about preference for the general over the specific but about the beloved's love as the supreme single good."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
