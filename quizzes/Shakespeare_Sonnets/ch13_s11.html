<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CLII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What accusation does the speaker make against himself at the start of Sonnet CLII?", "options": [{"text": "He has stolen from her", "isCorrect": false, "rationale": "Theft is not the accusation; breach of oath is."}, {"text": "He is forsworn — he has broken oaths — in loving her", "isCorrect": true, "rationale": "'In loving thee thou know'st I am forsworn' — he begins by acknowledging his own perjury."}, {"text": "He has slandered her to others", "isCorrect": false, "rationale": "Slander is not the accusation against himself; perjury in love-vows is."}, {"text": "He has wasted his talent writing about her", "isCorrect": false, "rationale": "Wasted talent is not the opening charge; broken oaths are."}]}, {"question": "In what way is the Dark Lady 'twice forsworn' according to the speaker?", "options": [{"text": "She broke her vow to God and her vow to her husband", "isCorrect": false, "rationale": "While both may be implied, the specific 'twice' is broken in vowing love to him and then vowing new hate after new love."}, {"text": "She broke her bed-vow (marital oath) and then broke a new oath by vowing fresh hate after new love", "isCorrect": true, "rationale": "'In act thy bed-vow broke, and new faith torn, / In vowing new hate after new love bearing' — two separate oath-violations."}, {"text": "She has lied to him twice about being available and faithful", "isCorrect": false, "rationale": "The specific 'twice' is structural — two named oaths broken, not two lies told."}, {"text": "She has vowed loyalty to two different men at the same time", "isCorrect": false, "rationale": "Simultaneous vows to two men is not the precise structure; the two violations are sequential."}]}, {"question": "The speaker suddenly reverses the accusation in lines 7-8 — 'But why of two oaths' breach do I accuse thee, / When I break twenty?' What rhetorical effect does this create?", "options": [{"text": "It diminishes his earlier accusation and redirects moral blame onto himself", "isCorrect": true, "rationale": "The sudden self-accusation — 'I am perjur'd most' — turns the entire argument from her guilt to his greater guilt, a device of radical self-condemnation."}, {"text": "It exaggerates her guilt by comparison to show how much worse she is", "isCorrect": false, "rationale": "The reversal makes him worse, not her; 'I am perjur'd most' assigns maximum guilt to himself."}, {"text": "It introduces a third party whose perjuries exceed both of theirs", "isCorrect": false, "rationale": "No third party appears; the reversal is a self-accusation."}, {"text": "It shifts from emotional argument to legal argument", "isCorrect": false, "rationale": "The legal metaphor (oaths, forsworn) was already present; the shift is in who receives blame, not in the mode of argument."}]}, {"question": "What does the speaker mean when he says 'all my vows are oaths but to misuse thee'?", "options": [{"text": "All his declarations of love to her have been lies meant to exploit or deceive her", "isCorrect": true, "rationale": "'All my vows are oaths but to misuse thee' — every promise he made was made in bad faith, to use her rather than love truly."}, {"text": "He has taken vows against her behind her back", "isCorrect": false, "rationale": "Secret vows against her are not the meaning; the vows are to her, made dishonestly."}, {"text": "All his vows have been to misuse language (perjury) in general", "isCorrect": false, "rationale": "The object of misuse is specifically 'thee' — she is the one deceived."}, {"text": "His vows were made with misuse of religious ritual", "isCorrect": false, "rationale": "Liturgical misuse is not the claim; the vows are personal love-oaths made insincerely."}]}, {"question": "What does the phrase 'gave eyes to blindness' mean?", "options": [{"text": "He blinded himself willingly to her faults in order to praise her", "isCorrect": true, "rationale": "'To enlighten thee, gave eyes to blindness' — to make her seem bright (enlighten), he surrendered his eyes' ability to see clearly, i.e., chose not to see her faults."}, {"text": "He donated his sight to someone else as a sacrifice for love", "isCorrect": false, "rationale": "Literal donation of vision is not the meaning; the giving is of clear sight to a state of blindness."}, {"text": "He taught blindness to others by spreading false reports of her beauty", "isCorrect": false, "rationale": "Teaching others to be blind is not the self-referential meaning here."}, {"text": "He received blind faith from her instead of honest love", "isCorrect": false, "rationale": "The subject is his own act of blinding himself, not something received from her."}]}, {"question": "The final couplet — 'For I have sworn thee fair; more perjured I, / But I my mistress so foul a lie' — makes what confession?", "options": [{"text": "He confesses that swearing her fair was the greatest perjury because she is, in truth, foul", "isCorrect": true, "rationale": "His ultimate sin is praising her as fair when she is foul — he has told the most extravagant lie of all in calling her beautiful."}, {"text": "He confesses that she told a foul lie about him that he swore was fair", "isCorrect": false, "rationale": "The lie is his own, sworn about her; she is not the one lying in this couplet."}, {"text": "He admits his vows to her were fair but she repaid them with foul treatment", "isCorrect": false, "rationale": "His vows are not defended as fair; the whole point is that they were perjury."}, {"text": "He accepts that calling love 'fair' is always a lie, philosophically speaking", "isCorrect": false, "rationale": "A philosophical generalization is not the confession; the specific lie about this specific mistress is."}]}, {"question": "Sonnet CLII is unique in the sequence for its exhaustive catalogue of perjuries. What cumulative effect does this produce?", "options": [{"text": "It exonerates the speaker by showing he is too confused to be truly culpable", "isCorrect": false, "rationale": "Confusion does not exonerate; the sonnet accumulates guilt explicitly: 'I am perjur'd most.'"}, {"text": "It builds to a devastating self-indictment in which the speaker is more guilty of perjury than the woman he initially accused", "isCorrect": true, "rationale": "The accumulation — his forswearing, her double forswearing, his twenty oaths, his vows to misuse her, his blindness given to praise, his final sworn lie of her fairness — ends in total self-condemnation."}, {"text": "It suggests that perjury is so common in love that no one is truly guilty", "isCorrect": false, "rationale": "Relativism that dissolves guilt is not the conclusion; 'I am perjur'd most' singles him out."}, {"text": "It creates a comic effect, lightening the moral weight of the chapter", "isCorrect": false, "rationale": "While there is rhetorical wit, the cumulative effect is somber self-indictment, not comic lightness."}]}, {"question": "The word 'forsworn' and related oath-breaking language appears multiple times in this sonnet. What moral/theological resonance does perjury carry in this context?", "options": [{"text": "Perjury in Elizabethan England was only a civil offence without moral stigma", "isCorrect": false, "rationale": "Oath-breaking was gravely moral and theological in Shakespeare's world — oaths were sworn before God."}, {"text": "Oaths were sworn before God, so breaking them was both a moral and spiritual offense — making the speaker and lady both guilty before heaven", "isCorrect": true, "rationale": "In Renaissance culture, to be 'forsworn' was not just to lie but to violate a sacred oath witnessed by God — the accumulation of broken vows is therefore spiritually catastrophic."}, {"text": "Oath-breaking was only significant in legal contracts, with no personal or spiritual dimension", "isCorrect": false, "rationale": "Personal and spiritual dimensions were central; love-vows sworn informally still carried divine weight."}, {"text": "Perjury is used ironically to mean nothing more than inconsistency of emotion", "isCorrect": false, "rationale": "While irony is present, the word's full moral and spiritual weight is in play, not reduced to mere inconsistency."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
