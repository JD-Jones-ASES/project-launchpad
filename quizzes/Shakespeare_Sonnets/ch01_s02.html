<script>
var QUESTIONS = [{"question": "How many plays did Shakespeare write or co-write over the course of his career?", "options": [{"text": "21", "isCorrect": false, "rationale": "21 is far fewer than the actual figure given in the source."}, {"text": "37", "isCorrect": true, "rationale": "The source states Shakespeare wrote or co-wrote 37 plays over a career spanning roughly twenty-five years."}, {"text": "44", "isCorrect": false, "rationale": "44 is higher than the figure given; the source cites 37 plays."}, {"text": "154", "isCorrect": false, "rationale": "154 is the number of sonnets, not plays."}], "id": "q01"}, {"question": "According to the source, what common feature defines Shakespeare's comedies?", "options": [{"text": "They are uniformly light and sunny, with no darker undertones.", "isCorrect": false, "rationale": "The source explicitly states that even in the sunniest comedies there is 'a shadow at the edge of the frame' — a note of melancholy or cruelty the festive ending cannot dissolve."}, {"text": "They involve confused identities, crossed lovers, witty banter, and a final resolution in marriage, but even the sunniest contain a shadow of melancholy.", "isCorrect": true, "rationale": "The source describes this shared grammar of the comedies while also noting that figures like Malvolio and Antonio remain excluded or humiliated — 'comedies with their eyes open.'"}, {"text": "They were all written before 1595 and represent Shakespeare's earliest phase.", "isCorrect": false, "rationale": "The source does not claim all comedies predate 1595; it describes them as the earliest cluster but does not give a firm cutoff date."}, {"text": "They were written exclusively as entertainment for court audiences at Whitehall.", "isCorrect": false, "rationale": "The source describes the comedies as part of the public theatre repertoire, not as exclusive court entertainment."}], "id": "q02"}, {"question": "Which character does the source identify as perhaps Shakespeare's greatest comic creation?", "options": [{"text": "Bottom from A Midsummer Night's Dream", "isCorrect": false, "rationale": "Bottom is not mentioned in the source in this context; the greatest comic creation named is Falstaff."}, {"text": "Malvolio from Twelfth Night", "isCorrect": false, "rationale": "Malvolio is mentioned as an example of an excluded figure in comedy, not as the greatest comic creation."}, {"text": "Falstaff from the Henry IV plays", "isCorrect": true, "rationale": "The source states Falstaff, who dominates the Henry IV plays, is 'perhaps Shakespeare's greatest comic creation — a figure so alive he seems to overflow the plays that contain him.'"}, {"text": "Puck from A Midsummer Night's Dream", "isCorrect": false, "rationale": "Puck is not mentioned in the source; Falstaff is named as the greatest comic creation."}], "id": "q03"}, {"question": "What raw historical material did Shakespeare draw on for his history plays?", "options": [{"text": "The Anglo-Saxon Chronicle", "isCorrect": false, "rationale": "The source does not mention the Anglo-Saxon Chronicle; Shakespeare's histories drew on Holinshed's Chronicles."}, {"text": "Holinshed's Chronicles", "isCorrect": true, "rationale": "The source states the history plays refashion the raw material of Holinshed's Chronicles into something approaching myth."}, {"text": "Froissart's Chronicles", "isCorrect": false, "rationale": "Froissart is not mentioned in the source; the histories are based on Holinshed's Chronicles."}, {"text": "Plutarch's Lives", "isCorrect": false, "rationale": "Plutarch's Lives is the source for the Roman tragedies, not the English history plays discussed here."}], "id": "q04"}, {"question": "Which four plays does the source identify as the 'four great tragedies of the middle period'?", "options": [{"text": "Romeo and Juliet, Julius Caesar, Antony and Cleopatra, Coriolanus", "isCorrect": false, "rationale": "These are Roman tragedies; the source names a different set as the four great tragedies of the middle period."}, {"text": "Hamlet, Othello, King Lear, and Macbeth", "isCorrect": true, "rationale": "The source explicitly names Hamlet, Othello, King Lear, and Macbeth as the four great tragedies of the middle period, all written within a half-dozen years around the turn of the century."}, {"text": "Titus Andronicus, Hamlet, Othello, and King Lear", "isCorrect": false, "rationale": "Titus Andronicus is not listed among the four great tragedies in the source; Macbeth is the fourth, not Titus."}, {"text": "Hamlet, Macbeth, The Tempest, and The Winter's Tale", "isCorrect": false, "rationale": "The Tempest and The Winter's Tale are late romances, not tragedies; the four great tragedies named are Hamlet, Othello, King Lear, and Macbeth."}], "id": "q05"}, {"question": "How does the source characterise the late romances compared to Shakespeare's earlier work?", "options": [{"text": "They are simpler and more conventional than the tragedies, aimed at popular audiences.", "isCorrect": false, "rationale": "The source describes the romances as 'stranger and more difficult' than earlier work, not simpler or more conventional."}, {"text": "They are stranger and more difficult, with archaic plots involving long separations, improbable reunions, and a hard-won wisdom about loss and forgiveness.", "isCorrect": true, "rationale": "The source describes the late romances as deliberately archaic in their plots and steeped in a hard-won wisdom about loss and forgiveness that feels entirely authentic."}, {"text": "They are purely comic and lighter in tone than the comedies of the 1590s.", "isCorrect": false, "rationale": "The source describes them as combining elements of tragedy and comedy in a distinctive way, not as lighter than the early comedies."}, {"text": "They were all collaborative works written with John Fletcher.", "isCorrect": false, "rationale": "The source names Pericles, Cymbeline, The Winter's Tale, and The Tempest as the late romances; The Tempest is described as 'almost certainly Shakespeare's last sole-authored play.'"}], "id": "q06"}, {"question": "What did Shakespeare call Venus and Adonis in his dedication to Southampton?", "options": [{"text": "\"the crown of my endeavours\"", "isCorrect": false, "rationale": "This phrase is not in the source; Shakespeare called the poem 'the first heir of my invention.'"}, {"text": "\"the first heir of my invention\"", "isCorrect": true, "rationale": "The source quotes Shakespeare's dedication calling Venus and Adonis 'the first heir of my invention,' suggesting he did not yet rate his plays as serious literary achievements."}, {"text": "\"my humble gift to England's Muse\"", "isCorrect": false, "rationale": "This phrase does not appear in the source; the actual phrase is 'the first heir of my invention.'"}, {"text": "\"a trifle unworthy of your lordship's eye\"", "isCorrect": false, "rationale": "This conventional modesty formula is not the phrase quoted in the source."}], "id": "q07"}, {"question": "What is the subject matter of The Rape of Lucrece?", "options": [{"text": "The myth of Venus and the beautiful mortal Adonis, drawn from Ovid.", "isCorrect": false, "rationale": "That is the subject of Venus and Adonis; Lucrece concerns a different Roman story."}, {"text": "The Roman story of Tarquin's violation of the chaste Lucrecia and its political consequences, including the founding of the Roman Republic.", "isCorrect": true, "rationale": "The source states Lucrece retells the Roman story of Tarquin's violation of Lucrecia and its political consequences, including the expulsion of the Tarquin kings and the founding of the Roman Republic."}, {"text": "The story of Cleopatra's fall and the death of Antony, derived from Plutarch.", "isCorrect": false, "rationale": "That story belongs to the play Antony and Cleopatra; Lucrece concerns the Roman Republic's founding."}, {"text": "A fictional tale of courtly love set in Elizabethan England.", "isCorrect": false, "rationale": "The poem is set in ancient Rome, not Elizabethan England, and draws on historical material from Ovid's Fasti."}], "id": "q08"}, {"question": "According to the source, how did the publication of Venus and Adonis differ from the impact of Shakespeare's plays?", "options": [{"text": "The poem was a commercial failure, while the plays made Shakespeare famous.", "isCorrect": false, "rationale": "The source states the opposite: Venus and Adonis went through ten editions and made its author famous in a way that his plays, traded among theatrical companies, could not."}, {"text": "The poem went through ten editions and made its author famous in a way the plays, traded among theatrical companies, could not.", "isCorrect": true, "rationale": "The source explains that Venus and Adonis was a runaway bestseller going through ten editions in Shakespeare's lifetime, making him famous in a way his commercially traded plays could not."}, {"text": "The poem was suppressed by the authorities, while the plays circulated freely.", "isCorrect": false, "rationale": "There is no mention of suppression; the poem was a bestseller."}, {"text": "The poem and plays were equally popular and both made Shakespeare's name in the 1590s.", "isCorrect": false, "rationale": "The source draws a clear distinction between the poem's literary fame and the plays' commercial but less prestigious circulation."}], "id": "q09"}, {"question": "What evidence does the source cite for sonnets being in circulation by 1598?", "options": [{"text": "A letter from Southampton praising several of the sonnets by name.", "isCorrect": false, "rationale": "No such letter is mentioned; the evidence comes from Francis Meres' literary survey."}, {"text": "Francis Meres' literary survey Palladis Tamia referred to Shakespeare's 'sugared sonnets among his private friends.'", "isCorrect": true, "rationale": "The source states that Francis Meres, in Palladis Tamia (1598), referred to Shakespeare's 'sugared sonnets among his private friends,' proving sonnets were in circulation."}, {"text": "A pirated anthology called The Passionate Pilgrim published in 1598.", "isCorrect": false, "rationale": "The Passionate Pilgrim appeared in 1599, not 1598, and the 1598 evidence comes from Meres' survey, not that anthology."}, {"text": "A record in the Stationers' Register from 1598 listing several sonnets.", "isCorrect": false, "rationale": "The Stationers' Register entry cited in the source is from 1609 for the full quarto, not from 1598."}], "id": "q10"}, {"question": "Which play does the source describe as 'almost certainly Shakespeare's last sole-authored play'?", "options": [{"text": "The Winter's Tale", "isCorrect": false, "rationale": "The Winter's Tale is a late romance but not described as Shakespeare's last sole-authored play."}, {"text": "Henry VIII", "isCorrect": false, "rationale": "Henry VIII is mentioned as a collaborative work with John Fletcher, not as Shakespeare's last sole-authored play."}, {"text": "The Tempest", "isCorrect": true, "rationale": "The source states The Tempest is 'almost certainly Shakespeare's last sole-authored play' and that Prospero's renunciation of his magic has been read as a figure for the playwright laying down his pen."}, {"text": "Cymbeline", "isCorrect": false, "rationale": "Cymbeline is a late romance but is not identified in the source as Shakespeare's last sole-authored play."}], "id": "q11"}, {"question": "The source notes a shared emotional terrain between the sonnets and which Shakespearean play, citing the 'green-eyed monster' passage?", "options": [{"text": "Hamlet", "isCorrect": false, "rationale": "Hamlet is connected to the sonnets in a different context in the source, relating to mortality and the ideal vs. actual; the 'green-eyed monster' belongs to Othello."}, {"text": "Macbeth", "isCorrect": false, "rationale": "Macbeth is connected to the sonnets through the 'tale told by an idiot' speech, not the 'green-eyed monster.'"}, {"text": "Othello", "isCorrect": true, "rationale": "The source quotes Othello's 'green-eyed monster which doth mock the meat it feeds on' as belonging to the same psychological world as the tortured possessiveness of the Dark Lady sonnets."}, {"text": "King Lear", "isCorrect": false, "rationale": "King Lear is not cited in the source for the 'green-eyed monster' passage; that passage is from Othello."}], "id": "q12"}, {"question": "How does the source connect Romeo and Juliet to the world of the sonnets?", "options": [{"text": "Romeo's dying speech is structured as a sonnet addressed to Juliet's beauty.", "isCorrect": false, "rationale": "The source does not describe Romeo's dying speech in this way; it highlights a different structural feature."}, {"text": "The play opens with a prologue in sonnet form summarising the entire plot.", "isCorrect": false, "rationale": "While the prologue is indeed a sonnet, the source specifically highlights the shared sonnet between the lovers at their first meeting, not just the prologue."}, {"text": "Romeo and Juliet opens with a shared sonnet between the lovers at their first meeting — a dialogue in fourteen lines that performs the very thing it describes.", "isCorrect": true, "rationale": "The source states that Romeo and Juliet opens with a shared sonnet between the lovers, 'a dialogue in fourteen lines that performs the very thing it describes, the miraculous meeting of two souls in language.'"}, {"text": "Juliet's balcony speech is a compressed sonnet sequence of three linked poems.", "isCorrect": false, "rationale": "The source does not describe the balcony speech this way; the shared sonnet at the first meeting is what the source specifically notes."}], "id": "q13"}, {"question": "What is the broad scholarly consensus regarding the dating of most of the sonnets?", "options": [{"text": "They were all composed in a single concentrated burst in 1608-1609, just before publication.", "isCorrect": false, "rationale": "The source presents broad consensus placing the bulk of the sequence in the 1590s, with some possibly as late as 1609, not a single concentrated burst."}, {"text": "The bulk of the sequence was composed in the 1590s, with some poems possibly revised or newly composed as late as 1603-1609.", "isCorrect": true, "rationale": "The source states the broad consensus places the bulk of the sequence in the 1590s, with some poems possibly revised or newly composed as late as 1603-1609."}, {"text": "They were written entirely in the period of the great tragedies, between 1600 and 1608.", "isCorrect": false, "rationale": "The source places the bulk in the 1590s, not the tragedies period, though it notes some later Dark Lady poems feel closer in spirit to the tragedies."}, {"text": "Scholars agree they were composed over three distinct phases with clear breaks between them.", "isCorrect": false, "rationale": "The source does not describe three distinct phases with clear breaks; it presents a general range and notes uncertainty about the exact chronology."}], "id": "q14"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
