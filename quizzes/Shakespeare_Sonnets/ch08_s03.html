<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the speaker describe his emotional state when writing about the youth in the opening line?", "options": [{"text": "Emboldened and energized", "isCorrect": false, "rationale": "The opposite is expressed: the speaker says he faints, showing weakness rather than boldness."}, {"text": "Faint and uncertain, knowing a better spirit uses the youth's name", "isCorrect": true, "rationale": "Line 1 opens: 'O how I faint when I of you do write,' immediately establishing the speaker's sense of inadequacy in the face of the rival."}, {"text": "Angry and resentful toward the rival poet", "isCorrect": false, "rationale": "The tone is self-deprecating and resigned rather than angry; the speaker accepts inferiority even as he continues writing."}, {"text": "Indifferent to the rival's existence", "isCorrect": false, "rationale": "The rival's existence is precisely what causes the speaker's faintness; he is far from indifferent."}], "id": "q01"}, {"question": "What is the extended metaphor that organizes the central argument of Sonnet LXXX?", "options": [{"text": "The rival and the speaker as two suns competing for brightness", "isCorrect": false, "rationale": "No sun imagery appears in this sonnet; the dominant metaphor is nautical."}, {"text": "Two ships sailing on the ocean of the youth's worth, one large and one small", "isCorrect": true, "rationale": "The speaker develops an extended nautical metaphor: the youth's worth is a broad ocean, the rival is a tall proud ship, and the speaker is a small, saucy bark barely staying afloat."}, {"text": "Two athletes racing toward a prize with the youth as the finish line", "isCorrect": false, "rationale": "No athletic or racing imagery appears; the competition is framed in nautical terms."}, {"text": "Two birds nesting in the same tree, each trying to occupy the highest branch", "isCorrect": false, "rationale": "No bird or tree imagery is used in this sonnet."}], "id": "q02"}, {"question": "How does the speaker characterize his own poetic vessel in comparison to the rival's?", "options": [{"text": "His ship is faster but smaller; the rival's is slow but massive", "isCorrect": false, "rationale": "Speed is not the contrast drawn; the distinction is between a saucy (impudent) inferior bark and a ship of tall building and goodly pride."}, {"text": "His is an inferior, saucy bark while the rival's is a ship of tall building and goodly pride", "isCorrect": true, "rationale": "Lines 9-14 contrast 'my saucy bark, inferior far to his' with 'he of tall building, and of goodly pride,' making the speaker's self-deprecation explicit."}, {"text": "His ship carries the youth's love as cargo; the rival's ship carries only ambition", "isCorrect": false, "rationale": "No cargo metaphor is developed; the contrast is about the vessels' size and worthiness, not their contents."}, {"text": "Both ships are equal; only the ocean decides which one survives", "isCorrect": false, "rationale": "The speaker explicitly calls his vessel 'inferior far' to the rival's, rejecting any equality."}], "id": "q03"}, {"question": "What does 'your shallowest help will hold me up afloat' (line 11) suggest about the speaker's relationship with the youth?", "options": [{"text": "Even minimal support from the youth is enough to sustain the speaker's poetry", "isCorrect": true, "rationale": "The line conveys that even the most casual or surface-level acknowledgment from the youth is sufficient to keep the speaker's humble verse going, unlike the rival who demands the youth's depths."}, {"text": "The speaker resents the youth for offering only shallow praise", "isCorrect": false, "rationale": "The speaker is not resentful here; he gratefully accepts even the least the youth can offer."}, {"text": "The speaker can only write about trivial subjects because he lacks deep knowledge", "isCorrect": false, "rationale": "The shallowness refers to the minimum of the youth's support, not to the speaker's subjects or intellect."}, {"text": "The youth's shallow nature prevents serious poets from writing about him", "isCorrect": false, "rationale": "The youth is consistently presented as worthy and deep; 'shallowest' modifies the help offered, not the youth's character."}], "id": "q04"}, {"question": "What does the rival do that the speaker cannot, according to the ocean metaphor?", "options": [{"text": "The rival sails on the youth's soundless (unfathomable) deep", "isCorrect": true, "rationale": "Line 12 states the rival 'upon your soundless deep doth ride,' meaning the rival's greater talent can navigate and exploit the full depth of the youth's worth."}, {"text": "The rival can cross the ocean and reach foreign shores", "isCorrect": false, "rationale": "Reaching foreign shores is not part of the metaphor; it concerns the depth of the waters, not a destination."}, {"text": "The rival never risks being wrecked because the ocean protects him", "isCorrect": false, "rationale": "The safety from wreck comes from the rival's superior vessel, not from special protection by the ocean."}, {"text": "The rival can calm the ocean's storms through the power of his verse", "isCorrect": false, "rationale": "No storm-calming imagery appears; the contrast is about the depth of water the rival can sail."}], "id": "q05"}, {"question": "What does the speaker predict will happen if he is wrecked (lines 13-14)?", "options": [{"text": "His wreck will prove the youth's cruelty and damage the youth's reputation", "isCorrect": false, "rationale": "The speaker does not threaten the youth's reputation; he accepts potential wreck as the natural result of his inferiority."}, {"text": "He will be a worthless boat while the rival with his tall ship thrives", "isCorrect": true, "rationale": "Lines 13-14 state: 'Or, being wrack'd, I am a worthless boat, / He of tall building, and of goodly pride,' accepting that the rival will prevail over him."}, {"text": "His love for the youth will survive even after his verse is destroyed", "isCorrect": false, "rationale": "The couplet addresses the consequence of his wreck, but the focus is on the contrast of fates, not the survival of love."}, {"text": "He will rebuild and return stronger than before", "isCorrect": false, "rationale": "There is no suggestion of rebuilding; the speaker accepts possible destruction with resignation."}], "id": "q06"}, {"question": "What does the couplet identify as the worst consequence for the speaker?", "options": [{"text": "Being publicly humiliated by the rival's superior skill", "isCorrect": false, "rationale": "Public humiliation is not mentioned; the speaker's worst outcome is a private, emotional one."}, {"text": "His love for the youth was the very thing that brought about his ruin", "isCorrect": true, "rationale": "The couplet reads: 'Then if he thrive and I be cast away, / The worst was this: my love was my decay,' identifying love itself as the cause of his potential undoing."}, {"text": "The youth choosing the rival permanently and never returning to the speaker", "isCorrect": false, "rationale": "While the youth's preference for the rival is implied, the 'worst' the speaker names is the irony of love being the cause of decay, not abandonment itself."}, {"text": "Writing verse that will not survive to future generations", "isCorrect": false, "rationale": "The concern about literary immortality belongs to other sonnets; here the worst is the personal irony of loving what destroys you."}], "id": "q07"}, {"question": "The phrase 'wilfully appear' (line 10) regarding the speaker's bark suggests:", "options": [{"text": "The speaker continues to write about the youth despite knowing he is inferior", "isCorrect": true, "rationale": "'Wilfully' indicates deliberate, perhaps stubborn, choice — the speaker sails on the youth's main not because he is capable but because he chooses to persist despite acknowledged inferiority."}, {"text": "The speaker is angry and appears before the youth to demand recognition", "isCorrect": false, "rationale": "'Wilfully appear' refers to persisting in verse, not making a confrontational personal appearance."}, {"text": "The speaker's bark moves without his control, driven by love", "isCorrect": false, "rationale": "'Wilfully' implies the speaker's own deliberate agency, not involuntary motion."}, {"text": "The speaker accidentally becomes visible to the rival and is embarrassed", "isCorrect": false, "rationale": "The appearance is intentional and described on the ocean of the youth's worth, not in a social encounter with the rival."}], "id": "q08"}, {"question": "The word 'soundless' (line 12) in the phrase 'your soundless deep' primarily means:", "options": [{"text": "Silent, as the deep ocean makes no sound", "isCorrect": false, "rationale": "While 'soundless' can mean silent, in this context it means unable to be sounded or measured in depth — unfathomable."}, {"text": "Too deep to be measured by a sounding line; unfathomable", "isCorrect": true, "rationale": "In nautical language, 'to sound' means to measure water depth with a weighted line. 'Soundless deep' means depth that cannot be measured, indicating the youth's worth is beyond measure."}, {"text": "A depth that swallows sound so no echo returns", "isCorrect": false, "rationale": "While evocative, this is not the primary meaning; the nautical sense of 'sound' (to measure depth) is operative here."}, {"text": "A part of the ocean where ships sail without making noise", "isCorrect": false, "rationale": "The silence of sailing is not the point; the unfathomable depth of the youth's worth is what the word conveys."}], "id": "q09"}, {"question": "What makes Sonnet LXXX unusual compared to other Rival Poet sonnets?", "options": [{"text": "It never directly mentions the rival poet at all", "isCorrect": false, "rationale": "The rival is present throughout, described as a 'better spirit' and as the tall ship."}, {"text": "The speaker accepts his inferiority openly while still choosing to persist in writing", "isCorrect": true, "rationale": "Unlike sonnets that argue against the rival's merit, LXXX remarkably concedes the rival's superiority yet insists on the speaker's right to continue writing out of love, ending with the poignant admission that love itself may be his ruin."}, {"text": "It praises the rival as a model the speaker hopes to imitate", "isCorrect": false, "rationale": "The speaker does not express a desire to imitate the rival; he merely acknowledges inferiority while persisting."}, {"text": "It is addressed to the rival rather than to the Fair Youth", "isCorrect": false, "rationale": "The sonnet is addressed to the youth, speaking of the rival in the third person."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
