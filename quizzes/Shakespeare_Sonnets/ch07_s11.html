<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Sonnet LXIX claim the world’s eye can see in the beloved?", "options": [{"text": "A deeply flawed character beneath a beautiful exterior", "isCorrect": false, "rationale": "The opening says outward praise lacks nothing; the flaw is hinted at only through others’ deeper examination."}, {"text": "Parts that want nothing the thought of hearts could improve — perfect outward beauty", "isCorrect": true, "rationale": "Lines 1–2: “Those parts of thee that the world’s eye doth view / Want nothing that the thought of hearts can mend.”"}, {"text": "A beauty that rivals ancient heroes", "isCorrect": false, "rationale": "Historical comparison is not the subject of this sonnet."}, {"text": "Evidence that the beloved is a reincarnation of former greatness", "isCorrect": false, "rationale": "Reincarnation is not addressed in this sonnet."}], "id": "q01"}, {"question": "What does the phrase “even so as foes commend” (line 4) suggest?", "options": [{"text": "Even the beloved’s enemies reluctantly admit his outward beauty", "isCorrect": true, "rationale": "If even enemies (“foes”) give praise, it establishes that the outward beauty is beyond dispute and universally acknowledged."}, {"text": "Friends and foes alike condemn the beloved", "isCorrect": false, "rationale": "“Commend” means praise, not condemn; foes join in the praise here."}, {"text": "The beloved’s enemies command others to admire him", "isCorrect": false, "rationale": "“Commend” is used in the sense of give praise, not issue commands."}, {"text": "The speaker is quoting his own enemies who praise the beloved to mock the speaker", "isCorrect": false, "rationale": "The foes here are the beloved’s, not the speaker’s."}], "id": "q02"}, {"question": "What do those same tongues do when they look further than outward appearance (lines 8–10)?", "options": [{"text": "They discover the beloved is even more admirable inwardly than outwardly", "isCorrect": false, "rationale": "The deeper look reveals a problem, not greater admiration."}, {"text": "They measure the beloved’s mind by his deeds and find a discrepancy", "isCorrect": true, "rationale": "Lines 11–12: “They look into the beauty of thy mind, / And that in guess they measure by thy deeds.” The deeds reveal a mismatch."}, {"text": "They refuse to speak further and remain silent out of respect", "isCorrect": false, "rationale": "The tongues do speak further and their additional speech is what causes the problem."}, {"text": "They discover the beloved is secretly a skilled poet", "isCorrect": false, "rationale": "No poetic skill is discovered; the deeds reveal something unflattering."}], "id": "q03"}, {"question": "What does “To thy fair flower add the rank smell of weeds” (line 14) mean?", "options": [{"text": "The beloved’s garden is overgrown with weeds", "isCorrect": false, "rationale": "The flower and weeds are a metaphor for beauty and moral failing."}, {"text": "The beloved’s outward beauty (fair flower) is tainted by the foul smell of his unworthy deeds", "isCorrect": true, "rationale": "The fair flower is the beloved’s beauty; the rank smell of weeds is the offensive quality of his behavior, adding a stench to his appearance."}, {"text": "Critics add false accusations to the beloved’s true beauty", "isCorrect": false, "rationale": "The speaker suggests the deeds themselves give cause for the negative assessment; this is not entirely false accusation."}, {"text": "The beloved should add humility (like simple weeds) to his proud beauty (the flower)", "isCorrect": false, "rationale": "The weeds here are negative — “rank” means foul-smelling — not virtuous humility."}], "id": "q04"}, {"question": "What does the couplet identify as the reason the beloved’s reputation is tarnished?", "options": [{"text": "The beloved has been the victim of jealous slander", "isCorrect": false, "rationale": "The couplet identifies the beloved’s own behavior as the cause; Sonnet LXX directly addresses slander."}, {"text": "“That thou dost common grow” — the beloved has become vulgar, commonplace, or morally loose", "isCorrect": true, "rationale": "Lines 15–16: “But why thy odour matcheth not thy show, / The soil is this, that thou dost common grow.” “Common” means morally base or promiscuous."}, {"text": "The beloved has neglected his physical appearance", "isCorrect": false, "rationale": "The outward appearance is praised throughout; the problem is moral behavior."}, {"text": "The beloved has associated with the wrong class of people", "isCorrect": false, "rationale": "The word “common” refers to the beloved’s own moral character becoming base, not his social associations."}], "id": "q05"}, {"question": "What does “odour matcheth not thy show” mean?", "options": [{"text": "The beloved smells bad but looks beautiful", "isCorrect": false, "rationale": "The odour is metaphorical: it refers to the invisible quality (reputation, moral character) as opposed to visible appearance (“show”)."}, {"text": "The beloved’s inner character and reputation do not match his outward beautiful appearance", "isCorrect": true, "rationale": "“Show” is appearance; “odour” is the intangible quality that reaches those who examine more closely, here suggesting moral character."}, {"text": "The beloved’s poetry does not match his lofty reputation", "isCorrect": false, "rationale": "The beloved’s deeds (not poetry) are the source of the odour."}, {"text": "The beloved performs differently in public than in private", "isCorrect": false, "rationale": "While there is a public/private dimension, the primary contrast is between outward beauty and inward character."}], "id": "q06"}, {"question": "Sonnet LXIX is unusual among this chapter’s sonnets because:", "options": [{"text": "It praises the beloved without any qualification", "isCorrect": false, "rationale": "The sonnet is notably qualified: it praises outward beauty but criticizes the beloved’s deeds."}, {"text": "It criticizes the beloved’s moral behavior, suggesting his deeds do not match his beautiful appearance", "isCorrect": true, "rationale": "Most sonnets in this cluster praise the beloved; LXIX is unusual in suggesting that the beloved’s behavior is at fault for his tarnished reputation."}, {"text": "It abandons the theme of time entirely and focuses only on reputation", "isCorrect": false, "rationale": "While time is less prominent, the sonnet is still concerned with beauty, worth, and reputation."}, {"text": "It is addressed to a woman rather than the young man", "isCorrect": false, "rationale": "The beloved is the young man of the sequence; the shift to a woman is a feature of the Dark Lady sonnets, not this one."}], "id": "q07"}, {"question": "What does “Uttering bare truth” (line 3) emphasize?", "options": [{"text": "The speakers are too poor to say anything else", "isCorrect": false, "rationale": "“Bare” means plain or unadorned, not impoverished."}, {"text": "That the universal praise of the beloved’s beauty is plain, unvarnished truth — not flattery", "isCorrect": true, "rationale": "“Bare truth” means unadorned truth; even the beloved’s foes speak it, which rules out flattery."}, {"text": "That no one dares praise the beloved openly", "isCorrect": false, "rationale": "The opposite: all tongues praise him; “bare” modifies the truth, not the willingness to speak."}, {"text": "That truth is stripped of beauty when spoken about the beloved’s flaws", "isCorrect": false, "rationale": "“Bare truth” is used in the context of praise (lines 3–4), not in the context of the later criticism."}], "id": "q08"}, {"question": "The metaphor of the “fair flower” and “rank smell of weeds” is an example of what broader device?", "options": [{"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe is direct address to an absent or abstract entity; the flower/weed contrast is nature imagery used as metaphor."}, {"text": "Nature imagery used to contrast beauty with moral corruption", "isCorrect": true, "rationale": "The fair flower represents the beloved’s beauty; the rank weeds represent his moral failings. The juxtaposition of these natural images conveys a moral contrast."}, {"text": "Pathetic fallacy", "isCorrect": false, "rationale": "Pathetic fallacy attributes human emotions to nature; here nature imagery symbolizes human qualities without nature itself being given emotions."}, {"text": "Conceit, an extended metaphor throughout the whole sonnet", "isCorrect": false, "rationale": "The flower/weed metaphor appears only in the final lines, not as a sustained conceit throughout."}], "id": "q09"}, {"question": "What structural movement does Sonnet LXIX follow?", "options": [{"text": "It moves from criticism to praise", "isCorrect": false, "rationale": "The movement is from praise to criticism."}, {"text": "It moves from universal outward praise to deeper examination that reveals a moral flaw", "isCorrect": true, "rationale": "Lines 1–4 praise the beloved’s outward beauty; lines 5–14 introduce the deeper examination; the couplet delivers the verdict on the mismatch."}, {"text": "It moves from past to present to future", "isCorrect": false, "rationale": "The sonnet is in the present tense throughout and does not follow a temporal arc."}, {"text": "It moves from public praise to private affirmation by the speaker", "isCorrect": false, "rationale": "The couplet delivers a private judgment against the beloved, not a private affirmation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
