        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Shakespeare claim he does NOT derive his knowledge from?", "options": [{"text": "Observation of nature, books, or the study of history.", "isCorrect": false, "rationale": "Books and history are not the disclaimed sources; the sonnet specifically disclaims astrological knowledge."}, {"text": "The stars, astrology, or celestial omens used for prediction.", "isCorrect": true, "rationale": "The first eight lines are a sustained disclaimer: the poet does not read the stars to predict plagues, dearths, seasons, the fate of princes, thunder, rain, or wind. His “astronomy” comes from a different source."}, {"text": "The youth’s own words or actions.", "isCorrect": false, "rationale": "The youth’s behavior is not the disclaimed source; the sonnet disclaims conventional astrology."}, {"text": "Religious prophecy or divine revelation.", "isCorrect": false, "rationale": "Religious sources are not mentioned; the disclaimed source is astrological prediction."}]}, {"question": "What does “methinks I have astronomy” mean?", "options": [{"text": "The poet has studied astronomy as a formal academic discipline.", "isCorrect": false, "rationale": "No formal study is claimed; the poet says he has a form of “astronomy” but it is not the conventional celestial reading."}, {"text": "The poet has a kind of star-reading ability — but his stars are the youth’s eyes, not the celestial heavens.", "isCorrect": true, "rationale": "“Methinks I have astronomy” sets up the extended conceit: the poet has a form of stargazing, but his “constant stars” are the youth’s eyes, from which he reads truth and beauty’s future."}, {"text": "The poet thinks he understands the movement of planets and predicts celestial events.", "isCorrect": false, "rationale": "The sestet reveals the opposite: his “astronomy” comes from the youth’s eyes, not the celestial spheres."}, {"text": "The poet is modest, claiming only a partial or imperfect knowledge of the stars.", "isCorrect": false, "rationale": "The poem concedes that conventional astrological knowledge is absent but introduces an alternative knowledge from the youth’s eyes."}]}, {"question": "What does the octave (lines 1–8) accomplish rhetorically?", "options": [{"text": "It establishes the poet’s credentials as a serious astrologer before revealing his own method.", "isCorrect": false, "rationale": "The octave does the opposite: it denies all conventional astrological credentials."}, {"text": "By cataloguing everything the poet cannot do with conventional astrology, the octave creates suspense before the volta reveals his true source of knowledge: the youth’s eyes.", "isCorrect": true, "rationale": "The extended disclaimer (no predictions of plagues, dearths, seasons, princely fate, thunder, rain, or wind) creates a rhetorical blank that the volta fills: his knowledge comes from the youth’s eyes."}, {"text": "It criticizes astrologers as frauds and charlatans.", "isCorrect": false, "rationale": "No condemnation of astrologers is made; the disclaimer is personal, not a critique of the profession."}, {"text": "It introduces a second speaker who challenges the poet’s claims.", "isCorrect": false, "rationale": "No second speaker is present; the octave is the poet’s own extended disclaimer."}]}, {"question": "Where is the volta (turn) in Sonnet XIV?", "options": [{"text": "At line 9 (“But from thine eyes my knowledge I derive”), where the source of the poet’s knowledge is revealed.", "isCorrect": true, "rationale": "The “But” of line 9 is the classic volta marker: after eight lines of negation (not from stars), the turn reveals the affirmative: knowledge comes from the youth’s eyes."}, {"text": "At the couplet (lines 13–14), where the poet makes his final prediction.", "isCorrect": false, "rationale": "The couplet is the resolution, not the turn; the argument has already shifted at line 9."}, {"text": "At line 5 (“Nor can I fortune to brief minutes tell”), where a new list of disclaimers begins.", "isCorrect": false, "rationale": "Line 5 continues the disclaimer; it is not a turn but an extension of the octave’s argument."}, {"text": "At line 3 (“But not to tell of good or evil luck”), where limitations are first acknowledged.", "isCorrect": false, "rationale": "Line 3 begins the long catalogue of limitations; it is not the volta, which requires a shift to new argument, not continuation of the same."}]}, {"question": "What does “constant stars” in line 10 refer to?", "options": [{"text": "The fixed stars in the sky that do not move with the planets.", "isCorrect": false, "rationale": "While “constant stars” in astronomy refers to fixed stars, in the poem the constant stars are the youth’s eyes."}, {"text": "The youth’s eyes, which are constant (fixed, unwavering) like stars and from which the poet reads truth and beauty.", "isCorrect": true, "rationale": "The metaphor transfers the astronomer’s gaze from heaven to the youth: “from thine eyes my knowledge I derive, / And constant stars in them I read such art.” The eyes are stars, steady and reliable for reading."}, {"text": "The moral principles the youth has remained faithful to throughout his life.", "isCorrect": false, "rationale": "Moral constancy is not the referent; the constant stars are a metaphor for the youth’s eyes as objects of astronomical contemplation."}, {"text": "The stars that the poet observes through a telescope in his observatory.", "isCorrect": false, "rationale": "No literal stargazing equipment is described; the stars are the youth’s eyes in an extended metaphor."}]}, {"question": "What does the poet “read” in the youth’s eyes in lines 10–12?", "options": [{"text": "That the youth secretly loves someone who has not been named.", "isCorrect": false, "rationale": "No secret love is read from the eyes; the message is about truth and beauty’s fate."}, {"text": "That “Truth and beauty shall together thrive” if the youth converts to “store” — that is, if he reproduces.", "isCorrect": true, "rationale": "The conditional prophecy is: IF the youth turns from himself to store (reproduction), then truth and beauty will thrive together. The youth’s eyes carry the potential for this positive outcome."}, {"text": "That the youth will achieve great fame and be remembered by all future ages.", "isCorrect": false, "rationale": "Fame is not the prediction; the prophecy concerns truth and beauty’s survival, conditional on the youth’s choice to reproduce."}, {"text": "That the poet’s love for the youth is eternal and cannot be destroyed by time.", "isCorrect": false, "rationale": "The poet’s love is not the subject of the reading; the eyes reveal the youth’s potential to preserve truth and beauty."}]}, {"question": "What does the couplet predict if the youth does NOT convert to “store”?", "options": [{"text": "The youth will live a long but unhappy life.", "isCorrect": false, "rationale": "Longevity is not the concern; the prediction is about the fate of truth and beauty, not the youth’s happiness."}, {"text": "The youth’s end will be the end of truth and beauty themselves — both will perish with him.", "isCorrect": true, "rationale": "The couplet is stark: “Thy end is truth’s and beauty’s doom and date.” If the youth dies without reproducing, truth and beauty die with him; his death date becomes their death date."}, {"text": "The poet will stop writing sonnets in protest at the youth’s refusal.", "isCorrect": false, "rationale": "No threat to stop writing is made; the prediction concerns the fate of truth and beauty."}, {"text": "The stars will align against the youth and bring him misfortune.", "isCorrect": false, "rationale": "Astrological punishment is exactly what the poem has disclaimed as a source of the poet’s knowledge; the prediction comes from the youth’s eyes, not the stars."}]}, {"question": "What does “to store thou wouldst convert” mean?", "options": [{"text": "To convert one’s wealth into a different form of investment.", "isCorrect": false, "rationale": "Financial conversion is not the specific meaning; “store” here means reproduction or laying up of one’s qualities in an heir."}, {"text": "To turn away from self-absorption and invest oneself in reproduction — laying up one’s beauty as “store” (a stock or supply) in children.", "isCorrect": true, "rationale": "“Store” (as in Sonnet XI) means reproduction and preservation of the self in offspring; “convert” means to turn away from self-absorption toward this productive purpose."}, {"text": "To convert to a new religious faith that emphasizes family life.", "isCorrect": false, "rationale": "Religious conversion is not the subject; “store” is the established metaphor from Sonnet XI for reproductive investment."}, {"text": "To preserve one’s beauty through careful diet and self-care.", "isCorrect": false, "rationale": "Physical self-preservation is not the meaning; converting to “store” means having children."}]}, {"question": "What does “doom and date” mean in the final line?", "options": [{"text": "Judgment and the expiry date — the youth’s end will be the day both truth and beauty are judged and sentenced to extinction.", "isCorrect": true, "rationale": "“Doom” means fate, ruin, or judgment; “date” means the term of duration (the expiry of a lease or the date of an end). Together they make the youth’s death the moment when truth and beauty are simultaneously sentenced and terminated."}, {"text": "A prophecy about a specific calendar date when the youth will die.", "isCorrect": false, "rationale": "No specific date is predicted; “doom and date” is a general expression for end and termination."}, {"text": "A legal term meaning the judgment of a court that has set an expiry date on a contract.", "isCorrect": false, "rationale": "While legal vocabulary enriches the line, the primary meaning is existential: the end of truth and beauty with the youth’s death."}, {"text": "A phrase meaning a bad omen and a specific star’s position.", "isCorrect": false, "rationale": "Astrological omens are exactly what the poem has disclaimed; the doom and date come from the youth’s choice, not the stars."}]}, {"question": "How does the star/eye metaphor deepen the sequence’s argument?", "options": [{"text": "It shows that the poet is more interested in astronomy than in the youth’s decision to reproduce.", "isCorrect": false, "rationale": "Astronomy is the vehicle for the metaphor, not the poem’s true interest; the interest is in the youth’s eyes as the source of truth and beauty."}, {"text": "By transferring the astronomer’s gaze from the heavens to the youth’s eyes, Shakespeare elevates the youth’s eyes to cosmic significance — they contain truth and beauty’s entire fate.", "isCorrect": true, "rationale": "The conceit is audaciously flattering: the youth’s eyes replace the stars as the source of prophetic knowledge. His eyes contain the fate of truth and beauty themselves, making the stakes of his choice cosmically enormous."}, {"text": "It introduces a contrast between reliable celestial knowledge and the poet’s fallible personal observation.", "isCorrect": false, "rationale": "The poet does not present celestial knowledge as more reliable; his knowledge from the youth’s eyes is presented as superior to conventional astrology."}, {"text": "It suggests the youth is physically beautiful enough to be confused with a heavenly body.", "isCorrect": false, "rationale": "While the youth’s beauty is always the premise, the metaphor is not a simple compliment about appearance but a claim about where truth and beauty’s fate resides."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
