    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What did the beloved promise the speaker at the opening of Sonnet XXXIV?", "options": [{"text": "Eternal loyalty and devotion", "isCorrect": false, "rationale": "The promise is meteorological in metaphor: a fair, bright day of companionship, not a formal vow of loyalty."}, {"text": "A beautiful, clear day — implying a promise of good faith or favor", "isCorrect": true, "rationale": "The speaker accuses the beloved of promising “such a beauteous day,” then allowing base clouds to overtake that promise — a metaphor for a broken pledge."}, {"text": "A written poem dedicated to the speaker", "isCorrect": false, "rationale": "No poem or dedication is mentioned; the imagery is of weather and travel."}, {"text": "Financial support during the speaker's travels", "isCorrect": false, "rationale": "The “cloak” and travel are metaphorical, not literal references to money."}]}, {"question": "What does “my cloak” (line 2) represent in the poem's metaphorical framework?", "options": [{"text": "The speaker's social reputation", "isCorrect": false, "rationale": "Reputation is more the concern of Sonnet XXXVI; here the cloak represents the protection the speaker trusted the beloved to provide."}, {"text": "Protection or caution that the speaker laid aside trusting the beloved's promise", "isCorrect": true, "rationale": "Venturing out without a cloak because the day seemed fine means the speaker was vulnerable due to trust — a powerful image of lowered defenses based on the beloved's assurances."}, {"text": "A garment the beloved borrowed and never returned", "isCorrect": false, "rationale": "The cloak is not literal; it functions as a symbol of protective armor or forethought abandoned in trust."}, {"text": "The speaker's poetic inspiration", "isCorrect": false, "rationale": "Poetic inspiration is the subject of Sonnet XXXVIII, not this one."}]}, {"question": "The image of “bravery in their rotten smoke” (line 6) means:", "options": [{"text": "The beloved's courage is destroyed by cowardly companions", "isCorrect": false, "rationale": "“Bravery” here means splendor or finery, not the virtue of courage; the clouds are not companions but the obscuring medium."}, {"text": "The beloved's splendor is hidden behind shameful, corrupt behavior", "isCorrect": true, "rationale": "“Bravery” is Elizabethan for fine show or splendor; “rotten smoke” is the foul cloud cover of the beloved's transgression. The radiance is there but concealed by moral corruption."}, {"text": "Smoke from a fire of bravery burned away by enemies", "isCorrect": false, "rationale": "No enemies burn anything; the cloud metaphor relates to the beloved's own failing."}, {"text": "The beloved dresses boldly but speaks rudely", "isCorrect": false, "rationale": "Appearance versus speech is not the contrast here; the image is about hidden virtue versus overt wrongdoing."}]}, {"question": "What argument does the speaker make in lines 7-10 about the inadequacy of the beloved's reconciliation?", "options": [{"text": "That breaking through the clouds with sunlight is enough to make amends", "isCorrect": false, "rationale": "The speaker explicitly says it is NOT enough — breaking through the clouds does not undo the disgrace."}, {"text": "That healing the wound but not the disgrace is insufficient — the shame remains even after the pain is soothed", "isCorrect": true, "rationale": "The salve (remedy) dries the rain on the speaker's face but cannot cure the disgrace; a wound can close while the scar (shame) endures, making partial repair inadequate."}, {"text": "That the beloved should have written a letter of apology instead", "isCorrect": false, "rationale": "No letter is suggested; the argument is philosophical about the limits of reparation."}, {"text": "That only time, not the beloved's effort, can heal the injury", "isCorrect": false, "rationale": "Time is not invoked; the point is that the beloved's gesture addresses the symptom (pain) but not the cause (disgrace)."}]}, {"question": "What does “the strong offence's cross” (line 14) mean?", "options": [{"text": "A religious crucifix representing divine punishment for sin", "isCorrect": false, "rationale": "While “cross” carries Christian resonance, it is used here as a metaphor for burden, not a literal crucifix."}, {"text": "The heavy burden the offended party must carry as a result of the transgression", "isCorrect": true, "rationale": "The speaker bears the “cross” (burden) of the beloved's serious offense, just as Christ bore the cross — the wronged party suffers the weight of another's sin."}, {"text": "The beloved's anger and resentment toward the speaker", "isCorrect": false, "rationale": "It is the speaker who bears the cross, not the beloved; the beloved is the one who offended."}, {"text": "An intersection of two paths representing a life choice", "isCorrect": false, "rationale": "A crossroads metaphor is not operative here; “cross” means burden or suffering."}]}, {"question": "What is the volta in Sonnet XXXIV and where does it occur?", "options": [{"text": "Line 5, shifting from accusation to self-blame", "isCorrect": false, "rationale": "Line 5 continues the accusation of the beloved; self-blame belongs to Sonnet XXXV."}, {"text": "The couplet (lines 15-16), shifting from complaint and grievance to the redemptive power of the beloved's tears", "isCorrect": true, "rationale": "The first 12 lines catalog the insufficiency of the beloved's amends; the couplet pivots dramatically, declaring the tears are pearl-like and rich enough to ransom all ill deeds."}, {"text": "Line 9, shifting from weather imagery to legal language", "isCorrect": false, "rationale": "Line 9 introduces legal diction but the grievance continues; the true emotional turn comes in the couplet."}, {"text": "Line 11, where the speaker stops being angry", "isCorrect": false, "rationale": "Line 11 extends the argument about inadequate reparation; the turn to forgiveness is reserved for the couplet."}]}, {"question": "The metaphor of tears as “pearl” (line 15) suggests:", "options": [{"text": "The beloved is wealthy and uses gifts to buy forgiveness", "isCorrect": false, "rationale": "The tears themselves are the pearls — not a separate expensive gift; the value is in the sincerity of the weeping."}, {"text": "The beloved's genuine repentance is precious and redemptive enough to outweigh the offense", "isCorrect": true, "rationale": "Pearls are formed from irritants inside an oyster — a beauty born from pain. The beloved's tears, precious as pearls, are said to “ransom all ill deeds,” suggesting sincere grief can redeem wrongdoing."}, {"text": "The speaker is consoled by the beauty of the beloved's face when weeping", "isCorrect": false, "rationale": "Aesthetics of weeping are not the point; the redemptive value of the tears is what matters."}, {"text": "Tears are cold like pearls, representing the cooling of the speaker's anger", "isCorrect": false, "rationale": "Temperature imagery does not appear; the pearl metaphor emphasizes precious worth, not thermal quality."}]}, {"question": "Sonnet XXXIV continues the sun-and-cloud metaphor from Sonnet XXXIII. How does it develop that metaphor?", "options": [{"text": "It abandons weather imagery and focuses entirely on legal language", "isCorrect": false, "rationale": "Weather imagery persists strongly through line 8 (“my storm-beaten face”); legal language is introduced alongside it, not instead of it."}, {"text": "It shifts from the sun's perspective to the traveler's perspective, making the harm personal and concrete", "isCorrect": true, "rationale": "In Sonnet XXXIII the poet watches the sun from a distance; in XXXIV the speaker is the traveler caught in the storm, making the betrayal personally felt as rain on a beaten face."}, {"text": "It reverses the metaphor by praising clouds as beautiful", "isCorrect": false, "rationale": "The clouds remain negative (“base clouds,” “rotten smoke”); no reversal or praise of clouds occurs."}, {"text": "It compares the sun to an enemy rather than a beloved", "isCorrect": false, "rationale": "The beloved is still addressed with intimate second person (“thou”); the relationship is troubled, not hostile."}]}, {"question": "What is the effect of using legal diction (“physic,” “offender,” “relief,” “offence”) in lines 11-14?", "options": [{"text": "It suggests the speaker intends to sue the beloved in court", "isCorrect": false, "rationale": "No actual lawsuit is threatened; the legal vocabulary is metaphorical, framing the moral situation."}, {"text": "It frames the beloved's wrong as a serious, formal transgression — not merely a personal hurt — with obligations of justice", "isCorrect": true, "rationale": "Legal language elevates the emotional injury to a matter of justice and obligation, intensifying the sense that sorrow alone (“weak relief”) is insufficient reparation for a real wrong."}, {"text": "It distances the speaker emotionally, making the poem colder and less personal", "isCorrect": false, "rationale": "Legal language adds gravity without removing emotional investment; the exclamation “Ah!” in line 15 shows continued feeling."}, {"text": "It implies the beloved is a criminal who should be imprisoned", "isCorrect": false, "rationale": "The metaphor is moral and relational, not a literal call for imprisonment."}]}, {"question": "Which word best captures the speaker's stance toward the beloved by the end of Sonnet XXXIV?", "options": [{"text": "Indifferent", "isCorrect": false, "rationale": "The speaker is deeply invested; the pearl-and-ransom couplet shows continued emotional engagement, not indifference."}, {"text": "Reluctantly forgiving", "isCorrect": true, "rationale": "The bulk of the sonnet catalogues grievances and the inadequacy of amends, yet the couplet grants forgiveness through the beloved's tears — a forgiveness earned rather than freely given, suggesting reluctance overcome by genuine repentance."}, {"text": "Triumphant", "isCorrect": false, "rationale": "There is no triumph; the speaker has suffered a real loss and grants forgiveness at personal cost."}, {"text": "Contemptuous", "isCorrect": false, "rationale": "Contempt would not coexist with the tender image of pearl-like tears; the speaker retains affection even in hurt."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
