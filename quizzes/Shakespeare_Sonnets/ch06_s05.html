        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the opening of Sonnet XLVII differ from the opening of Sonnet XLVI?", "options": [{"text": "XLVII opens with a more intense conflict between the eye and heart.", "isCorrect": false, "rationale": "XLVII resolves the conflict; it opens with a league (treaty), not intensified war."}, {"text": "XLVII opens with a treaty or league between eye and heart, replacing XLVI’s war.", "isCorrect": true, "rationale": "“Betwixt mine eye and heart a league is took” announces a peace agreement, continuing from the legal dispute in XLVI and resolving it into cooperation."}, {"text": "XLVII opens with the speaker addressing the beloved directly in anger.", "isCorrect": false, "rationale": "No anger is expressed; the opening is peaceful and collaborative."}, {"text": "XLVII opens with a description of the beloved’s physical beauty.", "isCorrect": false, "rationale": "Physical description of the beloved is not the opening focus."}], "id": "q01"}, {"question": "When the eye is “famish’d for a look,” what remedy does the league provide?", "options": [{"text": "The speaker writes a letter to the beloved asking for a visit.", "isCorrect": false, "rationale": "No letter-writing is mentioned; the remedy is internal."}, {"text": "The eye feasts on the beloved’s picture and invites the heart to share the visual banquet.", "isCorrect": true, "rationale": "Lines 7–8: “With my love’s picture then my eye doth feast, / And to the painted banquet bids my heart.” A portrait serves as visual sustenance when the beloved is absent."}, {"text": "The heart sends its thoughts as ambassadors to the beloved.", "isCorrect": false, "rationale": "Ambassadors are the conceit of Sonnet XLV; here the remedy is a painted portrait."}, {"text": "The speaker travels to wherever the beloved is staying.", "isCorrect": false, "rationale": "Physical travel is not available to the speaker in these separation sonnets."}], "id": "q02"}, {"question": "What is the “painted banquet” (line 8)?", "options": [{"text": "A feast scene the speaker has painted on canvas.", "isCorrect": false, "rationale": "The speaker is not described as a painter; the painting refers to a portrait of the beloved."}, {"text": "A metaphor for the visual pleasure of gazing at a portrait of the beloved.", "isCorrect": true, "rationale": "The portrait is called a “painted banquet” — a feast for the eye made of paint rather than food, sustaining the starved gaze with the beloved’s image."}, {"text": "A real dinner party at which the beloved is present.", "isCorrect": false, "rationale": "The beloved is absent; the banquet is an imaginative and visual substitute."}, {"text": "A reference to a famous painting of a classical banquet scene.", "isCorrect": false, "rationale": "No classical allusion is made; the banquet is the speaker’s own experience of the portrait."}], "id": "q03"}, {"question": "In the second scenario (lines 9–10), what happens when the eye serves as the heart’s guest?", "options": [{"text": "The eye borrows the heart’s emotions to experience the beloved more deeply.", "isCorrect": true, "rationale": "Lines 9–10: “Another time mine eye is my heart’s guest, / And in his thoughts of love doth share a part.” The eye visits the heart and participates in its loving thoughts, reversing the earlier arrangement."}, {"text": "The heart uses the eye to write a letter to the beloved.", "isCorrect": false, "rationale": "No letter-writing is described here."}, {"text": "The eye and heart both fall asleep and dream of the beloved.", "isCorrect": false, "rationale": "Sleep and dreams are Sonnet XLIII’s territory; here the exchange is between waking eye and heart."}, {"text": "The heart denies the eye access to its private chamber.", "isCorrect": false, "rationale": "That was the heart’s argument in Sonnet XLVI; here the two faculties cooperate."}], "id": "q04"}, {"question": "Lines 11–14 argue that the beloved is “present still” with the speaker because:", "options": [{"text": "The beloved has returned from his journey and is physically present.", "isCorrect": false, "rationale": "The beloved remains absent; presence is imaginative, not physical."}, {"text": "The beloved cannot travel beyond the speaker’s thoughts, so wherever thought goes, the beloved is there.", "isCorrect": true, "rationale": "“For thou not farther than my thoughts canst move, / And I am still with them, and they with thee.” Thought encloses the beloved; he exists as a permanent inhabitant of the speaker’s mind."}, {"text": "The beloved writes letters that keep his presence alive in the speaker’s home.", "isCorrect": false, "rationale": "No letters are mentioned; the presence is purely mental."}, {"text": "The beloved’s portrait is so lifelike it seems to move and speak.", "isCorrect": false, "rationale": "The portrait sustains the eye, but the broader argument is about thought, not the portrait’s lifelike quality."}], "id": "q05"}, {"question": "The couplet introduces sleep as a final scenario. What wakes the heart during sleep?", "options": [{"text": "The sound of the beloved’s footsteps returning.", "isCorrect": false, "rationale": "No physical return is described; the awakening is visual."}, {"text": "The picture of the beloved, visible to the eye even while the heart sleeps.", "isCorrect": true, "rationale": "Lines 15–16: “Or, if they sleep, thy picture in my sight / Awakes my heart, to heart’s and eye’s delight.” The portrait, always available to the open eye, rouses the heart from even sleep."}, {"text": "A dream in which the beloved appears and speaks.", "isCorrect": false, "rationale": "Dreams are the mechanism of Sonnet XLIII; here it is the waking eye’s sight of the portrait."}, {"text": "The speaker’s memory of the beloved’s voice.", "isCorrect": false, "rationale": "Voice and sound are not the awakening agency; the portrait’s visual power wakes the heart."}], "id": "q06"}, {"question": "The word “famish’d” (line 3) is an example of:", "options": [{"text": "Alliteration — consonant repetition.", "isCorrect": false, "rationale": "Alliteration is not the primary device in this word choice."}, {"text": "Metaphor — treating the eye’s longing for the beloved’s image as a physical hunger.", "isCorrect": true, "rationale": "To be “famish’d for a look” treats visual longing as starvation, making the eye’s need as urgent as a body’s need for food."}, {"text": "Apostrophe — addressing the absent beloved.", "isCorrect": false, "rationale": "Apostrophe would involve directly calling out to the beloved; ‘famish’d’ is a metaphor applied to the eye."}, {"text": "Irony — saying the opposite of what is meant.", "isCorrect": false, "rationale": "The hunger metaphor is sincere, not ironic."}], "id": "q07"}, {"question": "The central argument of Sonnet XLVII is that absence can be managed because:", "options": [{"text": "Time heals all wounds and eventually the beloved will return.", "isCorrect": false, "rationale": "Time passing is not the speaker’s consolation here."}, {"text": "A portrait and loving thought keep the beloved continuously present to both eye and heart.", "isCorrect": true, "rationale": "The poem argues that through two complementary means — visual (the portrait) and mental (loving thought) — the beloved never truly departs. Either the eye has the picture or the heart has the thought, and together they ensure continuous presence."}, {"text": "The beloved has promised to write letters regularly.", "isCorrect": false, "rationale": "No letters or promises are mentioned."}, {"text": "The speaker finds new sources of beauty to occupy his gaze.", "isCorrect": false, "rationale": "No substitution with new beauties is proposed; the consolations all involve the beloved specifically."}], "id": "q08"}, {"question": "What is the tone of Sonnet XLVII compared to Sonnet XLVI?", "options": [{"text": "More combative and disputatious.", "isCorrect": false, "rationale": "XLVII is the resolution of combat; it is gentler and more consoled."}, {"text": "More resigned and despairing.", "isCorrect": false, "rationale": "Despair is not the dominant note; the poem is creative in finding comfort."}, {"text": "More serene and consoling, as the inner conflict has been replaced by mutual aid.", "isCorrect": true, "rationale": "Where XLVI was a lawsuit, XLVII is a peace treaty with practical consequences. The tone is softer, more inventive, finding genuine comfort in portrait and thought."}, {"text": "More erotic and passionate.", "isCorrect": false, "rationale": "Eroticism is not foregrounded; the comfort is aesthetic and intellectual."}], "id": "q09"}, {"question": "The phrase “thyself away, art present still with me” is best described as:", "options": [{"text": "A simile comparing the beloved’s absence to night.", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ comparison is present."}, {"text": "A paradox asserting that physical departure does not dissolve the beloved’s presence in the speaker’s thoughts.", "isCorrect": true, "rationale": "The beloved is away (“thyself away”) yet present (“art present still with me”) — a paradox that the poem has been constructing through the cooperation of eye and heart."}, {"text": "An allusion to the classical idea of the soul leaving the body at death.", "isCorrect": false, "rationale": "Death and the soul are not the reference here; the paradox is about imaginative presence."}, {"text": "A hyperbole claiming the beloved physically occupies two places at once.", "isCorrect": false, "rationale": "No physical bilocation is claimed; the presence is in thought and image."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
