    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker cry for at the opening of Sonnet LXVI?", "options": [{"text": "Recognition for his poetic talent", "isCorrect": false, "rationale": "The speaker cries for death, weary of the world’s injustices."}, {"text": "Restful death, because he is tired of the world’s evils", "isCorrect": true, "rationale": "Line 1: “Tired with all these, for restful death I cry.” The speaker longs for death as relief from what follows."}, {"text": "Justice for the beloved who has been slandered", "isCorrect": false, "rationale": "The catalog of injustices is general, not specifically about the beloved’s slander."}, {"text": "The beloved’s return from a long absence", "isCorrect": false, "rationale": "The speaker’s yearning is existential (for death), not for the beloved’s physical return."}], "id": "q01"}, {"question": "Which of the following is NOT one of the grievances listed in Sonnet LXVI?", "options": [{"text": "Desert a beggar born", "isCorrect": false, "rationale": "This is listed in line 2: “As to behold desert a beggar born.”"}, {"text": "Art made tongue-tied by authority", "isCorrect": false, "rationale": "This is listed in line 9: “And art made tongue-tied by authority.”"}, {"text": "Love unrequited by a cold-hearted beauty", "isCorrect": true, "rationale": "Unrequited love is not in the catalog; the grievances are social and moral injustices, not personal romantic ones."}, {"text": "Simple truth miscalled simplicity", "isCorrect": false, "rationale": "This is listed in line 13: “And simple truth miscall’d simplicity.”"}], "id": "q02"}, {"question": "What does “needy nothing trimm’d in jollity” (line 3) describe?", "options": [{"text": "A poor but cheerful orphan", "isCorrect": false, "rationale": "The phrase is a social critique, not a sympathetic description of a poor child."}, {"text": "Worthless people dressed up and celebrated as if they had real value", "isCorrect": true, "rationale": "“Needy nothing” means someone who has nothing of worth; “trimm’d in jollity” means adorned and presented with festive show — celebrating emptiness."}, {"text": "A miser who hoards his wealth but shows no joy in it", "isCorrect": false, "rationale": "The phrase refers to the opposite: those who lack substance but are decorated and celebrated."}, {"text": "The speaker’s own poverty of spirit", "isCorrect": false, "rationale": "The grievance is directed outward at social injustice, not inward at the speaker’s own condition."}], "id": "q03"}, {"question": "What does “art made tongue-tied by authority” (line 9) lament?", "options": [{"text": "Artists who choose to be silent rather than create", "isCorrect": false, "rationale": "The silencing is imposed, not chosen; authority prevents art from speaking freely."}, {"text": "The suppression of artistic expression by those in power", "isCorrect": true, "rationale": "“Tongue-tied” means silenced; authority (those in power) forces art into silence — a censorship complaint."}, {"text": "The speaker’s own inability to find the right words for his poem", "isCorrect": false, "rationale": "The complaint is social and political, not about the speaker’s personal creative struggles."}, {"text": "The beloved’s refusal to speak with the speaker", "isCorrect": false, "rationale": "Art in general is tongue-tied, not the beloved specifically."}], "id": "q04"}, {"question": "What does “captive good attending captain ill” (line 14) mean?", "options": [{"text": "A good soldier following a wicked general into battle", "isCorrect": false, "rationale": "While the military image works, the meaning is broader: goodness forced to serve evil in the world."}, {"text": "Goodness held prisoner, forced to serve and wait upon evil", "isCorrect": true, "rationale": "“Captive good” is good under lock and key; “attending captain ill” means serving evil as its subordinate — the world has been turned upside down."}, {"text": "Good Captain attending a criminal trial as a witness", "isCorrect": false, "rationale": "There is no courtroom scene; “captain” is an adjective meaning chief or predominant, not a military rank."}, {"text": "The speaker serving the beloved even though the beloved treats him ill", "isCorrect": false, "rationale": "The grievance is general and social, not about the specific relationship between speaker and beloved."}], "id": "q05"}, {"question": "What is the sole reason the speaker does NOT follow through on his death wish?", "options": [{"text": "Fear of what comes after death", "isCorrect": false, "rationale": "The sonnet never mentions fear of death or afterlife; the reason is love for the beloved."}, {"text": "The knowledge that dying would leave the beloved alone", "isCorrect": true, "rationale": "Lines 15–16: “Tir’d with all these, from these would I be gone, / Save that, to die, I leave my love alone.”"}, {"text": "Hope that the world’s injustices will be corrected", "isCorrect": false, "rationale": "No such hope is expressed; the only restraint is love for the beloved."}, {"text": "The desire to complete his poetic legacy", "isCorrect": false, "rationale": "Poetry is not mentioned as the reason he stays; the beloved’s aloneness is."}], "id": "q06"}, {"question": "What tone dominates Sonnet LXVI?", "options": [{"text": "Satirical and comic", "isCorrect": false, "rationale": "The tone is weary and despairing, not comic or lightly satirical."}, {"text": "Weary, despairing, and bitterly critical of social injustice", "isCorrect": true, "rationale": "The anaphoric catalog of “And...” grievances creates a tone of exhausted, accumulated bitterness at the world’s moral disorder."}, {"text": "Tenderly romantic", "isCorrect": false, "rationale": "Only the couplet has tender feeling; the body of the sonnet is bitterly critical."}, {"text": "Triumphant and defiant", "isCorrect": false, "rationale": "The speaker is exhausted and resigned, not triumphant."}], "id": "q07"}, {"question": "How does Sonnet LXVI differ from other sonnets in this chapter?", "options": [{"text": "It entirely avoids any mention of the beloved", "isCorrect": false, "rationale": "The beloved is mentioned in the couplet as the only reason for staying alive."}, {"text": "It catalogs social and moral injustices rather than focusing primarily on time’s destruction of physical beauty", "isCorrect": true, "rationale": "Unlike Sonnets LX, LXIII, LXIV, and LXV, Sonnet LXVI is concerned with moral and social corruption, though framed as a reason to desire death."}, {"text": "It argues that the beloved’s love is not worth living for", "isCorrect": false, "rationale": "The opposite: love for the beloved is the only reason to live."}, {"text": "It is the only sonnet in the chapter to promise immortality through verse", "isCorrect": false, "rationale": "Multiple sonnets in the chapter address verse’s immortalizing power; LXVI notably does not include that promise."}], "id": "q08"}, {"question": "What is the rhetorical effect of the repeated “And” at the start of lines 3–14?", "options": [{"text": "It suggests the speaker is confused and cannot organize his thoughts", "isCorrect": false, "rationale": "The repetition is a deliberate rhetorical technique creating cumulative force."}, {"text": "It creates an anaphoric catalog that builds an overwhelming, exhausting accumulation of injustices", "isCorrect": true, "rationale": "Each “And” adds another grievance; the structure mimics the relentless piling-on of injustice that makes the world intolerable."}, {"text": "It is a grammatical error indicating the poem was left unfinished", "isCorrect": false, "rationale": "The repetition is deliberate and rhetorically powerful, not an error."}, {"text": "It creates a soothing, rhythmic lullaby effect", "isCorrect": false, "rationale": "The effect is the opposite of soothing; the accumulation is oppressive and weary."}], "id": "q09"}, {"question": "What does “golden honour shamefully misplac’d” describe?", "options": [{"text": "Stolen gold that has been hidden", "isCorrect": false, "rationale": "The image is about honor, not literal gold; it is misplaced, not stolen."}, {"text": "High honors and accolades awarded to those who do not deserve them", "isCorrect": true, "rationale": "“Gilded honour shamefully misplac’d” means honor decked in gold (prestigious, splendid) is shamefully given to the wrong people."}, {"text": "A gold medal given to a corrupt athlete", "isCorrect": false, "rationale": "While the meaning is close, the phrase is broader: social honors of all kinds given to the unworthy."}, {"text": "The speaker’s own failure to receive recognition for his poetry", "isCorrect": false, "rationale": "The grievances are social and general, not specifically autobiographical."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
