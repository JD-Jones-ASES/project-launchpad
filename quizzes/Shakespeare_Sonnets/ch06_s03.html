    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which two elements does Sonnet XLV focus on, as a companion to Sonnet XLIV?", "options": [{"text": "Earth and water — the heavy elements.", "isCorrect": false, "rationale": "Earth and water are the subject of Sonnet XLIV; XLV addresses the lighter elements."}, {"text": "Air and fire — the swift, light elements.", "isCorrect": true, "rationale": "The opening line calls them “the other two, slight air, and purging fire,” continuing directly from XLIV’s earth-and-water meditation."}, {"text": "Fire and earth — the opposing extremes.", "isCorrect": false, "rationale": "Earth belongs to XLIV; fire is in XLV but paired with air, not earth."}, {"text": "Water and air — the fluid elements.", "isCorrect": false, "rationale": "Water belongs to XLIV; here the swift elements air and fire are the subject."}], "id": "q01"}, {"question": "In the poem, what does the speaker’s thought represent among the elements?", "options": [{"text": "Earth — heavy and slow-moving.", "isCorrect": false, "rationale": "Earth is one of the speaker’s heavy elements from Sonnet XLIV, not thought."}, {"text": "Air — light and quick, sent as an ambassador of love.", "isCorrect": true, "rationale": "Line 3 states “the first my thought” referring to air; thought is identified with the swift, light element of air."}, {"text": "Fire — passionate and consuming.", "isCorrect": false, "rationale": "Fire is associated with desire, the second of the swift elements."}, {"text": "Water — flowing and constant.", "isCorrect": false, "rationale": "Water is a heavy, slow element from Sonnet XLIV."}], "id": "q02"}, {"question": "What happens to the speaker’s “life” when the swift elements (air and fire) depart?", "options": [{"text": "He feels energized and hopeful in their absence.", "isCorrect": false, "rationale": "The opposite occurs: their departure diminishes him."}, {"text": "He sinks toward death, oppressed with melancholy, left with only the heavy elements.", "isCorrect": true, "rationale": "Lines 9–10 state: “My life, being made of four, with two alone / Sinks down to death, oppress’d with melancholy.” When thought and desire leave, he is depleted."}, {"text": "He sleeps peacefully and dreams of the beloved.", "isCorrect": false, "rationale": "Dream-sleep is the concern of Sonnet XLIII; here absence of the swift elements brings melancholy, not peaceful rest."}, {"text": "He travels physically to reach the beloved.", "isCorrect": false, "rationale": "Physical travel is impossible, as Sonnet XLIV established; here only the immaterial elements travel."}], "id": "q03"}, {"question": "The phrase “tender embassy of love” (line 8) describes the swift elements as:", "options": [{"text": "Aggressive warriors fighting on the speaker’s behalf.", "isCorrect": false, "rationale": "Embassy suggests diplomacy and gentle mission, not warfare."}, {"text": "Gentle ambassadors or messengers carrying love to the beloved.", "isCorrect": true, "rationale": "An embassy is a diplomatic mission. “Tender” adds gentleness. The speaker’s thought and desire travel to the beloved as loving envoys."}, {"text": "Musical instruments that play songs of longing.", "isCorrect": false, "rationale": "Music is not invoked here; the metaphor is diplomatic, not musical."}, {"text": "Spies secretly reporting on the beloved’s activities.", "isCorrect": false, "rationale": "The mission is loving and open, not secretive or suspicious."}], "id": "q04"}, {"question": "The word “recur’d” in line 11 most nearly means:", "options": [{"text": "Recurred — happened again.", "isCorrect": false, "rationale": "This is a false cognate; ‘recur’d’ here is an archaic form of ‘recovered’ or ‘restored.’"}, {"text": "Restored or cured — brought back to health and balance.", "isCorrect": true, "rationale": "“Life’s composition be recur’d” means the balance of the four elements in his being is restored when thought and desire return from the beloved."}, {"text": "Cancelled or revoked.", "isCorrect": false, "rationale": "Cancellation would mean the elements are lost permanently, not restored."}, {"text": "Repeated in a cycle without change.", "isCorrect": false, "rationale": "The emphasis is on restoration and healing, not mere repetition."}], "id": "q05"}, {"question": "What news do the swift messengers bring back from the beloved?", "options": [{"text": "A message that the beloved will soon return.", "isCorrect": false, "rationale": "No promise of return is mentioned; the news is about health, not travel plans."}, {"text": "Assurance of the beloved’s fair health.", "isCorrect": true, "rationale": "Lines 13–14: the messengers return “assur’d / Of thy fair health, recounting it to me.” The speaker’s relief is based on this health report."}, {"text": "A warning that the beloved has found another lover.", "isCorrect": false, "rationale": "No rival is introduced; the news is positive, reassuring the speaker of the beloved’s wellbeing."}, {"text": "A poem written by the beloved in return.", "isCorrect": false, "rationale": "No poetic exchange is described; the message is a health report."}], "id": "q06"}, {"question": "The closing couplet (“This told, I joy; but then no longer glad, / I send them back again, and straight grow sad”) highlights:", "options": [{"text": "A stable, contented happiness that the news of good health provides.", "isCorrect": false, "rationale": "The joy is explicitly temporary; sadness returns almost immediately."}, {"text": "The cyclical, self-defeating nature of the speaker’s emotional state: joy collapses back into sadness the moment the messengers are sent away again.", "isCorrect": true, "rationale": "The speaker rejoices briefly at the good news, then must send thought and desire back to the beloved — and instantly grows sad again. The cycle of relief and loss is continuous."}, {"text": "The speaker’s decision to stop longing and accept separation cheerfully.", "isCorrect": false, "rationale": "No such acceptance occurs; the pattern of sadness reasserts itself immediately."}, {"text": "The beloved’s reply to the speaker’s messages.", "isCorrect": false, "rationale": "The couplet focuses on the speaker’s internal emotional cycle, not on the beloved’s reply."}], "id": "q07"}, {"question": "The phrase “present-absent” in line 6 is best described as:", "options": [{"text": "Anaphora — repetition of a phrase at the start of successive lines.", "isCorrect": false, "rationale": "Anaphora involves opening repetition; ‘present-absent’ is a compound paradox within a single line."}, {"text": "An oxymoron capturing how the swift elements are both with the speaker and with the beloved simultaneously.", "isCorrect": true, "rationale": "“Present-absent” is an oxymoronic compound: thought and desire are sent to the beloved (absent from the speaker) yet also in some sense always with him through their return journey. It encapsulates the paradox of mediated closeness."}, {"text": "A simile comparing the elements to traveling merchants.", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ comparison is used here."}, {"text": "An allusion to a classical myth about the gods’ messengers.", "isCorrect": false, "rationale": "No specific classical myth is invoked; the device is rhetorical rather than allusive."}], "id": "q08"}, {"question": "What does the speaker mean by “my life, being made of four” (line 9)?", "options": [{"text": "He has four close friends who sustain him.", "isCorrect": false, "rationale": "Friends are not the subject; the reference is to the four classical elements."}, {"text": "His life requires all four classical elements (earth, water, air, fire) to function fully.", "isCorrect": true, "rationale": "Classical physiology held that the body and soul were composed of four elements. When two (air and fire) are away, life is incomplete."}, {"text": "He has written four sonnets for the beloved.", "isCorrect": false, "rationale": "The number four refers to elements, not poems."}, {"text": "He is four years older than the beloved.", "isCorrect": false, "rationale": "Age is not the subject; the reference is to elemental composition."}], "id": "q09"}, {"question": "What structural feature connects Sonnets XLIV and XLV?", "options": [{"text": "Both sonnets use the same extended metaphor of the ocean to describe separation.", "isCorrect": false, "rationale": "The ocean metaphor appears in Sonnet LVI; XLIV and XLV are linked by the four-element conceit."}, {"text": "Sonnet XLV opens with “The other two,” continuing directly from XLIV’s reference to earth and water, forming a paired diptych on the four elements.", "isCorrect": true, "rationale": "The first word of XLV is “The other two” — a grammatical continuation of XLIV’s elemental framework. They are conceived as companion pieces."}, {"text": "Both sonnets are addressed to a rival poet rather than to the beloved.", "isCorrect": false, "rationale": "Both are addressed to the beloved; no rival is involved."}, {"text": "Both sonnets share the same closing couplet.", "isCorrect": false, "rationale": "They have different couplets; their connection is thematic and grammatical, not verbal."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
