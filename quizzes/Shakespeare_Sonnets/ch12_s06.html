<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do the mistress's eyes do that the speaker interprets as pity?", "options": [{"text": "They shed tears for him", "isCorrect": false, "rationale": "Her eyes do not shed tears; their dark color is interpreted as sympathetic mourning dress."}, {"text": "They have 'put on black' as mourners, as if pitying the speaker's pain", "isCorrect": true, "rationale": "Knowing the heart torments the speaker with disdain, the eyes have 'put on black and loving mourners be,' looking upon him with 'pretty ruth' (compassionate pity)."}, {"text": "They look away to spare him further suffering", "isCorrect": false, "rationale": "The eyes look upon him; their gaze expresses pity in the speaker's interpretation."}, {"text": "They reflect sunlight warmly onto him", "isCorrect": false, "rationale": "The eyes are compared to mourning figures dressed in black, not sunlight."}]}, {"question": "What does 'ruth' mean in 'looking with pretty ruth upon my pain'?", "options": [{"text": "Anger", "isCorrect": false, "rationale": "Ruth is the opposite of anger in this context."}, {"text": "Pity or compassion", "isCorrect": true, "rationale": "'Ruth' is an archaic word for pity or compassion. The eyes look on his pain with gentle, attractive (pretty) compassion."}, {"text": "Indifference", "isCorrect": false, "rationale": "Ruth expresses emotional engagement, not indifference."}, {"text": "Mockery", "isCorrect": false, "rationale": "Ruth is sympathetic, not mocking."}]}, {"question": "What two celestial images does the speaker use to describe the power of mourning eyes to beautify their setting?", "options": [{"text": "The full moon and a comet", "isCorrect": false, "rationale": "The images are the morning sun and the evening star, not the moon and comet."}, {"text": "The morning sun on the grey east and the evening star on the sober west", "isCorrect": true, "rationale": "The speaker says her eyes become her face as the morning sun becomes the grey cheeks of the east, and as the full evening star glorifies the sober west."}, {"text": "A sunrise over the sea and a sunset over mountains", "isCorrect": false, "rationale": "The images are specifically the morning sun/grey east and the full star/sober west."}, {"text": "A blazing noon sun and a pale winter dawn", "isCorrect": false, "rationale": "The images are dawn and dusk, not noon and winter dawn."}]}, {"question": "What does the speaker ask of the mistress in the sestet?", "options": [{"text": "That she stop looking at him with disdain", "isCorrect": false, "rationale": "He asks her heart to match the pity her eyes already show, not that she stop any action."}, {"text": "That her heart mourn for him as her eyes do, so that mourning graces her entirely", "isCorrect": true, "rationale": "The speaker petitions: since her eyes already mourn and mourning becomes her, let her heart also mourn, completing the correspondence between outward and inward."}, {"text": "That she declare publicly that beauty must be dark", "isCorrect": false, "rationale": "No public declaration is requested; the request is for her private heart to align with her eyes."}, {"text": "That she come to him in the evening like the evening star", "isCorrect": false, "rationale": "The evening star simile illustrates her eyes' beauty; no meeting is requested."}]}, {"question": "What will the speaker swear if the mistress grants his request?", "options": [{"text": "That she is the fairest woman in England", "isCorrect": false, "rationale": "The oath is about beauty itself being black, not about ranking her among women."}, {"text": "That beauty herself is black, and all those lacking her complexion are foul", "isCorrect": true, "rationale": "The couplet: 'Then will I swear beauty herself is black, / And all they foul that thy complexion lack' — her dark complexion becomes the absolute definition of beauty."}, {"text": "That mourning is more beautiful than any other expression", "isCorrect": false, "rationale": "The oath is about dark complexion as the standard of beauty, not about mourning."}, {"text": "That he will write poems praising her forever", "isCorrect": false, "rationale": "The oath concerns beauty's definition, not a promise of ongoing praise."}]}, {"question": "How does Sonnet CXXXII develop the theme introduced in Sonnet CXXVII?", "options": [{"text": "It introduces a completely new argument about beauty", "isCorrect": false, "rationale": "CXXXII extends and deepens CXXVII's argument rather than replacing it."}, {"text": "It reinforces the argument that dark coloring represents the true standard of beauty, now applied to the heart as well as the eyes", "isCorrect": true, "rationale": "CXXVII argued that dark was beauty's heir; CXXXII goes further, asking that the heart's darkness (mourning) match the eyes' dark beauty, and the couplet declares dark complexion the absolute standard."}, {"text": "It contradicts CXXVII by suggesting dark beauty is only external", "isCorrect": false, "rationale": "CXXXII extends the argument inward to the heart; it does not contradict CXXVII."}, {"text": "It introduces art and cosmetics as themes for the first time", "isCorrect": false, "rationale": "Cosmetics were the subject of CXXVII; CXXXII focuses on the eyes' mourning quality."}]}, {"question": "The phrase 'grey cheeks of the east' in line 8 refers to what?", "options": [{"text": "The mistress's grey-tinted complexion", "isCorrect": false, "rationale": "This is a celestial metaphor, not a description of the mistress's face."}, {"text": "The pre-dawn sky in the east before sunrise", "isCorrect": true, "rationale": "The 'grey cheeks of the east' is the pale eastern sky just before dawn, which the morning sun glorifies and brightens — just as the mistress's dark eyes beautify her face."}, {"text": "Old age written on a lover's face", "isCorrect": false, "rationale": "The phrase is a celestial image of the dawn sky, not a reference to aging."}, {"text": "Autumn fog over the English countryside", "isCorrect": false, "rationale": "The image is astronomical — the eastern sky at dawn."}]}, {"question": "What is the relationship between the mistress's eyes and her heart in this sonnet?", "options": [{"text": "They are in complete harmony — both loving and gentle", "isCorrect": false, "rationale": "The sonnet reveals a disjunction: the eyes appear pitying while the heart torments with disdain."}, {"text": "Her eyes seem compassionate while her heart is cruel with disdain — the speaker asks that her heart match her eyes", "isCorrect": true, "rationale": "The eyes 'put on black' in sympathy, but they do so precisely because 'thy heart torment me with disdain.' The speaker petitions the heart to mourn as the eyes do."}, {"text": "Her heart is warm but her eyes are cold", "isCorrect": false, "rationale": "It is the reverse: eyes appear warm/pitying, heart is tormenting."}, {"text": "Both eyes and heart are equally indifferent to the speaker", "isCorrect": false, "rationale": "The eyes are interpreted as pitying; only the heart shows disdain."}]}, {"question": "What literary device is used when the speaker treats the eyes and heart as if they were separate persons with separate wills?", "options": [{"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe addresses an absent or abstract entity; here the device animates body parts."}, {"text": "Personification", "isCorrect": true, "rationale": "The eyes 'put on black' and are 'loving mourners,' the heart 'torments' — all parts of the mistress's body are personified as independent agents."}, {"text": "Synecdoche", "isCorrect": false, "rationale": "Synecdoche uses a part to represent the whole; here the parts are animated as independent agents, which is personification."}, {"text": "Metonymy", "isCorrect": false, "rationale": "Metonymy substitutes an associated concept for the thing itself; the device here is the animation of body parts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
