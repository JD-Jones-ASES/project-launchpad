    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker wish his flesh were made of at the opening of Sonnet XLIV?", "options": [{"text": "Stone, so that he could endure the pain of separation.", "isCorrect": false, "rationale": "Stone suggests endurance, but the speaker's wish is for something that could travel instantly, not simply endure."}, {"text": "Thought, so that distance could not keep him from the beloved.", "isCorrect": true, "rationale": "The opening lines state: “If the dull substance of my flesh were thought, / Injurious distance should not stop my way.” Thought can leap any distance instantly."}, {"text": "Water, so that he could flow continuously toward the beloved.", "isCorrect": false, "rationale": "Water is one of the four elements mentioned later, but it is associated with slowness and tears, not the wished-for mobility."}, {"text": "Fire, so that he could burn away the miles between them.", "isCorrect": false, "rationale": "Fire is the swift element in Sonnet XLV, not the wished-for substance here."}], "id": "q01"}, {"question": "The phrase “injurious distance” personifies distance as:", "options": [{"text": "A helpful guide leading the speaker to the beloved.", "isCorrect": false, "rationale": "Distance is cast negatively, as something harmful, not as a guide."}, {"text": "A harmful obstacle that causes damage by keeping the lovers apart.", "isCorrect": true, "rationale": "“Injurious” means causing injury or harm. The personification frames distance as an active agent of hurt."}, {"text": "A neutral geographic fact with no emotional significance.", "isCorrect": false, "rationale": "The poem is entirely about the emotional injury caused by distance; it is never neutral."}, {"text": "A trusted companion that accompanies the speaker on his journey.", "isCorrect": false, "rationale": "Distance is antagonist, not companion."}], "id": "q02"}, {"question": "According to the speaker, what can “nimble thought” do that the body cannot?", "options": [{"text": "Write poetry to capture the beloved’s beauty.", "isCorrect": false, "rationale": "Poetry is not the subject here; the claim is about spatial movement."}, {"text": "Jump both sea and land to reach the beloved instantly.", "isCorrect": true, "rationale": "Line 9 states: “For nimble thought can jump both sea and land, / As soon as think the place where he would be.” Thought is presented as instantaneous travel."}, {"text": "Dream vivid visions of the beloved’s face.", "isCorrect": false, "rationale": "Dreaming is the focus of Sonnet XLIII; here the focus is on the fantasy of bodily travel via thought."}, {"text": "Remember the beloved’s voice and preserve it forever.", "isCorrect": false, "rationale": "Memory and voice are not the concern here."}], "id": "q03"}, {"question": "The speaker says he is made of “earth and water.” In the four-element system of classical thought, what does this imply about his nature?", "options": [{"text": "He is quick and fiery, full of passionate energy.", "isCorrect": false, "rationale": "Earth and water are the heavy, slow elements; fire and air are quick and energetic."}, {"text": "He is composed of the two heaviest, slowest elements, explaining his inability to travel quickly.", "isCorrect": true, "rationale": "Earth and water are the heavy, ponderous elements in classical cosmology. The speaker uses this to explain why his body cannot match the speed of thought."}, {"text": "He is perfectly balanced between all four elements.", "isCorrect": false, "rationale": "He explicitly claims only earth and water compose him, lamenting the absence of the quicker elements."}, {"text": "He is made of the two elements that rise upward toward heaven.", "isCorrect": false, "rationale": "Air and fire are the ascending elements; earth and water sink downward."}], "id": "q04"}, {"question": "What are the “badges of either’s woe” mentioned in the final couplet?", "options": [{"text": "Letters that the speaker writes but cannot send.", "isCorrect": false, "rationale": "No letters are mentioned; the badges are physical, bodily products of grief."}, {"text": "Heavy tears, which are themselves made of water, one of the slow elements.", "isCorrect": true, "rationale": "The couplet names “heavy tears” as the only things he receives from the slow elements of earth and water — they are both the product of grief and an emblem of his elemental composition."}, {"text": "Dark dreams that disturb the speaker’s sleep.", "isCorrect": false, "rationale": "Dreams are the consolation of Sonnet XLIII; here the speaker speaks of tears, not dreams."}, {"text": "The miles of road that separate the two lovers.", "isCorrect": false, "rationale": "The miles are the cause of woe, not the badge; the badge is the physical evidence of grief."}], "id": "q05"}, {"question": "The word “attend” in line 14 (“I must attend time’s leisure”) most nearly means:", "options": [{"text": "To assist or serve someone.", "isCorrect": false, "rationale": "While “attend” can mean ‘to serve,’ in this context the sense is waiting on someone else’s schedule."}, {"text": "To wait upon; to be subject to the pace of time.", "isCorrect": true, "rationale": "“Attend time’s leisure” means to wait at the pleasure of time — to be helplessly subject to time’s slow pace."}, {"text": "To hurry forward eagerly.", "isCorrect": false, "rationale": "The speaker has no power to hurry; attending is passive waiting."}, {"text": "To observe carefully with close attention.", "isCorrect": false, "rationale": "Observation is not the sense; the phrase is about passive waiting."}], "id": "q06"}, {"question": "The phrase “thought kills me” (line 11) is an example of:", "options": [{"text": "Simile — comparing thought to a weapon.", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ comparison is present."}, {"text": "Hyperbole — exaggerating the pain of realizing he is not thought.", "isCorrect": true, "rationale": "The speaker says “ah! thought kills me” to express how agonizing it is to realize that, unlike nimble thought, his physical body is trapped by distance. The death is metaphorical and hyperbolic."}, {"text": "Alliteration — repetition of the same initial sound.", "isCorrect": false, "rationale": "There is no repeated initial sound between ‘thought’ and ‘kills.’"}, {"text": "Apostrophe — directly addressing an absent person.", "isCorrect": false, "rationale": "The speaker addresses thought indirectly, not as a direct exclamation to an absent person."}], "id": "q07"}, {"question": "Sonnet XLIV is a companion to Sonnet XLV. Together they address:", "options": [{"text": "The four seasons of the year and their effect on love.", "isCorrect": false, "rationale": "Seasons are invoked occasionally in the sonnets but are not the subject of this pair."}, {"text": "The four classical elements (earth, water, air, fire) and how they relate to the speaker’s separation from the beloved.", "isCorrect": true, "rationale": "XLIV addresses earth and water (the heavy elements that compose the speaker’s body), while XLV addresses air and fire (the light elements that travel to the beloved as thought and desire)."}, {"text": "Two rival poets competing for the beloved’s favor.", "isCorrect": false, "rationale": "The rival poet theme belongs to a different group of sonnets."}, {"text": "The day and night cycle as metaphors for presence and absence.", "isCorrect": false, "rationale": "Day/night imagery dominates Sonnet XLIII; this pair is structured around the four elements."}], "id": "q08"}, {"question": "Where is the volta of Sonnet XLIV?", "options": [{"text": "At line 5, when the speaker begins imagining travel from afar.", "isCorrect": false, "rationale": "Lines 5–10 extend the fantasy of thought-travel and remain in the hypothetical mode."}, {"text": "At line 11 (“But, ah! thought kills me”), where the speaker abruptly abandons the fantasy and confronts reality.", "isCorrect": true, "rationale": "The “But, ah!” marks the turn from wishful thinking (if only I were thought) to the painful acknowledgment that he is not — he is made of slow earth and water."}, {"text": "At the couplet, when the speaker accepts his tears.", "isCorrect": false, "rationale": "The couplet deepens the turn but the reversal is introduced at line 11."}, {"text": "At line 7, when the speaker considers travel to the farthest earth.", "isCorrect": false, "rationale": "Line 7 is still within the wish-fulfillment section of the poem."}], "id": "q09"}, {"question": "The overall emotional register of Sonnet XLIV is best described as:", "options": [{"text": "Joyful and celebratory, exulting in the power of love.", "isCorrect": false, "rationale": "The poem ends in tears and lament; joy is absent."}, {"text": "Philosophical and resigned, accepting the physical limitations that separate the lovers.", "isCorrect": true, "rationale": "The poem moves from wishful intellectual speculation (what if I were thought?) through painful acknowledgment of physical limitation to resigned sorrow — tears are all the heavy elements yield."}, {"text": "Angry and accusatory, blaming the beloved for the separation.", "isCorrect": false, "rationale": "No blame is directed at the beloved; the speaker blames only his own elemental composition."}, {"text": "Playful and witty, treating separation as a trivial inconvenience.", "isCorrect": false, "rationale": "The wit of the elemental conceit is present, but the emotional weight is genuine grief, not playfulness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
