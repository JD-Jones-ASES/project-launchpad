<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker question about his own verse in lines 1–2?", "options": [{"text": "Why it is so poorly received by critics", "isCorrect": false, "rationale": "The speaker questions his verse’s lack of novelty and variation, not its critical reception."}, {"text": "Why it is so lacking in new pride, variation, and quick change", "isCorrect": true, "rationale": "Lines 1–2: “Why is my verse so barren of new pride, / So far from variation or quick change?”"}, {"text": "Why he cannot write sonnets as long as other poets", "isCorrect": false, "rationale": "Length is not the concern; novelty and variation are."}, {"text": "Why he does not write in different poetic forms", "isCorrect": false, "rationale": "The sonnet’s question is about variation and novelty within his existing practice, not about changing forms."}], "id": "q01"}, {"question": "What does “new-found methods, and to compounds strange” (line 4) refer to?", "options": [{"text": "Alchemical experiments the speaker is conducting", "isCorrect": false, "rationale": "The context is poetic, not alchemical; the methods are new poetic techniques."}, {"text": "New poetic techniques and unusual combinations of style or vocabulary being used by other poets", "isCorrect": true, "rationale": "The speaker is referring to contemporary poetic fashions — new methods of writing and unusual compound words or styles — which he does not adopt."}, {"text": "New scientific discoveries that the speaker refuses to incorporate into his verse", "isCorrect": false, "rationale": "The innovation in question is poetic, not scientific."}, {"text": "Foreign influences from Italian or French poetry that the speaker has not studied", "isCorrect": false, "rationale": "While foreign influences are possible background, the line refers generally to contemporary poetic novelty."}], "id": "q02"}, {"question": "What does the speaker give as his reason for always writing the same way (lines 11–12)?", "options": [{"text": "He lacks the talent to invent new forms of expression", "isCorrect": false, "rationale": "The reason given is not lack of talent but single-minded devotion to the beloved as his only subject."}, {"text": "He always writes of the beloved, and love and the beloved are always his argument", "isCorrect": true, "rationale": "Lines 11–12: “O! know sweet love I always write of you, / And you and love are still my argument.”"}, {"text": "His patrons demand that he write in a consistent style", "isCorrect": false, "rationale": "No patron is mentioned; the constancy comes from the constancy of the speaker’s love."}, {"text": "He is imitating the classical poets who also wrote on a single theme", "isCorrect": false, "rationale": "The reason is personal devotion, not classical imitation."}], "id": "q03"}, {"question": "What does “dressing old words new” (line 13) mean?", "options": [{"text": "The speaker translates Latin poetry into English", "isCorrect": false, "rationale": "The image is about presenting the same ideas (about the beloved and love) in fresh verbal dress, not translation."}, {"text": "The speaker finds new ways to express the same enduring subject — the beloved and love", "isCorrect": true, "rationale": "“Dressing old words new” means clothing familiar ideas in fresh expression; the content (love, the beloved) is the same; only the verbal garment changes."}, {"text": "The speaker is revising his earlier sonnets and improving their language", "isCorrect": false, "rationale": "The phrase is not about revision of existing texts but about the ongoing creative act."}, {"text": "The speaker is plagiarizing earlier poets and updating their style", "isCorrect": false, "rationale": "The speaker is not accused of plagiarism; the constancy is thematic (the beloved), not borrowed."}], "id": "q04"}, {"question": "What does “Spending again what is already spent” (line 14) suggest?", "options": [{"text": "The speaker is financially reckless", "isCorrect": false, "rationale": "The spending is metaphorical: the speaker re-expends the same imaginative and verbal resources in each new poem."}, {"text": "The speaker repeatedly uses the same themes and words, refigured anew in each sonnet", "isCorrect": true, "rationale": "The “spent” resources are the already-used words and themes about love and the beloved; the speaker keeps drawing on the same well and re-deploying what has been used before."}, {"text": "The speaker has exhausted all his creative energy and cannot write more", "isCorrect": false, "rationale": "The line acknowledges the re-use but frames it as a continuing creative act, not exhaustion."}, {"text": "The beloved has consumed all the speaker’s time and left nothing for other pursuits", "isCorrect": false, "rationale": "The spending is of verbal and imaginative resources, not time."}], "id": "q05"}, {"question": "What simile concludes the sonnet and what does it mean?", "options": [{"text": "“As the moon is monthly new” — love changes with each cycle", "isCorrect": false, "rationale": "The simile used is the sun, not the moon; and the point is constancy-within-renewal."}, {"text": "“As the sun is daily new and old” — each day brings the same sun, yet it is always fresh; so the speaker’s love is constant yet ever-renewed in telling", "isCorrect": true, "rationale": "Lines 15–16: “For as the sun is daily new and old, / So is my love still telling what is told.” The sun rises every day, always the same yet always fresh. Love tells the same story constantly but never wears out."}, {"text": "“As stars are nightly new” — love appears fresh in the dark of night", "isCorrect": false, "rationale": "Stars are not the comparison; the sun’s daily renewal is."}, {"text": "“As the sea is always moving” — love is in constant flux", "isCorrect": false, "rationale": "The sea is used in other sonnets; here the sun is the vehicle of the simile."}], "id": "q06"}, {"question": "What is “a noted weed” (line 8) referring to?", "options": [{"text": "A specific weed plant that grows in gardens", "isCorrect": false, "rationale": "In Elizabethan English, “weed” means garment or clothing; “noted” means well-known or recognized."}, {"text": "A well-known or recognizable style (garment) that the speaker’s invention is always dressed in", "isCorrect": true, "rationale": "“Weed” = garment (archaic); “noted” = recognized. The speaker keeps invention in a recognized, familiar costume — his style is always recognizably his."}, {"text": "An invasive plant that chokes the variety out of his verse", "isCorrect": false, "rationale": "The botanical meaning of weed is not the intended meaning; weed = garment."}, {"text": "A specific word the speaker overuses in his poetry", "isCorrect": false, "rationale": "The weed is a metaphor for the speaker’s overall recognizable style, not a single word."}], "id": "q07"}, {"question": "What does “that every word doth almost tell my name” (line 9) mean?", "options": [{"text": "The speaker’s name is hidden in acrostic form in the poem", "isCorrect": false, "rationale": "The line means the style is so consistent it identifies the author, not that the name is hidden as an acrostic."}, {"text": "The speaker’s style is so consistent and distinctive that each word virtually announces its author", "isCorrect": true, "rationale": "The speaker’s manner is so recognizable that anyone who reads a line would know it is by him — his signature is in every word."}, {"text": "The speaker has written his own name into each line of the sonnet", "isCorrect": false, "rationale": "No literal name appears; the meaning is about stylistic signature."}, {"text": "Every word the speaker writes is a reflection of his own self-love", "isCorrect": false, "rationale": "Self-love is a theme of Sonnet LXII, not LXXVI; here the concern is recognizability of style."}], "id": "q08"}, {"question": "What broader theme of Chapter 7 does Sonnet LXXVI address?", "options": [{"text": "The speaker’s battle against aging by using new poetic forms", "isCorrect": false, "rationale": "The speaker explicitly does not use new forms; his constancy is his defense."}, {"text": "The relationship between constancy and time: love’s unchanging devotion expressed through verse that, like the sun, is both old and ever-new", "isCorrect": true, "rationale": "Against time’s changes and the age’s novelty-seeking, the speaker offers the paradox of the sun: constant yet perpetually renewed. Love’s truth resides in this constancy."}, {"text": "The destruction of beauty by time and the futility of verse as a remedy", "isCorrect": false, "rationale": "LXXVI is more optimistic than “futility” implies; the sun simile presents constancy as a form of beauty, not failure."}, {"text": "The beloved’s aging and the speaker’s attempt to memorialize it", "isCorrect": false, "rationale": "The beloved’s aging is not the subject of LXXVI; the speaker’s own poetic practice is."}], "id": "q09"}, {"question": "What is the effect of the self-questioning tone (four “Why” questions in lines 1–10)?", "options": [{"text": "It shows the speaker is genuinely uncertain about his own poetic abilities", "isCorrect": false, "rationale": "The questions lead to a confident answer in lines 11–16; the self-questioning is rhetorical, not genuinely uncertain."}, {"text": "It sets up a rhetorical self-examination that the sestet resolves with a confident affirmation of the beloved as the constant subject", "isCorrect": true, "rationale": "The four “Why” questions voice an imagined criticism; the sestet and couplet answer them by affirming devotion to the beloved as the reason for constancy."}, {"text": "It mimics the internal doubts of a poet suffering from writer’s block", "isCorrect": false, "rationale": "The speaker is not blocked; he writes constantly. The questions are about why he does not vary, not why he cannot create."}, {"text": "It is borrowed from a classical rhetorical tradition of self-accusation", "isCorrect": false, "rationale": "While there are classical precedents, the questions function structurally within the sonnet as a setup for the sestet’s resolution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
