    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the first extended metaphor of Sonnet LXXIII?", "options": [{"text": "The speaker compared to a river running dry", "isCorrect": false, "rationale": "The first metaphor is the speaker compared to late autumn, not a river."}, {"text": "The speaker compared to late autumn, with bare boughs and few or no leaves", "isCorrect": true, "rationale": "Lines 1–4: “That time of year thou mayst in me behold / When yellow leaves, or none, or few, do hang / Upon those boughs which shake against the cold, / Bare ruin’d choirs.”"}, {"text": "The speaker compared to a dying fire in a cold grate", "isCorrect": false, "rationale": "The dying fire is the third quatrain’s metaphor, not the first."}, {"text": "The speaker compared to twilight fading after sunset", "isCorrect": false, "rationale": "Twilight is the second quatrain’s metaphor."}]}, {"question": "What does “Bare ruin’d choirs, where late the sweet birds sang” compare the bare boughs to?", "options": [{"text": "Empty churches whose choir lofts are now silent", "isCorrect": true, "rationale": "The boughs in winter are like the ruined choir sections of a church: arched wooden structures now empty of the birds (singers) that once filled them with song."}, {"text": "Silent graveyards overgrown with weeds", "isCorrect": false, "rationale": "Graveyards are not the comparison; the image is of choir lofts in ruined chapels."}, {"text": "Musical instruments abandoned after a concert", "isCorrect": false, "rationale": "“Choirs” refers to the architectural choir loft, not to musical instruments."}, {"text": "The beloved’s silent, unsmiling face", "isCorrect": false, "rationale": "The bare boughs are compared to ruined church choirs, not to the beloved’s expression."}]}, {"question": "What is the second metaphor in Sonnet LXXIII (lines 5–8)?", "options": [{"text": "The speaker as a ship drifting without a sail", "isCorrect": false, "rationale": "No sailing metaphor appears in the second quatrain."}, {"text": "The speaker as twilight after sunset, soon swallowed by the black night (Death’s second self)", "isCorrect": true, "rationale": "Lines 5–8: “In me thou see’st the twilight of such day / As after sunset fadeth in the west; / Which by and by black night doth take away, / Death’s second self, that seals up all in rest.”"}, {"text": "The speaker as a winter storm approaching from the north", "isCorrect": false, "rationale": "No storm metaphor appears; the twilight-to-night progression is the image."}, {"text": "The speaker as a flower closing at nightfall", "isCorrect": false, "rationale": "The flower image is from other sonnets; the second metaphor here is specifically the twilight/night sequence."}]}, {"question": "Why is night called “Death’s second self” (line 8)?", "options": [{"text": "Night is when most deaths occur", "isCorrect": false, "rationale": "The phrase is a metaphysical parallel, not a statistical observation."}, {"text": "Night resembles death because both bring unconsciousness, darkness, and the sealing up of all activity in rest", "isCorrect": true, "rationale": "Sleep in the night, like death, suspends consciousness and activity; night is a small death, and death is an eternal night."}, {"text": "Night is when ghosts and spirits of the dead walk the earth", "isCorrect": false, "rationale": "The image is about the likeness of sleep and death, not about supernatural activity."}, {"text": "The speaker is afraid of the dark and compares it to dying", "isCorrect": false, "rationale": "The comparison is philosophical and metaphorical, not an expression of personal fear."}]}, {"question": "What is the third metaphor in Sonnet LXXIII (lines 9–12)?", "options": [{"text": "The speaker as embers of a dying fire, lying on the ashes of youth, consumed by what nourished it", "isCorrect": true, "rationale": "Lines 9–12: “In me thou see’st the glowing of such fire, / That on the ashes of his youth doth lie, / As the death-bed, whereon it must expire, / Consum’d with that which it was nourish’d by.”"}, {"text": "The speaker as a candle burning brightly before it gutters out", "isCorrect": false, "rationale": "The image is of glowing embers on ashes, not a bright candle flame."}, {"text": "The speaker as molten metal cooling in a mold", "isCorrect": false, "rationale": "No metallurgy image appears; the fire and ashes metaphor is used."}, {"text": "The speaker as a forge dying after the work is done", "isCorrect": false, "rationale": "The fire is the embers of personal youth, not a forge; the metaphor is intimate and personal."}]}, {"question": "What is the paradox of the fire metaphor in lines 9–12?", "options": [{"text": "Fire is both beautiful and dangerous", "isCorrect": false, "rationale": "This is a general truth about fire but not the specific paradox of these lines."}, {"text": "The fire is consumed (extinguished) by the very ashes that were made from what once nourished it", "isCorrect": true, "rationale": "“Consum’d with that which it was nourish’d by”: the ashes (remains of old fuel) now smother the flame. Life is consumed by the very living that nourished it."}, {"text": "Fire lights up darkness yet reveals how dark the darkness is", "isCorrect": false, "rationale": "Light revealing darkness is not the specific paradox of this image."}, {"text": "Youth nourishes beauty but also creates the conditions for its eventual destruction", "isCorrect": false, "rationale": "While this is true of the poem’s theme, the specific paradox in the fire image is that the ashes (burned fuel) now smother the remnant flame."}]}, {"question": "What does the couplet ask the beloved to do with the perception of the speaker’s aging?", "options": [{"text": "Ignore it and love the speaker for his mind alone", "isCorrect": false, "rationale": "The couplet does not ask for the beloved to ignore aging; it asks him to let it intensify his love."}, {"text": "Love more strongly because perceiving the speaker’s age makes the beloved aware that he must soon lose the speaker", "isCorrect": true, "rationale": "Lines 15–16: “This thou perceiv’st, which makes thy love more strong, / To love that well, which thou must leave ere long.”"}, {"text": "Forget the speaker quickly, as requested in Sonnet LXXI", "isCorrect": false, "rationale": "LXXIII’s couplet does the opposite: it asks for intensified love, not forgetting."}, {"text": "Write down memories of the speaker before it is too late", "isCorrect": false, "rationale": "The beloved is asked to love, not to write; the preservation in this sonnet comes from love, not verse."}]}, {"question": "How do the three metaphors in Sonnet LXXIII progressively intensify?", "options": [{"text": "They move from large scale (forest) to small scale (fire), shrinking the focus", "isCorrect": false, "rationale": "While the scale narrows, the progression is not merely one of physical scale but of urgency and proximity to death."}, {"text": "Each metaphor brings the speaker closer to death: from a season (slow decline), to a time of day (approaching night), to a moment (dying embers)", "isCorrect": true, "rationale": "Autumn spans months; twilight spans minutes; the glowing of embers spans moments. Each metaphor compresses time, intensifying the sense of imminent extinction."}, {"text": "They move from personal to universal, broadening the theme", "isCorrect": false, "rationale": "The movement is the reverse: each metaphor becomes more intimate and immediate."}, {"text": "They each represent a different historical period of the speaker’s life", "isCorrect": false, "rationale": "All three metaphors represent the speaker’s current aged condition, approaching death from different angles."}]}, {"question": "What is the dominant literary device linking all three quatrains?", "options": [{"text": "Rhetorical questions", "isCorrect": false, "rationale": "The quatrains use declarative statements and extended metaphors, not rhetorical questions."}, {"text": "Extended metaphor (conceit), with each quatrain presenting a different metaphor for the speaker’s aging and approaching death", "isCorrect": true, "rationale": "Each quatrain is a sustained metaphor: autumn, twilight, dying fire. Together they form a triple conceit that encircles the theme of mortality."}, {"text": "Apostrophe, addressing death directly", "isCorrect": false, "rationale": "The sonnet addresses the beloved (“thou”), not death directly."}, {"text": "Simile, comparing the speaker to natural phenomena using “like” or “as”", "isCorrect": false, "rationale": "The metaphors are direct (“in me thou see’st”), not similes using “like” or “as.”"}]}, {"question": "Why is Sonnet LXXIII often considered one of Shakespeare’s greatest achievements?", "options": [{"text": "Because it uses the most unusual vocabulary of any sonnet in the sequence", "isCorrect": false, "rationale": "LXXIII’s language is relatively plain; its greatness is in the compression and perfection of its imagery."}, {"text": "Because its three progressively compressed metaphors achieve perfect structural unity and emotional intensity", "isCorrect": true, "rationale": "The seasonal, daily, and momentary metaphors build with increasing urgency; the couplet’s paradox (approaching loss intensifies love) resolves them with economy and emotional force."}, {"text": "Because it is the only sonnet to explicitly name Shakespeare himself", "isCorrect": false, "rationale": "Shakespeare never names himself in the sonnets; LXXIII gains its greatness from imagery, not autobiographical reference."}, {"text": "Because it is the longest sonnet in the sequence", "isCorrect": false, "rationale": "All Shakespearean sonnets are 14 lines; LXXIII is not longer than others."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
