<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How long does the speaker say he has known the beloved, based on the evidence in the poem?", "options": [{"text": "One year", "isCorrect": false, "rationale": "The poem counts three full cycles of seasons, not one."}, {"text": "Three years", "isCorrect": true, "rationale": "Three winters, three summers, three springs, and three Aprils are enumerated, pointing to a friendship of three years."}, {"text": "Ten years", "isCorrect": false, "rationale": "Only three cycles are counted; ten years is not supported."}, {"text": "Since childhood", "isCorrect": false, "rationale": "No childhood connection is mentioned; the acquaintance is measured by specific seasonal cycles."}]}, {"question": "What does the speaker claim about his perception of the beloved's appearance?", "options": [{"text": "He can see the beloved aging rapidly", "isCorrect": false, "rationale": "The speaker perceives no change — he cannot see the aging, which is the point of the poem."}, {"text": "The beloved seems no older now than when first seen", "isCorrect": true, "rationale": "'To me, fair friend, you never can be old, / For as you were when first your eye I ey'd, / Such seems your beauty still.'"}, {"text": "The beloved has grown more beautiful over time", "isCorrect": false, "rationale": "The speaker perceives stasis, not improvement."}, {"text": "The beloved's beauty has faded but remains perfect to him", "isCorrect": false, "rationale": "The speaker denies perceiving any fading at all."}]}, {"question": "What image does the speaker use to describe how beauty changes imperceptibly?", "options": [{"text": "A candle burning down in the dark", "isCorrect": false, "rationale": "The candle image is not used here."}, {"text": "A dial-hand (clock hand) stealing from its figure", "isCorrect": true, "rationale": "'Doth beauty like a dial-hand, / Steal from his figure, and no pace perceiv'd' — the clock hand moves too slowly to observe directly."}, {"text": "A river gradually wearing away stone", "isCorrect": false, "rationale": "No river erosion metaphor appears here."}, {"text": "Leaves falling one by one in autumn", "isCorrect": false, "rationale": "Autumn is mentioned in the seasonal count but not as the central image of imperceptible change."}]}, {"question": "What concern does the speaker express after reflecting on the dial-hand image?", "options": [{"text": "That his love is growing cold without his awareness", "isCorrect": false, "rationale": "His love is not what he fears is imperceptibly changing; it is the beloved's beauty."}, {"text": "That his eye may be deceived, missing beauty's gradual motion", "isCorrect": true, "rationale": "'So your sweet hue, which methinks still doth stand, / Hath motion, and mine eye may be deceiv'd.'"}, {"text": "That the beloved is deliberately hiding signs of aging", "isCorrect": false, "rationale": "There is no suggestion of deliberate concealment."}, {"text": "That three years is not long enough to truly know someone", "isCorrect": false, "rationale": "The three years are presented as evidence of continuity, not as a limitation."}]}, {"question": "What warning does the speaker issue in the couplet?", "options": [{"text": "He warns his beloved to avoid the sun lest beauty fade faster", "isCorrect": false, "rationale": "The couplet addresses a future unborn age, not the beloved directly."}, {"text": "He warns future generations that beauty's summer was over before they were born", "isCorrect": true, "rationale": "'For fear of which, hear this thou age unbred: / Ere you were born was beauty's summer dead.'"}, {"text": "He warns that Time cannot be defeated by any human art", "isCorrect": false, "rationale": "The warning is about the beloved's beauty passing before any future generation can witness it."}, {"text": "He warns the beloved not to trust in his constancy", "isCorrect": false, "rationale": "The warning goes to future ages, not to the beloved, and concerns beauty, not loyalty."}]}, {"question": "To whom is the couplet addressed?", "options": [{"text": "The beloved", "isCorrect": false, "rationale": "The couplet shifts address to 'thou age unbred' — a future unborn generation."}, {"text": "A future, yet-unborn age", "isCorrect": true, "rationale": "'Hear this thou age unbred' directly addresses a generation not yet born."}, {"text": "The Muse", "isCorrect": false, "rationale": "The Muse is not the addressee of the couplet in Sonnet CIV."}, {"text": "Time itself", "isCorrect": false, "rationale": "Time is the implied destroyer but not the direct addressee of the couplet."}]}, {"question": "What does the seasonal catalogue (three winters, three summers, etc.) accomplish in the poem?", "options": [{"text": "It establishes the poet's age", "isCorrect": false, "rationale": "The catalogue measures the duration of the friendship, not the poet's age."}, {"text": "It marks the passage of time while paradoxically showing that the beloved seems unchanged", "isCorrect": true, "rationale": "The elaborate counting of seasons makes Time's passage concrete, heightening the wonder that the beloved appears ageless despite it all."}, {"text": "It signals that the friendship is about to end", "isCorrect": false, "rationale": "The catalogue is celebratory, not elegiac."}, {"text": "It compares the beloved's beauty to each season in turn", "isCorrect": false, "rationale": "The seasons are not compared to the beloved's beauty; they mark the passage of time."}]}, {"question": "What rhetorical effect does 'your eye I ey'd' create?", "options": [{"text": "It creates a pun linking sight and the pronoun 'I'", "isCorrect": false, "rationale": "While playful, the primary device is polyptoton — using the same root word in different forms."}, {"text": "It uses polyptoton (same root word in different forms) to suggest the depth of the speaker's gaze", "isCorrect": true, "rationale": "'Eye I ey'd' uses the noun and verb forms of the same root, giving an intensive, recursive quality to the act of looking."}, {"text": "It is an example of rhyme used mid-line", "isCorrect": false, "rationale": "There is no rhyme here; the word repetition in different forms is polyptoton."}, {"text": "It signals that the beloved's eyes are his most remarkable feature", "isCorrect": false, "rationale": "The phrase emphasizes the moment of first sight, not the eyes as a specifically praised feature."}]}, {"question": "What is the central irony of Sonnet CIV?", "options": [{"text": "The speaker praises beauty while knowing it cannot last", "isCorrect": false, "rationale": "While time's destruction is implied, the central irony is more specific."}, {"text": "The speaker cannot perceive the change he knows must be occurring", "isCorrect": true, "rationale": "He knows intellectually that beauty must be moving like a dial-hand, yet his eye still sees the beloved as unchanged — perception and knowledge diverge."}, {"text": "Three years of friendship have felt like a single day", "isCorrect": false, "rationale": "The opposite is true: the poem carefully counts three full years to show how long the beloved has seemed unchanged."}, {"text": "The beloved is unaware of his own beauty", "isCorrect": false, "rationale": "The beloved's self-awareness is not addressed; the irony concerns the speaker's perception."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
