<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker ask the mistress NOT to do at the opening of the sonnet?", "options": [{"text": "Not to love another man", "isCorrect": false, "rationale": "He does not forbid her other loves; he asks her not to wound him with her eyes in his presence."}, {"text": "Not to call on him to justify the wrong her unkindness causes", "isCorrect": true, "rationale": "'O! call not me to justify the wrong / That thy unkindness lays upon my heart' — he asks not to be required to rationalize or defend the pain she inflicts on him."}, {"text": "Not to deny that she loves elsewhere", "isCorrect": false, "rationale": "He actually asks her to tell him openly that she loves elsewhere."}, {"text": "Not to look at him at all", "isCorrect": false, "rationale": "He later asks her to direct her eyes elsewhere in his presence — not to stop looking entirely, but to spare him the glancing eye."}]}, {"question": "In what specific way does the speaker ask to be wounded?", "options": [{"text": "With her physical departure", "isCorrect": false, "rationale": "He does not ask her to leave."}, {"text": "With her tongue rather than her eye — with direct words rather than glances aside", "isCorrect": true, "rationale": "'Wound me not with thine eye, but with thy tongue' — he would rather be told plainly that she loves elsewhere than be tortured by watching her eyes glance at other men."}, {"text": "With cold silence rather than cruel words", "isCorrect": false, "rationale": "He prefers her tongue (direct speech) over her eye (indirect glancing); silence is not offered as an alternative."}, {"text": "With complete rejection rather than partial attention", "isCorrect": false, "rationale": "He asks for honesty (tongue) vs. indirect cruelty (eye), not total rejection."}]}, {"question": "What does the phrase 'use power with power' mean?", "options": [{"text": "Fight fire with fire — respond to her cruelty with his own", "isCorrect": false, "rationale": "The speaker does not threaten retaliation; he asks her to use her direct power openly rather than through cunning."}, {"text": "Use her actual power (might) directly, rather than the cunning, indirect power of sidelong glances", "isCorrect": true, "rationale": "He asks her to wield her power honestly and directly rather than through the artful, oblique wound of the wandering eye. Straight force is preferable to subtle manipulation."}, {"text": "Use both her emotional and physical power together", "isCorrect": false, "rationale": "The contrast is between direct power (tongue/might) and cunning power (eye/art), not between combining types."}, {"text": "Share power equally between them in the relationship", "isCorrect": false, "rationale": "No argument for equality is made; he asks for direct rather than indirect wounding."}]}, {"question": "Why does the speaker ask her to tell him she loves elsewhere but spare him the wandering glance in his sight?", "options": [{"text": "Because hearing the words would give him legal proof of her infidelity", "isCorrect": false, "rationale": "No legal purpose is involved."}, {"text": "Because direct verbal confession is less torturous than watching her eyes stray to others in front of him", "isCorrect": true, "rationale": "The indirect wound — watching her eyes dart elsewhere while he is present — is more psychologically painful than the direct statement 'I love elsewhere.' He can cope with a declared truth more than with an unacknowledged performed one."}, {"text": "Because her eyes will convince others of her infidelity and damage his reputation", "isCorrect": false, "rationale": "His concern is psychological pain, not social reputation."}, {"text": "Because words can be forgiven more easily than actions", "isCorrect": false, "rationale": "The preference for tongue over eye is about the mode of cruelty, not about forgiveness."}]}, {"question": "How does the speaker excuse the mistress in lines 11-14?", "options": [{"text": "He argues she has no control over her own behavior", "isCorrect": false, "rationale": "The excuse offered is more specific: her pretty looks are his enemies and she turns them away to protect him."}, {"text": "He argues she turns her eyes away from him to spare him — her looks are weapons that she deflects elsewhere for his sake", "isCorrect": true, "rationale": "'Let me excuse thee: ah! my love well knows / Her pretty looks have been mine enemies; / And therefore from my face she turns my foes, / That they elsewhere might dart their injuries' — he finds a generous interpretation: her wandering eyes are actually protecting him by redirecting their harmful beauty away from him."}, {"text": "He argues she is acting on orders she cannot disobey", "isCorrect": false, "rationale": "No such external compulsion is invoked."}, {"text": "He argues her faithlessness is a form of kindness", "isCorrect": false, "rationale": "The excuse concerns her eyes, not her faithlessness per se."}]}, {"question": "What does 'rid my pain' mean in the final couplet?", "options": [{"text": "Cure his pain by becoming faithful", "isCorrect": false, "rationale": "He asks for a clean kill, not a cure through faithfulness."}, {"text": "End his suffering by killing him outright with her looks — a clean death rather than lingering torment", "isCorrect": true, "rationale": "'Kill me outright with looks, and rid my pain' — he would rather she destroy him completely with a direct, full look than continue to torture him with the slow agony of oblique glances. The death wish is hyperbolically sincere."}, {"text": "Release him from the relationship entirely", "isCorrect": false, "rationale": "He asks for a killing look, not release from the relationship."}, {"text": "Stop inflicting pain and treat him kindly", "isCorrect": false, "rationale": "Paradoxically, he asks for MORE intensity, not less — a clean kill rather than prolonged wounding."}]}, {"question": "What is the central paradox of Sonnet CXXXIX?", "options": [{"text": "That he loves what he fears", "isCorrect": false, "rationale": "While fear is present, the central paradox is more specific."}, {"text": "He asks her to wound him more fully rather than less — preferring outright destruction to the agony of indirect cruelty", "isCorrect": true, "rationale": "The sonnet's paradox: he does not ask for mercy or relief but for a more complete and honest cruelty. The indirect wound of the wandering eye is worse than a straight-aimed kill. He prefers total devastation to prolonged, artful torment."}, {"text": "He loves her more when she hurts him than when she is kind", "isCorrect": false, "rationale": "This may be implied, but the stated paradox is about the mode of wounding (direct vs. indirect)."}, {"text": "Her beauty is the source of both his pleasure and his suffering", "isCorrect": false, "rationale": "Beauty as simultaneous pleasure and pain is a Petrarchan commonplace; this sonnet's paradox is more specific about direct vs. indirect cruelty."}]}, {"question": "What tone does the speaker's attempt to excuse the mistress (lines 11-14) reveal?", "options": [{"text": "Anger barely concealed beneath rationalization", "isCorrect": false, "rationale": "The excusing is tender and self-aware, not angry."}, {"text": "Painful self-aware tenderness — he still finds generous interpretations for her behavior even while in agony", "isCorrect": true, "rationale": "The 'let me excuse thee' passage shows the speaker capable of love-blinded generosity even while suffering. He rewrites her cruelty as concern for him — a touching, self-deceiving act of devotion."}, {"text": "Cold philosophical detachment", "isCorrect": false, "rationale": "The tone is emotionally raw, not detached."}, {"text": "Bitter sarcasm disguised as praise", "isCorrect": false, "rationale": "The excuse is offered sincerely, even if also self-deceivingly — not sarcastically."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
