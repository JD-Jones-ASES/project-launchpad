        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What three objects does the speaker address in Sonnet LXXVII, and what does each reveal?", "options": [{"text": "A portrait, a poem, and a letter — revealing the beloved’s face, heart, and words", "isCorrect": false, "rationale": "The three objects are a glass (mirror), a dial (sundial), and a book with blank pages."}, {"text": "A glass (mirror), a dial (sundial), and a book with blank pages — revealing aging, time passing, and the mind’s contents", "isCorrect": true, "rationale": "Lines 1–4: “Thy glass will show thee how thy beauties wear, / Thy dial how thy precious minutes waste; / These vacant leaves thy mind’s imprint will bear.”"}, {"text": "A candle, an hourglass, and a diary — revealing mortality, time’s passage, and memory", "isCorrect": false, "rationale": "These are close in meaning but the specific objects in the sonnet are glass, dial, and book."}, {"text": "A mirror, a clock, and a painting — revealing beauty, time, and art’s permanence", "isCorrect": false, "rationale": "The clock and painting are not the specific objects; the dial is a sundial, and the blank book is for writing, not painting."}], "id": "q01"}, {"question": "What does “thy dial’s shady stealth” (line 9) describe?", "options": [{"text": "The beloved’s dishonest behavior conducted in the shadows", "isCorrect": false, "rationale": "The dial is a sundial; “shady stealth” describes the shadow’s imperceptible movement as it marks time."}, {"text": "The imperceptible, creeping movement of the sundial’s shadow as it marks time’s passage", "isCorrect": true, "rationale": "A sundial’s shadow moves so slowly it seems to steal forward unnoticed — “shady stealth” captures this imperceptible theft of time."}, {"text": "The beloved sneaking away from the speaker under cover of darkness", "isCorrect": false, "rationale": "The dial’s shadow is the subject, not the beloved’s behavior."}, {"text": "A darkening sky that blocks the sundial from working", "isCorrect": false, "rationale": "The shadow is the means by which the dial tells time, not an obstruction to it."}], "id": "q02"}, {"question": "What does the speaker say about “mouthed graves” (line 8)?", "options": [{"text": "The graves will swallow the beloved’s beauty", "isCorrect": false, "rationale": "The line uses the wrinkles the mirror shows as a reminder of graves, not as a direct threat of being swallowed."}, {"text": "The wrinkles shown in the mirror will give the beloved memory of mouthed graves — mortality made visible on the face", "isCorrect": true, "rationale": "Lines 7–8: “The wrinkles which thy glass will truly show / Of mouthed graves will give thee memory.” Wrinkles resemble the open mouths of graves: a memento mori."}, {"text": "The speaker has visited graveyards and written about the mouths of the dead", "isCorrect": false, "rationale": "The graves are a metaphorical image linked to wrinkles in the mirror, not a visited location."}, {"text": "The dead cry out from their graves to warn the beloved about aging", "isCorrect": false, "rationale": "The graves are silent; it is the wrinkles that “give memory” of them."}], "id": "q03"}, {"question": "What does the speaker urge the beloved to do with the blank pages of the book?", "options": [{"text": "Copy down the speaker’s poems to preserve them", "isCorrect": false, "rationale": "The beloved is urged to record his own thoughts, not to copy the speaker’s work."}, {"text": "Commit his thoughts and memories to the blank pages so he can revisit and enrich them later", "isCorrect": true, "rationale": "Lines 11–14: “Look! what thy memory cannot contain, / Commit to these waste blanks, and thou shalt find / Those children nursed, deliver’d from thy brain, / To take a new acquaintance of thy mind.”"}, {"text": "Leave the pages blank as a symbol of pure, unwritten love", "isCorrect": false, "rationale": "The speaker specifically urges the beloved to write in the book, not to leave it blank."}, {"text": "Burn the book after reading to prevent others from learning his secrets", "isCorrect": false, "rationale": "The book is to be kept and revisited, not destroyed."}], "id": "q04"}, {"question": "What does the metaphor of “children” (line 13) represent?", "options": [{"text": "The beloved’s literal children who will carry on his legacy", "isCorrect": false, "rationale": "The children are metaphorical: thoughts written in the book, which are like children born from the beloved’s brain."}, {"text": "The ideas and thoughts written in the book, described as children delivered from the beloved’s brain", "isCorrect": true, "rationale": "“Those children nursed, deliver’d from thy brain” — the written thoughts are like babies born from the mind, nurtured in the book."}, {"text": "The speaker’s poems, which are the children of his love for the beloved", "isCorrect": false, "rationale": "The children are the beloved’s own thoughts and memories, not the speaker’s poems."}, {"text": "Future readers who will be born into a world illuminated by the beloved’s beauty", "isCorrect": false, "rationale": "The children are the beloved’s written thoughts, not future readers."}], "id": "q05"}, {"question": "What does “take a new acquaintance of thy mind” (line 14) mean?", "options": [{"text": "The beloved will make new friends through his writing", "isCorrect": false, "rationale": "The acquaintance is between the beloved and his own past thoughts, not with new people."}, {"text": "Re-reading the written thoughts allows the beloved to rediscover them as if meeting his own mind anew", "isCorrect": true, "rationale": "Returning to what was written offers a fresh encounter with one’s own past thoughts — as if meeting an acquaintance after time apart."}, {"text": "Writing expands the beloved’s mind and teaches him things he never knew", "isCorrect": false, "rationale": "The acquaintance is with thoughts already present but perhaps forgotten; re-reading re-acquaints, it does not teach entirely new things."}, {"text": "The book will teach the beloved what the speaker knows about time and mortality", "isCorrect": false, "rationale": "The book holds the beloved’s own thoughts (“thy mind’s imprint”), not the speaker’s knowledge."}], "id": "q06"}, {"question": "What do the three objects (glass, dial, book) share as a common function?", "options": [{"text": "All three are gifts the speaker plans to give the beloved", "isCorrect": false, "rationale": "The speaker addresses them as existing objects the beloved already has or should use; they are not described as gifts."}, {"text": "All three serve as instruments of self-knowledge and awareness of time’s passage", "isCorrect": true, "rationale": "The glass shows aging, the dial shows time wasting, and the book preserves the mind’s contents before they are lost — all serve to make the beloved aware of time and self."}, {"text": "All three are symbols of the beloved’s vanity", "isCorrect": false, "rationale": "The objects are practical instruments for self-knowledge, not symbols of vanity."}, {"text": "All three will outlast the beloved and preserve his legacy for posterity", "isCorrect": false, "rationale": "The objects serve the beloved in the present; their posthumous function is not the speaker’s focus."}], "id": "q07"}, {"question": "How does Sonnet LXXVII function as a conclusion to Chapter 7 (“Devouring Time”)?", "options": [{"text": "It returns to the opening despair about time’s destruction with no solution", "isCorrect": false, "rationale": "The sonnet offers practical tools (mirror, dial, book) as responses to time’s passage."}, {"text": "It turns from lamenting time’s destruction to practical engagement: accepting time’s passage and responding through writing and self-knowledge", "isCorrect": true, "rationale": "After many sonnets lamenting time’s destruction, LXXVII counsels acceptance and active response: see your aging in the glass, mark time with the dial, write in the book. The chapter ends on a note of purposeful action."}, {"text": "It repeats the promise that verse will immortalize the beloved", "isCorrect": false, "rationale": "The book in LXXVII is for the beloved’s own thoughts, not specifically the speaker’s verse-immortality promise."}, {"text": "It argues that the beloved’s beauty is so great it defeats time entirely", "isCorrect": false, "rationale": "The sonnet acknowledges time’s passage (beauties wear, minutes waste) without claiming the beloved defeats it."}], "id": "q08"}, {"question": "What is the tone of the couplet (“These offices, so oft as thou wilt look, / Shall profit thee and much enrich thy book”)?", "options": [{"text": "Mournful and resigned to loss", "isCorrect": false, "rationale": "The couplet is practical and encouraging, not mournful."}, {"text": "Practical, encouraging, and quietly optimistic about the value of reflection and writing", "isCorrect": true, "rationale": "The speaker assures the beloved that these practices (offices) will profit him and enrich the book. The tone is warm, advisory, and positive."}, {"text": "Ironic, since the speaker knows none of this will actually help", "isCorrect": false, "rationale": "There is no irony; the advice is sincere and the closing note is genuinely encouraging."}, {"text": "Urgent and fearful, warning the beloved not to delay", "isCorrect": false, "rationale": "The tone is gentle and encouraging, not urgent or fearful."}], "id": "q09"}, {"question": "What does “Time’s thievish progress to eternity” (line 10) mean?", "options": [{"text": "Time moves quickly like a thief and eventually reaches eternity", "isCorrect": false, "rationale": "While close, the primary meaning is that time steals imperceptibly, and its ultimate destination is eternity — total dissolution."}, {"text": "Time advances stealthily like a thief, stealing away moments until it reaches eternity (death and dissolution)", "isCorrect": true, "rationale": "“Thievish progress” characterizes time as a thief that imperceptibly takes away life’s minutes, progressing toward eternity (the end of all things)."}, {"text": "Eternal thieves use time as their escape route", "isCorrect": false, "rationale": "Time is the thief, not the escape route; the subject is time’s stealthy advance."}, {"text": "The speaker is angry that time progresses and wishes to steal it back", "isCorrect": false, "rationale": "The speaker counsels awareness of time’s theft, not anger or a desire for revenge."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
