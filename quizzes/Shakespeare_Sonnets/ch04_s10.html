<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What double journey does the speaker describe in Sonnet XXVII?", "options": [{"text": "A journey by sea by day and a journey by land by night", "isCorrect": false, "rationale": "No sea or land journey is literally described; the double journey is physical fatigue by day and mental activity by night."}, {"text": "Physical labor and travel during the day, and a mental pilgrimage toward the beloved at night", "isCorrect": true, "rationale": "By day the speaker’s limbs are worn with toil and travel; by night, instead of resting, his mind makes a “zealous pilgrimage” to the absent beloved."}, {"text": "A waking journey to the beloved and a sleeping dream of return home", "isCorrect": false, "rationale": "The speaker does not sleep; the night journey is explicitly mental while he lies sleepless."}, {"text": "A public journey of duty and a private journey of writing verse", "isCorrect": false, "rationale": "Writing verse is not described as the night journey; it is the mind’s intense imagining of the absent beloved."}]}, {"question": "What does the speaker’s mind do when his body’s work is done?", "options": [{"text": "It rests peacefully alongside his weary body", "isCorrect": false, "rationale": "The whole point of the sonnet is that the mind cannot rest when the body does."}, {"text": "It embarks on a zealous pilgrimage to the beloved, keeping him awake", "isCorrect": true, "rationale": "Lines 5–7: “my thoughts, from far where I abide, / Intend a zealous pilgrimage to thee, / And keep my drooping eyelids open wide.”"}, {"text": "It reviews the day’s events with regret and anxiety", "isCorrect": false, "rationale": "Reviewing the day’s events is not what the mind does; it travels imaginatively to the beloved."}, {"text": "It composes poetry to send to the beloved in the morning", "isCorrect": false, "rationale": "Composing poetry is not described as the night activity; the mind makes an imaginary journey."}]}, {"question": "What paradox is expressed in “Looking on darkness which the blind do see”?", "options": [{"text": "Blind people can see better in the dark than sighted people", "isCorrect": false, "rationale": "This is a paradox, not a literal statement about the blind’s vision."}, {"text": "The speaker stares into darkness with open eyes but sees nothing—like the blind—yet his inner vision perceives the beloved", "isCorrect": true, "rationale": "With eyes open in physical darkness he sees nothing (like the sightless), yet his soul’s “imaginary sight” presents the beloved’s image—a paradox of sightless seeing."}, {"text": "The beloved has been away so long that the speaker has forgotten what he looks like", "isCorrect": false, "rationale": "The beloved’s image is vividly present to the speaker’s imagination; forgetting is the opposite of what occurs."}, {"text": "Love blinds the speaker to the faults of the beloved", "isCorrect": false, "rationale": "The proverb of love blinding is not the specific paradox here; the paradox is about seeing in darkness through inner vision."}]}, {"question": "How is the beloved’s imagined presence described in lines 11–12?", "options": [{"text": "As a distant star that the speaker can barely perceive", "isCorrect": false, "rationale": "While the image involves night, the beloved’s shadow is compared to a jewel, not to a distant star."}, {"text": "As a jewel hung in ghastly night that makes the darkness beautiful and renews night’s old face", "isCorrect": true, "rationale": "“Which, like a jewel hung in ghastly night, / Makes black night beauteous, and her old face new”—the beloved’s shadow/image transforms the ugly darkness into something beautiful."}, {"text": "As a phantom that frightens the speaker with its ghostly appearance", "isCorrect": false, "rationale": "The phantom does not frighten; “ghastly” modifies the night’s darkness, while the beloved’s image beautifies it."}, {"text": "As the moon illuminating the sleeping world with silver light", "isCorrect": false, "rationale": "The moon is not mentioned; the light source is the beloved’s shadow/image, described as a jewel."}]}, {"question": "What does “my soul’s imaginary sight” mean?", "options": [{"text": "The speaker experiences supernatural visions sent by the beloved", "isCorrect": false, "rationale": "The vision is psychological and imaginative, not supernatural."}, {"text": "The inner faculty of imagination or mind’s eye that conjures the beloved’s image during sleepless darkness", "isCorrect": true, "rationale": "“Imaginary sight” is the imagination’s power to see what is not physically present—the mind’s eye presenting the beloved’s “shadow” to the unseeing physical eyes."}, {"text": "Dreams that come to the speaker during deep sleep", "isCorrect": false, "rationale": "The speaker is explicitly awake (“drooping eyelids open wide”); the vision is waking imagination, not dreams."}, {"text": "The speaker’s ability to see in the dark due to love-sharpened senses", "isCorrect": false, "rationale": "Sharpened physical senses are not the explanation; the sight is explicitly “imaginary”—internal, not sensory."}]}, {"question": "What does the closing couplet reveal about the speaker’s condition?", "options": [{"text": "He will find rest at dawn when the beloved returns", "isCorrect": false, "rationale": "No return of the beloved is promised; the couplet generalizes his condition as a perpetual lack of quiet."}, {"text": "Both by day (body) and by night (mind), he can find no rest because of his absence from the beloved", "isCorrect": true, "rationale": "“Lo! thus, by day my limbs, by night my mind, / For thee, and for myself, no quiet find”—the labor divides between body by day and mind by night, leaving no part of him at rest."}, {"text": "Day gives him peace but night brings suffering", "isCorrect": false, "rationale": "Day also denies him rest (toil and travel); both day and night are characterized by a lack of quiet."}, {"text": "He has grown accustomed to sleeplessness and no longer suffers from it", "isCorrect": false, "rationale": "The couplet presents ongoing suffering, not resignation or adaptation."}]}, {"question": "The word “pilgrimage” (line 6) is significant because it:", "options": [{"text": "Suggests the speaker is literally traveling to a holy site", "isCorrect": false, "rationale": "No literal pilgrimage is described; the word is used metaphorically for the mind’s night journey."}, {"text": "Elevates the beloved to a quasi-sacred status, as the destination of a religious journey", "isCorrect": true, "rationale": "A “pilgrimage” is a sacred journey to a holy place; applying it to the mental journey toward the beloved suggests the beloved has quasi-divine significance for the speaker."}, {"text": "Shows that the speaker travels frequently for religious obligations", "isCorrect": false, "rationale": "While the Elizabethan context had religious travel, the word here is clearly metaphorical."}, {"text": "Implies the journey is tedious and obligatory rather than joyful", "isCorrect": false, "rationale": "The word “zealous” before “pilgrimage” suggests fervent devotion, not tedious obligation."}]}, {"question": "Sonnets XXVII and XXVIII are often read as companion poems. What condition do they share?", "options": [{"text": "Both describe the speaker receiving letters from the absent beloved", "isCorrect": false, "rationale": "No letters are mentioned in either sonnet; both focus on the speaker’s internal experience of absence."}, {"text": "Both describe the speaker denied rest by the absence of the beloved, suffering through both day and night", "isCorrect": true, "rationale": "XXVII introduces the double journey and sleeplessness; XXVIII picks up directly from this condition, asking how the speaker can return “in happy plight” when denied the benefit of rest by both day and night."}, {"text": "Both celebrate the moment of reunion with the beloved after long separation", "isCorrect": false, "rationale": "Neither sonnet describes reunion; both dwell on the suffering of continued absence."}, {"text": "Both compare the beloved to celestial objects like the sun and moon", "isCorrect": false, "rationale": "While the beloved is compared to a jewel in XXVII and flatteringly described to day and night in XXVIII, direct comparisons to the sun or moon are not the shared focus."}]}, {"question": "The jewel simile in lines 11–12 primarily serves to:", "options": [{"text": "Show that the beloved is wealthy and adorned with fine jewelry", "isCorrect": false, "rationale": "The jewel is the speaker’s metaphor for the beloved’s imagined presence, not a description of actual jewelry."}, {"text": "Convey that the beloved’s imagined presence illuminates and transforms the ugliness of the dark night", "isCorrect": true, "rationale": "A jewel shines even in complete darkness; the beloved’s shadow in the speaker’s mind similarly makes the “ghastly” night beautiful and new."}, {"text": "Suggest that the beloved is as rare and cold as a precious stone", "isCorrect": false, "rationale": "Coldness is not part of the comparison; the jewel’s quality of shining in darkness is what matters."}, {"text": "Compare the speaker’s grief to the hardness of a diamond", "isCorrect": false, "rationale": "The comparison is to the beloved’s effect on darkness, not to the speaker’s grief."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
