<body>
<div class="quiz-container">

        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why does the speaker claim he cannot believe he is growing old at the opening of Sonnet XXII?", "options": [{"text": "He uses cosmetics and disguises to hide his age from himself", "isCorrect": false, "rationale": "No cosmetics are mentioned; the speaker’s argument is metaphysical—their shared youth through the exchange of hearts."}, {"text": "He believes his heart lives in the beloved, so as long as the beloved is young, he too is young", "isCorrect": true, "rationale": "The logic: if his heart resides in the beloved’s breast and the beloved is still youthful, his glass (mirror) cannot persuade him he is old because his true self is still young."}, {"text": "He refuses to look in mirrors on principle", "isCorrect": false, "rationale": "The speaker does look in his glass; he simply argues that the mirror’s evidence of aging does not apply while the beloved remains young."}, {"text": "He is genuinely younger than the beloved and has no need to worry about age", "isCorrect": false, "rationale": "The speaker is older; the point is that his heart inhabiting the beloved makes him feel young despite his body’s age."}]}, {"question": "What does “time’s furrows” mean in the context of Sonnet XXII?", "options": [{"text": "The trenches dug by soldiers over time", "isCorrect": false, "rationale": "No military imagery is intended; “furrows” here is an agricultural metaphor applied to the face."}, {"text": "Wrinkles and lines of age appearing on the beloved’s face", "isCorrect": true, "rationale": "“Furrows” are the deep lines plowed by a plow; applied to the face, they mean wrinkles produced by time, signaling that the beloved is aging."}, {"text": "The speaker’s own aged hands, no longer able to write", "isCorrect": false, "rationale": "The furrows appear in “thee” (the beloved), not the speaker’s hands."}, {"text": "The tracks left by grief in the speaker’s memory", "isCorrect": false, "rationale": "Grief’s effect on memory is not the metaphor; physical lines of age on the face are."}]}, {"question": "What central conceit structures Sonnet XXII?", "options": [{"text": "The beloved is compared to a summer’s day", "isCorrect": false, "rationale": "The summer comparison belongs to Sonnet XVIII; Sonnet XXII’s conceit is about exchanged hearts."}, {"text": "The speaker and beloved have exchanged hearts and now carry each other’s in their own breasts", "isCorrect": true, "rationale": "Lines 7–9: “For all that beauty that doth cover thee / Is but the seemly raiment of my heart, / Which in thy breast doth live, as thine in me”—both carry the other’s heart, merging their identities."}, {"text": "The speaker’s mirror is a magical object that shows truth", "isCorrect": false, "rationale": "The mirror is a conventional image of vanity and self-scrutiny; the central conceit is the exchange of hearts."}, {"text": "Time is a cruel nurse who withholds care from the elderly", "isCorrect": false, "rationale": "The nurse image appears in line 14 but as a simile for how the speaker will care for the beloved’s heart, not as the central conceit."}]}, {"question": "What argument does the speaker use to urge the beloved to take care of himself?", "options": [{"text": "The beloved’s good health will inspire others to live well", "isCorrect": false, "rationale": "The argument is personal and relational, not about inspiring a broader community."}, {"text": "The beloved carries the speaker’s heart, so neglecting himself means neglecting the speaker", "isCorrect": true, "rationale": "Lines 11–13: the speaker urges “love, be of thyself so wary / As I, not for myself, but for thee will”—since the speaker bears the beloved’s heart and vice versa, self-care is care for the other."}, {"text": "The beloved must stay healthy to produce heirs", "isCorrect": false, "rationale": "Procreation is the concern of the earlier sonnets; Sonnet XXII focuses on the exchange-of-hearts conceit."}, {"text": "The beloved’s beauty is owed to the world as a public trust", "isCorrect": false, "rationale": "The public duty to preserve beauty is more relevant to Sonnet XIX; here the argument is personal and mutual."}]}, {"question": "What warning does the couplet deliver?", "options": [{"text": "The speaker warns that he will leave if the beloved does not return his love", "isCorrect": false, "rationale": "The couplet is a warning about the irrevocability of the heart-exchange, not a threat to leave."}, {"text": "The beloved should not expect to reclaim his own heart after the speaker’s death, since what was given cannot be returned", "isCorrect": true, "rationale": "“Presume not on thy heart when mine is slain, / Thou gav’st me thine not to give back again”—the gift of the heart is permanent; the beloved cannot retract it when the speaker dies."}, {"text": "The speaker warns that time will eventually destroy them both despite their love", "isCorrect": false, "rationale": "While time is present in the sonnet, the couplet’s specific warning is about the irrevocability of the heart exchange."}, {"text": "The beloved must stay faithful or the speaker will destroy the verse he has written", "isCorrect": false, "rationale": "No threat regarding poetry appears in the couplet; the warning is about the permanent gift of the heart."}]}, {"question": "The simile of the “tender nurse” in lines 13–14 compares:", "options": [{"text": "Time to a nurse who tends the aging speaker gently", "isCorrect": false, "rationale": "Time is not the nurse; the nurse simile describes how the speaker will guard the beloved’s heart."}, {"text": "The speaker to a careful nurse protecting the beloved’s heart as a nurse protects a helpless infant", "isCorrect": true, "rationale": "“Bearing thy heart, which I will keep so chary / As tender nurse her babe from faring ill”—the speaker compares his careful guardianship of the beloved’s heart to a nurse’s devoted care for a baby."}, {"text": "The beloved to a sick child who needs constant attention", "isCorrect": false, "rationale": "The beloved is not ill; the comparison is about the level of care, not a medical situation."}, {"text": "Nature to a nurse who tends growing things", "isCorrect": false, "rationale": "Nature is not the subject of this simile; it is the speaker’s protective role toward the beloved’s heart."}]}, {"question": "What does the phrase “seemly raiment of my heart” mean?", "options": [{"text": "The beloved’s fine clothing that pleases the speaker", "isCorrect": false, "rationale": "The phrase is metaphorical, not about literal garments."}, {"text": "The beloved’s beauty is the outward clothing or covering of the speaker’s heart, which dwells within the beloved", "isCorrect": true, "rationale": "“Raiment” means clothing; the beloved’s fair appearance is the garment worn over the speaker’s heart, which has taken up residence inside the beloved’s breast."}, {"text": "The speaker’s outward behavior as a fitting covering for inner emotion", "isCorrect": false, "rationale": "The raiment metaphor is applied to the beloved’s physical beauty, not to the speaker’s behavior."}, {"text": "A ceremonial robe symbolizing the bonds of love", "isCorrect": false, "rationale": "No ceremony is invoked; the metaphor is about beauty as the outer covering of the speaker’s relocated heart."}]}, {"question": "What does “my glass shall not persuade me I am old” reveal about the speaker’s psychological state?", "options": [{"text": "The speaker is in denial and refuses to accept reality", "isCorrect": false, "rationale": "The speaker acknowledges his body may age; his argument is a reasoned philosophical claim, not simply denial."}, {"text": "The speaker uses the logic of the heart exchange to resist the mirror’s evidence of aging", "isCorrect": true, "rationale": "Since his heart lives in the beloved and the beloved is still young, the speaker argues that the aging body in the mirror does not represent his true self—a philosophical rather than delusional position."}, {"text": "The speaker has never owned a mirror and cannot judge his own appearance", "isCorrect": false, "rationale": "The speaker does consult the glass; he simply rejects its verdict on the grounds of the heart-exchange conceit."}, {"text": "The speaker is proud of his age and refuses to be shamed by it", "isCorrect": false, "rationale": "The speaker is not celebrating age; he is making a logical argument for why the mirror’s testimony does not apply to him."}]}, {"question": "How does the theme of reciprocity function in Sonnet XXII?", "options": [{"text": "The speaker gives the beloved gifts and expects financial repayment", "isCorrect": false, "rationale": "The reciprocity is emotional and metaphysical—an exchange of hearts—not financial."}, {"text": "The mutual exchange of hearts binds speaker and beloved so that each is responsible for the other’s well-being", "isCorrect": true, "rationale": "Because each bears the other’s heart, both must care for themselves as an act of care for the other, making self-preservation an act of love."}, {"text": "The beloved gives the speaker youth and the speaker gives wisdom in return", "isCorrect": false, "rationale": "No explicit exchange of youth for wisdom is stated; the exchange is of hearts, creating mutual guardianship."}, {"text": "The speaker and beloved write poetry for each other in equal measure", "isCorrect": false, "rationale": "Poetry as a mutual exchange is not the subject of Sonnet XXII; the conceit is about exchanged hearts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
