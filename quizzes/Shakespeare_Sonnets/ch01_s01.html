<script>
var QUESTIONS = [{"question": "According to tradition, on what date was Shakespeare born?", "options": [{"text": "April 23, 1564", "isCorrect": true, "rationale": "Tradition fixes April 23, St George's Day, as Shakespeare's birth date, though only his baptism on the 26th is recorded in the parish register."}, {"text": "April 26, 1564", "isCorrect": false, "rationale": "April 26 is the date of Shakespeare's baptism as recorded in the parish register, not the traditional birth date."}, {"text": "April 23, 1556", "isCorrect": false, "rationale": "1556 is incorrect; Shakespeare was born in 1564."}, {"text": "March 25, 1564", "isCorrect": false, "rationale": "March 25 has no connection to Shakespeare's birth; tradition places it on April 23."}]}, {"question": "What was John Shakespeare's occupation and civic role in Stratford?", "options": [{"text": "A schoolmaster and churchwarden", "isCorrect": false, "rationale": "John Shakespeare was not a schoolmaster; that description applies more to theories about William's 'lost years.'"}, {"text": "A glover and sometime alderman who rose to become high bailiff", "isCorrect": true, "rationale": "The source states John Shakespeare was a glover and sometime alderman who rose to become high bailiff of the town."}, {"text": "A merchant and member of Parliament", "isCorrect": false, "rationale": "There is no mention of John Shakespeare being a merchant or serving in Parliament."}, {"text": "A farmer and justice of the peace", "isCorrect": false, "rationale": "It was Mary Arden's father, not John Shakespeare, who was described as a prosperous local farmer."}]}, {"question": "What was the curriculum like at Stratford's King's New School?", "options": [{"text": "It focused on English literature, arithmetic, and religious instruction.", "isCorrect": false, "rationale": "The curriculum was intensely classical, not centered on English literature or arithmetic."}, {"text": "It was a broad modern curriculum covering science, history, and languages.", "isCorrect": false, "rationale": "The source describes an intensely classical curriculum, not a modern broad one."}, {"text": "It was intensely classical, covering Ovid, Virgil, Cicero, and the Latin grammarians.", "isCorrect": true, "rationale": "The source specifies that boys worked through Ovid, Virgil, Cicero, and the Latin grammarians, declaiming speeches and debating arguments."}, {"text": "It offered a two-year course leading to entry into Oxford or Cambridge.", "isCorrect": false, "rationale": "The source notes that there is no evidence Shakespeare attended university and that universities were largely the province of clergy and gentry."}]}, {"question": "Why was a special licence required for Shakespeare's marriage to Anne Hathaway?", "options": [{"text": "Anne was a widow and church rules required additional approval.", "isCorrect": false, "rationale": "The source makes no mention of Anne being a widow; the licence was needed for a different reason."}, {"text": "Shakespeare was under the legal age of consent.", "isCorrect": false, "rationale": "Shakespeare was eighteen at the time of marriage; the licence was required for another reason entirely."}, {"text": "The wedding needed to proceed before the usual calling of banns because Anne was already pregnant.", "isCorrect": true, "rationale": "The source states a special licence was required to permit the wedding before the usual calling of banns because Anne was already three months pregnant."}, {"text": "John Shakespeare opposed the marriage and a licence was needed to override parental objection.", "isCorrect": false, "rationale": "The source does not mention any parental objection; the licence related to Anne's pregnancy."}]}, {"question": "What are the names of Shakespeare's three children?", "options": [{"text": "Susanna, Hamnet, and Anne", "isCorrect": false, "rationale": "Anne was Shakespeare's wife, not a child. His children were Susanna, Hamnet, and Judith."}, {"text": "Susanna, Hamnet, and Judith", "isCorrect": true, "rationale": "The source states Susanna was baptised in May 1583, and twins Hamnet (son) and Judith (daughter) followed in February 1585."}, {"text": "Mary, Hamnet, and Judith", "isCorrect": false, "rationale": "Mary was the name of Shakespeare's mother, not one of his children."}, {"text": "Susanna, Richard, and Judith", "isCorrect": false, "rationale": "Richard is not mentioned in the source as one of Shakespeare's children; his son was Hamnet."}]}, {"question": "What does the phrase 'lost years' refer to in Shakespeare's biography?", "options": [{"text": "The years after Shakespeare retired from the theatre and returned to Stratford.", "isCorrect": false, "rationale": "The 'lost years' refer to a much earlier gap in the record, not the retirement period."}, {"text": "The period between the baptism of the twins in 1585 and the first solid evidence of Shakespeare's presence in London in 1592.", "isCorrect": true, "rationale": "The source defines the 'lost years' as the gap between the twins' baptism in 1585 and the first evidence of Shakespeare in London in 1592."}, {"text": "The years of the plague closures when Shakespeare could not write plays.", "isCorrect": false, "rationale": "The plague closures are a separate matter; the 'lost years' concern a biographical gap in the 1580s."}, {"text": "The decade during which the sonnets were composed but not published.", "isCorrect": false, "rationale": "The sonnet composition period is a separate topic; the 'lost years' refer to the gap between Stratford and London."}]}, {"question": "How does the source describe Robert Greene's 1592 comment about Shakespeare?", "options": [{"text": "Greene praised Shakespeare as the most promising new playwright in London.", "isCorrect": false, "rationale": "Greene's comment was hostile and jealous, not praising; he called Shakespeare an 'upstart crow.'"}, {"text": "Greene warned fellow university graduates to beware 'an upstart crow, beautified with our feathers.'", "isCorrect": true, "rationale": "The source quotes Greene warning fellow university graduates about 'an upstart crow, beautified with our feathers,' an unmistakable reference to Shakespeare."}, {"text": "Greene called Shakespeare a rival who had stolen his plots from Italian sources.", "isCorrect": false, "rationale": "The source does not say Greene accused Shakespeare of stealing Italian plots; the 'upstart crow' comment implies rivalry over theatrical reputation."}, {"text": "Greene dismissed Shakespeare as a mere actor with no literary talent.", "isCorrect": false, "rationale": "The source's point is that Greene was threatened by Shakespeare's success, not that he dismissed him as untalented."}]}, {"question": "What was unusual about Shakespeare's role within the Lord Chamberlain's Men?", "options": [{"text": "He was the company's only university-educated playwright.", "isCorrect": false, "rationale": "Shakespeare notably did not attend university; being university-educated is not what made his role unusual."}, {"text": "He was both a shareholder in the company and a working actor.", "isCorrect": true, "rationale": "The source states Shakespeare was unusual among playwrights in being both a shareholder in the company and a working actor, giving him a financial stake in the company's success."}, {"text": "He was the only playwright permitted to write for both the public and private theatres.", "isCorrect": false, "rationale": "The source does not describe such a unique permission; his dual role as shareholder and actor was what distinguished him."}, {"text": "He served as the company's business manager as well as its principal playwright.", "isCorrect": false, "rationale": "The source describes his dual role as shareholder and actor, not as business manager."}]}, {"question": "Approximately how many spectators could the Globe theatre hold?", "options": [{"text": "Around 500", "isCorrect": false, "rationale": "500 is far too small; the Globe was a large open-air amphitheatre."}, {"text": "Around 1,000", "isCorrect": false, "rationale": "1,000 is still well below the figure given in the source."}, {"text": "Around 3,000", "isCorrect": true, "rationale": "The source states the Globe, built in 1599, could hold perhaps 3,000 spectators."}, {"text": "Around 5,000", "isCorrect": false, "rationale": "5,000 exceeds the figure given; the source says approximately 3,000."}]}, {"question": "What happened to the Lord Chamberlain's Men's name and status in 1603?", "options": [{"text": "The company dissolved and reformed as the Admiral's Men.", "isCorrect": false, "rationale": "The company did not dissolve; it was renamed and elevated under royal patronage."}, {"text": "The company was renamed the King's Men after James I took them under royal patronage.", "isCorrect": true, "rationale": "The source states the company was renamed the King's Men after James I took them under royal patronage in 1603."}, {"text": "The company relocated from the Globe to the Blackfriars and changed its name.", "isCorrect": false, "rationale": "The move to Blackfriars came later in 1609; the 1603 change was about royal patronage and the new name."}, {"text": "The company merged with a rival troupe and was renamed the Prince's Men.", "isCorrect": false, "rationale": "The source describes royal patronage from James I resulting in the name King's Men, not a merger."}]}, {"question": "To whom did Shakespeare dedicate both Venus and Adonis and The Rape of Lucrece?", "options": [{"text": "Robert Devereux, the Earl of Essex", "isCorrect": false, "rationale": "Essex is not mentioned in this context; the dedications went to the Earl of Southampton."}, {"text": "William Herbert, the Earl of Pembroke", "isCorrect": false, "rationale": "Pembroke is discussed as a candidate for the Fair Youth, not as the recipient of the narrative poem dedications."}, {"text": "Henry Wriothesley, the Earl of Southampton", "isCorrect": true, "rationale": "The source states both Venus and Adonis (1593) and The Rape of Lucrece (1594) were dedicated to Henry Wriothesley, the Earl of Southampton."}, {"text": "Queen Elizabeth I", "isCorrect": false, "rationale": "There is no mention of the narrative poems being dedicated to Queen Elizabeth; they were dedicated to Southampton."}]}, {"question": "When did Shakespeare purchase New Place in Stratford?", "options": [{"text": "1594", "isCorrect": false, "rationale": "1594 is the year The Rape of Lucrece was published, not when New Place was purchased."}, {"text": "1597", "isCorrect": true, "rationale": "The source states Shakespeare purchased New Place, one of the grandest houses in Stratford, in 1597."}, {"text": "1603", "isCorrect": false, "rationale": "1603 is the year James I took the company under royal patronage; New Place was purchased earlier."}, {"text": "1610", "isCorrect": false, "rationale": "1610 is approximately when Shakespeare began withdrawing from London, not when he purchased New Place."}]}, {"question": "What is the famous curse inscribed on Shakespeare's gravestone?", "options": [{"text": "\"Here lies the Bard; let no man move these stones, lest he invite eternal groans.\"", "isCorrect": false, "rationale": "This is not the actual inscription; it is an invented paraphrase."}, {"text": "\"Good friend for Jesus sake forbeare, / To dig the dust encloased heare\"", "isCorrect": true, "rationale": "The source quotes the gravestone curse beginning 'Good friend for Jesus sake forbeare, / To dig the dust encloased heare,' warning against disturbing the bones."}, {"text": "\"To be or not to be — that is the question written here in stone.\"", "isCorrect": false, "rationale": "This is a famous line from Hamlet, not the gravestone inscription."}, {"text": "\"Neither fire nor sword shall move these bones; sacred to England's Muse.\"", "isCorrect": false, "rationale": "This is an invented inscription; the actual curse is quoted directly in the source."}]}, {"question": "What does the source say about Shakespeare's famous bequest of his 'second-best bed' to Anne?", "options": [{"text": "It is universally interpreted as a sign of contempt for his wife.", "isCorrect": false, "rationale": "The source presents multiple interpretations and cautions against any single reading, noting the mystery may be irresolvable."}, {"text": "It proves the marriage was a purely financial arrangement.", "isCorrect": false, "rationale": "The source does not draw this conclusion; it presents the bequest as a subject of ongoing biographical debate."}, {"text": "It has generated centuries of speculation, with some reading it as cold and others noting the second-best bed was the couple's shared bed.", "isCorrect": true, "rationale": "The source explains that some scholars read the bequest as cold and dismissive while others point out that the second-best bed was typically the married couple's shared bed, carrying personal significance."}, {"text": "It indicates Shakespeare intended to remarry after Anne's death.", "isCorrect": false, "rationale": "The source makes no such suggestion; the debate concerns the nature of their relationship, not intentions to remarry."}]}, {"question": "How does the source characterise the Elizabethan theatre as a social institution?", "options": [{"text": "It was an elite entertainment restricted to the nobility and wealthy merchants.", "isCorrect": false, "rationale": "The source explicitly describes the Elizabethan theatre as a genuinely popular art form drawing people from every rank of society."}, {"text": "It was a genuinely popular art form drawing people from every rank of society, from penny-paying apprentices to nobles.", "isCorrect": true, "rationale": "The source states the theatre drew people from every rank: apprentices in the yard for a penny, merchants and lawyers in the galleries, and nobles in the lords' rooms."}, {"text": "It was primarily a religious institution used for morality plays.", "isCorrect": false, "rationale": "The source describes the theatre as a commercial enterprise, not primarily a religious institution; the city authorities were actually suspicious of playhouses."}, {"text": "It was a state-sponsored institution under direct royal control.", "isCorrect": false, "rationale": "The source describes the theatre as a commercial enterprise outside city jurisdiction, not a state-sponsored institution, though companies did seek royal patronage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
