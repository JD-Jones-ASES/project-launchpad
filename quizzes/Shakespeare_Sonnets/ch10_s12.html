<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker ask the beloved to do in the opening line?", "options": [{"text": "Praise him publicly to counteract slander", "isCorrect": false, "rationale": "He asks the beloved to chide Fortune, not to praise him publicly."}, {"text": "Chide Fortune on his behalf", "isCorrect": true, "rationale": "'O! for my sake do you with Fortune chide, / The guilty goddess of my harmful deeds.'"}, {"text": "Forgive him for his past wandering", "isCorrect": false, "rationale": "While forgiveness is implied, the specific request is to reproach Fortune as the cause."}, {"text": "Write a poem defending his reputation", "isCorrect": false, "rationale": "No poetic defense is requested; the beloved is asked to blame Fortune."}], "id": "q01"}, {"question": "What does the speaker blame Fortune for?", "options": [{"text": "Failing to provide him with a wealthy patron", "isCorrect": false, "rationale": "The complaint is about public means and what they have done to his nature, not about patronage per se."}, {"text": "Providing only public means for his livelihood, which corrupted his manners", "isCorrect": true, "rationale": "'That did not better for my life provide / Than public means which public manners breeds.'"}, {"text": "Giving him a rival in love", "isCorrect": false, "rationale": "No rival is blamed; Fortune's provision of a public livelihood is the complaint."}, {"text": "Causing his long absence from the beloved", "isCorrect": false, "rationale": "The specific complaint is about the corrupting effect of public life, not absence."}], "id": "q02"}, {"question": "What famous simile does the speaker use to describe how public work has affected his character?", "options": [{"text": "Like a soldier stained by battle", "isCorrect": false, "rationale": "A soldier is not the comparison used."}, {"text": "Like a dyer's hand stained by the dye it works in", "isCorrect": true, "rationale": "'Almost thence my nature is subdu'd / To what it works in, like the dyer's hand.'"}, {"text": "Like a blacksmith darkened by the forge", "isCorrect": false, "rationale": "A blacksmith is not mentioned; the dyer's hand is the simile."}, {"text": "Like a page yellowed by sunlight over time", "isCorrect": false, "rationale": "Yellowed pages are not the image; the dyer's hand is."}], "id": "q03"}, {"question": "What does 'eisel' refer to in the sonnet?", "options": [{"text": "A type of medicinal herb", "isCorrect": false, "rationale": "Eisel is a liquid substance — specifically vinegar or a bitter drink."}, {"text": "Vinegar or a bitter medicine, drunk as penance", "isCorrect": true, "rationale": "'I will drink / Potions of eisel 'gainst my strong infection' — eisel is an archaic term for vinegar, used medicinally or as a form of penance."}, {"text": "A potion that erases memory", "isCorrect": false, "rationale": "No memory-erasing function is attributed; eisel is bitter medicine for a moral infection."}, {"text": "Strong wine associated with excess", "isCorrect": false, "rationale": "Eisel is bitter, not a pleasurable drink; it represents penitential medicine."}], "id": "q04"}, {"question": "What does the speaker mean by 'strong infection'?", "options": [{"text": "A literal illness he has contracted", "isCorrect": false, "rationale": "The infection is metaphorical, referring to the moral corruption brought by public life."}, {"text": "The moral corruption or taint from his public life and conduct", "isCorrect": true, "rationale": "The language of infection, potions, and cure is extended medical metaphor for the speaker's moral degradation."}, {"text": "The influence of bad companions", "isCorrect": false, "rationale": "Bad companions are not specifically mentioned; the infection is from 'public means' more generally."}, {"text": "Jealousy that has entered his relationship with the beloved", "isCorrect": false, "rationale": "Jealousy is not the infection; public life's corruption of his nature is."}], "id": "q05"}, {"question": "What claim does the speaker make about the beloved's pity in the couplet?", "options": [{"text": "That pity will be insufficient but he appreciates it", "isCorrect": false, "rationale": "The couplet claims pity is actually enough to cure him — the opposite of insufficient."}, {"text": "That the beloved's pity alone is enough to cure him", "isCorrect": true, "rationale": "'Pity me then, dear friend, and I assure ye, / Even that your pity is enough to cure me.'"}, {"text": "That he will need time as well as pity to recover", "isCorrect": false, "rationale": "No additional time is required in the couplet; pity is declared sufficient."}, {"text": "That pity from anyone else would be meaningless", "isCorrect": false, "rationale": "While implied, the couplet's statement is about the power of this specific pity, not about others' pity."}], "id": "q06"}, {"question": "What is the medical metaphor running through the poem?", "options": [{"text": "Love as a wound that must be bandaged", "isCorrect": false, "rationale": "Wounds and bandages are not the metaphor; disease and medicine are."}, {"text": "The speaker as a willing patient drinking bitter medicine to cure a moral infection", "isCorrect": true, "rationale": "He calls himself 'a willing patient,' will drink potions of eisel, and his public life is an 'infection' cured by the beloved's 'pity.'"}, {"text": "Fortune as a diseased goddess spreading illness", "isCorrect": false, "rationale": "Fortune is guilty but the medical patient is the speaker, not Fortune."}, {"text": "The beloved's beauty as a tonic that prevents aging", "isCorrect": false, "rationale": "The tonic is the beloved's pity, operating against moral corruption, not aging."}], "id": "q07"}, {"question": "What is the speaker implicitly saying about the source of his bad behavior?", "options": [{"text": "It comes entirely from his own weak moral character", "isCorrect": false, "rationale": "The poem displaces much of the blame onto Fortune and public life, though the speaker accepts penitential responsibility."}, {"text": "It comes largely from his public livelihood, which Fortune imposed on him", "isCorrect": true, "rationale": "The poem blames 'public means' for breeding 'public manners' and subduing his nature to what he works in — external force acting on his character."}, {"text": "It comes from the beloved's neglect during a period of separation", "isCorrect": false, "rationale": "The beloved is not blamed; Fortune and public life are."}, {"text": "It comes from an excess of poetic sensitivity that makes him vulnerable", "isCorrect": false, "rationale": "No link between poetic sensitivity and bad behavior is made here."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
