    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To what season does the speaker compare his absence from the beloved?", "options": [{"text": "Spring, the season of new beginnings", "isCorrect": false, "rationale": "Though the absence occurs during spring and summer, the speaker experiences it as winter."}, {"text": "Winter, with its freezings, dark days, and December bareness", "isCorrect": true, "rationale": "Line 1 opens: 'How like a winter hath my absence been.' Despite the actual season being summer, the emotional experience of separation is described as winter."}, {"text": "Autumn, the season of harvest and melancholy", "isCorrect": false, "rationale": "Autumn is mentioned as the actual physical season, but the speaker's emotional experience is likened to winter."}, {"text": "Drought, with its withering and emptiness", "isCorrect": false, "rationale": "Drought is not the governing metaphor; winter dominates the sonnet's imagery."}], "id": "q01"}, {"question": "What is paradoxical about the timing of the absence described in Sonnet XCVII?", "options": [{"text": "The speaker was present in winter but absent in summer", "isCorrect": false, "rationale": "Reversing this: the absence was during summer, making the emotional winter all the more paradoxical."}, {"text": "The actual season was summer and autumn — fertile, warm, abundant — yet the speaker experienced it as desolate winter", "isCorrect": true, "rationale": "Lines 5-8 note that the absence was 'summer's time' — rich with teeming autumn. Yet despite the season's abundance, the speaker felt only winter's emptiness. The emotional and physical seasons are inverted."}, {"text": "The beloved was absent in summer but returned in winter", "isCorrect": false, "rationale": "The beloved's return is not described; the sonnet focuses entirely on the experience of absence."}, {"text": "The speaker experienced summer joy despite the separation", "isCorrect": false, "rationale": "The opposite is true: despite the abundant summer season, the speaker felt none of its warmth."}], "id": "q02"}, {"question": "What does the phrase 'the teeming autumn, big with rich increase' suggest?", "options": [{"text": "The speaker was financially prosperous during the absence", "isCorrect": false, "rationale": "Autumn's richness is natural and metaphorical, not financial."}, {"text": "Autumn is personified as pregnant and fertile, heavy with the harvest of spring's planting", "isCorrect": true, "rationale": "'Big with rich increase' uses pregnancy imagery to describe autumn as swollen with the fruits of spring — a season of maximum natural abundance that nonetheless felt barren to the speaker."}, {"text": "The speaker harvested crops during the absence", "isCorrect": false, "rationale": "The harvest is metaphorical; the speaker is not literally farming."}, {"text": "Autumn signals the approach of the beloved's return", "isCorrect": false, "rationale": "No return is signaled; autumn's richness is contrasted with the speaker's emotional poverty."}], "id": "q03"}, {"question": "What does 'hope of orphans, and unfather'd fruit' mean?", "options": [{"text": "Fruit that has fallen from trees and been abandoned", "isCorrect": false, "rationale": "The phrase is metaphorical, describing the feeling of abundance without a meaningful origin."}, {"text": "The autumn's harvest felt meaningless — like orphaned fruit without a father — because the beloved, who gives all things meaning, was absent", "isCorrect": true, "rationale": "Autumn's produce, without the beloved who is described as the soul of summer ('summer and his pleasures wait on thee'), seems like orphaned fruit — rich in quantity but lacking the beloved who would give it significance."}, {"text": "Children abandoned by their fathers during the absence", "isCorrect": false, "rationale": "The orphans and unfather'd fruit are metaphors for the autumn harvest stripped of meaning, not literal children."}, {"text": "The speaker's hopes for reunion were abandoned", "isCorrect": false, "rationale": "While hope is part of the image, the specific meaning concerns the meaninglessness of natural abundance without the beloved."}], "id": "q04"}, {"question": "What does 'summer and his pleasures wait on thee' mean?", "options": [{"text": "Summer arrives after the beloved like a servant", "isCorrect": true, "rationale": "'Wait on' means to attend or serve; summer and all its pleasures are personified as servants of the beloved. Without the beloved, summer loses its lord and its joys become empty."}, {"text": "The beloved must wait for summer to arrive", "isCorrect": false, "rationale": "The dependent relationship runs the other way: summer waits on the beloved, not the beloved on summer."}, {"text": "The beloved enjoys summer activities", "isCorrect": false, "rationale": "While this may be implied, the phrase asserts the beloved's cosmic centrality — summer itself attends him."}, {"text": "Summer pleasures are sweeter when the beloved is present", "isCorrect": false, "rationale": "While this captures the emotional truth, the grammatical and metaphorical claim is stronger: summer itself serves the beloved."}], "id": "q05"}, {"question": "What image closes the sonnet and what emotional effect does it create?", "options": [{"text": "Snow falling silently, creating a peaceful ending", "isCorrect": false, "rationale": "No snowfall closes the sonnet; the closing image involves pale leaves and singing birds."}, {"text": "Birds singing dully while leaves look pale, dreading the approaching winter — emphasizing the emotional bleakness of the absent speaker", "isCorrect": true, "rationale": "The final couplet: even the birds' songs are cheerless, and the leaves look pale with fear of approaching winter. The entire natural world shares the speaker's desolation, deepening the pathos."}, {"text": "The speaker looking forward to spring's return", "isCorrect": false, "rationale": "There is no hopeful anticipation; the poem ends in dread and pallor."}, {"text": "The beloved's return bringing all seasons to life again", "isCorrect": false, "rationale": "The beloved has not yet returned; the sonnet ends in continued absence and emotional winter."}], "id": "q06"}, {"question": "Sonnet XCVII marks a significant shift in Chapter 9 because:", "options": [{"text": "The speaker suddenly becomes angry with the beloved", "isCorrect": false, "rationale": "Anger is not the shift; the tone becomes more lyrical and elegiac."}, {"text": "The chapter moves from anxious self-deprecation and moral warning to lyrical absence-poetry featuring seasonal imagery", "isCorrect": true, "rationale": "Sonnets LXXXVII-XCVI focus on self-abnegation, moral risk, and the mechanics of estrangement. XCVII begins a new sub-sequence that expresses the pain of absence through rich seasonal metaphor."}, {"text": "It is the only sonnet in the chapter that rhymes", "isCorrect": false, "rationale": "All sonnets in the sequence rhyme; the shift is tonal and thematic, not technical."}, {"text": "The speaker addresses nature instead of the beloved for the first time", "isCorrect": false, "rationale": "While nature is prominent, the speaker addresses the beloved throughout ('From thee, the pleasure of the fleeting year')."}], "id": "q07"}, {"question": "What does the phrase 'widow'd wombs after their lords' decease' suggest about autumn?", "options": [{"text": "Autumn mourns the death of summer like a widow", "isCorrect": true, "rationale": "Autumn is personified as a widow bearing the fruit of a dead lord (spring/summer): the harvest is the posthumous offspring of spring. This creates an image of abundant but sorrowful productivity — richness without its animating male principle, analogous to the speaker's situation."}, {"text": "The beloved has died and left the speaker as a widow", "isCorrect": false, "rationale": "The beloved has not died; the imagery is applied to the season of autumn, not to the beloved."}, {"text": "The speaker describes the deaths of people during his absence", "isCorrect": false, "rationale": "The personification is of seasons, not historical events."}, {"text": "Widows are symbols of winter's bareness", "isCorrect": false, "rationale": "The widow is autumn, not winter; the image is about productive but bereaved abundance."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
