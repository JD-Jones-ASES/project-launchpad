<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'bore the canopy' (line 1) refer to in Sonnet CXXV?", "options": [{"text": "Holding a ceremonial canopy over a great person in a public procession", "isCorrect": true, "rationale": "Canopy-bearers walked in processions beside royalty or the Blessed Sacrament; it was a ceremonial honor. The speaker asks rhetorically whether such outward honor-giving would mean anything to him."}, {"text": "Building a permanent shelter or structure for the youth", "isCorrect": false, "rationale": "The canopy is a ceremonial object carried in procession, not a building."}, {"text": "Writing grandiloquent verses that shelter the youth's reputation", "isCorrect": false, "rationale": "The canopy is a literal ceremonial image, though its meaning is about external show vs. internal devotion."}, {"text": "Wearing a canopy-shaped hat as a symbol of rank", "isCorrect": false, "rationale": "The canopy is carried, not worn; it denotes ceremonial honor in procession."}]}, {"question": "The phrase 'laid great bases for eternity, / Which proves more short than waste or ruining' (lines 3-4) is an example of:", "options": [{"text": "Alliteration used to suggest building sounds", "isCorrect": false, "rationale": "Alliteration is present in 'waste... ruining' but the primary device is ironic anticlimax."}, {"text": "Ironic anticlimax — grand foundations built for eternity prove shorter-lived than decay itself", "isCorrect": true, "rationale": "The irony is that 'great bases' built for eternity paradoxically prove more transient than the very processes of waste and ruin — a deflating commentary on grandiose ambition."}, {"text": "Metaphor comparing the speaker to a master architect", "isCorrect": false, "rationale": "While building imagery is used, the device is ironic reversal of expectation, not a sustained architectural metaphor."}, {"text": "Hyperbole exaggerating the permanence of the youth's beauty", "isCorrect": false, "rationale": "No exaggeration of permanence is intended; the opposite — the ironic fragility of apparently eternal foundations."}]}, {"question": "Who are the 'dwellers on form and favour' (line 7) who 'Lose all and more by paying too much rent / For compound sweet'?", "options": [{"text": "Misers who hoard wealth rather than spend it generously", "isCorrect": false, "rationale": "These figures spend too much, not too little; they are the opposite of misers."}, {"text": "Those who invest everything in external ceremony, patronage, and favor — and lose by paying too high a price for mixed, compound pleasures", "isCorrect": true, "rationale": "'Compound sweet' is mixed, artificial sweetness (vs. 'simple savour'); those who sacrifice authentic devotion for flattery and formal favor end up losing everything."}, {"text": "Rival poets who court the youth's patronage with elaborate flattery", "isCorrect": false, "rationale": "While rival poets are a possible background, 'dwellers on form and favour' is a general type, not a specific reference."}, {"text": "Political courtiers who attend too many ceremonies and neglect their work", "isCorrect": false, "rationale": "The image is broader than political courtiers; it targets anyone who substitutes outward show for genuine inner devotion."}]}, {"question": "The contrast between 'compound sweet' and 'simple savour' (lines 9-10) represents:", "options": [{"text": "The difference between foreign spices and plain English food", "isCorrect": false, "rationale": "The culinary image is metaphorical, not a statement about food preferences."}, {"text": "The difference between elaborate, mixed flattery and honest, simple devotion", "isCorrect": true, "rationale": "'Compound sweet' is artificially complex sweetness — the flattery and ceremonial show that courtiers offer; 'simple savour' is the pure, uncompounded taste of genuine love."}, {"text": "The contrast between youth's complex personality and simple beauty", "isCorrect": false, "rationale": "The contrast describes modes of devotion (compound vs. simple), not the youth's character."}, {"text": "The speaker's own poetic style compared to that of rival poets", "isCorrect": false, "rationale": "The contrast is about devotion and love, not poetic style."}]}, {"question": "The speaker says 'let me be obsequious in thy heart' (line 11). What does 'obsequious' mean here?", "options": [{"text": "Servile and fawning — excessively eager to please", "isCorrect": false, "rationale": "This is the modern meaning, but Shakespeare uses 'obsequious' in its original sense of dutiful and attentive, not groveling."}, {"text": "Dutiful, attentive, and devoted — performing genuine inner service rather than outward show", "isCorrect": true, "rationale": "In Elizabethan usage 'obsequious' meant carefully attentive and dutiful; the speaker asks to be devotedly present in the youth's heart, not in public ceremony."}, {"text": "Present at the youth's funeral rites (obsequies)", "isCorrect": false, "rationale": "While 'obsequious' is related to 'obsequies' (funeral rites), in this context it means dutiful devotion in life, not death rites."}, {"text": "Famous and renowned for his constancy", "isCorrect": false, "rationale": "Fame is not the meaning of 'obsequious'; it denotes dutiful, attentive devotion."}]}, {"question": "What is the 'oblation' described in lines 12-14, and what are its key qualities?", "options": [{"text": "A religious sacrifice offered on behalf of the youth's soul", "isCorrect": false, "rationale": "While 'oblation' is a religious term for an offering, the speaker secularizes it; the key qualities are poverty and freedom."}, {"text": "The speaker's love offering — poor but free, unmixed with secondary motives, offered in simple mutual exchange", "isCorrect": true, "rationale": "'Oblation' = offering/sacrifice; the speaker's is 'poor but free' (humble but unconditioned), 'not mix'd with seconds' (no secondary ingredients = no flattery), and pure mutual exchange."}, {"text": "A written poem presented to the youth as a formal tribute", "isCorrect": false, "rationale": "The oblation is the love itself, not a written poem."}, {"text": "Money offered as payment for the youth's continued patronage", "isCorrect": false, "rationale": "The speaker explicitly rejects the economic model of patronage in favor of genuine mutual devotion."}]}, {"question": "The couplet — 'Hence, thou suborned informer! a true soul / When most impeach'd, stands least in thy control' — introduces what new element?", "options": [{"text": "A thunderstorm metaphor representing divine judgment", "isCorrect": false, "rationale": "No weather metaphor appears; a legal drama is introduced."}, {"text": "A legal scenario: a bribed informer who has leveled charges against the speaker, but whose accusations cannot touch a truly honest soul", "isCorrect": true, "rationale": "'Suborned informer' = a witness bribed to testify falsely; 'impeach'd' = formally accused. The speaker dismisses such a slander as powerless against genuine innocence."}, {"text": "A jealous rival poet who has slandered the speaker to the youth", "isCorrect": false, "rationale": "While a rival poet is possible in the background, the legal language ('suborned informer,' 'impeach'd') makes the courtroom scenario primary."}, {"text": "Time personified, making a final assault on the speaker's constancy", "isCorrect": false, "rationale": "Time was the adversary in CXXIII; here the adversary is a bribed informer, a human accuser."}]}, {"question": "The phrase 'mutual render, only me for thee' (line 14) encapsulates what ideal of love?", "options": [{"text": "A love based on equal social standing and matching estates", "isCorrect": false, "rationale": "Social equality is not the point; 'mutual render' refers to emotional and personal reciprocity."}, {"text": "A purely reciprocal love with no third parties, no external motives — just self given for self", "isCorrect": true, "rationale": "'Mutual render' = mutual giving of oneself; 'only me for thee' reduces the transaction to its pure essence: no politics, no ceremony, no flattery — just the two persons exchanging themselves."}, {"text": "A competitive love in which each party tries to outgive the other", "isCorrect": false, "rationale": "Competition is not the ideal; the formula is simple purity of mutual exchange."}, {"text": "A love that renders the speaker subservient to the youth's wishes", "isCorrect": false, "rationale": "'Mutual' is the key word — the exchange is equal, not one-directional."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
