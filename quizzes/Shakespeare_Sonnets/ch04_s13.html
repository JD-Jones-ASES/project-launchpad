    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What legal metaphor opens Sonnet XXX and governs its structure?", "options": [{"text": "A marriage contract dissolving at death", "isCorrect": false, "rationale": "Marriage law is not the governing metaphor; the sonnet uses court and accounting metaphors."}, {"text": "A court session in which the speaker summons memories to account for past losses", "isCorrect": true, "rationale": "“When to the sessions of sweet silent thought / I summon up remembrance of things past”—“sessions” means legal court sessions, and “summon up” is the language of legal summons, establishing a legal frame."}, {"text": "A property dispute between the speaker and death over past friendships", "isCorrect": false, "rationale": "While a property-like logic runs through the sonnet, the governing metaphor is a legal session, not a dispute."}, {"text": "A jury deliberating on whether the speaker deserves happiness", "isCorrect": false, "rationale": "No jury is present; the speaker himself presides over the session of memory."}]}, {"question": "What does the speaker grieve over in the first two quatrains?", "options": [{"text": "His inability to write poetry worthy of the beloved", "isCorrect": false, "rationale": "Poetic inadequacy is the concern of Sonnets XXI and XXVI; Sonnet XXX focuses on the losses of memory."}, {"text": "The loss of friendships through death, past loves, and precious experiences that cannot be recovered", "isCorrect": true, "rationale": "The speaker weeps for things once sought but lost, “precious friends hid in death’s dateless night,” and past woes of love, all of which memory forces him to re-experience."}, {"text": "The death of his poetic inspiration and inability to write", "isCorrect": false, "rationale": "The losses are personal—friends, loves, precious sights—not specifically poetic inspiration."}, {"text": "His separation from the beloved and the pain it causes", "isCorrect": false, "rationale": "Separation from the present beloved is more specifically the theme of Sonnets XXVII–XXVIII; in XXX the losses are from the past."}]}, {"question": "What does the phrase “death’s dateless night” mean?", "options": [{"text": "A night so dark that no stars are visible", "isCorrect": false, "rationale": "The phrase is metaphorical for death’s endless darkness, not a description of a literal night sky."}, {"text": "The endless, dateless (without end or date) darkness of death that has permanently claimed the speaker’s friends", "isCorrect": true, "rationale": "“Dateless” means without end or expiration date—death’s night has no dawn; those who enter it are hidden there permanently."}, {"text": "A night that the speaker cannot remember because his grief has blurred his memory", "isCorrect": false, "rationale": "The problem is too much memory, not too little; the phrase describes death’s permanent darkness."}, {"text": "A metaphor for old age, when dates and memories become confused", "isCorrect": false, "rationale": "Old age and mental confusion are not the meaning; “dateless” refers to death’s eternity."}]}, {"question": "What does the accounting metaphor in “I new pay as if not paid before” suggest?", "options": [{"text": "The speaker pays a financial debt he forgot to settle earlier", "isCorrect": false, "rationale": "The debt is emotional and metaphorical, not financial."}, {"text": "Memory forces the speaker to pay the emotional debt of grief afresh, as if it had never been paid, even though he grieved before", "isCorrect": true, "rationale": "The accounting language (“expense,” “account,” “pay”) shows that grief is like a debt that keeps being re-presented; memory makes old sorrow feel new and unpaid."}, {"text": "The speaker compensates the beloved for past neglect by writing this sonnet", "isCorrect": false, "rationale": "The payment is of grief, not compensation to the beloved."}, {"text": "The speaker pays tribute to dead friends by remembering them annually", "isCorrect": false, "rationale": "Annual tribute is not the specific meaning; the re-payment is involuntary, triggered by memory."}]}, {"question": "How does the couplet resolve the long catalogue of grief?", "options": [{"text": "The speaker resolves to forget the past entirely and focus on the future", "isCorrect": false, "rationale": "No resolution to forget is offered; the resolution is the thought of the beloved."}, {"text": "Thinking of the beloved restores all losses and ends all sorrows", "isCorrect": true, "rationale": "“But if the while I think on thee, dear friend, / All losses are restor’d and sorrows end”—the thought of the beloved acts as a restorative that makes good all the grievances catalogued in the sonnet."}, {"text": "The speaker accepts his grief as an inevitable part of love and life", "isCorrect": false, "rationale": "Resignation is not the conclusion; the couplet offers active restoration through the thought of the beloved."}, {"text": "The speaker decides to write poems honoring each friend he has lost", "isCorrect": false, "rationale": "No specific plan to memorialize friends is stated; the resolution is the beloved’s healing power."}]}, {"question": "The phrase “love’s long since cancell’d woe” uses a legal term. What does “cancell’d” mean here?", "options": [{"text": "Ignored or forgotten without being properly addressed", "isCorrect": false, "rationale": "The woe was properly mourned once; “cancell’d” means legally discharged."}, {"text": "Legally discharged or settled, yet the speaker weeps for it again as if it were never settled", "isCorrect": true, "rationale": "“Cancell’d” means legally void or annulled—a debt discharged; but memory makes the speaker weep for this already-settled woe as if fresh."}, {"text": "Made worse or intensified by time", "isCorrect": false, "rationale": "“Cancell’d” does not mean worsened; it means settled and done—which makes the re-grieving paradoxical."}, {"text": "The woe of loving someone who has cancelled the relationship", "isCorrect": false, "rationale": "While romantic cancellation is possible, the legal metaphor specifically means the woe was officially discharged, not that the beloved ended a relationship."}]}, {"question": "Sonnet XXX and Sonnet XXIX share a structural feature. What is it?", "options": [{"text": "Both use the image of the lark to signal emotional transformation", "isCorrect": false, "rationale": "The lark image belongs only to Sonnet XXIX; Sonnet XXX does not use this image."}, {"text": "Both move from an extended catalogue of misery or loss to a couplet where thought of the beloved transforms everything", "isCorrect": true, "rationale": "XXIX accumulates self-loathing and social despair; XXX accumulates past griefs—both resolve with a couplet in which the beloved’s memory restores the speaker’s emotional state."}, {"text": "Both are addressed directly to the beloved in second-person", "isCorrect": false, "rationale": "Sonnet XXX’s address shifts to second person only in the couplet; throughout most of the sonnet the speaker reflects inwardly."}, {"text": "Both describe the speaker’s actual journey to be near the beloved", "isCorrect": false, "rationale": "No physical journey is described in either sonnet; both are meditative."}]}, {"question": "The word “expense” in “the expense of many a vanish’d sight” means:", "options": [{"text": "The financial cost of the journeys the speaker has made", "isCorrect": false, "rationale": "The expense is not financial; it is the loss or expenditure of precious experiences."}, {"text": "The loss or depletion of precious experiences and sights now gone forever", "isCorrect": true, "rationale": "“Expense” here carries its older sense of spending or depletion—precious experiences have been “spent” (used up and lost), not recovered."}, {"text": "The effort and time required to maintain friendships", "isCorrect": false, "rationale": "Effort and time are not the meaning; the word focuses on what has been irretrievably lost."}, {"text": "A complaint about the excessive cost of love", "isCorrect": false, "rationale": "The “expense” is of vanished sights and experiences, not of love’s price."}]}, {"question": "What does “dear friend” in the couplet signal about the relationship in these sonnets?", "options": [{"text": "The beloved is merely a platonic acquaintance, not a romantic interest", "isCorrect": false, "rationale": "The term “dear friend” does not exclude deep affection; in the Elizabethan context it could encompass both friendship and love."}, {"text": "The term emphasizes the depth of affection and the personal intimacy of the bond—friend here is a term of profound love", "isCorrect": true, "rationale": "“Dear friend” signals emotional intimacy; in the Renaissance, “friend” (like Latin “amicus”) could express the deepest bonds of love and loyalty, not merely casual acquaintance."}, {"text": "The speaker has decided to demote the beloved from lover to friend after disappointment", "isCorrect": false, "rationale": "No demotion is taking place; the term expresses warmth and closeness at the sonnet’s emotional climax."}, {"text": "The speaker is addressing a friend, not the Fair Youth, in this sonnet", "isCorrect": false, "rationale": "The sonnet belongs to the Fair Youth sequence; “dear friend” refers to the same beloved addressed throughout."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
