<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradox does the speaker describe in the opening lines of Sonnet XCV?", "options": [{"text": "The beloved is ugly but people say he is beautiful", "isCorrect": false, "rationale": "The beloved's beauty is not in question; the paradox is about how beauty transforms the perception of moral failing."}, {"text": "The beloved's beauty makes his shameful behavior seem sweet or praiseworthy", "isCorrect": true, "rationale": "Lines 1-4 describe how the beloved's beauty makes shame seem sweet — like a canker in a rose, the flaw is contained within beauty and somehow made attractive."}, {"text": "The beloved is virtuous but appears corrupt to the world", "isCorrect": false, "rationale": "The beloved has actual faults; the paradox is that beauty makes genuine faults seem attractive, not that virtue is misread."}, {"text": "The beloved's name is shameful but his deeds are honorable", "isCorrect": false, "rationale": "The beloved's name is actually beautified and blessed even when attached to ill report; the paradox runs the opposite direction."}]}, {"question": "What does the canker in the rose image signify?", "options": [{"text": "Disease that eventually kills all beauty", "isCorrect": false, "rationale": "While the canker is destructive, its role in this line is to show how a flaw is housed within beauty, not primarily to predict destruction."}, {"text": "A hidden flaw or corruption contained within beauty", "isCorrect": true, "rationale": "The canker — a worm or decay — spoils the rose from within while the rose remains outwardly beautiful. This captures the beloved's shame hidden within his attractive name and person."}, {"text": "The natural death of all living things", "isCorrect": false, "rationale": "The image is not about natural mortality but about the specific coexistence of flaw and beauty."}, {"text": "The speaker's own envy of the beloved", "isCorrect": false, "rationale": "The canker represents the beloved's shame, not the speaker's feelings."}]}, {"question": "What effect does the beloved's beauty have on those who report his misbehavior?", "options": [{"text": "It makes them refuse to speak of him at all", "isCorrect": false, "rationale": "Critics do speak, but the effect of his name is to transform their criticism."}, {"text": "Even those making lascivious criticisms cannot fully dispraise him — simply naming him blesses an ill report", "isCorrect": true, "rationale": "Lines 7-10 argue that those reporting the beloved's sport cannot truly dispraise him: the very mention of his name turns negative report into something like praise."}, {"text": "It makes them attack him more viciously", "isCorrect": false, "rationale": "The opposite is described; beauty softens and beautifies even hostile reports."}, {"text": "It silences all criticism permanently", "isCorrect": false, "rationale": "Criticism is not silenced; it is transformed by the beloved's charm into inadvertent praise."}]}, {"question": "What is meant by 'What a mansion have those vices got' (line 11)?", "options": [{"text": "The beloved lives in a very grand house", "isCorrect": false, "rationale": "The mansion is metaphorical, not literal architecture."}, {"text": "The beloved's beautiful person is the luxurious dwelling-place the vices have chosen as their home", "isCorrect": true, "rationale": "'Mansion' is a metaphor for the beloved's attractive person; the vices have chosen the finest possible dwelling — his beauty — making them hard to perceive or condemn."}, {"text": "The beloved's wealth protects him from punishment for his vices", "isCorrect": false, "rationale": "Material wealth is not the meaning; the protection comes from beauty, not money."}, {"text": "The vices are too grand to be confined to one person", "isCorrect": false, "rationale": "The mansion image does the opposite: the vices are happily contained in the beloved because his beauty makes them invisible."}]}, {"question": "What is the warning in the couplet ('Take heed, dear heart, of this large privilege; / The hardest knife ill-us'd doth lose his edge')?", "options": [{"text": "Do not use sharp objects carelessly", "isCorrect": false, "rationale": "The knife is a metaphor; the warning is about misusing a privilege."}, {"text": "The privilege of having beauty conceal all faults is dangerous — even the sharpest instrument loses its value through misuse", "isCorrect": true, "rationale": "The couplet warns: beauty's power to neutralize criticism ('large privilege') cannot be taken for granted. Just as the hardest knife dulls when ill-used, the beloved's beauty will eventually lose its capacity to transform shame into grace if he continues to misuse it."}, {"text": "The speaker threatens to harm the beloved with a knife", "isCorrect": false, "rationale": "The knife is figurative; there is no threat of physical violence."}, {"text": "The beloved should use his beauty more aggressively to defeat his critics", "isCorrect": false, "rationale": "The warning is against continued misuse of the privilege of beauty, not an encouragement to use it more."}]}, {"question": "How does Sonnet XCV relate thematically to Sonnet XCIV?", "options": [{"text": "Both celebrate the beloved's perfect virtue", "isCorrect": false, "rationale": "Neither celebrates perfect virtue; XCIV warns against corruption and XCV describes it in action."}, {"text": "XCIV warns that sweetness corrupted becomes worse than ordinary badness; XCV shows this principle applied to the beloved's actual behavior", "isCorrect": true, "rationale": "The festering lily of XCIV becomes, in XCV, the specific case: the beloved's beauty housing actual vices, with the same implicit warning that beauty can only protect corruption for so long."}, {"text": "Both sonnets are addressed to the rival poet", "isCorrect": false, "rationale": "Neither sonnet addresses the rival poet."}, {"text": "XCIV rejects the beloved; XCV welcomes him back", "isCorrect": false, "rationale": "XCIV does not explicitly reject the beloved, and XCV does not describe a return; both are in the register of watchful concern."}]}, {"question": "The phrase 'Naming thy name, blesses an ill report' means:", "options": [{"text": "The beloved's reputation is so bad that his name is a curse", "isCorrect": false, "rationale": "The phrase says the opposite: naming the beloved sanctifies even bad reports."}, {"text": "The mere mention of the beloved's name makes even a negative story sound flattering", "isCorrect": true, "rationale": "So powerful is the beloved's beauty and charm that critics who mention his name in negative contexts inadvertently bless or beautify what they report."}, {"text": "The beloved should change his name to avoid association with scandal", "isCorrect": false, "rationale": "Name change is not suggested; the magic of the existing name is the point."}, {"text": "Ill reports should be kept from the beloved's hearing", "isCorrect": false, "rationale": "The sonnet is not concerned with what the beloved hears but with how his name affects the reports made about him."}]}, {"question": "What does 'sport' refer to in line 8 ('making lascivious comments on thy sport')?", "options": [{"text": "Athletic competition", "isCorrect": false, "rationale": "While 'sport' can mean athletic play, here the context — paired with 'lascivious' — points to amorous or erotic play."}, {"text": "Amorous or erotic play and misconduct", "isCorrect": true, "rationale": "In Elizabethan usage, 'sport' frequently means sexual play or erotic pastime; combined with 'lascivious,' it clearly refers to the beloved's sexual misconduct."}, {"text": "Hunting and hawking", "isCorrect": false, "rationale": "Though hunting appears in XCI, here the context is clearly erotic rather than aristocratic leisure."}, {"text": "The beloved's public performances as an entertainer", "isCorrect": false, "rationale": "No performing career is implied; the lascivious sport is private and sexual."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
