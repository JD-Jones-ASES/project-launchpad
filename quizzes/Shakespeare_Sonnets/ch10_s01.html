<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet C</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To whom does the speaker address Sonnet C?", "options": [{"text": "His beloved friend", "isCorrect": false, "rationale": "The speaker addresses the Muse, not his beloved directly."}, {"text": "His Muse", "isCorrect": true, "rationale": "The poem opens 'Where art thou Muse,' making the Muse the direct addressee."}, {"text": "Time personified", "isCorrect": false, "rationale": "Time appears as an adversary but is not the one addressed."}, {"text": "The reader", "isCorrect": false, "rationale": "The speaker calls out to his Muse, not to a general reader."}], "id": "q01"}, {"question": "What does the speaker accuse his Muse of doing?", "options": [{"text": "Praising the beloved too extravagantly", "isCorrect": false, "rationale": "The complaint is the opposite — the Muse has neglected to sing of the beloved."}, {"text": "Wasting effort on worthless subjects", "isCorrect": true, "rationale": "He asks 'Spend'st thou thy fury on some worthless song, / Darkening thy power to lend base subjects light?'"}, {"text": "Quarreling with other poets", "isCorrect": false, "rationale": "There is no mention of rivalry with other poets."}, {"text": "Writing too many sonnets about decay", "isCorrect": false, "rationale": "The Muse is faulted for neglect, not for excess of any topic."}], "id": "q02"}, {"question": "What does 'resty Muse' mean in line 9?", "options": [{"text": "A Muse that is creative and energetic", "isCorrect": false, "rationale": "'Resty' means sluggish or lazy, the opposite of energetic."}, {"text": "A Muse that is lazy or sluggish", "isCorrect": true, "rationale": "'Resty' is an archaic adjective meaning restive or lazily idle, reinforcing the charge of neglect."}, {"text": "A Muse that is rested and ready", "isCorrect": false, "rationale": "The connotation is negative — the Muse has rested too long."}, {"text": "A Muse associated with rest and sleep", "isCorrect": false, "rationale": "While 'rest' is embedded, the word functions as a criticism, not a description of sleep."}], "id": "q03"}, {"question": "What task does the speaker urge the Muse to perform regarding his beloved's face?", "options": [{"text": "Paint a portrait of it", "isCorrect": false, "rationale": "The speaker urges poetry, not visual art."}, {"text": "Survey it for signs of aging", "isCorrect": true, "rationale": "He instructs: 'my love's sweet face survey, / If Time have any wrinkle graven there.'"}, {"text": "Compare it to a summer's day", "isCorrect": false, "rationale": "That comparison belongs to Sonnet 18, not Sonnet C."}, {"text": "Memorize it before it fades", "isCorrect": false, "rationale": "The Muse is told to write against decay, not merely to memorize."}], "id": "q04"}, {"question": "What does the couplet ask the Muse to do?", "options": [{"text": "Warn the beloved that Time is approaching", "isCorrect": false, "rationale": "The mission is to preserve fame, not to issue a warning."}, {"text": "Give the beloved fame faster than Time destroys life", "isCorrect": true, "rationale": "'Give my love fame faster than Time wastes life, / So thou prevent'st his scythe and crooked knife.'"}, {"text": "Describe Time as a kindly gardener", "isCorrect": false, "rationale": "Time is portrayed as a destructive force, not a gentle one."}, {"text": "Stop writing about beauty altogether", "isCorrect": false, "rationale": "The speaker wants more writing about beauty, not less."}], "id": "q05"}, {"question": "How does the speaker imagine Time's destructive power in the couplet?", "options": [{"text": "As a river eroding a cliff", "isCorrect": false, "rationale": "The imagery is of a reaper with cutting tools, not a river."}, {"text": "As a scythe and crooked knife", "isCorrect": true, "rationale": "The couplet uses 'his scythe and crooked knife' to personify Time as a harvesting destroyer."}, {"text": "As a winter frost killing flowers", "isCorrect": false, "rationale": "Seasonal imagery appears earlier in other sonnets; here the image is of bladed weapons."}, {"text": "As a thief stealing jewels", "isCorrect": false, "rationale": "There is no thief metaphor in this sonnet."}], "id": "q06"}, {"question": "What does the phrase 'gentle numbers' refer to?", "options": [{"text": "Small quantities of praise", "isCorrect": false, "rationale": "'Numbers' here is a poetic term, not a mathematical one."}, {"text": "Soft, graceful verse", "isCorrect": true, "rationale": "In Renaissance usage 'numbers' means metrical lines or verses; 'gentle' means smooth and becoming."}, {"text": "Melodious musical notes", "isCorrect": false, "rationale": "While poetry and music were linked, 'gentle numbers' specifically means refined poetic lines."}, {"text": "A modest count of poems written", "isCorrect": false, "rationale": "The phrase refers to the quality of verse, not to a quantity of poems."}], "id": "q07"}, {"question": "What is the principal theme of Sonnet C?", "options": [{"text": "The beloved's physical decline", "isCorrect": false, "rationale": "The poem worries about possible decline but focuses on poetry's power to prevent it."}, {"text": "The poet's duty to immortalize the beloved through verse", "isCorrect": true, "rationale": "The entire sonnet commands the Muse back to work so that poetry will preserve the beloved against Time."}, {"text": "The Muse's anger at being misused", "isCorrect": false, "rationale": "The Muse is absent and negligent; anger is not attributed to her."}, {"text": "A comparison between two rival poets", "isCorrect": false, "rationale": "There is no rival poet in Sonnet C."}], "id": "q08"}, {"question": "What device does the speaker use by directly addressing his Muse?", "options": [{"text": "Simile", "isCorrect": false, "rationale": "A simile compares using 'like' or 'as'; speaking to an abstract entity is a different device."}, {"text": "Apostrophe", "isCorrect": true, "rationale": "Apostrophe is the rhetorical device of addressing an absent or abstract entity as if present, used throughout this sonnet."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "Hyperbole involves exaggeration; apostrophe involves direct address."}, {"text": "Alliteration", "isCorrect": false, "rationale": "While some alliteration exists, the dominant device of addressing the Muse is apostrophe."}], "id": "q09"}, {"question": "What does 'be a satire to decay' instruct the Muse to do?", "options": [{"text": "Mock the beloved's fading looks", "isCorrect": false, "rationale": "The satire is directed at Time's decay, not at the beloved."}, {"text": "Write verse that attacks and exposes Time's destructive work", "isCorrect": true, "rationale": "The Muse is told to use sharp, satirical verse to make Time's spoils look contemptible everywhere."}, {"text": "Compose comedy to lighten the subject of death", "isCorrect": false, "rationale": "Satire here means sharp criticism, not comic lightening."}, {"text": "Refuse to write any more poems about beauty", "isCorrect": false, "rationale": "The instruction is to write more vigorously, not to stop."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
