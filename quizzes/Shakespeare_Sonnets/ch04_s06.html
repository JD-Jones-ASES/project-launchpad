    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker’s self-comparison in the opening quatrain of Sonnet XXIII?", "options": [{"text": "He compares himself to a sailor lost at sea without a compass", "isCorrect": false, "rationale": "No nautical imagery appears; the comparison is theatrical and emotional."}, {"text": "He compares himself to an imperfect actor who forgets his lines due to stage fright, and to a fierce creature weakened by its own rage", "isCorrect": true, "rationale": "Lines 1–4 offer two similes: the nervous actor who loses his part through fear, and the fierce creature whose anger undermines its own strength—both illustrating how strong emotion impedes expression."}, {"text": "He compares himself to a king who has lost his crown and title", "isCorrect": false, "rationale": "No royal imagery appears in the opening quatrain; the comparisons are theatrical and animal."}, {"text": "He compares himself to a child who is too shy to recite his lessons", "isCorrect": false, "rationale": "While the actor simile involves forgetting due to fear, it is explicitly theatrical, not about a schoolchild."}], "id": "q01"}, {"question": "What does the speaker mean by “the perfect ceremony of love’s rite”?", "options": [{"text": "The formal marriage ceremony between the speaker and beloved", "isCorrect": false, "rationale": "Marriage is not the subject of this sonnet; the “ceremony” refers to the proper verbal expression of love."}, {"text": "The proper verbal declaration of love that the speaker is unable to perform due to emotional overwhelm", "isCorrect": true, "rationale": "The speaker “fear of trust, forget[s] to say / The perfect ceremony of love’s rite”—he cannot properly perform the speech act of loving declaration because his own feelings overpower him."}, {"text": "A religious ritual the speaker must complete before confessing love", "isCorrect": false, "rationale": "No specific religious ritual is intended; the “ceremonial rite” is a metaphor for eloquent, fitting verbal expression of love."}, {"text": "The social customs and gifts expected in a courtship ritual", "isCorrect": false, "rationale": "Social gifts and customs are not the focus; the rite refers to speaking love properly and eloquently."}], "id": "q02"}, {"question": "What does the speaker propose as a substitute for spoken words?", "options": [{"text": "Letters and written poetry sent from a distance", "isCorrect": false, "rationale": "Written poetry from afar is the solution in Sonnet XXVI; here the substitute for speech is the speaker’s silent looks."}, {"text": "His silent looks and gaze, which will serve as eloquent advocates for his love", "isCorrect": true, "rationale": "Lines 11–12: “O! let my looks be then the eloquence / And dumb presagers of my speaking breast”—his eyes and expression will communicate what his tongue cannot."}, {"text": "Gifts and tokens of affection presented to the beloved", "isCorrect": false, "rationale": "Material gifts are not mentioned; the solution is non-verbal visual communication."}, {"text": "Music and song performed in the beloved’s presence", "isCorrect": false, "rationale": "Music is not proposed as the solution; the speaker offers his silent, expressive gaze."}], "id": "q03"}, {"question": "What is the meaning of “dumb presagers of my speaking breast”?", "options": [{"text": "Silent forecasters that hint at the emotions within the speaker’s heart", "isCorrect": true, "rationale": "“Dumb” means silent; “presagers” are forerunners or heralds; the phrase means his looks silently herald the depth of feeling inside him, doing the work that speech fails to do."}, {"text": "Mute messengers sent by the speaker to deliver written notes", "isCorrect": false, "rationale": "No physical messengers are sent; “dumb presagers” refers to the speaker’s own wordless looks."}, {"text": "The books of verse that the speaker has written to express his love", "isCorrect": false, "rationale": "Written verse is not the subject here; the “presagers” are the speaker’s facial expressions and gaze."}, {"text": "Prophetic dreams that reveal the speaker’s hidden feelings to the beloved", "isCorrect": false, "rationale": "Dreams are not mentioned; the metaphor is about visual, present communication through looks."}], "id": "q04"}, {"question": "What paradox does the couplet articulate?", "options": [{"text": "Love is both painful and pleasurable at the same time", "isCorrect": false, "rationale": "While this is a general truth about love, it is not the specific paradox of the couplet."}, {"text": "To truly understand love’s silent communication requires hearing with one’s eyes—reading what is unspoken", "isCorrect": true, "rationale": "“To hear with eyes belongs to love’s fine wit”—this oxymoron-paradox suggests that sophisticated love requires perceiving silent messages (“hearing”) through visual attention (“eyes”)."}, {"text": "The speaker is both eloquent and speechless simultaneously", "isCorrect": false, "rationale": "While this is implied, the couplet’s specific paradox is the synesthetic idea of “hearing with eyes.”"}, {"text": "The beloved is both near and far from the speaker", "isCorrect": false, "rationale": "Physical distance is not the paradox; the couplet concerns the mode of perception required to understand silent love."}], "id": "q05"}, {"question": "The phrase “o’ercharg’d with burthen of mine own love’s might” suggests:", "options": [{"text": "The speaker carries too many letters from his beloved", "isCorrect": false, "rationale": "No letters are mentioned; “burthen” (burden) is metaphorical, describing emotional weight."}, {"text": "The speaker is so overwhelmed by the intensity of his own love that it silences him", "isCorrect": true, "rationale": "“O’ercharg’d” means overloaded; the speaker is crushed under the weight of his own love’s power, which paradoxically prevents him from expressing it."}, {"text": "The speaker is physically exhausted from the labor of writing poetry", "isCorrect": false, "rationale": "Physical fatigue from writing is not the meaning; the overcharge is emotional, not physical."}, {"text": "Love has made the speaker stronger than he was before", "isCorrect": false, "rationale": "The image is of being overwhelmed and weakened by love’s intensity, not strengthened by it."}], "id": "q06"}, {"question": "How does the simile of the actor in lines 1–2 function thematically?", "options": [{"text": "It suggests the speaker is a professional playwright who knows theatrical technique", "isCorrect": false, "rationale": "The simile is not about the speaker’s profession; it illustrates how fear defeats skilled performance."}, {"text": "It illustrates how strong emotion (fear, love) overwhelms trained skill, leaving the performer speechless", "isCorrect": true, "rationale": "The actor’s fear causes him to forget his well-rehearsed lines; similarly, the speaker’s love is so powerful it disrupts his ability to speak eloquently, even though he knows what he wants to say."}, {"text": "It criticizes actors for being poor at memorization", "isCorrect": false, "rationale": "The criticism is not of actors generally but a sympathetic comparison showing how overwhelming emotion defeats preparation."}, {"text": "It implies the speaker is pretending to love the beloved as an actor plays a role", "isCorrect": false, "rationale": "The speaker is not performing love falsely; the simile is about being overwhelmed by genuine feeling."}], "id": "q07"}, {"question": "What does “more than that tongue that more hath more express’d” mean?", "options": [{"text": "The speaker’s eloquent rivals have said more and therefore deserve more reward", "isCorrect": false, "rationale": "The comparison is not about rewarding rivals but about the relative value of silent looks versus spoken words."}, {"text": "The speaker’s silent looks plead more effectively for love than a tongue that has spoken many elaborate words", "isCorrect": true, "rationale": "The deliberately awkward, tongue-twisting repetition of “more” mimics the inadequacy of excessive speech, suggesting that silent eloquence outperforms wordy rhetoric."}, {"text": "The beloved has already heard too many declarations of love from other poets", "isCorrect": false, "rationale": "While rival poets are a theme in surrounding sonnets, this line specifically contrasts silent looks with verbose speech."}, {"text": "The speaker regrets that he has said too much in previous poems", "isCorrect": false, "rationale": "The speaker does not express regret here; he argues for the superiority of silent communication."}], "id": "q08"}, {"question": "Sonnet XXIII is primarily about:", "options": [{"text": "The rivalry between two poets competing for the beloved’s attention", "isCorrect": false, "rationale": "Rivalry is the focus of Sonnet XXI; Sonnet XXIII focuses on the speaker’s own inability to speak and its resolution."}, {"text": "The speaker’s inability to verbalize his love and his plea for the beloved to read his silent looks instead", "isCorrect": true, "rationale": "The sonnet’s argument moves from the problem (speech overwhelmed by love) to the solution (reading silent looks), asking the beloved to exercise “love’s fine wit” in interpreting non-verbal expression."}, {"text": "The passage of time and its effects on the speaker’s ability to love", "isCorrect": false, "rationale": "Time’s effects on love are not the subject; the focus is on the communication problem caused by emotional intensity."}, {"text": "The speaker’s jealousy of the beloved’s popularity", "isCorrect": false, "rationale": "Jealousy is not present in this sonnet; the problem is the speaker’s own emotional inhibition."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
