    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker request of the beloved at the opening of Sonnet LXXI?", "options": [{"text": "That the beloved write more poetry about the speaker after death", "isCorrect": false, "rationale": "The speaker asks for the opposite: that the beloved forget the speaker entirely rather than write about him."}, {"text": "That the beloved mourn no longer than the funeral bell rings after the speaker dies", "isCorrect": true, "rationale": "Lines 1–3: “No longer mourn for me when I am dead / Than you shall hear the surly sullen bell / Give warning to the world that I am fled.”"}, {"text": "That the beloved preserve the speaker’s name in verse forever", "isCorrect": false, "rationale": "The speaker explicitly asks that his name be forgotten."}, {"text": "That the beloved visit the speaker’s grave each year", "isCorrect": false, "rationale": "No such annual ritual is requested; the speaker wants forgetting, not commemoration."}], "id": "q01"}, {"question": "What does “the surly sullen bell” represent?", "options": [{"text": "The speaker’s angry mood", "isCorrect": false, "rationale": "The bell is a funeral bell, not a metaphor for the speaker’s emotion."}, {"text": "The funeral or passing bell that announces a death to the surrounding community", "isCorrect": true, "rationale": "In Elizabethan England, a church bell was rung to announce a death (“passing bell”). “Surly” and “sullen” describe its mournful, heavy sound."}, {"text": "A warning of military attack", "isCorrect": false, "rationale": "The bell is explicitly funereal, giving “warning to the world that I am fled.”"}, {"text": "The beloved’s cold heart that refuses to love", "isCorrect": false, "rationale": "The bell is a literal funeral bell, not a metaphor for the beloved’s emotions."}], "id": "q02"}, {"question": "Why does the speaker ask the beloved to forget him?", "options": [{"text": "Because the speaker has wronged the beloved and feels unworthy of grief", "isCorrect": false, "rationale": "The motivation is not guilt but love: the speaker does not want grief to harm the beloved."}, {"text": "Because he loves the beloved so much that he would rather be forgotten than cause the beloved sorrow", "isCorrect": true, "rationale": "Lines 7–8: “for I love you so, / That I in your sweet thoughts would be forgot, / If thinking on me then should make you woe.”"}, {"text": "Because grief is a sign of weakness and the speaker wants the beloved to be strong", "isCorrect": false, "rationale": "The speaker’s reason is love and concern for the beloved’s happiness, not a valuation of strength over grief."}, {"text": "Because the speaker will live on through his poetry and needs no mourning", "isCorrect": false, "rationale": "The speaker explicitly asks that even his name not be rehearsed; this is not a claim of poetic immortality."}], "id": "q03"}, {"question": "What does “compounded am with clay” (line 12) mean?", "options": [{"text": "The speaker has become a potter who works with clay", "isCorrect": false, "rationale": "The phrase is a poetic expression for death and burial."}, {"text": "The speaker’s body has decayed and become part of the earth after death", "isCorrect": true, "rationale": "“Compounded” means mixed or blended; “clay” is earth. The body decomposing into earth is a traditional image of death."}, {"text": "The speaker has been transformed into a statue for the beloved’s garden", "isCorrect": false, "rationale": "The image is of natural decomposition after death, not a transformation into a monument."}, {"text": "The speaker has hardened his heart like clay to endure separation", "isCorrect": false, "rationale": "The phrase refers to the physical body’s fate after death, not an emotional hardening."}], "id": "q04"}, {"question": "What social concern does the couplet express?", "options": [{"text": "The speaker fears he will be buried in a pauper’s grave", "isCorrect": false, "rationale": "The concern is about the beloved’s public reputation, not the speaker’s burial arrangements."}, {"text": "The speaker fears the wise world will see the beloved’s mourning and mock both the beloved and the speaker’s memory", "isCorrect": true, "rationale": "Lines 15–16: “Lest the wise world should look into your moan, / And mock you with me after I am gone.”"}, {"text": "The speaker does not want the beloved’s enemies to use the mourning as evidence against the beloved", "isCorrect": false, "rationale": "The concern is mockery from “the wise world,” not specific enemies using evidence against the beloved."}, {"text": "The speaker worries the beloved will forget him too soon and feel guilty", "isCorrect": false, "rationale": "The opposite: the speaker wants the beloved to forget quickly, and the couplet explains why (to avoid mockery)."}], "id": "q05"}, {"question": "What does the phrase “vile world with vilest worms” (line 4) convey about the speaker’s view of death?", "options": [{"text": "Death is beautiful and peaceful", "isCorrect": false, "rationale": "The images of vileness and worms present death as repugnant, not beautiful."}, {"text": "Death and the grave are repugnant, yet the world of the living is equally vile", "isCorrect": true, "rationale": "“Vile world” (the living world) and “vilest worms” (the grave) create an equation: both living and dead are vile, echoing Sonnet LXVI’s weary worldview."}, {"text": "The speaker is afraid of death and wishes to escape it", "isCorrect": false, "rationale": "The speaker accepts death; the vile imagery describes both worlds without favoring one."}, {"text": "The world will be better off without the speaker", "isCorrect": false, "rationale": "The speaker’s concern is for the beloved’s welfare, not for the world’s improvement."}], "id": "q06"}, {"question": "What is the paradox at the heart of Sonnet LXXI?", "options": [{"text": "The speaker wants to be remembered but also wants to be forgotten", "isCorrect": false, "rationale": "The paradox is sharper: the speaker’s love is so great that he desires the beloved’s happiness over his own commemoration."}, {"text": "The speaker’s love is so intense that he asks the beloved to forget him in order to spare the beloved pain", "isCorrect": true, "rationale": "Profound love normally desires to be remembered; here love so overwhelms self-interest that the speaker asks for forgetting as the greater act of love."}, {"text": "The speaker both values and despises his own poetry", "isCorrect": false, "rationale": "Poetry is a vehicle for the argument but the paradox centers on love and forgetting."}, {"text": "The funeral bell both mourns and celebrates the speaker’s death", "isCorrect": false, "rationale": "The bell is straightforwardly mournful; no celebration is implied."}], "id": "q07"}, {"question": "What does “my poor name rehearse” (line 13) mean?", "options": [{"text": "Do not practice saying my name as if preparing a speech about me", "isCorrect": false, "rationale": "While “rehearse” does mean repeat or go over, the request is not about preparation but about not uttering the name at all."}, {"text": "Do not even repeat or speak my name aloud in mourning", "isCorrect": true, "rationale": "“Rehearse” means to repeat or recite; the speaker asks that even this minimal act of commemoration be avoided."}, {"text": "Do not perform the speaker’s poems as if acting in a play", "isCorrect": false, "rationale": "The theatrical sense of rehearse is not primary here; the request is about not naming or commemorating the speaker."}, {"text": "Do not write the speaker’s name on his grave", "isCorrect": false, "rationale": "The request is verbal — do not even speak the name — not about inscriptions on a grave."}], "id": "q08"}, {"question": "How does Sonnet LXXI contrast with the verse-immortality promise of Sonnets LXIII and LXV?", "options": [{"text": "LXXI claims verse is immortal; LXIII and LXV deny it", "isCorrect": false, "rationale": "This reverses the actual positions: LXIII and LXV promise immortality through verse; LXXI asks for forgetting."}, {"text": "Where LXIII and LXV promise the beloved’s immortality through verse, LXXI asks the beloved to let the speaker’s memory die entirely", "isCorrect": true, "rationale": "The contrast is striking: the immortality theme is reversed in LXXI, where love demands forgetting rather than preservation."}, {"text": "Both pairs of sonnets agree that verse preserves memory", "isCorrect": false, "rationale": "LXXI explicitly contradicts the immortality theme by asking the beloved not even to speak the speaker’s name."}, {"text": "LXXI and LXIII both make the same argument about memory and love", "isCorrect": false, "rationale": "LXIII promises beauty preserved in black lines; LXXI asks for deliberate forgetting."}], "id": "q09"}, {"question": "The word “moan” (line 15) refers to:", "options": [{"text": "The speaker’s own moaning at the prospect of death", "isCorrect": false, "rationale": "By line 15 the speaker is already imagined as dead; the moan belongs to the beloved."}, {"text": "The beloved’s public expression of grief over the speaker’s death", "isCorrect": true, "rationale": "“The wise world should look into your moan” — “moan” is the beloved’s mourning, which the world will observe and mock."}, {"text": "The funeral bell’s sound echoing over the burial", "isCorrect": false, "rationale": "The moan belongs to the beloved, not to the bell."}, {"text": "The speaker’s groan of pain in the final illness before death", "isCorrect": false, "rationale": "The moan is the beloved’s grief after the speaker’s death, not the speaker’s own pain."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
