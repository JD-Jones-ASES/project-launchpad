<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What problem does the speaker identify in the opening quatrain of Sonnet XXXIX?", "options": [{"text": "The speaker cannot afford to travel to see the beloved", "isCorrect": false, "rationale": "Financial barriers to travel are not cited; the problem is philosophical and rhetorical."}, {"text": "The speaker cannot praise the beloved without it being self-praise, since they are spiritually one", "isCorrect": true, "rationale": "“How thy worth with manners may I sing, / When thou art all the better part of me?” — if the beloved is the better part of the speaker, praising the beloved is praising himself, which is unseemly by rules of modesty."}, {"text": "The speaker is too grief-stricken to write poetry at all", "isCorrect": false, "rationale": "Grief impeding poetry is not the stated problem; it is the logical paradox of self-praise that creates the dilemma."}, {"text": "The speaker has run out of new ways to describe the beloved", "isCorrect": false, "rationale": "Exhausted vocabulary is the subject of Sonnet XXXVIII (“want subject to invent”); here the problem is the impossibility of modestly praising one who is part of oneself."}], "id": "q01"}, {"question": "What solution does the speaker propose in lines 5-6 for the problem of self-praise?", "options": [{"text": "He will write about the beloved anonymously", "isCorrect": false, "rationale": "Anonymity is not the solution; the proposal is physical and emotional separation so they can each be praised individually."}, {"text": "They should live divided so that the due praise can be given to the beloved alone", "isCorrect": true, "rationale": "“Even for this, let us divided live, / And our dear love lose name of single one” — separation allows the speaker to praise the beloved as a distinct person rather than as part of himself, resolving the modesty paradox."}, {"text": "He will ask a third poet to write the praise instead", "isCorrect": false, "rationale": "No substitute poet is proposed; the solution is separation enabling genuine second-person praise."}, {"text": "He will praise only the beloved's faults so that it does not count as self-praise", "isCorrect": false, "rationale": "Praising faults is not the proposal; the sonnet is about the inability to modestly praise virtues, solved by separation."}], "id": "q02"}, {"question": "How does the speaker reframe the pain of absence in lines 11-14?", "options": [{"text": "He says absence is simply too painful to reframe and must be endured", "isCorrect": false, "rationale": "The speaker does reframe absence — this is precisely what lines 11-14 accomplish; he does not simply submit to the pain."}, {"text": "Absence, which should be torment, becomes sweet because it provides “sour leisure” to think of love, and those thoughts transform time", "isCorrect": true, "rationale": "“O absence! what a torment wouldst thou prove, / Were it not thy sour leisure gave sweet leave, / To entertain the time with thoughts of love” — even sour absence creates the leisure in which sweet thoughts of love may flourish, redeeming the separation."}, {"text": "He says absence makes the heart stronger and more independent", "isCorrect": false, "rationale": "Independence is not the benefit cited; the benefit is the sweetness of thoughts of love that fill the absent time."}, {"text": "He convinces himself he prefers absence to the dangers of proximity", "isCorrect": false, "rationale": "He does not prefer absence — it remains potentially tormenting; he merely finds a compensating benefit within it."}], "id": "q03"}, {"question": "What is the paradox expressed in the couplet (“And that thou teachest how to make one twain, / By praising him here who doth hence remain”)?", "options": [{"text": "That the beloved teaches music but the speaker cannot hear it", "isCorrect": false, "rationale": "Music is not part of this sonnet; the paradox is about unity and division."}, {"text": "Absence teaches the speaker to make one into two: by praising the beloved from a distance, the speaker (one) becomes both praiser and the praised (two), resolving the self-praise problem", "isCorrect": true, "rationale": "The beloved's absence (“doth hence remain”) creates the distance that lets the speaker sing praise to someone genuinely other; in that separation the unity of “one” is productively divided into “twain,” allowing the modesty problem of the opening to be solved."}, {"text": "That two people in love always become one person eventually", "isCorrect": false, "rationale": "This is the inverse of the couplet's point; here oneness is divided into two, not two merged into one."}, {"text": "That time passes twice as slowly when one is in love", "isCorrect": false, "rationale": "The rate of time passing is not the paradox; the paradox is about making one into two through praise."}], "id": "q04"}, {"question": "What does “sour leisure” (line 12) suggest about the quality of time spent apart?", "options": [{"text": "That free time without the beloved is unpleasant yet still offers opportunity", "isCorrect": true, "rationale": "“Sour” acknowledges the bitterness or displeasure of idleness without the beloved; yet “leisure” (free time) gives “sweet leave” to think of love — the oxymoronic pairing captures the mixed quality of absent time."}, {"text": "That the speaker is productively busy during the separation", "isCorrect": false, "rationale": "The speaker is not described as busy; the time is “leisure,” which is unoccupied but sour without the beloved's presence."}, {"text": "That time spent apart is so pleasant the speaker no longer misses the beloved", "isCorrect": false, "rationale": "The sour quality prevents the leisure from being simply pleasant; the speaker clearly still misses the beloved."}, {"text": "That the speaker resents the beloved for being absent", "isCorrect": false, "rationale": "Resentment toward the beloved is not expressed; “sour” applies to the absence itself, not to feelings about the beloved."}], "id": "q05"}, {"question": "The phrase “the better part of me” (line 2) in the context of the whole sonnet means:", "options": [{"text": "The beloved is the speaker's physical superior in strength", "isCorrect": false, "rationale": "Physical strength is not the comparison; “better part” refers to moral, spiritual, or qualitative superiority."}, {"text": "The beloved embodies the finest qualities of the speaker's own nature, such that they are spiritually one", "isCorrect": true, "rationale": "The speaker's soul or best self is identified with the beloved; this neo-Platonic concept of a shared or unified self is the premise on which the whole modesty paradox of the sonnet rests."}, {"text": "The beloved owns the greater share of the speaker's estate", "isCorrect": false, "rationale": "No property division is implied; “better part” is spiritual and relational, not financial."}, {"text": "The beloved is slightly older than the speaker", "isCorrect": false, "rationale": "Age is not the referent; the phrase concerns the quality of what the beloved represents in the speaker's inner life."}], "id": "q06"}, {"question": "How does Sonnet XXXIX develop the recurring theme of oneness and separation from earlier sonnets in this chapter?", "options": [{"text": "It reverses the earlier sonnets by arguing that separation is always harmful and should be ended", "isCorrect": false, "rationale": "The sonnet finds value in separation; it does not simply argue it should end."}, {"text": "It builds on XXXVI's paradox of “twain” and “one,” reframing separation as the necessary condition for genuine, non-self-referential love and praise", "isCorrect": true, "rationale": "Sonnet XXXVI introduced the painful paradox of being spiritually one but physically twain; XXXIX revisits it but transforms the necessity into a productive device: separation is now what enables praise, love's contemplation, and the making of “one” into “twain."}, {"text": "It introduces a new character who creates the separation against the lovers' will", "isCorrect": false, "rationale": "No new character causes the separation; the logic of separation in XXXIX comes from the speaker's philosophical reflection on the self-praise problem."}, {"text": "It moves away from the separation theme to focus exclusively on poetic inspiration", "isCorrect": false, "rationale": "Poetic inspiration is the explicit subject of XXXVIII; XXXIX's main theme is the paradox of separation and unity."}], "id": "q07"}, {"question": "What is the tone of Sonnet XXXIX compared to the grief of the earlier sonnets in this chapter?", "options": [{"text": "More resigned and hopeless", "isCorrect": false, "rationale": "Resignation and hopelessness characterize neither this sonnet nor the speaker's overall arc; XXXIX achieves a kind of creative resolution."}, {"text": "More playfully philosophical and reconciled — pain is intellectually transformed rather than simply suffered", "isCorrect": true, "rationale": "Unlike the raw hurt of XXXIII-XXXV, Sonnet XXXIX takes a more ruminative, even clever tone: the speaker uses philosophical reasoning to turn a problem (absence) into a solution (the creative distance needed for genuine praise)."}, {"text": "More bitter and accusatory toward the beloved", "isCorrect": false, "rationale": "No accusation appears; the beloved is praised and the situation is analyzed philosophically, not bitterly."}, {"text": "More celebratory and joyful than any other sonnet in the chapter", "isCorrect": false, "rationale": "Sonnet XXXVII's couplet (“ten times happy me!”) is more overtly joyful; XXXIX is contemplative and measured, not primarily celebratory."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
