    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What action does the speaker describe taking at the start of Sonnet XLVIII?", "options": [{"text": "He locks the beloved in a room to prevent him from leaving.", "isCorrect": false, "rationale": "The speaker has no power to lock up the beloved; he laments the opposite."}, {"text": "He carefully secured his valuables under lock and key before departing on a journey.", "isCorrect": true, "rationale": "Lines 1–4 describe how the speaker locked away every trifle before setting out, ensuring nothing could be stolen. This contrasts with his inability to secure the beloved."}, {"text": "He hides a portrait of the beloved before leaving home.", "isCorrect": false, "rationale": "A portrait is not mentioned; the locked items are material possessions."}, {"text": "He composes a poem to protect the beloved’s memory.", "isCorrect": false, "rationale": "Poetry as protection is not the subject here; the conceit is about locks and chests."}]}, {"question": "The contrast the speaker draws is between:", "options": [{"text": "His valuable jewels and worthless trinkets.", "isCorrect": false, "rationale": "The contrast is not between types of possessions but between his possessions (trifles) and the beloved (a jewel beyond price)."}, {"text": "His ability to lock up worthless trifles and his inability to lock up the beloved, who is far more precious.", "isCorrect": true, "rationale": "Line 5 reverses the hierarchy: “But thou, to whom my jewels trifles are.” The speaker’s actual jewels are trivial compared to the beloved, yet the beloved alone he cannot lock away."}, {"text": "His past wealth and his present poverty.", "isCorrect": false, "rationale": "No financial change is implied; the speaker is not impoverished."}, {"text": "His youth when he was careful and his old age when he is careless.", "isCorrect": false, "rationale": "Age is not the contrast; the tension is between what can be locked away and what cannot."}]}, {"question": "The phrase “prey of every vulgar thief” (line 10) expresses:", "options": [{"text": "The speaker’s fear that the beloved will be literally robbed of his money.", "isCorrect": false, "rationale": "The theft is metaphorical, referring to rivals or temptations who might steal the beloved’s affections."}, {"text": "The speaker’s anxiety that common temptations and rivals could steal the beloved’s affection.", "isCorrect": true, "rationale": "Calling the beloved “the prey of every vulgar thief” expresses jealous anxiety that, left unguarded, the beloved will be pursued and won by others."}, {"text": "The speaker’s anger at having been literally robbed during his journey.", "isCorrect": false, "rationale": "No literal robbery has occurred; the threat is to the beloved’s fidelity."}, {"text": "Admiration for the beloved’s generosity in sharing himself with everyone.", "isCorrect": false, "rationale": "The tone is anxious and possessive, not admiring."}]}, {"question": "Where does the speaker say the beloved is “lock’d up”?", "options": [{"text": "In a strong stone tower far from any danger.", "isCorrect": false, "rationale": "No tower is described; the speaker’s claim is about an interior location."}, {"text": "Within the gentle closure of the speaker’s own breast (heart), though even this feels insecure.", "isCorrect": true, "rationale": "Lines 11–13: “Thee have I not lock’d up in any chest, / Save where thou art not, though I feel thou art, / Within the gentle closure of my breast.” The heart is the only ‘chest’ the speaker has, and it is uncertain even there."}, {"text": "In a locked chest in the speaker’s house.", "isCorrect": false, "rationale": "The speaker explicitly says he has NOT locked the beloved in a chest — only in his heart, and even that is uncertain."}, {"text": "In a portrait kept under lock and key.", "isCorrect": false, "rationale": "The portrait is not mentioned in this sonnet; the conceit is about the heart."}]}, {"question": "The phrase “at pleasure thou mayst come and part” (line 14) suggests:", "options": [{"text": "The beloved is imprisoned and has no freedom.", "isCorrect": false, "rationale": "The phrase expresses the opposite — the beloved moves freely in and out of the speaker’s heart."}, {"text": "The beloved comes and goes freely from the speaker’s heart, which is not a secure lock at all.", "isCorrect": true, "rationale": "The very openness of the heart as a lock — the beloved can leave at will — is what makes it no protection. It is more like an unlocked door than a secure chest."}, {"text": "The speaker encourages the beloved to travel and explore the world.", "isCorrect": false, "rationale": "The tone is anxious rather than encouraging; the freedom is a source of fear."}, {"text": "The beloved and speaker agree to part ways permanently.", "isCorrect": false, "rationale": "No permanent separation is chosen; the movement in and out is uncontrolled, not mutually agreed."}]}, {"question": "The couplet’s claim that “truth proves thievish for a prize so dear” means:", "options": [{"text": "Honest people become thieves when offered enough money.", "isCorrect": false, "rationale": "The “truth” here likely refers to the beloved’s fidelity or nature; it is not about money."}, {"text": "Even the beloved’s own truthful, irresistible nature may lure him away — the speaker fears the beloved’s very attractiveness will lead to theft of his affections.", "isCorrect": true, "rationale": "The paradox is that truth (faithfulness, goodness) cannot guard against being stolen — indeed, the beloved’s very worth makes him a prize that truth itself seems to steal. The beloved’s openness and value make him vulnerable."}, {"text": "The speaker accuses the beloved of lying and deceitful behavior.", "isCorrect": false, "rationale": "No accusation is made; the speaker fears external loss, not internal dishonesty."}, {"text": "Truth and honesty protect the beloved better than any lock.", "isCorrect": false, "rationale": "The couplet expresses fear even truth cannot protect him, not confidence in it."}]}, {"question": "The recurring image of locks, chests, bars, and wards in this sonnet creates what thematic effect?", "options": [{"text": "It celebrates the beloved’s freedom and mobility.", "isCorrect": false, "rationale": "The imagery is about containment and protection, not celebration of freedom."}, {"text": "It expresses the possessiveness and anxiety of love — the desire to secure what cannot be secured.", "isCorrect": true, "rationale": "The language of locks and safekeeping reveals a jealous, anxious love that wishes to contain the beloved as if he were a valuable jewel, while acknowledging the impossibility of truly doing so."}, {"text": "It describes the speaker’s successful protection of his household during his journey.", "isCorrect": false, "rationale": "The material possessions are successfully locked up; the failure is with the beloved alone."}, {"text": "It suggests the speaker is a wealthy merchant who travels for trade.", "isCorrect": false, "rationale": "The material detail is background; the speaker’s occupation is not the subject."}]}, {"question": "The phrase “most worthy comfort, now my greatest grief” (line 8) is an example of:", "options": [{"text": "Anaphora — the repetition of a phrase at the start of lines.", "isCorrect": false, "rationale": "Anaphora involves opening repetition across lines; this is a reversal within a single phrase."}, {"text": "Antithesis — the juxtaposition of opposite ideas within the same construction.", "isCorrect": true, "rationale": "Comfort and grief are placed in direct opposition within the same line, highlighting the paradox that the beloved, who is the speaker’s greatest joy when present, is also his greatest sorrow when absent."}, {"text": "Alliteration — consonant repetition.", "isCorrect": false, "rationale": "While some alliteration exists in the poem, the device here is the opposition of comfort and grief."}, {"text": "Simile — a comparison using ‘like’ or ‘as.’", "isCorrect": false, "rationale": "No explicit comparison with ‘like’ or ‘as’ is made."}]}, {"question": "What emotion primarily drives Sonnet XLVIII?", "options": [{"text": "Anger at the beloved for not writing during the separation.", "isCorrect": false, "rationale": "Anger at silence is not the concern; the emotion is possessive anxiety."}, {"text": "Jealous anxiety about the beloved’s vulnerability to temptation during the speaker’s absence.", "isCorrect": true, "rationale": "The entire poem — locking up valuables but being unable to lock up the beloved, fearing “vulgar thieves” — is driven by jealous, possessive worry that the beloved will be “stol’n.’"}, {"text": "Gratitude for the beloved’s faithfulness.", "isCorrect": false, "rationale": "No gratitude is expressed; the tone is anxious and fearful rather than grateful."}, {"text": "Calm philosophical acceptance of the inevitability of loss.", "isCorrect": false, "rationale": "The poem is not calm; it is emotionally unsettled."}]}, {"question": "What does the phrase “within the gentle closure of my breast” imply about the heart as a ‘chest’?", "options": [{"text": "The heart is a strong, impenetrable vault that will certainly keep the beloved safe.", "isCorrect": false, "rationale": "The very next line undermines this — the beloved can come and go at pleasure from the heart."}, {"text": "The heart is a gentle, open space rather than a locked strongbox — a warm but unreliable safeguard.", "isCorrect": true, "rationale": "“Gentle closure” contrasts with the “truest bars” and “sure wards” of the earlier locked chests. The heart is warm and loving but cannot prevent the beloved from leaving at will."}, {"text": "The heart is empty because the beloved has already left.", "isCorrect": false, "rationale": "The speaker says he ‘feels’ the beloved is there — the heart is not empty, just insecure."}, {"text": "The breast is the best possible container for love and the speaker is confident in it.", "isCorrect": false, "rationale": "The couplet undermines any such confidence with the fear of being ‘stol’n.’"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
