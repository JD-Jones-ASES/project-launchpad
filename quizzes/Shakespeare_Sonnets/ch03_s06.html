        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet VI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Sonnet VI directly follow from Sonnet V?", "options": [{"text": "Sonnet VI abandons the distillation metaphor and introduces an entirely new image of military defense.", "isCorrect": false, "rationale": "Sonnet VI opens by directly continuing the distillation metaphor from Sonnet V: “let not winter… deface, / In thee thy summer, ere thou be distill’d.”"}, {"text": "Sonnet VI picks up Sonnet V’s distillation metaphor in its first line and urgently applies it to the youth.", "isCorrect": true, "rationale": "The opening “Then let not winter’s ragged hand deface” continues directly from Sonnet V’s conclusion that distilled flowers survive winter; now the youth is urged to distill himself (have children) before winter (age) destroys him."}, {"text": "Sonnet VI introduces the sun metaphor that Sonnet V had been building toward.", "isCorrect": false, "rationale": "The sun metaphor belongs to Sonnet VII; Sonnet VI extends Sonnet V’s distillation/flower imagery."}, {"text": "Sonnet VI contradicts Sonnet V by arguing that summer’s beauty cannot be preserved in any form.", "isCorrect": false, "rationale": "Sonnet VI is optimistic, building on Sonnet V’s solution (distillation = reproduction) rather than contradicting it."}], "id": "q01"}, {"question": "What does “make sweet some vial” mean?", "options": [{"text": "Brew a medicinal potion to extend one’s life.", "isCorrect": false, "rationale": "Medicine is not the image; the vial is a perfume bottle, extending the distillation metaphor from Sonnet V."}, {"text": "Fill a vial (like a perfume bottle) with one’s essence by having a child — continuing the distillation metaphor.", "isCorrect": true, "rationale": "The “vial” is from Sonnet V’s “liquid prisoner pent in walls of glass”; here the youth is urged to fill such a vial with his “beauty’s treasure” by reproducing."}, {"text": "Write sweet poetry and dedicate it to the youth’s future descendants.", "isCorrect": false, "rationale": "Poetry is not the solution offered in Sonnet VI; biological reproduction is."}, {"text": "Choose a sweet-natured woman as a spouse.", "isCorrect": false, "rationale": "While marriage is implied, “make sweet some vial” specifically continues the distillation metaphor, not marital advice."}], "id": "q02"}, {"question": "What is meant by “that use is not forbidden usury, / Which happies those that pay the willing loan”?", "options": [{"text": "Lending money at interest is acceptable as long as both parties benefit from the transaction.", "isCorrect": false, "rationale": "While usury was a fraught topic in Elizabethan England, the “usury” here is metaphorical; the “loan” is beauty given through reproduction."}, {"text": "Reproducing (using beauty to create children) is a permissible and beneficial form of “usury” because it makes both the parent and the child happy.", "isCorrect": true, "rationale": "Usury (charging interest) was often condemned, but Shakespeare argues that beauty’s “use” (reproduction) is permissible because it benefits all parties: parent, child, and the world."}, {"text": "Paying taxes willingly earns forgiveness for past financial crimes.", "isCorrect": false, "rationale": "Taxation is not the subject; the “willing loan” is the joyful act of having children."}, {"text": "The youth is forgiven for hoarding beauty if he later repents.", "isCorrect": false, "rationale": "Forgiveness is not offered; the argument is that reproduction is actively good, not merely pardonable."}], "id": "q03"}, {"question": "What does Shakespeare mean by “ten times happier, be it ten for one”?", "options": [{"text": "Ten children would make the youth ten times happier than one child.", "isCorrect": true, "rationale": "Shakespeare playfully extends the financial interest metaphor: if one child is a return on beauty’s investment, ten children are ten times the return — ten times the happiness, ten times the perpetuation of the youth’s beauty."}, {"text": "The youth should invest money at a ten-percent interest rate.", "isCorrect": false, "rationale": "The ten-for-one ratio is a metaphor for multiple children, not a financial interest rate."}, {"text": "Ten years of happiness outweigh a single year of sorrow.", "isCorrect": false, "rationale": "No comparison of years is made; “ten for one” refers to ten children reproducing the one parent’s beauty."}, {"text": "The youth’s ten friends are all happier than he is because they are married.", "isCorrect": false, "rationale": "No group of friends is invoked; the ten is hypothetical, describing multiplied children."}], "id": "q04"}, {"question": "What does the rhetorical question “Then what could death do if thou shouldst depart, / Leaving thee living in posterity?” argue?", "options": [{"text": "Death is powerless if the youth has left a living version of himself in children.", "isCorrect": true, "rationale": "If the youth lives on in posterity (children who inherit his beauty), death has no dominion over him — his beauty survives and flourishes even after he is gone."}, {"text": "Death is inevitable and cannot be resisted, so the youth should accept it gracefully.", "isCorrect": false, "rationale": "The argument is the opposite of resignation: if the youth reproduces, death’s power is effectively neutralized."}, {"text": "Death will be kind to the youth if he has led a virtuous life.", "isCorrect": false, "rationale": "Moral virtue is not the criterion; biological perpetuation is. Death is defeated by posterity, not virtue."}, {"text": "Posterity will remember the youth even if he leaves no children.", "isCorrect": false, "rationale": "Literary or historical memory is not the solution here; “living in posterity” means literally living on in children."}], "id": "q05"}, {"question": "What does the couplet “Be not self-will’d, for thou art much too fair / To be death’s conquest and make worms thine heir” mean?", "options": [{"text": "The youth should not be stubborn and self-willed; he is too beautiful to let worms inherit his beauty by leaving no child.", "isCorrect": true, "rationale": "The couplet combines a plea (don’t be self-willed/stubborn) with a vivid insult to the alternative: if the youth dies without children, his only heirs are worms (who literally inherit his body in the grave)."}, {"text": "Death will come for everyone, but the beautiful are mourned more deeply.", "isCorrect": false, "rationale": "The couplet is not about the depth of mourning but about the obscenity of letting worms be the youth’s heirs."}, {"text": "The youth should write a will naming his friends as beneficiaries.", "isCorrect": false, "rationale": "Legal wills are not the subject; “heir” here is used in the biological sense — a child who inherits beauty, or worms that inherit the body."}, {"text": "Being conquered by death is honorable for a brave soldier.", "isCorrect": false, "rationale": "Military honor is not the frame; death’s “conquest” is a humiliation, made worse by leaving worms as heirs."}], "id": "q06"}, {"question": "What literary device is “winters’ ragged hand”?", "options": [{"text": "Simile comparing winter to a rough-handed servant.", "isCorrect": false, "rationale": "No “like” or “as” is used; this is a personification."}, {"text": "Personification giving winter a physical hand capable of defacing the youth’s beauty.", "isCorrect": true, "rationale": "Winter is given a “ragged hand” (rough, tattered, destructive) that can literally “deface” (disfigure) the youth’s beauty, making the abstract force of aging viscerally physical."}, {"text": "Alliteration linking “ragged” and “hand” by repeated consonant sounds.", "isCorrect": false, "rationale": "Alliteration requires the same initial consonant; r- and h- are different, so no alliteration is present here."}, {"text": "Apostrophe addressing winter directly as if it were a person.", "isCorrect": false, "rationale": "Winter is not addressed directly in the second person; the youth is addressed. The device is personification, not apostrophe."}], "id": "q07"}, {"question": "What does “self-kill’d” mean in line 4?", "options": [{"text": "Suicide by literal means.", "isCorrect": false, "rationale": "No literal self-harm is described; “self-kill’d” means beauty destroying itself by not reproducing."}, {"text": "Beauty destroyed by its own failure to reproduce — self-annihilation through selfishness.", "isCorrect": true, "rationale": "If the youth hoards his beauty and leaves no child, the beauty dies of its own self-containment — it is “self-kill’d,” murdered by the very selfishness that was meant to preserve it."}, {"text": "A person who takes his own life out of excessive pride.", "isCorrect": false, "rationale": "While self-pride is implicated, “self-kill’d” refers to beauty’s self-destruction through non-reproduction, not the act of suicide."}, {"text": "The youth’s decision to isolate himself from society.", "isCorrect": false, "rationale": "Social isolation is not the specific meaning; the term refers to beauty dying without issue."}], "id": "q08"}, {"question": "How does the image of the youth’s “summer” being distilled relate to the biological act of reproduction?", "options": [{"text": "Summer’s distillation is a metaphor for the youth capturing his memories in a diary before he grows old.", "isCorrect": false, "rationale": "Memory-writing is not the metaphor; distillation represents the biological transfer of beauty from parent to child."}, {"text": "Just as summer’s flowers are distilled into perfume that survives winter, the youth’s beauty is “distilled” into children who carry it past the winter of his death.", "isCorrect": true, "rationale": "The distillation metaphor from Sonnet V is the backbone of Sonnet VI’s argument: making a child is making perfume from the flower of youth, ensuring the essence survives even when the flower perishes."}, {"text": "Distillation represents the youth’s moral purification through suffering and difficulty.", "isCorrect": false, "rationale": "Moral purification is not the frame; the distillation is explicitly about biological reproduction."}, {"text": "Summer is distilled into autumn fruits, suggesting that the youth should enjoy his prime fully before settling down.", "isCorrect": false, "rationale": "Autumn is not mentioned; the distillation goes directly from summer (youth) to the vial (child), bypassing autumn."}], "id": "q09"}, {"question": "What cumulative effect do the ten-children fantasy and the worm-heir threat create together?", "options": [{"text": "They create a tonal inconsistency that undermines the poem’s argument.", "isCorrect": false, "rationale": "The contrast is deliberate and rhetorically effective, not inconsistent; both carrot and stick serve the same persuasive end."}, {"text": "They bracket the argument between an appealing reward (multiply yourself ten times over) and a repulsive threat (let worms be your only heirs), maximizing the persuasive pressure on the youth.", "isCorrect": true, "rationale": "Shakespeare uses both positive incentive (“ten of thine ten times refigur’d thee”) and negative deterrent (“make worms thine heir”) to press the youth from both sides, making reproduction seem both desirable and urgently necessary."}, {"text": "They reveal that Shakespeare is genuinely angry with the youth and has lost patience.", "isCorrect": false, "rationale": "The tone is urgent but not angry; the ten-children fantasy is playful, and even the worm-heir image is witty rather than hostile."}, {"text": "They show that Shakespeare values quantity of children over quality of parenting.", "isCorrect": false, "rationale": "Ten children is a rhetorical hyperbole, not a serious prescription; quality of parenting is not the subject."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
