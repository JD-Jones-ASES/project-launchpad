    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CLI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradox about Love and conscience opens Sonnet CLI?", "options": [{"text": "Love is wise but chooses to ignore conscience", "isCorrect": false, "rationale": "The paradox is about knowledge, not a choice to ignore."}, {"text": "Love is too young to know conscience, yet conscience is born of love", "isCorrect": true, "rationale": "'Love is too young to know what conscience is, / Yet who knows not conscience is born of love?' — love claims ignorance of what it actually generates."}, {"text": "Love is too old to care about conscience any longer", "isCorrect": false, "rationale": "Age and abandonment of conscience is not the paradox; youth and ignorance are."}, {"text": "Conscience is stronger than love and always overcomes it", "isCorrect": false, "rationale": "The sonnet argues the opposite — that love bypasses conscience."}], "id": "q01"}, {"question": "What does the speaker mean by 'urge not my amiss'?", "options": [{"text": "He asks her not to press him to confess his wrongdoing", "isCorrect": true, "rationale": "'Then, gentle cheater, urge not my amiss' — he calls her a 'gentle cheater' and asks her not to press him about his moral failings."}, {"text": "He instructs her not to miss their next meeting", "isCorrect": false, "rationale": "'Amiss' means wrongdoing/fault, not a missed appointment."}, {"text": "He asks her not to exaggerate his small errors", "isCorrect": false, "rationale": "Exaggeration is not his point; he asks her not to raise the matter of his faults at all."}, {"text": "He denies having any failings for her to press him about", "isCorrect": false, "rationale": "He does not deny faults; he asks her not to urge them, since doing so implicates her too."}], "id": "q02"}, {"question": "Why does the speaker tell her not to urge his faults?", "options": [{"text": "Because doing so would shame him publicly", "isCorrect": false, "rationale": "Public shaming is not the reason; the logic is that she is equally guilty."}, {"text": "Because if she presses his guilt, she proves herself guilty too — she betrayed him as he betrayed his nobler nature", "isCorrect": true, "rationale": "'Lest guilty of my faults thy sweet self prove: / For, thou betraying me, I do betray / My nobler part to my gross body's treason.'"}, {"text": "Because his faults are too numerous to list fairly", "isCorrect": false, "rationale": "The number of faults is not the reason; the mutual implication of guilt is."}, {"text": "Because his faults are her virtues seen from a different angle", "isCorrect": false, "rationale": "Relativism about virtue and fault is not the argument here."}], "id": "q03"}, {"question": "In lines 7-10, what is the 'nobler part' the speaker betrays?", "options": [{"text": "His poetic talent, which he sacrifices for her", "isCorrect": false, "rationale": "Poetic talent is not the 'nobler part'; the context contrasts soul with body."}, {"text": "His soul or spiritual/rational nature, which he betrays to the gross body's physical desire", "isCorrect": true, "rationale": "'My soul doth tell my body that he may / Triumph in love; flesh stays no farther reason' — the nobler soul is overridden by the flesh."}, {"text": "His loyalty to the Fair Youth, which he abandons for the Dark Lady", "isCorrect": false, "rationale": "The Fair Youth is not mentioned here; the betrayal is internal soul vs. body."}, {"text": "His social honor, which he surrenders for a disreputable affair", "isCorrect": false, "rationale": "Social honor is not the 'nobler part'; the contrast is explicitly soul vs. gross body."}], "id": "q04"}, {"question": "The bawdy wordplay in lines 11-14 ('rising at thy name,' 'stand in thy affairs,' 'fall by thy side') primarily refers to:", "options": [{"text": "Military service — he rises, stands, and falls as a soldier", "isCorrect": false, "rationale": "Military service is not the subtext; the sexual double meanings are central to the sonnet's argument."}, {"text": "Sexual arousal and the sexual act — the body's autonomous response to her name", "isCorrect": true, "rationale": "These terms carry unmistakable sexual double meanings: the body 'rises,' 'stands,' and 'falls' in sexual terms, acting as her 'poor drudge' without needing rational consent."}, {"text": "Social standing — he rises in society when she names him, and falls when she rejects him", "isCorrect": false, "rationale": "Social status is not the primary register; the physical/sexual meanings are foremost."}, {"text": "Rhetorical posture — he takes a stance on her behalf and is defeated by her", "isCorrect": false, "rationale": "Rhetorical debate is not the subtext; physical arousal is."}], "id": "q05"}, {"question": "What does the speaker mean by calling his body her 'poor drudge'?", "options": [{"text": "He literally works as her servant to earn her favor", "isCorrect": false, "rationale": "Literal servitude is not the meaning; the body serves her sexual purposes without conscious will."}, {"text": "His body is a willing slave to her desires, bypassing his nobler soul's authority", "isCorrect": true, "rationale": "'He is contented thy poor drudge to be' — the body, having risen at her name, willingly serves her as a drudge, independently of the soul's judgment."}, {"text": "He has wasted his talents in service to her vanity", "isCorrect": false, "rationale": "Wasted talent is not the meaning of 'poor drudge'; bodily servitude to desire is."}, {"text": "His emotions are exhausted from attending to her every whim", "isCorrect": false, "rationale": "Emotional exhaustion is not the sense; the body's physical service is the subject."}], "id": "q06"}, {"question": "The couplet 'No want of conscience hold it that I call / Her love, for whose dear love I rise and fall' makes what final move?", "options": [{"text": "He confesses that his actions are indeed a failure of conscience", "isCorrect": false, "rationale": "He explicitly argues the opposite — 'no want of conscience' — defending himself against the charge."}, {"text": "He defends calling lust 'love' by claiming that since the body acts through love (however base), no failure of conscience is really involved", "isCorrect": true, "rationale": "The argument is ironic and sophisticated: he redefines the body's response as love, then claims conscience need not apply since love by definition precedes conscience."}, {"text": "He admits his conscience is dead and no longer matters to him", "isCorrect": false, "rationale": "He does not dismiss conscience; he argues with some irony that it doesn't apply in this case."}, {"text": "He prays for forgiveness for his lack of conscience", "isCorrect": false, "rationale": "Prayer and confession are not the mode of the couplet; it is a rhetorical defense."}], "id": "q07"}, {"question": "Which theme does Sonnet CLI most explicitly address?", "options": [{"text": "The speaker's regret over abandoning the Fair Youth", "isCorrect": false, "rationale": "The Fair Youth does not appear; CLI is entirely about the speaker's internal soul-body conflict and his relationship with the Dark Lady."}, {"text": "The body's autonomous rebellion against the soul's moral authority in matters of lust", "isCorrect": true, "rationale": "The central drama is the soul's authority being overridden by the flesh, which rises and falls at the Dark Lady's name independently of reason or conscience."}, {"text": "The immortalizing power of love poetry", "isCorrect": false, "rationale": "Immortality through verse is not a theme here; the sonnet is about carnal compulsion."}, {"text": "The speaker's wish to reform himself and return to virtue", "isCorrect": false, "rationale": "Reformation is not the aim; he ends by defending his behavior through sophisticated (if ironic) argument."}], "id": "q08"}, {"question": "What is the tone of Sonnet CLI compared to the anguished sonnets immediately preceding it?", "options": [{"text": "More anguished and desperate than CXLIX-CL", "isCorrect": false, "rationale": "CLI is more wry and self-amused than the raw anguish of the preceding sonnets."}, {"text": "More wryly self-aware and darkly comic — the speaker notes his body's betrayal with ironic detachment", "isCorrect": true, "rationale": "The body-as-drudge conceit and the punning couplet give CLI a bawdy, self-aware humor absent from the rawer anguish of CXLVII-CXLIX."}, {"text": "More spiritually earnest and repentant", "isCorrect": false, "rationale": "Repentance is the opposite of the defensive argument in CLI."}, {"text": "More coldly analytic and devoid of emotion", "isCorrect": false, "rationale": "Cold detachment is not the tone; ironic wit and self-awareness are."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
