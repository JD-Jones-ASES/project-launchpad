    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker claim the beloved’s bosom contains?", "options": [{"text": "The speaker’s unfinished verses and secret letters", "isCorrect": false, "rationale": "No written materials are described as contained in the bosom; the content is more profound—hearts and love."}, {"text": "All the hearts of those whom the speaker once loved, now presumed dead but found living there", "isCorrect": true, "rationale": "Lines 1–4: “Thy bosom is endeared with all hearts, / Which I by lacking have supposed dead”—the beloved gathers within him all the loves the speaker thought lost to death."}, {"text": "The speaker’s own heart, deposited there as a gift of love", "isCorrect": false, "rationale": "The speaker’s heart-exchange is the conceit of Sonnet XXII; in XXXI it is the hearts of all past loves that inhabit the beloved’s bosom."}, {"text": "Religious devotion and piety that the speaker once directed to God", "isCorrect": false, "rationale": "Religious language is used (“holy,” “obsequious,” “religious love”), but the contents of the bosom are personal loves, not transferred piety."}], "id": "q01"}, {"question": "What does “obsequious tear” mean in line 7?", "options": [{"text": "Excessively sorrowful tears that annoy others", "isCorrect": false, "rationale": "The modern meaning of “obsequious” (fawning) is not the primary meaning here."}, {"text": "Funeral or mourning tears, shed as a duty to the dead", "isCorrect": true, "rationale": "“Obsequious” comes from “obsequy” (funeral rites); obsequious tears are those shed at funerals or in mourning—tears of religious devotion paid to the dead as a debt of honor."}, {"text": "Tears that embarrass the speaker because they show weakness", "isCorrect": false, "rationale": "No embarrassment is expressed; the tears are treated as holy and appropriate tributes."}, {"text": "Secretly shed tears that the speaker hid from others", "isCorrect": false, "rationale": "Secrecy is not the meaning; the word’s root is in funeral rites."}], "id": "q02"}, {"question": "What surprising claim does the speaker make about those friends he thought were dead?", "options": [{"text": "They were never truly his friends and he was deceived", "isCorrect": false, "rationale": "No deception is claimed; the discovery is positive—his friends are not dead but preserved."}, {"text": "They are not truly dead but have been hidden within the beloved all along", "isCorrect": true, "rationale": "Lines 9–10: they are “but things remov’d that hidden in thee lie”—the beloved is the repository of all past loves, which are not lost but stored in him."}, {"text": "They have been reincarnated as new lovers in the speaker’s life", "isCorrect": false, "rationale": "Reincarnation is not the claim; the friends are preserved, not reborn in new forms."}, {"text": "Their deaths were a test of the speaker’s fidelity to the beloved", "isCorrect": false, "rationale": "No test is implied; the revelation is about the beloved’s mysterious capacity to hold all loves."}], "id": "q03"}, {"question": "What is the central metaphor of Sonnet XXXI?", "options": [{"text": "The beloved as a garden in which all beautiful things grow", "isCorrect": false, "rationale": "No garden metaphor appears; the central image is of the beloved as a repository or grave."}, {"text": "The beloved as a living grave or treasury where all past loves and lost friends are preserved", "isCorrect": true, "rationale": "“Thou art the grave where buried love doth live”—the beloved is paradoxically a grave (place of the dead) that gives life, a treasury where all past loves are preserved in him."}, {"text": "The beloved as a mirror reflecting the faces of all who love him", "isCorrect": false, "rationale": "A mirror metaphor does not govern this sonnet; the grave/treasury metaphor is central."}, {"text": "The beloved as a library containing all the books the speaker has ever read", "isCorrect": false, "rationale": "No library metaphor is used; the beloved is a grave and treasury of past loves."}], "id": "q04"}, {"question": "What does “hung with the trophies of my lovers gone” mean?", "options": [{"text": "The beloved adorns himself with jewelry given by past lovers", "isCorrect": false, "rationale": "Physical jewelry is not the meaning; “trophies” are memorial tokens or relics."}, {"text": "The beloved’s bosom is decorated with the memorial remnants of all the speaker’s past loves", "isCorrect": true, "rationale": "Like a tomb hung with memorial trophies (traditional funeral emblems), the beloved’s bosom holds the relics and love of all those past loves, now “one” in him."}, {"text": "The beloved has won trophies in competitions, each named for a past friend", "isCorrect": false, "rationale": "Athletic or competitive trophies are not the meaning; “trophies” here are memorial tokens in the funeral tradition."}, {"text": "The beloved is burdened by the weight of the speaker’s excessive attention", "isCorrect": false, "rationale": "No burden is expressed; the trophies are signs of honor and preservation, not weight."}], "id": "q05"}, {"question": "How does the couplet summarize the argument of Sonnet XXXI?", "options": [{"text": "The speaker declares that all his past loves were inferior to his love for the beloved", "isCorrect": false, "rationale": "No ranking of loves is made; the couplet confirms the beloved contains them all."}, {"text": "The images of past loves are all found in the beloved, who now holds the entirety of the speaker’s love", "isCorrect": true, "rationale": "“Their images I lov’d, I view in thee, / And thou, all they, hast all the all of me”—the beloved encompasses all past loves, so the speaker’s total self is given to him."}, {"text": "The speaker resolves to forget all past loves and dedicate himself only to the beloved", "isCorrect": false, "rationale": "No deliberate forgetting is required; the beloved absorbs and preserves them rather than replacing them."}, {"text": "The speaker mourns that he cannot love the beloved as fully as he loved those who are dead", "isCorrect": false, "rationale": "The opposite: the beloved receives the full measure of all the speaker’s love, concentrated in him."}], "id": "q06"}, {"question": "The paradox “thou art the grave where buried love doth live” is an example of:", "options": [{"text": "Simile, comparing the beloved to a grave using “like”", "isCorrect": false, "rationale": "No “like” or “as” is used; this is a direct metaphoric identification, not a simile."}, {"text": "Oxymoron, combining the contradictory ideas of burial (death) and life", "isCorrect": true, "rationale": "A grave is a place of death, yet “buried love doth live” there—the direct contradiction of burial and life in the same clause is an oxymoronic paradox."}, {"text": "Hyperbole, exaggerating the beloved’s emotional capacity", "isCorrect": false, "rationale": "While the claim is extraordinary, the specific device is the contradiction of death and life in the same image—an oxymoron."}, {"text": "Personification, giving death human qualities", "isCorrect": false, "rationale": "Death is not the personified agent here; the beloved is equated with a grave, making it a metaphor with oxymoronic content."}], "id": "q07"}, {"question": "The phrase “due of many now is thine alone” means:", "options": [{"text": "The beloved owes the speaker repayment for multiple favors", "isCorrect": false, "rationale": "The debt runs from the speaker to the beloved, not the reverse."}, {"text": "The love previously owed to many individuals is now fully owed to the beloved alone, who has absorbed them all", "isCorrect": true, "rationale": "What was previously divided among many loves (each owed a “due” of love) is now entirely concentrated in the beloved, who contains them all within him."}, {"text": "The beloved deserves only as much love as each past friend separately received", "isCorrect": false, "rationale": "The point is concentration, not distribution; the total is now the beloved’s alone."}, {"text": "The speaker has no other debts or obligations in life except his love for the beloved", "isCorrect": false, "rationale": "The “due” is specifically the love-debt previously owed to many, now concentrated in one."}], "id": "q08"}, {"question": "What religious vocabulary in Sonnet XXXI reinforces the quasi-sacred nature of the beloved?", "options": [{"text": "“Eternal,” “hemmed,” and “rondure”", "isCorrect": false, "rationale": "These words are from Sonnet XXI; in XXXI the religious language is different."}, {"text": "“Holy,” “obsequious,” and “religious love”", "isCorrect": true, "rationale": "Line 7: “How many a holy and obsequious tear / Hath dear religious love stol’n from mine eye”—the mourning for past friends is framed as a religious duty, elevating the beloved’s role to something sacred."}, {"text": "“Vassalage,” “lord,” and “duty”", "isCorrect": false, "rationale": "This feudal vocabulary belongs to Sonnet XXVI; the religious language of XXXI is specifically funereal."}, {"text": "“Pilgrimage,” “zealous,” and “sightless”", "isCorrect": false, "rationale": "This religious vocabulary belongs to Sonnet XXVII; XXXI uses funeral-rite language."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
