<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the key argument about beauty in the opening of Sonnet LIV?", "options": [{"text": "Beauty is the same whether or not it is accompanied by virtue.", "isCorrect": false, "rationale": "The poem argues the opposite — truth (virtue/faithfulness) makes beauty more beautiful."}, {"text": "Beauty is made more beautiful by the addition of truth (virtue, faithfulness).", "isCorrect": true, "rationale": "Lines 1–2: “O! how much more doth beauty beauteous seem / By that sweet ornament which truth doth give.” Truth is an ornament that enhances beauty."}, {"text": "Beauty is only skin deep and has no lasting value.", "isCorrect": false, "rationale": "The poem argues for beauty enhanced by truth, not for beauty’s worthlessness."}, {"text": "Beauty is most powerful when it stands alone, without moral qualities.", "isCorrect": false, "rationale": "The poem argues that moral truth is what gives beauty its deepest value."}]}, {"question": "What is the “canker bloom” (line 5)?", "options": [{"text": "A rose that has been attacked by disease or insects.", "isCorrect": false, "rationale": "While ‘canker’ can suggest disease, ‘canker bloom’ here refers to a wild or dog-rose that has the color but not the scent of the true rose."}, {"text": "A wild or dog-rose that has the same color as the true rose but lacks its perfume.", "isCorrect": true, "rationale": "“The canker blooms have full as deep a dye / As the perfum’d tincture of the roses” — visually indistinguishable from the rose but without its fragrance. This is the key contrast of the poem."}, {"text": "A flower that blooms only in winter when the true rose cannot grow.", "isCorrect": false, "rationale": "No seasonal distinction is made between canker blooms and roses; the contrast is about scent, not season."}, {"text": "A poison flower used to contrast with the healthy rose.", "isCorrect": false, "rationale": "Poison is not the implication; the canker bloom’s deficiency is purely in lacking fragrance."}]}, {"question": "The phrase “masked buds” (line 10) refers to:", "options": [{"text": "Flowers that have been deliberately hidden from view.", "isCorrect": false, "rationale": "Concealment by human agency is not the sense; the buds are naturally closed."}, {"text": "Flower buds that are still closed — their beauty concealed until summer’s breath opens them.", "isCorrect": true, "rationale": "“Masked” means covered or concealed; summer’s breath “discloses” (opens) the buds, revealing their appearance. The canker blooms open to display color but still lack scent."}, {"text": "Roses wearing masks at a costume festival.", "isCorrect": false, "rationale": "No human festival is described; the image is botanical."}, {"text": "Buds that are hidden beneath the surface of the soil.", "isCorrect": false, "rationale": "The buds are on the plant; the ‘mask’ is the closed petals before blooming."}]}, {"question": "Why do canker blooms “live unwoo’d, and unrespected fade” (line 12)?", "options": [{"text": "Because they grow in remote locations where no one can find them.", "isCorrect": false, "rationale": "Location is not the reason; the problem is the absence of fragrance."}, {"text": "Because they have only visual beauty without the true ornament of fragrance, so they attract no admirer and die without tribute.", "isCorrect": true, "rationale": "The canker blooms have the look of roses but lack the scent; since their “virtue only is their show,” they are unwooed and fade unlamented — all surface, no inner truth."}, {"text": "Because they are considered weeds and are always removed before they can bloom fully.", "isCorrect": false, "rationale": "No gardener’s removal is described; their fate is to fade naturally, unnoticed."}, {"text": "Because they bloom too early in the season before anyone is looking for flowers.", "isCorrect": false, "rationale": "Timing is not the issue; the deficiency is internal — lack of scent."}]}, {"question": "The phrase “sweet deaths” (line 14) is an example of:", "options": [{"text": "Simile — comparing death to something sweet.", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ comparison is made."}, {"text": "Oxymoron — pairing the contradictory qualities of sweetness and death.", "isCorrect": true, "rationale": "“Sweet deaths” puts sweetness and death together paradoxically: the roses’ dying is not mere loss but the origin of perfume (attar of roses), making death productive and fragrant."}, {"text": "Alliteration — the repetition of the ‘s’ sound.", "isCorrect": false, "rationale": "While the ‘s’ sounds recur, the primary device is oxymoron — the pairing of opposites."}, {"text": "Hyperbole — exaggerating the beauty of rose scent.", "isCorrect": false, "rationale": "The death of roses to produce perfume is not exaggerated; it is a literal reference to the distillation of rose oil."}]}, {"question": "What happens to the sweetest odours when the rose dies?", "options": [{"text": "The scent disappears entirely with the flower.", "isCorrect": false, "rationale": "The poem argues the opposite — rose death produces perfume."}, {"text": "The sweetest odours are ‘made’ from the sweet deaths of roses — perfume is distilled from the dying flower.", "isCorrect": true, "rationale": "“Of their sweet deaths are sweetest odours made.” Rose oil and attar are distilled from rose petals; the flower’s death produces its most lasting gift."}, {"text": "The scent is absorbed by the canker blooms nearby.", "isCorrect": false, "rationale": "No absorption by canker blooms is described."}, {"text": "The odour rises to heaven and returns as divine fragrance.", "isCorrect": false, "rationale": "No spiritual ascent is described; the process is botanical and alchemical."}]}, {"question": "In the couplet, the speaker applies the rose/canker analogy to the beloved. “By verse distills your truth” most nearly means:", "options": [{"text": "The verse corrects the beloved’s falsehoods.", "isCorrect": false, "rationale": "No falsehoods are attributed to the beloved; ‘truth’ here means inner virtue or genuine worth."}, {"text": "Poetry preserves and concentrates the beloved’s inner truth/virtue, just as perfume is distilled from the dying rose.", "isCorrect": true, "rationale": "When the beloved’s beauty ‘shall vade’ (fade), verse will ‘distill’ his truth — extract and preserve his essential virtue in concentrated form, just as rose-distillation produces lasting perfume."}, {"text": "The speaker’s verse reveals truths about the beloved that the beloved himself does not know.", "isCorrect": false, "rationale": "Revelation of hidden truths is not the sense; distillation preserves what is already there."}, {"text": "The verse is written using truth and accuracy as its main principle.", "isCorrect": false, "rationale": "Accuracy of composition is not the subject; the metaphor is about preservation through distillation."}]}, {"question": "The word “vade” in the couplet (line 15) most nearly means:", "options": [{"text": "To advance or progress.", "isCorrect": false, "rationale": "Vade is an archaic word for fading or passing away, not advancing."}, {"text": "To fade away; to pass from existence.", "isCorrect": true, "rationale": "“When that shall vade” means when the beloved’s youth and beauty shall fade — archaic form of ‘fade.’ The verse will preserve his truth even after beauty fades."}, {"text": "To be validated or confirmed.", "isCorrect": false, "rationale": "No validation meaning is present; the word means to fade."}, {"text": "To invade or overcome.", "isCorrect": false, "rationale": "Latin ‘vadere’ can mean to go; but in this context ‘vade’ means to fade away."}]}, {"question": "The primary analogy of the poem — rose versus canker bloom — argues that:", "options": [{"text": "Physical beauty is more important than moral virtue.", "isCorrect": false, "rationale": "The poem argues the opposite: inner virtue (scent/truth) is what distinguishes the rose from the canker."}, {"text": "Inner virtue (truth, fragrance) is what separates genuine beauty from mere attractive appearance.", "isCorrect": true, "rationale": "Canker blooms have the same color as roses but lack scent; they are beautiful in appearance but empty within. The rose’s scent is its truth. Applied to the beloved, this argues that his inner virtue makes his beauty genuine."}, {"text": "Roses are beautiful only for a short time and are therefore inferior to lasting things.", "isCorrect": false, "rationale": "Roses are not found inferior; they are the poem’s positive model."}, {"text": "Summer is the only time when beauty is truly visible.", "isCorrect": false, "rationale": "Summer is the setting, but the poem’s argument is about inner versus outer beauty."}]}, {"question": "How does Sonnet LIV connect to the larger argument of the immortality sonnets (e.g., Sonnet LV)?", "options": [{"text": "It argues that physical beauty alone is sufficient to be remembered.", "isCorrect": false, "rationale": "Physical beauty alone is exactly what the canker bloom represents — sufficient for appearance but not for lasting tribute."}, {"text": "It establishes that it is the beloved’s inner truth (not merely beauty) that poetry will preserve — preparing the ground for the claim that verse outlasts monuments.", "isCorrect": true, "rationale": "LIV’s argument that verse ‘distills’ truth from beauty leads directly into LV’s claim that verse will outlive marble and gilded monuments. The beloved’s truth is preserved through verse."}, {"text": "It suggests the beloved has already died and is now remembered only in fragrance.", "isCorrect": false, "rationale": "The beloved is alive; the couplet projects toward a future when beauty shall vade."}, {"text": "It introduces the rival poet who will compete with the speaker to preserve the beloved.", "isCorrect": false, "rationale": "The rival poet is a concern of other sonnets; LIII–LV do not involve him."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
