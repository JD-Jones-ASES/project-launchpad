<head>

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What future scenario does the speaker contemplate in Sonnet XLIX?", "options": [{"text": "The speaker imagines the beloved growing old and less beautiful.", "isCorrect": false, "rationale": "The beloved’s aging is not the concern; the speaker imagines a change in the beloved’s feeling."}, {"text": "The speaker anticipates a time when the beloved will no longer love him and will coldly pass him by.", "isCorrect": true, "rationale": "The poem is built around “against that time” — preparation for the day when the beloved frowns on the speaker’s defects, has totaled up the account of love, and passes as a stranger."}, {"text": "The speaker plans his departure on a long journey away from the beloved.", "isCorrect": false, "rationale": "Journey is a motif in Sonnets L and LI; here the speaker contemplates rejection, not travel."}, {"text": "The speaker imagines the beloved dying young.", "isCorrect": false, "rationale": "Death of the beloved is not the scenario; emotional withdrawal is."}], "id": "q01"}, {"question": "The phrase “against that time” is repeated three times (lines 1, 7, 11). This is an example of:", "options": [{"text": "Epistrophe — repetition at the end of successive clauses.", "isCorrect": false, "rationale": "Epistrophe is end-repetition; this phrase opens each major clause."}, {"text": "Anaphora — repetition of a phrase at the beginning of successive clauses, creating a sense of dread buildup.", "isCorrect": true, "rationale": "The three-fold “against that time” uses anaphora to accumulate the weight of anticipated rejection, each iteration adding another aspect of the feared future."}, {"text": "Asyndeton — omitting conjunctions to speed the pace.", "isCorrect": false, "rationale": "The repeated phrase slows and weights the poem rather than speeding it."}, {"text": "Alliteration — repetition of initial consonant sounds.", "isCorrect": false, "rationale": "While ‘against’ and ‘that’ share no consonant, the device is anaphora, not alliteration."}], "id": "q02"}, {"question": "What does “that audit” (line 4) refer to?", "options": [{"text": "A financial audit of the speaker’s household accounts.", "isCorrect": false, "rationale": "The audit is metaphorical, applied to the beloved’s summing up of love."}, {"text": "The beloved’s final reckoning of the value of his love — the moment he tallies up whether the speaker deserves it.", "isCorrect": true, "rationale": "“When as thy love hath cast his utmost sum, / Call’d to that audit by advis’d respects” — the beloved is imagined as a bookkeeper who has totaled the accounts of love and found the speaker wanting."}, {"text": "God’s judgment of the speaker’s soul at the Last Day.", "isCorrect": false, "rationale": "While accounting imagery later appears in religious contexts in the sonnets, here it is specifically about the beloved’s withdrawal of love."}, {"text": "A legal document the beloved sends to end the relationship.", "isCorrect": false, "rationale": "No legal document is described; the audit is an internal reckoning by the beloved."}], "id": "q03"}, {"question": "The word “ensconce” (line 11) most nearly means:", "options": [{"text": "To expose openly to danger.", "isCorrect": false, "rationale": "Ensconce means the opposite — to shelter or fortify."}, {"text": "To shelter or establish securely in a position.", "isCorrect": true, "rationale": "“Do I ensconce me here” means the speaker takes up a fortified position — specifically within his own acknowledged unworthiness — as a kind of defensive posture."}, {"text": "To travel away on a journey.", "isCorrect": false, "rationale": "Travel is not the sense; the speaker is taking a stand or sheltering in place."}, {"text": "To write a legal document.", "isCorrect": false, "rationale": "Document-writing is not the sense; the word describes a defensive positioning."}], "id": "q04"}, {"question": "What position does the speaker “ensconce” himself in?", "options": [{"text": "The position of wronged innocent who has done nothing to deserve rejection.", "isCorrect": false, "rationale": "The speaker does not claim innocence; he shelters within acknowledgment of his own faults."}, {"text": "The position of self-acknowledged unworthiness, prepared to concede the beloved has just cause to leave.", "isCorrect": true, "rationale": "Lines 11–13: the speaker retreats into “the knowledge of mine own desert” and raises his own hand against himself to support the beloved’s legal reasons for departing."}, {"text": "The position of angry rejection, dismissing the beloved first.", "isCorrect": false, "rationale": "No anger or preemptive rejection appears; the speaker is sorrowfully accepting."}, {"text": "The position of hopeful expectation that the beloved will return.", "isCorrect": false, "rationale": "Hope is not expressed; the tone is one of resigned self-abnegation."}], "id": "q05"}, {"question": "The phrase “this my hand, against myself uprear” (line 13) means:", "options": [{"text": "The speaker physically threatens to harm himself.", "isCorrect": false, "rationale": "Physical self-harm is not the sense; the phrase is about legal testimony."}, {"text": "The speaker raises his own hand in testimony against himself — as if swearing in court that the beloved is right to leave.", "isCorrect": true, "rationale": "In Elizabethan legal practice, raising the hand signified oath-taking or testimony. The speaker testifies against himself, supporting the beloved’s case for departure."}, {"text": "The speaker writes a poem defending himself against the beloved’s criticism.", "isCorrect": false, "rationale": "No defense is offered; the speaker’s hand is raised against himself, not for himself."}, {"text": "The speaker waves farewell to the beloved as he departs.", "isCorrect": false, "rationale": "While farewell is emotionally implied, the legal sense of raising the hand in testimony is the primary meaning."}], "id": "q06"}, {"question": "The closing couplet (“To leave poor me thou hast the strength of laws, / Since why to love I can allege no cause”) expresses:", "options": [{"text": "Confidence that the beloved will not actually leave.", "isCorrect": false, "rationale": "No confidence is expressed; the couplet is the bleakest possible concession."}, {"text": "The speaker’s total self-abnegation: the beloved has every legal and rational right to stop loving him, and the speaker cannot argue otherwise.", "isCorrect": true, "rationale": "The beloved has “the strength of laws” to depart; the speaker can offer no reason why he should be loved. It is one of the most self-deflating couplets in the sequence."}, {"text": "The beloved’s actual departure and the speaker’s acceptance of it as final.", "isCorrect": false, "rationale": "The scenario is still anticipated, not yet actual; the couplet is a preemptive concession."}, {"text": "The speaker’s argument that love needs no rational justification.", "isCorrect": false, "rationale": "Ironically the opposite: the speaker says he can offer no rational cause for being loved, which makes the beloved’s legal right to leave unchallengeable."}], "id": "q07"}, {"question": "The legal vocabulary of Sonnet XLIX (audit, desert, reasons, strength of laws, allege, cause) suggests that the speaker treats love as:", "options": [{"text": "A religious covenant requiring divine sanction.", "isCorrect": false, "rationale": "Religion is not the framework here; the language is legal."}, {"text": "A contractual relationship in which each party must justify their position with reasons.", "isCorrect": true, "rationale": "The legal metaphor frames love as something that can be summed up, audited, and adjudicated. The speaker fears love has become subject to “advis’d respects” — rational, legalistic evaluation — rather than pure devotion."}, {"text": "A natural force like the weather that cannot be argued with.", "isCorrect": false, "rationale": "The poem is specifically about rational justification and legal rights, not natural forces."}, {"text": "A game with winners and losers governed by chance.", "isCorrect": false, "rationale": "Chance and games are not the metaphors employed."}], "id": "q08"}, {"question": "What is the speaker’s overall posture in Sonnet XLIX?", "options": [{"text": "Defiant — insisting on his own value and demanding the beloved stay.", "isCorrect": false, "rationale": "Defiance is entirely absent; the speaker is strikingly submissive."}, {"text": "Preemptively submissive — accepting his own unworthiness and preparing himself for abandonment.", "isCorrect": true, "rationale": "The speaker positions himself in advance of rejection, admitting his own faults, raising his hand against himself, and conceding the beloved has lawful reason to leave."}, {"text": "Playfully ironic — pretending to accept rejection while actually expecting reconciliation.", "isCorrect": false, "rationale": "There is no playfulness or irony here; the submission is sincere and painfully earnest."}, {"text": "Indifferent — claiming not to care whether the beloved stays or goes.", "isCorrect": false, "rationale": "The poem’s care is evident; “poor me” in the couplet shows genuine sorrow."}], "id": "q09"}, {"question": "The phrase “that sun, thine eye” (line 8) uses which device?", "options": [{"text": "Simile — comparing the eye to the sun using ‘like’ or ‘as.’", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ is used; the comparison is direct."}, {"text": "Metaphor — identifying the beloved’s eye directly with the sun.", "isCorrect": true, "rationale": "“That sun, thine eye” is an in-line metaphor equating the beloved’s eye with the sun, suggesting its warmth and light will be withdrawn when the beloved coldly passes."}, {"text": "Apostrophe — directly addressing the sun.", "isCorrect": false, "rationale": "The sun is not addressed; it is used as a metaphor for the beloved’s eye."}, {"text": "Personification — giving the sun a human eye.", "isCorrect": false, "rationale": "The direction of the comparison goes the other way: the eye is called a sun, not the sun given an eye."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
