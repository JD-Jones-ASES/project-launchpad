<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker deny at the opening of Sonnet CIX?", "options": [{"text": "That he has written inferior verse", "isCorrect": false, "rationale": "Poetic quality is not the issue; fidelity of heart is."}, {"text": "That he was false of heart during his absence", "isCorrect": true, "rationale": "'O! never say that I was false of heart, / Though absence seem'd my flame to qualify.'"}, {"text": "That he has loved anyone besides the beloved", "isCorrect": false, "rationale": "He admits to having 'rang'd' but denies that this constitutes falseness of heart."}, {"text": "That absence has affected his love at all", "isCorrect": false, "rationale": "He acknowledges absence seemed to qualify (temper) his flame, but denies it made him false."}], "id": "q01"}, {"question": "What does the speaker compare his soul to in lines 3–4?", "options": [{"text": "A flame that cannot be extinguished", "isCorrect": false, "rationale": "The flame is mentioned as what absence seems to qualify, but the soul comparison is different."}, {"text": "Something that lives in the beloved's breast, making departure from it as impossible as departing from himself", "isCorrect": true, "rationale": "'As easy might I from my self depart / As from my soul which in thy breast doth lie.'"}, {"text": "A compass needle always pointing north toward the beloved", "isCorrect": false, "rationale": "The compass metaphor belongs to John Donne's poetry; Shakespeare uses the self/soul comparison here."}, {"text": "A river that always returns to its source", "isCorrect": false, "rationale": "A river is not the comparison; the self departing from itself is."}], "id": "q02"}, {"question": "How does the speaker justify his 'ranging'?", "options": [{"text": "By blaming Fortune for leading him astray", "isCorrect": false, "rationale": "Fortune is blamed in Sonnet CXI; here the justification is the traveler's return."}, {"text": "By comparing himself to a traveler who always returns home on time, unchanged", "isCorrect": true, "rationale": "'Like him that travels, I return again; / Just to the time, not with the time exchang'd.'"}, {"text": "By arguing that absence proves how deep his love really is", "isCorrect": false, "rationale": "The proof is in the return unchanged, not in absence itself."}, {"text": "By saying the beloved was also absent and cannot complain", "isCorrect": false, "rationale": "No counter-accusation is made; the speaker takes responsibility and justifies his own behavior."}], "id": "q03"}, {"question": "What does 'bring water for my stain' mean?", "options": [{"text": "He will write tears of regret in his verse", "isCorrect": false, "rationale": "The metaphor is one of cleansing, not of weeping verse."}, {"text": "He will supply his own means of washing away whatever stain his absence caused", "isCorrect": true, "rationale": "The speaker says he brings his own penitence and cleansing — he is self-sufficient in making amends."}, {"text": "He will ask the beloved to forgive him by pouring out forgiveness like water", "isCorrect": false, "rationale": "He brings the water himself; the cleansing is not requested from the beloved."}, {"text": "He will write a formal apology poem to wash his reputation clean", "isCorrect": false, "rationale": "No formal apology poem is promised; the metaphor is about his own self-repair."}], "id": "q04"}, {"question": "What is the speaker's 'home of love'?", "options": [{"text": "The city where the beloved lives", "isCorrect": false, "rationale": "The home of love is identified as the beloved's breast, not a physical location."}, {"text": "The beloved's breast, where the speaker's soul resides", "isCorrect": true, "rationale": "'That is my home of love: if I have rang'd, / Like him that travels, I return again.'"}, {"text": "The poems themselves, where love is preserved", "isCorrect": false, "rationale": "The home of love is personal and bodily — the beloved's breast — not the text."}, {"text": "The speaker's own heart", "isCorrect": false, "rationale": "The speaker locates his soul in the beloved's breast, not in his own heart."}], "id": "q05"}, {"question": "What does 'thy sum of good' represent?", "options": [{"text": "The total wealth the beloved could offer", "isCorrect": false, "rationale": "The 'sum of good' is the beloved's complete worth and virtue, not material wealth."}, {"text": "The beloved's entire store of virtue and value", "isCorrect": true, "rationale": "'To leave for nothing all thy sum of good' — 'sum of good' is the totality of the beloved's goodness."}, {"text": "The number of poems the speaker has written for the beloved", "isCorrect": false, "rationale": "The 'sum of good' belongs to the beloved, not to the poet's output."}, {"text": "The time remaining in the beloved's life", "isCorrect": false, "rationale": "Remaining time is not the meaning; the beloved's moral and personal worth is."}], "id": "q06"}, {"question": "How does the couplet define the beloved's place in the speaker's universe?", "options": [{"text": "As one of many precious things in a rich world", "isCorrect": false, "rationale": "The couplet is absolute and exclusive, not comparative."}, {"text": "As the speaker's entire world — nothing else matters", "isCorrect": true, "rationale": "'For nothing this wide universe I call, / Save thou, my rose, in it thou art my all.'"}, {"text": "As a rose that will fade and must be immortalized in verse", "isCorrect": false, "rationale": "While the rose metaphor appears, the emphasis is on completeness of devotion, not on fading."}, {"text": "As the source of all the speaker's poetic inspiration", "isCorrect": false, "rationale": "The beloved is the speaker's whole universe, not merely his poetic muse here."}], "id": "q07"}, {"question": "What is the emotional arc of Sonnet CIX?", "options": [{"text": "Guilt followed by self-justification followed by unresolved tension", "isCorrect": false, "rationale": "The arc resolves fully in the couplet with absolute devotion."}, {"text": "Denial, explanation, and then an absolute declaration of the beloved's supreme value", "isCorrect": true, "rationale": "The poem moves from denying falseness, to explaining the traveler's return, to declaring the beloved is the speaker's entire world."}, {"text": "Anger at the accusation, followed by forgiveness, then reconciliation", "isCorrect": false, "rationale": "There is no anger or formal reconciliation; the tone is earnest explanation and declaration."}, {"text": "Playful teasing followed by a serious confession of guilt", "isCorrect": false, "rationale": "The tone is sincere throughout; there is no playful teasing."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
