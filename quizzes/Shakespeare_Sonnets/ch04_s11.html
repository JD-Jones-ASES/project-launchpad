<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Sonnet XXVIII continue directly from Sonnet XXVII?", "options": [{"text": "It introduces a new subject—a rival poet—that XXVII does not address", "isCorrect": false, "rationale": "No rival poet appears; XXVIII is a direct sequel to XXVII’s theme of sleepless suffering."}, {"text": "It continues the lament of the previous sonnet, asking how the speaker can be happy when he is denied rest by both day and night", "isCorrect": true, "rationale": "XXVIII opens “How can I then return in happy plight, / That am debarre’d the benefit of rest?”—directly answering the condition established in XXVII’s closing couplet."}, {"text": "It resolves the problem of sleeplessness by describing how the speaker eventually finds peace", "isCorrect": false, "rationale": "XXVIII does not resolve the problem; it deepens it, showing both day and night conspiring to torture the speaker."}, {"text": "It introduces the speaker’s homecoming after his journey", "isCorrect": false, "rationale": "No homecoming is described; the sonnet maintains the condition of prolonged absence."}]}, {"question": "What surprising alliance does the speaker describe between day and night?", "options": [{"text": "Day and night take turns being beautiful to please the beloved", "isCorrect": false, "rationale": "While the speaker does flatter both day and night with the beloved’s beauty, the alliance is described as one for the purpose of tormenting him."}, {"text": "Though natural enemies, day and night “shake hands” to jointly torture the speaker", "isCorrect": true, "rationale": "Lines 5–8: each is normally enemy to the other’s reign, yet they “do in consent shake hands to torture me”—one with physical toil, the other with the mental anguish of complaint."}, {"text": "Day and night both offer the beloved new beauty that the speaker can admire", "isCorrect": false, "rationale": "While the speaker flatters both with the beloved’s beauty, the primary point is that both conspire to deny him rest."}, {"text": "Day brings happiness and night brings rest, but neither is enough without the beloved", "isCorrect": false, "rationale": "The opposite is true: day brings toil and night brings complaint—neither offers comfort."}]}, {"question": "How does the speaker flatter the day in lines 11–12?", "options": [{"text": "He tells the day that its golden light is unmatched by any star", "isCorrect": false, "rationale": "The flattery of day is specifically connected to the beloved’s brightness, not to day’s own independent glory."}, {"text": "He tells the day that his beloved is bright and graceful, gilding even cloudy skies", "isCorrect": true, "rationale": "“I tell the day, to please him thou art bright, / And dost him grace when clouds do blot the heaven”—the speaker flatters the day by praising the beloved’s brightness as an enhancement even to cloudy days."}, {"text": "He promises the day that he will write a poem in its honor", "isCorrect": false, "rationale": "No poem for the day is promised; the flattery is verbal and in-the-moment."}, {"text": "He compares the day to the beloved’s smiling face", "isCorrect": false, "rationale": "The comparison runs the other way: the beloved makes the day better, not that the day resembles the beloved."}]}, {"question": "How does the speaker flatter the night in lines 13–14?", "options": [{"text": "He tells the night that the beloved’s voice sounds sweeter than the owl’s call", "isCorrect": false, "rationale": "No auditory comparison is made; the flattery of night involves the beloved’s gilding of the evening."}, {"text": "He tells the dark-complexioned night that when stars are dim the beloved gilds the evening", "isCorrect": true, "rationale": "“So flatter I the swart-complexion’d night, / When sparkling stars twire not thou gild’st the even”—the beloved’s brightness compensates for absent starlight, making him a compliment to the dark night."}, {"text": "He compares the night to the beloved’s dark hair", "isCorrect": false, "rationale": "The beloved’s hair is not the subject of the flattery; it is the beloved’s brightness as a replacement for absent stars."}, {"text": "He thanks the night for providing the visions he describes in Sonnet XXVII", "isCorrect": false, "rationale": "No explicit thanks are given; the flattery is strategic—an attempt to earn favor from night."}]}, {"question": "What does “twire” (line 14) mean?", "options": [{"text": "To twist and turn in the wind", "isCorrect": false, "rationale": "“Twire” has nothing to do with wind or twisting motion."}, {"text": "To peep or gleam faintly, as stars peeking through clouds", "isCorrect": true, "rationale": "“Twire” is an archaic word meaning to peep or gleam; when “sparkling stars twire not,” it means the stars are not peeking through—the night is dark and starless."}, {"text": "To make music or sing in the night", "isCorrect": false, "rationale": "No musical meaning is associated with “twire.”"}, {"text": "To shine brightly and continuously", "isCorrect": false, "rationale": "The opposite: “twire not” means not shining; the word suggests a faint, intermittent gleam."}]}, {"question": "What does the couplet reveal about the effect of the speaker’s flattery?", "options": [{"text": "Day and night are pleased by his flattery and finally give him rest", "isCorrect": false, "rationale": "The flattery fails; despite his attempts to appease day and night with the beloved’s beauty, both continue to increase his suffering."}, {"text": "Despite his flattery, day makes his sorrows longer and night makes grief’s length seem stronger", "isCorrect": true, "rationale": "The couplet bitterly concludes: “But day doth daily draw my sorrows longer, / And night doth nightly make grief’s length seem stronger”—the flattery accomplishes nothing."}, {"text": "The beloved hears his flattery and returns to comfort him", "isCorrect": false, "rationale": "No return of the beloved is described; the couplet ends in deepened grief."}, {"text": "The speaker decides to stop flattering and accept his suffering as inevitable", "isCorrect": false, "rationale": "No explicit decision to stop flattering is made in the couplet; it simply reports the futility of his strategy."}]}, {"question": "What poetic technique is used in “day doth daily” and “night doth nightly”?", "options": [{"text": "Chiasmus, reversing the order of parallel elements", "isCorrect": false, "rationale": "Chiasmus reverses structure (A-B / B-A); these lines use the same structure, not a reversal."}, {"text": "Polyptoton, repeating the same root word in different forms to emphasize relentlessness", "isCorrect": true, "rationale": "“Day/daily” and “night/nightly” repeat the same root as noun and adverb, emphasizing the endless repetition of suffering without respite."}, {"text": "Assonance, repeating the same vowel sounds", "isCorrect": false, "rationale": "While there is some vowel similarity, the device at work is specifically the root-word repetition of polyptoton."}, {"text": "Hyperbole, exaggerating the length of the day and night", "isCorrect": false, "rationale": "While the suffering may be exaggerated, the specific device is the repetition of root words in different grammatical forms."}]}, {"question": "The word “swart” in “swart-complexion’d night” means:", "options": [{"text": "Cold and frosty", "isCorrect": false, "rationale": "Temperature is not the meaning; “swart” refers to color."}, {"text": "Dark or swarthy in complexion", "isCorrect": true, "rationale": "“Swart” is an archaic word for dark-complexioned or swarthy, personifying night as a dark-skinned figure whose dark face the beloved’s brightness gilds."}, {"text": "Heavy and oppressive like a storm cloud", "isCorrect": false, "rationale": "Oppressiveness is not the primary meaning; “swart” refers specifically to dark complexion."}, {"text": "Swift and unpredictable", "isCorrect": false, "rationale": "Speed is not the meaning of “swart.”"}]}, {"question": "The overall structure of Sonnet XXVIII can be described as:", "options": [{"text": "Problem–solution: the speaker identifies his suffering and resolves it", "isCorrect": false, "rationale": "No resolution is offered; the sonnet compounds the problem through the couplet."}, {"text": "Problem–attempted relief–failed resolution: the speaker tries flattering day and night but both intensify his grief", "isCorrect": true, "rationale": "The structure presents the double oppression, the speaker’s strategy of flattery, and the couplet’s bleak conclusion that flattery only makes things worse."}, {"text": "Contrast–reconciliation: the speaker reconciles the opposing forces of day and night", "isCorrect": false, "rationale": "Day and night are reconciled to each other (in alliance against the speaker), but the speaker never reconciles with them."}, {"text": "Catalogue–conclusion: the speaker lists the beloved’s virtues and concludes with a declaration of love", "isCorrect": false, "rationale": "No catalogue of the beloved’s virtues is presented; the sonnet focuses on the speaker’s suffering."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
