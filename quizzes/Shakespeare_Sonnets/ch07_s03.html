    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker’s central question at the opening of Sonnet LXI?", "options": [{"text": "Whether the beloved truly loves the speaker", "isCorrect": false, "rationale": "The speaker already knows the beloved’s love is genuine but not controlling; the question is about what keeps the speaker awake."}, {"text": "Whether it is the beloved’s will or spirit that keeps the speaker’s eyes open at night", "isCorrect": true, "rationale": "Lines 1–4 ask if the beloved wishes the speaker’s “heavy eyelids” to stay open and if “shadows like to thee” mock the speaker’s sight."}, {"text": "Whether the speaker should write more poetry to the beloved", "isCorrect": false, "rationale": "Poetry composition is not the subject of this sonnet’s opening question."}, {"text": "Whether the speaker can see the beloved in dreams", "isCorrect": false, "rationale": "The speaker is kept awake — unable to sleep or dream — not visited by the beloved in dreams."}]}, {"question": "What does the speaker suggest the beloved’s “spirit” is doing in lines 5–10?", "options": [{"text": "Inspiring the speaker to write better poetry", "isCorrect": false, "rationale": "The spirit is described as investigating the speaker’s faults, not inspiring creativity."}, {"text": "Traveling far from home to spy on the speaker’s shames and idle hours", "isCorrect": true, "rationale": "Lines 5–8: “Is it thy spirit that thou send’st from thee / So far from home into my deeds to pry, / To find out shames and idle hours in me.”"}, {"text": "Sending ghostly shadows to comfort the lonely speaker", "isCorrect": false, "rationale": "The shadows mock the speaker’s sight rather than comfort; the spirit is associated with jealous surveillance."}, {"text": "Watching over the speaker while the beloved sleeps", "isCorrect": false, "rationale": "It is the speaker who watches while the beloved wakes elsewhere; the spirit pries, it does not watch over protectively."}]}, {"question": "What does “the scope and tenure of thy jealousy” mean in line 10?", "options": [{"text": "The beloved’s legal ownership of the speaker’s time", "isCorrect": false, "rationale": "While “tenure” has legal connotations, the phrase refers to the extent and purpose of the beloved’s jealousy."}, {"text": "The full extent and purpose of what the speaker imagines as the beloved’s jealous watching", "isCorrect": true, "rationale": "“Scope” means range; “tenure” means hold or purpose; together they describe what the speaker supposes the jealous spying aims at."}, {"text": "The amount of time the beloved spends away from the speaker", "isCorrect": false, "rationale": "The phrase refers to the nature of jealousy’s operation, not a measure of absence."}, {"text": "The beloved’s possessive nature as a character trait", "isCorrect": false, "rationale": "The speaker corrects this assumption in line 11, saying the beloved’s love is not so great as to cause such jealousy."}]}, {"question": "What correction does the speaker make at the volta (line 11)?", "options": [{"text": "The speaker admits the beloved does not truly love him", "isCorrect": false, "rationale": "The speaker affirms the beloved’s love; only its controlling power is denied."}, {"text": "The speaker denies that the beloved’s love is responsible for the sleeplessness and instead blames his own love", "isCorrect": true, "rationale": "Line 11–12: “O, no! thy love, though much, is not so great: / It is my love that keeps mine eye awake.”"}, {"text": "The speaker decides that the beloved intentionally sends spirits to spy", "isCorrect": false, "rationale": "The speaker rejects the notion of the beloved’s spirit spying; his own love is to blame."}, {"text": "The speaker resolves to stop loving the beloved to get better sleep", "isCorrect": false, "rationale": "No such resolution is made; the speaker accepts his sleepless vigil as an act of devotion."}]}, {"question": "What does the metaphor of “the watchman” (line 14) convey?", "options": [{"text": "The speaker is a guard protecting the beloved from danger", "isCorrect": false, "rationale": "The speaker is not protecting the beloved but keeping a loving vigil, awake out of devotion."}, {"text": "The speaker keeps an all-night vigil of loving attention, unable to sleep because of his devotion", "isCorrect": true, "rationale": "“To play the watchman ever for thy sake”: a watchman stays awake through the night to keep watch; here it is the speaker’s love that compels the vigil."}, {"text": "The beloved has hired the speaker as a servant", "isCorrect": false, "rationale": "The watchman is a self-assumed role born of love, not employment."}, {"text": "The speaker is guarding his own virtue against temptation", "isCorrect": false, "rationale": "The vigil is directed outward toward the beloved, not inward as moral self-discipline."}]}, {"question": "What bitter irony does the couplet reveal?", "options": [{"text": "The speaker discovers that the beloved has been writing poetry about someone else", "isCorrect": false, "rationale": "No rival poetry is mentioned; the couplet focuses on physical presence."}, {"text": "The speaker watches sleeplessly for the beloved, while the beloved is awake elsewhere in the company of others", "isCorrect": true, "rationale": "Lines 15–16: “For thee watch I, whilst thou dost wake elsewhere, / From me far off, with others all too near.” The speaker’s devoted vigil is contrasted with the beloved’s social freedom."}, {"text": "The speaker realizes the sleeplessness has been caused by illness, not love", "isCorrect": false, "rationale": "The cause is explicitly identified as love, not illness."}, {"text": "The beloved does not know the speaker exists", "isCorrect": false, "rationale": "The speaker addresses the beloved directly, implying a known relationship."}]}, {"question": "The phrase “with others all too near” suggests what about the beloved’s situation?", "options": [{"text": "The beloved is in physical danger from enemies", "isCorrect": false, "rationale": "The context is social, not one of physical danger."}, {"text": "The beloved is socializing intimately with others while the speaker is alone and watchful", "isCorrect": true, "rationale": "“All too near” implies unwelcome proximity — others who are close to the beloved in ways the speaker cannot be."}, {"text": "The beloved lives in a crowded city far from the countryside", "isCorrect": false, "rationale": "The sonnet concerns emotional and physical separation, not a specific geographical setting."}, {"text": "The beloved’s friends are jealous of the speaker’s love", "isCorrect": false, "rationale": "The couplet focuses on the speaker’s emotional situation, not the jealousy of the beloved’s companions."}]}, {"question": "What literary device is used in “shadows like to thee do mock my sight” (line 4)?", "options": [{"text": "Hyperbole", "isCorrect": false, "rationale": "The line describes a specific psychological experience, not an exaggeration for effect."}, {"text": "Personification and metaphor — shadows given the power to mock", "isCorrect": true, "rationale": "Shadows are personified as active mockers that deceive the speaker into seeing the beloved’s form in the dark."}, {"text": "Alliteration", "isCorrect": false, "rationale": "While there is some repeated sound, the dominant device is the personification of shadows."}, {"text": "Synecdoche", "isCorrect": false, "rationale": "Synecdoche substitutes a part for a whole; this image is personification of shadows."}]}, {"question": "What structural feature marks the turn in Sonnet LXI?", "options": [{"text": "A new stanza beginning at line 9", "isCorrect": false, "rationale": "Shakespearean sonnets do not use stanza breaks in the same way; the volta is marked by content shift."}, {"text": "The exclamation “O, no!” at line 11, which pivots from hypothesis to self-correction", "isCorrect": true, "rationale": "“O, no!” at the start of line 11 is a classic volta signal: the speaker rejects the premise of the preceding quatrains and redirects the argument."}, {"text": "The shift to past tense at line 13", "isCorrect": false, "rationale": "The tense does not shift significantly at line 13; the volta is the “O, no!” at line 11."}, {"text": "A question mark at the end of line 14", "isCorrect": false, "rationale": "Line 14 is a statement, not a question."}]}, {"question": "What is the overarching emotional theme of Sonnet LXI?", "options": [{"text": "Resentment that the beloved ignores the speaker", "isCorrect": false, "rationale": "The tone is devotional and melancholy, not resentful."}, {"text": "The bittersweet suffering of devoted love that causes sleepless longing and jealous imagination", "isCorrect": true, "rationale": "The speaker is tormented by love — awake, imagining the beloved’s spirit, only to realize it is his own love that keeps him watching."}, {"text": "Joy at being reunited with the beloved after a long separation", "isCorrect": false, "rationale": "The sonnet is about separation and longing, not reunion."}, {"text": "Philosophical reflection on the nature of sleep and dreams", "isCorrect": false, "rationale": "Sleep is a setting for the emotional drama, not a philosophical subject in itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
