<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To whom is Sonnet CXXIII directly addressed?", "options": [{"text": "The Fair Youth", "isCorrect": false, "rationale": "The Fair Youth is not addressed here; the sonnet is a defiant address to an abstract force."}, {"text": "Time, personified as a force trying to claim the speaker has changed", "isCorrect": true, "rationale": "The opening 'No, Time, thou shalt not boast that I do change' directly addresses Time as a personified adversary attempting to assert power over the speaker's constancy."}, {"text": "The rival poet", "isCorrect": false, "rationale": "No rival poet is addressed in this sonnet."}, {"text": "Future readers of the Sonnets", "isCorrect": false, "rationale": "Posterity is sometimes addressed in other sonnets but not here; Time is the direct addressee."}], "id": "q01"}, {"question": "What are 'thy pyramids built up with newer might' (line 2) most likely referring to?", "options": [{"text": "The actual pyramids of ancient Egypt", "isCorrect": false, "rationale": "While pyramids of Egypt may be in view, the phrase more specifically targets recently constructed monuments meant to impress."}, {"text": "Grand new monuments or buildings (possibly including Egyptian obelisks brought to Rome or London) that Time presents as wonders", "isCorrect": true, "rationale": "Scholars suggest contemporary monuments — possibly obelisks re-erected in Rome — are meant: Time's newer 'pyramids' dressed up as novelties are really ancient things repackaged."}, {"text": "Poetic achievements by rival writers that surpass the speaker's work", "isCorrect": false, "rationale": "Rival poets are not the subject; the pyramids represent Time's monuments, not literary rivals."}, {"text": "The youth's growing fame and social achievements", "isCorrect": false, "rationale": "The pyramids are Time's constructions, not the youth's accomplishments."}], "id": "q02"}, {"question": "Lines 3-4 state: 'To me are nothing novel, nothing strange; / They are but dressings of a former sight.' What is the speaker's argument?", "options": [{"text": "He has traveled extensively and seen all the world's monuments", "isCorrect": false, "rationale": "Personal travel is not the argument; the claim is philosophical about novelty and repetition."}, {"text": "What Time presents as new is really the old dressed up — there is nothing genuinely novel under Time's dispensation", "isCorrect": true, "rationale": "The speaker denies Time's power to impress through novelty; its 'new' wonders are merely costumes on old things — a claim to seeing through Time's tricks."}, {"text": "The speaker is too old to be impressed by anything new", "isCorrect": false, "rationale": "Personal age or weariness is not the speaker's reasoning; it is a philosophical claim about the nature of novelty."}, {"text": "The youth's beauty makes all other sights seem dull by comparison", "isCorrect": false, "rationale": "The youth's beauty is not the measure here; the speaker argues from the nature of Time, not from comparison to the youth."}], "id": "q03"}, {"question": "Lines 7-10 argue that humans 'admire / What thou dost foist upon us that is old; / And rather make them born to our desire / Than think that we before have heard them told.' What does this reveal about human perception?", "options": [{"text": "Humans prefer ancient things to modern innovations", "isCorrect": false, "rationale": "The argument is the opposite: humans are tricked into treating old things as new and desirable."}, {"text": "Humans are deceived by Time into treating old things as new novelties and projecting their desire onto them", "isCorrect": true, "rationale": "Time 'foists' old things on us; we prefer to believe they are new ('born to our desire') rather than acknowledge we have encountered them before — a critique of human susceptibility to the illusion of novelty."}, {"text": "Humans are naturally conservative and resist change", "isCorrect": false, "rationale": "The critique is about credulity toward novelty, not conservatism."}, {"text": "Human desire inevitably outpaces what the world can provide", "isCorrect": false, "rationale": "The argument is about perception of novelty vs. recurrence, not the insufficiency of the world."}], "id": "q04"}, {"question": "The speaker says he defies 'Thy registers and thee' (line 11). What are Time's 'registers'?", "options": [{"text": "Church records of births, marriages, and deaths", "isCorrect": false, "rationale": "While 'register' can mean church records, here it refers to Time's historical chronicles."}, {"text": "Time's historical records and chronicles that claim to accurately measure change and passing", "isCorrect": true, "rationale": "Time's registers are its official records — history books, chronicles, annals — by which it claims to have authority to mark change and measure constancy."}, {"text": "The speaker's own poetic notebooks", "isCorrect": false, "rationale": "The registers belong to Time, not to the speaker."}, {"text": "Musical pitch or vocal range", "isCorrect": false, "rationale": "The musical sense of 'register' is not applicable here."}], "id": "q05"}, {"question": "Lines 13-14 state: 'For thy records and what we see doth lie, / Made more or less by thy continual haste.' What is the accusation against Time?", "options": [{"text": "Time moves too slowly, distorting events by drawing them out", "isCorrect": false, "rationale": "It is Time's haste, not its slowness, that distorts perception."}, {"text": "Time's records are lies because its constant rushing ('continual haste') distorts and misrepresents what actually is", "isCorrect": true, "rationale": "Time speeds by so continuously that its records exaggerate or diminish ('made more or less') what actually occurs — the haste itself is the mechanism of distortion."}, {"text": "Time fabricates events that never occurred to fill its chronicles", "isCorrect": false, "rationale": "The distortion is not invention but proportional misrepresentation through haste."}, {"text": "Time selectively records only the deeds of the powerful", "isCorrect": false, "rationale": "Selective recording is not the accusation; the problem is distortion through temporal speed."}], "id": "q06"}, {"question": "The couplet's vow — 'I will be true despite thy scythe and thee' — places the speaker in opposition to which conventional symbol of Time?", "options": [{"text": "An hourglass, representing Time's measurement of finite life", "isCorrect": false, "rationale": "The scythe, not the hourglass, is the symbol the speaker names."}, {"text": "The scythe, the traditional instrument of Father Time that reaps life as a harvest", "isCorrect": true, "rationale": "Father Time carries a scythe; by naming it, the speaker acknowledges Time's lethal power while defiantly claiming his fidelity will survive even death."}, {"text": "A mirror, reflecting Time's passing in aging faces", "isCorrect": false, "rationale": "Mirrors are associated with beauty and aging in other sonnets but not invoked here."}, {"text": "Wings, representing Time's flight", "isCorrect": false, "rationale": "Winged Time appears in other poems; here the scythe is the chosen symbol."}], "id": "q07"}, {"question": "Sonnet CXXIII shifts the focus of Chapter 11 from personal apology (117-120) to what larger theme?", "options": [{"text": "The speaker's rivalry with other poets", "isCorrect": false, "rationale": "The rival poet theme belongs to an earlier section of the Sonnets; CXXIII argues against Time."}, {"text": "The speaker's constancy as a philosophical defiance of Time's power to effect change or prove inconstancy", "isCorrect": true, "rationale": "Having apologized for apparent straying, the speaker now asserts that his fundamental constancy is beyond Time's reach — an argument from philosophical permanence."}, {"text": "The youth's aging and the loss of his beauty", "isCorrect": false, "rationale": "The youth's aging is not addressed in CXXIII; the focus is the speaker's own constancy."}, {"text": "The speaker's mortality and desire for immortality through verse", "isCorrect": false, "rationale": "Immortality through verse is a different argument found in sonnets like 18; CXXIII is about constancy of character, not poetic immortality."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
