<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker say his earlier lines did, according to the opening of Sonnet CXV?", "options": [{"text": "They accurately described the beloved", "isCorrect": false, "rationale": "The speaker says they lied — specifically, that they claimed he could not love deeper."}, {"text": "They lied by claiming he could not love the beloved any more deeply", "isCorrect": true, "rationale": "'Those lines that I before have writ do lie, / Even those that said I could not love you dearer.'"}, {"text": "They exaggerated the beloved's virtues beyond what was true", "isCorrect": false, "rationale": "The lie is not about overpraising the beloved but about understating the love's growth potential."}, {"text": "They were written for someone else and only later dedicated to the beloved", "isCorrect": false, "rationale": "No reassignment of earlier poems is suggested; the issue is that earlier declarations of peak love have been surpassed."}]}, {"question": "Why did the speaker's judgment not know the love could burn clearer?", "options": [{"text": "Because he had not yet experienced the full extent of the beloved's virtues", "isCorrect": false, "rationale": "The explanation given is not about the beloved's virtues but about Time's unpredictable changes."}, {"text": "Because reckoning Time's million accidents could not be foreseen at the moment of writing", "isCorrect": true, "rationale": "'Reckoning Time, whose million'd accidents / Creep in 'twixt vows' — Time's intervening changes were unforeseeable when he declared maximum love."}, {"text": "Because he was too young to understand mature love", "isCorrect": false, "rationale": "Youth is not given as the reason; unforeseeable temporal change is."}, {"text": "Because rival poets distracted him from his beloved's true worth", "isCorrect": false, "rationale": "Rivals are not mentioned; Time's accidents are the explanatory factor."}]}, {"question": "What does Time's 'million'd accidents' do to love and vows?", "options": [{"text": "They test love and make it stronger", "isCorrect": false, "rationale": "The poem presents Time's accidents as threats that creep between vows, not as strengthening challenges."}, {"text": "They creep between vows and change decrees, tan beauty, blunt intentions, divert minds", "isCorrect": true, "rationale": "Time's accidents 'creep in 'twixt vows,' 'change decrees of kings,' 'tan sacred beauty,' 'blunt the sharp'st intents,' and 'divert strong minds.'"}, {"text": "They create new opportunities for deeper love", "isCorrect": false, "rationale": "Time's accidents are portrayed as corroding and diverting, not creating opportunities."}, {"text": "They purify love by removing all that is not essential", "isCorrect": false, "rationale": "The image of tanning, blunting, and diverting is destructive, not purifying."}]}, {"question": "Why does the speaker say he could not declare 'Now I love you best' at the earlier moment?", "options": [{"text": "Because he was not yet certain of the beloved's feelings", "isCorrect": false, "rationale": "Reciprocal feelings are not the issue; the philosophical problem of temporal certainty is."}, {"text": "Because declaring certainty over present love while doubting the future would crown the present over all possible future growth", "isCorrect": true, "rationale": "He asks: 'Might I not then say, Now I love you best, / When I was certain o'er incertainty, / Crowning the present, doubting of the rest?'"}, {"text": "Because he feared the beloved would leave if the love seemed too fixed", "isCorrect": false, "rationale": "The beloved's reaction is not the concern; the philosophical issue of love's growth is."}, {"text": "Because the Muse had not yet given him the right words", "isCorrect": false, "rationale": "The Muse is not involved in this argument; temporal philosophy is."}]}, {"question": "What is the significance of 'Love is a babe' in the couplet?", "options": [{"text": "Love is innocent and should be protected like a child", "isCorrect": false, "rationale": "The innocence of a child is not the relevant quality; a baby's capacity to grow is."}, {"text": "Love, like an infant, is always growing and so can never be declared fully grown", "isCorrect": true, "rationale": "A babe is still growing; saying 'now I love best' is like claiming an infant has reached full stature. Love, like a child, keeps growing."}, {"text": "Love begins small and weak, like a newborn, but eventually matures and dies", "isCorrect": false, "rationale": "Death of love is not the babe metaphor's implication; perpetual growth is."}, {"text": "Love should be treated with the tenderness one shows to infants", "isCorrect": false, "rationale": "Tenderness is not the point; the baby's perpetual growth is the argument."}]}, {"question": "What does 'tan sacred beauty' suggest about Time's power?", "options": [{"text": "Time literally darkens skin by exposure to sunlight", "isCorrect": false, "rationale": "While the image is drawn from the tanning of leather or skin, here it is a metaphor for Time coarsening and fading what was once sacred and fine."}, {"text": "Time coarsens and weathers even the most sacred and precious beauty", "isCorrect": true, "rationale": "The image of beauty being tanned — roughened and weathered — makes Time a force that degrades even what is most exalted."}, {"text": "Time gives beauty a golden, sun-kissed quality", "isCorrect": false, "rationale": "Tanning here is damage, not enhancement."}, {"text": "Time preserves beauty like tanning preserves leather", "isCorrect": false, "rationale": "The metaphor is negative — Time's tanning is damage, not preservation."}]}, {"question": "What is the philosophical problem the sonnet wrestles with?", "options": [{"text": "Whether love can survive physical aging", "isCorrect": false, "rationale": "The philosophical problem is not about physical aging but about whether love's current peak can be declared final."}, {"text": "Whether any moment of love can be declared its maximum, given that love keeps growing", "isCorrect": true, "rationale": "If love is always growing, then any claim that it has reached its peak is necessarily false — the sonnet's central paradox."}, {"text": "Whether the beloved's beauty will outlast the poet's love", "isCorrect": false, "rationale": "The comparison is between the present and future states of the speaker's love, not between the beloved's beauty and the poet's devotion."}, {"text": "Whether past poems should be retracted or left standing as honest expressions of their moment", "isCorrect": false, "rationale": "While the speaker says his earlier lines 'lie,' the argument is philosophical, not a decision about retracting poems."}]}, {"question": "How does the couplet's use of 'give full growth' support the poem's argument?", "options": [{"text": "It suggests the speaker will now stop writing to allow love to mature quietly", "isCorrect": false, "rationale": "No such vow of silence is made; the phrase supports the logical argument."}, {"text": "It clinches the argument: to call love 'best' now would deny it the full growth it is still undergoing", "isCorrect": true, "rationale": "'To give full growth to that which still doth grow' — declaring the present peak robs love of its ongoing development."}, {"text": "It contradicts the opening by saying earlier lines were actually correct after all", "isCorrect": false, "rationale": "The couplet confirms the opening: earlier declarations of peak love were premature because love was still growing."}, {"text": "It compares the beloved's beauty to a growing plant that will eventually die", "isCorrect": false, "rationale": "The growing entity is love, not the beloved's beauty; and the poem does not anticipate the love's death."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
