    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker ask the beloved to do after his death in the opening of Sonnet LXXII?", "options": [{"text": "To remember the speaker’s verse and teach it to others", "isCorrect": false, "rationale": "The speaker asks the opposite: to forget him entirely so the beloved will not have to justify loving a worthless man."}, {"text": "To forget the speaker completely, because the speaker cannot justify why the beloved should love him", "isCorrect": true, "rationale": "Lines 3–4: “After my death, dear love, forget me quite, / For you in me can nothing worthy prove.”"}, {"text": "To write poetry in the speaker’s memory", "isCorrect": false, "rationale": "No such request is made; the speaker asks for forgetting, not commemoration."}, {"text": "To forgive the speaker for his failings during life", "isCorrect": false, "rationale": "The sonnet does not ask for forgiveness; it asks for the beloved’s protection from embarrassment."}], "id": "q01"}, {"question": "What does the speaker call a “virtuous lie” (line 5)?", "options": [{"text": "A harmless exaggeration in poetry that praises beauty", "isCorrect": false, "rationale": "The “virtuous lie” is specifically about praising the deceased speaker beyond what truth warrants."}, {"text": "Praise the beloved might invent to justify loving someone as unworthy as the speaker", "isCorrect": true, "rationale": "Lines 5–6: “Unless you would devise some virtuous lie, / To do more for me than mine own desert.” A virtuous lie is well-intentioned false praise."}, {"text": "The beloved’s claim to have forgotten the speaker when he has not", "isCorrect": false, "rationale": "The “virtuous lie” would be in praise of the speaker, not a claim about forgetting."}, {"text": "A polite fiction that the speaker lived a noble life", "isCorrect": false, "rationale": "While close, the lie is specifically about inventing praiseworthy qualities in the dead speaker to justify the beloved’s love."}], "id": "q02"}, {"question": "What does “niggard truth” (line 10) mean?", "options": [{"text": "A mean, stingy truth that reveals the speaker’s poverty", "isCorrect": false, "rationale": "“Niggard” means miserly or stingy; here truth is stingy in the amount of praise it can honestly give the speaker."}, {"text": "Truth that is too stingy to offer much praise for the speaker because the speaker genuinely lacks merit", "isCorrect": true, "rationale": "“Niggard truth would willingly impart” less praise than the beloved might wish to give — truth is too sparing with its praise because the speaker merits little."}, {"text": "A lie told so often it has become as hard as a penny", "isCorrect": false, "rationale": "Niggard truth is genuine truth, not a lie; it is stingy with praise."}, {"text": "Truth spoken by a miser who refuses to share it", "isCorrect": false, "rationale": "The niggardliness belongs to truth itself, not to a person who withholds truth from others."}], "id": "q03"}, {"question": "What does the speaker fear the beloved’s love might appear to be in line 11?", "options": [{"text": "Excessive and embarrassing in its intensity", "isCorrect": false, "rationale": "The fear is about the appearance of falseness, not excessive emotion."}, {"text": "False, because the beloved speaks well of someone (the speaker) who does not deserve it", "isCorrect": true, "rationale": "Lines 11–12: “lest your true love may seem false in this / That you for love speak well of me untrue.” True love appears false when it praises the unworthy."}, {"text": "Hypocritical, because the beloved does not truly feel what he claims", "isCorrect": false, "rationale": "The love is genuine; the appearance of falseness comes from praising someone unworthy, not from insincere feeling."}, {"text": "Weak, because the beloved gives up too easily after the speaker’s death", "isCorrect": false, "rationale": "The sonnet does not address the strength or weakness of the beloved’s love; it addresses reputation and honesty."}], "id": "q04"}, {"question": "What does “My name be buried where my body is” (line 13) express?", "options": [{"text": "The speaker wants his name carved on a grand tombstone", "isCorrect": false, "rationale": "The opposite: the speaker wants his name buried and forgotten, not inscribed on a monument."}, {"text": "The speaker’s wish that his name, like his body, be buried and forgotten after death", "isCorrect": true, "rationale": "The speaker extends the logic of LXXI: not only should the beloved not mourn, the speaker’s very name should perish."}, {"text": "The speaker is planning his funeral and giving instructions to carvers", "isCorrect": false, "rationale": "The instruction is figurative: obliterate the name, do not inscribe it."}, {"text": "The speaker fears his name will outlive his reputation and shame the beloved", "isCorrect": false, "rationale": "The shame concern is accurate but the specific image is about burial of both name and body together."}], "id": "q05"}, {"question": "What does the final couplet reveal about the speaker’s self-assessment?", "options": [{"text": "The speaker is proud of what he has created and fears it will be lost", "isCorrect": false, "rationale": "The opposite: the speaker is ashamed of what he brings forth."}, {"text": "The speaker is ashamed of his own creations and does not want the beloved to be associated with them or with him", "isCorrect": true, "rationale": "Lines 15–16: “For I am shamed by that which I bring forth, / And so should you, to love things nothing worth.”"}, {"text": "The speaker confesses to having written inferior poetry in the past", "isCorrect": false, "rationale": "While the implication involves his writing, the shame is about the speaker’s overall worth as a person, not specifically his older verses."}, {"text": "The speaker blames the beloved for not inspiring him to write better", "isCorrect": false, "rationale": "The shame is entirely self-directed; the beloved is not blamed."}], "id": "q06"}, {"question": "How does Sonnet LXXII continue the theme of Sonnet LXXI?", "options": [{"text": "Both sonnets promise immortality through verse", "isCorrect": false, "rationale": "Both sonnets ask for forgetting, not immortality through verse."}, {"text": "Both sonnets ask the beloved to forget and not mourn the speaker, motivated by love and concern for the beloved’s reputation", "isCorrect": true, "rationale": "LXXI asks for no mourning; LXXII extends this to asking that even the speaker’s name be buried — both motivated by protecting the beloved from shame or mockery."}, {"text": "Both sonnets describe the physical process of aging and death", "isCorrect": false, "rationale": "Physical aging is not the focus of either sonnet; both focus on how the beloved should treat the speaker’s memory."}, {"text": "LXXI is happy while LXXII is bitter", "isCorrect": false, "rationale": "Both sonnets share a melancholy, self-deprecating tone; neither is happy."}], "id": "q07"}, {"question": "What literary device is used in “things nothing worth” (line 16)?", "options": [{"text": "Oxymoron", "isCorrect": false, "rationale": "Oxymoron combines contradictory terms; this phrase is a self-deprecating statement, not a contradiction."}, {"text": "Litotes (understatement through negation), expressing the speaker’s worthlessness by saying he is worth nothing", "isCorrect": true, "rationale": "“Nothing worth” is a negative expression of absolute worthlessness — a kind of understatement that by its very baldness overstates the case."}, {"text": "Apostrophe", "isCorrect": false, "rationale": "The phrase does not address an absent or abstract entity directly."}, {"text": "Metaphor comparing the speaker to discarded objects", "isCorrect": false, "rationale": "The statement is direct (“things nothing worth”), not a metaphorical comparison to specific objects."}], "id": "q08"}, {"question": "What is the emotional tone of Sonnet LXXII?", "options": [{"text": "Angry and accusatory toward the beloved", "isCorrect": false, "rationale": "The speaker is self-deprecating and protective of the beloved, not angry."}, {"text": "Self-deprecating, humble, and deeply concerned with protecting the beloved from shame", "isCorrect": true, "rationale": "The speaker consistently diminishes himself (“nothing worthy,” “shamed by that which I bring forth”) out of love and concern for the beloved’s reputation."}, {"text": "Bitter toward those who have misjudged the speaker’s worth", "isCorrect": false, "rationale": "No external accusers are targeted; the self-deprecation is genuine, not defensive bitterness."}, {"text": "Cheerful resignation to death and forgetting", "isCorrect": false, "rationale": "The tone is mournful and humble, not cheerful."}], "id": "q09"}, {"question": "What does the phrase “After my death, dear love, forget me quite” signal about the speaker’s relationship to the verse-immortality theme?", "options": [{"text": "The speaker has given up on poetry as a means of achieving fame", "isCorrect": false, "rationale": "The argument is not about the speaker giving up on fame but about protecting the beloved."}, {"text": "It ironically undermines the verse-immortality theme because the speaker is writing poetry that asks to be forgotten", "isCorrect": true, "rationale": "The act of writing a sonnet — a form designed to preserve — to request forgetting is profoundly ironic: the very verse that might immortalize the speaker records his wish for oblivion."}, {"text": "It confirms that verse cannot preserve memory after death", "isCorrect": false, "rationale": "The sonnet does not deny verse’s power to preserve; the irony is that the speaker uses that power to request its own negation."}, {"text": "It shows the speaker has changed his mind about loving the beloved", "isCorrect": false, "rationale": "The love is undiminished; the self-abnegation is an expression of it, not a withdrawal."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
