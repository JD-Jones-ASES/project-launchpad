    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who besides the speaker has been enslaved by the mistress in Sonnet CXXXIII?", "options": [{"text": "A rival poet", "isCorrect": false, "rationale": "The enslaved third party is not described as a poet but as the speaker's dearest friend."}, {"text": "The speaker's closest friend (likely the Fair Youth)", "isCorrect": true, "rationale": "The speaker complains that the mistress's 'cruel eye' has taken not only himself but his 'sweet'st friend,' widely interpreted as the Fair Youth of the earlier sequence."}, {"text": "The speaker's wife", "isCorrect": false, "rationale": "No wife is mentioned in this sonnet; the third party is a male friend."}, {"text": "The speaker's patron", "isCorrect": false, "rationale": "The friend is described in intimate, personal terms consistent with the Fair Youth, not a patron relationship."}]}, {"question": "What does 'me from myself thy cruel eye hath taken' mean?", "options": [{"text": "She has made the speaker lose his eyesight", "isCorrect": false, "rationale": "The taking is metaphorical — she has alienated him from his own identity and self-possession."}, {"text": "Her power has alienated the speaker from his own self, making him no longer his own person", "isCorrect": true, "rationale": "Enslaved by passion, the speaker has lost himself — his will, his judgment, his identity — to the mistress. He is no longer his own possession."}, {"text": "She has stolen his poetry and claimed it as her own", "isCorrect": false, "rationale": "The theft is existential, not literary."}, {"text": "She has destroyed his reputation in society", "isCorrect": false, "rationale": "The metaphor concerns inner self-possession, not social standing."}]}, {"question": "What does the speaker mean by calling his friend 'my next self'?", "options": [{"text": "His younger brother", "isCorrect": false, "rationale": "The friend is not identified as a brother; 'next self' implies a deeper soul-level connection."}, {"text": "His alter ego or closest emotional twin — a second self", "isCorrect": true, "rationale": "'My next self' means the person who is as close to him as his own self — a classical expression of deep friendship. The mistress has enslaved this second self 'harder,' more completely than she has enslaved the speaker."}, {"text": "His body as distinct from his soul", "isCorrect": false, "rationale": "The next self is a person outside the speaker, not an internal division."}, {"text": "His poetic persona", "isCorrect": false, "rationale": "The next self is a real human relationship, not a literary construct."}]}, {"question": "The speaker describes himself as 'forsaken' of three things. What are they?", "options": [{"text": "Of beauty, virtue, and wealth", "isCorrect": false, "rationale": "These are not the three things listed."}, {"text": "Of himself, his friend, and the mistress", "isCorrect": true, "rationale": "'Of him, myself, and thee I am forsaken' — the speaker has lost his own self (enslaved), his friend (also enslaved), and effective access to the mistress (he cannot reach her freely)."}, {"text": "Of youth, hope, and reason", "isCorrect": false, "rationale": "These are thematic implications but not the three things explicitly named."}, {"text": "Of love, loyalty, and liberty", "isCorrect": false, "rationale": "The three named are him (the friend), myself (the speaker's selfhood), and thee (the mistress)."}]}, {"question": "What legal metaphor does the speaker use in lines 11-14?", "options": [{"text": "A trial in which the mistress is the judge", "isCorrect": false, "rationale": "The legal metaphor is one of imprisonment and bail, not a trial."}, {"text": "Prison and bail — he asks that his heart serve as bail for his friend's imprisoned heart", "isCorrect": true, "rationale": "'Prison my heart in thy steel bosom's ward, / But then my friend's heart let my poor heart bail' — the speaker offers himself as surety (bail) to free his friend from imprisonment in her power."}, {"text": "A legal contract binding them both to her service", "isCorrect": false, "rationale": "Contract law appears in Sonnet CXXXIV; here the metaphor is specifically prison and bail."}, {"text": "A will and testament leaving her all his possessions", "isCorrect": false, "rationale": "No such testamentary metaphor appears in CXXXIII."}]}, {"question": "What does 'her steel bosom's ward' suggest about the mistress?", "options": [{"text": "That she is physically strong", "isCorrect": false, "rationale": "The steel bosom is metaphorical, referring to emotional coldness and hard-heartedness."}, {"text": "That her heart is cold and hard as steel, and her breast a prison ward for those she enslaves", "isCorrect": true, "rationale": "'Steel bosom's ward' combines the image of a cold, impenetrable heart with a prison cell — those who fall into her power are literally imprisoned within the hard steel of her indifference."}, {"text": "That she wears armor as a warrior woman", "isCorrect": false, "rationale": "This is figurative, not literal; the steel describes her emotional nature."}, {"text": "That she is morally upright and unyielding in virtue", "isCorrect": false, "rationale": "Her steel is not virtuous resistance but cruel indifference."}]}, {"question": "What is the speaker's logic in arguing 'thou canst not then use rigour in my jail'?", "options": [{"text": "If she imprisons him, the law will punish her", "isCorrect": false, "rationale": "No external legal threat is invoked."}, {"text": "If his heart stands guard for his friend, she cannot be cruel to the friend without being cruel to him — and he is already her possession", "isCorrect": true, "rationale": "He reasons: if his heart guards his friend, she cannot mistreat the friend without mistreating the speaker's heart. Since the speaker belongs to her, mistreating his heart would harm her own property — an illogical cruelty."}, {"text": "If she is kind to him, she must be kind to all", "isCorrect": false, "rationale": "The argument is specifically about the triangular relationship and what her ownership of him entails."}, {"text": "That true love cannot be imprisoned by any power", "isCorrect": false, "rationale": "The argument is a practical legal-emotional one, not a philosophical claim about love's freedom."}]}, {"question": "How does the couplet undercut the speaker's logical argument?", "options": [{"text": "He admits his argument has no logical foundation", "isCorrect": false, "rationale": "The logic stands; what the couplet undercuts it with is the speaker's knowledge of her actual willfulness."}, {"text": "He acknowledges she will do as she pleases anyway, regardless of his logic — because his imprisonment in her makes everything he has belong to her", "isCorrect": true, "rationale": "'And yet thou wilt; for I, being pent in thee, / Perforce am thine, and all that is in me' — her will overrides his reasoning. Because he is entirely possessed by her, even his argument belongs to her to dismiss."}, {"text": "He forgives her and withdraws the petition", "isCorrect": false, "rationale": "There is no forgiveness; the couplet is resigned and bitter."}, {"text": "He invites a third party to intervene", "isCorrect": false, "rationale": "No third party is invoked in the couplet."}]}, {"question": "Sonnet CXXXIII is unusual in the Dark Lady sequence because it involves three people. Who are they?", "options": [{"text": "The speaker, the mistress, and a rival suitor", "isCorrect": false, "rationale": "The third party is the speaker's dear friend, not a rival for the mistress."}, {"text": "The speaker, the mistress, and the speaker's closest male friend", "isCorrect": true, "rationale": "The triangular situation — the speaker, his friend (likely the Fair Youth), and the Dark Lady — creates a unique complication where both men are enslaved by the same woman."}, {"text": "The speaker, the mistress, and the speaker's wife", "isCorrect": false, "rationale": "No wife is mentioned in this part of the sequence."}, {"text": "The speaker, Love personified, and the mistress", "isCorrect": false, "rationale": "Love is not personified as a third character in this sonnet."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
