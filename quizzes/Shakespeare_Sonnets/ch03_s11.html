<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does “As fast as thou shalt wane, so fast thou grow’st, / In one of thine, from that which thou departest” mean?", "options": [{"text": "As quickly as the youth ages, a child born of him will grow just as fast to replace him.", "isCorrect": true, "rationale": "The opening lines argue that the youth’s aging (“wane”) is exactly offset by a child’s growing: every year the youth loses is mirrored by a year the child gains. The biological continuity is presented as a precise exchange."}, {"text": "The faster the youth grows old, the more quickly he will recover his youth through medicine.", "isCorrect": false, "rationale": "No medical recovery is suggested; the solution is biological continuity through a child."}, {"text": "As the youth’s beauty fades, his wisdom and virtue grow proportionally.", "isCorrect": false, "rationale": "Wisdom or virtue is not what grows to compensate; it is a child (“one of thine”) who replaces the youth’s waning beauty."}, {"text": "The youth grows larger physically as he ages, making up for the loss of youthful agility.", "isCorrect": false, "rationale": "Physical growth in size is not the meaning; “grow’st” refers to the growth of a child, not the youth’s own body."}], "id": "q01"}, {"question": "What does “Herein lives wisdom, beauty, and increase” refer to?", "options": [{"text": "In the act of reproduction: having children is where wisdom, beauty, and growth all reside.", "isCorrect": true, "rationale": "“Herein” = in reproduction; having children is the source of wisdom (knowing how to perpetuate the good), beauty (passing on one’s beauty), and increase (the growth of the family and humanity)."}, {"text": "In the act of reading and studying poetry, where wisdom and beauty are found.", "isCorrect": false, "rationale": "Literary study is not the subject; “herein” refers to the preceding argument about having children."}, {"text": "In the youth’s own person, which combines wisdom, beauty, and vitality.", "isCorrect": false, "rationale": "While the youth possesses these qualities, “herein” refers to the process of reproduction, not to the youth’s person."}, {"text": "In the poet’s verse, which preserves all three qualities for posterity.", "isCorrect": false, "rationale": "Poetry is not the subject here; the three qualities reside in reproduction, not in verse."}], "id": "q02"}, {"question": "What is meant by “Without this folly, age, and cold decay”?", "options": [{"text": "Without reproduction, the alternative is folly (foolishness), age (decline), and cold decay (death without legacy).", "isCorrect": true, "rationale": "The contrast is stark: on one side is wisdom, beauty, and increase (from reproduction); on the other is folly, age, and cold decay (from refusing to reproduce). The three-part contrast reinforces the argument."}, {"text": "Old age causes people to become foolish and their bodies to grow cold.", "isCorrect": false, "rationale": "While aging does involve decline, the point here is that folly, age, and cold decay are the consequences of not reproducing, presented as the opposite of wisdom, beauty, and increase."}, {"text": "Cold weather in old age is especially dangerous for those without families to care for them.", "isCorrect": false, "rationale": "Physical cold is not the “cold” intended; “cold decay” is metaphorical for the lifeless decline of someone who leaves no legacy."}, {"text": "Folly and decay are characteristics of those who marry too young.", "isCorrect": false, "rationale": "No warning against early marriage is given; the contrast is between reproduction and non-reproduction."}], "id": "q03"}, {"question": "What is the significance of the argument: “If all were minded so, the times should cease / And threescore year would make the world away”?", "options": [{"text": "If everyone followed the youth’s example of remaining childless, humanity would be extinct within sixty years (a generation).", "isCorrect": true, "rationale": "“Threescore year” = sixty years (one generation); if everyone chose not to reproduce, within a single generation humanity would cease. This reduces the youth’s selfishness to its logical, absurd conclusion: universal extinction."}, {"text": "If everyone were as beautiful as the youth, the world would be a perfect place within sixty years.", "isCorrect": false, "rationale": "Universal beauty is not the argument; the point is about the extinction that would result from universal non-reproduction."}, {"text": "The world should end after sixty years because by then all beauty will have faded.", "isCorrect": false, "rationale": "No apocalyptic vision is intended; Shakespeare uses the hypothetical to expose the absurdity of non-reproduction."}, {"text": "Sixty years is the minimum time needed to establish a lasting reputation.", "isCorrect": false, "rationale": "Reputation-building is not the subject; the threescore years represent a single human generation, the span needed for extinction if no one reproduced."}], "id": "q04"}, {"question": "What does “Let those whom nature hath not made for store, / Harsh, featureless, and rude, barrenly perish” argue?", "options": [{"text": "Only those who are unattractive, rough, and unpleasant should be allowed to remain childless and die without issue.", "isCorrect": true, "rationale": "Shakespeare grants a perverse permission to the ugly: those whom Nature did not make “for store” (for preservation, for reproduction) may die without legacy. The logic is that this permission conspicuously does not apply to the beautiful youth."}, {"text": "Ugly people are morally inferior and deserve a worse fate than beautiful people.", "isCorrect": false, "rationale": "The argument is not about moral worth but about reproductive obligation; those not gifted with beauty have a lesser obligation to reproduce."}, {"text": "Nature is cruel to some and generous to others, and nothing can change this.", "isCorrect": false, "rationale": "The observation about Nature’s unequal gifts is the premise, not the conclusion; the conclusion is that the gifted have a greater duty."}, {"text": "People of low social status need not concern themselves with leaving heirs.", "isCorrect": false, "rationale": "“Harsh, featureless, and rude” refers to personal beauty and character, not social class."}], "id": "q05"}, {"question": "What does the metaphor “She carv’d thee for her seal, and meant thereby, / Thou shouldst print more, not let that copy die” mean?", "options": [{"text": "Nature carved the youth as a seal (stamp) in order to make multiple prints (copies) — children — from the same beautiful die.", "isCorrect": true, "rationale": "A seal or signet was used to make wax impressions (copies); Nature made the youth as a master seal, designed to produce multiple beautiful “prints.” Dying without children would destroy the seal without ever pressing it."}, {"text": "Nature sealed the youth’s fate and he cannot change it.", "isCorrect": false, "rationale": "“Seal” here is a stamp for making copies, not a fatalistic lock on the youth’s destiny."}, {"text": "The youth should protect his beauty by wearing a seal ring as a symbol of his lineage.", "isCorrect": false, "rationale": "No jewelry is recommended; the seal is a metaphor for the youth as a template designed to produce copies (children)."}, {"text": "Shakespeare sealed his poems in wax so they could be preserved for posterity.", "isCorrect": false, "rationale": "The poet’s own sealing of manuscripts is not the subject; the seal is Nature’s impression of the youth, designed for replication."}], "id": "q06"}, {"question": "What is the logical structure of Sonnet XI?", "options": [{"text": "A single long metaphor of the seal and print, applied throughout all fourteen lines.", "isCorrect": false, "rationale": "The seal metaphor appears only in the couplet; the earlier lines use different arguments and metaphors."}, {"text": "A series of arguments: (1) reproduction compensates for aging; (2) non-reproduction leads to extinction if universal; (3) the unattractive may be excused, but not the beautiful; (4) the seal metaphor confirms Nature’s design.", "isCorrect": true, "rationale": "Sonnet XI is unusually argumentative, building its case through four distinct moves before the seal metaphor clinches the argument in the couplet."}, {"text": "A personal emotional plea by the poet, culminating in a declaration of love.", "isCorrect": false, "rationale": "Personal emotion does not dominate here; the sonnet is more logical and syllogistic than emotional."}, {"text": "A contrast between summer and winter imagery, resolved by the distillation metaphor.", "isCorrect": false, "rationale": "Seasonal and distillation imagery belong to Sonnets V and VI; Sonnet XI uses logical argument and the seal metaphor."}], "id": "q07"}, {"question": "What does “for store” mean in the context of “nature hath not made for store”?", "options": [{"text": "For preservation or laying up — those whom Nature did not design to be preserved and perpetuated through offspring.", "isCorrect": true, "rationale": "“Store” means stock or preserve (as in to store away valuable things); those not made for store are those whose traits do not merit preservation through reproduction."}, {"text": "For working in a shop or place of business.", "isCorrect": false, "rationale": "“Store” here has nothing to do with retail commerce; it means preservation or stock."}, {"text": "For hoarding resources, as opposed to being generous.", "isCorrect": false, "rationale": "While “store” can mean a hoard, in this context it means something worth preserving, not the act of hoarding."}, {"text": "For hard physical labor and agricultural work.", "isCorrect": false, "rationale": "Agricultural work is not the meaning; “for store” means for preservation, designed to be reproduced."}], "id": "q08"}, {"question": "How does the seal-and-print metaphor respond to the youth’s presumed attitude that one copy (himself) is sufficient?", "options": [{"text": "It argues that the original seal is more valuable than any copy, so the youth should preserve himself rather than make inferior children.", "isCorrect": false, "rationale": "This reading is the opposite of Shakespeare’s argument: the seal is valuable precisely because it can and should make multiple prints."}, {"text": "A seal is designed to be pressed into wax multiple times; its purpose is to make copies. Letting the seal die without making any impressions defeats the entire purpose for which Nature made it.", "isCorrect": true, "rationale": "The metaphor perfectly inverts the youth’s logic: he may think one perfect original is enough, but a seal without prints is a seal that has failed its purpose. Nature’s design is for multiplication, not preservation of a single original."}, {"text": "A seal represents legal authority, so the metaphor argues the youth has a legal obligation to have children.", "isCorrect": false, "rationale": "While seals were associated with legal documents, the metaphor’s point is about design and purpose (multiplication), not legal authority."}, {"text": "The seal metaphor suggests the youth should allow an artist to paint multiple copies of his portrait.", "isCorrect": false, "rationale": "Portraiture is not the metaphor; the prints are children, not paintings."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
