        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What structural device organizes the first eight lines of Sonnet XII?", "options": [{"text": "A series of “when” clauses accumulating images of time’s passage before arriving at the conclusion.", "isCorrect": true, "rationale": "Lines 1–10 are organized around “when”: “When I do count,” “When I behold,” “When I see” — an anaphoric catalogue of decay that builds toward the poem’s conclusion about the youth."}, {"text": "A series of rhetorical questions addressed directly to the youth.", "isCorrect": false, "rationale": "Rhetorical questions are not the organizing device; the “when” clauses are observational, not interrogative."}, {"text": "A sonnet built entirely around the metaphor of Time as a soldier.", "isCorrect": false, "rationale": "Time as a soldier appears in Sonnet II’s military imagery; Sonnet XII uses Time’s scythe (reaper) and a catalogue of natural decay."}, {"text": "An alternating pattern of praise and blame for the youth.", "isCorrect": false, "rationale": "No alternating praise-and-blame structure governs the poem; it builds through accumulated images of decay toward a single conclusion."}]}, {"question": "What do “the brave day sunk in hideous night” and “the violet past prime” have in common?", "options": [{"text": "Both are images of beauty at its best.", "isCorrect": false, "rationale": "Both images capture beauty past its peak — day consumed by night, violet past its prime — not beauty at its best."}, {"text": "Both are images of something beautiful or vibrant passing into decay or darkness, illustrating time’s power.", "isCorrect": true, "rationale": "Each “when” clause presents a different instance of time’s destructive passage: day into night, violet past its blooming. Together they create a mounting sense of inevitable loss."}, {"text": "Both are symbols of spiritual darkness and moral corruption.", "isCorrect": false, "rationale": "The images are natural observations about time’s passage, not moral allegories."}, {"text": "Both are drawn from classical mythology and represent fallen heroes.", "isCorrect": false, "rationale": "No classical mythology is invoked; these are observations from the natural world."}]}, {"question": "What does “sable curls all silver’d o’er with white” describe?", "options": [{"text": "Dark hair turned white or gray with age — a human instance of time’s passage alongside the natural images.", "isCorrect": true, "rationale": "“Sable” means black; the image of dark curls turned silver-white is the first human (as opposed to natural) instance of aging in the catalogue, introducing the youth’s own mortality into the sequence of observations."}, {"text": "The silver ornamentation of a dark-haired woman’s elaborate coiffure.", "isCorrect": false, "rationale": "No wealthy woman’s hairstyle is described; the silver over black is the color change of aging hair."}, {"text": "A metaphor for the night sky: black curling clouds silver-edged by moonlight.", "isCorrect": false, "rationale": "While atmospheric imagery might support this reading, in context the black curls turning silver refer to aging human hair."}, {"text": "The youth’s own distinctive hairstyle that makes him recognizable.", "isCorrect": false, "rationale": "The image is about aging (black to silver), not a personal identifying feature."}]}, {"question": "What does “summer’s green all girded up in sheaves, / Borne on the bier with white and bristly beard” describe?", "options": [{"text": "A funeral procession for a farmer who died in his fields.", "isCorrect": false, "rationale": "No literal human funeral is described; the sheaves of grain are a natural image of summer’s end, personified as an old man."}, {"text": "Harvested grain bundled into sheaves and carried like a body on a bier — summer’s vitality dead and bound, personified as an old white-bearded man.", "isCorrect": true, "rationale": "The grain sheaves (summer’s green bound up at harvest) are carried on a bier (a frame for a coffin), and the “white and bristly beard” personifies the dried stalks of grain as an old man — summer itself aging and dying."}, {"text": "An image of winter approaching, with frost covering the fields.", "isCorrect": false, "rationale": "The image is of the harvest — summer’s end — not winter’s arrival; the white beard is the dried grain, not frost."}, {"text": "A soldier returning from battle, his hair white from the shock of combat.", "isCorrect": false, "rationale": "No soldier is present; the bier and white beard belong to the personified figure of harvest/summer in its old age."}]}, {"question": "What is the effect of the word “bier” in the eighth line?", "options": [{"text": "It introduces the bittersweet association of harvest (abundance) with mortality (the bier as a funeral frame), linking productivity with death.", "isCorrect": true, "rationale": "A bier is the frame used to carry a coffin; by placing the summer’s harvest on a bier, Shakespeare fuses abundance and death, making the harvest itself a kind of funeral for the year’s vitality."}, {"text": "It is a spelling variant of “beer,” suggesting the harvest of barley for ale.", "isCorrect": false, "rationale": "“Bier” (funeral frame) is the correct word, not a spelling variant of the beverage."}, {"text": "It signals a shift in tone from sad observation to hopeful resolution.", "isCorrect": false, "rationale": "The bier deepens the elegiac tone; the resolution (breed as defense against Time) does not come until the couplet."}, {"text": "It alludes to the mythological figure of Bacchus, god of the harvest.", "isCorrect": false, "rationale": "No Bacchic allusion is present; the bier is a specifically funereal image, not mythological."}]}, {"question": "What does “the wastes of time” mean in line 10?", "options": [{"text": "The hours of the day that are wasted in idleness.", "isCorrect": false, "rationale": "“Wastes” here means desolations or ruins, not wasted time in the sense of laziness."}, {"text": "The ruined, wasted landscape left by Time’s passage — everything that Time destroys.", "isCorrect": true, "rationale": "“Wastes” is a noun (not a verb) meaning desolate ruins or destruction; “the wastes of time” is everything ravaged and left desolate by time’s passage."}, {"text": "The years of the youth’s life that he has squandered in vanity.", "isCorrect": false, "rationale": "While the youth has wasted time, “wastes of time” is a general image of time’s destructive residue, not a specific reference to the youth’s personal waste."}, {"text": "A polite way of referring to the aging process.", "isCorrect": false, "rationale": "The term is more vivid and terrible than a polite euphemism; it pictures the landscape of devastation that Time leaves behind."}]}, {"question": "What does “Time’s scythe” symbolize?", "options": [{"text": "Time personified as the Grim Reaper — Death’s instrument that mows down all living things.", "isCorrect": true, "rationale": "Time’s scythe is an iconic image from classical and medieval iconography: Time (or Death) carries a scythe that cuts down life as a farmer cuts grain. It is also consistent with the harvest imagery of the poem."}, {"text": "A farmer’s tool representing productive labor and the reward of harvest.", "isCorrect": false, "rationale": "While the scythe is a farming tool, in this context it is in the hands of Time/Death and represents destructive mowing, not productive labor."}, {"text": "A symbol of justice, like the scales of a judge.", "isCorrect": false, "rationale": "Justice’s symbol is scales, not a scythe; the scythe belongs to Time and Death."}, {"text": "A metaphor for the poet’s pen cutting through difficult language.", "isCorrect": false, "rationale": "No connection between the scythe and the poet’s writing is made; the scythe represents Time’s destruction."}]}, {"question": "What is the couplet’s proposed defense against Time’s scythe?", "options": [{"text": "Strong virtue and moral goodness, which Time cannot destroy.", "isCorrect": false, "rationale": "Virtue is not the proposed defense; the couplet’s answer is explicitly “breed.”"}, {"text": "Breed (having children) — offspring are the only thing that can defy Time when it comes for the individual.", "isCorrect": true, "rationale": "The couplet — “And nothing ‘gainst Time’s scythe can make defence / Save breed, to brave him when he takes thee hence” — declares that children (breed) are the only effective answer to Time’s fatal scythe."}, {"text": "Poetry and written verse, which preserve the youth’s beauty beyond the reach of Time.", "isCorrect": false, "rationale": "Poetry as a defense against Time is introduced in later sonnets; in Sonnet XII, the only defense is biological reproduction."}, {"text": "Cultivating friendship and love, which protect the heart from the fear of death.", "isCorrect": false, "rationale": "Friendship and love are not offered as defenses in this sonnet; the answer is specifically “breed.”"}]}, {"question": "What does “to brave him when he takes thee hence” mean?", "options": [{"text": "To stand up to and defy Time (personified) at the moment of one’s death by having left children behind.", "isCorrect": true, "rationale": "“Brave” means to face defiantly or challenge; “when he takes thee hence” is when Time/Death carries the individual away. Offspring “brave” Time by ensuring the parent’s beauty outlives the parent’s death."}, {"text": "To behave courageously while dying, maintaining dignity in one’s final moments.", "isCorrect": false, "rationale": "Personal bravery at the moment of death is not the argument; the defiance of Time is achieved through children, not personal courage."}, {"text": "To challenge Time to a contest and hope to win through youth and beauty.", "isCorrect": false, "rationale": "No contest or challenge is possible against Time; the only “defense” is the passive but powerful act of reproduction."}, {"text": "To travel away from home before Time can find you.", "isCorrect": false, "rationale": "“Hence” means from this life (death), not from a physical location; no travel is proposed."}]}, {"question": "How does the anaphoric structure (“when” clauses) contribute to the poem’s emotional effect?", "options": [{"text": "It creates an accelerating rhythm that mimics Time’s relentless pace, making the reader feel the mounting pressure of decay before the couplet’s relief.", "isCorrect": true, "rationale": "The accumulation of “when” clauses — clock, day/night, violet, curls, trees, summer/harvest — piles image upon image of decay, creating a sense of inevitability and weight that makes the couplet’s single answer (“save breed”) feel both urgent and insufficient."}, {"text": "It slows the poem down, giving the reader time to contemplate each image in isolation.", "isCorrect": false, "rationale": "The anaphora accelerates rather than slows; the images accumulate to create pressure."}, {"text": "It is a mechanical device that simply provides grammatical structure without emotional effect.", "isCorrect": false, "rationale": "Anaphora is a deliberately rhetorical device with strong emotional effects; “when” repeated creates expectation and mounting dread."}, {"text": "It imitates the ticking of the clock mentioned in line 1, making the poem’s rhythm metronomic.", "isCorrect": false, "rationale": "While the clock is the poem’s opening image, the anaphora’s effect is cumulative argument rather than metronomic imitation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
