    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker concede at the opening of Sonnet LXXXII?", "options": [{"text": "That the rival is a better poet than himself in every respect", "isCorrect": false, "rationale": "The speaker concedes only the youth's freedom to read others, not the rival's superiority."}, {"text": "That the youth was not bound exclusively to the speaker's Muse", "isCorrect": true, "rationale": "Line 1 opens: 'I grant thou wert not married to my Muse,' acknowledging that the youth was never obligated to receive verse from the speaker alone."}, {"text": "That his verse has failed to capture the youth's true nature", "isCorrect": false, "rationale": "While the speaker acknowledges limitations of praise, his concession at the opening is specifically about the youth's freedom, not the failure of his own verse."}, {"text": "That reading other poets' work will corrupt the youth's taste", "isCorrect": false, "rationale": "The speaker grants the youth freedom to read others; he does not suggest this is corrupting."}], "id": "q01"}, {"question": "What does 'without attaint o'erlook' (line 2) mean in this context?", "options": [{"text": "To read over other writers' dedications without disgrace or stain to his character", "isCorrect": true, "rationale": "'Attaint' means disgrace or corruption; 'without attaint o'erlook' means the youth can read other poets' dedicated words without it reflecting badly on him."}, {"text": "To look over the speaker's shoulder while he writes without disturbing him", "isCorrect": false, "rationale": "This is a literal misreading; 'o'erlook' means to read over or peruse, and 'attaint' is a moral/legal term for corruption or disgrace."}, {"text": "To ignore other poets entirely out of loyalty to the speaker", "isCorrect": false, "rationale": "The speaker grants the opposite — that the youth can read others freely without any obligation to ignore them."}, {"text": "To review other poets' manuscripts before allowing them to be published", "isCorrect": false, "rationale": "No editorial gatekeeping role for the youth is suggested; the phrase describes the youth's freedom to read others."}], "id": "q02"}, {"question": "Why does the speaker say the youth is 'enforced to seek anew / Some fresher stamp of the time-bettering days'?", "options": [{"text": "Because the youth has grown bored with all poetry and needs a new hobby", "isCorrect": false, "rationale": "The reason is not boredom but the fact that the youth's worth exceeds what the speaker's praise can capture, requiring newer, more capable expression."}, {"text": "Because the youth's worth surpasses the speaker's praise, compelling him to seek newer poetic expression", "isCorrect": true, "rationale": "Lines 7-10 argue that the youth finds his worth beyond the speaker's praise and is therefore compelled to seek the fresher poetic stamp that the current era of improving arts can offer."}, {"text": "Because fashions in poetry have changed and the speaker's style is outdated", "isCorrect": false, "rationale": "While 'time-bettering days' acknowledges poetic progress, the reason the youth must seek anew is his own surpassing worth, not merely changing fashion."}, {"text": "Because the speaker has stopped writing and left a gap the rival fills", "isCorrect": false, "rationale": "The speaker has not stopped writing; the issue is that the youth's worth exceeds what praise can measure."}], "id": "q03"}, {"question": "What does the speaker grant the youth permission to do in lines 11-12, and what follows?", "options": [{"text": "To seek other poets, but with the expectation of returning to the speaker's sincere verse", "isCorrect": true, "rationale": "'And do so, love' grants permission to seek other poets, but the 'yet' introduces the contrast: when those poets have deployed all their strained rhetorical touches, the youth will find the speaker's plain words were the truest."}, {"text": "To seek other poets and never return, since the speaker releases him entirely", "isCorrect": false, "rationale": "The speaker grants permission but immediately qualifies it with the argument that the rivals' strained touches will ultimately prove inferior."}, {"text": "To correct other poets' verse using the speaker's principles of composition", "isCorrect": false, "rationale": "No editorial role for the youth is envisioned; the permission is simply to read or be praised by others."}, {"text": "To compare the rival's verse to the speaker's and judge which is more flattering", "isCorrect": false, "rationale": "No formal comparison is requested; the speaker argues the superiority of plain speech implicitly, not by inviting judgment."}], "id": "q04"}, {"question": "What does the speaker mean by 'strained touches rhetoric can lend' (line 12)?", "options": [{"text": "The natural musical quality that good verse produces when read aloud", "isCorrect": false, "rationale": "'Strained' carries a negative connotation — forced, unnatural — indicating the speaker's criticism of the rival's elaborate style."}, {"text": "The forced, artificial ornaments of style that elaborate rhetoric adds but that ring false", "isCorrect": true, "rationale": "'Strained' means forced or unnatural, and 'touches rhetoric can lend' means ornamental devices borrowed from rhetorical training. The speaker implies these devices are artificial compared to his own plain sincerity."}, {"text": "The careful attention to detail that separates skilled poets from amateurs", "isCorrect": false, "rationale": "The speaker's use of 'strained' is critical, not admiring; he views rhetorical elaboration as a mark against the rivals, not a sign of skill."}, {"text": "The emotional strain visible in verse written out of genuine feeling", "isCorrect": false, "rationale": "'Strained' here refers to artificiality and force, not authentic emotional effort; the speaker contrasts it with his own true plain words."}], "id": "q05"}, {"question": "How does the speaker describe himself in relation to the youth in line 14?", "options": [{"text": "As the youth's equal in beauty and worth", "isCorrect": false, "rationale": "No claim of equality with the youth is made; the speaker identifies himself as the youth's honest mirror."}, {"text": "As the youth's 'true-telling friend' who expressed him in 'true plain words'", "isCorrect": true, "rationale": "Line 14 reads: 'In true plain words, by thy true-telling friend,' positioning the speaker as the honest, plainspoken companion whose verse was the authentic representation of the youth."}, {"text": "As the youth's rival, competing for the same audience", "isCorrect": false, "rationale": "The speaker positions himself as the youth's friend and honest witness, not as a rival competing for the same readers."}, {"text": "As a superior craftsman whose plain style required more skill than the rivals' rhetoric", "isCorrect": false, "rationale": "The speaker claims sincerity and truth, not technical superiority; 'plain words' is a moral claim, not primarily an aesthetic one."}], "id": "q06"}, {"question": "What argument does the couplet make about the rivals' 'gross painting'?", "options": [{"text": "The rivals' elaborate praise would be better used on those who need it — like pale, bloodless cheeks — since the youth already has natural beauty", "isCorrect": true, "rationale": "The couplet reads: 'And their gross painting might be better us'd / Where cheeks need blood; in thee it is abus'd,' arguing that heavy rhetorical cosmetics suit subjects who lack natural beauty, but applied to the naturally beautiful youth they are wasted and false."}, {"text": "The rivals' verse is too crude and should be polished before being offered to the youth", "isCorrect": false, "rationale": "'Gross painting' refers to extravagant praise, not to crudeness of craft; the problem is excess, not roughness."}, {"text": "The rivals paint the youth's portrait accurately but fail to capture his inner character", "isCorrect": false, "rationale": "No literal portrait is involved; 'painting' is a metaphor for elaborate rhetorical praise, which the speaker argues is applied falsely to one who doesn't need it."}, {"text": "The rivals' descriptions are so exaggerated they make the youth unrecognizable", "isCorrect": false, "rationale": "While excessive praise is the problem, the specific argument is that the cosmetic rhetoric belongs on those who lack natural beauty, not on one who has it."}], "id": "q07"}, {"question": "The phrase 'time-bettering days' (line 10) suggests:", "options": [{"text": "That the present age is morally superior to the past", "isCorrect": false, "rationale": "The reference is specifically to poetic and artistic improvement, not moral progress; the context is about new poetic styles."}, {"text": "That the current era has produced improved poetic forms and techniques", "isCorrect": true, "rationale": "'Time-bettering days' acknowledges that later times develop more refined and current poetic styles, which is why the youth seeks 'fresher stamp' — the latest poetic currency."}, {"text": "That only the newest poetry can hope to survive the test of time", "isCorrect": false, "rationale": "The speaker is granting that newer styles are available, not arguing that only new verse endures; his own plain-spoken older verse is implicitly defended as more truthful."}, {"text": "That the youth's beauty grows better with every passing day", "isCorrect": false, "rationale": "'Time-bettering days' modifies the era of poetic production, not the youth's physical appearance."}], "id": "q08"}, {"question": "The central rhetorical move of Sonnet LXXXII is to:", "options": [{"text": "Aggressively attack the rivals as thieves who have stolen the youth's own virtues", "isCorrect": false, "rationale": "The theft argument belongs to Sonnet LXXIX; here the speaker's strategy is to grant the youth freedom while arguing for the superiority of plain sincerity over rhetorical excess."}, {"text": "Concede that the youth may seek other poets while arguing that plain sincerity ultimately surpasses ornate rhetoric", "isCorrect": true, "rationale": "The sonnet grants the youth's freedom, acknowledges the rival's technical resources, but then argues that true plain words from a true-telling friend surpass all strained rhetorical touches — making generosity itself the speaker's strongest argument."}, {"text": "Prove through metaphor that the speaker's verse will outlast the rivals' by centuries", "isCorrect": false, "rationale": "No explicit claim about lasting longer than rivals appears; the argument is about sincerity versus ornament, not temporal survival."}, {"text": "Threaten the youth that excessive praise from rivals will corrupt his character", "isCorrect": false, "rationale": "No threat of character corruption is made; the speaker warns only that excessive rhetoric is 'abused' on one who doesn't need it, which is an aesthetic rather than moral argument."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
