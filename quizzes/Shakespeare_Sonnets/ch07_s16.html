<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker mean by “that fell arrest / Without all bail shall carry me away” (lines 1–2)?", "options": [{"text": "The speaker fears imprisonment for a crime", "isCorrect": false, "rationale": "The “arrest” is a legal metaphor for death, not literal imprisonment."}, {"text": "Death, which will take the speaker with no possibility of release or ransom", "isCorrect": true, "rationale": "“Fell arrest” means cruel/deadly arrest; “without all bail” means no release is possible — death is a final, unconditional arrest."}, {"text": "The passage of time that inevitably claims all things", "isCorrect": false, "rationale": "While time is related, the legal metaphor of arrest and bail specifically represents death."}, {"text": "The beloved’s absence that the speaker cannot buy off with any gift", "isCorrect": false, "rationale": "The metaphor refers to death, not to separation from the beloved."}]}, {"question": "What does “My life hath in this line some interest” (line 3) mean?", "options": [{"text": "The speaker has a financial stake in the outcome of the poem", "isCorrect": false, "rationale": "While “interest” has financial overtones (a claim or stake), the line means the poem gives the speaker’s life a continued presence."}, {"text": "The poem (this line of verse) contains a portion of the speaker’s life that will remain after death", "isCorrect": true, "rationale": "“Interest” means a claim or portion; the line of poetry holds a part of the speaker’s life that will stay with the beloved as a memorial."}, {"text": "The speaker is interested in life only because of the beloved", "isCorrect": false, "rationale": "The line uses “interest” in a legal/financial sense (a stake or share), not in the sense of curiosity or enthusiasm."}, {"text": "The speaker’s life depends on the beloved reading the poem", "isCorrect": false, "rationale": "The poem gives the speaker’s life a memorial presence; it does not say life depends on being read."}]}, {"question": "How does the speaker distinguish between the body and the spirit in lines 7–10?", "options": [{"text": "The body is immortal and the spirit dies with the flesh", "isCorrect": false, "rationale": "The opposite: the spirit (the better part) is what the beloved retains through the poem."}, {"text": "The earth takes the body (mere dregs), while the spirit — the better part — remains with the beloved in verse", "isCorrect": true, "rationale": "Lines 7–10: “The earth can have but earth, which is his due; / My spirit is thine, the better part of me.” The body is base; the spirit/verse endures."}, {"text": "Both body and spirit are equally claimed by the earth after death", "isCorrect": false, "rationale": "The spirit is given to the beloved through verse, not to the earth."}, {"text": "The spirit returns to God while the body goes to the earth", "isCorrect": false, "rationale": "The speaker’s spirit goes to the beloved (in the poem), not specifically to God; the framework is secular."}]}, {"question": "What does “the dregs of life” (line 11) refer to?", "options": [{"text": "The speaker’s most cherished memories from the end of his life", "isCorrect": false, "rationale": "“Dregs” means the worthless residue left at the bottom; the body is the worthless sediment of life."}, {"text": "The physical body, which is the worthless remainder (like sediment) once the spirit has departed", "isCorrect": true, "rationale": "“Dregs” is from winemaking: the sediment left after the valuable liquid is poured off. The body (dregs) is all that remains after the spirit departs."}, {"text": "The final days of old age when life’s pleasures are gone", "isCorrect": false, "rationale": "The dregs specifically refer to the body after death, not the end of old age."}, {"text": "The grief that remains in those who are left behind after a death", "isCorrect": false, "rationale": "The dregs are the speaker’s own body, not the emotional residue of grief in survivors."}]}, {"question": "What does the couplet assert about the poem?", "options": [{"text": "The poem is worth nothing but will be kept out of duty", "isCorrect": false, "rationale": "The couplet asserts the poem’s worth comes from what it contains (the spirit), and that spirit remains with the beloved."}, {"text": "The worth of the poem lies in the spirit it contains, and that spirit (the poem) remains with the beloved", "isCorrect": true, "rationale": "Lines 15–16: “The worth of that is that which it contains, / And that is this, and this with thee remains.”"}, {"text": "The poem will be passed down to future generations", "isCorrect": false, "rationale": "The couplet focuses on the poem’s remaining with the beloved specifically, not with future generations."}, {"text": "The poem is a mirror that reflects the beloved’s beauty back at him", "isCorrect": false, "rationale": "The mirror metaphor belongs to other sonnets; LXXIV’s couplet focuses on the spirit contained in and preserved by the poem."}]}, {"question": "What legal metaphors appear in Sonnet LXXIV?", "options": [{"text": "Arrest, bail, interest, and consecrate", "isCorrect": true, "rationale": "All four terms have legal resonance: arrest (seizure), bail (release by payment), interest (a legal stake/claim), and consecrate (dedicated or set apart, with a legal dimension of binding commitment)."}, {"text": "Conquest, knife, prey, and worm", "isCorrect": false, "rationale": "These are military and natural imagery terms, not legal metaphors."}, {"text": "Dregs, clay, body, and spirit", "isCorrect": false, "rationale": "These terms draw on physical, elemental, and spiritual registers, not primarily legal ones."}, {"text": "Memorial, review, stay, and base", "isCorrect": false, "rationale": "While “base” can have legal meaning, this group is not the primary cluster of legal metaphors in the sonnet."}]}, {"question": "How does Sonnet LXXIV contrast with the themes of Sonnets LXXI and LXXII?", "options": [{"text": "LXXIV agrees with LXXI and LXXII that the beloved should completely forget the speaker", "isCorrect": false, "rationale": "LXXIV offers a positive consolation (the spirit remains in verse) rather than asking for forgetting."}, {"text": "Where LXXI and LXXII ask the beloved to forget, LXXIV offers consolation: the speaker’s spirit persists in the verse as the better part", "isCorrect": true, "rationale": "LXXI and LXXII request forgetting and erasure; LXXIV says the beloved has lost only the dregs (body); the better part (spirit) remains in the poem."}, {"text": "LXXIV expresses despair while LXXI and LXXII express hope", "isCorrect": false, "rationale": "LXXIV is the more consoling of the three; LXXI and LXXII are more self-deprecating."}, {"text": "All three sonnets make the same argument about verse and memory", "isCorrect": false, "rationale": "The three sonnets make different arguments: LXXI asks for no mourning, LXXII asks for forgetting, LXXIV offers consolation through verse."}]}, {"question": "What does the phrase “coward conquest of a wretch’s knife” (line 13) mean?", "options": [{"text": "The body has been killed by a cowardly murderer", "isCorrect": false, "rationale": "The line is metaphorical: death (like a cowardly wretch with a knife) takes the body, which is so base it is beneath the beloved’s remembrance."}, {"text": "Death’s capture of the body is called a cowardly conquest because the body is so base it is unworthy of the beloved’s grief", "isCorrect": true, "rationale": "Death conquers the body with a wretch’s (lowly thief’s) knife — a cowardly victory over something already worthless. The body is “too base of thee to be remembered.”"}, {"text": "A rival has conquered the beloved’s heart through treachery", "isCorrect": false, "rationale": "The wretch’s knife is death taking the body, not a rival."}, {"text": "The speaker died in a shameful way and asks the beloved to forgive the manner of his death", "isCorrect": false, "rationale": "The manner of death is not the point; the image is about the worthlessness of the body compared to the spirit."}]}, {"question": "What does “this with thee remains” in the final line refer to?", "options": [{"text": "The speaker’s physical remains buried near the beloved", "isCorrect": false, "rationale": "The body goes to earth; it is the poem (the spirit) that remains with the beloved."}, {"text": "The poem itself, which contains the speaker’s spirit and stays with the beloved after death", "isCorrect": true, "rationale": "The demonstrative “this” in line 16 refers to the very poem being read — the act of pointing at the text itself."}, {"text": "The beloved’s own memory of the speaker", "isCorrect": false, "rationale": "While memory is related, “this” points to the poem as a tangible object that stays with the beloved."}, {"text": "The spirit of the speaker that watches over the beloved from the afterlife", "isCorrect": false, "rationale": "The spirit is said to be in the poem (“this line”), not hovering in the afterlife."}]}, {"question": "What is the effect of the repeated demonstratives in the final couplet (“that,” “that,” “this,” “this”)?", "options": [{"text": "They create confusion about what the speaker is referring to", "isCorrect": false, "rationale": "The repetition is a deliberate rhetorical flourish that creates a sense of the poem pointing to itself."}, {"text": "They perform the act of pointing: the poem gestures at its own lines as the very thing that contains and remains", "isCorrect": true, "rationale": "“The worth of that is that which it contains, / And that is this, and this with thee remains” — “that” is the body/poem as container; “this” is the content/spirit; the shifters make the poem self-referential."}, {"text": "They represent the speaker’s hesitation and self-doubt in the final moment", "isCorrect": false, "rationale": "The couplet is confident and declarative, not hesitant."}, {"text": "They are a grammatical error in the original text", "isCorrect": false, "rationale": "The repetition is deliberate and rhetorically sophisticated."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
