        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What similes does the speaker use to describe the beloved’s importance to him in lines 1–2?", "options": [{"text": "The beloved is like sunlight to a plant and wind to a sail", "isCorrect": false, "rationale": "The similes used are food to life, and sweet-seasoned showers to the ground."}, {"text": "The beloved is like food to life and like sweet-seasoned showers to the ground", "isCorrect": true, "rationale": "Lines 1–2: “So are you to my thoughts as food to life, / Or as sweet-season’d showers are to the ground.”"}, {"text": "The beloved is like gold to a miser and water to a desert traveler", "isCorrect": false, "rationale": "Gold and desert water are not the similes used; the comparison is to food and rain."}, {"text": "The beloved is like air to breath and fire to warmth", "isCorrect": false, "rationale": "Air and fire are not the similes; the beloved is compared to food and rain."}]}, {"question": "What comparison does the speaker make between himself and a miser (lines 3–4)?", "options": [{"text": "Both hoard their treasure and refuse to share it with the world", "isCorrect": false, "rationale": "The miser comparison specifically concerns the strife or anxiety of possessing and fearing to lose, not simply hoarding."}, {"text": "Both experience a painful tension between enjoying their treasure and fearing it will be stolen", "isCorrect": true, "rationale": "Lines 3–4: “and for the peace of you I hold such strife / As ’twixt a miser and his wealth is found.” The miser’s anxiety over his hoard mirrors the speaker’s anxiety over the beloved."}, {"text": "Both waste their treasure through excessive love", "isCorrect": false, "rationale": "The miser does not waste; the anxiety is about losing, not spending."}, {"text": "Both value wealth over all human relationships", "isCorrect": false, "rationale": "The comparison is about anxious possession, not about prioritizing wealth over relationships."}]}, {"question": "What oscillation does the speaker describe in lines 5–10?", "options": [{"text": "Between writing poetry and refusing to write", "isCorrect": false, "rationale": "The oscillation is emotional and relational — between pride in possessing the beloved and fear of losing him."}, {"text": "Between proud enjoyment of the beloved’s presence and fearful anxiety about losing him to the thieving age", "isCorrect": true, "rationale": "Lines 5–8: “Now proud as an enjoyer, and anon / Doubting the filching age will steal his treasure” — alternating pride and fear."}, {"text": "Between wanting to be alone with the beloved and wanting to show off the beloved to the world", "isCorrect": false, "rationale": "This is part of the oscillation in lines 9–10, but the primary oscillation introduced in lines 5–8 is pride vs. fear of loss."}, {"text": "Between loving the beloved with all his heart and doubting the beloved’s faithfulness", "isCorrect": false, "rationale": "The speaker’s doubt is about the “filching age” stealing the beloved, not about the beloved’s own faithfulness."}]}, {"question": "What does “the filching age” (line 8) mean?", "options": [{"text": "An era that is culturally impoverished and lacks creativity", "isCorrect": false, "rationale": "“Filching” means pilfering or stealing; the age is characterized as thievish, threatening to steal the beloved."}, {"text": "The present era, personified as a thief that might steal away the beloved and the speaker’s happiness", "isCorrect": true, "rationale": "“Filching” means petty theft; the age is a thief that could steal the beloved away — through time, rival affections, or death."}, {"text": "Old age that steals the speaker’s health and vigor", "isCorrect": false, "rationale": "The filching age threatens the beloved (the “treasure”), not the speaker’s own health."}, {"text": "A corrupt period of history that corrupts morals", "isCorrect": false, "rationale": "The corruption here is about loss through theft (time’s taking the beloved), not moral decay."}]}, {"question": "What does the final couplet “Or gluttoning on all, or all away” mean?", "options": [{"text": "The speaker alternates between overindulgence and complete deprivation in his love for the beloved", "isCorrect": true, "rationale": "Lines 15–16: “Thus do I pine and surfeit day by day, / Or gluttoning on all, or all away.” He either feasts on the beloved’s presence or is completely starved of it."}, {"text": "The speaker is literally alternating between overeating and fasting as a spiritual discipline", "isCorrect": false, "rationale": "The language of feasting and starvation is a metaphor for emotional experience, not literal diet."}, {"text": "The speaker gives the beloved all he has or nothing at all", "isCorrect": false, "rationale": "The speaker’s own condition is described (feast or famine emotionally), not the amount he gives."}, {"text": "The miser either spends all his gold or hoards it entirely", "isCorrect": false, "rationale": "The miser metaphor was used earlier; the couplet shifts to the glutton metaphor."}]}, {"question": "What does the alimentary (food/eating) imagery throughout the sonnet achieve?", "options": [{"text": "It shows that the speaker’s love is purely physical and sensual", "isCorrect": false, "rationale": "The food imagery conveys emotional necessity and addiction, not merely physical appetite."}, {"text": "It conveys the beloved as essential nourishment and the love as an obsessive, consuming appetite", "isCorrect": true, "rationale": "Food as life-sustaining necessity (lines 1–2), feasting on sight (line 11), starving for a look (line 12), and gluttoning (line 16) all develop the beloved as the speaker’s all-consuming emotional sustenance."}, {"text": "It places the sonnet in a domestic household setting", "isCorrect": false, "rationale": "The setting is emotional and psychological, not domestic."}, {"text": "It implies the speaker is literally ill and unable to eat", "isCorrect": false, "rationale": "The physical hunger is a metaphor for emotional longing, not literal illness."}]}, {"question": "What does “Sometime all full with feasting on your sight” (line 11) describe?", "options": [{"text": "A lavish dinner the speaker shares with the beloved", "isCorrect": false, "rationale": "The feasting is on the beloved’s sight (visual presence), not on food."}, {"text": "The speaker’s emotional satiety when in the beloved’s presence", "isCorrect": true, "rationale": "Gazing at the beloved provides emotional fullness; the sight of the beloved is the feast."}, {"text": "The speaker’s artistic satisfaction after completing a poem about the beloved", "isCorrect": false, "rationale": "The feast is on “your sight” (the beloved’s appearance), not on creative achievement."}, {"text": "The speaker’s pride when showing the beloved to others", "isCorrect": false, "rationale": "The feasting is private and personal, not about public display."}]}, {"question": "The verb “pine” in line 15 means:", "options": [{"text": "To grow stronger through hardship", "isCorrect": false, "rationale": "“Pine” means to waste away with longing or grief, not to grow stronger."}, {"text": "To waste away with longing or desire", "isCorrect": true, "rationale": "“Thus do I pine and surfeit day by day” — pining is the wasting, hungering state; surfeiting is the overfull state. Both are extremes."}, {"text": "To feel contentment and peace", "isCorrect": false, "rationale": "Pining is the opposite of contentment; it is restless longing."}, {"text": "To think deeply about philosophical questions", "isCorrect": false, "rationale": "The word here is used in its emotional sense of yearning/wasting, not philosophical contemplation."}]}, {"question": "What is the emotional register of Sonnet LXXV compared to Sonnets LXXI–LXXIV?", "options": [{"text": "LXXV is calmer and more philosophical than the preceding sonnets", "isCorrect": false, "rationale": "LXXV is more intensely anxious and oscillating than most of the preceding sonnets."}, {"text": "LXXV is more emotionally turbulent, depicting a restless oscillation of feeling rather than steady grief or consolation", "isCorrect": true, "rationale": "The preceding sonnets tend toward stable tones (request for forgetting, consolation through verse); LXXV swings between extremes — feasting/starving, proud/doubting — creating emotional turbulence."}, {"text": "LXXV is the most resolved and peaceful of the group", "isCorrect": false, "rationale": "The couplet ends in continued oscillation (“or gluttoning on all, or all away”), not resolution."}, {"text": "LXXV deals with physical aging rather than emotional states", "isCorrect": false, "rationale": "LXXV is primarily about the emotional experience of loving the beloved, not about aging."}]}, {"question": "What does “No delight / Save what is had, or must from you be took” (lines 13–14) mean?", "options": [{"text": "The speaker takes no pleasure in life beyond what the beloved gives or will give him", "isCorrect": true, "rationale": "The speaker’s only delight is either what he currently has from the beloved or what he must take (derive) from the beloved: no other source of delight exists."}, {"text": "The speaker steals delight from the beloved against the beloved’s will", "isCorrect": false, "rationale": "“Took” here means derived or drawn from, not stolen by force."}, {"text": "The speaker enjoys only his past memories of the beloved, not the present", "isCorrect": false, "rationale": "The lines describe both present possession (“what is had”) and what must be drawn from the beloved, not only memories."}, {"text": "The speaker admits he takes more from the beloved than he gives in return", "isCorrect": false, "rationale": "The lines are about the source of delight (the beloved), not about an imbalance in giving and taking between them."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
