<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What quality do 'they' in the first quatrain of Sonnet XCIV possess?", "options": [{"text": "They are openly kind and generous with their power", "isCorrect": false, "rationale": "The praised quality is restraint, not open generosity; they do not use the power they have."}, {"text": "They have power to hurt but choose not to exercise it, remaining cold and unmoved", "isCorrect": true, "rationale": "Lines 1-4 describe people who could wound others but refrain, who do not do what they appear capable of, who move others while remaining themselves unmoved and cold."}, {"text": "They are completely without power or influence", "isCorrect": false, "rationale": "They clearly have power; the quality is that they choose not to use it harmfully."}, {"text": "They are passionately loving and demonstrative", "isCorrect": false, "rationale": "Being unmoved and cold is the opposite of passionate; the quality praised is self-containment."}], "id": "q01"}, {"question": "What does 'they rightly do inherit heaven's graces' suggest about those who restrain their power?", "options": [{"text": "They will go to heaven when they die", "isCorrect": false, "rationale": "This is not a promise of literal heaven but a statement about deserving good fortune and grace in this life."}, {"text": "Their restraint makes them the rightful possessors of natural excellence and divine favor", "isCorrect": true, "rationale": "To inherit heaven's graces means to rightfully possess the gifts of nature and providence; those who restrain their power are the true inheritors of grace, not those who abuse it."}, {"text": "They have been granted powers by God to govern others", "isCorrect": false, "rationale": "No divine commission to govern is implied; the inheritance is of grace, not authority."}, {"text": "They are praised by religious institutions", "isCorrect": false, "rationale": "The praise is moral and natural, not institutional."}], "id": "q02"}, {"question": "What does 'husband nature's riches from expense' mean?", "options": [{"text": "To marry into wealth from nature", "isCorrect": false, "rationale": "'Husband' here is a verb meaning to conserve or manage carefully, not to marry."}, {"text": "To carefully conserve and not squander the gifts of nature", "isCorrect": true, "rationale": "'Husband' as a verb means to manage thriftily; 'expense' means expenditure or waste. Those who restrain their power save rather than squander natural gifts."}, {"text": "To charge others for the benefits of nature", "isCorrect": false, "rationale": "No commercial transaction is implied; the phrase is about conservation, not selling."}, {"text": "To keep their wealth hidden from view", "isCorrect": false, "rationale": "Hiding is not the meaning; wise stewardship and conservation are the ideas."}], "id": "q03"}, {"question": "What is the contrast drawn between those who 'own their faces' and 'stewards of their excellence'?", "options": [{"text": "Face-owners are wealthy; stewards are servants", "isCorrect": false, "rationale": "This misreads the metaphor; the contrast is about genuine ownership of character versus mere administration of someone else's virtue."}, {"text": "Those who are lords of their own faces truly possess their virtue; others merely serve or display another's excellence without owning it", "isCorrect": true, "rationale": "To be 'lord and owner' of one's face means to be authentically self-possessed; a steward manages what belongs to another. The contrast is between genuine self-mastery and derivative or performed virtue."}, {"text": "Beautiful faces are owned; plain faces are borrowed", "isCorrect": false, "rationale": "The distinction is about character and restraint, not about physical beauty."}, {"text": "Stewards are morally superior to lords and owners", "isCorrect": false, "rationale": "The hierarchy runs the other way; lords and owners have the higher status in this metaphor."}], "id": "q04"}, {"question": "In the summer flower analogy (lines 9-14), what happens to the flower that 'meets base infection'?", "options": [{"text": "It recovers and blooms more beautifully", "isCorrect": false, "rationale": "The infected flower does not recover; it is overcome and surpassed even by weeds."}, {"text": "Its dignity is overthrown — even the basest weed outshines it in worth", "isCorrect": true, "rationale": "The flower that was sweet and self-contained becomes, once infected, lower even than a weed. Corruption destroys all prior excellence."}, {"text": "It spreads the infection to surrounding flowers", "isCorrect": false, "rationale": "No spreading of infection is described; the focus is on the single flower's personal degradation."}, {"text": "It is plucked before it can fully bloom", "isCorrect": false, "rationale": "The flower blooms but is then infected; its fate is not premature harvesting."}], "id": "q05"}, {"question": "What is the famous closing couplet of Sonnet XCIV and what does it mean?", "options": [{"text": "'Lilies that fester, smell far worse than weeds' — beauty corrupted becomes more offensive than ordinary badness", "isCorrect": true, "rationale": "The couplet generalizes the flower analogy into a moral principle: the sweetest things (lilies, beautiful and self-restrained beings) are the worst when they corrupt, because the fall from ideal to corrupt is greater."}, {"text": "'The summer's flower is to the summer sweet' — nature is always beautiful in its proper season", "isCorrect": false, "rationale": "This line is from the third quatrain, not the couplet, and it states a premise, not the conclusion."}, {"text": "'For sweetest things turn sourest by their deeds' — good intentions always produce bad outcomes", "isCorrect": false, "rationale": "This penultimate line is a general statement; the couplet's specific image of festering lilies is the most famous line."}, {"text": "'Unmoved, cold, and to temptation slow' — virtue requires total passivity", "isCorrect": false, "rationale": "This is from the first quatrain describing the self-restrained; the couplet is separate and more vivid."}], "id": "q06"}, {"question": "Sonnet XCIV is unusual in the sequence because:", "options": [{"text": "It never mentions the beloved directly", "isCorrect": true, "rationale": "The sonnet does not address 'thee' or 'thou' until after the extended third-person meditation; it operates in an impersonal register that invites the reader to apply its principles — possibly to the beloved — without naming them directly."}, {"text": "It is written entirely in rhyming couplets", "isCorrect": false, "rationale": "The sonnet follows the standard Shakespearean form of three quatrains and a couplet."}, {"text": "It praises the rival poet at length", "isCorrect": false, "rationale": "No rival poet appears in this sonnet."}, {"text": "It was written for a public occasion rather than a private relationship", "isCorrect": false, "rationale": "No evidence within the sonnet supports a public occasion; its placement in the sequence suggests a private meditation."}], "id": "q07"}, {"question": "What ambiguity does Sonnet XCIV introduce about the beloved, given its position in the estrangement sequence?", "options": [{"text": "Whether the beloved is male or female", "isCorrect": false, "rationale": "The beloved's gender is not the ambiguity raised here."}, {"text": "Whether the beloved is the admired self-restrained figure or the corrupted lily that has yielded to infection", "isCorrect": true, "rationale": "The sonnet praises cold self-possession in lines 1-10, then warns against corruption in lines 11-16. In context, the beloved could be either the ideal being praised or a warning about what happens when such beauty yields to vice."}, {"text": "Whether the speaker is addressing the Fair Youth or the Dark Lady", "isCorrect": false, "rationale": "Traditional assignments to either addressee are editorial; the internal ambiguity of the sonnet concerns character, not identity."}, {"text": "Whether the speaker is sincere or ironic", "isCorrect": false, "rationale": "While scholarly debate exists about tone, the primary poetic ambiguity within the chapter context is about the beloved's moral state."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
