    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker say he has frequently done at the opening of Sonnet LXXVIII?", "options": [{"text": "Praised the rival poet's skill", "isCorrect": false, "rationale": "The speaker does not open by praising the rival; he describes his own practice."}, {"text": "Invoked the Fair Youth as his Muse", "isCorrect": true, "rationale": "The opening line states, 'So oft have I invoked thee for my Muse,' establishing the speaker's long reliance on the youth for poetic inspiration."}, {"text": "Complained that other poets ignored the youth", "isCorrect": false, "rationale": "The speaker does not complain of being ignored; he notes that other poets have begun writing about the youth as well."}, {"text": "Refused to share the youth's inspiration with others", "isCorrect": false, "rationale": "The speaker notes that others have already benefited from the youth's inspiration, suggesting he cannot prevent it."}], "id": "q01"}, {"question": "What effect have the Fair Youth's eyes had, according to lines 7-8?", "options": [{"text": "They have made learned poets envious", "isCorrect": false, "rationale": "The eyes are described as elevating and enabling, not as causing envy."}, {"text": "They have taught the dumb to sing and helped ignorance to fly", "isCorrect": true, "rationale": "Lines 7-8 read: 'Thine eyes, that taught the dumb on high to sing / And heavy ignorance aloft to fly,' showing the youth's transformative inspirational power."}, {"text": "They have silenced all other poets", "isCorrect": false, "rationale": "The opposite is true: other poets have flourished under the youth's influence."}, {"text": "They have focused only on the speaker's verse", "isCorrect": false, "rationale": "The poem notes that the youth's influence has spread to many 'alien pens.'"}], "id": "q02"}, {"question": "What does the speaker mean by 'alien pen' in line 5?", "options": [{"text": "A foreign-born poet writing in another language", "isCorrect": false, "rationale": "While 'alien' can mean foreign, here it specifically means other poets who are not the speaker — pens that are 'alien' to him."}, {"text": "Another poet who has adopted the speaker's method of invoking the youth", "isCorrect": true, "rationale": "'Alien pen' refers to other poets — pens not his own — who have benefited from the youth's inspiration just as the speaker once did exclusively."}, {"text": "A pen made from an unusual material", "isCorrect": false, "rationale": "'Pen' here is used figuratively to represent a poet or writer."}, {"text": "A critic who opposes the speaker's verse", "isCorrect": false, "rationale": "There is no indication these are critics; they are other poets writing in praise of the youth."}], "id": "q03"}, {"question": "In lines 9-10, what is the speaker most proud of among all the verse written in the youth's honor?", "options": [{"text": "The verse he himself has compiled, since its influence comes from the youth", "isCorrect": true, "rationale": "Lines 9-10 state: 'Yet be most proud of that which I compile, / Whose influence is thine, and born of thee,' asserting the speaker's special claim."}, {"text": "The rival poet's verse because it uses the most elaborate style", "isCorrect": false, "rationale": "The speaker explicitly argues that his own verse deserves greater pride than that of rivals."}, {"text": "Any verse that adds feathers to the learned's wing", "isCorrect": false, "rationale": "That image describes what the youth's eyes do generally; the speaker's specific pride is in his own verse."}, {"text": "Verse that corrects grammatical errors in other poets' works", "isCorrect": false, "rationale": "There is no mention of grammatical correction; the distinction is between style-mending and being the entire source of art."}], "id": "q04"}, {"question": "According to lines 13-14, what do other poets only do with the youth's grace?", "options": [{"text": "They steal and never return it", "isCorrect": false, "rationale": "The stealing argument appears in Sonnet LXXIX, not here. In LXXVIII the contrast is between mending style and being the entire source of art."}, {"text": "They mend the style and grace their arts with his sweet graces", "isCorrect": true, "rationale": "Lines 13-14 state: 'In others' works thou dost but mend the style, / And arts with thy sweet graces graced be,' limiting rivals to superficial improvement."}, {"text": "They surpass the speaker by learning from the youth", "isCorrect": false, "rationale": "The speaker argues that others only benefit on the level of style, while he benefits far more deeply."}, {"text": "They dedicate entire volumes to the youth's memory", "isCorrect": false, "rationale": "No mention of dedicated volumes appears in this sonnet."}], "id": "q05"}, {"question": "How does the couplet contrast the speaker's relationship with the youth to that of other poets?", "options": [{"text": "Other poets have superior technical skill; the speaker has only sincerity", "isCorrect": false, "rationale": "The couplet does not concede technical inferiority; it makes a bolder claim about the speaker's total dependence on the youth."}, {"text": "The youth is all of the speaker's art and raises his ignorance as high as learning", "isCorrect": true, "rationale": "The couplet reads: 'But thou art all my art, and dost advance / As high as learning, my rude ignorance,' claiming a uniquely intimate poetic relationship."}, {"text": "The speaker's ignorance prevents him from benefiting from the youth at all", "isCorrect": false, "rationale": "The speaker says his ignorance is raised high by the youth, which is a positive claim, not an admission of failure."}, {"text": "Other poets will eventually surpass the speaker because they are more learned", "isCorrect": false, "rationale": "The speaker argues that the youth's complete transformation of his ignorance makes him equal to learned poets."}], "id": "q06"}, {"question": "What does the phrase 'added feathers to the learned's wing' (line 9) suggest about the youth's influence?", "options": [{"text": "The youth has helped even already-skilled poets improve further", "isCorrect": true, "rationale": "Adding feathers to a wing that already has them implies enhancing those who are already accomplished, showing the youth's inspiration has broad power."}, {"text": "The youth has given poets the ability to fly for the first time", "isCorrect": false, "rationale": "The image of flight from nothing applies to 'the dumb' in line 7; adding feathers to the 'learned's wing' implies improving existing ability."}, {"text": "The youth has literally given gifts of feathered quills to write with", "isCorrect": false, "rationale": "'Feathers' here is a metaphor for enhanced poetic ability, not a reference to literal writing instruments."}, {"text": "The youth's beauty intimidates learned poets so they cannot write", "isCorrect": false, "rationale": "The image is positive and enabling, not intimidating or paralyzing."}], "id": "q07"}, {"question": "What is the dominant theme of Sonnet LXXVIII?", "options": [{"text": "Jealousy of rivals who have surpassed the speaker", "isCorrect": false, "rationale": "While rival poets are mentioned, the speaker's tone is competitive rather than defeated; the dominant theme is the unique source of his art."}, {"text": "The speaker's unique and total dependence on the Fair Youth as the source of his art", "isCorrect": true, "rationale": "The sonnet argues throughout that the youth is not merely an inspiration but the entire foundation of the speaker's art, more than he is for any other poet."}, {"text": "The superiority of learning over natural talent in poetry", "isCorrect": false, "rationale": "The speaker uses 'rude ignorance' vs. 'learning' to highlight that the youth transforms even ignorance, not to argue for learning's superiority."}, {"text": "The youth's responsibility to choose the best poet to write about him", "isCorrect": false, "rationale": "No such argument about the youth's choice or responsibility appears in this sonnet."}], "id": "q08"}, {"question": "What does 'under thee their poesy disperse' (line 6) mean?", "options": [{"text": "Other poets spread their verse while sheltering beneath the youth's patronage or inspiration", "isCorrect": true, "rationale": "The phrase indicates other poets distribute their poetry under the shelter and authority of the youth's influence, as the speaker once did exclusively."}, {"text": "Other poets scatter their pages beneath the youth's feet as an act of homage", "isCorrect": false, "rationale": "While the image of homage is close, 'disperse' and 'under thee' refer to spreading verse under the youth's inspiring influence, not a physical act of placing pages."}, {"text": "Other poets discard their inferior verse when confronted with the youth's perfection", "isCorrect": false, "rationale": "'Disperse' means to spread or distribute, not to discard or abandon."}, {"text": "Other poets hide their true feelings beneath flowery language", "isCorrect": false, "rationale": "There is no suggestion of hidden feelings; the phrase is about the distribution of verse under the youth's inspirational authority."}], "id": "q09"}, {"question": "The phrase 'grace a double majesty' (line 10) most likely means:", "options": [{"text": "The youth possesses both physical and moral grace simultaneously", "isCorrect": false, "rationale": "While the youth's dual grace is implied, the specific point here is the amplifying effect of the youth's influence on existing grace."}, {"text": "The youth's grace has been doubled in power because poets have praised it", "isCorrect": true, "rationale": "Adding feathers to the learned's wing and giving grace a double majesty both indicate that the youth's qualities are amplified and magnified through the poetic attention he receives."}, {"text": "Two poets writing about the youth create twice the majesty as one", "isCorrect": false, "rationale": "The doubling refers to the enhancement of the youth's grace, not to the arithmetic of poets."}, {"text": "The youth is of royal birth and possesses a king's double crown", "isCorrect": false, "rationale": "There is no indication of literal royalty; 'majesty' is used figuratively to describe splendor and grandeur."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
