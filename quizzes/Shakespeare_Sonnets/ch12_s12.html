<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the mistress swear to the speaker, and what does he do with that claim?", "options": [{"text": "She swears she loves him truly, and he believes her completely", "isCorrect": false, "rationale": "He does not believe her completely; he knowingly accepts the lie."}, {"text": "She swears she is made of truth, and he believes her though he knows she lies", "isCorrect": true, "rationale": "'When my love swears that she is made of truth, / I do believe her though I know she lies' — the speaker consciously accepts her false claim of faithfulness, pretending to believe for his own reasons."}, {"text": "She swears she will never leave him, and he doubts her", "isCorrect": false, "rationale": "Her claim is about truthfulness/faithfulness, not permanence."}, {"text": "She swears she is young, and he challenges her on this", "isCorrect": false, "rationale": "It is the speaker's own age, not hers, that is at issue."}], "id": "q01"}, {"question": "Why does the speaker pretend to believe the mistress's lies?", "options": [{"text": "Because he cannot detect that she is lying", "isCorrect": false, "rationale": "He knows she lies; his pretense is deliberate."}, {"text": "So that she might think him an untutored youth, ignorant of the world's false subtleties", "isCorrect": true, "rationale": "'That she might think me some untutor'd youth, / Unlearned in the world's false subtleties' — he plays the innocent to appear more attractive or less threatening."}, {"text": "Because believing her protects him from the pain of knowing", "isCorrect": false, "rationale": "He already knows and accepts the knowledge; the pretense is about appearance management, not self-protection from pain."}, {"text": "Because he is too polite to contradict a woman", "isCorrect": false, "rationale": "The reason is strategic self-presentation, not social courtesy."}], "id": "q02"}, {"question": "What does the speaker acknowledge about his own age?", "options": [{"text": "That he is in his prime", "isCorrect": false, "rationale": "The sonnet explicitly acknowledges the opposite — his best days are past."}, {"text": "That his days are 'past the best,' yet he pretends not to know this", "isCorrect": true, "rationale": "'Although she knows my days are past the best' — the speaker is aware he is no longer young. He pretends ignorance of this fact just as she pretends faithfulness."}, {"text": "That age has made him wiser than she", "isCorrect": false, "rationale": "While he is wise to the deception, he chooses to play the fool — wisdom does not confer advantage here."}, {"text": "That he is younger than the mistress", "isCorrect": false, "rationale": "It is his age that is acknowledged as past its best; no comparison to her age is drawn."}], "id": "q03"}, {"question": "What is 'simple truth suppressed' on both sides in line 10?", "options": [{"text": "Neither tells the other about a mutual friend's betrayal", "isCorrect": false, "rationale": "The suppressed truths are personal ones: her infidelity and his age."}, {"text": "She suppresses the truth of her faithlessness; he suppresses the truth of his age", "isCorrect": true, "rationale": "Both participants in this relationship suppress simple truths: she does not admit she is 'unjust' (unfaithful); he does not admit that he is old. Both maintain convenient fictions."}, {"text": "Neither admits that they no longer love each other", "isCorrect": false, "rationale": "The suppressed truths named in the sonnet are her faithlessness and his age, not a lack of love."}, {"text": "Both avoid speaking about the friend's capture by the mistress", "isCorrect": false, "rationale": "The friend appears in CXXXIII-CXXXIV; this sonnet focuses on the two-person dynamic of mutual lying."}], "id": "q04"}, {"question": "What does the speaker mean by 'love's best habit is in seeming trust'?", "options": [{"text": "That trust is the foundation of all genuine love", "isCorrect": false, "rationale": "The line is sardonic — it says love's best outfit (habit) is the performance of trust, not its reality."}, {"text": "That love's most advantageous costume is the appearance of trust, even when trust is absent", "isCorrect": true, "rationale": "'Habit' means clothing or outward appearance. Love's best presentation is one that seems trustful — the performance of trust being more useful than its reality in maintaining the relationship."}, {"text": "That becoming habituated to a partner creates a kind of trust over time", "isCorrect": false, "rationale": "Habit here means clothing/appearance, not routine behavior."}, {"text": "That trust should be cultivated as a daily habit", "isCorrect": false, "rationale": "The line is cynical, not prescriptive; 'habit' means costume."}], "id": "q05"}, {"question": "The couplet 'Therefore I lie with her, and she with me, / And in our faults by lies we flatter'd be' deploys what pun?", "options": [{"text": "A pun on 'flatter'd' meaning both pleased and made flat", "isCorrect": false, "rationale": "The pun is on 'lie,' not 'flattered.'"}, {"text": "A pun on 'lie' meaning both to tell falsehoods and to lie down (in bed) together", "isCorrect": true, "rationale": "'Lie with her' means both to deceive her (tell lies) and to lie with her sexually (to be in bed together). The couplet compresses the relationship's two activities — mutual deception and physical intimacy — into a single word."}, {"text": "A pun on 'faults' meaning both moral failings and geological cracks", "isCorrect": false, "rationale": "The pun is on 'lie,' not 'faults.'"}, {"text": "A pun on 'we' referring to both parties and to Society", "isCorrect": false, "rationale": "The pun is concentrated in 'lie,' not 'we.'"}], "id": "q06"}, {"question": "What does 'age in love loves not to have years told' mean?", "options": [{"text": "Older people in love are too proud to say their age", "isCorrect": false, "rationale": "The line describes a psychological need rather than mere pride."}, {"text": "Someone aging who is in love does not want their years counted out — they prefer the fiction of youth", "isCorrect": true, "rationale": "The speaker acknowledges that an aging lover — like himself — does not want his actual years acknowledged. The pretense of youth is part of love's self-flattery."}, {"text": "That love does not keep track of time", "isCorrect": false, "rationale": "The statement is specifically about an aging person's preference for not having their years counted, not about love's relation to time generally."}, {"text": "That older lovers should not be told they are too old for love", "isCorrect": false, "rationale": "The line describes a preference to avoid having one's age tallied, not a social rule."}], "id": "q07"}, {"question": "Which of these best describes the relationship depicted in Sonnet CXXXVIII?", "options": [{"text": "An honest partnership built on mutual transparency", "isCorrect": false, "rationale": "The relationship is founded on mutual, knowing deception."}, {"text": "A mutual arrangement of convenient self-deception in which both parties know they are lying but agree to play along", "isCorrect": true, "rationale": "Both she and he know the game: she lies about faithfulness, he lies about believing her; he knows he is old, she knows it too; both accept the fiction for the comfort it provides. They are 'flatter'd' — pleased — by their mutual lies."}, {"text": "A one-sided deception in which only she lies", "isCorrect": false, "rationale": "The sonnet explicitly states both sides suppress truth."}, {"text": "A desperate relationship in which the speaker is completely blind to her faults", "isCorrect": false, "rationale": "The speaker is not blind; he is knowingly complicit in a mutual arrangement."}], "id": "q08"}, {"question": "How does CXXXVIII relate to CXXXVII in the sequence's development?", "options": [{"text": "CXXXVII proposed a cure for false perception; CXXXVIII implements it", "isCorrect": false, "rationale": "CXXXVII offered no cure; CXXXVIII does not implement anything from CXXXVII."}, {"text": "CXXXVII exposed self-deception as involuntary; CXXXVIII shows a voluntary, mutual version of the same deception", "isCorrect": true, "rationale": "CXXXVII depicted Love forcing false perception on the speaker; CXXXVIII shows the speaker (and the mistress) choosing mutual deception willingly. The shift from coerced to voluntary self-deception deepens the sequence's portrait of the relationship."}, {"text": "Both sonnets make the same argument with different imagery", "isCorrect": false, "rationale": "The argument shifts: involuntary vs. voluntary deception is a meaningful distinction."}, {"text": "CXXXVIII returns to the Will wordplay of CXXXV-CXXXVI", "isCorrect": false, "rationale": "CXXXVIII does not engage the Will pun; it takes up a different theme."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
