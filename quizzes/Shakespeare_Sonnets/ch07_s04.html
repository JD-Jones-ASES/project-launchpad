    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What sin does the speaker confess to in the opening lines of Sonnet LXII?", "options": [{"text": "Pride in his poetry above all others’", "isCorrect": false, "rationale": "The sin is self-love, not pride in his verses."}, {"text": "The sin of self-love, which possesses his eye, soul, and every part", "isCorrect": true, "rationale": "Lines 1–2: “Sin of self-love possesseth all mine eye / And all my soul, and all my every part.”"}, {"text": "Envy of younger, more beautiful men", "isCorrect": false, "rationale": "Envy is not the confessed sin; self-love is."}, {"text": "Neglecting the beloved in favor of his own pleasures", "isCorrect": false, "rationale": "The sonnet is about self-love, not neglect of the beloved."}]}, {"question": "How does the speaker describe his self-assessment in lines 5–10?", "options": [{"text": "He sees himself as ugly and unworthy of love", "isCorrect": false, "rationale": "Before the mirror reality check, the speaker sees himself as supremely gracious and worthy."}, {"text": "He considers his own face the most gracious, his shape most true, and himself surpassing all others in worth", "isCorrect": true, "rationale": "Lines 5–8: “Methinks no face so gracious is as mine, / No shape so true.../ As I all other in all worths surmount.”"}, {"text": "He believes he is equal in beauty to the beloved", "isCorrect": false, "rationale": "The speaker claims to surpass all others, not merely equal the beloved."}, {"text": "He humbly acknowledges that others are more beautiful", "isCorrect": false, "rationale": "Humility is absent in the first eight lines; the speaker is extravagantly self-approving."}]}, {"question": "What shatters the speaker’s self-delusion in line 11?", "options": [{"text": "The beloved’s criticism of the speaker’s appearance", "isCorrect": false, "rationale": "It is the mirror, not the beloved, that delivers the truth."}, {"text": "Looking in his mirror and seeing his aged, worn face", "isCorrect": true, "rationale": "Line 11: “But when my glass shows me myself indeed / Beated and chopp’d with tanned antiquity.”"}, {"text": "Reading a rival poet’s description of him", "isCorrect": false, "rationale": "No rival poet appears in this sonnet."}, {"text": "Hearing a friend’s honest assessment of his looks", "isCorrect": false, "rationale": "The truth comes from the mirror (“my glass”), not from another person."}]}, {"question": "What does “Beated and chopp’d with tanned antiquity” (line 12) describe?", "options": [{"text": "An ancient bronze statue weathered by time", "isCorrect": false, "rationale": "The description is of the speaker’s own face, not a statue."}, {"text": "The speaker’s face, beaten down and roughened by the aging process", "isCorrect": true, "rationale": "“Beated” means worn; “chopp’d” means chapped and rough; “tanned antiquity” evokes the weathered look of old age."}, {"text": "An old book whose pages are damaged and discolored", "isCorrect": false, "rationale": "The glass shows the speaker’s own face, which is being described here."}, {"text": "The beloved’s future appearance after years of hardship", "isCorrect": false, "rationale": "The description applies to the speaker in the present, not a future projection of the beloved."}]}, {"question": "What is the paradox the speaker resolves in the couplet?", "options": [{"text": "Self-love is a sin, yet the speaker cannot stop loving himself", "isCorrect": false, "rationale": "The couplet resolves the paradox by reidentifying the “self” the speaker loves as the beloved."}, {"text": "The self he loves is not actually himself but the beloved, whose youth he uses to paint over his own age", "isCorrect": true, "rationale": "Lines 15–16: “’Tis thee, myself, that for myself I praise, / Painting my age with beauty of thy days.” Self-love is redeemed by being identified as love for the beloved."}, {"text": "The speaker decides that self-love is not truly a sin if it produces good poetry", "isCorrect": false, "rationale": "The resolution rests on reidentification of self with the beloved, not on a moral defense of self-love."}, {"text": "The mirror reveals that the speaker is not as old as he feared", "isCorrect": false, "rationale": "The mirror confirms aging; the resolution is emotional, not a factual correction of the speaker’s appearance."}]}, {"question": "What does “Painting my age with beauty of thy days” mean?", "options": [{"text": "The speaker applies cosmetics to disguise his age", "isCorrect": false, "rationale": "The painting is metaphorical: the speaker overlays his aged self with the beloved’s beauty in his imagination."}, {"text": "The speaker imaginatively covers his own aging face with the beloved’s youthful beauty", "isCorrect": true, "rationale": "The metaphor of painting suggests the beloved’s beauty is a fresh color laid over the dull surface of the speaker’s age."}, {"text": "The speaker describes a portrait he has commissioned", "isCorrect": false, "rationale": "No literal portrait is involved; the painting is a metaphor."}, {"text": "The speaker believes he will regain his youth through the beloved’s love", "isCorrect": false, "rationale": "The line is about imaginative identification, not literal renewal of youth."}]}, {"question": "What literary device characterizes lines 1–4 of Sonnet LXII?", "options": [{"text": "Dramatic irony, because the reader knows the speaker is deceiving himself", "isCorrect": false, "rationale": "While the reader may sense self-delusion, the primary device is not dramatic irony but emphasis through repetition."}, {"text": "Anaphora, with “And all” repeated to show the total possession of self-love", "isCorrect": true, "rationale": "Lines 1–2: “Sin of self-love possesseth all mine eye / And all my soul, and all my every part” — the repetition of “all” and “and” creates anaphoric emphasis."}, {"text": "Apostrophe, addressing self-love directly", "isCorrect": false, "rationale": "Self-love is described in third person, not directly addressed."}, {"text": "Chiasmus, reversing the order of key terms", "isCorrect": false, "rationale": "Chiasmus is a reversed parallel structure; lines 1–4 use additive accumulation, not reversal."}]}, {"question": "The volta in Sonnet LXII occurs at which line and through what signal?", "options": [{"text": "Line 9, through the phrase “But when”", "isCorrect": false, "rationale": "“But when” appears at line 11, which is the actual location of the turn."}, {"text": "Line 11, through “But when my glass shows me myself indeed”", "isCorrect": true, "rationale": "The conjunction “But” signals the turn from inflated self-praise to the deflating reality of the mirror."}, {"text": "Line 13, through “Mine own self-love quite contrary I read”", "isCorrect": false, "rationale": "Line 13 continues the logic of the turn begun at line 11; it is not the initial volta."}, {"text": "Line 15, through the couplet opener “’Tis thee”", "isCorrect": false, "rationale": "The couplet resolves the volta rather than introducing it."}]}, {"question": "What is the thematic function of the mirror (“glass”) in this sonnet?", "options": [{"text": "The mirror is a symbol of vanity and moral corruption", "isCorrect": false, "rationale": "The mirror is an instrument of truth that corrects vanity, not a symbol of corruption."}, {"text": "The mirror serves as the instrument of truth that corrects self-delusion", "isCorrect": true, "rationale": "The glass shows the speaker “myself indeed” — truly, not as vanity imagines — revealing the aged reality beneath the self-love."}, {"text": "The mirror represents the beloved’s critical gaze", "isCorrect": false, "rationale": "The mirror is the speaker’s own; the beloved’s gaze is not the instrument of correction here."}, {"text": "The mirror symbolizes art’s ability to capture permanent beauty", "isCorrect": false, "rationale": "The glass reflects the aged truth, not preserved beauty; verse, not the mirror, is the symbol of art in these sonnets."}]}, {"question": "How does Sonnet LXII relate to the broader chapter theme of “devouring time”?", "options": [{"text": "It addresses time’s destruction only indirectly, through the speaker’s confrontation with his own aging face", "isCorrect": true, "rationale": "Unlike sonnets that catalog time’s attacks on the natural world, LXII focuses inward: the mirror reveals time’s devouring of the speaker’s own beauty."}, {"text": "It argues that self-love is a more powerful enemy than time", "isCorrect": false, "rationale": "The sonnet does not rank self-love against time; it uses aging to correct self-love."}, {"text": "It claims time has no power over genuine love", "isCorrect": false, "rationale": "This sonnet does not make that argument; time’s effects are visible in the glass."}, {"text": "It is unrelated to the theme of time and belongs in a different chapter", "isCorrect": false, "rationale": "The confrontation with an aged reflection is directly tied to time’s action on the speaker’s face."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
