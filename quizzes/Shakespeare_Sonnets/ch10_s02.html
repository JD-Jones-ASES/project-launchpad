<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker call his Muse in the opening line of Sonnet CI?", "options": [{"text": "A faithful servant", "isCorrect": false, "rationale": "The Muse is accused of truancy, not praised for faithfulness."}, {"text": "A truant Muse", "isCorrect": true, "rationale": "The sonnet opens 'O truant Muse,' accusing her of neglecting her duty."}, {"text": "A sleeping goddess", "isCorrect": false, "rationale": "The Muse is called truant, not sleeping."}, {"text": "A jealous rival", "isCorrect": false, "rationale": "No rivalry is implied; the accusation is of neglect."}]}, {"question": "What two qualities does the speaker say his beloved embodies?", "options": [{"text": "Strength and courage", "isCorrect": false, "rationale": "The sonnet focuses on truth and beauty, not martial virtues."}, {"text": "Truth and beauty", "isCorrect": true, "rationale": "'Both truth and beauty on my love depends' — these are the two qualities central to the poem."}, {"text": "Youth and wealth", "isCorrect": false, "rationale": "Youth is implied elsewhere in the sequence, but this sonnet specifically names truth and beauty."}, {"text": "Wisdom and grace", "isCorrect": false, "rationale": "Wisdom and grace are not the paired qualities named here."}]}, {"question": "What argument does the speaker imagine the Muse might give for her silence?", "options": [{"text": "That the beloved does not deserve praise", "isCorrect": false, "rationale": "The Muse's imagined defense is that the beloved needs no additional praise, not that he is unworthy."}, {"text": "That truth and beauty need no external embellishment", "isCorrect": true, "rationale": "The Muse's hypothetical reply is that truth already has its color, beauty needs no pencil, and best is best unmixed."}, {"text": "That the poet writes too slowly for her to help", "isCorrect": false, "rationale": "The imagined excuse concerns the beloved's self-sufficiency, not the poet's pace."}, {"text": "That other poets have already praised him sufficiently", "isCorrect": false, "rationale": "Rival poets are not the Muse's imagined excuse in this sonnet."}]}, {"question": "Why does the speaker reject the Muse's excuse of silence?", "options": [{"text": "Because the beloved demands public praise", "isCorrect": false, "rationale": "The speaker's argument is about legacy and immortality, not the beloved's personal demands."}, {"text": "Because poetry can make the beloved outlive a gilded tomb", "isCorrect": true, "rationale": "'For't lies in thee / To make him much outlive a gilded tomb / And to be prais'd of ages yet to be.'"}, {"text": "Because the Muse will lose her power if she stays silent", "isCorrect": false, "rationale": "The speaker focuses on the beloved's immortality, not the Muse's self-preservation."}, {"text": "Because beauty fades quickly and must be recorded now", "isCorrect": false, "rationale": "The urgency is about posterity, not immediate fear of fading."}]}, {"question": "What does 'gilded tomb' represent in the couplet area of the sonnet?", "options": [{"text": "A wealthy patron's burial monument", "isCorrect": false, "rationale": "The gilded tomb is used figuratively to represent any impressive but ultimately perishable memorial."}, {"text": "A costly but ultimately perishable monument", "isCorrect": true, "rationale": "The speaker argues that verse can outlast even the grandest material memorial, the gilded tomb."}, {"text": "The beloved's own grave, already dug", "isCorrect": false, "rationale": "The beloved is still living; the tomb is a hypothetical future monument."}, {"text": "A metaphor for the Muse's laziness", "isCorrect": false, "rationale": "The gilded tomb represents perishable fame, not the Muse's character."}]}, {"question": "What does the speaker promise to do in the couplet?", "options": [{"text": "Write no more until the Muse returns", "isCorrect": false, "rationale": "The speaker instead teaches the Muse how to do her office."}, {"text": "Teach the Muse how to make the beloved seem ageless to future readers", "isCorrect": true, "rationale": "'Then do thy office, Muse; I teach thee how / To make him seem long hence as he shows now.'"}, {"text": "Abandon the Muse and write alone", "isCorrect": false, "rationale": "The speaker works with the Muse, not around her."}, {"text": "Dedicate the poem to future generations", "isCorrect": false, "rationale": "Future generations benefit, but the couplet is a direct instruction to the Muse."}]}, {"question": "What poetic device appears in the phrase 'truth in beauty dy'd'?", "options": [{"text": "Personification", "isCorrect": false, "rationale": "Truth and beauty are abstract qualities being blended, not personified figures acting on their own."}, {"text": "Metaphor — truth is dyed the color of beauty", "isCorrect": true, "rationale": "The image of truth being dyed with beauty's color is a metaphor that fuses the two abstractions."}, {"text": "Simile — truth is like beauty", "isCorrect": false, "rationale": "There is no 'like' or 'as' connector; the fusion is a direct metaphor."}, {"text": "Hyperbole — truth is greater than beauty", "isCorrect": false, "rationale": "The phrase merges rather than exaggerates the relationship between truth and beauty."}]}, {"question": "What is the central tension of Sonnet CI?", "options": [{"text": "Whether to love truth or beauty more", "isCorrect": false, "rationale": "The two are fused in the beloved; the speaker does not pit them against each other."}, {"text": "Whether silence or song better honors a beloved who seems self-sufficient", "isCorrect": true, "rationale": "The Muse's excuse is that the beloved needs no praise; the speaker insists that verse is still necessary for immortality."}, {"text": "Whether the poet is more talented than his Muse", "isCorrect": false, "rationale": "The comparison is between verse and material monuments, not between poet and Muse."}, {"text": "Whether the beloved will remain faithful during the poet's creative silence", "isCorrect": false, "rationale": "The beloved's faithfulness is not at issue; the Muse's negligence is."}]}, {"question": "How does Sonnet CI continue the argument begun in Sonnet C?", "options": [{"text": "It abandons the Muse theme and focuses on the beloved's beauty", "isCorrect": false, "rationale": "The Muse remains central in Sonnet CI, continuing from Sonnet C."}, {"text": "It continues rebuking the Muse and adds the argument of immortality through verse", "isCorrect": true, "rationale": "Sonnet C calls the Muse back; Sonnet CI explains why silence is inexcusable by invoking the power of verse over time."}, {"text": "It shifts from apostrophe to direct address of the beloved", "isCorrect": false, "rationale": "The Muse remains the addressee in Sonnet CI."}, {"text": "It reverses course and accepts the Muse's silence as justified", "isCorrect": false, "rationale": "The speaker firmly rejects the Muse's excuse."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
