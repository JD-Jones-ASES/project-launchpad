<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To whom is Sonnet CXLVI directly addressed?", "options": [{"text": "The Dark Lady", "isCorrect": false, "rationale": "The Dark Lady is not the addressee; the sonnet turns inward."}, {"text": "The speaker's own soul", "isCorrect": true, "rationale": "'Poor soul, the centre of my sinful earth' opens the sonnet as an address to the speaker's own soul."}, {"text": "God", "isCorrect": false, "rationale": "God is not directly addressed, though divine themes are present."}, {"text": "The Fair Youth", "isCorrect": false, "rationale": "The Fair Youth does not appear in this sonnet; it is a private spiritual meditation."}]}, {"question": "What does the speaker mean by 'Painting thy outward walls so costly gay'?", "options": [{"text": "The soul is accused of decorating a literal house with expensive paint", "isCorrect": false, "rationale": "The body/soul distinction makes the house a metaphor for the body, not a literal building."}, {"text": "The soul spends too much on adorning the body with costly dress and vanity", "isCorrect": true, "rationale": "The 'outward walls' are the body; the soul is criticized for investing in bodily adornment rather than inner spiritual wealth."}, {"text": "The speaker regrets spending money on cosmetics for the Dark Lady", "isCorrect": false, "rationale": "The Dark Lady does not appear here; the address is internal to the speaker's soul and body."}, {"text": "The soul decorates itself with false virtues to seem good", "isCorrect": false, "rationale": "Virtues are not the 'paint' here; the criticism is of bodily adornment, not moral pretense."}]}, {"question": "What is the 'fading mansion' the speaker refers to?", "options": [{"text": "An ancestral estate being lost through debt", "isCorrect": false, "rationale": "The sonnet is metaphorical; no literal house is meant."}, {"text": "The mortal body, which decays and is only temporarily occupied by the soul", "isCorrect": true, "rationale": "'Thy fading mansion' is the body — a temporary, decaying dwelling for the soul during earthly life."}, {"text": "The speaker's reputation, which is fading due to his sins", "isCorrect": false, "rationale": "Reputation is not the mansion; the metaphor is body/soul, not public standing."}, {"text": "Heaven, which the soul risks losing through sin", "isCorrect": false, "rationale": "Heaven is the destination to be won, not the fading mansion; the mansion is the body."}]}, {"question": "Who are the 'worms' the speaker names as inheritors?", "options": [{"text": "His enemies who will profit from his downfall", "isCorrect": false, "rationale": "Human enemies are not the inheritors; the image is of literal bodily decay after death."}, {"text": "Literal worms that will consume the body after death", "isCorrect": true, "rationale": "'Shall worms, inheritors of this excess, / Eat up thy charge?' — the body's decay is the inheritance, making all bodily investment futile."}, {"text": "Children who inherit the speaker's estate", "isCorrect": false, "rationale": "Human heirs are not the worms; the imagery is of post-mortem biological decay."}, {"text": "Corrupt churchmen who profit from ostentatious funerals", "isCorrect": false, "rationale": "No anti-clerical satire is present; the worms are nature's agents of decay."}]}, {"question": "What does the speaker advise the soul to do in lines 11-12?", "options": [{"text": "Seek pleasure in the body while life lasts", "isCorrect": false, "rationale": "The advice is the opposite — to starve the body in order to feed the soul."}, {"text": "Live upon the body's loss and buy divine terms by selling hours of dross", "isCorrect": true, "rationale": "'Then soul, live thou upon thy servant's loss, / And let that pine to aggravate thy store; / Buy terms divine in selling hours of dross' — invest in eternal rather than temporal goods."}, {"text": "Confess all sins to a priest and seek absolution", "isCorrect": false, "rationale": "Sacramental confession is not the advice; the counsel is philosophical/ascetic."}, {"text": "Write poetry to immortalize the soul's struggles", "isCorrect": false, "rationale": "Poetry is not mentioned; the advice concerns spiritual investment vs. bodily indulgence."}]}, {"question": "The famous couplet 'So shall thou feed on Death, that feeds on men, / And Death once dead, there's no more dying then' expresses what idea?", "options": [{"text": "That death comes quickly to those who neglect the body", "isCorrect": false, "rationale": "The couplet offers spiritual triumph over death, not a warning about physical neglect."}, {"text": "That by feeding the soul at the body's expense, the soul will ultimately conquer death and become immortal", "isCorrect": true, "rationale": "The logic: soul transcends body → body feeds worms → worms serve Death → but soul, nourished spiritually, outlasts Death and renders Death dead."}, {"text": "That death is an inevitable equalizer that will claim all regardless of virtue", "isCorrect": false, "rationale": "Inevitability without escape is not the couplet's message; it asserts spiritual victory over death."}, {"text": "That the speaker accepts his own mortality without complaint", "isCorrect": false, "rationale": "Acceptance is not the tone; the couplet is triumphant, not resigned."}]}, {"question": "The opening line has a textual problem: 'Poor soul, the centre of my sinful earth, / My sinful earth these rebel powers array.' What is the issue?", "options": [{"text": "The second line is in a foreign language in the earliest texts", "isCorrect": false, "rationale": "Foreign language is not the issue; the problem is a repeated phrase."}, {"text": "The phrase 'My sinful earth' is clearly a misprint repeating from the first line; editors supply various emendations", "isCorrect": true, "rationale": "In Q1609 the line reads 'My sinful earth these rebel powers array' but 'My sinful earth' appears to repeat from line 1 — an error. Editors have suggested alternatives: 'Fool'd by,' 'Thrall to,' 'Hemm'd with,' etc."}, {"text": "The word 'sinful' was censored in later editions", "isCorrect": false, "rationale": "Censorship is not the issue; the textual problem is one of printer's error, not censorship."}, {"text": "The line was added by a later editor and is not Shakespeare's", "isCorrect": false, "rationale": "The line is in the 1609 Quarto; the problem is a scribal or compositor's error within an authentic text."}]}, {"question": "In the context of the Dark Lady sequence, Sonnet CXLVI stands out because:", "options": [{"text": "It addresses the Fair Youth directly for the first time in the chapter", "isCorrect": false, "rationale": "The Fair Youth is not addressed; CXLVI is addressed to the speaker's own soul."}, {"text": "It turns entirely away from erotic obsession to spiritual self-examination", "isCorrect": true, "rationale": "Unlike its neighbors, CXLVI contains no Dark Lady, no desire, no jealousy — it is a pure meditation on soul vs. body and the folly of earthly investment."}, {"text": "It is the only sonnet in the sequence written in the third person", "isCorrect": false, "rationale": "The sonnet uses second person (addressing the soul) and first person; it is not uniquely third-person."}, {"text": "It expresses the speaker's desire to become a monk", "isCorrect": false, "rationale": "Monasticism is not the conclusion; the sonnet advocates spiritual investment, not withdrawal into an order."}]}, {"question": "What philosophical tradition does the soul/body dichotomy in this sonnet most clearly reflect?", "options": [{"text": "Epicurean philosophy, which prizes bodily pleasure as the highest good", "isCorrect": false, "rationale": "Epicureanism is the opposite of what the sonnet advocates; it prioritizes the soul over the body."}, {"text": "The Christian-Platonic tradition that views the soul as imprisoned in and superior to the body", "isCorrect": true, "rationale": "The idea that the soul should not invest in the perishable body but in eternal goods reflects both Platonic dualism and Christian ascetic teaching."}, {"text": "Stoicism's indifference to both soul and body as illusory", "isCorrect": false, "rationale": "Stoicism does not deny the soul's value; but the sonnet's specific argument is about prioritizing soul over body rather than Stoic indifference."}, {"text": "Aristotelian hylomorphism, where soul and body are inseparable", "isCorrect": false, "rationale": "Aristotle held soul and body to be inseparable; this sonnet instead advocates their opposition and the soul's mastery."}]}, {"question": "What does 'Buy terms divine in selling hours of dross' mean?", "options": [{"text": "Invest in prayer and spiritual growth by sacrificing time wasted on worthless bodily pursuits", "isCorrect": true, "rationale": "Hours of 'dross' (worthless metal, waste) = time squandered on the body; 'terms divine' = periods of spiritual life. Sell the worthless to purchase the eternal."}, {"text": "Purchase indulgences from the Church to reduce time in purgatory", "isCorrect": false, "rationale": "Indulgences are not the subject; the economic metaphor is entirely internal and spiritual."}, {"text": "Give up writing secular poetry in exchange for religious verse", "isCorrect": false, "rationale": "Poetry is not the 'dross' being sold; the metaphor is about the soul's economy of time and attention."}, {"text": "Pay a priest to shorten the funeral rites for the body", "isCorrect": false, "rationale": "Funerary payment is not the subject; the advice is about how the soul should invest its energies during life."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
