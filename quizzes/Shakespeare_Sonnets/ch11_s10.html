<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Sonnet CXXVI differ structurally from all other sonnets in the sequence?", "options": [{"text": "It is written in iambic hexameter instead of pentameter", "isCorrect": false, "rationale": "The meter is pentameter; the structural difference is in the rhyme scheme and line count."}, {"text": "It consists of six couplets (12 lines) with no quatrains and no final couplet — and is printed with parenthetical blanks where lines 13-14 would be", "isCorrect": true, "rationale": "CXXVI has only 12 lines in six couplets; early printings show two pairs of empty parentheses where the final couplet should be — signaling its unique, incomplete-or-deliberate form."}, {"text": "It is a Petrarchan sonnet with an octave and sestet", "isCorrect": false, "rationale": "Shakespeare's sonnets are Shakespearean in form; CXXVI uses six couplets, not the Italian octave-sestet division."}, {"text": "It contains a refrain that repeats in every other couplet", "isCorrect": false, "rationale": "No repeated refrain appears; the poem is six independent couplets."}]}, {"question": "The youth is addressed as 'my lovely boy' (line 1). What does this suggest about the fair youth's qualities at this point in the sequence?", "options": [{"text": "The youth has grown old and the speaker recalls his former boyishness", "isCorrect": false, "rationale": "The sonnet suggests the youth is still young and growing; Nature preserves him against Time."}, {"text": "The youth retains youthful beauty while others around him age — he is held back from decay by Nature", "isCorrect": true, "rationale": "'Thou hast by waning grown' and 'thy sweet self grow'st' while 'thy lovers withering' — the youth paradoxically grows while those around him wither."}, {"text": "The youth is a literal child whom the speaker has adopted", "isCorrect": false, "rationale": "The youth is a beloved adult; 'lovely boy' is a term of endearment for a beautiful young man."}, {"text": "The youth has abandoned the speaker and the term is sarcastic", "isCorrect": false, "rationale": "No sarcasm is implied; the term is tender, a final loving address."}]}, {"question": "What is 'Time's fickle glass' (line 2)?", "options": [{"text": "A broken mirror in which Time sees distorted reflections", "isCorrect": false, "rationale": "While 'glass' can mean mirror, 'fickle glass' here refers to the hourglass as Time's instrument of measurement."}, {"text": "Time's hourglass — the instrument by which Time measures and controls the flow of life", "isCorrect": true, "rationale": "The hourglass is the traditional emblem of Time; the youth 'holds' it — meaning his beauty controls or arrests Time's measurement, at least temporarily."}, {"text": "A magical mirror that shows the youth how he will age", "isCorrect": false, "rationale": "No prophetic mirror is described; 'glass' is the hourglass of Time."}, {"text": "A looking glass in which the youth admires himself too often", "isCorrect": false, "rationale": "The glass belongs to Time, not to the youth's vanity; the youth holds power over it."}]}, {"question": "The paradox 'Who hast by waning grown' (line 3) means:", "options": [{"text": "The youth's power has grown even as his beauty fades", "isCorrect": false, "rationale": "This is close but misses the full paradox; the youth seems to defy the very process of waning."}, {"text": "The youth grows more beautiful or powerful through the very process of decline — a paradox of waxing through waning", "isCorrect": true, "rationale": "To 'grow by waning' is paradoxical: as others wane (decline), the youth grows — his waning is itself a kind of growth. This echoes the moon's cycles."}, {"text": "The youth has become more mature through suffering hardship", "isCorrect": false, "rationale": "Suffering is not the mechanism; the paradox is about the nature of his growth and decline."}, {"text": "The youth gained wealth by spending it generously", "isCorrect": false, "rationale": "Financial gain is not the subject; the paradox is about growth through decay, not generosity."}]}, {"question": "Who is 'Nature, sovereign mistress over wrack' (line 5)?", "options": [{"text": "The speaker's metaphor for the youth's own mother", "isCorrect": false, "rationale": "Nature is personified as a cosmic power, not a biological parent."}, {"text": "Nature personified as the ruling power over decay and destruction, who preserves the youth as her special treasure", "isCorrect": true, "rationale": "Nature governs 'wrack' (ruin, decay); she has been holding the youth back from Time's destruction, keeping him as her prized possession."}, {"text": "A rival to Time who always defeats Time in the contest over life", "isCorrect": false, "rationale": "Nature does not permanently defeat Time; the sonnet makes clear Nature must eventually 'render' the youth to Time."}, {"text": "An allegorical figure for the youth's patron or protector", "isCorrect": false, "rationale": "Nature is a cosmic principle, not a social patron; the allegory operates on a universal scale."}]}, {"question": "What does Nature's 'skill / May time disgrace and wretched minutes kill' (lines 9-10) mean?", "options": [{"text": "Nature can stop time permanently if she chooses to preserve the youth", "isCorrect": false, "rationale": "Nature can delay but not permanently halt Time; the sonnet makes clear even her power has limits."}, {"text": "Nature uses the youth's preserved beauty as her instrument to shame Time and render Time's minutes worthless by comparison", "isCorrect": true, "rationale": "By keeping the youth beautiful, Nature 'disgraces' Time (shows it up) and 'kills' Time's wretched minutes by making them seem trivial against the youth's undiminished loveliness."}, {"text": "Nature has the power to literally stop clocks and freeze time", "isCorrect": false, "rationale": "The power is symbolic and aesthetic, not literal; Nature uses beauty to embarrass Time."}, {"text": "Nature kills the youth's admirers to keep the youth from being distracted by love", "isCorrect": false, "rationale": "Nature's killing of 'wretched minutes' is metaphorical — she renders Time's progress ineffective, not literal people."}]}, {"question": "The phrase 'Her audit (though delayed) answered must be' (line 13) uses what metaphor?", "options": [{"text": "A musical performance that must be completed", "isCorrect": false, "rationale": "An audit is a financial reckoning, not a performance."}, {"text": "A financial or legal accounting: Nature has borrowed the youth from Time and must eventually repay him", "isCorrect": true, "rationale": "'Audit' is an accounting term; Nature has been holding the youth but must eventually render ('quietus') him — pay the debt to Time."}, {"text": "A divine judgment where souls are weighed at death", "isCorrect": false, "rationale": "While resonant with divine judgment, 'audit' here is specifically the accounting term; the debtor is Nature, not the youth's soul."}, {"text": "A theatrical review in which Nature's performance is evaluated", "isCorrect": false, "rationale": "No theatrical evaluation is intended; 'audit' is financial/legal."}]}, {"question": "The word 'quietus' in the final line — 'And her quietus is to render thee' — resonates most powerfully with which other Shakespeare text?", "options": [{"text": "Macbeth's 'Tomorrow and tomorrow and tomorrow' soliloquy", "isCorrect": false, "rationale": "While thematically adjacent, 'quietus' specifically echoes Hamlet's 'To be or not to be' soliloquy, not Macbeth."}, {"text": "Hamlet's 'To be or not to be' soliloquy — 'When he himself might his quietus make / With a bare bodkin'", "isCorrect": true, "rationale": "'Quietus' in Hamlet means a final settlement, the release of death. Here Nature's quietus is to deliver the youth to Time/death — a profound echo of mortality."}, {"text": "The final lines of King Lear on the death of Cordelia", "isCorrect": false, "rationale": "King Lear uses different language for death; 'quietus' is the specific Hamlet echo."}, {"text": "The Porter's speech in Macbeth on equivocation", "isCorrect": false, "rationale": "The Porter's speech does not use 'quietus'; the term is Hamlet's."}]}, {"question": "As the concluding sonnet of the Fair Youth sequence, Sonnet CXXVI functions primarily as:", "options": [{"text": "A triumphant celebration of the youth's immortal beauty", "isCorrect": false, "rationale": "The tone is elegiac rather than triumphant; the youth is warned that Nature must yield him."}, {"text": "An envoy or farewell acknowledging that even Nature cannot ultimately preserve the youth from Time's final claim", "isCorrect": true, "rationale": "CXXVI closes the Fair Youth sequence with a farewell: the youth holds Time temporarily, Nature delays but must render him. It is a final, tender, and somber leave-taking."}, {"text": "A renewed declaration of the speaker's constancy against Time", "isCorrect": false, "rationale": "Constancy is the theme of CXXIII; CXXVI shifts focus to the youth's ultimate vulnerability."}, {"text": "An apology to the youth for all the wrongs detailed in sonnets 117-125", "isCorrect": false, "rationale": "The chapter's apologies are in sonnets 117-120; CXXVI is a farewell, not an apology."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
