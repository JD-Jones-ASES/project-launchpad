<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the meaning of the opening lines: ''Tis better to be vile than vile esteem'd, / When not to be receives reproach of being'?", "options": [{"text": "It is morally preferable to commit sins than to be falsely accused of them", "isCorrect": false, "rationale": "The speaker is not endorsing vice but arguing that false accusation of vice is the worst injustice — worse even than the thing itself."}, {"text": "If one is falsely accused of vice regardless of one's innocence, one might as well actually be vile — the accusation is the injustice", "isCorrect": true, "rationale": "The opening presents a bitter paradox: being falsely branded as vile when one is not is itself a form of greater injustice than the vice itself, because the reproach is unjust."}, {"text": "Reputation is more important than actual behavior", "isCorrect": false, "rationale": "The speaker argues the opposite — that the judgment of others is irrelevant to the actual moral quality of one's deeds."}, {"text": "The speaker confesses to genuine vileness and asks for understanding", "isCorrect": false, "rationale": "The speaker does not confess to vileness; he protests false accusation."}]}, {"question": "What does 'adulterate eyes' (line 5) mean in this context?", "options": [{"text": "Eyes weeping from grief", "isCorrect": false, "rationale": "'Adulterate' means corrupted or impure; the eyes are morally tainted, not tearful."}, {"text": "Corrupted, morally tainted eyes that project their own impurity onto others", "isCorrect": true, "rationale": "The spies' eyes are 'adulterate' — they themselves are corrupt, and they see through that lens, reading vice into the speaker's innocent behavior."}, {"text": "Beautiful eyes that tempt the speaker into sin", "isCorrect": false, "rationale": "The eyes belong to the judgmental spies, not to a beloved figure; they are accusatory, not attractive."}, {"text": "The eyes of adulterers who have lost moral credibility", "isCorrect": false, "rationale": "While adulterate implies moral corruption, the force of the word is about projection — seeing one's own vice in others."}]}, {"question": "What does 'my sportive blood' (line 8) refer to?", "options": [{"text": "The speaker's love of athletic competition", "isCorrect": false, "rationale": "'Sportive blood' does not refer to athletics; in Elizabethan usage it refers to amorous or playful inclinations."}, {"text": "The speaker's natural sensual or amorous inclinations", "isCorrect": true, "rationale": "'Sportive' in this context means amorous or pleasurable; 'blood' refers to natural temperament — the speaker's physical or emotional nature that the censurers presume to judge."}, {"text": "A bloodline or family heritage of athletic prowess", "isCorrect": false, "rationale": "Family lineage is not the subject; the phrase is about the speaker's own temperament."}, {"text": "The speaker's cheerful and lighthearted personality", "isCorrect": false, "rationale": "While 'sportive' can mean playful, in the context of 'blood' and the moral accusation, the connotation is specifically amorous."}]}, {"question": "The declaration 'No, I am that I am' (line 11) is most resonant as an echo of:", "options": [{"text": "Aristotle's principle of non-contradiction in logic", "isCorrect": false, "rationale": "While logically tautological, the specific phrase echoes a biblical rather than Aristotelian source."}, {"text": "God's self-identification to Moses in Exodus ('I AM THAT I AM'), asserting absolute self-definition", "isCorrect": true, "rationale": "The phrase directly echoes Exodus 3:14. Shakespeare's speaker borrows divine self-sufficiency and self-definition, refusing to be defined by others' corrupt judgments."}, {"text": "A common Elizabethan legal phrase denying accusations before a magistrate", "isCorrect": false, "rationale": "The phrase is not a legal formula; its resonance is theological and philosophical."}, {"text": "Plato's doctrine that the self is identical with the soul", "isCorrect": false, "rationale": "Platonic philosophy is not the source; the echo is biblical."}]}, {"question": "Lines 11-12 argue: 'they that level / At my abuses reckon up their own.' What does 'level' mean here?", "options": [{"text": "To flatten or reduce to equal status", "isCorrect": false, "rationale": "'Level' in this context is an archaic verb meaning to aim or take aim at a target."}, {"text": "To aim at, as in taking aim with a weapon — those who target the speaker's faults are in fact exposing their own", "isCorrect": true, "rationale": "'Level at' = aim at; those who shoot at (judge) the speaker's abuses only display their own — a tu quoque retort that moralizes back on the accusers."}, {"text": "To lower themselves to the speaker's moral level", "isCorrect": false, "rationale": "The direction is accusatory: they aim at the speaker, not lower themselves."}, {"text": "To enumerate or list systematically", "isCorrect": false, "rationale": "While 'reckon up' means enumerate, 'level' specifically means to aim, not to list."}]}, {"question": "What does 'I may be straight though they themselves be bevel' (line 13) mean?", "options": [{"text": "The speaker is physically tall while his critics are short", "isCorrect": false, "rationale": "The terms are moral and metaphorical, not physical descriptions."}, {"text": "The speaker may be morally upright even though his critics are morally crooked", "isCorrect": true, "rationale": "'Straight' = upright/honest; 'bevel' = crooked/oblique. The speaker may be genuinely virtuous despite crooked critics judging him."}, {"text": "The speaker's path in life is clear while his critics are lost", "isCorrect": false, "rationale": "While this is consistent with the metaphor, the primary sense is moral uprightness vs. crookedness."}, {"text": "The speaker is well-organized while his critics are confused", "isCorrect": false, "rationale": "Organization is not the sense of 'straight' here; the moral meaning dominates."}]}, {"question": "The couplet — 'Unless this general evil they maintain, / All men are bad and in their badness reign' — is best read as:", "options": [{"text": "A sincere endorsement of the doctrine of original sin", "isCorrect": false, "rationale": "The couplet is ironic; the speaker is reducing the critics' position to absurdity."}, {"text": "A reductio ad absurdum: if the critics insist everyone is corrupt, then they prove universal human depravity — which would include themselves", "isCorrect": true, "rationale": "The speaker shows that the critics' universal condemnation ('all men are bad') is either a sweeping evil slander or an indictment that includes the accusers themselves."}, {"text": "A dark concession that the speaker himself is part of universal human sinfulness", "isCorrect": false, "rationale": "While the couplet allows for this reading, the primary rhetorical force is against the critics, not a confession."}, {"text": "A warning to the youth that his critics will eventually turn against him too", "isCorrect": false, "rationale": "The couplet addresses the critics' logic, not the youth's future vulnerability."}]}, {"question": "The overall tone of Sonnet CXXI, compared to the other apology sonnets in this chapter, is best described as:", "options": [{"text": "Submissive and penitential", "isCorrect": false, "rationale": "CXX is penitential; CXXI is the opposite — defiant and self-assertive."}, {"text": "Defiant and self-assertive — the speaker refuses to accept others' judgments as valid measures of his character", "isCorrect": true, "rationale": "Unlike 117-120 where the speaker apologizes, CXXI is a proud refusal to submit to the moral censure of corrupt critics."}, {"text": "Sorrowful and resigned to misunderstanding", "isCorrect": false, "rationale": "There is no resignation; the speaker actively fights back against the critics."}, {"text": "Playfully ironic with no serious intent", "isCorrect": false, "rationale": "The sonnet has genuine heat and indignation; the defiance is serious."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
