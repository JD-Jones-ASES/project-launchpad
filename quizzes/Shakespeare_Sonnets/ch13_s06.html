    <meta charset="UTF-8">

    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To what does the speaker compare his love in the opening lines?", "options": [{"text": "A fire that warms and illuminates", "isCorrect": false, "rationale": "Fire is not the opening metaphor; fever/disease is the central image."}, {"text": "A fever that craves what worsens the illness", "isCorrect": true, "rationale": "'My love is as a fever longing still, / For that which longer nurseth the disease' — love is a sickness that feeds on what should sicken it further."}, {"text": "A storm at sea without a compass", "isCorrect": false, "rationale": "The nautical metaphor is not the one here; illness/fever is the controlling figure."}, {"text": "A drug that dulls pain while destroying the body", "isCorrect": false, "rationale": "While there is medical imagery, the specific metaphor is fever, not a narcotic."}], "id": "q01"}, {"question": "What role does 'Reason' play in the extended metaphor?", "options": [{"text": "Reason is the disease that afflicts the speaker", "isCorrect": false, "rationale": "Reason is not the disease; love/desire is. Reason is positioned as the physician."}, {"text": "Reason is the physician who has abandoned the speaker because his prescriptions are ignored", "isCorrect": true, "rationale": "'My reason, the physician to my love, / Angry that his prescriptions are not kept, / Hath left me' — reason as doctor has given up."}, {"text": "Reason is a false comfort that deceives the speaker about his condition", "isCorrect": false, "rationale": "Reason's comfort is not false; it is simply disobeyed and then withdrawn."}, {"text": "Reason is personified as a rival lover who takes the Dark Lady away", "isCorrect": false, "rationale": "Reason does not function as a romantic rival; its role is strictly medicinal/cognitive."}], "id": "q02"}, {"question": "What does the speaker mean by 'Desire is death, which physic did except'?", "options": [{"text": "His desire for death is a new symptom not treated by any physician", "isCorrect": false, "rationale": "The sense is that he now proves by experience that desire (which the physician/reason tried to treat) equals death."}, {"text": "He has now proven by desperate experience that desire leads to death — precisely the thing reason's medicine tried to prevent", "isCorrect": true, "rationale": "'I desperate now approve / Desire is death' — 'approve' means prove; 'physic did except' means the medicine tried to guard against it."}, {"text": "He desires death as a release from his suffering", "isCorrect": false, "rationale": "Suicidal desire is not the meaning; 'desire is death' is a logical equation proven by desperation."}, {"text": "His physician has excepted desire from the list of treatable conditions", "isCorrect": false, "rationale": "Exempting desire is not the physician's action; the physician has left because prescriptions were ignored."}], "id": "q03"}, {"question": "What is the effect of 'Past cure I am, now Reason is past care'?", "options": [{"text": "It shows the speaker has accepted reason's guidance and recovered", "isCorrect": false, "rationale": "The line states the opposite — he is past cure and reason no longer cares for him."}, {"text": "It creates a pun: 'past care' means both that reason no longer cares and that care/treatment is past (hopeless)", "isCorrect": true, "rationale": "'Past cure' (incurable) / 'past care' (both beyond caring and beyond medical care) — the chiasmus and pun emphasize total abandonment by reason."}, {"text": "It indicates the speaker has willingly dismissed reason in favor of passion", "isCorrect": false, "rationale": "While he did disobey reason, 'past cure' implies the situation is now involuntary — he is beyond help."}, {"text": "It signals a moment of calm self-awareness amid the frenzy", "isCorrect": false, "rationale": "The line leads directly into 'frantic-mad'; it is not a moment of calm."}], "id": "q04"}, {"question": "How does the speaker describe his thoughts and discourse?", "options": [{"text": "As sweet poetry that redeems his disorder", "isCorrect": false, "rationale": "His thoughts are not redeemed or poetic; they are described as madmen's ravings."}, {"text": "As a madman's: frantic, at random from the truth", "isCorrect": true, "rationale": "'My thoughts and my discourse as madmen's are, / At random from the truth vainly express'd' — his speech has become irrational."}, {"text": "As cold logic divorced from feeling", "isCorrect": false, "rationale": "Cold logic is the opposite of what he describes; he describes frantic irrationality."}, {"text": "As prayers that seek restoration to reason", "isCorrect": false, "rationale": "Prayer is not how he describes his thoughts; they are madmen's ravings."}], "id": "q05"}, {"question": "What does the final couplet reveal about the speaker's earlier claims of the Dark Lady's beauty?", "options": [{"text": "He now believes she is truly beautiful and worth his suffering", "isCorrect": false, "rationale": "The couplet is a violent reversal — he now condemns her in the harshest terms."}, {"text": "His sworn oaths of her fairness and brightness were delusions; she is 'black as hell, as dark as night'", "isCorrect": true, "rationale": "'For I have sworn thee fair, and thought thee bright, / Who art as black as hell, as dark as night' — the revelation of his self-deception is brutal."}, {"text": "He realizes he should have praised her dark beauty instead of her fairness", "isCorrect": false, "rationale": "He is not correcting a mis-description; he is exposing his entire praise as a lie."}, {"text": "The couplet mildly qualifies his earlier praise rather than overturning it", "isCorrect": false, "rationale": "'As black as hell, as dark as night' is anything but mild; it is complete negation."}], "id": "q06"}, {"question": "The phrase 'black as hell, as dark as night' is an example of:", "options": [{"text": "Understatement", "isCorrect": false, "rationale": "Understatement would minimize; these comparisons maximize condemnation."}, {"text": "Double simile / anaphora building to climactic condemnation", "isCorrect": true, "rationale": "Two similes linked by anaphora ('as ... as') stack to deliver the sonnet's most forceful moment of self-accusation and condemnation."}, {"text": "Synecdoche", "isCorrect": false, "rationale": "Synecdoche substitutes a part for the whole; these are full comparisons, not substitutions."}, {"text": "Oxymoron", "isCorrect": false, "rationale": "An oxymoron joins contradictory terms; these two similes are parallel and reinforcing, not contradictory."}], "id": "q07"}, {"question": "What is the central theme of Sonnet CXLVII?", "options": [{"text": "The speaker's desire to be cured of love and return to virtue", "isCorrect": false, "rationale": "While cure is desired, the sonnet traces the failure of reason — not a successful or even sincere pursuit of virtue."}, {"text": "Love as a fatal disease that defeats reason and produces madness and self-deception", "isCorrect": true, "rationale": "From the opening fever metaphor to the final revelation of self-delusion, the sonnet dramatizes love as illness that overthrows rational faculty."}, {"text": "The Dark Lady's power to inspire great poetry through suffering", "isCorrect": false, "rationale": "Poetic inspiration is not the theme; destruction of rational thought is."}, {"text": "The superiority of physical passion over intellectual love", "isCorrect": false, "rationale": "The sonnet does not celebrate passion's superiority; it laments passion's destructive dominance over reason."}], "id": "q08"}, {"question": "The medical metaphor in this sonnet (fever, physician, cure) most likely draws on which medical concept prominent in Shakespeare's time?", "options": [{"text": "Germ theory of infectious disease", "isCorrect": false, "rationale": "Germ theory was not developed until the 19th century; Elizabethan medicine used different frameworks."}, {"text": "Humoral theory, where disease results from imbalanced humors that a physician corrects through regimen", "isCorrect": true, "rationale": "Elizabethan medicine was humoral: the physician prescribes a regimen to rebalance humors; love is an excess of humor that the patient refuses to treat."}, {"text": "Miasma theory, where illness comes from bad air", "isCorrect": false, "rationale": "Miasma theory is about atmospheric contagion, not the internal imbalance depicted in the sonnet."}, {"text": "Galvanic theory of nervous energy", "isCorrect": false, "rationale": "Galvanic theory belongs to a later period; it is not operative in Elizabethan medicine."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
