        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet III</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "What does Shakespeare urge the youth to do in the opening line, “Look in thy glass and tell the face thou viewest”?", "options": [{"text": "To admire his own reflection and take pride in his beauty.", "isCorrect": false, "rationale": "The mirror is a prompt for self-examination leading to action, not an invitation to vanity."}, {"text": "To look in the mirror and recognize that now is the time to produce a child who will replicate that face.", "isCorrect": true, "rationale": "The mirror is a rhetorical device: by seeing his own beautiful face, the youth should recognize his duty to reproduce it in a child."}, {"text": "To compare his face with that of a rival and assess who is more handsome.", "isCorrect": false, "rationale": "No rival is introduced; the mirror is a private, reflective prompt."}, {"text": "To record his appearance in a painting before he grows old.", "isCorrect": false, "rationale": "Painting is not suggested; the mirror prompts self-awareness, not a commission for a portrait."}], "id": "q01"}, {"question": "What does “Whose fresh repair if now thou not renewest” mean?", "options": [{"text": "If the youth does not renew the fresh beauty of his face by having a child who inherits it, he defrauds the world.", "isCorrect": true, "rationale": "“Fresh repair” means the renewal or restoration of something beautiful; the face’s “repair” (upkeep, continuation) is achieved by producing a child who inherits the same features."}, {"text": "If the youth does not fix his house before winter, it will fall into disrepair.", "isCorrect": false, "rationale": "While housing imagery appears later in the sonnet, “fresh repair” here refers to the face’s continuation through a child."}, {"text": "If the youth does not refresh his clothing, he will appear shabby.", "isCorrect": false, "rationale": "Clothing metaphors do not appear in this sonnet; “repair” means renewal or continuation of beauty."}, {"text": "If the youth does not repair his relationship with the poet, he will be left alone.", "isCorrect": false, "rationale": "The poet’s personal relationship with the youth is not the subject here."}], "id": "q02"}, {"question": "What does Shakespeare mean by “unear’d womb” in line 5?", "options": [{"text": "A womb that has not been plowed — an agricultural metaphor for an unimpregnated woman.", "isCorrect": true, "rationale": "“Ear” (to ear) was an archaic verb meaning to plow; “unear’d womb” means an unplowed, unimpregnated womb, using farming as a metaphor for reproduction."}, {"text": "A womb that has never been examined by a physician.", "isCorrect": false, "rationale": "Medical examination is not the metaphor; the word derives from agricultural plowing."}, {"text": "A woman who refuses to listen to the youth’s advances.", "isCorrect": false, "rationale": "This misreads “ear” as hearing; the verb means to plow or cultivate."}, {"text": "A womb that is too young for childbearing.", "isCorrect": false, "rationale": "Age of the woman is not the concern; the point is that no woman willing to bear his child would reject him."}], "id": "q03"}, {"question": "In lines 5–6, Shakespeare asks: “For where is she so fair whose unear’d womb / Disdains the tillage of thy husbandry?” What is he arguing?", "options": [{"text": "There is no woman beautiful enough to deserve the youth’s attention.", "isCorrect": false, "rationale": "The argument is the opposite: no woman would refuse the youth, so there is no excuse for remaining childless."}, {"text": "No fair woman would reject the youth’s advances, so there is no excuse for his failure to reproduce.", "isCorrect": true, "rationale": "Shakespeare uses a rhetorical question to argue that the youth’s extraordinary beauty makes him irresistible; any woman would welcome “the tillage of his husbandry” (his fathering a child)."}, {"text": "Women in general are too proud to accept marriage proposals from men.", "isCorrect": false, "rationale": "The statement is specific to the youth’s exceptional attractiveness, not a general claim about female pride."}, {"text": "Agriculture is the highest calling for a young man of good breeding.", "isCorrect": false, "rationale": "The agricultural language is entirely metaphorical for reproduction; no literal farming is intended."}], "id": "q04"}, {"question": "What does “Thou art thy mother’s glass” mean in line 9?", "options": [{"text": "The youth’s mother gave him a mirror as a gift.", "isCorrect": false, "rationale": "This is a literal misreading; “glass” here means mirror in the metaphorical sense of reflection."}, {"text": "The youth reflects his mother’s beauty back to her — he is living proof of her former loveliness.", "isCorrect": true, "rationale": "The youth is a “glass” (mirror) for his mother because his face reflects her own youthful beauty; she can see her prime in him. By this logic, the youth should offer the same gift to his own future child."}, {"text": "The youth should be ashamed of his mother.", "isCorrect": false, "rationale": "The tone toward the mother is tender and positive; she “calls back the lovely April of her prime” through her son."}, {"text": "The youth and his mother look nothing alike.", "isCorrect": false, "rationale": "The opposite is argued: the resemblance between mother and son is the entire point of the metaphor."}], "id": "q05"}, {"question": "What does “the lovely April of her prime” refer to?", "options": [{"text": "The month of April when the mother was born.", "isCorrect": false, "rationale": "April is used figuratively for spring, not as a birth month."}, {"text": "The mother’s youthful peak, with April representing the springtime of her life.", "isCorrect": true, "rationale": "April is the archetypal spring month; “the lovely April of her prime” is a metaphor for the mother’s own youth and beauty, which she recalls by looking at her son."}, {"text": "A specific spring day when the mother fell in love.", "isCorrect": false, "rationale": "No specific biographical event is described; April is a symbolic season for youth."}, {"text": "The garden the mother tended in her youth.", "isCorrect": false, "rationale": "No literal garden is described; April is a metaphor for the season of life, not a place."}], "id": "q06"}, {"question": "What does “through windows of thine age” mean?", "options": [{"text": "Looking out of the windows of an old house.", "isCorrect": false, "rationale": "The windows are metaphorical, not architectural."}, {"text": "Looking through the eyes of old age — the youth’s aging eyes will be able to see his golden time reflected in his child.", "isCorrect": true, "rationale": "“Windows” is a metaphor for eyes; in old age, the youth will be able to see his own youthful golden days through the eyes (windows) of his child, just as his mother sees her April in him."}, {"text": "A poetic term for the gaps between stanzas.", "isCorrect": false, "rationale": "There is no structural meaning here; windows refers to the eyes of old age."}, {"text": "The years of the youth’s life that have already passed.", "isCorrect": false, "rationale": "The windows look forward through old age into a child’s face, not backward at past years."}], "id": "q07"}, {"question": "What is the warning in the couplet: “But if thou live, remember’d not to be, / Die single and thine image dies with thee”?", "options": [{"text": "If the youth does not write his memoirs, he will be forgotten.", "isCorrect": false, "rationale": "Written memory is not the solution here; the couplet warns that dying without a child means dying without any living continuation."}, {"text": "If the youth dies without children, his face and his memory will vanish entirely from the world.", "isCorrect": true, "rationale": "The couplet is the bluntest warning in the poem: “thing image,” his reflection in a child, dies with him if he chooses to die single."}, {"text": "The youth will be disgraced among his peers for never marrying.", "isCorrect": false, "rationale": "Social disgrace is not the primary concern; the loss is the extinction of the youth’s image from the world."}, {"text": "The youth’s portrait will not be preserved in any museum.", "isCorrect": false, "rationale": "Portraiture is not the subject; the “image” is the living reflection of the youth in a child."}], "id": "q08"}, {"question": "What literary device is used in “Or who is he so fond will be the tomb, / Of his self-love to stop posterity?”", "options": [{"text": "Simile comparing the youth to a tomb.", "isCorrect": false, "rationale": "No “like” or “as” is used; this is a metaphor, not a simile."}, {"text": "Rhetorical question using the tomb metaphor to argue that no sensible man would bury his posterity in self-love.", "isCorrect": true, "rationale": "The question “who is he so fond” challenges the youth to identify himself with an irrational self-lover who literally buries his own posterity; the tomb metaphor makes self-absorption synonymous with death."}, {"text": "Personification giving self-love the attributes of a gravedigger.", "isCorrect": false, "rationale": "While the image is vivid, it is the man himself who becomes the tomb, not self-love as a personified entity."}, {"text": "Onomatopoeia imitating the sound of a closing tomb door.", "isCorrect": false, "rationale": "Onomatopoeia is the use of words that imitate sounds; no such device is present here."}], "id": "q09"}, {"question": "How does Sonnet III’s use of the mirror differ from conventional Elizabethan vanity tropes?", "options": [{"text": "Shakespeare uses the mirror to encourage vanity and self-admiration, which was unusual for his time.", "isCorrect": false, "rationale": "The mirror is not an invitation to vanity; it is a prompt for self-awareness and duty."}, {"text": "Shakespeare inverts the vanity mirror: instead of reflecting self-admiration, the mirror becomes a prompt to reproduce and pass beauty forward.", "isCorrect": true, "rationale": "Conventionally, mirrors in literature signal narcissism; here, Shakespeare turns the mirror into an argument for reproduction by pointing out that the face in the glass must be renewed in a child."}, {"text": "Shakespeare is the first poet to use a mirror as a symbol, making the device entirely original.", "isCorrect": false, "rationale": "Mirror imagery was common in Elizabethan literature; Shakespeare’s originality lies in redirecting it toward procreation rather than vanity."}, {"text": "The mirror in Sonnet III symbolizes the written page on which the poet will preserve the youth’s face.", "isCorrect": false, "rationale": "Poetry-as-mirror appears in other sonnets; here the mirror is specifically about biological reproduction."}], "id": "q10"}, {"question": "What is the role of the mother in Sonnet III’s argument?", "options": [{"text": "The mother is used as a cautionary example of someone who squandered her beauty.", "isCorrect": false, "rationale": "The mother is a positive example, not a cautionary tale; she represents the joy of seeing one’s beauty continued in a child."}, {"text": "The mother provides a model of the pleasure and vindication that comes from having a child who reflects one’s own youthful beauty.", "isCorrect": true, "rationale": "By pointing to how the mother sees her own prime reflected in the youth, Shakespeare gives a concrete, emotionally resonant example of what the youth would gain by having a child of his own."}, {"text": "The mother is invoked to shame the youth for neglecting family duty.", "isCorrect": false, "rationale": "The mother’s role is inspirational and tender, not a source of shame."}, {"text": "The mother represents Nature, who created the youth’s beauty.", "isCorrect": false, "rationale": "Nature as a personified lender or creator appears more explicitly in Sonnet IV; here the mother is a literal parent, not an allegorical figure."}], "id": "q11"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
