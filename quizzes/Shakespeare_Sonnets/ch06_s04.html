<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central conflict in Sonnet XLVI?", "options": [{"text": "The speaker debates whether to write poetry or remain silent.", "isCorrect": false, "rationale": "Poetry versus silence is not the issue; the conflict is between two faculties."}, {"text": "The speaker’s eye and heart are at war over which has the right to possess the image of the beloved.", "isCorrect": true, "rationale": "The opening lines announce: “Mine eye and heart are at a mortal war, / How to divide the conquest of thy sight.” The two faculties dispute ownership of the beloved’s image."}, {"text": "Two rival poets argue over who loves the beloved more.", "isCorrect": false, "rationale": "No rival poet appears; the dispute is internal, between the speaker’s own eye and heart."}, {"text": "The speaker is torn between love and ambition.", "isCorrect": false, "rationale": "Ambition is not mentioned; the poem is an allegorical legal dispute between inner faculties."}]}, {"question": "What claim does the heart make against the eye?", "options": [{"text": "The heart argues that it has written more poems in the beloved’s honor.", "isCorrect": false, "rationale": "Poetry is not the basis of the heart’s claim."}, {"text": "The heart claims the beloved resides within it in a private chamber no eye can penetrate.", "isCorrect": true, "rationale": "Lines 7–8: “My heart doth plead that thou in him dost lie, / A closet never pierc’d with crystal eyes.” The heart argues it contains the beloved privately."}, {"text": "The heart claims it is more accurate at perceiving beauty than the eye.", "isCorrect": false, "rationale": "Accuracy of perception is the eye’s domain; the heart’s claim is about interior possession."}, {"text": "The heart argues that it was created before the eye and therefore has prior claim.", "isCorrect": false, "rationale": "No argument from temporal priority is made."}]}, {"question": "The extended legal metaphor in the poem uses the term “impannell’d.” What does this mean?", "options": [{"text": "A sword drawn for combat in a duel.", "isCorrect": false, "rationale": "The term is legal, not military."}, {"text": "Enrolled or summoned as members of a jury.", "isCorrect": true, "rationale": "“Impannell’d” is a legal term for selecting and enrolling jurors. The speaker summons a panel of thoughts to serve as jury in the dispute between eye and heart."}, {"text": "Painted on a panel or canvas.", "isCorrect": false, "rationale": "While ‘panel’ has an art sense, ‘impannell’d’ here is strictly a legal term for jury selection."}, {"text": "Imprisoned behind bars.", "isCorrect": false, "rationale": "Imprisonment is not the sense; the legal process is a trial by jury, not incarceration."}]}, {"question": "Who or what serves as the jury in this internal legal proceeding?", "options": [{"text": "The speaker’s friends and fellow poets.", "isCorrect": false, "rationale": "No external people are involved; the jury is made up of thoughts."}, {"text": "A quest (panel) of thoughts, all tenants to the heart.", "isCorrect": true, "rationale": "Lines 11–12: “A quest of thoughts, all tenants to the heart” are convened to decide the case. They are biased tenants of the heart, which may explain the verdict."}, {"text": "The beloved himself, who decides which faculty may possess his image.", "isCorrect": false, "rationale": "The beloved does not participate in the judgment; it is entirely internal."}, {"text": "The other poets of the age who admire the beloved.", "isCorrect": false, "rationale": "No other poets are involved in this allegorical legal dispute."}]}, {"question": "What verdict do the thoughts deliver?", "options": [{"text": "The heart wins entirely and the eye is excluded from the beloved’s image.", "isCorrect": false, "rationale": "The verdict is a compromise, not total victory for the heart."}, {"text": "The eye receives the beloved’s outward appearance; the heart receives the beloved’s inward love.", "isCorrect": true, "rationale": "The couplet states: “mine eye’s due is thy outward part, / And my heart’s right, thy inward love of heart.” Outward image goes to the eye; inner love belongs to the heart."}, {"text": "The eye and heart are ordered to cease their quarrel without any resolution.", "isCorrect": false, "rationale": "A specific division is awarded; the quarrel is resolved by verdict."}, {"text": "The eye wins entirely and the heart is denied any claim.", "isCorrect": false, "rationale": "Both faculties receive their respective portions; neither is completely denied."}]}, {"question": "The phrase “a mortal war” (line 1) most likely means:", "options": [{"text": "A war fought by mortal humans.", "isCorrect": false, "rationale": "The combatants are the eye and heart, not humans generally."}, {"text": "A deadly or absolute conflict — a war to the finish.", "isCorrect": true, "rationale": "“Mortal” here means deadly or final — the war is not a minor quarrel but a fundamental dispute over rights."}, {"text": "A war that makes the speaker feel mortal and aware of his own death.", "isCorrect": false, "rationale": "While mortality is a theme elsewhere in the sonnets, the phrase here simply intensifies the conflict between eye and heart."}, {"text": "A war between mortal enemies who cannot be reconciled.", "isCorrect": false, "rationale": "The point is the intensity of the dispute, not the identity of the combatants as external enemies."}]}, {"question": "The dominant literary device organizing Sonnet XLVI is:", "options": [{"text": "A pastoral metaphor drawn from country life and nature.", "isCorrect": false, "rationale": "Pastoral imagery is absent; the poem is built around a legal and military conceit."}, {"text": "An extended legal/judicial conceit in which internal faculties are treated as parties in a lawsuit.", "isCorrect": true, "rationale": "The entire poem employs legal vocabulary: “mortal war,” “plead,” “defendant,” “title,” “impannell’d,” “quest,” “verdict,” “moiety,” “due” — all terms from law and legal process."}, {"text": "A musical metaphor comparing the beloved’s beauty to a harmonious song.", "isCorrect": false, "rationale": "Music is not part of this sonnet’s imagery."}, {"text": "A seasonal metaphor contrasting summer’s abundance with winter’s scarcity.", "isCorrect": false, "rationale": "Seasonal imagery is not the organizing conceit here."}]}, {"question": "The word “moiety” in line 14 means:", "options": [{"text": "The totality or whole of something.", "isCorrect": false, "rationale": "Moiety means a part or share, not the whole."}, {"text": "A half or portion; a share allocated to one party.", "isCorrect": true, "rationale": "“Moiety” is a legal term for one’s portion or share of a divided estate. Here it refers to the eye’s allocated share of the beloved."}, {"text": "A form of punishment in a legal proceeding.", "isCorrect": false, "rationale": "Moiety refers to division of property, not punishment."}, {"text": "A written legal document or contract.", "isCorrect": false, "rationale": "No document is the referent; moiety is a portion."}]}, {"question": "Sonnet XLVI is a companion to Sonnet XLVII. What is the key difference between them?", "options": [{"text": "XLVI depicts a conflict between eye and heart; XLVII depicts a resolution in which they cooperate.", "isCorrect": true, "rationale": "XLVI stages the war and its verdict; XLVII opens with a “league” (treaty) between eye and heart who now work together to comfort the speaker in the beloved’s absence."}, {"text": "XLVI is a celebration while XLVII is a lament.", "isCorrect": false, "rationale": "Both address the beloved’s absence; the difference is conflict versus cooperation, not celebration versus lament."}, {"text": "XLVI is addressed to the beloved while XLVII is addressed to a rival poet.", "isCorrect": false, "rationale": "Both are addressed to the beloved."}, {"text": "XLVI uses legal vocabulary while XLVII uses the four-element framework.", "isCorrect": false, "rationale": "XLVII uses the language of alliance and feasting, not four elements."}]}, {"question": "What does the resolution of this sonnet suggest about the relationship between physical sight and emotional love?", "options": [{"text": "Physical sight is superior and renders emotional love unnecessary.", "isCorrect": false, "rationale": "The verdict assigns both faculties their proper domain; neither is declared superior."}, {"text": "Physical appearance belongs to outward sense while inner love belongs to the heart — both are legitimate and complementary.", "isCorrect": true, "rationale": "The verdict neatly divides jurisdiction: the eye governs the beloved’s outward form, the heart governs inner love. This suggests that complete experience of the beloved requires both faculties."}, {"text": "The heart is superior because inward love is more important than outward looks.", "isCorrect": false, "rationale": "The poem assigns each its proper domain without ranking one above the other."}, {"text": "Neither the eye nor the heart can truly possess the beloved, and the dispute is pointless.", "isCorrect": false, "rationale": "The poem takes the dispute seriously and arrives at a genuine resolution."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
