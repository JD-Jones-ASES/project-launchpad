    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the speaker address Time at the opening of Sonnet XIX?", "options": [{"text": "With fear and submission, begging Time for mercy", "isCorrect": false, "rationale": "The speaker opens with bold commands, not fearful pleading—he addresses Time as a force he can order around."}, {"text": "With bold imperatives, commanding Time to carry out its destructive work", "isCorrect": true, "rationale": "Lines 1–8 issue a series of commands (“blunt,” “make,” “pluck,” “burn”) daring Time to do its worst to the world—except to the beloved."}, {"text": "With admiration, praising Time for its power and beauty", "isCorrect": false, "rationale": "The speaker respects Time’s power but uses that acknowledgment as a setup, not out of admiration."}, {"text": "With indifference, ignoring Time’s effect on nature", "isCorrect": false, "rationale": "The speaker is acutely aware of Time’s power and engages it directly rather than ignoring it."}]}, {"question": "What does the speaker call the “one most heinous crime” he forbids Time to commit?", "options": [{"text": "Destroying the forests and seas of the natural world", "isCorrect": false, "rationale": "The speaker grants Time permission to destroy nature; the forbidden act is specific to the beloved."}, {"text": "Carving lines of age into his beloved’s brow", "isCorrect": true, "rationale": "Line 11–12: “O! carve not with thy hours my love’s fair brow, / Nor draw no lines there with thine antique pen”—aging the beloved’s face is the “heinous crime.”"}, {"text": "Burning the phoenix in its own blood", "isCorrect": false, "rationale": "Burning the phoenix is one of the acts the speaker grants Time permission to perform, not the forbidden act."}, {"text": "Making the seasons pass too quickly", "isCorrect": false, "rationale": "The passing of seasons is permitted; the forbidden act is leaving marks of age on the beloved."}]}, {"question": "What does the phoenix represent in Sonnet XIX?", "options": [{"text": "A symbol of the beloved’s unique beauty", "isCorrect": false, "rationale": "The phoenix in this sonnet is listed as one of the world’s most exceptional things that Time may still destroy, not specifically identified with the beloved."}, {"text": "One of the most extraordinary things in nature, which Time may still consume", "isCorrect": true, "rationale": "The long-lived phoenix—symbol of renewal and near-immortality—is included in the list of things Time may devour, emphasizing that even the most exceptional are subject to Time, but not the beloved."}, {"text": "The speaker himself, reborn through love", "isCorrect": false, "rationale": "The phoenix is not identified with the speaker; it is used as an example of Time’s power over even the longest-lived creatures."}, {"text": "A metaphor for the poem’s ability to renew itself", "isCorrect": false, "rationale": "While the phoenix connotes renewal, in this context it is used to show Time’s destructive reach, not the poem’s self-renewal."}]}, {"question": "What phrase describes the beloved’s purpose in the line “For beauty’s pattern to succeeding men”?", "options": [{"text": "The beloved is to serve as an exemplar of perfect beauty for future generations", "isCorrect": true, "rationale": "The speaker asks Time to leave the beloved untouched so he may stand as the standard (“pattern”) of ideal beauty for all people who come after."}, {"text": "The beloved should teach art and beauty to younger students", "isCorrect": false, "rationale": "No teaching role is specified; “pattern” means a model or template, not a teacher."}, {"text": "The beloved’s beauty follows a natural pattern governed by the stars", "isCorrect": false, "rationale": "The stars are not mentioned in this context; “pattern” here means an ideal standard, not a cosmic arrangement."}, {"text": "The beloved should produce heirs who inherit perfect beauty", "isCorrect": false, "rationale": "Procreation is the argument of earlier sonnets; here the preservation strategy is via verse, not offspring."}]}, {"question": "What is the volta in Sonnet XIX, and what shift does it signal?", "options": [{"text": "Line 5, shifting from praise to complaint", "isCorrect": false, "rationale": "Line 5 continues the permissive commands to Time and does not yet pivot."}, {"text": "Line 9, shifting from granting Time destructive freedom to issuing the one prohibition", "isCorrect": true, "rationale": "The transition “But I forbid thee one most heinous crime” at line 10 marks the volta, turning from permitting destruction to protecting the beloved."}, {"text": "Line 13, shifting from despair to hope", "isCorrect": false, "rationale": "Lines 13–14 are the couplet, which delivers the final defiant declaration rather than introducing the volta."}, {"text": "Line 7, shifting from nature to humankind", "isCorrect": false, "rationale": "Line 7 is still part of the catalogue of natural destruction; the turn comes later."}]}, {"question": "How does the couplet resolve the tension between Time’s power and the beloved’s beauty?", "options": [{"text": "The speaker accepts defeat and mourns that Time will win", "isCorrect": false, "rationale": "The couplet is defiant, not defeated: it declares that despite Time’s worst, the beloved will live young in verse."}, {"text": "The speaker declares that despite Time’s worst, the beloved will live young forever in his verse", "isCorrect": true, "rationale": "“Yet do thy worst, old Time; despite thy wrong, / My love shall in my verse ever live young”—the poet claims verse as the instrument that defeats Time."}, {"text": "The speaker admits the beloved will age but remain beloved", "isCorrect": false, "rationale": "The couplet does not concede aging; it boldly claims that verse preserves youth permanently."}, {"text": "The speaker asks the beloved to fight against Time directly", "isCorrect": false, "rationale": "The beloved has no active role; it is the poem itself that defeats Time."}]}, {"question": "The epithet “swift-footed Time” is an example of:", "options": [{"text": "Metaphor", "isCorrect": false, "rationale": "A metaphor equates two things directly; “swift-footed” is an adjective modifying Time, more precisely functioning as personification with an epithet."}, {"text": "Personification combined with an epithet", "isCorrect": true, "rationale": "“Swift-footed” gives Time a human physical attribute (feet), personifying the abstract concept, and the compound adjective functions as a Homeric-style epithet."}, {"text": "Simile", "isCorrect": false, "rationale": "A simile uses “like” or “as” for comparison; this phrase does not."}, {"text": "Oxymoron", "isCorrect": false, "rationale": "An oxymoron joins contradictory terms; there is no contradiction in “swift-footed Time."}]}, {"question": "What do the first eight lines of Sonnet XIX have in common structurally?", "options": [{"text": "They are all rhetorical questions directed at the beloved", "isCorrect": false, "rationale": "The octave contains imperative commands directed at Time, not questions directed at the beloved."}, {"text": "They are imperative commands granting Time permission to destroy things in nature", "isCorrect": true, "rationale": "The octave lists actions Time may take—blunting lion’s paws, burning the phoenix, altering seasons—all framed as commands, conceding Time’s power before the exception."}, {"text": "They describe the beauty of the beloved in elaborate metaphors", "isCorrect": false, "rationale": "The octave is about Time’s destructive power over nature, not about describing the beloved’s beauty."}, {"text": "They are laments about the speaker’s own mortality", "isCorrect": false, "rationale": "The speaker’s personal mortality is not the subject of the octave; the focus is on Time’s broad destructive reach."}]}, {"question": "What does the word “antique” mean in “thine antique pen”?", "options": [{"text": "Ancient and venerable, suggesting Time’s long history of wearing down beauty", "isCorrect": true, "rationale": "“Antique” here means old and aged, suggesting Time has been carving wrinkles into faces since the dawn of history—an image of Time as an old scribe or engraver."}, {"text": "Odd and bizarre, suggesting Time’s strange methods", "isCorrect": false, "rationale": "While “antique” could suggest “antic” (strange), the primary meaning in context is aged and ancient."}, {"text": "Elegant and refined, praising Time’s artistic skill", "isCorrect": false, "rationale": "The tone is not one of admiration for Time’s artistry; the speaker is forbidding the act."}, {"text": "Broken and worn out, suggesting Time’s weakness", "isCorrect": false, "rationale": "Time is not portrayed as weak in this sonnet; it is powerful and all-destroying."}]}, {"question": "Which theme does Sonnet XIX share with Sonnet XVIII?", "options": [{"text": "The pain of unrequited love", "isCorrect": false, "rationale": "Neither sonnet focuses on unrequited love; both are concerned with time, beauty, and the power of poetry."}, {"text": "Poetry as a means of granting the beloved immortality against the ravages of time", "isCorrect": true, "rationale": "Both sonnets argue that verse preserves the beloved’s beauty against time’s destruction—XVIII through “eternal lines,” XIX through the promise that “my love shall in my verse ever live young.”"}, {"text": "The beloved’s indifference to the speaker’s affection", "isCorrect": false, "rationale": "Neither sonnet addresses the beloved’s indifference; both are acts of praise and protection."}, {"text": "The conflict between natural beauty and human art", "isCorrect": false, "rationale": "While nature is prominent, the sonnets do not frame nature and art as conflicting; poetry is offered as nature’s ally in preserving beauty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
