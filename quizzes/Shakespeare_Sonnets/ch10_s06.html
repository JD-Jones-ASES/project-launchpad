<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What charge does the speaker preemptively deny in Sonnet CV?", "options": [{"text": "That he is a poor poet", "isCorrect": false, "rationale": "The charge he defends against is idolatry, not poetic inadequacy."}, {"text": "That his love is idolatry", "isCorrect": true, "rationale": "'Let not my love be call'd idolatry' — the speaker opens by denying this charge."}, {"text": "That he loves too many people", "isCorrect": false, "rationale": "His defense is precisely that his love is singular, not plural."}, {"text": "That he has been unfaithful in his verse", "isCorrect": false, "rationale": "Infidelity in verse is not the charge; religious idolatry is."}], "id": "q01"}, {"question": "What is the speaker's argument against the charge of idolatry?", "options": [{"text": "He does not worship the beloved but only admires him", "isCorrect": false, "rationale": "The distinction made is not between worship and admiration but between constancy and changeability."}, {"text": "His devotion is constant and singular, like true religious worship rather than idol-worship", "isCorrect": true, "rationale": "He argues that his love is fixed on one person expressing one consistent excellence — 'still such, and ever so' — resembling the constancy demanded by proper religion."}, {"text": "He compares himself to other poets who also praise one subject", "isCorrect": false, "rationale": "No other poets are cited; the argument is about the nature of his own constancy."}, {"text": "True idolatry praises many gods, not one", "isCorrect": false, "rationale": "Idolatry in the Renaissance context meant false worship; the speaker argues his worship is not false because it is constant."}], "id": "q02"}, {"question": "What triple refrain appears throughout the poem?", "options": [{"text": "Kind, true, and fair", "isCorrect": false, "rationale": "The words are right but the order used in the sonnet is 'Fair, kind, and true.'"}, {"text": "Fair, kind, and true", "isCorrect": true, "rationale": "The phrase 'Fair, kind, and true' is repeated and varied three times, forming the poem's central refrain."}, {"text": "Love, faith, and hope", "isCorrect": false, "rationale": "These are the theological virtues, not the triad Shakespeare uses here."}, {"text": "Beauty, truth, and goodness", "isCorrect": false, "rationale": "While related to Platonic ideals, the actual words used are 'fair, kind, and true.'"}], "id": "q03"}, {"question": "What does the speaker mean when he says his verse is 'to constancy confin'd'?", "options": [{"text": "His poems are limited in length and form", "isCorrect": false, "rationale": "The confinement is thematic, not formal or structural."}, {"text": "His poetry is restricted to praising one person's constant excellence", "isCorrect": true, "rationale": "'Therefore my verse to constancy confin'd, / One thing expressing, leaves out difference' — the poetry mirrors the beloved's constancy by focusing on one subject."}, {"text": "He has vowed never to write about anyone else", "isCorrect": false, "rationale": "The statement is descriptive of his love's nature, not a formal vow."}, {"text": "His Muse will only produce predictable, unchanging verse", "isCorrect": false, "rationale": "The point is thematic constancy, presented as a virtue, not a limitation."}], "id": "q04"}, {"question": "What does the speaker claim is unique about his beloved in the couplet?", "options": [{"text": "He alone has survived the ravages of Time", "isCorrect": false, "rationale": "The uniqueness is about combining three qualities, not surviving Time."}, {"text": "He is the first person to unite fair, kind, and true in a single person", "isCorrect": true, "rationale": "'Fair, kind, and true, have often liv'd alone, / Which three till now, never kept seat in one.'"}, {"text": "He is fairer than any person who has ever lived", "isCorrect": false, "rationale": "The claim is about the combination of all three qualities, not superlative fairness alone."}, {"text": "His beauty will outlast all others recorded in verse", "isCorrect": false, "rationale": "Immortality through verse is not the point of the couplet here."}], "id": "q05"}, {"question": "What Renaissance philosophical tradition underlies 'fair, kind, and true'?", "options": [{"text": "Stoic ethics emphasizing virtue and reason", "isCorrect": false, "rationale": "While related, the specific triad connects to Platonic ideals of beauty, goodness, and truth."}, {"text": "The Platonic triad of beauty, goodness, and truth", "isCorrect": true, "rationale": "Fair (beauty), kind (goodness), and true (truth) correspond to the classical Platonic triad that the Renaissance absorbed and revered."}, {"text": "Christian theology of faith, hope, and charity", "isCorrect": false, "rationale": "The theological virtues are different from the triad used here."}, {"text": "Aristotelian categories of form, matter, and cause", "isCorrect": false, "rationale": "Aristotle's metaphysical categories are unrelated to this triad."}], "id": "q06"}, {"question": "How does the repetition of 'Fair, kind, and true' function structurally?", "options": [{"text": "It creates a rondo-like refrain that mimics the speaker's constancy in verse form", "isCorrect": true, "rationale": "The repeated phrase enacts the theme: just as the beloved is unchangingly fair, kind, and true, so the poem circles back to the same words, demonstrating constancy through form."}, {"text": "It shows the poet has run out of new ideas", "isCorrect": false, "rationale": "The repetition is deliberate and thematically meaningful, not a sign of poverty."}, {"text": "It is an error introduced by early editors", "isCorrect": false, "rationale": "The repetition is integral to the poem's argument and form."}, {"text": "It introduces three separate stanzas, each on one quality", "isCorrect": false, "rationale": "The sonnet does not divide into separate stanzas for each quality; the triad recurs across the whole poem."}], "id": "q07"}, {"question": "What does 'leaving out difference' accomplish in the poem's argument?", "options": [{"text": "It proves the speaker has never noticed anyone else's beauty", "isCorrect": false, "rationale": "The argument is structural and thematic, not biographical."}, {"text": "It distinguishes constant love from inconstant variety-seeking", "isCorrect": true, "rationale": "By leaving out 'difference' (variety), the poet contrasts his constant focus with a love that roams — reinforcing the anti-idolatry argument."}, {"text": "It admits that the beloved has no faults", "isCorrect": false, "rationale": "The line concerns the scope of the poetry, not a denial of the beloved's flaws."}, {"text": "It signals that the poem is finished and needs no more argument", "isCorrect": false, "rationale": "The poem continues; the phrase is part of the structural argument."}], "id": "q08"}, {"question": "What is the overall rhetorical strategy of Sonnet CV?", "options": [{"text": "Attack rivals and defend the beloved against critics", "isCorrect": false, "rationale": "No rivals are attacked; the speaker defends his own devotion."}, {"text": "Reframe what might look like excessive devotion as principled constancy", "isCorrect": true, "rationale": "The speaker turns the potential accusation of idolatry into a proof of virtuous, constant love directed at one uniquely perfect person."}, {"text": "Concede that love is irrational and move on", "isCorrect": false, "rationale": "The speaker makes a rational, structured argument rather than conceding irrationality."}, {"text": "Argue that beauty alone justifies all praise", "isCorrect": false, "rationale": "The argument depends on all three qualities — fair, kind, and true — not beauty alone."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
