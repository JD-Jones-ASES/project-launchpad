        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does “But wherefore do not you a mightier way / Make war upon this bloody tyrant, Time?” ask?", "options": [{"text": "Why don’t you fight Time more effectively than the poet’s verse can, by having children?", "isCorrect": true, "rationale": "The “mightier way” is biological reproduction — more powerful than the poet’s “barren rhyme.” The question picks up directly from Sonnet XV’s “I engraft you new” and challenges the youth to use the more powerful weapon available to him."}, {"text": "Why don’t you hire soldiers to protect you from the dangers of aging?", "isCorrect": false, "rationale": "No literal military action is proposed; “war upon Time” is metaphorical."}, {"text": "Why don’t you write poetry yourself instead of relying on the poet?", "isCorrect": false, "rationale": "The poet does not suggest the youth write verse; the “mightier way” is reproduction, not artistic creation by the youth."}, {"text": "Why don’t you accept the poet’s help more gratefully?", "isCorrect": false, "rationale": "No ingratitude is described; the question challenges the youth to use the more powerful weapon (children) rather than depend on the poet’s inferior verse."}], "id": "q01"}, {"question": "What does the poet mean by “my barren rhyme”?", "options": [{"text": "The poet confesses that his verse is genuinely worthless and unable to preserve anything.", "isCorrect": false, "rationale": "This is a rhetorical modesty or humility (a common device) rather than a genuine confession of failure; later sonnets will claim verse can immortalize the youth."}, {"text": "The poet calls his own verse “barren” to contrast it with the fertile “lines of life” (children) — verse cannot literally reproduce the youth.", "isCorrect": true, "rationale": "The contrast is between barren (unfruitful) rhyme and the fertile “lines of life” that biological reproduction produces. This is a moment of strategic self-deprecation to argue for reproduction’s superiority over verse."}, {"text": "The rhymes he has written have been rejected by publishers and patrons.", "isCorrect": false, "rationale": "No publishing failure is described; “barren” contrasts with fertile reproduction."}, {"text": "The poet’s verse is barren because it only copies what has been written by others.", "isCorrect": false, "rationale": "Derivative verse is not the charge; “barren” contrasts verse’s inability to reproduce life with the living fertility of children."}], "id": "q02"}, {"question": "What does “many maiden gardens, yet unset” suggest?", "options": [{"text": "There are many unplanted fields in England waiting to be farmed.", "isCorrect": false, "rationale": "Agricultural land is not the literal meaning; the maiden gardens are a metaphor for eligible women who have not yet borne children."}, {"text": "There are many young women (maiden gardens) who have not yet been “set” (planted, i.e., had children) and who would welcome the youth as a father.", "isCorrect": true, "rationale": "“Maiden gardens, yet unset” means young women whose capacity for childbearing has not yet been exercised; “set” (planted) is the agricultural metaphor for impregnation, echoing “unear’d womb” from Sonnet III."}, {"text": "There are many gardens belonging to young noblewomen that have not been properly planted.", "isCorrect": false, "rationale": "No literal gardens are described; the image is metaphorical for young women."}, {"text": "The youth stands at the top of his years (“happy hours”) before many opportunities that have not yet been seized.", "isCorrect": false, "rationale": "While the youth’s prime is the context, “maiden gardens” specifically refers to women, not unspecified opportunities."}], "id": "q03"}, {"question": "What does “With virtuous wish would bear you living flowers” mean?", "options": [{"text": "The gardens (women) would, with a virtuous desire to bear children, produce living flowers — children who are much more like the youth than any painted portrait.", "isCorrect": true, "rationale": "“Virtuous wish” is the honest desire to bear children; “living flowers” are the children themselves, inheritors of the youth’s beauty, “much liker than your painted counterfeit.”"}, {"text": "Virtuous women tend their gardens carefully and produce the most beautiful flowers.", "isCorrect": false, "rationale": "The literal gardening meaning is secondary; “living flowers” are children, and the gardens are women."}, {"text": "The youth’s virtue inspires women to bring him floral offerings.", "isCorrect": false, "rationale": "No literal flowers are being brought; the living flowers are the children who would be born."}, {"text": "A woman who marries virtuously will outlive her husband and tend his memory.", "isCorrect": false, "rationale": "Widowhood and memory-keeping are not the subject; the virtuous wish produces living children, not preserved memories."}], "id": "q04"}, {"question": "What does “Much liker than your painted counterfeit” mean?", "options": [{"text": "Living children resemble the youth much more accurately than any painted portrait of him.", "isCorrect": true, "rationale": "A “painted counterfeit” is a portrait (a painted copy of the original); living children are a “much liker” (more resembling, more lifelike) reproduction than any painted image, because they share the youth’s actual biology."}, {"text": "The youth has been deceived by a counterfeit painting that flatters him.", "isCorrect": false, "rationale": "No specific deceptive portrait is described; the painted counterfeit is compared unfavorably to the living reality of children."}, {"text": "The youth’s beauty is so extraordinary that no painting can capture it.", "isCorrect": false, "rationale": "While this is implied, the specific argument is that children are more like the youth than paintings — not that paintings are generally inadequate."}, {"text": "The youth should commission a better portrait than the current one.", "isCorrect": false, "rationale": "No specific portrait is described; the “painted counterfeit” is a general reference to portraits as a means of preserving beauty."}], "id": "q05"}, {"question": "What does “lines of life that life repair” mean, given the pun on “lines”?", "options": [{"text": "“Lines of life” puns on (a) children as lineage and (b) written lines of verse, both of which “repair” (restore) life, but children do so more powerfully.", "isCorrect": true, "rationale": "“Lines of life” is a rich pun: the lines of a genealogy (children who continue the lineage) and the lines of a poem (the poet’s verse). Both “repair” (restore) the youth’s life, but the sonnet argues the living lines (children) are superior."}, {"text": "“Lines of life” refers only to the palm lines or life lines read by fortune-tellers.", "isCorrect": false, "rationale": "Palmistry is not the reference; while interesting, “lines of life” primarily puns on lineage and written verse."}, {"text": "“Lines of life” refers to the facial lines of old age that record a life lived.", "isCorrect": false, "rationale": "Facial wrinkles are not the intended meaning; the lines are genealogical and poetic."}, {"text": "“Lines of life” is a straightforward phrase meaning the written record of a person’s biography.", "isCorrect": false, "rationale": "While written record is one dimension, the pun on lineage (children) and verse is the richest meaning and the one most relevant to the argument."}], "id": "q06"}, {"question": "What does the couplet “To give away yourself keeps yourself still, / And you must live, drawn by your own sweet skill” argue?", "options": [{"text": "By giving yourself away in a child, you paradoxically keep yourself — living on in the child’s face, drawn by your own biological skill rather than a painter’s or poet’s art.", "isCorrect": true, "rationale": "The couplet is a paradox: giving yourself away (through reproduction) is the way to keep yourself. The child is drawn (“painted”) by the youth’s “own sweet skill” — his natural generative power — more authentically than any external art."}, {"text": "The youth should be generous with his money and possessions rather than hoarding them.", "isCorrect": false, "rationale": "Financial generosity is not the subject; “give away yourself” means reproduce, transferring your self into a child."}, {"text": "The youth should develop his artistic skill so that his self-portrait can outlive him.", "isCorrect": false, "rationale": "Artistic self-portraiture is not the solution; the “sweet skill” is reproductive biology, not painting."}, {"text": "By surrendering his self-will, the youth will gain greater spiritual freedom.", "isCorrect": false, "rationale": "Spiritual surrender is not the theme; the paradox is biological and the “gift” is a child."}], "id": "q07"}, {"question": "How does Sonnet XVI relate to Sonnet XV?", "options": [{"text": "Sonnet XVI directly continues from Sonnet XV by conceding that while verse (introduced in XV) can fight Time, reproduction is a mightier weapon.", "isCorrect": true, "rationale": "Sonnet XV ended with “I engraft you new” (verse fights Time); Sonnet XVI’s opening “But wherefore do not you a mightier way” immediately challenges the youth to use the even more powerful means available: biological reproduction."}, {"text": "Sonnet XVI contradicts Sonnet XV by arguing that verse is completely ineffective against Time.", "isCorrect": false, "rationale": "Verse is called “barren rhyme” but not entirely ineffective; the argument is about relative power, not verse’s total failure."}, {"text": "Sonnet XVI introduces a new theme unrelated to the procreation sequence.", "isCorrect": false, "rationale": "Sonnet XVI is firmly within the procreation sequence, advancing the argument by comparing verse unfavorably to biological reproduction."}, {"text": "Both sonnets argue that verse is the supreme answer to Time, with children as a secondary option.", "isCorrect": false, "rationale": "Sonnet XVI reverses this priority: children are the primary, mightier weapon; verse is barren by comparison."}], "id": "q08"}, {"question": "What is the significance of calling Time a “bloody tyrant”?", "options": [{"text": "Time is personified as a cruel, violent ruler who must be resisted — making the failure to resist (by not having children) an act of cowardly submission to tyranny.", "isCorrect": true, "rationale": "By calling Time a “bloody tyrant,” Shakespeare gives the struggle against Time a political and moral urgency: not resisting is not neutral but a kind of complicity with violence."}, {"text": "The phrase is a colloquial Elizabethan expression meaning “very long” or “tedious.”", "isCorrect": false, "rationale": "No such colloquial usage is intended; the language is heightened and deliberate."}, {"text": "It introduces a classical allusion to a specific historical tyrant.", "isCorrect": false, "rationale": "No specific historical tyrant is invoked; the “bloody tyrant” is Time personified."}, {"text": "It reveals that Shakespeare personally suffered greatly from the passage of time.", "isCorrect": false, "rationale": "While the epithet may reflect genuine feeling, its rhetorical function is to elevate the stakes of the youth’s choice."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
