    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "With what self-description does the speaker open Sonnet LVII?", "options": [{"text": "As a king commanding the beloved’s loyalty.", "isCorrect": false, "rationale": "The speaker is not a king; he positions himself as the opposite — a slave."}, {"text": "As the beloved’s slave, obligated to wait upon his every hour and desire.", "isCorrect": true, "rationale": "Opening line: “Being your slave what should I do but tend / Upon the hours, and times of your desire?” The speaker adopts the posture of total servitude."}, {"text": "As a free man who chooses to serve the beloved voluntarily.", "isCorrect": false, "rationale": "The speaker’s freedom is explicitly denied; he presents himself as a bound slave with no will of his own."}, {"text": "As a soldier following orders from a commander.", "isCorrect": false, "rationale": "While military subordination has some overlap, the specific metaphor is chattel slavery."}], "id": "q01"}, {"question": "The phrase “world-without-end hour” (line 5) means:", "options": [{"text": "An hour that the speaker spends writing about eternity.", "isCorrect": false, "rationale": "Writing is not the subject; the phrase describes the duration of waiting."}, {"text": "An endlessly long, tedious hour of waiting for the beloved to summon him.", "isCorrect": true, "rationale": "“World-without-end” is hyperbolic: a liturgical phrase (“world without end, amen”) repurposed to describe an hour that feels as long as eternity when one is waiting for a beloved who may never call."}, {"text": "An hour of the day associated with religious ritual.", "isCorrect": false, "rationale": "The phrase borrows liturgical language but applies it to the secular experience of endless waiting."}, {"text": "The final hour before the Last Judgment.", "isCorrect": false, "rationale": "The Last Day is not the referent; the phrase describes the felt duration of a single hour of waiting."}], "id": "q02"}, {"question": "What does the speaker dare not do, according to lines 5–9?", "options": [{"text": "He dare not write poems without the beloved’s approval.", "isCorrect": false, "rationale": "Poetry approval is not the concern; the daring is about emotional expression."}, {"text": "He dare not chide the endless hour, nor think absence sour, nor question where the beloved may be.", "isCorrect": true, "rationale": "Lines 5–12 list what the speaker does not dare: complain about the long wait, find absence bitter, or allow jealous thoughts about what the beloved is doing."}, {"text": "He dare not leave the house in case the beloved calls for him.", "isCorrect": false, "rationale": "Being housebound is not explicitly described; the prohibition is on expressing grievance or jealousy."}, {"text": "He dare not look at other people lest he be accused of unfaithfulness.", "isCorrect": false, "rationale": "Looking at others is not the concern; the prohibitions are on complaint and jealousy."}], "id": "q03"}, {"question": "Lines 13–14 (“But, like a sad slave, stay and think of nought / Save, where you are, how happy you make those”) reveal:", "options": [{"text": "The speaker’s certainty that the beloved is happy and well.", "isCorrect": false, "rationale": "The speaker imagines the beloved making others happy, which is a source of painful irony, not certainty."}, {"text": "A painful irony: the slave can only think about how happy the beloved is making other people in his absence.", "isCorrect": true, "rationale": "The only permitted thought is that the beloved is somewhere making others happy — a deeply ironic limitation that amplifies the speaker’s isolation and implied jealousy."}, {"text": "The speaker’s contentment in imagining the beloved’s happiness.", "isCorrect": false, "rationale": "Contentment would require the slave metaphor to be comforting, but ‘sad slave’ signals genuine suffering."}, {"text": "A celebration of the beloved’s generous social nature.", "isCorrect": false, "rationale": "The context is the speaker’s lonely waiting; the reference to the beloved’s happiness elsewhere is shadowed by longing."}], "id": "q04"}, {"question": "The couplet concludes: “So true a fool is love, that in your will, / Though you do anything, he thinks no ill.” What does this mean?", "options": [{"text": "The beloved is a fool who does not realize the speaker loves him.", "isCorrect": false, "rationale": "The fool is love itself, not the beloved."}, {"text": "Love is so completely enslaved by the beloved’s will that it excuses everything the beloved does, however questionable.", "isCorrect": true, "rationale": "Love (personified) is “a true fool” — it is so devoted to the beloved’s will that it ‘thinks no ill’ of anything the beloved does. This could be read as devotion or as a bitter critique of love’s complicity in its own humiliation."}, {"text": "The speaker is a wise man who has seen through love’s illusions.", "isCorrect": false, "rationale": "The speaker identifies with love’s foolishness, not with wisdom above it."}, {"text": "The beloved is incapable of doing anything wrong.", "isCorrect": false, "rationale": "The couplet implies the beloved may do things that could be judged negatively, but love (foolishly) excuses all."}], "id": "q05"}, {"question": "The word “sovereign” in line 6 (addressed to the beloved) creates what effect?", "options": [{"text": "It elevates the beloved to royal status, reinforcing the master/slave dynamic.", "isCorrect": true, "rationale": "Calling the beloved “my sovereign” while calling himself a slave places the beloved at the apex of an absolute hierarchy. The speaker watches the clock for a sovereign, not a friend."}, {"text": "It suggests the beloved has political power that the speaker wishes to undermine.", "isCorrect": false, "rationale": "No political subversion is implied; the word is devotional."}, {"text": "It is an ironic diminution of the beloved’s actual status.", "isCorrect": false, "rationale": "The word is used earnestly, not ironically, within the slave/master metaphor."}, {"text": "It is a common Elizabethan term of address between equals.", "isCorrect": false, "rationale": "‘Sovereign’ implies significant power differential; it is not used between equals."}], "id": "q06"}, {"question": "The phrase “watch the clock for you” (line 6) conveys:", "options": [{"text": "The speaker’s impatience with the beloved for being late.", "isCorrect": false, "rationale": "Impatience at the beloved would be a form of complaint, which the speaker says he dares not make."}, {"text": "The slave-like existence of waiting on the beloved’s schedule with no life of one’s own.", "isCorrect": true, "rationale": "Watching the clock for someone else’s call — with “no precious time at all to spend” — is the posture of a servant or slave who has surrendered all agency to the beloved’s timetable."}, {"text": "The speaker’s careful management of his own time while the beloved is absent.", "isCorrect": false, "rationale": "Time management for the speaker’s own benefit is not the sense; he is waiting for another’s summons."}, {"text": "A description of the speaker working as a clock-maker.", "isCorrect": false, "rationale": "Clock-making is not the metaphor; watching the clock is about waiting."}], "id": "q07"}, {"question": "The tone of Sonnet LVII is often read as ambivalent. What ambivalence is present?", "options": [{"text": "The speaker cannot decide whether he loves the beloved.", "isCorrect": false, "rationale": "The love is not in doubt; the ambivalence is in how the servitude is presented."}, {"text": "The speaker simultaneously performs devoted submission and subtly reveals the bitterness and humiliation of that submission.", "isCorrect": true, "rationale": "On the surface the poem is about devoted service; but ‘sad slave,’ ‘world-without-end hour,’ and the bitter irony of being able only to imagine the beloved making others happy reveal the cost of this devotion."}, {"text": "The speaker wavers between loving the beloved and loving a rival.", "isCorrect": false, "rationale": "No rival is present; the ambivalence is internal to the speaker’s relationship with his own subordination."}, {"text": "The poem is written both for the beloved and for a rival poet.", "isCorrect": false, "rationale": "No rival poet is addressed or implied in this sonnet."}], "id": "q08"}, {"question": "How does the slave metaphor in Sonnet LVII relate to the broader theme of absence in Chapter 6?", "options": [{"text": "It argues that slavery is preferable to freedom when one is in love.", "isCorrect": false, "rationale": "No philosophical argument for slavery over freedom is made; the metaphor describes the speaker’s condition."}, {"text": "Absence creates a state of powerless waiting that the speaker experiences as slavery — he has no will, no agenda, and no recourse but to wait.", "isCorrect": true, "rationale": "The slave metaphor crystallizes a theme running through Sonnets XLIII–LVI: the speaker is at the mercy of absence, unable to act, unable to complain, reduced to waiting upon the beloved’s pleasure."}, {"text": "Slavery is used to argue that the speaker is being treated unfairly and should demand better.", "isCorrect": false, "rationale": "The speaker makes no such demand; the argument of the couplet is that love forbids even thinking ill."}, {"text": "The slave metaphor is purely conventional and carries no real emotional weight.", "isCorrect": false, "rationale": "The sustained intensity and the ironic details show it carries significant emotional weight."}], "id": "q09"}, {"question": "What literary device is “world-without-end hour”?", "options": [{"text": "Litotes — understatement to intensify meaning.", "isCorrect": false, "rationale": "Litotes understates; this phrase overstates the duration of an hour."}, {"text": "Hyperbole — exaggerating the duration of waiting by borrowing a phrase meaning ‘eternal.’", "isCorrect": true, "rationale": "“World without end” is a liturgical phrase meaning ‘forever.’ Applied to a single hour of waiting, it is hyperbolic — the hour feels as long as eternity to the slave-lover."}, {"text": "Anaphora — repetition at the start of successive clauses.", "isCorrect": false, "rationale": "Anaphora involves repeated openings; this is a single compound phrase."}, {"text": "Allusion without hyperbole — a straightforward reference to church liturgy.", "isCorrect": false, "rationale": "The liturgical allusion is present, but its application to a single hour makes it hyperbolic."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
