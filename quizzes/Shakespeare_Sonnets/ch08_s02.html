    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was different about the speaker's verse when he alone invoked the youth's aid?", "options": [{"text": "It was longer and more elaborate than any rival's work", "isCorrect": false, "rationale": "Length or elaboration is not mentioned; the distinction is about exclusive possession of the youth's grace."}, {"text": "His verse alone had all the youth's gentle grace", "isCorrect": true, "rationale": "Line 2 states: 'My verse alone had all thy gentle grace,' indicating that exclusive invocation once guaranteed the speaker full access to the youth's inspiration."}, {"text": "It was admired by all other poets as a model", "isCorrect": false, "rationale": "No mention is made of other poets admiring the speaker's work in this sonnet."}, {"text": "It was the only verse the youth ever read", "isCorrect": false, "rationale": "The youth's reading habits are not discussed; the focus is on poetic inspiration and rivalry."}], "id": "q01"}, {"question": "What has happened to the speaker's verse now that others also write about the youth?", "options": [{"text": "It has become more refined and polished", "isCorrect": false, "rationale": "The opposite is stated: the speaker's numbers are decayed, not improved."}, {"text": "His gracious numbers have decayed and his sick Muse has yielded place to another", "isCorrect": true, "rationale": "Lines 3-4 state: 'But now my gracious numbers are decay'd, / And my sick Muse doth give an other place,' signaling the speaker's decline in the face of rivalry."}, {"text": "It has become the standard against which all rivals are measured", "isCorrect": false, "rationale": "The speaker presents his verse as declining, not as a benchmark for others."}, {"text": "It has inspired the rival poet to write even better verse", "isCorrect": false, "rationale": "There is no suggestion that the speaker inspired the rival; the causal direction is the reverse."}], "id": "q02"}, {"question": "What concession does the speaker make about the Fair Youth in lines 7-8?", "options": [{"text": "He admits the youth is unworthy of any poet's praise", "isCorrect": false, "rationale": "The speaker makes the opposite concession: the youth deserves a worthier pen."}, {"text": "He grants that the youth's lovely argument deserves the labor of a worthier pen", "isCorrect": true, "rationale": "Lines 7-8 read: 'I grant, sweet love, thy lovely argument / Deserves the travail of a worthier pen,' acknowledging the rival may be more capable."}, {"text": "He agrees that the rival has a better claim to write about the youth", "isCorrect": false, "rationale": "While he concedes the rival may be worthier, the rest of the sonnet undercuts any real advantage the rival holds."}, {"text": "He acknowledges the youth no longer inspires him at all", "isCorrect": false, "rationale": "The speaker concedes the rival's worth, not the absence of his own inspiration."}], "id": "q03"}, {"question": "According to lines 9-10, what does the rival poet actually do when he writes about the youth?", "options": [{"text": "He creates original praises that the youth could never have imagined", "isCorrect": false, "rationale": "The speaker's argument is precisely the opposite: the rival creates nothing new but only returns what he has stolen from the youth himself."}, {"text": "He robs the youth of his own qualities and then pays them back as invented praise", "isCorrect": true, "rationale": "Lines 9-10 state: 'Yet what of thee thy poet doth invent / He robs thee of, and pays it thee again,' accusing the rival of offering no genuine tribute."}, {"text": "He borrows the speaker's phrases and presents them as his own", "isCorrect": false, "rationale": "The theft is from the youth's own virtues and beauty, not from the speaker's verse."}, {"text": "He earns the youth's favor by showing superior learning", "isCorrect": false, "rationale": "No mention of learning or earning favor appears in this specific context; the argument is about the source of the rival's praise."}], "id": "q04"}, {"question": "What is the speaker's argument about the virtue the rival lends to the youth?", "options": [{"text": "The rival genuinely creates and bestows virtue on the youth", "isCorrect": false, "rationale": "The speaker denies that the rival creates anything; the virtue was the youth's to begin with."}, {"text": "The rival stole the word 'virtue' from the youth's own behavior and merely returns it", "isCorrect": true, "rationale": "Lines 11-12 state: 'He lends thee virtue, and he stole that word / From thy behaviour,' revealing the rival's praise as circular and dishonest."}, {"text": "The virtue in the rival's poem comes from the rival's own moral character", "isCorrect": false, "rationale": "The speaker explicitly says the virtue came from the youth's own behavior, not from any quality of the rival."}, {"text": "Virtue is a quality the youth lacks and must receive from poets to possess it", "isCorrect": false, "rationale": "The argument is that the youth already has virtue, which the rival merely observes and reflects back."}], "id": "q05"}, {"question": "What does the speaker say the rival can offer the youth beyond what the youth already possesses?", "options": [{"text": "Deep philosophical insight into the youth's character", "isCorrect": false, "rationale": "Philosophical insight is not mentioned; the argument focuses on praise derived from the youth's own qualities."}, {"text": "Nothing — the rival can only praise what already lives in the youth", "isCorrect": true, "rationale": "Lines 13-14 state: 'he can afford / No praise to thee, but what in thee doth live,' arguing the rival adds nothing genuinely new."}, {"text": "Immortality through verse that outlasts the youth's physical life", "isCorrect": false, "rationale": "The immortality-through-verse theme belongs to other sonnets; here the argument is about the source of praise."}, {"text": "A wider audience by publishing the verse beyond the youth's social circle", "isCorrect": false, "rationale": "No mention of publication or audience expansion appears in this sonnet."}], "id": "q06"}, {"question": "What does the couplet advise the youth to do regarding the rival poet?", "options": [{"text": "Reward the rival generously because his praise is sincere", "isCorrect": false, "rationale": "The couplet advises the opposite: not to thank the rival because his praise is not genuinely given."}, {"text": "Not to thank the rival, since the youth's own virtues pay for whatever the rival says", "isCorrect": true, "rationale": "The couplet reads: 'Then thank him not for that which he doth say, / Since what he owes thee, thou thyself dost pay,' completing the argument that the rival's praise is just the youth's own credit returned."}, {"text": "Choose the speaker over the rival as the sole poet of his praises", "isCorrect": false, "rationale": "The couplet makes no direct plea for the youth to choose the speaker; it focuses on the rival's dishonest praise."}, {"text": "Ignore all poets equally since none can truly capture his worth", "isCorrect": false, "rationale": "The advice is specifically directed at the rival, not at all poets including the speaker."}], "id": "q07"}, {"question": "The central rhetorical strategy of Sonnet LXXIX is best described as:", "options": [{"text": "Flattering the youth by exaggerating his supernatural qualities", "isCorrect": false, "rationale": "The strategy is not flattery but a logical argument about the nature of the rival's praise."}, {"text": "Undermining the rival's apparent generosity by showing the youth is only ever praising himself through the rival's words", "isCorrect": true, "rationale": "The sonnet systematically deconstructs the rival's praise by arguing that virtue, beauty, and all other commended qualities belong already to the youth, leaving the rival nothing original to give."}, {"text": "Admitting defeat and asking the youth to remember the speaker's earlier devotion", "isCorrect": false, "rationale": "There is no admission of defeat; the speaker reframes the situation to diminish the rival's achievement."}, {"text": "Threatening the rival with public exposure of his plagiarism", "isCorrect": false, "rationale": "No threat of public exposure is made; the argument is addressed to the youth, not to the rival or the public."}], "id": "q08"}, {"question": "What does the image of the 'sick Muse' (line 4) convey?", "options": [{"text": "The youth has fallen ill and can no longer inspire verse", "isCorrect": false, "rationale": "The Muse is the speaker's poetic faculty, not the youth himself; the sickness belongs to the speaker's inspiration."}, {"text": "The speaker's poetic inspiration has weakened and retreated in the face of the rival", "isCorrect": true, "rationale": "The 'sick Muse' is a personification of the speaker's diminished creative power, which now yields its place to the rival poet's stronger voice."}, {"text": "Poetry itself has become corrupted in the current age", "isCorrect": false, "rationale": "The image is personal and specific to the speaker's rivalry situation, not a broad cultural diagnosis."}, {"text": "The rival poet is suffering from pride, which is a kind of sickness", "isCorrect": false, "rationale": "The sick Muse is the speaker's, not the rival's; the rival is not associated with illness in this sonnet."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
