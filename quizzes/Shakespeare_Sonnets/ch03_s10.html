    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet X</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the blunt accusation Shakespeare levels in the opening line?", "options": [{"text": "The youth has been unfaithful to his lover.", "isCorrect": false, "rationale": "Infidelity is not the charge; the accusation concerns the youth’s lack of self-love-turned-hatred."}, {"text": "The youth does not love anyone, not even himself, despite being loved by many.", "isCorrect": true, "rationale": "“For shame! deny that thou bear’st love to any” — Shakespeare accuses the youth of being incapable of love, despite being widely beloved. The contradiction (loved by many, loving none) is the poem’s starting point."}, {"text": "The youth shamelessly boasts about his own beauty.", "isCorrect": false, "rationale": "Boasting is not the charge; the accusation is that the youth does not love, not that he brags."}, {"text": "The youth wastes money on self-indulgent pleasures.", "isCorrect": false, "rationale": "Financial waste is not the focus of Sonnet X; the charge is emotional and moral — the youth’s hatred of his own legacy."}], "id": "q01"}, {"question": "What does “thou art so possess’d with murderous hate / That ‘gainst thyself thou stick’st not to conspire” mean?", "options": [{"text": "The youth is plotting against his enemies in a murderous conspiracy.", "isCorrect": false, "rationale": "The conspiracy is against the youth himself, not external enemies; self-destruction through non-reproduction is the charge."}, {"text": "The youth is so possessed by a murderous self-hatred that he conspires against his own survival by refusing to have children.", "isCorrect": true, "rationale": "“Murderous hate” targets the youth himself: by refusing to reproduce, he conspires against his own continuation — an act of self-destruction so perverse it is described as murder and conspiracy."}, {"text": "The youth is envious of others and schemes to ruin their happiness.", "isCorrect": false, "rationale": "Envy of others is not the subject; the murderous hate is directed inward."}, {"text": "The youth is so self-centered that he believes himself immune to the dangers that threaten ordinary people.", "isCorrect": false, "rationale": "Self-immunity is not the charge; the youth’s self-destruction is the problem."}], "id": "q02"}, {"question": "What does “that beauteous roof to ruinate” mean?", "options": [{"text": "The youth is neglecting a beautiful building that he owns.", "isCorrect": false, "rationale": "No literal building is described; the “beauteous roof” is a metaphor."}, {"text": "The “beauteous roof” is a metaphor for the youth’s lineage or family house; not having children allows it to fall into ruin.", "isCorrect": true, "rationale": "The house/roof metaphor (which Sonnet XIII will develop fully) represents the youth’s family line: to “ruinate” the roof is to let the family house collapse for lack of an heir to uphold it."}, {"text": "The youth is destroying his good reputation through selfish behavior.", "isCorrect": false, "rationale": "While reputation is implied, the specific image of the “beauteous roof” is about the family/lineage, not social standing."}, {"text": "The youth’s body is compared to a building that will decay without proper maintenance.", "isCorrect": false, "rationale": "While the body-as-building metaphor is plausible, the “roof” here represents family lineage specifically, not the body."}], "id": "q03"}, {"question": "What shift in argument does the sestet introduce?", "options": [{"text": "Shakespeare gives up the procreation argument and instead offers to write the youth’s praises in verse.", "isCorrect": false, "rationale": "Poetry as a solution is not offered in Sonnet X; the sestet shifts to an emotional appeal."}, {"text": "Shakespeare shifts from condemning the youth’s self-destruction to appealing to his better nature — urging him to be kind at least to himself, if not to the world.", "isCorrect": true, "rationale": "The sestet begins “O! change thy thought, that I may change my mind” — a personal plea — followed by “Be, as thy presence is, gracious and kind”. The appeal moves from accusation to flattery and personal entreaty."}, {"text": "Shakespeare threatens legal consequences if the youth refuses to marry.", "isCorrect": false, "rationale": "No legal threat is made; the sestet is a personal, emotional appeal."}, {"text": "The poem concludes that the youth is irredeemable and the argument is hopeless.", "isCorrect": false, "rationale": "The sestet is an appeal for change, not a resignation; it retains hope that the youth will alter his course."}], "id": "q04"}, {"question": "What does “Shall hate be fairer lodg’d than gentle love?” ask?", "options": [{"text": "Does hatred deserve a more beautiful home inside the youth than love does?", "isCorrect": true, "rationale": "The rhetorical question uses the house metaphor from “beauteous roof”: hate currently “lodges” in the youth’s heart while love is absent. Should something as ugly as hate occupy a dwelling as beautiful as the youth’s inner life?"}, {"text": "Is it more attractive to be hateful than to be loving?", "isCorrect": false, "rationale": "The question is not about attractiveness of character but about what deserves to inhabit (be “lodged” in) the youth’s beautiful nature."}, {"text": "Should the youth choose a partner who is beautiful on the outside but full of hate inside?", "isCorrect": false, "rationale": "No specific partner is described; the question is about what occupies the youth’s own heart."}, {"text": "Is it better to hate one’s enemies or to love them?", "isCorrect": false, "rationale": "The hate in question is the youth’s self-directed destructiveness, not hatred of external enemies."}], "id": "q05"}, {"question": "What does the couplet “Make thee another self for love of me, / That beauty still may live in thine or thee” introduce that is new in the sequence?", "options": [{"text": "The poet directly introduces his own love for the youth as a reason to reproduce.", "isCorrect": true, "rationale": "For the first time in the sequence, the poet’s personal love (“for love of me”) is offered as a motive. The procreation argument is no longer purely abstract or civic; it becomes personal and affectionate."}, {"text": "Shakespeare declares that he is giving up on the procreation argument entirely.", "isCorrect": false, "rationale": "The couplet maintains the procreation argument (“that beauty still may live”); it adds a personal dimension, not abandons the argument."}, {"text": "Shakespeare suggests that the youth should produce a copy of himself through painting or sculpture.", "isCorrect": false, "rationale": "Artistic reproduction is not the “other self” intended; the couplet urges a child, not a portrait."}, {"text": "The poet offers to father a child himself as a solution to the impasse.", "isCorrect": false, "rationale": "No such offer is made; “make thee another self” means produce a child that resembles you."}], "id": "q06"}, {"question": "What does “beauty still may live in thine or thee” mean?", "options": [{"text": "Beauty will live either in the youth’s descendants (thine) or in the youth himself if he changes his ways.", "isCorrect": true, "rationale": "“Thine” = the youth’s children or descendants; “thee” = the youth himself. The couplet holds open both possibilities: beauty can live on through children, or — if the youth reforms — perhaps survive in the youth’s own changed character."}, {"text": "Beauty lives only in the youth and nowhere else.", "isCorrect": false, "rationale": "The “thine or thee” construction specifically offers two locations for beauty’s survival; the youth alone is not sufficient."}, {"text": "The youth’s beauty will be preserved in the poet’s verse whether or not he has children.", "isCorrect": false, "rationale": "Verse as a preserver is not offered in Sonnet X; the couplet focuses on biological continuation."}, {"text": "Beauty requires both the youth and the poet together to survive.", "isCorrect": false, "rationale": "The poet is not the second preserving force; “thine” refers to the youth’s children."}], "id": "q07"}, {"question": "How does the use of “For shame!” at the opening differ from the tone of earlier sonnets?", "options": [{"text": "It signals that the poem is a comedy and should not be taken seriously.", "isCorrect": false, "rationale": "The exclamatory “For shame!” is a heightening of moral urgency, not a comic marker."}, {"text": "It escalates the emotional intensity to a direct moral rebuke, more urgent and confrontational than the indirect persuasion of earlier sonnets.", "isCorrect": true, "rationale": "Earlier sonnets used persuasion, paradox, and metaphor; “For shame!” is a direct exclamation of moral outrage, marking a new level of urgency in the sequence."}, {"text": "It reveals that the poet is embarrassed by his own feelings for the youth.", "isCorrect": false, "rationale": "The shame is attributed to the youth’s behavior, not to the poet’s feelings."}, {"text": "It is a term of endearment common in Elizabethan love poetry.", "isCorrect": false, "rationale": "“For shame!” is not affectionate; it is an exclamation of rebuke."}], "id": "q08"}, {"question": "What does “Grant, if thou wilt, thou art belov’d of many, / But that thou none lov’st is most evident” argue?", "options": [{"text": "The youth is widely loved but the evidence shows he loves no one in return.", "isCorrect": true, "rationale": "Shakespeare concedes the youth’s popularity (“belov’d of many”) only to make the paradox more pointed: being loved by many while loving no one reveals a profound incapacity for love, not just self-absorption."}, {"text": "The youth is unloved in reality, despite the rumors of his popularity.", "isCorrect": false, "rationale": "Shakespeare grants (concedes) the truth of the youth’s popularity; the accusation is not that he is unloved but that he loves no one."}, {"text": "Love is so common as to be meaningless, and the youth is wise to be skeptical of it.", "isCorrect": false, "rationale": "Skepticism about love is not the argument; the youth is indicted for failing to love, not praised for wisdom."}, {"text": "The youth should be grateful to those who love him and return their love.", "isCorrect": false, "rationale": "While gratitude is implied, the argument is sharper: loving no one while being loved by many is evidence of “murderous hate,” not mere ingratitude."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
