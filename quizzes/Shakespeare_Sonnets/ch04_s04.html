    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the speaker distinguish his own approach to praise from that of other poets in Sonnet XXI?", "options": [{"text": "He uses more elaborate comparisons drawn from mythology", "isCorrect": false, "rationale": "The speaker explicitly rejects elaborate comparisons; other poets use them, not him."}, {"text": "He refuses to use extravagant cosmic comparisons, choosing instead to praise simply and honestly", "isCorrect": true, "rationale": "The speaker declares “So is it not with me as with that Muse” and later “I will not praise that purpose not to sell,” rejecting hyperbolic praise for truthful simplicity."}, {"text": "He praises his beloved by comparing her to historical heroines", "isCorrect": false, "rationale": "Historical heroines are not mentioned; the other poets compare their subjects to celestial and natural wonders."}, {"text": "He writes longer poems with more complex rhyme schemes", "isCorrect": false, "rationale": "The distinction is philosophical and tonal (honest vs. hyperbolic), not about length or rhyme structure."}], "id": "q01"}, {"question": "What does “a Muse stirr’d by a painted beauty” suggest about the rival poet?", "options": [{"text": "The rival poet is inspired by a woman who wears cosmetics", "isCorrect": false, "rationale": "While “painted” can literally mean wearing face-paint (cosmetics), the deeper meaning is an artificial or superficial beauty that prompts insincere, exaggerated praise."}, {"text": "The rival poet is inspired by an artificial or superficial beauty, leading to false and exaggerated verse", "isCorrect": true, "rationale": "“Painted beauty” implies artificiality; the rival poet’s muse is thus compromised, producing hollow praise rather than genuine verse."}, {"text": "The rival poet is a painter who also writes verse", "isCorrect": false, "rationale": "The rival is a poet, not a painter; “painted” modifies the beauty that inspires him, not his own occupation."}, {"text": "The rival poet compares his beloved to paintings in famous galleries", "isCorrect": false, "rationale": "The rival compares his beloved to celestial and natural wonders (sun, moon, sea), not to paintings."}], "id": "q02"}, {"question": "What natural and celestial objects does the rival poet use for comparison, according to the speaker?", "options": [{"text": "Roses, lilies, and flowing streams", "isCorrect": false, "rationale": "These garden flowers are not listed; the rivals use more grand cosmic imagery."}, {"text": "Sun, moon, earth, sea’s gems, April flowers, and the heaven’s rondure", "isCorrect": true, "rationale": "Lines 5–10 list “sun and moon, with earth and sea’s rich gems, / With April’s first-born flowers, and all things rare / That heaven’s air in this huge rondure hems”—a catalogue of cosmic and natural superlatives."}, {"text": "Stars, comets, and distant planets", "isCorrect": false, "rationale": "Comets and planets are not specifically listed; the list centers on sun, moon, earth, and sea."}, {"text": "Storms, lightning, and thunder", "isCorrect": false, "rationale": "Violent weather is not mentioned; the rival’s comparisons are beautiful and grand, not stormy."}], "id": "q03"}, {"question": "What does the speaker mean when he says his love is “as fair / As any mother’s child”?", "options": [{"text": "His beloved is ordinary and unremarkable", "isCorrect": false, "rationale": "The phrase intends genuine praise; every mother’s child is precious and fair, making this an expression of natural, uncondescending beauty."}, {"text": "His beloved is as truly and naturally beautiful as any human being can be—a sincere, unexaggerated claim", "isCorrect": true, "rationale": "The speaker makes a modest but genuine claim: the beloved is as fair as any person born of woman, which is real praise without hyperbole."}, {"text": "His beloved resembles a specific child the speaker knows", "isCorrect": false, "rationale": "No specific child is referenced; it is a general expression meaning as fair as any person."}, {"text": "His beloved’s beauty is childlike and innocent", "isCorrect": false, "rationale": "The comparison is about the degree of beauty (as much as any human), not about an innocent or childlike quality."}], "id": "q04"}, {"question": "What does the closing line “I will not praise that purpose not to sell” mean?", "options": [{"text": "The speaker refuses to write because poetry has no commercial value", "isCorrect": false, "rationale": "The speaker is not rejecting poetry generally; he is rejecting a particular kind of insincere praise used for persuasion or flattery."}, {"text": "The speaker will not offer false or exaggerated praise designed to win favor or manipulate", "isCorrect": true, "rationale": "The line implies that other poets’ extravagant praise is like advertising (“to sell”); the speaker refuses to write praise whose purpose is persuasion rather than truth."}, {"text": "The speaker will only write for payment and refuses to work for free", "isCorrect": false, "rationale": "The line is about sincerity versus flattery, not about financial compensation for writing."}, {"text": "The speaker will not praise the beloved in public, only in private", "isCorrect": false, "rationale": "Privacy is not the issue; the contrast is between genuine praise and praise designed to impress or manipulate."}], "id": "q05"}, {"question": "The phrase “huge rondure” refers to:", "options": [{"text": "A large circular shield carried by warriors", "isCorrect": false, "rationale": "A shield is not the intended meaning; “rondure” comes from the French for roundness and refers to the celestial sphere."}, {"text": "The vast circular vault of the sky or the globe of the heavens", "isCorrect": true, "rationale": "“Rondure” means roundness or the sphere; “huge rondure” refers to the vast dome of the heavens that encloses all the beautiful things the rival poet uses in comparison."}, {"text": "A type of roundel poem form used by medieval poets", "isCorrect": false, "rationale": "A rondel is a poetic form, but “rondure” here is not a reference to poetic form."}, {"text": "The round shape of the sun and moon", "isCorrect": false, "rationale": "While the sun and moon are round, “the huge rondure” refers to the entire celestial vault, not just its individual bodies."}], "id": "q06"}, {"question": "What is the tone of the first eight lines of Sonnet XXI?", "options": [{"text": "Admiring and envious of the rival poet’s skill", "isCorrect": false, "rationale": "The speaker dismisses the rival’s approach as insincere, not admirable."}, {"text": "Critical and ironic, mocking the rival poet’s inflated comparisons", "isCorrect": true, "rationale": "The speaker’s description of the rival’s “proud compare” with cosmic superlatives is laced with irony, suggesting that such grandiose praise is hollow."}, {"text": "Melancholy, lamenting that he cannot match the rival’s eloquence", "isCorrect": false, "rationale": "The speaker does not lament his restraint; he presents it as a virtue—truth over hyperbole."}, {"text": "Joyful and celebratory, joining the rival in praising beauty", "isCorrect": false, "rationale": "The speaker explicitly sets himself apart from the rival’s method of praise."}], "id": "q07"}, {"question": "What shift occurs at line 9 (“O! let me, true in love, but truly write”)?", "options": [{"text": "The speaker abandons his beloved and turns to praise a new subject", "isCorrect": false, "rationale": "No abandonment occurs; the volta redirects from critiquing rivals to affirming the speaker’s own approach."}, {"text": "The volta shifts from criticizing the rival’s method to asserting the speaker’s own commitment to honest praise", "isCorrect": true, "rationale": "At line 9 the poem turns inward: having mocked exaggerated comparisons, the speaker now pledges to write truly, anchoring his praise in sincerity rather than spectacle."}, {"text": "The speaker confesses that he cannot write poetry as well as the rival", "isCorrect": false, "rationale": "The speaker does not confess inadequacy; he claims a superior kind of praise—honest rather than ornate."}, {"text": "The speaker addresses Nature directly for the first time", "isCorrect": false, "rationale": "Nature is not directly addressed in this sonnet; the turn is from critique to self-declaration."}], "id": "q08"}, {"question": "Which literary concept does “couplement of proud compare” illustrate?", "options": [{"text": "Hyperbole—exaggerated praise for rhetorical effect", "isCorrect": true, "rationale": "A “couplement of proud compare” means a pairing or joining of boastful, exaggerated comparisons—precisely the hyperbolic tradition the speaker is critiquing."}, {"text": "Litotes—understatement used to emphasize a point", "isCorrect": false, "rationale": "Litotes involves understatement; the rival’s poetry is about over-statement, not understatement."}, {"text": "Enjambment—running a sentence past the end of a line", "isCorrect": false, "rationale": "Enjambment is a structural device; “couplement of proud compare” describes a content approach, not a structural one."}, {"text": "Irony—meaning the opposite of what is said", "isCorrect": false, "rationale": "While the speaker uses irony in his critique, the phrase itself describes the rival’s technique, which is hyperbole."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
