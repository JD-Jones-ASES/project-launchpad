<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet I</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central argument Shakespeare makes in Sonnet I?", "options": [{"text": "Beauty is fleeting and nothing can preserve it.", "isCorrect": false, "rationale": "While the sonnet acknowledges time's passage, its central argument is an appeal to reproduce, not mere resignation."}, {"text": "The young man should have children so that his beauty is passed on to future generations.", "isCorrect": true, "rationale": "The entire poem urges the fair youth to reproduce so that “beauty’s rose might never die” through an heir."}, {"text": "Self-love is the highest form of virtue.", "isCorrect": false, "rationale": "The poem condemns self-love as a famine-making cruelty, not a virtue."}, {"text": "Spring is the best season for courtship.", "isCorrect": false, "rationale": "Spring appears as a metaphor for youth, not as a literal recommendation for romance."}]}, {"question": "What does “beauty’s rose” represent in line 2?", "options": [{"text": "A literal garden flower that will wither.", "isCorrect": false, "rationale": "The rose is not literal; it is a metaphor for the youth’s beauty and the ideal of beauty in general."}, {"text": "The beauty and life of the human race, especially the fair youth.", "isCorrect": true, "rationale": "The rose is a classic emblem of transient beauty; here it represents the youth’s beauty and, by extension, all human beauty that should be perpetuated."}, {"text": "The poet’s own love poem.", "isCorrect": false, "rationale": "The poet does not introduce verse as a preserving force until later sonnets."}, {"text": "The youth’s pride in his appearance.", "isCorrect": false, "rationale": "Pride is implied but “beauty’s rose” refers to beauty itself, not the attitude toward it."}]}, {"question": "What does the phrase “contracted to thine own bright eyes” mean?", "options": [{"text": "The youth has made a legal contract with a business partner.", "isCorrect": false, "rationale": "“Contracted” here means betrothed or bound, not a commercial agreement."}, {"text": "The youth is betrothed or bound only to himself — that is, he is self-absorbed and narcissistic.", "isCorrect": true, "rationale": "“Contracted” carries the meaning of betrothed; the line accuses the youth of being married only to his own reflection."}, {"text": "The youth’s eyes have narrowed with age.", "isCorrect": false, "rationale": "This is a literal misreading; the sonnet addresses a young man at the peak of beauty."}, {"text": "The youth refuses to read books.", "isCorrect": false, "rationale": "There is no reference to reading; the accusation concerns self-absorption, not ignorance."}]}, {"question": "What literary device is used in “Making a famine where abundance lies”?", "options": [{"text": "Simile", "isCorrect": false, "rationale": "A simile uses “like” or “as”; this line makes a direct metaphorical statement without those words."}, {"text": "Paradox", "isCorrect": true, "rationale": "The line is paradoxical: the youth possesses great beauty (abundance) yet, by hoarding it and not reproducing, creates a scarcity (famine) in the world."}, {"text": "Alliteration", "isCorrect": false, "rationale": "Alliteration involves repeated initial consonant sounds; while present elsewhere, it is not the primary device in this line."}, {"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe is a direct address to an absent or abstract entity; this line is descriptive, not an address."}]}, {"question": "What does “niggarding” mean in the closing quatrain?", "options": [{"text": "Being generous to excess.", "isCorrect": false, "rationale": "Niggarding means the opposite of generosity."}, {"text": "Being miserly or withholding what should be given freely.", "isCorrect": true, "rationale": "“Niggarding” derives from “niggard,” meaning a miser; here the youth is accused of hoarding his beauty instead of sharing it through reproduction."}, {"text": "Working in a field at night.", "isCorrect": false, "rationale": "This meaning is entirely invented; the word relates to miserliness."}, {"text": "Singing lullabies to children.", "isCorrect": false, "rationale": "This reading is the opposite of the poem’s meaning; the youth has no children."}]}, {"question": "In the couplet, what two things does Shakespeare accuse of “eating the world’s due”?", "options": [{"text": "Time and age.", "isCorrect": false, "rationale": "While time is a theme, the couplet specifically names two agents of loss."}, {"text": "The grave and the youth himself.", "isCorrect": true, "rationale": "The couplet reads “To eat the world’s due, by the grave and thee,” blaming both death and the youth’s own selfishness."}, {"text": "Winter and frost.", "isCorrect": false, "rationale": "Winter imagery appears in other sonnets; the couplet here names the grave and the youth."}, {"text": "Pride and envy.", "isCorrect": false, "rationale": "These abstract sins are not named; the couplet focuses on the grave and the youth."}]}, {"question": "What does Shakespeare mean by calling the youth “only herald to the gaudy spring”?", "options": [{"text": "The youth announces the arrival of spring by his cheerful singing.", "isCorrect": false, "rationale": "The youth is not described as singing; the image is visual and symbolic."}, {"text": "The youth is the forerunner or harbinger of spring’s beauty, but merely an announcer who carries no permanent legacy.", "isCorrect": true, "rationale": "A herald announces but does not embody the king; similarly, the youth heralds beauty but, without an heir, the beauty ends with him."}, {"text": "The youth is employed as a royal messenger.", "isCorrect": false, "rationale": "This is a literal misreading; “herald” is used figuratively."}, {"text": "The youth is the most fashionable person of the season.", "isCorrect": false, "rationale": "While “gaudy” can suggest bright display, the metaphor is about temporariness, not fashion."}]}, {"question": "What is the extended metaphor governing the phrase “Feed’st thy light’s flame with self-substantial fuel”?", "options": [{"text": "The youth is compared to a candle that burns itself up without producing offspring to carry on the flame.", "isCorrect": true, "rationale": "The image of a flame consuming its own substance (self-substantial fuel) captures the idea of self-consumption: the youth’s beauty burns itself out without reproducing."}, {"text": "The youth is compared to a sun that warms others.", "isCorrect": false, "rationale": "The sun metaphor appears in Sonnet VII; here the flame metaphor emphasizes self-destruction, not warmth to others."}, {"text": "The youth is compared to a torch lighting the way for travelers.", "isCorrect": false, "rationale": "The flame here is self-consuming, not illuminating a path for others."}, {"text": "The youth is compared to a forge melting metal into something useful.", "isCorrect": false, "rationale": "The image is not of productive transformation but of self-destructive consumption."}]}, {"question": "Where does the volta (turn in argument) occur in Sonnet I?", "options": [{"text": "At the beginning of the third quatrain (line 9), where the tone shifts from description to direct accusation.", "isCorrect": true, "rationale": "In lines 1–8, Shakespeare describes the problem abstractly; at line 9 (“Thou that art now the world’s fresh ornament”), he turns to address the youth directly and more pointedly."}, {"text": "At the couplet (lines 13–14), where the poem offers a final plea.", "isCorrect": false, "rationale": "The couplet is the resolution, but the volta is typically the argumentative turn in the third quatrain."}, {"text": "At line 5, with “But thou,” where direct address begins.", "isCorrect": false, "rationale": "While “But thou” does introduce the direct address, the main argumentative turn comes in the third quatrain where the accusation sharpens."}, {"text": "There is no volta because the poem is only descriptive throughout.", "isCorrect": false, "rationale": "There is clearly a turn in the poem’s argument from general principle to direct personal accusation."}]}, {"question": "What does “Within thine own bud buriest thy content” mean?", "options": [{"text": "The youth hides his feelings inside himself and refuses to share them with anyone.", "isCorrect": false, "rationale": "While emotional withholding is implied, the image is specifically about burying reproductive potential — dying without flowering."}, {"text": "The youth, like an unopened bud that never blooms, buries his own essence without allowing it to flower into an heir.", "isCorrect": true, "rationale": "“Content” here means inner worth or substance; by remaining single and childless, the youth is like a bud that dies before blooming."}, {"text": "The youth is literally burying treasure in his garden.", "isCorrect": false, "rationale": "This is a literal misreading; “bud” and “content” are both metaphorical."}, {"text": "The youth is satisfied with living in solitude.", "isCorrect": false, "rationale": "The poem does not suggest the youth is content in this sense; the accusation is of waste, not of happiness."}]}, {"question": "How does Sonnet I introduce the procreation theme that runs through Sonnets 1–17?", "options": [{"text": "It begins the sequence by establishing the poet’s personal grief over the youth’s indifference.", "isCorrect": false, "rationale": "The poet’s personal feelings are not the focus; the sonnet makes a logical, even civic, argument about beauty’s duty to perpetuate itself."}, {"text": "It sets up the logical premise that beauty has a duty to reproduce, framing selfishness as a crime against the world.", "isCorrect": true, "rationale": "The sonnet opens the sequence by declaring that beauty’s proper role is “increase” and that refusing to reproduce is a theft from “the world’s due.”"}, {"text": "It argues that only poetry can preserve beauty, dismissing reproduction entirely.", "isCorrect": false, "rationale": "Poetry as a preserver is not introduced until later sonnets (e.g., Sonnet XV); Sonnet I focuses entirely on biological reproduction."}, {"text": "It tells the story of a mythological figure who fell in love with his own reflection.", "isCorrect": false, "rationale": "While Narcissus is implied by the self-love theme, the sonnet does not narrate a myth; it makes a direct argument."}]}, {"question": "What does “tender churl” (line 12) reveal about Shakespeare’s rhetorical strategy?", "options": [{"text": "It shows Shakespeare praising the youth’s gentleness and good manners.", "isCorrect": false, "rationale": "While “tender” is praise, “churl” is an insult; the combination is deliberately contradictory."}, {"text": "It is an oxymoron combining affection and rebuke, showing Shakespeare’s strategy of flattering while scolding.", "isCorrect": true, "rationale": "“Tender” (gentle, beloved) is placed against “churl” (miser, rude person) to hold both admiration and accusation in tension, flattering the youth even as he is reproached."}, {"text": "It is a metaphor comparing the youth to a young farm worker.", "isCorrect": false, "rationale": "A churl was indeed a peasant, but here the word functions as a moral accusation, not a social classification."}, {"text": "It signals that the poem’s tone is purely comic and lighthearted.", "isCorrect": false, "rationale": "The poem’s tone is persuasive and mildly urgent; “tender churl” is pointed, not comic."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
