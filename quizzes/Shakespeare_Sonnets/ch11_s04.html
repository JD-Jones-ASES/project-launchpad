<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the unusual opening move of Sonnet CXX?", "options": [{"text": "The speaker praises the youth for his constancy during the separation", "isCorrect": false, "rationale": "The youth's constancy is not praised; his past unkindness is what benefits the speaker."}, {"text": "The speaker turns the youth's past unkindness into a resource for his own defense", "isCorrect": true, "rationale": "'That you were once unkind befriends me now' — the youth's own former cruelty becomes the speaker's argument for leniency."}, {"text": "The speaker confesses a new and more serious offense", "isCorrect": false, "rationale": "No new offense is introduced; the speaker draws on the shared history of mutual hurt."}, {"text": "The speaker demands an apology from the youth", "isCorrect": false, "rationale": "The speaker does not demand; he reasons from mutual guilt toward mutual forgiveness."}], "id": "q01"}, {"question": "What does 'my nerves were brass or hammer'd steel' (line 4) mean?", "options": [{"text": "The speaker has become emotionally callous through experience", "isCorrect": false, "rationale": "The line is a conditional negative — unless his nerves were brass, he would have felt the sorrow."}, {"text": "Unless he were insensible as metal, he must bow under the weight of his transgression — acknowledging that feeling is inevitable", "isCorrect": true, "rationale": "The subjunctive 'Unless my nerves were brass' means: since they are not, he cannot escape the obligation to acknowledge the pain he caused."}, {"text": "The speaker's nerves have been hardened by the youth's earlier cruelty", "isCorrect": false, "rationale": "The hypothetical hardening is a conditional, not a description of what actually happened."}, {"text": "The youth's character is as hard and unyielding as hammered steel", "isCorrect": false, "rationale": "The nerves of brass or steel are attributed to the speaker in this hypothetical, not the youth."}], "id": "q02"}, {"question": "Lines 7-10 introduce a complaint: the speaker was 'a tyrant' who took 'no leisure' to weigh his past suffering. What does this mean?", "options": [{"text": "The speaker was too busy with his own affairs to care about the youth's feelings", "isCorrect": false, "rationale": "The complaint is that when the speaker hurt the youth, he failed to recall his own past experience of being hurt by the youth — empathy was absent."}, {"text": "The speaker forgot, while hurting the youth, to recall how much the youth's earlier unkindness had made him suffer — and thus showed no empathy", "isCorrect": true, "rationale": "Having suffered from the youth's cruelty, the speaker should have known better than to inflict similar pain; his tyranny lay in failing to remember that knowledge."}, {"text": "The speaker was so powerful that he could ignore the youth's complaints entirely", "isCorrect": false, "rationale": "'Tyrant' is self-accusatory; the speaker condemns his own failure of compassion."}, {"text": "The speaker deliberately chose to cause the youth pain as revenge", "isCorrect": false, "rationale": "No deliberate revenge is claimed; the failure was one of memory and empathy, not malice."}], "id": "q03"}, {"question": "What is the meaning of 'humble salve which wounded bosoms fits' (line 14)?", "options": [{"text": "A medicinal ointment applied to physical wounds", "isCorrect": false, "rationale": "The salve is metaphorical — it refers to a tender apology or act of comfort."}, {"text": "The tender apology or comforting gesture that is appropriate for a hurt heart", "isCorrect": true, "rationale": "A 'salve' heals; a 'humble salve' is a humble apology or soothing word fitted to comfort wounded feelings — what each should have offered the other promptly."}, {"text": "The youth's beauty, which is itself a consolation to the speaker", "isCorrect": false, "rationale": "Beauty is not the salve here; the salve is the mutual comfort of swift acknowledgment of fault."}, {"text": "A formal written apology delivered by letter", "isCorrect": false, "rationale": "The salve is not described as written; it suggests a timely, humble gesture of comfort."}], "id": "q04"}, {"question": "What is the logic of the couplet: 'But that your trespass now becomes a fee; / Mine ransoms yours, and yours must ransom me'?", "options": [{"text": "The youth must pay financial compensation for his past cruelty", "isCorrect": false, "rationale": "The ransom is emotional and moral, not monetary."}, {"text": "Their mutual transgressions cancel each other: the youth's past unkindness pardons the speaker's current offense, and vice versa", "isCorrect": true, "rationale": "Each party's trespass becomes the 'ransom' that frees the other — a reciprocal economy of forgiveness where neither owes more than the other."}, {"text": "The speaker demands that the youth acknowledge guilt before any forgiveness is possible", "isCorrect": false, "rationale": "The couplet is not a demand; it establishes an equivalence of guilt and mutual pardon."}, {"text": "The youth's beauty is sufficient payment for the speaker's sins", "isCorrect": false, "rationale": "Beauty is not the currency here; the transgressions themselves are the ransoms."}], "id": "q05"}, {"question": "The phrase 'you've pass'd a hell of time' (line 8) is significant because it:", "options": [{"text": "Exaggerates the youth's suffering for comic effect", "isCorrect": false, "rationale": "No comic intent is present; the acknowledgment is genuine and empathetic."}, {"text": "Shows the speaker's genuine recognition that the youth suffered greatly from the speaker's unkindness", "isCorrect": true, "rationale": "By crediting the youth with having endured hell, the speaker demonstrates empathy — the very empathy he earlier admits he failed to exercise in time."}, {"text": "Accuses the youth of being overly dramatic about his pain", "isCorrect": false, "rationale": "The speaker validates the youth's suffering rather than dismissing it."}, {"text": "Suggests the youth was literally ill during the separation", "isCorrect": false, "rationale": "The suffering is emotional, not physical illness."}], "id": "q06"}, {"question": "The wish in lines 11-12 — 'O! that our night of woe might have remember'd / My deepest sense, how hard true sorrow hits' — expresses:", "options": [{"text": "Nostalgia for the painful period of separation", "isCorrect": false, "rationale": "The speaker does not feel nostalgia; he wishes the shared suffering had activated empathetic memory in time."}, {"text": "Regret that the shared experience of grief did not remind him sooner how deeply sorrow wounds, which would have made him more compassionate", "isCorrect": true, "rationale": "The speaker wishes the mutual 'night of woe' had triggered recall of his own past hurt sooner — enabling the prompt, humble salve."}, {"text": "Hope that future poets will remember his grief", "isCorrect": false, "rationale": "Posterity is not the concern; the wish is about timely empathy within the relationship."}, {"text": "A prayer for divine comfort during the night of suffering", "isCorrect": false, "rationale": "No religious or divine agency is invoked; the wish is psychological and relational."}], "id": "q07"}, {"question": "Sonnet CXX is distinctive among the apology sonnets (117-119) because it:", "options": [{"text": "Contains no apology and solely blames the youth", "isCorrect": false, "rationale": "The speaker does apologize and acknowledge his own tyrant behavior."}, {"text": "Grounds the speaker's appeal in the principle of reciprocal guilt — both parties have wronged each other and both must forgive", "isCorrect": true, "rationale": "Unlike 117-119, which focus on the speaker's own straying, CXX draws the youth into shared culpability and proposes a mutual economy of forgiveness."}, {"text": "Argues that the speaker's wrongdoing was actually more serious than the youth's", "isCorrect": false, "rationale": "The speaker establishes equivalence, not a hierarchy of fault."}, {"text": "Is written as a direct accusation against the youth with no self-criticism", "isCorrect": false, "rationale": "The speaker fully acknowledges his own tyranny; this is not a one-sided accusation."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
