<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker say the beloved's love and pity have done for him?", "options": [{"text": "Restored his reputation among his rivals", "isCorrect": false, "rationale": "The restoration is personal and internal, not among rivals."}, {"text": "Filled the impression that public scandal stamped on his brow", "isCorrect": true, "rationale": "'Your love and pity doth the impression fill, / Which vulgar scandal stamp'd upon my brow.'"}, {"text": "Inspired him to write better verse than before", "isCorrect": false, "rationale": "Poetic improvement is not the claim; healing of the scandal's mark is."}, {"text": "Made him indifferent to praise and blame equally", "isCorrect": false, "rationale": "While indifference results later in the poem, the opening specifically concerns healing the scandal's impression."}]}, {"question": "Why does the speaker say he doesn't care who calls him good or ill?", "options": [{"text": "Because he has become too famous to be affected by critics", "isCorrect": false, "rationale": "Fame is not the reason; the beloved's approval is the only validation he needs."}, {"text": "Because the beloved's approval covers his faults and validates his good", "isCorrect": true, "rationale": "'For what care I who calls me well or ill, / So you o'er-green my bad, my good allow?'"}, {"text": "Because he has developed stoic indifference to all opinion", "isCorrect": false, "rationale": "The indifference is not philosophical stoicism but specifically rooted in the beloved's exclusive approval."}, {"text": "Because all his critics have been discredited", "isCorrect": false, "rationale": "No discrediting of critics occurs; the speaker simply redirects his source of validation."}]}, {"question": "What does 'o'er-green my bad' mean?", "options": [{"text": "To grow too jealous of the speaker's bad behavior", "isCorrect": false, "rationale": "Jealousy is not the meaning; covering over or making green (fresh/alive) what is bad is."}, {"text": "To cover over or overgrow the speaker's faults as green vegetation covers bare ground", "isCorrect": true, "rationale": "The image is of the beloved's love growing like green growth over the bare ground of the speaker's faults, hiding and healing them."}, {"text": "To publicly defend the speaker against his critics", "isCorrect": false, "rationale": "The o'er-greening is private and remedial, not a public defense."}, {"text": "To feel disgust at the speaker's moral lapses", "isCorrect": false, "rationale": "The image is restorative and positive, not expressive of disgust."}]}, {"question": "What does the speaker say he has thrown into a 'profound abysm'?", "options": [{"text": "His past infidelities", "isCorrect": false, "rationale": "Infidelities are not what he throws into the abyss; others' opinions are."}, {"text": "All care for others' voices — critics' and flatterers' opinions alike", "isCorrect": true, "rationale": "'In so profound abysm I throw all care / Of others' voices, that my adder's sense / To critic and to flatterer stopped are.'"}, {"text": "His earlier, lesser poems", "isCorrect": false, "rationale": "No poems are discarded; only others' opinions are."}, {"text": "Any remaining affection for former companions", "isCorrect": false, "rationale": "Former companions are not the subject; critics and flatterers are."}]}, {"question": "What is the 'adder's sense' and why is it apt here?", "options": [{"text": "The adder's venomous strike, representing the speaker's anger at critics", "isCorrect": false, "rationale": "The adder's characteristic here is deafness, not venom."}, {"text": "The adder's proverbial deafness — the speaker is deaf to both critics and flatterers", "isCorrect": true, "rationale": "The adder was traditionally believed to be deaf to a charmer's music; the speaker says his sense is 'stopped' to both critic and flatterer, like an adder."}, {"text": "The adder's ability to sense vibrations in the ground, symbolizing heightened awareness", "isCorrect": false, "rationale": "The image is of deafness, not heightened sensitivity."}, {"text": "The adder's shedding of skin, representing the speaker's renewal", "isCorrect": false, "rationale": "Shedding skin is not the adder quality invoked; its proverbial deafness is."}]}, {"question": "What does 'You are so strongly in my purpose bred' mean?", "options": [{"text": "The beloved was born to serve the speaker's artistic purpose", "isCorrect": false, "rationale": "The line concerns the speaker's inner world, not the beloved's birth or function."}, {"text": "The beloved is so deeply embedded in the speaker's mind and aims that all else seems dead", "isCorrect": true, "rationale": "'You are so strongly in my purpose bred, / That all the world besides methinks are dead.'"}, {"text": "The speaker has written so many poems that the beloved is now inseparable from the work", "isCorrect": false, "rationale": "The blending is psychological and spiritual, not specifically poetic."}, {"text": "The beloved has been a strong influence on the speaker since birth", "isCorrect": false, "rationale": "The speaker is not describing a lifelong influence but a total present absorption in the beloved."}]}, {"question": "How does Sonnet CXII continue the theme of Sonnet CXI?", "options": [{"text": "It continues blaming Fortune for the speaker's problems", "isCorrect": false, "rationale": "Fortune is mentioned as cause in CXI; CXI's theme of scandal's aftermath is continued, but Fortune is not re-blamed in CXII."}, {"text": "It shows the beloved's love completing the healing begun in CXI — all external opinion is now irrelevant", "isCorrect": true, "rationale": "In CXI the speaker asks for pity as cure; in CXII that cure is declared complete — the beloved's approval makes all other voices meaningless."}, {"text": "It reverses CXI by attacking the beloved instead of Fortune", "isCorrect": false, "rationale": "There is no reversal; the sequence of confession and healing continues."}, {"text": "It introduces a new crisis replacing the one resolved in CXI", "isCorrect": false, "rationale": "No new crisis replaces the old one; CXII consolidates and completes CXI's resolution."}]}, {"question": "What is the emotional outcome for the speaker by the end of Sonnet CXII?", "options": [{"text": "Anxious about remaining social judgment", "isCorrect": false, "rationale": "Anxiety is dissolved; the speaker has thrown all care into a profound abyss."}, {"text": "Complete absorption in the beloved, indifferent to all external opinion", "isCorrect": true, "rationale": "The entire world besides the beloved seems dead to him; critics and flatterers are equally irrelevant."}, {"text": "Hopeful that his reputation will eventually be publicly restored", "isCorrect": false, "rationale": "Public restoration is not the goal; the beloved's exclusive approval has replaced all other validation."}, {"text": "Melancholy about the loss of public standing", "isCorrect": false, "rationale": "The poem celebrates liberation from concern for public standing, not mourning its loss."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
