<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What two figures does the speaker identify as his 'two loves'?", "options": [{"text": "His wife and his mistress", "isCorrect": false, "rationale": "The sonnet frames the two loves as a 'better angel' (fair man) and a 'worser spirit' (dark woman), not as wife and mistress."}, {"text": "A fair man (the better angel) and a dark woman (the worser spirit)", "isCorrect": true, "rationale": "'The better angel is a man right fair, / The worser spirit a woman colour'd ill' — these are the Fair Youth and the Dark Lady."}, {"text": "Virtue and vice as abstract allegories", "isCorrect": false, "rationale": "They are real people cast in allegorical roles, not purely abstract forces."}, {"text": "His soul and his body", "isCorrect": false, "rationale": "Soul and body are not the 'two loves'; the loves are the two people described."}]}, {"question": "What does the female 'evil' attempt to do to the speaker's better angel?", "options": [{"text": "Win him away from the speaker by turning him into a devil", "isCorrect": true, "rationale": "'To win me soon to hell, my female evil, / Tempteth my better angel from my side, / And would corrupt my saint to be a devil.'"}, {"text": "Warn the better angel about the speaker's sins", "isCorrect": false, "rationale": "Warning the angel is not her action; she tempts and corrupts."}, {"text": "Form an alliance with the better angel against the speaker", "isCorrect": false, "rationale": "An alliance against the speaker is not the dynamic; she seduces the angel away from the speaker."}, {"text": "Destroy the speaker's capacity to love either person", "isCorrect": false, "rationale": "Destroying the speaker's capacity to love is not the stated action; she aims to corrupt the better angel."}]}, {"question": "What is the speaker's uncertainty expressed in lines 11-12?", "options": [{"text": "Whether either of his loves is truly loyal to him", "isCorrect": false, "rationale": "He is certain of disloyalty on the Dark Lady's side; his uncertainty is specifically about the angel's transformation."}, {"text": "Whether his better angel has been turned into a fiend by the woman", "isCorrect": true, "rationale": "'And whether that my angel be turn'd fiend, / Suspect I may, yet not directly tell.'"}, {"text": "Whether he himself loves either figure sincerely", "isCorrect": false, "rationale": "His own love is not in doubt; the angel's corruption is the uncertain fact."}, {"text": "Whether the woman truly loves the better angel or is merely using him", "isCorrect": false, "rationale": "Her motivation is not the stated source of uncertainty; the angel's corruption is."}]}, {"question": "The phrase 'one angel in another's hell' (line 14) carries what meaning?", "options": [{"text": "That both figures are damned in theological terms", "isCorrect": false, "rationale": "While damnation is implied, 'another's hell' here carries a sexual double meaning beyond pure theology."}, {"text": "That the fair youth is sexually involved with the Dark Lady ('hell' as slang for female genitalia)", "isCorrect": true, "rationale": "Shakespeare uses 'hell' as sexual slang; the line guesses that the fair youth is now in the Dark Lady's embrace — a triple betrayal."}, {"text": "That the speaker imagines both figures are suffering in some spiritual torment", "isCorrect": false, "rationale": "Shared spiritual torment is not the point; the sexual betrayal is the crux."}, {"text": "That the better angel has descended literally to hell", "isCorrect": false, "rationale": "Literal theological descent is not the meaning; the language is figurative and sexually punning."}]}, {"question": "How does the speaker expect to eventually learn the truth about the two figures?", "options": [{"text": "Through a direct confrontation with both parties", "isCorrect": false, "rationale": "Confrontation is not mentioned; the couplet names a passive biological resolution."}, {"text": "He will live in doubt until his bad angel 'fires' his good one out (i.e., disease reveals the affair)", "isCorrect": true, "rationale": "'Till my bad angel fire my good one out' alludes to venereal disease as the eventual proof — a grim Elizabethan joke."}, {"text": "He will never know and will simply accept the uncertainty", "isCorrect": false, "rationale": "He does anticipate eventual knowledge, though via a painful route."}, {"text": "Through divine revelation or prayer", "isCorrect": false, "rationale": "Divine revelation is not the method; the allusion is to earthly, physical exposure."}]}, {"question": "The moral framework of 'better angel' vs. 'worser spirit' draws on which tradition?", "options": [{"text": "Greek mythology of the Muses", "isCorrect": false, "rationale": "The Muses are not the relevant framework; the angel/spirit duality is Christian-morality-play tradition."}, {"text": "The Christian morality play tradition of a good and evil angel contending for a soul", "isCorrect": true, "rationale": "Morality plays (like Marlowe's Dr. Faustus) feature a good and bad angel competing for a man's soul — Shakespeare invokes this directly."}, {"text": "Platonic philosophy of the tripartite soul", "isCorrect": false, "rationale": "Plato's soul divisions (reason, spirit, appetite) are not the direct framework operative here."}, {"text": "Astrological belief in ruling planetary influences", "isCorrect": false, "rationale": "Astrology is not the structuring idea; the angelic/demonic duality is literary-theological."}]}, {"question": "What does 'colour'd ill' mean in describing the woman?", "options": [{"text": "She is morally dark — wicked in character", "isCorrect": false, "rationale": "While moral darkness is implied, 'colour'd ill' primarily refers to her dark physical complexion in contrast to the fair youth."}, {"text": "She has a dark complexion, identifying her as the Dark Lady", "isCorrect": true, "rationale": "'Colour'd ill' contrasts with 'a man right fair' — the woman's dark coloring is her defining physical characteristic in the Dark Lady sequence."}, {"text": "She dresses in dark, funereal colors", "isCorrect": false, "rationale": "The phrase refers to skin color, not clothing."}, {"text": "She has been portrayed negatively by other poets", "isCorrect": false, "rationale": "Others' literary portrayal is not what 'colour'd ill' means here."}]}, {"question": "The couplet ending — 'Till my bad angel fire my good one out' — is tonally:", "options": [{"text": "Optimistic, anticipating a happy resolution", "isCorrect": false, "rationale": "Disease as the revelation of betrayal is anything but optimistic."}, {"text": "Grimly ironic: truth will arrive not through wisdom but through venereal infection", "isCorrect": true, "rationale": "The joke is bleak — the only 'evidence' he will get is catching a disease that his bad angel has 'fired' into his good one. The wit darkens the despair."}, {"text": "Spiritually consoling, trusting divine justice to reveal the truth", "isCorrect": false, "rationale": "Divine justice is not the comfort; the earthly, bodily mechanism is ignoble."}, {"text": "Resigned and emotionally detached", "isCorrect": false, "rationale": "Detachment is not the tone; there is bitter comic edge to the couplet."}]}, {"question": "Which theme does Sonnet CXLIV most centrally develop?", "options": [{"text": "The speaker's celebration of both loves as sources of inspiration", "isCorrect": false, "rationale": "Celebration is absent; the tone is anxious and suspicious."}, {"text": "The danger that the dark woman will corrupt the fair youth and destroy the speaker's two relationships", "isCorrect": true, "rationale": "The sonnet dramatizes the speaker's fear of a double betrayal: losing both the fair youth and his own moral standing to the Dark Lady's corrupting influence."}, {"text": "The equality of homosexual and heterosexual love in Elizabethan England", "isCorrect": false, "rationale": "Social equality of loves is not the theme; the speaker clearly ranks them (better/worse)."}, {"text": "The inevitability of death for all human relationships", "isCorrect": false, "rationale": "Mortality is not the central concern; betrayal and corruption are."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
