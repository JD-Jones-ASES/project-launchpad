<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker's paradoxical claim about the beloved's potential betrayal in Sonnet XCII?", "options": [{"text": "Betrayal would make the speaker stronger and more independent", "isCorrect": false, "rationale": "The speaker does not claim independence; the argument is about the relationship between life and love."}, {"text": "His life depends on the beloved's love, so if the beloved proves false, he will die before knowing it", "isCorrect": true, "rationale": "The sonnet argues that his life is sustained only by the beloved's love; therefore if the beloved becomes inconstant, the speaker will die — and death will spare him from the knowledge of betrayal."}, {"text": "He will outlive the beloved and be revenged", "isCorrect": false, "rationale": "Revenge is absent; the speaker's logic is one of fortunate ignorance through death, not revenge."}, {"text": "The beloved's betrayal proves the speaker was always unworthy", "isCorrect": false, "rationale": "This is the logic of LXXXVII; in XCII the argument has shifted to focus on mortality as protection from betrayal's pain."}], "id": "q01"}, {"question": "What does 'for term of life thou art assured mine' mean?", "options": [{"text": "The beloved is guaranteed to live a long time", "isCorrect": false, "rationale": "The clause is about the speaker's possession of the beloved's love, not about the beloved's longevity."}, {"text": "The beloved's love is guaranteed to the speaker for as long as the speaker lives", "isCorrect": true, "rationale": "'For term of life' is a legal phrase meaning for the duration of one's life; the speaker argues the beloved's love is his for life — because his life ends when that love ends."}, {"text": "The beloved is committed to the speaker by legal contract", "isCorrect": false, "rationale": "While legal language is present, the meaning here is about the duration of life, not a written contract."}, {"text": "The speaker promises to remain faithful for the rest of his life", "isCorrect": false, "rationale": "It is the beloved's love that is secured for the speaker's life-term, not the speaker's own fidelity being promised."}], "id": "q02"}, {"question": "What does 'thy revolt' mean in line 12 ('Since that my life on thy revolt doth lie')?", "options": [{"text": "The beloved's revolution or rebellion against society", "isCorrect": false, "rationale": "The revolt is not a social rebellion but a turning away from the speaker — an act of infidelity or desertion."}, {"text": "The beloved's turning away or act of unfaithfulness", "isCorrect": true, "rationale": "'Revolt' means a turning away or an act of abandonment; the speaker's life 'lies on' (depends on) whether or not the beloved revolts."}, {"text": "The beloved's sudden change of mood", "isCorrect": false, "rationale": "While mood is related, 'revolt' here specifically means the beloved turning away from the relationship entirely."}, {"text": "A military uprising", "isCorrect": false, "rationale": "The military meaning is not operative here; the word is used in the sense of turning against or abandoning."}], "id": "q03"}, {"question": "What is the 'happy title' the speaker discovers in lines 13-14?", "options": [{"text": "His title of nobility", "isCorrect": false, "rationale": "No literal aristocratic title is meant; 'title' here is used in the sense of a claim or right."}, {"text": "The fortunate claim that he is happy to have the beloved's love AND happy to die if it ends", "isCorrect": true, "rationale": "'Title' is a legal term for a rightful claim; the 'happy title' is the realization that both outcomes — having love and dying when it ends — are happiness. He cannot lose."}, {"text": "The title of the poem or sequence", "isCorrect": false, "rationale": "The word is not self-referential here; it operates within the poem's legal metaphor."}, {"text": "His claim to be the most devoted lover in history", "isCorrect": false, "rationale": "The title is specifically about the double-happiness of love and death-before-betrayal, not a comparative claim."}], "id": "q04"}, {"question": "What undermines the speaker's seemingly invincible position in the couplet?", "options": [{"text": "The speaker admits he does not actually love the beloved", "isCorrect": false, "rationale": "No such admission is made; the couplet introduces a different complication."}, {"text": "The realization that the beloved might already be false without the speaker knowing it", "isCorrect": true, "rationale": "The couplet punctures the argument: 'Thou mayst be false, and yet I know it not.' The entire argument about death-before-betrayal assumes the speaker would know when love ends — but the beloved could already be false."}, {"text": "The speaker realizes he will outlive the beloved", "isCorrect": false, "rationale": "The complication is about knowledge and ignorance, not about relative longevity."}, {"text": "His argument about life and love is shown to be logically flawed", "isCorrect": false, "rationale": "The logic is not directly attacked; the couplet introduces a factual complication rather than a logical refutation."}], "id": "q05"}, {"question": "How does the couplet of Sonnet XCII relate to the theme of estrangement in Chapter 9?", "options": [{"text": "It shows the speaker returning confidently to love", "isCorrect": false, "rationale": "The couplet deepens anxiety rather than resolving estrangement."}, {"text": "It reveals that estrangement may already be underway without the speaker's knowledge — the beloved may already be false", "isCorrect": true, "rationale": "The couplet introduces the unsettling possibility that the very estrangement the speaker fears may already exist; he simply does not yet know it, making the entire chapter's anxiety more acute."}, {"text": "It resolves the tension by offering the beloved forgiveness", "isCorrect": false, "rationale": "No forgiveness is offered; the couplet is a moment of sudden doubt, not resolution."}, {"text": "It confirms that the beloved has definitively ended the relationship", "isCorrect": false, "rationale": "No definitive ending is confirmed; the couplet is hypothetical ('mayst be false')."}], "id": "q06"}, {"question": "What is the logical structure (argument form) of lines 7-12 in Sonnet XCII?", "options": [{"text": "If-then reasoning: if love ends, life ends, therefore betrayal cannot wound the living speaker", "isCorrect": true, "rationale": "The argument is conditional: if the speaker's life depends on the beloved's love, then the worst outcome (the beloved leaving) will also end the speaker's life, so the speaker will never be alive to experience the pain of betrayal."}, {"text": "Analogy: love is like a battle that must be won or lost", "isCorrect": false, "rationale": "No battle analogy is operative in these lines."}, {"text": "Irony: the speaker pretends to be happy when he is actually devastated", "isCorrect": false, "rationale": "The argument is not ironic but genuinely paradoxical; the speaker's logic is presented as a real consolation."}, {"text": "Enumeration: listing all possible outcomes of the relationship", "isCorrect": false, "rationale": "The argument is not an enumeration but a logical chain with a specific conditional structure."}], "id": "q07"}, {"question": "What does 'inconstant mind' refer to in line 11?", "options": [{"text": "The speaker's inability to concentrate", "isCorrect": false, "rationale": "The inconstant mind belongs to the beloved, not the speaker."}, {"text": "The beloved's potential fickle changeability in affection", "isCorrect": true, "rationale": "'Inconstant mind' describes the beloved's tendency to change feelings; the speaker argues this cannot vex him because his life ends when the beloved's constancy ends."}, {"text": "The speaker's wavering between love and reason", "isCorrect": false, "rationale": "Though internal conflict is a general theme, 'inconstant mind' specifically names the beloved's character."}, {"text": "Fortune's unpredictability", "isCorrect": false, "rationale": "Fortune is named elsewhere in the chapter but not in this line; here the attribute belongs to the beloved."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
