        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet V</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are “those hours” that “did frame / The lovely gaze where every eye doth dwell”?", "options": [{"text": "The happy hours of childhood that formed the youth’s pleasant memories.", "isCorrect": false, "rationale": "The hours are Time’s formative agents that shaped the youth’s physical beauty, not his memories."}, {"text": "The hours of time that carefully fashioned the youth’s beautiful appearance.", "isCorrect": true, "rationale": "Shakespeare personifies the passing hours as craftsmen who “frame” (build and shape) the youth’s face — the beautiful gaze that holds everyone’s attention."}, {"text": "The evening hours when admirers gather to watch the youth.", "isCorrect": false, "rationale": "No gathering of admirers is described; the hours are the agents of Time that first create and then destroy beauty."}, {"text": "The poet’s own hours spent composing verses in praise of the youth.", "isCorrect": false, "rationale": "The poet is not the subject here; the hours belong to Time, which both creates and destroys."}], "id": "q01"}, {"question": "What does “play the tyrants to the very same” mean?", "options": [{"text": "The hours that created beauty will also tyrannize and destroy it.", "isCorrect": true, "rationale": "Shakespeare’s irony: the same hours that shaped the youth’s beauty will “play the tyrants” — turn against it, unfair (make unfair) what was fairly excellent."}, {"text": "Hours of leisure will corrupt the youth’s character and make him cruel.", "isCorrect": false, "rationale": "Character corruption is not the subject; the tyrant hours attack physical beauty, not moral virtue."}, {"text": "Historical tyrants will destroy the youth’s reputation in future ages.", "isCorrect": false, "rationale": "No political tyrants are involved; the hours of Time are the “tyrants” who ruin what they once made."}, {"text": "Playing at tyranny is a metaphor for the youth’s proud behavior.", "isCorrect": false, "rationale": "The youth is not called a tyrant here; the hours are."}], "id": "q02"}, {"question": "What does “that unfair which fairly doth excel” mean?", "options": [{"text": "Time will make ugly what is now fairly beautiful — it will strip the youth of his excellent beauty.", "isCorrect": true, "rationale": "“Unfair” is used as a verb here: to make unfair or ugly. Time, acting as tyrant, “unfairs” (destroys the fairness of) what currently excels in beauty."}, {"text": "A beautiful competition will be judged unfairly by the judges.", "isCorrect": false, "rationale": "No competition is described; “unfair” is a verb meaning to strip of beauty."}, {"text": "The youth’s inner unfairness (cruelty) contradicts his outer excellence.", "isCorrect": false, "rationale": "While the youth’s self-cruelty is a theme, this line is specifically about Time’s destruction of physical beauty."}, {"text": "It is unfair that someone so excellent should have to die.", "isCorrect": false, "rationale": "This is a plausible paraphrase of the sentiment but misses the specific verbal use of “unfair” (to make unfair)."}], "id": "q03"}, {"question": "What is the central seasonal metaphor of Sonnet V?", "options": [{"text": "Winter as a time of quiet reflection and spiritual renewal.", "isCorrect": false, "rationale": "Winter in this poem is destructive, not renewing; “hideous winter” confounds summer’s beauty."}, {"text": "Summer represents the youth’s beauty and vitality; winter represents age and death, which destroy summer unless its essence is preserved by distillation.", "isCorrect": true, "rationale": "The summer-to-winter arc is the structural spine of the poem; the key argument is that summer’s beauty can survive winter only if it is “distilled” (extracted and preserved, like perfume from flowers)."}, {"text": "Autumn represents the most fruitful time for reproduction, when harvesting is appropriate.", "isCorrect": false, "rationale": "Autumn is not featured; the poem moves directly from summer to “hideous winter.”"}, {"text": "Spring represents the youth’s potential, which he must realize before summer ends.", "isCorrect": false, "rationale": "Spring is not the focus; summer (the current peak of beauty) and winter (destruction) are the poem’s poles."}], "id": "q04"}, {"question": "What does “summer’s distillation” refer to?", "options": [{"text": "The process of fermenting summer fruits into wine.", "isCorrect": false, "rationale": "Wine-making is not the metaphor; distillation here refers specifically to the extraction of perfume from flowers."}, {"text": "The essence of flowers captured as perfume — a liquid that preserves summer’s fragrance even through winter.", "isCorrect": true, "rationale": "Distillation was the Elizabethan process of extracting essential oils from flowers to make perfume (“a liquid prisoner pent in walls of glass”); it becomes the metaphor for a child who carries the parent’s essence forward."}, {"text": "The memory of summer days preserved in poems and songs.", "isCorrect": false, "rationale": "Literary preservation is not the solution in Sonnet V; the distillation metaphor is about biological reproduction."}, {"text": "The heat of summer that warms the earth and enables growth the following spring.", "isCorrect": false, "rationale": "Heat energy is not the distillation being described; the image is of perfume extracted from flowers."}], "id": "q05"}, {"question": "What does “a liquid prisoner pent in walls of glass” describe?", "options": [{"text": "A person imprisoned in a glass tower.", "isCorrect": false, "rationale": "No literal imprisonment is described; this is an extended metaphor for perfume in a vial."}, {"text": "Distilled perfume or essence trapped in a glass vial — summer’s beauty preserved in concentrated form.", "isCorrect": true, "rationale": "The “liquid prisoner” is perfume: the essence of summer’s flowers, concentrated and contained in a glass bottle. This becomes the metaphor for the child who carries the parent’s essence."}, {"text": "Tears of grief locked inside the youth’s eyes.", "isCorrect": false, "rationale": "Grief is not the subject; the liquid is the distilled essence of summer (perfume), not tears."}, {"text": "Wine sealed in a glass flask to be opened in the future.", "isCorrect": false, "rationale": "Wine is not the specific image; perfume (rose water or floral essence) was the product of Elizabethan distillation."}], "id": "q06"}, {"question": "What does the couplet “But flowers distill’d, though they with winter meet, / Leese but their show; their substance still lives sweet” argue?", "options": [{"text": "Flowers are prettier in winter because the cold preserves their colors.", "isCorrect": false, "rationale": "Flowers lose their show (appearance) in winter; only their distilled substance (perfume) survives."}, {"text": "Flowers that have been distilled lose only their visible appearance in winter; their inner essence lives on as fragrance.", "isCorrect": true, "rationale": "“Leese” is an archaic form of “lose”; distilled flowers lose their outer “show” (appearance) but their substance (essence, scent) survives. The argument: if the youth “distils” himself into a child, he too survives winter."}, {"text": "Dried flowers in winter retain their full beauty just as they had in summer.", "isCorrect": false, "rationale": "Dried flowers lose their show; it is only the distilled essence that survives, not the whole flower."}, {"text": "Winter flowers are sweeter-smelling than summer ones because they are rarer.", "isCorrect": false, "rationale": "No comparison of seasonal flowers is made; the argument is about distilled essence surviving the winter of the flowers’ death."}], "id": "q07"}, {"question": "What archaic word means “lose” in the couplet?", "options": [{"text": "Leese", "isCorrect": true, "rationale": "“Leese” is an archaic English verb meaning to lose; it appears in the couplet as “Leese but their show.”"}, {"text": "Confound", "isCorrect": false, "rationale": "“Confound” means to ruin or destroy, not simply to lose; it appears earlier in the poem to describe winter’s effect on summer."}, {"text": "Bereft", "isCorrect": false, "rationale": "“Bereft” means deprived of something, but the archaic word for “lose” in the couplet is “leese.”"}, {"text": "Pent", "isCorrect": false, "rationale": "“Pent” means confined or shut in; it describes the liquid prisoner in the glass vial."}], "id": "q08"}, {"question": "How does the distillation metaphor connect Sonnet V to the procreation argument?", "options": [{"text": "It argues that poetry, like perfume, can capture a person’s essence and preserve it forever.", "isCorrect": false, "rationale": "Poetry as preserver is not introduced yet; in Sonnet V the distillation metaphor applies specifically to biological reproduction (producing a child)."}, {"text": "Just as flowers distilled into perfume survive the winter, the youth’s beauty will survive death if it is “distilled” into a child who inherits it.", "isCorrect": true, "rationale": "The metaphor is a precise analogy: flower : perfume :: parent : child. Just as distillation preserves floral essence beyond the flower’s death, reproduction preserves the parent’s beauty beyond the parent’s death."}, {"text": "The youth should literally learn the art of distillation in order to create perfumes that will be his legacy.", "isCorrect": false, "rationale": "The distillation is entirely metaphorical; no literal instruction in perfume-making is intended."}, {"text": "Distillation shows that beauty can be extracted from multiple sources and combined into something superior.", "isCorrect": false, "rationale": "No combination of multiple sources is implied; the metaphor is about one flower’s essence being preserved, just as one parent’s essence can be preserved in one child."}], "id": "q09"}, {"question": "What is the effect of the personification of “never-resting time” in line 5?", "options": [{"text": "It makes time seem friendly and industrious, like a helpful laborer.", "isCorrect": false, "rationale": "Time is not friendly here; it “leads summer on / To hideous winter” — it is inexorable and destructive."}, {"text": "It gives Time a quality of relentlessness and agency, emphasizing that its assault on beauty never pauses.", "isCorrect": true, "rationale": "By personifying Time as “never-resting,” Shakespeare stresses its ceaseless power: there is no truce, no holiday, no moment when beauty is safe from Time’s advance."}, {"text": "It reduces Time to a neutral natural force without moral significance.", "isCorrect": false, "rationale": "The personification actually heightens Time’s menace, making it feel like a deliberate agent rather than a neutral force."}, {"text": "It compares Time favorably to the industrious bee that keeps working through all seasons.", "isCorrect": false, "rationale": "No bee is introduced; the personification of Time is menacing, not admirable."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
