        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet IX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What excuse for remaining single does the poem address in its opening lines?", "options": [{"text": "The youth fears he will outlive his children and suffer greater grief.", "isCorrect": false, "rationale": "Fear of outliving children is not the excuse addressed; the poem focuses on the excuse of sparing a widow from grief."}, {"text": "The youth might be staying single to spare a potential wife the grief of widowhood if he dies.", "isCorrect": true, "rationale": "Shakespeare opens by entertaining — then demolishing — a possible sympathetic motive: the youth might be “fear’d” of making a widow weep. The argument is that this excuse does not hold."}, {"text": "The youth believes he is too poor to support a family.", "isCorrect": false, "rationale": "Poverty is not the excuse entertained; the poem frames the issue as a concern for a future widow’s tears."}, {"text": "The youth has not yet found a woman worthy of his beauty.", "isCorrect": false, "rationale": "Sonnet III already dismissed this excuse; Sonnet IX addresses a different objection (protecting a widow from grief)."}], "id": "q01"}, {"question": "What does “issueless shalt hap to die” mean?", "options": [{"text": "The youth will die suddenly in an accident.", "isCorrect": false, "rationale": "“Hap” can mean happen by chance, but “issueless” is the key word: dying without children (issue)."}, {"text": "The youth happens to die without children (issue), leaving no biological heir.", "isCorrect": true, "rationale": "“Issue” in Elizabethan English meant offspring; “issueless” means childless. The line predicts that if the youth dies without children, the world’s grief will be universal."}, {"text": "The youth will die without resolving his financial disputes.", "isCorrect": false, "rationale": "“Issue” here is biological (offspring), not legal or financial."}, {"text": "The youth dies before he can produce any creative works.", "isCorrect": false, "rationale": "Artistic output is not the meaning of “issue” here; the word specifically means children."}], "id": "q02"}, {"question": "What does “The world will wail thee like a makeless wife” mean?", "options": [{"text": "The world will mourn the youth as though it were a widow (makeless = without a mate) — with universal, inconsolable grief.", "isCorrect": true, "rationale": "“Makeless” is an archaic adjective meaning without a mate or spouse; the world, widowed of the youth’s beauty, will grieve like a widow who has lost her husband."}, {"text": "The world will produce bad imitations of the youth in place of the real thing.", "isCorrect": false, "rationale": "“Makeless” does not mean unable to make things; it means without a mate."}, {"text": "The world will be angry with the youth for leaving it without an heir.", "isCorrect": false, "rationale": "The emotion is grief, not anger; the world wails like a widow, not like a disappointed parent."}, {"text": "The youth’s future wife will regret the marriage once he is gone.", "isCorrect": false, "rationale": "The “widow” is the world itself, not a specific woman; the argument is about universal, cosmic loss."}], "id": "q03"}, {"question": "How does the poem argue that an ordinary widow’s situation is better than the world’s situation?", "options": [{"text": "An ordinary widow has legal rights to her husband’s estate, while the world inherits nothing.", "isCorrect": false, "rationale": "Legal inheritance is not the comparison; the argument is about keeping the husband’s form alive in memory through children."}, {"text": "A private widow can keep her husband’s “shape” (appearance, form) in mind through her children’s eyes, but the world has no such consolation if the youth leaves no children.", "isCorrect": true, "rationale": "Lines 7–8 argue that “every private widow well may keep / By children’s eyes, her husband’s shape in mind” — her children’s faces preserve his features. But the world’s widow has no such children to look at."}, {"text": "An ordinary widow can remarry, but the world cannot find a replacement for the youth.", "isCorrect": false, "rationale": "Remarriage is not mentioned; the consolation offered to the private widow is specifically the sight of her children’s faces."}, {"text": "A private widow mourns briefly but the world grieves forever for lost beauty.", "isCorrect": false, "rationale": "Duration of grief is not the contrast; the consolation of children’s faces is."}], "id": "q04"}, {"question": "What does “Look! what an unthrift in the world doth spend / Shifts but his place, for still the world enjoys it” argue?", "options": [{"text": "When a spendthrift wastes money, the money is not destroyed — it merely moves to someone else’s pocket, so the world still has it.", "isCorrect": true, "rationale": "A financial spendthrift only redistributes wealth; the world still has the money even if the individual doesn’t. But beauty squandered through non-reproduction is destroyed, not redistributed."}, {"text": "Rich people should share their wealth with the poor by spending freely.", "isCorrect": false, "rationale": "Charitable redistribution is not the argument; the point is to contrast financial waste (recoverable) with beauty’s waste (irrecoverable)."}, {"text": "Moving from place to place is wasteful and the youth should settle down.", "isCorrect": false, "rationale": "“Shifts but his place” means the money shifts to another pocket (not the person literally moving); the argument is about financial vs. biological waste."}, {"text": "The world’s economies are self-correcting and waste is always eventually recovered.", "isCorrect": false, "rationale": "Economic theory is not the point; the contrast is between money (recoverable through redistribution) and beauty (lost forever without reproduction)."}], "id": "q05"}, {"question": "What is the key distinction between financial waste and beauty’s waste in the poem?", "options": [{"text": "Financial waste harms only the individual, while beauty’s waste harms the entire world.", "isCorrect": false, "rationale": "While the scope of harm differs, the key distinction is that financial waste is recoverable (money shifts place) while beauty’s waste is terminal."}, {"text": "Financial waste is merely redistributed (someone else benefits), but beauty wasted through non-reproduction simply ends — it has no second life.", "isCorrect": true, "rationale": "The argument hinges on this distinction: money spent moves to another person and remains in circulation; beauty unused is destroyed permanently, with “no remembrance what it was” in the world."}, {"text": "Financial waste can be recovered by hard work, but beauty cannot be regained once lost.", "isCorrect": false, "rationale": "While this is partially true, the sonnet’s specific contrast is between redistribution (money’s escape from waste) and destruction (beauty’s fate without reproduction)."}, {"text": "Beauty is more valuable than money, so its waste is more regrettable.", "isCorrect": false, "rationale": "A value comparison is not the argument; the contrast is about recoverability vs. finality of different kinds of waste."}], "id": "q06"}, {"question": "What does the couplet mean: “No love toward others in that bosom sits / That on himself such murd’rous shame commits”?", "options": [{"text": "The youth is accused of literally planning harm against himself.", "isCorrect": false, "rationale": "“Murd’rous shame” is metaphorical; the murder is of the youth’s own beauty and legacy through non-reproduction."}, {"text": "A person who allows his beauty to die without issue has no real love for others, only a murderous form of self-destruction.", "isCorrect": true, "rationale": "Shakespeare turns the screw: withholding beauty from the world is not kindness (sparing a widow’s tears) but a form of self-murder that reveals the youth’s absence of love for anyone beyond himself."}, {"text": "The youth should be ashamed of his romantic relationships.", "isCorrect": false, "rationale": "Romantic shame is not the subject; the “murd’rous shame” is the act of allowing beauty to die without issue."}, {"text": "A heart full of self-love cannot feel shame for its actions.", "isCorrect": false, "rationale": "The couplet argues the opposite: the self-directed destruction is itself a form of shame, and the lack of love for others is a moral indictment."}], "id": "q07"}, {"question": "What is the effect of calling the youth’s self-containment “murd’rous”?", "options": [{"text": "It suggests the youth is violent and should be feared.", "isCorrect": false, "rationale": "No literal violence is implied; the word is used to intensify the moral accusation of self-destruction."}, {"text": "It escalates the language from earlier reproaches (niggard, churl, glutton) to a quasi-criminal charge, making the failure to reproduce morally equivalent to homicide.", "isCorrect": true, "rationale": "Earlier sonnets called the youth a miser and a glutton; calling him “murd’rous” raises the stakes to something graver — the destruction of beauty is a kind of killing."}, {"text": "It is a gentle hyperbole meant to make the youth laugh and not take the accusation seriously.", "isCorrect": false, "rationale": "The tone in the couplet is serious; the escalation to “murd’rous” is a rhetorical intensification, not a joke."}, {"text": "It is borrowed from legal language to suggest the youth could be prosecuted.", "isCorrect": false, "rationale": "While legal metaphors appear elsewhere in the sequence, “murd’rous” here is moral language, not a legal charge."}], "id": "q08"}, {"question": "What role does the shift in addressee — from a potential widow to the world as widow — play in the poem’s argument?", "options": [{"text": "It confuses the reader by switching subjects mid-poem.", "isCorrect": false, "rationale": "The shift is intentional and rhetorically clever; it amplifies the scale of loss."}, {"text": "It expands the stakes from the personal (one woman’s grief) to the universal (the world’s loss), making the procreation argument a civic and cosmic obligation.", "isCorrect": true, "rationale": "By declaring the world will be the youth’s widow, Shakespeare universalizes the loss: this is not just about one woman’s sorrow but about all of humanity mourning the extinction of extraordinary beauty."}, {"text": "It shifts focus from marriage to career, suggesting the youth owes his talents to the world.", "isCorrect": false, "rationale": "Career is not the subject; the world-as-widow metaphor is about the loss of beauty, not professional contribution."}, {"text": "It softens the accusation by showing sympathy for the youth’s reluctance to cause a widow’s grief.", "isCorrect": false, "rationale": "The sympathy is immediately swept aside; the world-as-widow image amplifies, not softens, the obligation to reproduce."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
