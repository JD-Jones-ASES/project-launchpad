<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central comparison proposed in the opening line of Sonnet XVIII?", "options": [{"text": "The speaker compares his love to a rose in bloom", "isCorrect": false, "rationale": "The sonnet does not compare the beloved to a rose; it opens with the famous question about comparing to a summer’s day."}, {"text": "The speaker asks whether to compare his beloved to a summer’s day", "isCorrect": true, "rationale": "The opening line “Shall I compare thee to a summer’s day?” establishes the central metaphor the speaker will ultimately reject in favor of praising the beloved’s superior qualities."}, {"text": "The speaker compares summer to winter’s cold", "isCorrect": false, "rationale": "Winter is not mentioned; the comparison is between the beloved and a summer’s day."}, {"text": "The speaker compares himself to the sun’s golden light", "isCorrect": false, "rationale": "The speaker does not compare himself to the sun; the sun (“eye of heaven”) is used to show summer’s imperfections."}]}, {"question": "In Sonnet XVIII, why does the speaker conclude that his beloved surpasses a summer’s day?", "options": [{"text": "Because his beloved is richer and more powerful than nature", "isCorrect": false, "rationale": "The argument is not about wealth or power but about permanence and constancy versus nature’s imperfections."}, {"text": "Because summer is too cold and dark for comparison", "isCorrect": false, "rationale": "Summer is described as sometimes too hot, not too cold; the problem with summer is its impermanence and extremes."}, {"text": "Because his beloved is more lovely, more temperate, and free from summer’s faults", "isCorrect": true, "rationale": "The speaker lists summer’s shortcomings—rough winds, too-brief duration, excessive heat—and declares the beloved more lovely and temperate, immune to those faults."}, {"text": "Because his beloved can control the seasons", "isCorrect": false, "rationale": "No such claim is made; the beloved’s advantage is constancy, not power over nature."}]}, {"question": "What does “summer’s lease hath all too short a date” mean?", "options": [{"text": "Summer lawns are beautiful but brief", "isCorrect": false, "rationale": "The line is a metaphor about time, not about lawns or physical property."}, {"text": "Summer’s time on earth is too brief, like a short rental period", "isCorrect": true, "rationale": "The word “lease” is a legal metaphor meaning a temporary arrangement; summer’s “lease” has an expiration, making its beauty fleeting."}, {"text": "Summer brings a legal dispute over ownership of beauty", "isCorrect": false, "rationale": "While “lease” is a legal term, the metaphor refers to duration, not a dispute."}, {"text": "Summer’s heat destroys property like a reckless tenant", "isCorrect": false, "rationale": "The point is about summer’s brief duration, not destructive behavior."}]}, {"question": "What literary device is used in “the eye of heaven”?", "options": [{"text": "Simile", "isCorrect": false, "rationale": "A simile uses “like” or “as.” “Eye of heaven” does not use those comparison words."}, {"text": "Personification", "isCorrect": false, "rationale": "While “eye” suggests a human feature, the phrase is more specifically a metaphor giving the sun a descriptive identity."}, {"text": "Metaphor", "isCorrect": true, "rationale": "“Eye of heaven” is a metaphor equating the sun with a watching eye, vividly describing its brightness and position in the sky."}, {"text": "Alliteration", "isCorrect": false, "rationale": "Alliteration requires repeated consonant sounds at the start of words; “eye of heaven” does not demonstrate this device."}]}, {"question": "What threat does the speaker say will NOT affect the beloved, unlike all other beautiful things?", "options": [{"text": "Illness and plague", "isCorrect": false, "rationale": "Illness is not mentioned as a threat in this sonnet; the threats discussed are time, chance, and nature’s changes."}, {"text": "War and destruction", "isCorrect": false, "rationale": "War is not mentioned; the sonnet focuses on natural decline rather than violent destruction."}, {"text": "The fading caused by chance or nature’s changing course", "isCorrect": true, "rationale": "Line 9 begins “But thy eternal summer shall not fade,” promising the beloved immunity from the decline that affects all other fair things through chance or nature."}, {"text": "Forgetfulness and neglect", "isCorrect": false, "rationale": "Forgetfulness is not presented as the threat; the sonnet focuses on natural decay and time."}]}, {"question": "What is the volta (turn) in Sonnet XVIII, and where does it occur?", "options": [{"text": "At line 5, when the speaker criticizes the sun", "isCorrect": false, "rationale": "Line 5 continues the catalogue of summer’s faults rather than turning toward the solution."}, {"text": "At line 9, with “But thy eternal summer shall not fade”", "isCorrect": true, "rationale": "The volta at line 9 shifts from describing summer’s imperfections to proclaiming the beloved’s eternal beauty preserved by verse, turning the poem toward its triumphant conclusion."}, {"text": "At line 13, in the final couplet", "isCorrect": false, "rationale": "The couplet (lines 13–14) delivers the final resolution, but the turn in argument begins at line 9."}, {"text": "At line 3, when rough winds are introduced", "isCorrect": false, "rationale": "Line 3 begins the catalogue of summer’s flaws, not the turn toward the beloved’s superiority."}]}, {"question": "How does the speaker propose to preserve his beloved’s beauty?", "options": [{"text": "By painting a portrait that will outlast time", "isCorrect": false, "rationale": "The sonnet does not mention painting; the medium of preservation is explicitly poetry."}, {"text": "By building a monument of stone and marble", "isCorrect": false, "rationale": "Stone monuments are not mentioned; this is a theme more prominent in other sonnets like Sonnet LV."}, {"text": "Through the immortalizing power of this very poem", "isCorrect": true, "rationale": "“In eternal lines to time thou grow’st” promises that the verse itself will keep the beloved alive as long as humans can read and breathe."}, {"text": "By having children who will inherit the beloved’s beauty", "isCorrect": false, "rationale": "Procreation as a means of preservation is the argument of the earlier sonnets (1–17), but Sonnet XVIII shifts to poetry as the solution."}]}, {"question": "What does the closing couplet “So long lives this, and this gives life to thee” mean?", "options": [{"text": "The speaker will live long because his beloved keeps him healthy", "isCorrect": false, "rationale": "The couplet refers to the poem’s survival, not the speaker’s health."}, {"text": "The poem will endure as long as humans exist, and that endurance grants the beloved immortality", "isCorrect": true, "rationale": "“This” refers to the poem itself; as long as people can read, the poem survives, and through it the beloved’s beauty lives on permanently."}, {"text": "The beloved will live long enough to outlast the speaker", "isCorrect": false, "rationale": "The couplet is about poetic immortality, not biological lifespan."}, {"text": "Love itself is what keeps both speaker and beloved alive", "isCorrect": false, "rationale": "While love is the poem’s subject, the couplet specifically credits the poem (“this”) as the agent of immortality."}]}, {"question": "The phrase “eternal lines” in Sonnet XVIII refers to:", "options": [{"text": "The lines on the beloved’s face carved by age", "isCorrect": false, "rationale": "In Sonnet XIX Shakespeare uses the image of Time carving lines on a face, but in XVIII “eternal lines” refers to the lines of the poem."}, {"text": "The lines of longitude that circle the earth", "isCorrect": false, "rationale": "Geographic lines are not the intended meaning; the context is literary and temporal, not geographic."}, {"text": "The lines of the poem that will preserve the beloved forever", "isCorrect": true, "rationale": "“In eternal lines to time thou grow’st” means the beloved grows into time’s permanence through being inscribed in these immortal poetic lines."}, {"text": "Family lineage passed down through generations", "isCorrect": false, "rationale": "Lineage as preservation belongs to the procreation sonnets; here the preservation is explicitly through written verse."}]}, {"question": "Which word best describes the overall tone of Sonnet XVIII?", "options": [{"text": "Melancholy and despairing", "isCorrect": false, "rationale": "While the sonnet acknowledges mortality, its dominant tone is triumphant and celebratory, not despairing."}, {"text": "Triumphant and celebratory", "isCorrect": true, "rationale": "The sonnet moves from questioning comparison to confidently proclaiming the beloved’s eternal beauty through verse, ending on a note of poetic triumph."}, {"text": "Bitter and accusatory", "isCorrect": false, "rationale": "There is no bitterness or accusation in this sonnet; it is an act of praise and declaration."}, {"text": "Anxious and uncertain", "isCorrect": false, "rationale": "Despite the opening question, the sonnet resolves with certainty about the power of poetry to immortalize beauty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
