<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What three words does the Dark Lady initially speak to the speaker?", "options": [{"text": "'I love you'", "isCorrect": false, "rationale": "Love is the opposite of what she speaks; she says 'I hate.'"}, {"text": "'I hate'", "isCorrect": true, "rationale": "'Breathed forth the sound that said \"I hate\"' — those two words of rejection cause the speaker to languish."}, {"text": "'I pity thee'", "isCorrect": false, "rationale": "Pity is what she moves toward, not what she initially says."}, {"text": "'I forgive thee'", "isCorrect": false, "rationale": "Forgiveness is not the initial utterance; she first says 'I hate.'"}], "id": "q01"}, {"question": "What causes the Dark Lady to alter her statement?", "options": [{"text": "She realizes she loves the speaker after all", "isCorrect": false, "rationale": "The poem does not say she recognizes love; she sees his woeful state and mercy enters her heart."}, {"text": "She sees the speaker's woeful state and mercy enters her heart", "isCorrect": true, "rationale": "'But when she saw my woeful state, / Straight in her heart did mercy come' — pity, not love, motivates the change."}, {"text": "A friend advises her to be kinder to the speaker", "isCorrect": false, "rationale": "No third party appears; the change is internal to her."}, {"text": "The speaker argues her out of her hatred", "isCorrect": false, "rationale": "The speaker does not argue; he simply languishes and she observes his state."}], "id": "q02"}, {"question": "How does mercy 'chide' her tongue?", "options": [{"text": "It reproves the tongue for being sweet and kind", "isCorrect": false, "rationale": "Mercy chides the tongue for saying 'I hate,' not for sweetness."}, {"text": "It reproves the tongue for uttering 'I hate' when its habit was gentle speech", "isCorrect": true, "rationale": "'Chiding that tongue that ever sweet / Was us'd in giving gentle doom' — her tongue is scolded for a harshness contrary to its usual tenderness."}, {"text": "It teaches the tongue a new prayer of forgiveness", "isCorrect": false, "rationale": "Prayer is not the frame; mercy simply corrects the tongue's harsh word."}, {"text": "It silences the tongue permanently", "isCorrect": false, "rationale": "The tongue is not silenced; it is redirected to a new greeting."}], "id": "q03"}, {"question": "What simile describes how the amended phrase follows the original 'I hate'?", "options": [{"text": "As dawn follows a storm", "isCorrect": false, "rationale": "The simile is day following night, not dawn following a storm."}, {"text": "As gentle day follows night, which has fled from heaven to hell", "isCorrect": true, "rationale": "'That followed it as gentle day, / Doth follow night, who like a fiend / From heaven to hell is flown away.'"}, {"text": "As spring follows winter", "isCorrect": false, "rationale": "The seasons simile is not the one Shakespeare uses; day and night are the comparison."}, {"text": "As a lamb follows its mother", "isCorrect": false, "rationale": "No animal simile appears in this sonnet."}], "id": "q04"}, {"question": "What phrase does she ultimately speak to save the speaker's life?", "options": [{"text": "'Not thee'", "isCorrect": false, "rationale": "Close but not exact; the phrase is 'not you,' directed as an object of the hate she throws away."}, {"text": "'not you'", "isCorrect": true, "rationale": "'\"I hate\", from hate away she threw, / And sav'd my life, saying \"not you\"' — she abandons hatred, excluding him from it."}, {"text": "'I love'", "isCorrect": false, "rationale": "She does not positively declare love; she merely withdraws the hatred."}, {"text": "'I forgive'", "isCorrect": false, "rationale": "Forgiveness is not the word; the relief comes from the exception 'not you.'"}], "id": "q05"}, {"question": "Sonnet CXLV is unusual in the sequence for its form. What distinguishes it metrically?", "options": [{"text": "It is written in hexameter rather than pentameter", "isCorrect": false, "rationale": "Hexameter is six feet; the unusual meter of CXLV is four feet (tetrameter), not six."}, {"text": "It is written in iambic tetrameter rather than the standard iambic pentameter", "isCorrect": true, "rationale": "CXLV is the only sonnet in the sequence composed in iambic tetrameter (four stresses per line), making it shorter and more song-like."}, {"text": "It abandons the rhyme scheme entirely and is written in blank verse", "isCorrect": false, "rationale": "The sonnet does rhyme; only the line length differs from the standard."}, {"text": "It has fifteen lines instead of fourteen", "isCorrect": false, "rationale": "The sonnet has the standard fourteen lines; the meter, not line count, is anomalous."}], "id": "q06"}, {"question": "Some scholars believe 'hate away' in the couplet is a pun on 'Hathaway.' What would this suggest?", "options": [{"text": "That the sonnet is addressed to Shakespeare's patron, not the Dark Lady", "isCorrect": false, "rationale": "If the Hathaway pun is intended, the addressee would be Anne Hathaway (Shakespeare's wife), not a patron."}, {"text": "That the sonnet may have been an early poem addressed to Anne Hathaway, Shakespeare's wife", "isCorrect": true, "rationale": "The Hathaway pun ('hate away' / Hath-a-way) and the tetrameter form suggest CXLV may predate the sequence as a youthful poem to Anne Hathaway."}, {"text": "That Shakespeare considered the Dark Lady to be a hateful figure and names her here", "isCorrect": false, "rationale": "The pun is biographical, not characterological; it names the woman, not her quality."}, {"text": "That the Dark Lady and Anne Hathaway were the same person", "isCorrect": false, "rationale": "Scholars do not generally identify the Dark Lady with Anne Hathaway; the pun only suggests this single sonnet may have a different origin."}], "id": "q07"}, {"question": "What does 'giving gentle doom' mean in line 9?", "options": [{"text": "Pronouncing kind judgments or gentle sentences", "isCorrect": true, "rationale": "'Doom' in Elizabethan usage means judgment or sentence; 'gentle doom' means her tongue habitually delivered kind, lenient verdicts."}, {"text": "Foretelling a sweet death", "isCorrect": false, "rationale": "Foretelling is not the meaning of 'doom' here; it is about her tongue's usual mode of speaking judgment."}, {"text": "Offering gentle curses", "isCorrect": false, "rationale": "Curses are not the meaning; doom here is neutral judgment, not cursing."}, {"text": "Condemning others gently to hell", "isCorrect": false, "rationale": "The theological sense of damnation is not what the line invokes here."}], "id": "q08"}, {"question": "The overall emotional movement of the sonnet is best described as:", "options": [{"text": "From joy to sorrow", "isCorrect": false, "rationale": "The movement is the reverse — from pain toward relief."}, {"text": "From despair at rejection to relief at a merciful correction", "isCorrect": true, "rationale": "The speaker languishes under 'I hate,' then is saved when the Dark Lady amends her words to exclude him — a movement from near-death to life."}, {"text": "From anger at her coldness to acceptance of unrequited love", "isCorrect": false, "rationale": "Anger is not the speaker's initial emotion; languishing grief is. And the conclusion is not acceptance of unrequited love but relief."}, {"text": "From sinful desire to spiritual repentance", "isCorrect": false, "rationale": "Repentance is not the arc; this is an emotional, not spiritual, journey."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
