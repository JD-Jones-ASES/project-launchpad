    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CLIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Where does Sonnet CLIII claim Cupid's brand (torch) was extinguished?", "options": [{"text": "In the ocean by a sea goddess", "isCorrect": false, "rationale": "The ocean is not the setting; the specific location is a cold valley-fountain."}, {"text": "In a cold valley-fountain by a maid of Diana", "isCorrect": true, "rationale": "'A maid of Dian's this advantage found, / And his love-kindling fire did quickly steep / In a cold valley-fountain of that ground.'"}, {"text": "In a river by the speaker's mistress", "isCorrect": false, "rationale": "The speaker's mistress reignites the brand later; the initial quenching is by Diana's maid in a fountain."}, {"text": "In a bathing pool at a Roman spa", "isCorrect": false, "rationale": "No Roman spa is named; the valley-fountain is the site, and the spa/bath is the result of the quenching."}], "id": "q01"}, {"question": "What effect does the quenching of Cupid's torch have on the fountain water?", "options": [{"text": "The water becomes poisonous", "isCorrect": false, "rationale": "Poison is not the effect; the water acquires therapeutic heat."}, {"text": "The water acquires a perpetual healing heat and becomes a medicinal bath", "isCorrect": true, "rationale": "'Which borrow'd from this holy fire of Love, / A dateless lively heat, still to endure, / And grew a seething bath, which yet men prove / Against strange maladies a sovereign cure.'"}, {"text": "The water becomes ice-cold and freezes all who bathe in it", "isCorrect": false, "rationale": "Freezing is the opposite; the water becomes seething hot and healing."}, {"text": "The water becomes enchanted and grants wishes to bathers", "isCorrect": false, "rationale": "Wish-granting is not the effect; medicinal healing heat is."}], "id": "q02"}, {"question": "Who re-ignites Cupid's brand after it has been extinguished?", "options": [{"text": "Diana herself", "isCorrect": false, "rationale": "Diana (goddess of chastity) is the patron of the maid who quenched it; she does not re-ignite it."}, {"text": "The speaker's mistress, through the fire of her eye", "isCorrect": true, "rationale": "'But at my mistress' eye Love's brand new-fired' — the Dark Lady's gaze re-kindles the torch."}, {"text": "Venus, goddess of love", "isCorrect": false, "rationale": "Venus does not appear in the sonnet; it is the speaker's mistress who re-ignites the brand."}, {"text": "Cupid himself, upon waking", "isCorrect": false, "rationale": "Cupid wakes but it is the mistress's eye, not Cupid's own effort, that fires the brand anew."}], "id": "q03"}, {"question": "Why does the speaker go to the bath?", "options": [{"text": "To cool his passion for the Dark Lady", "isCorrect": false, "rationale": "Cooling passion is the hoped-for effect, not the specific illness being treated; the sonnet says he is 'sick' and seeks a cure."}, {"text": "He is sick from love's fire (re-kindled by his mistress) and seeks the bath as a cure", "isCorrect": true, "rationale": "'I, sick withal, the help of bath desired, / And thither hied, a sad distemper'd guest.'"}, {"text": "He is on a religious pilgrimage to a holy well", "isCorrect": false, "rationale": "Religious pilgrimage is not the motivation; he seeks physical/medical cure for love-sickness."}, {"text": "He goes to prove the legend of Cupid's torch to be false", "isCorrect": false, "rationale": "Disproving the legend is not his purpose; he genuinely seeks the cure."}], "id": "q04"}, {"question": "What does the speaker find (or fail to find) at the bath?", "options": [{"text": "He finds relief and is cured of his love-sickness", "isCorrect": false, "rationale": "The outcome is the opposite — he finds no cure."}, {"text": "He finds no cure — the only effective bath lies in his mistress's eyes, the source of his fever", "isCorrect": true, "rationale": "'But found no cure, the bath for my help lies / Where Cupid got new fire; my mistress' eyes' — the cure is identical to the cause."}, {"text": "He finds the maid of Diana, who refuses to help him", "isCorrect": false, "rationale": "Diana's maid is not at the bath in the present narrative; she appears only in the mythological past."}, {"text": "He finds that the bath has gone cold and lost its healing power", "isCorrect": false, "rationale": "The bath's temperature is not the issue; the problem is that it cannot cure love."}], "id": "q05"}, {"question": "The Anacreontic myth underlying Sonnets CLIII and CLIV originates in:", "options": [{"text": "Virgil's Aeneid", "isCorrect": false, "rationale": "The Aeneid does not contain this Cupid/nymph/torch myth; it comes from the Greek epigrammatic tradition."}, {"text": "The Greek Anthology — a poem attributed to or in the manner of Anacreon", "isCorrect": true, "rationale": "The myth of Cupid's torch being quenched in water by a nymph appears in the Greek Anthology (Palatine Anthology 9.627), and the myth type is associated with Anacreontic verse."}, {"text": "Ovid's Metamorphoses", "isCorrect": false, "rationale": "Ovid does not tell this precise story, though Shakespeare knew Ovid well for other myths."}, {"text": "Plato's Symposium", "isCorrect": false, "rationale": "The Symposium discusses Eros philosophically but does not contain this torch-quenching narrative."}], "id": "q06"}, {"question": "The paradox at the heart of the sonnet is:", "options": [{"text": "The maid of Diana (chastity) creates the very bath that men use for love-diseases", "isCorrect": false, "rationale": "While this is an irony in the myth, the deeper paradox the sonnet builds to is about cure and cause."}, {"text": "The cure for love-sickness (the bath) and the cause of it (the mistress's fire) are the same source", "isCorrect": true, "rationale": "The bath was created by Cupid's fire; his mistress's eye is now that fire's source — so the cure resides where the disease originates, making cure impossible."}, {"text": "Chaste Diana's maid unintentionally serves the purposes of love", "isCorrect": false, "rationale": "While ironic, this is secondary to the main paradox of cure-equals-cause."}, {"text": "Cupid is more powerful asleep than awake", "isCorrect": false, "rationale": "Cupid's sleeping vs. waking power is not the central paradox; the cure/cause identity is."}], "id": "q07"}, {"question": "What is the function of the myth in Sonnet CLIII relative to the rest of the Dark Lady sequence?", "options": [{"text": "It introduces a new character — Diana — as a rival to the Dark Lady", "isCorrect": false, "rationale": "Diana is not a rival to the Dark Lady; the myth is a vehicle to express the speaker's love-sickness."}, {"text": "It transforms the personal suffering of the sequence into a mythological frame, universalizing the speaker's love-madness", "isCorrect": true, "rationale": "By encoding the Dark Lady's power in ancient myth, Shakespeare elevates the sequence's conclusion from personal complaint to a timeless account of love's incurability."}, {"text": "It repudiates all the preceding sonnets by suggesting love was never real", "isCorrect": false, "rationale": "Repudiation is not the function; the myth affirms love's overwhelming power."}, {"text": "It provides a light comic coda that releases the tension of the preceding sonnets", "isCorrect": false, "rationale": "The coda has elegance but the paradox of incurability makes it more bittersweet than simply comic."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
