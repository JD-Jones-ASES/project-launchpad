<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central question driving Sonnet LXVII?", "options": [{"text": "Why the beloved refuses to love the speaker in return", "isCorrect": false, "rationale": "The sonnet does not address unrequited love; it questions why the beloved lives among corruption."}, {"text": "Why the beloved, embodying genuine beauty and virtue, continues to live in a corrupt world that exploits his presence", "isCorrect": true, "rationale": "Lines 1–4 ask: why should he live with infection and grace impiety? His presence allows sin to benefit and associate with goodness."}, {"text": "Whether the beloved should leave the city for the countryside", "isCorrect": false, "rationale": "The sonnet’s concern is philosophical and moral, not a geographical recommendation."}, {"text": "Whether false cosmetics can ever rival genuine beauty", "isCorrect": false, "rationale": "False cosmetics are addressed in lines 5–6, but they are a component of the larger question, not the central one."}]}, {"question": "What does “false painting” (line 5) refer to?", "options": [{"text": "Portraits that flatter sitters beyond their real appearance", "isCorrect": false, "rationale": "While related, “false painting” specifically refers to cosmetics and artificial beautification."}, {"text": "Cosmetics and artificial beautification that imitate the beloved’s natural coloring", "isCorrect": true, "rationale": "Lines 5–6: “Why should false painting imitate his cheek, / And steal dead seeming of his living hue?” Cosmetics (“false painting”) copy the beloved’s natural color."}, {"text": "Dishonest poetry that praises unworthy subjects", "isCorrect": false, "rationale": "The painting metaphor is about cosmetics, not poetic dishonesty."}, {"text": "The beloved’s own habit of wearing ornamental dress", "isCorrect": false, "rationale": "The “false painting” belongs to others who imitate the beloved, not to the beloved himself."}]}, {"question": "What does “Roses of shadow” (line 10) mean?", "options": [{"text": "Roses planted in a shaded garden", "isCorrect": false, "rationale": "The phrase is metaphorical, not botanical."}, {"text": "Artificial or imitation roses (cosmetic blushes) that are mere shadows of the beloved’s true rose-like beauty", "isCorrect": true, "rationale": "“Shadow” means imitation or copy; “poor beauty” seeks artificial color (“roses of shadow”) since the beloved’s rose is true and genuine."}, {"text": "The dark side of the beloved’s nature that the speaker cannot reach", "isCorrect": false, "rationale": "The phrase refers to cosmetic imitation, not to the beloved’s darker aspects."}, {"text": "Fading roses that have lost their color in the shade", "isCorrect": false, "rationale": "The image concerns artificial imitation, not literal fading flowers."}]}, {"question": "What does “Nature bankrupt” (line 11) mean?", "options": [{"text": "Nature has used up all its resources in creating the beloved’s beauty", "isCorrect": true, "rationale": "Lines 11–12: “Why should he live, now Nature bankrupt is, / Beggar’d of blood to blush through lively veins?” Nature has spent all its vital resources on the beloved."}, {"text": "Nature is morally corrupt and without virtue", "isCorrect": false, "rationale": "Bankrupt here means financially/resourcefully depleted, not morally corrupt."}, {"text": "Nature no longer creates beautiful things since the beloved’s birth", "isCorrect": false, "rationale": "While close, the specific meaning is that Nature has exhausted its resources (“blood to blush”) by investing them all in the beloved."}, {"text": "The natural world has been destroyed by human civilization", "isCorrect": false, "rationale": "The bankruptcy is metaphorical: Nature has invested all its beauty in the beloved."}]}, {"question": "What does “she hath no exchequer now but his” (line 13) mean?", "options": [{"text": "The beloved controls Nature’s financial accounts", "isCorrect": false, "rationale": "The line is metaphorical: Nature’s “exchequer” (treasury) is now entirely the beloved."}, {"text": "Nature’s only remaining treasury of beauty is the beloved himself", "isCorrect": true, "rationale": "“Exchequer” is a treasury; Nature has spent all her beauty resources and only the beloved remains as her storehouse."}, {"text": "The beloved is the only one who gives money to Nature’s conservation", "isCorrect": false, "rationale": "The metaphor concerns beauty, not literal finance."}, {"text": "Nature profits from the beloved’s presence by making other things appear beautiful", "isCorrect": false, "rationale": "The couplet says Nature stores him as a display of her past wealth, not that she profits from him."}]}, {"question": "What does the couplet suggest about the beloved’s function in Nature’s plan?", "options": [{"text": "The beloved is stored by Nature to display what beauty and wealth she once possessed", "isCorrect": true, "rationale": "Lines 15–16: “O! him she stores, to show what wealth she had / In days long since, before these last so bad.” The beloved is a living museum of Nature’s former abundance."}, {"text": "Nature intends the beloved to replenish his beauty over time", "isCorrect": false, "rationale": "Nature is bankrupt; she cannot replenish; the beloved is a stored remnant of past wealth."}, {"text": "The beloved will outlive Nature and carry her legacy", "isCorrect": false, "rationale": "The couplet positions the beloved as a display from the past, not a future legacy-bearer."}, {"text": "Nature hides the beloved from the corrupt world to protect him", "isCorrect": false, "rationale": "Nature stores him to show (display), not to hide."}]}, {"question": "What theme does Sonnet LXVII share with Sonnet LXVIII?", "options": [{"text": "The speaker’s grief over the beloved’s inevitable death", "isCorrect": false, "rationale": "Both sonnets focus on the beloved as a genuine beauty in a corrupt age, not on grief over death."}, {"text": "The beloved as a living relic of genuine, unadorned beauty in an age of artifice and decay", "isCorrect": true, "rationale": "Both sonnets position the beloved as an authentic example of true beauty that contrasts with the false cosmetics and artificiality of the present age."}, {"text": "The power of verse to immortalize the beloved", "isCorrect": false, "rationale": "Neither LXVII nor LXVIII focuses on verse as a preserving force."}, {"text": "The beloved’s moral failures that the speaker must forgive", "isCorrect": false, "rationale": "The beloved in these sonnets is presented as morally and aesthetically admirable, not as morally flawed."}]}, {"question": "What does “grace impiety” (line 2) mean?", "options": [{"text": "The beloved demonstrates graceful religious devotion", "isCorrect": false, "rationale": "“Grace” here is a verb meaning to honor or dignify; “impiety” is ungodliness."}, {"text": "The beloved’s presence honors and dignifies the ungodly and corrupt", "isCorrect": true, "rationale": "Line 2: “And with his presence grace impiety” — the beloved’s mere presence lends grace (honor) to impiety (sinfulness) around him."}, {"text": "The beloved is gracefully impious, meaning he is charmingly irreverent", "isCorrect": false, "rationale": "“Grace” is a verb here, not an adverb; the beloved gives grace to others’ impiety, he is not himself impious."}, {"text": "The beloved forgives the sins of those around him", "isCorrect": false, "rationale": "The concern is that the beloved’s beauty legitimizes and honors sin, not that he forgives it."}]}, {"question": "The phrase “Since his rose is true” means what?", "options": [{"text": "The beloved grows actual roses in his garden", "isCorrect": false, "rationale": "“Rose” is a metaphor for natural beauty and color."}, {"text": "The beloved’s natural beauty (his rose) is genuine, not artificial", "isCorrect": true, "rationale": "Other beauties seek “roses of shadow” (artificial cosmetic blushes) but the beloved’s is true — real and unimitated."}, {"text": "The beloved’s affection for the speaker is sincere", "isCorrect": false, "rationale": "The rose here refers to the beloved’s natural color and beauty, not to his feelings."}, {"text": "The beloved is associated with the Tudor rose symbol", "isCorrect": false, "rationale": "There is no Tudor political symbolism intended here; the rose is a natural beauty metaphor."}]}, {"question": "What is the speaker’s implied attitude toward the contemporary world in Sonnet LXVII?", "options": [{"text": "Admiration for the diversity and creativity of the present age", "isCorrect": false, "rationale": "The speaker views the present age as corrupt, artificial, and inferior to former times."}, {"text": "Disgust and contempt for an age of infection, impiety, and artificial imitation that taints everything it touches", "isCorrect": true, "rationale": "The questions in lines 1–14 imply that the world is infected, impious, artificial, and bankrupt — a degraded age that makes the beloved’s presence anomalous."}, {"text": "Neutral detachment and philosophical acceptance", "isCorrect": false, "rationale": "The repeated “Why should he…?” implies indignation, not detachment."}, {"text": "Optimism that the beloved will reform the corrupt world", "isCorrect": false, "rationale": "The speaker asks why the beloved must endure this world, not that he will reform it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
