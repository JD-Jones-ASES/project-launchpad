<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What has happened to the speaker's eye since he left the beloved?", "options": [{"text": "It has become sharper and notices every detail", "isCorrect": false, "rationale": "The opposite occurs: the eye becomes partly blind to external objects."}, {"text": "It has retreated into the mind and become partly blind to the outer world", "isCorrect": true, "rationale": "'Since I left you, mine eye is in my mind; / And that which governs me to go about / Doth part his function and is partly blind.'"}, {"text": "It has fixed itself on the beloved's image in memory and cannot see anything new", "isCorrect": false, "rationale": "Close but not quite: the eye does function but transforms everything it sees into the beloved's image."}, {"text": "It has grown weary from too many tears", "isCorrect": false, "rationale": "Weeping is not mentioned; the eye's vision has been redirected inward."}], "id": "q01"}, {"question": "What happens when the speaker's eye perceives external objects?", "options": [{"text": "It accurately records them and stores them in memory", "isCorrect": false, "rationale": "The eye does not accurately record; it transforms objects into the beloved's image."}, {"text": "It shapes every form — bird, flower, crow, dove — into the beloved's feature", "isCorrect": true, "rationale": "'The crow, or dove, it shapes them to your feature' — everything seen is transformed into the beloved's likeness."}, {"text": "It delivers a faint impression that quickly fades", "isCorrect": false, "rationale": "The impression is strong but misattributed — always replaced by the beloved's image."}, {"text": "It sees only darkness and void, unable to process anything", "isCorrect": false, "rationale": "The eye sees; it just transforms what it sees into the beloved."}], "id": "q02"}, {"question": "What pairs of opposites does the speaker list as things his eye cannot distinguish properly?", "options": [{"text": "Truth and beauty, fairness and darkness", "isCorrect": false, "rationale": "These are conceptual pairs from earlier sonnets; the pairs here are natural and sensory."}, {"text": "Mountain or sea, day or night, crow or dove, rudest or gentlest", "isCorrect": true, "rationale": "The speaker lists: 'the mountain or the sea, the day or night: / The crow, or dove' — extremes of nature collapsed under the beloved's image."}, {"text": "Past and present, old and young, hot and cold", "isCorrect": false, "rationale": "These temporal and thermal pairs are not the ones listed."}, {"text": "Joy and sorrow, beauty and ugliness", "isCorrect": false, "rationale": "Abstract emotional pairs are not what is listed; natural perceptual extremes are."}], "id": "q03"}, {"question": "What does 'incapable of more, replete with you' mean?", "options": [{"text": "The speaker cannot write any more because he has written too much", "isCorrect": false, "rationale": "The incapacity is perceptual, not poetic."}, {"text": "The mind is too full of the beloved to take in anything else", "isCorrect": true, "rationale": "'Incapable of more, replete with you' — the mind is saturated with the beloved's presence, leaving no room for other impressions."}, {"text": "The speaker is physically exhausted from travel", "isCorrect": false, "rationale": "No physical exhaustion is described; the saturation is mental."}, {"text": "The beloved has said all he wishes to say and refuses further contact", "isCorrect": false, "rationale": "The statement concerns the speaker's mind, not the beloved's communication."}], "id": "q04"}, {"question": "What paradox does the closing couplet state?", "options": [{"text": "The speaker's eye is keener when the beloved is absent", "isCorrect": false, "rationale": "The eye is not keener; it is less accurate in its external perception."}, {"text": "His most true mind makes his eye untrue — faithfulness of mind causes unfaithfulness of perception", "isCorrect": true, "rationale": "'My most true mind thus maketh mine untrue' — the truest devotion to the beloved distorts objective visual perception."}, {"text": "Absence makes the heart fonder but the eye blinder", "isCorrect": false, "rationale": "This paraphrase captures part of the idea but misses the specific paradox: it is the mind's truth that makes the eye untrue."}, {"text": "The eye sees truth but the mind refuses to accept it", "isCorrect": false, "rationale": "The direction is reversed: the mind's truth overrides the eye, not the other way around."}], "id": "q05"}, {"question": "What is the central conceit of Sonnet CXIII?", "options": [{"text": "The beloved's face as a canvas on which the painter's eye works", "isCorrect": false, "rationale": "Painting is not the central conceit; the redirection of vision is."}, {"text": "The eye having moved into the mind, transforming all outward perception into images of the beloved", "isCorrect": true, "rationale": "This is the poem's governing idea: the eye's physical function is subordinated to the mind's devotion, so external reality is perpetually rewritten as the beloved."}, {"text": "Memory as a mirror perfectly reflecting the beloved's absent image", "isCorrect": false, "rationale": "The conceit is active transformation of new perceptions, not passive memory reflection."}, {"text": "Love as a blindfold that prevents clear sight", "isCorrect": false, "rationale": "The eye still sees; it transforms rather than blinds. Blindness is only partial."}], "id": "q06"}, {"question": "What literary device gives the catalogue of opposites ('mountain or sea, day or night') its effect?", "options": [{"text": "Hyperbole showing the speaker's dramatic emotions", "isCorrect": false, "rationale": "The list is not hyperbolic exaggeration but a systematic illustration of the eye's failure to discriminate."}, {"text": "Merismus — listing contrasting extremes to encompass the whole range of reality", "isCorrect": true, "rationale": "By pairing opposites (mountain/sea, day/night, crow/dove), the poem suggests the beloved's image replaces not just some things but everything — the entire spectrum of the visible world."}, {"text": "Simile comparing the beloved to each natural object in turn", "isCorrect": false, "rationale": "The beloved is not compared to these objects; the objects are replaced by the beloved's image."}, {"text": "Anaphora drawing parallel lines of thought", "isCorrect": false, "rationale": "Anaphora repeats opening words; the structural device here is the pairing of opposites."}], "id": "q07"}, {"question": "What is the emotional effect of this sonnet in the context of the chapter?", "options": [{"text": "Relief, because the speaker has finally found peace after his wandering", "isCorrect": false, "rationale": "There is no relief; the poem describes an involuntary, all-consuming absorption that is both moving and slightly unsettling."}, {"text": "A sense of total absorption in the beloved — devotion so complete it alters reality itself", "isCorrect": true, "rationale": "The speaker cannot see the world as it is because the beloved occupies his entire mind; the tone is of overwhelming, reality-bending devotion."}, {"text": "Sadness that the beloved is permanently gone", "isCorrect": false, "rationale": "The absence is temporary ('since I left you'); permanent loss is not the subject."}, {"text": "Pride in the power of love to transform perception", "isCorrect": false, "rationale": "The transformation is noted with wonder, not pride; the paradox in the couplet gives it a slightly troubling quality."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
