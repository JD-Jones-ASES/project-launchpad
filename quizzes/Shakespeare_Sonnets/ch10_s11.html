<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker confess he has done in Sonnet CX?", "options": [{"text": "Written inferior verse and neglected his Muse", "isCorrect": false, "rationale": "The Muse theme belongs to earlier sonnets; here the confession is about personal behavior."}, {"text": "Gone here and there, made himself a motley, sold cheap what is most dear", "isCorrect": true, "rationale": "'Alas! 'tis true, I have gone here and there, / And made my self a motley to the view, / Gor'd mine own thoughts, sold cheap what is most dear.'"}, {"text": "Praised the beloved extravagantly and then withdrawn the praise", "isCorrect": false, "rationale": "No withdrawal of praise is confessed; the faults are wandering and self-abasement."}, {"text": "Ignored the beloved's suffering during a period of illness", "isCorrect": false, "rationale": "There is no reference to the beloved's illness; the confession is about the speaker's own straying conduct."}], "id": "q01"}, {"question": "What does 'made my self a motley to the view' mean?", "options": [{"text": "He dressed in colorful costumes for entertainment", "isCorrect": false, "rationale": "While 'motley' is the jester's multicolored costume, the meaning here is metaphorical: he made himself a spectacle or fool in others' eyes."}, {"text": "He made himself a public spectacle or fool", "isCorrect": true, "rationale": "'Motley' is the jester's costume; metaphorically the speaker says he degraded himself to public ridicule."}, {"text": "He wrote poems in mixed styles that confused his readers", "isCorrect": false, "rationale": "The confession is about personal conduct, not literary style."}, {"text": "He showed inconsistency in his affections by loving many people equally", "isCorrect": false, "rationale": "Inconsistency of affection is implied, but the specific metaphor concerns public self-degradation."}], "id": "q02"}, {"question": "What does the speaker say 'blenches' (digressions/strayings) ultimately proved?", "options": [{"text": "That he is incapable of fidelity", "isCorrect": false, "rationale": "The conclusion is the opposite: the blenches revealed the beloved as the best and truest love."}, {"text": "That comparing others gave his heart renewed appreciation of the beloved", "isCorrect": true, "rationale": "'These blenches gave my heart another youth, / And worse essays prov'd thee my best of love.'"}, {"text": "That youth is inevitably wasted on meaningless pleasures", "isCorrect": false, "rationale": "Youth is figuratively renewed, not lamented as wasted."}, {"text": "That the speaker requires variety to sustain his creative energy", "isCorrect": false, "rationale": "The opposite is true: variety proved inadequate, and the beloved is identified as the best."}], "id": "q03"}, {"question": "What vow does the speaker make in lines 9–11?", "options": [{"text": "To write only about the beloved from this moment forward", "isCorrect": false, "rationale": "The vow is about personal conduct, not literary output."}, {"text": "Never to grind his appetite on newer proof to try an older friend", "isCorrect": true, "rationale": "'Mine appetite I never more will grind / On newer proof, to try an older friend.'"}, {"text": "To leave society and live in seclusion with the beloved", "isCorrect": false, "rationale": "Seclusion is not promised; the vow is about abandoning the testing of other attachments."}, {"text": "To confess all past infidelities publicly in verse", "isCorrect": false, "rationale": "While the sonnet is a confession, the vow is about future conduct, not public disclosure."}], "id": "q04"}, {"question": "What does 'A god in love, to whom I am confin'd' say about the beloved?", "options": [{"text": "The beloved worships the speaker as a divine figure", "isCorrect": false, "rationale": "The divine characterization applies to the beloved, not the speaker."}, {"text": "The beloved is divine in love and the speaker is bound exclusively to him", "isCorrect": true, "rationale": "The beloved is called 'a god in love' and the speaker says he is 'confin'd' to him — fully committed."}, {"text": "The speaker is imprisoned by love and wishes to be free", "isCorrect": false, "rationale": "Being 'confin'd' here is not imprisonment but devotion; the tone is affirmative."}, {"text": "The beloved has supernatural power to prevent the speaker from straying again", "isCorrect": false, "rationale": "The confinement is freely chosen, not supernaturally imposed."}], "id": "q05"}, {"question": "What does 'give me welcome, next my heaven the best' request?", "options": [{"text": "Admission to paradise", "isCorrect": false, "rationale": "The 'heaven' is the beloved's love; the speaker asks for the beloved's welcoming embrace."}, {"text": "A welcoming reception from the beloved, second only to heaven itself in value", "isCorrect": true, "rationale": "'Then give me welcome, next my heaven the best, / Even to thy pure and most most loving breast.'"}, {"text": "A letter of recommendation from the beloved to a patron", "isCorrect": false, "rationale": "There is no patron context; the welcome requested is personal and intimate."}, {"text": "The beloved's forgiveness publicly declared", "isCorrect": false, "rationale": "The request is for personal, intimate welcome, not a public declaration."}], "id": "q06"}, {"question": "How does Sonnet CX differ from Sonnet CIX in its treatment of the speaker's straying?", "options": [{"text": "CIX denies any straying; CX fully admits it", "isCorrect": true, "rationale": "Sonnet CIX insists the speaker was never 'false of heart' despite ranging; Sonnet CX openly confesses the straying with 'Alas! 'tis true.'"}, {"text": "CIX confesses straying; CX denies it ever happened", "isCorrect": false, "rationale": "This is the reverse of the actual sequence."}, {"text": "Both sonnets deny straying equally", "isCorrect": false, "rationale": "CX explicitly admits to straying; CIX had maintained the speaker was not 'false of heart.'"}, {"text": "Both sonnets admit full guilt with no mitigation", "isCorrect": false, "rationale": "CIX provides mitigation (the soul in the beloved's breast, the traveler returning); CX also mitigates by showing the straying proved the beloved's superiority."}], "id": "q07"}, {"question": "What literary device is prominent in the phrase 'most most loving breast'?", "options": [{"text": "Irony", "isCorrect": false, "rationale": "There is no irony; the intensification is sincere."}, {"text": "Intensification through doubling ('most most')", "isCorrect": true, "rationale": "The doubled superlative is Shakespeare's way of pushing beyond ordinary superlative to an emotional extreme."}, {"text": "Chiasmus", "isCorrect": false, "rationale": "Chiasmus involves reversal of grammatical structure; this is simple doubling for emphasis."}, {"text": "Anaphora", "isCorrect": false, "rationale": "Anaphora repeats a word at the beginning of successive lines; 'most most' is a doubling within a single phrase."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
