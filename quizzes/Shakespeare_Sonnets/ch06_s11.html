<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central philosophical question that opens Sonnet LIII?", "options": [{"text": "Why does the speaker love the beloved more than any other person?", "isCorrect": false, "rationale": "The speaker’s personal emotion is the backdrop, not the philosophical question posed."}, {"text": "Of what substance is the beloved made, that millions of shadows attend upon him?", "isCorrect": true, "rationale": "The opening lines ask: “What is your substance, whereof are you made, / That millions of strange shadows on you tend?” — questioning the nature of the beloved’s essence that makes him the archetype of all beauty."}, {"text": "How does the beloved compare to the great poets of antiquity?", "isCorrect": false, "rationale": "The comparison is with classical figures of beauty, not poets."}, {"text": "Why does the beloved refuse to acknowledge the speaker in public?", "isCorrect": false, "rationale": "No public slight is described; the poem is a cosmic meditation on the beloved’s nature."}]}, {"question": "The poem notes that each person has “one shade,” yet the beloved “can every shadow lend.” What does this mean?", "options": [{"text": "The beloved casts a larger physical shadow because he is taller than everyone else.", "isCorrect": false, "rationale": "The ‘shadow’ here is metaphorical — an image, reflection, or copy — not a physical shadow."}, {"text": "Ordinary people cast only one shadow (image), but the beloved’s essence is visible in the shadows of all beautiful things.", "isCorrect": true, "rationale": "Every person has one ‘shade’ (image/copy), but the beloved can ‘lend’ his shadow to everything beautiful — he is the archetype from which all beauty is derived."}, {"text": "The beloved has many friends who follow him wherever he goes.", "isCorrect": false, "rationale": "Friendship is not the subject; the shadows are philosophical copies or images."}, {"text": "The beloved is so powerful that many people imitate his style.", "isCorrect": false, "rationale": "Social imitation is not the argument; the poem makes a Platonic claim about the beloved as an ideal form."}]}, {"question": "Which classical figures are invoked as comparisons for the beloved’s beauty?", "options": [{"text": "Achilles and Odysseus.", "isCorrect": false, "rationale": "Achilles and Odysseus are not invoked; the references are to beauty figures, not warriors."}, {"text": "Adonis and Helen of Troy.", "isCorrect": true, "rationale": "Lines 5–10 invoke Adonis (classical beauty) and Helen of Troy (classical female beauty) as comparisons, finding both to be only poor imitations of the beloved."}, {"text": "Hercules and Cleopatra.", "isCorrect": false, "rationale": "Hercules and Cleopatra are not the classical references here."}, {"text": "Apollo and Diana.", "isCorrect": false, "rationale": "Apollo and Diana do not appear; Adonis and Helen are the specific comparisons."}]}, {"question": "What does the speaker claim about Adonis when he says “the counterfeit / Is poorly imitated after you”?", "options": [{"text": "That portraits of the beloved are inferior to the beloved himself.", "isCorrect": false, "rationale": "The direction is reversed: Adonis is the one who is poorly imitated — compared to the beloved, Adonis is the inferior copy."}, {"text": "That any description of Adonis is merely a poor imitation of the beloved, who is the true original of male beauty.", "isCorrect": true, "rationale": "The beloved is the archetype; Adonis is merely a “counterfeit” — a copy — and a poor one at that. The beloved’s beauty exceeds even the mythological standard."}, {"text": "That painted portraits of Adonis are technically inferior to those of the beloved.", "isCorrect": false, "rationale": "The comparison is philosophical and mythological, not about the technical quality of paintings."}, {"text": "That Adonis was not as beautiful as ancient poets claimed.", "isCorrect": false, "rationale": "Adonis’s beauty is not disputed on its own terms; he is simply presented as inferior to the beloved."}]}, {"question": "The phrase “Greacian tires” (line 10) refers to:", "options": [{"text": "The wheels of a chariot from ancient Greece.", "isCorrect": false, "rationale": "‘Tires’ here is not about wheels; in Elizabethan English, ‘tire’ or ‘tyre’ can mean attire or costume."}, {"text": "Greek dress or attire — the beloved is imagined dressed as Helen of Troy.", "isCorrect": true, "rationale": "“Greacian tires” means Greek dress. The speaker says that when we paint Helen, we paint the beloved in Greek costume — the beloved’s beauty underlies even the great classical ideal of female beauty."}, {"text": "The tires of Helen’s carriage as she fled Troy.", "isCorrect": false, "rationale": "No chariot or flight is described; the reference is to costume/attire."}, {"text": "A famous set of Greek sculptures kept in Athens.", "isCorrect": false, "rationale": "Sculptures are not the subject; the word means dress or attire."}]}, {"question": "The spring and harvest (“foison of the year”) are invoked in lines 11–13 to show that:", "options": [{"text": "The beloved is best appreciated in spring and summer.", "isCorrect": false, "rationale": "No seasonal preference is asserted; both spring and harvest are images of the beloved."}, {"text": "Even the beauty of nature — spring’s freshness and autumn’s abundance — is merely a shadow of the beloved’s beauty and bounty.", "isCorrect": true, "rationale": "Spring shows “shadow of your beauty”; the harvest appears as an image of the beloved’s bounty. Nature itself reflects the beloved rather than standing on its own."}, {"text": "The speaker met the beloved in spring and hopes to reunite in autumn.", "isCorrect": false, "rationale": "No personal meeting in a season is described; the seasons serve as illustrations of beauty and bounty."}, {"text": "Nature is superior to human beauty and the beloved should be more like the natural world.", "isCorrect": false, "rationale": "The argument runs the other way: nature reflects the beloved, not the reverse."}]}, {"question": "The couplet states: “In all external grace you have some part, / But you like none, none you, for constant heart.” What does the second line mean?", "options": [{"text": "The beloved has no heart and is incapable of love.", "isCorrect": false, "rationale": "The line praises the beloved’s constant heart; it does not deny emotion."}, {"text": "The beloved resembles no other in his constancy of heart — he is the unique original from whom all others are merely copies.", "isCorrect": true, "rationale": "“You like none” means you resemble no one; “none you” means no one resembles you. The beloved’s physical beauty appears in everything, but his constancy of heart is uniquely his own — the final proof of his incomparable nature."}, {"text": "The beloved has a cold heart that does not respond to love.", "isCorrect": false, "rationale": "Coldness is not asserted; ‘constant heart’ means faithful and steadfast, which is a compliment."}, {"text": "The speaker is criticizing the beloved for resembling too many other people.", "isCorrect": false, "rationale": "The couplet is praise, not criticism; it celebrates the beloved’s uniqueness."}]}, {"question": "The philosophical concept underlying Sonnet LIII is most similar to:", "options": [{"text": "Aristotle’s idea that beauty lies in proportion and measure.", "isCorrect": false, "rationale": "Proportion and measure are not the argument here."}, {"text": "Plato’s theory of Forms — the beloved is the ideal Form of beauty of which all beautiful things are imperfect copies.", "isCorrect": true, "rationale": "The poem’s argument — that Adonis, Helen, spring, and harvest are all ‘shadows’ of the beloved’s essence — mirrors Plato’s theory that sensible things participate in ideal Forms and are imperfect copies of them."}, {"text": "Stoic philosophy’s emphasis on reason over passion.", "isCorrect": false, "rationale": "Stoicism is not invoked; the argument is Platonic."}, {"text": "Christian theology’s concept of grace as a divine gift.", "isCorrect": false, "rationale": "While ‘grace’ appears in the couplet, the framework is classical Platonic, not Christian."}]}, {"question": "What is the function of the word “strange” in “millions of strange shadows on you tend” (line 2)?", "options": [{"text": "It suggests the beloved has sinister supernatural powers.", "isCorrect": false, "rationale": "No supernatural threat is implied; the tone is one of wonder, not fear."}, {"text": "It signals that the shadows are ‘other’ or ‘foreign’ — coming from outside the beloved yet all derived from him.", "isCorrect": true, "rationale": "“Strange” in Elizabethan usage means ‘foreign’ or ‘other.’ These shadows attend the beloved from elsewhere — they are external beauties that derive their essence from him."}, {"text": "It indicates that the beloved is strange and eccentric in his behavior.", "isCorrect": false, "rationale": "The beloved’s personal behavior is not the subject; ‘strange’ means external/foreign here."}, {"text": "It is purely decorative and carries no specific meaning.", "isCorrect": false, "rationale": "‘Strange’ is semantically significant in Elizabethan English."}]}, {"question": "How does Sonnet LIII shift focus compared to the earlier separation sonnets (XLIII–LII)?", "options": [{"text": "It introduces a new rival lover who threatens the speaker’s relationship.", "isCorrect": false, "rationale": "A rival lover is not introduced in LII; this is purely a meditation on the beloved’s nature."}, {"text": "It moves from the pain and logistics of physical separation to a cosmic meditation on the beloved’s essence as the archetype of all beauty.", "isCorrect": true, "rationale": "Earlier sonnets addressed dreams, elements, journeys, and locked chests. LIII widens the perspective to ask a philosophical question: what is the beloved made of? The answer places him as the source of all beauty."}, {"text": "It begins a new argument about the immortality poetry can provide.", "isCorrect": false, "rationale": "Immortality through verse is the subject of Sonnet LV; LIII is about the beloved’s archetypal nature."}, {"text": "It suggests the speaker is no longer in love and is evaluating the beloved objectively.", "isCorrect": false, "rationale": "The speaker is deeply in love; the meditation is an intensified expression of devotion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
