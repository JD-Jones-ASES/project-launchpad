<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CL</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradox opens Sonnet CL?", "options": [{"text": "The speaker loves someone he considers perfect", "isCorrect": false, "rationale": "Perfection is not what is paradoxical; it is the power of insufficiency to sway his heart."}, {"text": "Despite her insufficiency (flaws), she has powerful might over his heart", "isCorrect": true, "rationale": "'From what power hast thou this powerful might, / With insufficiency my heart to sway?' — her power defies her inadequacy."}, {"text": "He hates her yet cannot leave her", "isCorrect": false, "rationale": "Hate vs. inability to leave is the theme of other sonnets; here the paradox is her power through weakness."}, {"text": "His greatest happiness comes from his greatest suffering", "isCorrect": false, "rationale": "Joy-through-pain is not the specific paradox here; insufficiency-producing-power is."}]}, {"question": "What does the speaker mean by her 'becoming of things ill'?", "options": [{"text": "Her ability to make wicked things seem graceful or attractive", "isCorrect": true, "rationale": "'Whence hast thou this becoming of things ill' — her 'becoming' means making bad things become her, i.e., she adorns even her worst qualities with a strange attractiveness."}, {"text": "Her skill at becoming a different person when it suits her", "isCorrect": false, "rationale": "Shape-shifting is not the meaning; 'becoming' here is adjectival — making ill things seem to suit her."}, {"text": "Her habit of appropriating others' good qualities as her own", "isCorrect": false, "rationale": "Appropriation is not the meaning; the phrase concerns how she makes her own faults attractive."}, {"text": "Her gradual transformation from a good person into an evil one", "isCorrect": false, "rationale": "Transformation over time is not the meaning; 'becoming' describes the charm of her present ill qualities."}]}, {"question": "The phrase 'in the very refuse of thy deeds' refers to:", "options": [{"text": "Her best and most admirable actions", "isCorrect": false, "rationale": "'Refuse' means rejected matter, the worst residue — the opposite of admirable actions."}, {"text": "The very dregs and worst of her behavior", "isCorrect": true, "rationale": "'Refuse' (pronounced REF-yoose) means waste or discarded matter — even in the worst of her actions there is strength and skill."}, {"text": "Her refusal to grant him what he asks", "isCorrect": false, "rationale": "The verbal sense 'to refuse' is not intended here; 'refuse' is the noun meaning waste/dregs."}, {"text": "Her public reputation for bad behavior", "isCorrect": false, "rationale": "Public reputation is not what 'refuse of thy deeds' means; it refers to the worst acts themselves."}]}, {"question": "What paradox does the speaker identify in lines 11-12?", "options": [{"text": "He loves her more the less she shows any affection", "isCorrect": false, "rationale": "Her lack of affection is not the specific trigger mentioned; the trigger is cause for hate."}, {"text": "The more he sees and hears reasons to hate her, the more he loves her", "isCorrect": true, "rationale": "'Who taught thee how to make me love thee more, / The more I hear and see just cause of hate?' — just cause for hate increases love."}, {"text": "He loves her beauty while hating her character", "isCorrect": false, "rationale": "Beauty vs. character is a common Dark Lady theme but not the specific paradox of these lines."}, {"text": "He loves what he knows is false and hates what he knows is true", "isCorrect": false, "rationale": "Truth vs. falsehood is CXLVII's theme; CL focuses on hate's cause increasing love."}]}, {"question": "The argument in lines 13-14 — 'though I love what others do abhor, / With others thou shouldst not abhor my state' — means:", "options": [{"text": "He demands she treat him better since he treats her better than others do", "isCorrect": false, "rationale": "He does not compare his treatment of her; the argument is about consistency of standards."}, {"text": "Since his love for her is unorthodox (loving what others abhor), by the same token she should not abhor his love for her", "isCorrect": true, "rationale": "If she approves of his unusual love for her despite her flaws, she should not follow 'others' in dismissing his love — a reciprocity argument."}, {"text": "He argues that other people's low opinion of her does not affect his love", "isCorrect": false, "rationale": "Others' opinions of her are not the point; the argument is about how she should regard his love given his own unusual fidelity."}, {"text": "He claims her hatred of him contradicts her general character", "isCorrect": false, "rationale": "Her general character is not what the argument turns on; the logical consistency of her standards is."}]}, {"question": "The final couplet — 'If thy unworthiness rais'd love in me, / More worthy I to be belov'd of thee' — makes what claim?", "options": [{"text": "Her unworthiness makes him unworthy of love in return", "isCorrect": false, "rationale": "The logic runs the opposite direction: his love despite her unworthiness makes him more, not less, deserving."}, {"text": "That loving her despite her unworthiness makes him more worthy of her love", "isCorrect": true, "rationale": "If his love has been magnified by her very faults, then his dedication is extraordinary — and that extraordinary devotion should earn him more, not less, love."}, {"text": "That she is unworthy and therefore he should stop loving her", "isCorrect": false, "rationale": "He does not argue for withdrawal; he argues for a reciprocal return of love."}, {"text": "That worthiness is irrelevant to love", "isCorrect": false, "rationale": "The couplet directly engages with worthiness as a standard rather than dismissing it."}]}, {"question": "The rhetorical strategy of Sonnet CL is best described as:", "options": [{"text": "A lament that catalogues suffering without seeking resolution", "isCorrect": false, "rationale": "The sonnet works toward a logical conclusion in the couplet; it is argument, not pure lament."}, {"text": "A paradoxical argument that turns each of her faults into evidence for why she owes him love", "isCorrect": true, "rationale": "Her insufficiency → his power to love her; her worst deeds → his captivation; his love despite cause for hate → his worthiness of love in return."}, {"text": "A direct accusation of cruelty designed to shame her into relenting", "isCorrect": false, "rationale": "Shame and accusation are not the strategy; admiration of her strange power is, leading to the logical claim."}, {"text": "A philosophical meditation on the nature of love in general, without specific reference to her", "isCorrect": false, "rationale": "The sonnet is specifically addressed to the Dark Lady with second-person pronouns throughout."}]}, {"question": "What is the meaning of 'warrantise of skill' in line 9?", "options": [{"text": "A certificate of legal ownership", "isCorrect": false, "rationale": "Legal ownership is not the meaning; 'warrantise of skill' means a guaranteed quality or excellence."}, {"text": "A guarantee or assurance of excellence or power", "isCorrect": true, "rationale": "'Warrantise' means warranty or guarantee; 'warrantise of skill' means the assured effectiveness of her power — even in refuse there is a guarantee of her strange capability."}, {"text": "A warning about the danger of her skill", "isCorrect": false, "rationale": "'Warrantise' does not mean warning; it means guarantee or assurance."}, {"text": "A warrant for her arrest for use of dark arts", "isCorrect": false, "rationale": "Legal warrant is not the meaning; the legal sense of guarantee/assurance is."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
