    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who does the speaker address at the opening of Sonnet CXXXVII?", "options": [{"text": "The mistress", "isCorrect": false, "rationale": "The opening addresses Love personified as a blind fool, not the mistress directly."}, {"text": "Love, personified as a blind fool", "isCorrect": true, "rationale": "'Thou blind fool, Love, what dost thou to mine eyes' — Love is addressed as a fool whose blindness has infected the speaker's own sight."}, {"text": "The Fair Youth", "isCorrect": false, "rationale": "The Fair Youth does not appear in this sonnet; the address is to Love itself."}, {"text": "The speaker himself", "isCorrect": false, "rationale": "The speaker addresses an external force (Love) for corrupting his perception."}]}, {"question": "What paradox does the speaker express in 'they behold and see not what they see'?", "options": [{"text": "That he literally has poor eyesight", "isCorrect": false, "rationale": "The blindness is metaphorical — a failure of judgment, not vision."}, {"text": "His eyes physically see the reality but his judgment is corrupted so he perceives it as something else", "isCorrect": true, "rationale": "His eyes register the truth — they know what beauty is and where it lies — but Love's corruption makes him take the worst as the best. Perception and judgment are split."}, {"text": "That the mistress is invisible to him in some moods", "isCorrect": false, "rationale": "The paradox concerns judgment's distortion of what the eyes see, not literal visibility."}, {"text": "That beautiful things sometimes look ugly to the eye", "isCorrect": false, "rationale": "The direction is reversed: an ugly (or morally compromised) thing is taken for the best."}]}, {"question": "The image 'anchor'd in the bay where all men ride' suggests what about the mistress?", "options": [{"text": "That she lives near the sea", "isCorrect": false, "rationale": "The bay is a metaphor for the mistress's sexual availability, not a geographical reference."}, {"text": "That she is sexually promiscuous — a harbor where many men come and go", "isCorrect": true, "rationale": "The 'bay where all men ride' is a maritime metaphor for sexual promiscuity. The speaker's eyes are anchored there — fixed on something that is common to many men, not his alone."}, {"text": "That she is as steady and constant as an anchor", "isCorrect": false, "rationale": "The anchor image is about being trapped, not constancy — and the bay's public nature undermines any positive reading."}, {"text": "That she is a sailor's wife waiting faithfully", "isCorrect": false, "rationale": "The bay is a metaphor for her promiscuity, not marital faithfulness."}]}, {"question": "What does the speaker accuse Love of doing to his judgment?", "options": [{"text": "Making him see the mistress as more beautiful than she is", "isCorrect": false, "rationale": "The problem is more specific: Love has forged hooks that tie his judgment to false perceptions, making him mistake a common place for his private possession."}, {"text": "Forging hooks that tie his heart's judgment to his eyes' falsehood, so he takes public for private", "isCorrect": true, "rationale": "'Why of eyes' falsehood hast thou forged hooks, / Whereto the judgement of my heart is tied?' — Love has chained his judgment to his corrupted eyes, so his heart believes what his deceived eyes report."}, {"text": "Blinding him entirely to her faults", "isCorrect": false, "rationale": "The speaker knows the truth — he knows what beauty is — but Love corrupts the link between knowledge and judgment."}, {"text": "Making him feel nothing for her when he wishes to love her", "isCorrect": false, "rationale": "The problem is excessive, corrupted attachment, not emotional numbness."}]}, {"question": "What is meant by 'a several plot' vs. 'the wide world's common place'?", "options": [{"text": "A private estate vs. a public marketplace of ideas", "isCorrect": false, "rationale": "While the property metaphor is apt, the contrast is sexual: she is not the speaker's private domain but everyone's public territory."}, {"text": "A private, enclosed plot of land vs. a commons open to all — implying she is not his alone but shared by many", "isCorrect": true, "rationale": "A 'several plot' is an enclosed private field. The speaker's heart thinks she is his private possession, but knows she is 'the wide world's common place' — public land, shared by all. This makes his private attachment delusion."}, {"text": "His personal feelings vs. society's opinion", "isCorrect": false, "rationale": "While there is a public/private contrast, the specific agricultural imagery of several plot vs. common place grounds the metaphor in property law."}, {"text": "A single plot of a story vs. the world's many competing narratives", "isCorrect": false, "rationale": "The plot here is agricultural/property, not narrative."}]}, {"question": "What does 'to put fair truth upon so foul a face' mean?", "options": [{"text": "To apply cosmetics to make an ugly face appear fair", "isCorrect": false, "rationale": "The line is about applying an idealized assessment (fair truth) to what is actually morally compromised (foul face), not about cosmetics."}, {"text": "To ascribe honest, positive qualities to something morally compromised", "isCorrect": true, "rationale": "His eyes, seeing the foul truth, declare 'this is not' — refusing to acknowledge it — and instead put a 'fair truth' (an idealized interpretation) on what is actually 'so foul a face' (the morally compromised reality)."}, {"text": "To tell lies about a beautiful woman to make others think her ugly", "isCorrect": false, "rationale": "The direction of distortion is the other way: false fairness applied to actual foulness."}, {"text": "To write poetry that beautifies an ordinary subject", "isCorrect": false, "rationale": "The line describes perceptual self-deception, not poetic beautification."}]}, {"question": "The couplet 'In things right true my heart and eyes have err'd, / And to this false plague are they now transferr'd' concludes what?", "options": [{"text": "That he has finally seen the truth and will leave the mistress", "isCorrect": false, "rationale": "Recognizing the error does not enable escape; the plague metaphor suggests an incurable infection."}, {"text": "That his heart and eyes have erred in matters that are plainly true, and have now been permanently transferred to this plague of false perception", "isCorrect": true, "rationale": "The couplet offers no redemption: in things where truth is obvious, his judgment has been corrupted. And this false plague — this enslaving of perception to desire — is now their permanent condition. Knowledge and escape are severed."}, {"text": "That he is glad to be enslaved to the mistress despite knowing the truth", "isCorrect": false, "rationale": "The tone is resigned self-condemnation, not gladness."}, {"text": "That the plague of love will eventually cure itself", "isCorrect": false, "rationale": "'Transferr'd' implies permanent relocation, not temporary infection."}]}, {"question": "How does Sonnet CXXXVII compare in tone to Sonnet CXXIX?", "options": [{"text": "CXXXVII is more playful and CXXIX more philosophical", "isCorrect": false, "rationale": "Both sonnets are unsparing in their self-analysis; CXXXVII is perhaps more bitter than CXXIX."}, {"text": "Both analyze self-destructive desire with bitter clarity, though CXXXVII focuses on perceptual corruption while CXXIX focuses on the cycle of lust", "isCorrect": true, "rationale": "CXXIX diagnosed lust's behavioral cycle; CXXXVII diagnoses how desire has corrupted the very organ of perception — the eyes and the judgment tied to them. Both conclude that knowledge is powerless to enable escape."}, {"text": "CXXXVII is hopeful where CXXIX is despairing", "isCorrect": false, "rationale": "Both sonnets end in despair; 'this false plague' is as bleak as CXXIX's hell."}, {"text": "They are unrelated in theme and tone", "isCorrect": false, "rationale": "Both engage deeply with the irrationality of desire and the gap between knowing and acting."}]}, {"question": "What does 'corrupt by over-partial looks' mean?", "options": [{"text": "That looking too often has physically damaged his eyes", "isCorrect": false, "rationale": "The corruption is of judgment, not physical eyesight."}, {"text": "That his eyes have been corrupted by looking too favorably and partially — biased toward desire rather than truth", "isCorrect": true, "rationale": "'Over-partial' means excessively biased or prejudiced in favor of what is desired. His eyes, corrupted by this partiality, can no longer report the truth objectively."}, {"text": "That he has been corrupted by looking at too many beautiful women", "isCorrect": false, "rationale": "The corruption is about the bias of desire, not overexposure to beauty generally."}, {"text": "That partially seeing something creates a false impression", "isCorrect": false, "rationale": "'Over-partial' means over-biased, not partially seen."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
