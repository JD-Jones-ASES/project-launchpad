<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What rhetorical question opens Sonnet CVIII?", "options": [{"text": "How long can love survive the ravages of time?", "isCorrect": false, "rationale": "The question asked is about whether there is anything new left to write, not about love's survival."}, {"text": "What remains in the brain that ink can write, not yet expressed to the beloved?", "isCorrect": true, "rationale": "'What's in the brain, that ink may character, / Which hath not figur'd to thee my true spirit?' — the speaker asks if there is any new thing to write."}, {"text": "Can poetry overcome the injury of age?", "isCorrect": false, "rationale": "That is addressed later in the poem, but the opening question concerns what remains to be written."}, {"text": "Why does the beloved fail to respond to the speaker's devotion?", "isCorrect": false, "rationale": "The beloved's response is not the subject; the question is about poetic expression."}]}, {"question": "What analogy does the speaker use to justify repeating the same expressions of love?", "options": [{"text": "A soldier repeating his oath of loyalty each morning", "isCorrect": false, "rationale": "Soldiers are not mentioned; the analogy used is religious."}, {"text": "Daily prayer — the same words repeated each day without their becoming old", "isCorrect": true, "rationale": "'Nothing, sweet boy; but yet, like prayers divine, / I must each day say o'er the very same.'"}, {"text": "A child reciting lessons until they are memorized", "isCorrect": false, "rationale": "A child's lessons are not the analogy; divine prayer is."}, {"text": "The seasons returning in the same order year after year", "isCorrect": false, "rationale": "Seasons appear in Sonnet CIV; here the analogy is prayer."}]}, {"question": "What does 'Counting no old thing old' mean?", "options": [{"text": "The speaker pretends the relationship is new so he does not become bored", "isCorrect": false, "rationale": "The statement is sincere, not a pretense; repeated love never becomes stale."}, {"text": "In love, what is old is never felt as old — familiarity does not breed staleness", "isCorrect": true, "rationale": "The speaker says that true love keeps re-experiencing its first freshness; 'old' things remain perpetually new in love's eyes."}, {"text": "The speaker has stopped counting the years of their friendship", "isCorrect": false, "rationale": "This is not a statement about calendrical counting but about the experience of love's freshness."}, {"text": "Old poems should be discarded in favor of new ones", "isCorrect": false, "rationale": "The statement is about the quality of love's feeling, not about discarding old poems."}]}, {"question": "What does 'hallow'd thy fair name' suggest about the beloved?", "options": [{"text": "The beloved has a famous public reputation", "isCorrect": false, "rationale": "The hallowing is personal and devotional, not about public reputation."}, {"text": "The speaker regards the beloved with a quasi-religious reverence", "isCorrect": true, "rationale": "'Hallow'd' means made holy or treated as sacred; the speaker's first act of love had a devotional character, consistent with the prayer analogy."}, {"text": "The beloved's name is literally holy or biblical", "isCorrect": false, "rationale": "No specific name is given; the hallowing is metaphorical and devotional."}, {"text": "The speaker composed a formal poem in honor of the beloved's name", "isCorrect": false, "rationale": "The hallowing refers to the first experience of love, not a specific poem."}]}, {"question": "What does 'eternal love in love's fresh case' mean?", "options": [{"text": "Love is eternal because it never changes its outward form", "isCorrect": false, "rationale": "The image is of eternal love wearing a fresh, new-looking covering, regardless of the passage of time."}, {"text": "Eternal love presents itself always in the fresh clothing of present feeling", "isCorrect": true, "rationale": "The 'fresh case' is the living, present-tense experience in which eternal love renews itself continually, like prayer."}, {"text": "Love is a legal case that must be re-argued daily", "isCorrect": false, "rationale": "While 'case' can be legal, here it means covering or outward form, continuing the freshness theme."}, {"text": "Love is placed in a container to preserve it from age", "isCorrect": false, "rationale": "The metaphor is about love's capacity for self-renewal, not about preservation in a container."}]}, {"question": "How does eternal love treat the 'dust and injury of age'?", "options": [{"text": "It uses them as inspiration for new poems", "isCorrect": false, "rationale": "The poem does not suggest injury of age becomes poetic material."}, {"text": "It weighs them not — disregards them entirely", "isCorrect": true, "rationale": "'Eternal love in love's fresh case, / Weighs not the dust and injury of age.'"}, {"text": "It mourns them with beautiful verse", "isCorrect": false, "rationale": "The poem does not mourn age; it transcends it."}, {"text": "It transforms them into renewed beauty", "isCorrect": false, "rationale": "The poem's verb is 'weighs not' — ignores, not transforms."}]}, {"question": "What paradox appears at the poem's close?", "options": [{"text": "Time advances but love retreats", "isCorrect": false, "rationale": "The paradox is about love finding its origin where outward signs suggest it should be dead."}, {"text": "Love finds its first freshness where time and outward form would show it dead", "isCorrect": true, "rationale": "'Finding the first conceit of love there bred, / Where time and outward form would show it dead.'"}, {"text": "The older love grows, the more beautiful its expression becomes", "isCorrect": false, "rationale": "That is a related idea but not the specific paradox of the closing couplet."}, {"text": "The prayer analogy breaks down because God does not age", "isCorrect": false, "rationale": "The prayer analogy is sustained, not broken; no theological complication is introduced."}]}, {"question": "What is the central argument of Sonnet CVIII?", "options": [{"text": "The Muse must be compelled to keep writing or love is forgotten", "isCorrect": false, "rationale": "The Muse is not the subject; the speaker's own repetitive expression of love is."}, {"text": "Repetition in love, like daily prayer, does not diminish but renews devotion", "isCorrect": true, "rationale": "The sonnet argues that saying the same things each day, as in prayer, is not staleness but faithfulness that perpetually finds its own beginning."}, {"text": "Physical age destroys love unless verse preserves it", "isCorrect": false, "rationale": "The sonnet is more focused on love's inner renewal than on the preservation function of verse."}, {"text": "True love requires constant novelty to survive", "isCorrect": false, "rationale": "The poem argues the opposite: constancy and repetition are love's strength, not novelty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
