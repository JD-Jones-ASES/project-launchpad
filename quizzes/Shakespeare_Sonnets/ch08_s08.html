<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the speaker describe his Muse in the opening line of Sonnet LXXXV?", "options": [{"text": "As bold and outspoken, crying for attention", "isCorrect": false, "rationale": "The opposite: the Muse is described as tongue-tied and holding still in good manners."}, {"text": "As tongue-tied, holding itself still in good manners", "isCorrect": true, "rationale": "Line 1 reads: 'My tongue-tied Muse in manners holds her still,' presenting the speaker's creative voice as constrained to silence out of courteous deference to the more eloquent rivals."}, {"text": "As sick and feverish, unable to produce verse", "isCorrect": false, "rationale": "The sick Muse imagery appears in Sonnet LXXIX; here the Muse is tongue-tied, not ill."}, {"text": "As humble but still producing verse at a steady pace", "isCorrect": false, "rationale": "The Muse holds still — it is silent, not producing at a reduced rate."}]}, {"question": "What are the rival poets doing while the speaker is silent?", "options": [{"text": "Writing careless, hurried verse with little thought", "isCorrect": false, "rationale": "The rivals are described as writing in polished, refined form with golden quills — the opposite of careless."}, {"text": "Richly compiling comments of praise, writing with golden quills and precious phrases filed by all the Muses", "isCorrect": true, "rationale": "Lines 2-6 describe the rivals compiling richly crafted praise with 'golden quill' and 'precious phrase by all the Muses fil'd,' presenting them as polished, accomplished craftsmen."}, {"text": "Sending their verse to publishers while keeping it secret from the youth", "isCorrect": false, "rationale": "No publication activity is described; the rivals are writing and their verse is presented as superior in craft, not in distribution."}, {"text": "Competing against each other rather than focusing on the youth", "isCorrect": false, "rationale": "No rivalry between the rivals themselves is suggested; their activity is directed toward praising the youth."}]}, {"question": "What does the speaker say he is doing while others write good words?", "options": [{"text": "Thinking good thoughts for the youth even if he cannot express them", "isCorrect": true, "rationale": "Line 7 states: 'I think good thoughts, whilst others write good words,' drawing a key distinction between inner thought (the speaker's province) and outward eloquent expression (the rivals' domain)."}, {"text": "Reading the rivals' verse and learning from their techniques", "isCorrect": false, "rationale": "No learning from rivals is described; the speaker contrasts thinking with writing, not studying with producing."}, {"text": "Planning a longer work that will eventually surpass all their verse", "isCorrect": false, "rationale": "No deferred ambition is mentioned; the distinction is simply between good thoughts and good words as simultaneous activities."}, {"text": "Remaining completely idle, contributing nothing to the youth's praise", "isCorrect": false, "rationale": "The speaker is actively thinking — the thinking is presented as genuine contribution, just an interior one rather than a verbal one."}]}, {"question": "What simile does the speaker use to describe himself in relation to the rivals' verse?", "options": [{"text": "Like a judge who silently evaluates the arguments of eloquent advocates", "isCorrect": false, "rationale": "No judicial simile appears; the speaker uses a religious or liturgical comparison."}, {"text": "Like an unlettered clerk who still cries 'Amen' to every hymn an able spirit affords", "isCorrect": true, "rationale": "Lines 8-10 compare the speaker to 'unlettered clerk still cry Amen / To every hymn that able spirit affords,' capturing his role as a devoted, if inarticulate, responder to the rivals' polished verse."}, {"text": "Like a student who copies the teacher's words without understanding them", "isCorrect": false, "rationale": "No student-teacher dynamic is used; the clerk/hymn simile is religious, evoking a liturgical context of responsive acknowledgment."}, {"text": "Like a sailor who watches skilled navigators steer the ship he cannot command", "isCorrect": false, "rationale": "The nautical imagery belongs to Sonnet LXXX; here the comparison is liturgical — clerk and hymn."}]}, {"question": "What does the speaker say when he hears the youth praised?", "options": [{"text": "He argues that the praise is insufficient and does not capture the youth's true depth", "isCorrect": false, "rationale": "No criticism of the praise is voiced aloud; the speaker says 'tis so, 'tis true' — pure agreement."}, {"text": "He says 'tis so, 'tis true' and adds something more to the most of praise", "isCorrect": true, "rationale": "Lines 11-12 state: 'Hearing you praised, I say 'tis so, 'tis true, / And to the most of praise add something more,' presenting the speaker as an enthusiastic endorser who even exceeds others' praise."}, {"text": "He remains completely silent, neither agreeing nor adding anything", "isCorrect": false, "rationale": "The speaker is vocal in agreement — he says 'tis so, 'tis true'; his silence is in formal verse production, not in all expression."}, {"text": "He contests the praise and offers a more accurate description of the youth", "isCorrect": false, "rationale": "No contestation occurs; the speaker affirms and amplifies the praise, not corrects it."}]}, {"question": "Where does the speaker say his addition to praise actually resides?", "options": [{"text": "In his verse, which he shares privately with the youth but not publicly", "isCorrect": false, "rationale": "No private sharing of verse is described; the addition resides in the speaker's thought, not in any private communication."}, {"text": "In his thought, where his love for the youth holds its rank before all words", "isCorrect": true, "rationale": "Lines 13-14 state: 'But that is in my thought, whose love to you, / Though words come hindmost, holds his rank before,' locating the speaker's truest tribute in the interior of thought rather than in spoken or written words."}, {"text": "In his actions and loyal service, which demonstrate love more than words can", "isCorrect": false, "rationale": "No mention of service or actions appears; the contrast is between thought (interior) and words (exterior expression), not between actions and words."}, {"text": "In the youth's memory, where past meetings have left a permanent impression", "isCorrect": false, "rationale": "No record of past meetings is invoked; the speaker locates his tribute in his own ongoing thought."}]}, {"question": "What is the meaning of 'though words come hindmost, holds his rank before'?", "options": [{"text": "Although the speaker speaks last, his words are remembered first by the youth", "isCorrect": false, "rationale": "This misreads the temporal logic; the contrast is between the words and the thought, not between the speaker's timing and others'."}, {"text": "Although the speaker's words come last (are least eloquent), his love, which lives in thought, holds the highest rank", "isCorrect": true, "rationale": "The lines argue that because love resides in thought rather than words, and thought precedes and surpasses expression, the speaker's love 'holds his rank before' — takes first place — even when his words are last and least."}, {"text": "The speaker will eventually write verse that surpasses the rivals, placing him first in the youth's esteem", "isCorrect": false, "rationale": "No future surpassing of rivals is promised; the argument is about the present priority of thought over words."}, {"text": "The speaker asks to be ranked before the rivals based on the sincerity of his silence", "isCorrect": false, "rationale": "The ranking claim is about love in thought holding first place, not about asking to be ranked ahead of rivals."}]}, {"question": "What does the couplet ask the youth to value?", "options": [{"text": "Others for the breath of their words, but the speaker for his dumb thoughts that speak more effectively", "isCorrect": true, "rationale": "The couplet reads: 'Then others, for the breath of words respect, / Me for my dumb thoughts, speaking in effect,' asking the youth to honor the rivals for their eloquent speech while valuing the speaker for the deeper, more effective speech of silent thought and love."}, {"text": "The speaker above all others because his silence proves the greatest sacrifice", "isCorrect": false, "rationale": "The couplet does not ask to be valued above all others for sacrifice; it asks to be valued on a different criterion — thought rather than words."}, {"text": "Neither rivals nor speaker, since all verse is inadequate to the youth's worth", "isCorrect": false, "rationale": "The couplet does not dismiss all verse; it differentiates between what the rivals offer (words) and what the speaker offers (thought), asking for appropriate valuation of each."}, {"text": "The speaker's future verse, which will prove more eloquent than his current silence", "isCorrect": false, "rationale": "No future eloquence is promised; the couplet is content to argue that dumb thoughts speaking in effect are already a sufficient form of tribute."}]}, {"question": "The phrase 'dumb thoughts, speaking in effect' in the couplet is an example of:", "options": [{"text": "Simile — comparing silent thoughts to a speaking person", "isCorrect": false, "rationale": "There is no 'like' or 'as'; it is not a simile but a paradox — mutually contradictory qualities held in the same phrase."}, {"text": "Oxymoron or paradox — thoughts that are dumb (silent) yet speak", "isCorrect": true, "rationale": "The phrase unites contradictory terms: 'dumb' means silent or mute, yet these thoughts 'speak in effect' — communicate through their reality and love. The paradox captures the speaker's central argument that silence can be more eloquent than words."}, {"text": "Hyperbole — exaggerating how powerful silent thoughts are", "isCorrect": false, "rationale": "While the claim is bold, the primary device is paradox — the union of opposite qualities (dumb/speaking) in a single image."}, {"text": "Personification — giving human speech to abstract thoughts", "isCorrect": false, "rationale": "While personification is present ('thoughts speaking'), the key device is the paradox of dumb thoughts speaking, not merely the personification of thought."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
