        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker's opening instruction to the beloved in line 1 of Sonnet XXXV?", "options": [{"text": "To repent publicly and confess the wrong", "isCorrect": false, "rationale": "Public confession is not requested; the speaker urges the beloved to stop grieving over the transgression."}, {"text": "To grieve no more over what has been done", "isCorrect": true, "rationale": "“No more be griev'd at that which thou hast done” — the speaker counsels the beloved to cease grieving, taking on the role of consoler despite being the injured party."}, {"text": "To leave and never return", "isCorrect": false, "rationale": "Departure is not commanded; Sonnet XXXVI addresses separation, but XXXV opens with consolation."}, {"text": "To write the speaker a poem of apology", "isCorrect": false, "rationale": "No poem is requested; the speaker is the poet consoling the wrongdoer."}], "id": "q01"}, {"question": "The images in lines 2-4 (“loses have thorns,” “silver fountains mud,” “loathsome canker in sweetest bud”) serve to:", "options": [{"text": "Show that beauty is always dangerous and should be avoided", "isCorrect": false, "rationale": "The argument is not that beauty should be avoided but that imperfection is natural even in beautiful things — a comfort to the beloved."}, {"text": "Normalize imperfection by demonstrating that corruption exists in all beautiful things", "isCorrect": true, "rationale": "These nature comparisons are universal examples that flaws accompany beauty everywhere — a rhetorical strategy to make the beloved's fault seem less exceptional and thus forgivable."}, {"text": "Suggest that the speaker no longer values beauty", "isCorrect": false, "rationale": "The speaker still values beauty; the comparisons excuse the beloved's flaw, not reject beauty itself."}, {"text": "Foreshadow that the friendship will end badly", "isCorrect": false, "rationale": "These lines are consolatory, not ominous; they build toward excuse, not breakup."}], "id": "q02"}, {"question": "What self-accusation does the speaker make in lines 5-10?", "options": [{"text": "That he loved the beloved too intensely and drove them away", "isCorrect": false, "rationale": "Excessive love is not the self-accusation; the speaker focuses on his rhetorical over-justification of the beloved's fault."}, {"text": "That in excusing the beloved he has become an advocate for the very person who wronged him, corrupting himself", "isCorrect": true, "rationale": "The speaker admits he is “authorizing thy trespass with compare,” “corrupting” himself, and excusing the beloved's sins beyond what the sins deserve — becoming the beloved's lawyer against his own interests."}, {"text": "That he was unfaithful first, which provoked the beloved's sin", "isCorrect": false, "rationale": "The speaker's own prior unfaithfulness is not confessed here; the self-blame is about the act of over-excusing."}, {"text": "That he wrote the earlier sonnets too harshly", "isCorrect": false, "rationale": "Retraction of earlier harshness is not the accusation; it is the excess of present leniency."}], "id": "q03"}, {"question": "What does “thy adverse party is thy advocate” (line 12) mean?", "options": [{"text": "The beloved has hired a lawyer who secretly hates them", "isCorrect": false, "rationale": "The legal language is metaphorical; no real lawyer is involved."}, {"text": "The speaker, who should be the plaintiff against the beloved, has instead become the beloved's defense counsel", "isCorrect": true, "rationale": "In legal terms the “adverse party” is the opposing side in a case; here the speaker is the one wronged (the logical plaintiff) yet has argued the beloved's case, making him simultaneously the injured party and the defense."}, {"text": "The beloved's enemies are secretly helping the speaker", "isCorrect": false, "rationale": "No third-party enemies appear; the speaker is discussing his own internal contradiction."}, {"text": "The speaker and beloved are on opposite sides of a public dispute", "isCorrect": false, "rationale": "The conflict is private and emotional; this line describes the speaker's internal contradiction, not a public dispute."}], "id": "q04"}, {"question": "The “civil war” of line 14 refers to:", "options": [{"text": "A political conflict in England at the time Shakespeare was writing", "isCorrect": false, "rationale": "Shakespeare wrote the sonnets around the 1590s; the English Civil War was a later event. The civil war here is a personal psychological metaphor."}, {"text": "The internal conflict within the speaker between love and the knowledge of being wronged", "isCorrect": true, "rationale": "Love compels the speaker to forgive and excuse; the rational knowledge of being wronged demands justice — these opposing forces constitute a “civil war” within the speaker's own soul."}, {"text": "A quarrel between two factions of the beloved's friends and enemies", "isCorrect": false, "rationale": "No external factions are involved; the war is entirely internal to the speaker."}, {"text": "The conflict between the speaker's two social personas", "isCorrect": false, "rationale": "Social persona conflict is not the subject; the war is between emotional love and rational moral judgment."}], "id": "q05"}, {"question": "How does Shakespeare use legal vocabulary in this sonnet to develop the theme?", "options": [{"text": "To suggest the speaker plans to take legal action against the beloved", "isCorrect": false, "rationale": "No actual legal action is contemplated; the legal language is an extended metaphor for moral accountability."}, {"text": "To dramatize the speaker's self-betrayal: he has put himself on trial and argued the wrong side", "isCorrect": true, "rationale": "Terms like “authorizing,” “trespass,” “adverse party,” “advocate,” “plea,” and “accessary” create a courtroom scene in which the speaker is simultaneously judge, victim, and defense counsel — dramatizing his moral confusion."}, {"text": "To contrast the cold logic of law with the warmth of friendship", "isCorrect": false, "rationale": "While such contrast could be inferred, the primary function is to dramatize the speaker's internal contradiction, not to celebrate warmth over law."}, {"text": "To echo the language of the beloved's own apology", "isCorrect": false, "rationale": "The beloved does not speak in this sonnet; the legal language belongs entirely to the speaker."}], "id": "q06"}, {"question": "In the couplet, the speaker calls the beloved a “sweet thief.” This oxymoron suggests:", "options": [{"text": "The beloved stole money but used it for a good cause", "isCorrect": false, "rationale": "No literal theft of money is described; “thief” refers to the beloved's taking of the speaker's emotional well-being or perhaps the affections of a third party."}, {"text": "The beloved's wrongdoing is simultaneously harmful and inseparable from their appealing nature", "isCorrect": true, "rationale": "The oxymoron (“sweet” + “thief”) captures the speaker's dilemma: the person who robs him is the same person he loves for their sweetness — the wrongdoer's charm is what makes condemnation so difficult."}, {"text": "Thieves can be sweet when they steal to feed the poor", "isCorrect": false, "rationale": "The Robin Hood logic does not apply; the speaker is noting his own contradictory feelings, not praising charitable theft."}, {"text": "The beloved's beauty is stolen from nature", "isCorrect": false, "rationale": "The idea of beauty borrowed from nature appears elsewhere in the sequence; here “thief” refers to the beloved's moral transgression against the speaker."}], "id": "q07"}, {"question": "The word “accessary” (accessory, line 15) in the legal sense means:", "options": [{"text": "A decorative item worn alongside a main garment", "isCorrect": false, "rationale": "The fashion sense of “accessory” is not operative here; the speaker uses the legal term."}, {"text": "One who aids or enables a crime without directly committing it", "isCorrect": true, "rationale": "In law, an accessory is someone who assists in a crime; the speaker confesses that by excusing the beloved's sin he has become a legal accessory to that sin — a startling admission of moral complicity."}, {"text": "The victim of a crime who is blamed for enabling it", "isCorrect": false, "rationale": "While the speaker is indeed the victim who enables through excusing, the legal term “accessary” specifically denotes complicity in the crime, not victimhood."}, {"text": "A judge who hands down an excessively lenient sentence", "isCorrect": false, "rationale": "A lenient judge is not the legal category; an accessory is a helper, not a judge."}], "id": "q08"}, {"question": "Sonnet XXXV marks a shift from XXXIII and XXXIV in that the speaker:", "options": [{"text": "Becomes angry instead of forgiving", "isCorrect": false, "rationale": "XXXV is if anything more forgiving than XXXIV — the speaker immediately urges the beloved not to grieve; anger is not the new element."}, {"text": "Turns the moral scrutiny on himself rather than primarily on the beloved", "isCorrect": true, "rationale": "Sonnets XXXIII and XXXIV focus on what the beloved did (obscuring, breaking promises); XXXV shifts to the speaker's own complicity in enabling forgiveness — making him morally entangled rather than simply wronged."}, {"text": "Abandons natural imagery in favor of abstract philosophy", "isCorrect": false, "rationale": "Nature imagery (roses, fountains, buds) continues in XXXV; the shift is in moral focus, not in imagery."}, {"text": "Addresses a third party rather than the beloved directly", "isCorrect": false, "rationale": "The beloved is still addressed as “thou” throughout."}], "id": "q09"}, {"question": "What does “sourly robs from me” in the final line suggest about the emotional cost of the speaker's forgiveness?", "options": [{"text": "The speaker is happy to give up everything for the beloved", "isCorrect": false, "rationale": "“Sourly” indicates bitterness, not happiness; the forgiveness is costly."}, {"text": "The forgiveness, though granted, comes at a bitter personal cost — the speaker feels robbed even as he excuses", "isCorrect": true, "rationale": "“Sourly robs” combines the bitterness (“sourly”) with the sense of theft (“robs”), showing that the speaker's generous excusing does not remove the pain — he is simultaneously pardoning and still suffering the loss."}, {"text": "The beloved has taken all the speaker's money", "isCorrect": false, "rationale": "The theft is metaphorical — of affection, loyalty, or emotional security — not of literal money."}, {"text": "The speaker regrets forgiving and will soon rescind that forgiveness", "isCorrect": false, "rationale": "While the pain is acknowledged, no rescinding of forgiveness is threatened in this or subsequent sonnets."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
