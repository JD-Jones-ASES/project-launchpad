<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What question does the speaker pose at the start of Sonnet CXLIX?", "options": [{"text": "Why does the Dark Lady love him, given his faults?", "isCorrect": false, "rationale": "The speaker does not ask why she loves him; he challenges her claim that he does not love her."}, {"text": "How can she say he does not love her when he sides against himself for her sake?", "isCorrect": true, "rationale": "'Canst thou, O cruel! say I love thee not, / When I against myself with thee partake?' — his self-betrayal is offered as proof of love."}, {"text": "Whether his love for her is greater than her love for anyone else", "isCorrect": false, "rationale": "A comparative claim about degrees of love is not the opening question."}, {"text": "Why she hates him despite his complete devotion", "isCorrect": false, "rationale": "While her cruelty is implied, the question is specifically about her claim that he does not love her."}], "id": "q01"}, {"question": "What does 'I against myself with thee partake' mean?", "options": [{"text": "He fights on her side against his own interests and better judgment", "isCorrect": true, "rationale": "He 'partakes' (sides) with her against himself — his self-abandonment is his proof of love."}, {"text": "He shares his possessions with her while denying himself", "isCorrect": false, "rationale": "Material sharing is not the point; the self-betrayal is psychological and social."}, {"text": "He participates in her sins against his will", "isCorrect": false, "rationale": "Coerced participation is not the claim; he voluntarily sides with her against himself."}, {"text": "He defends her reputation at the cost of his own", "isCorrect": false, "rationale": "Reputation defense is not specifically named; the partaking is broader self-abandonment."}], "id": "q02"}, {"question": "In the second quatrain, what does the speaker do toward anyone who dislikes the Dark Lady?", "options": [{"text": "He argues rationally with them on her behalf", "isCorrect": false, "rationale": "Rational argument is not the mode; he simply refuses to call such people friends."}, {"text": "He refuses to call them friends and fawns on those she approves of", "isCorrect": true, "rationale": "'Who hateth thee that I do call my friend, / On whom frown'st thou that I do fawn upon' — his social relationships are entirely dictated by her preferences."}, {"text": "He publicly mocks them to please her", "isCorrect": false, "rationale": "Public mockery is not stated; the actions are refusing friendship and fawning on her favorites."}, {"text": "He challenges them to a duel", "isCorrect": false, "rationale": "Physical challenge is not the mode; the social submission described is more passive."}], "id": "q03"}, {"question": "How does the speaker respond when the Dark Lady scowls at him?", "options": [{"text": "He rebukes her for cruelty", "isCorrect": false, "rationale": "The speaker does not rebuke her; his response is the opposite of resistance."}, {"text": "He takes revenge upon himself with present moan", "isCorrect": true, "rationale": "'Nay, if thou lour'st on me, do I not spend / Revenge upon myself with present moan?' — he punishes himself when she frowns."}, {"text": "He withdraws from the relationship in self-respect", "isCorrect": false, "rationale": "Self-respect and withdrawal are precisely what the poem denies; he self-punishes instead."}, {"text": "He writes a poem accusing her of cruelty", "isCorrect": false, "rationale": "While the sonnet does accuse her, the behavior described within the poem is self-punishment, not retaliatory accusation."}], "id": "q04"}, {"question": "What does 'all my best doth worship thy defect' mean?", "options": [{"text": "Even his best qualities and virtues are devoted to serving her flaws", "isCorrect": true, "rationale": "His finest abilities are enslaved to adoring her faults — a devastating statement of total self-abasement."}, {"text": "He believes her flaws are actually virtues and worships them sincerely", "isCorrect": false, "rationale": "'Defect' acknowledges her faults plainly; he does not reframe them as virtues — he submits to them despite knowing they are defects."}, {"text": "He performs religious worship in her honor, forsaking God", "isCorrect": false, "rationale": "Literal religious worship is not the meaning; 'worship' here means devote/serve."}, {"text": "He excels at identifying and cataloguing her faults", "isCorrect": false, "rationale": "'Worship thy defect' is about adoration, not intellectual cataloguing."}], "id": "q05"}, {"question": "What is the revelation in the final couplet?", "options": [{"text": "The speaker realizes she will never return his love and resolves to leave her", "isCorrect": false, "rationale": "Resolution to leave is not the couplet's content; it is a bitter insight about her character."}, {"text": "He sees that she loves those who can see (i.e., those not blinded by love for her), and he is blind", "isCorrect": true, "rationale": "'Those that can see thou lov'st, and I am blind' — her love goes to those who see her clearly (perhaps her other lovers), not to him who is blinded by love."}, {"text": "He discovers that she has been lying about loving him all along", "isCorrect": false, "rationale": "A specific lie is not exposed; the insight is about whom she loves and his own blindness."}, {"text": "He accepts that his blindness is a gift that protects him from painful truth", "isCorrect": false, "rationale": "His blindness is not embraced as a gift; the couplet is bitter self-knowledge."}], "id": "q06"}, {"question": "The command 'hate on' in line 15 suggests:", "options": [{"text": "The speaker has resolved to make her hate him more as a test of love", "isCorrect": false, "rationale": "Testing her hatred is not the point; the command is a resigned surrender to her nature."}, {"text": "Bitter resignation — he now understands her character and can only tell her to continue as she is", "isCorrect": true, "rationale": "'But, love, hate on, for now I know thy mind' — having understood that she favors the clear-sighted, he gives up contesting her hatred."}, {"text": "An ironic term of endearment, showing he forgives her cruelty", "isCorrect": false, "rationale": "Forgiveness is not the tone; the resignation is clear-eyed, not affectionate."}, {"text": "A magical incantation to ward off her further cruelty", "isCorrect": false, "rationale": "Magic is not invoked; the phrase is straightforward resigned permission."}], "id": "q07"}, {"question": "The self-abasement throughout this sonnet most closely parallels:", "options": [{"text": "The Petrarchan lover's idealization of the distant, unobtainable lady", "isCorrect": false, "rationale": "Petrarchan idealization places the lady on a pedestal of virtue; here she is acknowledged as cruel and defective."}, {"text": "A total inversion of Petrarchan norms: the speaker admits the lady has defects but submits entirely to her power", "isCorrect": true, "rationale": "Unlike the Petrarchan beloved who merits worship, the Dark Lady is explicitly flawed — yet the speaker worships her defects, inverting the convention."}, {"text": "Christian self-mortification seeking spiritual purification", "isCorrect": false, "rationale": "Spiritual purification is not the goal; his self-punishment is driven by erotic obsession."}, {"text": "Stoic equanimity in the face of emotional suffering", "isCorrect": false, "rationale": "Stoicism implies emotional detachment; the speaker is far from detached."}], "id": "q08"}, {"question": "The phrase 'Commanded by the motion of thine eyes' implies:", "options": [{"text": "She communicates her commands through eye signals in a secret code", "isCorrect": false, "rationale": "No secret code is implied; the 'motion of thine eyes' means her glances and expressions direct him involuntarily."}, {"text": "Her very glances exercise total power over his will and actions", "isCorrect": true, "rationale": "The motion (movement, expression) of her eyes commands all his best faculties — her control is total and nonverbal."}, {"text": "He reads her thoughts through her eyes without her needing to speak", "isCorrect": false, "rationale": "Telepathy is not the point; the emphasis is on her power over him, not his reading of her inner life."}, {"text": "He literally cannot look away from her eyes due to physical compulsion", "isCorrect": false, "rationale": "Physical compulsion is a secondary implication; the primary meaning is that her expressions govern his behavior."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
