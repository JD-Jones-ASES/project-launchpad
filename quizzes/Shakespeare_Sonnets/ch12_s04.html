<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the main rhetorical strategy of Sonnet CXXX?", "options": [{"text": "Praising the mistress through elaborate mythological comparisons", "isCorrect": false, "rationale": "The sonnet does the opposite — it systematically refuses all such comparisons."}, {"text": "Denying every conventional compliment to the mistress, then asserting genuine love despite her ordinariness", "isCorrect": true, "rationale": "The sonnet methodically dismantles Petrarchan praise — sun, coral, snow, roses, perfume, music, goddesses — before the couplet asserts that honest love, free of false flattery, is just as rare and valuable."}, {"text": "Describing the mistress's faults to warn the reader against her", "isCorrect": false, "rationale": "The tone is affectionate; the speaker is critiquing literary convention, not the woman."}, {"text": "Arguing that physical beauty is irrelevant to love", "isCorrect": false, "rationale": "The sonnet does not argue beauty is irrelevant; it argues that honest, non-hyperbolic love is as valuable as any idealized praise."}], "id": "q01"}, {"question": "According to the first line, how do the mistress's eyes compare to the sun?", "options": [{"text": "They are brighter than the sun", "isCorrect": false, "rationale": "The speaker says her eyes are 'nothing like the sun' — a denial, not a superlative."}, {"text": "They are nothing like the sun", "isCorrect": true, "rationale": "The opening line flatly states 'My mistress' eyes are nothing like the sun,' immediately refusing the conventional comparison."}, {"text": "They outshine the morning sun", "isCorrect": false, "rationale": "This is the Petrarchan cliché the sonnet is rejecting."}, {"text": "They are as warm and golden as sunlight", "isCorrect": false, "rationale": "No such comparison is made; the speaker denies the likeness."}], "id": "q02"}, {"question": "What does the speaker say about his mistress's breath?", "options": [{"text": "It smells of roses and sweet perfumes", "isCorrect": false, "rationale": "The speaker states that some perfumes give more delight than her breath — the opposite of conventional praise."}, {"text": "That some perfumes are more delightful than her breath, which 'reeks'", "isCorrect": true, "rationale": "The speaker uses the word 'reeks' — which in Shakespeare's time could mean simply 'emanates' but still shocks modern readers — to deny that her breath is sweet as perfume."}, {"text": "That it is sweeter than music", "isCorrect": false, "rationale": "Her voice is compared unfavorably to music, not her breath."}, {"text": "That it is indescribable", "isCorrect": false, "rationale": "The speaker describes it straightforwardly as less pleasant than perfume."}], "id": "q03"}, {"question": "What does 'dun' mean in 'if snow be white, why then her breasts are dun'?", "options": [{"text": "Pale and delicate", "isCorrect": false, "rationale": "Dun is not pale; it is the opposite of snowy white."}, {"text": "Dull grayish-brown", "isCorrect": true, "rationale": "'Dun' means a dull, grayish-brown color — emphasizing that her skin is not the idealized snowy white of conventional love poetry."}, {"text": "Shimmering gold", "isCorrect": false, "rationale": "Dun is a muted, dark color, not lustrous gold."}, {"text": "Dark as midnight", "isCorrect": false, "rationale": "Dun is specifically dull brownish-grey, not pitch black."}], "id": "q04"}, {"question": "What does the speaker say about his mistress's hair?", "options": [{"text": "It flows like golden threads", "isCorrect": false, "rationale": "This is exactly the Petrarchan cliché the poem rejects."}, {"text": "If hairs be wires, black wires grow on her head", "isCorrect": true, "rationale": "The speaker uses the conventional poetic image of hair-as-wires (golden wires in normal praise) but inverts it: her wires are black, not gold."}, {"text": "It is fairer than flax", "isCorrect": false, "rationale": "No such comparison appears; the hair is described as black wires."}, {"text": "It is hidden beneath a dark veil", "isCorrect": false, "rationale": "The sonnet describes her hair directly, not veiled."}], "id": "q05"}, {"question": "What does the speaker acknowledge about his mistress's walking?", "options": [{"text": "She glides like a goddess", "isCorrect": false, "rationale": "The speaker explicitly denies having seen a goddess walk, implying she is no goddess."}, {"text": "She treads on the ground like an ordinary mortal, not a goddess", "isCorrect": true, "rationale": "'My mistress, when she walks, treads on the ground' — she is emphatically human and earthly, not the divine goddess of Petrarchan convention."}, {"text": "She dances with supernatural grace", "isCorrect": false, "rationale": "No such claim is made; the point is her ordinary human gait."}, {"text": "She walks with regal dignity", "isCorrect": false, "rationale": "The speaker strips away all idealization, noting simply that she walks on the ground."}], "id": "q06"}, {"question": "What claim does the couplet make that redeems the entire catalog of denials?", "options": [{"text": "That beauty is in the eye of the beholder", "isCorrect": false, "rationale": "This is a modern cliché; the couplet makes a more specific claim about honest love vs. false praise."}, {"text": "That he thinks his love as rare as any woman falsely flattered by conventional comparisons", "isCorrect": true, "rationale": "The couplet — 'I think my love as rare / As any she belied with false compare' — argues that honest love unadorned by hyperbole is equally precious to the idealized loves of other poets."}, {"text": "That she will improve in beauty over time", "isCorrect": false, "rationale": "No such promise is made; the couplet values present honest love."}, {"text": "That her inner virtues outweigh her physical shortcomings", "isCorrect": false, "rationale": "The couplet does not appeal to inner virtue; it simply equates honest love with the value of any praised beauty."}], "id": "q07"}, {"question": "The phrase 'belied with false compare' criticizes what literary practice?", "options": [{"text": "Using puns and wordplay in love poetry", "isCorrect": false, "rationale": "The criticism targets exaggerated comparisons, not wordplay."}, {"text": "Using hyperbolic similes and metaphors that misrepresent a woman's actual appearance", "isCorrect": true, "rationale": "'False compare' refers to the exaggerated Petrarchan comparisons (eyes like suns, lips like coral) that misrepresent real women by praising them with impossible ideals."}, {"text": "Writing love poetry about fictional women", "isCorrect": false, "rationale": "The issue is hyperbole, not fictional subjects."}, {"text": "Comparing the beloved to other women unfavorably", "isCorrect": false, "rationale": "'False compare' targets comparisons that falsely elevate, not those that diminish."}], "id": "q08"}, {"question": "In what sense is Sonnet CXXX an anti-blazon?", "options": [{"text": "It praises the body from head to foot in conventional terms", "isCorrect": false, "rationale": "A blazon does exactly this; the anti-blazon subverts it."}, {"text": "It systematically dismantles the blazon's catalog of idealized female features, replacing hyperbole with honest description", "isCorrect": true, "rationale": "The blazon was a catalogue of a woman's physical beauties using idealized comparisons. CXXX inverts each conventional comparison, producing an 'anti-blazon' that replaces flattery with honest observation."}, {"text": "It refuses to describe the beloved's body at all", "isCorrect": false, "rationale": "The sonnet does describe her features — eyes, lips, breasts, hair, breath, voice, walk — but without idealization."}, {"text": "It praises the beloved's mind rather than her body", "isCorrect": false, "rationale": "The sonnet remains focused on physical description throughout; the couplet praises the quality of love, not the beloved's intellect."}], "id": "q09"}, {"question": "The speaker says he loves to hear his mistress speak, but immediately qualifies this by saying what?", "options": [{"text": "That her words are sometimes unkind", "isCorrect": false, "rationale": "The qualification is about sound quality, not the content of her speech."}, {"text": "That music has a far more pleasing sound", "isCorrect": true, "rationale": "'I love to hear her speak, yet well I know / That music hath a far more pleasing sound' — even in a compliment the speaker maintains his honest scale."}, {"text": "That she speaks too rarely", "isCorrect": false, "rationale": "The qualification is about sound quality in comparison to music, not frequency."}, {"text": "That her voice is too soft to hear clearly", "isCorrect": false, "rationale": "The comparison is to music's superior pleasantness, not volume."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
