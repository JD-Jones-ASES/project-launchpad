    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What problem does the speaker identify with 'Love's eyes' in the opening quatrain?", "options": [{"text": "They see too clearly and make love painful", "isCorrect": false, "rationale": "The problem is the opposite: Love's eyes see falsely, not with painful clarity."}, {"text": "They have no correspondence with true sight — they see falsely or the judgment distorts what they see correctly", "isCorrect": true, "rationale": "'What eyes hath Love put in my head, / Which have no correspondence with true sight' poses the dilemma of false perception."}, {"text": "They are closed to beauty and can see only ugliness", "isCorrect": false, "rationale": "The problem is that they see beauty where none exists, not that they cannot see beauty."}, {"text": "They are blinded by jealousy rather than love", "isCorrect": false, "rationale": "Jealousy is not named as the cause; love and tears are."}], "id": "q01"}, {"question": "The speaker poses a dilemma: either his eyes see falsely, or his judgment misinterprets what they see correctly. What is the significance of this dilemma?", "options": [{"text": "Either way, his perception of the Dark Lady's beauty cannot be trusted", "isCorrect": true, "rationale": "Whether the fault is in the eyes or the judgment, the conclusion is the same — his conviction of her beauty is unreliable, trapped between sensory and cognitive failure."}, {"text": "He concludes that his eyes are perfect and the world is wrong about her appearance", "isCorrect": false, "rationale": "He does not triumphantly vindicate his eyes; the dilemma leaves him without certainty."}, {"text": "He argues that love is always epistemically superior to the opinions of others", "isCorrect": false, "rationale": "Love's epistemological superiority is not the argument; the sonnet questions love's reliability."}, {"text": "He determines that judgment is more trustworthy than direct sensory experience", "isCorrect": false, "rationale": "Neither faculty is vindicated; both are shown to be compromised by love."}], "id": "q02"}, {"question": "What does 'Love's eye is not so true as all men's: no' (line 10) mean?", "options": [{"text": "Love sees deeper truths than ordinary men can", "isCorrect": false, "rationale": "The line is not a compliment to love's vision; it admits love's eye is less accurate than the common view."}, {"text": "Love's perception is less accurate than the general opinion of other men", "isCorrect": true, "rationale": "The admission is that 'all men' (the world's consensus) see her more truly than his love-distorted eye does."}, {"text": "Men generally perceive beauty better than women do", "isCorrect": false, "rationale": "A gendered claim about perception is not what the line makes; it compares love's vision to collective human judgment."}, {"text": "Love is a liar who deceives the lover about reality", "isCorrect": false, "rationale": "While love's deception is the theme, the line's direct claim is about accuracy vs. inaccuracy of perception."}], "id": "q03"}, {"question": "Why does the speaker say Love's eye cannot be true (lines 11-12)?", "options": [{"text": "Because love is inherently irrational and rejects reason", "isCorrect": false, "rationale": "While irrationality is a Dark Lady sequence theme, the specific reason given here is physical: tears and sleeplessness."}, {"text": "Because it is vexed with watching (sleeplessness) and with tears", "isCorrect": true, "rationale": "'How can it? O! how can Love's eye be true, / That is so vexed with watching and with tears?' — the physical causes of distorted vision are named."}, {"text": "Because love is too young and inexperienced to judge clearly", "isCorrect": false, "rationale": "Love's youth is a theme of CXLI and CLI but not the specific explanation given here."}, {"text": "Because love is spiritually blind, punished by God for sin", "isCorrect": false, "rationale": "Divine punishment is not invoked; the causes are physical and psychological."}], "id": "q04"}, {"question": "The simile 'The sun itself sees not, till heaven clears' is used to argue:", "options": [{"text": "That the speaker's vision, like the sun obscured by clouds, will eventually clear", "isCorrect": false, "rationale": "The simile is not a promise of future clarity; it is a defense for present impaired vision."}, {"text": "That even the greatest source of light sees imperfectly when obscured — excusing love's clouded vision", "isCorrect": true, "rationale": "Just as clouds prevent the sun from seeing clearly, so do tears and sleeplessness prevent love's eye — a consoling parallel for the speaker's impaired perception."}, {"text": "That truth is only visible on sunny, cloudless days and not in the speaker's stormy emotional state", "isCorrect": false, "rationale": "The metaphor is about obstruction of perception, not about truth's dependence on weather."}, {"text": "That God, like the sun, sees all things and will ultimately judge the speaker", "isCorrect": false, "rationale": "Divine judgment is not the application of the sun simile here."}], "id": "q05"}, {"question": "The couplet 'O cunning Love! with tears thou keep'st me blind, / Lest eyes well-seeing thy foul faults should find' reveals:", "options": [{"text": "That Love uses the speaker's own tears as a mechanism to prevent him from seeing the Dark Lady's faults", "isCorrect": true, "rationale": "Love is personified as a cunning agent who maintains the speaker's blindness with his own weeping, preventing the discovery of her 'foul faults.'"}, {"text": "That the speaker is grateful to Love for the comfort his blindness provides", "isCorrect": false, "rationale": "The exclamation 'O cunning Love!' is accusatory, not grateful."}, {"text": "That the Dark Lady deliberately causes the speaker to weep to control him", "isCorrect": false, "rationale": "The agent of blindness is personified Love, not the Dark Lady directly."}, {"text": "That the speaker resolves to stop weeping in order to see clearly", "isCorrect": false, "rationale": "Resolution to act is not stated; the couplet is an accusation and an ironic insight, not a pledge."}], "id": "q06"}, {"question": "What is the relationship between Sonnet CXLVIII and Sonnet CXLVII thematically?", "options": [{"text": "CXLVIII shifts away from disease metaphors to focus on beauty and praise", "isCorrect": false, "rationale": "CXLVIII does not celebrate beauty; it continues the analysis of distorted perception."}, {"text": "Both explore the destruction of accurate perception by love — CXLVII through fever/madness, CXLVIII through blinding tears", "isCorrect": true, "rationale": "CXLVII charts the madness and self-deception that love produces; CXLVIII focuses specifically on the mechanism of visual distortion through weeping and sleeplessness."}, {"text": "CXLVIII reverses CXLVII's condemnation, presenting love more positively", "isCorrect": false, "rationale": "CXLVIII does not reverse the condemnation; it continues and specifies it."}, {"text": "The two sonnets are unrelated in theme and imagery", "isCorrect": false, "rationale": "They are closely linked in theme — the compromise of perception by love."}], "id": "q07"}, {"question": "What does 'censures falsely what they see aright' mean?", "options": [{"text": "The eyes report beauty correctly but the judgment interprets this correct vision as false", "isCorrect": true, "rationale": "If the eyes 'see aright' (correctly), then it is the judgment ('censures falsely') that distorts the accurate information — one horn of the dilemma posed in the octave."}, {"text": "The eyes see ugly things and the judgment falsely calls them beautiful", "isCorrect": false, "rationale": "This reverses the logic: 'see aright' means the eyes see correctly; the judgment is what is false."}, {"text": "The speaker deliberately lies about what he sees in order to flatter the Dark Lady", "isCorrect": false, "rationale": "Deliberate flattery is not what 'censures falsely' implies; it describes involuntary cognitive error."}, {"text": "The speaker's conscience condemns him for correct moral judgments about the Dark Lady", "isCorrect": false, "rationale": "Conscience is not the subject; the faculty at issue is perceptual and intellectual judgment."}], "id": "q08"}, {"question": "Which literary device is most prominent in the structure of the octave's argument?", "options": [{"text": "Apostrophe to an absent person", "isCorrect": false, "rationale": "Love is addressed in the couplet, but the octave is structured as a logical dilemma, not primarily as apostrophe."}, {"text": "Dilemma (either-or logic) exploring two possible sources of his misperception", "isCorrect": true, "rationale": "Either his eyes lack 'correspondence with true sight,' OR his judgment 'censures falsely' what the eyes correctly report — a formal either-or dilemma."}, {"text": "Extended metaphor sustained through all fourteen lines", "isCorrect": false, "rationale": "No single extended metaphor governs the whole poem; the argument shifts from dilemma to sun-simile to personified Love."}, {"text": "Anaphora repeating the same opening word in each quatrain", "isCorrect": false, "rationale": "Anaphora is not the governing device of the octave's structure."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
