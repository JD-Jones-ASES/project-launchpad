    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet L</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker’s primary complaint in the opening of Sonnet L?", "options": [{"text": "His horse is too slow for the urgent business of his journey.", "isCorrect": false, "rationale": "The slowness of the horse is a symptom, not the primary complaint; the complaint is about the heaviness of traveling away from the beloved."}, {"text": "Every mile of his journey measures the distance from the beloved, making travel unbearable.", "isCorrect": true, "rationale": "Lines 3–6: the ease and repose of travel’s end teach the speaker only that he is “thus far the miles are measur’d from thy friend!” — each mile is not progress toward a goal but a measure of distance from the beloved."}, {"text": "The road ahead is dangerous and he fears for his safety.", "isCorrect": false, "rationale": "Physical danger is not mentioned; the heaviness is emotional, not prudential."}, {"text": "He is exhausted by the hardships of travel.", "isCorrect": false, "rationale": "Physical exhaustion is not the subject; emotional grief weighs him down."}]}, {"question": "The speaker says his horse plods “as if by some instinct the wretch did know / His rider lov’d not speed.” This suggests:", "options": [{"text": "The horse is poorly trained and does not respond to commands.", "isCorrect": false, "rationale": "Training is not the issue; the horse’s behavior is attributed to sympathetic instinct."}, {"text": "The horse instinctively senses the speaker’s grief and his disinclination to travel away from the beloved, and slows accordingly.", "isCorrect": true, "rationale": "The horse is personified as a creature of sympathetic instinct that mirrors the rider’s emotional state — it is “made from thee” (moved by the departure from the beloved) and naturally slow."}, {"text": "The horse is old and sick and cannot travel any faster.", "isCorrect": false, "rationale": "No medical condition is attributed to the horse; the slowness is moral and sympathetic."}, {"text": "The horse prefers the familiar stable and is being willful.", "isCorrect": false, "rationale": "Willfulness in the ordinary sense is not the attribution; the horse shares the speaker’s grief."}]}, {"question": "The “bloody spur” (line 11) represents:", "options": [{"text": "A cruel weapon used against the speaker’s enemies.", "isCorrect": false, "rationale": "No enemies are involved; the spur is the speaker’s tool on the horse."}, {"text": "The speaker’s angry attempts to force himself forward, which even hurt the horse but cannot overcome the emotional weight of grief.", "isCorrect": true, "rationale": "The spur is the speaker’s occasional attempt to prod himself (and his horse) onward. Even anger (“that sometimes anger thrusts into his hide”) cannot accelerate a grief-laden journey."}, {"text": "A symbol of the beloved’s cruelty in sending the speaker away.", "isCorrect": false, "rationale": "No cruelty on the beloved’s part is implied; the speaker is not sent away but traveling on his own business."}, {"text": "A metaphor for poetry that drives the speaker to compose despite his sorrow.", "isCorrect": false, "rationale": "Poetry composition is not the subject here."}]}, {"question": "What does the horse’s groan (line 13) mean to the speaker?", "options": [{"text": "The speaker is amused by the horse’s dramatic reaction.", "isCorrect": false, "rationale": "Amusement is absent; the groan deepens the speaker’s misery."}, {"text": "The groan is sharper to the speaker’s heart than the spur is to the horse’s side, because it reminds him that his grief lies ahead.", "isCorrect": true, "rationale": "Lines 13–16: the horse’s groan “puts this in my mind — / My grief lies onward, and my joy behind.” The animal’s pain echoes the speaker’s own, and the groan articulates the direction of grief and joy."}, {"text": "The groan makes the speaker feel guilty for using the spur.", "isCorrect": false, "rationale": "Guilt about the animal is not the primary effect; the groan triggers the speaker’s own grief-realization."}, {"text": "The groan signals the horse is about to stop completely.", "isCorrect": false, "rationale": "No stopping is described; the poem ends on the emotional realization, not a literal halt."}]}, {"question": "The couplet (“For that same groan doth put this in my mind, / My grief lies onward, and my joy behind”) expresses:", "options": [{"text": "The speaker’s hope that the journey will lead to a joyful reunion.", "isCorrect": false, "rationale": "Hope is absent; joy is emphatically “behind” — it lies where the beloved is, not ahead."}, {"text": "A stark directional reversal: the destination holds grief, and the joy is in the direction already left behind.", "isCorrect": true, "rationale": "The couplet makes concrete the spiritual geography of separation: forward (toward the journey’s purpose) is grief; backward (toward the beloved) is joy. The traveler moves into sorrow."}, {"text": "Relief that the journey is almost over.", "isCorrect": false, "rationale": "No relief is expressed; the couplet is a lament."}, {"text": "A decision to turn around and return to the beloved.", "isCorrect": false, "rationale": "No reversal of direction is announced; the couplet is a realization, not a decision."}]}, {"question": "The horse in Sonnet L functions as:", "options": [{"text": "A symbol of the speaker’s wealth and status.", "isCorrect": false, "rationale": "Wealth and status are not signified; the horse is a figure for the speaker’s own inner state."}, {"text": "A sympathetic double for the speaker — a creature whose sluggish movement mirrors the speaker’s emotional heaviness.", "isCorrect": true, "rationale": "The horse’s dull plodding, apparent instinct about the rider’s feelings, and answering groan all make it a projection of the speaker’s own emotional state. They share a grief."}, {"text": "An obstacle the speaker must overcome to reach his destination.", "isCorrect": false, "rationale": "The horse is not cast as an antagonist; it is a companion in sorrow."}, {"text": "A comic character who provides relief from the poem’s serious themes.", "isCorrect": false, "rationale": "No comedy is intended; the horse’s role is pathetic (in the classical sense of evoking pathos)."}]}, {"question": "The phrase “weary travel’s end” (line 2) most likely refers to:", "options": [{"text": "Death — the final end of all journeys.", "isCorrect": false, "rationale": "While travel’s end can metaphorically suggest death in other contexts, here it refers to the destination of the current journey."}, {"text": "The destination or goal of the journey, which offers no comfort because it is far from the beloved.", "isCorrect": true, "rationale": "Even the ease of reaching the destination teaches the speaker only that he is far from the beloved. The “end” of travel — rest, arrival — is tainted by absence."}, {"text": "The speaker’s wish to stop traveling altogether.", "isCorrect": false, "rationale": "A wish to cease traveling is not explicitly expressed; the complaint is about the emotional meaning of each destination."}, {"text": "The beloved, who represents the true end of all the speaker’s journeys.", "isCorrect": false, "rationale": "While thematically appealing, the immediate referent is the physical destination."}]}, {"question": "Sonnet L and Sonnet LI are companion poems. What is the key difference between them?", "options": [{"text": "L is about a sea voyage; LI is about a land journey.", "isCorrect": false, "rationale": "Both involve a horse and land journey; the difference is direction."}, {"text": "L describes the misery of journeying away from the beloved; LI describes the anticipated joy of returning toward him.", "isCorrect": true, "rationale": "L’s grief lies “onward” (away from the beloved); LI opens by excusing the horse’s slowness on the outward journey and then imagines the winged speed of the return."}, {"text": "L is addressed to the horse; LI is addressed to the beloved.", "isCorrect": false, "rationale": "Both poems address the beloved or meditate generally; neither is purely addressed to the horse."}, {"text": "L is a consolation; LI is a lament.", "isCorrect": false, "rationale": "The directions are reversed: L is the lament (journeying away), LI is the consolation of imagined return."}]}, {"question": "The word “heavy” appears or is implied throughout the poem. Its primary function is to:", "options": [{"text": "Describe the horse’s actual physical weight.", "isCorrect": false, "rationale": "The horse’s physical weight is not the subject; the heaviness is emotional."}, {"text": "Convey the emotional weight of grief that presses on both the speaker and the horse.", "isCorrect": true, "rationale": "“How heavy do I journey,” “heavily he answers,” the “weight in me” — the word group creates a consistent emotional and physical weight imagery that ties the speaker’s grief to the slowness of his progress."}, {"text": "Signal the approaching bad weather on the road.", "isCorrect": false, "rationale": "Weather is not part of the imagery; the heaviness is grief, not meteorological."}, {"text": "Indicate the seriousness of the business that requires the speaker to travel.", "isCorrect": false, "rationale": "The nature of the speaker’s business is not described; the heaviness is personal and emotional."}]}, {"question": "The personification of the horse in Sonnet L is significant because:", "options": [{"text": "It shows the speaker’s expertise in horsemanship.", "isCorrect": false, "rationale": "No special expertise is demonstrated; the personification serves an emotional function."}, {"text": "It externalizes and validates the speaker’s grief — even a dumb animal shares his sorrow, making the emotion feel universal and inescapable.", "isCorrect": true, "rationale": "When even the horse “knows” the rider’s sorrow and mirrors it, the emotion is given a kind of natural authority. The grief pervades the whole journey, not just the speaker’s mind."}, {"text": "It provides comic relief from the poem’s otherwise serious tone.", "isCorrect": false, "rationale": "Pathos, not comedy, is the effect."}, {"text": "It suggests the horse is a supernatural being sent to guide the speaker.", "isCorrect": false, "rationale": "No supernatural element is invoked; the horse’s instinct is treated as natural sympathy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
