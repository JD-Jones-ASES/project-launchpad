<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is structurally unusual about Sonnet XCIX?", "options": [{"text": "It is written in couplets rather than quatrains", "isCorrect": false, "rationale": "The rhyme scheme is not pure couplets; the structure remains broadly Shakespearean but with an extra line."}, {"text": "It has 15 lines rather than the standard 14", "isCorrect": true, "rationale": "Sonnet XCIX is one of the extremely rare Shakespearean sonnets with 15 lines rather than 14, achieved by adding an extra line to the first quatrain."}, {"text": "It has no rhyme scheme at all", "isCorrect": false, "rationale": "The sonnet rhymes; the irregularity is in line count, not rhyme."}, {"text": "It is written entirely in prose", "isCorrect": false, "rationale": "The sonnet is in verse; only the line count is anomalous."}]}, {"question": "Which flower does the speaker accuse first, and of what theft?", "options": [{"text": "The rose, for stealing the beloved's blush", "isCorrect": false, "rationale": "The violet is accused first; the rose comes later with its specific charges."}, {"text": "The forward violet, for stealing its sweet scent from the beloved's breath", "isCorrect": true, "rationale": "Lines 1-5 address the violet first: the speaker chides the 'forward violet' and asks where it stole its sweet smell, if not from the beloved's breath."}, {"text": "The lily, for stealing the beloved's white complexion", "isCorrect": false, "rationale": "The lily is accused second, for stealing the color of the beloved's hand, not its scent."}, {"text": "The marjoram, for stealing the beloved's hair color", "isCorrect": false, "rationale": "Marjoram appears third; the violet opens the floral indictment."}]}, {"question": "What does 'forward violet' mean?", "options": [{"text": "A violet growing in an advanced or early direction", "isCorrect": false, "rationale": "'Forward' here is a personality descriptor, not a direction."}, {"text": "A presumptuous or bold violet — one that has overstepped its bounds by appropriating the beloved's qualities", "isCorrect": true, "rationale": "'Forward' in Elizabethan English means presumptuous, bold, or premature. The violet is chided for impudently stealing the beloved's sweetness.'"}, {"text": "A violet that faces toward the sun", "isCorrect": false, "rationale": "No solar orientation is described; the word carries a moral valence of presumption."}, {"text": "A rare purple violet found only in spring", "isCorrect": false, "rationale": "While the violet's purple color is mentioned, 'forward' is a moral descriptor, not a botanical one."}]}, {"question": "What accusation is leveled against the marjoram?", "options": [{"text": "It stole the beloved's breath", "isCorrect": false, "rationale": "Breath is stolen by the third rose; marjoram's theft is different."}, {"text": "It stole the color of the beloved's hair", "isCorrect": true, "rationale": "Line 9 states 'buds of marjoram had stol'n thy hair' — the marjoram's soft, sweet buds are accused of having copied the beloved's hair in color and texture."}, {"text": "It stole the beloved's blush", "isCorrect": false, "rationale": "The blush is associated with the red rose; marjoram is charged with the hair."}, {"text": "It stole the beloved's beauty entirely", "isCorrect": false, "rationale": "Each flower is charged with a specific, limited theft; marjoram's crime is specifically the hair."}]}, {"question": "What happened to the third rose — the one that 'had stol'n of both' (red and white)?", "options": [{"text": "It became the most beautiful rose of all", "isCorrect": false, "rationale": "The outcome for this rose is catastrophic, not glorifying."}, {"text": "A vengeful canker consumed it as punishment for its multiple thefts", "isCorrect": true, "rationale": "Lines 12-15 describe the third rose: having stolen both red and white from the beloved, and also the breath, it was punished — 'a vengeful canker eat him up to death' destroyed the thieving rose at the height of its beauty."}, {"text": "It was plucked by the beloved as a gift for the speaker", "isCorrect": false, "rationale": "No plucking or gift appears; the rose is destroyed by the canker."}, {"text": "It turned entirely white from shame", "isCorrect": false, "rationale": "The rose's fate is destruction by the canker, not a change of color."}]}, {"question": "What does the two-rose (one blushing shame, one white despair) image suggest?", "options": [{"text": "The two roses are competing for the beloved's attention", "isCorrect": false, "rationale": "The roses are not competing; they are each embodying the emotional responses of guilty thieves."}, {"text": "The red rose blushes with shame at its theft, the white rose pales with despair — each carrying an emotional response to the accusation", "isCorrect": true, "rationale": "Line 11: 'One blushing shame, another white despair.' The roses are personified as guilty thieves who react emotionally to being caught — the red blushes with shame, the white blanches with despair."}, {"text": "The two colors of rose represent the speaker and the beloved", "isCorrect": false, "rationale": "While red and white are common symbols in sonnet sequences, here they represent the emotional states of the guilty roses, not identities."}, {"text": "Shakespeare is describing a specific rose garden he visited", "isCorrect": false, "rationale": "The roses are entirely imaginative and metaphorical."}]}, {"question": "What does the concluding couplet reveal about the speaker's relationship to the natural world?", "options": [{"text": "The speaker finds no beauty in nature and prefers solitude", "isCorrect": false, "rationale": "The speaker observes nature extensively; the conclusion is not about rejecting nature but about finding the beloved in everything."}, {"text": "Every natural thing the speaker observes in some way reflects or copies the beloved — all beauty is traced back to the beloved as its source", "isCorrect": true, "rationale": "'More flowers I noted, yet I none could see, / But sweet, or colour it had stol'n from thee.' Every flower the speaker examines ultimately refers back to the beloved as the source of its qualities. The beloved is the pattern of all natural beauty."}, {"text": "The speaker concludes that nature is superior to human love", "isCorrect": false, "rationale": "Nature is not superior; it is entirely derivative of the beloved's beauty."}, {"text": "The speaker vows to stop comparing the beloved to flowers", "isCorrect": false, "rationale": "The conclusion intensifies the comparison rather than renouncing it."}]}, {"question": "Sonnet XCIX functions as a closing poem for Chapter 9 by:", "options": [{"text": "Providing a logical summary of all the chapter's arguments", "isCorrect": false, "rationale": "XCIX is lyrical and playful rather than argumentative; it does not summarize the chapter's logic."}, {"text": "Transforming the entire natural world into a record of the beloved's perfection — replacing estrangement anxiety with the beloved's pervasive presence in all things", "isCorrect": true, "rationale": "After twelve sonnets of anxiety about absence, unworthiness, and possible betrayal, XCIX ends the chapter by finding the beloved everywhere in nature — every flower is a theft from him. This suggests a kind of return: the beloved is inescapably present even in the natural world."}, {"text": "Announcing the speaker's decision to leave the beloved permanently", "isCorrect": false, "rationale": "No farewell or departure is in XCIX; the movement is toward presence and return."}, {"text": "Introducing the rival poet who will dominate the next chapter", "isCorrect": false, "rationale": "No rival appears in XCIX; the rival poet sequence is separate."}]}, {"question": "What emotion characterizes the speaker's tone in Sonnet XCIX compared to the opening sonnets of Chapter 9?", "options": [{"text": "The same cold legal resignation as in LXXXVII", "isCorrect": false, "rationale": "LXXXVII is characterized by legal self-abnegation; XCIX is tender, playful, and filled with sensory delight."}, {"text": "Playful, tender delight in finding the beloved's qualities in every flower — a warmer, more intimate mood than the chapter's opening", "isCorrect": true, "rationale": "The chapter opens with legal farewell (LXXXVII) and anxious self-sacrifice. XCIX ends with gentle, playful accusation of flowers — a tone of loving intimacy that signals the 'Return' of the chapter's subtitle."}, {"text": "Anger and accusation directed at the beloved", "isCorrect": false, "rationale": "The accusations are directed at flowers, not the beloved; the tone toward the beloved is tender."}, {"text": "Despair at the impossibility of reunion", "isCorrect": false, "rationale": "XCIX conveys the opposite: the beloved is everywhere, permeating all of nature, suggesting reunion rather than hopeless separation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
