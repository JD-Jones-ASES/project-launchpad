        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker say at the start of Sonnet XLII is NOT his chief grief?", "options": [{"text": "That the beloved has abandoned him for a new friend", "isCorrect": false, "rationale": "The beloved's general abandonment is not isolated as the lesser grief; the sonnet specifically compares two losses."}, {"text": "That the beloved possesses the speaker's mistress", "isCorrect": true, "rationale": "“That thou hast her it is not all my grief” — the beloved's having the woman the speaker also loved is acknowledged but explicitly ranked as the lesser pain."}, {"text": "That the speaker has been publicly humiliated", "isCorrect": false, "rationale": "Public humiliation is not mentioned; the grief is personal and relational."}, {"text": "That the speaker can no longer write poetry", "isCorrect": false, "rationale": "Poetic inability is not cited; the grief is the dual loss of both the mistress and the beloved."}], "id": "q01"}, {"question": "What IS the speaker's “wailing chief” grief?", "options": [{"text": "That the woman has preferred the beloved over the speaker", "isCorrect": false, "rationale": "The woman's preference is a component, but the chief grief is specified as the loss of the beloved himself."}, {"text": "That she has the beloved — the loss of the beloved himself, which touches the speaker most nearly", "isCorrect": true, "rationale": "“That she hath thee is of my wailing chief, / A loss in love that touches me more nearly” — losing the beloved to the woman is a deeper wound than losing the woman to the beloved, because the beloved is the more cherished relationship."}, {"text": "That the speaker has been forced to leave his home", "isCorrect": false, "rationale": "No displacement from home is mentioned; the grief is the loss of the beloved's primary affection."}, {"text": "That both the woman and the beloved have written mocking poems about the speaker", "isCorrect": false, "rationale": "Mockery in verse is not referenced; the grief is about the triangular romantic betrayal."}], "id": "q02"}, {"question": "What elaborate excuse does the speaker construct in lines 7-10 for the “loving offenders”?", "options": [{"text": "That neither the beloved nor the woman intended to hurt him", "isCorrect": false, "rationale": "Lack of intent is not the specific excuse constructed; the speaker builds a more elaborate mutual-affection logic."}, {"text": "That the beloved loves the woman because he knows the speaker does, and she indulges the beloved for the speaker's sake — both acts performed out of love for the speaker", "isCorrect": true, "rationale": "“Thou dost love her, because thou know'st I love her; / And for my sake even so doth she abuse me, / Suffering my friend for my sake to approve her” — both transgressions are framed as love-for-the-speaker: a deliberately strained logic that acknowledges the absurdity even while constructing it."}, {"text": "That they were both under the influence of a love potion", "isCorrect": false, "rationale": "No supernatural element is invoked; the excuse is entirely logical (however strained)."}, {"text": "That social convention forced them together against their will", "isCorrect": false, "rationale": "Social compulsion is not the excuse; the speaker creates a logic of mutual love for himself as the paradoxical reason for the betrayal."}], "id": "q03"}, {"question": "The couplet (“But here's the joy; my friend and I are one; / Sweet flattery! then she loves but me alone”) functions as:", "options": [{"text": "A sincere declaration that the conflict is fully resolved", "isCorrect": false, "rationale": "The speaker immediately undercuts the conclusion with the phrase “Sweet flattery!” — acknowledging it is self-deception, not genuine resolution."}, {"text": "A self-aware logical trick that the speaker knows is flattery but uses as psychological comfort", "isCorrect": true, "rationale": "“Sweet flattery!” is the speaker's own acknowledgment that the conclusion (since friend and I are one, she loves me alone) is a delightful but transparently false comfort — the poem knowingly endorses a fiction to survive the pain."}, {"text": "A genuine philosophical claim about the metaphysical unity of souls", "isCorrect": false, "rationale": "While the idea of unity recurs in the sequence, the self-labeling of “sweet flattery” shows the speaker knows this is not literal metaphysical truth but a consoling fiction."}, {"text": "A threat to the woman that the speaker will reclaim what is his", "isCorrect": false, "rationale": "No threat is issued; the tone is ironic consolation, not menace."}], "id": "q04"}, {"question": "What does the phrase “Sweet flattery!” reveal about the speaker's self-awareness?", "options": [{"text": "That the speaker is too happy to think clearly", "isCorrect": false, "rationale": "Joy is not impairing the speaker's reasoning; the exclamation shows acute self-awareness of his own consolatory reasoning."}, {"text": "That the speaker recognizes he is comforting himself with a logically pleasing but false conclusion", "isCorrect": true, "rationale": "“Flattery” means pleasant falsehood; by naming his own conclusion “sweet flattery,” the speaker acknowledges with painful lucidity that his joy is self-manufactured — he knows the reasoning is hollow even as he embraces it."}, {"text": "That the woman is flattering both the speaker and the beloved simultaneously", "isCorrect": false, "rationale": "The flattery is the speaker's own logical self-deception, not the woman's behavior."}, {"text": "That the speaker admires the beloved's charm as a flatterer", "isCorrect": false, "rationale": "The flattery is the speaker's own towards himself; he flatters himself with the consoling logic, not the other way around."}], "id": "q05"}, {"question": "How does the metaphysical logic of “my friend and I are one” echo earlier sonnets in this chapter?", "options": [{"text": "It echoes Sonnet XXXIII's sun metaphor", "isCorrect": false, "rationale": "The sun-cloud metaphor of XXXIII is not the precedent for the oneness logic; the relevant precedents are the unity-of-souls arguments."}, {"text": "It echoes Sonnets XXXVI and XXXIX's exploration of the lovers being simultaneously one and two — a recurring philosophical conceit now used as consolation", "isCorrect": true, "rationale": "XXXVI (“our undivided loves are one”) and XXXIX (“thou art all the better part of me”) both develop the oneness-of-souls concept; XLII deploys the same conceit for consolatory purposes, completing the chapter's threading of this theme."}, {"text": "It echoes Sonnet XXXVIII's claim that the beloved is the speaker's Muse", "isCorrect": false, "rationale": "The Muse-and-inspiration theme of XXXVIII is distinct from the oneness-of-persons theme; the echo is to the identity-fusion sonnets."}, {"text": "It echoes Sonnet XXXV's civil war between love and hate", "isCorrect": false, "rationale": "The civil war of XXXV is about internal conflict; the oneness logic of XLII is about relational identity, not inner division."}], "id": "q06"}, {"question": "Lines 11-13 (“If I lose thee, my loss is my love's gain... Both find each other, and I lose both twain”) suggest:", "options": [{"text": "A happy outcome in which everyone benefits", "isCorrect": false, "rationale": "While the beloved and woman find each other, the speaker explicitly “loses both twain” — the outcome is happy for others, devastating for him."}, {"text": "A lose-lose situation for the speaker: however the triangle resolves, the speaker is the one who loses everything", "isCorrect": true, "rationale": "If he loses the beloved, that loss is his mistress's gain; if he loses the woman, his friend found her; both find each other — and both outcomes converge on the speaker losing both cherished relationships while the other two gain from the exchange."}, {"text": "That the speaker is secretly pleased the beloved and mistress are together", "isCorrect": false, "rationale": "The accumulation of losses is presented as a cross borne by the speaker, not a secret pleasure."}, {"text": "That the speaker plans to replace both the beloved and the woman with new companions", "isCorrect": false, "rationale": "No replacement plan is mentioned; the speaker dwells in the grief of simultaneous double loss."}], "id": "q07"}, {"question": "What does “both for my sake lay on me this cross” (line 14) suggest?", "options": [{"text": "The beloved and mistress are both angry at the speaker and blame him", "isCorrect": false, "rationale": "The anger runs in the other direction; the speaker bears the cross of their betrayal, not their anger."}, {"text": "The speaker must bear the suffering (cross) caused by both betrayals, each of which the others claim is done for the speaker's benefit", "isCorrect": true, "rationale": "The “cross” recalls Christ's suffering and means burden or suffering. Ironically, the very excuse he constructed (both act for his sake) rebounds: if both did it for his sake, he must bear the resulting pain — the cross of their mutual offense."}, {"text": "The speaker is angry at God for allowing the situation", "isCorrect": false, "rationale": "No divine address or anger at God appears; the cross is a metaphor for personal suffering, not theological complaint."}, {"text": "Both betrayals physically injure the speaker", "isCorrect": false, "rationale": "The injury is emotional and relational, not physical; “cross” is metaphorical."}], "id": "q08"}, {"question": "How does Sonnet XLII serve as a culmination of Chapter 5 (“Shadows and Forgiveness”)?", "options": [{"text": "It resolves all the chapter's tensions through the beloved's public apology", "isCorrect": false, "rationale": "No public apology occurs; the speaker constructs a private consolation, leaving the tensions unresolved in any external sense."}, {"text": "It brings together the chapter's themes of shadow (loss, betrayal, double grief) and forgiveness (excusing both offenders, embracing a comforting fiction) in a single, knowingly ironic couplet", "isCorrect": true, "rationale": "The shadow deepens to its darkest point (losing both beloved and mistress), and the forgiveness is both given (excusing the offenders in lines 7-10) and questioned (called “sweet flattery” in the couplet) — a complex, self-aware conclusion that holds shadow and attempted forgiveness in unresolved tension."}, {"text": "It ends the chapter on a fully optimistic note, confirming that love conquers all", "isCorrect": false, "rationale": "The couplet's self-aware “sweet flattery” prevents any fully optimistic reading; the speaker's comfort is consciously self-manufactured."}, {"text": "It abandons the theme of forgiveness and focuses solely on the justice the speaker deserves", "isCorrect": false, "rationale": "The speaker constructs elaborate excuses for both offenders and forgives them even while naming the consolation as flattery; forgiveness is central to the end of the chapter."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
