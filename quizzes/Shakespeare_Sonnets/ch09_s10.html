<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XCVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do different people interpret the beloved's faults in Sonnet XCVI?", "options": [{"text": "All agree the faults are unforgivable", "isCorrect": false, "rationale": "Opinion is divided; some see the same behaviors as faults, others as grace."}, {"text": "Some call them faults (youth, wantonness), while others call the same qualities grace (youthful charm, gentle sport)", "isCorrect": true, "rationale": "Lines 1-2 present two competing interpretations of the same behaviors: fault (wantonness) versus grace (gentle sport). The beloved's charm makes both readings available simultaneously."}, {"text": "Only the speaker sees any fault at all", "isCorrect": false, "rationale": "The poem describes multiple voices ('some say'), indicating widespread public observation."}, {"text": "The faults are so well hidden that no one notices them", "isCorrect": false, "rationale": "The faults are publicly visible and discussed; the remarkable thing is that the beloved's beauty transforms their perception."}], "id": "q01"}, {"question": "What is the effect described in lines 3-4 ('Both grace and faults are lov'd of more and less: / Thou mak'st faults graces that to thee resort')?", "options": [{"text": "The beloved's beauty causes faults to disappear entirely", "isCorrect": false, "rationale": "The faults do not disappear; they are transformed in perception, not eliminated."}, {"text": "The beloved's charm converts faults into graces in the eyes of observers of every rank", "isCorrect": true, "rationale": "'More and less' means high and low rank; people of every social standing love both the grace and the faults. And the beloved's personal magnetism actually transmutes faults into graces ('thou mak'st faults graces')."}, {"text": "Rank determines whether one sees fault or grace", "isCorrect": false, "rationale": "The observation is that both high ('more') and low ('less') observers see the same transformative effect."}, {"text": "The beloved's faults are loved only by his social inferiors", "isCorrect": false, "rationale": "Both high and low rank are included; the beloved's charm works across all social levels."}], "id": "q02"}, {"question": "What does the queen's ring analogy (lines 5-8) illustrate?", "options": [{"text": "That jewels are worth more than love", "isCorrect": false, "rationale": "The analogy is not about the value of jewels versus love."}, {"text": "That even a base jewel is well esteemed on a queen's finger, just as the beloved's errors are counted as truths", "isCorrect": true, "rationale": "A low-quality gemstone, worn by a queen, is esteemed above its actual worth because of the wearer's status. Similarly, the beloved's errors are 'to truths translated' — read as genuine virtues because of his personal radiance."}, {"text": "The beloved is as powerful as a queen", "isCorrect": false, "rationale": "The beloved is the jewel in the analogy, not the queen."}, {"text": "The speaker values the beloved like a priceless jewel", "isCorrect": false, "rationale": "The simile compares the beloved's errors to the base jewel — esteemed beyond their actual worth because of their setting (the beloved's person)."}], "id": "q03"}, {"question": "What is the wolf-in-lamb's-clothing image (lines 11-12) warning about?", "options": [{"text": "The danger of trusting wolves", "isCorrect": false, "rationale": "The warning is not about literal wolves but about the beloved's dangerous potential."}, {"text": "The beloved could lead many astray if he used his attractive appearance to deceive, just as a wolf appearing as a lamb would", "isCorrect": true, "rationale": "The wolf able to disguise its looks as a lamb could betray many lambs. Applied to the beloved: his power to make faults seem like graces could lead many people dangerously astray if fully deployed."}, {"text": "The speaker fears the beloved is secretly violent", "isCorrect": false, "rationale": "Physical violence is not the concern; the danger is of moral and emotional deception at scale."}, {"text": "Wolves and lambs represent rival classes in Elizabethan society", "isCorrect": false, "rationale": "The wolf and lamb are metaphors for deceptive appearance and innocent victim, not social classes."}], "id": "q04"}, {"question": "What does 'the strength of all thy state' mean in line 14?", "options": [{"text": "The beloved's physical strength", "isCorrect": false, "rationale": "Physical force is not meant; 'state' refers to the full power of the beloved's social and personal position."}, {"text": "The full power of the beloved's beauty, status, and influence", "isCorrect": true, "rationale": "'State' encompasses the beloved's entire personal power — beauty, social standing, charm. The speaker warns against the beloved deploying all of this to lead people astray."}, {"text": "The power of the state or government", "isCorrect": false, "rationale": "This is not political; 'state' means the beloved's personal condition of power and privilege."}, {"text": "The beloved's inherited wealth", "isCorrect": false, "rationale": "Wealth is one element of 'state' but the phrase encompasses the beloved's entire personal power."}], "id": "q05"}, {"question": "What is the special significance of the couplet 'But do not so; I love thee in such sort, / As, thou being mine, mine is thy good report'?", "options": [{"text": "The speaker renounces his love for the beloved", "isCorrect": false, "rationale": "The speaker emphatically does not renounce love; he explains the nature of the connection."}, {"text": "The speaker's reputation is bound up with the beloved's, so the beloved's good behavior benefits the speaker too", "isCorrect": true, "rationale": "The couplet reveals the speaker's self-interest alongside his affection: because the beloved belongs to the speaker ('thou being mine'), the beloved's good report is also the speaker's good report. The beloved's conduct reflects on the speaker."}, {"text": "The speaker has no further warnings to offer", "isCorrect": false, "rationale": "The couplet is not a withdrawal of warning but a revelation of why the speaker cares so deeply about the beloved's conduct."}, {"text": "The speaker admits that he has been too harsh in criticizing the beloved", "isCorrect": false, "rationale": "No retraction of criticism is offered; the couplet adds a dimension of personal investment to the concern."}], "id": "q06"}, {"question": "How does Sonnet XCVI differ in tone from Sonnet XCV?", "options": [{"text": "XCV is celebratory; XCVI is mournful", "isCorrect": false, "rationale": "Neither sonnet is primarily celebratory or mournful in the conventional sense."}, {"text": "XCV warns more urgently; XCVI is more observational and self-interested in its concern", "isCorrect": true, "rationale": "XCV carries an urgent direct warning ('Take heed, dear heart'); XCVI is more detached and analytical in describing how others respond to the beloved's faults, and the couplet reveals the speaker's own stake in the beloved's reputation."}, {"text": "XCVI is more openly critical of the beloved's faults", "isCorrect": false, "rationale": "XCVI is actually less directly critical; it more describes the public perception of the faults than condemning them."}, {"text": "Both sonnets are identical in tone", "isCorrect": false, "rationale": "There is a meaningful shift in emotional register and rhetorical stance between the two."}], "id": "q07"}, {"question": "The phrase 'to truths translated, and for true things deem'd' means:", "options": [{"text": "The beloved's errors have been translated from English into other languages", "isCorrect": false, "rationale": "'Translated' here means transformed or converted, not linguistically translated."}, {"text": "The beloved's errors are transformed into virtues in the eyes of observers, accepted as genuine good", "isCorrect": true, "rationale": "'Translated' means changed into or converted; errors 'translated to truths' means falsehoods taken for genuine virtues. 'For true things deem'd' confirms they are counted as real.'"}, {"text": "The beloved has been falsely accused and his virtues mistaken for faults", "isCorrect": false, "rationale": "The direction of transformation is faults-into-virtues, not virtues-into-faults."}, {"text": "The speaker has translated the beloved's story into poetry", "isCorrect": false, "rationale": "This self-referential reading is not supported by the context of the line."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
