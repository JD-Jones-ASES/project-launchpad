<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What two competing explanations does the speaker consider for why he sees everything as beautiful?", "options": [{"text": "Either the beloved is genuinely perfect, or the speaker is going blind", "isCorrect": false, "rationale": "Blindness is not one of the alternatives; flattery vs. love-taught alchemy are."}, {"text": "Either his mind is infected with the monarch's plague of flattery, or his love taught his eye a transforming alchemy", "isCorrect": true, "rationale": "'Doth my mind... drink up the monarch's plague, this flattery? / Or... shall I say, mine eye saith true, / And that your love taught it this alchemy?'"}, {"text": "Either absence makes the heart fonder, or familiarity makes it cold", "isCorrect": false, "rationale": "These are proverbial alternatives but not the ones the sonnet poses."}, {"text": "Either the beloved is an angel, or the speaker has gone mad with love", "isCorrect": false, "rationale": "Madness is not one of the two options posed; flattery vs. alchemy are."}], "id": "q01"}, {"question": "What is 'the monarch's plague' that the speaker fears his mind is drinking?", "options": [{"text": "The ambition and cruelty typical of powerful rulers", "isCorrect": false, "rationale": "The monarch's plague is specifically flattery — the self-deception of those in power who are told only what they want to hear."}, {"text": "Flattery — the self-deceiving illusion of seeing everything favorably", "isCorrect": true, "rationale": "The 'monarch's plague' is the flattery that surrounds kings, distorting their perception of reality. The speaker fears his mind is similarly deluded."}, {"text": "A physical illness that spreads through royal courts", "isCorrect": false, "rationale": "The plague is metaphorical, not literal disease."}, {"text": "Pride and excessive self-love", "isCorrect": false, "rationale": "Pride is related but the specific plague named is flattery — seeing everything in a falsely favorable light."}], "id": "q02"}, {"question": "What does 'alchemy' represent in the context of the poem?", "options": [{"text": "The beloved's skill in writing verse", "isCorrect": false, "rationale": "The alchemy refers to a transformative perceptual power, not a writing skill."}, {"text": "The transformative power of love that turns base things into beautiful ones", "isCorrect": true, "rationale": "Love taught the eye 'this alchemy, / To make of monsters and things indigest / Such cherubins as your sweet self resemble' — transforming ugliness into angelic beauty."}, {"text": "The medieval science of turning lead into gold", "isCorrect": false, "rationale": "While the alchemical metaphor draws on this tradition, the poem uses it as a figure for love's transformative perception, not literal alchemy."}, {"text": "The power of poetry to immortalize the beloved", "isCorrect": false, "rationale": "The immortalizing power of verse appears in other sonnets; here alchemy refers to perceptual transformation."}], "id": "q03"}, {"question": "What does 'things indigest' refer to?", "options": [{"text": "Food that has not been properly eaten", "isCorrect": false, "rationale": "'Indigest' here means unformed or shapeless, not related to digestion of food."}, {"text": "Unformed, shapeless, or monstrous things", "isCorrect": true, "rationale": "In early modern English, 'indigest' means not yet formed or organized — amorphous, monstrous material that love's alchemy reshapes as cherubic beauty."}, {"text": "Ideas the speaker has not fully thought through", "isCorrect": false, "rationale": "The word refers to external objects, not the speaker's mental processes."}, {"text": "Verses that lack proper meter", "isCorrect": false, "rationale": "No poetic application is intended; the word describes external shapeless things."}], "id": "q04"}, {"question": "How does the speaker resolve the flattery vs. alchemy debate?", "options": [{"text": "He decides the alchemy explanation is true", "isCorrect": false, "rationale": "He resolves it in favor of flattery — 'O! 'tis the first, 'tis flattery in my seeing.'"}, {"text": "He decides flattery is the answer — his mind is drinking the king's disease", "isCorrect": true, "rationale": "'O! 'tis the first, 'tis flattery in my seeing, / And my great mind most kingly drinks it up.'"}, {"text": "He leaves the question unresolved for the reader to decide", "isCorrect": false, "rationale": "The speaker explicitly chooses flattery, with some ironic pride."}, {"text": "He decides both explanations are equally valid", "isCorrect": false, "rationale": "He names a winner: flattery is the answer."}], "id": "q05"}, {"question": "What is ironic about 'my great mind most kingly drinks it up'?", "options": [{"text": "The speaker actually has a very small and humble mind", "isCorrect": false, "rationale": "The irony is about the content being drunk, not about the size of the mind."}, {"text": "He uses royal language ('great,' 'kingly') to celebrate a form of self-delusion", "isCorrect": true, "rationale": "Calling his mind 'great' and its drinking 'kingly' while simultaneously confessing he is swallowing flattery produces a self-aware, almost comic irony."}, {"text": "Kings are wiser than ordinary people and so the comparison elevates the speaker", "isCorrect": false, "rationale": "The king is the victim of flattery, not a model of wisdom; the comparison is ironic, not complimentary."}, {"text": "The mind ought to reject flattery but instead welcomes it like a king welcomes a feast", "isCorrect": false, "rationale": "This explains the irony but misses the self-mocking humor of 'great' and 'kingly' applied to self-delusion."}], "id": "q06"}, {"question": "What does the couplet argue about the supposed 'poison' of this perceptual flattery?", "options": [{"text": "That the poison is deadly and the speaker must seek a cure", "isCorrect": false, "rationale": "The couplet accepts the poison with something close to pleasure."}, {"text": "That even if it is poison, the eye's delight in first drinking it is a minor sin at worst", "isCorrect": true, "rationale": "'If it be poison'd, 'tis the lesser sin / That mine eye loves it and doth first begin.'"}, {"text": "That the beloved is the antidote to the poison", "isCorrect": false, "rationale": "The beloved is the source of the delusion; there is no separate antidote offered."}, {"text": "That poison is actually nourishment if taken in small doses", "isCorrect": false, "rationale": "No medical argument about dosage is made; the sin is called lesser, not the poison therapeutic."}], "id": "q07"}, {"question": "How does Sonnet CXIV relate to Sonnet CXIII?", "options": [{"text": "CXIV reverses CXIII by saying the eye is now accurate", "isCorrect": false, "rationale": "CXIV continues exploring the eye's distorted perception, not correcting it."}, {"text": "CXIV asks why the distorted perception described in CXIII occurs, and offers two competing explanations", "isCorrect": true, "rationale": "CXIII describes the phenomenon; CXIV interrogates its cause — is it the king's plague (flattery) or love-taught alchemy?"}, {"text": "CXIV abandons the eye theme and returns to the Muse", "isCorrect": false, "rationale": "The eye remains central in CXIV; the Muse is not returned to here."}, {"text": "CXIV resolves the problem by declaring the eye is simply in love and untrustworthy", "isCorrect": false, "rationale": "While the eye's distortion is confirmed, the poem is more specific — naming flattery as the cause and calling it a 'lesser sin.'"}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
