<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the overall emotional tone of Sonnet LXXXVII?", "options": [{"text": "Joyful celebration of love returned", "isCorrect": false, "rationale": "The sonnet is not joyful; it expresses melancholy resignation at the loss of the beloved."}, {"text": "Bitter anger at betrayal", "isCorrect": false, "rationale": "The speaker is not angry but rather sadly accepting of the separation."}, {"text": "Melancholy self-deprecating farewell", "isCorrect": true, "rationale": "The speaker bids farewell while insisting the beloved is too valuable for him to deserve, a posture of sad self-deprecation."}, {"text": "Hopeful anticipation of reunion", "isCorrect": false, "rationale": "There is no hope of reunion expressed; the speaker accepts the end."}], "id": "q01"}, {"question": "What does the word 'charter' mean in line 5 ('The charter of thy worth gives thee releasing')?", "options": [{"text": "A legal document granting rights or privileges", "isCorrect": true, "rationale": "Shakespeare uses 'charter' in the legal sense: the beloved's intrinsic worth is the document that legally frees him from the bond with the speaker."}, {"text": "A map or chart", "isCorrect": false, "rationale": "This is an archaic or nautical meaning not relevant to this legal-financial context."}, {"text": "A promise of fidelity", "isCorrect": false, "rationale": "A promise of fidelity would be a vow, not a charter; here it refers to a legal right."}, {"text": "A letter of farewell", "isCorrect": false, "rationale": "A charter is not a farewell letter but a legal instrument of entitlement."}], "id": "q02"}, {"question": "What does the phrase 'My bonds in thee are all determinate' mean?", "options": [{"text": "The speaker is determined to maintain his bonds with the beloved", "isCorrect": false, "rationale": "This misreads 'determinate,' which here means expired or ended, not determined."}, {"text": "All of the speaker's claims on the beloved have expired", "isCorrect": true, "rationale": "'Determinate' in Elizabethan legal language means concluded or expired; the speaker's bonds — his claims — are finished."}, {"text": "The speaker's love is stronger than any bond", "isCorrect": false, "rationale": "The opposite is true; the speaker acknowledges his bonds are ended."}, {"text": "The beloved has made a final determination about love", "isCorrect": false, "rationale": "The subject of the sentence is 'my bonds,' not the beloved's decision."}], "id": "q03"}, {"question": "How did the speaker originally come to 'hold' the beloved, according to lines 7-8?", "options": [{"text": "Through his own merits and virtues", "isCorrect": false, "rationale": "The speaker explicitly says the cause of the gift — his own deserving — is 'wanting,' i.e., lacking."}, {"text": "Only by the beloved's own granting", "isCorrect": true, "rationale": "Line 7 asks 'how do I hold thee but by thy granting?' — the beloved's choice alone was the basis of the relationship."}, {"text": "Through long years of devoted service", "isCorrect": false, "rationale": "No mention of service is made; the speaker denies he had any claim based on merit."}, {"text": "Through a mutual oath of love", "isCorrect": false, "rationale": "Mutual oath is not the basis described; the speaker emphasizes the one-sided gift."}], "id": "q04"}, {"question": "What does 'misprision' mean in line 13 ('thy great gift, upon misprision growing')?", "options": [{"text": "Imprisonment", "isCorrect": false, "rationale": "While 'misprision' has a legal meaning related to failure of duty, it here means a mistake or error in judgment."}, {"text": "Mistaken judgment or error", "isCorrect": true, "rationale": "'Misprision' here means a mistake or misapprehension; the beloved gave himself through a misvaluing of the speaker."}, {"text": "Generosity", "isCorrect": false, "rationale": "The word does not mean generosity; it specifically suggests an error that underlies the gift."}, {"text": "Pride", "isCorrect": false, "rationale": "Pride is not the meaning; the word points to a mistake on which the gift was founded."}], "id": "q05"}, {"question": "What two possible mistakes does the speaker attribute to the beloved in lines 11-12?", "options": [{"text": "Loving unwisely and loving too quickly", "isCorrect": false, "rationale": "These are not the specific mistakes named in the couplet of the second quatrain."}, {"text": "Not knowing his own worth at the time, or mistaking who the speaker was", "isCorrect": true, "rationale": "Lines 11-12 offer two explanations: the beloved either did not know his own value, or he misjudged the speaker as recipient."}, {"text": "Being too young and being too proud", "isCorrect": false, "rationale": "Youth and pride are not the mistakes identified in these lines."}, {"text": "Acting out of pity and acting out of duty", "isCorrect": false, "rationale": "Pity and duty are not the options presented; the speaker focuses on misvaluation and misidentification."}], "id": "q06"}, {"question": "What does the couplet's dream image ('In sleep a king, but waking no such matter') suggest?", "options": [{"text": "The speaker literally dreams about being royalty", "isCorrect": false, "rationale": "The royalty is metaphorical, not literal; it represents what having the beloved's love felt like."}, {"text": "The relationship felt like a dream of greatness that vanishes on waking", "isCorrect": true, "rationale": "The dream of being a king while asleep, contrasted with the waking reality, captures how the beloved's love elevated the speaker briefly before disappearing."}, {"text": "The speaker is warning the beloved about vanity", "isCorrect": false, "rationale": "The warning interpretation misreads the tone; the couplet expresses the speaker's own sense of loss."}, {"text": "The speaker values sleep over waking life", "isCorrect": false, "rationale": "Sleep is a metaphor for the illusory relationship, not a literal preference."}], "id": "q07"}, {"question": "The legal and financial vocabulary in this sonnet (charter, patent, bonds, deserving, riches) primarily serves to:", "options": [{"text": "Show the speaker is a lawyer", "isCorrect": false, "rationale": "Legal diction is a rhetorical device, not autobiography."}, {"text": "Frame the relationship as a transaction in which the speaker has no rightful claim", "isCorrect": true, "rationale": "The extended legal metaphor insists the beloved is free by right because the speaker has no valid legal or moral claim to him."}, {"text": "Criticize the beloved for treating love like a business deal", "isCorrect": false, "rationale": "It is the speaker, not the beloved, who adopts this commercial framing as a mode of self-deprecation."}, {"text": "Celebrate the economic prosperity of the era", "isCorrect": false, "rationale": "The legal metaphor is entirely personal and emotional, not a social commentary."}], "id": "q08"}, {"question": "The word 'patent' in line 10 ('my patent back again is swerving') refers to:", "options": [{"text": "A letter of ownership or exclusive right", "isCorrect": true, "rationale": "A patent in Elizabethan legal usage is a grant of exclusive privilege; the speaker's patent — his grant to the beloved — is reverting."}, {"text": "An obvious or evident fact", "isCorrect": false, "rationale": "This is the modern adjectival meaning of 'patent,' not the noun used here."}, {"text": "A kind of fabric", "isCorrect": false, "rationale": "Fabric is not the meaning; the word is used in its legal sense of a royal or formal grant."}, {"text": "A type of poem", "isCorrect": false, "rationale": "Patent has no poetic meaning; it is drawn from legal and commercial vocabulary."}], "id": "q09"}, {"question": "What theme does Sonnet LXXXVII most clearly introduce for Chapter 9?", "options": [{"text": "The speaker's longing for immortality through verse", "isCorrect": false, "rationale": "Immortality through verse is a theme of earlier sonnets; here the focus is on separation and unworthiness."}, {"text": "Estrangement driven by the speaker's sense of his own unworthiness", "isCorrect": true, "rationale": "The sonnet opens the Estrangement and Return chapter by framing the separation as a consequence of the speaker's own inadequacy rather than the beloved's fault."}, {"text": "The beloved's cruelty and indifference", "isCorrect": false, "rationale": "The beloved is not portrayed as cruel; the speaker internalizes blame entirely."}, {"text": "The competition with a rival poet", "isCorrect": false, "rationale": "The rival poet theme belongs to earlier sonnets and is not present here."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
