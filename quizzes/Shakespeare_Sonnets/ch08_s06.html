    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker claim he never saw that the youth needed?", "options": [{"text": "Encouragement to seek other poets' company", "isCorrect": false, "rationale": "The speaker opens with a claim about the youth's appearance and what it required, not about social encouragement."}, {"text": "Painting — meaning elaborate poetic flattery or cosmetic embellishment", "isCorrect": true, "rationale": "Line 1 states: 'I never saw that you did painting need,' using 'painting' as a metaphor for the kind of ornate, flattering verse the rivals supply and the speaker chose not to provide."}, {"text": "A patron to support his literary career", "isCorrect": false, "rationale": "Patronage is not the subject; the speaker discusses what kind of poetic representation the youth required."}, {"text": "More variety in the subjects of the speaker's verse", "isCorrect": false, "rationale": "No concern about variety of subject is raised; the issue is whether the youth needed flattering embellishment at all."}]}, {"question": "Why did the speaker set no painting to the youth's fair?", "options": [{"text": "Because the speaker lacked the skill to write elaborate verse", "isCorrect": false, "rationale": "The speaker's reason is not lack of skill but rather his belief that the youth's own excellence already exceeded what verse could offer."}, {"text": "Because the youth so exceeded the barren offering of a poet's debt that no verse was needed", "isCorrect": true, "rationale": "Lines 3-4 state: 'I found, or thought I found, you did exceed / That barren tender of a poet's debt,' meaning the youth was so genuinely excellent that the conventional tribute of verse seemed an insufficient and even diminishing gesture."}, {"text": "Because the speaker was too busy writing verse for other patrons", "isCorrect": false, "rationale": "No competing obligations are mentioned; the reason is entirely about the youth's surpassing worth."}, {"text": "Because the rivals had already said everything that could be said", "isCorrect": false, "rationale": "The rivals had begun to write, but the speaker's silence predates or is independent of their activity; his reason is his own judgment about the youth's worth."}]}, {"question": "What does the phrase 'barren tender of a poet's debt' (line 4) suggest?", "options": [{"text": "That poets are obligated by patronage relationships to produce verse but that such obligatory verse is empty of real value", "isCorrect": true, "rationale": "'Tender' means an offer or payment, and 'barren' means fruitless or empty. A poet's debt is the verse owed to a patron; to call it barren implies the speaker views conventional praise as a hollow transaction that adds nothing to one truly beautiful."}, {"text": "That the speaker is too poor to afford the paper on which to write verse", "isCorrect": false, "rationale": "The phrase is metaphorical, not a reference to financial poverty; 'barren tender' describes the emptiness of obligatory praise."}, {"text": "That the speaker owes the youth a financial debt he cannot repay in verse", "isCorrect": false, "rationale": "No literal financial debt is implied; 'debt' here is the figurative obligation poets feel to write about their subjects."}, {"text": "That the youth refuses to accept any form of tribute from the speaker", "isCorrect": false, "rationale": "The refusal comes from the speaker's own judgment, not from the youth's rejection; the speaker chose silence."}]}, {"question": "What does 'slept in your report' (line 5) mean?", "options": [{"text": "The speaker fell asleep while reading the rival's verse about the youth", "isCorrect": false, "rationale": "This is a literal misreading; 'slept' here means to have been inactive or neglectful regarding the task of reporting on the youth."}, {"text": "The speaker was silent and inactive in writing about the youth", "isCorrect": true, "rationale": "'Slept in your report' means the speaker was dormant or negligent in his duty to write about the youth, which he now presents not as failure but as a reasoned choice."}, {"text": "The speaker composed verse only in dreams, not in waking life", "isCorrect": false, "rationale": "While imaginative, this misreads the metaphor; 'slept' means inactive or silent, not literally dreaming."}, {"text": "The speaker kept his verse about the youth secret and unpublished", "isCorrect": false, "rationale": "The secrecy argument does not appear here; the silence was in the act of writing itself, not in withholding finished work."}]}, {"question": "What was the speaker's stated purpose in remaining silent about the youth's qualities?", "options": [{"text": "To allow the youth's own presence to demonstrate how far a modern pen falls short", "isCorrect": true, "rationale": "Lines 6-10 argue that the speaker's silence allowed the youth himself, being still alive and present, to show how short any modern verse falls when speaking of such worth."}, {"text": "To punish the rivals by refusing to compete with them", "isCorrect": false, "rationale": "The silence is framed as a respectful recognition of the youth's value, not as a competitive strategy against rivals."}, {"text": "To preserve the youth's privacy by not publicizing his virtues", "isCorrect": false, "rationale": "Privacy protection is not the argument; the speaker's silence was meant to honor the youth's worth by letting it speak for itself."}, {"text": "To accumulate material for a longer, more ambitious poem later", "isCorrect": false, "rationale": "No deferred ambition is suggested; the silence is presented as its own adequate tribute to the youth's self-evident worth."}]}, {"question": "How does the speaker reframe his silence as a glory rather than a sin?", "options": [{"text": "He argues that his silence has lasted longer than any rival's praise, proving deeper devotion", "isCorrect": false, "rationale": "Duration is not the argument; the speaker turns the accusation of sin into a claim that silence is more respectful than the false life rivals give the youth."}, {"text": "He argues that silence does not impair the youth's beauty, while others' verse brings a tomb rather than life", "isCorrect": true, "rationale": "Lines 11-14 argue: 'I impair not beauty being mute, / When others would give life, and bring a tomb.' The rivals claim to give life but actually diminish the youth with inadequate praise; the speaker's silence does no harm."}, {"text": "He argues that his silence has made the youth more mysterious and therefore more admired", "isCorrect": false, "rationale": "No mystery argument appears; the logic is about harm versus no harm — silence is neutral while false praise is actively damaging."}, {"text": "He argues that his silence gave the youth room to speak for himself in the speaker's presence", "isCorrect": false, "rationale": "While the youth's self-evident presence is invoked, the specific reframing is about silence not impairing beauty, contrasted with rivals bringing a tomb."}]}, {"question": "What does the couplet ultimately claim about the rivals' poetic powers?", "options": [{"text": "Both rivals together still cannot devise praise equal to what lives in one of the youth's fair eyes", "isCorrect": true, "rationale": "The couplet reads: 'There lives more life in one of your fair eyes / Than both your poets can in praise devise,' delivering a devastating verdict: all their combined poetic ingenuity cannot match the living reality visible in a single glance from the youth."}, {"text": "The rivals have produced the best verse ever written about any subject", "isCorrect": false, "rationale": "The couplet argues the exact opposite — that even their collective praise falls short of the youth's actual presence."}, {"text": "Both rivals will eventually abandon the youth when they find a more suitable subject", "isCorrect": false, "rationale": "No prediction about the rivals' future abandonment is made; the couplet focuses on the inadequacy of their current praise."}, {"text": "The rivals have praised the youth so well that the speaker no longer needs to write about him", "isCorrect": false, "rationale": "The sonnet's argument is that the rivals have failed, not succeeded; the couplet declares their verse insufficient."}]}, {"question": "What is the effect of the phrase 'both your poets' in the couplet?", "options": [{"text": "It implies the youth is shared property belonging equally to both poets", "isCorrect": false, "rationale": "The phrase uses 'your' to address the youth — these are the poets who write about him — not to suggest shared ownership."}, {"text": "It wryly lumps the speaker himself in with the rival, suggesting even the best combined effort cannot match the youth", "isCorrect": true, "rationale": "By saying 'both your poets,' the speaker includes himself alongside the rival as insufficient, which is both self-deprecating and a powerful compliment: even the sum of all devoted poets cannot capture what is in the youth's single eye."}, {"text": "It flatters both the speaker and the rival by calling them the youth's official poets", "isCorrect": false, "rationale": "The phrase is self-deprecating rather than flattering; the 'both' serves to emphasize the inadequacy of all poetry before the youth's living reality."}, {"text": "It accuses the youth of playing the two poets against each other for amusement", "isCorrect": false, "rationale": "No accusation of manipulation is made; the couplet focuses on the inadequacy of verse, not on the youth's motives."}]}, {"question": "The phrase 'modern quill' (line 9) most likely refers to:", "options": [{"text": "The latest writing technology available in the Renaissance", "isCorrect": false, "rationale": "While a quill is a writing instrument, 'modern quill' is not about technology but about contemporary poetic practice as a category."}, {"text": "Any contemporary poet's verse, which falls short of expressing true worth", "isCorrect": true, "rationale": "'Modern quill' represents current poetic practice generally — the verse any contemporary writer produces. The speaker argues that the youth's own present existence exposes how far any such contemporary verse falls short."}, {"text": "The speaker's own pen, which he considers outdated compared to the rival's", "isCorrect": false, "rationale": "No suggestion is made that the speaker's pen is inferior; 'modern quill' is a general reference to contemporary verse as a category."}, {"text": "A metaphor for the rival's pride and vanity", "isCorrect": false, "rationale": "No vanity association attaches to 'modern quill'; it simply designates current verse as the generic product of the present age."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
