    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does “O! that you were your self” mean in the opening line?", "options": [{"text": "Shakespeare wishes the youth would be more authentic and stop pretending to be someone he is not.", "isCorrect": false, "rationale": "Inauthenticity is not the charge; the lament is about the youth’s temporary tenure in his own self."}, {"text": "Shakespeare laments that the youth is only “himself” for the duration of his own lifetime — he holds his identity on a temporary lease, not in permanent ownership.", "isCorrect": true, "rationale": "The youth is himself only as long as he lives; no one owns themselves permanently. The argument is that having a child would extend the youth’s “self” beyond death."}, {"text": "Shakespeare is urging the youth to stop acting a role and behave naturally.", "isCorrect": false, "rationale": "Acting or performance is not the subject; the metaphysical question is about the duration of selfhood."}, {"text": "Shakespeare is complaining that the youth has changed his personality recently.", "isCorrect": false, "rationale": "No personality change is described; the line is about the temporary nature of the youth’s hold on his own identity."}], "id": "q01"}, {"question": "What does “No longer yours, than you yourself here live” mean?", "options": [{"text": "The youth’s beauty can only be appreciated for as long as he is alive to display it.", "isCorrect": false, "rationale": "While this is partially true, the specific point is that the youth does not own himself; he only holds himself for the duration of life."}, {"text": "The youth holds himself only for the length of his own life — he is not his own permanent possession.", "isCorrect": true, "rationale": "This develops the lease metaphor: the youth leases himself from existence, and the lease expires at death. Having a child who inherits his self would extend the lease beyond death."}, {"text": "The youth’s possessions will only remain his for as long as he is alive to guard them.", "isCorrect": false, "rationale": "Material possessions are not the focus; the “possession” in question is the youth’s own self and beauty."}, {"text": "The youth should be grateful for each day he lives, as life is short.", "isCorrect": false, "rationale": "A carpe diem sentiment is not the argument; the point is about the duty to extend oneself through a child."}], "id": "q02"}, {"question": "What does the legal metaphor of a “lease” contribute to the argument?", "options": [{"text": "It suggests the youth should draw up a legal will before he dies.", "isCorrect": false, "rationale": "A legal will is not the solution; the lease metaphor describes the temporary nature of the youth’s hold on his own beauty."}, {"text": "It frames the youth’s beauty as a temporary tenancy — like a lease that can be extended through a child who inherits the “property” of the parent’s beauty.", "isCorrect": true, "rationale": "By calling beauty a “lease,” Shakespeare gives it legal and economic weight: a lease has a term; the term is life; but a child extends the tenancy beyond the original leaseholder’s death."}, {"text": "It argues that beauty belongs to Nature, not the individual, just as a landlord owns the property a tenant leases.", "isCorrect": false, "rationale": "While this reading is consistent with the financial arguments of Sonnet IV, the lease metaphor here focuses on duration and extension through a child, not on Nature’s ownership."}, {"text": "It suggests that the youth’s beauty is rented from the poet and must eventually be returned.", "isCorrect": false, "rationale": "The poet is not the landlord; the youth’s self is the “property” held on lease from life itself."}], "id": "q03"}, {"question": "What does “who lets so fair a house fall to decay” ask?", "options": [{"text": "Who would allow a beautiful building to fall into ruin when it could be maintained?", "isCorrect": false, "rationale": "While the literal meaning is about a building, the metaphorical meaning is the argument: the “fair house” is the youth’s lineage or family, which must be maintained by an heir."}, {"text": "Who would let such a beautiful family line (house) collapse for lack of an heir to maintain it?", "isCorrect": true, "rationale": "The “fair house” is both a literal and metaphorical construction: the beautiful house of the youth’s lineage, which husbandry (good management, i.e., having children) could maintain against the “stormy gusts of winter’s day.”"}, {"text": "The question refers to a specific house the youth owns and is neglecting.", "isCorrect": false, "rationale": "No literal property is intended; the house is a metaphor for lineage and family."}, {"text": "It asks whether the youth has considered the economic cost of allowing a property to deteriorate.", "isCorrect": false, "rationale": "Economic property management is not the literal subject; the house is the metaphor, and the cost is the extinction of the family line."}], "id": "q04"}, {"question": "What does “husbandry in honour might uphold” mean?", "options": [{"text": "An honorable husband (one who takes his marital duties seriously) would maintain the family house by producing children.", "isCorrect": true, "rationale": "“Husbandry” is both the care of a household/estate and the responsibilities of a husband; “in honour” means with honourable intention. The double meaning suggests that faithful husbandly care — having children — is what upholds the fair house."}, {"text": "A wealthy patron could restore the house by paying for repairs.", "isCorrect": false, "rationale": "No patron is involved; “husbandry” is both domestic management and the responsibilities of a husband."}, {"text": "The house can only be upheld by someone named “Husbandry,” a personified figure of domestic virtue.", "isCorrect": false, "rationale": "Husbandry is not a personified character here; it is an abstract noun meaning both estate-management and husbandly duty."}, {"text": "The youth should learn the trade of farming to support his household.", "isCorrect": false, "rationale": "“Husbandry” in its agricultural sense (farming) is secondary here; the primary meaning concerns domestic and marital responsibility."}], "id": "q05"}, {"question": "What does “barren rage of death’s eternal cold” describe?", "options": [{"text": "The violence and futility of death, which produces nothing and leaves only cold emptiness.", "isCorrect": true, "rationale": "“Barren rage” — death’s fury is sterile and produces nothing; “eternal cold” is the cold of the grave. Together they describe death as a raging but ultimately empty force that the house of the youth’s lineage must be fortified against."}, {"text": "A cold winter storm that literally damages the youth’s house.", "isCorrect": false, "rationale": "The storm is metaphorical; “death’s eternal cold” is not weather but mortality."}, {"text": "The cruelty of the youth’s enemies who wish him harm.", "isCorrect": false, "rationale": "No human enemies are described; the “rage” is death’s own force."}, {"text": "The depression and emptiness the youth feels in his solitary life.", "isCorrect": false, "rationale": "The youth’s emotional state is not described here; the eternal cold is death’s condition, not the youth’s mood."}], "id": "q06"}, {"question": "What does the couplet “Dear my love, you know, / You had a father: let your son say so” contribute that is new in the sequence?", "options": [{"text": "It introduces the most tender and direct personal address of the sequence — “Dear my love” — and replaces abstract argument with a simple human example.", "isCorrect": true, "rationale": "“Dear my love” is the most affectionate address in the procreation sonnets; and the argument is stripped to its essence: you had a father, therefore you exist. Give your child the same gift. Logic and emotion fuse in one simple statement."}, {"text": "It introduces legal language, telling the youth to draft a document acknowledging his father.", "isCorrect": false, "rationale": "No legal document is suggested; the couplet is an emotional and logical appeal, not a legal instruction."}, {"text": "It reveals that the youth’s father has recently died, making the urgency of the argument greater.", "isCorrect": false, "rationale": "No biographical information about the youth’s father is given; the father is invoked as a logical example, not a recent loss."}, {"text": "It suggests that the youth should honor his father’s memory by imitating his father’s virtues.", "isCorrect": false, "rationale": "Imitating virtues is not the argument; the simple logical point is: your father had you (a son); therefore you should have a son."}], "id": "q07"}, {"question": "What is the logic of “You had a father: let your son say so”?", "options": [{"text": "A syllogism: your father's son exists (you); therefore, you too should produce a son who can say the same.", "isCorrect": true, "rationale": "The logic is: (1) You exist because your father reproduced. (2) If your father had chosen not to reproduce, you would not exist. (3) Therefore, your choice not to reproduce denies future generations what your father gave you."}, {"text": "The youth’s son should publicly acknowledge his grandfather’s legacy.", "isCorrect": false, "rationale": "Public acknowledgment of ancestry is not the argument; the couplet is about the simple act of existing as someone’s child."}, {"text": "The youth should name his first son after his own father to honor the family name.", "isCorrect": false, "rationale": "No naming convention is suggested; the argument is purely about reproduction, not naming."}, {"text": "Fatherhood is the highest honor a man can achieve.", "isCorrect": false, "rationale": "While the argument implies this, the couplet’s logic is a simple reciprocal claim: you received life from a father; give the same gift forward."}], "id": "q08"}, {"question": "How does the shift from “thou/thy” in earlier sonnets to “you/your” in Sonnet XIII affect the tone?", "options": [{"text": "The switch to “you” is a grammatical error with no significance.", "isCorrect": false, "rationale": "In Elizabethan English the choice between thou and you was deliberate and meaningful; the shift is not an error."}, {"text": "In Elizabethan English, “you” was the more formal and respectful form, suggesting Shakespeare adopts a gentler, more respectful register in this sonnet.", "isCorrect": true, "rationale": "While “thou” was intimate or could be condescending, “you” was the respectful form; the use of “Dear my love” together with “you/your” creates a warmer, more respectful tone than the accusatory “thou” of earlier sonnets."}, {"text": "“You” indicates Shakespeare is now addressing the general reader, not the youth specifically.", "isCorrect": false, "rationale": "The poem is clearly still addressed to the youth; the shift in pronoun is tonal, not a change of addressee."}, {"text": "“You” is a sign that Shakespeare is angry and using the formal form to create distance.", "isCorrect": false, "rationale": "The couplet’s “Dear my love” suggests warmth, not angry distance; the formal “you” here signals respect rather than coldness."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
