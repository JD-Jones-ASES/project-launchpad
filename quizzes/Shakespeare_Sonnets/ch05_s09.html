    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XLI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does “pretty wrongs that liberty commits” (line 1) mean?", "options": [{"text": "The beloved has committed serious crimes that must be punished", "isCorrect": false, "rationale": "The speaker diminishes the offenses with the adjective “pretty” — meaning small or trivial; they are explicitly not treated as serious crimes at the outset."}, {"text": "The small, pardonable indiscretions that freedom (youth and beauty) leads one to commit", "isCorrect": true, "rationale": "“Pretty” means minor or charming; “liberty” means freedom or license. The phrase begins the sonnet in a mode of indulgent excuse — the beloved's straying is framed as the natural, almost attractive result of freedom rather than a serious moral failure."}, {"text": "A legal term for minor property crimes committed by noblemen", "isCorrect": false, "rationale": "No specific legal classification is invoked; “liberty” here means personal freedom, not a legal category."}, {"text": "Beautifully written poems the beloved composed about someone else", "isCorrect": false, "rationale": "No poems are referenced; “wrongs” are behavioral transgressions, not literary works."}], "id": "q01"}, {"question": "What two qualities of the beloved does the speaker cite as making temptation inevitable (lines 3-4)?", "options": [{"text": "Wealth and social status", "isCorrect": false, "rationale": "Wealth and rank are not cited as the reasons for temptation in this sonnet; physical and personal qualities are."}, {"text": "Beauty and youth — they attract temptation wherever the beloved goes", "isCorrect": true, "rationale": "“Thy beauty, and thy years full well befits, / For still temptation follows where thou art” — the beloved's physical attractiveness and young age naturally draw temptation; being beautiful and young is both explanation and partial excuse."}, {"text": "Wit and eloquence", "isCorrect": false, "rationale": "Wit appears in the list of the beloved's gifts in Sonnet XXXVII; in XLI the specific excuses are beauty and youth, not intellectual qualities."}, {"text": "Kindness and generosity", "isCorrect": false, "rationale": "While “Gentle thou art” opens line 7, gentleness here means susceptibility to being won, not kindness as a temptation; the causal qualities cited in lines 3-4 are beauty and years."}], "id": "q02"}, {"question": "What argument does the speaker make in lines 7-10 about why the beloved was unable to resist the woman?", "options": [{"text": "That the beloved was drunk and did not know what was happening", "isCorrect": false, "rationale": "Intoxication is not cited; the argument is about the natural social and personal dynamics between a beautiful person and a determined pursuer."}, {"text": "That a beautiful, gentle person will be won when pursued, and what man could refuse a woman who persistently woos him?", "isCorrect": true, "rationale": "“Gentle thou art, and therefore to be won, / Beauteous thou art, therefore to be assail'd; / And when a woman woos, what woman's son / Will sourly leave her till he have prevail'd?” — the beloved's gentleness makes them yielding; beauty makes them a target; male social conditioning makes refusal of a pursuing woman virtually impossible."}, {"text": "That the beloved never truly cared for the woman and was merely polite", "isCorrect": false, "rationale": "The speaker does not argue the beloved was simply polite; the argument is that yielding was socially and emotionally inevitable given the circumstances."}, {"text": "That the speaker himself would have done the same in the beloved's position", "isCorrect": false, "rationale": "The speaker does not include himself in this argument; the rhetoric is specifically about the beloved's particular combination of beauty and gentleness."}], "id": "q03"}, {"question": "What does “my seat forbear” (line 11) mean?", "options": [{"text": "To avoid sitting in the speaker's designated chair", "isCorrect": false, "rationale": "“Seat” is metaphorical here; no literal chair is meant."}, {"text": "To refrain from occupying the speaker's place — that is, to avoid the intimacy that belongs to the speaker", "isCorrect": true, "rationale": "“Seat” means place or station; “forbear” means to refrain. The speaker says the beloved could have refrained from taking the intimate position (with the mistress) that rightfully belongs to the speaker — a plea that the beloved should have exercised restraint despite the excuse of beauty and youth."}, {"text": "To stop attending the speaker's theatrical performances", "isCorrect": false, "rationale": "Theater attendance is not the topic; the seat is a metaphor for the speaker's intimate relational role."}, {"text": "To give up his legal claim to the speaker's property", "isCorrect": false, "rationale": "Property law is not the subject; the seat is a metaphor for the speaker's position in the woman's affections."}], "id": "q04"}, {"question": "What is a “twofold truth” (line 14)?", "options": [{"text": "Two different honest accounts of what happened", "isCorrect": false, "rationale": "The “twofold truth” is not about competing narratives but about dual pledges broken by the beloved's action."}, {"text": "The dual pledge of loyalty broken by the beloved: fidelity to the mistress (who was drawn to him) and fidelity to the speaker (whose friendship he has betrayed)", "isCorrect": true, "rationale": "The beloved has broken faith in two directions simultaneously: the woman was led on (“Hers by thy beauty tempting her to thee”) and the speaker was betrayed (“Thine by thy beauty being false to me”) — one action creates two broken truths."}, {"text": "Two moral principles: be honest with yourself and honest with others", "isCorrect": false, "rationale": "While this is consistent with the poem's moral logic, the specific “twofold truth” refers to the two betrayed parties, not general moral principles."}, {"text": "The truth that beauty leads to sin and the truth that youth eventually fades", "isCorrect": false, "rationale": "These thematic observations are woven into the poem but the twofold truth is the specific double pledge of loyalty the beloved breaks."}], "id": "q05"}, {"question": "How does the couplet assign responsibility for the betrayal?", "options": [{"text": "It places all blame on the woman for pursuing the beloved", "isCorrect": false, "rationale": "The couplet holds the beloved responsible in both directions, not the woman alone."}, {"text": "It holds the beloved's beauty responsible for both betrayals: it tempted her to him and caused him to be false to the speaker", "isCorrect": true, "rationale": "“Hers by thy beauty tempting her to thee, / Thine by thy beauty being false to me” — beauty is the active agent in both clauses; the beloved's beauty is both the lure for her and the instrument of the speaker's betrayal, making beauty itself a kind of shared culprit."}, {"text": "It blames the speaker for being absent and thus creating the opportunity", "isCorrect": false, "rationale": "While the speaker's absence is mentioned in line 2, the couplet does not use that as an excuse; it holds the beloved accountable."}, {"text": "It forgives both the beloved and the woman equally", "isCorrect": false, "rationale": "Forgiveness is not stated in the couplet; the couplet assigns responsibility through the repeated “thy beauty."}], "id": "q06"}, {"question": "The phrase “what woman's son / Will sourly leave her till he have prevail'd?” is best understood as:", "options": [{"text": "A celebration of male persistence as a virtue", "isCorrect": false, "rationale": "The speaker is not celebrating the behavior; he is using it as a rhetorical excuse for the beloved, while the sonnet as a whole holds the beloved accountable despite the excuse."}, {"text": "A rhetorical appeal to conventional male behavior to soften (while not absolving) the beloved's action", "isCorrect": true, "rationale": "The speaker uses a cultural stereotype — that no man can resist a persistent woman — as a quasi-excuse. But the sonnet's final couplet makes clear this excuse does not remove culpability; it only explains, not pardons."}, {"text": "A condemnation of the woman for her aggressive pursuit", "isCorrect": false, "rationale": "The woman is not condemned; the focus of the sonnet is on the beloved's double betrayal, not the woman's initiative."}, {"text": "A direct command to the woman to stop pursuing the beloved", "isCorrect": false, "rationale": "The woman is not directly addressed; the rhetorical question is the speaker's argument about typical male behavior, not an address to the woman."}], "id": "q07"}, {"question": "How does Sonnet XLI relate to Sonnet XL in the three-sonnet cluster?", "options": [{"text": "It contradicts XL by taking back the forgiveness offered there", "isCorrect": false, "rationale": "No explicit retraction of XL's forgiveness occurs in XLI; the speaker continues to balance excuse with accusation."}, {"text": "Where XL focuses on the speaker's moral reasoning and forgiveness, XLI focuses on explaining how the betrayal happened — the circumstances of temptation and the woman's role", "isCorrect": true, "rationale": "Sonnet XL analyzes the wrongness of the act and grants anguished forgiveness; XLI shifts to narrative explanation, detailing the beloved's beauty, the woman's pursuit, and the inevitability of yielding — providing context that both excuses and still incriminates."}, {"text": "XLI is entirely unrelated to XL and introduces a new subject", "isCorrect": false, "rationale": "XL, XLI, and XLII form a coherent cluster all addressing the same triangular betrayal; they are closely related."}, {"text": "XLI is written from the beloved's perspective, while XL is written from the speaker's", "isCorrect": false, "rationale": "Both sonnets are written in the speaker's voice addressing the beloved as “thou”; no shift of perspective occurs."}], "id": "q08"}, {"question": "The shift from “pretty wrongs” at the start to “break a twofold truth” at the end of the sonnet creates:", "options": [{"text": "A movement from celebration to complete forgiveness", "isCorrect": false, "rationale": "Neither celebration nor complete forgiveness ends the sonnet; it ends with assignment of responsibility, not absolution."}, {"text": "An escalation in moral seriousness: what began as minor indiscretions ends as a double breach of faith", "isCorrect": true, "rationale": "Opening with “pretty” (trivial) and “wrongs” implies small faults; closing with “break a twofold truth” reveals the full gravity — not pretty at all, but a double betrayal. The sonnet performs the dismantling of its own initial minimization."}, {"text": "A logical inconsistency that undermines the sonnet's argument", "isCorrect": false, "rationale": "The escalation is intentional and structurally meaningful; it is a rhetorical journey from excuse to accountability, not a logical error."}, {"text": "A volta that transforms the sonnet from accusation to praise", "isCorrect": false, "rationale": "The movement is from soft excuse to harder accountability, not from accusation to praise."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
