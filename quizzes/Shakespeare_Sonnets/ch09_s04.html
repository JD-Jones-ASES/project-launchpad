<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XC</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker request of the beloved at the opening of Sonnet XC?", "options": [{"text": "That the beloved never leave him", "isCorrect": false, "rationale": "The speaker does not ask this; he actually invites the beloved to abandon him — but to do it now, not later."}, {"text": "That if the beloved will hate him, let it happen now while other misfortunes also press", "isCorrect": true, "rationale": "Lines 1-4 ask: hate me now, while the world already crosses me, so that all suffering comes at once rather than arriving as a final blow after everything else."}, {"text": "That the beloved confess to being false", "isCorrect": false, "rationale": "No confession is requested; the speaker is managing the timing of his anticipated grief."}, {"text": "That the beloved join the speaker in mourning", "isCorrect": false, "rationale": "The request is about timing of abandonment, not shared mourning."}], "id": "q01"}, {"question": "What is the speaker's main concern about the timing of the beloved's potential abandonment?", "options": [{"text": "He fears the beloved will leave too soon, before they have had enough time together", "isCorrect": false, "rationale": "The concern is the opposite: leaving too late — after the speaker has already survived other griefs — would make the loss unbearable as a final blow."}, {"text": "He fears being abandoned last, after surviving all other sorrows, making the beloved's loss the crushing final blow", "isCorrect": true, "rationale": "The speaker dreads that all other griefs will pass and then the beloved will leave last, making that loss feel like an 'after-loss' — the worst because it comes at the end of prolonged suffering."}, {"text": "He fears the beloved will leave publicly and humiliate him", "isCorrect": false, "rationale": "Public humiliation is not the stated concern; the speaker focuses on the psychological sequence of losses."}, {"text": "He fears the beloved will leave in winter, the harshest season", "isCorrect": false, "rationale": "Though winter imagery appears in later sonnets, this sonnet's concern is with the order and timing of grief, not with weather."}], "id": "q02"}, {"question": "What does the image 'Give not a windy night a rainy morrow' suggest?", "options": [{"text": "The speaker is afraid of storms", "isCorrect": false, "rationale": "The weather is metaphorical; the speaker uses it to describe the accumulation of grief."}, {"text": "Do not add further sorrow (rain) on top of already existing grief (wind)", "isCorrect": true, "rationale": "The image suggests: if a stormy night is already bad, a rainy day that follows it prolongs and worsens suffering. Applied to the speaker's situation: do not add the beloved's loss on top of already existing sorrows."}, {"text": "The beloved should leave in good weather only", "isCorrect": false, "rationale": "The weather is entirely figurative; it is not a practical instruction about seasons."}, {"text": "A windy night represents love, and rain represents grief", "isCorrect": false, "rationale": "The metaphor is about accumulation of woes, not a symbolic mapping of wind to love."}], "id": "q03"}, {"question": "What does 'come in the rearward of a conquer'd woe' mean?", "options": [{"text": "Do not appear after a grief has already been overcome", "isCorrect": true, "rationale": "'Rearward' means the rear guard — the last part. A 'conquer'd woe' is a grief that has been endured and gotten past. The speaker does not want the beloved's departure to arrive after all other sorrows have been surmounted."}, {"text": "Conquer the speaker's grief from behind", "isCorrect": false, "rationale": "The speaker is not asking to be conquered; he is describing an unwanted sequence of events."}, {"text": "Follow the speaker into battle", "isCorrect": false, "rationale": "The military language is figurative; no literal battle is implied."}, {"text": "Come to comfort the speaker after his grief", "isCorrect": false, "rationale": "The beloved is not being asked to comfort; the speaker is asking the beloved not to leave last."}], "id": "q04"}, {"question": "In lines 13-16, the speaker argues that if the beloved abandons him first:", "options": [{"text": "All other griefs will seem worse by comparison", "isCorrect": false, "rationale": "The logic works in the opposite direction."}, {"text": "He will experience the worst immediately, making all other subsequent griefs seem minor by comparison", "isCorrect": true, "rationale": "Lines 13-16 reason: if the beloved strikes first, the speaker will taste the worst of fortune immediately, and all other sorrows will seem small compared to the loss of the beloved."}, {"text": "The beloved will regret leaving and return", "isCorrect": false, "rationale": "No such expectation of return is expressed; the couplet is about managing the intensity of grief."}, {"text": "The speaker will be grateful for the clarity", "isCorrect": false, "rationale": "Gratitude is not the emotion implied; the speaker is calculating the least painful way to endure the inevitable."}], "id": "q05"}, {"question": "How does Sonnet XC differ in mood from Sonnets LXXXVII-LXXXIX?", "options": [{"text": "XC is more joyful and accepting of separation", "isCorrect": false, "rationale": "XC is not joyful; it is urgently pleading with the beloved about timing."}, {"text": "XC adds a note of defiant courage — the speaker invites the worst rather than passively accepting it", "isCorrect": true, "rationale": "While the earlier sonnets are quietly self-abnegating, XC shows the speaker actively confronting the prospect of abandonment, almost daring fortune to do its worst."}, {"text": "XC abandons self-deprecation entirely and blames the beloved", "isCorrect": false, "rationale": "The speaker does not blame the beloved; he simply manages the timing of anticipated loss."}, {"text": "XC returns to the joyful celebration of love found in earlier chapters", "isCorrect": false, "rationale": "The chapter remains in a register of anxiety and separation; there is no return to celebration."}], "id": "q06"}, {"question": "The phrase 'linger out a purpos'd overthrow' means:", "options": [{"text": "To delay a planned defeat or destruction", "isCorrect": true, "rationale": "'Purpos'd overthrow' is a deliberate undoing; 'linger out' means to drag it out over time. The speaker does not want the beloved to prolong a destruction that has already been planned."}, {"text": "To celebrate a military victory", "isCorrect": false, "rationale": "The speaker is the subject of the overthrow, not a victor celebrating."}, {"text": "To linger in a place for too long", "isCorrect": false, "rationale": "This misreads the phrase; 'overthrow' is the key word, referring to a ruinous defeat of the speaker."}, {"text": "To forget a past wrong", "isCorrect": false, "rationale": "The speaker is not asking for forgiveness but asking not to have his suffering prolonged."}], "id": "q07"}, {"question": "What is the primary literary device used in lines 7 and 9 ('Give not a windy night a rainy morrow' and 'If thou wilt leave me, do not leave me last')?", "options": [{"text": "Pathetic fallacy and direct address", "isCorrect": true, "rationale": "The windy night and rainy morrow employ pathetic fallacy — nature as an emotional metaphor — while 'If thou wilt leave me' is direct address (apostrophe). Together they create an urgent, emotionally charged appeal."}, {"text": "Onomatopoeia and personification", "isCorrect": false, "rationale": "Onomatopoeia (words sounding like what they describe) is not the prominent device here; pathetic fallacy and direct address are more accurate."}, {"text": "Allusion and antithesis", "isCorrect": false, "rationale": "Allusion (reference to external text) is not operative here, though antithesis does appear elsewhere in the sonnet."}, {"text": "Hyperbole and simile", "isCorrect": false, "rationale": "Simile (explicit comparison with 'like' or 'as') is not the dominant device in these particular lines."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
