    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradox does the speaker state in the opening lines of Sonnet XXXVI?", "options": [{"text": "That love is both immortal and mortal at the same time", "isCorrect": false, "rationale": "Immortality and mortality of love is not the paradox here; the paradox is relational, not metaphysical."}, {"text": "That the two lovers must be separate individuals even though their love is undivided and one", "isCorrect": true, "rationale": "“We two must be twain / Although our undivided loves are one” — the lovers are spiritually and emotionally united yet must live apart as two separate persons; oneness of feeling coexists with necessary separateness."}, {"text": "That the speaker both loves and hates the beloved at the same time", "isCorrect": false, "rationale": "The love-hate conflict is the territory of Sonnet XXXV (“civil war”); XXXVI opens with the paradox of unity within separation."}, {"text": "That beauty fades but love endures", "isCorrect": false, "rationale": "The fading-beauty-versus-enduring-love theme appears elsewhere in the sequence; this sonnet's opening paradox is about togetherness versus necessary separation."}]}, {"question": "Why must the speaker and beloved live apart, according to lines 3-6?", "options": [{"text": "The beloved has moved to a distant country", "isCorrect": false, "rationale": "No geographic distance is cited; the separation is motivated by the speaker's desire to protect the beloved."}, {"text": "The speaker has some unspecified fault or blot that, if associated with the beloved, would bring shame upon them", "isCorrect": true, "rationale": "The “blots” that “do with me remain” must be borne by the speaker alone so that the beloved is not tainted by the association — the separation is an act of self-sacrificial protection."}, {"text": "The beloved is betrothed to another and must maintain appearances", "isCorrect": false, "rationale": "No betrothal is mentioned; the impetus for separation comes from the speaker's own compromised reputation, not external social arrangements."}, {"text": "The speaker has been banished by the beloved's family", "isCorrect": false, "rationale": "Family banishment is not cited; the speaker himself chooses the separation out of love."}]}, {"question": "What does “a separable spite” (line 8) mean?", "options": [{"text": "A cruel act of separation deliberately inflicted by a third party", "isCorrect": false, "rationale": "No third party is identified as spitefully separating them; “spite” here is Fortune's cruelty, not a person's."}, {"text": "The cruel force of circumstance that compels them to live separately despite their united love", "isCorrect": true, "rationale": "“Spite” means malicious ill fortune; “separable” means causing separation. Together the phrase names the cruel, dividing force that keeps them apart while their love remains one."}, {"text": "A particular insult the beloved spoke during an argument", "isCorrect": false, "rationale": "No spoken insult is referred to; the “spite” is an external condition, not a verbal act."}, {"text": "The speaker's own spiteful decision to leave the beloved", "isCorrect": false, "rationale": "The speaker presents the separation as sad necessity, not as spite he commits; it is Fortune's spite, not his."}]}, {"question": "Why does the speaker say he can “no more acknowledge” the beloved (lines 11-12)?", "options": [{"text": "He has grown indifferent and no longer cares about the beloved", "isCorrect": false, "rationale": "The couplet makes clear the opposite: the speaker loves the beloved so much that he protects them by staying away — not indifference."}, {"text": "Publicly claiming friendship would transfer his shame onto the beloved and damage their reputation", "isCorrect": true, "rationale": "“Lest my bewailed guilt should do thee shame” — association with the speaker (who carries some disgrace) would harm the beloved's good name; self-effacement is an act of love."}, {"text": "He is forbidden by law from associating with the beloved", "isCorrect": false, "rationale": "No legal prohibition is cited; the restraint is self-imposed for the beloved's sake."}, {"text": "He is too busy with other responsibilities to maintain the friendship", "isCorrect": false, "rationale": "Busy schedules are not the cause; the separation is emotionally motivated by protective love."}]}, {"question": "The instruction “But do not so” in line 15 is the speaker telling the beloved:", "options": [{"text": "Not to forget the speaker", "isCorrect": false, "rationale": "Forgetting is not what is warned against; the “so” refers back to showing public kindness that would harm the beloved's own name."}, {"text": "Not to show public affection that would cost the beloved their own good reputation", "isCorrect": true, "rationale": "Lines 13-14 say the beloved cannot honour the speaker publicly “unless thou take that honour from thy name”; “But do not so” tells the beloved not to sacrifice their own reputation in public shows of loyalty."}, {"text": "Not to end the friendship entirely", "isCorrect": false, "rationale": "The speaker does not fear the beloved will sever ties entirely; the instruction is specifically about the public display."}, {"text": "Not to write to the speaker", "isCorrect": false, "rationale": "Written communication is not the subject; public acknowledgment in social settings is what must be avoided."}]}, {"question": "How does the couplet (“As thou being mine, mine is thy good report”) reframe the speaker's sacrifice?", "options": [{"text": "The speaker claims the beloved's reputation as his personal property", "isCorrect": false, "rationale": "The logic is the reverse: because they are spiritually one, the beloved's good reputation belongs to the speaker too, so protecting it is self-interest as much as altruism."}, {"text": "Since they are spiritually one, the beloved's good reputation is also the speaker's, so protecting it benefits both", "isCorrect": true, "rationale": "The couplet converts apparent self-denial into a form of self-interest: if they are truly one, what is the beloved's is also the speaker's; therefore protecting the beloved's name protects his own as well."}, {"text": "The speaker will write a poem to restore the beloved's reputation", "isCorrect": false, "rationale": "Poetry is not offered as the solution here; the solution is the speaker's self-effacing absence."}, {"text": "The beloved owes the speaker a debt that must eventually be repaid", "isCorrect": false, "rationale": "Debt and repayment are not the logic of the couplet; the logic is mystical union transforming apparent sacrifice into mutual benefit."}]}, {"question": "The phrase “blots that do with me remain” (line 3) implies that the speaker:", "options": [{"text": "Has written embarrassing poetry that mars his reputation", "isCorrect": false, "rationale": "No specific written work is identified as the blot; the “blots” are an unspecified moral or social stain."}, {"text": "Carries some kind of disgrace or moral flaw that is his alone to bear", "isCorrect": true, "rationale": "The blots “remain” with him specifically and must be “borne alone” — suggesting a personal fault or social stain that the beloved should not have to share."}, {"text": "Has made ink stains on manuscripts he has written", "isCorrect": false, "rationale": "Literal ink blots are not meant; “blots” here are metaphorical moral or reputational marks."}, {"text": "Is physically ill and does not want the beloved to catch his disease", "isCorrect": false, "rationale": "Physical illness is not the nature of the blots; the context is social and moral reputation."}]}, {"question": "What is unusual about the couplet of Sonnet XXXVI?", "options": [{"text": "It is the only rhyming couplet in the Fair Youth sequence", "isCorrect": false, "rationale": "All sonnets in the sequence have closing couplets; what is unusual about this specific couplet is different."}, {"text": "It repeats almost word-for-word as the couplet of Sonnet XCVI, another sonnet in the Fair Youth sequence", "isCorrect": true, "rationale": "The couplet “But do not so, I love thee in such sort / As thou being mine, mine is thy good report” is echoed nearly identically in Sonnet XCVI — a famous anomaly scholars have debated as either intentional repetition or a printing error."}, {"text": "It addresses God directly rather than the beloved", "isCorrect": false, "rationale": "The couplet addresses the beloved as “thou”, consistent with the rest of the sonnet; no divine address occurs."}, {"text": "It abandons the iambic pentameter for free verse", "isCorrect": false, "rationale": "The couplet maintains iambic pentameter; the metrical form is not broken."}]}, {"question": "What overarching theme does Sonnet XXXVI introduce that links it to the chapter theme of “Shadows and Forgiveness”?", "options": [{"text": "The theme that shadows (stains/blots) must be acknowledged before forgiveness is possible", "isCorrect": false, "rationale": "While this is a reasonable reading, the sonnet does not move from acknowledgment to forgiveness; it focuses on protective self-concealment."}, {"text": "The theme of self-sacrificial love that accepts shadow (shame) and separation to preserve the beloved's light (reputation)", "isCorrect": true, "rationale": "The speaker's “blots” are the shadow he accepts entirely; by keeping them “with me” and not acknowledging the beloved publicly, he ensures the beloved remains in the light of good reputation — shadow and light are deliberately separated."}, {"text": "The theme that forgiveness requires a formal apology from the wrongdoer", "isCorrect": false, "rationale": "No formal apology is demanded; the logic of protection here runs in the opposite direction from the grievance-and-forgiveness arc of XXXIII-XXXV."}, {"text": "The theme that shadows follow the beloved everywhere as a curse", "isCorrect": false, "rationale": "The shadow here attaches to the speaker, not the beloved; it is the speaker who is the shadowed party."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
