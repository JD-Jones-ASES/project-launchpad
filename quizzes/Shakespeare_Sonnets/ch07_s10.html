<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does “Thus is his cheek the map of days outworn” mean?", "options": [{"text": "The beloved’s face is marked by the hardships of travel", "isCorrect": false, "rationale": "“Map” here means chart or record of a past era, not a travel map."}, {"text": "The beloved’s face is a living record of a genuine past age when beauty was natural and unadorned", "isCorrect": true, "rationale": "“Map” means a faithful representation; “days outworn” means a past era. The beloved’s face maps the genuine beauty of a former age."}, {"text": "The beloved has aged and his wrinkles show the map of his suffering", "isCorrect": false, "rationale": "The contrary is true: the beloved’s beauty is pristine and unchanged, not wrinkled by age."}, {"text": "The beloved’s face reveals his geographic origins", "isCorrect": false, "rationale": "The map is temporal, not geographical; it records a past era of genuine beauty."}]}, {"question": "What were “the golden tresses of the dead” used for, according to lines 7–9?", "options": [{"text": "They were burned in funeral rituals", "isCorrect": false, "rationale": "The tresses were cut from the dead and used to make wigs for the living, not burned."}, {"text": "They were cut from corpses and worn as wigs (“second life on second head”) by the living", "isCorrect": true, "rationale": "Lines 7–9: “Before the golden tresses of the dead, / The right of sepulchres, were shorn away, / To live a second life on second head.”"}, {"text": "They were preserved in tombs as holy relics", "isCorrect": false, "rationale": "The tresses were removed from graves and repurposed as wigs; the complaint is that the dead’s hair was stolen."}, {"text": "They were woven into tapestries commemorating the dead", "isCorrect": false, "rationale": "The tresses were used as hair adornment on the living, not woven into textiles."}]}, {"question": "What is the speaker’s attitude toward the practice of using the dead’s hair for wigs?", "options": [{"text": "He admires it as a creative form of recycling", "isCorrect": false, "rationale": "The practice is condemned as robbing the dead of their “right of sepulchres.”"}, {"text": "He condemns it as a desecration of the dead and an example of artificial beautification", "isCorrect": true, "rationale": "The dead’s hair is their rightful possession in the grave; using it for wigs robs the dead and creates false beauty."}, {"text": "He is indifferent to it but finds it aesthetically distasteful", "isCorrect": false, "rationale": "The language (“right of sepulchres,” “before these bastard signs of fair”) is morally charged, not merely aesthetic."}, {"text": "He wishes the beloved would adopt this custom to enhance his appearance", "isCorrect": false, "rationale": "The beloved is praised precisely because he does NOT use such artificial means."}]}, {"question": "What does “Making no summer of another’s green” (line 13) mean?", "options": [{"text": "The beloved does not grow jealous of others’ success", "isCorrect": false, "rationale": "The line is about beauty and authenticity, not jealousy."}, {"text": "The beloved does not borrow or steal from others’ vitality to make himself appear more beautiful", "isCorrect": true, "rationale": "“Summer of another’s green” means thriving off someone else’s youth and vitality; the beloved’s beauty is his own, not borrowed."}, {"text": "The beloved avoids spending time in green gardens and parks", "isCorrect": false, "rationale": "The line is metaphorical; it has nothing to do with gardens."}, {"text": "The beloved does not allow summer to pass without appreciating it", "isCorrect": false, "rationale": "The metaphor concerns beauty’s source (own vs. borrowed), not appreciation of seasons."}]}, {"question": "What is the function of the word “before” repeated in lines 3 and 7?", "options": [{"text": "It shows the speaker’s confusion about timeline", "isCorrect": false, "rationale": "The repetition is deliberate and structural, not confused."}, {"text": "It establishes a contrast between a pure past era and a corrupt present that relies on artificial beauty", "isCorrect": true, "rationale": "Lines 3 and 7 both begin with “Before,” marking a dividing line between a time of natural beauty and the current age of artifice and cosmetic theft."}, {"text": "It creates a rhyme scheme that links the quatrains", "isCorrect": false, "rationale": "“Before” does not rhyme with other end-words; its function is temporal and thematic."}, {"text": "It indicates the speaker’s nostalgia for his own youth", "isCorrect": false, "rationale": "The nostalgia is for a historical era of genuine beauty, not for the speaker’s personal past."}]}, {"question": "What does the couplet say Nature does with the beloved?", "options": [{"text": "Nature uses the beloved as a model to create more beautiful people", "isCorrect": false, "rationale": "Nature stores him as a display, not as a template for creating others."}, {"text": "Nature stores the beloved as a map to show “false Art” what beauty truly was in former times", "isCorrect": true, "rationale": "Lines 15–16: “And him as for a map doth Nature store, / To show false Art what beauty was of yore.” Nature preserves the beloved as a living lesson for artificial beautification."}, {"text": "Nature will eventually reclaim the beloved, reducing him to earth like all other things", "isCorrect": false, "rationale": "The couplet is about the beloved’s role in the present as Nature’s preserved example, not about his eventual decay."}, {"text": "Nature hides the beloved away so false Art cannot copy him", "isCorrect": false, "rationale": "Nature stores him to SHOW false Art, not to hide him from it."}]}, {"question": "Who or what is “false Art” in the couplet?", "options": [{"text": "Bad poetry that praises unworthy subjects", "isCorrect": false, "rationale": "False Art here refers to the artificial cosmetic beautification practices described throughout the sonnet."}, {"text": "The artificial beautification practices of the contemporary age — wigs, cosmetics, and borrowed beauty", "isCorrect": true, "rationale": "The sonnet has cataloged specific practices (false painting, using the dead’s hair) as “false Art”: the human art of manufacturing false beauty."}, {"text": "Paintings that misrepresent reality", "isCorrect": false, "rationale": "While visual art is one meaning of “art,” the context makes clear it refers to the artificial beautification arts described in the sonnet."}, {"text": "The speaker’s rival poets who write inferior verse", "isCorrect": false, "rationale": "Rival poets do not appear in this sonnet; the focus is on cosmetic and physical artifice."}]}, {"question": "What does “In him those holy antique hours are seen” (line 11) imply?", "options": [{"text": "The beloved is very old and carries memories of ancient events", "isCorrect": false, "rationale": "The beloved is young and beautiful; the “antique hours” are reflected in him, not his personal memories."}, {"text": "The beloved embodies the genuine, unadorned beauty of a sacred former age", "isCorrect": true, "rationale": "“Holy antique hours” refers to an earlier, purer era; the beloved is the living incarnation of that era’s authentic beauty."}, {"text": "The beloved is deeply religious and reflects ancient Christian virtue", "isCorrect": false, "rationale": "“Holy” here is used in a secular sense of sacred, authentic, and untouched; it is not specifically Christian."}, {"text": "The beloved appears older than his years due to the wisdom in his face", "isCorrect": false, "rationale": "The beloved’s face is young and beautiful; it reflects a past ideal, not personal aging."}]}, {"question": "What literary device appears in “Robbing no old to dress his beauty new” (line 14)?", "options": [{"text": "Onomatopoeia", "isCorrect": false, "rationale": "Onomatopoeia involves words that sound like what they mean; this is a metaphor."}, {"text": "Metaphor, casting artificial beautification as literal theft from the old (or the dead)", "isCorrect": true, "rationale": "The act of borrowing another’s beauty (wigs from the dead, cosmetics copying others) is cast as “robbing” — a moral crime, not just an aesthetic one."}, {"text": "Simile comparing the beloved to an honest man", "isCorrect": false, "rationale": "No “like” or “as” is used; the statement is direct and metaphorical."}, {"text": "Hyperbole, exaggerating the beloved’s moral virtue", "isCorrect": false, "rationale": "The statement is presented seriously, not as an exaggeration."}]}, {"question": "Sonnets LXVII and LXVIII together develop what image of the beloved?", "options": [{"text": "The beloved as a fallen beauty who has succumbed to the age’s corruption", "isCorrect": false, "rationale": "Both sonnets present the beloved as untouched by and superior to the age’s corruption."}, {"text": "The beloved as an authentic relic of natural beauty preserved by Nature as a rebuke to an artificial age", "isCorrect": true, "rationale": "Both sonnets position the beloved as genuine (“his rose is true,” “Without all ornament, itself and true”) in contrast to the cosmetic artifice of a degraded world."}, {"text": "The beloved as a divine figure whose beauty is supernatural", "isCorrect": false, "rationale": "The beauty is natural and earthly, not supernatural or divine."}, {"text": "The beloved as naive and unaware of the corruption surrounding him", "isCorrect": false, "rationale": "The sonnets do not characterize the beloved’s awareness; they focus on his beauty’s authentic nature."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
