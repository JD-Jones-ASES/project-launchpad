<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What simile opens Sonnet LII?", "options": [{"text": "The speaker compares himself to a traveler who rests at an inn.", "isCorrect": false, "rationale": "No inn or traveler appears; the opening simile is about wealth and a locked treasure."}, {"text": "The speaker compares himself to a rich man who has a key to a locked treasure but visits it only occasionally to keep its pleasure sharp.", "isCorrect": true, "rationale": "Lines 1–4: “So am I as the rich, whose blessed key / Can bring him to his sweet up-locked treasure, / The which he will not every hour survey, / For blunting the fine point of seldom pleasure.”"}, {"text": "The speaker compares the beloved to a rare flower that blooms once a year.", "isCorrect": false, "rationale": "Flowers appear in other sonnets; the opening simile is about a wealthy man and his treasure."}, {"text": "The speaker compares himself to a king who can see his subjects only on formal occasions.", "isCorrect": false, "rationale": "Kingship is not the comparison; the rich man and his key is the opening simile."}]}, {"question": "Why does the rich man avoid surveying his treasure every hour?", "options": [{"text": "Because doing so would attract thieves.", "isCorrect": false, "rationale": "Security from thieves is the concern of Sonnet XLVIII; here the logic is about the psychology of pleasure."}, {"text": "Because frequent viewing would dull the pleasure, making rare visits more precious.", "isCorrect": true, "rationale": "Line 4: “For blunting the fine point of seldom pleasure.” Pleasure is a sharp point that frequent use blunts; rarity preserves its keenness."}, {"text": "Because he is too busy to visit often.", "isCorrect": false, "rationale": "Busyness is not the reason; the logic is purely about maximizing pleasure through scarcity."}, {"text": "Because the treasure appreciates in value during the time it is unseen.", "isCorrect": false, "rationale": "Financial appreciation is not the concern; the logic is psychological, about pleasure intensity."}]}, {"question": "The word “carcanet” (line 10) refers to:", "options": [{"text": "A chest used to store jewels.", "isCorrect": false, "rationale": "A chest is not a carcanet; the word refers to jewelry worn on the body."}, {"text": "An ornamental necklace or collar in which prized jewels are set at intervals.", "isCorrect": true, "rationale": "A carcanet is an ornamental necklace. The “captain jewels” (chief gems) are set “thinly” (sparsely) in it, just as feasts are rare in the calendar — precious precisely because they are not crowded together."}, {"text": "A type of lock used to secure a treasure chest.", "isCorrect": false, "rationale": "Locking mechanisms are the concern of Sonnet XLVIII; a carcanet is jewelry."}, {"text": "A term for a royal treasury.", "isCorrect": false, "rationale": "The word refers to jewelry, not a treasury."}]}, {"question": "The “special instant” (line 13) refers to:", "options": [{"text": "The speaker’s death, which will end all separation.", "isCorrect": false, "rationale": "Death is not the ‘special instant’; the poem is about the anticipated moment of reunion."}, {"text": "The rare occasion when the speaker sees the beloved after absence — made precious by the preceding wait.", "isCorrect": true, "rationale": "The wardrobe analogy makes this clear: the hidden robe is revealed to create a “special-blest” instant. Similarly, the beloved’s rarity makes each encounter a triumph."}, {"text": "A particular feast day on the church calendar.", "isCorrect": false, "rationale": "Feast days serve as analogies; they are not the referent of ‘special instant.’"}, {"text": "The moment when the speaker finally finishes writing the sonnet sequence.", "isCorrect": false, "rationale": "Composition is not the referent; the special instant is reunion with the beloved."}]}, {"question": "The couplet “Blessed are you whose worthiness gives scope, / Being had, to triumph; being lack’d, to hope” argues that:", "options": [{"text": "The beloved’s unworthiness creates suffering that only absence makes bearable.", "isCorrect": false, "rationale": "The couplet celebrates the beloved’s worthiness, not unworthiness."}, {"text": "The beloved is so valuable that presence yields triumph and absence yields hope — either state is enriching.", "isCorrect": true, "rationale": "The couplet turns the fact of separation into a positive: having the beloved is triumph; lacking him generates hope. The beloved’s worth creates a win in both emotional states."}, {"text": "The speaker has given up hope of seeing the beloved again.", "isCorrect": false, "rationale": "Hope is explicitly named as the fruit of absence, not its casualty."}, {"text": "The speaker asks the beloved to return at once and end the separation.", "isCorrect": false, "rationale": "No direct request is made; the couplet is a philosophical reflection on the beloved’s value."}]}, {"question": "The wardrobe analogy (lines 11–14) compares the passage of time to:", "options": [{"text": "A tailor who makes new clothes for the speaker.", "isCorrect": false, "rationale": "No tailor is introduced; time is the wardrobe, not a craftsperson."}, {"text": "A wardrobe that keeps a precious robe hidden until the moment of its dramatic unveiling.", "isCorrect": true, "rationale": "“As the wardrobe which the robe doth hide, / To make some special instant special-blest, / By new unfolding his imprison’d pride.” Time is the wardrobe; the reunion is the unveiling of the hidden robe."}, {"text": "A chest that locks away the beloved until the speaker returns.", "isCorrect": false, "rationale": "While the locked chest appears in Sonnet XLVIII, here the wardrobe analogy is specifically about temporal rarity, not security."}, {"text": "A calendar marking the days of separation.", "isCorrect": false, "rationale": "The calendar is invoked in the feast-day analogy earlier; the wardrobe is a separate, final analogy."}]}, {"question": "The poem’s central argument is that rarity:", "options": [{"text": "Is a hardship to be endured until the beloved finally returns.", "isCorrect": false, "rationale": "The poem reframes rarity not as hardship but as a feature that increases pleasure."}, {"text": "Enhances value and pleasure — what is rarely encountered is more precious when it arrives.", "isCorrect": true, "rationale": "The rich man, the feast, the jewels in the carcanet, the hidden robe — all illustrate that scarcity heightens worth and pleasure. The speaker applies this to his separation from the beloved."}, {"text": "Diminishes the lover’s attachment over time.", "isCorrect": false, "rationale": "The poem argues the opposite: rarity increases attachment and value."}, {"text": "Is a cruelty imposed by an indifferent fate.", "isCorrect": false, "rationale": "The poem reinterprets rarity as a feature of pleasure, not a cruelty."}]}, {"question": "The phrase “captain jewels in the carcanet” uses which device?", "options": [{"text": "Simile — comparing the jewels to captains.", "isCorrect": false, "rationale": "No ‘like’ or ‘as’ is present; the comparison is direct."}, {"text": "Metaphor — the chief gems are called ‘captains,’ conveying their primacy and authority among the other stones.", "isCorrect": true, "rationale": "“Captain” as a modifier gives the jewels leadership and prominence — they stand out in the carcanet as a captain stands out among soldiers. It is a compressed metaphor."}, {"text": "Personification — the jewels are given human will and movement.", "isCorrect": false, "rationale": "The jewels are not given will or movement; the metaphor is about rank and primacy."}, {"text": "Oxymoron — pairing contradictory terms.", "isCorrect": false, "rationale": "No contradiction is involved; the metaphor is about primacy."}]}, {"question": "The feasts analogy (lines 5–8) supports the poem’s argument by showing that:", "options": [{"text": "Religious feasts are superior to secular pleasures.", "isCorrect": false, "rationale": "No religious hierarchy is argued; feasts serve purely as an analogy for rare pleasures."}, {"text": "Solemn feasts are rare and therefore memorable; similarly, rare time with the beloved is more deeply treasured.", "isCorrect": true, "rationale": "Lines 7–8: feasts are “stones of worth, thinly placed” — their rarity gives them weight. The argument is that spacing enhances value."}, {"text": "The speaker wishes he could celebrate more frequently.", "isCorrect": false, "rationale": "The speaker is not lamenting insufficient feasts; the analogy works precisely because he accepts rarity as productive."}, {"text": "Feasts are disappointing because they end too quickly.", "isCorrect": false, "rationale": "No disappointment with feasts is expressed; they are valued for their rarity."}]}, {"question": "How does Sonnet LII reconfigure the pain of separation found in earlier sonnets?", "options": [{"text": "By denying that separation is painful at all.", "isCorrect": false, "rationale": "The poem does not deny the pain; it reframes it as productive."}, {"text": "By reinterpreting absence as the condition that makes reunion supremely valuable — the lack generates hope, the having generates triumph.", "isCorrect": true, "rationale": "Unlike Sonnets XLIV–L which lament separation, LII finds philosophical consolation in rarity: absence is recast as the necessary precondition for the intense joy of reunion."}, {"text": "By concluding that the speaker no longer needs the beloved’s physical presence.", "isCorrect": false, "rationale": "The poem does not argue independence from the beloved; it argues that absence enhances, not replaces, the value of presence."}, {"text": "By comparing the speaker’s suffering to the suffering of prisoners.", "isCorrect": false, "rationale": "Prison imagery appears (“imprison’d pride”) but only as part of the wardrobe analogy, not as the poem’s primary reframing."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
