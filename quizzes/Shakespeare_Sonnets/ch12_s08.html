<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker confess at the opening of Sonnet CXXXIV?", "options": [{"text": "That he has never loved the mistress", "isCorrect": false, "rationale": "He has confessed the opposite — that his friend belongs to her and that he himself is mortgaged to her will."}, {"text": "That his friend belongs to the mistress and that he himself is mortgaged to her will", "isCorrect": true, "rationale": "'Now I have confess'd that he is thine, / And I myself am mortgag'd to thy will' — he acknowledges both his friend's capture and his own bondage."}, {"text": "That he has been lying about his feelings", "isCorrect": false, "rationale": "No admission of previous deception is made in this opening."}, {"text": "That he has given the mistress all his wealth", "isCorrect": false, "rationale": "The mortgage is of the self, not of literal wealth."}]}, {"question": "What does the speaker propose as a bargain in lines 3-4?", "options": [{"text": "He will write poems for her if she releases his friend", "isCorrect": false, "rationale": "No poetic exchange is offered."}, {"text": "He will forfeit himself if she will restore his friend to him", "isCorrect": true, "rationale": "'Myself I'll forfeit, so that other mine / Thou wilt restore to be my comfort still' — he offers to sacrifice himself entirely if she will return his friend to him."}, {"text": "He will stop loving her if she will be kinder", "isCorrect": false, "rationale": "No such condition is proposed; he offers self-sacrifice, not withdrawal of love."}, {"text": "He will forgive her if she acknowledges his suffering", "isCorrect": false, "rationale": "The bargain is about his friend's freedom, not personal forgiveness."}]}, {"question": "Why does the speaker say the bargain will fail?", "options": [{"text": "Because the friend does not want to be freed", "isCorrect": false, "rationale": "The friend's own desire is relevant, but the primary reason the bargain fails is the mistress's covetousness combined with the friend's kindness."}, {"text": "Because she is covetous and will keep both, and his kind friend will not abandon the speaker", "isCorrect": true, "rationale": "'But thou wilt not, nor he will not be free, / For thou art covetous, and he is kind' — she wants everything and will not release the friend; and the friend, being loyal, will not leave while the speaker is still her prisoner."}, {"text": "Because the speaker changes his mind about the bargain", "isCorrect": false, "rationale": "The speaker remains sincere in his offer; the failure comes from the other parties' natures."}, {"text": "Because the law prevents him from forfeiting himself", "isCorrect": false, "rationale": "No legal impediment is cited; the issue is the mistress's greed and the friend's loyalty."}]}, {"question": "What financial metaphor is central to Sonnet CXXXIV?", "options": [{"text": "The mistress as a merchant trading in hearts", "isCorrect": false, "rationale": "While financial imagery pervades the sonnet, the dominant figure is debt, mortgage, usury, and the statue of beauty."}, {"text": "Debt, mortgage, surety, and usury — the mistress as a merciless moneylender", "isCorrect": true, "rationale": "The speaker is 'mortgag'd,' the friend 'wrote surety' for him, and the mistress is called a 'usurer' who 'putt'st forth all to use' (charges interest on everything). The entire relationship is cast as financial exploitation."}, {"text": "The friend as a wealthy investor in the speaker's love", "isCorrect": false, "rationale": "The friend is a debtor, not an investor."}, {"text": "The speaker comparing his love to a commodity to be traded", "isCorrect": false, "rationale": "The speaker is the debtor, not a trader."}]}, {"question": "What does 'the statute of thy beauty thou wilt take' mean?", "options": [{"text": "She will insist on full legal enforcement of the debt owed to her beauty", "isCorrect": true, "rationale": "A 'statute' in Elizabethan law was a bond that gave a creditor rights over a debtor's property. She will enforce the full legal claim her beauty holds over those indebted to it."}, {"text": "She will write laws governing beauty standards", "isCorrect": false, "rationale": "This is not a legislative image; it refers to debt enforcement."}, {"text": "She will accept the legal declaration of her own beauty as payment", "isCorrect": false, "rationale": "The statute is a tool of enforcement used against debtors, not a form of payment."}, {"text": "She will obey the rules of beauty prescribed by society", "isCorrect": false, "rationale": "She is the creditor enforcing a statute, not a subject obeying rules."}]}, {"question": "What does calling the mistress a 'usurer' imply?", "options": [{"text": "That she is physically unattractive", "isCorrect": false, "rationale": "Usurer is a moral characterization, not a physical one."}, {"text": "That she exploits others' emotional dependence on her for maximum personal gain, showing no mercy", "isCorrect": true, "rationale": "A usurer lends at exorbitant interest and mercilessly claims what is owed. The mistress exploits both men's devotion, taking everything from them with no compassion or generosity."}, {"text": "That she is very wealthy", "isCorrect": false, "rationale": "Usurer describes her exploitation of others, not her wealth."}, {"text": "That she deals in financial matters professionally", "isCorrect": false, "rationale": "The usury metaphor is applied to her management of emotional debts, not literal finance."}]}, {"question": "What is the final accounting in the couplet?", "options": [{"text": "The speaker has gained the friend back and lost the mistress", "isCorrect": false, "rationale": "The couplet reports the worst possible outcome, not a recovery."}, {"text": "The friend is lost, the mistress has both men, the friend pays in full, yet the speaker is still not free", "isCorrect": true, "rationale": "'Him have I lost; thou hast both him and me: / He pays the whole, and yet am I not free' — the friend bears the full cost but the speaker remains enslaved, demonstrating the total irrationality and injustice of the situation."}, {"text": "The speaker escapes while his friend remains captive", "isCorrect": false, "rationale": "The speaker remains captive; he is not freed."}, {"text": "Both men escape the mistress's power", "isCorrect": false, "rationale": "Neither escapes; the couplet records total defeat."}]}, {"question": "The image of the friend going 'surety-like to write for me' draws on what legal practice?", "options": [{"text": "The friend acting as a witness in court", "isCorrect": false, "rationale": "A surety is a guarantor, not a witness."}, {"text": "The friend acting as a guarantor who agrees to pay the speaker's debt if the speaker defaults", "isCorrect": true, "rationale": "A surety (guarantor) signs a bond promising to cover another's debt. The friend, out of kindness, tried to help the speaker but became bound by the same obligation, losing his own freedom in the process."}, {"text": "The friend writing love letters on the speaker's behalf", "isCorrect": false, "rationale": "While 'write for me' could evoke letter-writing, the legal context makes 'surety-like' clearly financial-contractual."}, {"text": "The friend appealing to the mistress's mercy on the speaker's behalf", "isCorrect": false, "rationale": "The act is described in legal terms of bond and surety, not as a personal appeal."}]}, {"question": "How does Sonnet CXXXIV develop the situation established in Sonnet CXXXIII?", "options": [{"text": "It contradicts CXXXIII by showing the friend has escaped", "isCorrect": false, "rationale": "CXXXIV confirms and deepens the situation of CXXXIII; the friend has not escaped."}, {"text": "It confirms both men's captivity, attempts a legal bargain for the friend's release, and concludes with total defeat", "isCorrect": true, "rationale": "CXXXIII established the triple enslavement; CXXXIV attempts a contractual escape (self-sacrifice for the friend's freedom), explains why it fails, and ends with the worst possible accounting."}, {"text": "It introduces a new character who resolves the conflict", "isCorrect": false, "rationale": "No new character resolves anything; the three-person trap becomes more complete."}, {"text": "It dismisses the friend's situation as unimportant", "isCorrect": false, "rationale": "The friend's captivity is the central concern of the entire sonnet."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
