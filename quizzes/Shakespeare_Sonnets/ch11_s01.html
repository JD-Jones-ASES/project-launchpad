    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the speaker inviting the Fair Youth to do in the opening lines of Sonnet CXVII?", "options": [{"text": "Forgive him immediately without question", "isCorrect": false, "rationale": "The speaker does not ask for immediate forgiveness; he invites accusation and judgment."}, {"text": "Accuse him of failing to repay the youth's great deserts", "isCorrect": true, "rationale": "The speaker opens with 'Accuse me thus: that I have scanted all, / Wherein I should your great deserts repay,' actively welcoming indictment."}, {"text": "Celebrate their renewed love", "isCorrect": false, "rationale": "The tone is confessional and penitential, not celebratory."}, {"text": "Write a formal contract of loyalty", "isCorrect": false, "rationale": "No contract is proposed; the speaker submits himself to the youth's judgment."}], "id": "q01"}, {"question": "The phrase 'hoisted sail to all the winds' (line 9) is a metaphor for what action by the speaker?", "options": [{"text": "Embarking on a sea voyage abroad", "isCorrect": false, "rationale": "The phrase is figurative, not literal travel."}, {"text": "Deliberately seeking distance from the youth", "isCorrect": true, "rationale": "Hoisting sail to carry him farthest from the youth's sight describes his willful straying from the relationship."}, {"text": "Spreading rumors about the youth", "isCorrect": false, "rationale": "The metaphor refers to physical or emotional departure, not slander."}, {"text": "Writing poetry in many different styles", "isCorrect": false, "rationale": "The winds metaphor describes wandering away from the youth, not literary experimentation."}], "id": "q02"}, {"question": "What does 'given to time your own dear-purchas'd right' (line 8) mean?", "options": [{"text": "The speaker sold the youth's gifts for money", "isCorrect": false, "rationale": "No commercial transaction is described; the phrase refers to giving away the time that rightfully belonged to the youth."}, {"text": "The speaker spent on others the time and devotion that belonged to the youth", "isCorrect": true, "rationale": "'Your own dear-purchas'd right' is the claim on the speaker's time that the youth earned through love, and the speaker squandered it on others."}, {"text": "The speaker legally transferred his property to the youth", "isCorrect": false, "rationale": "The language is figurative, about time and devotion, not legal property."}, {"text": "The speaker gave the youth's letters to strangers", "isCorrect": false, "rationale": "Letters are not mentioned; the 'right' refers to the youth's claim on the speaker's devotion."}], "id": "q03"}, {"question": "What does the speaker ask the youth to do with evidence of his 'wilfulness and errors' (line 11)?", "options": [{"text": "Destroy all proof of the transgressions", "isCorrect": false, "rationale": "The speaker asks the opposite — that everything be recorded and accumulated."}, {"text": "Keep them secret from the world", "isCorrect": false, "rationale": "The speaker does not request secrecy; he asks the youth to record everything."}, {"text": "Book them down and accumulate surmise upon just proof", "isCorrect": true, "rationale": "Lines 11-12 ask the youth to record everything and pile additional suspicion on top of proven faults — a full accounting."}, {"text": "Publish them as a warning to future lovers", "isCorrect": false, "rationale": "Publication is not mentioned; the speaker addresses only the youth's private judgment."}], "id": "q04"}, {"question": "What does the speaker ask the youth NOT to do in the sestet's turn (lines 13-14)?", "options": [{"text": "Forget his transgressions entirely", "isCorrect": false, "rationale": "The speaker already invited the youth to record everything; forgetting is not the request."}, {"text": "Bring him within the level of his frown, but not shoot in wakened hate", "isCorrect": true, "rationale": "Lines 13-14: he accepts the frown of justified displeasure but begs the youth not to unleash active, awakened hatred."}, {"text": "Write verses condemning him", "isCorrect": false, "rationale": "Verse-writing is not part of the sonnet's scenario."}, {"text": "Share the story of his betrayal with others", "isCorrect": false, "rationale": "Public disclosure is not the concern; the speaker fears the youth's personal hatred."}], "id": "q05"}, {"question": "What is the speaker's stated purpose for his willful straying, as revealed in the couplet?", "options": [{"text": "To make the youth jealous and prove his own desirability", "isCorrect": false, "rationale": "Jealousy-inducing is not the stated motive; the speaker claims a more virtuous intent."}, {"text": "To test and prove the constancy and virtue of the youth's love", "isCorrect": true, "rationale": "The couplet: 'my appeal says I did strive to prove / The constancy and virtue of your love' — his wandering was a test of the bond."}, {"text": "To gather experiences that would improve his poetry", "isCorrect": false, "rationale": "Poetic improvement is not cited as the reason for his absence."}, {"text": "To punish the youth for an earlier wrong", "isCorrect": false, "rationale": "Punishment is not the speaker's stated motive; he claims to have been testing the love."}], "id": "q06"}, {"question": "The word 'scanted' (line 1) most nearly means:", "options": [{"text": "Embellished or exaggerated", "isCorrect": false, "rationale": "'Scanted' means to have given insufficiently, not to have exaggerated."}, {"text": "Withheld or given insufficiently", "isCorrect": true, "rationale": "'Scanted' means to skimp or fall short in providing what is owed — the speaker admits he has fallen short of repaying the youth."}, {"text": "Recorded in writing", "isCorrect": false, "rationale": "Recording is associated with 'Book' in line 11, not 'scanted.'"}, {"text": "Publicly proclaimed", "isCorrect": false, "rationale": "'Scanted' carries no sense of proclamation; it means to provide inadequately."}], "id": "q07"}, {"question": "The phrase 'frequent been with unknown minds' (line 7) refers to the speaker:", "options": [{"text": "Reading widely in philosophy and science", "isCorrect": false, "rationale": "The context is personal relationship, not intellectual study."}, {"text": "Associating with people outside the youth's circle", "isCorrect": true, "rationale": "The speaker confesses to spending time with others ('unknown minds') instead of the youth — a social and emotional straying."}, {"text": "Writing poetry about unknown subjects", "isCorrect": false, "rationale": "'Unknown minds' refers to people, not poetic subjects."}, {"text": "Traveling to foreign lands", "isCorrect": false, "rationale": "While the sailing metaphor suggests travel, 'unknown minds' specifically denotes associating with other people."}], "id": "q08"}, {"question": "What is the dominant rhetorical strategy of Sonnet CXVII?", "options": [{"text": "The speaker flatters the youth by extolling his beauty", "isCorrect": false, "rationale": "Flattery of beauty is not this sonnet's approach; it is a confessional appeal."}, {"text": "The speaker preemptively confesses wrongdoing to appeal for measured rather than wrathful judgment", "isCorrect": true, "rationale": "By naming every fault himself and asking only that the youth judge with displeasure rather than hatred, the speaker controls the frame of judgment."}, {"text": "The speaker argues that he has done nothing wrong", "isCorrect": false, "rationale": "The speaker explicitly admits fault; he does not deny wrongdoing."}, {"text": "The speaker blames external forces for his behavior", "isCorrect": false, "rationale": "No external scapegoat is invoked; the speaker owns his wilfulness."}], "id": "q09"}, {"question": "The couplet functions as what kind of legal metaphor?", "options": [{"text": "A verdict of guilty requiring punishment", "isCorrect": false, "rationale": "The speaker offers an appeal, not a verdict of guilt."}, {"text": "An appeal (defense argument) mitigating culpability by citing intent", "isCorrect": true, "rationale": "'My appeal' is the legal term for a formal argument; the speaker claims his intent — testing the love's constancy — mitigates the offenses."}, {"text": "A contract binding the youth to forgiveness", "isCorrect": false, "rationale": "No binding contract is proposed; the speaker makes an argument, not a demand."}, {"text": "A subpoena demanding the youth appear in court", "isCorrect": false, "rationale": "The subpoena direction is reversed; the speaker is himself on trial."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
