<script>
var QUESTIONS = [{"question": "How many lines does every sonnet contain, regardless of nationality or century?", "options": [{"text": "Twelve", "isCorrect": false, "rationale": "Twelve lines describes only the quatrain portion of a Shakespearean sonnet, not a complete sonnet."}, {"text": "Fourteen", "isCorrect": true, "rationale": "Every sonnet, in all traditions, consists of exactly fourteen lines — one of the three universal defining features of the form."}, {"text": "Sixteen", "isCorrect": false, "rationale": "Sixteen lines is not a recognized sonnet length in any tradition."}, {"text": "Eight", "isCorrect": false, "rationale": "Eight lines describes the octave, which is only the first part of a Petrarchan sonnet, not a complete sonnet."}]}, {"question": "What metrical pattern provides the rhythmic foundation of the sonnet?", "options": [{"text": "Trochaic tetrameter", "isCorrect": false, "rationale": "Trochaic tetrameter uses four trochees (stressed-unstressed) per line and is not the sonnet's standard meter."}, {"text": "Dactylic hexameter", "isCorrect": false, "rationale": "Dactylic hexameter is the meter of classical epic poetry such as Homer and Virgil, not the sonnet."}, {"text": "Iambic pentameter", "isCorrect": true, "rationale": "Iambic pentameter — five iambs (unstressed-stressed pairs) per line, totaling ten syllables — is the standard meter of the English sonnet."}, {"text": "Anapestic trimeter", "isCorrect": false, "rationale": "Anapestic trimeter uses three anapests (two unstressed syllables followed by a stressed one) per line and is not associated with the sonnet."}]}, {"question": "An iamb consists of which sequence of syllables?", "options": [{"text": "A stressed syllable followed by an unstressed syllable", "isCorrect": false, "rationale": "A stressed syllable followed by an unstressed one describes a trochee, not an iamb."}, {"text": "Two stressed syllables in a row", "isCorrect": false, "rationale": "Two consecutive stressed syllables describe a spondee, not an iamb."}, {"text": "An unstressed syllable followed by a stressed syllable", "isCorrect": true, "rationale": "An iamb is defined as an unstressed syllable followed by a stressed one — the da-DUM pattern that gives iambic pentameter its characteristic pulse."}, {"text": "Two unstressed syllables followed by a stressed syllable", "isCorrect": false, "rationale": "Two unstressed syllables followed by a stressed syllable describes an anapest, not an iamb."}]}, {"question": "In the Petrarchan sonnet, what is the term for the first eight lines taken together?", "options": [{"text": "Sestet", "isCorrect": false, "rationale": "The sestet is the final six lines of a Petrarchan sonnet, not the first eight."}, {"text": "Quatrain", "isCorrect": false, "rationale": "A quatrain is a four-line unit; the Petrarchan sonnet's opening movement is eight lines, not four."}, {"text": "Couplet", "isCorrect": false, "rationale": "A couplet is a two-line unit; it describes the closing lines of a Shakespearean sonnet, not the opening of a Petrarchan one."}, {"text": "Octave", "isCorrect": true, "rationale": "The octave is the eight-line opening movement of the Petrarchan sonnet, rhyming ABBAABBA, which presents the poem's central problem or situation."}]}, {"question": "What does the Italian word 'volta' mean in the context of sonnet structure?", "options": [{"text": "Rhyme", "isCorrect": false, "rationale": "The Italian word for rhyme is 'rima,' not 'volta.'"}, {"text": "Line", "isCorrect": false, "rationale": "The Italian word for line is 'verso,' not 'volta.'"}, {"text": "Turn", "isCorrect": true, "rationale": "Volta means 'turn' in Italian, and it describes the pivotal moment in a sonnet where the argument shifts direction, perspective, or emotional register."}, {"text": "Verse", "isCorrect": false, "rationale": "Though related in etymology, 'verso' is the Italian for verse or line; 'volta' specifically means 'turn.'"}]}, {"question": "Where does the volta typically fall in a Petrarchan sonnet?", "options": [{"text": "Line 7", "isCorrect": false, "rationale": "Line 7 is still within the octave and does not mark the structural turn in the Petrarchan form."}, {"text": "Line 9", "isCorrect": true, "rationale": "In the Petrarchan sonnet, the volta typically falls at line 9 — the first line of the sestet — where the poem shifts from presenting the problem (octave) to responding to it (sestet)."}, {"text": "Line 11", "isCorrect": false, "rationale": "Line 11 falls in the middle of the sestet, past the standard position of the Petrarchan volta."}, {"text": "Line 13", "isCorrect": false, "rationale": "Line 13 marks the couplet in the Shakespearean form; in the Petrarchan form, the volta comes much earlier, at line 9."}]}, {"question": "How many distinct rhyme sounds does the Shakespearean sonnet require?", "options": [{"text": "Four", "isCorrect": false, "rationale": "Four rhyme sounds would only cover the first two quatrains; the full Shakespearean pattern (ABAB CDCD EFEF GG) requires seven distinct sounds."}, {"text": "Five", "isCorrect": false, "rationale": "Five rhyme sounds is not the correct count for the Shakespearean pattern."}, {"text": "Seven", "isCorrect": true, "rationale": "The Shakespearean rhyme scheme (ABAB CDCD EFEF GG) uses seven distinct rhyme sounds — A, B, C, D, E, F, and G — making it more practical for English than the Petrarchan interlocked octave."}, {"text": "Nine", "isCorrect": false, "rationale": "Nine distinct rhyme sounds exceeds what the Shakespearean pattern requires and is not associated with any standard sonnet form."}]}, {"question": "What is the structure of the Shakespearean sonnet?", "options": [{"text": "An octave followed by a sestet", "isCorrect": false, "rationale": "An octave plus sestet describes the Petrarchan (Italian) sonnet, not the Shakespearean form."}, {"text": "Two sestets followed by a couplet", "isCorrect": false, "rationale": "Two sestets plus a couplet would total fourteen lines, but this arrangement does not describe the Shakespearean form."}, {"text": "Three quatrains followed by a closing couplet", "isCorrect": true, "rationale": "The Shakespearean sonnet consists of three four-line quatrains (rhyming ABAB CDCD EFEF) followed by a two-line closing couplet (GG) — a structure adapted from the Petrarchan form to suit the English language."}, {"text": "Four quatrains with no couplet", "isCorrect": false, "rationale": "Four quatrains would produce sixteen lines, not fourteen; the Shakespearean sonnet has three quatrains and a couplet."}]}, {"question": "Why did English poets modify the Petrarchan octave's interlocking rhyme scheme?", "options": [{"text": "They found it too simple and wanted a more complex pattern", "isCorrect": false, "rationale": "The interlocked Petrarchan octave (ABBAABBA) is actually more demanding, not simpler — English poets modified it because English has fewer available rhymes than Italian."}, {"text": "English law required a different structure for published poetry", "isCorrect": false, "rationale": "No legal requirement governed poetic form; the change was purely practical and aesthetic."}, {"text": "English has fewer available rhymes than Italian, making the interlocked scheme difficult", "isCorrect": true, "rationale": "Italian is rhyme-rich owing to its regular vowel endings, while English has comparatively few rhymes; the demanding ABBAABBA octave could feel strained in English, motivating the shift to alternating rhymes (ABAB)."}, {"text": "Petrarch himself recommended English poets use a different rhyme scheme", "isCorrect": false, "rationale": "Petrarch wrote in Italian and made no recommendation about English versification; the adaptation was made by English poets for practical reasons."}]}, {"question": "What is the Spenserian sonnet's distinguishing rhyme feature?", "options": [{"text": "It uses no rhyme at all, relying entirely on meter", "isCorrect": false, "rationale": "The Spenserian sonnet does rhyme; blank verse (no rhyme) is a different form entirely."}, {"text": "It interlocks the quatrains with shared rhyme sounds between them", "isCorrect": true, "rationale": "The Spenserian scheme (ABAB BCBC CDCD EE) threads shared rhyme sounds between quatrains — each quatrain's B or C rhyme reappears in the next — creating a sense of continuous flow rather than three separate blocks."}, {"text": "It uses a double couplet at the end instead of a single couplet", "isCorrect": false, "rationale": "The Spenserian sonnet retains the standard single closing couplet, just as the Shakespearean form does."}, {"text": "It replaces the third quatrain with a sestet", "isCorrect": false, "rationale": "The Spenserian form keeps three quatrains plus a couplet; it modifies the rhyme scheme, not the structural units."}]}, {"question": "According to the text, what is the 'most important structural feature of any sonnet'?", "options": [{"text": "The rhyme scheme", "isCorrect": false, "rationale": "While the rhyme scheme is one of the three universal features of the sonnet, the text identifies the volta — not the rhyme scheme — as the most important structural feature."}, {"text": "The closing couplet", "isCorrect": false, "rationale": "The closing couplet is described as distinctive and powerful, but the text reserves the title of 'most important structural feature' for the volta."}, {"text": "The volta", "isCorrect": true, "rationale": "The text states directly that 'the volta is the most important structural feature of any sonnet,' and that learning to find it is the single most useful skill a sonnet reader can develop."}, {"text": "Iambic pentameter", "isCorrect": false, "rationale": "Iambic pentameter is one of the three universal defining features of the sonnet, but the text identifies the volta, not the meter, as the most important structural feature."}]}, {"question": "What does the three-quatrain structure of the Shakespearean sonnet allow a poet to do that the Petrarchan two-part structure does not?", "options": [{"text": "Include more rhyme sounds, making the poem more musical", "isCorrect": false, "rationale": "The text does not identify musical richness as the key advantage of three quatrains; instead, it highlights the logical rhythm of developing an idea in stages."}, {"text": "Build an argument through accumulation across three distinct stages", "isCorrect": true, "rationale": "The three-quatrain structure creates a new logical rhythm: each quatrain can develop a different facet of the central idea through accumulation, whereas the Petrarchan form works by two-part contrast (thesis and response)."}, {"text": "Avoid the need for a volta entirely", "isCorrect": false, "rationale": "The Shakespearean form still uses a volta (often at line 9 or line 13); it does not eliminate the turn."}, {"text": "Write a longer poem without exceeding fourteen lines", "isCorrect": false, "rationale": "Both forms contain exactly fourteen lines; the structural difference is in how those lines are organized, not in total length."}]}, {"question": "The text describes the closing couplet of Sonnet XVIII as an example of which couplet function?", "options": [{"text": "Reversal — pulling the rug from under the three preceding quatrains", "isCorrect": false, "rationale": "The reversal function is illustrated by Sonnet 130, not Sonnet 18; the couplet of Sonnet 18 resolves rather than reverses."}, {"text": "Paradox — stating something simultaneously true and self-contradicting", "isCorrect": false, "rationale": "The paradox function is associated with Sonnet 98 in the text; Sonnet 18's couplet is confident and declarative, not paradoxical."}, {"text": "Resolution — concluding the argument with a definitive statement", "isCorrect": true, "rationale": "The text quotes Sonnet 18's couplet ('So long as men can breathe, or eyes can see, / So long lives this, and this gives life to thee') as its example of the resolution function: a statement of absolute confidence that caps the argument."}, {"text": "Ironic undercutting — quietly undermining the speaker's stated position", "isCorrect": false, "rationale": "Ironic undercutting is a distinct couplet function described separately in the text; Sonnet 18's couplet is presented as confidently affirmative, not ironic."}]}, {"question": "Why does recognizing the volta 'transform the reading experience,' according to the text?", "options": [{"text": "It allows the reader to skip the first eight lines and read only the most important part", "isCorrect": false, "rationale": "The text makes no suggestion that any part of the sonnet should be skipped; it emphasizes active engagement with the whole poem."}, {"text": "It makes the reader an active participant who tracks when and how the poem changes direction", "isCorrect": true, "rationale": "The text says recognizing the volta turns the reader from a passive absorber of images into an active participant who asks: 'When does it change direction? What changes? Why?' — questions that unlock the sonnet's meaning."}, {"text": "It enables the reader to identify the sonnet's rhyme scheme more quickly", "isCorrect": false, "rationale": "The rhyme scheme is identified independently of the volta; the text connects the volta to unlocking meaning, not to identifying the rhyme pattern."}, {"text": "It reveals whether the poem is Petrarchan, Shakespearean, or Spenserian", "isCorrect": false, "rationale": "The volta's position offers clues about form, but the text's point is about interpretive engagement with meaning, not formal classification."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
