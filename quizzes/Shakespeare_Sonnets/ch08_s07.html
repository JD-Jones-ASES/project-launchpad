    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker argue is the highest possible praise anyone can offer the Fair Youth?", "options": [{"text": "That the youth surpasses all ancient heroes in virtue and beauty", "isCorrect": false, "rationale": "No comparison to ancient heroes is made; the greatest praise is logically simpler and more absolute."}, {"text": "Simply saying 'you alone are you' — that the youth is uniquely himself with no equal", "isCorrect": true, "rationale": "Lines 1-4 argue that 'you alone are you' is the richest praise because the youth contains within himself the only standard of his own excellence; no example of his equal exists anywhere."}, {"text": "That the youth's beauty will never fade no matter how old he grows", "isCorrect": false, "rationale": "The immortality-of-beauty theme is not the focus here; the argument is about the unique self-sufficiency of the youth as the sole measure of himself."}, {"text": "That the youth has inspired more great poetry than any other subject in history", "isCorrect": false, "rationale": "The quantity of poetry inspired is not the argument; the claim is about the youth's uniqueness as the standard of his own worth."}], "id": "q01"}, {"question": "What does the phrase 'In whose confine immured is the store / Which should example where your equal grew' mean?", "options": [{"text": "The youth keeps his wisdom locked away and shares it with no one", "isCorrect": false, "rationale": "The image is about the youth containing the standard of his own excellence, not about withholding wisdom."}, {"text": "Within the youth is confined the entire store of excellence that would serve as an example if his equal existed anywhere", "isCorrect": true, "rationale": "The lines mean that all the qualities by which excellence could be measured are locked up within the youth himself; no external example of his equal exists because all the relevant qualities are his alone."}, {"text": "The youth is imprisoned in his own beauty and cannot grow beyond it", "isCorrect": false, "rationale": "'Immured' (walled in) applies to the store of excellence contained within the youth, not to the youth as a prisoner of his own limitations."}, {"text": "The youth's excellence is so well-known that it has become a commonly accepted example", "isCorrect": false, "rationale": "The opposite is argued: because the youth is unique, no example of his equal can be found; he is his own standard."}], "id": "q02"}, {"question": "What does the speaker say about a pen that 'lends not some small glory' to its subject?", "options": [{"text": "That such a pen is dishonest and should not be trusted", "isCorrect": false, "rationale": "Dishonesty is not the charge; a pen that adds no glory is described as displaying 'lean penury,' suggesting artistic impoverishment rather than moral failure."}, {"text": "That it dwells in lean penury — it is impoverished by failing to enrich its subject", "isCorrect": true, "rationale": "Lines 7-8 state: 'Lean penury within that pen doth dwell / That to his subject lends not some small glory,' arguing that even minimal glory-lending is a basic duty of verse, and a pen that omits it is artistically starved."}, {"text": "That it has surpassed praise and reached the level of honest description", "isCorrect": false, "rationale": "No such elevation to honest description is implied; a pen failing to lend glory is described negatively as penurious."}, {"text": "That it will be forgotten because readers only remember glorifying verse", "isCorrect": false, "rationale": "No argument about readerly memory or canon formation is made; the judgment is about the pen's inherent impoverishment."}], "id": "q03"}, {"question": "What is the key poetic strategy the speaker recommends for writing about the youth in lines 9-14?", "options": [{"text": "Inventing new metaphors that go beyond what nature created", "isCorrect": false, "rationale": "The speaker recommends the opposite: copying what nature has already made, rather than inventing beyond it."}, {"text": "Simply copying what nature has already written in the youth, without making it worse", "isCorrect": true, "rationale": "Lines 11-12 state: 'Let him but copy what in you is writ, / Not making worse what nature made so clear,' arguing that faithful reproduction of the youth's natural excellence is the ideal poetic strategy."}, {"text": "Using the highest available rhetorical forms to elevate the subject above his natural state", "isCorrect": false, "rationale": "The speaker criticizes rhetorical elaboration elsewhere; here the recommendation is to copy faithfully, not to elevate artificially."}, {"text": "Writing about the youth's future glory rather than his present qualities", "isCorrect": false, "rationale": "No temporal shift to future glory is recommended; the strategy is about accurately representing what nature has already given."}], "id": "q04"}, {"question": "What reward does the speaker promise to the poet who successfully copies the youth's nature?", "options": [{"text": "The youth's personal favor and patronage for life", "isCorrect": false, "rationale": "No promise of personal patronage is made; the reward is poetic fame among all readers."}, {"text": "Such a counterpart will make the poet's wit famous and his style admired everywhere", "isCorrect": true, "rationale": "Lines 13-14 state: 'And such a counterpart shall fame his wit, / Making his style admired every where,' promising universal poetic fame to anyone who can faithfully reproduce the youth's natural excellence."}, {"text": "The youth will personally endorse the poet's work to other patrons", "isCorrect": false, "rationale": "No endorsement role for the youth is suggested; the reward comes from the quality of the verse itself earning admiration."}, {"text": "The poet will be remembered as having surpassed all rivals who used rhetorical flattery", "isCorrect": false, "rationale": "No comparison to rivals is made in this reward; the fame promised is for successfully copying the youth's nature."}], "id": "q05"}, {"question": "What does the couplet criticize the youth for?", "options": [{"text": "Ignoring the speaker's verse in favor of the rival's more elaborate style", "isCorrect": false, "rationale": "The couplet does not criticize the youth for his poetic preferences but for a character flaw that affects how he is praised."}, {"text": "Being fond of praise, which makes his praises worse", "isCorrect": true, "rationale": "The couplet reads: 'You to your beauteous blessings add a curse, / Being fond on praise, which makes your praises worse,' turning the sonnet's praise of the youth into a gentle but pointed rebuke of his vanity."}, {"text": "Encouraging both poets to compete, which produces worse verse from both", "isCorrect": false, "rationale": "The youth's fault is his fondness for praise generally, not his instigation of poetic competition specifically."}, {"text": "Preferring the comfort of flattery over the truth of plain speech", "isCorrect": false, "rationale": "While connected to the plain-speech theme in other sonnets, the couplet's specific criticism is fondness for praise as a character trait that somehow degrades the quality of praise received."}], "id": "q06"}, {"question": "How does the couplet's criticism relate to the rest of the sonnet's argument?", "options": [{"text": "It undermines the entire sonnet by suggesting the youth is unworthy of praise", "isCorrect": false, "rationale": "The youth is not declared unworthy; the couplet adds a corrective note about one specific flaw that complicates rather than cancels the praise."}, {"text": "It introduces an ironic twist: the youth's greatest flaw is craving the very praise the sonnet has been discussing", "isCorrect": true, "rationale": "After arguing that the best praise simply copies the youth's natural excellence, the couplet reveals that the youth's own love of praise introduces an element of vanity that corrupts or diminishes the praise he receives — making flattery partly his own fault."}, {"text": "It explains why the rival's verse is better: the rival understands the youth's fondness for flattery", "isCorrect": false, "rationale": "No such explanation is offered; the couplet criticizes the youth, not the rival, and says nothing about the rival's understanding."}, {"text": "It concludes that all praise is equally useless because the youth is beyond measurement", "isCorrect": false, "rationale": "The sonnet has argued praise can succeed if it copies nature accurately; the couplet's point is about the youth's character, not the impossibility of praise."}], "id": "q07"}, {"question": "The word 'counterpart' (line 13) in this context means:", "options": [{"text": "A rival or competitor", "isCorrect": false, "rationale": "While 'counterpart' can mean a corresponding person, in this context it refers to a copy or reproduction — the verse as a faithful reproduction of the youth's nature."}, {"text": "A faithful copy or reproduction of the original", "isCorrect": true, "rationale": "In Renaissance usage, a 'counterpart' was a copy or duplicate. Here the verse that faithfully copies 'what in you is writ' (nature's writing in the youth) is called a counterpart — a faithful reproduction."}, {"text": "A contract or legal document guaranteeing the poet's fame", "isCorrect": false, "rationale": "No legal metaphor is intended; 'counterpart' here means an artistic reproduction of nature's work in the youth."}, {"text": "The second part or answer to a musical composition", "isCorrect": false, "rationale": "While musical usage of 'counterpart' exists, the context here is artistic reproduction; the verse is a copy of nature's inscription in the youth."}], "id": "q08"}, {"question": "What is the implicit argument about poetic originality in Sonnet LXXXIV?", "options": [{"text": "True originality requires inventing qualities the subject does not possess", "isCorrect": false, "rationale": "The speaker argues against invention; the best verse is faithful reproduction, not creative invention beyond the subject."}, {"text": "True originality in this case means faithfully reproducing nature's own writing rather than adding artificial invention", "isCorrect": true, "rationale": "The sonnet argues paradoxically that the most original praise of this uniquely original subject is the least inventive: simply copying what nature has already written. The youth himself is so original that the best poetic strategy is to get out of the way and let nature's work shine."}, {"text": "No originality is possible when writing about a subject as conventional as a beautiful youth", "isCorrect": false, "rationale": "The speaker presents the youth as unique and unprecedented, not as a conventional subject; originality is possible but should come from the subject, not the poet."}, {"text": "Poetic originality is always inferior to rhetorical skill in capturing true beauty", "isCorrect": false, "rationale": "The speaker does not privilege rhetoric; on the contrary, the sonnet argues against elaborate rhetoric in favor of faithful reproduction."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
