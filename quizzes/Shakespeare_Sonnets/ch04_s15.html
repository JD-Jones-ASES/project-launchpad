    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What hypothetical situation does the speaker imagine in Sonnet XXXII?", "options": [{"text": "The beloved reading the poems while the speaker is traveling", "isCorrect": false, "rationale": "Travel by the speaker is not the scenario; the speaker imagines his own death."}, {"text": "The beloved surviving the speaker’s death and re-reading these poems long after he is gone", "isCorrect": true, "rationale": "“If thou survive my well-contented day, / When that churl Death my bones with dust shall cover”—the scenario is the beloved reading the poems posthumously."}, {"text": "The speaker surviving the beloved and writing a memorial poem", "isCorrect": false, "rationale": "The speaker imagines his own death, not the beloved’s; the beloved is the survivor."}, {"text": "Future readers centuries later discovering the poems in an archive", "isCorrect": false, "rationale": "The imagined reader is specifically the beloved, not anonymous future readers."}]}, {"question": "How does the speaker describe his own verse in Sonnet XXXII?", "options": [{"text": "As magnificent monuments that will outlast all rival poetry", "isCorrect": false, "rationale": "The speaker takes the opposite stance—he considers his verses likely inferior to those of future poets."}, {"text": "As poor, rude lines likely to be surpassed by better poets of a more polished age", "isCorrect": true, "rationale": "“These poor rude lines”; “Compare them with the bett’ring of the time, / And though they be outstripp’d by every pen”—the speaker acknowledges his verses will probably be outclassed."}, {"text": "As the finest poetry ever written, beyond any comparison", "isCorrect": false, "rationale": "Self-deprecation, not boasting, characterizes the speaker’s view of his verse."}, {"text": "As difficult riddles requiring a learned reader to decode", "isCorrect": false, "rationale": "No reference to difficulty or riddles appears; the self-description emphasizes poverty and roughness."}]}, {"question": "What does the speaker ask the beloved to do with the poems despite their literary shortcomings?", "options": [{"text": "Burn them so no rival poet can use them for mockery", "isCorrect": false, "rationale": "No destruction is requested; the speaker wants the poems preserved."}, {"text": "Reserve them for love’s sake rather than for their poetic merit", "isCorrect": true, "rationale": "“Reserve them for my love, not for their rhyme”—the poems should be kept because they testify to love, not because they display technical skill."}, {"text": "Share them with better poets who can improve them", "isCorrect": false, "rationale": "No revisions by others are requested; the poems should be kept as they are, valued for love."}, {"text": "Read them aloud at a public gathering in the speaker’s memory", "isCorrect": false, "rationale": "Public recitation is not requested; the beloved’s private preservation for love’s sake is the request."}]}, {"question": "What consolation does the speaker offer for the inferiority of his verse?", "options": [{"text": "His love was deeper than any future poet’s will be, even if his verse is lesser", "isCorrect": true, "rationale": "The imagined thought: “Had my friend’s Muse grown with this growing age, / A dearer birth than this his love had brought”—the love itself, not the verse, is the speaker’s superior gift."}, {"text": "Future poets will write about the speaker and make his memory immortal anyway", "isCorrect": false, "rationale": "Future poets are imagined as better craftsmen, but the consolation is not about them writing of the speaker."}, {"text": "The poems are short, making them easy to remember and recite", "isCorrect": false, "rationale": "Brevity as memorability is not the consolation offered; love as distinct from skill is."}, {"text": "The beloved’s own virtue will redeem even poor poetry associated with him", "isCorrect": false, "rationale": "The beloved’s virtue is not cited as redemptive; the love behind the poems is the claimed consolation."}]}, {"question": "What distinction does the couplet draw between the speaker’s poems and those of “happier men”?", "options": [{"text": "Better poets’ verses are to be read for style; the speaker’s verses are to be read for the love they express", "isCorrect": true, "rationale": "“But since he died and poets better prove, / Theirs for their style I’ll read, his for his love”—future poets are superior in craft; the speaker’s superiority is in love."}, {"text": "Better poets write longer poems; the speaker writes shorter, more intimate ones", "isCorrect": false, "rationale": "Length is not the distinguishing criterion; style versus love is."}, {"text": "Better poets are read in public; the speaker’s poems are for private reading only", "isCorrect": false, "rationale": "The distinction is not public versus private reading; it is craft versus love as the reading’s purpose."}, {"text": "Better poets’ poems last longer; the speaker’s will fade with time", "isCorrect": false, "rationale": "Durability is not the contrast drawn; the distinction is between what the poems are valued for—style or love."}]}, {"question": "What does “churl Death” mean?", "options": [{"text": "A gentle, merciful death that takes the speaker quietly", "isCorrect": false, "rationale": "“Churl” is not a term of gentleness; it means a rude, boorish, or miserly person."}, {"text": "A rude, harsh Death personified as an ill-mannered peasant", "isCorrect": true, "rationale": "“Churl” meant a rude or boorish rustic; Death is personified as an uncouth, ungracious figure who covers the speaker’s bones with dust without ceremony or care."}, {"text": "A mercenary death motivated only by the desire to steal life", "isCorrect": false, "rationale": "While “churl” could suggest miserliness, the primary sense here is rudeness and lack of nobility."}, {"text": "Death portrayed as a skilled craftsman who sculpts the dead", "isCorrect": false, "rationale": "No craftsmanship is attributed to death; it is portrayed as rude and common."}]}, {"question": "What does “the bett’ring of the time” refer to?", "options": [{"text": "The beloved’s improving mood after the speaker’s death", "isCorrect": false, "rationale": "The beloved’s mood is not referenced; “the time” refers to the literary age."}, {"text": "The literary improvement of the age—better poets and more polished verse in the future", "isCorrect": true, "rationale": "The speaker asks the beloved to compare his rough verses with “the bett’ring of the time”—the advancing standards of poetry in generations to come."}, {"text": "The improvement in the speaker’s own verse over the course of his life", "isCorrect": false, "rationale": "The improvement is external and future, not the speaker’s personal development."}, {"text": "Better paper and printing technology that will preserve future poems", "isCorrect": false, "rationale": "Physical materials of printing are not the subject; “the bett’ring of the time” refers to poetic quality and literary culture."}]}, {"question": "How does the self-deprecation in Sonnet XXXII function rhetorically?", "options": [{"text": "It discourages the beloved from reading the poems at all", "isCorrect": false, "rationale": "The opposite: by admitting technical weakness, the speaker makes a stronger case for preserving the poems for love’s sake."}, {"text": "By acknowledging the verse’s limitations, the speaker elevates the love behind it as the real value, making a claim that transcends mere skill", "isCorrect": true, "rationale": "The self-deprecating rhetoric is a rhetorical strategy: conceding the inferiority of the verse allows the speaker to claim a superior quality—the love that inspired it—as his lasting distinction."}, {"text": "It tests whether the beloved truly loves the speaker regardless of his accomplishments", "isCorrect": false, "rationale": "No test is implied; the deprecation is a poetic strategy, not a relationship test."}, {"text": "It expresses the speaker’s genuine despair about his poetic abilities", "isCorrect": false, "rationale": "While sincere humility may be present, the deprecation is rhetorically shaped to make love’s value the conclusion."}]}, {"question": "Sonnet XXXII closes Chapter 4 (“Praise and Beauty”). How does it reframe the theme of praising beauty?", "options": [{"text": "It argues that beauty is ultimately more important than love", "isCorrect": false, "rationale": "The sonnet argues the opposite—love (not aesthetic beauty or technical skill) is what makes the poems worth keeping."}, {"text": "It suggests that love, not poetic craft or praise, is the truest form of tribute to the beloved", "isCorrect": true, "rationale": "After a chapter full of elegant praise, Sonnet XXXII humbly concludes that the love behind imperfect verse matters more than polished beauty of expression—love is the ultimate praise."}, {"text": "It abandons the theme of praising the beloved in favor of self-praise", "isCorrect": false, "rationale": "The speaker is self-deprecating throughout; there is no turn to self-praise."}, {"text": "It argues that beauty fades and poetry should focus on other virtues", "isCorrect": false, "rationale": "Beauty’s fading is not the argument; the subject is verse’s adequacy versus love’s adequacy as tribute."}]}, {"question": "The phrase “to march in ranks of better equipage” means:", "options": [{"text": "To join an army and serve in a military campaign", "isCorrect": false, "rationale": "The military language is metaphorical; “equipage” here means literary outfit or equipment."}, {"text": "To appear among poems of finer craft and more elaborate literary equipment", "isCorrect": true, "rationale": "“Equipage” means outfit or furnishings; a poem in “better equipage” is one more finely crafted and furnished with poetic skill—the speaker imagines his love producing verse worthy to stand alongside great poetry."}, {"text": "To be published alongside the works of famous poets in an anthology", "isCorrect": false, "rationale": "While publication is a related idea, the specific image is of marching in ranks—a military metaphor for poetic quality and standing."}, {"text": "To receive proper recognition from critics and scholars", "isCorrect": false, "rationale": "Critical recognition is not specifically what “better equipage” refers to; it is the quality of the poetic craft itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
