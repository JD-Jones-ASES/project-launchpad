<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet VII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the rising sun in the first quatrain symbolize?", "options": [{"text": "God’s presence illuminating the world at the start of a new day.", "isCorrect": false, "rationale": "While the sun’s sacred “majesty” is mentioned, its primary function is as an allegory for the youth’s own life arc."}, {"text": "The youth in the morning of his life: new, beautiful, and commanding universal attention and reverence.", "isCorrect": true, "rationale": "The rising sun is the fair youth in his youth — both are greeted with adoration and “homage” from all who see them."}, {"text": "The poet’s inspiration arriving in the morning hours when he writes.", "isCorrect": false, "rationale": "The poet’s creative process is not the subject; the sun is an allegory for the youth’s life stages."}, {"text": "Spring replacing winter as a symbol of renewal.", "isCorrect": false, "rationale": "Seasonal renewal is not the solar metaphor’s function here; the sun traces a single day’s arc to represent a life."}], "id": "q01"}, {"question": "What does “Doth homage to his new-appearing sight” mean?", "options": [{"text": "Every eye pays reverence and tribute to the newly risen sun.", "isCorrect": true, "rationale": "The courtly word “homage” means tribute paid to a superior; all eyes serve the rising sun as subjects serve a king."}, {"text": "People kneel and pray to the sun in religious worship.", "isCorrect": false, "rationale": "While religious vocabulary (“sacred majesty”) is present, the homage is described as a social/courtly act, not a theological one."}, {"text": "The sun is newly aware of its own appearance and admires itself.", "isCorrect": false, "rationale": "The homage flows from observers to the sun, not from the sun to its own reflection."}, {"text": "Mortals are unable to look directly at the new sun without squinting.", "isCorrect": false, "rationale": "Physical discomfort from the sun’s brightness is not the point; the emphasis is on willing adoration."}], "id": "q02"}, {"question": "What does the sun in “middle age” at “the steep-up heavenly hill” represent?", "options": [{"text": "The youth at the height of his powers and beauty, still admired though past the first flush of youth.", "isCorrect": true, "rationale": "The midday sun at its apex is the youth in his mature prime — still beautiful and commanding “mortal looks” that “adore his beauty still,” like subjects loyal to a strong king."}, {"text": "An old man who has climbed a literal hill and is exhausted.", "isCorrect": false, "rationale": "No literal climbing is involved; the heavenly hill is the sky, and the sun’s position is a metaphor for the middle stage of a life."}, {"text": "The poet in the middle of composing his sequence of sonnets.", "isCorrect": false, "rationale": "The poet’s creative position is not the subject; the sun represents the youth, not the poet."}, {"text": "The height of summer when days are longest.", "isCorrect": false, "rationale": "No seasonal meaning is intended here; the sun’s position at noon represents the midpoint of a human life."}], "id": "q03"}, {"question": "What happens to the sun when it reels “from the day” like “feeble age”?", "options": [{"text": "A storm arrives and clouds block the sun.", "isCorrect": false, "rationale": "No storm is described; the sun’s feebleness is simply old age and decline, not weather."}, {"text": "The once-adoring eyes turn away from the setting sun, just as admirers abandon the elderly.", "isCorrect": true, "rationale": "The volta’s irony is sharp: the same eyes that gave homage to the rising and midday sun “converted are” — turned away — from the setting sun. Age is abandoned by the same world that once adored youth."}, {"text": "The youth falls asleep at sunset, no longer able to stay awake.", "isCorrect": false, "rationale": "Sleep is not the metaphor; the abandonment by admiring eyes is the point."}, {"text": "The sun sets into the sea, where it is reborn the next morning.", "isCorrect": false, "rationale": "No rebirth is promised in this sonnet; the point is that without a son, there is no renewal."}], "id": "q04"}, {"question": "What does “thy noon” signify in the couplet?", "options": [{"text": "The actual midday hour when the youth should be most active.", "isCorrect": false, "rationale": "Noon is metaphorical here, representing the peak of the youth’s beauty and life."}, {"text": "The peak of the youth’s beauty and vitality — the moment before decline begins.", "isCorrect": true, "rationale": "Noon is the zenith of the sun’s arc; “thy noon” is the youth’s own peak, the moment when he is “outgoing” (surpassing himself, or going beyond his noon into decline) and must act."}, {"text": "The midpoint of the sequence of sonnets addressed to the youth.", "isCorrect": false, "rationale": "The noon is not a sequential marker in the poetry; it is a metaphor for the youth’s life peak."}, {"text": "A specific hour when the poet planned to meet the youth.", "isCorrect": false, "rationale": "No meeting is described; noon is the sun metaphor applied to the youth’s life."}], "id": "q05"}, {"question": "What is the warning in the couplet “So thou, thyself outgoing in thy noon: / Unlook’d on diest unless thou get a son”?", "options": [{"text": "The youth will die at noon unless he leaves the city.", "isCorrect": false, "rationale": "No literal travel warning is made; the couplet is an allegory about mortality and the need for a child."}, {"text": "Just as the setting sun is ignored, the youth will die unnoticed and unmourned unless he has a son to carry his legacy forward.", "isCorrect": true, "rationale": "The couplet applies the solar allegory: past his noon, the youth will be “unlook’d on” (ignored, like the setting sun) and die without legacy unless he produces a son to perpetuate his name and beauty."}, {"text": "The youth will be socially ostracized if he remains childless.", "isCorrect": false, "rationale": "Social ostracism is not the primary threat; the concern is dying without legacy or continuation."}, {"text": "The sun will not shine again unless the youth repents of his selfishness.", "isCorrect": false, "rationale": "The sun rises again regardless; the point is that the youth’s life has only one arc, unlike the sun, and he needs a son to rise after him."}], "id": "q06"}, {"question": "What is the dominant structural device Shakespeare uses in this sonnet?", "options": [{"text": "A three-part allegory tracing the sun’s daily arc (dawn, noon, sunset) to mirror the three stages of human life (youth, prime, age).", "isCorrect": true, "rationale": "The three quatrains correspond to the three stages of the solar day: rising (first quatrain), zenith (second), and setting (third), creating a sustained allegory for human life from birth to death."}, {"text": "A sequence of five rhetorical questions building to a final statement.", "isCorrect": false, "rationale": "No sequence of five questions is present; the sonnet is structured around the solar allegory."}, {"text": "An anaphora repeating the word “when” to introduce each new stage of decline.", "isCorrect": false, "rationale": "“When”-anaphora is the structure of Sonnets XII and XV, not Sonnet VII; here the structure is the solar allegory."}, {"text": "A direct dialogue between the poet and the youth about the importance of marriage.", "isCorrect": false, "rationale": "No dialogue takes place; the poet speaks in the third person about the sun before addressing the youth only in the couplet."}], "id": "q07"}, {"question": "What does “weary car” mean in line 9?", "options": [{"text": "A tired automobile making a long journey.", "isCorrect": false, "rationale": "Automobiles did not exist in Shakespeare’s time; “car” derives from the Latin “carrus,” meaning chariot."}, {"text": "The sun’s chariot in classical mythology, which becomes weary as it descends toward the horizon at day’s end.", "isCorrect": true, "rationale": "The sun was traditionally depicted as riding a chariot (the “car” of Phoebus/Apollo); “weary car” evokes this classical image of the sun’s chariot growing tired as it reels toward the horizon."}, {"text": "The aged youth’s decrepit body, compared to a broken-down vehicle.", "isCorrect": false, "rationale": "The “car” refers specifically to the sun’s chariot in classical mythology, not the youth’s body."}, {"text": "A heavy cart laden with the burdens of old age.", "isCorrect": false, "rationale": "No cart of burdens is described; the car is the mythological solar chariot."}], "id": "q08"}, {"question": "What classical allusion does the sun-chariot imagery invoke?", "options": [{"text": "Icarus, who flew too close to the sun on wax wings.", "isCorrect": false, "rationale": "Icarus flew toward the sun but did not drive its chariot; the allusion here is to the sun’s driver."}, {"text": "The myth of Phoebus Apollo (or Sol) driving the sun’s chariot across the sky each day.", "isCorrect": true, "rationale": "In classical myth, the sun was driven by Phoebus Apollo (or the sun-god Sol) in a fiery chariot; Shakespeare’s “weary car” and “golden pilgrimage” evoke this tradition."}, {"text": "Prometheus, who stole fire from the sun to give to humanity.", "isCorrect": false, "rationale": "Prometheus stole fire from the gods, not from the sun’s chariot; the myth of the chariot driver is Phaethon/Apollo."}, {"text": "Narcissus, who gazed at his own reflection in a pool of sunlight.", "isCorrect": false, "rationale": "Narcissus gazed into water, not sunlight; the classical reference in Sonnet VII is to the solar chariot tradition."}], "id": "q09"}, {"question": "How does the poem’s shift from “the gracious light” to “feeble age” serve the procreation argument?", "options": [{"text": "It shows that even the most powerful things decay, making all earthly effort pointless.", "isCorrect": false, "rationale": "Nihilism is not the conclusion; the poem argues for a solution (having a son), not resignation."}, {"text": "It demonstrates through vivid analogy that even the most magnificent life arc ends in neglect, making the need for a son both concrete and urgent.", "isCorrect": true, "rationale": "By watching the universally adored sun decline into abandonment, the reader viscerally grasps the fate awaiting the youth — and the urgency of having a “son” who will rise after him (with the pun on sun/son strongly implied)."}, {"text": "It argues that old age is shameful and must be avoided through rigorous self-care.", "isCorrect": false, "rationale": "No lifestyle prescription for avoiding old age is made; the point is that old age is inevitable but death without legacy is avoidable."}, {"text": "It presents death as a peaceful end that follows a life well lived.", "isCorrect": false, "rationale": "The setting sun’s abandonment is presented as a fate to be avoided by reproduction, not accepted peacefully."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
