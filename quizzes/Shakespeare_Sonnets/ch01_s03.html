var QUESTIONS = [{"question": "Who registered Shake-speares Sonnets with the Stationers' Company in 1609?", "options": [{"text": "William Shakespeare himself", "isCorrect": false, "rationale": "The source states Shakespeare appears to have had nothing publicly to do with the publication; the registrant was Thomas Thorpe."}, {"text": "Thomas Thorpe, a London stationer", "isCorrect": true, "rationale": "The source states that on a spring day in 1609, a London stationer named Thomas Thorpe registered the new book with the Stationers' Company."}, {"text": "George Eld, the printer", "isCorrect": false, "rationale": "George Eld printed the quarto but it was Thomas Thorpe who registered it and is identified as 'T.T.' in the dedication."}, {"text": "Henry Wriothesley, the Earl of Southampton", "isCorrect": false, "rationale": "Southampton is a candidate for the Fair Youth; it was Thomas Thorpe who registered the sonnets."}]}, {"question": "What else was included in the 1609 quarto besides the 154 sonnets?", "options": [{"text": "A preface by Ben Jonson and a glossary of archaic terms", "isCorrect": false, "rationale": "The source does not mention a Ben Jonson preface or glossary; the additional item was a longer poem."}, {"text": "A longer poem called A Lover's Complaint", "isCorrect": true, "rationale": "The source states the volume contained 154 sonnets followed by a longer poem, A Lover's Complaint."}, {"text": "A prose dedication from Shakespeare explaining the sequence", "isCorrect": false, "rationale": "The source notes that Shakespeare himself made no comment on the publication; there is no prose dedication from Shakespeare."}, {"text": "Two short plays and a verse epistle to Southampton", "isCorrect": false, "rationale": "No plays are mentioned as part of the quarto; it contained the sonnets and A Lover's Complaint."}]}, {"question": "Where was the 1609 quarto sold?", "options": [{"text": "At the Globe Theatre's bookstall", "isCorrect": false, "rationale": "The source places the sale at booksellers' stalls in St Paul's Churchyard, not at the Globe."}, {"text": "At two booksellers' stalls in St Paul's Churchyard", "isCorrect": true, "rationale": "The source states the quarto was sold from two booksellers' stalls in St Paul's Churchyard, the heart of the London book trade."}, {"text": "Exclusively by private sale to noble patrons", "isCorrect": false, "rationale": "The source describes public booksellers' stalls, not private noble sales."}, {"text": "At the Stationers' Hall by Thomas Thorpe directly", "isCorrect": false, "rationale": "The source identifies St Paul's Churchyard as the point of sale, not Stationers' Hall."}]}, {"question": "What do the initials 'T. T.' in the dedication to the 1609 Quarto stand for?", "options": [{"text": "Thomas Thorpe, the stationer who registered and published the volume", "isCorrect": true, "rationale": "The source confirms that 'T. T.' is Thomas Thorpe himself, the stationer who registered the book."}, {"text": "The Tamburlaine Theatre, a playing company of the period", "isCorrect": false, "rationale": "No such company is mentioned; 'T. T.' is clearly identified as Thomas Thorpe in the source."}, {"text": "A coded reference to the two dedicatees, who both had the same initials", "isCorrect": false, "rationale": "The source identifies 'T. T.' simply as Thomas Thorpe; there is no such coding."}, {"text": "Thomas Tallis, the composer who set several sonnets to music", "isCorrect": false, "rationale": "Thomas Tallis is not mentioned in the source; 'T. T.' is Thomas Thorpe."}]}, {"question": "What does the word 'begetter' in the dedication mean, and why is its interpretation significant?", "options": [{"text": "It means the printer of the volume, pointing to George Eld as the key figure.", "isCorrect": false, "rationale": "The source does not propose Eld as the 'begetter'; the debate is whether 'begetter' means the inspirer of the sonnets or the procurer of the manuscript."}, {"text": "It unambiguously means the person who inspired the sonnets, pointing to the Fair Youth.", "isCorrect": false, "rationale": "The source presents 'begetter' as ambiguous — it could mean inspirer or procurer of the manuscript — not as unambiguous."}, {"text": "It is ambiguous: it could mean the person who inspired the sonnets (pointing to the Fair Youth) or the person who procured the manuscript for Thorpe.", "isCorrect": true, "rationale": "The source explains the crux: 'begetter' might point to the poems' subject (the Fair Youth) or to a literary middleman who obtained the manuscript, and this ambiguity has major interpretive consequences."}, {"text": "It means the financial backer who paid for the publication, pointing to a wealthy patron.", "isCorrect": false, "rationale": "The source does not offer this interpretation; the debate is between 'inspirer of the poems' and 'procurer of the manuscript.'"}]}, {"question": "What are the two most persistently advocated candidates for 'Mr. W. H.'?", "options": [{"text": "Christopher Marlowe and Ben Jonson", "isCorrect": false, "rationale": "Marlowe and Jonson are discussed as candidates for the Rival Poet, not for 'Mr. W. H.'"}, {"text": "Henry Wriothesley, Earl of Southampton, and William Herbert, Earl of Pembroke", "isCorrect": true, "rationale": "The source names these two as the most persistently advocated candidates: Southampton (initials reversed to W.H.) and Pembroke (initials align directly)."}, {"text": "Philip Sidney and Edmund Spenser", "isCorrect": false, "rationale": "Sidney and Spenser are mentioned in the context of the sonnet tradition, not as candidates for Mr. W. H."}, {"text": "George Chapman and Robert Greene", "isCorrect": false, "rationale": "Chapman is proposed as a candidate for the Rival Poet, and Greene is mentioned in connection with Shakespeare's arrival in London; neither is proposed as Mr. W. H."}]}, {"question": "How do William Herbert's initials differ from Henry Wriothesley's in relation to the dedication?", "options": [{"text": "Herbert's initials W. H. align directly with the dedication without any reversal; Wriothesley's require reversing his first and family name.", "isCorrect": true, "rationale": "The source explains that Wriothesley's initials require the reversal of first and family name to produce W.H., while Herbert's initials align perfectly without any reversal."}, {"text": "Both sets of initials align perfectly with W. H. without requiring any adjustment.", "isCorrect": false, "rationale": "The source notes the difference: Wriothesley requires reversal while Herbert aligns directly."}, {"text": "Wriothesley's initials align directly; Herbert's require the addition of a middle name.", "isCorrect": false, "rationale": "The source states the opposite: it is Wriothesley who requires reversal, not Herbert."}, {"text": "Neither set of initials actually matches W. H.; both require significant interpolation.", "isCorrect": false, "rationale": "Herbert's initials align perfectly; the source does not say both require significant interpolation."}]}, {"question": "Which sonnets are addressed to or concern the Fair Youth?", "options": [{"text": "Sonnets 1–17 only", "isCorrect": false, "rationale": "Sonnets 1–17 are the procreation sonnets urging the youth to marry and have children, but the Fair Youth sequence extends to Sonnet 126."}, {"text": "Sonnets 1–126 (with some ambiguous exceptions)", "isCorrect": true, "rationale": "The source states the first 126 sonnets — with some ambiguous exceptions — address or concern the beautiful young man conventionally called the Fair Youth."}, {"text": "Sonnets 127–154", "isCorrect": false, "rationale": "Sonnets 127–154 concern the Dark Lady; the Fair Youth sequence occupies the first 126 sonnets."}, {"text": "Sonnets 78–126 only, beginning with the Rival Poet section", "isCorrect": false, "rationale": "The Fair Youth sequence begins at Sonnet 1, not 78; the Rival Poet sonnets (roughly 78–86) are a subset within the larger sequence."}]}, {"question": "How does the source describe the emotional registers of the Fair Youth sonnets?", "options": [{"text": "They are uniformly reverent and idealistic in tone throughout.", "isCorrect": false, "rationale": "The source describes varied and sometimes contradictory registers — tender and despairing, angry and self-abasing, playful and desolate — not uniform reverence."}, {"text": "They are varied and sometimes contradictory: tender and despairing, angry and self-abasing, playful and desolate.", "isCorrect": true, "rationale": "The source explicitly lists these varied emotional registers: tender and despairing, angry and self-abasing, playful and desolate."}, {"text": "They are consistently cooler and more intellectual than the Dark Lady sonnets.", "isCorrect": false, "rationale": "The source says the Fair Youth sonnets are 'often idealistic' compared to the Dark Lady sonnets' self-laceration, but it does not describe them as uniformly cool or intellectual."}, {"text": "They move from joyful celebration in the first half to bitter resentment in the second half.", "isCorrect": false, "rationale": "The source does not describe this neat emotional arc; the registers are described as varied and contradictory throughout."}]}, {"question": "How does the source characterise the Dark Lady sonnets compared to the Fair Youth poems?", "options": [{"text": "The Dark Lady sonnets are warmer and more intimate, reflecting a genuine love relationship.", "isCorrect": false, "rationale": "The source describes the Dark Lady sonnets as self-lacerating and shot through with bitterness — the opposite of warm."}, {"text": "The Dark Lady sonnets are self-lacerating, sometimes misogynistic in their fury, and shot through with the bitterness of a man who hates his own desire.", "isCorrect": true, "rationale": "The source states the Dark Lady sonnets have a very different emotional temperature, being self-lacerating, sometimes misogynistic in their fury, and shot through with bitterness."}, {"text": "The Dark Lady sonnets are playful and ironic, using wit to deflect genuine emotion.", "isCorrect": false, "rationale": "The source does not describe the Dark Lady sonnets as playful; it emphasises their tormented, self-lacerating quality."}, {"text": "The Dark Lady sonnets are more formally experimental than the Fair Youth poems.", "isCorrect": false, "rationale": "The source focuses on the difference in emotional temperature, not formal experimentation."}]}, {"question": "Who is the most compelling candidate proposed for the Rival Poet, and why?", "options": [{"text": "Ben Jonson, because he was Shakespeare's closest theatrical collaborator.", "isCorrect": false, "rationale": "Jonson is mentioned as a candidate but not as the most compelling one; the source names Christopher Marlowe as the most compelling."}, {"text": "Philip Sidney, because he was the greatest sonneteer of the previous generation.", "isCorrect": false, "rationale": "Sidney is discussed in relation to the sonnet tradition generally; he is not proposed as the Rival Poet."}, {"text": "Christopher Marlowe, because he was Shakespeare's great contemporary rival, a university man, and his high-flown rhetoric matches the sonnets' descriptions of a 'strained touches' style.", "isCorrect": true, "rationale": "The source identifies Marlowe as the most compelling candidate, citing his rivalry with Shakespeare, his university education, his possible dealings with informers, and his rhetorical style matching the description in Sonnet 86."}, {"text": "George Chapman, because he translated Homer and is directly named in Sonnet 86.", "isCorrect": false, "rationale": "Chapman is mentioned as a proposed candidate but not as the most compelling one; the source names Marlowe as the most compelling. Chapman is not directly named in Sonnet 86 in the source's account."}]}, {"question": "What does Sonnet 130 do that the source highlights as a self-conscious literary performance?", "options": [{"text": "It abandons the fourteen-line form to write a free-verse lament.", "isCorrect": false, "rationale": "The source discusses Sonnet 130 as an example of literary self-consciousness, but describes its use of content, not an abandonment of the sonnet form."}, {"text": "It parodies the Petrarchan blazon by refusing to compare his mistress to the sun, coral, roses, and snow, then turns the tables in the couplet.", "isCorrect": true, "rationale": "The source states Sonnet 130 'parodies the Petrarchan blazon by refusing to compare his mistress to the sun, coral, roses, and snow,' only to turn the tables in the couplet, demonstrating self-conscious literary performance."}, {"text": "It directly names the Dark Lady by her first name, breaking all conventions of anonymity.", "isCorrect": false, "rationale": "The Dark Lady is never directly named in the sonnets or in the source's discussion; Sonnet 130 is notable for a different reason."}, {"text": "It addresses the reader directly rather than the beloved, breaking the dramatic convention of the sequence.", "isCorrect": false, "rationale": "The source describes Sonnet 130 as a parody of Petrarchan conventions, not as a direct address to the reader."}]}, {"question": "Why was the 1609 Quarto not reprinted until 1640, according to the source?", "options": [{"text": "The original printing was destroyed in the Great Fire of London.", "isCorrect": false, "rationale": "The Great Fire was in 1666, well after the 1640 reprint; the source does not give this reason."}, {"text": "The source says the sonnets sank from view fairly quickly after initial publication, and when reprinted in 1640 it was in a bowdlerised form with pronouns changed.", "isCorrect": true, "rationale": "The source states the publication 'seems to have sunk from view fairly quickly' and that the 1640 reprint appeared in a bowdlerised form with many pronouns changed to obscure the male-to-male address."}, {"text": "Thomas Thorpe owned the copyright and refused to license a reprint until his death.", "isCorrect": false, "rationale": "The source does not mention copyright disputes with Thorpe as the reason; it describes the sonnets sinking from view."}, {"text": "Shakespeare's family actively suppressed the quarto because of its personal revelations.", "isCorrect": false, "rationale": "The source does not mention family suppression; the sonnets simply seem to have sunk from view after publication."}]}, {"question": "Which Romantic-era figures does the source credit with elevating the sonnets to canonical status?", "options": [{"text": "Byron, who called them the greatest poems in English, and Shelley, who wrote a verse tribute to them.", "isCorrect": false, "rationale": "Byron and Shelley are not mentioned in the source; the Romantic figures credited are Wordsworth and Keats."}, {"text": "Wordsworth, who called them the key that unlocked Shakespeare's heart, and Keats, who found in them a model for 'negative capability.'", "isCorrect": true, "rationale": "The source credits Wordsworth ('the key that unlocked Shakespeare's heart') and Keats (who found in them a model for the 'negative capability' he most admired) with launching the sonnets' ascent to canonical status."}, {"text": "Coleridge, who wrote a famous lecture on the sonnets, and Hazlitt, who praised their psychological depth.", "isCorrect": false, "rationale": "Coleridge and Hazlitt are not mentioned in this context; the source credits Wordsworth and Keats."}, {"text": "Goethe, who translated them into German, and Victor Hugo, who championed them in France.", "isCorrect": false, "rationale": "Goethe and Hugo are not mentioned in the source; the Romantic-era advocates named are Wordsworth and Keats."}]}, {"question": "What is Emilia Lanier's connection to the Dark Lady debate?", "options": [{"text": "She was Shakespeare's neighbour in Stratford and is thought to have inspired the sonnets during the 'lost years.'", "isCorrect": false, "rationale": "The source does not place Lanier in Stratford; she moved in court and theatrical London circles."}, {"text": "She has been championed as a candidate because of her Italian descent (possibly explaining 'dark' colouring), her court and theatrical connections, and her status as a poet in her own right.", "isCorrect": true, "rationale": "The source states Emilia Lanier has been championed by A.L. Rowse and others: she was of Italian descent, moved in court and theatrical circles, and was a woman of intelligence and literary ambition."}, {"text": "She is definitively identified as the Dark Lady by the discovery of a letter naming her.", "isCorrect": false, "rationale": "The source explicitly states 'the honest answer is that we do not know, and may never know'; no definitive identification has been made."}, {"text": "She was the mistress of Thomas Thorpe and is thought to have supplied him with the manuscript.", "isCorrect": false, "rationale": "The source identifies Lanier as the mistress of Lord Hunsdon, patron of the Lord Chamberlain's Men, not as connected to Thorpe."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
