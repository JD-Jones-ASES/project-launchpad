<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXXVI</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker ask the mistress's soul to do in the opening lines?", "options": [{"text": "To forgive him for his many faults", "isCorrect": false, "rationale": "He is not asking forgiveness; he is asking her soul to accept a convenient fiction."}, {"text": "To swear that he (her Will) was admitted — because will, the soul knows, is always allowed in", "isCorrect": true, "rationale": "'Swear to thy blind soul that I was thy Will, / And will, thy soul knows, is admitted there' — he asks her to let her soul declare him her Will, using the logic that will/desire always finds admission."}, {"text": "To acknowledge his superiority over all other suitors", "isCorrect": false, "rationale": "No claim of superiority is made; he asks for inclusion, not preferential status."}, {"text": "To forget all previous wrongs between them", "isCorrect": false, "rationale": "No request for forgiveness or forgetting appears."}], "id": "q01"}, {"question": "What does the phrase 'thy blind soul' suggest about how the speaker views the soul's role here?", "options": [{"text": "That the mistress is spiritually blind to goodness", "isCorrect": false, "rationale": "The blindness is about not scrutinizing too closely, not a moral failing."}, {"text": "That the soul can be conveniently ignorant of what it admits — it need not investigate too carefully", "isCorrect": true, "rationale": "'Blind' here means willfully unseeing or uncritical. The soul need not examine whether this Will is the right one; it only needs to declare him admitted, since will is always welcome."}, {"text": "That the soul cannot perceive spiritual truth", "isCorrect": false, "rationale": "The blindness is strategic/convenient, not a theological claim about spiritual perception."}, {"text": "That love makes the soul literally unable to see", "isCorrect": false, "rationale": "The blindness is asked of the soul as a favor, not a condition of love."}], "id": "q02"}, {"question": "The argument 'among a number one is reckon'd none' is used to what end?", "options": [{"text": "To argue that his love is unique among all her suitors", "isCorrect": false, "rationale": "This argument claims the opposite — that he is negligible among many, and so costs her nothing."}, {"text": "To argue that in a large crowd, one more is nothing — so she can admit him without loss", "isCorrect": true, "rationale": "If she already has many 'Wills,' one more is mathematically negligible. Admitting him adds nothing to what she already has, so she loses nothing by including him."}, {"text": "To lament that he is unimportant to her", "isCorrect": false, "rationale": "The argument is tactical self-effacement, not genuine lamentation of insignificance."}, {"text": "To show that numbers and counting are meaningless in love", "isCorrect": false, "rationale": "Numbers are used strategically to justify his inclusion, not dismissed as meaningless."}], "id": "q03"}, {"question": "What does 'for nothing hold me, so it please thee hold / that nothing me, a something sweet to thee' mean?", "options": [{"text": "He asks her to hold nothing back and love him fully", "isCorrect": false, "rationale": "The word 'nothing' is deployed to mean both zero value and a sweet paradox of inclusion."}, {"text": "He asks her to regard him as nothing (negligible) — but hold that nothing sweetly, making a nothing into a something", "isCorrect": true, "rationale": "A wordplay on 'nothing': consider him nothing (no weight, no trouble) — but hold that nothing dear, making him a sweet something. The nothing/something paradox turns self-deprecation into an endearment."}, {"text": "He confesses he has nothing to offer her materially", "isCorrect": false, "rationale": "The nothing is rhetorical self-minimization, not a financial admission."}, {"text": "He argues that nothingness is the highest form of love", "isCorrect": false, "rationale": "The argument is playfully tactical, not a philosophical claim about nothingness."}], "id": "q04"}, {"question": "What is the punch line of Sonnet CXXXVI's closing couplet?", "options": [{"text": "That she has always secretly loved him", "isCorrect": false, "rationale": "The couplet reveals a pun, not a confession of her love."}, {"text": "That if she makes his name her love, she loves him — because his name is Will", "isCorrect": true, "rationale": "'Make but my name thy love, and love that still, / And then thou lov'st me for my name is Will' — the couplet collapses all the puns into one: loving the word/concept 'Will' means loving him, since that is his name."}, {"text": "That will (desire) is stronger than any other force", "isCorrect": false, "rationale": "The couplet is a personal punchline about his name, not a general philosophical claim."}, {"text": "That she should love him for his poetic talent", "isCorrect": false, "rationale": "Poetry is not invoked; the argument rests entirely on his name being Will."}], "id": "q05"}, {"question": "How does Sonnet CXXXVI continue from Sonnet CXXXV?", "options": [{"text": "It abandons the Will pun and takes a more serious tone", "isCorrect": false, "rationale": "CXXXVI continues and intensifies the Will wordplay of CXXXV."}, {"text": "It extends the Will pun and applies the same logic of abundance to press for acceptance, ending with the name-pun as a clincher", "isCorrect": true, "rationale": "CXXXV introduced the pun and the sea/abundance argument; CXXXVI adds the 'blind soul' strategy, the nothing/something paradox, and the clinching punchline of his name being Will."}, {"text": "It focuses on the friend rather than the mistress", "isCorrect": false, "rationale": "CXXXVI is addressed entirely to the mistress; no friend appears."}, {"text": "It reverses the argument and concedes she has too many Wills already", "isCorrect": false, "rationale": "CXXXVI presses the same argument forward, not in reverse."}], "id": "q06"}, {"question": "What does 'Will, will fulfil the treasure of thy love' suggest?", "options": [{"text": "That desire always finds satisfaction eventually", "isCorrect": false, "rationale": "The line is more specific: his Will (both desire and himself as a person named Will) will fill — and fulfill — her love's treasury."}, {"text": "That his Will (himself and his desire) will fill her love's treasury — adding to it, not depleting it", "isCorrect": true, "rationale": "The double Will (desire/the man) will 'fulfil' — fill full — the treasure of her love, contributing to her abundance rather than costing her."}, {"text": "That she should treasure her own will above everything", "isCorrect": false, "rationale": "The subject of the fulfilling is his Will (himself/desire), not hers."}, {"text": "That willpower is the greatest treasure in love", "isCorrect": false, "rationale": "The line operates on the personal/sexual meanings of Will, not on willpower as an abstract quality."}], "id": "q07"}, {"question": "What is the dominant rhetorical mode of Sonnets CXXXV and CXXXVI taken together?", "options": [{"text": "Elegiac mourning for lost love", "isCorrect": false, "rationale": "These sonnets are not elegiac; they are actively pursuing and arguing."}, {"text": "Witty, persistent erotic persuasion through wordplay and logical argument", "isCorrect": true, "rationale": "Both sonnets press the same case: accept me. They use every available tool — triple puns, logical analogy, mathematical argument, paradox — in the service of erotic persuasion, sustained throughout by wit."}, {"text": "Bitter accusation of the mistress's faithlessness", "isCorrect": false, "rationale": "Bitterness and accusation belong to other sonnets in the sequence; CXXXV-CXXXVI are playfully confident."}, {"text": "Philosophical meditation on the nature of identity", "isCorrect": false, "rationale": "While identity (name, will, self) is implicated, the primary mode is persuasion, not meditation."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
