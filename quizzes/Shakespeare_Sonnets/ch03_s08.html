    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet VIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What puzzling behavior does Shakespeare address in the opening line?", "options": [{"text": "The youth weeps when he hears music, even though music is pleasant.", "isCorrect": false, "rationale": "The youth’s response is described as hearing music “sadly,” not necessarily weeping; the puzzle is why something delightful produces a sad response."}, {"text": "The youth hears music — which should delight him as he is “music to hear” — but listens to it sadly, a contradiction that needs explaining.", "isCorrect": true, "rationale": "The opening paradox: the youth is himself “music to hear” (his voice and presence are musical), yet he hears actual music sadly. Shakespeare uses this contradiction as a lever to introduce the harmony of family as the true music."}, {"text": "The youth refuses to play a musical instrument despite being talented.", "isCorrect": false, "rationale": "The youth’s playing ability is not mentioned; the puzzle is his emotional response to hearing music."}, {"text": "The youth only enjoys discordant music, not harmonious compositions.", "isCorrect": false, "rationale": "The sonnet says the youth hears “true concord of well-tuned sounds” sadly, not that he prefers discord."}], "id": "q01"}, {"question": "What does “Sweets with sweets war not, joy delights in joy” mean?", "options": [{"text": "People who are kind do not fight with each other.", "isCorrect": false, "rationale": "While this paraphrase is not entirely wrong, the specific meaning is about harmony: pleasant things reinforce each other rather than conflicting."}, {"text": "Pleasant things naturally harmonize with each other — so a sweet person like the youth should delight in sweet music, not be saddened by it.", "isCorrect": true, "rationale": "The logic is: if like things harmonize (“sweets war not”), then the youth, who is sweet, should delight in sweet music. His sadness at music is a natural paradox revealing an inner conflict."}, {"text": "The sweetest foods cause the most harm when consumed in excess.", "isCorrect": false, "rationale": "Food is not the subject; “sweets” here means pleasant or beautiful things, not confections."}, {"text": "Joy is incompatible with music because music arouses too many emotions.", "isCorrect": false, "rationale": "The poem argues the opposite: joy should delight in joy, suggesting music and the youth’s nature should harmonize perfectly."}], "id": "q02"}, {"question": "What does the phrase “true concord of well-tuned sounds, / By unions married” suggest about music?", "options": [{"text": "Music is produced by the union of multiple voices or instruments in harmony, just as marriage produces a harmonious household.", "isCorrect": true, "rationale": "The word “married” is key: well-tuned sounds are “unions married” — united in harmony. This anticipates the sonnet’s central metaphor of the musical string as husband and wife in concord."}, {"text": "Music is best appreciated by married couples listening together.", "isCorrect": false, "rationale": "The music metaphor is about the structure of harmony (multiple parts uniting) as an analogy for family, not a recommendation for married listening habits."}, {"text": "Well-tuned instruments are preferable to voices because they are more precise.", "isCorrect": false, "rationale": "No preference between instruments and voices is stated; the point is about the principle of union in harmony."}, {"text": "Musical training requires a formal contract between pupil and teacher.", "isCorrect": false, "rationale": "No pedagogical contract is described; “married” refers to the union of musical parts in harmony."}], "id": "q03"}, {"question": "How does the music metaphor connect to the procreation argument?", "options": [{"text": "Musical harmony (many parts in union) is an analogy for family: husband, wife, and children all playing complementary roles to produce a “one pleasing note.”", "isCorrect": true, "rationale": "The lute’s strings, each “husbanding” the other, produce harmony together — just as a married couple with children form a harmonious whole. The youth’s singleness is musical discord: “confounds / In singleness the parts that thou shouldst bear.”"}, {"text": "Music preserves the memory of loved ones better than any other art form.", "isCorrect": false, "rationale": "Memory-preservation is not the argument; the music metaphor is about the harmony of family life, not commemoration."}, {"text": "The youth should become a musician to attract a wife.", "isCorrect": false, "rationale": "No career advice is given; the music is entirely metaphorical for family harmony."}, {"text": "Listening to music will cure the youth’s sadness and inspire him to marry.", "isCorrect": false, "rationale": "Therapy through music is not the argument; the music is an analogy for what the youth is missing."}], "id": "q04"}, {"question": "What does “confounds / In singleness the parts that thou shouldst bear” mean?", "options": [{"text": "The youth, by living alone (singleness), ruins the harmonious whole (family) by not playing his proper part (husband/father).", "isCorrect": true, "rationale": "“Confounds” means ruins or destroys; “parts” refers both to musical parts (voices in a harmony) and to the roles (husband, father) the youth should be playing. By remaining single, he destroys the potential harmony."}, {"text": "Singleness of purpose confuses the youth and makes him unable to make decisions.", "isCorrect": false, "rationale": "Indecision is not the subject; “parts” refers to musical and familial roles, not personal resolve."}, {"text": "The youth sings only in a single tone, lacking musical range.", "isCorrect": false, "rationale": "Literal singing ability is not the subject; the single “part” is a metaphor for singleness in life."}, {"text": "The youth’s many parts (qualities) are confused and cannot find expression.", "isCorrect": false, "rationale": "While the youth has many qualities, “parts” here specifically means the musical/social roles he should play as part of a family unit."}], "id": "q05"}, {"question": "What does “Mark how one string, sweet husband to another” describe?", "options": [{"text": "A lute string that vibrates in sympathy with an adjacent string, creating resonance — like a husband supporting a wife.", "isCorrect": true, "rationale": "Adjacent strings on a lute vibrate sympathetically when one is plucked (“strikes each in each by mutual ordering”); Shakespeare calls one string “sweet husband to another,” directly linking musical resonance to marital partnership."}, {"text": "A string that is stronger than all the others and holds the instrument together.", "isCorrect": false, "rationale": "No hierarchy of strings is implied; the relationship is mutual and equal — like a good marriage."}, {"text": "A musician who plays so skillfully that his instrument seems to be his spouse.", "isCorrect": false, "rationale": "The strings themselves are compared to spouses, not the musician."}, {"text": "A metaphor for how two poems can be paired to create a greater effect.", "isCorrect": false, "rationale": "Literary pairing is not the subject; the strings represent husband and wife in a family."}], "id": "q06"}, {"question": "How does the image “Resembling sire and child and happy mother, / Who, all in one, one pleasing note do sing” resolve the poem’s central argument?", "options": [{"text": "The family — father, child, and mother — is compared to a chord of harmonizing voices: together they produce a “one pleasing note” that no single voice could achieve alone.", "isCorrect": true, "rationale": "The family as a musical chord is the poem’s resolution: just as a chord requires multiple notes in harmony, a family requires the union of sire, mother, and child. The youth alone can only be one voice, unable to make a chord."}, {"text": "A choir of singers represents the many generations of descendants the youth might have.", "isCorrect": false, "rationale": "A large choir is not the image; the harmony described is specifically of sire, child, and mother — the nuclear family unit."}, {"text": "A happy family represents the highest form of earthly art, superior even to music.", "isCorrect": false, "rationale": "The family does not surpass music in the comparison; it is compared to music as equally harmonious."}, {"text": "The poet, the youth, and a future patron together create a harmonious literary work.", "isCorrect": false, "rationale": "No literary triangle is described; the sire, child, and mother are family members, not literary figures."}], "id": "q07"}, {"question": "What does the couplet mean: “Whose speechless song being many, seeming one, / Sings this to thee: ‘Thou single wilt prove none.’”", "options": [{"text": "The harmonious family “sings” (communicates) a silent but powerful message: a person who remains single ultimately counts for nothing (proves none).", "isCorrect": true, "rationale": "The family’s “speechless song” (wordless harmony) delivers the sonnet’s moral: “thou single wilt prove none” — alone, the youth amounts to nothing; only in union (family) does he become part of something that matters."}, {"text": "A person who sings alone in a choir ruins the harmony and should be removed.", "isCorrect": false, "rationale": "This misses the metaphorical level; the single voice is not a disruptive soloist but the youth living without family."}, {"text": "Silence is more meaningful than speech and carries deeper messages.", "isCorrect": false, "rationale": "“Speechless song” is an oxymoron describing the harmony of a family unit, not a general praise of silence."}, {"text": "The couplet concludes that music is ultimately meaningless because it cannot truly communicate.", "isCorrect": false, "rationale": "The opposite is true: the “speechless song” communicates the poem’s central message with great precision."}], "id": "q08"}, {"question": "What is the logical significance of calling the youth “music to hear” in line 1?", "options": [{"text": "Shakespeare compliments the youth’s singing voice before criticizing his singleness.", "isCorrect": false, "rationale": "While the phrase is a compliment, its logical function is to set up the paradox: if the youth is himself music, why does music make him sad?"}, {"text": "It establishes that the youth himself embodies harmony and beauty, making his sadness at music a paradox that reveals his inner incompleteness.", "isCorrect": true, "rationale": "If the youth is “music to hear,” he should naturally harmonize with music and delight in it. His sadness reveals that something is incomplete — he is only one note, not a chord, and his soul knows it."}, {"text": "It is a literary allusion to the medieval concept of the music of the spheres.", "isCorrect": false, "rationale": "While the music of the spheres is related to Renaissance cosmology, the line “music to hear” is a direct compliment to the youth’s personal charm, not a cosmological reference."}, {"text": "It indicates that the youth is a professional musician who has grown tired of his trade.", "isCorrect": false, "rationale": "No professional context is implied; the phrase is a praise of the youth’s personal qualities."}], "id": "q09"}, {"question": "How does Sonnet VIII differ from the other procreation sonnets in its approach?", "options": [{"text": "It abandons argument entirely and simply expresses the poet’s personal grief.", "isCorrect": false, "rationale": "The poem is still argumentative, using the music metaphor to make the procreation case; personal grief is not the tone."}, {"text": "It makes the argument through the language of aesthetic and emotional experience (music, harmony) rather than financial, legal, or natural imagery.", "isCorrect": true, "rationale": "Where earlier sonnets use economic (loans, usury) or natural (seasons, distillation) metaphors, Sonnet VIII uses musical harmony to argue that singleness is incomplete — a more emotional and aesthetic register."}, {"text": "It is the first sonnet to address the youth in the second person, making the argument more personal.", "isCorrect": false, "rationale": "The youth is addressed in the second person from Sonnet I onward; Sonnet VIII is not the first to do this."}, {"text": "It argues that music, not children, is the only true form of immortality.", "isCorrect": false, "rationale": "The opposite is true: music (family harmony) serves as a metaphor for the human family, reinforcing the procreation argument rather than replacing it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
