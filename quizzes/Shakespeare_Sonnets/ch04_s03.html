    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradoxical phrase does the speaker use to describe the beloved in line 2 of Sonnet XX?", "options": [{"text": "“Fair and false”", "isCorrect": false, "rationale": "This phrase does not appear in the sonnet; the paradox centers on the beloved’s dual nature as simultaneously masculine and feminine."}, {"text": "“Master mistress of my passion”", "isCorrect": true, "rationale": "The oxymoronic phrase “master mistress” captures the beloved’s paradoxical nature—possessing both male authority (“master”) and female grace (“mistress”) as objects of the speaker’s love."}, {"text": "“Painted beauty’s art”", "isCorrect": false, "rationale": "Painted beauty is mentioned in Sonnet XXI as a negative description of artificial praise, not here."}, {"text": "“Nature’s own creation”", "isCorrect": false, "rationale": "While Nature’s role is central to this sonnet, the paradoxical phrase used is “master mistress of my passion.”"}]}, {"question": "How does the speaker contrast the beloved’s heart with that of women?", "options": [{"text": "The beloved’s heart is colder and more calculating than a woman’s", "isCorrect": false, "rationale": "The beloved is given a “gentle heart,” not a cold one; the contrast is about constancy, not temperature."}, {"text": "The beloved has a woman’s gentle heart but without women’s inconstancy", "isCorrect": true, "rationale": "Lines 3–4: the beloved has “a woman’s gentle heart, but not acquainted / With shifting change, as is false women’s fashion”—gentle but steadfast."}, {"text": "The beloved’s heart is more passionate than any woman’s", "isCorrect": false, "rationale": "Passion is not the point of contrast; constancy versus changeability is the distinction drawn."}, {"text": "The beloved lacks the tenderness associated with women’s hearts", "isCorrect": false, "rationale": "The beloved is explicitly described as having a “gentle heart”—tenderness is present."}]}, {"question": "What literary device is central to the description of the beloved in Sonnet XX?", "options": [{"text": "Pathetic fallacy, attributing human feelings to nature", "isCorrect": false, "rationale": "Pathetic fallacy projects emotions onto natural settings; Sonnet XX focuses on the beloved’s nature, not the weather."}, {"text": "Blazon, cataloguing the beloved’s physical and moral attributes", "isCorrect": true, "rationale": "Sonnet XX uses the blazon tradition—a catalogue of the beloved’s features (face, heart, eyes, complexion)—but with the distinctive twist that the beloved is male."}, {"text": "Apostrophe, addressing an absent or abstract entity", "isCorrect": false, "rationale": "Apostrophe involves addressing something that cannot respond; here the speaker addresses the present beloved directly in description."}, {"text": "Anaphora, repeating the same phrase at the start of successive lines", "isCorrect": false, "rationale": "While some repetition exists, the sonnet’s dominant device is the catalogue of attributes, not anaphora."}]}, {"question": "What role does Nature play in the narrative of Sonnet XX?", "options": [{"text": "Nature is indifferent to the beloved and creates him by accident", "isCorrect": false, "rationale": "Nature is not indifferent; she is portrayed as deliberately and lovingly crafting the beloved, then becoming enamored."}, {"text": "Nature falls in love with the beloved while creating him and adds a male feature, defeating the speaker’s romantic purposes", "isCorrect": true, "rationale": "Lines 11–14 explain that Nature, while crafting the beloved for a woman, “fell a-doting” and added “one thing,” making him male and thus removing him from the speaker’s physical reach."}, {"text": "Nature creates the beloved to test the speaker’s love", "isCorrect": false, "rationale": "Nature’s motivation is infatuation with her own creation, not a test for the speaker."}, {"text": "Nature copies the beloved from an ideal woman’s form", "isCorrect": false, "rationale": "Nature gives the beloved a woman’s face and heart but is not described as copying an existing woman."}]}, {"question": "What does the couplet of Sonnet XX propose as the division between the speaker and women?", "options": [{"text": "The speaker will have the beloved’s soul while women enjoy his company", "isCorrect": false, "rationale": "The division is not between soul and company but between love (emotional) and use (physical)."}, {"text": "The speaker claims the beloved’s love while women may have the beloved’s physical “use”", "isCorrect": true, "rationale": "The couplet: “Mine be thy love and thy love’s use their treasure”—the speaker reserves spiritual/emotional love for himself while conceding physical intimacy to women."}, {"text": "The speaker and women will share the beloved equally", "isCorrect": false, "rationale": "The couplet distinguishes two different types of relationship rather than proposing equal sharing."}, {"text": "Women will admire the beloved’s appearance while the speaker admires his intellect", "isCorrect": false, "rationale": "The division drawn is between love and “use” (physical pleasure), not between appearance and intellect."}]}, {"question": "The phrase “a man in hue all ‘hues’ in his controlling” suggests:", "options": [{"text": "The beloved can change his physical appearance at will", "isCorrect": false, "rationale": "The line suggests that the beloved’s presence affects and dominates the perception of everyone around him, not that he shapeshifts."}, {"text": "The beloved’s masculine appearance commands the attention and admiration of all people", "isCorrect": true, "rationale": "The beloved’s form (“hue” meaning appearance or complexion) controls or outshines all other appearances, making him the center of all eyes and desires."}, {"text": "The beloved is a painter who creates colorful works of art", "isCorrect": false, "rationale": "The beloved is not described as an artist; “hue” refers to complexion or outward appearance."}, {"text": "The beloved struggles to control his passions", "isCorrect": false, "rationale": "The line is about the beloved’s control over others’ attention, not his own emotional self-control."}]}, {"question": "What does the speaker mean by “Nature… by addition me of thee defeated”?", "options": [{"text": "Nature improved the beloved by giving him extra gifts, making him too perfect", "isCorrect": false, "rationale": "While Nature did add something, the emphasis is not on perfection but on the speaker’s thwarted purpose."}, {"text": "Nature’s act of making the beloved male removed him from the possibility of romantic union with the (implicitly male) speaker", "isCorrect": true, "rationale": "“By adding one thing to my purpose nothing”—Nature’s addition of male genitalia defeated the speaker’s romantic purpose by placing the beloved outside conventional female roles."}, {"text": "Nature defeated the speaker by making him fall in love with someone unattainable", "isCorrect": false, "rationale": "While unattainability is implied, the specific mechanism is Nature’s addition making the beloved male."}, {"text": "Nature tricked the speaker by disguising a woman as a man", "isCorrect": false, "rationale": "There is no disguise; Nature originally intended the beloved to be a woman but changed course."}]}, {"question": "The beloved’s eye is described as “less false in rolling” compared to women’s eyes. What does this mean?", "options": [{"text": "The beloved’s eyes are less mobile because of physical difference", "isCorrect": false, "rationale": "The comparison is moral, not physical; “rolling” refers to flirtatious glancing, not eye mobility."}, {"text": "The beloved’s gaze is more honest and less flirtatious than women’s wandering eyes", "isCorrect": true, "rationale": "“Rolling” was a term for flirtatious or deceptive glancing; the beloved’s eyes are bright like women’s but more sincere and less given to false signals."}, {"text": "The beloved’s eyes are physically larger and more luminous", "isCorrect": false, "rationale": "While brightness is mentioned, “false in rolling” concerns honesty of gaze, not physical size."}, {"text": "The beloved rarely makes eye contact, showing proper modesty", "isCorrect": false, "rationale": "Avoiding eye contact is not the meaning; the line contrasts sincere gazing with flirtatious rolling."}]}, {"question": "Sonnet XX is unusual in the sequence because:", "options": [{"text": "It is written in a different meter from all other sonnets", "isCorrect": false, "rationale": "The sonnet follows iambic pentameter like the others; its distinctiveness lies in content and rhyme, not meter."}, {"text": "Every line ends in a feminine rhyme (an extra unstressed syllable)", "isCorrect": true, "rationale": "Sonnet XX uniquely uses feminine endings throughout—each line has 11 syllables with a soft extra syllable—reinforcing the theme of the beloved’s dual nature by giving the verse itself a “feminine” quality."}, {"text": "It contains no metaphors or similes", "isCorrect": false, "rationale": "The sonnet uses both metaphor and the blazon form; its uniqueness is its feminine rhyme scheme."}, {"text": "It is the only sonnet addressed directly to a woman", "isCorrect": false, "rationale": "Sonnet XX is addressed to the Fair Youth (male), not a woman."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
