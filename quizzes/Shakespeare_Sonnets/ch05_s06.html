    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What rhetorical question opens Sonnet XXXVIII, and what does it imply?", "options": [{"text": "It asks why the beloved does not write back, implying neglect", "isCorrect": false, "rationale": "The beloved's silence toward the speaker is not the subject; the question concerns the speaker's ability to write."}, {"text": "It asks how the Muse could lack subjects while the beloved breathes — implying the beloved is an inexhaustible source of poetic inspiration", "isCorrect": true, "rationale": "“How can my Muse want subject to invent, / While thou dost breathe” — as long as the beloved is alive, poetic material is abundantly available; the beloved's existence guarantees the poet's inspiration."}, {"text": "It asks whether the speaker's poems are worthy of the beloved's notice", "isCorrect": false, "rationale": "While worthiness is touched on (“Worthy perusal”), the opening question is about the abundance of inspiration, not the poems' merit."}, {"text": "It asks why other poets fail to capture the beloved's qualities", "isCorrect": false, "rationale": "Line 9 (“who's so dumb that cannot write to thee”) does address others' ability, but the opening question is about the speaker's own creative wellspring."}]}, {"question": "What does “vulgar paper” (line 6) mean in this context?", "options": [{"text": "Offensive or obscene writing", "isCorrect": false, "rationale": "“Vulgar” in Elizabethan English means common or ordinary, not rude or offensive."}, {"text": "Common, ordinary writing unworthy of repeating the beloved's excellence", "isCorrect": true, "rationale": "The beloved's qualities are “too excellent / For every vulgar paper to rehearse” — ordinary writings cannot do justice to such extraordinary worth; only elevated verse is adequate."}, {"text": "A cheap type of paper made for common people", "isCorrect": false, "rationale": "The type of physical paper is not the point; “vulgar paper” refers to everyday writing, not the material it is written on."}, {"text": "A newspaper or broadsheet that might publish gossip", "isCorrect": false, "rationale": "Newspapers in the modern sense did not exist in Shakespeare's time; “paper” means written composition, not periodical journalism."}]}, {"question": "What does the speaker claim in lines 7-8 about credit for anything good in his verse?", "options": [{"text": "The speaker claims all the credit for his poetic skill", "isCorrect": false, "rationale": "The speaker explicitly attributes credit to the beloved, not to himself."}, {"text": "Any merit in the verse belongs to the beloved, since the beloved provides the light of invention", "isCorrect": true, "rationale": "“O! give thyself the thanks, if aught in me / Worthy perusal stand against thy sight” — the speaker deflects praise entirely to the beloved, acknowledging that what readers find valuable in his poetry originates from the beloved's inspiring presence."}, {"text": "Both speaker and beloved share the credit equally", "isCorrect": false, "rationale": "The couplet's division is clearer: the pain of composition is the speaker's, but the praise goes entirely to the beloved — not a 50/50 split."}, {"text": "The nine Muses deserve credit for all great poetry", "isCorrect": false, "rationale": "The nine Muses are mentioned as inferior to the beloved, not as deserving of credit."}]}, {"question": "Why does the speaker call the beloved the “tenth Muse”?", "options": [{"text": "Because the beloved is the least important of all the Muses", "isCorrect": false, "rationale": "The speaker says the beloved is “ten times more in worth / Than those old nine” — the superlative, not the least."}, {"text": "Because the beloved surpasses all nine classical Muses in creative worth and inspiration", "isCorrect": true, "rationale": "Classical mythology recognized nine Muses; by naming the beloved a tenth — and ten times more valuable than those nine — the speaker elevates the beloved above all traditional sources of divine inspiration, making this person uniquely and supremely inspirational."}, {"text": "Because the beloved can play ten musical instruments", "isCorrect": false, "rationale": "Musical skill is not the subject; the “tenth Muse” is a metaphor for unparalleled poetic inspiration."}, {"text": "Because the beloved is a composite of all ten ancient goddesses of the arts", "isCorrect": false, "rationale": "Classical tradition acknowledged nine, not ten, Muses; the speaker invents a tenth as the beloved, surpassing the traditional nine."}]}, {"question": "What are “eternal numbers” (line 14)?", "options": [{"text": "Mathematical calculations that never end", "isCorrect": false, "rationale": "“Numbers” in poetry means verses or metrical lines; “eternal numbers” are poems that will outlast time."}, {"text": "Verses of poetry that will outlive time", "isCorrect": true, "rationale": "In Elizabethan usage “numbers” means poetic verse; “eternal numbers” are immortal poems — those that “outlive long date,” meaning they transcend even the longest span of time."}, {"text": "The vast number of poems already written about the beloved", "isCorrect": false, "rationale": "The phrase refers to the quality and immortality of future poetry inspired by the beloved, not to quantity already produced."}, {"text": "Religious scripture considered eternally valid", "isCorrect": false, "rationale": "No religious scripture is referenced; the eternal numbers are secular poetry made immortal through the beloved's inspiring influence."}]}, {"question": "What is the volta in Sonnet XXXVIII and what shift does it mark?", "options": [{"text": "Line 9 shifts from praise of the beloved to gentle mockery", "isCorrect": false, "rationale": "Line 9 continues the celebration; “who's so dumb that cannot write to thee” is a compliment, not mockery."}, {"text": "The couplet shifts from celebrating the beloved's inspiration to dividing labor: the speaker bears the effort while the beloved gets the glory", "isCorrect": true, "rationale": "“If my slight Muse do please these curious days, / The pain be mine, but thine shall be the praise” — the preceding twelve lines develop how the beloved inspires; the couplet turns to assign roles: the speaker does the creative work, but the beloved earns the credit."}, {"text": "Line 11 shifts from the beloved as Muse to Apollo as true inspiration", "isCorrect": false, "rationale": "Apollo is not mentioned; the shift to praising the beloved as tenth Muse continues through the sestet."}, {"text": "Line 3 shifts from asking a question to asserting an answer", "isCorrect": false, "rationale": "Line 3 is part of the same rhetorical question's elaboration, not a separate shift."}]}, {"question": "The phrase “thine own sweet argument” (line 3) means:", "options": [{"text": "The beloved's own logical debate skills", "isCorrect": false, "rationale": "“Argument” here is not about debate; it is used in the sense of subject matter or theme."}, {"text": "The beloved is himself the sweet subject matter that the poet pours into verse", "isCorrect": true, "rationale": "In Elizabethan usage “argument” means subject, theme, or subject matter (as in the “argument” of an epic poem). The beloved pours “thine own sweet argument” into the verse — meaning the beloved's own beautiful nature is the poem's subject."}, {"text": "The pleasant debate the two lovers have together", "isCorrect": false, "rationale": "A conversation between the two is not described; the argument is the content the beloved supplies to the speaker's poetry."}, {"text": "A persuasive letter the beloved has written to the speaker", "isCorrect": false, "rationale": "No letter is referenced; “argument” means the subject poured into verse."}]}, {"question": "How does the speaker in Sonnet XXXVIII position himself in relation to the beloved?", "options": [{"text": "As the beloved's superior, bestowing immortality through his skill", "isCorrect": false, "rationale": "The speaker attributes the worthiness of his verse entirely to the beloved and explicitly denies personal credit — not a position of superiority."}, {"text": "As a craftsman who bears the labor while the beloved provides the light and receives the glory", "isCorrect": true, "rationale": "The couplet crystallizes this: “The pain be mine, but thine shall be the praise” — the speaker is the worker, the beloved the muse and recipient of all honor; a relationship of inspired servant to divine subject."}, {"text": "As the beloved's equal partner in a collaborative creative project", "isCorrect": false, "rationale": "The division is not equal; the speaker does the work while the beloved gets the praise."}, {"text": "As a competitor trying to write better than other poets who also love the beloved", "isCorrect": false, "rationale": "Competition with other poets is noted later in the Rival Poet sonnets; here the focus is the speaker's own position of grateful service."}]}, {"question": "The phrase “curious days” (line 15) refers to:", "options": [{"text": "Days of strange or inexplicable weather", "isCorrect": false, "rationale": "The weather metaphor from earlier sonnets is not operative here; “curious” applies to the reading public's discernment."}, {"text": "The present age of sophisticated, critical readers", "isCorrect": true, "rationale": "“Curious” in Elizabethan English can mean fastidious, discriminating, or given to careful scrutiny; “curious days” means this critical age in which readers are hard to please — making the speaker's slight Muse's success conditional on the beloved's superior inspiration."}, {"text": "Days of particular curiosity about astrological events", "isCorrect": false, "rationale": "Astrology is not referenced; the curiosity belongs to the reading public's literary taste."}, {"text": "Unusual calendar days such as feast days or holidays", "isCorrect": false, "rationale": "No feast or holiday days are referenced; the “days” are the current literary era."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
