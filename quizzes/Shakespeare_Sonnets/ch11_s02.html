    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central analogy that opens Sonnet CXVIII?", "options": [{"text": "A musician tuning an instrument to find its true pitch", "isCorrect": false, "rationale": "Music is not the analogy; the sonnet opens with eating and medicine."}, {"text": "Sharpening appetite with bitter compounds and purging to prevent sickness", "isCorrect": true, "rationale": "Lines 1-4 compare seeking variety to stimulating appetite with sharp sauces and to purging as a preventive medicine."}, {"text": "A sailor using storms to test the seaworthiness of his vessel", "isCorrect": false, "rationale": "Sailing does not appear in this sonnet; the analogies are culinary and medical."}, {"text": "A soldier who provokes enemies in order to practice his skills", "isCorrect": false, "rationale": "Military imagery is not used in Sonnet CXVIII."}]}, {"question": "The phrase 'ne'er-cloying sweetness' (line 7) describes:", "options": [{"text": "The bitter experiences the speaker sought elsewhere", "isCorrect": false, "rationale": "'Bitter sauces' describes the outside experiences; 'ne'er-cloying sweetness' describes the youth."}, {"text": "The youth's love, which never loses its appeal despite the speaker's fullness", "isCorrect": true, "rationale": "The speaker was 'full of' the youth's sweetness that never cloys — yet perversely sought bitterness, just as a full stomach craves sharp flavors."}, {"text": "The flattery of new acquaintances that tempted the speaker", "isCorrect": false, "rationale": "Others' flattery is not described as sweet; the sweetness belongs to the youth."}, {"text": "The pleasure of writing poetry after a long absence", "isCorrect": false, "rationale": "Poetry-writing is not the subject of this culinary metaphor."}]}, {"question": "What does 'sick of welfare' (line 9) mean in context?", "options": [{"text": "Ill from poverty and hardship", "isCorrect": false, "rationale": "'Welfare' here means well-being, not financial assistance; the speaker is ill from excess of happiness, not poverty."}, {"text": "Surfeited or wearied by too much well-being and happiness", "isCorrect": true, "rationale": "The speaker was so saturated with the youth's goodness that he grew 'sick' of it — surfeited by prosperity, as one becomes nauseous from too much richness."}, {"text": "Morally repelled by the youth's virtuous behavior", "isCorrect": false, "rationale": "The speaker does not condemn the youth's virtue; he confesses his own perverse response to abundance."}, {"text": "Longing for the welfare of others outside the relationship", "isCorrect": false, "rationale": "The phrase describes the speaker's internal state of satiation, not concern for others."}]}, {"question": "The word 'meetness' (line 9) most nearly means:", "options": [{"text": "A formal encounter or assembly", "isCorrect": false, "rationale": "'Meetness' is an archaic noun meaning fitness or suitability, not an event."}, {"text": "Fitness, suitability, or appropriateness", "isCorrect": true, "rationale": "The speaker found a kind of 'meetness' (felt it fitting) to seek disease before true need arose — a twisted logic of preventive medicine."}, {"text": "A sense of romantic destiny", "isCorrect": false, "rationale": "The word is not romantic in this context; it refers to perceived logic or appropriateness."}, {"text": "Sadness or melancholy", "isCorrect": false, "rationale": "'Meetness' carries no emotional connotation of sadness; it means suitableness."}]}, {"question": "What is 'policy in love' (line 11) according to the speaker?", "options": [{"text": "A written agreement governing the terms of the relationship", "isCorrect": false, "rationale": "No written agreement is described; 'policy' here means calculated strategy."}, {"text": "The calculated strategy of anticipating problems before they arise", "isCorrect": true, "rationale": "The speaker's 'policy' was to pre-empt future ills by seeking out bitterness now — a misguided preventive strategy that created real faults."}, {"text": "Loyalty and devotion enforced by social obligation", "isCorrect": false, "rationale": "'Policy' is about cunning strategy, not devotion or social duty."}, {"text": "The political manipulation of the youth's affections", "isCorrect": false, "rationale": "While 'policy' can imply cunning, the context is personal preventive logic rather than manipulation of the youth."}]}, {"question": "What ironic result did the speaker's 'policy in love' produce?", "options": [{"text": "It made the youth's love grow stronger through jealousy", "isCorrect": false, "rationale": "The youth's reaction is not the focus; the irony concerns the speaker's own situation."}, {"text": "It converted a healthy state into genuine sickness by applying medicine to what was not ill", "isCorrect": true, "rationale": "Lines 12-14: the preventive strategy 'brought to medicine a healthful state' — making what was well into something requiring cure."}, {"text": "It caused the speaker to fall in love with someone else permanently", "isCorrect": false, "rationale": "No permanent new love is described; the speaker returns to the youth with a lesson learned."}, {"text": "It gave the speaker useful experience that enriched his poetry", "isCorrect": false, "rationale": "Poetic enrichment is not the lesson drawn; the speaker sees the strategy as self-destructive."}]}, {"question": "The couplet's final line — 'Drugs poison him that so fell sick of you' — means:", "options": [{"text": "The youth's love is literally toxic to the speaker", "isCorrect": false, "rationale": "The youth's love is not the poison; the speaker's own remedy-seeking is what poisons him."}, {"text": "The 'cures' the speaker sought (straying) became poison for one whose only real sickness was excess of the youth's goodness", "isCorrect": true, "rationale": "If one is 'sick' only from satiety with sweetness, applying bitter drugs (infidelity, straying) is itself the poison — the remedy was worse than the condition."}, {"text": "The speaker warns the youth never to use medicine", "isCorrect": false, "rationale": "No warning to the youth is intended; the line is the speaker's self-condemnation."}, {"text": "Others who love the youth will be destroyed by jealousy", "isCorrect": false, "rationale": "The couplet is about the speaker's own self-poisoning, not rival lovers."}]}, {"question": "The medical and culinary analogies throughout Sonnet CXVIII serve mainly to:", "options": [{"text": "Elevate the youth's love by comparing it to physical health", "isCorrect": false, "rationale": "While the youth's love is compared to sweetness and health, the primary purpose of the analogies is to explain and indict the speaker's own logic."}, {"text": "Explain the speaker's self-defeating logic of seeking bitter variety to counterbalance the youth's sweetness", "isCorrect": true, "rationale": "The analogies — appetite stimulation and preventive purging — are used to render comprehensible (if ultimately foolish) the speaker's reasoning for straying."}, {"text": "Suggest that love itself is a form of disease requiring treatment", "isCorrect": false, "rationale": "The sonnet does not argue love is a disease; it argues the speaker's strategy of prevention was the real problem."}, {"text": "Warn against the dangers of rich food and overindulgence", "isCorrect": false, "rationale": "The food and medicine are analogies, not literal health advice."}]}, {"question": "What lesson does the speaker claim to have learned from this experience?", "options": [{"text": "That absence makes the heart grow fonder", "isCorrect": false, "rationale": "This proverb is not the lesson stated; the speaker's lesson is self-condemnatory."}, {"text": "That his 'drugs' (the bitter experiences he sought) poisoned rather than protected him", "isCorrect": true, "rationale": "Line 15-16: 'thence I learn and find the lesson true, / Drugs poison him that so fell sick of you' — the cure was worse than the cause."}, {"text": "That the youth's love is ultimately stronger than any temptation", "isCorrect": false, "rationale": "The youth's strength is implied but is not the stated lesson; the lesson is about the speaker's self-destruction."}, {"text": "That prophylactic action in love is always wise", "isCorrect": false, "rationale": "The opposite is the lesson: prophylactic action proved disastrous."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
