    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Sonnet LVIII open in relation to Sonnet LVII?", "options": [{"text": "It opens with the speaker declaring his independence from the beloved.", "isCorrect": false, "rationale": "Independence is the opposite of what the speaker claims; he deepens his submission."}, {"text": "It deepens the slave metaphor of LVII, addressing the “god” who made the speaker the beloved’s slave from the beginning.", "isCorrect": true, "rationale": "The opening invokes the god who “made me first your slave” — a theological intensification of LVII’s servitude, suggesting the condition was divinely ordained."}, {"text": "It reverses the slave metaphor and claims the beloved is the slave.", "isCorrect": false, "rationale": "The reversal never occurs; the speaker remains the slave throughout."}, {"text": "It addresses a rival poet who has challenged the speaker’s devotion.", "isCorrect": false, "rationale": "No rival is addressed; the poem is between the speaker and the beloved."}]}, {"question": "What specifically does the speaker say he would not presume to do in thought?", "options": [{"text": "Write poems while the beloved is absent.", "isCorrect": false, "rationale": "Poetic composition is not the prohibited thought."}, {"text": "Control or monitor the beloved’s times of pleasure.", "isCorrect": true, "rationale": "Lines 1–2: “That god forbid, that made me first your slave, / I should in thought control your times of pleasure.” Even in thought, the speaker abjures any control over the beloved’s pleasures."}, {"text": "Question the beloved about his friendships.", "isCorrect": false, "rationale": "Questioning friendships is a concern of Sonnet LVII; here the prohibited thought is controlling the beloved’s pleasures."}, {"text": "Ask the beloved for a letter or communication.", "isCorrect": false, "rationale": "Letters are not the subject; the forbidden act is controlling the beloved’s time."}]}, {"question": "The phrase “imprison’d absence of your liberty” (line 8) is paradoxical because:", "options": [{"text": "It suggests the speaker is literally imprisoned while the beloved is free.", "isCorrect": false, "rationale": "The speaker is not literally imprisoned; the paradox is logical and emotional."}, {"text": "It describes the speaker as imprisoned by the beloved’s freedom — his suffering is caused by the beloved’s liberty to go wherever he wishes.", "isCorrect": true, "rationale": "The speaker suffers the ‘imprison’d absence’ of the beloved’s liberty: the beloved’s freedom is itself the speaker’s prison. The more freedom the beloved exercises, the more confined the speaker’s suffering."}, {"text": "It argues that liberty and imprisonment are the same thing when one is in love.", "isCorrect": false, "rationale": "The paradox is specific: the beloved’s liberty causes the speaker’s imprisonment, not that they are identical."}, {"text": "It is a reference to a literal imprisonment the beloved is suffering.", "isCorrect": false, "rationale": "The beloved is free to go where he lists; no literal imprisonment is described."}]}, {"question": "The speaker asks to suffer “patience, tame to sufferance, bide each check.” What does this mean?", "options": [{"text": "He asks for the courage to confront the beloved about his absences.", "isCorrect": false, "rationale": "Confrontation is explicitly refused; the posture is patient endurance."}, {"text": "He asks to endure each obstacle or rebuff with total patience, without accusing the beloved of injury.", "isCorrect": true, "rationale": "“Patience tame to sufferance” means a patience so complete it has been domesticated to suffering — it endures everything quietly, without complaint or accusation. ‘Check’ means a rebuff or obstacle."}, {"text": "He demands that the beloved be more patient with the speaker’s emotional needs.", "isCorrect": false, "rationale": "No demand is placed on the beloved; the patience requested is entirely the speaker’s own."}, {"text": "He asks God to give him patience to wait for divine judgment.", "isCorrect": false, "rationale": "Divine patience is not the reference; the patience is toward the beloved’s absences and checks."}]}, {"question": "Lines 11–14 argue that the beloved’s “charter” is so strong that he may:", "options": [{"text": "Command the speaker to perform any service.", "isCorrect": false, "rationale": "Commands to the speaker are not the subject; the charter gives the beloved freedom over his own time."}, {"text": "Privilege his own time entirely, go where he lists, and even pardon himself for self-doing crime.", "isCorrect": true, "rationale": "Lines 11–14: the beloved’s “charter” (legal right/privilege) is so strong he may ‘privilege his time / To what you will’ and even ‘pardon of self-doing crime’ — he is law unto himself."}, {"text": "Demand that the speaker wait indefinitely without any consolation.", "isCorrect": false, "rationale": "The charter pertains to the beloved’s own freedom, not to commands placed on the speaker."}, {"text": "Write his own poems that will outlast the speaker’s.", "isCorrect": false, "rationale": "The beloved’s poetry is not the subject of the charter."}]}, {"question": "The phrase “self-doing crime” (line 14) implies:", "options": [{"text": "The beloved has committed no crime and the phrase is purely hypothetical.", "isCorrect": false, "rationale": "The phrase acknowledges that the beloved’s actions might be called crimes, even if he can pardon himself for them."}, {"text": "The beloved is capable of wrongdoing — the speaker acknowledges this but also acknowledges the beloved can pardon himself for it.", "isCorrect": true, "rationale": "The phrase quietly admits that the beloved’s free actions could be judged as ‘crimes’ — wrongs against the speaker — but his charter is so strong that he pardons himself. This is the poem’s sharpest acknowledgment of the beloved’s potential cruelty."}, {"text": "The speaker himself has committed a crime against the beloved.", "isCorrect": false, "rationale": "The crime is the beloved’s self-doing, not the speaker’s."}, {"text": "The self-doing crime is writing love poetry without the beloved’s knowledge.", "isCorrect": false, "rationale": "No secret poetry is the crime; the phrase refers to the beloved’s behavior during his free absences."}]}, {"question": "The couplet (“I am to wait, though waiting so be hell, / Not blame your pleasure be it ill or well”) reveals:", "options": [{"text": "The speaker’s complete peace with his situation.", "isCorrect": false, "rationale": "“Waiting so be hell” makes clear that the speaker is not at peace."}, {"text": "That the speaker admits waiting is hellish but accepts it without blame — the most honest statement of the slave condition in the sequence.", "isCorrect": true, "rationale": "The couplet is brutally honest: waiting is hell, the beloved’s pleasures may be ‘ill,’ but the speaker will neither blame nor resist. It is the most unvarnished statement of the cost of absolute devotion."}, {"text": "That the speaker has decided to leave the relationship.", "isCorrect": false, "rationale": "No departure is announced; the acceptance is total, however painful."}, {"text": "That the speaker has found peace through religious faith.", "isCorrect": false, "rationale": "No religious consolation is offered; the couplet is resigned, not comforted."}]}, {"question": "The phrase “be where you list” (line 11) most nearly means:", "options": [{"text": "Keep a list of everywhere you go.", "isCorrect": false, "rationale": "List-keeping is not the sense; ‘list’ here is a verb."}, {"text": "Go wherever you please — the beloved has total freedom of movement.", "isCorrect": true, "rationale": "“List” as a verb means ‘to desire’ or ‘to please.’ “Be where you list” means ‘be wherever you wish to be’ — an absolute grant of freedom."}, {"text": "Listen carefully to what I say.", "isCorrect": false, "rationale": "‘List’ can mean ‘listen’ in archaic English, but the context — followed by freedom of time and pardon — makes the ‘please/desire’ sense correct."}, {"text": "Make a list of your pleasures and share it with the speaker.", "isCorrect": false, "rationale": "No list-making is described; the freedom granted is total."}]}, {"question": "How does Sonnet LVIII function as the conclusion to Chapter 6 (“Love from Afar”)?", "options": [{"text": "It resolves the pain of separation with a joyful reunion.", "isCorrect": false, "rationale": "No reunion occurs; the chapter ends in continued, accepted absence."}, {"text": "It brings the separation sequence to its darkest resolution: the speaker is a slave who waits in hell without recourse, unable even to blame the beloved’s pleasure.", "isCorrect": true, "rationale": "After exploring dreams, elements, journeys, legal disputes, philosophical consolations, and the immortality of verse, the chapter ends with the speaker in his most exposed state: waiting in hell, making no demands, condemning nothing the beloved does."}, {"text": "It offers a philosophical argument that absence is ultimately beneficial.", "isCorrect": false, "rationale": "That consolation belongs to Sonnets LII and LVI; LVIII offers no consolation, only acceptance."}, {"text": "It promises that the speaker’s verse will outlast the beloved’s cruelty.", "isCorrect": false, "rationale": "Verse’s immortality is the theme of Sonnet LV; LVIII makes no such promise."}]}, {"question": "How does the word “vassal” in line 4 reinforce the chapter’s themes?", "options": [{"text": "It suggests the speaker has military obligations that compete with his love.", "isCorrect": false, "rationale": "No military conflict is implied; ‘vassal’ deepens the political hierarchy of the master/slave relationship."}, {"text": "It elevates the master/slave relationship to feudal terms — the speaker is bound by oath and duty to his lord, the beloved.", "isCorrect": true, "rationale": "A vassal in feudal law was bound to serve and obey a lord. Using ‘vassal’ alongside ‘slave’ and ‘servant’ layers feudal obligation onto the love relationship, suggesting the speaker’s subordination has structural, not merely emotional, force."}, {"text": "It indicates the beloved is of lower social rank than the speaker.", "isCorrect": false, "rationale": "The beloved is positioned as the lord/sovereign throughout; he is of higher rank in the poem’s hierarchy."}, {"text": "It is a term of endearment with no political implications.", "isCorrect": false, "rationale": "The political implications are central and deliberate; ‘vassal’ is a term of feudal bondage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
