<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What opening question does Sonnet LXV pose?", "options": [{"text": "How can the speaker protect his beloved from enemies?", "isCorrect": false, "rationale": "The question is philosophical: how can beauty survive when even brass and stone cannot withstand mortality."}, {"text": "Since not even brass, stone, earth, or the boundless sea can withstand mortality, how can beauty hold its ground?", "isCorrect": true, "rationale": "Lines 1–4: “Since brass, nor stone, nor earth, nor boundless sea, / But sad mortality o’ersways their power, / How with this rage shall beauty hold a plea, / Whose action is no stronger than a flower?”"}, {"text": "How can the speaker write poetry that will outlast the beloved?", "isCorrect": false, "rationale": "The question concerns beauty’s survival, not the speaker’s writing process."}, {"text": "Whether the beloved’s beauty is stronger than that of previous ages", "isCorrect": false, "rationale": "Historical comparison is not the subject of this sonnet’s opening question."}]}, {"question": "What simile emphasizes how fragile beauty is compared to the forces that threaten it?", "options": [{"text": "Beauty is compared to a candle in the wind", "isCorrect": false, "rationale": "The candle image is from other contexts; this sonnet compares beauty to a flower."}, {"text": "Beauty’s power is “no stronger than a flower”", "isCorrect": true, "rationale": "Line 4: “Whose action is no stronger than a flower?” — beauty is as fragile as a blossom against the forces of time."}, {"text": "Beauty is compared to a paper boat in a storm", "isCorrect": false, "rationale": "No paper boat appears; the simile is the flower."}, {"text": "Beauty is like summer honey that will be consumed", "isCorrect": false, "rationale": "“Summer’s honey breath” is used as a metaphor in lines 5–6 but is not the same as the flower simile of line 4."}]}, {"question": "What does “the wrackful siege of battering days” (line 6) describe?", "options": [{"text": "A military siege of a city by an enemy army", "isCorrect": false, "rationale": "The image is metaphorical: “days” battering summer’s honey breath like a wracking, destructive siege."}, {"text": "The relentless assault of time, figured as days battering away at beauty’s fragile defense", "isCorrect": true, "rationale": "“Wrackful” means ruinous; “battering” is the sustained attack; time is the besieging army, beauty the besieged."}, {"text": "The emotional devastation of the speaker’s grief", "isCorrect": false, "rationale": "The siege describes time’s effect on beauty in general, not the speaker’s emotional state."}, {"text": "A storm at sea that threatens the beloved’s voyage", "isCorrect": false, "rationale": "The sea is mentioned earlier in the sonnet but is not the source of this specific image."}]}, {"question": "What rhetorical device is used in lines 11–14 (“O fearful meditation!” and the three “Or” questions)?", "options": [{"text": "Irony", "isCorrect": false, "rationale": "The tone is earnest and fearful, not ironic."}, {"text": "Exclamation followed by a series of rhetorical questions that emphasize helplessness against Time", "isCorrect": true, "rationale": "Lines 11–14 use an exclamatory apostrophe then three rhetorical questions (“where shall...?” “what strong hand...?” “who...can forbid?”) to emphasize that no answer exists."}, {"text": "Climax, building to a triumphant answer", "isCorrect": false, "rationale": "The rhetorical questions build not to triumph but to despair, then the couplet offers a tentative miracle."}, {"text": "Understatement", "isCorrect": false, "rationale": "The language is heightened and exclamatory, not understated."}]}, {"question": "What is “Time’s best jewel” in line 12?", "options": [{"text": "The beloved’s beauty", "isCorrect": true, "rationale": "Beauty is what Time prizes most, and the question is where it can be hidden from Time’s “chest” (a treasure chest that hides all things)."}, {"text": "The speaker’s poetry", "isCorrect": false, "rationale": "The “jewel” is what Time claims, which is beauty; verse is the proposed counter to Time, not Time’s own jewel."}, {"text": "A literal precious gemstone owned by the beloved", "isCorrect": false, "rationale": "The jewel is a metaphor for beauty, not a literal gem."}, {"text": "Time itself, which is precious and cannot be reclaimed", "isCorrect": false, "rationale": "Time is the force that acts; the jewel is what Time takes, which is beauty."}]}, {"question": "What does the couplet offer as the only possible solution to beauty’s destruction?", "options": [{"text": "Prayer and divine intervention", "isCorrect": false, "rationale": "The solution is verse, expressed as a “miracle” but not through prayer or divine means."}, {"text": "The miracle that “in black ink my love may still shine bright”", "isCorrect": true, "rationale": "Lines 15–16: “O! none, unless this miracle have might, / That in black ink my love may still shine bright.” Verse is the only possible defense."}, {"text": "That beauty is naturally reborn in each new generation", "isCorrect": false, "rationale": "Rebirth in a new generation is not the answer offered; verse is."}, {"text": "That the beloved must marry to produce heirs who will carry on his beauty", "isCorrect": false, "rationale": "The procreation theme is from the early sonnets; here the answer is verse, not children."}]}, {"question": "Why does the speaker call this solution a “miracle”?", "options": [{"text": "Because the speaker is not confident it will work and acknowledges its extraordinary nature", "isCorrect": true, "rationale": "After cataloging how nothing — brass, stone, rocks, gates of steel — withstands Time, calling verse a “miracle” acknowledges that its power to preserve beauty is extraordinary, almost impossibly against the odds."}, {"text": "Because the speaker has witnessed a literal miracle involving ink and paper", "isCorrect": false, "rationale": "The miracle is metaphorical: verse’s power to preserve against all odds."}, {"text": "Because he believes divine intervention will make the ink permanent", "isCorrect": false, "rationale": "No divine agent is invoked; the miracle is verse itself."}, {"text": "Because writing requires supernatural skill", "isCorrect": false, "rationale": "The speaker is not commenting on the skill of writing but on the extraordinary claim that verse can outlast Time."}]}, {"question": "What literary device is used in “summer’s honey breath” (line 5)?", "options": [{"text": "Alliteration", "isCorrect": false, "rationale": "While there is some sound play, the dominant device is a synesthetic metaphor combining season, sensory quality, and breath."}, {"text": "Synesthetic metaphor combining season, taste, and breath to evoke fragile summer beauty", "isCorrect": true, "rationale": "“Honey” evokes sweetness and taste; “breath” suggests the ephemeral quality of air; together they personify summer as a fragile, sweet exhalation."}, {"text": "Simile comparing summer to honey", "isCorrect": false, "rationale": "The comparison does not use “like” or “as”; it is a direct metaphor."}, {"text": "Apostrophe addressing summer directly", "isCorrect": false, "rationale": "Summer is not directly addressed; the phrase is a possessive noun phrase, not direct address."}]}, {"question": "How does Sonnet LXV escalate the argument of Sonnet LXIV?", "options": [{"text": "It adds a romantic subplot that LXIV lacks", "isCorrect": false, "rationale": "Neither sonnet has a subplot; LXIV and LXV are unified meditations on time."}, {"text": "Where LXIV ended in grief without a solution, LXV acknowledges the same grief but offers a tentative answer in verse", "isCorrect": true, "rationale": "LXIV closes only with sorrow; LXV concludes with the hopeful miracle of “black ink” shining bright."}, {"text": "LXV rejects the personification of Time that LXIV establishes", "isCorrect": false, "rationale": "Both sonnets personify Time as a destructive force; LXV continues and intensifies this."}, {"text": "LXV shifts focus from nature to politics", "isCorrect": false, "rationale": "Both sonnets are concerned with time and nature; neither is primarily political."}]}, {"question": "What does the phrase “Time decays” (line 10) do grammatically and thematically?", "options": [{"text": "It introduces Time as the subject of its own decay", "isCorrect": false, "rationale": "Time is the agent of decay; the line means Time causes decay, not that Time itself decays."}, {"text": "It makes Time the active agent of decay, asserting that even steel gates cannot stop Time’s erosive power", "isCorrect": true, "rationale": "“Nor gates of steel so strong but Time decays” — Time is the subject and verb, making it a powerful agent that erodes even the strongest materials."}, {"text": "It is a parenthetical aside unrelated to the main argument", "isCorrect": false, "rationale": "The phrase is central to the argument that nothing withstands Time."}, {"text": "It introduces the idea that Time, too, will eventually end", "isCorrect": false, "rationale": "The sonnet does not argue that Time itself will end; Time is presented as inescapably permanent."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
