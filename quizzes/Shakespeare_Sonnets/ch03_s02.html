    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet II</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the image of “forty winters” besieging the youth’s brow convey?", "options": [{"text": "A literal prediction about the weather over the next forty years.", "isCorrect": false, "rationale": "Forty winters is a figurative expression for the passage of forty years, not a weather forecast."}, {"text": "The destructive march of time, which will turn the youth’s face into a battlefield of wrinkles.", "isCorrect": true, "rationale": "The military metaphor — “besiege,” “dig deep trenches” — presents aging as a siege warfare against the youth’s beauty."}, {"text": "The youth’s long career as a soldier in cold climates.", "isCorrect": false, "rationale": "The youth is not described as a soldier; winters and trenches are metaphors for age."}, {"text": "Shakespeare’s personal memory of forty years of hardship.", "isCorrect": false, "rationale": "The poem addresses the youth, not the poet’s biography."}], "id": "q01"}, {"question": "What does “thy youth’s proud livery” refer to?", "options": [{"text": "The expensive clothing the youth currently wears.", "isCorrect": false, "rationale": "While “livery” can mean a uniform or garment, here it is a metaphor for youthful beauty worn like a fine outfit."}, {"text": "The youth’s beauty and vitality, metaphorically compared to splendid attire that will eventually become a tattered, worthless garment.", "isCorrect": true, "rationale": "“Livery” is a uniform or fine dress; the image contrasts the current splendor of youth with the “tatter’d weed” it will become in old age."}, {"text": "The coat of arms belonging to the youth’s noble family.", "isCorrect": false, "rationale": "No heraldry is invoked; “livery” here refers to beauty as clothing."}, {"text": "The youth’s reputation among his social peers.", "isCorrect": false, "rationale": "Reputation is not the focus; the metaphor is specifically about physical beauty as attire."}], "id": "q02"}, {"question": "What would be an “all-eating shame” and “thriftless praise” according to the poem?", "options": [{"text": "Admitting in old age that all your beauty is locked within your own sunken eyes, with no child to show for it.", "isCorrect": true, "rationale": "If the old youth can only point to his own withered eyes as the repository of his beauty, that is a shameful admission — he wasted beauty on himself alone."}, {"text": "Writing poetry that flatters a young man excessively.", "isCorrect": false, "rationale": "The poem criticizes the youth’s self-flattery, not the poet’s verse."}, {"text": "Spending money on luxuries rather than saving for the future.", "isCorrect": false, "rationale": "While financial metaphors run through the poem, this answer misses the specific shame of childlessness."}, {"text": "Praising a child who has not earned it.", "isCorrect": false, "rationale": "The poem celebrates the idea of having a praiseworthy child, not of giving unearned praise."}], "id": "q03"}, {"question": "What is the “beauty’s use” the poem praises in line 9?", "options": [{"text": "Using one’s beauty to attract admirers and enjoy popularity.", "isCorrect": false, "rationale": "The poem condemns mere vanity; “use” here carries the financial sense of investment that yields a return."}, {"text": "Investing beauty by having children, so it produces a return in the next generation.", "isCorrect": true, "rationale": "“Use” in Elizabethan English often meant the profitable employment of capital (interest on a loan); beauty’s “use” is producing an heir who carries the beauty forward."}, {"text": "Applying cosmetics and grooming to maintain one’s appearance.", "isCorrect": false, "rationale": "Cosmetics are not mentioned; the “use” is biological and financial in metaphor."}, {"text": "Sharing beauty through charitable acts and generosity.", "isCorrect": false, "rationale": "Charity is not the theme; reproduction and inheritance are."}], "id": "q04"}, {"question": "How does the couplet propose that the youth can be “new made when thou art old”?", "options": [{"text": "By maintaining a strict regime of exercise and healthy eating.", "isCorrect": false, "rationale": "Physical self-maintenance is not the solution Shakespeare offers."}, {"text": "By having a child whose beauty proves the youth’s own, allowing the parent to see his blood “warm” when his own is cold.", "isCorrect": true, "rationale": "A child is a living renewal: the parent is “new made” through the child, whose warm blood testifies to the parent’s former vitality even as the parent grows cold in old age."}, {"text": "By committing his story to written verse for posterity.", "isCorrect": false, "rationale": "Poetry as a preserver is not the solution offered in Sonnet II; the answer is a child, not a poem."}, {"text": "By finding a young lover to keep his spirits youthful.", "isCorrect": false, "rationale": "Romantic love is not the proposed solution; biological inheritance through a child is."}], "id": "q05"}, {"question": "What is the dominant extended metaphor in Sonnet II?", "options": [{"text": "Beauty as a military campaign that must be defended against Time.", "isCorrect": false, "rationale": "The military language of “besiege” and “trenches” opens the poem but gives way to the financial metaphor of treasure, accounts, and inheritance."}, {"text": "Beauty as a financial asset (treasure) that must be properly invested rather than hoarded.", "isCorrect": true, "rationale": "The poem builds on “treasure,” “sum my count,” “beauty’s use,” and “successsion” — all terms from financial and legal discourse about inheritance and investment."}, {"text": "Beauty as a garden that must be cultivated before winter comes.", "isCorrect": false, "rationale": "The garden metaphor belongs more to Sonnet III; Sonnet II’s dominant metaphor is financial."}, {"text": "Beauty as a song that must be passed down through generations.", "isCorrect": false, "rationale": "The music metaphor belongs to Sonnet VIII; here the dominant frame is financial inheritance."}], "id": "q06"}, {"question": "What does “successsion” mean in line 12 (“Proving his beauty by succession thine”)?", "options": [{"text": "The legal transfer of an inherited title or estate through generations.", "isCorrect": true, "rationale": "In Elizabethan legal usage, “succession” referred to inheriting an estate or title; here the child’s beauty “proves” the parent’s by inheriting it, much as an heir inherits wealth."}, {"text": "A sequence of events happening one after another.", "isCorrect": false, "rationale": "While this is a common modern meaning, the Elizabethan context is specifically legal and genealogical."}, {"text": "The youth’s career advancement over time.", "isCorrect": false, "rationale": "Career progress is not at issue; the word means the passing of traits to the next generation."}, {"text": "The order in which Shakespeare wrote his sonnets.", "isCorrect": false, "rationale": "The poem’s internal logic concerns biological inheritance, not authorial sequence."}], "id": "q07"}, {"question": "What contrast does the couplet draw between “old” and “new”?", "options": [{"text": "Between old-fashioned poetry and modern verse styles.", "isCorrect": false, "rationale": "The contrast is not literary but biological and generational."}, {"text": "Between the aging parent whose beauty fades and the young child who renews it, making the parent feel young again.", "isCorrect": true, "rationale": "The couplet promises the youth will be “new made” in old age by seeing his child’s warm blood — a vicarious renewal through the next generation."}, {"text": "Between the new love the youth might find and the old love he has discarded.", "isCorrect": false, "rationale": "Romantic relationships are not the subject; the contrast is between the parent’s aging body and the child’s youthful vitality."}, {"text": "Between the joy of summer and the misery of winter.", "isCorrect": false, "rationale": "While seasonal imagery opens the poem, the couplet’s contrast is about biological inheritance, not seasons."}], "id": "q08"}, {"question": "What does “thy lusty days” mean in line 6?", "options": [{"text": "Days of excessive feasting and indulgence.", "isCorrect": false, "rationale": "While “lusty” can imply vigor in appetite, here it primarily means vigorous, healthy, and full of life."}, {"text": "The days of the youth’s peak health, vigor, and vitality.", "isCorrect": true, "rationale": "“Lusty” in Elizabethan English commonly meant vigorous and full of healthy energy, not specifically sexual; it describes the zenith of youthful vitality."}, {"text": "Days of romantic conquest and amorous adventure.", "isCorrect": false, "rationale": "While “lusty” can carry a sexual connotation, the context here emphasizes the general vitality that will be wasted if not reproduced."}, {"text": "Days when the youth studied hard and accumulated knowledge.", "isCorrect": false, "rationale": "Intellectual effort is not the referent; “lusty days” refers to physical prime."}], "id": "q09"}, {"question": "How does Sonnet II advance the procreation argument introduced in Sonnet I?", "options": [{"text": "It shifts from accusing the youth of selfishness to offering him a positive vision of renewal through a child.", "isCorrect": true, "rationale": "Where Sonnet I ends with a threat (the grave), Sonnet II offers an incentive: the pleasure of seeing one’s beauty live in a child’s warm blood, framing reproduction as self-renewal rather than mere duty."}, {"text": "It abandons the procreation argument and focuses on the poet’s personal love for the youth.", "isCorrect": false, "rationale": "Personal love is not foregrounded; the poem remains on the logical case for having children."}, {"text": "It argues that winter itself can be defeated if the youth remains beautiful enough.", "isCorrect": false, "rationale": "Winter (age) cannot be defeated by beauty alone; only a child can carry beauty past the winter of old age."}, {"text": "It introduces poetry as the only lasting solution to the problem of mortality.", "isCorrect": false, "rationale": "Poetry as a solution appears in later sonnets; Sonnet II’s answer remains reproduction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
