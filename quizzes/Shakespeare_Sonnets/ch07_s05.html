    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What future event does Sonnet LXIII anticipate?", "options": [{"text": "The speaker’s own death", "isCorrect": false, "rationale": "The sonnet focuses on the beloved’s future aging and the threat to his beauty, not specifically the speaker’s death."}, {"text": "The beloved’s aging until his beauty is crushed and worn by Time’s hand", "isCorrect": true, "rationale": "Lines 1–4: “Against my love shall be as I am now, / With Time’s injurious hand crush’d and o’erworn.”"}, {"text": "The end of the speaker’s poetic career", "isCorrect": false, "rationale": "The speaker’s verses are the solution, not the subject of decline."}, {"text": "A political catastrophe that will destroy the speaker’s world", "isCorrect": false, "rationale": "The sonnet is personal and meditative, not political."}]}, {"question": "What image describes the progression from youth to old age in lines 5–6?", "options": [{"text": "“Youthful morn” traveling on to “age’s steepy night”", "isCorrect": true, "rationale": "Lines 5–6: “when his youthful morn / Hath travell’d on to age’s steepy night” — life moves from morning to a steep nightfall."}, {"text": "A river flowing from a mountain spring to the sea", "isCorrect": false, "rationale": "The river image is not used in Sonnet LXIII; the day-to-night metaphor is."}, {"text": "A flower blooming and then withering in autumn", "isCorrect": false, "rationale": "While “treasure of his spring” uses spring imagery, the primary metaphor for the life trajectory is morning to night."}, {"text": "A soldier marching from youth into battle", "isCorrect": false, "rationale": "No military metaphor is used for the life trajectory in this sonnet."}]}, {"question": "What does “Stealing away the treasure of his spring” mean?", "options": [{"text": "Enemies have stolen the beloved’s wealth", "isCorrect": false, "rationale": "“Treasure of his spring” is a metaphor for the beauties and vigor of youth, not literal wealth."}, {"text": "Time gradually takes away the beloved’s youthful beauties", "isCorrect": true, "rationale": "The beloved’s beauties “are vanishing, or vanished out of sight, / Stealing away the treasure of his spring” — spring represents youth; its treasure is beauty."}, {"text": "The beloved spends his energy wastefully on pleasures", "isCorrect": false, "rationale": "It is Time that steals, not the beloved’s own behavior."}, {"text": "A thief has robbed the beloved of precious jewels", "isCorrect": false, "rationale": "The theft is metaphorical: Time takes beauty, not literal objects."}]}, {"question": "What is the speaker’s stated purpose in “fortifying” against time (lines 11–14)?", "options": [{"text": "To preserve the beloved’s life beyond death", "isCorrect": false, "rationale": "The couplet distinguishes between preserving beauty (possible through verse) and preserving life (not possible)."}, {"text": "To ensure that the beloved’s beauty will never be cut from memory, even after his life ends", "isCorrect": true, "rationale": "Lines 13–14: “That he shall never cut from memory / My sweet love’s beauty, though my lover’s life.” Verse preserves beauty, not life."}, {"text": "To warn the beloved to take better care of his health", "isCorrect": false, "rationale": "The speaker is not offering health advice but is preparing a poetic defense against Time."}, {"text": "To record the beloved’s deeds for future historians", "isCorrect": false, "rationale": "The fortification is against time’s erasure of beauty, not a historical record of deeds."}]}, {"question": "What does the couplet declare about the power of verse?", "options": [{"text": "That verse is ultimately powerless against time", "isCorrect": false, "rationale": "The couplet asserts verse’s power to preserve beauty in “black lines.”"}, {"text": "That the beloved’s beauty will be seen in “these black lines” and the beloved will live and remain green in them", "isCorrect": true, "rationale": "Lines 15–16: “His beauty shall in these black lines be seen, / And they shall live, and he in them still green.”"}, {"text": "That the beloved will be reborn in a future generation", "isCorrect": false, "rationale": "The couplet promises poetic immortality, not physical rebirth."}, {"text": "That the speaker’s name will be remembered alongside the beloved’s beauty", "isCorrect": false, "rationale": "The couplet focuses on the beloved’s beauty persisting in verse, not the speaker’s fame."}]}, {"question": "What does “still green” in the final line mean?", "options": [{"text": "The beloved will continue to be surrounded by green nature", "isCorrect": false, "rationale": "“Green” is not literal here; it is a metaphor."}, {"text": "The beloved’s beauty will remain perpetually youthful and fresh in the lines of the poem", "isCorrect": true, "rationale": "“Green” signifies youth and freshness; “still” means always/continually. The beloved will be forever young within the poem."}, {"text": "The beloved will still be alive when the poem is read", "isCorrect": false, "rationale": "The poem anticipates the beloved’s death (“my lover’s life” in line 14); the greenness is in verse, not in continued physical life."}, {"text": "The poem will be printed on green paper to honor the beloved", "isCorrect": false, "rationale": "“Black lines” are the ink of the poem; green refers to the metaphorical youthfulness preserved within."}]}, {"question": "What does the phrase “Time’s injurious hand” (line 2) personify?", "options": [{"text": "A craftsman who shapes people as a sculptor shapes clay", "isCorrect": false, "rationale": "The hand is destructive, not creative; “injurious” means harmful."}, {"text": "Time as an aggressive, harmful force that physically crushes and wears people down", "isCorrect": true, "rationale": "Time is given a hand that causes injury, personifying the abstract passage of time as a violent agent of destruction."}, {"text": "The beloved’s future self reaching back to harm his younger self", "isCorrect": false, "rationale": "The hand belongs to Time, not to a future version of the beloved."}, {"text": "The speaker’s fear of his own hand aging and losing its ability to write", "isCorrect": false, "rationale": "The injurious hand belongs to Time as a personified force, not to the speaker."}]}, {"question": "How does “for such a time do I now fortify” relate to the military language of the chapter?", "options": [{"text": "The speaker is literally enrolling in a military campaign", "isCorrect": false, "rationale": "The military language is metaphorical; the speaker’s weapon is verse, not arms."}, {"text": "The speaker uses military metaphor to cast writing verse as preparation and defense against Time’s future assault", "isCorrect": true, "rationale": "“Fortify” is a military term for building defenses; the speaker prepares his poetic defenses now against the future siege of time."}, {"text": "The speaker is warning the beloved to prepare for a literal battle", "isCorrect": false, "rationale": "The battle is metaphorical; the enemy is Time."}, {"text": "The speaker is acknowledging that no defense against time is possible", "isCorrect": false, "rationale": "The couplet asserts that verse does succeed as a defense, preserving beauty in “black lines.”"}]}, {"question": "What contrast structures the argument of Sonnet LXIII?", "options": [{"text": "The contrast between the speaker’s age now and his youth in the past", "isCorrect": false, "rationale": "It is the beloved’s future aging, not the speaker’s past youth, that structures the argument."}, {"text": "The contrast between the beloved’s inevitable physical decline and the permanence of the speaker’s verse", "isCorrect": true, "rationale": "The octave catalogs the beloved’s coming decay; the sestet and couplet counter it with the permanence of “black lines.”"}, {"text": "The contrast between the beauty of nature and the ugliness of human aging", "isCorrect": false, "rationale": "While nature imagery is used, the central contrast is between physical decay and poetic permanence."}, {"text": "The contrast between the beloved’s kindness and his rivals’ cruelty", "isCorrect": false, "rationale": "No rival is mentioned in Sonnet LXIII."}]}, {"question": "What does “confounding age’s cruel knife” (line 12) mean?", "options": [{"text": "Old age uses a knife to carve wrinkles into the face", "isCorrect": false, "rationale": "While the image is striking, “knife” is a metaphor for the destructive cutting power of age."}, {"text": "The speaker is taking action to thwart the destructive power of old age that cuts away beauty and memory", "isCorrect": true, "rationale": "“Confounding” means thwarting or ruining; the speaker’s verse will keep age’s knife from cutting away the beloved’s beauty from memory."}, {"text": "Age is personified as a chef slicing away what is unnecessary", "isCorrect": false, "rationale": "Age is an enemy, not a nurturing cook; the knife destroys, it does not refine."}, {"text": "The speaker fears age will make the beloved’s beauty too sharp and cutting", "isCorrect": false, "rationale": "The knife belongs to age, which cuts beauty away; the beloved’s sharpness is not the concern."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
