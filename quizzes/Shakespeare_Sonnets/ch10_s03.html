<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What paradox does the speaker state in the opening lines of Sonnet CII?", "options": [{"text": "His love appears stronger though it is actually weaker", "isCorrect": false, "rationale": "The paradox is the opposite: love is strengthened though it seems weaker in outward show."}, {"text": "His love is strengthened though it seems weaker in outward show", "isCorrect": true, "rationale": "'My love is strengthen'd, though more weak in seeming' is the opening paradox."}, {"text": "He loves more but writes less well", "isCorrect": false, "rationale": "The paradox concerns love's inner strength vs. its outward expression, not the quality of verse."}, {"text": "He shows more affection though he feels less", "isCorrect": false, "rationale": "He shows less affection but insists he feels more — the opposite of this option."}], "id": "q01"}, {"question": "What does the speaker compare openly proclaimed love to?", "options": [{"text": "A merchant who cheapens goods by advertising them", "isCorrect": true, "rationale": "'That love is merchandiz'd, whose rich esteeming, / The owner's tongue doth publish every where' equates boasted love with commercial transactions."}, {"text": "A king who parades his crown in public", "isCorrect": false, "rationale": "The metaphor used is mercantile, not royal."}, {"text": "A river that overflows its banks", "isCorrect": false, "rationale": "No river metaphor appears in Sonnet CII."}, {"text": "A summer storm that fades quickly", "isCorrect": false, "rationale": "Storm imagery is not used here; the commercial metaphor is central."}], "id": "q02"}, {"question": "What bird does the speaker use as an analogy for his own poetic behavior?", "options": [{"text": "A robin that sings all year", "isCorrect": false, "rationale": "The robin is not mentioned; it is known for year-round song, opposite to the analogy."}, {"text": "Philomel (the nightingale)", "isCorrect": true, "rationale": "He compares himself to Philomel, who sings in spring but falls silent as summer deepens."}, {"text": "A swan singing only at death", "isCorrect": false, "rationale": "The swan song is a separate classical convention; Philomel is the bird cited here."}, {"text": "A lark ascending at dawn", "isCorrect": false, "rationale": "The lark is not the bird referenced in this sonnet."}], "id": "q03"}, {"question": "When does Philomel stop singing, according to the sonnet?", "options": [{"text": "At the first sign of winter", "isCorrect": false, "rationale": "She stops in the growth of riper summer days, not at winter's onset."}, {"text": "In the growth of riper summer days", "isCorrect": true, "rationale": "'As Philomel in summer's front doth sing, / And stops her pipe in growth of riper days.'"}, {"text": "When her song is drowned by other birds", "isCorrect": false, "rationale": "The reason given for her silence is the season, not competition, though later lines mention 'wild music.'"}, {"text": "After she finds a mate", "isCorrect": false, "rationale": "No mating context is given; the analogy is purely seasonal."}], "id": "q04"}, {"question": "Why does the speaker say he 'sometime hold my tongue'?", "options": [{"text": "He has run out of things to say about his beloved", "isCorrect": false, "rationale": "He holds his tongue to avoid dulling the beloved's pleasure, not from lack of inspiration."}, {"text": "To avoid dulling the beloved with too much song", "isCorrect": true, "rationale": "The couplet states: 'I sometime hold my tongue: / Because I would not dull you with my song.'"}, {"text": "Because the Muse has abandoned him", "isCorrect": false, "rationale": "The Muse's absence is Sonnet C and CI's concern; here silence is the speaker's own choice."}, {"text": "Because 'wild music burthens every bough' and drowns him out", "isCorrect": false, "rationale": "That line explains why constant song loses value generally, not why he personally falls silent."}], "id": "q05"}, {"question": "What does the phrase 'wild music burthens every bough' suggest?", "options": [{"text": "That nature is louder than any poet", "isCorrect": false, "rationale": "The phrase is metaphorical, suggesting that when beauty is too abundant it loses distinction."}, {"text": "That commonplace abundance diminishes the worth of any single delight", "isCorrect": true, "rationale": "The line supports the idea that 'sweets grown common lose their dear delight' — overabundance cheapens value."}, {"text": "That the summer season has too many storms", "isCorrect": false, "rationale": "'Wild music' refers to the proliferation of song in summer, not to storms."}, {"text": "That the poet's verses have spread everywhere", "isCorrect": false, "rationale": "The image refers to natural sounds in summer, serving as analogy, not to the poet's output."}], "id": "q06"}, {"question": "What is the speaker's main argument for why silence can be an expression of love?", "options": [{"text": "Love too often expressed becomes suspicious", "isCorrect": false, "rationale": "The argument is about keeping delight fresh, not about suspicion."}, {"text": "Constant song, like common sweets, loses its capacity to delight", "isCorrect": true, "rationale": "'Sweets grown common lose their dear delight' — restraint preserves the specialness of praise."}, {"text": "The beloved prefers privacy over public praise", "isCorrect": false, "rationale": "The beloved's personal preference is not the argument; aesthetic value is."}, {"text": "Silence allows the poet to gather stronger material", "isCorrect": false, "rationale": "There is no suggestion of gathering material; the point is that less is more."}], "id": "q07"}, {"question": "What literary device is prominent in the Philomel comparison?", "options": [{"text": "Allusion and extended simile", "isCorrect": true, "rationale": "The Philomel reference alludes to classical mythology and is developed as a sustained comparison over four lines."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "The comparison is measured and realistic, not exaggerated."}, {"text": "Oxymoron", "isCorrect": false, "rationale": "Oxymoron combines contradictory terms; this passage uses simile and allusion."}, {"text": "Chiasmus", "isCorrect": false, "rationale": "Chiasmus reverses grammatical structures; the dominant device here is extended simile."}], "id": "q08"}, {"question": "How does Sonnet CII resolve the problem raised in Sonnets C and CI about the Muse's silence?", "options": [{"text": "The speaker gives up on the Muse entirely", "isCorrect": false, "rationale": "The speaker does not abandon the Muse; he offers a justification for periodic silence."}, {"text": "The speaker reframes silence as an act of thoughtful love, not neglect", "isCorrect": true, "rationale": "Rather than scolding silence, the speaker explains that restraint preserves the value of his verse and avoids dulling the beloved."}, {"text": "The speaker promises to write twice as much to compensate", "isCorrect": false, "rationale": "No such promise is made; the poem defends, rather than compensates for, silence."}, {"text": "The Muse returns and the poet resumes full productivity", "isCorrect": false, "rationale": "The Muse's return is not confirmed here; the focus is on the value of poetic restraint."}], "id": "q09"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
