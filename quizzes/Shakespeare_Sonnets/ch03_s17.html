    };

        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XVII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the central problem the poet identifies in the opening lines?", "options": [{"text": "The poet worries that future readers will think him a liar for praising the youth too extravagantly.", "isCorrect": true, "rationale": "The poet’s dilemma: if he fills his verse with the youth’s genuine beauty and virtues, future readers will disbelieve him (“This poet lies; / Such heavenly touches ne’er touch’d earthly faces”), scorning the poems as exaggeration."}, {"text": "The poet worries that he is not talented enough to capture the youth’s beauty in verse.", "isCorrect": false, "rationale": "Lack of talent is not the specific problem; the problem is that even accurate verse will be disbelieved by future generations."}, {"text": "The poet is concerned that the youth will be too famous in his own time for the sonnets to add anything.", "isCorrect": false, "rationale": "Contemporary fame is not the issue; the concern is about future disbelief."}, {"text": "The poet fears that his manuscripts will be physically destroyed before they can be read by later ages.", "isCorrect": false, "rationale": "Physical destruction of manuscripts is not the concern; the problem is that surviving poems would be disbelieved as exaggerations."}], "id": "q01"}, {"question": "What does “though yet heaven knows it is but as a tomb / Which hides your life, and shows not half your parts” mean?", "options": [{"text": "Heaven knows the poet’s verse is only a tomb — it conceals and buries the youth’s life rather than revealing it, and shows less than half his true qualities.", "isCorrect": true, "rationale": "The sonnet itself is called a “tomb”: it holds the youth’s life like a burial enclosure, but conceals rather than displays the fullness of who he is. This is a moment of genuine humility within the poet’s argument."}, {"text": "Heaven has judged the poet’s verse and found it adequate but not sufficient.", "isCorrect": false, "rationale": "No divine judgment is rendered; the poet is making a personal confession about verse’s limitations."}, {"text": "The youth’s virtues are so many that even heaven cannot count all his “parts.”", "isCorrect": false, "rationale": "While the youth’s virtues are the implicit subject, the statement is about the poem’s failure to display them, not heaven’s counting."}, {"text": "The poem is a kind of monument to the dead youth.", "isCorrect": false, "rationale": "The youth is not yet dead; the poem is called a tomb to indicate it hides rather than reveals life."}], "id": "q02"}, {"question": "What would future readers say if the poet described the youth’s “heavenly touches” in verse?", "options": [{"text": "They would say the poet was an exceptional talent for capturing such beauty.", "isCorrect": false, "rationale": "The poem predicts the opposite reaction: future readers would doubt the truthfulness of the verse."}, {"text": "They would call the poet a liar, saying such beauty could never have existed on an earthly face.", "isCorrect": true, "rationale": "The poem predicts: “The age to come would say ‘This poet lies; / Such heavenly touches ne’er touch’d earthly faces.’” Future readers will assume the extravagant praise is the invention of a lying poet."}, {"text": "They would praise the poem as the finest description of human beauty ever written.", "isCorrect": false, "rationale": "Praise from future readers is exactly what the poet fears will not come; instead, they will call him a liar."}, {"text": "They would compare the youth favorably to classical heroes like Achilles and Adonis.", "isCorrect": false, "rationale": "No classical comparisons are made by future readers in the poem; the reaction predicted is simple disbelief."}], "id": "q03"}, {"question": "What does “yellow’d with their age” describe?", "options": [{"text": "The faces of old men who have grown yellowed and jaundiced with age.", "isCorrect": false, "rationale": "Old men are mentioned but “yellow’d with their age” describes the physical appearance of the papers (pages) of old manuscripts."}, {"text": "The pages of the poet’s manuscripts, yellowed and browned with age, making them appear as unreliable as the ramblings of old men.", "isCorrect": true, "rationale": "Old paper yellows over time; the image of “papers, yellow’d with their age” is the physical deterioration of manuscripts, which will be scorned like old men who talk too much and tell unreliable stories."}, {"text": "The youth’s complexion in old age, compared to yellow parchment.", "isCorrect": false, "rationale": "The yellowing is of the papers, not the youth; the comparison is between old manuscripts and unreliable old men."}, {"text": "The golden-yellow color of leaves in autumn, symbolizing decline.", "isCorrect": false, "rationale": "Autumn leaves appear in Sonnet XII; here the yellowing is specifically of old paper, not natural foliage."}], "id": "q04"}, {"question": "What does “stretched metre of an antique song” mean?", "options": [{"text": "The exaggerated (stretched) verse of an old-fashioned (antique) poem — suggesting the poet’s sonnets will be dismissed as mere period stylization.", "isCorrect": true, "rationale": "“Stretched metre” is verse that strains credibility through exaggeration; “antique song” is old-fashioned poetry. The poet fears his poems will be dismissed as merely the inflated conventions of a dated style, their truth content discredited."}, {"text": "An ancient Greek or Roman meter that Shakespeare is imitating in his sonnets.", "isCorrect": false, "rationale": "No specific classical meter is invoked; the phrase describes the dismissive judgment future readers will apply to the poems."}, {"text": "A folk song that has been stretched and corrupted by many retellings.", "isCorrect": false, "rationale": "Folk transmission is not the meaning; “stretched metre” refers to hyperbolic, inflated verse style."}, {"text": "The elongation of verses to make them scan properly, a common fault of inferior poets.", "isCorrect": false, "rationale": "Technical padding is not the primary meaning; the “stretching” is of believability, not syllable count."}], "id": "q05"}, {"question": "What does “the truth rights be term’d a poet’s rage” mean?", "options": [{"text": "The accurate account of the youth’s genuine virtues (“true rights”) will be dismissed as merely a poet’s furious or extravagant invention.", "isCorrect": true, "rationale": "“True rights” = the youth’s genuine due — the accurate description of his actual qualities. “A poet’s rage” = passionate, exaggerated invention (like poetic fury). The youth’s truth will be misread as fictional excess."}, {"text": "The poet is angry about the way critics dismiss his verse.", "isCorrect": false, "rationale": "The poet’s personal anger is not the subject; the phrase is about how future critics will wrongly label accurate praise as poetic excess."}, {"text": "The youth’s true rights to a noble inheritance will be dismissed by jealous rivals.", "isCorrect": false, "rationale": "Legal inheritance rights are not the subject; “true rights” means the youth’s genuine due as an extraordinarily beautiful person."}, {"text": "Future poets will plagiarize Shakespeare’s verse and attribute it to an anonymous “poet’s rage.”", "isCorrect": false, "rationale": "Plagiarism is not the concern; the problem is that honest praise will be mistaken for fictional hyperbole."}], "id": "q06"}, {"question": "What solution does the couplet offer?", "options": [{"text": "The poet will write better, more convincing verse that future readers cannot dismiss.", "isCorrect": false, "rationale": "Improving the verse is not the solution; the couplet offers the combination of a living child and the verse together."}, {"text": "If the youth has a child alive in future times, the child’s living beauty will confirm the poems’ truth, and the youth will live twice — in the child and in the verse.", "isCorrect": true, "rationale": "The couplet: “But were some child of yours alive that time, / You should live twice, —in it, and in my rhyme.” The child is the living proof that makes the poet’s verse credible; together they provide double immortality."}, {"text": "The youth should record his own testimony to confirm the poet’s praise.", "isCorrect": false, "rationale": "The youth’s self-testimony is not the solution; a living child is the proposed corroborating witness."}, {"text": "The poet will stop writing about the youth’s beauty and focus on his character instead.", "isCorrect": false, "rationale": "No such shift in focus is proposed; the solution is a child who confirms what the verse says."}], "id": "q07"}, {"question": "What does “you should live twice — in it, and in my rhyme” mean?", "options": [{"text": "The youth will be immortalized in two ways: biologically (in a child who inherits his features) and poetically (in the verse that describes him).", "isCorrect": true, "rationale": "This is the sequence’s culminating synthesis: the two forms of immortality — biological (a child) and literary (the poems) — are brought together as a double guarantee of the youth’s survival beyond death."}, {"text": "The youth will be reincarnated twice as different people in future lives.", "isCorrect": false, "rationale": "No belief in reincarnation is expressed; the two lives are child and verse."}, {"text": "The youth will be remembered both for his beauty and for his good deeds.", "isCorrect": false, "rationale": "Good deeds are not the two modes of living; it is child and verse."}, {"text": "The youth will live to see both his own old age and the publication of the poet’s complete works.", "isCorrect": false, "rationale": "Future publication is not the meaning of “live twice”; the two lives are in a child and in verse."}], "id": "q08"}, {"question": "How does Sonnet XVII bring together the two major themes of the procreation sequence?", "options": [{"text": "It focuses entirely on verse as the only reliable immortality and abandons the procreation argument.", "isCorrect": false, "rationale": "Both themes are present in the couplet; neither is abandoned."}, {"text": "The couplet unites biological reproduction (a living child) and poetic immortality (the verse) as complementary, mutually reinforcing guarantees of the youth’s survival.", "isCorrect": true, "rationale": "Sonnet XVII is the culmination: the child proves the verse credible; the verse preserves what the child’s face displays. Together they provide what neither can offer alone — complete, credible immortality."}, {"text": "It argues that verse is superior to children as a form of immortality, completing the pivot begun in Sonnet XV.", "isCorrect": false, "rationale": "The couplet values both equally; it is “in it, AND in my rhyme” — not one over the other."}, {"text": "It argues that neither children nor verse can truly defeat Time, and the sequence ends in resignation.", "isCorrect": false, "rationale": "The tone is not resigned; the couplet is a positive synthesis offering double immortality."}], "id": "q09"}, {"question": "What is the significance of the fact that Sonnet XVII is the last of the formal procreation sonnets?", "options": [{"text": "It marks the end of all sonnets addressed to the fair youth.", "isCorrect": false, "rationale": "The fair youth sonnets continue well past Sonnet 17; the procreation theme ends but the relationship continues."}, {"text": "By closing with the synthesis of child and verse, Sonnet XVII resolves the sequence’s central tension and positions Sonnet 18 (“Shall I compare thee to a summer’s day?”) to take up the verse-immortality theme alone.", "isCorrect": true, "rationale": "The procreation sonnets (1–17) argue primarily for biological reproduction while introducing verse as a secondary weapon. Sonnet XVII’s couplet holds both together in a final synthesis, preparing the reader for the grand verse-immortality claim of Sonnet 18."}, {"text": "It signals that the poet and youth have quarreled and will no longer communicate.", "isCorrect": false, "rationale": "No quarrel is described; the transition is thematic, not biographical."}, {"text": "It is the only sonnet in the sequence written in a different meter.", "isCorrect": false, "rationale": "Sonnet XVII follows the same iambic pentameter pattern as all the others; the significance is thematic, not metrical."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
