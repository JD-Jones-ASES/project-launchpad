    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXIV</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'the child of state' (line 1) mean in the opening conditional?", "options": [{"text": "A child born into the aristocracy", "isCorrect": false, "rationale": "The phrase is metaphorical; 'state' here means political circumstance or Fortune, not noble birth."}, {"text": "Something born of political circumstance, Fortune, or external conditions — unstable and contingent", "isCorrect": true, "rationale": "If the speaker's love were 'the child of state' — born of worldly circumstance — it would be subject to Fortune's reversals, neither permanent nor truly real."}, {"text": "A legitimate heir as opposed to a bastard", "isCorrect": false, "rationale": "While the next line introduces the bastard image, 'child of state' itself denotes contingency, not legitimacy per se."}, {"text": "A statesman's son trained for political life", "isCorrect": false, "rationale": "No literal statesman is described; 'state' refers to political fortune and circumstance."}], "id": "q01"}, {"question": "The phrase 'Fortune's bastard be unfather'd' (line 2) suggests that love dependent on state would:", "options": [{"text": "Be celebrated as a natural product of good fortune", "isCorrect": false, "rationale": "A bastard is illegitimate and disowned; the image is negative."}, {"text": "Be disowned and cast off whenever Fortune changed — illegitimate and without a secure parent", "isCorrect": true, "rationale": "A bastard can be 'unfather'd' — disowned. If love were Fortune's child, Fortune could disown it at will, leaving it without foundation."}, {"text": "Grow stronger from adversity like a self-made man", "isCorrect": false, "rationale": "The bastard image is about insecurity and disownment, not resilient self-making."}, {"text": "Inspire admiration from the youth despite its lowly origins", "isCorrect": false, "rationale": "No admiration is implied; the image is about vulnerability to abandonment."}], "id": "q02"}, {"question": "Lines 5-6 assert: 'No, it was builded far from accident; / It suffers not in smiling pomp, nor falls / Under the blow of thralled discontent.' What is meant by 'builded far from accident'?", "options": [{"text": "The love was built carefully to avoid structural accidents", "isCorrect": false, "rationale": "The language is metaphorical; 'accident' means chance event, not a construction mishap."}, {"text": "The love was founded on something beyond chance or contingency — it is not subject to random fortune", "isCorrect": true, "rationale": "'Accident' in philosophy means a contingent quality, opposed to essence. Love built far from accident is essential, not contingent — unaffected by fortune's swings."}, {"text": "The relationship began deliberately rather than as a chance meeting", "isCorrect": false, "rationale": "While literally applicable, the philosophical sense of 'accident' as contingency is primary here."}, {"text": "The love was kept secret and far from public events", "isCorrect": false, "rationale": "Secrecy is not the point; the claim is about metaphysical independence from chance."}], "id": "q03"}, {"question": "What is 'policy, that heretic' (line 11)?", "options": [{"text": "A religious doctrine that the speaker opposes", "isCorrect": false, "rationale": "Policy is called a heretic metaphorically; it is not itself a religious doctrine."}, {"text": "Political calculation and expedient self-interest, called heretical because it betrays true values for short-term advantage", "isCorrect": true, "rationale": "'Policy' = cunning calculation; 'heretic' = one who betrays true faith. Calling policy a heretic condemns it as a betrayal of genuine virtue in favor of self-serving strategy."}, {"text": "A person in the youth's court who provides false advice", "isCorrect": false, "rationale": "Policy is an abstract principle, not a person."}, {"text": "Religious persecution that the speaker fears will affect his relationship", "isCorrect": false, "rationale": "No literal religious persecution is described; 'heretic' is a metaphor for betrayal of true values."}], "id": "q04"}, {"question": "The image of love that 'nor grows with heat, nor drowns with showers' (line 14) suggests:", "options": [{"text": "The love is emotionally cold and unresponsive", "isCorrect": false, "rationale": "Unresponsiveness is not the point; the image is about stability, not coldness."}, {"text": "The love is so stable that neither favorable conditions nor adversity can alter it", "isCorrect": true, "rationale": "Heat (favorable fortune, 'smiling pomp') cannot make it grow artificially, and showers (adversity, 'thralled discontent') cannot drown it — perfect equanimity."}, {"text": "The speaker's love is seasonal, naturally waxing and waning", "isCorrect": false, "rationale": "The claim is exactly the opposite: the love is immune to seasonal or circumstantial variation."}, {"text": "The youth's temperament is too extreme, ranging from fury to weeping", "isCorrect": false, "rationale": "The image describes the love itself, not the youth's temperament."}], "id": "q05"}, {"question": "The couplet calls as witnesses 'the fools of time, / Which die for goodness, who have lived for crime.' Who are these 'fools of time'?", "options": [{"text": "Young fools who waste their lives in pleasure", "isCorrect": false, "rationale": "The fools of time are specifically those who undergo a deathbed conversion — changing at the end after living badly."}, {"text": "Those who lived for crime but died for goodness — last-minute converts whose deathbed repentance proves the power of genuine constancy by contrast", "isCorrect": true, "rationale": "These are people whose lives were devoted to crime but who attempted a theatrical virtue at death — 'fools of time' because they were deceived or tried to deceive time. Their superficial conversion proves by contrast the speaker's deep constancy."}, {"text": "Powerful rulers who squandered their political advantages", "isCorrect": false, "rationale": "Political rulers are not specifically described; the fools are those who reversed values at the last moment."}, {"text": "The rival poets who tried and failed to win the youth's patronage", "isCorrect": false, "rationale": "Rival poets are not the reference; the couplet witnesses to a general human type."}], "id": "q06"}, {"question": "The phrase 'works on leases of short-number'd hours' (line 12) means that policy:", "options": [{"text": "Signs contracts that expire quickly", "isCorrect": false, "rationale": "While the metaphor is from leasing, the point is about temporal scope, not literal contracts."}, {"text": "Operates only within the horizon of short-term self-interest, unable to see beyond immediate advantage", "isCorrect": true, "rationale": "A 'lease' is temporary tenure; 'short-number'd hours' emphasizes the brevity. Policy thinks only in short-term calculations, unlike the love that 'stands hugely politic' on its own."}, {"text": "Governs relationships through hour-by-hour management and scheduling", "isCorrect": false, "rationale": "Management is not the image; the phrase criticizes the temporal shallowness of policy."}, {"text": "Operates in secrecy, working quickly before detection", "isCorrect": false, "rationale": "Speed of concealment is not the point; the image is about temporal limitation of horizon."}], "id": "q07"}, {"question": "Sonnet CXXIV's primary argument is that the speaker's love is:", "options": [{"text": "Passionate and intense beyond all rational measure", "isCorrect": false, "rationale": "Passion is not the argument; the sonnet argues for stability and independence from fortune."}, {"text": "Transcendent and independent of Fortune, Time, policy, and circumstance — grounded in something absolute", "isCorrect": true, "rationale": "The whole sonnet builds the case that the love stands free of every contingent force: Fortune, political cunning, favorable or adverse conditions — it is absolute and self-standing."}, {"text": "Socially advantageous because of the youth's high rank and patronage", "isCorrect": false, "rationale": "The sonnet explicitly argues against love as 'child of state' — social advantage is what it transcends."}, {"text": "Proven by the speaker's suffering during separation", "isCorrect": false, "rationale": "Suffering is the proof used in other sonnets; CXXIV argues from philosophical independence, not from personal ordeal."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
