<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXLII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker declare to be his sin in the opening line?", "options": [{"text": "Hatred", "isCorrect": false, "rationale": "Hatred is the Dark Lady's virtue, not the speaker's named sin."}, {"text": "Love", "isCorrect": true, "rationale": "The speaker opens with 'Love is my sin,' directly naming love as his transgression."}, {"text": "Pride", "isCorrect": false, "rationale": "Pride is not named as the speaker's sin in this sonnet."}, {"text": "Lust", "isCorrect": false, "rationale": "While lust is implied, the speaker's explicitly named sin is love."}]}, {"question": "How does the speaker describe the Dark Lady's 'virtue'?", "options": [{"text": "Love of his virtue", "isCorrect": false, "rationale": "The speaker does not say she loves his virtue; her virtue is defined as hating his sin."}, {"text": "Hate of his sin, grounded on sinful loving", "isCorrect": true, "rationale": "The paradox is that her virtue — hating his sin — is itself grounded in her own sinful loving."}, {"text": "Chastity and faithfulness", "isCorrect": false, "rationale": "The sonnet makes clear she is neither chaste nor faithful."}, {"text": "Mercy and pity", "isCorrect": false, "rationale": "Mercy and pity are what the speaker requests, not her stated virtue."}]}, {"question": "What logical argument does the speaker use to deflect the Dark Lady's reproach?", "options": [{"text": "He claims he has never sinned", "isCorrect": false, "rationale": "The speaker freely admits his sin; he does not deny it."}, {"text": "He argues her own conduct is equally sinful, so she has no standing to reprove him", "isCorrect": true, "rationale": "'Compare thou thine own state' — he turns the accusation back on her to show she is no better."}, {"text": "He argues that love is not truly a sin under any moral code", "isCorrect": false, "rationale": "He accepts that his love is sinful; his argument is comparative, not definitional."}, {"text": "He appeals to divine forgiveness as trumping human judgment", "isCorrect": false, "rationale": "Divine forgiveness is not invoked; his argument is purely tu quoque."}]}, {"question": "The phrase 'profan'd their scarlet ornaments' refers to what part of the Dark Lady?", "options": [{"text": "Her jewels", "isCorrect": false, "rationale": "Scarlet ornaments is a metaphor for lips, not jewelry."}, {"text": "Her lips", "isCorrect": true, "rationale": "'Scarlet ornaments' is a poetic periphrasis for her red lips, which she has profaned through false love-vows."}, {"text": "Her garments", "isCorrect": false, "rationale": "Garments are not the subject; the line concerns speech and false vows made with her lips."}, {"text": "Her eyes", "isCorrect": false, "rationale": "The eyes are mentioned later in the sonnet in a different context."}]}, {"question": "What does the speaker accuse the Dark Lady of doing to 'others' beds'?", "options": [{"text": "Abandoning them for him", "isCorrect": false, "rationale": "The accusation is broader — she robs multiple partners, not just leaving one for the speaker."}, {"text": "Robbing them of their revenues", "isCorrect": true, "rationale": "'Robb'd others' beds' revenues of their rents' accuses her of sexual infidelity — stealing what is owed to lawful partners."}, {"text": "Shaming them publicly", "isCorrect": false, "rationale": "Public shaming is not the charge; the metaphor concerns financial theft from marital bonds."}, {"text": "Filling them with false hope", "isCorrect": false, "rationale": "False hope is not the economic metaphor used here."}]}, {"question": "What is the speaker's main request in the sestet?", "options": [{"text": "That she confess her sins publicly", "isCorrect": false, "rationale": "Public confession is not requested; he seeks private pity and reciprocal love."}, {"text": "That she grant him the same love she pursues in others", "isCorrect": false, "rationale": "He asks for pity specifically, modeled on how she woos others."}, {"text": "That she root pity in her heart so she may herself deserve pity", "isCorrect": true, "rationale": "'Root pity in thy heart, that when it grows, / Thy pity may deserve to pitied be' — pity is both his request and the condition that earns her own future pity."}, {"text": "That she break off all other liaisons and be faithful to him", "isCorrect": false, "rationale": "Fidelity is not the explicit request; the ask is for pity extended symmetrically."}]}, {"question": "What rhetorical device is central to the couplet 'If thou dost seek to have what thou dost hide, / By self-example mayst thou be denied'?", "options": [{"text": "Simile", "isCorrect": false, "rationale": "No explicit comparison using 'like' or 'as' appears in the couplet."}, {"text": "Poetic justice / reciprocity", "isCorrect": true, "rationale": "The couplet warns that by withholding pity she sets a precedent that will be applied against her own desire for pity — a warning built on moral symmetry."}, {"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe addresses an absent or abstract entity; the Dark Lady is the direct addressee throughout."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "The couplet is precise and measured rather than exaggerated."}]}, {"question": "The overall argument of Sonnet CXLII can best be described as:", "options": [{"text": "A straightforward confession of guilt with no defense offered", "isCorrect": false, "rationale": "The speaker does confess but immediately mounts a comparative defense."}, {"text": "A tu quoque argument: the speaker concedes his sin but claims the lady's conduct is equally sinful", "isCorrect": true, "rationale": "He admits 'Love is my sin' but spends the rest of the sonnet arguing she has no moral authority to reproach him."}, {"text": "A celebration of mutual love despite social condemnation", "isCorrect": false, "rationale": "The tone is defensive and accusatory, not celebratory."}, {"text": "A plea to abandon their relationship for the sake of morality", "isCorrect": false, "rationale": "The speaker does not advocate ending the relationship; he seeks continued love or at least pity."}]}, {"question": "What does the legal/economic language ('bonds,' 'revenues,' 'rents') suggest about love in this sonnet?", "options": [{"text": "Love is pure and above commercial concerns", "isCorrect": false, "rationale": "The economic metaphors undercut any idealization of love here."}, {"text": "Love and fidelity are treated as contractual obligations that both parties have violated", "isCorrect": true, "rationale": "The commercial language frames sexual and emotional fidelity as debt — broken bonds, stolen rents — implicating both speaker and lady in legal-moral failure."}, {"text": "The speaker is literally owed money by the Dark Lady", "isCorrect": false, "rationale": "The financial language is metaphorical, describing betrayed marital fidelity, not actual debts."}, {"text": "The speaker tries to elevate love above base financial transactions", "isCorrect": false, "rationale": "The speaker uses financial imagery to accuse, not to elevate."}]}, {"question": "Which theme is most prominent in Sonnet CXLII?", "options": [{"text": "The immortalizing power of verse", "isCorrect": false, "rationale": "Immortality through poetry is a Fair Youth theme; it does not appear in CXLII."}, {"text": "Moral hypocrisy and the impossibility of sincere reproach between two sinners", "isCorrect": true, "rationale": "The central tension is that the Dark Lady's hate of his sin is itself grounded in sinful loving — neither party occupies moral high ground."}, {"text": "The speaker's pride in resisting temptation", "isCorrect": false, "rationale": "The speaker does not resist temptation; he defends his continued sinning."}, {"text": "Nature's inevitable decay", "isCorrect": false, "rationale": "Time and decay are not themes of this sonnet."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
