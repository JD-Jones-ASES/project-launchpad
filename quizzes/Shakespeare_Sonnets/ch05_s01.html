<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet XXXIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What natural phenomenon does Shakespeare use as the central metaphor in Sonnet XXXIII?", "options": [{"text": "A storm at sea", "isCorrect": false, "rationale": "The sonnet uses weather imagery but focuses on the sun and clouds, not a sea storm."}, {"text": "The sun being obscured by clouds", "isCorrect": true, "rationale": "The glorious morning sun that flatters mountain tops and gilds streams is then hidden by base clouds — a metaphor for the beloved's early shine followed by withdrawal."}, {"text": "A lunar eclipse", "isCorrect": false, "rationale": "The sonnet centers on the sun, not the moon."}, {"text": "A rainbow after rain", "isCorrect": false, "rationale": "No rainbow imagery appears; the poem dwells on the concealment of light, not its return."}], "id": "q01"}, {"question": "What does “heavenly alchemy” refer to in line 4?", "options": [{"text": "The beloved's ability to transform base metals into gold", "isCorrect": false, "rationale": "The beloved is not described as an alchemist; the image belongs to the sun's transforming light."}, {"text": "The sun's golden light transforming pale streams", "isCorrect": true, "rationale": "Alchemy was the practice of turning base materials to gold; here the sun's rays gild even dull streams, making them appear precious."}, {"text": "The magical power of the poet's verse", "isCorrect": false, "rationale": "The Muse and verse are not mentioned in this sonnet; the imagery is purely solar."}, {"text": "A religious ritual performed at dawn", "isCorrect": false, "rationale": "There is no religious ritual; alchemy here is used as a metaphor for the sun's gilding effect."}], "id": "q02"}, {"question": "The word “Anon” in line 5 most nearly means:", "options": [{"text": "Never", "isCorrect": false, "rationale": "“Anon” means shortly or soon, the opposite of never."}, {"text": "Suddenly / shortly afterward", "isCorrect": true, "rationale": "“Anon” is an archaic adverb meaning soon or at once, signaling the abrupt shift from sunlight to cloud cover."}, {"text": "Secretly", "isCorrect": false, "rationale": "“Stealing” in line 10 carries the secret motion; “Anon” simply means soon."}, {"text": "Forever", "isCorrect": false, "rationale": "“Evermore” would convey permanence; “Anon” signals a quick, temporary change."}], "id": "q03"}, {"question": "What is the “ugly rack” that rides across the sun's celestial face?", "options": [{"text": "A torture device used by the speaker's enemies", "isCorrect": false, "rationale": "“Rack” here is a meteorological term, not an instrument of torture."}, {"text": "A mass of wind-driven clouds", "isCorrect": true, "rationale": "In Elizabethan English, “rack” denoted clouds or mist driven swiftly by the wind, fitting the image of ugly clouds obscuring the sun."}, {"text": "A wooden cart carrying the beloved away", "isCorrect": false, "rationale": "No literal vehicle appears; the imagery is atmospheric."}, {"text": "A framework of scaffolding blocking sunlight", "isCorrect": false, "rationale": "The poem is about weather, not architecture."}], "id": "q04"}, {"question": "In the volta at line 11 (“Even so my sun one early morn did shine”), Shakespeare shifts from:", "options": [{"text": "Despair to hope", "isCorrect": false, "rationale": "The volta does not move toward hope; it applies the cloud metaphor to a personal grievance."}, {"text": "Nature description to personal application", "isCorrect": true, "rationale": "The first eight lines describe the sun and clouds in nature; line 11 begins the turn that applies this extended metaphor directly to the speaker's relationship with the beloved (“my sun”)."}, {"text": "Praise of the beloved to criticism", "isCorrect": false, "rationale": "The sonnet closes with forgiveness, not criticism."}, {"text": "First person to third person narration", "isCorrect": false, "rationale": "The speaker uses “I” throughout; the shift is thematic, not grammatical."}], "id": "q05"}, {"question": "What does “region cloud” (line 14) suggest about the force that has hidden the beloved?", "options": [{"text": "A cloud confined to a specific atmospheric region — something beyond the beloved's control", "isCorrect": true, "rationale": "“Region” refers to the upper atmosphere; the image implies an external, powerful force obscuring the beloved, softening the sense of personal betrayal."}, {"text": "A cloud from a foreign country that brought illness", "isCorrect": false, "rationale": "Geographic origin is not the point; “region” here is meteorological, denoting altitude."}, {"text": "A cloud made by the speaker's tears", "isCorrect": false, "rationale": "No tears appear in this sonnet; the tears of repentance appear in Sonnet XXXIV."}, {"text": "A storm sent by a divine power as punishment", "isCorrect": false, "rationale": "Divine punishment is not implied; the image stresses the external nature of the obscuring force."}], "id": "q06"}, {"question": "How does the couplet resolve the poem's emotional tension?", "options": [{"text": "The speaker vows to end the friendship", "isCorrect": false, "rationale": "The speaker explicitly states his love does “no whit disdain” the beloved despite the offense."}, {"text": "The speaker forgives because even heaven's sun is sometimes stained", "isCorrect": true, "rationale": "The couplet argues that if even the actual sun can be stained, the beloved's lapse is understandable — a universalizing move that permits forgiveness."}, {"text": "The speaker prays for divine intervention to restore the friendship", "isCorrect": false, "rationale": "No prayer appears; the speaker reasons his way to forgiveness through analogy."}, {"text": "The speaker blames himself for the breach", "isCorrect": false, "rationale": "Self-blame is the territory of Sonnet XXXV; here the speaker simply forgives."}], "id": "q07"}, {"question": "The phrase “sovereign eye” (line 2) is an example of:", "options": [{"text": "Simile", "isCorrect": false, "rationale": "A simile uses “like” or “as”; “sovereign eye” directly attributes the eye to the sun without such a comparison marker."}, {"text": "Personification and metaphor", "isCorrect": true, "rationale": "Giving the sun an “eye” personifies it, and calling that eye “sovereign” (kingly) extends the metaphor of the sun as a royal being — consistent with “my sun” later meaning the beloved."}, {"text": "Onomatopoeia", "isCorrect": false, "rationale": "Onomatopoeia involves words that sound like what they describe; neither “sovereign” nor “eye” imitates a sound."}, {"text": "Synecdoche", "isCorrect": false, "rationale": "Synecdoche substitutes a part for a whole or vice versa; here the eye is a figurative attribute, not a literal part standing for the whole sun."}], "id": "q08"}, {"question": "What does “Steal unseen to west” (line 10) imply about the sun's — and by extension the beloved's — behavior?", "options": [{"text": "The sun moves quickly, suggesting the beloved is energetic", "isCorrect": false, "rationale": "Speed is not the point; “stealing” implies concealment and surreptitious departure."}, {"text": "The sun retreats in shame, implying the beloved has withdrawn guiltily", "isCorrect": true, "rationale": "“Stealing” means moving quietly and furtively; the sun is said to slink westward with its “disgrace,” projecting guilt and shame onto the beloved's withdrawal."}, {"text": "The sun sets because God commands it, suggesting fate overrules free will", "isCorrect": false, "rationale": "Divine command is not invoked; the emphasis is on the shame that accompanies the retreat."}, {"text": "The sun is stolen by an enemy, making the beloved a victim", "isCorrect": false, "rationale": "While the clouds are external, “Stealing unseen to west” describes the sun's own movement, not its abduction."}], "id": "q09"}, {"question": "Which of the following best describes the overall tone of Sonnet XXXIII?", "options": [{"text": "Joyful celebration of a renewed friendship", "isCorrect": false, "rationale": "The sonnet describes a loss of intimacy that has not yet been restored; there is no celebration."}, {"text": "Bitter anger at the beloved's betrayal", "isCorrect": false, "rationale": "While hurt is present, the couplet's forgiveness prevents the tone from being bitter anger."}, {"text": "Sad but forgiving acceptance of the beloved's withdrawal", "isCorrect": true, "rationale": "The octave's splendid imagery gives way to loss, and the couplet extends forgiveness (“my love no whit disdaineth”), producing a tone of sorrowful but magnanimous acceptance."}, {"text": "Philosophical detachment from all human relationships", "isCorrect": false, "rationale": "The speaker is deeply personally invested; detachment would be inconsistent with “out! alack!”"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
