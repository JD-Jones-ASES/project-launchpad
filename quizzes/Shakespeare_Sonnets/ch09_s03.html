<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet LXXXIX</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the speaker offer to do if the beloved names a fault to justify leaving?", "options": [{"text": "Deny the fault and defend himself", "isCorrect": false, "rationale": "The opposite is true: the speaker promises to accept the accusation without defense."}, {"text": "Comment on and confirm the offence without making any defense", "isCorrect": true, "rationale": "Lines 3-6 make clear the speaker will agree with whatever charge is made and will not defend himself against the beloved's reasons."}, {"text": "Leave the city to spare the beloved embarrassment", "isCorrect": false, "rationale": "Leaving the city is one later step, but the first action offered is verbal capitulation to the charge."}, {"text": "Write a public confession of his faults", "isCorrect": false, "rationale": "No public confession is mentioned; the capitulation is directed toward the beloved privately."}]}, {"question": "What does 'I straight will halt' mean in line 5 ('Speak of my lameness, and I straight will halt')?", "options": [{"text": "The speaker will stop walking forever", "isCorrect": false, "rationale": "'Halt' here means to limp, not to stop entirely."}, {"text": "The speaker will immediately start limping — pretending the lameness is real", "isCorrect": true, "rationale": "'Halt' in Elizabethan English means to limp; the speaker will perform the very fault the beloved names, even if feigned, to support the beloved's narrative."}, {"text": "The speaker will halt the process of separation", "isCorrect": false, "rationale": "The speaker is not trying to stop the separation but rather to facilitate it by accepting all blame."}, {"text": "The speaker will pause before responding", "isCorrect": false, "rationale": "'Straight' means immediately, and 'halt' means limp; the line is about physical performance of the named fault."}]}, {"question": "What does 'I will acquaintance strangle, and look strange' mean?", "options": [{"text": "The speaker will kill his enemies", "isCorrect": false, "rationale": "'Acquaintance strangle' means to suppress or extinguish the familiarity and connection between them, not literal violence."}, {"text": "The speaker will suppress all signs of their former intimacy and act as a stranger", "isCorrect": true, "rationale": "The speaker promises to kill off (strangle) their shared acquaintance and look at the beloved as a stranger would — eliminating any visible remnant of their bond."}, {"text": "The speaker will avoid society altogether", "isCorrect": false, "rationale": "The avoidance is specifically directed toward the beloved, not toward society in general."}, {"text": "The speaker will adopt an unusual appearance", "isCorrect": false, "rationale": "'Look strange' means to look at the beloved as a stranger, not to adopt a strange costume."}]}, {"question": "Why does the speaker vow never to speak the beloved's name again (lines 11-14)?", "options": [{"text": "Because speaking the name would be an act of revenge", "isCorrect": false, "rationale": "The motivation is precisely the opposite of revenge; it is reverence combined with self-erasure."}, {"text": "Because profaning the beloved's name or accidentally revealing their old acquaintance would harm the beloved", "isCorrect": true, "rationale": "The speaker fears that speaking the name would be to profane it, and that mentioning old acquaintance might compromise the beloved's desired new identity. Silence is protective, not punitive."}, {"text": "Because he has forgotten how to love", "isCorrect": false, "rationale": "The vow of silence is motivated by love, not forgetting."}, {"text": "Because the beloved has commanded him never to speak", "isCorrect": false, "rationale": "No such command is recorded; the speaker takes this vow on his own initiative out of love."}]}, {"question": "What does the final couplet ('For I must ne'er love him whom thou dost hate') reveal about the speaker's self-perception?", "options": [{"text": "He believes the beloved hates him and therefore hates himself", "isCorrect": true, "rationale": "If the beloved hates the speaker, and the speaker cannot love anyone the beloved hates, then the speaker must also hate himself — a logical extreme of self-abnegation."}, {"text": "He is warning the beloved not to hate", "isCorrect": false, "rationale": "The line is about the speaker's own internal logic of devotion, not a warning to the beloved."}, {"text": "He loves himself more than the beloved", "isCorrect": false, "rationale": "The entire argument moves in the opposite direction: self-love is completely subordinated."}, {"text": "He is threatening to harm himself", "isCorrect": false, "rationale": "Though the logical implication is self-hatred, the tone is one of devoted submission, not a threat."}]}, {"question": "What is the main rhetorical strategy the speaker employs throughout Sonnet LXXXIX?", "options": [{"text": "Flattery of the beloved's beauty", "isCorrect": false, "rationale": "No praise of the beloved's physical beauty appears; the strategy is self-abnegation, not flattery."}, {"text": "Preemptive self-condemnation to spare the beloved the work of justifying the separation", "isCorrect": true, "rationale": "The speaker offers to do whatever the beloved needs to justify the break — inventing or confirming any fault — so the beloved need not bear the moral burden of the estrangement."}, {"text": "A logical argument that the separation is the beloved's fault", "isCorrect": false, "rationale": "The speaker consistently assumes all fault; there is no accusation directed at the beloved."}, {"text": "An appeal to shared memories to prevent the separation", "isCorrect": false, "rationale": "The speaker does not appeal to memory to prevent separation; he actively facilitates it."}]}, {"question": "The phrase 'to set a form upon desired change' (line 8) means:", "options": [{"text": "To decorate a piece of furniture", "isCorrect": false, "rationale": "This is not a reference to furniture; 'form' here means a justification or formal reason."}, {"text": "To provide a formal justification or pretext for a change already desired", "isCorrect": true, "rationale": "'Set a form upon desired change' means to give shape or justification to a change the beloved already wants — the speaker is saying the beloved need only name a reason and he will validate it."}, {"text": "To resist an unwanted transformation", "isCorrect": false, "rationale": "The speaker does not resist; he accommodates the desired change."}, {"text": "To write down the terms of a contract", "isCorrect": false, "rationale": "While there is legal metaphor in Sonnet LXXXVII, here 'form' means a justifying pretext, not a contract."}]}, {"question": "Which theme does Sonnet LXXXIX share most closely with Sonnet LXXXVIII?", "options": [{"text": "The joy of requited love", "isCorrect": false, "rationale": "Neither sonnet presents love as reciprocal or joyful."}, {"text": "The speaker's willingness to harm himself for the beloved's benefit", "isCorrect": true, "rationale": "Both LXXXVIII and LXXXIX present the speaker actively working against his own interests — testifying against himself (LXXXVIII) and confirming false faults (LXXXIX) — as the ultimate expression of love."}, {"text": "Anger at the beloved's unfaithfulness", "isCorrect": false, "rationale": "Neither sonnet expresses anger; both present acceptance and self-sacrifice."}, {"text": "Envy of the rival poet", "isCorrect": false, "rationale": "No rival poet is present in this chapter's opening sequence."}]}, {"question": "The instruction to 'be absent from thy walks' most directly illustrates:", "options": [{"text": "The speaker's desire to travel", "isCorrect": false, "rationale": "Travel is not the motivation; absence is a form of devotional self-erasure."}, {"text": "The speaker's commitment to removing himself from the beloved's physical and social world", "isCorrect": true, "rationale": "Avoiding the beloved's regular places is one of several concrete actions by which the speaker promises to erase all traces of their connection from the beloved's life."}, {"text": "The beloved's command that the speaker stay away", "isCorrect": false, "rationale": "No such command is quoted; the speaker volunteers these actions."}, {"text": "The speaker's fear of public humiliation", "isCorrect": false, "rationale": "The motivation is love and protection of the beloved's interests, not personal fear of embarrassment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
