    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Shakespeare_Sonnets.html">&larr; Back to Shakespeare&#x27;s Sonnets: A Reading Companion</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Sonnet CXXVIII</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the mistress doing at the start of Sonnet CXXVIII?", "options": [{"text": "Singing a lullaby", "isCorrect": false, "rationale": "The mistress is playing an instrument, not singing."}, {"text": "Playing a keyboard instrument", "isCorrect": true, "rationale": "The speaker watches her play upon 'that blessed wood whose motion sounds,' referring to a virginal or harpsichord."}, {"text": "Dancing at a court masque", "isCorrect": false, "rationale": "She is seated at a keyboard instrument, not dancing."}, {"text": "Writing poetry", "isCorrect": false, "rationale": "The sonnet describes music-making, not writing."}]}, {"question": "What does the speaker call the mistress in the opening line?", "options": [{"text": "My dark angel", "isCorrect": false, "rationale": "This phrase does not appear in the sonnet."}, {"text": "My music", "isCorrect": true, "rationale": "The speaker addresses her directly as 'thou, my music,' merging the woman with the music she produces."}, {"text": "My mistress", "isCorrect": false, "rationale": "While she is referred to as the mistress elsewhere in the sequence, here the opening address is 'my music.'"}, {"text": "My blessed wood", "isCorrect": false, "rationale": "'Blessed wood' refers to the instrument's keys, not to the woman."}]}, {"question": "What does the speaker envy in this sonnet?", "options": [{"text": "Other musicians who are more talented", "isCorrect": false, "rationale": "The envy is directed at the keys of the instrument, not rival musicians."}, {"text": "The keyboard jacks that leap up to kiss her hand", "isCorrect": true, "rationale": "The speaker envies the 'saucy jacks' — the instrument's keys — that leap up to touch 'the tender inward of thy hand.'"}, {"text": "The music that fills her ears", "isCorrect": false, "rationale": "It is touch and physical contact, not sound, that the speaker envies."}, {"text": "The audience listening to her play", "isCorrect": false, "rationale": "The sonnet focuses on the intimacy of touch between her fingers and the keys, not audience reception."}]}, {"question": "What are the 'jacks' in this sonnet?", "options": [{"text": "The speaker's rivals for the mistress's affection", "isCorrect": false, "rationale": "While 'saucy jacks' carries connotations of bold impertinence, the primary meaning here is the mechanical keys of the instrument."}, {"text": "The wooden keys or quill-plectra of the keyboard instrument", "isCorrect": true, "rationale": "Jacks are the upright leaping parts of the virginal or harpsichord mechanism that pluck the strings when a key is pressed."}, {"text": "Playing cards used in a game", "isCorrect": false, "rationale": "In this musical context, jacks refer to the instrument's mechanism."}, {"text": "The speaker's friends watching the performance", "isCorrect": false, "rationale": "The jacks are part of the instrument, not human observers."}]}, {"question": "What does the speaker's claim that 'dead wood' is 'more bless'd than living lips' emphasize?", "options": [{"text": "The speaker believes music is superior to human emotion", "isCorrect": false, "rationale": "The comparison emphasizes erotic frustration, not a philosophical preference for music."}, {"text": "The painful irony that inanimate instrument keys enjoy physical intimacy he is denied", "isCorrect": true, "rationale": "The phrase underscores the speaker's erotic frustration: lifeless wood receives her touch while his living lips stand apart, denied."}, {"text": "The speaker plans to stop pursuing her", "isCorrect": false, "rationale": "The couplet's request shows continued desire, not abandonment."}, {"text": "He admires the craftsmanship of the instrument", "isCorrect": false, "rationale": "The sonnet uses the instrument as a vehicle for erotic longing, not aesthetic appreciation."}]}, {"question": "What does the speaker request in the closing couplet?", "options": [{"text": "That she stop playing and come to him", "isCorrect": false, "rationale": "He does not ask her to stop playing."}, {"text": "That she give the keys her fingers and give him her lips to kiss", "isCorrect": true, "rationale": "The couplet resolves the conceit: 'Give them thy fingers, me thy lips to kiss' — the keys may have her hands, but he wants her lips."}, {"text": "That she play a song composed for him", "isCorrect": false, "rationale": "The request is for a kiss, not a musical dedication."}, {"text": "That she teach him to play the instrument", "isCorrect": false, "rationale": "The speaker's desire is erotic, not musical."}]}, {"question": "The phrase 'wiry concord that mine ear confounds' describes what?", "options": [{"text": "A discordant, unpleasant sound that hurts his ears", "isCorrect": false, "rationale": "'Confounds' here means overwhelms or ravishes, not disturbs unpleasantly."}, {"text": "The beautiful, complex harmony of the strings that overwhelms the speaker's senses", "isCorrect": true, "rationale": "'Wiry concord' refers to the harmonious sound of the wire strings, and 'confounds' means overwhelms or ravishes his ear with pleasure."}, {"text": "The sound of her voice singing along", "isCorrect": false, "rationale": "The wiry concord comes from the string instrument, not the voice."}, {"text": "The jarring noise of the keys being struck too hard", "isCorrect": false, "rationale": "The context is one of gentle, pleasurable playing, not harsh noise."}]}, {"question": "What term does the speaker use for the keyboard keys to give them a sense of bold impudence?", "options": [{"text": "Blessed wood", "isCorrect": false, "rationale": "'Blessed wood' expresses the speaker's envy and admiration, not impudence."}, {"text": "Saucy jacks", "isCorrect": true, "rationale": "'Saucy jacks' personifies the keys as impudent rogues who dare to touch what the speaker cannot."}, {"text": "Dancing chips", "isCorrect": false, "rationale": "'Dancing chips' emphasizes the lightness of the keys' movement rather than their boldness."}, {"text": "Nimble leapers", "isCorrect": false, "rationale": "While the jacks 'nimble leap,' the specific phrase carrying impudence is 'saucy jacks.'"}]}, {"question": "What is the dominant figure of speech in Sonnet CXXVIII?", "options": [{"text": "Allegory", "isCorrect": false, "rationale": "The sonnet uses an extended conceit rather than a sustained allegorical narrative."}, {"text": "Extended metaphor (conceit) comparing keyboard keys to erotic rivals", "isCorrect": true, "rationale": "The entire sonnet builds on the conceit that the instrument's jacks are bold suitors who enjoy the physical intimacy denied to the speaker."}, {"text": "Simile comparing her fingers to doves", "isCorrect": false, "rationale": "No such simile appears; the controlling figure is the keyboard conceit."}, {"text": "Apostrophe to absent Love", "isCorrect": false, "rationale": "The speaker addresses the mistress directly, not an absent abstraction."}]}, {"question": "How does Sonnet CXXVIII differ in tone from Sonnet CXXIX?", "options": [{"text": "CXXVIII is bitter and cynical; CXXIX is playful", "isCorrect": false, "rationale": "CXXIX is the bitter, violent meditation on lust; CXXVIII is lighter and playful."}, {"text": "CXXVIII is playful and sensually light; CXXIX is dark and morally tortured", "isCorrect": true, "rationale": "CXXVIII handles erotic longing with wit and a musical conceit; CXXIX shifts to a grave indictment of lust's destructive power."}, {"text": "Both sonnets share the same tone of despair", "isCorrect": false, "rationale": "The tones differ markedly between the two sonnets."}, {"text": "CXXVIII is about music theory; CXXIX is about romantic idealism", "isCorrect": false, "rationale": "Neither characterization is accurate to the sonnets' actual content and tone."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
