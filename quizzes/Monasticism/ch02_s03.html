<script>
var QUESTIONS = [{"question": "How did the theology of the Desert Fathers primarily differ from academic theological traditions?", "options": [{"text": "It was systematized through formal education and university lectures.", "isCorrect": false, "rationale": "The text states they 'did not write systematic treatises or attend university lectures.' Their theology was not academic in this sense."}, {"text": "It was developed through centuries of philosophical debate and intellectual discourse.", "isCorrect": false, "rationale": "The text emphasizes lived experience and struggle over philosophical debate as the origin of their theology."}, {"text": "It emerged from their lived experience of prayer, fasting, silence, and struggle in the Egyptian wilderness.", "isCorrect": true, "rationale": "The text explicitly states, 'Their theology was forged in the furnace of lived experience — in years of prayer, fasting, silence, and struggle in the Egyptian wilderness.'"}, {"text": "It focused exclusively on dogmatic declarations approved by Church councils.", "isCorrect": false, "rationale": "While their insights became foundational, their personal theology was not primarily about dogmatic declarations but about practical spiritual insight gained from experience."}]}, {"question": "The Desert Fathers embraced *fuga mundi*. What was their fundamental motivation for this 'flight from the world'?", "options": [{"text": "A belief that God's creation itself was inherently evil and corrupt.", "isCorrect": false, "rationale": "The text clarifies, 'This does not mean hatred of God's creation,' and that 'ordinary life was good and holy.'"}, {"text": "A desire to escape social responsibilities and communal life due to personal introversion.", "isCorrect": false, "rationale": "While solitude was a practice, the primary motivation was not escape from responsibility or introversion, but a deeper pursuit of God."}, {"text": "A profound love for God that compelled them to remove distractions and pursue Him entirely.", "isCorrect": true, "rationale": "The text states, 'They fled because they loved God more. ... By stripping away every distraction, they sought to create the conditions in which the soul could turn entirely toward God.'"}, {"text": "A rejection of all forms of material possessions as inherently sinful and forbidden.", "isCorrect": false, "rationale": "The focus was on detachment from distractions and entanglements, not that possessions themselves were inherently sinful, but that love of them divided the heart from God."}]}, {"question": "According to the text, the 'evangelical counsels' represent:", "options": [{"text": "Strict commands binding on all Christians for salvation, found in the Old Testament.", "isCorrect": false, "rationale": "The text states they are 'not commands binding on all Christians' and are 'rooted in the counsels (advice) of Christ in the Gospels' (New Testament)."}, {"text": "Radical forms of self-giving (poverty, chastity, obedience) rooted in Christ's advice, embraced systematically by the Desert Fathers.", "isCorrect": true, "rationale": "The text defines them as 'invitations to a more radical form of discipleship' rooted in Christ's counsels, and states the Desert Fathers 'were the first Christians to embrace these counsels in a systematic, lifelong way.'"}, {"text": "Practices developed by Church councils specifically for the clergy to maintain discipline.", "isCorrect": false, "rationale": "The text explicitly links them to Christ's counsels in the Gospels, not Church councils, and they apply to consecrated life in general, not exclusively clergy."}, {"text": "Philosophical principles derived from ancient Greek stoicism to achieve emotional detachment.", "isCorrect": false, "rationale": "The evangelical counsels are presented as distinctly Christian, rooted in the Gospels, not ancient Greek philosophy."}]}, {"question": "The Desert Fathers viewed the spiritual life as 'spiritual warfare.' Who or what did they primarily consider the 'enemies' in this battle, and what were their 'weapons'?", "options": [{"text": "They fought against political oppressors and heretical doctrines using social activism and theological arguments.", "isCorrect": false, "rationale": "The text states their 'wrestling is not against flesh and blood,' indicating their enemies were not primarily political or human, and their weapons were spiritual, not political or purely academic."}, {"text": "They contended with fellow monks in doctrinal disputes, armed with scriptural exegesis and intellectual debate.", "isCorrect": false, "rationale": "While monastic communities could have disputes, the primary 'warfare' described is against 'invisible enemies,' not fellow monks, and the weapons are spiritual practices, not intellectual debate."}, {"text": "They battled invisible 'principalities and powers' (demons) and internal weaknesses, using prayer, fasting, humility, and vigilance.", "isCorrect": true, "rationale": "The text clearly states they fought 'not against flesh and blood, but against “principalities and powers”' and that 'The weapons of this warfare are prayer, fasting, humility, vigilance, and trust in God.' It also notes 'his worst enemies were not outside but inside.'"}, {"text": "They struggled against the harsh desert environment and wild animals, relying on physical endurance and survival skills.", "isCorrect": false, "rationale": "While they lived in a harsh environment, the text emphasizes the *spiritual* nature of their combat against 'invisible enemies' and internal struggles, not primarily physical survival."}]}, {"question": "Evagrius Ponticus systematized the 'eight deadly thoughts' (logismoi). What is the crucial understanding of these logismoi for the Desert Fathers?", "options": [{"text": "They are seven grave sins that automatically lead to damnation if not confessed.", "isCorrect": false, "rationale": "Evagrius listed eight thoughts, and the text clarifies they 'are not sins in themselves, but dangerous currents of thought that lead to sin if not resisted.'"}, {"text": "They are specific, external demonic attacks that manifest only in complete solitude.", "isCorrect": false, "rationale": "The text states 'his worst enemies were not outside but inside,' indicating these thoughts arise internally, though solitude can expose them."}, {"text": "They are recurring patterns of temptation that are not sins in themselves but can lead to sin if not resisted.", "isCorrect": true, "rationale": "The definition box for 'Logismoi' states they are 'not sins in themselves, but dangerous currents of thought that lead to sin if not resisted.'"}, {"text": "They are psychological disorders that require professional therapeutic intervention for modern individuals.", "isCorrect": false, "rationale": "The Desert Fathers understood these as spiritual challenges to be combated through ascetic practices and grace, not modern psychological conditions."}]}, {"question": "A monk finds himself in his cell at midday, feeling an overwhelming sense of boredom, restlessness, and a conviction that his monastic life is utterly pointless. He feels a strong urge to abandon his solitude and seek external stimulation. According to Evagrius Ponticus's teaching, which 'deadly thought' is most likely assailing him?", "options": [{"text": "Gluttony, as he is tempted to break his fast to alleviate boredom.", "isCorrect": false, "rationale": "While boredom might lead to gluttony, the primary description of 'listlessness, boredom, and restlessness that strikes especially at midday' points to acedia."}, {"text": "Avarice, as he is longing for the comforts and possessions he left behind.", "isCorrect": false, "rationale": "Avarice is love of money/possessions; the described symptoms are not directly related to this desire."}, {"text": "Acedia, the 'noonday devil,' characterized by spiritual listlessness and despair about monastic life.", "isCorrect": true, "rationale": "The text defines Acedia as 'a deep spiritual listlessness, boredom, and restlessness that strikes especially at midday (the “noonday devil”).'"}, {"text": "Vainglory, as he secretly wishes someone would acknowledge his struggle and praise his perseverance.", "isCorrect": false, "rationale": "Vainglory is the desire for admiration and praise, which is not the primary symptom described here (boredom, restlessness, pointlessness)."}]}, {"question": "How did the Desert Fathers understand *apatheia*, and why is its common English translation 'passionlessness' misleading?", "options": [{"text": "They saw it as complete indifference to all emotions, a state of cold detachment, which is accurately conveyed by 'apathy.'", "isCorrect": false, "rationale": "The text explicitly states this is a 'Common misconception' and that apatheia 'does not mean the absence of all emotion' nor is the monk 'cold or unfeeling.'"}, {"text": "It meant the absence of all feeling, making the soul unfeeling and unloving, which 'passionlessness' correctly implies.", "isCorrect": false, "rationale": "The text clearly refutes this, stating the monk 'loves more deeply than before' and is not 'emotionless.'"}, {"text": "It was a state of inner freedom and rightly ordered passions, allowing for purer love and emotions, making 'passionlessness' a poor translation.", "isCorrect": true, "rationale": "The definition of apatheia is 'a state of inner freedom in which the passions are no longer disordered' and 'the right ordering of the heart,' allowing one to be 'free to love God and neighbor.'"}, {"text": "It was the suppression of anger and sadness only, while other emotions like joy and love remained untamed and unrestricted.", "isCorrect": false, "rationale": "Apatheia refers to the right ordering of *all* passions, conquering the 'tyranny of selfishness, fear, and compulsive desire,' not just specific negative ones while leaving others unrestrained."}]}, {"question": "The Desert Fathers sought to 'pray without ceasing.' Which of the following best describes how they approached this practice in the desert?", "options": [{"text": "By exclusively focusing on formal communal liturgical services held at fixed hours each day.", "isCorrect": false, "rationale": "The text states that in the desert, prayer was 'less formal and more personal' and that the 'Opus Dei' structure developed later."}, {"text": "By making their entire lives an act of continuous conversation with God, through short prayers, Psalms, and silence, not just formal worship.", "isCorrect": true, "rationale": "The text states they 'sought to make their entire lives an act of prayer — not only the hours formally set aside for worship, but every waking moment,' through 'reciting the Psalms continuously' or 'repeating short prayers.'"}, {"text": "By dedicating their entire lives to studying complex theological treatises and engaging in scholarly contemplation.", "isCorrect": false, "rationale": "Their theology was based on lived experience, not academic study, and 'unceasing prayer' was a practical spiritual discipline, not solely intellectual."}, {"text": "By performing specific physical penances and acts of self-mortification as a substitute for vocal prayer.", "isCorrect": false, "rationale": "While ascetic practices were part of their life, they were in conjunction with, not a substitute for, continuous prayer and communion with God."}]}, {"question": "Evagrius Ponticus's list of eight deadly thoughts was later adapted into the 'seven deadly sins' familiar to many Catholics. Which of the following correctly describes how Pope St. Gregory the Great modified Evagrius's original list?", "options": [{"text": "He removed avarice and lust from the list, considering them less significant than pride.", "isCorrect": false, "rationale": "Gregory condensed the list by combining, not removing these significant thoughts. Avarice and lust are still present in the seven deadly sins."}, {"text": "He condensed the list by combining vainglory with pride and sadness with acedia, and added envy.", "isCorrect": true, "rationale": "The 'note' section explicitly states, 'Pope St. Gregory the Great (c. 540–604) later condensed the list into seven, combining vainglory with pride and sadness with acedia, and adding envy.'"}, {"text": "He expanded the list by adding sloth, envy, and gluttony as entirely new categories.", "isCorrect": false, "rationale": "Gluttony was already on Evagrius's list; sloth corresponds to acedia. Envy was added, but the process was condensation for some, not pure expansion with new categories."}, {"text": "He completely re-envisioned the list, focusing on societal sins and institutional corruption rather than individual vices.", "isCorrect": false, "rationale": "Gregory's list still focused on individual vices, albeit in a condensed form, not a shift to societal sins."}]}, {"question": "How does the Church's teaching on the 'universal call to holiness' relate to the 'particular call' embraced by the Desert Fathers?", "options": [{"text": "The universal call to holiness replaced the particular call, making monastic life an outdated practice irrelevant to modern Christians.", "isCorrect": false, "rationale": "The text states the Church 'has also always recognized that some people receive a particular call,' indicating it's not outdated or replaced."}, {"text": "The universal call mandates that all Christians must eventually adopt the ascetic and monastic practices of the Desert Fathers to achieve true holiness.", "isCorrect": false, "rationale": "The text clarifies, 'the Catholic Church does not teach that the monastic life is the only path to holiness' and 'Marriage, family life, and work in the world are all paths to God.'"}, {"text": "Both calls affirm that all baptized Christians are called to perfection in charity, but some receive a special vocation to radical self-giving in consecrated life, as exemplified by the Desert Fathers.", "isCorrect": true, "rationale": "The text explains the 'universal call to holiness' means 'every baptized Christian, in whatever state of life, is called to seek perfection in charity,' while the 'particular call' is a 'special vocation' to 'leave everything and follow Christ in the consecrated life,' with the Desert Fathers being the first to answer it organized."}, {"text": "The particular call is a higher form of holiness reserved for a select spiritual elite, distinct from and superior to the ordinary holiness attainable by laypeople.", "isCorrect": false, "rationale": "While a 'special vocation,' the text emphasizes the 'universal call to holiness' for 'all the faithful of Christ of whatever rank or status,' suggesting different paths to the *same* perfection in charity, not a 'superior' holiness."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
