<script>
var QUESTIONS = [{"question": "Which characteristic most distinctly sets Mount Athos apart from other monastic centers worldwide?", "options": [{"text": "Its exclusive use of Greek and Church Slavonic for the Divine Office.", "isCorrect": false, "rationale": "While Mount Athos uses these languages, this is not what makes it uniquely distinct globally, as other Orthodox communities also use them."}, {"text": "Its status as a self-governing monastic republic with a thousand-year unbroken tradition and unique visitor restrictions.", "isCorrect": true, "rationale": "The text explicitly states Mount Athos is 'a self-governing monastic republic — the only one of its kind in the world' and highlights its unbroken tradition for over a thousand years, along with specific entry rules like the diamonitirion and the ban on women. These combined features make it uniquely distinct."}, {"text": "Its practice of the Hesychast tradition and the Jesus Prayer.", "isCorrect": false, "rationale": "Hesychasm and the Jesus Prayer are important practices on Mount Athos, but they are also found in other Eastern Orthodox monastic communities, not making Athos distinct in this regard globally."}, {"text": "Its role as the primary center for Latin Mass in the Eastern tradition.", "isCorrect": false, "rationale": "Mount Athos follows the Byzantine liturgical tradition, which is the Eastern equivalent of the Latin Mass, but does not use the Latin Mass itself."}], "id": "q01"}, {"question": "The hesychast tradition, as practiced on Mount Athos, is primarily centered on what spiritual discipline?", "options": [{"text": "Rigorous study of Scholastic theology and philosophical debate.", "isCorrect": false, "rationale": "Scholastic theology is a characteristic of Western tradition, not the primary focus of Eastern hesychasm, which emphasizes inner silence and direct experience of God."}, {"text": "Unceasing interior prayer through the repetition of the Jesus Prayer.", "isCorrect": true, "rationale": "The text defines Hesychasm as 'centered on inner silence, the Jesus Prayer, and the pursuit of direct experience of God's uncreated light,' explicitly mentioning 'practicing unceasing interior prayer through the Jesus Prayer.'"}, {"text": "Public recitation of the Divine Office in Latin.", "isCorrect": false, "rationale": "While the Divine Office is part of daily life, Hesychasm specifically refers to inner prayer, and the Divine Office on Athos is in Greek and Church Slavonic, not Latin."}, {"text": "Communal manual labor as the primary form of asceticism.", "isCorrect": false, "rationale": "While manual labor may be part of monastic life, the hesychast tradition's primary focus is on internal, contemplative prayer."}], "id": "q02"}, {"question": "What was the most significant challenge faced by Eastern monasticism in the 20th century, leading to widespread suppression?", "options": [{"text": "The fall of Constantinople in 1453.", "isCorrect": false, "rationale": "The fall of Constantinople occurred in the 15th century, whereas the question specifically asks about the 20th century."}, {"text": "Centuries of Ottoman rule.", "isCorrect": false, "rationale": "Ottoman rule was a challenge over many centuries, but the text highlights a distinct and more severe persecution in the 20th century."}, {"text": "Persecution by communist regimes in Eastern Europe.", "isCorrect": true, "rationale": "The text states, 'In the twentieth century, Eastern monasticism endured a persecution even more severe than the French Revolution. Communist regimes in Russia, Romania, Bulgaria, Serbia, and other Eastern European countries suppressed monasteries, confiscated their property, and imprisoned or executed monks and nuns.'"}, {"text": "Internal theological disputes within the Orthodox Church.", "isCorrect": false, "rationale": "The text does not mention internal theological disputes as the primary challenge or cause of widespread suppression in the 20th century; it focuses on external political persecution."}], "id": "q03"}, {"question": "A key distinguishing feature in the organizational structure of Western monasticism compared to the Eastern tradition is:", "options": [{"text": "The shared veneration of the Desert Fathers.", "isCorrect": false, "rationale": "The veneration of the Desert Fathers is presented as a 'shared root' and 'common patrimony,' not a distinguishing feature."}, {"text": "The Western emphasis on a single, universal Rule of Saint Benedict versus the Eastern typikon tradition.", "isCorrect": true, "rationale": "The text explicitly states: 'Where the West developed the structured Rule of Saint Benedict, the East followed the more flexible typikon tradition,' highlighting this as a key difference in organizational structure."}, {"text": "The Eastern practice of lectio divina versus the Western emphasis on the Jesus Prayer.", "isCorrect": false, "rationale": "Lectio divina is a Western practice, while the Jesus Prayer is Eastern. This option reverses the traditions for these practices, and also focuses on spiritual practices rather than organizational structure."}, {"text": "Western monasteries being self-governing republics, while Eastern monasteries are not.", "isCorrect": false, "rationale": "Mount Athos is an example of a self-governing monastic republic in the East, making this statement incorrect."}], "id": "q04"}, {"question": "In the context of Mount Athos, what is the primary purpose of a 'diamonitirion'?", "options": [{"text": "It is a spiritual guide for younger monks, similar to a starets.", "isCorrect": false, "rationale": "A starets or geronta is a spiritual guide, not a 'diamonitirion,' which is an object."}, {"text": "It signifies a monk's profession of vows on the Holy Mountain.", "isCorrect": false, "rationale": "The text defines 'diamonitirion' as an entry permit for visitors, not a symbol of a monk's vows."}, {"text": "It is a special permit required for male visitors to enter the monastic republic.", "isCorrect": true, "rationale": "The text provides a direct definition: 'Diamonitirion: the entry permit required to visit Mount Athos.'"}, {"text": "It refers to the liturgical vestments worn by Athonite clergy during the Divine Liturgy.", "isCorrect": false, "rationale": "The 'diamonitirion' is not related to liturgical vestments."}], "id": "q05"}, {"question": "If a scholar were tracing the common historical roots of both Eastern and Western monasticism, which group of figures would be central to their study?", "options": [{"text": "The Scholastic theologians like Thomas Aquinas.", "isCorrect": false, "rationale": "Scholastic theologians emerged in the medieval West and represent a later development, not the common ancient roots of both traditions."}, {"text": "The compilers of the Philokalia.", "isCorrect": false, "rationale": "The Philokalia was compiled much later (18th century) and is specific to the Eastern tradition, not representing the common roots shared by both."}, {"text": "The Desert Fathers, including Saints Anthony and Pachomius.", "isCorrect": true, "rationale": "The text states, 'The Desert Fathers whom we studied in Chapter 2 are honored equally by Catholic and Orthodox Christians. Saints Anthony, Pachomius, Basil, and John Cassian belong to the common patrimony of the whole Church,' indicating they are the shared historical roots."}, {"text": "The Cistercian and Carthusian reformers.", "isCorrect": false, "rationale": "Cistercian and Carthusian reformers are specific movements within the Western tradition, not the common ancient roots for both East and West."}], "id": "q06"}, {"question": "In Eastern monasticism, the role of a *starets* or *geronta* is most analogous to what function in the Western tradition, albeit with a more personal and charismatic emphasis?", "options": [{"text": "A theologian specializing in liturgical history.", "isCorrect": false, "rationale": "While a starets may be learned, their primary role described is spiritual guidance, not academic specialization."}, {"text": "An abbot or spiritual director, guiding younger monks in their spiritual life.", "isCorrect": true, "rationale": "The text explains: 'In the Eastern tradition, the starets (Russian) or geronta (Greek) is an experienced elder who guides younger monks in the spiritual life. This role is similar to the Western abbot but more personal and charismatic.'"}, {"text": "A scribe dedicated to copying sacred texts.", "isCorrect": false, "rationale": "This describes a specific monastic duty, not the overarching role of a spiritual elder like a starets."}, {"text": "A communal leader primarily focused on administrative duties.", "isCorrect": false, "rationale": "While a starets might have administrative influence, the text emphasizes their role in 'guiding younger monks in the spiritual life,' highlighting the spiritual aspect over administration."}], "id": "q07"}, {"question": "The *Philokalia* is considered a cornerstone text in Eastern Orthodoxy due to its focus on:", "options": [{"text": "Detailing the precise architectural requirements for monastic communities.", "isCorrect": false, "rationale": "The Philokalia's content is spiritual and mystical, not architectural."}, {"text": "Providing a comprehensive guide to political engagement and social reform.", "isCorrect": false, "rationale": "The Philokalia is concerned with the interior spiritual life, not political or social reform."}, {"text": "Compiling the writings of Desert Fathers and mystics on prayer, watchfulness, and the interior life.", "isCorrect": true, "rationale": "The text defines the Philokalia as 'a vast collection of writings by the Desert Fathers and later Eastern mystics on prayer, watchfulness, and the interior life,' making this the correct answer."}, {"text": "Documenting the history of the Byzantine Empire and its rulers.", "isCorrect": false, "rationale": "The Philokalia is a theological and mystical anthology, not a historical document of the Byzantine Empire."}], "id": "q08"}, {"question": "The 'remarkable revival' of Eastern monasticism after the fall of communism in 1989–1991 primarily suggests which enduring aspect of human experience?", "options": [{"text": "The political superiority of democratic systems over communist regimes.", "isCorrect": false, "rationale": "While the revival followed the fall of communism, the text emphasizes the *reason* for people entering monastic life, not the political system's merits directly."}, {"text": "The cyclical nature of historical religious persecution and freedom.", "isCorrect": false, "rationale": "While persecution and freedom are cyclical, the text points to a more fundamental human drive behind the revival, which is a 'hunger for God.'"}, {"text": "Humanity's persistent spiritual hunger and desire for a life dedicated to God.", "isCorrect": true, "rationale": "The text states that young men and women are 'drawn by the same hunger for God that moved Anthony into the Egyptian desert and Benedict to the caves of Subiaco,' directly linking the revival to enduring spiritual longing."}, {"text": "The economic benefits associated with the reopening of monastic properties.", "isCorrect": false, "rationale": "The text does not mention economic benefits as a driver for people entering monastic life; rather, it highlights spiritual motivation."}], "id": "q09"}, {"question": "What is the most accurate summary of the relationship between Eastern and Western monastic traditions, according      to the text?", "options": [{"text": "They are entirely separate traditions with no shared history or practices.", "isCorrect": false, "rationale": "The text explicitly discusses 'Shared Roots, Shared Wisdom,' contradicting the idea of no shared history or practices."}, {"text": "The Eastern tradition is a direct continuation of Western Latin monasticism with minor adaptations.", "isCorrect": false, "rationale": "The text notes monasticism was 'born in the East,' implying the Eastern tradition predates and is distinct from the Western, not a continuation of it."}, {"text": "They share common ancient roots and many spiritual practices, but have developed distinct organizational structures and spiritual emphases.", "isCorrect": true, "rationale": "This accurately reflects the 'Shared Roots, Shared Wisdom' section, which highlights shared Desert Fathers and practices, but also points out differences like the Rule of Benedict vs. typikon, and emphasis on community vs. interior life, while noting these differences 'should not be exaggerated.'"}, {"text": "Western monasticism is superior due to its structured rules and theological syntheses.", "isCorrect": false, "rationale": "The text maintains a neutral, descriptive tone, avoiding any claims of superiority between the traditions and explicitly stating differences 'should not be exaggerated.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
