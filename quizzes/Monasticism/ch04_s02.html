<script>
var QUESTIONS = [{"question": "Which statement best characterizes the overall tone and purpose of Saint Benedict's Rule, as described in the introduction?", "options": [{"text": "It is an abstract theological treatise designed for scholarly debate and interpretation among religious elites.", "isCorrect": false, "rationale": "The introduction explicitly states Benedict 'is not writing abstract theology'; rather, he speaks 'as a father to his monks, guiding them with firmness and love.'"}, {"text": "It serves as a practical, yet deeply spiritual, guide from a father figure to his monks, emphasizing both discipline and affection.", "isCorrect": true, "rationale": "The text describes Benedict's tone as 'speaking as a father to his monks, guiding them with firmness and love,' and notes how 'practical he is — and how deeply spiritual at the same time.'"}, {"text": "It is a historical account of monastic life in the 6th century, documenting various practices without expressing strong personal opinions.", "isCorrect": false, "rationale": "While it implicitly documents monastic life, its primary purpose is prescriptive (a 'rule'), and Benedict expresses very strong opinions, especially on different kinds of monks."}, {"text": "It is a philosophical exploration of human nature and the monastic calling, using logical argumentation to persuade its readers.", "isCorrect": false, "rationale": "The text highlights its 'practical' and 'spiritual' nature, framed as fatherly advice, rather than a philosophical exploration or logical argumentation."}], "id": "q01"}, {"question": "The Prologue to the Rule of Saint Benedict urges the reader to 'run while you have the light of life.' What is the primary implication of this exhortation within the context of the Rule?", "options": [{"text": "It encourages monks to physically exercise daily to maintain health and vigor.", "isCorrect": false, "rationale": "The phrase 'light of life' and the broader spiritual context of the Prologue, which talks about returning to God and seeking everlasting life, indicate a spiritual rather than literal interpretation of 'run.'"}, {"text": "It emphasizes the urgency of actively pursuing good deeds and obedience to God throughout one's earthly life.", "isCorrect": true, "rationale": "The Prologue repeatedly calls for obedience, 'labor of obedience,' renouncing one's will to 'do battle under the Lord Christ,' and 'run to it by good deeds' to 'dwell in the tent of that kingdom.' This 'running' signifies an active, urgent pursuit of a spiritual life of good works and obedience before death ('darkness of death overtake you')."}, {"text": "It suggests a nomadic lifestyle, moving quickly from place to place to spread the Gospel.", "isCorrect": false, "rationale": "Benedict explicitly criticizes 'Gyrovagues' who wander without stability in Chapter 1, making a nomadic lifestyle contrary to his teachings."}, {"text": "It advocates for intellectual pursuits and rapid acquisition of knowledge to enlighten the mind.", "isCorrect": false, "rationale": "While 'light' can be associated with knowledge, the context of the Prologue focuses on moral action, obedience, and spiritual devotion rather than intellectualism."}], "id": "q02"}, {"question": "According to Benedict's Chapter 1 on the Kinds of Monks, which type of monk is 'detestable' because they live without a rule or abbot, following only their own desires?", "options": [{"text": "Cenobites", "isCorrect": false, "rationale": "Cenobites are the first kind, approved by Benedict, who 'live in monasteries and serve under a rule and an Abbot.'"}, {"text": "Anchorites", "isCorrect": false, "rationale": "Anchorites are the second kind, also approved, who undertake solitary combat 'after long probation in a monastery' and 'learned by the help of many brethren how to fight against the devil.'"}, {"text": "Sarabaites", "isCorrect": true, "rationale": "The text explicitly states: 'The third kind of monks, a detestable kind, are the Sarabaites. These, not having been tested... by any rule or by the lessons of experience... Their law is the desire for self-gratification: whatever enters their mind or appeals to them, that they call holy; what they dislike, they regard as unlawful.'"}, {"text": "Gyrovagues", "isCorrect": false, "rationale": "Gyrovagues are the fourth kind, described as 'worse than the Sarabaites' because they wander constantly, but Sarabaites are the 'detestable kind' who explicitly lack a rule and follow self-gratification."}], "id": "q03"}, {"question": "A novice monk, after several years in a communal monastery, feels a strong calling to live an ascetic life alone in a remote hermitage. According to Benedict's Rule, under what conditions would this transition be considered acceptable and even praiseworthy?", "options": [{"text": "It is never acceptable, as all monks must live within a communal monastery under an abbot.", "isCorrect": false, "rationale": "Benedict approves of Anchorites (hermits), but only under specific conditions, disproving the idea that solitary life is 'never acceptable.'"}, {"text": "Only if the monk has demonstrated long-term stability and combativeness against sin while living within a communal monastery first.", "isCorrect": true, "rationale": "The text defines Anchorites as those who, 'no longer in the first fervor of their reformation, but after long probation in a monastery, having learned by the help of many brethren how to fight against the devil, go out well armed from the ranks of the community to the solitary combat of the desert.'"}, {"text": "As long as the monk believes it is God's will and desires self-gratification in solitude, it is permissible.", "isCorrect": false, "rationale": "The phrase 'desires self-gratification' aligns with Benedict's criticism of Sarabaites, who follow their own will, which is contrary to the spirit of genuine anchoritic life requiring proven virtue."}, {"text": "Immediately upon entering monastic life, as solitary combat is the most direct path to holiness.", "isCorrect": false, "rationale": "The Rule states Anchorites undertake this 'after long probation in a monastery,' indicating it is not an immediate or initial step but one taken only after significant communal training."}], "id": "q04"}, {"question": "Benedict states that the 'workshop' in which monks shall diligently execute the 'Instruments of Good Works' is 'the enclosure of the monastery and stability in the community.' What does this reveal about his philosophy of spiritual growth?", "options": [{"text": "True spiritual growth can only occur through isolated contemplation, removed from the distractions of others.", "isCorrect": false, "rationale": "The emphasis on 'stability in the community' directly contradicts the idea of isolated contemplation as the *only* path to true spiritual growth, although contemplation is part of it."}, {"text": "The structured communal life of the monastery provides the necessary environment and accountability for consistent spiritual practice.", "isCorrect": true, "rationale": "By designating the 'enclosure of the monastery and stability in the community' as the 'workshop,' Benedict highlights the communal setting as essential for the continuous application of the 72 instruments, implying structure, support, and accountability."}, {"text": "Spiritual discipline is primarily an internal, personal journey, independent of physical location or social interaction.", "isCorrect": false, "rationale": "While internal discipline is crucial, the identification of a 'workshop' (a physical and social place) shows that external structure and community are considered vital, not independent."}, {"text": "Monasteries are merely temporary training grounds before monks are sent out as wandering missionaries.", "isCorrect": false, "rationale": "Benedict strongly criticizes 'Gyrovagues' (wandering monks) and praises 'stability,' indicating monasteries are meant to be permanent homes for Cenobites, not temporary training grounds for itinerants."}], "id": "q05"}, {"question": "Chapter 4, 'The Instruments of Good Works,' includes precepts such as 'To love one's enemies' and 'Not to curse those who curse us, but rather to bless them.' What does the inclusion of such challenging commands suggest about the Rule's target for Christian behavior?", "options": [{"text": "It aims for a minimal standard of moral conduct, accessible to everyone without significant effort.", "isCorrect": false, "rationale": "Loving enemies and blessing those who curse are far from minimal standards; they represent advanced Christian virtues requiring significant self-denial and spiritual discipline."}, {"text": "It outlines an ideal of radical Christian love and forgiveness that demands profound personal transformation.", "isCorrect": true, "rationale": "These precepts, directly from the Sermon on the Mount, represent a high bar for ethical conduct, requiring a complete transformation of one's natural inclinations towards anger or revenge into Christ-like love and forgiveness. This reflects Benedict's practical guide to holiness for any Christian."}, {"text": "It emphasizes the importance of performing public acts of charity to gain societal approval.", "isCorrect": false, "rationale": "While acts of charity are included, these specific precepts focus on internal disposition and response to personal offenses, not primarily on public approval."}, {"text": "It is intended only for those who have achieved perfect sanctity and no longer experience human emotions.", "isCorrect": false, "rationale": "The Rule is for all monks seeking holiness, implying ongoing struggle and growth, not a prerequisite of perfect sanctity. These are tools to achieve holiness, not just for those who already possess it."}], "id": "q06"}, {"question": "Which of the following 'Instruments of Good Works' from Chapter 4 best exemplifies Benedict's emphasis on personal humility and attributing success to divine grace?", "options": [{"text": "To love the Lord God with the whole heart, the whole soul, the whole strength.", "isCorrect": false, "rationale": "This instrument emphasizes devotion and love for God, which is foundational, but not specifically about attributing 'success' or 'good' to God rather than self in the context of humility for personal achievements."}, {"text": "To chastise the body.", "isCorrect": false, "rationale": "This relates to self-denial and asceticism, which contribute to humility, but it's not directly about recognizing the source of one's good deeds."}, {"text": "To attribute to God, and not to self, whatever good one sees in oneself.", "isCorrect": true, "rationale": "This instrument directly addresses the concept of humility by explicitly stating that any good perceived in oneself should be attributed to God, aligning perfectly with the idea of not taking personal credit for spiritual achievements, as reinforced by the Prologue's reference to Paul: 'By the grace of God I am what I am.'"}, {"text": "To obey in all things the commands of the Abbot.", "isCorrect": false, "rationale": "This instrument emphasizes obedience to authority, which is a form of humility, but it's not as directly focused on the source of personal good as the correct option."}], "id": "q07"}, {"question": "The Prologue cites the Apostle Paul, saying, 'By the grace of God I am what I am.' How does Benedict use this quote to reinforce a key theme for his monks?", "options": [{"text": "To encourage monks to be content with their current spiritual state, as it is God's will.", "isCorrect": false, "rationale": "The Rule, especially the Prologue and Instruments, constantly calls for striving, improvement, and active pursuit of holiness, rather than passive contentment with one's current state."}, {"text": "To teach monks that all their good works and spiritual progress come from God's grace, preventing pride.", "isCorrect": true, "rationale": "The Prologue states, 'fearing the Lord, do not pride themselves on their good observance; but, convinced that the good which is in them cannot come from themselves and must be from the Lord, glorify the Lord's work in them, using the words of the Prophet, \"Not to us, O Lord, not to us, but to Your name give the glory.\" Thus also the Apostle Paul attributed nothing of the success of his preaching to himself, but said, \"By the grace of God I am what I am.\"' This clearly links the quote to humility and attributing good to God."}, {"text": "To assure monks that they are chosen by God for a special mission in the world.", "isCorrect": false, "rationale": "While monks have a mission, the context of the quote in the Prologue is about avoiding pride and acknowledging God as the source of all good, not specifically about a unique 'special mission' beyond the general monastic calling."}, {"text": "To justify the practice of withdrawal from worldly affairs, as God has set them apart.", "isCorrect": false, "rationale": "While withdrawal is part of monastic life, this quote specifically addresses the source of goodness and avoiding pride, not the rationale for withdrawal itself."}], "id": "q08"}, {"question": "Among the 72 'Instruments of Good Works,' several focus on the use of speech, such as 'To guard one's tongue against evil and depraved speech,' 'Not to love much talking,' and 'Not to speak useless words or words that move to laughter.' What is the underlying purpose of these particular precepts for a monk's life?", "options": [{"text": "To ensure that monks maintain a silent, contemplative existence, devoid of any social interaction.", "isCorrect": false, "rationale": "While silence is valued, the Rule is for a communal life (Cenobites), which inherently involves social interaction. The precepts aim for *controlled* and *edifying* speech, not absolute silence."}, {"text": "To promote truthfulness and prevent idle chatter that could lead to sin, distraction, or break communal harmony.", "isCorrect": true, "rationale": "These precepts collectively aim to discipline the tongue, recognizing that uncontrolled speech (evil, depraved, useless, much talking, laughter for laughter's sake) can lead to sin, distract from spiritual focus, break vows (e.g., 'not to swear, for fear of perjuring oneself'), or harm others ('not to give place to slander'). Disciplined speech supports truth, humility, and peace within the community."}, {"text": "To ensure that all monastic conversations are strictly theological in nature, excluding practical matters.", "isCorrect": false, "rationale": "The Rule itself is highly practical, suggesting that practical matters are certainly part of monastic life. The focus is on the *quality* and *purpose* of speech, not exclusively on theological content."}, {"text": "To encourage monks to engage in robust debates and intellectual discussions to sharpen their minds.", "isCorrect": false, "rationale": "The emphasis is on *guarding* the tongue, avoiding 'much talking' and 'useless words,' which runs contrary to encouraging robust debate or excessive intellectual discourse for its own sake."}], "id": "q09"}, {"question": "Considering the overall structure and content of the provided sections (Prologue, Kinds of Monks, Instruments of Good Works), which of the following best describes the comprehensive path to spiritual perfection laid out by Saint Benedict?", "options": [{"text": "A solitary journey of self-discovery and independent spiritual practices, culminating in personal enlightenment.", "isCorrect": false, "rationale": "While Anchorites pursue a solitary path, it's only after communal training, and Benedict's primary focus is on Cenobites, emphasizing 'stability in the community' as the 'workshop' for good works, which contradicts a purely solitary journey of 'self-discovery.'"}, {"text": "Adherence to external rituals and liturgical ceremonies as the sole means of achieving divine favor.", "isCorrect": false, "rationale": "While rituals are part of monastic life, the Rule emphasizes deeply spiritual and practical internal and external virtues (e.g., love, humility, prayer, self-denial, good deeds), not just external ceremonies as the 'sole means' to perfection."}, {"text": "An active commitment to obedience, communal life, and the diligent practice of virtues rooted in love for God and neighbor, all enabled by divine grace.", "isCorrect": true, "rationale": "The Prologue calls for 'labor of obedience,' renouncing one's will; Chapter 1 champions Cenobites (communal life); Chapter 4 lists 'Instruments of Good Works' (virtues like love of God/neighbor, humility, charity); and the Prologue emphasizes attributing good to God's grace ('By the grace of God I am what I am'). This option integrates all key components."}, {"text": "An intellectual pursuit of theological knowledge and philosophical understanding to grasp the mysteries of faith.", "isCorrect": false, "rationale": "The introduction states Benedict 'is not writing abstract theology,' and the 'Instruments' are practical guides to living, indicating the path is primarily experiential and ethical rather than purely intellectual or philosophical."}], "id": "q10"}, {"question": "Benedict describes Gyrovagues as 'worse than Sarabaites.' What specific behavior makes Gyrovagues even more problematic in his view?", "options": [{"text": "They follow a false rule written by corrupt abbots, which is worse than having no rule at all.", "isCorrect": false, "rationale": "Gyrovagues do not follow a corrupt rule; they follow no rule at all. Their problem is wandering without stability, not corruption of a specific rule."}, {"text": "They are perpetually wandering from monastery to monastery, serving their own appetites rather than God, with no stability or accountability.", "isCorrect": true, "rationale": "Benedict describes Gyrovagues as those who 'spend their whole lives wandering about... staying three or four days at a time in different cells... ever roaming with no stability,' driven by their own desires — an extreme version of the self-will he condemns in Sarabaites."}, {"text": "They live in large groups and pool their resources, creating a false sense of community without genuine obedience.", "isCorrect": false, "rationale": "This describes an approximation of Sarabaite behavior (living in small groups without a rule), not the defining characteristic of Gyrovagues, who are wanderers."}, {"text": "They publicly challenge the authority of legitimate abbots and spread dissent throughout the Church.", "isCorrect": false, "rationale": "Gyrovagues are not described as actively challenging authority; their problem is the instability and self-indulgence of constant wandering, not organized dissent."}], "id": "q11"}, {"question": "Chapter 4 includes the instruction: 'Not to fulfil the desires of the flesh; to hate one's own will.' How does this pairing of two negative commands reveal Benedict's anthropology — his understanding of human nature and its tendencies?", "options": [{"text": "Benedict views the body as evil and the spirit as good, following a Platonic dualism that all physical desires must be destroyed.", "isCorrect": false, "rationale": "Benedict's moderation and practical care for monks' physical needs (food, sleep, clothing) show he does not regard the body as evil. The Rule seeks to order physical desires, not destroy them."}, {"text": "He assumes that both bodily appetites and the self-will are natural inclinations that, left unchecked, pull a person away from God and toward self-centeredness.", "isCorrect": true, "rationale": "By targeting both the flesh and the will as things that must be denied, Benedict recognizes that the human tendency toward self-gratification operates on two levels — physical appetite and personal preference — both of which must be surrendered in the pursuit of God."}, {"text": "He teaches that only extraordinary sinners need to hate their own will, while virtuous monks may trust their instincts.", "isCorrect": false, "rationale": "The Instruments of Good Works are presented as universal tools for all monks seeking holiness, not as remedies targeted only at those with serious moral failures."}, {"text": "The command to hate one's will refers solely to disobedience to the abbot, not to any broader spiritual disposition.", "isCorrect": false, "rationale": "While obedience to the abbot is part of renouncing one's will, the broader context of the 72 instruments shows that self-will encompasses many forms of self-preference, from speech to sleep to emotional reactions."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
