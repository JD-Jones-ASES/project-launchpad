    };

<body>
<div class="quiz-container">

        <a href="../../courses/Monasticism.html">&larr; Back to The Cloister and the Cell (Monasticism)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central argument presented in \"A Living Tradition\" about modern monasticism?", "options": [{"text": "Modern monasticism is primarily a historical study, focusing on ancient practices.", "isCorrect": false, "rationale": "The text explicitly states, \"Monasticism is not a museum piece,\" directly contradicting this option."}, {"text": "Monastic communities, while historical, no longer attract new vocations.", "isCorrect": false, "rationale": "The section notes that living communities \"welcome new vocations every year,\" making this option incorrect."}, {"text": "Monasticism is a vibrant, continuously evolving tradition with active communities worldwide.", "isCorrect": true, "rationale": "The entire section provides examples and explicitly states that the tradition \"continues in living communities\" and is a \"living and fruitful way of life\" across the world today."}, {"text": "Contemporary monastic life has completely abandoned traditional practices for modern adaptations.", "isCorrect": false, "rationale": "The text details how modern monasteries like Clear Creek live the \"Rule of Saint Benedict in its fullness\" and maintain traditional practices like Gregorian chant, refuting the idea of complete abandonment."}]}, {"question": "From which European monastery did the founding monks of Our Lady of Clear Creek Abbey originate?", "options": [{"text": "Solesmes Abbey", "isCorrect": false, "rationale": "While Fontgombault (the originating monastery) is part of the Solesmes congregation, Solesmes Abbey itself was not the direct origin of the Clear Creek monks."}, {"text": "Abbey of Notre-Dame de Fontgombault", "isCorrect": true, "rationale": "The text explicitly states, \"Our Lady of Clear Creek Abbey was founded in 1999 by a group of monks from the Abbey of Notre-Dame de Fontgombault in France.\""}, {"text": "Pluscarden Abbey", "isCorrect": false, "rationale": "Pluscarden Abbey is a monastery in Scotland and not the origin of Clear Creek Abbey."}, {"text": "Norcia Monastery", "isCorrect": false, "rationale": "Norcia is an Italian monastery founded by American monks, not the source for Clear Creek Abbey."}]}, {"question": "The choice of Romanesque architectural style for Clear Creek Abbey's new church most directly symbolizes which core Benedictine principle?", "options": [{"text": "Obedience to the abbot, as Romanesque churches required strict hierarchical planning.", "isCorrect": false, "rationale": "While obedience is a Benedictine vow, the text does not link Romanesque architecture to this principle, nor does it specify a particular hierarchical planning aspect related to the style."}, {"text": "Poverty and simplicity, reflecting the austerity of the Romanesque period.", "isCorrect": false, "rationale": "The text describes Romanesque as conveying \"permanence and solidity,\" not explicitly poverty or austerity, though simplicity may be a characteristic."}, {"text": "The vow of stabilitas, signifying permanence and a commitment to one place over centuries.", "isCorrect": true, "rationale": "The text directly connects the Romanesque style's design \"to stand for centuries\" with it being \"a tangible expression of the Benedictine vow of stabilitas, stability.\""}, {"text": "Manual labor, as Romanesque construction demanded extensive physical effort.", "isCorrect": false, "rationale": "While manual labor is part of monastic life and construction is manual labor, the text specifically links the architectural *style* to stabilitas, not manual labor in general."}]}, {"question": "According to Saint Benedict, what is considered the \"monk's highest priority,\" referred to as the Opus Dei?", "options": [{"text": "Extensive manual labor for self-sufficiency.", "isCorrect": false, "rationale": "Manual labor is important in Benedictine life, but the text clarifies that the Opus Dei, not manual labor, is called the 'highest priority.'"}, {"text": "Communal chanting of the Divine Office.", "isCorrect": true, "rationale": "The text defines Opus Dei as \"the communal chanting of the Divine Office, which he called the monk's highest priority.\""}, {"text": "Solitary prayer and contemplation in the cloister.", "isCorrect": false, "rationale": "While part of monastic life, Opus Dei specifically refers to the *communal* Divine Office, not solitary prayer."}, {"text": "Building and maintaining the monastery's physical structures.", "isCorrect": false, "rationale": "This falls under manual labor, which, while crucial for supporting the community, is not described as the Opus Dei or the monk's 'highest priority' in the given text."}]}, {"question": "What aspect of monastic life is the Solesmes congregation, including its mother house in France, particularly renowned for?", "options": [{"text": "Craft brewing and production of artisanal goods.", "isCorrect": false, "rationale": "This is a characteristic associated with Norcia and Trappist monasteries, not specifically Solesmes in the text."}, {"text": "Restoring medieval British monasteries to their original purpose.", "isCorrect": false, "rationale": "This action is attributed to Pluscarden Abbey, not Solesmes."}, {"text": "Devotion to Gregorian chant and the traditional Latin liturgy.", "isCorrect": true, "rationale": "The text states that the Solesmes congregation is \"known for their devotion to Gregorian chant and the traditional Latin liturgy,\" and Solesmes itself is the \"foremost center for Gregorian chant.\""}, {"text": "Pioneering new forms of liturgical music and modern worship.", "isCorrect": false, "rationale": "Solesmes is known for reviving and preserving *traditional* Gregorian chant and Latin liturgy, not for pioneering new forms."}]}, {"question": "The work of monasteries like Solesmes in producing authoritative editions of Gregorian chant and popular recordings demonstrates their modern role primarily as:", "options": [{"text": "Economic powerhouses, generating significant revenue for the Church.", "isCorrect": false, "rationale": "While production may generate revenue, the text emphasizes their role in sharing and preserving the beauty of monastic prayer, not their economic power."}, {"text": "Architects of new monastic reforms and adaptations to secular society.", "isCorrect": false, "rationale": "Solesmes is noted for its adherence to and dissemination of *traditional* chant and liturgy, not for creating new reforms."}, {"text": "Cultural custodians and disseminators of traditional liturgical beauty.", "isCorrect": true, "rationale": "By producing authoritative editions and recordings, Solesmes preserves and spreads the \"beauty of monastic prayer\" and traditional chant, acting as cultural custodians."}, {"text": "Centers for theological debate and academic scholarship on monastic history.", "isCorrect": false, "rationale": "While some scholarship may occur, the text specifically highlights their role in Gregorian chant editions and recordings, not broader theological or historical academic debate."}]}, {"question": "The motto of Clear Creek Abbey, \"Building Something Beautiful For God — To Last A Thousand Years,\" best encapsulates which of the following Benedictine ideals?", "options": [{"text": "A rejection of modern technology in favor of ancient building techniques.", "isCorrect": false, "rationale": "While they use traditional methods, the motto's emphasis is on the purpose and longevity of the building, not solely the rejection of modern technology."}, {"text": "A focus on immediate gratification and rapid growth within the community.", "isCorrect": false, "rationale": "The phrase \"To Last A Thousand Years\" directly contradicts the idea of immediate gratification or rapid growth."}, {"text": "Long-term commitment to a place and tradition, combined with devoted service to God.", "isCorrect": true, "rationale": "The phrase \"To Last A Thousand Years\" reflects stability and building for the future, and \"Beautiful For God\" reflects the devotion to Opus Dei and God's praise, aligning with Benedictine ideals."}, {"text": "An emphasis on evangelization and active outreach to the surrounding community.", "isCorrect": false, "rationale": "The text describes Clear Creek as rooted in one place, devoted to praise of God, and supporting itself through labor, not primarily active outreach or evangelization."}]}, {"question": "Which statement accurately differentiates the Trappist Order from other Benedictine communities mentioned, like Norcia?", "options": [{"text": "Trappists are the only monastic order that produces goods for sale to support themselves.", "isCorrect": false, "rationale": "The Monks of Norcia are also noted for their \"craft brewing,\" indicating Trappists are not the only ones producing goods for support."}, {"text": "Trappist monasteries are specifically noted for their rigorous silence and emphasis on manual labor, beyond what is typical for many Benedictines.", "isCorrect": true, "rationale": "The text highlights Trappists' distinct characteristics as \"known for their rigorous silence, their commitment to manual labor, and the quality of their products,\" implying a specific emphasis within the Benedictine tradition."}, {"text": "Unlike other Benedictines, Trappists do not adhere to the Rule of Saint Benedict.", "isCorrect": false, "rationale": "Trappists are the \"Order of Cistercians of the Strict Observance,\" which means they follow a strict interpretation of the Rule of Saint Benedict, not an abandonment of it."}, {"text": "Trappists are primarily concerned with the restoration of medieval British monasteries.", "isCorrect": false, "rationale": "Pluscarden Abbey is mentioned in relation to restoring British monasteries; Trappist monasteries are described as existing \"around the world\" and known for their specific observance."}]}, {"question": "Despite living lives of \"profound hiddenness\" within enclosed communities, the text indicates that women's contemplative orders play a crucial role by:", "options": [{"text": "Directly engaging in active apostolate and social service in the wider world.", "isCorrect": false, "rationale": "The text explicitly states these communities are \"entirely ordered towards contemplation\" and live lives of \"profound hiddenness,\" distinguishing them from active apostolate."}, {"text": "Financially supporting the Church through the production of unique crafts.", "isCorrect": false, "rationale": "While they may produce goods, the text highlights their *prayer* as their crucial role, not their financial contribution."}, {"text": "Sustaining the entire Body of Christ through their constant prayer.", "isCorrect": true, "rationale": "The text directly states, \"the Church teaches that their prayer sustains the entire Body of Christ,\" citing *Perfectae Caritatis 7*."}, {"text": "Leading the charge in adapting monastic traditions to contemporary secular culture.", "isCorrect": false, "rationale": "Their role is described in terms of profound hiddenness and prayer's spiritual impact, not leading adaptation efforts to secular culture."}]}, {"question": "Based on the \"note\" section, why might the authors recommend a short retreat at a monastery for someone curious about monastic life?", "options": [{"text": "To recruit new vocations for specific communities, especially for Clear Creek Abbey.", "isCorrect": false, "rationale": "While monasteries welcome vocations, the stated purpose of the recommendation is for visitors to \"understand what we have studied in this book,\" not primarily for recruitment."}, {"text": "To directly participate in the manual labor projects, like building the Romanesque church.", "isCorrect": false, "rationale": "The note mentions \"sharing the monks' prayer, silence, and simple meals,\" not participating in significant manual labor projects like construction."}, {"text": "To gain a firsthand, experiential understanding of the monastic way of life discussed in the book.", "isCorrect": true, "rationale": "The text states that spending time in a monastery is \"one of the best ways to understand what we have studied in this book,\" implying an experiential understanding."}, {"text": "To critique the traditional practices and suggest modernizing reforms to the monastic communities.", "isCorrect": false, "rationale": "The tone of the recommendation is appreciative and educational, encouraging understanding, not critical assessment or suggesting reforms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
