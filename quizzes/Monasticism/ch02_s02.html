<script>
var QUESTIONS = [{"question": "What is the ultimate goal for readers engaging with the ancient monastic texts, such as the Life of Saint Anthony and Paradise of the Fathers, according to the introduction?", "options": [{"text": "To perfectly understand every archaic word and phrase.", "isCorrect": false, "rationale": "The text explicitly states: 'The goal is not to understand every word perfectly, but to enter into the world of these ancient monks and hear what they have to say.'"}, {"text": "To enter into the world of the ancient monks and hear their message.", "isCorrect": true, "rationale": "The introduction clarifies: 'The goal is not to understand every word perfectly, but to enter into the world of these ancient monks and hear what they have to say.'"}, {"text": "To meticulously catalog the historical inaccuracies of the texts.", "isCorrect": false, "rationale": "The section does not suggest cataloging historical inaccuracies; its focus is on spiritual insight and immersion."}, {"text": "To compare the translation styles of different public domain versions.", "isCorrect": false, "rationale": "While the translations are public domain, comparing their styles is not presented as the primary goal of reading these texts."}], "id": "q01"}, {"question": "According to the section, which two primary texts are introduced as foundational for understanding early monasticism?", "options": [{"text": "The Rule of St. Benedict and the Sayings of the Desert Elders.", "isCorrect": false, "rationale": "While related to monasticism, these are not the two specific texts introduced in this section. The 'Sayings' are a general category, whereas the text mentions the specific title 'Paradise of the Fathers'."}, {"text": "The Book of Hours and the Confessions of St. Augustine.", "isCorrect": false, "rationale": "Neither of these texts is introduced in this section as a primary source for early monasticism, although St. Augustine was influenced by St. Anthony."}, {"text": "The Life of Saint Anthony by Athanasius and the Paradise of the Fathers.", "isCorrect": true, "rationale": "The text clearly states: 'The first is the Life of Saint Anthony... The second is the Paradise of the Fathers.'"}, {"text": "The Didache and the Apostolic Constitutions.", "isCorrect": false, "rationale": "These are early Christian texts, but they are not the two specific monastic sources presented in this section."}], "id": "q02"}, {"question": "When Anthony heard the Gospel passage 'If you would be perfect, go and sell that you have and give to the poor; and come follow Me and you shall have treasure in heaven,' how is his response characterized by Athanasius?", "options": [{"text": "He pondered the implications for several months before making a decision.", "isCorrect": false, "rationale": "The text states that Anthony 'went out immediately from the church,' indicating a swift decision."}, {"text": "He consulted with village elders to understand the passage's meaning.", "isCorrect": false, "rationale": "Anthony's response was direct and personal; the text does not mention him seeking consultation at that moment."}, {"text": "His response was immediate, total, and without hesitation.", "isCorrect": true, "rationale": "The text explicitly highlights this: 'Pay attention to how Athanasius describes Anthony's response to the Gospel: it is immediate, total, and without hesitation.'"}, {"text": "He initially kept most of his possessions, gradually giving them away over years.", "isCorrect": false, "rationale": "Anthony gave away his ancestral land and all his movable wealth almost immediately, reserving only a little for his sister initially, and then giving that away too after hearing another Gospel passage."}], "id": "q03"}, {"question": "Anthony sought out various 'good men' during his early ascetic life. What was his primary method for spiritual growth through these encounters?", "options": [{"text": "He engaged in theological debates to clarify points of doctrine.", "isCorrect": false, "rationale": "The text describes him learning from their practices and virtues, not engaging in theological debates."}, {"text": "He attempted to surpass each man in their specific discipline to prove his zeal.", "isCorrect": false, "rationale": "The text states, 'With others of the same age he had no rivalry; save this only, that he should not be second to them in higher things. And this he did so as to hurt the feelings of nobody, but made them rejoice over him.' His aim was to unite virtues, not to outdo others in a competitive way."}, {"text": "He identified and mimicked a single spiritual master to ensure consistency in his practice.", "isCorrect": false, "rationale": "Anthony sought out many good men, observing diverse virtues like 'graciousness of one; the unceasing prayer of another; he took knowledge of another's freedom from anger and another's loving-kindness.'"}, {"text": "He observed different virtues in each individual, synthesizing them to develop a comprehensive spiritual discipline.", "isCorrect": true, "rationale": "The text describes how he learned from various individuals, 'he returned to his own place of discipline, and henceforth would strive to unite the qualities of each, and was eager to show in himself the virtues of all.'"}], "id": "q04"}, {"question": "After his second profound encounter with the Gospel, what provision did Anthony make for his sister?", "options": [{"text": "He allowed her to continue living in their ancestral home under his care.", "isCorrect": false, "rationale": "Anthony gave up his land and home; he did not remain there to care for her."}, {"text": "He sent her to live with distant relatives.", "isCorrect": false, "rationale": "The text specifies he entrusted her to 'faithful virgins' and a 'convent,' not distant relatives."}, {"text": "He placed her in a convent under the care of faithful virgins.", "isCorrect": true, "rationale": "The text states: 'Having committed his sister to known and faithful virgins, and put her into a convent to be brought up, he henceforth devoted himself outside his house to discipline.'"}, {"text": "He took her with him into the desert solitude.", "isCorrect": false, "rationale": "Anthony went into solitude alone: 'he henceforth devoted himself outside his house to discipline'."}], "id": "q05"}, {"question": "What was Anthony's reaction when he encountered real gold scattered in his path during his withdrawal into the desert?", "options": [{"text": "He gathered a small portion to give to the poor in the nearest village.", "isCorrect": false, "rationale": "Anthony avoided the gold entirely, viewing it as a temptation."}, {"text": "He considered it a sign of divine favor and took it as provision.", "isCorrect": false, "rationale": "The text states, 'But whether the devil showed it, or some better power to try the athlete... Antony marvelled at the quantity, but passed it by as though he were going over fire.'"}, {"text": "He passed it by quickly, treating it as if it were fire, and did not look back.", "isCorrect": true, "rationale": "The text vividly describes his reaction: 'Antony marvelled at the quantity, but passed it by as though he were going over fire; so he did not even turn, but hurried on at a run to lose sight of the place.'"}, {"text": "He stopped to pray over the gold, asking for discernment regarding its origin.", "isCorrect": false, "rationale": "His response was immediate flight from the perceived temptation, not prayer over it."}], "id": "q06"}, {"question": "The text acknowledges that the Desert Fathers' language about demons can be 'strange or uncomfortable' for modern readers. What fundamental spiritual truth does the text suggest these accounts convey, regardless of a literal interpretation?", "options": [{"text": "The importance of specific exorcism rituals for maintaining spiritual purity.", "isCorrect": false, "rationale": "While the sign of the cross is mentioned, the core insight is broader than specific rituals; it's about the nature of the struggle."}, {"text": "That spiritual perfection is easily attained through simple solitude.", "isCorrect": false, "rationale": "The text states the opposite: 'the path to God is not easy, and those who seek holiness will face fierce opposition.'"}, {"text": "That the spiritual journey involves fierce opposition from internal and external forces.", "isCorrect": true, "rationale": "The text explains: 'the underlying insight is profound: the path to God is not easy, and those who seek holiness will face fierce opposition — from the world, from their own disordered desires, and from the enemy of souls.'"}, {"text": "The necessity of physical combat against visible adversaries in the wilderness.", "isCorrect": false, "rationale": "The text clarifies that demons are 'invisible enemies' and the struggle can be an 'interior spiritual struggle.'"}], "id": "q07"}, {"question": "How long did Anthony reside in continuous solitude within the abandoned fort, according to the text, before emerging to interact with others?", "options": [{"text": "Six months.", "isCorrect": false, "rationale": "Six months was the quantity of bread he stored, not the duration of his solitude."}, {"text": "Approximately one year.", "isCorrect": false, "rationale": "The duration mentioned is significantly longer than one year."}, {"text": "Nearly twenty years.", "isCorrect": true, "rationale": "The text states: 'And so for nearly twenty years he continued training himself in solitude, never going forth, and but seldom seen by any.'"}, {"text": "His entire adult life until his death at 105.", "isCorrect": false, "rationale": "Anthony emerged after this period of solitude and had a profound impact on many people for decades afterward."}], "id": "q08"}, {"question": "Based on Anthony's conversion story and his subsequent actions in the desert, which of the following best encapsulates a core principle of early desert monasticism as presented in this section?", "options": [{"text": "The pursuit of communal living and shared resources among large groups of monks.", "isCorrect": false, "rationale": "Anthony specifically sought solitude, and the text notes that 'there were not yet so many monasteries in Egypt' at the beginning of his discipline."}, {"text": "Emphasis on intellectual scholarship and the rigorous study of philosophical texts.", "isCorrect": false, "rationale": "While he deeply studied scripture ('his memory served him for books'), the focus was on living out the Gospel through asceticism and direct experience, not primarily intellectual scholarship or philosophy."}, {"text": "A radical commitment to personal asceticism, solitude, and direct obedience to Christ's commands through self-denial.", "isCorrect": true, "rationale": "Anthony's immediate abandonment of wealth, withdrawal into the desert, spiritual combat, and rigorous self-training exemplify a radical commitment to personal asceticism, solitude, and direct obedience."}, {"text": "Engaging in public preaching and missionary work to convert non-believers.", "isCorrect": false, "rationale": "Anthony initially sought solitude; his public ministry and healing work emerged as a consequence of his long discipline, not as his initial or primary goal of desert monasticism itself."}], "id": "q09"}, {"question": "Upon emerging from his twenty years of solitude in the fort, what did those who saw Anthony observe about his physical and spiritual condition?", "options": [{"text": "He was emaciated and weakened from intense fasting and struggle.", "isCorrect": false, "rationale": "The text explicitly states he was 'neither fat... nor lean from fasting and striving with the demons, but he was just the same as they had known him before his retirement.'"}, {"text": "He appeared joyful and relaxed, eager to share his experiences with the crowd.", "isCorrect": false, "rationale": "His soul was 'neither contracted as if by grief, nor relaxed by pleasure, nor possessed by laughter or dejection,' indicating a state beyond mere joy or excitement."}, {"text": "He was physically unchanged, and his soul was serene, guided by reason, and free from emotional extremes.", "isCorrect": true, "rationale": "The text describes him as having 'the same habit of body as before' and his soul 'free from blemish... neither contracted as if by grief, nor relaxed by pleasure, nor possessed by laughter or dejection... But he was altogether even as being guided by reason, and abiding in a natural state.'"}, {"text": "He had gained significant weight due to long periods of inactivity and infrequent meals.", "isCorrect": false, "rationale": "The text states he was 'neither fat, like a man without exercise, nor lean from fasting'."}], "id": "q10"}, {"question": "In the Desert Fathers' sayings, Abba Moses gives the advice: 'Sit in thy cell, and thy cell shall teach thee all things.' What spiritual principle does this saying most directly convey?", "options": [{"text": "That monks should study academic subjects within their cells to gain wisdom.", "isCorrect": false, "rationale": "The cell is the monk's place of solitary spiritual practice, not an academic study; the teaching concerns perseverance in one's vocation, not book learning."}, {"text": "That persevering in one's appointed place of solitude, rather than seeking novelty elsewhere, is itself the path of spiritual learning.", "isCorrect": true, "rationale": "Abba Moses' saying directly counters the impulse to flee the cell in search of stimulation. By 'sitting' (persevering in solitude), the monk encounters himself and God — the cell becomes the teacher."}, {"text": "That physical confinement in a small space accelerates spiritual growth through discomfort.", "isCorrect": false, "rationale": "The saying is about faithful presence in one's vocation, not about physical discomfort as the mechanism of growth."}, {"text": "That a monk who has memorized all the psalms no longer needs external guidance.", "isCorrect": false, "rationale": "The saying concerns the monk's dwelling place and perseverance, not the memorization of psalms or independence from guidance."}], "id": "q11"}, {"question": "Amma Syncletica compares the spiritual life to building a fire: 'at first it is smoky and your eyes water, but later you get the desired result.' How does this analogy address a common struggle in the early stages of spiritual commitment?", "options": [{"text": "It warns beginners that spiritual progress requires withdrawing from all community life immediately.", "isCorrect": false, "rationale": "The analogy is about perseverance through difficulty to reach joy, not a prescription for immediate withdrawal from community."}, {"text": "It promises that struggle and hard work at the beginning give way to 'indescribable joy,' encouraging perseverance despite early difficulties.", "isCorrect": true, "rationale": "Syncletica's full saying is: 'In the beginning there is struggle and a great deal of work for those who come near to God. But after that, there is indescribable joy.' The fire analogy reassures the beginner that initial difficulty is normal and temporary, and that joy lies ahead."}, {"text": "It argues that anyone who finds the spiritual life difficult has chosen the wrong vocation.", "isCorrect": false, "rationale": "Syncletica presents struggle as normal and universal for 'those who come near to God,' not as a sign of misdirected vocation."}, {"text": "It suggests that the spiritual life becomes easier once all bodily temptations have been permanently eliminated.", "isCorrect": false, "rationale": "The analogy focuses on the progression from struggle to joy through persistent effort, not on the elimination of bodily temptations as the cause of ease."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
