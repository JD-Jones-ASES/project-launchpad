<body>
<div class="quiz-container">

        <a href="../../courses/Monasticism.html">&larr; Back to The Cloister and the Cell (Monasticism)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 8, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what was the primary spiritual concern that prompted some monks to question Cluny's success by the end of the eleventh century?", "options": [{"text": "Their lack of involvement in political affairs.", "isCorrect": false, "rationale": "The text does not mention political involvement as a primary concern for the spiritual crisis at Cluny. The focus was on internal monastic observance."}, {"text": "The perceived abandonment of Saint Benedict's Rule, particularly regarding simplicity, manual labor, and a balanced life.", "isCorrect": true, "rationale": "The text explicitly states that monks questioned if Cluny's wealth and expanded liturgy, which left little time for manual labor or lectio divina, truly aligned with Benedict's Rule for simplicity and a balanced life."}, {"text": "The excessive number of monasteries in their network, making governance unwieldy.", "isCorrect": false, "rationale": "While Cluny had many houses, the text indicates the spiritual concern was about the *nature* of the monastic life within them, not merely the number of houses or governance challenges in themselves, though Cluny's governance was centralized."}, {"text": "The adoption of a black monastic habit instead of a white one.", "isCorrect": false, "rationale": "The color of the habit was a later distinction adopted by the Cistercians to differentiate themselves, not a problem that Cluniacs themselves perceived."}], "id": "q01"}, {"question": "The 'novum monasterium' founded at Cîteaux was radical in its purpose. Which of the following best describes this radical purpose?", "options": [{"text": "To establish a new papal authority independent of Rome.", "isCorrect": false, "rationale": "The Cistercians sought monastic reform, not a new papal authority. They obtained papal approval for their endeavors."}, {"text": "To integrate secular scholars and lay professionals into monastic leadership.", "isCorrect": false, "rationale": "The Cistercian reform focused on internal monastic purity and a return to the Rule, not on integrating secular leadership."}, {"text": "To follow the Rule of Saint Benedict exactly as it was written, without the centuries of additions and elaborations.", "isCorrect": true, "rationale": "The text states their purpose was 'radical in its simplicity: to follow the Rule of Saint Benedict exactly as it was written, without the additions, customs, and elaborations that centuries of Cluniac tradition had layered upon it.'"}, {"text": "To develop new, more elaborate and aesthetically pleasing liturgical practices.", "isCorrect": false, "rationale": "This describes the trend at Cluny, which the Cistercians reacted against. They advocated for simpler liturgy."}], "id": "q02"}, {"question": "Stephen Harding's Charter of Charity revolutionized monastic governance. How did the Cistercian system, as outlined in this document, fundamentally differ from Cluny's model of centralized authority?", "options": [{"text": "It eliminated all forms of external authority, granting each abbey complete autonomy.", "isCorrect": false, "rationale": "While abbeys were self-governing, they were subject to annual visitation and the General Chapter, which provided external oversight and accountability."}, {"text": "It concentrated all spiritual and administrative power in a single, unchallengeable abbot at Cîteaux.", "isCorrect": false, "rationale": "This describes the Cluniac model. The Charter of Charity explicitly moved away from this by establishing a decentralized network."}, {"text": "It created a network of independent, self-governing monasteries linked by mutual visitation and an annual General Chapter, balancing autonomy with accountability.", "isCorrect": true, "rationale": "The Charter of Charity established this system, where each abbey was self-governing but subject to visitation by its founding house and collective governance through the annual General Chapter, a revolutionary form of balanced governance."}, {"text": "It required all monasteries to be governed directly by local bishops rather than monastic superiors.", "isCorrect": false, "rationale": "The Cistercian system maintained monastic governance, not direct episcopal control over internal monastic affairs."}], "id": "q03"}, {"question": "St. Bernard of Clairvaux's arrival at Cîteaux in 1112 marked a significant turning point for the struggling community. What was the most profound and immediate consequence of his arrival, as described in the text?", "options": [{"text": "He immediately became the abbot of Cîteaux and introduced the white habit.", "isCorrect": false, "rationale": "Bernard did not immediately become abbot of Cîteaux; Alberic and Stephen Harding preceded him. Alberic introduced the white habit."}, {"text": "He brought an extraordinary influx of vocations, saving Cîteaux from possible extinction and launching the Cistercian movement's explosive growth.", "isCorrect": true, "rationale": "The text states that Bernard arrived with about thirty companions, and 'This extraordinary influx of vocations saved Cîteaux from possible extinction and launched the Cistercian movement into explosive growth.'"}, {"text": "He wrote the Charter of Charity, establishing the Cistercian order's constitutional framework.", "isCorrect": false, "rationale": "Stephen Harding is credited with writing the Charter of Charity."}, {"text": "He convinced the Cluniac order to adopt Cistercian reforms, leading to a merger of the two traditions.", "isCorrect": false, "rationale": "Bernard was a leader of the Cistercian reform, which was distinct from and often critical of the Cluniac tradition; there was no merger."}], "id": "q04"}, {"question": "The Cistercian commitment to simplicity extended to their artistic and architectural expression. How did Cistercian churches and manuscripts typically differ from Cluniac ones in terms of decoration?", "options": [{"text": "Cistercian churches were built with more elaborate stained glass windows, while Cluniac churches favored wall paintings.", "isCorrect": false, "rationale": "The text states Cistercian churches were 'stripped to bare stone' and 'without ornament,' contrary to elaborate stained glass."}, {"text": "Cistercian churches were stripped to bare stone without ornament, and their manuscripts used minimal colors, emphasizing proportion and restraint.", "isCorrect": true, "rationale": "The text states Cistercian churches were 'stripped to bare stone' and for manuscripts, 'early Cistercian manuscripts used only two colors of ink and avoided figurative illustration. Beauty, for the Cistercians, was found in proportion and restraint, not in ornament.'"}, {"text": "Cistercian churches incorporated symbolic animal carvings, while Cluniac churches focused on human figures.", "isCorrect": false, "rationale": "The text emphasizes Cistercian lack of ornamentation generally, not specific types of imagery."}, {"text": "Cistercian manuscripts were larger in size and used more durable vellum, but with less script.", "isCorrect": false, "rationale": "The text specifies the lack of decoration and color in Cistercian manuscripts, not their size or material durability."}], "id": "q05"}, {"question": "The Cistercians introduced 'lay brothers' (conversi) as a new class of monks. What was the primary purpose of this innovation within the Cistercian way of life?", "options": [{"text": "To serve as diplomatic envoys to secular rulers, extending the order's political influence.", "isCorrect": false, "rationale": "The text states lay brothers focused primarily on manual labor, not diplomacy."}, {"text": "To manage the monastery's financial investments and income from estates and tithes.", "isCorrect": false, "rationale": "The Cistercians largely rejected reliance on external income and focused on self-sufficiency through labor."}, {"text": "To perform the bulk of the manual labor, allowing choir monks to maintain their full schedule of prayer and study and ensuring economic self-sufficiency.", "isCorrect": true, "rationale": "The text explicitly defines lay brothers as those 'who devoted themselves primarily to manual labor, especially agricultural work. This allowed the choir monks to maintain their schedule of prayer and reading while the lay brothers managed the monastery's farms and workshops.'"}, {"text": "To act as theological teachers and spiritual directors for the choir monks.", "isCorrect": false, "rationale": "Lay brothers took monastic vows but were not ordained and did not participate in the full choral office, focusing instead on physical labor."}], "id": "q06"}, {"question": "The text describes the Cistercians as agricultural innovators. How did their approach to settlement and sustenance reinforce their core values of simplicity and self-sufficiency?", "options": [{"text": "They focused on acquiring pre-existing, well-developed farmlands to maximize immediate profits.", "isCorrect": false, "rationale": "The text states they settled in 'remote, uncultivated areas' and 'drained swamps, cleared forests,' indicating a hands-on approach to developing land rather than acquiring developed lands."}, {"text": "They relied heavily on tithes and donations from wealthy benefactors, similar to Cluny, to fund their agricultural projects.", "isCorrect": false, "rationale": "This contradicts the Cistercian rejection of Cluny's reliance on external wealth; they insisted on supporting themselves through their own manual labor."}, {"text": "They chose remote, uncultivated areas and transformed them into productive farmland through their own manual labor, supporting themselves directly.", "isCorrect": true, "rationale": "The text states they were 'willingness to settle in remote, uncultivated areas' and 'drained swamps, cleared forests, and turned wilderness into productive farmland — becoming some of the greatest agricultural innovators... supporting themselves through their own manual labor.'"}, {"text": "They primarily engaged in trade and commerce with nearby towns to acquire their food and resources.", "isCorrect": false, "rationale": "Their focus was on self-sufficiency through direct agricultural work, not through trade."}], "id": "q07"}, {"question": "The term 'Opus Dei' is defined in the text. In the context of Cluniac monastic life, what did 'Opus Dei' primarily refer to, and why did its expansion become a point of contention for reformers?", "options": [{"text": "The monastery's charitable work, which became so extensive it diverted resources from internal monastic needs.", "isCorrect": false, "rationale": "Opus Dei is defined as 'the communal prayer of the Divine Office,' not charitable work."}, {"text": "The communal prayer of the Divine Office, which had expanded so greatly it left little time for manual labor or lectio divina.", "isCorrect": true, "rationale": "The text defines Opus Dei as 'the communal prayer of the Divine Office' and explains that at Cluny, 'the liturgy had expanded so greatly that monks had almost no time for manual labor or lectio divina.'"}, {"text": "The construction of magnificent churches, which became financially burdensome and artistically excessive.", "isCorrect": false, "rationale": "While magnificent churches were a feature of Cluny, Opus Dei refers to prayer, not construction projects."}, {"text": "The daily practice of sacred reading (lectio divina), which some felt was being neglected in favor of intellectual pursuits.", "isCorrect": false, "rationale": "Lectio divina is a distinct practice. The text indicates that Opus Dei's expansion *reduced* time for lectio divina, rather than being lectio divina itself."}], "id": "q08"}, {"question": "Beyond St. Bernard, the text mentions other significant figures associated with monastic renewal. Aelred of Rievaulx is highlighted for his writings on what theme?", "options": [{"text": "The proper administration of monastic finances and estates.", "isCorrect": false, "rationale": "Aelred's contribution mentioned is on 'spiritual friendship,' not monastic finances."}, {"text": "The adaptation of Cicero's classical treatise on friendship to a Christian monastic context, emphasizing spiritual friendship.", "isCorrect": true, "rationale": "The text explicitly states Aelred 'wrote beautifully on the theme of spiritual friendship' and notes his work 'adapts Cicero's classical treatise on friendship to the Christian monastic context.'"}, {"text": "The development of new, complex musical compositions for the Divine Office.", "isCorrect": false, "rationale": "While Hildegard of Bingen was a composer, Aelred's focus mentioned is on spiritual friendship."}, {"text": "The refutation of heretical theological doctrines prevalent in the 12th century.", "isCorrect": false, "rationale": "Bernard was a 'theological controversialist,' but Aelred's specific contribution mentioned here is spiritual friendship."}], "id": "q09"}, {"question": "The Cistercian reform movement can be seen as a profound reaction to the unintended consequences of monastic success. What broader principle did their reform successfully reassert within medieval European monasticism?", "options": [{"text": "The necessity of monastic orders to engage actively in political governance and exert secular power.", "isCorrect": false, "rationale": "While figures like Bernard became influential, the core of the Cistercian reform was about internal monastic purity, not primarily about secular power. They sought renunciation of the world's comforts."}, {"text": "That monastic growth and splendor were direct signs of divine favor and should be pursued without restraint.", "isCorrect": false, "rationale": "This describes the mindset that led to the 'problem of success' at Cluny, which the Cistercians explicitly reacted against by advocating simplicity."}, {"text": "That a strict path of renunciation, simplicity, manual labor, and balanced spiritual life could still attract widespread adherence and lead to significant spiritual renewal.", "isCorrect": true, "rationale": "The Cistercians explicitly sought to return to Benedict's Rule, emphasizing simplicity, manual labor, and a balanced life, and their explosive growth demonstrated the appeal and success of this renewed approach to monasticism."}, {"text": "The importance of elaborate church decoration and magnificent liturgy as essential for inspiring devotion among the faithful.", "isCorrect": false, "rationale": "The Cistercians deliberately stripped their churches of ornament and simplified their liturgy, contrasting sharply with Cluny's magnificence."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
