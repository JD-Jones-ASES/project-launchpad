<script>
var QUESTIONS = [{"question": "The 'Ladder of Monks' by Guigo II outlines four distinct rungs for spiritual ascent. Which of the following correctly lists these rungs in their intended sequential order?", "options": [{"text": "Meditatio, Lectio, Oratio, Contemplatio", "isCorrect": false, "rationale": "This is an incorrect order of the rungs as presented by Guigo II."}, {"text": "Lectio, Meditatio, Oratio, Contemplatio", "isCorrect": true, "rationale": "Guigo II's Ladder of Monks presents the rungs in this specific order: Lectio (reading), Meditatio (meditation), Oratio (prayer), and Contemplatio (contemplation)."}, {"text": "Lectio, Oratio, Meditatio, Contemplatio", "isCorrect": false, "rationale": "This is an incorrect order of the rungs as presented by Guigo II; Meditatio precedes Oratio."}, {"text": "Meditatio, Oratio, Lectio, Contemplatio", "isCorrect": false, "rationale": "This is an incorrect order of the rungs as presented by Guigo II; Lectio is the first rung."}], "id": "q01"}, {"question": "Guigo II describes *meditatio* as the stage where the monk 'chews upon what he has read, to turn it over in his mind, to break it open and search its interior.' Based on this description, which activity best exemplifies a monk engaged in *meditatio*?", "options": [{"text": "Chanting the Psalms in the Divine Office.", "isCorrect": false, "rationale": "Chanting the Divine Office is a formal liturgical prayer and, while it nourishes monastic life, it is not the spontaneous, heartfelt prayer (*oratio*) Guigo describes arising from meditation, nor is it *meditatio* itself."}, {"text": "Reflecting on how a scriptural command applies to one's own life and desires.", "isCorrect": true, "rationale": "This accurately describes *meditatio*. Guigo states it involves 'chewing upon what he has read,' 'turn it over in his mind,' 'break it open and search its interior,' and involves examining one's conscience and kindling desire based on the text."}, {"text": "Reading a passage of Scripture aloud slowly, savoring each word.", "isCorrect": false, "rationale": "Reading slowly and savoring each word is characteristic of *lectio*, the first rung, not *meditatio*."}, {"text": "Experiencing a direct, profound awareness of God's presence.", "isCorrect": false, "rationale": "Experiencing direct awareness of God's presence is characteristic of *contemplatio*, the fourth rung, which is a gift from God."}], "id": "q02"}, {"question": "Guigo II states that a 'great desire... is the hinge upon which the whole ladder turns' and that this desire 'drives the soul upward to the third rung.' What specific process or experience is responsible for kindling this crucial desire?", "options": [{"text": "The reverent, slow reading of Sacred Scripture (*lectio*).", "isCorrect": false, "rationale": "*Lectio* is the careful reading that places the 'food in the mouth,' but it doesn't fully extract meaning or kindle the intense desire on its own."}, {"text": "The active, focused engagement of the intellect with the text, seeking deeper meaning (*meditatio*).", "isCorrect": true, "rationale": "The text explicitly states that through *meditatio*—digging beneath the surface, considering examples, examining conscience—a 'great desire is kindled within him' which is the 'hinge upon which the whole ladder turns.'"}, {"text": "The spontaneous, heartfelt crying out to God from longing (*oratio*).", "isCorrect": false, "rationale": "*Oratio* is the expression of this desire, the speaking to God, rather than the initial kindling of the desire itself."}, {"text": "The unmerited gift of direct experiential knowledge of God (*contemplatio*).", "isCorrect": false, "rationale": "*Contemplatio* is God's gift, the brief tasting of God's sweetness, not the process that kindles the foundational desire that drives the soul to prayer."}], "id": "q03"}, {"question": "According to Guigo II, *contemplatio* is distinguished from the other rungs in its nature and origin. Which statement accurately characterizes *contemplatio* as presented in 'The Ladder of Monks'?", "options": [{"text": "It is the culmination of disciplined intellectual effort, achievable through diligent practice.", "isCorrect": false, "rationale": "Guigo explicitly states that contemplation 'cannot be earned or forced' and is 'not as something the soul achieves by its own effort, but as a grace freely given by God.'"}, {"text": "It is a direct, experiential knowledge of God's presence, freely given by God and surpassing intellectual workings.", "isCorrect": true, "rationale": "This aligns perfectly with the text: 'In Catholic theology, contemplation is understood not as something the soul achieves by its own effort, but as a grace freely given by God — a direct, experiential knowledge of His presence that surpasses all the workings of the intellect.'"}, {"text": "It is a sustained state of profound spiritual union that, once attained, permanently transforms the monk's daily life.", "isCorrect": false, "rationale": "The text notes that this state 'does not last. The weakness of human nature cannot sustain it long, and soon the soul descends again.'"}, {"text": "It is primarily an emotional experience, an overwhelming feeling of joy and peace derived from successful prayer.", "isCorrect": false, "rationale": "While joy may be a component, contemplation is described as a 'direct, experiential knowledge of His presence,' an illumination of the mind and heart on fire, rather than primarily an emotional feeling. It is a profound spiritual encounter that surpasses the intellect."}], "id": "q04"}, {"question": "A monk diligently engages in *lectio*, carefully reading a passage, but then struggles to find any personal meaning or connection before moving on to formal prayers. According to Guigo II's understanding of the ladder, what might be the consequence of this approach?", "options": [{"text": "His *lectio* will likely be dry, as it lacks the active engagement of *meditatio*.", "isCorrect": true, "rationale": "Guigo warns, 'Reading without meditation is dry.' If the monk reads but doesn't engage in the active intellectual work of *meditatio* to find personal meaning, the initial reading will likely remain superficial and unproductive."}, {"text": "His *oratio* will be more fervent because he is directly seeking God's input.", "isCorrect": false, "rationale": "Without *meditatio* to kindle desire and clarify needs, the *oratio* (prayer) would likely lack substance and fervor, as Guigo says, 'Prayer without meditation lacks substance.'"}, {"text": "He will achieve *contemplatio* more quickly by bypassing the intellectual struggle.", "isCorrect": false, "rationale": "Bypassing essential rungs makes *contemplatio* less, not more, likely. Guigo states, 'the last can never — or hardly ever — be reached without the first.'"}, {"text": "This is the standard monastic approach, as different rungs address distinct spiritual needs independently.", "isCorrect": false, "rationale": "Guigo emphasizes that 'the four rungs must not be separated from one another' and 'they are, Guigo says, so linked to one another, each depending on the others.'"}], "id": "q05"}, {"question": "The text states that *lectio divina* 'seeks not information but transformation.' How does Guigo II's 'Ladder of Monks' primarily achieve this goal of transformation?", "options": [{"text": "By providing a rigorous academic framework for theological study.", "isCorrect": false, "rationale": "While the ladder involves intellectual engagement, its ultimate aim is not primarily academic study but personal spiritual growth and encounter with God, leading to transformation."}, {"text": "By systematizing a process that moves from intellectual understanding of Scripture to a desire for and experience of God.", "isCorrect": true, "rationale": "Guigo's ladder systematically guides the monk from merely reading the words (information) to deeply processing them (*meditatio*), expressing longing to God (*oratio*), and finally experiencing God's presence (*contemplatio*), thus transforming the soul."}, {"text": "By encouraging monks to solely rely on spontaneous, unguided prayer.", "isCorrect": false, "rationale": "Guigo's method is highly structured, emphasizing progressive steps of reading and meditation before spontaneous prayer, not solely spontaneous prayer without prior engagement with Scripture."}, {"text": "By emphasizing the importance of communal liturgical worship over individual spiritual exercises.", "isCorrect": false, "rationale": "While liturgical prayers nourish the monk's life, Guigo's *oratio* refers specifically to personal, heartfelt prayer arising spontaneously from meditation on Scripture. The primary focus of the ladder is individual spiritual ascent towards God."}], "id": "q06"}, {"question": "St. Bruno's letter to Raoul le Verd describes the Carthusian 'cell' as more than just a small room. What elements define a Carthusian cell according to the passage?", "options": [{"text": "A communal dormitory where monks share living space but observe silence.", "isCorrect": false, "rationale": "The text states, 'We dwell each in his own cell, apart from one another,' contradicting the idea of a communal dormitory."}, {"text": "A self-contained small house including a garden, workshop, and covered walkway.", "isCorrect": true, "rationale": "The text's marginal note explicitly defines a Carthusian 'cell' as 'actually a small house with its own garden, workshop, and covered walkway,' which is where the monk spends the greater part of his life."}, {"text": "A small, isolated room used exclusively for sleeping and private prayer.", "isCorrect": false, "rationale": "While used for private prayer, the description explicitly adds 'with its own garden, workshop, and covered walkway,' making it more than just a small, isolated room."}, {"text": "A designated area within the main monastery building for personal study and writing.", "isCorrect": false, "rationale": "While used for study and writing ('there we read, there we write'), the description of a small house with a garden and workshop indicates it's more comprehensive than just a designated area within a larger building."}], "id": "q07"}, {"question": "St. Bruno describes the beauty of the 'desert' where his community lives (mountains, streams, gardens) but then clarifies, 'But why do I linger upon these things? For the pleasures of the man of God are not of such a kind as these.' What does Bruno imply about the role of the natural environment in the Carthusian life?", "options": [{"text": "The beauty of nature is irrelevant to spiritual growth and should be ignored.", "isCorrect": false, "rationale": "Bruno clearly describes the beauty and healthful air, acknowledging them as 'lesser goods' that 'refresh the weary spirit,' indicating they are not irrelevant."}, {"text": "While beautiful, the environment serves as a secondary comfort, refreshing the weary spirit but not constituting the ultimate spiritual pleasure.", "isCorrect": true, "rationale": "Bruno describes these natural amenities as 'lesser goods' that 'refresh the weary spirit, and when the mind is wearied by the severity of its discipline, they give it rest and consolation,' accurately portraying their secondary, supportive role to the 'far greater, far more worthy' spiritual pleasures."}, {"text": "The natural surroundings are the primary source of spiritual refreshment and joy for the monks.", "isCorrect": false, "rationale": "Bruno explicitly states, 'For the pleasures of the man of God are not of such a kind as these. They are far greater, far more worthy,' indicating that nature is not the primary source of spiritual pleasure."}, {"text": "The challenging wilderness environment is meant to cultivate austerity and detachment from earthly beauty.", "isCorrect": false, "rationale": "The description emphasizes the beauty and pleasantness of the environment ('beauty of this place, its healthful air,' 'green of the meadows,' 'slopes clothed with flowers'), not its challenging or austere aspects."}], "id": "q08"}, {"question": "St. Bruno writes his letter to Raoul le Verd in Calabria, describing the solitary life. What was Bruno's primary motivation for writing this personal and revealing document?", "options": [{"text": "To document the history and regulations of the Carthusian Order for future generations.", "isCorrect": false, "rationale": "While it describes the Carthusian life, Bruno's letter is a personal communication to a friend, not a formal historical or regulatory document. He left almost no writings of this kind."}, {"text": "To persuade Raoul to join the Carthusian community by conveying the spiritual benefits and joys of solitude.", "isCorrect": true, "rationale": "Bruno explicitly states, 'I write to thee... because I trust that what I say may be of profit to thy soul. For I would have thee know something of my state, and of the life we lead in this solitude, that thou mayest be drawn, if God so will, to desire the same.' This shows a clear intent to encourage Raoul toward monastic life."}, {"text": "To provide a theological treatise on the merits of eremitical monasticism over coenobitic forms.", "isCorrect": false, "rationale": "The letter is a personal testimony and description of life, not a theological treatise arguing for one form of monasticism over another."}, {"text": "To offer a general spiritual exhortation to all Christians considering a life of prayer.", "isCorrect": false, "rationale": "The letter is addressed specifically to Raoul, a 'fellow canon of Reims who was considering whether to leave the world and enter the monastic life,' making it a targeted personal appeal, not a general exhortation."}], "id": "q09"}, {"question": "Both Guigo II's 'Ladder of Monks' and St. Bruno's letter describe aspects of monastic spirituality. Which common emphasis, crucial for achieving profound spiritual experience, is evident in both texts?", "options": [{"text": "The necessity of engaging in frequent public debates and theological discourse.", "isCorrect": false, "rationale": "Neither text mentions engaging in public debates; monastic life is depicted as withdrawn from worldly tumult to foster internal spiritual growth."}, {"text": "The cultivation of solitude and silence as a conducive environment for deep spiritual engagement with God.", "isCorrect": true, "rationale": "Guigo's ladder describes a deeply interior, individual process leading to an encounter with God, requiring mental focus. Bruno explicitly praises solitude for bringing 'peace and joy,' allowing one to 'give himself wholly to prayer and to the study of holy things, without any tumult of worldly cares to distract him,' and notes that 'silence reigneth among us.' Both highlight withdrawal from worldly distractions for spiritual depth."}, {"text": "The importance of self-sufficiency through extensive manual labor for the community.", "isCorrect": false, "rationale": "While manual labor is mentioned by Bruno as part of life in the cell and by Guigo as his activity when the ladder came to him, it is not presented as the primary common emphasis for achieving profound spiritual experience across both texts. The focus is more on interiority."}, {"text": "The exclusive reliance on formal liturgical prayers and the Divine Office for spiritual growth.", "isCorrect": false, "rationale": "While formal liturgical prayers are part of Carthusian life (Bruno mentions 'sacred offices'), Guigo's *oratio* specifically emphasizes personal, heartfelt prayer arising from meditation, and the ladder's process is largely individual. Neither text suggests *exclusive* reliance on formal liturgy for *all* spiritual growth, especially for direct experiential knowledge of God."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
