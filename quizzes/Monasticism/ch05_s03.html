<script>
var QUESTIONS = [{"question": "What was the fundamental difference between the Celtic monks' practice of *peregrinatio pro Christo* and a modern understanding of pilgrimage?", "options": [{"text": "It involved traveling to multiple holy sites rather than just one.", "isCorrect": false, "rationale": "The text states that modern pilgrimage often involves a round trip, potentially to multiple sites, so this is not the fundamental difference."}, {"text": "It was a journey undertaken solely for penance rather than spiritual growth.", "isCorrect": false, "rationale": "While spiritual discipline was a part of it, the core purpose of *peregrinatio pro Christo* was a radical act of faith and sacrifice for Christ, encompassing spiritual growth beyond mere penance."}, {"text": "It involved a permanent, irreversible departure from one's homeland.", "isCorrect": true, "rationale": "The text explicitly defines *peregrinatio pro Christo* as 'leaving home forever' and 'cutting every tie to family, land, and tribe,' distinguishing it from a round trip pilgrimage."}, {"text": "It focused solely on visiting sites related to Christ's life, not those of saints.", "isCorrect": false, "rationale": "The text does not specify the destinations, only the nature of the departure. The key aspect was permanent exile, not specific holy sites."}]}, {"question": "The text describes *peregrinatio pro Christo* as a form of 'white martyrdom.' What makes this analogy particularly apt in the context of Irish law and custom?", "options": [{"text": "It involved a literal offering of blood, similar to 'red martyrdom,' though not always fatal.", "isCorrect": false, "rationale": "The text explicitly contrasts 'white martyrdom' with 'red martyrs offered their blood,' indicating it did not involve literal bloodshed."}, {"text": "It signified a complete severing of ties to family and land, which was tantamount to a social and personal 'death' within Irish society.", "isCorrect": true, "rationale": "The text explains that 'in Irish law and custom, a person's identity was bound up with family and territory. To leave Ireland forever was to die to the world in a very real sense,' making it a sacrifice as profound as 'red martyrdom' in its cultural context."}, {"text": "It meant abandoning all possessions and living a life of destitution in foreign lands.", "isCorrect": false, "rationale": "While abandoning possessions was part of the sacrifice, the specific 'white martyrdom' analogy is linked to the profound loss of identity associated with land and kin in Irish culture."}, {"text": "It required monks to endure extreme physical torture for their faith.", "isCorrect": false, "rationale": "Extreme asceticism was practiced, but 'white martyrdom' in this context refers to permanent exile and the 'death' to one's social world, not physical torture."}]}, {"question": "Which of the following historical figures is NOT mentioned in the text as a direct 'fruit' or result of the *peregrinatio pro Christo* practice, specifically related to the great Irish missions?", "options": [{"text": "Columba", "isCorrect": false, "rationale": "Columba is mentioned as bringing Christianity to the Picts of Scotland, a direct result of this practice."}, {"text": "Columbanus", "isCorrect": false, "rationale": "Columbanus is mentioned as re-evangelizing parts of Gaul and founding monasteries, a direct result of this practice."}, {"text": "Saint Patrick", "isCorrect": true, "rationale": "Saint Patrick is mentioned as the attributed author of the Breastplate, but not as a participant or 'fruit' of the *peregrinatio* missionary movement described as driving missions from Ireland to the continent. He predates and initiated Christianity in Ireland, rather than being a result of the outbound missionary movement."}, {"text": "Aidan", "isCorrect": false, "rationale": "Aidan is mentioned as establishing Lindisfarne and converting Northumbria, a direct result of this practice."}]}, {"question": "A Celtic monk builds his monastic cell on a desolate, storm-swept island off the coast, rather than in a sheltered valley. This choice best reflects which aspect of Celtic monastic spirituality?", "options": [{"text": "The desire to avoid all human contact and achieve complete solitude.", "isCorrect": false, "rationale": "While isolation was practiced, the text emphasizes a deeper spiritual reason for choosing such sites, specifically connecting it to their vision of nature."}, {"text": "The belief that harsh environments made ascetic practices more effective.", "isCorrect": false, "rationale": "While harsh environments facilitated asceticism, the primary reason given for selecting sites of 'stark and terrible beauty' was their 'sacramental vision' of nature."}, {"text": "A 'sacramental vision' of nature, where overwhelming natural beauty and power strip the soul bare before its Maker.", "isCorrect": true, "rationale": "The text states that Celtic monks 'sought out places of stark and terrible beauty' like Skellig Michael 'to seek God in places where the beauty and power of creation are overwhelming, where the soul is stripped bare before its Maker,' demonstrating their sacramental vision of nature."}, {"text": "A practical need for defensible locations against Viking raids.", "isCorrect": false, "rationale": "The text does not mention defensibility against raids as a reason for their site choices; it focuses on spiritual motivations."}]}, {"question": "The text contrasts Celtic asceticism with Saint Benedict's Rule. What is the fundamental difference highlighted regarding their approaches to monastic discipline?", "options": [{"text": "Celtic monks used asceticism to gain miraculous powers, while Benedictines focused on prayer.", "isCorrect": false, "rationale": "The text does not mention miraculous powers as the goal of Celtic asceticism; it was for spiritual discipline and freeing the soul for prayer, similar to Benedictines, but more intensely."}, {"text": "Benedictine monasteries allowed for private prayer, whereas Celtic monks only practiced communal prayer.", "isCorrect": false, "rationale": "The text does not discuss differences in private vs. communal prayer, only the severity of their ascetic practices."}, {"text": "The Celtic tradition was generally 'harsher' and more extreme, while Benedict promised a path that was 'not harsh or burdensome.'", "isCorrect": true, "rationale": "The text directly states, 'The Celtic tradition was harsher,' and quotes Benedict promising 'that nothing in it would be 'harsh or burdensome',' highlighting this key difference in severity."}, {"text": "Celtic monks rejected manual labor, viewing it as a distraction from spiritual pursuits, unlike Benedictines.", "isCorrect": false, "rationale": "The text does not discuss Celtic monks' views on manual labor, which was a significant part of monastic life in both traditions."}]}, {"question": "According to the text, what was the primary spiritual purpose behind the Celtic monks' rigorous ascetic practices, such as vigils in cold water and sleeping on stone?", "options": [{"text": "To impress the local populace with their devotion and attract converts.", "isCorrect": false, "rationale": "The text focuses on the internal spiritual motivations, not on external display or evangelization through their asceticism."}, {"text": "To atone for specific sins through physical suffering.", "isCorrect": false, "rationale": "While penance could involve suffering, the general purpose of their broad asceticism, as stated, was more about bodily discipline for spiritual freedom."}, {"text": "To discipline the body, thereby freeing the soul for more intense prayer and spiritual connection.", "isCorrect": true, "rationale": "The text explicitly states: 'They believed that disciplining the body freed the soul for prayer,' referencing Saint Paul's teaching on 'chastise my body, and bring it into subjection'."}, {"text": "To demonstrate their superiority over other monastic traditions.", "isCorrect": false, "rationale": "The text does not suggest competitive motivations; it emphasizes their serious purpose and commitment to spiritual growth."}]}, {"question": "What was the most significant innovation introduced by the Celtic monks' penitential system that set it apart from earlier Church practices for serious sins?", "options": [{"text": "The inclusion of spiritual direction and counseling alongside penance.", "isCorrect": false, "rationale": "While spiritual guidance was likely part of confession, the text highlights a more fundamental change in the *process* of confession itself."}, {"text": "The use of specific, written handbooks to standardize penances for various sins.", "isCorrect": false, "rationale": "The handbooks (penitentials) were a *tool* of the system, but the core innovation was the change in how confession was performed."}, {"text": "The shift from public, once-in-a-lifetime penance to private, repeatable confession with a priest.", "isCorrect": true, "rationale": "The text clearly states, 'In the early Church, serious sins were confessed publicly and penanced publicly... The Celtic monks developed a different practice: private confession to a priest, with specific penances assigned for specific sins,' making it 'accessible, repeatable, and consistent.'"}, {"text": "The emphasis on inner contrition over outward acts of penance.", "isCorrect": false, "rationale": "Inner contrition was always important in Christian tradition. The innovation here was procedural, making the *act* of confession and penance private and repeatable."}]}, {"question": "The text states that 'Every Catholic who goes to Confession today is, in a sense, following a practice that the Irish monks gave to the Church.' This statement is best supported by which of the following?", "options": [{"text": "The Fourth Lateran Council's requirement for annual confession explicitly citing Celtic practices.", "isCorrect": false, "rationale": "The Council required confession, but the text states the Celtic practice 'had become the universal norm' *by the time* of the Council, meaning the Council codified an already widespread practice rather than directly inventing it based on Celtic origins at that moment."}, {"text": "The widespread adoption of private, repeatable confession and specific penances, which replaced the older public system and became the universal norm.", "isCorrect": true, "rationale": "The text explicitly states that Celtic missionaries carried their penitential practice to the continent, 'it gradually replaced the older system of public penance,' and 'by the time of the Fourth Lateran Council... the Celtic practice had become the universal norm,' directly establishing its legacy in modern confession."}, {"text": "The continued use of Latin-based penitential handbooks in modern confessional practices.", "isCorrect": false, "rationale": "While the penitentials were important, modern practice is based on the *system* they developed, not necessarily the direct use of those specific historical handbooks."}, {"text": "The unique architectural design of confessionals inspired by early Celtic monastic cells.", "isCorrect": false, "rationale": "This is an unrelated architectural detail not discussed as a legacy of the confessional practice itself."}]}, {"question": "Which of the following is NOT listed as a major legacy or contribution of Celtic monasticism to the wider Church and civilization?", "options": [{"text": "Re-evangelizing parts of the European continent after the fall of Rome.", "isCorrect": false, "rationale": "The text lists 'Their missionary journeys re-evangelized much of the continent after the fall of Rome' as a major legacy."}, {"text": "Preserving classical and Christian learning through the early Middle Ages.", "isCorrect": false, "rationale": "The text lists 'Their monasteries preserved classical and Christian learning through centuries of upheaval' as a major legacy, referencing Thomas Cahill."}, {"text": "Developing the concept of the papacy as the supreme authority in the Church.", "isCorrect": true, "rationale": "The text describes Celtic monasticism's *conformity* to Roman norms (e.g., at the Synod of Whitby) but does not credit them with developing the concept of papal supremacy, which was a Roman development."}, {"text": "Shaping the practice of private, repeatable confession throughout the Western Church.", "isCorrect": false, "rationale": "The text lists 'Their penitential system reshaped the practice of confession throughout the Western Church' as a major legacy."}]}, {"question": "After the Synod of Whitby, the text indicates that Celtic monasticism 'lost its distinctive institutional character.' What does this primarily imply about its fate?", "options": [{"text": "Celtic monasteries were completely dissolved, and their lands redistributed.", "isCorrect": false, "rationale": "The text states they lost their 'distinctive institutional character' and conformed to Roman norms, not that they were completely dissolved."}, {"text": "Its unique practices and organizational structures were gradually conformed to Roman norms, though its spiritual essence and influence endured.", "isCorrect": true, "rationale": "The text states 'the gradual conformity of Celtic practices to Roman norms' and that 'its spirit... became part of the larger Catholic tradition' and 'These gifts have never been lost,' indicating an institutional assimilation rather than an end."}, {"text": "Irish monks ceased to engage in missionary activities or scholarship.", "isCorrect": false, "rationale": "The enduring 'spirit' mentioned includes 'the love of learning' and 'fierce courage that sent monks across unknown seas,' implying their influence continued, even if their institutions changed."}, {"text": "The production of illuminated manuscripts like the Book of Kells ceased immediately.", "isCorrect": false, "rationale": "The Book of Kells was created around 800 AD, well after the Synod of Whitby (664 AD), showing that artistic and scholarly endeavors continued."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
