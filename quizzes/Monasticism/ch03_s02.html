<script>
var QUESTIONS = [{"question": "John Cassian's Institutes is described as 'translating the wisdom of the Eastern desert into terms that Western monks can understand and practice.' This indicates that Cassian's primary contribution to Western monasticism was one of:", "options": [{"text": "Inventing entirely new ascetic practices specifically tailored for the Western climate.", "isCorrect": false, "rationale": "The text explicitly states Cassian 'is not inventing a new system,' but rather translating existing wisdom."}, {"text": "Adapting and transmitting established Egyptian monastic wisdom to a new cultural context.", "isCorrect": true, "rationale": "Cassian draws on his experience in Egypt and 'is translating the wisdom of the Eastern desert into terms that Western monks can understand and practice,' indicating adaptation and transmission."}, {"text": "Rejecting traditional Eastern monasticism as unsuitable for the West.", "isCorrect": false, "rationale": "Cassian's work is about bringing Eastern wisdom to the West, not rejecting it as unsuitable."}, {"text": "Ignoring the existing monastic traditions of both East and West to create a unique synthesis.", "isCorrect": false, "rationale": "Cassian explicitly draws on his experience in Egypt and the practices of the 'earliest fathers,' not ignoring traditions."}], "id": "q01"}, {"question": "According to Cassian, why is the discussion of the monk's clothing, like the habit, not a 'trivial topic'?", "options": [{"text": "Because it dictates the social hierarchy within the monastery.", "isCorrect": false, "rationale": "The text does not mention hierarchy in relation to the habit; it emphasizes spiritual meaning."}, {"text": "Because every external detail of a monk's life, including dress, carries profound spiritual significance.", "isCorrect": true, "rationale": "The text states, 'for Cassian, every detail of the monk's external life has a spiritual meaning. The habit is not merely a uniform — it is a visible sign of the monk's interior commitment to God.'"}, {"text": "Because it distinguishes monks from the general populace through elaborate design.", "isCorrect": false, "rationale": "Cassian insists the clothing should be 'plain and functional,' not elaborate, and 'commonplace.'"}, {"text": "Because it reflects the economic status of the monastery and its patrons.", "isCorrect": false, "rationale": "The text emphasizes simplicity and common property, not economic status."}], "id": "q02"}, {"question": "To demonstrate that the monastic girdle has deep scriptural roots, Cassian primarily references which group of biblical figures?", "options": [{"text": "Old Testament patriarchs like Abraham and Jacob.", "isCorrect": false, "rationale": "While significant, patriarchs are not the specific figures Cassian cites for the girdle's precedent."}, {"text": "Roman emperors and their advisors, known for their disciplined attire.", "isCorrect": false, "rationale": "Cassian draws from Holy Scripture, not secular historical figures, for this precedent."}, {"text": "Prophets from the Old Testament and apostles from the New Testament.", "isCorrect": true, "rationale": "Cassian explicitly mentions Elijah, Elisha (Old Testament prophets), and John, Peter, and Paul (New Testament figures) as wearing girdles."}, {"text": "Early Christian martyrs, who often wore distinctive clothing during their trials.", "isCorrect": false, "rationale": "The text does not mention martyrs in the context of the girdle's scriptural roots."}], "id": "q03"}, {"question": "Cassian instructs that a monk's robe should be 'commonplace' and 'quite free from anxious carefulness, yet not discoloured by stains acquired through neglect.' This advice implies that the robe should primarily reflect:", "options": [{"text": "A desire to stand out through unique color and fashion, indicating spiritual devotion.", "isCorrect": false, "rationale": "Cassian explicitly states the robe should 'not be thought remarkable for novelty of color or fashion' and should be 'common property.'"}, {"text": "A balanced approach to simplicity, avoiding both vanity and unkemptness.", "isCorrect": true, "rationale": "The text highlights that the robe should be 'plain and functional—neither ostentatiously poor nor fashionably elegant' and 'not discoloured by stains acquired through neglect,' which points to a balanced simplicity."}, {"text": "An extreme form of asceticism, characterized by deliberate squalor to show detachment from the world.", "isCorrect": false, "rationale": "While emphasizing detachment, the instruction 'not discoloured by stains acquired through neglect' argues against deliberate squalor."}, {"text": "The monk's personal taste and comfort, allowing for individual expression.", "isCorrect": false, "rationale": "The robe should be 'common property' and avoid 'novelty of color or fashion,' indicating a suppression of individual taste."}], "id": "q04"}, {"question": "Cassian's Institutes explicitly 'utterly disapproved of a robe of sackcloth' for monks. What was the primary reason for this disapproval?", "options": [{"text": "Sackcloth was too expensive and not considered common property.", "isCorrect": false, "rationale": "Expense is not the primary reason given; rather, its visibility and effect on the monk's character are highlighted."}, {"text": "It was seen as too comfortable, thus hindering self-denial.", "isCorrect": false, "rationale": "The text describes it as 'inconvenient and unsuitable,' not too comfortable."}, {"text": "Its conspicuous nature would minister to vanity and pride, rather than benefiting the soul.", "isCorrect": true, "rationale": "The text states it was disapproved 'as being visible to all and conspicuous, and what from this very fact will not only confer no benefit on the soul but rather minister to vanity and pride.'"}, {"text": "It offered insufficient protection from the cold in the Egyptian climate.", "isCorrect": false, "rationale": "The primary reasons cited are related to its visibility, vanity, and impracticality for work, not its warmth."}], "id": "q05"}, {"question": "The small hoods worn by Egyptian monks, coming down to the neck and shoulders, are presented by Cassian as a symbol intended to:", "options": [{"text": "Protect against the harsh desert sun and sandstorms.", "isCorrect": false, "rationale": "Cassian states these articles 'concern not the care of the body so much as the regulation of the character.'"}, {"text": "Emphasize a monk's intellectual humility and willingness to learn.", "isCorrect": false, "rationale": "The specific symbolism mentioned is related to childhood innocence, not intellectual humility."}, {"text": "Constantly remind them to preserve the simplicity and innocence of little children.", "isCorrect": true, "rationale": "The text explains they are worn 'in order that they may constantly be moved to preserve the simplicity and innocence of little children by imitating their actual dress.'"}, {"text": "Mark their affiliation with a specific order or school of monastic thought.", "isCorrect": false, "rationale": "The text describes a general symbolic meaning for Egyptian monks, not an affiliation with a particular order."}], "id": "q06"}, {"question": "The system of daily prayer at fixed hours, which became the Opus Dei, found its scriptural foundation in which passage from the Psalms?", "options": [{"text": "\"The Lord is my shepherd; I shall not want.\" (Psalm 23)", "isCorrect": false, "rationale": "This psalm is not cited in the text as the foundation for the canonical hours."}, {"text": "\"Seven times a day I have given praise to thee.\" (Psalm 118:164)", "isCorrect": true, "rationale": "The text explicitly states this verse 'became the scriptural foundation for the seven canonical hours of the Divine Office.'"}, {"text": "\"I will bless the Lord at all times: his praise shall continually be in my mouth.\" (Psalm 34:1)", "isCorrect": false, "rationale": "While a prayerful verse, it is not the specific one cited by Cassian for the fixed canonical hours."}, {"text": "\"My soul yearns for you in the night; in the morning my spirit longs for you.\" (Isaiah 26:9)", "isCorrect": false, "rationale": "This prophetic verse is not cited in the text as the foundation for the canonical hours."}], "id": "q07"}, {"question": "Cassian's description of the fixed hours of prayer as the 'Opus Dei' (the work of God) and the 'heartbeat of every Western monastery' suggests its role was:", "options": [{"text": "A secondary devotional practice for monks to engage in during leisure time.", "isCorrect": false, "rationale": "Describing it as the 'heartbeat' implies it is central and essential, not secondary or for leisure."}, {"text": "The most central and indispensable communal activity of monastic life.", "isCorrect": true, "rationale": "The phrase 'heartbeat of every Western monastery' explicitly means it would be the most important and foundational activity of the day."}, {"text": "Primarily a means of manual labor and self-sufficiency for the community.", "isCorrect": false, "rationale": "Opus Dei refers to prayer, not manual labor, although manual labor was also part of monastic life."}, {"text": "A flexible set of prayers that could be adapted or omitted based on the day's tasks.", "isCorrect": false, "rationale": "The text describes it as a 'prescribed system' and 'fixed hours,' indicating a structured and consistent practice."}], "id": "q08"}, {"question": "Regarding the varied practices for the number of Psalms sung during nocturnal prayers across different regions, Cassian ultimately advises adopting:", "options": [{"text": "The system of twenty or thirty Psalms prolonged by antiphonal singing, as it was most common.", "isCorrect": false, "rationale": "Cassian notes these variations but explicitly states he prefers a different, more ancient system."}, {"text": "Whatever rule an individual monastery's abbot decided, as long as it showed zeal.", "isCorrect": false, "rationale": "Cassian critiques rules made 'according to the fancy of their mind' and advocates for established tradition over individual will."}, {"text": "The most ancient system of the fathers observed uniformly throughout Egypt and the Thebaid.", "isCorrect": true, "rationale": "Cassian states, 'I think it best to set forth the most ancient system of the fathers which is still observed by the servants of God throughout the whole of Egypt.'"}, {"text": "A new, standardized rule that would unify all Western monasteries under one authority.", "isCorrect": false, "rationale": "Cassian is transmitting an existing system from the East, not inventing a new one for Western unification in this context."}], "id": "q09"}, {"question": "According to Cassian, a crucial prerequisite for anyone presiding over a monastic assembly or even having authority over themselves is to have learned:", "options": [{"text": "The most effective methods for managing monastic property and finances.", "isCorrect": false, "rationale": "The text states a monk 'has not only deprived himself of all his property,' which contradicts focusing on managing it."}, {"text": "That he is the ultimate authority over his own actions and can set his own rules.", "isCorrect": false, "rationale": "The text explicitly states he must learn 'he has no authority over his own actions.'"}, {"text": "That he is not his own maker and has no inherent authority over his own actions.", "isCorrect": true, "rationale": "The text says he must learn 'the fact that he is not his own maker and has no authority over his own actions,' aligning with this option."}, {"text": "The ability to command respect and obedience from younger, less experienced monks.", "isCorrect": false, "rationale": "Cassian emphasizes personal humility and obedience ('become again a little child'), not commanding others based on age."}], "id": "q10"}, {"question": "Cassian's treatment of the monastic girdle, hood, and robe as spiritually meaningful objects reflects a broader principle about exterior life. Which statement best captures this principle?", "options": [{"text": "External observances are less important than interior states and may be safely neglected once a monk matures.", "isCorrect": false, "rationale": "Cassian argues the opposite: he devotes considerable attention to the habit precisely because exterior details express and reinforce interior commitment. Neglecting them would undermine the spiritual life."}, {"text": "The visible details of a monk's life both express and shape his interior disposition toward God.", "isCorrect": true, "rationale": "By explaining that the habit is 'a visible sign of the monk's interior commitment' and that the hood reminds monks to preserve childlike innocence, Cassian shows that external forms actively form the inner person, not merely reflect it."}, {"text": "Extreme austerity in dress, such as sackcloth, best demonstrates a monk's sincerity and detachment.", "isCorrect": false, "rationale": "Cassian explicitly disapproves of sackcloth because conspicuous austerity ministers to vanity rather than genuine holiness."}, {"text": "Individual monks should choose their clothing based on personal spiritual promptings to best express their unique vocation.", "isCorrect": false, "rationale": "Cassian stresses that the habit should be 'common property' and avoid novelty, precisely to prevent individualism from undermining communal life."}], "id": "q11"}, {"question": "Cassian teaches that the authority required to govern a monastic assembly must first be earned through a personal discipline of self-renunciation. How does this teaching connect the theme of the habit to the theme of communal leadership?", "options": [{"text": "Both the habit and the role of superior are primarily status symbols that identify monks to outsiders.", "isCorrect": false, "rationale": "Cassian consistently pushes against external distinctions for status; the habit is explicitly to be 'commonplace,' and leadership flows from proven interior submission, not external rank."}, {"text": "Just as the habit visibly expresses interior commitment, a superior's authority is authentic only when it is grounded in prior interior renunciation of self-will.", "isCorrect": true, "rationale": "Cassian teaches that a monk must first learn he is 'not his own maker' before he can rightly preside over others. This parallels his treatment of the habit: outer form (authority, dress) must correspond to inner reality (submission, poverty of spirit)."}, {"text": "Communal authority has nothing to do with personal asceticism; a superior's role is purely administrative.", "isCorrect": false, "rationale": "The text states that presiding over a community requires having learned deep personal humility and self-denial — the opposite of a purely administrative view of leadership."}, {"text": "Only monks who have mastered all canonical hours may aspire to positions of leadership in the community.", "isCorrect": false, "rationale": "The prerequisite Cassian names for leadership is interior self-renunciation and humility, not mastery of the prayer schedule."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
