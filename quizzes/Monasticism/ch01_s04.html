<script>
var QUESTIONS = [{"question": "What is the primary overarching theme of the textbook \"What Is Monasticism?\" as introduced in \"The Western Story: A Preview\"?", "options": [{"text": "A detailed biography of Saint Benedict and his influence on medieval Europe.", "isCorrect": false, "rationale": "While Saint Benedict is a significant figure covered in the book, the preview states a broader theme: the story of Western monasticism across nearly seventeen centuries, from its origins to its modern presence, touching all corners of European civilization."}, {"text": "The continuous evolution and impact of Western monasticism from its ancient origins to its modern presence across European civilization.", "isCorrect": true, "rationale": "The text explicitly states: 'This book tells the story of Western monasticism from its origins in the Egyptian desert to its living presence in the modern world. It is a story that spans nearly seventeen centuries and touches every corner of European civilization.'"}, {"text": "An examination of the theological debates between Eastern and Western monastic traditions.", "isCorrect": false, "rationale": "The book focuses on Western monasticism, though it touches on Eastern influences through figures like John Cassian. Debates between East and West are not highlighted as the primary overarching theme."}, {"text": "A chronological study of monastic architecture and art from the third century to today.", "isCorrect": false, "rationale": "While monastic art and culture (e.g., Celtic illuminated manuscripts, Cluny's transformation of art) are mentioned, the overall scope is the 'story of Western monasticism' as a way of life and its impact, not solely architecture or art."}], "id": "q01"}, {"question": "According to the preview, where and when did the story of Western monasticism predominantly originate?", "options": [{"text": "Sixth-century Italy, with the writing of the Rule of Saint Benedict.", "isCorrect": false, "rationale": "The Rule of Saint Benedict was written in sixth-century Italy, but the origins of Western monasticism predate this, as stated in the preview."}, {"text": "Third-century Egypt, inspired by figures like Anthony of Egypt.", "isCorrect": true, "rationale": "The text explicitly states: 'Our story begins in third-century Egypt, where Anthony of Egypt hears the Gospel read aloud in church and takes it literally.'"}, {"text": "Ninth-century France, with the reform movement at Cluny.", "isCorrect": false, "rationale": "The Cluniac reform began in the tenth century (910) in France, which is much later than the described origins of monasticism."}, {"text": "Twelfth-century Cîteaux, with the foundation of the Cistercian order.", "isCorrect": false, "rationale": "The Cistercian movement started in the twelfth century, building on earlier monastic traditions, not originating them."}], "id": "q02"}, {"question": "John Cassian is described as the \"bridge between East and West\" in the context of monasticism. What does this metaphor primarily signify about his role?", "options": [{"text": "He mediated diplomatic relations between Byzantine emperors and Western European kings.", "isCorrect": false, "rationale": "While 'bridge' implies connection, Cassian's role was spiritual and intellectual, not primarily diplomatic in a political sense."}, {"text": "He literally traveled back and forth, establishing monasteries in both the Eastern and Western Roman Empires.", "isCorrect": false, "rationale": "He was 'born in the East and trained in the Egyptian monasteries,' but then 'settled in Gaul.' The 'bridge' refers to the transmission of ideas, not continuous physical travel between distinct monastic foundations in both regions."}, {"text": "He developed a unique monastic rule that blended practices from both Eastern and Western spiritual traditions.", "isCorrect": false, "rationale": "Cassian transmitted teachings and practices, but his works (Institutes and Conferences) were foundational for Western monasticism by transmitting Egyptian teachings, not necessarily creating a new 'blended rule' in the sense of Benedict's Rule."}, {"text": "He effectively transmitted the teachings and practices of Egyptian monasticism to Western Europe.", "isCorrect": true, "rationale": "The text states: 'How did the wisdom of the Egyptian desert reach medieval Europe? Largely through one man: John Cassian... His two great works — the Institutes and the Conferences — transmitted the teachings of the Egyptian monks to the Western Church and became foundational texts for all later Western monasticism.'"}], "id": "q03"}, {"question": "The Rule of Saint Benedict is characterized by \"moderation.\" How did this characteristic differentiate it from \"earlier rules\"?", "options": [{"text": "It emphasized intellectual study over manual labor, making monastic life less physically demanding.", "isCorrect": false, "rationale": "Benedict's Rule balanced manual labor, sacred reading, and rest, rather than prioritizing intellectual study over labor. The moderation referred to its overall approach to discipline."}, {"text": "It allowed monks to live outside the monastery in individual hermitages, offering more personal freedom.", "isCorrect": false, "rationale": "Benedict's Rule was a 'practical guide for monastic community life,' organizing the monk's day communally, in contrast to the solitude of the Desert Fathers or the 'hermits within a community' model of the Carthusians."}, {"text": "It offered a more humane, flexible, and wise guide for communal monastic life, in contrast to more severe demands.", "isCorrect": true, "rationale": "The text explicitly states: 'Benedict's genius is moderation. Where earlier rules were severe and demanding, Benedict's Rule is humane, flexible, and wise.'"}, {"text": "It abolished the need for communal prayer, allowing monks to focus on individual spiritual exercises.", "isCorrect": false, "rationale": "The Rule organized the monk's day around the 'Opus Dei'—'the communal chanting of the psalms,' directly contradicting the idea of abolishing communal prayer."}], "id": "q04"}, {"question": "Which monastic tradition, flourishing at the western edge of the known world, is notably associated with perilous sea voyages as \"pilgrims for Christ\" and the creation of \"illuminated manuscripts of breathtaking beauty\"?", "options": [{"text": "The Cistercians", "isCorrect": false, "rationale": "The Cistercians are known for returning to strict observance of Benedict's Rule and for figures like Bernard of Clairvaux, but not specifically for sea voyages or illuminated manuscripts in the same distinct way."}, {"text": "The Carthusians", "isCorrect": false, "rationale": "The Carthusians are known for their extreme austerity and contemplative, semi-eremitic life, not for extensive sea voyages or illuminated manuscripts as a defining characteristic."}, {"text": "Celtic monasticism", "isCorrect": true, "rationale": "The section on Celtic Monasticism (Chapter 5) states: 'In Ireland, Scotland, and the islands... Celtic monks built monasteries... endured ferocious penances, illuminated manuscripts of breathtaking beauty, and set out on perilous sea voyages as pilgrims for Christ.'"}, {"text": "The Desert Fathers and Mothers", "isCorrect": false, "rationale": "The Desert Fathers and Mothers lived in the deserts of Egypt, Palestine, and Syria, known for their solitude and pithy sayings, not for sea voyages or illuminated manuscripts."}], "id": "q05"}, {"question": "The foundation of Cluny in 910 marked a significant reform in Benedictine monasticism. What was the *revolutionary* aspect of its charter that helped address existing problems?", "options": [{"text": "It introduced a new, stricter monastic rule that replaced the Rule of Saint Benedict.", "isCorrect": false, "rationale": "Cluny was a reform movement within Benedictine monasticism; it did not replace the Rule of Saint Benedict but sought to uphold it strictly."}, {"text": "It mandated that all Cluniac monasteries engage in missionary work overseas.", "isCorrect": false, "rationale": "While some monks were missionaries, the charter's revolutionary aspect related to its governance, not primarily its missionary mandate."}, {"text": "It established a hierarchical structure where all monasteries were directly subordinate to the founding abbey of Cluny.", "isCorrect": false, "rationale": "Cluny became the center of a reform movement encompassing many monasteries, implying a network, but the 'revolutionary charter' specifically refers to its relationship with the papacy, not primarily an internal hierarchy over all other monasteries in the initial revolutionary act."}, {"text": "It placed the monastery under the direct protection of the pope, freeing it from local political interference.", "isCorrect": true, "rationale": "The text states: 'In 910, a duke named William of Aquitaine founded a new monastery at Cluny in Burgundy with a revolutionary charter that placed it under the direct protection of the pope, free from local interference.'"}], "id": "q06"}, {"question": "The Carthusian motto \"Stat crux dum volvitur orbis\" (\"The cross stands while the world turns\") reflects their conviction. This motto most profoundly expresses which aspect of their monastic life?", "options": [{"text": "Their commitment to active evangelization and spreading the Christian faith across a changing world.", "isCorrect": false, "rationale": "The Carthusians are described as 'the most austere and contemplative community,' focusing inward, not on active evangelization."}, {"text": "Their dedication to preserving ancient monastic traditions and resisting all forms of modern innovation.", "isCorrect": false, "rationale": "While they are conservative, the motto's meaning focuses on the *endurance* of the contemplative life, not merely resistance to innovation, but rather its timelessness in contrast to fleeting worldly events."}, {"text": "Their belief in the enduring and unchanging nature of the contemplative life, centered on Christ, amidst worldly changes.", "isCorrect": true, "rationale": "The Carthusian motto 'expresses the order's conviction that the contemplative life, centered on the cross of Christ, endures unchanged while empires rise and fall around it.'"}, {"text": "Their role as spiritual guides for secular leaders, helping them navigate the complexities of worldly governance.", "isCorrect": false, "rationale": "The Carthusians are known for being hermits within a community, focused on solitude and contemplation, not for advising secular leaders in the manner of figures like Bernard of Clairvaux."}], "id": "q07"}, {"question": "Considering the final chapter and the \"How to Read This Book\" section, what is the author's implicit argument regarding the study of monasticism today?", "options": [{"text": "Monasticism is a historical curiosity best understood through archaeological study of ancient ruins.", "isCorrect": false, "rationale": "The text explicitly states: 'The monastic tradition is not a museum exhibit.' It emphasizes its living nature and contemporary relevance."}, {"text": "Its primary value lies in its historical impact on the development of European political systems.", "isCorrect": false, "rationale": "While monasticism certainly had political impact (e.g., Cluny), the author emphasizes its wisdom for 'anyone who wants to live a serious, thoughtful, God-centered life,' not solely its political influence."}, {"text": "The wisdom of monasticism remains relevant and offers valuable insights for anyone seeking a thoughtful, God-centered life in the modern world.", "isCorrect": true, "rationale": "The text concludes by asking readers: 'What can I learn from these monks? What wisdom do they offer — not only to those who wear the habit, but to anyone who wants to live a serious, thoughtful, God-centered life?'"}, {"text": "Contemporary monastic communities are largely isolated and have little to offer modern society.", "isCorrect": false, "rationale": "The final chapter describes living communities and even features Thomas Merton, implying ongoing relevance and influence, not isolation or irrelevance."}], "id": "q08"}, {"question": "According to the \"How to Read This Book\" section, what component is considered the \"heart\" of each content chapter and serves as the primary material for learning?", "options": [{"text": "Historical Context sections, which provide the necessary background.", "isCorrect": false, "rationale": "Historical Context is one part of the chapter structure, but not explicitly called the 'heart' of the book."}, {"text": "Monastic Theology and Spirituality explanations for beginners.", "isCorrect": false, "rationale": "These explanations are important for understanding, but the author designates a different component as the 'heart.'"}, {"text": "Questions and Homework, which deepen understanding and push thinking.", "isCorrect": false, "rationale": "Questions and Homework are for assessment and deeper engagement, but the core material itself is stated elsewhere."}, {"text": "Primary Source Readings, with excerpts from the monks' own writings.", "isCorrect": true, "rationale": "The text explicitly states: 'The primary sources are the heart of this book.'"}], "id": "q09"}, {"question": "John Cassian's analysis of \"acedia\" is described as a \"masterpiece of early Christian psychology.\" If a modern student were to experience something analogous to Cassian's \"noonday devil,\" what would be its most likely manifestation?", "options": [{"text": "An intense, overwhelming anger or violent outburst against others.", "isCorrect": false, "rationale": "Acedia is defined as 'spiritual listlessness or sloth,' and 'restlessness and boredom,' which are not typically manifested as intense anger or violence."}, {"text": "A pervasive feeling of restlessness, boredom, and spiritual listlessness that undermines focus and commitment.", "isCorrect": true, "rationale": "The definition of acedia provided is: 'spiritual listlessness or sloth, sometimes called the \"noonday devil\"... Cassian's analysis of this vice — the monk's peculiar temptation to restlessness and boredom — is one of the masterpieces of early Christian psychology.' This option accurately captures all these elements."}, {"text": "A sudden, irresistible urge to accumulate wealth and material possessions.", "isCorrect": false, "rationale": "This describes avarice or greed, not acedia, which is related to spiritual lassitude and boredom."}, {"text": "A profound state of contemplative peace and spiritual ecstasy.", "isCorrect": false, "rationale": "Acedia is described as a 'vice' and 'temptation' associated with listlessness and boredom, which is the opposite of contemplative peace or spiritual ecstasy."}], "id": "q10"}, {"question": "Bernard of Clairvaux arrived at Cîteaux in 1112 with thirty companions and catalyzed the Cistercian movement. According to the preview, what is the subject of Bernard's masterpiece On Loving God?", "options": [{"text": "A systematic defense of the papacy's authority over secular monarchs.", "isCorrect": false, "rationale": "While Bernard was influential in church politics, On Loving God is a mystical and devotional work, not a political treatise on papal authority."}, {"text": "The soul's journey through four degrees of love.", "isCorrect": true, "rationale": "The text states: 'We will read from his masterpiece On Loving God, in which he maps the soul's journey through four degrees of love.'"}, {"text": "A guide to organizing Cistercian monasteries according to the strict observance of Benedict's Rule.", "isCorrect": false, "rationale": "On Loving God is a contemplative work on the nature and degrees of love for God, not a practical guide to monastic organization."}, {"text": "A critique of Cluniac excess and the corruption that came with wealth.", "isCorrect": false, "rationale": "While Bernard did critique Cluny, On Loving God is a constructive mystical treatise on love, not primarily a polemic against Cluniac practices."}], "id": "q11"}, {"question": "The preview describes the chapter structure as having four parts. Which of the following correctly lists all four parts in order?", "options": [{"text": "Primary Sources, Vocabulary Lists, Essay Questions, Final Exam", "isCorrect": false, "rationale": "The text specifies four distinct structural components and does not list 'Vocabulary Lists' or 'Final Exam' as separate parts of each chapter."}, {"text": "Historical Context, Primary Source Readings, Monastic Theology and Spirituality, Questions and Homework", "isCorrect": true, "rationale": "The text enumerates exactly these four parts: '1. Historical Context... 2. Primary Source Readings... 3. Monastic Theology and Spirituality... 4. Questions and Homework...'"}, {"text": "Introduction, Historical Background, Theological Analysis, Comparative Study", "isCorrect": false, "rationale": "This does not match the four-part structure listed in the text, which includes Primary Source Readings as the central component."}, {"text": "Biography, Primary Sources, Spiritual Reflections, Discussion Activities", "isCorrect": false, "rationale": "While biography is often present, the text does not list this as one of the four formal structural parts; the correct term is 'Historical Context.'"}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
