<script>
var QUESTIONS = [{"question": "Where did Christian monasticism primarily originate?", "options": [{"text": "Medieval Europe", "isCorrect": false, "rationale": "The text states that Western monasticism, which developed in Europe, has its roots in the East, not that it originated there."}, {"text": "Latin America", "isCorrect": false, "rationale": "Latin America is not mentioned as a place of origin for early Christian monasticism in the text."}, {"text": "The ancient Near East, specifically Egypt, Syria, and Palestine", "isCorrect": true, "rationale": "The text explicitly states, 'Christian monasticism was born in the East... They were Egyptians, Syrians, and Palestinians who fled into the deserts of the ancient Near East.'"}, {"text": "The Byzantine Empire", "isCorrect": false, "rationale": "While the Byzantine era is associated with the Eastern monastic tradition (e.g., Mount Athos), it refers to a later period and region, not the initial birthplace in the 3rd-4th centuries."}], "id": "q01"}, {"question": "What primary motivation led early Christians, like Anthony of Egypt, to retreat to the desert?", "options": [{"text": "A desire for political influence and power within the Roman Empire.", "isCorrect": false, "rationale": "The text indicates a desire to escape worldly comforts and distractions, not to gain political influence."}, {"text": "Seeking a radical spiritual life and the 'edge of the Gospel' as Christianity became more comfortable.", "isCorrect": true, "rationale": "The text explains that 'some believers felt that something was being lost' as Christianity became 'comfortable, even fashionable' and sought the 'radical edge of the Gospel' in the desert."}, {"text": "Escaping severe Roman persecution by hiding in remote areas.", "isCorrect": false, "rationale": "While figures like Paul of Thebes fled persecution, the broader movement, especially after persecutions ended, was driven by a spiritual quest rather than solely escape from persecution."}, {"text": "Establishing new trade routes across the desert for economic gain.", "isCorrect": false, "rationale": "The text focuses on spiritual motivations, not economic ones, for retreating to the desert."}], "id": "q02"}, {"question": "Which statement accurately describes a characteristic of early Eastern monasticism?", "options": [{"text": "Its foundational literature, such as the sayings of the Desert Fathers, was primarily written in Latin.", "isCorrect": false, "rationale": "The text explicitly states that early monastic literature 'was all written in Greek or Coptic, not Latin.'"}, {"text": "It was primarily led by European monks who traveled East to establish communities.", "isCorrect": false, "rationale": "The text clarifies, 'The first monks were not Europeans. They were Egyptians, Syrians, and Palestinians.'"}, {"text": "Key founders like Anthony, Pachomius, and Basil the Great were all Eastern Christians.", "isCorrect": true, "rationale": "The text affirms, 'The great founders — Anthony, Pachomius, Basil the Great — were all Eastern Christians.'"}, {"text": "It quickly adopted the Rule of St. Benedict as its governing monastic code.", "isCorrect": false, "rationale": "The Rule of St. Benedict is foundational for *Western* monasticism, developed much later than the initial Eastern origins."}], "id": "q03"}, {"question": "According to the text, what happened to the Eastern monastic tradition after the Western monastic story began?", "options": [{"text": "It largely ceased to exist, its influence absorbed by the developing Western tradition.", "isCorrect": false, "rationale": "The text states, 'The Eastern story did not end when the Western story began.'"}, {"text": "It merged entirely with Western monasticism, forming a single, unified tradition.", "isCorrect": false, "rationale": "The text notes that 'they developed in different ways over the centuries' and are 'distinct enough' for the book to focus on one."}, {"text": "It continued its own rich and continuous heritage, stretching from desert origins to the present day.", "isCorrect": true, "rationale": "The text explicitly states, 'The Eastern Christian tradition... has its own rich and continuous monastic heritage that stretches from the same desert origins all the way to the present day.'"}, {"text": "It relocated its major centers primarily to Western Europe.", "isCorrect": false, "rationale": "The text highlights Eastern centers like Mount Athos, indicating its continued presence in the East, not a relocation to the West."}], "id": "q04"}, {"question": "Which of the following is highlighted as a distinctive feature of the Eastern monastic tradition in the text's 'Eastern Monastic Tradition' box?", "options": [{"text": "The compilation of the 'Rule of St. Benedict' as its primary guiding document.", "isCorrect": false, "rationale": "The Rule of St. Benedict is the foundation of *Western* monasticism, not Eastern."}, {"text": "The practice of Gregorian Chant as the central liturgical music.", "isCorrect": false, "rationale": "Gregorian Chant is a hallmark of Western liturgical music, not explicitly mentioned as central to Eastern monasticism in the text."}, {"text": "The Philokalia, a vast collection of spiritual writings, and the Jesus Prayer.", "isCorrect": true, "rationale": "The text specifically lists 'The Philokalia' and 'The Jesus Prayer' as highlights of the Eastern monastic tradition."}, {"text": "The establishment of abbacies primarily centered in Rome.", "isCorrect": false, "rationale": "Eastern monastic centers like Mount Athos are in Greece, and the tradition does not center on Rome."}], "id": "q05"}, {"question": "Why does this book choose to focus primarily on Western monasticism?", "options": [{"text": "Because the Western tradition is considered superior in its theological depth.", "isCorrect": false, "rationale": "The text explicitly states, 'The decision to focus on Western monasticism is not a judgment about which tradition is better.'"}, {"text": "To provide a coherent and in-depth narrative of one distinct tradition without sacrificing depth for breadth.", "isCorrect": true, "rationale": "The text explains the focus is because 'the two traditions are distinct enough that doing justice to both in a single book would be impossible without sacrificing depth for breadth' and to tell the Western tradition's 'coherent arc.'"}, {"text": "Due to a lack of available historical sources and literature on the Eastern tradition.", "isCorrect": false, "rationale": "The text makes no mention of a lack of sources for the Eastern tradition; it highlights its 'rich and continuous monastic heritage' and literature like the Philokalia."}, {"text": "To assert the complete separation and independence of the Western tradition from Eastern roots.", "isCorrect": false, "rationale": "The text acknowledges 'common roots in the Desert Fathers' and promises to note shared ground and divergences, not assert complete independence."}], "id": "q06"}, {"question": "The text describes monasticism as 'white martyrdom.' What does this term signify in the context of early Christianity?", "options": [{"text": "The literal act of dying for one's faith in a violent persecution.", "isCorrect": false, "rationale": "The text refers to this as 'red martyrdom' and distinguishes 'white martyrdom' from it."}, {"text": "A daily dying to self through asceticism and solitude, in place of a bloody death.", "isCorrect": true, "rationale": "The footnote defines 'white martyrdom' as 'a daily dying to self in place of the 'red martyrdom' of blood,' signifying a commitment to Christ through spiritual discipline rather than physical death."}, {"text": "Renouncing one's faith to avoid persecution but living a life of quiet repentance.", "isCorrect": false, "rationale": "Martyrdom, whether red or white, involves bearing witness to faith, not renouncing it."}, {"text": "Seeking political influence to protect Christians from future persecution.", "isCorrect": false, "rationale": "The motivation for desert monasticism was spiritual withdrawal, not political engagement."}], "id": "q07"}, {"question": "Which Eastern monastic figure is credited with founding the first organized cenobitic (community) monasteries and establishing a written rule for communal life?", "options": [{"text": "Anthony of Egypt", "isCorrect": false, "rationale": "Anthony of Egypt is known as a key early hermit (solitary monk), not for founding organized communal monasteries."}, {"text": "Paul of Thebes", "isCorrect": false, "rationale": "Paul of Thebes is traditionally considered the first Christian hermit, emphasizing solitary life."}, {"text": "Pachomius", "isCorrect": true, "rationale": "The text's footnote states, 'St. Pachomius (c. 292–348): an Egyptian monk who founded the first organized cenobitic (community) monasteries, establishing a written rule for communal life.'"}, {"text": "Evagrius Ponticus", "isCorrect": false, "rationale": "Evagrius Ponticus is mentioned as an early monastic writer, not as a founder of organized communal monasteries."}], "id": "q08"}, {"question": "In the 'coherent arc' of Western monasticism described, what significant role did John Cassian play?", "options": [{"text": "He founded the monastic tradition on Mount Athos in Greece.", "isCorrect": false, "rationale": "Mount Athos is a significant site for Eastern Orthodox monasticism, not directly associated with John Cassian's role in the Western arc."}, {"text": "He developed the theological framework for Hesychasm and the Jesus Prayer.", "isCorrect": false, "rationale": "Hesychasm and the Jesus Prayer are key elements of Eastern monasticism, and Hesychasm's classical defense was by St. Gregory Palamas."}, {"text": "He brought Eastern monastic wisdom and practices to the Western world.", "isCorrect": true, "rationale": "The text states the Western arc goes 'from the Desert Fathers... through John Cassian (who brought Eastern wisdom to the West) to Benedict of Nursia.'"}, {"text": "He codified the first complete Rule for monks in Latin, which became universal in the West.", "isCorrect": false, "rationale": "While influential, St. Benedict of Nursia is credited with the Rule that became the foundation of Western monasticism, not John Cassian."}], "id": "q09"}, {"question": "What is the overarching relationship between Eastern and Western monasticism as presented in this section?", "options": [{"text": "They are entirely separate and unrelated traditions with no shared historical connection.", "isCorrect": false, "rationale": "The text explicitly states they 'share common roots in the Desert Fathers.'"}, {"text": "Western monasticism replaced the Eastern tradition as the dominant form of Christian monasticism.", "isCorrect": false, "rationale": "The text clarifies that the Eastern tradition 'did not end when the Western story began' and continues to the present day."}, {"text": "They share common desert roots but developed distinctly over centuries into two rich traditions.", "isCorrect": true, "rationale": "The text clearly states, 'The Eastern and Western monastic traditions share common roots in the Desert Fathers, but they developed in different ways over the centuries.'"}, {"text": "Eastern monasticism is a direct offshoot and later development of Western monastic reforms.", "isCorrect": false, "rationale": "The text establishes Eastern monasticism as the origin, from which Western monasticism drew roots, not the other way around."}], "id": "q10"}, {"question": "The text describes the hesychast tradition as central to Eastern Orthodox spirituality. What does hesychasm teach about the path to union with God?", "options": [{"text": "That union with God is achieved primarily through rigorous study of Scripture and theological debate.", "isCorrect": false, "rationale": "Hesychasm, from the Greek hesychia meaning 'stillness,' emphasizes interior silence and unceasing prayer, not primarily intellectual study or debate."}, {"text": "That through prayer and asceticism, the human person can experience the uncreated light of God.", "isCorrect": true, "rationale": "The text states: 'The hesychast tradition teaches that through prayer and asceticism, the human person can experience the uncreated light of God — a real participation in the divine life.'"}, {"text": "That union with God is reserved for ordained clergy who perform sacramental rites.", "isCorrect": false, "rationale": "Hesychasm is a monastic and spiritual tradition open to all who pursue interior silence and unceasing prayer, not restricted to clergy performing sacraments."}, {"text": "That fasting and physical austerity alone, without interior prayer, produce union with God.", "isCorrect": false, "rationale": "The text defines hesychasm through 'interior silence and unceasing prayer' as the path to union, not through physical austerity alone."}], "id": "q11"}, {"question": "The text states that Western monasticism has a 'coherent arc' from the Desert Fathers through John Cassian to Benedict of Nursia. What does this arc demonstrate about how monastic wisdom traveled?", "options": [{"text": "That Western monasticism developed independently, with no meaningful input from Eastern sources.", "isCorrect": false, "rationale": "The arc explicitly begins with the Desert Fathers, who were Eastern, and passes through Cassian, who 'brought Eastern wisdom to the West,' directly contradicting the idea of independent development."}, {"text": "That Eastern wisdom was transmitted westward by individuals who had direct formation in the desert tradition, then systematized for Latin audiences.", "isCorrect": true, "rationale": "The arc — Desert Fathers to Cassian (who trained in Egypt and wrote in Latin) to Benedict (who drew on Cassian) — shows that Eastern monastic insight traveled through specific human intermediaries who adapted it for Western use."}, {"text": "That Benedict of Nursia was the original source of Western spirituality, whose ideas were later projected backward onto Eastern figures.", "isCorrect": false, "rationale": "The text presents an actual historical sequence in which the Desert Fathers preceded and shaped Cassian, who in turn shaped Benedict, not the reverse."}, {"text": "That the Eastern and Western traditions developed simultaneously with no chronological dependence between them.", "isCorrect": false, "rationale": "The arc is explicitly chronological and sequential: each step drew from the previous, establishing a clear line of transmission from East to West."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
