<script>
var QUESTIONS = [{"question": "How does Benedict's description of the monastery as a “school of the Lord's service” (schola) reflect his primary vision for monastic life?", "options": [{"text": "It emphasizes the importance of academic study and theological debate above all else.", "isCorrect": false, "rationale": "While learning is involved, the text clarifies that the 'school' is primarily for 'learning, step by step, to love God with their whole heart,' not just academic debate."}, {"text": "It signifies a place of spiritual formation and disciplined learning aimed at loving God with one's whole heart.", "isCorrect": true, "rationale": "The text explicitly states the 'schola' is 'a place where monks could learn, step by step, to love God with their whole heart,' emphasizing spiritual formation and discipline."}, {"text": "It suggests a hierarchical structure where the abbot acts as a strict schoolmaster enforcing rigid rules.", "isCorrect": false, "rationale": "While the abbot has authority, the 'school' metaphor highlights learning and discipline for spiritual growth, and Benedict's approach to authority is also one of love and consultation, not just strict enforcement."}, {"text": "It primarily refers to a vocational training center for monks to acquire practical skills for communal living.", "isCorrect": false, "rationale": "Practical skills and manual labor are part of monastic life, but the 'school of the Lord's service' points to a deeper spiritual purpose—loving God—rather than just vocational training."}], "id": "q01"}, {"question": "The text distinguishes Benedictine vows from the 'evangelical counsels.' What is a key characteristic of the Benedictine vows as presented?", "options": [{"text": "They are identical to the evangelical counsels of poverty, chastity, and obedience in all religious orders.", "isCorrect": false, "rationale": "The text explicitly states, 'These are not the same as the three “evangelical counsels”... Benedictine vows overlap with these counsels but express them in Benedict's distinctive way.'"}, {"text": "They express the evangelical counsels through Benedict's unique framework of stabilitas, conversatio morum, and obedientia.", "isCorrect": true, "rationale": "The text clarifies that Benedictine vows 'overlap with these counsels but express them in Benedict's distinctive way,' specifically naming stabilitas, conversatio morum, and obedientia as Benedict's own."}, {"text": "They focus solely on communal life and exclude personal spiritual development.", "isCorrect": false, "rationale": "Conversatio morum, in particular, focuses on 'ongoing conversion — a continual turning toward God' and 'striving to grow closer to God,' indicating personal spiritual development."}, {"text": "They are primarily focused on missionary work and spreading the faith outside the monastery.", "isCorrect": false, "rationale": "The Benedictine vows as described are foundational to the internal monastic life and commitment to a specific community and way of life, not primarily external missionary work."}], "id": "q02"}, {"question": "According to the text, how do the three Benedictine vows (stabilitas, conversatio morum, and obedientia) function synergistically within monastic life?", "options": [{"text": "They provide a set of independent guidelines, each leading to holiness through a distinct path.", "isCorrect": false, "rationale": "The text explicitly states, 'These three vows work together,' indicating an integrated, synergistic function rather than independent paths."}, {"text": "Stabilitas keeps the monk in one place; conversatio morum transforms his life within that place; and obedientia ensures his transformation follows God's will.", "isCorrect": true, "rationale": "This option directly synthesizes the description of how the vows 'work together' from the text: 'Stability keeps the monk in one place; conversatio morum transforms his life within that place; obedience ensures that his transformation follows God's will rather than his own.'"}, {"text": "Stabilitas demands strict silence, conversatio morum emphasizes intellectual pursuits, and obedientia ensures democratic decision-making.", "isCorrect": false, "rationale": "This misrepresents the specific functions of each vow. Stabilitas is about remaining in one monastery, conversatio morum is about conversion of life, and obedientia is about submission to the abbot and Rule, not democratic decision-making in the way implied."}, {"text": "They primarily serve as legal requirements for monastic status, with little spiritual significance.", "isCorrect": false, "rationale": "The text consistently emphasizes the deep spiritual vision and purpose behind the vows, culminating in 'a life of deep prayer and genuine holiness,' not merely legal status."}], "id": "q03"}, {"question": "Which of the following best encapsulates the meaning and scope of *conversatio morum* as a Benedictine vow?", "options": [{"text": "It is a vow to engage solely in intellectual study and theological discourse.", "isCorrect": false, "rationale": "While reading is part of monastic life, *conversatio morum* encompasses far more, including daily practices like poverty and chastity, and ongoing moral conversion, not just intellectual pursuits."}, {"text": "It is a commitment to remain physically within the same monastery for life, regardless of challenges.", "isCorrect": false, "rationale": "This describes the vow of *stabilitas* (stability), not *conversatio morum*."}, {"text": "It signifies an ongoing pursuit of monastic lifestyle and continual moral conversion, encompassing daily practices like poverty, chastity, fasting, and manual labor.", "isCorrect": true, "rationale": "The text states that *conversatio morum* means 'to live according to the monastic way of life and to pursue ongoing conversion' and 'encompasses the whole of the monk's daily life: his poverty, his chastity, his fasting, his manual labor, his reading, and his constant striving to grow closer to God.'"}, {"text": "It mandates unquestioning submission to the abbot's every command without personal discretion.", "isCorrect": false, "rationale": "This describes aspects of *obedientia* (obedience), but the text clarifies that obedience is 'not blind submission' and the abbot's authority involves love and responsibility, and he consults the community."}], "id": "q04"}, {"question": "Benedict states, 'Let nothing be preferred to the Work of God.' What does this statement reveal about the *Opus Dei* in Benedictine life?", "options": [{"text": "It prioritizes manual labor and self-sufficiency over all other monastic activities.", "isCorrect": false, "rationale": "The 'Work of God' (Opus Dei) specifically refers to the communal prayer of the Divine Office, not manual labor, although labor is also a pillar of Benedictine life."}, {"text": "It emphasizes that communal prayer, the Divine Office, is the central and most important activity of the monastic day, superseding all other tasks when the time for prayer arrives.", "isCorrect": true, "rationale": "The text defines Opus Dei as 'the communal prayer of the Divine Office' and states Benedict insisted that 'nothing be preferred to the Work of God,' meaning 'when the bell rings for prayer, everything else must stop.'"}, {"text": "It means monks should spend all their time in private contemplation, avoiding communal worship.", "isCorrect": false, "rationale": "The Opus Dei is explicitly described as 'communal prayer,' contrasting with private contemplation."}, {"text": "It suggests that the study of theological texts is more important than any form of practical work.", "isCorrect": false, "rationale": "Opus Dei is prayer, not exclusively theological study, and the Rule balances prayer, work, and reading."}], "id": "q05"}, {"question": "How does *lectio divina* fundamentally differ from modern reading habits, according to the text?", "options": [{"text": "Modern reading is slow and reflective, while *lectio divina* is quick and analytical.", "isCorrect": false, "rationale": "The text describes the opposite: 'We are trained to read quickly... The monk reads slowly, lingers over each word.'"}, {"text": "*Lectio divina* is for scholarly information gathering, whereas modern reading is for personal encounter with God.", "isCorrect": false, "rationale": "The text states *lectio divina* is 'not reading for information, entertainment, or even scholarly knowledge,' but rather for 'encounter with God,' which is the inverse of this option."}, {"text": "*Lectio divina* involves a slow, prayerful engagement with the text, seeking an encounter with God, unlike modern reading which typically aims for quick information extraction.", "isCorrect": true, "rationale": "The 'thinkdeeper' section directly contrasts *lectio divina* ('reads slowly, lingers over each word, and lets the text read him') with modern reading ('trained to read quickly, to extract information, and to move on')."}, {"text": "There is no significant difference; both methods prioritize understanding the literal meaning of the text.", "isCorrect": false, "rationale": "The text highlights a significant difference in purpose and method: *lectio divina* seeks encounter and transformation, not just information or literal meaning."}], "id": "q06"}, {"question": "Benedict's Rule describes the abbot as holding 'the place of Christ in the monastery.' What implication does this have for the abbot's leadership?", "options": [{"text": "It grants the abbot absolute, unquestionable authority, allowing him to rule without needing to consult anyone.", "isCorrect": false, "rationale": "While the abbot has great authority, the text notes Benedict instructs him to 'call the whole community together and listen to their counsel' for important decisions."}, {"text": "It signifies that the abbot governs with both profound authority and loving responsibility, accountable to God for the monks' souls, and must adapt his approach to each individual.", "isCorrect": true, "rationale": "The text states this 'gives the abbot great authority — but also a fearsome responsibility' and he 'will have to give an account to God for every soul entrusted to his care,' and must 'adapt his approach to each monk.'"}, {"text": "It means the abbot is primarily an administrator focused on the monastery's financial and practical affairs.", "isCorrect": false, "rationale": "The text states, 'In Benedict's vision, the abbot is far more than an administrator. He is the spiritual father of his monks.'"}, {"text": "It requires the abbot to lead primarily through strict ascetic example, minimizing interaction with individual monks.", "isCorrect": false, "rationale": "The abbot must teach 'more by deeds than by words' and 'adapt his approach to each monk,' indicating active, personalized spiritual guidance rather than minimal interaction or sole reliance on ascetic example."}], "id": "q07"}, {"question": "The text highlights Benedict's 'genius of moderation' and the concept of *discretio*. What is the practical application of this principle in Benedictine monasticism?", "options": [{"text": "It encourages monks to engage in extreme ascetic practices to prove their devotion, competing with Desert Fathers.", "isCorrect": false, "rationale": "Benedict 'had learned from the extremes of earlier monastic traditions' like the Desert Fathers and chose 'a different path' of moderation, explicitly avoiding such competition."}, {"text": "It means relaxing all rules and expectations to ensure a comfortable and easy life for the monks, akin to laxity.", "isCorrect": false, "rationale": "The text clarifies, 'This moderation is not laxity. Benedict expected serious commitment — complete obedience, renunciation of personal property, lifelong stability, and a demanding schedule of prayer and work.'"}, {"text": "It involves finding a balanced path between extremes of laxity and harshness, creating a sustainable framework for lifelong spiritual commitment that ordinary people can follow.", "isCorrect": true, "rationale": "The text describes *discretio* as 'the ability to find the right path between extremes — between laxity and harshness' and emphasizes Benedict's 'genius was to create a framework that ordinary people could follow faithfully for an entire lifetime.'"}, {"text": "It prioritizes intellectual pursuits over physical labor to avoid bodily strain, ensuring monks' well-being.", "isCorrect": false, "rationale": "Moderation applies to all aspects of monastic life, including food, sleep, and wine, and balances prayer, labor, and reading, not a simple preference of intellect over physical work."}], "id": "q08"}, {"question": "Beneath all the practical details of the Rule, the text identifies a single 'burning conviction.' What is this conviction, as articulated by Benedict in Chapter 4?", "options": [{"text": "The importance of strict adherence to every minor regulation to achieve perfect order.", "isCorrect": false, "rationale": "The text states, 'The Rule of Saint Benedict is not a legal code,' indicating that mere strict adherence to regulations is not the ultimate conviction."}, {"text": "The pursuit of communal self-sufficiency and economic independence for the monastery.", "isCorrect": false, "rationale": "While practical, this is not the 'single burning conviction' highlighted. The conviction is spiritual and relates to the ultimate purpose."}, {"text": "The central purpose of monastic life is to seek God and 'prefer nothing whatever to the love of Christ.'", "isCorrect": true, "rationale": "The text states: 'Beneath all the practical details... lies a single burning conviction: the purpose of the monastic life is to seek God. Among the 'tools for good works' in Chapter 4, Benedict writes: 'Prefer nothing whatever to the love of Christ' (4:21). This single sentence captures the essence of everything he wrote.'"}, {"text": "The development of intellectual and scholarly excellence to contribute to the Church's teaching.", "isCorrect": false, "rationale": "While Benedictine monasteries preserved learning, the 'single burning conviction' is explicitly identified as the love of Christ and seeking God, which underlies all other activities."}], "id": "q09"}, {"question": "The 'note' section mentions St. Benedict's influence on Western civilization and his declaration as Patron Saint of Europe. What specific contributions are highlighted as a result of Benedictine monasticism?", "options": [{"text": "Pioneering military campaigns to expand Christian territories during the Dark Ages.", "isCorrect": false, "rationale": "The text does not mention military campaigns as a contribution of Benedictine monasticism."}, {"text": "Establishing the first universities in Europe, primarily focused on scientific research.", "isCorrect": false, "rationale": "The text mentions 'established schools' and 'preserved classical learning,' but does not credit them with establishing the *first universities* or *primarily* scientific research."}, {"text": "Preserving classical learning, cultivating the land, establishing schools and hospitals, and maintaining the flame of faith through centuries of turmoil.", "isCorrect": true, "rationale": "The note explicitly states: 'Benedictine monks preserved classical learning during the Dark Ages, cultivated the land, established schools and hospitals, and kept the flame of faith alive through centuries of turmoil.'"}, {"text": "Developing new forms of democratic governance that influenced early European kingdoms.", "isCorrect": false, "rationale": "The text does not mention democratic governance as a contribution of Benedictine monasticism, although Benedict's leadership model influenced Catholic thinking on leadership."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
