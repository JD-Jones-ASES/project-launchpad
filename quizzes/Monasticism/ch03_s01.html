<script>
var QUESTIONS = [{"question": "Which major event in the 5th century AD is cited as a significant shock to the Mediterranean world and a catalyst for Saint Augustine's writing of *The City of God*?", "options": [{"text": "The founding of Constantinople as the new capital of the Eastern Roman Empire.", "isCorrect": false, "rationale": "While Constantinople's founding was significant, it occurred in the 4th century. The event in the 5th century that shocked the world and spurred Augustine was the sack of Rome."}, {"text": "The sack of Rome by the Visigoths in 410 AD.", "isCorrect": true, "rationale": "The text explicitly states that 'Rome itself was sacked in 410 AD by the Visigoths under Alaric, an event that shocked the entire Mediterranean world. Saint Augustine began writing The City of God partly in response to this catastrophe.'"}, {"text": "The official division of the Roman Empire into East and West.", "isCorrect": false, "rationale": "The division into East and West was a gradual process, but the specific event mentioned as a shock and trigger for Augustine's work in the 5th century was the sack of Rome."}, {"text": "The promulgation of the Edict of Milan granting religious tolerance to Christians.", "isCorrect": false, "rationale": "The Edict of Milan was issued in 313 AD, significantly earlier than the 5th-century events discussed and not directly related to Augustine's *City of God*."}]}, {"question": "Saint Augustine's response to the sack of Rome, expressed in *The City of God*, primarily aimed to redirect Christians' hope towards what?", "options": [{"text": "Rebuilding the earthly Roman Empire to its former glory.", "isCorrect": false, "rationale": "Augustine argued against placing hope in earthly empires, suggesting their collapse was inevitable, and instead pointed to a higher, more enduring hope."}, {"text": "Organizing military resistance against the invading Germanic tribes.", "isCorrect": false, "rationale": "Augustine's work was theological and philosophical, not a call to arms. It focused on spiritual rather than martial solutions."}, {"text": "The heavenly city, transcending earthly political entities.", "isCorrect": true, "rationale": "The text states Augustine argued that Christians 'should place their hope in the heavenly city, not in earthly empires,' directly in response to the catastrophe of Rome's sack."}, {"text": "Converting the Germanic invaders to Christianity to ensure peace.", "isCorrect": false, "rationale": "While conversion was part of the Church's mission, Augustine's specific response in *The City of God* focused on the spiritual orientation of Christian hope rather than evangelism as the immediate solution to political collapse."}]}, {"question": "John Cassian's early monastic journey took him to which region to learn directly from the renowned *abbas* and Desert Fathers?", "options": [{"text": "Gaul (modern France), where he later founded his own monasteries.", "isCorrect": false, "rationale": "Cassian founded monasteries in Gaul much later in his life; his initial significant learning experience with the Desert Fathers was in Egypt."}, {"text": "Constantinople, where he was ordained by John Chrysostom.", "isCorrect": false, "rationale": "He spent time in Constantinople and was ordained there, but this was after his foundational learning period with the Desert Fathers."}, {"text": "The deserts of Egypt, including the Nile Delta and Scetis.", "isCorrect": true, "rationale": "The text explicitly states that 'Together with his companion Germanus, Cassian traveled to Egypt around 385 AD and spent roughly a decade visiting the great monastic settlements of the Nile Delta and the desert of Scetis.'"}, {"text": "Bethlehem, where he received his first monastic training.", "isCorrect": false, "rationale": "Cassian received his *first* monastic training in Bethlehem, but he longed to learn from the *greatest* monks, which led him to Egypt."}]}, {"question": "Which of the following best describes John Cassian's unique and most significant contribution to Western monasticism, as highlighted in the text?", "options": [{"text": "He was the first Roman soldier to convert to monasticism and become a bishop in the West.", "isCorrect": false, "rationale": "This describes Martin of Tours, not John Cassian. Cassian was known for his extensive Eastern training."}, {"text": "He established a new, purely Western form of monasticism that rejected Eastern influences.", "isCorrect": false, "rationale": "Cassian's contribution was precisely the opposite: he brought Eastern wisdom to the West, adapting it rather than rejecting it."}, {"text": "He served as a political envoy between the collapsing Western Roman Empire and the rising Eastern Roman Empire.", "isCorrect": false, "rationale": "The text describes Cassian as a spiritual leader and writer, not a political diplomat."}, {"text": "He served as a bridge between Eastern and Western monasticism by adapting the wisdom of the Egyptian desert for a Western audience.", "isCorrect": true, "rationale": "The text explicitly states: 'Cassian's unique contribution to Western monasticism was this: he had lived the monastic life in both East and West... He became, in the words of many historians, the bridge between Eastern and Western monasticism.'"}]}, {"question": "A Western monk in the early 5th century seeking a detailed guide on the practical organization of monastic life, including rules for communal living and common faults to overcome, would consult which of Cassian's works?", "options": [{"text": "*The Conferences*", "isCorrect": false, "rationale": "*The Conferences* focused on deeper theological and spiritual dialogues. While important, it was not primarily a practical handbook for external organization."}, {"text": "*The Rule of Saint Benedict*", "isCorrect": false, "rationale": "While Benedict's Rule is a practical guide, it was written a century *after* Cassian's works and drew heavily on them. A monk in the *early 5th century* would not have access to it yet."}, {"text": "*The Institutes*", "isCorrect": true, "rationale": "The text describes *The Institutes* as 'A practical handbook for organizing monastic life. The first four books describe the external aspects of the monk's life — what he wears, how he prays, and what rules govern the community. The remaining eight books analyze the eight principal faults that threaten the monk's soul.'"}, {"text": "*The City of God*", "isCorrect": false, "rationale": "*The City of God* is a theological treatise by Saint Augustine, not a guide for monastic organization."}]}, {"question": "Which of John Cassian's major works is characterized as a series of twenty-four dialogues recording (or reconstructing) conversations with the great *abbas* of the Egyptian desert, covering deeper theological topics?", "options": [{"text": "*The Institutes*", "isCorrect": false, "rationale": "*The Institutes* is a practical handbook on monastic life and faults, not a series of dialogues."}, {"text": "*The Conferences*", "isCorrect": true, "rationale": "The text explicitly states: '*The Conferences* (Collationes, c. 424–428): A series of twenty-four dialogues in which Cassian records (or reconstructs) his conversations with the great *abbas* of the Egyptian desert.'"}, {"text": "*The Commonitorium*", "isCorrect": false, "rationale": "*The Commonitorium* was written by Vincent of Lérins, a different monastic figure mentioned in the text, not Cassian."}, {"text": "*The Rule of Saint Basil*", "isCorrect": false, "rationale": "Saint Basil's Rule was an Eastern monastic rule written in Greek, not one of Cassian's works written for the West."}]}, {"question": "Which early Western monastic pioneer, a former Roman soldier, became a bishop and founded the monasteries of Ligugé and Marmoutier, thereby spreading the ideal of the 'monk-bishop'?", "options": [{"text": "Honoratus of Lérins", "isCorrect": false, "rationale": "Honoratus founded the monastery on the island of Lérins, but he was not a former Roman soldier who founded Ligugé or Marmoutier, nor is he specifically credited with spreading the 'monk-bishop' ideal in the same way."}, {"text": "Germanus", "isCorrect": false, "rationale": "Germanus was Cassian's companion and less famous; he did not found these monasteries or hold the title of bishop in this context."}, {"text": "Martin of Tours", "isCorrect": true, "rationale": "The text states: 'Martin of Tours (c. 316–397) was a Roman soldier who became a monk and then bishop of Tours in Gaul. He founded the monastery of Ligugé around 360 AD... and later the great monastery of Marmoutier... Martin's life... helped spread the ideal of the monk-bishop throughout the Western Church.'"}, {"text": "Saint Benedict of Nursia", "isCorrect": false, "rationale": "Saint Benedict lived a century later and is known for his Rule, not for being a former Roman soldier or bishop of Tours."}]}, {"question": "The monastery founded by Honoratus of Lérins around 410 AD off the coast of modern Cannes became particularly renowned for what specific contribution to Western monasticism?", "options": [{"text": "It became a major military outpost to defend Gaul from Germanic invaders.", "isCorrect": false, "rationale": "The text describes Lérins as a center of learning, not a military outpost."}, {"text": "It developed a completely new monastic rule that rejected all previous traditions.", "isCorrect": false, "rationale": "The text does not suggest Lérins rejected previous traditions; rather, it became a center for *learning*."}, {"text": "It served as a prominent center of monastic learning, producing several important bishops and theologians.", "isCorrect": true, "rationale": "The text states: 'Lérins became a great center of monastic learning and produced several important bishops and theologians,' citing figures like Saint Patrick and Saint Vincent of Lérins."}, {"text": "It specialized in preserving ancient Roman legal texts and practices.", "isCorrect": false, "rationale": "While monasteries often preserved texts, Lérins' specific renown, as per the text, was for monastic learning and producing spiritual leaders and thinkers."}]}, {"question": "Prior to Cassian's contributions, what was a significant challenge for Western monasteries attempting to adopt the spiritual wisdom of the Eastern Desert Fathers?", "options": [{"text": "The Western climate was unsuitable for Eastern ascetic practices.", "isCorrect": false, "rationale": "The text mentions the physical differences (deserts vs. forests) but focuses on the lack of *written guidance* rather than physical impossibility."}, {"text": "Eastern monasticism was viewed as heretical by the Western Church.", "isCorrect": false, "rationale": "The text indicates a desire to transmit and adapt Eastern wisdom, not a theological rejection of it."}, {"text": "There was no systematic written guide in Latin, and existing Eastern rules were in Greek for Eastern communities.", "isCorrect": true, "rationale": "The text states: 'The Desert Fathers had developed a profound tradition... but it was largely oral... There was no systematic written guide that a Western monastery could follow. The great Eastern rules... were written in Greek and addressed to Eastern communities.'"}, {"text": "Western monks preferred to develop entirely original spiritual practices without any Eastern influence.", "isCorrect": false, "rationale": "The text highlights the desire to bring Eastern monasticism westward and adapt its wisdom, indicating an interest in, not a rejection of, Eastern influence."}]}, {"question": "Why is John Cassian rightly called 'the father of Western monastic spirituality'?", "options": [{"text": "He was the first person to establish a monastery anywhere in the Western Roman Empire.", "isCorrect": false, "rationale": "Martin of Tours founded Ligugé earlier (c. 360 AD). Cassian's importance stems from his unique comprehensive synthesis, not just being the very first founder."}, {"text": "He successfully unified all independent Western monastic communities under a single, centralized authority for the first time.", "isCorrect": false, "rationale": "The text does not describe Cassian as a centralizing administrative figure. His influence was primarily through his writings and spiritual guidance."}, {"text": "He systematically documented, adapted, and transmitted the comprehensive spiritual and practical wisdom of Eastern monasticism to the Latin-speaking West, profoundly influencing foundational texts like the Rule of Saint Benedict.", "isCorrect": true, "rationale": "The text explicitly states: 'Writing in Latin for a Western audience, he organized the scattered wisdom of the desert into a coherent system... In doing so, he gave the West a monastic theology... that had never before been available in Latin.' It further notes his direct influence on Benedict's Rule, solidifying his foundational role."}, {"text": "He authored the definitive rule that all subsequent Western monasteries were legally required to follow.", "isCorrect": false, "rationale": "While Cassian's works were influential, Benedict's Rule became more widely adopted as a definitive rule. Cassian provided the *theology* and *practices* that informed such rules, rather than a universally mandated legal code."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
