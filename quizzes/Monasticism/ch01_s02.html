<script>
var QUESTIONS = [{"question": "What is the fundamental difference between cenobitic and eremitic monasticism, as described in the text?", "options": [{"text": "Cenobitic monks are exclusively found in the Eastern Church, while eremitic monks are in the Western Church.", "isCorrect": false, "rationale": "The text states that cenobitic monasticism became dominant in the Western Church, and eremitic monasticism originated in the Egyptian desert (Eastern context)."}, {"text": "Cenobitic monks live in a community under a common rule and superior, while eremitic monks live alone in solitude.", "isCorrect": true, "rationale": "This is the core distinction provided in the text: 'Cenobitic... describes monks who live together in a community... Eremitic... describes monks who live alone.'"}, {"text": "Cenobitic monks are primarily focused on intellectual pursuits, whereas eremitic monks prioritize manual labor.", "isCorrect": false, "rationale": "The text does not specify this as the fundamental difference. Both forms involve prayer and work, but the social structure is the defining characteristic."}, {"text": "Cenobitic monks engage in active missionary work, while eremitic monks are strictly cloistered.", "isCorrect": false, "rationale": "The text describes mendicant orders as engaging in active service, but this is distinct from the primary definition of cenobitic monasticism, which focuses on community life within the monastery."}], "id": "q01"}, {"question": "Which of the following scenarios best exemplifies the spiritual training benefit of the 'daily friction' experienced in a cenobitic community?", "options": [{"text": "A monk achieves deep contemplation easily because he has no external distractions.", "isCorrect": false, "rationale": "This describes a potential advantage of the eremitic life, where solitude strips away distractions, not the 'daily friction' of communal living."}, {"text": "A monk learns patience and charity by tolerating a brother who snores loudly during night prayers or chews too loudly at meals.", "isCorrect": true, "rationale": "The text explicitly states: 'The daily friction of living with other people — learning patience, humility, and charity — is itself a powerful form of spiritual training,' giving examples like snoring or chewing loudly."}, {"text": "A monk receives immediate divine inspiration because he is isolated from worldly influences.", "isCorrect": false, "rationale": "This relates more to the potential for spiritual insight in solitude, but the 'daily friction' in a community provides a different kind of training."}, {"text": "A monk avoids all temptations because his community provides constant protection.", "isCorrect": false, "rationale": "The text states the community provides support 'When a monk struggles with prayer or temptation,' implying struggles still occur, but support is available."}], "id": "q02"}, {"question": "Saint Benedict of Nursia is primarily known for his influence on which form of monastic life in the Western Church?", "options": [{"text": "The mendicant orders, like the Franciscans and Dominicans.", "isCorrect": false, "rationale": "Mendicant orders are discussed as a separate, later development, distinct from Benedict's primary influence on monasticism."}, {"text": "The eremitic tradition, emphasizing solitary hermits in remote locations.", "isCorrect": false, "rationale": "Anthony of Egypt is associated with the eremitic tradition's origins, while Benedict systematized the cenobitic form."}, {"text": "The laura model, combining individual cells with communal worship on feast days.", "isCorrect": false, "rationale": "The laura model was common in early Palestine and some Eastern Orthodox communities, not primarily associated with Benedict's influence in the West."}, {"text": "The cenobitic tradition, with monks living in community under a common rule.", "isCorrect": true, "rationale": "The text explicitly states, 'The cenobitic form of monasticism became the dominant form in the Western Church, largely through the influence of Benedict of Nursia and his famous Rule.'"}], "id": "q03"}, {"question": "What is the primary characteristic of an eremitic monk's life?", "options": [{"text": "Living in a large monastery with many brothers, sharing all aspects of daily life.", "isCorrect": false, "rationale": "This describes the cenobitic life, not the eremitic."}, {"text": "Withdrawing completely from both the world and the company of other monks to live alone in solitude.", "isCorrect": true, "rationale": "The text defines eremitic as monks who 'live alone,' and the hermit 'withdraws not only from the world but from the company of other monks.'"}, {"text": "Traveling extensively to preach and serve the poor in urban areas.", "isCorrect": false, "rationale": "This describes mendicant orders, which are mentioned as separate from strictly monastic forms."}, {"text": "Living in separate cells but gathering daily for common prayers and meals.", "isCorrect": false, "rationale": "This describes a 'laura' or a Carthusian model, which are intermediate forms, not purely eremitic."}], "id": "q04"}, {"question": "According to the text, what is a significant danger associated with the eremitic life?", "options": [{"text": "The lack of opportunity for profound prayer and spiritual insight.", "isCorrect": false, "rationale": "The text states that solitude 'can produce extraordinary depths of prayer and spiritual insight,' identifying this as an advantage, not a danger."}, {"text": "A strong temptation to abandon solitude for a more social and worldly existence.", "isCorrect": false, "rationale": "While possible, the text focuses on internal dangers rather than external temptations to abandon the life."}, {"text": "The risk of falling into eccentricity, pride, or despair due to the absence of community and a rule.", "isCorrect": true, "rationale": "The text explicitly warns, 'Without a community and a rule, the hermit can fall into eccentricity, pride, or despair. He may mistake his own delusions for divine inspiration.'"}, {"text": "The requirement to constantly travel and relocate, making spiritual stability difficult.", "isCorrect": false, "rationale": "Hermits typically live in a fixed, remote dwelling, not constantly travel."}], "id": "q05"}, {"question": "Who is considered the 'father of Christian monasticism' and a prominent figure in the early eremitic tradition?", "options": [{"text": "Saint Benedict of Nursia", "isCorrect": false, "rationale": "Benedict is the 'father of Western monasticism' and associated with cenobitic life."}, {"text": "Saint Athanasius of Alexandria", "isCorrect": false, "rationale": "Athanasius recorded the life of the true 'father,' but was not the father of monasticism himself."}, {"text": "Anthony of Egypt", "isCorrect": true, "rationale": "The text states, 'Anthony of Egypt... widely regarded as the father of Christian monasticism. He spent decades living alone in the Egyptian desert.'"}, {"text": "Saint Francis of Assisi", "isCorrect": false, "rationale": "Francis founded a mendicant order in the 13th century, much later than the origins of Christian monasticism."}], "id": "q06"}, {"question": "According to Saint Benedict's Rule, for whom is the eremitic life most suitable?", "options": [{"text": "New converts who feel an immediate, strong calling to live alone in the desert.", "isCorrect": false, "rationale": "The Rule explicitly states 'not in the first fervor of his conversion' for those suitable for eremitic life."}, {"text": "Monks who have first undergone 'long probation in a monastery' and learned to fight spiritual battles with communal support.", "isCorrect": true, "rationale": "The text quotes Benedict's Rule: 'the hermit should be one \"who, not in the first fervor of his conversion, but after long probation in a monastery,\" has learned to fight... by the help of many brethren and is now ready to fight alone.'"}, {"text": "Any individual who desires ultimate freedom from rules and external authority.", "isCorrect": false, "rationale": "The eremitic life still involves an internal spiritual discipline, and Benedict's view emphasizes prior formation, not freedom from all structure."}, {"text": "Those who have proven incapable of living harmoniously within a community.", "isCorrect": false, "rationale": "The requirement is for proven spiritual formation and strength, not inability to live with others."}], "id": "q07"}, {"question": "The Carthusian model of monastic life is described as 'alone together.' Which of the following best explains this concept?", "options": [{"text": "Monks live in a traditional cenobitic monastery but observe strict silence at all times.", "isCorrect": false, "rationale": "While Carthusians are known for silence, the defining characteristic of 'alone together' is the combination of individual dwellings with communal aspects, not just strict silence in a fully shared space."}, {"text": "Monks engage in extensive travel for missionary work but return to a central hermitage for prayer.", "isCorrect": false, "rationale": "The Carthusian model involves monks residing in a settled community, not extensive travel."}, {"text": "Each monk lives in a separate small house with a garden and workshop, yet they share a church, cloister, and certain communal meals and prayers.", "isCorrect": true, "rationale": "The text explains, 'each monk lives in his own small house (called a \"cell\") with its own garden and workshop, but the monks share a church, a cloister, and certain communal meals and prayers. It is sometimes described as \"alone together.\"'"}, {"text": "It is a semi-eremitic community where monks live in individual cells scattered around a central church, gathering only on Sundays and feast days.", "isCorrect": false, "rationale": "This describes a 'laura,' another intermediate form, but not the Carthusian model's specific blend of private house with specific shared facilities."}], "id": "q08"}, {"question": "Why does the text distinguish mendicant orders (like Franciscans and Dominicans) from strictly monastic forms of life?", "options": [{"text": "Because mendicant orders completely reject poverty and prayer, which are central to monasticism.", "isCorrect": false, "rationale": "The text states mendicant orders 'combined elements of monastic life (poverty, prayer, community),' so they do not reject them."}, {"text": "Because they are exclusive to the Eastern Church, whereas monasticism is Western.", "isCorrect": false, "rationale": "Mendicant orders primarily developed in the Western Church."}, {"text": "Because they combine elements of monastic life with an active mission of preaching and service in the world.", "isCorrect": true, "rationale": "The text explains mendicant orders 'combined elements of monastic life (poverty, prayer, community) with an active mission of preaching and service in the world. They are not strictly monks, but they inherited much from the monastic tradition.'"}, {"text": "Because they were founded before the cenobitic or eremitic forms existed.", "isCorrect": false, "rationale": "Mendicant orders were founded in the 13th century, long after the earliest forms of monasticism."}], "id": "q09"}, {"question": "The concluding paragraph emphasizes an overarching 'creative tension' that monastic founders had to address. What is this fundamental question?", "options": [{"text": "How to reconcile ancient monastic rules with modern scientific advancements.", "isCorrect": false, "rationale": "The text focuses on the foundational questions of monastic life, not modern adaptations or scientific integration."}, {"text": "How to choose between intellectual study and manual labor as the primary monastic activity.", "isCorrect": false, "rationale": "While a practical consideration, the text explicitly highlights a different 'creative tension' at its conclusion."}, {"text": "How much solitude is necessary, and how much community is beneficial for spiritual growth?", "isCorrect": true, "rationale": "The text explicitly concludes: 'Every great monastic founder had to answer the question: How much solitude? How much community? The answers they gave shaped the history of the Western Church.'"}, {"text": "How to fund monastic institutions through donations versus self-sufficiency.", "isCorrect": false, "rationale": "Financial models are not discussed as the primary tension for monastic founders in this section."}], "id": "q10"}, {"question": "The text identifies the laura as an intermediate monastic form. What distinguishes it from both purely cenobitic and purely eremitic monasticism?", "options": [{"text": "Monks in a laura take no vows and may leave the community at will.", "isCorrect": false, "rationale": "The text says nothing about laurae having no vows. The distinction is about living arrangement — individual cells with periodic communal gathering — not about the absence of vows."}, {"text": "Monks live in individual cells scattered around a central church, gathering for worship on Sundays and feast days but spending most time in solitude.", "isCorrect": true, "rationale": "The text defines the laura as 'a semi-eremitic arrangement in which monks live in separate cells scattered around a central church, coming together for worship on Sundays and feast days but spending most of their time in solitude.'"}, {"text": "Monks alternate between months of solitary desert life and months of full community life in a monastery.", "isCorrect": false, "rationale": "The text describes no such alternating schedule for the laura; its defining feature is a settled semi-eremitic arrangement, not periodic rotation between modes."}, {"text": "Monks in a laura follow the Rule of Saint Benedict but live at a physical distance from one another.", "isCorrect": false, "rationale": "The laura predates the Rule of Saint Benedict and is particularly associated with early Palestine and Eastern Orthodox communities, not primarily with Benedictine practice."}], "id": "q11"}, {"question": "The text notes that the cenobitic monastery provides advantages that the solitary hermit lacks. Which of the following correctly pairs a cenobitic advantage with the corresponding danger it helps the monk avoid?", "options": [{"text": "The rule provides structure — helps avoid the 'extraordinary depths of prayer' that come from undirected solitude.", "isCorrect": false, "rationale": "The text presents 'extraordinary depths of prayer' as an *advantage* of eremitic life, not a danger to be avoided. The rule's value is in providing discipline and preventing laxity, not in preventing deep prayer."}, {"text": "The abbot provides wise guidance — helps the monk avoid mistaking his own delusions for divine inspiration.", "isCorrect": true, "rationale": "The text warns that without a community and rule, the hermit 'may mistake his own delusions for divine inspiration.' The abbot's 'wise guidance' in a cenobitic community directly addresses this danger."}, {"text": "Community support helps the monk avoid all forms of spiritual temptation entirely.", "isCorrect": false, "rationale": "The text says community provides support 'when a monk struggles with prayer or temptation,' not that it eliminates temptation entirely."}, {"text": "Shared meals and prayers help the monk avoid the 'daily friction' that would otherwise damage charity.", "isCorrect": false, "rationale": "The text presents 'daily friction' as a *benefit* of communal life — a form of spiritual training in patience and charity — not a danger that shared activities prevent."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
