<script>
var QUESTIONS = [{"question": "How did Charlemagne's vision for a Christian civilization influence the standardization of monastic life in the Carolingian Empire?", "options": [{"text": "He enforced a new, unified monastic rule he personally authored to replace all existing ones.", "isCorrect": false, "rationale": "Charlemagne sought to standardize monastic life but did not author a new rule. He supported Benedict of Aniane in making Saint Benedict's Rule the universal standard."}, {"text": "He supported Benedict of Aniane's efforts to establish the Rule of Saint Benedict as the universal standard for all monasteries through imperial decrees.", "isCorrect": true, "rationale": "Charlemagne's commitment to Christian renewal led him to seek order in monasteries. He empowered Benedict of Aniane, who then, through the Synods of Aachen, ensured the Rule of Saint Benedict became mandatory across the empire."}, {"text": "He abolished all existing monastic rules, allowing each monastery to develop its own customs independently.", "isCorrect": false, "rationale": "Charlemagne desired order and uniformity, not independent customs. The text explicitly states he wanted to move away from a 'bewildering variety of rules and customs.'"}, {"text": "He prioritized the military training of monks, transforming monasteries into defensive strongholds against invaders.", "isCorrect": false, "rationale": "Charlemagne valued monasteries for preserving learning, copying manuscripts, educating the young, caring for the poor, and especially for prayer, not primarily for military training."}], "id": "q01"}, {"question": "The Synods of Aachen (816-817) are described as a 'momentous decision.' What was its most significant and lasting effect on Western monasticism?", "options": [{"text": "It led to the immediate and complete suppression of all forms of lay abbacy across the empire.", "isCorrect": false, "rationale": "While lay abbacy was a problem, the Synods of Aachen primarily focused on standardizing monastic rules and observances, not directly on eliminating lay abbots. Lay abbacy became more widespread after Charlemagne's death as central authority weakened."}, {"text": "It established the Rule of Saint Benedict as the uniform and mandatory charter for virtually all Western monasteries.", "isCorrect": true, "rationale": "The Synods of Aachen decreed that all monasteries in the Carolingian Empire would follow the Rule of Saint Benedict, standardizing practices and making 'monk' in the West effectively synonymous with 'Benedictine.'"}, {"text": "It mandated the construction of fortified monasteries to protect against future invasions.", "isCorrect": false, "rationale": "The Synods focused on internal monastic observance (rules, liturgy, layout, clothing, education) rather than physical defensive structures."}, {"text": "It introduced a new, stricter ascetic monastic order that rejected all forms of wealth and property.", "isCorrect": false, "rationale": "The Synods standardized to the existing Rule of Saint Benedict, which emphasized moderation, rather than introducing a new, radically ascetic order or rejecting all property."}], "id": "q02"}, {"question": "Beyond the physical destruction caused by groups like the Vikings and Magyars, what was a significant spiritual or organizational consequence for monasteries during the Age of Invasions?", "options": [{"text": "Monasteries became centers for scientific research and medical innovation due to increased isolation.", "isCorrect": false, "rationale": "While monasteries did preserve learning, the text describes a period of decline and crisis due to invasions and political fragmentation, not a surge in scientific or medical innovation."}, {"text": "Powerful local lords frequently appointed lay abbots, treating monasteries as private property and leading to a decline in discipline.", "isCorrect": true, "rationale": "The text explicitly states that as central authority collapsed, 'powerful local lords began to treat monasteries as their private property. Lay abbots... became common,' leading to a decline in monastic discipline."}, {"text": "Monks universally abandoned the Rule of Saint Benedict in favor of stricter, more militant rules designed for survival.", "isCorrect": false, "rationale": "The text notes a 'serious decline' but not a universal abandonment of the Rule for new, militant ones. The reform movements, like Cluny, sought to restore strict observance of the Rule of Saint Benedict."}, {"text": "Monasteries formed unified, centrally controlled military alliances for self-defense, becoming independent political entities.", "isCorrect": false, "rationale": "Monasteries were often 'wealthy, undefended, and filled with treasure' during this period, making them targets. They did not form unified military alliances for self-defense as a widespread response."}], "id": "q03"}, {"question": "William I's foundation charter for Cluny was 'revolutionary' primarily because it granted the monastery what crucial immunity?", "options": [{"text": "Exemption from all taxes and tithes to the local bishop, making it financially independent.", "isCorrect": false, "rationale": "While financial independence was important, the most revolutionary aspect was not primarily financial exemption but rather freedom from external control over its spiritual and administrative life."}, {"text": "The right to establish its own independent military force for defense against invaders.", "isCorrect": false, "rationale": "The charter focused on spiritual and administrative independence, not military authority."}, {"text": "Freedom from interference by local bishops and secular lords, making it subject directly to the Pope in Rome.", "isCorrect": true, "rationale": "The text states William's 'second gift — far more important — was freedom.' This freedom meant Cluny was 'free from all interference by local bishops and secular lords' and 'subject directly to the Pope in Rome and to no one else,' allowing monks to 'freely elect their own abbot without outside pressure.'"}, {"text": "The authority to appoint bishops in neighboring dioceses, extending its political influence.", "isCorrect": false, "rationale": "Cluny's exemption focused on its own internal governance and direct papal oversight, not on appointing bishops in other dioceses."}], "id": "q04"}, {"question": "St. Odo of Cluny is credited with transforming Cluny from a single monastery into a reform movement. How did he achieve this?", "options": [{"text": "By personally writing a new, universally accepted monastic rule that replaced the Rule of Saint Benedict.", "isCorrect": false, "rationale": "Odo was dedicated to making Saint Benedict's Rule the standard and applied its principles rigorously, rather than writing a new rule."}, {"text": "By actively reforming other monasteries that sought Cluny's assistance, thus spreading Cluny's influence and model.", "isCorrect": true, "rationale": "The text explicitly states that Odo 'immediately began reforming other monasteries that sought Cluny's help,' expanding Cluny's influence across France and Italy and laying the groundwork for the wider reform movement."}, {"text": "By building the massive Cluny III church, which attracted monks from across Europe.", "isCorrect": false, "rationale": "Cluny III was built under Abbot Hugh, not Odo, who was the second abbot."}, {"text": "By leading military campaigns against lay abbots who corrupted monastic life.", "isCorrect": false, "rationale": "Odo was known for his gentleness and insistence on genuine fervor in monastic life, not for leading military campaigns."}], "id": "q05"}, {"question": "Which significant liturgical practice, still observed in the Western Church today, was instituted by Abbot Odilo of Cluny?", "options": [{"text": "The daily recitation of the Rosary by all monks and lay faithful.", "isCorrect": false, "rationale": "The Rosary developed much later and is not attributed to Odilo of Cluny."}, {"text": "The institution of All Souls' Day for the commemoration of all the faithful departed.", "isCorrect": true, "rationale": "Odilo of Cluny 'is remembered above all for instituting the feast of All Souls' Day (November 2) — the annual commemoration of all the faithful departed — which spread from Cluny to the entire Western Church.'"}, {"text": "The formal practice of silent contemplation as the sole form of monastic prayer.", "isCorrect": false, "rationale": "Cluniac monasticism was known for its elaborate liturgical worship, not solely for silent contemplation."}, {"text": "The annual celebration of the Feast of the Assumption of Mary.", "isCorrect": false, "rationale": "The Feast of the Assumption has ancient origins and was not instituted by Odilo."}], "id": "q06"}, {"question": "The construction of Cluny III under Abbot Hugh exemplified a core Cluniac belief regarding worship. What was this belief?", "options": [{"text": "That monastic architecture should be austere and simple to reflect humility and poverty.", "isCorrect": false, "rationale": "Cluny III was 'the largest church in Christendom' and a magnificent structure, contradicting the idea of austerity and simplicity."}, {"text": "That communal worship should be offered to God with the greatest possible beauty and magnificence.", "isCorrect": true, "rationale": "The text states Cluny III 'was an overwhelming expression of the Cluniac belief that worship should be offered to God with the greatest possible beauty and magnificence.'"}, {"text": "That monasteries should be designed primarily for defense against external threats and invasions.", "isCorrect": false, "rationale": "While defense was a concern in the wider historical context, the primary purpose and statement of Cluny III's design was about the glory of God in worship."}, {"text": "That monastic churches should primarily serve as centers for public education and civic gatherings.", "isCorrect": false, "rationale": "Cluny III's design was focused on elaborate worship, not primarily public education or civic gatherings."}], "id": "q07"}, {"question": "Peter the Venerable's decision to commission the first Latin translation of the Quran demonstrates what unique intellectual approach for his time?", "options": [{"text": "A strategy to discredit Islam by highlighting perceived contradictions in its scriptures through scholarly critique.", "isCorrect": false, "rationale": "The text explicitly states Peter the Venerable commissioned the translation 'not to attack Islam, but to understand it,' emphasizing a different motive than mere discrediting."}, {"text": "A commitment to scholarly inquiry and understanding other cultures, even potential adversaries, through direct study.", "isCorrect": true, "rationale": "Peter the Venerable 'believed that Christians should engage with Islam through knowledge and persuasion rather than violence.' His commissioning of the Quran translation was a 'remarkable act of intellectual curiosity' focused on understanding."}, {"text": "An attempt to convert Muslims by presenting them with Christian theological texts translated into Arabic.", "isCorrect": false, "rationale": "Peter commissioned a Latin translation of the Quran (an Islamic text), not a translation of Christian texts into Arabic for conversion purposes."}, {"text": "A diplomatic effort to establish new trade routes with Islamic empires by demonstrating shared intellectual interests.", "isCorrect": false, "rationale": "The text highlights intellectual curiosity and engagement with ideas, not diplomatic or trade initiatives."}], "id": "q08"}, {"question": "What structural feature made the Cluniac reform movement unique and highly effective compared to earlier, less organized monastic reforms?", "options": [{"text": "Its emphasis on individual hermit life rather than communal living, promoting personal asceticism.", "isCorrect": false, "rationale": "Cluny was a communal monastery that maintained strict observance of the Rule of Saint Benedict, which is centered on communal living."}, {"text": "Its direct dependence on local bishops for funding and protection, integrating it into regional ecclesiastical hierarchies.", "isCorrect": false, "rationale": "Cluny's revolutionary feature was its freedom from local episcopal and secular interference, being subject directly to the Pope."}, {"text": "Its centralized governance, where reformed monasteries became priories directly answerable to the Abbot of Cluny.", "isCorrect": true, "rationale": "The text states, 'Unlike earlier reform movements, Cluny did not simply inspire other monasteries and leave them to their own devices. Instead, reformed monasteries became priories — dependent houses governed by priors who were appointed by and answerable to the Abbot of Cluny.'"}, {"text": "Its exclusive focus on economic self-sufficiency, rejecting all external donations and lands.", "isCorrect": false, "rationale": "Cluny was well-endowed and grew into a vast and wealthy network, clearly accepting donations and lands, which it then centrally managed."}], "id": "q09"}, {"question": "The text mentions the significant contributions of monks to Western civilization beyond their spiritual duties. Which of the following best represents one such lasting cultural impact?", "options": [{"text": "The invention of the printing press, which revolutionized book production and dissemination.", "isCorrect": false, "rationale": "The printing press was invented much later (15th century) by Gutenberg and is not attributed to the monks of the Benedictine centuries mentioned here."}, {"text": "The establishment of universities as the primary centers of secular learning and scientific research.", "isCorrect": false, "rationale": "While monasteries contributed to education, the rise of universities as distinct institutions occurred later, with different organizational structures than monastic schools."}, {"text": "The preservation and copying of ancient manuscripts, saving classical and patristic texts from being lost forever.", "isCorrect": true, "rationale": "The text explicitly states: 'Monks copied and preserved the works of classical antiquity — Virgil, Cicero, Aristotle, the Church Fathers — that would otherwise have been lost forever. The scriptorium was the room in a monastery where monks copied manuscripts by hand.'"}, {"text": "The development of gunpowder and advanced siege weaponry, revolutionizing medieval warfare tactics.", "isCorrect": false, "rationale": "The development of military technology like gunpowder is not listed as a contribution of Benedictine monks in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
