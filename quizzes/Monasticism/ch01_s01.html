        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>

        <a href="../../courses/Monasticism.html">&larr; Back to The Cloister and the Cell (Monasticism)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which statement best defines monasticism?", "options": [{"text": "A lifestyle exclusively for men who live in complete isolation.", "isCorrect": false, "rationale": "The text states that monasticism involves both men and women ('monks and nuns') and, while they withdraw from ordinary society, they live in 'community,' indicating it is not complete isolation."}, {"text": "A form of consecrated religious life where individuals withdraw from society to dedicate themselves to God.", "isCorrect": true, "rationale": "The text defines monasticism as 'any form of consecrated religious life in which men or women withdraw from ordinary society to devote themselves entirely to God through prayer, work, and community.'"}, {"text": "The practice of selling all possessions and donating them to the Church.", "isCorrect": false, "rationale": "While 'selling what thou hast, and give to the poor' is an inspiration for the vow of poverty, it is only one aspect and not the complete definition of monasticism itself."}, {"text": "A temporary retreat for Christians seeking to deepen their faith before returning to ordinary life.", "isCorrect": false, "rationale": "Monasticism is described as a 'way of life,' implying a permanent commitment, not a temporary retreat."}], "id": "q01"}, {"question": "The text suggests that the primary motivation for individuals to embrace monastic life stems from:", "options": [{"text": "A desire to escape the difficulties and responsibilities of ordinary society.", "isCorrect": false, "rationale": "While monastic life involves withdrawal, the text emphasizes a divine 'call' and 'invitation' as the core motivation, not merely an escape from societal challenges."}, {"text": "A literal interpretation and profound response to a specific divine invitation found in the Gospels.", "isCorrect": true, "rationale": "The text explicitly states monks 'hear these words and tak[e] them literally' (Matt. 19:21, Luke 14:33) and respond to an 'invitation so compelling that those who hear it clearly find they cannot refuse.'"}, {"text": "The belief that ordinary Christians are less faithful and need a more radical path to salvation.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'This does not mean that monks believe ordinary Christians are somehow less faithful.'"}, {"text": "A historical tradition passed down through generations, primarily for community preservation.", "isCorrect": false, "rationale": "While monasticism has a rich history, the text highlights the individual's direct response to a divine call as the primary motivation, rather than mere tradition."}], "id": "q02"}, {"question": "How does the Catholic Church view the relationship between monastic life and the 'universal call to holiness' as articulated by the Second Vatican Council?", "options": [{"text": "Monastic life is presented as the only true path to achieve holiness.", "isCorrect": false, "rationale": "The text states the Church teaches 'many paths to holiness,' including marriage and family life, and that 'all Christians, not only monks and nuns, are called to be saints.'"}, {"text": "Monasticism is one specific, radical path within the broader call to holiness that applies to all Christians.", "isCorrect": true, "rationale": "The text explains that the 'universal call to holiness' applies to all, but 'some Christians receive a particular calling to leave everything behind and follow Christ in a more radical way,' with monasticism being this 'consecrated life.'"}, {"text": "The universal call to holiness replaces the need for monastic life in the modern era.", "isCorrect": false, "rationale": "The text presents monasticism as 'its oldest and most enduring form' of consecrated life, coexisting with the universal call, not being replaced by it."}, {"text": "Only those who cannot pursue marriage or family life are called to monasticism.", "isCorrect": false, "rationale": "The text describes monasticism as a 'particular calling' from God, not a secondary option for those unable to marry or have a family."}], "id": "q03"}, {"question": "The text explains that the evangelical counsels of poverty, chastity, and obedience are foundational to monastic life because they fundamentally address:", "options": [{"text": "The Church's need for a structured hierarchy and administrative efficiency.", "isCorrect": false, "rationale": "While monastic communities have structure, the text states the counsels 'correspond to three fundamental human desires' rather than administrative needs."}, {"text": "Common human desires for possessions, pleasure, and power, allowing monks to focus solely on God.", "isCorrect": true, "rationale": "The text explicitly links each counsel to a specific human desire: 'desire for possessions (poverty renounces this), the desire for pleasure (chastity renounces this), and the desire for power and autonomy (obedience renounces this).' The goal is to 'make room for what he values most: God alone.'"}, {"text": "The need for monks to demonstrate their superiority over ordinary Christians.", "isCorrect": false, "rationale": "The text contradicts any notion of monastic superiority, stating monks 'don't believe ordinary Christians are somehow less faithful.'"}, {"text": "A means of ensuring economic stability and resource distribution within the monastic community.", "isCorrect": false, "rationale": "While poverty involves common property, the *reason* for renouncing possessions is deeper—to detach from the 'desire for possessions' and depend on God."}], "id": "q04"}, {"question": "The evangelical counsel of poverty, as practiced in monastic life, primarily involves:", "options": [{"text": "Donating all acquired wealth to external charities.", "isCorrect": false, "rationale": "The text focuses on 'holding all things in common with his community' and renouncing *personal* property, not solely external donation."}, {"text": "Living a life entirely devoid of any material goods whatsoever.", "isCorrect": false, "rationale": "Monks do not live entirely devoid of goods; they hold 'all things in common' within their community, signifying renunciation of ownership, not absolute material emptiness."}, {"text": "Renouncing personal ownership and depending on God's providence within a communal sharing of resources.", "isCorrect": true, "rationale": "The text states: 'The monk gives up personal property and possessions, holding all things in common with his community. He depends on God, not on wealth, for his security.'"}, {"text": "Earning a modest income that is then distributed equally among all community members.", "isCorrect": false, "rationale": "The emphasis is on giving up personal property and dependence on God, not primarily on earning and distributing income."}], "id": "q05"}, {"question": "How does the text describe the monastic vow of chastity?", "options": [{"text": "It signifies a belief that marriage is inherently sinful or inferior.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not a rejection of marriage as something bad, but a choice to love God with an undivided heart.'"}, {"text": "It involves dedicating one's entire heart to God through the renunciation of marriage and family life.", "isCorrect": true, "rationale": "The text states: 'The monk renounces marriage and family life, dedicating his heart entirely to God.'"}, {"text": "It allows for marriage, but only if the spouse also takes monastic vows.", "isCorrect": false, "rationale": "The vow of chastity specifically involves 'renounc[ing] marriage and family life' without exception for marital status."}, {"text": "It primarily serves to prevent distractions from manual labor and study.", "isCorrect": false, "rationale": "While it removes distractions, the text's primary explanation for chastity is 'a choice to love God with an undivided heart,' not merely practical efficiency."}], "id": "q06"}, {"question": "Why is the vow of obedience often considered the most challenging of the evangelical counsels for a monk?", "options": [{"text": "It requires constant physical labor under the direction of a superior.", "isCorrect": false, "rationale": "While monks engage in physical labor, the text specifies the difficulty of obedience lies in 'surrendering not just possessions or pleasures, but one's own judgment and will.'"}, {"text": "It necessitates surrendering personal judgment and one's own will, beyond mere material or pleasurable renunciations.", "isCorrect": true, "rationale": "The text explains: 'This is often considered the most difficult of the three counsels, because it requires surrendering not just possessions or pleasures, but one's own judgment and will.'"}, {"text": "It demands complete silence and isolation from the community.", "isCorrect": false, "rationale": "Obedience pertains to submitting one's will to authority and community rule, not specifically to silence or isolation from the community itself."}, {"text": "It involves giving up the ability to make personal decisions about one's spiritual path.", "isCorrect": false, "rationale": "The vow is about submitting one's will to a superior and community rule, not a complete abandonment of personal spiritual discernment, which is guided by the community."}], "id": "q07"}, {"question": "Which of the following best characterizes the daily life of a monk as described in the text?", "options": [{"text": "A solitary pursuit of knowledge, focused primarily on individual academic study and research.", "isCorrect": false, "rationale": "While study is part of monastic life ('reads Scripture slowly and prayerfully'), the text highlights a broader 'daily rhythm of prayer, work, study, and silence' with communal prayer and manual labor."}, {"text": "A structured routine of prayer, manual labor, spiritual reading, and periods of silence.", "isCorrect": true, "rationale": "The text describes 'a daily rhythm of prayer, work, study, and silence,' including rising before dawn to pray, chanting psalms, reading Scripture, working with hands, eating simply, and speaking little."}, {"text": "A continuous cycle of community meetings and social engagement.", "isCorrect": false, "rationale": "The text mentions silence and withdrawal from 'noise and distractions of ordinary life,' contrasting with a 'continuous cycle of community meetings and social engagement.'"}, {"text": "An unstructured existence, allowing for spontaneous acts of charity and personal devotion.", "isCorrect": false, "rationale": "The text emphasizes a 'daily rhythm' that 'shapes every hour of the monk's day,' indicating a highly structured, not unstructured, existence."}], "id": "q08"}, {"question": "What is the ultimate goal of the rigorous spiritual discipline and self-denial practiced in monastic life?", "options": [{"text": "To achieve a state of physical and emotional detachment from all worldly feelings.", "isCorrect": false, "rationale": "While detachment from disordered desires is a means, the ultimate goal is not mere absence of feeling, but 'freedom for God.'"}, {"text": "To prove one's worthiness to God through suffering and arduous tasks.", "isCorrect": false, "rationale": "The text explicitly states: 'The goal is not suffering for its own sake.'"}, {"text": "To attain freedom from disordered desires and self-centeredness, leading to a deeper union with God.", "isCorrect": true, "rationale": "The text states the goal is 'freedom: freedom from disordered desires, freedom from the tyranny of the self, and ultimately, freedom for God.'"}, {"text": "To inspire awe and reverence in those who observe the monastic lifestyle.", "isCorrect": false, "rationale": "The text focuses on the internal transformation of the monk ('spiritual training — an athletic discipline of the soul') rather than external impressions on others."}], "id": "q09"}, {"question": "A monk who practices 'contemptus mundi' would most accurately be described as someone who:", "options": [{"text": "Actively despises all material creation and seeks its destruction.", "isCorrect": false, "rationale": "The text clarifies: 'But this does not mean hatred of creation.'"}, {"text": "Withdraws from society to avoid all interaction with worldly concerns and people.", "isCorrect": false, "rationale": "While withdrawal is part of monastic life, 'contemptus mundi' is defined as an internal attitude towards worldly *values* rather than an avoidance of all interaction."}, {"text": "Refuses to allow worldly possessions or ambitions to overshadow their devotion to God.", "isCorrect": true, "rationale": "The text explains: 'It means a refusal to let worldly things become idols that displace God from the center of one's life.'"}, {"text": "Believes that the world is inherently evil and irredeemable.", "isCorrect": false, "rationale": "The text explicitly states that 'contemptus mundi' does not mean 'hatred of creation,' implying it's not a belief in inherent evil."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
