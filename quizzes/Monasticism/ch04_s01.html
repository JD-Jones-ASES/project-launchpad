<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary reason St. Benedict left Rome as a young man?", "options": [{"text": "He was called by the Pope to establish a new monastery in the wilderness.", "isCorrect": false, "rationale": "The text states Benedict was 'repelled by the city's moral corruption' and fled to live as a hermit, not that he was called by the Pope for a specific mission."}, {"text": "He was disgusted by the moral decay and corruption he witnessed in the city.", "isCorrect": true, "rationale": "The text explicitly states Benedict 'was repelled by the city's moral corruption' and Pope St. Gregory the Great noted Benedict 'gave over his books, and forsook his father's house and wealth' to seek God in the wilderness, directly supporting this option."}, {"text": "He sought to escape the political instability caused by Gothic invasions in the city.", "isCorrect": false, "rationale": "While Italy was politically unstable, the text specifies his primary motivation for leaving Rome was the city's 'moral corruption,' not directly the political instability within Rome itself."}, {"text": "He was ordered by his family to live a life of solitary prayer and asceticism.", "isCorrect": false, "rationale": "The text indicates his family sent him to Rome for a classical education, and his decision to flee was his own, driven by his repulsion for the city's morals, not a family directive."}], "id": "q01"}, {"question": "How did the collapse of the Western Roman Empire in the 6th century influence the perceived need for institutions like Benedictine monasteries?", "options": [{"text": "The empire's collapse fostered a widespread return to paganism, which monasteries aimed to combat through aggressive evangelization.", "isCorrect": false, "rationale": "The text mentions Monte Cassino was founded on the site of an old pagan temple, indicating paganism existed, but it doesn't suggest a widespread return to paganism as the primary driver for monasticism in response to the empire's collapse. Rather, the Church endured as other institutions crumbled."}, {"text": "It created a power vacuum that monasteries sought to fill by establishing new political governments.", "isCorrect": false, "rationale": "Monasteries, while providing order, did not aim to establish new political governments. Their role was to preserve learning, provide charity, and maintain faith within the existing social chaos."}, {"text": "The breakdown of traditional Roman institutions created a desperate need for stability, order, and preserved learning, which monasteries provided.", "isCorrect": true, "rationale": "The text highlights that 'The old Roman institutions of law, government, and education were breaking down,' and that 'the Church endured,' with bishops and monks preserving learning and providing stability, order, and peace in this 'troubled world.'"}, {"text": "The lack of centralized authority allowed monasteries to operate entirely independently of any religious hierarchy.", "isCorrect": false, "rationale": "While central authority diminished, the Church structure, including bishops and the Pope (like Gregory the Great), endured and played a role. Monasteries operated within the Church's hierarchy, not entirely independent of it."}], "id": "q02"}, {"question": "Which of the following characteristics best exemplifies why Benedict's Rule endured for fifteen centuries, even as societies changed drastically?", "options": [{"text": "Its strict adherence to extreme fasting and heroic asceticism, which appealed to a desire for rigorous discipline.", "isCorrect": false, "rationale": "The text states the opposite, highlighting 'Moderation' and that Benedict hoped to establish 'nothing harsh, nothing burdensome,' distinguishing it from earlier rules that demanded extreme asceticism."}, {"text": "Its rigid, unchanging blueprint for monastic life, which ensured uniformity across all regions.", "isCorrect": false, "rationale": "The text emphasizes the 'Flexibility' of the Rule, noting Benedict 'gave the abbot considerable discretion to adapt the Rule to local circumstances,' making it a framework rather than a rigid blueprint."}, {"text": "Its detailed abstract theological treatises, which provided comprehensive philosophical guidance.", "isCorrect": false, "rationale": "The text describes the Rule as 'not a work of abstract theology but a practical handbook for living together in community,' making this option incorrect."}, {"text": "Its moderation, practicality, flexibility, and underlying spiritual depth, which allowed it to adapt to diverse contexts while retaining its core values.", "isCorrect": true, "rationale": "The text explicitly lists 'Moderation,' 'Practicality,' 'Flexibility,' and 'Spiritual depth' as the key reasons why the Rule was so enduring, covering the full breadth of its lasting appeal."}], "id": "q03"}, {"question": "The anecdote about the monks attempting to poison St. Benedict at Subiaco most clearly illustrates which aspect of his early leadership experience?", "options": [{"text": "His reputation as a miracle worker, capable of supernatural protection.", "isCorrect": false, "rationale": "While the story involves a miracle (the cup shattering), the incident itself highlights the monks' dissatisfaction with his 'strict discipline,' not primarily his reputation for miracles."}, {"text": "The challenges he faced in establishing disciplined communal monasticism due to resistance to his strict standards.", "isCorrect": true, "rationale": "The text states 'That first attempt at leadership ended badly — the monks, unhappy with Benedict's strict discipline, reportedly tried to poison him,' directly indicating the challenges of implementing his discipline within a community."}, {"text": "The widespread acceptance of his Rule from its earliest stages.", "isCorrect": false, "rationale": "The poisoning attempt clearly demonstrates a lack of widespread acceptance of his leadership and discipline at that initial stage."}, {"text": "His preference for solitary hermitic life over communal leadership.", "isCorrect": false, "rationale": "While he had lived as a hermit, this event occurred when he was asked to be an abbot, showing his engagement in communal leadership despite its difficulties, not a preference to avoid it."}], "id": "q04"}, {"question": "St. Gregory the Great's role was crucial to the legacy of St. Benedict primarily because he:", "options": [{"text": "Authored the Rule of St. Benedict, providing its theological framework.", "isCorrect": false, "rationale": "St. Benedict himself wrote the Rule. Gregory the Great wrote about Benedict's life, but did not author the Rule."}, {"text": "Declared Benedict the patron saint of Europe, posthumously recognizing his importance.", "isCorrect": false, "rationale": "Pope Paul VI declared Benedict the patron saint of Europe in 1964, not Gregory the Great."}, {"text": "Served as the primary biographer of Benedict and actively promoted the Benedictine Rule throughout Europe.", "isCorrect": true, "rationale": "The text states Gregory the Great 'is our primary source for Benedict's life' (in his Dialogues) and that 'he did more than anyone to spread the Benedictine Rule throughout Europe,' including sending it with Augustine to convert the English."}, {"text": "Founded Monte Cassino, the motherhouse of Western monasticism.", "isCorrect": false, "rationale": "St. Benedict founded Monte Cassino around 529."}], "id": "q05"}, {"question": "The Benedictine motto 'Ora et Labora' ('Pray and Work'), though not directly in the Rule, effectively summarizes Benedict's vision by emphasizing:", "options": [{"text": "The separation of spiritual duties from manual labor, with prayer being superior.", "isCorrect": false, "rationale": "The text states the motto 'captures Benedict's vision of a life in which prayer and labor are woven together into a seamless whole,' indicating integration, not separation or superiority of one over the other."}, {"text": "The necessity of economic self-sufficiency for monasteries, independent of any spiritual purpose.", "isCorrect": false, "rationale": "While work contributes to self-sufficiency, the motto emphasizes the integrated spiritual purpose of labor, not its independence from spirituality."}, {"text": "A balanced and integrated life where spiritual devotion and practical work are interwoven.", "isCorrect": true, "rationale": "The text explicitly states the motto 'captures Benedict's vision of a life in which prayer and labor are woven together into a seamless whole,' directly supporting this interpretation of a balanced and integrated life."}, {"text": "The prioritization of intellectual study and contemplation above all other activities.", "isCorrect": false, "rationale": "The Rule calls for a 'balanced rhythm of prayer, work, and reading,' not a prioritization of intellectual study above all else. 'Ora et Labora' specifically highlights prayer and work."}], "id": "q06"}, {"question": "When Benedict organized his followers at Subiaco into 'twelve small monasteries of twelve monks each,' this demonstrates his early approach to monastic community building by:", "options": [{"text": "Rejecting communal living in favor of isolated, small groups.", "isCorrect": false, "rationale": "While these were small groups, they still represent a form of communal living and organization, not a rejection of it. Benedict later founded a single larger monastery at Monte Cassino."}, {"text": "Emphasizing the importance of a single, centralized leadership structure from the outset.", "isCorrect": false, "rationale": "Organizing into 'twelve small monasteries' suggests a decentralized, perhaps experimental, approach initially, rather than a single, centralized structure, which came later with Monte Cassino as the motherhouse."}, {"text": "Attempting to manage communities on a smaller, more intimate scale after a negative experience with a larger, less disciplined group.", "isCorrect": true, "rationale": "This occurred after his initial negative experience where monks tried to poison him due to his 'strict discipline.' Forming smaller, more manageable communities of twelve monks suggests an adjustment to facilitate discipline and cohesion on a smaller scale."}, {"text": "Establishing a model for independent hermitages that would operate without any oversight.", "isCorrect": false, "rationale": "These were monasteries, implying community and a rule, not independent hermitages without oversight. Benedict's Rule is explicitly 'a practical handbook for living together in community under the authority of an abbot.'"}], "id": "q07"}, {"question": "Monte Cassino is described as being 'destroyed and rebuilt multiple times throughout history.' This detail primarily highlights:", "options": [{"text": "The inherent fragility of monastic life and its ultimate failure to withstand external pressures.", "isCorrect": false, "rationale": "The text implies the opposite: despite destruction, 'Each time, the monks returned and rebuilt,' demonstrating the resilience and enduring spirit of the community, not its fragility or failure."}, {"text": "The lack of strategic importance of the monastery, leading to its repeated abandonment.", "isCorrect": false, "rationale": "Its hilltop location suggests strategic importance, and the fact it was always rebuilt by the monks indicates it was never truly abandoned as an institution."}, {"text": "The remarkable resilience and enduring commitment of the Benedictine monastic tradition.", "isCorrect": true, "rationale": "The text states 'Each time, the monks returned and rebuilt,' which clearly illustrates the extraordinary resilience and unwavering commitment of the Benedictine community through centuries of adversity."}, {"text": "The changing architectural styles adopted by Benedictine monks over the centuries.", "isCorrect": false, "rationale": "While rebuilding might involve changing architectural styles, the text focuses on the fact of destruction and rebuilding, not on architectural changes. The primary takeaway is the endurance of the community."}], "id": "q08"}, {"question": "Which statement best describes the relationship between St. Benedict and St. Scholastica?", "options": [{"text": "St. Scholastica was Benedict's primary mentor in the monastic life.", "isCorrect": false, "rationale": "The text identifies St. Scholastica as Benedict's twin sister and a founder of a community of nuns. There is no indication she was his mentor; rather, they shared a spiritual path."}, {"text": "St. Scholastica served as the first abbess of Monte Cassino.", "isCorrect": false, "rationale": "St. Scholastica founded a community of nuns near Monte Cassino, but the text does not state she was the abbess of Monte Cassino itself, which was a monastery for men."}, {"text": "St. Scholastica, Benedict's twin sister, established a parallel community of nuns, indicating the Benedictine tradition included women from its inception.", "isCorrect": true, "rationale": "The text clearly states St. Scholastica was Benedict's 'twin sister' and 'established a community of women religious near Monte Cassino,' concluding that 'Her story reminds us that the Benedictine tradition from its very beginning included both monks and nuns.'"}, {"text": "St. Scholastica was a contemporary who fiercely criticized Benedict's Rule for its lack of severity.", "isCorrect": false, "rationale": "The text presents Scholastica as a close spiritual companion, not a critic. The story of their last meeting portrays a deep bond and shared spiritual focus, not opposition."}], "id": "q09"}, {"question": "Benedict humbly called his Rule 'a little rule for beginners.' This title, when considered alongside the Rule's enduring impact, suggests that:", "options": [{"text": "Benedict did not intend for the Rule to be adopted by experienced monastics or for long-term use.", "isCorrect": false, "rationale": "While he called it for 'beginners,' its widespread and enduring adoption for 15 centuries by countless monks and nuns suggests he created a foundational guide that was suitable for all stages of monastic life, and had long-term applicability."}, {"text": "Its simplicity and accessibility were key to its widespread adoption and adaptability across diverse communities.", "isCorrect": true, "rationale": "The 'little rule for beginners' implies a lack of complexity, which aligns with the Rule's noted characteristics of 'Moderation,' 'Practicality,' and 'Flexibility.' This accessibility and foundational nature made it suitable for a wide audience and adaptable over time, contributing to its enduring impact."}, {"text": "The Rule was primarily an introductory text intended to be replaced by more complex theological works.", "isCorrect": false, "rationale": "The Rule itself is not abstract theology but a practical guide. While it acknowledges it's 'only a beginning' in its final chapter for the spiritual journey, it was never intended to be replaced as the primary guide for monastic life itself."}, {"text": "Benedict doubted the Rule's effectiveness and its potential to shape Western civilization.", "isCorrect": false, "rationale": "The humility in the title does not equate to doubt about its effectiveness. Rather, it reflects a humble perspective on a work that proved profoundly effective and impactful in shaping Western civilization, as acknowledged by Pope Paul VI."}], "id": "q10"}, {"question": "The text notes that Benedict founded Monte Cassino on the site of an old pagan temple and grove. What does this detail suggest about the monastery's role in the 6th-century Italian landscape?", "options": [{"text": "Benedict chose the site for practical reasons — its elevation provided natural defense against raiders.", "isCorrect": false, "rationale": "While the hilltop location was strategically advantageous, the text specifically highlights the pagan temple and grove as what was displaced, pointing to a symbolic and spiritual significance beyond mere defense."}, {"text": "The monastery represented the replacement of an old religious order with a new Christian one, transforming a pagan site into a place of Christian worship.", "isCorrect": true, "rationale": "By establishing his monastery on the ruins of a pagan shrine, Benedict enacted the broader historical shift occurring across Italy: the old Roman religious order giving way to Christian monasticism as the new institutional anchor of spiritual life."}, {"text": "The ruins provided inexpensive building materials, reflecting Benedict's emphasis on poverty and economy.", "isCorrect": false, "rationale": "The text does not suggest Benedict chose the site for material economy. The symbolic displacement of pagan worship by Christian monasticism is the meaningful detail the text highlights."}, {"text": "Benedict wanted to demonstrate that Christian monks were superior warriors to pagan priests.", "isCorrect": false, "rationale": "The text emphasizes stability, prayer, and spiritual service — not military or competitive superiority — as the hallmarks of Benedictine life."}], "id": "q11"}, {"question": "The Rule of Saint Benedict explicitly states that it is 'nothing harsh, nothing burdensome.' How does this phrase encapsulate the key difference between Benedict's approach and the stricter ascetic traditions that preceded him?", "options": [{"text": "Earlier traditions demanded extreme physical mortification; Benedict replaced all asceticism with gentle communal charity.", "isCorrect": false, "rationale": "Benedict retained significant asceticism — obedience, manual labor, fasting, and structured prayer — but moderated its intensity. He did not abolish asceticism; he humanized it."}, {"text": "Earlier traditions were primarily eremitic; Benedict's contribution was simply to organize monks into groups.", "isCorrect": false, "rationale": "Cenobitic (communal) monasticism already existed through Pachomius and Basil. Benedict's distinctive contribution was the specific character of his Rule — its moderation and flexibility — not merely the idea of communal life."}, {"text": "Earlier traditions often demanded heroic asceticism that was unsustainable for ordinary people; Benedict's Rule created a framework that ordinary people could maintain faithfully for a lifetime.", "isCorrect": true, "rationale": "The text states Benedict 'had learned from the extremes of earlier monastic traditions' and chose moderation so that 'ordinary people could follow faithfully for an entire lifetime,' in contrast to the demanding Desert Father standards that few could sustain."}, {"text": "Earlier traditions imposed strict dietary laws; Benedict's Rule was notable for permitting wine and adequate sleep.", "isCorrect": false, "rationale": "While Benedict did allow wine and regulated sleep practically, the broader principle the text emphasizes is moderation across all dimensions of life, not just dietary rules. The 'nothing harsh' phrase signals a whole philosophy, not just a dietary policy."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
