<script>
var QUESTIONS = [{"question": "According to the introductory text, what is the primary nature and purpose of *The Voyage of Saint Brendan*?", "options": [{"text": "It is a detailed geographical account of Atlantic islands, intended as a navigational guide for medieval sailors.", "isCorrect": false, "rationale": "The text explicitly states, 'The Voyage is not a work of geography but of theology,' indicating its primary purpose is not navigational."}, {"text": "It is a theological parable of the Christian life, depicting a spiritual pilgrimage through wonders and dangers towards a heavenly homeland.", "isCorrect": true, "rationale": "The text clearly defines the Voyage as 'a work of theology... a parable of the Christian life — a pilgrimage through wonder and danger toward the heavenly homeland.'"}, {"text": "It is a historical biography of Saint Brendan, documenting his factual travels and the establishment of new monasteries.", "isCorrect": false, "rationale": "While based on Saint Brendan, the text emphasizes its theological and parabolic nature, not solely a factual historical account or monastic founding record."}, {"text": "It serves as an early medieval fantasy epic, designed to entertain with tales of mythical creatures and magical lands.", "isCorrect": false, "rationale": "While it contains wonders, the text's explicit classification as 'theology' and 'parable' places its purpose beyond mere entertainment or fantasy."}], "id": "q01"}, {"question": "On the Island of Sheep, what spiritual lesson is most directly conveyed by the monks' encounter with the extraordinarily large sheep and the mysterious man who provides for them?", "options": [{"text": "The importance of self-sufficiency and resourcefulness in remote locations.", "isCorrect": false, "rationale": "The monks are explicitly provided for by God through the sheep and by the mysterious man, diminishing the focus on their own self-sufficiency."}, {"text": "The necessity of observing strict ascetic practices even during feast days.", "isCorrect": false, "rationale": "The passage describes preparing for a feast and receiving 'pure food,' suggesting celebration rather than strict asceticism during this time."}, {"text": "God's boundless providence and care for His servants, particularly during significant religious observances.", "isCorrect": true, "rationale": "Saint Brendan states, 'Give thanks to God, for He hath provided us with food for the Paschal feast,' and the man brings 'pure food' for the 'holy and great solemnity,' directly illustrating divine provision."}, {"text": "The danger of relying on unknown figures for sustenance while on a sacred journey.", "isCorrect": false, "rationale": "Brendan accepts the man's provisions and blessing, indicating trust and acceptance of divine aid, not danger."}], "id": "q02"}, {"question": "The Crystal Pillar episode, with its towering height, silver-like net, and transparent sea, primarily functions to highlight which aspect of the Celtic monastic worldview?", "options": [{"text": "The practical challenges of navigation and survival in the vast Atlantic Ocean.", "isCorrect": false, "rationale": "While the ocean is a setting, the focus of this passage is on the 'great marvel' of the pillar and its divine origins, not practical navigation issues."}, {"text": "The Celtic monks' superior architectural and engineering skills in constructing sacred monuments.", "isCorrect": false, "rationale": "The pillar is described as a natural or miraculous formation, not something constructed by human hands or monks."}, {"text": "A deep sense of wonder and awe before God's creation, seen as filled with marvels that point to the Creator.", "isCorrect": true, "rationale": "The text explicitly states, 'The passage reveals the Celtic sense of wonder before God's creation — a world filled with marvels that point beyond themselves to their Creator,' directly matching this option."}, {"text": "The importance of scientific observation and measurement to understand natural phenomena.", "isCorrect": false, "rationale": "While Brendan measures the net opening, the primary reaction is one of wonder and divine praise ('tell of it to His praise and glory'), not scientific inquiry."}], "id": "q03"}, {"question": "In the Promised Land of the Saints, Brendan and his monks encounter a young man. What is the most significant role of this young man in the narrative?", "options": [{"text": "To challenge Brendan's faith and test his resolve to complete the pilgrimage.", "isCorrect": false, "rationale": "The young man offers blessings, explanations, and guidance, supporting Brendan's faith rather than challenging it."}, {"text": "To provide a detailed map and itinerary for Brendan's return journey to his homeland.", "isCorrect": false, "rationale": "He instructs Brendan to return and gather provisions but doesn't provide a map or detailed itinerary."}, {"text": "To explain the divine purpose of their journey, reveal their individual names, and prophesy future events.", "isCorrect": true, "rationale": "The young man embraces them 'calling each of them by his proper name,' explains 'The Lord Jesus Christ willed that thou shouldest not find it straightway,' and prophesies the land 'shall be made manifest unto those who come after thee, in the time of the persecution of the faithful.'"}, {"text": "To guide them across the great river, allowing them to explore the entire extent of the Promised Land.", "isCorrect": false, "rationale": "He explicitly tells Brendan, 'We cannot cross this river,' confirming their inability to cross, not facilitating it."}], "id": "q04"}, {"question": "Considering the progression of Saint Brendan's voyage, how does the discovery of the Promised Land of the Saints ultimately redefine the nature of his 'pilgrimage'?", "options": [{"text": "It marks the end of all spiritual struggle and the beginning of an eternal, earthly paradise for Brendan and his monks.", "isCorrect": false, "rationale": "Brendan is told his 'last pilgrimage draweth nigh,' implying his earthly life (pilgrimage) will soon end in death, not an eternal earthly paradise."}, {"text": "It signifies the literal finding of a new physical territory for the expansion of Celtic monasticism.", "isCorrect": false, "rationale": "The land is promised to be revealed 'after the passing of many ages' during a time of 'persecution,' indicating it's not for immediate monastic expansion."}, {"text": "It reveals the true 'heavenly homeland' that can only be briefly glimpsed in this life before the ultimate spiritual journey of death.", "isCorrect": true, "rationale": "The young man instructs Brendan to return because his 'day of thy last pilgrimage draweth nigh,' signifying that the true, final 'homeland' is reached through death, making this earthly glimpse a precursor."}, {"text": "It serves as a permanent base from which Brendan will continue his exploration of the ocean's wonders.", "isCorrect": false, "rationale": "Brendan is explicitly told to 'Return now to the land of thy birth' and that his final pilgrimage (death) is near, contradicting the idea of further exploration from this land."}], "id": "q05"}, {"question": "Which of the following best describes a recurring motif that symbolizes a boundary between the ordinary world and the sacred, hidden lands in *The Voyage of Saint Brendan*?", "options": [{"text": "The vastness of the Atlantic Ocean, emphasizing the physical challenge of the journey.", "isCorrect": false, "rationale": "While the ocean is vast, the text specifically identifies 'fog' as the symbol for the boundary between worlds, not the ocean itself in this context."}, {"text": "The presence of unusually large animals, indicating divine abundance in many places.", "isCorrect": false, "rationale": "Large animals signify abundance, but the text specifically calls out 'fog' as the symbol of the boundary to sacred lands."}, {"text": "A great fog, which obscures visibility before giving way to a new, illuminated sacred space.", "isCorrect": true, "rationale": "The text explicitly states regarding the Promised Land: 'there fell upon them a great fog... the fog symbolises the boundary between the ordinary world and the sacred, hidden land of God's promise.'"}, {"text": "The sight of crystal structures, signifying the miraculous power of God's creation.", "isCorrect": false, "rationale": "Crystal structures represent God's power and wonder, but 'fog' is specifically linked to the boundary to the sacred, hidden land."}], "id": "q06"}, {"question": "What is the primary significance of St. Columbanus's arrival in Gaul around 590, as described in the provided text?", "options": [{"text": "He introduced new agricultural techniques that revolutionized farming in the Vosges Mountains.", "isCorrect": false, "rationale": "The text does not mention agricultural techniques; it focuses on his religious and monastic impact."}, {"text": "He established a new political alliance between Irish monks and the Frankish rulers.", "isCorrect": false, "rationale": "The text highlights his religious discipline, not political alliances."}, {"text": "He brought the rigorous discipline of Irish monasticism to reform the disordered Frankish church.", "isCorrect": true, "rationale": "The text states, 'Columbanus brought the fierce discipline of Irish monasticism to the continent,' specifically addressing the 'considerable disorder' of the Frankish church."}, {"text": "He initiated a massive missionary effort to convert the remaining pagan tribes in Gaul.", "isCorrect": false, "rationale": "While he was a missionary monk, the text specifically emphasizes bringing monastic discipline to an already existing (albeit disordered) Frankish church, rather than converting pagans."}], "id": "q07"}, {"question": "The description of the crystal pillar mentions a 'wide-meshed net... of the colour of silver, yet it seemed harder than marble.' This detail, along with the pillar's immense height, contributes to the overall portrayal of God's creation as:", "options": [{"text": "Intricate and beautiful, but ultimately comprehensible through human reason.", "isCorrect": false, "rationale": "The pillar's summit is 'higher than the air, reaching as it were beyond the firmament itself,' suggesting it transcends full human comprehension, emphasizing wonder over mere reason."}, {"text": "Miraculous and awe-inspiring, possessing supernatural qualities beyond ordinary human understanding.", "isCorrect": true, "rationale": "The pillar's impossible height, the net's material properties (silver-colored yet harder than marble), and the crystal's clarity all point to a supernatural marvel that evokes awe and wonder, as directly stated in the preceding paragraph."}, {"text": "Primarily symbolic of the wealth and preciousness found in God's natural world.", "isCorrect": false, "rationale": "While 'silver' and 'marble' suggest value, the description emphasizes its inexplicable physical properties and immense scale as a 'great marvel' more than its preciousness."}, {"text": "A reflection of the advanced technological capabilities of the divine architect.", "isCorrect": false, "rationale": "The passage focuses on the spiritual wonder and God's power, not on 'technology' in a modern sense."}], "id": "q08"}, {"question": "After Brendan and his monks depart from the Island of Sheep, they are instructed to 'return hither at the same season in the year to come.' This instruction best illustrates which aspect of the monastic journey?", "options": [{"text": "The unpredictable and spontaneous nature of divine guidance on their pilgrimage.", "isCorrect": false, "rationale": "The instruction for a yearly return implies a predictable, recurring divine provision rather than spontaneous guidance."}, {"text": "The establishment of fixed, annual spiritual retreats at designated holy sites.", "isCorrect": true, "rationale": "Being told to return 'at the same season in the year to come' for the Paschal feast demonstrates the establishment of an annual, recurring visit to a divinely provided holy site for continued observance."}, {"text": "The temporary nature of all earthly provisions, requiring constant search for new resources.", "isCorrect": false, "rationale": "The promise of finding 'all things provided for you as before' contradicts the idea of constantly searching for new resources, instead highlighting reliable provision."}, {"text": "The importance of leaving offerings to the island's inhabitants as a gesture of gratitude.", "isCorrect": false, "rationale": "The text focuses on receiving provisions, not on the monks leaving offerings."}], "id": "q09"}, {"question": "Compare the overarching themes of *The Voyage of Saint Brendan* with the brief description of St. Columbanus's mission. Which statement accurately reflects a difference in their presented approaches to Celtic monasticism?", "options": [{"text": "Brendan's narrative emphasizes the strict adherence to disciplinary rules, while Columbanus's highlights spiritual exploration.", "isCorrect": false, "rationale": "Brendan's voyage is about spiritual exploration and divine wonders, while Columbanus's mission is explicitly about bringing 'fierce discipline' to the Frankish church."}, {"text": "Brendan's journey is characterized by a search for divine wonders and a heavenly homeland, whereas Columbanus focuses on institutional reform and discipline within existing churches.", "isCorrect": true, "rationale": "Brendan seeks the 'Promised Land of the Saints' and encounters 'wonders,' while Columbanus 'brought the fierce discipline of Irish monasticism to the continent' to address 'disorder' in the Frankish church, representing a clear difference in focus between exploration/wonder and institutional reform/discipline."}, {"text": "Both Brendan and Columbanus primarily sought to establish new, independent monastic communities in remote locations.", "isCorrect": false, "rationale": "Brendan's journey is a pilgrimage, not primarily for founding new monasteries. Columbanus founded Luxeuil, but his primary impact was bringing discipline to the Frankish church, not just founding remote communities."}, {"text": "Both accounts are primarily concerned with documenting the historical geography of their respective regions.", "isCorrect": false, "rationale": "The text explicitly states Brendan's voyage is 'not a work of geography but of theology,' and Columbanus's account is about monastic discipline, not geography."}], "id": "q10"}, {"question": "In the account of Columbanus's community at Luxeuil, Jonas of Bobbio describes monks who were ill yet obeyed Columbanus's command to thresh grain — and recovered — while the disobedient remained sick for an entire year. What does this episode most directly teach about Columbanus's theology of obedience?", "options": [{"text": "Physical healing was the primary purpose of obedience, making it a form of practical medicine in the monastery.", "isCorrect": false, "rationale": "The healing is presented as a miraculous consequence of obedience, not as the goal of obedience itself. Columbanus valued obedience as a spiritual virtue, not as therapy."}, {"text": "Obedience to the abbot, even when commands seem unreasonable, is a supreme monastic virtue whose exercise brings spiritual and even physical benefit.", "isCorrect": true, "rationale": "The text's footnote explains that for Columbanus, 'obedience to the abbot was the supreme monastic virtue. Instant, unquestioning obedience was expected — even when the command seemed unreasonable.' The miraculous recovery of the obedient monks and the prolonged illness of the disobedient dramatize this teaching."}, {"text": "The story shows that Columbanus performed miracles to reward personal loyalty to himself rather than to God.", "isCorrect": false, "rationale": "The text frames the episode in terms of obedience as a theological virtue and 'grace,' not as personal loyalty to Columbanus as an individual."}, {"text": "Columbanus taught that sick monks should always continue their duties to prevent weakness from becoming habitual.", "isCorrect": false, "rationale": "Columbanus actually told the obedient monks to 'cease and rest' after they demonstrated their obedience — the point is faith and submission, not a general policy about sick monks working."}], "id": "q11"}, {"question": "Jonas of Bobbio notes that when Columbanus arrived in Gaul, 'the Christian faith had almost departed from that country. The creed alone remained.' What does this description reveal about the state of Christianity in 6th-century Gaul?", "options": [{"text": "The Frankish Church had formally rejected Christianity and was reverting to paganism.", "isCorrect": false, "rationale": "Jonas says 'the creed alone remained,' indicating Christianity had not been rejected formally — the structure and belief persisted, but the lived practice had decayed."}, {"text": "Formal doctrinal belief survived, but the practical Christian life of prayer, penance, and virtue had largely collapsed.", "isCorrect": true, "rationale": "Jonas contrasts 'the creed' (formal belief) with the absence of 'the saving grace of penance and the longing to root out the lusts of the flesh,' indicating that external profession survived while interior spiritual life had nearly vanished."}, {"text": "The Frankish bishops had been killed in the Germanic invasions, leaving the Church without leadership.", "isCorrect": false, "rationale": "Jonas attributes the decay partly to 'the carelessness of the bishops,' implying they existed but had become lax, not that they had been eliminated."}, {"text": "The people of Gaul had converted to a heretical form of Christianity that denied the authority of Rome.", "isCorrect": false, "rationale": "No heresy is mentioned. The problem was moral and practical decay — worldliness and loss of penitential practice — not doctrinal deviance."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
