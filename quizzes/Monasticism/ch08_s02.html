<script>
var QUESTIONS = [{"question": "What is the primary question Bernard of Clairvaux seeks to address in his treatise 'On Loving God'?", "options": [{"text": "How can one achieve political influence through monastic discipline?", "isCorrect": false, "rationale": "Bernard's treatise focuses on spiritual theology and divine love, not political influence or monastic discipline as its primary aim, though he was a monastic leader."}, {"text": "What are the precise theological arguments for the existence of God?", "isCorrect": false, "rationale": "While related to God's nature, the treatise's core is 'why and how God should be loved,' building on the assumption of God's existence and goodness, rather than proving it axiomatically."}, {"text": "Why and how should God be loved by the human soul?", "isCorrect": true, "rationale": "The text explicitly states that Bernard asks 'Why should we love God? And how does love grow within the human soul?' as the central theme of 'On Loving God.'"}, {"text": "What are the historical origins and development of Cistercian monasticism?", "isCorrect": false, "rationale": "This question relates to the broader context of the Cistercians but is not the specific subject of Bernard's treatise 'On Loving God' as described in the passage."}], "id": "q01"}, {"question": "According to Bernard, what is the fundamental reason for loving God, and what is the appropriate measure of that love?", "options": [{"text": "The reason is for personal gain, and the measure is proportional to the blessings received.", "isCorrect": false, "rationale": "Bernard explicitly states that 'the reason for loving God is God Himself,' not primarily for personal gain, though benefits exist. The measure is 'immeasurable love,' not proportional."}, {"text": "The reason is divine command, and the measure is according to one's capacity to obey.", "isCorrect": false, "rationale": "While divine command is relevant, Bernard delves deeper into God's inherent loveliness and benefits as the reason. The measure is described as immeasurable, not limited by human capacity to obey."}, {"text": "The reason is God Himself, and the measure of love due to Him is immeasurable love.", "isCorrect": true, "rationale": "Bernard directly states this: 'I answer, the reason for loving God is God Himself; and the measure of love due to Him is immeasurable love.'"}, {"text": "The reason is the fear of eternal punishment, and the measure is just enough to avoid sin.", "isCorrect": false, "rationale": "Bernard's theology of divine love is centered on God's inherent goodness and His gifts, not on fear of punishment as the primary motivation for love. The measure is far beyond 'just enough to avoid sin.'"}], "id": "q02"}, {"question": "Bernard highlights God's love for 'enemies' as a significant aspect of His claim on our love. What does this specific point reveal about the nature of God's love as Bernard presents it?", "options": [{"text": "It demonstrates God's strategic patience, waiting for humanity to become worthy before offering salvation.", "isCorrect": false, "rationale": "The text states, 'When we were enemies, we were reconciled to God,' indicating God's love was active while humanity was still unworthy, not waiting for worthiness."}, {"text": "It illustrates that God's love is earned through acts of repentance and obedience.", "isCorrect": false, "rationale": "Bernard emphasizes that God 'loved us freely, and loved us while yet we were enemies,' implying His love is unmerited and not contingent on prior human action."}, {"text": "It underscores the gratuitous, unmerited, and self-sacrificial nature of divine love.", "isCorrect": true, "rationale": "Loving 'enemies' highlights that God's love is 'freely' given and 'unutterable,' implying it is unmerited by human worth and involves self-sacrifice (giving His Son), making it gratuitous."}, {"text": "It suggests that God's love is primarily for those who are suffering, as they are most in need.", "isCorrect": false, "rationale": "While God's love is for those in need, the emphasis on 'enemies' specifically speaks to the *unworthiness* of the recipients, not just their suffering, demonstrating the boundless nature of the love."}], "id": "q03"}, {"question": "Beyond the love shown through Christ, Bernard states that even 'unbelievers' are 'sufficiently admonished' to love God. What evidence does he offer for this claim?", "options": [{"text": "The inherent human desire for spiritual rituals and communal worship.", "isCorrect": false, "rationale": "Bernard speaks of natural law and 'innumerable benefits' discerned by the senses, like food, light, and air, as well as higher gifts like free-will and reason, not specifically a universal desire for rituals or communal worship."}, {"text": "The historical evidence of divine miracles recorded in ancient texts.", "isCorrect": false, "rationale": "Bernard grounds this argument in observable natural benefits and inherent human endowments ('natural law,' 'own endowments of soul and body'), not historical accounts of miracles for unbelievers."}, {"text": "The visible benefits of creation (food, light, air) and the higher gifts of human nature (dignity, wisdom, virtue).", "isCorrect": true, "rationale": "The text explicitly states that 'ingratitude is at once confounded by His innumerable benefits, lavished on our race, and plainly discerned by the senses' (food, light, air) and 'Man must seek in his own higher nature for the highest gifts; and these are dignity, wisdom and virtue.'"}, {"text": "The universal longing for a moral code and social justice across all cultures.", "isCorrect": false, "rationale": "While moral codes are often linked to human reason, Bernard specifically points to specific observable benefits and distinct human capacities (free-will, reason, desire for God) as the basis for loving God."}], "id": "q04"}, {"question": "Bernard identifies 'dignity,' 'wisdom,' and 'virtue' as man's 'highest gifts.' How does he describe the relationship between these three, particularly highlighting the potential danger of wisdom without virtue?", "options": [{"text": "Dignity is enhanced by wisdom, and virtue ensures that wisdom leads to self-glorification.", "isCorrect": false, "rationale": "Bernard argues that 'wisdom is harmful without virtue' because it can lead to 'self-glorying' if one does not acknowledge God as the source of gifts, which is the opposite of true glory."}, {"text": "Dignity is foundational, wisdom is the understanding of that dignity, and virtue is the application that prevents self-glory and gives glory to God.", "isCorrect": true, "rationale": "The text states 'dignity without wisdom is nothing worth; and wisdom is harmful without virtue.' It explains that wisdom without virtue leads to vain-glory ('glorying as if thou hadst not received it'), while virtue impels man 'to seek eagerly for Him who is man's Source' and 'glory in the Lord.'"}, {"text": "Wisdom is the primary gift, with dignity as its prerequisite and virtue as its natural consequence, irrespective of God.", "isCorrect": false, "rationale": "Bernard emphasizes that these gifts, especially wisdom and dignity, are 'not of us' but from God, and virtue is crucial to direct them towards God, not as an inevitable natural consequence apart from Him."}, {"text": "Virtue is an optional addition to dignity and wisdom, primarily for monks, not for all humanity.", "isCorrect": false, "rationale": "Bernard presents virtue as essential for all humanity to avoid 'vain-glory' and to properly direct the gifts of dignity and wisdom towards their divine Author, stating that 'wisdom without virtue is accursed.'"}], "id": "q05"}, {"question": "What is the consequence of man's ignorance of his 'own honor' or 'true glory' as described by Bernard?", "options": [{"text": "He becomes overly focused on intellectual pursuits, neglecting physical needs.", "isCorrect": false, "rationale": "The text states the opposite: 'he is led captive by his curiosity, and concerns himself with external, sensual things,' resembling 'the lower orders' or 'beasts that perish.'"}, {"text": "He gains true humility by recognizing his limitations and place in the universe.", "isCorrect": false, "rationale": "Ignorance of true glory leads to being 'confounded with them [beasts]' and losing proper self-understanding, which is antithetical to true humility rooted in knowing one's created nature."}, {"text": "He is compared to 'beasts that perish,' being led captive by curiosity and sensual desires, thus losing his distinct human dignity.", "isCorrect": true, "rationale": "The text says, 'Not knowing himself as the creature that is distinguished from the irrational brutes by the possession of reason, he commences to be confounded with them because, ignorant of his own true glory which is within, he is led captive by his curiosity, and concerns himself with external, sensual things.'"}, {"text": "He achieves a state of self-sufficiency, no longer needing to rely on divine gifts.", "isCorrect": false, "rationale": "This ignorance leads to a distorted self-perception and a focus on external things, which is a departure from, rather than an achievement of, true human fulfillment or self-sufficiency aligned with God."}], "id": "q06"}, {"question": "Bernard distinguishes between 'vain-glory' and 'true glory.' What is the key difference?", "options": [{"text": "Vain-glory is seeking recognition from others, while true glory is self-admiration.", "isCorrect": false, "rationale": "Vain-glory is not just about external recognition, but about *misattributing the source* of one's gifts. Self-admiration would also be a form of vain-glory if not directed to God."}, {"text": "Vain-glory involves glorying in one's possessions as if they were not received, whereas true glory is glorying 'in the Lord' as the source of all good.", "isCorrect": true, "rationale": "Bernard quotes I Cor. 4.7: 'Why dost thou glory as if thou hadst not received it?' and clarifies that true glory is 'in the Lord, that is, in the Truth.' The fault is in claiming ownership rather than recognizing the Giver."}, {"text": "Vain-glory is the pursuit of earthly achievements, while true glory is the pursuit of heavenly rewards.", "isCorrect": false, "rationale": "The distinction is not about the *type* of achievement (earthly vs. heavenly) but about the *source of the achievement* and where the glory is directed (self vs. God)."}, {"text": "Vain-glory applies only to those who are wealthy, while true glory is accessible to the poor.", "isCorrect": false, "rationale": "The concept of glorying in one's gifts applies to all individuals, regardless of their material wealth, as it concerns the spiritual attitude towards one's endowments."}], "id": "q07"}, {"question": "What is Bernard's unique contribution to Catholic mystical theology, as mentioned in the section's commentary?", "options": [{"text": "His emphasis on communal living and manual labor as the path to holiness.", "isCorrect": false, "rationale": "While Bernard was a Cistercian monk, his unique contribution highlighted here is specifically his 'four degrees of love,' not a general emphasis on communal living or labor, which were broader monastic principles."}, {"text": "His systematic presentation of the 'four degrees of love,' which outlines stages in the soul's journey toward God.", "isCorrect": true, "rationale": "The text explicitly states: 'The four degrees of love are Bernard's original contribution to Catholic mystical theology... moving from self-love through love of God to a state where even self-love is transformed.'"}, {"text": "His strong critique of papal authority and the hierarchical structure of the Church.", "isCorrect": false, "rationale": "Bernard was an influential figure within the Church and addressed a Cardinal Chancellor, but the text does not mention a critique of papal authority as his unique theological contribution here."}, {"text": "His innovative use of allegorical interpretations of scripture to explain complex doctrines.", "isCorrect": false, "rationale": "Bernard was a prolific writer, but the text specifically identifies the 'four degrees of love' as his unique contribution to mystical theology, not a specific exegetical method."}], "id": "q08"}, {"question": "In describing the 'four degrees of love,' Bernard characterizes the first degree as 'carnal love.' What is the primary characteristic of this stage, and how does it relate to human nature?", "options": [{"text": "It is a love for God based purely on intellectual understanding and theological reasoning.", "isCorrect": false, "rationale": "Carnal love is described as 'man loves himself first and selfishly,' stemming from 'nature's frailty and weakness' and 'necessity,' which is a natural, self-centered impulse, not primarily an intellectual pursuit of God."}, {"text": "It is the spontaneous love for all of creation, recognizing God's presence in nature.", "isCorrect": false, "rationale": "Carnal love is centered on the self ('man loves himself first and selfishly'), not primarily a broad love for creation, although appreciation for creation might be a later development."}, {"text": "It is a natural, self-centered love where man loves himself first out of necessity, which can become excessive if unchecked.", "isCorrect": true, "rationale": "The text states, 'nature is so frail and weak that necessity compels her to love herself first; and this is carnal love, wherewith man loves himself first and selfishly.' It also mentions if it 'grow excessive' it overflows into 'voluptuousness.'"}, {"text": "It is a love directed towards one's family and community, prioritizing their needs over one's own.", "isCorrect": false, "rationale": "While 'love thy neighbor as thyself' is introduced as a 'curb' for excessive self-love, the *first degree* itself is 'carnal love' focused on the self due to necessity, not yet extended to others as a primary characteristic."}], "id": "q09"}, {"question": "Bernard introduces the commandment 'Thou shalt love thy neighbor as thyself' as a 'curb' for the first degree of carnal love. What does this 'curb' primarily aim to prevent?", "options": [{"text": "The complete suppression of all natural human desires and affections.", "isCorrect": false, "rationale": "The curb is to prevent *excessive* self-love and its overflow into 'voluptuousness,' not to suppress all natural desires, as 'No man ever yet hated his own flesh' is acknowledged."}, {"text": "The development of any form of self-love, considering it inherently sinful.", "isCorrect": false, "rationale": "Bernard acknowledges that 'nature compels her to love herself first' out of necessity, and 'No man ever yet hated his own flesh.' The problem is *excessive* self-love, not self-love itself."}, {"text": "The natural and necessary self-love from becoming excessive and leading to selfish indulgence or 'voluptuousness.'", "isCorrect": true, "rationale": "The text explains, 'if, as is likely, this same love should grow excessive and, refusing to be contained within the restraining banks of necessity, should overflow into the fields of voluptuousness, then a command checks the flood, as if by a dike: 'Thou shalt love thy neighbor as thyself.''"}, {"text": "The neglect of one's spiritual duties in favor of worldly pursuits.", "isCorrect": false, "rationale": "While related to spiritual life, the immediate context of the 'curb' is specifically the management of self-love to prevent it from becoming 'excessive' or 'voluptuous,' rather than a general neglect of duties."}], "id": "q10"}, {"question": "Bernard opens 'On Loving God' by stating the reason for loving God is 'God Himself.' How does this opening move set the entire theological direction of the treatise apart from more typical moral or pragmatic arguments for religious observance?", "options": [{"text": "It removes the role of human reason entirely, insisting that love of God must be purely emotional and beyond rational justification.", "isCorrect": false, "rationale": "Bernard proceeds to give reasons drawn from reason and natural observation. His point is not that love is irrational but that its ultimate ground is God's own nature, not a reward or benefit for the lover."}, {"text": "By grounding love in God's own nature rather than in human interest, Bernard defines love of God as inherently selfless — an orientation toward another rather than a means of securing one's own advantage.", "isCorrect": true, "rationale": "Arguments that love God because He will reward you, or to avoid punishment, or even to become virtuous, ultimately make the self the reference point. Bernard's move — the reason is God — redirects the question entirely: God is worthy of love because of who He is, not because of what He does for us. This grounds the treatise in a theology of charity rather than self-interest."}, {"text": "It indicates that Bernard believed the existence of God was self-evident and needed no argument, unlike his contemporaries who debated the matter.", "isCorrect": false, "rationale": "Bernard's opening is about the reason for *love*, not about proving God's existence. He assumes the reader knows who God is and asks why and how that God should be loved."}, {"text": "It reveals that Bernard considered all other Scholastic arguments about God to be philosophically inferior to his mystical approach.", "isCorrect": false, "rationale": "Bernard was engaged in theological controversy with Scholastics like Abelard, but his opening in this treatise is a positive statement about love, not a polemic against Scholastic method."}], "id": "q11"}, {"question": "Bernard argues that 'unbelievers' already have sufficient grounds to love God through natural reason alone. What does this argument imply about the relationship between grace, nature, and the obligation to love?", "options": [{"text": "It implies that grace is unnecessary for salvation because natural reason alone can bring a person to full love of God.", "isCorrect": false, "rationale": "Bernard's argument is about the *obligation* to love God, not about sufficiency for salvation. His four degrees show that the highest degrees of love require grace, not merely reason."}, {"text": "It implies that the obligation to love God is universal and grounded in the natural order itself — that creation already communicates God's goodness to any person capable of reason.", "isCorrect": true, "rationale": "By pointing to food, light, and air as God's gifts visible to all, Bernard is appealing to what Catholic tradition calls natural revelation. Every person, regardless of explicit faith, is surrounded by evidence of God's generosity — which creates a natural obligation of gratitude and love."}, {"text": "It implies that Bernard believed all world religions were equally valid paths to God, since all could discern His gifts through reason.", "isCorrect": false, "rationale": "Bernard is making an argument about obligation and gratitude, not about the equivalence of religious traditions. His treatise is thoroughly Christocentric in its higher degrees of love."}, {"text": "It implies that grace is only needed for those who have already accepted the full Christian faith, while nature suffices for everyone else.", "isCorrect": false, "rationale": "This inverts the logic: Bernard uses the argument about unbelievers to show the breadth of the obligation, not to limit where grace is needed. Grace elevates and perfects nature; it is not a substitute reserved only for converts."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
