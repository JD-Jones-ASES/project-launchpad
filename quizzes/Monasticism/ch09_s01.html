<script>
var QUESTIONS = [{"question": "Martin Luther argued against monastic vows primarily because he believed they:", "options": [{"text": "Were incompatible with papal authority and tradition.", "isCorrect": false, "rationale": "While Luther did reject papal authority, his primary theological argument against monastic vows, as stated in the text, focused on their inability to earn salvation and their conflict with Christian freedom, not directly their incompatibility with papal tradition."}, {"text": "Were a human invention that could not earn salvation and conflicted with Christian freedom.", "isCorrect": true, "rationale": "The text explicitly states: 'Luther argued that monastic vows were contrary to Christian freedom — that the vows of poverty, chastity, and obedience could not earn salvation, and that the monastic life was a human invention, not a divine command.'"}, {"text": "Led to widespread corruption and moral decay within the Church.", "isCorrect": false, "rationale": "Although corruption was a broader critique during the Reformation, the text highlights Luther's specific theological arguments against the *purpose* and *nature* of monastic vows themselves (not earning salvation, human invention, against Christian freedom)."}, {"text": "Required an excessive commitment to poverty, chastity, and obedience.", "isCorrect": false, "rationale": "Luther's objection was not to the degree of commitment, but to the theological premise that such vows could contribute to salvation or were divinely commanded, viewing them instead as a human invention contrary to Christian freedom."}], "id": "q01"}, {"question": "King Henry VIII's Dissolution of the Monasteries in England (1536-1541) was motivated by:", "options": [{"text": "A deep theological conviction mirroring Martin Luther's views on monastic vows.", "isCorrect": false, "rationale": "The text clarifies that 'The Dissolution was motivated as much by the Crown's desire for monastic wealth as by any theological conviction,' indicating that financial and political reasons were at least as significant as, if not more than, purely theological ones."}, {"text": "His desire for monastic wealth to fund wars and reward political allies.", "isCorrect": true, "rationale": "The text explicitly states that 'The Dissolution was motivated as much by the Crown's desire for monastic wealth as by any theological conviction. The seized properties funded Henry's wars and rewarded his political allies.'"}, {"text": "The unanimous support of the English clergy for the suppression of religious orders.", "isCorrect": false, "rationale": "The text does not mention unanimous support from the clergy; historical context suggests significant opposition and coercion."}, {"text": "A direct command from the Council of Trent to reform English monasticism.", "isCorrect": false, "rationale": "The Council of Trent was a Catholic response to the Reformation, reaffirming and reforming monasticism, not suppressing it. Furthermore, Henry VIII had already broken with Rome by this time."}], "id": "q02"}, {"question": "Which of the following best distinguishes the impact of the Protestant Reformation from that of the French Revolution on European monasticism?", "options": [{"text": "The Reformation primarily led to the intellectual critique of monasticism, while the Revolution resulted in its physical destruction.", "isCorrect": false, "rationale": "The Reformation also led to widespread physical destruction and suppression of monasteries in Protestant territories, not just intellectual critique."}, {"text": "The Reformation suppressed monasticism mainly in Protestant lands, whereas the French Revolution sought to destroy it in Catholic Europe.", "isCorrect": true, "rationale": "The text states: 'If the Reformation dealt a heavy blow to monasticism in Protestant lands, the French Revolution nearly destroyed it in Catholic Europe as well,' clearly delineating their primary spheres of destructive influence."}, {"text": "The Reformation resulted in the destruction of libraries, while the Revolution focused on confiscating land.", "isCorrect": false, "rationale": "Both periods involved the confiscation of monastic property (including land) and the destruction or scattering of libraries and cultural heritage."}, {"text": "The Reformation led to a complete end of monasticism, while the Revolution initiated its revival.", "isCorrect": false, "rationale": "Monasticism survived and even flourished in Catholic lands after the Reformation, and the French Revolution was a period of devastation for monasticism, not its revival."}], "id": "q03"}, {"question": "The Council of Trent (1545–1563) contributed significantly to the survival and renewal of monasticism in Catholic lands by:", "options": [{"text": "Encouraging a relaxing of monastic rules to attract more vocations.", "isCorrect": false, "rationale": "The Council of Trent did the opposite, 'insisting on strict enclosure, regular observance, and the proper formation of novices' to renew discipline."}, {"text": "Insisting on strict enclosure, regular observance, and proper formation of novices.", "isCorrect": true, "rationale": "The text states: 'The Council of Trent issued decrees on the reform of religious orders in its twenty-fifth session (1563), insisting on strict enclosure, regular observance, and the proper formation of novices.'"}, {"text": "Advocating for the integration of monks and nuns into secular society.", "isCorrect": false, "rationale": "The emphasis on 'strict enclosure' indicates a focus on maintaining separation from secular society, not integration."}, {"text": "Shifting the focus of monastic life from contemplation to active ministry.", "isCorrect": false, "rationale": "While the Counter-Reformation saw the rise of new active orders, the Council's decrees for existing monastic orders focused on renewing traditional contemplative practices and discipline."}], "id": "q04"}, {"question": "The Civil Constitution of the Clergy, passed by the French Revolutionary government in 1790, had which of the following immediate effects on monasticism in France?", "options": [{"text": "It promoted the foundation of new monastic orders loyal to the state.", "isCorrect": false, "rationale": "The decree 'suppressed all religious orders,' rather than promoting new ones."}, {"text": "It dissolved all religious orders and confiscated monastic property.", "isCorrect": true, "rationale": "The text explicitly states that the Civil Constitution of the Clergy 'suppressed all religious orders and confiscated monastic property.'"}, {"text": "It required monks and nuns to swear an oath of loyalty to the Pope.", "isCorrect": false, "rationale": "The decree required clergy to 'swear loyalty to the state,' not to the Pope, whom the Revolutionary government opposed."}, {"text": "It initiated a period of monastic reform similar to the Council of Trent.", "isCorrect": false, "rationale": "The actions of the French Revolution were destructive and suppressive, leading to the near-destruction of monasticism, not a reform in the Church's sense."}], "id": "q05"}, {"question": "The text uses the destruction of the great abbey of Cluny, 'sold as a quarry' during the French Revolution, as a potent example to illustrate:", "options": [{"text": "The economic benefits reaped by the French state from nationalizing Church property.", "isCorrect": false, "rationale": "While the state did gain economically, the text's description of Cluny as 'once the center of European monasticism' and its near-complete disappearance ('only a small portion... survived') emphasizes the profound cultural and historical loss, not primarily economic gain."}, {"text": "The profound and irreversible material and cultural destruction inflicted upon European monasticism by the French Revolution.", "isCorrect": true, "rationale": "The text highlights Cluny's historical significance as 'the center of European monasticism' and the largest church, and then details its complete dismantling, serving as a stark example of the widespread destruction."}, {"text": "The willingness of French monks to adapt to secular life after the Revolution.", "isCorrect": false, "rationale": "The text mentions monks and nuns being 'forced to leave their monasteries' and those refusing being 'imprisoned or executed,' indicating coercion, not willingness."}, {"text": "The rise of new architectural styles that rendered medieval structures obsolete.", "isCorrect": false, "rationale": "The destruction was ideologically and politically motivated, not due to architectural trends or obsolescence."}], "id": "q06"}, {"question": "Dom Prosper Guéranger played a pivotal role in the nineteenth-century monastic revival by:", "options": [{"text": "Leading the re-establishment of the ancient abbey of Monte Cassino.", "isCorrect": false, "rationale": "While Monte Cassino was restored, Guéranger's specific contribution was to Solesmes, not Monte Cassino."}, {"text": "Founding the Beuron Archabbey as a center for sacred art.", "isCorrect": false, "rationale": "The Beuron Archabbey was founded in 1863 as a center for liturgical renewal and sacred art, but it was not founded by Dom Prosper Guéranger."}, {"text": "Refounding the Abbey of Solesmes and dedicating it to the restoration of Benedictine life and Gregorian chant.", "isCorrect": true, "rationale": "The text states: 'In France, Dom Prosper Guéranger... refounded the Abbey of Solesmes in 1833, dedicating it to the restoration of the Benedictine life and, above all, to the revival of Gregorian chant.'"}, {"text": "Promoting the translation of Latin liturgy into vernacular languages.", "isCorrect": false, "rationale": "Guéranger was a proponent of Gregorian chant, which is traditionally in Latin, implying a focus on preserving, not translating, the Latin liturgical tradition."}], "id": "q07"}, {"question": "The nineteenth-century monastic revival, as described in the text, was primarily characterized by:", "options": [{"text": "A complete abandonment of traditional monastic practices in favor of modern forms.", "isCorrect": false, "rationale": "The text describes a 'restoration' and 'revival' of Benedictine life, Gregorian chant, and liturgical renewal, indicating a return to traditional forms rather than an abandonment."}, {"text": "The re-establishment of communities and a renewed focus on liturgical and contemplative life.", "isCorrect": true, "rationale": "The examples provided (Solesmes and Gregorian chant, Monte Cassino's restoration, Beuron's liturgical renewal, re-establishment in England) all point to a focus on rebuilding monastic life and its traditional spiritual practices."}, {"text": "A shift towards active missionary work as the primary charism of all orders.", "isCorrect": false, "rationale": "While missionary work is important in the Church, the examples given for the monastic revival focus on contemplative and liturgical practices, such as chant and Benedictine life, not primarily missionary activity."}, {"text": "The suppression of smaller communities to consolidate wealth and power.", "isCorrect": false, "rationale": "The nineteenth-century was a period of rebuilding and re-establishment, reversing the suppressions of previous centuries, not continuing them."}], "id": "q08"}, {"question": "The Second Vatican Council's decree Perfectae Caritatis (1965) called religious orders to a 'twofold renewal,' which meant:", "options": [{"text": "A return to stricter asceticism and an increased emphasis on missionary activity.", "isCorrect": false, "rationale": "While some communities chose stricter observance or engaged in missionary work, the 'twofold renewal' is specifically defined as a return to original inspiration and adaptation to modern conditions."}, {"text": "A simultaneous return to the original inspiration of their founders and an adaptation to the changed conditions of the modern world.", "isCorrect": true, "rationale": "The text quotes Perfectae Caritatis 2: 'The appropriate renewal of religious life involves two simultaneous processes: (1) a continuous return to the sources of all Christian life and to the original inspiration behind a given community and (2) an adjustment of the community to the changed conditions of the times.'"}, {"text": "A rejection of traditional forms of worship and an embrace of secular practices.", "isCorrect": false, "rationale": "The renewal involved adaptation, but not a rejection of tradition; some communities preserved Latin chant, while others embraced the vernacular, showing diverse adaptations, not outright rejection."}, {"text": "A uniform application of new rules across all orders to standardize religious life.", "isCorrect": false, "rationale": "The text notes that 'Some communities embraced the vernacular... others chose to preserve the Latin chant... Some relaxed external practices; others returned to stricter observance,' indicating diverse, not uniform, applications of the renewal."}], "id": "q09"}, {"question": "The concept of the 'universal call to holiness,' emphasized by the Second Vatican Council (Lumen Gentium Chapter V), relates to monasticism by:", "options": [{"text": "Suggesting that monastic life is no longer a necessary path to sanctity.", "isCorrect": false, "rationale": "The text explicitly states that this teaching 'did not diminish the special vocation of religious life' and reaffirmed the contemplative life's 'full value'."}, {"text": "Diminishing the unique value of the contemplative life in favor of lay spirituality.", "isCorrect": false, "rationale": "The text clarifies that it 'did not diminish the special vocation of religious life' but placed it in a broader context."}, {"text": "Placing the special vocation of religious life within the broader context of all Christians being called to pursue sanctity.", "isCorrect": true, "rationale": "The text explains: 'This teaching... did not diminish the special vocation of religious life but placed it within the broader context of the Church's mission. Monks and nuns live the call to holiness in a particularly radical way — but every baptized person shares in that same call.'"}, {"text": "Requiring monks and nuns to leave their cloisters to engage directly in the world.", "isCorrect": false, "rationale": "Perfectae Caritatis encouraged contemplative communities to 'remain faithful to their calling,' which implies their traditional cloistered life, while adapting wisely."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
