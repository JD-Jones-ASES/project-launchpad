<script>
var QUESTIONS = [{"question": "According to Bernard's 'Four Degrees of Love,' at which stage does the soul begin to love God primarily for who He is, rather than for what He provides?", "options": [{"text": "Love of self for self's sake", "isCorrect": false, "rationale": "This is the initial stage where love is entirely self-centered, focused on personal needs and desires, not yet recognizing God's inherent goodness."}, {"text": "Love of God for self's sake", "isCorrect": false, "rationale": "In this stage, the soul turns to God for help or comfort during suffering, but the motivation is still what God can do for the individual, not His intrinsic worth."}, {"text": "Love of God for God's sake", "isCorrect": true, "rationale": "This degree marks a 'profound transformation' where the soul recognizes God's inherent goodness, beauty, and truth, loving Him simply because of who He is, moving from self-centeredness to God-centeredness."}, {"text": "Love of self for God's sake", "isCorrect": false, "rationale": "This is the final and rarest degree, where the self is loved only in God and for God's sake, indicating a complete union of wills, far beyond loving God for His inherent qualities."}]}, {"question": "Bernard compares the fourth degree of love, 'Love of self for God's sake,' to 'a drop of water dissolved in wine.' What does this analogy primarily illustrate about the self in this final stage?", "options": [{"text": "The self is completely destroyed and ceases to exist.", "isCorrect": false, "rationale": "The text explicitly states that 'the water does not cease to exist,' meaning the self is not destroyed, but transformed and united."}, {"text": "The self maintains its distinct identity, separate from God's will.", "isCorrect": false, "rationale": "The analogy suggests the water 'takes on the color, taste, and character of the wine,' implying a loss of distinctness and a perfect union, not separation."}, {"text": "The self is entirely caught up in God's love, with its will perfectly united to God's.", "isCorrect": true, "rationale": "The analogy means the self (water) is integrated into God (wine), taking on God's character and having its will perfectly aligned with God's, without conflict."}, {"text": "The self becomes superior to God, influencing His divine will.", "isCorrect": false, "rationale": "This option is contrary to the theological understanding presented, where the human will submits to and unites with God's, not influences it as superior."}]}, {"question": "Which of the following best encapsulates Bernard's perspective on the 'Four Degrees of Love' as a path to spiritual growth?", "options": [{"text": "It is a rigid, linear ladder that, once climbed, guarantees permanent spiritual perfection.", "isCorrect": false, "rationale": "The text explicitly states it is 'not a ladder to be climbed once and for all' and that 'even the greatest saints experience moments of selfishness, distraction, and struggle.'"}, {"text": "It is a fluid and dynamic journey, involving constant movement, falling back, and pressing forward, with the soul's direction being key.", "isCorrect": true, "rationale": "Bernard emphasizes 'constant movement — falling back, beginning again, pressing forward' and that 'what matters is the direction of the soul's desire: is it turning toward God or away from Him?'"}, {"text": "It is a theoretical framework primarily for academic study, with little relevance to lived experience.", "isCorrect": false, "rationale": "Bernard's theology is deeply rooted in 'experience' and aims to describe the 'human soul grows toward God,' making it highly relevant to lived spiritual life."}, {"text": "It applies only to monks and is not a vision for every Christian's spiritual journey.", "isCorrect": false, "rationale": "The text states the vision 'remains the goal — the horizon toward which the monk, and indeed every Christian, is always traveling,' indicating universal applicability."}]}, {"question": "Bernard's 'bridal mysticism' is described as using imagery from the Song of Songs to depict the soul's relationship with God. What is the core characteristic of this relationship that Bernard emphasizes through this imagery?", "options": [{"text": "A purely intellectual relationship, focused on divine wisdom and theological argumentation.", "isCorrect": false, "rationale": "Bernard's mysticism, especially bridal mysticism, emphasizes encounter and love over pure intellect, contrasting with a purely intellectual relationship."}, {"text": "A relationship of strict obedience and command, mirroring a lord-vassal dynamic.", "isCorrect": false, "rationale": "The text states it is 'not merely one of obedience and command' but 'a relationship of love — passionate, intimate, and transforming.'"}, {"text": "An intimate, passionate, and transforming relationship of love, where God desires the human heart.", "isCorrect": true, "rationale": "Bernard's bridal mysticism uses romantic love imagery to highlight the 'passionate, intimate, and transforming' nature of God's love for the soul, stressing that 'He desires our hearts.'"}, {"text": "A detached, objective relationship, requiring emotional distance for true understanding.", "isCorrect": false, "rationale": "The imagery of the Song of Songs and the emphasis on passion and intimacy directly contradict the idea of a detached or emotionally distant relationship."}]}, {"question": "What is the meaning and significance of Bernard's phrase, 'Amor ipse intellectus est'?", "options": [{"text": "Only intellectual argument can lead to true knowledge of God.", "isCorrect": false, "rationale": "The phrase means 'Love itself is a form of knowing,' and the text clarifies it implies love takes us further than reason alone, not that only reason is valid."}, {"text": "Love itself is a form of knowing, suggesting that the deepest truths about God are known through experience and love, not intellect alone.", "isCorrect": true, "rationale": "This directly matches the explanation in the 'keyconcept' box: '“Love itself is a form of knowing.” This phrase captures Bernard's conviction that the deepest truths about God are known not through the intellect alone but through the experience of love.'"}, {"text": "Intellectual study is worthless if it does not involve philosophical reasoning.", "isCorrect": false, "rationale": "Bernard did not reject intellectual study; he was learned and his arguments were reasoned. The point is not worthlessness, but that love goes beyond."}, {"text": "God's love is too complex for human understanding or experience.", "isCorrect": false, "rationale": "Bernard emphasizes that God 'communicates Himself to the soul through experience, and that this experience is a genuine form of knowledge,' directly contradicting this option."}]}, {"question": "Bernard's Apologia to Abbot William criticized Cluniac monasteries primarily for their architectural splendor and elaborate ornamentation. What was the theological basis for Bernard's critique?", "options": [{"text": "He believed elaborate art was inherently sinful and forbidden by scripture.", "isCorrect": false, "rationale": "Bernard's critique was not that art was inherently sinful, but that it was inappropriate for monks vowed to poverty and simplicity, and that it distracted from prayer."}, {"text": "He thought Cluniac art was aesthetically displeasing and poorly executed.", "isCorrect": false, "rationale": "While he used terms like 'deformed beauty,' his criticism was primarily theological and spiritual, not merely aesthetic judgment of quality. He saw it as a distraction."}, {"text": "He argued that such ornamentation distracted monks from inward prayer and was inconsistent with their vows of poverty and simplicity.", "isCorrect": true, "rationale": "Bernard asked, 'if monks have left the world to seek God in poverty and simplicity, why do their churches drip with gold?' He argued these things 'distract the soul from prayer' and 'feed the eyes when the eyes should be turned inward, toward God.'"}, {"text": "He advocated for a complete rejection of all physical structures for worship, favoring outdoor prayer.", "isCorrect": false, "rationale": "Cistercians built churches, albeit simple ones. Bernard's argument was for architectural simplicity, not the rejection of structures entirely."}]}, {"question": "According to the text, how did Bernard's view on theological knowledge differ from a purely intellectual or philosophical approach?", "options": [{"text": "Bernard completely rejected intellectual study and philosophical reasoning as useless for knowing God.", "isCorrect": false, "rationale": "The text states, 'This did not mean that Bernard rejected intellectual study. He was, after all, one of the most learned men of his century.' He valued reason but saw its limits."}, {"text": "Bernard believed that knowing God was primarily a matter of intellectual argument, with little room for personal experience.", "isCorrect": false, "rationale": "The text states, 'knowing God was not primarily a matter of intellectual argument or philosophical reasoning. It was a matter of encounter — of tasting and seeing that the Lord is good.'"}, {"text": "Bernard insisted that while intellectual study was valuable, the deepest truths about God are known through lived experience and love, which takes one further than reason alone.", "isCorrect": true, "rationale": "The text explains 'Amor ipse intellectus est' and states that 'he insisted that the goal of all study and all theology was not merely to know about God but to know God — to enter into a living, loving relationship with the Creator.'"}, {"text": "Bernard argued that knowledge of God could only be attained through divine revelation, bypassing human intellect and experience entirely.", "isCorrect": false, "rationale": "While he believed in divine communication, he emphasized 'experience' as a 'genuine form of knowledge,' which is a human faculty, not an entire bypass."}]}, {"question": "The Cistercian emphasis on 'taste, touch, and feeling' in describing the spiritual life is presented not as mere sentimentality but as a serious theological claim. What is the essence of this claim?", "options": [{"text": "That God can only be understood through physical sensations, not through mental processes.", "isCorrect": false, "rationale": "The emphasis is on experiential knowledge complementing, not replacing, other forms of understanding, and it's spiritual 'taste' and 'feeling,' not exclusively physical."}, {"text": "That God communicates Himself to the soul through direct experience, and this experience is a genuine form of knowledge.", "isCorrect": true, "rationale": "The text states, 'This is not sentimentality. It is a serious theological claim: that God communicates Himself to the soul through experience, and that this experience is a genuine form of knowledge.'"}, {"text": "That emotional states are the sole determinant of a person's spiritual standing.", "isCorrect": false, "rationale": "While experience is important, the text does not claim emotional states are the *sole* determinant, but rather a way God communicates knowledge."}, {"text": "That abstract theological concepts are irrelevant without a strong emotional component.", "isCorrect": false, "rationale": "Bernard did not reject abstract concepts; he integrated them with experience, emphasizing that the goal was to 'know God' not just 'know about God.'"}]}, {"question": "Bernard of Clairvaux's theological contributions, including his 'Four Degrees of Love' and bridal mysticism, have had a lasting impact on the Catholic Church. Which of the following is true regarding his recognition and legacy?", "options": [{"text": "He was a significant figure during his lifetime but his theology quickly faded after his death.", "isCorrect": false, "rationale": "The text states his theology 'have influenced virtually every Catholic mystic who came after him' and his writings are 'still read, studied, and prayed with today,' indicating a lasting influence."}, {"text": "He was declared a Doctor of the Church, and his writings remain a living source of spiritual wisdom, influencing subsequent mystics and the Cistercian order.", "isCorrect": true, "rationale": "The text explicitly states 'The Catholic Church recognizes Bernard as a Doctor of the Church' and notes his influence on 'virtually every Catholic mystic' and the continued flourishing of the Cistercian order."}, {"text": "His primary legacy is his role in the Crusades, with his theology being a minor aspect of his historical importance.", "isCorrect": false, "rationale": "While Bernard was involved in the Crusades, the section focuses entirely on his spiritual theology as his primary contribution and lasting legacy."}, {"text": "His mystical theology was rejected by later Catholic traditions as too unconventional.", "isCorrect": false, "rationale": "The text clearly states he 'influenced virtually every Catholic mystic who came after him,' contradicting the idea of his theology being rejected."}]}, {"question": "While criticizing Cluniac excesses, Bernard's Apologia to Abbot William clarifies an important nuance. What was this nuance concerning his criticism of Cluniac practices?", "options": [{"text": "He only condemned Cluniac practices if they were not financially profitable for the monastery.", "isCorrect": false, "rationale": "Bernard's criticism was theological and spiritual, centered on distraction and inconsistency with vows, not financial profitability."}, {"text": "He believed Cluniac practices were appropriate for secular clergy but not for any monks.", "isCorrect": false, "rationale": "The text states he 'did not condemn Cluniac practices for all monks — only that they were not appropriate for monks who had vowed the strictest poverty.'"}, {"text": "He did not condemn Cluniac practices for all monks, but only for those who had vowed the strictest poverty, implying different legitimate monastic approaches.", "isCorrect": true, "rationale": "The 'caution' box states, 'Bernard himself said that he did not condemn Cluniac practices for all monks — only that they were not appropriate for monks who had vowed the strictest poverty. The two traditions represent different but legitimate approaches.'"}, {"text": "His criticism was merely a personal preference, not a theological statement about monastic life.", "isCorrect": false, "rationale": "The text emphasizes his argument was 'not merely aesthetic. It was theological,' indicating it was far more than a personal preference."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
