<script>
var QUESTIONS = [{"question": "The rise of new monastic movements like the Carthusians in the 11th century was primarily a response to which prevailing trend in the monastic landscape?", "options": [{"text": "The widespread decline of traditional monastic orders across Europe.", "isCorrect": false, "rationale": "The text states that 'hundreds of monasteries flourished under Cluny's influence,' indicating success, not a widespread decline, though some sought an alternative path from this success."}, {"text": "A call for monks to engage more actively in secular politics and administration.", "isCorrect": false, "rationale": "The reforms of the 11th century, including Pope Gregory VII's efforts, sought to free the Church from secular control, and movements like the Carthusians sought greater spiritual focus, not secular engagement."}, {"text": "A reaction against the perceived luxury and elaborate rituals that had come to characterize successful monastic institutions like Cluny.", "isCorrect": true, "rationale": "The text explicitly states that 'Some monks began to ask whether the splendor of Cluny — the long hours of elaborate chant, the sumptuous vestments, the grand architecture — had drawn them away from the simplicity and silence that the Desert Fathers had prized above all else.' This precisely describes the impetus for new, more austere movements."}, {"text": "A desire to centralize monastic authority under a single, powerful abbot.", "isCorrect": false, "rationale": "While centralizing reforms existed (like Cluny's), the Carthusians, in contrast, specifically had a 'prior' whose authority touched the monks' daily routine 'far less than an abbot's would in a Benedictine house,' emphasizing individual solitude."}]}, {"question": "Before founding the Carthusian order, St. Bruno was a highly respected figure in the ecclesiastical world, primarily known for his role as:", "options": [{"text": "An influential papal advisor in Rome.", "isCorrect": false, "rationale": "Bruno was indeed summoned to Rome by Pope Urban II as an advisor later in his life (1090), but this was after he had already founded the Grande Chartreuse, not his initial primary role."}, {"text": "The Archbishop of Cologne, his birthplace.", "isCorrect": false, "rationale": "Bruno declined the Pope's offer of the archbishopric of Reggio Calabria, never serving as an archbishop."}, {"text": "The head of the prestigious cathedral school of Reims, teaching theology and philosophy.", "isCorrect": true, "rationale": "The text clearly states: 'He was educated at the cathedral school of Reims... and became a renowned teacher of theology and philosophy. By the 1050s he was the head of the Reims cathedral school.'"}, {"text": "A military leader who fought alongside Pope Gregory VII.", "isCorrect": false, "rationale": "There is no mention in the text of Bruno having a military career or fighting alongside Pope Gregory VII; his background was entirely academic and ecclesiastical."}]}, {"question": "Despite having a path open to a distinguished career as a scholar and churchman, St. Bruno was fundamentally troubled by:", "options": [{"text": "The lack of intellectual rigor in contemporary monastic life.", "isCorrect": false, "rationale": "Bruno himself came from one of the finest schools in Europe and was a renowned teacher; his concern was moral corruption, not intellectual decline."}, {"text": "The increasing control of the Church by common people rather than nobility.", "isCorrect": false, "rationale": "The text highlights concerns about secular rulers controlling the Church and corruption within the clergy, not the influence of common people."}, {"text": "The corruption and simony within the institutional Church, exemplified by his own archbishop.", "isCorrect": true, "rationale": "The text explicitly states Bruno 'was troubled by the corruption he saw around him' and details how Archbishop Manasses de Gournay 'was a worldly and simoniacal prelate who had obtained his office through bribery,' leading Bruno to oppose him and flee Reims."}, {"text": "The requirement for monks to take vows of perpetual silence.", "isCorrect": false, "rationale": "Bruno sought a life devoted to prayer and silence; this was part of his calling, not something he was troubled by."}]}, {"question": "St. Bruno deliberately chose the Chartreuse valley for his first hermitage because its environment was:", "options": [{"text": "Strategically located near major trade routes for economic sustainability.", "isCorrect": false, "rationale": "The text describes the valley as 'accessible only by a narrow road that winds through steep gorges,' indicating it was not on major trade routes."}, {"text": "A fertile region suitable for extensive agricultural development.", "isCorrect": false, "rationale": "The text states the 'land poor' and the 'climate is harsh,' making it unsuitable for extensive agriculture."}, {"text": "Remote, inhospitable, and solitary, fostering an austere and prayerful life.", "isCorrect": true, "rationale": "The text directly states: 'The site Bruno chose was deliberately remote and inhospitable. ... The climate is harsh, the land poor, and the solitude immense. This was exactly what Bruno wanted.'"}, {"text": "Easily accessible for pilgrims seeking spiritual guidance.", "isCorrect": false, "rationale": "Its inaccessibility ('only by a narrow road that winds through steep gorges') made it unsuitable for easy pilgrimage; its purpose was solitary retreat."}]}, {"question": "Which statement best describes the unique organizational structure and daily life of the early Carthusian community, as designed by St. Bruno?", "options": [{"text": "It was a purely eremitical community where monks lived entirely isolated without any communal prayer or governance.", "isCorrect": false, "rationale": "While emphasizing solitude, the Carthusians did have communal elements, gathering for 'certain prayers, especially Matins and Vespers,' and were governed by a prior."}, {"text": "It closely mirrored the Benedictine model, with a powerful abbot overseeing all aspects of a highly communal life.", "isCorrect": false, "rationale": "The text explicitly contrasts the Carthusian model with Benedictine abbeys, noting that the Carthusian prior's authority touched monks' daily routines 'far less than an abbot's would in a Benedictine house.'"}, {"text": "It combined the solitary life of desert hermits with the stability and some structured communal elements of a monastery.", "isCorrect": true, "rationale": "The text states, 'The Carthusians combined the solitary life of the desert hermit with the structure and stability of a monastic community. Each monk was, in a sense, a hermit living within a monastery.'"}, {"text": "It was a mendicant order focused on preaching and ministering to the poor in urban centers.", "isCorrect": false, "rationale": "Mendicant orders (like Franciscans or Dominicans) emerged later and focused on public ministry. The Carthusians were focused on internal contemplative life in remote solitude."}]}, {"question": "Despite his profound influence, St. Bruno did not provide a written rule for the Carthusian order. How was the Carthusian way of life primarily transmitted after his death?", "options": [{"text": "Through a series of papal encyclicals issued by Pope Urban II.", "isCorrect": false, "rationale": "While Pope Urban II was a friend and patron, the text does not mention him issuing encyclicals to define the Carthusian way of life. The order’s customs were written by Guigo I."}, {"text": "By word-of-mouth legends and oral traditions passed down through generations of local villagers.", "isCorrect": false, "rationale": "The transmission was internal to the monastic community, from monk to monk, not through external local folklore."}, {"text": "Through the detailed architectural plans and construction manuals for their hermitages.", "isCorrect": false, "rationale": "While the cell design was specific, this refers to physical structures, not the spiritual and daily 'way of life' itself."}, {"text": "Through the living example of the first community, a tradition of silence, solitude, and prayer from monk to monk.", "isCorrect": true, "rationale": "The text explicitly states: 'The Carthusian way of life was transmitted not through a written code but through the living example of the first community — a tradition of silence, solitude, and prayer passed from monk to monk across the centuries.'"}]}, {"question": "What was the primary significance of Guigo I's work, the *Consuetudines Cartusiae*, for the Carthusian order?", "options": [{"text": "It introduced radical reforms to address perceived deviations from Bruno's original vision.", "isCorrect": false, "rationale": "The *Consuetudines* were a description of the life already established, not a reform. The Carthusians are known for 'never reformed, because never deformed.'"}, {"text": "It established the Carthusian order as a powerful political force within the Church hierarchy.", "isCorrect": false, "rationale": "The document describes internal customs and way of life, not political strategy or influence."}, {"text": "It provided the first written description and codification of the Carthusian way of life as it had developed.", "isCorrect": true, "rationale": "The text states that Guigo I 'composed the Consuetudines Cartusiae — the “Customs of the Chartreuse” — a careful description of the life that Bruno and his companions had established,' effectively formalizing their practices in writing."}, {"text": "It served as a universal rule for all monastic orders in Europe, replacing the Rule of Saint Benedict.", "isCorrect": false, "rationale": "The *Consuetudines* were specific to the Carthusian order, not a universal rule for all monastics, and were distinct from the Rule of Saint Benedict."}]}, {"question": "Guigo II's *Scala Claustralium* (The Ladder of Monks) is celebrated for articulating which fundamental spiritual practice?", "options": [{"text": "The detailed regulations for communal fasting and dietary restrictions.", "isCorrect": false, "rationale": "While Carthusians had strict dietary rules, these were codified in Guigo I's *Consuetudines*, not Guigo II's *Scala Claustralium*."}, {"text": "The stages of personal confession and penance.", "isCorrect": false, "rationale": "The *Scala Claustralium* focuses on engagement with Scripture and contemplation, not specifically confession and penance."}, {"text": "The four stages of *lectio divina* (sacred reading): *lectio, meditatio, oratio, and contemplatio*.", "isCorrect": true, "rationale": "The text explicitly states that Guigo II's treatise 'describes the four stages by which a monk ascends from the reading of Scripture to the heights of contemplation. The four rungs of the ladder — lectio, meditatio, oratio, and contemplatio — became the classic framework for the practice known as lectio divina.'"}, {"text": "The appropriate methods for managing monastic lands and finances.", "isCorrect": false, "rationale": "The *Scala Claustralium* is a work of Christian spirituality focused on prayer and Scripture, not administrative or financial matters."}]}, {"question": "The Carthusian order holds a unique distinction among religious orders, encapsulated by the saying 'Cartusia numquam reformata quia numquam deformata.' This means:", "options": [{"text": "The Carthusians were the only order founded by a former cathedral school head.", "isCorrect": false, "rationale": "While true about Bruno, this saying refers to the order's historical consistency and lack of reform, not its founder's background."}, {"text": "The Carthusians achieved such widespread popularity that reforms were never necessary due to their size.", "isCorrect": false, "rationale": "The text suggests the opposite, stating 'the extreme austerity of the life attracted only the most serious candidates,' implying a smaller, highly dedicated group rather than massive popularity."}, {"text": "Unlike other orders, the Carthusians have maintained their original austere way of life with remarkable fidelity, never requiring major reforms.", "isCorrect": true, "rationale": "The text directly explains this saying: 'they have never undergone a major reform. ...the Carthusians have maintained their original way of life with remarkable fidelity for over nine hundred years.'"}, {"text": "The Carthusian order was established with a unique legal status that exempted it from papal oversight and reform efforts.", "isCorrect": false, "rationale": "The text attributes their stability to their internal consistency and the demanding nature of their life, not to a special legal exemption from external oversight."}]}, {"question": "Considering the entire description of the Carthusian way of life, from its founding by Bruno to its enduring stability, which core value or principle stands out as most central to their identity?", "options": [{"text": "Active evangelization and missionary work among non-believers.", "isCorrect": false, "rationale": "The Carthusian way of life is characterized by profound solitude and withdrawal from the world, in stark contrast to active public ministry or missionary work."}, {"text": "Scholarly pursuit and intellectual leadership within the Church.", "isCorrect": false, "rationale": "While St. Bruno was a scholar, the order he founded emphasized silence, solitude, and prayer, rather than academic leadership as its primary charism."}, {"text": "Profound personal solitude, austerity, and contemplative prayer, within a stable communal framework.", "isCorrect": true, "rationale": "This option synthesizes key elements repeated throughout the text: 'simplicity and silence,' 'devoted entirely to prayer and silence,' 'solitude immense,' 'austere in the extreme,' 'each monk was alone with God,' 'profound personal solitude within a framework of communal obedience,' and the transmission 'of silence, solitude, and prayer.'"}, {"text": "Lavish liturgical celebrations and magnificent church architecture.", "isCorrect": false, "rationale": "This describes the splendor of Cluny, which the Carthusians explicitly reacted against, seeking simplicity and austerity instead."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
