<script>
var QUESTIONS = [{"question": "How did the Cluniac reform's understanding of the Opus Dei (Divine Office) most significantly differ from Saint Benedict's original vision?", "options": [{"text": "It emphasized manual labor as the primary form of monastic work and prayer.", "isCorrect": false, "rationale": "The Cluniac reform largely delegated manual labor to lay servants, directly contrasting with Benedict's emphasis on a balanced day of prayer, work, and reading. This delegation became a point of criticism from the Cistercians."}, {"text": "It dramatically expanded the amount of time dedicated to communal prayer, even at the expense of other traditional monastic activities.", "isCorrect": true, "rationale": "The Cluniac monks 'pressed' Saint Benedict's command 'Let nothing be preferred to the Work of God' to its extreme, expanding daily prayer from 40-50 psalms to 138, and adding offices and elaborate processions. This meant less time for manual labor, private reading, or study."}, {"text": "It reduced the number of canonical hours to allow more time for individual contemplative prayer.", "isCorrect": false, "rationale": "The Cluniac reform explicitly expanded the daily round of prayer by adding several offices and additional psalms/hymns to the standard eight canonical hours, rather than reducing them."}, {"text": "It focused solely on private devotional practices rather than communal chanting.", "isCorrect": false, "rationale": "The expansion of the Opus Dei at Cluny was primarily an expansion of communal chanting, including the addition of new offices, psalms, and elaborate processions, all performed together in choir."}], "id": "q01"}, {"question": "The text suggests that the Cluniac expansion of the Opus Dei led to a tension that would later be criticized by the Cistercians. What was this core tension?", "options": [{"text": "The conflict between adhering strictly to the Rule of Saint Benedict and the desire to create new liturgical forms.", "isCorrect": false, "rationale": "Cluny saw itself as fulfilling Benedict's rule by prioritizing the Opus Dei, even if it meant expanding upon it, rather than being in direct conflict with creating new forms. The criticism wasn't primarily about liturgical innovation itself."}, {"text": "The debate over whether monks should pray for the living or exclusively for the dead.", "isCorrect": false, "rationale": "While Cluny greatly emphasized prayer for the dead, they prayed for both the living and dead. This was not the specific tension identified as the Cistercian criticism related to the Opus Dei expansion."}, {"text": "The imbalance created by prioritizing extensive communal prayer over the Benedictine ideal of a balanced day that included manual labor.", "isCorrect": true, "rationale": "The text states that 'The hours that Cluny's monks spent in choir were hours they could not spend in manual labor, private reading, or study.' This led to the criticism from Bernard of Clairvaux that Cluny 'had abandoned Benedict's vision of ora et labora by eliminating the labora.'"}, {"text": "The tension between public displays of monastic wealth and the need for monastic secrecy.", "isCorrect": false, "rationale": "Cluny's wealth was publicly displayed in its churches and vestments, and while it created other tensions, this specific tension wasn't linked to the Cistercian criticism of the Opus Dei expansion mentioned in the text."}], "id": "q02"}, {"question": "Which of the following best encapsulates the Cluniac theological rationale for investing heavily in the beauty and splendor of their worship?", "options": [{"text": "To attract wealthy benefactors and secure financial stability for the monastery.", "isCorrect": false, "rationale": "While the splendor might have indirectly attracted benefactors, the text clearly states this was not the *theological rationale*. The theological justification was centered on God's worthiness."}, {"text": "To distinguish Cluniac monasteries from other monastic orders through ornate displays.", "isCorrect": false, "rationale": "This might have been a practical outcome, but the text emphasizes a deeper theological conviction rather than a strategy for distinction among orders."}, {"text": "To offer God worship with the greatest possible beauty, reflecting His infinite worthiness and mirroring heavenly liturgy.", "isCorrect": true, "rationale": "The text explicitly states: 'The theology behind this splendor was simple and powerful: if God is infinitely worthy of praise, then nothing we offer Him can be too beautiful. The earthly liturgy is an image of the heavenly worship...'"}, {"text": "To create an immersive sensory experience that would inspire awe and fear in the worshippers.", "isCorrect": false, "rationale": "Awe might be a byproduct, but the primary motivation wasn't to evoke fear or just a sensory experience, but to render fitting praise to God based on His infinite worthiness."}], "id": "q03"}, {"question": "The Cluniac 'theology of beauty' had profound consequences for Western culture beyond the monastery. Which of these cultural developments is presented as a direct result of this theology?", "options": [{"text": "The rise of secular humanism during the Renaissance.", "isCorrect": false, "rationale": "The Renaissance occurred much later and represents a different cultural shift, not a direct consequence of Cluny's theology of beauty."}, {"text": "The architectural styles of Romanesque and Gothic churches and the development of Western sacred music.", "isCorrect": true, "rationale": "The text directly states: 'The great Romanesque and Gothic churches... grew out of the conviction that the house of God should be the most beautiful building... The development of Gregorian chant, polyphony, and eventually the entire tradition of Western sacred music owes much to the monastic insistence that prayer should be sung, and sung well.'"}, {"text": "The establishment of universities as primary centers of theological education.", "isCorrect": false, "rationale": "While universities were important, the text does not link their establishment specifically to Cluny's 'theology of beauty' as a direct consequence."}, {"text": "The standardization of Latin as the universal language of European scholarship.", "isCorrect": false, "rationale": "Latin was already prevalent in religious and scholarly contexts before Cluny, and its standardization wasn't a direct consequence of Cluny's specific 'theology of beauty' as described."}], "id": "q04"}, {"question": "What significant liturgical observance, still celebrated by Catholics today, originated from Abbot Odilo's decree at Cluny in 998?", "options": [{"text": "All Saints' Day (November 1).", "isCorrect": false, "rationale": "All Saints' Day (November 1) is a much older feast. Abbot Odilo decreed the observance for the *following* day, November 2."}, {"text": "Christmas (December 25).", "isCorrect": false, "rationale": "Christmas is an ancient Christian feast, predating Cluny's reforms by centuries."}, {"text": "All Souls' Day (November 2).", "isCorrect": true, "rationale": "The text explicitly states: 'It was Abbot Odilo who, in 998, decreed that all Cluniac monasteries should observe November 2 as a solemn day of prayer for all the faithful departed. This feast — All Souls' Day — spread from Cluny to the entire Western Church.'"}, {"text": "Easter (Pascha).", "isCorrect": false, "rationale": "Easter is the central and oldest Christian feast, predating Cluny's reforms significantly."}], "id": "q05"}, {"question": "The Cluniac devotion to prayer for the dead had significant social consequences. How did this practice contribute to Cluny's burgeoning influence and wealth?", "options": [{"text": "It encouraged monks to leave the monastery and preach among the populace, gathering new followers and donations.", "isCorrect": false, "rationale": "Monks were primarily enclosed in the monastery, not engaged in extensive itinerant preaching. Their influence stemmed from their prayers within the cloister."}, {"text": "It led to the establishment of a vast network of hospitals and hospices funded directly by the Church's central authority.", "isCorrect": false, "rationale": "While Cluny was involved in charity, the text attributes its wealth directly to donations in exchange for prayers for the dead, not a centrally funded network of hospitals."}, {"text": "It prompted nobles and kings to donate land and wealth to Cluny in exchange for powerful monastic prayers for their deceased family members.", "isCorrect": true, "rationale": "The text states: 'Nobles and kings donated land and wealth to Cluny in exchange for the monks' prayers for their souls and the souls of their families... The result was that Cluny became fabulously wealthy.'"}, {"text": "It resulted in the monks becoming prominent legal advisors to secular rulers, who paid substantial fees for their services.", "isCorrect": false, "rationale": "The text does not mention monks acting as paid legal advisors as a primary source of wealth for Cluny, but rather the direct exchange of wealth for prayers."}], "id": "q06"}, {"question": "In the medieval 'three orders' model of society (oratores, bellatores, laboratores), what was the primary role assigned to monks like those at Cluny?", "options": [{"text": "Laboratores, as they performed significant manual labor on monastic lands.", "isCorrect": false, "rationale": "The Cluniacs largely delegated manual labor, and their primary role in society was not as 'laboratores' (those who work) but specifically as those who pray."}, {"text": "Bellatores, as they defended the Church's doctrines against heresy.", "isCorrect": false, "rationale": "Bellatores were 'those who fight' (knights, soldiers) to defend the realm. Monks were 'oratores' (those who pray)."}, {"text": "Oratores, whose public service was to pray for the salvation of all members of society.", "isCorrect": true, "rationale": "The text clearly states: 'The monks belonged to the first order — the oratores — whose role was to pray for the salvation of all. The monks were the oratores — and their prayer was not considered a private activity but a public service.'"}, {"text": "Scribes, responsible for preserving ancient texts and knowledge in monastic libraries.", "isCorrect": false, "rationale": "While monastic scribal work was important, their social classification within the 'three orders' model was primarily based on their role in prayer for the entire society, not their intellectual labor."}], "id": "q07"}, {"question": "The text describes a paradox within Cluniac monasticism: while its original charter sought spiritual freedom, the monastery eventually 'succumbed to some of the dangers of wealth and influence.' What core tension does this illustrate regarding monastic life in feudal society?", "options": [{"text": "The tension between a focus on individual spiritual growth and the demands of communal living.", "isCorrect": false, "rationale": "While this tension can exist, the text focuses on external pressures rather than internal monastic dynamics for this specific paradox."}, {"text": "The conflict between the desire for spiritual freedom and the practical entanglements that came with wealth and powerful benefactors.", "isCorrect": true, "rationale": "The text explicitly identifies this tension: 'These tensions — between spiritual freedom and worldly entanglement, between the gifts of benefactors and the independence of the cloister — ran through the entire history of medieval monasticism.'"}, {"text": "The challenge of maintaining strict dietary rules while also hosting lavish feasts for visitors.", "isCorrect": false, "rationale": "This is a minor, specific issue that doesn't capture the overarching tension of wealth and influence described."}, {"text": "The difficulty of recruiting enough monks to sustain the expanded Opus Dei given the demands of the medieval world.", "isCorrect": false, "rationale": "The text does not mention recruitment difficulties in relation to Cluny succumbing to wealth and influence; instead, it highlights the influence of powerful families placing sons in monasteries."}], "id": "q08"}, {"question": "The text states that Cluny's influence extended far beyond its walls. Which of the following historical events or movements is explicitly cited as being significantly impacted by the Cluniac ideal of a Church free from secular control?", "options": [{"text": "The Protestant Reformation of the 16th century.", "isCorrect": false, "rationale": "The Protestant Reformation occurred centuries after Cluny's peak influence and had different foundational ideals, though it also sought reform."}, {"text": "The Gregorian Reform of the 11th century.", "isCorrect": true, "rationale": "The text states: 'The broader reform of the Catholic Church in the eleventh century — including the campaign against simony... and lay investiture... was deeply influenced by the Cluniac ideal of a Church free from secular control.'"}, {"text": "The Italian Renaissance of the 14th-16th centuries.", "isCorrect": false, "rationale": "The Renaissance was a cultural and intellectual movement with different roots, not directly influenced by Cluny's ideal of ecclesiastical freedom in the way the Gregorian Reform was."}, {"text": "The Carolingian Renaissance of the 8th-9th centuries.", "isCorrect": false, "rationale": "The Carolingian Renaissance predated the Cluniac reform and focused on different aspects of renewal under Charlemagne."}], "id": "q09"}, {"question": "Considering the various aspects of the Cluniac reform discussed—the expansion of Opus Dei, the theology of beauty, and prayer for the dead—what unified spiritual vision fundamentally drove these changes and profoundly shaped medieval Christianity?", "options": [{"text": "A rejection of traditional monastic practices in favor of a more ascetic and solitary lifestyle.", "isCorrect": false, "rationale": "Cluny did not reject traditional monastic practices but expanded upon them, moving away from a simpler, more ascetic lifestyle in favor of splendor and communal magnificence."}, {"text": "A focus on interior, individual contemplation as the highest form of spiritual practice.", "isCorrect": false, "rationale": "While contemplation is part of monasticism, Cluny's reform emphasized communal, public liturgy and intercession, not primarily individual contemplation."}, {"text": "A belief in the paramount importance of communal worship, splendor, and intercessory prayer as a vital bridge between heaven and earth.", "isCorrect": true, "rationale": "This option synthesizes the core themes: the expanded Opus Dei (communal worship), the theology of beauty (splendor, mirroring heaven), and prayer for the dead (intercession, communion of saints). The text introduces the reform as 'a theology of worship, beauty, and prayer for the dead that shaped the way medieval Christians understood the relationship between heaven and earth.'"}, {"text": "An emphasis on evangelization and missionary work to spread Christianity to new lands.", "isCorrect": false, "rationale": "The text describes Cluny's focus as internal monastic reform, liturgy, and prayer for the dead within Christian society, not outward missionary efforts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
