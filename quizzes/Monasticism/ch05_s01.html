<script>
var QUESTIONS = [{"question": "Ireland's unique development of Christianity, centered around monasteries and abbots, can primarily be attributed to what historical factor?", "options": [{"text": "The intentional rejection of Roman administrative practices by early Irish missionaries.", "isCorrect": false, "rationale": "While Irish Christianity developed differently, the text does not state an 'intentional rejection' by missionaries, but rather that Ireland was never part of the Roman Empire, thus lacking the existing Roman structures for the Church to adopt."}, {"text": "Its status as an island that was never conquered by the Roman Empire, leading to the absence of Roman cities and diocesan structures.", "isCorrect": true, "rationale": "The text explicitly states that Ireland was 'untouched by Rome' and had 'no Roman cities, no Roman diocesan structure,' which led to a different system where monasteries became central."}, {"text": "The geographical isolation of Ireland, which prevented any contact with continental European Christian practices.", "isCorrect": false, "rationale": "Ireland was not entirely isolated; missionaries like St. Patrick came from outside, and figures like St. Columbanus traveled extensively to the continent. The issue was the *absence* of Roman imperial infrastructure, not total isolation."}, {"text": "A papal decree granting Ireland special dispensation to organize its Church uniquely.", "isCorrect": false, "rationale": "The text does not mention any papal decree influencing Ireland's early organizational structure. Its distinctiveness arose from its non-Roman history."}], "id": "q01"}, {"question": "St. Patrick's mission to Ireland around 432 AD had a profound and immediate consequence for the development of Irish Christianity. What was this consequence?", "options": [{"text": "It established a hierarchical church structure aligned with Roman diocesan divisions.", "isCorrect": false, "rationale": "The text states that Ireland developed a 'different system' from the Roman diocesan structure because it had never been part of Rome."}, {"text": "Ireland rapidly became a Christian land, almost immediately transforming into a monastic land.", "isCorrect": true, "rationale": "The text states, 'Within a generation, Ireland was becoming a Christian land — and almost immediately, it became a monastic land,' directly attributing this outcome to Patrick's successful mission."}, {"text": "It led to a military alliance between Ireland and the Roman Empire against invading Germanic tribes.", "isCorrect": false, "rationale": "The text focuses on religious and social transformation, not political or military alliances with Rome."}, {"text": "It sparked widespread resistance to Christianity among the Irish tribal kings.", "isCorrect": false, "rationale": "The text describes Patrick's mission as 'remarkably successful,' indicating widespread acceptance rather than resistance."}], "id": "q02"}, {"question": "In the context of early Irish Christianity, how did the role of monasteries fundamentally differ from their continental counterparts?", "options": [{"text": "Irish monasteries were primarily centers for isolated hermits, unlike continental monasteries that focused on community.", "isCorrect": false, "rationale": "The text describes Irish monasteries as 'centres of learning, art, agriculture, hospitality, and governance,' implying communal and diverse functions, not just isolated hermitage."}, {"text": "They served as military garrisons and defensive fortifications against Viking raids.", "isCorrect": false, "rationale": "While some might have offered protection, their primary described roles did not include being military garrisons. The text mentions the Book of Kells being moved for safekeeping *during* Viking raids, not that monasteries were fortresses."}, {"text": "They became the basic unit of Christian life, assuming roles of learning, art, agriculture, hospitality, and governance, with abbots often being the most powerful churchmen.", "isCorrect": true, "rationale": "The text explicitly states, 'the monastery became the basic unit of Christian life' and that they were 'centres of learning, art, agriculture, hospitality, and governance,' with the abbot 'often the most powerful churchman in a region.'"}, {"text": "Their main purpose was to produce luxury goods for trade with the Roman Empire.", "isCorrect": false, "rationale": "The text mentions agriculture and art, but not 'luxury goods for trade' as their main purpose. Their functions were more about sustaining life, learning, and spiritual governance."}], "id": "q03"}, {"question": "St. Brigid of Kildare is presented as a figure who illustrates a key characteristic of Irish Christianity. What characteristic is best exemplified by her story?", "options": [{"text": "The strict adherence to Roman ecclesiastical laws and structures by Irish religious leaders.", "isCorrect": false, "rationale": "St. Brigid's story, particularly her extraordinary authority and leadership of a double monastery, highlights the *difference* from Roman structures, not adherence to them."}, {"text": "The early prominence of female bishops in the Irish Church.", "isCorrect": false, "rationale": "The text describes her as an abbess with 'extraordinary authority,' not a bishop. Bishops and abbots/abbesses had distinct roles, though abbesses could be very powerful."}, {"text": "The central role of powerful monasteries, often led by abbots or abbesses, as the heart of the Church in Ireland.", "isCorrect": true, "rationale": "The text uses Brigid's example to conclude: 'the pattern is clear: in Ireland, the monastery was the heart of the Church,' and she led a great double monastery, demonstrating the power and centrality of these institutions and their leaders (abbess)."}, {"text": "The emphasis on individual asceticism over communal monasticism in Ireland.", "isCorrect": false, "rationale": "While asceticism was present, Brigid founded a 'great double monastery,' which is a communal institution, not an emphasis on isolated individual asceticism."}], "id": "q04"}, {"question": "The 'Peregrinatio pro Christo' was a defining practice for Celtic monks. Which of the following best describes this practice and its significance?", "options": [{"text": "A ritualistic journey to pilgrimage sites within Ireland to deepen one's faith.", "isCorrect": false, "rationale": "The text specifies it as 'permanent exile from one's homeland,' not a journey within Ireland."}, {"text": "A permanent self-imposed exile from one's homeland for the purpose of evangelization and asceticism, considered a 'white martyrdom'.", "isCorrect": true, "rationale": "The text defines 'Peregrinatio pro Christo' as 'permanent exile from one's homeland permanently as an act of asceticism and evangelization,' and explicitly calls it 'white martyrdom.'"}, {"text": "The act of shedding one's blood for Christ in battle against pagan invaders.", "isCorrect": false, "rationale": "This describes 'red martyrdom,' which is distinguished from 'white martyrdom' in the text."}, {"text": "A period of intense study in continental European monasteries to learn new theological concepts.", "isCorrect": false, "rationale": "While learning occurred, the core meaning of 'Peregrinatio pro Christo' was 'permanent exile' for asceticism and evangelization, not primarily for study abroad."}], "id": "q05"}, {"question": "The Irish recognized 'white martyrdom' as distinct from 'red martyrdom.' What was the core difference between these two forms of martyrdom for the Irish monks?", "options": [{"text": "Red martyrdom involved challenging secular authorities, while white martyrdom focused on spiritual contemplation.", "isCorrect": false, "rationale": "The text defines 'red martyrdom' as 'death for the faith' and 'white martyrdom' as 'permanent exile for Christ.' Neither involves primarily challenging secular authorities or purely spiritual contemplation as the core distinction."}, {"text": "White martyrdom was the voluntary shedding of one's blood for Christ, whereas red martyrdom was severe penance.", "isCorrect": false, "rationale": "This reverses the definitions provided: 'red martyrdom (death for the faith)' and 'white martyrdom (permanent exile for Christ).'"}, {"text": "Red martyrdom was dying for the faith, while white martyrdom was the radical sacrifice of permanent exile from one's beloved homeland for Christ.", "isCorrect": true, "rationale": "The text explicitly defines 'red martyrdom (death for the faith)' and 'white martyrdom (permanent exile for Christ),' emphasizing the profound sacrifice this entailed for the Irish."}, {"text": "White martyrdom was confined to hermits, while red martyrdom was for communal monks.", "isCorrect": false, "rationale": "The text does not impose such a restriction. Figures like Columbanus, who founded monasteries, exemplify white martyrdom."}], "id": "q06"}, {"question": "St. Columbanus's journey, departing Ireland with companions to found monasteries deep in Gaul and Italy, and his eventual expulsion due to his uncompromising standards, best illustrates which characteristic of Celtic monasticism?", "options": [{"text": "The insular nature of Celtic Christianity, resisting engagement with continental European practices.", "isCorrect": false, "rationale": "Columbanus actively engaged with and challenged continental practices, showing an outward, not insular, nature."}, {"text": "The military expansion efforts of the Irish Church into continental Europe.", "isCorrect": false, "rationale": "Columbanus's mission was religious and monastic, not military."}, {"text": "The missionary zeal and radical self-sacrifice embodied by the 'peregrini pro Christo,' seeking to spread the Gospel and monastic discipline abroad.", "isCorrect": true, "rationale": "Columbanus is highlighted as 'the greatest of the peregrini,' embodying the 'peregrinatio pro Christo' by leaving Ireland permanently to evangelize and establish monasteries, bringing 'fierce discipline' to the Frankish church."}, {"text": "The establishment of a unified, pan-European monastic rule under Irish authority.", "isCorrect": false, "rationale": "While he established monasteries, he was expelled for his uncompromising standards, indicating resistance to a unified rule under his authority rather than its successful establishment."}], "id": "q07"}, {"question": "The Synod of Whitby in 664 was a crucial event in the history of Christianity in Britain. What was the primary point of contention addressed and resolved at this council?", "options": [{"text": "The authority of Celtic abbesses versus Roman bishops in governing monasteries.", "isCorrect": false, "rationale": "While authority was a theme, the specific conflict wasn't abbesses vs. bishops. The text refers to abbots as powerful churchmen, but the synod's focus was different."}, {"text": "Disputes over which language should be used for liturgy – Latin or Irish Gaelic.", "isCorrect": false, "rationale": "The text does not mention language as an issue at Whitby."}, {"text": "Differences in the calculation of the date of Easter and the style of monastic tonsure.", "isCorrect": true, "rationale": "The text explicitly states: 'The Celtic monks calculated the date of Easter differently from Rome, wore a different style of tonsure... The conflict came to a head at the Synod of Whitby... to settle the matter.'"}, {"text": "The ownership of land between Celtic monastic foundations and Roman imperial estates.", "isCorrect": false, "rationale": "The text does not mention land ownership disputes or Roman imperial estates in Britain at this time as the focus of the Synod."}], "id": "q08"}, {"question": "What was the long-term consequence of King Oswiu's decision in favor of Roman practices at the Synod of Whitby for Celtic monasticism?", "options": [{"text": "It led to the immediate and complete suppression of all distinctive Celtic Christian practices.", "isCorrect": false, "rationale": "The text states, 'The decision at Whitby did not destroy Celtic monasticism,' and refers to a 'gradual integration,' not immediate and complete suppression."}, {"text": "It reinforced the isolation of Celtic Christianity, leading to its flourishing independently from Rome.", "isCorrect": false, "rationale": "The decision was *in favor of Rome*, initiating integration, not further isolation or independence."}, {"text": "It began the gradual integration of Celtic practices into the wider Roman Church, enriching the universal tradition while bringing conformity to Roman standards.", "isCorrect": true, "rationale": "The text explicitly states: 'The decision at Whitby did not destroy Celtic monasticism, but it began its gradual integration into the wider Roman Church. Over the following centuries, Celtic practices were brought into conformity with Rome. The distinctive character of Celtic Christianity was absorbed into the universal tradition — enriching it, but no longer standing apart.'"}, {"text": "It resulted in a permanent schism between the Celtic Church and the Roman Catholic Church.", "isCorrect": false, "rationale": "The text describes integration and conformity, not a permanent schism."}], "id": "q09"}, {"question": "Considering the entire section, which statement best synthesizes the unique development and eventual fate of Christianity in Ireland compared to continental Western Europe?", "options": [{"text": "Irish Christianity evolved under direct Roman imperial influence, leading to a largely similar structure to the continent.", "isCorrect": false, "rationale": "The text emphasizes Ireland's *lack* of Roman imperial influence and its distinct development."}, {"text": "Ireland developed a monastery-centric Church, with powerful abbots, due to its non-Roman past, which eventually saw its distinctive practices gradually integrated into the wider Roman tradition.", "isCorrect": true, "rationale": "This option accurately synthesizes the key points: Ireland's non-Roman past, the central role of monasteries and powerful abbots, and the eventual 'gradual integration' after events like the Synod of Whitby."}, {"text": "The Irish Church remained entirely isolated and unchanged from its unique origins, never engaging with Roman Christian practices.", "isCorrect": false, "rationale": "The text describes engagement, conflict (Whitby), and 'gradual integration' with Roman practices, indicating it was not entirely isolated or unchanged."}, {"text": "Christianity in Ireland was established by pagan tribal kings who adapted it to their existing religious rites.", "isCorrect": false, "rationale": "Christianity was brought by missionaries like St. Patrick, not established by pagan kings who adapted it."}], "id": "q10"}, {"question": "St. Columba founded a monastery on the island of Iona in 563. What made Iona's location strategically significant for the spread of Celtic Christianity?", "options": [{"text": "It was close to Rome, making communication with the papacy easier.", "isCorrect": false, "rationale": "Iona is off the west coast of Scotland, far from Rome. Its significance was regional — as a base for evangelizing Scotland — not as a conduit to Rome."}, {"text": "Its position off the coast of Scotland made it an ideal base for evangelizing the Picts and extending Irish Christianity into Britain.", "isCorrect": true, "rationale": "The text states Iona became 'the mother house of Celtic Christianity in Britain and the base for the evangelization of Scotland,' and that 'Columba and his monks evangelized the Picts of Scotland' from there."}, {"text": "It was the largest and most fertile island in the British Isles, enabling the monastery to be self-sufficient.", "isCorrect": false, "rationale": "Iona is a small island. Its significance was spiritual and missionary, not agricultural self-sufficiency."}, {"text": "Its remote, inaccessible location protected the monks from Viking raids throughout the early Middle Ages.", "isCorrect": false, "rationale": "The text mentions that the Book of Kells may have been begun at Iona and moved to Ireland specifically because of Viking raids, indicating Iona was not well protected from them."}], "id": "q11"}, {"question": "The text mentions that King Oswiu justified his decision at the Synod of Whitby partly by saying he would not 'contradict the keeper of the gates of heaven.' What does this reasoning reveal about how authority was argued at the Synod?", "options": [{"text": "It shows that political power, not theology, was the decisive factor in the Synod's outcome.", "isCorrect": false, "rationale": "Oswiu's reasoning is theological — it appeals to the authority of St. Peter — not a naked assertion of political will. He is persuaded by a claim about apostolic authority."}, {"text": "It demonstrates that the Roman side appealed to Christ's grant of authority to St. Peter (Matt. 16:18–19), which carried more weight than appeals to saints like Columba.", "isCorrect": true, "rationale": "The text says the Roman side argued 'their practice came from St. Peter, to whom Christ had given the keys of the kingdom,' while the Celtic side appealed to the authority of Columba and John the Apostle. Oswiu sided with Peter as the 'keeper of the gates of heaven.'"}, {"text": "The Celtic monks conceded defeat because they could not provide any scriptural basis for their practices.", "isCorrect": false, "rationale": "The Celtic side did cite scriptural authority (St. John the Apostle), but the Synod accepted the Petrine argument as more authoritative."}, {"text": "Whitby was primarily a military council in which King Oswiu imposed Roman practices on a conquered Celtic people.", "isCorrect": false, "rationale": "The text presents Whitby as a council convened to settle a theological dispute, with both sides presenting arguments. There is no suggestion of military conquest as the mechanism."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
