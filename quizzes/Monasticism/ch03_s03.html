<script>
var QUESTIONS = [{"question": "According to Abba Moses in Cassian's Conference 1, what is the relationship between the monk's ultimate end (telos) and immediate aim (scopos)?", "options": [{"text": "The ultimate end is personal sinlessness, while the immediate aim is solely communal living.", "isCorrect": false, "rationale": "The text states the ultimate end is the kingdom of heaven, and purity of heart is not sinlessness. Communal living is a means, not the direct immediate aim."}, {"text": "The ultimate end is the kingdom of heaven, and the immediate aim, purity of heart, is the concrete daily task leading to it.", "isCorrect": true, "rationale": "The text explicitly defines telos as the kingdom of heaven and scopos as puritas cordis (purity of heart), describing the latter as the 'concrete, daily task' that helps achieve the former."}, {"text": "The ultimate end is to avoid all sin, and the immediate aim is constant formal prayer.", "isCorrect": false, "rationale": "Cassian emphasizes a 'positive aim' of cultivating a heart for God, not merely avoiding sin. While prayer is crucial, the immediate aim is purity of heart, which encompasses more than just formal prayers."}, {"text": "The ultimate end is intellectual contemplation, and the immediate aim is strict adherence to liturgical rules.", "isCorrect": false, "rationale": "Contemplation is a result of purity of heart, not the ultimate end itself, which is the kingdom of heaven. The immediate aim is purity of heart, not solely liturgical adherence."}]}, {"question": "Cassian describes 'purity of heart' (puritas cordis) as the gateway to contemplation. Based on the text, what essential quality does purity of heart provide that enables this contemplation?", "options": [{"text": "It ensures complete sinlessness, allowing direct divine vision.", "isCorrect": false, "rationale": "The text explicitly states, 'It is not sinlessness — no one achieves that in this life.'"}, {"text": "It instills a deep interior freedom from disordered passions, enabling undistracted love for God.", "isCorrect": true, "rationale": "The text defines purity of heart as 'the state of the soul that has been freed from disordered passions and vices... a deep interior freedom that allows the monk to love God and neighbor without the constant interference of selfishness, anger, lust, or pride,' thus making contemplation possible."}, {"text": "It guarantees automatic entry into the kingdom of heaven without further effort.", "isCorrect": false, "rationale": "Purity of heart is an immediate aim and a daily task, not a guarantee of the ultimate end without ongoing effort and God's grace."}, {"text": "It leads to a profound intellectual understanding of theological doctrines, which is contemplation.", "isCorrect": false, "rationale": "Contemplation in this context refers to 'truly see[ing] God,' implying a spiritual vision beyond mere intellectual understanding of doctrines."}]}, {"question": "John Cassian's list of eight principal faults differs from Pope Gregory the Great's later list of seven deadly sins in which key aspect?", "options": [{"text": "Cassian's list includes 'sloth,' which Gregory omits entirely.", "isCorrect": false, "rationale": "Gregory the Great combined sadness and acedia into 'sloth,' meaning Cassian's list does not use the term 'sloth' but has its components separately."}, {"text": "Cassian's list contains specific 'bodily vices' that are absent from Gregory's more spiritual focus.", "isCorrect": false, "rationale": "Both lists address vices that originate in physical desires (e.g., gluttony, fornication). The difference is in the specific enumeration and categorization."}, {"text": "Cassian uniquely separates 'sadness' and 'acedia,' and distinguishes 'vainglory' from 'pride.'", "isCorrect": true, "rationale": "The text explicitly states that Gregory the Great 'combined sadness and acedia into one vice (sloth) and merged vainglory with pride,' highlighting Cassian's more granular distinctions."}, {"text": "Cassian’s faults are ordered randomly, while Gregory's are hierarchically structured.", "isCorrect": false, "rationale": "The text states, 'The faults are not random. Cassian arranges them in a deliberate order,' progressing from bodily, to emotional, to spiritual vices."}]}, {"question": "A monk, after performing an act of great charity, constantly finds himself thinking about how others perceive his generosity and wishes for their admiration. According to Cassian's classification, which principal fault is this monk most likely struggling with?", "options": [{"text": "Avarice", "isCorrect": false, "rationale": "Avarice is defined as 'love of money and possessions; greed,' which does not align with seeking admiration for charity."}, {"text": "Pride", "isCorrect": false, "rationale": "While related, 'pride' is the 'root of all vices; the soul's refusal to depend on God.' The desire for human praise is a more specific fault that feeds into pride but is distinct in Cassian's list."}, {"text": "Vainglory", "isCorrect": true, "rationale": "Vainglory (cenodoxia) is defined as 'the desire for human praise and admiration,' perfectly matching the monk's struggle described."}, {"text": "Acedia", "isCorrect": false, "rationale": "Acedia is 'spiritual listlessness, weariness, and restlessness,' which is unrelated to seeking admiration for good deeds."}]}, {"question": "Cassian's description of 'acedia' as the 'noonday devil' highlights which central aspect of this spiritual fault?", "options": [{"text": "It refers to simple physical laziness that prevents a monk from completing daily tasks.", "isCorrect": false, "rationale": "The text explicitly states, 'Acedia is not mere laziness. It is a profound spiritual restlessness.'"}, {"text": "It is a profound spiritual restlessness and weariness with one's vocation, leading to a desire to abandon it.", "isCorrect": true, "rationale": "The text defines acedia as 'a profound spiritual restlessness — a weariness with the monastic life itself, a temptation to abandon one's vocation and seek fulfillment elsewhere.'"}, {"text": "It is a form of demonic possession that only occurs at specific times of the day.", "isCorrect": false, "rationale": "The 'noonday devil' is a traditional name from Psalm 90:6, metaphorically describing the timing and nature of the temptation, not literal demonic possession."}, {"text": "It primarily manifests as uncontrolled anger towards one's spiritual superiors and community members.", "isCorrect": false, "rationale": "Uncontrolled wrath is 'anger' (ira), a separate principal fault in Cassian's list."}]}, {"question": "A young professional, deeply committed to their career path, begins to feel their work is meaningless, their office unbearable, and constantly fantasizes about quitting to pursue an entirely different, more exciting life. Based on Cassian's advice for overcoming acedia, what would be the most effective course of action?", "options": [{"text": "Seek a complete change of environment and career to find a more fulfilling path.", "isCorrect": false, "rationale": "Cassian specifically warns against this, stating, 'The monk who flees acedia will find it waiting for him wherever he goes.'"}, {"text": "Take a long sabbatical to rest and reflect on future options.", "isCorrect": false, "rationale": "While rest has its place (guided by discretio), the primary remedy for acedia is perseverance within one's current commitment, not an escape from it."}, {"text": "Persevere in their current commitments, continuing their work and waiting for the temptation to pass.", "isCorrect": true, "rationale": "The text states, 'The remedy, Cassian insists, is not flight but perseverance: the monk must stay in his cell, continue his work, and wait for the temptation to pass.'"}, {"text": "Indulge in various distractions and novelties to alleviate the boredom and restlessness.", "isCorrect": false, "rationale": "This would give in to the 'temptation to abandon one's vocation and seek fulfillment elsewhere,' which acedia causes, rather than overcoming it."}]}, {"question": "According to Cassian, what does 'unceasing prayer' (1 Thess. 5:17) truly entail for the monastic life?", "options": [{"text": "Continuously reciting formal prayers and psalms throughout every waking moment.", "isCorrect": false, "rationale": "The text asks, 'Surely no one can spend every moment of the day on his knees?' and clarifies that it's not about constant formal prayers."}, {"text": "Engaging in a meditative state during all activities, silencing external thoughts completely.", "isCorrect": false, "rationale": "While monks practice meditation, Cassian's definition of unceasing prayer is broader and more integrated into daily life, not necessarily a constant state of silenced thoughts."}, {"text": "Transforming all of life's activities, from work to rest, into an offering to God through a heart purified by love.", "isCorrect": true, "rationale": "The text explains, 'It means that the monk's entire life — his work, his reading, his meals, his rest — becomes a form of prayer. When the heart has been purified... every action becomes an offering.'"}, {"text": "Limiting prayer to the fixed canonical hours, as these are the only truly holy times.", "isCorrect": false, "rationale": "The canonical hours are 'anchors,' but 'the monk carries the spirit of prayer into every activity' between them, indicating prayer extends beyond these fixed times."}]}, {"question": "Cassian refers to *discretio* as 'the mother and guardian and guide of all virtues.' What does this statement imply about its role in the spiritual life?", "options": [{"text": "*Discretio* is the highest virtue, superior to love and humility.", "isCorrect": false, "rationale": "While immensely important, the text does not position it as 'superior' to foundational theological virtues like love, but rather as essential for guiding all virtues."}, {"text": "Without *discretio*, even seemingly good spiritual practices can become harmful or lead to spiritual delusion.", "isCorrect": true, "rationale": "The text states, 'Without discretio, even good practices become dangerous: excessive fasting leads to collapse, excessive solitude leads to delusion, and excessive zeal leads to pride.' This illustrates its role as a 'guardian and guide.'"}, {"text": "It is a virtue primarily for leaders and guides, not for every monk.", "isCorrect": false, "rationale": "The teaching is presented as a fundamental principle for anyone seeking spiritual growth, exemplified by the story of Hero, a monk, not just a leader."}, {"text": "*Discretio* is solely about maintaining a balanced diet and sleep schedule.", "isCorrect": false, "rationale": "It's about 'knowing the right measure in all things,' including 'when to fast and when to eat, when to speak and when to be silent,' encompassing spiritual and practical aspects, not just physical."}]}, {"question": "A novice monk, inspired by heroic tales, begins to practice extreme asceticism, including prolonged fasting and very little sleep, against the advice of his abbot. He believes that only through such rigorous discipline can he achieve true holiness. Which of Cassian's teachings is this monk most directly violating, and what danger does he face?", "options": [{"text": "The principle of 'unceasing prayer,' risking spiritual exhaustion.", "isCorrect": false, "rationale": "While exhaustion is possible, the core issue is not the *concept* of unceasing prayer, but the *method* of extreme asceticism."}, {"text": "The wisdom of 'discretio,' risking pride and spiritual delusion.", "isCorrect": true, "rationale": "This scenario directly mirrors the story of Abba Moses' monk Hero, who 'fasted so severely and prayed so intensely... But Hero refused to listen to the counsel of the elders... his pride led him into spiritual delusion.' This demonstrates a lack of discretio."}, {"text": "The order of the 'eight principal faults,' failing to address his bodily vices first.", "isCorrect": false, "rationale": "The primary error here is in the *approach* to overcoming vices, not necessarily the specific order in which they are addressed, although pride (a spiritual vice) is evident."}, {"text": "The ultimate end of the 'kingdom of heaven,' by focusing too much on earthly practices.", "isCorrect": false, "rationale": "The monk's goal might still be the kingdom of heaven, but his chosen path to achieve it is misguided due to a lack of discernment."}]}, {"question": "Which of the following statements best summarizes John Cassian's most significant and enduring contribution to Western Christian spirituality, as described in the text?", "options": [{"text": "He popularized the practice of solitary hermitage in Gaul, leading to the decline of communal monasticism.", "isCorrect": false, "rationale": "Cassian taught monks in Gaul, but his influence shaped both individual and communal aspects of monasticism, particularly Benedictine moderation, which is communal. The text doesn't suggest a decline in communal monasticism due to him."}, {"text": "He introduced a systematic framework for understanding and overcoming spiritual vices and cultivating an integrated, God-centered life.", "isCorrect": true, "rationale": "The text highlights his analysis of the eight principal faults ('shaped the entire Western tradition of moral theology'), his teaching on unceasing prayer ('the foundation of the Opus Dei'), and his emphasis on discretio ('shaped the moderate, humane character of Benedictine monasticism'), all contributing to a systematic approach to spiritual growth."}, {"text": "He focused exclusively on intellectual contemplation as the primary path to God, minimizing the role of asceticism.", "isCorrect": false, "rationale": "Cassian emphasized purity of heart (achieved through overcoming vices, which requires asceticism) as the gateway to contemplation. He did not minimize asceticism but sought to moderate it through discretio."}, {"text": "He created the first complete written Rule for Western monasticism, which all subsequent rules directly copied.", "isCorrect": false, "rationale": "Saint Benedict of Nursia created the famous Rule for Western monasticism, though he was directly influenced by Cassian's teachings, particularly on discretio."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
