<script>
var QUESTIONS = [{"question": "According to the Foundation Charter of Cluny, what was Duke William of Aquitaine's primary personal motivation for establishing the monastery?", "options": [{"text": "To exert greater political control over the region by establishing a loyal institution.", "isCorrect": false, "rationale": "The text states William wanted to remove Cluny from lay and episcopal interference, indicating a desire to relinquish control, not exert more political power."}, {"text": "To establish a new economic hub that would increase his personal wealth and influence.", "isCorrect": false, "rationale": "William explicitly states he is giving away a portion of his temporal goods 'for the gain of my soul,' not for economic gain or to increase his wealth."}, {"text": "To provide for his own safety and merit everlasting rewards in the afterlife by using his transitory possessions wisely.", "isCorrect": true, "rationale": "William's charter clearly states his desire 'to provide for my own safety while I am still able' and to 'merit everlasting rewards,' driven by a concern for his soul's salvation."}, {"text": "To create a military stronghold that would defend his territories from rival noblemen.", "isCorrect": false, "rationale": "The document describes the establishment of a monastic community dedicated to prayer and spiritual life, not a military fortification."}], "id": "q01"}, {"question": "Among the freedoms granted by Duke William's charter, which one was most revolutionary for its time and crucial for Cluny's independence?", "options": [{"text": "The right of the monks to cultivate their own lands and manage their own resources.", "isCorrect": false, "rationale": "While important for self-sufficiency, managing one's own resources was a fairly standard aspect of monastic life, not the most revolutionary freedom in terms of external control."}, {"text": "The obligation for the monks to strictly follow the Rule of Saint Benedict.", "isCorrect": false, "rationale": "Adhering to the Rule was the foundation of Benedictine monasticism, not a 'freedom' from interference, but rather a guiding principle."}, {"text": "The power and permission for the monks to freely elect their own abbot without outside intervention from lay lords or bishops.", "isCorrect": true, "rationale": "The text highlights this as revolutionary, stating, 'The right of the monks to elect their own abbot freely was revolutionary. In this period, many monasteries were controlled by local lords or bishops who appointed abbots for political reasons. William's charter removed Cluny from all such interference.'"}, {"text": "The ability to establish daughter houses and expand the Cluniac order across Europe.", "isCorrect": false, "rationale": "The charter focuses on the foundation and initial governance of Cluny itself, not the expansion of an order, which came later as Cluny grew in influence."}], "id": "q02"}, {"question": "The 'Think Deeper' section prompts reflection on whether William's desire for his own salvation makes his act of founding Cluny selfish. Based on the Catholic understanding mentioned in the text, how can such an act be seen as genuinely generous?", "options": [{"text": "It is inherently selfish, as true generosity requires an complete absence of personal gain or motivation.", "isCorrect": false, "rationale": "The 'Think Deeper' box implies a more nuanced Catholic perspective, suggesting that motivations for salvation don't necessarily negate generosity."}, {"text": "It demonstrates that personal spiritual motivation is entirely irrelevant to the objective generosity of an act.", "isCorrect": false, "rationale": "Catholic teaching on merit and grace often considers both the external act and the internal disposition/motivation. The text prompts thinking about the *interplay*."}, {"text": "In the Catholic understanding, seeking personal salvation often involves acts of charity and service that inherently benefit others and demonstrate faith, intertwining self-interest with genuine good.", "isCorrect": true, "rationale": "The 'Think Deeper' section asks how 'the Catholic understanding of merit and grace help us think about this question.' William's act, while motivated by his salvation, creates a lasting institution dedicated to God and the spiritual welfare of others, embodying the use of 'transitory possessions' for 'everlasting rewards' and benefiting a 'congregation of monks' who pray for all."}, {"text": "William's act was primarily a political maneuver to secure alliances, thus the question of spiritual generosity is secondary and not applicable.", "isCorrect": false, "rationale": "The charter's personal language explicitly emphasizes William's spiritual motives for his own salvation, making it more than a mere political act."}], "id": "q03"}, {"question": "The Foundation Charter stipulates a payment of 'ten shillings to the church of the apostles at Rome' every five years. What was the primary significance of this token payment?", "options": [{"text": "It was a tax imposed by the Pope on all newly founded monasteries in Burgundy.", "isCorrect": false, "rationale": "The text presents this as William's provision to place Cluny under papal protection, not a general tax imposed by the Pope."}, {"text": "It symbolized Cluny's direct allegiance to the papacy, placing it under papal protection and shielding it from local secular or episcopal interference.", "isCorrect": true, "rationale": "The text explicitly states: 'This token payment to Rome symbolized Cluny's direct allegiance to the papacy. By placing Cluny under papal protection rather than under the local bishop or any secular lord, William ensured that no one could interfere with the monastery's governance or seize its property.'"}, {"text": "It was a standard charitable contribution expected from all wealthy landowners in the region.", "isCorrect": false, "rationale": "The payment is specific to Cluny's relationship with Rome for 'lights' and 'protection,' not a general charitable expectation from landowners."}, {"text": "It was intended to fund the extensive missionary efforts of the Roman Church in newly converted lands.", "isCorrect": false, "rationale": "The text specifies the payment was 'to supply them with lights,' which is a symbolic, spiritual purpose, not for missionary funding."}], "id": "q04"}, {"question": "How did the Cluniac monks significantly expand their liturgical worship (Opus Dei) beyond the prescriptions of the Rule of Saint Benedict?", "options": [{"text": "By completely abandoning communal prayer in favor of individual contemplation and hermitic practices.", "isCorrect": false, "rationale": "Cluny was a cenobitic community, famous for its *communal* liturgical worship, not for abandoning it or adopting hermitic practices."}, {"text": "By reducing the number of canonical hours to allow for more time dedicated to manual labor and study.", "isCorrect": false, "rationale": "This was a criticism levied against Cluny by others (like the Cistercians), but the Cluniacs themselves *expanded* their liturgical schedule, spending more time in choir."}, {"text": "By adding numerous supplementary psalms, litanies, processions, and elaborate prayers specifically for the dead, greatly extending daily choir time.", "isCorrect": true, "rationale": "The text explicitly states the Cluniacs 'expanded the Opus Dei... adding prayers for the dead, additional psalms, processions, and elaborate ceremonies,' leading to 'seven or eight hours in choir.'"}, {"text": "By introducing new secular music and dramatic theatrical performances into their religious services.", "isCorrect": false, "rationale": "There is no mention of secular music or theatrical performances; their expansion focused on traditional liturgical elements like psalms, hymns, and prayers."}], "id": "q05"}, {"question": "Which Cluniac liturgical innovation had a profound and lasting impact on the universal Catholic Church, still celebrated today?", "options": [{"text": "The daily chanting of the entire psalter multiple times, exceeding Benedict's original requirements.", "isCorrect": false, "rationale": "While a significant Cluniac practice, the daily multiple chanting of the psalter was specific to Cluny and not adopted as a universal feast or practice in the same way."}, {"text": "The institution of the Feast of All Souls (November 2) by Abbot Odilo to emphasize prayers for the deceased.", "isCorrect": true, "rationale": "The text directly states: 'Cluny's emphasis on prayer for the dead led Abbot Odilo to institute the Feast of All Souls (November 2) around the year 998 — a feast the universal Church still celebrates today.'"}, {"text": "The construction of the largest church in Christendom, Cluny III, which set a new standard for ecclesiastical architecture.", "isCorrect": false, "rationale": "Cluny III was an architectural achievement, but it was not a liturgical innovation or a feast adopted by the universal Church."}, {"text": "The detailed liturgical prescriptions found in the Ordo Cluniacensis, governing every movement and gesture during services.", "isCorrect": false, "rationale": "The Ordo Cluniacensis was a specific monastic customary for Cluny, not a universal liturgical feast or practice adopted by the wider Church."}], "id": "q06"}, {"question": "What was the primary distinction of the third abbey church at Cluny (Cluny III) during its era?", "options": [{"text": "It was the first church to incorporate complex Gothic architectural elements.", "isCorrect": false, "rationale": "Cluny III was a Romanesque church; Gothic architecture developed later."}, {"text": "It served as the central administrative headquarters for the entire Benedictine order in Europe.", "isCorrect": false, "rationale": "While Cluny was influential, the text highlights its size and grandeur, not its role as a universal administrative headquarters for the entire Benedictine order."}, {"text": "It was, at 187 metres in length, the largest church in all of Christendom until the construction of the new Saint Peter's Basilica.", "isCorrect": true, "rationale": "The text explicitly states: 'At 187 metres in length, it was the largest church in all of Christendom — a distinction it held until the construction of the new Saint Peter's Basilica in Rome during the sixteenth century.'"}, {"text": "It featured innovative stained-glass windows depicting the entire narrative of the Bible.", "isCorrect": false, "rationale": "The text mentions its 'five aisles, double transepts, and soaring barrel vaults' for majesty, but does not specify details about stained-glass windows."}], "id": "q07"}, {"question": "Saint Bernard of Clairvaux and the Cistercians criticized Cluniac monasticism for primarily what reason?", "options": [{"text": "Their failure to adhere to the core principles of the Rule of Saint Benedict.", "isCorrect": false, "rationale": "The Cluniacs did follow the Rule of St. Benedict, but *expanded* upon it. The Cistercian criticism was about the *degree* of adherence to Benedict's vision of simplicity, not a complete failure to adhere."}, {"text": "Their excessive focus on manual labor and agricultural pursuits at the expense of spiritual contemplation.", "isCorrect": false, "rationale": "This is the opposite of the criticism; Bernard argued monks should spend *more* time in manual labor, implying Cluniacs spent less."}, {"text": "The elaborate ornamentation of their churches and the extended length of their liturgical services, which they believed deviated from Benedictine simplicity.", "isCorrect": true, "rationale": "The text states: 'Saint Bernard of Clairvaux would famously criticise the elaborate ornamentation of Cluniac churches and the sheer length of their services, arguing that monks should spend more time in manual labour and private prayer, as Benedict had intended.'"}, {"text": "Their direct allegiance to the papacy rather than to local bishops, which was seen as a challenge to traditional ecclesiastical hierarchy.", "isCorrect": false, "rationale": "While a distinctive feature of Cluny, papal allegiance was not the primary criticism from Cistercians, whose concerns were more internal to monastic practice and Benedictine observance."}], "id": "q08"}, {"question": "Based on the text, what was the overarching goal of the Cluniac reform movement in relation to monastic life?", "options": [{"text": "To promote economic self-sufficiency for all monasteries through extensive agricultural development and trade.", "isCorrect": false, "rationale": "While Cluny's charter provided for self-sufficiency, the primary *reform* goal was spiritual and governmental independence, not mainly economic development as a reform across monasteries."}, {"text": "To centralize political power within the Church by making all monasteries directly subservient to the Pope.", "isCorrect": false, "rationale": "The focus was on Cluny's independence from *local* interference and direct allegiance to the papacy for *protection*, not a universal centralization of all monastic political power under the Pope."}, {"text": "To restore spiritual rigor and monastic independence from lay and episcopal interference, primarily through an enriched liturgical life and free abbatial elections.", "isCorrect": true, "rationale": "The text emphasizes both 'the grant of freedom from lay and episcopal interference' and the 'elaborate Cluniac liturgy, which gives us a glimpse into the daily life of prayer that was the heart of the Cluniac reform.' These elements combined represent the core of their reform."}, {"text": "To establish a new, less strict monastic rule that appealed to a broader range of adherents than the Rule of St. Benedict.", "isCorrect": false, "rationale": "Cluny followed and *expanded* upon the Rule of St. Benedict, making it in some ways *more* rigorous liturgically, not less strict."}], "id": "q09"}, {"question": "When Duke William states in the charter he hopes to 'receive the reward of the righteous' by 'receiving despisers of the world,' what does this phrase imply about his perception of the monks' role and his own spiritual aspirations?", "options": [{"text": "He viewed monks as social outcasts who had completely rejected society, and he wished to patronize them out of pity or a sense of social obligation.", "isCorrect": false, "rationale": "'Despisers of the world' in a monastic context refers to spiritual detachment from worldly possessions and ambitions, not social rejection or pity."}, {"text": "He saw monks as those who had renounced worldly attachments and dedicated themselves fully to God, and he hoped to partake in their spiritual merit through his support and patronage.", "isCorrect": true, "rationale": "The phrase 'despisers of the world' means those who detach from earthly transient things for eternal spiritual ones. William, unable to despise all things himself, hopes that by supporting these righteous individuals, he can indirectly gain 'the reward of the righteous' for his own salvation."}, {"text": "He believed that by financially supporting individuals who criticized or 'despised' him, he could earn God's favor for his humility.", "isCorrect": false, "rationale": "'Despisers of the world' refers to their spiritual disposition towards the material world, not a personal animosity towards William or his rule."}, {"text": "He intended to use the monks to criticize secular power structures, which he himself secretly despised.", "isCorrect": false, "rationale": "William was a powerful secular ruler himself, and his motivation was deeply personal and spiritual, not about political criticism through the monks."}], "id": "q10"}, {"question": "The Cistercians criticized Cluny for its liturgical elaboration, yet both movements claimed to be faithful to the Rule of Saint Benedict. What does this debate reveal about the nature of the Rule itself?", "options": [{"text": "It reveals that the Rule of Saint Benedict was so ambiguous that it could justify virtually any monastic practice, including secular pursuits.", "isCorrect": false, "rationale": "The Rule is quite specific in its prescriptions. The debate was not about the Rule being vague, but about which of its values — communal liturgy or manual labor and simplicity — should receive greater emphasis."}, {"text": "It demonstrates that the Rule contains genuine tensions between values — magnificence in worship and simplicity of life — that different communities resolved in different directions.", "isCorrect": true, "rationale": "The Cluniacs emphasized Benedict's vision of the Opus Dei as the primary work of the monk and built that logic out into elaborate liturgy and magnificent churches. The Cistercians stressed Benedict's prescriptions for manual labor, simplicity, and poverty. Both were drawing on real elements of the Rule — the debate reflects real internal tensions within the text, not mere disagreement about external facts."}, {"text": "It shows that the Cistercians had abandoned the Rule of Saint Benedict in favor of the older and stricter Rule of Saint Columban.", "isCorrect": false, "rationale": "The Cistercians explicitly positioned themselves as restoring the authentic Rule of Saint Benedict, not as following a different rule. Their criticism of Cluny was that it had moved away from Benedict's original intentions."}, {"text": "It indicates that by the twelfth century the Rule of Saint Benedict had been definitively superseded by Cluniac customs as the governing framework of Western monasticism.", "isCorrect": false, "rationale": "The Rule of Saint Benedict remained the authoritative document. The Cistercian reform was specifically a call to return to the Rule, which would be impossible if the Rule had been superseded."}], "id": "q11"}, {"question": "The text notes that our understanding of Cluniac monasticism relies on a limited range of surviving sources — charters, customaries, and Bernard's polemical letters. What is the most significant limitation this creates for historians?", "options": [{"text": "It means historians cannot be certain whether Cluny ever existed, since no physical remains survive.", "isCorrect": false, "rationale": "Cluny's physical ruins (including elements of Cluny III) survive to the present day, and the documentary sources confirm its existence and scope in great detail."}, {"text": "It means the available sources predominantly reflect formal, official, or polemical perspectives, potentially obscuring the lived experience of ordinary monks.", "isCorrect": true, "rationale": "Foundation charters document formal legal provisions; customaries prescribe ideal observance; Bernard's letters represent adversarial rhetoric. None of these naturally captures what daily life actually felt like for the monks — their personal struggles, informal relationships, or private devotions. Historians must read these sources critically, aware of what each type of document was designed to accomplish."}, {"text": "It means historians must rely entirely on archaeological evidence rather than written documents to reconstruct Cluniac practices.", "isCorrect": false, "rationale": "The text identifies several surviving written sources — the charter, the Ordo Cluniacensis, and Bernard's letters. The limitation is not an absence of written sources but the nature and perspective of those that survive."}, {"text": "It indicates that Cluny deliberately destroyed records of its failures to preserve its reputation, making a balanced assessment impossible.", "isCorrect": false, "rationale": "The text does not suggest deliberate destruction of records. The gaps in our knowledge reflect the normal attrition of medieval documents over centuries, not a Cluniac cover-up."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
