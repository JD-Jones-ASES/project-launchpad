<script>
var QUESTIONS = [{"question": "What significant event in Thomas Merton's early life occurred at Columbia University?", "options": [{"text": "He became a Trappist monk.", "isCorrect": false, "rationale": "Merton entered the Abbey of Gethsemani, a Trappist monastery, in December 1941, several years after his time at Columbia University."}, {"text": "He converted to Catholicism.", "isCorrect": true, "rationale": "The text states, 'He studied at Columbia University in New York, where he converted to Catholicism in 1938.'"}, {"text": "He was ordained a priest.", "isCorrect": false, "rationale": "Merton was ordained a priest in 1949, long after his studies at Columbia and after entering the monastery."}, {"text": "He published The Seven Storey Mountain.", "isCorrect": false, "rationale": "His autobiography, The Seven Storey Mountain, was published in 1948, after he had become a monk and priest."}], "id": "q01"}, {"question": "To which monastic order and specific abbey did Thomas Merton commit his life?", "options": [{"text": "Benedictine Order at Cîteaux Abbey", "isCorrect": false, "rationale": "Cîteaux Abbey is associated with Saint Bernard and the Cistercian order, a precursor, but Merton entered a Trappist monastery."}, {"text": "Carthusian Order at La Grande Chartreuse", "isCorrect": false, "rationale": "The Carthusian Order and La Grande Chartreuse are distinct monastic traditions not associated with Thomas Merton."}, {"text": "Trappist Order at the Abbey of Gethsemani", "isCorrect": true, "rationale": "The text clearly states: 'In December 1941...he entered the Abbey of Gethsemani, a Trappist monastery...He remained there until his death in 1968.'"}, {"text": "Jesuit Order at Columbia University", "isCorrect": false, "rationale": "The Jesuit Order is a different religious order, and Merton's conversion occurred at Columbia, but he did not join the Jesuits there."}], "id": "q02"}, {"question": "Merton titled his autobiography The Seven Storey Mountain, alluding to Dante's Divine Comedy. What did he intend to convey about his own life by this title?", "options": [{"text": "His ambition to reach the highest levels of spiritual enlightenment quickly.", "isCorrect": false, "rationale": "The text describes his journey as a 'slow, painful ascent,' which contradicts the idea of reaching enlightenment quickly."}, {"text": "His journey of purgation and struggle towards spiritual clarity and God.", "isCorrect": true, "rationale": "The text explicitly states: 'Merton saw his own life as a journey of purgation — a slow, painful ascent from sin and confusion toward God.'"}, {"text": "His intellectual pride and the many academic challenges he overcame.", "isCorrect": false, "rationale": "While his youth included 'intellectual pride,' the book's title refers to moving *away* from this, not celebrating it."}, {"text": "His desire to build a monastic community with seven distinct spiritual levels.", "isCorrect": false, "rationale": "There is no mention in the text of Merton's desire to build a monastic community with seven distinct spiritual levels."}], "id": "q03"}, {"question": "What was Thomas Merton's primary argument regarding the nature and importance of contemplation in the modern world?", "options": [{"text": "It is a specialized practice reserved only for ordained monks and priests.", "isCorrect": false, "rationale": "Merton's great contribution was 'his insistence that contemplation is not a luxury for specialists but a fundamental human need.'"}, {"text": "It offers an escape from the complexities and problems of contemporary society.", "isCorrect": false, "rationale": "Merton believed the monastic life 'was not an escape from the world but a way of seeing the world more clearly.'"}, {"text": "It is a fundamental human need, essential for finding interiority amidst modern distraction.", "isCorrect": true, "rationale": "He argued 'that contemplation is not a luxury for specialists but a fundamental human need' and that the modern world had led to 'losing the capacity for silence, for interiority.'"}, {"text": "It primarily involves rigorous theological study and intellectual debate.", "isCorrect": false, "rationale": "While Merton was an intellectual, his emphasis on contemplation was on silence, interiority, and discovering the 'true self,' not primarily academic debate."}], "id": "q04"}, {"question": "Merton believed that in solitude and silence, a monk discovers the 'true self.' Based on the text, how might this concept apply to someone living a contemplative life outside the monastery?", "options": [{"text": "They would isolate themselves from all social interaction to avoid external influences.", "isCorrect": false, "rationale": "Merton wrote for 'laypeople' and believed monastic life was 'not an escape from the world,' suggesting broader applicability without total isolation."}, {"text": "They would identify themselves primarily through their professional achievements and public reputation.", "isCorrect": false, "rationale": "The text states that the monk 'strips away the illusions and false identities that society imposes,' which would include societal achievements and reputations."}, {"text": "They would seek to understand their innate identity and purpose beyond societal expectations and roles.", "isCorrect": true, "rationale": "Merton's idea of the 'true self' is 'the person God created each of us to be,' discovered by stripping away 'illusions and false identities that society imposes,' which aligns with understanding innate identity beyond external roles."}, {"text": "They would focus on accumulating material possessions that reflect their personal desires.", "isCorrect": false, "rationale": "The concept of stripping away illusions and false identities runs counter to focusing on material accumulation as a path to the true self."}], "id": "q05"}, {"question": "Beyond his writings on contemplation, what significant causes did Thomas Merton advocate for in the 1960s?", "options": [{"text": "The promotion of economic globalization and international trade agreements.", "isCorrect": false, "rationale": "The text makes no mention of Merton advocating for economic globalization or trade agreements."}, {"text": "The establishment of new monastic orders and expansion of cloistered life globally.", "isCorrect": false, "rationale": "While his legacy inspired monks, his active advocacy in the 1960s was focused on different issues, not primarily the establishment of new orders."}, {"text": "Peace, nonviolence, and social justice, including opposition to nuclear weapons and racial injustice.", "isCorrect": true, "rationale": "The text states he 'became a vocal advocate for peace and nonviolence' and 'wrote passionately against nuclear weapons and racial injustice.'"}, {"text": "A stricter adherence to traditional Catholic liturgy and rejection of modern theological reforms.", "isCorrect": false, "rationale": "The text does not mention his involvement in liturgical debates; rather, his interfaith dialogue suggests an openness that contrasts with strict rejection of reforms."}], "id": "q06"}, {"question": "Thomas Merton's later interests expanded to include dialogue with Eastern contemplative traditions. Which traditions are specifically mentioned in the text?", "options": [{"text": "Hinduism, Shintoism, and Sikhism", "isCorrect": false, "rationale": "While these are Eastern traditions, they are not the ones specifically mentioned in the provided text regarding Merton's dialogue."}, {"text": "Zen Buddhism, Taoism, and Sufism", "isCorrect": true, "rationale": "The text states: 'Merton also pursued an extraordinary dialogue with the contemplative traditions of the East — Zen Buddhism, Taoism, and the Sufi tradition of Islam.'"}, {"text": "Confucianism, Jainism, and Zoroastrianism", "isCorrect": false, "rationale": "These are Eastern philosophical or religious traditions, but they are not the specific ones mentioned in the text about Merton."}, {"text": "Eastern Orthodoxy, Protestantism, and Judaism", "isCorrect": false, "rationale": "These are primarily Western or Abrahamic traditions, not the 'Eastern contemplative traditions' Merton focused on for dialogue as described in the text."}], "id": "q07"}, {"question": "Merton's death in Bangkok, at a conference uniting Christian and Buddhist monastics, is described as 'almost symbolic.' What does this symbolism primarily represent?", "options": [{"text": "His ultimate abandonment of Catholicism in favor of Eastern religions.", "isCorrect": false, "rationale": "The text explicitly states: 'He did not abandon his Catholic faith; on the contrary, he believed that genuine dialogue with other traditions deepened one's own.'"}, {"text": "The danger of international travel for cloistered monks.", "isCorrect": false, "rationale": "While his death was accidental, the symbolism emphasized in the text is about the meaning of his life and work, not just the danger of travel."}, {"text": "The culmination of his life's work seeking God at the crossroads of different spiritual traditions.", "isCorrect": true, "rationale": "The note explains: 'He had spent his life seeking God in the silence of the cloister, and he died at the crossroads of East and West, still searching, still listening.'"}, {"text": "The superiority of Eastern contemplative practices over Western monasticism.", "isCorrect": false, "rationale": "Merton sought dialogue to deepen his own faith, not to declare one tradition superior to another."}], "id": "q08"}, {"question": "How did Thomas Merton demonstrate the continuing relevance of the monastic life to a modern, skeptical world?", "options": [{"text": "By arguing that monasticism should replace all secular forms of social organization.", "isCorrect": false, "rationale": "The text does not suggest Merton advocated for monasticism to replace all secular organizations; rather, he showed its deep spiritual relevance."}, {"text": "By proving that ancient monastic practices can address urgent human needs amidst modern distractions.", "isCorrect": true, "rationale": "The text states, 'Through his writing, he showed that the ancient practices of silence, solitude...address real and urgent needs of the human heart — needs that the noise and busyness of modern life only make more acute.'"}, {"text": "By encouraging all individuals to abandon their professions and enter monasteries.", "isCorrect": false, "rationale": "Merton wrote for 'monks, laypeople, or even non-Christians,' indicating his message was not exclusive to monastic vocations."}, {"text": "By emphasizing strict obedience to traditional rules without adaptation for modern challenges.", "isCorrect": false, "rationale": "Merton's engagement with social justice and interfaith dialogue shows a dynamic approach, not a rigid adherence without adaptation."}], "id": "q09"}, {"question": "Pope Francis praised Merton as 'a man of dialogue, a promoter of peace between peoples and religions.' What does this specific tribute primarily highlight about Merton's impact?", "options": [{"text": "His strict adherence to traditional monastic silence and isolation.", "isCorrect": false, "rationale": "While Merton practiced silence, the Pope's phrase 'man of dialogue' points to his outward engagement and bridging divides, not isolation."}, {"text": "His influence on global politics through direct diplomatic interventions.", "isCorrect": false, "rationale": "Merton was a cloistered monk; his influence was through his writings and advocacy, not direct diplomatic interventions."}, {"text": "His ability to bridge divides and foster understanding across diverse spiritual and social contexts.", "isCorrect": true, "rationale": "The description 'man of dialogue, a promoter of peace between peoples and religions' directly reflects Merton's work in social justice and interfaith dialogue, emphasizing his role in fostering understanding."}, {"text": "His role in establishing the first interfaith monastery in the United States.", "isCorrect": false, "rationale": "The text does not mention Merton establishing an interfaith monastery."}], "id": "q10"}, {"question": "Thomas Merton was a cloistered monk who wrote about nuclear weapons, racial injustice, and interfaith dialogue from inside an enclosed monastery. What does this combination suggest about his understanding of the relationship between contemplation and the world?", "options": [{"text": "That genuine contemplation inevitably produces indifference to the world's suffering, as the monk's attention is wholly directed toward God.", "isCorrect": false, "rationale": "Merton's activism runs directly counter to the idea of contemplative indifference. The text states he 'wrote passionately against nuclear weapons and racial injustice,' demonstrating that his interior life sharpened rather than dulled his concern for the world."}, {"text": "That Merton had effectively abandoned the contemplative vocation in his later years in order to become a social activist.", "isCorrect": false, "rationale": "The text presents his advocacy as flowing from and consistent with his monastic life, not as a departure from it. He remained at Gethsemani until his death."}, {"text": "That authentic contemplation deepens rather than narrows one's attention to the world — the monk who truly sees God also sees human dignity more clearly.", "isCorrect": true, "rationale": "Merton believed the monastery was 'not an escape from the world but a way of seeing the world more clearly.' His social writing was not a contradiction of his contemplative life but an expression of it — the clarity gained in silence produced a heightened perception of injustice."}, {"text": "That the monastery's rules had changed to permit monks to comment on public affairs, which Merton was simply taking advantage of.", "isCorrect": false, "rationale": "The text presents Merton's engagement as driven by personal conviction and his abbot's partial tolerance of it, not as a rule change that opened the door to general social commentary."}], "id": "q11"}, {"question": "The Seven Storey Mountain, published in 1948, became an unlikely bestseller for a book about a man who had chosen to disappear from public life. What does its extraordinary reception suggest about the spiritual hunger of the postwar world?", "options": [{"text": "It suggests that postwar readers were primarily interested in autobiography and celebrity memoir, and Merton's story happened to fit that genre.", "isCorrect": false, "rationale": "If celebrity were the key, a monk who had renounced the world would be an unusual candidate. The text points to Merton's 'brutal honesty about his own spiritual failures' and his wrestling with questions about meaning as the source of the book's appeal."}, {"text": "It suggests that many people in the postwar world shared Merton's sense that the secular promises of progress and achievement had failed — and that his radical choice resonated with their own unnamed longing.", "isCorrect": true, "rationale": "The book appeared in the wake of World War II, at a moment when confidence in secular rationalism and progress had been deeply shaken. Merton's account of choosing silence, solitude, and God over career and comfort spoke to readers who felt the same dissatisfaction but had no framework to name it."}, {"text": "It suggests that readers were primarily drawn to the book's descriptions of Trappist monastic practices, which were largely unknown to the public at the time.", "isCorrect": false, "rationale": "While the monastic detail was novel, the text emphasizes that what resonated was 'the same restlessness, the same search for meaning' — i.e., the spiritual autobiography, not simply the ethnographic novelty."}, {"text": "It suggests that American Catholic publishers had developed effective marketing networks that could guarantee sales for any Catholic-themed memoir.", "isCorrect": false, "rationale": "The text attributes the book's impact to its content and the moment, not to distribution infrastructure."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
