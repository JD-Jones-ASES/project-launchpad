        <a href="../../courses/Monasticism.html">&larr; Back to The Cloister and the Cell (Monasticism)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 9, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central argument presented in the section \"Why Monasticism Matters\"?", "options": [{"text": "Monasticism is an outdated tradition with little relevance in the modern world.", "isCorrect": false, "rationale": "The text explicitly argues the opposite, stating that the monastic witness is 'more urgent than ever' and offers 'a great deal' to modern Christians."}, {"text": "Monastic practices offer valuable spiritual lessons for all Christians, not just those called to religious life.", "isCorrect": true, "rationale": "The section's core message is that monastic practices are 'gifts for the whole Church' and lessons for 'every Christian,' applicable in daily life outside the cloister."}, {"text": "Only those considering a vocation to monastic life need to study the practices described.", "isCorrect": false, "rationale": "The text refutes this, asking 'So what does the monastic tradition have to say to you?' and then proceeding to list practices for 'Every Christian,' regardless of vocation."}, {"text": "The primary purpose of monasticism is to create a separate, more intense form of Christianity.", "isCorrect": false, "rationale": "The text states monks and nuns 'did not invent a separate religion' but lived 'the same Gospel' with intensity, implying their practices are universally applicable within Christianity."}], "id": "q01"}, {"question": "Based on the text, what is a practical first step for a layperson seeking to incorporate the monastic practice of silence into their daily life?", "options": [{"text": "Seek out a desert environment for an extended retreat.", "isCorrect": false, "rationale": "The text explicitly states, 'You do not need to live in a desert to practice silence,' offering a simpler, more accessible alternative."}, {"text": "Dedicate ten minutes daily to quiet contemplation without digital distractions.", "isCorrect": true, "rationale": "The text directly suggests, 'You can begin by setting aside ten minutes each day to sit quietly in the presence of God, without screens, without music, without words.'"}, {"text": "Eliminate all music and conversation from their daily routine.", "isCorrect": false, "rationale": "This is an extreme interpretation not supported by the text, which suggests setting aside specific time for silence rather than total elimination of noise."}, {"text": "Join a contemplative order that prioritizes silent communal prayer.", "isCorrect": false, "rationale": "While a valid way to pursue silence, the question asks for a practical first step for a *layperson* to incorporate it, and the text offers a simpler, individual practice."}], "id": "q02"}, {"question": "What is a fundamental distinction between a Benedictine monk and a Benedictine oblate, according to the provided definition?", "options": [{"text": "Oblates live within the monastery walls, while monks live in the world.", "isCorrect": false, "rationale": "The definition states oblates are laypeople (or diocesan priests/deacons) formally affiliated with a monastery, striving to live the Rule 'in daily life,' implying they do not live within the monastery walls."}, {"text": "Oblates make a formal commitment but do not take monastic vows, unlike monks.", "isCorrect": true, "rationale": "The definition explicitly states, 'Oblates do not take monastic vows, but they make a formal commitment to seek God...' This is the key distinguishing factor."}, {"text": "Monks are typically male, whereas oblates are exclusively female.", "isCorrect": false, "rationale": "The text does not specify gender restrictions for oblates; it refers to 'layperson (or diocesan priest or deacon),' implying both genders can be oblates."}, {"text": "Oblates follow a different spiritual rule entirely, unrelated to Saint Benedict.", "isCorrect": false, "rationale": "The definition clarifies that oblates are 'guided by the Rule' and follow a 'personal rule of life adapted from the Rule of Saint Benedict.'"}], "id": "q03"}, {"question": "Which monastic practice is associated with Guigo II's 'four-rung ladder' of reading, meditation, prayer, and contemplation?", "options": [{"text": "The Divine Office", "isCorrect": false, "rationale": "The Divine Office (Liturgy of the Hours) is a structured daily prayer, distinct from Guigo II's method of engaging with Scripture."}, {"text": "Lectio divina", "isCorrect": true, "rationale": "The text states, 'Lectio divina. Guigo II's four-rung ladder — reading, meditation, prayer, contemplation — is not only for Carthusians in their cells. It is a way of reading Scripture that any Christian can practice.'"}, {"text": "The vow of stabilitas", "isCorrect": false, "rationale": "Stabilitas is the commitment to remain in one place/community, unrelated to a method of reading Scripture."}, {"text": "Evangelical counsel of poverty", "isCorrect": false, "rationale": "The evangelical counsel of poverty relates to renunciation of possessions, not a method for engaging with Scripture."}], "id": "q04"}, {"question": "A person feels restless, constantly seeking new hobbies, friends, and even changing cities, believing this will lead to a more fulfilling life. Which monastic principle from the text would most directly challenge this approach?", "options": [{"text": "Silence, by encouraging withdrawal from external stimuli.", "isCorrect": false, "rationale": "While silence can help with restlessness, the text links 'constant motion and endless options' directly to the principle of stability, not primarily silence."}, {"text": "Simplicity, by challenging attachment to material possessions.", "isCorrect": false, "rationale": "Simplicity addresses material attachments, but the scenario focuses on constant change and seeking newness, which is more directly related to stability."}, {"text": "Stability, which encourages going deeper where one is rather than constantly seeking new experiences.", "isCorrect": true, "rationale": "The text explicitly states that 'Stability... stands in sharp contrast to our culture of constant motion and endless options,' teaching 'holiness is found not by always seeking something new, but by going deeper where we are.'"}, {"text": "Community, by emphasizing the need for support from others.", "isCorrect": false, "rationale": "Community is important for support, but the core issue in the scenario is constant seeking of *new* rather than *deepening* existing connections or places, which is the domain of stability."}], "id": "q05"}, {"question": "According to the text, what single sentence from the Rule of Saint Benedict is considered the heart of the Rule and sums up the entire monastic tradition?", "options": [{"text": "Ora et labora (Pray and work).", "isCorrect": false, "rationale": "While 'Ora et labora' is a well-known Benedictine motto, the text specifically identifies 'Prefer nothing to the love of Christ' as the summary statement from Chapter 4, verse 21."}, {"text": "Listen with the ear of your heart.", "isCorrect": false, "rationale": "This is a quote from the Prologue of the Rule, but the text highlights Chapter 4, verse 21 as the 'heart of the Rule.'"}, {"text": "Prefer nothing to the love of Christ.", "isCorrect": true, "rationale": "The text states, 'Among them, almost hidden in the list, is a single sentence that sums up everything the monastic tradition has to teach: Prefer nothing to the love of Christ.' It further notes this phrase is 'often considered the heart of the Rule.'"}, {"text": "Let all guests be received as Christ.", "isCorrect": false, "rationale": "This is an important aspect of Benedictine hospitality, but the text points to a different quote as the ultimate summary of the tradition."}], "id": "q06"}, {"question": "The text refers to 'the parish, the family, the circle of friends' as 'monasteries' for most Christians. What central monastic value does this comparison highlight?", "options": [{"text": "The importance of individual asceticism.", "isCorrect": false, "rationale": "The comparison emphasizes communal settings, contrasting with individual asceticism, though asceticism might be practiced within community."}, {"text": "The necessity of living in a geographically fixed location.", "isCorrect": false, "rationale": "While stability is a monastic value, the analogy with parish/family/friends emphasizes the *relational* aspect of community, not primarily geographic fixity."}, {"text": "The essential need for mutual support and spiritual encouragement within a communal setting.", "isCorrect": true, "rationale": "The text states, 'The cenobitic tradition reminds us that we are not meant to pursue God alone. We need one another — for support, for correction, for encouragement.' The analogy reinforces this idea of finding spiritual growth within existing communities."}, {"text": "The practice of structuring one's day around formal prayer.", "isCorrect": false, "rationale": "While daily prayer is a monastic practice, the analogy with 'parish, family, friends' specifically relates to the principle of 'Community.'"}], "id": "q07"}, {"question": "Which Pope, in his apostolic exhortation *Verbum Domini*, strongly encouraged all Catholics to practice *lectio divina*?", "options": [{"text": "Pope John Paul II", "isCorrect": false, "rationale": "The text specifically attributes this encouragement to Pope Benedict XVI, not Pope John Paul II."}, {"text": "Pope Francis", "isCorrect": false, "rationale": "The text specifies Pope Benedict XVI and his 2010 exhortation, predating Pope Francis's pontificate."}, {"text": "Pope Benedict XVI", "isCorrect": true, "rationale": "The text explicitly states: 'Pope Benedict XVI, in his apostolic exhortation Verbum Domini (2010), strongly encouraged all Catholics to practice lectio divina.'"}, {"text": "Pope Paul VI", "isCorrect": false, "rationale": "The text specifies Pope Benedict XVI and his 2010 exhortation, which is much later than Pope Paul VI's pontificate."}], "id": "q08"}, {"question": "A young professional finds it difficult to focus due to constant notifications and the demands of digital communication. Which monastic practice is presented as particularly urgent and beneficial for overcoming such modern distractions?", "options": [{"text": "Lectio divina, to deepen their understanding of Scripture.", "isCorrect": false, "rationale": "While beneficial, lectio divina primarily addresses engagement with Scripture. The direct solution for 'constant notifications' and 'noise' is silence."}, {"text": "Simplicity, to reduce their material possessions.", "isCorrect": false, "rationale": "Simplicity addresses material attachments, not specifically the digital distractions and noise described in the scenario."}, {"text": "Silence, to create a space for hearing God amidst constant noise.", "isCorrect": true, "rationale": "The text states: 'In a world saturated with noise — social media, streaming, constant notifications — the monastic witness to silence is more urgent than ever.'"}, {"text": "Community, to find support from others in similar situations.", "isCorrect": false, "rationale": "Community offers support, but the core issue of overwhelming digital noise and difficulty focusing is addressed by the practice of silence."}], "id": "q09"}, {"question": "Considering all the monastic practices discussed (silence, prayer, lectio divina, simplicity, stability, community), what is the overarching aim for lay Christians incorporating these 'gifts for the whole Church' into their lives?", "options": [{"text": "To achieve a level of spiritual perfection typically reserved for those in monastic orders.", "isCorrect": false, "rationale": "The text frames these practices as applicable to 'every Christian' and emphasizes putting God first, not attaining an exclusive 'perfection' tied to monastic orders."}, {"text": "To structure their daily lives with the same rigidity as a monastic community.", "isCorrect": false, "rationale": "The text offers adaptations (e.g., 'even briefly' for prayer, 'ten minutes' for silence) for laypeople, not strict replication of monastic rigidity."}, {"text": "To develop a deeper personal spirituality that allows them to withdraw from the demands of the world.", "isCorrect": false, "rationale": "The text explicitly states, 'The monastic tradition does not ask you to leave the world, unless God calls you to do so,' but rather to put God first within the world."}, {"text": "To cultivate a life where the love of Christ is prioritized above all other comforts, ambitions, or distractions.", "isCorrect": true, "rationale": "The concluding reflection states the tradition asks 'to put God first. To prefer nothing — no comfort, no ambition, no pleasure, no distraction — to the love of Christ.' This is the ultimate aim of incorporating the wisdom presented."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
