<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary motivation for thousands of men and women to enter the Egyptian desert in the third and fourth centuries?", "options": [{"text": "To escape the harsh climate and economic difficulties of urban centers like Alexandria.", "isCorrect": false, "rationale": "The text states Alexandria was a 'wealthiest and most important provinces' and 'center of learning, commerce, and culture,' making this reason unlikely. The desert was chosen for spiritual, not economic, reasons."}, {"text": "To seek God with absolute seriousness and avoid the worldly compromises of the increasingly comfortable Church after the end of persecution.", "isCorrect": true, "rationale": "The text explicitly states they sought God with 'absolute seriousness' and later details how monasticism emerged as a 'white martyrdom' when 'comfortable Christianity replaced the radical commitment of the age of martyrs' after Constantine's Edict of Milan."}, {"text": "To establish new agricultural communities in the fertile oases of the 'Red Land'.", "isCorrect": false, "rationale": "The text describes the 'Red Land' as 'barren wilderness' and a 'harsh' landscape, making it unsuitable for agriculture. Their purpose was spiritual, not agricultural."}, {"text": "To continue the tradition of martyrdom, which was still widely practiced in the desert regions.", "isCorrect": false, "rationale": "The text states that 'persecution ended almost overnight' with the Edict of Milan in AD 313, meaning martyrdom was no longer the primary call. Monasticism was a *new* way to give one's life to God, described as a 'white martyrdom' rather than traditional martyrdom."}], "id": "q01"}, {"question": "The city of Alexandria played several significant roles in early Christian history, according to the text. Which of the following statements about Alexandria is FALSE?", "options": [{"text": "It was the traditional location where St. Mark the Evangelist first brought Christianity to Egypt.", "isCorrect": false, "rationale": "The text states, 'Tradition holds that St. Mark the Evangelist brought the faith to Alexandria around AD 49,' making this statement true."}, {"text": "It was home to a famous catechetical school that trained future Church leaders.", "isCorrect": false, "rationale": "The text mentions, 'By the second century, Alexandria boasted a famous catechetical school — a kind of theological university — where great teachers like Clement of Alexandria and Origen instructed converts and trained future leaders of the Church,' making this statement true."}, {"text": "It was the primary intellectual capital where the 'Sayings of the Fathers' (Apophthegmata Patrum) were originally compiled.", "isCorrect": true, "rationale": "While Alexandria was an intellectual center, the 'Sayings of the Fathers' were collected from the oral tradition of monks and nuns living in the *desert*, not primarily compiled in Alexandria itself, though they would have been transmitted there."}, {"text": "It was the city where the Hebrew Scriptures were translated into Greek, known as the Septuagint.", "isCorrect": false, "rationale": "The text notes that 'Alexandria had also become home to a large and vibrant Jewish community, and it was here that the Hebrew Scriptures had been translated into Greek (the Septuagint) centuries before,' making this statement true."}], "id": "q02"}, {"question": "The early Christians viewed the desert as having a powerful symbolic meaning. Which biblical parallels did they draw to understand the significance of the desert?", "options": [{"text": "The Garden of Eden, symbolizing a return to primal innocence.", "isCorrect": false, "rationale": "The text contrasts the desert with fertile land and describes it as a place of testing, not innocence or paradise. The Garden of Eden does not fit the description."}, {"text": "The Promised Land, representing a final destination of peace and prosperity.", "isCorrect": false, "rationale": "The text describes the desert as 'dangerous and empty' and a 'place of testing,' which is contrary to the concept of the Promised Land as a destination of peace and prosperity."}, {"text": "The place where Israel wandered for forty years and where Jesus was tempted by the devil.", "isCorrect": true, "rationale": "The text explicitly states: 'For the early Christians, the desert would take on a powerful symbolic meaning: it was the place of testing, the place where Israel had wandered for forty years, the place where Jesus Himself had fasted and been tempted by the devil (Matt. 4:1–11, DR).'"}, {"text": "The site of the building of the Tower of Babel, signifying human ambition and failure.", "isCorrect": false, "rationale": "The text makes no mention of the Tower of Babel in relation to the desert's symbolic meaning for early Christians. The focus is on testing, wandering, and meeting God."}], "id": "q03"}, {"question": "The Edict of Milan (AD 313) fundamentally altered the context for Christian life in the Roman Empire. How did this shift indirectly contribute to the rise of monasticism?", "options": [{"text": "It outlawed all forms of communal religious living, forcing devout Christians into solitary retreat.", "isCorrect": false, "rationale": "The Edict of Milan granted legal toleration to Christianity, encouraging, not outlawing, communal religious living. It made Christianity safe, rather than forcing solitude."}, {"text": "It mandated that all Roman citizens convert to Christianity, leading many to seek refuge in the desert.", "isCorrect": false, "rationale": "The Edict granted toleration, not a mandate for conversion. While Christianity later became favored, it wasn't immediately mandated for all citizens by this Edict."}, {"text": "It removed the external pressure of persecution, allowing worldliness to creep into the Church and prompting some to seek radical commitment in the desert.", "isCorrect": true, "rationale": "The text states, 'Persecution ended almost overnight... Worldliness crept in. Comfortable Christianity replaced the radical commitment of the age of martyrs.' This created a 'new problem' that led some to seek 'white martyrdom' in the desert."}, {"text": "It encouraged the emperor to sponsor the construction of large desert monasteries as a show of imperial piety.", "isCorrect": false, "rationale": "While Constantine supported Christianity, the Edict itself didn't directly lead to imperial sponsorship of desert monasteries. Monasticism arose from individuals seeking spiritual rigor, not primarily imperial patronage."}], "id": "q04"}, {"question": "The concept of 'white martyrdom' emerged after the age of persecution. Which of the following best describes its meaning in the context of early monasticism?", "options": [{"text": "It referred to dying for one's faith in the arena while wearing white robes.", "isCorrect": false, "rationale": "This definition refers to traditional martyrdom, which often involved public execution, but the text defines 'white martyrdom' as a *replacement* for traditional martyrdom, not a specific type of it."}, {"text": "It signified a daily dying to self, comfort, and the world for the love of Christ, when traditional martyrdom was no longer possible.", "isCorrect": true, "rationale": "The key concept box explicitly states: 'The monastic life became, in a sense, a \"white martyrdom\" — a daily dying to self, to comfort, and to the world, for the love of Christ,' precisely addressing the context of traditional martyrdom no longer being possible."}, {"text": "It was the practice of painting oneself white to symbolize spiritual purity.", "isCorrect": false, "rationale": "The text describes a spiritual practice, not a literal physical one like painting oneself. This is a misinterpretation of the metaphorical 'white.'"}, {"text": "It indicated a less severe form of persecution, where Christians suffered but were not killed.", "isCorrect": false, "rationale": "The 'white martyrdom' emerged *after* persecution ended, as a *voluntary* spiritual discipline, not a lesser form of external suffering imposed by authorities."}], "id": "q05"}, {"question": "St. Anthony is traditionally called 'the Father of Monasticism.' What pivotal event, described in the text, directly led him to embrace his solitary ascetic life?", "options": [{"text": "He experienced a vivid dream in which Christ commanded him to live in the desert.", "isCorrect": false, "rationale": "The text does not mention a dream. His inspiration was a direct encounter with Scripture."}, {"text": "He was exiled to the desert by Roman authorities during the Diocletianic persecution.", "isCorrect": false, "rationale": "Anthony withdrew voluntarily. While he lived through the persecution, his initial withdrawal was a personal spiritual choice, not an exile imposed by authorities."}, {"text": "He heard the Gospel reading of Matthew 19:21 and took its words as a personal command from God.", "isCorrect": true, "rationale": "The text clearly states: 'Shortly afterward, Anthony entered a church and heard the Gospel reading of Matt. 19:21. He took the words as a personal command from God. He sold his property, provided for his sister, gave the rest to the poor, and withdrew into solitude.'"}, {"text": "He sought refuge in the desert after losing his family and estate to a natural disaster.", "isCorrect": false, "rationale": "His parents died, but he inherited a 'large estate,' which he sold, meaning loss of property was a choice for spiritual reasons, not a disaster."}], "id": "q06"}, {"question": "The 'Life of Saint Anthony' by St. Athanasius was immensely influential. What made this biography so significant in Christian history?", "options": [{"text": "It contained the first detailed theological arguments against the Arian heresy.", "isCorrect": false, "rationale": "Athanasius was known for fighting Arianism, but the 'Life of Saint Anthony' primarily served as a monastic biography and spiritual inspiration, not a theological treatise against Arianism. His theological works addressed Arianism, but this specific book focused on Anthony's life."}, {"text": "It became the official rule for all subsequent cenobitic monasteries in the Roman Empire.", "isCorrect": false, "rationale": "The 'Life of Saint Anthony' describes an eremitic (solitary) life and is a biography, not a monastic rule. Pachomius and later Benedict wrote rules for communal living."}, {"text": "It established Alexandria as the undisputed center of Christian pilgrimage.", "isCorrect": false, "rationale": "While Anthony became famous, the text does not state that his biography established Alexandria as the *undisputed* center of pilgrimage. The book itself inspired imitation of Anthony's lifestyle wherever it spread."}, {"text": "It served as the prototype for all monastic biographies, inspiring countless individuals to imitate Anthony's ascetic example.", "isCorrect": true, "rationale": "The text states: 'It is the prototype of all monastic biography — and it would be imitated, in one form or another, for over a thousand years.' It 'inspired men and women to imitate Anthony's example.'"}], "id": "q07"}, {"question": "St. Pachomius addressed a different need in the early monastic movement compared to St. Anthony. What was Pachomius's primary contribution?", "options": [{"text": "He developed the 'eight deadly thoughts' as a framework for spiritual self-examination.", "isCorrect": false, "rationale": "Evagrius Ponticus, not Pachomius, developed the 'eight deadly thoughts' as mentioned later in the text."}, {"text": "He advocated for a return to traditional martyrdom as the highest form of Christian devotion.", "isCorrect": false, "rationale": "Pachomius lived after the age of persecution; his focus was on communal monasticism, not traditional martyrdom."}, {"text": "He founded the first organized monastic community (cenobium) with a common rule, recognizing that not everyone was suited for solitary life.", "isCorrect": true, "rationale": "The text clearly states: 'But not everyone was suited to the solitary life. Some monks needed structure, community, and a rule to follow. The man who answered this need was St. Pachomius... Around AD 320, Pachomius founded the first organized monastic community — a cenobium — at Tabennisi on the Nile.'"}, {"text": "He became the first bishop of Alexandria and championed orthodox Trinitarian theology.", "isCorrect": false, "rationale": "St. Athanasius was the champion of orthodox Trinitarian theology and bishop of Alexandria. Pachomius was a monk who founded communities."}], "id": "q08"}, {"question": "The text describes two main 'streams' of monastic life originating from the Egyptian desert: eremitic and cenobitic. How do these two forms primarily differ?", "options": [{"text": "Eremitic monks were educated, while cenobitic monks were unlettered and focused solely on manual labor.", "isCorrect": false, "rationale": "The text does not specify educational differences. The distinction is about living arrangements and community structure, not literacy or type of labor."}, {"text": "Eremitic monasticism involved monks living alone in solitude, while cenobitic monasticism involved monks living together under a common rule.", "isCorrect": true, "rationale": "The definitions provided are: 'Eremite: ...A monk who lives alone, in solitude.' and 'Cenobium: ...A monastery where monks live together under a common rule and a common superior.' This is the core distinction."}, {"text": "Eremitic monks lived in cities, advocating for social justice, while cenobitic monks withdrew entirely from society.", "isCorrect": false, "rationale": "Both forms were largely about withdrawing from 'the world' or society. Eremitic monks lived in the desert, not cities, and neither is primarily described as advocating for social justice in this context."}, {"text": "Eremitic monasticism focused on intellectual study, whereas cenobitic monasticism emphasized physical austerities and fasting.", "isCorrect": false, "rationale": "Both forms involved prayer, fasting, and spiritual discipline. The primary difference is the solitary vs. communal living arrangement, not the *type* of spiritual practice or emphasis."}], "id": "q09"}, {"question": "The Desert Fathers and Mothers are known for their wisdom preserved in the Apophthegmata Patrum. Which of the following figures is correctly matched with their notable contribution or characteristic?", "options": [{"text": "Amma Syncletica: Systematized the 'eight deadly thoughts' and developed a psychology of the spiritual life.", "isCorrect": false, "rationale": "Evagrius Ponticus, not Amma Syncletica, systematized the 'eight deadly thoughts.' Amma Syncletica was known for her sayings on discipline and for being a prominent Desert Mother."}, {"text": "Abba Moses the Black: Emphasized humility and repentance, given his past as a former Ethiopian slave and bandit.", "isCorrect": true, "rationale": "The text states: 'Abba Moses the Black (c. 330–405): A former Ethiopian slave and bandit who converted to Christianity and became one of the most respected monks in the desert. His sayings emphasize humility, repentance, and the mercy of God — themes that took on special depth given his violent past.'"}, {"text": "Evagrius Ponticus: Known for his sayings marked by gentleness, compassion, and practical wisdom, often called 'shepherd.'", "isCorrect": false, "rationale": "Abba Poemen is described as having his name mean 'shepherd' and whose sayings 'are marked by gentleness, compassion, and practical wisdom.' Evagrius was known for the 'eight deadly thoughts.'"}, {"text": "Abba Poemen: Founded the first cenobitic monasteries for men and women.", "isCorrect": false, "rationale": "St. Pachomius founded the first cenobitic monasteries. Abba Poemen was known for his gentle sayings and practical wisdom."}], "id": "q10"}, {"question": "The text states that by the late fourth century, the monastic movement had spread to Palestine, Syria, Cappadocia, and beyond. St. Basil the Great visited Egyptian monks and then organized Eastern monasticism differently. How did his approach differ from the Egyptian model?", "options": [{"text": "He rejected communal life entirely in favor of the purely eremitic model of Anthony of Egypt.", "isCorrect": false, "rationale": "The text says Basil organized monasticism 'on a more structured, communal model,' indicating he favored community over pure eremitism."}, {"text": "He organized monasticism on a more structured, communal model whose rules remain foundational for Eastern Orthodox monasticism today.", "isCorrect": true, "rationale": "The text explicitly states: 'St. Basil the Great... visited the monks of Egypt and then organized monasticism in the East on a more structured, communal model. His monastic rules remain the foundation of Eastern Orthodox monasticism to this day.'"}, {"text": "He wrote a new eremitic rule designed exclusively for Egyptian hermits living in the desert.", "isCorrect": false, "rationale": "Basil worked in Cappadocia (modern Turkey) and organized a communal model, not an eremitic one for Egypt."}, {"text": "He translated the Egyptian monks' oral tradition into Greek for use in Western Europe.", "isCorrect": false, "rationale": "The text credits John Cassian, not Basil, with transmitting Eastern wisdom to the West. Basil organized Eastern monasticism for Eastern communities."}], "id": "q11"}, {"question": "The Coptic Church dates its calendar from AD 284. What does this practice reveal about the early history of Egyptian Christianity?", "options": [{"text": "That 284 AD marks the founding of the first Christian church in Egypt by St. Mark.", "isCorrect": false, "rationale": "Tradition holds that St. Mark brought the faith to Alexandria around AD 49, not 284. The Coptic calendar begins in 284 for a different reason."}, {"text": "That the Coptic Church commemorates the start of Diocletian's reign as the 'Era of the Martyrs,' honoring thousands who died for the faith.", "isCorrect": true, "rationale": "The text explains: 'The Coptic calendar, used by the Coptic Orthodox Church of Egypt, begins its year count from the accession of Diocletian, in memory of the thousands of Egyptian Christians who died for their faith during his reign.'"}, {"text": "That 284 AD marks when Constantine granted toleration to Christianity in Egypt.", "isCorrect": false, "rationale": "The Edict of Milan granting toleration was issued in 313 AD by Constantine. The year 284 marks the beginning of Diocletian's reign and his subsequent persecution, not toleration."}, {"text": "That 284 AD was when the first monastery was established in the Egyptian desert.", "isCorrect": false, "rationale": "The text does not identify 284 AD as the founding date of the first monastery. The Coptic calendar uses this date to honor martyrs, not to commemorate a monastic foundation."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
