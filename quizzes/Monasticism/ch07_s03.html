        <a href="../../courses/Monasticism.html">&larr; Back to The Cloister and the Cell (Monasticism)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Guigo II's framework, what is the primary goal of the Lectio stage in lectio divina?", "options": [{"text": "To quickly read through a large portion of Scripture to cover ground.", "isCorrect": false, "rationale": "The text explicitly states the goal is 'not to cover ground but to encounter the living Word of God,' comparing it to tasting food rather than gulping it down."}, {"text": "To encounter the living Word of God through slow, attentive reading.", "isCorrect": true, "rationale": "The text defines Lectio as reading 'slowly and attentively' with the goal 'to encounter the living Word of God,' likened to placing food in the mouth."}, {"text": "To analyze the text for its historical and theological context.", "isCorrect": false, "rationale": "While important, this analytical process is more characteristic of Meditatio, which involves 'pondering their meaning' and 'chewing on them,' rather than the initial attentive reading of Lectio."}, {"text": "To prepare the mind for spontaneous prayer to God.", "isCorrect": false, "rationale": "Preparing for spontaneous prayer is the outcome of Meditatio and the essence of Oratio, not the primary goal of Lectio itself."}], "id": "q01"}, {"question": "Guigo II compares Meditatio to 'chewing and breaking the food apart.' What aspect of engaging with Scripture does this metaphor primarily emphasize?", "options": [{"text": "The immediate enjoyment and sweetness derived from God's word.", "isCorrect": false, "rationale": "The sweetness released is compared to Oratio (prayer), not Meditatio (meditation)."}, {"text": "The systematic study and memorization of scriptural passages.", "isCorrect": false, "rationale": "While one might recall passages, the focus is on 'pondering their meaning' and 'digesting the Word of God slowly,' which is more reflective than systematic memorization or academic study."}, {"text": "The internal processing and pondering of the meaning of the words.", "isCorrect": true, "rationale": "The text describes Meditatio as turning words over in one's mind, 'pondering their meaning, chewing on them as a cow chews the cud,' emphasizing digestion and extraction of nourishment."}, {"text": "The act of sharing insights from the Scripture with others in the community.", "isCorrect": false, "rationale": "Lectio divina, particularly Meditatio, is described as a solitary internal process for the monk, not a communal sharing activity."}], "id": "q02"}, {"question": "A monk has diligently practiced Lectio, Meditatio, and Oratio, experiencing profound responses of the heart. According to the text, what might prevent him from immediately progressing to Contemplatio?", "options": [{"text": "A lack of intellectual understanding of the scriptural passage.", "isCorrect": false, "rationale": "Contemplatio transcends words and reasoning; a lack of intellectual understanding wouldn't be the primary barrier, especially after Meditatio and Oratio."}, {"text": "The absence of a physical community to guide him to that stage.", "isCorrect": false, "rationale": "Contemplation is described as God drawing the soul upward, a personal gift, not something dependent on communal guidance to achieve directly."}, {"text": "Contemplatio is not within the monk's power to achieve by effort, but is a divine gift.", "isCorrect": true, "rationale": "The text clearly states: 'Contemplation is a gift. It comes from God, not from human effort. ...Contemplation is always an act of divine grace.'"}, {"text": "He has not yet spent enough years in a cenobitic monastery.", "isCorrect": false, "rationale": "Years in a cenobitic monastery are a prerequisite for Benedictine hermits to prevent spiritual dangers, but not a direct requirement for experiencing Contemplatio within Guigo's ladder, which is a progression of prayer."}], "id": "q03"}, {"question": "What core principle defines the Carthusian 'semi-eremitic' life, addressing the pitfalls of both pure solitude and active community life?", "options": [{"text": "Emphasizing communal service and evangelization above all else.", "isCorrect": false, "rationale": "This describes an 'active life' model, which is distinct from the Carthusian radical contemplative focus."}, {"text": "Living entirely as hermits without any communal support or structure.", "isCorrect": false, "rationale": "This describes pure eremitic life, which the text notes was 'spiritually dangerous' without community structure."}, {"text": "Combining individual hermitage with structured community gatherings and support.", "isCorrect": true, "rationale": "The text defines semi-eremitic as 'combines elements of both the hermit (eremitic) and the community (cenobitic) life,' where 'each monk lives as a hermit in his own cell, yet belongs to a community.'"}, {"text": "Prioritizing academic study and teaching as the primary monastic work.", "isCorrect": false, "rationale": "While Carthusians may engage in intellectual labor, their primary calling is prayer and contemplation, not academic teaching as a defining characteristic of their structure."}], "id": "q04"}, {"question": "Saint Benedict's Rule describes hermits as those who 'have come through the test of living in a monastery for a long time.' What danger was Benedict primarily trying to mitigate by this requirement?", "options": [{"text": "The risk of hermits becoming too comfortable and losing their spiritual rigor.", "isCorrect": false, "rationale": "The text does not mention comfort or loss of rigor as Benedict's primary concern; it focuses on the spiritual pitfalls of unsupported solitude."}, {"text": "The spiritual dangers of delusion, pride, or despair that can arise from pure solitude.", "isCorrect": true, "rationale": "The text explicitly states: 'The Desert Fathers had discovered that pure solitude... was spiritually dangerous. Hermits who lived entirely alone could fall into delusion, pride, or despair.'"}, {"text": "The potential for hermits to neglect their physical health without communal oversight.", "isCorrect": false, "rationale": "While physical well-being might be a secondary concern, the text highlights the spiritual dangers as the primary reason for Benedict's rule regarding hermits."}, {"text": "The difficulty of managing resources and supplies for solitary individuals.", "isCorrect": false, "rationale": "This is a practical concern, but not the 'danger' Saint Benedict was primarily addressing regarding the formation of hermits as described in the text."}], "id": "q05"}, {"question": "A distinctive feature of the Carthusian cell is its 'hatch in the wall.' What is the primary function of this architectural element?", "options": [{"text": "To allow monks to communicate verbally with each other without leaving their cells.", "isCorrect": false, "rationale": "The Carthusian life emphasizes profound silence and minimal verbal communication; a hatch for conversation would contradict this."}, {"text": "To provide a small window for natural light and fresh air into the cell.", "isCorrect": false, "rationale": "While cells would have windows, the specific 'hatch in the wall' is described with a different, specialized function."}, {"text": "To enable food delivery while minimizing personal interaction and preserving solitude.", "isCorrect": true, "rationale": "The text explicitly states, 'A small hatch in the wall allows food to be passed from the kitchen without the monk needing to leave his cell or see another person.'"}, {"text": "To serve as a confessional for spiritual guidance from the prior.", "isCorrect": false, "rationale": "The text does not describe the hatch as serving this purpose; confessions would likely happen in person during communal gatherings or specific appointments."}], "id": "q06"}, {"question": "A Carthusian monk chooses to remain silent not just during designated periods, but as a continuous 'way of life.' This profound commitment to silence is best understood as:", "options": [{"text": "A form of punishment for minor infractions of the monastic rule.", "isCorrect": false, "rationale": "Silence is presented as a spiritual discipline and a path to God, not a punitive measure."}, {"text": "A practical means to avoid distractions and ensure peaceful sleep.", "isCorrect": false, "rationale": "While it contributes to avoiding distractions, the text emphasizes a deeper, spiritual meaning beyond mere practicality."}, {"text": "A spiritual poverty that empties oneself of words to make space for the Word of God.", "isCorrect": true, "rationale": "The text states: 'He empties himself of words so that the Word of God can fill him,' likening it to a 'form of spiritual poverty' and a 'listening' rather than speaking."}, {"text": "A technique to gain intellectual clarity for theological study and writing.", "isCorrect": false, "rationale": "The Carthusian silence goes beyond intellectual pursuits, aiming for a direct encounter with God that transcends words and thoughts."}], "id": "q07"}, {"question": "The text states, 'The contemplative life, in the Catholic tradition, is not the only good life, but it is, in a special sense, the highest.' Immediately following this, a 'caution' emphasizes that 'Holiness is measured by charity... not by one's state of life.' What is the primary purpose of this caution?", "options": [{"text": "To suggest that the active life is ultimately superior because it directly serves others.", "isCorrect": false, "rationale": "The caution states 'both lives are genuine paths to holiness,' not that one is ultimately superior over the other in terms of individual holiness."}, {"text": "To clarify that the contemplative life is only for a select few, and not a universal call.", "isCorrect": false, "rationale": "While the radical Carthusian life is for a few, the caution's primary point is about the *measurement of holiness*, not the universality of the call."}, {"text": "To prevent the misconception that contemplative monks are inherently holier than active Christians.", "isCorrect": true, "rationale": "The caution directly addresses this, stating, 'This does not mean that contemplatives are holier than active Christians. Holiness is measured by charity... not by one's state of life.'"}, {"text": "To encourage monks to engage more in active service alongside their prayer.", "isCorrect": false, "rationale": "The caution encourages most Christians to blend both active and contemplative elements, but it doesn't advise Carthusians, who have chosen a radical contemplative path, to change their specific vocation."}], "id": "q08"}, {"question": "According to the text, what is the 'sole work' that defines the Carthusian order's mission in the Church?", "options": [{"text": "Establishing schools and hospitals to serve the local community.", "isCorrect": false, "rationale": "The text explicitly states: 'They do not run schools, parishes, or hospitals.'"}, {"text": "Preaching and evangelizing to spread the Christian faith.", "isCorrect": false, "rationale": "The text states: 'They do not preach or teach.'"}, {"text": "Dedicated prayer and intercession for the whole Church and the world.", "isCorrect": true, "rationale": "The text clearly states: 'Their sole work — the work for which the Church has set them apart — is prayer. They pray for the whole Church and for the whole world.'"}, {"text": "Copying ancient manuscripts and engaging in theological scholarship.", "isCorrect": false, "rationale": "While monks may engage in such intellectual labor as work in their cells, it is not described as their 'sole work' or primary mission for the Church."}], "id": "q09"}, {"question": "Despite their chosen life of deliberate obscurity, the Carthusians have exerted 'immense' influence on the Catholic spiritual tradition. What is highlighted as their most significant and widespread legacy?", "options": [{"text": "Their development of unique architectural styles for monasteries and cells.", "isCorrect": false, "rationale": "While their architecture is distinctive, it is not cited as their 'immense' and 'widespread' spiritual legacy for the broader Church."}, {"text": "Their radical approach to silence, adopted by many other monastic orders.", "isCorrect": false, "rationale": "While their silence is profound, the text emphasizes a different, more universally applied practice as their 'most significant and widespread' legacy."}, {"text": "Guigo II's framework for lectio divina, which is now recommended to all Catholics.", "isCorrect": true, "rationale": "The text concludes: 'Guigo II's Ladder of Monks gave the Church its classic framework for lectio divina — a practice that has spread far beyond the cloister and is now recommended to all Catholics.'"}, {"text": "Their role in founding numerous new religious orders throughout history.", "isCorrect": false, "rationale": "The text does not mention the Carthusians being prominent founders of other religious orders; their influence is primarily spiritual."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
