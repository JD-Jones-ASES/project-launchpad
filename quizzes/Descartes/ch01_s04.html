<script>
var QUESTIONS = [{"question": "Why does the text emphasize reading the Meditations slowly?", "options": [{"text": "To appreciate the poetic language used by Descartes.", "isCorrect": false, "rationale": "The Meditations is described as an 'argument — a sustained chain of reasoning,' not a poem. The primary reason for slow reading is the complex logical structure, not poetic language."}, {"text": "Because it is a sustained chain of reasoning where each step is interdependent.", "isCorrect": true, "rationale": "The text explicitly states: 'It is an argument — a sustained chain of reasoning in which each step depends on the steps before it. Reading quickly will produce only confusion.'"}, {"text": "To allow time for personal reflection on one's own life experiences.", "isCorrect": false, "rationale": "While 'playing along' involves engagement, the primary reason for slow reading is the book's argumentative structure, not general personal reflection."}, {"text": "Due to the archaic nature of the Haldane translation.", "isCorrect": false, "rationale": "The archaic style is mentioned as a potential difficulty, but the fundamental reason for slow reading is the nature of Descartes' argument itself."}], "id": "q01"}, {"question": "According to the text, what is the most significant benefit of 'playing along' and actively participating in the Meditations?", "options": [{"text": "It helps the reader identify historical inaccuracies in Descartes' philosophical journey.", "isCorrect": false, "rationale": "The instruction to 'play along' focuses on engaging with philosophical arguments and thought experiments themselves, not on historical critique."}, {"text": "It ensures the reader can quickly complete the book and move on to other works.", "isCorrect": false, "rationale": "This contradicts the advice to 'read slowly' and to 'not move on until fully satisfied,' as playing along requires deep engagement."}, {"text": "It allows the reader to personally experience the philosophical power and implications of the arguments.", "isCorrect": true, "rationale": "The text states: 'The power of the Meditations comes from participation. A reader who simply watches from the outside will miss most of what makes it philosophically interesting.'"}, {"text": "It demonstrates the meditator's flaws and limitations as a philosophical inquirer.", "isCorrect": false, "rationale": "While the text mentions 'dramatic irony' between the meditator and author, the benefit of 'playing along' is to personally engage with the arguments and experience their force."}], "id": "q02"}, {"question": "The text describes 'dramatic irony' between the meditator and Descartes the author. How should a reader apply this understanding when encountering a passage where the meditator expresses doubt?", "options": [{"text": "The reader should automatically dismiss the meditator's doubts as irrelevant since Descartes already knows the answers.", "isCorrect": false, "rationale": "Dismissing the meditator's doubts would undermine the literary structure and the intended journey of discovery. The text advises trusting the argument, not ignoring the meditator's process."}, {"text": "The reader should trust the underlying argument's direction, even if the meditator seems uncertain, recognizing it's part of a structured journey.", "isCorrect": true, "rationale": "The text states: 'This means you should trust the argument even when the meditator seems uncertain, and question it when it seems too easy.' The uncertainty is a deliberate part of the dramatic structure."}, {"text": "The reader should interpret the doubt as a signal that the argument itself is fundamentally flawed at that point.", "isCorrect": false, "rationale": "The text advises trusting the argument despite the meditator's uncertainty, implying that the doubt is a narrative device, not an indication of a fundamental flaw."}, {"text": "The reader should pause and research Descartes' personal life to understand the source of his authorial knowledge.", "isCorrect": false, "rationale": "The text's advice focuses on engaging with the book's internal structure and argument, not on external biographical research."}], "id": "q03"}, {"question": "Which Meditation or pair of Meditations is primarily dedicated to establishing God's existence and character within the overall argument?", "options": [{"text": "Meditation I", "isCorrect": false, "rationale": "Meditation I creates 'the crisis: everything can be doubted,' focusing on doubt rather than establishing God's existence."}, {"text": "Meditation II", "isCorrect": false, "rationale": "Meditation II finds 'the first certainty: I exist as a thinking thing' — foundational but not about God's existence."}, {"text": "Meditations III and V", "isCorrect": true, "rationale": "The text clearly states: 'Meditations III and V establish God's existence and character.'"}, {"text": "Meditation VI", "isCorrect": false, "rationale": "Meditation VI is concerned with recovering 'the external world and distinguishing mind from body,' which comes after establishing God's existence."}], "id": "q04"}, {"question": "If a step in Meditation VI appears to introduce a concept without prior explanation, what reading strategy does the text recommend?", "options": [{"text": "Assume Descartes made an error and continue reading, expecting clarification later.", "isCorrect": false, "rationale": "The text emphasizes the continuous and interdependent nature of the argument, stating Descartes 'almost certainly laid the groundwork for it earlier,' not that errors appear and are corrected."}, {"text": "Refer to external scholarly commentaries for an immediate explanation.", "isCorrect": false, "rationale": "While external resources can help, the primary strategy recommended is to re-examine the book itself to find the groundwork already established in earlier Meditations."}, {"text": "Look back at earlier Meditations, as Descartes likely laid the groundwork for it there.", "isCorrect": true, "rationale": "The text states: 'No single Meditation can be fully understood without the others. If a step in Meditation VI seems to come out of nowhere, look back: Descartes almost certainly laid the groundwork for it earlier.'"}, {"text": "Focus only on the content of Meditation VI, as each Meditation is self-contained.", "isCorrect": false, "rationale": "This directly contradicts the explicit statement that 'No single Meditation can be fully understood without the others.'"}], "id": "q05"}, {"question": "What is noted as a key characteristic of Elizabeth S. Haldane's translation of the Meditations?", "options": [{"text": "It is a very modern and conversational translation, easy for contemporary readers.", "isCorrect": false, "rationale": "The text states the Haldane translation uses 'the formal English of the Edwardian era — a style that is sometimes archaic by today's standards,' directly contradicting this."}, {"text": "It prioritizes philosophical precision over stylistic clarity.", "isCorrect": false, "rationale": "The text describes it as 'clear and faithful,' suggesting it balances both — but the key characteristic highlighted is its archaic style."}, {"text": "It uses formal, sometimes archaic, English from the Edwardian era.", "isCorrect": true, "rationale": "The text explicitly states: 'The Haldane translation is clear and faithful, but it uses the formal English of the Edwardian era — a style that is sometimes archaic by today's standards.'"}, {"text": "It was directly translated from Descartes' French revised edition.", "isCorrect": false, "rationale": "The note states: 'Haldane translated from the Latin,' not the French."}], "id": "q06"}, {"question": "Why might footnotes in this volume sometimes refer to Latin terms from Descartes' original text?", "options": [{"text": "To highlight errors or mistranslations in the Haldane version.", "isCorrect": false, "rationale": "The Haldane translation is described as 'clear and faithful.' The purpose of Latin terms is to offer additional precision, not to correct mistakes."}, {"text": "To provide greater philosophical precision that might be lost in translation.", "isCorrect": true, "rationale": "The text states Latin 'sometimes preserves a precision that translation inevitably smooths over,' indicating their use provides a more exact understanding of Descartes' original meaning."}, {"text": "To demonstrate the translator's extensive knowledge of classical languages.", "isCorrect": false, "rationale": "The stated purpose for Latin terms in footnotes is philosophical precision for the reader, not to showcase the translator's abilities."}, {"text": "To encourage readers to learn Latin to fully grasp Descartes' ideas.", "isCorrect": false, "rationale": "The inclusion of Latin terms is to provide additional context and precision for the English reader, not to compel them to learn Latin."}], "id": "q07"}, {"question": "A student reads the Meditations quickly and finds themselves increasingly confused, unable to connect new ideas to previous ones. Which key reading principle would most likely help?", "options": [{"text": "Prioritizing the meditator's journey over the author's intended argument.", "isCorrect": false, "rationale": "The text advises trusting the argument even when the meditator is uncertain — the author's pre-planned argument is paramount."}, {"text": "Resisting the temptation to move on until fully satisfied with what has gone before.", "isCorrect": true, "rationale": "The text warns 'Reading quickly will produce only confusion' and advises the reader to 'not move on until she is fully satisfied with what has gone before.'"}, {"text": "Focusing solely on the modern footnotes to bypass the archaic language.", "isCorrect": false, "rationale": "While footnotes can help with archaic language, the core problem is understanding the 'sustained chain of reasoning,' which requires slow engagement with the main text."}, {"text": "Treating each Meditation as a separate, self-contained philosophical essay.", "isCorrect": false, "rationale": "The text directly refutes this: 'No single Meditation can be fully understood without the others.'"}], "id": "q08"}, {"question": "Given the distinction between the 'meditator' and Descartes the author, how should a reader interpret moments when the meditator appears to arrive at a conclusion 'too easily'?", "options": [{"text": "The reader should accept these conclusions without question, as they represent the author's established truth.", "isCorrect": false, "rationale": "The text advises the opposite: 'question it when it seems too easy,' indicating that apparent ease should prompt critical engagement, not passive acceptance."}, {"text": "The reader should critically examine the argument, as its apparent ease might mask underlying complexities or assumptions.", "isCorrect": true, "rationale": "The text explicitly states: 'question it when it seems too easy.' The dramatic irony means the reader should engage critically with such passages."}, {"text": "The reader should assume the meditator has made a logical leap that Descartes will correct later.", "isCorrect": false, "rationale": "The advice is for the reader to question it themselves in that moment, rather than simply waiting for a future correction within the text."}, {"text": "The reader should consult the French translation, as it might offer a clearer, more direct explanation.", "isCorrect": false, "rationale": "Translation differences address stylistic precision — they would not resolve an issue of argumentative ease that is a deliberate feature of Descartes' narrative design."}], "id": "q09"}, {"question": "A reader encounters the phrase 'it needs must be' in Meditation III and is momentarily confused. What combined approach would be most effective for resolving this difficulty?", "options": [{"text": "Skip the difficult phrase and rely on the overall arc of the Meditations to fill in the gap.", "isCorrect": false, "rationale": "Skipping crucial phrases contradicts the advice to 'read slowly,' 'reread,' and 'resist the temptation to keep going' when a passage is not understood."}, {"text": "Consult the volume's footnotes for a gloss of the phrase, then reread the passage slowly to integrate the argument.", "isCorrect": true, "rationale": "The text states: 'Footnotes throughout this volume will gloss unusual or technical terms as they appear,' and 'When in doubt about the meaning of a passage, slow down and reread; the argument is almost always clearer than the surface style suggests.'"}, {"text": "Immediately refer to the Latin original provided in footnotes to reconstruct the original meaning.", "isCorrect": false, "rationale": "While Latin offers precision, the primary advice for stylistic difficulty is 'slow down and reread.' Latin is for deeper precision, not the first step for archaic English phrasing."}, {"text": "Consider this an example of dramatic irony and trust that Descartes will clarify the concept later.", "isCorrect": false, "rationale": "Dramatic irony pertains to the meditator's journey versus the author's pre-planned argument, not to archaic linguistic phrases. The issue is linguistic comprehension, not a narrative device."}], "id": "q10"}, {"question": "The text distinguishes between the 'meditator' — the first-person voice in the text — and 'Descartes' the author. Why is this distinction important for understanding the Meditations?", "options": [{"text": "Because the meditator makes arguments that Descartes himself ultimately rejects.", "isCorrect": false, "rationale": "The meditator's journey is Descartes' designed path to his conclusions — he does not reject the meditator's conclusions. The distinction is about narrative stance and reader participation, not author-versus-character disagreement."}, {"text": "Because the meditator experiences genuine uncertainty within the text while Descartes as author already knows where the argument leads.", "isCorrect": true, "rationale": "This is the 'dramatic irony' the text describes: the meditator is the character discovering things step by step, while Descartes the author has already worked out the entire argument. Understanding this helps the reader trust the direction even when uncertain."}, {"text": "Because the meditator represents Descartes' early philosophical views that he later revised.", "isCorrect": false, "rationale": "The Meditations is not autobiographical in this sense; the meditator is a literary device for engaging the reader, not a record of Descartes' intellectual development."}, {"text": "Because the distinction identifies which passages are meant to be taken literally versus metaphorically.", "isCorrect": false, "rationale": "The text does not use the meditator/author distinction to separate literal from metaphorical passages. The distinction is about narrative stance and the reader's relationship to the argument."}], "id": "q11"}, {"question": "What does the text mean when it says the Meditations should be read as a 'thought experiment' rather than a report of actual events?", "options": [{"text": "That the philosophical arguments were fabricated and should not be taken seriously.", "isCorrect": false, "rationale": "Calling it a thought experiment does not mean its arguments are fabricated or unserious — thought experiments are a rigorous philosophical tool. The point is about the mode of engagement required."}, {"text": "That the six-day structure is a literary device inviting the reader to conduct the same philosophical experiment in their own mind.", "isCorrect": true, "rationale": "The text explains that 'By casting the argument as an interior monologue, Descartes forces the reader to participate' in conducting 'the experiment yourself.' The six days are a fiction designed to structure this participatory experience."}, {"text": "That readers should evaluate the Meditations using scientific experimental methods.", "isCorrect": false, "rationale": "The thought experiment is philosophical and introspective — it does not require scientific apparatus or empirical observation to evaluate."}, {"text": "That the Meditations was originally written as a fictional novel before being revised into philosophy.", "isCorrect": false, "rationale": "There is no suggestion that the Meditations began as fiction. The 'thought experiment' framing is a description of the intended mode of reader participation."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
