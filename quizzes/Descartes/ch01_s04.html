<script>
var QUESTIONS = [{"question": "Why does the text emphasize reading The Meditations slowly?", "options": [{"text": "To appreciate the poetic language used by Descartes.", "isCorrect": false, "rationale": "The text describes The Meditations as an 'argument — a sustained chain of reasoning,' not a narrative or description, making the primary reason for slow reading the complex logical structure, not poetic language."}, {"text": "Because it is a sustained chain of reasoning where each step is interdependent.", "isCorrect": true, "rationale": "The text explicitly states: 'It is an argument — a sustained chain of reasoning in which each step depends on the steps before it. Reading quickly will produce only confusion.' This highlights the necessity of slow, careful reading to follow the intricate logical progression."}, {"text": "To allow time for personal reflection on one's own life experiences.", "isCorrect": false, "rationale": "While 'playing along' involves personal engagement, the primary reason given for the necessity of slow reading is the book's argumentative structure and the interdependence of its steps, not just general reflection."}, {"text": "Due to the archaic nature of the Haldane translation.", "isCorrect": false, "rationale": "The archaic style of the Haldane translation is mentioned as a potential difficulty, but the fundamental reason for reading slowly is presented as the nature of Descartes' argument itself, which demands careful step-by-step comprehension."}]}, {"question": "According to the text, what is the most significant benefit of 'playing along' and actively participating in The Meditations?", "options": [{"text": "It helps the reader to identify historical inaccuracies in Descartes' philosophical journey.", "isCorrect": false, "rationale": "The instruction to 'play along' focuses on engaging with the philosophical arguments and thought experiments themselves, not on historical critique or identifying inaccuracies."}, {"text": "It ensures the reader can quickly complete the book and move on to other works.", "isCorrect": false, "rationale": "This contradicts the general advice to 'read slowly' and to 'not move on until she is fully satisfied,' as playing along requires deep engagement and can take time."}, {"text": "It allows the reader to personally experience the philosophical power and implications of the arguments.", "isCorrect": true, "rationale": "The text states, 'The power of the Meditations comes from participation. A reader who simply watches from the outside will miss most of what makes it philosophically interesting.' This directly supports the idea that active participation unlocks its philosophical depth."}, {"text": "It demonstrates the meditator's flaws and limitations as a philosophical inquirer.", "isCorrect": false, "rationale": "While the text mentions 'dramatic irony' between the meditator and author, the benefit of 'playing along' is to personally engage with the arguments and experience their force, not to expose the meditator's limitations."}]}, {"question": "The text describes 'dramatic irony' between the meditator and Descartes the author. How should a reader apply this understanding when encountering a passage where the meditator expresses doubt?", "options": [{"text": "The reader should automatically dismiss the meditator's doubts as irrelevant since Descartes already knows the answers.", "isCorrect": false, "rationale": "Dismissing the meditator's doubts would undermine the literary structure and the intended journey of discovery. The text advises trusting the *argument*, not ignoring the meditator's process."}, {"text": "The reader should trust the underlying argument's direction, even if the meditator seems uncertain, recognizing it's part of a structured journey.", "isCorrect": true, "rationale": "The text explicitly states: 'This means you should trust the argument even when the meditator seems uncertain, and question it when it seems too easy.' The uncertainty is a deliberate part of the dramatic structure, leading to a predetermined conclusion by the author."}, {"text": "The reader should interpret the doubt as a signal that the argument itself is fundamentally flawed at that point.", "isCorrect": false, "rationale": "The text advises trusting the argument despite the meditator's uncertainty, implying that the doubt is a narrative device, not an indication of a fundamental flaw in Descartes' pre-planned argument."}, {"text": "The reader should pause and research Descartes' personal life to understand the source of his authorial knowledge.", "isCorrect": false, "rationale": "The text's advice is focused on how to engage with the book's internal structure and argument, not on external biographical research to understand the dramatic irony."}]}, {"question": "Which Meditation, or pair of Meditations, is primarily dedicated to establishing God's existence and character within the overall argument?", "options": [{"text": "Meditation I", "isCorrect": false, "rationale": "Meditation I is described as creating 'the crisis: everything can be doubted,' focusing on doubt rather than establishing God's existence."}, {"text": "Meditation II", "isCorrect": false, "rationale": "Meditation II is noted for finding 'the first certainty: I exist as a thinking thing,' which is foundational but not about God's existence."}, {"text": "Meditations III and V", "isCorrect": true, "rationale": "The text clearly states: 'Meditations III and V establish God's existence and character,' directly answering the question."}, {"text": "Meditation VI", "isCorrect": false, "rationale": "Meditation VI is concerned with recovering 'the external world and to distinguish mind from body,' which comes after establishing God's existence."}]}, {"question": "If a step in Meditation VI appears to introduce a concept without prior explanation, what reading strategy does the text recommend?", "options": [{"text": "Assume Descartes made an error and continue reading, expecting clarification later.", "isCorrect": false, "rationale": "The text emphasizes the continuous and interdependent nature of the argument, stating Descartes 'almost certainly laid the groundwork for it earlier,' rather than suggesting errors."}, {"text": "Refer to external scholarly commentaries for an immediate explanation of the concept.", "isCorrect": false, "rationale": "While external resources can be helpful, the primary strategy recommended *by this text* is to re-examine the book itself to find the groundwork for the concept."}, {"text": "Look back at earlier Meditations, as Descartes likely laid the groundwork for it there.", "isCorrect": true, "rationale": "The text explicitly states: 'No single Meditation can be fully understood without the others. If a step in Meditation VI seems to come out of nowhere, look back: Descartes almost certainly laid the groundwork for it earlier.'"}, {"text": "Focus only on the content of Meditation VI, as each Meditation is self-contained.", "isCorrect": false, "rationale": "This contradicts the explicit statement that 'No single Meditation can be fully understood without the others,' reinforcing the interconnectedness of the argument."}]}, {"question": "What is noted as a key characteristic of Elizabeth S. Haldane's translation of The Meditations?", "options": [{"text": "It is a very modern and conversational translation, easy for contemporary readers.", "isCorrect": false, "rationale": "The text states the Haldane translation uses 'the formal English of the Edwardian era — a style that is sometimes archaic by today's standards,' directly contradicting the idea of it being modern and conversational."}, {"text": "It prioritizes philosophical precision over stylistic clarity.", "isCorrect": false, "rationale": "The text describes it as 'clear and faithful,' suggesting it balances these aspects, but the primary characteristic highlighted is its archaic style, not a specific trade-off between precision and clarity."}, {"text": "It uses formal, sometimes archaic, English from the Edwardian era.", "isCorrect": true, "rationale": "The text explicitly mentions, 'The Haldane translation is clear and faithful, but it uses the formal English of the Edwardian era — a style that is sometimes archaic by today's standards.'"}, {"text": "It was directly translated from Descartes' French revised edition.", "isCorrect": false, "rationale": "The note states, 'Haldane translated from the Latin,' not the French."}]}, {"question": "Why might footnotes in this volume sometimes refer to Latin terms from Descartes' original text?", "options": [{"text": "To highlight errors or mistranslations in the Haldane version.", "isCorrect": false, "rationale": "The Haldane translation is described as 'clear and faithful,' not error-ridden. The purpose of Latin terms is to offer additional precision, not to correct mistakes."}, {"text": "To provide greater philosophical precision that might be lost in translation.", "isCorrect": true, "rationale": "The text states Latin terms 'sometimes preserves a precision that translation inevitably smooths over,' indicating their use is to provide a more exact understanding of Descartes' original meaning."}, {"text": "To demonstrate the translator's extensive knowledge of classical languages.", "isCorrect": false, "rationale": "While the translator might have extensive knowledge, the stated *purpose* for including Latin terms in footnotes is for philosophical precision for the reader, not to showcase the translator's abilities."}, {"text": "To encourage readers to learn Latin to fully grasp Descartes' ideas.", "isCorrect": false, "rationale": "The inclusion of Latin terms is to provide additional context and precision for the English reader, not to compel them to learn Latin. The goal is to enhance comprehension within the current reading experience."}]}, {"question": "A student reads The Meditations quickly, hoping to grasp the overall argument by the end of each Meditation. They find themselves increasingly confused and unable to connect new ideas to previous ones. Which key reading principle, if applied, would most likely help this student?", "options": [{"text": "Prioritizing the 'meditator's' journey over the author's intended argument.", "isCorrect": false, "rationale": "This strategy would likely exacerbate confusion, as the text advises trusting the argument even when the meditator is uncertain, implying the author's pre-planned argument is paramount."}, {"text": "Resisting the temptation to move on until fully satisfied with what has gone before, reading slowly.", "isCorrect": true, "rationale": "The text explicitly warns, 'Reading quickly will produce only confusion' and advises the reader to 'not move on until she is fully satisfied with what has gone before.' This directly addresses the student's problem of confusion and inability to connect ideas."}, {"text": "Focusing solely on the modern footnotes to bypass the archaic language.", "isCorrect": false, "rationale": "While footnotes can help with archaic language, the core problem is understanding the 'sustained chain of reasoning,' which requires slow engagement with the main text, not just glossing over difficulties."}, {"text": "Treating each Meditation as a separate, self-contained philosophical essay.", "isCorrect": false, "rationale": "The text directly refutes this by stating, 'No single Meditation can be fully understood without the others,' emphasizing their continuous and interdependent nature."}]}, {"question": "Given the distinction between the 'meditator' and Descartes the author, how should a reader interpret moments when the meditator appears to arrive at a conclusion 'too easily'?", "options": [{"text": "The reader should accept these conclusions without question, as they represent the author's established truth.", "isCorrect": false, "rationale": "The text advises the opposite: 'question it when it seems too easy,' indicating that apparent ease should prompt critical engagement, not passive acceptance."}, {"text": "The reader should critically examine the argument, as its apparent ease might mask underlying complexities or assumptions.", "isCorrect": true, "rationale": "The text explicitly states: 'question it when it seems too easy.' This suggests that the 'dramatic irony' means the reader should engage critically with such passages, understanding that the author's path to that conclusion might be more rigorous than the meditator's presented journey."}, {"text": "The reader should assume the meditator has made a logical leap that will be corrected by Descartes later.", "isCorrect": false, "rationale": "While the author *has* worked out the argument, the advice is for the reader to *question it* themselves in that moment, rather than simply waiting for a future correction within the text."}, {"text": "The reader should consult the French translation, as it might offer a clearer, more direct explanation.", "isCorrect": false, "rationale": "The translation notes discuss stylistic differences and precision (Latin vs. French/English), but not that a different translation would resolve an issue of 'argumentative ease' from the original author's design."}]}, {"question": "A reader encounters the phrase 'it needs must be' in Meditation III, which momentarily disrupts their understanding of the causal argument for God's existence. What combined approach, based on the text's recommendations, would be most effective for resolving this difficulty?", "options": [{"text": "Skip the difficult phrase and rely on the overall arc of the Meditations to fill in the gap.", "isCorrect": false, "rationale": "Skipping crucial phrases contradicts the advice to 'read slowly,' 'reread,' and 'resist the temptation to keep going' when a passage isn't understood, especially in a 'sustained chain of reasoning.'"}, {"text": "Consult the volume's footnotes for a gloss of 'it needs must be,' and then reread the passage slowly to integrate the argument.", "isCorrect": true, "rationale": "The text states, 'Footnotes throughout this volume will gloss unusual or technical terms as they appear,' and 'When in doubt about the meaning of a passage, slow down and reread; the argument is almost always clearer than the surface style suggests.' This combines both relevant strategies."}, {"text": "Immediately refer to the Latin original provided in footnotes to reconstruct the original meaning.", "isCorrect": false, "rationale": "While Latin can offer precision, the primary advice for 'doubt about the meaning of a passage' due to style is 'slow down and reread' (the English text), with footnotes specifically glossing 'unusual or technical terms' (which 'it needs must be' would be). Latin is for deeper precision, not the first step for an archaic English phrase."}, {"text": "Consider this an example of the meditator's dramatic irony and trust that Descartes will clarify the concept later.", "isCorrect": false, "rationale": "Dramatic irony pertains to the meditator's journey of discovery versus the author's pre-planned argument, not to archaic linguistic phrases. The issue is comprehension of language, not an argumentative narrative device."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
