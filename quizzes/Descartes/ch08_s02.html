<script>
var QUESTIONS = [{"question": "What was René Descartes' primary aim concerning religion when undertaking his philosophical project, as described in the text?", "options": [{"text": "To dismantle traditional religious dogma through radical skepticism.", "isCorrect": false, "rationale": "Descartes was a sincere Catholic who aimed to defend, not dismantle, faith."}, {"text": "To philosophically demonstrate God's existence and the soul's distinctness from the body.", "isCorrect": true, "rationale": "The text explicitly states Descartes 'believed that philosophy could — and should — demonstrate God's existence and the soul's distinctness from the body.'"}, {"text": "To establish an entirely atheistic framework for understanding the universe.", "isCorrect": false, "rationale": "Descartes was not an atheist; he was a sincere Catholic."}, {"text": "To reconcile the emerging scientific discoveries with existing Aristotelian theology.", "isCorrect": false, "rationale": "Descartes aimed to replace the 'failing Aristotelian framework' with a new philosophy, not reconcile it."}], "id": "q01"}, {"question": "The Roman Catholic Church placed Descartes' *Meditations* on the Index of Forbidden Books primarily due to which concern?", "options": [{"text": "They believed his philosophical proofs for God's existence were logically flawed and therefore incorrect.", "isCorrect": false, "rationale": "The text states the Church's concern was 'not that Descartes had concluded wrongly, but that his method was dangerous'."}, {"text": "His conclusions directly contradicted core Catholic doctrines, such as the divinity of Christ.", "isCorrect": false, "rationale": "The Church's concern was his method, not that his conclusions were doctrinally incorrect per se."}, {"text": "His method of beginning from radical doubt and rebuilding knowledge solely through human reason, without appealing to tradition or revelation, seemed to usurp Church authority.", "isCorrect": true, "rationale": "The text clearly states, 'The Church's concern was... that his method was dangerous: beginning from radical doubt and rebuilding knowledge from scratch, without any appeal to the authority of tradition or revelation, seemed to place human reason above the Church's teaching.'"}, {"text": "He openly advocated for a complete separation of church and state, challenging papal authority.", "isCorrect": false, "rationale": "The text does not mention this as a reason for the Index placement; the focus was on his philosophical method's implications for theology and authority."}], "id": "q02"}, {"question": "Which statement best characterizes the fundamental difference in method between Thomas Aquinas and René Descartes for proving God's existence?", "options": [{"text": "Aquinas employed *a priori* arguments based on innate ideas, while Descartes relied on *a posteriori* arguments derived from observable phenomena.", "isCorrect": false, "rationale": "This statement swaps the approaches of Aquinas and Descartes; Aquinas used *a posteriori* arguments, and Descartes used *a priori* arguments."}, {"text": "Aquinas reasoned from observable features of the created world to God as their ultimate cause, whereas Descartes reasoned from the analysis of ideas within the mind to God's necessary existence.", "isCorrect": true, "rationale": "Aquinas's Five Ways are *a posteriori*, starting from observation; Descartes' arguments in Meditations III and V are *a priori*, starting from ideas or concepts."}, {"text": "Aquinas based his proofs solely on divine revelation, while Descartes based his on purely secular, non-religious principles.", "isCorrect": false, "rationale": "Both believed God's existence could be known by natural reason, independent of faith or revelation. Neither relied solely on revelation or purely secular principles, though Descartes' method abstracted from tradition."}, {"text": "Aquinas focused on moral arguments for God's existence, while Descartes exclusively used arguments from physical design in the universe.", "isCorrect": false, "rationale": "Aquinas's Five Ways include cosmological and teleological arguments (motion, causation, design), not primarily moral arguments. Descartes' arguments were ontological and from the idea of God."}], "id": "q03"}, {"question": "Despite their differing methodologies, what crucial philosophical point did both Aquinas and Descartes agree upon regarding the existence of God?", "options": [{"text": "That God's existence is a matter of pure faith and cannot be proven by human reason.", "isCorrect": false, "rationale": "The text explicitly states they 'agree on a crucial point: God's existence can be known by natural reason, without faith or revelation.'"}, {"text": "That God's existence can be known by natural reason, independent of faith or revelation.", "isCorrect": true, "rationale": "The text clearly states this shared belief, noting their commitment to the tradition that God's existence is naturally knowable."}, {"text": "That the ontological argument is the only valid philosophical proof for God's existence.", "isCorrect": false, "rationale": "Aquinas explicitly rejected the ontological argument, and the Thomistic tradition was skeptical of Descartes' version."}, {"text": "That philosophical inquiry must always begin from the established doctrines of the Church.", "isCorrect": false, "rationale": "Descartes' method, which began from doubt, precisely challenged this approach, making reason autonomous."}], "id": "q04"}, {"question": "In the context of Descartes' arguments for God's existence, what does the term 'a priori' signify?", "options": [{"text": "Knowledge derived from sensory experience and empirical observation of the external world.", "isCorrect": false, "rationale": "This describes *a posteriori* knowledge, which is what Aquinas utilized."}, {"text": "Knowledge that can only be accessed through divine revelation or scripture.", "isCorrect": false, "rationale": "*A priori* knowledge is independent of experience and can be established by reason alone, not necessarily requiring revelation."}, {"text": "Knowledge that can be established by reason alone, through the analysis of ideas, without appealing to observation or experience.", "isCorrect": true, "rationale": "The definition provided in the text for *a priori* knowledge is 'knowledge that is independent of experience; knowledge that can be established by reason alone, without appealing to observation.'"}, {"text": "Knowledge based on the authority of tradition and long-established philosophical principles.", "isCorrect": false, "rationale": "Descartes' method explicitly departed from reliance on tradition or authority."}], "id": "q05"}, {"question": "The 'deeper tension' of Descartes' legacy for Christian philosophy, as discussed in the text, primarily stems from which aspect of his method?", "options": [{"text": "His unwavering commitment to an Aristotelian philosophical framework for theology.", "isCorrect": false, "rationale": "Descartes aimed to *replace* the Aristotelian framework, which he saw as failing."}, {"text": "His installation of individual, unaided reason as autonomous and self-legislating, no longer needing theology's permission or starting points.", "isCorrect": true, "rationale": "The text states, 'By beginning from radical doubt and rebuilding knowledge entirely through his own unaided reason, Descartes made reason autonomous — self-legislating, answerable to itself alone.'"}, {"text": "His explicit rejection of any form of religious faith or spiritual inquiry in favor of pure materialism.", "isCorrect": false, "rationale": "Descartes was a sincere Catholic who sought to defend faith, not reject it entirely or promote materialism."}, {"text": "His failure to provide any logically coherent arguments for God's existence, thus undermining faith.", "isCorrect": false, "rationale": "The concern was with the method's implication of autonomous reason, not necessarily the logical validity of his conclusions, which he believed to be sound."}], "id": "q06"}, {"question": "How did Descartes' methodological shift from the classical Christian view of 'faith seeking understanding' impact the relationship between philosophy and theology, particularly for his successors?", "options": [{"text": "It solidified theology's role as the unquestionable foundation and ultimate arbiter for all philosophical inquiry.", "isCorrect": false, "rationale": "Descartes' method led to philosophy becoming independent of theology, rather than reinforcing theology's foundational role."}, {"text": "It led to philosophy increasingly deriving its core tenets directly from divine revelation and Church teachings.", "isCorrect": false, "rationale": "The text explains that philosophy 'no longer needed theology's permission to proceed,' and reason became autonomous."}, {"text": "It prompted philosophers to confine themselves to questions provable by reason alone, making the content of faith seem optional or superfluous over time.", "isCorrect": true, "rationale": "The text states, 'Descartes confined himself to the first question and bracketed the second. His successors, one by one, found that the first question was difficult enough to occupy them entirely — and the second began to seem optional, then superfluous.'"}, {"text": "It encouraged a greater synthesis, where philosophical and theological concepts were seamlessly integrated into a unified system of knowledge.", "isCorrect": false, "rationale": "The shift led to a separation, where philosophical inquiry became distinct and self-sufficient, rather than fully integrated with theology."}], "id": "q07"}, {"question": "What is the primary Thomistic objection to Descartes' *a priori* proofs for God's existence, such as the ontological argument?", "options": [{"text": "Thomists argued that God's existence is a matter of pure faith and cannot be approached through rational philosophical inquiry.", "isCorrect": false, "rationale": "Aquinas, a key figure in the Thomistic tradition, believed God's existence could be known by natural reason."}, {"text": "They believed that humans have direct, intuitive access to God's essence, rendering *a priori* proofs unnecessary and overly complex.", "isCorrect": false, "rationale": "The text states the Thomistic objection is 'that we do not have direct access to God's essence'."}, {"text": "They contend that attempting to derive God's existence solely from the concept of God overestimates the finite human mind's capacity to grasp the divine nature, as essence and existence are distinct in creatures.", "isCorrect": true, "rationale": "The text explains, 'The Thomistic objection is that we do not have direct access to God's essence... Any attempt to derive God's existence from the concept of God alone overestimates what our finite minds can grasp about the divine nature.'"}, {"text": "They argued that Descartes' proofs were too rooted in sensory experience, thus contradicting the spiritual nature of God.", "isCorrect": false, "rationale": "Descartes' arguments are *a priori*, meaning they are independent of sensory experience, which is the opposite of this claim."}], "id": "q08"}, {"question": "Descartes' sharp separation of mind from body poses a significant challenge for Christian anthropology primarily because:", "options": [{"text": "It denies the existence of the soul, reducing human beings to mere physical mechanisms.", "isCorrect": false, "rationale": "Descartes argued for the soul's distinctness from the body, not its non-existence."}, {"text": "It implies that the physical body is inherently evil and therefore irrelevant to spiritual salvation.", "isCorrect": false, "rationale": "While his dualism separates mind and body, it doesn't necessarily declare the body evil, but rather less integral than in some Christian views."}, {"text": "It clashes with Christian teachings emphasizing the goodness of creation, the Incarnation of Christ, and the resurrection of the body, all of which affirm the body's integral role in the human person.", "isCorrect": true, "rationale": "The text states, 'His picture of the human person — a thinking substance accidentally united to a body — sits uneasily with Christian teaching about the goodness of creation, the Incarnation of Christ, and the resurrection of the body.'"}, {"text": "It subordinates intellectual understanding to emotional experience, devaluing rational theology.", "isCorrect": false, "rationale": "Descartes championed rational understanding and clarity, not emotional experience."}], "id": "q09"}, {"question": "According to the 'Christian Reading of Descartes Today' section, what is a significant and welcome claim established by Descartes' proofs of God, regardless of their specific flaws?", "options": [{"text": "That all religious belief must be ultimately abandoned in favor of pure, unaided human reason.", "isCorrect": false, "rationale": "The text states that Descartes insists 'faith and reason are not enemies' and that he was a sincere Catholic."}, {"text": "That philosophy can definitively prove the non-existence of God, thus liberating humanity from religious dogma.", "isCorrect": false, "rationale": "Descartes sought to prove God's existence, not non-existence."}, {"text": "That the existence of God is a philosophical question amenable to rational inquiry and defense, not merely a matter of blind faith.", "isCorrect": true, "rationale": "The text states this directly: 'Descartes' proofs of God, whatever their specific flaws, establish something important: the existence of God is a philosophical question, not merely a matter of blind faith... that the existence of God can be submitted to rational inquiry and defended on rational grounds.'"}, {"text": "That faith and reason are fundamentally irreconcilable and destined to contradict each other.", "isCorrect": false, "rationale": "The text states Descartes insists 'faith and reason are not enemies,' upholding the classical Christian view that they are complementary."}], "id": "q10"}, {"question": "Descartes insisted that philosophy could prove God's existence and the soul's distinctness from the body. What does this indicate about his view of the relationship between philosophy and Christian faith?", "options": [{"text": "That philosophy is subordinate to faith and can only confirm what faith has already revealed.", "isCorrect": false, "rationale": "Descartes goes further than confirmation: he believes philosophy can independently demonstrate these truths through reason alone, without relying on revelation as its starting point or as prior validation."}, {"text": "That philosophy and faith are complementary — reason can independently establish truths that faith also affirms, so they are not enemies.", "isCorrect": true, "rationale": "The text states that Descartes 'insists that faith and reason are not enemies. He believes philosophy can — and should — demonstrate God's existence and the soul's distinctness from the body.' By establishing these through reason, Descartes reinforces faith's content rather than replacing or undermining it."}, {"text": "That philosophy has no role in religious matters and should confine itself to purely scientific questions.", "isCorrect": false, "rationale": "Descartes demonstrates the opposite: philosophy's role extends to the highest theological and metaphysical questions, including God's existence and the soul."}, {"text": "That faith is the more reliable guide on these matters and philosophy is merely an auxiliary discipline.", "isCorrect": false, "rationale": "While Descartes was a sincere Catholic, his Meditations are addressed to philosophers and argue that reason itself — without appealing to faith or revelation — can establish these truths. This makes reason a more independent partner, not a mere auxiliary."}], "id": "q11"}, {"question": "The text notes that the Thomistic tradition was 'skeptical' of Descartes' approach to God. Beyond the ontological argument objection, what broader methodological concern would a Thomist have about Descartes' entire project in the Meditations?", "options": [{"text": "That Descartes' meditative format was inappropriate for rigorous philosophical argumentation, better suited to personal piety.", "isCorrect": false, "rationale": "The Thomistic concern is substantive and philosophical, not a stylistic complaint about the meditative format."}, {"text": "That beginning from radical universal doubt severs one from the natural knowledge embedded in sense experience and tradition, which Aquinas considers legitimate starting points for philosophical reasoning about God.", "isCorrect": true, "rationale": "Aquinas builds his Five Ways from observable features of the world — taking the senses and natural human experience as legitimate data. Descartes' method brackets all of this in favor of autonomous reason starting from zero. From a Thomistic perspective, this is not merely methodologically odd but philosophically misguided: it discards the natural foundation from which reason naturally rises to God."}, {"text": "That Descartes never adequately addressed the question of the soul's immortality, which is central to Christian doctrine.", "isCorrect": false, "rationale": "Descartes explicitly dedicates the Meditations partly to establishing the soul's distinctness from the body, which he believed supported arguments for its immortality. This is not the Thomistic objection."}, {"text": "That Descartes' arguments are too simple and lack the systematic rigor that the Summa Theologica demonstrates.", "isCorrect": false, "rationale": "The Thomistic concern is not about rigor or complexity but about the starting point and method: beginning from doubt and using purely internal, a priori reasoning rather than beginning from the world and arguing a posteriori."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
