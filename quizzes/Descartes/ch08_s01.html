<script>
var QUESTIONS = [{"question": "According to Descartes in Meditation I, what is the primary reason he engages in radical doubt?", "options": [{"text": "To prove the existence of an evil genius.", "isCorrect": false, "rationale": "While the evil genius is a key skeptical hypothesis, it's a tool for doubt, not the primary reason or goal of engaging in doubt itself. The goal is to question everything."}, {"text": "To find an absolutely certain foundation for knowledge by questioning all previous beliefs.", "isCorrect": true, "rationale": "The text states Descartes begins by 'calling into question everything he has ever believed' and that this 'lowest point' is a 'deliberately chosen starting place' to rebuild certainty."}, {"text": "To demonstrate that sensory experience is fundamentally unreliable and should be rejected entirely.", "isCorrect": false, "rationale": "Descartes notes the senses sometimes deceive, but the ultimate goal is not to reject them entirely, but to find what survives doubt. In Meditation VI, he rehabilitates their practical reliability."}, {"text": "To establish the mind as distinct from the body before proving his own existence.", "isCorrect": false, "rationale": "The distinction between mind and body is established much later, in Meditation VI. The first step is to establish his own existence (the Cogito) in Meditation II."}], "id": "q01"}, {"question": "In Meditation II, what does Descartes conclude is his essential nature after establishing the 'Cogito'?", "options": [{"text": "A being whose essence is a perfect union of mind and body.", "isCorrect": false, "rationale": "While Descartes eventually discusses the intimate union of mind and body in Meditation VI, his essence, as established in Meditation II, is solely as a 'thinking thing' before the external world or body is proven to exist."}, {"text": "A purely physical being, constantly being deceived by an evil genius.", "isCorrect": false, "rationale": "Meditation II establishes existence as a thinking being, not a physical one, and the evil genius is a hypothesis to prompt doubt, not a definitive conclusion about his nature."}, {"text": "A 'thinking thing' whose entire essence is to think, doubt, will, imagine, and perceive.", "isCorrect": true, "rationale": "The text explicitly states: 'What is he? A thinking thing: a being whose entire essence is to think, doubt, will, imagine, and perceive.'"}, {"text": "An extended substance, distinct from any thinking qualities.", "isCorrect": false, "rationale": "Extended substance is identified as the nature of matter in Meditation V, distinct from his essence as a thinking thing, which is established much earlier."}], "id": "q02"}, {"question": "Descartes presents two distinct proofs for God's existence in the Meditations. How do the proofs in Meditation III and Meditation V differ in their fundamental approach?", "options": [{"text": "Meditation III uses an ontological argument based on God's essence, while Meditation V uses a causal argument based on human ideas.", "isCorrect": false, "rationale": "This reverses the order and description. Meditation III presents the causal argument, and Meditation V presents the ontological argument."}, {"text": "Meditation III uses a causal argument based on the idea of an infinitely perfect being, while Meditation V uses an ontological argument based on existence belonging to God's essence.", "isCorrect": true, "rationale": "The text states: 'His first proof is causal: he has an idea of an infinitely perfect being; he is finite and could not have produced such an idea himself...'; and later: 'Descartes offers a second proof of God's existence, the ontological argument: existence belongs to God's essence as three angles belong to a triangle.'"}, {"text": "Both proofs rely on empirical observations of the natural world to infer a divine creator.", "isCorrect": false, "rationale": "Descartes' proofs for God are a priori, based on reasoning about ideas and essences, not empirical observation, which he largely distrusts at these stages."}, {"text": "Meditation III proves God's existence to validate clear and distinct perceptions, while Meditation V proves it to explain the nature of matter.", "isCorrect": false, "rationale": "While God's non-deceptive nature does validate clear and distinct perceptions (Meditation IV), the proof itself in Meditation III is distinct from this. Meditation V's ontological proof is also separate from the explanation of matter, though both occur in the same Meditation."}], "id": "q03"}, {"question": "According to Descartes in Meditation IV, what is the root cause of human error?", "options": [{"text": "God's deliberate creation of humans with flawed intellects.", "isCorrect": false, "rationale": "Descartes argues that error is a 'privation, not a positive defect God created,' because God is perfect and non-deceptive."}, {"text": "The inevitable deception caused by the senses and dreams.", "isCorrect": false, "rationale": "While senses can deceive, Descartes attributes error to a specific mechanism involving will and intellect, not simply sensory input itself. The senses are later deemed reliable for practical purposes."}, {"text": "The infinite will assenting to judgments that the finite intellect has not clearly grasped.", "isCorrect": true, "rationale": "The text explicitly states: 'error arises when the infinite will assents to judgments that the finite intellect has not clearly grasped.'"}, {"text": "A lack of imagination, which prevents us from conceiving perfect ideas.", "isCorrect": false, "rationale": "The text does not link error to a lack of imagination. Instead, it links it to the interplay between the will and the intellect."}], "id": "q04"}, {"question": "Which statement best summarizes the outcome of Meditation VI regarding the external world and the mind-body relationship?", "options": [{"text": "Descartes proves the external world exists, but concludes the mind and body are entirely separate and do not interact.", "isCorrect": false, "rationale": "While he establishes a 'real distinction' between mind and body, he 'insists on their intimate union in the human composite,' indicating interaction."}, {"text": "Descartes concludes that the external world remains unprovable, but the senses are entirely reliable on their own.", "isCorrect": false, "rationale": "He does prove the external world exists. He also states that the 'senses are reliable for practical purposes; reason corrects their imprecision,' not that they are entirely reliable on their own."}, {"text": "Descartes proves the external world exists, distinguishes mind (thinking substance) and body (extended substance), and affirms their intimate union, with senses being practically reliable.", "isCorrect": true, "rationale": "The text states: 'With God's existence and non-deception established, Descartes can at last prove that the external world exists. He establishes the real distinction between mind (thinking substance) and body (extended substance), while insisting on their intimate union in the human composite. The senses are reliable for practical purposes; reason corrects their imprecision.'"}, {"text": "Descartes proves the external world exists through the senses alone, demonstrating that mind and body are identical.", "isCorrect": false, "rationale": "The external world is proven with God's non-deceptive nature as a foundation, not solely through the senses. He establishes a real distinction, not identity, between mind and body."}], "id": "q05"}, {"question": "Descartes' 'method of doubt' proved to be an 'enormously productive' philosophical tool because:", "options": [{"text": "It definitively proved the existence of an evil genius, forcing philosophers to accept a radical skepticism.", "isCorrect": false, "rationale": "The evil genius is a hypothetical construct for doubt, not a proven entity, and the method's productivity stems from its systematic questioning, not from enforcing skepticism as a final conclusion."}, {"text": "It allowed philosophers to quickly dismiss all previous beliefs and start entirely fresh without needing to engage with historical arguments.", "isCorrect": false, "rationale": "While it calls into question previous beliefs, its productivity lies in 'pushing a position to its extreme, see what survives, rebuild from what remains,' implying engagement, not dismissal."}, {"text": "It provided a systematic strategy for pushing a philosophical position to its extreme to see what truths could withstand such scrutiny and rebuild from there.", "isCorrect": true, "rationale": "The text states: 'Even philosophers who reject Descartes' conclusions use his strategy: push a position to its extreme, see what survives, rebuild from what remains. The practice of “What if I'm wrong about everything?” is a philosophical discipline Descartes made systematic.'"}, {"text": "It established that sensory experience is the ultimate foundation for all knowledge, rejecting pure reason.", "isCorrect": false, "rationale": "Descartes initially doubts sensory experience and prioritizes reason (clear and distinct perceptions) as the 'primary court of appeal for questions of truth.'"}], "id": "q06"}, {"question": "The text identifies Descartes' 'Cogito' as marking a fundamental shift in modern epistemology. What was this shift?", "options": [{"text": "From proving God's existence as the primary goal to proving the existence of the external world.", "isCorrect": false, "rationale": "While both are crucial, the shift described is about the starting point of inquiry, not the ultimate goal itself."}, {"text": "From starting philosophical inquiry with the objective world to beginning with the knowing subject and asking how the mind connects to the world.", "isCorrect": true, "rationale": "The text states: 'Before Descartes, philosophers typically began with the world and asked how we know it. After Descartes, many began with the knowing subject and asked how we can get from the mind to the world. This shift — from object to subject as the primary datum — defined modern philosophy for the next three centuries.'"}, {"text": "From accepting all traditional beliefs without question to embracing radical skepticism as the final philosophical stance.", "isCorrect": false, "rationale": "Descartes uses doubt to rebuild certainty, not to endorse skepticism as the final stance."}, {"text": "From relying on religious dogma to exclusively using empirical observation for all knowledge.", "isCorrect": false, "rationale": "Descartes relies heavily on reason and rational proofs (like for God's existence), not exclusively empirical observation. He also doesn't reject all religious ideas; he uses reason to prove God."}], "id": "q07"}, {"question": "The 'Cartesian Circle' objection challenges Descartes' proofs by pointing out a potential flaw in his reasoning. What is the essence of this alleged circularity?", "options": [{"text": "Using the existence of the external world to prove God, then using God to prove the external world.", "isCorrect": false, "rationale": "The circularity described is not about the external world, but about the relationship between clear and distinct perception and God's existence."}, {"text": "Using sensory perceptions to establish the Cogito, then using the Cogito to validate sensory perceptions.", "isCorrect": false, "rationale": "Descartes establishes the Cogito by doubting sensory perceptions, not by relying on them, so this specific circularity doesn't apply."}, {"text": "Using clear and distinct perception to prove God's existence, and then using God's non-deceptive nature to validate the reliability of clear and distinct perception.", "isCorrect": true, "rationale": "The text explains: 'The Cartesian Circle — the apparent circularity of using clear and distinct perception to prove God, then using God to validate clear and distinct perception — was identified by his contemporaries and has never been fully resolved.'"}, {"text": "Using the mind-body distinction to prove God, then using God to prove the mind-body distinction.", "isCorrect": false, "rationale": "The mind-body distinction is established after God's existence is proven, and is not part of the alleged circularity in God's proof."}], "id": "q08"}, {"question": "Descartes' view of 'matter as pure extension' was ultimately superseded by which scientific development mentioned in the text?", "options": [{"text": "The discovery of the pineal gland's true function in the brain.", "isCorrect": false, "rationale": "While the pineal gland hypothesis was an error, it relates to mind-body interaction, not the fundamental nature of matter as extension. The text links the pineal gland to neuroscience, not the physics of matter as extension."}, {"text": "Newton's physics of gravitational attraction, which required action at a distance and forces.", "isCorrect": true, "rationale": "The text states: 'Matter as pure extension left no room for forces... Newton's physics of gravitational attraction, which requires action at a distance, could not fit within this framework. Newtonian mechanics superseded Cartesian physics.'"}, {"text": "The development of modern psychology, which showed the mind influences the body more directly.", "isCorrect": false, "rationale": "Psychology and neuroscience address the mind-body problem, but the specific issue with 'matter as pure extension' was its inability to accommodate 'forces' and 'action at a distance' as found in Newtonian physics."}, {"text": "The advent of artificial intelligence, demonstrating that thought can arise from non-extended substances.", "isCorrect": false, "rationale": "Artificial intelligence is mentioned as a field shaped by the mind-body problem, but it's not the specific scientific development that superseded Descartes' 'matter as pure extension' concept regarding forces."}], "id": "q09"}, {"question": "The author concludes that even where Descartes 'was wrong, he was productively wrong.' What does this imply about his errors?", "options": [{"text": "His mistakes were so minor they had no lasting impact on philosophy or science.", "isCorrect": false, "rationale": "The opposite is true; his errors generated crucial questions."}, {"text": "His errors were largely ignored by subsequent philosophers, who focused only on his correct insights.", "isCorrect": false, "rationale": "The text states his errors 'generated exactly the questions that needed to be answered,' indicating they were engaged with, not ignored."}, {"text": "His errors were valuable because they stimulated critical debate and drove new lines of philosophical and scientific inquiry.", "isCorrect": true, "rationale": "The text clearly states: 'His errors generated exactly the questions that needed to be answered, and the effort to answer them drove the development of modern philosophy and science.'"}, {"text": "His errors were solely due to the limited scientific knowledge of his time and held no deeper philosophical significance.", "isCorrect": false, "rationale": "While some errors (like the pineal gland) relate to contemporary science, others (like the Cartesian Circle) are fundamental philosophical objections that pushed rigorous accounts of reason's foundations, showing deeper philosophical significance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
