<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental difference between Descartes' method of doubt and that of the ancient Pyrrhonists?", "options": [{"text": "The Pyrrhonists doubted the existence of God, whereas Descartes used God's existence to resolve doubt.", "isCorrect": false, "rationale": "While Descartes eventually uses God in his resolution, the core difference is the purpose of doubt itself, not the specific object of doubt."}, {"text": "Descartes used doubt as a temporary tool to find certainty, while the Pyrrhonists aimed to remain in suspended judgment indefinitely.", "isCorrect": true, "rationale": "The text states: 'The Pyrrhonists doubted in order to remain in doubt — suspension of judgment was their destination. Descartes doubts in order to escape doubt. He uses skeptical arguments as a tool to find something that survives them all.'"}, {"text": "Descartes only doubted sensory perceptions, while the Pyrrhonists doubted both sensory perceptions and reason.", "isCorrect": false, "rationale": "Both Descartes and the Pyrrhonists doubted sensory perception and reason. Descartes' method involves systematic doubt of both through the evil genius hypothesis."}, {"text": "The Pyrrhonists focused on ethical questions, whereas Descartes concentrated solely on scientific and metaphysical certainty.", "isCorrect": false, "rationale": "The Pyrrhonists argued on 'every question — including questions of science, ethics, and religion.' Descartes' doubt is also broad."}], "id": "q01"}, {"question": "According to the text, what was the primary goal for the Pyrrhonists in suspending judgment ($epoche$)?", "options": [{"text": "To achieve intellectual superiority over others by demonstrating the limits of human reason.", "isCorrect": false, "rationale": "The text does not mention intellectual superiority as a goal. Their goal was personal tranquility, not intellectual dominance."}, {"text": "To reach a state of tranquility of soul ($ataraxia$) by eliminating the anxiety of holding uncertain beliefs.", "isCorrect": true, "rationale": "The text states: 'The goal was $ataraxia$: the peaceful state of a mind that has given up trying to resolve unanswerable questions,' directly linked to suspending judgment to eliminate anxiety."}, {"text": "To develop a new system of ethics based on universal uncertainty.", "isCorrect": false, "rationale": "While they applied doubt to ethics, their primary goal for suspending judgment was $ataraxia$ — a state of mind — not the creation of a new ethical system."}, {"text": "To prove that all knowledge is ultimately impossible to acquire.", "isCorrect": false, "rationale": "The Pyrrhonists suspended judgment because they found 'equally strong arguments on both sides,' but their ultimate goal was $ataraxia$, not proving impossibility."}], "id": "q02"}, {"question": "Augustine's argument 'Si enim fallor, sum' ('If I am mistaken, I exist') is significant because it:", "options": [{"text": "Proved the existence of God through the act of deception.", "isCorrect": false, "rationale": "Augustine uses this argument to establish certainty of one's own existence as a foundation for recovering other knowledge — it does not directly prove God's existence."}, {"text": "Demonstrated that one cannot be deceived unless one first exists to be deceived.", "isCorrect": true, "rationale": "The text explains: 'even if I am deceived about everything, my deception itself proves that I exist. A being that does not exist cannot be deceived. The very fact of being-deceived presupposes a being that can be deceived.'"}, {"text": "Asserted that all sensory experiences are inherently deceptive and cannot be trusted.", "isCorrect": false, "rationale": "While it deals with deception, the core of the argument is the necessary existence of the deceiver, not a universal statement about sensory deception."}, {"text": "Introduced the concept of 'original sin' as the ultimate source of human error and deception.", "isCorrect": false, "rationale": "This argument is philosophical in its logical structure regarding existence, not a theological claim about original sin."}], "id": "q03"}, {"question": "How did Augustine's argument 'Si enim fallor, sum' differ from Descartes' $cogito$, even though both establish the self's certainty of its own existence?", "options": [{"text": "Augustine's argument was primarily concerned with demonstrating the existence of an external world, whereas Descartes focused on internal mental states.", "isCorrect": false, "rationale": "Both arguments primarily focus on the certainty of the self's existence, not the external world directly."}, {"text": "Augustine based his certainty on the act of being deceived, whereas Descartes based his on the act of thinking.", "isCorrect": true, "rationale": "The text states: 'For Augustine, the key point is not that thinking implies existence but that being deceived implies existence.' This is the precise distinction."}, {"text": "Augustine's argument was derived from pagan philosophy, while Descartes' was purely Christian.", "isCorrect": false, "rationale": "Augustine engaged deeply with Greek philosophy and his argument is philosophical; Descartes' argument is also philosophical, though he uses God later."}, {"text": "Augustine believed this certainty could not be a foundation for further knowledge, while Descartes sought to build all knowledge upon it.", "isCorrect": false, "rationale": "The text states Augustine saw this certainty as a 'foundation for recovering other knowledge,' which is similar to Descartes' aim."}], "id": "q04"}, {"question": "The Academic skeptics, unlike the Pyrrhonists, advocated for 'probabilism.' What does this mean in the context of their philosophy?", "options": [{"text": "They believed certainty could be achieved by carefully calculating probabilities for all possible outcomes.", "isCorrect": false, "rationale": "The text states 'genuine certainty is rarely if ever available' for Academic skeptics. Probabilism isn't about achieving certainty through calculation."}, {"text": "They argued the best attitude is to act on what seems most plausible while withholding assent from any claim to certain knowledge.", "isCorrect": true, "rationale": "The text defines probabilism for Academic skeptics as 'acting on what seems most plausible while withholding assent from any claim to certain knowledge.'"}, {"text": "They asserted that all knowledge is merely probable and never truly certain, leading to complete inaction.", "isCorrect": false, "rationale": "Probabilism suggests 'acting on what seems most plausible,' implying action based on evidence, not complete inaction."}, {"text": "They maintained that objective truth is probable, but subjective truth is always certain.", "isCorrect": false, "rationale": "The text makes no distinction between objective and subjective truth in this context. Their focus is on proportioning confidence to evidence."}], "id": "q05"}, {"question": "David Hume's philosophical conclusions, stemming from Descartes' method of doubt, differed significantly in that Hume believed:", "options": [{"text": "Radical doubt could be definitively overcome through careful philosophical reasoning.", "isCorrect": false, "rationale": "The text states Hume 'concluded that we genuinely cannot establish on rational grounds our beliefs about causation, the external world, personal identity, or God,' and 'did not think philosophy could be rebuilt on a certain foundation.'"}, {"text": "Our beliefs about fundamental concepts like causation and the external world are useful habits of mind, not demonstrable rational truths.", "isCorrect": true, "rationale": "The text explains Hume's view: 'These are not things we can prove; they are habits of mind that nature has given us because they are useful, not because they are demonstrable.'"}, {"text": "The existence of a non-deceiving God could guarantee the reliability of our perceptions.", "isCorrect": false, "rationale": "This was Descartes' path to resolution, which Hume rejected by pushing the skeptical tendencies further."}, {"text": "Skepticism should be applied only to theological claims, leaving scientific knowledge secure.", "isCorrect": false, "rationale": "Hume applied skepticism broadly to 'causation, the external world, personal identity, or God,' not just theological claims."}], "id": "q06"}, {"question": "Hilary Putnam's 'brain in a vat' hypothesis serves as a modern descendant of Descartes' evil genius argument primarily because it:", "options": [{"text": "Relies on a supernatural deceiver to create a perfect illusion of reality.", "isCorrect": false, "rationale": "The 'brain in a vat' scenario uses advanced technology rather than a supernatural 'evil genius,' making it a more modern take without requiring a supernatural deceiver."}, {"text": "Poses the challenge of how one could distinguish between genuine experience and a perfectly simulated reality from within.", "isCorrect": true, "rationale": "The text states: 'Everything you see, hear, feel, and think would be exactly as it is now, but all of it would be an illusion. From the inside, there is no way to tell.' This directly mirrors the evil genius's challenge."}, {"text": "Provides a definitive answer to the question of whether the external world is real.", "isCorrect": false, "rationale": "The scenario is designed to raise the question of reality, not answer it. The text concludes the problem 'has not been closed since.'"}, {"text": "Assumes the existence of a benevolent computer programmer who ensures accurate sensory input.", "isCorrect": false, "rationale": "The scenario assumes deception, not benevolence. The purpose is to question reality, not to guarantee accurate input."}], "id": "q07"}, {"question": "One key advantage Descartes has over the 'brain-in-a-vat' skeptic, as noted in the text, is:", "options": [{"text": "Descartes' ability to directly appeal to the scientific method to verify reality.", "isCorrect": false, "rationale": "Descartes' method begins by doubting the reliability of the senses and therefore science based on them. His resolution comes from reason and God, not scientific verification."}, {"text": "Descartes' strategy of using God's existence and non-deceptiveness to escape radical doubt, a route unavailable to the brain-in-a-vat scenario.", "isCorrect": true, "rationale": "The text explicitly states: 'Descartes has an advantage over the brain-in-a-vat sceptic: he will use God's existence and non-deceptiveness (established in Meditations III and V) to escape radical doubt. The brain-in-a-vat scenario is designed to resist that escape route, since it does not assume a God.'"}, {"text": "Descartes' personal experience of being deceived, which allowed him to understand the nature of illusion better.", "isCorrect": false, "rationale": "While Descartes' method involves considering deception, personal experience isn't cited as the key advantage against the modern scenario."}, {"text": "The historical context of Descartes' time, which lacked the technological complexity to imagine such advanced deception.", "isCorrect": false, "rationale": "This describes a limitation of Descartes' time, not an advantage. The 'evil genius' was his equivalent of the technological deceiver."}], "id": "q08"}, {"question": "What enduring philosophical problem, initially emphasized by Descartes in Meditation I, continues to be a central topic in philosophy?", "options": [{"text": "The nature of the human soul and its immortality.", "isCorrect": false, "rationale": "While Descartes discusses the soul, the text highlights a more foundational epistemological problem as his enduring legacy from Meditation I."}, {"text": "The question of how we know the external world is real and not merely an illusion.", "isCorrect": true, "rationale": "The text concludes: 'What these scenarios show — and what Descartes saw first — is that the question \"how do I know the world is real?\" cannot be dismissed as silly. It is a genuine philosophical problem... That is the question Descartes put on the table in 1641, and it has not been closed since.'"}, {"text": "The ethical implications of scientific discovery.", "isCorrect": false, "rationale": "Descartes' initial doubt is about the reliability of all knowledge, including sensory input, but the enduring problem emphasized is about the reality of the external world itself."}, {"text": "The logical consistency of religious doctrine.", "isCorrect": false, "rationale": "Descartes touches on God, but the text emphasizes the broader epistemological problem of certainty about reality as his lasting legacy from Meditation I."}], "id": "q09"}, {"question": "Which of the following figures is described as a 'great antagonist' whom Descartes took seriously because he wanted to defeat their arguments?", "options": [{"text": "Augustine of Hippo", "isCorrect": false, "rationale": "Augustine is presented as a 'remarkable predecessor' whose argument resembled the cogito, not an antagonist to be defeated."}, {"text": "David Hume", "isCorrect": false, "rationale": "Hume came after Descartes and pushed his skeptical method further; he was an 'heir' to Descartes' problem, not an antagonist Descartes sought to defeat."}, {"text": "Pyrrho of Elis", "isCorrect": false, "rationale": "Pyrrho was the founder of Pyrrhonism, whose school of thought as a whole was what Descartes wanted to defeat, but the text describes the 'entire tradition of systematic doubt' as the antagonist, not Pyrrho specifically."}, {"text": "The entire tradition of systematic doubt, especially the Academic skeptics.", "isCorrect": true, "rationale": "The text states: 'Descartes' great antagonist in the Meditations is this entire tradition of systematic doubt. He takes the skeptics' best arguments seriously precisely because he wants to defeat them.'"}], "id": "q10"}, {"question": "The Pyrrhonists argued that for every philosophical position, an equally strong argument exists on the opposite side. What term does the text use for this strategy of balanced counter-argumentation?", "options": [{"text": "$Ataraxia$", "isCorrect": false, "rationale": "$Ataraxia$ is the state of tranquility that the Pyrrhonists hoped to achieve through suspended judgment — it is the goal, not the argumentative strategy."}, {"text": "$Epoche$", "isCorrect": false, "rationale": "$Epoche$ is the suspension of judgment itself — the state of withholding assent — not the argumentative technique of balancing opposing arguments."}, {"text": "$Isostheneia$", "isCorrect": true, "rationale": "The Pyrrhonist technique of showing 'equally strong arguments on both sides of every question' — forcing suspension of judgment — is the strategy of $isostheneia$ (equal strength of opposing arguments). This generates $epoche$ which leads to $ataraxia$."}, {"text": "$Probabilism$", "isCorrect": false, "rationale": "$Probabilism$ is the Academic Skeptics' view that one should act on the most plausible position without claiming certainty — not the Pyrrhonist strategy of balanced counter-argumentation."}], "id": "q11"}, {"question": "The text notes that Descartes read Montaigne's essays, which helped inspire his method of radical doubt. What does this connection reveal about the relationship between Renaissance humanism and early modern philosophy?", "options": [{"text": "That Renaissance humanists and early modern philosophers shared exactly the same goal: finding indubitable foundations for knowledge.", "isCorrect": false, "rationale": "Montaigne aimed to demonstrate the feebleness and inconsistency of human reason and reach comfortable uncertainty — very different from Descartes' goal of finding indubitable certainty."}, {"text": "That Descartes' radical doubt was entirely original and owed nothing to the humanist tradition.", "isCorrect": false, "rationale": "The text explicitly traces connections between Descartes and Montaigne, indicating that early modern philosophy was shaped by the humanist recovery of ancient skepticism."}, {"text": "That Descartes inherited the skeptical tools of Renaissance humanism but redirected them toward the opposite goal — using doubt to achieve certainty rather than comfortable uncertainty.", "isCorrect": true, "rationale": "Montaigne used Pyrrhonist arguments to demonstrate human reason's limits and find $ataraxia$; Descartes used the same skeptical toolkit as a weapon against skepticism itself, driving doubt to its extreme in order to find what survives."}, {"text": "That Renaissance humanists anticipated the mind-body problem that Descartes would later articulate in Meditation VI.", "isCorrect": false, "rationale": "The text focuses on the skeptical inheritance from Montaigne to Descartes, not on any Renaissance anticipation of the mind-body problem."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
