<script>
var QUESTIONS = [{"question": "According to Descartes, what is the primary philosophical problem addressed in Meditation IV regarding human error?", "options": [{"text": "How can an omnipotent God allow physical suffering and moral evil in the world?", "isCorrect": false, "rationale": "This describes the classic 'Problem of Evil,' but Descartes applies a version of this challenge specifically to intellectual error, rather than general suffering or moral wickedness, in Meditation IV."}, {"text": "How can humans achieve perfect knowledge if their senses are inherently deceptive?", "isCorrect": false, "rationale": "While Descartes is concerned with reliable knowledge, the core problem of Meditation IV is not about sensory deception, but rather how intellectual error occurs despite a perfect, non-deceiving God."}, {"text": "How is it possible for humans to make intellectual mistakes if they were created by a supremely perfect and non-deceiving God?", "isCorrect": true, "rationale": "This precisely captures the 'Problem of Error' as presented in Meditation IV: reconciling human fallibility with a perfect, non-deceiving creator."}, {"text": "How can God's existence be proven beyond doubt, given the possibility of an evil genius?", "isCorrect": false, "rationale": "The existence of God and refutation of the evil genius were primarily established in previous Meditations. Meditation IV assumes God's existence and non-deceiving nature to tackle the problem of error."}], "id": "q01"}, {"question": "Descartes argues that God cannot be a deceiver. Which of the following best explains his reasoning?", "options": [{"text": "Deception is a necessary tool for maintaining order, which a perfect God would not need.", "isCorrect": false, "rationale": "Descartes does not frame deception as a tool for order. Instead, he views it as an inherent flaw or imperfection."}, {"text": "God's omnipotence means God does not need to deceive to achieve any goal, making deception redundant.", "isCorrect": false, "rationale": "While God's omnipotence is relevant, Descartes' direct argument focuses on deception being an imperfection, implying malice or weakness, neither of which belongs to a perfect being."}, {"text": "Deception implies malice or weakness, qualities incompatible with a supremely perfect being.", "isCorrect": true, "rationale": "Descartes explicitly states that to deceive is an act of a being that is either malicious (delighting in confusion) or weak (unable to achieve goals honestly). Since God is supremely perfect, God can possess neither of these qualities."}, {"text": "The existence of clear and distinct perceptions directly disproves God as a deceiver.", "isCorrect": false, "rationale": "The reliability of clear and distinct perceptions is a *consequence* of God not being a deceiver, not the *reason* why God cannot deceive. The reasoning for God's non-deceiving nature comes from God's perfection."}], "id": "q02"}, {"question": "What is the crucial role of 'clear and distinct perceptions' in Descartes' argument after establishing God's non-deceiving nature?", "options": [{"text": "They serve as the initial proof for God's existence.", "isCorrect": false, "rationale": "God's existence was proven earlier. The non-deceiving God then guarantees the truth of clear and distinct perceptions, not the other way around."}, {"text": "They are the sole source of all human knowledge, irrespective of divine guarantee.", "isCorrect": false, "rationale": "Descartes acknowledges other forms of perception but emphasizes that only clear and distinct perceptions are guaranteed true by God. The problem of error arises from judgments made on less clear perceptions."}, {"text": "They are guaranteed to be true, removing the doubt previously raised by the evil genius hypothesis.", "isCorrect": true, "rationale": "Having proved a perfect, non-deceiving God, Descartes concludes that what he perceives 'clearly and distinctly' (with perfect intellectual transparency) cannot be false, thus settling the doubt from Meditation I about an evil genius."}, {"text": "They represent the infinite capacity of the human intellect, mirroring God's own intellect.", "isCorrect": false, "rationale": "The human intellect is finite, not infinite. Clear and distinct perceptions are about the quality of understanding within that finite intellect, not its infinite capacity."}], "id": "q03"}, {"question": "Descartes distinguishes between the intellect and the will. How does he characterize the human will?", "options": [{"text": "It is a finite faculty that perceives and understands ideas, similar to God's intellect but limited in scope.", "isCorrect": false, "rationale": "This description refers to the intellect, not the will. The intellect is finite and perceives ideas."}, {"text": "It is the passive, receptive side of cognition, limited by what can be clearly perceived.", "isCorrect": false, "rationale": "This describes the intellect. The will is the active, judging side of cognition."}, {"text": "It is an effectively infinite faculty for affirming, denying, and making judgments, similar in kind to God's will.", "isCorrect": true, "rationale": "Descartes argues that the will is infinite in its freedom to affirm or deny any proposition, and that in this pure freedom, it mirrors the divine will, though God's will encompasses all things."}, {"text": "It is the source of all clear and distinct perceptions, guiding the intellect to truth.", "isCorrect": false, "rationale": "The intellect perceives ideas, including clear and distinct ones. The will then *judges* these ideas, but it does not *source* the perceptions themselves."}], "id": "q04"}, {"question": "According to Descartes, where does intellectual error originate?", "options": [{"text": "It originates from the intellect's inherent finitude, which prevents it from grasping all truths.", "isCorrect": false, "rationale": "The intellect's finitude is a condition, but not the direct cause of error. Error arises from the *misuse* of the faculties, not merely their limitations."}, {"text": "It originates from God's decision to provide humans with an infinite will but a limited intellect.", "isCorrect": false, "rationale": "While God made both, Descartes argues error is *not* God's fault. He explains that error is a privation, and the mismatch is not a defect created by God but rather a feature of finite existence which we mismanage."}, {"text": "It arises when the infinite will makes judgments on matters that the finite intellect has not yet grasped clearly and distinctly.", "isCorrect": true, "rationale": "Descartes explicitly states that error occurs when the infinite will rushes ahead of the finite intellect, affirming or denying something that has not been clearly and distinctly perceived. This premature judgment is the source of error."}, {"text": "It is a positive faculty for falsehood that God instilled in humans to allow for free choice.", "isCorrect": false, "rationale": "Descartes argues that error is a 'privation' – an absence or lack of knowledge and restraint – not a positive faculty created by God."}], "id": "q05"}, {"question": "Descartes argues that error is a 'privation.' What does this mean in the context of his philosophy?", "options": [{"text": "Error is a positive quality, a distinct form of knowledge that God intentionally created.", "isCorrect": false, "rationale": "Descartes explicitly denies that error is a positive thing or a faculty for falsehood that God created. He aligns with Augustine and Aquinas on this point."}, {"text": "Error is an absence or lack of knowledge and intellectual restraint where it ought to be present, rather than a positive quality.", "isCorrect": true, "rationale": "Descartes defines privation as an absence or lack, much like blindness is the absence of sight. Error is not a creation of God but a failure to exercise proper intellectual restraint and acquire knowledge."}, {"text": "Error is a natural consequence of the human will being free to choose evil over good.", "isCorrect": false, "rationale": "While the will's freedom is central, Descartes applies the concept of privation specifically to intellectual error, not primarily moral evil. It's about a failure of judgment, not a choice of 'evil' knowledge."}, {"text": "Error is an illusion created by the senses, which leads the intellect astray.", "isCorrect": false, "rationale": "The 'Problem of Error' in Meditation IV focuses on intellectual error stemming from the interaction of will and intellect, not sensory illusions, which were largely addressed earlier in the Meditations."}], "id": "q06"}, {"question": "What is Descartes' prescribed remedy for avoiding intellectual error?", "options": [{"text": "To diligently seek out all possible information before making any judgment, regardless of clarity.", "isCorrect": false, "rationale": "Simply seeking more information isn't enough; the key is to ensure that the information is clearly and distinctly understood before judgment."}, {"text": "To limit the will's power by only considering judgments on matters that are universally accepted as true.", "isCorrect": false, "rationale": "Descartes does not suggest limiting the will's power in this way, nor does he rely on universal acceptance. His focus is on individual clarity of perception."}, {"text": "To develop the intellect to an infinite capacity, thereby eliminating all obscurity.", "isCorrect": false, "rationale": "The human intellect is inherently finite; it cannot become infinite. The remedy works within the limits of the finite intellect."}, {"text": "To withhold judgment whenever a perception is not clear and distinct, exercising intellectual discipline.", "isCorrect": true, "rationale": "The text clearly states the remedy: 'withhold judgment whenever your perception is not clear and distinct.' This is intellectual discipline, not passivity."}], "id": "q07"}, {"question": "Considering Descartes' view on error, how would he likely evaluate a doctor who must make a quick life-or-death decision based on incomplete evidence?", "options": [{"text": "He would condemn the doctor for making an erroneous judgment, as all judgments under uncertainty are inherently faulty.", "isCorrect": false, "rationale": "The 'Caution' note explicitly clarifies that Descartes' argument 'does not mean that we should never make judgments about uncertain matters.' It warns against treating uncertain judgments as certain."}, {"text": "He would advise the doctor to completely refrain from judgment, even if it means inaction, to avoid potential error.", "isCorrect": false, "rationale": "This aligns with the incorrect interpretation that Descartes advocates paralysis. The text notes that 'making practical decisions under uncertainty is unavoidable.'"}, {"text": "He would understand the necessity of the decision but caution the doctor to proportion their confidence to the clarity of their understanding.", "isCorrect": true, "rationale": "The 'Caution' note directly addresses this: 'Making practical decisions under uncertainty is unavoidable; what Descartes warns against is treating uncertain judgments as if they were certain ones.' The doctor should be aware of the uncertainty and not claim absolute certainty."}, {"text": "He would argue that such unavoidable errors are ultimately God's responsibility for creating a world with uncertainty.", "isCorrect": false, "rationale": "Descartes places the blame for error squarely on the individual's misuse of their faculties, not on God or the conditions of the world. Error is a privation stemming from our choice."}], "id": "q08"}, {"question": "Why is it important to understand that Descartes is offering a philosophical analysis, rather than just a 'theological apology' for God, regarding the problem of error?", "options": [{"text": "Because his primary goal is to prove God's existence through logical deduction, which is a philosophical task.", "isCorrect": false, "rationale": "While Descartes uses logical deduction, the text specifies that in Meditation IV, he's analyzing the *nature* and *origin* of error, not primarily proving God's existence, which was established earlier."}, {"text": "Because he aims to provide a rigorous explanation of human error that stems from the nature of mental faculties, not merely from pious assertion.", "isCorrect": true, "rationale": "The text states: 'Descartes is offering a philosophical analysis of what error is and where it comes from. The conclusion that God is not to blame follows from the analysis, not the other way around.' His task is to be 'philosophically rigorous, not merely a pious assertion.'"}, {"text": "Because his focus is on demonstrating the superiority of rationalism over empiricism in acquiring knowledge.", "isCorrect": false, "rationale": "While his work has implications for the rationalism-empiricism debate, the text emphasizes his immediate goal in Meditation IV is to analyze error, not to argue for a specific epistemological school."}, {"text": "Because his argument relies heavily on scripture and religious dogma rather than pure reason.", "isCorrect": false, "rationale": "This is incorrect. Descartes' philosophy is characterized by its reliance on pure reason and clear and distinct perceptions, not religious dogma."}], "id": "q09"}, {"question": "The 'Teacher Note' suggests that Descartes' advice – 'do not judge beyond what you clearly and distinctly understand' – is one of the most practically useful ideas. Which of the following best exemplifies its application in a modern context?", "options": [{"text": "A student confidently asserting an opinion in a debate without fully understanding the opposing viewpoints or supporting evidence.", "isCorrect": false, "rationale": "This example goes against Descartes' advice, as it describes making a judgment without clear and distinct understanding, which can lead to error and intellectual dishonesty."}, {"text": "A scientist refusing to publish research findings until all possible variables are controlled and every conceivable objection is refuted.", "isCorrect": false, "rationale": "While thoroughness is good, this represents an extreme and potentially paralyzing interpretation. Descartes' advice is about proportioning confidence to clarity, not demanding absolute perfection before any action or communication, especially in ongoing scientific inquiry."}, {"text": "An individual admitting 'I don't know' when asked about a complex political issue they haven't researched thoroughly.", "isCorrect": true, "rationale": "This directly aligns with Descartes' advice to 'be honest about the limits of your knowledge; do not pretend to certainty you do not have; and when you are genuinely uncertain, say so.' It demonstrates intellectual integrity and restraint."}, {"text": "A voter choosing a political candidate based solely on their emotional appeal, disregarding their policy stances.", "isCorrect": false, "rationale": "This example illustrates a judgment based on confused or unclear perception (emotional appeal over policy) rather than clear and distinct understanding, thereby risking error."}], "id": "q10"}, {"question": "Descartes argues that the finite human intellect combined with an infinite will is not a flaw in God's design. What is his justification for this claim?", "options": [{"text": "God gave humans both faculties at their maximum possible level; it is simply impossible to create creatures with greater capacity.", "isCorrect": false, "rationale": "Descartes does not argue that the faculties are maximized or that greater capacity is impossible. God could have given a larger intellect; Descartes' point is that error is not produced by the combination itself but by misuse."}, {"text": "The mismatch is not a defect because the intellect, though finite, is perfectly suited for its purpose; error arises not from the design but from the will extending beyond what the intellect has clearly grasped.", "isCorrect": true, "rationale": "Descartes argues that no individual faculty is defective — the intellect grasps what it grasps correctly, and the will is free as a will should be. Error is a privation, a lack of knowledge, that arises from the will's misuse of its freedom, not from any inherent flaw God built into either faculty."}, {"text": "God designed the mismatch deliberately so that humans would learn to discipline themselves through repeated error.", "isCorrect": false, "rationale": "Descartes does not claim God intended error as a pedagogical tool. His argument exonerates God by showing error is a privation resulting from free misuse, not a designed feature."}, {"text": "The intellect is actually infinite in potential, even if finite in current exercise, so the mismatch is only apparent.", "isCorrect": false, "rationale": "Descartes is clear that the human intellect is genuinely finite. The will is infinite in its freedom to affirm or deny; the intellect is limited in scope. He does not claim hidden infinite potential for the intellect."}], "id": "q11"}, {"question": "How does Descartes' account of error as a 'privation' parallel the classical theological explanation of moral evil?", "options": [{"text": "Both treat evil and error as positive qualities created by God to test human virtue.", "isCorrect": false, "rationale": "This is precisely the opposite of the privation theory. Both Augustine's account of moral evil and Descartes' account of intellectual error define these as absences or lacks — not as positive qualities created by God."}, {"text": "Both treat their respective 'evils' as absences of something that ought to be present (goodness or knowledge/restraint), thereby absolving God of creating them.", "isCorrect": true, "rationale": "Moral evil, in the Augustinian tradition, is privatio boni — the absence of goodness. Descartes applies the same logic to intellectual error: it is a privation of knowledge and restraint where they ought to be. Since privations are not positive creations, God is not their author in either case."}, {"text": "Both appeal to free will as the ultimate source, making individual choice entirely responsible and God entirely passive.", "isCorrect": false, "rationale": "While free will is central to both accounts, Descartes also stresses that the finite intellect's limited scope is a background condition — not just pure choice. And in neither tradition is God merely passive; the claim is that God is not the author of the privation, not that God plays no role in creation."}, {"text": "Both conclude that evil and error are necessary features of the best possible world, following Leibnizian theodicy.", "isCorrect": false, "rationale": "Leibniz's 'best of all possible worlds' theodicy postdates Descartes and is a distinct approach. Descartes' argument is specifically about privation and faculty misuse, not about whether this world is optimal."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
