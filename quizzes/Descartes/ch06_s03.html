<script>
var QUESTIONS = [{"question": "What primary connection does Descartes establish between his two main inquiries in Meditation V: the nature of material things and the existence of God?", "options": [{"text": "He argues that God's existence is a prerequisite for understanding the true nature of material things through sensory experience.", "isCorrect": false, "rationale": "Descartes consistently emphasizes reason over sensory experience for knowing essences, and the text states both inquiries rest on the mind's power to know essences by reason alone, not God as a prerequisite for sensory understanding."}, {"text": "Both inquiries are resolved through the mind's inherent capacity to know essences by reason alone, rather than relying on empirical observation.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states, 'His answers are connected: both rest on the power of the mind to know essences by reason alone.' This highlights the central role of pure intellect over sensory input."}, {"text": "He discovers that material things are merely figments of imagination, proving that only a non-material God can exist.", "isCorrect": false, "rationale": "While Descartes explores ideas of material things 'in thought,' he does not conclude they are 'merely figments,' but rather seeks to understand their distinct properties and later their potential existence. This option misrepresents his conclusion."}, {"text": "He concludes that the existence of material things directly disproves the necessity of a divine creator.", "isCorrect": false, "rationale": "Descartes is working towards proving God's existence, not disproving it. This option contradicts the central aim of the meditation regarding God."}]}, {"question": "Before determining if material objects exist outside of him, what initial step does Descartes take regarding the ideas of these objects?", "options": [{"text": "He attempts to verify them against his sensory perceptions to ensure their correspondence with external reality.", "isCorrect": false, "rationale": "Descartes explicitly states, 'But before examining whether any such objects as I conceive exist outside of me, I must consider the ideas of them in so far as they are in my thought.' This indicates he prioritizes internal analysis over external verification at this stage."}, {"text": "He focuses on distinguishing between ideas that are clear and distinct from those that are confused.", "isCorrect": true, "rationale": "The text states, 'I must consider the ideas of them in so far as they are in my thought, and see which of them are distinct and which confused.' This is his method for establishing reliable knowledge about the nature of these ideas."}, {"text": "He categorizes them based on their utility and practical applications in daily life.", "isCorrect": false, "rationale": "Descartes's method is philosophical, focusing on certainty and truth, not practical utility. The text makes no mention of categorizing ideas by their usefulness."}, {"text": "He considers whether they could be implanted by an evil demon to deceive him.", "isCorrect": false, "rationale": "While the evil demon is a concept from earlier meditations, in Meditation V, Descartes is moving past that state of doubt by establishing positive truths based on clear and distinct perception."}]}, {"question": "Descartes uses the example of a triangle to illustrate 'true and immutable natures.' What key characteristic does he attribute to these natures?", "options": [{"text": "They are subjective constructions of the mind, dependent on individual thought and capable of alteration.", "isCorrect": false, "rationale": "Descartes explicitly states that the nature of a triangle 'is immutable and eternal, which I have not invented, and which in no wise depends on my mind.' This directly contradicts the idea of subjective construction."}, {"text": "They are derived solely from sensory experience, such as seeing triangular objects in the world.", "isCorrect": false, "rationale": "He refutes this objection, stating he can 'form in my mind an infinitude of other figures regarding which we cannot have the least conception of their ever having been objects of sense' and still demonstrate their properties."}, {"text": "They possess an inherent, unchangeable essence that exists independently of whether anyone thinks of them or if they exist physically.", "isCorrect": true, "rationale": "The text describes these natures as 'true and immutable,' 'eternal,' 'not invented,' and 'in no wise depends on my mind,' capable of having properties demonstrated whether one wishes it or not. This points to an inherent, independent essence."}, {"text": "Their properties are contingent upon mathematical axioms and theorems, which are themselves human inventions.", "isCorrect": false, "rationale": "Descartes argues that the truth of these properties (like a triangle's angles summing to two right angles) is 'manifest' and 'well accords with my nature,' implying discovery of pre-existing truths, not invention of axioms."}]}, {"question": "Descartes argues that the idea of a triangle and its properties cannot come from the senses. Which of the following best supports his reasoning?", "options": [{"text": "Sensory experience is inherently deceptive, making it an unreliable source for any clear and distinct ideas.", "isCorrect": false, "rationale": "While Descartes is wary of sensory deception, his specific argument here is not a general dismissal but rather that he can conceive of countless other figures (like complex polygons) for which he has no sensory experience, yet can still clearly demonstrate their properties."}, {"text": "He can conceive of and demonstrate properties for an infinitude of figures that have never been, and could never be, objects of sense perception.", "isCorrect": true, "rationale": "He states, 'I can form in my mind an infinitude of other figures regarding which we cannot have the least conception of their ever having been objects of sense, and I can nevertheless demonstrate various properties pertaining to their nature.' This is the direct reason he gives."}, {"text": "The mind actively invents the properties of geometrical figures, making their origin irrelevant to sensory input.", "isCorrect": false, "rationale": "Descartes explicitly denies inventing these properties, noting that he recognizes them 'whether I wish it or do not wish it,' and that they were 'already present to my mind,' not created by it."}, {"text": "The distinctness of a triangle's properties requires a perfectly ideal form that sensory experience can only approximate imperfectly.", "isCorrect": false, "rationale": "While related to his broader philosophy, the text's specific argument against sensory origin focuses on the ability to demonstrate properties for non-sensory figures, not merely the imperfection of sensory approximations."}]}, {"question": "How does Descartes transition from discussing 'true and immutable natures' of figures and numbers to arguing for the existence of God?", "options": [{"text": "He claims that the perfection of mathematical truths necessitates a perfect divine author to guarantee their veracity.", "isCorrect": false, "rationale": "While God's role in guaranteeing truth is important in his philosophy, the direct transition here is based on the *idea* of God sharing the same kind of clear and distinct nature, not just mathematical perfection generally."}, {"text": "He posits that if clear and distinct knowledge reveals true properties of objects, then the clear and distinct idea of God must likewise entail His existence.", "isCorrect": true, "rationale": "Descartes states, 'if just because I can draw the idea of something from my thought, it follows that all which I know clearly and distinctly as pertaining to this object does really belong to it, may I not derive from this an argument demonstrating the existence of God?' He then applies this same logic to the idea of a supremely perfect Being."}, {"text": "He asserts that the existence of any material thing, however small, logically demands a first cause, which is God.", "isCorrect": false, "rationale": "His argument at this point is not about causation for material things, but about the properties inherent in the *idea* of God itself, mirroring the properties inherent in the ideas of figures."}, {"text": "He argues that the sheer complexity and infinitude of mathematical ideas could only be conceived by a being with infinite understanding, i.e., God.", "isCorrect": false, "rationale": "This is a plausible argument in some contexts, but it's not the specific one presented in Meditation V for bridging from mathematics to God's existence. The text focuses on existence as a perfection inherent in the idea of God."}]}, {"question": "Descartes likens the inseparability of existence from God's essence to the inseparability of a triangle's three angles summing to two right angles from its essence. What is the initial 'sophism' or objection he raises against this comparison?", "options": [{"text": "The idea of God, unlike a triangle, is too abstract to have any discernible essence or properties.", "isCorrect": false, "rationale": "Descartes explicitly states he finds the idea of God 'no less clearly and distinctly' than any figure or number, implying its essence is discernible."}, {"text": "We are accustomed to distinguishing existence from essence in all other things, making it seem possible to conceive of God without actually existing.", "isCorrect": true, "rationale": "He states, 'For being accustomed in all other things to make a distinction between existence and essence, I easily persuade myself that the existence can be separated from the essence of God, and that we can thus conceive God as not actually existing.' This is his initial counter-consideration."}, {"text": "Mathematical truths are inventions of the human mind, whereas God's existence must be independent of human thought.", "isCorrect": false, "rationale": "Descartes has already argued that mathematical truths are discovered, not invented, and that their necessity is inherent. This objection misrepresents his stance on mathematical truths."}, {"text": "The existence of a triangle is empirically verifiable, while the existence of God is not.", "isCorrect": false, "rationale": "Descartes's argument for God's existence in this meditation is based on clear and distinct ideas, not empirical verification, similar to how he treats mathematical essences."}]}, {"question": "In his final refinement of the ontological argument, Descartes distinguishes the necessary connection between a mountain and a valley from the necessary existence of God. What is the critical difference?", "options": [{"text": "The mountain and valley analogy demonstrates that conceptual connections always imply actual existence, including God's.", "isCorrect": false, "rationale": "Descartes clarifies this is a 'sophism.' He says, 'from the fact that I cannot conceive a mountain without a valley, it does not follow that there is any mountain or any valley in existence.' This option misunderstands his correction."}, {"text": "One can conceive of a mountain and valley without either existing, but existence is a perfection that *must* be attributed to a supremely perfect Being, making it inseparable and necessary.", "isCorrect": true, "rationale": "He explains that for a mountain and valley, 'whether they exist or do not exist, cannot in any way be separated.' But for God, 'existence is inseparable from Him, and hence that He really exists,' because it's not in his power to think of God without existence (a supreme perfection)."}, {"text": "The necessity of the mountain-valley connection is imposed by the observer's mind, while God's existence is an external, objective truth.", "isCorrect": false, "rationale": "Descartes argues that neither the mountain-valley connection nor God's existence are imposed by 'my thought.' For God, it's 'the necessity which lies in the thing itself' that determines him to think that way."}, {"text": "The mountain-valley analogy is flawed because mountains and valleys are physical entities, while God is non-physical.", "isCorrect": false, "rationale": "The essence of the distinction isn't about physicality, but about whether the conceptual inseparability implies actual existence. The mountain-valley case is about conceptual linkage without existential implication; God's case is about conceptual linkage *with* existential implication because existence is a perfection."}]}, {"question": "Descartes further clarifies that it is not 'necessary for me to assert that God exists after having presupposed that He possesses every sort of perfection.' Instead, what is the nature of the necessity for God's existence?", "options": [{"text": "It is necessary to consider God as possessing all perfections, including existence, only when one chooses to engage in theological speculation.", "isCorrect": false, "rationale": "He states, 'whenever it happens that I think of a first and a sovereign Being... it is necessary that I should attribute to Him every sort of perfection,' implying a foundational attribute whenever the concept is entertained, not just for 'theological speculation.'"}, {"text": "The necessity arises from the fact that whenever one conceives of a first and sovereign Being, one must attribute all perfections to it, and existence is recognized as a perfection.", "isCorrect": true, "rationale": "He explains, 'although it is not necessary that I should at any time entertain the notion of God, nevertheless whenever it happens that I think of a first and a sovereign Being... it is necessary that I should attribute to Him every sort of perfection... And this necessity suffices to make me conclude (after having recognised that existence is a perfection) that this first and sovereign Being really exists.'"}, {"text": "The necessity is purely logical, similar to a mathematical proof, without any implication for actual existence outside of thought.", "isCorrect": false, "rationale": "Descartes's argument aims precisely at concluding that God 'really exists,' not just as a logical construct. He makes a distinction between false suppositions (like the rhombus in a circle) and true, innate ideas like God."}, {"text": "It is a necessity born from faith and religious conviction, which transcends purely rational arguments.", "isCorrect": false, "rationale": "Descartes's entire project in the Meditations is to establish truths through reason and clear and distinct perception, not faith."}]}, {"question": "Descartes distinguishes 'true ideas born within me' from 'false suppositions.' What is a key characteristic he identifies for the 'true idea' of God?", "options": [{"text": "It is something factitious, depending solely on his thought for its properties.", "isCorrect": false, "rationale": "He explicitly states, 'I discern in many ways that this idea is not something factitious, and depending solely on my thought, but that it is the image of a true and immutable nature.'"}, {"text": "He can easily conceive of two or more such Gods existing simultaneously, similar to imagining multiple triangles.", "isCorrect": false, "rationale": "He states, 'it is not possible for me to conceive two or more Gods in this same position,' which is a unique characteristic of the true idea of God."}, {"text": "It is the only thing whose essence necessarily includes existence, making its negation inconceivable.", "isCorrect": true, "rationale": "He states, 'first of all, because I cannot conceive anything but God himself to whose essence existence [necessarily] pertains,' indicating this is a unique and defining characteristic of the idea of God."}, {"text": "Its properties can be diminished or changed based on personal preferences or cultural beliefs.", "isCorrect": false, "rationale": "He states, 'I know an infinitude of other properties in God, none of which I can either diminish or change,' emphasizing the immutable nature of the idea of God."}]}, {"question": "What is Descartes's ultimate criterion for certainty, to which he 'must always return,' and how does it apply to the knowledge of God's existence?", "options": [{"text": "The ultimate criterion is empirical observation, which, when sufficiently precise, can verify God's presence in the natural world.", "isCorrect": false, "rationale": "Descartes's method relies on reason and internal perception, not empirical observation, for fundamental truths. He is moving away from reliance on senses."}, {"text": "The ultimate criterion is the clear and distinct conception of things; God's existence, being a supremely perfect Being to whose essence alone existence pertains, would be the most immediate and easy to know without prejudice.", "isCorrect": true, "rationale": "He concludes, 'we must always return to the point that it is only those things which we conceive clearly and distinctly that have the power of persuading me entirely.' He then applies this to God, stating, 'there would be nothing which I could know more immediately and more easily than Him. For is there anything more manifest than that there is a God, that is to say, a Supreme Being, to whose essence alone existence pertains?'"}, {"text": "The ultimate criterion is the consensus of philosophical opinion; if many philosophers agree, it is likely true, and God's existence is widely accepted.", "isCorrect": false, "rationale": "Descartes's method is individualistic and introspective ('I conceive clearly and distinctly'), not based on external authority or consensus."}, {"text": "The ultimate criterion is the ability to derive practical benefits from a belief; a belief in God provides comfort and order, making it certain.", "isCorrect": false, "rationale": "Descartes is seeking truth based on reason, not practical benefits or emotional comfort, which are not indicators of certainty in his philosophical framework."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
