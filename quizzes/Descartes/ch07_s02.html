<script>
var QUESTIONS = [{"question": "What is the core principle of Aquinas's hylomorphic account of the soul?", "options": [{"text": "The soul is a separate, distinct substance that temporarily inhabits the body, much like a pilot in a ship.", "isCorrect": false, "rationale": "This describes a form of dualism, particularly Cartesian, which Aquinas's hylomorphism explicitly contrasts with."}, {"text": "The soul is the organizing principle (form) that makes a body a living being, intrinsically united with matter.", "isCorrect": true, "rationale": "Aquinas, following Aristotle, defines the soul as the form of the body, meaning it is the principle that organizes matter into a living human being, not a separate substance."}, {"text": "The soul is an accidental quality that can be present or absent without changing the body's fundamental essence.", "isCorrect": false, "rationale": "Aquinas argues that the soul is essential, not accidental, to making a body a living human body. Without the soul, it would be a mere heap of matter."}, {"text": "The soul is an immaterial entity that primarily serves as the body's motor, moving it through appetite.", "isCorrect": false, "rationale": "While the intellect can move the body via appetite, Aquinas later refutes the idea that the intellect is united to the body *merely* as a motor, arguing it doesn't sufficiently explain how understanding is an action of the whole man."}], "id": "q01"}, {"question": "How does Aquinas's hylomorphism fundamentally differ from the 'Cartesian dualism' mentioned in the text?", "options": [{"text": "Aquinas believed the soul was perishable, while Cartesian dualism argued for its immortality.", "isCorrect": false, "rationale": "Aquinas (and the Objections he addresses) implies the intellectual principle is incorruptible, much like Descartes believed the soul was immortal. The difference isn't perishability."}, {"text": "Aquinas viewed the soul as the form of the body, intrinsically united, whereas Descartes saw it as a distinct, separate substance.", "isCorrect": true, "rationale": "The text explicitly states that Aquinas's hylomorphism means the soul is 'not a separate substance housed inside the body but the form of the body,' which directly contrasts with Cartesian dualism's separation of mind and body."}, {"text": "Aquinas denied the intellect's ability to know universal truths, which Descartes affirmed.", "isCorrect": false, "rationale": "Aquinas acknowledges the intellect's capacity for universal knowledge (even using it as an objection to the intellect being a form) and ultimately affirms it."}, {"text": "Aquinas posited multiple souls for different functions, while Descartes argued for a single, unified soul.", "isCorrect": false, "rationale": "Aquinas discusses the soul as the principle of nourishment, sensation, movement, and understanding, implying a unified principle, not multiple distinct souls in the Cartesian sense."}], "id": "q02"}, {"question": "In Aquinas's *Summa Theologica* excerpt, what is the primary purpose of the 'Objection' sections before the 'I answer that' section?", "options": [{"text": "To present alternative theories that Aquinas ultimately endorses as partially correct.", "isCorrect": false, "rationale": "Aquinas uses objections to present counter-arguments or difficulties, which he then addresses and refutes, rather than endorsing them."}, {"text": "To summarize the contemporary philosophical consensus on the mind-body problem.", "isCorrect": false, "rationale": "The objections are specific arguments, not a general summary of consensus, and they are arguments against the position Aquinas intends to defend."}, {"text": "To articulate arguments against the position Aquinas intends to defend, which he then refutes or clarifies.", "isCorrect": true, "rationale": "This is the standard scholastic method: present objections to a thesis, then provide the definitive answer, and finally respond to each objection. The objections serve to fully explore the difficulties of the position."}, {"text": "To offer historical context for the mind-body problem without taking a definitive stance.", "isCorrect": false, "rationale": "While there's historical context in the chapter intro, the *Summa* article itself is focused on arguing for a specific philosophical position."}], "id": "q03"}, {"question": "One objection to the intellectual principle being the form of the body states that 'the form of the thing understood is not received into the intellect materially and individually, but rather immaterially and universally.' What inherent characteristic of the intellect does this objection highlight?", "options": [{"text": "Its capacity for sensation, which is similar to corporeal organs.", "isCorrect": false, "rationale": "The objection explicitly differentiates the intellect from the senses, which receive forms materially and individually. The intellect's immateriality is what's being highlighted."}, {"text": "Its ability to grasp universal concepts beyond particular material instantiations.", "isCorrect": true, "rationale": "Receiving forms 'immaterially and universally' means the intellect can understand general concepts (e.g., 'humanity') rather than just individual instances (e.g., 'Socrates'), implying a capacity that seems to transcend physical limitations."}, {"text": "Its dependence on specific physical properties and organs of the body for operation.", "isCorrect": false, "rationale": "The objection argues against such dependence, suggesting the intellect's operation implies it is *not* bound by material conditions."}, {"text": "Its role as a passive receiver of sensory data without active processing.", "isCorrect": false, "rationale": "The intellect actively grasps universal forms, which is a higher function than merely passively receiving sensory data."}], "id": "q04"}, {"question": "Objection 5 argues that 'whatever has per se existence is not united to the body as its form.' What key attribute of the intellectual principle, according to this objection, makes it incompatible with being a form?", "options": [{"text": "Its inherent corruptibility, as forms are tied to matter.", "isCorrect": false, "rationale": "Objection 6 discusses incorruptibility as an attribute of the intellect, implying it's *not* corruptible. Objection 5 focuses on 'per se existence,' not corruptibility."}, {"text": "Its potential for local movement, which is a function of the body.", "isCorrect": false, "rationale": "Local movement is mentioned in the context of the soul being a principle of life, but 'per se existence' refers to being able to exist independently, not to movement."}, {"text": "Its capacity for independent existence and subsistence, unlike a form which exists only 'by which' a thing exists.", "isCorrect": true, "rationale": "The objection states 'the intellectual principle has per se existence and is subsistent,' contrasting this with a form which is 'that by which a thing exists,' meaning a form typically does not exist independently of its matter."}, {"text": "Its limited scope of knowledge, which prevents it from being a universal principle.", "isCorrect": false, "rationale": "The intellect's capacity for knowing all things is brought up in Objection 2 as a reason *against* it being a form determined by particular matter, not as an attribute making it incompatible due to 'per se existence'."}], "id": "q05"}, {"question": "Aquinas argues that 'the intellect which is the principle of intellectual operation is the form of the human body.' What is his primary justification for this claim, based on his refutation of alternative views?", "options": [{"text": "That the intellect is separate from the body, as Aristotle supposedly said.", "isCorrect": false, "rationale": "Aquinas cites Aristotle's argument, but his own core argument is about how the intellectual action is attributed to 'this particular man,' not about separation."}, {"text": "That humans are conscious of sensing and understanding as the same individual, and sensing requires a body.", "isCorrect": true, "rationale": "Aquinas argues that 'it is one and the same man who is conscious both that he understands, and that he senses.' Since one cannot sense without a body, the intellect must be a part of the man united to the body, making the body an essential component of the human being."}, {"text": "That the intellect, as a motor, moves the body through appetite, thereby constituting the whole.", "isCorrect": false, "rationale": "Aquinas explicitly refutes the idea of the intellect being united to the body *only* as its motor, providing several reasons why this view is 'absurd.'"}, {"text": "That forms are necessarily determined by the matter they inform, and the intellect is thus limited in its knowledge.", "isCorrect": false, "rationale": "This is an argument found in Objection 2, used *against* the intellect being a form, not Aquinas's justification *for* it."}], "id": "q06"}, {"question": "Aquinas refutes the idea that the intellect is united to the body 'as its motor.' Which of the following is NOT one of his reasons for rejecting this view?", "options": [{"text": "The intellect's movement of the body (via appetite) presupposes the intellect's operation, reversing the causal order.", "isCorrect": false, "rationale": "Aquinas explicitly states, 'The reason therefore why Socrates understands is not because he is moved by his intellect, but rather, contrariwise, he is moved by his intellect because he understands.' This is a reason he uses."}, {"text": "The action of a motor is attributed to the moved only as an instrument, and understanding is not possible through a corporeal instrument.", "isCorrect": false, "rationale": "Aquinas argues 'if understanding is attributed to Socrates, as the action of what moves him, it follows that it is attributed to him as to an instrument,' which he contradicts by citing Aristotle."}, {"text": "If the intellect is external to the essence as a motor, Socrates would not be absolutely one, and consequently not a being absolutely.", "isCorrect": false, "rationale": "Aquinas states that 'if the intellect be not the form, it follows that it must be outside the essence, and then the intellect is the whole Socrates as a motor to the thing moved. Whereas the act of intellect remains in the agent... Therefore the action of understanding cannot be attributed to Socrates for the reason that he is moved by his intellect.' This contributes to the idea that Socrates would not be a unified being."}, {"text": "The intellect is inherently incorruptible and therefore cannot be tied to the corruptible body in any manner.", "isCorrect": true, "rationale": "While the incorruptibility of the intellect is mentioned in an objection against it being a form, Aquinas does not use this specific point as a reason to refute the 'intellect as motor' theory. His refutations for that theory focus on the nature of attributing action and the unity of the human being."}], "id": "q07"}, {"question": "Beyond addressing the issue of personal consciousness ('it is himself who understands'), what final argument does Aquinas use to confirm that the intellectual principle is the proper form of man?", "options": [{"text": "The observation that universal knowledge cannot arise from a material form, thus requiring a separate intellect.", "isCorrect": false, "rationale": "This is an argument from an objection (Objection 3) against the intellect being a form, not Aquinas's final confirmatory argument."}, {"text": "The logical necessity that a thing's form determines its capacity for sensation, which is a shared trait with animals.", "isCorrect": false, "rationale": "While sensation is a vital operation, Aquinas's final argument focuses on understanding as the uniquely human and defining operation, not sensation which is shared with animals."}, {"text": "Man's unique proper operation of understanding, which defines his species and is the source of his ultimate happiness.", "isCorrect": true, "rationale": "Aquinas states, 'The proper operation of man as man is to understand... Man must therefore derive his species from that which is the principle of this operation... the intellectual principle is the proper form of man.'"}, {"text": "The principle that anything with *per se* existence cannot be a form of matter.", "isCorrect": false, "rationale": "This is from Objection 5, a reason presented *against* the intellectual principle being a form, not Aquinas's final argument for it."}], "id": "q08"}, {"question": "The text uses the analogy of a knife's sharpness and shape being its 'form' to explain Aquinas's hylomorphism. If a wooden block were carved into the general shape of a knife but lacked a sharp, cutting edge, how would Aquinas likely describe it?", "options": [{"text": "It possesses the complete form of a knife, but its matter (wood) is unsuitable for its function.", "isCorrect": false, "rationale": "The form *includes* the sharpness and shape that makes it a knife. Lacking sharpness means it lacks part of the form, regardless of the matter's suitability."}, {"text": "It is a knife, but one that is not currently performing its function optimally.", "isCorrect": false, "rationale": "For Aquinas, the form is 'what makes the knife a knife.' Without the essential sharpness, it wouldn't truly *be* a knife in its full sense, but rather a shaped piece of wood."}, {"text": "It has the matter of a knife, but it lacks the complete form that makes it truly a knife.", "isCorrect": true, "rationale": "The analogy states that the soul is 'what makes a human body a human body,' just as the form of a knife (sharpness and shape) is 'what makes the knife a knife.' A dull, shaped block lacks the complete form of a knife."}, {"text": "It is an accidental manifestation of a knife, but not substantially a knife.", "isCorrect": false, "rationale": "The form is substantial, not accidental. If it lacks the essential part of the form, it is not substantially that thing at all, rather than being an 'accidental manifestation.'"}], "id": "q09"}, {"question": "What is the central philosophical tension Aquinas addresses in the provided *Summa Theologica* passage regarding the intellect and the body?", "options": [{"text": "Whether the intellect is capable of knowing universal truths or only particulars.", "isCorrect": false, "rationale": "While this is raised as an objection (Obj. 2 & 3), it's a specific challenge to the central issue, not the central tension itself. The core tension is *how* the intellect can know universals if it's tied to matter."}, {"text": "How the seemingly immaterial and universal operations of the intellect can be intrinsically tied to a particular, material body.", "isCorrect": true, "rationale": "The entire article grapples with the paradox that the intellect performs operations (like knowing universals, having *per se* existence) that seem to transcend material limitation, yet it must be the form of a particular, material body for understanding to be the act of 'this particular man.'"}, {"text": "The ethical implications of an incorruptible soul existing independently of the body after death.", "isCorrect": false, "rationale": "The incorruptibility of the intellect is mentioned as an objection (Obj. 6), but the passage does not delve into the ethical implications of post-mortem existence, focusing instead on the nature of the intellect's union with the living body."}, {"text": "The distinction between an accidental quality and a substantial form in inanimate objects.", "isCorrect": false, "rationale": "The passage primarily concerns the human intellect and soul, using inanimate objects like knives only as an analogy to explain the concept of form, not as the main subject of inquiry."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
