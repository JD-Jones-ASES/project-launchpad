<script>
var QUESTIONS = [{"question": "According to Descartes' argument in Meditation VI, what is the crucial prerequisite for establishing the existence of the external world?", "options": [{"text": "The undeniable clarity and distinctness of sensory perceptions themselves.", "isCorrect": false, "rationale": "Descartes argues that senses alone do not provide philosophical precision or certainty, and can even deceive. The clarity and distinctness of sensory perceptions are not sufficient on their own to prove an external world."}, {"text": "The prior proof that God exists and is not a deceiver.", "isCorrect": true, "rationale": "The text explicitly states: 'This proof of the external world depends entirely on Descartes' prior proofs of God's existence and non-deception. Without God, there is no guarantee that our natural inclinations track reality.'"}, {"text": "The realization that solipsism leads to logical contradictions.", "isCorrect": false, "rationale": "While solipsism might be undesirable, Descartes' proof does not rely on demonstrating its logical contradictions but rather on God's non-deceptive nature regarding our natural inclinations."}, {"text": "The mathematical certainty that physical objects must occupy space.", "isCorrect": false, "rationale": "Descartes does focus on extended, material things, but the certainty of the external world's existence, given our sensory ideas, ultimately hinges on God's non-deception, not pure mathematical deduction about space."}], "id": "q01"}, {"question": "When Descartes claims the external world exists, he carefully qualifies that:", "options": [{"text": "Sensory ideas are merely mental constructs with no objective reality.", "isCorrect": false, "rationale": "Descartes argues that external objects *do* exist and *cause* our sensory ideas, so they are not 'merely mental constructs' without objective reality. He proves an external world exists."}, {"text": "Material things are precisely as the senses represent them, including colors and sounds.", "isCorrect": false, "rationale": "The text clearly states: 'Descartes does not claim that material things are exactly as the senses represent them. Colors, sounds, and smells as we experience them may not be in the objects exactly as we perceive them.'"}, {"text": "The senses provide practical information about external objects, but not their exact philosophical nature.", "isCorrect": true, "rationale": "The text explains: 'The senses give us practical information, not philosophical precision.' They are reliable for 'practical purposes' like survival, but reason is needed for 'deep nature.'"}, {"text": "External objects are only known through pure intellectual intuition, not sensory experience.", "isCorrect": false, "rationale": "Descartes uses sensory ideas as the starting point for his proof of the external world, arguing that these ideas must correspond to something outside his mind, thus acknowledging a role for sensory experience."}], "id": "q02"}, {"question": "Which principle is fundamental to Descartes' argument for the 'real distinction' between mind and body?", "options": [{"text": "The principle that all substances must have spatial extension.", "isCorrect": false, "rationale": "This contradicts Descartes' view of mind (res cogitans) as a non-extended substance. His argument distinguishes mind and body precisely because mind lacks extension while body possesses it."}, {"text": "The belief that any two things with different properties must be distinct.", "isCorrect": false, "rationale": "While mind and body have different properties, Descartes' argument for *real* distinction is more specific, relying on conceivability and God's power to create independent existences, not merely a difference in properties."}, {"text": "The principle that conceivability implies possibility, especially concerning God's power.", "isCorrect": true, "rationale": "The text states: 'This argument rests on the principle that conceivability implies possibility: if I can clearly conceive of something, it is at least possible for God to make it so.'"}, {"text": "The empirical observation that the mind can exist without the body during out-of-body experiences.", "isCorrect": false, "rationale": "Descartes' argument is based on clear and distinct conception and logical deduction, not empirical observations or specific paranormal experiences like out-of-body phenomena."}], "id": "q03"}, {"question": "Based on Cartesian dualism, which of the following best describes the characteristics of the 'mind' (res cogitans)?", "options": [{"text": "It is an extended substance that interacts with the body through spatial movement.", "isCorrect": false, "rationale": "The text explicitly states the mind 'has no spatial location, no size, no shape' and 'is not divisible,' directly contradicting the idea of it being an extended substance."}, {"text": "It is a thinking substance with no spatial location, size, or shape, and is not divisible.", "isCorrect": true, "rationale": "The 'keyconcept' box for Cartesian Dualism defines 'Mind (res cogitans)' as 'Thinking substance... It has no spatial location, no size, no shape. It is not divisible.'"}, {"text": "It is a material substance that can be observed and measured scientifically.", "isCorrect": false, "rationale": "Descartes identifies the mind as 'mental substance' or 'thinking substance,' which is fundamentally different from 'material substance' and thus not directly observable or measurable scientifically in the way physical objects are."}, {"text": "It is an illusory aspect of the brain, ultimately reducible to physical processes.", "isCorrect": false, "rationale": "Cartesian dualism holds the mind as a 'really distinct' substance from the body (including the brain), meaning it is not an illusion or reducible to physical processes."}], "id": "q04"}, {"question": "According to Descartes, what defines 'body' (res extensa) in the context of Cartesian dualism?", "options": [{"text": "Its capacity for thought and sensation independent of the mind.", "isCorrect": false, "rationale": "The text clearly states that 'Body (res extensa)... It does not think,' and sensation is a feature of the mind arising from its union with the body, not a property of the body itself."}, {"text": "Its non-spatial, indivisible nature, mirroring the mind.", "isCorrect": false, "rationale": "This describes the mind (res cogitans). The body (res extensa) is defined by its spatial extension and divisibility."}, {"text": "Its ability to be conceived without a mind, and its properties of extension, shape, and divisibility.", "isCorrect": true, "rationale": "The argument for 'real distinction' explicitly states Descartes can 'clearly and distinctly conceive of bodies... without conceiving of any thinking substance.' The 'keyconcept' for Cartesian Dualism defines 'Body (res extensa)' as 'Extended substance. It occupies space, has shape and size, and can be divided.'"}, {"text": "Its role as a temporary prison for the soul, to be escaped from.", "isCorrect": false, "rationale": "The 'caution' box explicitly refutes this, stating 'This is not Gnosticism... The body is a genuine part of what it means to be human.'"}], "id": "q05"}, {"question": "Descartes affirms both the 'real distinction' between mind and body and their 'intimate union.' What is the main tension between these two claims?", "options": [{"text": "If they are really distinct, they should not be able to interact at all, contradicting everyday experience.", "isCorrect": true, "rationale": "The text identifies the 'interaction problem' as the 'deepest difficulty with Cartesian dualism,' asking 'how can an immaterial mind... push or pull on a material body... And how can physical events... cause non-physical experiences in the mind?' This highlights the tension."}, {"text": "The 'real distinction' implies one is good and the other is evil, but Descartes denies this.", "isCorrect": false, "rationale": "Descartes explicitly denies any moral judgment (good/evil) on the body in the 'caution' note. The tension is philosophical/metaphysical, not moral."}, {"text": "An intimate union would mean they are the same substance, which contradicts the 'real distinction.'", "isCorrect": false, "rationale": "Descartes carefully maintains they are distinct substances while also intimately united. The tension isn't that they *become* the same substance, but how distinct substances *interact* when intimately united."}, {"text": "The 'real distinction' is a scientific claim, while the 'intimate union' is a religious one, making them incompatible.", "isCorrect": false, "rationale": "Both claims are philosophical in nature within Descartes' system, derived from reason and argument, not presented as distinct categories of scientific versus religious claims."}], "id": "q06"}, {"question": "Descartes explicitly rejects the idea that the mind merely uses the body 'the way a sailor uses a ship.' What aspect of the mind-body relationship does this rejection highlight about his own view?", "options": [{"text": "The mind is fundamentally identical to the body, making interaction unproblematic.", "isCorrect": false, "rationale": "Descartes maintains the 'real distinction' between mind and body; they are not identical. The rejection of the sailor analogy emphasizes their *intimate union* despite their distinctness."}, {"text": "The mind, though distinct from the body, is intimately united with it and affected by its states.", "isCorrect": true, "rationale": "The text explains: 'The sailor can be perfectly comfortable while the ship is damaged... But when my body is damaged... I feel pain and hunger... in my mind. This shows that mind and body are not merely associated; they are intimately united.'"}, {"text": "The mind is completely independent and unaffected by the physical well-being of the body.", "isCorrect": false, "rationale": "This is precisely what the 'sailor and ship' analogy would imply, and it is the view Descartes rejects in favor of an 'intimate union' where the mind *is* affected by bodily states."}, {"text": "The body is an evil and unimportant vessel that the mind seeks to escape from.", "isCorrect": false, "rationale": "The 'caution' box clarifies that Descartes' dualism is not Gnostic; he does not see the body as evil or a trap."}], "id": "q07"}, {"question": "The 'interaction problem' for Cartesian dualism primarily concerns which of the following?", "options": [{"text": "The difficulty in proving the existence of an external world without relying on God.", "isCorrect": false, "rationale": "This relates to the proof of the external world, not specifically the interaction problem. The interaction problem presupposes the existence of both mind and body."}, {"text": "The philosophical challenge of explaining how a non-extended mind can causally affect an extended body, and vice versa.", "isCorrect": true, "rationale": "The text defines the interaction problem as 'The philosophical difficulty of explaining how two radically different substances — an immaterial, non-extended mind and a material, extended body — can causally interact with each other.'"}, {"text": "The tension between sensory input providing practical information versus philosophical precision.", "isCorrect": false, "rationale": "This refers to the qualification about the senses when recovering the external world, not the interaction between mind and body substances."}, {"text": "The question of how to distinguish between waking life and dreaming experiences.", "isCorrect": false, "rationale": "This is a separate issue addressed at the end of Meditation VI concerning the correction of the senses, not the metaphysical interaction of distinct substances."}], "id": "q08"}, {"question": "According to Descartes, for what purpose are the senses most reliably trustworthy?", "options": [{"text": "To reveal the ultimate, deep philosophical nature of all things.", "isCorrect": false, "rationale": "The text states: 'The senses are not designed to reveal the deep nature of things — that is the job of reason.'"}, {"text": "To provide precise, objective measurements for scientific inquiry.", "isCorrect": false, "rationale": "While science might use sensory data, Descartes emphasizes that the senses lack 'philosophical precision' and their exact nature requires 'further investigation' by science, implying they are not inherently precise for this purpose."}, {"text": "To guide practical actions for survival, navigation, and avoiding immediate harm.", "isCorrect": true, "rationale": "The text explicitly states: 'But they [the senses] are reliable for practical purposes: survival, navigation, the avoidance of immediate harm. Pain warns me away from damaging things; hunger signals the body's need for food.'"}, {"text": "To serve as the primary source for establishing the existence of God.", "isCorrect": false, "rationale": "Descartes' proof of God's existence relies on intellectual arguments (e.g., from his own clear and distinct idea of God), not primarily on sensory experience."}], "id": "q09"}, {"question": "How does Descartes propose one can distinguish between waking experiences and dreams?", "options": [{"text": "By observing the vividness and intensity of the experience, as dreams are always less vivid.", "isCorrect": false, "rationale": "Descartes himself used the vividness of dreams as part of his initial doubt; his solution for distinguishing them doesn't rely on dreams always being less vivid, as some can be very vivid."}, {"text": "By applying a rigorous, systematic doubt to every perception until certainty is reached.", "isCorrect": false, "rationale": "While systematic doubt is his method, it's not the *solution* he offers for daily distinguishing waking from dreaming at the end of Meditation VI; rather, he offers a practical criterion."}, {"text": "By relying on the overall coherence and connected intelligibility of experiences with memory and reason.", "isCorrect": true, "rationale": "The text states: 'For distinguishing waking from dreaming, Descartes appeals to the coherence of experience. Dreams are typically disjointed and fail to cohere with memory and reason. Waking experience forms a connected, intelligible whole.'"}, {"text": "By identifying specific, unique physical sensations that are only present in the waking state.", "isCorrect": false, "rationale": "Descartes' solution focuses on the intellectual coherence of experience, not on specific physical sensations, which themselves could potentially be dreamt."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
