        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary intellectual condition in Europe that prompted Descartes to write the Meditations?", "options": [{"text": "A period of unprecedented philosophical unity, seeking new challenges.", "isCorrect": false, "rationale": "The text explicitly states the world was 'coming apart at its intellectual seams' due to three great upheavals, indicating a lack of unity, not a period of unity."}, {"text": "A fragmentation of traditional authorities and knowledge systems, leading to deep uncertainty.", "isCorrect": true, "rationale": "The text describes how the Reformation, New Science, and Skeptical Revival had 'shaken European thinkers' confidence in inherited authorities,' creating a crisis of intellectual authority and deep uncertainty that Descartes sought to address."}, {"text": "A widespread re-affirmation of ancient authorities, which Descartes sought to complement.", "isCorrect": false, "rationale": "The text clearly states that the upheavals demonstrated that 'the received authorities' had been 'fundamentally wrong,' leading to a questioning, not a re-affirmation, of ancient authorities."}, {"text": "A focus on developing practical technologies rather than abstract philosophical inquiry.", "isCorrect": false, "rationale": "While the New Science involved observation, the overall context was a crisis of foundational knowledge and authority, which spurred abstract philosophical inquiry like Descartes' Meditations, rather than a sole focus on practical technologies."}]}, {"question": "How did the Reformation contribute to the intellectual crisis Descartes faced?", "options": [{"text": "It introduced new scientific theories that contradicted church doctrine.", "isCorrect": false, "rationale": "The introduction of new scientific theories was part of 'The New Science' upheaval, not directly the Reformation, which focused on theological disputes."}, {"text": "It solidified religious authority, making theological questions unchallengeable.", "isCorrect": false, "rationale": "The text states the Reformation 'fractured' European Christianity and led to 'a century tearing itself apart over doctrinal questions,' which is the opposite of solidifying religious authority."}, {"text": "It fractured religious unity, demonstrating that fundamental questions of faith lacked settled answers.", "isCorrect": true, "rationale": "The text highlights that 'European Christianity fractured' and 'If theologians could not agree on the most fundamental questions of faith, what authority could be trusted?,' directly linking the Reformation to the erosion of religious authority."}, {"text": "It led to the suppression of philosophical thought, forcing thinkers like Descartes underground.", "isCorrect": false, "rationale": "While religious conflicts were severe, the Reformation primarily challenged the authority of established doctrine and institutions, leading to questioning rather than a blanket suppression of philosophical thought; Descartes, for example, published openly."}]}, {"question": "Which discovery best exemplifies how the New Science challenged the long-standing Aristotelian view of the universe?", "options": [{"text": "Martin Luther's ninety-five theses on the church door.", "isCorrect": false, "rationale": "Luther's theses relate to the Reformation and religious doctrine, not the scientific challenge to the Aristotelian cosmos."}, {"text": "Sextus Empiricus's arguments for suspending judgment.", "isCorrect": false, "rationale": "Sextus Empiricus's works are central to the 'Skeptical Revival,' which was a philosophical crisis, not a scientific one concerning the physical universe."}, {"text": "Galileo's observation of moons orbiting Jupiter and craters on the Moon.", "isCorrect": true, "rationale": "The text explicitly states Galileo's discoveries, such as 'moons orbiting Jupiter and craters on the supposedly perfect Moon,' demonstrated that 'Aristotle's physics required' planetary perfect circles and a flawless celestial sphere were wrong, thus dismantling the Aristotelian picture of the universe."}, {"text": "Montaigne's essays questioning human reason.", "isCorrect": false, "rationale": "Montaigne's essays belong to the 'Skeptical Revival' and challenged human reason, not directly the Aristotelian model of the cosmos."}]}, {"question": "The text states, 'If they were wrong about the heavens, what else might they be wrong about?' This question, raised by the New Science, primarily indicates:", "options": [{"text": "A shift in focus from astronomy to terrestrial physics.", "isCorrect": false, "rationale": "While new physics emerged, the core implication was broader: a questioning of authority across all domains, not just a change in scientific focus."}, {"text": "A growing distrust in any form of inherited or traditional authority.", "isCorrect": true, "rationale": "This statement highlights the profound implication of the New Science: if long-respected authorities like Aristotle could be fundamentally wrong about the cosmos, it cast doubt on the reliability of all 'received authorities' and inherited knowledge in any field."}, {"text": "A desire to return to pre-Aristotelian cosmological models.", "isCorrect": false, "rationale": "The challenge was to established models, not a specific desire to revert to earlier ones, but rather to find new, verifiable truths."}, {"text": "A belief that only scientific observations, not philosophical arguments, held truth.", "isCorrect": false, "rationale": "While observation was crucial, the text describes a crisis of authority that affected both science and philosophy, leading to a search for new foundations, not a complete rejection of philosophy in favor of empirical science alone."}]}, {"question": "The rediscovery of the works of Sextus Empiricus in the 16th century contributed to the 'skeptical crisis' by:", "options": [{"text": "Providing new astronomical data that disproved Ptolemy.", "isCorrect": false, "rationale": "Sextus Empiricus's works were philosophical, detailing ancient skepticism, not providing new astronomical data."}, {"text": "Documenting ancient Pyrrhonist arguments that questioned the possibility of certain knowledge.", "isCorrect": true, "rationale": "The text explicitly states that Sextus Empiricus's 'Outlines of Pyrrhonism' preserved 'the most complete account of ancient skeptical arguments,' which argued for 'suspension of belief' because equally strong arguments exist on both sides of every question, directly fueling the skeptical crisis."}, {"text": "Offering a new logical method for harmonizing Aristotle with Christian doctrine.", "isCorrect": false, "rationale": "This describes scholasticism's goal, which Descartes reacted against, and is contrary to the skeptical aim of suspending judgment."}, {"text": "Promoting a renewed faith in the infallibility of human reason.", "isCorrect": false, "rationale": "Pyrrhonist skepticism, as recorded by Sextus Empiricus, challenged the reliability of human reason, leading to doubt rather than renewed faith in its infallibility."}]}, {"question": "Michel de Montaigne's famous motto, 'Que sais-je?' (What do I know?), and his essays demonstrated:", "options": [{"text": "The profound certainty achievable through human introspection.", "isCorrect": false, "rationale": "Montaigne's work, deeply influenced by Pyrrhonian skepticism, aimed to show the opposite of profound certainty, emphasizing doubt and the limits of knowledge."}, {"text": "The inherent strength and consistency of human reason.", "isCorrect": false, "rationale": "The text states Montaigne 'demonstrated with brilliant irony that human reason is feeble, inconsistent, and culturally conditioned,' directly contradicting its inherent strength and consistency."}, {"text": "That human reason is often feeble, inconsistent, and culturally conditioned.", "isCorrect": true, "rationale": "Montaigne's essays, influenced by Pyrrhonian skepticism, aimed to show precisely this, that 'we know far less than we think' and that 'custom, habit, and the accidents of birth determine most of what passes for 'knowledge.''"}, {"text": "The ultimate triumph of scholastic disputation in resolving philosophical questions.", "isCorrect": false, "rationale": "Montaigne's skepticism was a challenge to established methods of inquiry, including scholasticism, which he would have seen as prone to contradiction rather than ultimate triumph."}]}, {"question": "Descartes' dissatisfaction with scholastic philosophy, despite its sophistication, stemmed from his belief that:", "options": [{"text": "It failed to incorporate the latest mathematical advancements.", "isCorrect": false, "rationale": "While Descartes loved mathematics, the text does not state scholasticism failed to incorporate it as the primary reason for his dissatisfaction, but rather its fundamental unreliability."}, {"text": "It was too focused on practical application rather than abstract theory.", "isCorrect": false, "rationale": "Scholasticism was highly theoretical and abstract, focused on harmonizing Aristotle with Christian doctrine, not primarily practical application."}, {"text": "It produced elaborate arguments but lacked genuine truth, with different schools contradicting each other.", "isCorrect": true, "rationale": "The text notes scholasticism had 'enormously sophisticated' methods but (Descartes felt) was 'deeply unreliable,' asking 'did it have truth?' It explicitly states, 'Different scholastic schools contradicted one another just as confidently as the ancient authorities contradicted each other.'"}, {"text": "It rejected Christian doctrine in favor of pagan Greek philosophy.", "isCorrect": false, "rationale": "Scholasticism, by definition, 'sought to harmonize Aristotle's philosophy with Christian doctrine,' so it did not reject Christian doctrine."}]}, {"question": "The 'Crisis of Authority' in the early 17th century, which Descartes acutely felt, was characterized by the convergence of:", "options": [{"text": "Economic decline, political instability, and social unrest.", "isCorrect": false, "rationale": "While these issues might have been present, the text specifically identifies intellectual upheavals, not primarily economic or political ones, as the 'Crisis of Authority' relevant to Descartes."}, {"text": "The flourishing of artistic expression, a rise in literacy, and colonial expansion.", "isCorrect": false, "rationale": "These describe aspects of the Renaissance and Age of Exploration but do not capture the 'crisis' or the specific challenges to inherited knowledge detailed in the text."}, {"text": "Fractured religious authority, overturned Aristotelian physics, and a challenge to philosophical certainty.", "isCorrect": true, "rationale": "The 'keyconcept' box precisely defines the 'Crisis of Authority' as the Reformation fracturing religious authority, the new science overturning Aristotelian physics, and the revival of skepticism challenging philosophy itself."}, {"text": "The invention of the printing press, the discovery of new continents, and the establishment of new universities.", "isCorrect": false, "rationale": "These are significant historical developments but do not directly represent the specific intellectual 'upheavals' of the Reformation, New Science, and Skeptical Revival that constituted the crisis of authority."}]}, {"question": "Descartes' response to the triple crisis was 'radical: start over.' He envisioned rebuilding philosophy using what model?", "options": [{"text": "The rigorous empirical methods of the New Scientists.", "isCorrect": false, "rationale": "While informed by science, Descartes' model was specifically mathematical, seeking axioms and deduction for certainty, not solely empirical methods."}, {"text": "The disputational structure of scholastic arguments.", "isCorrect": false, "rationale": "Descartes was dissatisfied with scholasticism's lack of truth despite its elaborate arguments and sought to move away from its methods."}, {"text": "The axiomatic, deductive certainty found in mathematics (e.g., Euclidean geometry).", "isCorrect": true, "rationale": "The text states Descartes' 'model he had in mind was mathematics,' noting that 'In geometry, Euclid had started from a handful of self-evident axioms and derived an enormous body of certain truths.' This was the paradigm he wished to apply to philosophy."}, {"text": "The historical analysis of ancient skeptical arguments.", "isCorrect": false, "rationale": "While aware of skeptical arguments, Descartes sought to overcome them by finding certainty, not merely to analyze them historically as his model for rebuilding philosophy."}]}, {"question": "The 'engine of the Meditations' is described as Descartes' quest for:", "options": [{"text": "A comprehensive historical account of philosophical errors.", "isCorrect": false, "rationale": "While he reacted to past errors, his primary goal was constructive: to build a new foundation, not just document past mistakes."}, {"text": "A starting point so certain and indubitable that it could serve as a foundation for all human knowledge.", "isCorrect": true, "rationale": "The text concludes by stating Descartes asked: 'Could there be a starting point so certain, so impossible to doubt, that it could serve as the foundation for all human knowledge? That question is the engine of the Meditations.'"}, {"text": "A synthesis of the varied opinions from the Reformation, New Science, and Skeptical Revival.", "isCorrect": false, "rationale": "Descartes' approach was to 'start over' and 'tear it down to its foundations,' not to synthesize the conflicting opinions of the existing systems."}, {"text": "A method for proving the existence of God using only scholastic arguments.", "isCorrect": false, "rationale": "While Descartes did provide arguments for God's existence, his overall project was a broader search for foundational certainty for all knowledge, and he reacted against scholastic methods, seeking a new approach."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
