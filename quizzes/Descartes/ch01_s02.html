<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What was the primary intellectual condition in Europe that prompted Descartes to write the Meditations?", "options": [{"text": "A period of unprecedented philosophical unity, seeking new challenges.", "isCorrect": false, "rationale": "The text explicitly states the world was 'coming apart at its intellectual seams' due to three great upheavals, indicating fragmentation, not unity."}, {"text": "A fragmentation of traditional authorities and knowledge systems, leading to deep uncertainty.", "isCorrect": true, "rationale": "The text describes how the Reformation, New Science, and Skeptical Revival had 'shaken European thinkers' confidence in inherited authorities,' creating a crisis of intellectual authority that Descartes sought to address."}, {"text": "A widespread re-affirmation of ancient authorities, which Descartes sought to complement.", "isCorrect": false, "rationale": "The upheavals demonstrated that 'received authorities' had been 'fundamentally wrong,' leading to questioning rather than re-affirmation of ancient authorities."}, {"text": "A focus on developing practical technologies rather than abstract philosophical inquiry.", "isCorrect": false, "rationale": "The overall context was a crisis of foundational knowledge and authority, which spurred abstract philosophical inquiry — not a sole focus on practical technology."}], "id": "q01"}, {"question": "How did the Reformation contribute to the intellectual crisis Descartes faced?", "options": [{"text": "It introduced new scientific theories that contradicted church doctrine.", "isCorrect": false, "rationale": "New scientific theories were part of the 'New Science' upheaval. The Reformation specifically addressed theological disputes over church authority."}, {"text": "It solidified religious authority, making theological questions unchallengeable.", "isCorrect": false, "rationale": "The text states the Reformation 'fractured' European Christianity, the opposite of solidifying religious authority."}, {"text": "It fractured religious unity, demonstrating that fundamental questions of faith lacked settled answers.", "isCorrect": true, "rationale": "The text highlights that 'European Christianity fractured' and asked: 'If theologians could not agree on the most fundamental questions of faith, what authority could be trusted?' — directly linking Reformation to erosion of religious authority."}, {"text": "It led to the suppression of philosophical thought, forcing thinkers like Descartes underground.", "isCorrect": false, "rationale": "While religious conflicts were severe, the Reformation primarily challenged established doctrine, leading to questioning rather than blanket suppression of philosophy. Descartes published openly."}], "id": "q02"}, {"question": "Which discovery best exemplifies how the New Science challenged the long-standing Aristotelian view of the universe?", "options": [{"text": "Martin Luther's ninety-five theses on the church door.", "isCorrect": false, "rationale": "Luther's theses relate to the Reformation and religious doctrine, not the scientific challenge to the Aristotelian cosmos."}, {"text": "Sextus Empiricus's arguments for suspending judgment.", "isCorrect": false, "rationale": "Sextus Empiricus's works are central to the 'Skeptical Revival,' not to the scientific overturning of Aristotelian physics."}, {"text": "Galileo's observation of moons orbiting Jupiter and craters on the Moon.", "isCorrect": true, "rationale": "The text explicitly states Galileo's discoveries — 'moons orbiting Jupiter and craters on the supposedly perfect Moon' — demonstrated that Aristotle's physics was wrong, dismantling the Aristotelian picture of the universe."}, {"text": "Montaigne's essays questioning human reason.", "isCorrect": false, "rationale": "Montaigne's essays belong to the 'Skeptical Revival' and challenged human reason philosophically, not the physical model of the cosmos."}], "id": "q03"}, {"question": "The text states: 'If they were wrong about the heavens, what else might they be wrong about?' This question primarily indicates:", "options": [{"text": "A shift in focus from astronomy to terrestrial physics.", "isCorrect": false, "rationale": "While new physics emerged, the core implication was broader: a questioning of all inherited authority, not just a change in scientific discipline."}, {"text": "A growing distrust in any form of inherited or traditional authority.", "isCorrect": true, "rationale": "If long-respected authorities like Aristotle could be fundamentally wrong about the cosmos, it cast doubt on all 'received authorities' across every field of knowledge."}, {"text": "A desire to return to pre-Aristotelian cosmological models.", "isCorrect": false, "rationale": "The challenge was to established models, not a specific desire to revert to earlier pre-Aristotelian ones. The goal was to find new, verifiable truths."}, {"text": "A belief that only scientific observations, not philosophical arguments, could yield truth.", "isCorrect": false, "rationale": "The crisis affected both science and philosophy, leading to a search for new foundations — not a complete rejection of philosophy in favor of empirical science alone."}], "id": "q04"}, {"question": "The rediscovery of the works of Sextus Empiricus in the 16th century contributed to the 'skeptical crisis' by:", "options": [{"text": "Providing new astronomical data that disproved Ptolemy.", "isCorrect": false, "rationale": "Sextus Empiricus's works were philosophical, documenting ancient skeptical arguments — not astronomical observations."}, {"text": "Documenting ancient Pyrrhonist arguments that questioned the possibility of certain knowledge.", "isCorrect": true, "rationale": "The text states that Sextus Empiricus's Outlines of Pyrrhonism preserved 'the most complete account of ancient skeptical arguments,' which argued for 'suspension of belief' because equally strong arguments exist on both sides of every question."}, {"text": "Offering a new logical method for harmonizing Aristotle with Christian doctrine.", "isCorrect": false, "rationale": "This describes scholasticism's aim, which is contrary to Pyrrhonian skepticism's goal of suspending judgment rather than reaching harmonized conclusions."}, {"text": "Promoting renewed faith in the infallibility of human reason.", "isCorrect": false, "rationale": "Pyrrhonist skepticism challenged the reliability of human reason, leading to doubt rather than renewed faith in its infallibility."}], "id": "q05"}, {"question": "Michel de Montaigne's famous motto, 'Que sais-je?' (What do I know?), and his essays demonstrated:", "options": [{"text": "The profound certainty achievable through human introspection.", "isCorrect": false, "rationale": "Montaigne's work aimed to show the opposite of certainty, emphasizing doubt and the limits of what we can know."}, {"text": "The inherent strength and consistency of human reason.", "isCorrect": false, "rationale": "The text states Montaigne 'demonstrated with brilliant irony that human reason is feeble, inconsistent, and culturally conditioned' — directly contradicting strength and consistency."}, {"text": "That human reason is often feeble, inconsistent, and culturally conditioned.", "isCorrect": true, "rationale": "Montaigne's essays aimed to show that 'we know far less than we think' and that 'custom, habit, and the accidents of birth determine most of what passes for knowledge.'"}, {"text": "The ultimate triumph of scholastic disputation in resolving philosophical questions.", "isCorrect": false, "rationale": "Montaigne's skepticism challenged all established methods of inquiry, including scholasticism, which he would have seen as prone to contradiction rather than triumphant resolution."}], "id": "q06"}, {"question": "Descartes' dissatisfaction with scholastic philosophy, despite its sophistication, stemmed from his belief that:", "options": [{"text": "It failed to incorporate the latest mathematical advancements.", "isCorrect": false, "rationale": "While Descartes valued mathematics, the text identifies scholasticism's fundamental unreliability — its conflicting schools — as the primary source of his dissatisfaction."}, {"text": "It was too focused on practical application rather than abstract theory.", "isCorrect": false, "rationale": "Scholasticism was highly abstract and theoretical, focused on harmonizing Aristotle with Christian doctrine — not primarily practical."}, {"text": "It produced elaborate arguments but lacked genuine truth, with different schools contradicting each other.", "isCorrect": true, "rationale": "The text notes scholasticism had 'enormously sophisticated' methods but Descartes felt it was 'deeply unreliable': 'Different scholastic schools contradicted one another just as confidently as the ancient authorities contradicted each other.'"}, {"text": "It rejected Christian doctrine in favor of pagan Greek philosophy.", "isCorrect": false, "rationale": "Scholasticism specifically sought to harmonize Aristotle's philosophy with Christian doctrine — it did not reject Christianity."}], "id": "q07"}, {"question": "The 'Crisis of Authority' in the early 17th century was characterized by the convergence of which three upheavals?", "options": [{"text": "Economic decline, political instability, and social unrest.", "isCorrect": false, "rationale": "The 'Crisis of Authority' as defined in the text refers to intellectual upheavals, not primarily economic or political ones."}, {"text": "The flourishing of artistic expression, a rise in literacy, and colonial expansion.", "isCorrect": false, "rationale": "These describe aspects of the Renaissance and Age of Exploration but do not capture the specific intellectual crises that shaped Descartes' project."}, {"text": "Fractured religious authority, overturned Aristotelian physics, and a challenge to philosophical certainty.", "isCorrect": true, "rationale": "The text precisely defines the 'Crisis of Authority' as the Reformation fracturing religious authority, the New Science overturning Aristotelian physics, and the revival of skepticism challenging philosophical certainty."}, {"text": "The invention of the printing press, the discovery of new continents, and the establishment of new universities.", "isCorrect": false, "rationale": "These are significant historical developments but do not represent the specific intellectual upheavals of the Reformation, New Science, and Skeptical Revival."}], "id": "q08"}, {"question": "Descartes' response to the triple crisis was described as 'radical: start over.' He envisioned rebuilding philosophy using what model?", "options": [{"text": "The rigorous empirical methods of the New Scientists.", "isCorrect": false, "rationale": "While informed by science, Descartes' model was specifically mathematical — seeking axioms and deduction for certainty, not solely empirical observation."}, {"text": "The disputational structure of scholastic arguments.", "isCorrect": false, "rationale": "Descartes was dissatisfied with scholasticism's lack of genuine truth despite elaborate arguments and sought to move beyond its methods."}, {"text": "The axiomatic, deductive certainty found in mathematics such as Euclidean geometry.", "isCorrect": true, "rationale": "The text states Descartes' 'model he had in mind was mathematics,' specifically that 'In geometry, Euclid had started from a handful of self-evident axioms and derived an enormous body of certain truths' — the paradigm he wished to apply to philosophy."}, {"text": "The historical analysis of ancient skeptical arguments.", "isCorrect": false, "rationale": "While aware of skeptical arguments, Descartes sought to overcome them by finding certainty, not to analyze them historically as a model for rebuilding."}], "id": "q09"}, {"question": "The 'engine of the Meditations' is described as Descartes' quest for:", "options": [{"text": "A comprehensive historical account of philosophical errors.", "isCorrect": false, "rationale": "While he reacted to past errors, his primary goal was constructive: to build a new foundation, not simply document past mistakes."}, {"text": "A starting point so certain and indubitable that it could serve as a foundation for all human knowledge.", "isCorrect": true, "rationale": "The text concludes: 'Could there be a starting point so certain, so impossible to doubt, that it could serve as the foundation for all human knowledge? That question is the engine of the Meditations.'"}, {"text": "A synthesis of the varied opinions from the Reformation, New Science, and Skeptical Revival.", "isCorrect": false, "rationale": "Descartes' approach was to 'start over' and 'tear it down to its foundations,' not to synthesize the conflicting opinions of existing systems."}, {"text": "A method for proving the existence of God using only scholastic arguments.", "isCorrect": false, "rationale": "While Descartes did argue for God's existence, his broader project sought foundational certainty for all knowledge, and he explicitly rejected scholastic methods."}], "id": "q10"}, {"question": "The Copernican Revolution, associated with Copernicus and later Kepler, contributed to the intellectual crisis primarily by:", "options": [{"text": "Proving that the Earth was much older than previously believed by church authorities.", "isCorrect": false, "rationale": "Age-of-the-Earth questions were not the Copernican contribution. Copernicus and Kepler challenged the geocentric model of the cosmos."}, {"text": "Demonstrating that the Earth moves around the Sun rather than being fixed at the center of the universe.", "isCorrect": true, "rationale": "Heliocentrism displaced Earth — and humanity — from the center of the cosmos, overturning the Aristotelian-Ptolemaic model and destabilizing the medieval worldview in which cosmic order mirrored theological certainty."}, {"text": "Showing that mathematics could not accurately describe planetary motion.", "isCorrect": false, "rationale": "Quite the opposite: Kepler's elliptical orbits and mathematical astronomy demonstrated that mathematics could describe planetary motion precisely — validating Descartes' mathematical approach."}, {"text": "Providing biblical evidence against pagan cosmology.", "isCorrect": false, "rationale": "The Copernican Revolution was a scientific challenge to Aristotelian cosmology — ironically, it was condemned by church authorities, not endorsed as biblical evidence."}], "id": "q11"}, {"question": "The distinction between Academic Skeptics and Pyrrhonian Skeptics is relevant to understanding the crisis Descartes faced. Which statement correctly captures this distinction?", "options": [{"text": "Academic Skeptics claimed knowledge was impossible; Pyrrhonists suspended judgment entirely on whether knowledge was possible.", "isCorrect": true, "rationale": "Academic Skeptics (like Cicero's school) held the negative thesis that nothing can be known. Pyrrhonists went further: they refused even this claim, suspending judgment on all questions including whether knowledge is possible — an even more radical stance."}, {"text": "Academic Skeptics suspended judgment; Pyrrhonists claimed all beliefs were equally false.", "isCorrect": false, "rationale": "This reverses the positions. It was the Pyrrhonists who suspended judgment ($epoche$), while Academic Skeptics made the stronger claim that knowledge is impossible."}, {"text": "Both groups agreed that mathematical knowledge was unachievable.", "isCorrect": false, "rationale": "Neither group specifically targeted mathematical knowledge in the way described. Descartes himself held that mathematics retained certainty even amid skeptical challenges."}, {"text": "Pyrrhonists accepted sensory evidence; Academic Skeptics rejected it entirely.", "isCorrect": false, "rationale": "Pyrrhonists challenged the reliability of sensory evidence as part of their case for suspended judgment — they did not accept sensory evidence as a reliable guide."}], "id": "q12"}, {"question": "Descartes' project of finding 'foundations' for knowledge is described using an architectural metaphor. What does this metaphor reveal about his philosophical method?", "options": [{"text": "That philosophy should be built incrementally, adding ideas from multiple traditions over time.", "isCorrect": false, "rationale": "The architectural metaphor in the text is specifically about demolishing a rotten structure entirely before rebuilding — not incremental addition from multiple traditions."}, {"text": "That all existing philosophical knowledge must be demolished and rebuilt from scratch on secure first principles.", "isCorrect": true, "rationale": "The 'demolish and rebuild' metaphor captures foundationalism: if the foundation is rotten, the whole edifice is unsafe. You cannot patch it — you must tear it down and start from principles that are indubitably certain."}, {"text": "That the Meditations were intended as a physical guide to constructing schools of philosophy.", "isCorrect": false, "rationale": "The architectural language is metaphorical, describing the structure of knowledge-building, not a literal plan for institutions."}, {"text": "That ancient philosophical traditions provided the best architectural model for modern thought.", "isCorrect": false, "rationale": "Descartes explicitly rejected reliance on ancient traditions given the crisis of authority; the metaphor supports starting fresh, not returning to ancient models."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
