<div class="quiz-container">

        <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">First Philosophy (Descartes) &mdash; Chapter 5, Section 3</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central problem Descartes addresses in Meditation IV regarding human error?", "options": [{"text": "How humans can know God's existence.", "isCorrect": false, "rationale": "While God's existence is reaffirmed, the central problem explicitly stated is 'if God is perfect and created us, why do we ever fall into error?'"}, {"text": "Why humans fall into error despite being created by a perfect God.", "isCorrect": true, "rationale": "The text states: 'But if God is perfect and created us, why do we ever fall into error? The fourth day's meditation confronts this problem head-on.'"}, {"text": "How sensory experience can lead to deception.", "isCorrect": false, "rationale": "Descartes mentions detaching his mind from senses and observing few certainties about corporeal objects, but the main problem of error is broader than just sensory deception."}, {"text": "The distinction between corporeal and purely intelligible objects.", "isCorrect": false, "rationale": "Descartes does discuss this distinction to set the stage for understanding mental faculties, but it is not the central problem of error itself."}]}, {"question": "Descartes argues that God cannot be a deceiver because:", "options": [{"text": "God's power is limited by human understanding.", "isCorrect": false, "rationale": "Descartes explicitly states God's nature is 'immense, incomprehensible, and infinite,' meaning His power is not limited by human understanding."}, {"text": "Deception is a mark of imperfection, malice, or feebleness, which cannot be found in God.", "isCorrect": true, "rationale": "The text states: 'for in all fraud and deception some imperfection is to be found... the desire to deceive without doubt testifies to malice or feebleness, and accordingly cannot be found in God.'"}, {"text": "Humans are incapable of being deceived if they use their faculties correctly.", "isCorrect": false, "rationale": "While Descartes argues our faculties, if used aright, shouldn't lead to error, this is a consequence of God not being a deceiver, not the reason why God cannot deceive."}, {"text": "God's existence is proven by the idea of a perfect being, which precludes deception.", "isCorrect": false, "rationale": "The existence of God is established, and His perfection is a premise. The deduction that deception is an imperfection (and thus not in God) follows from this premise."}]}, {"question": "According to Descartes, how does the human mind initially reconcile the idea of a perfect God with the reality of human error?", "options": [{"text": "By acknowledging that humans are solely responsible for their errors.", "isCorrect": false, "rationale": "This is a conclusion reached later, but not the initial reconciliation, which seeks to understand *how* error is possible from God's creation."}, {"text": "By realizing that error is a necessary part of a perfect universe.", "isCorrect": false, "rationale": "Descartes considers if it's 'better that I should be subject to err than that I should not,' but this is part of the ongoing struggle, not the initial reconciliation."}, {"text": "By viewing humans as intermediate beings, participating in both supreme Being and non-being, with error being a defect rather than a positive faculty.", "isCorrect": true, "rationale": "The text explains: 'I am in a sense something intermediate between God and nought... error, in so far as it is such, is not a real thing depending on God, but simply a defect.'"}, {"text": "By concluding that God merely allows for error, but does not actively cause it.", "isCorrect": false, "rationale": "This aligns with the idea that error is a defect, but the 'intermediate being' concept is the specific mechanism for initial reconciliation."}]}, {"question": "Why does Descartes find the initial explanation of error as a 'pure negation' or simple defect somewhat unsatisfactory?", "options": [{"text": "It contradicts the idea of God's omnipotence.", "isCorrect": false, "rationale": "While the discussion touches on God's omnipotence, the core dissatisfaction isn't a direct contradiction but an implication about the quality of God's creation."}, {"text": "It implies that God could have created him so he could never err, suggesting God did not will what is best.", "isCorrect": true, "rationale": "Descartes states: 'error is not a pure negation... but it is a lack of some knowledge which it seems that I ought to possess... God could have created me so that I could never have been subject to error; it is also certain that He ever wills what is best; is it then better that I should be subject to err than that I should not?' This is the source of his dissatisfaction."}, {"text": "It doesn't account for the subjective experience of error.", "isCorrect": false, "rationale": "The initial explanation does acknowledge the *experience* of error; the dissatisfaction is with the *implications* for God's perfection."}, {"text": "It suggests humans ought to possess more knowledge than they do.", "isCorrect": false, "rationale": "This is part of the problem ('a lack of some knowledge which it seems that I ought to possess'), but the dissatisfaction is specifically that this implies a flaw in God's creation, considering God 'ever wills what is best'."}]}, {"question": "When considering why God might allow for human error, Descartes suggests that one should not investigate God's 'final causes' in physical things. What does this imply about the limits of human understanding?", "options": [{"text": "Humans are too feeble and limited to comprehend the ultimate purposes behind God's actions.", "isCorrect": true, "rationale": "Descartes states: 'I should not be astonished if my intelligence is not capable of comprehending why God acts as He does... knowing that my nature is extremely feeble and limited, and that the nature of God is on the contrary immense, incomprehensible, and infinite, I have no further difficulty in recognising that there is an infinitude of matter in His power, the causes of which transcend my knowledge.'"}, {"text": "Final causes are irrelevant to understanding physical phenomena.", "isCorrect": false, "rationale": "He says 'final [causes] finds no useful employment in physical [or natural] things' *because* human intelligence cannot comprehend them, implying a limit to human understanding rather than a universal irrelevance."}, {"text": "Investigating final causes leads to doubt about God's existence.", "isCorrect": false, "rationale": "He clarifies that finding things he doesn't understand about God's actions gives 'no reason to doubt of His existence'."}, {"text": "God's reasons are arbitrary and unknowable by definition.", "isCorrect": false, "rationale": "He argues they 'transcend my knowledge' due to his feeble nature and God's immense nature, not that they are inherently arbitrary."}]}, {"question": "What two main faculties does Descartes identify as the combined source of human errors?", "options": [{"text": "Memory and imagination.", "isCorrect": false, "rationale": "Memory and imagination are mentioned as limited faculties, but not the primary source of error in combination."}, {"text": "Senses and intellect.", "isCorrect": false, "rationale": "While senses can be misleading, Descartes focuses on internal mental faculties for the source of error, specifically understanding and will."}, {"text": "Understanding and free will (power of choice).", "isCorrect": true, "rationale": "The text explicitly states: 'errors... depend on a combination of two causes, to wit, on the faculty of knowledge that rests in me, and on the power of choice or of free will. That is to say, of the understanding and at the same time of the will.'"}, {"text": "Reason and emotion.", "isCorrect": false, "rationale": "Descartes primarily discusses reason (understanding) and will, not emotion as a distinct faculty contributing to error in this context."}]}, {"question": "Descartes argues that there is 'no error properly speaking' in the understanding alone. Why is this the case?", "options": [{"text": "The understanding is infinite in its scope and comprehension.", "isCorrect": false, "rationale": "Descartes states the faculty of comprehension is 'of very small extent and extremely limited,' distinguishing it from the infinite scope of the will."}, {"text": "The understanding merely apprehends ideas without asserting or denying anything.", "isCorrect": true, "rationale": "The text states: 'For by the understanding alone I [neither assert nor deny anything, but] apprehend the ideas of things as to which I can form a judgment. But no error is properly speaking found in it, provided the word error is taken in its proper signification.'"}, {"text": "God ensures that all ideas presented to the understanding are true.", "isCorrect": false, "rationale": "While God is not a deceiver, the understanding's role is apprehension, and it's the will's judgment that introduces error, not a direct divine guarantee of truth for every apprehended idea."}, {"text": "Errors only arise when the understanding is corrupted by sensory input.", "isCorrect": false, "rationale": "Descartes is discussing errors from the mind's own faculties, not external corruption, as he has already accustomed his mind to detach from the senses."}]}, {"question": "How does Descartes describe the faculty of free will (liberty of choice) in comparison to other human faculties like understanding, memory, or imagination?", "options": [{"text": "It is equally limited in scope, though powerful in its function.", "isCorrect": false, "rationale": "He explicitly contrasts it, stating other faculties are 'small and circumscribed' while free will is 'so great in me that I can conceive no other idea to be more great'."}, {"text": "It is vast and perfect of its kind, and in some sense 'infinite,' reflecting God's image.", "isCorrect": true, "rationale": "He states: 'It is free-will alone or liberty of choice which I find to be so great in me that I can conceive no other idea to be more great; it is indeed the case that it is for the most part this will that causes me to know that in some manner I bear the image and similitude of God.'"}, {"text": "It is inherently flawed, leading inevitably to error.", "isCorrect": false, "rationale": "He clarifies: 'the power of will which I have received from God is not of itself the source of my errors... for it is very ample and very perfect of its kind.'"}, {"text": "It is entirely dependent on the understanding for its scope and function.", "isCorrect": false, "rationale": "The problem of error arises precisely because the will is 'much wider in its range and compass than the understanding' and extends beyond it."}]}, {"question": "According to Descartes, which situation represents the *lowest* grade of liberty?", "options": [{"text": "Being compelled by an external force to make a choice.", "isCorrect": false, "rationale": "Descartes states that 'in order that I should be free it is not necessary that I should be indifferent... we act so that we are unconscious that any outside force constrains us in doing so.' True freedom is not about external compulsion."}, {"text": "Making a choice based on clear and distinct reasons for truth and good.", "isCorrect": false, "rationale": "This represents the *highest* grade of liberty: 'the more I lean to the one... the more freely do I choose and embrace it.'"}, {"text": "Being indifferent, not swayed to one side or the other by a lack of clear reasons.", "isCorrect": true, "rationale": "The text states: 'Hence this indifference which I feel, when I am not swayed to one side rather than to the other by lack of reason, is the lowest grade of liberty, and rather evinces a lack or negation in knowledge than a perfection of will'."}, {"text": "Willingly choosing evil over good, or false over true.", "isCorrect": false, "rationale": "This is an example of falling into error, but the *lowest grade* of liberty is specifically the state of indifference due to lack of knowledge."}]}, {"question": "Ultimately, where do human errors originate, according to Descartes' final explanation?", "options": [{"text": "From an inherent defect or imperfection in the faculty of understanding.", "isCorrect": false, "rationale": "Descartes explicitly states there is 'no doubt that all that I understand, I understand as I ought, and it is not possible that I err in this' by the understanding alone."}, {"text": "From God's deliberate choice to allow humans to err as part of a greater plan.", "isCorrect": false, "rationale": "Descartes rejects the idea that God *wills* humans to err, arguing error is a defect, not a positive faculty given by God."}, {"text": "From the will extending its affirmations or denials beyond the clear and distinct perceptions of the understanding.", "isCorrect": true, "rationale": "The text concludes: 'Whence then come my errors? They come from the sole fact that since the will is much wider in its range and compass than the understanding, I do not restrain it within the same bounds, but extend it also to things which I do not understand.'"}, {"text": "From the unreliable nature of sensory experience constantly deceiving the mind.", "isCorrect": false, "rationale": "While sensory experience can be misleading, Descartes' final explanation for error focuses on the internal interplay between understanding and will, abstracted from specific sensory deceptions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
