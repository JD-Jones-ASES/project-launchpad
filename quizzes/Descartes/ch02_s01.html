    <div class="quiz-actions">

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary goal of Descartes' method of doubt in Meditation I?", "options": [{"text": "To prove that all previous beliefs held by the meditator are inherently false.", "isCorrect": false, "rationale": "The text explicitly states: 'He is not claiming that his previous beliefs were false.' His aim is to test certainty, not prove falsity."}, {"text": "To identify any beliefs that are absolutely certain and cannot be doubted, even slightly.", "isCorrect": true, "rationale": "The text explains the goal: 'The goal is not to remain in doubt indefinitely but to discover whether anything survives this most demanding of tests.'"}, {"text": "To establish that the human senses are always unreliable and should never be trusted.", "isCorrect": false, "rationale": "The text clarifies: 'He is not claiming that the senses are always unreliable.' He notes they sometimes deceive, making complete trust imprudent."}, {"text": "To convince readers that skepticism — the view that knowledge is impossible — is the only rational position.", "isCorrect": false, "rationale": "The text directly addresses this misunderstanding: 'students often think Descartes is a skeptic. He is not. A skeptic concludes that knowledge is impossible. Descartes uses doubt to find knowledge.'"}], "id": "q01"}, {"question": "What is the threshold Descartes uses to determine whether a belief should be set aside during his method of doubt?", "options": [{"text": "A belief is set aside only if it can be definitively proven false through empirical evidence.", "isCorrect": false, "rationale": "The text states: 'The standard is not proof of falsity but possibility of doubt.' Definitive proof of falsity is not the criterion."}, {"text": "A belief is set aside if there is even the slightest possibility that it is wrong or uncertain.", "isCorrect": true, "rationale": "Descartes' method treats as uncertain 'everything that can be doubted — even slightly' and: 'If there is any chance a belief is wrong, it is set aside.'"}, {"text": "A belief is set aside if it relies solely on information received through the five senses.", "isCorrect": false, "rationale": "While sensory beliefs are doubted, the method extends to include mathematical and logical truths — indicating the criterion is broader than just sensory reliance."}, {"text": "A belief is set aside if it contradicts any other previously held belief.", "isCorrect": false, "rationale": "The text does not mention contradiction with other beliefs as the standard for doubt; rather, it's the individual possibility of uncertainty."}], "id": "q02"}, {"question": "Why does Descartes conclude that the 'argument from the senses' (Stage One) does not go far enough to establish complete doubt?", "options": [{"text": "Because the senses never actually deceive us about fundamental or important truths.", "isCorrect": false, "rationale": "The text clearly states: 'He observes that the senses have deceived him before,' citing examples like a stick in water or a distant tower."}, {"text": "Because we can often correct for sensory illusions once we are aware of them, limiting the scope of this doubt.", "isCorrect": true, "rationale": "The text explains: 'But this first stage does not go very far. We can compensate for many sensory illusions once we know about them.'"}, {"text": "Because it only applies to abstract concepts and not to concrete, physical objects in the world.", "isCorrect": false, "rationale": "The examples provided (bent stick, tower, large object) are all concrete physical objects, contradicting this option."}, {"text": "Because it fails to challenge the certainty of mathematical and logical truths.", "isCorrect": false, "rationale": "While Stage One doesn't challenge mathematics, the specific reason for its limitation is the ability to correct for illusions, not its failure to address mathematical truths."}], "id": "q03"}, {"question": "Which category of beliefs does the Dream Argument primarily render uncertain?", "options": [{"text": "Only beliefs about abstract concepts like justice or beauty.", "isCorrect": false, "rationale": "The dream argument focuses on the uncertainty of immediate sensory experience, not specifically abstract concepts."}, {"text": "All beliefs based on perception and sensory experience, including one's current physical state.", "isCorrect": true, "rationale": "The text states: 'This means that all perception-based beliefs are uncertain: I cannot rule out that I am dreaming,' and questions beliefs like 'sitting in a chair, holding a piece of paper, in a lighted room.'"}, {"text": "Mathematical and logical truths, such as 'two plus two equals four.'", "isCorrect": false, "rationale": "The text notes that 'Even if everything I perceive is a dream, mathematical truths seem to hold,' indicating they initially survive the dream argument."}, {"text": "Only beliefs about historical facts and past events.", "isCorrect": false, "rationale": "The dream argument primarily targets current sensory experience, not past events directly."}], "id": "q04"}, {"question": "What is Descartes' main challenge regarding distinguishing between waking and dreaming?", "options": [{"text": "He believes dreams are always less vivid and coherent than waking experiences, making them easy to identify.", "isCorrect": false, "rationale": "The text refutes this by asking: 'does a particularly vivid dream feel incoherent from the inside?' — suggesting dreams can be very convincing."}, {"text": "He argues that there is no reliable criterion available from within the experience itself to differentiate a waking state from a dream.", "isCorrect": true, "rationale": "The text states: 'Descartes cannot find a reliable criterion for distinguishing waking from dreaming from within the experience itself. There is no stamp on waking experience that dreams cannot counterfeit.'"}, {"text": "He suggests that only advanced scientific instruments can definitively prove whether one is awake or dreaming.", "isCorrect": false, "rationale": "The text focuses on philosophical criteria accessible to the meditator's reflection, not external scientific tools."}, {"text": "He concludes that waking experiences always provide a clear, undeniable 'stamp' that dreams can never perfectly counterfeit.", "isCorrect": false, "rationale": "This directly contradicts the text: 'There is no stamp on waking experience that dreams cannot counterfeit.'"}], "id": "q05"}, {"question": "At which stage of doubt does Descartes first identify a category of truths that initially seem to resist doubt, only to be challenged later?", "options": [{"text": "The initial statement of the Method of Doubt, before any specific stages are applied.", "isCorrect": false, "rationale": "The initial statement outlines the procedure but does not apply it to specific types of truths."}, {"text": "Stage One: The Senses Sometimes Deceive.", "isCorrect": false, "rationale": "Stage One focuses on sensory illusions and does not involve the initial apparent resistance of mathematical truths."}, {"text": "Stage Two: The Dream Argument.", "isCorrect": true, "rationale": "The text states: 'Even if everything I perceive is a dream, mathematical truths seem to hold... Perhaps mathematics can serve as a foundation?' This is where they first 'seem to hold' before Stage Three challenges them."}, {"text": "Stage Three: The Evil Genius Hypothesis.", "isCorrect": false, "rationale": "The Evil Genius challenges these truths, but their initial seeming resistance is first identified in Stage Two."}], "id": "q06"}, {"question": "What is the primary philosophical role of the evil genius hypothesis in Descartes' method?", "options": [{"text": "To propose a real, malevolent entity responsible for human errors and suffering in the world.", "isCorrect": false, "rationale": "The text explicitly states: 'The hypothesis is not meant to be believed — it is a thought experiment,' not a belief in a real entity."}, {"text": "To demonstrate that God's omnipotence is limited by the possibility of such a deceiver.", "isCorrect": false, "rationale": "The text mentions 'not God but a kind of anti-God,' and the focus is on radical doubt, not a theological statement about God's power."}, {"text": "To push doubt to its absolute extreme, stripping away confidence even in fundamental logic and mathematics, to find anything indubitable.", "isCorrect": true, "rationale": "It is 'Descartes' most radical instrument of doubt,' designed 'to test what cannot possibly be doubted no matter how bad the circumstances are assumed to be.'"}, {"text": "To establish that all sensory experiences are fundamentally deceptive and morally evil.", "isCorrect": false, "rationale": "The hypothesis concerns the reliability of all beliefs, not the moral nature of sensory experiences."}], "id": "q07"}, {"question": "A student claims that Descartes is a skeptic based on Meditation I. According to the text, why is this incorrect?", "options": [{"text": "Descartes' method of doubt is primarily psychological, causing emotional distress, rather than philosophical.", "isCorrect": false, "rationale": "The text clarifies: '\"Doubt\" in Descartes is methodological, not psychological. The meditator is not in a state of panic or despair.'"}, {"text": "Descartes uses doubt as a tool to find certainty and knowledge, whereas a skeptic concludes that knowledge is impossible.", "isCorrect": true, "rationale": "The text directly states: 'A skeptic concludes that knowledge is impossible. Descartes uses doubt to find knowledge.'"}, {"text": "Descartes only doubts sensory information, never extending his doubt to logical or mathematical truths.", "isCorrect": false, "rationale": "The evil genius hypothesis explicitly challenges 'even about mathematics and logic,' making this statement false."}, {"text": "Meditation I concludes with a definitive proof that knowledge is attainable, disproving skepticism.", "isCorrect": false, "rationale": "The text states: 'Meditation I ends in deliberate suspension: the meditator does not know yet whether anything can be rescued.' It ends with a question, not a conclusion."}], "id": "q08"}, {"question": "How does Meditation I typically conclude?", "options": [{"text": "With a definitive proof of the external world's existence, having overcome all doubt.", "isCorrect": false, "rationale": "The text states that at the end of Meditation I, 'nothing has been established as certain. Not the external world...'"}, {"text": "With a clear statement that all human knowledge is illusory and inherently unreliable.", "isCorrect": false, "rationale": "While it ends in radical uncertainty, it's a 'deliberate suspension' and a question, not a final conclusion of illusion."}, {"text": "With a state of radical uncertainty and a question about what, if anything, can be proven certain.", "isCorrect": true, "rationale": "The text notes: 'Meditation I ends in deliberate suspension: the meditator does not know yet whether anything can be rescued. He resolves to act \"as though\" all his former beliefs are false... and to see what, if anything, remains.'"}, {"text": "By concluding that relying on immediate sensory evidence is always prudent and trustworthy.", "isCorrect": false, "rationale": "This contradicts Stage One, which finds it 'imprudent' to trust the senses entirely because they sometimes deceive."}], "id": "q09"}, {"question": "A person confidently believes that 'a square has four equal sides.' Which of Descartes' stages of doubt would be necessary to cast doubt on this specific belief?", "options": [{"text": "Stage One (The Senses Sometimes Deceive), because visual perception can be misleading about geometric shapes.", "isCorrect": false, "rationale": "Stage One deals with specific sensory illusions about particular objects. The definition of a square is a conceptual/mathematical truth, not a mere sensory observation."}, {"text": "Stage Two (The Dream Argument), because one might dream of squares with unequal sides.", "isCorrect": false, "rationale": "The text states that 'mathematical truths seem to hold' even within the dream argument, indicating the dream argument alone does not cast doubt on fundamental mathematical definitions."}, {"text": "Stage Three (The Evil Genius Hypothesis), because it targets even the most fundamental logical and mathematical certainties.", "isCorrect": true, "rationale": "The Evil Genius Hypothesis is designed to challenge 'even about mathematics and logic,' suggesting that a supreme deceiver could make even self-evident mathematical truths unreliable."}, {"text": "None of the above; this belief is a self-evident truth immune to all forms of Cartesian doubt.", "isCorrect": false, "rationale": "The entire purpose of Stage Three is to test whether anything is immune to doubt. Meditation I ends in radical uncertainty, implying that even seemingly self-evident truths are doubted until proven otherwise."}], "id": "q10"}, {"question": "The text distinguishes 'methodological doubt' from ordinary doubt or psychological uncertainty. What is the key feature that makes Cartesian doubt 'methodological'?", "options": [{"text": "It is triggered by a specific traumatic experience that undermines confidence in the senses.", "isCorrect": false, "rationale": "Methodological doubt is a deliberate philosophical procedure, not a response to trauma. The text explicitly distinguishes it from psychological states like panic or despair."}, {"text": "It is a deliberately adopted procedure — a tool for philosophical inquiry — rather than a genuine psychological state of uncertainty.", "isCorrect": true, "rationale": "The text specifies: '\"Doubt\" in Descartes is methodological, not psychological. The meditator is not in a state of panic or despair. Doubt is here a tool, a procedure, deliberately adopted for philosophical purposes.'"}, {"text": "It applies only to beliefs about the external world, not to beliefs about one's own mental states.", "isCorrect": false, "rationale": "Methodological doubt applies broadly — it extends even to mathematical truths through the Evil Genius, making it far wider than just beliefs about the external world."}, {"text": "It is reversible once a definitive counterexample is found that confirms the reality of external objects.", "isCorrect": false, "rationale": "Methodological doubt is resolved not by finding counterexamples to specific doubts, but by finding something indubitable from which all knowledge can be rebuilt — the cogito in Meditation II."}], "id": "q11"}, {"question": "The three stages of Cartesian doubt form a progression of escalating radicality. Which ordering correctly represents this escalation from least to most radical?", "options": [{"text": "Evil Genius → Dream Argument → Sensory Deception", "isCorrect": false, "rationale": "This reverses the progression entirely. Sensory deception is the most limited and least radical stage; the evil genius is the most radical."}, {"text": "Dream Argument → Sensory Deception → Evil Genius", "isCorrect": false, "rationale": "Sensory deception comes before the dream argument; they do not alternate in this order."}, {"text": "Sensory Deception → Dream Argument → Evil Genius", "isCorrect": true, "rationale": "Stage One (sensory deception) targets perceptual beliefs about specific objects; Stage Two (dream argument) extends doubt to all perception-based beliefs; Stage Three (evil genius) challenges even mathematical and logical certainties — a clear escalation."}, {"text": "Sensory Deception → Evil Genius → Dream Argument", "isCorrect": false, "rationale": "The evil genius is introduced after the dream argument fails to reach mathematical truths — so the dream argument precedes the evil genius in the actual sequence."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
