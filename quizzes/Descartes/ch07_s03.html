<script>
var QUESTIONS = [{"question": "According to the introductory summary of Meditation VI, which of the following is NOT one of Descartes' primary goals or achievements in this final meditation?", "options": [{"text": "To prove that material things exist.", "isCorrect": false, "rationale": "The introduction explicitly states, 'He proves that material things exist,' making this a primary achievement."}, {"text": "To establish the real distinction between mind and body.", "isCorrect": false, "rationale": "The introduction explicitly states, 'establishes the real distinction between mind and body,' making this a primary achievement."}, {"text": "To demonstrate that the mind is entirely independent of the body, with no intimate connection.", "isCorrect": true, "rationale": "The introduction states Descartes 'acknowledges the intimate union of soul and body,' directly contradicting the idea of the mind being entirely independent with no intimate connection. His aim is to prove their distinction, but also their union, not complete independence."}, {"text": "To acknowledge the intimate union of soul and body that makes us who we are.", "isCorrect": false, "rationale": "The introduction explicitly states, '— crucially — acknowledges the intimate union of soul and body that makes us who we are,' making this a primary achievement."}], "id": "q01"}, {"question": "Descartes distinguishes between 'imagination' and 'pure intellection' (or conception). What fundamental difference does he highlight using the example of a chiliagon (a thousand-sided figure)?", "options": [{"text": "Imagining a chiliagon is easier and more precise than purely conceiving it, allowing for distinct apprehension of all its sides.", "isCorrect": false, "rationale": "Descartes explicitly states he 'cannot in any way imagine the thousand sides of a chiliagon' distinctly, only conceive it."}, {"text": "Pure intellection requires a particular effort of mind to form a concept, whereas imagination occurs spontaneously.", "isCorrect": false, "rationale": "Descartes states, 'I clearly recognise that I have need of a particular effort of mind in order to effect the act of imagination, such as I do not require in order to understand.'"}, {"text": "Imagination involves the mind applying itself to a body, while pure intellection involves the mind turning on itself and considering its own ideas.", "isCorrect": true, "rationale": "Descartes states that in imagining, the mind 'turns towards the body,' whereas in pure intellection, it 'in some manner turns on itself, and considers some of the ideas which it possesses in itself.'"}, {"text": "Both imagination and pure intellection provide equally strong evidence for the necessary existence of corporeal objects.", "isCorrect": false, "rationale": "Neither imagination nor pure intellection alone provides 'necessary' evidence for corporeal objects; imagination only leads to a 'probability.'"}], "id": "q02"}, {"question": "Descartes concludes that the faculty of imagination is not a necessary element in the essence of his mind. What is his primary justification for this claim?", "options": [{"text": "Imagination is inherently deceptive and thus cannot be part of a perfect mind's essence.", "isCorrect": false, "rationale": "While he later discusses the fallibility of senses (which feed imagination), his reason here is about what is essential to his being, not deception."}, {"text": "He could still fully exist as himself, with his mind's essence intact, even if he did not possess the power to imagine.", "isCorrect": true, "rationale": "Descartes states, 'for although I did not possess it I should doubtless ever remain the same as I now am, from which it appears that we might conclude that it depends on something which differs from me.'"}, {"text": "Imagination is a function of the soul alone, distinct from the mind's intellectual capabilities.", "isCorrect": false, "rationale": "Descartes discusses 'faculty of knowledge to the body' and 'power of imagination which is in one, inasmuch as it differs from the power of understanding,' implying a mental faculty, not purely soul in contrast to mind."}, {"text": "The imagination is merely a confused form of intellection, and thus not a distinct or essential faculty.", "isCorrect": false, "rationale": "He describes it as a distinct mode of thinking, requiring a 'particular effort of mind' and turning towards the body, distinguishing it from pure intellection."}], "id": "q03"}, {"question": "In his initial attempt to deduce the existence of material things based on the faculty of imagination, what degree of certainty does Descartes achieve?", "options": [{"text": "Absolute certainty, as imagination is a direct proof of an immediately present body.", "isCorrect": false, "rationale": "Descartes states, 'I conjecture with probability that body does exist; but this is only with probability.'"}, {"text": "A probable conjecture, because he can discover no other convenient way to explain how imagination works if bodies didn't exist.", "isCorrect": true, "rationale": "Descartes concludes, 'because I can discover no other convenient mode of explaining it, I conjecture with probability that body does exist; but this is only with probability.'"}, {"text": "No certainty at all, as imagination can be entirely a product of the mind without external reality.", "isCorrect": false, "rationale": "He does gain *some* probability, even if not necessary proof."}, {"text": "Conditional certainty, dependent on proving God is not a deceiver first.", "isCorrect": false, "rationale": "While God's non-deceiving nature is crucial for later proofs, this specific conclusion about imagination is 'only with probability' and is distinct from the later arguments."}], "id": "q04"}, {"question": "When recalling his former beliefs, how did Descartes characterize the quality of ideas he received through his senses compared to those he could generate in his own mind during meditation?", "options": [{"text": "Sensory ideas were generally less distinct and more confused, requiring intellectual effort to clarify.", "isCorrect": false, "rationale": "Descartes states the opposite: 'the ideas which I received through the senses were much more lively, more clear, and even, in their own way, more distinct than any of those which I could of myself frame in meditation.'"}, {"text": "Sensory ideas were much more lively, clear, and distinct, leading him to believe they must originate from something other than his own mind.", "isCorrect": true, "rationale": "Descartes states, 'the ideas which I received through the senses were much more lively, more clear, and even, in their own way, more distinct than any of those which I could of myself frame in meditation, it appeared as though they could not have proceeded from my mind, so that they must necessarily have been produced in me by some other things.'"}, {"text": "Both types of ideas possessed similar qualities, making it difficult to distinguish their origin.", "isCorrect": false, "rationale": "He explicitly differentiates their qualities."}, {"text": "Sensory ideas were reliable sources of knowledge about mathematical properties but not qualities like color or sound.", "isCorrect": false, "rationale": "He mentions perceiving 'colours, sounds, scents, pain' through senses, and his initial belief was that they came from bodies, not just mathematical properties."}], "id": "q05"}, {"question": "Prior to his doubts, what was a key reason Descartes believed his sensory ideas came from objects external to his mind?", "options": [{"text": "He observed that he could manipulate external objects directly through his thoughts, proving their existence.", "isCorrect": false, "rationale": "This is not mentioned in the text as a reason for believing in external objects. His method is primarily introspective and based on ideas."}, {"text": "He found that these ideas presented themselves to him without his consent and he could not prevent perceiving them when the objects were present.", "isCorrect": true, "rationale": "Descartes states, 'for I found by experience that these ideas presented themselves to me without my consent being requisite, so that I could not perceive any object, however desirous I might be, unless it were present to the organs of sense; and it was not in my power not to perceive it, when it was present.'"}, {"text": "His reason definitively demonstrated a necessary logical connection between his sensations and external corporeal causes.", "isCorrect": false, "rationale": "He later explicitly states there is 'no affinity (that I at least can understand)' between sensations like hunger and the desire to eat, implying a lack of rational connection at this stage."}, {"text": "He inferred their external origin from the fact that he consistently dreamed of external objects.", "isCorrect": false, "rationale": "The dream argument is presented as a *source of doubt* for external objects, not a reason for believing in them."}], "id": "q06"}, {"question": "When considering the connection between a sensation like hunger and the desire to eat, or pain and sadness, what was Descartes' initial explanation based on his former beliefs?", "options": [{"text": "He understood these connections through a clear and distinct rational analysis of physiological processes.", "isCorrect": false, "rationale": "Descartes explicitly states, 'I could give no reason excepting that nature taught me so; for there is certainly no affinity (that I at least can understand) between the craving of the stomach and the desire to eat...'"}, {"text": "He attributed these connections to the direct will of God, who instilled them in humans for their well-being.", "isCorrect": false, "rationale": "While he will later appeal to God, at this stage of recalling former beliefs, he states 'nature taught me so' without explicitly invoking God's will."}, {"text": "He concluded there was no rational affinity between them and simply attributed these judgments to 'nature's teaching' without further intellectual understanding.", "isCorrect": true, "rationale": "Descartes states, 'I could give no reason excepting that nature taught me so; for there is certainly no affinity (that I at least can understand) between the craving of the stomach and the desire to eat...'"}, {"text": "He believed these were purely psychological associations formed through repeated experience and memory.", "isCorrect": false, "rationale": "He describes them as judgments 'formed in me before I had the leisure to weigh and consider any reasons,' implying they are more instinctive than learned associations."}], "id": "q07"}, {"question": "Which of the following scenarios is an example Descartes uses to illustrate his doubts about judgments founded on the EXTERNAL senses?", "options": [{"text": "The inability to clearly imagine the individual sides of a chiliagon.", "isCorrect": false, "rationale": "This example relates to the distinction between imagination and pure intellection, not the unreliability of external sensory judgments."}, {"text": "The feeling of pain in an amputated limb.", "isCorrect": false, "rationale": "This is an example used to doubt 'internal' senses (pain), not external ones."}, {"text": "Towers appearing round from a distance but square upon closer observation.", "isCorrect": true, "rationale": "Descartes explicitly uses this example: 'I from time to time observed that those towers which from afar appeared to me to be round, more closely observed seemed square... I found error in judgments founded on the external senses.'"}, {"text": "The difficulty in distinguishing between waking experiences and dreams.", "isCorrect": false, "rationale": "This is a general ground for doubt, not specifically an error in judgment based on *external* sensory data itself (like the shape of a tower changing)."}], "id": "q08"}, {"question": "Descartes argues that even 'internal' sensations like pain can be deceptive. What specific example does he provide to support this doubt?", "options": [{"text": "The fact that emotional pain can be more intense than physical pain.", "isCorrect": false, "rationale": "While he mentions passions, this specific point is not used to argue deception in internal bodily pain."}, {"text": "The experience of feeling pain in a limb that has been amputated.", "isCorrect": true, "rationale": "Descartes states, 'I have learned from some persons whose arms or legs have been cut off, that they sometimes seemed to feel pain in the part which had been amputated, which made me think that I could not be quite certain that it was a certain member which pained me, even although I felt pain in it.'"}, {"text": "The subjective nature of pain, varying greatly from person to person.", "isCorrect": false, "rationale": "He focuses on the possibility of mislocalization, not just subjective intensity."}, {"text": "The observation that pain often causes sadness, but sadness does not always indicate pain.", "isCorrect": false, "rationale": "He discusses the connection between pain and sadness earlier when describing 'nature's teaching,' but not as a source of doubt about the certainty of pain itself."}], "id": "q09"}, {"question": "Considering all the 'grounds of doubt' Descartes discusses regarding sensory experience, what fundamental philosophical problem is he trying to illustrate about relying on the senses for certain knowledge?", "options": [{"text": "That the senses, when properly used, provide the most clear and distinct ideas, making them superior to pure reason.", "isCorrect": false, "rationale": "Descartes is undermining the reliability of the senses, not exalting them over reason for certainty."}, {"text": "That sensory perceptions are inherently fallible, often contradictory, and difficult to distinguish from illusions or dreams, thus making them an unreliable foundation for certain truth about external reality.", "isCorrect": true, "rationale": "The examples of towers, amputated limbs, and dreams, along with the possibility of a deceiving nature, all contribute to the overarching problem that sensory experiences are highly unreliable and cannot provide the certainty Descartes seeks."}, {"text": "That the human mind is completely isolated from any interaction with the physical body or external world, receiving no genuine sensory input.", "isCorrect": false, "rationale": "He is not denying *any* interaction or input, but questioning its reliability and whether it proves external existence. He will later argue for mind-body union."}, {"text": "That the existence of material things can only be proven through empirical observation and repeated sensory verification, not rational deduction.", "isCorrect": false, "rationale": "Descartes is engaged in rational deduction, and his argument here is specifically about *doubt* regarding empirical observation, not affirming it as the sole path to proof."}], "id": "q10"}, {"question": "Descartes describes his faculty of imagination as depending on something that 'differs from me' — something outside the pure intellect. What does this tell him about imagination's relationship to his essence as a thinking thing?", "options": [{"text": "That imagination is an essential component of his thinking nature, since without it he could not form ideas of material things.", "isCorrect": false, "rationale": "Descartes' point is precisely the opposite: because he could remain himself without imagination, it is not essential to his nature as a thinking thing. Its dependence on something external means it is a contingent, not essential, feature."}, {"text": "That imagination is not part of his essential nature as a thinking thing, but depends on his mind's relation to a body — suggesting mind and body are connected in some way.", "isCorrect": true, "rationale": "If imagination required something beyond the pure intellect (presumably a body to which the mind applies itself), and yet Descartes could exist fully as a thinking thing without imagination, then imagination is not essential to his mental essence. Its dependence on a body hints at the mind-body union explored later in the meditation."}, {"text": "That imagination demonstrates the soul's ability to create entirely new content beyond what the intellect contains, proving the soul's creative freedom.", "isCorrect": false, "rationale": "Descartes' analysis of imagination in this passage is not about creative freedom but about the ontological status of imagination — whether it is essential or accidental to his nature as a thinking thing."}, {"text": "That imagination is more reliable than pure intellection for grasping complex figures, since it engages the body as an aid.", "isCorrect": false, "rationale": "Descartes finds imagination inferior for precision: he cannot distinctly imagine the thousand sides of a chiliagon, while he can clearly understand it through pure intellection. Engaging the body is not an epistemic advantage here."}], "id": "q11"}, {"question": "In Meditation VI, Descartes returns to the argument from dreaming — the worry that he cannot tell waking experience from dreams. By this point in the Meditations, why is this argument less threatening than it was in Meditation I?", "options": [{"text": "Because he has now established that sensory ideas are always clear and distinct, making confusion with dreams impossible.", "isCorrect": false, "rationale": "Descartes never claims sensory ideas are always clear and distinct. His solution to the dream problem is not about the vividness of sensory ideas but about their coherence with memory and reason."}, {"text": "Because he has now established God's existence and non-deceptive nature, which guarantees that he is not systematically deceived about all his waking experience as a whole.", "isCorrect": true, "rationale": "In Meditation I, the dream argument was reinforced by the evil genius: without any guarantee, all experience could be a dream or systematic deception. By Meditation VI, God's non-deceptive nature is established. While occasional confusion between waking and dreaming remains possible, the comprehensive, coherent, and memory-connected character of waking life is guaranteed not to be a wholesale deception, unlike the radical scenario Meditation I considered."}, {"text": "Because the chiliagon argument has proven that pure intellection is more reliable than imagination, removing the dream worry from intellectual knowledge.", "isCorrect": false, "rationale": "The chiliagon argument distinguishes imagination from intellection; it does not directly address the dream argument or guarantee the reliability of waking experience as a whole."}, {"text": "Because he has established that he is a mind-body union, and bodies cannot exist in dreams, so any embodied experience must be waking.", "isCorrect": false, "rationale": "This is not Descartes' argument. Descartes uses the coherence of waking experience — its connection to memory and reason — not the premise that bodies cannot be dreamed of, as his criterion for distinguishing waking from dreaming."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
