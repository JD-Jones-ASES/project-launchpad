<script>
var QUESTIONS = [{"question": "What is the primary distinction between rationalism and empiricism regarding the source of genuine knowledge?", "options": [{"text": "Rationalists believe knowledge comes from mathematics, while empiricists believe it comes from logic.", "isCorrect": false, "rationale": "While mathematics is the model for rationalist knowledge, and logic is a tool for both, this option misrepresents the fundamental source. The text states rationalists prioritize reason and empiricists prioritize sensory experience."}, {"text": "Rationalists assert that reason is the primary source of knowledge, whereas empiricists contend that all knowledge originates in sensory experience.", "isCorrect": true, "rationale": "This accurately captures the core definitions from the text: Rationalists hold that 'reason is the primary source of genuine knowledge,' and Empiricists hold that 'all knowledge originates in sensory experience.'"}, {"text": "Rationalists claim all knowledge is innate, while empiricists argue all knowledge is learned through education.", "isCorrect": false, "rationale": "Rationalists believe in innate ideas or structures, but not necessarily 'all' knowledge being innate. Empiricists focus on sensory experience, which includes learning, but 'education' is too narrow a descriptor for 'all knowledge originates in sensory experience.'"}, {"text": "Rationalists focus on the physical world, and empiricists focus on the mental world.", "isCorrect": false, "rationale": "This option reverses or misrepresents the philosophers' focus. Both traditions grapple with both physical and mental reality, but their primary distinction lies in the origin of knowledge, not the domain of study."}], "id": "q01"}, {"question": "Which philosophical position did John Locke specifically challenge with his doctrine of the *tabula rasa*?", "options": [{"text": "Spinoza's view that God and Nature are identical.", "isCorrect": false, "rationale": "Locke's primary challenge was directed at Descartes' ideas, not Spinoza's metaphysics."}, {"text": "Descartes' claim that the mind possesses innate ideas.", "isCorrect": true, "rationale": "The text states, 'John Locke targeted Descartes' doctrine of innate ideas directly,' arguing that the 'mind at birth is a tabula rasa — a blank slate. There are no innate ideas.'"}, {"text": "Berkeley's assertion that 'to be is to be perceived.'", "isCorrect": false, "rationale": "Berkeley was a later empiricist who built upon Locke's foundations; Locke did not challenge Berkeley's specific idealism."}, {"text": "Hume's skepticism about the existence of the self.", "isCorrect": false, "rationale": "Hume was a later empiricist who extended the critique of rationalism; Locke's focus was specifically on innate ideas."}], "id": "q02"}, {"question": "George Berkeley's famous slogan *esse est percipi* ('to be is to be perceived') directly challenges which aspect of Descartes' philosophy?", "options": [{"text": "That our perception of the external world is often unreliable and leads to skepticism.", "isCorrect": false, "rationale": "While Berkeley's view could lead to skepticism about a material world, his conclusion is far stronger than just unreliability; it's a denial of an independent material world."}, {"text": "That the material world, as an independent substance existing apart from all minds, does not exist.", "isCorrect": true, "rationale": "The text explicitly states: 'The material world Descartes had struggled across six Meditations to prove simply does not exist, in any sense beyond its existence as ideas in minds.'"}, {"text": "That the external world can only be known through innate rational structures, not sensory experience.", "isCorrect": false, "rationale": "Berkeley was an empiricist, so this statement contradicts his core philosophical approach."}, {"text": "That God continuously creates the external world anew with each perception, sustaining its existence.", "isCorrect": false, "rationale": "God's perception ensures the continued existence of 'physical objects' as ideas, but the primary challenge is to the existence of a *mind-independent material* world itself, which Descartes affirmed."}], "id": "q03"}, {"question": "If David Hume were to analyze the statement 'The sun will rise tomorrow because it always has,' what would be his primary objection regarding the 'because' part?", "options": [{"text": "That all events are predetermined by a divine plan, making scientific inquiry futile.", "isCorrect": false, "rationale": "Hume's skepticism was about the *observability* and *rational necessity* of causation, not about divine predetermination of events."}, {"text": "That the connection between a cause and its effect is a necessary truth discovered by reason, like mathematics.", "isCorrect": false, "rationale": "This is a rationalist perspective, which Hume's philosophy directly challenged. He argued against the idea of necessary connections being rationally discoverable."}, {"text": "That we only observe regularities of events following one another, but never directly perceive a necessary connection between them.", "isCorrect": true, "rationale": "Hume argued, 'We see regularities in nature, event following event; but we never perceive the necessary connection that makes one event cause the next. The mind infers causation from habit, not from rational insight.'"}, {"text": "That scientific experiments are inherently flawed because they rely on assumptions about unobservable forces.", "isCorrect": false, "rationale": "While Hume challenged the philosophical foundations of scientific inference, the text emphasizes his point about the *perception* of causation, not the inherent flaw of experiments themselves."}], "id": "q04"}, {"question": "Kant's 'Copernican revolution' in philosophy primarily refers to his argument that:", "options": [{"text": "Philosophy should model its methods after the scientific revolution initiated by Copernicus.", "isCorrect": false, "rationale": "The 'Copernican revolution' is an analogy for a shift in perspective, not a literal adoption of scientific methodology. Kant aimed to revolutionize *how we think about knowledge*."}, {"text": "The mind actively structures experience rather than passively receiving an already organized world.", "isCorrect": true, "rationale": "The text states Kant 'argued that the mind actively structures experience rather than passively receiving it,' comparing this to Copernicus showing the earth moves around the sun. This is the essence of his 'Copernican revolution.'"}, {"text": "The universe is fundamentally rational and its deepest truths can be grasped by pure thought.", "isCorrect": false, "rationale": "This is a core conviction of the rationalists, which Kant critiqued for being only 'half right' in its understanding of how knowledge is acquired."}, {"text": "All knowledge ultimately originates in sensory experience, refuting the concept of innate ideas.", "isCorrect": false, "rationale": "This is the empiricist position, which Kant also critiqued for being only 'half right,' as it neglected the mind's active contribution to knowledge."}], "id": "q05"}, {"question": "Which of the following philosophers is *not* categorized by the text as one of the three great Continental rationalists of the seventeenth century?", "options": [{"text": "Baruch Spinoza.", "isCorrect": false, "rationale": "Spinoza is explicitly named as one of the 'three great Continental rationalists of the seventeenth century.'"}, {"text": "Gottfried Wilhelm Leibniz.", "isCorrect": false, "rationale": "Leibniz is explicitly named as one of the 'three great Continental rationalists of the seventeenth century.'"}, {"text": "David Hume.", "isCorrect": true, "rationale": "David Hume is identified as a 'Scottish philosopher' and a leading figure among the 'British Empiricists,' not a Continental rationalist."}, {"text": "René Descartes.", "isCorrect": false, "rationale": "Descartes is identified as belonging to the 'rationalism' tradition and is implicitly the first of the three 'great Continental rationalists' mentioned."}], "id": "q06"}, {"question": "How did Baruch Spinoza and Gottfried Wilhelm Leibniz primarily address or circumvent Descartes' interaction problem (how mind and body interact)?", "options": [{"text": "Both argued that mind and body are distinct substances but interact through a special divine intervention.", "isCorrect": false, "rationale": "Neither Spinoza nor Leibniz proposed divine intervention for ongoing *interaction* in this way. Leibniz's 'pre-established harmony' is a different concept, and Spinoza eliminated the two-substance framework."}, {"text": "Spinoza dissolved the two-substance framework, identifying mind and body as attributes of a single substance, while Leibniz denied genuine causal interaction through pre-established harmony.", "isCorrect": true, "rationale": "The text states Spinoza's system 'dissolves Descartes' interaction problem by eliminating the two-substance framework,' and Leibniz 'avoid[ed] the interaction problem by denying genuine interaction altogether' through 'pre-established harmony.'"}, {"text": "Both concluded that the interaction problem is insoluble and leads to ultimate skepticism about knowledge.", "isCorrect": false, "rationale": "Both philosophers offered robust alternative metaphysical systems as solutions, rather than abandoning the problem as insoluble or concluding with skepticism."}, {"text": "Both asserted that mind is merely an illusion produced by complex physical processes, thus eliminating the problem.", "isCorrect": false, "rationale": "This is a form of materialistic reductionism, which is not what these rationalists proposed. They maintained the reality of both mind and body within their systems."}], "id": "q07"}, {"question": "The empiricists, particularly David Hume, are described as pushing Descartes' method of doubt further. What was the key difference in their outcomes?", "options": [{"text": "Descartes used doubt to establish certainty about God, self, and the external world, while empiricists used it to confirm their doubt about these very certainties.", "isCorrect": true, "rationale": "The text explains, 'Descartes used doubt as a tool to find certainty... The empiricists, especially Hume, used the same critical spirit and found that the certainties Descartes thought he had recovered were themselves doubtful' regarding God, the self, and causal inference."}, {"text": "Descartes doubted sensory experience, whereas empiricists doubted the existence of reason itself.", "isCorrect": false, "rationale": "While Descartes doubted sensory experience, empiricists relied on it. Empiricists doubted the *rationalist claims* about what reason alone could achieve, not the existence of reason itself."}, {"text": "Descartes found truth through introspection, while empiricists found it through collective observation.", "isCorrect": false, "rationale": "Descartes used introspection for foundational truths like the cogito. Empiricists emphasized sensory experience (both external and internal reflection), but 'collective observation' is too specific and not the primary contrast in their methods of doubt."}, {"text": "Descartes aimed to prove the existence of an external world, while empiricists aimed to prove its non-existence.", "isCorrect": false, "rationale": "While Berkeley denied the material world, Locke affirmed it, and Hume was skeptical about our *knowledge* of a necessary external connection rather than aiming to prove its non-existence universally."}], "id": "q08"}, {"question": "According to the text, what is a shared conviction among the rationalists (Descartes, Spinoza, Leibniz)?", "options": [{"text": "That sensory experience is the ultimate foundation for all genuine knowledge.", "isCorrect": false, "rationale": "This is the defining characteristic of empiricism, the opposing tradition to rationalism."}, {"text": "That the universe is fundamentally rational and its deepest truths are intelligible to pure reason working from its own resources.", "isCorrect": true, "rationale": "The text explicitly states, 'Despite their differences, the rationalists share a common conviction: the universe is fundamentally rational, intelligible to reason, and the deepest truths about it can be grasped by the thinking mind working from its own resources.'"}, {"text": "That the mind is a blank slate at birth, gradually filled by experience.", "isCorrect": false, "rationale": "This is John Locke's doctrine of *tabula rasa*, which is central to empiricism, not rationalism."}, {"text": "That God's existence cannot be proven by reason alone but requires faith.", "isCorrect": false, "rationale": "Rationalists like Descartes, Spinoza, and Leibniz actively sought to prove God's existence through rigorous rational arguments within their philosophical systems."}], "id": "q09"}, {"question": "Kant's central claim about knowledge, synthesizing rationalism and empiricism, suggests that:", "options": [{"text": "Pure reason alone is sufficient for genuine knowledge if it starts with innate ideas.", "isCorrect": false, "rationale": "This represents the rationalist position, which Kant argued was only 'half right' because pure reason alone could not generate genuine knowledge about reality."}, {"text": "Experience alone, even if structured by the mind, can yield complete and certain knowledge.", "isCorrect": false, "rationale": "Kant argued that experience alone, *unstructured* by the mind's forms, could not yield knowledge. He emphasized that the mind *actively organizes* experience, and both elements are necessary."}, {"text": "Knowledge requires both the raw material provided by sensory experience and the active organizing forms contributed by the mind.", "isCorrect": true, "rationale": "This accurately reflects Kant's synthesis: 'Knowledge requires both the material provided by experience and the forms the mind contributes. Neither alone is sufficient.' The mind 'imposes forms — space, time, and the categories of understanding — on the raw material of experience.'"}, {"text": "Skepticism about the external world and the self is the inevitable conclusion of any thorough philosophical inquiry.", "isCorrect": false, "rationale": "This reflects Hume's conclusion, which Kant aimed to *respond to* and overcome, not to endorse, through his synthesis."}], "id": "q10"}, {"question": "The text describes Leibniz's 'pre-established harmony' as a solution to the interaction problem. What is the core idea of this solution?", "options": [{"text": "God continuously intervenes at every moment to synchronize mental and physical events through ongoing miraculous causation.", "isCorrect": false, "rationale": "Continuous miraculous intervention is closer to occasionalism (associated with Malebranche), not Leibniz's pre-established harmony. Leibniz's solution is a one-time divine arrangement, not ongoing intervention."}, {"text": "God, at creation, designed mind and body like two synchronized clocks that run in perfect parallel without ever actually causing events in each other.", "isCorrect": true, "rationale": "Leibniz's pre-established harmony denies that mind and body causally interact at all. They appear to interact because God, at the moment of creation, synchronized them perfectly — like two clocks set to show the same time, running in parallel. No actual causal exchange occurs between them."}, {"text": "Mind and body are parallel expressions of a single underlying substance, so their seeming interaction is actually the self-expression of that substance.", "isCorrect": false, "rationale": "This describes Spinoza's parallelism within his one-substance system, not Leibniz's pre-established harmony. In Leibniz's system, each monad is a distinct substance, and God's coordination — not a shared underlying substance — accounts for the appearance of interaction."}, {"text": "Mind and body interact through the pineal gland, which Leibniz identified as the point of causal contact between the two substances.", "isCorrect": false, "rationale": "The pineal gland hypothesis is Descartes' attempted solution, not Leibniz's. Leibniz specifically denied genuine causal interaction, making any physical interface irrelevant."}], "id": "q11"}, {"question": "Kant argued that both rationalism and empiricism were 'half right.' What, according to Kant, did each tradition miss?", "options": [{"text": "Rationalists missed the role of God in structuring knowledge; empiricists missed the role of language in shaping experience.", "isCorrect": false, "rationale": "This is not Kant's critique. Kant's synthesis is specifically about the contributions of sensory experience (empiricists' half-truth) and the mind's active organizing forms (rationalists' half-truth), not God or language."}, {"text": "Rationalists missed that knowledge must be grounded in sensory experience; empiricists missed that the mind actively imposes its own forms — space, time, and categories — on the raw material of experience, making knowledge possible.", "isCorrect": true, "rationale": "Kant's synthesis: Rationalists were right that the mind contributes necessary structures to knowledge, but wrong to think pure reason alone yields knowledge of reality. Empiricists were right that knowledge requires sensory input, but wrong to think the mind is purely passive. Both sensory material and the mind's active forms are necessary for knowledge."}, {"text": "Rationalists missed the social dimension of knowledge; empiricists missed the personal, subjective character of experience.", "isCorrect": false, "rationale": "Kant's critique is epistemological and focused on the respective roles of reason and experience, not on social or subjective dimensions, which belong to later philosophical developments."}, {"text": "Rationalists missed practical reason and moral knowledge; empiricists missed theoretical reason and scientific knowledge.", "isCorrect": false, "rationale": "Kant does develop both theoretical and practical reason, but his synthesis of rationalism and empiricism specifically concerns the conditions for theoretical knowledge (how sensory experience and rational forms combine), not a division of moral versus scientific domains."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
