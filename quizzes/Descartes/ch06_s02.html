<script>
var QUESTIONS = [{"question": "What is the fundamental premise of Anselm's ontological argument, as presented in the text?", "options": [{"text": "God's existence can be proven through observable effects in the world, such as creation and design.", "isCorrect": false, "rationale": "This describes the *a posteriori* approach favored by Aquinas (the Five Ways), not Anselm's *a priori* ontological argument, which relies on definition and reason alone."}, {"text": "God, defined as 'that than which nothing greater can be conceived,' must exist in reality to truly embody the maximum possible greatness, otherwise a greater being could be conceived.", "isCorrect": true, "rationale": "Anselm defines God as 'the greatest possible being' and argues that if such a being existed only as a concept in the mind, one could conceive of a greater being (the same being existing in reality), which would contradict the initial definition. Therefore, God must exist both in the mind and in reality."}, {"text": "The concept of God is inherently contradictory, thus His existence is logically impossible.", "isCorrect": false, "rationale": "Anselm's argument aims to *prove* God's existence from His concept, not to show that the concept is contradictory or leads to non-existence."}, {"text": "Faith alone is sufficient for understanding God's existence, rendering rational arguments unnecessary.", "isCorrect": false, "rationale": "While Anselm coined 'faith seeking understanding,' implying faith's primacy, his ontological argument is a rational demonstration intended to illuminate what faith already holds, not to dismiss reason."}]}, {"question": "Gaunilo's 'greatest conceivable island' objection primarily aimed to demonstrate what about Anselm's argument?", "options": [{"text": "Anselm's definition of God was incomplete and failed to account for divine attributes like omnipotence.", "isCorrect": false, "rationale": "Gaunilo's objection did not target the completeness of God's definition but rather the *logic* of deriving existence from a definition, regardless of its content."}, {"text": "If Anselm's logic were sound, it could be used to prove the existence of any absurdly perfect entity, thereby revealing a fundamental flaw in the argument's structure.", "isCorrect": true, "rationale": "Gaunilo proposed that if Anselm's logic were valid, one could conceive of a 'greatest conceivable island' and, by the same logic, prove its existence. Since no one believes thinking a perfect island into existence is possible, Gaunilo argued this reveals a flaw in Anselm's reasoning when applied to God."}, {"text": "God's existence is an empirical question that must be resolved through observation, not through conceptual analysis.", "isCorrect": false, "rationale": "While Gaunilo's objection implies the need for empirical evidence for certain things, his direct target was the validity of deriving existence *from a concept alone*, rather than making a general statement about all existential proofs."}, {"text": "Anselm misunderstood the nature of perfection, applying it inappropriately to contingent beings.", "isCorrect": false, "rationale": "Gaunilo's point was more about the *application* of the argument's logic to a concept of 'perfection' for an island, demonstrating a supposed flaw, rather than directly critiquing Anselm's understanding of perfection itself."}]}, {"question": "How did Anselm specifically counter Gaunilo's 'greatest conceivable island' objection?", "options": [{"text": "He conceded that his argument only applied to concepts already known to exist through other means.", "isCorrect": false, "rationale": "Conceding this would undermine the entire purpose of the ontological argument, which is to prove existence from the concept alone."}, {"text": "He argued that the concept of a 'greatest island' is incoherent because an island is a contingent, limited thing with no inherent upper limit to its perfection, unlike God.", "isCorrect": true, "rationale": "Anselm replied that his argument applies uniquely to God, defined as 'that than which nothing greater can be conceived,' which is an absolute maximum. An island, being contingent and limited, has no true 'greatest' form, as there's always room for more perfection (e.g., 'a slightly better island')."}, {"text": "He asserted that islands, unlike God, are not proper subjects for philosophical or theological inquiry.", "isCorrect": false, "rationale": "Anselm's response was philosophical, distinguishing the nature of God's perfection from that of an island, not dismissing islands as subjects of inquiry."}, {"text": "He modified his definition of God to explicitly exclude any properties that could also be applied to finite objects like islands.", "isCorrect": false, "rationale": "Anselm did not modify his definition of God; he clarified the *scope* and *unique applicability* of his argument based on the existing definition."}]}, {"question": "According to Thomas Aquinas, what is the primary reason humans cannot derive God's existence from His concept alone through the ontological argument?", "options": [{"text": "Aquinas believed that God's existence is a matter of pure faith, beyond the realm of human reason.", "isCorrect": false, "rationale": "Aquinas was a major proponent of using reason to understand God, as evidenced by his *Summa Theologica* and the Five Ways. He did not dismiss reason's role entirely."}, {"text": "Humans lack a direct, genuine intellectual grasp of God's infinite essence; our concept of God is only an approximation, preventing us from moving from concept to existence by pure analysis.", "isCorrect": true, "rationale": "Aquinas argued that we know God's essence only as a 'nominal definition,' an external description. Because our finite minds cannot genuinely intuit God's infinite essence, we cannot validly deduce His existence from that limited conceptual understanding alone."}, {"text": "Aquinas thought Anselm's definition of God as 'that than which nothing greater can be conceived' was logically flawed.", "isCorrect": false, "rationale": "Aquinas's objection was not primarily about the logical soundness of Anselm's definition, but rather about humanity's capacity to truly *grasp* the essence implied by that definition."}, {"text": "Aquinas believed that no being, including God, could exist necessarily; all existence is contingent.", "isCorrect": false, "rationale": "This contradicts Aquinas's own arguments, such as the Third Way (from contingency), which aims to prove the existence of a necessary being (God)."}]}, {"question": "In Aquinas's philosophy, what is the crucial distinction regarding essence and existence between God and all other created things?", "options": [{"text": "In created things, essence determines existence, while in God, existence determines essence.", "isCorrect": false, "rationale": "This statement misrepresents Aquinas's view. For Aquinas, in creatures, essence and existence are distinct; essence does not automatically determine existence. In God, they are identical, not a causal relationship."}, {"text": "In created things, essence and existence are really distinct, meaning what a thing is and that it is are separate; whereas in God alone, essence and existence are identical.", "isCorrect": true, "rationale": "Aquinas explicitly states that 'In everything except God, essence and existence are really distinct: what a thing is (its essence) and that it is (its existence) are two different things.' He contrasts this with God, in whom 'essence and existence are identical: God is not a being that exists but Being itself.'"}, {"text": "Created things have existence but no essence, while God has both essence and existence.", "isCorrect": false, "rationale": "All things have an essence (what they are). This option is fundamentally incorrect."}, {"text": "God is merely a concept or an ideal, while created things possess true, concrete existence.", "isCorrect": false, "rationale": "This is the opposite of Aquinas's position, who argued for God's real and unique existence as Being itself."}]}, {"question": "Why did Aquinas deem his 'Five Ways' necessary to prove God's existence, given his rejection of the ontological argument?", "options": [{"text": "The Five Ways are *a priori* arguments, relying on pure reason, which Aquinas saw as superior to Anselm's flawed *a priori* method.", "isCorrect": false, "rationale": "The text explicitly states that 'All five [Five Ways] are a posteriori arguments — they begin from observable features of the world and reason toward God as their ultimate explanation.' This contradicts the idea that they are *a priori*."}, {"text": "Aquinas believed that God's essence and existence could only be understood through direct divine revelation, not through any form of human reason.", "isCorrect": false, "rationale": "While Aquinas acknowledged revelation, his Five Ways are rational, philosophical arguments demonstrating God's existence, showing he believed reason had a crucial role."}, {"text": "The Five Ways are *a posteriori* arguments, deriving God's existence from observable effects in the world, which Aquinas considered the only valid approach given human cognitive limits regarding God's essence.", "isCorrect": true, "rationale": "The text explains that Aquinas argued God's existence 'must be proved from the observable effects God has on the world' because we 'do not have adequate access to that divine essence from the outside.' The Five Ways fulfill this requirement as *a posteriori* proofs."}, {"text": "He viewed the ontological argument as a preliminary, abstract step, with the Five Ways providing further, more concrete confirmation.", "isCorrect": false, "rationale": "Aquinas 'flatly rejected the ontological argument' as a means of proving God's existence, not as a preliminary step."}]}, {"question": "In *Proslogium*, Chapter IV, Anselm distinguishes between two ways a thing may be conceived. How does this distinction apply to 'the Fool's' statement, 'there is no God'?", "options": [{"text": "'The Fool' conceives God by truly understanding the divine entity itself, which, according to Anselm, makes his statement ('there is no God') a logical impossibility.", "isCorrect": false, "rationale": "Anselm argues that if 'the Fool' *truly* understood God's essence as 'that than which nothing greater can be conceived,' he would be unable to conceive of His non-existence. Thus, the Fool does *not* understand the entity."}, {"text": "'The Fool' conceives God merely by the word signifying it, but does not truly understand the entity, allowing him to utter the words 'God does not exist' without grasping their actual incoherence.", "isCorrect": true, "rationale": "Anselm clarifies that a thing can be conceived (1) when the word signifying it is conceived, or (2) when the thing itself is understood. 'The Fool' can conceive 'God not to exist' in the former sense (by speaking the words), but not in the latter (by truly understanding God's nature)."}, {"text": "Anselm argues that 'the Fool' cannot conceive God in any way, rendering his statement entirely meaningless.", "isCorrect": false, "rationale": "Anselm explicitly states that 'as far as the word goes, God can be conceived not to exist,' indicating that the Fool *can* conceive of the word, even if not the reality."}, {"text": "Anselm suggests that 'the Fool' intentionally misinterprets God's definition to justify his disbelief.", "isCorrect": false, "rationale": "Anselm's focus is on the logical implications of understanding God's definition, not on the Fool's motives or intentions."}]}, {"question": "Based on the text, the ontological argument, as formulated by Anselm, is best characterized as which type of philosophical argument?", "options": [{"text": "An *a posteriori* argument, relying on empirical observation of the world to infer God's existence.", "isCorrect": false, "rationale": "The text states that Aquinas's Five Ways are *a posteriori*. The ontological argument, by contrast, attempts to prove existence from concept alone, without empirical input."}, {"text": "An *a priori* argument, attempting to establish existence through reason and definition alone, without recourse to sensory experience.", "isCorrect": true, "rationale": "The ontological argument begins with a concept (the definition of God) and attempts to derive God's existence purely through logical analysis of that concept, without needing any external or empirical evidence. This is the hallmark of an *a priori* argument."}, {"text": "A moral argument, based on humanity's innate sense of right and wrong, requiring a divine lawgiver.", "isCorrect": false, "rationale": "The text does not describe the ontological argument as being based on morality or ethics."}, {"text": "A cosmological argument, inferring God from the existence, origin, or contingency of the universe.", "isCorrect": false, "rationale": "Cosmological arguments are *a posteriori* (like some of Aquinas's Five Ways). The ontological argument is distinct in its methodology, starting from a definition rather than the cosmos."}]}, {"question": "Considering their distinct approaches to proving God's existence, what represents a fundamental philosophical difference between Anselm and Thomas Aquinas?", "options": [{"text": "Anselm believed in the sufficiency of faith, while Aquinas emphasized the absolute necessity of reason.", "isCorrect": false, "rationale": "Both Anselm and Aquinas valued both faith and reason. Anselm's 'faith seeking understanding' acknowledges reason's role, and Aquinas's *Summa Theologica* is a massive rational undertaking. The difference is in *how* they applied reason to the question of God's existence."}, {"text": "Anselm started from a definition of God and reasoned to His existence *a priori*, whereas Aquinas started from observable effects in the world and reasoned back to a divine cause *a posteriori*.", "isCorrect": true, "rationale": "This accurately summarizes the core methodological difference highlighted in the text. Anselm's argument is conceptual ('from the concept of God alone'), while Aquinas insisted God's existence 'must be proved from the observable effects God has on the world' via *a posteriori* arguments like the Five Ways."}, {"text": "Anselm focused on God's benevolence, while Aquinas focused on God's omnipotence.", "isCorrect": false, "rationale": "While both philosophers discussed these attributes, the text focuses on their *methodologies* for proving existence, not specific divine characteristics as the basis of their arguments."}, {"text": "Anselm sought to prove God's existence primarily for believers, while Aquinas aimed his proofs solely at skeptics.", "isCorrect": false, "rationale": "Both philosophers engaged in sophisticated theological and philosophical discourse intended for a broad audience, including both believers seeking deeper understanding and those questioning God's existence. Their primary difference lies in their argumentative strategies, not their target audience."}]}, {"question": "Imagine a philosopher argues that because we can clearly define a 'perfect triangle' (e.g., three straight sides, angles sum to 180 degrees), such a perfect triangle must therefore exist as a physical entity in reality. Which philosopher from the text would most likely object to this reasoning based on their stated arguments?", "options": [{"text": "Anselm, because a perfect triangle, like Gaunilo's island, is a contingent thing and not 'that than which nothing greater can be conceived.'", "isCorrect": false, "rationale": "Anselm's objection to Gaunilo focused on the *incoherence* of a 'greatest island' due to its contingent, limited nature and lack of an upper limit on perfection for a physical object. A 'perfect triangle' is an abstract, conceptually coherent entity (its existence is typically understood within geometry, not as a perfect physical manifestation), so this objection doesn't align perfectly with Anselm's specific rebuttal to Gaunilo."}, {"text": "Gaunilo, because he would present a 'greatest conceivable square' as a counter-example to show the argument's absurdity.", "isCorrect": false, "rationale": "Gaunilo's argument against Anselm focused on the physical existence of a 'perfect island,' not on abstract mathematical concepts. While similar in structure, Gaunilo's original point was specifically about how Anselm's logic would lead to absurd *physical* entities."}, {"text": "Aquinas, because he would argue that while a perfect triangle has an essence, its existence is distinct from its essence and is not guaranteed by its definition for anything other than God.", "isCorrect": true, "rationale": "Aquinas explicitly states: 'In everything except God, essence and existence are really distinct: what a thing is (its essence) and that it is (its existence) are two different things. A unicorn has a perfectly good essence... but lacks existence.' The ability to define a 'perfect triangle' (its essence) does not, for Aquinas, automatically mean it exists as a physical reality, because essence and existence are separate for created things. Only in God are they identical."}, {"text": "Kant, because his devastating critique of the ontological argument would apply to any attempt to derive existence from a concept.", "isCorrect": false, "rationale": "While Kant did offer a 'devastating critique' of the ontological argument, the provided text does not elaborate on his specific reasoning, making Aquinas's detailed arguments about essence and existence the most direct and relevant objection discussed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
