</head>

<div class="quiz-container">

        <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text describes René Descartes as the \"father of modern philosophy\" primarily because his 1641 publication, the Meditations, was instrumental in reshaping Western thought. Which of the following best encapsulates the primary areas of philosophical inquiry he aimed to fundamentally alter?", "options": [{"text": "Political structures, economic systems, and societal hierarchies.", "isCorrect": false, "rationale": "While philosophy can influence these, the text specifies Descartes' focus was on knowledge, God, and the self, not political or economic systems."}, {"text": "Conceptions of knowledge, the existence of God, and the understanding of the self.", "isCorrect": true, "rationale": "The overview explicitly states Descartes' Meditations would \"reshape how the Western world thinks about knowledge, God, and the self.\""}, {"text": "The nature of scientific experimentation, empirical observation, and logical positivism.", "isCorrect": false, "rationale": "While Descartes contributed to science, the Meditations specifically aimed to reshape understanding of knowledge (epistemology), God (theology), and the self (metaphysics/mind), which are broader than just scientific methodology or logical positivism."}, {"text": "Artistic expression, literary criticism, and moral virtues.", "isCorrect": false, "rationale": "These areas are outside the core philosophical themes highlighted in the text as Descartes' primary focus in the Meditations."}], "id": "q01"}, {"question": "Descartes chose to dedicate his Meditations to the Faculty of Sacred Theology at the Sorbonne primarily because he:", "options": [{"text": "Sought to challenge their theological doctrines with his new philosophical proofs.", "isCorrect": false, "rationale": "The text states his tone was \"carefully deferential\" and he presented his arguments as \"aids to\" theology, not challenges."}, {"text": "Believed their authority would protect his work from potential censorship and gain widespread acceptance.", "isCorrect": true, "rationale": "The dedicatory letter reveals Descartes' aim to place his project \"under the Church's authority and preempt censorship\" due to the Sorbonne's \"enormous authority to approve or condemn philosophical and scientific works.\""}, {"text": "Intended for the Meditations to be used exclusively as a textbook for theological students.", "isCorrect": false, "rationale": "While relevant to theology, his explicit goal was to prove God and the soul using natural reason to persuade 'infidels,' which implies a broader audience and impact than just a textbook."}, {"text": "Required their financial endorsement to publish his philosophical treatise.", "isCorrect": false, "rationale": "The text makes no mention of financial endorsement as a reason for the dedication."}], "id": "q02"}, {"question": "The condemnation of Galileo by the Inquisition in 1633 had a significant impact on Descartes, leading him to:", "options": [{"text": "Publish Le Monde immediately to show solidarity with Galileo's scientific views.", "isCorrect": false, "rationale": "Descartes actually 'quietly shelved' Le Monde, his treatise on physics, rather than publish it, precisely because of Galileo's condemnation."}, {"text": "Revise his Meditations to remove all references to heliocentrism.", "isCorrect": false, "rationale": "The Meditations focus on metaphysics (God, soul, knowledge) rather than cosmology, and it was Le Monde that defended a heliocentric view, which he shelved."}, {"text": "Shelve his own treatise on physics, Le Monde, which defended a heliocentric view.", "isCorrect": true, "rationale": "The text explicitly states: 'Galileo had been condemned by the Inquisition... and Descartes had quietly shelved his own treatise on physics, Le Monde, rather than publish it.'"}, {"text": "Shift his focus entirely from philosophy to mathematics, abandoning metaphysics.", "isCorrect": false, "rationale": "While a mathematician, the Meditations clearly show he continued to engage deeply with metaphysics, albeit with caution regarding its presentation."}], "id": "q03"}, {"question": "According to Descartes' dedicatory letter, why is it essential to demonstrate God's existence and the soul's distinction from the body using philosophical arguments based on natural reason, especially when addressing \"infidels\"?", "options": [{"text": "Because theological arguments are inherently weaker and less convincing than philosophical ones.", "isCorrect": false, "rationale": "Descartes states that faith is 'quite enough for us faithful ones,' implying theological arguments are sufficient for believers, but not for infidels."}, {"text": "To avoid the circular reasoning of using Holy Scriptures to prove God's existence and God's existence to prove the Scriptures' authority.", "isCorrect": true, "rationale": "Descartes explicitly states, 'we nevertheless could not place this argument before infidels, who might accuse us of reasoning in a circle,' referring to the argument that 'we must believe that there is a God, because we are so taught in the Holy Scriptures, and... that we must believe the Holy Scriptures because they come from God.'"}, {"text": "Because natural reason offers a faster and less arduous path to belief than religious faith.", "isCorrect": false, "rationale": "Descartes does not mention speed or ease; in fact, he later acknowledges his proofs are 'a little lengthy' and 'demand a mind wholly devoted.' The motivation is about persuasion, not efficiency."}, {"text": "To demonstrate that faith is unnecessary for anyone to achieve moral virtue or believe in an afterlife.", "isCorrect": false, "rationale": "He implies faith is sufficient for the 'faithful ones.' His concern is that 'infidels' cannot be persuaded of religion or moral virtue without rational proofs of God and the soul, not that faith is unnecessary for all."}], "id": "q04"}, {"question": "The text emphasizes the Sorbonne's \"enormous authority to approve or condemn philosophical and scientific works.\" What does this suggest about the institution's perceived role in the intellectual and religious landscape of Descartes' time?", "options": [{"text": "It was primarily an academic institution focused on promoting free philosophical inquiry without external constraints.", "isCorrect": false, "rationale": "The ability to 'condemn' works directly contradicts the idea of promoting free inquiry without external constraints."}, {"text": "It served as a powerful gatekeeper whose endorsement or disapproval could significantly impact the reception and safety of new ideas.", "isCorrect": true, "rationale": "The Sorbonne's 'enormous authority' and the explicit desire of Descartes to gain its protection and preempt censorship clearly indicate its role as a powerful arbiter of intellectual legitimacy and safety for new ideas."}, {"text": "Its influence was limited to theological matters, with little bearing on secular philosophy or science.", "isCorrect": false, "rationale": "The text explicitly states its authority extended to 'philosophical and scientific works' and 'human philosophy as well,' indicating a broad influence beyond solely theological matters."}, {"text": "Philosophers and scientists generally ignored its judgments, viewing them as outdated and irrelevant.", "isCorrect": false, "rationale": "Descartes' deferential tone and his plea for the Sorbonne's protection strongly imply that its judgments were taken very seriously by leading thinkers of the time."}], "id": "q05"}, {"question": "Descartes asserts that his metaphysical demonstrations are equal to or surpass geometrical proofs in certainty. However, he acknowledges a crucial difference that makes them harder for many to grasp. What is this primary challenge?", "options": [{"text": "Metaphysical proofs often involve complex mathematical calculations that most people lack the training to understand.", "isCorrect": false, "rationale": "The text does not mention mathematical calculations as the difficulty; rather, it refers to the abstract nature of the thought required."}, {"text": "Unlike geometrical proofs, metaphysical arguments are lengthy and require a mind completely detached from sensory prejudices and deeply devoted to contemplation.", "isCorrect": true, "rationale": "Descartes states his proofs are 'a little lengthy and dependent the one on the other, and principally because they demand a mind wholly free of prejudices, and one which can be easily detached from the affairs of the senses.'"}, {"text": "The truths presented in metaphysics are inherently counter-intuitive and defy logical reasoning, unlike geometry.", "isCorrect": false, "rationale": "Descartes claims his proofs are 'very evident and very certain demonstrations,' implying they are logical and do not defy reason, even if challenging to grasp."}, {"text": "Geometrical proofs are public and easily verifiable by anyone, whereas metaphysical proofs rely on private, subjective experience.", "isCorrect": false, "rationale": "Descartes aims for objective, 'veritable demonstrations' in metaphysics, comparable to geometry, not subjective experience. The difficulty is in the mental discipline required, not their subjectivity."}], "id": "q06"}, {"question": "According to the synopsis provided by Descartes, which sequence accurately represents the major philosophical movements through the six Meditations?", "options": [{"text": "Discovery of self, proofs of God, total doubt, recovery of external world, account of error.", "isCorrect": false, "rationale": "This sequence is incorrect; it does not follow the order presented in the synopsis."}, {"text": "Total doubt, discovery of the self, proofs of God's existence, an account of error, recovery of the external world.", "isCorrect": true, "rationale": "The synopsis states the progression is 'from total doubt (Meditation I) through the discovery of the self (Meditation II), through two proofs of God's existence (Meditations III and V), through an account of error (Meditation IV), and finally to the recovery of the external world (Meditation VI).'"}, {"text": "Recovery of external world, account of error, total doubt, proofs of God's existence, discovery of self.", "isCorrect": false, "rationale": "This sequence is incorrect and reverses the actual progression of the Meditations."}, {"text": "Proofs of God's existence, discovery of self, total doubt, account of error, recovery of external world.", "isCorrect": false, "rationale": "This sequence is incorrect; total doubt is the starting point, not preceded by God's existence or self-discovery."}], "id": "q07"}, {"question": "Descartes explicitly mentions the Lateran Council held under Leo X. How did this historical decree influence his philosophical project regarding the soul?", "options": [{"text": "It mandated that philosophers should cease all inquiry into the soul's nature and leave it to theologians.", "isCorrect": false, "rationale": "The Council did the opposite: it 'expressly ordains Christian philosophers to refute their arguments and to employ all their powers in making known the truth' regarding the soul."}, {"text": "It condemned the idea that the human soul perishes with the body and urged Christian philosophers to actively refute such arguments.", "isCorrect": true, "rationale": "Descartes states, 'inasmuch as the Lateran Council held under Leo X (in the eighth session) condemns these tenets, and as Leo expressly ordains Christian philosophers to refute their arguments... I have ventured in this treatise to undertake the same task.'"}, {"text": "It declared that the soul's existence could only be proven through empirical observation and scientific experiment.", "isCorrect": false, "rationale": "The text doesn't specify an empirical method; it emphasizes 'Christian philosophers to refute their arguments' which implies philosophical reasoning."}, {"text": "It affirmed that faith alone was sufficient to believe in the soul's immortality, making philosophical proofs unnecessary.", "isCorrect": false, "rationale": "While faith is sufficient for the faithful, the Council's decree to 'refute their arguments' implies a need for philosophical engagement to counter opposing views."}], "id": "q08"}, {"question": "Despite his strong conviction in the certainty of his philosophical proofs, Descartes adopts a \"carefully deferential\" tone in his dedicatory letter to the Sorbonne. This approach suggests that he:", "options": [{"text": "Lacked full confidence in his own arguments and sought external validation as a primary goal.", "isCorrect": false, "rationale": "He explicitly expresses confidence in his proofs, calling them 'very evident and very certain demonstrations' that 'surpass in certainty and evidence, the demonstrations of Geometry.'"}, {"text": "Strategically presented his philosophy as a supportive tool for theological aims, thereby seeking to gain protection and legitimacy.", "isCorrect": true, "rationale": "The text explains he presented his arguments 'not as challenges to theology but as aids to it, philosophical proofs that could strengthen the Church's case against unbelievers,' and hoped to 'place his philosophical project under the Church's authority and preempt censorship.'"}, {"text": "Believed philosophical inquiry should always subordinate itself to religious authority without independent claims to truth.", "isCorrect": false, "rationale": "While deferential, he sought validation and protection for his *philosophical* proofs, which he believed were valid through natural reason, not necessarily to subordinate truth itself, but its reception."}, {"text": "Was primarily interested in flattering the Sorbonne theologians to gain personal favors and academic recognition.", "isCorrect": false, "rationale": "His stated aims are about the widespread acceptance of truth concerning God and the soul, and avoiding censorship, which are broader and more profound than mere personal favors."}], "id": "q09"}, {"question": "Descartes states that if the Sorbonne grants its \"approbation and... public testimony to their truth and certainty\" for his proofs of God and the soul, what does he confidently predict will be the result?", "options": [{"text": "The proofs will immediately become universally understood and accepted by everyone, regardless of their background.", "isCorrect": false, "rationale": "He himself states that 'I cannot persuade myself that all the world is capable of understanding them' due to their demanding nature."}, {"text": "All existing errors and false opinions regarding God and the soul will be effaced, and atheists will be significantly influenced by the Sorbonne's authority.", "isCorrect": true, "rationale": "Descartes predicts that 'all the errors and false opinions which have ever existed regarding these two questions will soon be effaced from the minds of men' and that the Sorbonne's 'authority will cause the atheists... [to be influenced].'"}, {"text": "He will receive a prestigious academic position and financial support from the Faculty of Sacred Theology.", "isCorrect": false, "rationale": "The text focuses on the impact of his ideas and the Sorbonne's authority on widespread belief, not on Descartes' personal career or financial benefits."}, {"text": "His method will be universally adopted as the standard for all scientific and philosophical inquiry.", "isCorrect": false, "rationale": "While he values his method, his specific prediction is about the eradication of errors concerning God and the soul, not the universal adoption of his method for all areas of knowledge."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
