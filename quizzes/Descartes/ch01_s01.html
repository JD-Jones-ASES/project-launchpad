<script>
var QUESTIONS = [{"question": "Which of the following aspects of Descartes' early life most directly contributed to his distinctive working habits as a philosopher?", "options": [{"text": "His father's background as a lawyer and minor nobleman, which emphasized meticulous legal reasoning.", "isCorrect": false, "rationale": "While Descartes' father was a lawyer, the text does not link this directly to Descartes' personal working habits. His unique working habits stemmed from his health."}, {"text": "His comfortable bourgeois upbringing, which allowed him the financial freedom to pursue intellectual endeavors without the need for traditional employment.", "isCorrect": false, "rationale": "His upbringing provided comfort, but the text explicitly attributes his 'lifelong habit of thinking in bed until late in the morning' to his 'sickly constitution,' not financial freedom."}, {"text": "His delicate health as a child, which granted him the privilege of sleeping late and fostered a lifelong habit of morning reflection.", "isCorrect": true, "rationale": "The text states his 'sickly constitution left him prone to illness and gave him a lifelong habit of thinking in bed until late in the morning.' He was 'allowed to sleep late in the mornings on account of his delicate health, a privilege he would guard for the rest of his life.'"}, {"text": "Being raised by his maternal grandmother, who encouraged independent thought and a solitary lifestyle.", "isCorrect": false, "rationale": "The text mentions he was raised by his maternal grandmother after his mother's death, but does not attribute his habits directly to her influence."}], "id": "q01"}, {"question": "Descartes' time at the Jesuit college of La Flèche was formative. What was his primary takeaway regarding the nature of knowledge?", "options": [{"text": "A deep appreciation for the certainty provided by scholastic theology.", "isCorrect": false, "rationale": "Theology offered certainty, but it rested on faith rather than demonstration, which did not satisfy Descartes' need for demonstrable knowledge."}, {"text": "A profound dissatisfaction with conflicting opinions and lack of genuine certainty in various fields, except mathematics.", "isCorrect": true, "rationale": "The text states Descartes 'left La Flèche deeply unsatisfied' because 'Different masters disagreed; the ancient philosophers disagreed with one another.' Mathematics was 'the one subject that seemed to offer genuine certainty.'"}, {"text": "The conviction that Aristotelian natural philosophy provided the most reliable framework for understanding the world.", "isCorrect": false, "rationale": "His overall dissatisfaction suggests he did not find Aristotelianism uniquely reliable. His later work moved decisively away from it."}, {"text": "An understanding that Latin and Greek were the fundamental languages for all scientific and philosophical inquiry.", "isCorrect": false, "rationale": "He was taught Latin and Greek, but the text focuses on his intellectual dissatisfaction rather than the languages themselves as the key takeaway."}], "id": "q02"}, {"question": "After graduating from law school, Descartes chose not to practice law and instead enlisted in the army of Maurice of Nassau. What was his true motivation for this choice?", "options": [{"text": "A desire for military glory and to establish himself as a respected commander.", "isCorrect": false, "rationale": "The text clarifies that he joined 'not for combat but for the travel and leisure it afforded a gentleman-volunteer,' not for military glory."}, {"text": "A practical need for financial stability after rejecting a legal career.", "isCorrect": false, "rationale": "The text frames his enlistment as a move that 'would puzzle his family,' suggesting it was not primarily about financial necessity."}, {"text": "An interest in experiencing new places and intellectually stimulating environments outside formal academic life.", "isCorrect": true, "rationale": "The text states he joined for 'travel and leisure' and notes the Netherlands was a 'center of both military and scientific activity,' implying a search for experiences and intellectual stimulation."}, {"text": "A commitment to political service and contributing to European stability during turbulent times.", "isCorrect": false, "rationale": "The text explicitly states he joined 'not for combat,' and there is no mention of political commitment as his motivation."}], "id": "q03"}, {"question": "The encounter between Descartes and Isaac Beeckman was pivotal. How did Beeckman shape Descartes' intellectual trajectory?", "options": [{"text": "Beeckman introduced Descartes to the writings of ancient Greek mathematicians that formed the basis of his geometrical studies.", "isCorrect": false, "rationale": "The text states Beeckman 'introduced Descartes to the idea of combining mathematics and physics' rather than pointing him to ancient texts."}, {"text": "Beeckman encouraged Descartes to shift from philosophy to pure scientific observation and experimentation.", "isCorrect": false, "rationale": "Beeckman encouraged mathematical derivation from first principles, not purely observational science."}, {"text": "Beeckman challenged Descartes to apply mathematical principles to describe and derive phenomena in the natural world, igniting his pursuit of mathematical physics.", "isCorrect": true, "rationale": "The text clearly states Beeckman 'challenged Descartes to think mathematically about the natural world — not just to describe phenomena but to derive them from first principles. The encounter lit a fire.'"}, {"text": "Beeckman introduced Descartes to a secret society of scientists, providing him access to cutting-edge research.", "isCorrect": false, "rationale": "The text mentions Beeckman kept a detailed journal of their conversations and remained a correspondent, but there is no mention of any secret society."}], "id": "q04"}, {"question": "Descartes' 'Night of the Three Dreams' in 1619 is described as 'the most important night of his life.' What fundamental project emerged from this experience?", "options": [{"text": "The resolution to travel extensively throughout Europe, gathering knowledge from diverse cultures.", "isCorrect": false, "rationale": "While he did travel further, the dreams themselves were about a philosophical method, not about travel as a primary goal."}, {"text": "A divine call to dedicate himself to military service and reform the methods of warfare.", "isCorrect": false, "rationale": "He was in the army, but the dreams were interpreted as a call to unite sciences through mathematics and reason, not to reform military methods."}, {"text": "The inspiration to develop a new method for unifying all sciences through mathematics and reason.", "isCorrect": true, "rationale": "The text states he 'had a series of three vivid dreams, which he interpreted as a divine call to discover a new method of uniting all the sciences through mathematics and reason.' He spent the rest of his life on this project."}, {"text": "A commitment to refute scholastic theology and establish a purely empirical understanding of God.", "isCorrect": false, "rationale": "The dreams focused on 'a new method of uniting all the sciences,' not specifically on refuting theology."}], "id": "q05"}, {"question": "After his 'Wandering Years,' Descartes settled in the Netherlands. What was his primary reason for choosing this residence?", "options": [{"text": "The vibrant intellectual community and the opportunity to collaborate with leading scientists.", "isCorrect": false, "rationale": "Descartes valued 'anonymity' and worked 'in seclusion,' suggesting collaboration was not his main driver for settling there."}, {"text": "The political stability and patronage offered by the Dutch Republic's government.", "isCorrect": false, "rationale": "The text does not mention political patronage; it highlights his personal preference for seclusion and anonymity."}, {"text": "The anonymity it provided, allowing him to work in seclusion and avoid distractions.", "isCorrect": true, "rationale": "The text explicitly states: 'The Dutch Republic offered something he prized above all else: anonymity. He moved house frequently, told few people where he lived, and worked in seclusion for over twenty years.'"}, {"text": "The milder climate and better health facilities compared to other European countries.", "isCorrect": false, "rationale": "The text does not mention climate or health facilities as reasons for his move. In fact, he later struggled with the cold climate of Stockholm."}], "id": "q06"}, {"question": "Descartes published two foundational philosophical works during his time in the Netherlands. Which pair of works are mentioned as central to his philosophical project?", "options": [{"text": "The Discourse on the Method and the Optics.", "isCorrect": false, "rationale": "The Discourse on the Method is correct, but the Optics was one of the scientific essays published with it, not a standalone foundational philosophical work in the same category as the Meditations."}, {"text": "The Meteorology and the Geometry.", "isCorrect": false, "rationale": "These were scientific essays published alongside the Discourse, not his primary philosophical works."}, {"text": "The Meditations on First Philosophy and the Objections and Replies.", "isCorrect": false, "rationale": "The Meditations on First Philosophy is correct, but Objections and Replies was a companion volume of critiques and responses, not a separate foundational work Descartes authored."}, {"text": "The Discourse on the Method and the Meditations on First Philosophy.", "isCorrect": true, "rationale": "The text states: 'In 1637 he published the Discourse on the Method... In 1641 came the Meditations on First Philosophy, the work you are about to read.' These are presented as his key philosophical works."}], "id": "q07"}, {"question": "The 'Objections and Replies' accompanying the Meditations reveals what about Descartes as a thinker?", "options": [{"text": "His primary goal was public debate and defending his ideas against all critics.", "isCorrect": false, "rationale": "While he did engage in debate, his initial desire was actually anonymity. The exchange reveals his confidence alongside awareness of his project's radical nature."}, {"text": "He sought to demonstrate the absolute agreement of his new philosophy with traditional scholastic views.", "isCorrect": false, "rationale": "The text implies the opposite: the exchange 'reveals a thinker who was confident of his ground but acutely aware of how radical his project was,' signaling departure from tradition."}, {"text": "It showcased his confidence in his foundational arguments while acknowledging the radical nature of his new approach.", "isCorrect": true, "rationale": "The text states: 'The exchange reveals a thinker who was confident of his ground but acutely aware of how radical his project was.' This directly matches."}, {"text": "It proved that his philosophical method was universally accepted by leading scholars of his time.", "isCorrect": false, "rationale": "The existence of 'objections' from leading philosophers and theologians contradicts universal acceptance; significant intellectual challenge was evident."}], "id": "q08"}, {"question": "Descartes' death in Stockholm is described as a 'catastrophic decision.' Which specific factors contributed most directly to his death?", "options": [{"text": "The rigorous intellectual demands of tutoring Queen Christina, which exceeded his mental capacity.", "isCorrect": false, "rationale": "The text does not suggest mental exhaustion; his death is attributed to physical conditions — the cold and early hours clashing with his habitual lifestyle."}, {"text": "A political conspiracy orchestrated by jealous court philosophers who opposed his radical ideas.", "isCorrect": false, "rationale": "There is no mention of any conspiracy in the text; his death is attributed to illness caused by environmental exposure."}, {"text": "His lifelong habit of sleeping late and working in warm environments clashing with early morning lessons in brutal Stockholm winter.", "isCorrect": true, "rationale": "The text states: 'Christina demanded her lessons at five o'clock in the morning. Stockholm in winter was brutally cold. A man who had spent four decades sleeping late and working in warm rooms was poorly suited to it. Descartes contracted pneumonia and died.'"}, {"text": "Exposure to a new infectious disease prevalent in Scandinavia to which he had no immunity.", "isCorrect": false, "rationale": "The text explicitly states he contracted pneumonia, linked directly to the harsh conditions and his unsuitable habits, not an exotic new disease."}], "id": "q09"}, {"question": "Based on the 'personbox' summary, what are the two primary philosophical contributions for which Descartes is recognized?", "options": [{"text": "His detailed studies in optics and meteorology.", "isCorrect": false, "rationale": "While he published scientific essays on these topics, the personbox highlights 'foundations of modern epistemology and the mind-body problem' as his core philosophical contributions."}, {"text": "The development of modern epistemology and the articulation of the mind-body problem.", "isCorrect": true, "rationale": "The personbox states his works 'established the foundations of modern epistemology and the mind-body problem.' This directly matches."}, {"text": "His military strategies during service with Maurice of Nassau and his legal reforms.", "isCorrect": false, "rationale": "These are biographical details, not his primary philosophical contributions. He never practiced law and his military role was for travel and leisure."}, {"text": "His role as court philosopher for Queen Christina and his advocacy for an empirical approach to theology.", "isCorrect": false, "rationale": "His court role was at the very end of his life and led to his death, not a primary philosophical contribution. He sought demonstrable certainty, not empirical theology."}], "id": "q10"}, {"question": "Descartes was born in La Haye, a small town in the Touraine region of France, which was later renamed in his honor. What does this fact most directly illustrate?", "options": [{"text": "That Descartes was celebrated during his own lifetime with official government recognition.", "isCorrect": false, "rationale": "The town was renamed after his death. The renaming reflects lasting posthumous cultural significance, not necessarily recognition during his own lifetime."}, {"text": "That his birthplace region was already known as an intellectual hub before his birth.", "isCorrect": false, "rationale": "The text does not characterize Touraine as a pre-existing intellectual hub; Descartes' own fame is what brought the town recognition."}, {"text": "The lasting cultural impact of his intellectual legacy on French national identity.", "isCorrect": true, "rationale": "A town being renamed after a philosopher reflects deep, enduring cultural honor. This illustrates how Descartes became synonymous with French philosophical identity — unusual recognition for any intellectual figure."}, {"text": "That his family was of such high nobility that the region was named as a hereditary estate.", "isCorrect": false, "rationale": "His family was 'minor nobility,' not high aristocracy. The town renaming was a posthumous honor recognizing his philosophical fame, not a hereditary estate designation."}], "id": "q11"}, {"question": "The Discourse on the Method (1637) was accompanied by three scientific essays. What does the publication of these essays alongside the Discourse suggest about Descartes' broader intellectual ambitions?", "options": [{"text": "He wanted to prove that philosophy was inferior to the natural sciences in producing genuine knowledge.", "isCorrect": false, "rationale": "Descartes saw mathematics and proper method as the foundation of all knowledge including philosophy. The essays were demonstrations of method, not proofs of philosophy's inferiority."}, {"text": "He intended to show that his new philosophical method could generate concrete scientific results across multiple disciplines.", "isCorrect": true, "rationale": "The Discourse presented his method, and the three essays on Optics, Meteorology, and Geometry were demonstrations that this method could produce real scientific knowledge — showing method and science as unified under reason."}, {"text": "He was primarily a scientist who included philosophical reflections only to satisfy church censors.", "isCorrect": false, "rationale": "Descartes' philosophical project was central to his ambitions, not a concession to censors. His fear of censorship shaped presentation, not the fundamental nature of his project."}, {"text": "He sought to replace theology entirely with a science-based worldview.", "isCorrect": false, "rationale": "Descartes was a practicing Catholic and sought to demonstrate that his philosophy was compatible with, not a replacement for, Christian theology."}], "id": "q12"}, {"question": "Descartes suppressed the publication of Le Monde (The World) after learning about Galileo's condemnation by the Inquisition in 1633. What does this decision reveal about the intellectual climate of his era?", "options": [{"text": "That Descartes personally rejected Galileo's heliocentric model and chose not to publish an endorsement.", "isCorrect": false, "rationale": "Descartes suppressed the work specifically because he feared the same fate as Galileo — he did accept Copernicanism, which is why Galileo's condemnation alarmed him."}, {"text": "That the Catholic Church exercised significant control over scientific publication, creating genuine personal risk for heterodox thinkers.", "isCorrect": true, "rationale": "The suppression of Le Monde illustrates that the Inquisition's condemnation of Galileo was not merely symbolic — it caused a major philosopher to self-censor for years, demonstrating real institutional power over intellectual life."}, {"text": "That scientific ideas could only be published safely in Protestant countries like the Dutch Republic.", "isCorrect": false, "rationale": "While the Dutch Republic offered more freedom, Descartes' suppression was about personal fear, not a general rule that all science required Protestant publication venues."}, {"text": "That Descartes lacked the courage to defend his scientific conclusions unlike Galileo.", "isCorrect": false, "rationale": "The text presents this as a pragmatic caution, not cowardice. Descartes continued his philosophical project while navigating the real dangers of censorship — he wrote the Meditations partly to build a safer framework for his views."}], "id": "q13"}, {"question": "Descartes inherited a modest fortune from his mother and later from his father. How does this biographical detail connect to his distinctive career as a philosopher?", "options": [{"text": "It forced him into the role of a gentleman-amateur, preventing him from attaining professional academic recognition.", "isCorrect": false, "rationale": "His independence from institutions was largely by choice and allowed him to pursue his project on his own terms. He gained wide professional recognition without a university position."}, {"text": "It allowed him to live and work independently without needing a university post, patron, or professional position.", "isCorrect": true, "rationale": "Financial independence from inherited wealth was what enabled Descartes to live 'in seclusion' in the Netherlands, move frequently, work without institutional demands, and pursue his philosophical project on his own schedule."}, {"text": "It created conflicts with his family who expected him to use the fortune for legal or civic duties.", "isCorrect": false, "rationale": "While his family puzzled at his choices (like joining the army instead of practicing law), the text does not frame the fortune itself as a source of family conflict."}, {"text": "It made him suspicious of the motives of other scholars who needed patronage to survive.", "isCorrect": false, "rationale": "The text does not support this inference. Descartes corresponded actively with scholars; his independence made him cautious about visibility, not suspicious of others."}], "id": "q14"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
