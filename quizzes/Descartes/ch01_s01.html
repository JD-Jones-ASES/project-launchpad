<script>
var QUESTIONS = [{"question": "Which of the following aspects of Descartes' early life most directly contributed to his distinctive working habits as a philosopher?", "options": [{"text": "His father's background as a lawyer and minor nobleman, which emphasized meticulous legal reasoning.", "isCorrect": false, "rationale": "While Descartes' father was a lawyer, the text does not link this directly to Descartes' personal working habits, but rather to a comfortable bourgeois household and civic life. His unique working habits stemmed from his health."}, {"text": "His comfortable bourgeois upbringing, which allowed him the financial freedom to pursue intellectual endeavors without the need for traditional employment.", "isCorrect": false, "rationale": "His bourgeois upbringing certainly provided comfort, but the text explicitly attributes his 'lifelong habit of thinking in bed until late in the morning' to his 'sickly constitution' and delicate health, not solely financial freedom."}, {"text": "His delicate health as a child, which granted him the privilege of sleeping late and fostered a lifelong habit of morning reflection.", "isCorrect": true, "rationale": "The text states that his 'sickly constitution that left him prone to illness and gave him a lifelong habit of thinking in bed until late in the morning.' It also mentions he was 'allowed to sleep late in the mornings on account of his delicate health, a privilege he would guard for the rest of his life.' This directly connects his health to his working habits."}, {"text": "Being raised by his maternal grandmother, who encouraged independent thought and a solitary lifestyle.", "isCorrect": false, "rationale": "The text mentions he was raised by his maternal grandmother after his mother's death, but it does not attribute his independent thought or solitary lifestyle directly to her influence."}], "id": "q01"}, {"question": "Descartes' time at the Jesuit college of La Flèche was formative. What was his primary takeaway from this prestigious education regarding the nature of knowledge?", "options": [{"text": "A deep appreciation for the certainty provided by scholastic theology.", "isCorrect": false, "rationale": "The text states that 'theology alone commanded certainty, but it rested on faith, not demonstration,' indicating that while it offered certainty, it didn't satisfy his need for demonstrable knowledge."}, {"text": "A profound dissatisfaction with the conflicting opinions and lack of genuine certainty in various fields, except mathematics.", "isCorrect": true, "rationale": "The text explicitly states Descartes 'left La Flèche deeply unsatisfied. He had been taught a great many opinions, but he could not tell which of them were true. Different masters disagreed; the ancient philosophers disagreed with one another.' It also notes mathematics was 'the one subject...that seemed to offer genuine certainty.'"}, {"text": "The conviction that traditional Aristotelian natural philosophy provided the most reliable framework for understanding the world.", "isCorrect": false, "rationale": "While he was taught Aristotelian natural philosophy, his overall dissatisfaction suggests he did not find it uniquely reliable. His later work moved away from Aristotelianism."}, {"text": "An understanding that Latin and Greek were the fundamental languages for all scientific and philosophical inquiry.", "isCorrect": false, "rationale": "He was taught Latin and Greek, but the text focuses on his intellectual dissatisfaction rather than the languages themselves being the primary takeaway regarding the nature of knowledge."}], "id": "q02"}, {"question": "After graduating from law school, Descartes chose not to practice law. His subsequent enlistment in the army of Maurice of Nassau can be interpreted as indicative of his pursuit of what?", "options": [{"text": "A desire for military glory and to establish himself as a respected commander.", "isCorrect": false, "rationale": "The text clarifies that he joined the army 'not for combat but for the travel and leisure it afforded a gentleman-volunteer,' indicating his primary motivation was not military glory."}, {"text": "A practical need for employment that provided financial stability after rejecting a legal career.", "isCorrect": false, "rationale": "The text frames his enlistment as a 'move that would puzzle his family' and states he joined 'not for combat but for the travel and leisure it afforded a gentleman-volunteer,' suggesting it wasn't purely for financial stability in a traditional sense."}, {"text": "An interest in experiencing new places and intellectually stimulating environments outside of formal academic or professional life.", "isCorrect": true, "rationale": "The text states he joined for 'travel and leisure' and notes the Netherlands was a 'center of both military and scientific activity,' implying a search for experiences and intellectual stimulation rather than a career path."}, {"text": "A commitment to political service and contributing to the stability of European powers during a turbulent era.", "isCorrect": false, "rationale": "The text explicitly states he joined 'not for combat,' and there is no mention of political commitment as his motivation for military service."}], "id": "q03"}, {"question": "The encounter between Descartes and Isaac Beeckman was pivotal. How did Beeckman's influence shape Descartes' intellectual trajectory?", "options": [{"text": "Beeckman introduced Descartes to the writings of ancient Greek mathematicians, which formed the basis of his geometrical studies.", "isCorrect": false, "rationale": "While Descartes excelled in mathematics, the text states Beeckman 'introduced Descartes to the idea of combining mathematics and physics' and challenged him 'to think mathematically about the natural world,' not just to ancient Greek mathematicians."}, {"text": "Beeckman encouraged Descartes to shift his focus from philosophy to pure scientific observation and experimentation.", "isCorrect": false, "rationale": "Beeckman encouraged him to 'think mathematically about the natural world' and 'derive them from first principles,' which is more about a mathematical physics approach rather than solely abandoning philosophy for observation."}, {"text": "Beeckman challenged Descartes to apply mathematical principles to describe and derive phenomena in the natural world, igniting his pursuit of mathematical physics.", "isCorrect": true, "rationale": "The text clearly states Beeckman 'challenged Descartes to think mathematically about the natural world — not just to describe phenomena but to derive them from first principles. The encounter lit a fire.'"}, {"text": "Beeckman introduced Descartes to a secret society of scientists, providing him with access to cutting-edge research.", "isCorrect": false, "rationale": "The text mentions Beeckman kept a detailed journal of their conversations and remained a correspondent, but there is no mention of a 'secret society.'"}], "id": "q04"}, {"question": "Descartes' 'Night of the Three Dreams' in 1619 is described as 'the most important of his life.' What fundamental project emerged from this experience?", "options": [{"text": "The resolution to travel extensively throughout Europe, gathering knowledge from diverse cultures.", "isCorrect": false, "rationale": "While he did travel further, the dreams themselves were not about travel as a primary goal, but about a philosophical method."}, {"text": "The divine call to dedicate himself to military service and reform the methods of warfare.", "isCorrect": false, "rationale": "He was in the army, but the dreams were interpreted as a call to unite sciences, not reform military methods."}, {"text": "The inspiration to develop a new method for unifying all sciences through mathematics and reason.", "isCorrect": true, "rationale": "The text states he 'had a series of three vivid dreams, which he interpreted as a divine call to discover a new method of uniting all the sciences through mathematics and reason.' He then spent the rest of his life working on this method."}, {"text": "A commitment to refute scholastic theology and establish a purely empirical understanding of God.", "isCorrect": false, "rationale": "His dissatisfaction with scholasticism was already present, but the dreams focused on a 'new method of uniting all the sciences,' not specifically refuting theology or establishing an empirical understanding of God."}], "id": "q05"}, {"question": "After his 'Wandering Years,' Descartes settled in the Netherlands. What was the primary reason for his choice of residence?", "options": [{"text": "The vibrant intellectual community and the opportunity to collaborate with leading scientists.", "isCorrect": false, "rationale": "While the Netherlands was a scientific center, Descartes' primary stated reason was different. He valued 'anonymity' and worked 'in seclusion,' suggesting collaboration was not his main driver for settling there."}, {"text": "The political stability and patronage offered by the Dutch Republic's government.", "isCorrect": false, "rationale": "The text does not mention political patronage as his reason; rather, it highlights personal preference for seclusion."}, {"text": "The anonymity it provided, allowing him to work in seclusion and avoid distractions.", "isCorrect": true, "rationale": "The text explicitly states: 'The Dutch Republic offered something he prized above all else: anonymity. He moved house frequently, told few people where he lived, and worked in seclusion for over twenty years.'"}, {"text": "The milder climate and better health facilities compared to other European countries.", "isCorrect": false, "rationale": "The text does not mention climate or health facilities as reasons for his move to the Netherlands. In fact, he later struggled with the cold climate of Stockholm."}], "id": "q06"}, {"question": "Descartes published two foundational philosophical works during his time in the Netherlands. Which pair of works are mentioned as central to his philosophical project?", "options": [{"text": "The Discourse on the Method and the Optics.", "isCorrect": false, "rationale": "The Discourse on the Method is correct, but the Optics was one of the scientific essays published with it, not a standalone foundational philosophical work in the same vein as Meditations."}, {"text": "The Meteorology and the Geometry.", "isCorrect": false, "rationale": "These were scientific essays published alongside the Discourse, not his primary philosophical works."}, {"text": "The Meditations on First Philosophy and the Objections and Replies.", "isCorrect": false, "rationale": "The Meditations on First Philosophy is correct, but Objections and Replies was a companion volume, consisting of critiques and his responses, rather than a separate foundational work he authored in the same way."}, {"text": "The Discourse on the Method and the Meditations on First Philosophy.", "isCorrect": true, "rationale": "The text states: 'In 1637 he published the Discourse on the Method... In 1641 came the Meditations on First Philosophy, the work you are about to read.' These are presented as his key philosophical works."}], "id": "q07"}, {"question": "The 'Objections and Replies' accompanying Descartes' Meditations reveals what about his philosophical project?", "options": [{"text": "His primary goal was to engage in public debate and defend his ideas against all critics.", "isCorrect": false, "rationale": "While he did engage in debate, the text emphasizes what the exchange 'reveals' about him as a thinker, not his 'primary goal' for the publication. His initial desire was anonymity."}, {"text": "He sought to demonstrate the absolute agreement of his new philosophy with traditional scholastic and theological views.", "isCorrect": false, "rationale": "The text implies the opposite, stating the exchange 'reveals a thinker who was confident of his ground but acutely aware of how radical his project was,' suggesting a departure from, rather than agreement with, traditional views."}, {"text": "It showcased his confidence in his foundational arguments while acknowledging the radical nature of his new approach.", "isCorrect": true, "rationale": "The text states: 'The exchange reveals a thinker who was confident of his ground but acutely aware of how radical his project was.' This option directly reflects that insight."}, {"text": "It proved that his philosophical method was universally accepted by leading scholars of his time.", "isCorrect": false, "rationale": "The existence of 'objections' from 'leading philosophers and theologians' contradicts the idea of universal acceptance; rather, it indicates significant intellectual challenge."}], "id": "q08"}, {"question": "Descartes' death in Stockholm was a 'catastrophic decision' largely due to the clash between his established lifestyle and the demands of Queen Christina. Which specific factors contributed most to his demise?", "options": [{"text": "The rigorous intellectual demands of tutoring Queen Christina, which exceeded his mental capacity.", "isCorrect": false, "rationale": "The text does not suggest his mental capacity was challenged, but rather the physical conditions and timing of the lessons. He was at the height of his fame."}, {"text": "A political conspiracy orchestrated by jealous court philosophers who opposed his radical ideas.", "isCorrect": false, "rationale": "There is no mention of a political conspiracy in the text; his death is attributed to illness and the cold."}, {"text": "His lifelong habit of sleeping late and working in warm environments clashing with early morning lessons in brutal Stockholm winter.", "isCorrect": true, "rationale": "The text states: 'Christina demanded her lessons at five o'clock in the morning. Stockholm in winter was brutally cold. A man who had spent four decades sleeping late and working in warm rooms was poorly suited to it. Descartes contracted pneumonia and died...' This is a direct cause-and-effect described."}, {"text": "Exposure to a new infectious disease prevalent in Scandinavia at the time, to which he had no immunity.", "isCorrect": false, "rationale": "The text explicitly states he 'contracted pneumonia,' which, while an infection, is directly linked to the harsh environmental conditions and his unsuitable habits, not a new, unidentifiable disease."}], "id": "q09"}, {"question": "Based on the provided 'personbox' summary, what are the two primary philosophical contributions for which Renè Descartes is recognized?", "options": [{"text": "His detailed studies in optics and meteorology.", "isCorrect": false, "rationale": "While he published essays on these topics, the personbox highlights 'foundations of modern epistemology and the mind-body problem' as his core philosophical contributions, not his scientific studies alone."}, {"text": "The development of modern epistemology and the articulation of the mind-body problem.", "isCorrect": true, "rationale": "The personbox states his works 'established the foundations of modern epistemology and the mind-body problem.' This directly matches the information provided."}, {"text": "His military strategies employed during his service with Maurice of Nassau and his legal reforms.", "isCorrect": false, "rationale": "The text notes his military service and legal studies, but these are not highlighted as his primary philosophical contributions. He never practiced law, and his military role was for travel and leisure."}, {"text": "His role as a court philosopher for Queen Christina and his advocacy for an empirical approach to theology.", "isCorrect": false, "rationale": "His role as court philosopher was at the very end of his life and led to his death, not a primary philosophical contribution. He did not advocate for an 'empirical approach to theology' but rather sought demonstrable certainty beyond faith."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
