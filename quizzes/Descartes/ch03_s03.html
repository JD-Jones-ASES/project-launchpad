        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>

        <h1>QUIZ</h1>
        <div class="subtitle">First Philosophy (Descartes) &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "At the beginning of Meditation II, after experiencing radical doubt, what is Descartes' primary objective?", "options": [{"text": "To prove the existence of God as a benevolent creator.", "isCorrect": false, "rationale": "Proving God's existence is a later goal in the Meditations. Descartes' immediate objective at the start of Meditation II is to find something certain amidst the pervasive doubt."}, {"text": "To establish one fixed, indubitable point from which to rebuild all knowledge.", "isCorrect": true, "rationale": "Descartes explicitly states he seeks 'one fixed point — an Archimedean point of certainty from which to rebuild all knowledge,' indicating this as his primary objective."}, {"text": "To systematically catalog all his former beliefs before disproving them.", "isCorrect": false, "rationale": "Descartes' method involves setting aside anything with 'the least doubt' as if false, not merely cataloging beliefs. The goal is certainty, not inventory."}, {"text": "To demonstrate the ultimate unreliability of all sensory experience.", "isCorrect": false, "rationale": "The unreliability of sensory experience was established in Meditation I. In Meditation II, Descartes moves beyond this to seek any certainty, even if it doesn't involve the senses."}], "id": "q01"}, {"question": "What is the first proposition Descartes concludes to be 'necessarily true each time that I pronounce it, or that I mentally conceive it'?", "options": [{"text": "God is supremely good and exists, and is not a deceiver.", "isCorrect": false, "rationale": "The existence and nature of God are subjects of later meditations; this conclusion is not the first certainty reached in Meditation II."}, {"text": "The external world, though perceived by the senses, must ultimately be real.", "isCorrect": false, "rationale": "The existence of the external world is still subject to radical doubt at this point; it is not the first certainty."}, {"text": "I am, I exist.", "isCorrect": true, "rationale": "This is Descartes' famous $cogito$ — the first indubitable truth he discovers. Even if a powerful deceiver is at work, he must exist in order to be deceived or to think."}, {"text": "My memory is fallacious and therefore cannot be trusted.", "isCorrect": false, "rationale": "The fallibility of memory is a premise for his doubt, not the ultimate certainty he seeks. It contributes to the crisis, not its resolution."}], "id": "q02"}, {"question": "Descartes uses the hypothesis of a 'very powerful and very cunning deceiver' primarily to demonstrate what crucial point about his own existence?", "options": [{"text": "That God, as a perfect being, cannot be the source of such deception.", "isCorrect": false, "rationale": "While he does address God's nature later, the deceiver hypothesis is introduced to extend doubt to its most extreme form, not to make claims about God's benevolence at this stage."}, {"text": "That all sensory perceptions are inherently false and misleading.", "isCorrect": false, "rationale": "The deceiver certainly undermines sensory perception, but its primary function in the context of 'I exist' is to highlight that even if everything else is false, the act of thinking implies an existing subject."}, {"text": "That even if he is being deceived about everything else, he must exist in order to be deceived.", "isCorrect": true, "rationale": "This is the core insight of the $cogito$. The deceiver's power, no matter how great, cannot make 'me' (the thinking subject) into nothing, as long as 'I think that I am something.'"}, {"text": "That human reason is fundamentally flawed and incapable of reaching truth.", "isCorrect": false, "rationale": "The deceiver is used to test the limits of doubt, but the discovery of 'I exist' through reason ultimately affirms the power of rational thought in at least this context."}], "id": "q03"}, {"question": "When Descartes rejects his former belief that he is a 'man' (a reasonable animal), what is his stated reason?", "options": [{"text": "He determines that animals are incapable of true reasoning.", "isCorrect": false, "rationale": "Descartes does not specifically argue about the reasoning capacity of animals here. His concern is with the definition's practicality for his current philosophical task."}, {"text": "Such a definition would lead to an infinite regress of further, more difficult questions, wasting his limited time.", "isCorrect": true, "rationale": "Descartes explicitly states: 'for then I should have to inquire what an animal is, and what is reasonable; and thus from a single question I should insensibly fall into an infinitude of others more difficult; and I should not wish to waste the little time and leisure remaining to me in trying to unravel subtleties like these.'"}, {"text": "He has already proven that the body, a key component of 'animal,' does not exist.", "isCorrect": false, "rationale": "At this point, the body is doubted but not definitively disproven. His objection is practical and methodological, not a completed proof."}, {"text": "He finds that the concept of 'reason' is itself subject to doubt under the malicious deceiver hypothesis.", "isCorrect": false, "rationale": "While the deceiver is active, Descartes is confident in the act of thinking itself. His concern is the complexity of defining 'man' as a 'reasonable animal,' not doubting reason itself."}], "id": "q04"}, {"question": "Descartes concludes that attributes like nutrition, walking, and sensation cannot be affirmed as belonging to 'himself' under radical doubt. Why does he exclude these while retaining 'thinking'?", "options": [{"text": "Bodily attributes are inherently less reliable than mental ones and more prone to illusion.", "isCorrect": false, "rationale": "While illusions are a factor, the primary reason for excluding bodily attributes is their necessary dependence on a physical body, which is precisely what is currently doubted."}, {"text": "These attributes require the existence of a body, which is currently subject to doubt, whereas thinking does not.", "isCorrect": true, "rationale": "Descartes states: 'if it is so that I have no body it is also true that I can neither walk nor take nourishment,' and 'one cannot feel without body.' Thinking, however, persists even if the body is doubted."}, {"text": "He has explicitly proven that his body is an illusion created by the deceiver, making such attributes impossible.", "isCorrect": false, "rationale": "Descartes has not proven the body is an illusion, but rather that its existence can be doubted. The distinction is crucial for his method."}, {"text": "Such attributes are too vague and ill-defined to contribute to certain knowledge of the self.", "isCorrect": false, "rationale": "His concern isn't vagueness but the dependence of these attributes on a doubted entity (the body)."}], "id": "q05"}, {"question": "After systematically doubting all previous beliefs about himself, Descartes arrives at the conclusion that 'I' am primarily:", "options": [{"text": "A collection of physical members, albeit one whose reality is currently suspended.", "isCorrect": false, "rationale": "Descartes explicitly states: 'I am not a collection of members which we call the human body.' He denies this definition of himself."}, {"text": "A subtle air or spirit, like a wind or flame, distributed throughout the body.", "isCorrect": false, "rationale": "He considers this a former, imprecise imagination of the soul, which he now sets aside as potentially fictitious and corporeal in nature."}, {"text": "A thing which thinks.", "isCorrect": true, "rationale": "Descartes concludes: 'to speak accurately I am not more than a thing which thinks, that is to say a mind or a soul, or an understanding, or a reason.' This is his definitive answer to 'what am I' at this stage."}, {"text": "A being whose existence is only temporal and fleeting, depending on external conditions.", "isCorrect": false, "rationale": "He states his existence is certain when he thinks, implying its persistence with thought, not its dependence on external, fleeting conditions."}], "id": "q06"}, {"question": "Descartes advises against using imagination to understand 'what I am' because:", "options": [{"text": "Imagination is primarily suited for artistic creation, not rigorous philosophical inquiry.", "isCorrect": false, "rationale": "While possibly true broadly, this is not the specific philosophical reason Descartes gives for rejecting imagination as a tool for self-knowledge here."}, {"text": "Imagination inherently involves contemplating the figures or images of corporeal things, which are precisely what he is doubting.", "isCorrect": true, "rationale": "He explains: 'to imagine is nothing else than to contemplate the figure or image of a corporeal thing. But I already know for certain that I am, and that it may be that all these images... are nothing but dreams.' Therefore, imagination cannot lead to distinct knowledge of the non-corporeal self."}, {"text": "The malicious deceiver might manipulate his imagination to mislead him about his true nature.", "isCorrect": false, "rationale": "While the deceiver is a possibility, Descartes' argument against imagination here is based on its nature as tied to corporeal forms, not just the risk of deception."}, {"text": "Rational thought is always superior to imagination for all forms of knowledge.", "isCorrect": false, "rationale": "Descartes emphasizes recalling the mind from imagination to know its own nature — not a general condemnation of imagination's utility in all contexts, but its unsuitability for this specific task."}], "id": "q07"}, {"question": "How does Descartes reconcile 'feeling' (e.g., seeing light, hearing noise) as an attribute of the thinking self, despite doubting the existence of sensory organs and external objects?", "options": [{"text": "He asserts that these sensations are undeniable proof of an external world and functioning body.", "isCorrect": false, "rationale": "Descartes explicitly states: 'But it will be said that these phenomena are false and that I am dreaming. Let it be so...' — he still entertains doubt about external reality and the body."}, {"text": "He claims that the subjective experience of seeming to perceive these things is itself a form of thought and therefore undeniable.", "isCorrect": true, "rationale": "He concludes: 'still it is at least quite certain that it seems to me that I see light, that I hear noise and that I feel heat. That cannot be false; properly speaking it is what is in me called feeling; and used in this precise sense that is no other thing than thinking.' The inner act of feeling is a mode of thought."}, {"text": "He distinguishes between true, clear perceptions and deceptive, confused sensations.", "isCorrect": false, "rationale": "At this point, he groups all 'feelings' under the umbrella of 'it seems to me,' treating them as mental acts rather than differentiating their veridicality."}, {"text": "He argues that his senses, though doubted in their external connection, are still part of his true, essential nature.", "isCorrect": false, "rationale": "He argues that 'feeling' (in the precise sense of inner experience) is part of his nature because it is a mode of thinking, not because the physical senses are retained as essential."}], "id": "q08"}, {"question": "Which of the following is NOT listed as an attribute or activity of the 'thing which thinks' in Meditation II?", "options": [{"text": "Doubting and Understanding", "isCorrect": false, "rationale": "Descartes explicitly lists 'doubts, understands' as attributes of the thinking thing."}, {"text": "Willing and Refusing", "isCorrect": false, "rationale": "Descartes explicitly lists 'wills, refuses' as attributes of the thinking thing."}, {"text": "Nourishing and Walking", "isCorrect": true, "rationale": "These are attributes of the body. Descartes explicitly denies them as belonging to 'himself' because they depend on having a body, which is doubted. They are not attributes of the 'thing which thinks.'"}, {"text": "Imagining and Feeling", "isCorrect": false, "rationale": "Descartes explicitly lists 'imagines and feels' as attributes of the thinking thing, understanding these as mental acts even if their objects are illusory."}], "id": "q09"}, {"question": "According to Descartes, for how long can he be certain of his own existence?", "options": [{"text": "As long as his body and senses continue to function.", "isCorrect": false, "rationale": "Descartes explicitly denies his dependence on body and senses for his existence, stating he could exist without them as long as he thinks."}, {"text": "Only until the malicious deceiver ceases to employ his ingenuity.", "isCorrect": false, "rationale": "The existence of the deceiver actually strengthens the argument for his own existence, as he must exist to be deceived. His existence is not contingent on the deceiver's actions ceasing."}, {"text": "Just when I think; for if I ceased entirely to think, I should likewise cease altogether to exist.", "isCorrect": true, "rationale": "Descartes states: 'Just when I think; for it might possibly be the case if I ceased entirely to think, that I should likewise cease altogether to exist.' This emphasizes the direct link between thinking and his certain existence."}, {"text": "Indefinitely, as his existence is an eternal truth established by God.", "isCorrect": false, "rationale": "At this point, his certain existence is tied directly to the act of thinking, not an eternal guarantee independent of thought. God's role comes later."}], "id": "q10"}, {"question": "Descartes' formulation 'I am, I exist' differs from the famous Latin phrase $cogito ergo sum$ ('I think, therefore I am'). What is philosophically important about this difference?", "options": [{"text": "The Latin phrase was added by later editors to make the argument sound more academic.", "isCorrect": false, "rationale": "$Cogito ergo sum$ comes from Descartes' Discourse on the Method (1637), while the Meditations (1641) formulates it as 'I am, I exist.' Both are by Descartes. The difference is philosophical, not editorial."}, {"text": "The Meditations formulation avoids the appearance of a syllogistic inference, presenting the certainty as immediate intuition rather than deduced conclusion.", "isCorrect": true, "rationale": "The ergo ('therefore') in $cogito ergo sum$ suggests a logical step from thinking to existing — which could be criticized as hiding a syllogism. 'I am, I exist' is a direct assertion of intuited certainty, not an argued conclusion. The Meditations formulation is more philosophically careful."}, {"text": "The Meditations formulation is conditional — existence is certain only sometimes — while the Latin phrase asserts permanent existence.", "isCorrect": false, "rationale": "It is the Meditations that introduces the temporal condition ('necessarily true each time that I pronounce it'). The Latin phrase does not address temporality explicitly. The difference is not about conditionality."}, {"text": "The Latin phrase proves existence from thinking; the Meditations formulation proves thinking from existence.", "isCorrect": false, "rationale": "Both formulations move from thinking to existence. The difference is in whether the move appears as a logical inference ($cogito ergo sum$) or as an immediate intuition ('I am, I exist')."}], "id": "q11"}, {"question": "The wax argument in Meditation II demonstrates that we know the wax through the intellect rather than through the senses. How does this conclusion support Descartes' broader epistemological agenda in the Meditations?", "options": [{"text": "It shows that the external world is purely mental and has no physical reality.", "isCorrect": false, "rationale": "The wax argument does not claim that physical objects are purely mental. It argues about how we know them — through the intellect — not that they don't exist in some physical sense."}, {"text": "It establishes that the intellect, not the senses, is the reliable cognitive faculty — grounding Descartes' rationalist approach to rebuilding knowledge.", "isCorrect": true, "rationale": "By showing that even knowledge of something as concrete as a piece of wax requires the intellect to grasp its essential properties, Descartes establishes the intellect as the primary and reliable cognitive faculty. This supports his rationalist rebuilding project: certainty comes through reason, not sensory observation."}, {"text": "It proves that physical objects cannot change their properties and therefore can be trusted as stable foundations for scientific knowledge.", "isCorrect": false, "rationale": "The wax argument is specifically about an object that changes all its sensory properties when heated — far from showing stability of physical properties."}, {"text": "It demonstrates that imagination is superior to pure reason for understanding the physical world.", "isCorrect": false, "rationale": "The wax argument explicitly argues that neither the senses nor the imagination sufficiently grasp the wax. Only the intellect grasps its essential nature (extension, flexibility, mutability)."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
