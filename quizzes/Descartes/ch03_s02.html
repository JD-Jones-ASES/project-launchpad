<script>
var QUESTIONS = [{"question": "How does Descartes' conception of the self fundamentally differ from the Aristotelian-Thomistic view he inherited regarding the soul?", "options": [{"text": "Descartes saw the soul as defined by its relation to God, while the traditional view saw it as independent of God.", "isCorrect": false, "rationale": "Descartes viewed the soul as defined entirely by thinking, independent of its relationship to God, the body, or the world. The traditional view did integrate the soul within a broader theological framework, but this option misrepresents Descartes' independence claim."}, {"text": "Descartes identified the self with a thinking substance distinct from the body, whereas the traditional view considered the soul to be the form and organizing principle of the living body.", "isCorrect": true, "rationale": "This accurately captures the core distinction: Descartes' mind-body dualism (self = thinking substance, body is something 'I have'), versus the Aristotelian-Thomistic hylomorphism (soul as the form of the body, making it a living being)."}, {"text": "Descartes argued the soul was discoverable through empirical observation, unlike the traditional metaphysical approach.", "isCorrect": false, "rationale": "Descartes' method was rational introspection, not empirical observation. The traditional view was also metaphysical, but in a different way."}, {"text": "Descartes believed the soul was perishable with the body, while the traditional view held it to be immortal.", "isCorrect": false, "rationale": "The text implies Descartes' soul is independent and thus potentially immortal, whereas the traditional view sees the soul as intrinsically linked to the body's life, though not necessarily perishing with it in all aspects depending on specific interpretations within the tradition."}]}, {"question": "The 'profound tension' that runs through Descartes' Meditations after Meditation II primarily concerns which of the following philosophical problems?", "options": [{"text": "The certainty of God's existence in relation to human doubt.", "isCorrect": false, "rationale": "While a significant theme in the Meditations, the text specifically identifies the 'profound tension' as concerning the mind-body relationship directly following Meditation II, where Descartes establishes the 'I' as a thinking thing."}, {"text": "The interaction problem: how a purely thinking, non-extended mind can interact with a purely extended, non-thinking body.", "isCorrect": true, "rationale": "This precisely articulates the 'profound tension' described in the text, highlighting the difficulty of interaction between two fundamentally different kinds of substances (mind and body) as conceived by Descartes."}, {"text": "The inability to prove the existence of an external world despite sensory experience.", "isCorrect": false, "rationale": "This is another problem Descartes addresses, but the 'profound tension' specifically refers to the mind-body problem as a direct consequence of his initial discovery of the cogito."}, {"text": "The conflict between rational insight and empirical observation as sources of knowledge.", "isCorrect": false, "rationale": "This is a broader epistemological debate, but not the specific 'profound tension' that arises from the nature of the self as a thinking substance distinct from the body."}]}, {"question": "David Hume's central objection to Descartes' discovery of a *res cogitans* (thinking substance) was based on which of the following arguments?", "options": [{"text": "That Descartes relied too heavily on religious doctrine rather than pure reason.", "isCorrect": false, "rationale": "Hume's critique was primarily epistemological, focusing on the lack of empirical evidence or 'impression' for such a substance, rather than on Descartes' potential religious motivations."}, {"text": "That one could not have an impression of a unified, persisting thinking substance, only a succession of distinct perceptions.", "isCorrect": true, "rationale": "Hume, as an empiricist, argued that upon introspection, he found no impression corresponding to a persistent, unified 'self' or 'thinking substance,' only a rapid 'bundle' of perceptions. This directly challenges Descartes' conclusion."}, {"text": "That the act of thinking itself is an illusion, rather than a certainty.", "isCorrect": false, "rationale": "Hume did not deny that thinking occurs; he denied the existence of a substantial, unified 'thinker' behind the thoughts. He accepted 'thinking is occurring' but rejected 'I am a persistent thinker'."}, {"text": "That the mind is inherently extended and therefore not distinct from the body.", "isCorrect": false, "rationale": "Hume's challenge focused on the lack of an *impression* of a thinking substance, not on the mind's spatial extension. The question of extension versus non-extension is Descartes' own problem."}]}, {"question": "According to Hume's bundle theory, what does the pronoun 'I' in the statement 'I think' primarily refer to?", "options": [{"text": "A metaphysical substance that underlies and possesses thoughts.", "isCorrect": false, "rationale": "This is precisely what Hume denies. He argues there is no impression of such a substance."}, {"text": "The immediate, ephemeral flow or 'bundle' of perceptions and thoughts itself, with no underlying subject.", "isCorrect": true, "rationale": "Hume's bundle theory asserts that the 'I' is merely a label for the collection of rapidly succeeding perceptions, without any substantial self that persists or owns them beyond the stream of experiences."}, {"text": "An organizing principle bestowed upon the mind by God.", "isCorrect": false, "rationale": "Hume's empiricist philosophy does not rely on divine intervention to explain the self or its perceptions."}, {"text": "A formal logical condition necessary for experience, but unknowable as an object.", "isCorrect": false, "rationale": "This describes Kant's view of the 'I', not Hume's. Hume denies any underlying unity or condition beyond the perceptions themselves."}]}, {"question": "In his response to Hume, Immanuel Kant agreed with Descartes on the fundamental importance of the 'I think' but disagreed on what specific aspect?", "options": [{"text": "Kant agreed that the 'I think' leads to certain knowledge of God's existence, unlike Descartes.", "isCorrect": false, "rationale": "Kant famously limited the scope of human knowledge, arguing that God's existence cannot be known through pure reason. This contradicts Descartes' attempt to prove God's existence."}, {"text": "Kant agreed that the 'I think' establishes the self as a purely extended substance, contrary to Descartes.", "isCorrect": false, "rationale": "Kant did not view the self as an 'extended substance'; he focused on its logical and formal role in unifying experience, which is distinct from physical extension."}, {"text": "Kant agreed that the 'I think' signifies a necessary formal unity of consciousness, but denied it revealed a knowable metaphysical substance.", "isCorrect": true, "rationale": "Kant found Descartes correct that a unity of consciousness ('I think') is fundamental for experience, but argued Descartes overreached in concluding it was a *res cogitans*—a knowable, existing substance. For Kant, it's a logical condition, not an object of knowledge."}, {"text": "Kant agreed that the 'I think' is a product of sensory experience, which Descartes denied.", "isCorrect": false, "rationale": "Kant's 'I think' is a necessary condition for *all* experience, including sensory experience, rather than being a product of it. This is a complex point of mediation, but not a simple agreement that it's a 'product of sensory experience' in the empiricist sense."}]}, {"question": "Kant's concept of the 'formal 'I'' is best understood as:", "options": [{"text": "An empirical observation of the self's persistent identity over time.", "isCorrect": false, "rationale": "Kant's 'formal 'I'' is a transcendental condition for experience, not something observed empirically."}, {"text": "A logical condition that makes coherent experience possible, rather than a knowable substance or object of intuition.", "isCorrect": true, "rationale": "Kant argued that for any experience to be 'mine,' a formal unity of consciousness ('I think') must be presupposed. This 'I' is a logical placeholder or condition, not a substance that can be known as an object."}, {"text": "A thinking substance that exists independently of the body, as Descartes claimed.", "isCorrect": false, "rationale": "Kant explicitly disagreed with Descartes' conclusion that the 'I think' reveals a metaphysical substance that exists in its own right."}, {"text": "A collection of perceptions grouped together by habit, as Hume argued.", "isCorrect": false, "rationale": "Kant developed his concept precisely to counter Hume's bundle theory, arguing that a deeper unity is necessary for experience."}]}, {"question": "Which modern philosophy of mind position *most directly* contradicts Descartes' argument that the self is a non-material thinking substance (*res cogitans*)?", "options": [{"text": "Functionalism, because it defines mental states by their causal role, not their underlying substance.", "isCorrect": false, "rationale": "Functionalism is a distinct response but focuses on the *function* of mental states, allowing for various substrates. It challenges Descartes' emphasis on substance but doesn't directly deny the possibility of a non-material substance itself in the same way another position does."}, {"text": "Property dualism, because it insists mental properties are genuinely distinct from physical properties.", "isCorrect": false, "rationale": "Property dualism actually *concedes* only one kind of substance (physical) but tries to preserve some of Descartes' intuition by saying mental *properties* are irreducible. It's a nuanced departure, not a direct contradiction of the *substance* claim."}, {"text": "Physicalism, because it asserts that the mind is identical to the brain and there is no non-material thinking substance.", "isCorrect": true, "rationale": "Physicalism holds that everything, including mental states, is ultimately physical, meaning the mind *is* the brain and there is no separate non-material thinking substance. This directly contradicts Descartes' foundational claim of the *res cogitans*."}, {"text": "The bundle theory, which denies a unified, persisting self.", "isCorrect": false, "rationale": "Hume's bundle theory is a historical challenge to Descartes, denying a persistent *thinker*. However, among the *modern philosophy of mind* positions listed as responses to the mind-body problem, Physicalism is the most direct contradiction to Descartes' *substance* claim."}]}, {"question": "If a philosopher adheres to functionalism, which of the following statements would they most likely endorse?", "options": [{"text": "Mental states are exclusively identical to specific neural firings in the human brain.", "isCorrect": false, "rationale": "This view is characteristic of physicalism or identity theory, not functionalism. Functionalism allows for mental states to be realized in different physical substrates."}, {"text": "A complex artificial intelligence system could possess mental states if it performed the appropriate input-output functions and causal roles.", "isCorrect": true, "rationale": "Functionalism defines mental states by their causal roles in processing inputs and generating outputs, rather than by what they are made of. Therefore, a functionalist would likely agree that an AI system performing the 'right functions' could have a mind."}, {"text": "Mental properties are fundamentally distinct from physical properties, even if they arise from a single physical substance.", "isCorrect": false, "rationale": "This describes property dualism. Functionalism is concerned with causal roles, not necessarily the inherent distinctness or irreducibility of mental properties."}, {"text": "The self is merely a 'bundle' of successive perceptions with no underlying unity.", "isCorrect": false, "rationale": "This is Hume's bundle theory of the self, which is distinct from functionalism's focus on the causal roles of mental states."}]}, {"question": "A neuroscientist argues that while all mental phenomena originate from brain activity, the subjective feeling of 'pain' is an emergent quality that cannot be fully reduced to, or explained solely in terms of, specific neural pathways. This perspective aligns most closely with which modern philosophy of mind position?", "options": [{"text": "Descartes' substance dualism.", "isCorrect": false, "rationale": "Substance dualism posits two distinct *substances* (mind and body). This neuroscientist concedes there's only one substance (physical/brain) but distinct *properties*."}, {"text": "Strict physicalism (identity theory).", "isCorrect": false, "rationale": "Strict physicalism would argue that the subjective feeling of pain *is* identical to, or fully reducible to, specific brain states. The neuroscientist's view of 'emergent' and 'not fully reducible' goes against this."}, {"text": "Functionalism.", "isCorrect": false, "rationale": "Functionalism focuses on the causal role of pain, not specifically on the irreducibility of its subjective quality (qualia) beyond physical descriptions."}, {"text": "Property dualism.", "isCorrect": true, "rationale": "Property dualism holds that while there is only one kind of substance (physical, like the brain), the mental properties (like subjective experience of pain) are genuinely distinct from physical properties and cannot be reduced to them. This matches the neuroscientist's view."}]}, {"question": "Beyond Descartes' specific conclusion about the *res cogitans*, what is identified as the most enduring and significant contribution of the cogito to modern philosophy, according to the text?", "options": [{"text": "It definitively proved the immortality of the soul, ending centuries of theological debate.", "isCorrect": false, "rationale": "The text does not state that the cogito definitively proved soul immortality or ended theological debate. Its primary lasting impact is elsewhere."}, {"text": "It shifted the primary focus of philosophical inquiry from external reality to the contents of the mind, as explored by Hume.", "isCorrect": false, "rationale": "While it did initiate a focus on the mind, the text states the 'central problem' it created, which is more specific than a general shift in focus."}, {"text": "It established the central problem of modern philosophy of mind: how the mind is related to the body and brain.", "isCorrect": true, "rationale": "The text explicitly states that 'The cogito did not merely generate an academic dispute about the nature of the self. It created the central problem of modern philosophy of mind: how is the mind related to the body and brain?' This is its most significant and enduring contribution."}, {"text": "It provided an irrefutable argument for the existence of God, anchoring philosophy in divine certainty.", "isCorrect": false, "rationale": "While Descartes did attempt to prove God's existence later, the text emphasizes the mind-body problem as the primary lasting contribution stemming from the cogito, not specifically an argument for God."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
