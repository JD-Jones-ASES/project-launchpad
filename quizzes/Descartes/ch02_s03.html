        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is Descartes' overarching goal in undertaking the systematic doubt presented in Meditation I?", "options": [{"text": "To prove that all previously held beliefs are definitively false.", "isCorrect": false, "rationale": "Descartes states he doesn't need to prove all beliefs false, only find a reason to doubt them. His aim is not falsification of all beliefs, but finding an unshakable truth."}, {"text": "To discover an absolutely certain and indubitable foundation for knowledge.", "isCorrect": true, "rationale": "Descartes explicitly states he will 'doubt everything that can possibly be doubted, until he finds something that cannot be shaken' and 'commence to build anew from the foundation, if I wanted to establish any firm and permanent structure in the sciences.' This indicates his search for certainty."}, {"text": "To demonstrate the inherent unreliability of human reason and logic.", "isCorrect": false, "rationale": "Descartes employs reason and logic throughout his meditations. His doubt is a methodical process to establish what is truly certain, not to dismiss reason itself."}, {"text": "To categorize all his beliefs into true, false, and uncertain.", "isCorrect": false, "rationale": "While he does assess certainty, his primary method involves undermining the foundations of beliefs. He seeks to identify a *singular* foundation of certainty, not merely categorize all prior beliefs."}]}, {"question": "Descartes states, 'it will not be requisite that I should examine each in particular, which would be an endless undertaking; for owing to the fact that the destruction of the foundations of necessity brings with it the downfall of the rest of the edifice.' What does this statement reveal about his strategy for doubt?", "options": [{"text": "He plans to focus only on beliefs that are demonstrably false.", "isCorrect": false, "rationale": "His method extends to 'matters which are not entirely certain and indubitable,' not just those manifestly false."}, {"text": "He aims to undermine the foundational principles that support entire categories of beliefs.", "isCorrect": true, "rationale": "This statement clearly indicates that Descartes' strategy is to 'attack those principles upon which all my former opinions rested,' rather than meticulously disproving each individual belief. By doubting the foundations, the entire structure of beliefs built upon them collapses."}, {"text": "He believes individual false beliefs are more dangerous than foundational errors.", "isCorrect": false, "rationale": "The analogy of the 'edifice' implies that foundational errors are more critical, leading to the collapse of all supported beliefs."}, {"text": "He intends to prioritize disproving the most complex scientific theories first.", "isCorrect": false, "rationale": "He starts with the most basic sources of knowledge, such as the senses, which form the foundation for many beliefs, before addressing complex theories directly."}]}, {"question": "When Descartes introduces the dream argument, 'there are no certain indications by which we may clearly distinguish wakefulness from sleep,' what class of perceptions does he primarily bring into question?", "options": [{"text": "Abstract mathematical truths like 'two and three together always form five.'", "isCorrect": false, "rationale": "Descartes explicitly states that mathematical truths 'contain some measure of certainty and an element of the indubitable' even in dreams, initially exempting them from this stage of doubt."}, {"text": "Simple, universal concepts such as corporeal nature or extension.", "isCorrect": false, "rationale": "These 'simple natures' are argued to be the fundamental 'colors' or components that persist even in dreams, making them more certain than complex perceptions of objects."}, {"text": "Immediate sensory experiences of one's own body and surroundings.", "isCorrect": true, "rationale": "The dream argument directly targets the certainty of our immediate sensory experience of being awake, dressed, seated by the fire, and having hands. Dreams frequently present these very situations, making it impossible to distinguish reality from illusion in the moment."}, {"text": "Complex scientific theories like Physics and Astronomy.", "isCorrect": false, "rationale": "While these sciences are later deemed 'dubious and uncertain,' the dream argument's immediate target is more fundamental, concerning the reality of our sensory perceptions before extending to composite sciences."}]}, {"question": "Descartes dismisses the possibility of being insane as a basis for universal doubt. Why does he treat this scenario differently from the dream argument?", "options": [{"text": "Madness is a temporary state, while dreams are a regular human experience.", "isCorrect": false, "rationale": "The regularity of dreams is a factor in their consideration, but the primary reason for dismissing madness is a logical one related to his own sanity."}, {"text": "To consider himself insane would itself be an act of irrationality, undermining the pursuit of truth.", "isCorrect": true, "rationale": "Descartes states, 'But they are mad, and I should not be any the less insane were I to follow examples so extravagant.' He rejects the madness hypothesis because adopting such a perspective would inherently mean he is as unsound as those he describes, thus invalidating his entire philosophical enterprise."}, {"text": "He had never personally experienced madness, unlike dreams.", "isCorrect": false, "rationale": "His argument is philosophical and logical, not based on personal experience of madness. The text provides no information on his personal experience with madness."}, {"text": "Mad people sometimes perceive reality more clearly than sane people.", "isCorrect": false, "rationale": "The text describes mad people as having 'troubled and clouded' cerebella, believing false things, which is contrary to perceiving reality more clearly."}]}, {"question": "After presenting the dream argument, Descartes suggests that 'general things at least, i.e. eyes, a head, hands, and a whole body, are not imaginary things, but things really existent.' He compares these to a painter's colors. What is the significance of this analogy?", "options": [{"text": "It proves that our bodies are real even if we are dreaming.", "isCorrect": false, "rationale": "The analogy asserts that *components* of dream images must be real, not that the specific composite body perceived in a dream is necessarily real or that our waking body is proven real by this argument."}, {"text": "It suggests that even false representations in dreams must be composed of more fundamental, real elements.", "isCorrect": true, "rationale": "Descartes argues that just as a painter combines real colors and existing animal parts to create fantastical creatures, dreams, even if entirely illusory, must be composed of 'certain real colours' and 'general things' (like eyes, heads, hands) that are themselves 'real and true' and 'more simple and more universal.'"}, {"text": "It implies that imagination is always based on verifiable sensory input.", "isCorrect": false, "rationale": "Imagination can invent new things, but Descartes focuses on the *elements* (colors, general shapes) that must be real, not that every imaginative creation is directly verifiable."}, {"text": "It establishes a hierarchy of reality where composite objects are more real than their constituent parts.", "isCorrect": false, "rationale": "The analogy establishes the opposite: the simpler, more universal elements (like corporeal nature, extension, number) are considered more fundamental and therefore more certain than the composite things they form."}]}, {"question": "Descartes argues that Arithmetic and Geometry 'contain some measure of certainty and an element of the indubitable,' even if he is awake or asleep, unlike Physics and Astronomy. What is the fundamental distinction he draws between these types of sciences?", "options": [{"text": "Arithmetic and Geometry are based on empirical observation, while Physics and Astronomy are purely theoretical.", "isCorrect": false, "rationale": "Physics and Astronomy rely on empirical observation and are deemed dubious, while Arithmetic and Geometry's truths are presented as independent of external observation ('whether I am awake or asleep')."}, {"text": "Arithmetic and Geometry treat 'things that are very simple and very general,' while Physics and Astronomy consider 'composite things.'", "isCorrect": true, "rationale": "The text explicitly states this distinction: 'Physics, Astronomy... consideration of composite things, are very dubious and uncertain; but that Arithmetic, Geometry and other sciences of that kind which only treat of things that are very simple and very general... contain some measure of certainty and an element of the indubitable.'"}, {"text": "Physics and Astronomy are concerned with the existence of things, whereas Arithmetic and Geometry are not.", "isCorrect": false, "rationale": "While Physics and Astronomy certainly deal with existing things, Descartes' point about mathematics is that its truths hold 'without taking great trouble to ascertain whether they are actually existent or not,' making their certainty independent of existence."}, {"text": "The truths of Arithmetic and Geometry are subjective, while those of Physics and Astronomy are objective.", "isCorrect": false, "rationale": "Descartes presents the truths of arithmetic and geometry as objectively clear and apparent, not subjective."}]}, {"question": "Why does Descartes introduce the hypothesis of an 'all-powerful God' who might be deceiving him, and later refine it to an 'evil genius' not less powerful than deceitful?", "options": [{"text": "To explain why the senses sometimes deceive us about distant objects.", "isCorrect": false, "rationale": "The deceiving God/evil genius hypothesis goes far beyond sensory deception, which was addressed earlier. It aims to cast doubt even on what seemed indubitable, like mathematical truths."}, {"text": "To resolve the contradiction between God's goodness and the possibility of human error.", "isCorrect": false, "rationale": "He raises the *problem* of God's goodness and permission of deception, but the 'evil genius' is introduced to *sidestep* the theological implications of a benevolent God being a deceiver, allowing him to push doubt to its extreme without theological controversy."}, {"text": "To extend doubt to the most fundamental and seemingly indubitable truths, including mathematical and logical principles.", "isCorrect": true, "rationale": "The malicious demon/deceiving God is introduced precisely to challenge the certainty of 'truths so clear and apparent' as 2+3=5 or a square having four sides, pushing doubt beyond sensory experience and the dream argument."}, {"text": "To argue that only a benevolent God can guarantee the certainty of our knowledge.", "isCorrect": false, "rationale": "The hypothesis is meant to *undermine* certainty, not guarantee it. Descartes is trying to see if anything can survive this ultimate form of doubt."}]}, {"question": "Descartes states he will 'take of set purpose a contrary belief' and 'pretend that all these opinions are entirely false and imaginary.' What is his rationale for this extreme, temporary measure?", "options": [{"text": "He believes that pretending falsehood is a superior way to acquire new knowledge.", "isCorrect": false, "rationale": "It's a method for clearing away bias and prejudice, not a direct means of acquiring new knowledge. It's a preparatory step."}, {"text": "To balance ingrained prejudices and habitual beliefs, preventing them from dominating his judgment.", "isCorrect": true, "rationale": "He explicitly states this: 'having thus balanced my former prejudices with my latter [so that they cannot divert my opinions more to one side than to the other], my judgment will no longer be dominated by bad usage or turned away from the right knowledge of the truth.'"}, {"text": "To convince others that all common opinions are indeed false and should be rejected.", "isCorrect": false, "rationale": "This is a personal, methodical undertaking ('I shall not be acting amiss'), not an attempt to persuade others that all their opinions are false, but rather to establish his own certain foundation."}, {"text": "To demonstrate the intellectual superiority of radical skepticism over traditional thought.", "isCorrect": false, "rationale": "His goal is certainty, not skepticism for its own sake. The extreme doubt is a tool to reach knowledge, not an end in itself."}]}, {"question": "Descartes initially considers sensory deceptions, noting, 'it is sometimes proved to me that these senses are deceptive.' However, he then differentiates between deceptive senses concerning 'things which are hardly perceptible, or very far away' and 'many others as to which we cannot reasonably have any doubt.' What is the critical point he raises about the latter?", "options": [{"text": "These more immediate perceptions are always trustworthy and form a solid foundation for knowledge.", "isCorrect": false, "rationale": "He immediately follows this consideration with the dream argument, which successfully casts doubt on these 'immediate perceptions,' showing they are *not* always trustworthy."}, {"text": "The certainty of these immediate perceptions is comparable to mathematical truths.", "isCorrect": false, "rationale": "He introduces the dream argument to doubt these immediate perceptions, whereas mathematical truths are initially considered certain even in dreams, indicating a difference in their level of certainty at this stage."}, {"text": "Doubting these immediate perceptions would be akin to believing one is mad, which he rejects.", "isCorrect": true, "rationale": "Descartes asks, 'And how could I deny that these hands and this body are mine, were it not perhaps that I compare myself to certain persons, devoid of sense... But they are mad, and I should not be any the less insane were I to follow examples so extravagant.' He rejects equating himself with the mad for these immediate perceptions."}, {"text": "These immediate perceptions are subject to illusion only in rare, extreme circumstances.", "isCorrect": false, "rationale": "The dream argument, which immediately follows, demonstrates that such illusions could be common and indistinguishable from waking reality, not rare."}]}, {"question": "At the end of Meditation I, Descartes explicitly states, 'I am not considering the question of action, but only of knowledge.' What is the significance of this distinction for his project of systematic doubt?", "options": [{"text": "It implies that moral truths are exempt from his process of doubt.", "isCorrect": false, "rationale": "The text does not specify moral truths, and the distinction is generally between theoretical understanding and practical living, not a specific exclusion of moral knowledge."}, {"text": "It means that while he doubts everything theoretically, he will continue to function normally in daily life.", "isCorrect": true, "rationale": "This statement assures the reader that his extreme, temporary doubt is a purely intellectual exercise ('pretend that all these opinions are entirely false') aimed at achieving certain knowledge, and not a call to radical skepticism that would incapacitate him in practical matters or everyday actions."}, {"text": "It suggests that immediate action based on uncertain beliefs is preferable to inaction.", "isCorrect": false, "rationale": "He is not making a claim about the preference for action or inaction, but rather separating the domain of his doubt (knowledge) from the domain of practical living (action)."}, {"text": "It indicates that the goal of philosophy is to provide guidance for action, not merely theoretical understanding.", "isCorrect": false, "rationale": "On the contrary, he's explicitly stating that his *current* philosophical goal is *only* theoretical understanding (knowledge), deferring questions of action."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
