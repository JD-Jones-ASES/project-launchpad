<script>
var QUESTIONS = [{"question": "Descartes' quest for an 'Archimedean point' in philosophy is best understood as his search for:", "options": [{"text": "A physical location from which to observe the world objectively.", "isCorrect": false, "rationale": "The text states that Descartes 'borrows this image to express the philosophical ambition of finding one fixed certainty,' not a literal physical location."}, {"text": "A single, undeniable truth that can serve as the foundation for all other knowledge.", "isCorrect": true, "rationale": "The text explicitly says Descartes 'needs one firm truth — a single proposition that cannot be doubted — from which he can lever all knowledge back into place,' directly aligning with the Archimedean point metaphor."}, {"text": "A method to systematically doubt all existing beliefs to prove their falsity.", "isCorrect": false, "rationale": "While Descartes does employ systematic doubt, the Archimedean point is the goal *after* doubt, a point of certainty to rebuild, not the method of doubt itself."}, {"text": "A universal law of physics that explains the mechanics of the universe.", "isCorrect": false, "rationale": "Descartes' ambition here is philosophical and epistemological (about knowledge and certainty), not specifically about physical laws, though his work later influenced physics."}], "id": "q01"}, {"question": "Which of the following best explains why the act of doubting itself provides Descartes with his first certainty, even under the evil genius hypothesis?", "options": [{"text": "The evil genius cannot deceive him about the existence of the external world if he is doubting it.", "isCorrect": false, "rationale": "The evil genius *can* deceive him about the external world. The certainty comes from the internal act of thinking, not the status of external objects."}, {"text": "Doubting demonstrates the existence of God, who guarantees the truth of his thoughts.", "isCorrect": false, "rationale": "God's existence and guarantee of truth are arguments Descartes makes later, not his first certainty derived directly from doubting in Meditation II."}, {"text": "To be deceived or to doubt, there must necessarily be an existing 'I' performing those actions.", "isCorrect": true, "rationale": "The text states, 'If he is being deceived, he must exist in order to be deceived. The deceiver can trick him about what the world is like, but it cannot trick him into thinking he exists when he does not. Existence is required for deception to work.'"}, {"text": "Doubt is a form of logical reasoning that inevitably leads to true conclusions.", "isCorrect": false, "rationale": "Doubt is a process of suspension of belief, not a direct guarantee of truth for external propositions. Its significance here is in proving the doubter's existence."}], "id": "q02"}, {"question": "Descartes' Meditations formulation of the cogito, 'I am, I exist, is necessarily true each time that I pronounce it, or that I mentally conceive it,' is philosophically significant because it emphasizes that the cogito is primarily:", "options": [{"text": "A conclusion derived from logical premises about thinking things.", "isCorrect": false, "rationale": "The text explicitly rejects this, stating, 'The cogito is not a syllogism at all. It is not an argument from general premises to a particular conclusion.'"}, {"text": "An empirical observation that can be verified through sensory experience.", "isCorrect": false, "rationale": "Descartes is in a state of universal doubt regarding senses; his certainty cannot come from empirical observation."}, {"text": "An immediate, non-inferential intuition of one's own existence in the act of thinking.", "isCorrect": true, "rationale": "The text explains, 'It is an immediate intuition — a direct mental apprehension of its own truth at the very moment it is thought. The moment I think “I exist,” the thinking itself guarantees the truth.'"}, {"text": "A universal philosophical principle applicable to all beings in the universe.", "isCorrect": false, "rationale": "While a profound principle, its emphasis in the Meditations formulation is on the *self-verifying nature* of the individual's thought, not its universal applicability to 'all beings' as a starting point."}], "id": "q03"}, {"question": "According to Descartes in Meditation II, which of the following would NOT be considered a 'mode of thought' for a 'thinking thing'?", "options": [{"text": "Imagining a mythical creature.", "isCorrect": false, "rationale": "The text lists 'imagines' as a mode of thought, meaning it is part of what a thinking thing does."}, {"text": "Feeling cold when exposed to winter air.", "isCorrect": false, "rationale": "The text lists 'feels' as a mode of thought, indicating sensory experiences are included in his broad definition of thinking."}, {"text": "The physical act of walking down a street.", "isCorrect": true, "rationale": "Descartes explicitly states he cannot yet claim to have a body, and his self-discovery is as a 'thinking thing' (res cogitans), contrasted with 'res extensa' (extended thing/body). Walking is a bodily action, not a mental one in his specific sense of 'thinking thing' in Meditation II."}, {"text": "Doubting the existence of an external world.", "isCorrect": false, "rationale": "The text lists 'doubts' as a mode of thought, and doubting is central to his philosophical method."}], "id": "q04"}, {"question": "What is the primary purpose of Descartes' wax argument in Meditation II?", "options": [{"text": "To demonstrate that all physical objects are illusions created by the evil genius.", "isCorrect": false, "rationale": "The argument does not conclude that physical objects are illusions, but rather examines how we know them."}, {"text": "To prove the existence of an external world through empirical observation.", "isCorrect": false, "rationale": "The 'caution' note states, 'The physical world... remains just as doubtful as it was at the end of Meditation I' after Meditation II. The wax argument shows how we *know* objects, not their existence."}, {"text": "To show that our knowledge of physical objects comes from the intellect, not from the senses.", "isCorrect": true, "rationale": "The keyconcept box for the wax argument explicitly states, 'Descartes' demonstration that knowledge of physical objects comes from the intellect, not the senses.'"}, {"text": "To establish the mind-body distinction by analyzing the physical properties of wax.", "isCorrect": false, "rationale": "While related to substance dualism, the *primary* purpose of the wax argument itself is epistemological—how we know the wax, specifically showing the intellect's role over the senses."}], "id": "q05"}, {"question": "When a piece of wax melts, its sensory qualities (smell, color, shape, hardness) completely change. Descartes argues that we still know it's the 'same wax' because:", "options": [{"text": "Our memory of its initial state allows us to identify it.", "isCorrect": false, "rationale": "While memory might play a role in everyday recognition, Descartes' argument focuses on what makes it the 'same' despite *all* sensory changes, which is a deeper conceptual understanding, not just recall."}, {"text": "The wax retains some essential, unchanging sensory quality that the senses can detect.", "isCorrect": false, "rationale": "The text explicitly states 'Every single sensory quality it possessed has been replaced by a different one.' No sensory quality remains unchanged."}, {"text": "The intellect grasps its underlying properties of extension, flexibility, and mutability, which are not sensory.", "isCorrect": true, "rationale": "The text states, 'What remains is something the senses cannot directly perceive: the wax is something extended (it takes up space), flexible (it can take many shapes), and mutable (it can change). These are not properties seen with the eyes or felt with the hands. They are grasped by the intellect — by the power of reason alone.'"}, {"text": "Our common sense tells us that objects do not simply disappear and reappear as new objects.", "isCorrect": false, "rationale": "Descartes' method is to doubt common sense and rely on certain, reasoned insights, not mere common sense assumptions."}], "id": "q06"}, {"question": "A student argues that because Descartes has proven 'I exist as a thinking thing,' he has also implicitly proven that his brain must exist. Based on the 'caution' section, how would Descartes most likely respond to this claim?", "options": [{"text": "He would agree, as thinking necessarily requires a physical organ like the brain.", "isCorrect": false, "rationale": "Descartes' definition of a 'thinking thing' (res cogitans) is as a non-extended substance, separate from the body (res extensa). He does not link thinking to the necessity of a brain at this stage."}, {"text": "He would state that the existence of the brain, as a physical object, remains doubtful at this stage.", "isCorrect": true, "rationale": "The 'caution' box explicitly states, 'What it establishes is narrow but certain: Descartes exists as a thinking thing. It does not prove that his body exists... The physical world — including Descartes' own hands, eyes, and brain — remains just as doubtful as it was at the end of Meditation I.'"}, {"text": "He would say that the brain's existence can be proven through a modified version of the wax argument.", "isCorrect": false, "rationale": "The wax argument demonstrates how we *know* physical objects, not how to prove their *existence* in a state of universal doubt."}, {"text": "He would confirm the brain's existence, as the evil genius cannot deceive him about his own internal organs.", "isCorrect": false, "rationale": "The evil genius can deceive him about any aspect of the physical world, including his own body."}], "id": "q07"}, {"question": "How does Descartes' method of universal doubt, particularly the evil genius hypothesis, ultimately serve a constructive purpose in Meditation II?", "options": [{"text": "It proves that human reason is inherently flawed and cannot attain certain knowledge.", "isCorrect": false, "rationale": "Descartes' goal is to find certainty, not to prove reason's flaws. He uses reason to overcome doubt."}, {"text": "By stripping away all uncertain beliefs, it reveals the one truth (the cogito) that cannot be doubted.", "isCorrect": true, "rationale": "The text describes Descartes in despair, having doubted everything, but pressing on 'until I find something which is certain.' The evil genius helps strip away everything until only the undeniable 'I exist' remains, making it a constructive tool."}, {"text": "It demonstrates that sensory experience is the only reliable source of information about reality.", "isCorrect": false, "rationale": "Universal doubt, and the wax argument, lead to the conclusion that senses are often deceptive and reason is more reliable."}, {"text": "It leads directly to the proof of God's existence as a guarantor of all truth.", "isCorrect": false, "rationale": "While God's existence is proven later, the immediate constructive outcome of *universal doubt itself* in Meditation II is the discovery of the cogito."}], "id": "q08"}, {"question": "The 'thinkdeeper' section questions whether 'knowing that you exist is the same thing as knowing yourself.' What aspect of self-knowledge does Descartes' 'I am a thinking thing' explicitly *not* cover in Meditation II?", "options": [{"text": "The certainty of one's own existence.", "isCorrect": false, "rationale": "The cogito directly establishes the certainty of one's own existence as a thinking thing."}, {"text": "The ability to doubt, understand, and imagine.", "isCorrect": false, "rationale": "These are all explicitly listed by Descartes as modes of thought that constitute a 'thinking thing.'"}, {"text": "One's personality, memories, and physical attributes.", "isCorrect": true, "rationale": "The 'thinkdeeper' section asks, 'does this give him any knowledge of his personality, his memories, his relationships?' and the 'caution' note stresses it doesn't prove his body exists. These are aspects of 'knowing yourself' that the narrow scope of the cogito does not address."}, {"text": "The distinction between mind and body.", "isCorrect": false, "rationale": "His identification of himself as a 'res cogitans' directly initiates the mind-body distinction (substance dualism)."}], "id": "q09"}, {"question": "If Descartes' cogito ('I think, therefore I am') were interpreted as a syllogism, as critics sometimes object, what foundational problem would arise for Descartes?", "options": [{"text": "He would need to prove the existence of an external world before establishing his own.", "isCorrect": false, "rationale": "The issue with a syllogistic cogito is internal to the argument's premises, not its relation to the external world."}, {"text": "He would first need to establish the premise that 'everything that thinks exists,' which is precisely what he aims to prove.", "isCorrect": true, "rationale": "The 'Syllogism' definition box explicitly states, 'Critics of the cogito sometimes object that it hides a hidden syllogism: “Everything that thinks exists; I think; therefore I exist.” But this would require knowing the first premise — which is exactly the kind of thing Descartes has called into doubt.' This is the foundational problem."}, {"text": "The conclusion 'I exist' would only be probable, not absolutely certain.", "isCorrect": false, "rationale": "The problem isn't probability, but circularity or infinite regress if the premise itself requires proof."}, {"text": "It would become an argument about linguistics rather than a truth about existence.", "isCorrect": false, "rationale": "The nature of the argument (syllogism vs. intuition) pertains to its logical validity and certainty, not merely its linguistic form."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
