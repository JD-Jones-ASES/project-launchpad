<script>
var QUESTIONS = [{"question": "What is Thomas Aquinas's primary definition of truth, as presented in the text?", "options": [{"text": "A clear and distinct perception within the intellect.", "isCorrect": false, "rationale": "This definition of truth belongs to Descartes, not Aquinas. Descartes' criterion is 'clarity and distinctness in the mind itself.'"}, {"text": "The conformity or adequation between the intellect and reality.", "isCorrect": true, "rationale": "The text explicitly states Aquinas's formula: 'adaequatio intellectus et rei — the adequation (matching) of the intellect to the thing. When my idea of a tree accurately represents the tree in front of me, that idea is true.'"}, {"text": "A property inherent in the essence of things themselves.", "isCorrect": false, "rationale": "Aquinas addresses and rejects this idea in the Summa Theologica, stating that truth resides 'primarily in the intellect' and only secondarily in things as they relate to an intellect."}, {"text": "That which is seen or appears to the knower.", "isCorrect": false, "rationale": "This definition is condemned by Augustine, as cited by Aquinas in Objection 1 of the Summa Theologica, because it would imply that unseen things are not true."}], "id": "q01"}, {"question": "According to Aquinas in the Summa Theologica passage, where does truth primarily reside?", "options": [{"text": "Primarily in things, as they are the ultimate cause of our intellect's truth.", "isCorrect": false, "rationale": "While the being of a thing causes truth in the intellect, Aquinas argues that truth itself is not primarily in the thing. As stated in Reply Obj. 3, 'the being of the thing, not its truth, is the cause of truth in the intellect.'"}, {"text": "In the divine intellect, with things being true secondarily in relation to it.", "isCorrect": false, "rationale": "Aquinas states that natural things are true insofar as they express the likeness of species in the divine mind, but this is the 'truth of things' absolutely, which is secondary. The general statement is 'truth resides primarily in the intellect'."}, {"text": "In the intellect, as it is conformed to the object understood.", "isCorrect": true, "rationale": "Aquinas explicitly concludes, 'Thus, then, truth resides primarily in the intellect, and secondarily in things according as they are related to the intellect as their principle.' The intellect is the 'term' of the true, just as the desirable object is the 'term' of the appetite."}, {"text": "Equally in both the intellect and the things themselves, through their relationship.", "isCorrect": false, "rationale": "Aquinas makes a clear distinction that truth resides 'primarily' in the intellect and 'secondarily' in things, not equally."}], "id": "q02"}, {"question": "The detail from Albrecht Dürer's *Melencolia I* is described as a 'fitting emblem for Descartes' search for certain knowledge' because it embodies:", "options": [{"text": "The divine inspiration that guides philosophical inquiry.", "isCorrect": false, "rationale": "The text describes the figure as 'brooding' and surrounded by symbols of learning, but does not suggest divine inspiration as its primary message relevant to Descartes."}, {"text": "The beauty and order found in geometrical and learned pursuits.", "isCorrect": false, "rationale": "While the image includes 'geometrical instruments and symbols of learning,' the overall sentiment conveyed is 'frustration,' not merely appreciation for order or beauty."}, {"text": "The frustration of the thinking mind that cannot reach truth by reason alone.", "isCorrect": true, "rationale": "The text directly states, 'The brooding winged figure...embodies the frustration of the thinking mind that cannot reach truth by reason alone — a fitting emblem for Descartes' search for certain knowledge.'"}, {"text": "The superiority of empirical observation over purely intellectual contemplation.", "isCorrect": false, "rationale": "The text focuses on the limits of 'reason alone' in reaching truth, not on a comparison between empirical and intellectual methods."}], "id": "q03"}, {"question": "How do Aquinas's and Descartes' criteria for truth *differ* according to the text?", "options": [{"text": "Aquinas emphasizes the role of divine revelation, while Descartes focuses on human reason.", "isCorrect": false, "rationale": "While divine intellect is part of Aquinas's full picture of truth, the core difference highlighted is not between revelation and reason, but between their specific truth criteria."}, {"text": "Aquinas views truth as clarity in the mind, whereas Descartes sees it as correspondence to external reality.", "isCorrect": false, "rationale": "This statement reverses the positions of Aquinas and Descartes. Descartes focuses on clarity and distinctness, while Aquinas emphasizes correspondence."}, {"text": "Aquinas requires correspondence between intellect and world, while Descartes requires clarity and distinctness within the mind.", "isCorrect": true, "rationale": "The text states, 'For Aquinas, truth is correspondence between intellect and world. For Descartes, truth is clarity and distinctness in the mind itself.'"}, {"text": "Aquinas applies truth only to theological concepts, while Descartes applies it to all forms of knowledge.", "isCorrect": false, "rationale": "The text does not limit Aquinas's concept of truth solely to theology; his discussion in the Summa is about truth generally."}], "id": "q04"}, {"question": "Descartes' explanation of intellectual error aligns with Augustine's view on evil by stating that error is:", "options": [{"text": "A positive substance or faculty created by God, but misused by humans.", "isCorrect": false, "rationale": "Both Augustine on evil and Descartes on error argue against them being positive creations of God. The text states, 'Error is not a positive faculty God created.'"}, {"text": "An absence of knowledge and restraint, rather than a created entity.", "isCorrect": true, "rationale": "The text explicitly states, 'Error is a privation — an absence of the knowledge and restraint that should be present,' directly paralleling Augustine's view of evil as a privation of good."}, {"text": "A necessary consequence of living in 'the best of all possible worlds.'", "isCorrect": false, "rationale": "This view is attributed to Leibniz's Theodicy, which elaborates on the problem of evil and error but is not Descartes' direct application of Augustine's core concept of privation."}, {"text": "A result of the will being determined by prior physical and psychological causes.", "isCorrect": false, "rationale": "This describes Thomas Hobbes's view of the will, not Descartes' explanation of the *nature* of error."}], "id": "q05"}, {"question": "If a student makes an intellectual error, applying Augustine's concept of evil as privation (as Descartes does), one would conclude that the error arises from:", "options": [{"text": "A specific flawed mental faculty designed by God to allow for mistakes.", "isCorrect": false, "rationale": "The text clarifies that God creates only good things, and error is not a positive faculty. Thus, God would not design a flawed faculty specifically for error."}, {"text": "The deliberate intention of a malicious external force influencing the mind.", "isCorrect": false, "rationale": "Neither Augustine nor Descartes attributes error or evil to external malicious forces in the way described; the focus is on human will or the absence of what should be present."}, {"text": "The mind's turning away from complete knowledge or proper restraint in judgment.", "isCorrect": true, "rationale": "Paralleling Augustine's view that 'Evil enters the world through the will of creatures who turn away from the good,' Descartes applies this structure, explaining error as 'an absence of the knowledge and restraint that should be present' when the will makes a judgment."}, {"text": "An innate, positive imperfection in human reason that God purposefully included.", "isCorrect": false, "rationale": "Error is defined as a privation, an absence, not a positive imperfection created by God. God is not the author of error."}], "id": "q06"}, {"question": "Leibniz's *Theodicy* attempts to reconcile the existence of evil and error with God's perfection by arguing that:", "options": [{"text": "God actively creates evil and error to test human faith and resolve.", "isCorrect": false, "rationale": "Leibniz sought to *reconcile* God's perfection with evil and error, not to suggest God directly creates them as tests."}, {"text": "This world, despite its imperfections, is the best of all possible worlds God could create, allowing for freedom.", "isCorrect": true, "rationale": "The text states, 'Leibniz argued that God, being perfectly rational, created the best of all possible worlds. The existence of evil and error does not contradict God's perfection; rather, a world with free creatures capable of error is better than a world of perfect automatons.'"}, {"text": "Evil and error are ultimately illusions, not truly existent in the divine plan.", "isCorrect": false, "rationale": "Leibniz acknowledges the existence of evil and error but attempts to justify their presence in a divinely created world, not to deny their reality."}, {"text": "God's perfection is unrelated to the existence of evil or error in the world.", "isCorrect": false, "rationale": "The very purpose of a theodicy is to address the relationship between God's perfection and the existence of evil/error, suggesting they are very much related problems."}], "id": "q07"}, {"question": "Descartes' understanding of the human will is characterized by its:", "options": [{"text": "Limited scope, being subject to the intellect's prior judgments.", "isCorrect": false, "rationale": "Descartes describes the will as 'effectively infinite' and not forced by judgment; it is free to affirm or deny any proposition."}, {"text": "Deterministic nature, always being the last desire before action.", "isCorrect": false, "rationale": "This is Thomas Hobbes's view of the will, which is presented in contrast to Descartes's."}, {"text": "Infinite capacity for affirmation or denial, mirroring God's own freedom.", "isCorrect": true, "rationale": "The text states, 'For Descartes, the will is effectively infinite. There is no proposition I cannot affirm or deny; no judgment is forced on me. This is the same freedom, differing only in extent, that God himself exercises.'"}, {"text": "Inherent tendency towards error, making divine intervention necessary for truth.", "isCorrect": false, "rationale": "Descartes views error as a privation, an absence of knowledge/restraint, not an inherent tendency of the will itself that requires divine intervention for truth."}], "id": "q08"}, {"question": "How does Thomas Hobbes's perspective on the will contrast with Descartes' view?", "options": [{"text": "Hobbes believes the will is free but limited by physical capabilities, while Descartes believes it's absolutely free.", "isCorrect": false, "rationale": "Hobbes's view is that the will is *not* free in any robust sense, so this option is incorrect."}, {"text": "Hobbes argues the will is determined by prior causes, whereas Descartes asserts it is unlimited and free from such determination.", "isCorrect": true, "rationale": "The text states, 'For Hobbes, the will is not free in any philosophically robust sense. It is simply the last desire or aversion before action — determined entirely by prior causes, physical and psych...' This directly contrasts with Descartes' view of the will as 'effectively infinite' and not forced."}, {"text": "Hobbes aligns with Augustine, seeing the will as prone to privation, while Descartes sees it as inherently good.", "isCorrect": false, "rationale": "The text contrasts Hobbes and Descartes primarily on the nature of free will, not on their alignment with Augustine's concept of privation."}, {"text": "Hobbes views the will as primarily intellectual, while Descartes views it as primarily emotional.", "isCorrect": false, "rationale": "The text does not discuss the will in terms of being intellectual or emotional for either philosopher, but rather in terms of its freedom and determinism."}], "id": "q09"}, {"question": "The text identifies a 'shift inward' as one of the defining moves of modern philosophy. This refers to the standard of truth moving from:", "options": [{"text": "Religious authority to scientific observation.", "isCorrect": false, "rationale": "While a broader 'shift' in philosophy, this specific 'shift inward' described in the text relates to the criteria for truth, not the source of authority or method of inquiry."}, {"text": "External reality to clarity and distinctness within the mind.", "isCorrect": true, "rationale": "The text explicitly states, 'This shift inward is one of the defining moves of modern philosophy: the standard of truth moves from the world to the mind' and connects it to Descartes' criterion of 'clarity and distinctness in the mind itself.'"}, {"text": "Individual intuition to collective consensus.", "isCorrect": false, "rationale": "This specific shift is not mentioned or implied in the text regarding the standard of truth."}, {"text": "Moral virtue to intellectual achievement.", "isCorrect": false, "rationale": "The 'shift inward' discussed is about the nature and standard of truth, not a change in the hierarchy of human values or achievements."}], "id": "q10"}, {"question": "Aquinas argues in the Summa Theologica that truth resides 'primarily in the intellect.' In what sense, if any, does he allow that truth also resides in things?", "options": [{"text": "Things are true in a secondary sense insofar as they are related to an intellect — either the divine intellect (by which God created them) or a knowing intellect that represents them.", "isCorrect": true, "rationale": "Aquinas concludes: 'truth resides primarily in the intellect, and secondarily in things according as they are related to the intellect as their principle.' Natural things are true insofar as they express the likenesses of species in the divine mind; artifacts are true insofar as they conform to the artist's conception."}, {"text": "Things are true in themselves because they possess form and substance independently of any intellect.", "isCorrect": false, "rationale": "Aquinas denies that truth belongs primarily to things in themselves. In Reply Obj. 3 he specifies that 'the being of the thing, not its truth, is the cause of truth in the intellect' — the being is in the thing, but truth (the conformity) is primarily in the intellect."}, {"text": "Things cannot be described as true at all; only intellects bear the property of truth or falsity.", "isCorrect": false, "rationale": "Aquinas allows that things can be called 'true' secondarily — artifacts as they conform to the artisan's idea, and natural things as they express God's creative idea. He denies only that this is the primary locus of truth."}, {"text": "Things are true when they cause the intellect to form correct beliefs, making things the ultimate seat of truth.", "isCorrect": false, "rationale": "While the being of a thing does cause truth in the intellect, Aquinas explicitly says this makes 'the being of the thing, not its truth,' the cause. Truth itself — the conformity relation — is primarily in the intellect, not the thing."}], "id": "q11"}, {"question": "What is the key implication of Descartes' 'shift inward' for the relationship between knowledge and the external world?", "options": [{"text": "It implies that the external world is unknowable and that all knowledge claims about it must be suspended indefinitely.", "isCorrect": false, "rationale": "Descartes' shift inward is a methodological starting point, not a permanent verdict. By grounding truth in clear and distinct perception — and God's guarantee — he aims to recover knowledge of the external world, not abandon it."}, {"text": "It implies that the certainty of a belief is determined by its internal clarity to the mind, not by its direct correspondence to external things, making the mind the primary measure of truth.", "isCorrect": true, "rationale": "The shift inward means Descartes' standard of truth is internal — clarity and distinctness within the mind — rather than Aquinas's external standard of conformity to the world. The mind, not the world, becomes the primary measure of whether a perception counts as knowledge."}, {"text": "It implies that only mathematical truths are knowable, since all other knowledge requires sensory contact with external things.", "isCorrect": false, "rationale": "While mathematics is the clearest example of a priori, internally clear knowledge, Descartes' goal is to extend knowledge beyond mathematics to God, souls, and eventually the physical world — guided by the inward standard, not limited to mathematics."}, {"text": "It implies that Descartes abandons correspondence truth entirely, treating truth as entirely subjective and culturally variable.", "isCorrect": false, "rationale": "Descartes is not a subjectivist: clear and distinct perceptions, guaranteed by God, yield objective truths. The shift is about the test or criterion for truth (internal clarity), not a denial of objective reality."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
