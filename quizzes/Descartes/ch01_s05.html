<script>
var QUESTIONS = [{"question": "What was Descartes' primary motivation for addressing his dedicatory letter to the Faculty of Sacred Theology at the Sorbonne?", "options": [{"text": "He sought their direct collaboration in writing the proofs for God's existence and the soul's immortality.", "isCorrect": false, "rationale": "While he sought their approval, he had already developed his proofs and was asking them to correct and authorize his existing work, not to collaborate on its initial creation."}, {"text": "He aimed to preempt censorship and gain the Church's protection, influenced by Galileo's condemnation.", "isCorrect": true, "rationale": "The text explicitly states Descartes 'wanted the Church's approval — or at least its protection' and 'hoped to place his philosophical project under the Church's authority and preempt censorship,' directly referencing Galileo's condemnation."}, {"text": "He believed the Sorbonne was the only institution capable of understanding his complex philosophical arguments.", "isCorrect": false, "rationale": "Descartes acknowledged that few would understand his arguments, but his primary reason was for their authority and protection, not solely their unique intellectual capacity."}, {"text": "He intended to challenge the Church's traditional theological doctrines with his new philosophical insights.", "isCorrect": false, "rationale": "His tone was 'carefully deferential' and he presented his arguments 'not as challenges to theology but as aids to it,' directly contradicting the idea of challenging doctrines."}], "id": "q01"}, {"question": "Descartes states that proving God's existence through 'philosophical rather than theological argument' is crucial because:", "options": [{"text": "Theological arguments are inherently weaker and less convincing than philosophical ones.", "isCorrect": false, "rationale": "Descartes does not claim theological arguments are weaker. He points out their limitation in persuading 'infidels' who do not accept scriptural authority."}, {"text": "It provides a foundation for persuading 'infidels' of religion and moral virtue, who do not accept arguments based on faith alone.", "isCorrect": true, "rationale": "Descartes argues that while faith suffices for 'us faithful ones,' it is not possible to persuade 'infidels' without first proving these facts by 'natural reason,' which then provides a basis for religion and moral virtue."}, {"text": "Holy Scriptures prohibit purely faith-based arguments for these concepts.", "isCorrect": false, "rationale": "The text does not suggest Holy Scriptures prohibit faith-based arguments. Descartes seeks philosophical proofs to address a different audience, not because faith-based argument is scripturally forbidden."}, {"text": "He wanted to demonstrate the superiority of his philosophical method over traditional theological reasoning.", "isCorrect": false, "rationale": "Descartes explicitly presented his arguments as 'aids' to theology and sought the Church's protection, not to assert philosophical superiority in a confrontational manner."}], "id": "q02"}, {"question": "Which historical event most directly influenced Descartes' decision to seek the Sorbonne's protection for his Meditations?", "options": [{"text": "The ongoing intellectual debates of the Renaissance, which encouraged public challenges to established authorities.", "isCorrect": false, "rationale": "The text emphasizes caution and fear of censure in the specific context of the Inquisition's condemnation of Galileo, not a general culture of open Renaissance challenge."}, {"text": "The widespread acceptance of heliocentrism in Europe, which required philosophical justification.", "isCorrect": false, "rationale": "Descartes suppressed his heliocentric treatise Le Monde precisely because heliocentrism was not safely advocated without risk."}, {"text": "The condemnation of Galileo by the Inquisition just eight years prior, leading Descartes to suppress his own treatise on physics.", "isCorrect": true, "rationale": "The text directly states: 'Galileo had been condemned by the Inquisition only eight years earlier, in 1633, and Descartes had quietly shelved his own treatise on physics, Le Monde, rather than publish it,' highlighting this as a key influence."}, {"text": "The Lateran Council under Leo X, which had affirmed the soul's immortality and called for philosophical refutations of contrary arguments.", "isCorrect": false, "rationale": "The Lateran Council's decree is mentioned as a reason for Descartes to undertake proving the soul's distinctness, but Galileo's condemnation is the primary driver for seeking protection from censorship."}], "id": "q03"}, {"question": "In his dedicatory letter, Descartes asserts that knowledge about God is 'much clearer than that which we have of many created things.' Which biblical references does he use to support this claim?", "options": [{"text": "A passage from Genesis describing the creation of the world.", "isCorrect": false, "rationale": "Genesis is not cited for this particular claim."}, {"text": "References from the Wisdom of Solomon, chapter xiii, and Romans, chapter i.", "isCorrect": true, "rationale": "The text explicitly cites the Wisdom of Solomon (chapter xiii) and Romans (chapter i), specifically the passage stating those who did not find God despite perceiving the world are 'without excuse.'"}, {"text": "Quotations from the Gospels emphasizing Jesus' teachings on divine truth.", "isCorrect": false, "rationale": "The Gospels are not cited in this section for this purpose."}, {"text": "General epistles of Paul discussing the nature of faith and divine revelation.", "isCorrect": false, "rationale": "While Romans is a Pauline epistle, citing 'Romans, chapter i' is far more specific than a general reference to 'Epistles of Paul.'"}], "id": "q04"}, {"question": "Descartes admits his demonstrations cannot be 'adequately understood by many.' What is the primary reason he gives for this limited accessibility?", "options": [{"text": "They require extensive prior knowledge of obscure theological texts and ancient languages.", "isCorrect": false, "rationale": "Descartes emphasizes reliance on 'natural reason' and 'ourselves,' not specialized theological texts or ancient languages."}, {"text": "They are inherently less certain than geometrical proofs, making them difficult for most to accept.", "isCorrect": false, "rationale": "He explicitly claims they 'equal to, or even surpass in certainty and evidence, the demonstrations of Geometry,' directly contradicting this."}, {"text": "They are lengthy, interdependent, and demand a mind wholly free of prejudices and detached from the affairs of the senses.", "isCorrect": true, "rationale": "Descartes states they are 'a little lengthy and dependent the one on the other, and principally because they demand a mind wholly free of prejudices, and one which can be easily detached from the affairs of the senses.'"}, {"text": "They directly contradict common sense and established scientific principles, causing intellectual resistance.", "isCorrect": false, "rationale": "Descartes believed his method would lead to clear, demonstrable truths — he did not frame the difficulty as contradicting common sense."}], "id": "q05"}, {"question": "The synopsis accompanying the dedicatory letter outlines the progression of Descartes' argument. Which sequence accurately describes it?", "options": [{"text": "Discovery of the self (Meditation I) leading to total doubt (Meditation II).", "isCorrect": false, "rationale": "The synopsis states Meditation I is total doubt and Meditation II is discovery of the self — this reverses the order."}, {"text": "Recovery of the external world (Meditation III) followed by proofs of God's existence (Meditation V).", "isCorrect": false, "rationale": "The synopsis places 'recovery of the external world' in Meditation VI and 'proofs of God's existence' in Meditations III and V, not as described here."}, {"text": "Total doubt (Meditation I), discovery of the self (Meditation II), proofs of God's existence (Meditations III and V), an account of error (Meditation IV), and recovery of the external world (Meditation VI).", "isCorrect": true, "rationale": "This accurately reflects the sequence: from total doubt through the discovery of the self, through two proofs of God's existence, through an account of error, and finally to the recovery of the external world."}, {"text": "An account of error (Meditation IV) preceding the initial establishment of certainty (Meditation II).", "isCorrect": false, "rationale": "The synopsis places the 'account of error' in Meditation IV after 'discovery of the self' in Meditation II and the first proof of God in Meditation III."}], "id": "q06"}, {"question": "Descartes contrasts the reception of demonstrations in Geometry with those in Philosophy. What is the key difference he highlights?", "options": [{"text": "In Geometry, people are more willing to admit ignorance, whereas in Philosophy, they are eager to refute what is true to appear bold.", "isCorrect": true, "rationale": "Descartes writes that in philosophy, people believe 'all is problematical' and many, 'in their desire to acquire a reputation for boldness of thought, arrogantly combat the most important of truths' — in contrast to geometry where demonstrations command respect."}, {"text": "Geometrical proofs are inherently simpler and shorter, making them easier to understand than philosophical arguments.", "isCorrect": false, "rationale": "He primarily focuses on the mindset of the audience when contrasting these fields, not just the length or simplicity of the subject matter."}, {"text": "Philosophy benefits from the lack of established certainty, allowing for greater intellectual freedom and innovation.", "isCorrect": false, "rationale": "Descartes views the 'problematical' nature of philosophy as a hindrance, leading people to combat truth rather than fostering beneficial innovation."}, {"text": "Geometry is a more ancient discipline, commanding greater respect than the relatively new field of modern philosophy.", "isCorrect": false, "rationale": "Descartes notes his method is 'not novel' and 'nothing more ancient than the truth,' so antiquity is not the key differentiator he highlights for the reception of proofs."}], "id": "q07"}, {"question": "Descartes emphasizes that his proofs are 'the first and principal ones' and constitute 'very evident and very certain demonstrations.' What implication does this have for the comprehensiveness of his work?", "options": [{"text": "He implies that he has exhausted all possible arguments, leaving no room for further philosophical inquiry.", "isCorrect": false, "rationale": "He explicitly states: 'Not that I have here drawn together all the different reasons which might be brought forward.' He implies his proofs are foundational and powerful, not exhaustive."}, {"text": "He believes these foundational proofs are so compelling that a multitude of lesser arguments are unnecessary.", "isCorrect": true, "rationale": "He writes that collecting 'all the different reasons... never seemed to be necessary excepting when there was no one single proof that was certain,' implying he has found the most essential and sufficient demonstrations."}, {"text": "He acknowledges that his work is incomplete and intends to publish additional proofs in subsequent volumes.", "isCorrect": false, "rationale": "He explicitly states that collecting all possible reasons 'never seemed to be necessary' because his chosen proofs were sufficient."}, {"text": "He is primarily concerned with the artistic elegance of his arguments rather than their persuasive power.", "isCorrect": false, "rationale": "His entire dedicatory letter is about persuasive power and certainty, not artistic elegance."}], "id": "q08"}, {"question": "Descartes concludes by stating he cannot hope his reasonings will 'have much effect on the minds of men, unless you extend to them your protection.' Why does he place such immense faith in the Sorbonne's authority?", "options": [{"text": "The Sorbonne possessed military and political power to enforce intellectual doctrines.", "isCorrect": false, "rationale": "The Sorbonne's 'authority' is based on 'estimation' and 'judgment,' not military or political enforcement."}, {"text": "Their judgment was universally respected, carrying immense authority in matters of both faith and human philosophy, second only to Sacred Councils.", "isCorrect": true, "rationale": "He states: 'the name of SORBONNE carries with it so much authority, that, next to the Sacred Councils, never has such deference been paid to the judgment of any Body, not only in what concerns the faith, but also in what regards human philosophy as well.'"}, {"text": "The Sorbonne was known for its innovative philosophical thought, making it the ideal partner for Descartes' new method.", "isCorrect": false, "rationale": "While he praises their perspicacity, the emphasis is on their authority and judgment in validating truth, not their role as philosophical innovators."}, {"text": "He believed they were the only institution capable of correcting his work and providing a more ample explanation for the public.", "isCorrect": false, "rationale": "He asked them to correct and explain, but the 'protection' he seeks is primarily their authoritative approval to overcome public skepticism and opposition."}], "id": "q09"}, {"question": "Descartes claims that if the Sorbonne authorizes his proofs, errors regarding these questions 'will soon be effaced from the minds of men.' What mechanism does he propose for this outcome?", "options": [{"text": "The Church's direct condemnation and suppression of all opposing philosophical works.", "isCorrect": false, "rationale": "His proposed mechanism is through the power of truth combined with authority, not direct suppression of opposing works."}, {"text": "The inherent truth of his arguments, combined with the Sorbonne's authority, will persuade the learned and silence atheists.", "isCorrect": true, "rationale": "He explains: 'the truth itself will easily cause all men of mind and learning to subscribe to your judgment; and your authority will cause the atheists... to rid themselves of their spirit of contradiction or lead them possibly themselves to defend the reasonings.'"}, {"text": "A new educational curriculum mandated by the Sorbonne that excludes all non-Cartesian philosophy.", "isCorrect": false, "rationale": "A new curriculum is not mentioned as the mechanism; rather, it is the persuasive power of truth backed by the Sorbonne's esteemed judgment."}, {"text": "The widespread distribution of his Meditations in vernacular languages, making it accessible to the common person.", "isCorrect": false, "rationale": "The Meditations were written in Latin, and the primary mechanism described is the combination of truth and the Sorbonne's authority, not mass translation and distribution."}], "id": "q10"}, {"question": "The Dedicatory Letter belongs to a genre of early modern philosophical writing in which authors sought patronage and protection from powerful institutions. What does this genre convention reveal about the relationship between philosophy and institutional authority in Descartes' era?", "options": [{"text": "That philosophers were entirely subservient to Church authority and could not publish any ideas without prior approval.", "isCorrect": false, "rationale": "Descartes published the Meditations without guaranteed Church endorsement — the Sorbonne never formally approved them. The dedicatory letter was a strategic overture, not a formal prerequisite."}, {"text": "That independent philosophical inquiry required navigating institutional power structures, using rhetorical deference as a survival strategy.", "isCorrect": true, "rationale": "The dedicatory letter demonstrates that even a thinker of Descartes' ambition — who sought to overturn scholasticism — had to frame his work carefully within the existing power structure to gain an audience and avoid condemnation."}, {"text": "That the Sorbonne actively sponsored philosophical research and served as a neutral arbiter of new ideas.", "isCorrect": false, "rationale": "The text portrays the Sorbonne as an authority Descartes sought to appease, not an active sponsor of his research. The relationship was one of strategic deference, not institutional partnership."}, {"text": "That philosophical innovation was uniquely welcome within Catholic intellectual institutions during the Counter-Reformation.", "isCorrect": false, "rationale": "The context of Galileo's condemnation and Descartes' suppression of Le Monde suggests the opposite: radical philosophical innovation carried real institutional risk during this period."}], "id": "q11"}, {"question": "The term $cogito$ refers to Descartes' foundational discovery in Meditation II. Which of the following best describes the role the Dedicatory Letter plays in relation to that discovery?", "options": [{"text": "The Dedicatory Letter presents the cogito as Descartes' central proof of God's existence.", "isCorrect": false, "rationale": "The cogito — 'I think, therefore I am' — establishes the existence of the self, not God's existence. The proofs of God come in Meditations III and V."}, {"text": "The Dedicatory Letter frames the two central theological results that the cogito ultimately supports — God's existence and the soul's immortality.", "isCorrect": true, "rationale": "The Dedicatory Letter announces the Meditations' two central demonstrations: God's existence and the soul's distinctness from body. The cogito in Meditation II is the foundational first step that makes these demonstrations possible by establishing an indubitable starting point."}, {"text": "The Dedicatory Letter shows that the cogito was the discovery Descartes was most eager to protect from censorship.", "isCorrect": false, "rationale": "The primary concern in the Dedicatory Letter is God's existence and the soul's immortality — the topics with direct theological implications — not the cogito per se."}, {"text": "The Dedicatory Letter explains the cogito in full detail as the centerpiece of the philosophical project.", "isCorrect": false, "rationale": "The Dedicatory Letter is a strategic rhetorical address to the Sorbonne, not an explanation of the cogito. The cogito is explained in the body of Meditation II."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
