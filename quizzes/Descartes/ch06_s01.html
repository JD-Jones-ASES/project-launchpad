    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Descartes in Meditation V, what is the single, essential defining characteristic of all physical things?", "options": [{"text": "Their ability to be perceived by the senses.", "isCorrect": false, "rationale": "Descartes argues that sensory qualities like color and sound are not properties of matter itself, but rather sensations in our minds. He emphasizes reason over senses for understanding matter's essence."}, {"text": "Their property of occupying space in three dimensions.", "isCorrect": true, "rationale": "Descartes defines matter as 'extension'—the property of occupying space in length, breadth, and depth. This is its sole essential characteristic."}, {"text": "Their possession of color, warmth, and sound.", "isCorrect": false, "rationale": "Descartes explicitly states that qualities like color, warmth, and sound are not in material things themselves, but are sensations produced in our minds."}, {"text": "Their potential to generate ideas in the mind.", "isCorrect": false, "rationale": "While material things can cause ideas in the mind, this is a result of their interaction with our sense organs, not their defining intrinsic property according to Descartes."}], "id": "q01"}, {"question": "Why does Descartes argue that qualities like color, smell, and taste are not true properties of matter itself?", "options": [{"text": "He believes these qualities are illusions created by an evil deceiver.", "isCorrect": false, "rationale": "While Descartes considers the possibility of a deceiver, his argument here is about the nature of sensory qualities themselves, not a direct result of deception."}, {"text": "He posits that these are subjective sensations produced in the mind by the interaction with extended objects.", "isCorrect": true, "rationale": "Descartes states that these qualities 'are really in us — in the way our minds respond to the impact of extended objects on our sense organs.' They are sensations, not inherent properties of the object."}, {"text": "He asserts that only qualities that can be observed directly through touch are real.", "isCorrect": false, "rationale": "Descartes prioritizes rational understanding of mathematical properties (shape, size, motion) over direct sensory observation for the essence of matter."}, {"text": "He claims that such qualities are too complex to be defined mathematically.", "isCorrect": false, "rationale": "The issue for Descartes is not the complexity, but the location and nature of these qualities—they reside in the mind as sensations, not in the extended physical substance."}], "id": "q02"}, {"question": "Descartes' conception of matter as purely 'extension' had a profound impact on the development of science by primarily enabling which of the following?", "options": [{"text": "The emphasis on empirical observation as the sole source of scientific knowledge.", "isCorrect": false, "rationale": "Descartes emphasized reason and mathematical analysis over pure empirical observation for understanding the essence of matter."}, {"text": "The mathematization of physics, allowing the physical world to be described in terms of geometry and motion.", "isCorrect": true, "rationale": "The text states, 'If matter is purely extension, then the science of matter is essentially mathematics.' This vision led to the 'mathematized physics of Newton and all that followed.'"}, {"text": "The development of qualitative descriptions for complex physical phenomena.", "isCorrect": false, "rationale": "Descartes' view pushed science towards quantitative, mathematical descriptions, not qualitative ones."}, {"text": "The understanding that subjective human experiences are the foundation of objective scientific truths.", "isCorrect": false, "rationale": "Descartes explicitly separates subjective sensations from the objective mathematical properties of matter, which he considered the true foundation of science."}], "id": "q03"}, {"question": "How does Descartes primarily arrive at his precise account of what matter truly is?", "options": [{"text": "By conducting experiments and observing material objects with his senses.", "isCorrect": false, "rationale": "The text explicitly states he arrives at this account 'not by looking at things, but by thinking' and emphasizes that 'The mind, not the senses, reveals what matter truly is.'"}, {"text": "By appealing to the authority of ancient philosophical texts and traditions.", "isCorrect": false, "rationale": "Descartes' method is characterized by individual rational inquiry, not an appeal to traditional authorities in this context."}, {"text": "By analyzing a clear and distinct idea of extension found purely in his own mind through reason.", "isCorrect": true, "rationale": "He finds the idea of extension 'in his own mind — a clear and distinct idea whose content he can analyze purely by reason.'"}, {"text": "By consulting with other scientists and compiling their collective observations.", "isCorrect": false, "rationale": "Descartes' method in the Meditations is primarily an introspective, individual rational inquiry."}], "id": "q04"}, {"question": "What is the fundamental premise underlying Descartes' ontological argument for God's existence in Meditation V?", "options": [{"text": "The idea of God must have been caused by an infinitely perfect being.", "isCorrect": false, "rationale": "This describes the causal argument for God's existence found in Meditation III, not the ontological argument of Meditation V."}, {"text": "God is a being possessing all perfections, and existence is one such perfection.", "isCorrect": true, "rationale": "The core of the ontological argument is that God, as a supremely perfect being, must possess all perfections, and existence is considered a perfection. Lacking existence would mean lacking a perfection."}, {"text": "The universe displays intricate design, implying a divine creator.", "isCorrect": false, "rationale": "This is a teleological argument, which is not the type of argument Descartes employs in Meditation V."}, {"text": "Human beings naturally have an innate belief in a higher power.", "isCorrect": false, "rationale": "While Descartes might believe in innate ideas, the ontological argument is a logical deduction from the concept of God, not an appeal to widespread belief."}], "id": "q05"}, {"question": "When Descartes compares God's existence to the necessary sum of a triangle's angles, what is he trying to illustrate about God's existence?", "options": [{"text": "That God's existence is a truth that can only be grasped through empirical observation.", "isCorrect": false, "rationale": "Descartes uses this analogy to highlight truths grasped through pure reason, independent of sensory experience, just as geometric truths are known without seeing a physical triangle."}, {"text": "That God's existence is a property that, like an angle, can vary depending on the context.", "isCorrect": false, "rationale": "The analogy emphasizes necessity and immutability. The sum of a triangle's angles is fixed and essential; similarly, God's existence is considered essential."}, {"text": "That existence is an inseparable and essential part of God's very nature or essence.", "isCorrect": true, "rationale": "The text states, 'Existence belongs to God's essence as three angles belong to a triangle.' This means existence is not a separable attribute but integral to what God is."}, {"text": "That both God and triangles are merely concepts in the mind without external reality.", "isCorrect": false, "rationale": "Descartes uses the analogy to argue for God's *actual* existence, not to deny it or reduce it to mere conception."}], "id": "q06"}, {"question": "How does Descartes' ontological argument in Meditation V fundamentally differ from his causal argument for God's existence in Meditation III?", "options": [{"text": "Meditation V relies on the existence of the external world, while Meditation III does not.", "isCorrect": false, "rationale": "Neither argument directly relies on the external world's existence; both are derived from analysis of ideas within the mind."}, {"text": "Meditation V proceeds from the concept of God's nature, whereas Meditation III argues from the origin of the idea of God.", "isCorrect": true, "rationale": "The text states, 'The Meditation III argument is causal: I have an idea of an infinitely perfect being; I am finite... God must exist as the cause.' 'The Meditation V argument is ontological: the very concept of a supremely perfect being includes existence as a necessary feature.'"}, {"text": "Meditation V proves a less perfect God than Meditation III.", "isCorrect": false, "rationale": "Both arguments aim to prove the existence of a supremely perfect being (God)."}, {"text": "Meditation V requires sensory experience, while Meditation III relies on pure reason.", "isCorrect": false, "rationale": "Both arguments rely on pure reason and clear and distinct perception, not sensory experience."}], "id": "q07"}, {"question": "What is the central objection of the 'Cartesian Circle'?", "options": [{"text": "That Descartes' proofs of God are logically inconsistent with each other.", "isCorrect": false, "rationale": "Descartes presents his two proofs of God as reinforcing, not inconsistent."}, {"text": "That Descartes uses clear and distinct perception to prove God, and then uses God to guarantee the reliability of clear and distinct perception.", "isCorrect": true, "rationale": "The text states the objection: 'he uses clear and distinct perception to prove God's existence, and then uses God's existence to validate clear and distinct perception.'"}, {"text": "That Descartes' definition of matter as extension is inherently circular.", "isCorrect": false, "rationale": "The Cartesian Circle objection specifically pertains to the relationship between God's existence and the reliability of clear and distinct perceptions."}, {"text": "That Descartes fails to adequately define what he means by 'clear and distinct perception.'", "isCorrect": false, "rationale": "While a critical philosophical point, this is not the specific 'circularity' objection referred to as the Cartesian Circle."}], "id": "q08"}, {"question": "Why does Descartes' establishment of God's non-deceiving nature (after proving God's existence) become critical for trusting memory and past clear and distinct perceptions?", "options": [{"text": "Because God's non-deceiving nature allows him to bypass the need for any clear and distinct perceptions altogether.", "isCorrect": false, "rationale": "God's existence validates the reliability of clear and distinct perceptions, rather than bypassing their necessity."}, {"text": "Because without a non-deceiving God, Descartes could not be certain that his past clear and distinct perceptions remained true when not actively being reviewed.", "isCorrect": true, "rationale": "The text explains, 'If God is not a deceiver, then whatever I have ever perceived clearly and distinctly is true — not just in the moment of perception, but durably. Memory can be trusted.'"}, {"text": "Because God's existence ensures that all sensory experiences are accurate representations of reality.", "isCorrect": false, "rationale": "God's guarantee applies to clear and distinct *rational* perceptions, not necessarily to all *sensory* experiences, which Descartes often questions as potentially deceptive."}, {"text": "Because only God can implant clear and distinct ideas directly into the human mind.", "isCorrect": false, "rationale": "The issue is about the *reliability* of clear and distinct perceptions (including those we generate ourselves through reason), not their origin as solely God-implanted."}], "id": "q09"}, {"question": "Based on the preview of Kant's objection, what is the fundamental challenge it poses to Descartes' ontological argument?", "options": [{"text": "Kant argues that one cannot have a clear and distinct idea of God without prior sensory experience.", "isCorrect": false, "rationale": "Kant's objection, as previewed, is not about the source of the idea of God but about the nature of existence itself in relation to concepts."}, {"text": "Kant claims that existence is not a property that adds content to a concept, but merely asserts that the concept has an instance.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states Kant's core claim: 'existence is not a real predicate — that saying 'God exists' does not add any content to the concept of God but merely asserts that the concept has an instance.'"}, {"text": "Kant believes that God, by definition, must be unknowable through reason alone.", "isCorrect": false, "rationale": "This is a broader epistemological stance which is not the specific objection to the ontological argument highlighted here."}, {"text": "Kant suggests that the concept of a supremely perfect being is inherently contradictory.", "isCorrect": false, "rationale": "While philosophical objections can be raised regarding perfection, Kant's specific challenge to the ontological argument focuses on existence as a predicate."}], "id": "q10"}, {"question": "Descartes argues that mathematical objects like triangles and circles have a real, determinate nature independent of his thought, even though he may not know whether physical triangles exist in the external world. What does this claim imply about the status of mathematical truths?", "options": [{"text": "Mathematical truths are merely useful fictions invented by the human mind and have no reality beyond their utility.", "isCorrect": false, "rationale": "Descartes argues the opposite: that mathematical natures are not invented but discovered. He can demonstrate properties of triangles that he did not invent and which hold necessarily, indicating they represent real and determinate natures."}, {"text": "Mathematical truths are eternal, immutable natures that Descartes discovers through clear and distinct perception, independent of whether physical instances of them exist.", "isCorrect": true, "rationale": "Descartes holds that the triangle's nature — its properties, the sum of its angles, etc. — is real and determinate independently of his thought and of physical triangles. These are truths grasped by the intellect, not constructed by it, and they hold eternally and necessarily."}, {"text": "Mathematical truths are true only when the external world contains physical instances of the mathematical objects in question.", "isCorrect": false, "rationale": "Descartes explicitly notes that even if no physical triangle exists anywhere in the world, the truths about what a triangle is remain necessary. The existence of physical instances is irrelevant to the necessary truth of geometric properties."}, {"text": "Mathematical truths are a special type of sensory knowledge derived from observing shaped objects in the world.", "isCorrect": false, "rationale": "Descartes arrives at mathematical knowledge 'not by looking at things, but by thinking.' Mathematical natures are grasped by the intellect, not abstracted from sensory observation of physical shapes."}], "id": "q11"}, {"question": "In what way does Descartes' ontological argument in Meditation V represent a shift in strategy compared to his causal argument in Meditation III?", "options": [{"text": "The Meditation V argument is weaker because it relies on definition alone, whereas the Meditation III argument relies on the more secure principle of causation.", "isCorrect": false, "rationale": "Descartes does not present one argument as weaker. He offers two complementary proofs. The question asks about the strategic shift, not a relative assessment of strength."}, {"text": "Instead of asking what could have caused the idea of God, Descartes now asks what the concept of God necessarily includes — moving from causal analysis to conceptual analysis of God's essence.", "isCorrect": true, "rationale": "The Meditation III argument is a causal argument: tracing the idea's origin to its adequate cause. The Meditation V argument is a conceptual or ontological one: unpacking what existence is necessary included in the concept of a supremely perfect being. The strategy shifts from asking 'what caused this idea?' to 'what does this concept entail?'"}, {"text": "Meditation V abandons the idea of God and proves existence solely through the nature of matter and extension.", "isCorrect": false, "rationale": "The ontological argument in Meditation V is specifically about God, not matter. The discussion of matter (extension) is separate from the ontological argument, which concerns God's essence necessarily including existence."}, {"text": "Meditation V proof is a posteriori while the Meditation III proof is a priori.", "isCorrect": false, "rationale": "Both proofs are a priori — neither relies on empirical observation of the external world. The Meditation V argument is, if anything, the more purely a priori of the two, proceeding entirely from conceptual analysis."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
