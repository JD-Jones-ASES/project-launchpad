    };

        <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
    </div>

        <div class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the primary, overarching ambition Descartes sets out to achieve in *The Meditations on First Philosophy*?", "options": [{"text": "To reconcile ancient Greek philosophy with emerging scientific theories of the 17th century.", "isCorrect": false, "rationale": "While Descartes was aware of scientific advancements, his primary ambition was not to reconcile ancient philosophy but to establish a new, secure foundation for all knowledge, discarding the old."}, {"text": "To find a foundation for all human knowledge so certain that no skeptical argument or powerful deceiver could possibly undermine it.", "isCorrect": true, "rationale": "The text explicitly states Descartes' ambition is 'to rebuild all human knowledge from scratch — to find a foundation so certain that no skeptic, no deceiver, not even a God-like evil power could undermine it.'"}, {"text": "To provide a comprehensive historical account of philosophical thought, critically evaluating the errors of his predecessors.", "isCorrect": false, "rationale": "The Meditations is a project of rebuilding knowledge from scratch, not a historical survey or critical history of philosophy."}, {"text": "To demonstrate the superiority of empirical observation and experimentation over rational deduction as a means to truth.", "isCorrect": false, "rationale": "Descartes' method heavily relies on rational deduction and stripping away doubt through individual thought, rather than prioritizing empirical observation."}], "id": "q01"}, {"question": "Descartes uses the metaphor of demolishing a building with a shaky foundation and rebuilding it from the ground up. What does this metaphor best illustrate about his philosophical approach?", "options": [{"text": "His intention to physically destroy existing universities and replace them with new institutions.", "isCorrect": false, "rationale": "The metaphor is for intellectual systems, not physical institutions. It refers to philosophical systems, not literal buildings."}, {"text": "His belief that existing philosophical systems (like scholasticism) were fundamentally unreliable and required a complete, radical overhaul, rather than incremental repairs.", "isCorrect": true, "rationale": "The text states, 'The old building of scholastic philosophy was too unreliable to repair piece by piece. Better to tear it down and start fresh,' directly explaining the metaphor's meaning."}, {"text": "His desire to incrementally improve specific flawed arguments within the prevailing scholastic philosophy.", "isCorrect": false, "rationale": "The text explicitly contradicts this, stating the old building was 'too unreliable to repair piece by piece,' implying a complete rebuild was necessary."}, {"text": "His advocacy for architectural principles as a model for constructing rational arguments in philosophy.", "isCorrect": false, "rationale": "While a metaphor, its meaning is about the structure of knowledge, not literal architectural design principles."}], "id": "q02"}, {"question": "The *Meditations* are presented as a 'first-person meditation conducted over six days,' which the text clarifies is 'a literary fiction, not a literal report.' What is the primary intended effect of this narrative choice on the reader?", "options": [{"text": "To provide a precise chronological diary of Descartes' daily philosophical routine.", "isCorrect": false, "rationale": "The text explicitly states it is 'not a literal report' of a week's work, but a fiction."}, {"text": "To emphasize the solitary nature of genius, suggesting that profound philosophical insights are exclusively the product of isolated thought.", "isCorrect": false, "rationale": "While the meditation is solitary, the primary effect highlighted is reader participation, not solely the isolation of the author."}, {"text": "To encourage the reader to actively participate in and personally undertake the philosophical thought experiment, rather than passively observing.", "isCorrect": true, "rationale": "The text explains, 'By casting the argument as an interior monologue, Descartes forces the reader to participate. You are not watching someone else prove things; you are being invited to conduct the experiment yourself.'"}, {"text": "To limit the scope of the philosophical inquiry to problems that can be fully resolved within a short timeframe.", "isCorrect": false, "rationale": "Descartes had been thinking about these problems for decades, indicating the scope is not limited by the six-day fiction."}], "id": "q03"}, {"question": "Descartes included a *Dedicatory Letter* to the theologians of the Sorbonne. What was the dual strategic and sincere purpose behind this action?", "options": [{"text": "To publicly challenge the Church's doctrines by presenting a purely secular philosophy as superior.", "isCorrect": false, "rationale": "Descartes was a sincere Catholic and sought alliance and protection, not a challenge to the Church's authority."}, {"text": "To secure financial patronage from the wealthy Sorbonne faculty for his future philosophical works.", "isCorrect": false, "rationale": "The text does not mention financial motives for the dedicatory letter."}, {"text": "To demonstrate his sincere belief that rational proofs could establish God's existence and the soul's immortality, while also seeking the Church's protection for his potentially controversial ideas.", "isCorrect": true, "rationale": "The text states he was a 'sincere Catholic who believed that God's existence and the soul's immortality could and should be established by reason,' and that the letter 'sought to place the Meditations under the Church's protection.'"}, {"text": "To recruit new students to the study of philosophy by presenting it as a direct path to religious faith.", "isCorrect": false, "rationale": "Recruiting students is not identified as a primary purpose of the dedicatory letter."}], "id": "q04"}, {"question": "The *Synopsis* explains the 'great arc' of the *Meditations*, moving from 'total doubt to rebuilt knowledge.' Which sequence correctly describes the primary focus of each stage of the *Meditations* as outlined in the text?", "options": [{"text": "Meditation I (problem of doubt), Meditation II (first solution), Meditations III–V (God as guarantor), Meditation VI (return to the world with new resources).", "isCorrect": true, "rationale": "This precisely matches the description in the text: 'Meditation I creates the problem; Meditation II finds the first solution; Meditations III–V establish God as the guarantor of knowledge; Meditation VI returns to the world with new philosophical resources.'"}, {"text": "Meditation I (establishing certainty), Meditation II (introducing doubt), Meditations III–V (epistemological challenges), Meditation VI (conclusion).", "isCorrect": false, "rationale": "This reverses the initial stages and mischaracterizes the middle and end."}, {"text": "Meditations I–II (proofs of God), Meditations III–IV (the problem of error), Meditations V–VI (the nature of the self).", "isCorrect": false, "rationale": "This misrepresents the specific content and progression described for each set of meditations."}, {"text": "Meditation I (analysis of sensory experience), Meditations II–III (human error), Meditations IV–VI (divine revelation).", "isCorrect": false, "rationale": "This does not align with the specific functions assigned to each Meditation in the synopsis."}], "id": "q05"}, {"question": "According to the text, Descartes 'made epistemology the central discipline of modern philosophy.' How did his unique approach contribute to this shift?", "options": [{"text": "By demonstrating that sensory experience is the ultimate source of all reliable knowledge, thereby establishing empiricism.", "isCorrect": false, "rationale": "Descartes' method initially doubts sensory experience and seeks a foundation beyond it, which is characteristic of rationalism, not empiricism."}, {"text": "By creating a comprehensive catalog of all known philosophical problems, ensuring future generations would focus on knowledge.", "isCorrect": false, "rationale": "He aimed to *solve* problems, not just catalog them. His focus was on the *method* of acquiring knowledge."}, {"text": "By prioritizing the fundamental question of 'What can we actually know, and how do we know it?' and freeing its pursuit from dependence on Church authority or ancient tradition.", "isCorrect": true, "rationale": "The text states he 'freed them from dependence on Church authority or ancient tradition and placed them squarely before the individual reasoning mind,' making epistemology central to modern philosophy."}, {"text": "By proving that absolute certainty is impossible, thus establishing skepticism as the goal of philosophical inquiry.", "isCorrect": false, "rationale": "Descartes used doubt as a tool to *achieve* certainty, not to conclude that certainty is impossible."}], "id": "q06"}, {"question": "Which scenario best exemplifies an application of Descartes' foundationalist method as described in the text?", "options": [{"text": "A scientist designing an experiment based on established scientific theories and previous findings.", "isCorrect": false, "rationale": "This involves building upon existing knowledge, whereas Descartes' method involves stripping away all existing beliefs that can be doubted."}, {"text": "An individual systematically questioning every one of their beliefs, no matter how trivial, until they arrive at a truth that is absolutely undeniable.", "isCorrect": true, "rationale": "This directly reflects Descartes' method: 'His method is to strip away every belief that can possibly be doubted until he reaches something that cannot be doubted, and to build upward from there. This strategy is called foundationalism.'"}, {"text": "A historian meticulously researching primary sources to reconstruct an accurate account of past events.", "isCorrect": false, "rationale": "Historical research seeks to establish facts about the past, but it does not involve universal doubt to find a bedrock of certainty for *all* knowledge in the same foundationalist sense."}, {"text": "A legal scholar interpreting complex laws by referring to centuries of legal precedents and judicial opinions.", "isCorrect": false, "rationale": "This relies on tradition and precedent, which Descartes' method aims to move beyond when seeking foundational certainty."}], "id": "q07"}, {"question": "The author states that the questions Descartes raises 'define modern philosophy' because he gave them a 'distinctively modern form.' What is the key characteristic of this 'modern form'?", "options": [{"text": "His introduction of entirely new philosophical problems that had never been considered before 1641.", "isCorrect": false, "rationale": "The text explicitly states, 'None of these questions was new in 1641,' but that he gave them a modern form."}, {"text": "His emphasis on resolving philosophical disputes through democratic consensus and public debate.", "isCorrect": false, "rationale": "Descartes' project is presented as an individual, interior meditation, not a democratic debate."}, {"text": "His insistence that philosophical problems be solved by individual reason, freed from reliance on Church authority or ancient traditions.", "isCorrect": true, "rationale": "The text states this 'modern form — one that freed them from dependence on Church authority or ancient tradition and placed them squarely before the individual reasoning mind.'"}, {"text": "His development of sophisticated experimental apparatus to scientifically test philosophical hypotheses.", "isCorrect": false, "rationale": "While Descartes was a scientist, the text describes his philosophical method as primarily rational and meditative, not relying on physical apparatus for foundational knowledge."}], "id": "q08"}, {"question": "What is the primary value of the 'Objections and Replies' published alongside *The Meditations*, beyond the main text itself?", "options": [{"text": "They demonstrate that Descartes' philosophical system was ultimately flawed and could not withstand scrutiny.", "isCorrect": false, "rationale": "While they might reveal 'limits,' the text highlights their value in showing Descartes refining his arguments, not a complete refutation."}, {"text": "They offer a historical record of philosophical debates from the 17th century, providing context but little new philosophical content.", "isCorrect": false, "rationale": "The text calls them 'one of the richest philosophical exchanges' and 'invaluable,' suggesting much more than mere historical context."}, {"text": "They allowed Descartes to defend his positions against sharp critics, refine his arguments under pressure, and sometimes reveal the inherent limits of his system.", "isCorrect": true, "rationale": "The text states, 'They show Descartes defending his positions against sharp critics, refining his arguments under pressure, and occasionally revealing the limits of his system.'"}, {"text": "They present alternative philosophical systems that were more widely accepted by Descartes' contemporaries.", "isCorrect": false, "rationale": "The 'Objections' are critiques *of* Descartes' system, not full alternative systems, and the 'Replies' are his defense."}], "id": "q09"}, {"question": "According to the *Dedicatory Letter*, why did Descartes suggest his philosophical proofs of God's existence might be *more* persuasive to unbelievers than scripture itself?", "options": [{"text": "Because philosophical arguments are inherently simpler to understand than complex theological doctrines.", "isCorrect": false, "rationale": "The text does not mention simplicity as the reason for greater persuasiveness to unbelievers."}, {"text": "Because unbelievers would not accept scripture as authoritative, but they could not logically dismiss a valid rational argument.", "isCorrect": true, "rationale": "The text states, 'Unbelievers will not accept scripture as authoritative, but they cannot dismiss a valid rational argument.'"}, {"text": "Because he believed only philosophical reasoning, not faith, could lead to true belief in God.", "isCorrect": false, "rationale": "Descartes was a 'sincere Catholic' who believed reason *could* establish God's existence, not that faith was invalid."}, {"text": "Because scripture was written in Latin and inaccessible to most people in the 17th century.", "isCorrect": false, "rationale": "The text does not cite language accessibility as the reason for scripture's lack of authority for unbelievers."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
