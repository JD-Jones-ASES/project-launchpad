<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference between a priori and a posteriori knowledge?", "options": [{"text": "A priori knowledge is derived from religious revelation, while a posteriori knowledge is from scientific experiments.", "isCorrect": false, "rationale": "The text defines a priori and a posteriori in terms of experience and reason, not specifically religious revelation or scientific experiments, although scientific experiments would fall under 'experience.' It explicitly contrasts them with 'Scripture or revelation' as part of natural theology, not as defining a priori."}, {"text": "A priori knowledge depends on sensory experience, whereas a posteriori knowledge is derived from pure reason.", "isCorrect": false, "rationale": "This statement reverses the definitions provided in the text. A priori knowledge is independent of experience (reason alone), and a posteriori knowledge depends on experience (derived from observation)."}, {"text": "A priori knowledge is independent of experience and comes from reason, while a posteriori knowledge depends on experience and observation.", "isCorrect": true, "rationale": "The text clearly states: 'a posteriori: Latin for “from what comes after” — knowledge that depends on experience, derived from observation of the world.' It contrasts this with 'a priori (“from what comes before”), which denotes knowledge independent of experience, derived from reason alone.'"}, {"text": "A priori knowledge applies only to mathematical truths, and a posteriori knowledge applies only to ethical principles.", "isCorrect": false, "rationale": "The text does not limit these types of knowledge to specific domains like mathematics or ethics, but rather defines them by their source (experience vs. reason)."}], "id": "q01"}, {"question": "Based on the description, which pair of philosophers is correctly associated with their primary approach to proving God's existence in the context of natural theology?", "options": [{"text": "Thomas Aquinas with a priori proofs, and Anselm of Canterbury with a posteriori proofs.", "isCorrect": false, "rationale": "This statement reverses the correct association. Aquinas is known for a posteriori proofs, and Anselm for a priori proofs from the concept of God."}, {"text": "Thomas Aquinas with proofs from observable facts, and Anselm of Canterbury with proofs from the concept of God.", "isCorrect": true, "rationale": "The text states, 'Aquinas's proofs for God's existence are a posteriori because they begin from observable facts about the world... and argue to God as their explanation.' It also mentions 'Anselm of Canterbury, who pioneered the purely rational proof from the concept of God that Descartes will develop further in Meditation V.'"}, {"text": "Descartes with proofs from revelation, and Thomas Aquinas with proofs from human reason.", "isCorrect": false, "rationale": "Descartes' approach, like Anselm's and Aquinas's, is part of 'natural theology' which means 'proving God's existence without appealing to Scripture or revelation.' Aquinas's proofs are indeed from human reason, but Descartes is not associated with proofs from revelation in this context."}, {"text": "Anselm of Canterbury with arguments based on motion, and Descartes with arguments from contingency.", "isCorrect": false, "rationale": "Arguments from motion and contingency are associated with Thomas Aquinas's a posteriori Five Ways, not Anselm or Descartes in this specific context."}], "id": "q02"}, {"question": "What common structural element underlies all five of Thomas Aquinas's arguments for God's existence, as presented in the Summa Theologica?", "options": [{"text": "They all begin by establishing the self-evident nature of God's existence.", "isCorrect": false, "rationale": "Aquinas explicitly argues in Summa Theologica I, Q. 2, Art. 1 that God's existence is not self-evident to us and needs demonstration."}, {"text": "They universally start with an abstract concept of God and deduce His existence.", "isCorrect": false, "rationale": "This describes an a priori argument, like Anselm's. Aquinas's proofs are a posteriori, beginning with observable facts, not abstract concepts of God."}, {"text": "Each argument commences from an observable feature of the natural world and reasons to God as its ultimate explanation.", "isCorrect": true, "rationale": "The text states, 'All five share a common structure: they begin from some observable feature of the natural world and argue that God must exist as the ultimate explanation of that feature. They are therefore a posteriori arguments — arguments from experience.'"}, {"text": "They rely primarily on scriptural evidence and divine revelation to establish God's attributes.", "isCorrect": false, "rationale": "Aquinas's proofs are presented as part of 'natural theology,' which explicitly means 'proving God's existence without appealing to Scripture or revelation.'"}], "id": "q03"}, {"question": "Consider a complex clockwork mechanism where each gear is turned by another gear. According to Aquinas's First Way (argument from motion), what would be the necessary conclusion if you trace the motion back through this chain of gears?", "options": [{"text": "The clock could have no beginning, implying an infinite regress of gears moving each other.", "isCorrect": false, "rationale": "Aquinas's First Way explicitly rejects the possibility of an infinite regress of movers, stating it 'is impossible' because then there would be 'no first mover, and, consequently, no other mover.'"}, {"text": "The motion must originate from a self-moving gear within the mechanism.", "isCorrect": false, "rationale": "Aquinas argues, 'it is not possible that the same thing should be at once in actuality and potentiality in the same respect... Therefore, it is impossible that in the same respect and in the same way a thing should be both mover and moved, i.e. that it should move itself.'"}, {"text": "There must be an unmoved first mover, analogous to a spring or power source, that initiates the motion without being moved by another part of the clockwork.", "isCorrect": true, "rationale": "The First Way concludes: 'Therefore it is necessary to arrive at a first mover, put in motion by no other; and this everyone understands to be God.' A spring or power source acts as an external initiator of motion, not moved by the internal gears themselves."}, {"text": "The concept of motion is an illusion, and thus no first mover is required.", "isCorrect": false, "rationale": "Aquinas begins by stating, 'It is certain, and evident to our senses, that in the world some things are in motion,' affirming the reality of motion as an observable fact."}], "id": "q04"}, {"question": "Imagine a series of dominoes falling, where each falling domino causes the next one to fall. Applying Aquinas's Second Way (argument from efficient causation), what logical conclusion is drawn about the origin of this chain?", "options": [{"text": "The chain of dominoes could extend infinitely backward, with no ultimate beginning.", "isCorrect": false, "rationale": "Aquinas states, 'in efficient causes it is not possible to go on to infinity, because in all efficient causes following in order, the first is the cause of the intermediate cause, and the intermediate is the cause of the ultimate cause.'"}, {"text": "The first domino in the series must have caused itself to fall.", "isCorrect": false, "rationale": "The Second Way explicitly states, 'There is no case known (neither is it, indeed, possible) in which a thing is found to be the efficient cause of itself; for so it would be prior to itself, which is impossible.'"}, {"text": "There must be an uncaused first cause that initiated the falling of the first domino, as nothing can be the efficient cause of itself.", "isCorrect": true, "rationale": "Aquinas argues that if there were no first cause, there would be no intermediate or ultimate causes. Therefore, 'it is necessary to posit some first efficient cause, to which everyone gives the name of God' (implied by the conclusion of the partial text and consistent with the structure of the Five Ways)."}, {"text": "The concept of causation is subjective, and therefore no definitive origin can be determined.", "isCorrect": false, "rationale": "Aquinas begins with the premise, 'In the world of sense we find there is an order of efficient causes,' treating causation as an objective and observable feature of reality."}], "id": "q05"}, {"question": "Aquinas argues that the proposition 'God exists' is self-evident *in itself* but not self-evident *to us*. What is his primary reason for asserting that it is not self-evident *to us*?", "options": [{"text": "Because humans naturally desire happiness and often misunderstand what constitutes true happiness.", "isCorrect": false, "rationale": "This point (Reply Obj. 1) explains why a general knowledge of God might be implanted, but it's not the primary reason why the specific proposition 'God exists' isn't self-evident to us in the absolute sense."}, {"text": "Because we do not know the essence of God, even though the predicate (existence) is included in the subject (God's essence).", "isCorrect": true, "rationale": "Aquinas states, 'Now because we do not know the essence of God, the proposition is not self-evident to us; but needs to be demonstrated by things that are more known to us, though less known in their nature—namely, by effects.'"}, {"text": "Because the word 'God' can be understood differently by various people, some believing God to be a body.", "isCorrect": false, "rationale": "This is a point made in Reply Obj. 2, but it's secondary to the fundamental reason that even if everyone understands the definition, actual existence still needs to be demonstrated if not 'known' from essence."}, {"text": "Because it is possible to mentally admit the opposite, as stated in Psalm 52:1 ('The fool said in his heart, There is no God').", "isCorrect": false, "rationale": "This is Aquinas's 'On the contrary' argument, demonstrating *that* it is not self-evident to us. The *reason why* it's not self-evident to us (despite being self-evident in itself) is our lack of knowledge of God's essence, as explained in the 'I answer that' section."}], "id": "q06"}, {"question": "When Aquinas states that the proposition 'God exists' is 'self-evident in itself,' what does he mean by this?", "options": [{"text": "That everyone universally acknowledges God's existence without needing proof.", "isCorrect": false, "rationale": "This would mean it's self-evident 'to us,' which Aquinas explicitly denies. The 'self-evident in itself' refers to the intrinsic truth of the statement, not its recognition by all."}, {"text": "That God's existence can be proven through a priori reasoning, independent of experience.", "isCorrect": false, "rationale": "While true that a priori reasoning attempts this, Aquinas's point here is about the nature of the proposition itself, specifically the relationship between its subject and predicate, rather than a method of proof."}, {"text": "That the predicate (existence) is identical with the subject (God), meaning God's essence is His existence.", "isCorrect": true, "rationale": "Aquinas explains, 'A proposition is self-evident because the predicate is included in the essence of the subject... I say that this proposition, “God exists,” of itself is self-evident, for the predicate is the same as the subject, because God is His own existence as will be hereafter shown (Q. 3, Art. 4).'"}, {"text": "That the concept of God is naturally implanted in all humans from birth.", "isCorrect": false, "rationale": "This refers to a 'general and confused way' of knowing God (Reply Obj. 1), which is distinct from the proposition 'God exists' being self-evident in itself in an absolute, essential sense."}], "id": "q07"}, {"question": "In Objection 2 of 'Whether the Existence of God Is Self-Evident?', an argument similar to Anselm's ontological proof is presented: God is 'that thing than which nothing greater can be conceived,' and actual existence is greater than mental existence, so God must actually exist. How does Aquinas respond to this specific objection?", "options": [{"text": "He agrees with the objection, conceding that God's existence is indeed self-evident to those who understand the term.", "isCorrect": false, "rationale": "Aquinas explicitly refutes the idea that God's existence is self-evident to us, so he would not concede this point."}, {"text": "He argues that understanding the word 'God' to signify 'that than which nothing greater can be thought' only implies mental existence, not actual existence, unless actual existence is already assumed.", "isCorrect": true, "rationale": "Aquinas's Reply Obj. 2 states: 'granted that everyone understands that by this word “God” is signified something than which nothing greater can be thought, nevertheless, it does not therefore follow that he understands that what the word signifies exists actually, but only that it exists mentally. Nor can it be argued that it actually exists, unless it be admitted that there actually exists something than which nothing greater can be thought; and this precisely is not admitted by those who hold that God does not exist.'"}, {"text": "He counters by asserting that the concept of 'something than which nothing greater can be thought' is inherently contradictory and cannot exist.", "isCorrect": false, "rationale": "Aquinas does not dispute the *concept* itself, but rather the leap from mental concept to actual existence without prior assumption of actual existence."}, {"text": "He states that the objection wrongly conflates the concept of 'God' with 'Primal Truth,' which is a separate issue.", "isCorrect": false, "rationale": "This response pertains to Objection 3, not Objection 2."}], "id": "q08"}, {"question": "In Objection 1 of 'Whether God Exists?', the existence of evil in the world is presented as an argument against God's existence. How does Aquinas *directly* address this objection within the provided text from 'Summa Theologica I, Q. 2, Art. 3'?", "options": [{"text": "He does not directly address the problem of evil in this specific section, but rather proceeds to present his positive arguments for God's existence.", "isCorrect": true, "rationale": "After listing Objection 1 (evil in the world) and Objection 2 (natural/human reason as sufficient explanation), Aquinas's 'On the contrary' simply quotes Exodus 3:14 and then proceeds directly into 'I answer that, The existence of God can be proved in five ways,' without offering a direct reply to the problem of evil within this provided excerpt."}, {"text": "He argues that evil is merely the absence of good and thus does not contradict God's infinite goodness.", "isCorrect": false, "rationale": "While this is a common Thomistic response to the problem of evil, it is not found in the provided text for this specific question (Summa Theologica I, Q. 2, Art. 3)."}, {"text": "He suggests that evil exists due to human free will, which is a necessary component of a greater good.", "isCorrect": false, "rationale": "This is another possible philosophical response, but it is not present in the provided excerpt."}, {"text": "He posits that evil serves a divine purpose, though it is incomprehensible to human reason.", "isCorrect": false, "rationale": "This is a theological argument, but it is not used by Aquinas in the provided text to directly address the objection from evil."}], "id": "q09"}, {"question": "The 'impossibility of an infinite regress' is a critical premise in Aquinas's First and Second Ways. What fundamental principle or assumption about chains of causation/motion does this premise rely upon?", "options": [{"text": "That all causes must be physical and observable within the natural world.", "isCorrect": false, "rationale": "While Aquinas starts with observable physical phenomena, the core of the regress argument is about the dependency of causes, not necessarily their physicality or observability. The ultimate cause he argues for is not physical."}, {"text": "That every series of causes or movers must have a finite duration in time.", "isCorrect": false, "rationale": "The arguments are primarily about *hierarchical* or *dependent* chains of causes (e.g., the staff moving only because the hand moves it), not necessarily chronological duration. A chain could be infinite in time but still dependent, if there is no ultimate ground. Aquinas's argument focuses on the necessity of a *first* cause/mover in the order of dependence, not necessarily the beginning of time."}, {"text": "That a series of dependent causes cannot operate without an independent, ultimate cause that initiates or sustains the entire chain.", "isCorrect": true, "rationale": "Aquinas argues that 'subsequent movers move only inasmuch as they are put in motion by the first mover' and 'if there be no first cause among efficient causes, there will be no ultimate, nor any intermediate cause.' This shows that for a series of *dependent* causes or movers to exist and operate *now*, there must be a cause that is not itself dependent on a prior cause in that series."}, {"text": "That the universe is inherently orderly and follows predictable laws, preventing true randomness.", "isCorrect": false, "rationale": "While order is mentioned in the Fifth Way, the impossibility of infinite regress in the First and Second Ways is about the logical necessity of a first cause for dependent chains to exist, regardless of overall predictability or randomness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
