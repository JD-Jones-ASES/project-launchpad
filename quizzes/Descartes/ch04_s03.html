<script>
var QUESTIONS = [{"question": "What is Descartes' primary objective in Meditation III, as introduced by the textbook section?", "options": [{"text": "To re-establish the certainty of sensory perceptions, which he had previously doubted.", "isCorrect": false, "rationale": "Descartes explicitly states he 'afterwards recognised as being dubious' things apprehended by the senses. His objective is not to re-establish sensory perceptions but to find a surer foundation for knowledge."}, {"text": "To prove the existence of God, thereby guaranteeing the principle that clear and distinct perceptions are true.", "isCorrect": true, "rationale": "The introductory text states: 'Even the cogito rests on the principle that what he perceives clearly and distinctly is true. But what guarantees that principle? Only God — if God exists and is not a deceiver. Meditation III is Descartes' attempt to prove that God exists.'"}, {"text": "To classify all types of thought (ideas, volitions, judgments) and identify where error can primarily be found.", "isCorrect": false, "rationale": "While he does classify thoughts, this is a method he uses within the meditation to address the larger problem, not his primary objective for the entire meditation."}, {"text": "To demonstrate that all ideas related to corporeal things are vain and false, without exception.", "isCorrect": false, "rationale": "Descartes initially 'esteem[s] them as vain and false' as a methodological doubt, but his goal is to establish a more certain foundation for knowledge, not simply to dismiss all corporeal ideas definitively without further inquiry."}]}, {"question": "When Descartes examines his own nature as a 'thinking thing,' which of the following mental activities does he *not* explicitly list as one of his modes of thought?", "options": [{"text": "Doubting", "isCorrect": false, "rationale": "Descartes explicitly states he is a thing 'that doubts'."}, {"text": "Remembering", "isCorrect": true, "rationale": "While 'remembering' is a common mental activity, Descartes does not explicitly list it among the modes of thought he identifies in the provided text (doubts, affirms, denies, knows, is ignorant, loves, hates, wills, desires, imagines, perceives)."}, {"text": "Imagining", "isCorrect": false, "rationale": "Descartes explicitly states he is a thing 'that also imagines'."}, {"text": "Perceiving", "isCorrect": false, "rationale": "Descartes explicitly states he is a thing 'that also imagines and perceives'."}]}, {"question": "Descartes establishes the general rule that 'all things which I perceive very clearly and very distinctly are true.' What is the immediate justification he provides for this rule?", "options": [{"text": "The undeniable certainty of sensory experiences.", "isCorrect": false, "rationale": "Descartes explicitly states he 'afterwards recognised as being dubious' things apprehended by the senses, making sensory experience an unreliable foundation."}, {"text": "The inherent trustworthiness of natural impulses or inclinations.", "isCorrect": false, "rationale": "Descartes later critiques natural impulses, noting they 'often enough led me to the part that was worse' and are not reliable for distinguishing truth from error."}, {"text": "The clear and distinct perception of his own existence (the cogito).", "isCorrect": true, "rationale": "He states: 'Certainly in this first knowledge [that I am a thinking thing] there is nothing that assures me of its truth, excepting the clear and distinct perception of that which I state... and accordingly it seems to me that already I can establish as a general rule that all things which I perceive very clearly and very distinctly are true.'"}, {"text": "The self-evident truth of mathematical axioms like two and three making five.", "isCorrect": false, "rationale": "While he acknowledges the clarity of mathematical truths, these are later subjected to the 'deceiving God' doubt, not used as the *immediate* justification for the general rule itself, which is drawn from the cogito."}]}, {"question": "According to Descartes, where does the principal and commonest error in his thoughts reside?", "options": [{"text": "In the content of ideas themselves, such as imagining a chimera or a goat.", "isCorrect": false, "rationale": "Descartes clarifies: 'if we consider them only in themselves and do not relate them to anything else beyond themselves, they cannot properly speaking be false; for whether I imagine a goat or a chimera, it is not less true that I imagine the one that the other.'"}, {"text": "In volitions or affections, like desiring evil things or fearing something.", "isCorrect": false, "rationale": "Descartes states: 'We must not fear likewise that falsity can enter into will and into affections, for although I may desire evil things, or even things that never existed, it is not the less true that I desire them.'"}, {"text": "In judgments, specifically in affirming that ideas are similar or conformable to things existing outside of him.", "isCorrect": true, "rationale": "Descartes concludes: 'Thus there remains no more than the judgments which we make, in which I must take the greatest care not to deceive myself. But the principal error and the commonest which we may meet with in them, consists in my judging that the ideas which are in me are similar or conformable to the things which are outside me.'"}, {"text": "In the spontaneous inclination (taught by nature) to believe in the existence of external objects.", "isCorrect": false, "rationale": "While this spontaneous inclination leads to error, it is the *judgment* based on this inclination that constitutes the principal error, not the inclination itself as a form of thought."}]}, {"question": "If Descartes had *not* considered the possibility that a powerful God might have endowed him with a nature that could be deceived even concerning things that seemed most manifest, what would be the immediate consequence for his quest for certainty?", "options": [{"text": "He would be unable to doubt sensory perceptions and would trust them fully.", "isCorrect": false, "rationale": "Descartes had already found sensory perceptions dubious even before introducing the deceiving God possibility, based on past experiences."}, {"text": "The general rule that clearly and distinctly perceived things are true would be immediately and fully established, requiring no further proof of God.", "isCorrect": true, "rationale": "Descartes states that the reason for doubting things like 'two and three together made five' was 'that it came into my mind that perhaps a God might have endowed me with such a nature that I may have been deceived even concerning things which seemed to me most manifest.' Without this doubt, the general rule would stand without needing God to guarantee it."}, {"text": "He would have to conclude that all his ideas are innate and do not come from external sources.", "isCorrect": false, "rationale": "The origin of ideas (innate, adventitious, fictitious) is a separate inquiry from the doubt introduced by the deceiving God hypothesis."}, {"text": "He would necessarily accept that all natural impulses lead to truth and should be followed.", "isCorrect": false, "rationale": "Descartes evaluates natural impulses separately and finds them unreliable for truth, regardless of the deceiving God doubt."}]}, {"question": "Descartes classifies ideas into innate, adventitious, and fictitious. Which type of idea is explicitly defined as coming from outside the mind, through the senses, and is exemplified by one of his ideas of the sun?", "options": [{"text": "Innate ideas", "isCorrect": false, "rationale": "Innate ideas are presented as originating from one's own nature or inherent faculties, not from external senses."}, {"text": "Adventitious ideas", "isCorrect": true, "rationale": "The text explicitly defines 'adventitious ideas' as 'Ideas that seem to come from outside the mind, through the senses,' and gives the sensory idea of the sun as an example."}, {"text": "Fictitious ideas", "isCorrect": false, "rationale": "Fictitious ideas are described as 'formed [or invented] by myself,' like sirens or hippogryphs."}, {"text": "Volitions", "isCorrect": false, "rationale": "Volitions are a category of thought related to willing or desiring, distinct from ideas which are 'images of the things'."}]}, {"question": "When Descartes states he is 'taught by nature' to believe that ideas proceed from certain external objects, what does he mean by 'nature' in this specific context?", "options": [{"text": "A divine revelation directly from God, indicating external existence.", "isCorrect": false, "rationale": "Descartes has not yet proven God's existence or non-deceiving nature, and he distinguishes this 'nature' from a 'natural light' which he would trust."}, {"text": "A natural light which makes him recognize that it is undeniably true.", "isCorrect": false, "rationale": "Descartes clearly differentiates: 'When I say that I am so instructed by nature, I merely mean a certain spontaneous inclination which impels me to believe in this connection, and not a natural light which makes me recognise that it is true.'"}, {"text": "A spontaneous inclination or impulse that he feels to believe in external origins.", "isCorrect": true, "rationale": "Descartes explicitly clarifies: 'When I say that I am so instructed by nature, I merely mean a certain spontaneous inclination which impels me to believe in this connection, and not a natural light which makes me recognise that it is true.'"}, {"text": "The outcome of rigorous mathematical or geometrical reasoning concerning external bodies.", "isCorrect": false, "rationale": "His discussion of natural impulses is distinct from any mathematical reasoning; he uses the example of feeling heat, which is a sensory experience, not a mathematical deduction."}]}, {"question": "Descartes critiques the argument that ideas must proceed from external objects because they do not depend on his will. What alternative explanation does he propose for the independence of these ideas from his will?", "options": [{"text": "That a powerful, deceiving God could be implanting these ideas in his mind against his will.", "isCorrect": false, "rationale": "While the deceiving God is a general doubt, he doesn't specifically propose it as the *explanation* for ideas being independent of his will in this particular critique; he offers a more direct alternative."}, {"text": "That these ideas are actually innate, despite appearing to be adventitious.", "isCorrect": false, "rationale": "He acknowledges the possibility that all ideas could be innate, adventitious, or fictitious, but this is not the specific alternative explanation for their independence from his will."}, {"text": "That there might be an unknown internal faculty within him capable of producing these ideas without external assistance, even subconsciously.", "isCorrect": true, "rationale": "Descartes states: 'For just as these impulses of which I have spoken are found in me, notwithstanding that they do not always concur with my will, so perhaps there is in me some faculty fitted to produce these ideas without the assistance of any external things, even though it is not yet known by me; just as, apparently, they have hitherto always been found in me during sleep without the aid of any external objects.'"}, {"text": "That his senses are simply faulty and unreliable, thereby generating ideas that seem external.", "isCorrect": false, "rationale": "He has already acknowledged the unreliability of senses, but this alternative specifically addresses the *source* of the ideas that seem independent of his will."}]}, {"question": "Descartes uses the example of two completely diverse ideas of the sun (one from the senses, one from astronomical reasoning) to illustrate what crucial point?", "options": [{"text": "That all sensory ideas are inherently false and should be disregarded.", "isCorrect": false, "rationale": "He does not conclude that *all* sensory ideas are false, but rather questions their resemblance to external objects."}, {"text": "That astronomical reasoning is the only reliable source of knowledge about the physical world.", "isCorrect": false, "rationale": "He is still in the process of establishing what can be reliably known; he does not conclude that only astronomical reasoning is reliable at this stage."}, {"text": "That even if ideas proceed from external objects, it is not a necessary consequence that they should resemble those objects.", "isCorrect": true, "rationale": "He states: 'And finally, though they did proceed from objects different from myself, it is not a necessary consequence that they should resemble these.' He then uses the sun example to show that the sensory idea, though seemingly direct, is less likely to resemble the actual object than the astronomically derived idea."}, {"text": "That fictitious ideas can sometimes be more accurate than adventitious ones.", "isCorrect": false, "rationale": "He classifies the astronomical idea as 'innate... or else it is formed by me in some other manner,' but the point is about resemblance, not a direct comparison of accuracy between adventitious and fictitious."}]}, {"question": "At the end of the provided text, what is Descartes' provisional conclusion regarding his belief that things exist outside of him and that his ideas resemble them?", "options": [{"text": "It is a certainty established by clear and distinct perception, now that he has examined it.", "isCorrect": false, "rationale": "He has just spent considerable effort critiquing the reasons for believing this, concluding it's not based on certain judgment."}, {"text": "It is a certainty guaranteed by the natural light of reason, which cannot be doubted.", "isCorrect": false, "rationale": "He explicitly distinguished 'natural light' from 'spontaneous inclination' and found the latter unreliable."}, {"text": "It is a belief based on a 'blind impulse' or spontaneous inclination, rather than a certain and premeditated judgment.", "isCorrect": true, "rationale": "He concludes: 'All this causes me to believe that until the present time it has not been by a judgment that was certain [or premeditated], but only by a sort of blind impulse that I believed that things existed outside of, and different from me, which... conveyed these ideas or images to me [and imprinted on me their similitudes].'"}, {"text": "It is a belief that must be true, as a non-deceiving God would not allow such a fundamental error.", "isCorrect": false, "rationale": "He has not yet proven the existence of a non-deceiving God; this is the very problem he aims to solve in Meditation III."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
