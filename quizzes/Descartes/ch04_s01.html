<script>
var QUESTIONS = [{"question": "According to Descartes, why is the existence of God philosophically necessary even after establishing the 'cogito'?", "options": [{"text": "To prove the existence of an external world, which the cogito cannot do alone.", "isCorrect": false, "rationale": "While the external world's existence is a later goal, Descartes primarily needs God to validate his criterion of truth, not directly to prove the world's existence at this stage. The problem is about the reliability of his faculties, not just the existence of objects."}, {"text": "To overcome the evil genius hypothesis and guarantee the reliability of clear and distinct perceptions.", "isCorrect": true, "rationale": "The text explicitly states that the evil genius hypothesis 'remains in force' after the cogito, making even clear and distinct perceptions potentially unreliable. God is needed as a 'philosophical guarantor of truth' to neutralize this doubt and validate his criterion of truth."}, {"text": "To establish a religious foundation for his philosophical system, aligning it with theological doctrines.", "isCorrect": false, "rationale": "The text clarifies that Descartes needs God 'not merely as a religious or theological conclusion, but as a philosophical guarantor of truth.' His motivation is epistemic, not primarily theological."}, {"text": "To explain the origin of his own existence as a thinking thing.", "isCorrect": false, "rationale": "The cogito already establishes his existence as a thinking thing. While God's role as creator might be implied, the immediate philosophical necessity described is for validating his faculty of reason against the evil genius, not explaining his initial existence."}]}, {"question": "What is Descartes' 'criterion of truth' that he articulates before proving God's existence?", "options": [{"text": "Any idea that can be derived through logical deduction from the cogito.", "isCorrect": false, "rationale": "While deduction is important, Descartes' stated criterion of truth is specifically 'clear and distinct perception,' not merely ideas derivable from the cogito, though the cogito is an example of such a perception."}, {"text": "Ideas that are universally agreed upon by all rational beings.", "isCorrect": false, "rationale": "Descartes' method is individualistic and based on introspection, not on consensus or universal agreement. The text makes no mention of universal agreement as a criterion."}, {"text": "Perceptions that are fully present to the attentive mind, with nothing hidden, and sharply separated from all other ideas.", "isCorrect": true, "rationale": "This is the precise definition provided in the text for 'clear and distinct perception,' which Descartes identifies as his working criterion for truth."}, {"text": "Sensory experiences that are vivid and coherent, free from contradiction.", "isCorrect": false, "rationale": "Descartes is trying to escape reliance on sensory experiences due to the problem of illusion and the evil genius. His criterion relies on mental clarity and distinctness, not vivid sensory input."}]}, {"question": "Why does Descartes recognize that his criterion of clear and distinct perception cannot be fully trusted without God's guarantee?", "options": [{"text": "Because human reason is inherently limited and prone to error without divine guidance.", "isCorrect": false, "rationale": "While human reason is fallible, the specific problem Descartes identifies is the 'evil genius' hypothesis, which could make false things appear clear and distinct. It's not just general fallibility but the potential for systematic deception."}, {"text": "Because clear and distinct perceptions are subjective and lack objective validation.", "isCorrect": false, "rationale": "Descartes believes clear and distinct perceptions can be objectively true; the problem is whether a deceiver could manipulate them, not that they are inherently subjective in a way that precludes truth."}, {"text": "Because a powerful deceiver might arrange his mind so that false things appear clear and distinct to him.", "isCorrect": true, "rationale": "The text explicitly states: 'If the evil genius could be deceiving him about mathematics, the evil genius might also be arranging his mind so that false things seem clear and distinct.' This highlights the need for a non-deceiving God."}, {"text": "Because without God, there is no ultimate purpose or meaning to human knowledge.", "isCorrect": false, "rationale": "Descartes' concern here is epistemological — the reliability of knowledge — rather than existential or teleological (purpose/meaning)."}]}, {"question": "Which of the following best describes the 'causal adequacy principle' as used by Descartes?", "options": [{"text": "All effects must have a cause, and that cause must be observable.", "isCorrect": false, "rationale": "Descartes uses the principle that an effect cannot exceed its cause in reality, but he doesn't limit causes to observable ones; in fact, God is not directly observable."}, {"text": "The cause of an idea must possess at least as much reality as the idea represents.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'the cause of an idea must possess at least as much reality as the idea represents. You cannot get more from less.' This principle is central to his argument for God's existence from the idea of God."}, {"text": "Complex ideas must be caused by simpler, more fundamental ideas.", "isCorrect": false, "rationale": "While Descartes is interested in foundational ideas, the causal adequacy principle relates to the 'reality' or perfection contained in an idea and its cause, not simply its complexity or simplicity."}, {"text": "Every event in the universe has a sufficient reason for its existence.", "isCorrect": false, "rationale": "This is closer to Leibniz's principle of sufficient reason. Descartes' principle is specific to the 'reality' of ideas and their causes, particularly regarding infinite objective reality."}]}, {"question": "In Descartes' argument, what distinguishes the 'objective reality' of an idea from its 'formal reality'?", "options": [{"text": "Formal reality refers to the reality of an idea as it exists in the mind, while objective reality refers to its correspondence with an external object.", "isCorrect": false, "rationale": "This is incorrect. Formal reality is the reality a thing has in itself (e.g., a stone has formal reality, Descartes has formal reality). Objective reality is the reality an idea has *as representing something*. The idea itself, as a mental event, has formal reality, but its objective reality is determined by what it represents."}, {"text": "Formal reality is the reality of a thing's actual existence, while objective reality is the reality of the thing as represented within an idea.", "isCorrect": true, "rationale": "The text states: 'Formal reality is the reality a thing has in itself — the reality of actually existing.' And 'Objective reality is the reality an idea has as representing something.' This distinction is crucial for the causal argument."}, {"text": "Objective reality refers to scientific, measurable reality, whereas formal reality refers to philosophical, conceptual reality.", "isCorrect": false, "rationale": "This is a modern interpretation and does not align with Descartes' technical usage, which predates modern scientific distinctions in this way."}, {"text": "Formal reality is limited to finite beings, while objective reality can only be attributed to infinite beings.", "isCorrect": false, "rationale": "Both finite and infinite beings have formal reality (if they exist). Ideas of both finite and infinite beings have objective reality. The distinction is about *what kind* of reality."}]}, {"question": "Descartes argues that his idea of God must have an external cause because:", "options": [{"text": "All human ideas are ultimately derived from sensory experience of the external world.", "isCorrect": false, "rationale": "Descartes has not yet proven the existence of the external world, and his method relies on innate ideas or intellectual intuition, not solely sensory experience."}, {"text": "He, as a finite being, cannot be the original source of an idea representing an infinite, all-perfect being.", "isCorrect": true, "rationale": "This directly applies the causal adequacy principle: 'a finite being cannot be the original source of the idea of an infinite being. The cause must have at least as much reality as the idea represents.' Since the idea of God has infinite objective reality, its cause must have infinite formal reality, which Descartes (a finite being) lacks."}, {"text": "He perceives the idea of God clearly and distinctly, which necessitates an objective, mind-independent cause.", "isCorrect": false, "rationale": "While he perceives it clearly and distinctly, this perception itself is what needs validating by God. The argument for God's existence comes from the content of the idea (infinite objective reality), not just the clarity of its perception."}, {"text": "Religious tradition and scripture confirm the existence of a creator God.", "isCorrect": false, "rationale": "Descartes' project is to establish truth through reason, independent of traditional authority or scripture, at least initially. His argument is philosophical, not theological in its starting point."}]}, {"question": "What does it mean for a cause to contain a perfection 'eminently' rather than 'formally'?", "options": [{"text": "To contain it in a less perfect, generalized form, such as a blueprint contains a building.", "isCorrect": false, "rationale": "Eminently means 'in a higher degree or more perfect form,' not a less perfect or generalized form. The sun containing warmth eminently means it has more than enough power to produce heat, not less."}, {"text": "To contain it indirectly through secondary causes, without direct involvement.", "isCorrect": false, "rationale": "Eminence refers to the *degree of perfection* in the cause, not necessarily the directness of involvement. God's eminent possession of perfections allows Him to be a direct cause, not an indirect one."}, {"text": "To contain it in a higher degree or more perfect form than it appears in the effect.", "isCorrect": true, "rationale": "This is the definition given in the text: 'To contain something eminently is to contain it in a higher degree or more perfect form than it appears in the effect.'"}, {"text": "To contain it universally, applying to all instances, rather than specifically.", "isCorrect": false, "rationale": "While God's perfections are universal, 'eminently' specifically refers to the *degree* of reality or perfection, not its universality in application."}]}, {"question": "The 'Cartesian Circle' objection challenges Descartes' argument by suggesting:", "options": [{"text": "His proof for God's existence relies on an unproven assumption about the nature of causality.", "isCorrect": false, "rationale": "While the causal adequacy principle is a premise, the Cartesian Circle specifically points to the interdependency of God's existence and the criterion of clear and distinct perception."}, {"text": "He uses clear and distinct perception to prove God's existence, and then uses God's existence to validate clear and distinct perception.", "isCorrect": true, "rationale": "This is the classic formulation of the Cartesian Circle as explained in the 'thinkdeeper' box: 'he uses clear and distinct perception to prove God exists, and then uses God's existence to validate clear and distinct perception.'"}, {"text": "His argument is not sufficiently rigorous to convince skeptics who doubt all forms of reason.", "isCorrect": false, "rationale": "The circle objection is a logical flaw within the structure of his argument, not merely a failure to convince extreme skeptics about the general power of reason."}, {"text": "He fails to distinguish between subjective certainty and objective truth, leading to an unreliable conclusion.", "isCorrect": false, "rationale": "The circle is about the *validation* of the tool (clear and distinct perception) he uses to reach objective truth, not a confusion between subjective and objective truth itself."}]}, {"question": "How does Descartes' argument for God's existence in Meditation III differ from Thomas Aquinas's Five Ways?", "options": [{"text": "Aquinas argues from innate ideas, while Descartes argues from observed effects in the world.", "isCorrect": false, "rationale": "This is precisely the opposite of what the text states. The 'caution' box clarifies: 'Aquinas's Five Ways argue from effects in the observable world to God as their cause... Descartes' argument in Meditation III argues entirely from what is found within the mind itself: the idea of God.'"}, {"text": "Aquinas focuses on logical necessity, while Descartes emphasizes empirical evidence.", "isCorrect": false, "rationale": "Both employ rational arguments. However, Aquinas's arguments start from empirical observations, while Descartes' starts from an idea in the mind, making it less 'empirical' in the sense of external world observations."}, {"text": "Descartes argues from what is found within the mind (the idea of God), whereas Aquinas argues from effects in the observable external world.", "isCorrect": true, "rationale": "As per the 'caution' box: 'Aquinas's Five Ways argue from effects in the observable world to God as their cause... Descartes' argument in Meditation III argues entirely from what is found within the mind itself: the idea of God.'"}, {"text": "Descartes' argument is theological, while Aquinas's is purely philosophical.", "isCorrect": false, "rationale": "Both are philosophical arguments for God, though Aquinas's are often framed within a broader theological context. Descartes' necessity for God is explicitly stated as philosophical, not just theological."}]}, {"question": "Considering the 'thinkdeeper' prompt, if the cogito itself is a clear and distinct perception, what might be a potential implication for the Cartesian Circle?", "options": [{"text": "It means the cogito is also susceptible to the evil genius's deception, undermining all certainty.", "isCorrect": false, "rationale": "The cogito is presented as an 'isolated island of certainty' that withstands the evil genius in the moment of perception. The problem arises for *other* clear and distinct perceptions or for the cogito remembered later, not for the immediate cogito itself."}, {"text": "It suggests that at least one clear and distinct perception can be trusted even without God's guarantee, potentially offering a way out of the circle.", "isCorrect": true, "rationale": "If the cogito is a clear and distinct perception that is *unquestionably* true in the moment it is perceived (as Descartes asserts it is, even under the evil genius), then it could serve as a foundational, non-circularly validated instance of clear and distinct perception, from which other truths might then be built or justified, potentially resolving or mitigating the circle."}, {"text": "It confirms that God's existence must be assumed first for any knowledge to be reliable.", "isCorrect": false, "rationale": "If the cogito is independently certain, then God's existence isn't needed for *all* knowledge, only for the general reliability of the faculty of clear and distinct perception beyond that immediate moment. The circle assumes God is needed for the *principle* itself, not the singular cogito."}, {"text": "It proves that the evil genius hypothesis is inherently contradictory and cannot stand.", "isCorrect": false, "rationale": "The cogito does not prove the evil genius hypothesis is contradictory; it only shows that even under such a hypothesis, the 'I exist' is certain. The evil genius could still deceive about other C&D perceptions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
