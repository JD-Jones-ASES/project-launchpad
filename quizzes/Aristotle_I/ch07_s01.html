<script>
var QUESTIONS = [{"question": "How does Aristotle view the relationship between the analysis of the good life for an individual and for a city?", "options": [{"text": "They are separate disciplines, one focusing on personal morality, the other on governance.", "isCorrect": false, "rationale": "The text explicitly states that ethics and politics are 'not two separate disciplines but one unified inquiry'."}, {"text": "They are fundamentally the same analysis, part of a unified inquiry into human flourishing.", "isCorrect": true, "rationale": "Aristotle asserts that 'the analysis of the good life for the individual and the good life for the city is, at bottom, the same analysis,' reflecting his conviction that ethics and politics are a 'unified inquiry into human flourishing'."}, {"text": "They are two distinct inquiries that happen to share some common principles.", "isCorrect": false, "rationale": "While sharing common principles, Aristotle emphasizes a deeper unity, stating it's 'at bottom, the same analysis,' not just a casual commonality."}, {"text": "The analysis of the good life for a city is a prerequisite for understanding individual ethics.", "isCorrect": false, "rationale": "The text implies a unified approach where one informs the other, rather than one being a strict prerequisite in this foundational sense."}], "id": "q01"}, {"question": "According to Aristotle, what is the primary characteristic that defines a 'good state'?", "options": [{"text": "Its economic prosperity and ability to amass wealth for its citizens.", "isCorrect": false, "rationale": "The text explicitly states, 'The wealthiest or most powerful city is not necessarily the best city.' Aristotle argues against external goods as the measure of goodness."}, {"text": "Its cultivation of virtuous citizens and just institutions governing for the common good.", "isCorrect": true, "rationale": "The text clarifies that 'Goodness for a city, as for a person, consists in the activity of virtue: just institutions, educated citizens, and leaders who govern for the common good'."}, {"text": "Its military might and capacity to protect its borders and interests.", "isCorrect": false, "rationale": "Similar to wealth, military power is an external good and not the ultimate measure of a state's goodness for Aristotle. Goodness lies in virtue."}, {"text": "Its efficiency in administration and regulation of public affairs.", "isCorrect": false, "rationale": "While efficiency can be beneficial, it is not the primary defining characteristic of a 'good state' in Aristotle's view, which prioritizes virtue and the common good."}], "id": "q02"}, {"question": "Aristotle argues that education is the legislator's first concern primarily because:", "options": [{"text": "It ensures citizens are productive workers, boosting the state's economy.", "isCorrect": false, "rationale": "While productivity can be a byproduct, Aristotle's core argument for education's primacy is structural: the character of citizens upholding laws, not economic output."}, {"text": "The effectiveness and integrity of laws and institutions depend on the character of the citizens who uphold them.", "isCorrect": true, "rationale": "Aristotle's argument is that 'laws and institutions are only as good as the people who uphold them.' Without educated, virtuous citizens, even perfect laws will be corrupted."}, {"text": "It fosters national pride and loyalty to the state's leaders.", "isCorrect": false, "rationale": "This is a potential secondary benefit, but Aristotle's primary reasoning focuses on the foundational role of education in preventing the 'seeds of destruction' within any constitution."}, {"text": "It prevents social unrest by keeping the youth occupied and disciplined.", "isCorrect": false, "rationale": "While discipline is a part of education, the fundamental reason for its legislative importance is the cultivation of character necessary for a state's long-term stability and just functioning, not merely preventing unrest."}], "id": "q03"}, {"question": "Which of the following best defines 'schole' in the classical sense, as described in the text?", "options": [{"text": "Time dedicated to resting and recuperating from work.", "isCorrect": false, "rationale": "The text explicitly states that 'schole' is 'not idleness' and refers to purposeful activity, distinguishing it from mere rest."}, {"text": "Purposeful activity chosen for its own sake, free from compulsion, leading to goods of the mind.", "isCorrect": true, "rationale": "The text defines 'schole' as 'Leisure, in the classical sense of time and activity free from compulsion — not idleness, but purposeful activity chosen for its own sake'."}, {"text": "Unstructured idleness or simply doing nothing.", "isCorrect": false, "rationale": "The definition explicitly refutes this, stating 'not idleness,' and emphasizes that it is 'purposeful activity'."}, {"text": "Mandatory civic duty or public service activities.", "isCorrect": false, "rationale": "Schole is characterized as 'free from compulsion,' which mandatory civic duties would contradict."}], "id": "q04"}, {"question": "The text describes Aristotle's argument for education for leisure as paradoxical because:", "options": [{"text": "Most people prioritize work over leisure, making education for leisure seem counterintuitive.", "isCorrect": false, "rationale": "While generally true, the paradox in the text specifically arises from the contrast between Aristotle's view and the common perception of education's primary purpose."}, {"text": "Modern education primarily focuses on preparing individuals for productive work, not for enjoying non-vocational activities.", "isCorrect": true, "rationale": "The text explains the paradox: 'We tend to think that education is precisely preparation for productive work... But he insists that if education does nothing more than this, it has prepared citizens for the lower half of life and neglected the higher half.'"}, {"text": "It suggests that work is less important than leisure, contradicting common societal values.", "isCorrect": false, "rationale": "Aristotle argues leisure is 'more important' than work, but the paradox comes from how this translates into the *purpose of education* compared to common beliefs about vocational training."}, {"text": "Leisure is often associated with entertainment, which Aristotle argues is not the true purpose of education.", "isCorrect": false, "rationale": "Aristotle distinguishes noble leisure from mere entertainment, but this distinction itself isn't presented as the core paradox of education for leisure."}], "id": "q05"}, {"question": "A university program that focuses exclusively on training students to operate complex machinery for a specific industry, without including humanities or arts courses, would most likely be critiqued by Aristotle for:", "options": [{"text": "Failing to produce economically self-sufficient citizens.", "isCorrect": false, "rationale": "Such a program would likely produce economically self-sufficient individuals, so this would not be Aristotle's criticism."}, {"text": "Neglecting the higher purpose of education, which is to cultivate the soul for intrinsically valuable activities.", "isCorrect": true, "rationale": "Aristotle states that if education does only preparation for productive work, 'it has prepared citizens for the lower half of life and neglected the higher half.' This vocational-only program would miss the cultivation of the soul for intrinsic goods."}, {"text": "Prioritizing practical skills over theoretical knowledge.", "isCorrect": false, "rationale": "While he distinguishes these, his deeper critique would be the lack of *liberal education* for the 'higher half' of life, not just the balance between practical and theoretical."}, {"text": "Not preparing students for leadership roles in civic engagement.", "isCorrect": false, "rationale": "While liberal education fosters civic virtues, Aristotle's primary critique would be the incomplete formation of the human being, rather than solely a lack of leadership preparation."}], "id": "q06"}, {"question": "Aristotle places music at the center of education primarily because:", "options": [{"text": "It is useful for conducting business and managing households.", "isCorrect": false, "rationale": "The text explicitly states, 'Music is not useful in the way reading is useful. It does not help you run a household, conduct business, or serve in public office.'"}, {"text": "It has a direct power to shape emotions, habituate the soul to right feelings, and contributes to noble leisure.", "isCorrect": true, "rationale": "Aristotle argues music shapes emotions, habituates the soul to 'rejoice and grieve at the right things,' and that its enjoyment 'belongs to noble leisure' as an activity for its own sake."}, {"text": "It is a source of entertainment and relaxation for citizens.", "isCorrect": false, "rationale": "Aristotle argues music belongs 'not as relaxation or entertainment, but as a formative discipline'."}, {"text": "It develops technical skills for professional performance, benefiting audiences.", "isCorrect": false, "rationale": "This is precisely the 'danger' Aristotle warns against, not his primary justification for music's central role in general education."}], "id": "q07"}, {"question": "What danger does Aristotle specifically warn against regarding music education?", "options": [{"text": "That it might distract students from more practical subjects like reading and writing.", "isCorrect": false, "rationale": "The text does not mention this as a danger; instead, music is presented as a vital component of education."}, {"text": "That it might be pursued for purely professional performance rather than for the cultivation of the individual's soul.", "isCorrect": true, "rationale": "The text states, 'The danger Aristotle warns against is making music purely professional — teaching children to perform at a technically high level for the benefit of audiences, rather than cultivating their own souls'."}, {"text": "That it could lead to an overly emotional and irrational populace.", "isCorrect": false, "rationale": "Aristotle believes music trains the emotions to 'rejoice and grieve at the right things,' implying it helps cultivate appropriate emotional responses, not irrationality."}, {"text": "That it is too expensive to implement broadly in public education systems.", "isCorrect": false, "rationale": "Cost is not discussed as a concern regarding music education in this section."}], "id": "q08"}, {"question": "Based on Aristotle's views, what would be his primary criticism of a modern educational system that heavily emphasizes STEM (Science, Technology, Engineering, Mathematics) subjects and vocational training over arts and humanities?", "options": [{"text": "It prioritizes subjects that are difficult for all students to master.", "isCorrect": false, "rationale": "Difficulty is not Aristotle's primary criterion for evaluating educational value or a basis for his criticism."}, {"text": "It risks producing technically competent individuals who are not fully formed human beings capable of noble leisure and virtue.", "isCorrect": true, "rationale": "Aristotle distinguishes between practical education (useful for work) and liberal education (for 'higher half' of life). An overemphasis on vocational/STEM without arts/humanities would mean 'a purely vocational education produces skilled workers; a liberal education produces free human beings,' leaving individuals 'only half educated'."}, {"text": "It encourages competition among students rather than cooperation.", "isCorrect": false, "rationale": "The text does not discuss competition versus cooperation as a point of criticism for educational systems."}, {"text": "It is too expensive to maintain such a specialized curriculum.", "isCorrect": false, "rationale": "Cost is not a factor in Aristotle's philosophical critique of educational priorities as presented in this section."}], "id": "q09"}, {"question": "According to Aristotle's 'caution' note, what is the ideal relationship between practical/vocational education and liberal education?", "options": [{"text": "Liberal education should entirely replace practical education, as it is higher.", "isCorrect": false, "rationale": "The 'caution' note states, 'Aristotle does not say that practical or vocational education is bad... The two are not opposites but need each other.'"}, {"text": "Practical education is necessary but inherently inferior and should be minimized.", "isCorrect": false, "rationale": "While considered 'lower,' practical education is stated to be necessary, and not something to be minimized, but rather to be integrated with liberal education."}, {"text": "They are not opposites; both are necessary, with practical formation preparing for life and liberal education forming the complete human being.", "isCorrect": true, "rationale": "The caution note explicitly states: 'The two are not opposites but need each other: liberal education without practical formation produces impractical dreamers; practical training without liberal education produces competent but unformed workers'."}, {"text": "Practical education is for common citizens, while liberal education is reserved for the elite.", "isCorrect": false, "rationale": "The text emphasizes the importance of public education for all citizens to uphold the state, implying both types are relevant for forming virtuous individuals, not just elites."}], "id": "q10"}, {"question": "The English word 'school' derives from the Greek word $schole$ (leisure). What does this etymology reveal about the original conception of education?", "options": [{"text": "That schools were originally places of rest and recuperation, where citizens recovered from the demands of civic life.", "isCorrect": false, "rationale": "$Schole$ means purposeful activity chosen for its own sake, not idleness or rest. The connection between school and leisure indicates education was conceived as free, intrinsically valued activity — not as recuperation."}, {"text": "That education was originally conceived as the free activity of fully formed citizens enjoying the goods of the mind, not primarily as preparation for employment.", "isCorrect": true, "rationale": "The text notes that 'school' deriving from $schole$ is 'a remarkable reminder that education was originally conceived as the activity of free persons enjoying the goods of the mind, not preparation for employment.' This etymology encapsulates the classical conception of education as intrinsically valuable."}, {"text": "That ancient Greek schools were exclusively for leisure activities like athletics and music, with no instruction in academic subjects.", "isCorrect": false, "rationale": "Greek education included reading, writing, gymnastics, drawing, and music. The etymology does not imply exclusion of academic subjects but rather points to the spirit in which education was pursued — as free activity, not forced utility."}, {"text": "That the Greek concept of education was fundamentally the same as the modern concept — time set aside from other work to prepare for future productivity.", "isCorrect": false, "rationale": "The text argues the opposite: modern education is oriented toward future productivity, while the Greek $schole$ conception was oriented toward intrinsic goods of the mind — the very difference the etymology highlights."}], "id": "q11"}, {"question": "Aristotle justifies including gymnastics and drawing in the educational curriculum. What specific goods does each contribute?", "options": [{"text": "Gymnastics trains theoretical reasoning; drawing trains moral virtue.", "isCorrect": false, "rationale": "This attributes the wrong goods to each subject. Gymnastics is connected to physical and moral formation (courage), and drawing to perceptual formation — not to theoretical reasoning or moral virtue respectively."}, {"text": "Gymnastics develops the body and produces courage; drawing trains the eye to perceive beauty accurately.", "isCorrect": true, "rationale": "The text states: 'Gymnastics develops the body and produces courage. Drawing trains the eye to perceive beauty accurately.' Each subject contributes a distinct dimension of human formation — physical/moral and aesthetic/perceptual."}, {"text": "Gymnastics prepares citizens for military service; drawing prepares them for professional artistic careers.", "isCorrect": false, "rationale": "While gymnastics builds strength, Aristotle's stated justification is courage — a virtue — not military service per se. And drawing's purpose is to develop the capacity to perceive beauty, not to produce professional artists."}, {"text": "Both gymnastics and drawing are instrumental subjects, included only for their practical civic applications.", "isCorrect": false, "rationale": "Gymnastics produces courage (a virtue) and drawing develops aesthetic perception — both go beyond purely instrumental civic utility and contribute to the formation of a complete human being."}], "id": "q12"}, {"question": "Aristotle argues that education 'cannot be left to private choice.' What is his structural justification for requiring public, common education?", "options": [{"text": "Private education tends to produce social inequality, which threatens the middle class foundation of political stability.", "isCorrect": false, "rationale": "While social inequality is a concern in other parts of the Politics, the specific justification for public education here is the claim about civic belonging and constitutional health, not middle-class preservation."}, {"text": "The child belongs not only to the parents but to the city, because the city's health depends on what that child becomes — every constitution depends on the character of citizens who uphold it.", "isCorrect": true, "rationale": "The text states that Aristotle 'insists that the child, in one important sense, belongs not only to the parents but to the city — because the city's health depends on what that child becomes,' and that 'laws and institutions are only as good as the people who uphold them,' making education a structural political necessity."}, {"text": "Private families are generally unqualified to transmit civic virtue; only the state has the expertise to educate citizens properly.", "isCorrect": false, "rationale": "Aristotle's argument is not about expertise or qualification but about whose interest education serves. Families may be perfectly capable but have private preferences that conflict with the common good when left entirely to themselves."}, {"text": "Public education is more economically efficient, allowing the state to concentrate resources on the subjects most useful for governance.", "isCorrect": false, "rationale": "Economic efficiency is not Aristotle's argument. His reasoning is philosophical and political: the child's civic belonging means the city has a fundamental stake in education that cannot be wholly subordinated to private family preference."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
