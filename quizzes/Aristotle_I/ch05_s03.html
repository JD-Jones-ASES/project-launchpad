        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 5, Section 3</div>

        <h2>Results</h2>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the foundational claim Aristotle makes in *Politics* regarding human nature?", "options": [{"text": "Humans are fundamentally solitary creatures who reluctantly form communities for survival.", "isCorrect": false, "rationale": "This contradicts Aristotle's central claim that humans are naturally social and political animals, whose nature is fulfilled in community."}, {"text": "Humans are by nature *politikon zoon*, meaning their nature is fulfilled only in an organized city-state.", "isCorrect": true, "rationale": "The text explicitly states this is 'one of the most quoted lines in Western political thought' and defines it as a creature whose nature is fulfilled only in the organized life of a city."}, {"text": "Humans are primarily driven by economic self-interest and form societies for mutual profit.", "isCorrect": false, "rationale": "Aristotle acknowledges living (which includes economic aspects) but emphasizes 'living well' as the city's highest purpose, distinguishing it from mere convenience or profit."}, {"text": "Humans are naturally equal, and all forms of hierarchy are artificial constructs.", "isCorrect": false, "rationale": "Aristotle's philosophy, particularly his views on natural command/obedience and slavery, contradicts the idea of natural equality among all humans."}]}, {"question": "According to Aristotle, why is the city (polis) considered 'natural' rather than merely a 'convenient arrangement'?", "options": [{"text": "Because cities are created through a social contract, which is a natural human tendency.", "isCorrect": false, "rationale": "The concept of a 'social contract' is a later philosophical idea. Aristotle argues for a natural evolution of communities, not a chosen agreement."}, {"text": "Because it is the final and most complete stage of human community, evolving naturally from smaller, simpler forms like the household and village, and existing for the highest human purpose.", "isCorrect": true, "rationale": "The text explains that the city 'grows naturally from smaller communities' and is their 'natural completion,' existing for 'the highest human purpose: not merely to live, but to live well.'"}, {"text": "Because humans instinctively prefer large aggregations of people for safety in numbers.", "isCorrect": false, "rationale": "While safety might be a benefit, Aristotle's primary reason for the city's naturalness is its role in enabling humans to 'live well,' which is a more profound purpose than mere security."}, {"text": "Because divine intervention ordained the formation of city-states.", "isCorrect": false, "rationale": "Aristotle's argument for the city's naturalness is based on human nature and the progressive development of communities, not on divine command."}]}, {"question": "If one accepts Aristotle's premise that the state is natural, how does this fundamentally alter the way governments should be evaluated, compared to viewing the state as a mere convention?", "options": [{"text": "It means governments should be evaluated based on how effectively they protect individual property rights.", "isCorrect": false, "rationale": "Focusing purely on individual interests like property rights is characteristic of evaluating the state as a 'convention,' which Aristotle contrasts with his 'natural' view."}, {"text": "It implies that a government's primary duty is to ensure the maximum freedom for its citizens to pursue their individual desires.", "isCorrect": false, "rationale": "This perspective prioritizes individual interests over the collective good, which is what Aristotle argues against if the state is natural and essential for human flourishing beyond individual pursuits."}, {"text": "It suggests that a government's legitimacy stems from its ability to fulfill the natural human need for community and enable its citizens to 'live well' collectively, rather than just serving individual interests.", "isCorrect": true, "rationale": "The text states that if the state is natural, a human being cut off from it is 'less than fully human,' implying the state serves a higher collective purpose beyond individual convenience or profit, focused on enabling a 'good life.'"}, {"text": "It mandates a democratic form of government as the only natural political structure.", "isCorrect": false, "rationale": "Aristotle's argument for the naturalness of the state does not prescribe a specific form of government, but rather establishes the necessity of political community itself for human flourishing."}]}, {"question": "According to Aristotle's reasoning from origins, what is the correct hierarchical progression of communities leading to the formation of a city?", "options": [{"text": "Individual → Couple → Household → Village → City", "isCorrect": false, "rationale": "An individual is a component of a community, not a community itself in this progression."}, {"text": "Household → Village → City", "isCorrect": false, "rationale": "This skips the most fundamental building block, the couple, which Aristotle identifies as the origin of the household."}, {"text": "Couple → Household → Village → City", "isCorrect": true, "rationale": "The text states, 'He traces the city backward through its component parts — the village, the household, the couple — to show that each stage is natural and that the city is their natural completion.'"}, {"text": "Village → City → Empire", "isCorrect": false, "rationale": "This progression begins too late in Aristotle's sequence and introduces 'Empire,' which is not presented as a natural completion in this context."}]}, {"question": "What does Aristotle identify as the ultimate purpose of the city (polis)?", "options": [{"text": "To provide defense and security against external threats.", "isCorrect": false, "rationale": "While security is a benefit of living in a city, Aristotle explicitly states it is 'not merely to live, but to live well,' suggesting a higher purpose."}, {"text": "To facilitate trade and economic prosperity among its members.", "isCorrect": false, "rationale": "Economic activities contribute to 'living,' but Aristotle argues the city's purpose extends beyond this to 'living well' or happily."}, {"text": "To allow its citizens to 'live well,' which encompasses the full flourishing and rational activity of human beings.", "isCorrect": true, "rationale": "The text states the city was 'first founded that we might live, but continued that we may live happily' (which translates to 'living well'). This is presented as the 'end and perfection of government' and the 'highest human purpose.'"}, {"text": "To ensure the rule of the most intelligent and capable individuals.", "isCorrect": false, "rationale": "This describes a specific goal for a type of government, but not the ultimate purpose for the existence of the polis itself."}]}, {"question": "In Aristotle's political philosophy, what does the term *oikos* encompass?", "options": [{"text": "Only the nuclear family unit (parents and children).", "isCorrect": false, "rationale": "The *oikos* is broader than just the nuclear family; it includes other individuals and resources."}, {"text": "The political assembly where citizens debate laws.", "isCorrect": false, "rationale": "This describes a public political institution, not the private household unit."}, {"text": "The Greek household, including family, slaves, and property.", "isCorrect": true, "rationale": "The text explicitly defines *oikos* as 'The Greek household, including family, slaves, and property.'"}, {"text": "Any independent land-owning citizen.", "isCorrect": false, "rationale": "This refers to an individual's status, not the communal structure of the household."}]}, {"question": "The textbook identifies Aristotle's defense of 'natural slavery' as the 'most troubling' section of *Politics*. What is the core reason for its rejection by later thinkers and modern moral philosophy?", "options": [{"text": "It contradicts the economic realities of the time, where all labor was free.", "isCorrect": false, "rationale": "Slavery was a common institution in Aristotle's time, so this reasoning is historically inaccurate."}, {"text": "It argues that some human beings are inherently suited only to obey due to a lack of rational capacity, which fundamentally denies universal human dignity and rationality.", "isCorrect": true, "rationale": "The text states this doctrine argues 'some human beings are, by nature, suited only to obey and not to govern,' and is rejected because it is based on a 'mistaken premise — that some races or peoples are inherently inferior in reason' and contradicts the dignity of every human person."}, {"text": "It promotes violence and rebellion among the enslaved population.", "isCorrect": false, "rationale": "The critique focuses on the moral premise of the argument itself, not its social consequences discussed in the text."}, {"text": "It suggests that women should be treated as slaves, which was a unique and controversial view even in ancient Greece.", "isCorrect": false, "rationale": "While Aristotle had views on women's roles, the 'natural slave' doctrine applies to specific individuals deemed lacking rational capacity, and the text notes 'there is a natural difference between a female and a slave.'"}]}, {"question": "How does the textbook section utilize Aristotle's *own principles* to argue against his doctrine of natural slavery?", "options": [{"text": "It points out that Aristotle himself owned no slaves, thus contradicting his theory.", "isCorrect": false, "rationale": "The text does not provide biographical information about Aristotle's personal slave ownership."}, {"text": "It highlights that Aristotle's contemporaries largely disagreed with his views on slavery.", "isCorrect": false, "rationale": "The critique focuses on internal philosophical inconsistency, not external contemporary dissent."}, {"text": "It argues that Aristotle's definition of a 'natural slave' is too vague to be applied practically.", "isCorrect": false, "rationale": "The critique is about the fundamental moral premise and its logical inconsistency with his broader philosophy, not a practical issue with definition."}, {"text": "It posits that if the good for a human being consists in rational activity, and every human possesses reason, then no human can be treated as a mere instrument, which aligns with Aristotle's emphasis on rational human nature.", "isCorrect": true, "rationale": "The text explicitly states: 'Aristotle's own principles, rightly applied, refute him: if the good for a human being consists in rational activity, and if every human being possesses reason (however imperfectly exercised), then no human being can rightly be treated as a mere instrument.'"}]}, {"question": "In Aristotle's analysis of the 'primary parts of a city,' which of the following best describes his method?", "options": [{"text": "He begins by examining different forms of government to determine the best constitution.", "isCorrect": false, "rationale": "The text explicitly states: 'The Politics does not begin with a theory of government. It begins with a theory of human nature.'"}, {"text": "He separates the city into its component societies (couple, household, village) to understand their natural development and differences.", "isCorrect": true, "rationale": "The text explains, 'As, in an inquiry into every other subject, it is necessary to separate the different parts of which it is compounded, till we arrive at their first elements... so by the same proceeding we shall acquire a knowledge of the primary parts of a city...'"}, {"text": "He focuses on the economic classes within a city to understand its foundational structure.", "isCorrect": false, "rationale": "While property and subsistence are discussed within the household, his primary analytical approach for the city's origins is through its communal building blocks."}, {"text": "He compares the Greek city-state directly with 'barbarian' states to highlight their differences in governance.", "isCorrect": false, "rationale": "This comparison is made to illustrate a specific point about natural rule, but it is not his overarching method for analyzing the fundamental components of a city."}]}, {"question": "What is the broader lesson the textbook authors aim to convey by including and critiquing Aristotle's problematic doctrine of natural slavery?", "options": [{"text": "That ancient philosophy is inherently flawed and largely irrelevant to modern ethical discussions.", "isCorrect": false, "rationale": "The text explicitly states: 'The lesson is not that Aristotle is worthless,' indicating that his philosophy still holds value despite its flaws."}, {"text": "That even great minds can be influenced and corrupted by the unjust assumptions and social arrangements of their time, necessitating critical engagement with historical texts.", "isCorrect": true, "rationale": "The text highlights that 'even genius can be corrupted by unjust social arrangements' and 'even great minds reason from the assumptions of their time, and we must be willing to correct those assumptions,' emphasizing the importance of honest engagement and critical analysis."}, {"text": "That intellectual progress always leads to more ethically sound conclusions over time.", "isCorrect": false, "rationale": "The text focuses on the need for active correction of past assumptions rather than assuming automatic moral progress in intellectual thought."}, {"text": "That the study of history primarily serves to identify and dismiss past errors.", "isCorrect": false, "rationale": "The authors advocate for 'honest engagement' and understanding *why* errors occurred, rather than simply dismissing them, to learn from history."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
