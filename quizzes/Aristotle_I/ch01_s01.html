<head>
    <meta charset="UTF-8">

    <title>The Life of Man (Aristotle I) &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What primary factor influenced Aristotle's lifelong inclination toward the empirical observation of the natural world?", "options": [{"text": "His upbringing in a household dedicated to medicine and natural inquiry.", "isCorrect": true, "rationale": "His father, Nicomachus, was a court physician, which likely exposed Aristotle to biological and medical investigation from a young age."}, {"text": "The strict curriculum of Plato's Academy regarding biological sciences.", "isCorrect": false, "rationale": "While he spent two decades at the Academy, the text suggests his passion for observation was planted earlier in his medical household."}, {"text": "The mandate from King Philip II to catalog the flora and fauna of Macedon.", "isCorrect": false, "rationale": "His tutoring of Alexander occurred much later than his initial exposure to medicine and biological inquiry."}, {"text": "His desire to prove the superiority of Macedonian science over Athenian theory.", "isCorrect": false, "rationale": "Aristotle's motivations were rooted in personal passion and his background rather than a nationalistic scientific rivalry."}], "id": "q01"}, {"question": "Aristotle's tenure at Plato's Academy is best described by which duration and progression?", "options": [{"text": "Twenty years, transitioning from a student to a researcher and teacher.", "isCorrect": true, "rationale": "He enrolled at seventeen and remained for two decades in various capacities until Plato's death."}, {"text": "Twelve years, serving primarily as a research assistant in metaphysics.", "isCorrect": false, "rationale": "He stayed at the Academy for twenty years, not twelve; the twelve-year period refers to his time at the Lyceum."}, {"text": "Three years, ending abruptly when he was invited to tutor Alexander.", "isCorrect": false, "rationale": "The three-year period defines his time tutoring Alexander, which happened years after he left the Academy."}, {"text": "Twenty years, remaining as a student until he founded the Lyceum.", "isCorrect": false, "rationale": "Though he was there for twenty years, he spent many years traveling before returning to Athens to found the Lyceum."}], "id": "q02"}, {"question": "Following the death of Plato, how did Aristotle apply his 'empirical habit of mind' during his travels in Asia Minor?", "options": [{"text": "By dissecting marine life and cataloging various insect species.", "isCorrect": true, "rationale": "The text explicitly mentions he dissected sea creatures and observed animal behavior with the eye of a naturalist during this period."}, {"text": "By drafting the first versions of his political treatises based on Asian monarchies.", "isCorrect": false, "rationale": "While he did later work on politics, this specific travel period was highlighted for its biological research."}, {"text": "By strictly adhering to Platonic theories of forms through observation.", "isCorrect": false, "rationale": "Aristotle is noted for refining or rejecting Plato's ideas in favor of looking at the world as it actually is."}, {"text": "By mapping the night sky from the Aegean islands.", "isCorrect": false, "rationale": "Mapping the night sky is attributed to the later collaborative research period at the Lyceum."}], "id": "q03"}, {"question": "What historical event in $323$ BC led to Aristotle's departure from Athens and his eventual death?", "options": [{"text": "The sudden death of Alexander the Great in Babylon.", "isCorrect": true, "rationale": "Alexander's death triggered anti-Macedonian sentiment in Athens, placing Aristotle, a Macedonian associate, in danger."}, {"text": "The execution of Socrates by the Athenian authorities.", "isCorrect": false, "rationale": "Socrates was executed in $399$ BC, which was before Aristotle was born; he only referenced this event when fleeing."}, {"text": "The destruction of the Lyceum by anti-Macedonian rebels.", "isCorrect": false, "rationale": "While he fled due to anti-Macedonian feeling, the text does not state that the Lyceum was destroyed."}, {"text": "The formal merger of the Academy and the Lyceum.", "isCorrect": false, "rationale": "The two schools remained separate entities, and Aristotle's departure was due to political threat, not administrative changes."}], "id": "q04"}, {"question": "The term 'Peripatetic' is traditionally linked to which characteristic of Aristotle's teaching style?", "options": [{"text": "The habit of walking about while delivering lectures.", "isCorrect": true, "rationale": "The Greek word $peripatein$ means 'to walk about,' reflecting the tradition that Aristotle moved while he taught."}, {"text": "The practice of teaching in the public gymnasiums of Stagira.", "isCorrect": false, "rationale": "The school was located at the Lyceum in Athens, not Stagira, and the name refers to movement, not the city."}, {"text": "The requirement that students travel to different city-states for research.", "isCorrect": false, "rationale": "While the school was a research enterprise, the name Peripatetic specifically describes the act of walking."}, {"text": "The focus on the circular orbits of celestial bodies in the night sky.", "isCorrect": false, "rationale": "Though they mapped the sky, the name is rooted in the physical activity of the teacher rather than the subject matter."}], "id": "q05"}, {"question": "Upon fleeing to Chalcis, Aristotle stated he would not allow the Athenians to 'sin twice against philosophy.' To what was he referring?", "options": [{"text": "The historical execution of Socrates in $399$ BC.", "isCorrect": true, "rationale": "Aristotle drew a parallel between the political threat he faced and the previous trial and death of Socrates."}, {"text": "The recent closure of Plato's Academy by political decree.", "isCorrect": false, "rationale": "The Academy continued for centuries after Plato's death and was not the 'first sin' mentioned."}, {"text": "The loss of Alexander's biological research during his campaigns.", "isCorrect": false, "rationale": "The 'sin' refers to the mistreatment or execution of philosophers, not the loss of physical data."}, {"text": "The Athenian rejection of the Lyceum's research on constitutions.", "isCorrect": false, "rationale": "The comment was a pointed reference to the danger of philosopher executions, specifically referencing Socrates."}], "id": "q06"}, {"question": "What significant collaborative project was undertaken at the Lyceum between $335$ and $323$ BC?", "options": [{"text": "The collection and cataloging of constitutions from various Greek cities.", "isCorrect": true, "rationale": "The Lyceum was an extraordinary research enterprise that included gathering political constitutions, mapping the sky, and cataloging animals."}, {"text": "The establishment of a medical curriculum based on Nicomachus's writings.", "isCorrect": false, "rationale": "While Aristotle had a medical background, the research listed focus on broader topics like politics, biology, and astronomy."}, {"text": "The translation of Macedonian legal codes into Athenian law.", "isCorrect": false, "rationale": "The school was a center for philosophical and scientific inquiry, not a political agency for legal translation."}, {"text": "The creation of a unified religion for Alexander's empire.", "isCorrect": false, "rationale": "Aristotle focused on reason and empirical observation rather than the creation of religious systems."}], "id": "q07"}, {"question": "How did Aristotle's philosophical approach toward Plato's teachings change during his time at the Academy?", "options": [{"text": "He initially absorbed the teachings but eventually refined and selectively rejected them.", "isCorrect": true, "rationale": "The source notes his 'characteristic independence' led him to build upon Plato's work while also disagreeing with certain aspects."}, {"text": "He remained a devoted disciple, ensuring Plato's theories remained unchanged for twenty years.", "isCorrect": false, "rationale": "Aristotle was known for his independence and for eventually challenging Platonic thought."}, {"text": "He immediately rejected Plato's theories upon arriving in Athens.", "isCorrect": false, "rationale": "He stayed for twenty years as both a student and teacher, indicating he deeply engaged with the material before refining it."}, {"text": "He transitioned from empirical science to the purely abstract metaphysics favored by Plato.", "isCorrect": false, "rationale": "If anything, he moved away from Plato's abstractions toward a more empirical, observation-based habit of mind."}], "id": "q08"}, {"question": "Regarding Aristotle's personal life, which relationship is potentially linked to the naming of the 'Nicomachean Ethics'?", "options": [{"text": "His son, who was born to his companion Herpyllis.", "isCorrect": true, "rationale": "The text suggests the work may be named after his son, Nicomachus, or possibly his father, who shared the same name."}, {"text": "His wife Pythias, who was the daughter of a famous physician.", "isCorrect": false, "rationale": "While he was married to Pythias, the work is specifically named after a 'Nicomachus,' not her."}, {"text": "His student Alexander, as a tribute to the Macedonian royal lineage.", "isCorrect": false, "rationale": "There is no mention of the Ethics being named after Alexander; the connection is strictly to his father or son."}, {"text": "King Philip II, who funded Aristotle's research at the Lyceum.", "isCorrect": false, "rationale": "Philip II invited him to tutor Alexander, but the text associates the name Nicomachus with Aristotle's family."}], "id": "q09"}, {"question": "Which of the following best summarizes Aristotle's view on the value of education, according to his cited remark?", "options": [{"text": "The educated differ from the uneducated as the living from the dead.", "isCorrect": true, "rationale": "This quote from the 'personbox' highlights the profound, fundamental importance Aristotle placed on education."}, {"text": "Education is the only tool that can prevent the fragility of political life.", "isCorrect": false, "rationale": "While he valued education, this specific phrasing is not his cited remark on the difference between the educated and uneducated."}, {"text": "The educated are those who can walk while they think.", "isCorrect": false, "rationale": "This confuses the tradition of the Peripatetics with his specific philosophical remark on the impact of learning."}, {"text": "Education allows a philosopher to avoid the 'sins' of the state.", "isCorrect": false, "rationale": "The 'sin twice' remark was about political safety and history, not a general definition of education."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
