<script>
var QUESTIONS = [{"question": "How does Aristotle's approach to political science, as described in the text, primarily differ from philosophers who reason from \"pure first principles\"?", "options": [{"text": "He prioritizes abstract moral ideals above practical governance.", "isCorrect": false, "rationale": "This describes Plato's approach as contrasted with Aristotle's in the text, where Plato focuses on a 'philosophical vision of the Good' and is willing to 'depart radically from existing social arrangements'."}, {"text": "He bases his theories on observed patterns from 158 actual constitutions and practical constraints.", "isCorrect": true, "rationale": "The text states that Aristotle 'has studied 158 actual constitutions, who reasons from the patterns he observes in real political history, and who is deeply skeptical of theorists who ignore the practical constraints'."}, {"text": "He believes all political systems are equally valid and avoids normative judgment.", "isCorrect": false, "rationale": "The text explicitly states that Aristotle 'still evaluates constitutions against the standard of the common good, and he still distinguishes correct forms from deviant ones,' demonstrating his normative judgment."}, {"text": "He disregards the importance of human psychology in political stability.", "isCorrect": false, "rationale": "The text clearly states that Aristotle 'locates the ultimate source of political instability not in structural features of institutions but in human psychology — specifically, in the passions of envy, ambition, and resentment'."}], "id": "q01"}, {"question": "The text contrasts Aristotle with Plato regarding the 'ideal city.' What is Aristotle's key contention about the best constitution compared to Plato's?", "options": [{"text": "Aristotle argues the best constitution is the one that is ethically perfect, regardless of practical constraints.", "isCorrect": false, "rationale": "This aligns with Plato's approach, who describes the 'perfectly just city in abstract terms,' while Aristotle is 'more cautious' and insists on practical considerations."}, {"text": "Aristotle believes the best constitution is the best achievable given real-world limitations like history and geography.", "isCorrect": true, "rationale": "The text states, 'The best constitution is the best achievable, not the best imaginable,' reflecting Aristotle's emphasis on practical constraints such as 'history, their geography, their social composition, and the character of their citizens'."}, {"text": "Aristotle contends that any existing constitution, however flawed, is preferable to an imagined ideal.", "isCorrect": false, "rationale": "While Aristotle is practical, he still makes normative judgments and seeks improvement. He distinguishes 'correct forms from deviant ones' and prescribes for cities, not just accepts them."}, {"text": "Aristotle maintains that political theorists should only describe the ideal and not prescribe for existing cities.", "isCorrect": false, "rationale": "The text notes that Aristotle 'insists that the political theorist must also be able to prescribe for cities that cannot achieve the ideal,' directly contradicting this option."}], "id": "q02"}, {"question": "Aristotle's 'normative seriousness with practical realism' is described as one of his most distinctive contributions. What does this combination imply for a political theorist?", "options": [{"text": "That a theorist must prioritize universal moral principles over any specific societal context.", "isCorrect": false, "rationale": "This neglects the 'practical realism' aspect. Aristotle applies standards 'with flexibility and sensitivity to circumstance,' not as rigid universal principles without context."}, {"text": "That a theorist evaluates constitutions against standards of the common good while also considering real-world constraints and circumstances.", "isCorrect": true, "rationale": "The text explains this combination as 'normative seriousness' (evaluating against the common good, distinguishing correct from deviant forms) and 'practical realism' (applying these standards 'with flexibility and sensitivity to circumstance')."}, {"text": "That a theorist should simply describe existing political systems without making any moral judgments about them.", "isCorrect": false, "rationale": "This neglects the 'normative seriousness' aspect. Aristotle 'still evaluates constitutions against the standard of the common good' and distinguishes correct from deviant forms."}, {"text": "That a theorist's primary goal is to design a perfectly just city, even if it's impossible to implement.", "isCorrect": false, "rationale": "This is more aligned with Plato's approach. Aristotle focuses on what is 'best achievable' for ordinary cities, rather than only designing the impossible ideal."}], "id": "q03"}, {"question": "According to Aristotle, polity is recommended as the best practical constitution not merely as a compromise between democracy and oligarchy. What deeper principle does it apply to achieve stability?", "options": [{"text": "The principle of absolute equality among all citizens, regardless of wealth or status.", "isCorrect": false, "rationale": "Absolute equality is characteristic of extreme democracy, which Aristotle considers unstable due to the 'triumph of faction over the common good'."}, {"text": "The doctrine of the mean, seeking a balance that genuinely serves the whole community and prevents factional triumph.", "isCorrect": true, "rationale": "The text explicitly states: 'It is an application of the doctrine of the mean to political life,' and that it 'seeks a constitution that genuinely serves the whole community, that is accessible to a broad citizenry, and that does not give any single class unlimited power'."}, {"text": "The systematic exclusion of any middle class to simplify governance.", "isCorrect": false, "rationale": "Aristotle identifies the middle class as 'the social foundation of this political mean' and crucial for stability, directly contradicting its exclusion."}, {"text": "The strict enforcement of oligarchic principles to ensure economic stability.", "isCorrect": false, "rationale": "Extreme oligarchy, like extreme democracy, is unstable because it represents the 'triumph of faction over the common good' (rule by the rich, for the rich)."}], "id": "q04"}, {"question": "Aristotle observes a strong correlation between political stability and a large middle class. How does the presence of a substantial middle class contribute to constitutional health?", "options": [{"text": "It ensures that the state can easily tax all citizens, increasing government revenue.", "isCorrect": false, "rationale": "While a middle class might contribute to taxation, the text does not mention this as Aristotle's reason for its contribution to constitutional health. His focus is on moderation and factionalism."}, {"text": "It leads to the complete eradication of wealth inequality, eliminating all sources of resentment.", "isCorrect": false, "rationale": "The text states the middle class 'moderates' the extremes of wealth and poverty, but doesn't claim it 'eradicates' inequality or all resentment. Aristotle even notes 'too little inequality' can be destabilizing."}, {"text": "It moderates the extremes of wealth and poverty, weakens factions, and encourages citizens to seek the common good.", "isCorrect": true, "rationale": "The text states: 'Where the middle class is large, the extremes of wealth and poverty are moderated, factions are weaker, and reasonable citizens are more likely to seek the common good rather than class advantage.' This directly supports the option."}, {"text": "It allows a society to concentrate power in the hands of a virtuous elite, simplifying decision-making.", "isCorrect": false, "rationale": "This describes aristocracy, which Aristotle views as ideal in principle but not achievable for most cities. The middle class supports polity, a mixed constitution, not concentrated elite power."}], "id": "q05"}, {"question": "Aristotle identifies the ultimate source of political instability (stasis) not primarily in institutional structures, but in what fundamental aspect of human existence?", "options": [{"text": "Economic recessions and lack of resources.", "isCorrect": false, "rationale": "While economic factors can contribute, Aristotle's ultimate source is more fundamental. The text does not identify economic recessions as the *ultimate* source."}, {"text": "The inherent inability of any constitution to satisfy all citizens' demands.", "isCorrect": false, "rationale": "This is too broad and doesn't pinpoint the specific psychological origin Aristotle identifies. He sees specific human passions driving the inability to satisfy demands."}, {"text": "Human psychology, specifically passions like envy, ambition, and resentment.", "isCorrect": true, "rationale": "The text explicitly states: 'Aristotle locates the ultimate source of political instability not in structural features of institutions but in human psychology — specifically, in the passions of envy, ambition, and resentment.'"}, {"text": "The influence of foreign powers interfering in domestic affairs.", "isCorrect": false, "rationale": "The provided text does not mention foreign interference as Aristotle's ultimate source of internal political instability."}], "id": "q06"}, {"question": "Aristotle's analysis of stasis includes the insight that both too little and too much inequality are destabilizing. What does he mean by \"too little inequality\"?", "options": [{"text": "A society where the wealthy are unfairly taxed to support the poor, causing resentment among the rich.", "isCorrect": false, "rationale": "This is a form of too much equality (or redistribution) from the rich's perspective, but not the specific meaning of 'too little inequality' described by Aristotle as 'tyranny of the mediocre'."}, {"text": "A society where there is no recognition of genuine differences in virtue and contribution, leading to the 'tyranny of the mediocre.'", "isCorrect": true, "rationale": "The text states: 'A society in which there is no recognition of genuine differences in virtue and contribution will degenerate into the tyranny of the mediocre.' This is precisely 'too little inequality' in merit."}, {"text": "A society that fails to provide a basic safety net for its most vulnerable citizens, leading to widespread poverty.", "isCorrect": false, "rationale": "This scenario describes an extreme form of 'too much inequality' in wealth, where the poor are neglected, not 'too little inequality'."}, {"text": "A society where all citizens have an equal voice in government, regardless of their qualifications.", "isCorrect": false, "rationale": "While related to democratic principles, this option does not fully capture Aristotle's concept of 'tyranny of the mediocre' which specifically refers to the lack of recognition for genuine *differences in virtue and contribution*."}], "id": "q07"}, {"question": "Aristotle observes that the same constitution can be stable or unstable depending on how its principles are applied in practice. Which of the following best exemplifies a good constitution decaying due to its principles being pushed to extremes?", "options": [{"text": "A monarchy where the virtuous king consistently seeks the common good.", "isCorrect": false, "rationale": "This describes an ideal and stable form of monarchy, not one decaying due to principles pushed to extremes."}, {"text": "A democracy that treats every individual preference as equally valid, regardless of wisdom, becoming mob rule.", "isCorrect": true, "rationale": "The text states: 'Even a good constitution will decay if those in power push its principles to extremes: a democracy that treats every individual preference as equally valid, regardless of wisdom, becomes mob rule'."}, {"text": "An oligarchy where the wealthy prioritize public works and shared prosperity.", "isCorrect": false, "rationale": "This would be a more virtuous or stable form of oligarchy, perhaps closer to aristocracy, not an example of decay from pushing principles to an extreme (which for oligarchy would be extreme greed/exclusivity)."}, {"text": "An aristocracy where genuinely virtuous elites govern wisely for the community.", "isCorrect": false, "rationale": "This describes an ideal and stable form of aristocracy, not one decaying due to principles pushed to extremes."}], "id": "q08"}, {"question": "Aristotle's prescription for preserving constitutional health extends beyond laws and institutions. What does he argue is ultimately needed, in the broadest sense?", "options": [{"text": "A large military to suppress internal dissent and external threats.", "isCorrect": false, "rationale": "The text does not mention a military as Aristotle's primary 'prescription for preserving constitutions.' His focus is on internal formation of character."}, {"text": "Constant revision of constitutional texts to adapt to changing times.", "isCorrect": false, "rationale": "While adaptation can be important, Aristotle's ultimate prescription is about the 'spirit' and 'character' of the citizenry, which goes beyond mere textual revision."}, {"text": "A citizenry formed in the spirit of the constitution's principles through character-shaping education.", "isCorrect": true, "rationale": "The text states: 'What is needed is a citizenry formed in the spirit of the constitution's own principles... Education — in the broadest sense, including the whole formation of character — is what makes the difference'."}, {"text": "Strict adherence to traditional customs and avoidance of any reform.", "isCorrect": false, "rationale": "Aristotle is practical and prescriptive for 'ordinary cities,' implying a need for careful reform to achieve the best achievable, not rigid adherence to all tradition."}], "id": "q09"}, {"question": "Based on Aristotle's specific causes of revolution, which scenario is most indicative of instability arising in an *oligarchy*?", "options": [{"text": "Demagogues inflaming the poor against the rich, leading to demands for property confiscation.", "isCorrect": false, "rationale": "This is identified by Aristotle as a specific cause of revolution in *democracies*."}, {"text": "The rich becoming too greedy and exclusive, shutting out others from power and leading to resentment, or factional conflict among the wealthy.", "isCorrect": true, "rationale": "The text specifically lists for oligarchies: 'The rich becoming too greedy and exclusive; resentment of those shut out from power; factional conflict among the wealthy themselves.' This option encompasses these points."}, {"text": "Hatred of a tyrannical ruler who exercises excessive oppression.", "isCorrect": false, "rationale": "This is identified by Aristotle as a specific cause of revolution in *tyrannies*."}, {"text": "A general lack of recognition for individual virtue and contribution, resulting in the 'tyranny of the mediocre.'", "isCorrect": false, "rationale": "This is described as a cause of instability related to 'too little inequality' generally, but not specifically listed under the *oligarchic* causes of revolution in the 'keyconcept' box."}], "id": "q10"}, {"question": "Aristotle opens *Politics* Book IV with a physician analogy to justify the political philosopher's need for comprehensive knowledge of all constitution types, not just the ideal. What is the force of this analogy?", "options": [{"text": "A physician who treats only the healthiest patients becomes more skilled, just as a political philosopher who studies only good constitutions gains greater insight.", "isCorrect": false, "rationale": "This inverts the analogy. A physician who only knew the perfectly healthy body would be useless to actual patients — and similarly, a theorist who knew only the ideal constitution would be useless to actual legislators."}, {"text": "A physician must diagnose illness as well as know health, so a political philosopher must understand deviant and mixed constitutions as well as ideal ones, to be practically useful to actual cities.", "isCorrect": true, "rationale": "Aristotle argues that just as a physician who knew only the perfectly healthy body would be useless to real patients, a political theorist who knew only the perfectly just state would be useless to actual legislators facing imperfect real-world conditions."}, {"text": "Physicians and political philosophers are both empirical scientists, so political philosophy must use the same experimental method as medicine.", "isCorrect": false, "rationale": "While Aristotle is empirical, the analogy's specific purpose is to justify knowing all forms of constitution — not to claim that politics is experimental in the modern scientific sense."}, {"text": "Just as medicine preserves health, politics preserves the status quo, so the philosopher's role is purely conservative.", "isCorrect": false, "rationale": "Aristotle explicitly prescribes for improvement and reform, not mere preservation of existing arrangements. He notes it is as hard to correct a government as to form a new one, but still prescribes corrections."}], "id": "q11"}, {"question": "In *Politics* Book V, Aristotle identifies profit and honor as the immediate causes men give for sedition. What does he identify as the *deeper* psychological root that makes people act on those causes?", "options": [{"text": "Absolute poverty — the desperate need for material resources drives all seditious action.", "isCorrect": false, "rationale": "Aristotle explicitly distinguishes the root cause from poverty as such. The root is not poverty but the *perception of unjust* distribution — the feeling that one's poverty is undeserved relative to others."}, {"text": "A perceived violation of $dikaiosyne$ — the sense that one has less honor or profit than one justly deserves relative to others who are no more (or less) worthy.", "isCorrect": true, "rationale": "Aristotle's analysis is that sedition arises not from objective economic conditions but from beliefs about justice: those who think themselves equal to others resent seeing others possess more, while those who think themselves superior resent being treated as equals with inferiors. The root is a grievance about $dikaiosyne$ — what is rightly due."}, {"text": "Excessive ambition among the nobility, which is structurally built into aristocratic and oligarchic regimes.", "isCorrect": false, "rationale": "While ambition is among the causes Aristotle lists, his broadest point is that sedition arises from *perceptions about justice* that cut across all regime types — not from a structural feature limited to aristocracies."}, {"text": "Constitutional defects that fail to provide adequate mechanisms for resolving factional disputes peacefully.", "isCorrect": false, "rationale": "Aristotle explicitly states he locates the *ultimate* source of instability not in structural features of institutions but in human psychology — in the passions of envy, ambition, and resentment that distort people's judgments about what they deserve."}], "id": "q12"}, {"question": "In *Politics* Book V, Aristotle offers what he calls 'the greatest of all means of preserving a constitution.' What is it, and why does it connect back to the *Nicomachean Ethics*?", "options": [{"text": "A strong military that can suppress internal rebellion — this connects to the Ethics because courage is the foundational virtue of political life.", "isCorrect": false, "rationale": "The text does not identify military force as the greatest means of preservation. Aristotle's prescription is about forming citizens from within, not suppressing them from without."}, {"text": "Regular revision of constitutional laws to adapt to changing economic and social conditions, connecting to the Ethics' teaching that virtue adapts to circumstances.", "isCorrect": false, "rationale": "While Aristotle recommends attentiveness to change (e.g., the census mechanism), he explicitly identifies education — not legal revision — as the *greatest* means of preservation."}, {"text": "Education adapted to the spirit of the constitution, because citizens must be formed in habits and desires that embrace the constitution's principles — just as the Ethics teaches that virtue requires habituation, not merely knowledge of rules.", "isCorrect": true, "rationale": "Aristotle states that 'the greatest of all the means of preserving a constitution is the adaptation of education to the form of government.' This connects directly to the Ethics: as virtue requires habituation (not just knowing rules), so constitutional health requires citizens whose character is shaped by the constitution's spirit — not just citizens who know its laws."}, {"text": "The appointment of virtuous magistrates who embody the constitution's principles, because the Ethics teaches that the virtuous person is the standard of right action.", "isCorrect": false, "rationale": "While virtuous magistrates matter, Aristotle identifies *education of citizens* — not appointment of good officials — as the greatest means of preservation, because even good officials cannot preserve a constitution whose citizens lack the right character."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
