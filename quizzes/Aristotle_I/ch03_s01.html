        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>

        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3, Section 1</div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the section \"Approaching the Selections,\" what two things must be held together when reading Aristotle on virtue and justice?", "options": [{"text": "Historical context and philosophical theory.", "isCorrect": false, "rationale": "While related, the text specifically emphasizes a 'systematic theory that applies across all the virtues, and a careful attention to the specific features of each individual case.'"}, {"text": "Empirical data and moral intuition.", "isCorrect": false, "rationale": "These concepts are not mentioned as the core framework for approaching Aristotle's work in this section."}, {"text": "A systematic theory that applies across all the virtues, and a careful attention to the specific features of each individual case.", "isCorrect": true, "rationale": "The text explicitly states: 'Reading Aristotle on virtue and justice requires holding two things together: a systematic theory that applies across all the virtues, and a careful attention to the specific features of each individual case.'"}, {"text": "Legal precedents and ethical dilemmas.", "isCorrect": false, "rationale": "These are related topics that arise from Aristotle's discussion, but they are not presented as the fundamental dual approach to understanding his work on virtue and justice."}], "id": "q01"}, {"question": "Aristotle's concept of \"proairesis\" is crucial for moral responsibility. Which of the following best describes what proairesis entails?", "options": [{"text": "An impulsive reaction to a sudden event without prior thought.", "isCorrect": false, "rationale": "Proairesis is explicitly distinguished from acting from impulse or compulsion; it requires deliberation."}, {"text": "An act performed under external compulsion, where the agent contributes nothing.", "isCorrect": false, "rationale": "Actions under compulsion are considered involuntary by Aristotle, the opposite of proairesis."}, {"text": "A genuine act of will coupled with rational deliberation about the best means to a given end.", "isCorrect": true, "rationale": "The text defines proairesis as 'Deliberate choice... choice involves both rational deliberation (figuring out the best means to a given end) and a genuine act of will.'"}, {"text": "Knowing the potential outcome of an action without having intended it.", "isCorrect": false, "rationale": "While knowledge of circumstances is part of voluntary action, proairesis specifically includes the 'genuine act of will' and 'rational deliberation' of means to an end, implying intent."}], "id": "q02"}, {"question": "A student cheats on an exam by looking at a classmate's paper in a moment of panic, immediately regretting it. Another student plans to cheat for days, executes the plan, and feels no remorse. According to Aristotle's discussion of moral responsibility, what is the primary distinction between these two actions?", "options": [{"text": "The first student is legally innocent, while the second is legally guilty.", "isCorrect": false, "rationale": "Aristotle's focus is on character and moral responsibility, not directly on modern legal innocence or guilt, though his principles inform legal systems. The key distinction is about the nature of the act's origin."}, {"text": "Both actions are equally involuntary because they both involve breaking a rule.", "isCorrect": false, "rationale": "The text explicitly contrasts the two, stating the first's action was 'less than fully his own' compared to the second's planned act, which clearly implies different degrees of voluntariness."}, {"text": "The first student's action is less an expression of settled character and deliberate choice (proairesis) than the second's.", "isCorrect": true, "rationale": "The text states, 'The first student's action was, in some sense, less than fully his own — less the product of a settled proairesis — than the second's,' emphasizing that character is built and assessed through deliberate choice."}, {"text": "The second student's action is involuntary because they acted out of a desire for a good grade.", "isCorrect": false, "rationale": "Acting out of desire for a good grade, especially with careful planning, would make the action more, not less, voluntary in Aristotle's view, as it involves an agent's internal choice and deliberation."}], "id": "q03"}, {"question": "Aristotle's analysis of every moral virtue involves three core elements. Which of the following accurately lists these elements?", "options": [{"text": "Impulse, Reaction, Consequence.", "isCorrect": false, "rationale": "These terms are not used by Aristotle to describe the structural elements of a virtue; they relate more generally to actions."}, {"text": "Sphere, Two Vices (excess and deficiency), and The Mean.", "isCorrect": true, "rationale": "The text explicitly enumerates these three elements: 'A sphere: the domain of feeling or action... Two vices: the excess and the deficiency... The mean: the virtuous disposition.'"}, {"text": "Knowledge, Deliberation, Will.", "isCorrect": false, "rationale": "These are components of 'proairesis' (deliberate choice) and voluntary action, but not the three structural elements used to analyze a specific virtue."}, {"text": "Habit, Character, Action.", "isCorrect": false, "rationale": "These are important concepts in Aristotle's ethics regarding the formation and manifestation of virtue, but they are not the specific analytical framework for describing the 'structure of virtue' itself."}], "id": "q04"}, {"question": "If generosity is considered an Aristotelian virtue in the sphere of giving and receiving money, which of the following best represents its structure according to the doctrine of the mean?", "options": [{"text": "Excess: Extravagance (giving too much or inappropriately); Deficiency: Stinginess (giving too little or not at all); Mean: Generosity (giving appropriately given the circumstances).", "isCorrect": true, "rationale": "This option correctly applies the pattern described: identifying the sphere (money), two vices (excess/deficiency), and the mean as the appropriate response, mirroring the courage example."}, {"text": "Excess: Altruism (selfless concern for others); Deficiency: Selfishness (concern only for oneself); Mean: Philanthropy (desire to promote the welfare of others).", "isCorrect": false, "rationale": "While related to giving, 'altruism' is not typically framed as an Aristotelian 'excess' in the negative sense, and 'philanthropy' is a specific act rather than the disposition of the mean. The vices should be clear extremes."}, {"text": "Excess: Wealth (having too much money); Deficiency: Poverty (having too little money); Mean: Middle Class (having an appropriate amount of money).", "isCorrect": false, "rationale": "This describes states of being (economic conditions), not dispositions or actions related to the management of money within Aristotle's virtue framework."}, {"text": "Excess: Impulsivity (acting without thought); Deficiency: Indecision (inability to act); Mean: Thoughtfulness (acting with careful consideration).", "isCorrect": false, "rationale": "These concepts relate to deliberation and decision-making, which are aspects of virtue, but not the direct 'sphere' or 'vices' specifically related to generosity and money."}], "id": "q05"}, {"question": "Why does Aristotle dedicate an entire book to justice, distinguishing it from other virtues like courage or temperance?", "options": [{"text": "Justice is the easiest virtue to achieve and therefore requires less discussion.", "isCorrect": false, "rationale": "The text implies justice is complex and foundational, not easy, given its unique character and extensive treatment."}, {"text": "Justice is essentially relational, concerning one's obligations and contributions to others and the community, rather than primarily an internal state of the agent.", "isCorrect": true, "rationale": "The text states: 'Justice, by contrast, is essentially relational: it is about what I give to others, what I render to the community, what I owe and am owed in our shared life together,' contrasting it with other virtues primarily about the agent's own soul."}, {"text": "Justice is the only virtue that doesn't involve the doctrine of the mean.", "isCorrect": false, "rationale": "The text refers to justice as a 'complete virtue' within the general framework of virtues, implying it still relates to the mean, though its special character is highlighted."}, {"text": "Justice is a modern legal concept that Aristotle was presciently anticipating.", "isCorrect": false, "rationale": "Aristotle's concept of justice is rooted in ancient Greek philosophy and social structures, not modern legal systems, though it influenced them."}], "id": "q06"}, {"question": "A city council is debating how to allocate funds for a new public park, considering the differing population densities and tax contributions from various neighborhoods. Simultaneously, a court is determining how to compensate a citizen whose property was damaged due to a contractor's negligence. Which types of justice, respectively, are being addressed in these two scenarios?", "options": [{"text": "Both are examples of corrective justice.", "isCorrect": false, "rationale": "Corrective justice is about restoring fairness after a wrong, not about initial distribution of goods."}, {"text": "Both are examples of distributive justice.", "isCorrect": false, "rationale": "Distributive justice is about the allocation of shared goods, not about redressing wrongs."}, {"text": "The city council issue involves distributive justice, while the court case involves corrective justice.", "isCorrect": true, "rationale": "The city council is 'dividing up goods that belong to the community' (distributive justice), while the court is 'restor[ing] fairness after one person has wronged another' (corrective justice)."}, {"text": "The city council issue involves corrective justice, while the court case involves distributive justice.", "isCorrect": false, "rationale": "This option incorrectly swaps the definitions of the two types of justice."}], "id": "q07"}, {"question": "The text cautions against conflating Aristotle's concept of \"distributive justice\" with modern \"redistributive justice.\" What is the key distinction Aristotle emphasizes regarding his concept?", "options": [{"text": "Aristotle's distributive justice focuses on increasing overall societal wealth, whereas modern redistribution aims to reduce poverty.", "isCorrect": false, "rationale": "Aristotle's focus is on the *allocation* of existing community goods and honors, not on wealth creation or poverty reduction as primary goals of this specific type of justice."}, {"text": "Aristotle's distributive justice concerns the proportional allocation of shared goods like offices and honors based on merit or desert, not the transfer of wealth from some groups to others through taxation.", "isCorrect": true, "rationale": "The caution box explicitly states: 'Aristotle's distributive justice is about allocating shared goods — offices, honors, civic benefits — proportionately to those who have earned or merited them. He is not arguing for any particular policy of taxation or wealth transfer.'"}, {"text": "Aristotle's distributive justice is about ensuring everyone receives an equal share, while modern redistribution allows for inequalities.", "isCorrect": false, "rationale": "Aristotle's distributive justice is 'proportionately — each person according to their contribution, worth, or need,' not necessarily equal shares."}, {"text": "Aristotle's distributive justice applies only to legal systems, while modern redistribution is a political concept.", "isCorrect": false, "rationale": "Both concepts have legal and political implications; this distinction is not the primary point of caution."}], "id": "q08"}, {"question": "Aristotle's discussion of natural versus conventional justice raises a pivotal question. What is the main implication of asserting that there is such a thing as \"natural justice\"?", "options": [{"text": "All human laws are inherently just if they reflect the will of the majority.", "isCorrect": false, "rationale": "The existence of natural justice implies that human laws can be *criticized* and found wanting, even if enacted by a majority."}, {"text": "There is a transcendent standard against which human laws can be measured and potentially found wanting.", "isCorrect": true, "rationale": "The text states: 'But if there is a natural justice, then human laws can be measured against it, and some may be found wanting.' This provides a basis for critiquing legal systems."}, {"text": "Justice is entirely relative to the customs and traditions of each particular community.", "isCorrect": false, "rationale": "This describes conventional justice (nomos) in isolation, which Aristotle rejects as the sole basis of justice by positing natural justice (physis)."}, {"text": "Natural justice is rigid and never changes, regardless of circumstances.", "isCorrect": false, "rationale": "The text clarifies that 'even natural justice is not completely rigid: it can 'change' in the sense that it admits of different applications in different circumstances,' though the principle remains constant."}], "id": "q09"}, {"question": "According to the \"thinkdeeper\" section, Aristotle distinguishes between types of ignorance when assessing moral responsibility. Which type of ignorance does he *not* allow as an excuse to eliminate or reduce responsibility?", "options": [{"text": "Ignorance of the particular circumstances of an action (e.g., mistaking a civilian for an enemy).", "isCorrect": false, "rationale": "The text explicitly states: 'Aristotle allows that ignorance can reduce or eliminate responsibility — but only if it is ignorance of the particular circumstances.'"}, {"text": "Ignorance of universally recognized moral principles (e.g., 'I didn't know lying was wrong').", "isCorrect": true, "rationale": "The text directly states: 'You cannot excuse yourself by saying 'I didn't know lying was wrong,'' indicating that ignorance of moral principles themselves does not excuse responsibility."}, {"text": "Ignorance due to panic or a split-second foolish decision, diminishing deliberate choice.", "isCorrect": false, "rationale": "The example of the panicking student suggests that actions under such conditions are 'less than fully his own,' implying diminished responsibility, though not necessarily complete 'ignorance' in the sense of lack of information."}, {"text": "Ignorance resulting from external compulsion where the agent contributes nothing.", "isCorrect": false, "rationale": "Actions done under compulsion are involuntary and the agent is not morally responsible. This is a separate category from ignorance as an excuse."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
