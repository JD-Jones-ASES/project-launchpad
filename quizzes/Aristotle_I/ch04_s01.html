<script>
var QUESTIONS = [{"question": "According to Aristotle, why is friendship a topic worthy of philosophical analysis, moving beyond a mere personal experience?", "options": [{"text": "Because it is a necessary condition for political power and social hierarchy.", "isCorrect": false, "rationale": "The text states friendship is a social necessity and connected to the state, but not primarily as a condition for political power or hierarchy. Aristotle emphasizes its role in human flourishing and civic goodwill, not just power."}, {"text": "Because it functions as a virtue, a social necessity, and offers philosophical insights into human character.", "isCorrect": true, "rationale": "The text explicitly states three reasons: 'First, friendship is a virtue... Second, friendship is a social necessity... Third, and most importantly, friendship is philosophically illuminating: it reveals what we value and what kind of person we are becoming.'"}, {"text": "Because it is the only way to achieve true happiness and avoid all suffering.", "isCorrect": false, "rationale": "While friendship is essential to the good life for Aristotle, he does not claim it is the *only* way to achieve true happiness or that it avoids *all* suffering. He discusses other virtues and the contemplative life as aspects of happiness."}, {"text": "Because only philosophers can truly understand and experience genuine friendship.", "isCorrect": false, "rationale": "The text does not suggest that friendship is exclusive to philosophers, but rather that philosophers analyze it as a fundamental aspect of the human condition. Anyone can experience friendship, but Aristotle explains why it's a philosophical subject."}]}, {"question": "A group of young adults frequently gather to play video games and socialize at parties, enjoying each other's company and the fun they share. However, if one person stops playing games or attending parties, their bond tends to weaken. Which type of friendship best describes this scenario according to Aristotle?", "options": [{"text": "Character (perfect) friendship", "isCorrect": false, "rationale": "Character friendship is based on valuing the other for their goodness of character and is stable, not dissolving when external pleasures fade. This scenario describes a contingent relationship."}, {"text": "Utility friendship", "isCorrect": false, "rationale": "Utility friendship is based on what each party provides, often in a practical or business sense. The scenario emphasizes enjoyment, not practical gain."}, {"text": "Civic friendship", "isCorrect": false, "rationale": "Civic friendship refers to goodwill among citizens in a community, not personal relationships based on shared recreational activities."}, {"text": "Pleasure friendship", "isCorrect": true, "rationale": "The text describes pleasure friendship as occurring when 'Each party values the other for the enjoyment the relationship brings' and states it is 'Equally contingent: it dissolves when the pleasure fades,' which aligns perfectly with the scenario."}]}, {"question": "Why does Aristotle consider character friendship to be the 'perfect' (teleios) form of friendship?", "options": [{"text": "Because it is the most common type of friendship found in societies.", "isCorrect": false, "rationale": "The text explicitly states that character friendship is 'rare, because it requires genuine virtue in both parties and time to develop,' making this option incorrect."}, {"text": "Because it is based on the mutual appreciation of each other's inherent goodness and stable character, rather than external factors.", "isCorrect": true, "rationale": "The text states, 'Only character friendship is 'perfect' (teleios) because only it is friendship for the right reason: love of the person as such, not of what they provide or how they make us feel.' This directly refers to the mutual appreciation of inherent goodness and stable character."}, {"text": "Because it provides the most tangible benefits and opportunities for personal advancement.", "isCorrect": false, "rationale": "This describes utility friendship, which is not considered perfect by Aristotle. Character friendship is not primarily about tangible benefits but about the person themselves."}, {"text": "Because it requires no effort or investment to maintain once established.", "isCorrect": false, "rationale": "While character friendship is stable, the text implies it requires 'genuine virtue in both parties and time to develop,' suggesting ongoing effort and investment, even if its foundation is strong."}]}, {"question": "Aristotle's discussion of the three types of friendship (utility, pleasure, character) carries a significant practical implication for an individual's life. What is this implication?", "options": [{"text": "That utility and pleasure friendships are inherently bad and should be avoided at all costs.", "isCorrect": false, "rationale": "The text states, 'These are fine in their place,' referring to utility and pleasure friendships. Aristotle does not suggest they are inherently bad or should be avoided, but rather that they are insufficient on their own for a complete good life."}, {"text": "That one must prioritize forming as many friendships as possible, regardless of type, to maximize social connections.", "isCorrect": false, "rationale": "Aristotle's emphasis is on the *quality* and *type* of friendship, particularly character friendship, rather than merely the *quantity* of social connections."}, {"text": "That neglecting to develop character friendships means missing something essential to living a truly good human life.", "isCorrect": true, "rationale": "The text explicitly states, 'But if we never develop any character friendships... then something essential to the good life is missing.' This is the core practical implication."}, {"text": "That all friendships will inevitably dissolve, so one should prepare for their loss.", "isCorrect": false, "rationale": "While utility and pleasure friendships are contingent, character friendship is described as 'stable' because 'the character of a good person does not change with circumstances.' The implication is not universal dissolution."}]}, {"question": "How does Aristotle's perspective on the relationship between friendship and the state differ fundamentally from modern political theory?", "options": [{"text": "Aristotle believes the state should actively discourage friendship to prevent the formation of factions, whereas modern theory encourages social bonds.", "isCorrect": false, "rationale": "Aristotle emphasizes 'civic friendship' and goodwill as essential for a healthy community, directly contradicting the idea that he would discourage friendship. Modern theory is complex but doesn't necessarily discourage social bonds; it just often separates them from the state's function."}, {"text": "Aristotle sees the state as a mechanism for managing competing interests and power, while modern theory views it as an extension of family affection.", "isCorrect": false, "rationale": "This reverses Aristotle's and modern political theory's views. The text states, 'Modern political theory tends to think of the state as a mechanism for managing competing interests... Aristotle thinks otherwise' and 'Good government is, in this sense, a form of love made institutional.'"}, {"text": "Aristotle views a healthy community as requiring 'civic friendship' and shared welfare, seeing good government as an institutionalized form of love, unlike modern theory's focus on power and law.", "isCorrect": true, "rationale": "The text states, 'Modern political theory tends to think of the state as a mechanism for managing competing interests — it is a structure of power and law, not a form of friendship. Aristotle thinks otherwise,' and that 'a healthy community requires what we might call civic friendship... Good government is, in this sense, a form of love made institutional.'"}, {"text": "Aristotle advocates for a state ruled solely by philosophers who are friends, which is not a concept in modern political thought.", "isCorrect": false, "rationale": "While Aristotle values philosophical inquiry, the text does not state that he advocates for a state ruled *solely* by philosophers who are friends as a primary difference in his view of the state and friendship."}]}, {"question": "Aristotle resolves the 'paradox of self-love' by distinguishing between two senses. Which statement accurately describes Aristotle's concept of 'proper self-love'?", "options": [{"text": "It is the act of accumulating the most wealth, pleasure, and honors for oneself, even at the expense of others.", "isCorrect": false, "rationale": "This describes the 'corrupt sense' of self-love, where one gratifies 'base appetites at the expense of others,' not the proper sense."}, {"text": "It involves a complete disregard for one's own needs in favor of exclusively benefiting others.", "isCorrect": false, "rationale": "Proper self-love is about loving what is best in oneself and acting nobly, which then leads to benefiting others, not a complete disregard of self."}, {"text": "It is the desire to assign to oneself the nobler actions, exercise virtue, and pursue the goods of the soul, which naturally leads to generosity towards others.", "isCorrect": true, "rationale": "The text states, 'The proper sense: Assigning to oneself the nobler actions, the exercise of virtue, the goods of the soul — wanting to be, above all, genuinely good... And this proper self-love... actually produces it [love of others].'"}, {"text": "It means loving oneself as a prerequisite for loving a divine being, as taught by Christian moral theology.", "isCorrect": false, "rationale": "While the text notes this concept anticipates Christian moral theology, Aristotle's explanation is grounded in human reason and virtue, not explicitly divine love, which he couldn't fully articulate."}]}, {"question": "Which of the following is NOT listed as a characteristic Aristotle attributes to the 'bios theoretikos' (contemplative life) as the highest form of happiness?", "options": [{"text": "It is the most self-sufficient, requiring fewer external goods than active life.", "isCorrect": false, "rationale": "The text explicitly lists, 'It is the most self-sufficient (autarkes): the contemplative person needs fewer external goods than the active person,' making this a characteristic."}, {"text": "It exercises the highest part of human beings, the intellect.", "isCorrect": false, "rationale": "The text explicitly lists, 'It exercises the highest part of us (the intellect),' making this a characteristic."}, {"text": "It provides the most stable and enduring pleasures of philosophy.", "isCorrect": false, "rationale": "The text explicitly lists, 'It is the most pleasant: the pleasures of philosophy are the most stable and enduring,' making this a characteristic."}, {"text": "It is easily attainable by anyone who dedicates a minimal amount of time to quiet thought.", "isCorrect": true, "rationale": "The text describes it as 'sustained philosophical inquiry' and 'the active work of reasoning about deep questions,' implying a rigorous and demanding pursuit, not something easily attainable with minimal effort."}]}, {"question": "When Aristotle describes the life of practical virtue as a 'secondary happiness,' what is he implying about its value?", "options": [{"text": "That practical virtues like justice and courage are ultimately worthless and should be abandoned for a contemplative life.", "isCorrect": false, "rationale": "The text clarifies, 'Aristotle does not say that the practical virtues are worthless, or that the statesman's life is not happy.' He recognizes their genuine value."}, {"text": "That it is a genuine form of happiness, but one that is lower than the pure exercise of intellectual contemplation.", "isCorrect": true, "rationale": "The text states, 'Aristotle calls the life of practical virtue a 'secondary happiness' — genuine, but lower than the contemplative life.' This directly supports the answer."}, {"text": "That it is a necessary evil that must be endured before one can reach true contemplative bliss.", "isCorrect": false, "rationale": "Aristotle does not describe practical virtue as an 'evil' or something to be 'endured.' He affirms it as 'genuine' happiness, though not the highest."}, {"text": "That only those incapable of philosophical thought can achieve happiness through practical virtue.", "isCorrect": false, "rationale": "The text makes no such exclusionary claim. It discusses two paths to eudaimonia, one higher than the other, but not limited by capacity in this way."}]}, {"question": "One objection raised against Aristotle's claim that the contemplative life is the highest happiness is the 'self-sufficiency objection.' Which of the following best captures this objection?", "options": [{"text": "The contemplative life, while self-sufficient, prevents the individual from acquiring the material wealth necessary for a truly happy life.", "isCorrect": false, "rationale": "The objection is not about preventing wealth acquisition, but questioning whether self-sufficiency itself is admirable, especially when compared to a life with friends. The text also states the contemplative person 'needs fewer external goods'."}, {"text": "If self-sufficiency is a mark of the highest good, it paradoxically suggests that a person needing no one is better off than one surrounded by friends, contradicting the value Aristotle places on friendship.", "isCorrect": true, "rationale": "The text states, 'The self-sufficiency objection: Aristotle praises self-sufficiency as a mark of the highest good. But is self-sufficiency really admirable? Is the person who needs no one better off than the person surrounded by friends?' This directly matches the description."}, {"text": "The contemplative life's self-sufficiency makes it inaccessible to the majority of people who depend on others for survival.", "isCorrect": false, "rationale": "While the contemplative life is difficult, the self-sufficiency objection in the text focuses on the *admirability* of needing no one, rather than accessibility due to dependence on others."}, {"text": "A life of pure self-sufficiency is boring and unfulfilling, as humans are inherently social creatures who thrive on interaction.", "isCorrect": false, "rationale": "While related, the 'self-sufficiency objection' as presented in the text specifically questions the *admirability* of needing no one in light of friendship's value, rather than a general claim about boredom or social needs, though those are underlying ideas."}]}, {"question": "The 'teachernote' provides an important clarification about Aristotle's concept of the 'contemplative life' (bios theoretikos). What is the key point of this clarification?", "options": [{"text": "It is a passive and withdrawn life of quiet meditation, similar to monastic asceticism.", "isCorrect": false, "rationale": "The 'teachernote' explicitly states, 'Aristotle's 'contemplative life' is not a life of inaction or withdrawal from the world... It is not laziness or passivity.'"}, {"text": "It exclusively refers to the study of religious texts and theological doctrines.", "isCorrect": false, "rationale": "The 'teachernote' describes it as 'sustained philosophical inquiry — the active work of reasoning about deep questions,' and a 'pursuit of truth,' not limited to religious texts, though it notes Aquinas takes it in that direction."}, {"text": "It signifies a life devoted to intense physical training and athletic competition, requiring deep focus.", "isCorrect": false, "rationale": "The 'teachernote' clarifies it as 'sustained philosophical inquiry' and 'the active work of reasoning about deep questions,' relating it to a 'great researcher or scholar,' not physical activity."}, {"text": "It is an active and sustained engagement in philosophical inquiry and the pursuit of truth, akin to a dedicated scholar or researcher.", "isCorrect": true, "rationale": "The 'teachernote' clearly states, 'He means sustained philosophical inquiry — the active work of reasoning about deep questions. It is not laziness or passivity. The closest modern analogy might be the life of a great researcher or scholar who devotes everything to the pursuit of truth.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
