    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why does Aristotle's extensive discussion of friendship in the *Ethics* surprise the reader?", "options": [{"text": "It contradicts his earlier analyses of courage and temperance.", "isCorrect": false, "rationale": "The text states it's a surprise because of its personal nature, not because it contradicts previous virtues. Friendship is presented as connected to virtue, not against it."}, {"text": "It seems to be a personal rather than a purely philosophical topic for an ethical treatise.", "isCorrect": true, "rationale": "The text explicitly states: 'Instead, Aristotle surprises us. He turns to a topic that might seem personal rather than philosophical: friendship.'"}, {"text": "It suggests a shift from rational philosophical inquiry to emotional sentiment.", "isCorrect": false, "rationale": "Aristotle's treatment of friendship is philosophical and analytical, not a concession to mere sentiment. The text clarifies, 'This is not sentiment.'"}, {"text": "It implies a rejection of justice as the highest good in favor of social bonds.", "isCorrect": false, "rationale": "While the text compares friendship and justice, it does not suggest a rejection of justice. Rather, it highlights friendship's unique and vital role alongside justice."}], "id": "q01"}, {"question": "Which statement best captures the meaning of *philia* as described in the text?", "options": [{"text": "It is synonymous with romantic love (*eros*) and solely focuses on intense personal bonds.", "isCorrect": false, "rationale": "The text states that *philia* is 'distinct from eros (romantic love)' and has a broader range than just deep personal friendships."}, {"text": "It refers exclusively to the close relationships between free adult males in Athenian society.", "isCorrect": false, "rationale": "While Aristotle's analysis focuses primarily on this demographic, the text explicitly notes that 'his principles apply more broadly,' covering familial affection, civic bonds, and general goodwill."}, {"text": "It encompasses a broad range of affection, from deep personal bonds to familial ties, civic connections, and general goodwill toward humanity.", "isCorrect": true, "rationale": "The text defines *philia* as covering 'deep personal friendships, familial affection, civic bonds, and even a kind of goodwill toward humanity in general.'"}, {"text": "It is primarily a form of familial affection (*storge*), distinct from other social relationships.", "isCorrect": false, "rationale": "The text clarifies that *philia* is distinct from *storge* (familial affection in the specific sense), though it *covers* familial affection as part of its broader range."}], "id": "q02"}, {"question": "According to Aristotle in the *Nicomachean Ethics* excerpt, why might even a rich and powerful individual have a special need for friends?", "options": [{"text": "Friends provide opportunities to gain even greater wealth and political influence.", "isCorrect": false, "rationale": "While possible, the text emphasizes different aspects for the rich/powerful. It highlights 'doing of kindnesses' and 'keeping or preserving' prosperity rather than accumulation."}, {"text": "Friends help in performing acts of kindness, which are commendable, and in preserving their often 'slippery and hazardous' prosperity.", "isCorrect": true, "rationale": "The text states: 'for where is the use of such prosperity if there be taken away the doing of kindnesses of which friends are the most usual and most commendable objects? Or how can it be kept or preserved without friends? because the greater it is so much the more slippery and hazardous'."}, {"text": "Friends offer protection from rivals and enemies, ensuring their physical safety.", "isCorrect": false, "rationale": "While friends can offer protection, the specific reasons given for the rich/powerful in the text relate to acts of kindness and the stability of their position, not primarily physical safety from enemies."}, {"text": "Friends are necessary to maintain their social status and public image in the community.", "isCorrect": false, "rationale": "The text emphasizes the *doing* of kindnesses and the *preservation* of prosperity as the utility of friends for the powerful, not merely the maintenance of image or status."}], "id": "q03"}, {"question": "What is a characteristic philosophical method Aristotle employs when beginning his discussion of friendship?", "options": [{"text": "He relies solely on popular sayings and common opinions about friendship to establish his arguments.", "isCorrect": false, "rationale": "Aristotle considers common sayings but also moves beyond them, analyzing deeper philosophical issues and distinguishing various types."}, {"text": "He disregards previous philosophical discussions on the topic, preferring to start from first principles.", "isCorrect": false, "rationale": "The text shows Aristotle engaging with other philosophers like Euripides and Heraclitus when discussing disputed points, indicating he doesn't disregard previous thought."}, {"text": "He first identifies the different senses in which a word is used to distinguish genuine concepts from their counterfeits.", "isCorrect": true, "rationale": "The text states: 'Aristotle opens his discussion of friendship with a philosophical move characteristic of his method: he identifies the different senses in which the word is used, so that he can distinguish genuine friendship from its counterfeits.'"}, {"text": "He immediately presents his definitive conclusion on the nature of friendship without examining various viewpoints.", "isCorrect": false, "rationale": "Aristotle's method involves a thorough examination of different viewpoints and common understandings before presenting his developed argument."}], "id": "q04"}, {"question": "A person expresses deep 'love' for their favorite brand of coffee. According to Aristotle's reasoning in Chapter III of the *Nicomachean Ethics* excerpt, why would this not be considered true 'friendship'?", "options": [{"text": "The coffee cannot provide utility or pleasure to the person in return.", "isCorrect": false, "rationale": "The text clarifies that the issue isn't the lack of utility or pleasure from the object, but the one-sided nature of the affection and the inability to wish good for the object's own sake."}, {"text": "The affection is not mutually known between the person and the inanimate object.", "isCorrect": false, "rationale": "While mutual knowledge is a requirement for friendship, the more fundamental issue for inanimate objects is the inability to reciprocate affection or desire its good."}, {"text": "One cannot genuinely wish good to an inanimate object for its own sake, only for one's own use and benefit.", "isCorrect": true, "rationale": "The text explicitly states: 'the term is not applied to the case of fondness for things inanimate because there is no requital of the affection nor desire for the good of those objects: it certainly savours of the ridiculous to say that a man fond of wine wishes well to it: the only sense in which it is true being that he wishes it to be kept safe and sound for his own use and benefit.'"}, {"text": "Friendship requires an object that is absolutely good, which a brand of coffee cannot be.", "isCorrect": false, "rationale": "The issue is the nature of the object's ability to reciprocate and receive 'good wishes for its sake,' not whether it meets a standard of absolute goodness."}], "id": "q05"}, {"question": "Aristotle states that 'where people are in Friendship Justice is not required; but, on the other hand, though they are just they need Friendship in addition.' What does this imply about the relationship between friendship and justice?", "options": [{"text": "Friendship is a prerequisite for justice to exist in a community.", "isCorrect": false, "rationale": "The text implies that friendship can fulfill or supersede the need for formal justice, not that it's a prerequisite for justice itself."}, {"text": "Friendship is a higher or more encompassing form of social bond that can mitigate the formal necessity of justice between individuals.", "isCorrect": true, "rationale": "This statement suggests that a deep, mutual bond of friendship naturally leads to individuals acting well towards each other, making formal justice mechanisms less crucial. However, justice alone does not provide the deeper benefits and connections of friendship, hence the need for it 'in addition'."}, {"text": "Justice is a more fundamental virtue, and friendship is merely an optional complement to it.", "isCorrect": false, "rationale": "The phrasing 'Justice is not required; but... they need Friendship in addition' suggests friendship is highly significant, perhaps even more so in certain contexts, not just optional."}, {"text": "Friendship and justice are mutually exclusive, meaning one completely replaces the other.", "isCorrect": false, "rationale": "They are not mutually exclusive; they can coexist, but friendship seems to offer something beyond the requirements of justice alone."}], "id": "q06"}, {"question": "Beyond merely wishing good to another, what two additional conditions are necessary for a relationship to qualify as 'Friendship' according to Aristotle in Chapter III?", "options": [{"text": "The good wished must be absolute, and the friendship must be based on virtue.", "isCorrect": false, "rationale": "While 'good' is an object and virtue is important for perfect friendship, these are not the explicit conditions for defining the general act of friendship mentioned in Chapter III."}, {"text": "The kindly feeling must be reciprocated, and these mutual feelings must be known to one another.", "isCorrect": true, "rationale": "The text states: 'to complete the idea of Friendship, then, it is requisite that they have kindly feelings towards one another, and wish one another good from one of the aforementioned causes, and that these kindly feelings should be mutually known.'"}, {"text": "There must be an exchange of utility or pleasure, and the relationship must be long-lasting.", "isCorrect": false, "rationale": "Utility and pleasure are motives for specific types of friendship, and longevity is a characteristic, but not the general defining conditions presented for the concept of friendship itself."}, {"text": "Both parties must be morally good, and their similarity must be consistent.", "isCorrect": false, "rationale": "These aspects relate to 'perfect friendship' as introduced in Chapter V, not the general conditions for defining friendship in Chapter III."}], "id": "q07"}, {"question": "Why are 'Friendships of utility' considered particularly prone to dissolution?", "options": [{"text": "The individuals involved in such friendships are inherently untrustworthy or selfish.", "isCorrect": false, "rationale": "The text attributes dissolution to the *nature of utility* itself, not to the inherent character flaws of the individuals involved."}, {"text": "Utility is by nature impermanent and constantly varying, causing the motive for friendship to vanish.", "isCorrect": true, "rationale": "The text states: 'Now it is the nature of utility not to be permanent but constantly varying: so, of course, when the motive which made them friends is vanished, the Friendship likewise dissolves; since it existed only relatively to those circumstances.'"}, {"text": "These friendships typically lack mutual feelings and intimate intercourse, making them fragile.", "isCorrect": false, "rationale": "While they might lack intimate intercourse, the primary reason for dissolution explicitly given is the impermanence of the underlying utility."}, {"text": "They are commonly formed by older individuals, who are generally less reliable in their affections.", "isCorrect": false, "rationale": "The text notes they are common among the old because older individuals 'pursue not what is pleasurable but what is profitable,' not that older people are less reliable."}], "id": "q08"}, {"question": "Two college students frequently spend time together because they enjoy competing in esports tournaments and find each other's company amusing, but they rarely discuss personal struggles or provide deep emotional support. Based on Aristotle's classification, which type of friendship does this most likely represent?", "options": [{"text": "Perfect friendship, as they share a common enjoyable activity and spend time together.", "isCorrect": false, "rationale": "Perfect friendship is based on the goodness of character and a mutual appreciation of that goodness, not primarily on shared pleasurable activities or amusement."}, {"text": "Friendship of utility, because they derive a benefit (entertainment and competitive partnership) from each other.", "isCorrect": false, "rationale": "While entertainment is a benefit, Aristotle distinguishes pleasure from utility (profit/advantage). Their motive is amusement and enjoyment, which falls under pleasure."}, {"text": "Friendship of pleasure, as their bond is primarily based on shared enjoyable experiences and mutual amusement.", "isCorrect": true, "rationale": "This scenario aligns with friendship of pleasure, where the bond is based on finding the other person pleasant or enjoyable. The text describes young people being 'given to the pursuit of pleasure' and forming friendships based on what is 'pleasurable to themselves.'"}, {"text": "A kindly disposition, but not true friendship, due to the lack of deeper interaction.", "isCorrect": false, "rationale": "The mutual enjoyment and choice to spend time together, even if superficial, fits the criteria for a type of friendship based on pleasure, rather than just a kindly disposition (which lacks mutual knowledge and reciprocation)."}], "id": "q09"}, {"question": "The text describes 'three causes from which men feel Friendship' and states there are 'three species of Friendship.' Which of the following is NOT explicitly identified as an *absolute end* or *motive* for one of these species of friendship?", "options": [{"text": "That which is pleasurable.", "isCorrect": false, "rationale": "The text explicitly identifies pleasure as one of the three causes/motives for friendship and as one of the 'objects of Friendship, as absolute Ends.'"}, {"text": "That which is useful.", "isCorrect": false, "rationale": "The text explicitly identifies utility as one of the three causes/motives for friendship, though it notes utility is a means to good or pleasure rather than an absolute end itself."}, {"text": "The goodness or virtue of character.", "isCorrect": false, "rationale": "The text explicitly refers to 'perfect Friendship which subsists between those who are good,' indicating that the goodness of character is the motive for the third species of friendship, and 'the good' is identified as an absolute end."}, {"text": "That which is absolutely good (as distinct from what is good to the individual or good character).", "isCorrect": true, "rationale": "While Aristotle discusses 'good absolutely' versus 'good to the individuals' as a philosophical point, he concludes that individuals feel friendship towards 'that which is good to himself.' The three specific *motives* for the types of friendship are utility, pleasure, and the good of the friend's character. 'Absolutely good' as a separate, distinct motive for a species of friendship, apart from the 'good' found in character, is not presented as one of the fundamental three. The text states the 'objects of Friendship, as absolute Ends, are the good and the pleasurable,' meaning 'the good' (related to character) is an end, but 'absolutely good' is a nuance within the discussion of 'the good' rather than a third distinct motive for a species."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
