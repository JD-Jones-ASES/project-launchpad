    <title>The Life of Man (Aristotle I) &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, why does Aristotle avoid repeating himself for the sake of emphasis, unlike many popular writers?", "options": [{"text": "He assumes the reader is already an expert in the subject matter.", "isCorrect": false, "rationale": "The text suggests the reader might feel like they joined a conversation late, but it doesn't claim he assumes pre-existing expertise."}, {"text": "He expects the reader to retain and recall each point as the argument progresses.", "isCorrect": true, "rationale": "Aristotle writes with the expectation that once a point is made, the reader will hold it in their head to follow the subsequent reasoning."}, {"text": "His writing consists primarily of shorthand notes intended for his own personal use.", "isCorrect": false, "rationale": "While some historical theories suggest this, the source material explicitly attributes his lack of repetition to a style that requires careful attention."}, {"text": "He uses footnotes to provide emphasis rather than repeating points in the main text.", "isCorrect": false, "rationale": "The text mentions footnotes are used for glossing unfamiliar terms, not as a substitute for rhetorical emphasis."}]}, {"question": "If a reader becomes confused while following Aristotle's reasoning, what does the author suggest is the most likely cause?", "options": [{"text": "The reader has failed to identify the specific conclusion first.", "isCorrect": false, "rationale": "While identifying the conclusion is a recommended habit, the text specifically links confusion during reasoning to a loss of key definitions."}, {"text": "The translation being used is too informal for the subject matter.", "isCorrect": false, "rationale": "The text describes the provided translations as formal and faithful, rather than blaming them for reader confusion."}, {"text": "The reader has lost track of a foundational definition provided earlier.", "isCorrect": true, "rationale": "Aristotle defines terms like $eudaimonia$ and $arete$ before reasoning from them, so missing the definition makes the subsequent logic difficult to follow."}, {"text": "Aristotle has intentionally looped back to an earlier, settled point.", "isCorrect": false, "rationale": "The text mentions that arguments may loop back or be qualified, but identifies slips in definitions as the primary source of confusion."}]}, {"question": "What is the recommended first step when approaching one of Aristotle's longer, more complex arguments?", "options": [{"text": "Analyze the individual steps of the argument in chronological order.", "isCorrect": false, "rationale": "The text warns that the steps are easier to follow only after the final destination is understood."}, {"text": "Identify what Aristotle is ultimately trying to prove.", "isCorrect": true, "rationale": "Knowing the conclusion first makes it easier to understand how the individual, often 'windy' steps contribute to the final goal."}, {"text": "Consult the master glossary for any technical transliterations.", "isCorrect": false, "rationale": "While definitions are important, the specific advice for handling long arguments is to find the conclusion first."}, {"text": "Compare the current argument to the views of 'the wise' cited by Aristotle.", "isCorrect": false, "rationale": "Reviewing other views is part of Aristotle's internal structure, but the reader's strategy should be to look for the end point first."}]}, {"question": "Aristotle's 'on the one hand' structure involves surveying different viewpoints. Which of the following best describes the sequence he typically follows before stating his own position?", "options": [{"text": "Common opinions, followed by his own conclusion, followed by the views of the wise.", "isCorrect": false, "rationale": "This sequence places the conclusion in the middle, whereas Aristotle typically arrives at his position after the survey."}, {"text": "The views of the wise, followed by an immediate dismissal of common opinions.", "isCorrect": false, "rationale": "Aristotle takes both common and wise views seriously before identifying where they succeed or fail."}, {"text": "Common opinions, the views of the wise, and an analysis of where both are right or wrong.", "isCorrect": true, "rationale": "He characteristically surveys what most people think and what the wise say, then critiques both groups before presenting his own view."}, {"text": "A list of his own previous arguments followed by objections from his contemporaries.", "isCorrect": false, "rationale": "The text describes him surveying external groups (the many and the wise) rather than just his own history."}]}, {"question": "When creating a running outline of Aristotle's work, which of these components is explicitly listed as part of a 'simple outline' in the text?", "options": [{"text": "A list of all transliterated Greek terms used in the section.", "isCorrect": false, "rationale": "While Greek terms are important, the suggested outline focuses on the logical structure of the argument, not a vocabulary list."}, {"text": "An objection considered by Aristotle during the course of his reasoning.", "isCorrect": true, "rationale": "The text recommends including the main point, supporting argument, objection considered, and the conclusion in a running outline."}, {"text": "A comparison between the W. D. Ross and William Ellis translations.", "isCorrect": false, "rationale": "The outline is meant to track Aristotle's philosophical content, not a comparative analysis of different translators."}, {"text": "A summary of 'what most people think' regarding the topic.", "isCorrect": false, "rationale": "Although Aristotle surveys these views, the outline template provided focuses on the core structure: main point, support, objection, and conclusion."}]}, {"question": "Which translator is credited with the 1925 version of the $Nicomachean$ $Ethics$ used in the source material?", "options": [{"text": "William Ellis", "isCorrect": false, "rationale": "William Ellis is identified as the translator of the $Politics$ in the 1912 Everyman's Library edition."}, {"text": "W. D. Ross", "isCorrect": true, "rationale": "The text states that the selections from the $Nicomachean$ $Ethics$ use the translation of W. D. Ross from 1925."}, {"text": "Project Gutenberg", "isCorrect": false, "rationale": "Project Gutenberg is the source where the public domain translations are available, not the name of the translator."}, {"text": "Everyman's Library", "isCorrect": false, "rationale": "Everyman's Library is the publisher or collection associated with the Ellis translation of the $Politics$."}]}, {"question": "According to the author, what makes a page of Aristotle worth ten pages of skimmed material?", "options": [{"text": "The use of formal translations that clarify his careful distinctions.", "isCorrect": false, "rationale": "While translations are important, the value comparison is specifically about the density of the argument and the need to hold it in one's head."}, {"text": "The inclusion of transliterated terms like $polis$ and $telos$.", "isCorrect": false, "rationale": "Transliterations help with accuracy but do not explain the quantitative 'worth' of slow reading vs. skimming."}, {"text": "The density of the arguments and the lack of repetition for emphasis.", "isCorrect": true, "rationale": "Because Aristotle means what he says the first time and expects it to be remembered, skimming causes the reader to lose the thread of the serious work."}, {"text": "The intellectual honesty shown in considering opposing views.", "isCorrect": false, "rationale": "Intellectual honesty is a sign of his quality, but the advice to read slowly stems from his concise, non-repetitive style."}]}, {"question": "How are Greek technical terms like $eudaimonia$ or $polis$ formatted and explained within the text of this book?", "options": [{"text": "They are written in standard text and explained in the master glossary only.", "isCorrect": false, "rationale": "The text states they appear in italics and are defined in footnotes on their first use, in addition to the glossary."}, {"text": "They appear in italics and are defined in a footnote upon their first use.", "isCorrect": true, "rationale": "The author specifies that transliterations are italicized and glossed in footnotes when they first appear."}, {"text": "They are translated into English immediately following the word in parentheses.", "isCorrect": false, "rationale": "The text indicates that definitions are found in footnotes and a master glossary rather than inline parentheticals."}, {"text": "They are bolded to signal that their definition has changed from previous chapters.", "isCorrect": false, "rationale": "Italics, not bolding, are used for transliterations, and definitions are consistent based on earlier reasoning."}]}, {"question": "The author states that the 'on the one hand' structure can feel meandering. What positive quality does this structure supposedly demonstrate?", "options": [{"text": "Historical accuracy regarding the views of the wise.", "isCorrect": false, "rationale": "While it might be historically accurate, the author specifically highlights it as a sign of a character trait in Aristotle's method."}, {"text": "Intellectual honesty.", "isCorrect": true, "rationale": "The author argues that taking opposing views seriously before dismissing them is a sign of Aristotle's intellectual honesty."}, {"text": "Linguistic precision in translation.", "isCorrect": false, "rationale": "Linguistic precision is attributed to the translations of Ross and Ellis, whereas the structure is attributed to Aristotle himself."}, {"text": "Pedagogical repetition.", "isCorrect": false, "rationale": "The author explicitly states that Aristotle does *not* repeat himself for emphasis."}]}, {"question": "Which work by Aristotle uses the 1912 translation by William Ellis in this collection?", "options": [{"text": "The $Nicomachean$ $Ethics$", "isCorrect": false, "rationale": "The $Ethics$ uses the translation by W. D. Ross."}, {"text": "The $Introduction$ $to$ $the$ $Philosopher$", "isCorrect": false, "rationale": "This is the title of the section being read, not the primary Aristotelian work translated by Ellis."}, {"text": "The $Politics$", "isCorrect": true, "rationale": "The text explicitly mentions that the selections from the $Politics$ use the translation of William Ellis."}, {"text": "The $Master$ $Glossary$", "isCorrect": false, "rationale": "The master glossary is a supplemental section of the book, not a primary work translated by Ellis."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
