    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the source material, why do Aristotle's surviving treatises differ significantly in style from the lost dialogues praised by Cicero?", "options": [{"text": "The treatises were working documents and lecture notes intended for internal use rather than publication.", "isCorrect": true, "rationale": "The text explains that the surviving works were likely lecture notes or working documents refined over years of teaching, making them dense and compressed."}, {"text": "Aristotle intentionally adopted a dense, non-ornamental style to distinguish his school from Plato's Academy.", "isCorrect": false, "rationale": "While the style is different from Plato's, the text attributes the density to the nature of the documents as lecture notes rather than a deliberate stylistic rebellion."}, {"text": "The treatises were written late in his life when he had abandoned the 'river of gold' prose of his youth.", "isCorrect": false, "rationale": "The source does not provide a chronological explanation for the style change, but rather a functional one based on the purpose of the texts."}, {"text": "Later editors stripped away the conversational elements to focus purely on the logical arguments.", "isCorrect": false, "rationale": "The material suggests the texts originated as lecture notes, not that they were edited down from a more conversational form."}], "id": "q01"}, {"question": "In the context of the Aristotelian corpus, what is the specific role of the $Organon$?", "options": [{"text": "It serves as a collection of works on biology and the classification of living organisms.", "isCorrect": false, "rationale": "Biology is covered in works like the 'History of Animals,' whereas the 'Organon' focuses on the mechanics of reasoning."}, {"text": "It functions as a logical toolkit or instrument for conducting scientific demonstration and inquiry.", "isCorrect": true, "rationale": "The name 'Organon' means 'instrument' or 'tool,' and it comprises six treatises that established the foundation of formal logic."}, {"text": "It is a treatise on the nature of the soul and the process of perception.", "isCorrect": false, "rationale": "The nature of the soul and perception are the primary subjects of 'De Anima,' not the 'Organon.'"}, {"text": "It explores the first principles of reality, including substance and causation.", "isCorrect": false, "rationale": "Substance and causation are the focus of the 'Metaphysics' rather than the logical treatises."}], "id": "q02"}, {"question": "Aristotle's approach to ethics and politics is described as a single inquiry. What is the unifying term he uses for this study?", "options": [{"text": "The philosophy of human affairs", "isCorrect": true, "rationale": "The text explicitly states that the Ethics and Politics together form a single inquiry into what Aristotle calls the 'philosophy of human affairs.'"}, {"text": "The teleological science of the $polis$", "isCorrect": false, "rationale": "While he uses teleological methods and studies the 'polis,' this specific phrase is not the name given to the combined inquiry in the text."}, {"text": "The doctrine of the mean", "isCorrect": false, "rationale": "The doctrine of the mean is a specific ethical concept, not the overarching name for his combined study of ethics and politics."}, {"text": "The science of $eudaimonia$", "isCorrect": false, "rationale": "While happiness is a central theme, the text identifies the combined inquiry by a different name regarding human conduct and social organization."}], "id": "q03"}, {"question": "Which work in the Aristotelian corpus provides an account of what it means to perceive, think, feel, and be alive?", "options": [{"text": "Metaphysics", "isCorrect": false, "rationale": "The 'Metaphysics' deals with the nature of reality and being in a general sense, rather than specific psychological processes."}, {"text": "De Anima", "isCorrect": true, "rationale": "'De Anima,' or 'On the Soul,' is identified as Aristotle's psychology, covering perception, thought, and the essence of life."}, {"text": "The Physics", "isCorrect": false, "rationale": "'The Physics' establishes the foundations of natural science and the study of change, not internal psychological states."}, {"text": "The Rhetoric", "isCorrect": false, "rationale": "'The Rhetoric' focuses on the analysis of persuasive speech rather than the fundamental nature of the soul."}], "id": "q04"}, {"question": "In Aristotelian teleology, what does the term $telos$ signify for a natural object or a human being?", "options": [{"text": "The initial cause or starting point of a process.", "isCorrect": false, "rationale": "A starting point would be an efficient or material cause, whereas $telos$ refers to the conclusion or purpose."}, {"text": "The accidental or unintended consequence of an action.", "isCorrect": false, "rationale": "A $telos$ is a natural tendency or goal, not a random or accidental outcome."}, {"text": "The state of completion or excellence toward which a thing naturally tends.", "isCorrect": true, "rationale": "For Aristotle, the $telos$ is the 'end' or 'goal,' representing the full realization or flourishing of a thing's potential."}, {"text": "The set of rules or laws that govern the behavior of a system.", "isCorrect": false, "rationale": "The text notes that Aristotle is less interested in rules and more interested in the success and purpose of a thing."}], "id": "q05"}, {"question": "How does the text characterize the relationship between the Nicomachean Ethics and the Politics?", "options": [{"text": "The Politics serves as the practical application of the theoretical principles established in the Ethics.", "isCorrect": false, "rationale": "The text describes them as a continuation and a single inquiry, rather than a strictly theory-vs-practice divide."}, {"text": "The Politics is a separate inquiry that often contradicts the individual-focused goals of the Ethics.", "isCorrect": false, "rationale": "The text states that neither is complete without the other, implying a symbiotic and continuous relationship."}, {"text": "The Politics takes up where the Ethics leaves off, moving from the individual's life to the organization of communities.", "isCorrect": true, "rationale": "The source explains that if ethics asks how an individual should live, politics asks how communities should be organized to facilitate that living."}, {"text": "The Ethics is a summary of the personal virtues required to succeed in the structures defined by the Politics.", "isCorrect": false, "rationale": "The text suggests the Ethics is the starting point, asking the fundamental question of the best life, which the Politics then expands upon."}], "id": "q06"}, {"question": "According to the passage, what is the 'central question' of the Nicomachean Ethics?", "options": [{"text": "How can a city-state achieve the greatest power and stability?", "isCorrect": false, "rationale": "This question is more aligned with the Politics than the Ethics specifically."}, {"text": "What are the universal rules that every human must follow?", "isCorrect": false, "rationale": "The text explicitly states that Aristotle is not primarily interested in rules or calculations."}, {"text": "What is the best life for a human being?", "isCorrect": true, "rationale": "The text identifies this as the single, fundamental question that the Ethics asks and systematically answers."}, {"text": "How does one distinguish between perception and reality?", "isCorrect": false, "rationale": "This is a metaphysical or psychological question, whereas the Ethics focuses on the human good."}], "id": "q07"}, {"question": "Which of these best describes Aristotle's teleological method of understanding a craft or a social institution?", "options": [{"text": "Analyzing the history and origin of how the institution was first created.", "isCorrect": false, "rationale": "Teleology focuses on the 'end' or 'purpose,' not the historical origins or 'beginning' of a thing."}, {"text": "Calculating the total amount of pleasure produced by the institution for the majority of people.", "isCorrect": false, "rationale": "The text states that Aristotle's approach is different from asking what produces the greatest happiness for the greatest number."}, {"text": "Identifying its function and determining what it would mean for that thing to flourish or succeed.", "isCorrect": true, "rationale": "Aristotle understands things in terms of what they are for and what counts as their success or state of excellence."}, {"text": "Categorizing the institution based on a set of rigid, pre-defined logical propositions.", "isCorrect": false, "rationale": "While logic is part of his toolkit, his teleological inquiry specifically looks at purpose and function rather than just classification."}], "id": "q08"}, {"question": "Based on the text, why is the primary ethical work of the Western tradition titled the Nicomachean Ethics?", "options": [{"text": "It was named after Nicomachus of Stagira, a contemporary philosopher who co-authored the text.", "isCorrect": false, "rationale": "The text identifies Nicomachus as either Aristotle's father or son, not a contemporary co-author."}, {"text": "The name refers to either Aristotle's father or his son, though the exact dedication remains uncertain.", "isCorrect": true, "rationale": "The source notes that both Aristotle's father and son were named Nicomachus and ancient sources disagree on which one the title refers to."}, {"text": "Nicomachus was the student who most accurately recorded the lecture notes used in the treatise.", "isCorrect": false, "rationale": "While some think his son edited the lectures, the text mentions him as the possible dedicatee or namesake, not solely as a scribe."}, {"text": "The title is a Greek term for the 'Victory of Ethics' over political ambition.", "isCorrect": false, "rationale": "Nicomachus is a proper name in this context, not a descriptive philosophical term."}], "id": "q09"}, {"question": "Which area of Aristotle's study is characterized by 'detailed natural history based on direct observation and dissection'?", "options": [{"text": "Physics", "isCorrect": false, "rationale": "The 'Physics' focuses on the foundations and general principles of natural science rather than specific anatomical details."}, {"text": "Biology", "isCorrect": true, "rationale": "The biological works, such as 'History of Animals' and 'Parts of Animals,' are specifically noted for their reliance on observation and dissection."}, {"text": "Metaphysics", "isCorrect": false, "rationale": "The 'Metaphysics' is a theoretical study of being and reality, not an empirical study based on dissection."}, {"text": "Psychology", "isCorrect": false, "rationale": "While related, psychology (De Anima) focuses on the account of being alive and perceiving, rather than the natural history of animal parts."}], "id": "q10"}, {"question": "Cicero described Aristotle's lost dialogues as 'a river of gold.' What does this suggest about the fate of those works?", "options": [{"text": "The polished, elegant dialogues are lost, and only the dense lecture-note treatises survive.", "isCorrect": true, "rationale": "Cicero's praise for the dialogues' eloquence confirms their high quality, yet none survive — making the contrast with the existing treatises all the more striking."}, {"text": "The dialogues were collected and preserved by Plato's Academy after Aristotle's death.", "isCorrect": false, "rationale": "The text states explicitly that none of the praised dialogues survive; they were not preserved."}, {"text": "The phrase means Cicero considered the treatises more valuable than gold.", "isCorrect": false, "rationale": "Cicero praised the dialogues, not the treatises; 'a river of gold' refers to prose style, not monetary value."}, {"text": "The dialogues were eventually translated into Latin by Cicero himself.", "isCorrect": false, "rationale": "Cicero commented on their style, but the text does not claim he translated them; moreover, none survive regardless."}], "id": "q11"}, {"question": "How does Aristotle's teleological method differ from utilitarian or rule-based approaches to ethics?", "options": [{"text": "It focuses on what excellent human living looks like and how to achieve it, rather than on rules or maximizing pleasure.", "isCorrect": true, "rationale": "The text explicitly contrasts teleology with 'What rules must we follow?' and 'What produces the greatest happiness for the greatest number?', noting Aristotle wants to know what excellent living looks like."}, {"text": "It relies on divine commands issued by gods to determine what actions are right or wrong.", "isCorrect": false, "rationale": "Aristotle's method is grounded in natural function and observation, not divine revelation or command."}, {"text": "It calculates the telos of each action mathematically to arrive at a universal ethical formula.", "isCorrect": false, "rationale": "The text specifically contrasts teleology with calculation-based approaches; Aristotle is not primarily interested in formulas."}, {"text": "It limits ethical inquiry to the study of the polis and ignores the individual's inner life.", "isCorrect": false, "rationale": "Teleology applies to individuals as well as communities; the Ethics is precisely about the best life for a human being."}], "id": "q12"}, {"question": "The text uses an acorn as an example to illustrate Aristotle's concept of $telos$. What does this example demonstrate?", "options": [{"text": "That every natural thing has an inherent purpose — the state of completion toward which it naturally tends.", "isCorrect": true, "rationale": "An acorn's telos is the oak tree: the acorn is naturally oriented toward that completed form. Aristotle applies this same logic to human beings and their potential for excellent living."}, {"text": "That the material cause (the acorn's matter) is more important than its final cause.", "isCorrect": false, "rationale": "The acorn example highlights the final cause — the telos — not the superiority of material over purpose."}, {"text": "That plants and animals have a telos but humans are unique in having no natural end.", "isCorrect": false, "rationale": "Quite the opposite: Aristotle extends the telos concept to human beings, making their happiness and virtue the central question of the Ethics."}, {"text": "That nature is unpredictable and that not all acorns will become oak trees.", "isCorrect": false, "rationale": "The example is used to illustrate the concept of natural purpose, not to comment on statistical success rates in nature."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
