<div class="quiz-container">

        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Thomas Aquinas primarily engage with Aristotle's ethical framework in his Summa Theologica?", "options": [{"text": "By directly refuting Aristotle's pagan views to establish Christian doctrine as superior.", "isCorrect": false, "rationale": "Aquinas did not approach Aristotle as a competitor to be refuted. He called him 'the Philosopher' as a title of respect and built upon his ideas."}, {"text": "By receiving Aristotle's insights as a foundation and elevating them toward supernatural completion.", "isCorrect": true, "rationale": "The text states Aquinas's project is 'not to replace Aristotle's ethics but to receive it, to build on its genuine insights, and to raise the framework toward its supernatural completion.'"}, {"text": "By presenting Aristotle as a competitor whose philosophy needed to be entirely replaced with Christian theology.", "isCorrect": false, "rationale": "Aquinas sought to complement and complete Aristotle's ethics, not to replace it entirely. He found genuine insights in Aristotle."}, {"text": "By reinterpreting Aristotle's concepts entirely through a strictly biblical lens, discarding all philosophical elements.", "isCorrect": false, "rationale": "Aquinas used Aristotle's own language and structure extensively, integrating philosophy and theology rather than discarding philosophical elements."}]}, {"question": "What is the critical distinction Aquinas introduces regarding happiness that Aristotle could not have made?", "options": [{"text": "The difference between individual satisfaction and communal well-being.", "isCorrect": false, "rationale": "Aristotle's *eudaimonia* encompassed both individual flourishing and the good of the polis, so this distinction is not unique to Aquinas in this context."}, {"text": "The distinction between happiness achieved through natural human powers and happiness requiring divine grace.", "isCorrect": true, "rationale": "Aquinas distinguishes between 'imperfect happiness' (Aristotle's *eudaimonia*, achieved naturally) and 'perfect happiness' (the beatific vision, requiring divine grace and exceeding natural capacity), a distinction dependent on 'revealed truth.'"}, {"text": "The division between material prosperity and intellectual fulfillment.", "isCorrect": false, "rationale": "Aristotle recognized the value of intellectual pursuits as part of *eudaimonia*, so this division is not the novel distinction Aquinas introduces."}, {"text": "The contrast between fleeting worldly pleasure and enduring moral virtue.", "isCorrect": false, "rationale": "Aristotle's *eudaimonia* already emphasized enduring moral virtue over fleeting pleasure. This is not Aquinas's unique contribution in this specific distinction."}]}, {"question": "According to Aquinas, why is imperfect happiness, even as described by Aristotle, insufficient for ultimate human fulfillment?", "options": [{"text": "Because virtuous activity over a complete life is inherently impossible for humans to achieve.", "isCorrect": false, "rationale": "Aquinas explicitly endorses Aristotle's account of imperfect happiness as 'genuine happiness' and attainable through natural powers."}, {"text": "Because the human will is oriented towards the universal good and cannot be fully satisfied by any particular created thing.", "isCorrect": true, "rationale": "Aquinas argues that 'The will of a human being is oriented toward the universal good, and no particular created thing... can fully satisfy a will of infinite capacity.'"}, {"text": "Because human beings are fundamentally flawed and incapable of sustained moral effort without divine intervention.", "isCorrect": false, "rationale": "While a theological concept, the text does not cite human flaw or incapability of moral effort as the specific reason for the insufficiency of imperfect happiness; it focuses on the object of the will."}, {"text": "Because philosophical contemplation, while good, leads to intellectual pride rather than true happiness.", "isCorrect": false, "rationale": "Philosophical contemplation is considered a high form of imperfect happiness by both Aristotle and Aquinas, not a source of pride or a reason for its insufficiency in the text."}]}, {"question": "What does Aquinas's concept of the 'beatific vision' entail as the culmination of perfect happiness?", "options": [{"text": "A heightened state of moral virtue achieved through rigorous asceticism and discipline.", "isCorrect": false, "rationale": "While moral virtue is important, the beatific vision is described as direct knowledge of God, not merely a state of moral virtue."}, {"text": "The direct, unmediated knowledge and contemplation of God as He is in Himself.", "isCorrect": true, "rationale": "The text defines the beatific vision as 'the direct vision or contemplation of God as he is in himself, enjoyed by the blessed in heaven.'"}, {"text": "A deep sense of peace and contentment derived from a life well-lived in accordance with natural law.", "isCorrect": false, "rationale": "This describes aspects of imperfect happiness or a virtuous life, but not the specific, supernatural vision of God."}, {"text": "The complete understanding of all philosophical and scientific truths through human reason.", "isCorrect": false, "rationale": "The text states the beatific vision 'exceeds all natural capacity,' implying it's beyond what human reason alone can achieve."}]}, {"question": "A student carefully plans their academic schedule, researches professors, and intentionally chooses courses that align with their career goals. According to Aquinas, why would this action be considered 'properly human'?", "options": [{"text": "Because it is motivated by a desire for worldly success and recognition.", "isCorrect": false, "rationale": "Aquinas defines 'properly human' actions by their origin in deliberate will, not necessarily by the specific type of end (worldly vs. spiritual) or the moral quality of the motivation."}, {"text": "Because it proceeds from a deliberate will, exercising reason and choice.", "isCorrect": true, "rationale": "Aquinas states, 'those actions alone are properly called human, of which man is master. Now man is master of his actions through his reason and will... Therefore those actions are properly called human which proceed from a deliberate will.'"}, {"text": "Because it involves complex cognitive processes that irrational animals cannot perform.", "isCorrect": false, "rationale": "While true, Aquinas's specific definition of 'properly human' action emphasizes the *mastery* of action through *will* and *reason*, not just the complexity of the cognitive process."}, {"text": "Because it aims at a specific end, regardless of whether that end is inherently good or bad.", "isCorrect": false, "rationale": "Aquinas clarifies that the 'object of the will is the end and the good.' While aiming at an end is key, the complete definition links it to the good."}]}, {"question": "In the Summa Theologica, when Aquinas states that 'the end is the principle in human operations,' what is he primarily doing?", "options": [{"text": "Introducing a novel theological concept previously unknown to philosophy.", "isCorrect": false, "rationale": "Aquinas explicitly attributes this idea to 'the Philosopher' (Aristotle) in the *Summa Theologica*, indicating it's an established philosophical concept he's using."}, {"text": "Establishing a theological dogma that directly contradicts Greek philosophical thought.", "isCorrect": false, "rationale": "Aquinas uses Aristotle's language and framework to *ground* his discussion, not to contradict it. He builds upon Aristotle's insights."}, {"text": "Grounding his ethical discussion in an Aristotelian framework to show that human action is inherently directed toward ends.", "isCorrect": true, "rationale": "The text states, 'Aquinas begins his treatment of human happiness by grounding it in Aristotle's own framework: every human action aims at an end... uses Aristotle's own language... to establish his starting point.'"}, {"text": "Critiquing Aristotle's teleological view of action as insufficient for Christian ethics.", "isCorrect": false, "rationale": "Aquinas adopts and builds upon Aristotle's teleological view, finding it a necessary 'framework within which the question of happiness must be asked,' rather than critiquing it as insufficient at this foundational stage."}]}, {"question": "Why does Aquinas conclude that man cannot attain perfect happiness by his natural powers alone?", "options": [{"text": "Because natural powers are inherently sinful and thus incapable of achieving any form of true good.", "isCorrect": false, "rationale": "Aquinas acknowledges that imperfect happiness, which is a 'genuine good,' can be acquired by natural powers. His argument for perfect happiness is not based on the sinfulness of natural powers."}, {"text": "Because perfect happiness, the vision of the Divine Essence, infinitely surpasses the capacity of human (and all created) nature.", "isCorrect": true, "rationale": "Aquinas states that 'the vision of God's Essence surpasses the nature not only of man, but also of every creature... Consequently neither man, nor any creature, can attain final Happiness by his natural powers.'"}, {"text": "Because human life is too short to complete the extensive virtuous activities required for such profound happiness.", "isCorrect": false, "rationale": "This touches on Aristotle's concept of a 'complete life' but is not Aquinas's reason for why *perfect* happiness (the beatific vision) is unattainable by natural powers; that reason is its supernatural nature."}, {"text": "Because God intentionally withholds perfect happiness to test human faith and obedience during their earthly life.", "isCorrect": false, "rationale": "While this might be a theological belief, Aquinas's philosophical and theological argument in the text focuses on the *nature* of the beatific vision exceeding natural capacity, not divine withholding as a test."}]}, {"question": "While acknowledging that 'health, friendship, a measure of external goods, and virtuous activity are genuine goods,' what is Aquinas's primary qualification about them regarding human fulfillment?", "options": [{"text": "They are merely illusions of happiness that ultimately distract from the true, spiritual good.", "isCorrect": false, "rationale": "Aquinas explicitly calls these 'genuine goods' and states he 'explicitly endorses Aristotle's point' about them, indicating they are not illusions."}, {"text": "They are only available to a select few, thus making perfect happiness inaccessible for most of humanity.", "isCorrect": false, "rationale": "The text does not suggest these goods are exclusive, and Aquinas's primary qualification concerns their capacity to satisfy the human will, not their accessibility."}, {"text": "They do not exhaust what human beings are made for, as the human will desires a universal, unlimited good.", "isCorrect": true, "rationale": "The text states, 'He simply adds that they do not exhaust what human beings are made for,' because 'the human will is directed toward the universal good' which no particular good can satisfy."}, {"text": "They are tainted by original sin and therefore cannot contribute to true blessedness without supernatural purification.", "isCorrect": false, "rationale": "Aquinas's argument here focuses on the *limitation* of created goods to satisfy an unlimited appetite, not their inherent sinfulness."}]}, {"question": "A CEO dedicates their life to maximizing their company's profit and personal wealth, believing this will bring them ultimate contentment. Based on Aquinas's argument, why would this pursuit ultimately fall short of perfect happiness?", "options": [{"text": "Wealth is an external good and therefore inherently corrupting to the soul, preventing any true happiness.", "isCorrect": false, "rationale": "Aquinas acknowledges 'a measure of external goods' as part of genuine, albeit imperfect, happiness. The issue is wealth's *limitation* as a particular good, not its inherent corruption."}, {"text": "The CEO's will, being oriented towards the universal good, cannot be fully satisfied by a particular, finite created good like wealth.", "isCorrect": true, "rationale": "Aquinas argues that 'no particular created thing — not wealth... can fully satisfy a will of infinite capacity,' because the human will desires the 'universal good.'"}, {"text": "True happiness can only be found in renouncing all worldly possessions, which the CEO fails to do.", "isCorrect": false, "rationale": "Aquinas does not state that happiness requires renouncing all worldly possessions; rather, he states that particular created goods, even if possessed, cannot fully satisfy the will."}, {"text": "Business activities, by their nature, are incompatible with the pursuit of virtue and spiritual contemplation.", "isCorrect": false, "rationale": "The text does not make a blanket judgment against business activities; the focus is on the *object* of desire (particular good like wealth) failing to satisfy the *nature* of the will (universal good)."}]}, {"question": "In Summa Theologica I-II, Q. 1, Art. 1, what fundamental premise, largely drawn from Aristotle, does Aquinas establish as the starting point for his discussion of human happiness?", "options": [{"text": "That humanity's fall from grace necessitates a divine intervention for happiness.", "isCorrect": false, "rationale": "While a core theological belief, this is not the specific Aristotelian premise Aquinas uses as his starting point for the discussion of human *action* and happiness in this article."}, {"text": "That all human actions, properly understood, are performed for an end.", "isCorrect": true, "rationale": "Aquinas explicitly states he 'begins his treatment of human happiness by grounding it in Aristotle's own framework: every human action aims at an end, and the will is ordered to the good as the intellect is ordered to truth.'"}, {"text": "That true happiness is found solely through mystical contemplation, transcending all reason.", "isCorrect": false, "rationale": "Aquinas uses reason extensively and builds toward the beatific vision, which surpasses but does not dismiss reason as a starting point."}, {"text": "That only virtuous individuals are capable of performing truly 'human' actions.", "isCorrect": false, "rationale": "Aquinas defines 'properly human' actions by their source in a 'deliberate will' (reason and will), not necessarily by their moral virtue at this foundational stage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
