    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what two works complete Aristotle's 'philosophy of human affairs' alongside the Nicomachean Ethics and the Politics?", "options": [{"text": "Metaphysics and Physics", "isCorrect": false, "rationale": "The text states that 'Volume II of this series will take up the two remaining pillars of Aristotle's practical philosophy: the Poetics and the Rhetoric,' while Metaphysics and Physics are not mentioned in this context."}, {"text": "The Poetics and The Rhetoric", "isCorrect": true, "rationale": "The section explicitly states these two works are the 'remaining pillars of Aristotle's practical philosophy' that Volume II will explore, complementing the Ethics and Politics."}, {"text": "On the Soul and Categories", "isCorrect": false, "rationale": "These are Aristotelian works, but the text does not identify them as completing his 'philosophy of human affairs' in this specific context."}, {"text": "Prior Analytics and Posterior Analytics", "isCorrect": false, "rationale": "These works are central to Aristotle's logic, but the text focuses on Poetics and Rhetoric as completing his practical philosophy."}], "id": "q01"}, {"question": "Aristotle's concept of 'mimesis' in the Poetics suggests that art primarily serves what purpose?", "options": [{"text": "To perfectly replicate reality as a historical record.", "isCorrect": false, "rationale": "The text clarifies that mimesis is 'not slavish copying,' but representation, and its pleasure is cognitive, not historical recording."}, {"text": "To entertain the audience through fantastical and unrealistic scenarios.", "isCorrect": false, "rationale": "While entertainment might be a byproduct, the text emphasizes the cognitive pleasure of understanding human action, character, and emotion more clearly, which is distinct from mere fantastical entertainment."}, {"text": "To represent human action, character, and emotion in a controlled medium, enabling clearer understanding from a distance.", "isCorrect": true, "rationale": "The text defines mimesis as 'representation of action, character, and emotion in a medium... that allows us to contemplate them at a distance,' leading to a clearer understanding than in real life."}, {"text": "To directly provoke immediate emotional reactions without deeper contemplation.", "isCorrect": false, "rationale": "The text states the pleasure of imitation is 'cognitive' and allows for contemplation 'at a distance,' implying a more reflective process than immediate, unmediated emotional provocation."}], "id": "q02"}, {"question": "How does Aristotle's concept of 'catharsis' in the Poetics connect to his Nicomachean Ethics?", "options": [{"text": "Both works argue for the suppression of all emotions to achieve a state of rational virtue.", "isCorrect": false, "rationale": "The text states catharsis involves 'emotional education,' and the Ethics focuses on feeling 'the right things at the right times,' not suppression."}, {"text": "Catharsis is presented as a purely aesthetic phenomenon, separate from any moral or ethical implications.", "isCorrect": false, "rationale": "The text explicitly connects catharsis 'directly to Aristotle's ethical psychology,' stating that 'art that trains our emotional responses is morally significant, not merely pleasant.'"}, {"text": "The emotional education provided by tragedy through catharsis is considered morally significant for developing virtue, as virtue involves appropriate emotional responses.", "isCorrect": true, "rationale": "The text explains that if 'virtue requires feeling the right things at the right times, then art that trains our emotional responses is morally significant,' directly linking catharsis to the Ethics."}, {"text": "The Ethics defines catharsis as the process of intellectual purification through philosophical debate.", "isCorrect": false, "rationale": "The text defines catharsis in the Poetics as the emotional effect of tragedy on the audience, not an intellectual process described in the Ethics."}], "id": "q03"}, {"question": "In the context of tragedy, Aristotle's concept of 'hamartia' refers to:", "options": [{"text": "An inherently evil character receiving their just punishment.", "isCorrect": false, "rationale": "The text explicitly states that the best tragedy shows 'not a thoroughly wicked person meeting his just end,' but someone of nobility brought down by an error."}, {"text": "A perfectly virtuous individual destroyed by external, uncontrollable forces.", "isCorrect": false, "rationale": "The text states that the best tragedy shows 'not a perfectly virtuous person destroyed by malice,' but a downfall resulting from the protagonist's own error."}, {"text": "A protagonist's error, misjudgment, or failure of practical wisdom that leads to their downfall, even if they are genuinely noble.", "isCorrect": true, "rationale": "The text defines hamartia as 'the flaw or error that brings about the protagonist's downfall,' specifically highlighting it as 'a mistake of judgment, an ignorance of relevant facts, or a failure of practical wisdom.'"}, {"text": "The deliberate and malicious actions of an antagonist that cause the hero's suffering.", "isCorrect": false, "rationale": "Hamartia refers to the protagonist's own error, not the actions of an antagonist, though antagonists may play a role in the plot."}], "id": "q04"}, {"question": "The text mentions that modern film critics discussing whether a protagonist is 'sympathetic' or a plot has a 'satisfying resolution' are working within categories first articulated by Aristotle. Which of his works is primarily responsible for establishing these critical frameworks?", "options": [{"text": "The Politics", "isCorrect": false, "rationale": "The Politics deals with the ideal state and governance, not literary analysis of plot and character sympathy."}, {"text": "The Nicomachean Ethics", "isCorrect": false, "rationale": "While the Ethics informs Aristotle's view of character, the text specifically attributes these critical categories to the Poetics as foundational for Western literary criticism."}, {"text": "The Rhetoric", "isCorrect": false, "rationale": "The Rhetoric focuses on persuasive speech, not literary plot structure or audience sympathy for characters in a narrative."}, {"text": "The Poetics", "isCorrect": true, "rationale": "The text explicitly states that 'Every time a film critic discusses whether a protagonist is 'sympathetic' or whether a plot has a satisfying resolution, they are working in categories that Aristotle first articulated' in the Poetics."}], "id": "q05"}, {"question": "Which of Aristotle's three means of persuasion primarily appeals to the speaker's character or credibility?", "options": [{"text": "Pathos", "isCorrect": false, "rationale": "Pathos is defined as the appeal to the audience's emotions, not the speaker's character."}, {"text": "Logos", "isCorrect": false, "rationale": "Logos is defined as the appeal through rational argument, evidence, and valid inference, not the speaker's character."}, {"text": "Ethos", "isCorrect": true, "rationale": "The text defines ethos as 'the appeal through the speaker's character: we are more persuaded by someone we trust, someone who appears to know what he is talking about and to have our interests at heart.'"}, {"text": "Kairos", "isCorrect": false, "rationale": "Kairos is not one of Aristotle's three fundamental means of persuasion mentioned in the text."}], "id": "q06"}, {"question": "The text explains that Aristotle's Rhetoric connects to his Politics because:", "options": [{"text": "Both are concerned with the study of natural sciences and the physical world.", "isCorrect": false, "rationale": "The Rhetoric and Politics are aspects of 'practical philosophy' concerning human affairs, not natural science."}, {"text": "Political life in a community ordered by rational speech inherently requires the ability to construct and evaluate persuasive arguments.", "isCorrect": true, "rationale": "The text states, 'The Rhetoric connects to Aristotle's Politics because political life is, in large part, a matter of speech and persuasion... In a community ordered by logos... the ability to make and evaluate arguments is an essential civic skill.'"}, {"text": "The Rhetoric provides a guide for rulers on how to suppress dissent within their states.", "isCorrect": false, "rationale": "Aristotle's Rhetoric is described as aiming for effective and honest persuasion, reforming rather than dismissing it, and grounding it in truth and virtue, not suppression."}, {"text": "The Politics argues that emotional appeals should be completely avoided in public discourse, a concept clarified in the Rhetoric.", "isCorrect": false, "rationale": "The Rhetoric describes pathos (emotional appeal) as one of the three means of persuasion, indicating it is not to be completely avoided, but used appropriately."}], "id": "q07"}, {"question": "A lawyer arguing a case emphasizes her extensive experience in similar legal battles and her reputation for integrity within the legal community. This approach primarily exemplifies which Aristotelian means of persuasion?", "options": [{"text": "Pathos, by trying to evoke an emotional response in the jury.", "isCorrect": false, "rationale": "While the jury might feel trust (an emotion), the primary appeal here is based on the speaker's character and credibility, not directly on the audience's emotional state regarding the case facts."}, {"text": "Logos, by providing logical evidence to support the case.", "isCorrect": false, "rationale": "Emphasizing experience and reputation is about the speaker's character, not the logical structure or evidence of the case itself."}, {"text": "Ethos, by establishing her credibility and trustworthy character.", "isCorrect": true, "rationale": "Ethos is defined as the appeal through the speaker's character and credibility, which is precisely what 'extensive experience' and 'reputation for integrity' aim to establish."}, {"text": "Aesthetics, by making the argument sound pleasing to the ear.", "isCorrect": false, "rationale": "Aesthetics is not one of Aristotle's three fundamental means of persuasion, and the focus here is on credibility, not auditory pleasure."}], "id": "q08"}, {"question": "How did Aristotle's view on rhetoric differ significantly from Plato's, as presented in the text?", "options": [{"text": "Aristotle completely dismissed rhetoric as manipulative, agreeing with Plato's deep suspicions.", "isCorrect": false, "rationale": "The text states that 'Aristotle's response was not to dismiss rhetoric but to reform it,' contrasting with Plato's suspicion."}, {"text": "Aristotle reformed rhetoric, aiming to ground the art of persuasion in truth, virtue, and community goods, rather than dismissing it outright.", "isCorrect": true, "rationale": "The text explicitly states, 'Plato had been deeply suspicious of rhetoric... Aristotle's response was not to dismiss rhetoric but to reform it: to ground the art of persuasion in truth, virtue, and the genuine goods of the community.'"}, {"text": "Plato saw rhetoric as an essential civic skill, while Aristotle viewed it as dangerous and ethically problematic.", "isCorrect": false, "rationale": "This reverses the positions; Plato was suspicious, while Aristotle reformed it to be an ethical civic skill."}, {"text": "Both philosophers believed rhetoric was solely a tool for manipulating uneducated masses.", "isCorrect": false, "rationale": "Plato suspected it could be used for manipulation, but Aristotle sought to reform it to be truthful and virtuous, not solely manipulative."}], "id": "q09"}, {"question": "The final reflection section, 'The Life of Man,' concludes that studying Aristotle's comprehensive body of work, including the Poetics and Rhetoric, ultimately helps us to understand:", "options": [{"text": "Only historical insights into ancient Greek thought, with limited contemporary relevance.", "isCorrect": false, "rationale": "The text emphasizes his enduring legacy, shaping 'the intellectual foundations of our own culture' and providing a starting point for fundamental questions that 'still commands our respect and repays our study.'"}, {"text": "Primarily the techniques for winning arguments and accumulating information, as these are philosophy's ultimate goals.", "isCorrect": false, "rationale": "The text refutes this, stating philosophy is 'Not the accumulation of information, not the mastery of techniques, not the winning of arguments,' but the examined life."}, {"text": "The intellectual foundations of Western culture and how to live 'the examined life' well in community with others.", "isCorrect": true, "rationale": "The text concludes that studying Aristotle helps one understand 'the intellectual foundations of our own culture' and the purpose of philosophy as 'the examined life, the life in which we think seriously and honestly about what we are, what we are for, and what it means to live well in community with others.'"}, {"text": "The superiority of reason over any form of divine grace in achieving human perfection.", "isCorrect": false, "rationale": "While acknowledging reason's achievements, the text, from a Christian perspective, suggests reason has limits and 'needs the gift of something more,' where 'Grace does not destroy nature, but perfects it.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
