<script>
var QUESTIONS = [{"question": "What fundamental question does Thomas Aquinas primarily address regarding human law, according to the provided text?", "options": [{"text": "How political communities can best structure their legal systems to ensure stability.", "isCorrect": false, "rationale": "While stability is discussed in relation to legal change, Aquinas's deeper, foundational question is not about optimal structure but about the moral obligation of citizens to specific laws."}, {"text": "When a human law genuinely binds the conscience of a citizen, and when it does not.", "isCorrect": true, "rationale": "The text explicitly states that Aquinas asks 'when does a human law genuinely bind the conscience of a citizen, and when does it not?', highlighting this as his central philosophical problem in the section."}, {"text": "The historical evolution of legal traditions from ancient to modern times.", "isCorrect": false, "rationale": "The text focuses on Aquinas's philosophical theory of law, not a historical survey of legal traditions."}, {"text": "The most effective methods for enforcing human laws and punishing offenders.", "isCorrect": false, "rationale": "While punishment is mentioned in the context of derivation by determination, Aquinas's core inquiry is about the moral authority and binding power of law on conscience, not enforcement mechanisms."}]}, {"question": "A human law stating 'one must not commit murder' is derived from natural law by way of 'conclusion from premises.' What is a key implication of this specific mode of derivation?", "options": [{"text": "It has force only from the human legislator's authority, making it easily changeable.", "isCorrect": false, "rationale": "This describes laws derived by 'determination,' which gain force solely from human law. Laws derived by 'conclusion' have force from natural law itself."}, {"text": "Its moral gravity is solely dependent on its social acceptance and the customs of the community.", "isCorrect": false, "rationale": "While custom is important for the observance of law, the moral gravity of a law derived by 'conclusion' comes from its alignment with natural law, not just social acceptance."}, {"text": "It derives substantial force from the natural law itself, beyond merely the human legislator's authority.", "isCorrect": true, "rationale": "The text explicitly states that when a human law is derived by way of conclusion, 'that law has force from the natural law itself, not merely from the human legislator's authority,' implying deeper moral gravity."}, {"text": "It is considered a matter of indifference, allowing citizens to disregard it without moral fault.", "isCorrect": false, "rationale": "Matters of indifference (like specific punishments or traffic rules) can be derived by determination, but even then, if justly enacted, they carry legal and moral force from the human law."}]}, {"question": "Consider a city ordinance that designates specific days and hours for street cleaning, during which parking is prohibited. According to Aquinas's theory of derivation, how would this law primarily gain its authority?", "options": [{"text": "As a direct conclusion from the principle of not harming others' property, making it an immutable natural law.", "isCorrect": false, "rationale": "While public cleanliness generally contributes to human good, the *specific* timing and prohibition on parking are too particular to be a direct conclusion like 'don't murder.' They are specific details for a general principle."}, {"text": "As a determination of a general natural law principle regarding public order and common good.", "isCorrect": true, "rationale": "This law is a specific way (a 'determination') of implementing the general natural law principle that public spaces should be orderly and serve the common good (e.g., sanitation). It does not derive its specifics as a necessary 'conclusion' from a higher premise."}, {"text": "As a divine commandment transmitted through human authority, thus carrying ultimate moral weight.", "isCorrect": false, "rationale": "Divine law refers to specific revelations from God (e.g., the Ten Commandments), not to mundane civic regulations like street cleaning schedules."}, {"text": "As a matter of indifference, having no real moral force beyond the threat of penalty.", "isCorrect": false, "rationale": "While a 'determination' of natural law, if it is a just law (serving the common good, within authority, proportionate), it still carries moral force and binds in conscience."}]}, {"question": "According to Aquinas, a just human law binds a man in conscience. What is the ultimate source of this binding power for such laws?", "options": [{"text": "The agreement or consent of the citizens to obey the law.", "isCorrect": false, "rationale": "While citizen acceptance contributes to stability, Aquinas argues the *ultimate* binding power comes from a higher source than mere consent."}, {"text": "The inherent rationality and wisdom of the human legislator who framed the law.", "isCorrect": false, "rationale": "The legislator is an instrument, but their rationality is not the ultimate source of the law's binding power. Their power is derived."}, {"text": "The eternal law, which is God's own rational governance of creation.", "isCorrect": true, "rationale": "The text states, 'If they be just, they have the power of binding in conscience, from the eternal law whence they are derived,' clarifying that just human laws indirectly resist the divine order if disobeyed."}, {"text": "The utilitarian benefit it provides to the community, outweighing any individual inconvenience.", "isCorrect": false, "rationale": "Serving the common good is a characteristic of a just law, but it's the *reason* why it aligns with eternal law, not the ultimate source of its binding power in conscience."}]}, {"question": "Aquinas describes laws that are 'unjust' in ways 'contrary to human good' (e.g., exceeding legislative power, imposing unequal burdens). How do such laws differ from truly just laws in terms of their binding force?", "options": [{"text": "They bind absolutely in conscience to prevent scandal or disturbance, regardless of their injustice.", "isCorrect": false, "rationale": "Aquinas states they 'do not bind in conscience, except perhaps in order to avoid scandal or disturbance,' indicating this is a pragmatic reason for *compliance*, not a moral binding of the law itself."}, {"text": "They are 'acts of violence rather than laws' and do not bind in conscience, though compliance might be advised to avoid disorder.", "isCorrect": true, "rationale": "The text clearly states such laws are 'acts of violence rather than laws' and 'do not bind in conscience,' but advises compliance 'except perhaps in order to avoid scandal or disturbance.'"}, {"text": "They are completely without legal or moral standing and must always be disobeyed without exception.", "isCorrect": false, "rationale": "This applies specifically to laws contrary to the divine good. For laws contrary to human good, compliance might be advised to avoid scandal, making disobedience not an absolute requirement."}, {"text": "They bind in conscience only if they are widely accepted by the populace, despite their flaws.", "isCorrect": false, "rationale": "Popular acceptance is not Aquinas's criterion for a law binding in conscience if it is objectively unjust."}]}, {"question": "A government enacts a law requiring all citizens to participate in a specific religious ritual that directly contradicts the tenets of their personal faith. Based on Aquinas's framework, what is the citizen's primary obligation regarding this law?", "options": [{"text": "To obey the law to maintain public order and prevent societal discord, despite personal disagreement.", "isCorrect": false, "rationale": "While maintaining public order is generally valued, this specific type of law falls into the category of 'unjust through being opposed to the Divine good,' for which Aquinas's instruction is unequivocal."}, {"text": "To comply with the law if the personal cost of disobedience, such as imprisonment or fine, is too high.", "isCorrect": false, "rationale": "Laws 'opposed to the Divine good... must nowise be observed,' regardless of the personal cost. Obedience to God takes precedence over man."}, {"text": "To challenge the law through legal and political means, but ultimately comply if such efforts are unsuccessful.", "isCorrect": false, "rationale": "For laws contrary to divine law, Aquinas mandates non-observance, not eventual compliance after legal challenge."}, {"text": "To refuse to obey this law, as it is contrary to the Divine law and must 'nowise be observed.'", "isCorrect": true, "rationale": "The text states, 'laws may be unjust through being opposed to the Divine good... and laws of this kind must nowise be observed, because... 'we ought to obey God rather than man.'' This is the strongest form of non-binding."}]}, {"question": "What is Aquinas's primary philosophical reason for advocating caution when changing human laws, even if a 'better' alternative seems available?", "options": [{"text": "He believes that ancient laws are inherently superior to new ones by virtue of their age.", "isCorrect": false, "rationale": "While acknowledging the value of tradition, Aquinas's reason is not simple antiquarianism but a deeper insight into law's authority."}, {"text": "He views legal stability and the habits of obedience it fosters as essential for the law's binding power and the common good.", "isCorrect": true, "rationale": "Aquinas states, 'the mere change of law is of itself prejudicial to the common good: because custom avails much for the observance of laws... when a law is changed, the binding power of the law is diminished, in so far as custom is abolished.'"}, {"text": "He argues that human reason is inherently incapable of devising truly better laws than those already established.", "isCorrect": false, "rationale": "Aquinas acknowledges that human reason devises laws and can improve them, but that improvement must be weighed against the cost of change."}, {"text": "He fears that any change will inevitably lead to tyranny or the complete breakdown of social order.", "isCorrect": false, "rationale": "This is an exaggeration; Aquinas expresses caution about undermining binding power, not an inevitable collapse into tyranny."}]}, {"question": "Under what specific circumstances does Aquinas justify changing an existing human law?", "options": [{"text": "Whenever the majority of citizens express dissatisfaction with the current law.", "isCorrect": false, "rationale": "While public opinion can influence lawmaking, Aquinas does not list it as a sufficient condition for changing a law that has established custom and binding power."}, {"text": "Only if the existing law is explicitly commanded to change by divine revelation or prophecy.", "isCorrect": false, "rationale": "This is too narrow; Aquinas allows for changes based on human reasoning and commonweal, not just divine command."}, {"text": "When there is an evident and very great benefit conferred by the new enactment, or extreme urgency due to the existing law being clearly unjust or extremely harmful.", "isCorrect": true, "rationale": "The text states, 'Such compensation may arise either from some very great and every evident benefit conferred by the new enactment; or from the extreme urgency of the case, due to the fact that either the existing law is clearly unjust, or its observance extremely harmful.'"}, {"text": "When a new legislator comes to power and wishes to leave their mark on the legal system by introducing reforms.", "isCorrect": false, "rationale": "This motivation would likely fall under 'cupidity or vainglory' if not genuinely for the common good, which Aquinas would deem unjust and not a valid reason for change."}]}, {"question": "Imagine a law prohibiting parking in fire lanes. This law primarily serves to maintain emergency access. How would Aquinas likely classify this law in terms of its derivation and its binding force in conscience?", "options": [{"text": "It is derived by 'conclusion,' binding in conscience because it protects life, similar to 'one must not murder.'", "isCorrect": false, "rationale": "While protecting life is a natural law principle, the specific regulation of 'parking in fire lanes' is a particular implementation (determination) of that principle, not a direct conclusion."}, {"text": "It is derived by 'determination,' binding in conscience because it serves the common good of public safety and is within the legislative power.", "isCorrect": true, "rationale": "The general principle is public safety and order (natural law), but the specific rule about fire lanes is a 'determination' of how to achieve that. If justly enacted (common good, within power, proportionate), it binds in conscience."}, {"text": "It is derived by 'determination,' but not binding in conscience because it is merely a trivial regulation.", "isCorrect": false, "rationale": "If a law derived by 'determination' is just (serves the common good, etc.), it still binds in conscience, even if its moral gravity is less than laws derived by 'conclusion.'"}, {"text": "It is not a true law at all, as it concerns a 'matter of indifference' and therefore lacks moral force.", "isCorrect": false, "rationale": "Matters of indifference, when codified into law for the common good, gain legal and moral force through human law. The Philosopher's quote about 'indifference' refers to the *original* state before specific determination, not after."}]}, {"question": "The text states, 'The burden of proof for disobedience is high, and the presumption is in favor of compliance; but the presumption is not absolute.' What does this statement reveal about Aquinas's approach to individual moral judgment versus legal authority?", "options": [{"text": "Aquinas prioritizes individual conscience above all legal authority, encouraging frequent challenges to the status quo.", "isCorrect": false, "rationale": "The phrase 'burden of proof for disobedience is high' directly contradicts the idea of prioritizing individual conscience above all legal authority or frequent challenges."}, {"text": "Aquinas recognizes a carefully circumscribed role for moral judgment in overriding unjust laws, particularly those violating natural or divine law.", "isCorrect": true, "rationale": "This statement encapsulates Aquinas's nuanced position: a general duty to obey (presumption for compliance), but with specific, high-bar exceptions (not absolute, especially for laws contrary to natural or divine law) where moral judgment dictates disobedience."}, {"text": "Aquinas believes that all laws, regardless of justice, must be obeyed to prevent societal chaos and maintain order.", "isCorrect": false, "rationale": "This contradicts the 'presumption is not absolute' part, and his detailed discussion of unjust laws that do not bind in conscience, or must 'nowise be observed.'"}, {"text": "Aquinas advocates for frequent acts of civil disobedience as a necessary check on legislative power.", "isCorrect": false, "rationale": "The 'high burden of proof' directly counters the idea of 'frequent acts of civil disobedience.' Aquinas sees it as a last resort in specific, grave circumstances."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
