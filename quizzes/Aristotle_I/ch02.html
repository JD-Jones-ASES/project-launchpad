    </div>

        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 2</div>
    </div>

        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "In the context of Aristotle's methodological approach to ethics, what role do $\\textit{endoxa}$ play?", "options": [{"text": "They serve as the starting data or 'reputable opinions' that must be subjected to careful scrutiny and refinement.", "isCorrect": true, "rationale": "Aristotle begins with the views held by the majority or the wise, treating them as insights to be clarified rather than prejudices to be dismissed."}, {"text": "They represent first principles from which all moral conclusions are mathematically deduced.", "isCorrect": false, "rationale": "Aristotle specifically contrasts his dialectical method with that of a mathematician who starts from abstract first principles."}, {"text": "They are the 'palpable' goods like wealth and honor that Aristotle identifies as the true definition of happiness.", "isCorrect": false, "rationale": "While these are common opinions, Aristotle refines them to show that wealth and honor are not the highest good itself."}, {"text": "They are the innate instincts that allow a person to act virtuously without the need for habituation.", "isCorrect": false, "rationale": "Aristotle argues that moral virtue is not innate but comes from custom and practice, though $\\textit{endoxa}$ inform our understanding of them."}], "id": "q01"}, {"question": "According to the 'Function Argument' in Book I, why does Aristotle conclude that 'mere life' or 'sensation' cannot be the characteristic function ($\\textit{ergon}$) of a human being?", "options": [{"text": "Because these capacities are shared with plants and animals and are not unique to humans as such.", "isCorrect": true, "rationale": "Aristotle's search for the human $\\textit{ergon}$ requires identifying what is distinctive to humans, which he finds in the life of the rational soul."}, {"text": "Because life and sensation are subjective feelings rather than objective activities of the soul.", "isCorrect": false, "rationale": "The argument focuses on the lack of uniqueness to the human species rather than the subjective nature of sensation."}, {"text": "Because humans are capable of existing as pure intellect without the need for biological functions.", "isCorrect": false, "rationale": "Aristotle maintains that humans are biological entities; however, our defining function is the activity that distinguishes us from other living things."}, {"text": "Because the function of a human must be a craft ($\\textit{techne}$) like carpentry or harp-playing.", "isCorrect": false, "rationale": "Aristotle uses crafts as analogies to show that if specific roles have functions, 'Man as Man' must also have one beyond specific professions."}], "id": "q02"}, {"question": "Which of the following best describes the 'Mean' in Aristotle's $\\textit{Doctrine of the Mean}$?", "options": [{"text": "A relative midpoint that is appropriate to the specific individual and the circumstances of the situation.", "isCorrect": true, "rationale": "The mean is determined by practical wisdom ($phronesis$) and varies, just as the right amount of food differs for an athlete and a beginner."}, {"text": "An arithmetic average exactly equidistant from the extremes of excess and deficiency.", "isCorrect": false, "rationale": "Aristotle explicitly rejects the mathematical midpoint, noting that 'six' is not necessarily the right amount between 'ten' and 'two' for everyone."}, {"text": "A state of emotional neutrality or mediocrity that avoids strong feelings of any kind.", "isCorrect": false, "rationale": "Virtue involves feeling the right emotions at the right intensity, which can sometimes mean feeling very strong anger or love."}, {"text": "A universal standard of conduct that applies identically to every person regardless of their role.", "isCorrect": false, "rationale": "The text notes that the courage appropriate for a general is different from the courage appropriate for a student."}], "id": "q03"}, {"question": "How does Aristotle distinguish between the acquisition of 'intellectual virtue' and 'moral virtue'?", "options": [{"text": "Intellectual virtue is acquired primarily through teaching, while moral virtue is the result of habituation ($ethos$).", "isCorrect": true, "rationale": "Moral virtue is not innate but is perfected through the repeated performance of virtuous acts until they become a stable disposition ($hexis$)."}, {"text": "Intellectual virtue is a gift of nature, while moral virtue is learned through reading philosophical treatises.", "isCorrect": false, "rationale": "Aristotle argues that no moral virtue comes to us merely by nature, and intellectual virtue requires experience and time rather than just being a gift."}, {"text": "Moral virtue is achieved by suppressing the passions, while intellectual virtue is achieved by following them.", "isCorrect": false, "rationale": "Moral virtue is the perfection of passions through reason, not their suppression; intellectual virtue involves the exercise of reason itself."}, {"text": "Both are equally acquired through the study of logic and the rejection of common opinion.", "isCorrect": false, "rationale": "Aristotle emphasizes the necessity of custom and practice for moral virtue, whereas intellectual virtue is more tied to instruction."}], "id": "q04"}, {"question": "According to the source material, why are actions like murder or adultery excluded from the $\\textit{Doctrine of the Mean}$?", "options": [{"text": "Because they are intrinsically bad and do not admit of a 'right amount' or a 'proper manner'.", "isCorrect": true, "rationale": "Some actions are named such that they imply badness immediately, meaning there is no 'virtuous' way to perform them, even with 'practical wisdom'."}, {"text": "Because they are governed by divine law rather than the 'master science' of politics.", "isCorrect": false, "rationale": "While Aquinas discusses divine law, Aristotle excludes these based on the inherent nature of the acts themselves within his philosophical framework."}, {"text": "Because they involve the complete absence of passion rather than an excess of it.", "isCorrect": false, "rationale": "These acts often involve excessive passion, but the reason they have no mean is that they are wrong 'full stop', regardless of the level of passion."}, {"text": "Because the 'Mean' only applies to intellectual virtues, not to social interactions.", "isCorrect": false, "rationale": "The Doctrine of the Mean specifically applies to moral virtues (feelings and actions), not intellectual virtues."}], "id": "q05"}, {"question": "In the $\\textit{Summa Theologica}$, how does Thomas Aquinas distinguish between 'human actions' ($\\textit{actiones humanae}$) and 'actions of a man' ($\\textit{actiones hominis}$)?", "options": [{"text": "Human actions proceed from a deliberate will and reason, whereas actions of a man are those done without conscious mastery.", "isCorrect": true, "rationale": "Aquinas argues that man is master of his actions through reason and will; actions done without these are not 'properly human' even if performed by a human."}, {"text": "Human actions are those directed toward God, while actions of a man are those directed toward survival.", "isCorrect": false, "rationale": "This distinction relies on the source of the action (reason/will) rather than the specific direction (divine vs. survival) of the act."}, {"text": "Human actions are performed by the soul, while actions of a man are performed only by the physical body.", "isCorrect": false, "rationale": "Aquinas views the human person as a composite; the distinction rests on whether the act is voluntary and deliberate."}, {"text": "Human actions are those that result in $\\textit{eudaimonia}$, while actions of a man always result in $\\textit{akrasia}$.", "isCorrect": false, "rationale": "While human actions aim at an end, not all lead to happiness; $\\textit{akrasia}$ is a specific failure of the will, not a general category for all non-deliberate acts."}], "id": "q06"}, {"question": "Aquinas argues that 'no created good constitutes man's happiness.' What is the primary philosophical reason he provides for this conclusion?", "options": [{"text": "The object of the will is the universal good, and only God (the infinite good) can fully satisfy an appetite for the universal.", "isCorrect": true, "rationale": "Since every creature possesses goodness only by 'participation', no particular created thing can 'lull' a will oriented toward the universal good."}, {"text": "Aristotle proved that external goods like wealth and honor are entirely irrelevant to $\\textit{eudaimonia}$.", "isCorrect": false, "rationale": "Aristotle (and Aquinas) actually believed external goods are necessary for 'imperfect happiness', even if they aren't the final end."}, {"text": "Human beings are by nature 'beasts' who can only be restrained by divine command, not by the pursuit of goods.", "isCorrect": false, "rationale": "Aquinas's view of human nature is far more positive, seeing it as rational and ordered toward the good."}, {"text": "The human intellect is incapable of recognizing goodness in created things due to the 'fall of man'.", "isCorrect": false, "rationale": "Aquinas emphasizes that the intellect is ordered toward truth and can recognize created goods, but these goods simply cannot fully satisfy the will's capacity."}], "id": "q07"}, {"question": "What is the relationship between 'imperfect happiness' and 'perfect happiness' in Aquinas's ethical framework?", "options": [{"text": "Imperfect happiness is the virtuous life achievable by natural powers, which is elevated and completed by perfect happiness given through grace.", "isCorrect": true, "rationale": "Aquinas follows the principle that 'grace does not destroy nature, but perfects it', meaning the Aristotelian life is real but ordered to a higher end."}, {"text": "Imperfect happiness is a sinful delusion that must be abandoned to reach the 'beatific vision'.", "isCorrect": false, "rationale": "Aquinas explicitly endorses Aristotle's account of natural happiness as a genuine, though incomplete, good."}, {"text": "They are identical states, but 'perfect happiness' is simply the term used by theologians for Aristotle's $\\textit{eudaimonia}$.", "isCorrect": false, "rationale": "Aquinas makes a sharp distinction: imperfect happiness is acquired by human effort, while perfect happiness exceeds all natural capacity."}, {"text": "Imperfect happiness refers to the life of pleasure ($\\textit{hedone}$), while perfect happiness refers to the life of virtue ($\\textit{arete}$).", "isCorrect": false, "rationale": "Both types of happiness for Aquinas involve virtue; the difference lies in whether the end is natural or supernatural."}], "id": "q08"}, {"question": "In the revival of virtue ethics, Elizabeth Anscombe argued that modern moral philosophies (like Kantianism and Utilitarianism) were incoherent because they lacked:", "options": [{"text": "The teleological framework of human nature and flourishing provided by Aristotle.", "isCorrect": true, "rationale": "Anscombe contended that terms like 'moral obligation' lose their meaning without a teleological context (the 'end' or 'function' of man)."}, {"text": "A strict adherence to the mathematical average in the $\\textit{Doctrine of the Mean}$.", "isCorrect": false, "rationale": "The revival of virtue ethics precisely celebrated Aristotle's flexible, non-mathematical approach to practical wisdom."}, {"text": "The empirical data from positive psychology regarding the 'flow state'.", "isCorrect": false, "rationale": "While positive psychology supports virtue ethics, Anscombe's 1958 critique was philosophical and preceded the positive psychology movement."}, {"text": "A total rejection of the concept of character in favor of universal rules of duty.", "isCorrect": false, "rationale": "Anscombe argued the opposite: that the focus on rules and duty was the problem and that a focus on character needed to be recovered."}], "id": "q09"}, {"question": "Why does Aristotle emphasize that happiness requires a 'complete life' ($in\\ a\\ complete\\ life$)?", "options": [{"text": "Because a single day or a short period of virtuous activity does not make a person truly blessed, just as one swallow does not make a spring.", "isCorrect": true, "rationale": "Happiness is a stable activity and condition, and great misfortunes (like those of King Priam) can happen late in life, affecting its overall character."}, {"text": "Because happiness can only be judged by others after a person has died and can no longer change.", "isCorrect": false, "rationale": "While Aristotle discusses Solon's view on this, he argues that a virtuous person possesses a stability that remains even during misfortune."}, {"text": "Because a 'complete life' is the only way to ensure that one has experienced every possible pleasure ($\\textit{hedone}$).", "isCorrect": false, "rationale": "Aristotle distinguishes happiness from pleasure and does not require an exhaustive experience of all pleasures for $\\textit{eudaimonia}$."}, {"text": "Because human functions ($\\textit{ergon}$) can only be performed by the elderly who have reached full intellectual maturity.", "isCorrect": false, "rationale": "While the young may not be fit students of ethics, the 'complete life' refers to the duration and stability of the activity, not just the age of the agent."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
