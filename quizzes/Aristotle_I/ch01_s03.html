<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best summarizes Aristotle's primary critique regarding Plato's Theory of Forms?", "options": [{"text": "He argued that the existence of a separate realm of Forms was an unnecessary duplication of the world.", "isCorrect": true, "rationale": "Aristotle believed that explaining the world through a separate realm of archetypes was redundant when observation of individual things provides sufficient explanation."}, {"text": "He claimed that the Forms exist, but they are material rather than immaterial archetypes.", "isCorrect": false, "rationale": "Aristotle did not believe in a separate realm of material Forms; rather, he believed form exists within the individual substance itself."}, {"text": "He suggested that the Forms are only accessible through sensory experience rather than reason.", "isCorrect": false, "rationale": "Aristotle prioritized sensory experience to understand the world, but he rejected the separate existence of the Platonic Forms entirely."}, {"text": "He believed that only the Form of the Good was real, while other Forms were merely human conventions.", "isCorrect": false, "rationale": "Aristotle explicitly rejected the separate Form of the Good, arguing that such a concept is detached from human achievement."}], "id": "q01"}, {"question": "In Raphael's fresco 'The School of Athens', what is the philosophical significance of Aristotle's hand gesture?", "options": [{"text": "It represents his focus on the earth and the observable, physical world.", "isCorrect": true, "rationale": "The downward and outward gesture symbolizes the empiricist orientation toward studying reality as it exists in our immediate environment."}, {"text": "It indicates his submission to Plato's higher authority and the Academy's teachings.", "isCorrect": false, "rationale": "Aristotle spent twenty years at the Academy, but the gesture in the fresco highlights his distinct philosophical departure from Plato."}, {"text": "It symbolizes the 'Peripatetic' nature of his teaching while walking in the Lyceum.", "isCorrect": false, "rationale": "While Aristotle did teach in the covered walkways, the specific gesture in the painting is meant to contrast with Plato's focus on the heavens."}, {"text": "It points toward the underground excavations of the Lyceum that would occur in the future.", "isCorrect": false, "rationale": "The painting dates to the early 16th century, while the excavations mentioned in the text occurred in 1996."}], "id": "q02"}, {"question": "How does Aristotle's concept of 'Substance' differ from Plato's view of true reality?", "options": [{"text": "Substance consists of individual things where form and matter are inseparable units of reality.", "isCorrect": true, "rationale": "For Aristotle, reality is found in individual substances like a specific horse or tree, where the form is inherent to the matter."}, {"text": "Substance is a temporary shadow of an eternal, immaterial archetype.", "isCorrect": false, "rationale": "This view aligns with Plato's idealism, where the physical world is seen as a secondary imitation of the Forms."}, {"text": "Substance refers only to the 'Endoxa', or the reputable opinions of the community.", "isCorrect": false, "rationale": "Endoxa refers to previous opinions Aristotle surveyed, not his definition of the primary units of reality."}, {"text": "Substance is the highest Form that grants being and knowability to all other things.", "isCorrect": false, "rationale": "This describes Plato's 'Form of the Good' rather than Aristotle's focus on individual, concrete entities."}], "id": "q03"}, {"question": "Which of the following is a key commonality shared by both Plato and Aristotle, despite their disagreements?", "options": [{"text": "The belief that an objective moral order exists and is not merely a matter of opinion.", "isCorrect": true, "rationale": "Both philosophers agreed that good and bad are grounded in something more than just cultural preference or individual taste."}, {"text": "The conviction that genuine knowledge is only attainable by rejecting sensory testimony.", "isCorrect": false, "rationale": "This was Plato's view; Aristotle believed knowledge originates in sensory observation."}, {"text": "The use of the dialogue form to demonstrate that philosophy is an inconclusive conversation.", "isCorrect": false, "rationale": "While Plato wrote dialogues, Aristotle wrote systematic treatises move toward specific conclusions."}, {"text": "The claim that the Form of the Good is a separate entity that humans must strive to reach.", "isCorrect": false, "rationale": "Aristotle explicitly rejected the idea of a separate, independent Form of the Good."}], "id": "q04"}, {"question": "What is the primary reason Aristotle rejects Plato's separate 'Form of the Good' in the context of ethics?", "options": [{"text": "He argued that a good that exists independently of human life cannot be achieved or attained by man.", "isCorrect": true, "rationale": "Aristotle sought an ethics that was useful for real people in real communities, making a transcendent 'Good' irrelevant to human practice."}, {"text": "He believed that the concept of 'Good' was entirely subjective and relative to each culture.", "isCorrect": false, "rationale": "Both philosophers believed in an objective moral order, so Aristotle did not think goodness was merely subjective."}, {"text": "He felt that 'Good' was a material substance that could be measured physically.", "isCorrect": false, "rationale": "While Aristotle was an empiricist, he did not define the abstract concept of goodness as a physical material."}, {"text": "He thought the Form of the Good was too simple to explain the complexity of human biology.", "isCorrect": false, "rationale": "Aristotle's critique centered on the practical attainability of the concept for human beings, not its biological simplicity."}], "id": "q05"}, {"question": "Which term describes the systematic, analytical style of writing used by Aristotle, as opposed to the dramatic dialogues of Plato?", "options": [{"text": "Treatise", "isCorrect": true, "rationale": "Aristotle's works are organized by topic and move methodically from premises to conclusions, unlike Plato's conversational dialogues."}, {"text": "Endoxa", "isCorrect": false, "rationale": "This term refers to the reputable opinions Aristotle surveys within his works, not the format of the works themselves."}, {"text": "Peripatos", "isCorrect": false, "rationale": "This refers to the covered walkways where Aristotle taught, giving his school its nickname, rather than his writing style."}, {"text": "Archetype", "isCorrect": false, "rationale": "An archetype is a term used to describe Platonic Forms, not a style of philosophical writing."}], "id": "q06"}, {"question": "According to the text, why did Alfred North Whitehead describe European philosophy as a 'series of footnotes to Plato'?", "options": [{"text": "To emphasize the incalculable and foundational influence Plato has had on Western thought.", "isCorrect": true, "rationale": "Whitehead's quote suggests that most subsequent philosophical questions were first articulated or influenced by Plato's work."}, {"text": "To argue that subsequent philosophers were unable to create original ideas after Plato.", "isCorrect": false, "rationale": "The quote highlights Plato's foundational role, but it doesn't suggest that other philosophers like Aristotle lacked originality."}, {"text": "To point out that Plato's dialogues were technically incomplete and required further explanation.", "isCorrect": false, "rationale": "While the dialogues can be inconclusive, Whitehead's point was about the scale of Plato's historical impact."}, {"text": "To criticize the history of philosophy for being too focused on immaterial archetypes.", "isCorrect": false, "rationale": "Whitehead was providing a descriptive assessment of influence, not necessarily a criticism of the focus on idealism."}], "id": "q07"}, {"question": "How does Aristotle utilize 'endoxa' in his philosophical method?", "options": [{"text": "He surveys previous reputable opinions before arguing for his own systematic conclusions.", "isCorrect": true, "rationale": "Aristotle's method involves examining common and expert views as a starting point for rigorous analysis."}, {"text": "He uses them as ironical devices to show that common people cannot understand the Forms.", "isCorrect": false, "rationale": "Irony and the elusiveness of the Forms are more characteristic of Plato's Socratic dialogues."}, {"text": "He dismisses them entirely in favor of innate ideas discovered through pure reason.", "isCorrect": false, "rationale": "Aristotle values the survey of opinions and sensory observation over the Platonic reliance on innate reason alone."}, {"text": "He treats them as the final, unchanging truths that require no further inquiry.", "isCorrect": false, "rationale": "Aristotle reviews them at the beginning of his inquiry, but he still proceeds to argue for his own specific conclusions."}], "id": "q08"}, {"question": "Which Greek word did Plato sometimes use to refer to the eternal archetypes of reality?", "options": [{"text": "$\\textit{eidos}$", "isCorrect": true, "rationale": "The word, meaning 'appearance' or 'shape', was used by Plato alongside 'idea' to describe the Forms."}, {"text": "$\\textit{peripatos}$", "isCorrect": false, "rationale": "This refers to walking or the walkways of the Lyceum, not the archetypes of reality."}, {"text": "$\\textit{palaestra}$", "isCorrect": false, "rationale": "This refers to a wrestling school or gymnasium, which was part of the site where the Lyceum was excavated."}, {"text": "$\\textit{dialogos}$", "isCorrect": false, "rationale": "This refers to the conversation-based literary form used by Plato, not the metaphysical Forms themselves."}], "id": "q09"}, {"question": "In the context of the source material, what distinguishes an 'idealist' from an 'empiricist'?", "options": [{"text": "The idealist believes reality is mental or spiritual, while the empiricist grounds knowledge in sensory observation.", "isCorrect": true, "rationale": "This captures the fundamental difference in their orientation: Plato's focus on immaterial Forms versus Aristotle's focus on the physical world."}, {"text": "The idealist has high aspirations for society, while the empiricist is focused only on practical politics.", "isCorrect": false, "rationale": "The text clarifies that 'idealism' here is used in the philosophical sense regarding reality, not everyday aspirations."}, {"text": "The idealist relies on previous opinions, while the empiricist relies on divine revelation.", "isCorrect": false, "rationale": "Neither philosopher relied primarily on divine revelation; Aristotle used endoxa (opinions) but grounded his own work in observation."}, {"text": "The idealist studies the individual tree, while the empiricist studies the 'Form of the Tree'.", "isCorrect": false, "rationale": "This incorrectly flips the roles: Aristotle (empiricist) studies the individual tree, while Plato (idealist) focuses on the Form."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
