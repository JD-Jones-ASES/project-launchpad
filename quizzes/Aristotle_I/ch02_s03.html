<script>
var QUESTIONS = [{"question": "What fundamental question does Aristotle pose at the outset of the Nicomachean Ethics to initiate his moral philosophical inquiry?", "options": [{"text": "What is the origin of human suffering?", "isCorrect": false, "rationale": "While a philosophical question, this is not the specific starting point Aristotle uses in the Nicomachean Ethics according to the text."}, {"text": "What do human beings ultimately aim at?", "isCorrect": true, "rationale": "The text explicitly states: 'Aristotle opens the Nicomachean Ethics... with what sounds like a simple one: what are we after? What do human beings ultimately aim at?'"}, {"text": "How can societies achieve perfect justice?", "isCorrect": false, "rationale": "Justice is a component of political science, which Aristotle discusses, but his initial question is broader, focusing on the ultimate human aim."}, {"text": "Is knowledge inherently superior to virtue?", "isCorrect": false, "rationale": "This is a question within moral philosophy, but not Aristotle's foundational inquiry in this work."}], "id": "q01"}, {"question": "According to Aristotle, why is politike (politics) considered the 'master science' when determining the highest human good, rather than private ethics?", "options": [{"text": "Because political leaders are inherently more virtuous than individuals.", "isCorrect": false, "rationale": "The text does not suggest that political leaders are inherently more virtuous; rather, it focuses on the scope and completeness of the good being pursued."}, {"text": "Because the good of a community is greater and more complete than the good of any individual.", "isCorrect": true, "rationale": "The text clearly states: 'Politics is the master science because the good of a whole community is greater and more complete than the good of any individual.' It also notes that 'the good of an individual cannot be fully separated from the good of the community.'"}, {"text": "Because ethics is too subjective and lacks universal principles.", "isCorrect": false, "rationale": "Aristotle integrates ethics within politics; he does not dismiss ethics as subjective, but rather sees it as part of a larger, comprehensive science."}, {"text": "Because only political action can directly lead to happiness.", "isCorrect": false, "rationale": "While politics aims at the highest good (eudaimonia), the text does not claim it is the *only* path, but rather the overarching science that coordinates all other ends."}], "id": "q02"}, {"question": "An artist creates a sculpture primarily to win a prestigious competition, hoping the prize money will allow them to open their own studio, which is their lifelong dream. In Aristotle's framework, which of the following represents an end pursued for its own sake in this scenario?", "options": [{"text": "Winning the prestigious competition.", "isCorrect": false, "rationale": "Winning the competition is pursued for the sake of prize money, making it an instrumental good, not an end in itself."}, {"text": "Earning prize money.", "isCorrect": false, "rationale": "Earning prize money is pursued for the sake of opening a studio, making it an instrumental good."}, {"text": "Opening their own studio.", "isCorrect": true, "rationale": "Opening the studio is described as a 'lifelong dream' for which other actions (winning, earning money) are undertaken, suggesting it is the ultimate aim in this specific sequence, desired for its own sake rather than as a means to another stated goal."}, {"text": "Creating the sculpture itself.", "isCorrect": false, "rationale": "Creating the sculpture is an act of working, pursued for the sake of winning the competition, making it an instrumental good."}], "id": "q03"}, {"question": "Based on Aristotle's description, which statement best characterizes the 'Chief Good'?", "options": [{"text": "It is a good pursued solely for its instrumental value in achieving other goals.", "isCorrect": false, "rationale": "The Chief Good is desired for its own sake, not for something else. Instrumental goods are means to an end, while the Chief Good is the ultimate end."}, {"text": "It is a good that is universally agreed upon in its specific nature by all people.", "isCorrect": false, "rationale": "The text notes that while there's agreement on the name (happiness/eudaimonia), there is 'deep disagreement about the substance' of what it actually is."}, {"text": "It is the single ultimate End desired for its own sake, toward which all other desires ultimately lead.", "isCorrect": true, "rationale": "The text states: 'If there is one good that everything else serves — a highest or chief good — then identifying it is the most important task of moral philosophy.' It also describes it as 'some one End which we desire for its own sake, and with a view to which we desire everything else.'"}, {"text": "It is primarily concerned with individual pleasure and immediate gratification.", "isCorrect": false, "rationale": "While some might mistakenly equate the Chief Good with pleasure, Aristotle's concept of eudaimonia is richer than mere subjective feeling or gratification, as the text later clarifies."}], "id": "q04"}, {"question": "Aristotle argues that if there were no single End that we desire for its own sake, and with a view to which we desire everything else, what would be the consequence?", "options": [{"text": "All human actions would cease to have moral value.", "isCorrect": false, "rationale": "While the Chief Good helps guide moral action, the absence of a single ultimate end, as described by Aristotle, leads to a different logical consequence mentioned in the text."}, {"text": "Human desires would go on without limit, leading to an unsatisfied and fruitless existence.", "isCorrect": true, "rationale": "The text directly states: 'since we do not choose in all instances with a further End in view (for then men would go on without limit, and so the desire would be unsatisfied and fruitless), this plainly must be the Chief Good'."}, {"text": "Society would devolve into anarchy without a common moral framework.", "isCorrect": false, "rationale": "While a common good is important for society, the specific consequence Aristotle highlights for the *individual* if there's no ultimate end is unsatisfied desire, not necessarily societal breakdown."}, {"text": "Individuals would spontaneously discover their true purpose through self-reflection.", "isCorrect": false, "rationale": "Aristotle argues that without an ultimate aim, desires would be fruitless, implying that true purpose would not be spontaneously realized, but rather endlessly sought without resolution."}], "id": "q05"}, {"question": "Why does Aristotle suggest that a young man is not a fit student of Moral Philosophy, according to the text?", "options": [{"text": "Because young men lack the intellectual capacity to grasp complex philosophical concepts.", "isCorrect": false, "rationale": "The text does not state a lack of intellectual capacity but rather a lack of experience and susceptibility to passion. It distinguishes between youth in years and youthful in temper, indicating the issue is not purely intellectual capacity related to age."}, {"text": "Because they are apt to follow the impulses of their passions and lack experience in life's actions, making the knowledge unprofitable for practice.", "isCorrect": true, "rationale": "The text states: 'the young man is not a fit student of Moral Philosophy, for he has no experience in the actions of life... and... since he is apt to follow the impulses of his passions, he will hear as though he heard not, and to no profit, the end in view being practice and not mere knowledge.'"}, {"text": "Because moral philosophy requires a deep understanding of historical events, which young men have not yet studied.", "isCorrect": false, "rationale": "The text emphasizes experience in life's actions and self-control, not specifically historical knowledge."}, {"text": "Because the curriculum of moral philosophy is designed exclusively for older, more established scholars.", "isCorrect": false, "rationale": "The issue is the student's readiness and capacity for practical application, not a rigid curriculum restriction based solely on age."}], "id": "q06"}, {"question": "While 'happiness' is a common translation for eudaimonia, the text clarifies that Aristotle's concept of eudaimonia is richer. Which of the following best describes this richer meaning?", "options": [{"text": "It is a subjective feeling of contentment and joy.", "isCorrect": false, "rationale": "The text explicitly states: 'Aristotle's eudaimonia is an objective state, not a subjective feeling.'"}, {"text": "It is an objective state of genuine human flourishing, living and doing well, beyond mere feeling.", "isCorrect": true, "rationale": "The text explains *eudaimonia* as 'a condition of genuine human flourishing — living and doing well, not merely feeling good' and specifies it's an 'objective state, not a subjective feeling.'"}, {"text": "It refers specifically to the accumulation of wealth and honor.", "isCorrect": false, "rationale": "The text mentions wealth and honor as *disputed* ideas of happiness, not the true meaning of eudaimonia itself. These are examples of what the 'multitude' might confuse with happiness."}, {"text": "It is a temporary emotional state achieved through virtuous acts.", "isCorrect": false, "rationale": "Eudaimonia is described as a 'condition' or 'state' of flourishing, implying a more stable and enduring aspect than a 'temporary emotional state'."}], "id": "q07"}, {"question": "When discussing the study of nobleness and justice, Aristotle states that 'exactness must not be looked for in all discussions alike.' What is the implication of this statement for the study of moral philosophy?", "options": [{"text": "Moral philosophy is an imprecise field that yields no reliable conclusions.", "isCorrect": false, "rationale": "Aristotle seeks to 'set forth the truth roughly and in outline,' implying reliable conclusions are possible, but their nature differs from mathematics or other exact sciences."}, {"text": "The complexities of human action and varying notions of good require that moral philosophy be content with setting forth the truth roughly and in outline.", "isCorrect": true, "rationale": "The text explains that notions of nobleness and justice 'admit of variation and error to such a degree,' and that 'We must be content then, in speaking of such things and from such data, to set forth the truth roughly and in outline; in other words, since we are speaking of general matter and from general data, to draw also conclusions merely general.'"}, {"text": "Only mathematicians are capable of achieving true exactness in their studies.", "isCorrect": false, "rationale": "While the text contrasts moral philosophy with mathematics regarding exactness, it does not claim only mathematicians achieve it, but rather that each subject permits different degrees of exactness."}, {"text": "Moral philosophy is primarily concerned with theoretical knowledge, not practical application.", "isCorrect": false, "rationale": "The text explicitly states that the end in view for moral philosophy is 'practice and not mere knowledge,' contradicting this option."}], "id": "q08"}, {"question": "The text suggests that the 'end in view' for studying moral philosophy is 'practice and not mere knowledge.' What does this imply about the purpose of Aristotle's ethical inquiry?", "options": [{"text": "Moral philosophy is primarily a descriptive science, cataloging human behaviors.", "isCorrect": false, "rationale": "While observation is part of it, the ultimate goal is not just to describe but to guide actions towards the Chief Good."}, {"text": "The goal of understanding the Chief Good is to guide actual life and conduct, leading to virtuous action.", "isCorrect": true, "rationale": "The statement 'the end in view being practice and not mere knowledge' directly implies that the purpose is to inform and guide how one lives, leading to the 'right' actions, as alluded to by the archer analogy."}, {"text": "Pure theoretical contemplation is the highest form of human activity, making practical application secondary.", "isCorrect": false, "rationale": "This contradicts the explicit statement that the end in view is 'practice and not mere knowledge.'"}, {"text": "Knowledge without action is inherently harmful and should be avoided.", "isCorrect": false, "rationale": "The text implies knowledge without practice is 'unprofitable,' not necessarily 'harmful' in a direct sense, especially for those 'of imperfect self-control.'"}], "id": "q09"}, {"question": "The painting The School of Athens depicts Plato pointing upward to the realm of Forms and Aristotle extending his hand toward the earth. How does this visual representation, combined with Aristotle's initial approach in the Nicomachean Ethics, suggest a fundamental difference in their philosophical methodologies regarding the origin of 'the good'?", "options": [{"text": "Plato believed in deriving moral principles from observable earthly phenomena, while Aristotle sought them in abstract ideals.", "isCorrect": false, "rationale": "This reverses their traditional positions as depicted and described in the text. Plato's upward gesture signifies transcendent Forms, while Aristotle's horizontal gesture signifies engagement with the empirical world."}, {"text": "Plato emphasized the practical application of ethics in daily life, whereas Aristotle focused on theoretical contemplation.", "isCorrect": false, "rationale": "The text emphasizes Aristotle's focus on 'practice and not mere knowledge' in moral philosophy, which counters the idea that he focused on theoretical contemplation over practical application."}, {"text": "Plato sought the ultimate good in transcendent, immutable Forms, while Aristotle, by starting with what humans do aim at and the goods of human life, grounds his inquiry in empirical observation and human activity.", "isCorrect": true, "rationale": "Plato's upward pointing signifies his theory of Forms (transcendent ideals). Aristotle, in the text, begins his inquiry with 'what we are after' and 'what human beings ultimately aim at' through observation of 'everything we do aims at some good' – grounding his philosophy in human actions and lived experience (the earth), in contrast to an immediate appeal to abstract, separate Forms."}, {"text": "Both philosophers agreed on the substance of the Chief Good but disagreed on its nomenclature.", "isCorrect": false, "rationale": "The text indicates disagreement on the *nature* of the Chief Good (happiness/eudaimonia), not just its name, especially concerning its substance (pleasure, wealth, honor, etc.). Their philosophical approaches to *finding* the good were also distinct."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
