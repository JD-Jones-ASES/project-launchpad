    <script>

    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the source material, why does Aristotle conclude that humans cannot possess a genuine friendship ($philia$) with God?", "options": [{"text": "The radical inequality between a divine being and a human precludes the necessary reciprocity for friendship.", "isCorrect": true, "rationale": "Aristotle argued that friendship requires a certain level of equality and a mutual exchange of goods, which is impossible between a self-sufficient god and a needy human."}, {"text": "God is a purely spiritual being and lacks the physical presence required to 'dwell' with human beings.", "isCorrect": false, "rationale": "While it is true that God is spiritual, this was the basis of a specific objection that Aquinas addressed, rather than Aristotle's primary logical reason involving inequality."}, {"text": "Human beings are inherently too sinful to enter into a relationship with a perfect deity.", "isCorrect": false, "rationale": "This reflects a later theological concern regarding 'total depravity' rather than Aristotle's philosophical focus on the lack of common ground or shared life."}, {"text": "The divine intellect is concerned only with itself and does not acknowledge the existence of human virtue.", "isCorrect": false, "rationale": "Aristotle does believe the divine is self-contemplating, but his argument against friendship specifically hinges on the lack of reciprocal benefit or communication."}], "id": "q01"}, {"question": "How does Thomas Aquinas 'overturn' Aristotle's rejection of friendship with God without discarding Aristotle's logic?", "options": [{"text": "By introducing the concepts of the Incarnation and grace, which allow God to condescend to the human level.", "isCorrect": true, "rationale": "Aquinas accepts Aristotle's logic that friendship requires equality, but argues that grace creates a supernatural 'communication' that bridges the gap."}, {"text": "By arguing that humans can reach God's level through perfect adherence to natural law and moral virtue.", "isCorrect": false, "rationale": "This would suggest humans can reach God by natural power alone, whereas Aquinas insists on the necessity of a supernatural gift."}, {"text": "By redefining friendship as a purely one-sided adoration that does not require any response from God.", "isCorrect": false, "rationale": "Aquinas follows Aristotle in maintaining that friendship must involve mutual love and communication; a one-sided relationship is not true friendship."}, {"text": "By demonstrating that Aristotle was incorrect about the self-sufficiency of God, who needs human love.", "isCorrect": false, "rationale": "Aquinas maintains the classical view that God is self-sufficient; the relationship is based on God's generosity and sharing, not on a divine need."}], "id": "q02"}, {"question": "In the context of Aquinas's ordering of charity ($caritas$), why is a person bound to love himself more than his neighbor?", "options": [{"text": "Because the lover's own share in the Divine good is a matter of 'unity,' which is more potent than the 'union' of fellowship with another.", "isCorrect": true, "rationale": "Aquinas argues that proximity to God begins with one's own soul; since one is most closely joined to oneself, that participation in God takes precedence over union with others."}, {"text": "Because human nature is fundamentally self-interested, and charity must align with the natural instinct for survival.", "isCorrect": false, "rationale": "Aquinas bases the order of charity on proximity to the Divine Good, not on biological survival or psychological egoism."}, {"text": "Because one can only love a neighbor if they have first achieved a healthy state of psychological self-esteem.", "isCorrect": false, "rationale": "This is a modern psychological interpretation; Aquinas's argument is metaphysical, focusing on the degrees of participation in grace."}, {"text": "Because the neighbor is often a source of sin or distraction that can lead the soul away from God.", "isCorrect": false, "rationale": "While Aquinas mentions avoiding sin, he does not suggest we love neighbors less because they are bad, but because our own relation to God is more immediate."}], "id": "q03"}, {"question": "Aquinas cites the biblical figures Leah and Rachel to illustrate the difference between which two concepts?", "options": [{"text": "The active life (Leah) and the contemplative life (Rachel).", "isCorrect": true, "rationale": "Following Gregory the Great, Aquinas uses Leah's 'blear-eyed' sight to represent the active life and Rachel's 'vision' to represent contemplation."}, {"text": "The Old Law (Leah) and the New Law (Rachel).", "isCorrect": false, "rationale": "While these figures are sometimes used for the Laws in other literary contexts, Aquinas specifically applies them here to the modes of human life and happiness."}, {"text": "Love of concupiscence (Leah) and love of friendship (Rachel).", "isCorrect": false, "rationale": "This distinction refers to the nature of one's desire (for self-interest vs. for the other) rather than the active and contemplative modes of existence."}, {"text": "The earthly city (Leah) and the city of God (Rachel).", "isCorrect": false, "rationale": "This distinction is characteristic of Augustine's work, whereas the text uses these figures specifically for the Summa's discussion of action and contemplation."}], "id": "q04"}, {"question": "Which of the following best describes the 'mixed life' ($contemplata \\ aliis \\ tradere$) that Aquinas identifies as the highest form of life on earth?", "options": [{"text": "A life where the fruits of contemplation are communicated to others through actions like teaching and preaching.", "isCorrect": true, "rationale": "Aquinas argues that while contemplation is higher in itself, the most perfect form in this life is one that 'hands on' what has been contemplated to others."}, {"text": "A life that alternates strictly between hours of solitary prayer and hours of manual labor to maintain biological balance.", "isCorrect": false, "rationale": "While balanced, this description misses the key theological point of contemplation overflowing into the service of others' souls."}, {"text": "A life that abandons contemplation entirely to focus on the immediate physical needs of the poor.", "isCorrect": false, "rationale": "Aquinas maintains the superiority of contemplation; the active works must be an extension of it, not a total replacement for it."}, {"text": "A life that uses philosophical inquiry to gain political power for the benefit of the Church.", "isCorrect": false, "rationale": "This would prioritize the active life's 'externals' and power, which Aquinas warns against loving for their own sake."}], "id": "q05"}, {"question": "In C.S. Lewis's exploration of $philia$ in 'The Four Loves', what is identified as the defining characteristic of friendship?", "options": [{"text": "A shared vision or love of something external to the friends themselves, such as a truth or a cause.", "isCorrect": true, "rationale": "Lewis argues that friends do not merely look at each other (like lovers), but stand side-by-side looking at a common interest or truth."}, {"text": "The instinctive affection that arises from long-term familiarity and shared domestic life.", "isCorrect": false, "rationale": "This describes 'storge' (affection), which Lewis distinguishes from the more intentional and choice-based 'philia'."}, {"text": "The self-sacrificial divine love that seeks the good of the other regardless of their merits.", "isCorrect": false, "rationale": "This describes 'agape' (charity), which Lewis says should order and elevate friendship, but it is not friendship's defining natural trait."}, {"text": "The biological drive to find a partner who complements one's own personality and emotional needs.", "isCorrect": false, "rationale": "This aligns more closely with 'eros' or natural psychological attraction rather than the intellectual spark of Lewis's 'philia'."}], "id": "q06"}, {"question": "How does Aquinas address the objection that charity cannot be friendship because we are commanded to love our enemies, whereas friendship requires a return of love?", "options": [{"text": "He explains that we love our enemies for the sake of God, who is our primary friend and to whom the enemies belong.", "isCorrect": true, "rationale": "Just as we love a friend's children or servants for the friend's sake, we love enemies because they are God's, maintaining the primary direction of the friendship."}, {"text": "He argues that 'love of enemies' is actually a form of concupiscence rather than friendship, seeking their conversion for our benefit.", "isCorrect": false, "rationale": "Aquinas defines charity as friendship; treating love of enemies as concupiscence would separate it from the theological virtue of charity."}, {"text": "He claims that the command to love enemies is a hyperbole and not a literal requirement for the virtue of charity.", "isCorrect": false, "rationale": "Aquinas takes the scriptural command literally and integrates it into his systematic theology of charity as friendship."}, {"text": "He suggests that reciprocity is not actually required for friendship, contrary to Aristotle's philosophical view.", "isCorrect": false, "rationale": "Aquinas agrees with Aristotle that reciprocity is required; he simply redefines how that reciprocity is fulfilled through our relationship with God."}], "id": "q07"}, {"question": "What is the primary difference between Aristotle's 'philosophical inquiry' and Aquinas's 'beatific vision'?", "options": [{"text": "The beatific vision requires supernatural grace to apprehend God directly, whereas philosophical inquiry relies on natural reason.", "isCorrect": true, "rationale": "Aristotle's contemplation is the height of natural human capacity, while Aquinas's beatific vision is a gift that exceeds the limits of human nature."}, {"text": "Philosophical inquiry is strictly for scholars, while the beatific vision is accessible only to the uneducated.", "isCorrect": false, "rationale": "Aquinas believes the intellect is precisely what is elevated in the beatific vision, so it remains a rational, though supernatural, activity."}, {"text": "Aristotle's inquiry is focused on the 'Word made flesh,' while Aquinas's vision is focused on abstract principles.", "isCorrect": false, "rationale": "This is reversed; Aristotle focused on abstract intelligibles, while the Christian vision centers on the person of God."}, {"text": "There is no functional difference; Aquinas simply uses a theological term for what Aristotle described.", "isCorrect": false, "rationale": "The text notes that Aquinas transforms Aristotle's idea, moving from a natural possibility to a supernatural, eternal gift."}], "id": "q08"}, {"question": "Aquinas identifies 'communication' as the foundation of friendship. In charity, what is the specific communication that occurs between God and man?", "options": [{"text": "God communicates His own happiness (beatitude) to human beings.", "isCorrect": true, "rationale": "Aquinas states that friendship is based on communication, and because God shares His happiness with us, a fellowship is established between Creator and creature."}, {"text": "Man communicates his physical needs to God through petitionary prayer.", "isCorrect": false, "rationale": "While prayer is communication, the foundation of the friendship of charity is the divine gift of God's life, not the human reporting of needs."}, {"text": "God communicates secret knowledge to a select few spiritual elites.", "isCorrect": false, "rationale": "This reflects Gnostic ideas; Aquinas's charity is based on the general communication of beatitude to all who share in His life through grace."}, {"text": "Humans communicate their virtuous acts to God to prove their worthiness.", "isCorrect": false, "rationale": "Friendship with God is based on God's initiative of grace and communication of His good, rather than a human attempt to prove worth."}], "id": "q09"}, {"question": "True or False: According to Aquinas, the active life is simply more excellent than the contemplative life because it involves serving others in this world.", "options": [{"text": "False — Aquinas holds that the contemplative life is simply more excellent because it concerns the intellect and divine things.", "isCorrect": true, "rationale": "Aquinas states that the contemplative life is 'simply more excellent' because it concerns the intellect and divine things, although the active life may be preferred in particular cases of need."}, {"text": "True — because serving others fulfills the highest commandment of charity.", "isCorrect": false, "rationale": "While the active life is essential for earthly needs, Aquinas follows both Aristotle and the Gospel account of Mary and Martha in holding that contemplation is the higher activity."}, {"text": "True — because Aristotle ranks political activity above theoretical inquiry.", "isCorrect": false, "rationale": "Aristotle actually ranks the contemplative life ($theoria$) as the highest form of happiness, and Aquinas follows him in this judgment while adding a supernatural dimension."}, {"text": "False — Aquinas considers both lives equally excellent, with neither being superior.", "isCorrect": false, "rationale": "Aquinas does not treat the two lives as equal; he explicitly states that contemplation is simply more excellent, even while acknowledging the active life's importance in particular circumstances."}], "id": "q10"}, {"question": "Aquinas distinguishes two types of love: 'love of concupiscence' and 'love of friendship.' How does this distinction map onto Aristotle's analysis of what can and cannot be a genuine object of friendship?", "options": [{"text": "Love of concupiscence treats the object as a means to one's own good; love of friendship wills good to the object for its own sake — which is why Aristotle says we cannot be 'friends' with wine.", "isCorrect": true, "rationale": "The primary source (Q. 23, Art. 1) states: 'If... we do not wish good to what we love, but wish its good for ourselves... it is love not of friendship, but of a kind of concupiscence. For it would be absurd to speak of having friendship for wine or for a horse.' This maps directly onto Aristotle's exclusion of inanimate objects from friendship."}, {"text": "Love of concupiscence is always sinful, while love of friendship is always virtuous, so the distinction is primarily a moral one.", "isCorrect": false, "rationale": "Aquinas does not treat love of concupiscence as necessarily sinful — it is a natural form of desire. The distinction is structural (self-directed vs. other-directed), not simply moral."}, {"text": "Love of friendship applies only to human beings, while love of concupiscence applies only to things and animals.", "isCorrect": false, "rationale": "One can have love of concupiscence toward other people (treating them as means) and genuine benevolence (friendship) is possible toward God, angels, and humans. The categories cut across subject matter."}, {"text": "They correspond exactly to Aristotle's pleasure friendship (concupiscence) and utility friendship (friendship), making character friendship the only exception.", "isCorrect": false, "rationale": "Aquinas's distinction is not about Aristotle's three types. All three Aristotelian types involve some benevolence (wishing good to the other); the concupiscence/friendship distinction operates at a more fundamental level — whether any other-directed goodwill is present at all."}], "id": "q11"}, {"question": "C.S. Lewis argues that $philia$ is 'the least natural of loves.' What does he mean by this, and how does it relate to Aristotle's insistence that perfect friendship is rare?", "options": [{"text": "Friendship is biologically unnecessary and arises only when two people discover a shared love of truth or goodness beyond themselves — making it the least instinctive but the most distinctively human love.", "isCorrect": true, "rationale": "Lewis's account states that philia is not driven by biological necessity (unlike storge and eros) but by a shared vision. This explains why Aristotle says perfect friendship is rare: it requires not just utility or pleasure but the comparatively uncommon alignment of two virtuous people recognizing genuine goodness in each other."}, {"text": "Friendship is less natural because it requires formal social institutions (clubs, schools, guilds) that are artificial constructions.", "isCorrect": false, "rationale": "While Lewis notes that friendship often forms in specific settings, the point about 'least natural' refers to the absence of biological necessity, not the need for institutions."}, {"text": "Philia is 'least natural' because it is the only love that requires effort and practice, while storge and eros happen automatically.", "isCorrect": false, "rationale": "The distinction Lewis draws is about biological necessity, not effort. All loves can require cultivation; philia's distinctiveness is that no instinct drives it."}, {"text": "Lewis disagrees with Aristotle that perfect friendship is rare; instead, Lewis thinks anyone with shared interests can achieve it.", "isCorrect": false, "rationale": "Lewis's analysis actually reinforces Aristotle's conclusion. Lewis agrees that genuine philia (sparked by 'What! You too?') requires a shared love of something genuinely valuable, which is not universal."}], "id": "q12"}, {"question": "Aquinas's primary source (Q. 182, Art. 1) gives eight reasons why the contemplative life is superior to the active life. Which of the following is NOT one of the reasons he lists?", "options": [{"text": "The contemplative life is more continuous and can be pursued more without interruption.", "isCorrect": false, "rationale": "This is explicitly listed as the second reason: 'the contemplative life can be more continuous... wherefore Mary is described as sitting all the time at the Lord's feet.'"}, {"text": "The contemplative life is the only life available to persons of high rank and therefore more honorable.", "isCorrect": true, "rationale": "Aquinas actually addresses and refutes this objection: he says prelates 'should also excel in the contemplative life,' not that high rank alone gives honor to the active life. The eight reasons all favor contemplation; the honors of rank are used in an objection that Aquinas dismisses."}, {"text": "The contemplative life is more self-sufficient, requiring fewer external goods.", "isCorrect": false, "rationale": "Self-sufficiency is listed as the fourth reason: it is the response to 'Martha, Martha, thou art careful and troubled about many things.'"}, {"text": "The contemplative life is loved more for its own sake, while the active life is directed to something else.", "isCorrect": false, "rationale": "This is the fifth reason Aquinas lists: the contemplative life is chosen for itself as an end, not as a means to another purpose."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
