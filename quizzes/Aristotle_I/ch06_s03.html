<script>
var QUESTIONS = [{"question": "According to the text, what was a defining characteristic of Aristotle's approach to political science, making him 'a political scientist in the modern sense'?", "options": [{"text": "He focused primarily on theoretical ideals of the perfectly just state, detached from real-world examples.", "isCorrect": false, "rationale": "The text explicitly states the opposite: Aristotle was an 'observer of real governments who reasoned from empirical data to general principles,' and that a theorist knowing only the 'perfectly just state would be useless to actual legislators.'"}, {"text": "He compiled descriptions of numerous existing constitutions and reasoned from this empirical data to general principles of governance.", "isCorrect": true, "rationale": "The text highlights Aristotle's empirical approach, noting he 'compiled descriptions of 158 different constitutions' and 'reasoned from empirical data to general principles,' which defined his 'modern sense' as a political scientist."}, {"text": "He advocated for a single, universal form of government that would suit all cities and conditions.", "isCorrect": false, "rationale": "Aristotle argued against a single universal form, emphasizing the variety of constitutions and the need for laws to suit specific city circumstances."}, {"text": "His work primarily involved prescribing laws based on abstract moral philosophy rather than observation.", "isCorrect": false, "rationale": "While moral philosophy was a foundation, the text stresses his empirical method: 'Before prescribing, he observes.'"}]}, {"question": "Aristotle uses the analogy of a physician who knows only a perfectly healthy body to illustrate what crucial point about political theorists?", "options": [{"text": "That political theorists, like physicians, must be perfectly healthy themselves to be effective.", "isCorrect": false, "rationale": "The analogy concerns knowledge and applicability, not the personal health or state of the theorist."}, {"text": "A political theorist must understand the full range of possible constitutions and practical realities, not just ideal ones, to be useful to real statesmen.", "isCorrect": true, "rationale": "The text states, 'Similarly, a political theorist who knew only the perfectly just state would be useless to actual legislators and statesmen,' directly linking this to the physician who 'knew only the body of a perfectly healthy person' being 'useless to actual patients.'"}, {"text": "That ideal states, like perfect health, are impossible to achieve in the real world.", "isCorrect": false, "rationale": "While it implies the difficulty of achieving ideals, the primary point of the analogy is the *uselessness* of knowledge restricted only to the ideal when dealing with actual, imperfect situations."}, {"text": "That just as perfect health is rare, so too are perfectly just states, making them unworthy of study.", "isCorrect": false, "rationale": "The text implies ideal states *should* be studied as a benchmark, but practical knowledge is also essential, not that they are unworthy of study."}]}, {"question": "How does Aristotle characterize the nature of governmental forms like democracy and oligarchy?", "options": [{"text": "They are fixed, universal forms with singular, unchanging characteristics across all cities.", "isCorrect": false, "rationale": "The text explicitly states: 'He notes that there are not one or two forms of democracy, or one or two forms of oligarchy — each has varieties.'"}, {"text": "They are ideal types that should be striven for, regardless of a city's specific circumstances.", "isCorrect": false, "rationale": "Aristotle emphasizes sensitivity to variety and that 'the same law will not suit every constitution.'"}, {"text": "They are not uniform but exist in various forms, each shaped by the particular circumstances and disposition of different cities.", "isCorrect": true, "rationale": "The text states that 'each has varieties that emerge from the particular circumstances of different cities,' and that 'every constitution must be understood on its own terms.'"}, {"text": "They are inherently unstable and destined to devolve into tyranny unless strictly controlled.", "isCorrect": false, "rationale": "While he discusses their excesses, his main point here is their varied nature, not their inevitable collapse."}]}, {"question": "Based on the excerpt from *Politics*, Book IV, what is a primary responsibility of a true legislator or politician?", "options": [{"text": "To identify and implement the single most perfect form of government, regardless of the populace's current disposition.", "isCorrect": false, "rationale": "The text warns against this, stating 'it is not enough to be able to perceive what is best without it is what can be put in practice' and 'many who probably are incapable of enjoying the best form'."}, {"text": "To establish a form of government and laws that are best suited to the specific circumstances and disposition of the people they govern.", "isCorrect": true, "rationale": "The primary source states the legislator 'ought to be acquainted not only with that which is most perfect imaginable, but also that which is the best suited to any given circumstances' and 'ought to establish such a form of government as from the present state and disposition of the people...they will most readily submit to.'"}, {"text": "To strictly adhere to theoretical constitutional models without considering practical challenges.", "isCorrect": false, "rationale": "The text criticizes writers who 'have failed in describing the practical parts' and emphasizes what 'can be put in practice.'"}, {"text": "To educate the populace to adapt themselves to the most ideal laws, even if initially resistant.", "isCorrect": false, "rationale": "The text explicitly states 'all laws are, and ought to be, framed agreeable to the state that is to be governed by them, and not the state to the laws'."}]}, {"question": "The text defines *phronesis* as 'practical wisdom.' In the context of politics, why is *phronesis* considered essential for a statesman?", "options": [{"text": "It enables the statesman to impose an abstract, ideally just constitution onto any community, regardless of its unique characteristics.", "isCorrect": false, "rationale": "The text argues that 'a legislator who insists on implementing the perfectly just constitution in conditions that cannot support it will only produce instability and suffering,' which is contrary to *phronesis*."}, {"text": "It refers to the ability to recall historical precedents and apply them directly to contemporary political problems.", "isCorrect": false, "rationale": "While historical knowledge might inform *phronesis*, the definition emphasizes 'knowing what to do in particular situations' and judging 'what is best given the specific circumstances,' rather than mere recall."}, {"text": "It allows a statesman to determine what is best for a particular community under its specific conditions, rather than adhering rigidly to abstract ideals.", "isCorrect": true, "rationale": "The text defines *phronesis* as 'the capacity of the statesman to judge what is best given the specific circumstances of a particular community' and knowing 'not only what is best absolutely but what is best for this city, under these conditions, at this time.'"}, {"text": "It is the intellectual virtue of articulating flawless theoretical arguments for political reform.", "isCorrect": false, "rationale": "The text contrasts *phronesis* with 'abstract ideals' and 'ideal theory,' focusing instead on 'knowing what to do in particular situations' and practical application."}]}, {"question": "In his *Politics*, Book IV, Aristotle states that 'all laws are, and ought to be, framed agreeable to the state that is to be governed by them, and not the state to the laws.' What does this statement imply about effective governance?", "options": [{"text": "The state must be made to conform to a universal set of ideal laws for optimal governance.", "isCorrect": false, "rationale": "Aristotle explicitly states 'not the state to the laws,' directly contradicting this option."}, {"text": "Effective governance requires the constant alteration of the state's fundamental structure to fit new legislation.", "isCorrect": false, "rationale": "This misinterprets the relationship. Aristotle suggests laws should adapt to the state, not the other way around. He also notes it's 'not a business of less trouble to correct the mistakes of an established government than to form a new one.'"}, {"text": "The purpose of laws is to define the ideal form of the state, which then dictates the conduct of magistrates.", "isCorrect": false, "rationale": "The text clarifies that 'government is a certain ordering in a state...but the laws are something different...it is their office to direct the conduct of the magistrate,' implying laws serve the state, not define its form."}, {"text": "Successful laws must be adapted to the existing character, customs, and constitutional form of the state and its people.", "isCorrect": true, "rationale": "The statement means laws should be 'agreeable to the state,' implying they must fit the particular existing conditions and nature of the governed community, acknowledging the 'number and the different sorts of government.'"}]}, {"question": "What conclusion does Aristotle draw about the ideal foundation for political stability when moving from ideal theory to practical politics?", "options": [{"text": "A robust aristocracy where the most virtuous and wealthy citizens hold all political power.", "isCorrect": false, "rationale": "Aristotle identifies the very rich as politically dangerous because they 'do not know how to obey' and are 'contemptuous of law,' which works against stability."}, {"text": "A large middle class, which embodies the 'mean' and fosters governance by reason rather than passion.", "isCorrect": true, "rationale": "The text states, 'the same logic that makes the mean the right standard for individual virtue also makes the middle class the right foundation for political stability,' concluding that 'A city with a large middle class is the most likely to be governed by reason rather than passion.'"}, {"text": "A pure democracy where all citizens, regardless of their social standing, have equal political participation.", "isCorrect": false, "rationale": "While discussing democracy as one form, Aristotle critiques the extremes of the very poor, who 'lack the independence of mind to exercise genuine political judgment' and are 'susceptible to demagogues,' suggesting pure democracy fueled by them is unstable."}, {"text": "A benevolent tyranny that provides strong, centralized leadership to prevent social strife.", "isCorrect": false, "rationale": "Tyranny is listed as an 'excess' of kingly power and identified as the 'worst of all' excesses in the primary source."}]}, {"question": "According to Aristotle, what makes both the very rich and the very poor politically dangerous to a state?", "options": [{"text": "The rich are too focused on trade and commerce, while the poor are too interested in public service.", "isCorrect": false, "rationale": "The text attributes different, more direct political dangers to each group, not simply their economic interests or civic engagement."}, {"text": "Both groups tend to prioritize the common good above their own class interests, leading to stagnation.", "isCorrect": false, "rationale": "The text implies the opposite; their respective excesses lead to crimes and an inability to obey or command properly for the common good."}, {"text": "The rich are prone to arrogance and unwilling to obey laws, while the poor lack independence of mind and are susceptible to demagogues.", "isCorrect": true, "rationale": "The text explicitly states: 'The very rich are accustomed to commanding and do not know how to obey; they are arrogant in prosperity and contemptuous of law. The very poor are accustomed to being commanded and lack the independence of mind...they are envious, grasping, and susceptible to demagogues.'"}, {"text": "The rich demand too much innovation, while the poor resist all forms of change.", "isCorrect": false, "rationale": "The text focuses on their capacity for obedience, command, and political judgment, not their attitudes towards innovation or change in general."}]}, {"question": "Applying Aristotle's concept of the 'mean' from individual virtue to the state, what is the significance of the middle class?", "options": [{"text": "The middle class represents an ideal of wealth accumulation, leading to greater prosperity for the entire state.", "isCorrect": false, "rationale": "While prosperity might be a byproduct, the text emphasizes the middle class's role in political stability and reason, not merely wealth accumulation. The 'mean' applies to virtue and behavior, not just fortune itself."}, {"text": "The middle class is too complacent and generally fails to participate actively in political life, leading to instability.", "isCorrect": false, "rationale": "The text highlights the middle class's investment in community stability and its capacity for reason, implying active, beneficial participation."}, {"text": "The middle class embodies the political 'medium' that makes a city most submissive to reason and promotes stability, mirroring the happiest life for an individual.", "isCorrect": true, "rationale": "The text explicitly links the 'mean' in individual virtue to the middle life being the happiest, and then extends this: 'The boundaries of virtue and vice in the state must also necessarily be the same as in a private person... If this is universally admitted, that the mean is best, it is evident that even in point of fortune mediocrity is to be preferred; for that state is most submissive to reason.'"}, {"text": "The middle class, being a mix of rich and poor, inevitably leads to internal conflict due to divided loyalties.", "isCorrect": false, "rationale": "Aristotle argues the opposite: the middle class prevents the 'slaves and masters' dynamic that leads to hatred and despise."}]}, {"question": "Based on Aristotle's view, what is the inevitable consequence for a city composed primarily of the very rich and the very poor, lacking a strong middle class?", "options": [{"text": "It will experience rapid economic growth due to the distinct roles of producers and consumers.", "isCorrect": false, "rationale": "The text focuses on the social and political consequences, not economic growth, and these consequences are negative."}, {"text": "It will become a highly efficient oligarchy, as the rich are adept at commanding and the poor at obeying.", "isCorrect": false, "rationale": "While the rich command and poor obey, the text emphasizes this creates a master/slave dynamic leading to hatred, not an 'efficient oligarchy.' Oligarchy is also listed as an 'excess' form."}, {"text": "It will be characterized by a division between masters and slaves, fostering hatred and contempt, and lacking true friendship among citizens.", "isCorrect": true, "rationale": "The primary source concludes that 'A city composed of such men must therefore consist of slaves and masters, not freemen; where one party must hate, and the other despise, where there could be no possibility of friends.'"}, {"text": "It will naturally transition into a balanced polity over time as the extremes moderate each other.", "isCorrect": false, "rationale": "The text indicates that without a strong middle class, such a state is inherently unstable and prone to negative outcomes, not self-correction towards a balanced polity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
