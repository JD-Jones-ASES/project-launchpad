<script>
var QUESTIONS = [{"question": "What is the core meaning of the Greek word 'paideia' as described in the text?", "options": [{"text": "Instruction solely in academic subjects like reading and writing.", "isCorrect": false, "rationale": "The text explicitly states that paideia 'encompasses the entire formation of a human being — not just instruction in subjects, but the cultivation of character, taste, and civic virtue,' making this option too narrow."}, {"text": "The comprehensive formation of a human being, including character, taste, and civic virtue, central to political life.", "isCorrect": true, "rationale": "The text defines paideia as 'the entire formation of a human being — not just instruction in subjects, but the cultivation of character, taste, and civic virtue' and clarifies it is 'the central project of political life, not an adjunct to it.'"}, {"text": "Physical training and athletic excellence, as practiced in the gymnasium.", "isCorrect": false, "rationale": "While the gymnasium was a part of Greek education that included physical training, paideia is described as a much broader concept that also includes intellectual and moral formation, extending beyond mere physical training."}, {"text": "Military strategy and tactics, essential for defending the polis.", "isCorrect": false, "rationale": "The text does not link paideia directly to military strategy. While civic virtue might imply defense, the definition focuses on broader human and character development, and Aristotle criticizes states that educate 'only for war'."}], "id": "q01"}, {"question": "How does Aristotle connect the individual's pursuit of happiness with the ideal state in Books VII and VIII of the Politics?", "options": [{"text": "He argues that individual happiness is largely irrelevant to the state's structure, which should focus on order.", "isCorrect": false, "rationale": "Aristotle explicitly states that he 'brings these two threads together,' indicating a strong connection, not a separation."}, {"text": "He asserts that the state's primary role is to accumulate wealth, which then indirectly leads to individual happiness for its citizens.", "isCorrect": false, "rationale": "Aristotle explicitly states that 'a city, like a person, cannot be genuinely happy through external goods alone' and that 'wealth, military power, and territory are all well and good; but a city whose citizens have no virtue is not a good city.'"}, {"text": "He claims the best state is one that enables its citizens to achieve the best life, with education as the primary instrument for securing that life.", "isCorrect": true, "rationale": "The text states: 'The best state, he argues, is simply the state in which the best life is made possible for its citizens. And the instrument by which the state secures that life is education.'"}, {"text": "He suggests that individual happiness is a private matter, separate from the political structure, but influenced by it.", "isCorrect": false, "rationale": "Aristotle's whole argument is about integrating the individual's best life with the state's best form through a common project like education, not separating them."}], "id": "q02"}, {"question": "According to Aristotle, what constitutes the 'best life' for both an individual and a city?", "options": [{"text": "A life of abundant external goods such as wealth, military power, and territory.", "isCorrect": false, "rationale": "The text clearly states, 'a city, like a person, cannot be genuinely happy through external goods alone,' and that 'these external goods produce not virtue, but virtue them.'"}, {"text": "A life focused on intellectual pursuits and philosophical contemplation, detached from civic duties.", "isCorrect": false, "rationale": "While wisdom is valued, the 'best life' for a city necessarily involves civic virtue and active participation, not detachment."}, {"text": "A life of virtue exercised in accordance with reason.", "isCorrect": true, "rationale": "The text explicitly states: 'The answer for states is the same as it was for individuals — a life of virtue exercised in accordance with reason.'"}, {"text": "A life of pleasure and gratification, regardless of moral implications, as long as it causes no harm.", "isCorrect": false, "rationale": "Aristotle contrasts happiness found in 'pleasure or virtue' and concludes that those with 'morals most pure, and whose understandings are best cultivated, will enjoy more of it' than those who prioritize wealth and pleasure."}], "id": "q03"}, {"question": "Aristotle argues that 'these external goods produce not virtue, but virtue them.' What is the implication of this statement for a city striving for happiness?", "options": [{"text": "A city should prioritize the acquisition of wealth and power, assuming that virtue will naturally emerge from prosperity.", "isCorrect": false, "rationale": "This reverses Aristotle's causal claim. He explicitly states that external goods do not produce virtue."}, {"text": "The true measure of a city's happiness lies in its citizens' moral purity and cultivated understanding, rather than its material abundance or military might.", "isCorrect": true, "rationale": "The text emphasizes that 'a city whose citizens have no virtue is not a good city, no matter how impressive its treasury or its armies' and that 'those whose morals are most pure, and whose understandings are best cultivated, will enjoy more of it [happiness].'"}, {"text": "External goods are entirely useless and should be disregarded by a city seeking genuine happiness.", "isCorrect": false, "rationale": "The text says 'Wealth, military power, and territory are all well and good,' indicating they are not useless, but they are not sufficient for happiness and do not produce virtue."}, {"text": "A city should aim for a perfect balance of external goods and virtue, giving equal weight to both in its policy decisions.", "isCorrect": false, "rationale": "While balance is good, Aristotle places virtue above external goods, stating virtue produces them, and that the soul (and its virtues) is 'more noble than any outward possession.'"}], "id": "q04"}, {"question": "A newly formed city-state is debating its foundational policies. Based on Aristotle's views, what would be his strongest recommendation regarding education?", "options": [{"text": "Establish private academies for the elite, ensuring high standards for future leaders, while allowing others basic vocational training.", "isCorrect": false, "rationale": "Aristotle argues that education 'cannot be left to private choice' and should be a 'common care,' rejecting a system that caters only to an elite or is purely private."}, {"text": "Allow families complete autonomy in educating their children, reflecting diverse values and individual parental choices.", "isCorrect": false, "rationale": "The text explicitly states that education 'cannot be left to private choice' and challenges 'those who think that each family should raise its children however it sees fit.'"}, {"text": "Implement a unified, public education system as the most urgent political concern, essential for the state's perpetuation and improvement.", "isCorrect": true, "rationale": "Aristotle considers education 'the most urgent political concern there is,' stating the legislator 'ought greatly to interest himself in the care of youth,' and that 'education ought to be one and the same in each; and that this should be a common care.'"}, {"text": "Focus education primarily on military training to secure the state's borders and ensure its economic prosperity.", "isCorrect": false, "rationale": "Aristotle warns against this, noting that 'an aristocracy that educates only for war will eventually become martial and unjust,' implying a broader, virtue-based education is necessary."}], "id": "q05"}, {"question": "Why does Aristotle argue that education 'cannot be left to private choice'?", "options": [{"text": "Because private education is inherently inferior in quality and accessibility compared to public education.", "isCorrect": false, "rationale": "While possible, the text does not focus on quality or accessibility as the primary reasons. The core argument is about the child's civic belonging."}, {"text": "Because the child, in one important sense, belongs not only to the parents but to the city, and the city's health depends on what that child becomes.", "isCorrect": true, "rationale": "The text states: 'But he insists that the child, in one important sense, belongs not only to the parents but to the city — because the city's health depends on what that child becomes.'"}, {"text": "Because private education typically leads to social inequalities and divisions within the citizenry.", "isCorrect": false, "rationale": "While a plausible outcome, this is not the explicit reason Aristotle gives for rejecting private choice in the provided text."}, {"text": "Because only the state has the resources to teach all the necessary subjects for a complete education.", "isCorrect": false, "rationale": "The argument is philosophical and political, concerning the nature of citizenship and the state's well-being, not primarily about resource allocation."}], "id": "q06"}, {"question": "Aristotle states that 'every constitution...tends to produce citizens shaped in its own image.' What is the analytical consequence of a democracy neglecting education, according to this principle?", "options": [{"text": "It will inevitably produce citizens solely focused on military expansion and conquest, leading to an oligarchy.", "isCorrect": false, "rationale": "This describes the potential consequence of an aristocracy educating only for war, not a democracy neglecting education."}, {"text": "It will create citizens who prioritize intellectual pursuits above all else, leading to a philosophical and contemplative state.", "isCorrect": false, "rationale": "Neglecting education is unlikely to lead to intellectual prioritization; rather, it suggests a lack of disciplined learning."}, {"text": "It will eventually produce citizens characterized by appetite and faction, undermining the democracy itself.", "isCorrect": true, "rationale": "The text directly states: 'A democracy that neglects education will eventually produce citizens who know nothing but appetite and faction.'"}, {"text": "It will lead to a more diverse and adaptable citizenry, better able to respond to changing circumstances through individual innovation.", "isCorrect": false, "rationale": "This is contrary to Aristotle's view, as neglected education leads to specific negative characteristics rather than positive adaptability."}], "id": "q07"}, {"question": "When Aristotle discusses 'music' (mousike) in education, what does the text clarify he is referring to?", "options": [{"text": "Only the study of musical instruments and theoretical compositions.", "isCorrect": false, "rationale": "The text explicitly states that mousike 'encompasses more than what we call 'music',' making this option too narrow."}, {"text": "Primarily the practical benefits of sound engineering and acoustics for public works.", "isCorrect": false, "rationale": "This interpretation is completely unrelated to the historical and philosophical context of mousike as described."}, {"text": "The entire domain of aesthetic and emotional formation, encompassing poetry, song, dance, and the cultivation of emotions through rhythm and melody.", "isCorrect": true, "rationale": "The text defines mousike as including 'the arts of the Muses — poetry, song, dance, and the education of the emotions through rhythm and melody,' covering the entire domain of aesthetic and emotional formation."}, {"text": "The development of mathematical and logical reasoning through understanding harmony and proportion.", "isCorrect": false, "rationale": "While ancient Greeks might have seen connections, the text's definition of mousike focuses specifically on aesthetic and emotional formation, not primarily on mathematical reasoning."}], "id": "q08"}, {"question": "A student is considering pursuing a trade that involves repetitive physical labor for a fixed wage. Based on Aristotle's description of 'mean' arts, how would he likely evaluate this pursuit for a freeman?", "options": [{"text": "He would encourage it as a valuable way to contribute to the city's economy and ensure self-sufficiency.", "isCorrect": false, "rationale": "The text explicitly categorizes 'all those employments which are exercised for gain' as mean, because 'they take off from the freedom of the mind and render it sordid.'"}, {"text": "He would see it as a potentially 'mean' employment because it might render the body or mind unfit for the practice of virtue and take away the freedom of the mind.", "isCorrect": true, "rationale": "The text defines 'every work' as 'mean' if it 'renders the body, the mind, or the understanding of freemen unfit for the habit and practice of virtue' or if it is 'exercised for gain; for they take off from the freedom of the mind and render it sordid.'"}, {"text": "He would consider it a liberal art, as it requires skill and dedication, similar to other forms of craftsmanship.", "isCorrect": false, "rationale": "Liberal arts, though they might involve skill, are distinguished from 'mean' arts by their purpose and effect on the mind, not just the skill involved."}, {"text": "He would be indifferent, as long as the student finds personal satisfaction in the work and avoids idleness.", "isCorrect": false, "rationale": "Aristotle is clearly not indifferent, as the nature of one's work has significant implications for one's capacity for virtue and the health of the city."}], "id": "q09"}, {"question": "Aristotle acknowledges that certain liberal arts are 'not improper for freemen to apply to in a certain degree.' What critical distinction does he make regarding the appropriateness of engaging in these arts?", "options": [{"text": "The degree of physical exertion and manual labor involved in mastering the art.", "isCorrect": false, "rationale": "While physical aspects are mentioned in 'mean' arts, the key distinction for liberal arts is not physical exertion but the underlying motivation."}, {"text": "The personal talent and natural aptitude of the individual, which determines their potential for excellence.", "isCorrect": false, "rationale": "Talent is always a factor, but Aristotle's primary distinction here is about the *reason* for engaging in the activity."}, {"text": "The reason or motivation behind engaging in them, differentiating between doing it for oneself, one's friend, or virtue versus for the sake of another or for gain.", "isCorrect": true, "rationale": "The text states: 'for there is a great deal of difference in the reason for which any one does or learns anything: for it is not illiberal to engage in it for one's self, one's friend, or in the cause of virtue; while, at the same time, to do it for the sake of another may seem to be acting the [slave].'"}, {"text": "The social status of the teacher providing the instruction, as only noble teachers can impart true liberal education.", "isCorrect": false, "rationale": "The text does not mention the teacher's social status as the distinguishing factor for the appropriateness of liberal arts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
