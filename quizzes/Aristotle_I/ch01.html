    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Aristotle's conception of the relationship between 'form' and 'matter' fundamentally differ from Plato's Theory of Forms?", "options": [{"text": "Aristotle argued that forms are immanent within individual substances rather than existing in a separate, transcendental realm.", "isCorrect": true, "rationale": "Aristotle believed that reality is found in concrete individuals ($substance$) and that their form cannot exist apart from their matter in a higher realm."}, {"text": "Aristotle believed that forms are purely mental constructs used to categorize the chaotic physical world.", "isCorrect": false, "rationale": "This describes a form of nominalism or extreme conceptualism, whereas Aristotle believed forms were real, objective constituents of things in the world."}, {"text": "Aristotle posited that matter is the only true reality and that 'form' is an illusion created by the human senses.", "isCorrect": false, "rationale": "This reflects a materialist view; Aristotle maintained that form is a real and necessary component of any individual substance."}, {"text": "Aristotle maintained that forms are eternal archetypes that the physical world merely 'shadows' or imitates.", "isCorrect": false, "rationale": "This is actually the Platonic view that Aristotle explicitly rejected as unnecessarily doubling the world."}], "id": "q01"}, {"question": "In the context of Aristotelian ethics, what is the precise relationship between $phronesis$ (practical wisdom) and $arete$ (virtue)?", "options": [{"text": "$Phronesis$ is the intellectual virtue that enables one to determine the $mesotes$ (mean) required for moral virtue.", "isCorrect": true, "rationale": "Moral virtue requires a 'rational principle' to find the relative mean, and $phronesis$ provides that necessary deliberative capacity."}, {"text": "$Phronesis$ is a natural gift that precedes the development of $arete$ through habituation.", "isCorrect": false, "rationale": "Aristotle argues that both practical wisdom and moral virtue are developed over time through experience and habit, not merely granted by nature."}, {"text": "$Arete$ is the theoretical knowledge of the Good, while $phronesis$ is the technical skill used to produce artifacts.", "isCorrect": false, "rationale": "This confuses $phronesis$ with $poiesis$ (production) and overlooks Aristotle's rejection of a single, separate 'Form of the Good' as the basis for ethics."}, {"text": "$Phronesis$ and $arete$ are identical, as knowing the right thing to do is the same as doing it.", "isCorrect": false, "rationale": "This reflects the Socratic view that virtue is knowledge; Aristotle distinguishes between the intellectual and moral components of character."}], "id": "q02"}, {"question": "Why did Aristotle describe his school's followers as 'Peripatetics' ($peripatein$)?", "options": [{"text": "It refers to the tradition that Aristotle lectured while walking about in the covered walkways of the Lyceum.", "isCorrect": true, "rationale": "The term derives from the Greek word for 'walking about,' reflecting Aristotle's supposed habit of teaching while in motion."}, {"text": "It signifies their philosophical commitment to the idea that the soul is always in a state of 'wandering' until it reaches $theoria$.", "isCorrect": false, "rationale": "While 'wandering' is a literal meaning, the term was applied based on a physical teaching habit rather than a metaphorical soul-state."}, {"text": "It was a derogatory term used by Athenians to describe those who lived on the 'periphery' of the city.", "isCorrect": false, "rationale": "The name relates to the specific gymnasium ($Lykeion$) and Aristotle's teaching style, not to the social status or location of the students."}, {"text": "It indicates their focus on 'peripety' or the sudden reversals of fortune in Greek tragic drama.", "isCorrect": false, "rationale": "Though Aristotle analyzed peripety in his 'Poetics,' the school's name is etymologically tied to walking, not dramatic theory."}], "id": "q03"}, {"question": "How does Aristotle distinguish between the state of $akrasia$ (incontinence) and the state of vice?", "options": [{"text": "The $akratic$ person knows what is right but fails to do it, while the vicious person has a distorted judgment of what is good.", "isCorrect": true, "rationale": "The $akratic$ suffers from a 'weakness of will' where desire overrides reason, whereas the vicious person's reason itself has been corrupted to value the wrong things."}, {"text": "Vice is a temporary lapse in judgment, whereas $akrasia$ is a permanent and unchangeable character trait.", "isCorrect": false, "rationale": "Aristotle views vice as a stable disposition ($hexis$) and $akrasia$ as a failure of self-mastery, but vice is generally considered harder to cure."}, {"text": "The vicious person acts out of ignorance, while the $akratic$ person acts with full deliberative $proairesis$ (choice).", "isCorrect": false, "rationale": "Actually, the $akratic$ person acts against their $proairesis$ due to passion, while the vicious person's choice is itself bad."}, {"text": "There is no functional difference; Aristotle uses both terms to describe anyone who fails to achieve $sophrosyne$.", "isCorrect": false, "rationale": "Aristotle makes a sharp distinction based on the internal state of the agent's reason and its harmony (or lack thereof) with desire."}], "id": "q04"}, {"question": "According to the 'Function Argument' in Ethics I.7, what is the $ergon$ (function) of a human being?", "options": [{"text": "The active exercise of the soul's faculties in accordance with reason.", "isCorrect": true, "rationale": "Aristotle argues that just as an eye's function is to see, the unique human function is the activity of the rational part of the soul."}, {"text": "The pursuit of the greatest amount of $hedone$ (pleasure) over a complete lifetime.", "isCorrect": false, "rationale": "Aristotle rejects pleasure as the primary function or end, as it is shared with animals and does not fully utilize human reason."}, {"text": "The biological processes of nutrition and growth that distinguish living things from minerals.", "isCorrect": false, "rationale": "Nutrition and growth are shared with plants; a characteristic function must be unique to the kind of thing being defined."}, {"text": "The accumulation of wealth and power to ensure the self-sufficiency of the $oikos$.", "isCorrect": false, "rationale": "These are external goods or means to an end, not the internal activity that constitutes the human $ergon$ itself."}], "id": "q05"}, {"question": "Which form of constitution does Aristotle consider the 'best practical' option for most city-states, and how is it structured?", "options": [{"text": "Polity ($politeia$); a mixed government that blends elements of oligarchy and democracy, relying on a strong middle class.", "isCorrect": true, "rationale": "Polity is the 'mean' between the extremes of the rich and the poor, providing the stability necessary for a lasting constitution."}, {"text": "Aristocracy; rule by the few who possess the highest degree of $megalopsychia$.", "isCorrect": false, "rationale": "While aristocracy is a 'correct' form, Aristotle views it as less achievable in practice than the more stable, middle-class-based polity."}, {"text": "Democracy; a system where the poor majority rules in the interest of the common good.", "isCorrect": false, "rationale": "In Aristotle's specific terminology, democracy is a 'deviant' form where the poor rule for their own interest, not the common good."}, {"text": "Monarchy; the rule of a single 'divine' individual who is above the constraints of $nomos$ (law).", "isCorrect": false, "rationale": "Aristotle considers this theoretically best but practically impossible, as such a supremely virtuous person is rarely found."}], "id": "q06"}, {"question": "In Aristotle's teleological framework, why is $eudaimonia$ considered the 'highest good'?", "options": [{"text": "It is $autarkeia$ (self-sufficient) and always chosen for its own sake, never as a means to another end.", "isCorrect": true, "rationale": "The highest good must be final; while we seek honor or pleasure to be happy, we never seek happiness to achieve honor or pleasure."}, {"text": "It is the state of divine revelation that allows one to perceive the eternal Forms.", "isCorrect": false, "rationale": "Aristotle grounds $eudaimonia$ in human activity and reason rather than mystical revelation or Platonic Forms."}, {"text": "It is the only good that can be measured quantitatively across a population.", "isCorrect": false, "rationale": "Aristotle's ethics is focused on the quality of a life and the excellence of activity, not modern utilitarian calculations."}, {"text": "It represents the absolute absence of pain and the maximization of sensory $hedone$.", "isCorrect": false, "rationale": "Aristotle distinguishes 'living well' ($eudaimonia$) from the 'life of gratification' focused solely on pleasure."}], "id": "q07"}, {"question": "How does Thomas Aquinas's principle of 'gratia non tollit naturam, sed perficit' apply to his use of Aristotle?", "options": [{"text": "It suggests that Christian grace does not replace Aristotelian natural virtues but elevates and completes them.", "isCorrect": true, "rationale": "Aquinas argued that reason and faith are compatible, allowing him to adopt Aristotle's ethics as the foundation for natural human flourishing."}, {"text": "It indicates that Aristotle's 'Natural Law' is superior to 'Divine Law' because it is based on observation.", "isCorrect": false, "rationale": "Aquinas held that Divine Law is higher because it directs humans to a supernatural end that reason alone cannot reach."}, {"text": "It implies that Aristotle's works should be 'purged' of all secular philosophy to make room for theology.", "isCorrect": false, "rationale": "This contradicts the principle, which asserts that the 'natural' (philosophy) is good and should be perfected, not destroyed."}, {"text": "It means that the $telos$ of the human being is strictly biological and has no spiritual component.", "isCorrect": false, "rationale": "Aquinas used Aristotle's teleology to argue precisely the opposite: that the natural $telos$ points toward an even higher spiritual fulfillment."}], "id": "q08"}, {"question": "Aristotle claims that 'man is by nature a $politikon$ animal.' What is the primary evidence he provides for this in the 'Politics'?", "options": [{"text": "Human beings possess $logos$ (rational speech), which allows them to deliberate on justice and the common good.", "isCorrect": true, "rationale": "While other animals have 'voice' for pain/pleasure, only humans can use speech to define the advantageous and the just, which is the basis of the $polis$."}, {"text": "Human beings are physically weaker than other animals and require the $polis$ for mere survival.", "isCorrect": false, "rationale": "Aristotle admits the $polis$ starts for the sake of life, but he emphasizes that it 'exists for the sake of the good life,' driven by our rational nature."}, {"text": "Historical records show that no human has ever successfully lived outside of a state structure.", "isCorrect": false, "rationale": "Aristotle's argument is philosophical/teleological, not strictly historical; he acknowledges 'beasts or gods' might live outside it, but they aren't 'human' in the full sense."}, {"text": "The $oikos$ (household) is the only natural unit, and the $polis$ is an artificial convention ($nomos$).", "isCorrect": false, "rationale": "Aristotle argues that the $polis$ is the 'completion' of the household and is therefore just as 'natural' as the smaller units from which it grows."}], "id": "q09"}, {"question": "Which of the following best describes Aristotle's $mesotes$ (the mean) in moral virtue?", "options": [{"text": "It is a relative middle point determined by reason that varies according to the individual and the specific circumstances.", "isCorrect": true, "rationale": "The mean is not a fixed mathematical center; what is 'moderate' for an athlete like Milo is different from what is moderate for a beginner."}, {"text": "It is the exact mathematical average between two opposite emotions or actions.", "isCorrect": false, "rationale": "Aristotle explicitly denies that the mean is an arithmetic average, as human affairs are too contingent for such a simple calculation."}, {"text": "It is a compromise reached by taking the 'reputable views' ($endoxa$) and splitting the difference.", "isCorrect": false, "rationale": "While Aristotle considers $endoxa$, the mean is an excellence of character determined by $phronesis$, not a simple social consensus."}, {"text": "It is the absolute avoidance of any extreme passion, leading to a state of complete emotional apathy.", "isCorrect": false, "rationale": "Aristotle argues that we should feel passions 'at the right time, toward the right objects, for the right reason,' not that we should stop feeling them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
