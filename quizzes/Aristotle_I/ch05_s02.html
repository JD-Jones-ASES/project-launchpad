        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 5, Section 2</div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What significant contribution did Thomas Aquinas make to the philosophy of law, building upon Aristotle's foundation?", "options": [{"text": "He rejected Aristotle's focus on virtue, arguing that law's sole purpose is maintaining social order.", "isCorrect": false, "rationale": "Aquinas absorbed Aristotle's political philosophy, which included directing citizens toward virtue and the common good, not rejecting it."}, {"text": "He developed a systematic theory of law, distinguishing four types within a comprehensive theological framework.", "isCorrect": true, "rationale": "The text states Aquinas 'devoted a substantial portion of the Summa Theologica to the philosophy of law' and 'distinguishing four types of law that form a coherent hierarchy,' integrating Aristotle's ideas into a 'richer theological framework'."}, {"text": "He argued that laws are purely decrees of will by the ruler, not necessarily based on reason.", "isCorrect": false, "rationale": "Aquinas's definition emphasizes law as an 'ordinance of reason,' not merely a decree of will, and explicitly states that law is rational, not arbitrary."}, {"text": "He established the concept of a 'Treatise on Law' as an independent philosophical work, entirely separate from theological concerns.", "isCorrect": false, "rationale": "The Treatise on Law is part of the Summa Theologica, demonstrating its integration into a theological framework, not separation from it."}]}, {"question": "According to Aquinas's full definition, which of the following is *not* an essential characteristic of law?", "options": [{"text": "It must be an ordinance of reason.", "isCorrect": false, "rationale": "Aquinas explicitly states 'Ordinance of reason: law is rational, not arbitrary,' making this an essential element."}, {"text": "It must be for the private interest of the ruler.", "isCorrect": true, "rationale": "Aquinas's definition emphasizes 'Common good: law aims at the welfare of all, not the private interest of the ruler.' Therefore, private interest is contrary to his definition."}, {"text": "It must be made by him who has care of the community.", "isCorrect": false, "rationale": "Aquinas notes 'Made by him who has care: law requires legitimate authority,' making this an essential element."}, {"text": "It must be promulgated.", "isCorrect": false, "rationale": "Aquinas states 'Promulgated: law must be publicly known to bind,' highlighting its necessity."}]}, {"question": "Aquinas argues that promulgation is essential for a law to obtain its binding force. What is the underlying reason for this requirement?", "options": [{"text": "It ensures that the law is subject to public debate and democratic approval by the community.", "isCorrect": false, "rationale": "While desirable in some political systems, Aquinas's reason for promulgation is not rooted in democratic processes but in the nature of law and rational creatures."}, {"text": "It serves as a formal declaration of the ruler's arbitrary will, establishing their absolute authority.", "isCorrect": false, "rationale": "Aquinas explicitly rejects the idea of law being merely a decree of will, stating it's an 'act of reason' and 'rational, not arbitrary'."}, {"text": "For law to bind rational creatures, it must be known to them as a rule and measure to which they are subject.", "isCorrect": true, "rationale": "The text states, 'law is not merely a decree of will but an act of reason, and for it to bind rational creatures, it must be known to them.' Promulgation achieves this notification."}, {"text": "Without promulgation, the law cannot be formally written down and preserved for future generations.", "isCorrect": false, "rationale": "While writing helps preservation, Aquinas's focus is on the law gaining 'binding force' through being 'notified to them by promulgation,' not just its record-keeping."}]}, {"question": "In addressing the objection that natural law needs no promulgation, Aquinas clarifies its unique mode of promulgation. How is natural law promulgated, according      to Aquinas?", "options": [{"text": "Through sacred texts and religious scriptures revealed by God.", "isCorrect": false, "rationale": "This describes Divine Law, which is distinct from natural law's mode of promulgation as explained by Aquinas."}, {"text": "By being formally declared and enforced by legitimate human authorities.", "isCorrect": false, "rationale": "This describes the promulgation of Human Law, not natural law, which is innate."}, {"text": "By being instilled into man's mind by God, making it naturally known and discernible through reason.", "isCorrect": true, "rationale": "Aquinas states, 'The natural law is promulgated by the very fact that God instilled it into man's mind so as to be known by him naturally,' implying its accessibility through innate reason."}, {"text": "Through philosophical discourse and intellectual discovery by the wise.", "isCorrect": false, "rationale": "While philosophical discourse can help articulate natural law, Aquinas describes its promulgation as an innate divine imprint, not solely through intellectual discovery by the wise."}]}, {"question": "Which type of law, according to Aquinas, represents God's own rational governance of the entire created order and serves as the supreme principle from which all other law ultimately derives its binding force?", "options": [{"text": "Human Law", "isCorrect": false, "rationale": "Human law is derived from natural law and pertains to specific human communities, not the governance of all creation."}, {"text": "Natural Law", "isCorrect": false, "rationale": "Natural law is the 'rational creature's participation' in this supreme principle, not the principle itself governing all creation."}, {"text": "Divine Law", "isCorrect": false, "rationale": "Divine law is revealed in Scripture, but Eternal Law is the 'supreme principle from which all other law ultimately derives its binding force,' governing the entire created order."}, {"text": "Eternal Law", "isCorrect": true, "rationale": "The text explicitly defines 'eternal law' as 'God's rational governance of all creation — the supreme principle from which all other law ultimately derives its binding force'."}]}, {"question": "Aquinas explains that natural law is the 'rational creature's participation in the eternal law.' What does this statement imply about the relationship between these two types of law?", "options": [{"text": "Natural law is a separate and distinct set of moral principles that exist independently of God's eternal governance.", "isCorrect": false, "rationale": "The text clarifies that 'the natural law is not a separate law but our rational grasp of that plan,' meaning it's dependent on and integrated with the eternal law."}, {"text": "Natural law is merely a human invention or cultural convention that attempts to mimic eternal principles.", "isCorrect": false, "rationale": "Aquinas argues natural law 'reflects the deep structure of reality as ordered by God,' and is not merely conventional or cultural."}, {"text": "Natural law is how rational beings apprehend and reflect the divine order and reason inherent in God's eternal plan for creation.", "isCorrect": true, "rationale": "The text explains natural law is 'our rational grasp of that plan, written into our moral nature,' which is the 'participation of the eternal law in the rational creature'."}, {"text": "Eternal law is only relevant to divine beings, while natural law applies exclusively to human society.", "isCorrect": false, "rationale": "Eternal law governs 'the whole community of the universe,' affecting all things subject to Divine providence, not just divine beings."}]}, {"question": "Given Aquinas's account of natural law as an 'imprint on us of the Divine light' and a 'participation of the eternal law,' what can be inferred about the nature of fundamental moral knowledge?", "options": [{"text": "Fundamental moral knowledge is primarily learned through cultural transmission and varies significantly across societies.", "isCorrect": false, "rationale": "The text explicitly states that moral knowledge available through reason 'is not merely conventional or cultural'."}, {"text": "Human reason can access universal moral principles because they reflect the objective, God-ordered structure of reality.", "isCorrect": true, "rationale": "Natural law's basis in the eternal law means 'the moral knowledge available through reason is not merely conventional or cultural — it reflects the deep structure of reality as ordered by God'."}, {"text": "Moral truths are entirely subjective, depending on individual interpretation of divine will.", "isCorrect": false, "rationale": "Aquinas emphasizes an 'imprint on us of the Divine light' and the ability to 'discern what is good and what is evil,' indicating an objective basis for moral truths, not mere subjectivity."}, {"text": "The pursuit of moral knowledge is distinct from the pursuit of understanding God's plan for creation.", "isCorrect": false, "rationale": "Natural law is defined as 'the rational creature's participation of the eternal law,' making moral knowledge intrinsically linked to God's plan."}]}, {"question": "According to Aquinas, what is the primary and foundational precept of natural law, from which all other precepts are derived?", "options": [{"text": "Honor your father and your mother.", "isCorrect": false, "rationale": "This is a specific moral precept, often found in Divine Law, not the overarching first principle of natural law."}, {"text": "Preserve your own life and species.", "isCorrect": false, "rationale": "These are 'natural inclinations' that, in conjunction with the first precept, lead to specific natural law precepts, but are not the first precept itself."}, {"text": "Good is to be done and pursued, and evil is to be avoided.", "isCorrect": true, "rationale": "The text states, 'the first precept is that 'good is to be done and pursued, and evil is to be avoided.' Everything else follows from this'."}, {"text": "Seek knowledge and worship God.", "isCorrect": false, "rationale": "This is another 'natural inclination' that forms the basis for specific precepts, but it is not the foundational first precept itself."}]}, {"question": "Beyond the first precept ('good is to be done and pursued, and evil avoided'), how does Aquinas explain the derivation of other, more specific precepts of natural law?", "options": [{"text": "They are directly revealed by divine law through prophets and sacred scripture.", "isCorrect": false, "rationale": "This describes Divine Law, which is a separate category from natural law's derivation through reason and natural inclinations."}, {"text": "They are established through democratic consensus and societal agreements.", "isCorrect": false, "rationale": "Aquinas's natural law is not based on human consensus but on innate reason and divine order."}, {"text": "They are derived in conjunction with humanity's natural inclinations, such as self-preservation, procreation, and social life.", "isCorrect": true, "rationale": "The text states, 'Everything else follows from this in conjunction with our natural inclinations — toward self-preservation, toward procreation, toward social life, toward knowledge and worship of God'."}, {"text": "They are discovered through empirical observation of animal behavior and natural processes.", "isCorrect": false, "rationale": "While nature is a source of understanding, Aquinas emphasizes rational participation and innate inclinations in rational creatures, not solely empirical observation of non-human nature."}]}, {"question": "Which statement best captures the essence of Aquinas's comprehensive philosophy of law as presented in the text?", "options": [{"text": "Law is primarily a flexible instrument of political power, designed to adapt to changing societal needs and the arbitrary will of the ruler.", "isCorrect": false, "rationale": "Aquinas defines law as an 'ordinance of reason,' not arbitrary, and for the 'common good,' not merely political power or the ruler's will."}, {"text": "All legitimate law originates solely from divine revelation, making human reason secondary and subordinate in legal and moral discovery.", "isCorrect": false, "rationale": "Aquinas emphasizes the role of 'natural law' as the 'rational creature's participation' in the eternal law, where reason plays a crucial role in discerning moral knowledge, not being merely secondary."}, {"text": "Law is a rational ordinance for the common good, rooted in God's eternal governance of creation and accessible to rational creatures through innate moral knowledge.", "isCorrect": true, "rationale": "This statement integrates all key elements: law's definition ('ordinance of reason for the common good'), its ultimate source ('God's eternal governance'), and its human accessibility ('innate moral knowledge' through natural law)."}, {"text": "The sole purpose of law is to ensure individual liberty and self-interest, even if it sometimes conflicts with the common good or divine principles.", "isCorrect": false, "rationale": "Aquinas stresses the 'common good' and virtuous direction of citizens, not prioritizing individual self-interest above these, or above divine principles."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
