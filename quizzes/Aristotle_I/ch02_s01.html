<script>
var QUESTIONS = [{"question": "Which of the following best describes Aristotle's primary method for approaching ethical inquiry?", "options": [{"text": "He begins by positing universal first principles and deducing all ethical conclusions from them, similar to a mathematical proof.", "isCorrect": false, "rationale": "The text explicitly states that Aristotle 'does not begin by announcing a first principle and deducing conclusions from it, the way a mathematician might.' His method is distinct from this approach."}, {"text": "He gathers 'endoxa,' or reputable common opinions, and then subjects them to careful philosophical scrutiny and refinement.", "isCorrect": true, "rationale": "The text states Aristotle 'begins by gathering up what people ordinarily believe — “endoxa”... and then subjects those opinions to careful scrutiny,' refining them rather than dismissing them. This is the core of his 'dialectical' approach."}, {"text": "He dismisses all common opinions as mere prejudice, believing that true ethical understanding can only come from abstract reasoning detached from human experience.", "isCorrect": false, "rationale": "The text clearly states Aristotle 'does not dismiss these views; he refines them,' treating them as 'data rather than mere prejudice' that contain 'genuine insight.'"}, {"text": "He focuses exclusively on individual emotional states and subjective feelings of pleasure to define what constitutes the highest good for humans.", "isCorrect": false, "rationale": "While he notes common associations of happiness with pleasure, he refines these and ultimately defines happiness (eudaimonia) in an objective sense, distinct from 'feeling good' (hedone)."}]}, {"question": "According to Aristotle's Function Argument, what is the 'ergon' (function) that is distinctive to human beings?", "options": [{"text": "The capacity for mere life and growth, as humans, plants, and animals all share this biological function.", "isCorrect": false, "rationale": "Step 3 of the Function Argument explicitly states that the human function 'cannot be mere life or sensation, since plants and animals share these,' indicating it must be something more distinctive."}, {"text": "The pursuit of pleasure (hedone) and the avoidance of pain, as these are common desires for all sentient beings.", "isCorrect": false, "rationale": "The Function Argument does not identify pleasure as the distinctive human function; rather, it leads to 'activity of the soul in accordance with virtue' as happiness. The text also clarifies the distinction between eudaimonia and hedone."}, {"text": "The activity of the soul in accordance with reason, representing a life lived by a rational, choosing, reasoning being.", "isCorrect": true, "rationale": "Step 4 of the Function Argument clearly defines the 'function distinctive to humans' as 'the activity of the soul in accordance with reason — the life lived by a rational, choosing, reasoning being.'"}, {"text": "Excelling in a particular craft, art, or profession, such as being a good doctor or a good harp-player.", "isCorrect": false, "rationale": "Step 1 of the Function Argument uses crafts and professions as examples of 'characteristic function' but emphasizes that Step 3 is about 'Humans, as humans (not just as animals or as occupants of a profession).'"}]}, {"question": "A common criticism mentioned in the text against Aristotle's Function Argument is:", "options": [{"text": "That humans cannot have a single defining function because individual talents and preferences vary too widely.", "isCorrect": false, "rationale": "This is not explicitly stated as a common criticism in the text. The criticisms focus more on the premise of a *single* defining function and the definition of 'good.'"}, {"text": "That happiness (eudaimonia) is an emotional state, which cannot be determined by a rational function.", "isCorrect": false, "rationale": "The text clarifies that Aristotle's 'happiness' (eudaimonia) is not a feeling, but 'flourishing' or 'living well,' which aligns with a rational function, making this an unlikely criticism."}, {"text": "Whether it is truly the case that humans have a single defining function, and whether 'good' for a thing necessarily means 'performing its function.'", "isCorrect": true, "rationale": "The text explicitly states: 'Some philosophers ask whether it is really true that humans have a single defining function. Others question whether “good” for a thing necessarily means “performing its function.” These are fair challenges.'"}, {"text": "That the argument fails to account for the role of external goods like wealth and honor in achieving a good life.", "isCorrect": false, "rationale": "While Aristotle acknowledges these as common associations with happiness, the text does not present this as a *criticism* of the Function Argument itself, but rather as initial 'endoxa' that he refines."}]}, {"question": "Which statement accurately clarifies a crucial aspect of Aristotle's Doctrine of the Mean?", "options": [{"text": "The virtuous person always chooses the moderate option, avoids strong feelings, and seeks an arithmetic midpoint between two extremes.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not what Aristotle says... The mean is relative to the person and situation, not an arithmetic midpoint.' It also clarifies that virtuous people feel emotions strongly when appropriate."}, {"text": "Virtue is a stable disposition (hexis) that aims at a mean, which is relative to the individual and the specific circumstances, determined by practical wisdom (phronesis).", "isCorrect": true, "rationale": "The definition of the Doctrine of the Mean in the text states: 'Virtue is a stable disposition (hexis) that aims at the mean between two vices: excess and deficiency. But the mean is relative to the person and situation... The mean is determined by practical wisdom (phronesis), not by formula.'"}, {"text": "The doctrine implies that the virtuous person should suppress all strong emotions and remain detached in all situations.", "isCorrect": false, "rationale": "The text refutes this, stating: 'Crucially, the doctrine of the mean does not imply that the virtuous person feels emotions weakly or blandly. On the contrary: Aristotle says that the virtuous person feels the right emotions, at the right intensity...'"}, {"text": "To be virtuous, one must always choose the option that requires the least effort or risk, embodying a 'lukewarm middle ground.'", "isCorrect": false, "rationale": "The text explicitly counters this common misunderstanding: 'The doctrine of the mean does not counsel mediocrity... The virtuous person is not someone who has settled for the lukewarm middle ground.'"}]}, {"question": "A student struggles with public speaking and feels intense fear before presentations. Applying Aristotle's Doctrine of the Mean, what would a virtuous response look like for this student?", "options": [{"text": "The student should aim to feel absolutely no fear, as fear is a vice, and deliver the presentation with complete indifference.", "isCorrect": false, "rationale": "Aristotle states the virtuous person feels the *right* emotions, not no emotions. Indifference to a challenging situation like public speaking would be a vice of insensibility or rashness regarding fear, not courage."}, {"text": "The student should choose a path of 'timid half-heartedness,' aiming for a presentation that is just 'pretty good' to avoid both excessive fear and reckless overconfidence.", "isCorrect": false, "rationale": "The text warns against 'timid half-heartedness' and clarifies that the mean 'does not counsel mediocrity.' Virtue requires finding 'difficult, precise excellence.'"}, {"text": "The student should cultivate the capacity to feel an appropriate level of concern for the presentation, recognizing legitimate challenges while confidently preparing and delivering it effectively.", "isCorrect": true, "rationale": "This aligns with the description of courage as the mean between 'too much fear' (cowardice) and 'too little fear' (rashness). The virtuous person feels the 'right emotions, at the right intensity, toward the right objects, at the right time, for the right reasons' and acts appropriately."}, {"text": "The student should embrace 'reckless courage,' ignoring all fear and speaking spontaneously without preparation, regardless of the consequences.", "isCorrect": false, "rationale": "'Reckless courage' is identified as a disproportionate emotion, a vice of excess (rashness), not the mean. Ignoring danger or challenges without appropriate preparation is not virtuous."}]}, {"question": "The text clarifies that 'happiness' (eudaimonia) for Aristotle does not mean 'feeling good' (hedone). Which of the following situations best exemplifies Aristotle's concept of eudaimonia?", "options": [{"text": "A person who constantly seeks sensory pleasures and indulgences, reporting high levels of momentary contentment and joy.", "isCorrect": false, "rationale": "This describes 'hedone' (pleasure). The text explicitly states that eudaimonia 'is a different word entirely' from hedone, and that 'a person can feel quite happy (pleasant, contented) while living in a way Aristotle would judge to be a failure.'"}, {"text": "A person who lives a life of profound virtue, exercises their rational capacities excellently, and contributes positively to their community, even if they endure significant personal hardships.", "isCorrect": true, "rationale": "Eudaimonia is defined as 'flourishing' or 'living well' in a full, objective sense, 'activity of soul in accordance with virtue, over a complete life.' The text notes 'a person can be genuinely happy (eudaimon) while enduring real hardship and difficulty.'"}, {"text": "A successful fraudster who accumulates great wealth and honor through deceit, enjoys a lavish lifestyle, and is never caught.", "isCorrect": false, "rationale": "The 'teachernote' directly addresses this, stating the fraudster 'lacks what Aristotle means by eudaimonia: a settled, stable condition of excellent human living.' Their 'happiness' is 'fragile, dependent on concealment, and involves a kind of self-betrayal.'"}, {"text": "A person who maintains a consistently mild and even-keeled emotional state, avoiding any intense feelings of either joy or sorrow.", "isCorrect": false, "rationale": "This aligns with the misunderstanding of the mean as mediocrity or blandness, which Aristotle refutes. The virtuous person feels *right* emotions at *right* intensity."}]}, {"question": "Aristotle's view of virtue as a 'positive excellence' implies that a truly courageous person:", "options": [{"text": "Suppresses their natural fear and acts bravely through sheer willpower, despite remaining terrified.", "isCorrect": false, "rationale": "The text clarifies: 'the truly courageous person does not merely grit his teeth and act bravely despite his terror. Over time, and through practice, he has become the sort of person who finds the right things fearful and faces them appropriately.'"}, {"text": "Avoids all situations that might evoke strong emotions, preferring a life of quiet moderation and emotional restraint.", "isCorrect": false, "rationale": "This is a misunderstanding of the mean as mediocrity. Virtue is about feeling the *right* emotions, not avoiding them. Courage often requires facing challenging situations."}, {"text": "Has, through practice, cultivated a character trait where they reliably feel the appropriate level of fear and confidently face dangers when it is right to do so.", "isCorrect": true, "rationale": "The text states: 'virtue, in Aristotle's account, involves not just what you do but what you feel... he has become the sort of person who finds the right things fearful and faces them appropriately.'"}, {"text": "Is someone who, by nature, is completely fearless and thus never experiences any apprehension in the face of danger.", "isCorrect": false, "rationale": "Virtue is a cultivated 'hexis' (stable disposition), not an inherent lack of feeling. The virtuous person 'finds the right things fearful,' implying recognition of danger, but responds appropriately."}]}, {"question": "The text presents the concept of 'hexis' in relation to virtue. What does 'hexis' signify in Aristotle's ethics?", "options": [{"text": "A momentary impulse or a forced performance of a good deed.", "isCorrect": false, "rationale": "The definition states: 'The word suggests something 'held' or 'settled' in the soul — a reliable tendency... Virtue is a hexis because it is not a momentary impulse or a forced performance.'"}, {"text": "An innate, unchangeable character trait with which a person is born.", "isCorrect": false, "rationale": "Hexis refers to a 'stable disposition' that is cultivated through practice, implying it is not innate but developed. The text mentions 'Over time, and through practice, he has become the sort of person...'"}, {"text": "A stable state or disposition of character, a reliable tendency to act and feel in a certain way, developed through habit and practice.", "isCorrect": true, "rationale": "The 'keyconcept' box defines hexis as 'A stable state or disposition of character. The word suggests something “held” or “settled” in the soul — a reliable tendency to act and feel in a certain way.'"}, {"text": "The external circumstances and social pressures that influence a person's moral choices.", "isCorrect": false, "rationale": "Hexis is an internal 'disposition of character,' not an external factor, though external circumstances certainly play a role in how that hexis is expressed."}]}, {"question": "Aristotle acknowledges that some actions, like murder and adultery, are simply wrong regardless of circumstances. How does the text suggest this detail relates to his general doctrine of the mean?", "options": [{"text": "It implies that the doctrine of the mean is fundamentally flawed and cannot apply to all moral situations.", "isCorrect": false, "rationale": "The 'thinkdeeper' question asks if this 'undermine his general doctrine, or does it complete it?' It doesn't present it as a fundamental flaw, but rather a point of reflection or nuance."}, {"text": "It suggests that for these specific actions, there is no 'mean' to be found; they are inherently vicious and cannot be performed virtuously.", "isCorrect": true, "rationale": "The 'thinkdeeper' section asks 'Are there actions that are always wrong, even if performed in the 'right' circumstances?' This implies that for certain acts, the concept of a 'mean' doesn't apply because the action itself is inherently bad, regardless of 'how' it's done."}, {"text": "It means that even actions like murder can be virtuous if performed with the right intention and at the right intensity.", "isCorrect": false, "rationale": "The text explicitly gives murder and adultery as examples of actions that are 'simply wrong regardless of circumstances,' directly contradicting the idea that they can be performed virtuously."}, {"text": "It highlights that the mean is always an arithmetic average, even for actions like justice.", "isCorrect": false, "rationale": "The text repeatedly emphasizes that the mean is *not* a mathematical average and is relative to the person and situation, especially for virtues like courage or generosity. The question about justice is posed as a challenge, not a confirmation of an arithmetic mean."}]}, {"question": "The 'teachernote' describes a common student intuition that a wicked person can be happy. How would Aristotle counter this intuition, according to the text?", "options": [{"text": "He would argue that true happiness is primarily about external goods like wealth and honor, which a wicked person can certainly obtain.", "isCorrect": false, "rationale": "Aristotle's method begins by noting these associations but then refines them, concluding that eudaimonia is 'activity of soul in accordance with virtue,' not merely external goods."}, {"text": "He would assert that while a wicked person might experience pleasure (hedone), they lack eudaimonia, which is an objective state of excellent human living.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states: 'Aristotle would say the fraudster may have pleasure, wealth, and even honor — but lacks what Aristotle means by eudaimonia: a settled, stable condition of excellent human living.'"}, {"text": "He would concede that a wicked person can be happy, but only if they are never caught or face consequences for their actions.", "isCorrect": false, "rationale": "The note argues that even if never caught, the fraudster's 'happiness' is 'fragile, dependent on concealment, and involves a kind of self-betrayal,' implying it's not true eudaimonia."}, {"text": "He would state that happiness is entirely subjective, so if a wicked person feels happy, then they are, by definition, happy.", "isCorrect": false, "rationale": "Aristotle's eudaimonia is 'flourishing' or 'living well' in a 'full, objective sense,' not a subjective feeling. His ethical system seeks to define what makes a life objectively good."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
