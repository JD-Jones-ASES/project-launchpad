<script>
var QUESTIONS = [{"question": "What was Thomas Aquinas's primary achievement regarding the relationship between Aristotelian philosophy and Christian theology?", "options": [{"text": "He translated all of Aristotle's works directly from Greek into Latin, making them accessible to the Western world.", "isCorrect": false, "rationale": "While translations were crucial, Aquinas's unique achievement was the *synthesis* of the two traditions, not the initial translation from Greek, which largely occurred via Arabic texts."}, {"text": "He demonstrated that Greek reason and Christian faith were not rivals but complementary partners, each illuminating the other.", "isCorrect": true, "rationale": "The text states Aquinas's achievement 'was to show that the two great traditions of Western thought — Greek reason and Christian faith — are not rivals but partners, each illuminating what the other cannot reach alone.'"}, {"text": "He argued that Christian theology was fundamentally superior to Aristotelian philosophy and should replace it entirely.", "isCorrect": false, "rationale": "Aquinas sought a partnership and synthesis, emphasizing complementarity rather than the outright replacement or superiority of one over the other."}, {"text": "He condemned all pagan philosophical thought, including Aristotle's, as contrary to Christian doctrine.", "isCorrect": false, "rationale": "Aquinas's work was explicitly an attempt to integrate and reconcile Aristotle's philosophy with Christian thought, countering previous condemnations."}], "id": "q01"}, {"question": "Which factor was most significant in the loss of Aristotle's extensive writings in Western Europe after the fragmentation of the Western Roman Empire?", "options": [{"text": "The deliberate destruction of pagan texts by early Christian authorities.", "isCorrect": false, "rationale": "The text does not mention deliberate destruction as the primary cause, but rather the loss of linguistic knowledge."}, {"text": "The decline of Aristotle's school at the Lyceum, leading to the disappearance of his works.", "isCorrect": false, "rationale": "While the Lyceum declined, Aristotle's works survived elsewhere, particularly in the Greek East and the Islamic world. The issue was their disappearance in the *Latin West*."}, {"text": "The widespread loss of knowledge of the Greek language in Western Europe.", "isCorrect": true, "rationale": "The text explicitly states: 'as the Western Roman Empire fragmented in the fifth and sixth centuries AD, the knowledge of Greek was largely lost in Western Europe. With it went most of Aristotle's writings.'"}, {"text": "The exclusive focus of Western scholars on Platonic philosophy, rendering Aristotle irrelevant.", "isCorrect": false, "rationale": "The text highlights a *lack of access* to Aristotle's works, not necessarily a deliberate preference for Plato as the sole reason for their disappearance."}], "id": "q02"}, {"question": "The 'full recovery' of Aristotle's works in the Latin West in the 12th century primarily depended on a chain of transmission involving which cultural and linguistic groups?", "options": [{"text": "Direct translation from original Greek manuscripts found in Western European libraries.", "isCorrect": false, "rationale": "The text emphasizes that 'Latin translations of these Arabic texts began flooding into Western Europe — translations of translations, from Greek to Arabic to Latin.'"}, {"text": "Preservation by Byzantine scholars and subsequent translation into Latin.", "isCorrect": false, "rationale": "While Byzantine scholars preserved the Greek texts, the crucial link for Western recovery involved translation *into Arabic* first, then into Latin."}, {"text": "Byzantine preservation, followed by Arabic translation and commentary, and then Latin translation of those Arabic texts.", "isCorrect": true, "rationale": "The text details this chain: 'Aristotle's works survived in the Greek East (Byzantium) and, crucially, were translated into Arabic... In the twelfth century, Latin translations of these Arabic texts began flooding into Western Europe.'"}, {"text": "Translations by early Christian monks who had learned Greek from missionaries.", "isCorrect": false, "rationale": "Boethius's translations were an early, limited exception. The major recovery involved Arabic transmission, not widespread early monastic translation from Greek."}], "id": "q03"}, {"question": "Upon their reintroduction, Aristotle's comprehensive works initially met with 'Initial Shock' and condemnation in Western Europe because:", "options": [{"text": "They were poorly translated from Arabic, leading to widespread misunderstandings of his philosophy.", "isCorrect": false, "rationale": "The text indicates the new works were 'far richer and more challenging,' implying their content was understood, even if problematic, not that the translations were inherently poor."}, {"text": "Aristotle's pagan views on creation, God, and human ethics directly contradicted core Christian doctrines.", "isCorrect": true, "rationale": "The text lists specific conflicts: 'Aristotle had argued for the eternity of the world (contradicting creation), had described a God who thinks only of himself and is indifferent to the world, and had rooted all human goods in the natural virtues achievable by unaided reason.'"}, {"text": "Western European scholars were already committed to a Neoplatonic philosophical system and rejected all other schools of thought.", "isCorrect": false, "rationale": "While Neoplatonism had influence, the text attributes the shock and condemnation to specific doctrinal conflicts with Christian teachings, not merely a preference for another philosophy."}, {"text": "The Church feared that a return to classical Greek learning would undermine the authority of the clergy.", "isCorrect": false, "rationale": "The text focuses on specific philosophical contradictions, not a general fear of classical learning eroding clerical authority."}], "id": "q04"}, {"question": "The Condemnation of 1277, issued by Bishop Etienne Tempier, implicitly targeted some of Thomas Aquinas's positions even after his death. This event best illustrates:", "options": [{"text": "The complete failure of Aquinas's synthesis to gain acceptance within the Church.", "isCorrect": false, "rationale": "While initially controversial, the text states 'his influence proved irresistible' and Thomism later became dominant, indicating ultimate success, not failure."}, {"text": "The ongoing tension and difficulty faced by medieval scholars in integrating pagan philosophy with Christian theology.", "isCorrect": true, "rationale": "The condemnation targeted doctrines perceived as threatening to Christian faith, many of which were Aristotelian or Averroist, reflecting the profound challenges of synthesizing these traditions."}, {"text": "The Church's definitive decree that all Aristotelian philosophy was incompatible with Christian faith.", "isCorrect": false, "rationale": "The condemnation targeted *specific* propositions, not a blanket rejection of all Aristotelian thought, especially given Aquinas's subsequent vindication."}, {"text": "A personal vendetta against Thomas Aquinas by the Bishop of Paris.", "isCorrect": false, "rationale": "The text characterizes it as an 'ecclesiastical intervention' targeting doctrines 'perceived as threatening to Christian faith,' not a personal vendetta."}], "id": "q05"}, {"question": "According to Aquinas, how do philosophy and theology relate to each other in their pursuit of truth?", "options": [{"text": "Philosophy is a subordinate discipline, providing rhetorical support for theological doctrines.", "isCorrect": false, "rationale": "Aquinas viewed them as 'partners,' not subordinate, with distinct domains and lights, both directed at truth."}, {"text": "They operate on different levels, with philosophy using natural reason and theology using divine revelation, but both ultimately stem from God and cannot contradict.", "isCorrect": true, "rationale": "The text explains: 'philosophy operates by the light of natural reason alone... Theology operates by the light of divine revelation... Because both philosophy and theology are directed at truth, and because God is the source of both natural reason and revealed faith, they cannot genuinely contradict each other.'"}, {"text": "They are fundamentally at odds, representing an irreconcilable conflict between reason and faith.", "isCorrect": false, "rationale": "Aquinas's entire project was to show they are *not* rivals, but partners, and that apparent conflicts are due to poor reasoning or theology."}, {"text": "Philosophy deals with observable facts, while theology deals with supernatural mysteries beyond any rational comprehension.", "isCorrect": false, "rationale": "While theology deals with truths surpassing reason, Aquinas believed reason could prepare the mind for faith and clarify many theological concepts, and that both were comprehensible in their own domains."}], "id": "q06"}, {"question": "The Thomistic principle 'gratia non tollit naturam, sed perficit' ('Grace does not destroy nature, but perfects it') implies which of the following?", "options": [{"text": "Divine grace renders all human natural efforts and virtues irrelevant for salvation.", "isCorrect": false, "rationale": "The principle states grace 'does not destroy' nature but 'perfects' it, meaning natural efforts are not irrelevant but are elevated and completed by grace."}, {"text": "Human nature is inherently flawed and cannot achieve any good without the direct intervention of grace.", "isCorrect": false, "rationale": "The text clarifies: 'Nature, for Aquinas, is genuinely good: the virtues Aristotle described are real, achievable by human effort, and genuinely valuable.'"}, {"text": "Natural virtues are genuinely good and achievable by human effort, but they are incomplete and require divine grace for ultimate fulfillment.", "isCorrect": true, "rationale": "The text states: 'Nature is genuinely good; grace does not abolish or replace it, but elevates and completes it.' It also says Aristotle's virtues are real but 'incomplete' without grace."}, {"text": "Grace exclusively refers to intellectual understanding, allowing humans to grasp complex philosophical concepts.", "isCorrect": false, "rationale": "Grace refers to a divine gift that elevates and completes human nature, especially towards perfect happiness (the beatific vision), not solely intellectual understanding."}], "id": "q07"}, {"question": "How does Aquinas differentiate between 'imperfect happiness' and 'perfect happiness'?", "options": [{"text": "Imperfect happiness is a temporary earthly pleasure, while perfect happiness is a state of perpetual intellectual contemplation.", "isCorrect": false, "rationale": "Imperfect happiness is not merely temporary pleasure but 'life in accordance with virtue.' Perfect happiness is the beatific vision of God, which is more than just intellectual contemplation."}, {"text": "Imperfect happiness is achievable through natural virtue and reason (as described by Aristotle), while perfect happiness is a supernatural gift requiring divine grace.", "isCorrect": true, "rationale": "The text explains: 'The natural happiness of the Ethics — eudaimonia, life in accordance with virtue — is real and worth pursuing. But it is only 'imperfect happiness.' Perfect happiness, the beatific vision of God, surpasses anything that natural virtue can achieve, and requires the gift of grace.'"}, {"text": "Aquinas rejects Aristotle's concept of happiness entirely, asserting only perfect happiness is real.", "isCorrect": false, "rationale": "Aquinas acknowledged Aristotle's 'natural happiness' as 'real and worth pursuing,' integrating it rather than rejecting it."}, {"text": "Perfect happiness is a state achieved only after death, while imperfect happiness is only attainable in this life.", "isCorrect": false, "rationale": "While perfect happiness often refers to the afterlife, the distinction is fundamentally about what natural reason can achieve versus what requires grace, not simply about timing."}], "id": "q08"}, {"question": "Dante's portrayal of Aristotle as 'the master of those who know' but confined to Limbo, rather than Paradise, serves as a powerful symbol for:", "options": [{"text": "The ultimate rejection of all pagan philosophy by medieval Christian thought.", "isCorrect": false, "rationale": "Calling him 'the master of those who know' is the highest honor, indicating profound respect and acceptance of his intellectual authority, not outright rejection."}, {"text": "The idea that intellectual achievement, however great, cannot by itself lead to the beatific vision of God, which requires faith and grace.", "isCorrect": true, "rationale": "The text states: 'natural reason, however magnificent, could not take him to the beatific vision that faith and grace alone can achieve. Dante's image is a perfect emblem of the medieval synthesis: Aristotle is indispensable, irreplaceable, and — without grace — incomplete.'"}, {"text": "The historical fact that Aristotle died before Christ and therefore could not be saved.", "isCorrect": false, "rationale": "While he died before Christ, the symbolism extends beyond historical circumstance to a theological statement about the limits of natural reason."}, {"text": "Dante's personal disagreement with Thomas Aquinas's synthesis of Aristotle and Christianity.", "isCorrect": false, "rationale": "The text explicitly states Dante 'drew heavily on Thomistic theology and Aristotelian philosophy throughout,' indicating alignment with Aquinas's synthesis."}], "id": "q09"}, {"question": "The 'productive tension' that remains even within the Thomistic synthesis, as described in the text, primarily centers on which issue?", "options": [{"text": "The conflict between the eternity of the world (Aristotle) and creation ex nihilo (Christianity).", "isCorrect": false, "rationale": "While this was an initial conflict, Aquinas aimed to resolve such contradictions. The 'productive tension' refers to a more nuanced practical and theological point about human nature."}, {"text": "Whether natural reason, unaided by grace, can genuinely lead a person to virtue and natural happiness, given the Christian concept of human nature wounded by sin.", "isCorrect": true, "rationale": "The text states: 'Can natural reason, unaided by grace, genuinely lead a person to virtue and natural happiness? Aristotle says yes. Christianity says: yes, but human nature has been wounded by sin... so that what reason prescribes is harder to achieve in practice...'"}, {"text": "The difficulty in determining which specific philosophical works of Aristotle are truly compatible with Christian doctrine.", "isCorrect": false, "rationale": "The tension is more about the capabilities of human nature and reason in light of sin and grace, rather than a cataloging of compatible texts."}, {"text": "The ongoing debate regarding the most accurate translation of Aristotle's Greek texts into Latin.", "isCorrect": false, "rationale": "This is a textual/linguistic issue, not the philosophical 'productive tension' discussed at the end of the synthesis section."}], "id": "q10"}, {"question": "Three Islamic scholars played distinctive roles in transmitting Aristotle to the medieval Latin world. Which of the following correctly pairs each scholar with his contribution?", "options": [{"text": "Al-Farabi wrote line-by-line commentaries so thorough he was known as 'The Commentator'; Avicenna synthesized Aristotle with Neoplatonism; Averroes focused on Aristotle's political philosophy.", "isCorrect": false, "rationale": "This reverses roles. It was Averroes who wrote such thorough commentaries that he was called 'The Commentator.' Al-Farabi was the first great Arabic commentator on Aristotle's political philosophy; Avicenna synthesized Aristotle with Neoplatonic elements."}, {"text": "Al-Farabi was the first great Arabic commentator on Aristotle's political philosophy; Avicenna produced comprehensive philosophical encyclopedias synthesizing Aristotle with Neoplatonic elements; Averroes wrote such thorough line-by-line commentaries that he was known simply as 'The Commentator.'", "isCorrect": true, "rationale": "The text states: Al-Farabi 'was the first great Arabic commentator on Aristotle's political philosophy'; Avicenna 'produced comprehensive philosophical encyclopedias that synthesized Aristotle with Neoplatonic elements'; Averroes 'wrote such thorough commentaries on Aristotle that the Latin West knew him simply as \"The Commentator.\"'"}, {"text": "All three scholars primarily focused on translating Aristotle's texts from Greek into Arabic, without adding original philosophical commentary.", "isCorrect": false, "rationale": "All three went far beyond translation to produce original philosophical commentaries, syntheses, and encyclopedias that significantly shaped how Aristotle was understood in both the Islamic and Christian worlds."}, {"text": "Avicenna and Averroes disputed each other's interpretations in a famous debate, with Aquinas ultimately siding with Avicenna against Averroes on key theological points.", "isCorrect": false, "rationale": "While Aquinas was influenced by and sometimes disagreed with Averroes, the text does not describe a famous public dispute between Avicenna and Averroes. Their roles are characterized as successive transmitters, not debaters."}], "id": "q11"}, {"question": "Albert the Great, Aquinas's teacher, is noted in the text for two significant contributions. What were they?", "options": [{"text": "He translated Aristotle's complete works from Arabic into Latin, and he organized the first course on Aristotle at the University of Paris.", "isCorrect": false, "rationale": "The text does not credit Albert the Great with the translations — those were done by others. His contributions were encyclopedic study of Aristotle's corpus and his early assertion about philosophy and theology."}, {"text": "He studied and commented on virtually the entire Aristotelian corpus, and was one of the first medieval scholars to assert that philosophy and theology, properly pursued, cannot genuinely conflict.", "isCorrect": true, "rationale": "The text states: 'He studied and commented on virtually the entire Aristotelian corpus, along with the Arabic commentators, and was one of the first medieval scholars to assert that philosophy and theology, properly pursued, cannot genuinely conflict.' He also recognized Aquinas's exceptional gifts."}, {"text": "He secured the first papal approval of Aristotle's works in the curriculum, and wrote a comprehensive refutation of the Condemnation of 1277.", "isCorrect": false, "rationale": "The Condemnation of 1277 occurred before Albert's death but there is no mention of him writing a refutation of it. Papal approval of Thomism came much later under Pope Leo XIII in 1879."}, {"text": "He founded the Dominican Order specifically to study Aristotle, and trained a generation of scholars in applying Aristotelian logic to Scripture.", "isCorrect": false, "rationale": "The Dominican Order was founded by St. Dominic, not Albert the Great. Albert was a Dominican friar, not its founder."}], "id": "q12"}, {"question": "Pope Leo XIII's 1879 encyclical *Aeterni Patris* declared that Aquinas's philosophy should be the foundation of Catholic education. What does this event reveal about the long-term trajectory of the Aristotle-Aquinas synthesis?", "options": [{"text": "It shows that the synthesis was definitively rejected by the Church in the 19th century and replaced with modern philosophy.", "isCorrect": false, "rationale": "Aeterni Patris mandated Thomism as the foundation of Catholic education — this is an affirmation, not a rejection. The encyclical marked a high point of official endorsement, not repudiation."}, {"text": "It demonstrates that Aquinas's synthesis, despite initial controversy and the 1277 condemnation, ultimately proved durable and irresistible — becoming not only dominant in its time but reaffirmed as foundational six centuries later.", "isCorrect": true, "rationale": "The text traces a trajectory: initial condemnation → Thomism becoming dominant within fifty years → irresistible influence → Pope Leo XIII's 1879 encyclical declaring it foundational. The encyclical shows the synthesis's remarkable staying power across centuries."}, {"text": "It represents the Church's attempt to resist modern science and philosophy by retreating to medieval Aristotelianism.", "isCorrect": false, "rationale": "While there was tension with modernity, the text characterizes the endorsement as reflecting Aquinas's 'influence on Christian thought' being 'if anything, greater than it had been in the medieval period' — framing it as intellectual vitality, not retreat."}, {"text": "It marks the moment when Thomism replaced Augustinianism as the official philosophy of the Church for the first time.", "isCorrect": false, "rationale": "The text does not present Aeterni Patris as Thomism replacing Augustinianism. Aquinas himself drew heavily on Augustine, and the encyclical affirmed Thomism as a synthesis that had already proven dominant over centuries."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
