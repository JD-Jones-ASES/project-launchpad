<body>
<div class="quiz-container">

        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Aquinas, how does human law ultimately derive its legitimacy and force?", "options": [{"text": "Directly from God's wisdom, bypassing natural reason.", "isCorrect": false, "rationale": "Aquinas states that human reason participates in eternal law through natural law, and human law derives from natural law, establishing a chain of derivation, not a direct bypass."}, {"text": "By participation in natural law, which itself is a participation in the eternal law.", "isCorrect": true, "rationale": "The text explicitly states: 'Human reason participates in this eternal law through natural law... and human law derives its force and legitimacy from natural law.'"}, {"text": "From the consensus of the governed, reflecting societal norms.", "isCorrect": false, "rationale": "Aquinas's framework roots law in a rational, divine order, not merely in human consensus or societal norms, which would be a pragmatic, rather than principled, foundation."}, {"text": "Through the legislative power of a ruler, regardless of divine or natural dictates.", "isCorrect": false, "rationale": "Aquinas argues that all laws, insofar as they partake of right reason, are derived from the eternal law, meaning a ruler's laws must align with this higher order to be just and legitimate."}], "id": "q01"}, {"question": "In Aquinas's framework, what is the unique role of 'natural law' in the derivation of all law from the eternal law?", "options": [{"text": "It serves as the ultimate source of all moral precepts, independent of divine wisdom.", "isCorrect": false, "rationale": "The eternal law, God's rational governance, is the ultimate source. Natural law is a *participation* in it, not an independent source."}, {"text": "It is the specific written code that God provides to guide human conduct directly.", "isCorrect": false, "rationale": "The text defines natural law as 'not a written code but an orientation of reason toward the good,' distinguishing it from specific written precepts."}, {"text": "It represents the rational creature's ability to discern basic right conduct through reason, participating in God's eternal ordering.", "isCorrect": true, "rationale": "Natural law is explicitly defined as 'The rational creature's participation in the eternal law,' through which humans discern basic precepts of right conduct by exercising reason."}, {"text": "It is solely concerned with the physical laws of the universe, not human morality.", "isCorrect": false, "rationale": "Natural law in Aquinas's context specifically refers to 'the basic precepts of right conduct' for human beings, making it deeply tied to morality and human action."}], "id": "q02"}, {"question": "Based on Aquinas's framework of law, what ultimately determines the curriculum of a 'good school'?", "options": [{"text": "The evolving needs of the job market and the preferences of the state.", "isCorrect": false, "rationale": "Aquinas explicitly contrasts his view with 'changing preferences of the market or the state,' stating that such pragmatic approaches cannot provide a stable foundation."}, {"text": "The curriculum committee's collective expertise and pedagogical trends.", "isCorrect": false, "rationale": "While expertise and trends are part of curriculum development, Aquinas's framework points to a more fundamental, unchanging determinant beyond mere convention or utility."}, {"text": "The fundamental nature of human beings as rational creatures made for truth, beauty, and goodness.", "isCorrect": true, "rationale": "The text states: 'What children ought to learn is determined, ultimately, by what they are — rational creatures made for truth, beauty, and goodness — and not by the changing preferences of the market or the state.'"}, {"text": "The historical traditions and established customs of the educational institution.", "isCorrect": false, "rationale": "Traditions can be valuable, but Aquinas argues for a foundation that is not 'a matter of mere convention or utility,' implying a deeper, objective determinant than custom."}], "id": "q03"}, {"question": "Aristotle's *phronesis*, translated by Aquinas as *prudentia*, is best described as:", "options": [{"text": "Theoretical knowledge used to understand universal, unchanging truths.", "isCorrect": false, "rationale": "The text explicitly differentiates *phronesis* from theoretical wisdom, stating it is 'directed at action in particular cases,' not universal truths."}, {"text": "The master intellectual virtue focused on discerning what is truly good and the right means to achieve it in particular actions.", "isCorrect": true, "rationale": "The definition provided is: 'Practical wisdom — the master intellectual virtue by which a person discerns what is truly good and chooses the right means to achieve it. Unlike theoretical wisdom, which grasps universal truths, phronesis is directed at action in particular cases.'"}, {"text": "A purely moral virtue concerned with following established rules of conduct.", "isCorrect": false, "rationale": "Prudence is an intellectual virtue, though it informs moral virtue. It involves discernment and choice, not just rule-following."}, {"text": "The ability to predict future events based on past experiences.", "isCorrect": false, "rationale": "While experience can inform prudence, its essence is not prediction but 'right reason applied to action' in specific circumstances to achieve a good end."}], "id": "q04"}, {"question": "How does Aquinas primarily argue against the view that prudence only extends to the good of the individual?", "options": [{"text": "By asserting that the common good is inherently subordinate to individual well-being.", "isCorrect": false, "rationale": "Aquinas explicitly states the opposite: 'it is contrary to right reason, which judges the common good to be better than the good of the individual.'"}, {"text": "By stating that individual prudence is ultimately impossible without first achieving the common good.", "isCorrect": false, "rationale": "Aquinas acknowledges a 'partial, lesser form' of prudence focused on private good, implying individual prudence is possible, just not *full* prudence without the common good."}, {"text": "By demonstrating that charity seeks not its own, and right reason judges the common good to be superior to the individual good.", "isCorrect": true, "rationale": "Aquinas refutes the individual-focused view by citing that 'this opinion is opposed to charity, which 'seeketh not her own'' and that 'it is contrary to right reason, which judges the common good to be better than the good of the individual.'"}, {"text": "By citing empirical evidence that individuals who focus only on themselves are less successful.", "isCorrect": false, "rationale": "Aquinas's argument is rooted in philosophical and theological principles (charity, right reason), not empirical observation of success."}], "id": "q05"}, {"question": "A CEO implements strategies that maximize shareholder value and company growth, but these actions lead to significant environmental damage and social inequality in the surrounding community. According to Aquinas's understanding of prudence, how would this CEO's practical wisdom be categorized?", "options": [{"text": "As a demonstration of true political prudence, as it prioritizes the success of a complex organization.", "isCorrect": false, "rationale": "Political prudence is directed to the common good of the state or kingdom. Prioritizing corporate profit at the expense of the wider community contradicts this."}, {"text": "As a complete and exemplary form of prudence, demonstrating mastery over complex financial affairs.", "isCorrect": false, "rationale": "Full prudence, for Aquinas, must be oriented toward the common good. Reasoning well about one's own (or one's company's) affairs without caring for the community is a 'partial, lesser form.'"}, {"text": "As a partial or lesser form of prudence, focused on a private good (the company's profit) rather than the common good.", "isCorrect": true, "rationale": "The text states: 'The person who reasons well about his own affairs but cares nothing for the community has not achieved full prudence — he has achieved only a partial, lesser form of it.' The company's good, distinct from the common good of the wider community, would fall into this category."}, {"text": "As an example of theoretical wisdom, not practical prudence, because it involves strategic planning.", "isCorrect": false, "rationale": "Strategic planning for a specific outcome is inherently practical. The issue is the scope and end of the 'good' being pursued, not whether it's theoretical or practical."}], "id": "q06"}, {"question": "Aquinas distinguishes different 'species' of prudence based on their ends. Which of the following accurately lists these distinctions from the text?", "options": [{"text": "Theoretical prudence, practical prudence, and artistic prudence.", "isCorrect": false, "rationale": "These are not the specific distinctions Aquinas makes for prudence based on the 'ends' of governance. Theoretical and practical prudence are broader categories of wisdom."}, {"text": "Divine prudence, natural prudence, and human prudence.", "isCorrect": false, "rationale": "These terms relate more to the different kinds of law (eternal, natural, human) or wisdom sources, rather than the species of the virtue of prudence based on its object/end."}, {"text": "Prudence simply so called (individual), domestic prudence (household), and political prudence (state/kingdom).", "isCorrect": true, "rationale": "The text states: 'Wherefore there must needs be different species of prudence corresponding to these different ends, so that one is 'prudence' simply so called, which is directed to one's own good; another, 'domestic prudence' which is directed to the common good of the home; and a third, 'political prudence,' which is directed to the common good of the state or kingdom.'"}, {"text": "Moral prudence, intellectual prudence, and cardinal prudence.", "isCorrect": false, "rationale": "Intellectual and moral prudence are broader classifications of virtues, and 'cardinal prudence' refers to prudence as one of the four cardinal virtues, not its internal species based on governance ends."}], "id": "q07"}, {"question": "Why does Aquinas consider *prudentia regnativa* (regnative prudence) to be the 'most complete and demanding form' of practical wisdom?", "options": [{"text": "Because it is primarily concerned with preserving the ruler's personal power and legacy.", "isCorrect": false, "rationale": "Regnative prudence is oriented toward governing 'an entire community directed toward the common good,' not merely the ruler's self-interest."}, {"text": "Because its scope is wider, its ends more comprehensive, and its responsibilities more demanding, governing an entire community toward the common good.", "isCorrect": true, "rationale": "The text states it is 'prudence in its most complete and demanding form, because it governs not just a single person or household but an entire community directed toward the common good.'"}, {"text": "Because it requires purely intellectual virtue, without the need for moral virtue.", "isCorrect": false, "rationale": "The text explicitly states: 'The ruler who governs well needs both moral virtue — to want the right thing — and intellectual virtue — to know how to achieve it. Neither alone suffices.'"}, {"text": "Because it focuses on the universal truths of governance, rather than specific actions.", "isCorrect": false, "rationale": "Prudence, by definition, is directed at 'action in particular cases,' and regnative prudence applies this to the complex, particular circumstances of political life."}], "id": "q08"}, {"question": "How does Aquinas's concept of natural law provide a 'stable foundation' for education that 'pure pragmatism cannot provide'?", "options": [{"text": "By ensuring that educational standards are continuously updated to meet technological advancements.", "isCorrect": false, "rationale": "Continuous updating for technological advancements is characteristic of pragmatism, which Aquinas contrasts with his stable foundation."}, {"text": "By grounding the curriculum in the unchanging nature and ultimate purpose of rational human beings, rather than transient societal or market preferences.", "isCorrect": true, "rationale": "The text states: 'Aquinas's natural law gives education a stable foundation that pure pragmatism cannot provide,' because 'What children ought to learn is determined, ultimately, by what they are — rational creatures made for truth, beauty, and goodness — and not by the changing preferences of the market or the state.'"}, {"text": "By advocating for a curriculum that prioritizes vocational training to prepare students for immediate employment.", "isCorrect": false, "rationale": "Prioritizing vocational training for immediate employment aligns with the 'utility' or 'market preferences' that Aquinas argues against as the ultimate determinant for education."}, {"text": "By establishing a centralized governmental body to dictate educational content, ensuring uniformity.", "isCorrect": false, "rationale": "While a government might use Aquinas's framework, the *stability* comes from the objective nature of man and truth, not from the act of governmental dictation itself."}], "id": "q09"}, {"question": "The objection regarding the 'law of the fomes' (proneness to sin) in the *Summa Theologica* I-II, Q. 93, Art. 3, serves what purpose in Aquinas's argument?", "options": [{"text": "It demonstrates that some laws, like the law of sin, are entirely independent of the eternal law.", "isCorrect": false, "rationale": "Aquinas's response explicitly refutes this, showing how the fomes, when considered as a punishment, *is* derived from eternal law, or when denoting proneness to sin, is 'contrary to the Divine law' and thus 'has not the nature of law.'"}, {"text": "It highlights that God's eternal law directly causes human beings to sin.", "isCorrect": false, "rationale": "Aquinas clarifies that the fomes as a 'proneness to sin' is 'contrary to the Divine law,' not caused by it. As a punishment, it results from Divine justice, but this is distinct from directly causing sin."}, {"text": "It presents a challenge to the universality of the eternal law's derivation, which Aquinas then clarifies by distinguishing aspects of the fomes.", "isCorrect": true, "rationale": "The objection directly questions whether *every* law is derived from the eternal law, citing the fomes. Aquinas addresses this by explaining the dual nature of the fomes—as a punishment derived from eternal law, or as a proneness to sin that is not truly a 'law' in the proper sense."}, {"text": "It suggests that the eternal law is only applicable to spiritual matters, not to human failings or inclinations.", "isCorrect": false, "rationale": "Aquinas's overall framework maintains that eternal law is 'the rational governance of all creation,' encompassing all aspects of reality, including human nature and its inclinations, even those that lead to sin."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
