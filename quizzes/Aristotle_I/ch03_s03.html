    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>

        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Aristotle's primary reason for laying the foundation of moral responsibility by distinguishing between voluntary and involuntary actions?", "options": [{"text": "To determine the legal penalties for criminal behavior within a community.", "isCorrect": false, "rationale": "While Aristotle notes the usefulness for legislators, the primary reason stated for those investigating virtue is to draw the distinction for moral evaluation, not solely for legal application."}, {"text": "To establish when praise and blame are appropriately assigned to a person's conduct.", "isCorrect": true, "rationale": "The text explicitly states: 'praise and blame arise upon such as are voluntary, while for the involuntary allowance is made.' This indicates the core purpose of the distinction is moral evaluation and accountability."}, {"text": "To identify actions that are performed due to external pressure or internal conflicts.", "isCorrect": false, "rationale": "Identifying external pressure (compulsion) is part of the distinction, but the ultimate goal is not merely identification, but determining moral responsibility for such actions."}, {"text": "To explain why some actions are easier to perform than others in difficult circumstances.", "isCorrect": false, "rationale": "The ease or difficulty of actions is not the focus of Aristotle's distinction between voluntary and involuntary actions for moral evaluation."}]}, {"question": "According to Aristotle's nuanced analysis, how would he categorize the action of a person who hands over their wallet to an extortionist at knifepoint, despite not wanting to give up their money?", "options": [{"text": "Wholly involuntary, because no reasonable person would choose to give up their money under such circumstances.", "isCorrect": false, "rationale": "Aristotle argues against this simple view, stating that 'what you don't want to do is involuntary' is too simplistic. He acknowledges the choice, however difficult, comes from within."}, {"text": "More like a voluntary action, because the decision to act comes from within the agent, even though there is external compulsion.", "isCorrect": true, "rationale": "The text states: 'The action comes from within him; the compulsion is external. This is why Aristotle says such actions are more like voluntary acts than involuntary ones, even though no reasonable person would choose them in ordinary circumstances.'"}, {"text": "An action that cannot be evaluated morally, as it falls into a 'borderline case' without clear responsibility.", "isCorrect": false, "rationale": "Aristotle considers these 'borderline cases' but his analysis aims to clarify responsibility, not dismiss it entirely as unevaluable."}, {"text": "Wholly voluntary, as the person ultimately makes a choice to preserve their life.", "isCorrect": false, "rationale": "Calling it 'wholly voluntary' would ignore the external compulsion and the fact that no one would choose it in ordinary circumstances. Aristotle presents a more nuanced view."}]}, {"question": "Which of the following best defines Aristotle's concept of *proairesis* (deliberate choice) as crucial for moral action?", "options": [{"text": "Acting on impulse or out of habit, provided the action has a positive outcome.", "isCorrect": false, "rationale": "The text states that *proairesis* 'distinguishes moral action from mere impulse or habit.'"}, {"text": "Performing an action that appears virtuous to observers, regardless of the agent's internal reasoning.", "isCorrect": false, "rationale": "Aristotle insists that 'it is not enough to do the right thing; one must do it by choosing to do it, for the right reasons.' External appearance is insufficient."}, {"text": "A specific act of will that involves rational deliberation about what is good and a genuine commitment to acting on that deliberation.", "isCorrect": true, "rationale": "The definition provided in the text states: '*proairesis* is the specific act of will that produces virtuous or vicious action. It involves both rational deliberation about what is good and a genuine commitment to acting on that deliberation.'"}, {"text": "Any action that a person could have done otherwise, demonstrating free will.", "isCorrect": false, "rationale": "While 'could have done otherwise' is part of voluntary action, *proairesis* specifically adds the elements of rational deliberation and genuine commitment for *moral* action."}]}, {"question": "Aristotle examines courage as a 'paradigm case' among the virtues. What central aspect of his theory of virtue does courage best illustrate?", "options": [{"text": "That some virtues are inherently more important than others for a good life.", "isCorrect": false, "rationale": "While justice is called the 'most complete,' calling courage a 'paradigm case' refers to its illustrative power for the structure of virtue, not its overall rank."}, {"text": "The idea that every virtue represents a mean between two extreme vices: an excess and a deficiency.", "isCorrect": true, "rationale": "The text states that courage 'is the virtue that most obviously faces the question of excess and deficiency: we can all recognize the extremes of the coward (who fears too much) and the reckless fool (who fears too little).' This demonstrates the core concept of the mean."}, {"text": "That virtues are primarily concerned with actions involving physical danger and death.", "isCorrect": false, "rationale": "Courage specifically deals with fear and death, but this is not a general characteristic of *all* virtues, which concern various spheres of feeling and action."}, {"text": "The principle that all virtues are acquired through experience and habituation.", "isCorrect": false, "rationale": "While habituation is part of acquiring virtues, the text highlights courage as a paradigm for demonstrating the 'mean' concept, not the method of acquisition."}]}, {"question": "According to the primary source text, what is the specific object-matter of the Brave man, in the proper sense of the term?", "options": [{"text": "Fearlessness in facing evils of all kinds, such as poverty, disease, or disgrace.", "isCorrect": false, "rationale": "The text states that while we fear these, 'being fearless in respect of these would not constitute a man Brave in the proper sense of the term.'"}, {"text": "Being bold when going to be scourged or enduring any kind of suffering without complaint.", "isCorrect": false, "rationale": "The text explicitly states: 'nor is he a Brave man for being bold when going to be scourged.'"}, {"text": "Fearlessness in respect of honourable death, especially in situations that arise in the course of war.", "isCorrect": true, "rationale": "The text states: 'He then may be most properly denominated Brave who is fearless in respect of honourable death and such sudden emergencies as threaten death; now such specially are those which arise in the course of war.'"}, {"text": "Courageous behavior in situations where one can do something to help oneself, regardless of the situation's honor.", "isCorrect": false, "rationale": "While 'admit of doing something to help one’s self' is mentioned, it's paired with 'death would be honourable,' emphasizing the importance of honor, which is absent here."}]}, {"question": "A soldier stands firm in battle. Which of the following motivations, if it were the *sole* driver of his action, would Aristotle *least likely* consider genuine courage?", "options": [{"text": "He has rationally deliberated that death in a noble cause for his community is something worth facing.", "isCorrect": false, "rationale": "This aligns perfectly with Aristotle's description of genuine courage, which involves rational deliberation and acting for the sake of the honorable."}, {"text": "He is driven primarily by the fear of being shamed or disgraced by his peers if he retreats.", "isCorrect": true, "rationale": "The text explicitly states that a man driven by 'fear of shame' is a counterfeit of courage, noting that such reasons 'are not the same thing' as genuine virtue, even if the behavior looks identical externally."}, {"text": "He acts from a stable disposition to do what is honorable and right, despite experiencing fear.", "isCorrect": false, "rationale": "This describes a virtuous character acting from a stable disposition, which is central to Aristotle's concept of virtue."}, {"text": "He has carefully weighed the dangers and determined, based on 'right reason,' that standing firm is the proper course of action.", "isCorrect": false, "rationale": "Acting 'as right reason may direct, with a view to what is honourable' is a key component of genuine courage."}]}, {"question": "Aristotle states that the Brave man 'will fear such things indeed... but he will stand up against them as he ought.' What does this imply about the relationship between fear and courage?", "options": [{"text": "A truly courageous person experiences no fear whatsoever.", "isCorrect": false, "rationale": "The text explicitly contradicts this by stating the Brave man 'will fear such things indeed,' indicating that fear is present."}, {"text": "Courage is not the absence of fear, but the proper regulation of fear, enabling one to act as reason directs for what is honorable.", "isCorrect": true, "rationale": "This statement accurately reflects Aristotle's nuanced view that courage involves facing fear appropriately, as guided by right reason and with a noble motive, rather than being fearless."}, {"text": "Fear is a vice that courageous individuals must entirely overcome through willpower.", "isCorrect": false, "rationale": "Aristotle sees fear as a feeling, and virtue as regulating feelings, not eliminating them. The vice is fearing too much or too little, or the wrong things."}, {"text": "The presence of any fear invalidates an action as truly courageous.", "isCorrect": false, "rationale": "This is incorrect; the text shows that a courageous person *does* feel fear but acts appropriately despite it."}]}, {"question": "In his analysis of courage, Aristotle identifies specific characters that represent the excess and deficiency of this virtue. Which pair correctly identifies these extremes?", "options": [{"text": "Rashness (excess) and cowardice (deficiency).", "isCorrect": true, "rationale": "The text states: 'He again who exceeds in confidence in respect of things fearful is rash.' And 'The man moreover who exceeds in feeling fear is a coward.' This directly matches the excess and deficiency."}, {"text": "Recklessness (deficiency) and timidity (excess).", "isCorrect": false, "rationale": "This mislabels the deficiency and excess; recklessness is an excess, and timidity is a form of deficiency, but the labels are inverted in the question relative to the text's specific terms."}, {"text": "Overconfidence (deficiency) and foolhardiness (excess).", "isCorrect": false, "rationale": "These are not the specific terms Aristotle uses for the deficiency and excess in this context, although 'foolhardiness' is similar to rashness. The text explicitly uses 'rash' and 'coward'."}, {"text": "Boldness (excess) and hesitation (deficiency).", "isCorrect": false, "rationale": "While related concepts, 'boldness' is the domain of courage, and 'hesitation' is a characteristic of a coward, but the specific vices named are 'rashness' and 'cowardice.'"}]}, {"question": "Aristotle regards justice as the 'most complete of all virtues.' What is his primary reason for this elevated status?", "options": [{"text": "It is the easiest virtue to acquire through early childhood education and habituation.", "isCorrect": false, "rationale": "The text does not mention ease of acquisition as the reason for its completeness, and justice, being complex, is not necessarily the easiest to acquire."}, {"text": "It involves a perfectly balanced mean between too much and too little personal wealth.", "isCorrect": false, "rationale": "This describes a different virtue, perhaps generosity or magnificence. Justice, for Aristotle, is about fairness and right relations with others, not primarily personal wealth."}, {"text": "It is the one virtue that we exercise not for our own benefit but for the benefit of others.", "isCorrect": true, "rationale": "The text explicitly states justice is the 'most complete of all, because it is the one we exercise not for our own benefit but for the benefit of others.'"}, {"text": "It primarily concerns legal concepts and strict adherence to established laws.", "isCorrect": false, "rationale": "The text clarifies that 'for Aristotle, justice was not merely a legal concept but the master virtue of social life,' implying a broader scope than just laws."}]}, {"question": "Considering Aristotle's overall approach to moral responsibility and virtue, which statement best synthesizes his view on evaluating moral character?", "options": [{"text": "The external outcome of an action is the sole determinant of its moral value, regardless of intention.", "isCorrect": false, "rationale": "The text explicitly states: 'Aristotle insists that the reasons for one's actions matter, not just their external form.' This contradicts focusing solely on outcomes."}, {"text": "Moral evaluation primarily depends on whether an action aligns with societal laws and expectations, as these reflect the common good.", "isCorrect": false, "rationale": "While societal laws are important, Aristotle's focus is on the agent's internal state, deliberation, and motives. He distinguishes genuine virtue from actions merely conforming to external standards."}, {"text": "True virtue requires actions to be chosen deliberately (*proairesis*), for the right reasons, reflecting a stable disposition of character that aims at the honorable.", "isCorrect": true, "rationale": "This statement synthesizes key Aristotelian concepts: the importance of deliberate choice (*proairesis*), acting for 'right reasons,' developing a 'stable disposition' (virtue), and aiming at 'what is honourable' (the end of virtue)."}, {"text": "Intense emotional states, such as extreme fear or desire, always excuse an individual from moral responsibility.", "isCorrect": false, "rationale": "Aristotle argues that while emotions are involved, virtue is about regulating them. The courageous person still feels fear but acts rightly. Only compulsion or ignorance, under specific conditions, can excuse responsibility for involuntary actions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
