    };

<body>
<div class="quiz-container">

        <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In Aristotle's analysis of moral responsibility, why is the student who carefully plans to cheat considered more 'virtuous' or 'vicious' than the one who cheats in a panic?", "options": [{"text": "The action is a product of a settled proairesis (${\\pi\\rho\\omicron\\alpha\\acute{\\iota}\\rho\\epsilon\\sigma\\iota\\varsigma}$), or deliberate choice.", "isCorrect": true, "rationale": "Virtue and vice are grounded in deliberate choice involving both reason and will, rather than impulsive reactions."}, {"text": "The student who panics is acting out of ignorance of the examination's rules.", "isCorrect": false, "rationale": "Aristotle distinguishes between ignorance of particular circumstances and ignorance of moral principles; the student likely knows cheating is wrong."}, {"text": "The planned act demonstrates a higher level of intellectual virtue, even if used for a bad end.", "isCorrect": false, "rationale": "While planning involves reason, the moral evaluation of character depends on the alignment of choice with a good end, not just the complexity of the plan."}, {"text": "The outward act of cheating is identical, so Aristotle would actually judge their characters as equally implicated.", "isCorrect": false, "rationale": "Aristotle specifically argues that the internal state and choice of the agent are what implicate character, even if the outward action is the same."}], "id": "q01"}, {"question": "Which of the following conditions must be met for an action to be considered 'involuntary' according to the Ethics?", "options": [{"text": "The agent acts in ignorance of the particular circumstances of the situation.", "isCorrect": true, "rationale": "Aristotle allows that ignorance of particulars, such as who is being affected or what instrument is being used, renders an act involuntary."}, {"text": "The agent acts in ignorance of universal moral principles or the law.", "isCorrect": false, "rationale": "Ignorance of moral principles does not excuse an agent or make an act involuntary; it is often seen as a sign of a vicious character."}, {"text": "The agent performs an action they find unpleasant or regrettable under pressure.", "isCorrect": false, "rationale": "Actions done under extortion or to avoid a greater evil are considered 'mixed' but more akin to voluntary acts because the moving principle is in the agent."}, {"text": "The agent acts out of a sudden, uncontrollable emotional impulse like anger or desire.", "isCorrect": false, "rationale": "Aristotle classifies acts of passion as voluntary because they originate within the agent's own nature as a human being."}], "id": "q02"}, {"question": "Aristotle argues that courage (${\\alpha\\nu\\delta\\rho\\epsilon\\acute{\\iota}\\alpha}$) is a mean primarily concerned with which specific sphere?", "options": [{"text": "The fear of an honorable death, specifically in the context of war.", "isCorrect": true, "rationale": "While many things are fearful, Aristotle identifies the greatest fear—death in battle—as the primary domain where true courage is tested and displayed."}, {"text": "The fear of social disgrace or losing one's reputation in the community.", "isCorrect": false, "rationale": "Aristotle notes that while fearing disgrace is noble, it characterizes the man of honor rather than the 'brave' man in the strict sense."}, {"text": "The total absence of fear in the face of all natural disasters, such as earthquakes.", "isCorrect": false, "rationale": "A total absence of fear is described as a form of madness or 'rashness' rather than the virtuous mean of courage."}, {"text": "The endurance of physical pain during sickness or accidents like drowning.", "isCorrect": false, "rationale": "Aristotle distinguishes these from courage because they often do not involve the opportunity for honorable action or self-defense."}], "id": "q03"}, {"question": "Why does Aristotle categorize justice (${\\delta\\iota\\kappa\\alpha\\iota\\omicron\\sigma\\acute{\\upsilon}\\nu\\eta}$) as 'complete virtue'?", "options": [{"text": "It is essentially relational and concerns how one's virtue is exercised toward others.", "isCorrect": true, "rationale": "Unlike other virtues that may only benefit the agent's soul, justice is the 'master virtue' because it directs all virtuous action toward the common good."}, {"text": "It is the only virtue that does not have an excess or a deficiency.", "isCorrect": false, "rationale": "Justice does have extremes (the unlawful and the unequal), though its mean is calculated differently than individual moral virtues."}, {"text": "It is the intellectual virtue that enables the discovery of the mean in all other spheres.", "isCorrect": false, "rationale": "This describes phronesis (${\\phi\\rho\\acute{\\omicron}\\nu\\eta\\sigma\\iota\\varsigma}$), or practical wisdom, rather than the moral virtue of justice."}, {"text": "It ensures that every citizen in a community receives an exactly equal share of all goods.", "isCorrect": false, "rationale": "Aristotle's distributive justice is based on proportion and merit rather than strict numerical equality for all."}], "id": "q04"}, {"question": "In the context of distributive justice, what is the 'arithmetic' approach associated with?", "options": [{"text": "Corrective justice, which seeks to restore equality after a wrong is committed regardless of person.", "isCorrect": true, "rationale": "Corrective justice treats parties as equals and uses an arithmetic mean to strip away illegitimate gain and compensate for loss."}, {"text": "Natural justice, which is unchangeable and holds the same force everywhere.", "isCorrect": false, "rationale": "Natural justice refers to the source of the principle (${\\phi\\acute{\\upsilon}\\sigma\\iota\\varsigma}$) rather than the mathematical method of calculation."}, {"text": "The allocation of honors and offices based on a person's contribution to the state.", "isCorrect": false, "rationale": "Allocating goods based on merit is part of distributive justice and uses a geometric or proportionate calculation."}, {"text": "The modern concept of redistributive taxation to benefit the least advantaged.", "isCorrect": false, "rationale": "Aristotle's distributive justice is concerned with merit-based allocation, not modern economic redistribution."}], "id": "q05"}, {"question": "According to Thomas Aquinas, what distinguishes 'infused' virtues from 'acquired' virtues?", "options": [{"text": "Infused virtues are worked in us by God without our effort and direct us toward a supernatural end.", "isCorrect": true, "rationale": "Aquinas adds a theological layer where certain virtues, like faith or charity, are gifts of grace rather than habits formed by repetition."}, {"text": "Infused virtues are the cardinal virtues while acquired virtues are the theological virtues.", "isCorrect": false, "rationale": "The theological virtues are infused, while the cardinal virtues can be both acquired by reason and infused by grace."}, {"text": "Infused virtues are those we are born with naturally, such as basic instincts.", "isCorrect": false, "rationale": "Virtues, for both Aristotle and Aquinas, are not innate instincts but stable dispositions (hexeis/habitus) that must be developed."}, {"text": "Acquired virtues are based on law (${\\nu\\acute{\\omicron}\\mu\\omicron\\varsigma}$), whereas infused virtues are based on nature (${\\phi\\acute{\\upsilon}\\sigma\\iota\\varsigma}$).", "isCorrect": false, "rationale": "Acquired virtues are developed through human effort and reason; infused virtues come from divine intervention."}], "id": "q06"}, {"question": "How does Aquinas refine Aristotle's doctrine of the mean in the Summa Theologica?", "options": [{"text": "He distinguishes between a 'real mean' (in things) and a 'rational mean' (relative to us and reason).", "isCorrect": true, "rationale": "This allows Aquinas to explain how justice can be an 'extreme' in its conformity to reason while remaining a 'mean' in its matter."}, {"text": "He argues that theological virtues like faith also follow a mean between excess and deficiency.", "isCorrect": false, "rationale": "Theological virtues, having God as their object, do not admit of a mean; one cannot have 'too much' faith or charity."}, {"text": "He rejects the mean entirely for moral virtues, replacing it with the standard of divine command.", "isCorrect": false, "rationale": "Aquinas 'baptizes' Aristotle's ethics, meaning he keeps the structure of the mean but situates it within a theological framework."}, {"text": "He claims the mean is a fixed mathematical midpoint that applies to all people regardless of circumstances.", "isCorrect": false, "rationale": "Aquinas follows Aristotle in emphasizing that the mean is determined by reason and is relative to the individual's situation."}], "id": "q07"}, {"question": "Which cardinal virtue is responsible for curbing passions that incite a person to act against reason?", "options": [{"text": "Temperance (${\\sigma\\omega\\phi\\rho\\omicron\\sigma\\acute{\\upsilon}\\nu\\eta}$)", "isCorrect": true, "rationale": "Temperance acts as a curb on the concupiscible faculty, moderating appetites for pleasure."}, {"text": "Fortitude (${\\alpha\\nu\\delta\\rho\\epsilon\\acute{\\iota}\\alpha}$)", "isCorrect": false, "rationale": "Fortitude strengthens the soul against passions like fear that withdraw us from reason, rather than curbing passions that incite us toward excess."}, {"text": "Prudence (${\\phi\\rho\\acute{\\omicron}\\nu\\eta\\sigma\\iota\\varsigma}$)", "isCorrect": false, "rationale": "Prudence is the intellectual virtue that directs and informs the other virtues, but is not the specific 'curb' itself."}, {"text": "Justice (${\\delta\\iota\\kappa\\alpha\\iota\\omicron\\sigma\\acute{\\upsilon}\\nu\\eta}$)", "isCorrect": false, "rationale": "Justice directs the will toward the rights of others rather than moderating internal passions."}], "id": "q08"}, {"question": "Aristotle's concept of 'natural justice' (${\\phi\\acute{\\upsilon}\\sigma\\iota\\varsigma}$) suggests that:", "options": [{"text": "There are principles of justice that have the same force everywhere, even if their application varies.", "isCorrect": true, "rationale": "Aristotle acknowledges a standard of justice that transcends local customs (${\\nu\\acute{\\omicron}\\mu\\omicron\\varsigma}$), forming the basis for the natural law tradition."}, {"text": "Justice is entirely a matter of convention and can be changed by any legislative decree.", "isCorrect": false, "rationale": "This view is explicitly criticized by Aristotle; he distinguishes between what is just by convention and what is just by nature."}, {"text": "Natural justice is rigid and unchangeable in every possible circumstance, like the laws of physics.", "isCorrect": false, "rationale": "Aristotle notes that natural justice can 'change' in its application to different circumstances, even though the principles remain valid."}, {"text": "Laws such as the specific price of a ransom or the type of animal to be sacrificed are part of natural justice.", "isCorrect": false, "rationale": "Aristotle uses these specific examples to illustrate 'conventional' or 'legal' justice, which could be decided one way or another."}], "id": "q09"}, {"question": "What is the primary difference between Aristotle's 'distributive justice' and modern 'redistributive justice'?", "options": [{"text": "Aristotle focuses on the initial allocation of shared goods based on merit, not taking resources from some to give to others.", "isCorrect": true, "rationale": "Aristotle is concerned with how a community divides honors and offices proportionately among its members based on their worth or contribution."}, {"text": "Aristotle's distributive justice aims for an equality of outcome across all social classes.", "isCorrect": false, "rationale": "Aristotle's system is based on 'proportionate equality,' which means people receive different amounts based on their different merits."}, {"text": "Modern redistributive justice is based on geometric proportion, while Aristotle's is arithmetic.", "isCorrect": false, "rationale": "Aristotle's distributive justice uses geometric proportion (merit-based); corrective justice uses arithmetic (restoration of balance)."}, {"text": "Aristotle argues that the least advantaged should always receive the largest share of civic honors.", "isCorrect": false, "rationale": "Aristotle's distributive justice awards the most to those who contribute the most to the community's virtuous goals."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
