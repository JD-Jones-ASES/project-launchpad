<script>
var QUESTIONS = [{"question": "How did Thomas Aquinas primarily engage with Aristotle's pagan philosophy when writing the Summa Theologica?", "options": [{"text": "He rejected it as a corrupting influence on Christian doctrine.", "isCorrect": false, "rationale": "The text explicitly states that Aquinas's response was 'not to reject Aristotle' but to 'baptize him,' indicating he did not see it as solely corrupting."}, {"text": "He integrated it by showing that reason's truths confirm faith, and faith completes reason.", "isCorrect": true, "rationale": "The text states Aquinas's approach was 'to show that what Aristotle got right by reason was confirmed by faith, and that what faith adds completes rather than contradicts what reason achieves.'"}, {"text": "He selectively adopted parts that aligned with Christian teaching, discarding the rest.", "isCorrect": false, "rationale": "While there was selection, the core of his approach was an integration and harmonization — confirmation and completion rather than mere discarding."}, {"text": "He presented it as a separate, parallel system of thought, not intermingling it with theology.", "isCorrect": false, "rationale": "Aquinas's work is characterized by a 'great synthesis' and an integration of Aristotle's ideas 'within a new theological context,' indicating active intermingling rather than separation."}], "id": "q01"}, {"question": "Aquinas adopted Aristotle's concept of '$hexis$' and transformed it into '$habitus$.' What is the most significant additional dimension Aquinas brought to this definition of virtue?", "options": [{"text": "Virtue is primarily about intellectual excellence rather than moral character.", "isCorrect": false, "rationale": "While intellectual virtues are important, Aquinas, like Aristotle, emphasized moral character. His addition was about the ultimate purpose, not a shift to pure intellect."}, {"text": "Virtue is a fleeting mood or occasional tendency, easily changed.", "isCorrect": false, "rationale": "The text explicitly states that a hexis (and thus habitus) 'is not a fleeting mood or an occasional tendency but a deep, reliable orientation of the soul.'"}, {"text": "Virtue enables one to act, feel, and choose well for life in the earthly city and opens toward a supernatural end.", "isCorrect": true, "rationale": "The text highlights Aquinas's 'crucial dimension' that 'virtue does not merely fit us for life in the earthly city. The virtues, rightly ordered, open us toward our final supernatural end.'"}, {"text": "Virtue is an innate quality bestowed at birth, not something developed.", "isCorrect": false, "rationale": "Virtues, whether acquired or infused, are stable dispositions developed or given, not innate qualities present from birth."}], "id": "q02"}, {"question": "In his Summa Theologica, Aquinas defines virtue as 'a good quality of the mind, by which we live righteously, of which no one can make bad use, which God works in us, without us.' Which part of this definition explicitly addresses the efficient cause of infused virtue?", "options": [{"text": "'a good quality of the mind'", "isCorrect": false, "rationale": "This phrase addresses the formal cause (genus and difference) and the subject of virtue, not the efficient cause."}, {"text": "'by which we live righteously'", "isCorrect": false, "rationale": "This phrase distinguishes virtue from habits referred to evil, focusing on the end or effect of virtue."}, {"text": "'of which no one can make bad use'", "isCorrect": false, "rationale": "This phrase distinguishes virtue from habits that can sometimes be directed to evil, focusing on the consistent good of virtue."}, {"text": "'which God works in us, without us'", "isCorrect": true, "rationale": "The text explicitly states: 'Lastly, God is the efficient cause of infused virtue, to which this definition applies; and this is expressed in the words \"which God works in us without us.\"'"}], "id": "q03"}, {"question": "The tradition of the four cardinal virtues — prudence, justice, fortitude, and temperance — is discussed in the text. Which statement best describes their origin and Aquinas's role?", "options": [{"text": "Aquinas invented these four virtues as entirely new concepts within Christian theology.", "isCorrect": false, "rationale": "The text states that this tradition 'predates Aquinas; it can be found in Plato's Republic and is given a particularly influential form by Cicero.'"}, {"text": "These virtues originated solely in medieval Christian thought and were later adopted by classical philosophers.", "isCorrect": false, "rationale": "The text clearly indicates their origin in classical philosophy before Aquinas, not solely in medieval Christian thought."}, {"text": "They predated Aquinas, found in classical philosophy like Plato's, and Aquinas integrated them with Aristotle's analysis and Christian theology.", "isCorrect": true, "rationale": "The text explains that the tradition predates Aquinas and that 'it is Aquinas who most fully integrates this ancient scheme with Aristotle's more detailed analysis and with Christian theology.'"}, {"text": "They are distinct from Aristotle's virtues and were never successfully integrated into a broader philosophical system until modern times.", "isCorrect": false, "rationale": "Aquinas's work is presented as a successful and influential integration of these virtues into a comprehensive philosophical and theological system."}], "id": "q04"}, {"question": "The term 'cardinal' for prudence, justice, fortitude, and temperance comes from the Latin '$cardo$,' meaning 'hinge.' This signifies that:", "options": [{"text": "These virtues are only relevant in specific, pivotal moments of decision-making.", "isCorrect": false, "rationale": "While important in decisions, the text implies a broader foundational role, stating they are the 'hinges on which the whole moral life turns,' not just specific moments."}, {"text": "They are the foundational virtues upon which the entire moral life depends and revolves.", "isCorrect": true, "rationale": "The text explicitly states: 'These four virtues are the hinges on which the whole moral life turns. Every other moral virtue is either one of these four or a species or extension of them.'"}, {"text": "They are virtues that are flexible and can easily be exchanged for other virtues depending on the situation.", "isCorrect": false, "rationale": "The idea of a 'hinge' suggests stability and essential support, not interchangeability."}, {"text": "They are primarily intellectual virtues that help us understand the structure of the universe.", "isCorrect": false, "rationale": "While prudence is intellectual, the cardinal virtues collectively encompass moral life and practical action, not solely theoretical understanding of the universe."}], "id": "q05"}, {"question": "A person consistently faces difficult moral dilemmas, accurately assesses risks, and makes decisions that lead to the best possible outcomes for all involved, demonstrating sound practical judgment. According to Aquinas and the classical tradition, which cardinal virtue is this person primarily exhibiting?", "options": [{"text": "Justice", "isCorrect": false, "rationale": "Justice is about giving each person what is due, not primarily about discerning the right action or assessing risks in a practical sense."}, {"text": "Fortitude", "isCorrect": false, "rationale": "Fortitude is courage in the face of danger or difficulty, not the virtue of practical judgment itself."}, {"text": "Temperance", "isCorrect": false, "rationale": "Temperance is the moderation of appetite and pleasure, unrelated to practical judgment in dilemmas."}, {"text": "Prudence", "isCorrect": true, "rationale": "The text defines Prudence as 'Practical wisdom; the intellectual virtue that enables us to discern the right action in particular circumstances,' which perfectly aligns with the scenario described."}], "id": "q06"}, {"question": "According to Aquinas, what is the fundamental difference between the cardinal virtues (prudence, justice, fortitude, temperance) and the theological virtues (faith, hope, charity)?", "options": [{"text": "Cardinal virtues are only for life in the earthly city, while theological virtues apply solely to the afterlife.", "isCorrect": false, "rationale": "While cardinal virtues prepare us for the earthly city, Aquinas connects them to the supernatural end as well, and theological virtues are exercised in this life toward God."}, {"text": "Cardinal virtues are infused by grace, whereas theological virtues are developed through natural effort.", "isCorrect": false, "rationale": "This statement reverses the correct distinction. Theological virtues are infused by grace, and cardinal virtues, while they can be infused, also pertain to natural capacities developed by effort."}, {"text": "Cardinal virtues perfect natural human capacities, while theological virtues are infused by grace and elevate humans toward God's supernatural end.", "isCorrect": true, "rationale": "The text states: 'The cardinal virtues perfect our natural capacities; the theological virtues elevate us toward God.' It also notes theological virtues are 'infused by grace and direct us toward our supernatural end.'"}, {"text": "Cardinal virtues are primarily intellectual, while theological virtues are primarily moral.", "isCorrect": false, "rationale": "Prudence is intellectual, but justice, fortitude, and temperance are moral. Theological virtues have both intellectual and volitional aspects but are distinct by their source and end."}], "id": "q07"}, {"question": "Aquinas refines Aristotle's concept of the 'mean of virtue.' What is Aquinas's key clarification regarding this mean?", "options": [{"text": "The mean of virtue is always a strict quantitative midpoint between two extremes.", "isCorrect": false, "rationale": "The text explicitly states Aquinas 'refines the analysis in important ways. The mean of virtue is not simply a quantitative midpoint.'"}, {"text": "The mean of virtue is determined by cultural norms and varies widely between societies.", "isCorrect": false, "rationale": "Aquinas bases the mean on 'reason,' which suggests a more universal standard than mere cultural norms."}, {"text": "The mean of virtue is the 'point of reason,' defined by what right reason requires, not merely a quantitative midpoint.", "isCorrect": true, "rationale": "The text clearly states: 'The mean of virtue is not simply a quantitative midpoint; it is the point of reason, determined by what right reason requires.'"}, {"text": "The mean of virtue is irrelevant for intellectual virtues, only applying to moral virtues.", "isCorrect": false, "rationale": "While the discussion focuses on moral virtues, the principle of reason's role applies broadly to good functioning."}], "id": "q08"}, {"question": "The text states that according to Aquinas, you cannot be 'too just' or 'too prudent.' What is the reason for this apparent exception to the 'mean' concept?", "options": [{"text": "Justice and prudence are intellectual virtues, not moral virtues, and thus don't adhere to the mean.", "isCorrect": false, "rationale": "Justice is a moral virtue. Both, however, are guided by reason, and the mean concept applies to all moral virtues."}, {"text": "These virtues are uniquely divine in nature and therefore limitless in their application.", "isCorrect": false, "rationale": "While they relate to higher ends, their boundlessness in application comes from their definition by reason, not solely a divine nature."}, {"text": "They are defined by what reason requires, and reason itself sets the proper bounds, making 'excess' logically impossible within their definition.", "isCorrect": true, "rationale": "The text explains: 'you cannot be \"too just\" or \"too prudent,\" because justice and prudence are defined by what reason requires, not by some scale of more or less.'"}, {"text": "Being 'too just' or 'too prudent' would contradict divine law, which is separate from natural reason.", "isCorrect": false, "rationale": "Aquinas integrates reason and faith; divine law would align with what reason requires, not contradict it as a separate limitation."}], "id": "q09"}, {"question": "An individual believes that living a virtuous life means perfectly aligning their actions with rational principles, focusing on societal harmony and personal well-being within the human community. Aquinas would likely assert that this perspective is incomplete because it overlooks:", "options": [{"text": "The necessity of developing intellectual virtues before moral virtues.", "isCorrect": false, "rationale": "While intellectual virtues like prudence are crucial, Aquinas's most significant addition was not this order, but the ultimate end of virtue."}, {"text": "The ultimate supernatural end of human existence and God's role as the final cause.", "isCorrect": true, "rationale": "The text states that for Aquinas, the question 'what is virtue?' cannot be answered without 'eventually asking \"for what ultimate end?\"' — and for Aquinas, that end transcends anything the Ethics envisions."}, {"text": "The importance of passions and emotions in determining virtuous action.", "isCorrect": false, "rationale": "Aquinas acknowledges the role of passions but this is not the primary incompleteness he would identify in a purely rational, earthly-focused view."}, {"text": "The historical development of virtue theory from Plato through Cicero.", "isCorrect": false, "rationale": "While Aquinas engaged with this history, omitting it doesn't make a virtuous life incomplete in his philosophical sense; it's the purpose or end that's critical."}], "id": "q10"}, {"question": "Aquinas defines justice as 'the perpetual and constant will to render to each one his right.' Why does Aquinas use the word 'will' in this definition rather than, say, 'disposition' or 'habit'?", "options": [{"text": "Because justice is exclusively an act of the will and has no connection to stable character.", "isCorrect": false, "rationale": "Aquinas explicitly clarifies that 'will here denotes the act, not the power' — and the definition still implies a habit (habitus), as writers customarily define habits by their acts."}, {"text": "Because the act of justice must be voluntary, constant, and firm — qualities that the word 'will' signals in the definition.", "isCorrect": true, "rationale": "The text explains: 'The definition of justice mentions first the \"will,\" in order to show that the act of justice must be voluntary; and mention is made afterwards of its \"constancy\" and \"perpetuity\" in order to indicate the firmness of the act.'"}, {"text": "Because Aquinas rejected Aristotle's concept of hexis and replaced it with a purely voluntarist account.", "isCorrect": false, "rationale": "On the contrary, the text shows Aquinas embracing and refining Aristotle's hexis/habitus concept throughout — he did not reject it."}, {"text": "Because justice is the only virtue that involves the will, while all other virtues involve the intellect.", "isCorrect": false, "rationale": "The text locates justice in the will as its subject, but other virtues involve other faculties (e.g., temperance in the concupiscible, fortitude in the irascible) — not all in the intellect."}], "id": "q11"}, {"question": "John Rawls's 'veil of ignorance' thought experiment is described as 'in some ways deeply un-Aristotelian.' What specific feature makes it contrary to Aristotle's approach?", "options": [{"text": "Rawls focuses on happiness, while Aristotle focuses on justice.", "isCorrect": false, "rationale": "It is the reverse: Aristotle focuses broadly on eudaimonia including justice, while Rawls focuses specifically on justice. But this is not the un-Aristotelian feature identified in the text."}, {"text": "Rawls abstracts from the concrete human community, whereas Aristotle regards actual community as the natural context for justice.", "isCorrect": true, "rationale": "The text states Rawls's theory 'abstracts from the concrete human community that Aristotle regards as the natural context for justice, and it is indifferent to the virtue or merit of the parties' — these are the specifically un-Aristotelian features."}, {"text": "Rawls believes in a single universal standard of justice, while Aristotle holds that justice varies by culture.", "isCorrect": false, "rationale": "In fact, Aristotle does assert natural justice that holds 'everywhere,' while Rawls's theory is also universalist in intent. The specific contrast is about method and context, not universalism vs. relativism."}, {"text": "Rawls requires virtue as a precondition for choosing just principles, while Aristotle does not.", "isCorrect": false, "rationale": "It is precisely the opposite: Rawls is 'indifferent to the virtue or merit of the parties,' which is the un-Aristotelian feature. Aristotle would care greatly about virtue and merit."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
