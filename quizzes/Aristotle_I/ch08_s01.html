<script>
var QUESTIONS = [{"question": "According to Aristotle in The Ethics, what is the primary characteristic of *eudaimonia*, or happiness?", "options": [{"text": "A state of intense pleasure and contentment that is passively received.", "isCorrect": false, "rationale": "Aristotle explicitly states that happiness (eudaimonia) is not understood as a feeling or a passive condition, but as a way of living and acting well."}, {"text": "An activity of the soul in accordance with virtue, requiring virtuous character.", "isCorrect": true, "rationale": "The text directly states: 'Happiness is an activity of the soul in accordance with virtue, not a passive condition. This means that happiness requires virtuous character...'"}, {"text": "The accumulation of external comforts and wealth, ensuring a life free from hardship.", "isCorrect": false, "rationale": "Aristotle argues that 'The wealthy person who has every external comfort but no virtue is not, on Aristotle's account, truly happy.' Happiness is not primarily about external circumstances."}, {"text": "A natural gift bestowed upon certain individuals at birth, independent of effort.", "isCorrect": false, "rationale": "Aristotle contends that 'character is not a gift but an achievement, and the achievement depends on sustained effort over time,' implying happiness, which requires virtue, is also an achievement."}], "id": "q01"}, {"question": "Aristotle's view on the acquisition of virtue emphasizes that character is primarily:", "options": [{"text": "A natural endowment, inherent from birth and unchangeable.", "isCorrect": false, "rationale": "The text states, 'character is not a gift but an achievement,' directly refuting the idea of it being an inherent endowment."}, {"text": "Formed instantaneously through a single heroic act or significant decision.", "isCorrect": false, "rationale": "The text clarifies, 'No single heroic act makes a person virtuous, nor does a single failure destroy a character already formed,' emphasizing sustained effort over time."}, {"text": "Developed through habitual practice and sustained effort, making the right response second nature.", "isCorrect": true, "rationale": "The text explains: 'Virtue itself... is a stable disposition of character acquired through habitual practice. We become courageous by doing courageous things... until the right response becomes second nature.'"}, {"text": "Achieved solely through intellectual knowledge of moral principles, without the need for action.", "isCorrect": false, "rationale": "One of the enduring insights is that 'character is formed by repeated action, not by knowledge alone or good intentions alone,' highlighting the importance of practice over mere knowledge."}], "id": "q02"}, {"question": "How does *phronesis* (practical wisdom) relate to the doctrine of the mean in Aristotle's ethical framework?", "options": [{"text": "Phronesis is the virtue that ensures one always chooses the most extreme option to demonstrate courage.", "isCorrect": false, "rationale": "Phronesis helps avoid extremes; the doctrine of the mean is about finding the right measure between excess and deficiency."}, {"text": "It is a stable disposition that dictates universal, unchanging moral rules for all situations.", "isCorrect": false, "rationale": "The text states phronesis is 'the cultivated capacity for good judgment in particular situations,' implying context-dependency rather than universal rules."}, {"text": "Phronesis is the intellectual capacity to discern the right measure (the mean) in specific, practical circumstances.", "isCorrect": true, "rationale": "The text explicitly defines phronesis as 'practical wisdom — the cultivated capacity for good judgment in particular situations' which is required for 'finding the mean in practice.'"}, {"text": "It refers to the theoretical understanding of moral philosophy, distinct from actual practical action.", "isCorrect": false, "rationale": "Phronesis is 'practical wisdom,' emphasizing its connection to action and judgment in real-world scenarios, not just theoretical understanding."}], "id": "q03"}, {"question": "Aristotle's highest form of friendship, described in The Ethics, is characterized by:", "options": [{"text": "Mutual benefit and utility, where friends help each other achieve personal goals.", "isCorrect": false, "rationale": "This describes 'friendship of utility,' which Aristotle distinguishes from the deepest form."}, {"text": "Shared pleasures and enjoyable common interests, leading to a comfortable companionship.", "isCorrect": false, "rationale": "This describes 'friendship of pleasure,' which is less enduring than the highest form."}, {"text": "A mutual recognition and appreciation of each other's genuine virtue and good character.", "isCorrect": true, "rationale": "The text states, 'The deepest friendship is not friendship of utility or pleasure but friendship of character — the mutual recognition of two people who love what is genuinely good in each other.'"}, {"text": "A temporary alliance formed out of necessity for mutual protection and survival.", "isCorrect": false, "rationale": "This concept is not discussed in relation to friendship; the highest friendship is described as 'most enduring' because it is rooted in stable virtue."}], "id": "q04"}, {"question": "While ultimately identifying the contemplative life as the highest form of human happiness, Aristotle immediately qualifies this by stating:", "options": [{"text": "Only gods, not humans, can truly achieve the contemplative life due to its divine nature.", "isCorrect": false, "rationale": "Aristotle identifies it as the 'most divine form of human happiness,' implying humans can achieve it, but he qualifies the human context."}, {"text": "The contemplative life is inferior to the active life of moral virtue for all practical purposes.", "isCorrect": false, "rationale": "He calls the contemplative life the 'ultimate answer' and 'most divine,' thus not inferior, but he does acknowledge the necessity of the active life alongside it."}, {"text": "Humans are not pure intellects and require both moral virtue and social engagement within communities.", "isCorrect": true, "rationale": "The text explicitly states: 'But he immediately qualified this: we are not pure intellects; we live in communities, need friends, and must exercise the moral virtues.'"}, {"text": "Contemplation is solely for the leisured wealthy, not for ordinary citizens who must work.", "isCorrect": false, "rationale": "This demographic limitation is not stated as his immediate qualification; his qualification is about human nature and social needs generally."}], "id": "q05"}, {"question": "Contrary to later thinkers, Aristotle viewed the state as:", "options": [{"text": "An artificial construct formed through a social contract for mutual protection.", "isCorrect": false, "rationale": "The text states, 'The state is not a contract for mutual protection, as later thinkers would argue.'"}, {"text": "A necessary evil solely to maintain order among inherently selfish individuals.", "isCorrect": false, "rationale": "One of the enduring insights is that 'government is not merely a necessary evil for keeping order, but a community ordered toward human flourishing.'"}, {"text": "The natural completion of the human social impulse, enabling the full human life.", "isCorrect": true, "rationale": "The text explains, 'The state exists by nature: human beings are political animals... it is the natural completion of the human social impulse, in which families and villages grow into the self-sufficient community capable of supporting the full human life.'"}, {"text": "A divine institution established by higher powers to guide humanity.", "isCorrect": false, "rationale": "While he refers to the contemplative life as 'divine,' he describes the state as existing 'by nature' and as a 'natural completion,' not a divine institution."}], "id": "q06"}, {"question": "Among Aristotle's six classifications of government, which form did he consider the *best practical constitution* for its stability, blending oligarchic order with democratic participation?", "options": [{"text": "Monarchy", "isCorrect": false, "rationale": "Monarchy is one of the 'correct forms,' ruling for the common good, but the text identifies a different form as the *best practical* for stability and blending."}, {"text": "Tyranny", "isCorrect": false, "rationale": "Tyranny is listed as a 'deviant form' because the ruler benefits private interest, not the common good, and is prone to collapse."}, {"text": "Polity", "isCorrect": true, "rationale": "The text explicitly states: 'The best practical constitution is the mixed constitution — polity — because it draws on the middle class for its stability, blending oligarchic order with democratic participation.'"}, {"text": "Democracy", "isCorrect": false, "rationale": "In Aristotle's classification, democracy is considered a 'deviant form' (rule of the many for private interest), though elements of democratic participation are incorporated into the ideal 'polity.'"}], "id": "q07"}, {"question": "What does Aristotle identify as the primary remedy against political revolution and the corruption inherent in different constitutions?", "options": [{"text": "Strict adherence to institutional rules and laws enforced by a strong military.", "isCorrect": false, "rationale": "The text states the remedy is 'not primarily institutional,' and does not focus on military enforcement."}, {"text": "Economic equality to prevent class conflict and maintain social harmony.", "isCorrect": false, "rationale": "While economic factors might contribute to stability, the text identifies a different 'primary' remedy, focusing on character and understanding."}, {"text": "A people educated in the spirit of their constitution and led by rulers who understand the common good.", "isCorrect": true, "rationale": "The text clearly states: 'The remedy is not primarily institutional but educational: a people educated in the spirit of their constitution, and led by rulers who genuinely understand and love the common good, is a people whose political arrangements will endure.'"}, {"text": "Regular elections to ensure frequent changes in leadership and prevent accumulation of power.", "isCorrect": false, "rationale": "While elections might be part of some constitutions, the text emphasizes education as the primary remedy for long-term stability against corruption, not just changing leaders."}], "id": "q08"}, {"question": "Which of the following statements *best* encapsulates one of Aristotle's 'Most Enduring Insights' from the text?", "options": [{"text": "True happiness is primarily found in the pursuit of external goods like wealth and power, which provide comfort.", "isCorrect": false, "rationale": "The text's enduring insight 'Happiness requires virtue' directly contradicts this, stating 'no amount of wealth, power, or pleasure produces genuine flourishing in the absence of good character.'"}, {"text": "Character is a fixed attribute from birth, unchangeable by individual effort or societal influence.", "isCorrect": false, "rationale": "The text explicitly states 'Virtue is a habit: character is formed by repeated action,' making it clear character is not fixed."}, {"text": "The state's fundamental purpose is to enable human flourishing and the good life for its citizens.", "isCorrect": true, "rationale": "One of the listed enduring insights is: 'The state exists to enable the good life: government is not merely a necessary evil for keeping order, but a community ordered toward human flourishing.'"}, {"text": "Justice is a minor virtue, secondary to individual contemplation and less comprehensive than other virtues.", "isCorrect": false, "rationale": "The text states 'Justice is the social virtue: because we live in communities, the virtue that governs our dealings with others is the most comprehensive of all the moral virtues,' contradicting this statement."}], "id": "q09"}, {"question": "The text suggests that Aristotle's defense of natural slavery was particularly problematic because:", "options": [{"text": "It was a purely theoretical argument with no practical consequences for society.", "isCorrect": false, "rationale": "The text refers to it as the 'most glaring case' and discusses its premise, implying it had significant, problematic implications, not just theoretical ones."}, {"text": "It contradicted his own principle that every human being possesses *logos*, the capacity for reason and speech.", "isCorrect": true, "rationale": "The text states: 'Aristotle's own account of human function — that every human being possesses logos, the capacity for reason and speech — contradicts the premise of the argument' for natural slavery."}, {"text": "Later philosophers like Aquinas fully endorsed and expanded upon his doctrine of natural slavery.", "isCorrect": false, "rationale": "The text notes that 'Later thinkers in the Aristotelian tradition, including Aquinas, quietly abandoned the doctrine of natural slavery.'"}, {"text": "It was based on accurate empirical observations of human behavior that were later universally accepted.", "isCorrect": false, "rationale": "The text says 'This is simply false: the supposed characteristics of the 'natural slave' do not correspond to any real human group,' indicating it was not based on accurate observations."}], "id": "q10"}, {"question": "The text identifies Aristotle's exclusion of women from full citizenship as an error. What specific philosophical problem does this error create within Aristotle's own framework?", "options": [{"text": "It contradicts his claim that the polis is the natural form of human community, since women are also human beings.", "isCorrect": false, "rationale": "While relevant, the specific internal contradiction identified in the text concerns Aristotle's account of virtue, not the claim about the polis's naturalness."}, {"text": "It contradicts his theory of natural law, which grounds rights in human nature rather than social conventions.", "isCorrect": false, "rationale": "Natural law theory is primarily Aquinas's framework. The text identifies Aristotle's virtue theory, not natural law, as the source of the internal contradiction about women."}, {"text": "It rests on unsupported empirical assumptions about women's rational capacity that contradict his own account of virtue as a developed capacity available to all who practice it.", "isCorrect": true, "rationale": "The text states that Aristotle's exclusion of women 'rested on empirical assumptions about women's rational capacity that Aristotle had no reliable evidence for, and that contradict his own account of virtue as a developed capacity available to all who practice it.'"}, {"text": "It contradicts his account of friendship, which he explicitly describes as equally available to men and women.", "isCorrect": false, "rationale": "While Aristotle does discuss friendship broadly, the specific contradiction identified in the text concerns his theory of virtue — not friendship — as the framework that women's exclusion undermines."}], "id": "q11"}, {"question": "The text argues that Aristotle's significant errors — on natural slavery, women, and the polis — were not 'mere accidents of ignorance' but were 'built into his analysis in ways that his own principles should have corrected.' What does this imply about the proper response to these errors?", "options": [{"text": "That Aristotle's framework should be rejected wholesale, since errors built into the core invalidate the entire system.", "isCorrect": false, "rationale": "The text explicitly states the 'proper response is not to reject his framework wholesale' — the errors are correctable by applying Aristotle's own principles more rigorously."}, {"text": "That the errors were inevitable given Aristotle's historical context and should simply be forgiven as products of his time.", "isCorrect": false, "rationale": "While historical context explains the errors, the text goes further: the errors should be actively corrected by applying Aristotle's own principles, not merely excused."}, {"text": "That the proper response is to apply Aristotle's own principles more rigorously than he did, correcting what was wrong while preserving what was right — which is exactly what the best Aristotelian thinkers have done.", "isCorrect": true, "rationale": "The text states: 'The proper response to Aristotle's errors is not to reject his framework wholesale, but to apply his own principles more rigorously than he did, correcting what was wrong while preserving what was right. This is, in fact, exactly what the best Aristotelian thinkers after him have done.'"}, {"text": "That Aristotle's philosophy requires a competing framework (such as modern liberal rights theory) to correct its internal errors from the outside.", "isCorrect": false, "rationale": "The text argues that the corrections can and should come from *within* Aristotle's own framework — applying his principles more rigorously, not importing an external corrective framework."}], "id": "q12"}, {"question": "Among Aristotle's most enduring insights, the text identifies justice as uniquely 'the social virtue.' What does this phrase mean?", "options": [{"text": "Justice is the virtue practiced only by rulers and legislators, not by ordinary citizens in their private lives.", "isCorrect": false, "rationale": "Aristotle treats justice as a virtue relevant to all who live in community — it governs 'all our dealings with others,' not just political rulers."}, {"text": "Because we live in communities, justice — the virtue governing our dealings with others — is the most comprehensive of all the moral virtues.", "isCorrect": true, "rationale": "The text states: 'Justice is the social virtue: because we live in communities, the virtue that governs our dealings with others is the most comprehensive of all the moral virtues.' Its comprehensiveness derives from the fact that human life is irreducibly communal."}, {"text": "Justice is distinct from other virtues because it can be fully achieved without any personal character formation — it depends only on correct behavior.", "isCorrect": false, "rationale": "For Aristotle, justice is a virtue in the full sense — a stable disposition of character formed through habituation. It is not reduced to mere behavioral compliance without character."}, {"text": "Justice is called 'social' because it can only be developed through formal legal institutions and civic participation, unlike other virtues which are developed privately.", "isCorrect": false, "rationale": "While justice is social in the sense that it governs dealings with others, Aristotle does not limit its development to formal legal institutions. Justice is a character virtue formed through habit, like other virtues."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
