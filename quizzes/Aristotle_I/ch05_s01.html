<script>
var QUESTIONS = [{"question": "In the context of Aristotle's teleological argument, why is the city considered 'natural' even though it develops after the household and the village?", "options": [{"text": "Because it is the final state in which human nature finds its completion and self-sufficiency.", "isCorrect": true, "rationale": "Aristotle argues that a thing's nature is defined by its $telos$, or end purpose; since the city is the context where human flourishing is fully realized, it is the natural goal of human development."}, {"text": "Because it arises spontaneously from biological instincts without the need for rational organization.", "isCorrect": false, "rationale": "While the city is natural, the text emphasizes that it is organized around $logos$ and shared norms of justice, rather than mere instinct."}, {"text": "Because the city is chronologically prior to the existence of individual human beings.", "isCorrect": false, "rationale": "The household is chronologically prior to the individual for survival, but the city is naturally prior in terms of purpose and completion."}, {"text": "Because it serves the same basic survival functions as the household but on a larger scale.", "isCorrect": false, "rationale": "The text explicitly states that the city is more than just a larger version of a village; it is a qualitatively different community focused on the good life rather than mere survival."}], "id": "q01"}, {"question": "How does the possession of $logos$ fundamentally distinguish human political communities from the social groupings of other animals?", "options": [{"text": "Other animals can only communicate pleasure or pain, while humans can deliberate on justice and the common good.", "isCorrect": true, "rationale": "The text explains that $logos$ allows for moral discourse, which is the instrument used to organize communities around shared norms rather than force."}, {"text": "$Logos$ allows humans to exert more efficient force over others to maintain social hierarchy.", "isCorrect": false, "rationale": "The source material argues that $logos$ is the alternative to force, allowing for organization based on shared concepts of justice."}, {"text": "Animals lack the ability to signal any internal states, whereas humans use $logos$ for basic communication.", "isCorrect": false, "rationale": "The text acknowledges that animals can signal pleasure and pain; the distinction lies in the capacity for rational speech about morality."}, {"text": "Only humans use $logos$ to form economic cooperatives for the purpose of mutual security.", "isCorrect": false, "rationale": "Aristotle specifically rejects the idea that a city is merely an economic cooperative; its distinctiveness lies in its moral and political purpose."}], "id": "q02"}, {"question": "Which of the following represents a logical internal contradiction in Aristotle's defense of 'natural slavery' as highlighted in the text?", "options": [{"text": "If the human good is defined by rational activity, then every being capable of reason should be permitted to exercise it.", "isCorrect": true, "rationale": "Aristotle's own principle that flourishing consists in exercising reason contradicts the institution of slavery, which deprives individuals of the opportunity to exercise that very capacity."}, {"text": "Natural slavery is efficient for the economy, but Aristotle's theory of $telos$ ignores economic outcomes.", "isCorrect": false, "rationale": "The critique offered is philosophical and logical, focusing on his definition of human nature rather than economic utility."}, {"text": "Aristotle's definition of a citizen is based on wealth, which contradicts the existence of any form of slavery.", "isCorrect": false, "rationale": "While wealth defines citizenship in an oligarchy, this is not the core logical flaw used by the text to refute the natural slavery doctrine."}, {"text": "The household is the building block of the state, so inequality within it must be artificial rather than natural.", "isCorrect": false, "rationale": "Aristotle viewed the household as natural; the contradiction lies in how he applied his principles of reason and virtue to individuals within it."}], "id": "q03"}, {"question": "What is the primary distinction between a 'Polity' and a 'Democracy' in Aristotle's classification of constitutions?", "options": [{"text": "A Polity is a correct form ruling for the common good, whereas a Democracy is a deviant form ruling for the private interest of the many.", "isCorrect": true, "rationale": "Aristotle categorizes constitutions based on the number of rulers and whether they serve the common good or private interests; Democracy is the perversion of the rule by the many."}, {"text": "A Polity is ruled by the few for the common good, while a Democracy is ruled by the many for the common good.", "isCorrect": false, "rationale": "Rule by the few for the common good is called an Aristocracy, not a Polity."}, {"text": "A Polity is an artificial construction, while a Democracy is a natural growth of human society.", "isCorrect": false, "rationale": "Aristotle views the state itself as natural; the classification refers to the quality and aim of its specific governance structure."}, {"text": "A Polity requires wealth for citizenship, whereas a Democracy requires only birthright.", "isCorrect": false, "rationale": "The text identifies the requirement of wealth with Oligarchy, which is a deviant form of rule by the few."}], "id": "q04"}, {"question": "According to the text, how does the Christian tradition use the concept of $imago \\ Dei$ to correct Aristotle's political philosophy?", "options": [{"text": "It establishes that every human possesses an irreducible dignity that human law cannot legitimately override.", "isCorrect": true, "rationale": "Christian anthropology posits that all humans are made in the image of God, providing a premise of equality that refutes the notion of natural slavery."}, {"text": "It suggests that grace destroys natural hierarchies, making the concept of a 'state' unnecessary.", "isCorrect": false, "rationale": "The text notes that 'grace does not destroy nature, but perfects it,' meaning the state is still necessary but its errors must be corrected."}, {"text": "It reinforces Aristotle's view that only some humans possess the capacity for full rational deliberation.", "isCorrect": false, "rationale": "The $imago \\ Dei$ concept actually contradicts this by asserting a shared divine image and rational capacity in all humans."}, {"text": "It identifies the 'best citizen' as the person who most strictly obeys the laws of a secular tyrant.", "isCorrect": false, "rationale": "This would contradict the moral principles inherent in the Christian tradition and the Aristotelian distinction between a good man and a citizen of a deviant state."}], "id": "q05"}, {"question": "Aristotle argues that the citizen is defined by 'sharing in the judicial and executive part of the government.' What is the most significant modern implication of this definition?", "options": [{"text": "Citizenship is an active participation in communal life rather than a passive legal status.", "isCorrect": true, "rationale": "The text highlights that for Aristotle, being a citizen means actually engaging in the community's governance and common life."}, {"text": "Modern democracies are inherently superior because they grant the status of citizenship to more people.", "isCorrect": false, "rationale": "Aristotle's definition actually raises 'uncomfortable questions' about modern political apathy, suggesting that status without participation is insufficient."}, {"text": "A person can achieve the full good life purely through private activities without civic engagement.", "isCorrect": false, "rationale": "Aristotle's view is that we need one another and political community to achieve the fully good life; isolation is for 'beasts or gods.'"}, {"text": "The judicial branch should be the only branch of government open to the common people.", "isCorrect": false, "rationale": "Aristotle's definition includes both judicial and executive functions and varies based on the form of government."}], "id": "q06"}, {"question": "Aristotle's classification of 'Monarchy' as a correct form of government assumes that the ruler is governing for the common good.", "options": [{"text": "True — Monarchy is classified as correct precisely because it aims at the common good.", "isCorrect": true, "rationale": "In Aristotle's system, a 'correct' form of government is defined by its aim toward the common good; Monarchy is the correct form of rule by one."}, {"text": "False — Monarchy is classified as correct regardless of the ruler's aims.", "isCorrect": false, "rationale": "Monarchy is listed as a correct form because it aims at the common good, whereas Tyranny is its deviant counterpart."}, {"text": "False — Monarchy is actually classified as a deviant form alongside Tyranny.", "isCorrect": false, "rationale": "Aristotle distinguishes Monarchy (correct, ruling for the common good) from Tyranny (deviant, ruling for private interest). They are opposites, not equivalents."}, {"text": "True — but only if the monarch also shares power with an aristocratic council.", "isCorrect": false, "rationale": "In Aristotle's classification, Monarchy is rule by one person for the common good. Sharing power with a council would describe a mixed constitution, not a pure Monarchy."}], "id": "q07"}, {"question": "What does the 'teacher note' suggest is the primary lesson to be learned from studying Aristotle's defense of natural slavery?", "options": [{"text": "Great philosophers are often blinded by the unstated implicit premises of their own cultures.", "isCorrect": true, "rationale": "The goal is to help students identify how implicit assumptions can lead even rigorous arguments to reach unjust conclusions."}, {"text": "Aristotle's political philosophy is fundamentally unreliable and should be dismissed.", "isCorrect": false, "rationale": "The text states the goal is NOT to use the error as an excuse to dismiss everything else Aristotle says, but to correct his framework."}, {"text": "The household is an irrelevant building block that leads to political errors.", "isCorrect": false, "rationale": "The text actually calls his recognition of the household as a fundamental building block an 'insightful part' of his analysis."}, {"text": "Reason is a subjective quality that cannot be used to evaluate social hierarchies.", "isCorrect": false, "rationale": "The text argues the opposite: that Aristotle's own principles regarding reason provide the tools to refute his errors."}], "id": "q08"}, {"question": "If a state is merely an 'artificial construction' created for 'mutual benefit' (the Social Contract view), how does this differ from Aristotle's view on its purpose?", "options": [{"text": "An artificial state has no inherent purpose beyond what its members happen to want at the time.", "isCorrect": true, "rationale": "Aristotle's 'natural' view suggests the state has a fixed purpose (justice and virtue) built into its nature, against which it can be evaluated."}, {"text": "An artificial state is naturally ordered toward the pursuit of the 'good life.'", "isCorrect": false, "rationale": "This is Aristotle's view of the natural state; the social contract view often focuses on conventional agreement and security."}, {"text": "An artificial state cannot be dissolved, whereas a natural growth is temporary.", "isCorrect": false, "rationale": "Social contract theory often allows for dissolution if the contract is broken, whereas Aristotle's natural view sees the state as the fulfillment of human nature."}, {"text": "There is no difference; both views argue that the state must pursue objective moral virtue.", "isCorrect": false, "rationale": "The 'think deeper' section explains that the social contract view is the 'dominant modern alternative' that contrasts with Aristotle's purpose-driven naturalism."}], "id": "q09"}, {"question": "Under what circumstance does Aristotle acknowledge that a 'best citizen' might not be a 'good man'?", "options": [{"text": "When the citizen lives in a deviant constitution where 'excellence' requires loyalty to an unjust system.", "isCorrect": true, "rationale": "In a tyranny, the qualities that make a 'good citizen' (loyalty to the ruler) are morally incompatible with being a 'good man' (virtue)."}, {"text": "When the citizen is too poor to participate in the executive part of the government.", "isCorrect": false, "rationale": "Wealth determines citizenship in an oligarchy, but this does not inherently create the tension between civic excellence and moral goodness."}, {"text": "When the citizen possesses $logos$ but chooses to live in isolation as a 'beast or a god.'", "isCorrect": false, "rationale": "Aristotle argues such a person is not a citizen at all; citizenship requires participation in the community."}, {"text": "When the citizen follows natural law instead of the written laws of a polity.", "isCorrect": false, "rationale": "Aristotle's 'best citizen' in a correct form (like a polity) would ideally align with the 'good man' because the laws aim at justice."}], "id": "q10"}, {"question": "Aristotle traces the origins of the city through three natural stages. Which sequence correctly represents his teleological account of community development?", "options": [{"text": "Tribe → City → Household, where the city progressively simplifies into smaller units.", "isCorrect": false, "rationale": "Aristotle traces development forward toward greater complexity and self-sufficiency, not backward toward simplification."}, {"text": "Household → Village → City, where each stage is the natural completion of the preceding one.", "isCorrect": true, "rationale": "The text states: 'The household is naturally prior to the individual... the village is the natural development of the household; and the city is the natural development of the village.' Each stage is completed and exceeded by the next."}, {"text": "Village → Household → City, where isolated villages first form families and then consolidate into cities.", "isCorrect": false, "rationale": "Aristotle's account begins with the household (the couple and family) as the most basic unit, not the village."}, {"text": "City → Village → Household, because Aristotle argues the city is logically prior to its constituent parts.", "isCorrect": false, "rationale": "While the city is logically (teleologically) prior to individuals in that it represents their natural completion, the chronological and developmental sequence moves from household to village to city."}], "id": "q11"}, {"question": "Aristotle states that a human being who lives outside of political community must be 'either a beast or a god.' What philosophical point does this striking claim make?", "options": [{"text": "It suggests that hermits and recluses are morally superior to those who live in cities.", "isCorrect": false, "rationale": "Aristotle is not praising isolation. The point is that self-sufficient solitude of the divine kind is superhuman, while living without community through incapacity or depravity is subhuman."}, {"text": "Political community is essential to human nature: only a superhuman being (god) or a subhuman one (beast) could exist without it.", "isCorrect": true, "rationale": "The text explains that 'the city does not merely protect us; it makes us human in the fullest sense.' A person cut off from political community either transcends human nature (god) or falls short of it (beast), but in neither case is fully human."}, {"text": "The state should be modeled on theological principles, making god-like rulers necessary for good governance.", "isCorrect": false, "rationale": "This misreads the passage. Aristotle is making a point about human nature and community, not prescribing a divine model of rulership."}, {"text": "Humans who achieve perfect self-sufficiency through philosophical contemplation become god-like and no longer need political life.", "isCorrect": false, "rationale": "While Aristotle discusses the god-like quality of theoretical contemplation in the Ethics, in this political context the 'beast or god' claim establishes that political community is the natural home of human beings, not an option to transcend."}], "id": "q12"}, {"question": "Aristotle argues that both oligarchs and democrats have a partial grasp of justice but err in their application. What is the shared mistake each makes?", "options": [{"text": "Both mistake the form of government (rule by few vs. many) for the essence of justice (common good vs. private interest).", "isCorrect": false, "rationale": "This describes one aspect of the six-constitution scheme but not the specific error about equality that Aristotle identifies in Book III, Ch. 9."}, {"text": "Both correctly see that equality is relevant to justice but wrongly extend a partial equality — equality in one respect — to the whole of justice.", "isCorrect": true, "rationale": "The text states: 'what is equal appears just, and is so; but not to all, only among those who are equals: and what is unequal appears just, and is so; but not to all, only amongst those who are unequals; which circumstance some people neglect, and therefore judge ill; the reason for which is, they judge for themselves.' Oligarchs equalize property-holders; democrats equalize free persons — each universalizes a partial standard."}, {"text": "Both deny that justice has any connection to equality and instead focus purely on the virtue or wealth of the ruling class.", "isCorrect": false, "rationale": "The opposite is true: both oligarchs and democrats do appeal to equality. Their error is not denying equality's relevance but misapplying it."}, {"text": "Both refuse to distinguish correct from deviant forms of government, treating all constitutions as equally legitimate.", "isCorrect": false, "rationale": "This is not the specific error Aristotle identifies in the justice passage. Each faction argues vigorously for its own form; the problem is their partial and self-serving conception of equality."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
