<script>
var QUESTIONS = [{"question": "In the context of Nietzsche's work, what is the primary distinction between doing a 'genealogy' of morality and advocating for a specific moral system?", "options": [{"text": "Genealogy focuses on the historical and psychological origins of values rather than endorsing their continued use.", "isCorrect": true, "rationale": "A genealogy is an investigation into the conditions and needs that produced values, which is distinct from a normative recommendation to follow them."}, {"text": "Advocacy is a scientific process of verification, while genealogy is a purely creative and artistic endeavor.", "isCorrect": false, "rationale": "Nietzsche describes genealogy as an analytical method similar to anthropology or history, not merely an artistic one, and he does not define advocacy as scientific verification."}, {"text": "Genealogy seeks to prove that all moral values are objectively true by tracing them back to their source.", "isCorrect": false, "rationale": "Tracing a value to its source does not prove its truth; in fact, Nietzsche uses genealogy to challenge the perceived 'natural' status of values."}, {"text": "Advocacy is concerned with the 'human types' behind a morality, whereas genealogy ignores the people who created them.", "isCorrect": false, "rationale": "Genealogy specifically examines the psychological needs and human types, such as 'warriors' or 'priests,' that stand behind moral values."}], "id": "q01"}, {"question": "Which of the following best describes the 'genetic fallacy' as applied to Nietzsche's critique of morality?", "options": [{"text": "The belief that if the origin of a value is found in a 'low' psychological state like $ressentiment$, the value itself must be false.", "isCorrect": true, "rationale": "The genetic fallacy is the error of judging the truth or validity of a belief solely based on its historical or psychological beginnings."}, {"text": "The assumption that human morality is determined entirely by biological genetics rather than historical culture.", "isCorrect": false, "rationale": "While the term 'genetic' is used, in philosophy it refers to the 'genesis' or origin of an idea, not biological DNA."}, {"text": "The mistake of assuming that master morality and slave morality share the same historical roots.", "isCorrect": false, "rationale": "Nietzsche argues they have different roots; the genetic fallacy specifically concerns the leap from an origin to a truth-claim."}, {"text": "The idea that values are only valid if they can be traced back to an aristocratic origin.", "isCorrect": false, "rationale": "This would be an inverse error; the fallacy describes the dismissal of a value based on its source, not the requirement of a specific source for validity."}], "id": "q02"}, {"question": "According to the text, why does Nietzsche believe a world of pure 'master morality' would be insufficient for human greatness?", "options": [{"text": "It lacks the vitality and creative power necessary to sustain a civilization.", "isCorrect": false, "rationale": "Nietzsche actually credits master morality with high vitality and creative power."}, {"text": "It would be beautiful and vital but ultimately shallow, lacking the 'soul' created by slave morality.", "isCorrect": true, "rationale": "Nietzsche argues that the internalization of instinct required by slave morality is what created human depth and an interior life."}, {"text": "Master morality is inherently dishonest and relies on masks to hide its true intentions.", "isCorrect": false, "rationale": "The text states that Nietzsche finds master morality more honest than slave morality, which he views as masked in $ressentiment$."}, {"text": "The lack of military prowess in master morality would lead to its eventual conquest by others.", "isCorrect": false, "rationale": "Master morality is associated with the 'warrior' spirit and strength; its weakness is psychological depth, not physical force."}], "id": "q03"}, {"question": "What is the defining characteristic of the 'slavish spirit's' approach to value creation?", "options": [{"text": "It begins by affirming its own qualities as 'good' and ignores the qualities of others.", "isCorrect": false, "rationale": "This describes the aristocratic spirit; the slavish spirit is reactive rather than self-affirming."}, {"text": "It seeks to maximize physical power through direct military confrontation and conquest.", "isCorrect": false, "rationale": "Slave morality is a reaction to political weakness and operates through a revaluation of values rather than military force."}, {"text": "It defines 'good' as a reaction to an external 'evil' that it identifies in others.", "isCorrect": true, "rationale": "The slavish spirit says 'He is evil, therefore I am good,' basing its identity on the negation of the other."}, {"text": "It rejects the concept of a 'soul' or interior life in favor of pure external action.", "isCorrect": false, "rationale": "Slave morality is actually responsible for the creation of the 'soul' and the interior life according to Nietzsche."}], "id": "q04"}, {"question": "How does Nietzsche characterize the role of the Jews in the history of morality?", "options": [{"text": "As the group that initiated a world-historical 'revaluation of values' through sheer will.", "isCorrect": true, "rationale": "Nietzsche views the Jewish people as the historical origin of the 'slave revolt' that overturned aristocratic values."}, {"text": "As a people whose moral influence was limited to military conquest in the ancient world.", "isCorrect": false, "rationale": "The text explicitly states that their triumph was carried out through the revaluation of values, not military conquest."}, {"text": "As a passive group that was forced into slave morality by external circumstances beyond their control.", "isCorrect": false, "rationale": "Nietzsche describes them as having a 'resolute will to power,' suggesting they were active agents in this moral transformation."}, {"text": "As the primary proponents of a warrior-based, aristocratic moral framework.", "isCorrect": false, "rationale": "Nietzsche identifies them as the ones who overturned the aristocratic/warrior framework in favor of the slave revolt."}], "id": "q05"}, {"question": "Nietzsche describes virtues like humility and pity as 'masks.' What psychological state does he believe these masks usually cover?", "options": [{"text": "Genuine altruism", "isCorrect": false, "rationale": "Nietzsche is suspicious of these virtues and sees them as hiding something less noble than genuine altruism."}, {"text": "$Ressentiment$", "isCorrect": true, "rationale": "He sees these 'slave' virtues as reactive masks for the underlying resentment the powerless feel toward the powerful."}, {"text": "Intellectual depth", "isCorrect": false, "rationale": "While slave morality creates depth, the virtues themselves are masks for the reactive emotions, not the depth itself."}, {"text": "Aristocratic pride", "isCorrect": false, "rationale": "Aristocratic pride is associated with master morality and is generally expressed directly rather than masked."}], "id": "q06"}, {"question": "What does Nietzsche mean when he says the slave revolt in morality 'has been victorious' to the point of being invisible?", "options": [{"text": "Most people have returned to master morality, making the slave revolt irrelevant.", "isCorrect": false, "rationale": "Nietzsche argues the opposite: the revolt was so successful that its values now seem completely standard."}, {"text": "The values of the slave revolt have become so fundamental to our society that we view them as natural rather than historical.", "isCorrect": true, "rationale": "The success of the revaluation means that concepts like 'equality' or 'pity' are no longer seen as specific historical inventions."}, {"text": "The revolt was a failure, and its history has been erased from the textbooks.", "isCorrect": false, "rationale": "The text claims the revolt was 'the most consequential revaluation of values in human history,' signifying its total success."}, {"text": "Slave morality has been physically forced upon the population through two thousand years of war.", "isCorrect": false, "rationale": "The text emphasizes that this victory was a triumph of 'will' and 'revaluation,' not military force."}], "id": "q07"}, {"question": "According to the text, what produces 'human greatness' in Nietzsche's view?", "options": [{"text": "The complete eradication of slave morality by the master spirit.", "isCorrect": false, "rationale": "Nietzsche suspects a world of pure master morality would be shallow; he values the tension between the two."}, {"text": "The total submission of all human types to a single, universal moral code.", "isCorrect": false, "rationale": "Nietzsche is a critic of universal moral systems and sees the struggle between moralities as the driver of greatness."}, {"text": "The ongoing tension and struggle between the affirmation of the master and the negation of the slave.", "isCorrect": true, "rationale": "The text states that it is the struggle between these two opposing moral forces that produces human complexity and greatness."}, {"text": "The peaceful reconciliation and blending of all values into a singular democratic ideal.", "isCorrect": false, "rationale": "Nietzsche views democracy as a product of the slave revolt and emphasizes struggle and tension rather than peaceful blending."}], "id": "q08"}, {"question": "Why is Nietzsche's genealogy described as a 'provocation' rather than a simple refutation?", "options": [{"text": "Because it forces the reader to question the psychological utility of their values rather than just their truth.", "isCorrect": true, "rationale": "By showing the 'all-too-human' origins of values, Nietzsche challenges the reader to reconsider why they hold those values."}, {"text": "Because it uses insults to anger the reader into accepting his new system of morality.", "isCorrect": false, "rationale": "Nietzsche is described as handing over evidence for the reader to decide, not forcing a new system through insults."}, {"text": "Because it provides a definitive set of answers that refutes all previous philosophical systems.", "isCorrect": false, "rationale": "The text explicitly states that Nietzsche does not answer these questions for us and is not a system-builder."}, {"text": "Because it proves that all values are biologically determined and therefore cannot be changed.", "isCorrect": false, "rationale": "The text focuses on historical and psychological conditions, suggesting that values are created and can be revalued."}], "id": "q09"}, {"question": "Which term does Nietzsche use to describe the internalization of instinct that occurred during the slave revolt?", "options": [{"text": "The creation of the 'soul' or interior life.", "isCorrect": true, "rationale": "The text links the internalization of instinct directly to the birth of the soul, conscience, and human depth."}, {"text": "The 'will to power' of the aristocrat.", "isCorrect": false, "rationale": "While the Jews are described as having a will to power, the 'internalization' specifically refers to the psychic depth created by slave morality."}, {"text": "The genetic fallacy.", "isCorrect": false, "rationale": "The genetic fallacy is a logical error in reasoning, not a psychological process of internalizing instincts."}, {"text": "The 'priestly' warrior spirit.", "isCorrect": false, "rationale": "Nietzsche differentiates between the 'priestly' and 'warrior' types; internalization is more closely linked with the priestly development of the soul."}], "id": "q10"}, {"question": "The text notes that Nietzsche's identification of Judaism as the origin of slave morality 'has been exploited by anti-Semites.' What is the text's assessment of this exploitation?", "options": [{"text": "It is a bad-faith misreading that Nietzsche himself would have found infuriating, given his documented contempt for anti-Semitism.", "isCorrect": true, "rationale": "The text says Nietzsche's tone toward the Jews is one of 'grudging, sometimes awestruck admiration,' and that he would have been furious at the anti-Semitic exploitation of his ideas."}, {"text": "It is a legitimate reading since Nietzsche's genealogy implies that the Jewish people are morally inferior.", "isCorrect": false, "rationale": "Nietzsche attributes extraordinary will and achievement to the Jewish people; the text explicitly rejects anti-Semitic readings."}, {"text": "It is irrelevant to the philosophical argument and need not be acknowledged in serious scholarship.", "isCorrect": false, "rationale": "The text explicitly states that this exploitation 'must be acknowledged' and that texts must be read in full context."}, {"text": "It was deliberately encouraged by Elisabeth Förster-Nietzsche to make her brother's work more popular.", "isCorrect": false, "rationale": "While Elisabeth is mentioned elsewhere, the specific point here is about what Nietzsche actually wrote and what bad-faith interpreters made of it."}], "id": "q11"}, {"question": "Nietzsche says a neutral observer would not understand the master/slave distinction. What does his genealogy actually reveal about his own sympathies?", "options": [{"text": "He finds master morality more vigorous, honest, and life-affirming, while being suspicious of humility and pity as masks for $ressentiment$.", "isCorrect": true, "rationale": "The text explicitly states that Nietzsche's sympathies are 'visible': he prefers the aristocratic spirit that affirms itself over the slavish spirit that negates others."}, {"text": "He secretly sympathizes with the slaves because their suffering mirrors his own chronic illness.", "isCorrect": false, "rationale": "While Nietzsche suffered, the text presents his sympathies as clearly on the side of master morality's vitality, not its opposite."}, {"text": "He is entirely neutral and refuses to endorse either moral system.", "isCorrect": false, "rationale": "The text explicitly says 'Nietzsche is not a neutral observer' and that his sympathies for master morality are visible."}, {"text": "He endorses a synthesis of both moralities as the ideal for the $Ubermensch$.", "isCorrect": false, "rationale": "The text describes the tension between the two moralities as productive, but does not say Nietzsche endorses a synthesis."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
