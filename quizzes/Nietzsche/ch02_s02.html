    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Nietzsche.html">&larr; Back to The Dangerous Perhaps (Nietzsche)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, why does Nietzsche reject the label of 'relativist' despite his rejection of absolute truth?", "options": [{"text": "He believes that some perspectives are objectively superior to others based on their depth and life-affirming nature.", "isCorrect": true, "rationale": "Perspectivism distinguishes itself from relativism by asserting a hierarchy of perspectives based on how much of the world they reveal and their vitality."}, {"text": "He maintains that absolute truth exists but is fundamentally inaccessible to the human mind.", "isCorrect": false, "rationale": "Nietzsche rejects the very concept of a perspective-independent absolute truth, rather than just claiming it is hidden."}, {"text": "He argues that only the scientific method can provide a perspective-free view of reality.", "isCorrect": false, "rationale": "Nietzsche views all knowledge, including science, as being shaped by the knower's drives and context."}, {"text": "He believes that truth is a social construct that should be democratically agreed upon.", "isCorrect": false, "rationale": "Relativism often leans toward social construction; Nietzsche, however, despises 'lazy' egalitarian views of truth."}], "id": "q01"}, {"question": "In the context of the courtroom trial analogy, how is Nietzschean 'truth' best described?", "options": [{"text": "A collection of equally valid but contradictory opinions that cancel each other out.", "isCorrect": false, "rationale": "This describes relativism, which Nietzsche rejects in favor of a more rigorous pursuit of knowledge."}, {"text": "An objective reality that exists independently of the witnesses, the judge, or the evidence.", "isCorrect": false, "rationale": "Nietzsche rejects this 'God's eye view' as a fantasy, insisting that knowledge is always someone's knowledge."}, {"text": "A target we approach by accumulating and acknowledging multiple, honest perspectives.", "isCorrect": true, "rationale": "Truth in perspectivism is not possessed absolutely but is approximated by integrating varied, deep perspectives."}, {"text": "A deliberate fiction created by the prosecution to exercise power over the defendant.", "isCorrect": false, "rationale": "While Nietzsche links truth to power, the courtroom example specifically illustrates how we 'get closer' to truth through angles."}], "id": "q02"}, {"question": "What is the primary 'trap' Nietzsche avoids by phrasing his position as 'Every claim to absolute truth is suspicious'?", "options": [{"text": "The trap of nihilism, which prevents any action due to a lack of moral certainty.", "isCorrect": false, "rationale": "While related, the text focuses specifically on the logical and metaphysical inconsistency of relativism."}, {"text": "The self-defeating logical contradiction inherent in stating 'There is no absolute truth' as an absolute fact.", "isCorrect": true, "rationale": "If the non-existence of absolute truth is an absolute truth, the statement contradicts its own premise."}, {"text": "The social isolation that comes from rejecting the shared values of one's culture.", "isCorrect": false, "rationale": "Nietzsche is less concerned with social harmony and more concerned with intellectual honesty and the genealogy of claims."}, {"text": "The scientific error of assuming that observations are unaffected by the observer.", "isCorrect": false, "rationale": "This is a component of perspectivism, but it is not the logical 'trap' mentioned in the section on absolute truth."}], "id": "q03"}, {"question": "How does Nietzsche's 'genealogical method' shift the focus of philosophical inquiry?", "options": [{"text": "It shifts from evaluating the logical validity of an argument to examining the psychological needs of the person making it.", "isCorrect": true, "rationale": "Genealogy treats philosophical claims as symptoms of the thinker's underlying physiological and psychological state."}, {"text": "It shifts from the study of ancient texts to the study of modern scientific discoveries.", "isCorrect": false, "rationale": "Genealogy is a method of historical and psychological analysis, not a shift in the timeline of source materials."}, {"text": "It shifts from questioning the origin of values to proving their universal biological necessity.", "isCorrect": false, "rationale": "Nietzsche's method is used to deconstruct 'universal' claims by showing their specific, often suspicious, origins."}, {"text": "It shifts from subjective interpretation to the discovery of the 'true world' behind appearances.", "isCorrect": false, "rationale": "Nietzsche is suspicious of the 'true world' concept, viewing it as a dishonest metaphysical construction."}], "id": "q04"}, {"question": "Which of the following best expresses Nietzsche's idea that 'the knower matters'?", "options": [{"text": "True knowledge can only be achieved by a subject who has successfully eliminated all personal biases.", "isCorrect": false, "rationale": "Nietzsche views the attempt to eliminate the knower as a 'fantasy' that denies the human nature of knowledge."}, {"text": "Knowledge is a product of the knower's body, history, drives, and physiological health.", "isCorrect": true, "rationale": "Nietzsche insists that knowledge is always embodied and situated, rather than being an abstract, universal proposition."}, {"text": "The identity of the knower is irrelevant as long as the mathematical proof is correct.", "isCorrect": false, "rationale": "This reflects the 'traditional philosophy' view that Nietzsche is explicitly criticizing."}, {"text": "Every person's perspective is equally valid regardless of their level of study or experience.", "isCorrect": false, "rationale": "Nietzsche explicitly states that some perspectives, like those of an honest scholar, are richer than others."}], "id": "q05"}, {"question": "What does Nietzsche imply by his response to the objection that his own philosophy is 'only interpretation' in Beyond Good and Evil 22?", "options": [{"text": "He admits that his philosophy is flawed and should not be taken seriously.", "isCorrect": false, "rationale": "Nietzsche isn't dismissing his work; he is embracing the necessary condition of all thought."}, {"text": "He embraces the perspectival nature of his own work to maintain intellectual honesty.", "isCorrect": true, "rationale": "By acknowledging his work as interpretation, he avoids the 'dishonesty' of claiming to possess an absolute, non-perspectival truth."}, {"text": "He argues that his interpretation is the only one that matches the 'true world'.", "isCorrect": false, "rationale": "Claiming his interpretation is the 'true' one would repeat the dogmatic error he criticizes in others."}, {"text": "He suggests that because it is an interpretation, it is immune to logical critique.", "isCorrect": false, "rationale": "Nietzsche invites the objection to highlight his transparency, not to evade critical engagement."}], "id": "q06"}, {"question": "Nietzsche's suspicion of 'Metaphysics' is rooted in his view that it is:", "options": [{"text": "A life-denying attempt to invent a 'true world' to escape the complexities of the 'apparent world'.", "isCorrect": true, "rationale": "Nietzsche sees the construction of a metaphysical 'true world' as a dishonest rejection of the only world we have."}, {"text": "A redundant field because science has already answered all fundamental questions of reality.", "isCorrect": false, "rationale": "Nietzsche's critique is philosophical and psychological, not a claim about the sufficiency of science."}, {"text": "A useful tool for organizing society, provided it is not taken as literal truth.", "isCorrect": false, "rationale": "The text describes his view as one of 'contempt' and suspicion, rather than finding it a useful social tool."}, {"text": "The only way for humans to access the absolute truth that lies beyond physical senses.", "isCorrect": false, "rationale": "This is the very claim that Nietzsche is suspicious of; he views such 'access' as a fantasy."}], "id": "q07"}, {"question": "Which of the following would Nietzsche most likely consider a 'richer' or 'better' perspective?", "options": [{"text": "A perspective that claims to be completely objective and free of any personal interest.", "isCorrect": false, "rationale": "Nietzsche views the 'dogmatist' who denies having biases as being further from the truth than the honest thinker."}, {"text": "A perspective shaped by deep study, personal suffering, and an honest acknowledgment of its own biases.", "isCorrect": true, "rationale": "Nietzsche argues that depth, suffering, and intellectual honesty reveal truths that are invisible to the comfortable or the casual."}, {"text": "A perspective that simplifies the world into 'your truth' and 'my truth' to avoid conflict.", "isCorrect": false, "rationale": "Nietzsche despises this 'lazy' relativism as a dead end that avoids the interesting questions of truth."}, {"text": "The perspective of a person who has never had their values challenged by external ideas.", "isCorrect": false, "rationale": "Such a perspective would lack the 'honesty' and 'multi-angled' approach Nietzsche advocates for."}], "id": "q08"}, {"question": "When Nietzsche asks 'What kind of person needs this to be true?', he is treating a philosophical claim as a:", "options": [{"text": "Universal law.", "isCorrect": false, "rationale": "Nietzsche rejects the existence of universal laws that are independent of human context."}, {"text": "Logical proof.", "isCorrect": false, "rationale": "He moves 'behind' the logic to see the drives that produced it."}, {"text": "Symptom.", "isCorrect": true, "rationale": "In the genealogical method, beliefs are seen as expressions or symptoms of a specific set of values or physiological states."}, {"text": "Random occurrence.", "isCorrect": false, "rationale": "Nietzsche believes beliefs have specific histories, genealogies, and functions; they are not random."}], "id": "q09"}, {"question": "What does Nietzsche's perspectivism imply about the pursuit of knowledge, given that truth is human-made?", "options": [{"text": "The pursuit of knowledge becomes more interesting and honest when we acknowledge our perspectives.", "isCorrect": true, "rationale": "Nietzsche explicitly states that his goal is to make the pursuit of knowledge 'more interesting' and 'honest,' not to abandon it."}, {"text": "The pursuit of knowledge is rendered impossible because no perspective can claim objectivity.", "isCorrect": false, "rationale": "Nietzsche argues that being human-made doesn't make knowledge impossible; it simply makes it human."}, {"text": "Knowledge should be abandoned in favor of pure aesthetic experience and artistic creation.", "isCorrect": false, "rationale": "While Nietzsche values art, he does not advocate abandoning the pursuit of knowledge but rather pursuing it with greater intellectual honesty."}, {"text": "Only scientific knowledge produced through controlled experiments can overcome the limitations of perspective.", "isCorrect": false, "rationale": "Nietzsche views all knowledge, including science, as being shaped by the knower's drives and context; science does not escape perspectivism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
