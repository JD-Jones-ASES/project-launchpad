        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the 'cultural claim' Nietzsche is making with the statement 'God is dead'?", "options": [{"text": "A metaphysical assertion that a divine entity has physically ceased to exist.", "isCorrect": false, "rationale": "The text explicitly states that Nietzsche is not making a metaphysical claim about the 'furniture of the universe.'"}, {"text": "A triumphant declaration by atheists that science has successfully proven God's non-existence.", "isCorrect": false, "rationale": "Nietzsche argues that God's death is not the result of a proof, but of a slow erosion of faith by culture and science."}, {"text": "A diagnosis of the spiritual condition where the foundational belief that structured Western life has collapsed.", "isCorrect": true, "rationale": "Nietzsche views the death of God as an event in cultural history where the Christian foundation for morality and meaning has crumbled."}, {"text": "A warning to believers that secularism will eventually lead to the physical destruction of religious institutions.", "isCorrect": false, "rationale": "While he mentions churches as tombs, his primary focus is on the collapse of the internal value system, not just external institutions."}]}, {"question": "What is the specific irony Nietzsche highlights regarding the audience of the madman in the marketplace (GS 125)?", "options": [{"text": "The audience is composed of devout believers who refuse to accept the truth of God's death.", "isCorrect": false, "rationale": "The text notes that the madman specifically addresses those who 'did not believe in God.'"}, {"text": "The atheists in the crowd understand the event intellectually but fail to grasp its catastrophic implications.", "isCorrect": true, "rationale": "The atheists laugh because they think they have already reckoned with the lack of God, but they don't realize their moral framework still relies on him."}, {"text": "The marketplace is empty, illustrating that no one is left to hear the message of God's death.", "isCorrect": false, "rationale": "The passage describes a 'hubbub' of people who are actively mocking and questioning the madman."}, {"text": "The audience consists of scientists who are too preoccupied with the laws of nature to listen to philosophy.", "isCorrect": false, "rationale": "The text emphasizes their lack of belief and their superficial treatment of the 'death of God' as a simple intellectual conclusion."}]}, {"question": "How does Nietzsche's use of the 'cave' metaphor in 'The Shadow Lingers' (GS 108) relate to Plato's original Allegory of the Cave?", "options": [{"text": "It reinforces Plato's idea that the philosopher must lead humanity out of the darkness toward the sun of Truth.", "isCorrect": false, "rationale": "Nietzsche is actually inverting Plato's allegory rather than reinforcing its traditional progression."}, {"text": "It suggests that the Christian Church is the only structure capable of providing light once the sun of God has set.", "isCorrect": false, "rationale": "Nietzsche describes the church and moral traditions as the 'cave' where the shadow of God persists, not as a source of light."}, {"text": "It inverts the allegory by suggesting that the 'sun' of Truth was itself a shadow, and no external reality exists outside the cave.", "isCorrect": true, "rationale": "Nietzsche's philosopher finds that the transcendent 'Truth' (the sun) was a construct, meaning there is no escape to a higher metaphysical realm."}, {"text": "It claims that modern science has successfully demolished the cave, leaving humanity in the direct light of nature.", "isCorrect": false, "rationale": "The text emphasizes that even after God's death, his 'shadow' continues to darken thought in the form of old beliefs."}]}, {"question": "In aphorism 109, what does Nietzsche mean by the 'de-deification' of nature?", "options": [{"text": "Applying the laws of physics to prove that nature functions as a perfect, law-abiding machine.", "isCorrect": false, "rationale": "Nietzsche explicitly warns against viewing the universe as a 'machine,' calling that an anthropomorphizing honor."}, {"text": "Viewing nature as a living organism with a central purpose and self-preservative instinct.", "isCorrect": false, "rationale": "Nietzsche finds the idea of the universe as an organism 'disgusting' and a derivative interpretation of the crust of the earth."}, {"text": "Removing human moral and aesthetic judgments, such as 'order' or 'beauty,' from our understanding of the universe.", "isCorrect": true, "rationale": "To naturalize ourselves, we must recognize that the world is 'chaos'—unaffected by our ethical or aesthetic categories."}, {"text": "Recognizing that the stars and galaxies follow a divine, methodical cycle that reflects eternal wisdom.", "isCorrect": false, "rationale": "Nietzsche argues that the 'astral arrangement' is an exception and that the general character of the world is a lack of order and structure."}]}, {"question": "What is the third and most 'paradoxical' rung on Nietzsche's 'ladder of religious cruelty' (GS 55)?", "options": [{"text": "The sacrifice of human beings to a bloodthirsty deity.", "isCorrect": false, "rationale": "This is identified as the first and most primitive rung of the ladder."}, {"text": "The sacrifice of God himself for the sake of 'nothingness' or intellectual honesty.", "isCorrect": true, "rationale": "Nietzsche describes the ultimate cruelty as sacrificing the highest comfort (God) due to the very 'will to truth' religion cultivated."}, {"text": "The sacrifice of one's strongest instincts and natural drives to an ascetic ideal.", "isCorrect": false, "rationale": "This represents the second rung, characteristic of the 'moral epoch' and Christianity."}, {"text": "The sacrifice of science and reason to maintain a fading faith in the divine.", "isCorrect": false, "rationale": "While related to the 'suicide of reason,' this is not the culminating third rung of the ladder of cruelty described in GS 55."}]}, {"question": "Why did Nietzsche view Richard Wagner's opera 'Parsifal' as an 'unforgivable betrayal'?", "options": [{"text": "Wagner adopted a minimalist musical style that Nietzsche found aesthetically inferior to the 'Ring' cycle.", "isCorrect": false, "rationale": "The text specifies that the break was primarily philosophical and personal rather than just about musical technique."}, {"text": "Wagner successfully proved that the Christian God was alive, contradicting Nietzsche's central thesis.", "isCorrect": false, "rationale": "Wagner's work is a drama, not a philosophical proof, and Nietzsche's issue was Wagner's personal 'sinking' back into Christian themes."}, {"text": "It represented a turn toward Christian themes of compassion and renunciation, which Nietzsche saw as 'sinking before the cross.'", "isCorrect": true, "rationale": "Nietzsche felt Wagner abandoned his previous pagan exuberance for the 'religious neurosis' of Christian redemption."}, {"text": "Wagner refused to incorporate Nietzsche's theory of the 'Eternal Recurrence' into the libretto.", "isCorrect": false, "rationale": "While Nietzsche had his own theories, the source material focuses on Wagner's return to Christianity as the cause of the rift."}]}, {"question": "Which of the following best describes Nietzsche's ambivalent attitude toward Blaise Pascal?", "options": [{"text": "He admired Pascal's mathematical genius but dismissed his theological writings as 'northern barbarian' nonsense.", "isCorrect": false, "rationale": "Nietzsche actually respected the sophistication of Pascal's faith, distinguishing it from the 'slave-faith' of Luther."}, {"text": "He viewed Pascal as a tragic example of a great mind that achieved intellectual honesty but ultimately 'suicided' its own reason.", "isCorrect": true, "rationale": "Nietzsche 'almost loved' Pascal for his insights but was horrified by his decision to submit his intellect to the Christian God."}, {"text": "He considered Pascal his greatest ally in the fight against the 'Roman Catholicism of non-faith.'", "isCorrect": false, "rationale": "Nietusalem describes Pascal's faith as a sacrifice of freedom and self-confidence, making him a subject of study, not an ally."}, {"text": "He believed Pascal was the only thinker who successfully avoided the 'religious neurosis.'", "isCorrect": false, "rationale": "Nietzsche uses Pascal as a primary example of the painful subjection of the spirit that characterizes Christian faith."}]}, {"question": "How does Nietzsche evaluate the relationship between the Old Testament and the New Testament in 'Beyond Good and Evil' 52?", "options": [{"text": "He praises the New Testament for its 'book of grace' as the pinnacle of European literary achievement.", "isCorrect": false, "rationale": "Nietzsche refers to the New Testament as a kind of 'rococo of taste' and associates it with 'petty souls.'"}, {"text": "He views the Old Testament as a collection of 'house-animal' myths that lack the grandeur of Greek literature.", "isCorrect": false, "rationale": "He actually claims Greek and Indian literature have nothing to compare to the 'immense scale' of the Old Testament."}, {"text": "He considers the binding of the two into a single 'Bible' to be a 'sin against the Spirit' due to their incompatible scales and tastes.", "isCorrect": true, "rationale": "Nietzsche sees a massive discrepancy between the 'stupendous remains' of the Old Testament and the 'tender, stupid' tone of the New."}, {"text": "He argues that both testaments are equally responsible for the 'slave-insurrection' of the French Revolution.", "isCorrect": false, "rationale": "While he mentions the slave-insurrection, his critique in aphorism 52 is specifically about the literary and cultural mismatch of the two testaments."}]}, {"question": "Nietzsche defines 'Nihilism' as which of the following?", "options": [{"text": "The active destruction of religious buildings and artifacts by secular revolutionaries.", "isCorrect": false, "rationale": "Nihilism is a psychological and cultural condition, not necessarily a program of physical destruction."}, {"text": "A philosophical system that Nietzsche advocates as the final goal of human evolution.", "isCorrect": false, "rationale": "Nietzsche views nihilism as a 'crisis' to be overcome, not a goal to be achieved."}, {"text": "The state where old values have collapsed and no new ones have been created, leading to the feeling that 'everything is meaningless.'", "isCorrect": true, "rationale": "Nihilism is the 'abyss' that opens up when the foundation of God is lost and nothing is built in its place."}, {"text": "The scientific belief that only material matter exists and the soul is an illusion.", "isCorrect": false, "rationale": "While related to the death of God, nihilism is specifically the lack of *meaning* or *value* following that loss, not just a physical theory."}]}, {"question": "In 'What our Cheerfulness Signifies' (GS 343), how does Nietzsche characterize the 'new dawn' following God's death?", "options": [{"text": "A state of pure, bright happiness where all human suffering is immediately resolved.", "isCorrect": false, "rationale": "Nietzsche admits the horizon is 'not bright,' even if it is 'open' once more."}, {"text": "An era of absolute certainty and safety provided by the advancements of modern science.", "isCorrect": false, "rationale": "He describes the new era as a 'sea' where 'every hazard is again permitted,' implying danger rather than safety."}, {"text": "A sense of liberation and expectation that allows 'free spirits' to create new values and explore uncharted horizons.", "isCorrect": true, "rationale": "The death of God is described as 'relief' and 'enlivening' because it opens the 'open sea' for the adventurous thinker."}, {"text": "A period of gloom and eclipse that will inevitably lead to the extinction of the human race.", "isCorrect": false, "rationale": "While he mentions the 'period of gloom,' he contrasts it with the 'cheerfulness' and 'gratitude' of the philosophers."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
