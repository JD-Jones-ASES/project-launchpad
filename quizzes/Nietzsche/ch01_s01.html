<script>
var QUESTIONS = [{"question": "What specific fear regarding his father's death haunted Friedrich Nietzsche throughout his adult life?", "options": [{"text": "That he would succumb to a similar 'softening of the brain' due to genetic inheritance.", "isCorrect": true, "rationale": "Nietzsche's father died from a brain ailment at a young age, leading Friedrich to fear a fatal neurological weakness was part of his own biology."}, {"text": "That he would die in a tragic accident similar to his father's fall.", "isCorrect": false, "rationale": "While some modern scholars suggest a fall may have caused his father's death, Nietzsche's primary dread was centered on the medical diagnosis of neurological decay."}, {"text": "That his father's lack of faith led to his early demise.", "isCorrect": false, "rationale": "His father was actually a Lutheran pastor, and Nietzsche's concerns were physiological and medical rather than spiritual."}, {"text": "That his father's death was caused by the same syphilis he eventually contracted.", "isCorrect": false, "rationale": "While scholars have debated the cause of both men's ailments, the text notes the father's diagnosis was 'softening of the brain,' which fueled Nietzsche's specific fear of inherited weakness."}], "id": "q01"}, {"question": "Which aspect of Nietzsche's education at Schulpforta is credited with permanently shaping his literary prose style?", "options": [{"text": "The rigorous curriculum focused on Greek and Latin.", "isCorrect": true, "rationale": "The school's heavy emphasis on classical philology and ancient texts provided the foundation for his unique and disciplined writing style."}, {"text": "His early attempts at composing complex musical scores.", "isCorrect": false, "rationale": "Though he composed music before age $10$, the text specifically links his prose style to the classical curriculum at Schulpforta."}, {"text": "The influence of his classmates who dubbed him 'the little pastor.'", "isCorrect": false, "rationale": "This nickname referred to his childhood piety and ability to recite scripture, rather than the development of his later philosophical prose."}, {"text": "His exposure to German nationalist theology during the Prussian era.", "isCorrect": false, "rationale": "While he studied theology, the text highlights the classical languages as the primary influence on his style."}], "id": "q02"}, {"question": "What was unique about Nietzsche's appointment to the chair of classical philology at the University of Basel in $1869$?", "options": [{"text": "He was appointed at age $24$ without having completed a doctoral dissertation.", "isCorrect": true, "rationale": "Ritschl's high recommendation led the university to grant him the degree retroactively based on his published work, making him the youngest person in the chair."}, {"text": "He was the first philosopher to ever hold a chair in the philology department.", "isCorrect": false, "rationale": "Nietzsche was appointed specifically as a philologist; his transition toward professional philosophy happened later during his tenure at Basel."}, {"text": "He was the first German citizen to hold a professorship at a Swiss university.", "isCorrect": false, "rationale": "The text focuses on his age and academic credentials rather than his nationality as the unprecedented factor of his appointment."}, {"text": "He was required to teach music theory alongside classical rhetoric.", "isCorrect": false, "rationale": "Although he was a composer, his academic duties were strictly centered on Greek tragedy, rhetoric, and philology."}], "id": "q03"}, {"question": "How did Nietzsche's eventual philosophical stance differ from that of Arthur Schopenhauer?", "options": [{"text": "Nietzsche sought to affirm life and its suffering, while Schopenhauer advocated for the denial of the will to live.", "isCorrect": true, "rationale": "Nietzsche initially followed Schopenhauer's analysis of the blind 'Will' but eventually rejected the resulting pessimism in favor of life-affirmation."}, {"text": "Nietzsche believed the 'Will' was rational and purposive, unlike Schopenhauer's blind 'Will.'", "isCorrect": false, "rationale": "Both agreed the 'Will' was underlying and irrational; they disagreed on how humans should respond to that reality."}, {"text": "Nietzsche argued that aesthetic contemplation was the only way to escape suffering.", "isCorrect": false, "rationale": "Aesthetic contemplation was actually Schopenhauer's suggested temporary solution to the strive of the Will."}, {"text": "Schopenhauer viewed the world as a place of joy, whereas Nietzsche introduced the concept of universal suffering.", "isCorrect": false, "rationale": "It was Schopenhauer who was the pessimist, arguing that existence is fundamentally suffering because the Will can never be satisfied."}], "id": "q04"}, {"question": "What was the final 'breaking point' that ended the friendship between Nietzsche and Richard Wagner?", "options": [{"text": "Wagner's opera $Parsifal$, which Nietzsche interpreted as a surrender to Christian values.", "isCorrect": true, "rationale": "Nietzsche saw the religious themes in $Parsifal$ as Wagner 'kneeling before the cross,' which contradicted Nietzsche's own 'war' on Christianity."}, {"text": "Wagner's refusal to support Nietzsche's first book, 'The Birth of Tragedy.'", "isCorrect": false, "rationale": "Actually, the book was initially a 'love letter' to Wagner's vision, and Wagner valued Nietzsche's intellectual support early on."}, {"text": "Nietzsche's romantic interest in Wagner's partner, Cosima.", "isCorrect": false, "rationale": "While their relationships were complex, the primary intellectual and philosophical break was triggered by Wagner's ideological and artistic shifts."}, {"text": "A dispute over the funding of the $Der Ring des Nibelungen$ cycle.", "isCorrect": false, "rationale": "The conflict was deeply ideological—involving nationalism and religion—rather than financial."}], "id": "q05"}, {"question": "Which factor most significantly contributed to the distortion of Nietzsche's legacy after his mental collapse?", "options": [{"text": "The editing and selective arrangement of his notebooks by his sister to support anti-Semitic and nationalist views.", "isCorrect": true, "rationale": "Elisabeth Förster-Nietzsche manipulated the unpublished notes that became 'The Will to Power' to align with her own radical ideologies."}, {"text": "The loss of his original manuscripts during his 'wandering years' in Switzerland.", "isCorrect": false, "rationale": "His major works were published or preserved; the distortion occurred through the intentional curation of his unpublished materials after $1889$."}, {"text": "His own 'madness letters' which completely invalidated his previous philosophical claims.", "isCorrect": false, "rationale": "While the letters were bizarre, scholars distinguish his late-stage breakdown from his lucid, productive philosophical period."}, {"text": "The refusal of the University of Basel to acknowledge his later works.", "isCorrect": false, "rationale": "Nietzsche had already resigned from Basel in $1879$; the institution's involvement was not the primary cause of his posthumous reputation damage."}], "id": "q06"}, {"question": "The famous $1882$ photograph of Lou Salomé, Paul Rée, and Nietzsche is described as an 'ironic provocation' because:", "options": [{"text": "It was staged by Nietzsche himself and features a playful inversion of power roles with a whip.", "isCorrect": true, "rationale": "The image challenges the view of Nietzsche as a simple misogynist by showing him and Rée in harness, staged as a self-aware joke."}, {"text": "It captures the exact moment Salomé rejected Nietzsche's proposal of marriage.", "isCorrect": false, "rationale": "The photograph was a staged intellectual performance by the 'holy trinity' rather than a spontaneous capture of a rejection."}, {"text": "It was taken without Nietzsche's knowledge to mock his philosophy of hardness.", "isCorrect": false, "rationale": "Nietzsche actually suggested the staging of the photo, indicating his participation and creative input."}, {"text": "It depicted the 'holy trinity' as religious figures to spite the church.", "isCorrect": false, "rationale": "The term 'holy trinity' was their own nickname for their intellectual commune, but the photo itself was a secular, gender-role-reversing provocation."}], "id": "q07"}, {"question": "What was the nature of the $Nueva Germania$ colony founded by Nietzsche's brother-in-law, Bernhard Förster?", "options": [{"text": "An attempted racially 'pure' Aryan settlement in Paraguay that Nietzsche considered idiotic.", "isCorrect": true, "rationale": "Förster was an anti-Semitic agitator whose colonial scheme was despised by Nietzsche and ultimately failed."}, {"text": "An intellectual commune designed to put Nietzsche's $Zarathustra$ into practice.", "isCorrect": false, "rationale": "Nietzsche had no part in the colony and actively criticized the anti-Semitism that motivated it."}, {"text": "A successful agricultural cooperative that funded the Nietzsche Archive.", "isCorrect": false, "rationale": "The colony was a disaster, leading to Förster's probable suicide, and did not benefit Nietzsche's work during his life."}, {"text": "A sanctuary in the Swiss Alps where Nietzsche wrote his final books.", "isCorrect": false, "rationale": "The colony was located in South America (Paraguay), while Nietzsche spent his wandering years in Europe."}], "id": "q08"}, {"question": "Despite severe illness and poor book sales, how is the decade between $1879$ and $1889$ characterized in Nietzsche's life?", "options": [{"text": "As a period of staggering productivity where he wrote his most influential works.", "isCorrect": true, "rationale": "Free from teaching, Nietzsche wrote $Thus Spoke Zarathustra$, $Beyond Good and Evil$, and $The Genealogy of Morals$ during this painful decade."}, {"text": "As a time of academic resurgence where he returned to teach at Leipzig.", "isCorrect": false, "rationale": "Nietzsche lived as a wanderer with no academic position after resigning from Basel due to health issues."}, {"text": "As a decade spent largely in silence as he descended into early-onset dementia.", "isCorrect": false, "rationale": "His total mental collapse did not occur until $1889$; the preceding decade was actually his most vocal and explosive period."}, {"text": "As a period of immense wealth gained from the popularity of $The Gay Science$.", "isCorrect": false, "rationale": "His books sold very few copies; $Beyond Good and Evil$ famously sold fewer than $200$ copies in its first year."}], "id": "q09"}, {"question": "What is the significance of the book $The Will to Power$ in the context of Nietzsche's bibliography?", "options": [{"text": "It is a posthumous compilation of notes that was heavily altered by his sister Elisabeth.", "isCorrect": true, "rationale": "Elisabeth Förster-Nietzsche edited and arranged unpublished fragments to create a systematic work that supported her own nationalist views."}, {"text": "It was Nietzsche's final completed manuscript before his collapse in Turin.", "isCorrect": false, "rationale": "The work was never a completed book by Nietzsche; it was a construction created from his notebooks after he lost his sanity."}, {"text": "It represents his definitive rejection of Schopenhauer's concept of the Will.", "isCorrect": false, "rationale": "While he did reject Schopenhauer, 'The Will to Power' is specifically notable for being a compromised and tendentious posthumous edit."}, {"text": "It was the only book Nietzsche self-published using his own funds.", "isCorrect": false, "rationale": "Nietzsche helped cover costs for several of his books, but 'The Will to Power' was published by his sister after his death."}], "id": "q10"}, {"question": "What drew Nietzsche to Schulpforta, and which famous alumni preceded him at that institution?", "options": [{"text": "He won a scholarship at age fourteen; alumni included Fichte, Novalis, and Ranke.", "isCorrect": true, "rationale": "Founded in a former Cistercian monastery in 1543, Schulpforta had educated major figures of German intellectual life before Nietzsche arrived."}, {"text": "His father enrolled him as a charity student; alumni included Schopenhauer and Kant.", "isCorrect": false, "rationale": "Nietzsche won the place through merit on a scholarship; Schopenhauer and Kant were not listed as Schulpforta alumni."}, {"text": "His mother paid his tuition; alumni included Wagner, Bismarck, and Goethe.", "isCorrect": false, "rationale": "He earned his place through scholarship, and the text cites Fichte, Novalis, and Ranke—not Wagner or political figures—as notable alumni."}, {"text": "He was recruited by the headmaster after publishing poetry; alumni included Hegel and Schiller.", "isCorrect": false, "rationale": "The text records a scholarship competition, not recruitment, and does not list Hegel or Schiller as alumni."}], "id": "q11"}, {"question": "How did Lou Salomé's life unfold after her rejection of Nietzsche, according to the source?", "options": [{"text": "She became a novelist, psychoanalyst, and close associate of both Freud and Rilke.", "isCorrect": true, "rationale": "Lou Andreas-Salomé went on to an extraordinarily productive intellectual life, publishing widely and practicing psychoanalysis."}, {"text": "She married Paul Rée and spent the rest of her life caring for him until his death.", "isCorrect": false, "rationale": "She did not marry Rée; she published her own works independently and became a figure in her own right."}, {"text": "She returned to Russia and largely disappeared from European intellectual life.", "isCorrect": false, "rationale": "Salomé remained active in European intellectual circles, with connections to Freud and Rilke documented in the text."}, {"text": "She published a biography attacking Nietzsche's philosophy as dangerous to women.", "isCorrect": false, "rationale": "Her 1894 book $Friedrich Nietzsche in seinen Werken$ was one of the first serious studies of his thought, not an attack."}], "id": "q12"}, {"question": "Which details surrounding Nietzsche's mental collapse in Turin in January $1889$ does the source acknowledge as possibly apocryphal?", "options": [{"text": "The story that he threw his arms around a beaten horse's neck before collapsing.", "isCorrect": true, "rationale": "The earliest sources for this story are secondhand, yet the image has become iconic because it captures the philosopher of hardness undone by an act of compassion."}, {"text": "The fact that he sent bizarre 'madness letters' signed as 'Dionysos' or 'The Crucified.'", "isCorrect": false, "rationale": "The letters themselves are documented; it is the horse episode that the text specifically flags as possibly apocryphal."}, {"text": "The claim that Elisabeth immediately took control of the Nietzsche Archive after the collapse.", "isCorrect": false, "rationale": "Elisabeth's takeover of the Archive is presented as fact; only the horse-embracing incident is qualified as potentially apocryphal."}, {"text": "The assertion that Nietzsche died on August 25, 1900, at the age of fifty-five.", "isCorrect": false, "rationale": "The text states his death date as established fact; it is the manner of his collapse that is described with qualified uncertainty."}], "id": "q13"}, {"question": "What relationship did Nietzsche's childhood household in Naumburg have to gender composition, and how does the text frame this detail?", "options": [{"text": "He was raised in a household of women—mother, grandmother, two aunts, and sister—presented as an ironic biographical fact.", "isCorrect": true, "rationale": "The text notes that a philosopher later accused of misogyny grew up surrounded primarily by women, inviting the reader to consider the irony."}, {"text": "He lived with several male tutors who introduced him to classical philosophy at an early age.", "isCorrect": false, "rationale": "The text describes a female-dominated household after his father's death; male tutors are not mentioned."}, {"text": "His household was exclusively male after his sister left for boarding school.", "isCorrect": false, "rationale": "The text describes the opposite: a female-dominated household with Elisabeth remaining present alongside the mother and aunts."}, {"text": "He grew up in a mixed clergy household, with both male and female religious instructors.", "isCorrect": false, "rationale": "While his family was steeped in Protestant piety, the text describes a household of women, not clergy instructors."}], "id": "q14"}, {"question": "What does the source cite as the medical explanation that Elisabeth Förster-Nietzsche tried to conceal regarding her husband Bernhard Förster's death in Paraguay?", "options": [{"text": "That he died by suicide, though Elisabeth attempted to hide this fact.", "isCorrect": true, "rationale": "The text states that Förster died in Paraguay in 1889—probably by suicide—and that Elisabeth tried to conceal the manner of his death."}, {"text": "That he was murdered by colonists who resisted his anti-Semitic leadership.", "isCorrect": false, "rationale": "The text does not suggest murder; it specifically points to suicide as the probable cause, which Elisabeth tried to suppress."}, {"text": "That he died of tropical disease contracted while surveying the Paraguayan wilderness.", "isCorrect": false, "rationale": "Disease is not mentioned; the text focuses on probable suicide as the cause Elisabeth tried to conceal."}, {"text": "That he died in a financial scandal that bankrupted $Nueva Germania$.", "isCorrect": false, "rationale": "While the colony was a disaster, the text specifically cites suicide as the probable cause of death, not a financial scandal."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
