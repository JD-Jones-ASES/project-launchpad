<script>
var QUESTIONS = [{"question": "In Nietzsche's analysis, why is forgetfulness considered an 'active' and 'positive' power rather than a simple failure of memory?", "options": [{"text": "It serves as a form of 'psychic absorption' that allows the mind to make room for new and higher functions.", "isCorrect": true, "rationale": "Nietzsche argues that active forgetfulness acts as a sentinel of order, providing the 'quietude' necessary for the organism's higher functionaries to govern."}, {"text": "It is a biological defense mechanism intended to protect the individual from the trauma of prehistoric punishment.", "isCorrect": false, "rationale": "While memory is linked to pain, Nietzsche characterizes forgetfulness as a positive force for health and 'digestion' of experience, not merely a response to trauma."}, {"text": "It represents the 'vis inertiae' or the natural tendency of the human mind to remain in a state of rest.", "isCorrect": false, "rationale": "Nietzsche explicitly rejects the idea that forgetfulness is a passive force of inertia, calling that view superficial."}, {"text": "It allows the 'sovereign individual' to ignore the 'morality of custom' and act on immediate impulse.", "isCorrect": false, "rationale": "The sovereign individual is defined by the power to overcome immediate impulse with a 'long will,' which requires keeping forgetfulness in check."}], "id": "q01"}, {"question": "What does Nietzsche identify as the 'ripest fruit' of the long historical process of the 'morality of custom'?", "options": [{"text": "The development of a universal system of objective justice and equity.", "isCorrect": false, "rationale": "Justice and equity are discussed as early developments of the creditor-debtor relationship, but they are not the ultimate 'fruit' of the process."}, {"text": "The 'sovereign individual' who has earned the right to make promises and is master of their own will.", "isCorrect": true, "rationale": "The sovereign individual is the autonomous being who emerges at the end of social discipline, possessing a 'proud consciousness' of their power over self and fate."}, {"text": "The 'bad conscience' which allows for the creation of the human soul and interiority.", "isCorrect": false, "rationale": "Bad conscience is described as a 'serious illness' or a 'womb,' rather than the 'ripest fruit' of the morality of custom."}, {"text": "The Christian concept of 'love' and 'redemption' as a solution to human suffering.", "isCorrect": false, "rationale": "Nietzsche views Christian redemption as a 'paradoxical and awful' interpretation of guilt, not the successful culmination of breeding a reliable animal."}], "id": "q02"}, {"question": "How does Nietzsche explain the origin of the human 'soul' or the 'inner world'?", "options": [{"text": "It was a gradual evolutionary adaptation to allow for complex linguistic communication.", "isCorrect": false, "rationale": "Nietzsche describes the shift as a sudden 'break' or 'jump' caused by social enclosure, not a gradual adaptation."}, {"text": "It was granted by the 'divine spectators' to make the drama of human existence more interesting.", "isCorrect": false, "rationale": "Nietzsche mentions 'divine spectators' only as a metaphor for the profound nature of the internal change, not as its cause."}, {"text": "It arose through the 'internalization' of aggressive instincts that could no longer be discharged outwardly.", "isCorrect": true, "rationale": "When humans were enclosed in society, their instincts of cruelty and domination turned inward, creating the depth and 'height' of the inner world."}, {"text": "It was the result of the 'priestly interpretation' of the creditor-debtor relationship.", "isCorrect": false, "rationale": "The priestly interpretation moralizes guilt, but the 'soul' itself is born from the initial internalization of animal instincts."}], "id": "q03"}, {"question": "According to the genealogical method, what is the relationship between the 'procedure' of punishment and its 'meaning'?", "options": [{"text": "The meaning is fixed by the original intent of the lawgiver, while the procedure changes over time.", "isCorrect": false, "rationale": "Nietzsche argues the opposite: the procedure is relatively permanent, while the meaning is 'fluid' and constantly reinterpreted."}, {"text": "The procedure is older than its utilization in punishment and has been impressed with many different meanings by the 'Will to Power'.", "isCorrect": true, "rationale": "Nietzsche emphasizes that functions are shifted and adjusted by superior forces, meaning a single act (like imprisonment) can have a 'whole synthesis' of meanings."}, {"text": "The procedure and meaning are 'toto coelo' identical, as the act of punishing is inseparable from the concept of justice.", "isCorrect": false, "rationale": "Nietzsche argues they are 'toto coelo' (heaven and earth) opposed and must be kept distinct in historical analysis."}, {"text": "The meaning of punishment is primarily to excite a 'consciousness of guilt' or 'bad conscience' in the criminal.", "isCorrect": false, "rationale": "Nietzsche explicitly rejects this 'popular' view, arguing that punishment usually hardens and numbs rather than creating remorse."}], "id": "q04"}, {"question": "In the primitive creditor-debtor relationship, what served as the 'equivalent' or compensation if the debtor could not pay back a material debt?", "options": [{"text": "The debtor would offer a public apology and a promise to work as a slave for a fixed term.", "isCorrect": false, "rationale": "While slavery is mentioned, the core 'equivalent' in the oldest relationship was the right to inflict suffering."}, {"text": "The creditor was granted the pleasure of inflicting suffering and 'making suffer' on the body of the debtor.", "isCorrect": true, "rationale": "Nietzsche argues that the pleasure of cruelty was viewed as a valid form of compensation for material loss, forming the basis of 'justice'."}, {"text": "The tribe would collectively assume the debt to maintain the 'equilibrium' of the community.", "isCorrect": false, "rationale": "Nietzsche describes the relationship as individual matching himself against individual, focused on personal settlement rather than collective welfare."}, {"text": "The debtor was forced to experience 'bad conscience' and 'remorse' as spiritual repayment.", "isCorrect": false, "rationale": "Nietzsche argues that bad conscience is a much later historical development; primitive debt was settled through physical pain, not inner guilt."}], "id": "q05"}, {"question": "Nietzsche describes the 'State' as appearing as a 'ghastly tyranny.' What group of people does he identify as the originators of this 'State'?", "options": [{"text": "A class of 'priests' who used 'bad conscience' to manipulate the masses into obedience.", "isCorrect": false, "rationale": "The priests exploit bad conscience later, but the State itself begins with 'conquerors' who lack bad conscience."}, {"text": "Rational citizens who entered into a 'social contract' to protect their mutual interests.", "isCorrect": false, "rationale": "Nietzsche explicitly dismisses the 'fantastic theory' of the social contract as being disposed of by the reality of command."}, {"text": "A 'herd of blonde beasts of prey,' a race of conquerors who impose form on a nomad population through 'artist violence'.", "isCorrect": true, "rationale": "Nietzsche describes the founders of the State as masters by nature who come 'like fate' and create a scheme of sovereignty through instinctive force."}, {"text": "The 'sovereign individuals' who sought to create a stable environment for their promises.", "isCorrect": false, "rationale": "Sovereign individuals are the 'ripest fruit' of a long process that *begins* with the violent State; they do not create it."}], "id": "q06"}, {"question": "What 'stroke of genius' does Nietzsche attribute to Christianity regarding the problem of inexpiable guilt?", "options": [{"text": "The doctrine that humans can reach 'second innocence' through the total rejection of material debt.", "isCorrect": false, "rationale": "Second innocence is associated with atheism and the decay of belief in God, not Christian doctrine."}, {"text": "The idea of 'original sin,' which makes every human being permanently indebted to their ancestors.", "isCorrect": false, "rationale": "Original sin is the 'prison' of the debt, but the 'stroke of genius' refers specifically to the method of 'alleviation' or payment."}, {"text": "The move where God sacrifices himself to pay the debt of man, the creditor playing scapegoat for his own debtor.", "isCorrect": true, "rationale": "Nietzsche sees the concept of God paying himself 'out of a pound of his own flesh' as a paradoxical way to carry martyrdom to its highest pitch."}, {"text": "The invention of 'purgatory' as a temporal alternative to the 'adamantine impossibility' of eternal hell.", "isCorrect": false, "rationale": "The text focuses on the extreme tension of 'eternal punishment' and the paradoxical role of the 'holy God' as creditor."}], "id": "q07"}, {"question": "How does the 'sovereign individual's' use of the word 'conscience' differ from the 'bad conscience' Nietzsche discusses later in the text?", "options": [{"text": "The sovereign individual's conscience is a 'dominating instinct' of self-mastery and pride, not a feeling of internal guilt.", "isCorrect": true, "rationale": "For the sovereign man, conscience is the 'proud knowledge' of his extraordinary privilege of responsibility and power over fate."}, {"text": "The sovereign individual's conscience is grounded in Kantian rational duty rather than instinct.", "isCorrect": false, "rationale": "The text explicitly notes how different Nietzsche's autonomy is from Kant's rational duty, grounding it instead in power."}, {"text": "The sovereign individual has no conscience because they have 'got loose from the morality of custom'.", "isCorrect": false, "rationale": "While they have moved beyond 'custom,' Nietzsche says they possess a 'rare freedom' which they call their 'conscience'."}, {"text": "There is no difference; Nietzsche uses the terms interchangeably to describe the 'illness' of civilization.", "isCorrect": false, "rationale": "Nietzsche distinguishes the 'proud fruit' of the sovereign conscience from the 'disease' of bad conscience caused by internalized aggression."}], "id": "q08"}, {"question": "What historical transition led to the 'moralization' of debt into the concept of 'original sin'?", "options": [{"text": "The transition from the 'morality of custom' to the 'sovereign individual's' autonomy.", "isCorrect": false, "rationale": "This transition explains the origin of responsibility, but not the specific religious concept of 'sin'."}, {"text": "The projection of debt to ancestors onto the relationship with the divine, making the debt 'infinite' and 'inexpiable'.", "isCorrect": true, "rationale": "Nietzsche describes how the fear of ancestors grows into the fear of a God, and eventually, the debt becomes so large it can never be paid."}, {"text": "The discovery of 'mnemotechnics' by the first-born sons who were traditionally sacrificed.", "isCorrect": false, "rationale": "Mnemotechnics is the *tool* (pain) used to create memory, not the historical transition that moralized guilt."}, {"text": "The abolition of the 'creditor-debtor' relationship in civil law, which forced guilt into the subconscious.", "isCorrect": false, "rationale": "Guilt was moralized by *interpreting* the civil relationship into a religious one, not by abolishing it."}], "id": "q09"}, {"question": "Nietzsche argues that 'atheism and a kind of second innocence complement and supplement each other.' What logic supports this conclusion?", "options": [{"text": "Atheism allows for a return to 'active forgetfulness' by removing the 'creditor' to whom man is perpetually indebted.", "isCorrect": true, "rationale": "Nietzsche suggests that as belief in the Christian God decays, the 'incubus' of unpaid debt and the feeling of 'ought' will also wither away."}, {"text": "Atheists are naturally more forgetful and therefore cannot keep the promises required for social guilt.", "isCorrect": false, "rationale": "Atheism is described as a historical consequence of the decay of belief, not as a biological trait of being forgetful."}, {"text": "Without God, the 'blonde beasts of prey' can finally return to their original nomad state without the constraints of law.", "isCorrect": false, "rationale": "While the decay of God removes debt, it does not necessarily revert humanity to a prehistoric state; the 'soul' created by internalization remains."}, {"text": "Innocence is only possible if the 'sovereign individual' can successfully ignore the 'bad conscience' of society.", "isCorrect": false, "rationale": "Nietzsche links 'second innocence' specifically to the removal of the 'cause prima' or the 'creditor' found in the religious hypothesis."}], "id": "q10"}, {"question": "Nietzsche describes 'mnemotechnics' as the foundational tool for creating human memory. What does this concept reveal about the origin of our capacity to make promises?", "options": [{"text": "Memory was cultivated through repetitive religious rituals that reinforced tribal traditions.", "isCorrect": false, "rationale": "While religion is related to this history, Nietzsche's specific claim about mnemotechnics focuses on pain as the direct mechanism, before religious institutions developed."}, {"text": "The capacity for keeping promises required that pain be used to 'burn' obligations into the memory so they could not be forgotten.", "isCorrect": true, "rationale": "Nietzsche argues that nothing is ever remembered unless it was first made painful — 'if something is to stay in the memory, it must be burned in.'"}, {"text": "Memory emerged as an unintended consequence of the creditor-debtor relationship, not through deliberate training.", "isCorrect": false, "rationale": "Nietzsche describes mnemotechnics as an active process — a technique deliberately used to make things unforgettable."}, {"text": "Promise-keeping capacity evolved independently of pain through increasing social complexity.", "isCorrect": false, "rationale": "Nietzsche's position is the opposite: social complexity required memory, and memory required pain as its precondition."}], "id": "q11"}, {"question": "Nietzsche uses the phrase 'toto coelo' to describe the relationship between the procedure and meaning of punishment. What does this Latin phrase signify in this context?", "options": [{"text": "That punishment and meaning are as different as heaven and earth — completely opposed rather than inherently connected.", "isCorrect": true, "rationale": "'Toto coelo' literally means 'by the whole heavens' and is used to indicate total, absolute opposition. The procedure (what is done) and the meaning (why it is done) are entirely separate historical questions."}, {"text": "That punishment must be carried out in public under open sky ('total coelum') to have social effect.", "isCorrect": false, "rationale": "This misreads the Latin phrase as a prescription about location; 'toto coelo' is a philosophical idiom meaning 'by the whole heavens apart' or completely different."}, {"text": "That the meaning of punishment is fixed eternally in natural law, beyond the reach of historical change.", "isCorrect": false, "rationale": "Nietzsche's point is precisely the opposite — that meaning is fluid and historically variable, not fixed."}, {"text": "That only celestial or divine authority can legitimately assign meaning to acts of punishment.", "isCorrect": false, "rationale": "Nietzsche rejects divine grounding for punishment; meanings are assigned by shifting configurations of power, not by God."}], "id": "q12"}, {"question": "What does Nietzsche mean when he says the founders of the State were 'unconscious and involuntary artists'?", "options": [{"text": "They had aesthetic intentions but expressed them through political forms rather than painting or sculpture.", "isCorrect": false, "rationale": "The 'artist' metaphor refers to the creative act of imposing form on raw material, not to a deliberate aesthetic program."}, {"text": "They created the first social 'forms' and structures through instinctive force, without any premeditated plan or social contract.", "isCorrect": true, "rationale": "Nietzsche uses 'artist' to describe the imposition of form on chaos; the blonde beasts stamped their imprint on populations 'like fate,' not through deliberation."}, {"text": "Their violence was 'artistic' in the sense that it followed rules of proportion and beauty recognizable to later observers.", "isCorrect": false, "rationale": "Nietzsche describes their acts as instinctive and terrifying, not as aesthetically proportioned; the artistry lies in the act of form-giving, not in aesthetic refinement."}, {"text": "They were craftsmen who built physical monuments that later became the basis of civic identity.", "isCorrect": false, "rationale": "The 'artistry' here is metaphorical and political — the creation of social structure — not the construction of monuments."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
