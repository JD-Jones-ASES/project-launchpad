<script>
var QUESTIONS = [{"question": "In the Preface to $Beyond Good and Evil$, Nietzsche uses the metaphor of 'Truth as a woman' primarily to critique which aspect of the Western philosophical tradition?", "options": [{"text": "The lack of interest philosophers have shown toward ontological questions.", "isCorrect": false, "rationale": "Nietzsche's critique is not about a lack of interest, but rather the inappropriate and clumsy nature of the interest philosophers have historically shown."}, {"text": "The dogmatic and heavy-handed methods philosophers have used to 'win' the truth.", "isCorrect": true, "rationale": "Nietzsche suggests that philosophers, as dogmatists, have been 'unskilled and unseemly' in their approaches, failing to understand that truth might resist such direct force."}, {"text": "The exclusion of female perspectives from the development of logic and ethics.", "isCorrect": false, "rationale": "While the metaphor uses gendered imagery, Nietzsche's specific target is the dogmatic methodology of philosophers, not social inclusivity in the academic field."}, {"text": "The belief that truth is a grammatical construct rather than a physical reality.", "isCorrect": false, "rationale": "Although Nietzsche discusses grammar elsewhere, this specific metaphor focuses on the failure of the dogmatic 'courtship' of truth."}], "id": "q01"}, {"question": "What does Nietzsche identify as the 'fundamental belief of metaphysicians' that he argues must be critically questioned?", "options": [{"text": "The belief in the existence of a material world independent of the mind.", "isCorrect": false, "rationale": "Nietzsche is less concerned here with external world realism than with the underlying value structures of metaphysical thought."}, {"text": "The belief in the antitheses of values.", "isCorrect": true, "rationale": "Nietzsche challenges the assumption that 'good' things must have a different origin than 'evil' things, suggesting they may be essentially identical or knotted together."}, {"text": "The belief that sensory experience is the only source of reliable data.", "isCorrect": false, "rationale": "Metaphysicians are typically associated with 'Pure Spirit' or 'Thing-in-itself' rather than strict empiricism, which Nietzsche also critiques."}, {"text": "The belief that language is an accurate mirror of reality.", "isCorrect": false, "rationale": "While he critiques the 'deception of grammar,' he identifies the specific valuation of opposites as the 'typical prejudice' of metaphysicians."}], "id": "q02"}, {"question": "According to Nietzsche's argument in BGE 4, why should we potentially value 'untruth' or 'false judgments'?", "options": [{"text": "Because truth is ultimately a subjective social contract with no objective basis.", "isCorrect": false, "rationale": "This reflects a relativist position that Nietzsche bypasses in favor of a biological or 'life-centered' justification."}, {"text": "Because certain logical fictions are conditions for life and species-preservation.", "isCorrect": true, "rationale": "Nietzsche argues that without 'counterfeiting the world' through numbers and categories, human life as we know it would not be possible."}, {"text": "Because being deceived leads to a more pleasurable and happy existence.", "isCorrect": false, "rationale": "Nietzsche's criterion is 'life-furthering' or 'species-rearing,' which is distinct from simple hedonistic pleasure."}, {"text": "Because the pursuit of truth is a psychological burden that causes nihilism.", "isCorrect": false, "rationale": "While the pursuit of truth can have negative effects, his point in BGE 4 is specifically about the 'indispensability' of certain false opinions for survival."}], "id": "q03"}, {"question": "When Nietzsche claims that every great philosophy has been 'the confession of its originator,' what is he suggesting about philosophical systems?", "options": [{"text": "They are deliberate attempts to deceive the public about the philosopher's true life.", "isCorrect": false, "rationale": "He describes this confession as 'involuntary and unconscious,' not a calculated or deceptive strategy."}, {"text": "They are objective discoveries about the universe that reflect the philosopher's genius.", "isCorrect": false, "rationale": "Nietzsche explicitly denies that these are disinterested investigations or objective discoveries."}, {"text": "They are projections of the philosopher's own moral character and inner hierarchy of impulses.", "isCorrect": true, "rationale": "He argues that the 'moral (or immoral) purpose' is the true germ from which the entire philosophical plant grows."}, {"text": "They are historical records of the scientific consensus of the philosopher's era.", "isCorrect": false, "rationale": "Nietzsche differentiates the 'philosopher' from the 'scholar' or scientific man, noting that for the philosopher, nothing is impersonal."}], "id": "q04"}, {"question": "Nietzsche critiques the Stoic imperative to 'live according to Nature' by pointing out that:", "options": [{"text": "Nature is inherently rational and the Stoics merely failed to follow its logic.", "isCorrect": false, "rationale": "Nietzsche describes nature as 'boundlessly indifferent' and 'without purpose,' rejecting the idea that it is rational in a human sense."}, {"text": "The Stoics first projected their own values onto nature and then claimed to 'find' them there.", "isCorrect": true, "rationale": "He calls them 'self-deluders' who want nature to be 'according to the Stoa' so they can see their own image reflected in the cosmos."}, {"text": "Stoicism is too physically demanding for most humans to actually achieve.", "isCorrect": false, "rationale": "His critique is philosophical and psychological, focusing on the circular logic of their 'will to creation of the world.'"}, {"text": "Nature is a chaotic force that can only be understood through modern science.", "isCorrect": false, "rationale": "While he notes nature's indifference, his point is that the Stoic attempt to mandate nature is a form of 'tyranny' over themselves."}], "id": "q05"}, {"question": "What is Nietzsche's primary objection to Descartes' famous assertion, $Cogito ergo sum$ ('I think, therefore I am')?", "options": [{"text": "He argues that 'thinking' is an illusion and that only 'willing' is real.", "isCorrect": false, "rationale": "Nietzsche also critiques the 'superstition' of the will, calling it a 'unity only in name' rather than an immediate certainty."}, {"text": "He believes that Descartes failed to prove that the mind is separate from the body.", "isCorrect": false, "rationale": "While Nietzsche has views on the body, his specific critique of the Cogito focuses on the grammatical and metaphysical assumptions behind the word 'I'."}, {"text": "He contends that the 'I' as the cause of thought is a smuggled grammatical assumption, not an immediate certainty.", "isCorrect": true, "rationale": "Nietzsche points out that 'one thinks,' but asserting that this 'one' is the 'ego' is a supposition based on linguistic habits."}, {"text": "He asserts that existence precedes thought, making the logical order of the statement backwards.", "isCorrect": false, "rationale": "Nietzsche's critique is more radical; he questions whether there is a unified subject behind the activity of thinking at all."}], "id": "q06"}, {"question": "How does Nietzsche's concept of the $Wille zur Macht$ (Will to Power) function as an explanatory tool for philosophy?", "options": [{"text": "It explains why philosophers seek to gain political control over the state.", "isCorrect": false, "rationale": "Nietzsche uses 'power' in a more spiritualized sense, referring to the drive to master reality through intellectual creation, not just politics."}, {"text": "It is the drive to master and shape reality by forcing it into intelligible categories and systems.", "isCorrect": true, "rationale": "Philosophy is described as the 'most spiritual Will to Power,' where the thinker attempts to dictate their ideals to the world."}, {"text": "It is a biological instinct that only the 'new' philosophers will possess.", "isCorrect": false, "rationale": "Nietzsche argues that all living things—and all previous philosophies—are expressions of the will to power, though they may not admit it."}, {"text": "It serves as a replacement for the scientific method in discovering objective truths.", "isCorrect": false, "rationale": "The Will to Power is a diagnosis of why we philosophize, not a methodology for finding traditional objective truth."}], "id": "q07"}, {"question": "In the context of Nietzsche's perspectivism, what is the significance of the Greek word $aletheia$ being grammatically feminine?", "options": [{"text": "It represents the only 'pure' version of truth that Nietzsche accepts.", "isCorrect": false, "rationale": "Nietzsche does not accept any 'pure' truth; he uses the word's grammatical gender to fuel his metaphor about dogmatism."}, {"text": "It is grammatically feminine, providing a linguistic root for Nietzsche's metaphor of truth as a woman.", "isCorrect": true, "rationale": "The text explains that Nietzsche plays on this tradition to mock philosophers who treat truth as something to be 'won' or possessed."}, {"text": "It literally means 'the will to power,' connecting his key concepts to ancient Greece.", "isCorrect": false, "rationale": "The Greek word for truth literally means 'unconcealedness,' not 'will to power.'"}, {"text": "It is a 'deception of grammar' that led Plato to invent the concept of 'Pure Spirit'.", "isCorrect": false, "rationale": "While Nietzsche critiques Plato's inventions, the feminine gender of the word is specifically linked to his opening metaphor about courtship and dogmatism."}], "id": "q08"}, {"question": "Nietzsche distinguishes between 'scholars' (scientific men) and 'philosophers' by arguing that in the scholar:", "options": [{"text": "There is a genuine, independent 'impulse to knowledge' that functions like a little clock-work.", "isCorrect": true, "rationale": "Nietzsche suggests that the scholar's research might be indifferent to their personal character, unlike the philosopher's system."}, {"text": "The 'will to power' is entirely absent from their work.", "isCorrect": false, "rationale": "Nietzsche views all life as will to power; the scholar's 'little machine' is just a more specialized or limited manifestation of it."}, {"text": "The 'prejudices of philosophers' are even more pronounced than in dogmatists.", "isCorrect": false, "rationale": "Nietzsche actually argues the opposite—that the scholar's interests are often elsewhere (family, money) and their research is less 'personal' than a philosopher's."}, {"text": "They have already reached the state of being 'beyond good and evil'.", "isCorrect": false, "rationale": "Being 'beyond good and evil' is a status Nietzsche reserves for the 'new order of philosophers,' not standard scholarly specialists."}], "id": "q09"}, {"question": "What is the 'dangerous perhaps' that Nietzsche associates with the 'new order of philosophers'?", "options": [{"text": "The possibility that truth is actually impossible for humans to find.", "isCorrect": false, "rationale": "This is a form of skepticism that Nietzsche finds less interesting than the active re-valuation of truth's importance."}, {"text": "The hypothesis that 'evil' and 'selfish' impulses might be more fundamental to life than 'good' ones.", "isCorrect": true, "rationale": "Nietzsche suggests these new philosophers will be willing to investigate whether 'evil' things are essentially identical to 'good' things."}, {"text": "The uncertainty that follows the collapse of all religious systems in Asia and Europe.", "isCorrect": false, "rationale": "While he mentions astrology and the Vedanta, the 'dangerous perhaps' specifically refers to the radical questioning of traditional value-antitheses."}, {"text": "The risk that modern science will eventually disprove the existence of the 'ego'.", "isCorrect": false, "rationale": "Nietzsche himself is the one questioning the 'ego'; the 'perhaps' refers to the willingness to explore the value of the 'opposite' of traditional virtues."}], "id": "q10"}, {"question": "In BGE 4, Nietzsche describes a philosophy that recognizes 'untruth as a condition of life' as having 'placed itself beyond good and evil.' What does this phrase mean in that context?", "options": [{"text": "Such a philosophy has moved beyond the philosopher's traditional equation of truth with good and falsity with evil.", "isCorrect": true, "rationale": "Nietzsche argues that once you accept that falsehoods can be indispensable, you have abandoned the conventional moral coding of truth as good and untruth as evil."}, {"text": "Such a philosophy is morally neutral and has no position on questions of ethics.", "isCorrect": false, "rationale": "'Beyond good and evil' is not moral neutrality; it is the rejection of a specific conventional moral framework, leading to a new engagement with values."}, {"text": "Such a philosophy endorses deception and manipulation as virtues in public life.", "isCorrect": false, "rationale": "Nietzsche is not endorsing lying; he is questioning the simplistic opposition between truth and falsehood as categories of value."}, {"text": "Such a philosophy has transcended human concerns entirely and operates at a divine level.", "isCorrect": false, "rationale": "Nietzsche consistently rejects the divine standpoint; 'beyond good and evil' refers to a revaluation of human moral categories."}], "id": "q11"}, {"question": "Nietzsche labels the phrase $De omnibus dubitandum$ ('Everything is to be doubted') as the motto of Cartesian philosophy. Why does he invoke this alongside his critique of the metaphysician's failure to doubt the antitheses of values?", "options": [{"text": "To show that even Descartes, who championed universal doubt, stopped short of doubting the most fundamental philosophical assumption—the opposition of values.", "isCorrect": true, "rationale": "By citing the Cartesian motto, Nietzsche highlights the irony that philosophers who claimed to doubt everything still left their core value-assumptions unexamined."}, {"text": "To endorse Descartes' method as the correct model for the 'new order of philosophers.'", "isCorrect": false, "rationale": "Nietzsche is criticizing the limitations of Cartesian doubt, not endorsing it as a model."}, {"text": "To demonstrate that Descartes was a proto-Nietzschean who anticipated the will to power.", "isCorrect": false, "rationale": "Nietzsche's treatment of Descartes throughout $BGE$ is critical—he faults the $Cogito$ as a grammatical smuggling operation, not a proto-Nietzschean insight."}, {"text": "To suggest that Latin philosophical mottos are themselves examples of deceptive grammar.", "isCorrect": false, "rationale": "The Latin phrase is cited for its philosophical meaning as a slogan of universal doubt, not as an example of grammatical deception."}], "id": "q12"}, {"question": "Nietzsche refers to dogmatic philosophy as a 'caricature'—an enormous, awe-inspiring preliminary—in comparison to what might come after. What analogy does he use to explain this relationship?", "options": [{"text": "He compares dogmatic philosophy to astrology: a historically necessary illusion that had to exist before genuine science became possible.", "isCorrect": true, "rationale": "Just as astrology preceded astronomy and stimulated the building of grand observatories, dogmatic philosophy served as a caricature that prepared the ground for honest inquiry."}, {"text": "He compares it to Greek tragedy: a beautiful but destructive art form that must be abolished to make way for rational discourse.", "isCorrect": false, "rationale": "Nietzsche's attitude toward tragedy is deeply admiring; he would not frame the relationship as one of abolition."}, {"text": "He compares it to the Stoic ideal: a practical life-guide that became corrupted by abstract metaphysics.", "isCorrect": false, "rationale": "The Stoics are an example of the projection problem, not the astrology analogy about productive historical precursors."}, {"text": "He compares it to religious faith: a comforting error that must be outgrown once the individual matures.", "isCorrect": false, "rationale": "While Nietzsche critiques religion, the specific analogy used in the Preface is astrology and grand architecture, not personal faith development."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
