        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 6, Section 2</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Jean-Paul Sartre's interpretation of radical freedom differ from Nietzsche's original concept of the 'free spirit'?", "options": [{"text": "Sartre argues that freedom is a universal condition of all human beings, whereas Nietzsche views it as a rare achievement for the exceptional few.", "isCorrect": true, "rationale": "Sartre democratizes the concept of freedom by asserting that every human is 'condemned to be free,' unlike Nietzsche’s more exclusionary, aristocratic view."}, {"text": "Sartre believes that freedom is granted by a higher power, while Nietzsche argues it must be seized through intellectual rebellion.", "isCorrect": false, "rationale": "This ignores Sartre's foundational claim that there is no God to provide a script or essence for human life."}, {"text": "Sartre claims that freedom leads to a state of harmony with the universe, a view Nietzsche rejected as naive.", "isCorrect": false, "rationale": "The source material attributes the 'harmony with the universe' perspective to Ralph Waldo Emerson, not Sartre."}, {"text": "Sartre suggests that freedom is a fixed essence of human nature, while Nietzsche views it as a fluid process of becoming.", "isCorrect": false, "rationale": "Sartre explicitly denies that humans have a fixed nature or essence, famously stating that 'existence precedes essence.'"}], "id": "q01"}, {"question": "According to the text, why would Sartre likely characterize Nietzsche's 'aristocratic ranking' of humanity as 'bad faith'?", "options": [{"text": "It denies the inherent capacity for freedom that belongs to every conscious being by categorizing some as naturally inferior.", "isCorrect": true, "rationale": "Sartre's philosophy holds that all conscious beings possess freedom, and denying this capacity in others or oneself is a hallmark of bad faith."}, {"text": "It relies too heavily on religious frameworks that Nietzsche claimed to have destroyed.", "isCorrect": false, "rationale": "Nietzsche was famously anti-religious; Sartre's critique focuses on the refusal to acknowledge universal human freedom rather than religious reliance."}, {"text": "It encourages individuals to seek social validation rather than self-reliance.", "isCorrect": false, "rationale": "Both thinkers emphasized independence from social norms, but Sartre's specific critique of ranking systems involves the denial of shared human agency."}, {"text": "It assumes that individuals are forced to create their own values without a predetermined script.", "isCorrect": false, "rationale": "This is actually a point of agreement between the two thinkers, not a basis for Sartre's critique of Nietzsche."}], "id": "q02"}, {"question": "Which distinct outcome differentiates Emerson's 'Self-Reliance' from Nietzsche's vision of independence?", "options": [{"text": "Emerson believes self-reliance results in cosmic harmony, while Nietzsche associates it with an unbearable solitude.", "isCorrect": true, "rationale": "Emerson maintains an optimistic trust in the universe's order, whereas Nietzsche views the free spirit's path as one of isolation and profound solitude."}, {"text": "Emerson views nonconformity as a path to political power, whereas Nietzsche sees it as a purely intellectual exercise.", "isCorrect": false, "rationale": "The text focuses on intellectual and spiritual independence for both, not the pursuit of political power."}, {"text": "Emerson argues that only the elite can achieve integrity, while Nietzsche advocates for democratic nonconformity.", "isCorrect": false, "rationale": "The text states the opposite: Emerson is described as warm and democratic, while Nietzsche is fierce and aristocratic."}, {"text": "Emerson focuses on the destruction of old values, while Nietzsche focuses exclusively on maintaining inherited frameworks.", "isCorrect": false, "rationale": "Both philosophers value the rejection of conformity; Nietzsche is specifically noted for his celebration of destroying old values to create new ones."}], "id": "q03"}, {"question": "The text argues that Silicon Valley's use of 'disruption' is a 'category error' when labeled as Nietzschean. What is the primary reason for this distinction?", "options": [{"text": "Silicon Valley disruption serves market profit, whereas the Nietzschean free spirit destroys in the service of creating new values.", "isCorrect": true, "rationale": "Nietzsche’s vision is centered on deep intellectual and spiritual work, while modern disruption often focuses on business models without questioning deeper values."}, {"text": "Nietzsche's free spirit seeks to maintain established business models, while disruptors seek to break them.", "isCorrect": false, "rationale": "Nietzsche's free spirit is a destroyer of conventions; the error is not in the 'breaking' but in the motive and the values left untouched."}, {"text": "Technological innovation is inherently more complex than the philosophical tasks Nietzsche proposed.", "isCorrect": false, "rationale": "The text suggests the opposite, describing the work of the free spirit as the 'most demanding intellectual and spiritual work imaginable.'"}, {"text": "Silicon Valley disruptors prioritize solitude and poverty, which contradicts Nietzsche's desire for immediate success.", "isCorrect": false, "rationale": "The text notes that it is the Nietzschean spirit that is willing to be impoverished, while entrepreneurs seek immediate profit."}], "id": "q04"}, {"question": "Which psychological concept is identified as being directly derived from Nietzsche's philosophy?", "options": [{"text": "Alfred Adler's 'will to power'.", "isCorrect": true, "rationale": "The text explicitly links Adler's concept of the 'will to power' to Nietzsche's influence on psychoanalysis."}, {"text": "Sigmund Freud's 'Oedipus complex'.", "isCorrect": false, "rationale": "While Freud acknowledged Nietzsche's insights, the 'will to power' is the specific concept attributed to Adler in the source."}, {"text": "Jean-Paul Sartre's 'existence precedes essence'.", "isCorrect": false, "rationale": "This is a philosophical tenet of existentialism, not a concept from the field of psychoanalysis."}, {"text": "The Silicon Valley 'move fast and break things' ethos.", "isCorrect": false, "rationale": "This is described as a debased popular culture appropriation, not a formal psychoanalytic concept."}], "id": "q05"}, {"question": "In what way did Postmodernist thinkers like Foucault and Derrida extend Nietzsche's philosophy?", "options": [{"text": "They transformed his suspicion of objective truth into systematic critiques of language and power.", "isCorrect": true, "rationale": "Foucault and Derrida utilized Nietzsche's skepticism toward 'truth' to analyze how power structures are embedded in language and discourse."}, {"text": "They rejected Nietzsche’s critique of language in favor of a return to fixed meanings.", "isCorrect": false, "rationale": "Postmodernism is characterized by the rejection of fixed meanings, following Nietzsche's lead."}, {"text": "They focused on democratizing the aristocratic elements of the free spirit for the general public.", "isCorrect": false, "rationale": "The text attributes the democratization of Nietzschean freedom to Sartre and existentialism, not specifically to the postmodernist critique of truth."}, {"text": "They applied Nietzsche's concepts to the development of early American nonconformity.", "isCorrect": false, "rationale": "American nonconformity (Emerson) actually predated or was contemporary with Nietzsche, rather than being an extension of his later postmodern influence."}], "id": "q06"}, {"question": "How would Nietzsche most likely respond to Sartre's belief in universal freedom, according to the text?", "options": [{"text": "He would view it as a naive failure to recognize that most people fear and avoid radical independence.", "isCorrect": true, "rationale": "The text states that Nietzsche would likely see Sartre's universalism as a failure to acknowledge that people often 'flee' from freedom."}, {"text": "He would embrace it as a natural extension of his own philosophy of the free spirit.", "isCorrect": false, "rationale": "The text explicitly suggests that Nietzsche would find Sartre's universal democratization of the free spirit's difficulty to be naive."}, {"text": "He would argue that Sartre's concept of freedom is too focused on political liberation rather than spiritual self-overcoming.", "isCorrect": false, "rationale": "Nietzsche's objection, as described in the text, is about the universality of freedom, not about the distinction between political and spiritual freedom."}, {"text": "He would agree with Sartre but insist that freedom requires the guidance of the Ubermensch to be properly exercised.", "isCorrect": false, "rationale": "Nietzsche does not propose that the Ubermensch guides others' freedom; rather, he believes the capacity for genuine freedom is inherently rare and aristocratic."}], "id": "q07"}, {"question": "Which literary figures are cited as having created characters shaped by Nietzschean ideas of self-overcoming?", "options": [{"text": "Thomas Mann, Hermann Hesse, and André Gide.", "isCorrect": true, "rationale": "These three authors are listed in the 'connectionbox' as creators of characters influenced by Nietzschean independence."}, {"text": "Ralph Waldo Emerson and Jean-Paul Sartre.", "isCorrect": false, "rationale": "While these individuals were influenced by or influenced Nietzsche, they are categorized as philosophers/essayists rather than the literary examples cited in the list."}, {"text": "Michel Foucault and Jacques Derrida.", "isCorrect": false, "rationale": "These are postmodern philosophers, not the novelists associated with Nietzschean characters in the text."}, {"text": "Ayn Rand and the founders of Facebook.", "isCorrect": false, "rationale": "Ayn Rand and Silicon Valley figures are cited as examples of 'popular culture' and 'debased' versions of Nietzschean thought."}], "id": "q08"}, {"question": "What core principle from Emerson's 'Self-Reliance' did Nietzsche find particularly resonant with his own philosophy?", "options": [{"text": "The idea that nothing is sacred but the integrity of one's own mind.", "isCorrect": true, "rationale": "This quote from Emerson highlights the shared value of intellectual integrity and nonconformity that Nietzsche admired."}, {"text": "The belief that radical freedom is 'condemned' upon every human being.", "isCorrect": false, "rationale": "The 'condemned to be free' phrasing belongs to Sartre, not Emerson."}, {"text": "The pursuit of disruption for the purpose of market competition.", "isCorrect": false, "rationale": "This is the Silicon Valley appropriation, which the text distinguishes from the serious work of Emerson and Nietzsche."}, {"text": "The necessity of maintaining social harmony above individual conviction.", "isCorrect": false, "rationale": "Both Emerson and Nietzsche advocated for nonconformity over social harmony, though they disagreed on the ultimate result of that nonconformity."}], "id": "q09"}, {"question": "According to the section on Silicon Valley, what remains 'untouched' by the modern 'disruptor' that the Nietzschean free spirit would insist on questioning?", "options": [{"text": "Deeper values and inherited moral frameworks.", "isCorrect": true, "rationale": "The text notes that disruptors question business models but leave the underlying values of the world unchallenged, unlike Nietzsche’s free spirit."}, {"text": "Technological infrastructure and code.", "isCorrect": false, "rationale": "Disruptors frequently change infrastructure and technology; what they fail to challenge, according to the text, are deeper philosophical values."}, {"text": "The pursuit of immediate profitability.", "isCorrect": false, "rationale": "Profit is the 'service' disruptors work for; they do not question it, but this is the goal they pursue rather than a framework they leave alone."}, {"text": "Market competition and economic conventions.", "isCorrect": false, "rationale": "Disruptors are specifically engaged in market competition; the text argues they fail to engage in the intellectual/spiritual work of value creation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
