        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">

        <a href="../../courses/Nietzsche.html">&larr; Back to The Dangerous Perhaps (Nietzsche)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Nietzsche's distinction in Chapter 6, how does a \\textit{free spirit} (freier Geist) differ from a \\textit{freethinker} (Freigeist)?", "options": [{"text": "The free spirit has undergone a psychological transformation that transcends inherited values, while the freethinker merely replaces old dogmas with new rationalist ones.", "isCorrect": true, "rationale": "Nietzsche views the freethinker as a shallow Enlightenment figure who remains bound by the structure of dogma, unlike the transformed free spirit."}, {"text": "The free spirit seeks to establish a universal objective truth, whereas the freethinker believes that all truth is relative to the individual.", "isCorrect": false, "rationale": "This misidentifies the free spirit's relationship to truth; Nietzsche argues they have a different relationship to truth entirely, rather than seeking objective universality."}, {"text": "The freethinker is characterized by a violent rejection of society, while the free spirit remains quietly within traditional moral frameworks.", "isCorrect": false, "rationale": "The source material states the free spirit is often 'dangerous' and independent, having moved beyond conventional values rather than remaining within them."}, {"text": "There is no functional difference; Nietzsche uses the terms interchangeably to describe those who reject religious authority.", "isCorrect": false, "rationale": "The text explicitly states that Nietzsche 'distinguishes sharply' between these two terms."}]}, {"question": "In passage 24, Nietzsche argues that knowledge is built upon a 'granitelike foundation' of what?", "options": [{"text": "A refined and powerful will to ignorance and simplification.", "isCorrect": true, "rationale": "Nietzsche posits that the will to knowledge is actually a refinement of a more fundamental will to ignorance and the falsification of life for the sake of survival."}, {"text": "The absolute and undeniable empirical facts of the physical world.", "isCorrect": false, "rationale": "Nietzsche suggests that what we consider 'clear' facts are actually results of a 'strange simplification and falsification' of existence."}, {"text": "The collective moral consensus of the herd throughout human history.", "isCorrect": false, "rationale": "While Nietzsche discusses the herd elsewhere, passage 24 specifically identifies the internal 'will to ignorance' as the foundation for knowledge."}, {"text": "A spiritual connection to the 'good, true, and beautiful' as defined by the Greeks.", "isCorrect": false, "rationale": "Nietzsche mocks the 'amiable Idealists' who swim in such concepts, viewing them as superficial desirabilities rather than foundations."}]}, {"question": "Why does Nietzsche warn philosophers to 'beware of martyrdom' in passage 25?", "options": [{"text": "Because it turns the philosopher into an actor or agitator, ruining the 'fine neutrality' of their intellectual conscience.", "isCorrect": true, "rationale": "Nietzsche believes fighting for 'the Truth' as a protector animalizes the philosopher and forces them to play a role in a 'satyric play' or tragedy."}, {"text": "Because the physical pain of persecution distracts the mind from the pursuit of complex metaphysical systems.", "isCorrect": false, "rationale": "Nietzsche’s concern is not with physical distraction, but with the psychological deterioration of the conscience and the loss of philosophical humor."}, {"text": "Because truth is so incompetent and innocent that it requires no protection from human beings.", "isCorrect": false, "rationale": "While he sarcastically mentions truth's perceived incompetence, his real point is the negative effect that the act of 'protecting' has on the philosopher's character."}, {"text": "Because a philosopher should never be misunderstood by the public, and martyrdom ensures public attention.", "isCorrect": false, "rationale": "On the contrary, Nietzsche demands that the free spirit have the capacity to be misunderstood and to use 'masks' to remain hidden."}]}, {"question": "Nietzsche describes the 'esoteric' class of thinkers as those who view things from which perspective?", "options": [{"text": "From above downwards.", "isCorrect": true, "rationale": "Nietzsche distinguishes the esoteric class by their perspective of height, looking down upon the world, whereas the exoteric class views things from below upwards."}, {"text": "From the inside out.", "isCorrect": false, "rationale": "While 'inside' is mentioned, Nietzsche specifies that the more 'essential distinction' is the vertical orientation of the gaze."}, {"text": "Through the lens of universal human equality.", "isCorrect": false, "rationale": "Nietzsche explicitly links the esoteric/exoteric distinction to cultures that believe in 'gradations of rank and NOT in equality'."}, {"text": "From the perspective of future historical consequences.", "isCorrect": false, "rationale": "The text focuses on the current 'height of the soul' rather than a chronological or historical projection."}]}, {"question": "According to passage 39, what is the primary metric for measuring the 'strength of a mind'?", "options": [{"text": "The amount of 'truth' the mind can endure without needing it to be attenuated or sweetened.", "isCorrect": true, "rationale": "Nietzsche argues that the fundamental constitution of existence might be injurious, making the capacity to face unvarnished truth the ultimate test of strength."}, {"text": "The ability to construct a logical system that makes people both happy and virtuous.", "isCorrect": false, "rationale": "Nietzsche dismisses happiness and virtue as 'no arguments' for the truth of a doctrine."}, {"text": "The intellectual capacity to organize the existing body of values into a scientific format.", "isCorrect": false, "rationale": "This describes a 'philosophical laborer' or scholar, not the strength of mind Nietzsche attributes to the free-spirited philosopher."}, {"text": "The willingness to sacrifice one's life for a proven scientific principle.", "isCorrect": false, "rationale": "Nietzsche is critical of martyrdom and 'sacrifice for the sake of truth,' viewing it as a sign of deterioration."}]}, {"question": "Nietzsche categorizes Kant and Hegel as 'philosophical workers' rather than 'real philosophers.' What is the primary task of a 'real philosopher' in his view?", "options": [{"text": "To act as commanders and law-givers who create new values.", "isCorrect": true, "rationale": "Nietzsche insists that while workers formalize the past, real philosophers reach for the future with a creative hand to determine the 'Whither and the Why' of mankind."}, {"text": "To refine the logical contradictions found in the works of previous historians.", "isCorrect": false, "rationale": "Refining and formalizing existing determinations of value is the task Nietzsche assigns to the 'philosophical workers'."}, {"text": "To find a middle ground between religious faith and scientific rationalism.", "isCorrect": false, "rationale": "Nietzsche seeks to move beyond traditional morality and rationalism entirely, not to reconcile them."}, {"text": "To ensure that their philosophy is accessible to the 'common man' through clear prose.", "isCorrect": false, "rationale": "Nietzsche expresses disdain for 'books for the general reader' and believes genuine thoughts often require masks."}]}, {"question": "What does Nietzsche define as 'intellectual conscience' (\\textit{intellektuelles Gewissen})?", "options": [{"text": "The inner demand for honesty that refuses to accept beliefs simply because they are traditional or comforting.", "isCorrect": true, "rationale": "It is the rigorous self-examination that asks for reasons 'pro and con' before adopting a belief, even if the result is dangerous."}, {"text": "The feeling of guilt one experiences when deviating from the moral norms of one's community.", "isCorrect": false, "rationale": "This would be the 'herd' conscience or conventional morality, which Nietzsche critiques as a form of cowardice."}, {"text": "The ability to memorize and categorize the history of philosophical systems from the Greeks to the present.", "isCorrect": false, "rationale": "This describes a 'philosophical laborer' or 'scientific man,' whereas intellectual conscience is an active, honest relationship with truth."}, {"text": "The moral obligation to ensure that one's thoughts do not cause suffering to others.", "isCorrect": false, "rationale": "Nietzsche explicitly challenges the avoidance of suffering, suggesting that 'great suffering' is the source of all human elevation."}]}, {"question": "In passage 225, Nietzsche contrasts two types of sympathy. Why does he view the sympathy of the 'creature in man' as dangerous?", "options": [{"text": "Because it seeks to abolish suffering, which Nietzsche believes is the very discipline that elevates humanity.", "isCorrect": true, "rationale": "Nietzsche argues that the 'tension of soul in misfortune' creates depth and greatness, and that seeking to end all pain leads to man becoming 'ludicrous and contemptible'."}, {"text": "Because it encourages the 'revolutionary slave-classes' to seize power through violent force.", "isCorrect": false, "rationale": "While he mentions revolutionary classes, his primary philosophical objection is that this type of sympathy 'pamper[s]' and 'enervates' the human spirit."}, {"text": "Because it is based on a 'reverse sympathy' that prioritizes the artist over the scientist.", "isCorrect": false, "rationale": "Nietzsche's 'reverse sympathy' is his own perspective; the sympathy he critiques is the common desire to eliminate social 'distress'."}, {"text": "Because it prevents individuals from achieving happiness through utilitarian calculations.", "isCorrect": false, "rationale": "Nietzsche dismisses utilitarianism as a 'naivete' and does not view happiness as a valid ultimate goal."}]}, {"question": "What is the metaphorical 'Minotaur' Nietzsche refers to in the context of independence?", "options": [{"text": "A internal 'Minotaur of conscience' that may tear the isolated individual piecemeal.", "isCorrect": true, "rationale": "Nietzsche uses this image to illustrate the psychological danger of losing one's way in the 'labyrinth' of independence where no one can offer sympathy or help."}, {"text": "The state or legal authorities that prosecute those who think differently.", "isCorrect": false, "rationale": "While Nietzsche mentions law-courts, the 'Minotaur' specifically represents the internal, psychological danger of isolation and self-doubt."}, {"text": "The traditional religious dogmas that prevent a thinker from entering the labyrinth.", "isCorrect": false, "rationale": "The Minotaur is found *inside* the labyrinth of independence, not at its entrance as a deterrent."}, {"text": "The failed 'philosophical workers' like Kant who trap thinkers in logical systems.", "isCorrect": false, "rationale": "Nietzsche critiques Kant, but the 'Minotaur' is linked specifically to the risks taken by those who have already chosen the path of independence."}]}, {"question": "Nietzsche quotes Stendhal to suggest that a good philosopher must possess the character of a successful banker. What trait is he emphasizing?", "options": [{"text": "The ability to see things as they are (\\textit{voir clair dans ce qui est}) by being dry, clear, and without illusion.", "isCorrect": true, "rationale": "Nietzsche values Stendhal's psychological insight that a philosopher needs a certain 'hardness' and lack of romantic illusion to perceive reality accurately."}, {"text": "The capacity to accumulate vast amounts of intellectual 'capital' to trade in the marketplace of ideas.", "isCorrect": false, "rationale": "This is a literal interpretation of 'banker' that misses Nietzsche's psychological point about 'seeing clearly'."}, {"text": "A focus on practical, material outcomes rather than abstract metaphysical questions.", "isCorrect": false, "rationale": "While Nietzsche is critical of some abstractions, the banking metaphor is about the *quality* of the mind (dry/clear), not the *subject* of the thought (money/practice)."}, {"text": "The desire to protect one's intellectual property from the 'herd' of common readers.", "isCorrect": false, "rationale": "Though Nietzsche does believe in 'masks,' this specific quote from Stendhal is about clarity and lack of illusion, not concealment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
