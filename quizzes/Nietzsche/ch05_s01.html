        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    </div>

<script>
var QUESTIONS = [{"question": "According to Nietzsche's analysis in the third essay, what is the primary reason the ascetic ideal has historically dominated human civilizations?", "options": [{"text": "The inherent truthfulness of the metaphysical claims regarding the afterlife.", "isCorrect": false, "rationale": "Nietzsche explicitly states that he believes the ascetic ideal is not true, suggesting its success lies elsewhere."}, {"text": "Its ability to provide a functional framework that renders suffering intelligible.", "isCorrect": true, "rationale": "The text argues that humans can endure any amount of pain as long as it has a perceived meaning or 'why' behind it."}, {"text": "The physical suppression of rival ideals through priestly political authority.", "isCorrect": false, "rationale": "While the priest is a strategist, the text focuses on the psychological success of the ideal rather than mere physical or political force."}, {"text": "The natural human biological drive toward self-denial and physical asceticism.", "isCorrect": false, "rationale": "Nietzsche views the ascetic ideal as a specific direction of the will, not necessarily a natural biological default of the human species."}], "id": "q01"}, {"question": "How does Nietzsche's view of the 'will' fundamentally differ from that of Schopenhauer?", "options": [{"text": "Nietzsche believes the will can be entirely extinguished through aesthetic contemplation.", "isCorrect": false, "rationale": "This describes Schopenhauer's position, which Nietzsche dismissed as a fantasy."}, {"text": "Schopenhauer argues the will is a positive force, while Nietzsche views it as purely destructive.", "isCorrect": false, "rationale": "Schopenhauer generally viewed the will as a source of suffering to be overcome, whereas Nietzsche sees it as an inescapable drive."}, {"text": "Nietzsche maintains that the will is inexhaustible and can only be redirected, never quieted.", "isCorrect": true, "rationale": "Nietzsche argues that if the will lacks a positive goal, it will inevitably attach itself to a negative one rather than ceasing to exist."}, {"text": "Nietzsche suggests that only the 'strong' possess a will, while the 'weak' lack it entirely.", "isCorrect": false, "rationale": "The text indicates that even the weak possess a will, which they direct toward nothingness through the ascetic ideal."}], "id": "q02"}, {"question": "Which of the following best captures the meaning of Nietzsche's phrase: 'rather would man will nothingness than not will'?", "options": [{"text": "Human beings naturally prefer non-existence to the struggles of life.", "isCorrect": false, "rationale": "The quote emphasizes the activity of 'willing' itself as the priority, rather than a passive preference for non-existence."}, {"text": "The cessation of all desire is the ultimate goal of the ascetic ideal.", "isCorrect": false, "rationale": "Nietzsche argues that even the 'will to nothingness' is still a form of active striving, not the absence of desire."}, {"text": "The human psychological need for a goal is so strong that even a self-destructive goal is preferable to aimlessness.", "isCorrect": true, "rationale": "This reflects Nietzsche's insight that human energy must be organized by a purpose, even if that purpose is the denial of life."}, {"text": "Nihilism is an inevitable biological endpoint for all advanced civilizations.", "isCorrect": false, "rationale": "While Nietzsche discusses nihilism, the quote specifically addresses the psychological necessity of having a direction for the will."}], "id": "q03"}, {"question": "Nietzsche's 'grudging admiration' for the ascetic priest is based on which characteristic of the priest?", "options": [{"text": "The priest's moral integrity and genuine compassion for the weak.", "isCorrect": false, "rationale": "Nietzsche's respect is described as strategic rather than moral, focusing on the priest's role as a 'brilliant adversary'."}, {"text": "The priest's ability to successfully cure the underlying psychological diseases of the weak.", "isCorrect": false, "rationale": "The text states the priest does not cure the disease but merely masks symptoms with remedies that eventually worsen the condition."}, {"text": "The priest's ingenuity in creating a framework that keeps the 'sick' alive by reinterpreting their pain.", "isCorrect": true, "rationale": "Nietzsche admires the creativity and strategic brilliance required to provide the weak with a reason to persist in existence."}, {"text": "The priest's rejection of the 'slave revolt in morality' in favor of noble values.", "isCorrect": false, "rationale": "The priest is actually the architect and leader of the 'slave revolt,' not its opponent."}], "id": "q04"}, {"question": "In what way does the ascetic priest's 'cure' actually worsen the condition of the patient?", "options": [{"text": "By encouraging the patient to abandon all forms of social discipline.", "isCorrect": false, "rationale": "The priest enforces strict discipline; he does not encourage the abandonment of it."}, {"text": "By introducing the concept of guilt, which turns suffering into a form of self-punishment.", "isCorrect": true, "rationale": "The reinterpretation of suffering as a result of sin adds a layer of psychological torment to the original physical or emotional pain."}, {"text": "By failing to provide any explanation for the patient's suffering, leading to paralysis.", "isCorrect": false, "rationale": "The priest's primary function is to provide an explanation; the problem is that the explanation itself is harmful."}, {"text": "By forcing the patient to face the 'meaninglessness' of the void without any illusions.", "isCorrect": false, "rationale": "The priest does the opposite—he provides an illusion to shield the patient from the void."}], "id": "q05"}, {"question": "The text references Viktor Frankl to support which of Nietzsche's claims?", "options": [{"text": "That the will to power is the primary driver of human behavior.", "isCorrect": false, "rationale": "Frankl's logotherapy focuses on the 'will to meaning' rather than the 'will to power' in the traditional sense."}, {"text": "That modern psychiatry has rendered the ascetic ideal obsolete.", "isCorrect": false, "rationale": "Frankl actually uses Nietzsche's insights to build his own therapeutic approach, suggesting they remain relevant."}, {"text": "That humans can endure intense suffering as long as they possess a 'why' for their existence.", "isCorrect": true, "rationale": "Frankl's survival in concentration camps validated Nietzsche’s observation that meaning is a prerequisite for enduring hardship."}, {"text": "That the ascetic priest is a necessary figure in every functional society.", "isCorrect": false, "rationale": "While Frankl deals with meaning, the text uses him specifically to validate Nietzsche's psychological claim about suffering and meaning."}], "id": "q06"}, {"question": "Which of the following would Nietzsche likely classify as a 'will to nothingness'?", "options": [{"text": "A total state of psychological paralysis where one no longer strives for anything.", "isCorrect": false, "rationale": "Nietzsche distinguishes between 'willing nothingness' (an active redirection) and the inability to will at all (paralysis)."}, {"text": "The active longing for an idealized 'other world' that requires the rejection of the physical body.", "isCorrect": true, "rationale": "Willing 'another world' is a redirection of the will toward the denial of the only world that exists, which Nietzsche terms 'nothingness'."}, {"text": "The pursuit of physical comfort and the avoidance of all possible pain.", "isCorrect": false, "rationale": "The ascetic ideal is defined by the embrace of self-denial and pain for a purpose, not the avoidance of it."}, {"text": "The creation of new, life-affirming values that replace old religious dogmas.", "isCorrect": false, "rationale": "This would be a 'positive' goal for the will, whereas the ascetic ideal is characterized by 'negative' goals."}], "id": "q07"}, {"question": "Nietzsche's comparison of the priest to a 'quack doctor' suggests that the priest's remedies:", "options": [{"text": "Are based on a lack of understanding of human anatomy.", "isCorrect": false, "rationale": "The analogy is psychological and strategic; it doesn't literally refer to biological knowledge."}, {"text": "Address only the symptoms of suffering while creating new, deeper symptoms.", "isCorrect": true, "rationale": "The priest masks the 'absurdity' of suffering by adding 'guilt,' which keeps the patient alive but causes long-term psychological harm."}, {"text": "Are intentionally designed to kill the patient slowly for the priest's benefit.", "isCorrect": false, "rationale": "The priest's goal is to keep the patient alive, as the 'sick' are his patients and the base of his authority."}, {"text": "Are only effective for those who are physically healthy but mentally weak.", "isCorrect": false, "rationale": "The priest's patients are described as the 'weak, the suffering, the lost,' encompassing a broad range of human misery."}], "id": "q08"}, {"question": "Why does Nietzsche claim that the ascetic ideal eliminates 'absurdity'?", "options": [{"text": "It proves that the world follows rational, scientific laws.", "isCorrect": false, "rationale": "The ascetic ideal provides moral/religious explanations, which Nietzsche considers false, rather than scientific ones."}, {"text": "It provides a narrative that explains suffering as a consequence of one's own actions or state of being.", "isCorrect": true, "rationale": "By attributing suffering to sin or the weakness of the flesh, the ideal ensures that pain is never perceived as random or purposeless."}, {"text": "It encourages people to stop asking questions about the meaning of life.", "isCorrect": false, "rationale": "The ideal actually encourages a specific kind of constant self-reflection and questioning regarding one's guilt."}, {"text": "It demonstrates that suffering is an illusion that does not actually exist.", "isCorrect": false, "rationale": "The ideal acknowledges suffering is very real but gives it a specific, disciplinary purpose."}], "id": "q09"}, {"question": "What is the key takeaway from the 'thinkdeeper' section regarding science and the ascetic ideal?", "options": [{"text": "Science is the ultimate cure for the symptoms created by the ascetic priest.", "isCorrect": false, "rationale": "Nietzsche suggests science might be a continuation of the ideal, not necessarily its cure."}, {"text": "The scientific commitment to 'truth at any cost' may actually be a modern manifestation of self-denial.", "isCorrect": true, "rationale": "The pursuit of truth often requires sacrificing comforting illusions, which mirrors the ascetic practice of self-discipline and denial."}, {"text": "Science has successfully replaced the ascetic ideal by providing a positive goal for the human will.", "isCorrect": false, "rationale": "The prompt asks if science is simply 'the latest form' of the ideal, implying it shares the same underlying structure of self-denial."}, {"text": "Science is immune to the ascetic ideal because it deals with objective facts rather than meaning.", "isCorrect": false, "rationale": "Nietzsche argues that the very drive for 'objective facts' can itself be an ascetic pursuit."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
