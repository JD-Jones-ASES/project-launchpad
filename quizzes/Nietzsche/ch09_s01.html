        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 9, Section 1</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, why is the physical argument for eternal recurrence found in Nietzsche's unpublished notebooks ($Nachlass$) considered less significant than the version in his published works?", "options": [{"text": "The physical theory relies on a finite timeline that contradicts modern scientific understanding of matter.", "isCorrect": false, "rationale": "The text notes the theory assumes infinite time and finite matter, but it prioritizes the existential impact over scientific accuracy."}, {"text": "Nietzsche intended the thought experiment to serve as an existential test of affirmation rather than a cosmological claim.", "isCorrect": true, "rationale": "The published passages shift the focus from 'will it happen' to 'how would you respond if it did,' emphasizing the psychological and ethical weight of the idea."}, {"text": "The notebook arguments were proven to be editorial fabrications by Elisabeth Förster-Nietzsche.", "isCorrect": false, "rationale": "While the text mentions her manipulations, it acknowledges that Nietzsche did sketch these physical arguments himself, even if they aren't the primary focus."}, {"text": "A physical theory of recurrence would require a redemptive narrative that Nietzsche explicitly sought to avoid.", "isCorrect": false, "rationale": "The lack of redemption is a feature of the recurrence itself, regardless of whether it is viewed through a physical or existential lens."}]}, {"question": "How does Nietzsche's 'test' of the eternal recurrence fundamentally differ from Kant's categorical imperative?", "options": [{"text": "Nietzsche's test evaluates the universal fairness of an action, while Kant's test focuses on the creative intensity of the individual.", "isCorrect": false, "rationale": "This reverses the two; Kant is concerned with universal social laws, while Nietzsche focuses on individual affirmation."}, {"text": "Nietzsche's test is oriented toward the self and affirmation, whereas Kant's test is oriented toward duty and social consistency.", "isCorrect": true, "rationale": "Nietzsche moves away from the 'social' requirement of universalizing a maxim to the 'personal' requirement of being able to desire the infinite repetition of one's own life."}, {"text": "Kant's test requires the individual to embrace suffering, while Nietzsche's test seeks to overcome it through moral law.", "isCorrect": false, "rationale": "Nietzsche is the one who emphasizes embracing suffering as part of life's affirmation, whereas Kant's focus is on the logical consistency of moral maxims."}, {"text": "Kant's test is a hypothetical thought experiment, while Nietzsche's test requires a belief in the actual physical return of time.", "isCorrect": false, "rationale": "The text explicitly states that Nietzsche's test works as a thought experiment regardless of its physical truth, much like Kant's or Descartes' logical tests."}]}, {"question": "In the context of the 'doctor analogy' provided in the text, what is the primary function of the eternal recurrence as a thought experiment?", "options": [{"text": "To encourage individuals to live more efficiently by highlighting the scarcity of time.", "isCorrect": false, "rationale": "The text contrasts the recurrence with scarcity; it asks what you would feel if time were infinite, not if it were running out."}, {"text": "To reveal what an individual truly values by changing the temporal scale of their existence.", "isCorrect": true, "rationale": "By imagining life repeating forever, the experiment forces one to confront the inherent value of their choices and experiences without the pressure of an impending end."}, {"text": "To provide a redemptive narrative for those who have suffered from injustice or illness.", "isCorrect": false, "rationale": "The text notes that for victims of catastrophe, the recurrence may actually seem cruel rather than redemptive, making it an 'abysmal' thought."}, {"text": "To prove that meaning is only possible if human life has a final, definitive resolution.", "isCorrect": false, "rationale": "Eternal recurrence suggests the opposite: meaning is created through affirmation even in the absence of a final resolution or progress."}]}, {"question": "Why does the text refer to the eternal recurrence as Nietzsche's 'most abysmal thought'?", "options": [{"text": "It implies that the human soul is trapped in a cycle of sin that can only be broken by external redemption.", "isCorrect": false, "rationale": "Nietzsche's theory specifically rejects external redemption and the traditional concept of sin in favor of self-affirmation."}, {"text": "It suggests that historical progress is an illusion and that even the most mundane or painful moments are permanent.", "isCorrect": true, "rationale": "The 'abysmal' nature stems from the realization that there is no escape, no improvement, and no final 'heaven' to justify or erase the suffering of the past."}, {"text": "It requires the individual to abandon all personal desires in favor of a universal moral law.", "isCorrect": false, "rationale": "This aligns more with the Kantian perspective that Nietzsche was attempting to overcome through his focus on the self."}, {"text": "It necessitates a mathematical proof of the finiteness of matter that Nietzsche was never able to complete.", "isCorrect": false, "rationale": "While the physical argument was sketched in his notebooks, the 'abysmal' quality is an existential and emotional weight, not a mathematical failure."}]}, {"question": "Which term describes the state of a person who takes full ownership of their life, including its suffering, to the point of affirming its eternal return?", "options": [{"text": "$Categorical$ $imperative$", "isCorrect": false, "rationale": "This is Kant's term for a universal moral law, which Nietzsche contrasts with his own personal test of affirmation."}, {"text": "$Amor$ $fati$", "isCorrect": true, "rationale": "The text links this 'love of fate' to the achievement of total affirmation, where a person embraces every part of their existence without needing external meaning."}, {"text": "$Nachlass$", "isCorrect": false, "rationale": "This term refers to the unpublished papers and notebooks left behind after a thinker's death, not a psychological state of affirmation."}, {"text": "$Existential$ $hedonism$", "isCorrect": false, "rationale": "The text explicitly states that a person who achieves this affirmation is not a hedonist, but someone who takes the gravity of their life seriously."}]}, {"question": "How does the role of Descartes' 'evil demon' parallel the demon mentioned in Nietzsche's $GS$ $341$?", "options": [{"text": "Both figures are intended to be literal warnings about the nature of supernatural interference in human life.", "isCorrect": false, "rationale": "Both are used as philosophical devices or 'thought experiments' rather than literal supernatural claims."}, {"text": "The validity of the philosophical challenge in both cases does not depend on the physical reality of the figure's claim.", "isCorrect": true, "rationale": "Just as Descartes uses the demon to test the foundations of knowledge regardless of whether the demon exists, Nietzsche uses the demon to test existential affirmation regardless of whether recurrence is physically true."}, {"text": "Both demons offer a path to salvation through the strict adherence to logic and mathematical certainty.", "isCorrect": false, "rationale": "Nietzsche's demon offers a challenge of affirmation and feeling, while Descartes' demon is used to challenge the certainty of sensory and logical knowledge."}, {"text": "Nietzsche's demon is a symbol of universal morality, while Descartes' demon represents individual creativity.", "isCorrect": false, "rationale": "Nietzsche's demon is linked to personal affirmation, and Descartes' demon is linked to the radical doubt of external reality."}]}, {"question": "What is the significance of 'a pointless Tuesday afternoon' in the context of eternal recurrence?", "options": [{"text": "It represents the moments of rest necessary to achieve the creative intensity Nietzsche demands.", "isCorrect": false, "rationale": "While rest is necessary, the text uses this example to show that even the most boring and 'pointless' moments are included in the recurrence."}, {"text": "It serves as a distractor that prevents individuals from achieving $amor$ $fati$.", "isCorrect": false, "rationale": "The goal of eternal recurrence is to affirm these moments, not to be distracted by them or avoid them."}, {"text": "It illustrates that the recurrence includes every mundane detail of life, not just the highlights or significant choices.", "isCorrect": true, "rationale": "The test is not just about affirming great moments but about whether one can say 'yes' to the totality of existence, including its monotony."}, {"text": "It highlights the difference between human time and the infinite time discussed in the $Nachlass$.", "isCorrect": false, "rationale": "The 'pointless Tuesday' is an example of the content of the recurrence, not a commentary on the physics of time itself."}]}, {"question": "The text suggests that for Nietzsche, the standard of judgment for a life is whether it is:", "options": [{"text": "Consistent with the principles of universal fairness.", "isCorrect": false, "rationale": "This is the standard for Kant's categorical imperative, which Nietzsche contrasts with his own test."}, {"text": "Worthy of eternity through its depth and creative intensity.", "isCorrect": true, "rationale": "Nietzsche’s test asks whether you have lived in a way that you would be willing to repeat forever, which requires a deep level of personal affirmation."}, {"text": "Free from the editorial manipulations of historical narratives.", "isCorrect": false, "rationale": "While the text mentions editorial manipulations in Nietzsche's own work, this is not the standard for judging the value of a person's life."}, {"text": "Leading toward a final redemptive resolution or heavenly afterlife.", "isCorrect": false, "rationale": "Nietzsche's affirmation is based on not needing a heaven or a final resolution to give life meaning."}]}, {"question": "Why does the author mention that Nietzsche's $Nachlass$ has been the subject of 'intense scholarly debate'?", "options": [{"text": "Because the physics arguments found there were later proven to be plagiarized from Kant.", "isCorrect": false, "rationale": "There is no claim of plagiarism from Kant; the debate centers on editorial manipulation and the status of unpublished notes."}, {"text": "Due to the editorial changes made by his sister, which may have distorted his intended philosophy.", "isCorrect": true, "rationale": "Elisabeth Förster-Nietzsche’s manipulations are a key reason why scholars debate how much weight to give the $Nachlass$ versus the published works."}, {"text": "Because the notebooks contain the only existing proof that the eternal recurrence is a physical reality.", "isCorrect": false, "rationale": "The notebooks contain sketches of arguments, not 'proofs,' and many scholars argue these arguments miss Nietzsche's actual point."}, {"text": "Because the $Nachlass$ contradicts his published claim that time is finite.", "isCorrect": false, "rationale": "The $Nachlass$ arguments actually assume time is infinite, which is part of the hypothetical physical theory mentioned."}]}, {"question": "What 'cruel' implication of the eternal recurrence does the 'thinkdeeper' section explore?", "options": [{"text": "The idea that only 'exceptional individuals' are allowed to experience the recurrence.", "isCorrect": false, "rationale": "The recurrence applies to everyone; the question is whether everyone *can* meet the standard of affirming it."}, {"text": "The possibility that it demands victims of catastrophe and injustice to desire the infinite return of their suffering.", "isCorrect": true, "rationale": "If everything repeats identically, then victims would have to affirm their own victimization, which raises serious ethical concerns about the demand of the test."}, {"text": "The requirement that all human beings must eventually become narcissists to survive the 'abysmal' thought.", "isCorrect": false, "rationale": "The text explicitly states that those who achieve affirmation are not narcissists, but people who take life seriously."}, {"text": "The fact that the demon in $GS$ $341$ eventually reveals that the recurrence is a lie.", "isCorrect": false, "rationale": "The demon does not reveal it as a lie; it presents a hypothesis to test the listener's response."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
