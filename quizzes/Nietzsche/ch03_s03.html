        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 3, Section 3</div>

        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In Hegel's 'master-slave dialectic', what is the specific catalyst that allows the slave to develop self-consciousness?", "options": [{"text": "The act of labor and work.", "isCorrect": true, "rationale": "For Hegel, the slave's interaction with the material world through work forces a development of self-awareness that the master lacks."}, {"text": "The master's eventual recognition of the slave's humanity.", "isCorrect": false, "rationale": "While recognition is the goal, it is the result of the dialectic rather than the catalyst for the slave's internal development."}, {"text": "The violent overthrow of the master.", "isCorrect": false, "rationale": "Hegel focuses on the transformative nature of labor and dependency rather than a physical revolution like Marx might."}, {"text": "The realization that the master is also a slave to his own desires.", "isCorrect": false, "rationale": "While the master becomes dependent, the slave's self-consciousness is specifically tied to the discipline of work."}]}, {"question": "Which of the following best describes the primary divergence between Hegel's and Nietzsche's views on the master-slave dynamic?", "options": [{"text": "Hegel views the relationship as a progressive path to reconciliation, while Nietzsche sees it as an ongoing struggle without a happy synthesis.", "isCorrect": true, "rationale": "Hegel's dialectic is teleological and moves toward freedom, whereas Nietzsche emphasizes eternal recurrence and the persistence of conflicting values."}, {"text": "Hegel sides with the master's vitality, whereas Nietzsche sides with the slave's creative power.", "isCorrect": false, "rationale": "This misrepresents both; Hegel seeks a synthesis of both, and Nietzsche is famously critical of the slave's ressentiment."}, {"text": "Nietzsche believes the master-slave relationship is a historical necessity, while Hegel believes it is a modern construct.", "isCorrect": false, "rationale": "Both thinkers treat these relationships as historically grounded, but they disagree on the value and direction of that history."}, {"text": "Hegel focuses on the material interests of the classes, while Nietzsche focuses on the spiritual growth of the individual.", "isCorrect": false, "rationale": "Marx is the thinker primarily concerned with material interests in this context, not Hegel."}]}, {"question": "According to the text, why would Nietzsche describe the slave revolt in morality as a 'paradox'?", "options": [{"text": "It was both a catastrophe for human vitality and an achievement of extraordinary creative power.", "isCorrect": true, "rationale": "Nietzsche views the shift to slave morality as damaging to life-affirming values, yet acknowledges it required immense psychological creativity to achieve."}, {"text": "It claimed to seek equality while actually seeking to enslave the masters.", "isCorrect": false, "rationale": "While Nietzsche notes the power dynamic, the specific paradox mentioned in the text refers to the tension between vitality and creativity."}, {"text": "It used the master's own values to overthrow the master.", "isCorrect": false, "rationale": "The slave revolt is defined by a 'revaluation' of values, meaning it creates new values rather than simply using old ones."}, {"text": "It was a movement led by the weak that resulted in the most powerful ruling class in history.", "isCorrect": false, "rationale": "Nietzsche focuses on the shift in moral frameworks rather than the establishment of a traditional ruling political class."}]}, {"question": "What is the 'genealogical question' that both Marx and Nietzsche encourage us to ask regarding moral systems?", "options": [{"text": "Whose interests does this moral system serve?", "isCorrect": true, "rationale": "Both thinkers look past the 'truth' of morality to investigate the power dynamics and group interests behind it."}, {"text": "Is this moral system logically consistent with universal truths?", "isCorrect": false, "rationale": "Both thinkers reject the idea of eternal or universal moral truths, viewing them as historical constructs."}, {"text": "How can we synthesize these values into a higher form of justice?", "isCorrect": false, "rationale": "This is more characteristic of a Hegelian approach than the critical genealogy practiced by Marx and Nietzsche."}, {"text": "Which genetic traits are responsible for the development of this morality?", "isCorrect": false, "rationale": "Genealogy in this context refers to historical and social origins, not biological genetics."}]}, {"question": "How does Karl Marx's evaluation of the 'slave' (proletariat) revolution differ from Nietzsche's evaluation of the 'slave revolt'?", "options": [{"text": "Marx views the revolution as a liberating triumph of equality, while Nietzsche views it as a disaster that suppresses vitality.", "isCorrect": true, "rationale": "Marx supports the overthrow of the masters as progress toward equality, whereas Nietzsche sees the imposition of equality as a slave value that harms the strong."}, {"text": "Marx believes the revolution is inevitable, while Nietzsche believes it can be prevented by the 'Ubermensch'.", "isCorrect": false, "rationale": "While Marx believes in historical inevitability, the text focuses on their differing value judgments of the revolt itself."}, {"text": "Nietzsche thinks the revolt is based on material interest, while Marx thinks it is based on ressentiment.", "isCorrect": false, "rationale": "The text states the opposite: Marx focuses on material interest and Nietzsche focuses on ressentiment."}, {"text": "Marx believes morality is an ideology, while Nietzsche believes it is an eternal truth.", "isCorrect": false, "rationale": "Both thinkers agree that morality is not an eternal truth but a historical product."}]}, {"question": "In the context of 'victimhood culture', what would Nietzsche identify as the 'revaluation of values'?", "options": [{"text": "Turning powerlessness and suffering into sources of moral authority and social power.", "isCorrect": true, "rationale": "Nietzsche's concept of slave morality involves the weak defining their weakness as 'good' and the master's strength as 'evil' or 'harmful'."}, {"text": "Rejecting all forms of social hierarchy in favor of total anarchy.", "isCorrect": false, "rationale": "Revaluation involves changing what is considered 'good', not necessarily the total rejection of all structure."}, {"text": "The masters realizing their own cruelty and voluntarily stepping down.", "isCorrect": false, "rationale": "Revaluation is driven by the ressentiment of the subordinate party, not the guilt of the dominant party."}, {"text": "The scientific proof that suffering confers a higher level of intelligence.", "isCorrect": false, "rationale": "Nietzsche is analyzing a psychological and social shift in values, not a scientific or biological claim."}]}, {"question": "The text warns against using Nietzsche’s analysis to dismiss all claims of injustice as 'mere ressentiment'. Which logical error does this warning reference?", "options": [{"text": "The genetic fallacy.", "isCorrect": true, "rationale": "The genetic fallacy occurs when one assumes that because a claim has a specific origin (genealogy), the claim itself must be false."}, {"text": "The ad hominem attack.", "isCorrect": false, "rationale": "While related, the text specifically identifies the 'genetic fallacy' in the section regarding the genealogy of values."}, {"text": "The straw man argument.", "isCorrect": false, "rationale": "A straw man involves misrepresenting an opponent's position; the genetic fallacy specifically targets the origin of the position."}, {"text": "Circular reasoning.", "isCorrect": false, "rationale": "Circular reasoning involves a premise that assumes the conclusion, which is not the issue identified with genealogy."}]}, {"question": "Why would Marx likely dismiss Nietzsche, according to the comparisons drawn in the text?", "options": [{"text": "He would view Nietzsche as an aristocratic reactionary.", "isCorrect": true, "rationale": "Because Nietzsche sides with the 'strong' and views equality as a slave value, Marx would see him as a defender of elite interests."}, {"text": "He would view Nietzsche as too focused on economic structures.", "isCorrect": false, "rationale": "Marx is the one focused on economic structures; he would find Nietzsche lacking in this area."}, {"text": "He would find Nietzsche's concept of the 'slave revolt' too optimistic.", "isCorrect": false, "rationale": "Marx is generally the more optimistic of the two regarding the outcome of social upheavals."}, {"text": "He would believe Nietzsche's genealogy was not critical enough of the ruling class.", "isCorrect": false, "rationale": "Marx would likely agree Nietzsche is critical, but would object to Nietzsche's preference for the masters."}]}, {"question": "According to Hegel, why does the master become 'dependent' on the slave?", "options": [{"text": "The master has nothing to struggle against and relies on the slave for recognition.", "isCorrect": true, "rationale": "In the dialectic, the master stops struggling with the world and becomes a consumer of the slave's labor, losing his own independent self-consciousness."}, {"text": "The master fears a violent revolution from the slave.", "isCorrect": false, "rationale": "While this might be a historical reality, Hegel's specific dialectic focuses on the psychological need for recognition."}, {"text": "The master eventually loses the physical strength to provide for himself.", "isCorrect": false, "rationale": "Hegel's analysis is more about the social and psychological dynamics of recognition than physical health."}, {"text": "The slave holds the 'moral high ground' in the relationship.", "isCorrect": false, "rationale": "The concept of 'moral high ground' is more aligned with Nietzsche's slave morality than Hegel's dialectic of recognition."}]}, {"question": "What does Nietzsche suggest follows from the realization that moral values are human creations rather than eternal truths?", "options": [{"text": "We are free to create different values and transcend the consequences of the slave revolt.", "isCorrect": true, "rationale": "The text suggests that understanding values as human creations raises the question of whether we are 'free to create different values' in the future."}, {"text": "We are permanently stuck with the consequences of the slave revolt because the values are now embedded in culture.", "isCorrect": false, "rationale": "Nietzsche's work is often an invitation to transcend existing values, not a statement of permanent entrapment."}, {"text": "We should return to the original master morality and restore the values of the 'blond beast.'", "isCorrect": false, "rationale": "Nietzsche does not advocate a simple return to master morality; his vision involves the creation of genuinely new values through self-overcoming."}, {"text": "We must accept that all moral systems are equally arbitrary and therefore equally valid.", "isCorrect": false, "rationale": "Nietzsche explicitly rejects relativism; he insists that some perspectives and value systems are richer and more life-affirming than others."}]}, {"question": "Which concept does Nietzsche use to counter Hegel's idea of linear, historical progress?", "options": [{"text": "Eternal recurrence.", "isCorrect": true, "rationale": "Instead of a progressive synthesis moving toward a goal, Nietzsche posits the ongoing struggle and recurrence of life's patterns."}, {"text": "Dialectical materialism.", "isCorrect": false, "rationale": "This is a Marxist concept, not a Nietzschean one."}, {"text": "The higher synthesis.", "isCorrect": false, "rationale": "This is the Hegelian concept that Nietzsche specifically rejects."}, {"text": "The genetic fallacy.", "isCorrect": false, "rationale": "The genetic fallacy is a logical error mentioned in the text, not Nietzsche's replacement for historical progress."}]}, {"question": "In the Marxist framework described, what must the proletariat develop before they can overthrow the masters?", "options": [{"text": "Class consciousness.", "isCorrect": true, "rationale": "Marx argued that the oppressed must first see through the ruling class ideology and recognize their own collective interest."}, {"text": "Master morality.", "isCorrect": false, "rationale": "Master morality is a Nietzschean term; Marx focuses on the collective awareness of economic status."}, {"text": "Internalized aggression.", "isCorrect": false, "rationale": "The text identifies internalized aggression as a psychological consequence Nietzsche explores, not a requirement for Marx's revolution."}, {"text": "A higher synthesis of ideology.", "isCorrect": false, "rationale": "Marx seeks to dismantle ideology altogether through revolution, rather than creating a new synthesis within the existing framework."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
