        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "In Nietzsche's framework, what distinguishes a 'free spirit' from a 'freethinker' regarding their relationship with truth?", "options": [{"text": "The free spirit questions the very value and utility of truth itself.", "isCorrect": true, "rationale": "Nietzsche argues that while freethinkers merely replace one dogma with another, the genuine free spirit investigates the underlying reasons for valuing truth."}, {"text": "The free spirit rejects scientific dogma in favor of intuitive spiritual truths.", "isCorrect": false, "rationale": "The text states that freethinkers are the ones who replace religious dogma with scientific dogma, but it does not suggest the free spirit seeks 'intuitive spiritual truths' as a replacement."}, {"text": "The freethinker has achieved a higher 'rank' by moving past all forms of valuation.", "isCorrect": false, "rationale": "Nietzsche views the freethinker as shallow and less advanced than the free spirit, who moves through and beyond values rather than simply discarding them."}, {"text": "The freethinker seeks to destroy truth, while the free spirit seeks to preserve it through discipline.", "isCorrect": false, "rationale": "Freethinkers are described as still 'believing in truth,' whereas the free spirit scrutinizes its value; neither is characterized as simply 'preserving' it."}], "id": "q01"}, {"question": "What is the primary function of the chess grandmaster analogy in the provided text?", "options": [{"text": "To illustrate that departure from convention must be informed by a mastery of those conventions.", "isCorrect": true, "rationale": "The analogy emphasizes that the free spirit's rejection of morality is grounded in a deep understanding of its foundations, much like a grandmaster's strategic deviations."}, {"text": "To demonstrate that moral rules are as arbitrary and socially constructed as the rules of a game.", "isCorrect": false, "rationale": "While the comparison is to a game, the text's focus is on the difference in the level of understanding between the 'child' and the 'master,' not the arbitrariness of the rules."}, {"text": "To argue that only those with inherent, natural talent can ever hope to become free spirits.", "isCorrect": false, "rationale": "The analogy focuses on the quality of the departure from rules based on knowledge, rather than the source of the grandmaster's talent."}, {"text": "To show that the free spirit eventually returns to following the rules after testing them.", "isCorrect": false, "rationale": "The grandmaster in the analogy 'breaks convention' based on understanding; the text does not suggest a return to conventional conformity."}], "id": "q02"}, {"question": "Why does Nietzsche characterize the free spirit's life as potentially more 'austere' than that of a conformist?", "options": [{"text": "Genuine intellectual independence requires immense self-discipline and rigor.", "isCorrect": true, "rationale": "The text notes that because the free spirit is not a hedonist or libertine, their path demands a level of discipline that exceeds that of those who follow inherited rules."}, {"text": "The free spirit must punish themselves for the guilt of abandoning traditional morality.", "isCorrect": false, "rationale": "Nietzsche’s free spirit is described as seeing through the foundations of morality, not as being burdened by traditional guilt or the need for self-punishment."}, {"text": "Austerity is a requirement for achieving the scientific objectivity Nietzsche demands.", "isCorrect": false, "rationale": "Nietzsche actually critiques those who replace religious dogma with scientific dogma, suggesting his goals are not centered on 'scientific objectivity.'"}, {"text": "The free spirit rejects all physical pleasures to focus entirely on the destruction of values.", "isCorrect": false, "rationale": "While the spirit is not hedonistic, the text suggests the austerity is a byproduct of independence and discipline, not a total rejection of all pleasure."}], "id": "q03"}, {"question": "How does the text define the 'aristocratic' nature of Nietzsche's philosophy?", "options": [{"text": "It is a hierarchy based on spiritual and intellectual strength rather than birthright.", "isCorrect": true, "rationale": "The text explicitly mentions that Nietzsche mocks the idea of noble birth guaranteeing a noble spirit, defining his 'aristocracy' as spiritual."}, {"text": "It is a political system designed to restore the power of hereditary monarchs.", "isCorrect": false, "rationale": "Nietzsche's focus is on the 'pathos of distance' in a spiritual sense, and he is described as mocking the value of noble birth."}, {"text": "It is an elitist framework based on racial purity and biological destiny.", "isCorrect": false, "rationale": "The text clarifies that the aristocracy is explicitly 'spiritual' and not 'racial' or 'hereditary.'"}, {"text": "It is a method of ensuring that the most hedonistic individuals gain control over society.", "isCorrect": false, "rationale": "The text specifically distinguishes the free spirit from the libertine or hedonist, highlighting the austerity of the former."}], "id": "q04"}, {"question": "In the context of the 'three metamorphoses,' which stage represents the destruction of inherited authority?", "options": [{"text": "The Lion", "isCorrect": true, "rationale": "The lion is the stage where the spirit destroys the 'Thou shalt' of tradition in the name of the 'I will' of individual agency."}, {"text": "The Camel", "isCorrect": false, "rationale": "The camel represents the initial stage of bearing the heavy weight of tradition and inherited values, not destroying them."}, {"text": "The Child", "isCorrect": false, "rationale": "The child represents the positive creation of new values and innocent spontaneity, which occurs after the lion's destruction."}, {"text": "The Grandmaster", "isCorrect": false, "rationale": "The 'grandmaster' is an analogy used earlier in the text to describe the free spirit, not one of the three metamorphoses from Zarathustra."}], "id": "q05"}, {"question": "What does Nietzsche identify as the crucial 'second step' of freedom, beyond mere 'negative freedom'?", "options": [{"text": "The active creation of new values and possibilities for life.", "isCorrect": true, "rationale": "The text distinguishes between 'freedom from' (negative) and 'freedom for' (positive), where the latter involves building new frameworks."}, {"text": "The total rejection of all forms of hierarchy and rank.", "isCorrect": false, "rationale": "Nietzsche actually embraces the concept of rank and the 'pathos of distance,' rather than rejecting hierarchy."}, {"text": "The scientific validation of individual moral choices.", "isCorrect": false, "rationale": "The text suggests that the free spirit moves past 'scientific dogma' and questions the value of truth, making scientific validation unlikely as a goal."}, {"text": "The return to religious tradition through a more refined intellectual lens.", "isCorrect": false, "rationale": "The free spirit passes through the destruction of old values (like the church) to create something new, not to return to the old."}], "id": "q06"}, {"question": "Why does the author of the text argue that Nietzsche is not a nihilist?", "options": [{"text": "The free spirit views the destruction of values only as a precondition for creation.", "isCorrect": true, "rationale": "The text explains that while a nihilist stops at the realization that 'there are no values,' the free spirit moves through that phase to create new ones."}, {"text": "Nietzsche eventually advocates for a return to common sense and traditional virtues.", "isCorrect": false, "rationale": "Nietzsche's philosophy is characterized by a radical departure from tradition, not a return to common sense or conventional virtues."}, {"text": "Nietzsche believes that objective truth can be rediscovered through intense discipline.", "isCorrect": false, "rationale": "Nietzsche is described as questioning the value of truth itself, rather than trying to restore its objective status."}, {"text": "The text suggests that Nietzsche’s 'aristocratic' values are inherently anti-nihilistic.", "isCorrect": false, "rationale": "While he holds aristocratic values, his avoidance of nihilism is specifically linked to the creative 'freedom for' phase rather than his views on rank."}], "id": "q07"}, {"question": "According to the text, what is a common 'inadequate' reaction to Nietzsche's aristocratic tone?", "options": [{"text": "Embracing it as a flattering self-image without applying critical scrutiny.", "isCorrect": true, "rationale": "The author warns against uncritical admiration where one simply assumes they are 'one of the few' without genuine self-examination."}, {"text": "Applying the 'three metamorphoses' to democratic political structures.", "isCorrect": false, "rationale": "This is not mentioned as an inadequate reaction; the metamorphoses are discussed as a way to understand the free spirit's development."}, {"text": "Using scientific dogma to justify the concept of higher and lower types.", "isCorrect": false, "rationale": "The text notes the dangers of hierarchical language, but identifies the 'freethinker'—not the inadequate reader—as the one who uses scientific dogma."}, {"text": "Attempting to share the free spirit's freedom equally with all people.", "isCorrect": false, "rationale": "The text says Nietzsche is not interested in equal freedom, but it characterizes 'moralistic rejection' or 'uncritical admiration' as the primary inadequate responses."}], "id": "q08"}, {"question": "Which of the following describes the 'pathos of distance' as presented in the text?", "options": [{"text": "The gap that separates the rare, independent philosopher from the mass of humanity.", "isCorrect": true, "rationale": "The text uses this term to describe the hierarchy and rarity of the free spirit compared to the conformist majority."}, {"text": "The emotional struggle of a free spirit who feels isolated from their own past values.", "isCorrect": false, "rationale": "While the free spirit is isolated, the 'pathos of distance' refers specifically to the rank and hierarchy between types of people, not an internal emotional struggle."}, {"text": "The objective detachment required to conduct scientific research without bias.", "isCorrect": false, "rationale": "The text contrasts the free spirit with the 'shallow Enlightenment rationalist' who values scientific dogma, making this an unlikely definition."}, {"text": "The geographical distance Nietzsche recommends free spirits maintain from urban centers.", "isCorrect": false, "rationale": "The term is used metaphorically to describe rank and intellectual rarity, not physical or geographical location."}], "id": "q09"}, {"question": "What is described as a 'central tension' or 'fatal flaw' in Nietzsche's work by some readers?", "options": [{"text": "The disparity between his vivid critiques and his sketchy positive vision.", "isCorrect": true, "rationale": "The text identifies the gap between Nietzsche's clear destruction of values and his comparatively vague instructions on what to create as a major tension."}, {"text": "The contradiction between his love of science and his rejection of Enlightenment rationalism.", "isCorrect": false, "rationale": "Nietzsche is portrayed as critiquing scientific dogma as just another form of belief in truth, rather than having a contradictory love for it."}, {"text": "The conflict between his desire for spiritual aristocracy and his defense of democracy.", "isCorrect": false, "rationale": "The text suggests Nietzsche's views might be incompatible with democracy, rather than claiming he defends it."}, {"text": "The irony of a grandmaster of values who refuses to follow any rules of logic.", "isCorrect": false, "rationale": "The grandmaster analogy describes the depth of his understanding of values, but the text does not cite a 'rejection of logic' as the central tension."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
