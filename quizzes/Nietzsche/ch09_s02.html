<script>
var QUESTIONS = [{"question": "What distinguishes Nietzsche's concept of $amor\\ fati$ from the Stoic tradition?", "options": [{"text": "The Stoics sought to change their fate, while Nietzsche demanded a total withdrawal from action.", "isCorrect": false, "rationale": "Stoics generally advocated for acceptance of fate rather than changing it, and Nietzsche promoted affirmation, not withdrawal."}, {"text": "Nietzsche requires loving fate despite the absence of a rational cosmic order, whereas Stoics trusted in a divine $logos$.", "isCorrect": true, "rationale": "Nietzsche's position is radical because it demands affirmation of a universe he views as 'chaos,' lacking the rational justification the Stoics relied upon."}, {"text": "Nietzsche's approach is based on a resigned acceptance of suffering, while Stoics viewed suffering as an illusion.", "isCorrect": false, "rationale": "Nietzsche's approach is described as an active 'love' or 'yea-saying' rather than resignation, and Stoics acknowledged suffering but emphasized toughness in facing it."}, {"text": "The Stoics believed the universe was indifferent, whereas Nietzsche believed it was governed by a benevolent purpose.", "isCorrect": false, "rationale": "This reverses the two philosophies; Stoics believed in a rational order ($logos$), while Nietzsche viewed the universe as indifferent and purposeless."}]}, {"question": "According to the text, what was the primary point of agreement between Schopenhauer and Nietzsche?", "options": [{"text": "They both believed that aesthetic contemplation is the only way to escape the will to live.", "isCorrect": false, "rationale": "This was Schopenhauer's view; Nietzsche rejected the idea of escaping or denying the will to live."}, {"text": "They both argued that the universe is governed by a rational $logos$ that justifies human suffering.", "isCorrect": false, "rationale": "Both philosophers actually agreed that there is no cosmic plan or rational order that redeems human suffering."}, {"text": "They both diagnosed life as involving unavoidable suffering without a cosmic plan to redeem it.", "isCorrect": true, "rationale": "While they disagreed on the response, both acknowledged the reality of suffering in a world without divine justification."}, {"text": "They both concluded that the ultimate goal of existence is to reach a state similar to Buddhist nirvana.", "isCorrect": false, "rationale": "Only Schopenhauer associated his goal of will-denial with nirvana; Nietzsche viewed such a goal as life-denying."}]}, {"question": "How does Nietzsche's eternal recurrence invert the Buddhist concept of $samsara$?", "options": [{"text": "Nietzsche views the cycle of existence as a problem to be escaped through enlightenment.", "isCorrect": false, "rationale": "This describes the Buddhist goal of liberation (nirvana), whereas Nietzsche seeks to embrace the cycle."}, {"text": "Buddhism seeks liberation from the cycle of suffering, while Nietzsche seeks the total affirmation of it.", "isCorrect": true, "rationale": "The text states that where Buddhism sees recurrence as a problem to solve, Nietzsche sees it as a test of one's ability to say 'yes' to life."}, {"text": "Nietzsche emphasizes compassion for others in the cycle, while Buddhism focuses on monastic isolation.", "isCorrect": false, "rationale": "The text suggests Nietzsche's understanding of Buddhism was limited to a specific monastic view, but his primary inversion concerns the affirmation versus denial of the cycle itself."}, {"text": "Buddhism argues that only positive events recur, while Nietzsche argues that all events recur.", "isCorrect": false, "rationale": "Buddhist cosmology posits that $samsara$ is a wheel of suffering, implying that painful existence is what recurs."}]}, {"question": "Why does Nietzsche criticize the 'no regrets' mentality found in modern popular culture?", "options": [{"text": "Because it focuses too much on the suffering of the past rather than the pleasures of the present.", "isCorrect": false, "rationale": "The popular version is criticized for being impulsive and avoiding reflection, not for focusing too much on past pain."}, {"text": "Because it is a philosophy of impulse that avoids the rigorous self-examination required to truly affirm one's life.", "isCorrect": true, "rationale": "Nietzsche's recurrence requires facing every failure and wound honestly and affirming them as necessary, rather than just ignoring consequences."}, {"text": "Because it encourages people to seek out suffering intentionally rather than accepting it when it occurs.", "isCorrect": false, "rationale": "The motto 'live with no regrets' is typically about maximizing pleasure or avoiding worry, which is the opposite of seeking suffering."}, {"text": "Because Nietzsche believed that regret is a necessary and healthy emotion that should never be overcome.", "isCorrect": false, "rationale": "Nietzsche's goal was actually the overcoming of regret through affirmation, but through a deep and difficult process rather than simple avoidance."}]}, {"question": "In the context of the eternal recurrence, what does Nietzsche mean by the 'greatest weight'?", "options": [{"text": "The psychological burden of remembering every detail of one's past life for eternity.", "isCorrect": false, "rationale": "While it involves memory, the 'weight' refers to the existential significance and choice added to one's actions."}, {"text": "The inescapable gravity of a universe that is physically collapsing and expanding in cycles.", "isCorrect": false, "rationale": "The text treats the recurrence primarily as a thought experiment or existential test rather than a theory of physical gravity."}, {"text": "The transformative pressure that turns routine decisions into significant existential choices.", "isCorrect": true, "rationale": "By asking 'would you will this choice forever?', the eternal recurrence makes every moment matter as if it were for eternity."}, {"text": "The moral responsibility to ensure that one's actions do not cause suffering for others in future cycles.", "isCorrect": false, "rationale": "Nietzsche's concept is less about abstract moral responsibility to others and more about the individual's affirmation of their own existence."}]}, {"question": "Nietzsche's break with Schopenhauer is described as a 'failure of nerve' on the part of Schopenhauer. What does this mean?", "options": [{"text": "Schopenhauer was unable to admit that life involves unavoidable suffering.", "isCorrect": false, "rationale": "Schopenhauer was famous for staring into the 'abyss' and acknowledging suffering; his 'failure' was in his response to it."}, {"text": "Schopenhauer had the courage to see the truth of suffering but lacked the courage to affirm it.", "isCorrect": true, "rationale": "Nietzsche admired Schopenhauer's honesty but rejected his 'nay-saying' asceticism as a retreat from the truth he discovered."}, {"text": "Schopenhauer was too afraid to study the rational $logos$ that would have explained suffering.", "isCorrect": false, "rationale": "Both Schopenhauer and Nietzsche agreed there was no rational $logos$ to be found."}, {"text": "Schopenhauer lacked the intellectual capacity to understand the Buddhist concept of $samsara$.", "isCorrect": false, "rationale": "The text notes that Schopenhauer actually associated his philosophy with Buddhism; the critique was of his life-denying stance, not his intellect."}]}, {"question": "Which Roman Stoic is quoted in the text as counseling that one should want events to happen as they do happen?", "options": [{"text": "Marcus Aurelius", "isCorrect": false, "rationale": "While Marcus Aurelius is mentioned as a Stoic, the specific quote 'Do not seek to have events happen as you want them to...' is attributed to Epictetus."}, {"text": "Epictetus", "isCorrect": true, "rationale": "The text explicitly quotes Epictetus from the *Enchiridion* to illustrate the Stoic attitude of resigned acceptance."}, {"text": "Seneca", "isCorrect": false, "rationale": "Seneca is a famous Roman Stoic, but he is not mentioned in the provided text."}, {"text": "Nietzsche", "isCorrect": false, "rationale": "Nietzsche is the primary subject of the text, but the quote in question represents the Stoic position he was building upon."}]}, {"question": "According to the text, how does Nietzsche view the nature of the universe in contrast to a rational order?", "options": [{"text": "As a 'chaos' that is indifferent to human happiness or suffering.", "isCorrect": true, "rationale": "Nietzsche rejects the $logos$ and describes the universe as lacking order, purpose, or care for humanity."}, {"text": "As a complex machine that operates according to discoverable physical laws.", "isCorrect": false, "rationale": "While science might find laws, the text focuses on the philosophical lack of 'cosmic rationality' or 'divine plan' in Nietzsche's view."}, {"text": "As a fundamentally malevolent force driven by an irrational Will.", "isCorrect": false, "rationale": "This view is closer to Schopenhauer's pessimism than Nietzsche's neutral 'chaos' which he chooses to love."}, {"text": "As a temporary illusion that will eventually be replaced by a higher reality.", "isCorrect": false, "rationale": "Nietzsche affirms the reality of this world and its recurrence rather than viewing it as a secondary illusion."}]}, {"question": "The text mentions that Nietzsche's understanding of Buddhism was specifically shaped by which of the following?", "options": [{"text": "The Mahayana tradition's emphasis on compassion.", "isCorrect": false, "rationale": "The text notes that modern Mahayana might have been more congenial to Nietzsche, but it was not his primary influence."}, {"text": "Schopenhauer's interpretation of world-denial and quietism.", "isCorrect": true, "rationale": "Nietzsche's view of Buddhism was filtered through his 'great teacher' Schopenhauer, who focused on the denial of the will."}, {"text": "The Stoic concept of $logos$ and rational order.", "isCorrect": false, "rationale": "Stoicism and Buddhism are treated as separate historical comparisons in the text."}, {"text": "The modern 'live with no regrets' popular movement.", "isCorrect": false, "rationale": "The 'no regrets' movement is presented as a modern debasement of Nietzsche's own ideas, not an influence on his view of Buddhism."}]}, {"question": "In the 'Connection Box,' how is the eternal recurrence applied to daily life?", "options": [{"text": "It serves as a method to avoid making difficult decisions by accepting whatever happens.", "isCorrect": false, "rationale": "It is described as making life something you 'actively choose' rather than just letting it happen to you."}, {"text": "It functions as a moral code that determines the 'right' thing to do in an abstract sense.", "isCorrect": false, "rationale": "The text explicitly states it is not about 'is this the right thing to do?' in an abstract moral sense."}, {"text": "It asks individuals to consider if they would want to repeat a specific choice for all eternity.", "isCorrect": true, "rationale": "This question transforms routine moments into existential ones by raising the stakes of every action."}, {"text": "It encourages people to plan their lives around minimizing future suffering and regret.", "isCorrect": false, "rationale": "Nietzsche's focus is on affirming life *including* the suffering, rather than a strategy of minimization."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
