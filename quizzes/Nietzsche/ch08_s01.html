<script>
var QUESTIONS = [{"question": "According to the text, what is the 'single most important interpretive key' for understanding Nietzsche's work, \"The Antichrist\"?", "options": [{"text": "The sharp distinction between the person of Jesus and the religion of Christianity.", "isCorrect": true, "rationale": "The text identifies this distinction as the crucial element that prevents readers from assuming Nietzsche is attacking every aspect of the tradition."}, {"text": "Nietzsche's total rejection of all religious and spiritual practices.", "isCorrect": false, "rationale": "The text explicitly states Nietzsche has sympathy for certain practices, such as Buddhism, suggesting his critique is not a blanket rejection of all religion."}, {"text": "The use of the Mencken translation as the only definitive scholarly source.", "isCorrect": false, "rationale": "While Mencken is praised for capturing Nietzsche's style, the text notes that Kaufmann and Hollingdale are more reliable for serious scholarly work."}, {"text": "The alignment of Nietzsche's philosophy with the doctrines of the institutional church.", "isCorrect": false, "rationale": "Nietzsche's work is described as an attack on the institutional church, which he views as a betrayal of Jesus' actual practice."}], "id": "q01"}, {"question": "Nietzsche describes his version of Jesus as a 'holy anarchist.' Which characteristic is central to this portrayal?", "options": [{"text": "A refusal to judge, condemn, or resist evil.", "isCorrect": true, "rationale": "Nietzsche characterizes Jesus as one who lived a certain way without trading in doctrines or moral coercion."}, {"text": "A revolutionary intent to overthrow the Roman political administration.", "isCorrect": false, "rationale": "Nietzsche portrays Jesus as one who does not resist and whose 'kingdom' is an internal experience rather than a political entity."}, {"text": "The creation of a systematic theology based on the concept of sin.", "isCorrect": false, "rationale": "The text argues that Nietzsche's Jesus is sympathetic specifically because he was not a theologian and did not use doctrines."}, {"text": "The establishment of a future kingdom to reward those who suffer on Earth.", "isCorrect": false, "rationale": "Nietzsche specifies that for Jesus, the 'kingdom of God' was a present way of experiencing the world, not a future reward."}], "id": "q02"}, {"question": "How does Nietzsche's critique of Buddhism differ from his critique of Christianity?", "options": [{"text": "He respects Buddhism for confronting suffering without inventing the concept of cosmic guilt.", "isCorrect": true, "rationale": "The source notes that Nietzsche distinguishes Buddhism from religions that weaponize guilt and moralize suffering."}, {"text": "He views Buddhism as a life-affirming philosophy that avoids the ascetic ideal.", "isCorrect": false, "rationale": "The text mentions that Nietzsche's critique of the ascetic ideal likely extends to Buddhism's concept of nirvana."}, {"text": "He argues that Buddhism is superior because it focuses on the Platonic realm of Forms.", "isCorrect": false, "rationale": "Nietzsche critiques the Platonic realm of Forms as another example of otherworldliness and decadence."}, {"text": "He claims Buddhism is the only religion that successfully maintains its founder's original practice.", "isCorrect": false, "rationale": "The text suggests Nietzsche views any systematic devaluation of life, including Buddhist nirvana, as a symptom of decadence."}], "id": "q03"}, {"question": "According to Nietzsche, who is primarily responsible for turning Jesus' practice into a 'weapon of moral coercion'?", "options": [{"text": "The apostle Paul and later theologians.", "isCorrect": true, "rationale": "Nietzsche argues that Paul took a way of living and transformed it into a system of belief and institutional coercion."}, {"text": "The Roman emperors who institutionalized the church.", "isCorrect": false, "rationale": "While the institution is critiqued, the text focuses on the theological shift initiated by Paul as the primary betrayal."}, {"text": "The 'holy anarchist' himself through his public teachings.", "isCorrect": false, "rationale": "Nietzsche views Jesus as the only 'genuine Christian' whose practice was non-resistant and non-doctrinal."}, {"text": "Schopenhauer, through his misreading of Eastern traditions.", "isCorrect": false, "rationale": "Schopenhauer is mentioned only in the context of Nietzsche’s imprecise understanding of Buddhism, not as the creator of Christian coercion."}], "id": "q04"}, {"question": "What is Nietzsche’s primary objection to the 'ascetic ideal' as presented in the source?", "options": [{"text": "It devalues earthly existence in favor of an 'otherworld' or future reward.", "isCorrect": true, "rationale": "The critique suggests that any system promising compensation for earthly misery at the expense of this life is a sign of decadence."}, {"text": "It lacks the necessary rhetorical violence required for a strong culture.", "isCorrect": false, "rationale": "Rhetorical violence is a quality of Nietzsche's prose, not a standard he uses to validate the ascetic ideal."}, {"text": "It is based on a misunderstanding of the Platonic Forms.", "isCorrect": false, "rationale": "Nietzsche critiques the Platonic realm of Forms alongside the ascetic ideal as part of his general critique of otherworldliness."}, {"text": "It encourages people to resist evil too aggressively.", "isCorrect": false, "rationale": "The ascetic ideal is linked to moral coercion, but the source emphasizes its devaluing of 'this life' as the core issue."}], "id": "q05"}, {"question": "Why does the author suggest that H. L. Mencken was a paradoxically 'excellent' translator for \"The Antichrist\"?", "options": [{"text": "His background as a satirist and provocateur allowed him to capture the work's rhetorical velocity.", "isCorrect": true, "rationale": "The text explains that Mencken's version 'sounds like Nietzsche feels,' preserving the aggressive performance of the late style."}, {"text": "His professional training as a German scholar ensured total linguistic precision.", "isCorrect": false, "rationale": "The text explicitly states Mencken was NOT a professional scholar of German and occasionally took liberties."}, {"text": "He was the only translator who correctly identified the distinction between Jesus and Paul.", "isCorrect": false, "rationale": "While he translated the work, the interpretive distinction is attributed to Nietzsche's own text, not exclusively to Mencken's insight."}, {"text": "He removed Nietzsche's prejudices to make the text more accessible to modern readers.", "isCorrect": false, "rationale": "The text notes that Mencken's word choices sometimes reflected his OWN prejudices, rather than refining Nietzsche's."}], "id": "q06"}, {"question": "In the context of the source, what does the term 'd'ecadence' refer to?", "options": [{"text": "A systematic devaluation of earthly existence.", "isCorrect": true, "rationale": "The text states that Nietzsche views the preference for a 'heaven' or 'nirvana' over this life as a symptom of decadence."}, {"text": "The physical collapse of the institutional church.", "isCorrect": false, "rationale": "Decadence in this context is a philosophical and value-based diagnosis rather than a description of institutional health."}, {"text": "The shift from German academic prose to rhetorical performance.", "isCorrect": false, "rationale": "The shift in prose style is discussed in relation to Mencken, but 'decadence' is used to critique otherworldliness."}, {"text": "A lack of scholarly precision in translating philosophical texts.", "isCorrect": false, "rationale": "The text critiques Mencken's lack of precision but does not label it as 'decadence.'"}], "id": "q07"}, {"question": "What claim does Nietzsche make with the provocative line: 'the only genuine Christian died on the cross' (AC 39)?", "options": [{"text": "Every person who followed Jesus practiced something fundamentally different from his teachings.", "isCorrect": true, "rationale": "The line implies that Jesus' unique practice ended with his death and was not continued by his followers."}, {"text": "Jesus' crucifixion was a necessary sacrifice to atone for human sin.", "isCorrect": false, "rationale": "This is a doctrine of the institutional church which Nietzsche argues is a betrayal of Jesus' actual life."}, {"text": "Only those who are martyred can truly be considered followers of Jesus.", "isCorrect": false, "rationale": "Nietzsche's focus is on the loss of Jesus' 'practice' of non-resistance, not a requirement for literal martyrdom for others."}, {"text": "Christianity achieved its most perfect institutional form immediately following the crucifixion.", "isCorrect": false, "rationale": "Nietzsche views the subsequent development of the church as a corruption rather than a perfection."}], "id": "q08"}, {"question": "The text notes that Nietzsche's treatment of 'nirvana' was influenced more by which philosopher than by the Buddhist tradition itself?", "options": [{"text": "Arthur Schopenhauer.", "isCorrect": true, "rationale": "The text points out that Nietzsche's imprecise reading of nirvana reflects Schopenhauer's interpretation of Buddhism."}, {"text": "Plato.", "isCorrect": false, "rationale": "Plato is mentioned in the context of the 'realm of Forms,' another target of Nietzsche's critique of otherworldliness."}, {"text": "St. Paul.", "isCorrect": false, "rationale": "St. Paul is the target of Nietzsche's critique regarding the invention of Christianity, not the source of his Buddhist views."}, {"text": "Walter Kaufmann.", "isCorrect": false, "rationale": "Kaufmann is a modern translator mentioned for his reliability, not a philosopher who influenced Nietzsche's view of nirvana."}], "id": "q09"}, {"question": "Which of the following would Nietzsche likely consider a 'weapon of moral coercion' based on the text?", "options": [{"text": "The doctrine of the Last Judgment.", "isCorrect": true, "rationale": "The text identifies the church's use of doctrines like judgment and sin as tools for institutional control and coercion."}, {"text": "The practice of non-resistance to evil.", "isCorrect": false, "rationale": "Nietzsche finds Jesus' practice of non-resistance compelling and contrasts it with the coercive nature of the church."}, {"text": "The confrontational nature of Mencken's prose.", "isCorrect": false, "rationale": "While aggressive, Mencken's prose is a rhetorical style rather than a religious doctrine used for moral coercion."}, {"text": "The rejection of 'cosmic guilt' found in Buddhism.", "isCorrect": false, "rationale": "Nietzsche respects the absence of cosmic guilt, viewing it as a positive distinction from Christian moralizing."}], "id": "q10"}, {"question": "In AC 7, Nietzsche calls pity 'the technic of nihilism.' What is his specific argument for why pity diminishes life?", "options": [{"text": "Pity multiplies suffering by making it contagious, fights natural selection by preserving those 'ripe for destruction,' and thus promotes décadence.", "isCorrect": true, "rationale": "Nietzsche argues that pity does not merely fail to help — it actively drains the strength of the one who pities and interferes with the law of natural selection by preserving the weak and botched."}, {"text": "Pity replaces genuine love with a condescending attitude that prevents individuals from achieving greatness.", "isCorrect": false, "rationale": "While Nietzsche distinguishes pity from noble love, the specific argument in AC 7 focuses on the depressive and contagious nature of pity as a life-diminishing force."}, {"text": "Pity is a form of self-deception that masks the will to power behind a pretense of altruism.", "isCorrect": false, "rationale": "This is closer to the psychological genealogy from the Genealogy of Morality; in AC 7, Nietzsche's argument centers on pity's physiological effect as a depressant and its role in thwarting evolution."}, {"text": "Pity creates political instability by encouraging the weak classes to demand power.", "isCorrect": false, "rationale": "The political dimension is secondary; Nietzsche's primary charge is that pity preserves whatever is 'ripe for destruction' and thereby gives life 'a gloomy and dubious aspect.'"}], "id": "q11"}, {"question": "In AC 16–17, Nietzsche traces the 'degradation' of a national god into the Christian God of goodness. What drives this transformation according to his account?", "options": [{"text": "A declining nation strips its god of aggressive, strong qualities and turns him into a god of the weak and suffering, as an expression of its own diminished will to power.", "isCorrect": true, "rationale": "Nietzsche argues that a nation projects its own vitality or exhaustion onto its deity; as the people's will to power declines, their god becomes meek, cosmopolitan, and moralistic — the god of all nooks and crevices."}, {"text": "The spread of philosophical rationalism gradually purified the image of god by stripping away anthropomorphic attributes.", "isCorrect": false, "rationale": "Nietzsche does not present this as philosophical purification but as physiological and psychological décadence — a symptom of weakness, not rationality."}, {"text": "Paul's missionary success among the Gentiles required a universal, non-ethnic god who could appeal to diverse cultures.", "isCorrect": false, "rationale": "While Paul's role in universalizing Christianity is noted elsewhere in the text, AC 16–17 specifically diagnoses the transformation as an expression of declining national vitality."}, {"text": "The monotheistic insight that a truly omnipotent god could not simultaneously be both good and evil.", "isCorrect": false, "rationale": "Nietzsche argues the opposite: the original god could legitimately be both friend and foe, and the reduction to 'goodness alone' is the pathology, not the correction."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
