    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In his 1873 essay, why did Nietzsche criticize David Friedrich Strauss, despite Strauss having already characterized the Gospels as mythological?", "options": [{"text": "He believed Strauss was too radical in his rejection of the historical record.", "isCorrect": false, "rationale": "Nietzsche actually valued the radical nature of the scholarship but found the subsequent philosophical conclusions lacking in courage."}, {"text": "He felt Strauss was timid for replacing Christian foundations with a bland secular humanism.", "isCorrect": true, "rationale": "Nietzsche's primary grievance was that Strauss demolished the old faith only to suggest a comfortable, unchallenging replacement rather than facing the grim consequences."}, {"text": "He argued that Strauss relied too heavily on the existential kerygma rather than historical facts.", "isCorrect": false, "rationale": "The focus on the 'kerygma' is associated with Rudolf Bultmann, a later scholar, rather than Strauss."}, {"text": "He disagreed with Strauss's assertion that Jesus was a social revolutionary.", "isCorrect": false, "rationale": "The 'social revolutionary' portrait is associated with more recent scholars like John Dominic Crossan."}], "id": "q01"}, {"question": "Which scholar's portrait of Jesus as an 'apocalyptic prophet' serves as a historical contrast to Nietzsche's 'Buddhist-anarchist-mystic' interpretation?", "options": [{"text": "Rudolf Bultmann", "isCorrect": false, "rationale": "Bultmann argued that historical facts about Jesus were essentially unknowable and emphasized the existential message instead."}, {"text": "John Dominic Crossan", "isCorrect": false, "rationale": "Crossan is known for a more modern portrait of Jesus as a social revolutionary rather than an apocalyptic prophet."}, {"text": "Albert Schweitzer", "isCorrect": true, "rationale": "Schweitzer argued that Jesus's message was entirely centered on the imminent end of the world, which differs significantly from Nietzsche's psychological portrait."}, {"text": "N. T. Wright", "isCorrect": false, "rationale": "Wright views Jesus as the inaugurator of God's kingdom within a Jewish context, rather than focusing primarily on the apocalyptic 'end of the world' as Schweitzer did."}], "id": "q02"}, {"question": "Nietzsche's description of Jesus as an 'idiot' in AC 29 is widely believed by scholars to be an allusion to which literary source?", "options": [{"text": "Tolstoy's 'The Kingdom of God is Within You'", "isCorrect": false, "rationale": "While Tolstoy influenced Nietzsche's view of Jesus's ethics, the specific term 'idiot' refers to a different Russian novelist's character."}, {"text": "Dostoevsky's 'The Idiot'", "isCorrect": true, "rationale": "Nietzsche read Dostoevsky with great admiration and used the term in a sense that mirrored Prince Myshkin’s child-like, unworldly nature."}, {"text": "Kierkegaard's 'Fear and Trembling'", "isCorrect": false, "rationale": "Nietzsche is unlikely to have read Kierkegaard, and the term 'idiot' is not a central motif in Kierkegaard's pseudonymic works."}, {"text": "Strauss's 'The Life of Jesus Critically Examined'", "isCorrect": false, "rationale": "Strauss's work was a critical historical analysis and did not use the poetic or psychological terminology found in Nietzsche's later work."}], "id": "q03"}, {"question": "According to the text, what is the primary point of divergence between Nietzsche and Kierkegaard regarding their attacks on religious institutions?", "options": [{"text": "Kierkegaard blamed Paul for the betrayal of Jesus, whereas Nietzsche blamed the later church.", "isCorrect": false, "rationale": "It was Nietzsche who placed the blame on the Apostle Paul, while Kierkegaard blamed the cumulative softening of the faith by all generations."}, {"text": "Nietzsche sought to restore the radical demands of the Gospel, while Kierkegaard sought to abolish them.", "isCorrect": false, "rationale": "The roles are reversed; Kierkegaard wanted to return to the radical demands, while Nietzsche viewed the demands themselves as part of the problem."}, {"text": "Kierkegaard attacked the institution in the name of Christianity, whereas Nietzsche attacked Christianity itself.", "isCorrect": true, "rationale": "Kierkegaard remained a believer who wanted to rescue the faith from 'Christendom,' while Nietzsche's critique was an external rejection of the faith's core."}, {"text": "Nietzsche advocated for a 'leap of faith,' while Kierkegaard advocated for individual authenticity without religion.", "isCorrect": false, "rationale": "The 'leap of faith' is a cornerstone of Kierkegaard’s Christian philosophy, not Nietzsche's."}], "id": "q04"}, {"question": "How did Kierkegaard define 'Christendom' in his critique of 19th-century religion?", "options": [{"text": "The original community of disciples established by Jesus.", "isCorrect": false, "rationale": "This community would be considered 'authentic' Christianity by Kierkegaard, not the corrupted 'Christendom' he attacked."}, {"text": "A radical sect that demanded a terrifying and irrational leap of faith.", "isCorrect": false, "rationale": "This description fits Kierkegaard's ideal of authentic Christianity, which he contrasted with the state religion."}, {"text": "The comfortable, bourgeois, and state-sponsored version of religion.", "isCorrect": true, "rationale": "Kierkegaard used 'Christendom' to describe how the radical nature of the Gospel had been neutralized by social respectability and institutionalization."}, {"text": "The theological system developed by the Apostle Paul to replace Jesus’s message.", "isCorrect": false, "rationale": "While Nietzsche focused on Paul's specific theological shifts, Kierkegaard focused on the general cultural decay of the faith into a 'Sunday social club.'"}], "id": "q05"}, {"question": "In the context of the 1960s 'Death of God' theology, how was the 'death' of the divine primarily understood?", "options": [{"text": "As a literal metaphysical event occurring within the spiritual realm.", "isCorrect": false, "rationale": "The theologians viewed it as a change in human experience and culture rather than a change in the actual nature of a deity."}, {"text": "As a cultural reality where the concept of a transcendent God no longer functioned.", "isCorrect": true, "rationale": "The movement emphasized that the 'up there' or 'out there' God of traditional theism had lost its relevance and power in the modern world."}, {"text": "As a call to return to the historical Jesus of 19th-century scholarship.", "isCorrect": false, "rationale": "While related to the collapse of old certainties, the movement was more focused on living 'religionlessly' in the present than on specific historical reconstruction."}, {"text": "As a rejection of the 'leap of faith' proposed by Kierkegaard.", "isCorrect": false, "rationale": "The movement actually felt the force of Nietzsche's diagnosis and tried to build a theology that acknowledged the absence of the traditional God."}], "id": "q06"}, {"question": "Which modern theologian proposed the concept of 'religionless Christianity' from a Nazi prison, as mentioned in the text's 'connection box'?", "options": [{"text": "Paul Tillich", "isCorrect": false, "rationale": "Tillich is mentioned for redefining God as the 'ground of being' rather than 'religionless Christianity.'"}, {"text": "Thomas Altizer", "isCorrect": false, "rationale": "Altizer was a key figure in the 'Death of God' movement in the 1960s, long after the era of Nazi prisons."}, {"text": "Dietrich Bonhoeffer", "isCorrect": true, "rationale": "Bonhoeffer explored how to live a Christian life without the traditional trappings of 'religion' while imprisoned by the Nazis."}, {"text": "William Hamilton", "isCorrect": false, "rationale": "Hamilton was associated with the 'Death of God' theology of the 1960s, not the mid-century German resistance."}], "id": "q07"}, {"question": "What common recognition is shared by Nietzsche and modern historical Jesus scholars, according to the source material?", "options": [{"text": "Jesus intended to found a worldwide institutional church.", "isCorrect": false, "rationale": "Both Nietzsche and the scholars generally agree that there is a significant gap between Jesus's actual life and the institution that followed."}, {"text": "The Gospel narratives should be read as literal historical accounts.", "isCorrect": false, "rationale": "The source material emphasizes that both Nietzsche and the scholars recognize these accounts are often mythological or influenced by later doctrine."}, {"text": "There exists a fundamental gap between the historical Jesus and developed Christianity.", "isCorrect": true, "rationale": "Despite their different methods, they all acknowledge that the figure of Jesus as he lived is distinct from the Christ defined by church dogma."}, {"text": "The 'leap of faith' is the only way to honestly approach the historical Jesus.", "isCorrect": false, "rationale": "This is a specific theological claim by Kierkegaard, not a shared consensus among historical scholars or Nietzsche."}], "id": "q08"}, {"question": "Paul Tillich’s response to the problem of honest faith involved redefining God as:", "options": [{"text": "A cosmic insurance policy.", "isCorrect": false, "rationale": "The text identifies 'cosmic insurance' as a dishonest way to hold faith that Tillich and others sought to move beyond."}, {"text": "The ground of being.", "isCorrect": true, "rationale": "Tillich sought to move away from God as a 'being' among other beings and toward a more foundational existential concept."}, {"text": "An apocalyptic prophet.", "isCorrect": false, "rationale": "This was Albert Schweitzer’s historical categorization of Jesus, not Tillich’s metaphysical definition of God."}, {"text": "A supernatural being 'up there'.", "isCorrect": false, "rationale": "The 'Death of God' theology and modernists like Tillich specifically rejected the concept of God as a distant supernatural entity."}], "id": "q09"}, {"question": "What was the actual historical relationship between Nietzsche and Kierkegaard, according to the source material?", "options": [{"text": "They shared many themes but Nietzsche almost certainly never read Kierkegaard's work.", "isCorrect": true, "rationale": "The source clarifies that although they shared many themes like individual authenticity and irony, Nietzsche was likely unaware of Kierkegaard's work."}, {"text": "They were contemporaries who frequently corresponded about their shared critiques of the church.", "isCorrect": false, "rationale": "While their themes are similar, the text states that Nietzsche almost certainly never read Kierkegaard, let alone corresponded with him."}, {"text": "Nietzsche read and directly responded to Kierkegaard's 'Attack Upon Christendom' in The Antichrist.", "isCorrect": false, "rationale": "The text indicates Nietzsche was likely unaware of Kierkegaard's work; any thematic parallels are independent rather than direct responses."}, {"text": "Kierkegaard was a devoted follower of Nietzsche who extended the 'death of God' thesis into theology.", "isCorrect": false, "rationale": "Kierkegaard (1813-1855) actually predated Nietzsche (1844-1900), so he could not have been a follower. Their similar themes developed independently."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
