<script>
var QUESTIONS = [{"question": "How does Nietzsche define 'happiness' within the context of his philosophical assault on conventional morality?", "options": [{"text": "The feeling that power increases and resistance is overcome.", "isCorrect": true, "rationale": "Nietzsche explicitly identifies happiness not as contentment or peace, but as the active sensation of exercising and increasing one's power over obstacles."}, {"text": "The attainment of a state of perpetual peace and contentment.", "isCorrect": false, "rationale": "Nietzsche rejects contentment and 'peace at any price' as virtues, viewing them instead as signs of declining vitality or weakness."}, {"text": "The alignment of one's soul with the 'moral order of the world.'", "isCorrect": false, "rationale": "He views the 'moral order of the world' as a priestly fiction designed to negate the natural instincts of life and power."}, {"text": "The intellectual clarity gained through the study of metaphysics.", "isCorrect": false, "rationale": "Nietzsche often dismisses metaphysicians as 'albinos of the intellect' who spin cobwebs of abstraction that deny reality."}], "id": "q01"}, {"question": "Why does Nietzsche characterize 'pity' as a 'depressant' that is fundamentally hostile to life?", "options": [{"text": "It preserves what is naturally ripe for destruction, thwarting natural selection.", "isCorrect": true, "rationale": "Pity, for Nietzsche, acts as a 'technic of nihilism' by maintaining the lives of the weak and 'botched' who would otherwise perish in a healthy evolutionary process."}, {"text": "It requires an excessive amount of egoism from the person who feels it.", "isCorrect": false, "rationale": "Nietzsche argues the opposite: pity drains the individual of strength and multiplies the suffering present in the world."}, {"text": "It creates a social hierarchy based on those who give and those who receive.", "isCorrect": false, "rationale": "His critique focuses on pity's role in promoting decadence and denying life, rather than its specific socio-economic structure."}, {"text": "It is an insincere emotion used by the strong to manipulate the weak.", "isCorrect": false, "rationale": "He views it as a genuine but pathological and contagious instinct that saps the energy of both the sufferer and the sympathizer."}], "id": "q02"}, {"question": "According to the text, what is the primary distinction between the Buddhist and Christian approaches to suffering?", "options": [{"text": "Buddhism is psychologically honest about suffering, while Christianity links it to imaginary concepts like 'sin.'", "isCorrect": true, "rationale": "Nietzsche respects Buddhism for treating suffering as a technical problem to be solved, whereas Christianity moralizes suffering to induce guilt."}, {"text": "Christianity seeks to eliminate suffering on earth, while Buddhism embraces it as a path to divinity.", "isCorrect": false, "rationale": "Nietzsche argues Christianity actually 'lives by distress' and creates it to make itself immortal through the concept of sin."}, {"text": "Buddhism relies on a personal god for salvation, while Christianity relies on the individual's will.", "isCorrect": false, "rationale": "The text notes that Buddhism does not demand belief in a personal god, whereas Christianity is centered on an 'imaginary' relationship with one."}, {"text": "Christianity is a religion for the end of a civilization, while Buddhism is meant to found a new one.", "isCorrect": false, "rationale": "Nietzsche identifies Buddhism as a religion for the 'end' of a culture (decadent but honest), while Christianity is what 'creates' exhaustion in the first place."}], "id": "q03"}, {"question": "Nietzsche describes the 'Redeemer type' (Jesus) as a 'saintly anarchist.' What does he believe was the core of this figure's practice?", "options": [{"text": "A radical refusal to resist evil and the realization of a 'Kingdom of God' as an inner state.", "isCorrect": true, "rationale": "Nietzsche sees Jesus' true gospel as a way of living that rejects all distance, judgment, and institutional authority in favor of an immediate inner experience."}, {"text": "A heroic struggle against the Roman Empire to liberate the Jewish people.", "isCorrect": false, "rationale": "Nietzsche explicitly rejects the idea of Jesus as a 'hero' and views him as the reverse of all heroic struggle or conflict."}, {"text": "A sophisticated theological defense of the doctrine of original sin.", "isCorrect": false, "rationale": "Nietzsche argues that Jesus actually did away with the concept of 'guilt' and 'sin,' which were later reintroduced by his followers."}, {"text": "A mission to establish a powerful, organized church to govern human morality.", "isCorrect": false, "rationale": "The text states that Christianity (as a church) actually denies the practice of the person it was named after."}], "id": "q04"}, {"question": "Who does Nietzsche identify as the 'counterfeiter' who transformed Jesus' practice into a system of hatred and judgment?", "options": [{"text": "Paul of Tarsus", "isCorrect": true, "rationale": "Nietzsche views Paul as the genius of 'ressentiment' who shifted the center of gravity to the 'beyond' to establish priestly power."}, {"text": "Martin Luther", "isCorrect": false, "rationale": "While Nietzsche despises Luther for 'restoring the church,' he considers him a later figure who rebelled against the Renaissance rather than the original founder."}, {"text": "The Emperor Constantine", "isCorrect": false, "rationale": "Constantine is not discussed as the primary theological architect in these excerpts; the focus is on the psychological and doctrinal shift occurring immediately after Jesus' death."}, {"text": "St. Augustine", "isCorrect": false, "rationale": "Nietzsche uses Augustine as an example of a 'filthy fellow' who came to the top, but Paul is the one credited with the fundamental invention of Christian dogma."}], "id": "q05"}, {"question": "What does Nietzsche mean by the term 'decadence' (décadence) in his critique of values?", "options": [{"text": "A condition where an individual or species loses its instincts and prefers what is harmful.", "isCorrect": true, "rationale": "Nietzsche defines decadence as a physiological and psychological decline where the 'will to power' fails and life-denying values prevail."}, {"text": "The excessive accumulation of material wealth and artistic luxury.", "isCorrect": false, "rationale": "He actually praises the 'luxuriousness' of Moorish life and Renaissance Rome as signs of life-affirming strength rather than decadence."}, {"text": "The collapse of a political empire due to external military invasion.", "isCorrect": false, "rationale": "He argues that Rome did not fall to 'Teutons' but was 'sucked dry' from within by the 'vampire' of Christian values."}, {"text": "The transition from religious faith to secular scientific inquiry.", "isCorrect": false, "rationale": "He views scientific inquiry and the 'sense of fact' as signs of health and integrity that Christianity sought to destroy."}], "id": "q06"}, {"question": "How did the Jewish priesthood, according to Nietzsche, 'denaturize' the history of Israel?", "options": [{"text": "By interpreting all historical success as reward and all failure as punishment for sin.", "isCorrect": true, "rationale": "Nietzsche argues the priests standing the concepts of 'cause' and 'effect' on their heads to make themselves indispensable as mediators for 'reconciliation' with God."}, {"text": "By abandoning their national god in favor of a universal, cosmopolitan deity.", "isCorrect": false, "rationale": "Nietzsche argues they kept their god but changed him from a symbol of power into a 'demure' god of 'goodness' to survive under oppression."}, {"text": "By promoting a scientific understanding of natural causes like rain and harvest.", "isCorrect": false, "rationale": "The text claims the priests specifically swept out natural causation to replace it with a 'moral order' based on divine will."}, {"text": "By encouraging the Jewish people to merge their identity with the Roman Empire.", "isCorrect": false, "rationale": "He describes Judaism as choosing to stay separate 'at any price,' even if it meant the 'radical falsification of all nature.'"}], "id": "q07"}, {"question": "Nietzsche contrasts the 'ends' of Christianity with those of the 'Code of Manu.' What does he find valuable in the latter?", "options": [{"text": "Its ratification of a natural order of castes that allows higher types to flourish.", "isCorrect": true, "rationale": "Nietzsche sees the caste system as a reflection of nature that protects the 'exception' by establishing a healthy 'mediocrity' as a base."}, {"text": "Its early adoption of the principle of equal rights for all individuals.", "isCorrect": false, "rationale": "He views 'equal rights' as a 'poisonous doctrine' and 'Christian dynamite' that undermines social hierarchy and nobility."}, {"text": "Its focus on psychological redemption through the denial of the self.", "isCorrect": false, "rationale": "The Code of Manu is presented as a way to organize life for 'future mastery' and 'perfection,' the opposite of Christian self-denial."}, {"text": "Its rejection of all 'holy lies' and religious traditionalism.", "isCorrect": false, "rationale": "Nietzsche acknowledges that Manu uses 'holy lies' like revelation, but argues they are used to preserve life-affirming instincts rather than destroy them."}], "id": "q08"}, {"question": "What is Nietzsche's assessment of the Renaissance?", "options": [{"text": "The one great war of the past to bring about the transvaluation of Christian values.", "isCorrect": true, "rationale": "Nietzsche views the Renaissance as a moment when 'lofty, beautiful and daring things' almost triumphed over the 'old corruption' of Christianity."}, {"text": "A period of artistic brilliance that unfortunately lacked any real philosophical depth.", "isCorrect": false, "rationale": "He considers the Renaissance a fundamental and direct attack upon the center of the enemy (Christianity) using all resources of genius."}, {"text": "A time of 'German' cultural awakening that led to the Reformation.", "isCorrect": false, "rationale": "He blames the 'German' monk Luther for attacking and destroying the progress made during the Renaissance."}, {"text": "The inevitable evolution of Christian morality toward a more humanitarian form.", "isCorrect": false, "rationale": "He sees it as the 'triumph of life' against Christianity, which he views as the opposite of humanitarianism."}], "id": "q09"}, {"question": "Which term does Nietzsche use to describe the 'Gospels' as rewritten by the followers of Jesus?", "options": [{"text": "Dysangelium", "isCorrect": true, "rationale": "Nietzsche coined this term to mean 'bad tidings,' signifying the reversal of Jesus' life-affirming example into a life-denying doctrine."}, {"text": "Ressentiment", "isCorrect": false, "rationale": "While this term describes the 'vengeful instinct' behind the changes, it is not the specific word he uses to label the corrupted 'Good News.'"}, {"text": "Umwertung", "isCorrect": false, "rationale": "This refers to the 'transvaluation of values' itself, which is Nietzsche's own project or his name for the broader historical shifts."}, {"text": "Souterrain", "isCorrect": false, "rationale": "This word describes the 'underworld' or 'ghetto' nature of the early Christian movement, but not the texts themselves."}], "id": "q10"}, {"question": "According to Nietzsche, what was the 'catastrophic' error of 'modernity'?", "options": [{"text": "The 'virtuous dirtiness' of tolerance and cowardly compromise.", "isCorrect": true, "rationale": "Nietzsche critiques modern 'largeur of the heart' that forgives everything as a sign of sickness and the loss of the ability to say 'Yea' or 'Nay.'"}, {"text": "The rapid advancement of the natural sciences over religion.", "isCorrect": false, "rationale": "He actually laments that Christianity 'sucked dry' the scientific methods and 'keen eye for reality' established in antiquity."}, {"text": "The return to pre-Christian pagan values in Western politics.", "isCorrect": false, "rationale": "He argues that modern politics is 'sick' because it still operates on Christian principles like equality and lacks 'aristocratic' courage."}, {"text": "The rejection of the concept of progress as a false idea.", "isCorrect": false, "rationale": "Nietzsche himself argues that 'progress' is a false idea; thus, he would not see rejecting it as the 'error' of modernity."}], "id": "q11"}, {"question": "Why does Nietzsche claim that the 'immortality of the soul' is a 'vicious outrage upon noble humanity'?", "options": [{"text": "It suggests every 'insignificant bigot' is of equal eternal importance, destroying social distance.", "isCorrect": true, "rationale": "By granting everyone an immortal soul, Christianity 'undermined the aristocratic attitude' and the 'pathos of distance' necessary for high civilization."}, {"text": "It distracts people from the physical reality of suffering in this life.", "isCorrect": false, "rationale": "While true, his primary focus in this context is how it empowers the 'rabble' and the 'botched' through the 'lie of equality.'"}, {"text": "It is a scientific impossibility that deceives the uneducated masses.", "isCorrect": false, "rationale": "Nietzsche's critique is based on the *valuation* and psychological impact of the idea, rather than just a scientific refutation of the afterlife."}, {"text": "It leads to a fear of death that prevents people from fighting in wars.", "isCorrect": false, "rationale": "The text suggests the doctrine actually makes people 'anæmic' and 'cowardly' by placing the center of gravity in 'nothingness' rather than life."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
