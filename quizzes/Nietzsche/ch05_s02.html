<script>
var QUESTIONS = [{"question": "According to Nietzsche's diagnosis in the third essay, why has the ascetic ideal maintained such a dominant hold on human culture?", "options": [{"text": "Because it aligns perfectly with the biological drive for survival.", "isCorrect": false, "rationale": "Nietzsche argues the ideal actually denies life and natural desire, rather than aligning with biological drives."}, {"text": "Because no rival ideal has yet emerged to challenge its supremacy.", "isCorrect": true, "rationale": "The text explicitly states that the ascetic ideal has dominated because it lacks a competing framework to offer an alternative meaning to existence."}, {"text": "Because human beings possess an innate, unchangeable desire for self-punishment.", "isCorrect": false, "rationale": "While Nietzsche discusses guilt, he views the ascetic ideal as a cultural and psychological framework that interprets suffering, not an inescapable biological instinct."}, {"text": "Because the 'death of God' successfully eradicated its theological foundations.", "isCorrect": false, "rationale": "Nietzsche argues the opposite: that the 'death of God' merely forced the ideal to adopt new disguises, such as science."}], "id": "q01"}, {"question": "Nietzsche distinguishes himself from 'cruder atheists' by acknowledging what specific aspect of the Christian interpretation of suffering?", "options": [{"text": "Its factual accuracy regarding the historical Fall of Man.", "isCorrect": false, "rationale": "Nietzsche does not believe the Christian account is factually true; he critiques it as a psychological construction."}, {"text": "Its ability to eliminate the feeling of guilt through the cross.", "isCorrect": false, "rationale": "Nietzsche argues that Christianity actually deepens suffering by introducing the concept of permanent, pervasive guilt."}, {"text": "Its psychological efficacy in providing consolation and motivation.", "isCorrect": true, "rationale": "Nietzsche recognizes that religious frameworks 'work' by providing real psychological benefits and a cosmic narrative for pain."}, {"text": "Its success in affirming the inherent goodness of the human body.", "isCorrect": false, "rationale": "The text states that the Christian framework requires believers to view the body as sinful and a source of corruption."}], "id": "q02"}, {"question": "What does Nietzsche identify as the 'high price' paid for the comfort provided by the Christian interpretation of suffering?", "options": [{"text": "The loss of intellectual rigor and the pursuit of scientific truth.", "isCorrect": false, "rationale": "Nietzsche actually views science as a continuation of the same 'will to truth' found in the ascetic ideal."}, {"text": "Self-contempt and the systematic denial of earthly life.", "isCorrect": true, "rationale": "The text explains that the framework requires viewing the world as fallen and natural desires as evidence of corruption."}, {"text": "The inevitable collapse of social structures and universal equality.", "isCorrect": false, "rationale": "Nietzsche suggests that secular humanism actually tries to preserve Christian social values like equality after rejecting the theology."}, {"text": "The immediate physical pain resulting from medieval ascetic practices.", "isCorrect": false, "rationale": "Nietzsche's primary concern is the 'deeper, more pervasive' psychological suffering of guilt, rather than just physical penance."}], "id": "q03"}, {"question": "According to the text, how does secular humanism mirror the structure of the ascetic ideal?", "options": [{"text": "By rejecting the 'will to truth' in favor of comforting social myths.", "isCorrect": false, "rationale": "Secular humanism is defined by its unconditional 'will to truth,' which Nietzsche identifies as a residue of the ascetic ideal."}, {"text": "By abandoning Christian moral values in favor of radical self-assertion.", "isCorrect": false, "rationale": "Nietzsche argues that secular humanists cling more firmly to Christian morality (compassion, equality) once they lose the Christian God."}, {"text": "By prioritizing physical pleasure and the affirmation of natural desire.", "isCorrect": false, "rationale": "The text suggests secular humanism remains ascetic by focusing on the 'moral primacy of suffering' and rational renunciation."}, {"text": "By maintaining the unconditional conviction that truth is always preferable to illusion.", "isCorrect": true, "rationale": "This 'will to truth' is described as the same drive that led monks to renounce worldly pleasure, now applied to the renunciation of 'comforting myths.'"}], "id": "q04"}, {"question": "Which statement best captures Nietzsche's view of the modern scientist in the context of the ascetic ideal?", "options": [{"text": "The scientist has finally provided the 'rival ideal' needed to overthrow asceticism.", "isCorrect": false, "rationale": "The text explicitly states that science is not the alternative but the 'most sophisticated expression' of the ascetic ideal."}, {"text": "The scientist is a 'crude atheist' who fails to see the psychological benefit of religion.", "isCorrect": false, "rationale": "While Nietzsche distinguishes himself from such atheists, he views the scientist's sacrifice of comfort for truth as a quintessentially ascetic act."}, {"text": "The scientist performs an ascetic act by sacrificing comfort and meaning for the sake of truth.", "isCorrect": true, "rationale": "The text describes the pursuit of truth even when it destroys meaning (as in Weinberg's 'pointless' universe) as an ascetic sacrifice."}, {"text": "The scientist is primarily motivated by the desire to restore a sense of cosmic purpose.", "isCorrect": false, "rationale": "The text argues that scientific discoveries often erode cosmic purpose, yet the scientist pursues them anyway due to the 'will to truth.'"}], "id": "q05"}, {"question": "How does the 'productivity culture' of Silicon Valley relate to Nietzsche's description of the ascetic ideal?", "options": [{"text": "It represents a total rejection of discipline in favor of capitalist excess.", "isCorrect": false, "rationale": "The 'hustle' culture is defined by extreme discipline and self-sacrifice, not a lack of it."}, {"text": "It echoes the ascetic willingness to sacrifice pleasure and relationships for a higher goal of 'performance.'", "isCorrect": true, "rationale": "The text compares the sacrifice of sleep and pleasure for 'peak performance' to the ascetic discipline Nietzsche describes."}, {"text": "It is an example of a rival ideal that affirms life through material accumulation.", "isCorrect": false, "rationale": "Despite the material context, the structure of self-denial and 'optimization' mirrors the ascetic mechanism rather than life-affirmation."}, {"text": "It is entirely distinct from asceticism because it focuses on the body rather than the soul.", "isCorrect": false, "rationale": "Nietzsche's analysis suggests that the form of the impulse (self-denial for a higher goal) is the same, regardless of whether the goal is spiritual or physical."}], "id": "q06"}, {"question": "In the context of the source material, what is the significance of Steven Weinberg's quote: 'The more the universe seems comprehensible, the more it also seems pointless'?", "options": [{"text": "It serves as evidence that science has successfully created a new meaning for human life.", "isCorrect": false, "rationale": "The quote highlights a lack of meaning ('pointless'), which Nietzsche views as the result of the ascetic pursuit of truth."}, {"text": "It demonstrates that the 'will to truth' can be life-affirming if it leads to comprehension.", "isCorrect": false, "rationale": "Nietzsche argues that pursuing comprehension at the expense of meaning is an act of life-denial, or asceticism."}, {"text": "It illustrates the scientist's commitment to truth even when that truth destroys human consolation.", "isCorrect": true, "rationale": "This aligns with Nietzsche's point that the scientist prefers 'honest despair' to 'comforting illusion,' a hallmark of the ascetic ideal."}, {"text": "It suggests that scientific progress will eventually lead back to a religious interpretation of reality.", "isCorrect": false, "rationale": "The quote points toward a universe that is indifferent and devoid of human-centric purpose, moving away from religious interpretation."}], "id": "q07"}, {"question": "How does contemporary political discourse regarding 'complicity' and 'systemic injustice' potentially invoke the 'priestly mechanism' described by Nietzsche?", "options": [{"text": "By encouraging individuals to find joy in their social identity.", "isCorrect": false, "rationale": "The mechanism described is one of self-accusation and guilt, which is the opposite of finding joy in identity."}, {"text": "By shifting the focus of suffering away from individual responsibility toward systemic factors.", "isCorrect": false, "rationale": "While it deals with systems, the text asks if it uses the machinery of guilt ('You suffer because you are guilty'), which focuses on internal self-accusation."}, {"text": "By framing suffering through a lens of self-examination and the assignment of internal guilt.", "isCorrect": true, "rationale": "The text explicitly draws a parallel between modern demands for self-accusation and the priestly message: 'You suffer because you are guilty.'"}, {"text": "By providing a scientific basis for the origins of social inequality.", "isCorrect": false, "rationale": "The question is about the *moral/psychological* mechanism of guilt, not the empirical data of sociology."}], "id": "q08"}, {"question": "Charles Taylor's work in *A Secular Age* (2007) is used in the text to support which Nietzschean claim?", "options": [{"text": "That modern secularity is a complete break from the Christian past.", "isCorrect": false, "rationale": "Taylor argues that secularity is a 'transformed continuation' of Christian morality, not a break from it."}, {"text": "That secular humanism is a 'secularized version' of Christian moral sensibilities.", "isCorrect": true, "rationale": "The text uses Taylor to argue that modern values like universal equality and compassion for the weak are derived from the Christian structure."}, {"text": "That the 'death of God' has successfully led to a new, non-ascetic ideal.", "isCorrect": false, "rationale": "The text argues that the 'death of God' merely gave the ascetic ideal a 'new disguise.'"}, {"text": "That only scientific inquiry can provide a stable foundation for human rights.", "isCorrect": false, "rationale": "The text questions whether secular humanism is simply another form of the ascetic ideal, rather than a stable independent foundation."}], "id": "q09"}, {"question": "What challenge does Nietzsche's analysis present to modern theologians, such as those in the 'death of God' movement?", "options": [{"text": "To prove that the historical resurrection of Christ is a scientific fact.", "isCorrect": false, "rationale": "Nietzsche's challenge is existential and psychological, focusing on the interpretation of suffering, not historical proofs."}, {"text": "To abandon the concept of suffering entirely and focus only on material prosperity.", "isCorrect": false, "rationale": "The text asks if they can interpret suffering in ways that affirm life, not ignore suffering altogether."}, {"text": "To find a way to interpret suffering without relying on the 'machinery of guilt and self-contempt.'", "isCorrect": true, "rationale": "The text specifically asks if traditions can affirm the value of earthly life while providing meaning for pain, moving away from the tradition of penitence."}, {"text": "To return to a more rigorous, medieval form of ascetic discipline to combat secularism.", "isCorrect": false, "rationale": "The challenge is to *release* Christianity from the metaphysical framework that Nietzsche critiques, not to double down on it."}], "id": "q10"}, {"question": "Nietzsche carefully distinguishes between 'willing nothingness' and 'not willing at all.' Why does he consider the first preferable to the second?", "options": [{"text": "Because willing nothingness at least preserves the capacity for striving and direction, whereas the total inability to will represents a collapse of the human condition.", "isCorrect": true, "rationale": "For Nietzsche, even a self-destructive goal keeps the will — and therefore the human being — alive and directed. A complete paralysis of will means ceasing to be human in any meaningful sense."}, {"text": "Because nothingness is the only philosophically honest goal in a meaningless universe.", "isCorrect": false, "rationale": "Nietzsche does not endorse 'willing nothingness' as philosophically honest — he describes it as a form of the ascetic ideal, which he criticizes."}, {"text": "Because willing nothingness eventually leads to the natural death of the ascetic ideal and new value creation.", "isCorrect": false, "rationale": "The text does not claim that willing nothingness auto-corrects into positive value creation; Nietzsche's point is psychological, not teleological."}, {"text": "Because the absence of all willing is impossible in practice, so Nietzsche's preference is merely theoretical.", "isCorrect": false, "rationale": "Nietzsche treats the total paralysis of will as a real psychological possibility — and as the worst possible outcome, not merely a theoretical extreme."}], "id": "q11"}, {"question": "Why does Nietzsche treat the ascetic priest with 'grudging admiration' rather than simple condemnation?", "options": [{"text": "Because the priest's methods are morally justified by their positive outcomes for social cohesion.", "isCorrect": false, "rationale": "Nietzsche's admiration is explicitly not moral — he regards the priest's outcome as deeply harmful to life in the long run."}, {"text": "Because the priest represents the kind of creative ingenuity Nietzsche endorses in general.", "isCorrect": false, "rationale": "Nietzsche endorses creative ingenuity in the service of life-affirmation; the priest's ingenuity serves life-denial, which Nietzsche ultimately condemns."}, {"text": "Because the priest performs a genuinely difficult strategic achievement — keeping the weakest members of society alive and directed.", "isCorrect": true, "rationale": "Nietzsche respects the priest the way a strategist respects a formidable opponent: the priest addresses real suffering with real (if harmful) solutions, and the scale of that achievement is remarkable."}, {"text": "Because the priest acts selflessly and without personal gain from administering to the sick.", "isCorrect": false, "rationale": "Nietzsche views the priest as gaining power from those he tends; the sick flock is the basis of the priest's authority, not an act of selfless service."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
