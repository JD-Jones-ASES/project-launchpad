<script>
var QUESTIONS = [{"question": "According to the text, what is Nietzsche's most fundamental contribution to philosophy?", "options": [{"text": "A systematic doctrine for achieving the good life.", "isCorrect": false, "rationale": "The text explicitly states that Nietzsche does not offer 'a system,' 'a set of doctrines,' or 'a step-by-step guide to the good life.'"}, {"text": "A genealogical method and the courage to question inherited values.", "isCorrect": true, "rationale": "The text identifies Nietzsche's core contribution as 'a method—the genealogical method—and a disposition—the courage to question inherited values, even when the questioning is dangerous.'"}, {"text": "A set of political programs for social reform.", "isCorrect": false, "rationale": "The text clarifies that Nietzsche does not provide 'a political program.'"}, {"text": "A definitive explanation for the origins of religious belief.", "isCorrect": false, "rationale": "While Nietzsche questioned religion, the text emphasizes he offers 'questions' rather than 'certainties' or definitive explanations for such complex topics as his primary gift."}], "id": "q01"}, {"question": "The phrase 'dangerous perhaps' as described in the text primarily signifies Nietzsche's approach of:", "options": [{"text": "Providing definitive answers to complex philosophical problems.", "isCorrect": false, "rationale": "The text explicitly states, 'He does not offer certainties. He offers questions—questions that are dangerous because they threaten everything we think we know.'"}, {"text": "Presenting challenging questions that unsettle established beliefs and truths.", "isCorrect": true, "rationale": "The text describes the 'dangerous perhaps' as capturing Nietzsche's project of offering 'questions that are dangerous because they threaten everything we think we know about truth, morality, religion, and the self.'"}, {"text": "Advocating for a specific, predetermined path to individual enlightenment.", "isCorrect": false, "rationale": "Nietzsche does not offer a 'step-by-step guide to the good life' and 'despised followers,' insisting thinkers find their own path."}, {"text": "Promoting a new political ideology based on uncertainty.", "isCorrect": false, "rationale": "The text clearly states that Nietzsche did not provide 'a political program.'"}], "id": "q02"}, {"question": "How did Nietzsche's concept of the 'death of God' influence existentialist thinkers like Sartre and Camus, according      to the text?", "options": [{"text": "It provided a new theological framework for human existence.", "isCorrect": false, "rationale": "The 'death of God' implies the absence of a theological framework, not the creation of a new one."}, {"text": "It led to the comfortable realization that all choices are inconsequential.", "isCorrect": false, "rationale": "Sartre drew on Nietzsche's insight of being 'radically free—free not in the comfortable sense of having choices, but in the terrifying sense of having no foundation for their choices.'"}, {"text": "It underscored humanity's radical freedom and the necessity of creating one's own meaning in a world without inherent purpose.", "isCorrect": true, "rationale": "The text explains Sartre drew on Nietzsche's insight that 'human beings are radically free... having no foundation for their choices,' and Camus grappled with 'if life has no inherent meaning, is it worth living?' leading to creating purpose."}, {"text": "It offered a clear-cut guide to achieving a predefined 'good life.'", "isCorrect": false, "rationale": "Nietzsche did not offer a 'step-by-step guide to the good life,' and the existentialist response focuses on creating, not finding, purpose."}], "id": "q03"}, {"question": "The text suggests a significant parallel between Nietzsche's thought and Sigmund Freud's psychoanalysis through:", "options": [{"text": "Their shared belief in the absolute truth of conscious rational thought.", "isCorrect": false, "rationale": "Nietzsche insisted that 'conscious thought is merely the surface of a vast unconscious life,' which contradicts a belief in the absolute truth of conscious thought."}, {"text": "Nietzsche's anticipation of the idea that stated reasons often mask deeper, unconscious drives and motives.", "isCorrect": true, "rationale": "The text states Nietzsche's 'insistence that conscious thought is merely the surface of a vast unconscious life—that our stated reasons are rationalizations for drives we do not understand—anticipates Freud's central insight.'"}, {"text": "Both philosophers advocating for a return to traditional moral values.", "isCorrect": false, "rationale": "Nietzsche's 'genealogy of morals' questions the origins of moral values rather than advocating for a return to traditional ones."}, {"text": "Freud's direct acknowledgment of Nietzsche as a primary source for his theories, despite claiming otherwise.", "isCorrect": false, "rationale": "The text states Freud 'acknowledged Nietzsche's anticipation... and then, characteristically, claimed that he had avoided reading Nietzsche in order to preserve his own originality.'"}], "id": "q04"}, {"question": "How did Nietzsche's ideas, specifically his genealogical method and perspectivism, influence postmodern thinkers like Foucault and Derrida?", "options": [{"text": "They used Nietzsche's work to argue for the objective and universal nature of truth.", "isCorrect": false, "rationale": "Nietzsche's perspectivism and critique of binaries challenge the idea of objective and universal truth, as do Foucault's and Derrida's methods."}, {"text": "They applied his methods to expose hidden power dynamics and deconstruct established philosophical categories and binaries.", "isCorrect": true, "rationale": "Foucault applied genealogy to 'exposing the will to power' in institutions, and Derrida drew on perspectivism and critique of binaries to develop deconstruction, seeing categories as 'valuations.'"}, {"text": "They adopted Nietzsche's explicit political programs for institutional reform.", "isCorrect": false, "rationale": "The text notes Nietzsche did not offer 'a political program.'"}, {"text": "They interpreted his ideas as supporting a claim that all perspectives are equally valid and intellectual rigor is unnecessary.", "isCorrect": false, "rationale": "The text clarifies that Nietzsche 'is a perspectivalist, not a relativist' and 'does not conclude that all perspectives are equally valid,' despising 'intellectual laziness.'"}], "id": "q05"}, {"question": "The text distinguishes Nietzsche's perspectivism from popular postmodern relativism by emphasizing that Nietzsche:", "options": [{"text": "Believed all knowledge is objective and universally applicable.", "isCorrect": false, "rationale": "The text states Nietzsche 'insists that all knowledge is perspectival—situated, partial, shaped by the knower's drives and interests,' which contradicts objectivity."}, {"text": "Argued that while all knowledge is perspectival, not all perspectives are equally valid.", "isCorrect": true, "rationale": "The text explicitly states, 'Nietzsche is a perspectivalist, not a relativist... But he does not conclude that all perspectives are equally valid. Some perspectives are richer, more honest, more life-affirming than others.'"}, {"text": "Advocated for a complete rejection of all forms of truth claims.", "isCorrect": false, "rationale": "Nietzsche questioned truth but sought 'richer, more honest, more life-affirming' perspectives, not a complete rejection of truth claims."}, {"text": "Endorsed the view that 'everything is a social construction' without further qualification.", "isCorrect": false, "rationale": "The text explains this popular postmodern claim 'would have struck him as precisely the kind of lazy relativism he spent his career attacking.'"}], "id": "q06"}, {"question": "Which statement accurately describes the 'real Nietzsche' as distinguished from the 'proto-fascist caricature' presented in the text?", "options": [{"text": "The real Nietzsche was a prophet of racial purity and a worshiper of brute strength.", "isCorrect": false, "rationale": "This describes 'Elisabeth's Nietzsche,' the 'proto-fascist caricature,' which the text refutes."}, {"text": "The real Nietzsche was an anti-nationalist and an anti-anti-Semite who valued intellectual honesty.", "isCorrect": true, "rationale": "The text states, 'The real Nietzsche was nothing of the kind. He was an anti-nationalist who mocked German chauvinism. He was an anti-anti-Semite who broke with his own sister over her husband's racism. He was a thinker who valued intellectual honesty above all other virtues.'"}, {"text": "The real Nietzsche saw the Nazi cult of blood and soil as a valid expression of the will to power.", "isCorrect": false, "rationale": "The text says he 'would have regarded the Nazi cult of blood and soil with the same contempt he reserved for every other form of herd stupidity.'"}, {"text": "The real Nietzsche's works directly provided the foundational ideology for National Socialism.", "isCorrect": false, "rationale": "The text clarifies that the Nazi interpretation was a 'caricature constructed from selectively edited notebooks, tendentiously compiled fragments, and outright fabrications,' and that the real Nietzsche was 'nothing of the kind.'"}], "id": "q07"}, {"question": "According to the text, Walter Kaufmann played a pivotal role in the 'recovery of the real Nietzsche' by:", "options": [{"text": "Furthering the Nazi interpretation of Nietzsche's writings.", "isCorrect": false, "rationale": "Kaufmann's work was central to refuting and demonstrating the distortions of the Nazi-aligned interpretations."}, {"text": "Systematizing Nietzsche's doctrines into a coherent political philosophy.", "isCorrect": false, "rationale": "Nietzsche did not offer a system or political philosophy, and Kaufmann's aim was to present the real Nietzsche, not to create a system."}, {"text": "Translating and re-evaluating Nietzsche's published works to refute distortions and present a non-fascist interpretation.", "isCorrect": true, "rationale": "The text states Kaufmann 'returned to Nietzsche's published works, demonstrated the distortions of the Nachlass-based readings, and presented a Nietzsche who was brilliant, difficult, sometimes wrong, but emphatically not a fascist. Kaufmann's translations... remain the standard English editions.'"}, {"text": "Inventing the genealogical method attributed to Nietzsche.", "isCorrect": false, "rationale": "The genealogical method was Nietzsche's own contribution, not something invented by Kaufmann."}], "id": "q08"}, {"question": "The text resolves the debate about whether Nietzsche was a 'liberator' or a 'dangerous elitist' by concluding that:", "options": [{"text": "He was exclusively a liberator who championed universal democratic values.", "isCorrect": false, "rationale": "The text explicitly states 'he does despise democracy,' making this option incorrect."}, {"text": "He was primarily an elitist whose disdain for the ordinary overshadowed any liberating aspects.", "isCorrect": false, "rationale": "The text emphasizes that 'Both sides are, in important ways, correct' and avoids prioritizing one aspect over the other, stating 'the tension is real.'"}, {"text": "He embodied both qualities, freeing individuals from dogma while also despising democracy and assuming only a few could truly engage with his ideas.", "isCorrect": true, "rationale": "The text concludes, 'Nietzsche is a liberator, and he is an elitist. He does free us from dogma, and he does despise democracy... The tension is real, and it cannot be resolved by pretending one side of Nietzsche does not exist.'"}, {"text": "The debate is irresolvable and therefore irrelevant to understanding his philosophy.", "isCorrect": false, "rationale": "The text states 'the tension is real,' implying its relevance, and that understanding both sides is crucial rather than dismissing the debate."}], "id": "q09"}, {"question": "Ultimately, what does the text identify as Nietzsche's enduring 'gift' and the true meaning of the 'dangerous perhaps' as an invitation?", "options": [{"text": "A definitive set of philosophical answers and a blueprint for a specific way of life.", "isCorrect": false, "rationale": "The text states, 'His answers... are often crude, underdeveloped, or offensive. His questions... are inexhaustible. The questions are the gift.' It's 'Not an invitation to adopt his views.'"}, {"text": "The courage to abandon all values and embrace nihilism as an endpoint.", "isCorrect": false, "rationale": "Nietzsche 'diagnosed nihilism as the great crisis of modernity—and that his entire project is a response to it, not an endorsement of it.'"}, {"text": "An invitation to engage in rigorous self-examination, question inherited values, and actively create one's own path rather than blindly following.", "isCorrect": true, "rationale": "The text defines the 'dangerous perhaps' as 'an invitation to think—to question what you have been taught, to examine the origins of your values, to ask whether you are living authentically or merely following the herd.'"}, {"text": "The promise of an easy solution to the problem of suffering and meaninglessness.", "isCorrect": false, "rationale": "Nietzsche's concepts like eternal recurrence are described as 'the most demanding test of life-affirmation ever devised,' indicating his philosophy is challenging, not an easy solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
