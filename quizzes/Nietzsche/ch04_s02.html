        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 4, Section 2</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Nietzsche's analysis in the Genealogy, why is the German word 'Schuld' significant for understanding the origin of morality?", "options": [{"text": "It proves that moral concepts were originally revealed through divine linguistic intervention.", "isCorrect": false, "rationale": "Nietzsche argues for a materialist and historical evolution of language rather than a supernatural or heavenly origin for moral terms."}, {"text": "It serves as linguistic evidence that the concept of moral guilt evolved from the economic concept of debt.", "isCorrect": true, "rationale": "The dual meaning of the word in German suggests that the earliest sense of obligation was rooted in commercial transactions between debtors and creditors."}, {"text": "It demonstrates that the ancient Germans were the only culture to possess a true sense of conscience.", "isCorrect": false, "rationale": "The text uses the German language as a specific example to illustrate a broader genealogical process common to human development, not to claim cultural superiority."}, {"text": "It illustrates how modern language has successfully separated spiritual guilt from material obligation.", "isCorrect": false, "rationale": "Nietzsche suggests that the connection is still present in our language, often hidden from our conscious awareness, rather than being successfully severed."}], "id": "q01"}, {"question": "What is Nietzsche’s primary reason for claiming that punishment does not actually produce a 'guilty conscience' in the person being punished?", "options": [{"text": "Punishment is too lenient in modern society to provoke a deep emotional response in the criminal.", "isCorrect": false, "rationale": "Nietzsche's argument focuses on the nature of punishment itself throughout history, not its current level of severity in modern society."}, {"text": "The psychological trauma of punishment causes the individual to repress all memories of the crime.", "isCorrect": false, "rationale": "The text suggests that punishment actually makes people more calculating and cautious about their actions, rather than causing them to forget."}, {"text": "Punishment is an external force acting on the body, whereas guilt is an internal process involving the soul.", "isCorrect": true, "rationale": "Nietzsche posits that external impositions like beatings or imprisonment fail to foster the internal reflection required for a sense of deservingness."}, {"text": "Criminals are biologically incapable of feeling the same instincts as the 'noble' classes.", "isCorrect": false, "rationale": "The text attributes the lack of guilt to the external nature of punishment rather than a fundamental biological deficiency in the capacity for feeling."}], "id": "q02"}, {"question": "How does Nietzsche qualify his description of 'bad conscience' as a disease?", "options": [{"text": "He argues it is a terminal condition that eventually destroys human culture.", "isCorrect": false, "rationale": "The text explicitly states that bad conscience is the 'womb' of culture, suggesting it is generative rather than strictly destructive."}, {"text": "He compares it to a pregnancy, indicating that it is a painful state that births something new.", "isCorrect": true, "rationale": "This analogy highlights that while bad conscience is debilitating and painful, it is the necessary condition for the creation of human depth and interiority."}, {"text": "He claims it is a contagious social phenomenon spread by the priestly class.", "isCorrect": false, "rationale": "While Nietzsche mentions the priestly interpretation, the 'pregnancy' metaphor refers to the internal development of the human soul itself."}, {"text": "He suggests it is a temporary ailment that will be cured by the return of the 'blond beast.'", "isCorrect": false, "rationale": "The text indicates that we cannot simply get rid of bad conscience, but must instead find a way to redirect it toward self-creation."}], "id": "q03"}, {"question": "Which of the following would Nietzsche cite as evidence that our moral language is still 'speaking the language of commerce'?", "options": [{"text": "The use of terms like 'sin' to describe religious disobedience.", "isCorrect": false, "rationale": "While 'sin' is a moral term, Nietzsche looks specifically for words that imply a transaction or an exchange of value."}, {"text": "The development of abstract philosophical theories about the 'Good.'", "isCorrect": false, "rationale": "Nietzsche’s linguistic argument focuses on common idioms of debt and repayment rather than high-level abstract philosophical definitions."}, {"text": "The use of the word 'guilt' to refer to a legal status in a court of law.", "isCorrect": false, "rationale": "His argument is broader, focusing on how everyday moral phrases like 'paying for one's sins' reveal an underlying economic logic."}, {"text": "The use of terms such as 'redeeming' ourselves or 'wages' of sin.", "isCorrect": true, "rationale": "These terms directly link moral salvation and failure to the terminology of financial debt, lending, and earnings."}], "id": "q04"}, {"question": "What is the primary result of the 'internalization of instinct' described in the text?", "options": [{"text": "The complete eradication of aggressive impulses in human beings.", "isCorrect": false, "rationale": "Nietzsche argues that these instincts are not destroyed but are instead turned inward against the self."}, {"text": "The creation of the human 'inner world' and the depth of the soul.", "isCorrect": true, "rationale": "When aggressive instincts can no longer be discharged externally, they reflect inward, giving rise to self-reflection and complexity."}, {"text": "The immediate evolution of the species into a more peaceful, social animal.", "isCorrect": false, "rationale": "Internalization is described as a painful and disorienting process of self-cruelty rather than a smooth transition to social harmony."}, {"text": "The strengthening of the body through the conservation of physical energy.", "isCorrect": false, "rationale": "The text emphasizes the development of the soul and the interior mind rather than a physical enhancement of the body."}], "id": "q05"}, {"question": "Nietzsche suggests that without 'bad conscience,' humans would be like the 'blond beast.' What characterizes this state of existence?", "options": [{"text": "A state of profound philosophical wisdom and self-awareness.", "isCorrect": false, "rationale": "The 'blond beast' represents a lack of self-reflection and depth, acting on impulse rather than contemplative wisdom."}, {"text": "A existence defined by unreflective spontaneity and outward strength.", "isCorrect": true, "rationale": "Nietzsche uses this term to describe noble predators who act on their instincts without the internal friction of guilt or conscience."}, {"text": "A miserable life of constant fear and intellectual stagnation.", "isCorrect": false, "rationale": "While they lack 'depth,' Nietzsche expresses admiration for their strength and spontaneity, rather than viewing them as strictly miserable."}, {"text": "A society governed by the strict principles of commercial justice.", "isCorrect": false, "rationale": "The 'blond beast' precedes the complex moral systems that were birthed from the internalization of instincts and bad conscience."}], "id": "q06"}, {"question": "If Nietzsche's analysis of punishment is correct, what is the 'confusion' upon which the modern criminal justice system rests?", "options": [{"text": "The belief that physical pain is an effective deterrent for future crimes.", "isCorrect": false, "rationale": "Nietzsche acknowledges that punishment can make people cautious or wary of getting caught, implying it does function as a deterrent."}, {"text": "The assumption that the experience of being punished produces moral contrition.", "isCorrect": true, "rationale": "The system expects punishment to foster a sense of guilt, but Nietzsche argues it actually produces resentment and hardening of character."}, {"text": "The idea that crimes should be settled through financial restitution rather than physical labor.", "isCorrect": false, "rationale": "The text argues that morality evolved *from* economic concepts, not that the justice system is confused about the use of money."}, {"text": "The failure to distinguish between civil laws and religious commandments.", "isCorrect": false, "rationale": "The confusion Nietzsche identifies is psychological—the mismatch between external treatment and the internal state of the soul."}], "id": "q07"}, {"question": "What is the fundamental difference between the 'priestly' use of bad conscience and Nietzsche's proposed alternative?", "options": [{"text": "The priest wants to abolish bad conscience, while Nietzsche wants to expand it to everyone.", "isCorrect": false, "rationale": "Neither the priest nor Nietzsche believes bad conscience can be abolished; they differ on how it should be interpreted and used."}, {"text": "The priest interprets it as a sign of health, while Nietzsche sees it as a disease.", "isCorrect": false, "rationale": "The priest interprets it through the lens of sin and unworthiness; Nietzsche acknowledges it as a disease but one with creative potential."}, {"text": "The priest uses it for moral self-punishment before God, while Nietzsche wants to use it for creative self-affirmation.", "isCorrect": true, "rationale": "Nietzsche seeks to redirect the internal energy of bad conscience toward self-overcoming and art rather than religious guilt."}, {"text": "The priest believes it is an economic debt, while Nietzsche believe it is a spiritual failing.", "isCorrect": false, "rationale": "This reverses the two positions; Nietzsche is the one who traces the spiritual feeling back to an economic origin."}], "id": "q08"}, {"question": "Nietzsche claims that bad conscience is the 'price we pay for having souls.' What does this imply about the nature of the human soul?", "options": [{"text": "The soul is an eternal spark that exists independently of human suffering.", "isCorrect": false, "rationale": "Nietzsche’s genealogy suggests the soul is a historical development, not an eternal or independent entity."}, {"text": "The soul is a product of the internal cruelty and tension created by repressed instincts.", "isCorrect": true, "rationale": "The 'inner world' or soul is formed when humans turn their aggressive energies inward, creating a complex internal life through self-inflicted pain."}, {"text": "The soul is a commercial asset that can be traded or sold through moral actions.", "isCorrect": false, "rationale": "While he uses commercial metaphors, the soul itself is the *result* of the process, not a currency used within it."}, {"text": "The soul only exists in those who have never experienced the 'disease' of bad conscience.", "isCorrect": false, "rationale": "The text argues the opposite: that the 'blond beast' lacks depth precisely because it lacks the internal struggle of bad conscience."}], "id": "q09"}, {"question": "According to Nietzsche, what was the origin of the earliest human sense of obligation?", "options": [{"text": "The material, commercial relationship between debtor and creditor.", "isCorrect": true, "rationale": "Nietzsche argues that moral guilt did not descend from heaven but evolved from the material, commercial relationship between debtor and creditor."}, {"text": "A spiritual revelation about divine law and cosmic justice.", "isCorrect": false, "rationale": "The text states that the earliest sense of obligation was economic, rooted in the material practice of lending and borrowing, not in spiritual revelation."}, {"text": "The internalization of aggressive instincts when humans first formed settled communities.", "isCorrect": false, "rationale": "The internalization of instincts is Nietzsche's explanation for the origin of bad conscience, not for the earliest sense of obligation itself."}, {"text": "The priestly class's invention of sin as a tool for social control.", "isCorrect": false, "rationale": "While Nietzsche discusses the priestly interpretation of bad conscience through the lens of sin, the earliest sense of obligation predates this and is rooted in economic exchange."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
