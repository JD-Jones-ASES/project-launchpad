<script>
var QUESTIONS = [{"question": "According to the text, why does Nietzsche refrain from providing cosmological or scientific evidence against the existence of God?", "options": [{"text": "He believes the metaphysical question of God's existence is already settled and focuses on its cultural impact.", "isCorrect": true, "rationale": "Nietzsche takes the non-existence of God for granted to explore the subsequent crisis of meaning and values in Western civilization."}, {"text": "He considers scientific materialism to be an insufficient tool for proving a negative metaphysical claim.", "isCorrect": false, "rationale": "While he might agree, the text specifically states he skips these arguments because he is interested in the consequences for civilization, not the causes of atheism."}, {"text": "He aims to convert religious believers through emotional appeal rather than intellectual or logical proofs.", "isCorrect": false, "rationale": "The text indicates his primary audience in the relevant passage are atheists who do not yet understand the weight of their own position."}, {"text": "He views the 'death of God' as a literal historical event rather than a philosophical or metaphorical transition.", "isCorrect": false, "rationale": "The 'death of God' is described as a loss of belief that structured values, making it a cultural and philosophical event rather than a literal one."}], "id": "q01"}, {"question": "What is the primary reason the madman in GS 125 claims to have 'come too early' when speaking to the atheists?", "options": [{"text": "The atheists in the marketplace still believe in a literal deity and refuse to accept secularism.", "isCorrect": false, "rationale": "The text states the madman is speaking to people who already do not believe in God."}, {"text": "The news of the death of God has not yet been published in the scientific journals of the time.", "isCorrect": false, "rationale": "The delay is cultural and psychological, not a matter of formal publication or information dissemination."}, {"text": "The full collapse of the values built upon the theological foundation has not yet manifested in history.", "isCorrect": true, "rationale": "Nietzsche suggests that while the 'foundation' is gone, the 'structure' of values like truth and progress is still standing, though it is now precarious."}, {"text": "He realizes that the 'free spirits' have already created a replacement for Christianity, making his message redundant.", "isCorrect": false, "rationale": "The text argues that the atheists are standing on 'thin air' precisely because they have not created anything new and don't realize the old values are falling."}], "id": "q02"}, {"question": "How does Nietzsche's view of 'human rights' and 'equality' differ from the views of the 'cheerful atheists' described in the text?", "options": [{"text": "He views these values as objective biological truths discovered through the rejection of religion.", "isCorrect": false, "rationale": "Nietzsche does not see them as objective truths, but as remnants of the very theology the atheists claim to have discarded."}, {"text": "He believes these values are secularized versions of Christian doctrines that cannot survive indefinitely without their foundation.", "isCorrect": true, "rationale": "Nietzsche argues that concepts like equality and human dignity are 'borrowed' from Christian theology and are currently 'standing on thin air.'"}, {"text": "He argues that human rights are the first successful step in creating the 'new values' required to avoid nihilism.", "isCorrect": false, "rationale": "The text describes these as part of the old structure that is trembling, not as the new values Nietzsche calls for."}, {"text": "He dismisses them as irrelevant because he believes suffering has no purpose in a post-God world.", "isCorrect": false, "rationale": "While he notes that the belief that suffering has a purpose is lost, he views the survival of these secularized values as a form of 'self-deception' rather than simple irrelevance."}], "id": "q03"}, {"question": "Which of the following best characterizes the distinction Nietzsche makes between passive and active nihilism?", "options": [{"text": "Passive nihilism is the belief in nothing, while active nihilism is the scientific pursuit of objective truth.", "isCorrect": false, "rationale": "Nietzsche views the pursuit of 'truth' as a secularized Christian value, not as the definition of active nihilism."}, {"text": "Passive nihilism accepts the loss of meaning as a reason for inaction, whereas active nihilism seeks to create new values.", "isCorrect": true, "rationale": "Active nihilism is the response of moving past the 'abyss' by becoming a 'legislator' of new meaning rather than wallowing in the void."}, {"text": "Passive nihilism is a stage for the 'madman,' while active nihilism is reserved for the 'philosopher of the future.'", "isCorrect": false, "rationale": "The text describes these as different reactions to the death of God, rather than specific labels for the characters mentioned."}, {"text": "Active nihilism involves destroying the ruins of the old church, while passive nihilism seeks to rebuild it.", "isCorrect": false, "rationale": "Nietzsche specifically states he does not want to build a new church on the ruins of the old one, and passive nihilism is characterized by a lack of 'bother' or effort."}], "id": "q04"}, {"question": "Why does the text claim that the popular image of Nietzsche as a nihilist is 'precisely backward'?", "options": [{"text": "Because Nietzsche spent his career trying to defend traditional Christian morality from secular attacks.", "isCorrect": false, "rationale": "Nietzsche takes the death of God for granted and argues that traditional morality is essentially dead or dying."}, {"text": "Because Nietzsche believes that since the death of God is catastrophic, meaning and purpose must be deeply important.", "isCorrect": true, "rationale": "If 'nothing mattered,' the death of God would be trivial; Nietzsche's alarm proves he believes values are of world-historical significance."}, {"text": "Because Nietzsche was actually a 'cheerful atheist' who saw the death of God as a great liberation for mankind.", "isCorrect": false, "rationale": "The text explicitly contrasts Nietzsche's 'grimmer' vision with that of the 'cheerful atheist.'"}, {"text": "Because he believed that 'nothing matters' only in a metaphysical sense, but matters in a physical sense.", "isCorrect": false, "rationale": "Nietzsche's concern is not a physics vs. metaphysics distinction, but a cultural crisis regarding the source of meaning."}], "id": "q05"}, {"question": "Which concept is described as the 'ultimate test of affirmation' in the transition away from old certainties?", "options": [{"text": "The Free Spirit", "isCorrect": false, "rationale": "The free spirit is the individual capable of enduring the loss, but is not the 'ultimate test' itself."}, {"text": "Eternal Recurrence", "isCorrect": true, "rationale": "The text defines eternal recurrence as the test of whether one can love their life so much they would desire its infinite repetition."}, {"text": "Amor Fati", "isCorrect": false, "rationale": "Amor fati is the 'love of fate' or embrace of everything, but the text specifically highlights eternal recurrence as the 'ultimate test.'"}, {"text": "The Philosopher of the Future", "isCorrect": false, "rationale": "This is a role (the creator/legislator of values) rather than a specific 'test' of affirmation."}], "id": "q06"}, {"question": "In the context of the 'philosopher of the future,' what does the term 'legislator' imply according to the source material?", "options": [{"text": "One who enforces secularized Christian laws to maintain societal order.", "isCorrect": false, "rationale": "Nietzsche wants to move past secularized Christian values, not enforce them."}, {"text": "One who discovers pre-existing natural laws and codifies them into ethics.", "isCorrect": false, "rationale": "Nietzsche emphasizes *creating* meaning where none was found, rather than merely discovering it."}, {"text": "One who creates and gives meaning to a world where old values have collapsed.", "isCorrect": true, "rationale": "The 'legislator' is the figure who steps into the void left by God to create the 'new values' that prevent nihilism."}, {"text": "One who writes the legal framework for a new, non-religious state church.", "isCorrect": false, "rationale": "The text explicitly states Nietzsche does not want to build a new church on the ruins of the old one."}], "id": "q07"}, {"question": "According to the section 'What Comes After?', why is Nietzsche's refusal to provide a systematic alternative to Christianity described as deliberate?", "options": [{"text": "He wanted to ensure that only the 'free spirits' could decipher his hidden doctrine.", "isCorrect": false, "rationale": "The text does not mention a 'hidden doctrine,' but rather an invitation for personal confrontation."}, {"text": "He believed that any new system would eventually become a 'secularized theology' like human rights.", "isCorrect": false, "rationale": "While he critiques current secular values, the text focuses on his desire for individuals to face the death of God personally."}, {"text": "He intended for each individual to confront the crisis personally rather than relying on a ready-made substitute.", "isCorrect": true, "rationale": "Nietzsche views the 'death of God' as a personal challenge and an invitation, not a doctrine to be handed down."}, {"text": "He ran out of time to complete his work, leaving only 'preludes' like Beyond Good and Evil.", "isCorrect": false, "rationale": "The text presents the 'prelude' nature of his work as a deliberate choice to invite inquiry, not as a failure to finish."}], "id": "q08"}, {"question": "What is meant by the 'dangerous perhaps' in the context of Nietzsche's title, *Beyond Good and Evil*?", "options": [{"text": "The possibility that God might actually exist after all.", "isCorrect": false, "rationale": "Nietzsche takes the non-existence of God for granted; the 'perhaps' relates to the future of philosophy."}, {"text": "The risk that society will inevitably descend into passive nihilism and never recover.", "isCorrect": false, "rationale": "While this is a fear, the 'dangerous perhaps' is specifically framed as an invitation to new ways of thinking."}, {"text": "An invitation to explore new philosophical possibilities without the comfort of a fixed system.", "isCorrect": true, "rationale": "The title is described as a 'prelude' and an 'invitation' to a philosophy of the future that lacks a 'ready-made' alternative."}, {"text": "The uncertainty of whether science can ever truly replace the role of theology.", "isCorrect": false, "rationale": "The text suggests science (materialism) is something Nietzsche bypasses to focus on the crisis of culture and value creation."}], "id": "q09"}, {"question": "Which of the following is NOT listed in the text as a value that 'rested, ultimately, on the Christian God'?", "options": [{"text": "The belief that suffering has a purpose.", "isCorrect": false, "rationale": "This is explicitly listed as something that makes life meaningful and rests on the Christian God."}, {"text": "The pursuit of scientific materialism.", "isCorrect": true, "rationale": "The text lists scientific materialism as something Nietzsche *avoids* using in his arguments, not as a value resting on the Christian God."}, {"text": "The inherent dignity of individual human beings.", "isCorrect": false, "rationale": "The text explicitly states this value rested on the Christian God and is part of the trembling structure."}, {"text": "The idea that virtue will be rewarded.", "isCorrect": false, "rationale": "The text explicitly mentions the belief that virtue will be rewarded as part of the meaning derived from the Christian foundation."}], "id": "q10"}, {"question": "Nietzsche uses the phrase 'we have killed him' rather than 'God has died.' What is significant about this formulation?", "options": [{"text": "It attributes blame to atheist philosophers who argued against religion.", "isCorrect": false, "rationale": "Nietzsche's 'we' is collective and civilizational, not a finger pointed at specific philosophers or atheist polemicists."}, {"text": "It frames the death of God as a collective cultural act — the slow erosion of genuine faith — rather than a sudden external event.", "isCorrect": true, "rationale": "By saying 'we have killed him,' Nietzsche makes the death of God something humanity did to itself through science, historical criticism, and the inner logic of Christianity — not something that merely happened."}, {"text": "It suggests that God's death can be undone if humanity collectively chooses to believe again.", "isCorrect": false, "rationale": "Nietzsche does not present this as reversible; the point is to diagnose the situation and understand its implications, not to suggest a path back."}, {"text": "It implies that only the most advanced philosophers bear responsibility for the crisis of nihilism.", "isCorrect": false, "rationale": "The 'we' is deliberately inclusive of all of modern civilization, not a philosophical elite."}], "id": "q11"}, {"question": "In GS 108–109, Nietzsche inverts Plato's allegory of the Cave. What is the key reversal?", "options": [{"text": "Where Plato's philosopher escapes the cave to find truth, Nietzsche's philosopher discovers that even the 'sun' was a shadow — the cave of inherited belief is all there is.", "isCorrect": true, "rationale": "Nietzsche explicitly inverts Plato: there is no transcendent realm of true Forms waiting outside the cave. The 'shadows' of moral and religious tradition persist even after their divine source has been declared dead."}, {"text": "Nietzsche restores Plato's hierarchy by arguing that returning to the cave is the philosopher's ultimate duty.", "isCorrect": false, "rationale": "Nietzsche does not restore Plato's hierarchy — he collapses the distinction between the cave and the outer world of truth."}, {"text": "Nietzsche argues that the cave represents the scientific laboratory rather than religious tradition.", "isCorrect": false, "rationale": "The cave metaphor refers to the lingering shadow of God in moral and cultural frameworks — specifically the church and the habits of Christian thought."}, {"text": "Where Plato's philosopher descends back into the cave to educate others, Nietzsche's philosopher refuses to return.", "isCorrect": false, "rationale": "This describes Plato's conclusion accurately but is not the inversion Nietzsche performs — Nietzsche's point is about the cave itself, not about the philosopher's duties."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
