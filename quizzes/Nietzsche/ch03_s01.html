        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Nietzsche, what was the fundamental error made by 'English psychologists' regarding the origin of the concept 'good'?", "options": [{"text": "They located the origin of 'good' in the perspective of those to whom benefit or utility was shown.", "isCorrect": true, "rationale": "Nietzsche argues that the masters first called themselves 'good' based on their own power, rather than being called 'good' by those who received their help."}, {"text": "They believed 'good' was an inherent biological trait rather than a socially constructed value.", "isCorrect": false, "rationale": "Nietzsche actually critiques them for being unhistorical and focusing too much on utility and habit rather than biology or rank."}, {"text": "They argued that 'good' was a divine commandment that humans eventually secularized through habit.", "isCorrect": false, "rationale": "The text states they focused on the standpoint of 'utility' and 'forgetting,' not on divine revelation."}, {"text": "They confused the 'good' of the masters with the 'evil' of the slaves in their etymological studies.", "isCorrect": false, "rationale": "Nietzsche's specific critique of these psychologists in the Genealogy of Morals is their reliance on the principle of utility."}]}, {"question": "How does Nietzsche define the 'Pathos of Distance' ($Pathos$ $der$ $Distanz$)?", "options": [{"text": "The psychological feeling of superiority and rank that allows a ruling class to create values.", "isCorrect": true, "rationale": "This 'out-looking and down-looking' is what Nietzsche identifies as the emotional precondition for the elevation of the type 'man'."}, {"text": "The physical separation between urban civilizations and the 'barbarian' tribes of the wilderness.", "isCorrect": false, "rationale": "While Nietzsche mentions barbarians, the 'pathos' refers to an internal, psychological feeling of rank, not literal distance."}, {"text": "A state of emotional detachment required for objective scientific and philosophical inquiry.", "isCorrect": false, "rationale": "This interprets 'distance' as objectivity, whereas Nietzsche uses it to describe a hierarchy of power and worth."}, {"text": "The alienation felt by the slave toward the master, leading to the creation of 'evil'.", "isCorrect": false, "rationale": "The 'pathos of distance' specifically belongs to the ruling caste's self-perception, not the slave's resentment."}]}, {"question": "In the context of Master Morality, what is the primary relationship between the concepts 'good' and 'bad'?", "options": [{"text": "'Good' is the primary self-affirmation, while 'bad' is a secondary, contemptuous afterthought.", "isCorrect": true, "rationale": "The master begins with a 'yes' to himself, and 'bad' simply denotes those who are common, weak, or unlike the master."}, {"text": "They are equally weighted opposites that exist in a state of eternal metaphysical struggle.", "isCorrect": false, "rationale": "Nietzsche argues that master morality is not dualistic in this way; 'bad' is merely a pale foil to the vibrant 'good'."}, {"text": "'Bad' is the primary concept defined by the master's enemies, which the master then adopts as 'good'.", "isCorrect": false, "rationale": "This reversal describes the reactive nature of slave morality, not the creative nature of master morality."}, {"text": "'Good' and 'bad' are used interchangeably to describe actions that increase the total power of the state.", "isCorrect": false, "rationale": "Nietzsche emphasizes that a healthy aristocracy views itself as the significance of society, not a function of the state."}]}, {"question": "Which etymological development does Nietzsche cite as evidence for the origin of 'bad' in German culture?", "options": [{"text": "The transition of the word 'schlecht' from meaning 'plain' or 'simple' to meaning 'morally bad'.", "isCorrect": true, "rationale": "Nietzsche links 'schlecht' to 'schlicht,' noting it originally described the plebeian man without any 'sinister innuendo'."}, {"text": "The derivation of 'böse' from the same root as 'barbarian' to denote external threats.", "isCorrect": false, "rationale": "Nietzsche distinguishes 'böse' (evil) as a slave-morality concept, whereas 'schlecht' (bad) belongs to the aristocratic framework."}, {"text": "The transformation of the word for 'slave' into the word for 'sinner' during the Thirty Years' War.", "isCorrect": false, "rationale": "While he mentions the Thirty Years' War, it is in reference to the change in meaning of 'schlecht' (plain to bad)."}, {"text": "The use of the word 'Goth' to denote a god-like race that eventually became a term for destruction.", "isCorrect": false, "rationale": "Nietzsche mentions a possible link between 'gut' and 'Goth,' but this refers to the origin of 'good,' not 'bad'."}]}, {"question": "What is the 'creative deed' of Slave Morality, according to Nietzsche?", "options": [{"text": "The act of saying 'no' to what is 'outside,' 'different,' or 'not itself'.", "isCorrect": true, "rationale": "Slave morality is essentially reactive; its creativity stems from the negation of the master as 'evil'."}, {"text": "The physical overthrow of the ruling aristocratic classes through revolutionary violence.", "isCorrect": false, "rationale": "Nietzsche argues the revolt happens in the 'sphere of morals' through a transvaluation of values, not through strength."}, {"text": "The invention of artistic tragedy as a means to process collective suffering.", "isCorrect": false, "rationale": "While important to his other works, Nietzsche identifies the 'slave revolt' here specifically as a moral revaluation born of $ressentiment$."}, {"text": "The development of modern science and its rejection of traditional aristocratic prejudices.", "isCorrect": false, "rationale": "Nietzsche suggests modern science is actually still a 'dupe' of the same linguistic tricks that support slave morality."}]}, {"question": "In the parable of the lambs and the birds of prey, what philosophical concept does Nietzsche target as a 'sublime specimen of self-deception'?", "options": [{"text": "The idea of a neutral, free-choosing 'subject' or 'soul' behind the action.", "isCorrect": true, "rationale": "He argues that strength cannot be separated from its expression, and the belief in a 'doer' allows the weak to claim their weakness as a merit."}, {"text": "The concept of 'natural selection' as applied to human social hierarchies.", "isCorrect": false, "rationale": "Nietzsche is discussing the psychology of morality rather than critiquing biological Darwinism in this specific passage."}, {"text": "The 'categorical imperative' which assumes a universal moral law for all rational beings.", "isCorrect": false, "rationale": "While he dislikes universal morality, this specific parable focuses on the trick of separating the 'force' from the 'movement'."}, {"text": "The belief in 'divine providence' as a justification for the success of the powerful.", "isCorrect": false, "rationale": "The lambs actually use 'God' to defer their revenge, but the core 'deception' is the belief that the strong could choose to be weak."}]}, {"question": "Nietzsche describes the 'priestly type' of evaluation as particularly 'poisonous' because:", "options": [{"text": "Their physical impotence causes their hatred to grow into a sophisticated and 'monstrous' form of revenge.", "isCorrect": true, "rationale": "Because priests cannot take physical revenge, they develop a 'cleverness' that revalues the master's strengths as 'evil'."}, {"text": "They use literal poisons and occult practices to undermine the health of the warrior caste.", "isCorrect": false, "rationale": "Nietzsche uses 'poisonous' metaphorically to describe the intellectual and psychological nature of their revenge."}, {"text": "They encourage the aristocracy to waste their resources on religious monuments and rituals.", "isCorrect": false, "rationale": "While he critiques priestly values, his focus is on the radical transvaluation of morality, not economic waste."}, {"text": "They promote a 'will to nothingness' that leads to the physical extinction of the race.", "isCorrect": false, "rationale": "While related to his later critique of the 'ascetic ideal,' the focus here is on the 'cleverness' of their hatred."}]}, {"question": "What is the primary misunderstanding regarding Nietzsche's term 'the blond beast' ($blonde$ $Bestie$)?", "options": [{"text": "It is often mistaken for a racial category, whereas it actually refers to a lion metaphor for vital energy.", "isCorrect": true, "rationale": "Nietzsche explicitly includes non-Germanic peoples like the Romans, Arabs, and Japanese in this 'beast of prey' category."}, {"text": "It is confused with the 'slave' who has finally broken free of their moral chains.", "isCorrect": false, "rationale": "The 'blond beast' is clearly identified as the core of the aristocratic races, the opposite of the slave type."}, {"text": "It is viewed as a literal animal that humans must evolve into, rather than a regression.", "isCorrect": false, "rationale": "Nietzsche uses it to describe the raw, 'barbarian' foundation of higher civilizations, not a future goal."}, {"text": "It is used by Nietzsche to celebrate the peaceful, domesticated 'tame man' of modern Europe.", "isCorrect": false, "rationale": "The 'blond beast' is the 'monster' that causes horror to the domesticated 'worm-man' of modernity."}]}, {"question": "In Beyond Good and Evil 251, what is Nietzsche's explicit stance toward anti-Semitism and those who promote it?", "options": [{"text": "He expresses contempt for 'anti-Semitic bawlers' and suggests they should be banished from the country.", "isCorrect": true, "rationale": "Nietzsche views anti-Semitism as a 'folly' and a sign of a 'feeble and uncertain' national instinct."}, {"text": "He supports it as a necessary defense of the 'German stomach' against foreign influence.", "isCorrect": false, "rationale": "He mocks the idea of the 'German stomach' and argues that Germany actually needs the intellect of the Jews."}, {"text": "He remains neutral, viewing it as a natural consequence of the struggle for power between races.", "isCorrect": false, "rationale": "His language is far from neutral; he calls anti-Semitism a 'disease' and 'political infection'."}, {"text": "He argues that Jews are the primary authors of Slave Morality and thus must be physically excluded from Europe.", "isCorrect": false, "rationale": "While he identifies their historical role in the slave revolt, he admires their strength and toughness and wants them integrated into Europe."}]}, {"question": "According to Nietzsche, how does 'happiness' differ between the aristocratic man and the resentful man?", "options": [{"text": "For the aristocrat, happiness is active ($e\\hat{u}$ $pr\\hat{a}ttein$); for the resentful man, it is a passive narcotic or 'quietude'.", "isCorrect": true, "rationale": "The text explains that noble happiness is inseparable from action, while the weak seek happiness as an escape from suffering."}, {"text": "The aristocrat finds happiness in self-denial, while the resentful man finds it in sensory indulgence.", "isCorrect": false, "rationale": "Nietzsche argues the opposite: the noble man affirms his instincts, while the resentful man seeks 'Sabbath' and rest."}, {"text": "There is no difference; both types are equally driven by the same fundamental 'instinct for happiness'.", "isCorrect": false, "rationale": "Nietzsche specifically distinguishes the 'instinct for happiness' as belonging to slave-morals, contrasted with noble 'reverence'."}, {"text": "The aristocrat requires an enemy to feel happy, whereas the resentful man is happy in isolation.", "isCorrect": false, "rationale": "The noble man is happy in himself and 'naïf'; the resentful man's happiness is reactive and requires looking at his enemies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
