<script>
var QUESTIONS = [{"question": "In 'The Birth of Tragedy', how does Nietzsche define the relationship between the Apollonian and the Dionysian impulses in the context of Greek tragedy?", "options": [{"text": "Tragedy represents the total victory of Apollonian order over the terrifying formlessness of the Dionysian.", "isCorrect": false, "rationale": "Nietzsche argues that tragedy is a synthesis where the two drives meet, rather than one completely suppressing the other."}, {"text": "Tragedy is the sublime product of the Apollonian giving shape and meaning to the chaotic Dionysian reality.", "isCorrect": true, "rationale": "The Apollonian provides the necessary form and individuation to make the ecstatic, formless Dionysian encounter endurable and meaningful."}, {"text": "The Apollonian and Dionysian are mutually exclusive forces that Nietzsche believed could never be reconciled in art.", "isCorrect": false, "rationale": "The text explicitly states that tragedy is the specific art form in which these two drives met to produce something sublime."}, {"text": "The Dionysian impulse provides the moral structure while the Apollonian provides the musical ecstasy.", "isCorrect": false, "rationale": "The roles are reversed in Nietzsche's framework; the Dionysian is associated with ecstasy and the Apollonian with structure and form."}], "id": "q01"}, {"question": "What was the primary reason Nietzsche's academic reputation in classical philology was severely damaged following his first publication?", "options": [{"text": "He openly admitted to being a follower of Schopenhauer's atheism within a religious university setting.", "isCorrect": false, "rationale": "While he was a follower of Schopenhauer, the text identifies a specific review of his book as the cause of his professional downfall."}, {"text": "His colleagues were primarily offended by his secret collaboration with Richard Wagner on political pamphlets.", "isCorrect": false, "rationale": "The collaboration with Wagner was public and included in the book, but it was the tone and lack of scholarship that horrified his peers."}, {"text": "A scathing review by Ulrich von Wilamowitz-Moellendorff attacked the book's speculative and un-scholarly tone.", "isCorrect": true, "rationale": "The academic community rejected the work because it lacked the rigorous, evidence-based methodology expected in philology at the time."}, {"text": "The book was written in aphorisms, which was a style strictly forbidden by the University of Basel.", "isCorrect": false, "rationale": "Nietzsche did not adopt the aphoristic style until later, starting with 'Human, All Too Human' in 1878."}], "id": "q02"}, {"question": "Why did Richard Wagner find the publication of 'Human, All Too Human' to be a personal provocation and the end of his friendship with Nietzsche?", "options": [{"text": "The book contained a direct, named attack on Wagner's wife, Cosima, and her influence on his music.", "isCorrect": false, "rationale": "The text does not mention personal attacks on Cosima; the break was rooted in philosophical and stylistic shifts."}, {"text": "Nietzsche dedicated the work to Voltaire, a rationalist thinker whom Wagner deeply disliked.", "isCorrect": true, "rationale": "The dedication signaled Nietzsche's shift toward Enlightenment rationalism and away from the Romanticism and metaphysics Wagner championed."}, {"text": "The book was written in a biblical, prophetic prose that Wagner felt mimicked his own operatic style.", "isCorrect": false, "rationale": "This describes $Thus Spoke Zarathustra$, whereas 'Human, All Too Human' was characterized as cool, analytical, and anti-romantic."}, {"text": "Nietzsche used the book to argue that Wagner's music was the ultimate expression of the Dionysian impulse.", "isCorrect": false, "rationale": "Nietzsche argued this in his first book; 'Human, All Too Human' marked his break from such intoxications with art."}], "id": "q03"}, {"question": "In $The Gay Science$, Nietzsche introduces the 'thought experiment of eternal recurrence'. What does this experiment specifically ask the individual to consider?", "options": [{"text": "Whether they have the strength to end their life if they knew God was dead.", "isCorrect": false, "rationale": "While 'God is dead' appears in the same book, the eternal recurrence is a separate experiment involving the repetition of life."}, {"text": "Whether the soul is reincarnated into a higher or lower state based on moral merit.", "isCorrect": false, "rationale": "Nietzsche's concept is not about moral progress or reincarnation, but the identical repetition of the exact same life."}, {"text": "Whether they could bear to live their entire life over again, identically, for all eternity.", "isCorrect": true, "rationale": "This challenge, presented by a demon in aphorism 341, serves as a test of one's affirmation of life."}, {"text": "Whether the history of the universe repeats itself in cycles of expansion and contraction.", "isCorrect": false, "rationale": "This is a cosmological theory, whereas Nietzsche's use of the concept in this context is a personal, psychological thought experiment."}], "id": "q04"}, {"question": "How does Nietzsche justify his use of the aphoristic style rather than a systematic, step-by-step philosophical argument?", "options": [{"text": "He believed that the German language was inherently unsuitable for long-form logical deduction.", "isCorrect": false, "rationale": "There is no evidence in the text that Nietzsche blamed the language itself for his stylistic choices."}, {"text": "He viewed systematic philosophy as a form of intellectual dishonesty that forced the world into artificial logical structures.", "isCorrect": true, "rationale": "Nietzsche felt that systems pretend the world is neatly organized, whereas his aphorisms reflect the complex, often contradictory nature of reality."}, {"text": "He suffered from a physical condition that prevented him from concentrating on more than a few sentences at a time.", "isCorrect": false, "rationale": "While he had health issues, the text describes the style as a 'deliberate philosophical method' rather than a physical necessity."}, {"text": "The aphoristic style was the only format his sister, Elisabeth, would agree to publish during his lifetime.", "isCorrect": false, "rationale": "Nietzsche published many of these works himself; Elisabeth's major interference occurred after his breakdown and death."}], "id": "q05"}, {"question": "According to $On the Genealogy of Morals$, what is the defining characteristic of 'slave morality'?", "options": [{"text": "Values created by the strong as a way to affirm their own physical power and beauty.", "isCorrect": false, "rationale": "This description aligns with Nietzsche's definition of 'master morality', which is based on self-affirmation."}, {"text": "A moral system based on the rational pursuit of the greatest good for the greatest number.", "isCorrect": false, "rationale": "This is utilitarianism; Nietzsche defines slave morality specifically through the lens of $ressentiment$."}, {"text": "Values created by the weak out of $ressentiment$ toward the strong.", "isCorrect": true, "rationale": "Slave morality is characterized as reactive, defining 'good' as the opposite of what the strong ('evil') represent."}, {"text": "The belief that all humans are inherently equal and possess the same natural rights.", "isCorrect": false, "rationale": "While slave morality might promote equality, Nietzsche's genealogical definition focuses on its origin in the reaction of the weak."}], "id": "q06"}, {"question": "Which of the following describes the core argument of the Second Essay in Nietzsche's $On the Genealogy of Morals$?", "options": [{"text": "It explores the origin of guilt in the debtor-creditor relationship and 'bad conscience' as internalized aggression.", "isCorrect": true, "rationale": "Nietzsche traces the psychological development of the human 'soul' and the capacity to make promises through historical economic and social structures."}, {"text": "It explains why priests and philosophers embrace self-denial and the 'ascetic ideal'.", "isCorrect": false, "rationale": "This is the primary focus of the Third Essay of the Genealogy, not the second."}, {"text": "It contrasts the linguistic origins of 'good and bad' with 'good and evil'.", "isCorrect": false, "rationale": "This linguistic and moral distinction is the focus of the First Essay."}, {"text": "It argues that modern science is the final and most dangerous form of the ascetic ideal.", "isCorrect": false, "rationale": "The critique of science as an ascetic ideal is part of the Third Essay's conclusion."}], "id": "q07"}, {"question": "Why does the source material issue a 'warning' regarding the book titled $The Will to Power$?", "options": [{"text": "Nietzsche wrote it while in a state of advanced madness, making the logic completely incoherent.", "isCorrect": false, "rationale": "While some final works were written in euphoria, 'The Will to Power' was actually not compiled by Nietzsche at all."}, {"text": "It is a posthumous fabrication assembled and potentially altered by Nietzsche's sister, Elisabeth.", "isCorrect": true, "rationale": "The book consists of rearranged notebook fragments intended to serve Elisabeth's own ideological agenda, rather than Nietzsche's intended structure."}, {"text": "The book contains radical political views that Nietzsche later repudiated in $Ecce Homo$.", "isCorrect": false, "rationale": "The issue is not repudiation by Nietzsche, but that he never authorized or organized the material into a book."}, {"text": "It was actually written by Richard Wagner and published under Nietzsche's name to ruin his reputation.", "isCorrect": false, "rationale": "Wagner died in 1883, long before this material was posthumously compiled by Elisabeth."}], "id": "q08"}, {"question": "In Nietzsche's 1888 work $The Antichrist$, what is his primary target of criticism?", "options": [{"text": "The historical Jesus, whom he viewed as a weak and delusional figure.", "isCorrect": false, "rationale": "Nietzsche actually treats the figure of Jesus with surprising sympathy, according to the text."}, {"text": "The institutional religion and morality built by the Apostle Paul in Jesus's name.", "isCorrect": true, "rationale": "Nietzsche distinguishes between the character of Jesus and the organized religion that followed, which he viewed as a perversion."}, {"text": "The rise of secularism and science as new forms of 'idols' replacing God.", "isCorrect": false, "rationale": "While he critiques these elsewhere, $The Antichrist$ is his most sustained and direct attack on Christianity itself."}, {"text": "The German government's use of religious symbols to justify nationalism.", "isCorrect": false, "rationale": "Nietzsche's critique in this work is philosophical and theological rather than primarily focused on German state politics."}], "id": "q09"}, {"question": "Which work does Nietzsche describe in $Ecce Homo$ as the 'No-saying, No-doing' part of his task involving the revaluation of values?", "options": [{"text": "$The Birth of Tragedy$", "isCorrect": false, "rationale": "This was his first book and is considered the 'Yes-saying' or artistic part of his early career."}, {"text": "$Thus Spoke Zarathustra$", "isCorrect": false, "rationale": "Nietzsche viewed $Zarathustra$ as the 'Yes-saying' solution to his task; the analytical destruction came afterward."}, {"text": "$Beyond Good and Evil$", "isCorrect": true, "rationale": "Nietzsche characterizes this work as the critical, destructive phase where he attacks the prejudices of philosophers and existing moralities."}, {"text": "$The Gay Science$", "isCorrect": false, "rationale": "This book is described as a work of joy and lightness, preceding the 'No-saying' phase of BGE."}], "id": "q10"}, {"question": "What two famous ideas make their first appearance in $The Gay Science$?", "options": [{"text": "The $Ubermensch$ and $ressentiment$.", "isCorrect": false, "rationale": "The $Ubermensch$ is primarily developed in $Thus Spoke Zarathustra$, and $ressentiment$ is central to the $Genealogy$—neither debuted in $The Gay Science$."}, {"text": "The parable of the madman announcing 'God is dead' and the thought experiment of eternal recurrence.", "isCorrect": true, "rationale": "Aphorism 125 introduces 'God is dead' and aphorism 341 introduces eternal recurrence, both in $The Gay Science$."}, {"text": "Master morality versus slave morality and bad conscience.", "isCorrect": false, "rationale": "These concepts are developed systematically in $On the Genealogy of Morals$, not $The Gay Science$."}, {"text": "The will to power and $amor fati$.", "isCorrect": false, "rationale": "While $amor fati$ does appear in $The Gay Science$, the will to power is not specifically introduced there; and the text highlights 'God is dead' and eternal recurrence as the two famous firsts."}], "id": "q11"}, {"question": "How does the structure of $Beyond Good and Evil$ differ from that of $On the Genealogy of Morals$?", "options": [{"text": "$BGE$ is organized into nine numbered parts of aphorisms, while the $Genealogy$ develops three extended essays.", "isCorrect": true, "rationale": "The aphoristic leaps of $BGE$ contrast with the $Genealogy$'s sustained, argued form—Nietzsche at his most 'scholarly.'"}, {"text": "$BGE$ consists of three long essays, while the $Genealogy$ is written in short poetic verse.", "isCorrect": false, "rationale": "The structures are reversed: $BGE$ uses aphorisms while the $Genealogy$ employs extended essays."}, {"text": "Both books share an identical aphoristic structure but address different topics.", "isCorrect": false, "rationale": "The $Genealogy$ is specifically described as Nietzsche's most sustained and 'scholarly' work, distinct from the aphoristic style of $BGE$."}, {"text": "The $Genealogy$ was never completed and exists only as a fragment, while $BGE$ is fully structured.", "isCorrect": false, "rationale": "The $Genealogy$ is a complete work with three full essays; incompleteness is not an issue mentioned in the text."}], "id": "q12"}, {"question": "What was Nietzsche's own retrospective verdict on $The Birth of Tragedy$, expressed in his $1886$ preface?", "options": [{"text": "He described it as 'badly written, heavy, embarrassing, image-mad and image-muddled' but never disowned its central insight.", "isCorrect": true, "rationale": "Despite these harsh self-criticisms in the 'Attempt at a Self-Criticism,' Nietzsche retained the core Apollonian/Dionysian insight."}, {"text": "He claimed it was his finest work and regretted that philologists had rejected it.", "isCorrect": false, "rationale": "He was self-critical about the book's style, not defensive of it."}, {"text": "He completely disavowed it as a product of Wagner's influence and refused to reprint it.", "isCorrect": false, "rationale": "He acknowledged flaws but explicitly did not repudiate the central insight about the two artistic drives."}, {"text": "He praised it as the first genuinely scientific approach to Greek culture.", "isCorrect": false, "rationale": "His colleagues criticized it precisely for being un-scientific; Nietzsche himself acknowledged its speculative nature."}], "id": "q13"}, {"question": "What made $Ecce Homo$ an unusual work compared to Nietzsche's other books?", "options": [{"text": "It was an autobiographical reflection with chapter titles like 'Why I Am So Wise' and 'Why I Write Such Good Books.'", "isCorrect": true, "rationale": "Written in 1888, $Ecce Homo$ is dazzling and sometimes unhinged, presenting Nietzsche's own life and works through flamboyant self-assessment."}, {"text": "It was his only work written in dialogue form, modeled on the Platonic dialogues.", "isCorrect": false, "rationale": "Nietzsche did not write in the Platonic dialogue form; $Ecce Homo$ is a first-person autobiographical reflection."}, {"text": "It was published posthumously and may have been edited by Elisabeth like $The Will to Power$.", "isCorrect": false, "rationale": "Unlike $The Will to Power$, $Ecce Homo$ was written by Nietzsche in his final productive year; the text treats it as his own work."}, {"text": "It contained his definitive rejection of the $Ubermensch$ concept as a youthful error.", "isCorrect": false, "rationale": "The text does not describe $Ecce Homo$ as a repudiation of the $Ubermensch$; it is characterized as autobiographical, not a theoretical revision."}], "id": "q14"}, {"question": "Why does the source text say that $Thus Spoke Zarathustra$ is not used as a primary quotation source in the volume, despite being Nietzsche's self-described masterpiece?", "options": [{"text": "Because $Beyond Good and Evil$ and $On the Genealogy of Morals$ present the same ideas in more accessible analytical form.", "isCorrect": true, "rationale": "The text explains that $Zarathustra$ is the dramatic, mythic version of arguments that $BGE$ and $GM$ present analytically, making the latter more suitable for guided study."}, {"text": "Because $Zarathustra$ was written in a foreign language and lacks a reliable English translation.", "isCorrect": false, "rationale": "Translation quality is not the stated reason; the issue is the work's ecstatic, mythic style compared to the more analytical later works."}, {"text": "Because Elisabeth heavily edited $Zarathustra$ after Nietzsche's death.", "isCorrect": false, "rationale": "$Zarathustra$ was published during Nietzsche's active years; it is $The Will to Power$ that suffered Elisabeth's editorial distortions."}, {"text": "Because $Zarathustra$'s ideas about the $Ubermensch$ were later disowned by Nietzsche himself.", "isCorrect": false, "rationale": "There is no indication Nietzsche disowned $Zarathustra$; the reason given is accessibility and analytical clarity of the other works."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
