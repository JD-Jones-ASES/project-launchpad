<script>
var QUESTIONS = [{"question": "How does Freud’s evaluation of the 'internalization of instinct' in 'Civilization and Its Discontents' primarily differ from Nietzsche’s perspective?", "options": [{"text": "Freud views the process as a tragic but inescapable necessity of civilization, whereas Nietzsche suggests it could be redirected toward creative self-overcoming.", "isCorrect": true, "rationale": "The text notes that while both see guilt as internalized aggression, Freud sees the outcome as a tragic fixture of society, while Nietzsche holds out hope for a transformative, non-punitive relationship with bad conscience."}, {"text": "Freud argues that the internalization of aggression leads to spiritual elevation, while Nietzsche views it as a form of physiological decay.", "isCorrect": false, "rationale": "Both thinkers actually agree that this process is a form of redirected cruelty rather than a sign of higher spiritual status."}, {"text": "Nietzsche believes the superego is a biological inheritance, while Freud views it as a social construct developed through the penal system.", "isCorrect": false, "rationale": "The source material identifies the superego as a Freudian concept representing redirected aggression, but does not attribute the 'biological inheritance' view to Nietzsche in this context."}, {"text": "Nietzsche considers the renunciation of aggression as the goal of human evolution, while Freud warns it will lead to the collapse of the ego.", "isCorrect": false, "rationale": "Nietzsche does not view the renunciation of instinct as an ultimate goal; rather, he analyzes its genealogy as a problematic development."}], "id": "q01"}, {"question": "In 'Discipline and Punish', why does Michel Foucault interpret the shift from public torture to modern imprisonment as a 'technology of power' rather than humanitarian progress?", "options": [{"text": "Because the modern system focuses on disciplining the soul to produce 'docile bodies' that monitor and punish themselves.", "isCorrect": true, "rationale": "Foucault argues that the modern prison system internalizes discipline, moving from external physical force to a more efficient system of self-regulation and surveillance."}, {"text": "Because the modern prison system is designed to maximize the offender's physical suffering while hiding it from the public eye.", "isCorrect": false, "rationale": "Foucault's point is that the target of punishment shifted from the body to the soul, not that the focus remained on physical suffering."}, {"text": "Because the elimination of public executions was driven by a desire to reduce the state's financial expenditure on justice.", "isCorrect": false, "rationale": "The text focuses on the shift in the 'technology of power' and the internalization of norms rather than economic factors."}, {"text": "Because the modern prison encourages prisoners to channel their instincts into creative output, mirroring Nietzsche's ideal.", "isCorrect": false, "rationale": "Foucault's 'docile bodies' are characterized by conformity and self-discipline, which is distinct from Nietzsche's concept of creative self-overcoming."}], "id": "q02"}, {"question": "According to the source material, what 'psychological error' does Nietzsche identify as the foundation of the retributive model of justice?", "options": [{"text": "The belief that punishment creates a sense of guilt and leads to moral improvement in the offender.", "isCorrect": true, "rationale": "Nietzsche argues that punishment actually produces resentment and cunning rather than genuine remorse, making the goal of 'moral improvement' through pain a fallacy."}, {"text": "The assumption that the victim’s desire for revenge can be satisfied through a legally sanctioned financial transaction.", "isCorrect": false, "rationale": "While Nietzsche discusses the debtor-creditor relationship, the specific error mentioned regarding criminal justice reform is the failure of punishment to produce remorse."}, {"text": "The idea that criminals lack the capacity for bad conscience and thus require external constraints to behave socially.", "isCorrect": false, "rationale": "Nietzsche's point is not that they lack bad conscience, but that the external force of punishment is not what generates it."}, {"text": "The conviction that societal safety is the primary motivator for punishing those who break the law.", "isCorrect": false, "rationale": "Nietzsche focuses on the internal psychological effects on the offender and the hidden motivations of the punisher, not the external safety justification."}], "id": "q03"}, {"question": "Nietzsche argues that the Christian doctrine of Original Sin represents the 'ultimate moralization of bad conscience' by projecting which social relationship onto the cosmos?", "options": [{"text": "The relationship between a debtor and an infinite creditor.", "isCorrect": true, "rationale": "Nietzsche interprets existence itself as an unpayable debt to God, transforming the ancient debtor-creditor dynamic into an inescapable theological trap."}, {"text": "The hierarchy between a sovereign and a disobedient subject.", "isCorrect": false, "rationale": "While disobedience is part of the doctrine, Nietzsche specifically emphasizes the 'debt' aspect and the projection of the creditor role onto God."}, {"text": "The tension between a parent's expectations and a child's natural instincts.", "isCorrect": false, "rationale": "While Freud might focus on familial structures, Nietzsche's analysis in the 'Genealogy' focuses on the economic/legal framework of debt."}, {"text": "The struggle between a conquering tribe and its enslaved population.", "isCorrect": false, "rationale": "This relates to his 'slave morality' concepts, but his specific analysis of Original Sin in this text centers on the permanent state of indebtedness."}], "id": "q04"}, {"question": "In the context of 'Original Sin,' how does Nietzsche interpret the sacrifice of God's son?", "options": [{"text": "As an ingenious maneuver where the creditor discharges a debt that the debtor is permanently unable to pay.", "isCorrect": true, "rationale": "Nietzsche sees this as a cruel paradox: the debt is so enormous that only the creditor can pay it, which reinforces the debtor’s total dependence and self-abasement."}, {"text": "As the ultimate act of creative self-overcoming that ends the cycle of bad conscience.", "isCorrect": false, "rationale": "Nietzsche views this as the peak of the 'priestly imagination's' cruelty, not a positive liberation or creative overcoming."}, {"text": "As a historical transition from retributive justice to a more restorative, grace-based model of law.", "isCorrect": false, "rationale": "The text suggests Nietzsche sees this not as 'progress' but as a more sophisticated way to perpetuate a sense of inescapable guilt."}, {"text": "As a symbolic representation of the internalization of instinct that occurs at the start of every civilization.", "isCorrect": false, "rationale": "While related to internalization, the specific sacrifice of the son is framed as the peak of the moralization of debt specifically."}], "id": "q05"}, {"question": "Nietzsche suggests that the only 'honest' justification for punishment, as opposed to the 'deception' of moral improvement, is which of the following?", "options": [{"text": "The satisfaction found in the spectacle of suffering.", "isCorrect": true, "rationale": "Nietzsche posits that if we admit we enjoy the transaction of punishment, we are at least being honest about the nature of cruelty."}, {"text": "The effective reduction of recidivism through fear.", "isCorrect": false, "rationale": "Nietzsche is skeptical of the long-term effectiveness of punishment, noting it often produces 'cunning' rather than genuine behavioral change."}, {"text": "The restoration of the social contract between the offender and the victim.", "isCorrect": false, "rationale": "This is a tenet of restorative justice, which Nietzsche might find 'too gentle' or focused on the wrong objectives."}, {"text": "The biological necessity of removing 'bad' instincts from the gene pool.", "isCorrect": false, "rationale": "The text does not frame Nietzsche's defense of 'honesty' in punishment in terms of biological selection or eugenics."}], "id": "q06"}, {"question": "Which modern psychological concept, mentioned in the connection box, mirrors Nietzsche's 'bad conscience' by describing self-punishment as 'automatic negative thoughts'?", "options": [{"text": "Cognitive-behavioral accounts.", "isCorrect": true, "rationale": "The text explicitly links Nietzsche's internal self-punishment to cognitive-behavioral accounts of automatic negative thoughts and toxic shame."}, {"text": "The collective unconscious.", "isCorrect": false, "rationale": "While a psychological term, the text does not link Nietzsche's 'bad conscience' to Jungian collective unconscious theory."}, {"text": "The hierarchy of needs.", "isCorrect": false, "rationale": "Maslow's hierarchy of needs focuses on motivation and self-actualization, not the mechanism of internalized self-punishment."}, {"text": "The bystander effect.", "isCorrect": false, "rationale": "This social psychology concept relates to group behavior, not the internal mechanism of guilt or conscience."}], "id": "q07"}, {"question": "Why might Nietzsche be skeptical of modern 'restorative justice' programs, according to the text's analysis?", "options": [{"text": "Because they focus on reconciliation rather than the rigorous process of individual transformation.", "isCorrect": true, "rationale": "The text suggests Nietzsche might find these programs too gentle or focused on communal healing rather than his ideal of self-overcoming."}, {"text": "Because they still rely on the 'debtor-creditor' model to determine the amount of 'harm' to be repaired.", "isCorrect": false, "rationale": "While they involve repairing harm, the text's specific critique is that they might be too focused on reconciliation."}, {"text": "Because he believed that criminals should never be reintegrated into a 'civilized' society.", "isCorrect": false, "rationale": "Nietzsche’s critique is more about the psychological goals (reconciliation vs. transformation) rather than a blanket ban on reintegration."}, {"text": "Because the facilitation of dialogue between victim and offender ignores the biological nature of aggression.", "isCorrect": false, "rationale": "While Nietzsche values the acknowledgement of instinct, the source highlights his potential issue with the 'gentle' nature and the focus on reconciliation."}], "id": "q08"}, {"question": "What does Freud mean when he suggests that the superego's intensity increases as a person renounces more aggression?", "options": [{"text": "The renounced outward aggression is redirected inward, giving the superego more 'fuel' to punish the ego.", "isCorrect": true, "rationale": "Freud's theory states that blocked outward aggression doesn't vanish; it is taken over by the superego and turned back against the self as guilt."}, {"text": "As a person becomes more virtuous, they naturally develop a higher sensitivity to minor moral failings.", "isCorrect": false, "rationale": "Freud and Nietzsche both argue that this 'guilt' is not about actual spiritual elevation but about the redirection of cruelty."}, {"text": "The ego eventually learns to mimic the aggression of the superego, leading to a state of total internal conflict.", "isCorrect": false, "rationale": "The process involves the superego punishing the ego, not necessarily the ego mimicking the superego's role."}, {"text": "The civilizing process requires the complete elimination of aggression, which eventually starves the superego.", "isCorrect": false, "rationale": "Freud argues the opposite: the more aggression is renounced, the *more* forceful the superego becomes."}], "id": "q09"}, {"question": "According to the connection box, which contemporary political debate raises questions similar to those explored in Nietzsche's 'Genealogy of Morals'?", "options": [{"text": "The concept of 'collective guilt' and inherited responsibility for historical atrocities.", "isCorrect": true, "rationale": "Nietzsche’s exploration of whether debt and guilt can be inherited or projected across generations maps directly onto modern debates about national responsibility."}, {"text": "The debate over the privatization of national infrastructure and public services.", "isCorrect": false, "rationale": "While this involves 'debt,' it does not address the moralization of conscience or the genealogy of guilt described by Nietzsche."}, {"text": "The ethical implications of artificial intelligence and its impact on human autonomy.", "isCorrect": false, "rationale": "The text focuses on guilt, conscience, and punishment, not modern technological ethics regarding AI."}, {"text": "The struggle for voting rights and democratic representation in formerly colonized nations.", "isCorrect": false, "rationale": "Though related to history, the specific Nietzschean parallel mentioned is the inheritance of 'guilt' or 'debt' (collective guilt)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
