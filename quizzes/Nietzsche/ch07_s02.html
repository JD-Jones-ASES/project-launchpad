<script>
var QUESTIONS = [{"question": "In the context of Chapter 7, how does the response of Fyodor Dostoevsky to the 'death of God' differ fundamentally from that of Friedrich Nietzsche?", "options": [{"text": "Dostoevsky views the loss of divine sanction as a reason to return to faith, whereas Nietzsche views it as a mandate to create autonomous values.", "isCorrect": true, "rationale": "While both thinkers recognized the catastrophic implications for morality, Dostoevsky saw the resulting nihilism as a $reductio$ $ad$ $absurdum$ for atheism, while Nietzsche saw it as an opportunity for human-legislated meaning."}, {"text": "Dostoevsky argued that God's death was a cultural necessity, while Nietzsche mourned the loss of religious institutions.", "isCorrect": false, "rationale": "This reverses their actual positions; Nietzsche diagnosed the cultural fact of God's death, while Dostoevsky sought to maintain faith to prevent moral collapse."}, {"text": "Dostoevsky believed that morality could exist without God, while Nietzsche argued that all morality must be discarded.", "isCorrect": false, "rationale": "Dostoevsky famously suggested that without God 'everything is permitted,' indicating morality's dependence on the divine, whereas Nietzsche sought to revaluate rather than simply discard all morality."}, {"text": "Nietzsche proposed a return to the 'leap of faith,' while Dostoevsky argued for a 'buffered self.'", "isCorrect": false, "rationale": "The 'leap of faith' is a concept belonging to Kierkegaard, and the 'buffered self' is a term coined by Charles Taylor."}]}, {"question": "According to the source material, what was Ivan Karamazov's specific argument regarding the soul and virtue in 'The Brothers Karamazov'?", "options": [{"text": "If the soul is not immortal, then virtue does not exist and everything becomes lawful.", "isCorrect": true, "rationale": "The text notes that Ivan's actual argument was that without the immortality of the soul, there is no virtue, making all actions 'lawful' rather than using the exact phrase 'permitted'."}, {"text": "The death of the physical body necessitates the death of the Christian God.", "isCorrect": false, "rationale": "Ivan's argument focused on the logical consequences of the absence of immortality for human ethics, not the physical nature of God."}, {"text": "Everything is permitted only if the church maintains its political power.", "isCorrect": false, "rationale": "Ivan's concern was metaphysical and existential regarding the existence of the soul, not the political influence of the church."}, {"text": "Rationality alone is sufficient to underwrite moral prohibitions in a godless world.", "isCorrect": false, "rationale": "This reflects the view of the 'New Atheists' that Nietzsche mocked, rather than the crisis-driven logic of Ivan Karamazov."}]}, {"question": "How did Soren Kierkegaard's critique of Christianity parallel Nietzsche's diagnosis, despite their different conclusions?", "options": [{"text": "Both despised the 'comfortable' institutionalized religion that allowed individuals to avoid existential confrontation.", "isCorrect": true, "rationale": "Both thinkers demanded authenticity and criticized the 'bourgeois' reduction of religion to a social routine, though one leaped toward God and the other away."}, {"text": "Both believed that rational proofs were the only way to sustain faith in the modern era.", "isCorrect": false, "rationale": "Kierkegaard explicitly rejected rational proofs in favor of the 'absurd' leap of faith, and Nietzsche saw rationalism as a symptom of the crisis."}, {"text": "Both argued that the 'death of God' was caused by the rise of the 'buffered self.'", "isCorrect": false, "rationale": "The 'buffered self' is Charles Taylor's diagnostic term, not a concept used by Kierkegaard or Nietzsche."}, {"text": "Nietzsche influenced Kierkegaard's view that authentic faith must be solitary.", "isCorrect": false, "rationale": "The text states there is no evidence Nietzsche read Kierkegaard, and Kierkegaard lived earlier than Nietzsche."}]}, {"question": "In Charles Taylor's 'A Secular Age', what distinguishes the 'buffered' self from the 'porous' self?", "options": [{"text": "The buffered self is closed to transcendence and views itself as self-sufficient, unlike the porous self which is open to enchantment.", "isCorrect": true, "rationale": "Taylor uses these terms to describe the shift from a self vulnerable to spiritual influences (porous) to one that is self-contained and secularized (buffered)."}, {"text": "The porous self is a product of modern science, while the buffered self is a relic of the Middle Ages.", "isCorrect": false, "rationale": "This is the reverse; the porous self belongs to an age of universal belief, while the buffered self belongs to our secular age."}, {"text": "A buffered self seeks the 'leap of faith,' whereas a porous self relies on institutional dogmas.", "isCorrect": false, "rationale": "The 'leap of faith' is Kierkegaard's response to the crisis of faith, not a characteristic of Taylor's buffered self."}, {"text": "The porous self represents the 'madman' in the marketplace, while the buffered self represents the 'laughing atheists.'", "isCorrect": false, "rationale": "While there are parallels, these are Nietzsche's archetypes rather than Taylor's definitions of the self's boundaries."}]}, {"question": "Why would Nietzsche likely categorize modern 'New Atheists' like Richard Dawkins as the 'laughing atheists in the marketplace'?", "options": [{"text": "They continue to uphold secularized Christian values like human rights without acknowledging their theological foundations.", "isCorrect": true, "rationale": "Nietzsche's critique is that they discard the Christian God while inconsistently keeping the Christian morality that God underwrote."}, {"text": "They refuse to acknowledge that science has disproved the existence of a divine creator.", "isCorrect": false, "rationale": "New Atheists do argue science disproves God; Nietzsche's issue is their failure to grasp the *consequences* of that fact."}, {"text": "They prioritize 'amor fati' over the rational pursuit of scientific truth.", "isCorrect": false, "rationale": "Nietzsche's own answer was 'amor fati'; the New Atheists are criticized for being overly optimistic and naive, not for following Nietzsche's path."}, {"text": "They advocate for a 'religionless Christianity' as suggested by Dietrich Bonhoeffer.", "isCorrect": false, "rationale": "Bonhoeffer was a theologian, and his concept is distinct from the secular humanism of the New Atheists."}]}, {"question": "Which thinker's solution to the modern crisis of faith involves an 'anguished, absurd commitment made in the teeth of uncertainty'?", "options": [{"text": "Soren Kierkegaard", "isCorrect": true, "rationale": "Kierkegaard's 'leap of faith' is defined as a direct, non-rational confrontation with God that ignores institutional mediation."}, {"text": "Friedrich Nietzsche", "isCorrect": false, "rationale": "Nietzsche's response was the creation of new values and 'amor fati,' not a commitment to God."}, {"text": "Fyodor Dostoevsky", "isCorrect": false, "rationale": "While Dostoevsky advocated faith, the specific phrasing of an 'absurd commitment' in the face of uncertainty is Kierkegaard's hallmark."}, {"text": "Dietrich Bonhoeffer", "isCorrect": false, "rationale": "Bonhoeffer spoke of 'religionless Christianity' in a 'world come of age,' which is a later 20th-century development."}]}, {"question": "What role did Jean-Paul Sartre play in the popular understanding of Dostoevsky's philosophy, according to the text?", "options": [{"text": "He sharpened Ivan Karamazov's nuanced argument into the famous phrase 'If God does not exist, everything is permitted.'", "isCorrect": true, "rationale": "The text explains that while Ivan's phrasing was about 'lawfulness' and the soul, Sartre is responsible for the concise form we know today."}, {"text": "He provided the first French translation of 'Notes from Underground' that Nietzsche read.", "isCorrect": false, "rationale": "The text does not credit Sartre with translation; it notes Nietzsche's high praise for the work independently."}, {"text": "He reconciled Kierkegaard's leap of faith with Nietzsche's 'amor fati.'", "isCorrect": false, "rationale": "Sartre is mentioned specifically for his role in articulating Dostoevsky's famous premise, not for reconciling these two different paths."}, {"text": "He was the 'only psychologist' from whom Nietzsche admitted he had something to learn.", "isCorrect": false, "rationale": "Nietzsche said this about Dostoevsky, not Sartre."}]}, {"question": "According to Charles Taylor, how has the 'conditions of belief' changed in Western societies?", "options": [{"text": "Belief has moved from being a universal default to being one option among many, often not the default.", "isCorrect": true, "rationale": "Taylor traces the move from a time where belief was unquestioned to a secular age where it is one choice in a competitive landscape."}, {"text": "Belief has been completely eradicated by the success of the New Atheist movement.", "isCorrect": false, "rationale": "Taylor argues that secularization is a long process and does not see the buffered self as the 'last word' or belief as impossible."}, {"text": "Institutional Christianity has successfully reclaimed the 'porous self' through the Danish state church.", "isCorrect": false, "rationale": "Kierkegaard attacked the Danish state church for draining genuine faith, and Taylor describes the move away from the porous self."}, {"text": "The death of God is an irreversible theological event that precludes any new spiritual experience.", "isCorrect": false, "rationale": "Taylor, unlike Nietzsche, believes new forms of spiritual experience remain possible even in a secular age."}]}, {"question": "How does the text characterize Nietzsche's relationship with Dostoevsky's work?", "options": [{"text": "Nietzsche praised Dostoevsky's psychological penetration, even though their ultimate commitments were opposite.", "isCorrect": true, "rationale": "Nietzsche called Dostoevsky the 'only psychologist' he could learn from, despite Dostoevsky choosing Christ and Nietzsche choosing 'amor fati'."}, {"text": "Nietzsche viewed Dostoevsky as a 'laughing atheist' who did not understand the death of God.", "isCorrect": false, "rationale": "The text states Dostoevsky saw the death of God as a catastrophe, distinguishing him from the 'laughing atheists' of the New Atheism."}, {"text": "Nietzsche and Dostoevsky collaborated on the 'Secularization Thesis' during the late 19th century.", "isCorrect": false, "rationale": "The 'Secularization Thesis' is associated with Charles Taylor (2007), and there is no evidence of collaboration between Nietzsche and Dostoevsky."}, {"text": "Nietzsche dismissed Dostoevsky's 'Notes from Underground' as a life-denying Christian illusion.", "isCorrect": false, "rationale": "Nietzsche actually praised 'Notes from Underground' highly."}]}, {"question": "Which of the following best describes the 'Death of God' theology movement of the 1960s as mentioned in the connection box?", "options": [{"text": "It attempted to create a form of Christianity that affirmed the death of God as a theological event.", "isCorrect": true, "rationale": "Thinkers like Altizer and Hamilton sought a theology that operated within the reality of God's 'death' as a cultural and theological milestone."}, {"text": "It was a movement that sought to prove God's existence through modern physics.", "isCorrect": false, "rationale": "This movement accepted the 'death of God' rather than attempting to reverse it through rational or scientific proof."}, {"text": "It was a direct response to the 'New Atheism' of Richard Dawkins and Sam Harris.", "isCorrect": false, "rationale": "The 'Death of God' theology preceded the 'New Atheism' of the 21st century by several decades."}, {"text": "It advocated for the return to the 'porous self' to combat secularization.", "isCorrect": false, "rationale": "The movement was more about adapting Christianity to a secularized world than reverting to pre-modern psychological states."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
