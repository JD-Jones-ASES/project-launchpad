<script>
var QUESTIONS = [{"question": "According to the text, why is it recommended to read 'Thus Spoke Zarathustra' only after engaging with Nietzsche's more discursive works?", "options": [{"text": "Because it contains his most poetic and least systematic presentation of major ideas.", "isCorrect": true, "rationale": "The text notes that Zarathustra presents ideas like the Ubermensch in a non-systematic form that is more rewarding once a grounding in his arguments is established."}, {"text": "Because it was the last book Nietzsche wrote and serves as a final summary of his life.", "isCorrect": false, "rationale": "The text identifies 'Twilight of the Idols' as the summary of his mature thought, while Zarathustra was written earlier in the 1880s."}, {"text": "Because the translation by Walter Kaufmann is considered too complex for beginners.", "isCorrect": false, "rationale": "While Kaufmann is the standard, the text suggests the difficulty lies in Nietzsche's oracular style, not specifically Kaufmann's translation quality."}, {"text": "Because the book is a parody of the Bible that requires deep theological training to decode.", "isCorrect": false, "rationale": "Although it is a parody, the text emphasizes needing a grounding in Nietzsche's own philosophical arguments rather than formal theology."}], "id": "q01"}, {"question": "What is the primary interpretive puzzle surrounding the tone of 'Ecce Homo' mentioned in the source?", "options": [{"text": "The distinction between literal megalomania and self-conscious irony.", "isCorrect": true, "rationale": "Scholars debate whether the boastful chapter titles represent genuine insanity or a deliberate performance of philosophical self-creation."}, {"text": "The conflict between Nietzsche's atheism and the book's religious title.", "isCorrect": false, "rationale": "While 'Ecce Homo' is a religious reference, the text identifies the tone of the chapter titles as the central interpretive puzzle."}, {"text": "The accuracy of the biographical details compared to Elisabeth's heavy editing.", "isCorrect": false, "rationale": "Although Elisabeth's editing is mentioned, the text focuses on the tone of Nietzsche's self-presentation as the primary scholarly puzzle."}, {"text": "The question of why Nietzsche chose to write in a prophetic style so late in life.", "isCorrect": false, "rationale": "The prophetic style is specifically attributed to 'Zarathustra,' whereas 'Ecce Homo' is characterized by its unique autobiographical tone."}], "id": "q02"}, {"question": "In the context of 'Twilight of the Idols', how does the text redefine Nietzsche’s metaphor of the 'hammer'?", "options": [{"text": "As a tuning fork used to detect if philosophical concepts ring hollow.", "isCorrect": true, "rationale": "The author clarifies that the hammer is not for smashing, but for tapping idols to test their internal substance."}, {"text": "As a sledgehammer intended to physically demolish the foundations of morality.", "isCorrect": false, "rationale": "The text explicitly states that the hammer in question is NOT a sledgehammer, despite the common aggressive interpretation."}, {"text": "As a blacksmith's tool used to forge the new values of the 'Ubermensch'.", "isCorrect": false, "rationale": "While forging values is a Nietzschean theme, the source specifically describes the hammer in this work as an instrument for testing existing idols."}, {"text": "As a gavel representing the final judgment on Western philosophy.", "isCorrect": false, "rationale": "The text focuses on the diagnostic use of the tool rather than a judicial or final authoritative 'sentence'."}], "id": "q03"}, {"question": "What does the title 'The Gay Science' (Die fröhliche Wissenschaft) signify regarding Nietzsche's approach to philosophy?", "options": [{"text": "Knowledge pursued as a delight rather than a grim duty.", "isCorrect": true, "rationale": "The title refers to the troubadour tradition of 'gai saber,' emphasizing poetry and the joy found in the search for knowledge."}, {"text": "A rigorous scientific method based on psychological experimentation.", "isCorrect": false, "rationale": "While Kaufmann views Nietzsche as a psychologist, the title specifically points toward the artistic and joyful 'gai saber' tradition."}, {"text": "The rejection of logic in favor of emotional spontaneity.", "isCorrect": false, "rationale": "The text describes it as knowledge pursued through delight, which is a matter of spirit and motivation rather than a total rejection of logic."}, {"text": "A satirical critique of the Enlightenment's 'dismal science' of economics.", "isCorrect": false, "rationale": "The text links the title to the Provencal troubadour tradition, not a critique of economic theory."}], "id": "q04"}, {"question": "According to the source, what was Walter Kaufmann's most significant contribution to Nietzsche scholarship in 1950?", "options": [{"text": "Rescuing Nietzsche's reputation from Nazi appropriation.", "isCorrect": true, "rationale": "The text credits Kaufmann's book with establishing the modern scholarly understanding by distancing Nietzsche from Nazi-era distortions."}, {"text": "Providing the first English translation of 'The Will to Power'.", "isCorrect": false, "rationale": "While Kaufmann is a famous translator, the text emphasizes his role in rehabilitating Nietzsche's image and emphasizing him as a psychologist."}, {"text": "Discovering the unedited manuscripts of 'Ecce Homo' hidden by Elisabeth.", "isCorrect": false, "rationale": "The text mentions Elisabeth's editing but does not credit Kaufmann with a specific discovery of hidden manuscripts."}, {"text": "Creating a unified system of thought from Nietzsche's scattered aphorisms.", "isCorrect": false, "rationale": "The text notes Kaufmann viewed Nietzsche as a rigorous thinker, but Alexander Nehamas is the one associated with the 'unified project' reading."}], "id": "q05"}, {"question": "Which secondary source is specifically recommended for understanding Nietzsche's views on perspectivism and the will to truth?", "options": [{"text": "Maudemarie Clark, 'Nietzsche on Truth and Philosophy'.", "isCorrect": true, "rationale": "The text describes Clark's work as the best analytical reconstruction of Nietzsche's epistemological arguments."}, {"text": "Alexander Nehamas, 'Nietzsche: Life as Literature'.", "isCorrect": false, "rationale": "Nehamas is recommended for his reading of Nietzsche as a project of self-creation, not primarily for analytical epistemology."}, {"text": "Rüdiger Safranski, 'Nietzsche: A Philosophical Biography'.", "isCorrect": false, "rationale": "Safranski's work is highlighted as a biography that weaves life and thought together, rather than a specific analytical study on truth."}, {"text": "Walter Kaufmann, 'Nietzsche: Philosopher, Psychologist, Antichrist'.", "isCorrect": false, "rationale": "Kaufmann is the best general introduction, but the text directs readers specifically to Clark for Chapter 2's epistemological questions."}], "id": "q06"}, {"question": "What distinguishes Alexander Nehamas's interpretation of Nietzsche from a 'system-builder' approach?", "options": [{"text": "He views Nietzsche's philosophy as a project of transforming life into a work of art.", "isCorrect": true, "rationale": "Nehamas suggests that Nietzsche's work is an example of self-creation, treating the philosopher's life and writing as a literary unity."}, {"text": "He argues that Nietzsche's thought is a series of disconnected experiments with no central goal.", "isCorrect": false, "rationale": "On the contrary, Nehamas sees a 'unified project,' but that project is aesthetic self-creation rather than a formal philosophical system."}, {"text": "He focuses exclusively on the historical context of Nietzsche's illnesses and friendships.", "isCorrect": false, "rationale": "This describes Safranski’s biographical approach, while Nehamas focuses on the literary/aesthetic aspect of the work."}, {"text": "He claims Nietzsche was primarily a political theorist trying to reform society.", "isCorrect": false, "rationale": "The text does not attribute a political focus to Nehamas; it focuses on his aesthetic and 'life as literature' reading."}], "id": "q07"}, {"question": "The text notes that Book 5 of 'The Gay Science' is particularly important because it:", "options": [{"text": "Contains some of Nietzsche's most mature and nuanced thinking, added years after the initial release.", "isCorrect": true, "rationale": "Book 5 was added in 1887, providing a more developed perspective than the original 1882 publication."}, {"text": "Introduces the concept of the 'Ubermensch' for the first time in his career.", "isCorrect": false, "rationale": "The Ubermensch is primarily associated with 'Thus Spoke Zarathustra' in the text's description."}, {"text": "Provides a line-by-line commentary on the 'death of God' parable.", "isCorrect": false, "rationale": "The text notes the 'death of God' is in GS 125, but does not state Book 5 is a commentary on it."}, {"text": "Was the only part of the book actually translated by Walter Kaufmann.", "isCorrect": false, "rationale": "The text mentions Kaufmann translated the complete work, not just the fifth book."}], "id": "q08"}, {"question": "How does Rüdiger Safranski's biography approach the relationship between Nietzsche's life and his ideas?", "options": [{"text": "By showing how his ideas emerged from specific experiences like illness and loneliness.", "isCorrect": true, "rationale": "Safranski 'weaves together' the life and thought, demonstrating the experiential origins of the philosophy."}, {"text": "By arguing that Nietzsche's personal life is irrelevant to the truth of his philosophical claims.", "isCorrect": false, "rationale": "Safranski’s 'novelistic skill' is praised specifically for showing how ideas emerged *from* experiences, not for separating them."}, {"text": "By focusing on the posthumous influence of his sister on his written legacy.", "isCorrect": false, "rationale": "While Elisabeth is mentioned in the section on 'Ecce Homo', Safranski’s work is characterized by its focus on the landscapes, friendships, and experiences of Nietzsche himself."}, {"text": "By categorizing the works into three distinct 'stages' based on his changing health.", "isCorrect": false, "rationale": "The text describes Safranski as weaving life and thought together novelistically, but does not mention a specific three-stage categorization."}], "id": "q09"}, {"question": "Which translation of 'The Antichrist' is described as having energy that compensates for its 'occasional inaccuracies'?", "options": [{"text": "H. L. Mencken.", "isCorrect": true, "rationale": "The text specifically notes that Mencken's public domain translation remains competitive due to its energy."}, {"text": "Walter Kaufmann.", "isCorrect": false, "rationale": "Kaufmann is described as more accurate and idiomatic, whereas Mencken is the one noted for energy over accuracy."}, {"text": "R. J. Hollingdale.", "isCorrect": false, "rationale": "Hollingdale is described as reliable and affordable, but the 'energy' comment is reserved for Mencken."}, {"text": "Adrian Del Caro.", "isCorrect": false, "rationale": "Del Caro is mentioned specifically for his translation of 'Thus Spoke Zarathustra' in the Cambridge series."}], "id": "q10"}, {"question": "What requirement does Nietzsche set for 'reading as an art' in the Preface to 'On the Genealogy of Morals'?", "options": [{"text": "The practice of 'rumination', or chewing on ideas slowly like a cow.", "isCorrect": true, "rationale": "The text quotes Nietzsche saying one must approach his books as a cow approaches its cud, a process he calls rumination."}, {"text": "The memorization of key aphorisms to internalize their spirit.", "isCorrect": false, "rationale": "While aphorisms are discussed, the specific 'art' required is the slow exposition through rumination."}, {"text": "The rejection of all secondary commentaries in favor of direct engagement.", "isCorrect": false, "rationale": "Nietzsche describes an essay as a commentary on an aphorism, suggesting the 'art' is the act of exposition and rumination, not just direct engagement."}, {"text": "Reading the works in chronological order to follow his intellectual development.", "isCorrect": false, "rationale": "The text emphasizes the method of reading (rumination) rather than a specific chronological sequence for 'reading as an art'."}], "id": "q11"}, {"question": "Which work is described as Nietzsche's 'greatest hits' and provides the best short introduction to his mature thought?", "options": [{"text": "Twilight of the Idols.", "isCorrect": true, "rationale": "The text labels this book as his 'greatest hits' and a 'single short work that captures the essentials'."}, {"text": "The Gay Science.", "isCorrect": false, "rationale": "While it contains many major ideas, the text specifically calls 'Twilight of the Idols' the best short introduction."}, {"text": "Beyond Good and Evil.", "isCorrect": false, "rationale": "The text recommends reading this before Zarathustra, but 'Twilight of the Idols' is the one called the 'greatest hits' summary."}, {"text": "Ecce Homo.", "isCorrect": false, "rationale": "Ecce Homo is an intellectual autobiography, but 'Twilight of the Idols' is the one described as capturing the essentials of his mature thought in a summary form."}], "id": "q12"}, {"question": "Why does the author of the text suggest avoiding 'Thus Spoke Zarathustra' as a first exposure to Nietzsche?", "options": [{"text": "Its style veers between the sublime and the ridiculous, making its arguments hard to track.", "isCorrect": true, "rationale": "The text describes the style as oracular and prophetic, which rewards patience but can be difficult for those without a grounding in his discursive works."}, {"text": "It was heavily edited by Elisabeth Förster-Nietzsche, obscuring its true meaning.", "isCorrect": false, "rationale": "The text identifies 'Ecce Homo' as being heavily edited by Elisabeth, not 'Thus Spoke Zarathustra'."}, {"text": "The book is written in a dry, academic prose that lacks Nietzsche's usual energy.", "isCorrect": false, "rationale": "The text states the opposite; it is a 'prose poem' and 'literary masterpiece' written in a prophetic style."}, {"text": "It focuses exclusively on the 'Ubermensch' and neglects his other major concepts.", "isCorrect": false, "rationale": "The text says all of Nietzsche's major ideas appear in Zarathustra, but in their 'least systematic form'."}], "id": "q13"}, {"question": "According to the passage, the 'Cambridge Texts in the History of Philosophy' series is notable for providing:", "options": [{"text": "Scholarly editions with excellent introductions.", "isCorrect": true, "rationale": "The text specifically recommends the Cambridge series for readers looking for scholarly editions and helpful context."}, {"text": "The most affordable and widely available translations.", "isCorrect": false, "rationale": "The text identifies R. J. Hollingdale’s Penguin Classics as the affordable and reliable option."}, {"text": "Public domain texts with modernized spelling and grammar.", "isCorrect": false, "rationale": "The text contrasts the scholarly Cambridge editions with the older public domain translations used in the book itself."}, {"text": "Translations that focus on the musicality of Nietzsche's prose over accuracy.", "isCorrect": false, "rationale": "Graham Parkes is noted for a 'literary' translation, while Cambridge is cited for its 'scholarly' nature."}], "id": "q14"}, {"question": "Nietzsche's claim 'I am no man, I am dynamite' appears in which of the following contexts?", "options": [{"text": "In the section 'Why I Am a Destiny' from 'Ecce Homo'.", "isCorrect": true, "rationale": "The final quote of the text identifies this specific location within his intellectual autobiography."}, {"text": "As the opening line of 'The Antichrist'.", "isCorrect": false, "rationale": "While 'The Antichrist' is forceful, the 'dynamite' quote is cited from 'Ecce Homo'."}, {"text": "During his critique of Socrates in 'Twilight of the Idols'.", "isCorrect": false, "rationale": "The text attributes the quote to 'Ecce Homo,' where he performs a self-mythologizing analysis of his own significance."}, {"text": "As the final words of Zarathustra before descending from the mountain.", "isCorrect": false, "rationale": "The quote is found in 'Ecce Homo', which provides Nietzsche's own account of his work, not within the narrative of Zarathustra."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
