        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 5, Section 3</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Nietzsche's genealogical method, why does the ascetic ideal appear so differently among various types of people?", "options": [{"text": "It is a single, unified biological drive that manifests differently based on the environment.", "isCorrect": false, "rationale": "Nietzsche explicitly rejects treating the ideal as a single, unified phenomenon, preferring to break it into its constituent uses."}, {"text": "Different types of people adopt the same outward form to serve entirely different psychological or practical needs.", "isCorrect": true, "rationale": "Nietzsche's method involves showing how the same form, like self-denial, is utilized by artists, philosophers, and priests for distinct purposes."}, {"text": "The ideal is an objective moral truth that individuals perceive with varying degrees of clarity.", "isCorrect": false, "rationale": "Nietzsche views the ideal as a tool or a meaning-making device rather than an objective, metaphysical truth."}, {"text": "It is a historical accident that has no deeper meaning beyond its religious origins.", "isCorrect": false, "rationale": "The text states that the ideal's power across civilizations indicates it expresses a fundamental feature of the human will."}], "id": "q01"}, {"question": "Why does Nietzsche view Richard Wagner's opera 'Parsifal' as a betrayal of the artist's earlier work?", "options": [{"text": "It lacked the musical complexity and technical genius of his earlier 'Ring' cycle.", "isCorrect": false, "rationale": "Nietzsche's critique is focused on the philosophical and moral content of the work rather than a lack of musical talent."}, {"text": "It embraced Christian asceticism and the denial of life instead of celebrating tragic heroism.", "isCorrect": true, "rationale": "Nietzsche saw 'Parsifal' as a capitulation to the ascetic ideal and a rejection of the 'healthy sensuality' Wagner once championed."}, {"text": "Wagner attempted to integrate too many scientific themes into a traditional artistic medium.", "isCorrect": false, "rationale": "The conflict with 'Parsifal' centers on its religious and moral regression, not a focus on science."}, {"text": "The work was too focused on nationalistic and anti-Semitic themes for Nietzsche's taste.", "isCorrect": false, "rationale": "While these factors contributed to their break, the text specifically identifies the homage to 'chastity' and Christianity as the core of the 'ascetic' betrayal."}], "id": "q02"}, {"question": "How does Nietzsche define the relationship between a 'complete and perfect artist' and reality?", "options": [{"text": "The artist must live out the experiences of their characters to represent them authentically.", "isCorrect": false, "rationale": "Nietzsche argues that if Homer had been Achilles, he would not have created the character of Achilles."}, {"text": "The artist is someone who has mastered reality and uses it as a direct blueprint for their work.", "isCorrect": false, "rationale": "Nietzsche suggests the artist is actually separated from the 'real' and the actual by their very nature as a creator."}, {"text": "The artist is eternally separated from the actual and only represents what they themselves are not.", "isCorrect": true, "rationale": "Nietzsche claims that the artist is the 'presupposition' of the work, and their own being is often an 'unreality' compared to the work itself."}, {"text": "The artist is a mirror of their time, reflecting the exact social and political reality of their era.", "isCorrect": false, "rationale": "Nietzsche views artists as 'valets' of existing authorities, but emphasizes their separation from the 'real' in an ontological sense."}], "id": "q03"}, {"question": "What is the primary motivation for a philosopher to adopt an ascetic lifestyle, according to Nietzsche?", "options": [{"text": "To punish the body as a way to atone for intellectual sins and errors.", "isCorrect": false, "rationale": "This describes the priest's or saint's motivation, which the text explicitly distinguishes from the philosopher's."}, {"text": "To gain favor with religious institutions that provide the necessary funding for research.", "isCorrect": false, "rationale": "The text argues the philosopher's asceticism is an 'instinct' for the conditions of intellectualism, not a move for institutional favor."}, {"text": "To achieve a state of moral perfection and holiness that is recognized by the public.", "isCorrect": false, "rationale": "Nietzsche claims the philosopher 'shuns' fame and is not interested in 'virtue' in the traditional sense."}, {"text": "To secure the optimal conditions of freedom from distraction and noise required for intense thought.", "isCorrect": true, "rationale": "For the philosopher, poverty, chastity, and humility are 'working conditions' that allow the 'dominant instinct' of the intellect to flourish."}], "id": "q04"}, {"question": "What does the term 'horror vacui' signify in the context of the ascetic ideal?", "options": [{"text": "The physical fear of heights and open spaces experienced by ancient ascetics.", "isCorrect": false, "rationale": "This is a literal interpretation of 'fear of the void' that ignores the psychological and philosophical context of the text."}, {"text": "The human dread of emptiness or the lack of an answer to the purpose of suffering.", "isCorrect": true, "rationale": "Nietzsche uses this term to explain why man would rather 'will nothingness' than be without a goal or purpose."}, {"text": "The priest's fear that the masses will eventually discover that God does not exist.", "isCorrect": false, "rationale": "While related to nihilism, 'horror vacui' refers more specifically to the general human need for a meaningful goal, regardless of its truth."}, {"text": "The scientist's drive to fill all gaps in knowledge with empirical evidence.", "isCorrect": false, "rationale": "While science seeks truth, Nietzsche applies 'horror vacui' to the fundamental human will's need for a justification of existence."}], "id": "q05"}, {"question": "In Nietzsche’s analysis, what is the 'supreme utility' of the ascetic priest?", "options": [{"text": "He heals the physiological diseases that cause the herd to suffer.", "isCorrect": false, "rationale": "Nietzsche notes that the priest often 'poisons the wound' and deals with the symptoms (meaning) rather than the physiological causes."}, {"text": "He organizes the herd into a political force capable of overthrowing the 'healthy' masters.", "isCorrect": false, "rationale": "The priest's role is to manage the internal state of the herd and redirect their resentment, not necessarily to lead a political revolution."}, {"text": "He prevents the explosive accumulation of resentment by redirecting it back upon the sufferer.", "isCorrect": true, "rationale": "By telling the sufferer 'you are to blame for your suffering,' the priest diverts the resentment that would otherwise destroy the herd or the priest."}, {"text": "He provides the herd with the scientific knowledge necessary to improve their standard of living.", "isCorrect": false, "rationale": "Nietzsche views the priest as a 'wizard and wild beast tamer' of the soul, not a provider of material or scientific progress."}], "id": "q06"}, {"question": "Why does Nietzsche claim that 'unqualified honest atheism' is actually a final phase of the ascetic ideal?", "options": [{"text": "Because it still relies on a 'will to truth' that values truth above life itself.", "isCorrect": true, "rationale": "Nietzsche argues that the scientific 'conscience' is a sublimation of the Christian 'confessor-subtlety,' still pursuing truth as an unconditional value."}, {"text": "Because most atheists secretly believe in a moral order that is divinely ordained.", "isCorrect": false, "rationale": "Nietzsche acknowledges that 'honest' atheism rejects the belief in God, but claims it retains the metaphysical faith in truth."}, {"text": "Because atheism inevitably leads back to the same religious rituals found in Christianity.", "isCorrect": false, "rationale": "The argument is about the underlying 'motivation' and 'will,' not the external rituals of religion."}, {"text": "Because scientists are often forced to live as simply and frugally as monks.", "isCorrect": false, "rationale": "While some scientists live simply, Nietzsche's point is about the 'metaphysical faith' in truth, not their literal lifestyle."}], "id": "q07"}, {"question": "How did Schopenhauer's view on 'the beautiful' influence the later Richard Wagner?", "options": [{"text": "It taught Wagner that music should be used as a tool to promote political revolution.", "isCorrect": false, "rationale": "This reflects the earlier Wagner, whereas Schopenhauer's influence led him toward a more metaphysical and ascetic view of music."}, {"text": "It convinced Wagner that music is an independent 'art-in-itself' and the direct language of the will.", "isCorrect": true, "rationale": "Following Schopenhauer, Wagner changed his view of music from a 'medium' for drama to a sovereign expression of the 'abyss' or 'intrinsic essence.'"}, {"text": "It encouraged Wagner to reject all forms of self-denial and embrace pure hedonism in his art.", "isCorrect": false, "rationale": "Schopenhauer’s philosophy is the essence of 'no-saying' to life and the denial of the will, which is the opposite of hedonism."}, {"text": "It provided a scientific basis for the emotional impact of melody on the human nervous system.", "isCorrect": false, "rationale": "Schopenhauer's theory was metaphysical and aesthetic rather than empirical or neurological."}], "id": "q08"}, {"question": "What is the 'devastating conclusion' regarding the dominance of the ascetic ideal in human history?", "options": [{"text": "The ideal is biologically hardwired into the human brain and cannot be overcome.", "isCorrect": false, "rationale": "Nietzsche views it as a psychological and historical solution to a problem, suggesting that other ideals (like the eternal recurrence) are possible."}, {"text": "It has succeeded because it is the only meaning offered that prevents suicidal nihilism.", "isCorrect": true, "rationale": "The text states that 'any meaning is better than no meaning' and the ideal saved the human will by giving it a direction, even if that direction was 'nothingness.'"}, {"text": "The ideal will eventually be replaced by science, which offers a more truthful path to happiness.", "isCorrect": false, "rationale": "Nietzsche argues science is the 'latest and most refined form' of the ideal, not its replacement or an alternative to its ascetic nature."}, {"text": "It has dominated because it is the most efficient way to maintain social order and peace.", "isCorrect": false, "rationale": "While the priest uses it for order, Nietzsche's deeper point is about the 'will's' need for meaning to justify existence."}], "id": "q09"}, {"question": "Nietzsche describes the 'will to nothingness' ($Wille$ $zum$ $Nichts$) as a repudiation of life that is still a 'will.' What does this mean?", "options": [{"text": "It means humans eventually lose the capacity to want anything at all.", "isCorrect": false, "rationale": "The text emphasizes that even if the goal is 'nothing,' it is still an act of 'willing,' which saves the human will from extinction."}, {"text": "It means the ascetic ideal successfully destroys the ego and all personal desire.", "isCorrect": false, "rationale": "Nietzsche sees the ideal as a transformation of the will's direction, not its total destruction."}, {"text": "It means that even when humans hate life and desire non-existence, they are still exercising their fundamental drive to have a purpose.", "isCorrect": true, "rationale": "This captures Nietzsche's point that the 'will' must have a target, even if that target is the denial of the material and sensual world."}, {"text": "It means that the desire for 'nothingness' is the only way to reach a state of true scientific objectivity.", "isCorrect": false, "rationale": "While related to science's asceticism, the 'will to nothingness' is a broader diagnosis of the entire ascetic ideal's trajectory."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
