        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Nietzsche.html">&larr; Back to The Dangerous Perhaps (Nietzsche)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the source material, which of the following best describes the Nietzschean concept of the $Ubermensch$?", "options": [{"text": "A biological and racial category describing the superiority of the Aryan people.", "isCorrect": false, "rationale": "This interpretation was a later distortion used for political propaganda and is explicitly rejected by the text as a misconception."}, {"text": "A metaphor for an individual who creates their own values and achieves self-overcoming.", "isCorrect": true, "rationale": "The text identifies the $Ubermensch$ as a horizon of human greatness involving the creation of new values beyond conventional morality."}, {"text": "A blueprint for a political program designed to restructure European governance.", "isCorrect": false, "rationale": "The text clarifies that the concept is not a political program or a description of any existing human being."}, {"text": "A physical ideal emphasizing strength and the domination of the weak.", "isCorrect": false, "rationale": "The source explains that the 'superman' imagery of a muscular figure trampling others is a result of bad popularization and misunderstanding."}], "id": "q01"}, {"question": "What is the primary reason the book 'The Will to Power' is treated with skepticism by modern Nietzsche scholars?", "options": [{"text": "It was written during Nietzsche's period of mental collapse and is largely incoherent.", "isCorrect": false, "rationale": "While Nietzsche did suffer a collapse, the issue with this specific book is its editorial history rather than his mental state at the time of writing the notes."}, {"text": "The original manuscripts were destroyed by the Nazi regime, leaving only second-hand accounts.", "isCorrect": false, "rationale": "The manuscripts exist; the problem lies in how they were selectively edited and rearranged by a third party."}, {"text": "It is a posthumous compilation edited by his sister to reflect her own ideological biases.", "isCorrect": true, "rationale": "Elisabeth F\"orster-Nietzsche selected and rearranged notebook entries to fit her own agenda, which did not reflect Nietzsche's actual plans."}, {"text": "Nietzsche explicitly recanted the ideas contained within the book shortly before his death.", "isCorrect": false, "rationale": "Nietzsche did not recant the work; rather, he never organized these specific notes into the book that was eventually published under that title."}], "id": "q02"}, {"question": "How did Nietzsche's private correspondence characterize his view on anti-Semitism?", "options": [{"text": "He expressed a sense of melancholy and ire regarding his sister's association with anti-Semitic leaders.", "isCorrect": true, "rationale": "In an 1887 letter, he told his sister that her association with an anti-Semitic chief was foreign to his whole way of life."}, {"text": "He remained largely indifferent, viewing it as a minor political distraction from his philosophy.", "isCorrect": false, "rationale": "The text describes him as an emphatic, consistent, and furious opponent of anti-Semitism."}, {"text": "He supported anti-Semitic journals but only for the purpose of advertising his books to a wider audience.", "isCorrect": false, "rationale": "Nietzsche specifically asked his publisher to ensure his books were not advertised in anti-Semitic journals."}, {"text": "He viewed it as a necessary phase in the development of German nationalism.", "isCorrect": false, "rationale": "Nietzsche loathed nationalism and mocked the idea of racial purity, making this view inconsistent with his stated beliefs."}], "id": "q03"}, {"question": "Which scholar is credited with systematically dismantling the Nazi interpretation of Nietzsche in the post-war era?", "options": [{"text": "Giorgio Colli", "isCorrect": false, "rationale": "While Colli produced the critical edition of Nietzsche's works, he is not the specific scholar credited in the text with dismantling the Nazi reading in 1950."}, {"text": "Walter Kaufmann", "isCorrect": true, "rationale": "Kaufmann published a landmark study in 1950 that dismantled the Nazi reading and provided the standard English translations."}, {"text": "Mazzino Montinari", "isCorrect": false, "rationale": "Montinari worked with Colli on the definitive critical edition but is not the primary figure associated with the 1950 framework of understanding."}, {"text": "Bernhard F\"orster", "isCorrect": false, "rationale": "F\"orster was Nietzsche's anti-Semitic brother-in-law, whose actions Nietzsche actually despised."}], "id": "q04"}, {"question": "In the context of 'Beyond Good and Evil', how does the text suggest Nietzsche's views on women should be interpreted?", "options": [{"text": "As purely ironic provocations intended to test the reader's commitment to honesty.", "isCorrect": false, "rationale": "The text states that these passages cannot be explained away as merely ironic or provocative, as they express genuine prejudice."}, {"text": "As a reflection of a complicated relationship with figures like Lou Salom$e$ and possible personal bitterness.", "isCorrect": true, "rationale": "The author suggests that his intellectual equality with Salom$e$ and her subsequent rejection may have colored his offensive remarks."}, {"text": "As a central pillar of his philosophical rejection of conventional morality.", "isCorrect": false, "rationale": "The text suggests that while these views exist, they should not dominate the reading of his work which addresses much larger questions."}, {"text": "As an endorsement of the domestic role of women in the 19th-century German state.", "isCorrect": false, "rationale": "Nietzsche loathed the German state and mass politics, making it unlikely he was endorsing state-sanctioned social roles."}], "id": "q05"}, {"question": "What is the relationship between Nietzsche and nihilism according to the source?", "options": [{"text": "Nietzsche is the primary advocate for nihilism, teaching that nothing matters.", "isCorrect": false, "rationale": "The text explicitly states that this is the most damaging misconception and inverts Nietzsche's actual project."}, {"text": "Nietzsche uses nihilism as a tool to destroy the German state and its institutions.", "isCorrect": false, "rationale": "While he disliked the state, his treatment of nihilism was a diagnosis of a cultural crisis, not a political tool."}, {"text": "Nietzsche diagnoses nihilism as a modern crisis and seeks to create a way to overcome it.", "isCorrect": true, "rationale": "His philosophy, including concepts like the $Ubermensch$ and $amor fati$, is a response to the collapse of traditional values."}, {"text": "Nietzsche believes nihilism is an unavoidable and final state of human civilization.", "isCorrect": false, "rationale": "Nietzsche's work asks 'What comes after?' implying that nihilism is a problem to be solved rather than a finality."}], "id": "q06"}, {"question": "The phrase 'God is dead' is described in the text not as a triumphant slogan, but as a:", "options": [{"text": "Scientific observation.", "isCorrect": false, "rationale": "The text places this announcement in the context of a cultural and metaphysical crisis rather than a scientific discovery."}, {"text": "Catastrophic announcement.", "isCorrect": true, "rationale": "It marks the collapse of the foundations of Western civilization, which Nietzsche views as a great crisis."}, {"text": "Nihilistic manifesto.", "isCorrect": false, "rationale": "Nietzsche was not a nihilist; he was describing the conditions that lead to nihilism to find a way beyond them."}, {"text": "Political critique of the Church.", "isCorrect": false, "rationale": "The statement refers to the broader collapse of metaphysical and religious foundations rather than a specific political entity."}], "id": "q07"}, {"question": "Which of the following was a reason Nietzsche broke his friendship with Richard Wagner?", "options": [{"text": "Wagner's refusal to accept the concept of the $Ubermensch$.", "isCorrect": false, "rationale": "The text does not link the break with Wagner to disagreements over this specific concept."}, {"text": "Wagner's increasingly vicious anti-Semitism.", "isCorrect": true, "rationale": "The text explicitly mentions Nietzsche's break with Wagner was in part due to Wagner's anti-Semitic views."}, {"text": "Wagner's support for the $Ubermensch$ as a racial category.", "isCorrect": false, "rationale": "The distortion of the $Ubermensch$ into a racial category happened largely after Nietzsche's death."}, {"text": "A dispute over the ownership of the Nietzsche Archive.", "isCorrect": false, "rationale": "The Archive was controlled by Nietzsche's sister, and the break with Wagner happened while Nietzsche was still active."}], "id": "q08"}, {"question": "What contribution did Giorgio Colli and Mazzino Montinari make to Nietzsche studies?", "options": [{"text": "They were the first to translate 'Thus Spoke Zarathustra' into English.", "isCorrect": false, "rationale": "Walter Kaufmann is noted as the producer of the standard English translations."}, {"text": "They established the Nietzsche Archive in Sils Maria.", "isCorrect": false, "rationale": "The Archive was established by Elisabeth F\"orster-Nietzsche."}, {"text": "They produced a definitive critical edition that proved 'The Will to Power' was fabricated.", "isCorrect": true, "rationale": "Their work published the notebooks chronologically, demolishing the authority of Elisabeth's arranged version."}, {"text": "They provided the psychological evidence that Nietzsche's misogyny was purely personal.", "isCorrect": false, "rationale": "While the text mentions psychological factors, Colli and Montinari's primary achievement was the critical editorial work on his texts."}], "id": "q09"}, {"question": "Nietzsche's disdain for the attempt to found a racially pure colony in Paraguay involved which figure?", "options": [{"text": "Lou Salom$e$", "isCorrect": false, "rationale": "Salom$e$ was an intellectual peer and collaborator, not the founder of a racial colony."}, {"text": "Bernhard F\"orster", "isCorrect": true, "rationale": "Nietzsche viewed F\"orster's attempt to found an Aryan colony as a catastrophic embarrassment."}, {"text": "Walter Kaufmann", "isCorrect": false, "rationale": "Kaufmann was a 20th-century philosopher and translator, not a 19th-century colonist."}, {"text": "Adolf Hitler", "isCorrect": false, "rationale": "Hitler came to power decades after Nietzsche's death; Nietzsche loathed the types of mass politics Hitler eventually led."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
