    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introductory section, what is the primary benefit of reading the New Testament Gospels, Acts, early bishop's letters, and a Roman governor's letter together?", "options": [{"text": "To solely focus on Jesus's life and teachings from multiple perspectives.", "isCorrect": false, "rationale": "While the Gospels do focus on Jesus's life, the text states reading all sources together provides a broader 'three-dimensional picture' of early Christianity, not solely Jesus's life."}, {"text": "To understand the political landscape of the Roman Empire during early Christianity.", "isCorrect": false, "rationale": "Understanding the political landscape is an indirect benefit, but the text's primary stated benefit is to see how early Christianity 'saw itself, what it demanded of its followers, and how it appeared to those outside,' which is a more comprehensive view."}, {"text": "To gain a comprehensive, three-dimensional view of early Christianity.", "isCorrect": true, "rationale": "The text explicitly states these sources 'give a three-dimensional picture of early Christianity: how it saw itself, what it demanded of its followers, and how it appeared to those outside.'"}, {"text": "To primarily contrast early Christian beliefs with pagan Roman practices.", "isCorrect": false, "rationale": "Contrasting with pagan practices is one aspect of 'how it appeared to those outside,' but it's only one dimension, not the full three-dimensional picture described."}], "id": "q01"}, {"question": "The Sermon on the Mount's Beatitudes are described as 'reversing nearly every value that the Roman world held dear.' Which of the following best exemplifies this radical inversion?", "options": [{"text": "Honoring military conquest instead of peaceful negotiation.", "isCorrect": false, "rationale": "Honoring military conquest aligns with Roman values of glory and power, so it would not be an inversion of those values."}, {"text": "Declaring the poor in spirit and those who mourn as 'blessed' rather than valuing wealth and power.", "isCorrect": true, "rationale": "The text explicitly states that 'Rome honored military glory, wealth, power, and status,' while 'The Beatitudes called blessed those who mourned, the poor in spirit, the meek, and the persecuted,' directly reversing these values."}, {"text": "Emphasizing individual liberty over communal responsibility.", "isCorrect": false, "rationale": "While an important ethical distinction, the text does not highlight this specific contrast as a primary inversion by the Beatitudes against Roman values."}, {"text": "Promoting strict adherence to legal codes instead of moral principles.", "isCorrect": false, "rationale": "The Beatitudes are a body of ethical teaching, but the core inversion discussed is about who is considered 'blessed' in contrast to Roman societal honors."}], "id": "q02"}, {"question": "A Stoic philosopher from Unit 2, encountering John's Prologue for the first time, would most likely identify what as the *most dramatic shift* from their own understanding of the Logos?", "options": [{"text": "John's assertion that the Logos was present 'in the beginning' with God.", "isCorrect": false, "rationale": "Stoics believed the Logos was an eternal rational principle woven through all reality, so its eternal nature would not be the most dramatic shift."}, {"text": "The claim that the Logos was the agent through whom all things were made.", "isCorrect": false, "rationale": "Stoics understood the Logos as the rational principle that orders the universe, which implies its role in creation or cosmic structure, so this might not be the most surprising aspect."}, {"text": "The declaration that the impersonal, rational principle of the universe became a tangible human being.", "isCorrect": true, "rationale": "The teacher note explicitly states, 'The Stoics believed the Logos was an impersonal divine principle; John claims it is a Person.' This transformation from an abstract principle to a human being is highlighted as the 'radical departure' from Greek philosophy."}, {"text": "The idea that the Logos brings 'life' and 'light' to humanity.", "isCorrect": false, "rationale": "While specific to John, the Stoic Logos, as an ordering principle, could be seen metaphorically as a source of order and 'light,' so this would not be the most fundamental disagreement."}], "id": "q03"}, {"question": "Paul's missionary approach on Mars' Hill in Athens (Acts 17) is best characterized by which of the following?", "options": [{"text": "Directly quoting Hebrew Scriptures to demonstrate prophetic fulfillment.", "isCorrect": false, "rationale": "The text explicitly states that Paul, 'Rather than quoting the Hebrew Scriptures (which his audience did not know),' began elsewhere."}, {"text": "Condemning Athenian idolatry and philosophical errors without seeking common ground.", "isCorrect": false, "rationale": "Paul actually sought common ground by referencing their 'altar to 'the Unknown God'' and 'their own poets,' which is the opposite of condemning without seeking connection."}, {"text": "Employing contextualization by referencing Athenian religious practices and Greek poets to introduce the Gospel.", "isCorrect": true, "rationale": "The text describes Paul's method as 'contextualization—finding the best point of connection between an unfamiliar message and the audience's existing knowledge,' specifically mentioning the 'Unknown God' altar and quoting Stoic poets."}, {"text": "Focusing exclusively on personal testimony of his conversion experience.", "isCorrect": false, "rationale": "Paul used personal testimony effectively before King Agrippa (Acts 26), but his approach in Athens (Acts 17) focused on natural theology and Greek philosophy, not primarily his autobiography."}], "id": "q04"}, {"question": "Consider the 'teacher note' for the Sermon on the Mount. Which of the following scenarios best illustrates the *genuinely radical* nature of the Beatitudes in the Greco-Roman world, particularly concerning the virtue of meekness?", "options": [{"text": "A Roman general celebrating a military victory for showcasing strength.", "isCorrect": false, "rationale": "This scenario aligns with Roman values of military glory and power, which the Beatitudes inverted, but it doesn't directly illustrate the contrast with 'meekness' as specifically as other options."}, {"text": "An Athenian philosopher praising a 'magnanimous man' who is self-asserting and great-souled.", "isCorrect": true, "rationale": "The teacher note directly connects 'Blessed are the meek' running 'directly against Aristotle's praise of the magnanimous man (great-souled, self-asserting),' highlighting this as a core example of the radical inversion."}, {"text": "A Roman citizen participating in a public religious festival to honor the gods.", "isCorrect": false, "rationale": "This describes a general religious practice and doesn't directly illustrate the inversion of ethical values regarding character traits like meekness versus pride."}, {"text": "A Greek merchant proudly displaying his accumulated wealth and status.", "isCorrect": false, "rationale": "While the Beatitudes challenge the value of wealth, the teacher note specifically singles out the contrast between 'meek' and the 'magnanimous man' as an illustration of radicality."}], "id": "q05"}, {"question": "The text describes the phrase 'the Word was made flesh' (ho Logos sarx egeneto) as compressing 'the entire Incarnation doctrine into four Greek words.' What is the most profound implication of this statement?", "options": [{"text": "It signifies that divine truth can only be understood through ancient Greek.", "isCorrect": false, "rationale": "The significance lies in the theological meaning conveyed by the words, not the necessity of knowing the original language for comprehension."}, {"text": "It suggests that philosophical concepts are superior to historical events.", "isCorrect": false, "rationale": "The text directly counters this by stating, 'This is not an abstraction. It is history,' emphasizing the historical reality of the Incarnation."}, {"text": "It asserts that an eternal, abstract divine principle took on a tangible, human existence at a specific historical moment.", "isCorrect": true, "rationale": "The text explains this phrase means 'the eternal rational principle of the universe—the divine Logos the Greeks had reasoned about for centuries—had become a human being in a specific time and place,' encompassing both divine and human nature in history."}, {"text": "It highlights the early Christians' rejection of all Greek philosophical thought.", "isCorrect": false, "rationale": "The text notes that John deliberately 'draws directly on the Greek philosophical concept of the Logos' and engages 'the Greco-Roman intellectual world on its own terms,' indicating engagement, not total rejection."}], "id": "q06"}, {"question": "In his defense before King Agrippa (Acts 26), Paul primarily uses which of the following approaches to persuade his audience?", "options": [{"text": "Abstract philosophical arguments about the nature of God.", "isCorrect": false, "rationale": "Paul used philosophical arguments in Athens (Acts 17), but before Agrippa, his approach was different, focusing on personal testimony and Jewish Scripture."}, {"text": "Legal precedents and Roman law to prove his innocence.", "isCorrect": false, "rationale": "The text states, 'His defense is not legal argument but autobiography,' directly refuting this option."}, {"text": "Personal autobiography, appealing to Agrippa's knowledge of Jewish Scripture and the public nature of his claims.", "isCorrect": true, "rationale": "The text explicitly describes Paul's defense as 'autobiography: he tells his whole story,' and that he 'appeals directly to Agrippa's knowledge of Jewish Scripture' and 'grounds it in verifiable history ('this thing was not done in a corner').'"}, {"text": "Quoting Greek poets and inscriptions to find common ground.", "isCorrect": false, "rationale": "This was Paul's approach in Athens (Acts 17), not before Agrippa, where he used Hebrew Scripture and personal testimony."}], "id": "q07"}, {"question": "When considering the different responses to Paul's message before Agrippa and Festus, what does Festus's reaction ('Paul, thou art beside thyself; much learning doth make thee mad') primarily represent?", "options": [{"text": "The fully committed believer, ready to follow Christ.", "isCorrect": false, "rationale": "Festus dismisses Paul's claims, which is contrary to the response of a fully committed believer."}, {"text": "The nearly-persuaded individual, intellectually moved but hesitant to commit.", "isCorrect": false, "rationale": "This describes King Agrippa's response ('Almost thou persuadest me to be a Christian'), not Festus's."}, {"text": "The Roman rationalist, dismissing the spiritual claims as madness or irrationality.", "isCorrect": true, "rationale": "The text explicitly states that Festus, 'the Roman, simply dismisses it: 'Paul, thou art beside thyself; much learning doth make thee mad,'' representing 'the Roman rationalist' response."}, {"text": "The Jewish leader, skeptical of claims that contradict the prophets.", "isCorrect": false, "rationale": "Festus was the Roman governor, not a Jewish leader, and his dismissal was based on what he perceived as irrationality, not prophetic contradiction."}], "id": "q08"}, {"question": "Paul's use of 'contextualization' in Acts 17 involved finding the best point of connection between his message and the audience's existing knowledge. Which of the following modern-day scenarios best exemplifies this principle?", "options": [{"text": "A preacher delivering a sermon exclusively in ancient Aramaic to preserve authenticity.", "isCorrect": false, "rationale": "This approach would fail to connect with a modern audience's existing knowledge, directly opposing the principle of contextualization."}, {"text": "A missionary sharing the Gospel by referencing local folklore, proverbs, or cultural stories that resonate with biblical themes.", "isCorrect": true, "rationale": "This scenario directly mirrors Paul's method in Acts 17, where he referenced Athenian practices ('Unknown God') and poets, using existing cultural elements as a 'bridge into the proclamation of Jesus.'"}, {"text": "An evangelist demanding that listeners first abandon all their cultural practices before hearing the message.", "isCorrect": false, "rationale": "This approach creates barriers rather than bridges, going against the core idea of finding common ground and connection in contextualization."}, {"text": "A theologian writing an academic paper using complex philosophical terms unfamiliar to the general public.", "isCorrect": false, "rationale": "While academic writing has its place, it does not represent the missionary strategy of contextualization aimed at introducing a message to an unfamiliar audience by leveraging their existing knowledge."}], "id": "q09"}, {"question": "Ignatius of Antioch's story, as introduced, primarily highlights which aspect of early Christian experience?", "options": [{"text": "The complexities of early Church governance and administrative structures.", "isCorrect": false, "rationale": "While Ignatius was a bishop, the introduction focuses on his arrest and impending execution, not the details of church administration."}, {"text": "The challenges of interfaith dialogue with pagan Roman authorities.", "isCorrect": false, "rationale": "Ignatius was arrested for execution, indicating persecution rather than dialogue or negotiation with Roman authorities."}, {"text": "The early Church's profound willingness to embrace martyrdom for their faith.", "isCorrect": true, "rationale": "The section title itself is 'Ignatius of Antioch: Embracing Martyrdom,' and the content describes him being 'arrested under Emperor Trajan and transported under Roman military guard to Rome for execution in the arena.'"}, {"text": "The intellectual debates between various Christian factions during the patristic period.", "isCorrect": false, "rationale": "The introduction of Ignatius focuses on his personal fate and witness during persecution, not internal theological debates within Christianity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
