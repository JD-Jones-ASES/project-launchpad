var QUESTIONS = [{"question": "What is the term 'Dark Ages,' and how does the text evaluate its accuracy?", "options": [{"text": "The 'Dark Ages' is a term coined by medieval monks to describe the period before Christianity civilized Europe, and it accurately describes total intellectual darkness.", "isCorrect": false, "rationale": "The text says the term was coined by Renaissance scholars, not medieval monks. More importantly, the text argues the period was 'not intellectually dark — monasteries preserved classical learning throughout — but material conditions were significantly worse than in the Roman period.'"}, {"text": "The 'Dark Ages' is both illuminating and misleading: it captures real losses in population, literacy, urban life, and trade after Rome's fall — but the period was not intellectually dark, since monasteries preserved classical learning throughout.", "isCorrect": true, "rationale": "The text states the term 'captures something real: the 5th through 8th centuries saw genuine losses in population, literacy, urban life, and long-distance trade after Rome's fall.' But the period was 'not intellectually dark — monasteries preserved classical learning throughout.'"}, {"text": "The term 'Dark Ages' is entirely accurate because no significant intellectual or cultural activity occurred in Western Europe between AD 476 and AD 1000.", "isCorrect": false, "rationale": "The text explicitly states the period 'was not intellectually dark' and that the literature of this period is 'not dark at all,' pointing to Bede's Ecclesiastical History, Einhard's Life of Charlemagne, and Gregory's Pastoral Care as masterpieces."}, {"text": "The 'Dark Ages' is a neutral descriptive term that all modern historians use without controversy to describe the early medieval period.", "isCorrect": false, "rationale": "The text says the term is 'now largely avoided by historians' because it is 'pejorative,' even while acknowledging that it 'captures something real' about the material conditions of the period."}]}, {"question": "What material evidence does the text cite to demonstrate the genuine losses of the 'Dark Ages' in Western Europe?", "options": [{"text": "The text cites the destruction of all major Roman buildings, the burning of the great library at Alexandria, and the elimination of Latin as a spoken language.", "isCorrect": false, "rationale": "The text cites population decline (Rome from ~1 million to ~50,000 by AD 600), disappearance of long-distance goods from archaeological sites, and road disrepair — not building destruction or library burning."}, {"text": "Rome's population fell from perhaps one million to perhaps 50,000 by AD 600; a 7th-century British site yields only local goods where a Roman-era site would yield pottery from North Africa, wine from Spain, olive oil from Syria; roads fell into disrepair.", "isCorrect": true, "rationale": "The text states exactly this: 'Rome at its height had perhaps one million people. By AD 600, the city had perhaps 50,000 inhabitants. A Roman-era British site might yield pottery from North Africa, wine from Spain, olive oil from Syria; a 7th-century site yields only local goods. Roads fell into disrepair.'"}, {"text": "The text cites the elimination of written language from most of Europe, the disappearance of all cities with more than 1,000 inhabitants, and the return of subsistence agriculture everywhere.", "isCorrect": false, "rationale": "Written language was not eliminated — monasteries maintained literacy. The text does not claim all cities disappeared or that subsistence agriculture replaced every other economic form."}, {"text": "The text cites the complete absence of any surviving manuscripts, artworks, or architectural remains from the fifth through eighth centuries as proof of total cultural collapse.", "isCorrect": false, "rationale": "The text describes numerous surviving literary masterpieces from this period (Bede, Einhard, Gregory) and architectural remains (Carolingian churches), demonstrating the period was not a complete cultural void."}]}, {"question": "Why were Irish monasteries especially important for preserving civilization in the early medieval period?", "options": [{"text": "Ireland was part of the Eastern Roman Empire and therefore had continuous access to the educational infrastructure that collapsed only in the West.", "isCorrect": false, "rationale": "Ireland was never part of the Roman Empire — the text explicitly states: 'Ireland had never been part of the Roman Empire and did not share in Rome's collapse.' This is precisely why Irish monasteries survived and flourished."}, {"text": "Irish monks were the only people in early medieval Europe who could read Latin, making them the sole custodians of all written knowledge.", "isCorrect": false, "rationale": "While Irish monks were crucial, the text does not claim they were the sole literate people in Europe. Benedictine monasteries on the continent and in England also maintained literacy and learning."}, {"text": "Ireland had never been part of the Roman Empire and did not share in Rome's collapse; Irish monasteries became extraordinary centers of learning that preserved Scripture, Church Fathers, Latin grammar, classical authors, and the art of illuminated manuscript.", "isCorrect": true, "rationale": "The text states: 'Ireland had never been part of the Roman Empire and did not share in Rome's collapse. Irish monasteries became extraordinary centers of learning, preserving Scripture, Church Fathers, Latin grammar, classical authors, and the art of illuminated manuscript.'"}, {"text": "Ireland was geographically isolated from the Germanic invasions because it was an island, giving it a natural protection that allowed Roman civilization to survive there intact.", "isCorrect": false, "rationale": "While Ireland's island status was relevant, the text emphasizes specifically that it was never part of the Roman Empire — so it didn't experience Rome's collapse. The point is not just protection from invasion but the absence of Roman institutional collapse."}]}, {"question": "What was the Rule of Saint Benedict, and why was it so influential for medieval Western Christianity?", "options": [{"text": "A military code for the Knights of St. John that regulated their combat training, hospital work, and crusading obligations throughout the medieval period.", "isCorrect": false, "rationale": "The Rule of Saint Benedict was written for monks in monasteries, not for military knights. It regulated prayer, manual labor, and sacred reading in a contemplative community."}, {"text": "A practical guide for monastic life written by Benedict of Nursia (c. AD 480–547), organizing the monk's day around the Divine Office (communal prayer), manual labor, and sacred reading, with the motto ora et labora ('pray and work'). It defined Western monasticism for a millennium.", "isCorrect": true, "rationale": "The text defines the Rule of Saint Benedict exactly this way: 'A practical guide for monastic life written by Benedict of Nursia (c. AD 480–547), organizing the monk's day around the Divine Office (seven periods of communal prayer), manual labor, and sacred reading (lectio divina). Its motto ora et labora (pray and work) defined Western monasticism for a millennium.'"}, {"text": "A theological treatise defining the relationship between the Church and secular rulers, establishing the principles of Church supremacy that would later be defended by Pope Gregory VII.", "isCorrect": false, "rationale": "The Rule of Saint Benedict was a practical guide for daily monastic life, not a theological treatise on Church-state relations."}, {"text": "Benedict's Rule required monks to maintain strict silence at all times, dedicating their lives entirely to prayer and prohibiting all manual labor as a distraction from contemplation.", "isCorrect": false, "rationale": "The Rule specifically included manual labor (ora et labora — 'pray and work') as a necessary part of monastic life. Complete silence at all times was not its requirement."}]}, {"question": "The text describes the monastery as a 'civilization's ark.' What five functions did monasteries serve?", "options": [{"text": "Military fortress, grain storehouse, tax collection center, judicial court, and diplomatic embassy for local rulers.", "isCorrect": false, "rationale": "The text identifies five functions but none of them are military, tax, or diplomatic. Monasteries were cultural and social institutions, not instruments of political power."}, {"text": "Library and scriptorium (copying manuscripts), self-sufficient farm (surviving trade collapse), school (primary education), hospital (medical care), and inn (hospitality to travelers).", "isCorrect": true, "rationale": "The text lists exactly these five functions: 'A library and scriptorium... A farm: largely self-sufficient, able to survive trade collapse... A school: the only formal education in much of Western Europe... A hospital: providing medical care to surrounding communities... An inn: the Rule required hospitality to travelers.'"}, {"text": "Cathedral builder, wine producer, tax exempt landlord, priest training seminary, and center for canonization of new saints.", "isCorrect": false, "rationale": "While monasteries did produce wine and train clergy, these are not the five functions the text identifies. The text focuses on the monastery's role as a center for manuscript preservation, education, healthcare, hospitality, and self-sufficient farming."}, {"text": "Theological university, heresy tribunal, papal embassy, publisher of Bibles, and administrator of church property.", "isCorrect": false, "rationale": "The text's five functions for monasteries focus on their practical civilizational role (library, farm, school, hospital, inn), not on ecclesiastical administration or heresy prosecution."}]}, {"question": "Who was the Venerable Bede, and what was his most significant contribution?", "options": [{"text": "An Irish missionary monk who founded monasteries across Scotland, England, and the continent, spreading literacy and classical learning from Ireland to the Frankish kingdom.", "isCorrect": false, "rationale": "This describes Columba and Columbanus, not Bede. Bede (c. AD 673–735) was an English monk who spent virtually his entire life in the monastery of Wearmouth-Jarrow in Northumbria."}, {"text": "A Byzantine scholar who translated Greek texts into Latin for Charlemagne's court at Aachen, helping launch the Carolingian Renaissance.", "isCorrect": false, "rationale": "Bede was an English monk, not a Byzantine scholar, and predates Charlemagne's court by a generation. He worked at the monastery of Wearmouth-Jarrow."}, {"text": "An English monk at Wearmouth-Jarrow whose Ecclesiastical History of the English People (AD 731) is the primary source for early English Christianity, introduced the AD/BC dating system, and exemplified rigorous historical method comparable to Thucydides.", "isCorrect": true, "rationale": "The text describes Bede as working 'in the English monastery of Jarrow' and producing 'historical, theological, and scientific work of remarkable quality.' His Ecclesiastical History (AD 731) 'is the primary source for early English Christianity and introduced the AD/BC dating system still used today.'"}, {"text": "An Anglo-Saxon king who personally translated major theological works into Old English and established schools in every church and monastery in his kingdom.", "isCorrect": false, "rationale": "This describes King Alfred the Great (who translated works including Boethius' Consolation and Gregory's Pastoral Care). Bede was a monk and scholar, not a king."}]}, {"question": "How does the text compare Bede's historical method to Thucydides', and what is the crucial difference between them?", "options": [{"text": "Both historians were purely secular; the crucial difference is that Bede had access to eyewitness accounts while Thucydides only had documents.", "isCorrect": false, "rationale": "The text does not describe either historian as 'purely secular.' Bede was explicitly a Christian historian writing with a providential view of history. Both used eyewitness accounts."}, {"text": "Both identified their sources and acknowledged uncertainty, but the crucial difference is their view of what drives history: Thucydides saw human nature (power, fear, self-interest); Bede saw providence (God guiding events toward his purposes).", "isCorrect": true, "rationale": "The text states: 'Both took their craft seriously in similar ways... Both acknowledged the limits of their knowledge... The crucial difference is their understanding of what drives history. For Thucydides, history is driven by human nature: the desire for power, fear of rivals... For Bede, history is providential: God is guiding human events toward his purposes.'"}, {"text": "Bede was more rigorous than Thucydides because he had access to written documents, while Thucydides relied only on oral tradition and personal memory.", "isCorrect": false, "rationale": "The text does not argue Bede was more rigorous than Thucydides. Both are praised for similar methodological qualities. Thucydides also used written documents and cross-checked eyewitness accounts."}, {"text": "The crucial difference is that Bede was writing history to entertain a monastic audience, while Thucydides was writing to provide practical lessons for Athenian statesmen.", "isCorrect": false, "rationale": "The text identifies their different views of what drives history — human nature vs. providence — as the crucial difference, not their intended audiences or entertainment purposes."}]}, {"question": "What does Bede's 'sparrow in the mead-hall' passage express, and what context did it appear in?", "options": [{"text": "It appeared in Bede's description of a monk who had received the gift of poetry, and it expresses the Christian understanding that earthly beauty is a foretaste of heavenly glory.", "isCorrect": false, "rationale": "The Caedmon story is a different passage in Bede. The sparrow passage comes from a council of King Edwin of Northumbria debating whether to adopt Christianity."}, {"text": "Spoken by a counsellor of King Edwin of Northumbria during a council debating adoption of Christianity (c. AD 627), it expresses the universal human longing for permanence and meaning — the fleeting nature of life between two unknowns — framing the Gospel as an answer to that longing.", "isCorrect": true, "rationale": "The text states the sparrow passage is 'set during a council of King Edwin of Northumbria (c. AD 627), debating whether to adopt Christianity. One of Edwin's pagan counsellors offers this reflection before the council votes.' It 'expresses the universal human longing for meaning and permanence, and frames the Gospel as an answer to that longing.'"}, {"text": "It is a nature poem written by Bede himself as a meditation on God's presence in the created world, using the sparrow as a metaphor for the soul's fleeting earthly existence.", "isCorrect": false, "rationale": "The sparrow passage is not a nature poem by Bede. It is a speech by a pagan counsellor at King Edwin's court, preserved in Bede's Ecclesiastical History as an example of the spiritual longing that made the English receptive to Christianity."}, {"text": "It was a speech delivered by the first Christian bishop of Northumbria to convert King Edwin, comparing Edwin's pagan life to a sparrow and promising eternal life through baptism.", "isCorrect": false, "rationale": "The speech was delivered by a pagan counsellor, not a Christian bishop. Its purpose was to articulate the human longing for answers about what lies before and after this life — making the council receptive to the missionary message."}]}, {"question": "Who was Gregory the Great, and why does the text call him 'the last Roman and the first medieval pope'?", "options": [{"text": "Gregory was the first pope to claim supreme authority over all Western bishops, establishing the legal basis for papal supremacy that was developed by later medieval popes.", "isCorrect": false, "rationale": "The text does not describe Gregory's significance in terms of doctrinal claims to supremacy. It emphasizes his practical administrative role and his ability to function both within the classical Roman tradition and as the founder of medieval Church governance."}, {"text": "Gregory (c. AD 540–604) was the first monk to become pope, organized the Church's charitable activities during crises, sent missionaries to England, wrote the standard handbook for bishops, and essentially became the civil as well as spiritual governor of Rome — bridging the Roman world and the medieval Church.", "isCorrect": true, "rationale": "The text describes Gregory as 'the first monk to become pope (elected AD 590)' who 'organized the Church's charitable activities in Rome during plague, flood, and Lombard invasion' and 'essentially became the civil as well as spiritual governor of Rome and much of Italy.' He is 'sometimes called the last Roman and the first medieval pope because his life bridged the two worlds.'"}, {"text": "Gregory earned the title 'the last Roman' because he personally led the last Roman army that defended the city against the Lombards before the city fell to Germanic rule.", "isCorrect": false, "rationale": "The text does not describe Gregory leading an army. His role was administrative and spiritual — he negotiated with Lombard invaders rather than fighting them militarily."}, {"text": "Gregory was the first pope to write in Latin rather than Greek, making him the last figure to bridge the classical Greek world and the emerging Latin Church.", "isCorrect": false, "rationale": "The text does not connect Gregory's significance to a language shift. His significance is that he bridged the Roman imperial world (which he knew as a wealthy Roman aristocrat) and the medieval Church (whose institutional development he shaped)."}]}, {"question": "What was the Battle of Tours (AD 732), and how does the text evaluate its historical significance?", "options": [{"text": "The text describes the Battle of Tours as unambiguously 'the battle that saved Western civilization' from Islamic conquest and the decisive turning point in European history.", "isCorrect": false, "rationale": "The text explicitly cautions against this interpretation: 'The Battle of Tours is sometimes presented as the moment that saved Western civilization. This is an exaggeration.' It was a real turning point but not the civilization-saving climax of legend."}, {"text": "At Tours, Charles Martel's Frankish forces defeated an Umayyad army advancing from Spain — a genuinely significant battle that established Charles Martel as the most powerful ruler in the West and prevented further northward Islamic expansion, though it did not threaten the destruction of Frankish Christianity.", "isCorrect": true, "rationale": "The text defines the Battle of Tours as where 'Charles Martel's Frankish forces defeated an Umayyad army advancing from Muslim-controlled Spain' and describes it as 'genuinely significant: it established Charles Martel as the most powerful ruler in the West and created the political foundation from which his grandson Charlemagne would build his empire' — while warning against exaggerating it as 'the battle that saved Western civilization.'"}, {"text": "Tours was a minor skirmish that was exaggerated by Carolingian propaganda into a decisive battle; in reality, the Muslim forces at Tours posed no serious threat to Frankish Christianity.", "isCorrect": false, "rationale": "The text acknowledges Tours was a 'real turning point' and 'genuinely significant,' not a minor skirmish inflated by propaganda. It cautions against exaggeration while affirming genuine significance."}, {"text": "After Tours, Charles Martel immediately converted all Frankish territories from Arian Christianity to Nicene orthodoxy, completing the religious unification of Western Europe.", "isCorrect": false, "rationale": "The text does not connect the Battle of Tours to any conversion from Arianism. The Franks had converted to Nicene Christianity under Clovis (c. AD 496) — over two centuries before Tours."}]}, {"question": "What was the Carolingian Renaissance, and what were its main features?", "options": [{"text": "A period of artistic and intellectual revival in 15th-century France that recovered classical manuscripts and developed the humanist educational curriculum.", "isCorrect": false, "rationale": "The text's Carolingian Renaissance refers to a cultural revival under Charlemagne (8th–9th century), not the 15th-century artistic renaissance. The 15th century Renaissance is an entirely different historical event."}, {"text": "The cultural and intellectual revival under Charlemagne centered on his court at Aachen, featuring systematic manuscript copying, educational reform, the Carolingian minuscule script (ancestor of modern lowercase letters), and recovery of classical Latin texts.", "isCorrect": true, "rationale": "The text defines the Carolingian Renaissance as 'the cultural and intellectual revival under Charlemagne, centered on his court at Aachen. It featured systematic manuscript copying, reform of education, development of the Carolingian minuscule script (ancestor of modern lowercase letters), and recovery of classical Latin texts.'"}, {"text": "Charlemagne's military conquests created the conditions for an explosion of original philosophical and theological writing that made the 9th century France the intellectual center of the world.", "isCorrect": false, "rationale": "The text does not describe the Carolingian Renaissance primarily as an explosion of original philosophical writing. Its significance was the recovery and copying of existing texts, educational reform, and the development of the minuscule script."}, {"text": "The Carolingian Renaissance produced the first universities in Western Europe, with professors from the Islamic world bringing classical Greek texts that had been lost in Western Europe.", "isCorrect": false, "rationale": "The first medieval universities emerged in the 11th–12th centuries, not during the Carolingian Renaissance. The text describes scholars like Alcuin of York coming from England and Paul the Deacon from Italy, not from the Islamic world."}]}, {"question": "What was the significance of Charlemagne's coronation on Christmas Day, AD 800?", "options": [{"text": "It was a purely ceremonial event with no lasting political significance, since Charlemagne's empire fragmented within a generation of his death.", "isCorrect": false, "rationale": "The text explicitly states the coronation 'set a precedent for the complex relationship between pope and emperor that would define medieval politics for five centuries' and that 'the idea of the Carolingian Empire survived... until Napoleon abolished it in 1806.'"}, {"text": "Pope Leo III crowned Charlemagne 'Emperor of the Romans,' reasserting the idea of a Christian Roman Empire in the West and setting a precedent for the relationship between pope and emperor that defined medieval politics for five centuries.", "isCorrect": true, "rationale": "The text states: 'On Christmas Day, AD 800, Pope Leo III crowned Charlemagne Emperor of the Romans during Mass in St. Peter's Basilica in Rome. The coronation reasserted the idea of a Christian Roman Empire in the West and set a precedent for the complex relationship between pope and emperor that would define medieval politics for five centuries.'"}, {"text": "Charlemagne was crowned because he had converted all Germanic peoples to Christianity and unified them under papal authority for the first time in history.", "isCorrect": false, "rationale": "The text does not describe the coronation as recognition of universal conversion or papal unification. Charlemagne's Saxon campaigns were still ongoing at various points, and converting all Germanic peoples to Christianity was not the specific basis for the coronation."}, {"text": "The coronation was Charlemagne's personal initiative, which he sought and planned as a way to legitimate his territorial conquests against legal challenges from the Byzantine Empire.", "isCorrect": false, "rationale": "The text does not describe the coronation as Charlemagne's initiative. In fact, there is historical tradition suggesting Charlemagne was surprised by it — though the text does not detail this. The text frames it as Leo III's initiative, serving both the pope's need for a protector and the symbolic reassertion of Christian empire."}]}, {"question": "How does the text describe Einhard's Life of Charlemagne as a historical document?", "options": [{"text": "Einhard's Life is unreliable because it was written by a court official who had personal incentive to flatter the emperor and suppress unflattering facts.", "isCorrect": false, "rationale": "The text describes Einhard as admiring Charlemagne but notes that 'he also notes his failure to learn to write despite great effort, which is not a detail a pure flatterer would include.' Einhard's work is presented as a credible biographical portrait."}, {"text": "A vivid biographical portrait written by a scholar at Charlemagne's court after the emperor's death, modeled on Suetonius' Lives of the Twelve Caesars, giving us physical description, personality, habits, and personal qualities — including unflattering details like his failure to learn to write.", "isCorrect": true, "rationale": "The text describes Einhard as 'a scholar at Charlemagne's court' who wrote after the emperor's death, 'drawing on Einhard's personal observation. He modeled it on Suetonius' Lives of the Twelve Caesars.' It includes unflattering details like Charlemagne's failure to learn to write — 'not a detail a pure flatterer would include.'"}, {"text": "Einhard's Life is the only surviving account of Charlemagne and therefore must be read as definitive historical fact despite its obvious hagiographical conventions.", "isCorrect": false, "rationale": "The text does not claim Einhard's Life is the only source or that it should be read uncritically. It is discussed as a literary work — a deliberate imitation of Suetonius — with both strengths and limitations."}, {"text": "Einhard focused primarily on Charlemagne's military campaigns and administrative reforms, providing the most accurate account of Carolingian imperial organization.", "isCorrect": false, "rationale": "The text's discussion of Einhard emphasizes his biographical and personal detail — physical description, eating habits, intellectual interests, personality — not primarily military or administrative history."}]}, {"question": "What was the three-field system, and why was it a significant agricultural innovation?", "options": [{"text": "A Roman irrigation system that used three channels to water crops, which monasteries in the Carolingian period revived and spread throughout Western Europe.", "isCorrect": false, "rationale": "The three-field system is about crop rotation (dividing land into three sections with different uses each year), not irrigation. It replaced the Roman two-field system."}, {"text": "Dividing arable land into three sections — winter grain, spring crop, and fallow — increased total production by one-third, improved soil fertility through legume rotation, spread agricultural risk, and provided more protein, helping drive the population recovery of the 9th and 10th centuries.", "isCorrect": true, "rationale": "The text describes the three-field system exactly this way: three sections, one with winter grain, one with spring crop (including legumes), one fallow. 'This system increased total production by one-third compared to the two-field system, improved soil fertility, spread agricultural risk, and provided more protein (legumes) in the diet.'"}, {"text": "A medieval counting system for taxes, in which one-third of a peasant's harvest went to the lord, one-third to the Church, and one-third remained for the peasant's family.", "isCorrect": false, "rationale": "The three-field system is an agricultural rotation technique, not a tax system. The text discusses it specifically as a crop rotation innovation that increased agricultural productivity."}, {"text": "A system in which three monks supervised the farming of each monastery's fields, ensuring both prayerful work and efficient production according to the Rule of Saint Benedict.", "isCorrect": false, "rationale": "The three-field system is not a monastic organizational structure but an agricultural innovation about crop rotation applicable to any medieval farm."}]}, {"question": "What was Charlemagne's standardization program, and why was it significant?", "options": [{"text": "Charlemagne imposed a single religion (Nicene Christianity), a single language (Frankish), and a single currency (gold solidus) on all his territories.", "isCorrect": false, "rationale": "The text describes Charlemagne standardizing weights and measures, reforming coinage (a silver denier, not a gold solidus), and imposing educational standards through capitularies — not a single spoken language or forced religious conversion."}, {"text": "Charlemagne standardized weights and measures, reformed coinage (creating a silver denier that became the standard coin of Western Europe for centuries), issued capitularies regulating everything from estate management to priests' minimum education, and ordered every monastery and cathedral to establish a school.", "isCorrect": true, "rationale": "The text describes Charlemagne's standardization program: 'He standardized weights and measures, reformed the coinage (creating a uniform silver denier that became the standard coin of Western Europe for centuries), and issued capitularies... governing everything from the management of royal estates to the minimum educational requirements for priests.'"}, {"text": "Charlemagne's standardization was limited to his palace school at Aachen; the rest of his empire remained under local customary practices because he lacked the administrative capacity to enforce reforms.", "isCorrect": false, "rationale": "The text describes Charlemagne's reforms as intended to apply throughout his empire: 'the Admonitio Generalis of AD 789... ordered every monastery and cathedral to establish a school.' His capitularies were issued throughout his territories."}, {"text": "Charlemagne standardized all legal codes across his empire, replacing local Germanic law with a single uniform Roman law code based on Justinian's Corpus Juris Civilis.", "isCorrect": false, "rationale": "The text does not describe Charlemagne replacing all local law with Roman law. His standardization was about weights, measures, coinage, and education — not legal unification based on Justinian."}]}, {"question": "What was the manor system, and how did it reflect the economic transformation of post-Roman Western Europe?", "options": [{"text": "The manor replaced the Roman latifundia as a larger, more productive agricultural unit that used free wage labor instead of slaves, demonstrating economic progress.", "isCorrect": false, "rationale": "The text says manors replaced the Roman latifundia but used dependent peasants (serfs or villeins), not free wage labor. The manor system was a response to economic contraction, not progress."}, {"text": "The manor was the basic unit of the feudal economy: a largely self-sufficient landed estate where dependent peasants owed the lord labor and produce in exchange for protection and the right to farm, reflecting the breakdown of the Roman trade economy into local self-sufficiency.", "isCorrect": true, "rationale": "The text defines the manor as 'the basic unit of the feudal economy: a landed estate owned by a lord, farmed by dependent peasants (serfs or villeins) who owed the lord labor, produce, and fees in exchange for protection and the right to farm.' The manor 'was largely self-sufficient' — reflecting the collapse of long-distance trade."}, {"text": "The manor was an urban commercial center where craftsmen and merchants organized guilds that replaced Roman slave labor with free skilled labor, laying the foundation for the medieval commercial revolution.", "isCorrect": false, "rationale": "The manor was a rural, agricultural institution, not an urban commercial center. The text describes it as including 'the lord's house or castle, a church, peasant cottages, common fields, a mill, and a woodland.'"}, {"text": "The manor system was introduced by Charlemagne as a deliberate administrative reform to organize agricultural production more efficiently throughout his empire.", "isCorrect": false, "rationale": "The text presents the manor as something that 'developed' gradually as a response to the collapse of the Roman trade economy, not as a deliberate administrative innovation by Charlemagne."}]}, {"question": "The text describes Charlemagne's Admonitio Generalis as reflecting principles from earlier units. What connections does it draw?", "options": [{"text": "The Admonitio Generalis reflects Aristotle's view that virtue is habit built through practice, since Charlemagne required schools to teach the practical arts of virtue.", "isCorrect": false, "rationale": "The text makes a different comparison: Charlemagne's educational program is compared to Plato's philosopher-king ideal and to Rome's cursus honorum — not to Aristotle's virtue ethics."}, {"text": "Charlemagne's educational program echoes Plato's philosopher-king ideal (good governance requires educated leaders) and the Roman cursus honorum (public service requiring demonstrated competence), while being more open than Plato's academy — available to any boy with aptitude.", "isCorrect": true, "rationale": "The text states: 'Charlemagne's program echoes Plato's philosopher-king ideal from Unit 2 — the conviction that good governance requires educated leaders — while also recalling the Roman cursus honorum from Unit 3, in which public service required demonstrated competence at each level. Unlike Plato's academy for a philosophical elite, Charlemagne's schools were open to any boy with aptitude.'"}, {"text": "The Admonitio Generalis reflects Augustine's City of God by attempting to build a genuinely Christian political order where Church education shapes all citizens toward the love of God.", "isCorrect": false, "rationale": "While Charlemagne's program had Christian content (Scripture, grammar), the text's specific comparison is to Plato's philosopher-king ideal and Rome's cursus honorum — not to Augustine's City of God."}, {"text": "The educational program reflects the Stoic belief that all human beings share in the divine Logos and should therefore receive universal education regardless of social class.", "isCorrect": false, "rationale": "The text does not connect Charlemagne's educational program to Stoic universalism. The connections drawn are specifically to Plato's Republic and the Roman cursus honorum."}]}, {"question": "What does the text suggest about how the early medieval period should be evaluated as a whole?", "options": [{"text": "The early medieval period was an unambiguous catastrophe from which Western civilization never fully recovered, permanently destroying the intellectual and economic achievements of the classical world.", "isCorrect": false, "rationale": "The text argues strongly against this view: the period preserved classical learning through monasteries, produced literary masterpieces (Bede, Einhard, Gregory), developed the three-field system, and ended with Charlemagne's coronation ensuring that 'the next thousand years of Western history would continue to ask' civilization's great questions."}, {"text": "Material conditions in the early medieval West were significantly worse than under Rome, but the period preserved classical learning through monasteries and produced genuine intellectual achievements — and the question of what s var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
