    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The 'Crisis of the Third Century' (AD 235–284) significantly weakened the Roman Empire. Which of the following was NOT a characteristic of this period?", "options": [{"text": "The rapid succession of numerous emperors, many murdered by their own soldiers.", "isCorrect": false, "rationale": "The text explicitly states that 'the Roman Empire had more than fifty emperors — most of them murdered by their own soldiers after reigns of months or even weeks,' making this a defining characteristic of the Crisis."}, {"text": "Widespread civil war across the provinces and constant pressure from Germanic tribes on the frontiers.", "isCorrect": false, "rationale": "The text mentions 'Civil war raged across the provinces' and 'The Rhine and Danube frontiers came under constant pressure from Germanic tribes,' both key aspects of the Crisis."}, {"text": "A period of unprecedented economic growth and expansion of trade networks throughout the Empire.", "isCorrect": true, "rationale": "The text states that during the Crisis of the Third Century, 'Trade collapsed. Cities shrank. The money economy weakened' due to currency debasement, which directly contradicts the idea of economic growth and trade expansion."}, {"text": "Severe currency debasement by the government, leading to inflation and a loss of trust in the monetary system.", "isCorrect": false, "rationale": "The text details how 'the government debased the currency — reducing the silver content of coins until they were nearly worthless — causing prices to rise steeply and trust in the monetary system to evaporate,' clearly marking this as a characteristic of the Crisis."}], "id": "q01"}, {"question": "Currency debasement was a significant economic problem for the Roman Empire. What was the primary long-term consequence of the Roman government's debasement of its currency during the third century AD?", "options": [{"text": "It led to a massive influx of silver from newly conquered mines, strengthening the economy.", "isCorrect": false, "rationale": "The text states that emperors debased currency 'when tax revenues fell short,' indicating a lack of precious metals, not an abundance. It also led to inflation, not a strengthened economy."}, {"text": "It allowed the government to consistently pay its soldiers and officials without any negative economic repercussions.", "isCorrect": false, "rationale": "While debasement was done 'to pay soldiers and officials when tax revenues fell short,' the text explicitly states the 'result was inflation' and 'trust in the monetary system to evaporate,' showing significant negative repercussions."}, {"text": "It caused widespread inflation, a collapse of trade, and a loss of public trust in the Roman monetary system.", "isCorrect": true, "rationale": "The text explicitly links currency debasement to 'inflation: merchants raised prices to compensate for receiving less silver per coin' and notes that it caused 'prices to rise steeply and trust in the monetary system to evaporate' and 'Trade collapsed.'"}, {"text": "It stabilized prices and encouraged increased investment in urban centers across the Empire.", "isCorrect": false, "rationale": "The text describes the opposite: 'prices to rise steeply' (inflation) and 'Cities shrank,' indicating a decline, not increased investment, in urban centers."}], "id": "q02"}, {"question": "Emperor Diocletian implemented several drastic reforms to stabilize the Roman Empire. Which of the following best describes the intended long-term effect of his division of the Empire into Eastern and Western halves?", "options": [{"text": "To create two independent empires with distinct political and cultural identities.", "isCorrect": false, "rationale": "Diocletian's division was administrative, 'each ruled by a senior emperor (Augustus) and a junior emperor (Caesar),' indicating a shared imperial structure, not immediate independence. Constantine later reunited it, showing it wasn't intended for permanent separation as distinct empires."}, {"text": "To centralize all military command under a single emperor in Constantinople.", "isCorrect": false, "rationale": "The Tetrarchy decentralized rule among four emperors, with two Augusti and two Caesars, directly contradicting the idea of a single emperor in Constantinople (which was not yet founded by Diocletian)."}, {"text": "To improve administrative efficiency and address the distinct challenges faced by each half of the vast Empire.", "isCorrect": true, "rationale": "The text states Diocletian 'reorganized the provincial administration, and divided the Empire into two administrative halves,' indicating an effort to better manage the vast territory and its varied issues, improving efficiency."}, {"text": "To reduce the size of the Roman army and cut military spending.", "isCorrect": false, "rationale": "Diocletian 'doubled the size of the army,' directly contradicting the idea of reducing military spending or size."}], "id": "q03"}, {"question": "The text notes that the Eastern Roman Empire survived for another thousand years while the Western half collapsed. What primary reason does the text provide for the Western Empire's greater vulnerability compared to the East?", "options": [{"text": "The Eastern Empire had a significantly larger army and more experienced generals.", "isCorrect": false, "rationale": "While the East was stronger, the text does not specifically highlight a larger army or better generals as the primary differentiating factor, but rather economic and geographical advantages."}, {"text": "The Western provinces were more urbanized, wealthier, and had stronger natural defenses.", "isCorrect": false, "rationale": "The text states the opposite: 'The Eastern provinces... were densely populated, urbanized, and economically productive,' while the 'Western provinces — Britain, Gaul, Spain, Italy — were less urbanized' and faced a 'longer and more exposed frontier.'"}, {"text": "The Western Empire suffered from more severe plagues and natural disasters than the East.", "isCorrect": false, "rationale": "The text mentions plagues (Antonine, Cyprian) as general causes for the fall, but it does not specifically state they impacted the West disproportionately compared to the East, or that this was the primary differentiator."}, {"text": "The Western provinces were less urbanized, less economically productive, and had a more exposed frontier.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'The Eastern provinces... were densely populated, urbanized, and economically productive... The Western provinces... were less urbanized, faced a longer and more exposed frontier... and were more vulnerable to barbarian incursion.'"}], "id": "q04"}, {"question": "The text cautions against a simplistic understanding of the term 'barbarian.' Which of the following statements best reflects the nuanced view of Germanic peoples presented in the text regarding the fall of Rome?", "options": [{"text": "Germanic tribes were uniformly savage, primitive cave-dwellers who had no prior contact with Rome.", "isCorrect": false, "rationale": "The 'caution' box explicitly states, 'the Visigoths, Franks, Ostrogoths, and other Germanic peoples were not primitive cave-dwellers. Many had been in contact with Rome for centuries.'"}, {"text": "The 'barbarian invasions' were primarily a military conquest by culturally inferior groups against a superior civilization.", "isCorrect": false, "rationale": "The text argues the opposite: 'The so-called 'barbarian invasions' were less a collision of civilization and savagery than a complex process of migration, negotiation, and cultural exchange.'"}, {"text": "Many Germanic peoples had long-standing interactions with Rome, including military service and cultural exchange, before their migrations intensified.", "isCorrect": true, "rationale": "The text notes, 'Many had been in contact with Rome for centuries; many had served in Roman armies; many had converted to Christianity... The Visigoths had received a translation of the Bible into their own Gothic language.' This supports a long history of interaction and exchange."}, {"text": "All Germanic tribes had fully integrated into Roman society and adopted Roman governance by the 4th century AD.", "isCorrect": false, "rationale": "While there was contact and some integration, the text describes them as distinct peoples who 'begged Emperor Valens to let them cross the Danube' as refugees, and whose chieftains still commanded loyalty as foederati, indicating they were not fully integrated into Roman governance."}], "id": "q05"}, {"question": "The Battle of Adrianople in AD 378 was a catastrophic defeat for the Roman Empire. What was the direct cause of the Visigoths' revolt that led to this battle?", "options": [{"text": "The Visigoths were attempting to conquer new territory and establish their own independent kingdom.", "isCorrect": false, "rationale": "The text states the Visigoths 'begged Emperor Valens to let them cross the Danube River and settle within Roman territory' as 'refugees fleeing the Huns,' not as conquerors seeking an independent kingdom at that point."}, {"text": "Emperor Valens ordered a preemptive strike against the Visigoths to prevent a future invasion.", "isCorrect": false, "rationale": "Valens initially agreed to let them settle. The Visigoths revolted because of Roman mistreatment, not because Valens attacked them first."}, {"text": "Corrupt Roman administrators exploited the Visigoths, failing to provide promised aid and treating them unjustly.", "isCorrect": true, "rationale": "The text explicitly states, 'Roman administrators, corrupt and indifferent, failed to provide the promised grain and fair treatment. Instead they exploited the Visigoths, selling them dog-meat at extortionate prices and demanding their children as slaves. The Visigoths revolted.'"}, {"text": "The Visigoths were secretly allied with the Huns and launched a coordinated attack on Roman territory.", "isCorrect": false, "rationale": "The Visigoths were 'refugees fleeing the Huns,' indicating they were enemies, not allies, of the Huns at this time."}], "id": "q06"}, {"question": "The system of *foederati* (allied troops) was a pragmatic response to Roman challenges. What was a significant drawback or long-term consequence of Rome's increasing reliance on *foederati*?", "options": [{"text": "It significantly reduced the overall military strength of the Roman Empire.", "isCorrect": false, "rationale": "The system was a 'pragmatic response to Roman manpower shortages,' meaning it *added* to military strength by providing soldiers, not reducing it. The issue was loyalty, not raw numbers."}, {"text": "It led to the complete abandonment of Roman military training and tactics.", "isCorrect": false, "rationale": "While the army increasingly consisted of Germanic warriors, the text does not suggest a complete abandonment of Roman training; rather, it implies a shift in who comprised the fighting force and to whom their loyalty lay."}, {"text": "It meant that the Roman army increasingly consisted of warriors whose primary loyalty was to their own chieftains rather than to Rome.", "isCorrect": true, "rationale": "The 'definitionFoederati' box states this directly: 'the Roman army increasingly consisted of Germanic warriors whose first loyalty was to their chieftains rather than to Rome.'"}, {"text": "It fostered strong nationalistic sentiments among Roman citizens, leading to greater unity.", "isCorrect": false, "rationale": "The system contributed to the fracturing of the Western Empire and a loss of central authority, which would not foster greater unity among Roman citizens."}], "id": "q07"}, {"question": "Alaric's sack of Rome in AD 410 was a profoundly shocking event. How did its immediate impact on the Roman world differ from the Vandal sack of Rome in AD 455, as described in the text?", "options": [{"text": "The AD 410 sack resulted in the immediate collapse of the Western Roman Empire, while the AD 455 sack had little impact.", "isCorrect": false, "rationale": "The text indicates the Western Empire continued to exist for decades after 410, not immediately collapsing. The 455 sack was 'more thorough' and contributed significantly to the ongoing decline."}, {"text": "The AD 410 sack was primarily a psychological blow, whereas the AD 455 sack was more destructive and thorough.", "isCorrect": true, "rationale": "The text emphasizes the 'psychological shock was devastating' for the 410 sack, noting Rome hadn't fallen in 800 years. For the 455 sack, it states, 'This sack was more thorough than Alaric's. They stripped the gilded roof tiles from the Capitoline temples,' highlighting its material destructiveness."}, {"text": "The AD 410 sack was led by the Huns, while the AD 455 sack was led by the Visigoths.", "isCorrect": false, "rationale": "Alaric, a Visigothic leader, led the AD 410 sack. The Vandals led the AD 455 sack. The Huns were not involved in either sack of Rome."}, {"text": "The AD 410 sack prompted Pope Leo I to negotiate with the invaders, while the AD 455 sack did not.", "isCorrect": false, "rationale": "Pope Leo I negotiated with Attila the Hun in AD 452, after both sacks of Rome mentioned, to spare Rome from the Huns. His intervention was not for either of these specific sacks."}], "id": "q08"}, {"question": "Attila the Hun, known as 'The Scourge of God,' posed a formidable threat to both halves of the Roman Empire. Which of the following accurately describes a key event or outcome related to Attila's campaigns?", "options": [{"text": "Attila successfully conquered Constantinople, bringing the Eastern Roman Empire to an end.", "isCorrect": false, "rationale": "The text states Constantinople was 'nearly impregnable' and that Attila 'extorted enormous tribute from the Eastern Empire' but does not mention him conquering it. The Eastern Empire survived for another thousand years."}, {"text": "At the Battle of Adrianople, Attila's forces destroyed the Roman field army.", "isCorrect": false, "rationale": "The Battle of Adrianople (AD 378) involved the Visigoths defeating Emperor Valens, not Attila the Hun."}, {"text": "Pope Leo I successfully persuaded Attila to turn back from invading Rome in AD 452.", "isCorrect": true, "rationale": "The text states, 'At the Mincio River, Pope Leo I... rode out to meet Attila. He persuaded the Hun to turn back,' confirming this event."}, {"text": "Attila's empire remained stable and powerful for centuries after his death, unlike the Roman Empire.", "isCorrect": false, "rationale": "The 'note' on Attila states 'his empire collapsed almost immediately' after his death in AD 453."}], "id": "q09"}, {"question": "According to modern historians cited in the text, what is the most accurate perspective on the fall of the Western Roman Empire?", "options": [{"text": "It was primarily caused by the adoption of Christianity, which sapped Rome's martial virtue.", "isCorrect": false, "rationale": "The text attributes this view to Edward Gibbon but clarifies that 'Modern historians cite multiple causes' and 'Most historians today see the fall as a result of many interacting causes rather than one single reason.'"}, {"text": "It was solely a military defeat resulting from the overwhelming strength of the 'barbarian' invasions.", "isCorrect": false, "rationale": "While invasions were a factor, the text identifies 'military overstretching, economic decline, currency debasement... administrative corruption, and the loss of political legitimacy' as equally important, rejecting a single cause."}, {"text": "It was an inevitable collapse due to inherent weaknesses in the Roman imperial system, regardless of external pressures.", "isCorrect": false, "rationale": "The text states, 'The Eastern Empire's survival for another thousand years shows that collapse was not inevitable,' suggesting specific vulnerabilities, not an inherent, unavoidable collapse of the entire system."}, {"text": "It resulted from a complex interplay of multiple internal weaknesses and external pressures, making it a multifaceted event.", "isCorrect": true, "rationale": "The 'keyconcept' box 'Why Did Rome Fall? Historians Disagree' explicitly states that 'Most historians today see the fall as a result of many interacting causes rather than one single reason,' listing economic decline, military overstretching, political instability, and external pressures."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
