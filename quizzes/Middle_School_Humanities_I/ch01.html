    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The textbook states that the ancient Greeks 'asked questions that the Western world has never finished answering.' Which of the following best exemplifies the foundational nature of these questions for Western civilization?", "options": [{"text": "Their development of advanced siege warfare techniques later adopted by Rome.", "isCorrect": false, "rationale": "While the Greeks had military innovations, the text highlights their foundational questions as being about governance, justice, and civic duty, which are more philosophical and political than military technology."}, {"text": "Their emphasis on exploring fundamental concepts of governance, justice, and civic duty.", "isCorrect": true, "rationale": "The overview explicitly states that questions like 'Who should govern? What is justice? What makes a hero? What does a man owe his city—and what does his city owe him?' became the foundation of Western civilization."}, {"text": "Their widespread maritime trade networks that connected the Mediterranean.", "isCorrect": false, "rationale": "Trade networks were important to some Greek poleis, like Athens, but the text emphasizes the 'habit of asking questions' about fundamental societal structures as the 'foundation of Western civilization,' not economic activity."}, {"text": "Their mythological stories about gods and heroes, which shaped later literature.", "isCorrect": false, "rationale": "Greek myths were indeed influential, but the overview focuses on the deeper, analytical questions about societal organization and ethics as the primary foundation for Western thought, rather than solely narrative content."}]}, {"question": "Which statement accurately describes the Mycenaean civilization according to the text?", "options": [{"text": "They were a peaceful trading society known for their democratic governance.", "isCorrect": false, "rationale": "The text describes the Mycenaeans as a 'warrior culture' and does not mention democratic governance; their system was pre-polis."}, {"text": "They constructed massive stone fortresses and were dominant in the Greek peninsula during the Bronze Age.", "isCorrect": true, "rationale": "The text explicitly states, 'They built massive stone fortresses, traded across the eastern Mediterranean, and fought wars...' and defines them as the 'dominant Bronze Age Greek culture.'"}, {"text": "They developed the first writing system in Greece that remained in continuous use through the Dark Age.", "isCorrect": false, "rationale": "The Mycenaeans used Linear B, but the text notes it 'was later lost entirely' during the Bronze Age Collapse, leading to a period of 'lost literacy.'"}, {"text": "Their collapse was primarily due to internal rebellions orchestrated by the helot population.", "isCorrect": false, "rationale": "Helots were a Spartan institution, not Mycenaean. The causes of the Bronze Age Collapse are described as debated, including 'invasion by mysterious “Sea Peoples,” climate change, internal rebellions, or some combination.'"}]}, {"question": "A significant long-term consequence of the Bronze Age Collapse for the Greek peninsula was:", "options": [{"text": "The immediate adoption of a unified monarchy across all Greek city-states.", "isCorrect": false, "rationale": "The collapse led to fragmentation and the emergence of independent city-states, not a unified monarchy."}, {"text": "A period known as the Greek Dark Age, characterized by reduced population, lost literacy, and fragmented communities.", "isCorrect": true, "rationale": "The text states, 'Whatever caused it, the result was a Greek Dark Age lasting from roughly 1100 to 800 BC—three centuries of reduced population, lost literacy, and fragmented communities.'"}, {"text": "The rise of a new writing system, Linear B, which facilitated trade.", "isCorrect": false, "rationale": "Linear B was the Mycenaean system that was *lost* during the collapse, and trade networks *dissolved*, indicating a period of decline rather than a rise in new complex systems."}, {"text": "The rapid development of advanced ironworking techniques that spurred economic growth.", "isCorrect": false, "rationale": "The Dark Age was characterized by 'reduced population, lost literacy, and fragmented communities,' implying economic contraction rather than rapid growth spurred by new technologies during this specific period."}]}, {"question": "The development of independent Greek city-states (poleis) rather than a single unified nation is primarily attributed to which factor?", "options": [{"text": "Frequent invasions from external empires forced communities to self-govern.", "isCorrect": false, "rationale": "While external threats existed, the text attributes the polis structure primarily to internal geographical features, not solely external invasions forcing self-governance."}, {"text": "The mountainous terrain and numerous islands that created natural barriers between communities.", "isCorrect": true, "rationale": "The text explicitly states, 'The answer lies largely in geography. The Greek peninsula is intensely mountainous; deep valleys and rocky ridges separate communities from one another.' This made 'communication difficult and unity unlikely.'"}, {"text": "A cultural preference for small, autonomous communities over large empires.", "isCorrect": false, "rationale": "While Greeks developed such a preference, the text presents geography as the *underlying reason* for this political fragmentation and identity development."}, {"text": "The lack of a common language or shared religious beliefs among early Greek settlements.", "isCorrect": false, "rationale": "The text contradicts this by stating that despite their independence, 'the Greek city-states shared a common language, common gods, and common sacred sites.'"}]}, {"question": "Imagine a young Greek boy is removed from his family at age seven to begin rigorous state-sponsored training focused on physical endurance, discipline, and combat skills, often enduring hunger. In which of the following city-states would this scenario most likely occur?", "options": [{"text": "Athens", "isCorrect": false, "rationale": "Athens valued education, debate, and the arts, and while military training was part of Athenian life, it did not involve the rigorous, state-controlled, family-separated system described."}, {"text": "Miletus", "isCorrect": false, "rationale": "Miletus was a Greek colony known for its early philosophers like Thales, not for this specific type of military upbringing."}, {"text": "Sparta", "isCorrect": true, "rationale": "This scenario directly describes the Spartan 'agoge,' where 'Beginning at age seven, boys were removed from their families... They were deliberately underfed to encourage resourcefulness, taught to endure cold and pain, and drilled in combat.'"}, {"text": "Troy", "isCorrect": false, "rationale": "Troy was a city involved in a Mycenaean-era conflict, remembered in myth, not a polis described as having this specific educational system."}]}, {"question": "Which of the following best highlights the fundamental difference in values between Athens and Sparta, as described in the text?", "options": [{"text": "Athens valued strong military alliances, while Sparta preferred isolation.", "isCorrect": false, "rationale": "The text doesn't focus on alliance strategies but rather internal societal structures and ideals. Sparta was militarily focused on its own strength and control over helots, not isolation in terms of diplomacy."}, {"text": "Athens prioritized commercial prosperity and democratic participation, while Sparta emphasized military prowess and social control.", "isCorrect": true, "rationale": "The text contrasts Athens as a 'city of commerce, culture, and—eventually—democracy' where 'citizens valued education, debate, and the arts' with Sparta as a 'military state' where 'The Spartan ideal was not the eloquent debater but the fearless soldier,' and whose system relied on controlling helots."}, {"text": "Athens encouraged religious devotion to Zeus, while Sparta worshipped a different pantheon of gods.", "isCorrect": false, "rationale": "The text indicates that all Greek city-states 'shared a common language, common gods, and common sacred sites,' including a pantheon of deities like Zeus."}, {"text": "Athens focused on agricultural self-sufficiency, while Sparta relied heavily on sea trade.", "isCorrect": false, "rationale": "The text states Athens 'thrived on sea trade' due to its harbor, while Sparta was 'located inland in a fertile valley' and conquered neighbors for resources, not relying on sea trade."}]}, {"question": "Solon's most radical reform, which fundamentally altered Athenian society and laid groundwork for future political development, was:", "options": [{"text": "Establishing the agoge system for military training.", "isCorrect": false, "rationale": "The agoge was Sparta's unique military training system, not an Athenian reform by Solon."}, {"text": "Creating Athens' first written law code with harsh penalties.", "isCorrect": false, "rationale": "This was the reform of Draco, which occurred before Solon's and was known for its harshness ('draconian')."}, {"text": "Canceling all debt slavery and reorganizing society based on wealth rather than birth.", "isCorrect": true, "rationale": "The text highlights Solon's 'remarkable' actions: 'he canceled all debt slavery. He freed those already enslaved for debt... He reorganized Athenian society into four classes based on wealth rather than birth alone,' which 'laid the groundwork for what would eventually become Athenian democracy.'"}, {"text": "Founding the Olympic Games to promote unity among city-states.", "isCorrect": false, "rationale": "The Olympic Games were founded much earlier, by tradition in 776 BC, long before Solon's reforms in 594 BC."}]}, {"question": "How did the early Athenian legal reforms, starting with Draco and significantly advanced by Solon, contribute to the eventual emergence of Athenian democracy?", "options": [{"text": "They established a direct, universal voting system for all residents from the outset.", "isCorrect": false, "rationale": "Democracy developed gradually; Solon's reforms were a step, but universal voting was not immediate, and it did not include all residents (e.g., women, slaves, foreigners)."}, {"text": "They unified all Greek city-states under a single legal code, fostering political cooperation.", "isCorrect": false, "rationale": "These reforms were specific to Athens and did not unify all Greek city-states under a single code."}, {"text": "They introduced public, written laws and gradually shifted political power away from birthright towards wealth and civic participation, laying the foundation for equality before the law.", "isCorrect": true, "rationale": "Draco's written laws made rules public, while Solon's reforms based classes on wealth rather than birth, allowing merchants into government, and Cleisthenes later established 'isonomia (equality before the law),' directly linking these reforms to the foundation of democracy."}, {"text": "They eliminated all forms of social hierarchy, ensuring complete equality for all citizens.", "isCorrect": false, "rationale": "Solon's reforms created wealth-based classes, so social hierarchy still existed, even if altered. Complete equality was not achieved even in later Athenian democracy."}]}, {"question": "The practice of suspending all warfare between Greek city-states during the Olympic Games primarily reveals what about ancient Greek culture?", "options": [{"text": "Their advanced diplomatic skills and preference for peaceful resolution over conflict.", "isCorrect": false, "rationale": "While a truce was observed, the text indicates Greek city-states were frequently at war; the suspension of hostilities was specific to the Games and was temporary, not an indication of a general preference for peace."}, {"text": "The superior military strength of Olympia, which could enforce peace throughout Greece.", "isCorrect": false, "rationale": "Olympia was a sacred site for the Games, not a military power that enforced peace. The truce was a cultural observance, not enforced by one city-state."}, {"text": "A shared religious and cultural identity that transcended political rivalries and allowed for temporary unity.", "isCorrect": true, "rationale": "The text states the Games were 'a remarkable testament to the power of religious shared culture' and that Greeks 'shared a common language, common gods, and common sacred sites,' implying a unifying cultural identity despite political divisions."}, {"text": "The significant economic benefits derived from the Games, which incentivized peace.", "isCorrect": false, "rationale": "The text emphasizes the Games were 'in honor of Zeus' and about 'eternal fame' (kleos), pointing to religious and cultural significance rather than primarily economic incentives for the truce."}]}, {"question": "Thales of Miletus's innovation, which marked the beginning of natural philosophy, was characterized by:", "options": [{"text": "His unwavering belief that only divine intervention could explain natural phenomena.", "isCorrect": false, "rationale": "The text explicitly states Thales 'tried to explain natural phenomena—without appealing to the gods,' which is the opposite of this option."}, {"text": "His use of complex mathematical equations to predict astronomical events with perfect accuracy.", "isCorrect": false, "rationale": "While he famously predicted a solar eclipse, his primary innovation was the *method* of rational inquiry, not necessarily complex mathematics (Pythagoras came later), nor perfect accuracy."}, {"text": "His attempt to explain natural phenomena through rational inquiry and fundamental substances, independent of divine explanations.", "isCorrect": true, "rationale": "The text highlights his method: 'he tried to explain natural phenomena... without appealing to the gods,' by asking 'What is the world actually made of, and how does it actually work?' and proposing water as the 'fundamental substance.'"}, {"text": "His establishment of the first formal academy for philosophical debate in Athens.", "isCorrect": false, "rationale": "Thales was in Miletus, not Athens, and the establishment of formal academies came much later in Greek history."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
