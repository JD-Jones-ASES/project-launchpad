    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The architects Ictinus and Callicrates employed 'subtle optical corrections' in the Parthenon's design, such as slightly curved columns and upward-bowing floors. What was the primary purpose of these architectural techniques?", "options": [{"text": "To demonstrate advanced engineering capabilities that surpassed other city-states.", "isCorrect": false, "rationale": "While it demonstrated advanced skill, the text explicitly states the purpose was 'to make the building look perfect to the human eye,' not merely to show off engineering."}, {"text": "To create an illusion of perfect straightness and proportion to the human observer.", "isCorrect": true, "rationale": "The text explains these corrections were used 'to make the building look perfect to the human eye,' compensating for natural optical distortions."}, {"text": "To enhance the building's structural integrity and resistance to earthquakes.", "isCorrect": false, "rationale": "The text does not mention structural integrity or earthquake resistance in relation to optical corrections; their purpose was aesthetic."}, {"text": "To symbolize the harmonious relationship between gods and mortals in Athenian civic religion.", "isCorrect": false, "rationale": "The text links the Parthenon to civic religion and power, but the optical corrections themselves are described as serving a visual, not a symbolic, purpose in this context."}]}, {"question": "The text notes that Athenian cultural achievements, including the Parthenon and dramatic festivals, were partly funded by 'involuntary contributions' from Delian League allies. What historical thinking skill does the accompanying 'Discussion: Beauty Funded by Injustice' encourage students to develop?", "options": [{"text": "The ability to prioritize the aesthetic value of art over its ethical origins.", "isCorrect": false, "rationale": "The discussion specifically advises against the 'false choice' of 'either it's beautiful or it's unjust,' indicating that one should not prioritize one over the other."}, {"text": "The capacity to critically evaluate historical events and conclude that most great achievements are inherently unjust.", "isCorrect": false, "rationale": "The goal is 'honest engagement,' not a predetermined conclusion that all achievements are unjust, nor a generalization about 'most' achievements."}, {"text": "The skill to admire human achievement while simultaneously acknowledging and reckoning with its moral complexities and costs.", "isCorrect": true, "rationale": "The text states, 'The ability to admire human achievement while honestly reckoning with its moral costs is a mark of mature historical thinking.' This directly aligns with the discussion's purpose."}, {"text": "The understanding that historical context always justifies the means by which great works are created.", "isCorrect": false, "rationale": "The discussion encourages reckoning with moral costs, not justifying them. Understanding context is different from justifying actions."}]}, {"question": "Which of the following scenarios best exemplifies Aristotle's approach to cultivating virtue, as described in the text?", "options": [{"text": "A leader meditates on the abstract concept of 'Justice itself' to discern the perfect laws for their city.", "isCorrect": false, "rationale": "This describes Plato's philosophy, focusing on 'eternal Forms' and 'Justice itself' rather than Aristotle's emphasis on practice."}, {"text": "A student meticulously observes various plants and animals in nature to understand their classifications and interconnections.", "isCorrect": false, "rationale": "While Aristotle did classify plants and animals and trusted his senses, this option describes his empirical approach to knowledge, not his specific method for cultivating *virtue*."}, {"text": "An individual consistently practices acts of honesty and generosity in their daily life, gradually becoming a more truthful and giving person.", "isCorrect": true, "rationale": "The text states Aristotle argued 'virtue was a habit cultivated through practice. You become courageous by doing courageous things; generous by being generous; just by acting justly—consistently, over time.'"}, {"text": "A person strives to live in harmony with the divine reason that governs the universe, accepting all events with equanimity.", "isCorrect": false, "rationale": "This describes the Stoic philosophy, particularly their focus on 'divine Logos' and 'accepting whatever happens with equanimity.'"}]}, {"question": "Consider the architectural orders of Greek temples. If a modern architect wished to design a public building that conveyed a sense of robust simplicity and enduring strength, which Greek order would be most appropriate to draw inspiration from, and why?", "options": [{"text": "Ionic, because its slender columns and scroll-like capitals suggest elegance and intellectual refinement.", "isCorrect": false, "rationale": "The Ionic order is described as 'slender, with scroll-like capitals,' suggesting elegance, not necessarily 'robust simplicity and enduring strength' as the primary characteristic."}, {"text": "Corinthian, due to its elaborate, leaf-shaped capitals signifying grandeur and opulence.", "isCorrect": false, "rationale": "The Corinthian order is described as 'elaborate, with leaf-shaped capitals,' which conveys opulence rather than robust simplicity."}, {"text": "Doric, because it is characterized as 'plain, sturdy' and was used on monumental structures like the Parthenon's exterior.", "isCorrect": true, "rationale": "The text describes the Doric order as 'plain, sturdy' and notes its use on the Parthenon's exterior, aligning perfectly with a design goal of robust simplicity and strength."}, {"text": "All three orders equally, as their combination creates a balanced aesthetic that represents strength.", "isCorrect": false, "rationale": "Each order has distinct characteristics. While they can be combined, the question asks for the most *appropriate* order for a specific aesthetic, and the Doric uniquely fits 'robust simplicity and enduring strength'."}]}, {"question": "The 'keyconceptPlato vs. Aristotle: Two Ways of Knowing' section highlights a fundamental tension in Western intellectual tradition. Which of the following statements accurately captures this core difference?", "options": [{"text": "Plato emphasized the importance of empirical observation, while Aristotle focused on logical deduction from first principles.", "isCorrect": false, "rationale": "This reverses their actual positions. Plato looked away from the material world, while Aristotle trusted his senses and observations."}, {"text": "Plato believed truth was found in practical application, whereas Aristotle sought truth through abstract contemplation.", "isCorrect": false, "rationale": "This also reverses their views. Plato's Forms were abstract, while Aristotle emphasized virtue through practical habit and observation of the real world."}, {"text": "Plato looked inward to eternal, invisible realities accessed by reason, while Aristotle looked outward to careful observation of the material world.", "isCorrect": true, "rationale": "The text states, 'Plato looked upward: truth is found by reason turning away from the material world toward eternal, invisible realities (Forms). Aristotle looked outward: truth is found by careful observation of the world as it actually is.'"}, {"text": "Plato championed skepticism towards all knowledge, while Aristotle advocated for dogmatic adherence to established traditions.", "isCorrect": false, "rationale": "Neither Plato nor Aristotle were skeptics in this sense, nor did Aristotle advocate for blind adherence to tradition; he was an empirical observer."}]}, {"question": "The Greek outdoor theater of Dionysus was described as a 'civic institution' where citizens received an allowance to attend. This suggests that Athenian drama served what primary function within the democracy?", "options": [{"text": "To provide exclusive entertainment for the wealthy and influential citizens of Athens.", "isCorrect": false, "rationale": "The text explicitly states drama 'was not a luxury for the wealthy but a shared civic experience,' and citizens received an allowance to attend, indicating widespread access."}, {"text": "To promote artistic expression for individual playwrights and actors, independent of societal concerns.", "isCorrect": false, "rationale": "The text emphasizes the 'civic' and 'community reflection' aspects, indicating that art served the community, not just individual expression, which is contrasted with 'modern assumptions'."}, {"text": "To offer a space for community reflection and moral/emotional education crucial for democratic citizenship.", "isCorrect": true, "rationale": "The text states, 'The theater enforced community reflection... Both genres served the democracy's need for citizens who could feel as well as reason,' and later, it was 'a public space for moral and emotional education.'"}, {"text": "To serve as a venue for political debates and voting on public policy.", "isCorrect": false, "rationale": "While civic, the theater's role was drama, not direct political debate or voting. The agora served that function."}]}, {"question": "The Stoic philosophers, founded by Zeno of Citium, emphasized that 'a divine Logos governed the universe' and 'all human beings shared in one rational community.' How did this philosophy influence subsequent historical developments, according to the text?", "options": [{"text": "It led directly to the downfall of Alexander's empire by challenging his divine authority.", "isCorrect": false, "rationale": "The text links Stoicism to Alexander's conquests as its origin point, but not to the empire's downfall. Its influence is noted later."}, {"text": "Its universalist ideas provided useful vocabulary for Roman thinkers and for Paul when preaching Christianity.", "isCorrect": true, "rationale": "The text states, 'This Stoic universalism would make Stoicism attractive to Roman thinkers—and provide Paul with useful vocabulary when he preached in Athens.' This is a direct connection."}, {"text": "It prompted a return to the Platonic idea of philosopher-kings as the ideal form of governance.", "isCorrect": false, "rationale": "Stoicism is presented as a distinct school from Plato's, focusing on universal reason and community, not philosopher-kings."}, {"text": "It encouraged isolationism and a rejection of civic engagement among its adherents.", "isCorrect": false, "rationale": "The concept of a 'rational community' suggests engagement, not isolationism. The text describes it as making Stoicism 'attractive' to Roman thinkers, implying societal relevance."}]}, {"question": "The saying 'Graecia capta ferum victorem cepit' ('Captive Greece captured its fierce conqueror') illustrates what key dynamic between Rome and Greece?", "options": [{"text": "Despite military defeat, Greek culture profoundly influenced Roman society, architecture, and philosophy.", "isCorrect": true, "rationale": "The text explicitly states, 'Military conquest flowed one way; cultural influence flowed the other,' and lists Roman adoptions of Greek architecture, drama, and philosophy as examples."}, {"text": "Greek military strategies were eventually adopted and perfected by the Roman legions.", "isCorrect": false, "rationale": "The quote and the surrounding text specifically refer to cultural influence, not military strategies."}, {"text": "Rome's defeat of Greece led to a complete eradication of Greek cultural practices in the conquered territories.", "isCorrect": false, "rationale": "This contradicts the entire point of the quote and the examples given, which show Greek culture was adopted, not eradicated."}, {"text": "The phrase highlights the superior military prowess of the Greeks compared to the Romans.", "isCorrect": false, "rationale": "The quote acknowledges Greece as 'captive' and Rome as the 'fierce conqueror,' indicating Rome's military superiority, while focusing on Greece's cultural influence *despite* that conquest."}]}, {"question": "According to the map note on Peloponnesian War alliances, what primary factor, alongside ideology, helped explain the geographic pattern of Athenian versus Spartan allies?", "options": [{"text": "Religious differences, with Athens promoting polytheism and Sparta monotheism.", "isCorrect": false, "rationale": "The text does not mention religious differences as an explanatory factor for the alliances. Both were polytheistic."}, {"text": "The presence of rival philosophical schools, with Athenian allies favoring Plato and Spartan allies favoring Aristotle.", "isCorrect": false, "rationale": "While philosophical schools existed, the text does not link their allegiances to Peloponnesian War alliances. The 'note' focuses on different factors."}, {"text": "Economic interests and geographic positions, reflecting Athens's maritime empire versus Sparta's land-based alliances.", "isCorrect": true, "rationale": "The text states, 'Economics and geography together explain the war's alliances as much as ideology does,' explicitly pointing to 'Athens' maritime empire versus Sparta's land-based alliances' and 'Corinthian resentment of Athenian commercial dominance'."}, {"text": "Differing approaches to drama and the arts, with Spartan allies rejecting public theater.", "isCorrect": false, "rationale": "The text does not connect artistic preferences to the alliance patterns; it focuses on economic and geographic factors."}]}, {"question": "The 'thenandnow' section compares Greek public spaces like the agora and theater to modern equivalents. What fundamental aspect of Greek art and civic life does this comparison emphasize as a challenge to modern assumptions?", "options": [{"text": "The superior acoustical engineering of ancient Greek architecture compared to modern designs.", "isCorrect": false, "rationale": "While acoustics are mentioned, the comparison highlights that 'Modern concert halls use computer-modeled acoustics to achieve the same result,' implying parity, not superiority, in engineering, and this is not the fundamental challenge emphasized."}, {"text": "The idea that great art and public spaces primarily serve the community for moral and emotional education, rather than individual expression.", "isCorrect": true, "rationale": "The text states, 'the Greek understanding that great art serves the community, not just the individual viewer, challenges modern assumptions about art as personal expression,' and explicitly calls the theater 'a public space for moral and emotional education'."}, {"text": "The necessity for all art to be state-funded and centrally controlled to ensure civic participation.", "isCorrect": false, "rationale": "While civic funding is mentioned for theater, the core challenge is about art serving the community versus individual expression, not the specific funding mechanism or control."}, {"text": "The importance of outdoor public spaces over indoor venues for fostering community engagement.", "isCorrect": false, "rationale": "The comparison mentions Greek theaters built into hillsides for natural acoustics, but the core challenge relates to the *purpose* of art and public spaces (community vs. individual), not merely their outdoor nature."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
