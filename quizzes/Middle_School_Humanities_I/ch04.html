<div class="quiz-container">

        <h2>Results</h2>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "The text identifies several long-term factors contributing to the slow collapse of the Roman Republic. Which of the following best synthesizes the primary internal stresses that weakened the Republic?", "options": [{"text": "Excessive taxation on wealthy senators, leading to their disloyalty and rebellion.", "isCorrect": false, "rationale": "The text states that wealth flowed 'mostly to those who already had money' (senators and their allies), implying they benefited from the system, not suffered from excessive taxation that would lead to disloyalty."}, {"text": "Unchecked wealth accumulation by the elite, displacing citizen-soldiers and fostering loyalty shifts within the army.", "isCorrect": true, "rationale": "The text explicitly states that 'wealth flowed mostly to those who already had money,' leading to senators buying up land, pushing 'the small independent farmer off his land,' thus losing 'a citizen-soldier.' It then explains Marius's reforms created landless soldiers whose 'loyalty was to him—not to the Senate, not to the Republic, not to Rome.'"}, {"text": "A lack of military victories, eroding Roman morale and power throughout the Mediterranean.", "isCorrect": false, "rationale": "The text notes 'A century of conquest had made Rome fabulously wealthy,' indicating a period of significant military success, not a lack thereof. The problem was governing the conquered world in peace, not failing to conquer it."}, {"text": "Frequent foreign invasions that depleted Rome's resources and manpower, making internal governance impossible.", "isCorrect": false, "rationale": "The text focuses on internal collapse, civil war, and structural problems rather than external invasions as the primary cause of the Republic's downfall. While wars occurred, the core issue was how Rome managed its internal affairs and the loyalty of its army."}], "id": "q01"}, {"question": "The Gracchi brothers' reform efforts are described as the Republic's 'last serious attempt to fix its structural problems from within constitutional structures.' Their ultimate failure most directly demonstrates:", "options": [{"text": "The inherent inefficiency of Rome's democratic assemblies in passing complex legislation.", "isCorrect": false, "rationale": "The issue was not the inefficiency of the assemblies themselves, but the violent obstruction by the Senate. Tiberius appealed directly to the popular assembly, indicating it was a viable path, but it was met with extra-legal violence."}, {"text": "The Roman people's general apathy towards land reform and social justice.", "isCorrect": false, "rationale": "The Gracchi brothers appealed to the popular assembly and Gaius's program extended further with 'subsidized grain for the urban poor,' suggesting popular support for their reforms, not apathy."}, {"text": "The limitations of the Tribune of the Plebs' power in legislative matters when facing senatorial opposition.", "isCorrect": false, "rationale": "The Tribune's powers (like sacrosanctity and veto) were significant; the problem was the *violation* of these powers through murder, not their inherent limitation in constitutional terms."}, {"text": "The Senate's willingness to violate fundamental constitutional principles and resort to violence to protect elite interests.", "isCorrect": true, "rationale": "The text states Tiberius's proposal was 'entirely legal' but the 'Senate, dominated by the men who would lose their estates, despised it.' His murder 'violated both his veto power and his sacrosanctity,' showing the Senate's readiness to bypass law and use force, setting a dangerous precedent."}], "id": "q02"}, {"question": "A newly elected Tribune of the Plebs discovers a Senator attempting to pass a law that would severely restrict the rights of ordinary citizens. According to the definition provided, what is the Tribune's most immediate and constitutionally recognized power to counter this action?", "options": [{"text": "To order the Senator's immediate arrest and trial for abuse of power.", "isCorrect": false, "rationale": "While Tribunes protected citizens, their primary power was not to directly arrest a Senator. Their core constitutional power against legislative action was the veto."}, {"text": "To appeal directly to the consuls to overturn the Senate's decision.", "isCorrect": false, "rationale": "The Tribune's power was independent of the consuls and Senate; appealing to them would not be their *most immediate and constitutionally recognized power* to block a law."}, {"text": "To exercise their power of 'veto' to block the proposed law.", "isCorrect": true, "rationale": "The definition explicitly states, 'Tribunes had the power of veto (Latin: “I forbid”)—the ability to block any action by the Senate or the consuls.' This is their most direct constitutional means to protect plebeian interests against legislation."}, {"text": "To rally a private army to intimidate the Senate into withdrawing the proposal.", "isCorrect": false, "rationale": "This describes actions taken *after* the breakdown of the Republic's constitutional norms, as exemplified by Sulla or Caesar, not a recognized power of a Tribune of the Plebs within the constitutional framework."}], "id": "q03"}, {"question": "Gaius Marius's decision to open the Roman army to landless volunteers had profound and ultimately destructive consequences for the Republic because it:", "options": [{"text": "Significantly reduced the size and effectiveness of the Roman legions due to a lack of trained recruits.", "isCorrect": false, "rationale": "The text states Marius made the decision because 'the legions needed more men than the property-owning class could provide,' implying it *solved* the immediate problem of manpower, not reduced the army's size or effectiveness."}, {"text": "Created a professional army whose loyalty was primarily to their general, not to the state or its institutions.", "isCorrect": true, "rationale": "The text clearly explains, 'After Marius, Roman soldiers were landless men who had nothing outside their military career. They depended entirely on their general for pay, equipment, land grants at retirement, and a share of plunder. Their loyalty was to him—not to the Senate, not to the Republic, not to Rome.'"}, {"text": "Led to a massive increase in Rome's military budget, bankrupting the state and causing economic collapse.", "isCorrect": false, "rationale": "While military expenses are relevant, the text does not focus on this as the 'profound and ultimately destructive consequence' but rather on the shift in loyalty and its political implications."}, {"text": "Prompted a widespread rebellion among the existing property-owning citizen-soldiers who felt their status was diminished.", "isCorrect": false, "rationale": "The text highlights the *new* loyalty of the landless soldiers and its impact on the generals' power, not a rebellion from the previously established citizen-soldiers."}], "id": "q04"}, {"question": "Lucius Cornelius Sulla's actions, particularly marching his legions on Rome and implementing proscription lists, represented a critical turning point in the Republic's decline. Which of the following statements best explains the significance of these actions?", "options": [{"text": "Sulla successfully restored the Republic's commitment to resolving political disputes through law and argument.", "isCorrect": false, "rationale": "Sulla's actions (marching on Rome, executing enemies, proscription lists) were themselves a violent breach of legal and political norms, directly contradicting any idea of restoring dispute resolution through law and argument."}, {"text": "Sulla demonstrated that a general could seize and wield absolute power through military force, setting a dangerous precedent for future strongmen.", "isCorrect": true, "rationale": "Sulla was the 'first time in Roman history a Roman general had done so' (marched on Rome) and 'introduced proscription as a political weapon.' The text explicitly states, 'This is exactly what happened next, and would happen again and again until the Republic was dead,' highlighting the precedent set."}, {"text": "Sulla's reforms permanently secured the Senate's authority and prevented further civil wars for generations.", "isCorrect": false, "rationale": "The text states that after Sulla, 'Rome stumbled through a generation of instability,' and his 'restoration' of the Senate was ultimately ineffective, leading to figures like Caesar, Pompey, and Crassus."}, {"text": "Sulla initiated the practice of granting Roman citizenship to Italian allies, thereby strengthening national unity.", "isCorrect": false, "rationale": "Gaius Gracchus had proposed extending citizenship to Italian allies, but Sulla's actions were focused on using military power and proscription to eliminate political enemies and consolidate his own power, not on national unity through citizenship extension."}], "id": "q05"}, {"question": "The formation of the First Triumvirate by Caesar, Pompey, and Crassus marked a significant step in the erosion of republican governance because it:", "options": [{"text": "Was a formal constitutional body created by Senate decree to address national crises.", "isCorrect": false, "rationale": "The text describes it as an 'informal private agreement' and explicitly states they were 'cutting the Senate out of major decisions,' meaning it was not a formal, constitutional body."}, {"text": "Successfully brought an end to the factional disputes that plagued the late Republic, ushering in a period of peace.", "isCorrect": false, "rationale": "The Triumvirate itself ultimately disintegrated, leading to further civil war between Caesar and Pompey, indicating it did not bring an end to factional disputes or usher in peace."}, {"text": "Centralized military command under a single, constitutionally appointed general, making the army more efficient.", "isCorrect": false, "rationale": "It was an alliance of three men sharing power, not a single command, and it was 'extra-constitutional' or 'informal,' not 'constitutionally appointed.'"}, {"text": "Represented an extra-constitutional power-sharing agreement that bypassed and undermined the Senate's authority.", "isCorrect": true, "rationale": "The text calls it an 'informal private agreement to divide power among themselves, cutting the Senate out of major decisions,' directly indicating it operated outside and against established republican structures and authority."}], "id": "q06"}, {"question": "Caesar's 'Commentarii de Bello Gallico' served a dual purpose during his campaigns in Gaul. Beyond documenting his military achievements, how else did this work primarily function for Caesar?", "options": [{"text": "As an academic historical record intended for future generations of scholars.", "isCorrect": false, "rationale": "While historically significant, the text emphasizes its immediate political function: 'shaped how Rome perceived him' and 'he was his own publicist,' indicating a purpose beyond purely academic record-keeping."}, {"text": "As a personal journal to reflect on the moral implications of conquest and warfare.", "isCorrect": false, "rationale": "The text describes it as 'deliberately plain, clear Latin prose style that simultaneously documented his triumphs,' not as a platform for personal moral reflection."}, {"text": "As a strategic military manual for training future Roman generals in tactical warfare.", "isCorrect": false, "rationale": "Its focus was on Caesar's 'triumphs' and shaping his image, not explicitly on providing instructional content for military tactics, though it naturally described campaigns."}, {"text": "As a powerful tool of self-promotion and propaganda, shaping public opinion in Rome in his favor.", "isCorrect": true, "rationale": "The text explicitly states Caesar 'wrote his own record...in a deliberately plain, clear Latin prose style that simultaneously documented his triumphs and shaped how Rome perceived him. He was not just a general; he was his own publicist.'"}], "id": "q07"}, {"question": "A modern CEO faces a difficult decision: either commit the company's entire budget to a risky new product line, potentially leading to enormous success or complete failure, or continue with current, stable but low-growth operations. After much deliberation, the CEO decides to launch the new product. This decision is best described by the idiom from the text:", "options": [{"text": "'Seizing the opportunity.'", "isCorrect": false, "rationale": "While the CEO is seizing an opportunity, this phrase lacks the specific nuance of irreversible commitment implied by Caesar's action and the text's explanation of the idiom."}, {"text": "'The die is cast.'", "isCorrect": true, "rationale": "The text's 'key concept' box directly explains 'Crossing the Rubicon' as 'a phrase for an irreversible decision' and mentions Caesar's reported words 'The die is cast,' signifying a point of no return after careful consideration."}, {"text": "'Playing it safe.'", "isCorrect": false, "rationale": "The scenario describes a 'risky new product line' with potential for 'complete failure,' which is the opposite of playing it safe."}, {"text": "'Weighing the options.'", "isCorrect": false, "rationale": "The CEO has already *made* the decision ('decides to launch'), whereas 'weighing the options' refers to the process *before* the decision is finalized."}], "id": "q08"}, {"question": "The text offers a nuanced perspective on Julius Caesar, noting that 'simple villains and simple heroes are rarely accurate descriptions of real historical actors.' Considering this, what does the assassination of Caesar primarily reveal about the late Republic?", "options": [{"text": "That Caesar was unequivocally a tyrant whose death was necessary for Rome's survival as a republic.", "isCorrect": false, "rationale": "The 'caution' box directly contradicts this, stating Caesar's policies were 'genuinely popular and even beneficial' and his opponents were 'self-interested aristocrats,' making a simple 'tyrant' label inaccurate from the text's perspective."}, {"text": "That the conspirators had a clear and unified vision for restoring a functional Republic through his removal.", "isCorrect": false, "rationale": "The text explicitly states, 'The conspirators had no plan for what came next,' undermining the idea of a clear and unified vision for restoration."}, {"text": "That deeply divided political factions resorted to extreme violence, demonstrating the irreparable breakdown of constitutional norms and processes.", "isCorrect": true, "rationale": "The assassination itself was an extreme act of violence to resolve a political dispute, following a pattern set by the Gracchi murders and Sulla's proscriptions. The conspirators' failure and the ensuing civil war show that such violence did not restore the Republic but deepened its crisis, indicating a total breakdown of constitutional methods."}, {"text": "That the Roman populace universally celebrated Caesar's death as a return to freedom and stability.", "isCorrect": false, "rationale": "The text mentions that 'Mark Antony...turned public opinion against the conspirators at Caesar's funeral,' indicating the populace was not universally celebratory and that the assassination led to instability, not freedom."}], "id": "q09"}, {"question": "The Second Triumvirate differed significantly from the First Triumvirate and highlighted the Republic's final demise. Which statement accurately describes a key characteristic of the Second Triumvirate and its impact?", "options": [{"text": "It was an informal agreement among three powerful men, similar to the First Triumvirate, but more effective in restoring stability.", "isCorrect": false, "rationale": "The text states it was a 'formal, legally recognized alliance,' unlike the informal First Triumvirate, and it 'ruled Rome by terror,' which indicates instability and suppression rather than restoration of order."}, {"text": "It represented a successful attempt to re-establish the Senate's supremacy after Caesar's dictatorship.", "isCorrect": false, "rationale": "The Second Triumvirate 'ruled Rome by terror' and posted 'proscription lists of its enemies,' which is antithetical to restoring the Senate's supremacy; it was a dictatorship by committee."}, {"text": "Its primary goal was to extend Roman citizenship to all provincials, a reform championed by Cicero.", "isCorrect": false, "rationale": "Extending citizenship was a policy of Caesar, and Cicero was *killed* by the Second Triumvirate (specifically appearing on Antony's list), making this statement incorrect regarding both the Triumvirate's goals and Cicero's fate."}, {"text": "It was a formal, legally recognized alliance that used terror and proscription lists to eliminate political enemies, signaling the end of the rule of law.", "isCorrect": true, "rationale": "The text explicitly calls it a 'formal, legally recognized alliance of Octavian, Antony, and Lepidus—which ruled Rome by terror, posting proscription lists of its enemies.' The murder of Cicero, 'the greatest defender of the Republic,' through proscription further underscores the end of the rule of law."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
