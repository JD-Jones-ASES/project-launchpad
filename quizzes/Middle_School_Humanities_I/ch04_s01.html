<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The primary problem Tiberius Gracchus sought to address through his land reform proposals was:", "options": [{"text": "The growing power of military generals over the Senate.", "isCorrect": false, "rationale": "While the power of generals became a critical issue later with Marius and Sulla, Tiberius Gracchus's initial focus was on land reform to benefit the small farmers, which is explicitly stated in the text."}, {"text": "The decline of the independent small farmer and the concentration of wealth in the hands of the elite.", "isCorrect": true, "rationale": "The text states, 'Senators and their allies bought up enormous tracts of land...and pushed the small independent farmer off his land. That farmer had been the backbone of the Roman legions.' Tiberius Gracchus saw this problem clearly and proposed redistributing public land to the landless poor."}, {"text": "The need to extend Roman citizenship to Rome's Italian allies.", "isCorrect": false, "rationale": "Extending Roman citizenship to Italian allies was a proposal made by his brother, Gaius Gracchus, later on, not Tiberius's primary focus."}, {"text": "The corruption within the provincial governorships.", "isCorrect": false, "rationale": "While corruption was a persistent issue in the Republic, the text specifically identifies Tiberius's reform efforts as centered on land redistribution for the poor, not provincial corruption."}]}, {"question": "The murder of Tiberius Gracchus represented a critical turning point in the Roman Republic because it:", "options": [{"text": "Signaled the complete abolition of the office of Tribune of the Plebs.", "isCorrect": false, "rationale": "The office of Tribune of the Plebs continued to exist after Tiberius's murder; it was its sacrosanctity and the Republic's commitment to lawful dispute resolution that were violated, not the office itself abolished."}, {"text": "Demonstrated the Senate's willingness to use violence to obstruct legal reforms and political disputes.", "isCorrect": true, "rationale": "The text explicitly states, 'The Republic's commitment to resolving political disputes through argument and law had cracked' after Tiberius was 'beat him to death with chairs and club legs' by a mob of senators and thugs."}, {"text": "Directly led to the immediate rise of military dictatorships.", "isCorrect": false, "rationale": "While it paved the way for future violence and military interventions, the first military dictator (Sulla) rose decades after Tiberius's death, not immediately."}, {"text": "Prompted a swift and successful constitutional reform to prevent future violence.", "isCorrect": false, "rationale": "The opposite occurred; after the Gracchi, 'both reformers and conservatives would increasingly reach for force rather than argument,' indicating a failure to prevent future violence through reform."}]}, {"question": "According to the provided definition, if a Tribune of the Plebs attempted to block a consul's decree, what power would they be exercising, and why would their person generally be safe from harm?", "options": [{"text": "They would be using 'proscription' and be safe due to senatorial protection.", "isCorrect": false, "rationale": "Proscription was a list of enemies of the state, not a Tribune's power. Tribunes were meant to be safe due to sacrosanctity, not senatorial protection (which often opposed them)."}, {"text": "They would be using 'veto' power, and their person was legally 'sacrosanct.'", "isCorrect": true, "rationale": "The 'definitionTribune of the Plebs' box states that Tribunes 'had the power of veto (Latin: “I forbid”)—the ability to block any action by the Senate or the consuls' and that 'Their persons were sacrosanct (legally untouchable).'"}, {"text": "They would be using 'dictatorial' power, and protected by their personal army.", "isCorrect": false, "rationale": "Tribunes did not hold dictatorial power, nor did they command personal armies; these were powers associated with generals like Sulla and Caesar."}, {"text": "They would be using 'triumvirate' power, and immune due to popular support.", "isCorrect": false, "rationale": "Triumvirates were specific alliances of powerful men, not an inherent power of a Tribune. While popular support was important, their legal safety came from sacrosanctity."}]}, {"question": "Gaius Marius's decision to open the army to landless volunteers fundamentally weakened the Republic by:", "options": [{"text": "Increasing the overall size of the Roman army beyond sustainable limits.", "isCorrect": false, "rationale": "The text doesn't focus on army size being unsustainable, but rather the *nature* of the soldiers' loyalty. Marius's reforms solved 'the immediate problem' of needing more men."}, {"text": "Creating a professional military whose loyalty was primarily to their general, not to the state or constitution.", "isCorrect": true, "rationale": "The 'keyconceptWhy the Army Reforms Destroyed the Republic' explicitly states, 'Marius's reforms created an army of men whose entire livelihood depended on their general. Their loyalty was to him—not to the Senate, not to the Republic, not to Rome.'"}, {"text": "Forcing senators to personally fund and equip their legions.", "isCorrect": false, "rationale": "The text states that landless soldiers 'depended entirely on their general for pay, equipment, land grants at retirement,' not on senators directly."}, {"text": "Exacerbating the problem of land shortages for small farmers.", "isCorrect": false, "rationale": "Marius's reforms offered a livelihood to landless men, but the *consequence* was political instability due to shifted loyalties, not a direct exacerbation of land shortages. The land shortage problem predated and contributed to the need for Marius's reforms."}]}, {"question": "Lucius Cornelius Sulla introduced proscription lists primarily as a means to:", "options": [{"text": "Reward loyal soldiers with confiscated land.", "isCorrect": false, "rationale": "While rewards and confiscated property were a *consequence* of proscription, the 'definitionProscription' box clearly states it was 'A public list of enemies of the state... whose lives were forfeit' and was introduced as 'a political weapon.'"}, {"text": "Systematically eliminate political enemies and consolidate his power.", "isCorrect": true, "rationale": "The text states Sulla 'marched his legions on Rome itself... seized the city, executed his enemies, and issued proscription lists: lists of men who could be killed by anyone for a reward, their property then confiscated.' This was a tool for eliminating opposition."}, {"text": "Fund public works projects after a period of civil war.", "isCorrect": false, "rationale": "The text does not link proscription lists to funding public works; their purpose was explicitly political elimination and wealth confiscation from enemies."}, {"text": "Identify citizens eligible for military service.", "isCorrect": false, "rationale": "Proscription lists were for identifying and eliminating enemies of the state, not for military recruitment."}]}, {"question": "The formation of the First Triumvirate between Caesar, Pompey, and Crassus was significant because it demonstrated:", "options": [{"text": "A renewed commitment by leading figures to traditional republican institutions.", "isCorrect": false, "rationale": "The text states it was 'an informal private agreement to divide power among themselves, cutting the Senate out of major decisions,' which indicates a *departure* from, not a commitment to, traditional republican institutions."}, {"text": "The Senate's successful attempt to centralize power through a formal alliance.", "isCorrect": false, "rationale": "It was an 'informal private agreement' that *cut the Senate out*, not an initiative by the Senate itself."}, {"text": "That informal personal alliances were replacing constitutional processes in governing Rome.", "isCorrect": true, "rationale": "The text describes it as 'an informal private agreement to divide power among themselves, cutting the Senate out of major decisions,' highlighting the shift from formal constitutional governance to personal power brokering."}, {"text": "The complete collapse of the Roman army's loyalty to the state.", "isCorrect": false, "rationale": "While army loyalty was a background issue (thanks to Marius), the First Triumvirate itself was a political alliance among three powerful men, not a direct cause or symptom of the army's collapse of loyalty."}]}, {"question": "When Caesar crossed the Rubicon, the phrase 'The die is cast' implies what about his decision and its broader historical significance?", "options": [{"text": "He was making a rash decision without considering the consequences.", "isCorrect": false, "rationale": "Plutarch's account says he 'revolved with himself, and often changed his opinion one way and the other,' indicating deep consideration, not a rash decision."}, {"text": "He was engaging in a traditional Roman legal ceremony.", "isCorrect": false, "rationale": "Crossing the Rubicon with an army was an act of war against the state, not a legal ceremony."}, {"text": "He was taking an irreversible step with full knowledge of its profound and dangerous implications.", "isCorrect": true, "rationale": "The 'keyconceptThe Rubicon and the Point of No Return' box states: 'The phrase is a reminder that some decisions cannot be undone; the time to consider their consequences is before taking the step, not after. Caesar knew this, crossed anyway, and changed the world.'"}, {"text": "He was signaling his intention to retire from military life peacefully.", "isCorrect": false, "rationale": "Crossing the Rubicon was an act of defiance against the Senate's order to disband his army and return as a private citizen; it was an act of war, not peaceful retirement."}]}, {"question": "The conspirators who assassinated Julius Caesar on the Ides of March hoped to restore the Roman Republic. However, their actions ultimately led to:", "options": [{"text": "A period of stability under a reformed Senate.", "isCorrect": false, "rationale": "The text clearly states, 'The assassination had solved nothing. It opened fifteen more years of civil war,' directly contradicting the idea of stability or a reformed Senate."}, {"text": "The immediate establishment of a new monarchy with Mark Antony as king.", "isCorrect": false, "rationale": "While Antony seized influence, he did not immediately become king. The assassination led to civil war and the rise of the Second Triumvirate, not an immediate monarchy."}, {"text": "A swift decline in Roman power and influence abroad.", "isCorrect": false, "rationale": "Despite internal turmoil, Roman power and expansion continued through this period and into the Empire, as demonstrated by Octavian's consolidation of power."}, {"text": "Fifteen more years of civil war, ending with the rise of Octavian as the sole power.", "isCorrect": true, "rationale": "The text states, 'The assassination had solved nothing. It opened fifteen more years of civil war,' which concluded with Octavian's victory at Actium and his subsequent rise to sole power."}]}, {"question": "How did the Second Triumvirate, composed of Octavian, Antony, and Lepidus, distinguish itself from the First Triumvirate?", "options": [{"text": "It was a public, legally sanctioned alliance that used terror and proscription.", "isCorrect": true, "rationale": "The text explicitly describes the Second Triumvirate as 'a formal, legally recognized alliance... which ruled Rome by terror, posting proscription lists of its enemies.' This contrasts with the First Triumvirate's 'informal private agreement.'"}, {"text": "It was an informal, private agreement focused solely on military conquest.", "isCorrect": false, "rationale": "This description matches the First Triumvirate (informal, private agreement) and while military conquest was part of their power, the Second Triumvirate was a legally recognized governing body."}, {"text": "It successfully restored the Senate's full authority and influence.", "isCorrect": false, "rationale": "The Second Triumvirate ruled 'by terror' and used proscription lists against political enemies (like Cicero), directly undermining senatorial authority rather than restoring it."}, {"text": "It was primarily concerned with distributing land to the poor and extending citizenship.", "isCorrect": false, "rationale": "While land distribution to veterans was a factor in all these power struggles, the defining characteristic of the Second Triumvirate was its formal, terror-based rule and political elimination, not primarily social reform."}]}, {"question": "Upon becoming the sole power in Rome after the Battle of Actium, Octavian avoided the titles of 'king' or 'dictator' primarily because:", "options": [{"text": "He believed in the restoration of a purely democratic system.", "isCorrect": false, "rationale": "Octavian consolidated immense personal power, effectively ending the Republic, which is the antithesis of restoring a purely democratic system."}, {"text": "These titles were legally forbidden by Roman constitutional law.", "isCorrect": false, "rationale": "While 'king' was deeply unpopular and 'dictator' had been outlawed after Caesar's perpetual dictatorship, Octavian's actions were driven by political pragmatism rather than strict legal prohibition, as he effectively circumvented existing laws."}, {"text": "He sought to consolidate power while maintaining the *appearance* of adhering to Republican forms and avoiding controversial titles.", "isCorrect": true, "rationale": "The text states, 'He did not call himself king. He did not call himself dictator. He accumulated powers one by one,' indicating a strategic effort to gain ultimate power without provoking the fears associated with those titles, thus maintaining a facade of Republicanism."}, {"text": "He intended to retire from public life immediately after achieving victory.", "isCorrect": false, "rationale": "Octavian ruled for decades as Augustus, becoming the first Roman Emperor; he had no intention of retiring after Actium."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
