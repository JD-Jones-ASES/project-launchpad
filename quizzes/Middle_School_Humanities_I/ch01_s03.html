<body>
<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 1, Section 3</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did the ancient Greeks primarily perceive the Aegean Sea, according to the text?", "options": [{"text": "As a natural barrier that separated distinct cultural regions.", "isCorrect": false, "rationale": "The text explicitly states, 'For the ancient Greeks, the sea was not a barrier.' It facilitated, rather than hindered, connection."}, {"text": "As a central highway facilitating connection and cultural exchange.", "isCorrect": true, "rationale": "The text highlights the Aegean as 'not a barrier. It was a highway.' and 'the organizing principle of Greek civilization,' connecting communities for trade, travel, and cultural exchange."}, {"text": "As a dangerous expanse best avoided by most travelers.", "isCorrect": false, "rationale": "The text contradicts this by describing the sea as a 'highway' and noting how 'Every major cultural exchange... moved along Aegean sea lanes,' implying frequent and safe travel."}, {"text": "As a resource primarily for fishing and naval defense.", "isCorrect": false, "rationale": "While the sea was certainly used for fishing and defense, its primary perception and role, as emphasized in the text, was as a 'connective tissue' and 'highway' for broader interaction and civilization."}]}, {"question": "The text states, 'The sea connected far more readily than the mountains divided.' What is the most significant political implication of this geographic reality for ancient Greece?", "options": [{"text": "It encouraged the formation of a unified Greek empire under a single ruler.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'This geography directly caused the political fragmentation of Greece. A unified Greek nation... would have required either a powerful conqueror or easy communication. Greece had neither.'"}, {"text": "It fostered the development of numerous independent city-states (poleis) rather than a unified nation.", "isCorrect": true, "rationale": "The mountains divided the land into self-contained communities, leading to 'political fragmentation' and 'hundreds of independent poleis,' as the sea allowed each community access to trade without needing overland unity."}, {"text": "It led to a strong emphasis on naval warfare and maritime dominance among all city-states.", "isCorrect": false, "rationale": "While some city-states developed naval power, the most significant political implication was the fragmentation into independent states, not universal naval emphasis (e.g., Sparta was land-based)."}, {"text": "It primarily restricted trade to within local valleys, limiting broader economic interaction.", "isCorrect": false, "rationale": "The text clarifies that the sea allowed for extensive trade, overcoming the isolation caused by mountains."}]}, {"question": "A newly discovered ancient Greek settlement is excavated. Archaeologists find a large, open area at the base of a fortified hill, containing remnants of stalls, a public assembly space, and legal inscriptions. What does this discovery most strongly suggest about the settlement?", "options": [{"text": "It was primarily a military outpost, with the fortified hill serving as a barracks.", "isCorrect": false, "rationale": "While the fortified hill (acropolis) had military importance, the description of an open area with stalls, assembly space, and legal inscriptions points to civilian and commercial functions, not exclusively military."}, {"text": "The settlement possessed an agora, serving as its economic and civic heart.", "isCorrect": true, "rationale": "The description perfectly matches that of an agora: 'At the foot of the acropolis lay the agora, the city's open marketplace and civic center. The agora was where merchants sold goods, where citizens gathered to vote or hear announcements, where philosophers argued, and where courts met.'"}, {"text": "The community was focused exclusively on agricultural production, with the open area for storing crops.", "isCorrect": false, "rationale": "The presence of assembly spaces, legal inscriptions, and stalls indicates diverse civic and commercial activities beyond just agricultural storage."}, {"text": "Its political structure was likely an absolute monarchy with the fortified hill as the king's residence.", "isCorrect": false, "rationale": "The presence of a public assembly space suggests citizen participation, which is inconsistent with an absolute monarchy."}]}, {"question": "What was the primary reason for widespread Greek colonization in the 8th and 7th centuries BC?", "options": [{"text": "The desire to spread a unified Greek empire and military influence across the Mediterranean.", "isCorrect": false, "rationale": "The text explicitly states, 'The Greeks did not build an empire with a capital city and an army of occupation.'"}, {"text": "A growing population coupled with insufficient arable land in the mother cities.", "isCorrect": true, "rationale": "The text clearly states: 'As the population of Greek city-states grew in the eighth and seventh centuries BC, many cities faced a familiar problem: not enough farmland for their growing citizens. The solution was colonization.'"}, {"text": "The need to establish naval bases to protect existing trade routes from rival powers.", "isCorrect": false, "rationale": "While strategic location might have been a factor, the primary driver stated was population pressure and lack of farmland, not defense."}, {"text": "A religious mandate to spread Greek deities and worship practices to new lands.", "isCorrect": false, "rationale": "While religion spread with colonization, the text identifies population growth and lack of farmland as the 'primary reason' for the expansion itself."}]}, {"question": "The text identifies Sparta as 'the great exception' among Greek city-states regarding its relationship with the sea. How did Sparta's inland location influence its development compared to other major poleis?", "options": [{"text": "It forced Sparta to rely heavily on maritime trade for its economy and food supply.", "isCorrect": false, "rationale": "The text states Sparta 'had no direct access to the sea,' making heavy reliance on sea trade impossible."}, {"text": "It meant Sparta developed its power through land-based agriculture and military conquest, rather than sea trade.", "isCorrect": true, "rationale": "The text explains: 'Sparta is the great exception: located well inland... it had no direct access to the sea. This explains much about Sparta's character: it was the one major city-state that had to build its power on land—through agriculture and military conquest—rather than through sea trade.'"}, {"text": "It led Sparta to prioritize naval power and control of the Aegean Sea.", "isCorrect": false, "rationale": "As a landlocked city-state, Sparta's focus was on land power, not naval power, which contradicts the text's description."}, {"text": "It made Sparta more open to foreign cultural influences due to its isolation from the sea.", "isCorrect": false, "rationale": "Isolation from sea trade would generally lead to *less* foreign cultural influence, not more. Sparta was known for its distinct, insular culture."}]}, {"question": "Which of the following was a key export for Greek city-states, made possible by their local landscape and climate?", "options": [{"text": "Grain", "isCorrect": false, "rationale": "Grain was a critical *import* for Greek city-states, particularly from the Black Sea region, due to limited arable land in Greece."}, {"text": "Timber", "isCorrect": false, "rationale": "Timber was an *import*, primarily from Macedonia and the Black Sea region, because the Greek peninsula was largely deforested."}, {"text": "Olive oil", "isCorrect": true, "rationale": "The text explicitly states: 'The Greek climate is nearly perfect for olive trees... Athenian olive oil was prized across the Mediterranean,' making it a key export."}, {"text": "Gold", "isCorrect": false, "rationale": "Gold was an *import*. While silver was mined locally (Laurium), olive oil and wine were the primary climate-dependent agricultural exports mentioned."}]}, {"question": "The text mentions that 'Athenian democracy depended on keeping the Black Sea grain route open.' What does this statement reveal about the relationship between Athenian politics, economy, and geography?", "options": [{"text": "It shows that Athenian democratic values were directly exported along this trade route.", "isCorrect": false, "rationale": "While trade facilitated cultural exchange, the statement specifically links democracy's *survival* to the grain route, not the export of democratic values."}, {"text": "It highlights the critical role of external food supply and maritime control in sustaining Athens' political stability.", "isCorrect": true, "rationale": "With limited arable land, Athens relied on grain imports (economy). Securing the sea route (geography/maritime control) was vital to feed its population, preventing unrest that could undermine its political system (democracy)."}, {"text": "It suggests that Black Sea colonies were key political allies in Athenian democratic processes.", "isCorrect": false, "rationale": "The Black Sea colonies were primarily economic partners for grain, not direct participants or allies in Athenian democratic governance."}, {"text": "It proves that Athenian democracy was inherently weaker than land-based political systems.", "isCorrect": false, "rationale": "It reveals a specific dependency, but does not inherently prove overall weakness compared to all land-based systems; rather, it highlights the interconnectedness of their system."}]}, {"question": "A historian studying ancient trade routes finds a distinct style of Athenian pottery with mythological scenes widely distributed in a distant colony like Massalia. Based on the text's 'Trade as a Driver of Cultural Exchange' concept, what can this historian infer?", "options": [{"text": "Massalia must have been an Athenian military outpost, securing trade routes.", "isCorrect": false, "rationale": "The presence of pottery indicates trade, not necessarily a military outpost. The text emphasizes trade as a cultural, not just military, conduit."}, {"text": "The pottery was likely a medium through which Athenian myths and cultural values spread to Massalia.", "isCorrect": true, "rationale": "The 'keyconcept Trade as a Driver of Cultural Exchange' section states: 'When a Corinthian merchant sold pottery in Massalia... he brought with him myths painted on the vessels... and ideas about the gods.' This directly supports the inference."}, {"text": "Massalia was technologically incapable of producing its own pottery and relied entirely on imports.", "isCorrect": false, "rationale": "While they might have imported, the presence of Athenian pottery doesn't indicate a complete lack of local production, nor is that the primary inference about cultural exchange."}, {"text": "The widespread distribution indicates a lack of unique Massalian cultural identity, mirroring Athenian practices.", "isCorrect": false, "rationale": "Trade introduces influences, but doesn't necessarily erase local identity. The point is the *spread* of ideas, not the complete *assimilation*."}]}, {"question": "The text contrasts the Greek colonial network with the concept of an empire. What was a defining characteristic of the Greek colonial expansion?", "options": [{"text": "It was a centrally controlled political entity with a unified military and administration.", "isCorrect": false, "rationale": "The text explicitly states: 'The Greeks did not build an empire with a capital city and an army of occupation.'"}, {"text": "It consisted of independent city-states maintaining cultural and religious ties to their mother cities.", "isCorrect": true, "rationale": "The text describes colonization as establishing new cities that 'maintain cultural and religious ties to the 'mother city' (m\\=etropolis)' and later mentions 'a network of like-minded communities, each independent'."}, {"text": "Its primary goal was to impose Greek political systems and language on conquered populations.", "isCorrect": false, "rationale": "While Greek culture spread, the colonies were founded by citizens seeking new farmland, and they were independent, not imposed through conquest."}, {"text": "It was a short-lived phenomenon, quickly absorbed by larger neighboring empires.", "isCorrect": false, "rationale": "The text states: 'This network would prove more durable than any empire: even when political independence was lost—to Macedonia, then to Rome—Greek language and culture survived... for another thousand years.'"}]}, {"question": "The invention of coinage, as described in the text, had a significant impact on ancient Greek society. Which of the following best describes its most immediate and widespread effect?", "options": [{"text": "It led directly to the establishment of a unified Greek economic and political system.", "isCorrect": false, "rationale": "While coinage standardized exchange, the text consistently highlights the political fragmentation of Greece into independent city-states, despite shared currency."}, {"text": "It standardized commerce across a wide geographical area, facilitating trade.", "isCorrect": true, "rationale": "The text explicitly states: 'Commerce across such a wide area required a standard medium of exchange. The solution was money—specifically, metal coinage... The coins were so widely trusted and widely circulated that they became a de facto international currency across the eastern Mediterranean.'"}, {"text": "It caused a shift from sea-based trade to overland caravan routes for goods.", "isCorrect": false, "rationale": "The text continues to emphasize sea lanes as the primary means of long-distance trade, even with coinage. Coinage facilitated trade, regardless of the transport method."}, {"text": "It resulted in the immediate decline of the barter system and local economies.", "isCorrect": false, "rationale": "While it facilitated broader commerce, the text focuses on its role in *wide area* exchange rather than implying the immediate and complete eradication of local barter systems."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
