    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary obligation of a dramatist, according to the text?", "options": [{"text": "To accurately document what historically happened.", "isCorrect": false, "rationale": "This is described as the primary obligation of a historian, not a dramatist."}, {"text": "To illuminate something true about human nature, even if events are altered.", "isCorrect": true, "rationale": "The text states: 'A dramatist's first obligation is to illuminate something true about human nature, even if that means compressing, inventing, or rearranging events.'"}, {"text": "To provide a complete biographical account of historical figures.", "isCorrect": false, "rationale": "While a dramatist might feature historical figures, their primary goal isn't a complete biography, but rather dramatic effect and revealing human nature."}, {"text": "To create entertaining plots that are completely fictional.", "isCorrect": false, "rationale": "The text implies that dramatists often draw from history but prioritize a different kind of 'truth' than pure factual accuracy, not necessarily creating completely fictional narratives."}], "id": "q01"}, {"question": "The invention of Caesar's line, 'Et tu, Brute?', despite its absence in Plutarch, serves which type of 'truth' as discussed in the 'teachernote'?", "options": [{"text": "Historical accuracy", "isCorrect": false, "rationale": "The text explicitly states that 'No such line appears in Plutarch,' meaning it lacks historical accuracy."}, {"text": "Dramatic plausibility", "isCorrect": false, "rationale": "While dramatically plausible, the primary reason for its inclusion, as explained by the text, goes deeper than mere plausibility to reveal a psychological state."}, {"text": "Literary truth", "isCorrect": true, "rationale": "The 'teachernote' defines 'literary truth' as 'what the scene reveals about human nature regardless of the exact facts.' The text explains that the line captures 'something psychologically true about the moment' of Brutus's betrayal, aligning with literary truth."}, {"text": "Factual reporting", "isCorrect": false, "rationale": "Factual reporting aligns with historical accuracy, which the line demonstrably lacks."}], "id": "q02"}, {"question": "In Act I, Scene ii, how does Cassius primarily appeal to Brutus to join the conspiracy against Caesar?", "options": [{"text": "By offering him a share of Caesar's wealth and power.", "isCorrect": false, "rationale": "The text states Cassius 'does not say 'let us kill Caesar for personal gain''; instead, he 'dress[es] self-interest in the language of principle.'"}, {"text": "By highlighting Caesar's personal failings and weaknesses.", "isCorrect": false, "rationale": "While he subtly undermines Caesar, his primary appeal to Brutus is not about Caesar's specific weaknesses but about their own perceived 'underling' status."}, {"text": "By appealing to Brutus's sense of Roman honor and republican ideals.", "isCorrect": true, "rationale": "The text states Cassius 'appeals to Brutus's sense of Roman honor and his fear that Caesar is becoming a king' and to 'the republican ideal of self-rule.'"}, {"text": "By directly accusing Caesar of tyranny and corruption.", "isCorrect": false, "rationale": "Cassius uses more subtle persuasion, speaking of 'we petty men' and 'masters of their fates,' rather than direct accusations against Caesar."}], "id": "q03"}, {"question": "Shakespeare's decision to portray Cassius as a 'jealous, scheming villain' rather than the 'competent military officer and experienced politician' of history serves what dramatic purpose?", "options": [{"text": "To adhere more closely to historical records of Cassius's personality.", "isCorrect": false, "rationale": "The text explicitly states this portrayal is a change from Plutarch/history, not an adherence to it."}, {"text": "To emphasize Cassius's military prowess and political skill.", "isCorrect": false, "rationale": "Shakespeare's portrayal downplays these aspects, focusing instead on his envy and manipulation."}, {"text": "To create a moral contrast with Brutus, making Brutus's motives appear purer.", "isCorrect": true, "rationale": "The 'shakespearebox' for Cassius states: 'By making Cassius the dark schemer, Shakespeare creates a moral contrast with Brutus, whose motives appear purer.'"}, {"text": "To make the tragedy more about political calculation than idealism gone wrong.", "isCorrect": false, "rationale": "The text says this change 'sharpen[s] the tragedy: it is the 'noble' Brutus who does the fatal deed, not the envious Cassius—making the story more about idealism gone wrong than about political calculation.'"}], "id": "q04"}, {"question": "Which of the following characteristics best describes Shakespeare's portrayal of Julius Caesar?", "options": [{"text": "Humble, cautious, and politically astute.", "isCorrect": false, "rationale": "Plutarch's Caesar is described as politically astute, but Shakespeare's Caesar is shown as proud and dismissive of warnings, not humble or cautious."}, {"text": "Proud, superstitious, and easily flattered.", "isCorrect": true, "rationale": "The 'shakespearebox' for Julius Caesar highlights that he is 'proud, superstitious, and somewhat rigid,' dismisses warnings, and 'is easily flattered.'"}, {"text": "A complex figure, genuinely beloved and personally brave.", "isCorrect": false, "rationale": "These traits are attributed to Plutarch's/historical Caesar, not primarily Shakespeare's portrayal, which heightens his flaws."}, {"text": "Weak-willed and indecisive.", "isCorrect": false, "rationale": "Shakespeare's Caesar, while flawed, is portrayed as arrogant and self-convinced, not weak-willed."}], "id": "q05"}, {"question": "Shakespeare heightens Caesar's arrogance in the play for what primary dramatic effect?", "options": [{"text": "To simplify the historical narrative for the audience.", "isCorrect": false, "rationale": "While it simplifies his character, the primary purpose is not just simplification but a deeper dramatic effect."}, {"text": "To make the conspirators' fears seem more justified while still ensuring his death is tragic.", "isCorrect": true, "rationale": "The 'shakespearebox' for Julius Caesar explains: 'Shakespeare heightens Caesar's arrogance to make the conspirators' fears seem more justified, while also making him human enough that his death is genuinely tragic.'"}, {"text": "To portray Caesar as a purely evil antagonist.", "isCorrect": false, "rationale": "The text states Shakespeare aims to make him 'human enough that his death is genuinely tragic,' indicating he's not purely evil."}, {"text": "To focus on the inaccuracies of Plutarch's account.", "isCorrect": false, "rationale": "Shakespeare uses Plutarch as a source but alters it for dramatic purposes, not to point out historical inaccuracies."}], "id": "q06"}, {"question": "What is the key rhetorical strategy Mark Antony employs in his funeral speech to turn the crowd against the conspirators?", "options": [{"text": "Directly accusing Brutus and the others of murder and treason.", "isCorrect": false, "rationale": "The text explicitly states: 'Antony never directly accuses Brutus of lying.' His approach is more subtle."}, {"text": "Speaking in plain, logical prose to appeal to reason.", "isCorrect": false, "rationale": "This describes Brutus's rhetorical style, which Antony then systematically dismantles with a different approach."}, {"text": "Using irony, evidence, and emotional manipulation to dismantle Brutus's case.", "isCorrect": true, "rationale": "The text details how Antony 'systematically uses evidence, irony, and emotion to reverse everything Brutus achieved,' and that his speech is a 'master class in how rhetoric actually works.'"}, {"text": "Presenting new, previously unknown historical facts about Caesar's ambition.", "isCorrect": false, "rationale": "Antony's 'evidence' (like refusing the crown or bringing captives home) reinterprets known actions, rather than presenting entirely new facts."}], "id": "q07"}, {"question": "In Antony's speech, how does the repeated phrase 'Brutus is an honourable man' evolve in its meaning?", "options": [{"text": "It consistently affirms Brutus's integrity, reinforcing his noble character.", "isCorrect": false, "rationale": "Antony uses the phrase ironically; its meaning flips over the course of the speech."}, {"text": "It serves as a genuine concession to Brutus's initial argument.", "isCorrect": false, "rationale": "While it starts with apparent humility, its repetition quickly becomes ironic and undermining, not a genuine concession."}, {"text": "It gradually becomes more ironic and cutting, ultimately turning into its opposite.", "isCorrect": true, "rationale": "The text states: 'Each repetition of 'Brutus is an honourable man' becomes more ironic, more cutting, until the phrase has become its own opposite.'"}, {"text": "It implies that Brutus is misguided but well-intentioned.", "isCorrect": false, "rationale": "The phrase goes beyond implying Brutus is misguided; it effectively dismantles his credibility through sustained irony."}], "id": "q08"}, {"question": "What is the main reason Shakespeare simplifies Brutus's motives, portraying him as purely principled rather than having mixed motives like the historical Brutus?", "options": [{"text": "To ensure historical accuracy regarding Brutus's character.", "isCorrect": false, "rationale": "The text explicitly states Shakespeare 'changed' Brutus's motives from the more complex historical account."}, {"text": "To create a clearer tragic structure of a good man undone by idealism.", "isCorrect": true, "rationale": "The 'shakespearebox' for Brutus states: 'By simplifying Brutus's motives and making him purely principled, Shakespeare creates the tragic structure: a good man doing a terrible thing for the right reasons, and being destroyed by the consequences.'"}, {"text": "To highlight the influence of Cassius and other conspirators on Brutus.", "isCorrect": false, "rationale": "While Cassius influences Brutus, the simplification of Brutus's inner motives is for his personal tragic arc."}, {"text": "To avoid offending the Roman aristocracy in his audience.", "isCorrect": false, "rationale": "The text does not mention audience sensibilities as the reason for this specific change."}], "id": "q09"}, {"question": "Portia's act of wounding herself in the thigh, as described in both Shakespeare and Plutarch, primarily demonstrates which of the following qualities?", "options": [{"text": "Her physical vulnerability and fragility.", "isCorrect": false, "rationale": "While a self-inflicted wound shows vulnerability, the text emphasizes it as an act of 'self-control' and 'courage,' not fragility."}, {"text": "Her unwavering loyalty and extraordinary self-control.", "isCorrect": true, "rationale": "The 'shakespearebox' for Portia describes it as 'a stunning act of self-control' done 'to prove she can keep secrets,' demonstrating her loyalty and resolve."}, {"text": "A cry for attention or medical help.", "isCorrect": false, "rationale": "Her action is described as deliberate and purposeful to prove constancy, not as a cry for help."}, {"text": "A superstitious ritual for good fortune.", "isCorrect": false, "rationale": "The act is presented as a demonstration of strength and reliability, not as a superstitious ritual."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
