    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following authors is NOT explicitly mentioned as contributing one of the three masterpieces of literature during the period from the Dark Ages to Charlemagne?", "options": [{"text": "Bede", "isCorrect": false, "rationale": "Bede's 'Ecclesiastical History' is listed as one of the three masterpieces."}, {"text": "Einhard", "isCorrect": false, "rationale": "Einhard's 'Life of Charlemagne' is listed as one of the three masterpieces."}, {"text": "Augustine of Hippo", "isCorrect": true, "rationale": "Augustine of Hippo is mentioned in a discussion prompt comparing his 'restless heart' concept to Bede's 'sparrow passage,' but his 'Confessions' is not listed as one of the three masterpieces of this specific period's literature mentioned at the beginning of the section."}, {"text": "Gregory the Great", "isCorrect": false, "rationale": "Gregory the Great's 'Pastoral Care' is listed as one of the three masterpieces."}], "id": "q01"}, {"question": "The Venerable Bede's historical methodology, as described in the text, demonstrates a sophisticated approach that was rare for his time. Which statement best characterizes his method?", "options": [{"text": "He primarily relied on legendary tales and oral traditions without verification, typical of most medieval chroniclers.", "isCorrect": false, "rationale": "The text explicitly states Bede 'distinguishes between eyewitness testimony and hearsay, and acknowledges uncertainty,' setting him apart from 'most medieval chroniclers' and closer to Thucydides."}, {"text": "He focused exclusively on primary written documents, dismissing oral testimony as unreliable.", "isCorrect": false, "rationale": "While Bede gathered written documents, he also collected 'oral testimony from monks who had known earlier monks,' indicating he used both."}, {"text": "He identified his sources, differentiated between eyewitness accounts and hearsay, and admitted limits to his knowledge.", "isCorrect": true, "rationale": "The text states Bede 'identifies his sources, distinguishes between eyewitness testimony and hearsay, and acknowledges uncertainty,' aligning him with careful historical scholarship."}, {"text": "He fabricated dialogues and speeches to enhance the dramatic effect of his historical narratives, similar to Herodotus.", "isCorrect": false, "rationale": "The text highlights Bede's rigorous methodology, contrasting him with typical medieval chroniclers and aligning him with Thucydides, known for seeking truth, not fabricating."}], "id": "q02"}, {"question": "Bede and Thucydides, despite being separated by centuries, shared a commitment to serious historical craft. However, they differed fundamentally in their understanding of what drives history. What was Bede's distinct view?", "options": [{"text": "History is primarily driven by human ambition and the desire for political power, leading to predictable cycles of conflict.", "isCorrect": false, "rationale": "This describes Thucydides' view, where history is driven by 'human nature: the desire for power, fear of rivals, and the calculations of self-interest.' Bede's view was different."}, {"text": "History is a random series of events, devoid of any overarching meaning or purpose.", "isCorrect": false, "rationale": "Bede's providential view of history explicitly states that God is guiding events toward a purpose, which contradicts the idea of random, meaningless events."}, {"text": "History is providential, guided by God's purposes, with human events fitting into a larger salvation narrative.", "isCorrect": true, "rationale": "The text explicitly states: 'For Bede, history is providential: God is guiding human events toward his purposes, and the conversion of the English people is not merely a political story but a chapter in salvation history.'"}, {"text": "History is shaped by economic forces and the material conditions of society, influencing social structures.", "isCorrect": false, "rationale": "The text does not mention economic forces as a driver for Bede's historical understanding; it focuses on divine providence."}], "id": "q03"}, {"question": "In the 'sparrow passage' from Bede's Ecclesiastical History, the flight of the sparrow through the mead-hall serves as a powerful metaphor. What central human experience and longing does it most effectively express?", "options": [{"text": "The fleeting nature of political power and the transience of earthly kingdoms.", "isCorrect": false, "rationale": "While life is fleeting, the passage's primary focus is on the individual human experience of life's brevity and the unknown before and after, not specifically political power."}, {"text": "The desire for material wealth and physical comfort in a harsh winter environment.", "isCorrect": false, "rationale": "The fire provides 'comforting fire,' but this is secondary to the deeper existential reflection on life's mystery, not a longing for wealth."}, {"text": "The universal human longing for meaning and permanence in the face of life's brevity and the unknown.", "isCorrect": true, "rationale": "The text directly states: 'it expresses the universal human longing for meaning and permanence, and frames the Gospel as an answer to that longing,' matching the description of the sparrow's brief warmth before returning to 'winter into winter again.'"}, {"text": "The necessity of embracing pagan traditions to survive the challenges of the natural world.", "isCorrect": false, "rationale": "The passage is spoken by a pagan counsellor debating whether to adopt Christianity, and it frames the Gospel as an answer to the longing, suggesting a move away from purely pagan perspectives on life's mysteries."}], "id": "q04"}, {"question": "Bede's account of Caedmon, the first named English poet, highlights a specific understanding of poetic inspiration. What distinguishes Caedmon's gift according to Bede?", "options": [{"text": "It was a result of diligent study and practice from a young age, demonstrating skill cultivated over time.", "isCorrect": false, "rationale": "The text states Caedmon 'had never learned anything of versifying' and would leave banquets to avoid singing, indicating he lacked prior skill or practice."}, {"text": "It was primarily a form of secular entertainment, focused on heroic deeds and courtly love.", "isCorrect": false, "rationale": "Caedmon was 'wont to make songs of piety and religion' and was commanded to 'Sing the beginning of creation,' showing a distinctly Christian and religious focus."}, {"text": "It was a divine inspiration, a gift given by God to an undeserving and reluctant individual, echoing Christian grace.", "isCorrect": true, "rationale": "The text explicitly states 'Bede's account frames the gift of poetry as divine inspiration' and notes 'The Christian emphasis on divine grace given to the undeserving echoes throughout Bede's account.'"}, {"text": "It was a natural talent, inherited from his family lineage of bards and storytellers.", "isCorrect": false, "rationale": "The text gives no indication of inherited talent; rather, it emphasizes his lack of prior ability before divine intervention."}], "id": "q05"}, {"question": "Einhard's *Life of Charlemagne* is noted for its deliberate imitation of classical forms. Which Roman biographer did Einhard explicitly model his work on?", "options": [{"text": "Plutarch", "isCorrect": false, "rationale": "While Einhard's work can be compared to Plutarch's in a discussion prompt, the text specifically states Einhard 'modeled it on Suetonius' Lives of the Twelve Caesars.'"}, {"text": "Livy", "isCorrect": false, "rationale": "Livy was a Roman historian, but Einhard modeled his biography on Suetonius."}, {"text": "Tacitus", "isCorrect": false, "rationale": "Tacitus was a Roman historian and biographer, but the text specifies Suetonius as Einhard's model."}, {"text": "Suetonius", "isCorrect": true, "rationale": "The text states Einhard 'modeled it on Suetonius' Lives of the Twelve Caesars—a deliberate act of Carolingian Renaissance culture, consciously imitating classical form.'"}], "id": "q06"}, {"question": "Einhard's portrayal of Charlemagne, while admiring, includes specific details that suggest he was not merely a flatterer. Which of the following details exemplifies this nuanced approach?", "options": [{"text": "He describes Charlemagne's majestic appearance and dignified demeanor.", "isCorrect": false, "rationale": "Physical descriptions like 'body was large and strong' and 'appearance was dignified' are typical of admiring portraits and don't necessarily show a critical eye."}, {"text": "He notes Charlemagne's failure to master writing despite considerable effort late in life.", "isCorrect": true, "rationale": "The text points out Einhard 'also notes his failure to learn to write despite great effort, which is not a detail a pure flatterer would include,' demonstrating Einhard's balanced perspective."}, {"text": "He praises Charlemagne's temperance in eating and drinking.", "isCorrect": false, "rationale": "Highlighting temperance is a positive moral evaluation, fitting for an admiring biographer, not a critical detail."}, {"text": "He emphasizes Charlemagne's fluency in Latin and understanding of Greek.", "isCorrect": false, "rationale": "These linguistic achievements are accomplishments that an admirer would readily highlight, not a failing or critical detail."}], "id": "q07"}, {"question": "What was the primary purpose of Gregory the Great's *Regula Pastoralis* (Pastoral Care)?", "options": [{"text": "To document the history of the early Church in England.", "isCorrect": false, "rationale": "Bede's 'Ecclesiastical History' served this purpose; Gregory's work was for ecclesiastical leadership."}, {"text": "To provide a detailed biography of Pope Gregory I's life and achievements.", "isCorrect": false, "rationale": "The book was a 'handbook for bishops,' not an autobiography of Gregory I."}, {"text": "To serve as a practical handbook for bishops on how to effectively teach and guide their congregations.", "isCorrect": true, "rationale": "The text states 'Gregory I's Regula Pastoralis (Pastoral Care) was a handbook for bishops, instructing them on how to teach and guide the diverse people in their care.'"}, {"text": "To outline a new system of monastic rules for Benedictine monasteries.", "isCorrect": false, "rationale": "While Gregory supported monasticism, the 'Pastoral Care' was specifically for bishops in their pastoral duties, not a monastic rule."}], "id": "q08"}, {"question": "According to Gregory the Great in *Pastoral Care*, why is a leader with a 'title or rank of holiness' who acts evilly particularly damaging to the Church?", "options": [{"text": "Their evil acts are more easily overlooked and go uncorrected due to the respect accorded to their position.", "isCorrect": true, "rationale": "Gregory states: 'For no one presumes to take to task a man who is honoured with the title of sanctity. And so the sin of the sinner becomes the more damnable, when a respect for his position protects him from correction.'"}, {"text": "Their sins are inherently worse than those committed by laypeople, regardless of the impact.", "isCorrect": false, "rationale": "The text emphasizes the *impact* of their position on the perception and correction of sin, not that their sins are qualitatively different in nature."}, {"text": "They are typically beyond the reach of ecclesiastical law and punishment.", "isCorrect": false, "rationale": "The passage focuses on the social and spiritual consequence of uncorrected sin due to respect, not a legal immunity."}, {"text": "Their actions provoke immediate widespread rebellion and schism within the Church.", "isCorrect": false, "rationale": "The passage highlights the insidious harm of uncorrected behavior due to deference, not overt rebellion."}], "id": "q09"}, {"question": "The section concludes by contrasting how classical historians (like Thucydides and Livy) and medieval authors (like Bede, Einhard, and Gregory) understood history. What is the fundamental difference highlighted?", "options": [{"text": "Classical historians sought to uncover economic motivations, while medieval authors focused on military strategies.", "isCorrect": false, "rationale": "The text describes classical historians observing 'human nature, seeking patterns of power, ambition, and hubris,' and medieval authors focusing on 'providential' guidance, not economic or military focus."}, {"text": "Classical historians viewed history as cyclical, whereas medieval authors saw it as linear progression.", "isCorrect": false, "rationale": "While subtle differences in cyclical vs. linear could be argued, the text's explicit contrast is between 'human nature' vs. 'providential' drivers."}, {"text": "Classical historians wrote as objective observers of human nature and power, while medieval authors understood history as providential, guided by God's determined end.", "isCorrect": true, "rationale": "The text explicitly states: 'All three writers understood history differently from the classical historians... Thucydides and Livy... wrote as observers of human nature, seeking patterns of power, ambition, and hubris. Bede, Einhard, and Gregory understood history as providential: God is guiding human events toward an end He has determined.'"}, {"text": "Classical historians focused on the lives of common people, while medieval authors concentrated on kings and emperors.", "isCorrect": false, "rationale": "Both traditions featured prominent individuals; the distinction drawn is about underlying forces, not the social class of subjects."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
