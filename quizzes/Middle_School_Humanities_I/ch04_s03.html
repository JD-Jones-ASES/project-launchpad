    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What unique property of Roman concrete (opus caementicium) enabled it to be used in ambitious projects like harbor walls and the Pantheon's dome, distinguishing it from contemporary building materials?", "options": [{"text": "Its ability to be molded into highly intricate decorative sculptures.", "isCorrect": false, "rationale": "While Roman concrete could be shaped, its primary distinguishing and enabling property for large-scale engineering was not its decorative capacity but its structural integrity."}, {"text": "Its rapid drying time, which significantly sped up construction processes.", "isCorrect": false, "rationale": "The text does not mention rapid drying; in fact, it states that Roman concrete 'grew stronger with age,' implying a curing process rather than quick setting."}, {"text": "Its capacity to harden underwater and strengthen over time due to the chemical reaction with volcanic ash (pozzolana) and seawater.", "isCorrect": true, "rationale": "The text explicitly states that 'the chemical reaction created a material that hardened underwater and grew stronger with age,' citing this as a key to its remarkable durability, as seen in harbor walls and the Pantheon."}, {"text": "Its lightweight composition, which drastically reduced the overall structural load on foundations.", "isCorrect": false, "rationale": "The text does not describe Roman concrete as lightweight; its strength and ability to form massive structures like domes suggest significant density and load-bearing capacity."}], "id": "q01"}, {"question": "The 'Activity: Sketch an Arch vs. Post-and-Lintel' section explains a fundamental difference in how these structures manage weight. If heavy stones were stacked on top of both, why would an arch typically prove more durable than a post-and-lintel structure of similar span?", "options": [{"text": "Post-and-lintel structures are primarily decorative, not designed for heavy loads.", "isCorrect": false, "rationale": "While they can be decorative, post-and-lintel structures like the Parthenon were load-bearing; the issue is their structural limitations compared to arches."}, {"text": "The arch distributes forces outwards through tension, which stone handles effectively.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states that stone is weak in tension. The arch works by placing its components under compression, not tension."}, {"text": "The horizontal beam in a post-and-lintel structure is under compression, making it prone to buckling.", "isCorrect": false, "rationale": "The horizontal beam in post-and-lintel is under tension (being pulled apart in the middle by gravity), not compression, which is why stone beams are limited in span."}, {"text": "The arch converts downward forces into compression, which stone tolerates well, whereas a post-and-lintel beam is under tension, which stone is weak against.", "isCorrect": true, "rationale": "The text clearly explains that 'in an arch, every stone is under compression (being squeezed by its neighbors), and stone is very strong in compression,' while 'in post-and-lintel construction, the horizontal beam is under tension (being pulled apart by gravity in the middle), and stone is weak in tension.'"}], "id": "q02"}, {"question": "The text asserts that Roman engineering breakthroughs, particularly the arch combined with concrete, made the scale of the Roman Empire possible in a way that Greek city-states never achieved. Which of the following best supports this analytical claim?", "options": [{"text": "Roman political decisions prioritized military expansion over infrastructure development, relying on captured territories for resources.", "isCorrect": false, "rationale": "The text highlights that engineering was crucial for administering and supporting the vast empire, implying infrastructure development was a priority, not neglected."}, {"text": "Greek builders, despite their architectural skill, were limited by post-and-lintel methods, preventing them from constructing large-span bridges, aqueducts, or vast domes like the Pantheon.", "isCorrect": true, "rationale": "The text directly contrasts Greek post-and-lintel limitations with Roman arch and concrete capabilities, stating the arch 'enabled spans the Greeks could never have attempted' and made 'the scale of Roman empire possible.'"}, {"text": "The Pantheon's dome was primarily a political symbol, showcasing imperial power rather than a functional engineering marvel.", "isCorrect": false, "rationale": "While the Pantheon did symbolize power, the text emphasizes it as 'the most spectacular result of this technology,' an engineering marvel that enabled covering enormous spaces."}, {"text": "Roman concrete was an expensive material, limiting its use to only the most critical state-sponsored projects.", "isCorrect": false, "rationale": "The text implies widespread use, noting its application in 'hundreds of aqueducts,' the Colosseum, and the Pantheon, which suggests it was a foundational technology for various projects."}], "id": "q03"}, {"question": "What was the primary function of Roman aqueducts, crucial for the development and sustenance of Roman cities?", "options": [{"text": "To prevent enemy infiltration into cities by creating water barriers.", "isCorrect": false, "rationale": "While water channels might have had incidental defensive benefits, their primary purpose was not security but water supply."}, {"text": "To generate power for industrial mills and factories within urban centers.", "isCorrect": false, "rationale": "The text defines aqueducts as systems 'for carrying water' for consumption, not primarily for industrial power generation."}, {"text": "To transport large volumes of fresh water efficiently from distant mountain springs to urban populations using gravity.", "isCorrect": true, "rationale": "The definition states aqueducts are 'a channel or pipe system for carrying water, usually over long distances... allowing gravity to move water from mountain springs into cities.'"}, {"text": "To facilitate navigation and trade routes via inland waterways, connecting cities to major rivers.", "isCorrect": false, "rationale": "Aqueducts were for water supply, not for navigation or trade routes, which were handled by roads and natural waterways."}], "id": "q04"}, {"question": "The 'Roman Concrete: An Engineering Revolution' concept states that concrete was more than a building material. How did it fundamentally alter architectural possibilities compared to prior methods?", "options": [{"text": "It made construction purely decorative, shifting focus from utility to aesthetics.", "isCorrect": false, "rationale": "The text emphasizes its utility in enabling massive, functional structures and spanning large distances, not merely decorative purposes."}, {"text": "It eliminated the need for skilled labor, making large-scale construction more accessible.", "isCorrect": false, "rationale": "While perhaps simplifying some aspects, the engineering and construction of Roman marvels still required immense skill and organization, as implied by the note on engineers, surveyors, etc."}, {"text": "It broke the limitation of span lengths imposed by the tensile strength of stone beams in post-and-lintel construction, enabling vast domes, vaults, and bridges.", "isCorrect": true, "rationale": "The text explicitly states: 'The arch, combined with concrete, broke that limitation entirely. Roman engineers could now span rivers with bridges, carry water over valleys on aqueduct arches, and cover enormous spaces with domes and vaults.'"}, {"text": "It restricted building to smaller, more compact structures due to its inherent weight and complexity.", "isCorrect": false, "rationale": "This is contrary to the text, which highlights its use in 'enormous spaces' and structures 'larger than the dome of St. Peter's Basilica.'"}], "id": "q05"}, {"question": "Which of the following accurately describes a key component of Rome's provincial economy?", "options": [{"text": "Roman provinces primarily served as remote military outposts with minimal economic activity.", "isCorrect": false, "rationale": "The text indicates provinces were economically productive, providing grain, skilled labor, and tribute, not just military outposts."}, {"text": "Conquered territories provided Rome with tribute, agricultural produce like grain, and a supply of skilled craftsmen and enslaved labor.", "isCorrect": true, "rationale": "The text states: 'Conquered peoples paid tribute; their land produced grain for Rome; their skilled craftsmen and educated slaves filled Roman households and workshops.'"}, {"text": "Provinces functioned as independent economic entities, trading only with their immediate neighbors.", "isCorrect": false, "rationale": "The 'thenandnow' section describes 'economic integration' with trade routes carrying goods 'from Egypt to Rome, olive oil from Spain to the Rhine frontier,' indicating a unified market."}, {"text": "The provincial economy relied heavily on exports of Roman manufactured goods to the conquered lands.", "isCorrect": false, "rationale": "The text focuses on the flow of resources and labor *from* the provinces *to* Rome, suggesting provinces were primarily suppliers rather than major markets for Roman manufactured goods."}], "id": "q06"}, {"question": "The text notes that by the late Republic, perhaps one-third of Italy's population was enslaved and that the Roman economy 'depended on this forced labor so completely.' What does the mention of slave revolts, like Spartacus', reveal about the institution of slavery in Roman society?", "options": [{"text": "Slave revolts were rare occurrences that had little significant impact on the Roman ruling class.", "isCorrect": false, "rationale": "The text explicitly states that repeated slave revolts 'sent waves of terror through the slaveowning class,' indicating a significant impact."}, {"text": "The Roman economy's profound reliance on forced labor made any challenge to the institution of slavery a fundamental threat to the societal order.", "isCorrect": true, "rationale": "The text directly links the 'complete' dependence on forced labor to the 'waves of terror' caused by revolts, signifying that any challenge to slavery was a major threat to the entire economic and social structure."}, {"text": "Most Roman slaves were eventually granted freedom after a period of loyal service, reducing the motivation for rebellion.", "isCorrect": false, "rationale": "The text does not support widespread manumission or its impact on revolt motivation; it focuses on the dependency and the terror caused by revolts."}, {"text": "Slave revolts were primarily motivated by a desire for better working conditions, not a complete abolition of slavery.", "isCorrect": false, "rationale": "The text does not specify the exact motivations beyond 'slave revolts,' but the 'waves of terror' suggest a deeper threat than mere workplace grievances for a system so dependent on forced labor."}], "id": "q07"}, {"question": "The Roman poet Juvenal's phrase 'panem et circenses' (bread and circuses) described a specific political strategy. What was its primary objective?", "options": [{"text": "To promote public health and well-being through nutritious food and athletic competitions.", "isCorrect": false, "rationale": "The text describes the political calculation as 'cynical,' indicating the primary objective was control and appeasement, not genuine public health."}, {"text": "To divert the potentially dangerous urban poor from political unrest and rebellion by providing basic necessities and spectacular entertainment.", "isCorrect": true, "rationale": "The text states the 'political calculation was cynical: a city of hungry unemployed men is dangerous; a city of fed and entertained unemployed men is manageable.'"}, {"text": "To showcase the immense wealth and generosity of the Roman emperors to foreign dignitaries.", "isCorrect": false, "rationale": "While it might have had this secondary effect, the text focuses on managing the domestic urban population as the primary objective."}, {"text": "To foster active civic engagement and democratic participation among the Roman citizenry.", "isCorrect": false, "rationale": "This strategy aimed to *manage* the population, essentially pacifying them through distraction rather than encouraging active political engagement."}], "id": "q08"}, {"question": "Beyond their initial military purpose, how did the extensive Roman road system contribute significantly to the empire's stability and growth?", "options": [{"text": "They served primarily as symbolic pathways demonstrating Roman power without having substantial practical economic function.", "isCorrect": false, "rationale": "The text highlights their highly practical economic function, comparing them to a modern single market."}, {"text": "They were exclusively used by the wealthy elite for personal travel and leisure, stimulating a luxury economy.", "isCorrect": false, "rationale": "The text mentions roads carrying 'grain from Egypt to Rome, olive oil from Spain to the Rhine frontier,' indicating widespread commercial use."}, {"text": "They facilitated economic integration and trade across the vast empire, enabling efficient transport of goods and resources, comparable to a modern single market.", "isCorrect": true, "rationale": "The 'thenandnow' section explicitly states, 'Roads that began as military supply lines also carried grain from Egypt to Rome, olive oil from Spain to the Rhine frontier... This economic integration is comparable in scale to the modern European Union's single market.'"}, {"text": "Their main purpose was to connect isolated rural villages with no central hub, fostering local autonomy.", "isCorrect": false, "rationale": "The text states 'all roads lead to Rome' and notes the densest networks clustered in economically productive regions, radiating from central points."}], "id": "q09"}, {"question": "The 'thenandnow' section discusses the enduring legacy of Roman engineering. Which statement best encapsulates this legacy?", "options": [{"text": "Roman engineering principles are exclusively studied as historical curiosities, with no practical relevance today.", "isCorrect": false, "rationale": "The text explicitly states it is 'not merely historical curiosity—it is, literally, still above our heads and beneath our feet.'"}, {"text": "Modern concrete was a completely new invention in the 19th century with no theoretical or empirical ties to Roman methods.", "isCorrect": false, "rationale": "The text states 'Modern concrete (re-invented in the 19th century) owes its theoretical foundation to what Roman builders discovered empirically.'"}, {"text": "Roman engineering innovations, like the arch and concrete, fundamentally shaped Western construction for over a millennium and continue to influence modern building practices.", "isCorrect": true, "rationale": "The text highlights that 'Medieval churches and cathedrals used Roman arch technology; Gothic vaults are the Roman arch taken to its structural limits. Modern concrete... owes its theoretical foundation to what Roman builders discovered empirically,' and notes structures still stand today."}, {"text": "The physical structures built by Romans have largely disintegrated over time, leaving only written records of their engineering prowess.", "isCorrect": false, "rationale": "The text provides examples of Roman structures like the Pantheon and Pont du Gard still standing and in use, directly contradicting this statement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
