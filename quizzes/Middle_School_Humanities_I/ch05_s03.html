    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The social tension highlighted in the “Good Samaritan” parable stemmed from the geographical separation and deep-seated hostility between which two regions?", "options": [{"text": "Bethlehem and Jerusalem", "isCorrect": false, "rationale": "Bethlehem is south of Jerusalem, both within the region of Judaea, and the text does not describe deep-seated hostility specifically between these two places in the context of the parable."}, {"text": "Galilee and Judaea", "isCorrect": false, "rationale": "While Galilee and Judaea are northern and southern regions respectively, the text specifically states they are 'separated by the region of Samaria,' and it is the relationship between Jews and Samaritans that caused the hostility, not primarily between Galilee and Judaea themselves."}, {"text": "Samaria and Galilee", "isCorrect": false, "rationale": "The text states that Galilee and Judaea are separated by Samaria, implying a geographical relationship, but the parable's social weight derived from the hostility between Jews (often associated with Judaea) and Samaritans, not specifically Samaritans and Galileans as the primary point of tension."}, {"text": "Judaea and Samaria", "isCorrect": true, "rationale": "The text explicitly states: 'Galilee and Judaea are separated by the region of Samaria—which is why the “Good Samaritan” parable carried such social weight; Jews and Samaritans were deeply hostile to each other.' Judaea was the southern region where Jerusalem was located, and its Jewish inhabitants were hostile to those in Samaria."}]}, {"question": "How did the Roman Empire's infrastructure, originally built for imperial control and military purposes, paradoxically facilitate the spread of the Gospel?", "options": [{"text": "By funding Christian missionary journeys directly through imperial taxes.", "isCorrect": false, "rationale": "The text does not mention the Roman Empire funding Christian missions; rather, it highlights how existing infrastructure was repurposed by missionaries."}, {"text": "By providing a secure and efficient network for travel and communication.", "isCorrect": true, "rationale": "The text states, 'The same infrastructure that allowed Roman governors to suppress rebellions allowed missionaries to spread the Gospel at unprecedented speed,' referring to Roman roads, naval protection, and the common Greek language as a network for travel and communication."}, {"text": "By adopting Christianity as the official state religion, thus promoting its expansion.", "isCorrect": false, "rationale": "The adoption of Christianity as a state religion happened much later than the period discussed (spread of Gospel in the first century) and is not presented as a reason for its initial rapid spread using existing Roman infrastructure."}, {"text": "By forcing conquered peoples to learn Greek, which became the language of the New Testament.", "isCorrect": false, "rationale": "While Greek was a common language, it was spread by Alexander's conquests centuries earlier, not by the Roman Empire forcing its learning as a direct policy to aid Gospel spread. The Romans facilitated communication through Greek's existing prevalence, not by enforcing its learning specifically for Gospel purposes."}]}, {"question": "In what specific ways did Paul's Roman citizenship serve as a crucial tool for his missionary efforts, as described in the text?", "options": [{"text": "It exempted him from paying taxes, allowing him to use funds for mission work.", "isCorrect": false, "rationale": "The text does not mention tax exemptions for Roman citizens, nor does it link such exemptions to funding Paul's missionary work."}, {"text": "It granted him immunity from arrest, enabling him to preach without fear of persecution.", "isCorrect": false, "rationale": "Paul was arrested multiple times. His citizenship did not grant him immunity from arrest, but it did provide specific legal protections during arrests and trials, such as protection from flogging and the right to appeal to Caesar."}, {"text": "It provided legal protection and a means to travel to Rome at imperial expense.", "isCorrect": true, "rationale": "The text explicitly states that his citizenship protected him from flogging (Acts 22:25–29) and allowed him to appeal to Caesar, resulting in him being 'sent to Rome at imperial expense' (Acts 25:11), instrumental for reaching the imperial capital with the Gospel."}, {"text": "It allowed him to serve as a Roman governor, influencing policy in favor of Christians.", "isCorrect": false, "rationale": "Paul was a missionary and apostle, not a Roman governor, and the text does not suggest he held any governmental position."}]}, {"question": "Paul's missionary strategy of first visiting synagogues in new cities primarily leveraged what pre-existing condition within the Roman Empire?", "options": [{"text": "The widespread adoption of Jewish customs by Roman citizens.", "isCorrect": false, "rationale": "While 'God-fearers' (Gentiles attending synagogues) existed, the text does not suggest a widespread adoption of Jewish customs by Roman citizens generally, but rather specific receptive audiences within the synagogue network."}, {"text": "The availability of established communities familiar with monotheistic belief and scripture.", "isCorrect": true, "rationale": "The text explains, 'The synagogue network of the Jewish Diaspora provided ready-made communities of people who already believed in the God of Abraham, already knew the Hebrew Scriptures, and were already accustomed to welcoming God-fearing Gentiles.'"}, {"text": "The financial support offered by the Jewish Diaspora for new religious movements.", "isCorrect": false, "rationale": "The text does not mention the Jewish Diaspora offering financial support for new religious movements, including Christianity; rather, it speaks of the synagogues as a network for sharing a message."}, {"text": "The Roman Empire's policy of religious tolerance for all cults, including Christianity.", "isCorrect": false, "rationale": "While the Roman Empire often tolerated various cults, this was not the primary factor leveraged by Paul's synagogue strategy. His strategy focused on the specific demographics and beliefs within the synagogue communities themselves, rather than broader Roman policy."}]}, {"question": "The use of Koine Greek for the New Testament was significant because it:", "options": [{"text": "Demonstrated the intellectual superiority of Greek philosophy over other ancient traditions.", "isCorrect": false, "rationale": "The text highlights Koine Greek's practicality and accessibility, not its philosophical superiority. It explicitly states it was 'not classical Athenian Greek (which educated people wrote) but the everyday spoken Greek of the marketplace.'"}, {"text": "Restricted the Gospel message to a small, educated elite who understood classical languages.", "isCorrect": false, "rationale": "The text states the opposite: Koine Greek was 'available to ordinary people across the Empire regardless of their native language,' indicating wide accessibility, not restriction."}, {"text": "Ensured that the message was accessible to a broad, diverse audience across the Roman Empire.", "isCorrect": true, "rationale": "The text notes that Koine Greek was the 'common spoken Greek' and 'the everyday spoken Greek of the marketplace, available to ordinary people across the Empire regardless of their native language,' making the New Testament widely accessible."}, {"text": "Signified the Roman Empire's official endorsement of Greek as its primary language.", "isCorrect": false, "rationale": "Greek's universality was a result of Alexander's conquests centuries prior, not a direct endorsement by the Roman Empire, which also used Latin as an official language. The text emphasizes its prevalence as a common tongue rather than an official Roman decree."}]}, {"question": "The 'Then and Now' section draws a comparison between the Roman road network and monastic networks in the early medieval period. What is the primary functional similarity highlighted between these two seemingly different types of networks?", "options": [{"text": "Both were built primarily for military defense and maintaining social order.", "isCorrect": false, "rationale": "The text states Roman roads were for 'military and economic purposes,' but monastic networks were built 'for spiritual purposes,' thus military defense was not a shared primary purpose."}, {"text": "Both served as channels for the movement of ideas, people, and civilization.", "isCorrect": true, "rationale": "The text describes Roman roads as the 'infrastructure of the Gospel' and monastic networks as 'nodes on a network connecting scholars, manuscripts, travelers, and ideas across a fragmented landscape,' concluding both 'served as the channels through which civilization (and the Gospel) moved through their respective eras.'"}, {"text": "Both were established and maintained exclusively by state authorities.", "isCorrect": false, "rationale": "The text distinguishes: 'The Roman roads were public infrastructure built by an empire... the monastic network was built by the Church,' indicating different builders and maintainers."}, {"text": "Both relied on a single common language for all communication within the network.", "isCorrect": false, "rationale": "While Greek was important for the Gospel's spread via Roman roads, the text does not claim monastic networks universally relied on a single common language, only noting that a 'language of wider communication always helps a message spread.'"}]}, {"question": "According to the text, which aspect of the Christian message was considered 'genuinely new in the ancient world' and contributed significantly to its spread?", "options": [{"text": "Its emphasis on strict adherence to Roman imperial laws and customs.", "isCorrect": false, "rationale": "The text highlights aspects of the Christian message that contrasted with, rather than conformed to, common ancient practices, such as care for the poor. Adherence to imperial laws was not listed as a 'new' aspect of the message itself."}, {"text": "Its proclamation of universal human dignity, care for the poor, and hope beyond death.", "isCorrect": true, "rationale": "The text explicitly states: 'A faith that proclaimed universal human dignity, care for the poor, hope beyond death, and a God who had become human was genuinely new in the ancient world' and was a factor in its spread."}, {"text": "Its detailed philosophical arguments derived from classical Greek thinkers.", "isCorrect": false, "rationale": "While Christianity engaged with Greek philosophy, the text focuses on the social and theological aspects of its message as 'new,' not its philosophical derivation."}, {"text": "Its exclusive focus on a hierarchical priestly structure and elaborate rituals.", "isCorrect": false, "rationale": "The text does not mention an exclusive focus on priestly structure or elaborate rituals as a 'new' or significant factor in the early spread of Christianity; instead, it emphasizes the message's content and community actions."}]}, {"question": "The actions of early Christian communities during events like the Antonine Plague demonstrate which factor contributing to Christianity's spread?", "options": [{"text": "The strategic use of Roman citizenship by community leaders.", "isCorrect": false, "rationale": "While Roman citizenship was important for individuals like Paul, the communal act of caring for the sick during a plague is attributed to the 'Community' aspect, not specifically to the use of citizenship by leaders."}, {"text": "The powerful witness of a compassionate community in action.", "isCorrect": true, "rationale": "The text states that 'Early Christian communities cared for the sick, widows, orphans, and the poor in ways that pagan society did not. In epidemics... Christians stayed to care for the dying while others fled,' showcasing their compassionate actions as a key factor in spread."}, {"text": "The direct financial aid provided by the Roman state to Christian groups.", "isCorrect": false, "rationale": "The text does not indicate that the Roman state provided financial aid to Christian groups; rather, it highlights the internal care provided by the Christian communities themselves."}, {"text": "The superior medical knowledge possessed by early Christians.", "isCorrect": false, "rationale": "The text emphasizes Christians' willingness to care for the sick when others fled, implying compassion and courage, not superior medical knowledge."}]}, {"question": "Paul's missionary journeys consistently targeted which type of locations, indicating a strategic use of Roman infrastructure?", "options": [{"text": "Rural villages and remote agricultural communities far from major roads.", "isCorrect": false, "rationale": "The text explicitly states the opposite: Paul traveled 'almost exclusively along established Roman road routes' and planted churches in 'major Roman provincial cities.'"}, {"text": "Major Roman provincial cities located on the Empire's main communication routes.", "isCorrect": true, "rationale": "The text notes that Paul's destinations like Philippi, Thessalonica, Corinth, and Ephesus 'were all major Roman provincial cities on the Empire's main communication routes,' showing the Gospel followed the 'infrastructure of empire.'"}, {"text": "Isolated philosophical schools in mountainous regions.", "isCorrect": false, "rationale": "Paul's strategy was to reach urban centers and established communities, not isolated philosophical schools, nor does the text indicate a focus on mountainous regions."}, {"text": "Coastal towns primarily accessible by small fishing boats.", "isCorrect": false, "rationale": "While Paul did travel by sea, the text emphasizes 'Roman road routes' and 'major Roman provincial cities' as his primary targets, not exclusively small coastal towns accessed by fishing boats."}]}, {"question": "Which of the following statements best encapsulates the central irony presented in the section regarding the Roman Empire's relationship with the spread of the Gospel?", "options": [{"text": "The Roman Empire actively suppressed the Gospel despite its citizens' rights.", "isCorrect": false, "rationale": "While Rome did suppress the Gospel eventually, the core irony highlighted is how Rome's systems *aided* it first, not just suppression despite rights. The text points to a more complex, paradoxical relationship."}, {"text": "The Gospel spread primarily through clandestine networks, avoiding Roman infrastructure.", "isCorrect": false, "rationale": "The text explicitly states the Gospel followed 'the infrastructure of empire' and leveraged Roman roads and common language, directly contradicting the idea of avoiding Roman infrastructure."}, {"text": "The infrastructure and legal systems designed for Roman imperial control inadvertently aided the Gospel's expansion, even as Rome later persecuted Christians.", "isCorrect": true, "rationale": "The text highlights this paradox: 'The same infrastructure that allowed Roman governors to suppress rebellions allowed missionaries to spread the Gospel at unprecedented speed.' It also notes the 'irony is striking: the same legal system that would eventually execute him under Nero first protected him for years,' perfectly illustrating this central irony."}, {"text": "Roman emperors initially promoted Christianity as a means to unify the empire, but later reversed their policy.", "isCorrect": false, "rationale": "The text does not state that Roman emperors initially promoted Christianity; instead, it describes how the Empire's pre-existing systems *unintentionally* aided its spread, prior to periods of persecution."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
