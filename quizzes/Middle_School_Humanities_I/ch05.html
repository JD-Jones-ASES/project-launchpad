<script>
var QUESTIONS = [{"question": "What three conditions of the Roman world made the rapid spread of the Gospel possible in the first century?", "options": [{"text": "A tolerant Roman emperor, a unified Jewish community, and a widespread belief in monotheism across the Empire.", "isCorrect": false, "rationale": "The text does not identify any of these as the three key conditions. The Roman emperors were generally not tolerant of Christianity, Jews were not unified, and monotheism was not widespread across the Empire."}, {"text": "Political unity with safe roads and postal system, over 50,000 miles of Roman roads, and koine Greek as a shared language across the eastern Empire.", "isCorrect": true, "rationale": "The text lists exactly these three: '1) Political unity: one empire, one law, and a postal system; 2) Roman roads: over 50,000 miles of paved, maintained roads; 3) The Greek language: koine Greek — the common spoken dialect — was the lingua franca of the eastern Empire.'"}, {"text": "The conversion of the Roman army, the translation of Jewish Scripture into Latin, and the establishment of Christian schools in every major city.", "isCorrect": false, "rationale": "None of these are identified in the text as the key conditions for the Gospel's spread. The Roman army was not converted; the Scriptures were translated into Greek (Septuagint), not Latin; and no Christian schools are mentioned."}, {"text": "The weakness of Greek religion, the collapse of Roman political authority, and widespread literacy among the poor allowing the Gospels to be read.", "isCorrect": false, "rationale": "The text identifies conditions of Roman strength and unity — not weakness — as what enabled the Gospel to spread rapidly. Widespread literacy among the poor is not mentioned."}]}, {"question": "What is the significance of Paul's phrase 'the fullness of time' (Galatians 4:4) in the context of the Roman world?", "options": [{"text": "Paul meant that Rome had completed its historical mission and was about to be replaced by the Christian Empire.", "isCorrect": false, "rationale": "The text does not suggest Paul meant Rome was about to be replaced. The 'fullness of time' refers to the providential convergence of conditions — Pax Romana, roads, Greek language — that made the Incarnation historically possible at that specific moment."}, {"text": "Early Christian writers recognized that the specific historical conditions of the first century — Pax Romana, Roman roads, koine Greek, Roman law — providentially prepared the world for the Incarnation and rapid Gospel spread.", "isCorrect": true, "rationale": "The text's key concept section states that early Christian writers 'recognized something providential in the specific historical conditions of the first century: the Pax Romana provided safety for travel; Roman roads provided the routes; Greek koine provided the common language; and Roman law provided the legal framework.'"}, {"text": "Paul was predicting that within a 'full' generation (forty years), all of the Roman Empire would convert to Christianity.", "isCorrect": false, "rationale": "The text does not interpret 'fullness of time' as a forty-year prediction. It interprets it as Paul's recognition that God had historically prepared the world for the Incarnation through specific providential conditions."}, {"text": "The phrase refers specifically to the fulfillment of Old Testament prophecy about the date of the Messiah's coming, with no relevance to Roman historical conditions.", "isCorrect": false, "rationale": "The text connects the phrase to Roman historical conditions explicitly, arguing that both Jewish Scripture AND the conditions of the Roman world prepared the way for the Incarnation."}]}, {"question": "How does the testimony of Tacitus and Josephus strengthen the historical case for Jesus' existence?", "options": [{"text": "They were Christians who wrote detailed accounts of Jesus' miracles, confirming what the Gospels report.", "isCorrect": false, "rationale": "Tacitus was explicitly hostile to Christianity ('a most mischievous superstition'); Josephus was a Jewish historian, not a Christian. The text emphasizes their value precisely because they were not Christians — they are 'hostile or neutral witnesses.'"}, {"text": "As hostile or neutral witnesses — not Christians — their testimony that Jesus existed and was crucified under Pontius Pilate carries particular historical weight.", "isCorrect": true, "rationale": "The text states: 'These are hostile or neutral witnesses—not Christians—and their testimony establishes the historical reality of Jesus and his execution.' Tacitus calls Christianity 'a most mischievous superstition' yet confirms Jesus was executed under Pontius Pilate. Josephus writes of 'Jesus, a wise man' who performed surprising feats."}, {"text": "They were government officials who kept official Roman records of all executions, making their accounts legally reliable documents.", "isCorrect": false, "rationale": "Tacitus was a historian and Josephus was a Jewish historian/former military leader. They were not official record-keepers of executions. Their value is as independent non-Christian sources."}, {"text": "Both Tacitus and Josephus converted to Christianity before they died, making their earlier hostile testimony especially convincing.", "isCorrect": false, "rationale": "The text does not claim either Tacitus or Josephus converted to Christianity. Their testimony is valuable precisely because they remained outside or hostile to the Christian community."}]}, {"question": "What was revolutionary about Jesus' teaching in the Sermon on the Mount, particularly the Beatitudes?", "options": [{"text": "The Beatitudes were primarily political, calling on the poor to revolt against Roman taxation and aristocratic Jewish priests.", "isCorrect": false, "rationale": "The text does not interpret the Beatitudes as a political call for revolt. It frames them as a revolutionary reversal of the moral order — declaring blessed those whom the Greco-Roman world considered failures or losers."}, {"text": "Declaring the poor in spirit, mourning, meek, and persecuted to be 'blessed' reversed nearly every value the Roman world held dear, claiming that the people the world counts as losers are, by God's reckoning, the truly fortunate ones.", "isCorrect": true, "rationale": "The text states: 'Rome honored military glory, wealth, power, and status. The Beatitudes called blessed those who mourned, the poor in spirit, the meek, and the persecuted.' This 'was not timid sentimentality' but 'a revolutionary claim about the moral order of the universe.'"}, {"text": "The Beatitudes were revolutionary because they combined Greek philosophical reasoning with Jewish law in a way no teacher had previously achieved.", "isCorrect": false, "rationale": "The text does not frame the Beatitudes' revolutionary quality as philosophical synthesis. Their revolution is ethical: the complete inversion of Greco-Roman values, declaring blessed those whom that world despised."}, {"text": "The Beatitudes introduced the entirely new concept of divine blessing to a world that had never considered religious happiness to be available to ordinary people.", "isCorrect": false, "rationale": "The text does not claim the concept of divine blessing was entirely new. It argues the revolutionary quality was in to whom and why blessing was attributed — to those whom the world counted as failures, not to the fortunate and powerful."}]}, {"question": "What is the significance of the Greek word 'Logos' in John's Gospel Prologue, and how did it connect with Greek philosophy?", "options": [{"text": "John used 'Logos' as a Greek translation of the Hebrew 'Torah' (Law), making his Gospel accessible to Greek-speaking Jews.", "isCorrect": false, "rationale": "Logos does not mean Torah/Law. The text explains Logos means 'Word,' 'Reason,' or 'Divine Principle' — specifically the Stoic concept of a rational principle ordering the universe. John was addressing Greek philosophical concepts, not just Jewish legal ones."}, {"text": "John's use of 'Logos' connected with the Stoic concept of a divine rational principle governing the universe, claiming that this very principle had become a specific human being in history — simultaneously fulfilling and transforming Greek philosophical longing.", "isCorrect": true, "rationale": "The text states: 'The Stoics believed the Logos was an impersonal divine principle; John claims it is a Person.' John is 'claiming that the eternal rational principle of the universe — the divine Logos the Greeks had reasoned about for centuries — had become a human being in a specific time and place.' This fulfills Greek philosophical longing while departing from it."}, {"text": "John borrowed the term 'Logos' from Plato's Theory of Forms to describe Christ as the eternal Form of Goodness made visible.", "isCorrect": false, "rationale": "The text connects Logos specifically to Stoic philosophy, not to Plato's Forms. While both are Greek philosophical concepts, the text's emphasis is on the Stoic Logos as the relevant connection."}, {"text": "'Logos' was simply John's way of saying 'Son of God' in a language Greek-speakers could understand, with no deeper philosophical significance.", "isCorrect": false, "rationale": "The text emphasizes that John's use of Logos was philosophically deliberate and significant. It notes that 'students who studied the Stoics in Unit 2 should feel the deliberateness of John's choice of this word as his opening term.'"}]}, {"question": "Why was Paul's Roman citizenship strategically important for the spread of the Gospel?", "options": [{"text": "It allowed Paul to travel to Rome for free using the imperial postal system, which ordinary people could not access.", "isCorrect": false, "rationale": "The text does not describe Paul using the imperial postal system for free travel. His citizenship mattered because it protected him from arbitrary punishment and gave him the right to appeal to Caesar."}, {"text": "Roman citizenship granted Paul the right to own property in any city of the Empire, allowing him to establish permanent church headquarters.", "isCorrect": false, "rationale": "Property ownership is not the benefit the text identifies. Paul's citizenship mattered primarily because it protected him from summary execution and gave him the right to appeal to Caesar (Acts 25:11)."}, {"text": "Paul's Roman citizenship shielded him from arbitrary punishment and gave him the right to appeal to Caesar, protecting him on multiple occasions from summary execution by hostile authorities.", "isCorrect": true, "rationale": "The text states: 'His Roman citizenship — the legal framework the Republic created and the Empire preserved — shielded him from arbitrary punishment and gave him the right to appeal to Caesar himself (Acts 25:11).' This is described as protecting him from punishment on multiple occasions."}, {"text": "Citizenship gave Paul tax exemption, freeing his financial resources entirely for missionary work without contributing to Roman taxes.", "isCorrect": false, "rationale": "The text does not mention any tax exemption as a benefit of Paul's citizenship. The key benefits were legal protection from punishment and the right of appeal."}]}, {"question": "What was Paul's consistent missionary strategy in each new city he visited?", "options": [{"text": "Paul always sought to convert Roman officials first, reasoning that their authority would compel their households and subjects to follow.", "isCorrect": false, "rationale": "The text describes Paul's strategy as going first to the synagogue (not to Roman officials), where people were already familiar with the Hebrew Scriptures — a more effective entry point than seeking official conversion."}, {"text": "Arrive in a city, go first to the synagogue where people knew the Hebrew Scriptures, preach, weather opposition, plant a church, and move on — with his letters (Epistles) becoming the New Testament's earliest written documents.", "isCorrect": true, "rationale": "The text describes Paul's strategy as 'consistent: arrive in a city, go first to the synagogue (where he found people already familiar with the Hebrew Scriptures), preach, weather opposition, and plant a church before moving on.' His letters to these young churches are 'the earliest written documents of the New Testament, predating the Gospels by a decade or more.'"}, {"text": "Paul focused exclusively on converting Gentiles, deliberately avoiding Jewish synagogues because he believed his mission was only to the nations (Gentiles).", "isCorrect": false, "rationale": "The text says Paul went first to the synagogue precisely because those people were already familiar with the Hebrew Scriptures. His strategy was to build on existing religious knowledge, not to avoid the Jewish community."}, {"text": "Paul founded schools and hospitals in each city as a precondition for preaching, demonstrating the Gospel's practical benefits before presenting its theological claims.", "isCorrect": false, "rationale": "The text does not describe Paul founding schools or hospitals as part of his missionary strategy. His approach was theological: preach, weather opposition, plant a church."}]}, {"question": "What was Paul's approach in his sermon at the Areopagus (Acts 17), and what does it illustrate about missionary method?", "options": [{"text": "Paul quoted extensively from the Hebrew Scriptures to show Athens' philosophers that Judaism was intellectually superior to Greek philosophy.", "isCorrect": false, "rationale": "The text explicitly states that Paul did not quote the Hebrew Scriptures at Athens: 'Rather than quoting the Hebrew Scriptures (which his audience did not know), Paul began where his audience already was: their own religious practices, their altar to the Unknown God, and their own poets.'"}, {"text": "Paul argued from Greek philosophy and Stoic poetry — quoting their own poets about the 'Unknown God' — as a bridge into the proclamation of Jesus, illustrating the method of contextualization.", "isCorrect": true, "rationale": "The text describes Paul quoting 'the Stoic poet Aratus (for we are also his offspring) and possibly Cleanthes' Hymn to Zeus.' This is called 'contextualization — finding the best point of connection between an unfamiliar message and the audience's existing knowledge.' Paul does not compromise the Gospel; he finds the best door."}, {"text": "Paul avoided all Greek philosophical references to prevent confusion between Christian theology and Greek paganism, focusing instead on eyewitness testimony to the Resurrection.", "isCorrect": false, "rationale": "The opposite is true: Paul deliberately used Greek philosophical references as his entry point at Athens."}, {"text": "Paul's Athens sermon had such overwhelming success that most of the Areopagus converted immediately, making Athens one of the strongest early Christian centers.", "isCorrect": false, "rationale": "The text notes Paul's approach at Athens 'had mixed results — far fewer converts than at the synagogues.' Some mocked; others said they would hear him again; a few believed, including Dionysius the Areopagite."}]}, {"question": "What does Ignatius of Antioch's Letter to the Romans reveal about early Christian theology and the nature of martyrdom?", "options": [{"text": "Ignatius' letter shows that early Christians were terrified of death and wrote letters seeking to be rescued from execution by influential Roman patrons.", "isCorrect": false, "rationale": "The text describes the opposite: Ignatius expressed remarkable eagerness for martyrdom, asking the Romans not to intervene to save him. He called himself 'the wheat of God' to be ground by the wild beasts."}, {"text": "Ignatius' letter demonstrates the early Church's structure (bishop, presbyters, deacons), its insistence on the physical reality of Christ's body, and the theological understanding of martyrdom as bearing witness to the Resurrection with one's own body.", "isCorrect": true, "rationale": "The text states Ignatius' letters reveal: '(1) how early the Church had developed a structure of bishop, presbyters, and deacons; (2) how seriously early Christians took the physical reality of Christ's body; and (3) the remarkable eagerness with which Ignatius sought death for Christ.' Martyrdom is 'not tragedy but fulfillment — bearing witness (martyria) to the resurrection with one's body.'"}, {"text": "Ignatius argued that Christians should cooperate fully with Roman authorities and avoid martyrdom whenever possible, to preserve the Church for future generations.", "isCorrect": false, "rationale": "The text describes Ignatius as seeking martyrdom, not avoiding it. He wrote: 'Permit me to be an imitator of the passion of my God.' His approach was the opposite of cooperative avoidance."}, {"text": "Ignatius' letter was written primarily to defend the authority of the Bishop of Rome over all other bishops, establishing the foundations of papal supremacy.", "isCorrect": false, "rationale": "The text does not describe Ignatius' letter as establishing papal authority. It emphasizes the theological significance of martyrdom and the early Church's structure."}]}, {"question": "What does Pliny the Younger's letter to Emperor Trajan (c. AD 112) reveal about early Christian practice and Roman perception of Christianity?", "options": [{"text": "Pliny's letter shows that Christians were involved in political conspiracy against Rome, confirming why the Roman government persecuted them.", "isCorrect": false, "rationale": "The text states that Pliny found Christians' conduct to be 'never to commit any fraud, theft, or adultery, never to falsify their word' — i.e., morally exemplary, not politically subversive. Their offense was refusing to worship the Roman gods, not actual crimes."}, {"text": "Pliny's hostile account independently confirms that Christians existed in large numbers by AD 112, worshipped Christ 'as a divinity,' lived ethically, and were persecuted specifically for refusing to acknowledge the emperor as divine.", "isCorrect": true, "rationale": "The text states Pliny's letter 'describes Christian worship practices from the outside, with no religious agenda' and independently confirms: Christians existed in large numbers, they 'addressed a form of prayer to Christ, as to a divinity,' they were ethical, and 'their distinctive offense was refusing to acknowledge as divine' the Roman gods and emperor."}, {"text": "Pliny's letter shows that most Romans had converted to Christianity by AD 112 and that Pliny was seeking guidance on how to manage a now-majority Christian population.", "isCorrect": false, "rationale": "Pliny treats Christians as a problematic minority, not a majority. He is asking what to do with a troublesome group, not managing a majority religious population."}, {"text": "Pliny recommended to Trajan that Christianity be made a legal religion, as its followers were model citizens who posed no threat to Roman order.", "isCorrect": false, "rationale": "The text describes Trajan's response as: do not hunt them down, do not accept anonymous accusations, but execute those who refuse to worship Roman gods. This is the opposite of making Christianity legal."}]}, {"question": "What was the Diocletianic ('Great') Persecution (AD 303–311), and why is it historically ironic?", "options": [{"text": "Diocletian's persecution was the first organized Roman persecution of Christians, beginning a pattern that would repeat for three centuries.", "isCorrect": false, "rationale": "The first organized persecution was under Nero (AD 54–68) — more than two centuries before Diocletian. The Diocletianic persecution was the most severe, not the first."}, {"text": "The Great Persecution was the most severe of all Roman persecutions: churches destroyed, Scriptures confiscated, clergy imprisoned, sacrifice required on pain of death — yet within twelve years Constantine issued the Edict of Milan granting toleration.", "isCorrect": true, "rationale": "The text describes the Diocletianic Persecution as 'the most severe: churches were destroyed, Scriptures were confiscated, clergy were imprisoned, and Christians were required to sacrifice to the Roman gods on pain of death.' The irony: this persecution was followed within about twelve years by Constantine's Edict of Milan (313), granting full toleration."}, {"text": "The Great Persecution was notable because it actually strengthened Christianity by forcing Christians underground into the catacombs, where their faith deepened.", "isCorrect": false, "rationale": "The text does not describe Christians retreating to catacombs or a deepening faith underground as the specific result of Diocletian's persecution. It focuses on the severity of the persecution itself and the rapid reversal under Constantine."}, {"text": "Diocletian's persecution was directed exclusively at Jewish Christians, leaving Gentile Christians free to worship, which is why it failed to destroy the Church.", "isCorrect": false, "rationale": "The text describes the persecution as targeting Christians generally — 'churches were destroyed, Scriptures were confiscated, clergy were imprisoned' — with no distinction between Jewish and Gentile Christians."}]}, {"question": "What was Constantine's reported experience before the Battle of Milvian Bridge (AD 312), and what were its immediate consequences?", "options": [{"text": "Constantine had a dream of Jesus appearing to him and commanding him to convert all citizens of the Empire to Christianity immediately.", "isCorrect": false, "rationale": "The text describes a sign in the sky (the Chi-Rho symbol) with the words 'by this sign, conquer,' not a command for immediate mass conversion. The immediate consequence was military victory and toleration, not mass forced conversion."}, {"text": "Before the battle, Constantine reported seeing a sign in the sky — the Chi-Rho symbol with 'by this sign, conquer' — had his soldiers paint the symbol on their shields, and won the battle. The following year he issued the Edict of Milan granting religious toleration.", "isCorrect": true, "rationale": "The text states: 'Constantine later reported that before the battle he had seen a sign in the sky — by some accounts the Chi-Rho symbol with the words “by this sign, conquer.” He had his soldiers paint the symbol on their shields. He won.' The next year he and Licinius issued the Edict of Milan (AD 313) granting religious toleration."}, {"text": "Constantine converted to Christianity before the battle and immediately outlawed all non-Christian religions in the Empire, making it the official state religion.", "isCorrect": false, "rationale": "The Edict of Milan (313) granted toleration to all religions, not just Christianity, and did not outlaw other religions. Full Christianization of the Empire under Theodosius I came in AD 380."}, {"text": "Constantine was baptized on his deathbed, never fully committing to Christianity during his reign, which is why his religious policies were inconsistent.", "isCorrect": false, "rationale": "While Constantine was indeed baptized on his deathbed (a historical fact not mentioned in the text), the text emphasizes his consistent support for Christianity from 312 onward, including calling the Council of Nicaea in 325."}]}, {"question": "What was the Arian controversy, and what was at stake theologically?", "options": [{"text": "Arius taught that Jesus was fully human with no divine nature, while Athanasius insisted Jesus was fully divine with no human nature. Nicaea declared both fully true.", "isCorrect": false, "rationale": "This misrepresents the controversy. Arius taught Christ was the greatest of created beings — not fully divine; Athanasius insisted Christ was fully divine, 'of one substance with the Father.' The question was about divinity, not humanity."}, {"text": "Arius taught that the Son of God was the greatest of all created beings but was created — 'there was a time when he was not' — while Athanasius argued that if Christ was not fully God, his death could not accomplish human salvation.", "isCorrect": true, "rationale": "The text states exactly this: 'Arius taught that the Son of God was the greatest of all created beings — but was a created being nevertheless, not truly divine.' Arius' slogan: 'There was a time when he was not.' Against Arius, Athanasius 'argued that if Christ was not fully God, then his death could not accomplish human salvation.'"}, {"text": "The Arian controversy was about whether Jesus died as a sacrifice or as a martyr, with no agreement reached until the Council of Constantinople in AD 381.", "isCorrect": false, "rationale": "The Arian controversy was about the divine nature of Christ — whether he was created or co-eternal with the Father — not about the nature of his death."}, {"text": "Arius and Athanasius agreed on theology but disagreed on church governance — Arius wanted democratic church councils while Athanasius supported episcopal hierarchy.", "isCorrect": false, "rationale": "The controversy was purely theological: whether Christ was a created being (Arius) or fully co-eternal and co-substantial with the Father (Athanasius). Church governance was not the issue."}]}, {"question": "What was the Council of Nicaea (AD 325), and why does the text argue it matters beyond theology?", "options": [{"text": "The Council of Nicaea resolved all theological controversies in the early Church, ending centuries of doctrinal dispute by establishing the Bible as the sole authority.", "isCorrect": false, "rationale": "Nicaea did not resolve all controversies — the Arian controversy continued for decades after it. The text does not describe Nicaea as establishing the Bible as sole authority; its significance is the Nicene Creed and the principle of ecumenical councils."}, {"text": "The Council of Nicaea was primarily a political event where Constantine forced bishops to accept his preferred theology in exchange for imperial patronage.", "isCorrect": false, "rationale": "The text says Constantine called the Council but does not describe him dictating its theological outcome. The text emphasizes Athanasius' victory against Arianism based on theological argument, though Constantine's political interests influenced the proceedings."}, {"text": "Beyond theology, Nicaea established that the universal Church could define orthodox teaching by consensus through ecumenical councils, that emperors could call but not control such councils, and that Christian faith has specific, definable content.", "isCorrect": true, "rationale": "The text's key concept section states: 'The Council of Nicaea was not merely a theological debate. It established the principle that the universal Church could meet and define orthodox teaching by consensus, that the emperor could call (but not control) such a council, and that Christian faith has a specific, definable content.'"}, {"text": "Nicaea's main significance was architectural: it authorized the building of the first Christian basilicas throughout the Empire, transforming how Christians worshipped.", "isCorrect": false, "rationale": "The text makes no connection between Nicaea and church architecture. Its significance is theological (the Nicene Creed), ecclesiological (the principle of ecumenical councils), and political (the emperor-Church relationship)."}]}, {"question": "What does the Nicene Creed affirm about Jesus Christ, and what view does it reject?", "options": [{"text": "The Creed affirms that Jesus was fully human and potentially divine, and rejects the Gnostic view that he had no physical body.", "isCorrect": false, "rationale": "The Nicene Creed was specifically formulated against Arianism (not Gnosticism) and affirms the full divinity — not potential divinity — of Christ."}, {"text": "The Creed affirms the full divinity of Jesus Christ ('God from God, Light from Light, true God from true God, begotten, not made, of one substance with the Father'), rejecting the Arian view that Christ was a created being.", "isCorrect": true, "rationale": "The text's definition of the Nicene Creed states exactly this: 'It affirms the full divinity of Jesus Christ (God from God, Light from Light, true God from true God, begotten, not made, of one substance with the Father), rejecting the Arian view that Christ was a created being.'"}, {"text": "The Creed affirms that the Father is greater than the Son and the Spirit, establishing a hierarchy within the Trinity as a compromise between Arius and Athanasius.", "isCorrect": false, "rationale": "The Nicene Creed's statement that the Son is 'of one substance (homoousios) with the Father' explicitly rejects any hierarchy of divinity within the Trinity. This was Athanasius' position, not a compromise."}, {"text": "The Creed was a provisional statement that left the question of Christ's nature open, to be resolved at a future council.", "isCorrect": false, "rationale": "The text presents the Nicene Creed as definitive: 'The Nicene Creed is still the most widely used statement of Christian faith in the world, recited every Sunday in Catholic, Orthodox, Anglican, Lutheran, and many other churches.'"}]}, {"question": "Why does the text describe the period from the Edict of Milan (313) to Theodosius making Christianity the official state religion (380) as historically remarkable?", "options": [{"text": "Because it was the first time in world history that a government granted complete freedom of religion to all citizens, regardless of their beliefs.", "isCorrect": false, "rationale": "The Edict of Milan was not the first grant of religious freedom in history. The text's emphasis is on the speed of transformation — from persecuted minority to official state religion in less than 70 years."}, {"text": "Because within just two generations — from toleration (313) to official state religion (380) — Christianity underwent one of the most rapid religious transformations of a major civilization in history.", "isCorrect": true, "rationale": "The text states: 'From the Edict of Milan in 313 to an officially Christian Empire in 380 took only two generations — one of the most rapid religious transformations of a major civilization in history.'"}, {"text": "Because it demonstrated that Constantine had secretly been a Christian since birth, fulfilling a divine plan for the Christianization of Rome.", "isCorrect": false, "rationale": "The text does not claim Constantine was secretly Christian since birth. It notes that the Edict of Milan's motivation was 'political as well as personal' — Constantine wanted imperial unity as well as whatever personal religious conviction he held."}, {"text": "Because during this period the New Testament was compiled for the first time, providing the doctrinal foundation for the official state religion.", "isCorrect": false, "rationale": "The text does not connect the 313–380 period to the compilation of the New Testament. The New Testament writings existed much earlier; the canon was defined gradually over several centuries."}]}, {"question": "The text describes three responses to Paul's sermon before King Agrippa in Acts 26. What does this scene illustrate?", "options": [{"text": "It illustrates that Paul was an incompetent speaker who could not persuade even sympathetic audiences, explaining why the early Church grew slowly.", "isCorrect": false, "rationale": "The text describes Paul's defense before Agrippa as 'a masterpiece of personal testimony.' Its lesson is about the three types of response to the Gospel, not Paul's inadequacy."}, {"text": "Agrippa's near-persuasion, Festus' dismissal as madness, and Paul's full commitment illustrate three responses to the Gospel that recur throughout history: the nearly-persuaded, the Roman rationalist, and the fully committed.", "isCorrect": true, "rationale": "The text explicitly identifies three responses: 'Here in one scene are three responses to the Gospel that recur throughout history: the nearly-persuaded [Agrippa], the Roman rationalist [Festus], and (in Paul himself) the fully committed.'"}, {"text": "The scene demonstrates that the Roman legal system was always favorable to Christians, since Agrippa found Paul innocent of all charges.", "isCorrect": false, "rationale": "The text does not describe the outcome as Agrippa finding Paul innocent. The scene illustrates different personal responses to Paul's testimony, not Roman legal outcomes."}, {"text": "It shows that Paul's strategy of appealing to Hebrew Scripture was only effective with Jewish audiences like Agrippa, not with Gentile officials like Festus.", "isCorrect": false, "rationale": "While Paul does appeal to Agrippa's knowledge of Jewish Scripture, the text's lesson about the scene is about the three types of response to the Gospel in general, not about the strategic limits of Scripture-based argumentation."}]}, {"question": "How does the text understand the early Christian martyrs' willingness to die, as illustrated by Ignatius of Antioch?", "options": [{"text": "The martyrs died because they were psychologically disturbed and had a pathological death wish unrelated to their theology.", "isCorrect": false, "rationale": "The text explicitly rejects this interpretation: 'Ignatius is not being reckless or suicidal; he is being consistently theological.'"}, {"text": "The martyrs died out of political loyalty to Jewish leaders who commanded them to resist Roman authority at all costs.", "isCorrect": false, "rationale": "The early Christian martyrs were not acting on instructions from Jewish leaders. The text describes their motivation as theological: dying in imitation of Christ's death and resurrection is 'not tragedy but fulfillment.'"}, {"text": "The martyrs died because, if Christ's death and resurrection are the central facts of Christian life, then dying in imitation of Christ — bearing witness to the Resurrection with one's body — is not tragedy but fulfillment.", "isCorrect": true, "rationale": "The text states: 'Ignatius is not being reckless or suicidal; he is being consistently theological. If Christ's death and resurrection are the central facts of Christian life, then dying in imitation of Christ — bearing witness (martyria) to the resurrection with one's body — is not tragedy but fulfillment.'"}, {"text": "Martyrdom became popular because the Roman crowds admired Christians who died bravely and this admiration accelerated conversion more than preaching.", "isCorrect": false, "rationale": "While Tertullian's saying ('the blood of the martyrs is the seed of the Church') suggests martyrdom drew converts, the text explains the martyrs' motivation theologically, not as a marketing strategy."}]}];

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
