    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary characteristic sought by the heroes Rome celebrated in the Republic's early centuries?", "options": [{"text": "Personal glory and immortal fame, similar to Greek heroes like Achilles.", "isCorrect": false, "rationale": "The text states that Roman heroes sought something else entirely than personal glory, which was characteristic of Greek heroes like Achilles."}, {"text": "The accumulation of wealth and establishment of powerful family dynasties.", "isCorrect": false, "rationale": "The text explicitly mentions that Roman heroes 'refused wealth' and 'avoided personal fame'."}, {"text": "Duty, self-sacrifice, and the prioritization of the good of the res publica over personal interests.", "isCorrect": true, "rationale": "The text clearly states that Roman heroes 'sought duty,' 'refused wealth,' 'avoided personal fame,' and 'sacrificed their own interests for the good of the res publica.'"}, {"text": "Strategic military expansion and the conquest of neighboring territories.", "isCorrect": false, "rationale": "While expansion was part of Rome's history, the celebrated heroes' core motivation, as described, was duty and sacrifice for the existing state, not primarily conquest."}]}, {"question": "Based on Livy's preface to *Ab Urbe Condita*, what was his primary objective in writing his history?", "options": [{"text": "To meticulously detail military strategies and the outcomes of battles throughout Rome's history.", "isCorrect": false, "rationale": "Livy explicitly states he cares about 'their life and their manners' and 'their morals,' not primarily armies or battles."}, {"text": "To provide a purely factual and unbiased chronological record of Roman events.", "isCorrect": false, "rationale": "Livy admits that the earliest accounts are legendary and clearly states his moral purpose to form his readers, indicating a focus beyond pure factual recording."}, {"text": "To present moral exemplars and warnings to encourage virtue and shape the character of his readers.", "isCorrect": true, "rationale": "Livy's preface emphasizes considering 'what their life and what their manners were' and following 'their morals,' identifying his heroes as moral exemplars and villains as warnings, with the purpose to 'form their readers'."}, {"text": "To compare the political systems and societal structures of Rome with those of other ancient civilizations.", "isCorrect": false, "rationale": "While an interesting historical pursuit, Livy's stated purpose focuses inward on Roman character and morals, not comparative civilization studies, which was more Plutarch's approach."}]}, {"question": "The story of Horatius at the Bridge exemplifies Roman *virtus*. Which of the following modern scenarios best reflects this specific concept of *virtus*?", "options": [{"text": "A CEO strategically making a difficult business decision that secures the company's long-term profits.", "isCorrect": false, "rationale": "This scenario demonstrates strategic thinking and good business sense, but not necessarily the self-sacrificial 'courage in the service of the community, indifferent to personal reward' that defines Roman virtus."}, {"text": "An athlete training relentlessly to achieve personal bests and set new records in their sport.", "isCorrect": false, "rationale": "This reflects personal discipline and ambition, but not the communal sacrifice inherent in Roman virtus, which is distinct from personal glory."}, {"text": "A firefighter rushing into a burning building to save strangers, knowing it puts their own life at extreme risk, with no thought of individual accolades.", "isCorrect": true, "rationale": "This scenario directly aligns with Roman *virtus*: courage in the service of the community (saving strangers), indifferent to personal reward (no thought of individual accolades), and involving significant self-sacrifice (extreme risk to life)."}, {"text": "A philanthropist donating a large sum of money to charity and receiving public recognition for their generosity.", "isCorrect": false, "rationale": "While generous, the act includes receiving 'public recognition,' which goes against the 'indifferent to personal reward' aspect of Roman virtus, especially when contrasted with Horatius's expectation to die."}]}, {"question": "What action did Lucius Quinctius Cincinnatus famously take immediately after successfully resolving the military crisis for which he was appointed dictator?", "options": [{"text": "He used his temporary power to establish himself as a permanent ruler of Rome.", "isCorrect": false, "rationale": "The text emphasizes that Cincinnatus resigned his dictatorship, demonstrating that power was a burden, not a prize to be kept."}, {"text": "He led the Roman army on further campaigns to expand Rome's territory and influence.", "isCorrect": false, "rationale": "Cincinnatus held the dictatorship for only fifteen days, solely to address the immediate crisis, not to initiate new conquests."}, {"text": "He resigned his dictatorship and returned to his simple life on the farm.", "isCorrect": true, "rationale": "The text explicitly states that Cincinnatus 'resigned the dictatorship' and 'returned to his farm,' serving as Rome's 'supreme example of republican virtue'."}, {"text": "He demanded significant wealth and land from the Senate as compensation for his service.", "isCorrect": false, "rationale": "Cincinnatus had lost most of his land paying debts, and the story emphasizes his return to his small farm, not a desire for reward."}]}, {"question": "How did the primary purposes of Livy and Plutarch in writing history, though both aiming to 'form their readers,' fundamentally differ?", "options": [{"text": "Livy focused on offering moral lessons through legendary tales, while Plutarch was concerned only with strictly factual historical accounts.", "isCorrect": false, "rationale": "Livy admitted his earliest accounts were legendary, and Plutarch was also looking for virtue in history, not just events, and used an anecdote-rich style."}, {"text": "Livy sought to hold up Roman exemplars as mirrors for his own society, whereas Plutarch aimed to compare and contrast character across Greek and Roman civilizations.", "isCorrect": true, "rationale": "The text states Livy 'wrote his history partly to hold up these exemplars as mirrors for a Rome he feared was losing its old virtue,' while Plutarch 'pairs twenty-three famous Greeks with twenty-three famous Romans and compares them in terms of character across both civilizations'."}, {"text": "Livy chronicled the rise and fall of empires, while Plutarch concentrated on the lives of ordinary citizens.", "isCorrect": false, "rationale": "Livy covered Rome from its founding, encompassing its rise, and Plutarch's 'Lives' focused on famous individuals, not ordinary citizens."}, {"text": "Livy was primarily a researcher focused on historical accuracy, while Plutarch prioritized entertaining his audience.", "isCorrect": false, "rationale": "The text notes Livy was 'not primarily a researcher' and had a 'clear moral purpose,' while Plutarch also looked for 'virtue in history' and used an enjoyable style, but not solely for entertainment."}]}, {"question": "Marcus Atilius Regulus's story is the supreme example of Roman *fides*. Which of the following best illustrates the principle of *fides*?", "options": [{"text": "A politician making promises during an election campaign that they later find convenient to break.", "isCorrect": false, "rationale": "This scenario is the opposite of *fides*, as it demonstrates a lack of faithfulness and trustworthiness in keeping one's word."}, {"text": "A business owner always paying their debts on time, even when facing financial difficulties, to maintain their creditworthiness.", "isCorrect": true, "rationale": "This scenario directly reflects *fides* (faithfulness, trustworthiness, the keeping of one's word regardless of cost), as the owner prioritizes honoring their obligation despite personal difficulty, understanding its importance for societal function."}, {"text": "An individual altering a contract to their advantage after it has been signed by all parties.", "isCorrect": false, "rationale": "This action demonstrates deceit and a breach of trust, directly contradicting the principle of *fides*."}, {"text": "A general retreating from battle to preserve his army when defeat seems inevitable, even if it means breaking a previous pledge to hold the line.", "isCorrect": false, "rationale": "While it might be a strategic military decision, breaking a pledge goes against the core tenet of *fides*, which emphasizes keeping one's word regardless of cost."}]}, {"question": "When Marcus Atilius Regulus was sent back to Rome by the Carthaginians under oath, what advice did he give to the Senate regarding the proposed peace treaty?", "options": [{"text": "He urged the Senate to accept the treaty, believing it was the only way to avoid further Roman casualties.", "isCorrect": false, "rationale": "The text states he did 'the opposite of what his captors hoped' and argued against the treaty."}, {"text": "He advised the Senate to delay a decision until Rome could gather more intelligence on Carthage's military strength.", "isCorrect": false, "rationale": "Regulus gave clear and immediate advice regarding the terms themselves, not a call for delay."}, {"text": "He argued that the Carthaginian terms were too generous to Carthage and not favorable enough to Rome, urging them to reject the peace.", "isCorrect": true, "rationale": "The text clearly states Regulus 'argued that the Carthaginian terms were too generous to Carthage and not favorable enough to Rome. He urged the Senate to reject the peace.'"}, {"text": "He abstained from giving any advice, stating his oath to Carthage prevented him from doing so.", "isCorrect": false, "rationale": "Cicero's account states he 'refused to give his own vote on the question,' but he *did* state his mission and advise the Senate against the terms."}]}, {"question": "The comparison between Horatius and Achilles in the 'note' section highlights a key difference in their heroic motivations. What is this difference?", "options": [{"text": "Achilles' courage stemmed from divine intervention, while Horatius's courage was purely human.", "isCorrect": false, "rationale": "The comparison focuses on their *motivations* (pride vs. community service), not the source of their courage (divine vs. human)."}, {"text": "Achilles sought personal glory and vindication, whereas Horatius acted for the community's survival with an expectation of death, indifferent to personal reward.", "isCorrect": true, "rationale": "The note explicitly states Achilles' 'courage serves his pride' and 'sought kleos,' while Horatius 'rushes to the bridge not for glory' but 'for the service of the community, indifferent to personal reward,' expecting to die."}, {"text": "Achilles was a superior warrior who always sought victory, while Horatius was a desperate last resort.", "isCorrect": false, "rationale": "Both are described as great warriors; the contrast is in their *reasons* for fighting/holding ground, not their inherent skill or situation."}, {"text": "Achilles' actions led to immense fame, while Horatius's sacrifice was largely forgotten by history.", "isCorrect": false, "rationale": "Horatius's story is Livy's 'most famous story' from the early Republic, indicating he was well remembered and celebrated."}]}, {"question": "Which of the following describes Plutarch's greatest work mentioned in the text?", "options": [{"text": "*Ab Urbe Condita*, a comprehensive history of Rome from its founding.", "isCorrect": false, "rationale": "*Ab Urbe Condita* was written by Livy, not Plutarch."}, {"text": "*De Officiis*, a philosophical treatise on duties and moral obligations.", "isCorrect": false, "rationale": "*De Officiis* was written by Cicero, as indicated in the Regulus primary source excerpt."}, {"text": "*Parallel Lives*, which pairs famous Greeks and Romans to compare their characters.", "isCorrect": true, "rationale": "The text explicitly states that Plutarch's 'greatest work, the Parallel Lives, pairs twenty-three famous Greeks with twenty-three famous Romans and compares them in terms of character.'"}, {"text": "*The Iliad*, an epic poem about the Trojan War.", "isCorrect": false, "rationale": "*The Iliad* is attributed to Homer, a Greek poet, and is not a work of Plutarch."}]}, {"question": "Considering the narratives of Horatius, Cincinnatus, and Regulus, what overarching message about Roman republican virtue is most strongly conveyed?", "options": [{"text": "The primary goal of Roman citizens was to achieve personal wealth and political power through any means necessary.", "isCorrect": false, "rationale": "All three stories show heroes refusing personal gain (wealth, sustained power) in favor of duty and sacrifice."}, {"text": "Roman virtue was primarily demonstrated through military prowess and the expansion of the Republic's borders.", "isCorrect": false, "rationale": "While military contexts are present, the stories emphasize moral acts (self-sacrifice, duty, faithfulness) rather than simply military conquest or prowess alone."}, {"text": "True Roman greatness involved prioritizing the community's needs and one's sworn word above personal comfort, gain, or even life itself.", "isCorrect": true, "rationale": "Horatius sacrificed himself for the bridge, Cincinnatus gave up power, and Regulus returned to torture for his oath. All three exemplify placing the community's welfare and principles (like *fides*) above personal interest, comfort, or survival."}, {"text": "The Roman Republic championed individual liberties and freedom from state control as its highest ideals.", "isCorrect": false, "rationale": "The stories highlight profound duty *to* the state (*res publica*) and adherence to one's word, suggesting strong social obligations rather than emphasis on individual liberties or freedom *from* state control."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
