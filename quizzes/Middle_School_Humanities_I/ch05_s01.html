    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the *primary* long-term significance of the Pax Romana for the spread of Christianity?", "options": [{"text": "It established Latin as the universal language, making Bible translation easier.", "isCorrect": false, "rationale": "While Latin was important in the western Empire, Koine Greek was the lingua franca of the eastern Mediterranean, which was crucial for early Christian communication. The Pax Romana's significance was broader than just language."}, {"text": "It created a stable, connected environment that facilitated safe travel and communication for missionaries.", "isCorrect": true, "rationale": "The text explicitly states that the conditions of the Pax Romana—safe roads, shared language (Koine Greek), and a unified legal system—were 'essential to the spread of Christianity' by providing safety for travel, common routes, and ease of communication."}, {"text": "It led directly to the official adoption of Christianity by the Roman Empire.", "isCorrect": false, "rationale": "The official adoption of Christianity by the Roman Empire occurred much later under Emperor Constantine, well after the period of the Pax Romana's height and after initial widespread persecutions."}, {"text": "It concentrated wealth in Rome, funding the early Church's expansion efforts.", "isCorrect": false, "rationale": "The text does not mention Roman wealth directly funding the early Church. Early Christian expansion was often self-funded and reliant on community support, not imperial patronage."}], "id": "q01"}, {"question": "How did the prevailing Jewish expectation of the Messiah contrast with the historical figure of Jesus, according to the text?", "options": [{"text": "Jews expected a religious prophet, while Jesus presented himself as a political leader.", "isCorrect": false, "rationale": "This reverses the text's implication. Many Jews expected a political, conquering king, while Jesus's role was more spiritual and surprising, though it carried profound implications for authority."}, {"text": "Jews anticipated a conquering king who would liberate them militarily, whereas Jesus's messianic role was far more surprising and not primarily political in that sense.", "isCorrect": true, "rationale": "The text states: 'But the Messiah most expected was a conquering king; the one who came was something far more surprising,' indicating a contrast between a military liberator and Jesus's actual ministry."}, {"text": "Jews sought a teacher of the Law, but Jesus focused solely on healing miracles.", "isCorrect": false, "rationale": "Jesus was indeed a teacher, and his teachings (like the Sermon on the Mount) were revolutionary, not solely focused on healing, though miracles were part of his ministry."}, {"text": "Jews looked for a divine being, but Jesus claimed to be merely a human man.", "isCorrect": false, "rationale": "Jesus made claims of personal authority over the Torah, forgave sins, and accepted worship, which the religious authorities regarded as blasphemous or indicative of a divine claim, not merely human."}], "id": "q02"}, {"question": "Consider the concept of 'the fullness of time' as described by early Christian writers. Which of the following situations *best* exemplifies how specific historical conditions aided the spread of the Gospel?", "options": [{"text": "A Christian missionary, fluent in Latin, uses the Roman postal system to send a theological treatise to Emperor Augustus, influencing his conversion.", "isCorrect": false, "rationale": "Koine Greek, not Latin, was the lingua franca of the eastern Empire. Also, Emperor Augustus did not convert to Christianity."}, {"text": "Paul, a Roman citizen, travels safely on a well-maintained Roman road from Antioch to Thessalonica, preaching in Koine Greek without needing a translator.", "isCorrect": true, "rationale": "This scenario directly illustrates the 'fullness of time' conditions: Roman roads for travel, Roman citizenship for legal protection, and Koine Greek as the common language for effective communication."}, {"text": "Jewish scholars in Jerusalem, protected by Roman law, freely translate Hebrew Scriptures into multiple local dialects to reach diverse communities.", "isCorrect": false, "rationale": "While translations were important, the text emphasizes common language (Koine Greek) and safe travel/legal protection for missionaries, rather than multi-dialect translation by Jewish scholars as the primary aid to Gospel spread in this context."}, {"text": "A local church leader in Alexandria uses the Pax Romana to establish a new legal code based on Christian principles throughout Egypt.", "isCorrect": false, "rationale": "The Pax Romana provided a legal framework that could protect missionaries, but it did not enable local church leaders to establish new Christian-based legal codes across a Roman province during this early period."}], "id": "q03"}, {"question": "What is the primary significance of the historical testimonies from Josephus and Tacitus regarding Jesus?", "options": [{"text": "They prove the divinity of Jesus and the truth of his resurrection through non-Christian sources.", "isCorrect": false, "rationale": "These historians confirm Jesus's existence and execution, and Josephus mentions reports of the resurrection, but their texts do not 'prove' divinity or the miraculous nature of the resurrection from a secular perspective."}, {"text": "They offer unbiased, secular corroboration of Jesus's existence and his crucifixion, independent of Christian accounts.", "isCorrect": true, "rationale": "The text explicitly states these are 'hostile or neutral witnesses—not Christians—and their testimony establishes the historical reality of Jesus and his execution,' providing independent verification."}, {"text": "They provide detailed accounts of Jesus's ministry and teachings, filling gaps in the Gospels.", "isCorrect": false, "rationale": "Their accounts are very brief and focus on Jesus's existence and execution, not detailed aspects of his ministry or teachings."}, {"text": "They demonstrate that Roman authorities actively supported the early Christian movement.", "isCorrect": false, "rationale": "Tacitus, in particular, describes Christianity as a 'mischievous superstition,' clearly indicating hostility or suspicion, not support, from Roman authorities."}], "id": "q04"}, {"question": "Based on the provided text, which aspect of Jesus's ministry and claims most challenged the traditional religious authorities in Jerusalem?", "options": [{"text": "His practice of healing the sick on the Sabbath, which violated Jewish law.", "isCorrect": false, "rationale": "While healing on the Sabbath was a point of contention, the text highlights more profound claims of authority as the primary challenge."}, {"text": "His revolutionary teachings on love and forgiveness, which contradicted the Old Testament's emphasis on justice.", "isCorrect": false, "rationale": "The Old Testament also contains teachings on love and forgiveness. The primary challenge was not the content of these teachings in themselves, but Jesus's *authority* in proclaiming them."}, {"text": "His assertion of personal authority over the Torah, his ability to forgive sins in his own name, and his acceptance of worship.", "isCorrect": true, "rationale": "The text directly states these actions—'claimed personal authority over the Torah,' 'forgave sins in his own name,' and 'accepted worship'—were the 'claims that made the religious authorities in Jerusalem regard him as either a blasphemer or something more.'"}, {"text": "His decision to choose twelve apostles, which was seen as an attempt to undermine the Temple priesthood.", "isCorrect": false, "rationale": "While choosing apostles was significant for establishing a new community, the text emphasizes Jesus's direct claims of authority as the core challenge to the existing religious order."}], "id": "q05"}, {"question": "The text describes the Resurrection as the 'pivotal fact of history' for Christians. From a historical perspective, what is the most significant consequence of the disciples' conviction that Jesus had risen?", "options": [{"text": "It led to the immediate establishment of Christianity as the official religion of the Roman Empire.", "isCorrect": false, "rationale": "Christianity became the official religion of the Roman Empire much later, under Emperor Theodosius I, not immediately after the Resurrection."}, {"text": "It transformed fearful followers into a zealous movement willing to die for their testimony, enabling rapid church growth.", "isCorrect": true, "rationale": "The text states: 'The disciples who had fled in fear at the crucifixion became within weeks a movement that was willing to die for their testimony,' highlighting the transformative power of this conviction."}, {"text": "It caused a schism within Judaism, as all Jews converted to Christianity.", "isCorrect": false, "rationale": "While Christianity emerged from Judaism and caused theological divisions, not all Jews converted, and Judaism continued as a distinct religion."}, {"text": "It provided the impetus for the development of the Greek language as the lingua franca of the eastern Empire.", "isCorrect": false, "rationale": "Koine Greek spread due to Alexander the Great's conquests centuries before Jesus's time, not as a result of the Resurrection."}], "id": "q06"}, {"question": "The event of Pentecost is presented as the birth of the Church. What key outcome of Pentecost directly facilitated the *initial* rapid growth and spread of the Gospel message beyond a single linguistic group in Jerusalem?", "options": [{"text": "The election of Stephen as the first deacon, demonstrating an organized church structure.", "isCorrect": false, "rationale": "Stephen's election was important for internal organization and ministry to Hellenistic Jews, but it wasn't the primary factor for initial linguistic outreach to diverse groups at Pentecost itself."}, {"text": "The disciples' ability to speak in various languages, allowing diverse Jewish Diaspora communities to understand the Gospel.", "isCorrect": true, "rationale": "The text states that at Pentecost, the disciples 'began speaking in other languages—enabling Jews from across the Diaspora gathered in Jerusalem to hear the Gospel in their own tongue,' directly facilitating initial linguistic spread."}, {"text": "Peter's sermon, which established the theological foundation for Christian doctrine.", "isCorrect": false, "rationale": "While Peter's sermon was crucial for theological articulation, the question asks about the *linguistic* and *initial rapid spread* facilitated by the event, which was the speaking in tongues."}, {"text": "The establishment of the Jerusalem church under Peter and James, creating a central authority.", "isCorrect": false, "rationale": "This describes the leadership and location of the early church, but not the specific event that allowed for immediate communication across different language groups gathered at Pentecost."}], "id": "q07"}, {"question": "Paul's missionary journeys were highly effective in spreading Christianity. Which combination of factors highlights the *strategic importance* of his Roman citizenship and missionary approach?", "options": [{"text": "His fluency in Latin allowed him to bypass synagogues and directly evangelize Roman officials, appealing to Caesar for funding.", "isCorrect": false, "rationale": "Paul primarily used Koine Greek for his missions, not Latin, and there is no indication he sought funding from Caesar; his appeals to Caesar were for legal protection."}, {"text": "His ability to travel undetected as a Roman citizen, establishing secret churches that avoided persecution.", "isCorrect": false, "rationale": "Paul was frequently arrested and encountered opposition, demonstrating he did not travel 'undetected.' His citizenship provided protection and legal rights, not invisibility or complete avoidance of persecution."}, {"text": "His Roman citizenship protected him from arbitrary execution and gave him legal avenues, while his strategy of starting in synagogues provided a ready audience familiar with Scripture.", "isCorrect": true, "rationale": "The text explicitly states his 'Roman citizenship... shielded him from arbitrary punishment and gave him the right to appeal to Caesar,' and his strategy was to 'go first to the synagogue (where he found people already familiar with the Hebrew Scriptures).'"}, {"text": "His appeals to Caesar resulted in a universal decree allowing Christians freedom of worship across the Empire.", "isCorrect": false, "rationale": "Paul's appeals to Caesar were for his personal legal case; they did not lead to a universal decree granting freedom of worship for all Christians, as evidenced by continued persecutions."}], "id": "q08"}, {"question": "Emperor Nero initiated the first organized Roman persecution of Christians. What was the *immediate cause* of this persecution, and how did it distinguish the treatment of high-profile Christian leaders like Peter and Paul?", "options": [{"text": "Nero blamed Christians for refusing to worship him as a god, leading to both Peter and Paul being crucified.", "isCorrect": false, "rationale": "The immediate cause was the Great Fire of Rome, not primarily the refusal to worship Nero at this initial stage. Peter was crucified, but Paul, as a Roman citizen, was beheaded."}, {"text": "Christians were scapegoated for the Great Fire of Rome, resulting in Peter's crucifixion and Paul's beheading due to his Roman citizenship.", "isCorrect": true, "rationale": "The text states Nero 'blamed the Christians—a convenient scapegoat' for the Great Fire. It also specifies Peter's crucifixion and Paul's beheading, noting Paul's citizenship as the reason for the different, less humiliating execution method."}, {"text": "Nero persecuted Christians for their rejection of Roman legal traditions, leading to the public stoning of both apostles.", "isCorrect": false, "rationale": "The cause was the fire, not a direct rejection of legal traditions, and the executions were crucifixion and beheading, not stoning."}, {"text": "The persecution began because Christians publicly denounced the Pax Romana, causing Peter to be exiled and Paul to be imprisoned.", "isCorrect": false, "rationale": "The immediate cause was the fire, and both Peter and Paul faced martyrdom, not mere exile or imprisonment, during Nero's persecution."}], "id": "q09"}, {"question": "The text describes Roman persecution as a complex and varied phenomenon. Which statement best analyzes the *long-term impact* of these persecutions on the growth and resilience of the early Christian Church?", "options": [{"text": "The persecutions consistently diminished the number of Christians, forcing the Church to operate entirely in secret for centuries.", "isCorrect": false, "rationale": "The text contradicts this by quoting Tertullian: 'the blood of the martyrs... was the seed of the Church,' indicating growth rather than consistent decline."}, {"text": "While periods of intense persecution caused great suffering, the courage of martyrs often inspired new converts, ultimately strengthening the Church's resolve and public witness.", "isCorrect": true, "rationale": "The text clearly states: 'Far from stamping out Christianity, the persecutions produced public witnesses whose courage drew converts,' illustrating the paradoxical strengthening effect of martyrdom."}, {"text": "Roman persecutions were largely ineffective because most emperors were sympathetic to Christianity, offering protections to missionaries.", "isCorrect": false, "rationale": "The text notes 'permanent legal vulnerability, punctuated by periods of active persecution' and lists several emperors who launched organized persecutions, indicating general hostility, not sympathy."}, {"text": "The persecutions forced Christian leaders to abandon the Roman roads and Greek language, hindering the spread of the Gospel to remote areas.", "isCorrect": false, "rationale": "Persecutions did not alter the existing infrastructure or common language; missionaries continued to use these tools, sometimes at great personal risk."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
