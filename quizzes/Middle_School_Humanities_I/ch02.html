<script>
var QUESTIONS = [{"question": "What was the primary strategic significance of the Battle of Salamis (480 BC)?", "options": [{"text": "It was the first battle in which Greece defeated a Persian army on land.", "isCorrect": false, "rationale": "The first land victory over Persia was at Marathon in 490 BC, not Salamis. Salamis was a naval engagement."}, {"text": "The Athenian navy, guided by Themistocles, lured the Persian fleet into narrow straits and destroyed it, saving Greece.", "isCorrect": true, "rationale": "As the text states, Themistocles guided the Athenian navy to lure the Persian fleet into the narrow straits of Salamis and destroy it, ending the Persian invasion and allowing Athens to emerge as the most powerful city-state."}, {"text": "A small Spartan force under Leonidas held a mountain pass for three days at Salamis.", "isCorrect": false, "rationale": "Leonidas held the pass at Thermopylae, not Salamis. Salamis was a naval battle."}, {"text": "The battle forced the Persians to negotiate a permanent peace treaty with all Greek city-states.", "isCorrect": false, "rationale": "The text does not describe any peace treaty following Salamis. Athens simply emerged as the most powerful city-state in Greece."}]}, {"question": "How did the Persian Wars paradoxically fund the Golden Age of Athens?", "options": [{"text": "Persia paid war reparations to Athens, which were used to build the Parthenon.", "isCorrect": false, "rationale": "The text makes no mention of Persian reparations. The funding chain ran from silver mines to navy to democracy to building programs."}, {"text": "Athens looted Persian treasuries and used the gold directly for construction.", "isCorrect": false, "rationale": "The text does not describe the looting of Persian treasuries as the funding mechanism for Athens' Golden Age."}, {"text": "The silver mines at Laurium funded a powerful navy, the navy funded Athenian democracy, and democracy funded the building programs of Pericles.", "isCorrect": true, "rationale": "The text explicitly traces this causal chain: 'The silver mines at Laurium funded a powerful navy; the navy funded Athenian democracy; democracy funded the building programs of Pericles.'"}, {"text": "Tribute from the Delian League was the sole source of funding for all Athenian cultural achievements.", "isCorrect": false, "rationale": "While Delian League tribute was a major funding source for Pericles' building programs, the text identifies the silver mines at Laurium as the foundational source, and the cultural achievements also depended on democratic institutions."}]}, {"question": "What does Pericles mean when he calls Athens 'the school of Hellas' in his Funeral Oration?", "options": [{"text": "Athens had the most advanced educational institutions in Greece, including schools founded by Plato and Aristotle.", "isCorrect": false, "rationale": "Plato's Academy was founded after Pericles' death. His claim was broader than formal education: it was about Athens as a model of civilizational achievement for all of Greece."}, {"text": "Athens served as a model to the rest of Greece through its democratic constitution, equal justice under law, and culture of merit over birth.", "isCorrect": true, "rationale": "In the Funeral Oration (recorded by Thucydides), Pericles argues that Athens' constitution favors the many, law affords equal justice, and advancement in public life is based on merit rather than class—making Athens an 'education' or model for all of Greece."}, {"text": "Athens required all Greek city-states to send their children to Athenian schools as part of their Delian League obligations.", "isCorrect": false, "rationale": "No such educational requirement is mentioned in the text. The 'school of Hellas' is a rhetorical claim about Athens as a cultural model, not a literal school system."}, {"text": "Athens had invented the philosophical method and therefore all Greek philosophy traced its origins to Athenian teachers.", "isCorrect": false, "rationale": "While Socrates, Plato, and Aristotle were Athenian or associated with Athens, the 'school of Hellas' refers specifically to Athens as a civic model, not merely as the birthplace of philosophy."}]}, {"question": "What was the fundamental contradiction in Pericles' democratic ideals as practiced in Athens?", "options": [{"text": "Pericles himself was not elected democratically but inherited his position from his father.", "isCorrect": false, "rationale": "The text does not describe Pericles as inheriting power. The contradiction the text identifies is about who was excluded from participation in Athenian democracy."}, {"text": "Athenian democracy excluded women, slaves, and foreigners, who together made up the majority of Athens' population.", "isCorrect": true, "rationale": "The text explicitly notes: 'Athenian democracy, for all its brilliance, excluded women, slaves, and foreigners (who together made up the majority of Athens' population).' This is the central contradiction between Athens' democratic ideals and its practice."}, {"text": "The cost of jury pay and public officeholder pay made Athenian democracy financially unsustainable from the start.", "isCorrect": false, "rationale": "The text presents jury and officeholder pay as a genuine democratic achievement by Pericles, not as a financial contradiction or problem."}, {"text": "The Delian League tribute paid for democracy, but only Athenian citizens could vote, not the allied states that paid the tribute.", "isCorrect": false, "rationale": "While this is historically true and worth noting, the text specifically identifies the exclusion of women, slaves, and foreigners—not allied states—as the primary limitation of Athenian democracy."}]}, {"question": "What ultimately caused Athens to lose the Peloponnesian War?", "options": [{"text": "Sparta received massive financial support from Persia, which Athens could not match militarily.", "isCorrect": false, "rationale": "While Persia eventually supported Sparta, the text emphasizes internal Athenian failures: the plague, the disastrous Sicilian Expedition, and the 27-year duration of mutual exhaustion."}, {"text": "Athens was defeated primarily through a combination of devastating plague, the catastrophic Sicilian Expedition, and a 27-year war of attrition it could not sustain.", "isCorrect": true, "rationale": "The text details how the plague killed perhaps a quarter of Athens' population (including Pericles), the Sicilian Expedition of 415–413 BC destroyed Athens' best fleet and army, and after 27 years Athens surrendered in 404 BC."}, {"text": "Alexander of Macedon invaded Attica and forced Athens to surrender to Sparta.", "isCorrect": false, "rationale": "Alexander was not born until 356 BC—almost fifty years after the Peloponnesian War began. The text does not connect Alexander to Athens' defeat."}, {"text": "Athens ran out of silver from the Laurium mines, which eliminated its ability to fund its navy.", "isCorrect": false, "rationale": "The text does not cite the exhaustion of the Laurium silver mines as a cause of Athens' defeat. The primary factors mentioned are plague, the Sicilian disaster, and the war's length."}]}, {"question": "What military innovation made Philip II of Macedon's army the most effective fighting force in the world?", "options": [{"text": "Philip invented the trireme warship, which allowed him to defeat Greek city-states by controlling the sea.", "isCorrect": false, "rationale": "The trireme was an Athenian naval innovation, not Macedonian. Philip's innovations were land-based."}, {"text": "Philip developed the sarissa—an eighteen-foot pike—organized into the devastating Macedonian phalanx.", "isCorrect": true, "rationale": "The text states: 'He invented the sarissa—a pike eighteen feet long—organized into the devastating Macedonian phalanx.' This combination proved decisive at Chaeronea in 338 BC."}, {"text": "Philip created the first professional cavalry force in the ancient world, which he used to outflank Greek hoplites.", "isCorrect": false, "rationale": "While Macedonian cavalry was indeed important, the text specifically credits the sarissa and the Macedonian phalanx as Philip's key innovations."}, {"text": "Philip bribed Athenian political leaders to prevent the city-states from uniting against him.", "isCorrect": false, "rationale": "The text does not describe Philip's success through bribery but through military innovation and the development of the Macedonian phalanx."}]}, {"question": "Why was the spread of Greek language (koine) following Alexander's conquests historically significant for Christianity?", "options": [{"text": "It allowed early Christians to read the Old Testament in its original Hebrew without translation.", "isCorrect": false, "rationale": "The opposite is true: koine Greek enabled the translation of the Hebrew Scriptures into Greek (the Septuagint), allowing Greek-speakers who did not know Hebrew to read them."}, {"text": "It meant the New Testament was written in koine Greek, Paul's missionary journeys relied on Greek-speaking cities, and the Septuagint was produced for Greek-speaking Jews.", "isCorrect": true, "rationale": "The text explicitly states that koine Greek was 'crucial for understanding Unit 5: the New Testament was written in koine Greek, and Paul's missionary journeys relied on the network of Greek-speaking cities Alexander had planted.' The Septuagint is also mentioned."}, {"text": "Greek became the official language of the Roman Empire, replacing Latin for all imperial communications.", "isCorrect": false, "rationale": "Latin remained the official language of the Roman administration in the West. Greek was the lingua franca of the eastern Empire and educated classes, but did not replace Latin as the official Roman language."}, {"text": "It allowed Alexander himself to personally oversee the translation of Egyptian religious texts into Greek.", "isCorrect": false, "rationale": "The text does not describe Alexander overseeing religious translations. The Septuagint was produced at Alexandria after Alexander's death, under Ptolemaic patronage."}]}, {"question": "In Sophocles' Antigone, what fundamental conflict does the play dramatize?", "options": [{"text": "The conflict between Athenian democracy and Spartan oligarchy, using the mythological setting as allegory.", "isCorrect": false, "rationale": "The play is not an allegory for the Athens-Sparta conflict. Its central conflict is the clash between human law (Creon's decree) and divine/natural law (Antigone's conscience)."}, {"text": "The clash between human law and divine law, embodied in Creon's insistence that state law is supreme versus Antigone's insistence that the gods' unwritten laws rank higher.", "isCorrect": true, "rationale": "The text describes Antigone's conflict as 'one of the most powerful conflicts in all of literature: the clash between human law and divine law.' Creon insists state law is supreme; Antigone insists divine law ranks higher."}, {"text": "The conflict between family loyalty and romantic love, as Antigone must choose between burying her brother and marrying Haemon.", "isCorrect": false, "rationale": "While the play does involve family bonds, the text identifies the central conflict as between human and divine law, not between family duty and romantic love."}, {"text": "The conflict between military glory and domestic duty, as Polynices was both a traitor and Antigone's beloved brother.", "isCorrect": false, "rationale": "The text does not frame the play's central conflict in terms of military glory versus domestic duty. The text emphasizes the human law versus divine law tension."}]}, {"question": "What was Socrates' central defense at his trial, as recorded in Plato's Apology?", "options": [{"text": "He claimed he was innocent because Athenian law did not actually prohibit his philosophical activities.", "isCorrect": false, "rationale": "Socrates did not argue on narrow legal grounds. His defense was philosophical: the examined life is the only life worth living, and he would rather die than stop philosophizing."}, {"text": "He argued that the examined life is the only life worth living, that he obeyed God rather than men, and that he would not stop philosophizing even on pain of death.", "isCorrect": true, "rationale": "The text quotes Plato's Apology: 'the unexamined life is not worth living' and Socrates' statement that he would 'obey God rather than you, and while I have life and strength I shall never cease from the practice and teaching of philosophy.'"}, {"text": "He called witnesses to testify that he had never corrupted the youth and had always honored the gods of Athens.", "isCorrect": false, "rationale": "The text describes Socrates' defense as 'extraordinary' precisely because instead of begging for mercy or calling witnesses, he argued that philosophizing was a divine mission he would not abandon."}, {"text": "He argued that the charges were politically motivated and that his true crime was exposing the ignorance of powerful Athenians.", "isCorrect": false, "rationale": "While Socrates does imply that his questioning embarrassed powerful people, the text's summary of his defense focuses on the value of the examined life and his divine mission, not on a political conspiracy claim."}]}, {"question": "How does Plato's philosophy differ fundamentally from Aristotle's approach to knowledge and reality?", "options": [{"text": "Plato believed in democratic governance while Aristotle believed only aristocrats could achieve true knowledge.", "isCorrect": false, "rationale": "This misrepresents both philosophers' views. Plato's Republic imagined philosopher-kings, not democracy. The difference between them is about where truth is found—in abstract Forms or in the observable world."}, {"text": "Plato trusted the senses as the primary source of knowledge, while Aristotle believed truth came from pure reason alone.", "isCorrect": false, "rationale": "This reverses their positions. Plato distrusted the senses and looked to eternal Forms; Aristotle trusted his senses and observed the world carefully."}, {"text": "Plato believed the material world is an imperfect shadow of a higher realm of eternal Forms, while Aristotle trusted the senses and argued virtue is built through practice and observation.", "isCorrect": true, "rationale": "The text explicitly contrasts the two: Plato taught 'the material world is an imperfect shadow of a higher realm of perfect Forms,' while Aristotle 'took a different approach: he trusted his senses, classified plants and animals, and argued that virtue was a habit cultivated through practice.'"}, {"text": "Plato focused on political science and biology while Aristotle focused on mathematics and metaphysics.", "isCorrect": false, "rationale": "This reverses the actual interests: Aristotle famously classified plants and animals (biology) and wrote widely on politics. Plato is more associated with mathematics and metaphysics (the Forms)."}]}, {"question": "What does the Stoic concept of the Logos mean, and why was it important for the early spread of Christianity?", "options": [{"text": "Logos means 'victory' in Greek and was adopted by early Christians to describe Jesus' triumph over death.", "isCorrect": false, "rationale": "Logos means 'word,' 'reason,' or 'rational principle,' not 'victory.' Its theological significance comes from John's Gospel using it to describe Christ."}, {"text": "The Stoics' divine Logos—the rational principle governing the universe shared by all humans—provided vocabulary that Paul used at Athens and that John used in his Gospel's opening prologue.", "isCorrect": true, "rationale": "The text explains that the Stoics' 'divine Logos governed the universe and that all human beings shared in one rational community,' and notes this 'would become central vocabulary in Units 4 and 5, when Paul stood before Stoic philosophers at the Areopagus' and that John's Gospel opens by identifying Christ as the Logos."}, {"text": "The Stoic Logos was identical to the Christian Holy Spirit, making Stoicism a direct precursor to Christian trinitarian theology.", "isCorrect": false, "rationale": "The text does not claim Stoic Logos equals the Holy Spirit, and such an identification would be theologically misleading. The Logos was used as a bridge concept, not as an identical doctrine."}, {"text": "Stoicism's founder Zeno converted to Christianity shortly before his death and used the Logos as a bridge between the two faiths.", "isCorrect": false, "rationale": "Zeno of Citium (c. 334–262 BC) died centuries before Christ. The text does not describe any conversion; the connection between Stoic Logos and Christian theology was made by later thinkers like John and Paul."}]}, {"question": "What is the Delian League, and how did it transform from its original purpose?", "options": [{"text": "The Delian League was a religious confederation for worshipping Apollo at Delos that Athens converted into a trade network.", "isCorrect": false, "rationale": "The Delian League was a military alliance formed after the Persian Wars, not a religious confederation. The text does not mention Apollo or religion as its original purpose."}, {"text": "The Delian League was formed as a mutual defense alliance after the Persian Wars but gradually became an Athenian empire as Athens moved the treasury to Athens and used funds for its own building projects.", "isCorrect": true, "rationale": "The text defines the Delian League as 'an alliance of Greek city-states formed after the Persian Wars in 478 BC, led by Athens. Originally created for mutual defense, it gradually became an Athenian empire as Athens moved the league treasury to Athens and used the funds for its own building projects.'"}, {"text": "The Delian League was formed by Athens and Sparta together and later split apart when the two cities went to war.", "isCorrect": false, "rationale": "Sparta was not a member of the Delian League; it led the rival Peloponnesian League. The Delian League was Athens' maritime empire."}, {"text": "The Delian League was an economic free trade zone that Athens dominated through commercial policy rather than military force.", "isCorrect": false, "rationale": "The Delian League was a military alliance, not an economic free trade zone. Athens' dominance was expressed through forced membership and diversion of tribute money, not trade policy."}]}, {"question": "What is the historical significance of the Hellenistic period for Western civilization?", "options": [{"text": "The Hellenistic period produced the first monotheistic religion, which directly influenced both Judaism and Christianity.", "isCorrect": false, "rationale": "Judaism's monotheism predates the Hellenistic period. The text does not claim the Hellenistic period produced monotheism; its significance lies in spreading Greek language and culture."}, {"text": "The Hellenistic period created a Greek-speaking world stretching from Greece to India, in which the New Testament was written, Alexandria's library was founded, and Stoic philosophy developed.", "isCorrect": true, "rationale": "The text describes the Hellenistic world as lasting from Alexander's death (323 BC) to Rome's conquest of Egypt (30 BC) and notes its legacy: 'the New Testament was written in Hellenistic Greek; the great library at Alexandria was a Hellenistic institution; the Stoic philosophy that Paul engaged at Athens was a Hellenistic creation.'"}, {"text": "The Hellenistic period ended Greek cultural creativity as conquered peoples absorbed Greek culture but contributed nothing new.", "isCorrect": false, "rationale": "The text presents the Hellenistic period as a fusion of Greek with Persian, Egyptian, and Indian traditions, not as a cultural dead end."}, {"text": "The Hellenistic period was primarily significant for establishing Greek political democracy throughout the Middle East and Central Asia.", "isCorrect": false, "rationale": "The text emphasizes cultural and linguistic unity (Greek as the common tongue of educated people), not the spread of democratic governance. Alexander's successor kingdoms were monarchies, not democracies."}]}, {"question": "What does the text suggest about the relationship between Greek tragedy and Christian ethics?", "options": [{"text": "Greek tragedy was fundamentally incompatible with Christian ethics because it celebrated fate and the gods rather than free will and the one God.", "isCorrect": false, "rationale": "The text explicitly argues the opposite: 'a Christian can read Sophocles and Plato with gratitude, not suspicion, finding in them genuine glimpses of truth.' Greek tragedy arrived at moral intuitions Christians recognize as genuinely true."}, {"text": "Greek tragedy and philosophy arrived at genuine moral truths—that pride destroys, that laws exist above human laws, that the soul matters more than the body—that Christians recognize as consistent with natural law.", "isCorrect": true, "rationale": "The text argues that 'Greek tragedy and philosophy were performed and taught in a society that had no church, no Bible, and no special revelation—yet they arrived at moral intuitions that Christians recognize as genuinely true,' citing examples from Agamemnon, Antigone, and Socrates."}, {"text": "Christian thinkers rejected Greek tragedy entirely because its polytheistic framework was incompatible with monotheism.", "isCorrect": false, "rationale": "The text describes how 'the early Church did not throw away Greek philosophy; it baptized the best of it.' Augustine used Plato, Aquinas used Aristotle, and Justin Martyr said Socrates was 'in a measure a Christian.'"}, {"text": "The only connection between Greek tragedy and Christianity is that both were performed in the same theaters in first-century Athens.", "isCorrect": false, "rationale": "The connection the text establishes is philosophical and ethical, not about shared venues. The text discusses natural law, the immortality of the soul, and hubris as themes connecting Greek tragedy to Christian thought."}]}, {"question": "The three orders of Greek architecture—Doric, Ionic, and Corinthian—are significant because:", "options": [{"text": "They were only used in religious buildings and disappeared with the decline of Greek polytheism.", "isCorrect": false, "rationale": "The text specifically states these orders 'were adopted by Rome and have appeared in Western architecture ever since, from the United States Capitol to your local courthouse'—clearly secular buildings."}, {"text": "They represent a uniquely Greek innovation in construction technique that allowed buildings to be made without mortar.", "isCorrect": false, "rationale": "The three orders are about decorative style and column design, not construction technique. The text focuses on their visual characteristics and their adoption by Rome and later Western civilization."}, {"text": "They were adopted by Rome and have continued to appear in Western architecture ever since, demonstrating the enduring influence of Greek aesthetic principles.", "isCorrect": true, "rationale": "The text states the three orders 'were adopted by Rome and have appeared in Western architecture ever since, from the United States Capitol to your local courthouse,' demonstrating the text's thesis about Greek cultural endurance."}, {"text": "They were invented during the Hellenistic period and represent the fusion of Greek and Persian architectural traditions.", "isCorrect": false, "rationale": "The three orders were developed by Classical Greeks, not during the Hellenistic fusion period. The Parthenon (432 BC) already uses the Doric and Ionic orders."}]}, {"question": "What was the significance of Pericles extending pay to jurors and public officeholders?", "options": [{"text": "It allowed Athens to attract talented foreigners to serve in government, broadening democracy's social base.", "isCorrect": false, "rationale": "The text specifies that the pay system allowed poor citizens—not foreigners—to participate. Foreigners were excluded from Athenian citizenship and therefore from government."}, {"text": "It deepened Athenian democracy by allowing poor citizens to participate in government without having to sacrifice their livelihoods.", "isCorrect": true, "rationale": "The text states Pericles 'deepened Athenian democracy, extending pay to jurors and public officeholders so that poor citizens could participate in government without starving.' This made democracy genuinely accessible to economic classes beyond the wealthy."}, {"text": "It was primarily a patronage system that allowed Pericles to reward political supporters with government positions.", "isCorrect": false, "rationale": "The text frames this as a democratic reform that broadened participation, not as political patronage. The text presents it alongside Pericles' claim that merit rather than class determined advancement."}, {"text": "It replaced the need for Delian League tribute by creating a self-funding democratic government.", "isCorrect": false, "rationale": "The text presents Delian League tribute as the major funding source for Pericles' programs, including the building projects. There is no claim that jury and officeholder pay replaced tribute as the financial foundation."}]}, {"question": "What does the text suggest is the lasting lesson of Athens' decline through the Peloponnesian War?", "options": [{"text": "That direct democracy is inherently unstable and must eventually be replaced by representative government.", "isCorrect": false, "rationale": "The text does not draw this constitutional conclusion. It focuses on the specific moral and political failures that destroyed Athens, not on a structural argument against direct democracy."}, {"text": "That a democracy can destroy itself through arrogance, short-sighted decision-making, and the flattery of demagogues.", "isCorrect": true, "rationale": "The text explicitly states: 'how a democracy can destroy itself through arrogance, short-sighted decision-making, and the flattery of demagogues' is 'still studied in military and political science' as a lesson from Athens' collapse."}, {"text": "That small city-states cannot resist large imperial powers and must unite to survive, as Athens' failure to ally with Sparta permanently proves.", "isCorrect": false, "rationale": "The text's lesson is about democratic self-destruction, not about the inherent vulnerability of small states. Athens and Sparta were enemies, and their failure to cooperate was a symptom of the democratic failures the text identifies."}, {"text": "That naval power is ultimately inferior to land power, since Sparta's army defeated Athens' superior navy.", "isCorrect": false, "rationale": "The text does not draw this military-strategic conclusion. The defeat of Athens involved the plague, the Sicilian disaster, and political failures, not a simple demonstration of land power over sea power."}]}, {"question": "How does the Roman saying 'Captive Greece captured its fierce conqueror' (Horace) capture the cultural relationship between Greece and Rome?", "options": [{"text": "It describes how Greek mercenaries infiltrated the Roman army and eventually overthrew Roman commanders.", "isCorrect": false, "rationale": "The saying is about cultural, not military, influence. Horace is making an ironic observation about how Rome's military conquest of Greece resulted in Roman culture being conquered by Greek culture."}, {"text": "It describes how the Romans conquered Greece militarily but were themselves conquered by Greek culture, adopting Greek architecture, drama, philosophy, and language.", "isCorrect": true, "rationale": "The text explains: 'Military conquest flowed one way; cultural influence flowed the other.' The Romans adopted Greek architectural orders, adapted Greek drama, and absorbed Stoic and Platonic philosophy through educated Greeks and Greek tutors."}, {"text": "It describes how Greece eventually regained political independence from Rome through cultural influence on Roman senators.", "isCorrect": false, "rationale": "Greece did not regain political independence through cultural influence. The saying describes cultural dominance flowing from the conquered to the conqueror, not political liberation."}, {"text": "It suggests that Greek prisoners of war educated Roman children and thereby spread democracy throughout the Roman Empire.", "isCorrect": false, "rationale": "While educated Greek slaves did serve as tutors to Roman children, the text does not connect this specifically to the spread of democracy. The cultural transmission was broader: architecture, drama, philosophy, and language."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
