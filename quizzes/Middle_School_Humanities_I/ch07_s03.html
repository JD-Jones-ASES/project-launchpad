<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Western Europe recover economically after the collapse of the Roman trade economy?", "options": [{"text": "Rapidly, through re-establishing long-distance trade routes with the East.", "isCorrect": false, "rationale": "The text states that recovery was 'Slowly, through the development of a new economic and social order that was less connected to distant markets'."}, {"text": "By adopting a localized, self-sufficient economic and social order.", "isCorrect": true, "rationale": "The text explains the recovery involved a new order 'less connected to distant markets but more self-sufficient at the local level', exemplified by the manor system and monastic economies."}, {"text": "Through large-scale government-funded infrastructure projects.", "isCorrect": false, "rationale": "While Charlemagne did implement standardization, large-scale infrastructure projects like Roman roads were not the primary driver of economic recovery mentioned in the text."}, {"text": "Primarily by increasing the slave supply to work latifundia.", "isCorrect": false, "rationale": "The text explicitly states that 'With the slave supply cut off by the end of Roman conquest... a new system developed: the manor', replacing the latifundia system."}]}, {"question": "What significant historical parallel did Pope Leo III acknowledge by crowning Charlemagne 'Emperor of the Romans'?", "options": [{"text": "Charlemagne's successful conquest of the entire former Byzantine Empire.", "isCorrect": false, "rationale": "Charlemagne's empire encompassed much of Western Europe, but it did not conquer the Byzantine (Eastern Roman) Empire."}, {"text": "Charlemagne's reconstruction of territory roughly equivalent to the former Western Roman Empire.", "isCorrect": true, "rationale": "The text notes that 'the Carolingian Empire covers roughly the same territory as the Western Empire west of the Rhine and Danube. Charlemagne was, in a real sense, rebuilding the Western Empire'."}, {"text": "Charlemagne's adoption of the Roman legal system in its entirety.", "isCorrect": false, "rationale": "While Charlemagne standardized aspects of governance, the text does not state he adopted the Roman legal system in its entirety, rather he issued his own capitularies."}, {"text": "Charlemagne's revival of the Roman system of latifundia worked by slaves.", "isCorrect": false, "rationale": "The manor system, worked by serfs, replaced the Roman latifundia worked by slaves, signifying a departure from the Roman system."}]}, {"question": "Which statement accurately describes the core mechanism of the three-field system?", "options": [{"text": "Land was divided into three sections, with two planted and one left fallow each year, rotating crops annually.", "isCorrect": true, "rationale": "The text explicitly states: 'a manor's arable land was divided into three sections: One field planted with a winter grain... One field planted with a spring crop... One field left fallow... The fields rotated each year.'"}, {"text": "Three distinct crops were planted simultaneously in the same field each year to maximize yield.", "isCorrect": false, "rationale": "The three-field system involved rotating different crops and fallow land across separate fields, not interplanting three crops in one field simultaneously."}, {"text": "Farmers planted grains for three consecutive years before allowing the land to rest for one year.", "isCorrect": false, "rationale": "The system involved yearly rotation where one of the three fields was always fallow."}, {"text": "It involved cultivating three separate plots for different types of livestock feed only.", "isCorrect": false, "rationale": "The system included winter grains (wheat/rye) and spring crops (oats, barley, legumes), which were for both human consumption and animal feed."}]}, {"question": "Beyond increased food production, how did the three-field system contribute to the gradual population recovery and subsequent intellectual revivals in the early medieval period?", "options": [{"text": "By concentrating all agricultural labor into a single, highly efficient field, freeing up labor for other pursuits.", "isCorrect": false, "rationale": "The three-field system increased overall cultivated land and spread agricultural risk, rather than concentrating labor into a single field."}, {"text": "By allowing more land to remain fallow for longer periods, significantly improving soil quality.", "isCorrect": false, "rationale": "Compared to the two-field system, less land was fallow (one-third instead of one-half), meaning more land was under cultivation, though soil fertility still improved due to rotation and legumes."}, {"text": "By providing a more consistent food supply and higher protein intake, which supported a larger and healthier population and diversified labor.", "isCorrect": true, "rationale": "The text states it 'increased total production... improved soil fertility... and provided more protein (legumes) in the diet... meant more people could be fed... more people meant more labor available for crafts, building, and scholarship.'"}, {"text": "By exclusively focusing on high-value cash crops that could be traded internationally for necessities.", "isCorrect": false, "rationale": "The three-field system was part of a localized, self-sufficient economy, focusing on staples rather than international cash crops."}]}, {"question": "According to the text, what made Benedictine monasteries economically sophisticated institutions in the early medieval West?", "options": [{"text": "Their primary focus on accumulating luxury goods for trade with Byzantium.", "isCorrect": false, "rationale": "Monasteries focused on self-sufficiency and local economic support, not primarily on luxury trade with Byzantium."}, {"text": "Their extensive banking operations and control over imperial taxation.", "isCorrect": false, "rationale": "Monasteries did lend money and keep accounts, but the text does not suggest they had 'control over imperial taxation'."}, {"text": "Their dedication to self-sufficiency through labor, expertise in agriculture, craft production, record-keeping, and role as centers of technological diffusion.", "isCorrect": true, "rationale": "The text states monasteries 'developed expertise in agriculture, craft production, and record-keeping' due to the 'ora et labora' rule, and 'served as centers of technological diffusion'."}, {"text": "Their complete isolation from surrounding communities, allowing them to hoard resources.", "isCorrect": false, "rationale": "Monasteries provided hospitality, credit, and education, making them integral 'economic backbone of many early medieval regions'."}]}, {"question": "Which of the following was a key component of Charlemagne's program to impose administrative and economic standardization across his empire?", "options": [{"text": "Abolishing all local currencies in favor of a universal Roman gold solidus.", "isCorrect": false, "rationale": "Charlemagne reformed the coinage by creating a uniform silver denier, not adopting the Roman gold solidus."}, {"text": "Issuing capitularies to regulate various aspects of governance, along with standardizing weights and measures.", "isCorrect": true, "rationale": "The text states Charlemagne 'standardized weights and measures, reformed the coinage... and issued capitularies (written royal decrees) regulating everything from the management of royal estates to the minimum educational requirements'."}, {"text": "Mandating the exclusive use of Latin for all spoken communication throughout the empire.", "isCorrect": false, "rationale": "While Latin was crucial for administration and education, the text refers to written script standardization (Carolingian minuscule), not mandating spoken Latin for all."}, {"text": "Centralizing all agricultural production under direct imperial control.", "isCorrect": false, "rationale": "Charlemagne regulated royal estates and supported the existing manor system, but he did not centralize all agricultural production under direct imperial control."}]}, {"question": "The Admonitio Generalis of AD 789, Charlemagne's educational decree, primarily aimed to achieve what practical goal?", "options": [{"text": "To produce a large class of independent philosophical thinkers.", "isCorrect": false, "rationale": "The text contrasts Charlemagne's program with Plato's, noting that Charlemagne's curriculum was 'shaped not by abstract philosophy but by Scripture, grammar, and the practical arts of administration'."}, {"text": "To ensure a basic level of literacy and administrative competence among priests and imperial officials.", "isCorrect": true, "rationale": "The text states the goal was practical: 'Charlemagne needed literate administrators... ordered every monastery and cathedral to establish a school teaching reading, writing, singing, arithmetic, and grammar'."}, {"text": "To convert all remaining pagan communities to Christianity through mandatory schooling.", "isCorrect": false, "rationale": "The decree focused on establishing schools within existing monasteries and cathedrals for the clergy and administrators, not for general conversion of pagans through schooling."}, {"text": "To prepare all male citizens for military service through physical and intellectual training.", "isCorrect": false, "rationale": "The focus was on literacy and administrative skills, not primarily military training."}]}, {"question": "Based on the text's comparison, what is a key *difference* between Charlemagne's educational system and a modern public education system in a democracy?", "options": [{"text": "Both primarily aimed to create educated citizens capable of participating in governance.", "isCorrect": false, "rationale": "The text clarifies that Charlemagne's primary purpose was 'producing literate administrators and priests, not educated citizens', whereas modern democracies value 'informed citizenship'."}, {"text": "Charlemagne's schools were state-run and secular, while modern schools are often run by the Church.", "isCorrect": false, "rationale": "The text explicitly states: 'Charlemagne's schools were run by the Church, not the state'."}, {"text": "Charlemagne's curriculum centered on Scripture and grammar for administrators and priests, whereas modern curricula emphasize broader secular subjects for informed citizenship.", "isCorrect": true, "rationale": "The text highlights that Charlemagne's curriculum 'centered on Scripture and grammar rather than secular subjects' and modern democracies value 'informed citizenship and economic productivity'."}, {"text": "Modern public education is primarily for an elite few, while Charlemagne's schools were open to all, regardless of birth.", "isCorrect": false, "rationale": "The text notes Charlemagne's schools were 'open to any boy with aptitude', contrasting with Plato's elite academy, but modern public education is generally much more universal than Charlemagne's system."}]}, {"question": "What is the most significant and lasting legacy of the Carolingian minuscule script?", "options": [{"text": "It made Latin the universal spoken language across Western Europe for centuries.", "isCorrect": false, "rationale": "Carolingian minuscule was a written script, not a spoken language, and its impact was on readability and standardization of texts."}, {"text": "It became the foundation for the lowercase letters used in modern Western alphabets.", "isCorrect": true, "rationale": "The text explicitly states: 'The lowercase letters in this textbook descend directly from the monks of Charlemagne's scriptorium'."}, {"text": "It was an elaborate decorative script used exclusively for illuminated manuscripts.", "isCorrect": false, "rationale": "The script was 'clear, rounded' and developed for readability and standardization across the empire, not solely for elaborate decoration."}, {"text": "It allowed for the rapid printing of books, replacing laborious hand-copying.", "isCorrect": false, "rationale": "The Carolingian minuscule was developed centuries before the invention of the printing press."}]}, {"question": "The 'then and now' section compares Charlemagne's cultural program to those of Pericles and Augustus. What does this comparison suggest about the enduring impulse behind such revivals, despite differences in focus?", "options": [{"text": "All great leaders throughout history eventually turn to religious doctrine as the primary source of cultural identity.", "isCorrect": false, "rationale": "Pericles' program focused on physical grandeur, and Augustus's on literary identity, neither primarily religious doctrine, though Charlemagne's did."}, {"text": "Political power is often deliberately linked with cultural and intellectual development to define and legitimize a civilization.", "isCorrect": true, "rationale": "The text concludes, 'In both cases, political power and cultural revival were deliberately yoked together... the impulse—that a great civilization must also be a learned one—had not [shifted].'"}, {"text": "The ideal educational system universally prioritizes abstract philosophical reasoning over practical skills.", "isCorrect": false, "rationale": "The text contrasts Plato's philosophical elite with Charlemagne's practical literacy, indicating a difference in priorities, not a universal ideal."}, {"text": "Every cultural revival ultimately replaces previous traditions with entirely new artistic and literary forms.", "isCorrect": false, "rationale": "These revivals often built upon or reinterpreted earlier traditions (e.g., humanists 'rediscovering' Carolingian manuscripts), rather than completely replacing them."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
