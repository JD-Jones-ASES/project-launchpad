<script>
var QUESTIONS = [{"question": "What was the Crisis of the Third Century (AD 235–284), and why did it matter?", "options": [{"text": "A series of natural disasters — earthquakes, floods, and famine — that devastated the Roman provinces and weakened the imperial government.", "isCorrect": false, "rationale": "The text describes the Crisis of the Third Century as primarily a political and economic crisis: over 50 emperors in 50 years (most murdered by their own soldiers), civil war, frontier pressure, trade collapse, currency debasement, and shrinking cities."}, {"text": "In fifty years, the Empire had more than fifty emperors (most murdered by soldiers), civil war raged, frontiers came under constant pressure, trade collapsed, cities shrank, and currency debasement caused severe inflation.", "isCorrect": true, "rationale": "The text describes exactly this: 'In those fifty years, the Roman Empire had more than fifty emperors — most of them murdered by their own soldiers after reigns of months or even weeks. Civil war raged across the provinces... Trade collapsed. Cities shrank. The money economy weakened as the government debased the currency.'"}, {"text": "A prolonged war with the Persian Sassanid Empire that drained Roman military resources and led directly to the Visigothic invasions of the fourth century.", "isCorrect": false, "rationale": "The text does not identify Persian wars as the primary feature of the third-century crisis. The crisis was internal: political instability, economic collapse, and frontier pressure from Germanic tribes."}, {"text": "The third century crisis was caused primarily by Christianity undermining Rome's martial virtue and civic religion, as Edward Gibbon later argued.", "isCorrect": false, "rationale": "The text cites Gibbon's argument but presents it as one view among many and describes modern historians as citing multiple other causes: military overstretching, economic decline, currency debasement, plague, administrative corruption, etc."}], "id": "q01"}, {"question": "What was currency debasement, and how did it contribute to Rome's decline?", "options": [{"text": "Currency debasement was Rome's policy of conquering new territories to gain fresh silver for the treasury, which became impossible when expansion stopped.", "isCorrect": false, "rationale": "Currency debasement is described as reducing the precious metal content of existing coins, not conquering new territories. When expansion stopped, the inability to fund the army through conquest forced debasement."}, {"text": "Rome reduced the silver content of its coins while keeping their face value, causing inflation as merchants raised prices to compensate — by the mid-third century, Roman silver coins contained almost no silver.", "isCorrect": true, "rationale": "The text defines currency debasement: 'When a government reduces the precious metal content of its coins while keeping their face value... The result was inflation: merchants raised prices to compensate for receiving less silver per coin. By the mid-third century, Roman silver coins contained almost no silver at all.'"}, {"text": "The Roman government introduced paper currency to replace metal coins, but merchants refused to accept it, causing the collapse of the monetary economy.", "isCorrect": false, "rationale": "The text describes debasement of metal coins (reducing silver content), not introduction of paper currency. Rome's monetary crisis was about devalued metal coinage, not paper money."}, {"text": "Currency debasement was a deliberate policy by Roman emperors to impoverish the aristocracy and fund social programs for the poor, which destabilized the economy.", "isCorrect": false, "rationale": "The text presents debasement as a desperate measure to pay soldiers and officials when tax revenues fell short — not as a deliberate class policy."}], "id": "q02"}, {"question": "How did the Visigoths end up inside the Roman Empire, and why did this lead to the Battle of Adrianople?", "options": [{"text": "The Visigoths were recruited as mercenaries by the Eastern Emperor Valens to defend the Danube frontier, but turned on Rome when their pay was cut.", "isCorrect": false, "rationale": "The text describes the Visigoths as refugees from the Huns, not as recruited mercenaries. They crossed the Danube as a desperate people fleeing destruction, not as paid soldiers."}, {"text": "The Visigoths invaded Roman territory militarily after years of border raiding, forcing Valens to fight them at Adrianople to defend the Danube frontier.", "isCorrect": false, "rationale": "The text is clear that the Visigoths entered Roman territory as refugees with Valens' permission — they 'begged Emperor Valens to let them cross the Danube River and settle within Roman territory.' The revolt was caused by Roman mistreatment after entry."}, {"text": "Fleeing the Huns, the Visigoths begged Valens to allow them inside the Empire; Roman administrators then exploited them, selling dog-meat at extortionate prices and demanding their children as slaves. The Visigoths revolted, and Adrianople (378) was the catastrophic result.", "isCorrect": true, "rationale": "The text describes exactly this sequence: the Huns drove the Visigoths into panic; they 'begged Emperor Valens to let them cross the Danube'; Roman administrators 'failed to provide the promised grain and fair treatment' and exploited them; the Visigoths 'revolted.' The Battle of Adrianople (AD 378) killed Valens and destroyed two-thirds of the Roman field army."}, {"text": "The Visigoths had been inside the Empire for generations as foederati, but rebelled when Constantine's successors tried to forcibly convert them from Arian Christianity to Nicene orthodoxy.", "isCorrect": false, "rationale": "The text presents the Visigothic entry in AD 376 as new — a refugee crisis caused by the Huns. It does not describe forced religious conversion as the cause of the revolt."}], "id": "q03"}, {"question": "What is the significance of the Battle of Adrianople (AD 378)?", "options": [{"text": "It was the last great Roman victory in the West — the moment Rome stopped the Visigothic advance and secured the Danube frontier permanently.", "isCorrect": false, "rationale": "Adrianople was a catastrophic Roman DEFEAT, not a victory. The last great Roman military victory in the West mentioned in the text was the Battle of the Catalaunian Plains (AD 451) against Attila."}, {"text": "Adrianople was a catastrophic Roman defeat: Emperor Valens was killed, two-thirds of the Roman field army destroyed, and the Danube frontier was cracked open — never fully repaired.", "isCorrect": true, "rationale": "The text describes Adrianople as 'a catastrophe: Valens was killed, and two-thirds of the Roman field army was destroyed. It was the worst Roman military defeat since Hannibal's victory at Cannae in 216 BC. The frontier had cracked.' The crack 'was never fully repaired.'"}, {"text": "It was significant because it was the first battle in which Germanic troops fought for Rome rather than against it, establishing the foederati system.", "isCorrect": false, "rationale": "The foederati system developed after Adrianople, not before it. Adrianople was a battle between Rome and the Visigoths, not the creation of the foederati arrangement."}, {"text": "At Adrianople, a combined Roman-Visigothic force defeated Attila the Hun, ending the Hunnic threat and saving Western civilization.", "isCorrect": false, "rationale": "This confuses Adrianople (AD 378, Roman defeat by Visigoths) with the Battle of the Catalaunian Plains (AD 451, Roman-Visigothic victory over Attila). Adrianople was a Roman defeat, not a victory against Attila."}], "id": "q04"}, {"question": "What were the foederati, and why did their existence within the Empire create structural problems?", "options": [{"text": "Foederati were Roman citizens of Germanic descent who served as scouts and auxiliaries, culturally assimilated and loyal primarily to Rome.", "isCorrect": false, "rationale": "The text describes foederati as Germanic groups settled inside the Empire under treaty agreements — not assimilated citizens. Their problem was that 'the Roman army increasingly consisted of Germanic warriors whose first loyalty was to their chieftains rather than to Rome.'"}, {"text": "Germanic groups settled inside the Empire under treaty, providing soldiers in exchange for land and payment — but this meant the Roman army increasingly consisted of warriors whose first loyalty was to their chieftains rather than to Rome.", "isCorrect": true, "rationale": "The text defines foederati as 'Germanic groups settled inside the Roman Empire under treaty agreements, providing soldiers in exchange for land and payment' and notes 'it also meant that the Roman army increasingly consisted of Germanic warriors whose first loyalty was to their chieftains rather than to Rome.'"}, {"text": "Foederati were specially trained Roman engineers who built and maintained the frontier fortifications, making them essential to the Empire's defense but also a financial drain.", "isCorrect": false, "rationale": "Foederati were Germanic warrior groups, not Roman engineers. Their Latin origin is foedus (treaty), referring to their allied status under treaty arrangements."}, {"text": "The foederati were Roman officials appointed to manage relations with the Germanic tribes, but they were gradually corrupted by Germanic customs and turned against Rome.", "isCorrect": false, "rationale": "Foederati were Germanic peoples settled inside the Empire under treaty, providing soldiers. They were not Roman officials."}], "id": "q05"}, {"question": "How does the text challenge the common use of the word 'barbarian' to describe Rome's Germanic invaders?", "options": [{"text": "The text argues that 'barbarian' was actually a neutral Roman term meaning 'foreigner' with no negative connotation.", "isCorrect": false, "rationale": "The text explains that barbaros/barbarus was a Greek term of contempt — their speech sounded like 'bar-bar-bar' to Greek ears. It was clearly pejorative, not neutral."}, {"text": "The text argues that by Rome's fall, the Visigoths, Franks, and other Germanic peoples had centuries of contact with Rome, many served in Roman armies, many had converted to Christianity, and the 'invasions' were as much migration and cultural exchange as savage collision.", "isCorrect": true, "rationale": "The text states: 'By the time of Rome's fall, the Visigoths, Franks, Ostrogoths, and other Germanic peoples were not primitive cave-dwellers. Many had been in contact with Rome for centuries; many had served in Roman armies; many had converted to Christianity.' The Visigoths even had a Bible translation in their own language from the missionary bishop Wulfila."}, {"text": "The text argues that the Germanic peoples were actually more sophisticated than the Romans by the fifth century, as Rome had culturally declined while Germanic culture had advanced.", "isCorrect": false, "rationale": "The text does not argue that Germanic culture surpassed Roman culture. It argues that the Germanic peoples were not the primitive savages the word 'barbarian' implies — the catastrophe was 'more complicated than the word suggests.'"}, {"text": "The text argues the word 'barbarian' is acceptable because the Germanic peoples deliberately chose to destroy Roman civilization rather than preserve it.", "isCorrect": false, "rationale": "The text argues the opposite: the catastrophe was real but more complicated than 'barbarian' suggests, involving centuries of cultural exchange and Roman-Germanic cooperation before the final collapse."}], "id": "q06"}, {"question": "What was the psychological and cultural significance of Alaric's sack of Rome in AD 410?", "options": [{"text": "It was primarily a military event with little cultural significance, since Rome was no longer the administrative center of the Empire.", "isCorrect": false, "rationale": "The text emphasizes the enormous psychological shock: 'The city which had taken the whole world was itself taken' (Jerome). Pagans blamed Christianity; Christians struggled to explain it. Augustine began writing The City of God in direct response."}, {"text": "The sack demonstrated that Christianity had made Rome militarily weak, which is why Augustine wrote The City of God — to refute this paganism charge.", "isCorrect": false, "rationale": "While refuting the pagan charge was one reason Augustine wrote The City of God, the text presents Augustine's response as much more than a refutation: it is a systematic theological rethinking of what Rome was and what the Church is."}, {"text": "Rome had not fallen in eight hundred years; the psychological shock was devastating — pagans blamed Rome's adoption of Christianity, Christians struggled to explain God's purposes, and Jerome lamented 'the city which had taken the whole world was itself taken.' Augustine began The City of God in response.", "isCorrect": true, "rationale": "The text states: 'The psychological shock was devastating. Rome had not fallen to an enemy since the Gauls in 390 BC — eight hundred years. Jerome... cried: The city which had taken the whole world was itself taken. Pagans blamed the sack on Rome's abandonment of the old gods.' Augustine's City of God began as a direct response."}, {"text": "The sack was quickly forgotten because Alaric died shortly after and his forces never occupied Rome permanently, leaving the city largely intact.", "isCorrect": false, "rationale": "While Alaric did die shortly after the sack, the text emphasizes the enormous and lasting psychological impact. The sack itself was three days long and devastating to the city's symbolic status."}], "id": "q07"}, {"question": "Who was Attila the Hun, and why does the text describe Pope Leo I's meeting with him as remarkable?", "options": [{"text": "Leo I bribed Attila with gold from the Church treasury, demonstrating that financial resources rather than moral authority stopped Attila's advance.", "isCorrect": false, "rationale": "The text does not mention financial bribes from Leo. It identifies Leo's personal moral authority as the key factor, while acknowledging uncertainty about exactly why Attila withdrew."}, {"text": "Attila converted to Christianity after meeting with Leo, which explains why he withdrew from Italy without capturing Rome.", "isCorrect": false, "rationale": "The text does not claim Attila converted to Christianity. He died on his wedding night in AD 453 from a nosebleed — there is no mention of conversion."}, {"text": "Attila united the Hunnic tribes into the most feared force of his age; when he invaded Italy in 452 and Pope Leo I rode out alone to meet him at the Mincio River, Leo — the only figure with genuine moral authority in the late West — persuaded the Hun to turn back.", "isCorrect": true, "rationale": "The text states Attila was 'the most feared military force of his age' and that 'Pope Leo I — alone among the great figures of the late West with genuine moral authority — rode out to meet Attila. He persuaded the Hun to turn back.' The text acknowledges uncertainty about exactly why Attila withdrew but emphasizes Leo's moral authority."}, {"text": "Leo I threatened to excommunicate Attila, which frightened him because many Huns had converted to Arian Christianity and feared Church discipline.", "isCorrect": false, "rationale": "The text does not describe Leo threatening excommunication, and the Huns were not identified as Christians (Arian or otherwise) in the text."}], "id": "q08"}, {"question": "What is the symbolic significance of the name 'Romulus Augustulus,' the last emperor of the Western Roman Empire?", "options": [{"text": "His name was chosen by Odoacer to mock Rome — 'little Augustus' was a deliberate insult to the imperial tradition Odoacer was abolishing.", "isCorrect": false, "rationale": "The text says Romulus Augustulus was named by his father Orestes, not by Odoacer. The text notes the name's ironic symbolism: Romulus the city's legendary founder; Augustulus the diminutive of Augustus. The text doesn't describe it as a deliberate insult."}, {"text": "Romulus was the name of Rome's legendary founder; Augustulus is the diminutive of Augustus ('little Augustus') — the last emperor of the West carried Rome's founding and greatest names in their diminutive, ironic forms.", "isCorrect": true, "rationale": "The text explicitly notes: 'The name is almost too symbolic to be true: Romulus, the city's legendary founder; Augustulus, the diminutive of Augustus — little Augustus. He was perhaps fourteen years old.' The text finds the symbolism almost too perfect to be coincidental."}, {"text": "The name showed that Orestes, who named his son emperor, had contempt for the imperial tradition and was signaling his intention to permanently end the Western Empire.", "isCorrect": false, "rationale": "The text does not suggest the name showed contempt. The irony is in the historical circumstances, not in the naming father's intentions."}, {"text": "The name 'Romulus Augustulus' was significant because it was the same name as the emperor who had founded Rome's first dynasty, creating an intentional historical connection.", "isCorrect": false, "rationale": "Romulus was the legendary founder of Rome (not an emperor), and Augustus was the first emperor — neither founded a 'dynasty' in the name of Romulus Augustulus."}], "id": "q09"}, {"question": "What happened on August AD 476, and why is this date traditionally considered significant?", "options": [{"text": "The city of Rome was sacked for the third time, finally convincing the Eastern Emperor to abandon the Western provinces permanently.", "isCorrect": false, "rationale": "The text describes August 476 as Odoacer deposing Romulus Augustulus, not as a sack of Rome. The second sack of Rome was by the Vandals in AD 455."}, {"text": "Constantine XI died defending Constantinople, ending the Eastern Roman Empire and marking the complete fall of all Roman political power.", "isCorrect": false, "rationale": "The fall of Constantinople to the Ottoman Turks in 1453 is a different event from 476. The text describes 476 as specifically the deposition of the last Western emperor by Odoacer."}, {"text": "Germanic chieftain Odoacer deposed the boy-emperor Romulus Augustulus, sent the imperial regalia to Constantinople, and did not bother to name a new emperor — effectively ending the Western Roman Empire.", "isCorrect": true, "rationale": "The text states: 'In August AD 476, a Germanic chieftain named Flavius Odoacer led a mutiny of Germanic troops, killed Orestes, and deposed the boy emperor. He did not bother to name a new emperor. He sent the imperial regalia... to Constantinople.' The text notes this is the traditional date for the fall of the Western Roman Empire."}, {"text": "The Roman Senate formally abolished the Western Empire and transferred all governing authority to the Eastern Emperor in Constantinople, completing a legal process begun under Diocletian.", "isCorrect": false, "rationale": "The Senate did not formally abolish the Empire — it was abolished de facto by Odoacer deposing Romulus Augustulus and not bothering to name a successor. The Senate played no active role in this event as described in the text."}], "id": "q10"}, {"question": "What was Justinian's greatest lasting legacy, according to the text?", "options": [{"text": "Justinian's military reconquest of North Africa, Italy, and Spain restored the Roman Empire to its former greatness and prevented the emergence of medieval European feudalism.", "isCorrect": false, "rationale": "The text describes Justinian's military reconquests as temporary — 'the reconquered western territories could not be held' after the Plague of Justinian. His lasting legacy was not military but legal."}, {"text": "Justinian built the Hagia Sophia, which became the model for all subsequent Christian church architecture in both East and West.", "isCorrect": false, "rationale": "The Hagia Sophia was Justinian's great architectural achievement, but the text identifies his lasting legacy as his law code, the Corpus Juris Civilis, which became the foundation of most European legal systems."}, {"text": "The Corpus Juris Civilis — his systematic compilation of all Roman law — became the foundation of legal systems across most of Europe, from medieval Italy to modern France, Germany, and Spain.", "isCorrect": true, "rationale": "The text states: 'Justinian's greatest legacy, however, was not military but legal. He commissioned a systematic compilation of all Roman law, producing the Corpus Juris Civilis... This massive document became the foundation of legal systems across most of Europe, from medieval Italy to modern France, Germany, and Spain.'"}, {"text": "Justinian's reconversion of Arian Germanic kingdoms to Nicene Christianity unified the Christian world under the authority of the Bishop of Rome.", "isCorrect": false, "rationale": "The text does not describe Justinian's legacy in terms of religious unification. His legacy is specifically legal (Corpus Juris Civilis) and architectural (Hagia Sophia)."}], "id": "q11"}, {"question": "What was the Plague of Justinian (AD 541–549), and why was it historically significant?", "options": [{"text": "The Plague of Justinian was the same disease as the Antonine Plague (AD 165), proving that the Roman Empire was never fully free of epidemic disease.", "isCorrect": false, "rationale": "The text identifies the Plague of Justinian as 'the first major recorded outbreak of bubonic plague in history' — a new disease, not the same as the Antonine Plague."}, {"text": "The first major recorded outbreak of bubonic plague, it spread from Egypt along trade routes and killed an estimated 25–50 million people — perhaps a quarter to a third of the Byzantine Empire — preventing Justinian from consolidating his western reconquests.", "isCorrect": true, "rationale": "The text states: 'The first major recorded outbreak of bubonic plague in history, it spread from Egypt along trade routes across the Mediterranean world, killing an estimated 25 to 50 million people — perhaps a quarter to a third of the Byzantine Empire's population... The reconquered western territories could not be held. Justinian himself survived an infection.'"}, {"text": "The Plague of Justinian only affected the Eastern Empire, which is why the Western kingdoms under Germanic rule recovered quickly while Byzantium remained weak for centuries.", "isCorrect": false, "rationale": "The text describes the plague as spreading 'across the Mediterranean world' and affecting the Byzantine Empire severely. It does not suggest the Western kingdoms were unaffected or recovered quickly."}, {"text": "Justinian used the plague as an opportunity to clear the Western lands of remaining Roman aristocrats, making it easier for Germanic kings to establish permanent rule without Roman resistance.", "isCorrect": false, "rationale": "The text does not suggest Justinian exploited the plague politically. The plague is presented as a catastrophe that prevented him from consolidating his military gains."}], "id": "q12"}, {"question": "Who was Boethius, and why does the text call him 'the last Roman' and 'the first scholastic'?", "options": [{"text": "Boethius was a Byzantine emperor who translated Greek texts into Latin while exiled in Italy, preserving classical learning during the Justinianic reconquest.", "isCorrect": false, "rationale": "Boethius was a Roman aristocrat serving as chief minister to the Ostrogothic king Theodoric in Italy, not a Byzantine emperor. He lived c. AD 480–524, before Justinian's reconquest."}, {"text": "Boethius was the last bishop of Rome to write in Latin rather than Greek, bridging the classical Latin tradition and the emerging medieval Catholic Church.", "isCorrect": false, "rationale": "Boethius was a philosopher and statesman, not a bishop. His significance is as a translator of Greek philosophy into Latin and as the author of the Consolation of Philosophy."}, {"text": "Boethius was a Roman aristocrat who translated Aristotle and other Greek philosophers into Latin — preserving Greek thought for a Latin West that could no longer read Greek — and wrote the Consolation of Philosophy while awaiting execution under Theodoric.", "isCorrect": true, "rationale": "The text describes Boethius as 'the most learned man of his age' who 'translated Aristotle and other Greek philosophers into Latin, preserving Greek thought for a Latin-speaking world that increasingly could not read Greek.' He wrote the Consolation while imprisoned, and was executed in AD 524."}, {"text": "Boethius wrote the first systematic Christian theology, organizing the Church Fathers' writings into the logical structure that Thomas Aquinas would later use in the Summa Theologiae.", "isCorrect": false, "rationale": "Boethius translated Aristotle and wrote the Consolation of Philosophy, which is notable for not explicitly mentioning Christianity. He was a forerunner of scholasticism through his logical translations, not through systematic Christian theology."}], "id": "q13"}, {"question": "What was Augustine's 'two cities' framework in The City of God, and what problem was it addressing?", "options": [{"text": "Augustine argued that Christians should live in the earthly city loyally while privately seeking the heavenly city, a dual loyalty that justified political withdrawal from Roman civic life.", "isCorrect": false, "rationale": "The text does not describe Augustine advocating political withdrawal. His framework is about what Christians ultimately trust and love, not about civic engagement. 'Earthly peace is a real good worth working for.'"}, {"text": "Augustine divided history into two dispensations — before and after Christ — arguing that the fall of Rome was necessary for God's kingdom to replace earthly empire.", "isCorrect": false, "rationale": "This misrepresents Augustine's argument. He argues that the two cities coexist throughout history, intertwined until the end of time. He does not argue Rome had to fall for God's kingdom to advance."}, {"text": "Responding to pagans who blamed Christianity for Rome's fall, Augustine argued that two cities are built on two loves: the City of Man built on self-love (Rome's foundation), and the City of God built on love of God — which cannot be destroyed by any barbarian army.", "isCorrect": true, "rationale": "The text states: 'his central argument is elegant and devastating: there are two cities, built on two fundamentally different loves.' The City of Man is built on amor sui (self-love), the City of God on amor Dei. Rome's fall should shock only 'if the Christian had confused Rome with the City of God.'"}, {"text": "Augustine's two cities framework was specifically about the relationship between the Church and the Roman state, arguing that the Church should eventually control the state.", "isCorrect": false, "rationale": "The two cities framework is not specifically about Church-state relations or Church control. It is about two fundamentally different loves — of self vs. of God — that coexist throughout history and across all institutions."}], "id": "q14"}, {"question": "What survived the fall of the Western Roman Empire, according to the text?", "options": [{"text": "Only the Germanic kingdoms survived, as they inherited Rome's military infrastructure and administrative systems while the Church and classical culture disappeared.", "isCorrect": false, "rationale": "The text identifies five things that survived the fall of Rome: the Church, Latin, Roman law, manuscripts, and the idea of Rome. None of these are Germanic kingdoms."}, {"text": "The Church (as institutional authority), Latin (as language of scholarship), Roman law (Justinian's code), manuscripts (preserved in monasteries), and the idea of Rome (the memory of Christian imperial unity) all survived and became the foundations of medieval civilization.", "isCorrect": true, "rationale": "The text's 'What Survived the Fall of Rome' key concept explicitly lists: 'The Church... Latin... Roman law... Manuscripts: Monks in scriptoria copied and preserved classical texts... The idea of Rome: The memory and ideal of a unified Christian Roman Empire never died.'"}, {"text": "Nothing of significance survived — the fall of Rome was a total civilizational collapse from which Europe did not recover until the Renaissance, fourteen centuries later.", "isCorrect": false, "rationale": "The text explicitly argues against this view: 'The story of the Fall of Rome is also the story of what survived: the law codes, the Church, the manuscripts in the scriptoria, and the philosophical tradition that Boethius passed on.'"}, {"text": "The Roman military organization survived through the Germanic kingdoms, which adopted the legion structure and eventually reconquered the West under Justinian.", "isCorrect": false, "rationale": "The text does not identify the legion or military organization as something that survived. And it was Justinian (Eastern Roman Emperor) who reconquered the West, not Germanic kingdoms."}], "id": "q15"}, {"question": "What is the Corpus Juris Civilis, and what is its lasting significance?", "options": [{"text": "A collection of Christian theological writings compiled by Justinian to provide doctrinal unity across the Byzantine Empire's diverse Christian populations.", "isCorrect": false, "rationale": "The Corpus Juris Civilis is a legal, not theological, compilation. It systematically compiled all Roman law into four parts: Institutes, Digest, Codex, and Novels."}, {"text": "A systematic compilation of all Roman law commissioned by Justinian (AD 529–534), comprising the Institutes, Digest, Codex, and Novels, which became the foundation of legal systems across most of Europe.", "isCorrect": true, "rationale": "The text defines the Corpus Juris Civilis as Justinian's 'systematic compilation of all Roman law' comprising exactly these four components, and states it 'became the foundation of legal systems across most of Europe, from medieval Italy to modern France, Germany, and Spain.'"}, {"text": "A military law code that organized Justinian's reconquered territories under Roman military law, creating the administrative foundation for his western campaigns.", "isCorrect": false, "rationale": "The Corpus Juris Civilis was a comprehensive civil law code, not specifically a military law code. It covered all aspects of Roman law — property, contracts, persons, obligations — not just military matters."}, {"text": "Justinian's personal autobiography and commentary on Roman imperial history, which survived as the primary source for Byzantine history of the sixth century.", "isCorrect": false, "rationale": "The Corpus Juris Civilis is a law code, not an autobiography or historical commentary."}], "id": "q16"}, {"question": "The text presents multiple explanations for why Rome fell. Which answer best represents the text's nuanced position?", "options": [{"text": "Edward Gibbon's argument that Christianity sapped Rome's martial virtue is correct and remains the consensus view among modern historians.", "isCorrect": false, "rationale": "The text presents Gibbon's argument as one view that 'famously blamed Christianity' but states that 'modern historians cite multiple causes' and that 'most historians today see the fall as a result of many interacting causes rather than one single reason.'"}, {"text": "The fall of Rome was inevitable given the size of the Empire — it was simply too large to govern effectively and would have collapsed regardless of any other factors.", "isCorrect": false, "rationale": "The text explicitly challenges the inevitability argument: 'The Eastern Empire's survival for another thousand years shows that collapse was not inevitable; the Western Empire's specific vulnerabilities made the difference.'"}, {"text": "Military overstretching, economic decline, currency debasement, the third-century crisis, plague, administrative corruption, and political illegitimacy all contributed — making the fall a result of many interacting causes, which is part of what makes it one of history's great questions.", "isCorrect": true, "rationale": "The text states: 'Modern historians cite multiple causes: military overstretching, economic decline, currency debasement, the third-century crisis, plague... administrative corruption, and the loss of political legitimacy. Most historians today see the fall as a result of many interacting causes rather than one single reason.'"}, {"text": "The fall of Rome was caused primarily by the Huns forcing the Visigoths into Roman territory — a single contingent event without which Rome would have survived indefinitely.", "isCorrect": false, "rationale": "While the Hunnic pressure was the immediate trigger for the Adrianople crisis, the text presents the Hunnic incursion as one of many contributing factors and emphasizes the long-term structural weaknesses that preceded it."}], "id": "q17"}, {"question": "What does the text argue about the Byzantine Empire's self-understanding and its contributions?", "options": [{"text": "The Byzantines considered themselves a new civilization separate from Rome, which is why they developed a distinct Greek-speaking culture rather than preserving Latin.", "isCorrect": false, "rationale": "The text states that 'the Byzantines called themselves Romaioi (Romans) until Constantinople fell to the Ottoman Turks in AD 1453.' They did not consider themselves a new or separate civilization — they believed themselves to be the continuation of Rome."}, {"text": "The Byzantines called themselves Romans until Constantinople fell in 1453 and contributed by preserving Greek learning, producing Justinian's law code, converting the Slavic peoples, and influencing Eastern Church art.", "isCorrect": true, "rationale": "The text's definition of the Byzan var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
