    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text states that \"Athens emerged from the war as the most powerful city-state in the Greek world.\" What specific resource, acquired as a direct result of the Persian Wars, was crucial in funding Athens' subsequent \"Golden Age\" and democratic development?", "options": [{"text": "Agricultural surpluses from newly acquired fertile lands.", "isCorrect": false, "rationale": "The text mentions silver mines as the source of funding, not agricultural land acquisition directly resulting from the Persian Wars."}, {"text": "Gold reserves captured from the defeated Persian Empire.", "isCorrect": false, "rationale": "The text specifies that the 'silver mines at Laurium' funded the Athenian navy and subsequent projects, not captured gold reserves."}, {"text": "The rich silver mines at Laurium.", "isCorrect": true, "rationale": "The text explicitly states: 'The silver mines at Laurium funded a powerful navy; the navy funded Athenian democracy; democracy funded the building programs of Pericles.'"}, {"text": "Tribute payments from newly subjugated Persian territories.", "isCorrect": false, "rationale": "Tribute payments came later from the Delian League allies, not directly from subjugated Persian territories as a direct outcome of the Persian Wars for Athens' internal development."}]}, {"question": "According to the provided text, how did the Delian League evolve from its initial stated purpose under Athenian leadership?", "options": [{"text": "It remained a purely defensive alliance, respecting the autonomy of all member states.", "isCorrect": false, "rationale": "The text explicitly states it became 'increasingly an Athenian empire' and that Athens forced member states that tried to leave to remain."}, {"text": "It transformed into a democratic assembly where all member states had equal say in policy.", "isCorrect": false, "rationale": "The text notes that allied states 'had little say in the matter' regarding the use of tribute money for Athens' building projects, indicating a lack of equal say."}, {"text": "It shifted from a mutual defense alliance to an Athenian empire that used allied tribute for its own benefit.", "isCorrect": true, "rationale": "The text describes the Delian League as 'nominally a mutual defense alliance but increasingly an Athenian empire,' with tribute money funding Athens' 'most ambitious building program.'"}, {"text": "It dissolved after the immediate threat of Persia subsided, allowing city-states to pursue independent foreign policies.", "isCorrect": false, "rationale": "The text indicates Athens forced states to remain members, preventing its dissolution."}]}, {"question": "Pericles, in his Funeral Oration, celebrated Athens as a city where \"merit mattered more than birth\" and \"the law protected the weak.\" If a modern national leader were to embody these specific ideals, which policy or statement would best reflect Pericles' vision?", "options": [{"text": "Advocating for hereditary political positions to ensure stability and experienced leadership.", "isCorrect": false, "rationale": "This directly contradicts Pericles' emphasis that 'merit mattered more than birth,' as it prioritizes lineage over individual capacity."}, {"text": "Proposing universal healthcare and educational opportunities, emphasizing that success should depend on individual effort, not social background.", "isCorrect": true, "rationale": "Universal access to healthcare and education helps protect the weak and ensures that advancement is based on individual merit and capacity, rather than being limited by birth or poverty, directly aligning with Pericles' stated ideals."}, {"text": "Implementing strict immigration laws to preserve national cultural purity and limit external influences.", "isCorrect": false, "rationale": "While a state defines its citizenship, Pericles' statements focus on internal social justice and opportunity within the existing citizenry, not exclusionary policies based on origin in this specific context."}, {"text": "Creating a specialized council of elite intellectuals to make all major governmental decisions, believing the masses lack the wisdom for governance.", "isCorrect": false, "rationale": "This contradicts the democratic principle Pericles championed, where administration 'favours the many instead of the few,' even with Athens' limitations."}]}, {"question": "While praising Athenian democracy, the text includes a \"note\" section that points out a significant limitation. What was this limitation?", "options": [{"text": "Its reliance on foreign mercenaries for military defense, weakening citizen participation.", "isCorrect": false, "rationale": "The text does not mention this as a limitation; instead, it highlights the citizen-soldier ethos during the Persian Wars."}, {"text": "Its exclusion of a majority of the population, including women, slaves, and foreigners, from political participation.", "isCorrect": true, "rationale": "The 'note' explicitly states: 'Athenian democracy, for all its brilliance, excluded women, slaves, and foreigners (who together made up the majority of Athens' population).'"}, {"text": "Its susceptibility to bribery and corruption due to paid public officeholders.", "isCorrect": false, "rationale": "The text describes pay for jurors and officeholders as a way Pericles 'deepened Athenian democracy,' enabling poorer citizens to participate, not as a source of corruption."}, {"text": "Its inability to effectively manage its economy, leading to widespread poverty among citizens.", "isCorrect": false, "rationale": "The text portrays Athens during the Golden Age as wealthy, funded by silver mines and tribute, enabling ambitious building programs."}]}, {"question": "What was the primary catalyst for the outbreak of the Peloponnesian War, as described in the text?", "options": [{"text": "Spartan aggression in seizing Athenian trade routes.", "isCorrect": false, "rationale": "While trade may have been a factor, the text states the primary cause was Sparta's alarm at Athens' power, not specific trade route seizures."}, {"text": "Athenian attempts to spread its democratic form of government to oligarchic states.", "isCorrect": false, "rationale": "The text indicates the cause was 'The rise of Athenian power alarmed Sparta and its allies,' which led to war, rather than ideological expansion as the primary catalyst."}, {"text": "The alarm among Sparta and its allies over the growing power of Athens.", "isCorrect": true, "rationale": "The text explicitly states: 'The rise of Athenian power alarmed Sparta and its allies. In 431 BC, war broke out between the Athenian alliance and the Spartan-led Peloponnesian League.'"}, {"text": "A religious dispute between Athens and Sparta over control of a sacred oracle.", "isCorrect": false, "rationale": "The text does not mention a religious dispute as the cause of the war."}]}, {"question": "The text states that after the Peloponnesian War, \"The exhausted city-states never fully recovered.\" What significant long-term impact did this war have on the broader Greek city-state system?", "options": [{"text": "It led to the immediate unification of Greece under a single democratic government.", "isCorrect": false, "rationale": "The war weakened the city-states, preventing unification and eventually paving the way for external conquest, rather than a democratic union."}, {"text": "It firmly established Athens as the undisputed cultural and political hegemon of Greece.", "isCorrect": false, "rationale": "Athens was defeated in the war, ending its political dominance and permanently weakening it."}, {"text": "It permanently weakened the city-state system, paving the way for external conquest.", "isCorrect": true, "rationale": "The 'Peloponnesian War' definition states it 'permanently weakened the city-state system,' and the subsequent text describes Philip II of Macedon's conquest of Greece while the city-states were exhausted."}, {"text": "It resulted in a lasting peace treaty that ensured centuries of stability among the Greek states.", "isCorrect": false, "rationale": "The exhaustion of the city-states made them vulnerable, leading to conquest, not enduring peace or stability."}]}, {"question": "Philip II of Macedon is described as a \"brilliant military innovator.\" What specific innovation is attributed to him that significantly enhanced the Macedonian army's effectiveness?", "options": [{"text": "The use of heavily armored cavalry charges as the primary offensive weapon.", "isCorrect": false, "rationale": "While cavalry was important, the text specifically highlights a different innovation for the Macedonian army's effectiveness."}, {"text": "The development of advanced siege weaponry, such as catapults and battering rams.", "isCorrect": false, "rationale": "The text does not mention Philip's siege innovations, focusing instead on his infantry formation."}, {"text": "The invention of the sarissa, an eighteen-foot-long pike, organized into the Macedonian phalanx.", "isCorrect": true, "rationale": "The text states: 'He invented the sarissa—a pike eighteen feet long—organized into the devastating Macedonian phalanx.'"}, {"text": "The strategy of guerrilla warfare, relying on small, mobile units to harass larger armies.", "isCorrect": false, "rationale": "Philip's military innovations focused on highly organized, massed infantry formations like the phalanx, not guerrilla tactics."}]}, {"question": "Alexander the Great's conquests are directly linked to the phenomenon of \"Hellenism.\" Based on the text, what was the most significant enduring aspect of Hellenism that resulted from his campaigns, despite the rapid fragmentation of his political empire?", "options": [{"text": "The establishment of a unified, centrally governed empire that endured for centuries.", "isCorrect": false, "rationale": "The text explicitly states that 'Alexander's empire fragmented almost immediately after his death.'"}, {"text": "The widespread adoption of Greek as the common language and the dissemination of Greek culture, art, and philosophy across a vast territory.", "isCorrect": true, "rationale": "The 'Hellenism' definition and 'keyconcept' section emphasize the spread of Greek language, culture, and ideas, making Greek the 'common tongue of educated people from Egypt to Persia' and forming a 'cultural unity Alexander had forged' that 'proved far more durable than his political empire.'"}, {"text": "The complete suppression of indigenous cultures and religions in the conquered lands.", "isCorrect": false, "rationale": "The text notes that Greek art 'merged with Persian, Egyptian, and Indian traditions,' suggesting cultural interaction rather than complete suppression."}, {"text": "The immediate and widespread conversion of conquered populations to Greek polytheistic religion.", "isCorrect": false, "rationale": "The text focuses on the spread of language and culture, not mass religious conversion to Greek polytheism."}]}, {"question": "The \"caution\" note discusses Thucydides' decision to include Pericles' Funeral Oration in his *History of the Peloponnesian War*. What does the text suggest was Thucydides' primary purpose in recording this speech, given the subsequent events?", "options": [{"text": "To endorse Pericles' policies and provide a model for future democratic leaders.", "isCorrect": false, "rationale": "The 'caution' explicitly states that Thucydides recorded the speech 'not to endorse it,' especially given it was delivered during the first year of a disastrous war."}, {"text": "To illustrate Athens' self-perception at its peak and subtly hint at the tragic irony of its coming decline.", "isCorrect": true, "rationale": "The 'caution' explains that Thucydides recorded it 'to show how Athens saw itself at the height of its power,' adding that 'The reader who remembers that Athens lost the Peloponnesian War... finds Pericles' pride tinged with tragedy,' suggesting an underlying tragic irony."}, {"text": "To provide a historically accurate transcript of Pericles' exact words for posterity.", "isCorrect": false, "rationale": "While historical record is a general aim, the 'caution' highlights a specific interpretive purpose beyond mere transcription, relating it to the context of the war and Athens' fate."}, {"text": "To celebrate the ultimate triumph of Athenian democracy over its oligarchic rivals.", "isCorrect": false, "rationale": "Athens lost the Peloponnesian War, so recording the speech to celebrate its 'ultimate triumph' would be contrary to the historical outcome and Thucydides' subtle commentary."}]}, {"question": "The \"thenandnow\" section prompts a comparison between Athens' use of Delian League tribute for its own building projects and modern powerful nations. What specific aspect of this relationship is highlighted for comparison?", "options": [{"text": "The ethical implications of a dominant power using resources from weaker allies primarily for its own glorification.", "isCorrect": true, "rationale": "The text directly asks: 'Compare: Athens under Pericles spent tribute money from its allies on building projects that glorified Athens alone. How is this similar to, or different from, ways that powerful nations have sometimes treated weaker allies in modern history?' This highlights the ethical dimension of a powerful nation's use of allied resources for self-glorification."}, {"text": "The military necessity of funding large-scale infrastructure projects during wartime.", "isCorrect": false, "rationale": "The comparison focuses on the *source and purpose* of funding (allied tribute for Athens' glorification), not the military necessity of such projects during war."}, {"text": "The diplomatic strategies employed to convince allies to contribute to common defense.", "isCorrect": false, "rationale": "The text mentions allies having 'little say in the matter,' suggesting coercion rather than diplomatic convincing as the primary mode of resource acquisition for Athens' building projects."}, {"text": "The architectural styles adopted by powerful nations to symbolize their dominance.", "isCorrect": false, "rationale": "While the Parthenon is mentioned, the core of the comparison prompt is about the financial relationship and ethical use of allied funds, not architectural styles in isolation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
