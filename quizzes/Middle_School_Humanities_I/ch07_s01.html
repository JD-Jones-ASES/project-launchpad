    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following statements best explains why modern historians largely reject the term 'Dark Ages' despite acknowledging real declines in the period?", "options": [{"text": "The term incorrectly implies a complete loss of Christian faith, which was not the case.", "isCorrect": false, "rationale": "While Christian faith persevered and even spread, the primary reason for rejecting 'Dark Ages' as pejorative is its implication of intellectual and cultural stagnation, not specifically the loss of faith itself, though the period was not 'intellectually dark' due to monasteries."}, {"text": "The term is pejorative and fails to acknowledge the preservation of learning and the eventual foundations for future growth laid during this time.", "isCorrect": true, "rationale": "Modern historians consider 'Dark Ages' pejorative because it suggests a period of absolute intellectual and cultural emptiness, ignoring the vital role of institutions like monasteries in preserving classical learning and the seeds of future European development."}, {"text": "The declines in population and urban life were less severe than initially estimated by Renaissance scholars.", "isCorrect": false, "rationale": "The text states that 'the 5th through 8th centuries saw genuine losses in population, literacy, urban life, and long-distance trade,' indicating the material declines were indeed significant and not underestimated."}, {"text": "The 'Dark Ages' were a global phenomenon, not limited to Western Europe, making the term geographically inaccurate.", "isCorrect": false, "rationale": "The text explicitly notes that 'The Eastern Roman (Byzantine) Empire did not experience this collapse' and that 'The “Dark Ages” were a specifically Western European phenomenon,' making the term's geographic limitation accurate, not inaccurate."}], "id": "q01"}, {"question": "A 7th-century archaeological site in Britain yielding only local pottery and goods, compared to a Roman-era site with items from North Africa and Syria, primarily illustrates which characteristic of the 'Dark Ages' in Western Europe?", "options": [{"text": "A rise in local craftsmanship and self-sufficiency, promoting regional economies.", "isCorrect": false, "rationale": "While self-sufficiency increased, the primary point of contrast provided by the text is the decline in long-distance trade and the breakdown of interconnected imperial infrastructure, not necessarily a 'rise' in local craftsmanship as a positive development."}, {"text": "The significant collapse of long-distance trade and imperial infrastructure.", "isCorrect": true, "rationale": "The example directly contrasts the widespread trade of the Roman era with the localized goods of the 7th century, explicitly stating that 'long-distance trade' declined and 'The carefully maintained infrastructure of empire simply stopped being maintained.'"}, {"text": "A shift in cultural preferences from foreign luxuries to domestic necessities.", "isCorrect": false, "rationale": "The shift was not primarily due to cultural preference but rather the material inability to sustain long-distance trade networks and the economic collapse that made foreign goods unavailable or unaffordable."}, {"text": "The increasing influence of monastic communities on economic activities.", "isCorrect": false, "rationale": "While monasteries were largely self-sufficient, the example of archaeological finds primarily speaks to broader economic patterns of trade and infrastructure, not directly to the influence of monasteries on external trade."}], "id": "q02"}, {"question": "The 'Rule of Saint Benedict' contributed most significantly to the preservation of civilization during the 'Dark Ages' by:", "options": [{"text": "Establishing a centralized military force to defend against invasions.", "isCorrect": false, "rationale": "The Rule of Saint Benedict was a guide for monastic life focused on spiritual and intellectual pursuits, manual labor, and communal living, not a military code or a means to establish an army."}, {"text": "Organizing monastic life around prayer, labor, and sacred reading, thereby creating stable centers of learning and self-sufficiency.", "isCorrect": true, "rationale": "The Rule's motto 'ora et labora' (pray and work) structured the day around spiritual devotion, manual labor, and study. This organization allowed monasteries to become self-sufficient communities that preserved literacy and classical learning amidst societal collapse."}, {"text": "Promoting a universal curriculum for all secular schools across Western Europe.", "isCorrect": false, "rationale": "The Rule was for monastic life, not secular schools. While monasteries did function as schools, the Rule itself was not a universal curriculum for secular education. Formal education beyond monasteries was scarce."}, {"text": "Funding long-distance trade routes to bring back essential goods and knowledge.", "isCorrect": false, "rationale": "Monasteries, guided by the Rule, aimed for self-sufficiency and operated largely independently of external trade, especially long-distance trade, which had largely collapsed."}], "id": "q03"}, {"question": "Which of the following actions by Gregory the Great best exemplifies his title as 'the last Roman and the first medieval pope'?", "options": [{"text": "His conversion of the Anglo-Saxons through the mission of Augustine of Canterbury.", "isCorrect": false, "rationale": "While significant, the mission to the Anglo-Saxons primarily highlights his role as a spiritual leader and expansion of Christian influence, rather than the unique bridging of Roman and medieval governance."}, {"text": "His writings, which laid the theological foundations for scholasticism.", "isCorrect": false, "rationale": "Gregory's 'Pastoral Care' was a manual for bishops and his letters were practical, not abstract theological works laying foundations for future scholastic movements."}, {"text": "His efforts to organize charitable activities, negotiate with invaders, and manage civil affairs in Rome amidst imperial collapse.", "isCorrect": true, "rationale": "Gregory's active role in managing Rome's civil administration (food distribution, negotiations with Lombards) alongside his spiritual duties demonstrates him stepping into the void left by imperial collapse, effectively becoming a civil governor—a characteristic of the emerging medieval order, while still operating in the 'Roman' sphere of influence."}, {"text": "His decision to make Latin the official language of the Church.", "isCorrect": false, "rationale": "Latin was already the language of the Roman Church. Gregory did not institute this change."}], "id": "q04"}, {"question": "The primary historical significance of the Battle of Tours (AD 732), as presented in the text, lies in its role in:", "options": [{"text": "Permanently expelling Muslim rule from the Iberian Peninsula.", "isCorrect": false, "rationale": "The text explicitly states this is an exaggeration, noting that 'the main Umayyad presence was in Spain, which remained under Islamic rule for another 700 years.'"}, {"text": "Solidifying Charles Martel's power and laying the political foundation for the Carolingian Empire.", "isCorrect": true, "rationale": "While preventing further northward expansion, the text emphasizes that 'the battle was genuinely significant: it established Charles Martel as the most powerful ruler in the West and created the political foundation from which his grandson Charlemagne would build his empire.'"}, {"text": "Demonstrating the superior military tactics of the Frankish heavy cavalry.", "isCorrect": false, "rationale": "The text focuses on the political outcomes and exaggerated claims, not a detailed analysis of military tactics."}, {"text": "Ending all Muslim raids into Western Europe for the remainder of the medieval period.", "isCorrect": false, "rationale": "The text clarifies it 'may have prevented further northward expansion' but doesn't suggest an end to all raids or the complete elimination of a threat from Islamic forces."}], "id": "q05"}, {"question": "Pepin the Short's deposition of the last Merovingian king with papal approval established a crucial precedent for medieval European politics. What was this precedent?", "options": [{"text": "That the Pope held ultimate authority over all secular rulers in Europe.", "isCorrect": false, "rationale": "While it empowered the papacy, it did not establish absolute papal supremacy over all secular rulers, but rather a more specific relationship where papal approval could legitimize a king's claim to power."}, {"text": "That military strength alone could justify a change in dynastic rule.", "isCorrect": false, "rationale": "While military strength was certainly a factor for Pepin, the key point highlighted is the *papal approval*, which provided legitimacy beyond mere force."}, {"text": "That popes could legitimize changes in royal succession and crown kings, linking religious and political authority.", "isCorrect": true, "rationale": "The text states that Pepin 'deposed the last Merovingian king with papal approval, establishing the precedent that popes could crown kings,' directly linking the Church's spiritual authority to the legitimacy of secular rule."}, {"text": "That the Frankish kingdom was destined to become the dominant power in Western Europe.", "isCorrect": false, "rationale": "While the Franks did become dominant, the action specifically established a precedent regarding the *relationship* between popes and kings, not merely a prediction of future dominance."}], "id": "q06"}, {"question": "The Carolingian Renaissance, under Charlemagne, significantly contributed to the intellectual and cultural landscape of Europe primarily through:", "options": [{"text": "The invention of the printing press, revolutionizing the spread of knowledge.", "isCorrect": false, "rationale": "The printing press was invented much later, in the 15th century. The Carolingian Renaissance relied on manuscript copying."}, {"text": "A widespread effort to reform education, copy manuscripts, and recover classical Latin texts, influencing literacy and future learning.", "isCorrect": true, "rationale": "The text highlights Charlemagne's 'passionate commitment to learning,' leading to the 'systematic manuscript copying, reform of education, development of the Carolingian minuscule script... and recovery of classical Latin texts,' which were vital for preserving knowledge."}, {"text": "The establishment of the first European universities independent of church control.", "isCorrect": false, "rationale": "Charlemagne founded the palace school and ordered cathedral schools, which were church-affiliated. Universities as independent institutions emerged later in the High Middle Ages."}, {"text": "Developing a new philosophical system that replaced classical Greek thought.", "isCorrect": false, "rationale": "The Carolingian Renaissance focused on *recovering* and preserving classical thought, not replacing it with an entirely new philosophical system."}], "id": "q07"}, {"question": "The Imperial Coronation of Charlemagne on Christmas Day, AD 800, had a profound long-term impact on Western European history because it:", "options": [{"text": "Led directly to the immediate unification of all former Roman territories under one ruler.", "isCorrect": false, "rationale": "Charlemagne's empire did not encompass all former Roman territories, and it did not survive him intact, being divided by the Treaty of Verdun (AD 843)."}, {"text": "Set a precedent for the complex relationship between papal and imperial authority that would define medieval politics.", "isCorrect": true, "rationale": "The text states the coronation 'reasserted the idea of a Christian Roman Empire in the West and set a precedent for the complex relationship between pope and emperor that would define medieval politics for five centuries.'"}, {"text": "Marked the definitive end of the 'Dark Ages' and the beginning of a new era of peace and stability.", "isCorrect": false, "rationale": "While a turning point, the period immediately following was not necessarily one of unbroken peace and stability, and the idea of 'Dark Ages' is a modern construct. The text refers to it as ensuring the 'next thousand years of Western history would continue to ask' questions, implying ongoing challenges."}, {"text": "Established Aachen as the permanent spiritual capital of Western Christianity, replacing Rome.", "isCorrect": false, "rationale": "Aachen was Charlemagne's political capital, but Rome remained the spiritual capital of Western Christianity."}], "id": "q08"}, {"question": "According to the 'Then and Now' section, which aspect of Charlemagne's legacy is most directly observable in modern daily life?", "options": [{"text": "The establishment of a universal currency across Europe.", "isCorrect": false, "rationale": "The text mentions the ideal of universal education, Carolingian minuscule, and church-state relations, but not a universal currency as a direct legacy of Charlemagne."}, {"text": "The modern ideal of universal education and the lowercase letters used in writing.", "isCorrect": true, "rationale": "The text explicitly states: 'Charlemagne's palace school at Aachen and his standardized curriculum anticipated by a millennium the modern ideal of universal education. The Carolingian minuscule script he sponsored is the direct ancestor of the lowercase letters you are reading right now.'"}, {"text": "The division of Europe into nation-states following the Treaty of Verdun.", "isCorrect": false, "rationale": "While the Treaty of Verdun divided his empire, the 'Then and Now' section specifically highlights universal education, Carolingian minuscule, and the church-state debate as directly observable modern legacies, not the formation of modern nation-states."}, {"text": "The continued existence of the Holy Roman Empire as a political entity.", "isCorrect": false, "rationale": "The text states the Holy Roman Empire claimed Charlemagne's legacy but 'Napoleon abolished it in 1806,' so it does not continue to exist today."}], "id": "q09"}, {"question": "Based on Gregory the Great's letter concerning bishops allowing monasteries to be held by laymen, what was his core concern regarding the church's assets?", "options": [{"text": "That laymen were not qualified to manage complex church finances.", "isCorrect": false, "rationale": "While a possible practical concern, Gregory's letter specifically focuses on the *purpose* of the buildings, not the laymen's financial competence. He is concerned with the sacred use being 'subjected to secular uses'."}, {"text": "The secularization of properties built for divine service, equating it to destruction.", "isCorrect": true, "rationale": "Gregory explicitly states, 'For to have built churches and monasteries is praiseworthy; but when that which was built for the service of God is subjected to secular uses, this is not building but pulling down.' His concern is the misuse of sacred assets for secular purposes."}, {"text": "The loss of revenue for the Church if properties were not properly managed.", "isCorrect": false, "rationale": "The letter focuses on the spiritual degradation of misusing sacred buildings, not primarily on financial loss, although that might be an indirect consequence."}, {"text": "The potential for laymen to introduce heretical teachings into monastic life.", "isCorrect": false, "rationale": "The letter does not mention concerns about heresy or theological corruption from lay ownership; it's about the purpose and use of the physical structures."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
