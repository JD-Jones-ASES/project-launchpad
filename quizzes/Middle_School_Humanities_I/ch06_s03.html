    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which statement best characterizes the 'fall' of the Roman Empire as described in the text?", "options": [{"text": "It was a sudden, catastrophic event that saw all Roman institutions vanish overnight across the entire empire.", "isCorrect": false, "rationale": "The text explicitly states it was 'not a single dramatic moment but a slow process' and that many Roman institutions persisted, particularly in the East."}, {"text": "It was primarily a Western European phenomenon marked by the collapse of imperial administration, the army, and the tax base, while many aspects of Roman culture persisted.", "isCorrect": true, "rationale": "The text emphasizes that the 'fall' was 'almost entirely a Western phenomenon' and specifically mentions the collapse of 'Western imperial administration, the army, and the tax base,' while noting the survival of roads, Latin, and Roman law."}, {"text": "It involved the complete destruction of all trade networks across the entire Roman world, leading to a total loss of classical knowledge.", "isCorrect": false, "rationale": "While trade collapse was 'perhaps the most consequential change,' it was specific to Western Europe, and classical knowledge was preserved in monasteries and the Eastern Empire."}, {"text": "The Eastern Roman Empire also collapsed simultaneously, leading to a universal 'Dark Age' across the entire former Roman territory.", "isCorrect": false, "rationale": "The text clearly differentiates, stating the Eastern Empire remained 'intact' and flourished for nearly a thousand years longer, with the 'Dark Ages' being specific to Western Europe."}], "id": "q01"}, {"question": "According to the text, what was the most consequential change for ordinary people's lives in Western Europe during the collapse of the Roman Empire?", "options": [{"text": "The immediate widespread conversion of the population to Arian Christianity.", "isCorrect": false, "rationale": "While Germanic kingdoms had different forms of Christianity, the text does not identify this as the 'most consequential change' for ordinary people's daily lives during the immediate collapse. Clovis's conversion to orthodox Christianity came later."}, {"text": "The complete cessation of all warfare and invasions due to weakened central authority.", "isCorrect": false, "rationale": "The text implies a period of fragmentation and new kingdoms, which would not necessarily mean an end to warfare. It focuses on internal economic collapse rather than external peace."}, {"text": "The dramatic decline in the variety and quantity of available goods due to the unraveling of Roman economic integration.", "isCorrect": true, "rationale": "The text states, 'The collapse of trade was perhaps the most consequential change in ordinary people's lives,' leading to 'a dramatic decline in the variety and quantity of goods available.'"}, {"text": "The universal adoption of Germanic languages, replacing Latin entirely in all spheres of life.", "isCorrect": false, "rationale": "The text notes that Latin survived as 'the language of Church and scholarship' and was even 'kept as their official language of record' by some Germanic kingdoms."}], "id": "q02"}, {"question": "Why is the term 'Fall of Rome' considered primarily a 'Western phenomenon' according to the provided section?", "options": [{"text": "Because only the Germanic tribes in the West caused any significant disruption to Roman rule.", "isCorrect": false, "rationale": "While Germanic tribes were significant in the West, the primary reason for the distinction is the continued existence and prosperity of the Eastern Empire, not just the location of barbarian incursions."}, {"text": "The Eastern Roman Empire, with its capital at Constantinople, remained intact and wealthier for nearly another thousand years, preserving Roman learning and institutions.", "isCorrect": true, "rationale": "The text explicitly states, 'The 'Fall of Rome' is almost entirely a Western phenomenon' because 'The Eastern Empire, still intact with its capital at Constantinople, is larger and wealthier' and 'Constantinople would not fall until AD 1453—nearly a thousand years later.'"}, {"text": "Western Europe experienced a complete societal collapse, whereas the East saw an immediate rise of new, stable empires.", "isCorrect": false, "rationale": "The East was the *continuation* of the Roman Empire, not an immediate rise of 'new, stable empires.' The West experienced transformation, not complete societal collapse, with some Roman elements surviving."}, {"text": "The East completely abandoned Roman traditions and adopted new cultural practices, making it distinct from the fallen West.", "isCorrect": false, "rationale": "The text indicates the Eastern Empire *continued* Roman traditions ('Greek learning, Roman law, and Christian theology continued to flourish in Constantinople')."}], "id": "q03"}, {"question": "The text describes monasteries as 'arks' of civilization during the collapse of the Western Roman Empire. What specific function allowed them to fulfill this role?", "options": [{"text": "They served primarily as military garrisons, defending remaining Roman territories from invasion.", "isCorrect": false, "rationale": "The text describes monasteries as centers for prayer, work, study, and manuscript copying, not as military strongholds."}, {"text": "They became centers for agricultural innovation, solely focused on developing new farming techniques to feed the populace.", "isCorrect": false, "rationale": "While 'economic self-sufficiency through farming' was a factor, it was one of three, and not their *primary* role as 'arks' for civilization, which focused on preserving knowledge."}, {"text": "Their scriptoria diligently copied classical and Christian manuscripts, preserving invaluable knowledge through centuries of declining literacy.", "isCorrect": true, "rationale": "The text clearly states that 'Monastic scriptoria (copying rooms) preserved the manuscripts of classical antiquity and Christian theology' and that 'Without the patient work of monks copying texts by hand... we would have lost most of the classical authors.'"}, {"text": "They were the exclusive centers for training Roman emperors and administrators.", "isCorrect": false, "rationale": "The Western imperial administration had collapsed, and monasteries focused on religious life and preservation of knowledge, not imperial governance."}], "id": "q04"}, {"question": "St. Benedict's Rule is highlighted as a 'masterpiece of practical wisdom' that made 'holiness sustainable.' Which aspect of the Rule best exemplifies this sustainability?", "options": [{"text": "Its strict emphasis on extreme asceticism, pushing monks to the limits of physical endurance.", "isCorrect": false, "rationale": "The text explicitly states the Rule was 'neither rigorously ascetic (self-denying to the point of destroying the body) nor comfortable (which would destroy the soul),' aiming for a balanced life."}, {"text": "Its focus solely on intellectual pursuits and academic study, exempting monks from all manual labor.", "isCorrect": false, "rationale": "The Benedictine motto is 'ora et labora' (pray and work), indicating a balance between prayer, study, and manual labor."}, {"text": "Its prescribed daily schedule balancing communal prayer, manual labor, and sacred reading, designed for long-term commitment and stability.", "isCorrect": true, "rationale": "The text explains the Rule 'prescribes a daily schedule of seven periods of communal prayer (Liturgy of the Hours), alternating with manual labor and lectio divina (sacred reading)' and aimed for monks to 'be able to sustain the life for decades—to be stable, obedient, and committed.'"}, {"text": "Its encouragement of monks to frequently travel between monasteries to spread their teachings widely.", "isCorrect": false, "rationale": "The concept of 'stabilitas' (community committed to staying in one place for generations) is crucial to the success of monasteries as preservers, contradicting frequent travel."}], "id": "q05"}, {"question": "The 'teachernote' about 'Monasteries as Arks' provides a modern parallel. If our civilization collapsed, which of the following characteristics, identified as crucial for monastic success, would most likely be missing from typical modern institutions attempting to preserve knowledge?", "options": [{"text": "A commitment to staying in one place for generations (stabilitas).", "isCorrect": true, "rationale": "The teachernote explicitly lists '(1) a community committed to staying in one place for generations (stabilitas)' as one of the three key factors, and states 'Most modern institutions lack at least one of these.' Libraries and universities, while existing, often face funding cuts, relocations, or lack the generational commitment of a monastic order."}, {"text": "A daily practice of reading and copying texts.", "isCorrect": false, "rationale": "Modern institutions like libraries and universities certainly engage in reading and studying texts, and digital copying is commonplace. This characteristic is less likely to be 'missing' compared to the long-term, stable community aspect."}, {"text": "Economic self-sufficiency through farming.", "isCorrect": false, "rationale": "While modern institutions are rarely self-sufficient through farming, the question asks which characteristic is *most likely* missing. The 'stabilitas' of a dedicated, long-term community is a more unique aspect of monastic preservation highlighted as distinct from modern institutions."}, {"text": "Access to advanced technology for information storage.", "isCorrect": false, "rationale": "This is a characteristic of modern institutions, not a missing one. The teachernote uses the internet as an example but notes its dependency on electricity, implying its fragility, not that it's a missing characteristic itself."}], "id": "q06"}, {"question": "The text challenges the idea of the Germanic kingdoms as purely destructive forces. Which action by these kingdoms best supports the idea of 'Rome transformed' rather than 'Rome destroyed'?", "options": [{"text": "Their widespread persecution of Roman bishops and prohibition of Latin as an official language.", "isCorrect": false, "rationale": "The text states they 'retained or invited Roman bishops to continue governing cities' and 'kept Latin as their official language of record,' directly contradicting this option."}, {"text": "Their complete abandonment of all Roman administrative structures in favor of entirely new systems.", "isCorrect": false, "rationale": "The text says they 'used Roman administrative structures' and the Ostrogoths 'maintained Roman administrative structures.'"}, {"text": "Their conversion to orthodox Christianity and creation of partnerships with the Roman Church, integrating into existing religious frameworks.", "isCorrect": true, "rationale": "The text mentions Clovis's conversion to orthodox Christianity and the formation of 'the first of many partnerships between the Germanic kingdoms and the Roman Church,' indicating an integration and transformation, not pure destruction."}, {"text": "Their refusal to settle in Roman territories, preferring to maintain entirely separate, nomadic societies.", "isCorrect": false, "rationale": "The text describes them as forming 'real political entities' in Spain, Gaul, and Italy, indicating settlement and governance within former Roman territories."}], "id": "q07"}, {"question": "The 'thenandnow' section draws a parallel between the collapse of Roman trade and Greek trade networks. What overarching economic principle do both historical examples illustrate?", "options": [{"text": "Economic systems are inherently fragile and always destined to collapse regardless of political conditions.", "isCorrect": false, "rationale": "The text resists fatalism ('all civilizations fall, nothing lasts') and focuses on the *relationship* between economic prosperity and political order, not an inevitable collapse."}, {"text": "Technological advancements are the sole determinant of sustained economic growth.", "isCorrect": false, "rationale": "While technology can play a role, the text explicitly highlights the importance of 'stable political institutions' for economic growth."}, {"text": "Sustained economic prosperity is heavily dependent on stable political institutions and order.", "isCorrect": true, "rationale": "The text concludes, 'Both show that economic prosperity depends on political order. Modern economists who study 'institutional economics' study exactly this relationship: stable political institutions are necessary for sustained economic growth. When institutions collapse, economies collapse with them.'"}, {"text": "Centralized empires are always more economically efficient than decentralized networks.", "isCorrect": false, "rationale": "The comparison is about *stability* of political order, not necessarily the structure of an empire versus a network. Both examples show that *loss of order* hurts trade."}], "id": "q08"}, {"question": "Which statement best reflects the 'teachernote' instruction on teaching the collapse of Rome without fatalism?", "options": [{"text": "Students should be reassured that such a collapse could never happen again in modern times.", "isCorrect": false, "rationale": "The teachernote advises resisting 'false reassurance ('that could never happen to us')'. The goal is nuanced understanding, not dismissive comfort."}, {"text": "The focus should be shifted from 'Why did Rome fall?' to 'What was worth preserving, and who preserved it?' emphasizing stewardship and survival.", "isCorrect": true, "rationale": "The teachernote explicitly states: 'Instead, focus on what survived and why. The key question is not 'Why did Rome fall?' but 'What was worth preserving, and who preserved it?' This reframes the narrative from tragedy to stewardship.'"}, {"text": "The archaeological evidence of decline should be downplayed to avoid depressing students.", "isCorrect": false, "rationale": "The teachernote says: 'The archaeological evidence for gradual decline... is factual and should be taught honestly.'"}, {"text": "The Eastern Roman Empire's longevity should be ignored to simplify the narrative of collapse.", "isCorrect": false, "rationale": "The text emphasizes the importance of understanding the Eastern Empire's survival to provide a complete picture and challenge the idea of a universal 'Dark Age.'"}], "id": "q09"}, {"question": "Considering the entire section, which statement accurately summarizes the most important nuance when discussing the 'Fall of Rome'?", "options": [{"text": "The 'Fall of Rome' was a singular, instantaneous event that led to the immediate and complete disappearance of all Roman influence globally.", "isCorrect": false, "rationale": "The text repeatedly emphasizes the gradual nature, the Western-specific scope, and the survival of various Roman elements, directly contradicting this statement."}, {"text": "The term exclusively refers to the military defeat of the Western Roman Empire by barbarian invaders, with no other significant changes.", "isCorrect": false, "rationale": "The text explains it was a collapse of administration, army, and tax base, leading to economic and social changes, not *just* military defeat. It also highlights cultural survival and transformation."}, {"text": "It was a complex, gradual process primarily affecting the Western Empire, while the Eastern (Byzantine) Empire continued to thrive and preserve Roman traditions for centuries.", "isCorrect": true, "rationale": "This statement synthesizes the key arguments throughout the section: the gradual nature, the Western focus, the survival of the Byzantine Empire, and its role in preserving Roman traditions."}, {"text": "The 'Fall of Rome' is a misnomer, as nothing Roman truly disappeared; it merely relocated its capital to Constantinople.", "isCorrect": false, "rationale": "While much survived and the East continued, the *Western* imperial administration, army, and tax base *did* collapse, and trade significantly declined in the West. It was not merely a relocation but a fundamental change in the West."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
