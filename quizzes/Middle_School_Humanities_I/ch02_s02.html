    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was the primary societal role of attending theater in ancient Athens?", "options": [{"text": "It was mainly a form of private entertainment for the wealthy elite.", "isCorrect": false, "rationale": "The text explicitly states that plays were 'attended by thousands of citizens at public expense' and were not merely entertainment, but a 'civic and religious duty'."}, {"text": "It served as a civic and religious duty, fostering public discourse on deep societal questions.", "isCorrect": true, "rationale": "The section highlights that attending theater was a 'civic and religious duty,' and playwrights like the tragedians used plays to 'probe the deepest questions of justice, fate, and the relationship between human beings and the gods,' effectively allowing Athens to 'think out loud about itself'."}, {"text": "Its main purpose was to celebrate military victories and honor fallen heroes through reenactments.", "isCorrect": false, "rationale": "While plays might touch upon war, the text emphasizes themes like 'justice, fate, and the relationship between human beings and the gods' and political satire, not primarily military reenactments."}, {"text": "It was an opportunity for citizens to learn practical skills and trades from skilled actors.", "isCorrect": false, "rationale": "The text identifies drama's role as probing philosophical and societal questions, not as a venue for vocational training."}], "id": "q01"}, {"question": "Which of the following best characterizes Aeschylus's use of the watchman in the opening of Agamemnon, as described in the text?", "options": [{"text": "To establish the king's supreme authority and immediate presence.", "isCorrect": false, "rationale": "The text notes the watchman is a 'low-ranking soldier, not a king,' directly contrasting with the idea of establishing the king's immediate presence or authority."}, {"text": "To provide a clear moral perspective from an ordinary character, distinct from the heroes.", "isCorrect": true, "rationale": "The text states, 'Greek tragedy often gives the clearest moral vision to ordinary characters rather than heroes,' citing the watchman as an example of this technique."}, {"text": "To introduce comic relief before the onset of the tragic events.", "isCorrect": false, "rationale": "The watchman's soliloquy is described as capturing 'the whole weight of suspense,' indicating a serious, not comedic, tone."}, {"text": "To illustrate the pervasive fear of foreign invaders throughout Argos.", "isCorrect": false, "rationale": "While he waits for news from Troy, his primary role described is one of weary vigil and suspense, not fear of immediate invasion."}], "id": "q02"}, {"question": "Sophocles' Antigone presents a foundational conflict that remains relevant today. Which of the following modern ethical dilemmas most closely mirrors the central conflict of the play?", "options": [{"text": "A debate over the most effective economic policy to reduce poverty.", "isCorrect": false, "rationale": "Antigone's conflict is about moral obligations and law, not economic policy. This option does not reflect the core theme."}, {"text": "A scientist deciding between pursuing a groundbreaking but ethically questionable experiment and adhering to strict research guidelines.", "isCorrect": false, "rationale": "While involving ethics, this scenario doesn't directly capture the clash between state law and a perceived higher, divine, or natural law, as powerfully as Antigone does."}, {"text": "A citizen choosing whether to follow a government mandate that contradicts their deeply held religious or moral beliefs.", "isCorrect": true, "rationale": "Antigone's struggle is precisely this: 'What do you owe the state? What do you owe God? When they conflict, which takes priority?' The text explicitly draws parallels to 'early Christian martyrs, by Thomas More, and by Christians in every age' who faced similar choices."}, {"text": "A politician deciding whether to prioritize national interests over international cooperation.", "isCorrect": false, "rationale": "This is a geopolitical dilemma, distinct from the individual's moral stand against state law based on higher principles, which is the heart of Antigone."}], "id": "q03"}, {"question": "Plato's Apology of Socrates provides insight into Socrates' core philosophical conviction. What did Socrates famously declare as the 'greatest good of man'?", "options": [{"text": "Achieving wealth and political power through persuasive rhetoric.", "isCorrect": false, "rationale": "Socrates' defense focuses on virtue and examination, not material or political gain. His life and death demonstrate a rejection of such pursuits as the highest good."}, {"text": "Engaging in daily discourse about virtue and examining oneself and others.", "isCorrect": true, "rationale": "The abridged text from Plato's Apology, 38a, explicitly states: 'Daily to discourse about virtue, and of those other things about which you hear me examining myself and others, is the greatest good of man, and that the unexamined life is not worth living.'"}, {"text": "Obtaining knowledge through reading and studying written texts.", "isCorrect": false, "rationale": "While he valued knowledge, Socrates' method was discourse and self-examination, and the 'greatest good' was tied to this active process, not merely passive learning from texts."}, {"text": "Serving the state through military valor and civic leadership.", "isCorrect": false, "rationale": "Socrates' 'service to the God' was philosophizing, which he placed above obedience to the Athenian state when their commands conflicted with what he believed was God's command."}], "id": "q04"}, {"question": "The 'caution' box mentions that 'Socrates wrote nothing.' What is the most significant implication of this fact for understanding Socrates' philosophy?", "options": [{"text": "It means Socrates' teachings were only spread through oral tradition and were largely forgotten after his death.", "isCorrect": false, "rationale": "The text immediately contradicts this by mentioning Plato, Xenophon, and Aristophanes as sources, indicating his teachings were recorded, albeit indirectly."}, {"text": "It implies that all attributed quotes from Socrates are entirely fictional and lack historical basis.", "isCorrect": false, "rationale": "The text states, 'This does not mean the picture is false—eyewitness testimony is never simply false,' indicating that while filtered, the accounts have a historical basis."}, {"text": "It creates a historical puzzle, as our understanding of Socrates is filtered through the interpretations and agendas of his students and contemporaries.", "isCorrect": true, "rationale": "The caution note states this 'creates a genuine historical puzzle' and that we are reading 'Plato's Socrates, filtered through a brilliant student's memory and theological agenda,' with differences even between Plato's and Xenophon's accounts."}, {"text": "It suggests that Socrates valued spoken dialogue so much that he deliberately avoided written communication.", "isCorrect": false, "rationale": "While he engaged in dialogue, the text doesn't explicitly state his *reason* for not writing, only the fact itself and its implications for historical interpretation."}], "id": "q05"}, {"question": "Antigone's claim that the gods' 'unwritten laws' are eternal and 'none knoweth whence they sprang' aligns with which philosophical concept?", "options": [{"text": "Existentialism, which posits that humans define their own meaning and values.", "isCorrect": false, "rationale": "Existentialism emphasizes human freedom and responsibility to create values, which is contrary to the idea of pre-existing, eternal, unchosen moral truths."}, {"text": "Moral relativism, suggesting that ethical truths are subjective and culturally determined.", "isCorrect": false, "rationale": "Antigone's argument is precisely against the idea that laws can be annulled by a 'mortal man' and are thus not relative but 'immutable' and universal."}, {"text": "Natural law, which holds that certain moral truths are inherent, universal, and discoverable by reason.", "isCorrect": true, "rationale": "The 'note' section directly defines Antigone's claim as 'natural law,' stating that philosophers call 'certain moral truths... not invented by human societies—they simply exist, eternal and unchosen.'"}, {"text": "Utilitarianism, where the moral worth of an action is determined by its outcome.", "isCorrect": false, "rationale": "Utilitarianism focuses on consequences (the greatest good for the greatest number), which is not the basis of Antigone's appeal to unchanging, inherent laws."}], "id": "q06"}, {"question": "The 'thenandnow' section describes the early Church's approach to Greek philosophy. How did figures like Augustine and Aquinas primarily engage with it?", "options": [{"text": "They completely rejected Greek philosophy as pagan and incompatible with Christian doctrine.", "isCorrect": false, "rationale": "The text explicitly states, 'The early Church did not throw away Greek philosophy; it baptized the best of it,' directly contradicting this option."}, {"text": "They used Greek philosophical concepts and logic to articulate and systematize Christian theology.", "isCorrect": true, "rationale": "The text states, 'Augustine used Plato's language of the soul's journey toward transcendent truth. Aquinas used Aristotle's logic to systematize Christian theology,' showing an integration of Greek thought."}, {"text": "They merely cataloged Greek texts for historical preservation without intellectual engagement.", "isCorrect": false, "rationale": "Their actions, as described, involved actively using and integrating the philosophical frameworks, not just preserving them passively."}, {"text": "They primarily focused on refuting Greek philosophical arguments to assert Christian supremacy.", "isCorrect": false, "rationale": "While refutation might have occurred in some contexts, the text emphasizes 'baptizing the best of it' and finding 'genuine glimpses of truth,' indicating an appreciative integration, not primarily refutation."}], "id": "q07"}, {"question": "The text implies a significant change in the concept of 'arete' (excellence) between Homer's heroes and Sophocles' Antigone. What does Antigone's story primarily value that Homeric heroes like Achilles might not have prioritized?", "options": [{"text": "Personal glory and skill in battle.", "isCorrect": false, "rationale": "The 'thenandnow' section explicitly states that 'Homer's heroes valued personal glory and military courage (arete as excellence in battle),' which is what Antigone *moves beyond*."}, {"text": "Adherence to higher moral or divine laws over state decrees.", "isCorrect": true, "rationale": "The 'thenandnow' section prompts the reader to consider what Sophocles values in Antigone that Homer did not, and Antigone's central conflict is her willingness to die for 'laws above human laws,' indicating a valuation of moral integrity over conventional heroic glory."}, {"text": "Political cunning and strategic leadership.", "isCorrect": false, "rationale": "Antigone's actions are driven by moral conviction, not political strategy. Creon embodies the state's political authority, which Antigone defies."}, {"text": "The pursuit of wealth and material possessions.", "isCorrect": false, "rationale": "Neither Homeric heroes nor Antigone primarily valued material wealth; their concerns were about honor, duty, and principles."}], "id": "q08"}, {"question": "The 'note' following Plato's Apology mentions that Athens, 'the birthplace of democracy, executed its greatest philosopher for asking too many questions.' What overarching lesson does the text intend for students to derive from this event?", "options": [{"text": "Democracy is inherently flawed and always leads to injustice.", "isCorrect": false, "rationale": "The text states it's a 'sobering reminder that democracy does not guarantee wisdom,' which is a more nuanced statement than claiming it is 'inherently flawed' or always leads to injustice."}, {"text": "The pursuit of philosophical inquiry is dangerous and should be avoided in civic life.", "isCorrect": false, "rationale": "Socrates' death is presented as a tragedy, but his 'examined life' is upheld as 'as necessary today as it was in Athens,' indicating that the pursuit of philosophy is valuable despite the risks."}, {"text": "Even democratic societies are not immune to making unwise or unjust decisions.", "isCorrect": true, "rationale": "The text explicitly states this is a 'sobering reminder that democracy does not guarantee wisdom,' directly supporting this conclusion about the fallibility of even democratic systems."}, {"text": "Philosophers should always prioritize obedience to the state over personal conscience.", "isCorrect": false, "rationale": "Socrates' famous declaration, 'I shall obey God rather than you,' directly contradicts this, emphasizing prioritizing higher principles."}], "id": "q09"}, {"question": "The section concludes by stating that Aeschylus, Sophocles, and Plato's texts are not 'merely historical curiosities.' What is presented as the most significant reason for their continuing importance?", "options": [{"text": "Their complex literary structures serve as models for modern dramatic writing.", "isCorrect": false, "rationale": "While their literary structures are significant, the text emphasizes their 'continuing relevance' through the 'urgent' questions they pose, not primarily their structural influence."}, {"text": "They provide accurate historical records of ancient Greek daily life and events.", "isCorrect": false, "rationale": "While they offer glimpses of history, the text focuses on their philosophical and ethical questions, not primarily as historical documents of daily life."}, {"text": "They continue to raise urgent ethical and philosophical questions that resonate across generations.", "isCorrect": true, "rationale": "The text states, 'More important than their historical influence is their continuing relevance. Antigone's question... has never stopped being urgent. The examined life that Socrates died for... is as necessary today as it was in Athens.'"}, {"text": "Their works are the earliest examples of written language, proving crucial for linguistics.", "isCorrect": false, "rationale": "The text does not mention their significance for linguistics; their value is rooted in their philosophical content and enduring moral dilemmas."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
