<script>
var QUESTIONS = [{"question": "What does the Latin phrase 'res publica' mean, and how does it describe the Roman system of government?", "options": [{"text": "It means 'the public army' and refers to the citizen-soldier basis of Roman military power.", "isCorrect": false, "rationale": "Res publica means 'the public thing' or 'the public affair,' not 'the public army.' The term describes shared government, not military organization."}, {"text": "It means 'the public thing' or 'the public affair' — the Roman system of shared government designed to prevent any single man from seizing permanent power.", "isCorrect": true, "rationale": "The text defines res publica as 'literally the public thing or the public affair — the Roman name for their system of shared government,' designed to prevent any single man from seizing permanent power, which is why two consuls each held the right of intercessio (veto)."}, {"text": "It means 'the republic of virtue' and refers to the Stoic ideal that all citizens should govern themselves according to reason.", "isCorrect": false, "rationale": "Res publica has no connection to Stoic philosophy. It is a political term specifically describing Rome's system of shared government."}, {"text": "It means 'the Roman state' and was coined by Augustus Caesar to describe the imperial system he created.", "isCorrect": false, "rationale": "The term was used long before Augustus — it was the name Romans gave their Republic founded in 509 BC. Augustus deliberately preserved the appearance of the res publica even while concentrating power."}], "id": "q01"}, {"question": "What did the founding legend of Romulus and Remus reveal about Roman values, according to the text?", "options": [{"text": "It revealed Rome's belief in racial superiority, as the twins' divine parentage (Mars) proved Romans were descended from the gods.", "isCorrect": false, "rationale": "The text does not interpret the founding legend in terms of racial superiority. It focuses on the moral and institutional values the story embodies."}, {"text": "Origin stories like Romulus and Remus were simply entertainment for illiterate Romans who needed exciting myths to explain their city's founding.", "isCorrect": false, "rationale": "The text explicitly argues the opposite: 'These stories are not merely entertainment. They answer the question: Who are we, and what do we stand for?' Even educated Romans preserved them because the legends revealed Rome's values."}, {"text": "The legend primarily justified Roman imperial expansion by claiming divine mandate for Rome's rule over other peoples.", "isCorrect": false, "rationale": "While Rome's divine origins were used to justify power, the text emphasizes that what the legend reveals is pietas, endurance, and Rome's values — not simply a divine mandate for conquest."}, {"text": "Even educated Romans preserved these legends because they revealed what Rome stood for — and origin stories are how civilizations answer 'Who are we, and what do we stand for?'", "isCorrect": true, "rationale": "The text states: 'Even educated Romans knew these founding stories were partly legendary, but they preserved and repeated them because the legends revealed what Rome stood for.' Origin stories reveal a civilization's values, not merely its history."}], "id": "q02"}, {"question": "What was pietas in Roman culture, and how does the story of Aeneas illustrate it?", "options": [{"text": "Pietas meant military courage in battle and was demonstrated by Aeneas' willingness to fight for his city rather than flee.", "isCorrect": false, "rationale": "Pietas is described as 'dutiful devotion — to the gods, to family, and to the state,' not primarily military courage. That is virtus. Aeneas demonstrates pietas by carrying his father from Troy, not by fighting."}, {"text": "Pietas meant personal piety toward the gods alone and was shown by Aeneas' faithful sacrifice before every major decision.", "isCorrect": false, "rationale": "Pietas is broader than religious piety. It encompasses duty to gods, family, and state. The text emphasizes that Aeneas 'always subordinates his personal desires to his obligations to father, household gods, and the destiny Rome requires.'"}, {"text": "Pietas meant dutiful devotion to gods, family, and state — illustrated by Aeneas carrying his aged father from burning Troy while holding his household gods, always subordinating his personal desires to his obligations.", "isCorrect": true, "rationale": "The text defines pietas as 'dutiful devotion — to the gods, to family, and to the state,' and illustrates it with the image of Aeneas escaping Troy 'carrying his aged father on his back and his household gods in his arms — an image of pietas in its fullest form.'"}, {"text": "Pietas meant civic pride in Rome's institutions and was shown by Aeneas founding a new city after the fall of Troy, just as Romulus founded Rome.", "isCorrect": false, "rationale": "Pietas is about duty and devotion, not civic pride. Aeneas in the legend becomes the ancestor of the Roman people, not a city founder in the same sense as Romulus."}], "id": "q03"}, {"question": "How did the Roman Republic's system of two consuls with mutual veto power address the danger of tyranny?", "options": [{"text": "By requiring both consuls to be patricians, the system ensured that only men of proven virtue held power.", "isCorrect": false, "rationale": "While early consuls were patricians, the text emphasizes the structural mechanism — mutual veto (intercessio) — not the class background of officeholders, as the key safeguard against tyranny."}, {"text": "By giving each consul the right of intercessio (veto) over the other's decisions, neither consul could act unilaterally, preventing the concentration of power in a single person.", "isCorrect": true, "rationale": "The text explains: 'The Republic was designed to prevent any single man from seizing permanent power, which is why two consuls each held the right of intercessio (veto) over the other.' The Roman people had sworn never again to be ruled by a king."}, {"text": "By limiting consuls to annual terms with no ability to stand for re-election, Rome ensured fresh leadership every year.", "isCorrect": false, "rationale": "The text notes consuls were annually elected but does not describe a prohibition on re-election as the primary safeguard. The mutual veto (intercessio) is identified as the key structural protection."}, {"text": "By requiring Senate approval for every consul's decision, the Senate effectively controlled both consuls and prevented abuse of power.", "isCorrect": false, "rationale": "The text describes consuls as holding full imperium (right to command) and presiding over the Senate — they were not merely rubber-stamping Senate decisions. The check against abuse was the mutual veto, not Senate oversight of every decision."}], "id": "q04"}, {"question": "What was the Conflict of the Orders, and what was the plebeians' most powerful weapon?", "options": [{"text": "It was a military conflict between Roman and allied Italian troops, resolved when Rome extended citizenship to all Italians after the Social War.", "isCorrect": false, "rationale": "The Conflict of the Orders was an internal political struggle between patricians and plebeians in Rome, not a military conflict with foreign or allied peoples."}, {"text": "It was the long struggle of plebeians to gain political rights equal to the patricians, with the secession — plebeian soldiers simply walking out of Rome and refusing to fight — as their most powerful weapon.", "isCorrect": true, "rationale": "The text defines the Conflict of the Orders as 'the long struggle of plebeians to gain political rights equal to the patricians.' The plebeians' 'most powerful weapon was the secession: in 494 BC, the plebeian soldiers simply walked out of Rome and refused to fight until the patricians created the office of tribune.'"}, {"text": "It was a philosophical debate between patrician Stoics and plebeian Epicureans over the nature of the good life, resolved through the Twelve Tables.", "isCorrect": false, "rationale": "The Conflict of the Orders was a practical political struggle over rights and power, not a philosophical debate."}, {"text": "It was the rivalry between the Senate and the tribunes over who could veto the other's decisions, eventually resolved by the Lex Hortensia.", "isCorrect": false, "rationale": "While the Lex Hortensia was part of the resolution, the Conflict of the Orders was the broader struggle between the patrician class and the plebeians for political equality, beginning long before the conflict between Senate and tribunes became central."}], "id": "q05"}, {"question": "Why was the creation of the Twelve Tables (451–450 BC) a significant democratic achievement?", "options": [{"text": "The Twelve Tables gave all citizens the right to vote on legislation and established the first popular assembly in Roman history.", "isCorrect": false, "rationale": "The Twelve Tables were a written law code, not a voting procedure. Their significance was making law public and accessible, not creating a legislative assembly."}, {"text": "They were the first written law code in the ancient world, making Rome the pioneer of written legal tradition.", "isCorrect": false, "rationale": "The Twelve Tables were not the first written law code in the ancient world — Hammurabi's Code predates them by over a millennium. The text compares them to Solon's reforms in Athens, not to earlier Mesopotamian codes."}, {"text": "By publicly displaying the law so every citizen could read it, the Twelve Tables made law knowable, consistent, and binding on rich and poor alike — removing patrician monopoly on legal interpretation.", "isCorrect": true, "rationale": "The text explains: 'Before the Twelve Tables, patrician judges could apply unwritten law however they wished. Written, public law was a demand for accountability.' The tables were displayed publicly 'so that every citizen could read the law for himself.'"}, {"text": "The Twelve Tables established the cursus honorum — the required sequence of offices — that gave Roman government its stability and continuity.", "isCorrect": false, "rationale": "The cursus honorum was a separate Roman institution. The Twelve Tables were specifically about written, public law, not about the sequence of government offices."}], "id": "q06"}, {"question": "What is the cursus honorum, and why did Rome's political system require it?", "options": [{"text": "The 'path of honors' was the required sequence of offices (quaestor, aedile, praetor, consul, censor) each requiring a minimum age and waiting period, ensuring leaders were tested and experienced.", "isCorrect": true, "rationale": "The text defines the cursus honorum as 'the path of honors — the required sequence of offices a Roman nobleman held in order: quaestor, aedile, praetor, consul, censor. Each office required a minimum age and a waiting period between posts. This system ensured that Rome's leaders were tested and experienced before reaching the highest office.'"}, {"text": "The cursus honorum was the moral education program for young Roman nobles, combining military training with philosophical study under a senior senator.", "isCorrect": false, "rationale": "The cursus honorum was a sequence of public offices, not an educational program. It was about government service, not philosophical training."}, {"text": "It was the honor code observed by Roman soldiers, requiring them to obey their commander, never flee from battle, and report misconduct to the tribune.", "isCorrect": false, "rationale": "The cursus honorum refers to the 'path of honors' in civil government, not to a military honor code."}, {"text": "The cursus honorum was the Senate's procedure for nominating consuls, ensuring that only men approved by the existing Senate could stand for the highest office.", "isCorrect": false, "rationale": "The cursus honorum was about the sequence of offices any aspiring politician had to hold, not about Senate nomination procedures."}], "id": "q07"}, {"question": "What does the story of Horatius at the Bridge reveal about Roman virtus, as distinct from Greek heroism?", "options": [{"text": "Horatius demonstrates Greek heroism (arete) by seeking immortal glory through his brave stand, ensuring his name would be remembered forever.", "isCorrect": false, "rationale": "The text explicitly contrasts Horatius with Achilles: 'Achilles holds back from battle to punish Agamemnon — his courage serves his pride. Horatius rushes to the bridge not for glory but so that other men have time to destroy it.' Roman virtus is directed toward the community, not personal glory."}, {"text": "Horatius demonstrates Roman virtus — courage in the service of the community, indifferent to personal reward — by holding the bridge so others could demolish it, expecting to die.", "isCorrect": true, "rationale": "The text states: 'This is virtus in its Roman sense: courage in the service of the community, indifferent to personal reward.' Horatius held the bridge alone while his comrades demolished it behind him, expecting to drown — 'There is no Achillean glory in drowning in full armor.'"}, {"text": "Horatius embodies Christian self-sacrifice, foreshadowing the martyrs who would die for a cause greater than themselves centuries later.", "isCorrect": false, "rationale": "While the text does compare Roman and Christian virtue, Horatius is specifically used to illustrate Roman virtus, not Christian martyrdom. The text notes the destination differs: Horatius died for Rome; the Christian seeks a different city altogether."}, {"text": "Horatius demonstrates the Roman value of gravitas — dignified seriousness — by standing firm without emotion while others panicked around him.", "isCorrect": false, "rationale": "While gravitas is a Roman virtue, the text specifically identifies Horatius' action as demonstrating virtus — active courage in service of the community — not the more passive quality of dignified seriousness."}], "id": "q08"}, {"question": "What made Cincinnatus the supreme example of republican virtue in Roman tradition?", "options": [{"text": "He was the poorest Roman ever elected to the dictatorship, proving that Rome's meritocracy truly rewarded talent regardless of wealth.", "isCorrect": false, "rationale": "While Cincinnatus was poor at the time he was called to the dictatorship, the text emphasizes his willingness to give up power after the crisis, not his poverty as the point of the story."}, {"text": "He held the dictatorship for the constitutional maximum of six months before voluntarily resigning and retiring to his farm.", "isCorrect": false, "rationale": "The text says Cincinnatus held the dictatorship for only fifteen days before resigning. The six-month maximum was the constitutional limit; Cincinnatus' point was resigning far earlier than required."}, {"text": "Called from his four-acre farm to serve as dictator, he rescued the surrounded Roman army, then resigned the dictatorship after only fifteen days and returned to his farm, demonstrating that power is a burden to bear, not a prize to seize.", "isCorrect": true, "rationale": "The text presents Cincinnatus' story as the supreme example of republican virtue: 'power is a burden to be borne when the community needs you, not a prize to be seized and kept.' He resigned after fifteen days when the crisis was resolved and returned to farming."}, {"text": "He served as dictator three times during crises, each time refusing the honors and wealth the Senate offered him as reward for saving Rome.", "isCorrect": false, "rationale": "The text describes Cincinnatus serving as dictator once (in this famous story). The point is not refusing rewards but resigning power when it was no longer needed."}], "id": "q09"}, {"question": "What does the story of Marcus Atilius Regulus illustrate about the Roman virtue of fides?", "options": [{"text": "Regulus demonstrates fides by refusing to fight against Rome even when captured, maintaining his loyalty to the Republic over his own survival.", "isCorrect": false, "rationale": "Regulus was already a prisoner of Carthage, not being asked to fight against Rome. His demonstration of fides was keeping his oath to return to Carthage after arguing against the peace terms before the Senate."}, {"text": "Fides meant loyalty to Rome's allies, which Regulus showed by honoring Rome's treaty obligations with Carthage even when the Senate wanted to break them.", "isCorrect": false, "rationale": "Regulus actually argued against favorable treaty terms for Carthage. His fides was demonstrated by keeping his personal oath to return to Carthage, knowing it meant his death."}, {"text": "Having given his oath to return to Carthage if negotiations failed, Regulus argued against the Carthaginian terms before the Roman Senate, then kept his word and returned to Carthage to be tortured to death — demonstrating that oaths must be kept regardless of cost.", "isCorrect": true, "rationale": "The text presents Regulus as the supreme example of fides (faithfulness, trustworthiness). He 'refused to stay in Rome. He said farewell to his family and sailed back to Carthage, where he knew he would be tortured to death.' Cicero used him as the supreme example of oath-keeping."}, {"text": "Regulus demonstrated fides by betraying military secrets to Carthage after his capture, fulfilling his duty to his captors as his new masters.", "isCorrect": false, "rationale": "The opposite is true: Regulus argued against terms favorable to Carthage, then returned to die at Carthaginian hands. His fides was to his own oath, not to his captors."}], "id": "q10"}, {"question": "How does the text distinguish between Roman virtue and Christian virtue?", "options": [{"text": "Roman virtue was purely external (what the community could see), while Christian virtue was purely internal (what God alone could see), making them fundamentally incompatible.", "isCorrect": false, "rationale": "The text does not frame the distinction as external vs. internal. It focuses on the different destinations: Roman virtue aims at the res publica; Christian virtue aims at conformity to God's character and a different city altogether."}, {"text": "Roman virtue aimed ultimately at the earthly city — Rome's honor, survival, and glory — while Christian virtue aimed at a different city altogether, one 'whose architect and builder is God.'", "isCorrect": true, "rationale": "The text states: 'Roman virtue ultimately aims at the res publica — the city, the community, the Roman state... Christian virtue, by contrast, is not aimed at any earthly city.' Augustine will later argue that Romans received their reward — earthly glory — but sought nothing more."}, {"text": "Roman virtue was morally inferior because it required public recognition, while Christian virtue was superior because it was practiced in secret.", "isCorrect": false, "rationale": "The text does not frame Roman virtue as morally inferior but as genuinely admirable — directed toward a different end. 'Roman virtue — virtus, pietas, fides — is genuinely admirable.'"}, {"text": "Roman virtue was superseded by Christian virtue when Constantine converted, making the former obsolete and the latter the new Roman ideal.", "isCorrect": false, "rationale": "The text does not argue that Roman virtue became obsolete. It maintains both as genuinely valuable while noting their different ultimate aims. The comparison is an invitation to think, not a verdict."}], "id": "q11"}, {"question": "What was Plutarch's method and purpose in writing his Parallel Lives?", "options": [{"text": "Plutarch intended to write a comprehensive political history of Greece and Rome, using famous individuals as case studies for institutional analysis.", "isCorrect": false, "rationale": "The text describes Plutarch as seeking virtue in history, not writing political or institutional history. He was writing 'ethike historia' — ethical history, moral portraits."}, {"text": "Plutarch paired famous Greeks and Romans to compare their characters, aiming not primarily at historical accuracy but at the moral formation of readers through exemplary lives.", "isCorrect": true, "rationale": "The text describes Plutarch as pairing 'twenty-three famous Greeks with twenty-three famous Romans' comparing them 'in terms of character.' He 'makes no secret of his purpose: he is looking for virtue in history, not just events.' His Lives are 'moral portraits.'"}, {"text": "Plutarch wrote to prove the superiority of Greek culture over Roman culture by showing that the Greek figures in each pair always embodied higher virtue.", "isCorrect": false, "rationale": "The text does not describe Plutarch as arguing for Greek superiority. The Parallel Lives compare Greeks and Romans as equals, both as sources of moral exemplars."}, {"text": "Plutarch was the first historian to insist on using only eyewitness sources and original documents, making his Lives the most reliable accounts of their subjects.", "isCorrect": false, "rationale": "The text notes the opposite: 'Plutarch wrote nearly two centuries after Regulus lived. He was not a primary witness. He was working from earlier historians, many of whose works have since been lost.'"}], "id": "q12"}, {"question": "What does the text suggest about why Rome succeeded in building a stable civilization where Greek city-states failed?", "options": [{"text": "Rome succeeded because its geographic location at the center of the Italian peninsula gave it inherent military and commercial advantages over all rivals.", "isCorrect": false, "rationale": "The text's answer to this question focuses on institutions, not geography. The opening frames Rome's answer to the Greek problem as 'not philosophy but institutions.'"}, {"text": "Rome succeeded because it developed a unique military technology — the legion — that was superior to any other ancient fighting force.", "isCorrect": false, "rationale": "The text mentions Roman military success but identifies the key to Roman stability as its system of government, law, and civic virtue, not military technology alone."}, {"text": "Rome succeeded because it replaced the Greek city-state model with monarchy, giving the state the strong centralized leadership needed for expansion.", "isCorrect": false, "rationale": "Rome's Republic was explicitly anti-monarchical. The expulsion of Tarquin and the establishment of the Republic in 509 BC was Rome's rejection of monarchy as a solution."}, {"text": "Rome answered the Greek problem of civilizational unity through durable institutions — the Senate, consulship, tribunes, and Twelve Tables — and a culture of duty (virtus, pietas, fides) that proved more lasting than any army.", "isCorrect": true, "rationale": "The text frames the entire chapter around this thesis: 'How did a small city on the Tiber River become the master of the Mediterranean world? The answer lies not only in military power but in a system of government, law, and civic virtue that proved more durable than any army.'"}], "id": "q13"}, {"question": "What was Rome's policy toward defeated Italian peoples, and why did it prove strategically superior to enslavement?", "options": [{"text": "Rome simply assimilated defeated peoples as full Roman citizens immediately, creating a large and loyal citizen body.", "isCorrect": false, "rationale": "The text describes a more nuanced approach: some cities received full citizenship, others received Latin rights (partial citizenship). It was not simply immediate full assimilation for all."}, {"text": "Rome granted either full citizenship or Latin rights to defeated peoples, giving them a stake in Roman success — they contributed soldiers and taxes and gained the protection of Roman law.", "isCorrect": true, "rationale": "The text states: 'Rome offered many of the defeated cities Latin rights — partial Roman citizenship that gave merchants legal protections but not the full vote. Some cities received full citizenship. This policy of incorporation rather than enslavement gave conquered peoples a stake in Roman success.'"}, {"text": "Rome sold defeated peoples into slavery to fund its military expansion, creating the economic foundation of the Republic's growing power.", "isCorrect": false, "rationale": "The text explicitly contrasts Rome's 'policy of incorporation rather than enslavement' as the key to its success. Enslaving defeated peoples would have created permanent enemies, not loyal allies."}, {"text": "Rome forced all defeated Italian peoples to abandon their own languages and religions and adopt Roman culture immediately upon conquest.", "isCorrect": false, "rationale": "The text does not describe forced cultural assimilation. The policy was political incorporation through citizenship or Latin rights, not cultural erasure."}], "id": "q14"}, {"question": "Livy admits his earliest histories are legendary rather than strictly historical. Why does the text argue this does not make them 'useless'?", "options": [{"text": "Legends are useful because they contain encoded historical data that modern archaeologists can decode to recover facts about early Rome.", "isCorrect": false, "rationale": "The text's argument for the value of legends is ethical, not archaeological. It is about what values the stories reveal, not about hidden historical data."}, {"text": "A story that a culture tells about its own heroes for four centuries tells us something deeply true about what that culture values, even if the individual details are not literally accurate.", "isCorrect": true, "rationale": "The text argues: 'A story that a culture tells about its own heroes for four centuries tells us something deeply true about what that culture values, even if the individual details are not literally accurate. Read these stories asking: what was Rome trying to teach its citizens by repeating them?'"}, {"text": "Legends are useful because they were partly true and Livy has skillfully separated fact from fiction for later generations.", "isCorrect": false, "rationale": "The text states Livy himself 'freely admits that the earliest accounts are legendary' — the text does not claim Livy successfully separated historical fact from legend."}, {"text": "Legends were believed literally by ordinary Romans, and understanding their political effects requires treating them as historical facts.", "isCorrect": false, "rationale": "The text notes 'even educated Romans knew these founding stories were partly legendary.' Their value lies in the values they taught, not in being literally believed."}], "id": "q15"}, {"question": "What was the Gallic sack of Rome (390 BC), and what was its long-term effect on Roman policy?", "options": [{"text": "A Gallic invasion destroyed Rome completely, forcing the Romans to relocate their city and rebuild it on a new site further up the Tiber.", "isCorrect": false, "rationale": "The Gauls sacked Rome but did not destroy it completely and the Romans did not relocate. The text says 'Rome rebuilt — and remembered.'"}, {"text": "A Gallic tribe from northern Italy defeated a Roman army, sacked and burned most of Rome, but could not take the Capitoline Hill. Rome rebuilt and used the humiliation as motivation to build stronger walls and armies.", "isCorrect": true, "rationale": "The text states: 'In 390 BC, a Gallic tribe swept down from northern Italy, defeated a Roman army at the Allia River, and sacked the city of Rome itself. The Gauls could not take the fortified Capitoline Hill... Rome rebuilt — and remembered. The humiliation of the Gallic sack drove the Romans to build stronger walls and stronger armies.'"}, {"text": "The Gallic sack permanently ended the Conflict of the Orders by forcing patricians and plebeians to cooperate against a common enemy.", "isCorrect": false, "rationale": "The text does not connect the Gallic sack to the resolution of the Conflict of the Orders. The two processes were separate."}, {"text": "The Gallic sack ended Rome's expansion northward permanently, as the Romans never again attempted to conquer the Po Valley after this defeat.", "isCorrect": false, "rationale": "Rome did eventually control the Po Valley and all of Italy. The sack's effect was to motivate stronger military preparations, not to end Roman northward ambitions permanently."}], "id": "q16"}, {"question": "How does the text describe the role of the tribune of the plebs in the Roman Republican system?", "options": [{"text": "Tribunes were military officers who commanded the legions in the field when consuls were occupied with senatorial business.", "isCorrect": false, "rationale": "Military tribunes were a separate office. The tribunes of the plebs were civilian officials whose specific role was protecting ordinary citizens from abuse of power by magistrates."}, {"text": "Tribunes had supreme authority in Rome, outranking even the consuls, because their persons were legally sacred and inviolable.", "isCorrect": false, "rationale": "Tribunes did not outrank consuls in general authority. Their power was specifically the ability to veto magistrates' actions affecting plebeian citizens, not supreme authority over everyone."}, {"text": "Ten annually elected officials whose persons were legally sacrosanct and who could veto any magistrate's action affecting a plebeian citizen — the common citizen's shield against abuse of power.", "isCorrect": true, "rationale": "The text defines tribunes as 'ten annually elected officials whose persons were legally sacrosanct (inviolable — it was a capital crime to harm them) and who could veto any magistrate's action affecting a plebeian citizen. The tribune was the common citizen's shield against the abuse of power.'"}, {"text": "Tribunes were senior senatorial officials who could propose legislation and lead debates, serving as a bridge between the Senate and the popular assemblies.", "isCorrect": false, "rationale": "Tribunes of the plebs were elected by the plebeians, not senatorial officials. Their role was protective veto power, not legislative leadership."}], "id": "q17"}, {"question": "What does the text suggest about the difference between Livy's purpose in writing history and modern historians' purposes?", "options": [{"text": "Livy wanted to be objective and scientific; modern historians have abandoned objectivity for ideological purposes.", "isCorrect": false, "rationale": "The text presents the opposite: Livy was openly a moral historian with a didactic purpose. Modern historians actually value his admission of uncertainty more than his objectivity."}, {"text": "Livy wrote openly as a moral historian seeking to show how Rome's virtues built its empire and its vices threatened it, using history to form readers — a purpose modern historians largely share.", "isCorrect": false, "rationale": "While the text notes Livy's moral purpose, it does not claim modern historians share the goal of moral formation through history. Modern historians value Livy's method of admitting uncertainty."}, {"text": "Livy wrote history as an openly moral project — to show how Rome's life and manners built its empire — using exemplary heroes and cautionary villains to form readers, not merely to record facts.", "isCorrect": true, "rationale": "The text quotes Livy's preface: he cares about 'their life and their manners' and 'their morals,' not merely armies and dates. He was writing a moral history: 'His heroes are moral exemplars; his villains are warnings.'"}, {"text": "Livy cared only about factual accuracy and was the first Roman historian to use primary sources and eyewitness testimony systematically.", "isCorrect": false, "rationale": "The text says the opposite: 'Livy was not primarily a researcher — he freely admits that the earliest accounts are legendary — but he was a brilliant storyteller with a clear moral purpose.'"}], "id": "q18"}, {"question": "What does the American tradition of naming George Washington 'the American Cincinnatus' suggest about the influence of Roman republican virtue?", "options": [{"text": "It suggests Americans in 1783 were unoriginal thinkers who could not develop their own political vocabulary without borrowing from ancient Rome.", "isCorrect": false, "rationale": "The text presents this as evidence of Rome's genuine cultural influence on Western civilization — the Founders consciously drew on Roman Republican models as positive precedents."}, {"text": "It suggests that the American Founders drew directly on Roman republican virtue stories (learned through Plutarch and Livy) as their vocabulary for understanding and praising Washington's decision to resign military power.", "isCorrect": true, "rationale": "The text states: 'When the American Founders wrote about republican virtue, they were drawing directly on these stories. When they named their hero the American Cincinnatus, they were using Plutarch's vocabulary.' Washington himself read the story of Cincinnatus."}, {"text": "It is a coincidence with no causal connection to Roman history — Washington voluntarily resigned for personal reasons unrelated to any classical model.", "isCorrect": false, "rationale": "The text presents the connection as deliberate and historically documented. Washington was celebrated as 'the American Cincinnatus' by Europeans, and the Society of the Cincinnati (founded by Revolutionary War officers) takes its name directly from the Roman hero."}, {"text": "It shows that America's founders wanted to recreate the Roman Empire in the New World, using classical models as a blueprint for expansionist government.", "isCorrect": false, "rationale": "The admiration was specifically for Roman republican virtue (self-sacrifice, resignation of power), not for imperial expansion. The Founders were drawing on the Republic, not the Empire, as their model."}], "id": "q19"}];

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
