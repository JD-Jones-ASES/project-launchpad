<script>
var QUESTIONS = [{"question": "According to the text, which statement best encapsulates the profound influence of Homer's epics on ancient Greek society?", "options": [{"text": "They served as a primary historical record, detailing the exact events of the Trojan War.", "isCorrect": false, "rationale": "The section 'How to Read Primary Sources' explicitly states, 'Homer was not writing a history of the Trojan War,' making this option incorrect."}, {"text": "They were treated as sacred texts, guiding moral and ethical behavior, similar to later religious scriptures.", "isCorrect": true, "rationale": "The text states Homer's epics 'were the Bible of ancient Greek culture,' and 'Ancient Greeks memorized his lines the way later Christians would memorize Scripture.' It also notes they turned to Homer to learn 'how to be brave, how to grieve, how to lead, or how to come home,' indicating a profound moral and ethical guidance beyond mere storytelling."}, {"text": "They were primarily entertainment, recited at aristocratic feasts to pass the time.", "isCorrect": false, "rationale": "While Homer's poetry was 'to be sung aloud at aristocratic feasts,' the text also emphasizes its role in shaping 'every generation of Greek education' and modeling 'heroic excellence,' indicating a significance far beyond simple entertainment."}, {"text": "They introduced the concept of individual heroism as distinct from collective societal achievement.", "isCorrect": false, "rationale": "The text discusses individual heroes like Achilles and Odysseus, but it does not specify that Homer's works *introduced* the concept of individual heroism or framed it in contrast to collective achievement. The primary emphasis is on their role as cultural and moral guides."}], "id": "q01"}, {"question": "Which of the following best describes the fundamental thematic contrast between Homer's *Iliad* and *Odyssey*?", "options": [{"text": "The *Iliad* focuses on human interaction with the gods, while the *Odyssey* explores human ingenuity against mythical monsters.", "isCorrect": false, "rationale": "Both epics feature interactions with gods and encounters with mythical elements. The text does not present this as the fundamental thematic distinction."}, {"text": "The *Iliad* explores the destructive consequences of personal rage, whereas the *Odyssey* examines the challenges of enduring absence and the power of cleverness.", "isCorrect": true, "rationale": "The text explicitly states, 'If the Iliad is about the costs of anger, the Odyssey is about the costs of long absence—and the ingenuity required to survive it.' This directly aligns with the option."}, {"text": "The *Iliad* portrays collective warfare and sacrifice, while the *Odyssey* emphasizes individual journey and self-discovery.", "isCorrect": false, "rationale": "While the *Iliad* involves collective warfare and the *Odyssey* an individual journey, the text gives a more specific thematic contrast based on 'anger' vs. 'absence/ingenuity' as the core, which is more precise."}, {"text": "The *Iliad* highlights the importance of honor in death, while the *Odyssey* focuses on the importance of honor in life.", "isCorrect": false, "rationale": "Both epics engage with the concept of honor, but the text's primary thematic distinction is rooted in 'anger' for the *Iliad* and 'absence/ingenuity' for the *Odyssey*, not specifically honor in death versus life."}], "id": "q02"}, {"question": "Achilles' eventual return to battle in the *Iliad* is primarily driven by which of the following motivations?", "options": [{"text": "A renewed sense of patriotism and duty to the Achaean cause.", "isCorrect": false, "rationale": "The text directly contradicts this, stating Achilles returned 'not out of patriotism or duty'."}, {"text": "A deep-seated desire for glory and to prove himself the greatest warrior.", "isCorrect": false, "rationale": "While Achilles is known for seeking glory, the text specifically identifies grief and revenge for Patroclus as the *immediate* catalyst for his return to battle after his initial withdrawal."}, {"text": "Overwhelming grief for his fallen companion Patroclus and a thirst for revenge against Hector.", "isCorrect": true, "rationale": "The text explicitly states, 'Achilles returns to battle not out of patriotism or duty, but out of grief and the desire for revenge' following Patroclus's death by Hector."}, {"text": "A strategic decision to prevent the complete collapse of the Greek army and ensure their victory.", "isCorrect": false, "rationale": "While this was a consequence of his return, the text frames Achilles' *personal motivation* as grief and revenge, rather than a strategic calculation for the army's survival."}], "id": "q03"}, {"question": "The scene between King Priam and Achilles in Book XXIV of the *Iliad* is highlighted as extraordinary because it:", "options": [{"text": "Demonstrates the strict adherence to ancient Greek customs of ransom and prisoner exchange.", "isCorrect": false, "rationale": "The text explicitly states that Priam 'does not threaten. He does not bargain,' making his appeal an *unusual* one, not a demonstration of strict adherence to typical customs."}, {"text": "Shows a moment of shared humanity and empathy between enemies, transcending the simple narrative of war.", "isCorrect": true, "rationale": "The text explains that Priam's appeal is 'unlike any in ancient literature' because he does not threaten or bargain, but reminds Achilles of his own father, leading to shared weeping. It then states, 'This scene encapsulates what makes the Iliad so enduring. It is not a simple story of Greek triumph over Trojan evil,' but rather shows the complexity of heroes and shared humanity."}, {"text": "Underscores Achilles' ultimate triumph and his unwavering commitment to Achaean honor.", "isCorrect": false, "rationale": "The scene's significance lies in Achilles' emotional vulnerability and shared grief with his enemy, which complicates, rather than simply underscores, his triumph and honor."}, {"text": "Reveals the gods' direct intervention in human affairs to facilitate a truce between warring factions.", "isCorrect": false, "rationale": "While Hermes guides Priam, the *extraordinary* nature of the scene, as described by the text, centers on the human interaction and emotional depth between Priam and Achilles, not a divinely orchestrated truce."}], "id": "q04"}, {"question": "The episodes of Odysseus facing the Cyclops and the Sirens primarily serve to illustrate which highly valued Greek characteristic in the *Odyssey*?", "options": [{"text": "Unparalleled physical strength and martial prowess.", "isCorrect": false, "rationale": "The text explicitly contrasts Odysseus's cleverness with Achilles' 'raw strength' and states Odysseus 'is not the greatest warrior'."}, {"text": "Deep piety and favor with the Olympian gods.", "isCorrect": false, "rationale": "While Odysseus does receive divine assistance, the text specifically highlights his own actions—naming himself 'Nobody' and tying himself to the mast—as examples of his 'cleverness' and 'ingenuity,' not primarily his piety."}, {"text": "Exceptional cleverness, resourcefulness, and self-knowledge.", "isCorrect": true, "rationale": "The text explicitly states, 'These two episodes show us the Greek heroic ideal as applied to brains rather than brawn. Odysseus is not the greatest warrior; Achilles was. He is the cleverest, the most resourceful, the one who finds the unexpected solution.'"}, {"text": "Loyalty to his crew and a commitment to their collective survival.", "isCorrect": false, "rationale": "Odysseus's actions do contribute to his crew's survival, but the text emphasizes *his* individual 'cleverness' and 'resourcefulness' as the key takeaway from these episodes."}], "id": "q05"}, {"question": "How does Penelope's character and actions in the *Odyssey* reinforce the themes of the epic?", "options": [{"text": "Her unwavering devotion to the gods guarantees Odysseus's safe return.", "isCorrect": false, "rationale": "While Penelope is faithful, the text emphasizes her loyalty to Odysseus and her cleverness, not her specific devotion to the gods as the guarantor of his return."}, {"text": "Her clever trickery with the shroud mirrors Odysseus's own ingenuity and highlights their suitable partnership.", "isCorrect": true, "rationale": "The text describes Penelope's 'famous trick' of weaving and unraveling the shroud and explicitly states, 'Penelope's cleverness and loyalty mirror Odysseus's own; they are truly suited to each other,' directly linking her actions to Odysseus's defining trait and the epic's themes."}, {"text": "Her suffering under the suitors emphasizes the tragic cost of war and absence for those left behind.", "isCorrect": false, "rationale": "While her situation causes suffering and highlights absence, the text focuses on her *response* to it and praises her 'cleverness and loyalty' as mirroring Odysseus, making her actions an active reflection of themes rather than just passive suffering."}, {"text": "Her role as a queen demonstrates the importance of political stability in the absence of a male ruler.", "isCorrect": false, "rationale": "The text focuses on Penelope's personal qualities and her relationship with Odysseus, framing her actions as mirroring his ingenuity, rather than analyzing her role in terms of political stability."}], "id": "q06"}, {"question": "Which statement most accurately differentiates the central concerns of Hesiod's *Works and Days* from Homer's epics?", "options": [{"text": "Hesiod focuses on the lives of ordinary farmers and the pursuit of justice, while Homer celebrates aristocratic warriors and their quest for glory.", "isCorrect": true, "rationale": "The text explicitly contrasts them: 'Where Homer's epics are about heroes and gods at war, Hesiod writes about farmers, justice, and how to live.' It further states, 'Homer's heroes seek glory above all; Hesiod's ideal man seeks justice and honest work,' aligning perfectly with this option."}, {"text": "Hesiod provides a chronological history of Greece, whereas Homer recounts mythical tales.", "isCorrect": false, "rationale": "Hesiod presents a myth of the Five Ages, not a chronological history. Homer's epics are themselves deeply intertwined with Greek history and myth."}, {"text": "Hesiod advocates for pacifism and avoiding conflict, while Homer glorifies warfare.", "isCorrect": false, "rationale": "While Hesiod advocates for honest living and avoiding injustice, the text doesn't explicitly state he advocates for pacifism as a core tenet, only for fair dealing."}, {"text": "Hesiod emphasizes divine intervention in human affairs, while Homer champions human free will.", "isCorrect": false, "rationale": "Both Homer's and Hesiod's works contain significant elements of divine intervention. This is not the primary point of contrast highlighted in the text."}], "id": "q07"}, {"question": "Despite his pessimism about the 'Iron Age,' Hesiod's *Works and Days* primarily serves as:", "options": [{"text": "A lament for a lost Golden Age and a critique of divine abandonment.", "isCorrect": false, "rationale": "The text explicitly states, 'Hesiod's poem is not a lament,' even though it acknowledges pessimism about the Iron Age."}, {"text": "A call for societal revolution against corrupt leaders and unjust systems.", "isCorrect": false, "rationale": "The poem is addressed to his brother and focuses on individual virtues and actions (honest labor, fairness), not on instigating a societal revolution."}, {"text": "A practical guide to honest labor, fair dealing, and living justly in a difficult world.", "isCorrect": true, "rationale": "The text clearly states, 'Despite this pessimism about his own age, Hesiod's poem is not a lament. It is a guide to honest living. He argues that honest labor is both necessary and honorable—that the farmer who works hard, treats his neighbors fairly, and keeps his contracts will find the gods on his side.'"}, {"text": "A philosophical treatise on the inherent evil of human nature and the inevitability of decline.", "isCorrect": false, "rationale": "While Hesiod is pessimistic about his age, the poem offers practical advice for living well within it ('a guide to honest living'), suggesting a path for individuals rather than just a fatalistic philosophical declaration."}], "id": "q08"}, {"question": "Based on the 'Two Greek Ideals' described in the text, which situation best exemplifies the 'Hesiodic Ideal'?", "options": [{"text": "A general leading his army to a decisive victory, earning lasting fame for his valor.", "isCorrect": false, "rationale": "This scenario directly aligns with the 'Homeric Ideal' of achieving 'Fame (kleos) through great deeds in war,' with Achilles as the model."}, {"text": "A philosopher engaging in public debate to challenge prevailing societal norms and traditions.", "isCorrect": false, "rationale": "While intellectual, this scenario is not directly tied to the 'farmer/citizen' and 'honest work' focus of the Hesiodic Ideal."}, {"text": "A farmer diligently working his land, upholding his contracts, and resolving disputes fairly with his neighbors.", "isCorrect": true, "rationale": "The 'Hesiodic Ideal' is defined as the 'farmer/citizen' who values 'Justice, honest work, community. The man who tends his farm, keeps his word, and treats neighbors fairly.' This option perfectly describes that ideal."}, {"text": "A young hero choosing to die gloriously in battle rather than live a long, obscure life.", "isCorrect": false, "rationale": "This is explicitly given as the definition of the 'Homeric Ideal,' with Achilles as the model."}], "id": "q09"}, {"question": "When reading Homer's *Iliad* as a primary source, applying the principles of 'How to Read Primary Sources' would lead a scholar to primarily consider that Homer's purpose was:", "options": [{"text": "To meticulously record the historical facts of the Trojan War for future generations.", "isCorrect": false, "rationale": "The 'How to Read Primary Sources' section explicitly states, 'Homer was not writing a history of the Trojan War,' making this option incorrect."}, {"text": "To create epic poetry that honored great men and modeled heroic excellence for an aristocratic audience.", "isCorrect": true, "rationale": "The text explicitly states, 'Homer was not writing a history of the Trojan War. He was composing poetry to be sung aloud at aristocratic feasts, to honor great men, and to model heroic excellence for his audience.' This directly answers the question based on the provided section."}, {"text": "To critique the moral failings of kings and warriors, advocating for a more just societal structure.", "isCorrect": false, "rationale": "While the *Iliad* does present flawed heroes and complexities, the text specifies Homer's purpose as honoring great men and modeling heroic excellence, rather than primarily critiquing moral failings or advocating for societal change."}, {"text": "To provide a comprehensive religious text, establishing the theological doctrines of ancient Greek polytheism.", "isCorrect": false, "rationale": "While gods are central to Homer's narrative, the text describes the epics as the 'Bible of ancient Greek culture' in terms of cultural significance and education, not as a systematic theological doctrine. His purpose was to compose poetry modeling heroism, not a religious text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
