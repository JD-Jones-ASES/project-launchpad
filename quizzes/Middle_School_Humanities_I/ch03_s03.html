<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the geographic advantage of the Italian peninsula compared to Greece, as described in the text?", "options": [{"text": "Italy had a completely flat terrain, making all areas easily accessible.", "isCorrect": false, "rationale": "The text states Italy has a 'broad central spine (the Apennines),' indicating it is not completely flat, though it has broad coastal plains."}, {"text": "Italy's broad coastal plains and less fragmented mountain range fostered larger agricultural communities and easier overland communication.", "isCorrect": true, "rationale": "The text explicitly states that 'broad coastal plains—especially in Latium (central west) and Campania (south)—that permitted larger agricultural communities and easier overland communication,' contrasting it with Greece's 'mountains carved the land into dozens of isolated pockets.'"}, {"text": "Italy's geography was primarily maritime, leading to a strong naval tradition from its inception.", "isCorrect": false, "rationale": "The text compares Italy to Greece, noting that 'Geography helped make Rome an overland empire; geography helped make Athens a maritime empire,' indicating Rome's advantage was primarily overland."}, {"text": "The Italian peninsula was entirely isolated by mountains, preventing external invasions.", "isCorrect": false, "rationale": "While the Apennines are a central spine, the text emphasizes broad coastal plains and ease of communication, not total isolation. The mountains provided defense for specific cities like Rome, but not the entire peninsula's isolation."}]}, {"question": "Analyzing Rome's specific location on seven hills along the Tiber River, what primary advantage did this site offer for the city's early development?", "options": [{"text": "Exclusive access to a deep-water port, making it a powerful maritime trading hub.", "isCorrect": false, "rationale": "The text states Rome was 'approximately fifteen miles from the sea,' not directly on a deep-water port, and its geographic advantage leaned towards overland communication rather than purely maritime trade."}, {"text": "A complete lack of agricultural land, forcing the Romans to rely entirely on trade.", "isCorrect": false, "rationale": "The text mentions 'broad coastal plains—especially in Latium' and the 'Po River valley in the north was one of the most fertile agricultural regions,' indicating significant agricultural capacity."}, {"text": "Natural defense from the hills, fresh water and trade routes via the Tiber, and access to building materials.", "isCorrect": true, "rationale": "The text states 'the hills provided natural defense; the river provided fresh water, a ford for overland trade routes, and access to the sea. The nearby volcanic hills... produced the dark, hard volcanic rock (tufa) from which early Rome built its walls.'"}, {"text": "Year-round snowmelt from the Apennines providing constant irrigation for all crops.", "isCorrect": false, "rationale": "The text mentions the Apennines but does not attribute year-round snowmelt irrigation as a specific advantage for Rome's immediate location or the peninsula's agricultural success."}]}, {"question": "The Roman road network, exemplified by the Via Appia, served multiple crucial functions for the Republic and later Empire. Which option best synthesizes these functions beyond mere transportation?", "options": [{"text": "Primarily for ceremonial parades and showcasing Roman engineering prowess, with limited practical use.", "isCorrect": false, "rationale": "While roads did showcase engineering, the text highlights their practical 'military, commercial, and political functions simultaneously,' indicating much more than ceremonial use."}, {"text": "Solely for rapid military deployment, with commercial and political uses being incidental.", "isCorrect": false, "rationale": "The text specifies 'military, commercial, and political functions simultaneously,' and notes their importance 'far beyond their original military purpose' for trade and governance."}, {"text": "As instruments of unity for military control, commercial exchange, political administration, and later, the spread of new ideologies.", "isCorrect": true, "rationale": "The text states roads 'served military, commercial, and political functions simultaneously' and then explicitly mentions their later use for 'Paul's missionary journeys' and Charlemagne's administration, encompassing the spread of new ideologies."}, {"text": "Exclusively for linking coastal cities, making inland travel difficult and rare.", "isCorrect": false, "rationale": "The Via Appia linked Rome (inland from the sea) to Capua and Brundisium (coastal), and the broader network connected a vast overland territory, disproving the idea of only coastal linkages."}]}, {"question": "The phrase 'Senatus Populusque Romanus' (SPQR) encapsulated the Roman political ideal. How did this ideal compare to the practical reality of Roman governance, according to the text?", "options": [{"text": "The ideal perfectly reflected the reality, where the Senate and the Roman people always held equal power.", "isCorrect": false, "rationale": "The text states 'In practice, the Senate dominated,' directly contradicting the idea of equal power, though the ideal acknowledged the people's share."}, {"text": "The ideal presented a shared authority, but in practice, the aristocratic Senate largely held the dominant power.", "isCorrect": true, "rationale": "The text clearly states the phrase 'encapsulates the Roman political ideal: authority shared between the aristocratic Senate and the citizen body' but then clarifies, 'In practice, the Senate dominated.'"}, {"text": "The ideal was purely symbolic with no actual impact on the distribution of power.", "isCorrect": false, "rationale": "The text notes that the ideal was an 'acknowledgment that the Twelve Tables and the tribunate had made real,' implying it did have some practical impact, even if the Senate dominated."}, {"text": "The ideal signified the absolute rule of the Roman people, with the Senate serving merely as an advisory body.", "isCorrect": false, "rationale": "The ideal was 'authority shared,' not 'absolute rule of the people,' and the Senate's dominance in practice further refutes this option."}]}, {"question": "Consider the comparison between the Roman Senate and the Athenian Assembly. If a major foreign policy decision, like going to war, needed to be made, what would be a key difference in the decision-making process based on the characteristics provided?", "options": [{"text": "The Roman Senate would debate openly with all citizens present and then vote by show of hands.", "isCorrect": false, "rationale": "This describes the Athenian Assembly's process: 'votes directly by show of hands after open debate (anyone may speak).' The Senate involved 'experienced former officials only; no one under forty may speak first.'"}, {"text": "The Athenian Assembly would rely on experienced former magistrates to reach a recommendation before a public vote.", "isCorrect": false, "rationale": "This describes the Roman Senate's process ('experienced former officials only; no one under forty may speak first') rather than the Athenian Assembly's direct democracy."}, {"text": "The Roman Senate would deliberate among a body of experienced former officials, while the Athenian Assembly would involve direct voting by all eligible citizens after open debate.", "isCorrect": true, "rationale": "The text specifies for the Senate 'experienced former officials only' and for the Assembly 'votes directly by show of hands after open debate (anyone may speak),' accurately capturing the key difference."}, {"text": "Both the Roman Senate and the Athenian Assembly would follow the exact same procedure, as they were both republican forms of governance.", "isCorrect": false, "rationale": "The text highlights 'two fundamentally different visions of republican governance' and details distinct processes for each, disproving their identical procedures."}]}, {"question": "The *cursus honorum* in Rome required aspiring politicians to hold offices in a specific sequence (quaestor, aedile, praetor, consul) with age requirements. What was the underlying purpose of this system, according to the text?", "options": [{"text": "To allow ambitious individuals to quickly rise to power, bypassing less important roles.", "isCorrect": false, "rationale": "The text states the *cursus* was 'designed to ensure that no one reached the consulship without having managed finances (quaestor), public works (aedile), and the courts (praetor) first,' directly opposing the idea of quickly bypassing roles."}, {"text": "To ensure leaders gained necessary experience and prevented ambition without practical knowledge from reaching high office.", "isCorrect": true, "rationale": "The text explains, 'Rome had learned (or tried to learn) that ambition without experience is dangerous. The cursus was designed to ensure that no one reached the consulship without having managed finances... public works... and the courts first.'"}, {"text": "To primarily limit the number of people who could hold political office to a select few, regardless of experience.", "isCorrect": false, "rationale": "While it did regulate who could hold office, the emphasis was on *experience* and a sequential path, not just arbitrary limitation. The core purpose was about competence."}, {"text": "To allow for continuous, rapid turnover of leaders, bringing fresh perspectives to every office.", "isCorrect": false, "rationale": "The system included mandatory gaps between offices and age requirements, which would slow down, rather than rapidly turn over, leaders, fostering continuity through experience."}]}, {"question": "The 'then and now' section compares Roman roads to modern infrastructure like the internet. What is highlighted as a key characteristic that makes roads a 'more durable form of connection' than sea routes?", "options": [{"text": "Roads are more susceptible to political change and natural disasters.", "isCorrect": false, "rationale": "The text states roads 'maintain their utility through political change' and 'outlasted the Roman Empire by centuries,' directly contradicting this option."}, {"text": "Sea routes are limited by naval power, while roads can be walked and maintain utility through political change.", "isCorrect": true, "rationale": "The text explicitly states: 'Sea routes depend on weather and naval power; roads can be walked and maintain their utility through political change.'"}, {"text": "Roads were exclusively built for military purposes and thus were maintained more rigorously.", "isCorrect": false, "rationale": "While roads had a military purpose, the text emphasizes they also served commercial and political functions and maintained utility beyond their original intent and political changes, not just military maintenance."}, {"text": "Only sea routes allowed for rapid communication across vast distances in the ancient world.", "isCorrect": false, "rationale": "The text states Rome's road network 'connected a territory of hundreds of thousands of square miles with a speed of communication impossible by sea alone,' refuting this."}]}, {"question": "The text notes that Rome's expansion 'accelerated dramatically once Rome had conquered its immediate neighbors.' Based on the information about Rome's advantages, what would be the most likely reason for this acceleration?", "options": [{"text": "Rome's initial conquests provided them with access to new technologies previously unknown to them.", "isCorrect": false, "rationale": "The text does not mention new technologies gained from neighbors as a primary driver for accelerated expansion. Instead, it focuses on geographic and institutional advantages."}, {"text": "Gaining control of regions like Sicily, North Africa, and Spain provided Rome with more resources, manpower, and strategic bases for further conquest.", "isCorrect": true, "rationale": "The 'note' explicitly asks, 'What does gaining control of Sicily, North Africa, and Spain after the Punic Wars add to Rome's capacity for further conquest?' implying these regions provided additional capacity (resources, manpower, bases)."}, {"text": "The Roman army became less disciplined, leading to more reckless and rapid expansion.", "isCorrect": false, "rationale": "The text provides no information to suggest the Roman army became less disciplined; Roman military success was usually attributed to discipline and organization."}, {"text": "The Romans simply ran out of local neighbors to conquer and had to expand overseas.", "isCorrect": false, "rationale": "While they did expand overseas, the question asks why expansion *accelerated*, not just why they changed direction. The implication is an increased *capacity* for conquest."}]}, {"question": "According to Procopius, what was a remarkable enduring quality of the Via Appia?", "options": [{"text": "It was made of a unique flexible material that allowed it to curve around mountains.", "isCorrect": false, "rationale": "Procopius states it 'remains perfectly straight all the way to Capua,' contradicting the idea of curving around mountains. He also mentions 'hard stone,' not flexible material."}, {"text": "Its exceptional width, allowing three wagons to pass easily in opposite directions.", "isCorrect": false, "rationale": "Procopius says it was 'wide enough for two wagons going in opposite directions to pass each other easily,' not three."}, {"text": "Its resistance to damage from time, rain, and heat, maintaining its perfect condition for centuries.", "isCorrect": true, "rationale": "Procopius marvels, 'for neither in the long course of time, nor in the rains, nor in the heat of summer has it suffered any damage,' directly supporting this option."}, {"text": "It was primarily built for pedestrian traffic, contributing to its longevity.", "isCorrect": false, "rationale": "Procopius explicitly mentions its width for 'two wagons going in opposite directions,' indicating its primary purpose was for wheeled traffic, not just pedestrians."}]}, {"question": "Which statement accurately reflects the main takeaway from comparing the Roman Senate and the Athenian Assembly, according to the 'then and now' section?", "options": [{"text": "The Athenian Assembly was unequivocally superior because it produced philosophy and art, while the Roman Senate only produced law.", "isCorrect": false, "rationale": "The text explicitly states, 'Neither system was simply better; Athens produced philosophy and art; Rome produced law and empire,' disproving a simple 'superiority' claim."}, {"text": "Both systems were flawed and ultimately failed to govern effectively in the long run.", "isCorrect": false, "rationale": "The text discusses their strengths (Athens: dynamic, creative; Rome: stability, continuity) and weaknesses (Athens: sometimes reckless; Senate: slower to adapt), but doesn't conclude both were outright failures, rather that they represent different approaches to 'who should govern?'"}, {"text": "They represent two distinct philosophies of governance – direct democracy versus aristocratic experience – each with unique strengths and weaknesses.", "isCorrect": true, "rationale": "The text concludes, 'The Roman Senate and the Athenian Assembly represent two fundamentally different visions of republican governance... Neither system was simply better,' highlighting their distinct philosophies and 'strengths and weaknesses.'"}, {"text": "The Roman Senate was better because its stability led to empire, while the Athenian Assembly's recklessness led to its downfall.", "isCorrect": false, "rationale": "While the text mentions the Senate's stability and the Assembly's occasional recklessness, it avoids declaring one 'better' than the other, stating 'Neither system was simply better.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
