        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Roman origin stories of Romulus & Remus and Aeneas, though partly legendary, served a crucial purpose for Roman identity. Which statement best analyzes their combined significance?", "options": [{"text": "They exclusively emphasized Rome's military prowess and the glory of individual heroes in battle.", "isCorrect": false, "rationale": "While Romulus was a founder and Aeneas a warrior, the stories also deeply emphasized civic virtues like pietas (duty), endurance, and divine destiny, not just individual military glory."}, {"text": "They asserted Rome's divine destiny and rooted its civilization in core values like pietas, endurance, and honor for ancestors.", "isCorrect": true, "rationale": "The Aeneas legend explicitly linked Rome to divine destiny and highlighted pietas, endurance, and carrying one's fathers (ancestral honor). The Romulus story established Rome's founding by a demigod, reinforcing its unique place."}, {"text": "They served primarily as entertainment, with little impact on Roman political thought or moral codes.", "isCorrect": false, "rationale": "The text explicitly states these stories revealed 'what Rome stood for' and were preserved because 'the values they teach are real,' making them far more than mere entertainment."}, {"text": "They provided precise historical accounts of early Roman events, free from embellishment or mythological elements.", "isCorrect": false, "rationale": "The text clearly states that 'Even educated Romans knew these founding stories were partly legendary,' indicating they were not taken as precise historical accounts."}]}, {"question": "What was the immediate and primary catalyst for the Roman people's decision to overthrow the monarchy and establish a republic in 509 BC?", "options": [{"text": "A widespread famine that led to economic collapse and public unrest against the king.", "isCorrect": false, "rationale": "The text does not mention famine or economic collapse as the reason for the overthrow of the monarchy. The catalyst was a specific act of tyranny and dishonor."}, {"text": "The military defeat of King Tarquin the Proud by a coalition of neighboring Latin cities.", "isCorrect": false, "rationale": "While kings like Tullus Hostilius were warlike, the text does not state that Tarquin's downfall was due to military defeat but rather internal rebellion triggered by his son's actions."}, {"text": "The tyranny of Tarquinius Superbus and the outrage caused by his son Sextus's violation of Lucretia.", "isCorrect": true, "rationale": "Tarquinius Superbus's tyrannical rule, culminating in his son's violation of Lucretia and her subsequent suicide, directly led to Lucius Junius Brutus rallying the people and expelling the kings."}, {"text": "A philosophical movement advocating for democratic governance inspired by Greek city-states.", "isCorrect": false, "rationale": "The text attributes the change to a specific incident of injustice and tyranny, not a broad philosophical movement or external influence."}]}, {"question": "Consider a scenario where a newly elected consul attempts to implement a policy that a Tribune of the Plebs believes is detrimental to the common citizens. What action could the Tribune take, and what power would underpin it?", "options": [{"text": "The Tribune could demand a vote by the Senate to impeach the consul, requiring a simple majority.", "isCorrect": false, "rationale": "Tribunes did not have the power to impeach magistrates through Senate votes. Their power was a direct veto."}, {"text": "The Tribune could exercise their right of intercessio, effectively vetoing the consul's decision, making it legally unenforceable.", "isCorrect": true, "rationale": "Tribunes of the Plebs were legally sacrosanct and possessed the power of intercessio (veto) to block any magistrate's action that affected a plebeian citizen, acting as a 'shield against the abuse of power.'"}, {"text": "The Tribune could unilaterally dismiss the consul from office, as Tribunes held supreme imperium over other magistrates.", "isCorrect": false, "rationale": "Tribunes did not hold supreme imperium; consuls held imperium. Tribunes had the power to veto, not to dismiss other magistrates."}, {"text": "The Tribune could appeal directly to the dictator, who would have the final say on the consul's policy.", "isCorrect": false, "rationale": "A dictator was only appointed in military emergencies and for a maximum of six months. Appealing to a dictator was not the regular function of a Tribune addressing a consul's policy."}]}, {"question": "The promulgation of the Twelve Tables in 451–450 BC was a landmark achievement for the plebeians in their struggle against the patricians. What was its most significant impact?", "options": [{"text": "It granted all Roman plebeians the right to serve as consuls and senators.", "isCorrect": false, "rationale": "The Licinian-Sextian Laws later opened the consulship, but the Twelve Tables primarily addressed the transparency and accountability of law, not direct access to all offices."}, {"text": "It established a completely egalitarian society where all citizens had equal wealth and status.", "isCorrect": false, "rationale": "The Twelve Tables did not aim to create an egalitarian society in terms of wealth or status; it aimed for legal equality and accountability, which was a step towards political equality, not total social equality."}, {"text": "It made Roman law public, written, and knowable, thereby limiting the arbitrary power of patrician judges.", "isCorrect": true, "rationale": "Before the Twelve Tables, law was unwritten and controlled by patricians. Writing it down and displaying it publicly ensured 'accountability' and made the law 'binding on rich and poor alike,' reducing selective application."}, {"text": "It immediately abolished the institution of slavery throughout Roman territory.", "isCorrect": false, "rationale": "The text does not mention the Twelve Tables addressing slavery. Its focus was on the legal framework for free citizens and limiting patrician power over the law."}]}, {"question": "Which of the following Roman virtues best describes Aeneas's character, as depicted when he carries his father and household gods from burning Troy, subordinating his personal desires to his obligations?", "options": [{"text": "Virtus", "isCorrect": false, "rationale": "While Aeneas shows courage (a component of virtus), the act of prioritizing family, gods, and destiny over personal safety and desire is the direct definition of pietas."}, {"text": "Gravitas", "isCorrect": false, "rationale": "Gravitas refers to seriousness and dignity, appropriate for public responsibility. While Aeneas might possess it, it doesn't specifically describe the act of dutiful devotion to family and gods."}, {"text": "Pietas", "isCorrect": true, "rationale": "Pietas is defined as 'dutiful devotion—to the gods, to family, and to the state.' Aeneas is explicitly called 'pius Aeneas' in Virgil's epic because he subordinates his personal desires to these obligations."}, {"text": "Levitas", "isCorrect": false, "rationale": "Levitas, meaning frivolity, is the opposite of a Roman virtue and certainly not descriptive of Aeneas's actions."}]}, {"question": "According to the section, what quality did the historian Livy possess that modern historians highly value in a historical source?", "options": [{"text": "His ability to vividly embellish legends to make them more engaging for readers.", "isCorrect": false, "rationale": "While ancient historians often included dramatic elements, Livy's valued virtue was his honesty about what he knew, not his embellishment of legends."}, {"text": "His admission of uncertainty when historical facts were unclear, rather than claiming definitive knowledge.", "isCorrect": true, "rationale": "The note explicitly highlights Livy's 'honest uncertainty' and states that 'a source that admits its own limits is often more trustworthy than one that claims to know everything,' a quality 'modern historians value highly.'"}, {"text": "His unwavering belief in the divine destiny of Rome, which shaped his entire narrative.", "isCorrect": false, "rationale": "While Virgil (the poet) argued for divine destiny, Livy's noted virtue was his critical approach to historical details, even when discussing foundational legends."}, {"text": "His exclusive reliance on primary military reports and official state documents for his historical accounts.", "isCorrect": false, "rationale": "Livy clearly incorporates legends and traditions; the note discusses his uncertainty regarding the Senate's origins, not his exclusive reliance on specific document types."}]}, {"question": "The 'Conflict of the Orders' between patricians and plebeians saw plebeians using various methods to gain political rights. Which of these was their most powerful and direct weapon for forcing concessions from the patricians?", "options": [{"text": "Public debates and philosophical arguments in the Roman Forum.", "isCorrect": false, "rationale": "While debates might have occurred, the text identifies a more impactful and direct method of protest used by the plebeians to achieve their aims."}, {"text": "Assassination of prominent patrician leaders and magistrates.", "isCorrect": false, "rationale": "The text describes peaceful, albeit forceful, methods of protest, not violence or assassination, as the plebeians' weapon."}, {"text": "The secession, where plebeian soldiers would leave Rome and refuse to fight.", "isCorrect": true, "rationale": "The text states, 'The plebeians' most powerful weapon was the secession: in 494 BC, the plebeian soldiers simply walked out of Rome and refused to fight until the patricians created the office of tribune.'"}, {"text": "Appealing to neighboring kings for military intervention on their behalf.", "isCorrect": false, "rationale": "The conflict was internal to Rome, and the plebeians' power came from their withdrawal of service, not external alliances or intervention."}]}, {"question": "The Roman 'Cursus Honorum' was a structured sequence of offices. What was its primary purpose in the Roman Republic?", "options": [{"text": "To allow for the immediate ascension of highly popular individuals to the highest offices regardless of experience.", "isCorrect": false, "rationale": "The Cursus Honorum was designed with minimum age requirements and waiting periods precisely to prevent rapid, inexperienced ascension and ensure tested leadership."}, {"text": "To ensure that Roman leaders were experienced and tested in various responsibilities before reaching the highest offices.", "isCorrect": true, "rationale": "The definition states this system 'ensured that Rome's leaders were tested and experienced before reaching the highest office,' by requiring service in a specific sequence of roles."}, {"text": "To restrict public office solely to members of the hereditary patrician class.", "isCorrect": false, "rationale": "While initially dominated by patricians, the Conflict of the Orders gradually opened offices to plebeians. The Cursus Honorum was about the *sequence* of offices, not exclusively about class access in its later form."}, {"text": "To manage the annual election process for all citizens, including those without political ambitions.", "isCorrect": false, "rationale": "The Cursus Honorum specifically applied to noblemen seeking political careers, not to the general election process for all citizens."}]}, {"question": "Polybius and Cicero admired Rome's 'mixed constitution' and attributed its longevity to this structure. Which statement best describes how this balance of power functioned?", "options": [{"text": "It established a single, all-powerful emperor who could make decisions quickly and efficiently.", "isCorrect": false, "rationale": "The mixed constitution was explicitly designed to prevent any single person from seizing permanent power, contrasting with monarchy or later emperors."}, {"text": "It relied solely on the wisdom of the Senate to govern, with other institutions playing minor roles.", "isCorrect": false, "rationale": "The text notes the Senate's moral weight but stresses the 'balance' of powers, where the Senate provided 'stability and experience' but consuls provided 'executive energy' and tribunes 'protected ordinary citizens.'"}, {"text": "It distributed power among the stable Senate, energetic consuls, and protective tribunes, preventing any one part from dominating.", "isCorrect": true, "rationale": "The text explicitly states that 'By this point, Rome had achieved a genuinely mixed constitution: the Senate provided stability and experience; the consuls provided executive energy; the tribunes protected ordinary citizens. This balance of powers explained why Rome had lasted.'"}, {"text": "It gave absolute authority to the plebeian assembly, ensuring direct democracy in all matters.", "isCorrect": false, "rationale": "While the Lex Hortensia made plebeian assembly resolutions binding, the mixed constitution involved a balance with the Senate and consuls, not absolute authority for the plebeian assembly."}]}, {"question": "Rome's policy of offering 'Latin rights' or full citizenship to many defeated cities after the Battle of the Latin Way (338 BC) exemplified a strategic approach to expansion. This policy is best characterized as:", "options": [{"text": "Complete subjugation and enslavement of all conquered populations.", "isCorrect": false, "rationale": "The text explicitly states 'This policy of incorporation rather than enslavement' showing this option is incorrect."}, {"text": "A strategy of militarization, forcing all defeated cities to contribute soldiers to the Roman legions.", "isCorrect": false, "rationale": "While military contribution might have been part of the deal, the core policy described is about political integration and rights, not solely military conscription."}, {"text": "A policy of isolation, where conquered cities were left to govern themselves without Roman interference.", "isCorrect": false, "rationale": "Offering Latin rights or citizenship implies significant Roman interference and integration, not isolation."}, {"text": "A policy of incorporation, integrating conquered peoples into the Roman system through various levels of citizenship.", "isCorrect": true, "rationale": "The text directly states, 'This policy of incorporation rather than enslavement gave conquered peoples a…' and details the offering of Latin rights or full citizenship, fitting this description perfectly."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
