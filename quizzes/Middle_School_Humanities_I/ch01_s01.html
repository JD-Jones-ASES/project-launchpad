<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was a defining characteristic of the Mycenaean civilization, and what was a significant consequence of the Bronze Age Collapse in Greece?", "options": [{"text": "Mycenaeans were known for their democratic governance; the collapse led to a golden age of literature.", "isCorrect": false, "rationale": "The Mycenaeans were a warrior culture, not democratic, and the Bronze Age Collapse led to a 'Dark Age' of reduced population and lost literacy, not a golden age."}, {"text": "Mycenaeans were characterized by massive stone fortresses and extensive seafaring trade; the collapse resulted in a period of lost literacy and fragmented communities.", "isCorrect": true, "rationale": "The text states Mycenaeans built 'massive stone fortresses' and 'traded across the eastern Mediterranean.' The Bronze Age Collapse led to 'lost literacy, and fragmented communities' during the Greek Dark Age."}, {"text": "Mycenaeans were famous for their philosophical schools; the collapse resulted in the immediate rise of Athenian democracy.", "isCorrect": false, "rationale": "Mycenaean civilization predates Greek philosophy, and Athenian democracy emerged centuries after the Bronze Age Collapse."}, {"text": "Mycenaeans were defined by a unified Greek empire; the collapse immediately led to the establishment of the Olympic Games.", "isCorrect": false, "rationale": "The Mycenaeans dominated the peninsula but did not form a unified empire, and the Olympic Games were established centuries after the Bronze Age Collapse."}], "id": "q01"}, {"question": "The intensely mountainous geography and numerous islands of the Greek peninsula most significantly contributed to which unique development in ancient Greek political organization?", "options": [{"text": "The creation of a unified Greek empire under a single ruler.", "isCorrect": false, "rationale": "The text explicitly states that geographic barriers 'made communication difficult and unity unlikely,' hindering the formation of a single empire."}, {"text": "The emergence of independent, self-governing city-states (poleis).", "isCorrect": true, "rationale": "The text explains that 'These geographic barriers made communication difficult and unity unlikely. Every valley tended to develop its own identity,' leading to the development of city-states (poleis)."}, {"text": "The establishment of a powerful naval federation led by Athens.", "isCorrect": false, "rationale": "While such a federation existed later, the fundamental geographic influence was on the *initial* development of independent poleis, not a unified federation."}, {"text": "A cultural emphasis on nomadic lifestyles and constant migration.", "isCorrect": false, "rationale": "The Greeks settled and formed distinct communities, not nomadic ones, based on their geography."}], "id": "q02"}, {"question": "Consider the descriptions of Athens and Sparta. Which statement best analyzes how their geographic and economic situations shaped their differing societal models?", "options": [{"text": "Sparta's fertile inland valley fostered trade and arts, while Athens' natural harbor led to military dominance.", "isCorrect": false, "rationale": "This reverses the roles; Athens thrived on trade, and Sparta was a military state, located inland."}, {"text": "Athens' reliance on sea trade through its superb natural harbor cultivated a society valuing commerce, culture, and debate, contrasting with Sparta's inland agricultural base that necessitated a strong military to control its enslaved helot population.", "isCorrect": true, "rationale": "The text notes Athens 'thrived on sea trade' and valued 'education, debate, and the arts,' while Sparta was 'located inland' and became a 'military state' due to the need to control the 'outnumbered' helots."}, {"text": "Both cities primarily focused on military expansion, but Athens achieved it through democratic means, and Sparta through tyranny.", "isCorrect": false, "rationale": "Athens was known for commerce and culture, not primarily military expansion, and Sparta's system was focused on citizen-soldiers, not tyranny in the usual sense."}, {"text": "Athens' mountainous terrain fostered isolated philosophical schools, while Sparta's coastal location led to extensive colonization.", "isCorrect": false, "rationale": "Athens was coastal, Sparta inland. Neither city's primary focus was as described."}], "id": "q03"}, {"question": "Upon turning seven, a Spartan boy would typically experience which of the following significant life changes, as described in the text?", "options": [{"text": "He would begin attending public debates in the agora to learn civic duties.", "isCorrect": false, "rationale": "This describes Athenian civic life, not Spartan military training."}, {"text": "He would be removed from his family and enter a state-run military training system called the agoge.", "isCorrect": true, "rationale": "The text states: 'Spartan boys left their families at age seven to begin military training in a system called the agoge.'"}, {"text": "He would be eligible to serve in the Athenian citizen assembly.", "isCorrect": false, "rationale": "This refers to Athenian citizenship and age requirements, not Spartan boyhood."}, {"text": "He would start an apprenticeship in a specialized craft or trade.", "isCorrect": false, "rationale": "Spartan society was primarily focused on military training for its male citizens, not crafts or trades at this age."}], "id": "q04"}, {"question": "How did Solon's legal reforms represent a fundamental improvement over Draco's, particularly concerning social justice in Athens?", "options": [{"text": "Draco focused on oral traditions, while Solon introduced written laws.", "isCorrect": false, "rationale": "Draco was the first to introduce written law, making the rules public, even if harsh."}, {"text": "Solon made laws harsher to ensure stability, while Draco sought to alleviate debt through compassion.", "isCorrect": false, "rationale": "This reverses their contributions; Draco's laws were 'legendarily harsh,' while Solon canceled debt slavery."}, {"text": "Solon abolished debt slavery and reorganized society by wealth rather than birth alone, directly addressing the economic inequality and social crisis that Draco's harsh written laws had not resolved.", "isCorrect": true, "rationale": "The text highlights Solon's 'remarkable' action to 'canceled all debt slavery' and 'reorganized Athenian society into four classes based on wealth rather than birth alone,' which directly addressed the issues Draco's harsh laws failed to fix."}, {"text": "Draco established democratic institutions, while Solon favored aristocratic rule.", "isCorrect": false, "rationale": "Draco's laws predated democratic institutions, and Solon laid the 'groundwork for what would eventually become Athenian democracy.'"}], "id": "q05"}, {"question": "Which of Solon's reforms most directly addressed the underlying crisis of social inequality and potential rebellion caused by economic hardship among Athenian citizens?", "options": [{"text": "The creation of Athens' first written law code.", "isCorrect": false, "rationale": "Draco created the first written law code, not Solon, and while important for clarity, it didn't directly address debt slavery or economic inequality."}, {"text": "Reorganizing society into four classes based on birthright.", "isCorrect": false, "rationale": "Solon reorganized society into four classes based on *wealth*, not solely birthright, and this was secondary to the direct relief provided by canceling debt slavery."}, {"text": "The cancellation of all debt slavery and the freeing of those enslaved for debt.", "isCorrect": true, "rationale": "The text states the crisis was that 'Poor farmers fell into debt; those who could not repay their debts became debt slaves.' Solon's act to 'canceled all debt slavery' and freed those enslaved directly solved this core problem."}, {"text": "Establishing the principle of *isonomia* (equality before the law).", "isCorrect": false, "rationale": "The principle of *isonomia* was introduced later by Cleisthenes, not Solon."}], "id": "q06"}, {"question": "The ancient Olympic Games, including the suspension of all warfare between Greek city-states, primarily reflect what aspect of ancient Greek culture?", "options": [{"text": "A pragmatic strategy to conserve resources during peacetime.", "isCorrect": false, "rationale": "While a practical outcome, the text emphasizes the cultural and religious significance rather than a purely strategic one."}, {"text": "The dominance of a unified political authority enforcing peace.", "isCorrect": false, "rationale": "The Greek city-states were 'fierce independence from one another,' indicating no single dominant political authority."}, {"text": "The shared religious identity, common gods, and cultural values that transcended political rivalries.", "isCorrect": true, "rationale": "The text states, 'the Greek city-states shared a common language, common gods, and common sacred sites,' and the Games were 'held every four years in honor of Zeus,' with the suspension of warfare being 'a remarkable testament to the power of religious shared culture.'"}, {"text": "An early form of international diplomacy centered on economic alliances.", "isCorrect": false, "rationale": "The primary focus was religious and athletic competition, not economic or political diplomacy."}], "id": "q07"}, {"question": "Thales of Miletus is regarded as a pivotal figure in the history of philosophy and science because he was the first to:", "options": [{"text": "Record a comprehensive history of the Trojan War.", "isCorrect": false, "rationale": "Homer is associated with the Trojan War, not Thales."}, {"text": "Propose explanations for natural phenomena that appealed solely to the will of the gods.", "isCorrect": false, "rationale": "The text explicitly states Thales 'tried to explain natural phenomena... without appealing to the gods.'"}, {"text": "Seek rational explanations for natural phenomena based on observable principles, rather than mythological accounts.", "isCorrect": true, "rationale": "The text highlights his innovation as 'he tried to explain natural phenomena... without appealing to the gods,' marking the beginning of 'natural philosophy' and the search for 'rational explanations'."}, {"text": "Establish a system of democratic governance in Miletus.", "isCorrect": false, "rationale": "Thales' contribution was intellectual, not political in establishing governance."}], "id": "q08"}, {"question": "The text states that the Greek Dark Age was characterized by 'reduced population, lost literacy, and fragmented communities.' Which event preceding this period most directly led to the 'lost literacy'?", "options": [{"text": "The development of the polis as the basic unit of Greek political life.", "isCorrect": false, "rationale": "The polis emerged *out of* the Dark Age, it did not cause the Dark Age's characteristics."}, {"text": "The destruction of the city of Troy by Mycenaean warriors.", "isCorrect": false, "rationale": "While a Mycenaean-era conflict, the destruction of Troy is not identified as the cause for widespread loss of literacy across Greece."}, {"text": "The collapse of the Mycenaean world, which included the forgetting of the Linear B writing system.", "isCorrect": true, "rationale": "The text states, 'The Mycenaean world... collapsed... The writing system [Linear B] was forgotten,' directly linking the collapse to the loss of literacy that defines the Dark Age."}, {"text": "Solon's reforms, which focused on debt relief rather than education.", "isCorrect": false, "rationale": "Solon lived centuries after the Dark Age and his reforms are unrelated to the loss of literacy during that earlier period."}], "id": "q09"}, {"question": "Imagine an ancient Greek settlement that mints its own coins, fields its own army, has its own unique set of laws, and centers around a fortified hill, controlling the surrounding farmlands. This description best fits the definition of which of the following?", "options": [{"text": "A Mycenaean fortress.", "isCorrect": false, "rationale": "While Mycenaeans built fortresses, the description of 'own laws, its own army, its own coins' and 'self-governing community' goes beyond just a fortress and defines a polis."}, {"text": "An Aegean trade outpost.", "isCorrect": false, "rationale": "A trade outpost is too specific to commerce and does not fully encompass the political, social, and military self-governance described."}, {"text": "A polis, or city-state.", "isCorrect": true, "rationale": "The text defines a polis as 'a self-governing community consisting of an urban center—usually built around a fortified hilltop called an acropolis—plus the surrounding farmland... Each polis had its own laws, its own army, its own coins.'"}, {"text": "A temple complex dedicated to Zeus.", "isCorrect": false, "rationale": "A temple complex is a religious site, not a self-governing political and social entity with its own army and laws."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
