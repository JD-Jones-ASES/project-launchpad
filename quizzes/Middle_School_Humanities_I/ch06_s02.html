        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities I &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Augustine's *Confessions* introduced a new literary form distinct from classical histories or biographies. Which of the following best describes this innovation?", "options": [{"text": "A comprehensive historical chronicle of the Roman Empire's decline.", "isCorrect": false, "rationale": "Classical authors like Herodotus and Thucydides wrote historical chronicles, but Augustine's work was deeply personal and philosophical, not primarily a historical account of the Empire."}, {"text": "A philosophical autobiography that is simultaneously a prayer and a confession of personal sin.", "isCorrect": true, "rationale": "The text explicitly states that *Confessions* is 'simultaneously a prayer addressed to God, a confession of personal sin, and a philosophical autobiography tracing the shape of a single human soul's journey toward truth,' creating a new form of writing."}, {"text": "A political commentary arguing for the separation of church and state.", "isCorrect": false, "rationale": "While Augustine's later work *The City of God* touched on political themes, *Confessions* is primarily a personal and spiritual reflection, not a political commentary."}, {"text": "A collection of sermons and theological treatises for widespread distribution.", "isCorrect": false, "rationale": "Augustine did write volumes of theology and sermons as bishop, but *Confessions* is described as a unique, personal literary form, distinct from a typical collection of sermons."}], "id": "q01"}, {"question": "Despite their different approaches (theology vs. philosophy), Augustine and Boethius converge on a fundamental point about enduring collapse. What is it?", "options": [{"text": "The importance of re-establishing a strong political and military power.", "isCorrect": false, "rationale": "Both authors focused on internal, spiritual, or philosophical strength, not external political or military solutions, as the true anchor during collapse."}, {"text": "The necessity of preserving classical pagan wisdom and rituals.", "isCorrect": false, "rationale": "While Boethius worked to preserve classical philosophy, their shared message wasn't about pagan rituals, but about what *truly* endures, which for Augustine was Christian faith and for Boethius, virtue and wisdom."}, {"text": "That the only real goods are those which cannot be taken away, such as virtue, wisdom, and (for Augustine) God.", "isCorrect": true, "rationale": "The text explicitly states they 'converge on the same fundamental point: the things that can be taken from you were never truly yours. The things that cannot be taken — virtue, wisdom, and (for Augustine) God himself — are the only real goods.'"}, {"text": "The belief that human destiny is predetermined by an unchangeable fate.", "isCorrect": false, "rationale": "Boethius debates the question of fate, but their convergence is on the nature of 'real goods' that transcend fortune, rather than a resignation to fate."}], "id": "q02"}, {"question": "What pivotal event in Milan marked a significant turning point in Augustine's intellectual and spiritual journey toward Christianity?", "options": [{"text": "He successfully debated and defeated the leading Manichaean scholars.", "isCorrect": false, "rationale": "Augustine experimented with Manichaeism himself; his conversion involved moving away from it, not debating it at this specific point."}, {"text": "He was offered a prestigious position as a Roman Senator, which he declined.", "isCorrect": false, "rationale": "While he was ambitious in rhetoric, the text doesn't mention such a specific political offer during his conversion period."}, {"text": "He heard Bishop Ambrose preach and realized Christianity was intellectually respectable, followed by a conversion experience while reading Paul's letters.", "isCorrect": true, "rationale": "The text states that in Milan, 'he heard Bishop Ambrose preach — and discovered that Christianity was intellectually respectable... Second, reading the letters of Paul... he experienced a sudden conversion in a garden.'"}, {"text": "His mother, Monica, gave up on praying for his conversion after decades of effort.", "isCorrect": false, "rationale": "The text emphasizes Monica's persistent prayer for decades, which she continued until shortly after his conversion, not that she gave up."}], "id": "q03"}, {"question": "Augustine's opening line in *Confessions*, 'Thou madest us for Thyself, and our heart is restless, until it repose in Thee,' suggests what about the human condition?", "options": [{"text": "Human beings are fundamentally flawed and condemned to perpetual dissatisfaction.", "isCorrect": false, "rationale": "Augustine describes the restlessness not as a flaw, but as a 'built-in feature' designed to point humans toward their ultimate purpose, not condemn them."}, {"text": "True happiness can be found by pursuing worldly ambitions, fame, and pleasure.", "isCorrect": false, "rationale": "The text explicitly states that Augustine tried 'wealth, or fame, or pleasure, or philosophical certainty' but found them insufficient, confirming they do not lead to repose."}, {"text": "The inherent human longing and dissatisfaction is a natural indicator that humans are designed for a relationship with God.", "isCorrect": true, "rationale": "This aligns with the text's explanation that 'The restlessness Augustine describes is not a flaw but a built-in feature: it is the hunger that will not be satisfied by anything less than what it was designed for' – i.e., God."}, {"text": "Philosophical reasoning and intellectual inquiry are sufficient to achieve ultimate peace.", "isCorrect": false, "rationale": "Augustine pursued philosophical certainty but found it inadequate, indicating that intellectual inquiry alone does not bring the ultimate repose he sought."}], "id": "q04"}, {"question": "According to Augustine in *Confessions* Book X, what is sin at its most basic level?", "options": [{"text": "Ignorance of theological doctrines and scriptures.", "isCorrect": false, "rationale": "While ignorance can contribute to sin, Augustine's basic definition here is not about intellectual lack, but about misdirected love."}, {"text": "Breaking specific moral laws or commandments.", "isCorrect": false, "rationale": "This is a common understanding of sin, but Augustine presents a more fundamental concept in this section: the misdirection of love."}, {"text": "Searching for satisfaction in created things (the 'gifts') rather than in the Creator (the 'Giver').", "isCorrect": true, "rationale": "The text states: 'This is Augustine's account of sin at its most basic level: not merely breaking rules, but loving the gifts instead of the Giver.'"}, {"text": "Engaging in political activism against the Roman Empire.", "isCorrect": false, "rationale": "Augustine's definition of sin in *Confessions* is internal and spiritual, not primarily political rebellion."}], "id": "q05"}, {"question": "What was Augustine's primary motivation for writing *The City of God*?", "options": [{"text": "To provide a definitive history of the early Christian Church.", "isCorrect": false, "rationale": "While it covers history, the text explicitly states its purpose was a 'systematic refutation' of accusations, not a general history of the Church."}, {"text": "To systematically refute pagan critics who blamed Christianity for the Sack of Rome in AD 410.", "isCorrect": true, "rationale": "The text states: 'When Alaric sacked Rome in AD 410, pagan critics immediately blamed Christianity... Augustine spent thirteen years (AD 413–426) writing a systematic refutation: *The City of God*.'"}, {"text": "To establish a new, independent Christian empire in North Africa.", "isCorrect": false, "rationale": "Augustine's work distinguishes between earthly and heavenly cities; he does not advocate for a specific earthly Christian empire."}, {"text": "To document the theological debates he had with Manichaeans, Donatists, and Pelagians.", "isCorrect": false, "rationale": "He wrote extensively on these heresies, but *The City of God* specifically addresses the fall of Rome and the pagan accusations, not primarily these internal Christian debates."}], "id": "q06"}, {"question": "According to Augustine's *The City of God*, what is the fundamental distinction between the 'City of Man' and the 'City of God'?", "options": [{"text": "The City of Man refers exclusively to pagan societies, while the City of God refers to Christian nations.", "isCorrect": false, "rationale": "Augustine states that citizens of the City of God are 'mixed through history with the citizens of the City of Man,' meaning the distinction is not based purely on external religious affiliation or specific nations."}, {"text": "The City of Man is built on self-love (*amor sui*) and is temporal, while the City of God is built on love of God (*amor Dei*) and is eternal.", "isCorrect": true, "rationale": "The primary source quote explicitly states: 'two cities have been formed by two loves: the earthly by the love of self... the heavenly by the love of God...' and further explains the City of Man is 'temporal.'"}, {"text": "The City of Man represents political institutions, while the City of God represents religious institutions.", "isCorrect": false, "rationale": "While related, the distinction is more fundamental, rooted in ultimate loves and allegiances, not simply institutional structures. The Church itself on earth is not identical with the City of God."}, {"text": "The City of Man is inherently evil and doomed to destruction, while the City of God is perfectly good and will always flourish on earth.", "isCorrect": false, "rationale": "Augustine clarifies that the City of Man (e.g., Rome) was not 'evil' but 'temporal' and could achieve great things. The City of God is eternal and cannot be destroyed, but is 'intertwined' with the City of Man on earth, not always flourishing perfectly in a visible way."}], "id": "q07"}, {"question": "What significant lasting impact did Boethius's work have on medieval European intellectual life?", "options": [{"text": "He founded the first monastic order dedicated to preserving Christian scriptures.", "isCorrect": false, "rationale": "Augustine founded a monastic community, but Boethius's main intellectual project was different."}, {"text": "His original philosophical works replaced Aristotle and Plato as the dominant intellectual framework.", "isCorrect": false, "rationale": "His project was to *translate* Aristotle and Plato, enabling their continued influence, not to replace them with his own original philosophical systems."}, {"text": "His translations and commentaries on Aristotle's logical works became foundational textbooks for European universities for centuries.", "isCorrect": true, "rationale": "The text states: 'His translations and commentaries on Aristotle's logical works... were used as textbooks in European universities for seven hundred years. The medieval philosophical tradition... built directly on what Boethius had preserved.'"}, {"text": "He developed a new legal code that became the basis for governance in the Ostrogothic kingdom.", "isCorrect": false, "rationale": "He was chief minister but his noted lasting contribution focuses on philosophy and translation, not a new legal code."}], "id": "q08"}, {"question": "Under what personal circumstances did Boethius write *The Consolation of Philosophy*?", "options": [{"text": "While serving as chief minister, as a reflection on the successes of King Theodoric's reign.", "isCorrect": false, "rationale": "He wrote it *after* being accused of treason and imprisoned by Theodoric, not during his successful tenure as minister."}, {"text": "During a period of self-imposed exile, seeking spiritual renewal.", "isCorrect": false, "rationale": "He was imprisoned against his will, not in self-imposed exile."}, {"text": "While imprisoned under a sentence of death, debating the meaning of life with an allegorical figure.", "isCorrect": true, "rationale": "The text states he 'was imprisoned at Pavia. While awaiting execution, he wrote the *Consolation of Philosophy*... a dialogue... between Boethius (in despair) and an allegorical figure called Lady Philosophy.'"}, {"text": "After a successful military campaign, contemplating the nature of victory and defeat.", "isCorrect": false, "rationale": "Boethius was a scholar and minister, not a military leader, and he wrote it in despair, not victory."}], "id": "q09"}, {"question": "The 'teacher note' in the section discusses implications of Augustine's *City of God* framework for Christians. Which of the following statements aligns with the teacher's interpretation?", "options": [{"text": "Christians should withdraw from all political engagement, as earthly cities are irrelevant.", "isCorrect": false, "rationale": "The teacher note explicitly states: 'Does Augustine's framework mean Christians shouldn't care about politics? (No — he explicitly says earthly peace is a real good worth working for.)'"}, {"text": "All earthly civilizations are equally worthless, as they are ultimately temporal.", "isCorrect": false, "rationale": "The teacher note clarifies: 'Does it mean all earthly civilizations are equally valuable or worthless? (No — he distinguishes between better and worse earthly cities.)'"}, {"text": "The framework primarily dictates where one places ultimate trust and love, rather than mandating political withdrawal.", "isCorrect": true, "rationale": "The teacher note concludes: 'The framework is subtle: it is about where you place your ultimate trust and love, not about political withdrawal.'"}, {"text": "Christians should strive to make the earthly Church identical with the City of God.", "isCorrect": false, "rationale": "The text states: 'the Church on earth is not identical with the City of God; the two are intertwined until the end of time.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
