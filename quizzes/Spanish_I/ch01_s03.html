<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the textbook, what is the crucial difference between the Spanish words \"sí\" and \"si\"?", "options": [{"text": "“Sí” is used for questions, “si” for statements.", "isCorrect": false, "rationale": "The textbook does not state that the difference between 'sí' and 'si' is related to question or statement usage."}, {"text": "“Sí” (with an accent) means “yes,” while “si” (without an accent) means “if.”", "isCorrect": true, "rationale": "The '¡Ojo!' section explicitly states that 'sí' (with an accent) means 'yes,' and 'si' (without an accent) means 'if,' emphasizing that the accent changes the meaning."}, {"text": "“Sí” means “no,” and “si” means “yes.”", "isCorrect": false, "rationale": "This option incorrectly defines the meaning of both words; 'sí' means 'yes,' not 'no.'"}, {"text": "“Sí” is formal, “si” is informal.", "isCorrect": false, "rationale": "The formality level (formal/informal) is not the distinction explained for 'sí' versus 'si'; rather, it's about their distinct meanings."}]}, {"question": "Using the keyword method described in the textbook, which English word helps you remember the Spanish number \"cuatro\" (4)?", "options": [{"text": "DOSE", "isCorrect": false, "rationale": "The keyword 'DOSE' is associated with 'dos' (2), picturing two medicine capsules."}, {"text": "TRACE", "isCorrect": false, "rationale": "The keyword 'TRACE' is associated with 'tres' (3), picturing tracing around three triangles."}, {"text": "QUATRO", "isCorrect": true, "rationale": "The 'memorytip' section directly states that 'cuatro' (4) sounds like 'QUATRO' and suggests picturing a quadrant divided into four sections."}, {"text": "SINK-oh", "isCorrect": false, "rationale": "The keyword 'SINK-oh' is associated with 'cinco' (5), picturing five dishes sinking in a sink."}]}, {"question": "What animal is the central focus (main character) of the children's song \"Los pollitos dicen\"?", "options": [{"text": "La gallina (The hen)", "isCorrect": false, "rationale": "La gallina is a key character, the mother hen who cares for the chicks, but the song's title and primary action ('dicen') refer to the baby chicks themselves."}, {"text": "El gallo (The rooster)", "isCorrect": false, "rationale": "The rooster is not mentioned or featured in the song 'Los pollitos dicen'."}, {"text": "Los pollitos (The baby chicks)", "isCorrect": true, "rationale": "The song's title, 'Los pollitos dicen,' directly names the baby chicks as the ones who 'say' or 'sing,' and the verses describe their hunger, cold, and sleep, making them the central focus."}, {"text": "El perro (The dog)", "isCorrect": false, "rationale": "A dog is not mentioned in the song or its vocabulary."}]}, {"question": "Based on the song \"Los pollitos dicen,\" what two primary actions does \"La Gallina\" perform for her baby chicks when they are hungry or cold?", "options": [{"text": "She sings to them and puts them to sleep.", "isCorrect": false, "rationale": "While the chicks eventually sleep, the song specifies the hen's active roles as finding food and providing warmth, not primarily singing to them."}, {"text": "She finds corn and wheat for them, and provides them shelter/warmth.", "isCorrect": true, "rationale": "The lyrics state, 'La Gallina busca / El maíz y el trigo / Les da la comida / Y les presta abrigo,' which translates to finding corn and wheat (food) and lending them shelter/warmth."}, {"text": "She teaches them to fly and explore.", "isCorrect": false, "rationale": "The song does not mention the hen teaching the chicks to fly or explore; it focuses on providing basic needs like food and shelter."}, {"text": "She calls out \"Pío, pío, pío\" with them.", "isCorrect": false, "rationale": "The lyrics clearly state that 'Los pollitos dicen / Pío, pío, pío,' indicating that the chicks make this sound, not the hen."}]}, {"question": "From the vocabulary list provided for \"Los pollitos dicen,\" which two words specifically relate to items of food?", "options": [{"text": "El maíz and el trigo", "isCorrect": true, "rationale": "The vocabulary list defines 'el maíz' as 'the corn' and 'el trigo' as 'the wheat,' both of which are specific food items the hen searches for."}, {"text": "La comida and abrigo", "isCorrect": false, "rationale": "'La comida' means 'the food' (a general term), but 'abrigo' means 'shelter / warmth / a coat,' which is not a food item."}, {"text": "Los pollitos and la gallina", "isCorrect": false, "rationale": "These words refer to the animals in the song ('the baby chicks' and 'the hen'), not items of food."}, {"text": "Dicen and busca", "isCorrect": false, "rationale": "These are verbs ('they say / they sing' and 'she searches / she looks for'), not food items."}]}, {"question": "According to the \"El mapa del mundo hispanohablante\" section, Spanish-speaking countries are found on which combination of continents?", "options": [{"text": "Asia, Europe, and North America", "isCorrect": false, "rationale": "While Europe and North America are correct, the text does not mention Asia as a continent where Spanish-speaking countries are found."}, {"text": "North America, Central America, South America, Europe, and Africa", "isCorrect": true, "rationale": "The text explicitly states: 'Notice how Spanish-speaking countries are found on four continents: North America, Central America (part of North America), South America, Europe, and Africa.'"}, {"text": "South America, Australia, and North America", "isCorrect": false, "rationale": "While South America and North America are correct, the text does not mention Australia."}, {"text": "Europe, Asia, and Africa", "isCorrect": false, "rationale": "While Europe and Africa are correct, Asia is not mentioned, and the significant presence in North, Central, and South America is omitted."}]}, {"question": "Which country is highlighted in the \"Fun fact\" section as having the most Spanish speakers in the world?", "options": [{"text": "España (Spain)", "isCorrect": false, "rationale": "España is mentioned as the third largest, not the country with the most Spanish speakers."}, {"text": "Colombia", "isCorrect": false, "rationale": "Colombia is stated as the second largest in terms of Spanish speakers, not the first."}, {"text": "México", "isCorrect": true, "rationale": "The 'Fun fact' clearly states: 'The country with the most Spanish speakers in the world is México, with over 120 million native speakers.'"}, {"text": "Argentina", "isCorrect": false, "rationale": "Argentina is listed after España in terms of the number of Spanish speakers, not as the highest."}]}, {"question": "Miguel, a student, is speaking to Maestra García, his teacher, in the \"Diálogo 2: En la clase.\" Which form of \"you\" would be appropriate for Miguel to use when addressing his teacher, and why?", "options": [{"text": "Tú, because it is more friendly and shows closeness.", "isCorrect": false, "rationale": "While 'tú' is informal and shows closeness, the textbook specifically advises using 'usted' with teachers and adults, as stated in the 'Notice' section."}, {"text": "Usted, because it is the formal form used with teachers and adults as a sign of politeness.", "isCorrect": true, "rationale": "The 'Notice' section directly explains: 'Use usted with teachers, parents, and adults you are being polite to.' Maestra García is a teacher, making 'usted' the appropriate formal choice."}, {"text": "Tú, because all students use it with their teachers in Spanish-speaking cultures.", "isCorrect": false, "rationale": "This statement contradicts the instruction in the 'Notice' section, which teaches the distinction for showing politeness to adults/teachers."}, {"text": "Usted, because it is only used for asking questions.", "isCorrect": false, "rationale": "The use of 'usted' is determined by the relationship and level of formality required, not by whether one is asking a question."}]}, {"question": "In the dialogue \"En la clase,\" what does the word \"hoy\" mean when Maestra García asks, \"¿Cómo están ustedes hoy?\"", "options": [{"text": "Class", "isCorrect": false, "rationale": "The word for 'class' is 'la clase,' not 'hoy.'"}, {"text": "Well", "isCorrect": false, "rationale": "'Muy bien' means 'very well,' but 'hoy' has a different meaning."}, {"text": "Today", "isCorrect": true, "rationale": "The 'New vocabulary in this dialogue' list explicitly defines 'hoy' as 'today.' Maestra García is asking 'How are you all today?'"}, {"text": "You", "isCorrect": false, "rationale": "'You' in its plural formal form (for 'ustedes') is part of the sentence, but 'hoy' itself does not mean 'you.'"}]}, {"question": "Based on the introductory paragraph, what is the primary goal of learning the vocabulary and concepts introduced in this section (\"Palabras de cortesía y los números 0–10\")?", "options": [{"text": "To prepare for advanced grammatical structures.", "isCorrect": false, "rationale": "While these words are foundational, the immediate primary goal stated in the introduction is practical communication, not advanced grammar."}, {"text": "To memorize a list of 100 common Spanish words.", "isCorrect": false, "rationale": "The section introduces a small, specific set of essential words and numbers (0-10), not a list of 100 common words."}, {"text": "To build essential conversational tools that appear in almost every Spanish conversation.", "isCorrect": true, "rationale": "The introductory paragraph states: 'These vocabulary words — titles, names for friends, and numbers — will show up in almost every Spanish conversation you ever have,' highlighting their role as essential conversational tools."}, {"text": "To understand complex cultural nuances of Spanish-speaking countries.", "isCorrect": false, "rationale": "While some cultural context is provided (like the song or map), the primary goal emphasized for *this specific vocabulary* is immediate conversational utility, not deep cultural analysis."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
