<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 17, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the purpose of sequencing words (palabras de transicion) in a preterite story?", "options": [{"text": "They signal which verb tense to use", "isCorrect": false, "rationale": "Time expressions help indicate tense, but sequencing words specifically connect events and move the story forward from one action to the next."}, {"text": "They connect preterite events and guide the listener through what happened in order", "isCorrect": true, "rationale": "The grammar box explains: 'A story does not just list facts — it moves forward in time. Sequencing words link preterite sentences into a flowing narrative.' Words like primero, despues, luego, finalmente connect events."}, {"text": "They replace the need for preterite verb forms", "isCorrect": false, "rationale": "Sequencing words accompany preterite verbs — they do not replace them. You still need the preterite forms even when using sequencing words."}, {"text": "They indicate emotions and feelings only", "isCorrect": false, "rationale": "Emotions are expressed with estar + adjective. Sequencing words (primero, despues, luego, etc.) connect the order of events in a story."}], "id": "q01"}, {"question": "What does 'de repente' signal in a story?", "options": [{"text": "The story is coming to an end", "isCorrect": false, "rationale": "'Finalmente' or 'por fin' signals the end. 'De repente' signals a sudden, unexpected event."}, {"text": "A sudden, unexpected event that changes the direction of the story", "isCorrect": true, "rationale": "'De repente' means 'suddenly' and typically introduces an unexpected turn of events. Example: 'De repente, apagaron las luces' (Suddenly, they turned off the lights)."}, {"text": "A habitual repeated action in the past", "isCorrect": false, "rationale": "Habitual past actions use the imperfect tense. 'De repente' signals a sudden, specific event in the preterite."}, {"text": "The beginning of the story's setting", "isCorrect": false, "rationale": "Background and setting descriptions typically use the imperfect. 'De repente' introduces a sudden interrupting event."}], "id": "q02"}, {"question": "What does 'el recuerdo' mean?", "options": [{"text": "A reminder to study", "isCorrect": false, "rationale": "'El recuerdo' does not mean a study reminder. It means memory or souvenir."}, {"text": "Memory or souvenir", "isCorrect": true, "rationale": "'El recuerdo' means memory (a recollection) or souvenir (an object that recalls a memory). It comes from the verb recordar (to remember/recall)."}, {"text": "A news event", "isCorrect": false, "rationale": "A news event is 'la noticia' or 'el evento'. 'El recuerdo' means memory or souvenir."}, {"text": "A century of history", "isCorrect": false, "rationale": "A century is 'el siglo'. 'El recuerdo' means memory or souvenir."}], "id": "q03"}, {"question": "In the story 'El cumpleanos de Laura', which sequencing word signals the most dramatic moment?", "options": [{"text": "primero", "isCorrect": false, "rationale": "'Primero' begins the story. The dramatic turning point is marked by 'de repente' (suddenly) when someone turns off the lights."}, {"text": "de repente", "isCorrect": true, "rationale": "In the story, 'De repente, alguien apago las luces y todos gritaron: iSorpresa!' — the dramatic surprise is introduced by 'de repente' (suddenly)."}, {"text": "finalmente", "isCorrect": false, "rationale": "'Finalmente' ends the story (everyone ate chocolate cake). The dramatic moment is introduced by 'de repente'."}, {"text": "despues", "isCorrect": false, "rationale": "'Despues' moves the story forward step by step. The dramatic turning point — the surprise — is marked by 'de repente'."}], "id": "q04"}, {"question": "What does 'el siglo' mean in historical vocabulary?", "options": [{"text": "Era or historical period", "isCorrect": false, "rationale": "An era or period is 'la epoca'. 'El siglo' specifically means century (100 years)."}, {"text": "A war or conflict", "isCorrect": false, "rationale": "A war is 'la guerra'. 'El siglo' means century."}, {"text": "Century (100 years)", "isCorrect": true, "rationale": "'El siglo' means century (a 100-year period). Example: 'El siglo XIX' (the 19th century). It is essential vocabulary for talking about history."}, {"text": "A beginning or origin", "isCorrect": false, "rationale": "A beginning is 'el principio'. 'El siglo' means century."}], "id": "q05"}, {"question": "Between 1810 and 1825, what major historical event happened across Latin America?", "options": [{"text": "The construction of the Panama Canal", "isCorrect": false, "rationale": "The Panama Canal was built in the early 1900s, not during 1810-1825. The major event of 1810-1825 was the wave of Latin American independence movements."}, {"text": "A wave of independence movements freed most of Latin America from Spanish colonial rule", "isCorrect": true, "rationale": "The culture box states: 'Between approximately 1810 and 1825, most of Latin America broke free from Spanish colonial rule in a wave of independence movements.' Heroes like Simon Bolivar and Jose de San Martin led these struggles."}, {"text": "Spanish conquistadors first arrived in the Americas", "isCorrect": false, "rationale": "Spanish conquistadors arrived in the late 1400s and 1500s, not 1810-1825. The 1810-1825 period is the era of Latin American independence."}, {"text": "The Mexican Revolution began", "isCorrect": false, "rationale": "The Mexican Revolution began in 1910. The 1810-1825 period was the era of Latin American independence movements from Spain."}], "id": "q06"}, {"question": "Who was Simon Bolivar and why is he called 'El Libertador'?", "options": [{"text": "A Mexican priest who rang a church bell to call people to fight for freedom", "isCorrect": false, "rationale": "That description fits Miguel Hidalgo of Mexico. Simon Bolivar was a Venezuelan-born military leader who liberated five nations."}, {"text": "A military leader who liberated Venezuela, Colombia, Ecuador, Peru, and Bolivia from Spanish rule", "isCorrect": true, "rationale": "The culture box describes Simon Bolivar as 'El Libertador' who led armies that liberated what are now Venezuela, Colombia, Ecuador, Peru, and Bolivia — and the country of Bolivia is even named after him."}, {"text": "An Argentine general who won independence for Chile", "isCorrect": false, "rationale": "That description fits Jose de San Martin. Simon Bolivar focused on northern South America, liberating Venezuela, Colombia, Ecuador, Peru, and Bolivia."}, {"text": "A Spanish king who granted independence to Latin American colonies", "isCorrect": false, "rationale": "Simon Bolivar was a Venezuelan-born revolutionary who fought against Spanish rule, not a Spanish king who granted independence."}], "id": "q07"}, {"question": "What happened on September 15, 1810, that is still celebrated today in Mexico?", "options": [{"text": "Miguel Hidalgo rang his church bell and gave a speech calling for independence", "isCorrect": true, "rationale": "The culture box states: 'In Mexico, the Catholic priest Miguel Hidalgo rang his church bell on the night of September 15, 1810, and gave a famous speech calling people to fight for freedom — an event now celebrated every September 15-16 as El Grito de Independencia.'"}, {"text": "Mexico City was founded as the capital of independent Mexico", "isCorrect": false, "rationale": "Mexico City was founded on the ruins of Tenochtitlan in the 1500s. The September 15 event was Miguel Hidalgo's Grito de Independencia in 1810."}, {"text": "The last Spanish soldiers left Mexico after a final battle", "isCorrect": false, "rationale": "September 15, 1810 was the beginning of Mexico's independence struggle, not its final victory. It commemorates Miguel Hidalgo's famous Grito de Independencia."}, {"text": "Simon Bolivar liberated Mexico from Spanish rule", "isCorrect": false, "rationale": "Bolivar focused on South America. Mexico's independence was sparked by Miguel Hidalgo's Grito de Independencia on September 15, 1810."}], "id": "q08"}, {"question": "What does 'una vez' mean in the vocabulary list?", "options": [{"text": "One voice", "isCorrect": false, "rationale": "Voice is 'la voz' (as in 'en voz alta'). 'Una vez' means once or one time."}, {"text": "Once / one time", "isCorrect": true, "rationale": "'La vez' means time/occasion. 'Una vez' = once/one time. Example: 'habia una vez' (once upon a time) — the classic story opener."}, {"text": "A glass (for drinking)", "isCorrect": false, "rationale": "A drinking glass is 'el vaso'. 'Una vez' means once or one time."}, {"text": "Sometimes", "isCorrect": false, "rationale": "Sometimes is 'a veces' (plural). 'Una vez' = once/one time."}], "id": "q09"}, {"question": "What is 'la paz' in the historical vocabulary list?", "options": [{"text": "War", "isCorrect": false, "rationale": "War is 'la guerra'. 'La paz' is the opposite — it means peace."}, {"text": "The people or a town", "isCorrect": false, "rationale": "The people or a town is 'el pueblo'. 'La paz' means peace."}, {"text": "Peace", "isCorrect": true, "rationale": "'La paz' means peace. It appears alongside 'la guerra' (war) in the historical vocabulary. La Paz is also the capital city of Bolivia."}, {"text": "A century", "isCorrect": false, "rationale": "A century is 'el siglo'. 'La paz' means peace."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
