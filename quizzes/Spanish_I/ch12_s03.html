<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 12, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When gustar is followed by an infinitive, which form is always used?", "options": [{"text": "gusta (singular)", "isCorrect": true, "rationale": "An infinitive is treated as a singular subject. 'Me gusta nadar,' 'Te gusta cocinar' — always 'gusta' with an infinitive."}, {"text": "gustan (plural)", "isCorrect": false, "rationale": "'gustan' is used when multiple nouns are the subject. An infinitive (one action) always uses 'gusta.'"}, {"text": "Either gusta or gustan depending on the person", "isCorrect": false, "rationale": "The form depends on the subject (what is pleasing), not on me/te/le. An infinitive always requires 'gusta.'"}, {"text": "The infinitive itself (gustar)", "isCorrect": false, "rationale": "Gustar must be conjugated. With an infinitive as subject, always use the singular form 'gusta.'"}]}, {"question": "What is the stem change in the verb 'pedir'?", "options": [{"text": "e → i", "isCorrect": true, "rationale": "'pedir' changes e→i in all forms except nosotros: pido, pides, pide, pedimos, piden. This is different from e→ie verbs like querer."}, {"text": "e → ie", "isCorrect": false, "rationale": "e→ie is the change in verbs like querer and preferir. 'pedir' has a different change: e→i."}, {"text": "o → ue", "isCorrect": false, "rationale": "o→ue is the change in verbs like poder and dormir. 'pedir' changes e→i."}, {"text": "No stem change", "isCorrect": false, "rationale": "'pedir' does have a stem change (e→i). It is not a regular -ir verb in the present tense."}]}, {"question": "What is the yo form of 'pedir' (to ask for / to order)?", "options": [{"text": "pido", "isCorrect": true, "rationale": "The stem changes e→i, so: pido, pides, pide, pedimos, piden. The yo form is 'pido.'"}, {"text": "pedo", "isCorrect": false, "rationale": "With the e→i stem change, the 'e' becomes 'i': pido, not pedo."}, {"text": "piero", "isCorrect": false, "rationale": "This is not a valid conjugation. The e→i change gives 'pido.'"}, {"text": "pediro", "isCorrect": false, "rationale": "This combines the stem with the infinitive ending. The correct yo form is simply 'pido.'"}]}, {"question": "What is the key difference between 'preguntar' and 'pedir'?", "options": [{"text": "Preguntar is for questions you want answered; pedir is for things you want received", "isCorrect": true, "rationale": "The text explains: 'preguntar is for questions you want answered; pedir is for things you want received.' You preguntas an address; you pides a favor or food."}, {"text": "Preguntar is formal; pedir is informal", "isCorrect": false, "rationale": "Both verbs can be formal or informal. The distinction is about asking for information (preguntar) vs. requesting something (pedir)."}, {"text": "Preguntar means to demand; pedir means to politely ask", "isCorrect": false, "rationale": "This is incorrect. Both can be polite. Preguntar = ask a question; pedir = ask for/request something."}, {"text": "Preguntar is only used with people; pedir is used with things", "isCorrect": false, "rationale": "Both can involve people or things. The distinction is information questions (preguntar) vs. requests for items/favors (pedir)."}]}, {"question": "In the reading about Sofía, what are her two favorite hobbies?", "options": [{"text": "Music and photography", "isCorrect": true, "rationale": "The text states: 'mis pasatiempos favoritos son la música y la fotografía.'"}, {"text": "Guitar and drawing", "isCorrect": false, "rationale": "Guitar is part of her music interest, but her stated favorite hobbies are music and photography, not drawing."}, {"text": "Reading and dancing", "isCorrect": false, "rationale": "Sofía's favorite hobbies are music and photography, not reading and dancing."}, {"text": "Video games and cooking", "isCorrect": false, "rationale": "Her brother likes video games ('a él le gustan solamente los videojuegos'). Sofía's hobbies are music and photography."}]}, {"question": "What does 'en cambio' mean?", "options": [{"text": "On the other hand", "isCorrect": true, "rationale": "'en cambio' means 'on the other hand' — used to contrast two ideas. In the reading: 'A mi hermano menor, en cambio, no le interesa nada la fotografía.'"}, {"text": "In exchange", "isCorrect": false, "rationale": "While 'cambio' can relate to exchange, 'en cambio' as a phrase means 'on the other hand' — a contrast marker."}, {"text": "In change (money)", "isCorrect": false, "rationale": "'el cambio' can mean money change, but 'en cambio' as a phrase means 'on the other hand.'"}, {"text": "Suddenly, unexpectedly", "isCorrect": false, "rationale": "'De repente' means suddenly. 'En cambio' signals a contrast: 'on the other hand.'"}]}, {"question": "Which verb from Section 3's new verbs list follows the same e→i stem change pattern as pedir?", "options": [{"text": "servir", "isCorrect": true, "rationale": "The text notes: 'This is the same pattern as servir: sirvo, sirves, sirve, servimos, sirven.' Both pedir and servir change e→i."}, {"text": "querer", "isCorrect": false, "rationale": "'querer' changes e→ie (quiero, quieres, etc.). Pedir changes e→i, which is a different pattern."}, {"text": "poder", "isCorrect": false, "rationale": "'poder' changes o→ue. The e→i pattern is shared by pedir and servir."}, {"text": "jugar", "isCorrect": false, "rationale": "'jugar' changes u→ue. Servir shares the e→i change with pedir."}]}, {"question": "Where is Sofía from (the character in the reading)?", "options": [{"text": "Bogotá, Colombia", "isCorrect": true, "rationale": "The reading begins: 'Me llamo Sofía y soy de Bogotá, Colombia.'"}, {"text": "La Ciudad de México, México", "isCorrect": false, "rationale": "Sofía is from Bogotá, Colombia, not Mexico City."}, {"text": "Buenos Aires, Argentina", "isCorrect": false, "rationale": "Sofía is from Bogotá, Colombia. Buenos Aires is in Argentina."}, {"text": "Lima, Perú", "isCorrect": false, "rationale": "Sofía is from Bogotá, Colombia, not Lima."}]}, {"question": "What is 'la cumbia'?", "options": [{"text": "A traditional Colombian dance and music style", "isCorrect": true, "rationale": "The vocabulary at the end of the reading defines 'la cumbia' as 'a traditional Colombian dance and music style.'"}, {"text": "A neighborhood in Bogotá", "isCorrect": false, "rationale": "'el barrio' means neighborhood. 'la cumbia' is a traditional Colombian dance and music style."}, {"text": "A type of Colombian food", "isCorrect": false, "rationale": "The reading does not mention cumbia as food. It is a music and dance style from Colombia."}, {"text": "A type of photograph or picture", "isCorrect": false, "rationale": "'la fotografía' means photograph. 'la cumbia' is a musical and dance tradition."}]}, {"question": "In 'A la víbora de la mar,' what does 'la víbora' mean?", "options": [{"text": "The snake", "isCorrect": true, "rationale": "'la víbora' means the snake. The game is named this because the line of children weaving under the arch looks like a snake moving through water."}, {"text": "The fish", "isCorrect": false, "rationale": "'el pez' means fish. 'la víbora' means snake — the image of a winding line of children."}, {"text": "The wheel", "isCorrect": false, "rationale": "'la rueda' means wheel. 'la víbora' means snake."}, {"text": "The wave", "isCorrect": false, "rationale": "'la ola' means wave. 'la víbora' means snake."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
