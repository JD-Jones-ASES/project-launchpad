    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 20, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What magic phrase introduces childhood memory sentences in Spanish?", "options": [{"text": "De repente, cuando fui nino...", "isCorrect": false, "rationale": "'De repente' means suddenly and introduces unexpected events (preterite). The childhood memory phrase is 'Cuando era nino/a...'"}, {"text": "Cuando era nino/a... (When I was a child...)", "isCorrect": true, "rationale": "The section introduces: 'Cuando era nino/a' as the magic phrase for sharing childhood memories in the imperfect tense. It sets the background for habitual and ongoing past actions."}, {"text": "Cuando soy nino/a... (present tense)", "isCorrect": false, "rationale": "Soy is present tense (I am). Childhood memories use the imperfect: era (I was). Cuando era nino/a..."}, {"text": "Cuando fui nino/a... (preterite of ser)", "isCorrect": false, "rationale": "Fui is the preterite of ser/ir. For ongoing states like childhood, the imperfect is used: era. 'Cuando era nino/a...'"}], "id": "q01"}, {"question": "In the reading 'Recuerdos de mi ninez', what did the narrator see at the beach at night?", "options": [{"text": "Dolphins leaping in the moonlight", "isCorrect": false, "rationale": "The narrator saw marine turtles at night, not dolphins. 'Yo veia las tortugas marinas por la noche — venian a poner sus huevos en la arena blanca.'"}, {"text": "Marine turtles coming to lay their eggs in the white sand", "isCorrect": true, "rationale": "'Yo veia las tortugas marinas por la noche — venian a poner sus huevos en la arena blanca. Eran enormes y misteriosas. ¡Era como un sueno!'"}, {"text": "Bioluminescent fish that lit up the waves", "isCorrect": false, "rationale": "There is no mention of bioluminescent fish. The narrator saw marine turtles coming ashore to lay eggs."}, {"text": "Boats full of fishermen returning home", "isCorrect": false, "rationale": "There are no fishermen in this scene. The magical sight the narrator remembers is the marine turtles laying eggs on the beach."}], "id": "q02"}, {"question": "What did the narrator's grandfather tell him about jaguars?", "options": [{"text": "That jaguars were extinct in Costa Rica", "isCorrect": false, "rationale": "The grandfather did not say jaguars were extinct. He told stories that jaguars walked near the town when it rained a lot."}, {"text": "That jaguars walked near the town when it rained a lot", "isCorrect": true, "rationale": "The reading says: 'Mi abuelo me contaba historias de los animales de la selva. Segun el, los jaguares caminaban cerca del pueblo cuando llovia mucho.'"}, {"text": "That jaguars were friendly and children could approach them", "isCorrect": false, "rationale": "The narrator says he listened with wide eyes, 'un poco asustado' (a little frightened) — not because jaguars were friendly."}, {"text": "That jaguars had disappeared from the forest due to hunting", "isCorrect": false, "rationale": "The grandfather's stories portrayed jaguars as present and nearby — walking near the town when it rained heavily."}], "id": "q03"}, {"question": "What does the narrator say about their family's economic situation in the reading?", "options": [{"text": "The family was wealthy and had a large, modern house.", "isCorrect": false, "rationale": "The narrator describes the opposite: 'Eramos una familia feliz. Teniamos poco dinero, pero teniamos la naturaleza, y para nosotros, eso era suficiente.'"}, {"text": "The family had little money, but had nature, and for them, that was enough.", "isCorrect": true, "rationale": "The final lines: 'Eramos una familia feliz. Teniamos poco dinero, pero teniamos la naturaleza, y para nosotros, eso era suficiente.' (We were a happy family. We had little money, but we had nature, and for us, that was enough.)"}, {"text": "The family was poor and very unhappy about their situation.", "isCorrect": false, "rationale": "The narrator describes the family as happy ('eramos una familia feliz') despite having little money."}, {"text": "The family had enough money but lived far from nature.", "isCorrect": false, "rationale": "The family lived near the jungle in Costa Rica. They had little money but were rich in nature."}], "id": "q04"}, {"question": "In the conversation, where did Valentina grow up?", "options": [{"text": "In a big city with a famous zoo", "isCorrect": false, "rationale": "Sofia grew up in the city and visited the zoo. Valentina lived near a lake."}, {"text": "Near a lake where she swam with her siblings every day", "isCorrect": true, "rationale": "Valentina says: 'Vivia cerca de un lago. Todos los dias nadaba con mis hermanos.' She lived near a lake and swam with her siblings every day."}, {"text": "In the jungle near the Costa Rican coast", "isCorrect": false, "rationale": "The narrator of the reading lived near the jungle in Costa Rica. Valentina specifically says she lived near a lake."}, {"text": "On a farm with many domestic animals", "isCorrect": false, "rationale": "There is no mention of a farm for Valentina. She lived near a lake."}], "id": "q05"}, {"question": "What is Sofia's favorite animal from childhood, according to the conversation?", "options": [{"text": "Elephants, which she saw at the zoo every month", "isCorrect": false, "rationale": "Sofia says she loved elephants at the zoo, but her favorite animal she dreamed of swimming with was the dolphin."}, {"text": "The dolphin — she used to dream of swimming with dolphins someday", "isCorrect": true, "rationale": "Sofia says: 'Si, ¡el delfin! Sonaba con nadar con delfines algun dia.' Her childhood dream was to swim with dolphins."}, {"text": "Sea turtles she saw during beach trips", "isCorrect": false, "rationale": "The sea turtles appear in the narrator's reading about Costa Rica. Sofia's favorite was the dolphin."}, {"text": "Blue butterflies she chased in the garden", "isCorrect": false, "rationale": "The blue butterflies appear in the narrator's garden in the reading. Sofia's favorite animal was the dolphin."}], "id": "q06"}, {"question": "What does 'perseguia' mean in 'yo las perseguia durante horas'?", "options": [{"text": "I watched them (imperfect of ver)", "isCorrect": false, "rationale": "Watching would be 'las veia'. 'Perseguia' comes from perseguir — to chase/pursue."}, {"text": "I used to chase them (imperfect of perseguir)", "isCorrect": true, "rationale": "'Perseguia' is the imperfect of perseguir (to chase/pursue). 'Yo las perseguia durante horas, pero nunca las atrapaba.' = I used to chase them for hours, but I never caught them."}, {"text": "I caught them (imperfect of atrapar)", "isCorrect": false, "rationale": "Catching is 'atrapar'. The sentence says 'nunca las atrapaba' (never caught them). 'Perseguia' means chased."}, {"text": "I drew pictures of them (imperfect of perseguir)", "isCorrect": false, "rationale": "Drawing pictures would use 'dibujar'. 'Perseguir' means to chase or pursue."}], "id": "q07"}, {"question": "The activity asks you to write sentences using 'cuando era nino/a'. Which of the following is a correct example?", "options": [{"text": "Cuando era nino, jugo con mi perro.", "isCorrect": false, "rationale": "Jugo (no accent) is present tense; Jugo (with accent) is el/ella preterite. For habitual childhood actions, use the imperfect: jugaba."}, {"text": "Cuando era nino, jugaba con mi perro todos los dias.", "isCorrect": true, "rationale": "'Cuando era nino' (imperfect of ser) + 'jugaba' (imperfect of jugar) = correct imperfect construction for childhood habits. 'Todos los dias' reinforces the habitual meaning."}, {"text": "Cuando era nino, voy a jugar con mi perro.", "isCorrect": false, "rationale": "Voy a jugar is a present/future construction, not past. For childhood habits, use the imperfect: jugaba."}, {"text": "Cuando era nino, jugue con mi perro.", "isCorrect": false, "rationale": "Jugue is preterite (I played — once). For habitual childhood actions (playing every day), use imperfect: jugaba."}], "id": "q08"}, {"question": "What does 'nunca las atrapaba' mean from the reading?", "options": [{"text": "I never used to catch them.", "isCorrect": true, "rationale": "'Nunca' = never. 'Las atrapaba' = I used to catch them (imperfect of atrapar). Together: I never used to catch them — referring to the butterflies the narrator chased for hours."}, {"text": "I never caught one of them (once).", "isCorrect": false, "rationale": "The single event would use preterite: 'nunca las atrape'. 'Atrapaba' is imperfect — a repeated, habitual (non-)action."}, {"text": "I will never catch them.", "isCorrect": false, "rationale": "This would be future: 'nunca las voy a atrapar.' 'Atrapaba' is imperfect (past)."}, {"text": "I should not catch them.", "isCorrect": false, "rationale": "Should/ought to would use a modal verb or subjunctive. 'Nunca las atrapaba' = I never used to catch them."}], "id": "q09"}, {"question": "What does the grandmother's saying about blue butterflies represent in the reading?", "options": [{"text": "A scientific fact about butterfly migration patterns", "isCorrect": false, "rationale": "This is folk wisdom, not science. The grandmother said seeing a blue butterfly was good luck, and the narrator says he thinks she was right."}, {"text": "A piece of folk wisdom: seeing a blue butterfly was considered good luck", "isCorrect": true, "rationale": "'Mi abuela decia que era buena suerte ver una mariposa azul. Creo que tenia razon.' (My grandmother used to say it was good luck to see a blue butterfly. I think she was right.) This is a cherished folk belief from the narrator's childhood."}, {"text": "A warning that blue butterflies are poisonous", "isCorrect": false, "rationale": "There is no warning about danger. The grandmother's saying was positive: seeing a blue butterfly brought good luck."}, {"text": "A signal that the rainy season was about to begin", "isCorrect": false, "rationale": "The blue butterfly is associated with good luck, not weather prediction, according to the grandmother's folk wisdom."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
