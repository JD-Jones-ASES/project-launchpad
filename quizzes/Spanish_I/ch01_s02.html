    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is a key advantage of Spanish pronunciation compared to English?", "options": [{"text": "Spanish uses fewer letters, making it simpler.", "isCorrect": false, "rationale": "The text states Spanish has 27 letters, not necessarily fewer, and this is not presented as its key advantage regarding pronunciation."}, {"text": "Each letter in Spanish consistently makes the same sound, unlike English.", "isCorrect": true, "rationale": "The text explicitly states, 'it is almost perfectly phonetic. That means each letter makes the same sound almost every time you see it,' contrasting it with English variations."}, {"text": "Spanish words always have an accent mark to guide pronunciation.", "isCorrect": false, "rationale": "Many Spanish words do not have accent marks, and while accent marks help with stress, the primary advantage highlighted is the consistent sound of individual letters."}, {"text": "Spanish avoids complex vowel combinations found in English.", "isCorrect": false, "rationale": "While true that Spanish vowels are consistent, the core advantage described in the text is the consistency of *each letter's* sound, not just vowel combinations, and the example 'ough' covers various letter combinations, not just vowels."}]}, {"question": "How many letters are in the Spanish alphabet, and which unique letter does it include compared to the English alphabet?", "options": [{"text": "26 letters, including the letter 'ç'.", "isCorrect": false, "rationale": "The Spanish alphabet has 27 letters, and 'ç' is not part of the standard Spanish alphabet."}, {"text": "27 letters, including the letter 'ñ'.", "isCorrect": true, "rationale": "The text states, 'The Spanish alphabet has 27 letters — the same 26 as English, plus the letter ñ.'"}, {"text": "28 letters, including 'ch' and 'll'.", "isCorrect": false, "rationale": "Historically, 'ch' and 'll' were sometimes considered separate letters, but the modern Spanish alphabet recognized by the text has 27 letters."}, {"text": "25 letters, as 'h' is always silent.", "isCorrect": false, "rationale": "The letter 'h' is indeed silent, but it is still counted as a letter in the 27-letter Spanish alphabet."}]}, {"question": "What is the most crucial characteristic of Spanish vowels, according to the 'Las cinco vocales' section?", "options": [{"text": "Their sound often changes depending on surrounding consonants.", "isCorrect": false, "rationale": "The text states the opposite: 'each Spanish vowel has exactly one sound — always, no exceptions.'"}, {"text": "They are pronounced with a 'sliding' sound into another vowel.", "isCorrect": false, "rationale": "The memory trick advises, 'Now say each one as a full, clear sound, never sliding into another vowel.'"}, {"text": "Each Spanish vowel consistently has exactly one sound.", "isCorrect": true, "rationale": "The text explicitly states, 'each Spanish vowel has exactly one sound — always, no exceptions.'"}, {"text": "There are more than five vowel sounds in Spanish due to accent marks.", "isCorrect": false, "rationale": "There are five vowels, and accent marks indicate stress, not a change in the vowel's inherent sound."}]}, {"question": "Based on the rule for the letter 'h' in Spanish, how would you correctly pronounce the word 'hablar' (to speak)?", "options": [{"text": "HAH-blahr", "isCorrect": false, "rationale": "This pronunciation includes an 'h' sound, which the text explicitly states is incorrect for Spanish 'h'."}, {"text": "ah-BLAR", "isCorrect": true, "rationale": "The text states, 'The letter h in Spanish is always silent — 100% of the time, no exceptions! If you see an h, pretend it is invisible!'"}, {"text": "hahb-LAR", "isCorrect": false, "rationale": "This pronunciation incorrectly includes an 'h' sound and does not reflect common Spanish stress patterns for words like 'hablar'."}, {"text": "ah-bah-LAR", "isCorrect": false, "rationale": "This pronunciation incorrectly adds an extra 'a' sound and does not follow the rules for 'h'."}]}, {"question": "If you see the word 'teléfono' in Spanish, which syllable should be stressed according to the rule about accent marks?", "options": [{"text": "The last syllable (fo).", "isCorrect": false, "rationale": "The accent mark is on the 'e' of 'te', not 'fo'."}, {"text": "The second to last syllable (no).", "isCorrect": false, "rationale": "The accent mark is on the 'e' of 'te', not 'no'."}, {"text": "The first syllable (te).", "isCorrect": true, "rationale": "The text states, 'It tells you which syllable to stress.' The accent mark is over the first 'e' in 'teléfono', indicating that syllable should be stressed."}, {"text": "The second syllable (lé).", "isCorrect": false, "rationale": "The accent mark is on the first 'e', not the second 'e'."}]}, {"question": "What is a secondary, but equally important, function of an accent mark on a Spanish vowel, besides indicating stress?", "options": [{"text": "To signify a change in the vowel's inherent sound.", "isCorrect": false, "rationale": "The text explicitly states that Spanish vowels have 'exactly one sound — always, no exceptions,' so accent marks do not change the vowel's sound."}, {"text": "To distinguish between words that are spelled identically but have different meanings.", "isCorrect": true, "rationale": "The text explains, 'It distinguishes words that are spelled the same. For example: sí (yes) vs. si (if); tú (you) vs. tu (your).'"}, {"text": "To indicate that the vowel is part of a diphthong.", "isCorrect": false, "rationale": "The text does not mention this function for accent marks."}, {"text": "To make the word appear more formal or polite.", "isCorrect": false, "rationale": "The text does not attribute this function to accent marks."}]}, {"question": "The text emphasizes the importance of the letter 'ñ'. What sound does it produce, and what is the consequence of dropping its tilde?", "options": [{"text": "It makes a hard 'n' sound, and dropping the tilde makes it a soft 'n'.", "isCorrect": false, "rationale": "The 'ñ' makes a 'ny' sound, not a hard 'n', and dropping the tilde simply makes it an 'n'."}, {"text": "It makes a 'gn' sound like in 'lasagna,' and dropping the tilde makes it an 'n'.", "isCorrect": false, "rationale": "While 'gn' is a close analogy, the text specifically uses 'ny' in 'canyon'. Dropping the tilde does make it an 'n', but the 'gn' sound isn't the primary description."}, {"text": "It makes a 'ny' sound as in 'canyon,' and dropping the tilde changes the word's meaning or makes it a different word.", "isCorrect": true, "rationale": "The text states it sounds 'like 'ny' in 'canyon'' and that 'it is NOT just an n with a decoration,' implying that dropping the tilde fundamentally changes the word to an 'n' sound, which often results in a different word or meaning (e.g., 'año' vs. 'ano')."}, {"text": "It is an ornamental 'n' sound, and dropping the tilde has no effect on pronunciation.", "isCorrect": false, "rationale": "The text explicitly states it's 'NOT just an n with a decoration' and makes 'a completely different sound,' so dropping the tilde definitely affects pronunciation and meaning."}]}, {"question": "Why are cognates particularly helpful for English speakers learning Spanish?", "options": [{"text": "They allow learners to guess the correct pronunciation of new words without prior knowledge.", "isCorrect": false, "rationale": "While Spanish is phonetic, cognates primarily help with meaning, not necessarily the exact pronunciation, as Spanish sounds differ from English."}, {"text": "They represent words that are spelled identically in both languages.", "isCorrect": false, "rationale": "The text says cognates 'look similar,' not necessarily identical, and mean the same thing."}, {"text": "They enable learners to understand the meaning of many Spanish words due to shared roots.", "isCorrect": true, "rationale": "The text states, 'Cognates are words in two languages that look similar and mean the same thing... This means you already know hundreds of Spanish words!'"}, {"text": "They are always pronounced exactly the same in both Spanish and English.", "isCorrect": false, "rationale": "Even if spelled similarly, Spanish pronunciation rules (like consistent vowel sounds, silent 'h') mean cognates will not be pronounced exactly the same as their English counterparts."}]}, {"question": "The text provides an example of a 'false cognate.' If someone confused the Spanish word 'embarazada' with its English look-alike, what mistake would they be making?", "options": [{"text": "Assuming its meaning is 'embarrassed' when it actually means 'pregnant.'", "isCorrect": true, "rationale": "The text explicitly states, 'For example, embarazada does not mean 'embarrassed' — it means pregnant!'"}, {"text": "Believing it refers to a type of food when it's a medical term.", "isCorrect": false, "rationale": "The example given clearly states the meaning 'pregnant', not a food or a general medical term, and the English word 'embarrassed' is not a food."}, {"text": "Mispronouncing the 'z' sound, changing the word's meaning.", "isCorrect": false, "rationale": "False cognates are defined by their misleading *meaning*, not by pronunciation errors."}, {"text": "Thinking it has an accent mark when it does not.", "isCorrect": false, "rationale": "The concept of false cognates relates to misleading similarity in meaning, not the presence or absence of accent marks."}]}, {"question": "Considering the Spanish phonetic rules described, which of the following statements best summarizes a fundamental principle for accurate pronunciation?", "options": [{"text": "Focus primarily on mimicking native speakers, as written rules are often inconsistent.", "isCorrect": false, "rationale": "The text emphasizes the *consistency* and predictability of written Spanish rules, contrasting it with English."}, {"text": "Assume that most Spanish letters will have a similar sound to their English counterparts.", "isCorrect": false, "rationale": "The text highlights that Spanish letters make *their own consistent sounds*, often different from English, and warns against assuming English pronunciation."}, {"text": "Once you learn the consistent sound for each letter and rule (like silent 'h'), you can pronounce almost any word you see.", "isCorrect": true, "rationale": "This statement synthesizes the core message: 'Once you learn the sounds, you can pronounce any Spanish word you encounter — even if you have never seen it before! What you see is what you say.'"}, {"text": "Pay extra attention to 'ch' and 'll' as they are the most challenging sounds to master.", "isCorrect": false, "rationale": "While 'ch' and 'll' are distinct, the text highlights the consistency of all letters, especially vowels, the silent 'h', and the 'ñ', as fundamental principles."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
