<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 12, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which verb from the 'gustar family' means 'to fascinate' or 'to love (something)'?", "options": [{"text": "encantar", "isCorrect": true, "rationale": "'encantar' means to enchant/fascinate and is used like gustar to say you love something: 'Me encanta la música.' (I love music.)"}, {"text": "interesar", "isCorrect": false, "rationale": "'interesar' means to interest: 'Me interesa la historia.' (History interests me.) It doesn't mean 'to love.'"}, {"text": "molestar", "isCorrect": false, "rationale": "'molestar' means to bother/annoy: 'Me molesta el ruido.' Not to love something."}, {"text": "faltar", "isCorrect": false, "rationale": "'faltar' means to be missing/lacking: 'Me faltan dos páginas.' Not to love something."}]}, {"question": "How do you say 'History interests me' using the gustar-family construction?", "options": [{"text": "Me interesa la historia.", "isCorrect": true, "rationale": "'interesar' follows the gustar pattern. 'la historia' is singular, so 'interesa' (singular) is used."}, {"text": "Me interesan la historia.", "isCorrect": false, "rationale": "'la historia' is singular, so 'interesa' (not 'interesan') is used."}, {"text": "Yo intereso la historia.", "isCorrect": false, "rationale": "Gustar-family verbs require the indirect object pronoun construction, not a standard subject pronoun."}, {"text": "Me interesas la historia.", "isCorrect": false, "rationale": "'interesas' is the tú form. The verb must agree with 'la historia' (subject), not with 'me' (indirect object)."}]}, {"question": "What does 'Me molesta el ruido' mean?", "options": [{"text": "The noise bothers me.", "isCorrect": true, "rationale": "'molestar' means to bother/annoy. 'el ruido' = the noise. 'Me molesta el ruido' = The noise bothers me."}, {"text": "I like the noise.", "isCorrect": false, "rationale": "'Me gusta el ruido' would mean 'I like the noise.' 'Molestar' means to bother, not to like."}, {"text": "The noise is missing.", "isCorrect": false, "rationale": "'faltar' means to be missing. 'molestar' means to bother/annoy."}, {"text": "I need the noise.", "isCorrect": false, "rationale": "'Me hace falta' means I need. 'Me molesta' means it bothers me."}]}, {"question": "Which hobby vocabulary word means 'photography'?", "options": [{"text": "la fotografía", "isCorrect": true, "rationale": "'la fotografía' means photography (as an art/hobby) or a photograph. It is a cognate with the English word."}, {"text": "la pintura", "isCorrect": false, "rationale": "'la pintura' means painting. 'la fotografía' means photography."}, {"text": "el dibujo", "isCorrect": false, "rationale": "'el dibujo' means drawing or sketch. 'la fotografía' means photography."}, {"text": "el arte", "isCorrect": false, "rationale": "'el arte' means art (in general). 'la fotografía' specifically means photography."}]}, {"question": "According to the Puerto Rico culture box, which music genre emerged from Puerto Rican and Cuban communities in New York City in the 1960s–70s?", "options": [{"text": "La salsa", "isCorrect": true, "rationale": "The text states salsa 'emerged from Puerto Rican and Cuban communities in New York City during the 1960s and 70s.'"}, {"text": "La bomba", "isCorrect": false, "rationale": "La bomba is an Afro-Caribbean rhythm born in Puerto Rico centuries ago, not in New York City."}, {"text": "El reggaetón", "isCorrect": false, "rationale": "El reggaetón is described as more recent. Salsa emerged in the 1960s–70s in New York."}, {"text": "La plena", "isCorrect": false, "rationale": "La plena is another traditional Afro-Caribbean rhythm from Puerto Rico. Salsa emerged from New York."}]}, {"question": "What does 'la afición' mean?", "options": [{"text": "Hobby; fandom, fan base", "isCorrect": true, "rationale": "'la afición' means hobby or fandom/fan base. It can refer to a personal passion or to fans of a sport/team."}, {"text": "Affection, love", "isCorrect": false, "rationale": "'el cariño' or 'el afecto' means affection. 'la afición' means hobby or fan base."}, {"text": "Office, workplace", "isCorrect": false, "rationale": "'la oficina' means office. 'la afición' means hobby or fandom."}, {"text": "Inflation, price increase", "isCorrect": false, "rationale": "'la inflación' means inflation. 'la afición' means hobby or fan base — a false cognate trap."}]}, {"question": "What is 'la isla del encanto' and which place does this nickname refer to?", "options": [{"text": "The island of enchantment — Puerto Rico's nickname", "isCorrect": true, "rationale": "The text describes 'la isla del encanto (the island of enchantment)' as Puerto Rico's beloved nickname."}, {"text": "The island of music — Cuba's nickname", "isCorrect": false, "rationale": "Cuba is not called 'la isla del encanto.' This is Puerto Rico's beloved nickname."}, {"text": "The island of enchantment — the Dominican Republic's nickname", "isCorrect": false, "rationale": "The Dominican Republic is not called 'la isla del encanto.' This is Puerto Rico's nickname."}, {"text": "The island of enchantment — Haiti's nickname", "isCorrect": false, "rationale": "Haiti is not a Spanish-speaking country and is not called 'la isla del encanto.' Puerto Rico has this nickname."}]}, {"question": "In the personal connection memory tip, what approach is recommended for learning gustar vocabulary?", "options": [{"text": "Rate each activity on a personal scale and write honest sentences about your real feelings", "isCorrect": true, "rationale": "The memory tip says: 'Rate each activity on your own personal scale' and 'write one sentence for each, honestly rating how much you like it.' Personal connection strengthens memory."}, {"text": "Copy all vocabulary words five times each to memorize them", "isCorrect": false, "rationale": "Copying is not mentioned. The tip emphasizes personal connection: rating activities you truly like or dislike."}, {"text": "Translate each word into your native language and make flashcards", "isCorrect": false, "rationale": "Flashcards are not mentioned. The tip recommends connecting words to your real feelings."}, {"text": "Listen to Puerto Rican music to connect words to sound", "isCorrect": false, "rationale": "Music is mentioned in the culture box, not the memory tip. The tip recommends personal ratings and honest sentences."}]}, {"question": "What does 'el pasatiempo' mean?", "options": [{"text": "Hobby, pastime", "isCorrect": true, "rationale": "'el pasatiempo' means hobby or pastime — an activity you do for pleasure in your free time."}, {"text": "Passport", "isCorrect": false, "rationale": "'el pasaporte' means passport. 'el pasatiempo' means hobby or pastime."}, {"text": "The past", "isCorrect": false, "rationale": "'el pasado' means the past. 'el pasatiempo' comes from 'pasar el tiempo' (to pass the time) = hobby."}, {"text": "Pause, break", "isCorrect": false, "rationale": "'la pausa' means pause. 'el pasatiempo' means hobby or pastime."}]}, {"question": "According to the gustar-family grammar box, what is the basic structure of these sentences?", "options": [{"text": "[a + persona] + [me/te/le/nos/les] + [verbo] + [sujeto]", "isCorrect": true, "rationale": "This is the pattern shown in the grammar box: clarifying phrase + indirect object pronoun + verb + subject (the thing that pleases/bothers/interests)."}, {"text": "[sujeto] + [verbo] + [objeto directo]", "isCorrect": false, "rationale": "This is the standard English-like structure. Gustar-family verbs are reversed: the subject comes after the verb."}, {"text": "[me/te/le] + [verbo] + [a + persona]", "isCorrect": false, "rationale": "The 'a + persona' clarifier typically comes first for emphasis, not last. The subject (what pleases) comes after the verb."}, {"text": "[verbo] + [me/te/le] + [sujeto]", "isCorrect": false, "rationale": "The indirect object pronoun comes before the verb in this construction, not after it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
