<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 13, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which set of words are the direct object pronouns in Spanish?", "options": [{"text": "lo, la, los, las", "isCorrect": true, "rationale": "The four direct object pronouns are lo (masc. sing.), la (fem. sing.), los (masc. pl.), las (fem. pl.). They replace direct object nouns."}, {"text": "me, te, le, nos, les", "isCorrect": false, "rationale": "Me, te, le, nos, les are INDIRECT object pronouns (used with gustar, dar, etc.). Direct object pronouns are lo/la/los/las."}, {"text": "el, la, los, las", "isCorrect": false, "rationale": "El/la/los/las are definite articles when they accompany a noun. As pronouns (replacing nouns), we say lo/la/los/las."}, {"text": "un, una, unos, unas", "isCorrect": false, "rationale": "These are indefinite articles (a, an, some). Direct object pronouns are lo/la/los/las."}], "id": "q01"}, {"question": "Where does the direct object pronoun go in a sentence with a conjugated verb?", "options": [{"text": "Before the conjugated verb", "isCorrect": true, "rationale": "The key rule: place the pronoun BEFORE the conjugated verb. 'Compro el libro' → 'Lo compro.' (not 'Compro lo.')"}, {"text": "After the conjugated verb", "isCorrect": false, "rationale": "In English we say 'I buy it' (after the verb), but in Spanish the pronoun goes BEFORE: 'Lo compro.'"}, {"text": "At the end of the sentence", "isCorrect": false, "rationale": "The pronoun goes directly before the conjugated verb, not at the end of the sentence."}, {"text": "Between the subject and the verb", "isCorrect": false, "rationale": "The pronoun goes immediately before the conjugated verb: 'Lo compro.' (I buy it.) — before 'compro.'"}], "id": "q02"}, {"question": "How do you replace 'el bolso' (the purse) in 'Compro el bolso' with a direct object pronoun?", "options": [{"text": "Lo compro.", "isCorrect": true, "rationale": "'el bolso' is masculine singular, so the pronoun is 'lo.' Place it before the verb: 'Lo compro.' (I buy it.)"}, {"text": "La compro.", "isCorrect": false, "rationale": "'la' replaces feminine singular nouns. 'el bolso' is masculine, so use 'lo,' not 'la.'"}, {"text": "Los compro.", "isCorrect": false, "rationale": "'los' replaces masculine plural nouns. 'el bolso' is singular, so use 'lo.'"}, {"text": "Compro lo.", "isCorrect": false, "rationale": "The pronoun must go BEFORE the verb: 'Lo compro,' not 'Compro lo.'"}], "id": "q03"}, {"question": "How do you replace 'las faldas' (the skirts) with a direct object pronoun?", "options": [{"text": "las", "isCorrect": true, "rationale": "'las faldas' is feminine plural, so the pronoun is 'las': 'Las compro.' (I buy them.)"}, {"text": "los", "isCorrect": false, "rationale": "'los' replaces masculine plural nouns. 'las faldas' is feminine, so use 'las.'"}, {"text": "la", "isCorrect": false, "rationale": "'la' replaces singular feminine nouns. 'las faldas' is plural, so use 'las.'"}, {"text": "lo", "isCorrect": false, "rationale": "'lo' replaces masculine singular nouns. 'las faldas' is feminine plural, so use 'las.'"}], "id": "q04"}, {"question": "With an infinitive construction, where can the direct object pronoun go?", "options": [{"text": "Either before the conjugated verb OR attached to the infinitive — both are correct", "isCorrect": true, "rationale": "The grammar box shows: 'Voy a comprarlo' OR 'Lo voy a comprar' — both mean 'I'm going to buy it.' Both placements are correct."}, {"text": "Only before the conjugated verb", "isCorrect": false, "rationale": "Both positions are acceptable with infinitives: before the conjugated verb OR attached to the infinitive."}, {"text": "Only attached to the end of the infinitive", "isCorrect": false, "rationale": "While attaching to the infinitive is correct, placing before the conjugated verb is equally valid."}, {"text": "Between the conjugated verb and the infinitive", "isCorrect": false, "rationale": "You cannot place the pronoun between two verbs. It goes either before the conjugated verb or at the end of the infinitive."}], "id": "q05"}, {"question": "In 'Busco un regalo. Lo busco para mi mamá.' What does 'lo' replace?", "options": [{"text": "un regalo (a gift)", "isCorrect": true, "rationale": "'un regalo' is masculine singular, so it is replaced by 'lo.' 'Lo busco para mi mamá' = I'm looking for it for my mom."}, {"text": "mi mamá (my mom)", "isCorrect": false, "rationale": "'mi mamá' would be replaced by 'la' (feminine). 'lo' replaces 'un regalo' (masculine)."}, {"text": "para (for)", "isCorrect": false, "rationale": "'para' is a preposition, not a noun. Pronouns replace nouns. 'lo' replaces 'un regalo.'"}, {"text": "Busco (I look for)", "isCorrect": false, "rationale": "Pronouns replace nouns, not verbs. 'lo' replaces 'un regalo' in the sentence."}], "id": "q06"}, {"question": "What does 'buscar' already include that means you should NEVER say 'busco por'?", "options": [{"text": "The preposition 'for' — buscar already means 'to look for'", "isCorrect": true, "rationale": "The text warns: 'Buscar already means to look for — it includes the preposition! Never say busco por.' Just say 'busco los zapatos.'"}, {"text": "The direct object pronoun", "isCorrect": false, "rationale": "Buscar does not include a pronoun. The warning is that 'buscar' already contains the meaning of 'for,' so 'por' is redundant."}, {"text": "A stem change", "isCorrect": false, "rationale": "Buscar is a regular -ar verb (with a spelling change c→qu before -é). The warning is about the preposition."}, {"text": "A reflexive pronoun", "isCorrect": false, "rationale": "'Buscarse' would be reflexive. The warning is that 'buscar' includes 'for' — you cannot add 'por.'"}], "id": "q07"}, {"question": "What is the Otavalo market famous for, according to the reading?", "options": [{"text": "Indigenous artisan products including ponchos in all colors", "isCorrect": true, "rationale": "The text says the Otavalo market is famous worldwide: 'Los ponchos son especialmente populares — los venden en todos los colores imaginables.'"}, {"text": "Silver jewelry and precious gems", "isCorrect": false, "rationale": "Silver jewelry is mentioned for Sucre, Bolivia. The Otavalo market in Ecuador is famous for ponchos and artisan goods."}, {"text": "Electronic goods and modern technology", "isCorrect": false, "rationale": "The Otavalo market features traditional indigenous artisan crafts, not electronics."}, {"text": "Fresh food and produce only", "isCorrect": false, "rationale": "The Otavalo market is famous for artisan goods like ponchos, not primarily for fresh produce."}], "id": "q08"}, {"question": "In the Otavalo reading, what does the tourist do when she thinks the price is a bit expensive?", "options": [{"text": "She asks '¿Me hace un descuento?' and the vendor lowers the price", "isCorrect": true, "rationale": "The text says: 'La turista piensa que es un poco caro y dice: ¿Me hace un descuento? El artesano sonríe y lo baja a sesenta dólares.'"}, {"text": "She pays the full price without bargaining", "isCorrect": false, "rationale": "She does bargain — she asks for a discount and the vendor lowers the price from 80 to 60 dollars."}, {"text": "She leaves without buying the poncho", "isCorrect": false, "rationale": "She successfully buys the poncho: 'Ella lo compra con mucho gusto.'"}, {"text": "She offers to pay with a credit card instead", "isCorrect": false, "rationale": "Payment method is not mentioned. She negotiates the price and receives 'su recibo' (her receipt) after buying."}], "id": "q09"}, {"question": "What does 'contento/a' mean?", "options": [{"text": "Happy, pleased", "isCorrect": true, "rationale": "'contento/a' means happy or pleased. The reading ends: 'todo el mundo está contento' (everyone is happy/pleased)."}, {"text": "Content (as in the contents of something)", "isCorrect": false, "rationale": "While it looks like 'content,' in Spanish 'contento/a' means happy/pleased, not content (noun meaning inside matter)."}, {"text": "Contained, held in place", "isCorrect": false, "rationale": "'Contento/a' means happy. 'Contenido' might relate to contained/content (noun), but 'contento/a' = happy."}, {"text": "Confident", "isCorrect": false, "rationale": "'seguro/a de sí mismo/a' means confident. 'contento/a' means happy or pleased."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
