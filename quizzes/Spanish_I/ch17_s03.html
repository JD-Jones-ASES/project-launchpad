<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 17, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the story 'El cumpleanos de Laura', what did her father do to prepare the party?", "options": [{"text": "He bought balloons and decorations at the store.", "isCorrect": false, "rationale": "Laura's mother decorated the house with balloons. Her father cooked many delicious dishes."}, {"text": "He cooked many delicious dishes.", "isCorrect": true, "rationale": "The story says: 'Su papa cocino muchos platos deliciosos.' Her father cooked (cocinar -> cocino, preterite) many delicious dishes."}, {"text": "He ordered a chocolate cake from a bakery.", "isCorrect": false, "rationale": "There is no mention of ordering a cake. Her father cooked many dishes; the chocolate cake is mentioned at the end when everyone ate together."}, {"text": "He invited all the guests and organized the surprise.", "isCorrect": false, "rationale": "The story does not specify who organized the surprise. Her father's specific action was cooking many delicious dishes."}], "id": "q01"}, {"question": "What is the preterite form of 'llegar' (to arrive) for el/ella?", "options": [{"text": "llego (no accent)", "isCorrect": false, "rationale": "Llego without accent is the yo PRESENT form (I arrive). The el/ella preterite requires an accent: llego."}, {"text": "llego (with accent on the o)", "isCorrect": true, "rationale": "The el/ella preterite of llegar is llego (with accent on the -o). This accent is required to distinguish it from the yo present form 'llego' (no accent)."}, {"text": "llegaste", "isCorrect": false, "rationale": "Llegaste is the TU preterite form. The el/ella preterite is llego (with accent)."}, {"text": "llegaron", "isCorrect": false, "rationale": "Llegaron is the ellos/ellas preterite form (they arrived). The el/ella preterite is llego."}], "id": "q02"}, {"question": "In the conversation, what did Ana do on Saturday?", "options": [{"text": "She swam at the pool with her cousins.", "isCorrect": false, "rationale": "Marcos swam at the pool with his cousins. Ana visited her grandmother."}, {"text": "She visited her grandmother and prepared tamales together.", "isCorrect": true, "rationale": "Ana says: 'Yo visite a mi abuela. Primero, caminamos al mercado, y despues preparamos tamales juntas.' She visited her grandmother and they made tamales together."}, {"text": "She studied for the history exam all weekend.", "isCorrect": false, "rationale": "Ana studied for the history exam on Sunday. On Saturday she visited her grandmother and prepared tamales."}, {"text": "She practiced the piano and went shopping.", "isCorrect": false, "rationale": "Ana practiced the piano on Saturday (practique por una hora), but her main Saturday activity was visiting her grandmother and making tamales."}], "id": "q03"}, {"question": "In the conversation, Marcos asks: '¿Practicaste el piano tambien?' What is the correct yo preterite answer Ana gives?", "options": [{"text": "Si, practico por una hora.", "isCorrect": false, "rationale": "Practico (no accent, yo form) is present tense. Ana uses the correct preterite: practique (spelling change: c -> qu before -e)."}, {"text": "Si, practique por una hora.", "isCorrect": true, "rationale": "Ana says: 'Si, practique por una hora.' Practique is the yo preterite of practicar — the c changes to qu before -e to maintain the hard k sound."}, {"text": "Si, practicaste por una hora.", "isCorrect": false, "rationale": "Practicaste is the TU form (you practiced). Ana would say practique to refer to herself (I practiced)."}, {"text": "Si, practicaba por una hora.", "isCorrect": false, "rationale": "Practicaba is the imperfect form (I used to practice). Ana uses the preterite: practique (a specific completed action)."}], "id": "q04"}, {"question": "What does the expression 'fue un dia perfecto' mean and why is 'fue' used?", "options": [{"text": "'It is a perfect day' — fue is present tense of ser", "isCorrect": false, "rationale": "'Fue' is not present tense. 'Es' is the present tense of ser. 'Fue' is the preterite of ser or ir."}, {"text": "'It was a perfect day' — fue is the preterite of ser (to be)", "isCorrect": true, "rationale": "'Fue' is the preterite of both ser and ir. In 'fue un dia perfecto,' it comes from ser = 'it was.' This is a very common storytelling expression."}, {"text": "'It will be a perfect day' — fue is future tense", "isCorrect": false, "rationale": "The future tense would use ir + a: 'Va a ser un dia perfecto.' 'Fue' is preterite (past), meaning 'it was.'"}, {"text": "'It seems like a perfect day' — fue is a subjunctive form", "isCorrect": false, "rationale": "'Parece un dia perfecto' would express seeming. 'Fue un dia perfecto' = 'It was a perfect day' — fue is the preterite of ser."}], "id": "q05"}, {"question": "What is the mental timeline technique described in the memory tip?", "options": [{"text": "Drawing a family tree diagram to organize verb forms", "isCorrect": false, "rationale": "The technique is a timeline, not a family tree. You visualize a horizontal line with AHORA (now) in the center, PASADO on the left, and FUTURO on the right."}, {"text": "Visualizing a horizontal line with AHORA (now) in the center, placing completed past events as dots on the left", "isCorrect": true, "rationale": "The memory tip describes a mental timeline: a long horizontal line with 'AHORA' (now) in the middle. Every preterite event is a completed dot on the left (past) side. This visualization reinforces that the preterite = completed, finished actions."}, {"text": "Making a color-coded chart of all Spanish verb endings", "isCorrect": false, "rationale": "A color-coded chart is not the technique described. The memory tip uses a mental timeline to place preterite events in the past."}, {"text": "Writing sentences in the present tense and then changing them to preterite", "isCorrect": false, "rationale": "Converting sentences is a practice exercise but not the specific mental timeline technique described in the memory tip."}], "id": "q06"}, {"question": "What does 'Que hiciste el fin de semana?' mean?", "options": [{"text": "What are you going to do on the weekend?", "isCorrect": false, "rationale": "Future plans use ir + a: 'Que vas a hacer el fin de semana?' 'Hiciste' is preterite (past): What did you do?"}, {"text": "What did you do over the weekend?", "isCorrect": true, "rationale": "'Que hiciste' = What did you do? (hiciste is the tu preterite of hacer). 'El fin de semana' = the weekend. This is a common conversation starter."}, {"text": "What do you do every weekend?", "isCorrect": false, "rationale": "Habitual actions use present tense or imperfect. 'Que hiciste' (preterite) specifically asks about what you did this past weekend."}, {"text": "What did he do over the weekend?", "isCorrect": false, "rationale": "Hiciste is the TU form (you did), not the el/ella form. 'Que hiciste el fin de semana?' asks 'What did YOU do over the weekend?'"}], "id": "q07"}, {"question": "What is a 'corrido' in Mexican music?", "options": [{"text": "A classical symphony performed in major concert halls", "isCorrect": false, "rationale": "A corrido is a folk/popular form, not a classical symphony. It is a type of narrative ballad common in Mexican folk music."}, {"text": "A type of narrative ballad common in Mexican folk music", "isCorrect": true, "rationale": "The song box describes a corrido as 'a type of narrative ballad common in Mexican folk music.' 'La cucaracha' originated as a corrido during the Mexican Revolution (1910-1920)."}, {"text": "A formal dance performed at weddings and quinceanas", "isCorrect": false, "rationale": "A corrido is a song genre, not a dance form. It is a narrative ballad that tells stories of daily life and struggle."}, {"text": "A children's lullaby sung at bedtime", "isCorrect": false, "rationale": "Lullabies are 'canciones de cuna'. A corrido is a narrative ballad — 'La cucaracha' is a well-known example."}], "id": "q08"}, {"question": "In the story about Laura's birthday, what happened 'de repente' (suddenly)?", "options": [{"text": "The cake fell on the floor.", "isCorrect": false, "rationale": "The cake is mentioned later — everyone ate it. The sudden event was someone turning off the lights, followed by everyone shouting 'iSorpresa!'"}, {"text": "Someone turned off the lights and everyone shouted 'iSorpresa!'", "isCorrect": true, "rationale": "The story says: 'De repente, alguien apago las luces y todos gritaron: iSorpresa!' This is the climactic moment, introduced by 'de repente' (suddenly)."}, {"text": "Laura's friends arrived unexpectedly early.", "isCorrect": false, "rationale": "The friends arrived at six in the afternoon — this was expected. The sudden moment was when someone turned off the lights for the surprise."}, {"text": "The music stopped and everyone went home.", "isCorrect": false, "rationale": "The party continued after the surprise. The 'de repente' moment was someone turning off the lights followed by the surprise shout."}], "id": "q09"}, {"question": "What does the activity 'Mi mejor dia del mes pasado' ask students to do?", "options": [{"text": "Write a poem about a future dream vacation using the future tense", "isCorrect": false, "rationale": "The activity focuses on the past, not the future. Students write about a real or memorable day from last month using preterite verbs."}, {"text": "Write five preterite sentences about a memorable day from last month using sequencing words", "isCorrect": true, "rationale": "The activity says: 'Think about one of the best days you had last month... Write five sentences about what happened using -ar preterite verbs and sequencing words' like primero, despues, luego, entonces, finalmente."}, {"text": "Translate a paragraph from English into Spanish preterite forms", "isCorrect": false, "rationale": "The activity is original writing, not translation. Students write from their own memories using preterite verbs and sequencing words."}, {"text": "Interview a partner about their weekend using question words", "isCorrect": false, "rationale": "While partner conversations appear elsewhere in the chapter, this specific activity asks students to write five preterite sentences about their own memorable day."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
