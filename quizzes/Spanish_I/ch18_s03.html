<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 18, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the yo preterite ending differ between -ar verbs and -er/-ir verbs?", "options": [{"text": "-ar verbs use -e (hable); -er/-ir verbs use -i (comi)", "isCorrect": true, "rationale": "The comparison note shows: -ar yo preterite ends in accented -e (hable, camie), while -er/-ir yo preterite ends in accented -i (comi, viví, escribi)."}, {"text": "All verbs use the same -o ending in yo preterite", "isCorrect": false, "rationale": "Yo preterite endings are: -e for -ar verbs and -i for -er/-ir verbs. The -o ending belongs to el/ella, not yo."}, {"text": "-ar verbs use -o; -er/-ir verbs use -e", "isCorrect": false, "rationale": "This is incorrect. -ar yo preterite = -e (hable); -er/-ir yo preterite = -i (comi). The el/ella endings are -o and -io respectively."}, {"text": "There is no difference — all yo preterite forms end in -i", "isCorrect": false, "rationale": "-ar verbs use -e in yo preterite (hable), while -er/-ir use -i (comi). They are different."}]}, {"question": "In the story 'Un dia dificil', why did the narrator not eat much at lunch?", "options": [{"text": "Because the school cafeteria was closed that day.", "isCorrect": false, "rationale": "The story does not mention the cafeteria being closed. The narrator did not eat much because they were worried about the afternoon exam."}, {"text": "Because they were worried about the afternoon exam.", "isCorrect": true, "rationale": "The story says: 'No comi mucho en el almuerzo porque estaba preocupado/a por el examen de la tarde.' The reason is worry about the afternoon exam."}, {"text": "Because they arrived late and missed lunch.", "isCorrect": false, "rationale": "The narrator was late to school but not late to lunch specifically. They didn't eat much because of worry about the exam."}, {"text": "Because the food tasted bad.", "isCorrect": false, "rationale": "There is no mention of bad food. The reason for not eating was emotional: being preocupado/a (worried) about the exam."}]}, {"question": "In the conversation about the science fair, what did Mateo receive?", "options": [{"text": "First place in the science fair", "isCorrect": false, "rationale": "Mateo received second place, not first. He says: 'iSi! Recibi el segundo lugar.'"}, {"text": "Second place in the science fair", "isCorrect": true, "rationale": "Mateo says: 'iSi! Recibi el segundo lugar. Estaba muy emocionado cuando anunciaron los resultados.' He received second place."}, {"text": "A special award for creativity", "isCorrect": false, "rationale": "Mateo received second place in the fair, not a special creativity award."}, {"text": "A scholarship to a science camp", "isCorrect": false, "rationale": "There is no mention of a scholarship. Mateo received second place in the science fair."}]}, {"question": "What phrase means 'How did it go?' in the conversation about the science fair?", "options": [{"text": "Que hiciste ayer?", "isCorrect": false, "rationale": "'Que hiciste ayer?' means 'What did you do yesterday?' The phrase asking how something went is '¿Como te fue?'"}, {"text": "Como te fue?", "isCorrect": true, "rationale": "'¿Como te fue?' means 'How did it go?' or 'How did things go for you?' It is a common follow-up question after an event or test."}, {"text": "Que paso?", "isCorrect": false, "rationale": "'Que paso?' means 'What happened?' While similar, '¿Como te fue?' specifically asks how something went for the person."}, {"text": "Ganaste un premio?", "isCorrect": false, "rationale": "'¿Ganaste un premio?' means 'Did you win an award?' The general 'how did it go' question is '¿Como te fue?'"}]}, {"question": "How was Sofia feeling during the science fair?", "options": [{"text": "Excited and very confident", "isCorrect": false, "rationale": "Sofia was nervous, not excited and confident. She says: 'estaba un poco nerviosa' (I was a little nervous)."}, {"text": "A little nervous", "isCorrect": true, "rationale": "Sofia says: 'yo tambien participe, pero estaba un poco nerviosa.' She was a little nervous during the fair, though she also says she learned a lot from the experience."}, {"text": "Angry that she didn't win a prize", "isCorrect": false, "rationale": "Sofia does not express anger. She says she was nervous and that she learned from the experience."}, {"text": "Bored and uninterested in the event", "isCorrect": false, "rationale": "Sofia participated in the fair and expressed that she learned from the experience — she was not bored."}]}, {"question": "What does 'Al final' mean as a story-ending transition phrase?", "options": [{"text": "Suddenly", "isCorrect": false, "rationale": "'De repente' means suddenly. 'Al final' means in the end or at the end."}, {"text": "First", "isCorrect": false, "rationale": "'Primero' means first. 'Al final' means in the end."}, {"text": "In the end / at the end", "isCorrect": true, "rationale": "'Al final' means in the end or at the end. It is a narrative wrap-up phrase. Example: 'Al final, todos comieron una torta de chocolate.'"}, {"text": "Then / afterwards", "isCorrect": false, "rationale": "'Despues' or 'luego' means then/afterwards. 'Al final' means in the end."}]}, {"question": "In the story 'Un dia dificil', what did the narrator's friends do to comfort them?", "options": [{"text": "They gave them food at lunch to cheer them up.", "isCorrect": false, "rationale": "The story does not mention friends giving food. The friends hugged the narrator and told them everything was going to be okay."}, {"text": "They hugged the narrator and told them everything was going to be okay.", "isCorrect": true, "rationale": "The story says: 'mis amigos me abrazaron y me dijeron que todo iba a estar bien.' The friends hugged (abrazar -> abrazaron) and told (decir -> dijeron) the narrator that everything would be fine."}, {"text": "They helped the narrator study for the afternoon exam.", "isCorrect": false, "rationale": "There is no mention of studying together. The friends offered emotional support by hugging and words of encouragement."}, {"text": "They spoke to the teacher on the narrator's behalf.", "isCorrect": false, "rationale": "There is no mention of the friends talking to the teacher. Their support was direct: hugs and reassuring words."}]}, {"question": "What happened at the end of the story 'Un dia dificil'?", "options": [{"text": "The narrator got a perfect score on the exam.", "isCorrect": false, "rationale": "The story does not mention the exam score. The narrator wrote the exam, learned from their mistakes, and laughed about the whole situation at the end."}, {"text": "The narrator wrote the exam, learned from mistakes, and laughed about the whole situation.", "isCorrect": true, "rationale": "'Escribi el examen, aprendi de mis errores, y al final me rei de toda la situacion.' The story ends on a positive note: learning, resilience, and humor."}, {"text": "The narrator stayed home sick and missed the exam.", "isCorrect": false, "rationale": "The narrator ran to school (late) and did take the exam. The story ends with them writing the exam and reflecting positively."}, {"text": "The narrator's friends took the exam instead.", "isCorrect": false, "rationale": "There is no such event. The narrator took the exam themselves and at the end laughed about the difficult day."}]}, {"question": "What is the preterite of 'correr' (to run) for 'yo'?", "options": [{"text": "corri", "isCorrect": true, "rationale": "Corri is the yo preterite of correr (-er verb): accent on the -i. In the story: 'Corri a la escuela pero llegue tarde de todas formas' (I ran to school but arrived late anyway)."}, {"text": "corro", "isCorrect": false, "rationale": "Corro is the yo PRESENT form (I run). The yo preterite is corri (with accent on the -i)."}, {"text": "corriste", "isCorrect": false, "rationale": "Corriste is the TU preterite form (you ran). The yo preterite is corri."}, {"text": "corrio", "isCorrect": false, "rationale": "Corrio is the el/ella preterite (he/she ran). The yo preterite is corri."}]}, {"question": "What does 'la feria de ciencias' mean?", "options": [{"text": "The history fair", "isCorrect": false, "rationale": "History is 'historia', not 'ciencias'. 'La feria de ciencias' is the science fair."}, {"text": "The science fair", "isCorrect": true, "rationale": "'La feria' means fair/fair event, and 'de ciencias' = of science. La feria de ciencias = the science fair, the setting of the conversation between Sofia and Mateo."}, {"text": "The chemistry lab", "isCorrect": false, "rationale": "A chemistry lab would be 'el laboratorio de quimica'. 'La feria de ciencias' is the science fair."}, {"text": "The technology contest", "isCorrect": false, "rationale": "A technology contest would be 'el concurso de tecnologia'. 'La feria de ciencias' means the science fair."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
