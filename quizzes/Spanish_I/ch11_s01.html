<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 11, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which verb is used for most weather expressions in Spanish — NOT ser or estar?", "options": [{"text": "tener", "isCorrect": false, "rationale": "Tener is used for physical sensations (tengo hambre, tengo frío as personal feeling) but NOT for weather descriptions."}, {"text": "hacer", "isCorrect": true, "rationale": "Hacer (to do/make) is the verb used for most weather expressions: hace calor, hace frío, hace sol, hace viento."}, {"text": "ser", "isCorrect": false, "rationale": "Ser is NOT used for weather. The exceptions (llueve, nieva, está nublado) use separate verbs or estar, but the main pattern is hacer."}, {"text": "ir", "isCorrect": false, "rationale": "Ir means to go. It is not used for weather descriptions."}]}, {"question": "How do you say 'It is windy' in Spanish?", "options": [{"text": "Está viento.", "isCorrect": false, "rationale": "Estar is not used with viento for weather. Use hacer: Hace viento (literally: it makes wind)."}, {"text": "Es viento.", "isCorrect": false, "rationale": "Ser is not used for weather expressions. Use hacer: Hace viento."}, {"text": "Hace viento.", "isCorrect": true, "rationale": "Hace viento literally means 'it makes wind' and is the Spanish expression for 'it is windy.' El viento (the wind) is the related noun."}, {"text": "Hay viento.", "isCorrect": false, "rationale": "While hay viento is sometimes used informally, the standard weather expression taught here is hace viento."}]}, {"question": "What is unique about Chile's climate according to the culture box?", "options": [{"text": "It has only one season — a year-round warm, tropical climate.", "isCorrect": false, "rationale": "Chile actually has virtually every climate on Earth within its borders, from the driest desert to glaciers and Mediterranean climate."}, {"text": "It stretches nearly 4,300 km and contains virtually every climate on Earth.", "isCorrect": true, "rationale": "Chile is one of the most geographically diverse countries on Earth. Its extraordinary length means it spans from the driest desert (Atacama) to Mediterranean climate to glaciers and Patagonia."}, {"text": "It only has two seasons because it is near the equator.", "isCorrect": false, "rationale": "Countries near the equator (like Colombia, Ecuador) have two seasons. Chile, a long thin country far from the equator, has extraordinary climate variety."}, {"text": "It always has snow because of the Andes Mountains.", "isCorrect": false, "rationale": "Parts of Chile's north (Atacama) are extremely dry. Not all of Chile has snow; it varies enormously by region."}]}, {"question": "In many parts of Latin America near the equator, the year is divided into how many seasons?", "options": [{"text": "Four seasons: spring, summer, autumn, winter", "isCorrect": false, "rationale": "Near the equator (Ecuador, Colombia, parts of Central America), the four-season system does not really apply."}, {"text": "Two seasons: la estación seca (dry) and la estación lluviosa (rainy)", "isCorrect": true, "rationale": "Near the equator, the year is divided into two seasons: the dry season (la estación seca) and the rainy season (la estación lluviosa)."}, {"text": "Three seasons: dry, rainy, and cool", "isCorrect": false, "rationale": "The text describes two seasons near the equator: dry and rainy. A three-season system is not mentioned."}, {"text": "One season: it is always the same temperature year-round", "isCorrect": false, "rationale": "While tropical regions have less temperature variation, they still have clear dry and rainy seasons, not a single unchanging season."}]}, {"question": "Which weather expression uses 'estar' instead of 'hacer'?", "options": [{"text": "Hace sol.", "isCorrect": false, "rationale": "Hace sol uses hacer, not estar. It means it is sunny."}, {"text": "Hace calor.", "isCorrect": false, "rationale": "Hace calor uses hacer, not estar. It means it is hot."}, {"text": "Está nublado.", "isCorrect": true, "rationale": "Está nublado (it is cloudy) is the exception that uses estar rather than hacer. Weather in Spanish uses a mix of verbs!"}, {"text": "Hace viento.", "isCorrect": false, "rationale": "Hace viento uses hacer, not estar. It means it is windy."}]}, {"question": "What is the Atacama Desert known for in the context of world climate?", "options": [{"text": "It is the hottest place on Earth in summer.", "isCorrect": false, "rationale": "The Atacama is notable for being the DRIEST place on Earth, not the hottest."}, {"text": "It is the driest place on Earth — some parts have never recorded rain.", "isCorrect": true, "rationale": "The culture box describes the Desierto de Atacama in northern Chile as the driest place on Earth — some parts have never recorded a single drop of rain."}, {"text": "It is the highest desert in the world.", "isCorrect": false, "rationale": "The Atacama is notable for its extreme dryness, not specifically for being the highest. The text emphasizes it as the driest place on Earth."}, {"text": "It has the world's largest thunderstorms each year.", "isCorrect": false, "rationale": "The Atacama is famous for extreme dryness — the opposite of storms. Some parts have never recorded rain."}]}, {"question": "In the song 'Juguemos en el bosque,' what is the lobo (wolf) doing while the other children sing?", "options": [{"text": "Hunting for food in the forest", "isCorrect": false, "rationale": "In the song, the wolf is getting dressed (putting on pantalones, chaleco, saco), not hunting."}, {"text": "Getting dressed — putting on clothing items", "isCorrect": true, "rationale": "The song shows the wolf putting on clothes: los pantalones (pants), el chaleco (vest), el saco (jacket/coat). The suspense builds until the wolf is fully dressed and runs out."}, {"text": "Sleeping in the forest", "isCorrect": false, "rationale": "The wolf is not sleeping; the children ask ¿Lobo estás? (Wolf, are you ready?) and the wolf responds with each clothing item being put on."}, {"text": "Eating a meal with his family", "isCorrect": false, "rationale": "The wolf is getting dressed, not eating. The game creates suspense as children sing while the wolf dresses."}]}, {"question": "What does 'la primavera' mean?", "options": [{"text": "summer", "isCorrect": false, "rationale": "El verano means summer. La primavera means spring."}, {"text": "autumn / fall", "isCorrect": false, "rationale": "El otoño means autumn/fall. La primavera means spring."}, {"text": "spring", "isCorrect": true, "rationale": "La primavera means spring. The four seasons are: la primavera (spring), el verano (summer), el otoño (autumn), el invierno (winter)."}, {"text": "winter", "isCorrect": false, "rationale": "El invierno means winter. La primavera means spring."}]}, {"question": "According to the vocabulary, what does 'llueve' describe?", "options": [{"text": "It is snowing", "isCorrect": false, "rationale": "Nieva means it is snowing. Llueve means it is raining."}, {"text": "It is raining / it rains", "isCorrect": true, "rationale": "Llueve (from llover) means it is raining or it rains. The noun form is la lluvia (the rain)."}, {"text": "It is foggy", "isCorrect": false, "rationale": "Hay niebla means there is fog. Llueve means it is raining."}, {"text": "It is cloudy", "isCorrect": false, "rationale": "Está nublado means it is cloudy. Llueve means it is raining."}]}, {"question": "What is the connection between weather expressions and nature words like 'el sol' and 'el viento'?", "options": [{"text": "They are completely unrelated and must be memorized separately.", "isCorrect": false, "rationale": "They are directly connected: el sol (the sun) appears inside hace sol (it is sunny), and el viento (the wind) inside hace viento (it is windy)."}, {"text": "The nature noun is embedded inside the weather expression — learning both together gives two words for the price of one.", "isCorrect": true, "rationale": "The vocabulary note points out: el sol is inside hace sol; el viento is inside hace viento; la lluvia is the noun form of llueve. Learning them together is efficient."}, {"text": "Nature words are always feminine while weather expressions use hacer.", "isCorrect": false, "rationale": "Nature words have mixed gender: el sol, el viento are masculine; la lluvia, la nieve are feminine."}, {"text": "Weather expressions use the definite article while nature words do not.", "isCorrect": false, "rationale": "This is not the connection. The point is that nature nouns appear inside weather expressions, making them easy to learn together."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
