        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "When should you use the PRETERITE tense in a narrative?", "options": [{"text": "To describe the ongoing background setting and mood", "isCorrect": false, "rationale": "Background setting and mood use the imperfect. The preterite is used for completed, specific actions that move the story forward."}, {"text": "For completed, specific actions; sequences of events; and actions that interrupt the background", "isCorrect": true, "rationale": "The grammar box lists preterite uses: completed specific actions, actions that interrupt the background, sequences of events (first...then...finally), and a specific number of times."}, {"text": "To describe how old someone was and what time it was", "isCorrect": false, "rationale": "Age and time in the past use the imperfect: Tenia cinco anos. Eran las tres. The preterite is for completed, specific events."}, {"text": "To express habitual actions that happened over and over in the past", "isCorrect": false, "rationale": "Habitual repeated past actions (used to do) use the imperfect. The preterite marks completed, specific, one-time or counted events."}], "id": "q01"}, {"question": "In the sentence 'Dormia cuando sono el telefono', which tense/verb expresses the interrupting event?", "options": [{"text": "Dormia (imperfect) — the interrupting event", "isCorrect": false, "rationale": "Dormia is the ongoing background action (I was sleeping). Sono is the interrupting event (the phone rang — preterite)."}, {"text": "Sono (preterite) — the interrupting event that broke the ongoing background", "isCorrect": true, "rationale": "The grammar box uses this exact example: 'dormia' = ongoing background (imperfect); 'sono el telefono' = interrupting event (preterite). The phone ringing is a completed, sudden action."}, {"text": "Both verbs are in the imperfect — the sentence describes a background scene", "isCorrect": false, "rationale": "Only dormia (I was sleeping) is imperfect. Sono (rang) is preterite — it is the specific event that interrupted the background sleeping."}, {"text": "Both verbs are in the preterite — the sentence describes two completed actions", "isCorrect": false, "rationale": "Only sono is preterite. Dormia is imperfect. The contrast is intentional: background (imperfect) + interrupting event (preterite)."}], "id": "q02"}, {"question": "Which signal words suggest the IMPERFECT tense?", "options": [{"text": "ayer, anoche, de repente, una vez", "isCorrect": false, "rationale": "Ayer (yesterday), anoche (last night), de repente (suddenly), and una vez (once) all signal specific completed events — preterite territory."}, {"text": "cada ano, siempre, todos los dias, de nino", "isCorrect": true, "rationale": "These are imperfect signal words: cada ano (every year), siempre (always), todos los dias (every day), de nino (as a child) — all indicating habitual, repeated, or ongoing past actions."}, {"text": "el lunes pasado, hace tres dias, por fin", "isCorrect": false, "rationale": "El lunes pasado (last Monday), hace tres dias (three days ago), and por fin (finally/at last) all signal completed specific events — preterite territory."}, {"text": "primero, despues, luego, finalmente", "isCorrect": false, "rationale": "Primero, despues, luego, finalmente are sequencing words that introduce a series of completed events — they signal the preterite, not the imperfect."}], "id": "q03"}, {"question": "In the two-tense story, which sentence correctly uses the imperfect for background and preterite for action?", "options": [{"text": "Llovio mucho y hizo frio. Escuchaba un ruido.", "isCorrect": false, "rationale": "This reverses the tenses. Background weather should be imperfect (llovia, hacia frio) and the sudden event should be preterite (escuche)."}, {"text": "Llovia mucho y hacia frio. De repente, escuche un ruido.", "isCorrect": true, "rationale": "Perfect use of both tenses: llovia/hacia (imperfect) = ongoing background weather; escuche (preterite) = the sudden event introduced by 'de repente.'"}, {"text": "Llovia mucho y hacia frio. Escuchaba un ruido.", "isCorrect": false, "rationale": "The weather background is correct (imperfect), but escuchaba (imperfect) should be escuche (preterite) — the noise-hearing is an interrupting event, not ongoing background."}, {"text": "Llovio mucho y hizo frio. De repente, escuche un ruido.", "isCorrect": false, "rationale": "The specific event (escuche) is correctly preterite, but the weather background should be imperfect (llovia, hacia frio) since it was an ongoing condition."}], "id": "q04"}, {"question": "What does 'Cada ano, mi familia celebraba la Navidad con una posada' illustrate?", "options": [{"text": "A specific completed action using the preterite", "isCorrect": false, "rationale": "'Celebraba' is imperfect, not preterite. The sentence illustrates a habitual past action — something the family used to do every year."}, {"text": "A habitual past action using the imperfect — something the family used to do every year", "isCorrect": true, "rationale": "'Cada ano' (every year) + 'celebraba' (imperfect) = habitual past action. 'My family used to celebrate Christmas with a posada every year' — a repeated tradition."}, {"text": "A background description of the holiday setting", "isCorrect": false, "rationale": "While habitual actions can serve as background, this sentence specifically illustrates the 'habitual/repeated past actions' use of the imperfect."}, {"text": "An action interrupted by another event", "isCorrect": false, "rationale": "There is no interrupting event here. The sentence illustrates habitual past action: 'cada ano' + imperfect."}], "id": "q05"}, {"question": "What cultural celebration is described in the Día de los Muertos culture box?", "options": [{"text": "A somber funeral ceremony held in Catholic churches on November 1st", "isCorrect": false, "rationale": "Dia de los Muertos is described as joyful, not somber. It is celebrated with colorful altars, music, food, and love."}, {"text": "A joyful celebration on November 1-2 honoring loved ones who have passed, with colorful altars and marigold flowers", "isCorrect": true, "rationale": "The culture box: 'Celebrated on November 1st and 2nd, el Dia de los Muertos honors loved ones who have passed away... Far from being a sad occasion, it is a joyful reunion — full of music, food, laughter, and love.'"}, {"text": "A harvest festival celebrated in August with singing and dancing in the streets", "isCorrect": false, "rationale": "Dia de los Muertos is in November (1st and 2nd), not August, and it specifically honors those who have passed away."}, {"text": "A religious procession with colored sawdust carpets called alfombras", "isCorrect": false, "rationale": "Alfombras are associated with Semana Santa (Holy Week before Easter), not Dia de los Muertos. Dia de los Muertos features ofrendas (altars) with marigold flowers."}], "id": "q06"}, {"question": "What does 'Supe la verdad ayer' mean, and how does it differ from 'Sabia la verdad'?", "options": [{"text": "Both mean the same thing — I knew the truth.", "isCorrect": false, "rationale": "They actually mean different things. Supe (preterite) = I found out (a new discovery). Sabia (imperfect) = I knew all along (existing knowledge)."}, {"text": "'Supe la verdad ayer' = I found out the truth yesterday (preterite, new discovery); 'Sabia la verdad' = I knew the truth all along (imperfect, ongoing state)", "isCorrect": true, "rationale": "The note explains: 'Supe la verdad ayer. I found out the truth yesterday.' vs. 'Sabia la verdad. I knew the truth (all along).' Saber in the preterite means to find out; in the imperfect, it means to know."}, {"text": "'Supe' is formal; 'sabia' is informal — same meaning.", "isCorrect": false, "rationale": "The difference is not formality. Supe (preterite) = found out/learned; sabia (imperfect) = knew all along."}, {"text": "'Supe' is used only in questions; 'sabia' only in statements.", "isCorrect": false, "rationale": "Both can appear in questions or statements. The distinction is the type of knowing: new discovery (preterite) vs. ongoing knowledge (imperfect)."}], "id": "q07"}, {"question": "What is 'Tortillitas de mantequilla' and why is it included in Chapter 21?", "options": [{"text": "A Mexican recipe for making tortillas, included to teach food vocabulary", "isCorrect": false, "rationale": "Tortillitas de mantequilla is a traditional rhyme/game, not a recipe. It is included because the clapping action represents a habitual past activity described perfectly with the imperfect."}, {"text": "A traditional rhyme where a caregiver claps a baby's hands — the repeated action connects to imperfect tense usage", "isCorrect": true, "rationale": "The song box notes: 'The rhyme celebrates a habitual, repeated action (making tortillas) — exactly the kind of thing you would describe using the imperfecto: Hacia tortillitas todos los dias.'"}, {"text": "A famous song by Gabriela Mistral about family life in Chile", "isCorrect": false, "rationale": "Tortillitas de mantequilla is a traditional Mexican/Latin American children's rhyme, not a poem by Gabriela Mistral."}, {"text": "A Carnaval song sung during the Bolivian Carnaval de Oruro", "isCorrect": false, "rationale": "This is a baby/toddler clapping game rhyme, not a Carnaval song. It is from Mexico and Latin America generally."}], "id": "q08"}, {"question": "What is the Carnaval de Oruro in Bolivia?", "options": [{"text": "A private religious ceremony held inside Catholic churches", "isCorrect": false, "rationale": "Carnaval de Oruro is a massive public parade, not a private church ceremony. It is recognized by UNESCO for its elaborate costumes and mix of indigenous and Catholic heritage."}, {"text": "A UNESCO-recognized celebration featuring thousands of dancers in elaborate costumes, blending indigenous Andean and Catholic heritage", "isCorrect": true, "rationale": "The culture box describes: 'Bolivia's Carnaval de Oruro — recognized by UNESCO — features thousands of dancers in elaborate, handcrafted costumes parading through the streets in a tradition blending indigenous Andean and Catholic heritage.'"}, {"text": "Brazil's largest annual carnival, drawing millions of tourists to Rio de Janeiro", "isCorrect": false, "rationale": "Brazil's Carnaval de Rio de Janeiro is described as the world's largest carnival. Carnaval de Oruro is Bolivia's famous celebration."}, {"text": "A nine-night celebration reenacting Mary and Joseph's search for shelter", "isCorrect": false, "rationale": "That describes Las Posadas in Mexico. Carnaval de Oruro is Bolivia's Carnaval — a massive parade of costumed dancers."}], "id": "q09"}, {"question": "What does 'Llegue, salude a todos y baile toda la noche' illustrate in terms of tense use?", "options": [{"text": "Three imperfect verbs describing ongoing background actions", "isCorrect": false, "rationale": "All three verbs (llegue, salude, baile) are preterite — they are a sequence of completed events, not ongoing background actions."}, {"text": "A sequence of three completed preterite events: I arrived, I greeted everyone, and I danced all night", "isCorrect": true, "rationale": "The grammar box uses this as an example of 'una serie de eventos' (a sequence of events) — all preterite: Llegue (I arrived), salude (I greeted), baile (I danced). A chain of completed actions."}, {"text": "A mix of preterite and imperfect: the first two are preterite, the last is imperfect", "isCorrect": false, "rationale": "All three are preterite. The series of completed sequential events all use the preterite."}, {"text": "A reflexive construction where each verb refers back to the subject", "isCorrect": false, "rationale": "None of these verbs are reflexive (they lack me/te/se pronouns). They are all regular preterite forms in a sequence."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
