    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 19, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the reading, where was Gabriel Garcia Marquez born and what was his early career?", "options": [{"text": "He was born in Mexico and worked as a teacher before becoming a writer.", "isCorrect": false, "rationale": "Garcia Marquez was born in Colombia, not Mexico. He worked as a journalist (periodista) before becoming a famous writer."}, {"text": "He was born in Colombia and worked as a journalist before becoming a famous writer.", "isCorrect": true, "rationale": "The reading states: 'Gabriel Garcia Marquez nacio en Colombia en 1927... Trabajo muchos anos como periodista antes de ser escritor famoso.'"}, {"text": "He was born in Venezuela and was a poet before becoming a novelist.", "isCorrect": false, "rationale": "Garcia Marquez was Colombian, not Venezuelan. He worked as a journalist (not a poet) before his fiction fame."}, {"text": "He was born in Argentina and studied law before becoming a writer.", "isCorrect": false, "rationale": "The reading says he was Colombian and studied law (Derecho), but he worked as a journalist before becoming famous. He was not Argentine."}], "id": "q01"}, {"question": "When did Garcia Marquez write 'Cien anos de soledad', and what happened immediately?", "options": [{"text": "In 1927 — the year he was born", "isCorrect": false, "rationale": "Garcia Marquez was born in 1927. He wrote 'Cien anos de soledad' in 1967."}, {"text": "In 1967 — the novel was an enormous success from the first day", "isCorrect": true, "rationale": "The reading states: 'Hizo su obra mas conocida, Cien anos de soledad, en 1967. La novela fue un exito enorme desde el primer dia.'"}, {"text": "In 1982 — the year he won the Nobel Prize", "isCorrect": false, "rationale": "He won the Nobel Prize in 1982, but Cien anos de soledad was written in 1967. These are two separate events."}, {"text": "In 1995 — after retiring from journalism", "isCorrect": false, "rationale": "1995 is not the correct year. Cien anos de soledad was written in 1967."}], "id": "q02"}, {"question": "What does 'fue el primer colombiano en recibir ese honor' mean in the reading?", "options": [{"text": "He was the most important Colombian of the 20th century.", "isCorrect": false, "rationale": "The sentence is specifically about a first: being the first Colombian to receive the Nobel Prize."}, {"text": "He was the first Colombian to receive that honor (the Nobel Prize in Literature).", "isCorrect": true, "rationale": "'Fue el primer colombiano en recibir ese honor' = He was the first Colombian to receive that honor. 'Ese honor' refers to the Nobel Prize in Literature, which he received in 1982 in Stockholm."}, {"text": "He was a famous Colombian who received many honors throughout his life.", "isCorrect": false, "rationale": "The sentence is specifically about being the FIRST Colombian to receive the Nobel Prize, not about multiple honors."}, {"text": "He received an honor from the Colombian government in Stockholm.", "isCorrect": false, "rationale": "The honor was the Nobel Prize in Literature (awarded in Stockholm, Sweden), not an honor from the Colombian government."}], "id": "q03"}, {"question": "In the activity 'Entrevista a alguien famoso', what kind of questions are students asked to write?", "options": [{"text": "Present-tense questions about daily habits", "isCorrect": false, "rationale": "The activity specifically focuses on the preterite tense for interviewing a famous person about past events."}, {"text": "Irregular preterite questions: Cuando fue?, Como hizo?, Donde estuvo?, Que tuvo?", "isCorrect": true, "rationale": "The activity says: 'Write four questions using the preterite: ¿Cuando fue?, ¿Como hizo?, ¿Donde estuvo?, ¿Que tuvo?, then write four answers as if you were that famous person responding.'"}, {"text": "Future-tense questions about plans and goals", "isCorrect": false, "rationale": "The activity focuses on the irregular preterite (fue, hizo, estuvo, tuvo) for past-event interviews, not the future."}, {"text": "Opinion questions using gustar and parecer", "isCorrect": false, "rationale": "Gustar and parecer questions are not the focus of this activity. The activity is about irregular preterite forms in an interview format."}], "id": "q04"}, {"question": "What does 'conduje' mean, and why is it a special preterite form?", "options": [{"text": "I drove — and it is irregular because -ucir verbs have a unique preterite pattern (conduj- stem)", "isCorrect": true, "rationale": "The note explains: 'Verbs ending in -ucir have an irregular preterite: conduje, condujiste, condujo, condujimos, condujeron. The stem changes to conduj- and the third-person plural ends in -eron (not -ieron).'"}, {"text": "I conducted — and it is regular, following the -ir preterite pattern", "isCorrect": false, "rationale": "Conducir is irregular in the preterite — it is not a regular -ir verb preterite. The stem changes to conduj-."}, {"text": "He drove — it is the el/ella form of conducir", "isCorrect": false, "rationale": "Conduje is the YO form (I drove). The el/ella form is condujo."}, {"text": "I constructed — it follows the same pattern as construir", "isCorrect": false, "rationale": "Construir is different from conducir. Conduje means I drove (from conducir), with its own irregular preterite pattern."}], "id": "q05"}, {"question": "In the sentences about professionals, what did 'el carpintero' do?", "options": [{"text": "The carpenter painted a large mural in the plaza.", "isCorrect": false, "rationale": "Painting a mural describes the artista. The carpenter built (construyo) a beautiful table."}, {"text": "The carpenter built a beautiful table.", "isCorrect": true, "rationale": "'El carpintero construyo una mesa hermosa.' (The carpenter built a beautiful table.) Construir -> construyo (preterite, el/ella form with -uir -> y spelling rule)."}, {"text": "The carpenter drew building plans.", "isCorrect": false, "rationale": "Drawing building plans describes el disenador. The carpenter built a beautiful table."}, {"text": "The carpenter flew the plane with great skill.", "isCorrect": false, "rationale": "Flying the plane describes el piloto. The carpenter built a beautiful table."}], "id": "q06"}, {"question": "What does 'Fue, y sigue siendo, una inspiracion' mean from the reading?", "options": [{"text": "He was, and continues to be, an inspiration.", "isCorrect": true, "rationale": "'Fue' = was (preterite of ser). 'Sigue siendo' = continues being (present). Together: 'He was, and continues to be, an inspiration' — showing his lasting impact."}, {"text": "He was an inspiration, but he is no longer remembered.", "isCorrect": false, "rationale": "The phrase 'sigue siendo' (continues to be) indicates his legacy is ongoing, not forgotten."}, {"text": "He will be an inspiration for future generations.", "isCorrect": false, "rationale": "The sentence uses past (fue) and present (sigue siendo), not future tense. His inspiration is both past and present."}, {"text": "He was inspired by writers who came before him.", "isCorrect": false, "rationale": "The sentence says he IS the inspiration for others (una inspiracion para escritores de todo el mundo), not that he was inspired by others."}], "id": "q07"}, {"question": "What notable linguistic feature does the verb 'construir' have in its third-person preterite?", "options": [{"text": "The -uir changes to -uyo and -uyeron with a y inserted", "isCorrect": true, "rationale": "Verbs ending in -uir add y in the third-person preterite: construyo (el/ella) and construyeron (ellos). The unstressed i between vowels becomes y — same rule as leer/creer."}, {"text": "The stem doubles the final consonant: construido", "isCorrect": false, "rationale": "Double consonants are not part of this rule. The -uir verbs insert y in the third-person preterite."}, {"text": "The -ir ending becomes -e in the third person", "isCorrect": false, "rationale": "The -ir does not become -e. The rule is that unstressed i between vowels becomes y: construyo, construyeron."}, {"text": "It is completely regular and follows the standard -ir preterite pattern", "isCorrect": false, "rationale": "Construir is NOT completely regular in the preterite. It has the -uir -> -uyo/-uyeron spelling change."}], "id": "q08"}, {"question": "In the sample interview, what question is asked using 'cuando' in the preterite?", "options": [{"text": "Cuando trabajo como periodista?", "isCorrect": false, "rationale": "That uses a regular -ar preterite verb. The model question in the activity uses an irregular form: ¿Cuando fue su obra mas famosa un exito?"}, {"text": "Cuando fue su obra mas famosa un exito?", "isCorrect": true, "rationale": "The model interview question is: 'Periodista: ¿Cuando fue su obra mas famosa un exito?' — using fue (irregular preterite of ser/ir). The answer: 'Fue un exito inmediatamente — en 1967.'"}, {"text": "Cuando nacio usted?", "isCorrect": false, "rationale": "While ¿Cuando nacio? is a natural question, the specific model provided in the activity uses fue: ¿Cuando fue su obra mas famosa un exito?"}, {"text": "Cuando estudio Derecho?", "isCorrect": false, "rationale": "This is a question drawn from the reading's content, but the model interview question in the activity specifically uses fue: ¿Cuando fue su obra mas famosa un exito?"}], "id": "q09"}, {"question": "What does 'la artista pinto un mural enorme en la plaza' mean?", "options": [{"text": "The artist is painting a large mural in the plaza.", "isCorrect": false, "rationale": "Pinto (with accent on the o) is the el/ella PRETERITE (she painted). Present would be 'pinta'."}, {"text": "The artist painted an enormous mural in the plaza.", "isCorrect": true, "rationale": "'Pinto' (with accent) is the ella preterite of pintar (to paint). 'Un mural enorme' = an enormous mural. 'En la plaza' = in the plaza. She painted an enormous mural in the plaza."}, {"text": "The artist will paint a large mural in the plaza.", "isCorrect": false, "rationale": "Future would be 'va a pintar'. 'Pinto' (accent on -o) is preterite: she painted."}, {"text": "The artist used to paint enormous murals in the plaza.", "isCorrect": false, "rationale": "Used to paint would be the imperfect: pintaba. 'Pinto' (accent) is preterite — she painted (completed action)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
