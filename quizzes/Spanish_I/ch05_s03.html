<script>
var QUESTIONS = [{"question": "Which statement best summarizes the \"Memory trick\" provided for distinguishing between *ser* and *estar*?", "options": [{"text": "SER describes actions, while ESTAR describes thoughts.", "isCorrect": false, "rationale": "This statement is incorrect. The memory trick relates SER to 'Stable / Standing truth' and ESTAR to 'Ephemeral / Ever-changing,' not actions or thoughts."}, {"text": "SER is for stable, inherent truths, and ESTAR is for ephemeral, ever-changing states at a specific moment.", "isCorrect": true, "rationale": "This accurately reflects the memory trick: 'SER = Stable / Standing truth — what something IS no matter what' and 'ESTAR = Ephemeral / Ever-changing — how it is at this Exact moment.'"}, {"text": "SER is used for locations, and ESTAR is used for descriptions.", "isCorrect": false, "rationale": "This is incorrect. While ESTAR can be used for location, the core distinction of the memory trick is about stability vs. change, not just location vs. description."}, {"text": "SER indicates a temporary condition, while ESTAR indicates a permanent characteristic.", "isCorrect": false, "rationale": "This statement reverses the core meaning of the memory trick. SER is for stable/permanent, and ESTAR is for ephemeral/temporary."}], "id": "q01"}, {"question": "A chef tastes a new recipe and wants to describe its flavor *right now* by saying, \"¡Este plato ______ delicioso!\" Based on the memory trick, which verb should the chef use and why?", "options": [{"text": "Ser, because the deliciousness is an inherent quality of the dish.", "isCorrect": false, "rationale": "This is incorrect. While deliciousness can be a quality, the text's '¡Ojo!' box explicitly states native speakers use 'estar' for food adjectives to describe how food tastes 'at this moment,' which aligns with ESTAR's 'Ephemeral / Ever-changing' nature, not SER's 'Stable / Standing truth.'"}, {"text": "Estar, because the flavor is an ephemeral, 'ever-changing' state at this exact moment.", "isCorrect": true, "rationale": "This is correct. The 'Memory trick' defines ESTAR as 'Ephemeral / Ever-changing — how it is at this Exact moment.' The '¡Ojo!' section confirms that 'estar' is used with food adjectives like 'delicioso' to describe how food tastes 'at this moment,' fitting the ephemeral nature."}, {"text": "Ser, because 'delicioso' is a common adjective for food.", "isCorrect": false, "rationale": "This is incorrect. The choice between SER and ESTAR is not based on how common an adjective is, but rather on whether it describes a stable truth or an ephemeral state, as explained by the memory trick and the '¡Ojo!' section."}, {"text": "Estar, because the chef is in the kitchen.", "isCorrect": false, "rationale": "This is incorrect. While ESTAR is used for location, the reason for choosing ESTAR with 'delicioso' is to describe the *flavor's temporary state*, not the chef's location. The question asks about the dish's flavor."}], "id": "q02"}, {"question": "According to the \"¡Ojo! — Ser vs. Estar cambia el significado\" section, when describing how food *tastes or feels at this moment* using adjectives like *rico* or *caliente*, which verb should native speakers use?", "options": [{"text": "Ser, because these are inherent qualities of the food.", "isCorrect": false, "rationale": "This is incorrect. The '¡Ojo!' box explicitly states that native speakers use 'estar' with food adjectives like 'rico' and 'caliente' to describe how food tastes or feels *at this moment*, not inherent qualities."}, {"text": "Estar, to convey the temporary taste or feeling of the food.", "isCorrect": true, "rationale": "This is correct. The '¡Ojo!' section states: 'Native speakers use estar with food adjectives like rico, delicioso, bueno, malo, caliente, frío to describe how food tastes or feels at this moment.'"}, {"text": "Either ser or estar, as they are interchangeable in this context.", "isCorrect": false, "rationale": "This is incorrect. The section title 'Ser vs. Estar cambia el significado' directly contradicts the idea of interchangeability, highlighting that the choice of verb *changes the meaning* with food adjectives."}, {"text": "Neither, as these adjectives are typically used without a 'to be' verb.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly discusses using 'ser' or 'estar' with these adjectives and how the choice impacts meaning, indicating they are used with 'to be' verbs."}], "id": "q03"}, {"question": "The text states that with food adjectives, the verb you choose changes the meaning. If you heard a native speaker say, \"La sopa *es* buena,\" based on the explanation in the '¡Ojo!' section, what would they most likely be conveying about the soup?", "options": [{"text": "That the soup tastes good *right now*.", "isCorrect": false, "rationale": "This is incorrect. The '¡Ojo!' section states that 'estar' is used with 'bueno' to describe how food tastes 'at this moment.' Therefore, 'estar buena' would convey the taste, not 'ser buena'."}, {"text": "That the soup is inherently good, perhaps healthy or of high quality, rather than specifically its current taste.", "isCorrect": true, "rationale": "This is correct. Since the '¡Ojo!' section specifies 'estar bueno' for taste *at this moment*, using 'ser buena' for food implies a more stable, inherent characteristic, such as its nutritional value, quality, or general goodness, rather than its ephemeral taste."}, {"text": "That the soup is ready to be eaten.", "isCorrect": false, "rationale": "This is incorrect. While 'estar listo' means 'to be ready,' 'ser bueno' does not convey readiness. The meaning change specifically relates to the adjective 'bueno'."}, {"text": "That the soup is a specific type of 'good' soup.", "isCorrect": false, "rationale": "This is incorrect. While 'ser' describes identity, merely stating it's a 'good type' doesn't fully capture the analytical distinction between inherent quality (ser) and current taste (estar) as implied by the text."}], "id": "q04"}, {"question": "In the \"Después de la canción\" section, the textbook asks which verb to use for a \"permanent characteristic.\" If the 'señorita' from \"Arroz con leche\" *is* inherently clever (a defining, stable trait), which verb would be used, and why?", "options": [{"text": "Estar, because being clever is a temporary state of mind.", "isCorrect": false, "rationale": "This is incorrect. The text links 'estar' to 'temporary feeling or state' and 'ser' to 'permanent characteristic.' An inherent trait like cleverness is permanent, not temporary."}, {"text": "Ser, because cleverness, in this context, is considered a 'Stable / Standing truth' about her character.", "isCorrect": true, "rationale": "This is correct. The text explicitly asks about a 'permanent characteristic' and which verb to use, which aligns with SER's definition in the memory trick ('Stable / Standing truth — what something IS no matter what')."}, {"text": "Estar, because it describes a quality of a person.", "isCorrect": false, "rationale": "This is incorrect. While ESTAR can describe qualities (especially temporary ones like emotions), the text specifically differentiates between permanent and temporary. For a *permanent characteristic*, SER is the correct choice."}, {"text": "Neither, as personality traits do not use 'to be' verbs.", "isCorrect": false, "rationale": "This is incorrect. Both SER and ESTAR are used to describe characteristics and states of people, and the text specifically prompts the learner to consider which verb to use for characteristics."}], "id": "q05"}, {"question": "In the \"Después de la canción\" section, the text asks which verb to use for a \"temporary feeling or state.\" If the 'señorita' *is* tired *at this moment*, which verb correctly describes her state?", "options": [{"text": "Ser, because being tired is a condition of her body.", "isCorrect": false, "rationale": "This is incorrect. The text associates 'ser' with 'permanent characteristic' and 'estar' with 'temporary feeling or state.' Being tired is a temporary state, not a permanent characteristic."}, {"text": "Estar, as being tired is an 'Ephemeral / Ever-changing' state at that exact moment.", "isCorrect": true, "rationale": "This is correct. The text directly asks which verb to use for a 'temporary feeling or state,' which aligns perfectly with ESTAR's definition in the memory trick ('Ephemeral / Ever-changing — how it is at this Exact moment')."}, {"text": "Ser, because it describes her current being.", "isCorrect": false, "rationale": "This is incorrect. While 'ser' describes 'being,' the distinction here is between 'stable/permanent being' and 'ephemeral/temporary being,' with 'estar' being for the latter."}, {"text": "Neither, as feelings are expressed using other verbs in Spanish.", "isCorrect": false, "rationale": "This is incorrect. The text's prompt in 'Después de la canción' directly implies that one of the 'to be' verbs (ser or estar) is used for temporary feelings or states."}], "id": "q06"}, {"question": "In \"El desayuno de Carlos,\" the sentence \"Carlos *es* un estudiante en la escuela Benito Juárez\" uses *ser*. What does this use of *ser* primarily indicate?", "options": [{"text": "Carlos's temporary location at the school.", "isCorrect": false, "rationale": "This is incorrect. Location is typically described with 'estar' when it's temporary. 'Ser' here describes identity, not location."}, {"text": "Carlos's current feeling or emotion about being a student.", "isCorrect": false, "rationale": "This is incorrect. Emotions are temporary states described with 'estar' (e.g., 'Está contento'). 'Ser' here indicates an identity or profession."}, {"text": "Carlos's inherent identity or profession, a 'Stable / Standing truth' about who he is.", "isCorrect": true, "rationale": "This is correct. Being a student is an inherent identity or profession, which aligns with SER's definition as a 'Stable / Standing truth — what something IS no matter what'."}, {"text": "That Carlos is ready for school.", "isCorrect": false, "rationale": "This is incorrect. Readiness is a temporary state described with 'estar' (e.g., 'está listo para ir a la escuela'). 'Ser' describes identity."}], "id": "q07"}, {"question": "Consider the sentences from \"El desayuno de Carlos\": \"Carlos *está* en la cocina,\" \"El desayuno *está* listo,\" and \"El jugo de naranja *está* frío.\" What common principle for using *estar* do these examples illustrate?", "options": [{"text": "They all describe permanent characteristics.", "isCorrect": false, "rationale": "This is incorrect. 'Ser' is used for permanent characteristics. Location ('en la cocina'), readiness ('listo'), and temperature ('frío') are all temporary states or conditions."}, {"text": "They all describe actions being performed.", "isCorrect": false, "rationale": "This is incorrect. These sentences describe states or conditions, not ongoing actions (which would use the present progressive with 'estar')."}, {"text": "They all describe 'Ephemeral / Ever-changing' states, conditions, or temporary locations.", "isCorrect": true, "rationale": "This is correct. 'Estar' is used for Carlos's temporary location, the breakfast's temporary state of being ready, and the juice's temporary temperature, all aligning with ESTAR's meaning as 'Ephemeral / Ever-changing — how it is at this Exact moment'."}, {"text": "They are all idioms that specifically use 'estar'.", "isCorrect": false, "rationale": "This is incorrect. While some 'estar' phrases are idiomatic, the primary reason for its use here is its grammatical function in describing temporary states, conditions, and locations, as explained by the memory trick."}], "id": "q08"}, {"question": "Imagine Carlos's mother is describing her new car. She wants to state, \"My new car *is* red.\" Which verb should she use, and why, based on the principles discussed?", "options": [{"text": "Estar, because the car's color is a visual state at this moment.", "isCorrect": false, "rationale": "This is incorrect. While the color is visible, a car's color is generally considered a stable, inherent characteristic, not an ephemeral, ever-changing state like its location or a temporary feeling."}, {"text": "Ser, because the car's color is a 'Stable / Standing truth' or inherent characteristic.", "isCorrect": true, "rationale": "This is correct. The color of an object is typically a permanent or inherent characteristic, aligning with SER's function for 'Stable / Standing truth — what something IS no matter what'."}, {"text": "Estar, because she is proud of her car.", "isCorrect": false, "rationale": "This is incorrect. Her emotion ('proud') would use 'estar' to describe her temporary feeling, but the question is about the car's color, not her emotion."}, {"text": "Either ser or estar, as color can be seen as both stable and temporary.", "isCorrect": false, "rationale": "This is incorrect. For basic colors of objects, 'ser' is generally used as a stable characteristic, not interchangeably with 'estar'."}], "id": "q09"}, {"question": "The introduction to this section refers to \"Ser vs. estar — La gran decisión.\" What does the text identify as the \"good news\" regarding this decision for Spanish learners?", "options": [{"text": "That native speakers often use them interchangeably, making the choice less critical.", "isCorrect": false, "rationale": "This is incorrect. The text immediately after states 'there is a clear answer' and that the choice 'cambia el significado' (changes the meaning), contradicting interchangeability."}, {"text": "That most situations only require one of the verbs, simplifying the learning process.", "isCorrect": false, "rationale": "This is incorrect. The text implies both are needed and it's a 'big question' of *which one* to use, not that one is rarely used."}, {"text": "There is a clear answer and a logical understanding that makes the usage feel natural over time.", "isCorrect": true, "rationale": "This is correct. The text explicitly states: 'The good news is there is a clear answer — and once you understand the logic, it starts to feel natural.'"}, {"text": "That the choice between ser and estar only affects very advanced grammar, not basic communication.", "isCorrect": false, "rationale": "This is incorrect. The text emphasizes that the choice even 'changes the meaning' with food adjectives, indicating its importance in basic communication."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
