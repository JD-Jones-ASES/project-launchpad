    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What does 'la reservacion del hotel' mean?", "options": [{"text": "The hotel bill", "isCorrect": false, "rationale": "The hotel bill would be 'la cuenta del hotel'. 'La reservacion del hotel' means the hotel reservation."}, {"text": "The hotel map", "isCorrect": false, "rationale": "A map would be 'el mapa'. 'La reservacion del hotel' means the hotel reservation."}, {"text": "The hotel reservation", "isCorrect": true, "rationale": "'La reservacion' means reservation, and 'del hotel' = of the hotel. Diego tells Sofia he has both his ticket and hotel reservation ready for his trip."}, {"text": "The hotel address", "isCorrect": false, "rationale": "An address is 'la direccion'. 'La reservacion del hotel' means the hotel reservation."}]}, {"question": "In the conversation, what travel warning does Sofia give Diego?", "options": [{"text": "Don't forget your sunscreen and arrive early.", "isCorrect": false, "rationale": "Sofia gives practical travel warnings. She says: 'No olvides tu pasaporte. iY no pierdas el equipaje!'"}, {"text": "Don't forget your passport, and don't lose your luggage.", "isCorrect": true, "rationale": "Sofia's exact words are: 'No olvides tu pasaporte. iY no pierdas el equipaje!' — two negative commands serving as travel reminders."}, {"text": "Don't lose your ticket and don't leave without your map.", "isCorrect": false, "rationale": "Sofia's warnings are specifically about the passport and luggage. Ana's mother in the reading gives the warning about the tour map."}, {"text": "Don't talk to strangers and don't be late.", "isCorrect": false, "rationale": "Sofia's specific warnings are: don't forget your passport (No olvides tu pasaporte) and don't lose your luggage (No pierdas el equipaje)."}]}, {"question": "Where is Machu Picchu located, and why is it famous?", "options": [{"text": "In Ecuador, famous for its biodiversity and giant tortoises", "isCorrect": false, "rationale": "The Galapagos Islands of Ecuador are famous for biodiversity. Machu Picchu is a 15th-century Inca citadel in the Andes mountains of Peru."}, {"text": "In Peru, a 15th-century Inca citadel high in the Andes mountains", "isCorrect": true, "rationale": "The culture box explains: 'Machu Picchu in Peru is a 15th-century Inca citadel perched high in the Andes mountains — it was rediscovered by the outside world in 1911 and is now one of the most visited sites on the planet.'"}, {"text": "In Mexico, famous for its Maya pyramid that aligns with the sun", "isCorrect": false, "rationale": "The Maya pyramid at Chichen Itza is in Mexico. Machu Picchu is an Inca citadel in Peru."}, {"text": "In Colombia, famous for being the emerald capital of the world", "isCorrect": false, "rationale": "Bogota, Colombia is described as the emerald capital of the world. Machu Picchu is in Peru."}]}, {"question": "In the sentence 'Voy a levantarme muy temprano el primer dia', where is the reflexive pronoun attached?", "options": [{"text": "Before 'voy' — 'Me voy a levantar'", "isCorrect": false, "rationale": "This is actually the OTHER correct option. The question asks about 'Voy a levantarme', where the pronoun is attached to the infinitive. Both positions are correct."}, {"text": "Attached to the end of the infinitive 'levantar' — levantarme", "isCorrect": true, "rationale": "When using ir + a + infinitive, the reflexive pronoun can either go before the conjugated verb (Me voy a levantar) or be attached to the infinitive (Voy a levantarme). Both are correct."}, {"text": "After 'a' — 'Voy a me levantar'", "isCorrect": false, "rationale": "'Voy a me levantar' is incorrect in Spanish. The pronoun either precedes the conjugated verb (Me voy a levantar) or attaches to the infinitive (Voy a levantarme)."}, {"text": "At the end of the whole sentence after 'dia' — 'Voy a levantar muy temprano el primer dia me'", "isCorrect": false, "rationale": "This is never correct. The pronoun goes either before the conjugated verb or attached to the infinitive, not at the end of the sentence."}]}, {"question": "What remarkable natural feature is described about Chichen Itza in Mexico?", "options": [{"text": "It is surrounded by an active volcano that erupts every century.", "isCorrect": false, "rationale": "Chichen Itza is not near an active volcano. It is famous for a solar alignment where sunlight creates the shape of a feathered serpent sliding down the steps."}, {"text": "On two days each year, sunlight creates the illusion of a feathered serpent descending the steps.", "isCorrect": true, "rationale": "The culture box describes: 'The Maya pyramid at Chichen Itza is so precisely built that on two days each year, the sun creates the shape of a feathered serpent sliding down its steps.' These are the spring and autumn equinoxes."}, {"text": "It is the tallest pyramid in the world and can be seen from space.", "isCorrect": false, "rationale": "Chichen Itza is not described as the tallest pyramid. It is famous for its solar alignment creating a feathered serpent effect twice a year."}, {"text": "Its stones were quarried from the Andes mountains and transported thousands of miles.", "isCorrect": false, "rationale": "Chichen Itza is a Maya structure in Mexico's Yucatan Peninsula. The remarkable fact described is the sun's serpent shadow on the equinoxes."}]}, {"question": "What does the verb 'viajar' mean?", "options": [{"text": "To pack luggage", "isCorrect": false, "rationale": "Packing luggage would be 'empacar' or 'hacer la maleta'. 'Viajar' means to travel."}, {"text": "To travel", "isCorrect": true, "rationale": "'Viajar' means to travel. Example from the chapter: 'Quiero viajar a Peru' (I want to travel to Peru)."}, {"text": "To arrive at a destination", "isCorrect": false, "rationale": "Arriving is 'llegar'. 'Viajar' means to travel in general."}, {"text": "To take a taxi", "isCorrect": false, "rationale": "Taking a taxi would be 'tomar un taxi'. 'Viajar' means to travel."}]}, {"question": "What are the Islas Galapagos famous for, according to the culture box?", "options": [{"text": "The world's largest carnival celebration", "isCorrect": false, "rationale": "The world's largest carnival is Rio de Janeiro. The Galapagos Islands inspired Charles Darwin's theory of evolution and are home to unique creatures found nowhere else on Earth."}, {"text": "Inspiring Charles Darwin's theory of evolution, and being home to unique creatures found nowhere else", "isCorrect": true, "rationale": "The culture box states: 'Off the coast of Ecuador, the Islas Galapagos inspired Charles Darwin's theory of evolution and are home to creatures found nowhere else on earth — giant tortoises, marine iguanas, and blue-footed boobies.'"}, {"text": "Being the site of ancient Inca ruins discovered in the 20th century", "isCorrect": false, "rationale": "Ancient Inca ruins describe Machu Picchu. The Galapagos are famous for their unique wildlife that inspired Darwin's theory of evolution."}, {"text": "Being the birthplace of Latin American salsa music", "isCorrect": false, "rationale": "Salsa music originated in the Caribbean, not the Galapagos. The islands are famous for their extraordinary biodiversity and Darwin's research."}]}, {"question": "In the reading about Ana's dream trip, what negative commands does her mother give?", "options": [{"text": "No hables con extranjeros. No comas en el avion.", "isCorrect": false, "rationale": "These are travel tips from the chapter introduction. Ana's mother specifically says: No olvides el pasaporte, No pierdas el equipaje, No salgas sin el mapa del recorrido."}, {"text": "No olvides el pasaporte. No pierdas el equipaje. No salgas sin el mapa del recorrido.", "isCorrect": true, "rationale": "Ana's mother gives three negative commands: Don't forget the passport, Don't lose the luggage, Don't leave without the tour map."}, {"text": "No llegues tarde. No pongas liquidos en la maleta.", "isCorrect": false, "rationale": "These are general travel warnings from the chapter. Ana's mother specifically warns about the passport, luggage, and tour map."}, {"text": "No digas tu numero de habitacion. No pierdas el boleto.", "isCorrect": false, "rationale": "These are general travel warnings from the chapter. Ana's mother specifically warns about the passport, luggage, and tour map."}]}, {"question": "What does 'el amanecer' mean in the reading about Ana's trip?", "options": [{"text": "The ruins", "isCorrect": false, "rationale": "The ruins are 'las ruinas'. 'El amanecer' means the sunrise."}, {"text": "The adventure", "isCorrect": false, "rationale": "The adventure is 'la aventura'. 'El amanecer' means the sunrise."}, {"text": "The sunrise", "isCorrect": true, "rationale": "In the reading, Ana says: 'Voy a levantarme muy temprano para ver el amanecer desde las ruinas.' She wants to see the sunrise from the ruins of Machu Picchu."}, {"text": "The mountain peak", "isCorrect": false, "rationale": "A mountain peak would be 'la cumbre' or 'el pico'. 'El amanecer' means the sunrise."}]}, {"question": "Which of the following Latin American destinations is described as wider than Niagara Falls?", "options": [{"text": "Machu Picchu in Peru", "isCorrect": false, "rationale": "Machu Picchu is an Inca citadel, not a waterfall. The destination described as wider than Niagara Falls is the Cataratas del Iguazu."}, {"text": "Las Cataratas del Iguazu on the border of Argentina and Brazil", "isCorrect": true, "rationale": "The culture box states: 'Las Cataratas del Iguazu (Iguazu Falls) on the border of Argentina and Brazil are wider than Niagara Falls and taller than the Statue of Liberty, roaring with the force of up to 300 waterfalls at once.'"}, {"text": "Chichen Itza in Mexico", "isCorrect": false, "rationale": "Chichen Itza is a Maya pyramid, not a waterfall. The destination wider than Niagara Falls is Las Cataratas del Iguazu."}, {"text": "The Galapagos Islands in Ecuador", "isCorrect": false, "rationale": "The Galapagos are islands known for unique wildlife, not waterfalls. Las Cataratas del Iguazu are the waterfalls wider than Niagara Falls."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
