<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following ideas is NOT explicitly mentioned in the introduction as something the verb 'tener' can express?", "options": [{"text": "Age", "isCorrect": false, "rationale": "The text states 'Once you know tener, you will be able to express hunger, thirst, fear, age...'"}, {"text": "Future plans", "isCorrect": true, "rationale": "The text mentions hunger, thirst, fear, and age, but not future plans, as ideas expressed by 'tener'."}, {"text": "Thirst", "isCorrect": false, "rationale": "The text states 'Once you know tener, you will be able to express hunger, thirst, fear, age...'"}, {"text": "Fear", "isCorrect": false, "rationale": "The text states 'Once you know tener, you will be able to express hunger, thirst, fear, age...'"}]}, {"question": "What is the primary purpose of the '¡Ojo!' (Watch out!) memory tip in this textbook?", "options": [{"text": "To introduce new vocabulary related to body parts.", "isCorrect": false, "rationale": "While 'ojo' means eye, the memory tip clarifies its instructional meaning in the book, not just its literal translation."}, {"text": "To remind the reader to pay close attention or be careful with the information.", "isCorrect": true, "rationale": "The text explicitly states: 'Spanish speakers actually say ¡Ojo! to mean “Pay attention!” or “Be careful!” So whenever you see that word in this book, picture two big eyes reminding you to focus.'"}, {"text": "To highlight cultural differences in greeting expressions.", "isCorrect": false, "rationale": "The memory tip is about understanding an instruction within the textbook, not a cultural greeting."}, {"text": "To warn about common pronunciation difficulties in Spanish.", "isCorrect": false, "rationale": "The tip's focus is on attention and caution, not pronunciation."}]}, {"question": "Based on the 'Notando patrones' section and the conjugation table, which of the following is a characteristic of the 'yo' form of 'tener'?", "options": [{"text": "It always ends in '-o', following regular -er verb patterns.", "isCorrect": false, "rationale": "The text explicitly states that the 'yo' form is irregular and ends in '-go', not '-o'."}, {"text": "It features an 'e' to 'ie' stem change.", "isCorrect": false, "rationale": "The 'yo' form 'tengo' does not have the 'e' to 'ie' stem change; that change occurs in other forms like 'tienes'."}, {"text": "It ends in '-go', which is an irregular ending shared by several important Spanish verbs.", "isCorrect": true, "rationale": "The text highlights this irregularity: 'The yo form ends in -go. Is that what you would expect from the regular -ar/-er/-ir patterns you know?' and later, 'The -go ending is a signature of several important irregular verbs in Spanish.'"}, {"text": "It is identical to the 'tú' form.", "isCorrect": false, "rationale": "The 'yo' form is 'tengo' and the 'tú' form is 'tienes', which are distinct."}]}, {"question": "If someone wants to express that they are 15 years old in Spanish, how would they correctly use the verb 'tener'?", "options": [{"text": "Soy quince años.", "isCorrect": false, "rationale": "The verb 'ser' (soy) is not used to express age in Spanish; 'tener' is used."}, {"text": "Estoy quince años.", "isCorrect": false, "rationale": "The verb 'estar' (estoy) is not used to express age in Spanish; 'tener' is used."}, {"text": "Tengo quince años.", "isCorrect": true, "rationale": "The text states that 'tener' is used for age, giving 'Tengo doce años' as an example. So, 'Tengo quince años' is the correct application."}, {"text": "Tener quince años.", "isCorrect": false, "rationale": "'Tener' is the infinitive form; it needs to be conjugated to 'Tengo' for 'I am 15 years old'."}]}, {"question": "Which of the following conjugations of 'tener' is explicitly identified as incorrect for the 'yo' form in the '¡Ojo! cuidado' section?", "options": [{"text": "tengo", "isCorrect": false, "rationale": "'Tengo' is the correct and emphasized 'yo' form."}, {"text": "teno", "isCorrect": true, "rationale": "The '¡Ojo! cuidado' box specifically states: '¡Ojo! tengo — NOT teno. When you form the yo form of tener, do NOT follow the regular pattern. Never write teno!'"}, {"text": "tienes", "isCorrect": false, "rationale": "'Tienes' is the correct 'tú' form, not the 'yo' form."}, {"text": "tiene", "isCorrect": false, "rationale": "'Tiene' is the correct 'él/ella/usted' form, not the 'yo' form."}]}, {"question": "Which forms of the verb 'tener' *do not* exhibit the 'e' to 'ie' stem change?", "options": [{"text": "Only the 'yo' form.", "isCorrect": false, "rationale": "The 'yo' form 'tengo' is irregular but does not have the 'e' to 'ie' stem change; other forms like 'tienes' do."}, {"text": "The 'nosotros' and 'vosotros' forms.", "isCorrect": true, "rationale": "The grammar box states: 'change: In all forms except nosotros, the e in ten- changes to ie.' This implies 'nosotros' (and by extension, the similar 'vosotros' form, 'tenéis') are the exceptions."}, {"text": "The 'él/ella/usted' and 'ellos/ellas/ustedes' forms.", "isCorrect": false, "rationale": "These forms ('tiene', 'tienen') do exhibit the 'e' to 'ie' stem change."}, {"text": "All forms, as 'tener' is a completely irregular verb.", "isCorrect": false, "rationale": "While 'tener' is irregular, it follows a specific stem-changing pattern in most forms, making this statement incorrect."}]}, {"question": "The 'Notando patrones' section notes that 'Some sentences translate into English using the verb 'to be' even though Spanish uses tener.' Based on the concepts introduced, which of the following scenarios best exemplifies this pattern?", "options": [{"text": "Stating possession, like 'Tengo un libro.' (I have a book.)", "isCorrect": false, "rationale": "While 'tener' is used, the English translation 'I have a book' also uses 'to have', not 'to be'."}, {"text": "Expressing an emotion or state of being, like 'Tiene miedo.' (He/She is afraid.)", "isCorrect": true, "rationale": "The introduction mentions 'tener' expresses fear, and 'Notando patrones' asks to find an example where 'tener' translates to 'to be' in English. 'Tiene miedo' literally means 'He/She has fear' but is idiomatically translated as 'He/She is afraid'."}, {"text": "Indicating the location of an object, like 'Tengo la mochila aquí.' (I have the backpack here.)", "isCorrect": false, "rationale": "This is a direct translation of possession with 'to have' in English, not 'to be'."}, {"text": "Describing physical characteristics, like 'Tiene el pelo rubio.' (He/She has blonde hair.)", "isCorrect": false, "rationale": "This is a direct translation of possession with 'to have' in English, not 'to be'."}]}, {"question": "In the song 'Cinco lobitos,' what is the significance of the line 'Cinco lobitos tiene la loba'?", "options": [{"text": "It describes the color of the wolves.", "isCorrect": false, "rationale": "The line 'blancos y negros' describes the color; this line states the number of wolves the she-wolf possesses."}, {"text": "It directly states that the she-wolf has five little wolves.", "isCorrect": true, "rationale": "'Tiene' is the conjugated form of 'tener' (to have), and 'la loba' means 'the she-wolf.' Thus, the line translates to 'The she-wolf has five little wolves.'"}, {"text": "It explains where the wolves are hiding.", "isCorrect": false, "rationale": "The line 'detrás de la escoba' explains where they are hiding."}, {"text": "It refers to the number of children the she-wolf raised.", "isCorrect": false, "rationale": "The line 'Cinco crió, cinco cuidó' refers to raising the wolves; this line states she 'has' them."}]}, {"question": "According to the 'Después de leer' questions for 'Cinco lobitos,' if each finger represents a 'lobito' in the finger game, how many 'lobos' would a child have on both hands combined? (Provide the number in Spanish)", "options": [{"text": "Cinco", "isCorrect": false, "rationale": "Cinco is the number of wolves on one hand, not both."}, {"text": "Dos", "isCorrect": false, "rationale": "Dos (two) refers to the number of hands, not the total number of wolves."}, {"text": "Diez", "isCorrect": true, "rationale": "A child has five fingers on each hand. Therefore, on both hands, there are 5 + 5 = 10 fingers, which is 'diez' in Spanish."}, {"text": "Veinte", "isCorrect": false, "rationale": "Veinte (twenty) is incorrect; it would be for two children's hands or four individual hands."}]}, {"question": "The text explains that 'Cinco lobitos' is a beloved song for young children but also appeals to adults and older kids. What reason does the text give for its widespread appeal?", "options": [{"text": "It features advanced linguistic structures that are challenging for all ages.", "isCorrect": false, "rationale": "The song is simple, designed for young children, and not for advanced linguistic challenge."}, {"text": "It teaches complex historical facts about Latin America and Spain.", "isCorrect": false, "rationale": "The song is a counting and affection game, not a history lesson."}, {"text": "It serves as a perfect example of how Spanish-speaking families transmit language and affection simultaneously.", "isCorrect": true, "rationale": "The 'About this song' section explicitly states: 'The song is a perfect example of how Spanish-speaking families pass on language and affection at the same time.'"}, {"text": "Its melody is exceptionally complex and musically sophisticated for diverse audiences.", "isCorrect": false, "rationale": "Children's songs are typically simple, focusing on interaction and learning, not musical complexity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
