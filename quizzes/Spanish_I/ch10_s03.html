<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 10, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When combining 'querer/poder/preferir' with another verb, what form does the second verb take?", "options": [{"text": "It must be conjugated to match the subject.", "isCorrect": false, "rationale": "Only the modal verb (querer/poder/preferir) is conjugated. The second verb stays in the infinitive."}, {"text": "It stays in the infinitive (-ar, -er, or -ir form).", "isCorrect": true, "rationale": "With modal + infinitive, only the first verb is conjugated. The second verb stays as an infinitive: Quiero comer, Puedes venir, Prefieren estudiar."}, {"text": "It changes to match the gender of the subject.", "isCorrect": false, "rationale": "Verbs do not change for gender in Spanish. The second verb in a modal + infinitive construction simply stays as an infinitive."}, {"text": "It takes the nosotros form regardless of subject.", "isCorrect": false, "rationale": "The second verb takes no conjugated form at all — it stays as an infinitive."}]}, {"question": "Which sentence is INCORRECT because it conjugates both verbs?", "options": [{"text": "Quiero comer pizza.", "isCorrect": false, "rationale": "This is correct: quiero (conjugated modal) + comer (infinitive). Only the first verb is conjugated."}, {"text": "No pueden dormir.", "isCorrect": false, "rationale": "This is correct: pueden (conjugated modal) + dormir (infinitive). No antes the modal negates the sentence."}, {"text": "Quiero como pizza.", "isCorrect": true, "rationale": "This is INCORRECT because 'como' is the conjugated yo form of comer. The second verb must stay as an infinitive: Quiero comer pizza."}, {"text": "Preferimos jugar fútbol.", "isCorrect": false, "rationale": "This is correct: preferimos (conjugated nosotros modal) + jugar (infinitive)."}]}, {"question": "How do you make a modal + infinitive sentence negative?", "options": [{"text": "Put 'no' after the infinitive.", "isCorrect": false, "rationale": "No goes BEFORE the modal verb, not after the infinitive. Example: No quiero estudiar."}, {"text": "Put 'no' before the modal verb.", "isCorrect": true, "rationale": "Place no directly before the conjugated modal: No quiero estudiar (I don't want to study). The infinitive does not change."}, {"text": "Change the modal verb to a negative form.", "isCorrect": false, "rationale": "There is no separate 'negative form' of a modal verb. Simply place no before the conjugated modal."}, {"text": "Remove the infinitive from the sentence.", "isCorrect": false, "rationale": "The infinitive stays in negative sentences. Just add no before the modal: No quiero estudiar."}]}, {"question": "Ana from Honduras wants to play soccer on Saturday morning. How would she say this?", "options": [{"text": "Ana prefiere jugar al fútbol con sus amigos el sábado.", "isCorrect": true, "rationale": "Preferir is an e→ie modal; the ella form is prefiere. Jugar stays as an infinitive. This matches the reading: Ana prefiere jugar al fútbol con sus amigos en el parque."}, {"text": "Ana prefiero jugar al fútbol con sus amigos el sábado.", "isCorrect": false, "rationale": "Prefiero is the yo form; for Ana (ella) use prefiere."}, {"text": "Ana prefiere juega al fútbol con sus amigos el sábado.", "isCorrect": false, "rationale": "Juega is the él/ella conjugated form of jugar. After a modal, jugar must stay as an infinitive."}, {"text": "Ana preferimos jugar al fútbol con sus amigos el sábado.", "isCorrect": false, "rationale": "Preferimos is the nosotros form; for Ana (ella) use prefiere."}]}, {"question": "According to the culture box, what did Costa Rica's national soccer team 'La Sele' accomplish at the 2014 World Cup?", "options": [{"text": "They won the championship.", "isCorrect": false, "rationale": "La Sele did not win the 2014 World Cup. They achieved something remarkable: reaching the quarterfinals."}, {"text": "They reached the quarterfinals, filling the tiny nation with pride.", "isCorrect": true, "rationale": "The culture box says Costa Rica's La Sele caused a sensation at the 2014 World Cup in Brazil, reaching the quarterfinals and filling the tiny nation with pride."}, {"text": "They were eliminated in the first round.", "isCorrect": false, "rationale": "La Sele advanced far beyond the first round — they reached the quarterfinals at the 2014 World Cup."}, {"text": "They tied for third place.", "isCorrect": false, "rationale": "La Sele reached the quarterfinals at the 2014 World Cup. The culture box does not mention a third-place finish."}]}, {"question": "In the conversation, Sofía asks '¿Te parece bien?' What does this phrase mean?", "options": [{"text": "Do you want to come?", "isCorrect": false, "rationale": "¿Quieres venir? means Do you want to come? ¿Te parece bien? means Does that seem okay to you?"}, {"text": "Does that work for you? / Is that okay with you?", "isCorrect": true, "rationale": "¿Te parece bien? literally means Does it seem good to you? and is used to ask if something is acceptable or convenient."}, {"text": "Do you think I am right?", "isCorrect": false, "rationale": "¿Crees que tengo razón? means Do you think I am right? ¿Te parece bien? asks if an arrangement is acceptable."}, {"text": "What time do you prefer?", "isCorrect": false, "rationale": "¿A qué hora prefieres? would ask about preferred time. ¿Te parece bien? asks for general agreement or acceptance."}]}, {"question": "Which verb from the reading uses the modal + infinitive structure: 'Ana piensa estudiar para un examen'?", "options": [{"text": "correr (to run)", "isCorrect": false, "rationale": "Correr is mentioned elsewhere (Ana prefiere correr), but this specific sentence uses pensar + estudiar."}, {"text": "dormir (to sleep)", "isCorrect": false, "rationale": "Dormir appears in the reading (Ana puede dormir hasta las nueve), not in this specific sentence about the exam."}, {"text": "pensar (to plan/intend) + estudiar", "isCorrect": true, "rationale": "Ana piensa estudiar para un examen — pensar (e→ie, ella form = piensa) is used as a modal meaning to plan or intend to, followed by the infinitive estudiar."}, {"text": "querer (to want) + estudiar", "isCorrect": false, "rationale": "The reading uses pensar estudiar (she plans to study), not querer estudiar in this specific sentence."}]}, {"question": "How do you say 'Can you come?' in Spanish using poder?", "options": [{"text": "¿Puedes venir?", "isCorrect": true, "rationale": "Poder (o→ue) in the tú form is puedes. Venir stays as an infinitive. ¿Puedes venir? = Can you come?"}, {"text": "¿Puedo venir?", "isCorrect": false, "rationale": "Puedo is the yo form (I can). For asking the other person if they can, use puedes (tú form)."}, {"text": "¿Poder venir?", "isCorrect": false, "rationale": "Poder must be conjugated, not left in the infinitive. For tú: ¿Puedes venir?"}, {"text": "¿Pueden venir?", "isCorrect": false, "rationale": "Pueden is the ellos/ellas form. To ask a single person (tú) if they can come, use ¿Puedes venir?"}]}, {"question": "The reading says Ana says: 'No entiendo el problema número siete.' Which stem-changing verb does this use?", "options": [{"text": "querer (e→ie)", "isCorrect": false, "rationale": "Quiero means I want. Ana says No entiendo — I don't understand — from entender (e→ie)."}, {"text": "preferir (e→ie)", "isCorrect": false, "rationale": "Prefiero means I prefer. Ana uses entender (e→ie): entend- → entiend- + o = entiendo."}, {"text": "entender (e→ie)", "isCorrect": true, "rationale": "Entender (to understand) is an e→ie stem-changer. Yo form: entend- → entiend- + o = entiendo. No entiendo = I don't understand."}, {"text": "poder (o→ue)", "isCorrect": false, "rationale": "Poder is an o→ue verb. Entender is the e→ie verb used here: No entiendo el problema."}]}, {"question": "Which phrase means 'Of course! / Absolutely!' and appears in the conversation?", "options": [{"text": "¡Qué lástima!", "isCorrect": false, "rationale": "¡Qué lástima! means What a shame! The enthusiastic agreement phrase is ¡Claro que sí!"}, {"text": "¡Claro que sí!", "isCorrect": true, "rationale": "¡Claro que sí! means Of course! / Absolutely! It is used in the conversation when Sofía enthusiastically agrees to eat pizza: ¡Claro que sí! ¡Yo siempre quiero comer pizza!"}, {"text": "¡Qué bueno!", "isCorrect": false, "rationale": "¡Qué bueno! means How great! or That's great! ¡Claro que sí! means Of course! / Absolutely!"}, {"text": "¡Qué interesante!", "isCorrect": false, "rationale": "¡Qué interesante! means How interesting! The phrase for enthusiastic agreement is ¡Claro que sí!"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
