        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How would you correctly write the number 47 in Spanish according to the rules presented?", "options": [{"text": "Cuarenta siete", "isCorrect": false, "rationale": "For numbers 31 and above, the formula 'tens + y + ones' is used, meaning there should be an 'y' between 'cuarenta' and 'siete'."}, {"text": "Cuarenta y siete", "isCorrect": true, "rationale": "The text states that for 31 and above, the formula 'tens + y + ones' should be used, making 'cuarenta y siete' the correct form for 47."}, {"text": "Cuarentaysiete", "isCorrect": false, "rationale": "Numbers 31 and above are written as two separate words connected by 'y', not as a single combined word."}, {"text": "Cuarentiséis", "isCorrect": false, "rationale": "This option represents the number 46, not 47, and the ending '-iséis' is typically used for numbers in the teens (16-19), not for numbers in the 40s."}], "id": "q01"}, {"question": "Which of the following numbers is correctly written as a single word in Spanish, following the patterns for 16-29?", "options": [{"text": "Treinta y cinco", "isCorrect": false, "rationale": "This number (35) is formed with 'y' and is written as two separate words, not a single word."}, {"text": "Diez y ocho", "isCorrect": false, "rationale": "The text specifically mentions that numbers 16–19 (like 18) are written as one word (dieciocho), not with 'y' as two words."}, {"text": "Veintitrés", "isCorrect": true, "rationale": "The text states that numbers 21–29 are written as one word, making 'veintitrés' (23) a correct example of this rule."}, {"text": "Cuarenta y uno", "isCorrect": false, "rationale": "This number (41) is formed with 'y' and is written as two separate words, not a single word."}], "id": "q02"}, {"question": "Which Spanish phrase correctly states the time \"1:00 PM\"?", "options": [{"text": "Son las una de la tarde.", "isCorrect": false, "rationale": "The rule states to use 'Es la' for 1:00 only, so 'Son las' is incorrect here."}, {"text": "Es la una de la tarde.", "isCorrect": true, "rationale": "The basic rule for telling time in Spanish dictates using 'Es la' specifically for 1:00, and 'de la tarde' indicates PM."}, {"text": "Son las trece de la tarde.", "isCorrect": false, "rationale": "While 'trece' (13) refers to 1 PM in military time, the phrase 'Son las' is incorrect for 1:00, and 'de la tarde' is typically used with the hour number, not military time."}, {"text": "Es el una de la tarde.", "isCorrect": false, "rationale": "The article 'la' is used with 'hora' (which is feminine), so 'Es la' is correct, not 'Es el'."}], "id": "q03"}, {"question": "How would a Spanish speaker most likely say \"It's 7:45 in the evening\" in Spanish, based on the provided conversation and time-telling rules?", "options": [{"text": "Es las ocho menos cuarto de la noche.", "isCorrect": false, "rationale": "'Es las' is incorrect for times other than 1:00. It should be 'Son las' for 7:00."}, {"text": "Son las siete y cuarenta y cinco de la tarde.", "isCorrect": false, "rationale": "While grammatically understandable, 'y cuarenta y cinco' is less common for :45. 'Menos cuarto' is the preferred expression. Also, 7:45 is typically considered 'de la noche' (evening/night), not 'de la tarde' (afternoon)."}, {"text": "Son las ocho menos cuarto de la noche.", "isCorrect": true, "rationale": "For 7:45, it is common to express it as 'a quarter to eight' ('ocho menos cuarto'). 'Son las' is used for hours 2:00 and up, and 'de la noche' is appropriate for evening hours."}, {"text": "Son las siete y cuarto de la noche.", "isCorrect": false, "rationale": "'Y cuarto' means 'and a quarter' (e.g., 7:15), not 7:45. This translates to 7:15 PM."}], "id": "q04"}, {"question": "According to the \"ojocuidado\" box, which statement about Spanish days of the week is true?", "options": [{"text": "They are always capitalized at the beginning of a sentence.", "isCorrect": false, "rationale": "The 'ojocuidado' box explicitly states that days of the week in Spanish are not capitalized (e.g., 'lunes', not 'Lunes'), even if they begin a sentence (though this specific context isn't given for sentence start, the general rule applies)."}, {"text": "The calendar week typically begins on Sunday.", "isCorrect": false, "rationale": "The text clearly states that in Spanish-speaking countries, the calendar week starts on Monday, not Sunday."}, {"text": "The word for Monday is written as \"lunes\", not \"Lunes\".", "isCorrect": true, "rationale": "The 'ojocuidado' box directly provides this example, stating that days of the week are not capitalized in Spanish."}, {"text": "\"Hoy es martes\" means \"Tomorrow is Tuesday.\"", "isCorrect": false, "rationale": "'Hoy es' means 'Today is', so 'Hoy es martes' translates to 'Today is Tuesday', not 'Tomorrow is Tuesday'."}], "id": "q05"}, {"question": "Which of the following months is correctly written in Spanish according to the section's rules?", "options": [{"text": "Enero", "isCorrect": false, "rationale": "The section states that, like days of the week, months in Spanish are not capitalized, so 'Enero' should be 'enero'."}, {"text": "febrero", "isCorrect": true, "rationale": "The section clearly states that months in Spanish are not capitalized, making 'febrero' the correctly written option."}, {"text": "Marzo", "isCorrect": false, "rationale": "The section states that, like days of the week, months in Spanish are not capitalized, so 'Marzo' should be 'marzo'."}, {"text": "Abril", "isCorrect": false, "rationale": "The section states that, like days of the week, months in Spanish are not capitalized, so 'Abril' should be 'abril'."}], "id": "q06"}, {"question": "How would you correctly write \"October 12th\" in Spanish using the date format provided?", "options": [{"text": "el doce del octubre", "isCorrect": false, "rationale": "This incorrectly uses the contraction 'del' (de + el) before the month. The correct preposition is simply 'de' without an article before the month name."}, {"text": "el doce de octubre", "isCorrect": false, "rationale": "While 'el' is often used when referring to a specific date (e.g., 'el 12 de octubre'), the provided format specifically outlines 'day + de + month (+ de + year)' without 'el' for the basic date expression 'October 12th'."}, {"text": "doce de octubre", "isCorrect": true, "rationale": "The section states the date format is 'day + de + month', and months are not capitalized. 'Doce de octubre' correctly follows these rules."}, {"text": "octubre doce", "isCorrect": false, "rationale": "This format reverses the day and month, which is not the standard Spanish date format provided ('day + de + month')."}], "id": "q07"}, {"question": "What is a key structural difference between forming numbers like \"diecisiete\" (17) and \"treinta y siete\" (37)?", "options": [{"text": "\"diecisiete\" uses 'y' while \"treinta y siete\" does not.", "isCorrect": false, "rationale": "This is incorrect. 'Diecisiete' is a single word and does not use 'y'. 'Treinta y siete' uses 'y'."}, {"text": "\"diecisiete\" is written as one word, while \"treinta y siete\" uses 'y' and is two words.", "isCorrect": true, "rationale": "The text explains that numbers 16-19 and 21-29 are written as one word (e.g., 'diecisiete'), while numbers 31 and above use the 'tens + y + ones' formula, resulting in two words (e.g., 'treinta y siete')."}, {"text": "Both numbers are formed using the 'tens + y + ones' formula.", "isCorrect": false, "rationale": "Only 'treinta y siete' (37) uses the 'tens + y + ones' formula. 'Diecisiete' (17) is a special single-word form."}, {"text": "\"treinta y siete\" is an exception to the 'tens + y + ones' rule.", "isCorrect": false, "rationale": "'Treinta y siete' actually follows the 'tens + y + ones' rule for numbers 31 and above, it is not an exception."}], "id": "q08"}, {"question": "If you wanted to ask \"At what time does the concert begin?\" in Spanish, based on the conversation, which phrase would you use to start your question?", "options": [{"text": "¿Qué hora es el concierto?", "isCorrect": false, "rationale": "This translates to 'What time is the concert?', which asks for the current time or the event's duration, not specifically the start time of an event."}, {"text": "¿A qué hora empieza el concierto?", "isCorrect": true, "rationale": "The conversation explicitly uses '¿A qué hora empieza la clase de español?' to ask 'At what time does Spanish class start?', making this the correct application for asking about the start time of an event."}, {"text": "¿Cuándo es el concierto?", "isCorrect": false, "rationale": "This translates to 'When is the concert?', which is a broader question asking for the date or general time, not specifically the clock time it begins."}, {"text": "¿Qué tiempo hace el concierto?", "isCorrect": false, "rationale": "'¿Qué tiempo hace...?' refers to the weather or 'what time is it (duration)', not the start time of an event."}], "id": "q09"}, {"question": "The \"Técnica: Clavijas numéricas\" memory tip primarily helps learners by:", "options": [{"text": "Encouraging rote memorization through repetition.", "isCorrect": false, "rationale": "The technique focuses on creating vivid mental pictures and associations, which is an alternative to rote memorization, not a form of it."}, {"text": "Linking new vocabulary to physical actions.", "isCorrect": false, "rationale": "While some memory techniques use physical actions, this specific technique links numbers to rhyming words and outrageous mental images, not physical actions."}, {"text": "Creating memorable associations between numbers and vivid mental images.", "isCorrect": true, "rationale": "The text describes 'number pegs' as creating 'a vivid mental picture you link to each number' using a 'rhymes with (or sounds like)' word, which directly corresponds to creating memorable associations."}, {"text": "Translating numbers directly into Spanish for immediate recall.", "isCorrect": false, "rationale": "The technique uses English words that rhyme or sound like numbers to create a mental peg, which then aids in recall, rather than direct translation of the numbers themselves."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
