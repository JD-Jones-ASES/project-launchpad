    <div class="quiz-actions">

    </div>

    <div class="quiz-footer">

    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is 'el brindis'?", "options": [{"text": "A traditional holiday bread", "isCorrect": false, "rationale": "Traditional holiday bread would be 'el pan dulce' or 'el roscon'. 'El brindis' is a toast — raising glasses to celebrate."}, {"text": "A toast (raising glasses to celebrate)", "isCorrect": true, "rationale": "'El brindis' means a toast — the act of raising glasses and saying something celebratory. In the conversation, 'Todos hicimos un brindis' = We all made a toast."}, {"text": "A type of fireworks display", "isCorrect": false, "rationale": "Fireworks are 'los fuegos artificiales'. 'El brindis' is a toast."}, {"text": "A candle lit in memory of a loved one", "isCorrect": false, "rationale": "A candle is 'la vela'. 'El brindis' is a toast — raising glasses to celebrate."}], "id": "q01"}, {"question": "What distinguishes 'regalar' from 'dar'?", "options": [{"text": "Regalar is used only for large gifts; dar for small ones.", "isCorrect": false, "rationale": "The distinction is not about size. Regalar means to give AS A GIFT; dar means to give (in general, without the gift implication)."}, {"text": "Regalar means to give as a gift (a special giving); dar means simply to give something.", "isCorrect": true, "rationale": "The note explains: 'Regalar means to give as a gift — not just to give. For simply giving something, use dar.' Example: Le regale un libro (I gave him a book as a gift) vs. Le di el libro (I gave him the book)."}, {"text": "Regalar is formal; dar is informal — they mean the same thing.", "isCorrect": false, "rationale": "The distinction is not about formality. Regalar specifically means giving as a gift; dar is the general verb for giving."}, {"text": "Regalar is used in negative sentences; dar in affirmative sentences.", "isCorrect": false, "rationale": "Both can be used in affirmative and negative sentences. Regalar = give as a gift; dar = give (general)."}], "id": "q02"}, {"question": "On what dates is el Dia de los Muertos celebrated?", "options": [{"text": "October 31st (Halloween)", "isCorrect": false, "rationale": "While October 31st is adjacent, Dia de los Muertos is celebrated on November 1st and 2nd, not October 31st."}, {"text": "November 1st and 2nd", "isCorrect": true, "rationale": "The culture box states: 'Celebrated on November 1st and 2nd in Mexico and other parts of Latin America, el Dia de los Muertos honors loved ones who have passed away.'"}, {"text": "December 16th through 24th", "isCorrect": false, "rationale": "December 16-24 is when Las Posadas is celebrated in Mexico. Dia de los Muertos is November 1st and 2nd."}, {"text": "The week before Easter Sunday", "isCorrect": false, "rationale": "The week before Easter is Semana Santa (Holy Week). Dia de los Muertos is November 1st and 2nd."}], "id": "q03"}, {"question": "What are 'ofrendas' and what are they decorated with?", "options": [{"text": "Street carpets made of colored sawdust, decorated for Semana Santa processions", "isCorrect": false, "rationale": "Colored sawdust carpets are 'alfombras' associated with Semana Santa. 'Ofrendas' are altars for Dia de los Muertos, decorated with marigolds and photos of the deceased."}, {"text": "Colorful altars built for Dia de los Muertos, decorated with marigolds, photographs, candles, and the favorite items of deceased loved ones", "isCorrect": true, "rationale": "The culture box: 'Families build colorful altars called ofrendas, decorated with bright orange marigold flowers (cempasuchil), photographs of the deceased, candles, and the favorite foods and belongings of those being remembered.'"}, {"text": "Elaborate carnival floats used in the Carnaval de Oruro parade", "isCorrect": false, "rationale": "Carnival floats are not 'ofrendas'. Ofrendas are the home altars built for Dia de los Muertos."}, {"text": "Pinatas filled with candy and used in Las Posadas celebrations", "isCorrect": false, "rationale": "Pinatas are part of Las Posadas and birthday parties, not ofrendas. Ofrendas are altars for Dia de los Muertos."}], "id": "q04"}, {"question": "What is 'agradecer' and what yo-form irregularity does it share?", "options": [{"text": "To celebrate; the yo form is agradeco", "isCorrect": false, "rationale": "To celebrate is 'celebrar'. Agradecer means to thank/be grateful for, and its yo form ends in -zco: agradezco."}, {"text": "To thank / be grateful for; its yo form is agradezco (like conocer and parecer)", "isCorrect": true, "rationale": "The section notes: 'Like conocer and parecer, the yo form adds -zco.' Agradecer -> yo agradezco. This -cer/-cir pattern adds -zco in the yo present form."}, {"text": "To give a gift; the yo form is agradoy (irregular)", "isCorrect": false, "rationale": "To give a gift is 'regalar'. Agradecer means to thank/be grateful, and its yo form is agradezco (not agradoy)."}, {"text": "To decorate; it is fully regular with yo form agradeco", "isCorrect": false, "rationale": "To decorate is 'decorar'. Agradecer means to thank, and it adds -zco in yo: agradezco."}], "id": "q05"}, {"question": "What is Las Posadas and when does it take place?", "options": [{"text": "A spring equinox festival celebrated in March", "isCorrect": false, "rationale": "Las Posadas is a December celebration. It takes place December 16-24, reenacting Mary and Joseph's search for shelter."}, {"text": "A nine-night celebration in Mexico (December 16-24) reenacting Mary and Joseph's search for shelter before Jesus's birth", "isCorrect": true, "rationale": "The culture box explains: 'Las Posadas is a nine-night celebration in Mexico (December 16-24) that reenacts Mary and Joseph's search for shelter before the birth of Jesus. Neighbors go from house to house in a candlelit procession.'"}, {"text": "A six-week Lenten fast with no eating or celebration", "isCorrect": false, "rationale": "La Cuaresma (Lent) is the fasting period. Las Posadas is a joyful nine-night celebration in December with processions, songs, and pinatas."}, {"text": "A harvest festival where families give thanks by sharing food with neighbors", "isCorrect": false, "rationale": "Las Posadas is specifically about reenacting Mary and Joseph's search for shelter (posada = shelter/inn). It is not a harvest festival."}], "id": "q06"}, {"question": "What happens during Semana Santa in Guatemala's Antigua, according to the text?", "options": [{"text": "Thousands of elaborately costumed dancers parade through the city", "isCorrect": false, "rationale": "Elaborate costumed dancers describe Carnaval de Oruro in Bolivia. Antigua is known for its alfombras during Semana Santa."}, {"text": "Entire city streets are covered with colored sawdust alfombras (carpets) over which processions walk", "isCorrect": true, "rationale": "The culture box states: 'In many countries, entire city streets are covered with colored sawdust alfombras (carpets) over which processions walk. Guatemala's Antigua is famous for its stunning alfombras.'"}, {"text": "Families build altars with marigold flowers and photos of deceased relatives", "isCorrect": false, "rationale": "Marigold altars (ofrendas) are for Dia de los Muertos. Antigua's Semana Santa is famous for its colored sawdust carpet alfombras."}, {"text": "Children dress in costumes and go from house to house singing for candy", "isCorrect": false, "rationale": "Going house to house describes Las Posadas (not for candy — for shelter/posada). Antigua's Semana Santa is known for its alfombras."}], "id": "q07"}, {"question": "What is the cempasuchil (marigold flower) associated with?", "options": [{"text": "Carnaval costumes in Bolivia", "isCorrect": false, "rationale": "Carnaval costumes are not associated with cempasuchil. Marigolds (cempasuchil) are the flowers of Dia de los Muertos altars."}, {"text": "El Dia de los Muertos altars and decorations", "isCorrect": true, "rationale": "The culture box describes cempasuchil (bright orange marigold) as one of the key decorative elements on ofrendas (altars) during Dia de los Muertos."}, {"text": "Wedding celebrations throughout Latin America", "isCorrect": false, "rationale": "Cempasuchil is specifically associated with Dia de los Muertos, not weddings."}, {"text": "Las Posadas processions in December", "isCorrect": false, "rationale": "Las Posadas processions feature candles, not marigolds. Cempasuchil is the flower of Dia de los Muertos."}], "id": "q08"}, {"question": "How was UNESCO connected to el Dia de los Muertos?", "options": [{"text": "UNESCO banned the celebration in 2005 as disrespectful.", "isCorrect": false, "rationale": "UNESCO did not ban it. UNESCO recognized Dia de los Muertos as an Intangible Cultural Heritage of Humanity in 2008."}, {"text": "In 2008, UNESCO recognized it as an Intangible Cultural Heritage of Humanity.", "isCorrect": true, "rationale": "The culture box states: 'In 2008, UNESCO recognized Dia de los Muertos as an Intangible Cultural Heritage of Humanity, honoring its deep spiritual and cultural importance.'"}, {"text": "UNESCO created the celebration in the 20th century to promote Mexican tourism.", "isCorrect": false, "rationale": "Dia de los Muertos is an ancient tradition, not created by UNESCO. UNESCO recognized it in 2008 for its existing importance."}, {"text": "UNESCO provides funding to families who build ofrendas.", "isCorrect": false, "rationale": "UNESCO recognized the cultural heritage of the tradition but does not fund individual families' altar-building."}], "id": "q09"}, {"question": "What does 'festejar' mean?", "options": [{"text": "To decorate for a celebration", "isCorrect": false, "rationale": "To decorate is 'decorar'. 'Festejar' means to celebrate, party, or make merry."}, {"text": "To celebrate, to party, to make merry", "isCorrect": true, "rationale": "'Festejar' is one of the celebration verbs introduced in the chapter. It means to celebrate or to party — slightly more festive and energetic than 'celebrar'."}, {"text": "To give thanks formally", "isCorrect": false, "rationale": "To give thanks is 'agradecer'. 'Festejar' means to celebrate or party."}, {"text": "To light candles for a ceremony", "isCorrect": false, "rationale": "Lighting candles is 'encender velas'. 'Festejar' means to celebrate or make merry."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
