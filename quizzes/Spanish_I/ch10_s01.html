<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which vowel change occurs in e→ie stem-changing verbs?", "options": [{"text": "The 'e' in the ending changes to 'ie'.", "isCorrect": false, "rationale": "The change happens in the STEM (the part before the -ar/-er/-ir ending), not in the ending itself."}, {"text": "The 'e' in the stem changes to 'ie' in most conjugated forms.", "isCorrect": true, "rationale": "In e→ie verbs, the stem vowel e changes to ie in four forms (yo, tú, él/ella, ellos/ellas) but NOT in nosotros, which keeps the regular e."}, {"text": "All vowels in the verb change to 'ie'.", "isCorrect": false, "rationale": "Only the specific stem vowel 'e' changes, and only in the boot forms. Other vowels and endings stay the same."}, {"text": "The 'e' in the stem changes to 'ie' in ALL forms including nosotros.", "isCorrect": false, "rationale": "The nosotros form is OUTSIDE the boot pattern and keeps the regular e. Only yo, tú, él/ella, and ellos/ellas change."}], "id": "q01"}, {"question": "What is the 'boot pattern' (or 'shoe pattern') in stem-changing verbs?", "options": [{"text": "All six verb forms change their stem vowel.", "isCorrect": false, "rationale": "The nosotros form stays outside the boot — it does NOT change its stem vowel."}, {"text": "The stem changes in yo, tú, él/ella, and ellos — but NOT in nosotros.", "isCorrect": true, "rationale": "If you draw a line around the four forms that change (yo, tú, él/ella, ellos/ellas), the shape looks like a boot. Nosotros is outside the boot and stays regular."}, {"text": "Only the yo and nosotros forms change their stem vowel.", "isCorrect": false, "rationale": "Actually nosotros does NOT change; it is outside the boot. The yo, tú, él/ella, and ellos forms change."}, {"text": "The stem changes in all forms for -ar verbs only.", "isCorrect": false, "rationale": "The boot pattern applies to -ar, -er, and -ir stem-changing verbs. Nosotros always stays regular in all three types."}], "id": "q02"}, {"question": "What is the yo form of 'querer' (to want)?", "options": [{"text": "quero", "isCorrect": false, "rationale": "Quero is not correct. The e→ie stem change gives: quer- → quier-, plus the yo ending -o: quiero."}, {"text": "quiero", "isCorrect": true, "rationale": "The yo form of querer applies the e→ie change in the stem: quer- → quier- + o = quiero."}, {"text": "queres", "isCorrect": false, "rationale": "This is a nonstandard tú form. The yo form (with the stem change) is quiero."}, {"text": "queremos", "isCorrect": false, "rationale": "Queremos is the nosotros form — it is outside the boot and keeps the regular e stem."}], "id": "q03"}, {"question": "Which form of 'querer' does NOT have the e→ie stem change?", "options": [{"text": "quiero (yo)", "isCorrect": false, "rationale": "Quiero (yo) DOES have the stem change: quer- → quier-."}, {"text": "quieres (tú)", "isCorrect": false, "rationale": "Quieres (tú) DOES have the stem change: quer- → quier-."}, {"text": "queremos (nosotros)", "isCorrect": true, "rationale": "Queremos (nosotros) is OUTSIDE the boot and keeps the regular stem quer- without any vowel change."}, {"text": "quieren (ellos)", "isCorrect": false, "rationale": "Quieren (ellos) DOES have the stem change: quer- → quier-."}], "id": "q04"}, {"question": "How do you correctly spell the yo form of 'preferir' (to prefer)?", "options": [{"text": "priefero", "isCorrect": false, "rationale": "This misspelling rearranges the stem letters. The stem prefer- changes to prefier-: prefiero."}, {"text": "profiero", "isCorrect": false, "rationale": "The stem vowel is e (prefer-), not o. The change gives prefier-: yo prefiero."}, {"text": "prefiero", "isCorrect": true, "rationale": "The stem prefer- undergoes e→ie to give prefier-, plus the yo ending -o: prefiero. Say it aloud: pre-FIER-o."}, {"text": "prefere", "isCorrect": false, "rationale": "Prefere is not a word. The yo form must apply the e→ie stem change: prefiero."}], "id": "q05"}, {"question": "Which of these words is a special note about 'el problema' in Spanish?", "options": [{"text": "El problema is always feminine because it ends in -a.", "isCorrect": false, "rationale": "El problema is masculine despite ending in -a. It comes from Greek and kept its masculine gender."}, {"text": "El problema is masculine even though it ends in -a — it comes from Greek.", "isCorrect": true, "rationale": "El problema is a well-known exception: words ending in -a from Greek (el programa, el sistema, el tema) are masculine in Spanish."}, {"text": "El problema is plural and must always appear with los.", "isCorrect": false, "rationale": "El problema is singular. The plural is los problemas."}, {"text": "El problema has no article because it is an abstract noun.", "isCorrect": false, "rationale": "El problema always uses the masculine article el (singular) or los (plural)."}], "id": "q06"}, {"question": "What does 'pensar' (e→ie) mean, and how is the yo form spelled?", "options": [{"text": "to think — yo penso", "isCorrect": false, "rationale": "The e→ie change applies in the yo form: pensar → piens- + o = pienso. Not penso."}, {"text": "to understand — yo entiendo", "isCorrect": false, "rationale": "Entender means to understand (yo entiendo). Pensar means to think (yo pienso)."}, {"text": "to think — yo pienso", "isCorrect": true, "rationale": "Pensar means to think; the e→ie stem change gives: pens- → piens-, + yo ending -o = pienso."}, {"text": "to want — yo pienso", "isCorrect": false, "rationale": "Querer means to want (yo quiero). Pensar means to think (yo pienso)."}], "id": "q07"}, {"question": "Which sentence correctly uses an e→ie stem-changing verb?", "options": [{"text": "Yo quero estudiar más.", "isCorrect": false, "rationale": "Quero is incorrect. Apply the e→ie change: querer → yo quiero. Correct: Yo quiero estudiar más."}, {"text": "Tú prefieres el café.", "isCorrect": true, "rationale": "Preferir is an e→ie stem-changing verb. The tú form applies the change: prefer- → prefier- + es = prefieres. Correct!"}, {"text": "Nosotros queremos ir, pero ella quieres quedarse.", "isCorrect": false, "rationale": "Queremos is correct for nosotros (outside the boot), but quieres is the tú form; for ella it should be quiere."}, {"text": "Ellos preferemos el parque.", "isCorrect": false, "rationale": "Preferemos is the nosotros form. For ellos, apply the stem change: prefer- → prefier- + en = prefieren."}], "id": "q08"}, {"question": "The e→ie stem change in 'entender' (to understand) means the ellos form is:", "options": [{"text": "entenden", "isCorrect": false, "rationale": "Entenden does not apply the stem change. In the boot, ender- → entiend- + en = entienden."}, {"text": "entendemos", "isCorrect": false, "rationale": "Entendemos is the nosotros form (outside the boot, no stem change)."}, {"text": "entienden", "isCorrect": true, "rationale": "The ellos form is inside the boot: entend- → entiend- + en = entienden."}, {"text": "entiendan", "isCorrect": false, "rationale": "Entiendan is a subjunctive form. The present indicative ellos form is entienden."}], "id": "q09"}, {"question": "Why is the nosotros form called 'outside the boot' for stem-changing verbs?", "options": [{"text": "Because nosotros always uses a different ending than other forms.", "isCorrect": false, "rationale": "Nosotros has different endings (-amos/-emos/-imos), but the 'outside the boot' phrase specifically means that the STEM does not change for nosotros."}, {"text": "Because the nosotros form does not apply the stem vowel change — it stays regular.", "isCorrect": true, "rationale": "If you draw a boot shape around the four forms that change (yo, tú, él, ellos), the nosotros form falls outside that shape. It keeps the original stem vowel without change."}, {"text": "Because nosotros verbs are always irregular in Spanish.", "isCorrect": false, "rationale": "The nosotros form is actually the MOST regular form for stem-changing verbs — it does not change at all."}, {"text": "Because nosotros verbs are conjugated differently in Latin America.", "isCorrect": false, "rationale": "The boot pattern applies universally in Spanish, regardless of region. Nosotros is always outside the boot everywhere."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
