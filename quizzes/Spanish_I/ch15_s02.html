<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 15, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How many irregular affirmative tu commands are there in Spanish?", "options": [{"text": "Five", "isCorrect": false, "rationale": "There are eight irregular affirmative tu commands, not five. They are: ven, ten, sal, haz, di, se, pon, ve."}, {"text": "Eight", "isCorrect": true, "rationale": "There are exactly 8 irregular affirmative tu commands: VEN, TEN, SAL, HAZ, DI, SE, PON, VE. The section says 'there are only eight, and by the end of this section you will know them all by heart.'"}, {"text": "Ten", "isCorrect": false, "rationale": "There are only eight irregular affirmative tu commands: ven, ten, sal, haz, di, se, pon, ve."}, {"text": "Twelve", "isCorrect": false, "rationale": "There are exactly eight irregular affirmative tu commands. No more, no less."}], "id": "q01"}, {"question": "What is the irregular tu command for 'hacer' (to do/make)?", "options": [{"text": "hace", "isCorrect": false, "rationale": "Hace is the el/ella present form, but hacer is one of the 8 irregular commands. Its command form is Haz!, not Hace!"}, {"text": "haz", "isCorrect": true, "rationale": "Haz is the irregular affirmative tu command for hacer. It does not follow the el/ella rule. Haz la tarea! = Do your homework!"}, {"text": "hacen", "isCorrect": false, "rationale": "Hacen is the ellos present form. The irregular tu command for hacer is Haz!"}, {"text": "haga", "isCorrect": false, "rationale": "Haga is the usted subjunctive/formal command. The informal tu command for hacer is the irregular Haz!"}], "id": "q02"}, {"question": "Which verb has the same tu command form as 'ir' (to go)?", "options": [{"text": "ser (to be)", "isCorrect": false, "rationale": "Ser's irregular tu command is 'se'. The verb that shares 've' as its command with ir is 'ver'."}, {"text": "ver (to see)", "isCorrect": true, "rationale": "Both ir (to go) and ver (to see) have the same tu command: ve. Context tells you which is meant: Ve al mercado! (Go!) vs. Ve la pelicula! (Watch/See!)."}, {"text": "venir (to come)", "isCorrect": false, "rationale": "Venir's irregular tu command is 'ven', not 've'. The verb sharing 've' with ir is ver."}, {"text": "vivir (to live)", "isCorrect": false, "rationale": "Vivir is a regular verb. Its tu command would be 'vive'. The verb sharing 've' with ir is ver."}], "id": "q03"}, {"question": "What is the irregular tu command for 'tener' (to have)?", "options": [{"text": "tiene", "isCorrect": false, "rationale": "Tiene is the el/ella present form. The irregular tu command for tener is 'ten'."}, {"text": "ten", "isCorrect": true, "rationale": "Ten is the irregular affirmative tu command for tener. Ten cuidado! = Be careful! (Literally: Have care!)"}, {"text": "tenga", "isCorrect": false, "rationale": "Tenga is the usted command form. The irregular tu command for tener is 'ten'."}, {"text": "tenes", "isCorrect": false, "rationale": "This is not a standard Spanish form. The irregular tu command for tener is 'ten'."}], "id": "q04"}, {"question": "Why does 'se' (the command for 'ser') have an accent mark?", "options": [{"text": "Because all irregular commands require accent marks", "isCorrect": false, "rationale": "Not all irregular commands carry accent marks. 'Se' specifically has an accent to distinguish it from the reflexive pronoun 'se'."}, {"text": "To distinguish it from 'se', the reflexive pronoun, which has no accent", "isCorrect": true, "rationale": "The note explains: 'se (be!) has an accent mark to distinguish it from se (reflexive pronoun).' The accent is a written signal that these are two different words."}, {"text": "Because the command is spoken more loudly than the pronoun", "isCorrect": false, "rationale": "Accent marks in Spanish are written rules, not indicators of volume. The accent on 'se' simply distinguishes the command from the reflexive pronoun."}, {"text": "Because 'ser' is an -er verb and -er commands always need accents", "isCorrect": false, "rationale": "There is no rule requiring accents on -er commands. The accent on 'se' is specifically to differentiate it from the reflexive pronoun 'se'."}], "id": "q05"}, {"question": "Gabriela Mistral's poem 'Dame la mano' uses which grammatical form in its title?", "options": [{"text": "A reflexive verb", "isCorrect": false, "rationale": "Dame is not a reflexive form. It is a command form — 'da' (give) + 'me' (to me) = dame (give me)."}, {"text": "An affirmative tu command combined with an object pronoun", "isCorrect": true, "rationale": "'Dame' = 'da' (command of dar) + 'me' (indirect object pronoun). 'Dame la mano' = Give me your hand. The poem shows how a command can express tender invitation rather than an order."}, {"text": "A future tense verb", "isCorrect": false, "rationale": "'Dame' is not a future tense form. It is the imperative (command) of dar plus the object pronoun me."}, {"text": "A negative command", "isCorrect": false, "rationale": "'Dame' is an affirmative command (give me). A negative command would start with 'no': 'No me des la mano.'"}], "id": "q06"}, {"question": "What is the irregular tu command for 'salir' (to leave/go out)?", "options": [{"text": "sale", "isCorrect": false, "rationale": "Sale is the el/ella present form. The irregular tu command for salir is 'sal'."}, {"text": "sal", "isCorrect": true, "rationale": "Sal is the irregular affirmative tu command for salir. Sal de aqui! = Get out of here! / Leave from here!"}, {"text": "salgas", "isCorrect": false, "rationale": "Salgas is the subjunctive/negative command form for salir. The affirmative tu command is 'sal'."}, {"text": "salid", "isCorrect": false, "rationale": "Salid is a vosotros command (used in Spain). The tu command for salir is the irregular 'sal'."}], "id": "q07"}, {"question": "Who was Gabriela Mistral and what significant honor did she receive?", "options": [{"text": "A Mexican novelist who received the Pulitzer Prize in 1945", "isCorrect": false, "rationale": "Mistral was Chilean, not Mexican, and she received the Nobel Prize in Literature (not the Pulitzer Prize) in 1945."}, {"text": "A Chilean poet and educator who was the first Latin American woman to win the Nobel Prize in Literature (1945)", "isCorrect": true, "rationale": "Gabriela Mistral (1889-1957) was a Chilean poet, educator, and diplomat, and the first Latin American woman to win the Nobel Prize in Literature, which she received in 1945."}, {"text": "An Argentine tango singer who won the Nobel Peace Prize", "isCorrect": false, "rationale": "Mistral was Chilean, not Argentine, and she won the Nobel Prize in Literature, not the Peace Prize."}, {"text": "A Colombian journalist who received the Nobel Prize in Literature in 1982", "isCorrect": false, "rationale": "The 1982 Nobel Prize in Literature went to Gabriel Garcia Marquez. Gabriela Mistral won the Nobel Prize in Literature in 1945."}], "id": "q08"}, {"question": "What is the irregular tu command for 'decir' (to say/tell)?", "options": [{"text": "dice", "isCorrect": false, "rationale": "Dice is the el/ella present form. The irregular tu command for decir is 'di'."}, {"text": "deci", "isCorrect": false, "rationale": "This is not a Spanish form. The irregular tu command for decir is 'di'."}, {"text": "di", "isCorrect": true, "rationale": "Di is the irregular affirmative tu command for decir. Di la verdad! = Tell the truth!"}, {"text": "diga", "isCorrect": false, "rationale": "Diga is the usted command/subjunctive form. The informal tu command for decir is the irregular 'di'."}], "id": "q09"}, {"question": "In the memory tip for irregular commands, what technique is recommended for memorizing the 8 forms?", "options": [{"text": "Writing each command 50 times on flashcards", "isCorrect": false, "rationale": "The tip does not recommend writing flashcards 50 times. It suggests using the story method — linking each command to a vivid action in a memorable narrative."}, {"text": "Creating a silly story that links each command to a vivid image in a memorable narrative", "isCorrect": true, "rationale": "The memory tip recommends the story method: create a silly, vivid story linking VEN-TEN-SAL-HAZ-DI-SE-PON-VE to memorable actions. 'The story does not need to make sense — the sillier and more vivid it is, the better your brain will remember it!'"}, {"text": "Singing the 8 commands to a popular pop song melody", "isCorrect": false, "rationale": "The tip suggests saying the commands in rhythm but the key method is the story method — creating a vivid narrative to link each command to a memorable image."}, {"text": "Asking a partner to quiz you repeatedly until you memorize them", "isCorrect": false, "rationale": "While partner practice is valuable, the specific memory tip here is the story method: link each command to a vivid action in a silly narrative."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
