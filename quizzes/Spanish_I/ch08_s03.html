<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How many uses does the word 'salud' have in Spanish?", "options": [{"text": "One — it only means 'health.'", "isCorrect": false, "rationale": "Salud has three uses: health, a toast when drinking, and a blessing after a sneeze."}, {"text": "Two — health and a sneeze blessing.", "isCorrect": false, "rationale": "Salud has three uses: health, a toast (Cheers!), and a sneeze blessing."}, {"text": "Three — health, a toast, and a sneeze blessing.", "isCorrect": true, "rationale": "The section describes three uses of salud: (1) health (La salud es importante), (2) a toast when drinking, and (3) saying bless you after a sneeze."}, {"text": "Four — health, a toast, a sneeze blessing, and a greeting.", "isCorrect": false, "rationale": "The section describes exactly three uses of salud. It is not used as a general greeting."}], "id": "q01"}, {"question": "In Spanish, possessive adjectives agree with ___.", "options": [{"text": "The owner of the thing (the subject)", "isCorrect": false, "rationale": "In Spanish, possessive adjectives agree with the thing owned (what is possessed), not the owner."}, {"text": "The thing owned — its gender and number", "isCorrect": true, "rationale": "Possessive adjectives agree in number (and for nuestro/nuestra, gender) with the noun that is owned, not with the owner. Mi libro (my book), mis libros (my books)."}, {"text": "The verb of the sentence", "isCorrect": false, "rationale": "Possessive adjectives agree with the noun they modify (the thing owned), not with the verb."}, {"text": "The gender of the person speaking", "isCorrect": false, "rationale": "The gender of the speaker does not change possessive adjectives in Spanish. They agree with the thing owned."}], "id": "q02"}, {"question": "What is the difference between 'tú' (with accent) and 'tu' (without accent) in Spanish?", "options": [{"text": "They mean the same thing; the accent is optional.", "isCorrect": false, "rationale": "These are two completely different words. The accent mark distinguishes the subject pronoun tú (you) from the possessive tu (your)."}, {"text": "Tú (with accent) = you (subject pronoun); tu (no accent) = your (possessive).", "isCorrect": true, "rationale": "The accent mark on tú distinguishes it from the possessive tu. Tú hablas bien (You speak well) vs. Tu libro es interesante (Your book is interesting)."}, {"text": "Tú is formal; tu is informal.", "isCorrect": false, "rationale": "The accent does not indicate formality. Tú is a subject pronoun (you as the doer), tu is a possessive adjective (belonging to you)."}, {"text": "Tú is plural; tu is singular.", "isCorrect": false, "rationale": "Neither form is plural. Tú is a singular subject pronoun (you), and tu is a possessive adjective meaning your."}], "id": "q03"}, {"question": "Which possessive adjective in Spanish changes for BOTH number AND gender?", "options": [{"text": "mi / mis", "isCorrect": false, "rationale": "Mi/mis only changes for number (singular/plural), not for gender. Nuestro is the one that changes for both."}, {"text": "tu / tus", "isCorrect": false, "rationale": "Tu/tus only changes for number. Nuestro is the possessive that changes for both gender and number."}, {"text": "su / sus", "isCorrect": false, "rationale": "Su/sus only changes for number, not gender. Nuestro is the possessive that changes for both."}, {"text": "nuestro / nuestra / nuestros / nuestras", "isCorrect": true, "rationale": "Nuestro is the only possessive adjective that changes for both gender and number: nuestro (masc. sing.), nuestra (fem. sing.), nuestros (masc. pl.), nuestras (fem. pl.)."}], "id": "q04"}, {"question": "According to the culture box, what are curanderos in Ecuador?", "options": [{"text": "Modern medical doctors trained in Quito", "isCorrect": false, "rationale": "Curanderos are traditional healers, not modern medical doctors. They practice medicina ancestral using plants and rituals."}, {"text": "Traditional healers who practice plant-based, ancestral medicine", "isCorrect": true, "rationale": "Curanderos are traditional healers in Ecuador — especially in the Andean highlands and the Amazon — who use local herbs, flowers, and rituals to treat physical and emotional ailments."}, {"text": "Government health officials who inspect markets", "isCorrect": false, "rationale": "Curanderos are traditional healers with roots in indigenous culture, not government officials."}, {"text": "Pharmacists who sell modern medicines", "isCorrect": false, "rationale": "Curanderos practice traditional, plant-based healing. La farmacia and pharmacists represent the modern medical side."}], "id": "q05"}, {"question": "In Spanish, which structure is used with body parts instead of possessive adjectives?", "options": [{"text": "Use the possessive pronoun: mío, tuyo, etc.", "isCorrect": false, "rationale": "With body parts, Spanish uses the definite article (el/la/los/las), not possessive pronouns."}, {"text": "Use the definite article (el/la/los/las) instead of mi/tu/su.", "isCorrect": true, "rationale": "With body parts, Spanish uses the definite article: Me duele la cabeza (not mi cabeza). Me cepillo los dientes (not mis dientes)."}, {"text": "Use no article at all — just state the body part.", "isCorrect": false, "rationale": "With body parts, you use the definite article (el/la/los/las), not no article."}, {"text": "Use a demonstrative adjective: este, ese, aquel.", "isCorrect": false, "rationale": "Demonstrative adjectives (this, that) are not used with body parts. Use the definite article."}], "id": "q06"}, {"question": "What do the plants 'la manzanilla' and 'el jengibre' represent in Ecuadorian traditional medicine?", "options": [{"text": "Ceremonial plants used only in religious rituals", "isCorrect": false, "rationale": "Manzanilla (chamomile) and jengibre (ginger) are common home remedies for physical ailments, not only ceremonial plants."}, {"text": "Common home remedies for stomachaches, headaches, and colds", "isCorrect": true, "rationale": "The culture box states that manzanilla (chamomile) and jengibre (ginger) are common home remedies for stomachaches, headaches, and colds in Ecuador."}, {"text": "Imported spices used only in cooking", "isCorrect": false, "rationale": "These plants are local healing remedies, not imported spices."}, {"text": "Decorative plants found in Andean gardens", "isCorrect": false, "rationale": "These plants are valued as medicinal remedies, not for decoration."}], "id": "q07"}, {"question": "In the reading, what does the doctor tell Diego to do?", "options": [{"text": "Stay in the hospital for a week.", "isCorrect": false, "rationale": "The doctor tells Diego to rest at home, not to stay in the hospital for a week."}, {"text": "Take medicine and rest.", "isCorrect": true, "rationale": "El doctor dice: Necesitas medicina y descanso — Diego needs medicine and rest."}, {"text": "Stop eating and drink only water.", "isCorrect": false, "rationale": "The doctor prescribes medicine and rest, not a food restriction."}, {"text": "Exercise every day to feel better.", "isCorrect": false, "rationale": "The doctor prescribes descanso (rest), which is the opposite of exercise."}], "id": "q08"}, {"question": "How do you say 'his/her book' and 'their books' using possessive adjectives?", "options": [{"text": "su libro / sus libros", "isCorrect": true, "rationale": "Su (singular) and sus (plural) cover both his/her/your (formal) and their. Su libro = his/her/your book; Sus libros = their/your books."}, {"text": "mi libro / mis libros", "isCorrect": false, "rationale": "Mi/mis means my, not his/her/their. Use su/sus for third-person possession."}, {"text": "tu libro / tus libros", "isCorrect": false, "rationale": "Tu/tus means your (informal), not his/her/their. Use su/sus for third-person possession."}, {"text": "nuestro libro / nuestros libros", "isCorrect": false, "rationale": "Nuestro/nuestros means our, not his/her/their. Use su/sus for third-person possession."}], "id": "q09"}, {"question": "What does 'Me duele la cabeza' mean?", "options": [{"text": "I have a headache / My head hurts.", "isCorrect": true, "rationale": "Me duele la cabeza literally means 'the head hurts me' and translates as I have a headache or My head hurts. It uses the definite article la, not mi."}, {"text": "My head is very beautiful.", "isCorrect": false, "rationale": "Duele means hurts, not is beautiful. Me duele la cabeza = my head hurts."}, {"text": "I am touching my head.", "isCorrect": false, "rationale": "Tocar means to touch. Doler means to hurt/ache."}, {"text": "She has a headache.", "isCorrect": false, "rationale": "The me (indirect object pronoun) indicates the person experiencing the pain is the speaker (I/me), not a third person."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
