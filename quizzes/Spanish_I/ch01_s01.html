<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student wants to remember the Spanish word \"libro\" (book). Following the \"Keyword Method\" described in the text, which approach would be most effective?", "options": [{"text": "Write \"libro = book\" repeatedly until it's memorized through rote learning.", "isCorrect": false, "rationale": "The Keyword Method focuses on creating vivid mental pictures and sound associations, not rote memorization."}, {"text": "Associate \"libro\" with the sound \"lee-bro\" and picture a 'library' full of 'bro's reading books.", "isCorrect": true, "rationale": "This option correctly applies the Keyword Method by finding an English sound-alike ('lee-bro' for 'libro') and creating a vivid, dramatic mental image (a 'library' with 'bros' reading), connecting the sound to the meaning."}, {"text": "Ask a native Spanish speaker to explain the meaning and origin of the word \"libro.\"", "isCorrect": false, "rationale": "While helpful, this is seeking external help and does not utilize the internal memory technique of the Keyword Method described in the text."}, {"text": "Look up the etymology of \"libro\" to understand its historical linguistic development.", "isCorrect": false, "rationale": "Etymology helps understand a word's origin, but it is a different memory technique than the sound-and-image association advocated by the Keyword Method."}]}, {"question": "Based on \"Diálogo 1: Conocerse,\" what is the primary social function demonstrated by Ana and Carlos's interaction?", "options": [{"text": "Negotiating a business agreement.", "isCorrect": false, "rationale": "The dialogue focuses on personal introductions and pleasantries, not business transactions."}, {"text": "Expressing sincere apologies for a mistake.", "isCorrect": false, "rationale": "The dialogue does not involve any apologies; it's an initial meeting."}, {"text": "Exchanging initial greetings and introductions.", "isCorrect": true, "rationale": "Ana and Carlos introduce themselves ('Me llamo'), ask each other's names ('¿Cómo te llamas?'), and exchange pleasantries ('Mucho gusto,' '¿Cómo estás?'), which are all elements of initial greetings and introductions."}, {"text": "Discussing their daily routines and future plans.", "isCorrect": false, "rationale": "They briefly inquire about well-being ('¿Cómo estás?'), but they do not discuss routines or future plans in detail."}]}, {"question": "In \"Diálogo 1,\" Carlos says \"¡Mucho gusto!\" after Ana introduces herself. If you were Ana and wanted to express a similar sentiment of pleasure at meeting Carlos, what would be the most appropriate and direct response from the key phrases provided?", "options": [{"text": "Bien, gracias.", "isCorrect": false, "rationale": "\"Bien, gracias\" means \"Fine, thanks\" and is a response to \"¿Cómo estás?\" (How are you?), not an expression of pleasure at meeting someone."}, {"text": "¡Igualmente!", "isCorrect": true, "rationale": "The \"Key phrases from this dialogue\" section states that \"Igualmente\" means \"Likewise / Same to you,\" making it the perfect reciprocal response to \"Mucho gusto!\" (Nice to meet you!)."}, {"text": "¿Y tú?", "isCorrect": false, "rationale": "¿Y tú?\" means \"And you?\" and is used to ask someone in return how they are doing or what their opinion is, not as a response to an introduction."}, {"text": "¡Adiós!", "isCorrect": false, "rationale": "¡Adiós!\" is a farewell, meaning \"Goodbye!\", and is inappropriate immediately after an introduction."}]}, {"question": "Based on the information in \"El español en el mundo,\" which of these continents or regions is listed with only one official Spanish-speaking country?", "options": [{"text": "South America", "isCorrect": false, "rationale": "The text lists nine official Spanish-speaking countries under South America."}, {"text": "Central America", "isCorrect": false, "rationale": "The text lists six official Spanish-speaking countries under Central America."}, {"text": "The Caribbean", "isCorrect": false, "rationale": "The text lists three official Spanish-speaking countries under The Caribbean."}, {"text": "Europe", "isCorrect": true, "rationale": "The text lists only one official Spanish-speaking country under Europe: España (Spain)."}]}, {"question": "You are in a crowded market and accidentally bump into someone, causing them to drop their bag. Which Spanish phrase would be most appropriate to express your immediate regret and seek their attention to help?", "options": [{"text": "¡Hola!", "isCorrect": false, "rationale": "¡Hola!\" is a greeting ('Hello!') and would not be used to apologize or get attention in this context."}, {"text": "Lo siento.", "isCorrect": false, "rationale": "\"Lo siento\" is for a sincere apology when 'something bad happened.' While dropping a bag is unfortunate, the immediate action of 'bumping into someone' and the need to 'get someone's attention' is explicitly given as an example for 'Perdón' in the text."}, {"text": "Perdón.", "isCorrect": true, "rationale": "The text states that \"Perdón (or disculpa) is a quick 'excuse me' — like when you bump into someone or want to get someone's attention.\" This makes 'Perdón' the most appropriate phrase for the initial action and to seek attention."}, {"text": "Mucho gusto.", "isCorrect": false, "rationale": "\"Mucho gusto\" means \"Nice to meet you\" and is entirely irrelevant to this situation."}]}, {"question": "According to the beginning of the \"Saludos y despedidas\" section, why are Spanish greetings highlighted as important?", "options": [{"text": "They are the most complex grammatical structures to master in Spanish.", "isCorrect": false, "rationale": "The text describes greetings as 'warm and friendly' and 'the very first thing you need,' not as grammatically complex."}, {"text": "They are primarily used in formal settings to show respect.", "isCorrect": false, "rationale": "The text states that 'you will use them every single day,' implying widespread use beyond just formal settings."}, {"text": "They are warm, friendly, and the very first thing needed when meeting someone.", "isCorrect": true, "rationale": "The text explicitly states: 'Spanish greetings are warm and friendly — and once you learn them, you will use them every single day. Let's start with the most important ones! ... the very first thing you need is a greeting.'"}, {"text": "They are the easiest way to immediately understand Spanish culture.", "isCorrect": false, "rationale": "While greetings are part of culture, the text emphasizes their practical role as the first step in communication, rather than a comprehensive cultural key."}]}, {"question": "The \"El español en el mundo\" section emphasizes the global reach of the Spanish language. What is the most significant implication of learning Spanish, as stated in the text?", "options": [{"text": "It guarantees immediate employment opportunities in all Spanish-speaking countries.", "isCorrect": false, "rationale": "The text does not make any promises about employment; its focus is on communication."}, {"text": "It allows communication with hundreds of millions of people across the globe.", "isCorrect": true, "rationale": "The text explicitly states: 'By learning Spanish, you are opening doors to communicate with hundreds of millions of people across the globe!'"}, {"text": "It provides exclusive access to Spanish literature and media.", "isCorrect": false, "rationale": "While this is a benefit, the text highlights the broad ability to 'communicate' as the most significant implication of Spanish's global presence."}, {"text": "It makes learning other Romance languages much easier due to linguistic similarities.", "isCorrect": false, "rationale": "This is a true linguistic benefit, but it is not the specific 'significant implication' emphasized by this section of the text regarding the global prevalence of Spanish."}]}, {"question": "The text explains that \"Me llamo\" means \"My name is.\" What is the literal translation of \"Me llamo,\" as provided in the \"Key phrases from this dialogue\" section?", "options": [{"text": "I am called.", "isCorrect": false, "rationale": "While this conveys the meaning, it is not the exact literal translation given in the text."}, {"text": "I call myself.", "isCorrect": true, "rationale": "The 'Key phrases from this dialogue' section explicitly states that 'Me llamo' literally means 'I call myself'."}, {"text": "You call me.", "isCorrect": false, "rationale": "This would be phrased differently in Spanish (e.g., 'Tú me llamas')."}, {"text": "My call is.", "isCorrect": false, "rationale": "This is an incorrect translation; 'llamo' is from the verb 'llamar' (to call), not a noun 'call'."}]}, {"question": "In \"Diálogo 1,\" after Ana asks Carlos \"¿Cómo estás?\", Carlos responds with \"Bien, gracias. ¿Y tú?\". If Ana then wanted to express that she is also fine, using the most complete phrase from the dialogue, what would she say?", "options": [{"text": "Gracias.", "isCorrect": false, "rationale": "\"Gracias\" means \"thanks\" but is an incomplete response to convey she is also fine."}, {"text": "Muy bien, gracias.", "isCorrect": true, "rationale": "In the dialogue, after Carlos asks '¿Y tú?', Ana responds with 'Muy bien, gracias,' which means 'Very well, thanks,' precisely conveying she is also fine."}, {"text": "¡Hola!", "isCorrect": false, "rationale": "¡Hola!\" is a greeting and would be inappropriate in response to '¿Y tú?'."}, {"text": "Hasta luego.", "isCorrect": false, "rationale": "\"Hasta luego\" is a farewell, meaning \"See you later,\" and is not used to respond about one's well-being."}]}, {"question": "In the dialogue, Carlos says \"Hasta luego, Ana,\" and Ana responds with \"¡Adiós, Carlos!\". Based on this interaction, what is the most accurate understanding of these farewells in this context?", "options": [{"text": "\"Hasta luego\" implies a more permanent goodbye, while \"Adiós\" suggests seeing someone again soon.", "isCorrect": false, "rationale": "This statement reverses the common understanding; 'Hasta luego' (see you later) implies a more temporary parting than 'Adiós' (goodbye)."}, {"text": "Both phrases are interchangeable and carry the exact same nuance.", "isCorrect": false, "rationale": "While both are farewells, the dialogue shows them being used in sequence, suggesting a subtle difference in nuance or context, not exact interchangeability."}, {"text": "\"Hasta luego\" means \"see you later,\" implying they expect to see each other again, while \"Adiós\" is a general \"goodbye.\"", "isCorrect": true, "rationale": "\"Hasta luego\" literally translates to 'see you later,' indicating an expectation of a future meeting. 'Adiós' is a standard, general 'goodbye' that can be used whether or not one expects to see the person again soon. This distinction fits the natural flow of the dialogue."}, {"text": "\"Adiós\" is a formal farewell, and \"Hasta luego\" is informal.", "isCorrect": false, "rationale": "The text does not specify formality levels for these particular farewells. Both can be used in various contexts, and 'Hasta luego' is common in both informal and semi-formal settings."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
