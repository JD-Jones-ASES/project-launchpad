<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introductory section, what is a significant cultural role of mealtimes in Latin America?", "options": [{"text": "They are primarily fast-paced occasions for quick sustenance.", "isCorrect": false, "rationale": "The text states mealtimes are 'moments to talk, laugh, and celebrate,' implying they are not fast-paced but rather social events."}, {"text": "They are often shared with family and friends, serving as social and celebratory moments.", "isCorrect": true, "rationale": "The text explicitly states, 'Across Latin America, mealtimes are often shared with family and friends — they are moments to talk, laugh, and celebrate.'"}, {"text": "They are strict, silent gatherings focused solely on the food itself.", "isCorrect": false, "rationale": "The text contradicts this by describing mealtimes as opportunities to 'talk, laugh, and celebrate,' indicating they are not silent or solely food-focused."}, {"text": "They are exclusively private affairs, rarely involving extended family.", "isCorrect": false, "rationale": "The text indicates mealtimes are 'shared with family and friends,' suggesting they are inclusive social events rather than exclusive private affairs."}], "id": "q01"}, {"question": "Based on the '¡Fíjate!' box, which of the following feminine nouns would correctly use 'el' in its singular form to avoid a 'crashing' sound, assuming it starts with a stressed 'a-' sound?", "options": [{"text": "la mesa (table)", "isCorrect": false, "rationale": "The word 'mesa' does not begin with a stressed 'a-' sound, so it follows the standard feminine article 'la'."}, {"text": "el alma (soul)", "isCorrect": true, "rationale": "According to the '¡Fíjate!' rule, feminine nouns beginning with a stressed 'a-' sound use 'el' in the singular to prevent two 'a' sounds from crashing, even though the noun is feminine. 'Alma' fits this description."}, {"text": "la casa (house)", "isCorrect": false, "rationale": "The word 'casa' does not begin with a stressed 'a-' sound, so it follows the standard feminine article 'la'."}, {"text": "el libro (book)", "isCorrect": false, "rationale": "'Libro' is a masculine noun, so it correctly uses 'el', but it does not exemplify the specific rule for feminine nouns starting with a stressed 'a-' sound."}], "id": "q02"}, {"question": "What is a distinguishing characteristic of 'ceviche' as described in the 'La comida en el Perú' section?", "options": [{"text": "It is a corn cake typically found in Colombia.", "isCorrect": false, "rationale": "A corn cake is 'la arepa,' which is mentioned as a Colombian dish, not Peruvian ceviche."}, {"text": "It is fresh seafood marinated in lime juice with onions and hot peppers.", "isCorrect": true, "rationale": "The text explicitly describes ceviche as 'fresh seafood marinated in lime juice with onions and hot peppers,' and states it is Peru's most famous dish."}, {"text": "It is boiled potatoes covered in a creamy, spicy cheese sauce.", "isCorrect": false, "rationale": "This description refers to 'la papa a la huancaína,' another Peruvian dish, not ceviche."}, {"text": "It is a type of barbecue famous in Argentina.", "isCorrect": false, "rationale": "'El asado' is mentioned as a barbecue dish famous in Argentina, not Peru."}], "id": "q03"}, {"question": "The '¡Fíjate!' box explains that 'el agua' is still feminine. How does this grammatically manifest itself when describing 'cold water'?", "options": [{"text": "You would say 'el agua frío'.", "isCorrect": false, "rationale": "If 'agua' were masculine, 'frío' would be correct. However, since 'agua' is feminine, the adjective must also be feminine, making this incorrect."}, {"text": "You would say 'la agua fría'.", "isCorrect": false, "rationale": "While 'fría' is correct for a feminine adjective, 'la agua' is incorrect in the singular due to the 'a-crashing' rule discussed in the box."}, {"text": "You would say 'el agua fría'.", "isCorrect": true, "rationale": "The text explicitly states: 'you say el agua fría (the cold water) with a feminine adjective,' demonstrating that despite using 'el' in the singular, the noun retains its feminine gender for adjective agreement."}, {"text": "You would say 'las aguas frías'.", "isCorrect": false, "rationale": "This phrase is correct for the plural, but the question specifically asks about the singular form when describing 'cold water'."}], "id": "q04"}, {"question": "Based on the 'Memory Tip' on 'Chunking,' what is the most effective way to learn a new Spanish word like 'desayuno' (breakfast)?", "options": [{"text": "Memorize 'desayuno' in isolation, repeating it multiple times.", "isCorrect": false, "rationale": "The memory tip advises against learning 'one word at a time' and promotes learning words in natural phrases, making this approach less effective."}, {"text": "Look up its definition and then immediately move on to the next word.", "isCorrect": false, "rationale": "This method focuses only on recall and does not incorporate the 'chunking' strategy of learning words within phrases."}, {"text": "Learn it as part of a natural phrase, such as 'tomar el desayuno' (to eat breakfast), and write down the entire phrase.", "isCorrect": true, "rationale": "The memory tip explicitly states: 'instead of learning one word at a time, learn words in natural phrases... Write down the chunk, not just the word.' This option directly applies the 'chunking' strategy."}, {"text": "Only learn the word if it directly translates to an English equivalent.", "isCorrect": false, "rationale": "The memory tip does not suggest limiting learning based on direct translation, but rather on how words are used in context ('chunks')."}], "id": "q05"}, {"question": "Which of the following statements about potatoes and Peru is best supported by the text?", "options": [{"text": "Potatoes were introduced to Peru by European explorers.", "isCorrect": false, "rationale": "The text states Peru 'is also the homeland of the potato itself,' implying indigenous origin, not introduction from elsewhere."}, {"text": "Peru is the homeland of the potato, cultivating over 3,000 varieties in the Andes mountains.", "isCorrect": true, "rationale": "The text explicitly states: 'Peru is also the homeland of the potato itself — over 3,000 varieties of la papa grow in the Andes mountains!'"}, {"text": "Peruvians only consume one specific type of potato, 'ají amarillo'.", "isCorrect": false, "rationale": "Ají amarillo is a chili pepper, not a type of potato, and the text mentions over 3,000 varieties, contradicting the idea of only one type."}, {"text": "La papa a la huancaína is Peru's most famous dish, eclipsing ceviche.", "isCorrect": false, "rationale": "The text identifies 'El ceviche' as 'Peru's most famous dish,' while 'la papa a la huancaína' is described as 'another beloved classic.'"}], "id": "q06"}, {"question": "Beyond Peru, the text mentions specific food traditions in other Latin American countries. Which pairing is correctly identified?", "options": [{"text": "Venezuela: los tacos", "isCorrect": false, "rationale": "Los tacos are mentioned as a Mexican tradition, not Venezuelan."}, {"text": "Argentina: la arepa", "isCorrect": false, "rationale": "La arepa is mentioned as a Colombian tradition, while Argentina is famous for 'el asado'."}, {"text": "Colombia: la hallaca", "isCorrect": false, "rationale": "La hallaca is mentioned as a Venezuelan festival dish, while Colombia is known for 'la arepa'."}, {"text": "Mexico: los tacos", "isCorrect": true, "rationale": "The text explicitly states: 'Mexico has los tacos'."}], "id": "q07"}, {"question": "The '¡Fíjate!' box lists 'el hambre' and 'el águila' as other examples of nouns following the same 'el' rule as 'el agua'. What can be inferred about these words?", "options": [{"text": "They are masculine nouns.", "isCorrect": false, "rationale": "The rule specifically applies to *feminine* nouns that start with a stressed 'a-' sound, despite using 'el' in the singular. So, they are feminine, not masculine."}, {"text": "They are feminine nouns that begin with a stressed 'a-' sound.", "isCorrect": true, "rationale": "The rule clearly states it applies 'When a feminine noun starts with a stressed a- sound,' and these are given as examples of this rule."}, {"text": "They are plural nouns.", "isCorrect": false, "rationale": "The rule is specifically for the *singular* form ('el' in the singular), and the examples are given in their singular forms."}, {"text": "They use 'la' in the singular form.", "isCorrect": false, "rationale": "The entire point of the rule is that they use 'el' in the singular despite being feminine, to avoid the 'a-crashing' sound."}], "id": "q08"}, {"question": "What does the phrase 'every dish tells a story' imply about food traditions in Latin America, according to the text?", "options": [{"text": "That dishes are complex and require detailed recipes to understand.", "isCorrect": false, "rationale": "While dishes might be complex, the phrase 'tells a story' points to cultural significance and heritage, not just culinary complexity."}, {"text": "That each dish has a unique historical, cultural, or regional significance.", "isCorrect": true, "rationale": "Coming after a discussion of various country-specific dishes and Peru's 'national pride' for ceviche, this phrase suggests that dishes carry deeper meaning, history, and cultural identity beyond mere ingredients."}, {"text": "That most dishes are named after historical figures or events.", "isCorrect": false, "rationale": "The text does not suggest this; 'tells a story' is a metaphor for cultural richness, not literal naming conventions."}, {"text": "That food is primarily a means for people to exchange personal anecdotes.", "isCorrect": false, "rationale": "While mealtimes are for talking, the 'dish tells a story' refers to the dish's own cultural background, not its role in facilitating personal stories at the table."}], "id": "q09"}, {"question": "Which of the following best summarizes the main advantage of the 'chunking' memory tip?", "options": [{"text": "It helps the brain memorize individual words more quickly through repetition.", "isCorrect": false, "rationale": "The tip explicitly advises against 'learning one word at a time' and emphasizes phrases over individual words, making this incorrect."}, {"text": "It allows learners to focus solely on grammar rules without needing vocabulary.", "isCorrect": false, "rationale": "Chunking is a vocabulary acquisition strategy, not a method to bypass vocabulary for grammar."}, {"text": "It makes new phrases feel more natural and integrates them more quickly into one's language use.", "isCorrect": true, "rationale": "The text states, 'You will be amazed how quickly the phrases become natural!' when using chunking, highlighting its benefit for natural language acquisition."}, {"text": "It reduces the total number of words one needs to learn in a new language.", "isCorrect": false, "rationale": "Chunking changes *how* words are learned, not the total number of words. It groups them, but doesn't reduce the overall vocabulary."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
