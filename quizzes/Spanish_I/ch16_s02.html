<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 16, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What makes a verb 'reflexive' in Spanish?", "options": [{"text": "The verb describes an action done to someone else", "isCorrect": false, "rationale": "When an action is done to someone else, a regular verb (not reflexive) is used. A reflexive verb shows that the subject performs the action on themselves."}, {"text": "The verb shows that the subject performs the action on themselves", "isCorrect": true, "rationale": "A reflexive verb shows that the subject performs the action on themselves. Examples: levantarse (to get oneself up), banarse (to bathe oneself), vestirse (to dress oneself)."}, {"text": "The verb requires a direct object noun", "isCorrect": false, "rationale": "Reflexive verbs use reflexive pronouns (me, te, se, nos), not regular direct object nouns. The action loops back to the subject."}, {"text": "The verb is always irregular", "isCorrect": false, "rationale": "Many reflexive verbs are completely regular. The reflexive nature comes from the pronoun, not from irregularity in the verb itself."}]}, {"question": "How are reflexive verbs listed in a Spanish dictionary?", "options": [{"text": "With the prefix 're-' before the verb", "isCorrect": false, "rationale": "Re- is not used to mark reflexive verbs. Reflexive verbs are listed with '-se' attached to the infinitive: levantarse, banarse, etc."}, {"text": "With '-se' attached to the infinitive: levantarse, banarse, vestirse", "isCorrect": true, "rationale": "The grammar note explains: 'Reflexive verbs are listed with -se attached to the infinitive: levantarse, banarse, vestirse. When you conjugate them, remove -se and replace it with the correct pronoun.'"}, {"text": "With an asterisk (*) before the entry", "isCorrect": false, "rationale": "Asterisks are not the standard way to mark reflexive verbs. They are listed with -se at the end of the infinitive."}, {"text": "With the pronoun 'se' written separately before the infinitive", "isCorrect": false, "rationale": "The -se is attached to the end of the infinitive (levantarse), not placed separately before it."}]}, {"question": "Where is the reflexive pronoun placed when conjugating a reflexive verb?", "options": [{"text": "After the conjugated verb", "isCorrect": false, "rationale": "The reflexive pronoun is placed directly BEFORE the conjugated verb: 'Me levanto' (I get up), not 'Levantome'."}, {"text": "Directly before the conjugated verb", "isCorrect": true, "rationale": "The reflexive pronoun is placed directly before the conjugated verb: Me levanto, te banas, se viste. The pronoun must match the subject."}, {"text": "At the end of the sentence", "isCorrect": false, "rationale": "With a single conjugated verb, the reflexive pronoun goes before the verb, not at the end of the sentence."}, {"text": "Between the subject and the verb", "isCorrect": false, "rationale": "While the pronoun does come before the verb, 'between the subject and verb' is misleading since Spanish often omits the subject. The pronoun goes directly before the conjugated verb."}]}, {"question": "Which reflexive pronoun is used with 'ella' (she) as the subject?", "options": [{"text": "me", "isCorrect": false, "rationale": "'Me' is the reflexive pronoun for 'yo' (I). For ella (she), the reflexive pronoun is 'se'."}, {"text": "te", "isCorrect": false, "rationale": "'Te' is the reflexive pronoun for 'tu' (you). For ella (she), the pronoun is 'se'."}, {"text": "nos", "isCorrect": false, "rationale": "'Nos' is the reflexive pronoun for 'nosotros' (we). For ella (she), the pronoun is 'se'."}, {"text": "se", "isCorrect": true, "rationale": "'Se' is the reflexive pronoun for el/ella/usted (he/she/you formal) AND ellos/ellas (they). Ella se viste = She gets dressed."}]}, {"question": "Why do you say 'Me cepillo LOS dientes' rather than 'Me cepillo MIS dientes'?", "options": [{"text": "Because 'mis' is not used with any body parts in Spanish", "isCorrect": false, "rationale": "Possessive adjectives can be used with body parts in some contexts, but the rule here is that with cepillarse and similar reflexive actions, Spanish uses the definite article."}, {"text": "Because Spanish uses the definite article (el/los/la/las) with body parts in reflexive actions, not possessives", "isCorrect": true, "rationale": "The grammar note explains: 'use a definite article (el/los/la/las), not a possessive.' So: Me cepillo LOS dientes (not mis dientes). Se cepilla EL pelo (not su pelo)."}, {"text": "Because 'mis' is only used with clothing, not body parts", "isCorrect": false, "rationale": "The rule is broader: with reflexive body-care actions, Spanish uses the definite article rather than possessives to refer to body parts."}, {"text": "Because 'los dientes' is plural and possessives cannot be used with plural body parts", "isCorrect": false, "rationale": "Number has nothing to do with it. The rule applies to all body parts in reflexive constructions: use el/la/los/las instead of mi/tu/su."}]}, {"question": "Which of the following reflexive verbs has a stem change?", "options": [{"text": "levantarse", "isCorrect": false, "rationale": "Levantarse is a regular -ar reflexive verb with no stem change. Me levanto, te levantas, etc."}, {"text": "banarse", "isCorrect": false, "rationale": "Banarse is a regular -ar reflexive verb with no stem change. Me bano, te banas, etc."}, {"text": "vestirse (e -> i)", "isCorrect": true, "rationale": "Vestirse is a stem-changing reflexive verb (e -> i): me visto, te vistes, se viste. Acostarse (o -> ue) and despertarse (e -> ie) also have stem changes."}, {"text": "cepillarse", "isCorrect": false, "rationale": "Cepillarse is a regular -ar reflexive verb with no stem change. Me cepillo, te cepillas, etc."}]}, {"question": "What does 'Nos acostamos tarde los viernes' mean?", "options": [{"text": "We get up late on Fridays.", "isCorrect": false, "rationale": "Getting up would use levantarse: 'Nos levantamos'. Acostarse means to go to bed."}, {"text": "We go to bed late on Fridays.", "isCorrect": true, "rationale": "'Nos acostamos' = We go to bed (nosotros form of acostarse, o->ue stem-changer). 'Tarde' = late. 'Los viernes' = on Fridays."}, {"text": "We get dressed late on Fridays.", "isCorrect": false, "rationale": "Getting dressed is vestirse: 'Nos vestimos'. Acostarse means to go to bed."}, {"text": "We wake up late on Fridays.", "isCorrect": false, "rationale": "Waking up is despertarse: 'Nos despertamos'. Acostarse means to go to bed."}]}, {"question": "What memory technique is recommended for learning reflexive verbs?", "options": [{"text": "Making a vocabulary list and memorizing it alphabetically", "isCorrect": false, "rationale": "The memory tip recommends narrating your own actual morning routine in Spanish, not alphabetical memorization."}, {"text": "Narrating your own morning routine in Spanish every day", "isCorrect": true, "rationale": "The memory tip says: 'Every day when you wake up, narrate your routine in Spanish — out loud or in your head.' Start with 2-3 verbs and add more each week. Your routine is your daily study session."}, {"text": "Writing each reflexive verb 20 times to memorize it", "isCorrect": false, "rationale": "The recommended technique is daily narration of your morning routine, not written repetition."}, {"text": "Listening to a song that uses all the reflexive verbs", "isCorrect": false, "rationale": "The memory tip focuses on the morning routine narration technique, not a song. The Dona Blanca song in the section is for other purposes."}]}, {"question": "What is 'Dona Blanca' and why is it included in this chapter?", "options": [{"text": "A Mexican folk dance used to practice verb conjugations", "isCorrect": false, "rationale": "Dona Blanca is a traditional game song, not specifically a dance. It is included as a cultural example of Latin American children's tradition."}, {"text": "A traditional Latin American children's game song where players act out the story of Dona Blanca and the jicotillo", "isCorrect": true, "rationale": "Dona Blanca is a beloved traditional game song from across Latin America. Children form a circle; one child is Dona Blanca protected by pillars of silver and gold, and another plays the jicotillo trying to break through."}, {"text": "A Venezuelan folk song specifically about daily routines", "isCorrect": false, "rationale": "Dona Blanca is popular across Latin America, especially Mexico and Central America. It is not specifically about daily routines — it features poetic imagery of pillars and a wasp-like creature."}, {"text": "A poem by Gabriela Mistral about morning routines", "isCorrect": false, "rationale": "Gabriela Mistral wrote 'Dame la mano'. Dona Blanca is a traditional children's game song, not a Mistral poem."}]}, {"question": "What does 'Me despierto temprano cuando tengo un vuelo' mean?", "options": [{"text": "I used to wake up early when I had a flight.", "isCorrect": false, "rationale": "This sentence is in the present tense, not the past. Me despierto = I wake up (present). Tengo = I have (present)."}, {"text": "I wake up early when I have a flight.", "isCorrect": true, "rationale": "'Me despierto' = I wake up (despertarse, e->ie stem change). 'Temprano' = early. 'Cuando tengo un vuelo' = when I have a flight."}, {"text": "I will wake up early when I have a flight.", "isCorrect": false, "rationale": "The sentence uses present tense (me despierto), not future tense. It means: I wake up early when I have a flight."}, {"text": "She wakes up early when she has a flight.", "isCorrect": false, "rationale": "'Me despierto' uses the first-person reflexive pronoun 'me', so the subject is 'I', not 'she'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
