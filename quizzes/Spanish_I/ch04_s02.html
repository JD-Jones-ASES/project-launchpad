    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the rules of 'La concordancia de los adjetivos,' which of the following best describes the agreement required for adjectives in Spanish?", "options": [{"text": "Adjectives must only match the noun in number (singular/plural).", "isCorrect": false, "rationale": "The text explicitly states that adjectives must match the noun in both gender and number, making this option incomplete."}, {"text": "Adjectives must match the noun in both gender (masculine/feminine) and number (singular/plural).", "isCorrect": true, "rationale": "The 'grammarbox' section clearly states, 'In Spanish, adjectives must match the noun they describe in both gender (masculine/feminine) and number (singular/plural).'"}, {"text": "Adjectives must only match the noun in gender (masculine/feminine).", "isCorrect": false, "rationale": "While gender agreement is necessary, the text specifies that number agreement is also required, making this option incomplete."}, {"text": "Adjectives do not need to agree with the noun they describe in Spanish.", "isCorrect": false, "rationale": "This statement contradicts the fundamental rule presented in the section, which emphasizes the importance of 'concordancia' (agreement)."}], "id": "q01"}, {"question": "Which of the following phrases correctly applies the agreement rules for an adjective ending in -o/-a to the noun 'los estudiantes' (the students, masculine plural) using the adjective 'alto' (tall)?", "options": [{"text": "los estudiantes alta", "isCorrect": false, "rationale": "This option incorrectly uses the feminine singular form 'alta' for a masculine plural noun 'los estudiantes'."}, {"text": "los estudiantes altos", "isCorrect": true, "rationale": "The noun 'los estudiantes' is masculine plural. The adjective 'alto' must change its ending to match both gender and number, becoming 'altos'."}, {"text": "los estudiantes alto", "isCorrect": false, "rationale": "This option uses the masculine singular form 'alto' but the noun 'los estudiantes' is plural, making the agreement incorrect."}, {"text": "la estudiante altos", "isCorrect": false, "rationale": "This option changes the gender and number of the article and noun incorrectly, and the adjective 'altos' does not agree with 'la estudiante' (feminine singular)."}], "id": "q02"}, {"question": "Based on the section's rule for adjective placement, how would you correctly say 'the intelligent girl' in Spanish?", "options": [{"text": "la inteligente chica", "isCorrect": false, "rationale": "This option places the adjective before the noun, which is typically incorrect for descriptive adjectives in Spanish, as stated in the text: 'descriptive adjectives almost always come AFTER the noun'."}, {"text": "la chica inteligente", "isCorrect": true, "rationale": "The noun 'chica' is feminine singular, and 'inteligente' (an adjective ending in -e) does not change for gender in singular, only number. The adjective is correctly placed after the noun."}, {"text": "el chico inteligente", "isCorrect": false, "rationale": "This option incorrectly changes the gender of the noun from 'girl' to 'boy' ('el chico')."}, {"text": "la chica inteligentes", "isCorrect": false, "rationale": "This option correctly places the adjective, but 'chica' is singular, so the adjective 'inteligentes' (plural) does not agree in number."}], "id": "q03"}, {"question": "Which of the following adjectives, when describing 'las mesas' (the tables, feminine plural), would retain the same form for gender as if it were describing 'los libros' (the books, masculine plural), only changing for number?", "options": [{"text": "rojo (red)", "isCorrect": false, "rationale": "Adjectives ending in -o/-a, like 'rojo,' change for both gender and number (e.g., 'rojas' for feminine plural, 'rojos' for masculine plural)."}, {"text": "azul (blue)", "isCorrect": true, "rationale": "The '¡Ojo!' section specifically notes that colors like 'azul' do not change for gender, only for number. So, it would be 'las mesas azules' and 'los libros azules'."}, {"text": "blanco (white)", "isCorrect": false, "rationale": "Adjectives ending in -o/-a, like 'blanco,' change for both gender and number (e.g., 'blancas' for feminine plural, 'blancos' for masculine plural)."}, {"text": "pequeño (small)", "isCorrect": false, "rationale": "Adjectives ending in -o/-a, like 'pequeño,' change for both gender and number (e.g., 'pequeñas' for feminine plural, 'pequeños' for masculine plural)."}], "id": "q04"}, {"question": "If you wanted to describe 'unas hermanas' (some sisters, feminine plural) as 'young,' what would be the correct form of the adjective 'joven' and its placement?", "options": [{"text": "unas joven hermanas", "isCorrect": false, "rationale": "This option incorrectly places the adjective before the noun and does not make it plural. Adjectives like 'joven' (ending in a consonant) are pluralized by adding -es, and are placed after the noun."}, {"text": "unas hermanas jóvenes", "isCorrect": true, "rationale": "The noun 'hermanas' is feminine plural. 'Joven' ends in a consonant, so it does not change for gender, but it must change for number by adding -es, becoming 'jóvenes.' It is also correctly placed after the noun."}, {"text": "unas hermanas joven", "isCorrect": false, "rationale": "While the placement is correct, the adjective 'joven' has not been made plural to agree with 'hermanas'."}, {"text": "unas jóvenes hermanas", "isCorrect": false, "rationale": "This option incorrectly places the adjective before the noun, even though the adjective itself is correctly pluralized."}], "id": "q05"}, {"question": "According to the 'Summary of the process,' what is the *first* essential step a learner should take when trying to apply an adjective correctly to a noun?", "options": [{"text": "Place the adjective after the noun.", "isCorrect": false, "rationale": "Placing the adjective is the last step in the summarized process, not the first."}, {"text": "Match the adjective to the noun in gender and number.", "isCorrect": false, "rationale": "Matching the adjective is the third step in the process, requiring prior information about the noun's gender and number."}, {"text": "Find the noun and determine its gender and whether it is singular or plural.", "isCorrect": true, "rationale": "The 'Summary of the process' clearly states as the first step: 'Find the noun. What gender is it? (Check the article: el/un = masculine; la/una = feminine) Is the noun singular or plural?'"}, {"text": "Check if the adjective ends in -e or a consonant.", "isCorrect": false, "rationale": "Understanding the adjective's ending is part of the matching process, but it's not the initial step; first, you must identify the noun's characteristics."}], "id": "q06"}, {"question": "In the dialogue, Sofía asks Diego, '¿Cómo es tu maestro de matemáticas?' and Diego responds, 'Es alto y simpático. ¡Y es muy inteligente!' Based on this exchange, what can we infer about Diego's math teacher?", "options": [{"text": "He is short, unfriendly, and not very bright.", "isCorrect": false, "rationale": "This description is the opposite of what Diego says. 'Alto' means tall, 'simpático' means friendly, and 'inteligente' means intelligent."}, {"text": "He is tall, friendly, and very intelligent.", "isCorrect": true, "rationale": "Diego directly uses the adjectives 'alto' (tall), 'simpático' (friendly), and 'inteligente' (intelligent) to describe his teacher, matching the masculine singular form of each."}, {"text": "She is tall, friendly, and very intelligent.", "isCorrect": false, "rationale": "The dialogue refers to 'tu maestro' (masculine teacher), not 'maestra' (feminine teacher). The adjectives 'alto' and 'simpático' are also in masculine singular form."}, {"text": "He is old and serious.", "isCorrect": false, "rationale": "While Sofía later asks if he is 'joven o viejo,' Diego clarifies he is 'joven,' not 'viejo.' The dialogue doesn't mention him being serious."}], "id": "q07"}, {"question": "The text states that adjectives ending in -e or a consonant, like 'grande' or 'azul,' do not change for gender. What is the implication of this rule for adjectives of this type?", "options": [{"text": "They remain the same whether describing a masculine or feminine noun, and also do not change for number.", "isCorrect": false, "rationale": "While they remain the same for gender, the '¡Ojo!' box explicitly states, 'The only thing that changes is the plural ending,' meaning they do change for number."}, {"text": "They only change their form when describing a feminine noun, but not a masculine one.", "isCorrect": false, "rationale": "This contradicts the rule that they do not change for gender at all, meaning they are the same for both masculine and feminine nouns."}, {"text": "They change for both gender and number, just like adjectives ending in -o/-a.", "isCorrect": false, "rationale": "This is incorrect. The text highlights that these adjectives are distinct because they *do not* change for gender, unlike many -o/-a adjectives."}, {"text": "They look the same whether describing a masculine or feminine noun, but they do change for plural.", "isCorrect": true, "rationale": "The '¡Ojo! Adjectives ending in -e or a consonant' section clearly states, 'Some adjectives do not change for gender — they look the same whether describing a masculine or feminine noun. The only thing that changes is the plural ending.'"}], "id": "q08"}, {"question": "Based on the dialogue, how does Sofía describe her science teacher?", "options": [{"text": "She is short, thin, and very serious.", "isCorrect": false, "rationale": "Sofía describes her teacher as 'muy alta' (very tall) and 'delgada' (thin), not short. She also says 'Es un poco seria' (a bit serious), not 'very serious'."}, {"text": "She is very tall, thin, a bit serious, but a very good teacher.", "isCorrect": true, "rationale": "Sofía states: 'Es muy alta y delgada. Es un poco seria, pero es muy buena maestra.' This aligns perfectly with the description."}, {"text": "She is young, friendly, and very intelligent.", "isCorrect": false, "rationale": "This description is for Diego's math teacher, not Sofía's science teacher."}, {"text": "She is fun and very creative.", "isCorrect": false, "rationale": "This description is for Diego's art teacher, not Sofía's science teacher."}], "id": "q09"}, {"question": "Which of the following phrases demonstrates correct adjective agreement and placement for 'a blue table'?", "options": [{"text": "la azul mesa", "isCorrect": false, "rationale": "This option incorrectly places the adjective before the noun, and uses a definite article 'la' instead of 'a'/'una'."}, {"text": "una mesa azul", "isCorrect": true, "rationale": "The noun 'mesa' (table) is feminine singular. The adjective 'azul' (blue) is a color ending in a consonant, so it does not change for gender in the singular form. It is correctly placed after the noun and 'una' agrees with 'mesa'."}, {"text": "la mesa azules", "isCorrect": false, "rationale": "This option uses a plural adjective 'azules' with a singular noun 'mesa', making the agreement incorrect."}, {"text": "un mesa azul", "isCorrect": false, "rationale": "The indefinite article 'un' is masculine singular, but 'mesa' is feminine singular, requiring 'una'. The rest is correct for adjective agreement and placement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
