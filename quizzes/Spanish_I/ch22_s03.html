<script>
var QUESTIONS = [{"question": "What is the recipe for forming the subjunctive for -er and -ir verbs?", "options": [{"text": "Take the infinitive, drop -er/-ir, add -e endings: -e, -es, -e, -emos, -en", "isCorrect": false, "rationale": "You do not start from the infinitive. Start from the yo present form: drop -o, then add -a endings (opposite vowel for -er/-ir verbs)."}, {"text": "Take the yo present, drop -o, add -a endings: -a, -as, -a, -amos, -an", "isCorrect": true, "rationale": "The review confirms: 'Recipe: take the yo present form, drop the -o, add opposite vowel endings (-e endings for -ar; -a endings for -er/-ir).' For -er/-ir verbs, add -a endings."}, {"text": "Use the same form as the el/ella present tense", "isCorrect": false, "rationale": "The el/ella present form is used for affirmative tu commands. Subjunctive starts from yo present: drop -o + add -a endings (-er/-ir)."}, {"text": "Take the preterite yo form and add subjunctive endings", "isCorrect": false, "rationale": "The subjunctive is built from the yo PRESENT form, not preterite. Drop -o from present yo, then add opposite vowel endings."}], "id": "q01"}, {"question": "According to the grammar review, what are the key irregular preterite forms you must know?", "options": [{"text": "ser (soy/somos), ir (voy/vamos), tener (tengo/tenemos)", "isCorrect": false, "rationale": "These are present-tense forms. The key irregular PRETERITE forms are: fui/fue (ser/ir — same!), hice/hizo (hacer), tuve/tuvo (tener), estuve/estuvo (estar)."}, {"text": "fui/fue (ser/ir), hice/hizo (hacer), tuve/tuvo (tener), estuve/estuvo (estar)", "isCorrect": true, "rationale": "The preterite review box lists: 'Key irregular preterites: fui/fue (ser/ir — same forms!), hice/hizo (hacer), tuve/tuvo (tener), estuve/estuvo (estar).'"}, {"text": "era/eran (ser), iba/iban (ir), veia/veian (ver)", "isCorrect": false, "rationale": "These are the three irregular IMPERFECT forms. The question asks about preterite."}, {"text": "hable, comio, vivimos, llegaron (regular forms)", "isCorrect": false, "rationale": "These are regular preterite forms, not irregular ones. The key irregular preterites are fui/fue, hice/hizo, tuve/tuvo, estuve/estuvo."}], "id": "q02"}, {"question": "The review summarizes that the imperfect tense is like a 'video running in the background.' What does this mean?", "options": [{"text": "You need a video camera to understand the imperfect tense.", "isCorrect": false, "rationale": "This is a metaphor, not a literal instruction. The video metaphor means: the imperfect describes ongoing, continuous, or habitual past states — not snapshotted events."}, {"text": "The imperfect describes ongoing states, background descriptions, and habitual past actions — not single completed snapshots", "isCorrect": true, "rationale": "The review states: 'Use the imperfect for: habits in the past, ongoing states, background description, telling what someone used to do (imperfect = video running in the background).'"}, {"text": "The imperfect is only used when describing movies or TV shows.", "isCorrect": false, "rationale": "The video metaphor is figurative. The imperfect describes any ongoing or habitual past action/state — not just things related to actual videos."}, {"text": "The imperfect requires a specific time word like 'siempre' to be used.", "isCorrect": false, "rationale": "While 'siempre' is a common imperfect signal word, the tense can be used without it whenever the meaning is ongoing/habitual/background."}], "id": "q03"}, {"question": "What does the farewell letter compare Spanish to?", "options": [{"text": "A mountain — difficult to climb but beautiful from the top", "isCorrect": false, "rationale": "The letter does not use a mountain metaphor. It compares Spanish to a key (una llave) that opens doors to over 20 countries and hundreds of millions of people."}, {"text": "A key (una llave) that lets you enter the culture of 20+ countries and connect with hundreds of millions of people", "isCorrect": true, "rationale": "The letter says: 'El espanol no es solo un idioma — es una llave. Con ella, puedes entrar a la cultura de mas de 20 paises, conocer a cientos de millones de personas...'"}, {"text": "A long road with many obstacles and checkpoints", "isCorrect": false, "rationale": "The letter does not use a road metaphor. It uses the key (una llave) metaphor to describe Spanish as a tool that opens cultural doors."}, {"text": "A mirror that helps you see your own culture more clearly", "isCorrect": false, "rationale": "The letter uses a key metaphor (una llave), not a mirror. Spanish opens the door to other cultures and perspectives."}], "id": "q04"}, {"question": "What is the song 'A la rueda de San Miguel' about?", "options": [{"text": "A battle between Spanish colonial forces and indigenous warriors", "isCorrect": false, "rationale": "The song is a joyful children's circle game — not a battle song. Children hold hands, walk in a circle (una rueda), and one child spins in the middle."}, {"text": "A joyful children's circle game where everyone holds hands and goes in a ring together", "isCorrect": true, "rationale": "The song box describes: 'A la rueda de San Miguel is a joyful circle game from across Latin America. Children hold hands and walk in a circle — una rueda — singing this playful song. One child stands in the middle and spins.'"}, {"text": "A religious hymn about the archangel Saint Michael", "isCorrect": false, "rationale": "While the song mentions San Miguel, it is used as a children's circle game, not as a religious hymn."}, {"text": "A farewell song sung at the end of every Spanish school year", "isCorrect": false, "rationale": "A la rueda de San Miguel is a traditional game song, not specifically a year-end farewell song."}], "id": "q05"}, {"question": "What does the phrase 'El aprendizaje es un ciclo' mean and how does it apply to Spanish learning?", "options": [{"text": "Learning is boring and repetitive.", "isCorrect": false, "rationale": "The phrase is a positive statement. El aprendizaje es un ciclo = Learning is a cycle — meaning that revisiting and recycling vocabulary and grammar actually strengthens learning."}, {"text": "Learning is a cycle — returning to vocabulary, revisiting grammar, and building on previous knowledge strengthens the language", "isCorrect": true, "rationale": "The reflection notes: 'Our journey through Spanish has also been circular: we kept returning to vocabulary, revisiting grammar, and building on everything we knew before. Spaced repetition, recycling, and review were baked into every chapter.'"}, {"text": "You must finish one complete chapter before starting the next.", "isCorrect": false, "rationale": "The cycle metaphor refers to the spiraling nature of language learning — returning to earlier material and building on it — not a strict linear sequence."}, {"text": "Spanish vocabulary repeats in a pattern every seven chapters.", "isCorrect": false, "rationale": "The cycle is not about a specific number of chapters. It describes how recycling and revisiting content throughout the whole course strengthens learning."}], "id": "q06"}, {"question": "According to the farewell letter, what makes a language learner 'valiente' (brave)?", "options": [{"text": "Getting perfect scores on every test", "isCorrect": false, "rationale": "The letter does not mention perfect test scores. Bravery is about attempting to speak Spanish even when it is difficult."}, {"text": "Attempting to speak Spanish even while making mistakes, searching for words, or speaking slowly", "isCorrect": true, "rationale": "The letter says: 'cada vez que intentas hablar espanol — aunque cometas errores, aunque busques las palabras, aunque hables despacio — estas siendo valiente. Y esa valentia es lo mas importante de todo.'"}, {"text": "Moving to a Spanish-speaking country to immerse yourself", "isCorrect": false, "rationale": "Immersion is mentioned as a future possibility but not as what makes you valiente. Bravery is in the attempt to speak, regardless of location."}, {"text": "Memorizing all 1,000 most common Spanish words", "isCorrect": false, "rationale": "The letter does not mention memorizing word lists. Bravery is in the act of trying to speak, even imperfectly."}], "id": "q07"}, {"question": "What is 'la valentía'?", "options": [{"text": "The vocabulary list", "isCorrect": false, "rationale": "The vocabulary list is 'la lista de vocabulario'. 'La valentia' means bravery or courage."}, {"text": "Bravery / courage", "isCorrect": true, "rationale": "From the vocabulary in the farewell letter: 'la valentia = bravery, courage.' It comes from 'valiente' (brave). The letter says: 'Esa valentia es lo mas importante de todo' (That bravery is the most important thing of all)."}, {"text": "The grade or evaluation", "isCorrect": false, "rationale": "The grade is 'la nota' or 'la calificacion'. 'La valentia' means bravery or courage."}, {"text": "The journey or path forward", "isCorrect": false, "rationale": "The journey/path is 'el camino'. 'La valentia' means bravery or courage."}], "id": "q08"}, {"question": "The review box for affirmative tu commands states: 'Affirmative tu rule: use the el/ella present form.' What are the 8 exceptions?", "options": [{"text": "habla, come, escribe, lee, corre, vive, sube, baja", "isCorrect": false, "rationale": "These are all regular command forms following the el/ella rule. The 8 irregular commands are: ven, ten, sal, haz, di, se, pon, ve."}, {"text": "ven, ten, sal, haz, di, se, pon, ve", "isCorrect": true, "rationale": "The review box confirms: '8 irregular affirmative commands: ven, ten, sal, haz, di, se, pon, ve.' These are the exceptions to the el/ella present form rule."}, {"text": "venir, tener, salir, hacer, decir, ser, poner, ir (the infinitives)", "isCorrect": false, "rationale": "These are the infinitives of the irregular verbs. The actual command FORMS are: ven, ten, sal, haz, di, se, pon, ve."}, {"text": "vine, tuve, sali, hice, dije, fui, puse, vino (preterite forms)", "isCorrect": false, "rationale": "These are preterite forms. The irregular affirmative tu commands are: ven, ten, sal, haz, di, se, pon, ve."}], "id": "q09"}, {"question": "What encouragement does the farewell letter give about continuing Spanish beyond this book?", "options": [{"text": "You should stop studying Spanish and only practice conversation from now on.", "isCorrect": false, "rationale": "The letter encourages continued study AND conversation. It says: 'Finishing this book is not the end of your Spanish journey — it is the beginning of the real adventure.'"}, {"text": "Finishing this book is the beginning of the real adventure — find conversation partners, watch shows in Spanish, read easy books, and continue your studies", "isCorrect": true, "rationale": "The letter lists: find a conversation partner, watch shows/movies in Spanish, read easy books, listen to Spanish music you like, visit Spanish-speaking communities, and continue your formal studies. The journey has just begun!"}, {"text": "You now know all the Spanish you will ever need for everyday life.", "isCorrect": false, "rationale": "The letter explicitly says: 'Todavia hay mucho que aprender. El subjuntivo tiene muchas mas formas.' It acknowledges there is much more to learn."}, {"text": "You should wait two years before trying to speak Spanish with native speakers.", "isCorrect": false, "rationale": "The letter encourages immediate engagement: find a conversation partner in your school or neighborhood and practice even 10 minutes a week."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
