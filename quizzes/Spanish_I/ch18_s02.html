    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 18, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why do emotion adjectives in Spanish always use 'estar' rather than 'ser'?", "options": [{"text": "Because emotions are permanent personality traits", "isCorrect": false, "rationale": "If emotions were permanent, they would use ser. Emotions use estar because they are temporary states — how you feel right now or today, not who you permanently are."}, {"text": "Because emotions are temporary states — how you feel right now — and estar expresses temporary states", "isCorrect": true, "rationale": "The grammar box explains: 'Emotions and feelings in Spanish always use estar — not ser. Why? Because emotions are temporary states. You are not permanently sad or happy; you are sad or happy right now or today.'"}, {"text": "Because 'ser' is only used for physical descriptions", "isCorrect": false, "rationale": "Ser is used for many things beyond physical descriptions, including nationality, origin, and material. Emotions use estar because they are temporary, not permanent."}, {"text": "Because all Spanish adjectives require estar, not ser", "isCorrect": false, "rationale": "Not all adjectives use estar. Adjectives describing permanent characteristics (nationality, material, identity) use ser. Emotion adjectives specifically use estar because emotions are temporary states."}], "id": "q01"}, {"question": "How do you say 'She is tired' in Spanish?", "options": [{"text": "Ella es cansada.", "isCorrect": false, "rationale": "Emotions and states use estar, not ser. The correct form is: Ella esta cansada."}, {"text": "Ella esta cansada.", "isCorrect": true, "rationale": "Emotion adjectives always use estar. 'Cansada' is the feminine form of cansado (tired). Ella esta cansada = She is tired."}, {"text": "Ella tiene cansada.", "isCorrect": false, "rationale": "Tener (to have) is not used with emotion adjectives in this way. Emotions use estar + adjective: Ella esta cansada."}, {"text": "Ella cansa.", "isCorrect": false, "rationale": "This is not grammatically correct for expressing a feeling. Use estar + adjective: Ella esta cansada."}], "id": "q02"}, {"question": "Which emotion adjective does NOT change form for masculine/feminine?", "options": [{"text": "cansado/cansada", "isCorrect": false, "rationale": "Cansado does change for gender: cansado (masculine) / cansada (feminine). The adjective that stays the same is 'triste'."}, {"text": "orgulloso/orgullosa", "isCorrect": false, "rationale": "Orgulloso changes for gender: orgulloso (masculine) / orgullosa (feminine). The adjective that does not change is 'triste'."}, {"text": "triste", "isCorrect": true, "rationale": "The note explains: 'Triste does not change: El esta triste. Ella esta triste. Both are correct because triste ends in -e, not -o/-a.'"}, {"text": "aburrido/aburrida", "isCorrect": false, "rationale": "Aburrido changes for gender: aburrido (masculine) / aburrida (feminine). Only adjectives ending in -e (like triste) stay the same for both genders."}], "id": "q03"}, {"question": "Who were 'Los Tres Grandes' of Mexican muralism?", "options": [{"text": "Frida Kahlo, Pablo Picasso, and Salvador Dali", "isCorrect": false, "rationale": "Picasso was Spanish and Dali was also Spanish — neither was Mexican. Los Tres Grandes were Diego Rivera, Frida Kahlo, and David Alfaro Siqueiros."}, {"text": "Diego Rivera, Frida Kahlo, and David Alfaro Siqueiros", "isCorrect": true, "rationale": "The culture box identifies Los Tres Grandes (The Three Greats) as Diego Rivera, Frida Kahlo, and David Alfaro Siqueiros — the three artists who covered Mexican public buildings with famous murals after the revolution."}, {"text": "Gabriel Garcia Marquez, Frida Kahlo, and Jose Marti", "isCorrect": false, "rationale": "Garcia Marquez was a novelist (Colombian) and Marti was a Cuban poet. Los Tres Grandes refers specifically to Mexican muralist painters: Rivera, Kahlo, and Siqueiros."}, {"text": "Diego Rivera, Benito Juarez, and Miguel Hidalgo", "isCorrect": false, "rationale": "Juarez and Hidalgo were political and historical figures, not muralists. Los Tres Grandes were painters: Rivera, Kahlo, and Siqueiros."}], "id": "q04"}, {"question": "What makes Frida Kahlo's art particularly celebrated?", "options": [{"text": "She painted sweeping scenes of Mexican history on public building walls", "isCorrect": false, "rationale": "That description fits Diego Rivera, who painted sweeping historical murals at the National Palace. Kahlo painted intensely personal self-portraits."}, {"text": "She painted intensely personal self-portraits exploring pain, identity, and Mexican cultural heritage", "isCorrect": true, "rationale": "The culture box describes Kahlo as painting 'intensely personal self-portraits that explored pain, identity, and Mexican cultural heritage.' She suffered serious injuries in a bus accident and painted throughout her recovery."}, {"text": "She pioneered the use of spray paint and influenced street art globally", "isCorrect": false, "rationale": "Using spray paint and influencing street art describes David Alfaro Siqueiros, not Kahlo."}, {"text": "She created abstract geometric paintings with no recognizable figures", "isCorrect": false, "rationale": "Kahlo's work featured recognizable figures, especially herself in self-portraits. Her style is surrealistic and symbolic, not abstract-geometric."}], "id": "q05"}, {"question": "What is the preterite of 'reir' (to laugh) for 'yo'?", "options": [{"text": "ri", "isCorrect": false, "rationale": "Close! The yo preterite of reir is 'rei' — it requires an accent on the i to show it is a separate syllable, not a diphthong."}, {"text": "rei (with accent on the i)", "isCorrect": true, "rationale": "The yo preterite of reir is 'rei' (with accent on the -i). The accent separates the vowels into two syllables: re-i. Example from the chapter."}, {"text": "rio", "isCorrect": false, "rationale": "Rio is the el/ella preterite of reir (he/she laughed). The yo form is 'rei'."}, {"text": "reia", "isCorrect": false, "rationale": "Reia is the imperfect form (used to laugh / was laughing). The yo preterite of reir is 'rei'."}], "id": "q06"}, {"question": "How do you say 'They are proud' using correct gender agreement?", "options": [{"text": "Ellas estan orgulloso.", "isCorrect": false, "rationale": "Ellas is feminine plural, so the adjective must be feminine: orgullosas, not orgulloso."}, {"text": "Ellas estan orgullosas.", "isCorrect": true, "rationale": "Ellas (feminine plural) requires the feminine plural form of the adjective: orgullosas. Ellas estan orgullosas = They (feminine) are proud."}, {"text": "Ellas son orgullosas.", "isCorrect": false, "rationale": "Emotions use estar, not ser. Even though the adjective agreement is correct (orgullosas), the verb should be estar: Ellas estan orgullosas."}, {"text": "Ellas estan orgullosa.", "isCorrect": false, "rationale": "Orgullosa is feminine singular. For a plural subject (ellas), the adjective must be plural: orgullosas."}], "id": "q07"}, {"question": "What does 'avergonzado/a' mean?", "options": [{"text": "Excited or enthusiastic", "isCorrect": false, "rationale": "Excited/enthusiastic is 'emocionado/a'. 'Avergonzado/a' means embarrassed."}, {"text": "Embarrassed", "isCorrect": true, "rationale": "'Avergonzado/a' means embarrassed. In the reading 'Un dia dificil': 'Me senti muy avergonzado/a durante toda la manana' (I felt very embarrassed all morning)."}, {"text": "Proud or satisfied", "isCorrect": false, "rationale": "Proud is 'orgulloso/a'. 'Avergonzado/a' means embarrassed."}, {"text": "Surprised or shocked", "isCorrect": false, "rationale": "Surprised is 'sorprendido/a'. 'Avergonzado/a' means embarrassed."}], "id": "q08"}, {"question": "What was Diego Rivera's philosophy about art, according to the culture box?", "options": [{"text": "Art should only be created for wealthy patrons and kept in private galleries.", "isCorrect": false, "rationale": "The opposite is true. Rivera believed art should be for everyone — painted on public walls, not locked away in private museums."}, {"text": "Art should be for everyone — painted on public walls, not locked away in private museums.", "isCorrect": true, "rationale": "The culture box states: 'Rivera believed that art should be for everyone — painted on walls in public spaces, not locked away in private museums.' His murals at the National Palace are accessible to all."}, {"text": "Art should use only abstract forms and colors, not historical scenes.", "isCorrect": false, "rationale": "Rivera painted detailed historical scenes — sweeping murals of Mexican history with hundreds of recognizable figures. He was the opposite of abstract."}, {"text": "Art should only depict religious themes for churches.", "isCorrect": false, "rationale": "Rivera's murals depicted Mexican history, the working class, and indigenous peoples — not primarily religious themes."}], "id": "q09"}, {"question": "What emotion words can be used to describe 'la alegria' and 'la tristeza'?", "options": [{"text": "La alegria = anger; la tristeza = fear", "isCorrect": false, "rationale": "Anger is 'el enojo' and fear is 'el miedo'. La alegria = joy/happiness; la tristeza = sadness."}, {"text": "La alegria = joy/happiness; la tristeza = sadness", "isCorrect": true, "rationale": "'La alegria' means joy or happiness. 'La tristeza' means sadness. These are emotion nouns — words for the feelings themselves."}, {"text": "La alegria = boredom; la tristeza = embarrassment", "isCorrect": false, "rationale": "Boredom is 'el aburrimiento' and embarrassment is 'la verguenza'. La alegria = joy; la tristeza = sadness."}, {"text": "La alegria = pride; la tristeza = surprise", "isCorrect": false, "rationale": "Pride is 'el orgullo' and surprise is 'la sorpresa'. La alegria = joy; la tristeza = sadness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
