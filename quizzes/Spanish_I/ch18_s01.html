<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 18, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the preterite endings for -er and -ir verbs?", "options": [{"text": "-e, -aste, -o, -amos, -aron", "isCorrect": false, "rationale": "These are the -ar preterite endings. The -er/-ir preterite endings are different: -i, -iste, -io, -imos, -ieron."}, {"text": "-i, -iste, -io, -imos, -ieron", "isCorrect": true, "rationale": "Both -er and -ir verbs share the same preterite endings: -i (yo), -iste (tu), -io (el/ella), -imos (nosotros), -ieron (ellos). Great news — one pattern covers both verb types!"}, {"text": "-o, -iste, -io, -imos, -ieron", "isCorrect": false, "rationale": "The yo form is -i (with accent), not -o. The correct -er/-ir preterite endings start with: -i, -iste, -io, -imos, -ieron."}, {"text": "-i, -iste, -o, -imos, -ieron", "isCorrect": false, "rationale": "Almost right, but the el/ella form is -io (with accent), not plain -o. The full set: -i, -iste, -io, -imos, -ieron."}]}, {"question": "What spelling change occurs in the el/ella and ellos preterite forms of 'leer' (to read)?", "options": [{"text": "No change — leer is completely regular in the preterite", "isCorrect": false, "rationale": "Leer does have a spelling change. The i between two vowels becomes y: leyo (not leio), leyeron (not leieron)."}, {"text": "The i between two vowels becomes y: leyo, leyeron", "isCorrect": true, "rationale": "The grammar note explains: 'Leer and creer have a spelling change in the el/ella and ellos forms: the i between two vowels becomes y.' So: leyo, leyeron (not leio, leieron)."}, {"text": "The e changes to i: liyo, liyeron", "isCorrect": false, "rationale": "The change involves the unstressed i between vowels becoming y: leyo and leyeron — not a vowel change in the stem."}, {"text": "The double e reduces to a single e: leo, leeron", "isCorrect": false, "rationale": "The double-e does not reduce. The change is specifically: unstressed i between two vowels becomes y — leyo, leyeron."}]}, {"question": "How do you distinguish 'comemos' (present) from 'comimos' (preterite) for nosotros?", "options": [{"text": "You cannot tell them apart — they are identical.", "isCorrect": false, "rationale": "There IS a distinguishing feature! Comemos (present) has -e- while comimos (preterite) has -i-. The -i- in the preterite is the signal."}, {"text": "The preterite has -i- (comimos) while the present has -e- (comemos)", "isCorrect": true, "rationale": "For -er verbs, the nosotros preterite uses -i- (comimos), while the present uses -e- (comemos). That -i- is your signal that it is past tense!"}, {"text": "The present form carries an accent mark; the preterite does not", "isCorrect": false, "rationale": "Neither comemos nor comimos carries an accent mark. The distinction is the vowel: -e- (present) vs. -i- (preterite)."}, {"text": "Context is the only way to distinguish them", "isCorrect": false, "rationale": "Unlike -ar verbs (where hablamos is identical in both tenses), -er verbs actually look different: comemos (present) vs. comimos (preterite). The -i- is a clear written signal."}]}, {"question": "What is the preterite of 'vivir' for 'ella'?", "options": [{"text": "vive", "isCorrect": false, "rationale": "Vive is the ella PRESENT form (she lives). The ella preterite is vivio (with accent on the o)."}, {"text": "vivio (with accent)", "isCorrect": true, "rationale": "The ella preterite of vivir is vivio (accent on -o). Example: 'Ella vivio en Mexico por dos anos' (She lived in Mexico for two years)."}, {"text": "viviste", "isCorrect": false, "rationale": "Viviste is the TU preterite form. The ella preterite is vivio."}, {"text": "vivio (no accent)", "isCorrect": false, "rationale": "The ella preterite requires an accent on the -o: vivio. Without the accent, it would be misread as present tense."}]}, {"question": "What is a 'diminutive' in Spanish, as illustrated by the word 'chiquitito'?", "options": [{"text": "A verb form used for very small actions", "isCorrect": false, "rationale": "Diminutives are not verb forms — they are modified nouns or adjectives. Adding -ito/-ita makes a word mean 'little' or gives it an affectionate feel."}, {"text": "A suffix (-ito/-ita) added to a word to mean 'little' or to express affection/endearment", "isCorrect": true, "rationale": "The section explains: 'Adding -ito or -ita to a word makes it mean little or gives it an affectionate feeling. This is called a diminutive.' Chiquitito = very tiny; abuelita = dear grandmother; hijito = dear little child."}, {"text": "A plural form used for groups of small items", "isCorrect": false, "rationale": "Plurals are formed with -s or -es. Diminutives add -ito/-ita to express smallness or affection."}, {"text": "An irregular verb form found only in poetry", "isCorrect": false, "rationale": "Diminutives are extremely common in everyday speech, not just poetry. They are formed by adding -ito/-ita to any noun or adjective."}]}, {"question": "What is the song 'El barquito chiquitito' about?", "options": [{"text": "A large ship on a great adventure across the Atlantic", "isCorrect": false, "rationale": "The song is about a tiny, tiny boat — not a large ship. The humor comes from how small and helpless the little boat is."}, {"text": "A tiny boat whose captain and crew could not sail anywhere for many weeks", "isCorrect": true, "rationale": "The song tells the story of a tiny, tiny boat that could not sail for one, two, three weeks, a whole month. It is silly and repetitive on purpose, teaching patience and persistence with humor."}, {"text": "A pirate ship that discovers hidden treasure in the Caribbean", "isCorrect": false, "rationale": "There is no treasure or pirates in this song. It is a simple counting song about a tiny boat stuck waiting to sail."}, {"text": "A fishing boat that catches a magical fish who grants wishes", "isCorrect": false, "rationale": "There is no magical fish in this song. El barquito chiquitito is a counting song about a tiny boat that cannot sail for weeks."}]}, {"question": "What does 'Aprendimos mucho en esa clase' mean?", "options": [{"text": "We will learn a lot in that class.", "isCorrect": false, "rationale": "Future tense would use ir + a: 'Vamos a aprender mucho.' 'Aprendimos' is the nosotros preterite of aprender (to learn)."}, {"text": "We learned a lot in that class.", "isCorrect": true, "rationale": "'Aprendimos' is the nosotros preterite of aprender (-er verb: aprendimos). 'Mucho' = a lot. 'En esa clase' = in that class."}, {"text": "We are learning a lot in that class.", "isCorrect": false, "rationale": "The present tense would be 'Aprendemos mucho en esa clase.' 'Aprendimos' is the preterite (past): We learned."}, {"text": "We used to learn a lot in that class.", "isCorrect": false, "rationale": "Used to learn would use the imperfect: aprendiamos. 'Aprendimos' is the preterite — We learned (completed past action)."}]}, {"question": "What does a grandmother mean when she calls you 'hijito' or 'corazoncito'?", "options": [{"text": "She is saying you are physically small.", "isCorrect": false, "rationale": "The section specifically notes: 'When a grandmother calls you hijito (little child) or corazoncito (little heart), she is not saying you are physically small. She is saying she loves you!'"}, {"text": "She is expressing love and affection, not commenting on your size.", "isCorrect": true, "rationale": "Diminutives in Latin American Spanish express warmth and affection. Hijito and corazoncito are terms of endearment, not descriptions of size."}, {"text": "She is scolding you for misbehaving.", "isCorrect": false, "rationale": "Hijito and corazoncito are loving terms of endearment. Scolding would use direct language, not affectionate diminutives."}, {"text": "She is using formal language to show respect.", "isCorrect": false, "rationale": "Diminutives are informal and intimate, not formal. They express warmth and closeness, the opposite of formal distance."}]}, {"question": "What is the preterite of 'escribir' for 'ellos'?", "options": [{"text": "escriben", "isCorrect": false, "rationale": "Escriben is the ellos PRESENT form (they write). The ellos preterite is escribieron."}, {"text": "escribieron", "isCorrect": true, "rationale": "The ellos preterite of escribir is escribieron. Example: 'Escribieron una carta muy larga' (They wrote a very long letter)."}, {"text": "escribiste", "isCorrect": false, "rationale": "Escribiste is the TU preterite form (you wrote). The ellos preterite is escribieron."}, {"text": "escribio", "isCorrect": false, "rationale": "Escribio is the el/ella preterite form. The ellos preterite is escribieron."}]}, {"question": "What does 'Bebi el jugo de naranja' mean?", "options": [{"text": "I drink orange juice.", "isCorrect": false, "rationale": "I drink (present) would be 'Bebo el jugo de naranja'. 'Bebi' is the yo preterite: I drank."}, {"text": "I drank the orange juice.", "isCorrect": true, "rationale": "'Bebi' is the yo preterite of beber (-er verb). 'El jugo de naranja' = the orange juice. Full sentence: I drank the orange juice."}, {"text": "I will drink the orange juice.", "isCorrect": false, "rationale": "The future would be 'Voy a beber el jugo de naranja'. 'Bebi' is past tense: I drank."}, {"text": "She drank the orange juice.", "isCorrect": false, "rationale": "Bebi (accent on the -i) is the YO form. The ella preterite would be 'bebio' (accent on the -o)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
