<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the TWO mandatory contractions in Spanish, and when do they occur?", "options": [{"text": "del and al — when 'de' or 'a' is followed by the masculine singular article 'el'.", "isCorrect": true, "rationale": "Spanish has two required contractions: de + el = del, and a + el = al. These MUST be used; you cannot write 'de el' or 'a el' as two words."}, {"text": "del and al — when 'de' or 'a' precedes any definite article.", "isCorrect": false, "rationale": "Contractions only happen before the masculine singular article el. No contraction occurs before la, los, or las."}, {"text": "del and al — optional contractions that can be skipped in informal speech.", "isCorrect": false, "rationale": "These contractions are required (mandatory), not optional. You must use del and al whenever de/a precede el."}, {"text": "de + la = dela, and a + la = ala — contractions before feminine nouns.", "isCorrect": false, "rationale": "No contraction occurs before la. Only de + el = del and a + el = al are mandatory contractions."}], "id": "q01"}, {"question": "What is special about the verb 'ir' compared to most other Spanish verbs?", "options": [{"text": "It uses the same endings as all regular -ar verbs.", "isCorrect": false, "rationale": "Ir is completely irregular — its conjugated forms (voy, vas, va, vamos, van) look nothing like the infinitive ir."}, {"text": "It is completely irregular — its forms look nothing like the infinitive.", "isCorrect": true, "rationale": "Ir (to go) is one of the most irregular verbs in Spanish. Its five present-tense forms (voy, vas, va, vamos, van) share no resemblance with the infinitive ir."}, {"text": "It changes stem vowels like stem-changing verbs.", "isCorrect": false, "rationale": "Ir is not simply a stem-changing verb; its entire form changes unpredictably. It must simply be memorized."}, {"text": "It is regular but only irregular in the nosotros form.", "isCorrect": false, "rationale": "Ir is irregular in ALL forms, not just nosotros. Its forms must all be memorized."}], "id": "q02"}, {"question": "How do you say 'I go to the park' in Spanish?", "options": [{"text": "Yo voy al parque.", "isCorrect": true, "rationale": "The yo form of ir is voy, and a + el parque = al parque (mandatory contraction). Yo voy al parque."}, {"text": "Yo voy a el parque.", "isCorrect": false, "rationale": "A + el must contract to al. You cannot write 'a el' as two separate words: Yo voy al parque."}, {"text": "Yo veo al parque.", "isCorrect": false, "rationale": "Veo is the yo form of ver (to see), not ir (to go). The yo form of ir is voy."}, {"text": "Yo vamos al parque.", "isCorrect": false, "rationale": "Vamos is the nosotros form of ir; the yo form is voy. Yo voy al parque."}], "id": "q03"}, {"question": "What does '¡Vamos!' mean, and how do you know which meaning is intended?", "options": [{"text": "It only means 'We go' in statements.", "isCorrect": false, "rationale": "¡Vamos! can also mean 'Let's go!' as a command/exclamation. Context and tone of voice determine which meaning is intended."}, {"text": "It means both 'We go/are going' AND 'Let's go!' — context determines the meaning.", "isCorrect": true, "rationale": "¡Vamos! serves double duty: it means 'We go' or 'We are going' in statements, and 'Let's go!' as an exclamation. An exclamation mark and lively tone usually signal 'Let's go!'"}, {"text": "It is only used as a command meaning 'Let's go!' never as a statement.", "isCorrect": false, "rationale": "Vamos is also the regular nosotros present-tense form meaning 'we go' or 'we are going.' It has both uses."}, {"text": "It means 'You (all) go' in Latin American Spanish.", "isCorrect": false, "rationale": "Vamos is a nosotros (we) form, not a command to others. It means 'we go' or, as an exclamation, 'let's go.'"}], "id": "q04"}, {"question": "Which sentence correctly uses the contraction 'del'?", "options": [{"text": "Vengo de la escuela.", "isCorrect": false, "rationale": "La escuela uses the feminine article la, so no contraction occurs. Del only forms with de + el."}, {"text": "Vengo del mercado.", "isCorrect": true, "rationale": "El mercado uses the masculine article el, so de + el = del (mandatory contraction). Vengo del mercado."}, {"text": "Vengo de el banco.", "isCorrect": false, "rationale": "De + el MUST contract to del. You cannot write 'de el' as two separate words. Correct: Vengo del banco."}, {"text": "Vengo del los supermercados.", "isCorrect": false, "rationale": "Del is only used with the masculine singular el. For plural los, de + los stays as two words: de los supermercados."}], "id": "q05"}, {"question": "What is the yo form of the verb 'ir' (to go)?", "options": [{"text": "iro", "isCorrect": false, "rationale": "Iro is not a word. The yo form of ir is voy."}, {"text": "voy", "isCorrect": true, "rationale": "The yo form of ir is voy. Along with vas, va, vamos, and van, it is completely irregular."}, {"text": "iré", "isCorrect": false, "rationale": "Iré is the future tense form meaning 'I will go.' The present tense yo form is voy."}, {"text": "voy a", "isCorrect": false, "rationale": "Voy a is the structure for the near future (I am going to...), not just the present tense yo form of ir. The yo form alone is voy."}], "id": "q06"}, {"question": "How would you say 'She goes to the library' using the verb ir?", "options": [{"text": "Ella va a la biblioteca.", "isCorrect": true, "rationale": "The ella form of ir is va. La biblioteca uses the feminine article la, so no contraction: Ella va a la biblioteca."}, {"text": "Ella voy a la biblioteca.", "isCorrect": false, "rationale": "Voy is the yo form; for ella the form is va. Ella va a la biblioteca."}, {"text": "Ella van a la biblioteca.", "isCorrect": false, "rationale": "Van is the ellos/ellas (plural) form; for a single ella, use va. Ella va a la biblioteca."}, {"text": "Ella vamos a la biblioteca.", "isCorrect": false, "rationale": "Vamos is the nosotros form; for ella use va. Ella va a la biblioteca."}], "id": "q07"}, {"question": "What is 'la plaza' in Latin American towns and cities?", "options": [{"text": "A shopping center with modern stores", "isCorrect": false, "rationale": "La plaza is the central town square, not a modern shopping center. It is traditionally surrounded by the church, town hall, and government buildings."}, {"text": "The central town square — the social heart of the community", "isCorrect": true, "rationale": "La plaza (also called plaza mayor or parque central) is the central square of every Latin American town, surrounded by the church, town hall, and other key buildings. It is the social hub of community life."}, {"text": "A type of open-air market selling food", "isCorrect": false, "rationale": "El mercado is a market. La plaza is the central square of a town or city."}, {"text": "A military headquarters in colonial cities", "isCorrect": false, "rationale": "La plaza is a civilian public square, not a military site. It typically houses the church, town hall, and is used for public gatherings."}], "id": "q08"}, {"question": "What is 'el paseo' in the Dominican Republic?", "options": [{"text": "A traditional dish eaten on Sunday afternoons", "isCorrect": false, "rationale": "El paseo is a social tradition, not a food. It refers to the practice of strolling around the plaza on weekend evenings."}, {"text": "The tradition of strolling around the plaza on weekend evenings", "isCorrect": true, "rationale": "El paseo is the beloved tradition of families strolling (pasear) around the central plaza on weekend evenings, meeting neighbors and enjoying community life."}, {"text": "A competitive walking race held during festivals", "isCorrect": false, "rationale": "El paseo is a leisurely stroll for socializing, not a competitive race."}, {"text": "A type of street market held on Sundays", "isCorrect": false, "rationale": "El paseo refers to the act of strolling around the plaza. El mercado is a market."}], "id": "q09"}, {"question": "Which phrase means 'What a shame!' in Spanish?", "options": [{"text": "¿Qué pasa?", "isCorrect": false, "rationale": "¿Qué pasa? means What is happening? or What's going on?"}, {"text": "¿Qué tal?", "isCorrect": false, "rationale": "¿Qué tal? means How are things? or How is it going?"}, {"text": "¡Qué lástima!", "isCorrect": true, "rationale": "¡Qué lástima! means What a shame! It is listed in the conversation vocabulary for this section."}, {"text": "¡Qué bueno!", "isCorrect": false, "rationale": "¡Qué bueno! means How great! or That's great! — the opposite of ¡Qué lástima!"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
