<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "If a student needs to write notes or draw pictures in class, which Spanish word, introduced in this section, would best describe the material they would use?", "options": [{"text": "la tarea", "isCorrect": false, "rationale": "\"La tarea\" means homework, which is an activity or assignment, not the material for writing."}, {"text": "el papel", "isCorrect": true, "rationale": "\"El papel\" means paper, which is the material commonly used for writing notes or drawing."}, {"text": "el salón (de clase)", "isCorrect": false, "rationale": "\"El salón de clase\" means classroom, which is a place, not a writing material."}, {"text": "el uniforme", "isCorrect": false, "rationale": "\"El uniforme\" means uniform, which is clothing, not a writing material."}], "id": "q01"}, {"question": "You are referring to a group of friends in your class that includes both male and female students. Following Spanish grammar rules, which term would you use?", "options": [{"text": "la compañera", "isCorrect": false, "rationale": "\"La compañera\" refers to a single female classmate."}, {"text": "el compañero", "isCorrect": false, "rationale": "\"El compañero\" refers to a single male classmate."}, {"text": "las compañeras", "isCorrect": false, "rationale": "\"Las compañeras\" refers to a group composed exclusively of female classmates."}, {"text": "los compañeros", "isCorrect": true, "rationale": "The quick tip states, \"In Spanish, if you are talking about a mixed group, use the masculine plural: los compañeros.\""}], "id": "q02"}, {"question": "According to the text, what are two significant benefits of wearing uniformes in Mexican schools?", "options": [{"text": "They help students identify their school during field trips and reduce the need for teachers to enforce dress codes.", "isCorrect": false, "rationale": "While uniforms may indirectly offer these benefits, the text specifically highlights 'source of school pride' and 'make getting dressed in the morning a lot faster!' as the primary reasons."}, {"text": "They foster school pride and simplify the morning routine of getting dressed.", "isCorrect": true, "rationale": "The text explicitly states, \"Uniforms are a source of school pride and make getting dressed in the morning a lot faster!\""}, {"text": "They ensure all students look the same and reduce distractions in the classroom.", "isCorrect": false, "rationale": "The text does not mention reducing distractions or ensuring sameness as primary benefits, focusing instead on pride and efficiency."}, {"text": "They are a traditional cultural element and help students stay warm in cooler weather.", "isCorrect": false, "rationale": "While traditions vary, the text does not link uniforms to warmth or cultural tradition beyond the mentioned pride and efficiency."}], "id": "q03"}, {"question": "María, a student in Mexico, likely finishes her school day in the early afternoon (e.g., 1:30 PM). Based on the text, what is a common reason for this schedule?", "options": [{"text": "Mexican schools have fewer subjects, allowing for shorter days.", "isCorrect": false, "rationale": "The text mentions similar subjects to the U.S. and an additional one (Educación Cívica y Ética), not fewer subjects."}, {"text": "Students often return home to eat la comida, the main midday meal, with their families.", "isCorrect": true, "rationale": "The text states, \"Many students go home for la comida (the main midday meal) with their families,\" explaining the typically shorter school day compared to the U.S."}, {"text": "All Mexican schools offer mandatory afternoon sessions for additional learning.", "isCorrect": false, "rationale": "The text says \"Some schools offer afternoon sessions,\" not all, and it is not presented as the reason for the initial short day."}, {"text": "Students in Mexico typically do not have homework, freeing up their afternoons.", "isCorrect": false, "rationale": "María's story explicitly states she returns home \"con mucha tarea,\" meaning with a lot of homework."}], "id": "q04"}, {"question": "What unique subject, focusing on civic engagement and values, is taught in Mexican schools alongside standard subjects like math and history?", "options": [{"text": "Las ciencias", "isCorrect": false, "rationale": "\"Las ciencias\" means science, which is a standard subject, not unique for its focus on civic engagement."}, {"text": "La historia", "isCorrect": false, "rationale": "\"La historia\" means history, a standard subject."}, {"text": "Educación Cívica y Ética", "isCorrect": true, "rationale": "The text specifies this subject \"teaches citizenship, values, and community responsibility.\""}, {"text": "El español", "isCorrect": false, "rationale": "\"El español\" means Spanish, the language of instruction, not a unique subject about civic values."}], "id": "q05"}, {"question": "If a Mexican school student were to prepare a patriotic speech or participate in a parade, which date would be a significant event on their school calendar for such activities?", "options": [{"text": "December 25th", "isCorrect": false, "rationale": "This is Christmas Day, a religious holiday, not a national patriotic celebration highlighted for school events in the text."}, {"text": "September 16th", "isCorrect": true, "rationale": "The text explicitly states, \"Dates like September 16th (Mexican Independence Day) are big events on the school calendar\" with ceremonies, parades, and performances."}, {"text": "January 1st", "isCorrect": false, "rationale": "This is New Year's Day, a national holiday but not specifically highlighted as a major school patriotic event in the text."}, {"text": "July 4th", "isCorrect": false, "rationale": "This is Independence Day in the United States, not Mexico."}], "id": "q06"}, {"question": "What is the name of María's teacher, as mentioned in the \"Un día en la escuela de María\" passage?", "options": [{"text": "Señora Juárez", "isCorrect": false, "rationale": "Benito Juárez is the name of María's school, not her teacher."}, {"text": "Señora amable", "isCorrect": false, "rationale": "\"Amable\" means kind, describing her teacher, but it is not her name."}, {"text": "Señora Gómez", "isCorrect": true, "rationale": "The passage states, \"La maestra se llama señora Gómez.\""}, {"text": "Señora María", "isCorrect": false, "rationale": "María is the student herself, not the teacher."}], "id": "q07"}, {"question": "Based on María's daily routine described in the passage, what does she typically do immediately after recess (\"En el recreo\") and before the next school day?", "options": [{"text": "She goes to an afternoon session to study more subjects.", "isCorrect": false, "rationale": "The passage mentions talking with classmates during recess, then returning home with homework, not attending an afternoon session."}, {"text": "She packs her mochila with books, notebooks, and pencils.", "isCorrect": false, "rationale": "This is what she does \"Por las mañanas,\" before school starts."}, {"text": "She returns home with a lot of homework.", "isCorrect": true, "rationale": "The passage states, \"En el recreo, hablo con mis compañeros. A las dos de la tarde, regreso a casa con mucha tarea.\""}, {"text": "She eats the main midday meal with her family.", "isCorrect": false, "rationale": "While common for Mexican students, the passage focuses on María returning home with homework, not specifically eating the midday meal at this point in her personal narrative."}], "id": "q08"}, {"question": "Even though the \"Pin Pon\" rhyme contains many verbs not yet learned, why does the textbook include it in this section?", "options": [{"text": "To introduce advanced Spanish grammar concepts.", "isCorrect": false, "rationale": "The text states \"you have not yet learned the verbs,\" indicating it's not for advanced grammar instruction at this stage."}, {"text": "To provide an example of a popular children's song and encourage listening for rhythm and known words.", "isCorrect": true, "rationale": "The text advises to \"enjoy listening to the rhythm and sounds of the Spanish words\" and \"See if you can spot any words you already know!\" which aligns with cultural exposure and auditory practice."}, {"text": "To test students' ability to translate complex poetry.", "isCorrect": false, "rationale": "The focus is on listening and recognizing familiar elements, not on complex translation."}, {"text": "To teach new vocabulary words through context.", "isCorrect": false, "rationale": "It explicitly states \"you have not yet learned the verbs,\" implying it's not primarily for new verb vocabulary acquisition at this stage, but rather for exposure."}], "id": "q09"}, {"question": "You are a student arriving at school. Which sentence correctly uses at least two of the new vocabulary words from this section to describe items you might interact with upon entering your classroom?", "options": [{"text": "La puerta está en el salón, y tengo mi tarea en el papel.", "isCorrect": true, "rationale": "This sentence correctly uses 'la puerta' (door) and 'el salón' (classroom) to describe the entry to the room, and 'la tarea' (homework) on 'el papel' (paper) describes common student items, forming a logical scenario with new vocabulary."}, {"text": "El uniforme está en la ventana, y los compañeros están en la puerta.", "isCorrect": false, "rationale": "While 'el uniforme,' 'la ventana,' 'los compañeros,' and 'la puerta' are new words, the placement of a uniform *in* a window and classmates *in* the door is illogical."}, {"text": "Tengo mi papel en la ventana, y la tarea está en la puerta del salón.", "isCorrect": false, "rationale": "Placing 'el papel' in 'la ventana' or 'la tarea' in 'la puerta' is illogical and not a natural description of classroom items."}, {"text": "Abro la ventana para ver el uniforme de mi compañero en el papel.", "isCorrect": false, "rationale": "This sentence uses new words but creates an illogical scenario, like seeing a uniform *on* paper through a window."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
