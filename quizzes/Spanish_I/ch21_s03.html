    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 21, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the memory technique, how are the imperfect and preterite compared to a filmmaker's camera?", "options": [{"text": "Imperfect = zooming in on a single moment; Preterite = panning the whole scene", "isCorrect": false, "rationale": "This is reversed. The imperfect is the panning camera (background/scene), and the preterite is the camera zooming in on each action."}, {"text": "Imperfect = the camera panning the scene (background, mood, setting); Preterite = zooming in on each moment (specific events)", "isCorrect": true, "rationale": "The memory tip describes: 'IMPERFECTO = the camera panning the scene' (place, weather, people, feelings). 'PRETERITO = the camera zooming in on each moment' (what happened first, then what, the climax, the ending)."}, {"text": "Imperfect = fast-forward through the story; Preterite = slow-motion replay", "isCorrect": false, "rationale": "Speed is not the metaphor. The metaphor is panning (imperfect = broad background shot) vs. zooming in (preterite = specific event focus)."}, {"text": "Both tenses work the same way in storytelling — there is no filmmaker metaphor.", "isCorrect": false, "rationale": "The chapter specifically uses the filmmaker metaphor to help students use both tenses correctly: imperfect = panning camera; preterite = zoom."}], "id": "q01"}, {"question": "In the Dia de los Muertos story, which sentence uses the preterite to move the action forward?", "options": [{"text": "'La abuela cocinaba en la cocina' — cooking is an ongoing action", "isCorrect": false, "rationale": "Cocinaba is imperfect (she was cooking — background activity). The preterite drives the action forward."}, {"text": "'De repente, los ninos llegaron corriendo desde la calle' — the children's arrival is a specific completed event", "isCorrect": true, "rationale": "'Llegaron' is preterite — the children arriving is a specific completed event that moves the story forward. The imperfect was setting the scene (la abuela cocinaba, el abuelo decoraba, hacia una tarde fresca)."}, {"text": "'Hacia una tarde fresca y tranquila' — describing the afternoon weather", "isCorrect": false, "rationale": "Hacia is imperfect — describing the weather is background/setting. The preterite drives the action forward."}, {"text": "'Era el dos de noviembre y toda la familia Garcia estaba reunida' — setting the scene", "isCorrect": false, "rationale": "Era and estaba are both imperfect — they set the time and scene. The preterite (like llegaron, pusieron, trajo) drives the action forward."}], "id": "q02"}, {"question": "In the conversation about the birthday party, Luis says: 'Habia mucha gente y la musica era increible.' Which tense are these verbs?", "options": [{"text": "Preterite — specific completed events at the party", "isCorrect": false, "rationale": "Habia (there was/were) and era (it was) are both imperfect — they describe the background setting and atmosphere of the party."}, {"text": "Imperfect — describing the background setting and atmosphere of the party", "isCorrect": true, "rationale": "Habia and era are imperfect forms describing the scene: lots of people (ongoing state) and incredible music (ongoing quality). These are background descriptions, not specific events."}, {"text": "Mixed tenses — habia is present, era is imperfect", "isCorrect": false, "rationale": "Both are imperfect. Habia is the imperfect of haber (there is/are -> there was/were), and era is the imperfect of ser."}, {"text": "Future tense — Luis is predicting what the party will be like", "isCorrect": false, "rationale": "Luis is describing what the party WAS like (past). Both habia and era are imperfect."}], "id": "q03"}, {"question": "Which story-starter phrase uses the imperfect to set the scene?", "options": [{"text": "De repente,... (Suddenly,...)", "isCorrect": false, "rationale": "'De repente' introduces a sudden event and typically precedes a preterite verb. Imperfect scene-setters describe ongoing states and background."}, {"text": "Era un dia de... (It was a day of...)", "isCorrect": true, "rationale": "'Era un dia de' uses the imperfect of ser — perfect for setting the scene in a story. The example from the grammar box: 'Era el dos de noviembre y toda la familia Garcia estaba reunida.'"}, {"text": "Primero,... (First,...)", "isCorrect": false, "rationale": "'Primero' introduces the first in a sequence of completed events — it leads to a preterite verb. The imperfect sets the scene, not sequences events."}, {"text": "Al final,... (In the end,...)", "isCorrect": false, "rationale": "'Al final' wraps up the story's events — it leads to a preterite verb. Scene-setting uses the imperfect."}], "id": "q04"}, {"question": "In the Dia de los Muertos story, what did the grandmother bring?", "options": [{"text": "Photographs of the deceased to place on the altar", "isCorrect": false, "rationale": "The children carefully placed the photos (las fotos de los bisabuelos) on the altar. The grandmother brought plates of tamales and rice with beans."}, {"text": "Plates of tamales and rice with beans", "isCorrect": true, "rationale": "'La abuela trajo platos de tamales y arroz con frijoles.' — trajo is the preterite of traer (to bring). The grandmother brought the food."}, {"text": "Flowers and candles for the altar", "isCorrect": false, "rationale": "The grandfather decorated the altar with cempasuchil flowers. The grandmother brought plates of tamales and rice with beans."}, {"text": "Music and songs to sing together", "isCorrect": false, "rationale": "Everyone sang at the end, but the grandmother's specific contribution described in the preterite was bringing plates of food: tamales and arroz con frijoles."}], "id": "q05"}, {"question": "What does 'Lo pasamos muy bien' mean as a story-closing phrase?", "options": [{"text": "We left very early.", "isCorrect": false, "rationale": "Leaving early would be 'nos fuimos muy temprano.' 'Lo pasamos muy bien' means we had a great time."}, {"text": "We had a great time.", "isCorrect": true, "rationale": "'Lo pasamos muy bien' = we passed/spent it very well = we had a great time. It is listed as a wrap-up phrase for ending stories about celebrations."}, {"text": "We passed by very quickly.", "isCorrect": false, "rationale": "While 'pasar' can mean to pass by, in the expression 'pasarlo bien,' it means to have a good time. 'Lo pasamos muy bien' = we had a great time."}, {"text": "We were very well-behaved.", "isCorrect": false, "rationale": "Being well-behaved would be 'nos portamos muy bien.' 'Lo pasamos muy bien' means we had a great time."}], "id": "q06"}, {"question": "How is 'trajo' (from traer) used in the story, and what tense is it?", "options": [{"text": "Background description — imperfect tense", "isCorrect": false, "rationale": "Trajo is preterite (a completed, specific action). The grandmother brought food at a specific moment, moving the story forward."}, {"text": "A specific completed action — preterite tense; she brought the food at that moment", "isCorrect": true, "rationale": "'La abuela trajo platos de tamales y arroz con frijoles.' Trajo is the preterite of traer (irregular: traje, trajiste, trajo...). It is a specific completed action that advances the story."}, {"text": "Habitual past action — imperfect tense; she always used to bring food", "isCorrect": false, "rationale": "Trajo is preterite, not imperfect. The habitual form would be 'traia.' In this story, it describes the specific action at the Dia de los Muertos gathering."}, {"text": "A future plan expressed in the past — conditional tense", "isCorrect": false, "rationale": "Trajo is preterite, not conditional. It describes a specific completed past action: the grandmother brought food."}], "id": "q07"}, {"question": "What phrase means 'It was an unforgettable celebration'?", "options": [{"text": "Fue una noche muy especial.", "isCorrect": false, "rationale": "'Fue una noche muy especial' means it was a very special night. The phrase meaning unforgettable celebration is: 'Fue una celebracion inolvidable.'"}, {"text": "Fue una celebracion inolvidable.", "isCorrect": true, "rationale": "'Fue una celebracion inolvidable' = It was an unforgettable celebration. 'Inolvidable' means unforgettable (from olvidar = to forget, with in- = un-)."}, {"text": "Lo pasamos muy bien.", "isCorrect": false, "rationale": "'Lo pasamos muy bien' = we had a great time. The phrase for unforgettable celebration is 'Fue una celebracion inolvidable.'"}, {"text": "Fue una noche perfecta.", "isCorrect": false, "rationale": "'Fue una noche perfecta' = It was a perfect night. 'Fue una celebracion inolvidable' specifically means unforgettable celebration."}], "id": "q08"}, {"question": "In the conversation, Luis says 'Los ninos golpearon la pinata.' What does this sentence tell us?", "options": [{"text": "The children were hitting the pinata as background activity (imperfect)", "isCorrect": false, "rationale": "Golpearon is preterite — the children hitting the pinata was a specific completed event at the party, not ongoing background."}, {"text": "The children hit the pinata — a specific completed event in the preterite", "isCorrect": true, "rationale": "'Golpearon' is the ellos preterite of golpear (to hit/strike). This is a specific party event that Luis recounts as a completed action."}, {"text": "The children always used to hit the pinata at every party (imperfect habit)", "isCorrect": false, "rationale": "Golpearon is preterite (they hit — once, at that party). A habitual action would use imperfect: golpeaban."}, {"text": "The children are going to hit the pinata (future plan)", "isCorrect": false, "rationale": "Future plans use ir + a: 'Los ninos van a golpear la pinata.' Golpearon is preterite — they hit it (completed past event)."}], "id": "q09"}, {"question": "What does 'Habia dulces por todos lados' mean?", "options": [{"text": "There will be candy everywhere.", "isCorrect": false, "rationale": "Habia is imperfect (there was/were), not future. 'Habia dulces por todos lados' = There was candy everywhere."}, {"text": "There was candy everywhere.", "isCorrect": true, "rationale": "'Habia' is the imperfect of haber (there is/are). 'Dulces' = candy/sweets. 'Por todos lados' = everywhere. Background description: there was candy everywhere (after the pinata broke)."}, {"text": "There is candy everywhere (present tense).", "isCorrect": false, "rationale": "Present would be 'Hay dulces por todos lados.' Habia is imperfect — describing a past state."}, {"text": "There were no more candies anywhere.", "isCorrect": false, "rationale": "'Por todos lados' means everywhere. There is no negation here. 'Habia dulces por todos lados' = There was candy everywhere."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
