lization.", "isCorrect": false, "rationale": "The text associates 'Yellow (amarillo)' with corn, not green."}, {"text": "It evokes the quetzal, the sacred national bird of Guatemala.", "isCorrect": true, "rationale": "The text clearly states, 'Green (verde) evokes the quetzal, the sacred national bird of Guatemala with its brilliant emerald feathers.'"}, {"text": "It is associated with water and sky.", "isCorrect": false, "rationale": "The text connects 'Blue (azul)' with water and sky, not green."}]}, {"question": "Based on the 'Visual Association' memory tip, what is the most effective characteristic for a mental image to help remember a new Spanish color word?", "options": [{"text": "It should be realistic and common to everyday life.", "isCorrect": false, "rationale": "The memory tip explicitly advises the opposite: 'The stranger and more colorful the image, the better it sticks in your memory.' Realistic images are less memorable."}, {"text": "It must perfectly rhyme with the Spanish word.", "isCorrect": false, "rationale": "While rhyming (like 'amarillo' and 'armadillo') can be helpful, the tip emphasizes 'vivid, ridiculous, unforgettable mental picture' and 'stranger and more colorful,' not just perfect rhymes. 'Rojo' example uses 'Row-ho!' which is a sound-alike, not a rhyme."}, {"text": "It should involve a direct translation of the color into English.", "isCorrect": false, "rationale": "The method described is 'visual association' and 'keyword method,' which focuses on sound-alikes and vivid imagery, not direct translation, to create a stronger memory link."}, {"text": "It should be vivid, ridiculous, and unforgettable.", "isCorrect": true, "rationale": "The text explicitly states, 'Instead of just finding a sound match, you create a vivid, ridiculous, unforgettable mental picture. The stranger and more colorful the image, the better it sticks in your memory.'"}]}, {"question": "Imagine you are trying to describe a 'green car' in Spanish. Although full agreement rules are in Section 2, what would be the form of 'verde' you would use, based on the partial information given in Section 1?", "options": [{"text": "verdo", "isCorrect": false, "rationale": "The text indicates that 'verde' ends in -e and therefore 'stays the same for both masculine and feminine' nouns. It does not change to '-o' or '-a'."}, {"text": "verda", "isCorrect": false, "rationale": "The text indicates that 'verde' ends in -e and therefore 'stays the same for both masculine and feminine' nouns. It does not change to '-o' or '-a'."}, {"text": "verde", "isCorrect": true, "rationale": "The text states, 'Colors ending in -e or a consonant, like verde, azul, and gris, stay the same for both masculine and feminine.' Since 'verde' ends in -e, its form does not change, regardless of the noun's gender ('el coche' is masculine)."}, {"text": "verdes", "isCorrect": false, "rationale": "While 'verdes' would be used for plural nouns, the question refers to a singular 'car'. The text indicates agreement for gender, but not plural in this specific context (though it would be plural if the noun were plural)."}]}, {"question": "The introduction states that learning colors is 'one of the most satisfying things you will do as a beginner.' What is the primary reason given for this satisfaction?", "options": [{"text": "They are easy to pronounce and spell.", "isCorrect": false, "rationale": "While some colors might be easier to pronounce, the text doesn't list this as the main reason for satisfaction. The satisfaction comes from immediate usability."}, {"text": "You can immediately start using them in sentences to describe almost anything.", "isCorrect": true, "rationale": "The text explicitly states, 'Why? Because you can immediately start using them in sentences. You already know how to use ser (to be) from Chapter 3. Combine that with a color word and you can describe almost anything!'"}, {"text": "Spanish colors are very similar to English color words.", "isCorrect": false, "rationale": "The text does not mention similarities to English as a reason for satisfaction. While some might be cognates, it's not the primary reason cited."}, {"text": "There are only a few colors to memorize, making it quick to learn.", "isCorrect": false, "rationale": "The text provides a list of 10 colors and implies there are more. The satisfaction isn't about the quantity but the utility."}]}, {"question": "Which of the following images from nature is *not* explicitly mentioned in the verses of 'De colores' as something that 'wears' or 'is' colors?", "options": [{"text": "The fields in springtime", "isCorrect": false, "rationale": "The first verse states: 'De colores, de colores se visten los campos en la primavera' (the fields dress themselves in colors in spring)."}, {"text": "The little birds from outside", "isCorrect": false, "rationale": "The first verse states: 'De colores, de colores son los pajaritos que vienen de afuera' (the little birds that come from outside are colors)."}, {"text": "The moon at night", "isCorrect": true, "rationale": "The song mentions fields, birds, the rainbow, dawn ('aurora'), sun's reflections, and a diamond, but not the moon at night."}, {"text": "The rainbow", "isCorrect": false, "rationale": "The first verse states: 'De colores, de colores es el arco iris que vemos lucir' (the rainbow we see shine is colors)."}]}, {"question": "The 'culturebox' about Guatemalan textiles mentions the huipil and corte. What insight does this section provide about the role of colors in these traditional garments?", "options": [{"text": "Colors are chosen randomly by weavers based on personal preference.", "isCorrect": false, "rationale": "The text states that 'Each community has its own unique color patterns and symbols' and that 'Colors in these textiles are not just decorative — they carry meaning,' which contradicts random choice."}, {"text": "Their primary purpose is to make the garments easier to wash.", "isCorrect": false, "rationale": "The text does not mention washability; it focuses on aesthetic, cultural, and symbolic meanings."}, {"text": "Colors serve not only as decoration but also carry specific cultural and community meanings.", "isCorrect": true, "rationale": "The text explicitly states, 'Colors in these textiles are not just decorative — they carry meaning,' and provides examples like red for life force, yellow for corn, green for the quetzal, and blue for water/sky, also mentioning unique patterns for communities."}, {"text": "The brightness of the colors signifies the garment's market value.", "isCorrect": false, "rationale": "While vibrant textiles might be valuable, the text attributes meaning to specific colors and patterns, not just general brightness indicating market value."}]}, {"question": "A student is asked to create a visual association for 'morado' (purple). Which of these mental images best applies the principles taught in the 'Visual Association' memory tip?", "options": [{"text": "Imagining a purple grape, as grapes are purple.", "isCorrect": false, "rationale": "While grapes are purple, this image is too common and realistic. The tip suggests 'vivid, ridiculous, unforgettable' and 'stranger' images for better recall."}, {"text": "Writing 'MORADO = PURPLE' repeatedly in a notebook.", "isCorrect": false, "rationale": "This describes rote memorization or simple translation, not the 'visual association' method which involves creating a mental picture linked by sound or image."}, {"text": "Picturing a 'moaning rhino' (sounds like 'morado') turning completely purple with embarrassment.", "isCorrect": true, "rationale": "This image uses a sound-alike ('moaning rhino' for 'morado'), is vivid, ridiculous, and unforgettable, aligning perfectly with the 'Visual Association' method's advice."}, {"text": "Looking at a dictionary definition of 'morado' and its etymology.", "isCorrect": false, "rationale": "This is an academic approach to understanding word origin, not a memory technique based on visual and phonetic association described in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
