<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 14, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'rascacielos' literally mean and what does it refer to?", "options": [{"text": "It means 'sky-scratchers' and refers to skyscrapers", "isCorrect": true, "rationale": "The memory tip explains: 'rascar (to scratch) + cielos (skies). A skyscraper scratches the sky!'"}, {"text": "It means 'tall building' and refers to any multi-story structure", "isCorrect": false, "rationale": "'rascacielos' literally = 'scratches skies' — a poetic compound word. It specifically refers to skyscrapers (very tall buildings)."}, {"text": "It means 'touching the clouds' and refers to mountains", "isCorrect": false, "rationale": "'rascacielos' refers to skyscrapers (tall buildings), not mountains. The literal meaning is 'scratches the skies.'"}, {"text": "It means 'heaven's gate' and refers to cathedrals", "isCorrect": false, "rationale": "'rascacielos' comes from rascar (to scratch) + cielos (skies). It means skyscraper, not cathedral."}], "id": "q01"}, {"question": "What is the difference between 'el barrio' and 'la vecindad'?", "options": [{"text": "El barrio = a distinct city district with its own identity; la vecindad = the community of neighbors", "isCorrect": true, "rationale": "The text explains: 'El barrio refers to a distinct district... La vecindad emphasizes the community of neighbors.' In Mexico City, a vecindad is also a specific type of shared-courtyard housing."}, {"text": "El barrio is formal; la vecindad is informal", "isCorrect": false, "rationale": "The distinction is not about formality but about what each word emphasizes — place identity vs. community."}, {"text": "El barrio = rural area; la vecindad = urban area", "isCorrect": false, "rationale": "Both refer to neighborhoods in a city. El barrio is a district; la vecindad is the community of neighbors."}, {"text": "They are completely synonymous and interchangeable", "isCorrect": false, "rationale": "The text explains they have 'slightly different feelings' — el barrio = place identity; la vecindad = community of people."}], "id": "q02"}, {"question": "According to the culture box, Mexico City (Ciudad de México) sits on the ruins of which ancient capital?", "options": [{"text": "Tenochtitlán (ancient Aztec capital)", "isCorrect": true, "rationale": "The text says: 'Its historic center, the Zócalo, sits on the ruins of the ancient Aztec capital Tenochtitlán.'"}, {"text": "Machu Picchu (ancient Inca city)", "isCorrect": false, "rationale": "Machu Picchu is in Peru and is associated with the Inca. Mexico City's historic center sits on Aztec Tenochtitlán."}, {"text": "Chichén Itzá (ancient Mayan city)", "isCorrect": false, "rationale": "Chichén Itzá is a Mayan site in the Yucatán Peninsula. Mexico City sits on Aztec Tenochtitlán."}, {"text": "Cuzco (ancient Inca capital)", "isCorrect": false, "rationale": "Cuzco is in Peru and was the Inca capital. Mexico City sits on the ruins of Aztec Tenochtitlán."}], "id": "q03"}, {"question": "What does 'al norte de' mean in a sentence like 'México está al norte de Guatemala'?", "options": [{"text": "To the north of", "isCorrect": true, "rationale": "The text explains: 'al + compass direction + de + place name.' 'al norte de Guatemala' = to the north of Guatemala."}, {"text": "In the north of", "isCorrect": false, "rationale": "'en el norte de' would mean 'in the north of.' 'al norte de' = to the north of (relative position between places)."}, {"text": "North of the border", "isCorrect": false, "rationale": "'la frontera' means border. 'al norte de' simply means 'to the north of' a given place."}, {"text": "Toward the north", "isCorrect": false, "rationale": "'hacia el norte' means toward the north. 'al norte de + place' means to the north of that place."}], "id": "q04"}, {"question": "Which city is described as the 'Paris of South America' in the culture box?", "options": [{"text": "Buenos Aires, Argentina", "isCorrect": true, "rationale": "The text says: 'Buenos Aires, Argentina — Often called the Paris of South America, famous for its European-influenced architecture, passionate tango music, and lively café culture.'"}, {"text": "Lima, Perú", "isCorrect": false, "rationale": "Lima is described as 'one of the oldest Spanish-colonial capitals,' not the Paris of South America."}, {"text": "Santiago, Chile", "isCorrect": false, "rationale": "Santiago is not mentioned in the culture box. Buenos Aires is the Paris of South America."}, {"text": "Bogotá, Colombia", "isCorrect": false, "rationale": "Bogotá is described as an emerald capital and innovation hub. Buenos Aires is the Paris of South America."}], "id": "q05"}, {"question": "What does 'el semáforo' mean?", "options": [{"text": "Traffic light", "isCorrect": true, "rationale": "'el semáforo' means traffic light — an essential city navigation word used in directions."}, {"text": "Crosswalk", "isCorrect": false, "rationale": "'el paso de peatones' or 'el cruce peatonal' means crosswalk. 'el semáforo' = traffic light."}, {"text": "Speed bump", "isCorrect": false, "rationale": "'el tope' (Mexico) or 'el reductor de velocidad' means speed bump. 'el semáforo' = traffic light."}, {"text": "Stop sign", "isCorrect": false, "rationale": "'la señal de stop' or 'el alto' means stop sign. 'el semáforo' = traffic light."}], "id": "q06"}, {"question": "In the children's song 'Sol solecito,' what does the sun being asked to do?", "options": [{"text": "Warm little hands ('caliéntame un poquito')", "isCorrect": true, "rationale": "The song asks: 'Sol, solecito, caliéntame un poquito' — little sun, warm me up a little bit. It is a plea for sunshine after rain."}, {"text": "Make the flowers grow", "isCorrect": false, "rationale": "Flowers are not mentioned. The song asks the sun to warm little hands ('caliéntame un poquito')."}, {"text": "Stop the rain", "isCorrect": false, "rationale": "The song asks for warmth, not to stop rain. 'Que llueva' (the companion song) is about enjoying rain."}, {"text": "Light up the streets of the city", "isCorrect": false, "rationale": "The song is about warming hands, not lighting streets. 'caliéntame un poquito' = warm me up a little."}], "id": "q07"}, {"question": "According to the culture box, what is Bogotá, Colombia famous for being the world capital of?", "options": [{"text": "Emeralds", "isCorrect": true, "rationale": "The text says: 'The city is the emerald capital of the world and has transformed into a hub for art, cycling culture, and innovation.'"}, {"text": "Coffee", "isCorrect": false, "rationale": "Colombia is famous for coffee but Bogotá is specifically described as the emerald capital of the world."}, {"text": "Chocolate", "isCorrect": false, "rationale": "Chocolate is not mentioned for Bogotá. The city is the emerald capital of the world."}, {"text": "Carnival", "isCorrect": false, "rationale": "Carnival is associated with other cities. Bogotá is specifically the emerald capital of the world."}], "id": "q08"}, {"question": "What is the Zócalo in Mexico City?", "options": [{"text": "The historic central square, surrounded by the Metropolitan Cathedral and National Palace", "isCorrect": true, "rationale": "The text describes: 'the Zócalo sits on the ruins of the ancient Aztec capital Tenochtitlán' and is 'surrounded by the Metropolitan Cathedral, the National Palace.'"}, {"text": "A famous market in the city center", "isCorrect": false, "rationale": "The Zócalo is a public square (plaza), not a market. It is surrounded by historic buildings."}, {"text": "A neighborhood famous for tango music", "isCorrect": false, "rationale": "Tango is associated with Buenos Aires, Argentina. The Zócalo is Mexico City's historic central square."}, {"text": "A modern shopping district", "isCorrect": false, "rationale": "The Zócalo is the historic center of Mexico City, built on Aztec ruins — not a modern shopping area."}], "id": "q09"}, {"question": "What does 'la esquina' mean?", "options": [{"text": "The corner (street corner)", "isCorrect": true, "rationale": "'la esquina' means the (street) corner. Common in directions: 'en la esquina' (at the corner)."}, {"text": "The street", "isCorrect": false, "rationale": "'la calle' means the street. 'la esquina' = the corner."}, {"text": "The block", "isCorrect": false, "rationale": "'la cuadra' or 'el bloque' means the block. 'la esquina' = the corner."}, {"text": "The intersection", "isCorrect": false, "rationale": "'la intersección' or 'el cruce' means intersection. 'la esquina' specifically = the corner."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
