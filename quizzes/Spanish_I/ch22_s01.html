        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 22, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the subjunctive mood used for in Spanish?", "options": [{"text": "Describing completed past actions at a specific moment", "isCorrect": false, "rationale": "Completed past actions use the preterite. The subjunctive is used for wishes, hopes, emotions, doubts, and recommendations about what someone else should or might do."}, {"text": "Expressing desires, hopes, emotions, doubts, or recommendations about what someone else should do", "isCorrect": true, "rationale": "The section explains: 'The subjunctive is used when you are expressing desires, hopes, emotions, doubts, or recommendations about what someone else should do or might do. Think of it as the wishful thinking mood of Spanish.'"}, {"text": "Giving direct affirmative commands to a friend", "isCorrect": false, "rationale": "Direct commands use the imperative mood. The subjunctive is for indirect wishes and recommendations expressed through trigger phrases + que + subjunctive."}, {"text": "Describing ongoing background actions in the past", "isCorrect": false, "rationale": "Ongoing background actions use the imperfect. The subjunctive expresses wishes, hopes, and requirements about others' actions."}], "id": "q01"}, {"question": "What is the key pattern for using the subjunctive?", "options": [{"text": "Subject + subjunctive verb + object (no que required)", "isCorrect": false, "rationale": "The subjunctive requires the pattern: Trigger phrase + que + new subject + subjunctive verb. The 'que' is essential."}, {"text": "Trigger phrase + que + new subject + subjunctive verb", "isCorrect": true, "rationale": "The key pattern: 'Quiero que estudies' = I want (trigger) + que + you (new subject) + estudies (subjunctive). The trigger phrase has one subject; the subjunctive has a DIFFERENT subject."}, {"text": "Infinitive + que + second verb (no new subject needed)", "isCorrect": false, "rationale": "When both verbs have the SAME subject, you use infinitive: 'Quiero estudiar'. The subjunctive pattern requires a DIFFERENT second subject: 'Quiero que tu estudies.'"}, {"text": "No + subjunctive verb (used only in negative sentences)", "isCorrect": false, "rationale": "No + subjunctive does form negative commands, but the subjunctive also appears in positive sentences with trigger phrases: 'Quiero que estudies.'"}], "id": "q02"}, {"question": "How do you form the regular subjunctive for -ar verbs?", "options": [{"text": "Take the yo present, drop -o, add -a endings: -a, -as, -a, -amos, -an", "isCorrect": true, "rationale": "The recipe: Step 1: Take the yo present form. Step 2: Drop -o. Step 3: Add opposite vowel endings. For -ar verbs, the opposite vowel is -e: wait, actually -ar verbs use -e endings. (The text says: -ar verbs use -e endings: -e, -es, -e, -emos, -en.)"}, {"text": "Take the infinitive, drop -ar, add -e endings: -e, -es, -e, -emos, -en", "isCorrect": false, "rationale": "You start from the yo present form (not the infinitive), then drop -o and add opposite vowel endings. For -ar: add -e endings."}, {"text": "Use the same form as the preterite yo form", "isCorrect": false, "rationale": "The subjunctive is formed from the yo PRESENT, not preterite. Drop -o from yo present and add opposite vowel endings."}, {"text": "Take the el/ella present form and add -s for all persons", "isCorrect": false, "rationale": "The el/ella present form is used for affirmative tu commands. The subjunctive starts from the yo present: drop -o, then add opposite vowel endings."}], "id": "q03"}, {"question": "What is the subjunctive of 'hablar' for 'tu'?", "options": [{"text": "hablas", "isCorrect": false, "rationale": "Hablas is the present indicative. The subjunctive: yo hablo -> drop -o -> habl- -> add -e endings: hables (tu)."}, {"text": "hables", "isCorrect": true, "rationale": "Hablar: yo hablo -> drop -o -> habl- + -es (tu subjunctive) = hables. 'Quiero que hables mas despacio.' (I want you to speak more slowly.)"}, {"text": "habla", "isCorrect": false, "rationale": "Habla is the affirmative tu command and the el/ella present. The subjunctive tu form is hables."}, {"text": "hableis", "isCorrect": false, "rationale": "Hableis is a vosotros subjunctive form used in Spain. The tu subjunctive is hables."}], "id": "q04"}, {"question": "Which of these is one of the five most common subjunctive trigger expressions?", "options": [{"text": "ya que (since/because)", "isCorrect": false, "rationale": "'Ya que' (since) introduces factual reasons using the indicative. The subjunctive trigger expressions include: quiero que, es importante que, espero que, es necesario que, ojala que."}, {"text": "ojala que (I hope that / God-willing)", "isCorrect": true, "rationale": "'Ojala que' is one of the five key subjunctive trigger expressions: quiero que, es importante que, espero que, es necesario que, ojala que."}, {"text": "porque (because)", "isCorrect": false, "rationale": "'Porque' introduces factual causes using the indicative. It is not a subjunctive trigger."}, {"text": "cuando (when)", "isCorrect": false, "rationale": "While 'cuando' can sometimes trigger the subjunctive (in future contexts), it is not listed among the five key subjunctive trigger expressions taught in this chapter."}], "id": "q05"}, {"question": "What is the fascinating historical origin of the word 'ojala'?", "options": [{"text": "It comes from Latin, the parent language of Spanish", "isCorrect": false, "rationale": "Ojala is one of the rare words that did NOT come from Latin. It comes from Arabic 'insha'Allah' (if God wills it), reflecting 700 years of Arabic influence on Spanish."}, {"text": "It comes from Arabic 'insha'Allah' (if God wills it), reflecting 700 years of Arabic influence on Spain", "isCorrect": true, "rationale": "The note explains: 'Ojala comes from the Arabic phrase insha'Allah, meaning if God wills it. Arabic was spoken in Spain for over 700 years (711-1492 CE), and hundreds of Spanish words come from Arabic — including ojala, almohada, azucar, and algebra.'"}, {"text": "It was invented by Spanish missionaries in the Americas in the 1500s", "isCorrect": false, "rationale": "Ojala predates the Americas colonization — it came from Arabic during the Moorish period in Spain (711-1492 CE)."}, {"text": "It comes from Greek and originally meant 'may it be so'", "isCorrect": false, "rationale": "Ojala comes from Arabic (insha'Allah), not Greek."}], "id": "q06"}, {"question": "Why is it easy to remember subjunctive forms if you already know negative tu commands?", "options": [{"text": "They are completely different — negative commands and subjunctive have no overlap.", "isCorrect": false, "rationale": "The memory tip highlights exactly the opposite: 'The subjunctive forms look exactly like the negative tu commands you learned in Chapter 16!'"}, {"text": "The subjunctive forms look exactly like the negative tu commands — you have already practiced them!", "isCorrect": true, "rationale": "The memory tip: 'Here is a wonderful secret: the subjunctive forms look exactly like the negative tu commands. You have already practiced these endings dozens of times.' No hables = negative command. Quiero que hables = subjunctive. Same form!"}, {"text": "Both use the infinitive form of the verb.", "isCorrect": false, "rationale": "Neither negative commands nor the subjunctive use the infinitive. Both use the subjunctive stem (yo present minus -o + opposite vowel endings)."}, {"text": "They share the same form only for -ar verbs.", "isCorrect": false, "rationale": "The overlap is complete — for all verb types. Negative tu commands and the tu subjunctive are identical: no hables / quiero que hables; no comas / quiero que comas."}], "id": "q07"}, {"question": "What does 'Es importante que ella coma frutas y verduras' mean?", "options": [{"text": "It is important that she eats fruits and vegetables.", "isCorrect": true, "rationale": "'Es importante que' is a subjunctive trigger. 'Ella' is the new subject. 'Coma' is the subjunctive of comer (yo como -> drop -o -> com- + -a). Full meaning: It is important that she eat fruits and vegetables."}, {"text": "It is important that she ate fruits and vegetables.", "isCorrect": false, "rationale": "The subjunctive 'coma' refers to present/future actions (what she should do), not past actions. 'She ate' would be the preterite: ella comio."}, {"text": "She must eat fruits and vegetables every day.", "isCorrect": false, "rationale": "While the meaning is similar, the exact translation of 'Es importante que ella coma' is 'It is important that she eat' (using es importante que as the trigger + subjunctive)."}, {"text": "She eats fruits and vegetables, which is important.", "isCorrect": false, "rationale": "The subjunctive expresses what SHOULD happen, not necessarily what IS happening. 'Es importante que coma' = It is important that she eat (not confirmed that she does)."}], "id": "q08"}, {"question": "What are the irregular subjunctive forms that must be memorized?", "options": [{"text": "ser -> sea, estar -> este, ir -> vaya, haber -> haya", "isCorrect": true, "rationale": "The grammar box notes: 'A few important irregular subjunctive forms (memorize these)' — they include ser -> sea, estar -> este, ir -> vaya, haber -> haya. These cannot be predicted from the yo present form."}, {"text": "ser -> saber, estar -> estaba, ir -> fue, haber -> habia", "isCorrect": false, "rationale": "These are not subjunctive forms — they are other indicative/imperfect forms. The irregular subjunctives are: ser -> sea, estar -> este, ir -> vaya, haber -> haya."}, {"text": "All verbs are regular in the subjunctive with no exceptions.", "isCorrect": false, "rationale": "There are a few irregular subjunctive forms that must be memorized: ser -> sea, estar -> este, ir -> vaya, haber -> haya."}, {"text": "Only -ar verbs have irregular subjunctive forms.", "isCorrect": false, "rationale": "The irregular subjunctives cut across verb classes: ser (-er), estar (-ar), ir (-ir), haber (-er) are all irregular."}], "id": "q09"}, {"question": "What does 'Espero que nosotros escribamos una carta bonita' mean?", "options": [{"text": "I hope we write a nice letter.", "isCorrect": true, "rationale": "'Espero que' = I hope that (subjunctive trigger). 'Nosotros escribamos' = we write (nosotros subjunctive of escribir). 'Una carta bonita' = a nice letter. Full meaning: I hope we write a nice letter."}, {"text": "We expect to write a beautiful letter together.", "isCorrect": false, "rationale": "'Espero' = I hope (not we expect). The trigger has a different subject (yo) than the subjunctive verb (nosotros). I hope that WE write..."}, {"text": "I wrote a nice letter last week.", "isCorrect": false, "rationale": "Escribamos is present subjunctive, not past. Writing in the past would use the preterite: escribi."}, {"text": "We should write a nice letter to our teacher.", "isCorrect": false, "rationale": "While the meaning is similar, the exact construction is: Espero que (I hope that) + nosotros escribamos (we write). There is no mention of 'to our teacher' in the original."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
