<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which preposition means 'next to / beside' in Spanish?", "options": [{"text": "detrás de", "isCorrect": false, "rationale": "Detrás de means behind, not next to."}, {"text": "enfrente de", "isCorrect": false, "rationale": "Enfrente de means in front of or across from, not next to."}, {"text": "al lado de", "isCorrect": true, "rationale": "Al lado de means next to or beside. Example: El banco está al lado de la biblioteca."}, {"text": "lejos de", "isCorrect": false, "rationale": "Lejos de means far from, not next to."}]}, {"question": "What verb is ALWAYS used to describe location in Spanish — never 'ser'?", "options": [{"text": "tener", "isCorrect": false, "rationale": "Tener means to have. For location, use estar."}, {"text": "ir", "isCorrect": false, "rationale": "Ir means to go. For location, use estar."}, {"text": "estar", "isCorrect": true, "rationale": "Location is always expressed with estar, never ser. Remember: location is always estar!"}, {"text": "haber", "isCorrect": false, "rationale": "Haber (hay) is used for 'there is/there are.' For specific location of a known thing, use estar."}]}, {"question": "What is the yo form of the verb 'dar' (to give)?", "options": [{"text": "dao", "isCorrect": false, "rationale": "Dao is not a word. The irregular yo form of dar is doy."}, {"text": "do", "isCorrect": false, "rationale": "Do is not the correct form. The yo form of dar is doy (not following the regular -ar pattern)."}, {"text": "doy", "isCorrect": true, "rationale": "The yo form of dar is doy — an irregular form. All other forms are regular: das, da, damos, dan."}, {"text": "dar", "isCorrect": false, "rationale": "Dar is the infinitive, not the yo form. The yo form is doy."}]}, {"question": "According to the grammar box, when do prepositions ending in 'de' require the contraction 'del'?", "options": [{"text": "Always, whenever they appear in a sentence.", "isCorrect": false, "rationale": "The contraction del only forms when de is followed by the masculine singular article el."}, {"text": "When they are followed by a feminine noun.", "isCorrect": false, "rationale": "The contraction del only applies before masculine singular el, not before feminine la."}, {"text": "When followed by the masculine singular article el.", "isCorrect": true, "rationale": "Prepositions ending in de (like al lado de, cerca de) form del when a masculine singular noun follows: al lado del banco, cerca del parque."}, {"text": "Only at the beginning of a sentence.", "isCorrect": false, "rationale": "The del contraction applies whenever de + el occurs in a sentence, regardless of position."}]}, {"question": "How would you say 'The hospital is behind the bank' in Spanish?", "options": [{"text": "El hospital está enfrente del banco.", "isCorrect": false, "rationale": "Enfrente de means in front of / across from. For behind, use detrás de."}, {"text": "El hospital está al lado del banco.", "isCorrect": false, "rationale": "Al lado de means next to. For behind, use detrás de."}, {"text": "El hospital está detrás del banco.", "isCorrect": true, "rationale": "Detrás de means behind: El hospital está detrás del banco. Del is the required contraction of de + el."}, {"text": "El hospital está lejos del banco.", "isCorrect": false, "rationale": "Lejos de means far from. For behind, use detrás de."}]}, {"question": "In the reading, where is the restaurant relative to the plaza?", "options": [{"text": "It is across from the plaza.", "isCorrect": false, "rationale": "The reading says the restaurant is near (cerca de) the plaza, not across from it."}, {"text": "It is far from the plaza.", "isCorrect": false, "rationale": "The reading says: a solo dos cuadras (only two blocks away) — it is very close, not far."}, {"text": "It is near the plaza — only two blocks away.", "isCorrect": true, "rationale": "The reading says: El restaurante favorito de mi familia está cerca de la plaza — a solo dos cuadras (only two blocks away)."}, {"text": "It is next to the library.", "isCorrect": false, "rationale": "The library is behind the bank. The restaurant is near the plaza."}]}, {"question": "What does 'entre' mean as a preposition of location?", "options": [{"text": "around", "isCorrect": false, "rationale": "Alrededor de means around. Entre means between."}, {"text": "through", "isCorrect": false, "rationale": "Por or a través de means through. Entre means between."}, {"text": "between", "isCorrect": true, "rationale": "Entre means between: La farmacia está entre el banco y el hospital. (The pharmacy is between the bank and the hospital.)"}, {"text": "in front of", "isCorrect": false, "rationale": "Enfrente de means in front of. Entre means between."}]}, {"question": "What does 'hay' mean in the reading sentence 'Hay una iglesia grande enfrente de la plaza'?", "options": [{"text": "there is / there are", "isCorrect": true, "rationale": "Hay means there is (singular) or there are (plural). Hay una iglesia grande = There is a large church."}, {"text": "he has", "isCorrect": false, "rationale": "He/she has is tiene (from tener). Hay (from haber) means there is/there are."}, {"text": "I go", "isCorrect": false, "rationale": "I go is voy (from ir). Hay means there is/there are."}, {"text": "it is", "isCorrect": false, "rationale": "It is (for location) is está. Hay specifically introduces the existence of something: there is/there are."}]}, {"question": "How do you say 'straight ahead' in Spanish?", "options": [{"text": "a la derecha", "isCorrect": false, "rationale": "A la derecha means to the right, not straight ahead."}, {"text": "a la izquierda", "isCorrect": false, "rationale": "A la izquierda means to the left, not straight ahead."}, {"text": "derecho", "isCorrect": true, "rationale": "Derecho means straight ahead. Siga derecho means continue straight ahead."}, {"text": "cerca de", "isCorrect": false, "rationale": "Cerca de means near / close to, not straight ahead."}]}, {"question": "Which sentence from the reading correctly uses 'estar' for location?", "options": [{"text": "La biblioteca es detrás del banco.", "isCorrect": false, "rationale": "Location uses estar, not ser. Correct: La biblioteca está detrás del banco."}, {"text": "La biblioteca está detrás del banco.", "isCorrect": true, "rationale": "Correct! Location always uses estar. La biblioteca está detrás del banco — the library is behind the bank."}, {"text": "La biblioteca tiene detrás del banco.", "isCorrect": false, "rationale": "Tener means to have and does not describe location. Use estar for location."}, {"text": "La biblioteca va detrás del banco.", "isCorrect": false, "rationale": "Ir means to go and does not describe where something is located. Use estar for location."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
