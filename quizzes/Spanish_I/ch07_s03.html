<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the reading, what does Pablo eat for breakfast?", "options": [{"text": "Cereal y jugo de naranja", "isCorrect": false, "rationale": "Cereal and orange juice is what Daniel eats in the conversation, not Pablo."}, {"text": "Tostadas y café con leche", "isCorrect": true, "rationale": "Pablo says: Como tostadas y bebo café con leche en la cocina con mi mamá."}, {"text": "Arroz con frijoles", "isCorrect": false, "rationale": "Rice and beans is not mentioned as Pablo's breakfast; that appears in other chapter examples."}, {"text": "Pan y leche", "isCorrect": false, "rationale": "Bread and milk is what Sofía eats in the conversation, not Pablo."}]}, {"question": "What is 'la merienda' in Argentina?", "options": [{"text": "The main midday meal", "isCorrect": false, "rationale": "The main midday meal is el almuerzo; la merienda is a lighter afternoon snack."}, {"text": "An afternoon snack around 4 or 5 p.m., typically medialunas and hot chocolate", "isCorrect": true, "rationale": "La merienda in Argentina is an afternoon snack around 4–5 p.m., typically featuring medialunas (croissants) and hot chocolate or juice."}, {"text": "A late-night dessert after dinner", "isCorrect": false, "rationale": "La merienda happens in the afternoon, not at night. Argentina's dinner itself is very late."}, {"text": "A formal weekend breakfast", "isCorrect": false, "rationale": "La merienda is an afternoon snack, not a breakfast."}]}, {"question": "What is 'el mate' in Argentine culture?", "options": [{"text": "A type of sweet pastry eaten at breakfast", "isCorrect": false, "rationale": "El mate is not a food; it is a bitter herbal tea drunk from a special gourd."}, {"text": "A bitter herbal tea sipped through a metal straw, shared as a social ritual", "isCorrect": true, "rationale": "El mate is a beloved daily tradition — a bitter herbal tea sipped through a metal straw from a gourd, passed from person to person as a sign of friendship."}, {"text": "An afternoon soccer game played between neighbors", "isCorrect": false, "rationale": "El mate is a drink, not a sport."}, {"text": "A type of school bag used by Argentine students", "isCorrect": false, "rationale": "El mate is a drink. La mochila is the word for backpack."}]}, {"question": "In the song 'La mar estaba serena,' what clever technique is used?", "options": [{"text": "The melody changes completely for each verse.", "isCorrect": false, "rationale": "The melody stays the same; it is the vowels that change — every vowel is replaced with a single vowel each round."}, {"text": "Every vowel in the entire song is replaced with a single vowel each round.", "isCorrect": true, "rationale": "The song is sung normally, then with all vowels replaced by 'a,' then 'e,' then 'i,' etc. — making it a hilarious vowel-pronunciation exercise."}, {"text": "New vocabulary words are added to each verse.", "isCorrect": false, "rationale": "The song does not add vocabulary; it uses the same lyrics but substitutes all vowels."}, {"text": "Students compete to sing it the fastest without mistakes.", "isCorrect": false, "rationale": "The goal is not speed; the song is designed to practice careful vowel pronunciation."}]}, {"question": "How are school days structured in Argentina according to the culture box?", "options": [{"text": "All students attend a single 8-hour school day.", "isCorrect": false, "rationale": "Argentine schools do not run an 8-hour day; they operate in two separate shifts."}, {"text": "In two shifts: morning and afternoon; students attend only one.", "isCorrect": true, "rationale": "School in Argentina runs in el turno mañana (roughly 8 a.m. to noon) and el turno tarde (roughly 1–5 p.m.). Students attend just one shift."}, {"text": "School runs year-round with no summer break.", "isCorrect": false, "rationale": "The text discusses the two-shift system, not whether schools run year-round."}, {"text": "Students choose between online and in-person learning.", "isCorrect": false, "rationale": "The shift system is about morning vs. afternoon physical attendance, not online options."}]}, {"question": "What time does dinner typically happen in Argentina, and why is this surprising to Americans?", "options": [{"text": "At 5 or 6 p.m. — earlier than in the United States", "isCorrect": false, "rationale": "Argentine dinner is actually much later, not earlier, than in the United States."}, {"text": "At 9 or 10 p.m. — much later than in the United States", "isCorrect": true, "rationale": "La cena in Argentina typically happens between 9 and 10 p.m., which surprises many Americans accustomed to eating dinner at 5–7 p.m."}, {"text": "At exactly noon — combined with lunch", "isCorrect": false, "rationale": "Noon is when el almuerzo (lunch) occurs. Dinner is a separate late evening meal."}, {"text": "At midnight — after nighttime activities", "isCorrect": false, "rationale": "While Argentina's dinner is late, it typically starts at 9–10 p.m., not midnight."}]}, {"question": "In the reading about Pablo, which floor does he live on?", "options": [{"text": "The first floor", "isCorrect": false, "rationale": "Pablo says Vivo en un apartamento en el cuarto piso — the fourth floor, not the first."}, {"text": "The second floor", "isCorrect": false, "rationale": "El segundo piso is the second floor; Pablo lives on el cuarto piso (the fourth floor)."}, {"text": "The fourth floor", "isCorrect": true, "rationale": "Pablo clearly states: Vivo en un apartamento en el cuarto piso de un edificio grande — the fourth floor of a large building."}, {"text": "The top floor", "isCorrect": false, "rationale": "Pablo does not say he is on the top floor; he specifies el cuarto piso (the fourth floor)."}]}, {"question": "What does Pablo do with his neighbor Matías in the afternoon?", "options": [{"text": "They read books together.", "isCorrect": false, "rationale": "Reading is something Pablo does at night, not with his neighbor Matías in the afternoon."}, {"text": "They run in the street or play soccer in the park.", "isCorrect": true, "rationale": "Pablo says: mi vecino Matías y yo corremos en la calle o jugamos al fútbol en el parque."}, {"text": "They drink mate and talk.", "isCorrect": false, "rationale": "Drinking mate is a general Argentine tradition, not Pablo's specific afternoon activity with Matías."}, {"text": "They do homework together.", "isCorrect": false, "rationale": "Homework is mentioned in Pablo's morning routine, not his afternoon activity with Matías."}]}, {"question": "What does the vocabulary word 'junta/o' mean in the reading?", "options": [{"text": "Quickly", "isCorrect": false, "rationale": "Rápido means quickly; junta/o means together."}, {"text": "Together", "isCorrect": true, "rationale": "Pablo says: mi familia come junta a las nueve y media — his family eats together at nine-thirty."}, {"text": "Separately", "isCorrect": false, "rationale": "Junta/o is the opposite of separately; it means together."}, {"text": "Often", "isCorrect": false, "rationale": "A menudo or frecuentemente means often; junta/o means together."}]}, {"question": "How many vowel sounds does Spanish have, and how are they pronounced?", "options": [{"text": "Three vowel sounds, each with multiple possible pronunciations", "isCorrect": false, "rationale": "Spanish has five vowels, and each is always pronounced consistently — unlike English."}, {"text": "Five vowel sounds, each always pronounced the same way: a=ah, e=eh, i=ee, o=oh, u=oo", "isCorrect": true, "rationale": "Spanish has five vowels (a, e, i, o, u), and unlike English vowels, each Spanish vowel is always pronounced consistently."}, {"text": "Seven vowel sounds, depending on the region", "isCorrect": false, "rationale": "Spanish has five vowel letters/sounds. Regional accents affect other aspects of pronunciation but the vowels remain consistent."}, {"text": "Five vowel sounds, but they change pronunciation based on adjacent consonants", "isCorrect": false, "rationale": "One of Spanish's strengths is that its five vowels are always pronounced consistently, unlike English where vowels change depending on context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
