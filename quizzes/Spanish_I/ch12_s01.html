<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which form of gustar is used when a singular noun or an infinitive is the subject?", "options": [{"text": "gusta", "isCorrect": true, "rationale": "'gusta' (singular) is used when one thing or an action (infinitive) is the subject: 'Me gusta la música.' / 'Me gusta leer.'"}, {"text": "gustan", "isCorrect": false, "rationale": "'gustan' (plural) is used when multiple things are the subject: 'Me gustan los libros.'"}, {"text": "gusto", "isCorrect": false, "rationale": "'gusto' is not a standard conjugation of gustar in the present tense with this construction."}, {"text": "gustas", "isCorrect": false, "rationale": "'gustas' is not used in the gustar construction. The verb agrees with the subject (what is pleasing), not with me/te/le."}], "id": "q01"}, {"question": "How do you say 'I like sports' using the gustar construction?", "options": [{"text": "Me gustan los deportes.", "isCorrect": true, "rationale": "'los deportes' is plural, so we use 'gustan.' 'Me' is the indirect object pronoun for 'to me.'"}, {"text": "Me gusta los deportes.", "isCorrect": false, "rationale": "'los deportes' is plural, requiring 'gustan,' not 'gusta.'"}, {"text": "Yo gusto los deportes.", "isCorrect": false, "rationale": "Gustar does not work like English 'I like.' The construction requires an indirect object pronoun (me/te/le...)."}, {"text": "Me gustan deporte.", "isCorrect": false, "rationale": "The definite article is needed: 'los deportes.' The construction requires 'me gustan los deportes.'"}], "id": "q02"}, {"question": "What is the indirect object pronoun used to say that something pleases 'us' (nosotros)?", "options": [{"text": "nos", "isCorrect": true, "rationale": "'nos' is the indirect object pronoun for 'nosotros': 'Nos gusta la música.' (We like music.)"}, {"text": "le", "isCorrect": false, "rationale": "'le' is for él/ella/usted. 'Nos' is used for nosotros."}, {"text": "les", "isCorrect": false, "rationale": "'les' is for ellos/ellas/ustedes. 'Nos' is used for nosotros."}, {"text": "me", "isCorrect": false, "rationale": "'me' is for yo. 'Nos' is used for nosotros."}], "id": "q03"}, {"question": "In the sentence 'A ella le gusta el fútbol,' what does 'a ella' do?", "options": [{"text": "It clarifies who 'le' refers to", "isCorrect": true, "rationale": "Since 'le' can mean él, ella, or usted, adding 'a ella' clarifies that it is she who likes soccer."}, {"text": "It replaces 'le' in the sentence", "isCorrect": false, "rationale": "'A ella' is added for clarification but 'le' remains in the sentence — it does not replace it."}, {"text": "It makes the sentence negative", "isCorrect": false, "rationale": "To make gustar negative, add 'no' before the pronoun: 'No le gusta.' 'A ella' clarifies the pronoun."}, {"text": "It changes the verb to 'gustan'", "isCorrect": false, "rationale": "The verb form (gusta/gustan) depends on the subject (el fútbol = singular), not on 'a ella.'"}], "id": "q04"}, {"question": "How do you say 'They don't like the movies' using gustar?", "options": [{"text": "No les gustan las películas.", "isCorrect": true, "rationale": "'les' is for ellos/ellas, 'no' makes it negative, and 'gustan' is used because 'las películas' is plural."}, {"text": "No les gusta las películas.", "isCorrect": false, "rationale": "'las películas' is plural, so 'gustan' is needed, not 'gusta.'"}, {"text": "No me gustan las películas.", "isCorrect": false, "rationale": "'me' refers to yo (I). For 'they,' use 'les.'"}, {"text": "Les no gustan las películas.", "isCorrect": false, "rationale": "In Spanish, 'no' comes before the indirect object pronoun: 'No les gustan,' not 'les no gustan.'"}], "id": "q05"}, {"question": "In the gustar construction, what controls whether you use 'gusta' or 'gustan'?", "options": [{"text": "Whether the subject (the thing being liked) is singular or plural", "isCorrect": true, "rationale": "The verb agrees with the subject — the thing that is pleasing. One thing → gusta; multiple things → gustan."}, {"text": "Whether the person who likes something is singular or plural", "isCorrect": false, "rationale": "The indirect object pronoun (me/te/le/nos/les) indicates who likes it, but doesn't control gusta/gustan."}, {"text": "Whether the sentence is positive or negative", "isCorrect": false, "rationale": "Adding 'no' changes positive/negative but doesn't affect whether you use gusta or gustan."}, {"text": "Whether the verb follows 'a + person'", "isCorrect": false, "rationale": "'A + person' clarifies who 'le/les' refers to. It doesn't determine gusta vs. gustan."}], "id": "q06"}, {"question": "What does 'Me gusta leer' mean?", "options": [{"text": "I like to read.", "isCorrect": true, "rationale": "When an infinitive follows gustar, it is always 'gusta' (singular). 'Me gusta leer' = 'I like to read.'"}, {"text": "I like books.", "isCorrect": false, "rationale": "'Me gustan los libros' = I like books. 'Me gusta leer' uses an infinitive and means 'I like to read.'"}, {"text": "Reading pleases them.", "isCorrect": false, "rationale": "'Me' refers to yo (I/me). 'Reading pleases them' would be 'Les gusta leer.'"}, {"text": "We like reading.", "isCorrect": false, "rationale": "'We like reading' would be 'Nos gusta leer.' 'Me' refers to yo."}], "id": "q07"}, {"question": "How do you say 'Do you like the song?' using the gustar construction (tú)?", "options": [{"text": "¿Te gusta la canción?", "isCorrect": true, "rationale": "'te' is the indirect object pronoun for tú. 'la canción' is singular, so 'gusta' is used."}, {"text": "¿Me gusta la canción?", "isCorrect": false, "rationale": "'me' is for yo (I). To ask 'you,' use 'te.'"}, {"text": "¿Te gustan la canción?", "isCorrect": false, "rationale": "'la canción' is singular, so use 'gusta' not 'gustan.'"}, {"text": "¿Gustas la canción?", "isCorrect": false, "rationale": "This is not how gustar works. Use the indirect object pronoun construction: '¿Te gusta la canción?'"}], "id": "q08"}, {"question": "In the song 'A la víbora de la mar,' what game action does the song accompany?", "options": [{"text": "Children pass under a human arch made by two players", "isCorrect": true, "rationale": "The song accompanies a game where two children form an arch with their arms and a line of players passes underneath, like a snake (víbora) weaving through water."}, {"text": "Children form a circle and spin around", "isCorrect": false, "rationale": "This is more like 'A la rueda de San Miguel.' In 'A la víbora,' players form a line passing under an arch."}, {"text": "Children play tug-of-war in teams from the start", "isCorrect": false, "rationale": "The tug-of-war only happens after a player is trapped by the arch. First the line must pass through."}, {"text": "Children throw a ball to each other in a line", "isCorrect": false, "rationale": "No ball is mentioned. The game involves a human arch and players passing underneath."}], "id": "q09"}, {"question": "What are the two choices a trapped player must make secretly in the 'A la víbora de la mar' game?", "options": [{"text": "Manzana (apple) or limón (lemon)", "isCorrect": true, "rationale": "When the arch traps a player, that player must secretly choose between manzana (apple) or limón (lemon) to determine which team to join."}, {"text": "Rojo (red) or azul (blue)", "isCorrect": false, "rationale": "The game uses manzana and limón as team names, not colors."}, {"text": "Víbora (snake) or mar (sea)", "isCorrect": false, "rationale": "Víbora and mar are in the song's title and imagery, but the team choices are manzana and limón."}, {"text": "Norte (north) or sur (south)", "isCorrect": false, "rationale": "Compass directions are not part of this game. The choice is manzana or limón."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
