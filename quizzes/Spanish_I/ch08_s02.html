<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Spanish express 'I am hungry' using tener?", "options": [{"text": "Estoy hambre.", "isCorrect": false, "rationale": "Hambre is a noun, not an adjective; you cannot use estar with it. Use tener: Tengo hambre."}, {"text": "Soy hambre.", "isCorrect": false, "rationale": "Ser is not used for feelings or physical states. Use tener: Tengo hambre."}, {"text": "Tengo hambre.", "isCorrect": true, "rationale": "Spanish expresses hunger with tener + noun: Tengo hambre literally means 'I have hunger' but translates as 'I am hungry.'"}, {"text": "He hambre.", "isCorrect": false, "rationale": "He is from haber (I have had/there has been), not the correct structure. Use Tengo hambre."}], "id": "q01"}, {"question": "With tener expressions, how do you say 'I am very cold'?", "options": [{"text": "Tengo muy frío.", "isCorrect": false, "rationale": "With tener expressions, use mucho/a (not muy) before the noun: Tengo mucho frío."}, {"text": "Tengo mucho frío.", "isCorrect": true, "rationale": "With tener expressions, use mucho/a to mean 'very': frío is masculine so we use mucho. Tengo mucho frío = I am very cold."}, {"text": "Estoy muy frío.", "isCorrect": false, "rationale": "Frío as a feeling uses tener, not estar. Say Tengo mucho frío."}, {"text": "Tengo mucha frío.", "isCorrect": false, "rationale": "Frío is masculine, so the correct form is mucho (not mucha). Tengo mucho frío."}], "id": "q02"}, {"question": "How do you correctly express age in Spanish using 'tener'?", "options": [{"text": "Tengo doce.", "isCorrect": false, "rationale": "When expressing age with tener, you must always include the word años: Tengo doce años."}, {"text": "Soy doce años.", "isCorrect": false, "rationale": "Age uses tener, not ser. The correct form is Tengo doce años."}, {"text": "Tengo doce años.", "isCorrect": true, "rationale": "Age is expressed with tener + number + años. The word años (years) is required: Tengo doce años = I am twelve years old."}, {"text": "Estoy doce años.", "isCorrect": false, "rationale": "Age uses tener, not estar. The correct form is Tengo doce años."}], "id": "q03"}, {"question": "Why does Spanish use 'tener' (to have) rather than 'ser/estar' (to be) for many feelings and physical states?", "options": [{"text": "Because Spanish has no verb equivalent to 'to be'.", "isCorrect": false, "rationale": "Spanish has two verbs for 'to be': ser and estar. The use of tener for feelings is a structural difference from English."}, {"text": "Because Spanish speakers think of feelings as things they possess, like objects.", "isCorrect": true, "rationale": "In Spanish, many physical sensations are treated as nouns you 'have' — just as you have an object. 'I have hunger' rather than 'I am hungry.'"}, {"text": "Because tener is easier to conjugate than ser and estar.", "isCorrect": false, "rationale": "Tener is actually an irregular verb (yo form = tengo). The reason is conceptual, not ease of conjugation."}, {"text": "Because these expressions are borrowed from English.", "isCorrect": false, "rationale": "These tener expressions are native Spanish structures, not borrowed from English. In fact, they differ from the English pattern."}], "id": "q04"}, {"question": "Which of the following correctly uses 'tener' for a physical sensation?", "options": [{"text": "Ella es sed.", "isCorrect": false, "rationale": "Ser is not used for physical sensations. Use tener: Ella tiene sed."}, {"text": "Ella tiene sed.", "isCorrect": true, "rationale": "Tener + noun is the correct structure for physical sensations: Ella tiene sed = She is thirsty (literally: She has thirst)."}, {"text": "Ella está sed.", "isCorrect": false, "rationale": "Sed is a noun, not an adjective; estar is used with adjectives. Use tener: Ella tiene sed."}, {"text": "Ella sedear.", "isCorrect": false, "rationale": "Sedear is not a verb. The correct structure is tener + noun: Ella tiene sed."}], "id": "q05"}, {"question": "How do you say 'We are hungry' in Spanish?", "options": [{"text": "Tenemos hambre.", "isCorrect": true, "rationale": "The nosotros form of tener is tenemos, and hambre (hunger) does not change. Tenemos hambre = We are hungry."}, {"text": "Tengo hambre nosotros.", "isCorrect": false, "rationale": "Tengo is the yo form; for nosotros use tenemos. Tenemos hambre."}, {"text": "Tienen hambre.", "isCorrect": false, "rationale": "Tienen is the ellos/ellas form; for nosotros use tenemos. Tenemos hambre."}, {"text": "Tienes hambre.", "isCorrect": false, "rationale": "Tienes is the tú form; for nosotros use tenemos. Tenemos hambre."}], "id": "q06"}, {"question": "In the 'Body Method' memory technique, what is the purpose of scanning body parts?", "options": [{"text": "To practice medical vocabulary for a health unit.", "isCorrect": false, "rationale": "The Body Method is a memory technique for tener expressions, not for medical vocabulary specifically."}, {"text": "To assign each tener expression to the body part where that feeling physically lives.", "isCorrect": true, "rationale": "By assigning each tener expression to the body part associated with it (stomach for hunger, eyes for sleep, etc.), you create physical memory hooks that make the phrases stick."}, {"text": "To practice conjugating tener for different subjects.", "isCorrect": false, "rationale": "The Body Method is about memorizing which tener expression goes with which feeling, not about conjugation practice."}, {"text": "To learn vocabulary for describing physical appearance.", "isCorrect": false, "rationale": "The Body Method applies specifically to tener expressions for feelings/sensations, not to appearance vocabulary."}], "id": "q07"}, {"question": "Which sentence correctly uses 'tener mucha' vs 'tener mucho'?", "options": [{"text": "Tengo mucho hambre. (Hambre is feminine.)", "isCorrect": false, "rationale": "Hambre is feminine, so the correct form is mucha: Tengo mucha hambre."}, {"text": "Tengo mucha sueño. (Sueño is masculine.)", "isCorrect": false, "rationale": "Sueño is masculine, so the correct form is mucho: Tengo mucho sueño."}, {"text": "Tengo mucha hambre. (Hambre is feminine.)", "isCorrect": true, "rationale": "Hambre is a feminine noun, so mucha is correct: Tengo mucha hambre = I am very hungry."}, {"text": "Tengo mucho sed. (Sed is feminine.)", "isCorrect": false, "rationale": "Sed is feminine, so the correct form is mucha: Tengo mucha sed."}], "id": "q08"}, {"question": "What does 'tener razón' mean?", "options": [{"text": "To have a reason to be angry", "isCorrect": false, "rationale": "Tener razón means to be right, not to be angry. Enojado/a is the adjective for angry."}, {"text": "To be right / to be correct", "isCorrect": true, "rationale": "Tener razón literally means 'to have reason' but is used to mean 'to be right.' Diego tiene razón: está enfermo = Diego is right: he is sick."}, {"text": "To need a reason", "isCorrect": false, "rationale": "Tener razón means to be right, not to need a reason. Necesitar means to need."}, {"text": "To think logically", "isCorrect": false, "rationale": "Pensar logicamente means to think logically. Tener razón specifically means to be correct or right."}], "id": "q09"}, {"question": "Which tener expression does Diego use at the end of the reading, and what does it tell us about how he feels?", "options": [{"text": "Tengo dolor — Diego is still in pain.", "isCorrect": false, "rationale": "At the end, Diego is recovered. He uses Tengo hambre — he is hungry, which signals he feels well again."}, {"text": "Tengo miedo — Diego is afraid.", "isCorrect": false, "rationale": "Diego does not express fear at the end. He uses Tengo hambre to show he has recovered."}, {"text": "Tengo hambre — Diego is hungry, showing he has recovered.", "isCorrect": true, "rationale": "When Diego says Tengo hambre at the end, it signals that he is feeling well again — a recovered appetite is a sign of health."}, {"text": "Tengo sueño — Diego is sleepy.", "isCorrect": false, "rationale": "Diego does not express sleepiness at the end. He uses Tengo hambre to signal his recovery."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
