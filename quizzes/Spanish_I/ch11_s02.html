<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do hago, digo, pongo, and salgo have in common?", "options": [{"text": "They are all regular -ar verb forms.", "isCorrect": false, "rationale": "These are irregular yo forms of -er/-ir verbs (hacer, decir, poner, salir). They share the -go ending in the yo form."}, {"text": "They are all irregular yo forms ending in -go.", "isCorrect": true, "rationale": "Hago, digo, pongo, and salgo are the irregular yo forms of hacer, decir, poner, and salir. They all end in -go, which is a special pattern for these four verbs."}, {"text": "They are all stem-changing verbs with e→ie change.", "isCorrect": false, "rationale": "These verbs are irregular in the yo form only (adding -go). They are not e→ie stem-changers (though decir has a separate e→i change in other forms)."}, {"text": "They are all irregular in every form.", "isCorrect": false, "rationale": "These verbs are irregular ONLY in the yo form. All other forms follow regular -er/-ir patterns."}]}, {"question": "What is the yo form of 'poner' (to put/place/set)?", "options": [{"text": "pono", "isCorrect": false, "rationale": "Pono is not a word. The irregular yo form of poner is pongo."}, {"text": "pone", "isCorrect": false, "rationale": "Pone is the él/ella form of poner. The yo form is pongo."}, {"text": "pongo", "isCorrect": true, "rationale": "The yo form of poner is pongo — the -go ending makes it irregular. All other forms are regular: pones, pone, ponemos, ponen."}, {"text": "ponemos", "isCorrect": false, "rationale": "Ponemos is the nosotros form. The yo form is pongo."}]}, {"question": "What is special about 'decir' compared to the other three -go verbs?", "options": [{"text": "Decir is irregular in ALL forms, not just yo.", "isCorrect": false, "rationale": "Decir has the -go yo form (digo), but it is also special because it has an e→i stem change in other boot forms (dices, dice, dicen)."}, {"text": "Decir also has an e→i stem change in most forms outside nosotros.", "isCorrect": true, "rationale": "Decir has both the -go yo form (digo) AND an e→i stem change in other forms: dices, dice, decimos, dicen. The yo form digo has the -go ending but does NOT have the e→i change."}, {"text": "Decir uses the same forms as the verb ir.", "isCorrect": false, "rationale": "Decir and ir have completely different conjugations. Decir is irregular in the yo form and has an e→i stem change; ir is completely irregular (voy, vas, va, vamos, van)."}, {"text": "Decir is the only regular verb in this group.", "isCorrect": false, "rationale": "Decir is not regular — it has an irregular yo form (digo) AND an e→i stem change in other forms."}]}, {"question": "What are three common uses of 'hacer' in everyday Spanish?", "options": [{"text": "To eat, to drink, and to sleep", "isCorrect": false, "rationale": "Eating is comer, drinking is beber, sleeping is dormir. Hacer means to do or to make."}, {"text": "To do homework, to make food, and to describe weather", "isCorrect": true, "rationale": "Hacer has many uses: hacer la tarea (do homework), hacer la cena (make dinner), and weather expressions like hace frío, hace calor."}, {"text": "To go, to come, and to leave", "isCorrect": false, "rationale": "Going is ir, coming is venir, leaving is salir. Hacer means to do or to make."}, {"text": "To ask questions, to answer, and to listen", "isCorrect": false, "rationale": "Hacer preguntas (ask questions) is one use of hacer, but answering is contestar/responder and listening is escuchar — not forms of hacer."}]}, {"question": "What is the yo form of 'salir' (to leave/go out)?", "options": [{"text": "salo", "isCorrect": false, "rationale": "Salo is not a word. The irregular yo form of salir is salgo."}, {"text": "sale", "isCorrect": false, "rationale": "Sale is the él/ella form of salir. The yo form is salgo."}, {"text": "salgo", "isCorrect": true, "rationale": "The yo form of salir is salgo — the -go ending makes it irregular. Other forms are regular: sales, sale, salimos, salen."}, {"text": "salgos", "isCorrect": false, "rationale": "Salgos is not a word. The irregular yo form is salgo (no -s)."}]}, {"question": "According to the 'Story Method' memory tip, what sentence links all four -go verb yo forms?", "options": [{"text": "Every morning I MAKE a pizza and SAY it is delicious. Then I PUT it on the table and LEAVE before anyone can eat it!", "isCorrect": true, "rationale": "This silly story uses all four irregular yo forms: hago (make), digo (say), pongo (put), salgo (leave) — in that order. The story method works because vivid, memorable stories help the brain retain vocabulary."}, {"text": "I HAVE a problem and I KNOW the answer. I WANT to speak and I CAN do it!", "isCorrect": false, "rationale": "This sentence uses tengo, sé, quiero, puedo — not the four -go verbs from this section."}, {"text": "I GO to the store. I GIVE my friend a gift. I SEE the movie. I KNOW the ending!", "isCorrect": false, "rationale": "This uses voy, doy, veo, sé — not the four -go verbs (hago, digo, pongo, salgo) from this section."}, {"text": "I SLEEP late. I EAT breakfast. I RUN to school. I ARRIVE on time!", "isCorrect": false, "rationale": "This uses duermo, como, corro, llego — not the four -go verbs from this section."}]}, {"question": "Which phrase uses 'poner' in a common everyday expression?", "options": [{"text": "poner la tarea (to assign homework)", "isCorrect": false, "rationale": "Asignar or dar la tarea means to assign homework. A common poner expression is poner la mesa (to set the table)."}, {"text": "poner la mesa (to set the table)", "isCorrect": true, "rationale": "Poner la mesa (to set the table) is one of the most common expressions with poner. Others include poner música (put on music) and poner atención (pay attention)."}, {"text": "poner la escuela (to attend school)", "isCorrect": false, "rationale": "Ir a la escuela means to attend school. Poner la escuela is not a standard expression."}, {"text": "poner el sol (to describe sunny weather)", "isCorrect": false, "rationale": "Hace sol means it is sunny. Poner la mesa and similar expressions are the common uses of poner."}]}, {"question": "What does 'pasar' mean, and why is it described as having two jobs?", "options": [{"text": "It means to eat and to drink — two different meal contexts.", "isCorrect": false, "rationale": "Pasar does not mean to eat or drink. It means to pass (physically) and to happen (¿Qué pasa?)."}, {"text": "It means both 'to pass' (physically) and 'to happen' — ¿Qué pasa? is one of the most common phrases.", "isCorrect": true, "rationale": "Pasar has two main uses: to pass something physically, and to happen (¿Qué pasa? = What is happening?). Context determines which meaning is intended."}, {"text": "It means to wait and to hope, depending on context.", "isCorrect": false, "rationale": "Esperar means to wait and to hope. Pasar means to pass and to happen."}, {"text": "It means to wear (clothing) and to carry (objects).", "isCorrect": false, "rationale": "Llevar means to wear and to carry. Pasar means to pass and to happen."}]}, {"question": "How do you say 'I leave the house at seven' using salir?", "options": [{"text": "Salgo de casa a las siete.", "isCorrect": true, "rationale": "The yo form of salir is the irregular salgo. Salir de + place = to leave from a place. Salgo de casa a las siete = I leave the house at seven."}, {"text": "Salo de casa a las siete.", "isCorrect": false, "rationale": "Salo is not a word. The irregular yo form of salir is salgo."}, {"text": "Sale de casa a las siete.", "isCorrect": false, "rationale": "Sale is the él/ella form. The yo form is salgo."}, {"text": "Salgo a casa a las siete.", "isCorrect": false, "rationale": "Salir de means to leave from. Salgo a would mean I go toward/to the house, which is the opposite meaning."}]}, {"question": "What does the grammar box say about 'llevar' — why is it described as having two meanings?", "options": [{"text": "Llevar means to love and to miss — two emotional states.", "isCorrect": false, "rationale": "Querer/amar means to love; echar de menos/extrañar means to miss. Llevar means to carry and to wear."}, {"text": "Llevar means both 'to carry' something and 'to wear' clothing.", "isCorrect": true, "rationale": "Llevar has two common meanings: to carry/bring something (Llevo mi mochila) and to wear clothing (Llevo una camisa azul). Context determines the meaning."}, {"text": "Llevar means to arrive and to leave — two movement concepts.", "isCorrect": false, "rationale": "Llegar means to arrive; salir means to leave. Llevar means to carry and to wear."}, {"text": "Llevar means to buy and to sell — two commercial actions.", "isCorrect": false, "rationale": "Comprar means to buy; vender means to sell. Llevar means to carry and to wear."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
