    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 20, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the key difference between the preterite and imperfect tenses?", "options": [{"text": "The preterite is used only for -ar verbs; the imperfect for -er and -ir verbs.", "isCorrect": false, "rationale": "Both tenses are used with all verb types (-ar, -er, -ir). The difference is meaning: preterite = completed snapshot; imperfect = ongoing/background/habitual video."}, {"text": "The preterite describes a completed, finished event (a snapshot); the imperfect describes ongoing, habitual, or background actions (a video).", "isCorrect": true, "rationale": "The section describes it perfectly: 'The preterite is like a snapshot: something happened, it finished, it's done. The imperfect is more like a video playing in the background: describing how things were, what you used to do.'"}, {"text": "The preterite is formal; the imperfect is informal.", "isCorrect": false, "rationale": "Both tenses are used in all registers. The distinction is temporal meaning: completed (preterite) vs. ongoing/habitual/background (imperfect)."}, {"text": "The imperfect is used only in written Spanish; the preterite in spoken Spanish.", "isCorrect": false, "rationale": "Both tenses are used in both spoken and written Spanish. The distinction is meaning, not register."}]}, {"question": "What are the imperfect endings for -ar verbs (example: hablar)?", "options": [{"text": "-i, -ias, -ia, -iamos, -ian", "isCorrect": false, "rationale": "These are the -er/-ir imperfect endings. The -ar imperfect endings are: -aba, -abas, -aba, -abamos, -aban."}, {"text": "-aba, -abas, -aba, -abamos, -aban", "isCorrect": true, "rationale": "The -ar imperfect endings: -aba (yo), -abas (tu), -aba (el/ella), -abamos (nosotros, with accent!), -aban (ellos). Note yo and el/ella share the same form (-aba)."}, {"text": "-e, -aste, -o, -amos, -aron", "isCorrect": false, "rationale": "These are the -ar PRETERITE endings. The imperfect -ar endings are: -aba, -abas, -aba, -abamos, -aban."}, {"text": "-o, -as, -a, -amos, -an", "isCorrect": false, "rationale": "These are the present-tense -ar endings. The imperfect -ar endings are: -aba, -abas, -aba, -abamos, -aban."}]}, {"question": "Which of the following signal words strongly suggests the imperfect tense?", "options": [{"text": "ayer (yesterday)", "isCorrect": false, "rationale": "'Ayer' signals a specific completed action — it pairs with the preterite. 'Siempre' (always) is a signal word for the imperfect."}, {"text": "siempre (always) — indicating a habitual past action", "isCorrect": true, "rationale": "'Siempre' (always), 'todos los dias' (every day), 'cada' (each/every), 'de nino' (as a child) all signal the imperfect because they indicate habitual or ongoing past actions."}, {"text": "de repente (suddenly)", "isCorrect": false, "rationale": "'De repente' signals a sudden completed event — it pairs with the preterite. 'Siempre', 'todos los dias', 'cada' signal the imperfect."}, {"text": "anoche (last night)", "isCorrect": false, "rationale": "'Anoche' indicates a specific completed time — it pairs with the preterite. Habitual/ongoing time expressions like 'siempre' pair with the imperfect."}]}, {"question": "How many irregular verbs are there in the entire imperfect tense?", "options": [{"text": "None — all verbs are regular in the imperfect", "isCorrect": false, "rationale": "There are three irregular verbs in the imperfect: ser, ir, and ver."}, {"text": "Three: ser, ir, and ver", "isCorrect": true, "rationale": "The grammar box states: 'Good news: There are only three irregular verbs in the entire imperfect: ser, ir, and ver. Every other verb follows the patterns above — no exceptions!'"}, {"text": "Eight (the same eight as the irregular commands)", "isCorrect": false, "rationale": "There are only three irregulars in the imperfect: ser, ir, and ver. This is much better than the preterite!"}, {"text": "Twenty — the same verbs that are irregular in the present tense", "isCorrect": false, "rationale": "The imperfect is remarkably regular. Only three verbs are irregular: ser, ir, and ver. All stem-changing verbs are regular in the imperfect."}]}, {"question": "Jose Marti's poem 'Versos sencillos' has a famous connection to which song?", "options": [{"text": "La cucaracha", "isCorrect": false, "rationale": "'La cucaracha' is a Mexican corrido from the Revolution. Jose Marti's 'Versos sencillos' provided the lyrics to 'Guantanamera'."}, {"text": "Guantanamera — one of the most recognized songs in the world", "isCorrect": true, "rationale": "The song box states: 'Perhaps his greatest legacy to popular culture is this: the lyrics to Guantanamera, one of the most recognized songs in the world, were taken directly from these verses.'"}, {"text": "Dame la mano by Gabriela Mistral", "isCorrect": false, "rationale": "'Dame la mano' is a poem by Gabriela Mistral, not Garcia Marti. Marti's 'Versos sencillos' gave us the lyrics to 'Guantanamera'."}, {"text": "El barquito chiquitito", "isCorrect": false, "rationale": "'El barquito chiquitito' is a counting children's song with no connection to Marti. Marti's verses became the lyrics to 'Guantanamera'."}]}, {"question": "What does 'Cuando era nino, vivia en Mexico' illustrate about the imperfect?", "options": [{"text": "An action that happened once at a specific past moment", "isCorrect": false, "rationale": "A single specific past moment uses the preterite. 'Cuando era nino, vivia en Mexico' describes ongoing states — how things WERE over a period (childhood)."}, {"text": "Ongoing states in the past — describing how things were over a period of time", "isCorrect": true, "rationale": "Both 'era' (imperfect of ser) and 'vivia' (imperfect of vivir) describe ongoing, continuous states in the past — not single completed events. This is the imperfect's key use."}, {"text": "A future action expressed from a past perspective", "isCorrect": false, "rationale": "The sentence describes childhood states (past ongoing). It does not express a future action."}, {"text": "A habitual action that a person will repeat in the future", "isCorrect": false, "rationale": "The imperfect here describes past habits and states — not future repetitions."}]}, {"question": "What accent mark rule applies to -ar nosotros imperfect forms?", "options": [{"text": "No accent is needed on any -ar nosotros imperfect form", "isCorrect": false, "rationale": "An accent IS required. The nosotros -ar imperfect always carries an accent: hablABAmos, caminABAmos, estudiABAmos."}, {"text": "The nosotros form always has an accent on the a of -abamos: hablabamos", "isCorrect": true, "rationale": "The note states: 'The nosotros form of -ar verbs always carries an accent mark on the a: hablAbamos, caminAbamos, estudiAbamos. Without the accent, it would be a different word!'"}, {"text": "The accent is optional and depends on regional preference", "isCorrect": false, "rationale": "Spanish accent marks are never optional — they are required spelling. The -abamos ending always has an accent on the a."}, {"text": "The accent goes on the final -os: hablabamoS", "isCorrect": false, "rationale": "The accent goes on the a before -bamos: hablAbamos, not on the final -os."}]}, {"question": "What does 'Todos los dias, comiamos juntos' express?", "options": [{"text": "A single past event that happened on one specific day", "isCorrect": false, "rationale": "'Todos los dias' (every day) signals a habitual repeated action in the past — exactly what the imperfect expresses. Not a single event."}, {"text": "A habitual past action — something that happened every day in the past", "isCorrect": true, "rationale": "'Todos los dias' + imperfect (comiamos) = we used to eat together every day. This is a classic imperfect construction: habitual repeated actions in the past."}, {"text": "A future plan that will happen every day", "isCorrect": false, "rationale": "The imperfect is a past tense, not future. 'Comiamos' = we used to eat (past habit), not a future plan."}, {"text": "A command telling someone to eat every day", "isCorrect": false, "rationale": "'Comiamos' is an imperfect indicative form (we used to eat), not a command form."}]}, {"question": "What is the imperfect form for expressing age in the past? How do you say 'I was ten years old'?", "options": [{"text": "Fui diez anos. (preterite of ser)", "isCorrect": false, "rationale": "Fui is preterite. Age in the past uses the imperfect of tener: Tenia diez anos (I was ten years old — literally I had ten years)."}, {"text": "Tenia diez anos. (imperfect of tener)", "isCorrect": true, "rationale": "Age in Spanish uses tener (to have): 'Tengo diez anos' (I am ten). In the past, the imperfect is used: 'Tenia diez anos' (I was ten years old)."}, {"text": "Era de diez anos. (imperfect of ser)", "isCorrect": false, "rationale": "'Ser de' is not used for age. Spanish uses tener for age: tenia diez anos. Era is used for descriptions/identity, not age."}, {"text": "Estaba de diez anos. (imperfect of estar)", "isCorrect": false, "rationale": "Estar is not used for age. Spanish expresses age with tener: 'Tenia diez anos' = I was ten years old."}]}, {"question": "What is significant about Jose Marti, the poet featured in this chapter?", "options": [{"text": "He was the first Latin American woman to win the Nobel Prize in Literature.", "isCorrect": false, "rationale": "That distinction belongs to Gabriela Mistral. Jose Marti was Cuba's greatest national hero — poet, journalist, and revolutionary."}, {"text": "He was Cuba's greatest national hero — poet, journalist, and revolutionary — who died fighting for Cuban independence.", "isCorrect": true, "rationale": "The song box describes Jose Marti (1853-1895) as 'Cuba's greatest national hero — poet, journalist, revolutionary, and visionary... He died on the battlefield in 1895, just one year before the independence he had worked for all his life.'"}, {"text": "He was a Mexican priest who started the independence movement with the Grito de Independencia.", "isCorrect": false, "rationale": "That describes Miguel Hidalgo of Mexico. Jose Marti was Cuban."}, {"text": "He was a Colombian novelist who won the Nobel Prize in Literature in 1982.", "isCorrect": false, "rationale": "The 1982 Nobel Prize went to Gabriel Garcia Marquez. Jose Marti was a Cuban poet and revolutionary who died in 1895."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
