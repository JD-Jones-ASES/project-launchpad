<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 15, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do you form a regular affirmative tu command in Spanish?", "options": [{"text": "Use the yo form of the present tense", "isCorrect": false, "rationale": "The yo form is the starting point for the subjunctive, not affirmative tu commands. Regular tu commands use the el/ella present-tense form."}, {"text": "Use the el/ella/Ud. present-tense form of the verb", "isCorrect": true, "rationale": "The rule is simple: the affirmative tu command equals the el/ella/Ud. present-tense form. Habla! comes from el habla; Come! from el come."}, {"text": "Drop the -ar/-er/-ir ending and add -a", "isCorrect": false, "rationale": "This is not the rule for affirmative tu commands. The correct rule is to use the el/ella present-tense form as the command."}, {"text": "Use the infinitive form of the verb", "isCorrect": false, "rationale": "Infinitives are not used as commands. Regular affirmative tu commands use the el/ella present-tense form."}]}, {"question": "What is the affirmative tu command for 'hablar' (to speak)?", "options": [{"text": "hablas", "isCorrect": false, "rationale": "Hablas is the tu present-tense form. The command is the el/ella form: Habla!"}, {"text": "hablar", "isCorrect": false, "rationale": "Hablar is the infinitive. The tu command uses the el/ella form: Habla!"}, {"text": "hable", "isCorrect": false, "rationale": "Hable is a formal (usted) command or subjunctive form. The informal tu command for hablar is Habla!"}, {"text": "habla", "isCorrect": true, "rationale": "Habla is the el/ella present-tense form of hablar, and therefore the correct affirmative tu command."}]}, {"question": "In Spanish writing, what punctuation is required with commands?", "options": [{"text": "A period at the end only", "isCorrect": false, "rationale": "Commands use exclamation marks, not periods. Spanish requires an inverted exclamation mark at the beginning and a regular one at the end."}, {"text": "An inverted exclamation mark at the beginning and a regular exclamation mark at the end", "isCorrect": true, "rationale": "Spanish requires opening and closing exclamation marks: iHabla! This is a required punctuation rule in Spanish writing."}, {"text": "A question mark at the beginning only", "isCorrect": false, "rationale": "Question marks (inverted and regular) are for questions. Commands require exclamation marks at both ends: iHabla!"}, {"text": "No special punctuation is needed", "isCorrect": false, "rationale": "Spanish requires the inverted exclamation mark (i) at the start and the regular (!) at the end of written commands."}]}, {"question": "What does 'lavar los platos' mean in the context of household chores?", "options": [{"text": "To sweep the floor", "isCorrect": false, "rationale": "Sweeping the floor would be 'barrer el suelo'. 'Lavar los platos' means to wash the dishes."}, {"text": "To set the table", "isCorrect": false, "rationale": "Setting the table is 'poner la mesa'. 'Lavar los platos' means to wash the dishes."}, {"text": "To wash the dishes", "isCorrect": true, "rationale": "'Lavar' means to wash, and 'los platos' means the dishes/plates. Together: to wash the dishes."}, {"text": "To take out the trash", "isCorrect": false, "rationale": "Taking out the trash would be 'sacar la basura'. 'Lavar los platos' means to wash the dishes."}]}, {"question": "Why should you never add 'tu' to a command in Spanish?", "options": [{"text": "Because commands can only be given to plural groups", "isCorrect": false, "rationale": "Tu commands are indeed directed at one person (singular). The reason not to add 'tu' is that it sounds unnatural and even rude."}, {"text": "Because adding 'tu' to a command sounds unnatural and rude — the command form already implies 'you'", "isCorrect": true, "rationale": "The grammar note states: 'In English we say You, speak! but in Spanish you never add tu to a command. Just say Habla! Adding tu makes it sound unnatural and even rude.'"}, {"text": "Because 'tu' is only used with questions, not commands", "isCorrect": false, "rationale": "Tu can appear in statements and questions, but it is not added to commands because the command form itself already addresses the listener."}, {"text": "Because commands always require the usted form", "isCorrect": false, "rationale": "Tu commands address informal singular 'you'. The issue is simply that adding the pronoun 'tu' to an affirmative command sounds awkward and rude."}]}, {"question": "What is the command form of 'comer' (to eat)?", "options": [{"text": "comas", "isCorrect": false, "rationale": "Comas is a subjunctive form used in negative commands or after trigger expressions. The affirmative tu command for comer is Come!"}, {"text": "come", "isCorrect": true, "rationale": "The el/ella present-tense form of comer is 'come', which is also the affirmative tu command: iCome! (Eat!)"}, {"text": "comer", "isCorrect": false, "rationale": "Comer is the infinitive. The affirmative tu command uses the el/ella form: Come!"}, {"text": "como", "isCorrect": false, "rationale": "Como is the yo present-tense form. The tu command uses the el/ella form: Come!"}]}, {"question": "Which of these is a household chore vocabulary word from the chapter?", "options": [{"text": "el zapato", "isCorrect": false, "rationale": "El zapato (shoe) is clothing vocabulary. Household chore vocabulary includes words like barrer, lavar, and poner la mesa."}, {"text": "barrer el suelo", "isCorrect": true, "rationale": "Barrer el suelo (to sweep the floor) is listed in the household chore vocabulary. These are the kinds of commands you hear at home."}, {"text": "el mercado", "isCorrect": false, "rationale": "El mercado (market) is city/shopping vocabulary. Household chore vocabulary includes barrer, lavar, and similar verbs."}, {"text": "la camisa", "isCorrect": false, "rationale": "La camisa (shirt) is clothing vocabulary. Household chores include barrer el suelo, lavar los platos, etc."}]}, {"question": "What is the affirmative tu command for 'escribir' (to write)?", "options": [{"text": "escriba", "isCorrect": false, "rationale": "Escriba is the formal usted command. The informal tu command for escribir is Escribe!"}, {"text": "escribe", "isCorrect": true, "rationale": "The el/ella present-tense form of escribir is 'escribe', and that is the affirmative tu command: iEscribe! (Write!)"}, {"text": "escribas", "isCorrect": false, "rationale": "Escribas is a subjunctive/negative command form. The affirmative tu command is Escribe!"}, {"text": "escribir", "isCorrect": false, "rationale": "Escribir is the infinitive. The tu command uses the el/ella present form: Escribe!"}]}, {"question": "Which cultural note is connected to Chapter 15's section on household chores and commands?", "options": [{"text": "Bolivian market culture and bargaining", "isCorrect": false, "rationale": "Bolivian market culture was covered in Chapter 13. Chapter 15 connects commands and household chores to Venezuelan family culture."}, {"text": "Venezuelan family culture, where children help with chores from an early age", "isCorrect": true, "rationale": "The culture box describes Venezuelan family life, where children are expected to help with household chores from an early age as a way to contribute and learn responsibility."}, {"text": "Mexican muralism and art", "isCorrect": false, "rationale": "Mexican muralism is featured in Chapter 18. Chapter 15's culture box focuses on Venezuelan family life and household routines."}, {"text": "Latin American independence movements", "isCorrect": false, "rationale": "Independence movements are covered in Chapter 17. Chapter 15 highlights Venezuelan family culture."}]}, {"question": "What does the command 'iLava los platos despues de cenar!' mean?", "options": [{"text": "Wash the dishes before dinner!", "isCorrect": false, "rationale": "'Despues de cenar' means after dinner, not before. The command says to wash the dishes after dinner."}, {"text": "Wash the dishes after dinner!", "isCorrect": true, "rationale": "'Lava' is the tu command for lavar (to wash). 'Los platos' = the dishes. 'Despues de cenar' = after dinner. Full meaning: Wash the dishes after dinner!"}, {"text": "Cook the dishes after dinner!", "isCorrect": false, "rationale": "'Lava' means wash, not cook. Cocinar means to cook. The command says to wash the dishes after dinner."}, {"text": "Dry the dishes before dinner!", "isCorrect": false, "rationale": "The command is about washing (lavar), not drying. And 'despues de cenar' means after dinner, not before."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
