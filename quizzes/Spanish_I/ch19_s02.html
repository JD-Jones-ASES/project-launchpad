        <div class="subtitle">Encountering Spanish &mdash; Chapter 19, Section 2</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do you say 'I want to be a doctor' in Spanish? What is the key grammar rule?", "options": [{"text": "Quiero ser un medico. — you always use an article with professions.", "isCorrect": false, "rationale": "After quiero ser (and other ser + profession constructions), you do NOT use an article. The correct form is: Quiero ser medico (not un medico)."}, {"text": "Quiero ser medico. — no article is used after ser + profession.", "isCorrect": true, "rationale": "The key grammar rule: 'Quiero ser + profesion — and notice that you do not use an article: Quiero ser medico, not Quiero ser un medico.' This is different from English."}, {"text": "Quiero a ser medico. — use 'a' before professions.", "isCorrect": false, "rationale": "The personal 'a' is used before specific persons as direct objects, not before professions. Quiero ser medico (no 'a')."}, {"text": "Quiero estoy medico. — estar is used for professions.", "isCorrect": false, "rationale": "Professions use ser, not estar. And the construction is ser + profession (not estoy + profession). Quiero ser medico."}], "id": "q01"}, {"question": "What is special about the word 'la policia' regarding gender?", "options": [{"text": "It is always masculine, even for female officers.", "isCorrect": false, "rationale": "Policia is not always masculine. It uses different articles: el policia (male officer), la policia (female officer or the institution)."}, {"text": "The same form is used for both male and female, and only the article changes.", "isCorrect": true, "rationale": "The note explains: 'Policia is one of a group of Spanish nouns that use the same form for both masculine and feminine. Only the article changes: el policia (male officer) and la policia (female officer / the police as institution).'"}, {"text": "It is always feminine because policia ends in -a.", "isCorrect": false, "rationale": "While most -a nouns are feminine, policia can be either masculine or feminine depending on context. El policia = male officer; la policia = female officer or the institution."}, {"text": "You must add -o to make it masculine: el policiao.", "isCorrect": false, "rationale": "No -o is added. Policia keeps the same form; only the article changes: el policia (male), la policia (female/institution)."}], "id": "q02"}, {"question": "Which profession does Gabriel Garcia Marquez represent?", "options": [{"text": "Medico (doctor)", "isCorrect": false, "rationale": "Garcia Marquez was not a doctor. He was a writer — one of the greatest novelists of the 20th century, winner of the Nobel Prize in Literature in 1982."}, {"text": "Escritor (writer)", "isCorrect": true, "rationale": "Gabriel Garcia Marquez (Colombia, 1927-2014) was an escritor — one of the greatest novelists of the 20th century, winner of the Nobel Prize in Literature in 1982. His novel 'Cien anos de soledad' was translated into 46+ languages."}, {"text": "Cientifico (scientist)", "isCorrect": false, "rationale": "The scientist in the culture box is Luis Federico Leloir. Garcia Marquez was a writer/novelist."}, {"text": "Periodista (journalist)", "isCorrect": false, "rationale": "Garcia Marquez did work as a journalist before becoming famous as a novelist. But his primary professional identity celebrated in the culture box is as an escritor (writer)."}], "id": "q03"}, {"question": "What does 'la enfermera' mean?", "options": [{"text": "The female doctor", "isCorrect": false, "rationale": "The female doctor is 'la doctora' or 'la medica'. 'La enfermera' means the nurse (female)."}, {"text": "The female nurse", "isCorrect": true, "rationale": "'La enfermera' is the female nurse. 'El enfermero' is the male nurse. Cuidar (to take care of) is associated with this profession in the chapter."}, {"text": "The hospital administrator", "isCorrect": false, "rationale": "There is no specific word for hospital administrator in this section. La enfermera specifically means the (female) nurse."}, {"text": "The pharmacist", "isCorrect": false, "rationale": "A pharmacist is 'el/la farmaceutico/a'. 'La enfermera' means the nurse."}], "id": "q04"}, {"question": "Who was Sonia Sotomayor and what historic milestone did she achieve?", "options": [{"text": "A Mexican-American singer who became the first Latina to win a Grammy", "isCorrect": false, "rationale": "Sonia Sotomayor is a lawyer and judge, not a singer. She became the first Latina Justice of the US Supreme Court."}, {"text": "The first Latina Justice of the United States Supreme Court (2009), born to Puerto Rican parents", "isCorrect": true, "rationale": "The culture box notes: 'Sonia Sotomayor became the first Latina Justice of the United States Supreme Court in 2009. She was born in the Bronx, New York, to Puerto Rican parents. She is a distinguished abogada and judge.'"}, {"text": "A Colombian novelist who won the Nobel Prize in Literature", "isCorrect": false, "rationale": "The Colombian Nobel Prize winner in Literature was Gabriel Garcia Marquez. Sonia Sotomayor is a Puerto Rican-American Supreme Court Justice."}, {"text": "The first female president of a Latin American country", "isCorrect": false, "rationale": "Sotomayor became a US Supreme Court Justice, not a Latin American president. She represents the legal profession (abogada/judge)."}], "id": "q05"}, {"question": "What does 'construir' mean, and what spelling note applies to it?", "options": [{"text": "To destroy; it is completely regular", "isCorrect": false, "rationale": "To destroy is 'destruir'. 'Construir' means to build or to construct, and it does have a spelling note."}, {"text": "To build/construct; verbs ending in -uir add a y in several forms", "isCorrect": true, "rationale": "The note states: 'Construir (to build/construct). Verbs ending in -uir add a y in several present-tense forms and in the third-person preterite (construyo, construyeron).'"}, {"text": "To design; it follows the pattern of -ar verbs", "isCorrect": false, "rationale": "To design is 'disentar' or 'dibujar'. 'Construir' means to build and is a -uir verb with special y-insertion."}, {"text": "To fly; it has the same irregularity as ir", "isCorrect": false, "rationale": "To fly is 'volar'. 'Construir' means to build, and its irregularity involves adding y in certain forms (not sharing forms with ir)."}], "id": "q06"}, {"question": "What is the memory technique recommended for learning profession vocabulary?", "options": [{"text": "Memorizing the list of professions alphabetically", "isCorrect": false, "rationale": "Alphabetical memorization is not the recommended technique. The tip suggests linking each profession to a vivid real person you know or admire."}, {"text": "Linking each profession to a vivid real or famous person you can picture", "isCorrect": true, "rationale": "The memory tip: 'link each profession to a real person you know or a famous person you admire... When you see the Spanish word on a quiz, let your brain travel to the person's face. Your brain remembers people much better than abstract labels.'"}, {"text": "Drawing pictures of each profession and labeling them in Spanish", "isCorrect": false, "rationale": "Drawing is not the specific technique described. The tip focuses on linking words to vivid human faces — real or famous people."}, {"text": "Learning all professions that end in -or first, then -ero, then others", "isCorrect": false, "rationale": "Grouping by ending is not the recommended technique. The tip suggests associating each profession with a memorable person."}], "id": "q07"}, {"question": "What does 'el/la periodista' mean?", "options": [{"text": "The scientist", "isCorrect": false, "rationale": "The scientist is 'el/la cientifico/a'. 'El/la periodista' means the journalist."}, {"text": "The journalist", "isCorrect": true, "rationale": "'El/la periodista' means the journalist. Like policia and artista, periodista uses the same form for both genders — only the article changes."}, {"text": "The judge", "isCorrect": false, "rationale": "The judge is 'el/la juez'. 'El/la periodista' means the journalist."}, {"text": "The politician", "isCorrect": false, "rationale": "A politician is 'el/la politico/a'. 'El/la periodista' means the journalist."}], "id": "q08"}, {"question": "What is the song 'Fray Felipe' / 'Martinillo' adapted from?", "options": [{"text": "A Venezuelan lullaby about a sleeping shepherd", "isCorrect": false, "rationale": "Martinillo is not a Venezuelan lullaby. It is the Spanish version of the French song Frere Jacques."}, {"text": "The French song 'Frere Jacques' (Are You Sleeping?)", "isCorrect": true, "rationale": "The song box states: 'Martinillo — sometimes called Fray Felipe in Latin America — is the Spanish version of the beloved French song Frere Jacques (also known in English as Are You Sleeping?).'"}, {"text": "An original Mexican children's song with no foreign equivalent", "isCorrect": false, "rationale": "The song is not original — it is a Spanish adaptation of the French Frere Jacques."}, {"text": "An Inca chant adapted into Spanish during the colonial period", "isCorrect": false, "rationale": "The song's origin is French (Frere Jacques), not Inca. It was adapted into Spanish and spread across Latin America."}], "id": "q09"}, {"question": "What is Lionel Messi known for, according to the culture box?", "options": [{"text": "Being Argentina's first Nobel Prize winner in chemistry", "isCorrect": false, "rationale": "The Nobel Prize in Chemistry from Argentina goes to Luis Federico Leloir. Messi is famous as a soccer player."}, {"text": "Being widely considered the greatest soccer player of his generation, and winning the FIFA World Cup with Argentina in 2022", "isCorrect": true, "rationale": "The culture box describes Lionel Messi (Argentina, 1987-) as 'widely considered the greatest soccer player of his generation — possibly of all time' who 'won the FIFA World Cup with Argentina in 2022.'"}, {"text": "Being Argentina's most famous muralist painter", "isCorrect": false, "rationale": "Messi is a soccer player (atleta), not a painter. The muralists are connected to Mexico."}, {"text": "Being the first Argentine to play professional soccer in Europe", "isCorrect": false, "rationale": "The culture box does not say he was the first Argentine in European soccer. It highlights him as widely considered the greatest soccer player of his generation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
