<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the initial step when conjugating a regular -ar verb in Spanish?", "options": [{"text": "Add the ending that matches the subject.", "isCorrect": false, "rationale": "This is the second step, after finding the stem."}, {"text": "Remove the -ar ending to find the stem.", "isCorrect": true, "rationale": "According to the text, 'Step 1: Find the stem — remove -ar from the infinitive.'"}, {"text": "Change the stem to match the subject.", "isCorrect": false, "rationale": "The text explicitly states that 'the stem ... stays the same' and 'never changes'."}, {"text": "Identify whether the verb is irregular.", "isCorrect": false, "rationale": "This section specifically deals with *regular* -ar verbs, assuming they follow the pattern."}]}, {"question": "According to the text, what is the primary purpose of changing the ending of a regular -ar verb?", "options": [{"text": "To indicate the time of the action (e.g., past, present, future).", "isCorrect": false, "rationale": "While verb endings can indicate tense, the text specifically highlights showing *who* is doing the action for these regular present tense conjugations."}, {"text": "To show who is performing the action.", "isCorrect": true, "rationale": "The text states: 'Only the ending changes to show who is doing the action.'"}, {"text": "To make the verb sound more formal or informal.", "isCorrect": false, "rationale": "Formality is more related to subject pronouns (tú/usted) rather than the inherent function of the ending changing in the pattern."}, {"text": "To change the core meaning of the verb.", "isCorrect": false, "rationale": "The core meaning of the verb (e.g., 'to speak' for 'hablar') remains constant; the ending clarifies the subject."}]}, {"question": "Which statement accurately describes the use of 'vosotros' and 'ustedes' in Latin American Spanish, according to the text?", "options": [{"text": "'Vosotros' is used for formal groups, while 'ustedes' is for informal groups.", "isCorrect": false, "rationale": "This is incorrect; 'vosotros' is not used in Latin American Spanish as per the text."}, {"text": "'Vosotros' is used for all groups of two or more people.", "isCorrect": false, "rationale": "This is incorrect; 'vosotros' is not used in Latin American Spanish."}, {"text": "'Ustedes' is used for all groups of two or more people, both formal and informal, and 'vosotros' is not used.", "isCorrect": true, "rationale": "The text explicitly states: 'We do not use vosotros in Latin American Spanish. Ustedes is used for all groups of two or more people (both formal and informal).'"}, {"text": "Both 'vosotros' and 'ustedes' are used interchangeably for groups of people.", "isCorrect": false, "rationale": "This is incorrect; 'vosotros' is not used in Latin American Spanish, and 'ustedes' serves the function for all groups."}]}, {"question": "How would you correctly conjugate the verb 'caminar' (to walk) for the subject 'yo' (I)?", "options": [{"text": "yo camina", "isCorrect": false, "rationale": "This is the conjugation for 'él/ella/usted'."}, {"text": "yo caminas", "isCorrect": false, "rationale": "This is the conjugation for 'tú'."}, {"text": "yo camino", "isCorrect": true, "rationale": "To conjugate, remove '-ar' to get the stem 'camin-' and add the 'yo' ending '-o', resulting in 'camino'."}, {"text": "yo caminamos", "isCorrect": false, "rationale": "This is the conjugation for 'nosotros/nosotras'."}]}, {"question": "Based on the model verb 'hablar,' what holds true for the stem of a regular -ar verb during conjugation?", "options": [{"text": "The stem changes to reflect whether the subject is singular or plural.", "isCorrect": false, "rationale": "The text explicitly states: 'Notice: the stem habl- never changes.'"}, {"text": "The stem only changes when the subject is 'vosotros.'", "isCorrect": false, "rationale": "The stem 'never changes' for regular -ar verbs, regardless of the subject."}, {"text": "The stem remains consistent in all conjugated forms.", "isCorrect": true, "rationale": "The text highlights this by saying 'the stem habl- never changes. Only the colored ending changes.'"}, {"text": "The stem is only found in the infinitive form, not the conjugated forms.", "isCorrect": false, "rationale": "The stem is the unchanging base to which different endings are added for conjugation."}]}, {"question": "Which ending would you add to the stem of a regular -ar verb to conjugate it for 'nosotros/nosotras' (we)?", "options": [{"text": "-o", "isCorrect": false, "rationale": "The '-o' ending is for the 'yo' (I) subject."}, {"text": "-as", "isCorrect": false, "rationale": "The '-as' ending is for the 'tú' (you, informal singular) subject."}, {"text": "-amos", "isCorrect": true, "rationale": "According to the conjugation rules provided, '-amos' is the correct ending for 'nosotros/nosotras'."}, {"text": "-an", "isCorrect": false, "rationale": "The '-an' ending is for the 'ellos/ellas/ustedes' (they/you all) subjects."}]}, {"question": "Considering the '¡Cuidado con estudiar!' note, which is the correct conjugation for 'yo' and why?", "options": [{"text": "yo estud-o, because the 'i' is part of the ending.", "isCorrect": false, "rationale": "The note explicitly states that 'estudiar has the stem estudi-' and warns against dropping the 'i'."}, {"text": "yo estudi-o, because the 'i' is part of the stem and should be pronounced clearly.", "isCorrect": true, "rationale": "The text states: 'Estudiar has the stem estudi- — that final i is part of the stem... Say all the vowels clearly: es-TU-di-o — four syllables. Don't drop that i!'"}, {"text": "yo estudia, because the 'i' blends into the 'a' ending.", "isCorrect": false, "rationale": "This is the 'él/ella/usted' form, and the 'i' should be pronounced as a distinct syllable, not blended."}, {"text": "yo estudias, because it emphasizes the stem.", "isCorrect": false, "rationale": "This is the 'tú' form, and the reasoning is incorrect regarding stem emphasis in this context."}]}, {"question": "The text states, 'Learn the pattern once, and you can use all of them!' This implies that:", "options": [{"text": "All Spanish verbs, regardless of their infinitive ending, follow this pattern.", "isCorrect": false, "rationale": "The text specifically refers to 'hundreds of -ar verbs,' not all Spanish verbs which include -er and -ir verbs as well."}, {"text": "Only a few select -ar verbs follow this pattern, requiring memorization for others.", "isCorrect": false, "rationale": "The text mentions 'hundreds of -ar verbs, and most of them follow the exact same pattern,' implying wide applicability, not just a few."}, {"text": "Understanding this single pattern allows you to conjugate a vast number of regular -ar verbs correctly.", "isCorrect": true, "rationale": "This statement directly reflects the core benefit described: mastering one pattern unlocks conjugation for many verbs."}, {"text": "The pattern changes slightly depending on the verb's meaning.", "isCorrect": false, "rationale": "The text emphasizes the consistency of the pattern for regular -ar verbs, regardless of meaning."}]}, {"question": "What is the stem of the verb 'trabajar' (to work)?", "options": [{"text": "trabajar", "isCorrect": false, "rationale": "This is the infinitive form of the verb, not its stem."}, {"text": "trabaja", "isCorrect": false, "rationale": "This is a conjugated form (él/ella/usted), not the stem."}, {"text": "trabaj-", "isCorrect": true, "rationale": "To find the stem, you remove the -ar ending from the infinitive, leaving 'trabaj-'."}, {"text": "tra", "isCorrect": false, "rationale": "This is an incomplete part of the verb; the stem is everything before the -ar ending."}]}, {"question": "When conjugating 'trabajar' for 'yo,' the note in '¡Cuidado con estudiar!' emphasizes:", "options": [{"text": "Dropping the 'j' sound for a softer pronunciation.", "isCorrect": false, "rationale": "The note explicitly states 'the j sound in trabajar stays strong in all forms'."}, {"text": "Pronouncing the 'j' sound strongly in all forms.", "isCorrect": true, "rationale": "The note advises: 'yo trabaj-o (not yo trabag-o) — the j sound in trabajar stays strong in all forms.'"}, {"text": "Changing 'j' to 'g' in some conjugations.", "isCorrect": false, "rationale": "The note warns *against* changing 'j' to 'g' ('not yo trabag-o')."}, {"text": "Only the 'a' sound changes, not the consonants.", "isCorrect": false, "rationale": "The emphasis of the note is specifically on maintaining the strong 'j' sound, which is a consonant."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
