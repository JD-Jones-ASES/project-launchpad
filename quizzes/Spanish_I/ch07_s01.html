<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the correct yo form of the verb 'comer' in the present tense?", "options": [{"text": "comes", "isCorrect": false, "rationale": "This is the tú form of comer, not the yo form."}, {"text": "como", "isCorrect": true, "rationale": "The yo form of -er verbs uses the ending -o: comer → com- + o = como."}, {"text": "come", "isCorrect": false, "rationale": "This is the él/ella form of comer, not the yo form."}, {"text": "comemos", "isCorrect": false, "rationale": "This is the nosotros form of comer, not the yo form."}], "id": "q01"}, {"question": "Which set of endings correctly completes the present-tense conjugation of regular -er verbs?", "options": [{"text": "-o, -as, -a, -amos, -an", "isCorrect": false, "rationale": "These are the endings for -ar verbs, not -er verbs."}, {"text": "-o, -es, -e, -emos, -en", "isCorrect": true, "rationale": "Regular -er verbs use these endings: the vowel 'a' from -ar verbs is replaced with 'e'."}, {"text": "-o, -es, -e, -imos, -en", "isCorrect": false, "rationale": "The nosotros form -imos belongs to -ir verbs, not -er verbs."}, {"text": "-oy, -es, -e, -emos, -en", "isCorrect": false, "rationale": "The yo form -oy is only used in special irregular verbs like soy and doy."}], "id": "q02"}, {"question": "How do you say 'She drinks water in the morning' in Spanish?", "options": [{"text": "Ella beben agua por la mañana.", "isCorrect": false, "rationale": "Beben is the ellos/ellas form; the correct form for ella is bebe."}, {"text": "Ella bebe agua por la mañana.", "isCorrect": true, "rationale": "The ella form of beber is bebe (beb- + e). Por la mañana means in the morning."}, {"text": "Ella bebo agua por la mañana.", "isCorrect": false, "rationale": "Bebo is the yo form; for ella the ending is -e, giving bebe."}, {"text": "Ella bebes agua por la mañana.", "isCorrect": false, "rationale": "Bebes is the tú form; for ella the ending is -e, giving bebe."}], "id": "q03"}, {"question": "What does 'comer' specifically refer to in many parts of Latin America?", "options": [{"text": "Any quick snack eaten at any time", "isCorrect": false, "rationale": "For a light snack, people often use la merienda or comer algo, not comer alone."}, {"text": "Only breakfast foods", "isCorrect": false, "rationale": "Comer refers to the main meal, not specifically breakfast."}, {"text": "The main, most important meal of the day, usually at midday", "isCorrect": true, "rationale": "In many parts of Latin America, comer specifically refers to eating the main meal of the day, usually at midday. ¡Vamos a comer! is an invitation to this important meal."}, {"text": "Eating dinner late at night", "isCorrect": false, "rationale": "While late dinners are common in some countries, comer typically refers to the main midday meal across much of Latin America."}], "id": "q04"}, {"question": "Choose the correct sentence: 'We read interesting books at night.'", "options": [{"text": "Nosotros leen libros interesantes por la noche.", "isCorrect": false, "rationale": "Leen is the ellos form; the nosotros form of leer is leemos."}, {"text": "Nosotros leo libros interesantes por la noche.", "isCorrect": false, "rationale": "Leo is the yo form; the nosotros form of leer is leemos."}, {"text": "Nosotros leemos libros interesantes por la noche.", "isCorrect": true, "rationale": "The nosotros form of leer is leemos (le- + emos). Por la noche means at night."}, {"text": "Nosotros lees libros interesantes por la noche.", "isCorrect": false, "rationale": "Lees is the tú form; the nosotros form of leer is leemos."}], "id": "q05"}, {"question": "What is the key difference between -ar and -er verb endings in the present tense?", "options": [{"text": "The -er verbs are completely different from -ar verbs.", "isCorrect": false, "rationale": "-er verbs are very similar to -ar verbs; the yo form (-o) is actually the same."}, {"text": "The -er endings swap the 'a' vowel for an 'e' vowel (except the yo form).", "isCorrect": true, "rationale": "The -er endings change a to e: -o stays, -as → -es, -a → -e, -amos → -emos, -an → -en."}, {"text": "The -er verbs add 'ie' to the stem.", "isCorrect": false, "rationale": "Adding ie describes stem-changing verbs, not regular -er verb endings."}, {"text": "The yo form for -er verbs ends in -oy.", "isCorrect": false, "rationale": "The yo form for -er verbs ends in -o (como, bebo, leo), just like -ar verbs."}], "id": "q06"}, {"question": "Which of the following is a common regular -er verb in Spanish?", "options": [{"text": "hablar", "isCorrect": false, "rationale": "Hablar ends in -ar, making it a regular -ar verb, not a -er verb."}, {"text": "vivir", "isCorrect": false, "rationale": "Vivir ends in -ir, making it a regular -ir verb, not a -er verb."}, {"text": "correr", "isCorrect": true, "rationale": "Correr (to run) ends in -er and is a common regular -er verb used in daily life."}, {"text": "tener", "isCorrect": false, "rationale": "Tener ends in -er but is irregular (yo form = tengo), so it is not a regular -er verb."}], "id": "q07"}, {"question": "How would you say 'The students run in the street' in Spanish?", "options": [{"text": "Los estudiantes corre en la calle.", "isCorrect": false, "rationale": "Corre is the él/ella form; for los estudiantes (plural), use corren."}, {"text": "Los estudiantes corremos en la calle.", "isCorrect": false, "rationale": "Corremos is the nosotros form; for los estudiantes (third-person plural), use corren."}, {"text": "Los estudiantes corren en la calle.", "isCorrect": true, "rationale": "The ellos/ellas form of correr is corren (corr- + en), used for third-person plural subjects."}, {"text": "Los estudiantes corres en la calle.", "isCorrect": false, "rationale": "Corres is the tú form; for los estudiantes (third-person plural), use corren."}], "id": "q08"}, {"question": "What is the tú form of 'aprender' (to learn)?", "options": [{"text": "aprendo", "isCorrect": false, "rationale": "Aprendo is the yo form of aprender."}, {"text": "aprende", "isCorrect": false, "rationale": "Aprende is the él/ella form of aprender."}, {"text": "aprendes", "isCorrect": true, "rationale": "The tú form of -er verbs uses the ending -es: aprender → aprend- + es = aprendes."}, {"text": "aprendemos", "isCorrect": false, "rationale": "Aprendemos is the nosotros form of aprender."}], "id": "q09"}, {"question": "Which sentence correctly uses a -er verb to describe daily life?", "options": [{"text": "Yo como cereal por la mañana.", "isCorrect": true, "rationale": "Comer is a regular -er verb; the yo form como is correct and means I eat cereal in the morning."}, {"text": "Yo coma cereal por la mañana.", "isCorrect": false, "rationale": "Coma is a subjunctive form, not the present indicative yo form. The correct yo form is como."}, {"text": "Yo comemos cereal por la mañana.", "isCorrect": false, "rationale": "Comemos is the nosotros form; for yo the form is como."}, {"text": "Yo comen cereal por la mañana.", "isCorrect": false, "rationale": "Comen is the ellos form; for yo the form is como."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
