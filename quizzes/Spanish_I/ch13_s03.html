<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 13, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do you ask 'How much does it cost?' in Spanish?", "options": [{"text": "¿Cuánto cuesta?", "isCorrect": true, "rationale": "'¿Cuánto cuesta?' is the standard way to ask the price. 'cuánto' = how much, 'cuesta' = it costs (from costar)."}, {"text": "¿Cuánto vale?", "isCorrect": false, "rationale": "'¿Cuánto vale?' also means 'how much is it worth/how much does it cost?' but the chapter teaches '¿Cuánto cuesta?' as the primary phrase."}, {"text": "¿Qué precio es?", "isCorrect": false, "rationale": "The standard phrase is '¿Cuánto cuesta?' The phrase '¿Qué precio tiene?' is possible but '¿Cuánto cuesta?' is taught here."}, {"text": "¿Cuántos pesos?", "isCorrect": false, "rationale": "This is incomplete. The standard phrase is '¿Cuánto cuesta?' (How much does it cost?)."}]}, {"question": "In the market dialogue, Ana is shopping in La Paz, Bolivia. What is she looking for?", "options": [{"text": "A shirt (una camisa)", "isCorrect": true, "rationale": "The dialogue sets the scene: 'Ana is shopping at an open-air market in La Paz, Bolivia. She is looking for a shirt.'"}, {"text": "A poncho", "isCorrect": false, "rationale": "The poncho appears in the Otavalo (Ecuador) reading. In the La Paz dialogue, Ana is looking for a shirt."}, {"text": "A gift for her mother", "isCorrect": false, "rationale": "The gift example appeared in section 2. In this dialogue, Ana is looking for a shirt for herself."}, {"text": "Shoes (los zapatos)", "isCorrect": false, "rationale": "Ana is looking for a shirt (camisa), not shoes."}]}, {"question": "What does 'me la llevo' mean in a shopping context?", "options": [{"text": "I'll take it (I'm buying it)", "isCorrect": true, "rationale": "'Me la llevo' = 'I'll take it' — using 'la' as a direct object pronoun for a feminine noun (like la camisa). It means you are purchasing the item."}, {"text": "I'm bringing it back", "isCorrect": false, "rationale": "'Devolver' means to return an item. 'Me la llevo' means I'll take it / I'm buying it."}, {"text": "Show it to me", "isCorrect": false, "rationale": "'Muéstremelo' or 'Muéstramelo' would mean show it to me. 'Me la llevo' = I'll take it."}, {"text": "It fits me", "isCorrect": false, "rationale": "'Me queda bien' means it fits me. 'Me la llevo' means I'll take/buy it."}]}, {"question": "What does '¿En qué le puedo ayudar?' mean?", "options": [{"text": "How can I help you?", "isCorrect": true, "rationale": "'¿En qué le puedo ayudar?' is a formal way a store clerk says 'How can I help you?' — common in shops across Latin America."}, {"text": "Can I show you something?", "isCorrect": false, "rationale": "'¿Le puedo mostrar algo?' would mean 'Can I show you something?' '¿En qué le puedo ayudar?' = How can I help you?"}, {"text": "Are you looking for anything?", "isCorrect": false, "rationale": "'¿Busca algo?' would mean 'Are you looking for something?' The phrase given = How can I help you?"}, {"text": "Do you have a question?", "isCorrect": false, "rationale": "'¿Tiene una pregunta?' = Do you have a question? '¿En qué le puedo ayudar?' = How can I help you?"}]}, {"question": "In the shopping activity, you have 500 pesos to spend. You buy a shirt for 180 pesos. How do you express this in Spanish with a direct object pronoun?", "options": [{"text": "Compro la camisa. La compro por ciento ochenta pesos.", "isCorrect": true, "rationale": "This matches the model: 'Compro la camisa. La compro por ciento ochenta pesos.' — using 'la' to replace 'la camisa' (feminine singular)."}, {"text": "Compro la camisa. Lo compro por ciento ochenta pesos.", "isCorrect": false, "rationale": "'la camisa' is feminine, so the pronoun is 'la,' not 'lo.'"}, {"text": "La compro la camisa por ciento ochenta pesos.", "isCorrect": false, "rationale": "When the noun is stated, you don't also add the pronoun. Either 'Compro la camisa' OR 'La compro' — not both in the same clause."}, {"text": "Compro la camisa. Ciento ochenta pesos la compro.", "isCorrect": false, "rationale": "The direct object pronoun goes before the verb: 'La compro.' The price phrase at the end is acceptable: 'La compro por ciento ochenta pesos.'"}]}, {"question": "What does 'aquí la tiene' mean in the shopping dialogue?", "options": [{"text": "Here it is (here you have it)", "isCorrect": true, "rationale": "'aquí la tiene' is a polite way a vendor says 'here it is' or 'here you go' when handing something to a customer."}, {"text": "Do you have it here?", "isCorrect": false, "rationale": "This would be a question. 'Aquí la tiene' is a statement: the vendor is presenting the item."}, {"text": "Take it here", "isCorrect": false, "rationale": "This sounds like a command. 'Aquí la tiene' is polite phrasing meaning 'here it is (for you).'"}, {"text": "Here is your change", "isCorrect": false, "rationale": "'Su cambio' refers to change (money). 'Aquí la tiene' = here it is (referring to the item requested)."}]}, {"question": "What does 'calidad' mean?", "options": [{"text": "Quality", "isCorrect": true, "rationale": "'calidad' means quality — the degree of excellence of something. A vendor might say 'es de buena calidad' (it's good quality)."}, {"text": "Heat, warmth", "isCorrect": false, "rationale": "'el calor' means heat. 'calidad' means quality."}, {"text": "Color", "isCorrect": false, "rationale": "'el color' means color. 'calidad' means quality."}, {"text": "Caliber (of a weapon)", "isCorrect": false, "rationale": "While related in English etymology, 'calidad' in everyday Spanish means quality, not caliber."}]}, {"question": "According to the rhyme 'Aserrín, aserrán,' what kind of workers does the song celebrate?", "options": [{"text": "Carpenters and craftspeople (workers who cut wood)", "isCorrect": true, "rationale": "The text explains: 'Aserrín, aserrán is a traditional children's rhyme imitating the sound of a saw cutting wood... celebrates carpenters and craftspeople at work.'"}, {"text": "Farmers and field workers", "isCorrect": false, "rationale": "The rhyme imitates a saw cutting wood and celebrates carpenters, not farmers."}, {"text": "Market vendors and merchants", "isCorrect": false, "rationale": "While Latin American markets are discussed, the rhyme specifically celebrates carpenters/craftspeople with its sawing imagery."}, {"text": "Musicians and performers", "isCorrect": false, "rationale": "The rhyme celebrates craftspeople (carpenters), not musicians. Its aserrín/aserrán sounds imitate a saw."}]}, {"question": "What does 'claro que sí' mean?", "options": [{"text": "Of course!", "isCorrect": true, "rationale": "'claro que sí' = 'of course!' It is an enthusiastic affirmative response, stronger than just 'sí.'"}, {"text": "Clearly not", "isCorrect": false, "rationale": "'claro que no' = 'of course not.' 'Claro que sí' = of course (yes)."}, {"text": "Maybe so", "isCorrect": false, "rationale": "'quizás' means maybe. 'claro que sí' is a definite yes — of course!"}, {"text": "That's clear", "isCorrect": false, "rationale": "While 'claro' means clear, 'claro que sí' as a phrase means 'of course!' as an enthusiastic agreement."}]}, {"question": "In the activity '¡Vamos de compras!', if you have 500 pesos and have spent 180 on a shirt, what phrase would express your remaining change?", "options": [{"text": "Tengo trescientos veinte pesos de cambio.", "isCorrect": true, "rationale": "500 - 180 = 320. The model shows: 'Tengo 3cm pesos de cambio.' Written out: 'Tengo trescientos veinte pesos de cambio.'"}, {"text": "Tengo doscientos veinte pesos de cambio.", "isCorrect": false, "rationale": "500 - 180 = 320, not 220. 'Trescientos veinte' = 320."}, {"text": "Me faltan trescientos veinte pesos.", "isCorrect": false, "rationale": "'Me faltan' means I'm missing/I need. If you have 320 left, you'd say 'Tengo trescientos veinte de cambio.'"}, {"text": "Tengo quinientos pesos de cambio.", "isCorrect": false, "rationale": "500 was the starting amount; after spending 180, you have 320 left as cambio."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
