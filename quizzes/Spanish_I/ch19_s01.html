-o", "isCorrect": false, "rationale": "Hico is not a Spanish form. The el/ella preterite of hacer is 'hizo' — the c changes to z before -o to maintain the soft s sound."}, {"text": "hizo — the c changes to z before -o to maintain the soft s sound", "isCorrect": true, "rationale": "The note explains: 'The el/ella form is hizo, NOT hico. The c changes to z in the el/ella/usted form to keep the soft s-sound before the -o ending.' Ce/ci = soft, but co = hard k, so z is needed."}, {"text": "hace — the same form as the present tense", "isCorrect": false, "rationale": "Hace is the present tense form. The preterite is hizo (el/ella). The spelling change c->z preserves the pronunciation."}, {"text": "haci — following the regular -ir preterite pattern", "isCorrect": false, "rationale": "Hacer is not a regular -ir verb. Its preterite is: hice, hiciste, hizo, hicimos, hicieron — an irregular pattern."}]}, {"question": "Which irregular preterite forms have NO accent marks?", "options": [{"text": "Only the regular preterite forms lack accent marks", "isCorrect": false, "rationale": "Actually it is the opposite. Regular preterite forms (hable, hablo, comi, comio) DO have accent marks. The irregular preterites (fui, hice, tuve, estuve) have NO accent marks."}, {"text": "The irregular preterite forms: fui, fue, hice, hizo, tuve, tuvo, estuve, estuvo", "isCorrect": true, "rationale": "The note explains: 'These irregular preterite forms have NO accent marks.' Why? Their stems are so different from present forms that there is no risk of confusion, so no accents are needed."}, {"text": "All preterite forms (regular and irregular) have accent marks", "isCorrect": false, "rationale": "Regular preterite yo and el/ella forms have accent marks (hable, hablo). But irregular preterites (fui, hice, tuve) have no accent marks."}, {"text": "No preterite forms have accent marks", "isCorrect": false, "rationale": "Regular preterite yo and el/ella forms do carry accent marks: hable, hablo, comi, comio. Only irregular preterites lack them."}]}, {"question": "What is the nosotros preterite of 'tener'?", "options": [{"text": "tenemos", "isCorrect": false, "rationale": "Tenemos is the PRESENT tense. The preterite of tener (u-stem verb) is: tuvimos."}, {"text": "tuvimos", "isCorrect": true, "rationale": "Tener is a u-stem irregular: tuve, tuviste, tuvo, tuvimos, tuvieron. 'Tuvimos mucho trabajo' = We had a lot of work."}, {"text": "tenimos", "isCorrect": false, "rationale": "Tenimos is not a correct Spanish form. The preterite stem changes to tuv-: tuvimos."}, {"text": "tuvemos", "isCorrect": false, "rationale": "Tuvemos is not correct. The nosotros ending for irregular preterites is -imos: tuvimos."}]}, {"question": "How do you know 'Fue una experiencia increible' uses 'ser' rather than 'ir'?", "options": [{"text": "Because increible is an adjective and ser is used with adjectives", "isCorrect": false, "rationale": "While ser is used with many adjectives, the key signal here is that the sentence describes what something WAS (ser), not where someone went (ir). There is no destination."}, {"text": "Because the sentence describes what something was like, with no destination mentioned", "isCorrect": true, "rationale": "The tip: 'If it describes what something was like or identifies who someone was, it is SER.' No al + place = not ir. 'Fue una experiencia increible' = It was an incredible experience (ser)."}, {"text": "Because ser forms always come before nouns", "isCorrect": false, "rationale": "Ir can also precede nouns in context. The distinction is semantic: does the sentence describe identity/quality (ser) or movement to a destination (ir)?"}, {"text": "Because 'ir' is only used in questions, not statements", "isCorrect": false, "rationale": "Ir is used in both statements and questions. The distinction between ser/ir fui forms is based on meaning: destination (ir) vs. description/identity (ser)."}]}, {"question": "What is the tu preterite of 'estar'?", "options": [{"text": "estuviste", "isCorrect": true, "rationale": "Estar follows the u-stem pattern: estuve, estuviste, estuvo, estuvimos, estuvieron. 'Estuviste en casa todo el dia?' = Were you home all day?"}, {"text": "estabas", "isCorrect": false, "rationale": "Estabas is the imperfect form (you were / you used to be). The preterite tu form is estuviste."}, {"text": "estas", "isCorrect": false, "rationale": "Estas is the present tense (you are). The preterite tu form is estuviste."}, {"text": "estuvias", "isCorrect": false, "rationale": "Estuvias is not a Spanish form. The preterite of estar follows the u-stem: estuviste."}]}, {"question": "Which group does 'poder' belong to in the irregular preterite groupings?", "options": [{"text": "Group 2 (SER/IR — identical forms)", "isCorrect": false, "rationale": "Group 2 is only for ser/ir (fui, fuiste, fue...). Poder belongs to Group 1, the u-stem verbs."}, {"text": "Group 1 (u-stem verbs)", "isCorrect": true, "rationale": "The memory tip lists Grupo 1 as u-stem verbs: tener (tuv-), estar (estuv-), poder (pud-), poner (pus-), saber (sup-). Poder: pude, pudiste, pudo, pudimos, pudieron."}, {"text": "Group 3 (HACER — i-stem with special el form)", "isCorrect": false, "rationale": "Group 3 is only hacer (hice, hiciste, hizo...). Poder belongs to Group 1 (u-stem verbs: pude, pudiste, pudo...)."}, {"text": "Poder is a regular -er verb in the preterite", "isCorrect": false, "rationale": "Poder is highly irregular in the preterite (pude, pudiste, pudo...). It belongs to Group 1 — the u-stem irregular preterites."}]}, {"question": "What does 'Estuvimos en la ciudad por tres dias' mean?", "options": [{"text": "We are in the city for three days.", "isCorrect": false, "rationale": "Estuvimos is preterite (past). The present would be 'Estamos en la ciudad.' The sentence means: We were in the city for three days."}, {"text": "We were in the city for three days.", "isCorrect": true, "rationale": "'Estuvimos' is the nosotros preterite of estar (u-stem: estuvimos). 'Por tres dias' = for three days. We were in the city for three days."}, {"text": "We will be in the city for three days.", "isCorrect": false, "rationale": "Future would use ir + a: 'Vamos a estar en la ciudad por tres dias.' Estuvimos is preterite — we were."}, {"text": "We used to be in the city for three days.", "isCorrect": false, "rationale": "Used to be would use the imperfect: estabamos. Estuvimos is the preterite — a completed past state."}]}, {"question": "What are all five preterite forms of 'hacer'?", "options": [{"text": "hice, hiciste, hico, hicimos, hicieron", "isCorrect": false, "rationale": "The el/ella form is 'hizo' (not hico) — the c changes to z before -o. The correct forms are: hice, hiciste, hizo, hicimos, hicieron."}, {"text": "hice, hiciste, hizo, hicimos, hicieron", "isCorrect": true, "rationale": "The complete preterite of hacer: hice (yo), hiciste (tu), hizo (el/ella — c->z!), hicimos (nosotros), hicieron (ellos). Notice hizo, not hico."}, {"text": "hace, haces, hace, hacemos, hacen", "isCorrect": false, "rationale": "These are the present tense forms of hacer. The preterite starts with hic-/hiz-: hice, hiciste, hizo, hicimos, hicieron."}, {"text": "hize, hiziste, hizo, hizimos, hizieron", "isCorrect": false, "rationale": "Only the el/ella form uses z (hizo). All other forms keep c: hice, hiciste, hicimos, hicieron."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
