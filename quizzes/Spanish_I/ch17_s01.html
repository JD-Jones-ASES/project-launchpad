        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 17, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the preterite tense used for in Spanish?", "options": [{"text": "Describing ongoing background actions in the past", "isCorrect": false, "rationale": "Ongoing background actions in the past use the imperfect tense, not the preterite. The preterite is for completed, specific past actions."}, {"text": "Describing completed past actions that happened at a specific moment", "isCorrect": true, "rationale": "The preterite (preterito) expresses completed past actions — things that happened, finished, and are done. Example: 'Ayer hable con mi amigo' (Yesterday I talked with my friend)."}, {"text": "Expressing future plans using ir + a + infinitive", "isCorrect": false, "rationale": "Future plans use ir + a + infinitive. The preterite is for completed past actions."}, {"text": "Describing habitual past actions that used to happen regularly", "isCorrect": false, "rationale": "Habitual past actions (used to do) use the imperfect tense. The preterite is for specific, completed past events."}]}, {"question": "What are the preterite endings for regular -ar verbs?", "options": [{"text": "-i, -iste, -io, -imos, -ieron", "isCorrect": false, "rationale": "These are the preterite endings for -er and -ir verbs, not -ar verbs. The -ar preterite endings are: -e, -aste, -o, -amos, -aron."}, {"text": "-e, -aste, -o, -amos, -aron", "isCorrect": true, "rationale": "The five preterite endings for -ar verbs are: -e (yo), -aste (tu), -o (el/ella), -amos (nosotros), -aron (ellos). Note the accents on -e and -o."}, {"text": "-a, -as, -a, -amos, -an", "isCorrect": false, "rationale": "These are the present-tense endings for -ar verbs (or the subjunctive for -er/-ir). The -ar preterite endings are: -e, -aste, -o, -amos, -aron."}, {"text": "-o, -as, -a, -amos, -aron", "isCorrect": false, "rationale": "These mix present and preterite forms. The correct -ar preterite endings are: -e, -aste, -o, -amos, -aron (with accents on -e and -o)."}]}, {"question": "Why are accent marks critical on the yo and el/ella preterite forms?", "options": [{"text": "They indicate that the speaker is emphasizing the action.", "isCorrect": false, "rationale": "Accent marks in Spanish are not about vocal emphasis. The accents on hable and hablo distinguish past from present tense."}, {"text": "Without the accent, you may accidentally write the present tense instead of the preterite.", "isCorrect": true, "rationale": "The grammar note warns: 'hable (yo preterite) vs. hable (subjunctive); hablo (el/ella preterite) vs. hablo (present). If you forget the accent, you have written the wrong tense.'"}, {"text": "They are optional stylistic choices that do not change meaning.", "isCorrect": false, "rationale": "Accent marks are never optional in Spanish. On preterite forms, they are required and change the meaning completely."}, {"text": "They show which syllable to stress when speaking.", "isCorrect": false, "rationale": "While accents do indicate stress, their critical function here is distinguishing the preterite from the present tense — hablo (present) vs. hablo (preterite)."}]}, {"question": "The nosotros preterite of -ar verbs looks identical to the present tense. How do you know which tense is being used?", "options": [{"text": "You look at the subject pronoun to determine the tense.", "isCorrect": false, "rationale": "The subject pronoun (nosotros) is the same for both tenses. Context — especially time words like 'hoy' vs. 'ayer' — tells you the tense."}, {"text": "Context and time words (hoy vs. ayer) tell you which tense is intended.", "isCorrect": true, "rationale": "The grammar box notes: 'The nosotros form (-amos) looks exactly the same as the present tense! Only context tells you which one is meant. Compare: Hoy caminamos (present) vs. Ayer caminamos (preterite).'"}, {"text": "The verb changes pronunciation in the preterite.", "isCorrect": false, "rationale": "The form looks and sounds the same. Time words and context are what distinguish the tenses."}, {"text": "The present adds a tilde to distinguish it from the preterite.", "isCorrect": false, "rationale": "No tilde is added to the present form. Both forms look identical; only context distinguishes them."}]}, {"question": "Which time expression means 'last week' in Spanish?", "options": [{"text": "anoche", "isCorrect": false, "rationale": "'Anoche' means last night, not last week. 'La semana pasada' means last week."}, {"text": "hace tres dias", "isCorrect": false, "rationale": "'Hace tres dias' means three days ago. 'La semana pasada' means last week."}, {"text": "la semana pasada", "isCorrect": true, "rationale": "'La semana pasada' means last week. Example: 'La semana pasada visitamos el museo' (Last week we visited the museum)."}, {"text": "de repente", "isCorrect": false, "rationale": "'De repente' means suddenly, not last week. 'La semana pasada' means last week."}]}, {"question": "What spelling change occurs in the yo preterite of '-gar' verbs like 'llegar'?", "options": [{"text": "g changes to j", "isCorrect": false, "rationale": "G does not change to j in this context. For -gar verbs, g changes to gu before -e to preserve the original pronunciation."}, {"text": "g changes to gu before -e", "isCorrect": true, "rationale": "For -gar verbs (llegar, jugar, pagar), the g changes to gu in the yo form to maintain the hard g sound before -e: llegue, jugue, pague. This is a spelling rule, not a stem change."}, {"text": "The -ar ending changes to -er", "isCorrect": false, "rationale": "The verb class does not change. For -gar verbs, only the yo form changes g to gu before the preterite -e ending."}, {"text": "g changes to qu", "isCorrect": false, "rationale": "G -> qu is not the rule. G -> gu is for -gar verbs. C -> qu is for -car verbs like practicar -> practique."}]}, {"question": "What does 'La cucaracha' mean in English?", "options": [{"text": "The butterfly", "isCorrect": false, "rationale": "Butterfly is 'la mariposa'. 'La cucaracha' means the cockroach."}, {"text": "The cockroach", "isCorrect": true, "rationale": "'La cucaracha' means the cockroach. The song 'La cucaracha' is one of Mexico's most famous traditional songs, dating back to the Mexican Revolution (1910-1920)."}, {"text": "The cricket", "isCorrect": false, "rationale": "Cricket is 'el grillo'. 'La cucaracha' means the cockroach."}, {"text": "The beetle", "isCorrect": false, "rationale": "Beetle is 'el escarabajo'. 'La cucaracha' means the cockroach."}]}, {"question": "What spelling change occurs in the yo preterite of 'practicar'?", "options": [{"text": "practique", "isCorrect": false, "rationale": "Wait — practique IS correct! The -car spelling rule changes c to qu before -e: practicar -> practique (not practice)."}, {"text": "practique", "isCorrect": true, "rationale": "For -car verbs, c changes to qu before -e in the yo preterite: practicar -> practique. This preserves the hard k sound. Similarly: buscar -> busque, tocar -> toque."}, {"text": "pratice", "isCorrect": false, "rationale": "Pratice is not a Spanish word. The correct yo preterite of practicar is 'practique' (c -> qu before -e)."}, {"text": "practica", "isCorrect": false, "rationale": "Practica is the el/ella present form. The yo preterite has the spelling change: practique."}]}, {"question": "What time expression means 'suddenly' and is used to signal a dramatic turn in a story?", "options": [{"text": "finalmente", "isCorrect": false, "rationale": "'Finalmente' means finally. 'De repente' means suddenly and signals a dramatic or unexpected event."}, {"text": "de repente", "isCorrect": true, "rationale": "'De repente' means suddenly. Example from the chapter: 'De repente, el nino lloro' (Suddenly, the boy cried). It is a key narrative word for preterite storytelling."}, {"text": "por fin", "isCorrect": false, "rationale": "'Por fin' means finally, at last. 'De repente' means suddenly."}, {"text": "hace tres dias", "isCorrect": false, "rationale": "'Hace tres dias' means three days ago. 'De repente' means suddenly."}]}, {"question": "What is the yo preterite form of 'hablar'?", "options": [{"text": "hablo", "isCorrect": false, "rationale": "'Hablo' (no accent) is the yo PRESENT form. The yo preterite requires an accent: hable."}, {"text": "hablo", "isCorrect": false, "rationale": "Hablo without accent is present tense. The yo preterite is hable (with accent on the e)."}, {"text": "hable", "isCorrect": true, "rationale": "Hable (with accent on the -e) is the yo preterite of hablar: I spoke. The accent is essential — without it, it becomes a subjunctive form."}, {"text": "hablaste", "isCorrect": false, "rationale": "Hablaste is the TU preterite form (you spoke). The yo preterite is hable."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
