<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Imagine you are meeting your new Spanish teacher for the first time. Which subject pronoun would you most appropriately use when speaking directly to her, according to the principles of Latin American Spanish discussed in the text?", "options": [{"text": "tú", "isCorrect": false, "rationale": "The pronoun 'tú' is used with friends, classmates, and people your own age, indicating familiarity. A new teacher requires a more formal address."}, {"text": "usted", "isCorrect": true, "rationale": "The pronoun 'usted' is used with adults you do not know well, teachers, or people you want to show respect to, making it the appropriate choice for a new Spanish teacher."}, {"text": "él", "isCorrect": false, "rationale": "The pronoun 'él' means 'he' and is used to refer to a third-person male, not to directly address someone."}, {"text": "ella", "isCorrect": false, "rationale": "The pronoun 'ella' means 'she' and is used to refer to a third-person female, not to directly address someone."}]}, {"question": "You are part of a school club. If the club consists of five girls and two boys, which subject pronoun would you use to refer to your group as 'we'?", "options": [{"text": "nosotras", "isCorrect": false, "rationale": "'Nosotras' is used specifically for an all-female group. Since this group includes both girls and boys, it is not the correct choice."}, {"text": "ellos", "isCorrect": false, "rationale": "'Ellos' means 'they' (masculine or mixed group) and is used when referring to others, not to refer to 'we'."}, {"text": "nosotros", "isCorrect": true, "rationale": "'Nosotros' is used for an all-male group or a mixed group (male and female). Therefore, for a group of five girls and two boys, 'nosotros' is the correct pronoun for 'we'."}, {"text": "ustedes", "isCorrect": false, "rationale": "'Ustedes' means 'you all' and is used to address a group of people directly, not to refer to 'we' (the speaker's group)."}]}, {"question": "In Latin American Spanish, if you are addressing a group of your friends and a group of your teachers simultaneously, which single subject pronoun would you use to mean 'you all'?", "options": [{"text": "vosotros", "isCorrect": false, "rationale": "'Vosotros' is used for 'you all' in Spain, but the text explicitly states that we are learning Latin American Spanish, where 'vosotros' is not used for this purpose."}, {"text": "ellos", "isCorrect": false, "rationale": "'Ellos' means 'they' (masculine or mixed group) and is used to refer to others, not to directly address 'you all'."}, {"text": "ustedes", "isCorrect": true, "rationale": "The text states that in Latin America, 'ustedes' is used for all groups of people you are speaking to, regardless of formality or relationship, making it the correct choice for both friends and teachers."}, {"text": "nosotros", "isCorrect": false, "rationale": "'Nosotros' means 'we' and is used to refer to the speaker's group, not to directly address 'you all'."}]}, {"question": "What is the primary function of a subject pronoun in a Spanish sentence, as described in the text?", "options": [{"text": "To describe the quality of an object.", "isCorrect": false, "rationale": "Subject pronouns identify who is performing the action, not the quality of an object. Adjectives describe qualities."}, {"text": "To tell us who is doing the action.", "isCorrect": true, "rationale": "The text explicitly defines a subject pronoun as telling 'us who is doing the action in a sentence,' making this the correct primary function."}, {"text": "To indicate the time an action occurred.", "isCorrect": false, "rationale": "Subject pronouns do not indicate time; verb conjugations and adverbs of time handle this function."}, {"text": "To specify the location of an event.", "isCorrect": false, "rationale": "Subject pronouns do not specify location; prepositions and adverbs of place serve this purpose."}]}, {"question": "Which form of the verb 'ser' correctly completes the sentence: 'Nosotros _______ estudiantes muy dedicados.'", "options": [{"text": "soy", "isCorrect": false, "rationale": "'Soy' is the 'yo' (I) form of 'ser', not the 'nosotros' (we) form."}, {"text": "eres", "isCorrect": false, "rationale": "'Eres' is the 'tú' (informal you) form of 'ser', not the 'nosotros' (we) form."}, {"text": "somos", "isCorrect": true, "rationale": "'Somos' is the correct 'nosotros' (we) form of the verb 'ser', meaning 'we are'."}, {"text": "son", "isCorrect": false, "rationale": "'Son' is the 'ellos/ellas/ustedes' (they/you all) form of 'ser', not the 'nosotros' (we) form."}]}, {"question": "Your new classmate, Elena, tells you, 'Yo soy de España.' Which category of 'ser' usage does this statement exemplify?", "options": [{"text": "Profession", "isCorrect": false, "rationale": "This statement describes Elena's origin, not her profession. Profession would be 'Ella es doctora,' for example."}, {"text": "Physical description", "isCorrect": false, "rationale": "This statement describes where Elena is from, not what she looks like. A physical description would be 'Ella es alta,' for example."}, {"text": "Nationality or origin", "isCorrect": true, "rationale": "The phrase 'de España' directly indicates Elena's origin or nationality, which is one of the main jobs of 'ser' as outlined in the text."}, {"text": "Personality", "isCorrect": false, "rationale": "This statement describes where Elena is from, not her personality. Personality would be 'Ella es inteligente,' for example."}]}, {"question": "You see a new sign at school introducing 'La Sra. Ramos. Ella ___ la nueva directora.' Based on the 'jobs that ser handles,' how would you complete this sentence?", "options": [{"text": "soy", "isCorrect": false, "rationale": "'Soy' is the 'yo' (I) form of 'ser'. The sentence refers to 'Ella' (she)."}, {"text": "eres", "isCorrect": false, "rationale": "'Eres' is the 'tú' (informal you) form of 'ser'. The sentence refers to 'Ella' (she)."}, {"text": "es", "isCorrect": true, "rationale": "'Es' is the correct 'ella' (she) form of 'ser'. This sentence describes Sra. Ramos's profession ('la nueva directora'), which is one of the key uses of 'ser' for defining characteristics."}, {"text": "somos", "isCorrect": false, "rationale": "'Somos' is the 'nosotros' (we) form of 'ser'. The sentence refers to 'Ella' (she)."}]}, {"question": "Your friend describes her younger sister: 'Mi hermana menor ___ muy curiosa y ___ bastante alta para su edad.' Which conjugation of 'ser' correctly fills both blanks?", "options": [{"text": "soy", "isCorrect": false, "rationale": "'Soy' is the 'yo' (I) form. The subject 'mi hermana menor' (my younger sister) requires a third-person singular conjugation."}, {"text": "somos", "isCorrect": false, "rationale": "'Somos' is the 'nosotros' (we) form. The subject is singular, not plural, and not 'we'."}, {"text": "es", "isCorrect": true, "rationale": "'Es' is the correct third-person singular (él/ella/usted) form of 'ser'. Both 'muy curiosa' (personality) and 'bastante alta' (physical description) are permanent, defining characteristics that use 'ser'."}, {"text": "son", "isCorrect": false, "rationale": "'Son' is the third-person plural form (ellos/ellas/ustedes). The subject 'mi hermana menor' is singular."}]}, {"question": "The text mentions a 'Quick memory trick: Think of ser as the 'ID card' verb.' Based on this trick and the '¡Ojo! Cuidado' section, what kind of information does 'ser' primarily convey about a person?", "options": [{"text": "How someone feels at a particular moment.", "isCorrect": false, "rationale": "The '¡Ojo! Cuidado' section explicitly states that 'estar' is used for how someone feels, not 'ser'."}, {"text": "Where someone is located right now.", "isCorrect": false, "rationale": "The '¡Ojo! Cuidado' section explicitly states that 'estar' is used for where someone is located, not 'ser'."}, {"text": "Defining characteristics that are part of who they are.", "isCorrect": true, "rationale": "The 'ID card' analogy and the text's explanation of 'ser' for identity, origin, profession, description, and personality all point to 'ser' conveying defining, inherent characteristics of a person. The '¡Ojo! Cuidado' also reinforces that 'ser is for things that define who someone is'."}, {"text": "Possession or ownership of an item.", "isCorrect": false, "rationale": "Possession is expressed using the verb 'tener' (to have) or possessive adjectives/pronouns, not 'ser'."}]}, {"question": "You meet a new student named Carlos and learn he is from Colombia and is an engineering student. Which sentence correctly uses 'ser' to convey this information?", "options": [{"text": "Carlos eres de Colombia y eres estudiante de ingeniería.", "isCorrect": false, "rationale": "'Eres' is the 'tú' form. For 'Carlos' (he), the 'él' form 'es' is required."}, {"text": "Carlos soy de Colombia y soy estudiante de ingeniería.", "isCorrect": false, "rationale": "'Soy' is the 'yo' form. For 'Carlos' (he), the 'él' form 'es' is required."}, {"text": "Carlos es de Colombia y es estudiante de ingeniería.", "isCorrect": true, "rationale": "'Es' is the correct 'él' form of 'ser'. This sentence correctly uses 'ser' to convey Carlos's origin ('de Colombia') and his profession ('estudiante de ingeniería'), both defining characteristics covered by 'ser'."}, {"text": "Carlos son de Colombia y son estudiante de ingeniería.", "isCorrect": false, "rationale": "'Son' is the 'ellos/ellas/ustedes' (plural) form. Carlos is a singular subject, so 'es' is needed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
