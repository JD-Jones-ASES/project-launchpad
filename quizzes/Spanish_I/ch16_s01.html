<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 16, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do you form a negative tu command in Spanish?", "options": [{"text": "Use 'no' + the el/ella present-tense form", "isCorrect": false, "rationale": "This is the rule for affirmative tu commands, not negative ones. Negative tu commands use 'no' + the present subjunctive tú form."}, {"text": "Use 'no' + the present subjunctive tu form", "isCorrect": true, "rationale": "Negative tu commands are formed with: no + present subjunctive (tu form). For -ar verbs: drop -ar, add -es. For -er/-ir verbs: drop -er/-ir, add -as."}, {"text": "Use 'no' + the infinitive", "isCorrect": false, "rationale": "The infinitive is not used for negative commands. The formula is: no + the present subjunctive (tu form)."}, {"text": "Use 'nunca' + the el/ella present-tense form", "isCorrect": false, "rationale": "Nunca means never and is not the formula for negative commands. Negative tu commands use: no + the present subjunctive form."}], "id": "q01"}, {"question": "What is the negative tu command for 'hablar' (to speak)?", "options": [{"text": "no habla", "isCorrect": false, "rationale": "No habla would use the el/ella form, which is for affirmative commands. The negative command for hablar is 'no hables'."}, {"text": "no hables", "isCorrect": true, "rationale": "For -ar verbs, the negative command drops -ar and adds -es: habl- + -es = no hables. Don't speak."}, {"text": "no hablas", "isCorrect": false, "rationale": "Hablas is the regular tu present form. The negative command form for hablar is 'no hables' (subjunctive)."}, {"text": "no hablar", "isCorrect": false, "rationale": "No hablar uses the infinitive, which is not the correct format. The negative command is 'no hables'."}], "id": "q02"}, {"question": "What is the negative tu command for 'comer' (to eat)?", "options": [{"text": "no comes", "isCorrect": false, "rationale": "Comes is the regular tu present form, not the subjunctive. The negative command for comer is 'no comas'."}, {"text": "no comas", "isCorrect": true, "rationale": "For -er verbs, the negative command drops -er and adds -as: com- + -as = no comas. Don't eat."}, {"text": "no come", "isCorrect": false, "rationale": "Come is the el/ella form used for affirmative commands. The negative command is 'no comas'."}, {"text": "no comez", "isCorrect": false, "rationale": "This is not a Spanish form. The negative tu command for comer is 'no comas'."}], "id": "q03"}, {"question": "Which of the following is a correct negative tu command used in a travel warning?", "options": [{"text": "Pierde el pasaporte.", "isCorrect": false, "rationale": "This is not a negative command — it is an affirmative command to lose your passport, which makes no sense as travel advice. The correct negative form is 'No pierdas el pasaporte.'"}, {"text": "No pierdas el pasaporte.", "isCorrect": true, "rationale": "This is a correct negative tu command from the chapter: 'No pierdas el pasaporte' (Don't lose your passport). -ir verb perder -> pierd- + -as = pierdas."}, {"text": "No pierdes el pasaporte.", "isCorrect": false, "rationale": "No pierdes uses the present indicative form, not the subjunctive. The correct negative command is 'No pierdas el pasaporte.'"}, {"text": "No perdas el pasaporte.", "isCorrect": false, "rationale": "Perdas is not a correct Spanish form. The negative tu command for perder is 'no pierdas' (note the stem change e->ie)."}], "id": "q04"}, {"question": "Why do affirmative and negative tu commands look different for many verbs?", "options": [{"text": "Because negative commands always use the future tense", "isCorrect": false, "rationale": "Negative commands do not use the future tense. They use the present subjunctive form, which is different from the el/ella indicative used for affirmative commands."}, {"text": "Because negative commands use the subjunctive form of the verb", "isCorrect": true, "rationale": "The note explains: 'The negative commands look different because they use the subjunctive form of the verb.' Affirmative: iVe! (go). Negative: iNo vayas! (don't go)."}, {"text": "Because negative commands use the yo form", "isCorrect": false, "rationale": "Negative commands use the tu form of the present subjunctive, not the yo form."}, {"text": "Because negative commands borrow their form from the usted command", "isCorrect": false, "rationale": "While the usted command and the negative tu command both use subjunctive, they are different forms (usted uses the el/ella subjunctive; tu uses the tu subjunctive)."}], "id": "q05"}, {"question": "What is the negative tu command for 'ir' (to go)?", "options": [{"text": "no va", "isCorrect": false, "rationale": "Va is the el/ella present form. The negative tu command for ir is the irregular 'no vayas'."}, {"text": "no vas", "isCorrect": false, "rationale": "Vas is the regular tu present form. The negative command uses the subjunctive: 'no vayas'."}, {"text": "no vayas", "isCorrect": true, "rationale": "The negative tu command for ir is the irregular 'no vayas'. This is different from the affirmative 've!' — it must be memorized as a whole phrase."}, {"text": "no ves", "isCorrect": false, "rationale": "No ves is the negative of ver (to see/watch) in the indicative. The negative command for ir is 'no vayas'."}], "id": "q06"}, {"question": "Which travel vocabulary word means 'carry-on bag' or 'hand luggage'?", "options": [{"text": "el pasaporte", "isCorrect": false, "rationale": "El pasaporte is the passport. The carry-on bag is 'la maleta de mano'."}, {"text": "el equipaje", "isCorrect": false, "rationale": "El equipaje means luggage in general. Specifically, the carry-on or hand luggage is 'la maleta de mano'."}, {"text": "la maleta de mano", "isCorrect": true, "rationale": "La maleta de mano is the carry-on bag or hand luggage. The chapter includes the travel tip: 'No pongas liquidos en tu maleta de mano.'"}, {"text": "el boleto", "isCorrect": false, "rationale": "El boleto is a ticket. The carry-on bag is 'la maleta de mano'."}], "id": "q07"}, {"question": "How are the words 'avion', 'aeropuerto', and 'pasaporte' all connected to English?", "options": [{"text": "They come from French", "isCorrect": false, "rationale": "While French did influence some Spanish words, the memory tip notes that avion relates to aviation, pasaporte to passport, and aeropuerto to airport — all recognizable from English."}, {"text": "They are false cognates that mean something completely different in English", "isCorrect": false, "rationale": "These are true cognates (not false ones) — avion/aviation, pasaporte/passport, aeropuerto/airport all share obvious connections with English words."}, {"text": "They are cognates — recognizably related to English words (aviation, passport, airport)", "isCorrect": true, "rationale": "The memory tip notes: 'avion = aviation; pasaporte = passport; aeropuerto = airport (from Latin aer = air, and puerto = port or gateway).' These connections to English help you remember the words."}, {"text": "They all come from Latin and have no connection to modern English words", "isCorrect": false, "rationale": "While their roots may be Latin, the memory tip highlights that these words are visibly related to current English words, making them easy to remember."}], "id": "q08"}, {"question": "What does the negative command 'No llegues tarde al aeropuerto' mean?", "options": [{"text": "Don't leave the airport without your passport.", "isCorrect": false, "rationale": "This would be 'No salgas del aeropuerto sin tu pasaporte.' 'No llegues tarde' means don't arrive late."}, {"text": "Don't arrive late to the airport.", "isCorrect": true, "rationale": "'No llegues' = Don't arrive (negative command of llegar). 'Tarde' = late. 'Al aeropuerto' = to the airport. Full meaning: Don't arrive late to the airport."}, {"text": "Don't run in the airport.", "isCorrect": false, "rationale": "Don't run would be 'No corras'. 'No llegues tarde' specifically means don't arrive late."}, {"text": "Don't go to the airport without a ticket.", "isCorrect": false, "rationale": "This would be 'No vayas al aeropuerto sin boleto'. 'No llegues tarde al aeropuerto' means don't arrive late to the airport."}], "id": "q09"}, {"question": "What does 'No digas tu numero de habitacion en voz alta' mean?", "options": [{"text": "Don't write your room number in your passport.", "isCorrect": false, "rationale": "Writing in a passport would use 'escribas'. 'Digas' comes from decir. This command means: Don't say your room number out loud."}, {"text": "Don't say your room number out loud.", "isCorrect": true, "rationale": "'No digas' = Don't say (negative command of decir). 'Tu numero de habitacion' = your room number. 'En voz alta' = out loud. A safety tip for hotel guests."}, {"text": "Don't ask about your room number.", "isCorrect": false, "rationale": "Don't ask would use 'preguntes'. 'No digas' = Don't say. The full command means: Don't say your room number out loud."}, {"text": "Don't forget your room number.", "isCorrect": false, "rationale": "Don't forget would be 'No olvides'. 'No digas' = Don't say. The command means: Don't say your room number out loud."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
