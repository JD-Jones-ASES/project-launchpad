<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the ONE difference between -er and -ir verb endings in the present tense?", "options": [{"text": "The yo form is different.", "isCorrect": false, "rationale": "The yo form (-o) is the same for all regular verbs: -ar, -er, and -ir."}, {"text": "The nosotros form: -er verbs use -emos while -ir verbs use -imos.", "isCorrect": true, "rationale": "The only difference is the nosotros form: comemos (-er) vs. vivimos (-ir). All other endings are identical."}, {"text": "The tú form ends in -is for -ir verbs.", "isCorrect": false, "rationale": "The tú form for -ir verbs ends in -es (vives), just like -er verbs."}, {"text": "The ellos form ends in -iren for -ir verbs.", "isCorrect": false, "rationale": "The ellos form for both -er and -ir verbs ends in -en: comen, viven."}]}, {"question": "How do you say 'I live in a big house' in Spanish?", "options": [{"text": "Yo vivo en una casa grande.", "isCorrect": true, "rationale": "The yo form of vivir is vivo (viv- + o). Una casa grande means a big house."}, {"text": "Yo vives en una casa grande.", "isCorrect": false, "rationale": "Vives is the tú form; the yo form of vivir is vivo."}, {"text": "Yo vivimos en una casa grande.", "isCorrect": false, "rationale": "Vivimos is the nosotros form; the yo form of vivir is vivo."}, {"text": "Yo vive en una casa grande.", "isCorrect": false, "rationale": "Vive is the él/ella form; the yo form of vivir is vivo."}]}, {"question": "What is the 'Routine Anchoring' memory technique described in this section?", "options": [{"text": "Writing vocabulary words 10 times each night before sleeping.", "isCorrect": false, "rationale": "Routine Anchoring does not involve repetitive writing; it involves linking new words to daily actions."}, {"text": "Attaching new vocabulary to actions you already do every day.", "isCorrect": true, "rationale": "Routine Anchoring links new Spanish words to your existing daily routine so vocabulary sticks to already-memorized actions."}, {"text": "Repeating words in front of a mirror each morning.", "isCorrect": false, "rationale": "While speaking aloud can help, Routine Anchoring specifically means attaching words to daily actions you already perform."}, {"text": "Making flashcards for every new word you learn.", "isCorrect": false, "rationale": "Flashcards are a different technique. Routine Anchoring means weaving Spanish into actions you already do automatically."}]}, {"question": "Which is the correct nosotros form of 'vivir'?", "options": [{"text": "vivemos", "isCorrect": false, "rationale": "Vivemos does not exist; -ir verbs use -imos for nosotros, giving vivimos."}, {"text": "vivamos", "isCorrect": false, "rationale": "Vivamos is a subjunctive form; the present indicative nosotros form is vivimos."}, {"text": "viven", "isCorrect": false, "rationale": "Viven is the ellos/ellas form of vivir; the nosotros form is vivimos."}, {"text": "vivimos", "isCorrect": true, "rationale": "The nosotros form of -ir verbs uses -imos: vivir → viv- + imos = vivimos."}]}, {"question": "In the conversation, Daniel says 'Subo al autobús a las siete y media.' What does the -ir verb 'subir' mean here?", "options": [{"text": "to drive the bus", "isCorrect": false, "rationale": "Manejar or conducir means to drive. Subir means to get on or board a vehicle."}, {"text": "to wait for the bus", "isCorrect": false, "rationale": "Esperar means to wait. Subir means to get on or board something."}, {"text": "to get on / board the bus", "isCorrect": true, "rationale": "Subir al autobús means to get on the bus. Subir literally means to go up or to board something."}, {"text": "to miss the bus", "isCorrect": false, "rationale": "Perder el autobús means to miss the bus. Subir means to board or get on."}]}, {"question": "Complete the sentence: 'Mi abuela _____ con nosotros.' (My grandmother lives with us.)", "options": [{"text": "vivo", "isCorrect": false, "rationale": "Vivo is the yo form; for mi abuela (ella), use vive."}, {"text": "vive", "isCorrect": true, "rationale": "The ella form of vivir is vive (viv- + e), correctly describing where grandmother lives."}, {"text": "vivimos", "isCorrect": false, "rationale": "Vivimos is the nosotros form; for mi abuela (ella), use vive."}, {"text": "viven", "isCorrect": false, "rationale": "Viven is the ellos form; for mi abuela (singular ella), use vive."}]}, {"question": "Which of these is a regular -ir verb in Spanish?", "options": [{"text": "ir", "isCorrect": false, "rationale": "Ir is completely irregular; its forms (voy, vas, va, vamos, van) look nothing like the infinitive."}, {"text": "escribir", "isCorrect": true, "rationale": "Escribir (to write) is a regular -ir verb: escribo, escribes, escribe, escribimos, escriben."}, {"text": "tener", "isCorrect": false, "rationale": "Tener ends in -er and is irregular (yo form = tengo)."}, {"text": "querer", "isCorrect": false, "rationale": "Querer ends in -er and is a stem-changing verb (e→ie), not a regular -ir verb."}]}, {"question": "How would you conjugate 'vivir' for the subject 'ellos'?", "options": [{"text": "vive", "isCorrect": false, "rationale": "Vive is the él/ella (singular) form; for ellos (plural), use viven."}, {"text": "vivimos", "isCorrect": false, "rationale": "Vivimos is the nosotros form; for ellos use viven."}, {"text": "viven", "isCorrect": true, "rationale": "The ellos/ellas form of vivir is viven (viv- + en)."}, {"text": "vivo", "isCorrect": false, "rationale": "Vivo is the yo form; for ellos use viven."}]}, {"question": "Which infinitive means 'to write' and is a regular -ir verb?", "options": [{"text": "beber", "isCorrect": false, "rationale": "Beber is an -er verb meaning to drink, not to write."}, {"text": "leer", "isCorrect": false, "rationale": "Leer is an -er verb meaning to read, not to write."}, {"text": "escribir", "isCorrect": true, "rationale": "Escribir is a regular -ir verb meaning to write. Daniel uses it: Escribo en mi diario todas las mañanas."}, {"text": "comer", "isCorrect": false, "rationale": "Comer is an -er verb meaning to eat, not to write."}]}, {"question": "According to the section, which comparison of the three verb groups is accurate?", "options": [{"text": "All three groups (-ar, -er, -ir) have different yo forms.", "isCorrect": false, "rationale": "All three groups share the same yo form ending -o: hablo, como, vivo."}, {"text": "The -er and -ir groups are completely different from each other.", "isCorrect": false, "rationale": "-er and -ir verbs are nearly identical; they differ only in the nosotros form."}, {"text": "The only difference between -er and -ir verbs is the nosotros form.", "isCorrect": true, "rationale": "Correct: comemos (-er) vs. vivimos (-ir) is the single difference. All other forms are identical."}, {"text": "The tú form of -ir verbs ends in -is.", "isCorrect": false, "rationale": "The tú form for -ir verbs ends in -es (vives), not -is."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
