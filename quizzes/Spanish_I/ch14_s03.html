    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 14, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'Siga derecho' mean when giving directions?", "options": [{"text": "Go straight", "isCorrect": true, "rationale": "'Siga derecho' = Go straight. It uses the formal command form of 'seguir.' In the dialogue: 'Siga derecho por esta calle dos cuadras.'"}, {"text": "Turn right", "isCorrect": false, "rationale": "'Doble a la derecha' means turn right. 'Siga derecho' means go straight ahead."}, {"text": "Go back", "isCorrect": false, "rationale": "'Regrese' or 'vuelva' means go back. 'Siga derecho' means go straight."}, {"text": "Take the next street", "isCorrect": false, "rationale": "'Tome la próxima calle' would mean take the next street. 'Siga derecho' = go straight."}], "id": "q01"}, {"question": "How do you say 'Turn left at the corner' in Spanish?", "options": [{"text": "Doble a la izquierda en la esquina.", "isCorrect": true, "rationale": "'Doble' = turn (formal command of doblar), 'a la izquierda' = to the left, 'en la esquina' = at the corner."}, {"text": "Siga a la izquierda en la esquina.", "isCorrect": false, "rationale": "'Siga' means continue/go straight. For turning, use 'Doble': 'Doble a la izquierda.'"}, {"text": "Doble a la derecha en la esquina.", "isCorrect": false, "rationale": "'a la derecha' means to the right. For left, use 'a la izquierda.'"}, {"text": "Cruce a la izquierda en la esquina.", "isCorrect": false, "rationale": "'Cruce' means cross (an intersection). 'Doble' means turn. To turn left: 'Doble a la izquierda.'"}], "id": "q02"}, {"question": "In the dialogue, how does Mr. García say the museum is from where the tourist is standing?", "options": [{"text": "Very close — five minutes on foot ('Está muy cerca. A cinco minutos a pie.')", "isCorrect": true, "rationale": "Mr. García says: 'No, está muy cerca. A cinco minutos a pie.' (No, it's very close. Five minutes on foot.)"}, {"text": "Far away — you need a taxi", "isCorrect": false, "rationale": "Mr. García says it is very close: 'No, está muy cerca.' He does not suggest a taxi."}, {"text": "Across the river, next to the station", "isCorrect": false, "rationale": "The museum is described as 'enfrente del parque, al lado del banco' (across from the park, next to the bank)."}, {"text": "About 20 minutes by bus", "isCorrect": false, "rationale": "Mr. García says it is very close, five minutes on foot — not 20 minutes by bus."}], "id": "q03"}, {"question": "What does 'a pie' mean?", "options": [{"text": "On foot", "isCorrect": true, "rationale": "'a pie' = on foot. 'A cinco minutos a pie' = five minutes on foot/walking."}, {"text": "By car", "isCorrect": false, "rationale": "'en carro/coche' = by car. 'a pie' = on foot."}, {"text": "Nearby", "isCorrect": false, "rationale": "'cerca' = nearby. 'a pie' specifically means on foot."}, {"text": "With a guide", "isCorrect": false, "rationale": "'con un guía' = with a guide. 'a pie' = on foot (walking)."}], "id": "q04"}, {"question": "What does 'enfrente de' mean?", "options": [{"text": "Across from / in front of", "isCorrect": true, "rationale": "'enfrente de' means across from or in front of. In the dialogue: 'El museo está enfrente del parque' (The museum is across from the park)."}, {"text": "Next to", "isCorrect": false, "rationale": "'al lado de' means next to. 'enfrente de' means across from/in front of."}, {"text": "Behind", "isCorrect": false, "rationale": "'detrás de' means behind. 'enfrente de' means across from or in front of."}, {"text": "Far from", "isCorrect": false, "rationale": "'lejos de' means far from. 'enfrente de' means across from/in front of."}], "id": "q05"}, {"question": "What does the verb 'recordar' mean, and what is its stem change?", "options": [{"text": "To remember; stem change o→ue (recuerdo, recuerdas...)", "isCorrect": true, "rationale": "The grammar box shows 'recordar (o→ue): recuerdo, recuerdas, recuerda, recordamos, recuerdan.' It means to remember."}, {"text": "To record; regular verb", "isCorrect": false, "rationale": "'Grabar' means to record (audio/video). 'Recordar' means to remember and has o→ue stem change."}, {"text": "To remember; stem change e→ie", "isCorrect": false, "rationale": "Recordar changes o→ue, not e→ie. Recuerdo, recuerdas, recuerda, recordamos, recuerdan."}, {"text": "To return; stem change o→ue", "isCorrect": false, "rationale": "'Volver' means to return (also o→ue). 'Recordar' means to remember (also o→ue)."}], "id": "q06"}, {"question": "What does 'me parece interesante' mean?", "options": [{"text": "It seems interesting to me.", "isCorrect": true, "rationale": "'parecer' (to seem) follows the gustar pattern. 'Me parece interesante' = It seems interesting to me. The yo form of parecer is parezco."}, {"text": "I find it interesting (I like it).", "isCorrect": false, "rationale": "While the meaning is similar to 'I find it interesting,' the literal and grammatical structure is 'It seems interesting to me' — parecer = to seem."}, {"text": "I appear interested.", "isCorrect": false, "rationale": "'Me parece' = it seems to me, not I appear. The subject is the thing that 'seems' a certain way."}, {"text": "It is more interesting.", "isCorrect": false, "rationale": "'Es más interesante' = it is more interesting. 'Me parece interesante' = it seems interesting to me."}], "id": "q07"}, {"question": "According to the reading 'Una tarde en la ciudad,' who is the narrator?", "options": [{"text": "Valentina, who lives in Bogotá, Colombia", "isCorrect": true, "rationale": "The reading begins: 'Me llamo Valentina y vivo en Bogotá, Colombia. Conozco mi barrio muy bien.'"}, {"text": "Sofía, who lives in Mexico City", "isCorrect": false, "rationale": "Sofía appears in the chapter 12 and 22 readings. The narrator of the ch14 city reading is Valentina from Bogotá."}, {"text": "Mateo, a scientist from Chile", "isCorrect": false, "rationale": "Mateo appears in ch22 as a student wanting to study science. The ch14 narrator is Valentina from Bogotá."}, {"text": "A tourist visiting Buenos Aires", "isCorrect": false, "rationale": "The narrator is Valentina, a local resident of Bogotá, Colombia — not a tourist in Buenos Aires."}], "id": "q08"}, {"question": "What memory technique does the chapter recommend for learning city vocabulary?", "options": [{"text": "El paseo mental (city walk) — imagining walking through a familiar street and placing vocabulary words at locations along the route", "isCorrect": true, "rationale": "The memory tip describes the city walk technique: 'imagine walking through a familiar place and placing vocabulary words at different locations along your route.'"}, {"text": "Making flashcards with pictures on one side and Spanish on the other", "isCorrect": false, "rationale": "Flashcards are not mentioned. The recommended technique is the 'paseo mental' — a mental walk placing words at locations."}, {"text": "Singing all the vocabulary words to a well-known tune", "isCorrect": false, "rationale": "Songs appear elsewhere in the book. The city vocabulary memory technique is the paseo mental (mental city walk)."}, {"text": "Watching Spanish-language movies set in Latin American cities", "isCorrect": false, "rationale": "Movies are mentioned as a general tip in ch22. The specific technique for city vocabulary is the paseo mental."}], "id": "q09"}, {"question": "What does 'Perdón' mean when used to get someone's attention?", "options": [{"text": "Excuse me (to get someone's attention)", "isCorrect": true, "rationale": "The dialogue notes: 'Perdón = Excuse me (to get attention, not apologizing).' In the dialogue: 'Perdón, señor. ¿Sabe usted dónde está el museo?'"}, {"text": "I'm sorry (an apology)", "isCorrect": false, "rationale": "'Lo siento' or 'disculpe' is more commonly used for apologies. 'Perdón' in this context means 'excuse me' to get attention."}, {"text": "Please (a polite request)", "isCorrect": false, "rationale": "'por favor' = please. 'Perdón' here = excuse me (to get someone's attention)."}, {"text": "Thank you", "isCorrect": false, "rationale": "'Gracias' = thank you. 'Perdón' = excuse me (to get attention in this context)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
