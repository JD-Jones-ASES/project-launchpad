    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 22, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a false cognate ('false friend') that English speakers must be careful about in this chapter?", "options": [{"text": "El exito — which looks like exit but means success", "isCorrect": true, "rationale": "The note warns: 'One of the most common false cognates for English speakers is exito, which means SUCCESS — not exit! The Spanish word for exit is la salida.' Exito looks like exit but means success."}, {"text": "La meta — which looks like meter but means goal", "isCorrect": false, "rationale": "La meta (goal) is a true vocabulary word but is not highlighted as a false cognate in this section. The false cognate warning is specifically about exito vs. exit."}, {"text": "El futuro — which looks like future but means present", "isCorrect": false, "rationale": "El futuro does mean the future — it is a true cognate, not a false one. The false cognate in this chapter is exito (success, not exit)."}, {"text": "Intentar — which looks like intend but means to forget", "isCorrect": false, "rationale": "Intentar means to try (similar to intend), which is actually a true cognate. The false cognate warning in this chapter is about exito (success, not exit)."}]}, {"question": "What is the most common way to talk about the future in everyday Spanish conversation?", "options": [{"text": "Using the formal future tense (estudiare, sera)", "isCorrect": false, "rationale": "The formal future tense is Option 2 in the grammar box and is described as 'formal/written Spanish.' The most common everyday option is ir + a + infinitive."}, {"text": "Using ir + a + infinitive (voy a estudiar, va a ser)", "isCorrect": true, "rationale": "The grammar box states: 'In everyday spoken Spanish, ir + a + infinitivo (Option 1) is by far the most common way to talk about the future. Use it with confidence!'"}, {"text": "Using quiero que + subjunctive for all future actions", "isCorrect": false, "rationale": "Quiero que + subjunctive expresses your wishes for OTHERS' actions. For simple future plans (your own), use ir + a + infinitive."}, {"text": "Using the present tense for all future actions", "isCorrect": false, "rationale": "While present tense can sometimes imply near future in Spanish, the recommended everyday option is ir + a + infinitive for talking about future plans."}]}, {"question": "What does 'Sueno con ser artista' mean?", "options": [{"text": "I am an artist in my dreams.", "isCorrect": false, "rationale": "The construction 'sonar con + infinitive' means to dream of doing something. 'Sueno con ser artista' = I dream of being an artist."}, {"text": "I dream of being an artist.", "isCorrect": true, "rationale": "'Sonar con' (to dream of/about) + infinitive. 'Sueno con ser artista' = I dream of being an artist. This is Valentina's dream in the chapter conversation."}, {"text": "I used to dream about becoming an artist.", "isCorrect": false, "rationale": "Sueno is present tense (I dream). Past dreaming would use sonar (imperfect): Sonaba con ser artista."}, {"text": "Being an artist sounds like a dream to me.", "isCorrect": false, "rationale": "The construction is literal: sonar con = to dream of. 'Sueno con ser artista' = I dream of being an artist."}]}, {"question": "In the conversation, Mateo says 'Es necesario que yo aprenda mas matematicas.' What tense is 'aprenda'?", "options": [{"text": "Present indicative", "isCorrect": false, "rationale": "The present indicative of aprender for yo would be 'aprendo'. 'Aprenda' is the yo subjunctive form."}, {"text": "Present subjunctive", "isCorrect": true, "rationale": "'Aprenda' is the yo present subjunctive of aprender (-er verb: aprendo -> drop -o -> aprend- + -a = aprenda). It follows the trigger 'Es necesario que.'"}, {"text": "Preterite", "isCorrect": false, "rationale": "The preterite of aprender for yo is 'aprendi'. 'Aprenda' is the subjunctive."}, {"text": "Imperfect", "isCorrect": false, "rationale": "The imperfect of aprender for yo is 'aprendia'. 'Aprenda' is the present subjunctive."}]}, {"question": "What does the word 'el desafio' mean in Valentina's question to Mateo?", "options": [{"text": "The talent or skill", "isCorrect": false, "rationale": "Talent/skill is 'el talento'. 'El desafio' means challenge or difficulty."}, {"text": "The challenge / difficulty", "isCorrect": true, "rationale": "Valentina asks: '¿Y tu, cual es tu mayor desafio?' (And you, what is your greatest challenge?) 'El desafio' = the challenge or difficulty."}, {"text": "The goal or objective", "isCorrect": false, "rationale": "Goal/objective is 'la meta' or 'el objetivo'. 'El desafio' means the challenge."}, {"text": "The decision or choice", "isCorrect": false, "rationale": "Decision/choice is 'la decision'. 'El desafio' means the challenge or difficulty."}]}, {"question": "In Sofia's reading, she uses the subjunctive multiple times. Which of these is a subjunctive verb from her text?", "options": [{"text": "vivo (I live)", "isCorrect": false, "rationale": "'Vivo' is present indicative (I live). Sofia's text includes subjunctive verbs after trigger expressions: tenga, logren, hagamos, sea, etc."}, {"text": "logren (they achieve)", "isCorrect": true, "rationale": "'Es importante que todos los jovenes logren sus metas' — 'logren' is the subjunctive of lograr (to achieve/accomplish), following the trigger 'es importante que.'"}, {"text": "voy a estudiar (I am going to study)", "isCorrect": false, "rationale": "'Voy a estudiar' is ir + a + infinitive (future plan). The subjunctive verbs in Sofia's text follow trigger expressions like espero que, es importante que, quiero que."}, {"text": "estudio (I study)", "isCorrect": false, "rationale": "'Estudio' is present indicative. Subjunctive verbs appear after trigger expressions: 'Espero que mi familia tenga...', 'Es importante que todos logren...'"}]}, {"question": "What do young Latin Americans in the culture box exemplify?", "options": [{"text": "The need for more educational resources in rural areas", "isCorrect": false, "rationale": "The culture box celebrates the achievements and contributions of young Latin Americans — environmental activism, entrepreneurship, journalism, and indigenous language preservation."}, {"text": "Remarkable contributions to their communities: environmental activism, entrepreneurship, student journalism, and indigenous language preservation", "isCorrect": true, "rationale": "The culture box highlights: Costa Rican teens protecting biodiversity, Chilean entrepreneurs in 'Silicon Andes,' Mexican student journalists, and Ecuadorian/Bolivian indigenous youth preserving ancestral languages."}, {"text": "The challenges of poverty that prevent young people from reaching their goals", "isCorrect": false, "rationale": "The culture box is explicitly celebratory and optimistic — it showcases what young Latin Americans ARE accomplishing, not their challenges."}, {"text": "Why Spanish is losing speakers among younger generations", "isCorrect": false, "rationale": "The opposite is true — indigenous youth in Ecuador and Bolivia are actually working to preserve their ancestral languages alongside Spanish."}]}, {"question": "What does 'Espero lograr mis metas' mean?", "options": [{"text": "I hope you achieve your goals.", "isCorrect": false, "rationale": "The speaker is talking about their OWN goals. When both verbs have the SAME subject, you use infinitive: 'Espero lograr' (I hope to achieve). If a different subject: 'Espero que tu logres.'"}, {"text": "I hope to achieve my goals.", "isCorrect": true, "rationale": "When 'esperar' has the SAME subject as the second verb, the infinitive is used (not the subjunctive): 'Espero lograr mis metas' = I hope to achieve my goals."}, {"text": "She hopes to achieve my goals.", "isCorrect": false, "rationale": "'Espero' is the yo form (I hope). The sentence means: I (yo) hope to achieve MY goals."}, {"text": "I am going to achieve my goals.", "isCorrect": false, "rationale": "'Voy a lograr mis metas' would mean I am going to achieve my goals (ir + a). 'Espero lograr' means I hope to achieve."}]}, {"question": "What does 'la salida' mean, and why is it important to know?", "options": [{"text": "Success — it is the true Spanish word for success", "isCorrect": false, "rationale": "Success is 'el exito'. 'La salida' is the exit — the way out of a building."}, {"text": "The exit (the way out of a building) — it is the true Spanish word for what English speakers might mistakenly call 'exito'", "isCorrect": true, "rationale": "The false cognate note explains: 'The Spanish word for exit is la salida. So when you see a sign on a building that says Salida, it means the way out — not success!'"}, {"text": "The beginning — the start of a journey or project", "isCorrect": false, "rationale": "Beginning/start is 'el comienzo' or 'el inicio'. 'La salida' means the exit."}, {"text": "A departure or journey — as in leaving for a long trip", "isCorrect": false, "rationale": "While salir means to leave/depart, 'la salida' in the context of the false cognate note specifically means EXIT (the sign on a building)."}]}, {"question": "What does the future vision memory technique ask you to picture?", "options": [{"text": "Yourself ten years in the past, using Spanish with your family", "isCorrect": false, "rationale": "The technique looks FORWARD: picture yourself five years from NOW using Spanish fluently in a real situation."}, {"text": "Yourself five years from now, using Spanish fluently in a real situation", "isCorrect": true, "rationale": "The memory tip: 'Close your eyes. Picture yourself five years from now, using Spanish fluently in a real situation. Ask yourself: Where am I? Who am I speaking with? What am I doing with my Spanish?'"}, {"text": "A famous Spanish-speaking person whose career you admire", "isCorrect": false, "rationale": "Visualizing famous people was the technique for professions. The future vision technique focuses on YOUR OWN future using Spanish."}, {"text": "A map of all Spanish-speaking countries you want to visit", "isCorrect": false, "rationale": "The future vision technique focuses on a personal scene of yourself speaking Spanish fluently, not a geography visualization."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
