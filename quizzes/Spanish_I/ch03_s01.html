<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the \"¡Fíjate!\" box, what does the Spanish phrase \"los padres\" typically refer to in a general context?", "options": [{"text": "Only the fathers of a family.", "isCorrect": false, "rationale": "While 'los padres' can mean 'the fathers,' the text specifies that it 'more often' means 'the parents,' including both genders."}, {"text": "A mixed group of male and female parents, or parents in general.", "isCorrect": true, "rationale": "The '¡Fíjate!' box explicitly states that 'los padres means “the fathers” or, more often, “the parents,”' indicating its use for a mixed-gender group or parents in general."}, {"text": "Only the mothers of a family.", "isCorrect": false, "rationale": "'Las madres' would refer to mothers. 'Los padres' is the masculine plural form."}, {"text": "Grandparents exclusively.", "isCorrect": false, "rationale": "Grandparents are specifically referred to as 'los abuelos' in Spanish."}], "id": "q01"}, {"question": "Imagine you are describing a group of your cousins, some of whom are male and some female. Based on the \"¡Fíjate!\" rule, which Spanish term would you use?", "options": [{"text": "Las primas", "isCorrect": false, "rationale": "'Las primas' refers specifically to female cousins."}, {"text": "Los primos", "isCorrect": true, "rationale": "The '¡Fíjate!' box explicitly states that for a mixed group of males and females, the masculine plural form is used. Therefore, 'los primos' would refer to a mixed group of cousins."}, {"text": "Las primas y los primos", "isCorrect": false, "rationale": "While grammatically correct, the '¡Fíjate!' rule highlights that 'los primos' alone is sufficient and more common for a mixed group."}, {"text": "Los parientes", "isCorrect": false, "rationale": "'Los parientes' means 'relatives' in general, not specifically cousins."}], "id": "q02"}, {"question": "What is the ultimate goal of \"El método de la palabra clave\" as described in the text?", "options": [{"text": "To practice Spanish pronunciation with native speakers.", "isCorrect": false, "rationale": "The keyword method focuses on word meaning recall, not pronunciation practice."}, {"text": "To create a quick and effective way to recall the meaning of Spanish words.", "isCorrect": true, "rationale": "The text explains the method helps the image pop up 'and gives you the meaning,' directly linking it to word recall and retention."}, {"text": "To improve writing skills by associating Spanish words with English equivalents.", "isCorrect": false, "rationale": "The method is designed for recalling meaning, not directly for improving writing skills."}, {"text": "To learn grammar rules by visualizing verb conjugations.", "isCorrect": false, "rationale": "The keyword method is presented for vocabulary acquisition, not grammar rules or verb conjugations."}], "id": "q03"}, {"question": "The text advises making keyword images \"sillier.\" Why is silliness considered beneficial for this language learning method?", "options": [{"text": "Silly images are easier to draw, saving time.", "isCorrect": false, "rationale": "The method emphasizes mental images, not necessarily drawing, and ease of drawing is not the primary benefit mentioned."}, {"text": "The funnier the image, the more likely you are to share it with others.", "isCorrect": false, "rationale": "Sharing images is not mentioned as a benefit of the method; the focus is on individual recall."}, {"text": "Highly memorable and distinctive images are more effective for recall and retention.", "isCorrect": true, "rationale": "The text states, 'The sillier your image, the better it sticks!' indicating that memorability and retention are enhanced by vivid, unusual, or silly associations."}, {"text": "Silliness is a universal emotion, making it culturally appropriate for all learners.", "isCorrect": false, "rationale": "While silliness might be universal, its cultural appropriateness is not the reason cited for its effectiveness in the keyword method."}], "id": "q04"}, {"question": "If you were to apply the Keyword Method to learn the Spanish word \"tío\" (uncle), which of the following approaches best demonstrates the method's three steps?", "options": [{"text": "Practicing \"tío\" in sentences until it becomes natural.", "isCorrect": false, "rationale": "This describes a general practice method, not the specific keyword method with its three steps."}, {"text": "Writing \"tío\" and its English translation \"uncle\" repeatedly.", "isCorrect": false, "rationale": "This is rote memorization, which is different from the visual and associative nature of the keyword method."}, {"text": "Imagining your 'TIE-DYE' wearing 'uncle' to connect the sound 'tío' with the meaning.", "isCorrect": true, "rationale": "This option directly follows the three steps: finding an English sound-alike ('tie-dye' for 'tío'), creating a vivid mental image (uncle wearing tie-dye), and connecting the sound to the meaning."}, {"text": "Looking up \"tío\" in a Spanish dictionary and memorizing the definition.", "isCorrect": false, "rationale": "This is a basic research and memorization step, lacking the associative imagery central to the keyword method."}], "id": "q05"}, {"question": "Based on the \"La familia en Colombia\" section, what significant role do grandparents (los abuelos) often play in Colombian families?", "options": [{"text": "They primarily manage the family's financial affairs.", "isCorrect": false, "rationale": "The text does not mention financial management as their primary role."}, {"text": "They often live with their children and grandchildren, actively helping to raise the younger generation.", "isCorrect": true, "rationale": "The text explicitly states, 'It is very common for grandparents (los abuelos) to live with their children and grandchildren, helping to raise the younger generation.'"}, {"text": "They are typically expected to move to retirement homes once their children are grown.", "isCorrect": false, "rationale": "This contradicts the text, which describes them living with their families."}, {"text": "Their main role is to organize extended family gatherings.", "isCorrect": false, "rationale": "While they might attend or participate, the text highlights their role in raising the younger generation, not primarily organizing events."}], "id": "q06"}, {"question": "What is a common and important social event for extended families in Colombia, as described in the text?", "options": [{"text": "Weekday evening dinners.", "isCorrect": false, "rationale": "The text emphasizes a specific weekly event, not general weekday dinners."}, {"text": "El almuerzo del domingo, a special Sunday lunch.", "isCorrect": true, "rationale": "The text clearly mentions, 'Sunday lunch (el almuerzo del domingo) is often a special occasion when the whole extended family gathers together.'"}, {"text": "Annual family vacations abroad.", "isCorrect": false, "rationale": "The text describes a regular, weekly gathering, not annual vacations."}, {"text": "Monthly formal meetings to discuss family business.", "isCorrect": false, "rationale": "The text describes a social and celebratory gathering, not a formal business meeting."}], "id": "q07"}, {"question": "The description of \"La familia en Colombia\" highlights strong family bonds as a \"source of great pride and comfort.\" What does this statement imply about the cultural significance of family in Colombia?", "options": [{"text": "Family connections are primarily important for economic stability.", "isCorrect": false, "rationale": "While family might contribute to economic stability, 'pride and comfort' suggest a deeper, emotional, and social significance beyond just economics."}, {"text": "Family provides emotional support and a sense of identity and belonging.", "isCorrect": true, "rationale": "Pride and comfort are emotional and psychological benefits, indicating that family provides a strong sense of identity, belonging, and emotional support."}, {"text": "Family structure dictates social hierarchy and class.", "isCorrect": false, "rationale": "The text focuses on love, closeness, and support, not on social hierarchy or class distinctions."}, {"text": "Colombian families prioritize individual achievements over collective well-being.", "isCorrect": false, "rationale": "The emphasis on gathering and living together, and collective pride, suggests a prioritization of collective well-being over individual achievement."}], "id": "q08"}, {"question": "Considering the entire section, from the introduction to the cultural box on Colombia, what is a central message conveyed about \"la familia\" in the Spanish-speaking world?", "options": [{"text": "Family structures are universally identical across all Spanish-speaking cultures.", "isCorrect": false, "rationale": "While 'central,' the text doesn't claim identical structures, only that family is important. Specifics like co-habitation of grandparents might vary."}, {"text": "Learning family vocabulary is less important than grammar in Spanish.", "isCorrect": false, "rationale": "The section dedicates significant attention to family vocabulary and its cultural importance, implying its high relevance."}, {"text": "Family holds a fundamental and deeply integrated role in daily life and culture.", "isCorrect": true, "rationale": "The section starts by calling family 'central to life' and reinforces this with the Colombian example, showing its fundamental and integrated role across the Spanish-speaking world."}, {"text": "The concept of family is primarily relevant for historical studies in colonial Latin America.", "isCorrect": false, "rationale": "The text states 'la familia has always been central,' indicating both historical and ongoing relevance, particularly with the contemporary Colombian example."}], "id": "q09"}, {"question": "Given the Colombian cultural context where extended families often live together, why would understanding the \"¡Fíjate!\" rule (masculine plural for mixed groups) be particularly practical for a Spanish learner discussing family in Colombia?", "options": [{"text": "It helps to differentiate between nuclear and extended family members precisely.", "isCorrect": false, "rationale": "The rule doesn't inherently differentiate between nuclear and extended family; it's about referring to mixed-gender groups."}, {"text": "It allows for concise and inclusive communication when referring to large, mixed-gender groups of relatives, such as grandparents or cousins living together.", "isCorrect": true, "rationale": "In a context where large, extended, and mixed-gender family groups (like 'los abuelos' or 'los primos') are common and frequently discussed, the masculine plural rule provides an efficient and inclusive way to refer to these groups without listing every gender explicitly."}, {"text": "It ensures that only formal terms are used, which is customary in Colombian family interactions.", "isCorrect": false, "rationale": "The rule is about grammatical gender agreement, not formality levels. The text does not imply increased formality for such terms."}, {"text": "It clarifies that only the male head of the household is referred to with a plural masculine term.", "isCorrect": false, "rationale": "The rule applies to any mixed-gender group, not specifically the male head of the household. 'Los padres' refers to both parents, not just the father as head."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
