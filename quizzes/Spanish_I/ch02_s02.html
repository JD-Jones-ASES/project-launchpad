<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason Spanish articles have more forms than English articles?", "options": [{"text": "To distinguish between formal and informal language usage.", "isCorrect": false, "rationale": "While Spanish has formal/informal distinctions, this applies to pronouns and verb conjugations, not directly to the number of article forms itself. The text does not mention this as a reason for article variation."}, {"text": "To match the gender and number of the noun they accompany.", "isCorrect": true, "rationale": "The text explicitly states: 'Spanish has more — because articles must match the gender and number of the noun they go with.' This is the fundamental rule governing the different forms of articles."}, {"text": "To indicate the tense of the verb in the sentence.", "isCorrect": false, "rationale": "Articles do not indicate verb tense; verbs themselves are conjugated to show tense. This is unrelated to the function of articles."}, {"text": "To specify whether the noun refers to a person, place, or thing.", "isCorrect": false, "rationale": "Articles apply to all nouns regardless of whether they are persons, places, or things. This is not the reason for the variation in article forms."}], "id": "q01"}, {"question": "Which of the following correctly pairs a definite article with a masculine plural noun?", "options": [{"text": "La libros", "isCorrect": false, "rationale": "'La' is a feminine singular definite article and does not match the masculine plural noun 'libros'."}, {"text": "El libros", "isCorrect": false, "rationale": "'El' is a masculine singular definite article and does not match the plural noun 'libros'."}, {"text": "Los libros", "isCorrect": true, "rationale": "'Los' is the masculine plural definite article, correctly matching the masculine plural noun 'libros'."}, {"text": "Unos libros", "isCorrect": false, "rationale": "'Unos' is an indefinite article ('some'), not a definite article ('the'), and while it matches gender and number, the question asks for a definite article."}], "id": "q02"}, {"question": "According to the 'helpful shortcut' for noun gender, which article would you most likely use with the noun 'mesa' (table)?", "options": [{"text": "El", "isCorrect": false, "rationale": "'El' is the masculine singular definite article. The shortcut states that most nouns ending in '-a' are feminine."}, {"text": "Un", "isCorrect": false, "rationale": "'Un' is the masculine singular indefinite article. 'Mesa' is typically feminine."}, {"text": "La", "isCorrect": true, "rationale": "The shortcut states that 'Most nouns ending in -a are feminine.' Therefore, 'mesa' (ending in -a) is feminine, and 'la' is the correct feminine singular definite article."}, {"text": "Las", "isCorrect": false, "rationale": "'Las' is the feminine plural definite article. 'Mesa' is singular."}], "id": "q03"}, {"question": "You want to say 'a book' in Spanish. Which indefinite article should you use for 'libro' (book)?", "options": [{"text": "Una", "isCorrect": false, "rationale": "'Una' is the feminine singular indefinite article. 'Libro' is masculine."}, {"text": "Unos", "isCorrect": false, "rationale": "'Unos' is the masculine plural indefinite article ('some'). The request is for 'a book' (singular)."}, {"text": "Un", "isCorrect": true, "rationale": "'Un' is the masculine singular indefinite article, correctly matching 'libro' (masculine singular)."}, {"text": "El", "isCorrect": false, "rationale": "'El' is a definite article ('the'), not an indefinite article ('a/an')."}], "id": "q04"}, {"question": "How would you correctly pluralize the phrase 'la silla' (the chair)?", "options": [{"text": "El sillas", "isCorrect": false, "rationale": "The article 'el' is masculine and singular, and does not match the feminine plural noun 'sillas'."}, {"text": "Las sillas", "isCorrect": true, "rationale": "To pluralize a noun ending in a vowel, you add '-s' (silla -> sillas). You must also change the article to match gender and number, so 'la' (f. singular) becomes 'las' (f. plural)."}, {"text": "La sillases", "isCorrect": false, "rationale": "The noun 'silla' ends in a vowel, so you only add '-s' to make it plural, not '-es'. The article also remains singular incorrectly."}, {"text": "Los sillas", "isCorrect": false, "rationale": "The article 'los' is masculine plural, and does not match the feminine plural noun 'sillas'."}], "id": "q05"}, {"question": "Applying the special pluralization rule, what is the correct plural form of 'lápiz' (pencil)?", "options": [{"text": "Lápizes", "isCorrect": false, "rationale": "When a noun ends in '-z', the 'z' changes to 'c' before adding '-es'. This option fails to make the 'z' to 'c' change."}, {"text": "Los lápices", "isCorrect": true, "rationale": "The rule states: 'When a noun ends in -z, the z changes to c before adding -es: lápiz → lápices.' Also, the article must change to 'los' to match the masculine plural noun."}, {"text": "La lápices", "isCorrect": false, "rationale": "While 'lápices' is the correct plural form, 'la' is a feminine singular article, which does not match the masculine plural noun 'lápices'."}, {"text": "Lápizs", "isCorrect": false, "rationale": "This option incorrectly adds an '-s' to a noun ending in '-z' without changing the 'z' and without adding '-es' as required by the rule for nouns ending in consonants."}], "id": "q06"}, {"question": "Which of the following nouns listed in the 'ojocuidado' section is an exception to the common gender rules based on its ending?", "options": [{"text": "La silla", "isCorrect": false, "rationale": "'La silla' (feminine, ends in -a) follows the common rule that most nouns ending in -a are feminine, so it is not an exception."}, {"text": "El borrador", "isCorrect": false, "rationale": "'El borrador' (masculine, ends in a consonant) falls under the category of nouns that can be either gender and must be learned with their article, but it is not listed as an *exception* to the -o/-a pattern specifically."}, {"text": "El día", "isCorrect": true, "rationale": "The text states 'el día — day (ends in -a but is masculine!)' as a specific exception to the rule that most nouns ending in -a are feminine."}, {"text": "La clase", "isCorrect": false, "rationale": "'La clase' (feminine, ends in -e) is a noun that must be learned with its article, but it is not listed as an exception to the -o/-a pattern in the 'ojocuidado' box."}], "id": "q07"}, {"question": "A student wants to ask about 'some maps' in the classroom. Knowing 'mapa' is masculine and an exception, what is the correct phrase?", "options": [{"text": "Unas mapas", "isCorrect": false, "rationale": "'Unas' is a feminine plural indefinite article, but 'mapa' is masculine. This does not match gender."}, {"text": "Los mapas", "isCorrect": false, "rationale": "'Los' is a definite article ('the'), not an indefinite article ('some') as requested by 'some maps'."}, {"text": "Unos mapas", "isCorrect": true, "rationale": "'Mapa' is masculine, and the question asks for 'some maps' (plural indefinite). 'Unos' is the correct masculine plural indefinite article, and 'mapas' is the correct plural form of 'mapa'."}, {"text": "La mapa", "isCorrect": false, "rationale": "'La' is a feminine singular article, and the question asks for plural masculine 'some maps'."}], "id": "q08"}, {"question": "Which sentence correctly uses an indefinite article for 'teacher' to refer to a *female* teacher?", "options": [{"text": "Es el maestra.", "isCorrect": false, "rationale": "'El' is a masculine definite article, which does not match 'maestra' (feminine) or the indefinite nature ('a female teacher')."}, {"text": "Es una maestra.", "isCorrect": true, "rationale": "'Una' is the feminine singular indefinite article, correctly matching 'maestra' (feminine singular) to mean 'a female teacher'."}, {"text": "Es un maestra.", "isCorrect": false, "rationale": "'Un' is a masculine singular indefinite article, which does not match 'maestra' (feminine)."}, {"text": "Es la maestra.", "isCorrect": false, "rationale": "'La' is a feminine definite article ('the female teacher'), not an indefinite article ('a female teacher')."}], "id": "q09"}, {"question": "When referring to a 'student,' the vocabulary list notes 'el/la estudiante.' What does this special notation indicate?", "options": [{"text": "The word 'estudiante' can be either masculine or feminine, but the article 'el' is always used.", "isCorrect": false, "rationale": "The notation 'el/la estudiante' and the subsequent note 'only the article changes!' clearly indicate that both 'el' and 'la' are used depending on the student's gender."}, {"text": "The word 'estudiante' is used for both genders, and its gender is determined by the article that precedes it.", "isCorrect": true, "rationale": "The text specifically states: 'Notice: el/la estudiante uses the same form for masculine and feminine — only the article changes!' This means the noun form itself doesn't change, but the article 'el' or 'la' determines if it refers to a male or female student."}, {"text": "The word 'estudiante' is an irregular noun that does not require an article.", "isCorrect": false, "rationale": "The text emphasizes learning nouns with their articles and explicitly provides 'el/la estudiante' with articles, indicating articles are required."}, {"text": "The word 'estudiante' is always masculine, regardless of the person's gender.", "isCorrect": false, "rationale": "The notation 'el/la estudiante' contradicts this; it indicates the word can be used for both masculine ('el estudiante') and feminine ('la estudiante') students."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
