<script>
var QUESTIONS = [{"question": "What is a primary goal of learning the content in the \"¿De dónde eres?\" section?", "options": [{"text": "Mastering various conjugations of the verb 'estar'.", "isCorrect": false, "rationale": "While 'estar' is mentioned in the song activity, the section's primary focus, as stated in the introduction, is on using 'ser' to describe people and their origin, not a comprehensive study of 'estar' conjugations."}, {"text": "Identifying all members of a traditional Latin American family.", "isCorrect": false, "rationale": "The section mentions 'padre,' 'madre,' and 'abuelos' as examples, but identifying 'all' family members is not its main objective or a comprehensive part of its content."}, {"text": "Describing people and telling where they come from using 'ser' and nationality words.", "isCorrect": true, "rationale": "The introduction explicitly states, 'Now that you know ser, you can do something exciting: you can describe people and tell where they come from. In this section, you will add more words for people, learn some nationality words...'"}, {"text": "Memorizing traditional Latin American children's songs.", "isCorrect": false, "rationale": "The song 'Estrellita, ¿dónde estás?' is included as a memory tool and for cultural context, but its memorization is not presented as the primary goal of the entire section."}], "id": "q01"}, {"question": "Which of the following sentences correctly uses the Spanish word 'gente' (people)?", "options": [{"text": "La gente son muy amable.", "isCorrect": false, "rationale": "The note '¡Fíjate! La gente es...' explains that 'gente' is a singular noun in Spanish, even though it means 'people.' Therefore, it requires a singular verb form like 'es,' not the plural 'son'."}, {"text": "La gente es muy amable.", "isCorrect": true, "rationale": "As explicitly stated in the '¡Fíjate!' box, 'gente' is a singular noun in Spanish and correctly takes the singular verb 'es.' The example given is 'La gente es buena'."}, {"text": "Las gentes son muy amables.", "isCorrect": false, "rationale": "The Spanish word 'gente' is singular and does not typically form a plural 'gentes' in this context. It remains singular even when referring to multiple individuals."}, {"text": "El gente es muy amable.", "isCorrect": false, "rationale": "'Gente' is a feminine noun in Spanish, so it requires the feminine definite article 'La,' not the masculine 'El'."}], "id": "q02"}, {"question": "If you are describing a woman whose origin is Colombia, which nationality adjective form would you correctly use?", "options": [{"text": "colombiano", "isCorrect": false, "rationale": "'Colombiano' is the masculine singular form of the adjective. It would be used for a male person."}, {"text": "colombiana", "isCorrect": true, "rationale": "According to the 'Las nacionalidades' grammar box, feminine forms typically end in -a. Since the person described is a woman, the feminine singular form 'colombiana' is correct."}, {"text": "colombianos", "isCorrect": false, "rationale": "'Colombianos' is the masculine plural form. It would be used for a group of men or a mixed-gender group."}, {"text": "colombianas", "isCorrect": false, "rationale": "'Colombianas' is the feminine plural form. It would be used for a group of women."}], "id": "q03"}, {"question": "You want to say, 'My grandparents are American (from the U.S.).' How would you correctly form the nationality adjective in Spanish, considering 'abuelos' is masculine plural?", "options": [{"text": "estadounidense", "isCorrect": false, "rationale": "'Estadounidense' is the singular form. Nationality adjectives must agree in number, so a plural form is needed for 'abuelos' (grandparents)."}, {"text": "estadounidenses", "isCorrect": true, "rationale": "The section states that nationality adjectives must agree in number. 'Estadounidense' is a gender-neutral adjective. To make it plural for 'mis abuelos' (grandparents, a plural noun), an -s is added, resulting in 'estadounidenses'."}, {"text": "estadounidensea", "isCorrect": false, "rationale": "This is not a recognized form of the adjective 'estadounidense.' Gender agreement for this word is not achieved by adding an -a suffix."}, {"text": "americanos", "isCorrect": false, "rationale": "While 'americano/a' means 'American' in a broader sense, the text specifically provides 'estadounidense' as the example for 'American / from the U.S.' and for this specific context, 'estadounidenses' is the more precise and directly taught term from the section."}], "id": "q04"}, {"question": "The song title \"Estrellita, ¿dónde estás?\" uses a form of 'estar.' Based on the 'Después de la canción' activity, why is 'estar' used instead of 'ser' in this context?", "options": [{"text": "'Estar' is used because the star's existence is temporary.", "isCorrect": false, "rationale": "The section does not imply the star's existence is temporary; rather, it focuses on its current state or position. This is not the reason provided for using 'estar'."}, {"text": "'Estar' is always used when directly addressing an inanimate object.", "isCorrect": false, "rationale": "This is not a general rule for 'estar' and is not the specific reason given in the text for its use in the song title."}, {"text": "'Estar' is used to indicate location.", "isCorrect": true, "rationale": "The 'Después de la canción' activity explicitly asks, 'Based on what you learned today about ser vs. estar, why do you think this song uses estar instead of ser? (Hint: which verb is used for location?)' This confirms 'estar' is used for location."}, {"text": "'Ser' is reserved for permanent characteristics, and a star's location can change.", "isCorrect": false, "rationale": "While 'ser' is for permanent characteristics, the direct reason given in the activity for 'estar' is its use for location, not merely the impermanence of location. It's a related concept but not the explicit rationale provided."}], "id": "q05"}, {"question": "Beyond asking for a location, what deeper theme does the description of the song \"Estrellita, ¿dónde estás?\" suggest it evokes?", "options": [{"text": "The importance of family and lineage.", "isCorrect": false, "rationale": "The song lyrics and description do not focus on family connections, though family is mentioned elsewhere in the section."}, {"text": "A sense of wonder and imagination about the world.", "isCorrect": true, "rationale": "The text states, 'But in Spanish, the song has its own lovely words, full of wonder and imagination.' This directly describes the deeper theme evoked by the lyrics."}, {"text": "The challenges children face in growing up.", "isCorrect": false, "rationale": "This is too abstract and not directly supported by the description of the song or its lyrics, which are more about observation and questioning."}, {"text": "The scientific properties of celestial bodies.", "isCorrect": false, "rationale": "While it mentions a star, the song is a children's tune described as being 'full of wonder and imagination,' not a scientific explanation."}], "id": "q06"}, {"question": "What popular English song shares its melody with the traditional Latin American children's song \"Estrellita, ¿dónde estás?\"?", "options": [{"text": "\"Old MacDonald Had a Farm\"", "isCorrect": false, "rationale": "This melody is not mentioned in the text as being related to 'Estrellita, ¿dónde estás?'"}, {"text": "\"Mary Had a Little Lamb\"", "isCorrect": false, "rationale": "This melody is not mentioned in the text as being related to 'Estrellita, ¿dónde estás?'"}, {"text": "\"Twinkle, Twinkle, Little Star\"", "isCorrect": true, "rationale": "The text explicitly states, 'You may already know its melody — it is the same tune as the English song “Twinkle, Twinkle, Little Star.”'"}, {"text": "\"Happy Birthday to You\"", "isCorrect": false, "rationale": "This melody is not mentioned in the text as being related to 'Estrellita, ¿dónde estás?'"}], "id": "q07"}, {"question": "What is the primary cultural significance of a quinceañera celebration?", "options": [{"text": "It is a celebration of a girl's academic achievements in school.", "isCorrect": false, "rationale": "The text does not mention academic achievements as the primary purpose of a quinceañera."}, {"text": "It marks a girl's passage from childhood to young womanhood.", "isCorrect": true, "rationale": "The 'La quinceañera' culture box states, 'The quinceañera celebration marks a girl's passage from childhood to young womanhood, and it is a big deal in many Latin American families!'"}, {"text": "It serves as a formal introduction of a young woman to the community for marriage prospects.", "isCorrect": false, "rationale": "While it's a social event, the text describes it as a transition to young womanhood, not specifically for marriage prospects."}, {"text": "It is an annual family reunion to honor ancestors.", "isCorrect": false, "rationale": "The text clearly states it's a 'special party held when a girl turns fifteen years old,' not an annual reunion to honor ancestors."}], "id": "q08"}, {"question": "Based on the information provided, what does the word 'quinceañera' literally mean in relation to the celebration?", "options": [{"text": "The ceremony of the five gifts.", "isCorrect": false, "rationale": "The text explains the etymology as 'quince' (fifteen) and 'años' (years), not related to five gifts."}, {"text": "A girl who is fifteen years old.", "isCorrect": true, "rationale": "The culture box states, 'The word itself comes from quince (fifteen) and años (years). The birthday girl, called la quinceañera...' This indicates it literally refers to the fifteen-year-old girl or the celebration of her fifteen years."}, {"text": "A dance for young women.", "isCorrect": false, "rationale": "While dancing (a waltz) is part of the celebration, the word 'quinceañera' itself refers to the age and the girl, not specifically the dance."}, {"text": "The tradition of the family.", "isCorrect": false, "rationale": "It is a tradition, but the word's literal meaning is tied to the age 'fifteen years,' not 'tradition of the family.'"}], "id": "q09"}, {"question": "You want to say, 'My parents are Mexican.' How would you correctly form the nationality adjective in Spanish, considering 'padre' (father) and 'madre' (mother) are involved?", "options": [{"text": "mexicana", "isCorrect": false, "rationale": "'Mexicana' is the feminine singular form. Since 'parents' includes both a father and a mother, the masculine plural form is typically used for mixed-gender groups."}, {"text": "mexicanas", "isCorrect": false, "rationale": "'Mexicanas' is the feminine plural form, which would only be used if referring exclusively to multiple mothers or a group of women."}, {"text": "mexicanos", "isCorrect": true, "rationale": "According to Spanish grammar rules for nationality adjectives (and adjectives in general), when referring to a mixed-gender plural group (like 'parents' – father and mother), the masculine plural form ('mexicanos') is used."}, {"text": "mexicanes", "isCorrect": false, "rationale": "'Mexicanes' is not a valid or standard form for the nationality adjective 'Mexican' in Spanish."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
