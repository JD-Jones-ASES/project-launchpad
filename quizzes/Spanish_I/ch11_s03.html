<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the Southern Hemisphere, what season is December?", "options": [{"text": "Summer", "isCorrect": true, "rationale": "In the Southern Hemisphere (Chile, Argentina), seasons are reversed: December is summer and July is winter."}, {"text": "Winter", "isCorrect": false, "rationale": "July is winter in the Southern Hemisphere, not December."}, {"text": "Spring", "isCorrect": false, "rationale": "Spring in the Southern Hemisphere occurs around September–November."}, {"text": "Autumn", "isCorrect": false, "rationale": "Autumn in the Southern Hemisphere occurs around March–May."}]}, {"question": "What does 'casi nunca llueve' mean?", "options": [{"text": "It almost never rains", "isCorrect": true, "rationale": "'casi nunca' means 'almost never' and 'llueve' means 'it rains.'"}, {"text": "It rains almost every day", "isCorrect": false, "rationale": "This would be 'llueve casi todos los días.' 'Casi nunca' means the opposite."}, {"text": "It never snows", "isCorrect": false, "rationale": "'nieva' means 'it snows.' 'Llueve' means 'it rains.'"}, {"text": "The rain is very light", "isCorrect": false, "rationale": "The sentence describes frequency (how often), not intensity."}]}, {"question": "According to the reading, which country has only a dry season and a rainy season instead of four seasons?", "options": [{"text": "Colombia", "isCorrect": true, "rationale": "The text states: 'En Colombia, cerca del ecuador, no hay cuatro estaciones: hay una estación seca y una estación lluviosa.'"}, {"text": "Chile", "isCorrect": false, "rationale": "Chile has diverse climates but the text describes Colombia as having only two seasons."}, {"text": "Venezuela", "isCorrect": false, "rationale": "Venezuela is described as having mountains with snow and tropical beaches."}, {"text": "Argentina", "isCorrect": false, "rationale": "Argentina has cold, humid winters in Buenos Aires and four seasons."}]}, {"question": "What does 'el sur' mean?", "options": [{"text": "The south", "isCorrect": true, "rationale": "'el sur' is the Spanish word for 'the south,' one of the four compass directions."}, {"text": "The sun", "isCorrect": false, "rationale": "'el sol' means the sun. 'el sur' is a direction."}, {"text": "The earth", "isCorrect": false, "rationale": "'la tierra' means the earth. 'el sur' means the south."}, {"text": "The floor", "isCorrect": false, "rationale": "'el suelo' means the floor or ground. 'el sur' is a compass direction."}]}, {"question": "What activity is mentioned for the summer season in the chapter's seasonal table?", "options": [{"text": "Nadamos (we swim)", "isCorrect": true, "rationale": "The chapter notes 'nadamos' (we swim) as a new verb appearing in the seasonal activity table."}, {"text": "Patinamos (we skate)", "isCorrect": false, "rationale": "Skating is not mentioned; swimming (nadamos) is highlighted as a new verb."}, {"text": "Esquiamos (we ski)", "isCorrect": false, "rationale": "Skiing is associated with winter; the text highlights 'nadamos' as a featured new verb."}, {"text": "Jugamos (we play)", "isCorrect": false, "rationale": "While jugar was learned earlier, the specifically highlighted new verb in this section is 'nadamos.'"}]}, {"question": "Which phrase describes wearing appropriate clothing for cold weather?", "options": [{"text": "Llevar ropa abrigada", "isCorrect": true, "rationale": "'ropa abrigada' means 'warm clothing.' 'Llevar' means to wear or carry."}, {"text": "Llevar ropa ligera", "isCorrect": false, "rationale": "'ropa ligera' means light or thin clothing, appropriate for hot weather, not cold."}, {"text": "Ponerse sandalias", "isCorrect": false, "rationale": "Sandals are for warm weather. Cold weather requires 'ropa abrigada.'"}, {"text": "Salir al aire libre", "isCorrect": false, "rationale": "'al aire libre' means outdoors; this describes where to go, not what to wear."}]}, {"question": "What does 'todo el año' mean?", "options": [{"text": "All year long", "isCorrect": true, "rationale": "'todo' means 'all' and 'el año' means 'the year,' so 'todo el año' = 'all year long.'"}, {"text": "Every day", "isCorrect": false, "rationale": "'todos los días' means every day. 'Todo el año' refers to the entire year."}, {"text": "This year", "isCorrect": false, "rationale": "'este año' means this year. 'Todo el año' means all year long."}, {"text": "Next year", "isCorrect": false, "rationale": "'el año que viene' or 'el próximo año' means next year. 'Todo el año' means all year long."}]}, {"question": "According to the reading, what is the climate like in the Atacama Desert in northern Chile?", "options": [{"text": "Very dry — it almost never rains", "isCorrect": true, "rationale": "The text says: 'en Chile, en el norte, el desierto de Atacama es muy seco — casi nunca llueve.'"}, {"text": "Very rainy and tropical", "isCorrect": false, "rationale": "The Atacama is described as very dry ('muy seco'). Tropical rain is not mentioned."}, {"text": "Cold and snowy year-round", "isCorrect": false, "rationale": "Snow is mentioned in Venezuela's mountains, not the Atacama. The Atacama is described as dry."}, {"text": "Windy and cloudy", "isCorrect": false, "rationale": "Windy and cloudy weather is described for Buenos Aires in winter, not the Atacama."}]}, {"question": "What does 'la estación lluviosa' mean?", "options": [{"text": "The rainy season", "isCorrect": true, "rationale": "'lluviosa' comes from 'lluvia' (rain), so 'la estación lluviosa' = the rainy season."}, {"text": "The dry season", "isCorrect": false, "rationale": "The dry season is 'la estación seca.' 'Lluviosa' means rainy."}, {"text": "Summer", "isCorrect": false, "rationale": "'el verano' means summer. 'Estación lluviosa' is a season defined by rain, not temperature."}, {"text": "The spring season", "isCorrect": false, "rationale": "'la primavera' means spring. 'Estación lluviosa' means rainy season."}]}, {"question": "In the model response for the writing activity, which verb is used to say 'I go out'?", "options": [{"text": "Salgo", "isCorrect": true, "rationale": "The model response uses 'Salgo a nadar,' from the irregular -go verb 'salir' (yo form: salgo)."}, {"text": "Voy", "isCorrect": false, "rationale": "'Voy' is from 'ir.' The model uses 'Salgo' (from salir = to go out/leave)."}, {"text": "Salgo", "isCorrect": false, "rationale": "This is the same as the correct answer. Only one correct option is intended."}, {"text": "Hago", "isCorrect": false, "rationale": "'Hago' is from 'hacer.' The model says 'Salgo a nadar' (I go out to swim)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
