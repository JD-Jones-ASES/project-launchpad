<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which vowel change occurs in o→ue stem-changing verbs?", "options": [{"text": "The 'o' in the ending changes to 'ue'.", "isCorrect": false, "rationale": "The change happens in the STEM (before the ending), not in the ending itself."}, {"text": "The 'o' in the stem changes to 'ue' in all boot forms (yo, tú, él/ella, ellos).", "isCorrect": true, "rationale": "In o→ue verbs, the stem vowel o changes to ue in the four boot forms, just like the e→ie pattern. Nosotros stays regular."}, {"text": "The 'o' changes to 'ue' in ALL forms including nosotros.", "isCorrect": false, "rationale": "The nosotros form is outside the boot and keeps the regular o: podemos, dormimos, jugamos."}, {"text": "The 'ue' is added as a prefix to the entire verb.", "isCorrect": false, "rationale": "The change applies only to the stem vowel, not as a prefix to the whole verb."}]}, {"question": "What is the yo form of 'poder' (to be able to / can)?", "options": [{"text": "podo", "isCorrect": false, "rationale": "Podo does not apply the o→ue change. Correct: pod- → pued- + o = puedo."}, {"text": "puedo", "isCorrect": true, "rationale": "The yo form of poder applies the o→ue stem change: pod- → pued- + o = puedo."}, {"text": "podemos", "isCorrect": false, "rationale": "Podemos is the nosotros form (outside the boot, no stem change)."}, {"text": "pueden", "isCorrect": false, "rationale": "Pueden is the ellos/ellas form. The yo form is puedo."}]}, {"question": "What makes 'jugar' special among o→ue stem-changing verbs?", "options": [{"text": "Jugar has an extra irregular yo form ending in -go.", "isCorrect": false, "rationale": "Jugar does not have a -go ending. Its special feature is that it changes u→ue, not o→ue."}, {"text": "Jugar changes u→ue instead of o→ue — it is the only common verb with this pattern.", "isCorrect": true, "rationale": "Jugar is the only common verb with a u→ue stem change (juego, juegas, juega, jugamos, juegan). It follows the exact same boot pattern as o→ue verbs."}, {"text": "Jugar is an -ir verb, unlike other verbs in this group.", "isCorrect": false, "rationale": "Jugar ends in -ar. It is an -ar verb with the special u→ue stem change."}, {"text": "Jugar does not follow the boot pattern.", "isCorrect": false, "rationale": "Jugar follows the exact same boot pattern: stem changes in yo, tú, él/ella, ellos — but not in nosotros (jugamos)."}]}, {"question": "What does 'el tiempo' mean, and why is it tricky?", "options": [{"text": "It only means 'time' — there is no other meaning.", "isCorrect": false, "rationale": "El tiempo has two meanings: time AND weather. Context determines which is intended."}, {"text": "It means both 'time' and 'weather' — context determines the meaning.", "isCorrect": true, "rationale": "El tiempo is a tricky word: No tengo tiempo (I don't have time) vs. ¿Qué tiempo hace? (What is the weather like?). Context always makes the meaning clear."}, {"text": "It only means 'weather' — 'time' is expressed with 'la hora'.", "isCorrect": false, "rationale": "El tiempo means both time and weather. La hora refers specifically to the clock time (the hour)."}, {"text": "It is always masculine when meaning weather and feminine when meaning time.", "isCorrect": false, "rationale": "El tiempo is masculine in both meanings. The gender does not change based on which meaning is used."}]}, {"question": "Which sentence correctly uses the o→ue stem-changing verb 'volver' (to return)?", "options": [{"text": "Ella volvemos a casa.", "isCorrect": false, "rationale": "Volvemos is the nosotros form. For ella, apply the boot change: volv- → vuelv- + e = vuelve."}, {"text": "Ella vuelve a casa.", "isCorrect": true, "rationale": "The ella form of volver applies the o→ue change: volv- → vuelv- + e = vuelve. Ella vuelve a casa = She returns home."}, {"text": "Ella volve a casa.", "isCorrect": false, "rationale": "Volve does not exist. Apply the o→ue change: vuelve."}, {"text": "Ella volvo a casa.", "isCorrect": false, "rationale": "Volvo is not a Spanish verb form. The ella form of volver is vuelve."}]}, {"question": "About the song 'Cielito lindo' — what does 'cielito lindo' literally mean and what is it used as?", "options": [{"text": "Little blue sky — used to describe the weather", "isCorrect": false, "rationale": "Cielito lindo means lovely little sky, not specifically blue sky. In the song it is used as a term of affection, not a weather description."}, {"text": "Lovely little sky — used as a term of affection", "isCorrect": true, "rationale": "Cielito lindo literally translates as lovely little sky or beautiful little darling. In the song it is used as an endearing term of affection."}, {"text": "Beautiful morning — used to greet the new day", "isCorrect": false, "rationale": "Cielito refers to the sky/heaven, not specifically morning. And it is used as a term of affection for a person, not a greeting to the day."}, {"text": "Happy heart — used to express joy", "isCorrect": false, "rationale": "Cielito comes from cielo (sky/heaven), not corazón (heart). It is used as a term of affection."}]}, {"question": "How would you say 'We sleep until nine o'clock' using 'dormir' (o→ue)?", "options": [{"text": "Dormimos hasta las nueve.", "isCorrect": true, "rationale": "Dormimos is the nosotros form of dormir — it is outside the boot, so the stem stays dorm- (no ue change). Correct!"}, {"text": "Duermimos hasta las nueve.", "isCorrect": false, "rationale": "The nosotros form is outside the boot and does NOT apply the o→ue change. It stays dormimos."}, {"text": "Duermos hasta las nueve.", "isCorrect": false, "rationale": "This misapplies the stem change and drops the -im- of the nosotros ending. The correct form is dormimos."}, {"text": "Duermen hasta las nueve.", "isCorrect": false, "rationale": "Duermen is the ellos/ellas form. For nosotros, the correct form is dormimos (outside the boot, no vowel change)."}]}, {"question": "The 'boot' memory technique involves drawing what shape around the changing forms?", "options": [{"text": "A circle around all six forms.", "isCorrect": false, "rationale": "A circle would include nosotros, which is outside the boot. The shape drawn around the four changing forms looks like a boot or shoe."}, {"text": "A boot/shoe shape around yo, tú, él/ella, and ellos — leaving nosotros outside.", "isCorrect": true, "rationale": "Drawing a boot shape around the four forms that change (yo, tú, él/ella, ellos) and leaving nosotros outside gives you the visual memory tool. Inside the boot: vowel changes. Outside: regular."}, {"text": "A star shape around only the yo and él/ella forms.", "isCorrect": false, "rationale": "The boot includes four forms (yo, tú, él/ella, ellos), not just two. A star or small shape would not capture all changing forms."}, {"text": "A square around all forms except yo.", "isCorrect": false, "rationale": "The yo form IS inside the boot (it changes). It is the nosotros form that is outside. The boot includes yo, tú, él/ella, and ellos."}]}, {"question": "What is the nosotros form of 'poder'?", "options": [{"text": "puedemos", "isCorrect": false, "rationale": "Puedemos incorrectly applies the boot change to nosotros. The nosotros form keeps the regular o: podemos."}, {"text": "podemos", "isCorrect": true, "rationale": "Nosotros is outside the boot, so the o stays regular: pod- + emos = podemos."}, {"text": "pueden", "isCorrect": false, "rationale": "Pueden is the ellos/ellas form. The nosotros form is podemos."}, {"text": "podo", "isCorrect": false, "rationale": "Podo is not a word. Neither podo nor puedo is the nosotros form. The nosotros form is podemos."}]}, {"question": "According to the culture box, how is el fútbol described in Honduras and Costa Rica?", "options": [{"text": "A professional sport watched only on television by adults.", "isCorrect": false, "rationale": "The culture box describes fútbol as something children play everywhere — streets, empty lots, schoolyards — not just a TV spectacle for adults."}, {"text": "Far more than a sport — a shared passion that connects communities across every social boundary.", "isCorrect": true, "rationale": "The culture box says el fútbol is far more than a sport in Honduras and Costa Rica — it is a shared passion that connects communities across every social boundary."}, {"text": "A recently introduced sport from Europe that is growing in popularity.", "isCorrect": false, "rationale": "Fútbol has deep cultural roots in Latin America; it is not described as recently introduced."}, {"text": "A sport played mainly in schools as physical education.", "isCorrect": false, "rationale": "The culture box describes fútbol as a community-wide passion played everywhere, not just in schools."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
