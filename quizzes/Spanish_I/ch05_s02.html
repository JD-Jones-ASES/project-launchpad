<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which form of 'estar' correctly completes the sentence: \"Nosotros _____ en la biblioteca.\"", "options": [{"text": "estoy", "isCorrect": false, "rationale": " 'Estoy' is the first-person singular form (yo). The subject 'Nosotros' (we) requires a plural form."}, {"text": "estamos", "isCorrect": true, "rationale": " 'Estamos' is the correct first-person plural form of 'estar', matching the subject 'Nosotros' (we)."}, {"text": "están", "isCorrect": false, "rationale": " 'Están' is the third-person plural form (ellos/ellas/ustedes). The subject 'Nosotros' requires the first-person plural."}, {"text": "está", "isCorrect": false, "rationale": " 'Está' is the third-person singular form (él/ella/usted). The subject 'Nosotros' requires a plural form."}]}, {"question": "According to the text, what is the fundamental difference in usage between 'ser' and 'estar'?", "options": [{"text": "'Ser' is used for permanent characteristics, while 'estar' is used for temporary states.", "isCorrect": false, "rationale": "While often true, this is a simplification and not the precise 'key question' stated in the text. The text defines the distinction more broadly."}, {"text": "'Ser' means \"to be\" and 'estar' means \"to exist.\"", "isCorrect": false, "rationale": "Both 'ser' and 'estar' translate to \"to be\" in English, as explicitly stated in the text."}, {"text": "'Ser' describes what something *is* (identity or inherent characteristic), while 'estar' describes *where* or *how* it is *right now* (location, temporary state, or result of action).", "isCorrect": true, "rationale": "This aligns directly with the 'Ojo, cuidado' box and the 'key question' provided in the text, which emphasizes the distinction between identity and current state/location."}, {"text": "'Ser' is primarily for people, and 'estar' is primarily for objects.", "isCorrect": false, "rationale": "This is an incorrect generalization; both verbs can be used for people and objects depending on what is being described."}]}, {"question": "Which of the following sentences correctly uses 'estar' to express location, as described in the text?", "options": [{"text": "Mi hermano es alto.", "isCorrect": false, "rationale": " 'Es' (from ser) is used here to describe an inherent, permanent characteristic (tall), not location."}, {"text": "El libro está en la mesa.", "isCorrect": true, "rationale": " 'Está' (from estar) is correctly used to indicate the physical location of the book, which is one of the primary uses of 'estar'."}, {"text": "La doctora es de España.", "isCorrect": false, "rationale": " 'Es' (from ser) is used here to indicate origin or identity (from Spain), not a temporary location."}, {"text": "Somos estudiantes.", "isCorrect": false, "rationale": " 'Somos' (from ser) is used here to describe an identity (students), not a location."}]}, {"question": "If you want to describe the coffee as being hot at this moment, which verb and form would you use, according to the section on temporary states and feelings?", "options": [{"text": "El café es caliente.", "isCorrect": false, "rationale": " 'Es' (from ser) would imply that the coffee is inherently hot, as a permanent characteristic. 'Estar' is used for temporary states like temperature 'right now'."}, {"text": "El café está caliente.", "isCorrect": true, "rationale": " 'Está' (from estar) is correctly used here to describe a temporary state (the coffee's temperature) 'right now', which is one of the main uses of 'estar'."}, {"text": "El café son caliente.", "isCorrect": false, "rationale": " 'Son' is the plural form of 'ser' and does not match the singular subject 'El café'. Also, 'ser' is incorrect for a temporary state."}, {"text": "El café están caliente.", "isCorrect": false, "rationale": " 'Están' is the plural form of 'estar' and does not match the singular subject 'El café'."}]}, {"question": "The sentence \"La sopa está lista\" is provided in the text as an example of which specific use of 'estar'?", "options": [{"text": "Describing a permanent characteristic.", "isCorrect": false, "rationale": " 'Estar' is not used for permanent characteristics; that is generally a function of 'ser'."}, {"text": "Expressing a temporary feeling.", "isCorrect": false, "rationale": "While 'estar' is used for feelings, 'estar lista' describes the state of the soup (ready) as a result of an action, not a feeling."}, {"text": "Indicating the result of an action.", "isCorrect": true, "rationale": "The text explicitly lists 'La sopa está lista' under 'Results of an action (How something ended up)', meaning it's ready because someone prepared it."}, {"text": "Stating a general truth.", "isCorrect": false, "rationale": " 'Estar' is not used for general truths; 'ser' is typically used for such statements."}]}, {"question": "The text specifically points out the accent marks in 'estás', 'está', and 'están'. What is their stated importance?", "options": [{"text": "They differentiate between singular and plural forms.", "isCorrect": false, "rationale": "While they do appear on some singular and plural forms, their primary importance is not solely this distinction. For example, 'estoy' is singular without an accent."}, {"text": "They change the fundamental meaning of the verb 'estar'.", "isCorrect": false, "rationale": "The accent marks don't change the verb's core meaning; they are part of its correct conjugation and pronunciation."}, {"text": "They are crucial for correct spelling and pronunciation.", "isCorrect": true, "rationale": "The text explicitly states: 'Notice the accent marks: estás, está, están. They are important for correct spelling and pronunciation!'"}, {"text": "They indicate that the sentence is a question.", "isCorrect": false, "rationale": "Accent marks are not exclusively used to indicate questions; question marks achieve that. The accents here are inherent to the verb's form."}]}, {"question": "Consider these two sentences: \"Él es médico.\" (He is a doctor.) and \"Él está enfermo.\" (He is sick.) What concept from the 'Ojo, cuidado' box best explains the choice of verb in the second sentence?", "options": [{"text": "'Estar' is used for identity, 'ser' for location.", "isCorrect": false, "rationale": "This statement incorrectly reverses the guidance from the 'Ojo, cuidado' box and misapplies the uses."}, {"text": "'Ser' describes what someone *is* (an inherent role/profession), while 'estar' describes *how* someone is *right now* (a temporary state or feeling).", "isCorrect": true, "rationale": "This accurately reflects the 'Ojo, cuidado' principle: 'ser' for identity/what someone is (a doctor), and 'estar' for how they are right now (being sick is a temporary state)."}, {"text": "'Ser' is for male subjects, 'estar' is for female subjects.", "isCorrect": false, "rationale": "This is incorrect; verb choice in Spanish is not determined by the gender of the subject in this way."}, {"text": "'Estar' is always used with adjectives describing health.", "isCorrect": false, "rationale": "While 'estar' is generally used for health, this option doesn't fully capture the underlying principle of 'how someone is right now' as opposed to their inherent identity, which is the core distinction highlighted."}]}, {"question": "In the initial examples provided, \"El pollo está delicioso hoy\" and \"Mis amigos están contentos\" both primarily illustrate which use of 'estar'?", "options": [{"text": "Location – where something/someone is.", "isCorrect": false, "rationale": "Neither sentence describes a physical location. They describe qualities or feelings."}, {"text": "Results of an action – how something ended up.", "isCorrect": false, "rationale": "While a meal results from an action, 'delicioso' focuses on the current taste, and 'contentos' describes a current feeling, which fall under temporary states rather than how something *ended up* in a consequential sense."}, {"text": "Temporary states and feelings – how something or someone is right now.", "isCorrect": true, "rationale": "The text explicitly groups these examples under the description 'They describe...how something tastes or feels right now, or how someone feels at this moment,' which corresponds directly to 'Temporary states and feelings'."}, {"text": "Permanent characteristics – what something or someone is always like.", "isCorrect": false, "rationale": "Both 'delicioso hoy' (delicious *today*) and 'contentos' (happy *at this moment*) imply a temporary nature, not permanence, which would typically use 'ser'."}]}, {"question": "You are helping a friend find their lost keys. They ask, \"¿Dónde _____ mis llaves?\" and when you find them, you exclaim, \"¡Aquí _____!\" Which forms of 'estar' correctly fill the blanks?", "options": [{"text": "estás, estás", "isCorrect": false, "rationale": " 'Estás' is for 'tú' (you singular informal). 'Mis llaves' (my keys) is a plural subject."}, {"text": "está, está", "isCorrect": false, "rationale": " 'Está' is for 'él/ella/usted' (he/she/you formal singular). 'Mis llaves' is a plural subject."}, {"text": "estamos, están", "isCorrect": false, "rationale": " 'Estamos' is for 'nosotros' (we), which doesn't fit the context about the keys' location. 'Están' is correct for the second blank, but the first is wrong."}, {"text": "están, están", "isCorrect": true, "rationale": " 'Están' is the correct third-person plural form of 'estar' for 'mis llaves' (my keys), which is a plural subject. Both instances are about the location of the keys ('where are they' and 'here they are')."}]}, {"question": "The text emphasizes, \"The key question is: are you describing what something IS (use ser), or where/how it is right now (use estar)?\" Which of the following sentences correctly applies the 'estar' part of this rule?", "options": [{"text": "La silla es de madera.", "isCorrect": false, "rationale": "This sentence describes *what* the chair *is* (its inherent material/composition), which requires 'ser'."}, {"text": "El niño es muy inteligente.", "isCorrect": false, "rationale": "This sentence describes *what* the child *is* (an inherent, characteristic quality), which requires 'ser'."}, {"text": "La comida está caliente.", "isCorrect": true, "rationale": "This sentence describes *how* the food is *right now* (its temporary temperature), which correctly uses 'estar' as per the rule for temporary states."}, {"text": "Mi casa es grande.", "isCorrect": false, "rationale": "This sentence describes *what* the house *is* (an inherent, characteristic size), which requires 'ser'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
