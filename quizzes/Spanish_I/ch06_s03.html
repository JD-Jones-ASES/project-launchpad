        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary difference between \"mañana\" (adverb) and \"la mañana\" (noun) as explained in the \"ojocuidado\" box?", "options": [{"text": "\"Mañana\" (adverb) is always about a specific time, and \"la mañana\" (noun) is about general time.", "isCorrect": false, "rationale": "This statement incorrectly describes the usage. The 'ojocuidado' box clarifies that 'mañana' (adverb) means 'tomorrow', indicating a future day, while 'la mañana' (noun) refers to 'the morning', a specific part of a day."}, {"text": "\"Mañana\" (adverb) refers to the future, while \"la mañana\" (noun) refers to a specific part of the day.", "isCorrect": true, "rationale": "As per the text, 'mañana' (adverb) translates to 'tomorrow' (e.g., Mañana es jueves.), indicating a future day. 'La mañana' (noun) means 'the morning' (e.g., de la mañana), referring to a period within a day."}, {"text": "\"Mañana\" (adverb) is formal, and \"la mañana\" (noun) is informal.", "isCorrect": false, "rationale": "The text does not mention any difference in formality between the two uses of 'mañana'."}, {"text": "\"Mañana\" (adverb) means 'later', while \"la mañana\" (noun) means 'now'.", "isCorrect": false, "rationale": "This is incorrect. 'Mañana' (adverb) means 'tomorrow', and 'la mañana' (noun) means 'the morning', neither of which directly translate to 'later' or 'now' in a way that distinguishes their primary meanings as described."}], "id": "q01"}, {"question": "According to Ana's schedule, what does she do \"al mediodía\"?", "options": [{"text": "She listens to music in art class.", "isCorrect": false, "rationale": "Ana listens to music in art class at nine o'clock, not 'al mediodía'."}, {"text": "She studies mathematics.", "isCorrect": false, "rationale": "Ana studies mathematics 'primero' (first), which would be before noon, specifically before her 9:00 AM art class."}, {"text": "She walks to the cafeteria and buys lunch.", "isCorrect": true, "rationale": "The text states, 'Al mediodía, camino a la cafetería y compro el almuerzo,' which means 'At noon, I walk to the cafeteria and buy lunch.'"}, {"text": "She returns home from school.", "isCorrect": false, "rationale": "Ana returns home 'a las cuatro y media' (at 4:30), not 'al mediodía'."}], "id": "q02"}, {"question": "Based on Ana's description of her day, which statement best characterizes her school experience?", "options": [{"text": "Ana has a very short school day, finishing before noon.", "isCorrect": false, "rationale": "Ana states that she always returns home 'a las cuatro y media!' (4:30), indicating a full school day, not a short one that finishes before noon."}, {"text": "Ana's day is primarily focused on social activities rather than academics.", "isCorrect": false, "rationale": "While she mentions talking with friends during recess, she also states 'estudio matemáticas' and 'escucho música en la clase de arte', and emphasizes 'Trabajo mucho en la escuela' (I work a lot in school), indicating a strong academic focus alongside social time."}, {"text": "Ana's schedule involves a mix of academic subjects and leisure/social time.", "isCorrect": true, "rationale": "Ana's day includes 'estudio matemáticas', 'escucho música en la clase de arte' (academics), and also 'camino a la cafetería y compro el almuerzo' and 'hablo con mis amigos en el recreo' (leisure/social), demonstrating a clear mix."}, {"text": "Ana does not enjoy school and only focuses on returning home.", "isCorrect": false, "rationale": "The text does not convey any negative sentiment about school; instead, her description of her activities and the phrase 'Trabajo mucho en la escuela' suggest engagement rather than dislike."}], "id": "q03"}, {"question": "According to the \"La hora en Cuba y Latinoamérica\" section, what is the cultural expectation for arriving at social events in many Latin American countries?", "options": [{"text": "Guests are expected to arrive exactly on time.", "isCorrect": false, "rationale": "The text explicitly states that 'arriving 15 to 30 minutes after the stated time is completely normal — and even expected!' for social events, directly contradicting the idea of arriving exactly on time."}, {"text": "Arriving 15 to 30 minutes after the stated time is common and often expected.", "isCorrect": true, "rationale": "The 'culturebox' clearly explains that for social events like parties or family gatherings, 'arriving 15 to 30 minutes after the stated time is completely normal — and even expected!'"}, {"text": "Guests should arrive much earlier to help the host prepare.", "isCorrect": false, "rationale": "The text mentions that guests who show up right at the announced time might find the host still getting ready, implying that arriving early is not the expectation for social events."}, {"text": "Punctuality is strictly enforced for all types of events, social or professional.", "isCorrect": false, "rationale": "The text differentiates, stating that while punctuality is expected in professional settings, it is relaxed for social events."}], "id": "q04"}, {"question": "A business professional from the United States is invited to a formal business meeting in Havana, Cuba. Based on the cultural information provided, when should they plan to arrive?", "options": [{"text": "15-30 minutes after the scheduled start time, embracing \"hora cubana.\"", "isCorrect": false, "rationale": "While 'hora cubana' applies to social events, the text specifically states: 'Important: Business meetings, school schedules, and official appointments are a different story — punctuality is expected in professional settings throughout Latin America, just as in the United States.'"}, {"text": "Exactly at the scheduled start time, as punctuality is expected in professional settings.", "isCorrect": true, "rationale": "The text explicitly warns that 'Business meetings, school schedules, and official appointments are a different story — punctuality is expected in professional settings throughout Latin America, just as in the United States.' Therefore, punctuality is key for a formal business meeting."}, {"text": "An hour late, as life in Cuba has an unhurried rhythm.", "isCorrect": false, "rationale": "Arriving an hour late is an extreme interpretation and incorrect for any context mentioned. The 'unhurried rhythm' applies to social life, not professional obligations where punctuality is expected."}, {"text": "Only after receiving a confirmation text from the host that they are ready.", "isCorrect": false, "rationale": "The text does not mention waiting for a confirmation text for professional meetings; it emphasizes expected punctuality."}], "id": "q05"}, {"question": "In Ana's schedule, the word \"primero\" means...?", "options": [{"text": "Later", "isCorrect": false, "rationale": "'Later' is not the correct translation for 'primero'. 'Después' would mean later."}, {"text": "First", "isCorrect": true, "rationale": "The key words list explicitly states 'primero = first'. Ana uses it to introduce her first activity: 'Primero, estudio matemáticas...'"}, {"text": "Sometimes", "isCorrect": false, "rationale": "'Sometimes' is not the correct translation for 'primero'. 'A veces' would mean sometimes."}, {"text": "At noon", "isCorrect": false, "rationale": "'At noon' is 'al mediodía', not 'primero'."}], "id": "q06"}, {"question": "At what time does Tomás typically arrive at school, according to his conversation with Camila?", "options": [{"text": "A las ocho de la mañana.", "isCorrect": false, "rationale": "Eight in the morning is when Ana arrives at school, not Tomás. Tomás states he arrives earlier."}, {"text": "A las siete y media.", "isCorrect": true, "rationale": "Tomás states, 'Llego a las siete y media' (I arrive at 7:30) in response to Camila's question about his arrival time."}, {"text": "A las diez de la mañana.", "isCorrect": false, "rationale": "Ten in the morning is when Tomás studies Spanish, not when he arrives at school."}, {"text": "A las cuatro y media.", "isCorrect": false, "rationale": "Four thirty is when Ana returns home, and is not mentioned by Tomás as his arrival time."}], "id": "q07"}, {"question": "Which of the following statements highlights a key difference between Ana and Tomás's morning routines?", "options": [{"text": "Both Ana and Tomás study Spanish first thing in the morning.", "isCorrect": false, "rationale": "Ana studies mathematics first, and Tomás studies Spanish at 10:00 AM, not first thing in the morning."}, {"text": "Tomás arrives at school earlier than Ana does.", "isCorrect": true, "rationale": "Tomás states he arrives 'a las siete y media' (7:30), while Ana states she arrives 'a las ocho de la mañana' (8:00), meaning Tomás arrives half an hour earlier than Ana."}, {"text": "Ana walks to school with her brother, while Tomás takes a bus.", "isCorrect": false, "rationale": "Tomás explicitly states, 'Siempre camino con mi hermano' (I always walk with my brother). Ana's mode of transport is not specified in the text."}, {"text": "Only Ana listens to music after school.", "isCorrect": false, "rationale": "Tomás responds 'Sí, siempre' (Yes, always) when Camila asks if he listens to music after school, indicating he also listens to music."}], "id": "q08"}, {"question": "If someone says, \"¡Regreso a casa a las cuatro y media!\", what activity are they most likely completing or preparing for?", "options": [{"text": "Starting their school day.", "isCorrect": false, "rationale": "Returning home at 4:30 PM indicates the end of a day's activities, not the beginning of a school day."}, {"text": "Eating lunch at the cafeteria.", "isCorrect": false, "rationale": "Lunch is typically eaten 'al mediodía' (at noon), not at 4:30 PM."}, {"text": "Finishing their school or work day.", "isCorrect": true, "rationale": "The phrase 'Regreso a casa' (I return home) at 4:30 PM, as stated by Ana after her school activities, clearly signifies the completion of her school day."}, {"text": "Attending an evening social event.", "isCorrect": false, "rationale": "4:30 PM is generally too early for an evening social event, and 'regreso a casa' implies returning from a primary daily activity, not preparing to leave for one."}], "id": "q09"}, {"question": "Based on the entire section \"Mi día,\" what is a central message conveyed about daily routines and cultural norms?", "options": [{"text": "All daily schedules in Spanish-speaking cultures are identical to those in the United States.", "isCorrect": false, "rationale": "The 'Hora Latina' culture box specifically highlights differences in expectations regarding punctuality between Latin American cultures (for social events) and the United States, indicating that schedules and norms are not identical."}, {"text": "Understanding specific time expressions and cultural nuances is crucial for navigating daily interactions.", "isCorrect": true, "rationale": "The section covers both the specific vocabulary for time (e.g., the dual meaning of 'mañana', 'al mediodía') and cultural nuances like 'hora latina,' emphasizing that both are vital for understanding daily life and avoiding misunderstandings."}, {"text": "Most students dislike school and only focus on their free time.", "isCorrect": false, "rationale": "Ana states 'Trabajo mucho en la escuela,' and Tomás enjoys music, but there's no indication that students universally dislike school or neglect their studies."}, {"text": "Punctuality is universally relaxed in all contexts across Latin American countries.", "isCorrect": false, "rationale": "The text explicitly states that while social events may have relaxed punctuality ('hora latina'), 'Business meetings, school schedules, and official appointments are a different story — punctuality is expected in professional settings'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
