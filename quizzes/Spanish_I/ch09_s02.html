<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the structure of the 'near future' construction in Spanish?", "options": [{"text": "[infinitive] + a + [conjugated verb]", "isCorrect": false, "rationale": "The order is reversed. The correct structure is [conjugated ir] + a + [infinitive]."}, {"text": "[conjugated ir] + a + [infinitive]", "isCorrect": true, "rationale": "The near future uses: conjugated form of ir + a + infinitive. Example: Voy a estudiar = I am going to study."}, {"text": "[conjugated ir] + [infinitive]", "isCorrect": false, "rationale": "The connector 'a' is required between the conjugated ir and the infinitive: ir + a + infinitive."}, {"text": "[ir] + que + [infinitive]", "isCorrect": false, "rationale": "The near future uses 'a' not 'que': voy a estudiar. Using 'que' creates a different structure (tener que + infinitive = to have to do something)."}]}, {"question": "How do you say 'I am going to eat pizza' using the near future?", "options": [{"text": "Voy comer pizza.", "isCorrect": false, "rationale": "The word 'a' is required between voy and the infinitive: Voy a comer pizza."}, {"text": "Voy a comer pizza.", "isCorrect": true, "rationale": "Voy (yo form of ir) + a + comer (infinitive) = Voy a comer pizza — I am going to eat pizza."}, {"text": "Ir a comer pizza.", "isCorrect": false, "rationale": "Ir must be conjugated to match the subject. For yo use voy: Voy a comer pizza."}, {"text": "Vamos a comer pizza.", "isCorrect": false, "rationale": "Vamos a comer pizza is correct for 'we are going to eat pizza,' not for the 'I' subject. For yo use Voy a comer pizza."}]}, {"question": "Why is the ir + a + infinitive construction so useful for everyday Spanish?", "options": [{"text": "Because it replaces all other verb tenses in modern Spanish.", "isCorrect": false, "rationale": "The near future does not replace all tenses; it is simply the most common way to talk about future plans in everyday spoken Spanish, especially in Latin America."}, {"text": "Because you can express almost any future idea using verbs you already know.", "isCorrect": true, "rationale": "Since you already know how to conjugate ir and dozens of infinitives, you can immediately express future plans. Spanish speakers use this structure constantly for everyday future plans."}, {"text": "Because it is the only way to talk about the future in Spanish.", "isCorrect": false, "rationale": "Spanish also has a full future tense with its own endings. The ir + a + infinitive structure is simply the most common in everyday speech."}, {"text": "Because it is simpler than present-tense conjugation.", "isCorrect": false, "rationale": "Present-tense conjugation is already simple. The appeal of ir + a + infinitive is its versatility for future plans, not comparative simplicity."}]}, {"question": "What does 'El sábado voy a caminar en el parque' mean?", "options": [{"text": "On Saturday I walked in the park.", "isCorrect": false, "rationale": "Voy a caminar is near future (I am going to walk), not past tense."}, {"text": "On Saturday I am going to walk in the park.", "isCorrect": true, "rationale": "El sábado = on Saturday; voy a caminar = I am going to walk; en el parque = in the park."}, {"text": "On Saturday I walk in the park every week.", "isCorrect": false, "rationale": "Voy a caminar expresses a specific future plan, not a habitual present action."}, {"text": "On Saturday we are going to walk in the park.", "isCorrect": false, "rationale": "Voy (yo form) means I am going to. For we, you would use vamos a caminar."}]}, {"question": "What is 'el patio de mi casa' in the song of the same name?", "options": [{"text": "A country road in rural Spain", "isCorrect": false, "rationale": "El patio de mi casa refers to the courtyard of a house, not a country road."}, {"text": "The courtyard of a house", "isCorrect": true, "rationale": "El patio is the courtyard of a house — a central feature of traditional Latin American and Spanish homes. The children's song describes this domestic space."}, {"text": "A public plaza in the city", "isCorrect": false, "rationale": "El patio is the private courtyard of a specific house (mi casa = my house), not a public plaza."}, {"text": "A school playground", "isCorrect": false, "rationale": "The song is about the courtyard of a private home, not a school playground."}]}, {"question": "According to the culture box, what is the plaza in the Dominican Republic?", "options": [{"text": "A modern shopping mall in the capital city", "isCorrect": false, "rationale": "The plaza is a traditional community gathering space, not a modern shopping mall."}, {"text": "The beating heart of every town, a social institution where all ages gather", "isCorrect": true, "rationale": "In the Dominican Republic, as across Latin America, the central plaza is described as the social heart of the community — a place for chatting, watching children play, music, and celebrating festivals."}, {"text": "A beach resort area used only during festivals", "isCorrect": false, "rationale": "The plaza is a year-round community gathering space in the center of a town, not a seasonal resort."}, {"text": "A government-controlled military installation", "isCorrect": false, "rationale": "The plaza is a civilian public square, often surrounded by the church and town hall, used for community life."}]}, {"question": "Which 'Mental Map' technique is described in this section?", "options": [{"text": "Drawing a physical map of Latin America with all country capitals labeled in Spanish.", "isCorrect": false, "rationale": "The Mental Map technique involves imagining your own neighborhood and labeling places in Spanish — not drawing a map of Latin America."}, {"text": "Mentally walking through your neighborhood and labeling places in Spanish.", "isCorrect": true, "rationale": "The technique involves picturing your real neighborhood in your mind and mentally labeling each place you pass in Spanish (la escuela, el supermercado, el parque, etc.). This builds vocabulary through familiar personal geography."}, {"text": "Creating a map of fictional Spanish-speaking cities.", "isCorrect": false, "rationale": "The technique works with your real, familiar neighborhood to connect Spanish words to places you already know well."}, {"text": "Memorizing a numbered list of all places in the vocabulary section.", "isCorrect": false, "rationale": "The Mental Map technique is spatial and personal — it relies on your memory of real places, not on numbered lists."}]}, {"question": "How would you say 'They are going to study tonight' using the near future?", "options": [{"text": "Van a estudiar esta noche.", "isCorrect": true, "rationale": "Van is the ellos/ellas form of ir + a + estudiar (infinitive) + esta noche (tonight) = They are going to study tonight."}, {"text": "Voy a estudiar esta noche.", "isCorrect": false, "rationale": "Voy is the yo form; for ellos/they use van. Van a estudiar esta noche."}, {"text": "Va a estudiar esta noche.", "isCorrect": false, "rationale": "Va is the él/ella (singular) form; for ellos (plural) use van. Van a estudiar esta noche."}, {"text": "Vamos a estudiar esta noche.", "isCorrect": false, "rationale": "Vamos is the nosotros form; for ellos (they) use van. Van a estudiar esta noche."}]}, {"question": "In the song 'El patio de mi casa,' what language skill does singing it help develop?", "options": [{"text": "Preterite (past tense) verb endings", "isCorrect": false, "rationale": "The song helps with house/room vocabulary, not specifically preterite verb endings."}, {"text": "House and room vocabulary used in later chapters", "isCorrect": true, "rationale": "The section notes that house, room, and space vocabulary appears in the song and will be useful in later chapters of the textbook."}, {"text": "The formal usted command forms", "isCorrect": false, "rationale": "The song focuses on home vocabulary, not formal command forms."}, {"text": "Reflexive verb conjugation", "isCorrect": false, "rationale": "The song is about the courtyard of a house; it is used to introduce home vocabulary, not reflexive verbs."}]}, {"question": "Which phrase means 'I have to (do something)' and appears in the conversation vocabulary?", "options": [{"text": "Puedo + infinitivo", "isCorrect": false, "rationale": "Puedo + infinitivo means I can do something, not I have to."}, {"text": "Quiero + infinitivo", "isCorrect": false, "rationale": "Quiero + infinitivo means I want to do something, not I have to."}, {"text": "Tengo que + infinitivo", "isCorrect": true, "rationale": "Tengo que + infinitive means I have to do something. From the conversation: El sábado no puedo — tengo que estudiar (I can't — I have to study)."}, {"text": "Debo + infinitivo", "isCorrect": false, "rationale": "Debo + infinitivo means I should/must do something. The conversation uses tengo que for 'I have to.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
