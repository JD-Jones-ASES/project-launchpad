<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following sentences correctly demonstrates adjective agreement with the noun?", "options": [{"text": "Los perros es simpático.", "isCorrect": false, "rationale": "The noun 'perros' is plural and masculine, so the verb should be 'son' and the adjective should be 'simpáticos'."}, {"text": "La niña es delgado.", "isCorrect": false, "rationale": "The noun 'niña' is singular and feminine, so the adjective should be 'delgada' to match its gender and number."}, {"text": "Las estudiantes son inteligentes.", "isCorrect": true, "rationale": "The noun 'estudiantes' is plural and feminine (implied by 'Las'), and 'inteligentes' correctly agrees in number. Adjectives ending in -e typically don't change for gender in the singular, but still agree in number."}, {"text": "El libro es nueva.", "isCorrect": false, "rationale": "The noun 'libro' is singular and masculine, so the adjective should be 'nuevo' to match its gender."}], "id": "q01"}, {"question": "Based on the vocabulary provided, if you want to describe a movie that makes you laugh and keeps you entertained, which adjective pair would be most appropriate?", "options": [{"text": "feo y aburrido", "isCorrect": false, "rationale": "'Feo' (ugly) and 'aburrido' (boring) contradict the idea of an entertaining movie that makes you laugh."}, {"text": "divertido y simpático", "isCorrect": false, "rationale": "'Divertido' (fun, entertaining) fits, but 'simpático' (friendly, nice) is typically used for people, not movies, and doesn't quite fit the 'makes you laugh' aspect as strongly as 'entertaining'."}, {"text": "grande y viejo", "isCorrect": false, "rationale": "'Grande' (big) and 'viejo' (old) describe size and age, not entertainment value."}, {"text": "bonito y divertido", "isCorrect": true, "rationale": "'Bonito' (nice-looking, pretty) could describe the visual quality of a movie, and 'divertido' (fun, entertaining) perfectly captures a movie that makes you laugh and keeps you entertained. Both fit the context of a positive movie experience."}], "id": "q02"}, {"question": "Which sentence correctly uses two adjectives connected by 'y' to describe a feminine, plural noun?", "options": [{"text": "Las flores son amarillo y rojo.", "isCorrect": false, "rationale": "The noun 'flores' is feminine and plural, so the adjectives 'amarillo' and 'rojo' should also be feminine and plural: 'amarillas y rojas'."}, {"text": "Los libros son grande y viejo.", "isCorrect": false, "rationale": "The noun 'libros' is masculine and plural. 'Grande' does not change for gender, but it must be plural ('grandes'), and 'viejo' must also be plural ('viejos')."}, {"text": "Las casas son vieja y bonitas.", "isCorrect": false, "rationale": "The noun 'casas' is feminine and plural. Both adjectives must agree in both gender and number. 'Vieja' should be 'viejas' to agree with the plural 'casas'."}, {"text": "Las niñas son delgadas y simpáticas.", "isCorrect": true, "rationale": "The noun 'niñas' is feminine and plural. Both adjectives, 'delgadas' and 'simpáticas', correctly agree in both gender and number with the noun."}], "id": "q03"}, {"question": "The '¡Ojo! Gordo/a and Viejo/a' section explains that these adjectives are common and neutral in Spanish. In which scenario would describing a person as 'vieja' be considered perfectly normal and respectful according to the text?", "options": [{"text": "Referring to an acquaintance you just met as 'la vieja' in a casual conversation.", "isCorrect": false, "rationale": "The text states that 'context and tone matter' and implies caution when describing real people, making this scenario potentially disrespectful, similar to English."}, {"text": "Describing your great-grandmother as 'mi bisabuela vieja' in a family discussion.", "isCorrect": true, "rationale": "The text explicitly gives the example 'describing... your great-grandmother as vieja is perfectly normal in Spanish!', emphasizing that in family contexts or with certain relationships, it is a neutral descriptor."}, {"text": "Using 'vieja' as a direct address for an elderly stranger in public.", "isCorrect": false, "rationale": "Directly addressing a stranger with 'vieja' would generally be considered rude and disrespectful, as context and tone are crucial, and it lacks the familiarity of a family context."}, {"text": "Complaining about an old teacher by calling them 'el profesor viejo' to your friends.", "isCorrect": false, "rationale": "While 'viejo' is neutral, using it in a complaining tone or with negative intent still makes the usage disrespectful, as the text emphasizes that 'context and tone matter'."}], "id": "q04"}, {"question": "Based on the reading 'La familia Rodríguez,' what is a defining characteristic of Lucía, the mother?", "options": [{"text": "She is short and enjoys telling jokes.", "isCorrect": false, "rationale": "This describes Roberto, the father, not Lucía. Lucía is described as tall and slender."}, {"text": "She has black hair and is a doctor in a hospital.", "isCorrect": true, "rationale": "The text states, 'La madre, Lucía, es alta y delgada. Tiene el pelo negro y los ojos marrones. Es muy inteligente — ella es médica en un hospital grande.'"}, {"text": "She reads large and boring books every day.", "isCorrect": false, "rationale": "This describes Miguel, one of the children, not Lucía."}, {"text": "She is an artist and likes to make things with colored paper.", "isCorrect": false, "rationale": "This describes Isabella, one of the children, not Lucía."}], "id": "q05"}, {"question": "What insight does the text provide about Roberto, the father, in 'La familia Rodríguez'?", "options": [{"text": "He is tall and serious, like his son Miguel.", "isCorrect": false, "rationale": "Roberto is described as 'bajo' (short), and while Miguel is tall and serious, Roberto is 'divertido' (fun)."}, {"text": "He works as a doctor in a large hospital.", "isCorrect": false, "rationale": "Lucía, the mother, works as a doctor. Roberto works as a music teacher."}, {"text": "He is short but very funny, always telling new jokes.", "isCorrect": true, "rationale": "The text states, 'El padre, Roberto, es bajo pero muy divertido. Siempre tiene un chiste nuevo.'"}, {"text": "He enjoys making beautiful things with colored paper in the kitchen.", "isCorrect": false, "rationale": "This describes Isabella, the daughter."}], "id": "q06"}, {"question": "Miguel, one of the children in 'La familia Rodríguez,' is described as liking 'libros grandes y aburridos.' This detail primarily suggests that Miguel is:", "options": [{"text": "athletic and energetic.", "isCorrect": false, "rationale": "His preference for reading large, potentially boring books doesn't imply athleticism; it suggests an indoor, intellectual pursuit."}, {"text": "social and outgoing.", "isCorrect": false, "rationale": "Reading 'large and boring books' everyday, along with being described as 'muy serio', suggests a more introverted or studious personality, rather than outgoing."}, {"text": "studious and serious.", "isCorrect": true, "rationale": "His habit of reading 'large and boring books every day' and being described as 'muy serio' strongly indicates a studious and serious disposition."}, {"text": "creative and artistic.", "isCorrect": false, "rationale": "Isabella is the artistic one. Miguel's interests lean towards academic or intellectual pursuits rather than creative ones."}], "id": "q07"}, {"question": "What is unique about Isabella, the middle child, in 'La familia Rodríguez'?", "options": [{"text": "She is gorda and always smiles.", "isCorrect": false, "rationale": "This describes Carlos, the baby."}, {"text": "She is tall and serious, enjoying reading.", "isCorrect": false, "rationale": "This describes Miguel, the eldest son."}, {"text": "She is an artist and her favorite room is the kitchen.", "isCorrect": true, "rationale": "The text says, 'Isabella es pequeña y muy simpática. Ella es artista y su cuarto favorito en la casa es la cocina — siempre hace cosas bonitas con papel de colores.'"}, {"text": "She has black hair and is a medical professional.", "isCorrect": false, "rationale": "This describes Lucía, the mother."}], "id": "q08"}, {"question": "Which statement accurately describes Carlos or the Rodríguez family's house?", "options": [{"text": "Carlos is serious and intelligent, like his mother.", "isCorrect": false, "rationale": "Carlos is described as 'gordo y muy divertido. Siempre sonríe.' Lucía is intelligent, but Carlos is a baby."}, {"text": "The house is new and has a green door.", "isCorrect": false, "rationale": "The house is described as 'vieja pero bonita' and has a 'puerta azul' (blue door)."}, {"text": "Carlos is the baby, chubby and very fun, always smiling.", "isCorrect": true, "rationale": "The text states, 'Carlos es el bebé. Es gordo y muy divertido. Siempre sonríe.'"}, {"text": "The garden is large and filled with blue and white flowers.", "isCorrect": false, "rationale": "The garden is 'pequeño pero verde y lleno de flores amarillas y rojas' (small, green, with yellow and red flowers)."}], "id": "q09"}, {"question": "You want to describe your friend, Sofía, who is short, very friendly, and has a new, blue backpack. Which set of sentences correctly describes Sofía and her backpack?", "options": [{"text": "Sofía es baja y simpático. Su mochila es nuevo y azul.", "isCorrect": false, "rationale": "'Simpático' should be 'simpática' for Sofía. 'Nuevo' should be 'nueva' for 'mochila' (feminine)."}, {"text": "Sofía es baja y simpática. Su mochila es nueva y azul.", "isCorrect": true, "rationale": "'Baja' and 'simpática' correctly agree with feminine singular 'Sofía'. 'Nueva' and 'azul' correctly agree with feminine singular 'mochila'. Adjectives ending in -l (like azul) don't change for gender but agree in number."}, {"text": "Sofía es bajo y simpática. Su mochila es nuevo y azules.", "isCorrect": false, "rationale": "'Bajo' should be 'baja' for Sofía. 'Nuevo' should be 'nueva' for 'mochila', and 'azules' is plural, while 'mochila' is singular."}, {"text": "Sofía es bajas y simpáticas. Su mochila es nueva y azul.", "isCorrect": false, "rationale": "'Bajas' and 'simpáticas' are plural, but Sofía is singular. The first part of the sentence is incorrect."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
