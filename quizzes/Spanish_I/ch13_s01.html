<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 13, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the Spanish word for 'receipt'?", "options": [{"text": "el recibo", "isCorrect": true, "rationale": "'el recibo' means receipt — the paper you receive after paying. It is different from 'recibir' (to receive)."}, {"text": "el precio", "isCorrect": false, "rationale": "'el precio' means price. 'el recibo' means receipt."}, {"text": "el descuento", "isCorrect": false, "rationale": "'el descuento' means discount. 'el recibo' means receipt."}, {"text": "el recibo", "isCorrect": false, "rationale": "This is the same as the correct answer — only one correct option is intended."}]}, {"question": "How do you say 'on sale' or 'on special offer' in Spanish?", "options": [{"text": "en oferta", "isCorrect": true, "rationale": "'en oferta' means 'on sale' or 'on special offer.' 'la oferta' = the sale/offer."}, {"text": "en descuento", "isCorrect": false, "rationale": "While 'descuento' means discount, the phrase 'en oferta' is used for 'on sale.'"}, {"text": "en cambio", "isCorrect": false, "rationale": "'en cambio' means 'on the other hand.' 'en oferta' means 'on sale.'"}, {"text": "en efectivo", "isCorrect": false, "rationale": "'en efectivo' means 'in cash.' 'en oferta' means 'on sale.'"}]}, {"question": "What is 200 in Spanish?", "options": [{"text": "doscientos", "isCorrect": true, "rationale": "200 = doscientos (masculine) / doscientas (feminine). Numbers 200-900 agree in gender with the noun they describe."}, {"text": "doscentos", "isCorrect": false, "rationale": "The correct spelling is 'doscientos' — the prefix is 'dos' + 'cientos.'"}, {"text": "dos cien", "isCorrect": false, "rationale": "'cien' is for exactly 100. 200 is 'doscientos,' not 'dos cien.'"}, {"text": "doscientas", "isCorrect": false, "rationale": "'doscientas' is the feminine form, used with feminine nouns (e.g., doscientas personas). The base form is 'doscientos.'"}]}, {"question": "When is 'cien' used vs. 'ciento'?", "options": [{"text": "Cien = exactly 100; ciento = 100 + more (like 101, 120)", "isCorrect": true, "rationale": "The text explains: 'Cien means exactly 100. When you go past 100, you use ciento: ciento uno (101).' Cien = the round hundred."}, {"text": "Cien is masculine; ciento is feminine", "isCorrect": false, "rationale": "Cien/ciento do not change for gender. Only 200-900 have masculine/feminine forms."}, {"text": "Cien is informal; ciento is formal", "isCorrect": false, "rationale": "The distinction is not about formality. Cien = exactly 100; ciento = 101 through 199."}, {"text": "Both are interchangeable", "isCorrect": false, "rationale": "They are NOT interchangeable. Cien = exactly 100; ciento = used when there are additional units (101, 150, etc.)."}]}, {"question": "The numbers 200–900 in Spanish agree in gender with the noun they describe. How do you say '300 women'?", "options": [{"text": "trescientas mujeres", "isCorrect": true, "rationale": "'mujeres' is feminine, so use the feminine form: 'trescientas.' Masculine: 'trescientos hombres.'"}, {"text": "trescientos mujeres", "isCorrect": false, "rationale": "'mujeres' is feminine, requiring 'trescientas,' not 'trescientos' (masculine)."}, {"text": "tres cientas mujeres", "isCorrect": false, "rationale": "'Trescientas' is written as one word. It is not 'tres cientas.'"}, {"text": "cientos tres mujeres", "isCorrect": false, "rationale": "This is not how Spanish numbers work. 300 = trescientas (with a feminine noun) — written as one word."}]}, {"question": "What does 'caro/cara' mean?", "options": [{"text": "Expensive", "isCorrect": true, "rationale": "'caro/cara' means expensive. Its opposite is 'barato/barata' (cheap/inexpensive)."}, {"text": "Cheap", "isCorrect": false, "rationale": "'barato/barata' means cheap. 'caro/cara' means expensive."}, {"text": "Dear (as in a letter greeting)", "isCorrect": false, "rationale": "While 'caro' can mean 'dear' in some contexts (like Italian), in Spanish shopping contexts it means 'expensive.'"}, {"text": "Free (no cost)", "isCorrect": false, "rationale": "'gratis' means free. 'caro' means expensive."}]}, {"question": "According to the Bolivian markets culture box, what is 'regatear'?", "options": [{"text": "Bargaining — negotiating the price with the vendor", "isCorrect": true, "rationale": "The text says: 'bargaining — called regatear — is not just accepted, it is expected and even enjoyed as a social ritual.'"}, {"text": "Paying with a credit card", "isCorrect": false, "rationale": "'Pagar con tarjeta' means paying by card. 'Regatear' means to bargain/negotiate the price."}, {"text": "Browsing without buying", "isCorrect": false, "rationale": "Browsing is not the meaning. 'Regatear' specifically means the back-and-forth negotiation of price."}, {"text": "Getting a gift receipt", "isCorrect": false, "rationale": "'Regatear' means to bargain. Getting a receipt is 'recibir el recibo.'"}]}, {"question": "What is the famous market in Bolivia mentioned in the culture box that sells traditional herbal remedies and spiritual items?", "options": [{"text": "El Mercado de las Brujas (Witches' Market) in La Paz", "isCorrect": true, "rationale": "The text describes 'el Mercado de las Brujas (Witches' Market)' in La Paz as selling 'traditional herbal remedies, charms, and spiritual items.'"}, {"text": "El Mercado de Otavalo in Ecuador", "isCorrect": false, "rationale": "The Otavalo market is in Ecuador, not Bolivia. The Witches' Market is in La Paz, Bolivia."}, {"text": "El Mercado Central in Buenos Aires", "isCorrect": false, "rationale": "Buenos Aires is in Argentina. The famous Bolivian market described is el Mercado de las Brujas in La Paz."}, {"text": "El Mercado de San Telmo in Bolivia", "isCorrect": false, "rationale": "San Telmo is a neighborhood in Buenos Aires, Argentina. The famous Bolivian market is in La Paz."}]}, {"question": "What does 'el efectivo' mean in a shopping context?", "options": [{"text": "Cash", "isCorrect": true, "rationale": "'el efectivo' means cash. 'Pagar en efectivo' = to pay in cash, as opposed to paying by card (tarjeta)."}, {"text": "The sale price", "isCorrect": false, "rationale": "'el precio de oferta' refers to sale price. 'el efectivo' specifically means cash."}, {"text": "The discount", "isCorrect": false, "rationale": "'el descuento' means the discount. 'el efectivo' means cash."}, {"text": "The total amount", "isCorrect": false, "rationale": "'el total' means the total amount. 'el efectivo' means cash."}]}, {"question": "How do you form numbers like 235 in Spanish?", "options": [{"text": "Doscientos treinta y cinco", "isCorrect": true, "rationale": "Spanish combines hundreds + tens + y + ones: doscientos (200) + treinta (30) + y + cinco (5) = doscientos treinta y cinco."}, {"text": "Dos ciento treinta cinco", "isCorrect": false, "rationale": "200 is 'doscientos' (one word). Also, 'y' is needed between tens and ones: 'treinta y cinco.'"}, {"text": "Doscientos y treinta y cinco", "isCorrect": false, "rationale": "No 'y' is used between hundreds and tens — only between tens and ones: 'doscientos treinta y cinco.'"}, {"text": "Doscientos treinta cinco", "isCorrect": false, "rationale": "'y' is required between the tens and ones: 'treinta y cinco,' not 'treinta cinco.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
