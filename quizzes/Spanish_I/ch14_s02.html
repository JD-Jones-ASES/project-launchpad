<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When do you use 'saber' (vs. conocer)?", "options": [{"text": "For facts, information, and skills (know that / know how to)", "isCorrect": true, "rationale": "The text says: 'SABER = facts, information, skills (know THAT / know HOW).' Use for information you learned or skills you have."}, {"text": "For people and places you are familiar with", "isCorrect": false, "rationale": "People and places use 'conocer.' Saber is for facts, information, and skills."}, {"text": "For recognizing something familiar", "isCorrect": false, "rationale": "Recognition/familiarity uses 'conocer.' Facts and skills use 'saber.'"}, {"text": "For knowing something by experience", "isCorrect": false, "rationale": "Experience and connection use 'conocer' (heart knowledge). Learned facts and skills use 'saber' (head knowledge)."}], "id": "q01"}, {"question": "How do you say 'I know how to swim' in Spanish?", "options": [{"text": "Sé nadar.", "isCorrect": true, "rationale": "Knowing how to do something (a skill) uses saber: 'Sé nadar.' = I know how to swim. Saber + infinitive = know how to."}, {"text": "Conozco nadar.", "isCorrect": false, "rationale": "'Conocer' does not take an infinitive this way. Skills use saber: 'Sé nadar.'"}, {"text": "Yo sabo nadar.", "isCorrect": false, "rationale": "The yo form of saber is irregular: 'sé,' not 'sabo.' 'Sé nadar' = I know how to swim."}, {"text": "Sé a nadar.", "isCorrect": false, "rationale": "No preposition needed: 'Sé nadar.' (not 'sé a nadar')."}], "id": "q02"}, {"question": "When do you use 'conocer' (vs. saber)?", "options": [{"text": "For people you have met and places you have been / are familiar with", "isCorrect": true, "rationale": "The text: 'CONOCER = people, places, things (know / be familiar with).' It is heart knowledge — from experience and connection."}, {"text": "For facts and information you have studied", "isCorrect": false, "rationale": "Facts and information use saber. Conocer is for personal familiarity: people, places, and things you've experienced."}, {"text": "For knowing how to do things", "isCorrect": false, "rationale": "Knowing how to do things (skills) uses saber. Conocer is for familiarity with people, places, and things."}, {"text": "For knowing answers to questions", "isCorrect": false, "rationale": "Knowing answers uses saber (head knowledge). Conocer is for personal familiarity."}], "id": "q03"}, {"question": "What is the irregular yo form of 'saber'?", "options": [{"text": "sé", "isCorrect": true, "rationale": "The yo form of saber is 'sé' (with an accent mark to distinguish it from 'se,' the reflexive pronoun). All other forms are regular."}, {"text": "sabo", "isCorrect": false, "rationale": "'sabo' is not a correct form. The irregular yo form of saber is 'sé.'"}, {"text": "sabeo", "isCorrect": false, "rationale": "'sabeo' is not correct. The yo form of saber is simply 'sé.'"}, {"text": "se", "isCorrect": false, "rationale": "'se' (without accent) is the reflexive pronoun, not the yo form of saber. The verb form 'sé' has an accent mark."}], "id": "q04"}, {"question": "What is the irregular yo form of 'conocer'?", "options": [{"text": "conozco", "isCorrect": true, "rationale": "The yo form of conocer is 'conozco' — ending in -zco. This pattern applies to verbs ending in -cer/-cir: conocer→conozco, parecer→parezco."}, {"text": "conoco", "isCorrect": false, "rationale": "'conoco' is not correct. The yo form of conocer is 'conozco' (with -zco ending)."}, {"text": "conoceo", "isCorrect": false, "rationale": "'conoceo' is not a valid form. The correct yo form is 'conozco.'"}, {"text": "conose", "isCorrect": false, "rationale": "'conose' is not correct. The yo form is 'conozco,' following the -cer/-cir pattern."}], "id": "q05"}, {"question": "Which sentence uses saber/conocer correctly?", "options": [{"text": "Sé que la capital del Perú es Lima.", "isCorrect": true, "rationale": "This is a fact (information learned). Use saber: 'Sé que la capital del Perú es Lima.' (I know that the capital of Peru is Lima.)"}, {"text": "Conozco que hoy hay clase.", "isCorrect": false, "rationale": "Knowing a fact uses saber: 'Sé que hoy hay clase.' Conocer is for people/places/familiarity, not facts."}, {"text": "Sé a María muy bien.", "isCorrect": false, "rationale": "Knowing a person uses conocer: 'Conozco a María muy bien.' Saber is for facts and skills."}, {"text": "Conozco el número de teléfono.", "isCorrect": false, "rationale": "A phone number is a piece of information/fact: 'Sé el número de teléfono.' Conocer is for people/places."}], "id": "q06"}, {"question": "What is the 'personal a' and when is it required?", "options": [{"text": "A required 'a' before a specific person as a direct object", "isCorrect": true, "rationale": "The 'a personal' is required before a specific person's name or description when that person is the direct object: 'Conozco a mi vecino.' (I know my neighbor.)"}, {"text": "A contraction of 'a + el' used before nouns", "isCorrect": false, "rationale": "'a + el' → 'al' is a contraction for places. The 'personal a' is specifically required before direct objects that are people."}, {"text": "The word 'a' used before infinitives", "isCorrect": false, "rationale": "'a + infinitive' appears in ir + a + infinitive. The 'personal a' is different — used before direct objects that are people."}, {"text": "An optional 'a' that can be used with any noun", "isCorrect": false, "rationale": "The 'personal a' is NOT optional when the direct object is a specific person. It is required: 'Conozco a María' (not 'Conozco María')."}], "id": "q07"}, {"question": "What is the yo form of 'ver' (to see)?", "options": [{"text": "veo", "isCorrect": true, "rationale": "The yo form of ver is 'veo' — slightly irregular. All other forms are regular: ves, ve, vemos, ven."}, {"text": "vo", "isCorrect": false, "rationale": "'vo' is not a valid Spanish form. The yo form of ver is 'veo.'"}, {"text": "vera", "isCorrect": false, "rationale": "'vera' is not the present tense yo form. 'veo' is the correct form."}, {"text": "vero", "isCorrect": false, "rationale": "'vero' is not correct. The yo form of ver is 'veo.'"}], "id": "q08"}, {"question": "In the memory tip, saber is associated with HEAD knowledge. What image is recommended for remembering conocer?", "options": [{"text": "Touching your heart — conocer = HEART knowledge from experience and connection", "isCorrect": true, "rationale": "The memory tip says: 'Conocer = HEART knowledge. Imagine touching your heart when you say conocer. It is knowing from experience and connection.'"}, {"text": "Pointing to your brain — it is intellectual knowledge", "isCorrect": false, "rationale": "Pointing to the brain is for saber (HEAD knowledge). Conocer uses the heart image."}, {"text": "Raising your hand — it is knowledge you can demonstrate", "isCorrect": false, "rationale": "Demonstrable skills use saber. Conocer = heart/experience. The image is touching your heart."}, {"text": "Looking at a map — it is geographical knowledge", "isCorrect": false, "rationale": "A map is not the recommended image. Touch your heart for conocer: it is personal, experiential knowledge."}], "id": "q09"}, {"question": "What is the yo form of 'dar' (to give)?", "options": [{"text": "doy", "isCorrect": true, "rationale": "The yo form of dar is 'doy' — irregular. All other forms are regular: das, da, damos, dan."}, {"text": "do", "isCorrect": false, "rationale": "'do' is not the correct Spanish form. The yo form of dar is 'doy.'"}, {"text": "dao", "isCorrect": false, "rationale": "'dao' is not correct. The yo form of dar is 'doy.'"}, {"text": "daro", "isCorrect": false, "rationale": "'daro' is not correct. The yo form of dar is 'doy.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
