<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 15, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which phrase is the MOST formal way to make a polite request in Spanish?", "options": [{"text": "iHaz esto!", "isCorrect": false, "rationale": "iHaz esto! is a direct command, not a polite request. For formal situations, use Podrias?"}, {"text": "iPor favor!", "isCorrect": false, "rationale": "Por favor softens a request but is used with classmates and family for everyday requests. For formal situations (teachers, adults you do not know), use Podrias?"}, {"text": "iPuedes...?", "isCorrect": false, "rationale": "Puedes? is appropriate for classmates and family. For more formal situations, Podrias? is more appropriate."}, {"text": "iPodrías...?", "isCorrect": true, "rationale": "Podrias? is the most formal polite request form. It is used with teachers, adults you do not know well, or in professional contexts."}], "id": "q01"}, {"question": "When should you use 'iPuedes...?' to make a request?", "options": [{"text": "Only with strangers you have never met", "isCorrect": false, "rationale": "Puedes? is for classmates and family members for everyday requests, not strangers. For strangers or formal situations, Podrias? is better."}, {"text": "With classmates and family members for everyday requests", "isCorrect": true, "rationale": "The grammar box specifies: Use Puedes? or Por favor with classmates and family members for everyday requests."}, {"text": "Only in urgent emergency situations", "isCorrect": false, "rationale": "Urgent situations call for direct commands. Puedes? is for everyday requests with classmates and family."}, {"text": "Only in formal written Spanish", "isCorrect": false, "rationale": "Puedes? is spoken/conversational Spanish used with classmates and family. For formal written Spanish, Podrias? would be more appropriate."}], "id": "q02"}, {"question": "If a verb stem-changes in the el/ella present-tense form, what happens in the tu command form?", "options": [{"text": "The stem change disappears in the command form", "isCorrect": false, "rationale": "The stem change does NOT disappear. Since the tu command IS the el/ella form, the stem change carries through to the command."}, {"text": "The stem change also appears in the command, because the command is the el/ella form", "isCorrect": true, "rationale": "The note explains: 'if a verb stem-changes in the el/ella present-tense form, the tu command also stem-changes — because the command IS the el/ella form!' For example: dormir -> duerme -> iDuerme! (Sleep!)"}, {"text": "Only -ar verbs keep their stem change in commands", "isCorrect": false, "rationale": "All stem-changing verbs keep their stem change in the tu command, regardless of whether they end in -ar, -er, or -ir."}, {"text": "Stem-changing verbs cannot be used as commands", "isCorrect": false, "rationale": "Stem-changing verbs can absolutely be used as commands. The stem change simply carries through to the command form."}], "id": "q03"}, {"question": "In the conversation, Camila tells her little brother Rodrigo to close the door. Which command does she use?", "options": [{"text": "iAbre la puerta!", "isCorrect": false, "rationale": "Abre means open. Camila asks Rodrigo to close the door: iCierra la puerta, por favor!"}, {"text": "iCierra la puerta, por favor!", "isCorrect": true, "rationale": "Camila says: 'Rodrigo, iCierra la puerta, por favor! Necesitamos silencio.' Close the door uses the command form of cerrar (e->ie stem-changing verb)."}, {"text": "iPor favor, ven aqui!", "isCorrect": false, "rationale": "Ven aqui! means Come here! Camila specifically asks Rodrigo to close the door: Cierra la puerta."}, {"text": "iPon la mesa!", "isCorrect": false, "rationale": "Pon la mesa means Set the table. Camila asks Rodrigo to close the door, not to set the table."}], "id": "q04"}, {"question": "What does 'las reglas de la clase' mean?", "options": [{"text": "The class schedule", "isCorrect": false, "rationale": "The class schedule would be 'el horario de clases'. 'Las reglas de la clase' means the classroom rules."}, {"text": "The classroom rules", "isCorrect": true, "rationale": "'Las reglas' means the rules, and 'de la clase' means of the class/classroom. The reading presents classroom rules first as commands, then as polite requests."}, {"text": "The class assignments", "isCorrect": false, "rationale": "Assignments would be 'las tareas' or 'los trabajos'. 'Las reglas de la clase' means the classroom rules."}, {"text": "The class project", "isCorrect": false, "rationale": "A class project is 'el proyecto'. 'Las reglas de la clase' means the classroom rules."}], "id": "q05"}, {"question": "How is the classroom rule 'iEscucha cuando el maestro habla!' rephrased as a polite request?", "options": [{"text": "Por favor, escucha cuando el maestro habla.", "isCorrect": true, "rationale": "The reading shows the same rules as polite requests. The command 'iEscucha!' becomes the polite request 'Por favor, escucha cuando el maestro habla.' The meaning stays the same; the tone changes."}, {"text": "iPuedes ser el maestro?", "isCorrect": false, "rationale": "This asks if you can be the teacher, which is completely different. The polite version of the listening rule is: Por favor, escucha cuando el maestro habla."}, {"text": "No escuches cuando el maestro habla.", "isCorrect": false, "rationale": "This is a negative command meaning Do not listen when the teacher speaks — the opposite of the original rule."}, {"text": "Yo escucho cuando el maestro habla.", "isCorrect": false, "rationale": "This is a statement (I listen when the teacher speaks), not a polite request. The request version uses 'Por favor' with the command form."}], "id": "q06"}, {"question": "What does 'tiene sentido' mean in the conversation?", "options": [{"text": "It is long", "isCorrect": false, "rationale": "'Tiene sentido' does not mean it is long. It means it makes sense."}, {"text": "It makes sense", "isCorrect": true, "rationale": "The vocabulary note gives: 'tiene sentido — makes sense.' Tomas asks Rodrigo to read a paragraph and tell them if it 'tiene sentido'."}, {"text": "It is interesting", "isCorrect": false, "rationale": "Interesting would be 'es interesante'. 'Tiene sentido' means makes sense."}, {"text": "It is finished", "isCorrect": false, "rationale": "Finished would be 'esta terminado' or 'listo'. 'Tiene sentido' means makes sense."}], "id": "q07"}, {"question": "What additional verbs are introduced in this section as useful for commands and requests?", "options": [{"text": "Nadar, cantar, and bailar", "isCorrect": false, "rationale": "Nadar (swim), cantar (sing), and bailar (dance) are not specifically introduced in this section. The new verbs are cerrar, abrir, and traer."}, {"text": "Cerrar, abrir, and traer", "isCorrect": true, "rationale": "The section introduces three more useful verbs: cerrar (to close), abrir (to open), and traer (to bring) — all useful when giving commands and making requests."}, {"text": "Comprar, vender, and pagar", "isCorrect": false, "rationale": "These shopping verbs were covered in Chapter 13. The new verbs in this section are cerrar, abrir, and traer."}, {"text": "Hablar, comer, and vivir", "isCorrect": false, "rationale": "Hablar, comer, and vivir are the basic model verbs introduced in early chapters. This section adds cerrar, abrir, and traer."}], "id": "q08"}, {"question": "In the dialogue, what does Tomas want help with?", "options": [{"text": "He wants help carrying heavy books to school.", "isCorrect": false, "rationale": "Tomas is at Camila's house working on a project. He wants help understanding the instructions."}, {"text": "He wants help understanding the instructions for their class project.", "isCorrect": true, "rationale": "Tomas says: 'iMe ayudas con las instrucciones? No las entiendo bien.' He does not understand the instructions well and asks Camila for help."}, {"text": "He wants help finding the colored pencils.", "isCorrect": false, "rationale": "Camila is the one who needs the colored pencils — she asks Tomas to pass them. Tomas needs help with the instructions."}, {"text": "He wants help writing a paragraph for Rodrigo.", "isCorrect": false, "rationale": "It is Tomas who eventually asks Rodrigo to read a paragraph and check if it makes sense — not the other way around."}], "id": "q09"}, {"question": "Which of the following is a polite request using 'Podrias'?", "options": [{"text": "iSe respetuoso con todos!", "isCorrect": false, "rationale": "iSe respetuoso! is a direct command (irregular command for ser). A polite version using Podrias would be: iPodrias ser respetuoso con todos?"}, {"text": "iPodrias ser respetuoso con todos?", "isCorrect": true, "rationale": "This is the most formal polite request form, used in the reading. It corresponds to the command iSe respetuoso con todos! but softens it with Podrias."}, {"text": "Yo soy respetuoso con todos.", "isCorrect": false, "rationale": "This is a statement (I am respectful with everyone), not a polite request. Polite requests use Puedes or Podrias."}, {"text": "iser respetuoso con todos!", "isCorrect": false, "rationale": "Using an infinitive as a command is not standard in Spanish. The correct polite form is iPodrias ser respetuoso con todos?"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
