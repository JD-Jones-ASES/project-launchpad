<body>
<div class="quiz-container">

        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function of the words 'el' and 'la' when placed before a Spanish noun, according to the textbook section?", "options": [{"text": "To indicate the size of the noun.", "isCorrect": false, "rationale": "The text does not state that 'el' and 'la' indicate size. These are articles that precede nouns."}, {"text": "To tell you the gender of the noun.", "isCorrect": true, "rationale": "The text explicitly states that 'el' or 'la' are articles that 'tell you something very important about every Spanish noun,' which is its gender."}, {"text": "To specify whether the noun is singular or plural.", "isCorrect": false, "rationale": "While 'el' and 'la' are singular articles, their primary role emphasized in this section is to indicate gender. The text does not discuss plural articles here."}, {"text": "To describe a quality of the noun.", "isCorrect": false, "rationale": "Adjectives are used to describe qualities of nouns, not the articles 'el' and 'la'."}], "id": "q01"}, {"question": "If you wanted to correctly label a picture of a 'pencil' in Spanish, which of the following would be the most appropriate label based on the vocabulary provided?", "options": [{"text": "la lápiz", "isCorrect": false, "rationale": "The vocabulary list shows 'el lápiz,' indicating that 'lápiz' is a masculine noun and requires the article 'el'."}, {"text": "el lápiz", "isCorrect": true, "rationale": "The vocabulary list clearly states 'el lápiz' for 'pencil,' correctly pairing the masculine article 'el' with the noun."}, {"text": "lápiz", "isCorrect": false, "rationale": "The text emphasizes learning each noun 'with its article' because the article indicates its gender, making 'lápiz' alone incomplete for proper learning as introduced."}, {"text": "los lápiz", "isCorrect": false, "rationale": "'Los' is a masculine plural article. 'Lápiz' is presented as a singular noun, and its article is 'el'."}], "id": "q02"}, {"question": "The text states, 'There is no logical reason for these assignments — you simply have to learn each noun with its article.' What does this imply about trying to guess the gender of a new Spanish noun?", "options": [{"text": "You can usually determine the gender based on whether the object is typically associated with males or females in real life.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'It is not about whether something is male or female in real life.'"}, {"text": "Guessing the gender without knowing the article is unreliable, as it's an arbitrary linguistic feature.", "isCorrect": true, "rationale": "The statement 'There is no logical reason' directly supports that gender assignments are arbitrary, making guessing unreliable without prior knowledge of the noun's article."}, {"text": "You should look for patterns in word endings to guess the gender.", "isCorrect": false, "rationale": "While some patterns exist in Spanish, the text does not mention this strategy and instead emphasizes the arbitrary nature of gender assignment, stating you 'simply have to learn each noun with its article.'"}, {"text": "The gender assignments are based on historical reasons that are too complex to understand.", "isCorrect": false, "rationale": "The text states 'no logical reason' but does not attribute this to complex historical reasons; it simply presents it as a feature to be learned."}], "id": "q03"}, {"question": "According to the 'Color-Coding for Gender' memory tip, how should a Spanish student best learn new masculine nouns like 'el libro' and feminine nouns like 'la silla'?", "options": [{"text": "By memorizing a list of masculine and feminine word endings.", "isCorrect": false, "rationale": "The memory tip specifically suggests color-coding, not memorizing word endings."}, {"text": "By writing 'el libro' in blue and 'la silla' in red or pink.", "isCorrect": true, "rationale": "The 'Color-Coding for Gender' tip advises writing masculine nouns in blue and feminine nouns in red or pink, aligning perfectly with this option."}, {"text": "By associating 'el libro' with male authors and 'la silla' with female users.", "isCorrect": false, "rationale": "The text explicitly warns that gender 'is not about whether something is male or female in real life.'"}, {"text": "By drawing pictures of the objects and labeling them without colors.", "isCorrect": false, "rationale": "Drawing and labeling is part of an activity, but the 'memory tip' specifically adds color-coding as a key strategy."}], "id": "q04"}, {"question": "You are labeling classroom objects based on the provided vocabulary. For the word 'mesa' (desk / table), which article and color would be correct according to the memory tip?", "options": [{"text": "el mesa (blue)", "isCorrect": false, "rationale": "The vocabulary lists 'la mesa,' indicating it is feminine, so 'el' is incorrect, and blue is for masculine nouns."}, {"text": "la mesa (blue)", "isCorrect": false, "rationale": "'La' is the correct article for 'mesa,' but 'mesa' is feminine, which should be colored red or pink, not blue."}, {"text": "el mesa (red)", "isCorrect": false, "rationale": "'El' is the incorrect article for 'mesa,' which is feminine. Even though red is for feminine, the article is wrong."}, {"text": "la mesa (red)", "isCorrect": true, "rationale": "The vocabulary lists 'la mesa' (f.), making 'la' the correct article. According to the 'Color-Coding for Gender' tip, feminine nouns should be written in red or pink."}], "id": "q05"}, {"question": "What does the term 'género' refer to in the context of Spanish nouns, as explained in this section?", "options": [{"text": "The biological sex of a person or animal.", "isCorrect": false, "rationale": "The text explicitly states, 'It is not about whether something is male or female in real life.'"}, {"text": "The grammatical category that classifies every person, place, or thing as either masculine or feminine.", "isCorrect": true, "rationale": "The text defines 'género' as the feature where 'every single noun — every person, place, or thing — is either masculine or feminine.'"}, {"text": "The number of syllables in a noun.", "isCorrect": false, "rationale": "The text does not mention syllables in relation to 'género'; 'género' pertains to masculine or feminine classification."}, {"text": "The tense of the verb associated with the noun.", "isCorrect": false, "rationale": "Verb tense is unrelated to noun gender ('género')."}], "id": "q06"}, {"question": "Which of the following classroom objects from the vocabulary list is correctly identified with its gender and article based on the text?", "options": [{"text": "la libro", "isCorrect": false, "rationale": "The vocabulary list shows 'el libro,' indicating 'libro' is masculine, so 'la' is incorrect."}, {"text": "el mochila", "isCorrect": false, "rationale": "The vocabulary list shows 'la mochila,' indicating 'mochila' is feminine, so 'el' is incorrect."}, {"text": "la pizarra", "isCorrect": true, "rationale": "The vocabulary list correctly pairs 'la' with 'pizarra,' indicating it is a feminine noun."}, {"text": "el regla", "isCorrect": false, "rationale": "The vocabulary list shows 'la regla,' indicating 'regla' is feminine, so 'el' is incorrect."}], "id": "q07"}, {"question": "A new student is struggling to remember the gender of Spanish nouns. Based on the advice in this section, what is the most effective learning strategy they should adopt?", "options": [{"text": "Try to associate nouns with common gender stereotypes (e.g., strong objects are masculine).", "isCorrect": false, "rationale": "The text explicitly advises against this by stating gender 'is not about whether something is male or female in real life' and has 'no logical reason.'"}, {"text": "Always learn a new noun together with its correct article (el or la) and use color-coding.", "isCorrect": true, "rationale": "The section repeatedly emphasizes learning each noun with its article and highlights color-coding (blue for masculine, red for feminine) as 'one of the best tricks Spanish students use.'"}, {"text": "Focus only on memorizing the English translation for now, and worry about gender later.", "isCorrect": false, "rationale": "The text encourages learning nouns with their articles 'from day one' due to the importance of gender."}, {"text": "Group nouns by initial letter and try to find patterns in gender based on that.", "isCorrect": false, "rationale": "This strategy is not mentioned or supported by the text; the emphasis is on learning each noun and its article directly."}], "id": "q08"}, {"question": "Which of the following statements about noun gender in Spanish is TRUE according to the text?", "options": [{"text": "Only nouns referring to people have gender in Spanish.", "isCorrect": false, "rationale": "The text states that 'every single noun — every person, place, or thing — is either masculine or feminine.'"}, {"text": "Nouns are assigned masculine or feminine gender based on their real-world characteristics.", "isCorrect": false, "rationale": "The text clarifies, 'It is not about whether something is male or female in real life.'"}, {"text": "Gender is a feature of the language for every noun, regardless of whether it's a person, place, or thing.", "isCorrect": true, "rationale": "This statement directly reflects the text's explanation that 'every single noun — every person, place, or thing — is either masculine or feminine' as a 'feature of the language.'"}, {"text": "The gender of a noun can usually be deduced logically.", "isCorrect": false, "rationale": "The text explicitly states, 'There is no logical reason for these assignments.'"}], "id": "q09"}, {"question": "You see 'el escritorio' and 'el pegamento' in the vocabulary list. If you were following the color-coding method, what color would you use for these labels?", "options": [{"text": "Red, because both words are common classroom items.", "isCorrect": false, "rationale": "The color red is specified for feminine nouns. 'El' indicates masculine nouns, which should be blue."}, {"text": "Blue, because 'el' indicates masculine nouns.", "isCorrect": true, "rationale": "The 'Color-Coding for Gender' tip states, 'Write masculine nouns in blue.' Both 'escritorio' and 'pegamento' use the masculine article 'el'."}, {"text": "Pink, because they are inanimate objects.", "isCorrect": false, "rationale": "Pink is specified for feminine nouns. 'El' indicates masculine nouns, which should be blue, regardless of whether they are animate or inanimate."}, {"text": "No specific color, as color-coding is only for advanced learners.", "isCorrect": false, "rationale": "The text introduces color-coding as 'one of the best tricks Spanish students use' from day one, implying it's for new learners."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
