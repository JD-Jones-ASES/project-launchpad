    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Encountering Spanish &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the imperfect forms of 'ser' for yo and nosotros?", "options": [{"text": "yo fue, nosotros fuimos", "isCorrect": false, "rationale": "Fue and fuimos are PRETERITE forms. The imperfect of ser is: era (yo), eramos (nosotros)."}, {"text": "yo era, nosotros eramos", "isCorrect": true, "rationale": "The imperfect of ser: era (yo/el/ella), eras (tu), eramos (nosotros), eran (ellos). Example: 'Cuando era nina, era muy curiosa.'"}, {"text": "yo soy, nosotros somos", "isCorrect": false, "rationale": "Soy/somos are PRESENT forms. The imperfect of ser uses the era/eramos forms."}, {"text": "yo sea, nosotros seamos", "isCorrect": false, "rationale": "Sea/seamos are SUBJUNCTIVE forms. The imperfect of ser is era/eramos."}]}, {"question": "Why does 'ver' look irregular in the imperfect, even though its endings are regular?", "options": [{"text": "Because ver borrows its stem from an entirely different verb", "isCorrect": false, "rationale": "Ver does not borrow a stem. Its stem is 've-' (not just 'v-'), which makes the forms look different when the endings are added."}, {"text": "Because its stem is ve- (not just v-), so the regular -er endings stack onto it: veia, veias, etc.", "isCorrect": true, "rationale": "The note explains: 'Ver looks irregular because its stem is ve- (not just v-), so the regular -er endings stack onto it to create veia, veias, etc.' The endings themselves are perfectly regular."}, {"text": "Because ver has the same imperfect forms as ir", "isCorrect": false, "rationale": "Ver's imperfect (veia, veias, veia, veiamos, veian) is different from ir's imperfect (iba, ibas, iba, ibamos, iban)."}, {"text": "Because ver changes its vowel from e to i in the imperfect", "isCorrect": false, "rationale": "No vowel change occurs. The stem ve- stays intact and the regular -ia endings are added: ver -> veia, veias, etc."}]}, {"question": "What does 'el aguila' illustrate about Spanish article usage?", "options": [{"text": "All feminine nouns beginning with a vowel use masculine articles", "isCorrect": false, "rationale": "This is too broad. Only feminine nouns beginning with a STRESSED vowel use 'el' in the singular: el agua, el alma, el aguila. In the plural, the feminine article returns: las aguilas."}, {"text": "Feminine nouns beginning with a stressed vowel use 'el' in the singular to avoid awkward sound, but 'las' in the plural", "isCorrect": true, "rationale": "The note explains: 'Aguila is feminine, but uses el in the singular because the word begins with a stressed a-, and two vowel sounds crashing together (la aguila) sounds awkward. In the plural, the feminine returns: las aguilas.' Same rule for el agua, el alma."}, {"text": "El aguila is actually a masculine noun despite appearing feminine", "isCorrect": false, "rationale": "Aguila is feminine — the adjectives and pronouns that refer to it are feminine. It just uses 'el' in the singular for phonetic reasons."}, {"text": "The article 'el' is used before all animal names", "isCorrect": false, "rationale": "Not all animal names use 'el'. Many use 'la' (la tortuga, la mariposa, la serpiente). El aguila is a special case because of the stressed initial vowel."}]}, {"question": "What is the imperfect of 'ir' for 'nosotros', and what does it mean in context?", "options": [{"text": "fuimos — we went (preterite)", "isCorrect": false, "rationale": "Fuimos is the PRETERITE of ir (we went — one specific time). The imperfect nosotros form is ibamos."}, {"text": "ibamos — we used to go (habitual past)", "isCorrect": true, "rationale": "Ibamos is the nosotros imperfect of ir. 'Todos los domingos, ibamos al parque' = Every Sunday, we used to go to the park."}, {"text": "vamos — we go (present)", "isCorrect": false, "rationale": "Vamos is the present tense (we go). The imperfect of ir for nosotros is ibamos."}, {"text": "vayamos — we go (subjunctive)", "isCorrect": false, "rationale": "Vayamos is the subjunctive form. The imperfect of ir for nosotros is ibamos."}]}, {"question": "What is the Spanish word for 'butterfly'?", "options": [{"text": "el mono", "isCorrect": false, "rationale": "El mono is monkey, not butterfly."}, {"text": "la mariposa", "isCorrect": true, "rationale": "La mariposa is the butterfly. It appears in the animal vocabulary and in the childhood memory narratives (colorful butterflies in the garden)."}, {"text": "el aguila", "isCorrect": false, "rationale": "El aguila is the eagle. La mariposa is the butterfly."}, {"text": "la tortuga", "isCorrect": false, "rationale": "La tortuga is the turtle or tortoise. La mariposa is the butterfly."}]}, {"question": "What is Costa Rica notable for in terms of environmental conservation?", "options": [{"text": "Being the largest country in Central America", "isCorrect": false, "rationale": "Costa Rica is actually described as tiny — about the size of West Virginia. Its distinction is in conservation, not size."}, {"text": "Building a national park system covering 25% of the country and becoming a world leader in ecotourism", "isCorrect": true, "rationale": "The culture box explains: Costa Rica chose to pay landowners to protect forests instead of cutting them, built a national park system covering 25% of the land, and became a world leader in ecotourism."}, {"text": "Having the most plant species of any country, with over 3 million species", "isCorrect": false, "rationale": "The Amazon basin (Brazil, Peru, Colombia) has 3 million+ species. Costa Rica contains nearly 5% of ALL Earth's species despite its small size."}, {"text": "Banning all logging and mining since 1970", "isCorrect": false, "rationale": "The text does not say Costa Rica banned all logging since 1970. In fact, it notes that much of the forest had been cut down in the 1980s before the conservation turn."}]}, {"question": "What does 'la ballena' mean?", "options": [{"text": "The eagle", "isCorrect": false, "rationale": "The eagle is 'el aguila'. 'La ballena' is the whale."}, {"text": "The whale", "isCorrect": true, "rationale": "'La ballena' means the whale. In the memory technique nature walk, the whale breaches dramatically in the ocean."}, {"text": "The dolphin", "isCorrect": false, "rationale": "The dolphin is 'el delfin'. 'La ballena' is the whale."}, {"text": "The shark", "isCorrect": false, "rationale": "The shark is 'el tiburon'. 'La ballena' is the whale."}]}, {"question": "Which of the following describes a habitual past action using the correct imperfect form?", "options": [{"text": "Todos los domingos, fui al parque.", "isCorrect": false, "rationale": "Fui is PRETERITE (I went — once). Habitual past actions use the imperfect: 'Todos los domingos, iba al parque' (Every Sunday I used to go to the park)."}, {"text": "Todos los domingos, iba al parque.", "isCorrect": true, "rationale": "Iba is the imperfect of ir (I used to go). 'Todos los domingos' signals habitual action. Together: Every Sunday, I used to go to the park."}, {"text": "Todos los domingos, voy al parque.", "isCorrect": false, "rationale": "Voy is PRESENT tense (I go). Habitual PAST actions use the imperfect: iba (I used to go)."}, {"text": "Todos los domingos, vaya al parque.", "isCorrect": false, "rationale": "Vaya is subjunctive. Habitual past actions use the imperfect indicative: iba (I used to go)."}]}, {"question": "In the Amazon basin, what is notable about its biodiversity?", "options": [{"text": "It contains about 1,000 species, mostly birds", "isCorrect": false, "rationale": "The Amazon is far more diverse than 1,000 species. The culture box states it contains over three million species, including thousands found nowhere else."}, {"text": "It contains over three million species, including thousands found nowhere else on the planet", "isCorrect": true, "rationale": "The culture box states: 'The Amazon basin is home to more species of plants and animals than anywhere else on the planet: over three million species, including thousands found nowhere else.'"}, {"text": "It is the only place where giant tortoises still live in the wild", "isCorrect": false, "rationale": "Giant tortoises in the wild are associated with the Galapagos Islands (Ecuador), not the Amazon."}, {"text": "It has been fully protected from deforestation since 2000", "isCorrect": false, "rationale": "The culture box specifically notes that Amazon habitats face threats from deforestation, climate change, and pollution — they are NOT fully protected."}]}, {"question": "What does 'Veiamos mariposas todos los veranos' mean?", "options": [{"text": "We see butterflies every summer.", "isCorrect": false, "rationale": "Veiamos is imperfect (past). We see (present) would be 'Vemos mariposas cada verano.'"}, {"text": "We used to see butterflies every summer.", "isCorrect": true, "rationale": "'Veiamos' is the nosotros imperfect of ver (we used to see). 'Todos los veranos' = every summer. Together: We used to see butterflies every summer."}, {"text": "We saw butterflies one summer.", "isCorrect": false, "rationale": "A single completed event would use the preterite: vimos. The imperfect veiamos expresses habitual/ongoing past observation."}, {"text": "We are going to see butterflies this summer.", "isCorrect": false, "rationale": "Future plans use ir + a: 'Vamos a ver mariposas.' Veiamos is past tense (imperfect — we used to see)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
