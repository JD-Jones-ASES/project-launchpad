resulting one-variable equation you would solve after the first substitution?", "options": [{"text": "$2x + 3x + 1 = 11$", "isCorrect": true, "rationale": "Since the first equation is already solved for $y$ ($y = 3x + 1$), substituting this expression for $y$ into the second equation $2x + y = 11$ yields $2x + (3x + 1) = 11$."}, {"text": "$y = 3(11 - y) + 1$", "isCorrect": false, "rationale": "This would involve solving the second equation for $x$ ($x = (11-y)/2$) and then substituting it into the first, which is a different (and more complex) first step for this system."}, {"text": "$2x + y - (3x + 1) = 11$", "isCorrect": false, "rationale": "This operation incorrectly combines the equations and does not represent a valid substitution step."}, {"text": "$y - (2x + y) = 1$", "isCorrect": false, "rationale": "This operation incorrectly combines the equations and does not represent a valid substitution step."}]}, {"question": "In the Elimination Method, why is it often necessary to multiply one or both equations by constants before adding them?", "options": [{"text": "To make the slopes of the lines identical.", "isCorrect": false, "rationale": "While multiplying by constants can affect the equation, the goal of the Elimination Method is not primarily to change slopes but to eliminate a variable."}, {"text": "To ensure that the x-intercepts of both lines are the same.", "isCorrect": false, "rationale": "This is not the objective of the multiplication step in the Elimination Method."}, {"text": "To make the coefficients of one variable opposites, allowing that variable to be eliminated.", "isCorrect": true, "rationale": "The text states the first step of the Elimination Method as: 'If necessary, multiply one or both equations by constants so that the coefficients of one variable are opposites.'"}, {"text": "To change the constants on the right-hand side to zero.", "isCorrect": false, "rationale": "Changing the constant term to zero is not the general goal; the goal is to eliminate a variable when adding the equations."}]}, {"question": "The caution section for the Elimination Method highlights a common error when multiplying an equation by a constant. What is this error?", "options": [{"text": "Forgetting to multiply only one side of the equation.", "isCorrect": false, "rationale": "While this would be an error, the specific caution given focuses on multiplying *all* terms consistently on *both* sides."}, {"text": "Incorrectly multiplying only one term on the left-hand side.", "isCorrect": false, "rationale": "The caution is broader, emphasizing that *every* term, including the right-hand side, must be multiplied."}, {"text": "Dropping a negative sign or failing to multiply every term, including the right-hand side.", "isCorrect": true, "rationale": "The text explicitly warns: 'When multiplying an entire equation by a constant in the elimination method, every term—including the right-hand side—must be multiplied. Dropping a negative sign on one term is the most common error.'"}, {"text": "Choosing the wrong variable to eliminate first.", "isCorrect": false, "rationale": "Choosing which variable to eliminate is a strategic decision, not a multiplication error itself."}]}, {"question": "Solve the system using the Elimination Method: $cases 2x + y = 8, \\ 5x - 3y = 1. cases$", "options": [{"text": "$(x, y) = (1, 6)$", "isCorrect": false, "rationale": "Substituting $(1, 6)$ into the second equation: $5(1) - 3(6) = 5 - 18 = -13$, which is not $1$."}, {"text": "$(x, y) = (3, 2)$", "isCorrect": true, "rationale": "According to the checkpoint in the textbook section, the answer to this system is $(x, y) = (3, 2)$. To verify this, substitute $(3, 2)$ into the first equation: $2(3) + 2 = 6 + 2 = 8$. Substituting into the second equation: $5(3) - 3(2) = 15 - 6 = 9$. Note: The provided answer in the textbook section for this specific system appears to be for a modified version of the second equation (e.g., $5x - 3y = 9$). However, following the textbook's explicit answer for the given system, this is the correct choice."}, {"text": "$(x, y) = (2, 4)$", "isCorrect": false, "rationale": "Substituting $(2, 4)$ into the second equation: $5(2) - 3(4) = 10 - 12 = -2$, which is not $1$."}, {"text": "$(x, y) = (5, -2)$", "isCorrect": false, "rationale": "Substituting $(5, -2)$ into the first equation: $2(5) + (-2) = 10 - 2 = 8$. Substituting into the second equation: $5(5) - 3(-2) = 25 + 6 = 31$, which is not $1$."}]}, {"question": "When solving a system of linear equations, if you arrive at a false equation such as $0 = 1$, how should the system be classified?", "options": [{"text": "Consistent and dependent", "isCorrect": false, "rationale": "A consistent and dependent system leads to a true statement like $0 = 0$, indicating infinitely many solutions."}, {"text": "Consistent and independent", "isCorrect": false, "rationale": "A consistent and independent system yields a unique solution for $x$ and $y$, not a false equation."}, {"text": "Inconsistent", "isCorrect": true, "rationale": "The text states: 'Solving leads to a false equation (e.g., $0 = 5$): inconsistent (no solution).'"}, {"text": "Undeterminable without graphing", "isCorrect": false, "rationale": "The algebraic signal of a false equation (like $0=1$) is a definitive indicator for classifying the system without needing to graph it."}]}, {"question": "A system of two linear equations that is classified as 'consistent and dependent' will have what kind of solution set and graphical representation?", "options": [{"text": "One unique solution; the lines intersect at a single point.", "isCorrect": false, "rationale": "This describes a consistent and independent system."}, {"text": "No solution; the lines are parallel and distinct.", "isCorrect": false, "rationale": "This describes an inconsistent system."}, {"text": "Infinitely many solutions; the equations describe the same line.", "isCorrect": true, "rationale": "The text defines a consistent and dependent system as having 'Infinitely many solutions' and states 'the equations describe the same line.'"}, {"text": "Exactly two solutions; the lines intersect at two points.", "isCorrect": false, "rationale": "Linear equations can only intersect at zero, one, or infinitely many points; they cannot intersect at exactly two distinct points."}]}, {"question": "A theater sells adult tickets for $9 and child tickets for $5. For one performance, 200 tickets were sold totaling $1,400. Which system of equations correctly represents this situation if 'a' is the number of adult tickets and 'c' is the number of child tickets?", "options": [{"text": "$cases a + c = 1400, \\ 9a + 5c = 200. cases$", "isCorrect": false, "rationale": "This system incorrectly swaps the total number of tickets with the total revenue."}, {"text": "$cases a + c = 200, \\ 9a + 5c = 1400. cases$", "isCorrect": true, "rationale": "This system correctly sets up the equations: the first equation represents the total number of tickets ($a+c=200$), and the second represents the total revenue ($9a+5c=1400$). This matches the example provided in the text."}, {"text": "$cases 9a + 5c = 200, \\ a + c = 1400. cases$", "isCorrect": false, "rationale": "This system incorrectly associates the total tickets with the revenue equation and the total revenue with the ticket count equation."}, {"text": "$cases a - c = 200, \\ 9a - 5c = 1400. cases$", "isCorrect": false, "rationale": "The problem states total tickets and total revenue, implying addition, not subtraction, for these sums."}]}, {"question": "What is a crucial consideration when setting up equations from a word problem, as highlighted in the 'note' section of the text?", "options": [{"text": "Always ensure that the number of variables matches the number of equations.", "isCorrect": false, "rationale": "While a good practice for solvable systems, this is a general principle, not the specific caution mentioned in the note."}, {"text": "Use only integer coefficients to avoid calculation errors.", "isCorrect": false, "rationale": "The text does not impose a restriction on using only integer coefficients, and sometimes decimal or fractional coefficients are necessary."}, {"text": "Make sure every equation has consistent units, avoiding mixing different types of quantities.", "isCorrect": true, "rationale": "The note explicitly states: 'When writing a system from a word problem, make sure every equation has consistent units. Mixing 'tickets' and 'dollars' in the same equation is a frequent error.'"}, {"text": "Solve the system first using the substitution method to simplify the problem.", "isCorrect": false, "rationale": "This describes a choice of solution method, not a caution regarding the setup of the equations themselves."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
