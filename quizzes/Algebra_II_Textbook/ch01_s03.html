\infty)$", "isCorrect": false, "rationale": "This option has an incorrect value and an incorrect inequality direction."}]}, {"question": "Which statement accurately describes the typical solution set for an inequality in one variable, as compared to an equation in one variable?", "options": [{"text": "An inequality's solution is usually a single value, while an equation's is an interval.", "isCorrect": false, "rationale": "This statement incorrectly swaps the typical characteristics of solutions for equations and inequalities."}, {"text": "Both inequalities and equations typically have solution sets that are intervals of real numbers.", "isCorrect": false, "rationale": "While some equations can have infinite solutions, typically a single-variable linear equation has a single solution, unlike an inequality."}, {"text": "An inequality's solution is typically an entire interval of real numbers, while an equation's solution is usually a single value.", "isCorrect": true, "rationale": "The text states: 'Unlike an equation, whose solution is usually a single value, the solution set of an inequality is typically an entire interval of real numbers...'"}, {"text": "Neither inequalities nor equations have solution sets that are intervals; they are always discrete values.", "isCorrect": false, "rationale": "This statement contradicts the fundamental nature of inequality solutions as described in the text."}]}, {"question": "Solve the compound inequality $-10 < 2 - 3x \\le 8$ and express the solution in interval notation.", "options": [{"text": "$(-2, 4)$", "isCorrect": false, "rationale": "This option has incorrect inclusivity for both bounds. The original inequality includes 'equal to' on the right side."}, {"text": "$[-2, 4)$", "isCorrect": true, "rationale": "Subtracting 2 from all parts yields $-12 < -3x \\le 6$. Dividing all parts by $-3$ requires flipping both inequality signs, resulting in $4 > x \\ge -2$. Rewritten as $-2 \\le x < 4$, the solution in interval notation is $[-2, 4)$."}, {"text": "$[-2, 4]$", "isCorrect": false, "rationale": "This option incorrectly includes 4. The original inequality uses 'less than' on the left side, which after manipulation becomes 'less than' for x."}, {"text": "$(-2, 4]$", "isCorrect": false, "rationale": "This option has incorrect inclusivity for both bounds. It should be inclusive of -2 and exclusive of 4."}]}, {"question": "Find the solution set for the compound inequality $4x - 7 < 1$ or $2x + 5 \\ge 13$.", "options": [{"text": "$(- \\infty, 2) \\cup [4, \\infty)$", "isCorrect": true, "rationale": "Solving the first inequality: $4x - 7 < 1 \\implies 4x < 8 \\implies x < 2$. Solution: $(-\\infty, 2)$. Solving the second inequality: $2x + 5 \\ge 13 \\implies 2x \\ge 8 \\implies x \\ge 4$. Solution: $[4, \\infty)$. Since it's an 'OR' condition, the solution is the union of these two sets, $(-\\infty, 2) \\cup [4, \\infty)$."}, {"text": "$(- \\infty, 2) \\cap [4, \\infty)$", "isCorrect": false, "rationale": "This represents the intersection of the two solution sets, which would be an empty set because the intervals do not overlap. An 'OR' condition requires a union, not an intersection."}, {"text": "$(2, 4]$", "isCorrect": false, "rationale": "This option incorrectly represents a single interval between 2 and 4, which is not the result of the 'OR' condition for these inequalities."}, {"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "This implies all real numbers are solutions. The given inequalities have specific solution ranges that do not cover all real numbers."}]}, {"question": "Consider the steps taken to solve the inequality $-2(x - 4) < 10$: \\n1. $-2x + 8 < 10$ (Distribute) \\n2. $-2x < 2$ (Subtract 8 from both sides) \\n3. $x < -1$ (Divide by -2) \\nWhich step, if any, contains an error according to the rules for solving inequalities?", "options": [{"text": "Step 1 (Distribute)", "isCorrect": false, "rationale": "Step 1 correctly applies the distributive property: $-2 \\cdot x = -2x$ and $-2 \\cdot -4 = +8$. No error here."}, {"text": "Step 2 (Subtract 8 from both sides)", "isCorrect": false, "rationale": "Step 2 correctly subtracts 8 from both sides. Subtracting a number does not affect the direction of the inequality sign. No error here."}, {"text": "Step 3 (Divide by -2)", "isCorrect": true, "rationale": "Step 3 involves dividing both sides by a negative number (-2). According to the rules of inequality, the inequality sign must be reversed in this step. The correct result should be $x > -1$, not $x < -1$."}, {"text": "There are no errors in the steps.", "isCorrect": false, "rationale": "There is a critical error in Step 3 regarding the reversal of the inequality sign."}]}, {"question": "A student needs to earn at least an 85% average on four tests to get an A in a course. Their scores on the first three tests were 82%, 91%, and 79%. What is the minimum score the student must earn on the fourth test to achieve an A?", "options": [{"text": "At least 85%", "isCorrect": false, "rationale": "An 85% on the fourth test would result in an average of $(82+91+79+85)/4 = 337/4 = 84.25%$, which is less than 85%."}, {"text": "At least 88%", "isCorrect": true, "rationale": "Let $S$ be the score on the fourth test. The condition is $(82 + 91 + 79 + S) / 4 \\ge 85$. This simplifies to $(252 + S) / 4 \\ge 85$. Multiplying by 4 gives $252 + S \\ge 340$. Subtracting 252 yields $S \\ge 88$. So, the student needs at least 88%."}, {"text": "At least 92%", "isCorrect": false, "rationale": "This score is higher than necessary. An 88% is sufficient."}, {"text": "At least 94%", "isCorrect": false, "rationale": "This score is much higher than necessary. An 88% is sufficient."}]}, {"question": "In the context of compound inequalities, how does an 'AND' condition fundamentally differ from an 'OR' condition regarding their solution sets?", "options": [{"text": "'AND' implies a union of solution sets, while 'OR' implies an intersection.", "isCorrect": false, "rationale": "This statement incorrectly reverses the definitions. 'AND' corresponds to intersection, and 'OR' corresponds to union."}, {"text": "'AND' conditions always result in a single value, while 'OR' conditions result in an interval.", "isCorrect": false, "rationale": "Both 'AND' and 'OR' conditions typically result in intervals, or possibly a single value, an empty set, or all real numbers, depending on the specific inequalities."}, {"text": "'AND' conditions require both individual inequalities to be true simultaneously, resulting in the intersection of their solution sets. 'OR' conditions require at least one individual inequality to be true, resulting in the union.", "isCorrect": true, "rationale": "This precisely matches the definitions given in the text: 'AND compound inequality: Both conditions must hold simultaneously. The solution set is the intersection... OR compound inequality: At least one condition must hold. The solution set is the union...'"}, {"text": "'AND' conditions are solved by adding the inequalities, while 'OR' conditions are solved by multiplying them.", "isCorrect": false, "rationale": "This describes an incorrect algebraic method for solving compound inequalities. The operations apply to each individual inequality separately or simultaneously across all parts for 'AND'."}]}, {"question": "Solve the inequality $7 - 2(x + 3) \\ge 15$ and write the solution in interval notation.", "options": [{"text": "$(- \\infty, -7]$", "isCorrect": true, "rationale": "First, distribute: $7 - 2x - 6 \\ge 15$. Combine like terms: $1 - 2x \\ge 15$. Subtract 1: $-2x \\ge 14$. Divide by -2 and flip the inequality sign: $x \\le -7$. In interval notation, this is $(-\\infty, -7]$."}, {"text": "$[-7, \\infty)$", "isCorrect": false, "rationale": "This option incorrectly reverses the direction of the inequality (failed to flip the sign when dividing by a negative number)."}, {"text": "$(- \\infty, -1]$", "isCorrect": false, "rationale": "This option has an incorrect numerical bound for the solution."}, {"text": "$[-1, \\infty)$", "isCorrect": false, "rationale": "This option has both an incorrect numerical bound and an incorrect inequality direction."}]}, {"question": "Which of the following inequalities is a contradiction (i.e., has no solution)?", "options": [{"text": "$x + 5 > x + 3$", "isCorrect": false, "rationale": "Subtracting $x$ from both sides yields $5 > 3$, which is always true. This is an identity, not a contradiction."}, {"text": "$2x - 1 < 2(x - 1)$", "isCorrect": true, "rationale": "Distributing on the right side gives $2x - 1 < 2x - 2$. Subtracting $2x$ from both sides yields $-1 < -2$, which is always false. An inequality that is always false is a contradiction and has no solution."}, {"text": "$3x + 4 \\ge 3x - 2$", "isCorrect": false, "rationale": "Subtracting $3x$ from both sides yields $4 \\ge -2$, which is always true. This is an identity, not a contradiction."}, {"text": "$4x + 1 \\le 4x + 1$", "isCorrect": false, "rationale": "Subtracting $4x$ from both sides yields $1 \\le 1$, which is always true. This is an identity, not a contradiction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
