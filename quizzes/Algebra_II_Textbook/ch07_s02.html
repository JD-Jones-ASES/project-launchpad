    };

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does an exponential function $f(x) = b^x$ fundamentally differ from a polynomial function like $g(x) = x^b$?", "options": [{"text": "The variable in an exponential function is always an integer.", "isCorrect": false, "rationale": "The exponent (variable) in an exponential function can be any real number, not just an integer."}, {"text": "In an exponential function, the variable is the base, while in a polynomial, it's the exponent.", "isCorrect": false, "rationale": "This statement is reversed. In an exponential function like $b^x$, the variable is the exponent, and in a polynomial like $x^b$, the variable is the base."}, {"text": "Exponential functions exhibit growth or decay far faster than polynomials, with the variable as the exponent.", "isCorrect": true, "rationale": "The key difference is that in an exponential function, the variable is in the exponent ($b^x$), leading to significantly faster growth or decay compared to polynomials where the variable is the base ($x^b$). This captures both the structural and behavioral difference."}, {"text": "Polynomials always have a y-intercept of (0,1), unlike exponential functions.", "isCorrect": false, "rationale": "Exponential functions of the form $f(x) = b^x$ always have a y-intercept of (0,1). Polynomials do not necessarily have this y-intercept."}], "id": "q01"}, {"question": "What is the y-intercept for any exponential function of the form $f(x) = b^x$, where $b > 0$ and $b \neq 1$?", "options": [{"text": "$(0, b)$", "isCorrect": false, "rationale": "The y-intercept occurs when $x=0$, so $f(0) = b^0 = 1$, not $b$."}, {"text": "$(1, 0)$", "isCorrect": false, "rationale": "The point $(1,0)$ is an x-intercept, which exponential functions of the form $f(x)=b^x$ do not have because the range is $(0, \\infty)$."}, {"text": "$(0, 1)$", "isCorrect": true, "rationale": "For any base $b > 0$ and $b \neq 1$, when $x=0$, $f(0) = b^0 = 1$. Thus, the y-intercept is always $(0, 1)$."}, {"text": "There is no y-intercept.", "isCorrect": false, "rationale": "All exponential functions of this form have a y-intercept at $(0,1)$."}], "id": "q02"}, {"question": "Given the function $f(x) = 4^x$, evaluate $f(-2)$.", "options": [{"text": "$-8$", "isCorrect": false, "rationale": "This incorrectly treats the exponent as multiplication, or as an operation resulting in a negative value."}, {"text": "$1/16$", "isCorrect": true, "rationale": "To evaluate $f(-2)$, substitute $x=-2$ into the function: $f(-2) = 4^{-2}$. By the rules of exponents, $4^{-2} = 1/4^2 = 1/16$."}, {"text": "$1/8$", "isCorrect": false, "rationale": "This would be the result if the base was 2 ($2^{-3}$) or if the calculation was $1/(4 \\times 2)$."}, {"text": "$16$", "isCorrect": false, "rationale": "This would be the result for $f(2)$, not $f(-2)$."}], "id": "q03"}, {"question": "Which of the following exponential functions represents exponential decay?", "options": [{"text": "$f(x) = 5^x$", "isCorrect": false, "rationale": "This function represents exponential growth because the base $b=5$ is greater than 1."}, {"text": "$f(x) = (0.7)^x$", "isCorrect": true, "rationale": "This function represents exponential decay because its base $b=0.7$ is between 0 and 1 ($0 < 0.7 < 1$). For decay, the function is decreasing."}, {"text": "$f(x) = (3/2)^x$", "isCorrect": false, "rationale": "This function represents exponential growth because the base $b=3/2=1.5$ is greater than 1."}, {"text": "$f(x) = e^x$", "isCorrect": false, "rationale": "This function represents exponential growth because the base $e \\approx 2.718$ is greater than 1."}], "id": "q04"}, {"question": "Consider the function $g(x) = 2^{x+1} - 5$. What are the horizontal asymptote and range of this function?", "options": [{"text": "Horizontal asymptote: $y=0$, Range: $(-5, \\infty)$", "isCorrect": false, "rationale": "The original horizontal asymptote $y=0$ is affected by the vertical shift. The range should also reflect this shift."}, {"text": "Horizontal asymptote: $y=1$, Range: $(1, \\infty)$", "isCorrect": false, "rationale": "The vertical shift is by -5, not +1. The $x+1$ represents a horizontal shift, which does not affect the horizontal asymptote or range."}, {"text": "Horizontal asymptote: $y=-5$, Range: $(-5, \\infty)$", "isCorrect": true, "rationale": "The base function $f(x)=2^x$ has a horizontal asymptote at $y=0$ and a range of $(0, \\infty)$. The transformation $g(x) = 2^{x+1} - 5$ includes a vertical shift down by 5 units. This shifts the horizontal asymptote from $y=0$ to $y=-5$ and changes the range from $(0, \\infty)$ to $(-5, \\infty)$."}, {"text": "Horizontal asymptote: $y=-5$, Range: $(-\\infty, -5)$", "isCorrect": false, "rationale": "The horizontal asymptote is correct, but exponential functions always have a range that extends towards positive infinity (above the asymptote) or negative infinity (below, if reflected across the x-axis), not below the asymptote towards negative infinity."}], "id": "q05"}, {"question": "The natural base $e$ is best described as:", "options": [{"text": "An integer approximately equal to 2.71828.", "isCorrect": false, "rationale": "The number $e$ is an irrational number, not an integer, although its approximate value is 2.71828."}, {"text": "The base for all polynomial functions.", "isCorrect": false, "rationale": "Polynomial functions have a variable base (e.g., $x^2$), not a fixed base like $e$."}, {"text": "An irrational number that arises from a limit, fundamental to the natural exponential function.", "isCorrect": true, "rationale": "The text states that $e$ is an irrational number approximately 2.71828, which arises as the limit $e = \\lim_{n \\to \\infty} (1 + 1/n)^n$, and is the base of the natural exponential function $f(x) = e^x$."}, {"text": "A rational number used primarily in geometry.", "isCorrect": false, "rationale": "The number $e$ is irrational, not rational, and it is primarily used in calculus and finance, not geometry."}], "id": "q06"}, {"question": "An initial investment of $3,000 is made at an annual interest rate of 4% compounded quarterly for 5 years. What will be the final amount?", "options": [{"text": "$3000(1 + 0.04/12)^{12*5}$", "isCorrect": false, "rationale": "This formula would be for monthly compounding ($n=12$), not quarterly ($n=4$)."}, {"text": "$3000(1 + 0.04/4)^{4*5}$", "isCorrect": true, "rationale": "Using the compound interest formula $A = P(1 + r/n)^{nt}$: $P = 3000$, $r = 0.04$, $n = 4$ (quarterly), $t = 5$. This gives $A = 3000(1 + 0.04/4)^{4*5} = 3000(1.01)^{20}$. As per the checkpoint, this is $3,661.03."}, {"text": "$3000(1 + 0.04)^{5}$", "isCorrect": false, "rationale": "This formula is for interest compounded annually ($n=1$), not quarterly ($n=4$). The $n$ term in the denominator and exponent is missing."}, {"text": "$3000(1 + 0.04/1)^{1*5}$", "isCorrect": false, "rationale": "This is equivalent to annual compounding, not quarterly."}], "id": "q07"}, {"question": "The graph of $h(x) = (1/3)^x$ is a reflection of $f(x) = 3^x$ across which axis?", "options": [{"text": "The x-axis", "isCorrect": false, "rationale": "A reflection across the x-axis would transform $f(x)$ into $-f(x)$, or $-3^x$. This is not the case here."}, {"text": "The y-axis", "isCorrect": true, "rationale": "The text states that $y = (1/2)^x$ is the reflection of $y=2^x$ across the y-axis because $(1/2)^x = 2^{-x}$. Similarly, $(1/3)^x = 3^{-x}$, which represents a reflection across the y-axis."}, {"text": "Both the x-axis and y-axis", "isCorrect": false, "rationale": "This would involve a transformation like $-b^{-x}$."}, {"text": "The line $y=x$", "isCorrect": false, "rationale": "A reflection across the line $y=x$ would result in the inverse function, which is a logarithmic function in this case."}], "id": "q08"}, {"question": "Which of the following statements is true for the function $f(x) = b^x$ where $b > 0, b \\neq 1$?", "options": [{"text": "The domain is $(0, \\infty)$ and the range is $(-\\infty, \\infty)$.", "isCorrect": false, "rationale": "This statement swaps the domain and range. The domain is all real numbers, and the range is positive real numbers."}, {"text": "The domain is $(-\\infty, \\infty)$ and the range is $(0, \\infty)$.", "isCorrect": true, "rationale": "According to the key properties, the domain of $f(x) = b^x$ is $(-\\infty, \\infty)$ and the range is $(0, \\infty)$."}, {"text": "The function is never one-to-one.", "isCorrect": false, "rationale": "Exponential functions are one-to-one (they pass the Horizontal Line Test)."}, {"text": "The horizontal asymptote is $x=0$.", "isCorrect": false, "rationale": "The horizontal asymptote is $y=0$. An asymptote $x=0$ would be a vertical asymptote."}], "id": "q09"}, {"question": "Consider the function $g(x) = e^{x-2} + 3$. Which of the following describes the graph of $g(x)$ relative to $f(x) = e^x$, and its y-intercept?", "options": [{"text": "Shifted left 2 units, up 3 units; y-intercept $(0, e^{-2}+3)$.", "isCorrect": false, "rationale": "The transformation $x-2$ indicates a shift right, not left."}, {"text": "Shifted right 2 units, up 3 units; y-intercept $(0, e^{-2}+3)$.", "isCorrect": true, "rationale": "The $x-2$ in the exponent shifts the graph 2 units to the right. The $+3$ outside the exponential term shifts the graph 3 units up. To find the y-intercept, set $x=0$: $g(0) = e^{0-2} + 3 = e^{-2} + 3$."}, {"text": "Shifted right 2 units, down 3 units; y-intercept $(0, e^{2}+3)$.", "isCorrect": false, "rationale": "The $+3$ indicates an upward shift, not downward. The y-intercept calculation is also incorrect for this shifted function."}, {"text": "Shifted left 2 units, down 3 units; y-intercept $(0, e^{2}+3)$.", "isCorrect": false, "rationale": "Both the direction of shifts and the y-intercept calculation are incorrect."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
